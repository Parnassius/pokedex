          violet: "￹相手￺あいて￻に　￹尻尾￺しっぽ￻の￹先￺さき￻を　￹押￺お￻しつけ\n￹瞬時￺しゅんじ￻に　２￹万￺まん￻ボルト　￹以上￺いじょう￻の\n￹高圧￺こうあつ￻　￹電流￺でんりゅう￻を　￹送￺おく￻りこむ。"
        jp_kanji:
          scarlet: "￹興奮￺こうふん￻すると　￹胸￺むね￻を　￹打￺う￻ち￹鳴￺な￻らす。\nそのたびに　￹電気火花￺でんきひばな￻が　￹散￺ち￻り\n￹雷鳴￺らいめい￻が　あたりに　￹響￺ひび￻き￹渡￺わた￻る。"
          violet: "￹相手￺あいて￻に　￹尻尾￺しっぽ￻の￹先￺さき￻を　￹押￺お￻しつけ\n￹瞬時￺しゅんじ￻に　２￹万￺まん￻ボルト　￹以上￺いじょう￻の\n￹高圧￺こうあつ￻　￹電流￺でんりゅう￻を　￹送￺おく￻りこむ。"
        en:
          scarlet: "When it gets excited, it thumps its chest.\nWith every thud, thunder roars and electric\nsparks shower all around."
          violet: "This Pokémon presses the tips of its tails onto\nan opponent and instantly sends over 20,000\nvolts of high-voltage electricity through them."
        fr:
          scarlet: "Quand il est excité, il tambourine sur\nsa poitrine. Chaque coup génère des arcs\nélectriques et produit un roulement de tonnerre."
          violet: "S’il touche son adversaire avec l’extrémité\nde ses queues, il peut lui infliger instantanément\nune décharge de plus de 20 000 volts."
        it:
          scarlet: "Quando è agitato si tamburella il petto.\nA ogni colpo emette scintille elettriche e fa\nriecheggiare in tutta la zona un rombo di tuono."
          violet: "Tocca il nemico con la punta delle code\nrilasciando in un istante una scarica\nad alta tensione di oltre 20.000 volt."
        de:
          scarlet: "Wenn es aufgeregt ist, schlägt es sich auf die\nBrust. Bei jedem Schlag sprühen elektrische\nFunken und es ertönt ein Donnern."
          violet: "Es berührt Gegner mit seinen Schweifspitzen,\num dann augenblicklich Starkstrom mit einer\nSpannung von über 20 000 V zu entladen."
        es:
          scarlet: "Al exaltarse, se golpea con ímpetu\nel pecho. Cada vez que lo hace, saltan\nchispas y un trueno resuena por la zona."
          violet: "Alcanza al enemigo con la punta de las\ncolas y lo electrocuta al instante con una\ndescarga de alta tensión de más de 20 000 V."
        ko:
          scarlet: "흥분하면 가슴을 두들긴다.\n그때마다 전기 불꽃이 튀며\n천둥소리가 주변에 울려 퍼진다."
          violet: "상대에게 꼬리 끝을 밀어붙여\n순식간에 2만 볼트 이상의\n고압 전류를 흘려보낸다."
        zh_simp:
          scarlet: "兴奋的时候会捶胸鸣叫。\n每到那时，电火花会飞溅，\n雷声会在四周回响。"
          violet: "会用尾巴的尖端按住对手，\n然后在一瞬间输入\n２万伏特以上的高压电流。"
        zh_trad:
          scarlet: "興奮的時候會捶胸發出聲響。\n每次捶胸都會飛濺出電火花，\n雷聲會在四周回響。"
          violet: "會用尾巴前端抵住對手，\n然後在一瞬間注入\n超過２萬伏特的電流。"
