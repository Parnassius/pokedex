      descriptions:
        jp_kana:
          scarlet: "￹鋼￺はがね￻になった　ツメと　￹頭￺あたま￻で\nドリルを　つくり　どんなに\n￹分厚￺ぶあつ￻い　￹鉄板￺てっぱん￻も　￹貫￺つらぬ￻く。"
          violet: "￹鋼￺はがね￻に　￹進化￺しんか￻した　ドリルは\n￹鉄板￺てっぱん￻を　￹貫￺つらぬ￻く　￹破壊力￺はかいりょく￻。\nトンネル￹工事￺こうじ￻で　￹大活躍￺だいかつやく￻する。"
        jp_kanji:
          scarlet: "￹鋼￺はがね￻になった　ツメと　￹頭￺あたま￻で\nドリルを　つくり　どんなに\n￹分厚￺ぶあつ￻い　￹鉄板￺てっぱん￻も　￹貫￺つらぬ￻く。"
          violet: "￹鋼￺はがね￻に　￹進化￺しんか￻した　ドリルは\n￹鉄板￺てっぱん￻を　￹貫￺つらぬ￻く　￹破壊力￺はかいりょく￻。\nトンネル￹工事￺こうじ￻で　￹大活躍￺だいかつやく￻する。"
        en:
          scarlet: "Forming a drill with its steel claws and head,\nit can bore through a steel plate, no matter\nhow thick it is."
          violet: "Its drill, which has evolved into steel, is strong\nenough to bore through iron plates. This\nPokémon is a great help in tunnel construction."
        fr:
          scarlet: "Ses griffes et sa tête sont désormais en acier. Elles\npeuvent agir comme une perceuse et transpercer\ndes plaques de fer de n’importe quelle épaisseur."
          violet: "Suite à son évolution, ses forets sont désormais en\nacier et lui permettent de transpercer les plaques\nde fer. Il aide souvent à la construction de tunnels."
        it:
          scarlet: "La trivella che forma con la testa e gli artigli\ndi acciaio è in grado di perforare una spessa\nlastra di ferro."
          violet: "La trivella si è evoluta diventando d’acciaio\ne può perforare una lastra di ferro. È molto\nutile per scavare tunnel."
        de:
          scarlet: "Mit seinem Kopf und seinen Klauen aus Stahl\nformt es einen Bohrer, der jede noch so\ndicke Metallplatte durchbohrt."
          violet: "Seine zu Stahl weiterentwickelten Bohrer sind\nkräftig genug, um Eisenplatten zu durchbohren.\nBeim Tunnelbau ist es sehr hilfreich."
        es:
          scarlet: "Sus garras y su cabeza se han vuelto de acero.\nPuede combinarlas para formar un taladro capaz\nde perforar incluso una gruesa plancha metálica."
          violet: "Su taladro se ha vuelto de acero tras evolucionar\ny es capaz de atravesar planchas metálicas. Es de\ngran ayuda en la construcción de túneles."
        ko:
          scarlet: "강철이 된 발톱과 머리로\n드릴을 만들어 어떠한\n두꺼운 철판도 꿰뚫는다."
          violet: "강철로 진화한 드릴은\n철판을 뚫는 파괴력을 가졌다.\n터널 공사에서 크게 활약한다."
        zh_simp:
          scarlet: "会用变成了钢的爪和头\n组成钻头，无论多厚的\n铁板都能贯穿。"
          violet: "进化成钢的钻头\n拥有穿透铁板的破坏力。\n在隧道工程里非常活跃。"
        zh_trad:
          scarlet: "會用化為鋼的爪子和頭\n組成鑽頭，無論多厚的\n鐵板都能夠貫穿過去。"
          violet: "進化為鋼的鑽頭有著\n能穿透鐵板的破壞力。\n在隧道工程裡可幫上大忙。"
