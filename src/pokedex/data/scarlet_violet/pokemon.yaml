        jp_kanji:
          scarlet: "￹体￺からだ￻に　￹静電気￺せいでんき￻が　￹溜￺た￻まると\n￹体毛￺たいもう￻が　いつもの　２￹倍￺ばい￻ほどに\nふくらむ。　￹触￺さわ￻ると　￹痺￺しび￻れる。"
          violet: "￹体毛￺たいもう￻は　どんどん　￹伸￺の￻びる。\n￹夏￺なつ￻になると　￹全部￺ぜんぶ￻　￹抜￺ぬ￻け￹落￺お￻ちるが\n１￹週間￺しゅうかん￻で　￹元通￺もとどお￻りになる。"
        en:
          scarlet: "If static electricity builds in its body, its fleece\ndoubles in volume. Touching it will shock you."
          violet: "Its fleece grows continually. In the summer,\nthe fleece is fully shed, but it grows back in\na week."
        fr:
          scarlet: "Quand son corps est chargé d’électricité\nstatique, sa laine double de volume et envoie\ndes décharges lorsqu’on la touche."
          violet: "Sa toison pousse constamment. L’été, toute\nsa laine tombe, mais elle repousse en moins\nd’une semaine."
        it:
          scarlet: "Se il corpo accumula elettricità statica, il volume\ndel vello raddoppia. Toccandolo si prende\nla scossa."
          violet: "Il vello gli cresce di continuo. In estate lo perde\ncompletamente, ma gli si riforma nel giro di una\nsettimana."
        de:
          scarlet: "Lädt es sich statisch auf, verdoppelt sich das\nVolumen seiner Wolle. Wer es berührt, erhält\neinen Elektroschock."
          violet: "Sein Fell wächst ständig. Im Sommer wirft es sein\nganzes Fell ab, aber dieses wächst binnen einer\nWoche wieder nach."
        es:
          scarlet: "Cuando almacena electricidad estática en su\ncuerpo, la lana dobla su volumen. Quien la\ntoque recibirá una descarga."
          violet: "Su lana crece continuamente. En verano la pierde\ntoda, pero le vuelve a crecer en una semana."
        ko:
          scarlet: "몸에 정전기가 모이면\n털이 평소의 2배 정도로\n부풀어 오른다. 만지면 마비된다."
          violet: "몸의 털은 점점 자란다.\n여름이 되면 전부 빠지지만\n일주일 정도면 원래대로 자라난다."
        zh_simp:
          scarlet: "身体里储存了静电后，\n体毛就会膨胀到平时的２倍。\n一旦触摸就会触电。"
          violet: "体毛会不断变长。\n即使到了夏天会全部掉光，\n也会在１周后恢复原样。"
        zh_trad:
          scarlet: "身體裡只要儲存了靜電，\n體毛就會膨脹到平時的２倍左右。\n一旦觸摸就會被電得麻麻的。"
          violet: "體毛會不斷地變長。\n即使每到夏天就會掉光，\n也能在１週內長回原樣。"
