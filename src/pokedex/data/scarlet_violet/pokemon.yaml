          violet: "￹極寒￺ごっかん￻の　￹土地￺とち￻で　￹生￺う￻まれた。\n￹色鮮￺いろあざ￻やかな　￹毒￺どく￻の　りんぷんを\n￹翅￺はね￻から　￹散￺ち￻らして　￹戦￺たたか￻う。"
        en:
          scarlet: "The patterns on this Pokémon depend on the\nclimate and topography of the land it was born\nin. This form is from frigid lands."
          violet: "This Pokémon was born in frigid lands.\nIt scatters colorful, toxic scales from its\nwings during battle."
        fr:
          scarlet: "Ses motifs varient selon la topographie\net le climat de l’endroit où il naît. Cette\nforme est originaire de terres plutôt froides."
          violet: "Ce Pokémon est originaire d’une région glaciale.\nEn combat, ses ailes disséminent des écailles\nempoisonnées aux couleurs vives."
        it:
          scarlet: "Il motivo sulle ali cambia a seconda del clima e\ndell’ambiente del luogo in cui nasce. Questa è\nla forma che assume nelle regioni più fredde."
          violet: "Proviene da terre estremamente fredde.\nLotta rilasciando dalle ali scaglie velenose\ndai colori vividi."
        de:
          scarlet: "Vivillons Musterung variiert je nach geografischer\nBeschaffenheit und Klima der Heimat. Diese Form\nstammt aus bitterkalten Gebieten."
          violet: "Dieses Pokémon erblickte in bitterkalten Landen\ndas Licht der Welt. Im Kampf verstreut es bunten,\ngiftigen Flügelstaub."
        es:
          scarlet: "Sus motivos cambian en función del clima y el\nterreno de su lugar de origen. Adopta esta forma\nen tierras gélidas."
          violet: "Un Pokémon originario de tierras gélidas.\nEn combate, esparce unas coloridas escamas\ntóxicas con las alas."
        ko:
          scarlet: "태어난 땅의 기후나 풍토에\n영향을 받아 모양이 달라진다.\n혹한의 땅에서의 모습이다."
          violet: "혹한의 땅에서 태어났다.\n독성을 띠는 화려한 날개 가루를\n흩뿌리면서 싸운다."
        zh_simp:
          scarlet: "身上的花纹会受到诞生地的\n气候和风土影响而改变。\n这是它在极为寒冷的地方的样子。"
          violet: "诞生在极为寒冷的地方。\n会从翅膀撒出色彩艳丽的\n毒鳞粉来战斗。"
        zh_trad:
          scarlet: "身上的花紋會受到誕生地的\n氣候和風土影響而改變。\n在極為寒冷的地方能見到這種樣子。"
          violet: "誕生在極為寒冷的地方。\n會從翅膀灑出色彩鮮豔\n的毒鱗粉來戰鬥。"
