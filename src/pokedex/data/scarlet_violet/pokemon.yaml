      descriptions:
        jp_kana:
          scarlet: "￹幻￺まぼろし￻の　￹古代文明￺こだいぶんめい￻の　￹科学￺かがく￻によって\n￹生￺う￻み￹出￺だ￻された　ポケモンと\n￹考￺かんが￻えられている。"
          violet: "￹謎￺なぞ￻の　エネルギーにより　￹活動￺かつどう￻。\n￹古代￺こだい￻から　￹動￺うご￻き￹続￺つづ￻けているので\nそろそろ　パワーが　￹尽￺つ￻きるとも。"
        jp_kanji:
          scarlet: "￹幻￺まぼろし￻の　￹古代文明￺こだいぶんめい￻の　￹科学￺かがく￻によって\n￹生￺う￻み￹出￺だ￻された　ポケモンと\n￹考￺かんが￻えられている。"
          violet: "￹謎￺なぞ￻の　エネルギーにより　￹活動￺かつどう￻。\n￹古代￺こだい￻から　￹動￺うご￻き￹続￺つづ￻けているので\nそろそろ　パワーが　￹尽￺つ￻きるとも。"
        en:
          scarlet: "These Pokémon are thought to have been\ncreated by the science of an ancient and\nmysterious civilization."
          violet: "Its movements are powered by a mysterious\nenergy. It has continued to move since ancient\ntimes, so its power may soon run out."
        fr:
          scarlet: "On pense que ce Pokémon est le produit\nde la technologie d’une civilisation ancienne\net mystérieuse."
          violet: "Une mystérieuse énergie l’alimente depuis\nles temps anciens mais, qui sait, cette énergie\nn’est peut-être pas éternelle..."
        it:
          scarlet: "Si pensa che sia il prodotto della tecnologia\ndi un’antica civiltà leggendaria."
          violet: "È animato da un’energia misteriosa. Essendo\nin funzione fin dall’antichità, si sospetta che\ntale energia possa esaurirsi presto."
        de:
          scarlet: "Man nimmt an, dass dieses Pokémon ein\nProdukt der Wissenschaft einer mysteriösen\nund uralten Zivilisation sei."
          violet: "Es wird seit uralten Zeiten durch eine Energie\nrätselhaften Ursprungs angetrieben. Manche\ngehen davon aus, dass diese bald erschöpft ist."
        es:
          scarlet: "Los rumores apuntan a que este Pokémon\nfue creado gracias a la tecnología de una\nantigua y misteriosa civilización."
          violet: "Se mueve gracias a una misteriosa energía, pero,\nhabiendo estado activo desde la antigüedad,\ndicha energía podría agotarse tarde o temprano."
        ko:
          scarlet: "환상 속 고대 문명의\n과학에 의해 탄생한\n포켓몬이라 여겨지고 있다."
          violet: "수수께끼의 에너지로 활동한다.\n고대부터 계속 움직였기 때문에\n슬슬 파워가 다할 때가 됐을지도 모른다."
        zh_simp:
          scarlet: "被认为是由神秘的\n古代文明科学所创造\n出来的宝可梦。"
          violet: "因谜一般的能量而活动。\n因为从古代开始就持续活动，\n说不定很快就会用尽力量。"
        zh_trad:
          scarlet: "人們認為牠是由\n飄幻的古代文明科學\n所創造出的寶可夢。"
          violet: "靠著神秘的能量來活動。\n因為從古代開始就持續活動，\n有可能就快要耗盡力量了。"
