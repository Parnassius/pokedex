          violet: "￹芳醇￺ほうじゅん￻で　￹香￺かお￻り￹高￺たか￻い　オイルを\n￹岩石￺がんせき￻をも　￹砕￺くだ￻く　￹勢￺いきお￻いで\n￹発射￺はっしゃ￻し　￹敵￺てき￻を　￹撃退￺げきたい￻する。"
        jp_kanji:
          scarlet: "￹穏￺おだ￻やかで　とても　￹慈悲深￺じひぶか￻い。\n￹栄養豊富￺えいようほうふ￻な　￹美味￺おい￻しい　オイルを\n￹弱￺よわ￻った　ポケモンに　￹分￺わ￻け￹与￺あた￻える。"
          violet: "￹芳醇￺ほうじゅん￻で　￹香￺かお￻り￹高￺たか￻い　オイルを\n￹岩石￺がんせき￻をも　￹砕￺くだ￻く　￹勢￺いきお￻いで\n￹発射￺はっしゃ￻し　￹敵￺てき￻を　￹撃退￺げきたい￻する。"
        en:
          scarlet: "This calm Pokémon is very compassionate.\nIt will share its delicious, nutrient-rich oil\nwith weakened Pokémon."
          violet: "This Pokémon drives back enemies by\nlaunching its rich, aromatic oil at them\nwith enough force to smash a boulder."
        fr:
          scarlet: "Calme et bienveillant, il partage son huile\ndélicieuse et riche en nutriments avec\nles Pokémon affaiblis."
          violet: "Il repousse ses adversaires en projetant son huile\nriche en arômes avec suffisamment de force pour\npulvériser un rocher."
        it:
          scarlet: "Ha un’indole tranquilla ed estremamente\ncompassionevole. Dona il suo olio delizioso\ne nutriente ai Pokémon debilitati."
          violet: "Respinge i nemici con un getto del suo\nolio corposo e profumato, così potente\nda frantumare anche la roccia."
        de:
          scarlet: "Dieses Pokémon ist sehr friedlich und gütig.\nEs teilt sein leckeres, nährstoffreiches Öl mit\ngeschwächten Pokémon."
          violet: "Feinde schlägt es zurück, indem es duftendes,\naromatisches Öl mit einer Wucht abfeuert,\ndie sogar Felsen zertrümmern kann."
        es:
          scarlet: "Es pacífico y compasivo. Comparte su\ndelicioso y nutritivo aceite con los Pokémon\nque han perdido las fuerzas."
          violet: "Repele a sus enemigos disparando su\nexquisito y fragante aceite a una presión\nque bastaría para partir una roca."
        ko:
          scarlet: "온화하면서도 매우 자비롭다.\n영양이 풍부한 맛있는 오일을\n약해진 포켓몬에게 나눠 준다."
          violet: "진하고 좋은 향이 나는 오일을\n암석조차도 꿰뚫어 버릴 기세로\n발사하여 적을 물리친다."
        zh_simp:
          scarlet: "性情温和，慈悲为怀。\n会把营养丰富且美味可口的\n油分享给虚弱的宝可梦。"
          violet: "会以连岩石都能粉碎的\n力道把香醇浓郁的\n油发射出去，击退敌人。"
        zh_trad:
          scarlet: "性情溫和，慈悲為懷。\n會把營養豐富且美味可口\n的油分給虛弱的寶可夢。"
          violet: "會把香醇濃郁的油\n以連岩石都能粉碎的力道\n發射出去，擊退敵人。"
