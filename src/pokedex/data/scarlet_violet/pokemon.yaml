      descriptions:
        jp_kana:
          scarlet: "￹謎多￺なぞおお￻き　￹凶暴￺きょうぼう￻な　￹生物￺せいぶつ￻。\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻された\n￹水￺みず￻の　￹怪物￺かいぶつ￻から　￹名付￺なづ￻けられた。"
          violet: "￹超古代￺ちょうこだい￻の　スイクンの　￹姿￺すがた￻と\nオカルト￹雑誌￺ざっし￻が　￹掲載￺けいさい￻した\nイラストに　￹似￺に￻た　￹姿￺すがた￻をしている。"
        jp_kanji:
          scarlet: "￹謎多￺なぞおお￻き　￹凶暴￺きょうぼう￻な　￹生物￺せいぶつ￻。\n￹古￺ふる￻い　￹探検記￺たんけんき￻に　￹記￺しる￻された\n￹水￺みず￻の　￹怪物￺かいぶつ￻から　￹名付￺なづ￻けられた。"
          violet: "￹超古代￺ちょうこだい￻の　スイクンの　￹姿￺すがた￻と\nオカルト￹雑誌￺ざっし￻が　￹掲載￺けいさい￻した\nイラストに　￹似￺に￻た　￹姿￺すがた￻をしている。"
        en:
          scarlet: "This ferocious creature is shrouded in mystery.\nIt’s named after an aquatic monster mentioned\nin an old expedition journal."
          violet: "It resembles an illustration published in a\nparanormal magazine, said to be a depiction\nof a super-ancient Suicune."
        fr:
          scarlet: "Cette créature violente entourée de mystère\ntire son nom d’un monstre aquatique évoqué\ndans un vieux récit d’exploration."
          violet: "Il ressemble à l’illustration du Suicune d’un passé\nlointain qui figure dans une revue consacrée aux\nphénomènes paranormaux."
        it:
          scarlet: "Feroce creatura avvolta nel mistero. Il suo nome\nè ispirato a un mostro acquatico menzionato in\nun antico diario di viaggio."
          violet: "Il suo aspetto ricorda un’illustrazione che, stando\nalla rivista di paranormale che l’ha pubblicata,\nraffigurerebbe un antichissimo Suicune."
        de:
          scarlet: "Diese rätselhafte und wilde Kreatur ist nach\neinem Wassermonster benannt, das in einem\nalten Expeditionsbericht beschrieben wurde."
          violet: "Es ähnelt einer Illustration aus einer esoterischen\nZeitschrift, die ein urzeitliches Suicune abbildet."
        es:
          scarlet: "Una criatura violenta rodeada de misterio, cuyo\nnombre se inspira en cierto monstruo acuático\nmencionado en un viejo diario de exploración."
          violet: "Se asemeja a la ilustración de un Suicune de\ntiempos inmemoriales que apareció publicada\nen cierta revista esotérica."
        ko:
          scarlet: "수수께끼에 둘러싸인 흉포한 생물.\n오래된 탐험기에 기록된\n물의 괴물의 이름을 따서 명명되었다."
          violet: "초고대의 스이쿤이라며\n오컬트 잡지에 게재됐던 일러스트와\n비슷한 모습을 하고 있다."
        zh_simp:
          scarlet: "充满谜团的残暴生物。\n名字来源于古老探险记中\n所记载的水之怪物。"
          violet: "样子与超自然杂志\n所刊登的插图中的\n超古代水君很相似。"
        zh_trad:
          scarlet: "充滿謎團的凶暴生物。\n名字來自古老的探險記裡\n記載的水之怪物。"
          violet: "樣子與超自然雜誌\n所刊登的插圖中的\n超古代水君很相似。"
