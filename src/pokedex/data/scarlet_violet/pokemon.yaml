          scarlet: "￹丈夫￺じょうぶ￻な　プロテクターが　￹火山￺かざん￻の\n￹噴火￺ふんか￻から　￹身￺み￻を　￹守￺まも￻る。　￹丸￺まる￻い\n￹岩￺いわ￻を　￹手￺て￻の　￹穴￺あな￻から　￹撃￺う￻ち￹出￺だ￻す。"
          violet: "￹脳￺のう￻は　サイドンよりも　￹小￺ちい￻さいが\nそのぶんの　エネルギーを　すべて\n￹戦￺たたか￻いに　￹使￺つか￻うので　￹強￺つよ￻いのだ。"
        jp_kanji:
          scarlet: "￹丈夫￺じょうぶ￻な　プロテクターが　￹火山￺かざん￻の\n￹噴火￺ふんか￻から　￹身￺み￻を　￹守￺まも￻る。　￹丸￺まる￻い\n￹岩￺いわ￻を　￹手￺て￻の　￹穴￺あな￻から　￹撃￺う￻ち￹出￺だ￻す。"
          violet: "￹脳￺のう￻は　サイドンよりも　￹小￺ちい￻さいが\nそのぶんの　エネルギーを　すべて\n￹戦￺たたか￻いに　￹使￺つか￻うので　￹強￺つよ￻いのだ。"
        en:
          scarlet: "This Pokémon’s sturdy carapace protects\nit from volcanic eruptions. It shoots round\nrocks from the holes in its hands."
          violet: "A Rhyperior’s brain is smaller than a Rhydon’s,\nbut the Rhyperior is stronger because it spends\nmore energy on battling and less on brainpower."
        fr:
          scarlet: "Il se protège des éruptions volcaniques\nà l’aide de ses plaques solides et tire des\nrochers ronds à travers les trous de ses mains."
          violet: "Son cerveau est plus petit que celui de Rhinoféros.\nIl consacre toute son énergie au combat,\nce qui fait de lui un adversaire redoutable."
        it:
          scarlet: "Le robuste coperture che ha sul corpo\nlo proteggono dalle eruzioni vulcaniche. Lancia\nrocce rotonde dalle cavità che ha nei palmi."
          violet: "Ha un cervello più piccolo di quello di\nRhydon. Per questo motivo può dedicare\npiù energie alla lotta ed essere così forte."
        de:
          scarlet: "Durch seine robuste Panzerung hält sein Körper\nauch Vulkanausbrüchen stand. Aus den Löchern in\nden Handflächen feuert es runde Felsbrocken ab."
          violet: "Sein Gehirn mag zwar noch kleiner sein als das\nvon Rizeros, aber dafür investiert es umso mehr\nEnergie in den Kampf. Deshalb ist es sehr stark."
        es:
          scarlet: "Repele erupciones volcánicas con sus\nrobustos protectores. Dispara con fuerza rocas\nredondas a través de las cavidades de las manos."
          violet: "Su cerebro es más pequeño que el de Rhydon,\npero esto lo hace más fuerte, ya que gasta toda\nsu energía en combatir en vez de pensar."
        ko:
          scarlet: "튼튼한 프로텍터가\n화산의 분화로부터 보호해 준다.\n둥근 바위를 손의 구멍에서 발사한다."
          violet: "뇌는 코뿌리보다도 작지만\n그만큼 에너지를 모조리\n전투에 사용하기 때문에 강하다."
        zh_simp:
          scarlet: "当遇到火山爆发时，\n能依靠坚固的护具保护自己。\n会从手掌的洞里射出圆形岩石。"
          violet: "虽然脑比钻角犀兽还小，\n但能把相对应的那部分能量\n全都用在战斗上，因此很强。"
        zh_trad:
          scarlet: "堅固的護具能在火山爆發時\n保護牠不受傷害。會從手掌\n的孔洞發射出圓形的岩石。"
          violet: "雖然大腦比鑽角犀獸還小，\n但可以把因而多出的能量\n全用在戰鬥上，所以非常強。"
