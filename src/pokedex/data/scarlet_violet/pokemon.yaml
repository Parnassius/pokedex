      descriptions:
        jp_kana:
          scarlet: "シキジカの　￹体臭￺たいしゅう￻は　￹季節￺きせつ￻で\n￹変￺か￻わるが　￹冬￺ふゆ￻の￹姿￺すがた￻になると\nほとんど　￹匂￺にお￻いがしなくなるぞ。"
          violet: "￹仲良￺なかよ￻くなると　￹頭突￺ずつ￻きで　じゃれる。\n￹花￺はな￻に　￹隠￺かく￻れていて　わからないが\nツノが　あって　￹地味￺じみ￻に　￹痛￺いた￻い。"
        jp_kanji:
          scarlet: "シキジカの　￹体臭￺たいしゅう￻は　￹季節￺きせつ￻で\n￹変￺か￻わるが　￹冬￺ふゆ￻の￹姿￺すがた￻になると\nほとんど　￹匂￺にお￻いがしなくなるぞ。"
          violet: "￹仲良￺なかよ￻くなると　￹頭突￺ずつ￻きで　じゃれる。\n￹花￺はな￻に　￹隠￺かく￻れていて　わからないが\nツノが　あって　￹地味￺じみ￻に　￹痛￺いた￻い。"
        en:
          scarlet: "Deerling’s scent changes with the seasons, but\nwhen the Pokémon is in its Winter Form, it has\nhardly any scent at all."
          violet: "This Pokémon will playfully headbutt those it gets\nalong well with. It has antlers hidden under its\nflower, so the headbutts are a little painful."
        fr:
          scarlet: "L’odeur corporelle des Vivaldaim varie selon\nla saison, mais lorsqu’ils prennent leur Forme\nHiver, elle est presque imperceptible."
          violet: "Il s’amuse à donner des coups de tête aux gens\nqu’il apprécie. Puisque ses fleurs cachent des bois,\nces coups sont assez douloureux."
        it:
          scarlet: "L’odore dei Deerling cambia con le stagioni.\nQuando assumono la Forma Inverno, diventa\nquasi impercettibile."
          violet: "Quando fa amicizia con qualcuno gioca a dargli\ndelle testate, che fanno un po’ male a causa\ndelle corna nascoste sotto il fiore."
        de:
          scarlet: "Sein Geruch ändert sich mit der Jahreszeit,\nverschwindet aber fast vollständig, sobald es\nseine Winterform annimmt."
          violet: "Es verpasst allen, mit denen es sich gut versteht,\nspielerisch Kopfstöße. Diese können aber wegen\nder Hörner unter seiner Blume leicht wehtun."
        es:
          scarlet: "La fragancia de Deerling va cambiando con\nlas estaciones, pero en invierno resulta casi\nimperceptible."
          violet: "Da cabezazos juguetones a aquellos con quienes\nse lleva bien. La flor oculta los cuernos que tiene,\nasí que duelen un poco."
        ko:
          scarlet: "사철록의 체취는 계절에 따라 변하지만\n겨울의 모습이 되면\n거의 냄새가 나지 않게 된다."
          violet: "친해지면 박치기를 하며 장난친다.\n꽃에 가려져서 알아보기 힘들지만\n뿔이 있어서 살짝 아프다."
        zh_simp:
          scarlet: "四季鹿的体味会随季节而变，\n但当它是冬天的样子时，\n却几乎没有任何气味。"
          violet: "感情变好后会用头锤闹着玩。\n它的角藏在花朵里难以发现，\n被顶到还是会蛮痛的。"
        zh_trad:
          scarlet: "四季鹿的體味會隨季節而變，\n但當牠是冬天的樣子時，\n卻幾乎沒有任何氣味。"
          violet: "感情變好後會用頭錘來鬧著玩。\n頭上有角，但被花蓋住難以察覺，\n因此挨到牠的頭錘其實還挺痛的。"
