        jp_kanji:
          scarlet: "￹体￺からだ￻を　￹動￺うご￻かすたびに　￹筋肉￺きんにく￻が\n￹伸￺の￻び￹縮￺ちぢ￻みして　￹電気￺でんき￻が　￹生￺う￻まれる。\nピンチになると　￹体￺からだ￻が　￹輝￺かがや￻く。"
          violet: "￹筋肉￺きんにく￻が　￹伸￺の￻び￹縮￺ちぢ￻み　することで\n￹電気￺でんき￻が　￹発生￺はっせい￻。　ピンチになると\n￹体毛￺たいもう￻が　まぶしく　￹光￺ひか￻る。"
        en:
          scarlet: "The extension and contraction of its muscles\ngenerates electricity. It glows when in trouble."
          violet: "The extension and contraction of its muscles\ngenerates electricity. Its fur glows when it’s\nin trouble."
        fr:
          scarlet: "Ses muscles génèrent un courant électrique\nlorsqu’ils travaillent. Son corps s’illumine\nen cas de danger."
          violet: "Lorsqu’il fait travailler ses muscles, il génère\nde l’électricité. Sa fourrure étincelle en cas\nde danger."
        it:
          scarlet: "Quando si muove, le contrazioni dei suoi muscoli\nproducono elettricità. Se si sente minacciato,\nil suo corpo si illumina."
          violet: "Il movimento dei suoi muscoli produce elettricità.\nIn caso di pericolo, la sua pelliccia si illumina\ntanto da diventare abbagliante."
        de:
          scarlet: "Mit jeder Bewegung erzeugt es durch das\nStrecken und Zusammenziehen seiner Muskeln\nElektrizität. Steckt es in der Klemme, leuchtet es."
          violet: "Es erzeugt Elektrizität, indem es seine Muskeln\nstreckt und wieder zusammenzieht. Steckt es in\nder Klemme, leuchtet sein Fell gleißend hell."
        es:
          scarlet: "La extensión y contracción de sus músculos\ngenera electricidad. Brilla cuando está en\npeligro."
          violet: "Produce electricidad contrayendo sus músculos.\nSi siente peligro, su pelaje brilla resplandeciente."
        ko:
          scarlet: "몸을 움직일 때마다 근육이 늘어났다\n줄어들었다 하여 전기가 발생한다.\n궁지에 몰리면 몸이 빛난다."
          violet: "근육이 늘었다 줄었다 하면서\n전기가 발생한다. 위급해지면\n털이 눈부시게 빛난다."
        zh_simp:
          scarlet: "每当活动身体时，\n肌肉就会伸缩产生电。\n危机时刻，身体会发光。"
          violet: "通过伸缩肌肉来产生电流。\n当它陷入危机时，\n体毛会发出刺眼的亮光。"
        zh_trad:
          scarlet: "每當活動身體時，\n肌肉的伸縮會產生電流。\n當遇上危機時，身體會發光。"
          violet: "只要伸縮肌肉就能夠\n產生電流。身陷危機時\n體毛會發出刺眼的亮光。"
