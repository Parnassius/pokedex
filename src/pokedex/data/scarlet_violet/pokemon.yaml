          violet: "￹食￺た￻べた　￹落￺お￻ち￹葉￺ば￻を　￹消化￺しょうか￻するとき\n￹発電￺はつでん￻して　￹電気￺でんき￻を　￹溜￺た￻めこむ。\nあごの　￹先端￺せんたん￻から　￹放電￺ほうでん￻する。"
        jp_kanji:
          scarlet: "￹丈夫￺じょうぶ￻な　￹殻￺から￻で　￹身￺み￻を￹守￺まも￻りながら\n￹進化￺しんか￻　するために　たくさんの\n￹落￺お￻ち￹葉￺ば￻や　￹腐葉土￺ふようど￻を　￹食￺た￻べる。"
          violet: "￹食￺た￻べた　￹落￺お￻ち￹葉￺ば￻を　￹消化￺しょうか￻するとき\n￹発電￺はつでん￻して　￹電気￺でんき￻を　￹溜￺た￻めこむ。\nあごの　￹先端￺せんたん￻から　￹放電￺ほうでん￻する。"
        en:
          scarlet: "Protected by a sturdy shell, Charjabug eats large\nquantities of fresh and decomposing leaf litter in\norder to evolve."
          violet: "As it digests fallen leaves, it generates and stores\nelectricity, which it can discharge from the tips of\nits jaws."
        fr:
          scarlet: "Bien protégé par sa robuste carapace, il prépare\nson évolution en se nourrissant d’une grande\nquantité d’humus et de feuilles mortes."
          violet: "Ce Pokémon génère et accumule de l’électricité\nen digérant des feuilles mortes. Il libère ensuite\ncette énergie par le bout de ses mandibules."
        it:
          scarlet: "Protetto da un robusto esoscheletro, si nutre\ndi una grande quantità di humus e foglie morte\nper evolversi."
          violet: "Immagazzina l’energia prodotta tramite\nla digestione delle foglie morte di cui si nutre\ne la rilascia dalle punte che ha sulla mandibola."
        de:
          scarlet: "Es frisst viel Laub und Humus, um sich entwickeln\nzu können, und schützt sich dabei mithilfe seines\nrobusten Panzers."
          violet: "Gefressenes Laub verwandelt Akkup während der\nVerdauung in Strom, den es speichert. Über die\nSpitzen an seinem Kiefer entlädt es ihn dann."
        es:
          scarlet: "Se protege el cuerpo con un robusto caparazón\nmientras ingiere una gran cantidad de hojarasca\ny humus para evolucionar."
          violet: "Al digerir la hojarasca de la que se alimenta,\ngenera energía eléctrica que almacena para\nluego liberarla por la punta de las mandíbulas."
        ko:
          scarlet: "튼튼한 껍질로 몸을 보호하며\n진화하기 위해 많은 양의\n낙엽과 부엽토를 먹는다."
          violet: "먹은 낙엽을 소화할 때\n전기를 만들어서 비축한다.\n턱 끝을 통해 방전한다."
        zh_simp:
          scarlet: "用结实的外壳保护自己。\n会为了进化而大量\n进食落叶和腐叶土。"
          violet: "虫电宝消化吃掉的落叶时\n能产生电能并将其储蓄。\n会从颚部的尖端放出电流。"
        zh_trad:
          scarlet: "靠堅硬的外殼保護自己，\n並且會為了進化而吃下\n大量的落葉和腐葉土。"
          violet: "蟲電寶消化吃掉的落葉時\n會產生電能，並將其存下。\n會從顎部尖端放出電流。"
