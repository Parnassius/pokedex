          scarlet: "￹体内￺たいない￻に　￹含￺ふく￻まれる　￹毒￺どく￻ガスを\nぎりぎりまで　￹薄￺うす￻めると\n￹最高級￺さいこうきゅう￻の　￹香水￺こうすい￻ができる。"
          violet: "ゴミから￹出￺で￻る　￹毒￺どく￻ガスを　￹吸￺す￻うたび\n￹体￺からだ￻が　ふくらみ　￹中￺なか￻の　においが\n￹臭￺くさ￻く　なっていく。"
        jp_kanji:
          scarlet: "￹体内￺たいない￻に　￹含￺ふく￻まれる　￹毒￺どく￻ガスを\nぎりぎりまで　￹薄￺うす￻めると\n￹最高級￺さいこうきゅう￻の　￹香水￺こうすい￻ができる。"
          violet: "ゴミから￹出￺で￻る　￹毒￺どく￻ガスを　￹吸￺す￻うたび\n￹体￺からだ￻が　ふくらみ　￹中￺なか￻の　においが\n￹臭￺くさ￻く　なっていく。"
        en:
          scarlet: "Top-grade perfume is made using its internal\npoison gases by diluting them to the highest\nlevel."
          violet: "When it inhales poisonous gases from garbage,\nits body expands, and its insides smell much\nworse."
        fr:
          scarlet: "En diluant au maximum les gaz toxiques\nque renferme son corps, on peut obtenir\ndes parfums de premier choix."
          violet: "Chaque fois qu’il aspire des gaz toxiques\némanant de déchets, son corps gonfle et\nses entrailles sentent encore plus mauvais."
        it:
          scarlet: "I suoi velenosi gas interni diluiti al massimo\nsono usati per produrre profumi pregiatissimi."
          violet: "Quando inspira gas velenosi dai rifiuti,\nil suo corpo si gonfia e diventa sempre più\nmaleodorante all’interno."
        de:
          scarlet: "Verdünnt man das in seinem Körper auftretende\ngiftige Gas aufs Äußerste, so kann ein edles\nParfüm daraus gewonnen werden."
          violet: "Atmet es giftige Gase von Abfällen ein,\nbläht es sich auf und sein Inneres riecht\nnoch schlimmer."
        es:
          scarlet: "Diluir sus venenosos gases internos lo máximo\nposible permite fabricar perfumes de alta gama."
          violet: "Conforme inhala los gases tóxicos que se\ndesprenden de la basura, se va hinchando\ny el mal olor de su interior empeora."
        ko:
          scarlet: "체내에 들어 있는 독가스의\n농도를 극한까지 낮추면\n최고급의 향수가 된다."
          violet: "쓰레기에서 나오는 독가스를 마실 때마다\n몸이 부풀어 오르며\n속의 냄새도 더욱 고약해진다."
        zh_simp:
          scarlet: "将它体内所含的毒瓦斯\n稀释到极限，就能做出\n最高级的香水。"
          violet: "每当它吸收从垃圾产生的\n毒瓦斯时，身体就会膨胀，\n体内的味道也会变得更臭。"
        zh_trad:
          scarlet: "若將牠體內所含的\n毒瓦斯稀釋到極限，\n就能做出最高級的香水。"
          violet: "每當牠吸收從垃圾散發出的\n毒瓦斯時，身體就會膨脹，\n體內也會變得越來越臭。"
