bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    jp_kanji: フシギダネ
    en: Bulbasaur
    fr: Bulbizarre
    it: Bulbasaur
    de: Bisasam
    es: Bulbasaur
    ko: 이상해씨
    zh_simp: 妙蛙种子
    zh_trad: 妙蛙種子
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          scarlet: "￹生￺う￻まれて　しばらくの　あいだ\n￹背中￺せなか￻の　タネに　￹詰￺つ￻まった\n￹栄養￺えいよう￻を　￹取￺と￻って　￹育￺そだ￻つ。"
          violet: "￹生￺う￻まれたときから　￹背中￺せなか￻に　タネを\n￹背負￺せお￻っている。　￹体￺からだ￻が　￹大￺おお￻きく\n￹育￺そだ￻つごとに　タネも　￹大￺おお￻きくなる。"
        jp_kanji:
          scarlet: "￹生￺う￻まれて　しばらくの　あいだ\n￹背中￺せなか￻の　タネに　￹詰￺つ￻まった\n￹栄養￺えいよう￻を　￹取￺と￻って　￹育￺そだ￻つ。"
          violet: "￹生￺う￻まれたときから　￹背中￺せなか￻に　タネを\n￹背負￺せお￻っている。　￹体￺からだ￻が　￹大￺おお￻きく\n￹育￺そだ￻つごとに　タネも　￹大￺おお￻きくなる。"
        en:
          scarlet: "For some time after its birth, it uses the nutrients\nthat are packed into the seed on its back in order\nto grow."
          violet: "It carries a seed on its back right from birth. As\nits body grows larger, the seed does too."
        fr:
          scarlet: "Au début de sa vie, il se nourrit des nutriments\naccumulés dans la graine sur son dos. Cela lui\npermet de grandir."
          violet: "Il porte une graine sur son dos depuis la\nnaissance. Elle croît à mesure qu’il grandit."
        it:
          scarlet: "Dopo la nascita, per un periodo di tempo cresce\nassorbendo i nutrienti stipati nel bulbo sul dorso."
          violet: "Dalla nascita ha un bulbo sul dorso.\nQuando cresce, anche il bulbo diventa\npiù grande."
        de:
          scarlet: "Nach der Geburt nutzt es für eine Weile die\nNährstoffe im Samen auf seinem Rücken,\num zu wachsen."
          violet: "Von Geburt an trägt es einen Samen auf seinem\nRücken. Wächst es, so wächst auch der Samen."
        es:
          scarlet: "Tras nacer, crece alimentándose durante un\ntiempo de los nutrientes que contiene el bulbo\nde su lomo."
          violet: "Lleva un bulbo en el lomo desde que nace.\nA medida que el Pokémon crece, el bulbo\ntambién va haciéndose más grande."
        ko:
          scarlet: "태어나서 얼마 동안\n등의 씨앗에 담긴\n영양을 섭취하며 자란다."
          violet: "태어날 때부터 등에 씨앗을\n짊어지고 있다. 몸이 크게\n성장함에 따라 씨앗도 커진다."
        zh_simp:
          scarlet: "在出生后的一段时间内，\n它会吸收背上种子里\n储存着的营养成长。"
          violet: "从出生的时候开始，背上\n就背着一颗种子。每当身体\n长大时，种子也会跟着变大。"
        zh_trad:
          scarlet: "在出生後的一段時間內，\n牠會吸收背上種子裡\n儲存著的營養成長。"
          violet: "從出生的時候開始背上就\n背著一顆種子。隨著身體\n長大，種子也會跟著變大。"
ivysaur:
