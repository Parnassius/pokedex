          violet: "お￹腹￺なか￻で　￹作￺つく￻られた　ガスが\nお￹尻￺しり￻で　￹燃￺も￻えている。　￹体調￺たいちょう￻が　￹悪￺わる￻いと\n￹炎￺ほのお￻が　￹弱￺よわ￻くなる。"
        jp_kanji:
          scarlet: "とても　￹身軽￺みがる￻な　ポケモン。\nまわりが　￹燃￺も￻えないように　お￹尻￺しり￻の\n￹炎￺ほのお￻を　￹消￺け￻してから　￹眠￺ねむ￻る。"
          violet: "お￹腹￺なか￻で　￹作￺つく￻られた　ガスが\nお￹尻￺しり￻で　￹燃￺も￻えている。　￹体調￺たいちょう￻が　￹悪￺わる￻いと\n￹炎￺ほのお￻が　￹弱￺よわ￻くなる。"
        en:
          scarlet: "It is very agile. Before going to sleep,\nit extinguishes the flame on its tail to\nprevent fires."
          violet: "The gas made in its belly burns from its rear end.\nThe fire burns weakly when it feels sick."
        fr:
          scarlet: "Ce Pokémon est très agile. Avant de s’endormir,\nil veille toujours à éteindre la flamme de sa\nqueue pour éviter de provoquer des incendies."
          violet: "La flamme de son postérieur brûle grâce à un gaz\nproduit dans son estomac. Elle faiblit quand il ne\nva pas bien."
        it:
          scarlet: "È molto agile. Prima di addormentarsi spegne\nle fiamme del posteriore per scongiurare\nil rischio di incendi."
          violet: "Le fiamme del posteriore sono alimentate\ndal gas che gli si forma nella pancia.\nQuando non è in salute, si affievoliscono."
        de:
          scarlet: "Dieses Pokémon ist sehr flink. Vor dem Schlafen\nlöscht es die Flamme an seinem Hinterteil, um zu\nverhindern, dass sie einen Brand verursacht."
          violet: "An seinem Hinterteil verbrennt es Gase, die im\nBauch produziert werden. Geht es Panflam\nschlecht, leuchtet seine Flamme weniger hell."
        es:
          scarlet: "Es muy ágil. Antes de dormir apaga la llama\ndel trasero para no provocar un incendio."
          violet: "Los gases de su estómago generan el fuego que\nle arde en el trasero, el cual disminuye cuando\nestá débil."
        ko:
          scarlet: "몸놀림이 매우 가벼운 포켓몬이다.\n주변이 불에 타지 않도록\n꼬리의 불꽃을 끈 다음에 잠든다."
          violet: "배에서 만들어진 가스가\n엉덩이에서 타오르고 있다.\n몸 상태가 나쁘면 불꽃이 약해진다."
        zh_simp:
          scarlet: "身轻如燕的宝可梦。\n为了不点燃附近的东西，\n会先灭掉屁股上的火焰再睡觉。"
          violet: "腹部产生的瓦斯在屁屁燃烧着。\n身体状况不好的话，火焰会变弱。"
        zh_trad:
          scarlet: "身輕如燕的寶可夢。\n睡覺前會先熄掉屁股上的火焰，\n以免讓四周起火燃燒。"
          violet: "肚子產生的瓦斯在屁股上燃燒。\n如果身體狀況不好的話，\n火焰就會變弱。"
