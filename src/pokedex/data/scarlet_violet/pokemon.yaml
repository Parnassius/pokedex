      descriptions:
        jp_kana:
          scarlet: "￹力￺ちから￻のない　￹情￺なさ￻けない　ポケモン。\nたまに　￹高￺たか￻く　￹飛￺と￻び￹跳￺は￻ねても\n２メートルを　￹超￺こ￻すのが　やっとだ。"
          violet: "￹大昔￺おおむかし￻は　まだ　もう￹少￺すこ￻し\n￹強￺つよ￻かったらしい。　しかし　￹今￺いま￻は\n￹悲￺かな￻しいくらいに　￹弱￺よわ￻いのだ。"
        jp_kanji:
          scarlet: "￹力￺ちから￻のない　￹情￺なさ￻けない　ポケモン。\nたまに　￹高￺たか￻く　￹飛￺と￻び￹跳￺は￻ねても\n２メートルを　￹超￺こ￻すのが　やっとだ。"
          violet: "￹大昔￺おおむかし￻は　まだ　もう￹少￺すこ￻し\n￹強￺つよ￻かったらしい。　しかし　￹今￺いま￻は\n￹悲￺かな￻しいくらいに　￹弱￺よわ￻いのだ。"
        en:
          scarlet: "An underpowered, pathetic Pokémon. It may\njump high on rare occasions but never more\nthan seven feet."
          violet: "In the distant past, it was somewhat stronger than\nthe horribly weak descendants that exist today."
        fr:
          scarlet: "Un Pokémon tout à fait pathétique. En de très\nrares occasions, il est capable de sauter haut,\nmais jamais à plus de deux mètres."
          violet: "Il paraît que ses lointains ancêtres étaient assez\npuissants, mais les spécimens d’aujourd’hui sont\nextrêmement faibles."
        it:
          scarlet: "Un Pokémon debole e patetico. Nelle rare\noccasioni in cui spicca alti salti, non riesce\ncomunque a raggiungere i due metri."
          violet: "Pare che anticamente fosse un tantino più forte.\nOggi è così debole da fare quasi pena."
        de:
          scarlet: "Ein schwaches und jämmerliches Pokémon.\nManchmal gelingen ihm hohe Sprünge, aber\nüber 2 m kommt es selten hinaus."
          violet: "Die urzeitlichen Vorfahren dieses Pokémon waren\netwas stärker als ihre heutigen, kümmerlichen\nNachkommen."
        es:
          scarlet: "Un Pokémon desvalido y patético. A veces es\ncapaz de saltar alto, pero rara vez más de 2 m."
          violet: "En un pasado lejano, era más fuerte de lo que\nhoy son sus débiles descendientes."
        ko:
          scarlet: "힘없는 한심한 포켓몬이다.\n가끔 높이 뛰어오르지만\n2m를 겨우 넘기는 게 고작이다."
          violet: "아주 먼 옛날에는 좀 더\n강했던 것 같다. 그러나 지금은\n안쓰러울 정도로 약하다."
        zh_simp:
          scarlet: "没力量的可怜宝可梦。\n即使偶尔跳得比较高，\n也只能勉强超过2米。"
          violet: "很久以前的鲤鱼王\n好像要比现在强上一些。\n但是现在却弱得可怜。"
        zh_trad:
          scarlet: "沒力量的可憐寶可夢。\n偶爾跳得比較高時，\n也只是勉強高過2公尺而已。"
          violet: "很久以前的鯉魚王\n好像比現在強上一些。\n但是現在卻弱得可憐。"
