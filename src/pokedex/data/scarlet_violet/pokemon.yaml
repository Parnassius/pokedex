      descriptions:
        jp_kana:
          scarlet: "￹捨￺す￻てられた　ぬいぐるみに　￹怨念￺おんねん￻が\n￹溜￺た￻まって　ポケモンになった。\n￹薄暗￺うすぐら￻い　￹路地裏￺ろじうら￻で　￹見￺み￻かける。"
          violet: "￹強￺つよ￻い　￹怨念￺おんねん￻が　ぬいぐるみを\nポケモンに　￹変￺か￻えた。　￹口￺くち￻を　￹開￺あ￻けると\n￹呪￺のろ￻いの　エネルギーが　￹逃￺に￻げていく。"
        jp_kanji:
          scarlet: "￹捨￺す￻てられた　ぬいぐるみに　￹怨念￺おんねん￻が\n￹溜￺た￻まって　ポケモンになった。\n￹薄暗￺うすぐら￻い　￹路地裏￺ろじうら￻で　￹見￺み￻かける。"
          violet: "￹強￺つよ￻い　￹怨念￺おんねん￻が　ぬいぐるみを\nポケモンに　￹変￺か￻えた。　￹口￺くち￻を　￹開￺あ￻けると\n￹呪￺のろ￻いの　エネルギーが　￹逃￺に￻げていく。"
        en:
          scarlet: "This Pokémon developed from an abandoned\ndoll that amassed a grudge. It is seen in dark\nalleys."
          violet: "Strong feelings of hatred turned a puppet into\na Pokémon. If it opens its mouth, its cursed\nenergy escapes."
        fr:
          scarlet: "Ce Pokémon est une poupée abandonnée que\nla rancune a animée. Il hante les ruelles sombres."
          violet: "Un très violent sentiment de haine a transformé\nune poupée en Branette. Si ce Pokémon ouvre\nla bouche, une énergie maudite s’en échappe."
        it:
          scarlet: "Un peluche gettato via, tramutato in Pokémon\nda un profondo rancore. Lo si vede spesso\nin vicoli bui."
          violet: "Un peluche trasformato in Pokémon da un odio\nestremamente intenso. Quando apre la bocca\nsprigiona una forte energia negativa."
        de:
          scarlet: "Es war einst eine weggeworfene Plüschpuppe,\ndie durch einen tiefen Groll zu einem Pokémon\nwurde. Man findet es in dunklen Gassen."
          violet: "Starke Gefühle des Hasses machten aus einer\nPlüschpuppe ein Pokémon. Öffnet es seinen\nMund, entweicht die verfluchte Energie."
        es:
          scarlet: "Está lleno de rencor porque lo tiraron a la\nbasura cuando era un muñeco. Vive en oscuros\ncallejones."
          violet: "Un fuerte odio convirtió en Pokémon a este\nmuñeco de felpa. Cuando abre la boca, libera\nuna energía que hechiza al enemigo."
        ko:
          scarlet: "버려진 인형에 원념이\n깃들어 포켓몬이 되었다.\n어둑한 뒷골목에서 발견된다."
          violet: "강한 원념이 인형을\n포켓몬으로 바꿨다. 입을 열면\n저주의 에너지가 빠져나간다."
        zh_simp:
          scarlet: "怨念积存在被丢弃的布偶里，\n从而变为了宝可梦。\n可以在昏暗的巷子里发现它。"
          violet: "强烈的怨念将玩偶变成了宝可梦。\n如果张开嘴，诅咒的能量\n就会从口中逃走。"
        zh_trad:
          scarlet: "怨念積存在被丟棄的\n布偶裡而變成了寶可夢。\n可以在昏暗的巷子裡發現牠。"
          violet: "強烈的怨念將玩偶變成了寶可夢。\n當張開嘴巴的時候，\n詛咒的能量會從口中流出。"
