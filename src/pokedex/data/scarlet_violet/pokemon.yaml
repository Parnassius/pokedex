      descriptions:
        jp_kana:
          scarlet: "￹王￺おう￻の　￹悪事￺あくじ￻を　￹木簡￺もっかん￻に　￹記￺しる￻し\n￹処罰￺しょばつ￻された　￹人￺ひと￻の　￹恨￺うら￻みが\n￹枯葉￺かれは￻を　まとい　ポケモンとなった。"
          violet: "￹草木￺くさき￻の　エネルギーを　￹吸￺す￻い￹上￺あ￻げる。\n￹周囲￺しゅうい￻の　￹森￺もり￻は　たちどころに　￹枯￺か￻れ￹果￺は￻て\n￹田畑￺たはた￻は　￹不作￺ふさく￻となる。"
        jp_kanji:
          scarlet: "￹王￺おう￻の　￹悪事￺あくじ￻を　￹木簡￺もっかん￻に　￹記￺しる￻し\n￹処罰￺しょばつ￻された　￹人￺ひと￻の　￹恨￺うら￻みが\n￹枯葉￺かれは￻を　まとい　ポケモンとなった。"
          violet: "￹草木￺くさき￻の　エネルギーを　￹吸￺す￻い￹上￺あ￻げる。\n￹周囲￺しゅうい￻の　￹森￺もり￻は　たちどころに　￹枯￺か￻れ￹果￺は￻て\n￹田畑￺たはた￻は　￹不作￺ふさく￻となる。"
        en:
          scarlet: "The grudge of a person punished for writing the\nking’s evil deeds upon wooden tablets has clad\nitself in dead leaves to become a Pokémon."
          violet: "It drains the life-force from vegetation, causing\nnearby forests to instantly wither and fields to\nturn barren."
        fr:
          scarlet: "La rancœur d’un être humain puni pour avoir noté\nles méfaits d’un roi sur des tablettes en bois s’est\nmêlée à des feuilles mortes et a pris vie."
          violet: "Il absorbe l’énergie de la végétation, ce qui a\npour effet de dessécher instantanément les forêts\nalentour et de rendre les champs infertiles."
        it:
          scarlet: "Prese vita quando delle foglie secche si unirono\nall’astio di una persona punita per aver scritto\nle malefatte di un re su delle tavolette di legno."
          violet: "Riesce ad assorbire l’energia vitale della\nvegetazione, facendo seccare all’istante\ni boschi e rendendo sterili i campi."
        de:
          scarlet: "Der Groll einer Person, die dafür bestraft wurde,\ndie Missetaten des Königs auf Tafeln festzuhalten,\nhüllte sich in Laub und wurde zu diesem Pokémon."
          violet: "Es entzieht der Vegetation Energie, sodass\numliegende Wälder auf der Stelle verdorren\nund Felder unfruchtbar werden."
        es:
          scarlet: "Este Pokémon nació al imbuirse en hojas\nmarchitas el rencor de una persona castigada por\nenumerar las fechorías de su rey en unas tablillas."
          violet: "Absorbe la energía de la vegetación, lo que hace\nque los bosques cercanos se marchiten a su paso\ny que la tierra de los campos se vuelva estéril."
        ko:
          scarlet: "왕의 악행을 목간에 기록했다는 이유로\n처벌을 받은 사람의 원한이\n마른 잎을 두르고 포켓몬이 되었다."
          violet: "초목의 에너지를 흡수한다.\n주위의 숲은 금세 말라비틀어지며\n논밭에는 흉작이 들게 된다."
        zh_simp:
          scarlet: "有人曾把王的恶行记于木简\n而因此遭到了处罚，其恨意\n裹上了枯叶，变成了宝可梦。"
          violet: "吸取草木的能量，\n使周围的森林瞬间干枯，\n田地的农作物歉收。"
        zh_trad:
          scarlet: "將王所行之惡事記於木簡\n而遭懲罰者的恨意裹上了\n枯落的葉子，變成了寶可夢。"
          violet: "會吸取草木的能量，\n使周圍的森林霎時乾枯，\n田地的農作物歉收。"
