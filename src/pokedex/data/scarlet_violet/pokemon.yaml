        jp_kanji:
          scarlet: "￹怪電波￺かいでんぱ￻を　￹発信￺はっしん￻しながら\n￹空￺そら￻を　￹飛￺と￻びまわり　￹未知￺みち￻の　￹電波￺でんぱ￻を\n￹受信￺じゅしん￻　しているという。"
          violet: "￹特殊￺とくしゅ￻な　￹磁場￺じば￻で　レアコイルの\n￹分子￺ぶんし￻　￹構造￺こうぞう￻が　￹組￺く￻み￹換￺か￻えられて\nジバコイルに　￹進化￺しんか￻した。"
        en:
          scarlet: "As it zooms through the sky, this Pokémon seems\nto be receiving signals of unknown origin while\ntransmitting signals of unknown purpose."
          violet: "Exposure to a special magnetic field\nchanged Magneton’s molecular\nstructure, turning it into Magnezone."
        fr:
          scarlet: "Il parcourt le ciel en émettant et en recevant\ndes ondes bien mystérieuses."
          violet: "Un champ magnétique spécial a perturbé\nla structure moléculaire de Magnéton et\nl’a fait évoluer en Magnézone."
        it:
          scarlet: "Vola per il cielo inviando misteriose\nonde elettromagnetiche e ricevendo\nonde sconosciute."
          violet: "È l’evoluzione di un Magneton, prodotta dalla\nriorganizzazione della sua struttura molecolare\nper mezzo di uno speciale campo magnetico."
        de:
          scarlet: "Es heißt, dass es beim Herumfliegen mysteriöse\nFunkwellen aussende und unbekannte Wellen\nempfange."
          violet: "Ein besonderes Magnetfeld ordnete Magnetons\nMoleküle neu und es entwickelte sich zu\nMagnezone."
        es:
          scarlet: "Se dice que mientras vuela emite unas\nondas eléctricas misteriosas, a la vez\nque recibe otras ondas desconocidas."
          violet: "Fruto de la evolución de Magneton\nal exponerse a un campo magnético\nespecial que alteró su estructura molecular."
        ko:
          scarlet: "괴전파를 발신하며 하늘을 날면서\n미지의 전파를 수신한다고 한다."
          violet: "특수한 자기장으로 레어코일의\n분자 구조가 재구성되어\n자포코일로 진화했다."
        zh_simp:
          scarlet: "据说会在空中来回飞行，\n一边发送怪异电波\n一边接收未知电波。"
          violet: "在特殊磁场的影响下，\n三合一磁怪的分子构造被重组，\n从而进化成了自爆磁怪。"
        zh_trad:
          scarlet: "據說會一邊發送怪異電波\n一邊在空中四處飛行，\n接收未知的電波。"
          violet: "在特殊磁場的影響下，\n三合一磁怪的分子構造受到重組，\n從而進化成了自爆磁怪。"
