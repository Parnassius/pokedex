        jp_kanji:
          scarlet: "￹顔￺かお￻の　￹氷￺こおり￻が　￹砕￺くだ￻けた　￹姿￺すがた￻。\n￹暑￺あつ￻さに　￹弱￺よわ￻い　￹顔￺かお￻を　￹守￺まも￻るため\n￹毛￺け￻の　￹先端￺せんたん￻から　￹冷気￺れいき￻を　￹出￺だ￻す。"
          violet: "￹見￺み￻た￹目￺め￻に　￹反￺はん￻し　￹泳￺およ￻ぎが　￹苦手￺にがて￻。\n￹毛先￺けさき￻に　￹作￺つく￻った　￹氷￺こおり￻の　￹球￺たま￻で\n￹獲物￺えもの￻を　おびき￹寄￺よ￻せ　￹釣￺つ￻りあげる。"
        en:
          scarlet: "The ice that was covering this Eiscue’s face has\nshattered. Eiscue emits cold air from the tip of its\nhair to protect its head, which is sensitive to heat."
          violet: "Contrary to its looks, Eiscue is a poor swimmer.\nIt creates ice balls at the tip of its single hair to\nlure prey in and fish them up."
        fr:
          scarlet: "La glace de sa tête a volé en éclats. L’extrémité\nde son cheveu dégage de l’air froid afin de\nprotéger sa tête, qui est sensible à la chaleur."
          violet: "Malgré son apparence, c’est un piètre nageur.\nIl attire et pêche ses proies à l’aide de boules\nde glace qu’il crée à l’extrémité de son cheveu."
        it:
          scarlet: "Forma assunta quando il ghiaccio sul volto va\nin frantumi. Emette aria fredda dalla punta del\npelo per proteggere il volto sensibile al calore."
          violet: "Nonostante l’aspetto, non è portato per il nuoto.\nAttira la preda con sfere di ghiaccio create sulla\npunta del pelo per poi pescarla."
        de:
          scarlet: "Der Eisblock um seinen Kopf ist zerbrochen.\nUm sein Gesicht vor Hitze zu schützen, lässt es\nkalte Luft aus seiner Haarspitze entweichen."
          violet: "Seinem Äußeren zum Trotz schwimmt es nicht gut.\nMit Eiskugeln, die es an der Spitze seines Haars\nerzeugt, lockt es Beute an und angelt sie sich."
        es:
          scarlet: "El hielo de la cabeza se ha hecho añicos, así que\ndesprende aire frío por la punta del pelo para\nprotegerse la cara, que no aguanta el calor."
          violet: "A pesar de su apariencia, no es buen nadador.\nCrea bolas de hielo en la punta del pelo de la\ncabeza para atraer y pescar a sus presas."
        ko:
          scarlet: "얼굴의 얼음이 부서진 모습.\n더위에 약한 얼굴을 보호하기 위해\n털끝에서 냉기를 발산한다."
          violet: "겉보기와는 달리 헤엄이 서툴다.\n털끝에 만든 얼음 구슬로\n먹이를 유인해서 낚아 올린다."
        zh_simp:
          scarlet: "脸上的冰块碎掉的样子。\n为了保护自己怕热的脸，\n会从毛的前端释放冷气。"
          violet: "与外表相反，不擅长游泳。\n在发梢做出冰球\n来吸引并钓起猎物。"
        zh_trad:
          scarlet: "臉上的冰塊碎掉的樣子。\n為了保護自己怕熱的臉，\n會從毛的前端釋放出冷氣。"
          violet: "有別外表，不擅游泳。\n會用在髮梢做出的冰球\n來吸引並且釣起獵物。"
