      descriptions:
        jp_kana:
          scarlet: "￹硬￺かた￻い　￹皮膚￺ひふ￻に　￹覆￺おお￻われているので\n￹車￺くるま￻と　ぶつかっても　へっちゃら。\nただし　￹雨￺あめ￻には　めっぽう　￹弱￺よわ￻い。"
          violet: "￹普段￺ふだん￻は　￹落￺お￻ち￹着￺つ￻いているが　￹一度￺いちど￻\n￹怒￺おこ￻らせると　￹体￺からだ￻を　￹丸￺まる￻めて\n￹回転￺かいてん￻しながら　￹突￺つ￻っ￹込￺こ￻んでくる。"
        jp_kanji:
          scarlet: "￹硬￺かた￻い　￹皮膚￺ひふ￻に　￹覆￺おお￻われているので\n￹車￺くるま￻と　ぶつかっても　へっちゃら。\nただし　￹雨￺あめ￻には　めっぽう　￹弱￺よわ￻い。"
          violet: "￹普段￺ふだん￻は　￹落￺お￻ち￹着￺つ￻いているが　￹一度￺いちど￻\n￹怒￺おこ￻らせると　￹体￺からだ￻を　￹丸￺まる￻めて\n￹回転￺かいてん￻しながら　￹突￺つ￻っ￹込￺こ￻んでくる。"
        en:
          scarlet: "Donphan is covered in tough hide, so even\nbeing hit by a car won’t faze this Pokémon.\nHowever, it is extremely susceptible to rain."
          violet: "Donphan is normally a calm Pokémon,\nbut once it is enraged, it will curl its body\ninto a ball and charge at you while rolling."
        fr:
          scarlet: "Sa peau est si dure qu’une collision avec une\nvoiture le laisserait indifférent. En revanche,\nil est extrêmement sensible à la pluie."
          violet: "Ce Pokémon est d’un naturel calme.\nCependant, lorsqu’on le provoque,\nil se met en boule et charge en roulant."
        it:
          scarlet: "La sua pelle è così dura che anche se\nsbatte contro una macchina non si fa\nun graffio. La pioggia è il suo punto debole."
          violet: "Di solito ha un’indole tranquilla, ma se\nqualcuno lo fa arrabbiare si appallottola\ne carica rotolando."
        de:
          scarlet: "Seine Haut ist so hart, dass ihm nicht einmal der\nZusammenprall mit einem Auto etwas anhaben\nkann. Regen setzt ihm jedoch stark zu."
          violet: "Für gewöhnlich ist es von ruhigem Gemüt.\nReizt man es jedoch, rollt es sich ein und\ndonnert auf einen zu."
        es:
          scarlet: "Su dura piel podría resistir el choque\ncontra un coche sin sufrir un rasguño.\nLa lluvia, sin embargo, es su punto débil."
          violet: "Por lo general se muestra tranquilo,\npero, si lo enfadan, se enrolla hasta\nhacerse una bola y embiste rodando."
        ko:
          scarlet: "튼튼한 피부로 둘러싸여 있기 때문에\n차에 부딪혀도 끄떡없다.\n그러나 비에는 매우 약하다."
          violet: "평소에는 얌전하지만\n한 번 화를 내기 시작하면\n몸을 둥글게 말고 회전하며 돌진해 온다."
        zh_simp:
          scarlet: "全身包覆着坚硬的皮肤，\n就算被车撞到也安然无恙。\n但是对雨却毫无招架之力。"
          violet: "虽然平时性情稳重，\n但一旦被激怒，就会把身体\n蜷成一团，滚动着猛冲过来。"
        zh_trad:
          scarlet: "全身包裹著堅硬的皮膚，\n被車撞到也是毫髮無傷。\n但是對雨水卻毫無招架之力。"
          violet: "雖然平時性情穩重，\n但一旦被激怒就會滾著\n蜷起的身體猛衝過來。"
