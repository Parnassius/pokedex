          violet: "￹負￺ふ￻の　￹感情￺かんじょう￻を　￹吸￺す￻い￹取￺と￻って\nエネルギーにしている　ポケモン。\nマイナス￹思考￺しこう￻の　￹人￺ひと￻に　￹人気￺にんき￻。"
        en:
          scarlet: "Morgrem prefers dirty tactics, like ambushing,\nbecause it doesn’t have confidence in its brawn."
          violet: "This Pokémon absorbs negative emotions and\nturns them into energy. It’s popular with people\nwho tend to think gloomy thoughts."
        fr:
          scarlet: "Il berne ses adversaires et privilégie les techniques\nde combat les plus sournoises, car il a peu\nconfiance en sa force physique."
          violet: "Ce Pokémon absorbe les sentiments négatifs\net y puise son énergie. Il est donc très populaire\nauprès des pessimistes."
        it:
          scarlet: "Nella lotta preferisce ricorrere ai colpi a\ntradimento e ad altri vili stratagemmi poiché non\nha grande fiducia nella propria forza fisica."
          violet: "Assorbe sentimenti negativi, trasformandoli\nin energia. È particolarmente apprezzato\nda chi ha un’indole pessimista."
        de:
          scarlet: "Da dieses Pokémon kein Vertrauen in seine\nMuskelkraft hat, kämpft es bevorzugt mit fiesen\nTaktiken wie Überraschungsangriffen."
          violet: "Es absorbiert negative Gefühle und wandelt sie\nin Energie um. Bei Pessimisten ist es sehr beliebt."
        es:
          scarlet: "Recurre a ataques por sorpresa u otras\nestrategias ruines porque carece de confianza\nen su fuerza física."
          violet: "Este Pokémon absorbe los sentimientos negativos\ny los transforma en energía. Es popular entre los\npesimistas."
        ko:
          scarlet: "속여서 때리는 등\n비겁한 전법을 선호하는 것은\n자신의 근력에 자신이 없어서다."
          violet: "부정한 감정을 흡수해서\n에너지로 삼는 포켓몬.\n매사에 부정적인 사람들에게 인기가 좋다."
        zh_simp:
          scarlet: "它喜欢采取偷袭之类的\n卑鄙战术，那是因为它对\n自己的肌肉力量没信心。"
          violet: "吸收负面情绪来转换成\n自身能量的宝可梦。\n思考方式消极的人群很喜欢它。"
        zh_trad:
          scarlet: "牠之所以喜歡採取偷襲\n之類的卑鄙戰術，是因為\n牠對自己的肌力沒信心。"
          violet: "吸收負面情緒來轉化成\n自身能量的寶可夢。\n深受有負面思考習慣的人歡迎。"
