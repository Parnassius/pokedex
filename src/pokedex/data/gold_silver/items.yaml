    jp_kana: "むごい　しうちの　うさばらしに\nてきを　ぜんりょくで　こうげき"
    en: "An attack based on\nlack of loyalty."
    fr: "Attaque sur le\nmanque de loyauté."
    it: "Attacco basato\nsulla slealtà."
    de: "Angriffsgrund:\nKeine Loyalität."
    es: "Basado en la falta\nde lealtad."
    ko: "잔혹한 처사에 기분전환으로\n적을 전력으로 공격한다"
tm022:
  names:
    jp_kana: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
    ko: 기술머신22
  descriptions:
    jp_kana: "１ターンめで　ひかりを　きゅうしゅう\nつぎのターンで　てきを　こうげき"
    en: "1st turn: Prepare\n2nd turn: Attack"
    fr: "Tour 1: Prépare\nTour 2: Attaque"
    it: "1’v turno: Carica\n2’v turno: Attacco"
    de: "1. Vorbereitung\n2. Angriff"
    es: "1er turno: Prepara\n2’v turno: Ataca"
    ko: "1턴째에서 빛을 흡수해서\n다음턴에서 적을 공격한다"
tm023:
  names:
    jp_kana: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
    ko: 기술머신23
  descriptions:
    jp_kana: "かたい　シッポで　てきを　こうげき\nてきの　ぼうぎょを　さげることがある"
    en: "An attack that may\nreduce DEFENSE."
    fr: "Attaque pouvant\nbaisser DEFENSE."
    it: "Un attacco che può\nridurre DIFESA."
    de: "Senkt evtl. VERT-\nWert des Gegners."
    es: "Ataque que puede\nbajar la DEFENSA."
    ko: "단단한 꼬리로 적을 공격\n적의 방어력을 떨어뜨리기도 한다"
tm024:
  names:
    jp_kana: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
    ko: 기술머신24
  descriptions:
    jp_kana: "くちから　ものすごい　いきをはいて\nてきを　こうげき"
    en: "A strong breath\nattack."
    fr: "Un souffle\npuissant."
    it: "Un soffio\npotente."
    de: Starke Attacke.
    es: "Ataque soplo\nmuy potente."
    ko: "입에서 굉장한 숨결을 뿜어서\n적을 공격한다"
tm025:
  names:
    jp_kana: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
    ko: 기술머신25
  descriptions:
    jp_kana: "てきに　むかって　かみなりを　おとす\nまひさせることがある"
    en: "An attack that may\ncause paralysis."
    fr: "Attaque pouvant\nparalyser."
    it: "Un attacco che può\ncausare paralisi."
    de: "Gegner ist evtl.\nparalysiert."
    es: "Ataque que puede\nparalizar."
    ko: "적을 향해 번개를 떨어뜨린다\n마비를 시키기도 한다"
tm026:
  names:
    jp_kana: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
    ko: 기술머신26
  descriptions:
    jp_kana: "じめんを　ゆらして　こうげき\nとんでる　てきいがいに　だいダメージ"
    en: "Tough but useless\nvs. flying foes."
    fr: "Puissant mais inu-\ntile sur volants."
    it: "Buono, ma non con-\ntro tipo volante."
    de: "Stark! Nutzlos\nbei Flug-POKéMON."
    es: "Fuerte pero inùtil\ncontra voladores."
    ko: "지면을 흔들어서 공격\n비행타입 이외에는 엄청난 데미지"
tm027:
  names:
    jp_kana: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
    ko: 기술머신27
  descriptions:
    jp_kana: "よくしてくれる　トレーナーの　ために\nぜんりょくで　てきを　こうげき"
    en: "An attack that is\nbased on loyalty."
    fr: "Attaque basée sur\nla loyauté."
    it: "Un attacco basato\nsulla lealtà."
    de: "Angriff basiert\nauf Loyalität."
    es: "Ataque basado\nen la lealtad."
    ko: "잘 대해주는 트레이너를 위해서\n전력으로 적을 공격한다"
tm028:
  names:
    jp_kana: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
    ko: 기술머신28
  descriptions:
    jp_kana: "１ターンめで　じめんに　もぐり\nつぎのターンで　てきを　こうげき"
    en: "1st turn: Burrow\n2nd turn: Attack"
    fr: "Tour 1: Enterre\nTour 2: Attaque"
    it: "1’v turno: Scompare\n2’v turno: Attacca"
    de: "1. Graben\n2. Angriff"
    es: "1er turno: Cavar\n2’v turno: Atacar"
    ko: "1턴째에서 땅속에 파고들어\n다음 턴에서 적을 공격한다"
tm029:
  names:
    jp_kana: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
    ko: 기술머신29
  descriptions:
    jp_kana: "つよいねんりきで　てきを　こうげき\nとくしゅぼうぎょを　さげることがある"
    en: "An attack that may\nlower SPCL.DEF."
    fr: "Attaque pouvant\nbaisser DEF.SPE."
    it: "Può ridurre la\nDIFESA SPECIALE."
    de: "Senkt evtl. SPEZ-\nVER. des Gegners."
    es: "Ataque que puede\nbajar la DEF. ESP."
    ko: "강한 염동력으로\n특수방어를 떨어뜨리게 하기도 한다"
tm030:
  names:
    jp_kana: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
    ko: 기술머신30
  descriptions:
    jp_kana: "くろいかたまりを　なげて　こうげき\nとくしゅぼうぎょを　さげることがある"
    en: "An attack that may\nlower SPCL.DEF."
    fr: "Attaque pouvant\nbaisser DEF.SPE."
    it: "Può ridurre\nDIFESA SPECIALE."
    de: "Senkt evtl.\nSPEZ-VER."
    es: "Ataque que puede\nbajar la DEF. ESP."
    ko: "검은 덩어리를 던져서 공격\n특수방어를 뚫는 경우가 있다"
tm031:
  names:
    jp_kana: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
    ko: 기술머신31
  descriptions:
    jp_kana: "てきの　かおなどに　ドロをかけて\nめいちゅうりつを　さげさせる"
    en: "Reduces the foe’s\naccuracy."
    fr: "Baisse la préci-\nsion de la cible."
    it: "Riduce precisione\navversario."
    de: "Senkt die Genauig-\nkeit des Gegners."
    es: "Reduce precisión\ndel enemigo."
    ko: "적의 얼굴 등에 진흙을 발라\n명중률이 떨어지게 만든다"
tm032:
  names:
    jp_kana: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
    ko: 기술머신32
  descriptions:
    jp_kana: "ぶんしんで　てきを　まどわせ\nかいひりつを　あげる"
    en: "Heightens evasive-\nness."
    fr: Monte l’esquive.
    it: "Aumenta capacità\ndi elusione."
    de: "Fluchtwert nimmt\nzu."
    es: "Mejora habilidad\nde evasión."
    ko: "분신으로 적을 혼란에 빠트려서\n회피율을 높인다"
tm033:
  names:
    jp_kana: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
    ko: 기술머신33
  descriptions:
    jp_kana: "れいきをこめた　パンチで　こうげき\nてきを　こおらせることがある"
    en: "An icy punch. May\ncause freezing."
    fr: "Poing de glace\npouvant geler."
    it: "Pugno di ghiaccio:\npuò congelare."
    de: "Eisiger Schlag.\nEvtl. Erfrierung."
    es: "Puñetazo helado.\nPuede congelar."
    ko: "냉기를 실은 펀치로 공격\n적을 얼리기도 한다"
tm034:
  names:
    jp_kana: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
    ko: 기술머신34
  descriptions:
    jp_kana: "てきを　おこらせて　こんらんさせるが\nこうげきも　グーンと　あげてしまう"
    en: "Causes confusion\nand raises ATTACK."
    fr: "Rend confus et\nmonte l’ATTAQUE."
    it: "Causa confusione\ne aumenta ATTACCO."
    de: "Verwirrt und hebt\nANGR-Wert."
    es: "Provoca confusión\ny sube el ATAQUE."
    ko: "적을 화나게 만들어서 혼란에\n빠뜨리지만 적의 공격력도 올려준다"
tm035:
  names:
    jp_kana: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
    ko: 기술머신35
  descriptions:
    jp_kana: "ねているときだけ　つかえる　わざ\nランダムで　じぶんのわざを　くりだす"
    en: "Randomly attacks\nwhile asleep."
    fr: "Attaque au hasard\npdt le sommeil."
    it: "Attacco casuale,\nda addormentati."
    de: "Zufällige Angriffe\nim Schlaf."
    es: "Ataca al azar\nmientras duermes."
    ko: "자고있을 때만 쓸 수 있는 기술\n랜덤으로 자신의 기술을 발휘한다"
tm036:
  names:
    jp_kana: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
    ko: 기술머신36
  descriptions:
    jp_kana: "ヘドロを　なげつけて　こうげき\nてきに　どくをあたえることがある"
    en: "An attack that may\npoison the foe."
    fr: "Attaque pouvant\nempoisonner."
    it: "Può causare\navvelenamento."
    de: "Gegner wird evtl.\nvergiftet."
    es: "Puede envenenar\nal enemigo."
    ko: "오물을 던져서 공격\n적을 독에 중독시키기도 한다"
tm037:
  names:
    jp_kana: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
    ko: 기술머신37
  descriptions:
    jp_kana: "すなあらしを　はっせいさせて\nまいターン　ダメージを　あたえる"
    en: "Inflicts damage\nevery turn."
    fr: "Inflige des dégâts\nchaque tour."
    it: "Arreca danno ad\nogni turno."
    de: "Fügt in jeder\nRunde Schaden zu."
    es: "Produce daño en\ntodos los turnos."
    ko: "모래바람을 발생시켜서\n매 턴마다 데미지를 입힌다"
tm038:
  names:
    jp_kana: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
    ko: 기술머신38
  descriptions:
    jp_kana: "だいの　もじが　すべてを　やきつくす\nてきを　やけどさせることがある"
    en: "An attack that\nmay cause a burn."
    fr: "Attaque pouvant\nbrûler."
    it: "Può far scottare\nil nemico."
    de: "Gegner erleidet\nevtl. Verbrennung."
    es: "Ataque que puede\ncausar quemaduras."
    ko: "큰 대자가 모든 것을 태워버린다\n적에게 화상을 입히기도 한다"
tm039:
  names:
    jp_kana: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
    ko: 기술머신39
  descriptions:
    jp_kana: "ぜったいに　よけられない　ほしがたの\nこうせんを　むすうに　はっしゃする"
    en: "An attack that\nnever misses."
    fr: "Attaque qui ne\nrate jamais."
    it: "Un attacco che non\nva mai a vuoto."
    de: "Attacke mit\nTreffergarantie."
    es: "Ataque que no\nfalla nunca."
    ko: "절대 피할 수 없는 별 모양의\n광선을 무수히 발사한다"
tm040:
  names:
    jp_kana: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
    ko: 기술머신40
  descriptions:
    jp_kana: "からだを　まるめて　きゅうしょを\nかくし　ぼうぎょを　あげる"
    en: "Heightens the\nuser’s DEFENSE."
    fr: "Monte la DEFENSE\ndu lanceur."
    it: "Migliora DIFESA\ndi chi lo usa."
    de: "Hebt VERT-Wert des\nAngreifers."
    es: "Mejora la DEFENSA\nde quien lo usa."
    ko: "몸을 웅크려서 급소를\n감추고 방어력을 높인다"
tm041:
  names:
    jp_kana: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
    ko: 기술머신41
  descriptions:
    jp_kana: "でんげきをこめた　パンチで　こうげき\nてきを　まひさせることがある"
    en: "An electric punch.\nIt may paralyze."
    fr: "Poing électrique.\nPeut paralyser."
    it: "Pugno elettrico:\npuò paralizzare."
    de: "Elektro-Schlag.\nEvtl. Paralyse."
    es: "Puñetazo eléctric.\nPuede paralizar."
    ko: "전기를 실은 펀치로 공격\n적을 감전시키기도 한다"
tm042:
  names:
    jp_kana: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
    ko: 기술머신42
  descriptions:
    jp_kana: "ねているてきに　あたえた　ダメージの\nはんぶん　たいりょくを　かいふくする"
    en: "Steals HP from a\nsleeping victim."
    fr: "Vole les PV d’une\nvictime endormie."
    it: "Ruba PS al\nnemico che dorme."
    de: "Zieht schlafendem\nGegner KP ab."
    es: "Roba PS a una\nvíctima dormida."
    ko: "자고있는 적에게 준 데미지의\n반을 체력으로 회복한다"
tm043:
  names:
    jp_kana: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
    ko: 기술머신43
  descriptions:
    jp_kana: "てきの　こうげきを　かならずよける\nれんぞくで　だすと　しっぱいしやすい"
    en: "Evades attack that\nturn. It may fail."
    fr: "Peut éviter l’at-\ntaque de ce tour."
    it: "Schiva un attacco.\nNon infallibile."
    de: "1 Runde Schutz.\nWdh. fraglich."
    es: "Puede esquivar el\nataque ese turno."
    ko: "적의 공격을 반드시 피한다\n연속으로 사용하면 실패하기 쉽다"
tm044:
  names:
    jp_kana: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
    ko: 기술머신44
  descriptions:
    jp_kana: "２ターン　ねむって　たいりょくと\nからだのいじょうを　かいふくする"
    en: "Sleep for 2 turns\nto fully recover."
    fr: "Fait dormir deux\ntours pour soin."
    it: "Tutti i PS dopo\n2 turni di sonno."
    de: "2 Runden pausieren\nfür Erholung."
    es: "Duerme 2 turnos\npara cura total."
    ko: "2턴 잠을 자서 체력과\n몸의 이상상태를 회복시킨다"
tm045:
  names:
    jp_kana: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
    ko: 기술머신45
  descriptions:
    jp_kana: "オスなら　メスに　メスなら　オスに\nわざが　だしにくくなる"
    en: "Makes the opposite\ngender infatuated."
    fr: "Rend le genre op-\nposé amoureux."
    it: "Fa infatuare il\ngenere opposto."
    de: "Schutz, da Gegner\nsich verliebt."
    es: "Enamora al género\nopuesto."
    ko: "숫놈이라면 암놈에게 암놈이라면\n숫놈에게 발휘하기 힘들게 된다"
tm046:
  names:
    jp_kana: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
    ko: 기술머신46
  descriptions:
    jp_kana: "こうげきの　さいちゅうに　すきをみて\nてきが　もっている　どうぐを　ぬすむ"
    en: "An attack that may\nsteal a held item."
    fr: "Attaque pouvant\nvoler objet tenu."
    it: "Si usa per rubare\nuno strumento."
    de: "Stiehlt evtl. ein\ngetragenes Item."
    es: "Ataque que puede\nrobar un objeto."
    ko: "공격 절정일 때 틈을 노려서\n적이 들고있는 도구를 훔친다"
tm047:
  names:
    jp_kana: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
    ko: 기술머신47
  descriptions:
    jp_kana: "かたいつばさを　おおきく　ひろげて\nそのまま　てきに　たいあたりする"
    en: "Stiff wings strike\nthe foe."
    fr: "Des ailes frappent\nla cible."
    it: "Rigide ali colpi-\nscono il nemico."
    de: "Harte Flügel tref-\nfen den Gegner."
    es: "Alas rígidas que\ngolpean al rival."
    ko: "단단한 날개를 크게 펼쳐서\n그대로 적에게 몸통박치기를 한다"
tm048:
  names:
    jp_kana: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
    ko: 기술머신48
  descriptions:
    jp_kana: "ほのおをこめた　パンチで　こうげき\nてきを　やけどさせることがある"
    en: "A fiery punch. May\ncause a burn."
    fr: "Poing de feu pou-\nvant brûler."
    it: "Un pugno ardente,\nche può scottare."
    de: "Feuriger Schlag.\nEvtl. Verbrennung."
    es: "Puñetazo ardiente.\nPuede quemar."
    ko: "화염이 이글거리는 펀치로 공격\n적에게 화상을 입히기도 한다"
tm049:
  names:
    jp_kana: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
    ko: 기술머신49
  descriptions:
    jp_kana: "れんぞくで　あてると\nいりょくが　ぞうだいしていく"
    en: "Successive hits\nraise power."
    fr: "Coups réussis mon-\ntent la puissance."
    it: "Aumenta potenza\ncolpi successivi."
    de: "Eine Trefferfolge\nerhöht die Kraft."
    es: "Sucesivos golpes\ndan màs poder."
    ko: "연속으로 맞추면\n위력이 증가해져 간다"
tm050:
  names:
    jp_kana: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
    ko: 기술머신50
  descriptions:
    jp_kana: "てきが　ねてるあいだ　たいりょくを\nまいターン　４ぶんの１　へらしていく"
    en: "A sleeper loses\n1/4 HP every turn."
    fr: "Dormeur perd 1/4\ndes PV par tour."
