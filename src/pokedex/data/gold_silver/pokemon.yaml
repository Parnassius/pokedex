        en:
          gold: "Although it looks\nfrightening, it is\nactually kind and\faffectionate. It\nis very popular\namong women."
          silver: "It has an active,\nplayful nature.\nMany women like\fto frolic with it\nbecause of its af-\nfectionate ways."
        fr:
