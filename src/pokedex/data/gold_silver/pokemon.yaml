          silver: "Capable of flying\nsafely in dark\nplaces, it emits\fultrasonic cries\nto check for any\nobstacles."
        fr:
          gold: "Il émet des ultra-\nsons avec sa\nbouche pour se\frepérer dans les\nenvirons pendant\nqu’il vole."
