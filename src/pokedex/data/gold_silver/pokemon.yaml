        it:
          gold: "Le zampe\nnascondono artigli\naffilati. Se è\fattaccato, sferra\ngli artigli spa-\nventando i nemici."
          silver: "Di spirito malevo-\nlo, spinge i\nPIDGEY ad abbando-\fnare il nido per\navventarsi sulle\nuova incustodite."
        de:
          gold: "In seinen Pfoten\nstecken scharfe\nKrallen. Es fährt\fsie blitzschnell\naus, um die Gegner\nzu überraschen."
          silver: "Es besitzt ein\ngrausames Wesen.\nEs verjagt TAUBSIS\fvon deren Nest und\nlabt sich an den\nEiern."
        es:
          gold: "Sus ocultas garras\nson muy afiladas.\nSi le atacan,\fextiende sus\ngarras y asusta\nal enemigo."
          silver: "Es malvado\npor naturaleza.\nSaca a los PIDGEY\fde sus nidos\npara devorar\nsus huevos."
        ko:
          gold: "날카로운 손톱을 손가락 안에\n감추고 있다가 갑자기 꺼내서\n공격해온 상대의 기를 꺾는다"
          silver: "거친 성격\n어미 구구를 쫓아내고\n둥지에 남은 알을 먹는다"
teddiursa:
  species_id: 216
