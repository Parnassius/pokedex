      descriptions:
        jp_kana:
          gold: "だいじなクキが　はえている　ばしょを\nあらそうとする　やつは　もっている\nクキを　つかいこなして　やっつける。"
          silver: "ひじょうしょくの　クキを　たべると\nいちもくさんに　かけだして\nほかの　クキを　さがしにいく。"
        en:
          gold: "If anyone tries to\ndisturb where the\nessential plant\fsticks grow, it\nuses its own stick\nto thwart them."
          silver: "If it eats the\nplant stick it\ncarries as emer-\fgency rations, it\nruns off in search\nof a new stick."
        fr:
          gold: "Il défend les\nplants de poireaux\navec son bâton\fpour repousser\ntous les méchants\npas beaux."
          silver: "S’il mange le\nbâton qui lui sert\nde ration d’ur-\fgence, il court en\nchercher un autre\nau plus vite."
        it:
          gold: "Se qualcuno di-\nsturba la crescita\ndei gambi per lui\fcosì preziosi, lo\nblocca usando il\nsuo come un’arma."
          silver: "Se mangia il gambo\nche porta con sé\nper le emergenze,\fcorre alla ricerca\ndi un altro\ngambo."
        de:
          gold: "Betritt jemand das\nFeld, auf dem\nseine Lauchstangen\fwachsen, vertreibt\nes ihn persönlich\nmit seiner Stange."
          silver: "Wenn es seine\nStange im Notfall\nauffrisst, begibt\fes sich sofort auf\ndie Suche nach\neiner neuen."
        es:
          gold: "Si a alguien se le\nocurre estropear\nlos cultivos de\fpuerros, usarà\nsu propio puerro\npara evitarlo."
          silver: "Si se come el\npuerro que lleva\npara una\femergencia, saldrà\ncorriendo en busca\nde otro puerro."
        ko:
          gold: "중요한 줄기가 나는 장소를\n빼앗으려 하는 녀석은 가지고 있는\n줄기를 사용하여 해치운다"
          silver: "비상식량의 줄기를 먹으면\n곧바로 다른 줄기를 찾아\n달려가기 시작한다"
doduo:
