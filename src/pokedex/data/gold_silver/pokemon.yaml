          silver: "Its wings are not\nused for flying.\nThey are flapped\fat high speed to\nadjust its body\ntemperature."
        fr:
          gold: "Il effraie l’enne-\nmi en agitant ses\npinces en forme\fd’oeil et donne\nainsi l’impression\nd’avoir 3 têtes."
          silver: "Ses ailes ne sont\npas utilisées pour\nvoler. Il bat des\failes à grande vi-\ntesse pour ajuster\nsa température."
        it:
          gold: "Agita le chele\nsu cui sono\ndisegnati occhi\fper spaventare i\nnemici. Così pare\navere tre teste."
          silver: "Non usa le ali per\nvolare, ma per\nregolare la tempe-\fratura corporea\nbattendole molto\nvelocemente."
        de:
          gold: "Es hält seine mit\nAugen besetzten\nScheren nach oben,\fum seine Feinde\ndadurch abzu-\nschrecken."
          silver: "Es benutzt seine\nFlügel nicht zum\nfliegen, sondern\fregelt durch em-\nsiges schlagen die\nKörpertemperatur."
        es:
          gold: "Mueve sus pinzas\npara asustar al\nenemigo. Por los\fdibujos de su\ncuerpo parece\ntener 3 cabezas."
          silver: "No usa sus alas\npara volar. Las\nagita a gran\fvelocidad para\nregular su\ntemperatura."
        ko:
          gold: "눈알모양의 문양이 있는 집게를\n흔들어서 상대를 위협하면\n머리가 3개 있는 듯이 보인다"
          silver: "날개를 사용해도 날 수 없지만\n고속으로 날갯짓을 하는 것으로\n체온을 조절할 수 있다"
shuckle:
