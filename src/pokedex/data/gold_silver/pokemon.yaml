          silver: "몸자체는 굉장히 얇고\n항상 벽에 들러붙어 있다\n몸의 형태에는 뭔가 의미가 있는듯"
    unown_y:
      form_id: 24
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      types:
        - psychic
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "すがたかたちが　むかしの　せきばんに\nしるされた　もじに　にており\nかんけいあるのではと　ウワサされる。"
          silver: "からだじたいは　うすっぺらく\nいつも　かべに　はりついている。\nかたちに　なにか　いみがあるらしい。"
        en:
          gold: "Their shapes look\nlike hieroglyphs\non ancient tab-\flets. It is said\nthat the two are\nsomehow related."
          silver: "Its flat, thin\nbody is always\nstuck on walls.\fIts shape appears\nto have some mean-\ning."
        fr:
          gold: "Ils ressemblent\naux vieux hiéro-\nglyphes inscrits\fsur les tablettes.\nIl semble qu’ils y\nsoient liés."
          silver: "Son corps plat et\nfin est toujours\ncollé aux murs.\fOn pense que sa\nforme a une\nsignification."
        it:
          gold: "La loro forma è\nsimile a gerogli-\nfici su antiche\ftavole. Si pensa\nche non sia una\ncoincidenza."
          silver: "Il corpo piatto e\nsottile sta sempre\nattaccato ai muri.\fPare che la forma\nabbia un preciso\nsignificato."
        de:
          gold: "Ihr Äußeres erin-\nnert an Hierogly-\nphen auf antiken\fSteinplatten. Man\nsagt, es gäbe ei-\nnen Zusammenhang."
          silver: "Sein flacher, dün-\nner Körper hängt\nimmer an Wänden.\fSeine Form scheint\neine Bedeutung zu\nhaben."
        es:
          gold: "Tienen forma de\njeroglíficos\nsobre làpidas\fantiguas. Dicen\nque ambos estàn\nrelacionados."
          silver: "Su cuerpo fino y\nplano aparece\nsiempre en los\fmuros. Su forma\nparece tener algùn\nsignificado."
        ko:
          gold: "모습과 형태가 옛날 석판에\n새겨진 문자랑 닮아서 관계가\n있을 것이라는 소문이 돌고 있다"
