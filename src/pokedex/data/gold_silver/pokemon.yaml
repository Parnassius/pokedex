      form_id: 0
      base_stats:
        hp: 75
        attack: 55
        defense: 70
        special_attack: 55
        special_defense: 85
        speed: 110
      types:
        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      descriptions:
        jp_kana:
          gold: "いちど　かぜに　のってしまうと\nわたほうしを　たくみに　あやつって\nせかいいっしゅう　だってしてしまう。"
          silver: "きせつふうに　ながされつつ\nしそんを　ふやすため　わたほうしを\nせかいの　あちこちに　ばらまく。"
        en:
          gold: "Once it catches\nthe wind, it deft-\nly controls its\fcotton-puff spores\nto float, even\naround the world."
          silver: "Drifts on seasonal\nwinds and spreads\nits cotton-like\fspores all over\nthe world to make\nmore offspring."
        fr:
          gold: "Quand il est pris\ndans le vent il\nutilise ses\fappendices de\ncoton pour voler\nautour du monde."
          silver: "Il se laisse por-\nter par le vent et\nrépand ses spores\fduveteuses dans le\nmonde pour se\nmultiplier."
        it:
          gold: "Sospinto dal vento\ncontrolla con abi-\nlità i semi a ba-\ftuffolo di cotone\nper volare persino\nintorno al mondo."
          silver: "Si fa trasportare\ndai venti stagio-\nnali, spargendo\fovunque i semi si-\nmili al cotone,\nper moltiplicarsi."
        de:
          gold: "Wenn es einmal vom\nWind erfasst wur-\nde, wird es mit\fseinen Fallschirm-\nchen um den ganzen\nErdball getragen."
          silver: "Es lässt sich von\nWinden tragen und\nverstreut auf die-\fse Weise seinen\nSamen über die\nganze Welt."
        es:
          gold: "Si es llevado por\nel viento, podría\ndar la vuelta al\fmundo controlando\nel vuelo con sus\nesporas."
          silver: "Se desplaza con\nlos vientos\nestacionales y\fsuelta sus esporas\npor todo el mundo\npara reproducirse."
        ko:
          gold: "한번 바람을 타고나면\n솜 포자를 잘 조정해서\n세계를 떠돌아다닌다"
          silver: "계절풍을 따라 날려 다니며\n자손을 늘리기 위해 포자를\n세계 여기저기에 흩어 뿌린다"
aipom:
  species_id: 190
  names:
    jp_kana: エイパム
