          silver: "It has a very fine\nfur. Take care not\nto make it angry,\for it may inflate\nsteadily and hit\nwith a BODY SLAM."
        fr:
          gold: "Leur fourrure est\nsi douce que s’ils\nse font des câlins\fils ne voudront\nplus se séparer."
          silver: "Il a une très bel-\nle fourrure. Ne\njamais le mettre\fen colère ou il\ngonflera et fera\nun PLAQUAGE."
        it:
          gold: "Hanno un pelo\ncosì morbido che\nse due di loro\fsi abbracciano\nnon vogliono più\nsepararsi."
          silver: "Ha un pelo molto\nfine. Attenzione a\nnon farlo adirare,\fperché può gon-\nfiarsi e colpire\ncon un BODY SLAM."
        de:
          gold: "Sein Fell ist so\nflauschig, dass,\nwenn zwei zusam-\fmenstehen, sie\nnicht getrennt\nwerden möchten."
          silver: "Es hat ein weiches\nFell. Ver-\närgere es nicht,\fdenn andernfalls\nsetzt es ständig\nBODYSLAM ein."
        es:
          gold: "Su piel es tan\nsuave que si dos\nde ellos se\facurrucan juntos,\nno querràn\nsepararse nunca."
          silver: "Tiene una piel muy\nfina. Ten cuidado\nde no enfadarle, o\fse inflarà y\ngolpearà con\nun GOLPE CUERPO."
        ko:
          gold: "2마리가 붙어있으면 서로의\n털가죽에 기분이 너무 좋아서\n서로 떨어지지 않게 되어버린다"
          silver: "고운결의 세밀한 털을 지니고 있다\n화나게 하면 점점 부풀어서는\n덤벼들기 때문에 주의가 필요하다"
zubat:
