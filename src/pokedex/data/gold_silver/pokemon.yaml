        hp: 40
        attack: 60
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 30
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "えものが　ちかくを　とおりかかるまで\nじぶんの　すで　なんにちも　おなじ\nかっこうで　じっと　まちつづける。"
          silver: "ほそくて　じょうぶな　いとを\nはりめぐらして　わなを　しかけると\nえものが　かかるのを　ひたすらまつ。"
        en:
          gold: "It lies still in\nthe same pose for\ndays in its web,\fwaiting for its\nunsuspecting prey\nto wander close."
          silver: "It spins a web\nusing fine--but\ndurable--thread.\fIt then waits pa-\ntiently for prey\nto be trapped."
        fr:
          gold: "Il reste immobile\ndans sa toile pen-\ndant des jours. Il\fattend que sa\nproie se rapproche\npour la capturer."
          silver: "Il tisse une toile\nen utilisant un\nfil fin mais\fsolide, puis il\nattend tranquil-\nlement sa proie."
        it:
          gold: "Può rimanere\nimmobile nella\ntela per giorni,\fattendendo che\ns’avvicini un’\nignara preda."
          silver: "Tesse la tela con\nun filo sottile ma\nforte. Poi attende\fpaziente che\nuna preda ci\nfinisca dentro."
        de:
          gold: "Es sitzt tagelang\nregungslos in sei-\nnem Netz und lau-\fert unvorsichtiger\nBeute auf, die ihm\nzu nahe kommt."
          silver: "Es spinnt ein Netz\naus feinem, aber\nreißfestem Faden.\fDann wartet es\nauf Beute, die\nim Netz zappelt."
        es:
          gold: "Mantiene la misma\npostura en su\ntelaraña durante\fdías, esperando a\nque se acerque una\npresa inocente."
          silver: "Teje su telaraña\ncon hilo fino pero\nresistente. Espera\fpacientemente a\nque caiga\nsu presa."
        ko:
          gold: "먹이가 근처를 지나칠 때까지\n자신은 집에서 몇 일이고 같은\n모습으로 가만히 기다리고 있다"
          silver: "가늘고 튼튼한 실을\n뿜어 엮어서 덫을 만들고\n먹이가 걸리기만을 기다린다"
ariados:
  species_id: 168
  names:
    jp_kana: アリアドス
    en: ARIADOS
    fr: MIGALOS
    it: ARIADOS
    de: ARIADOS
    es: ARIADOS
    ko: 아리아도스
  forms:
    ariados:
      form_id: 0
      base_stats:
        hp: 70
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 60
        speed: 40
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "おしりからだけでなく　くちからも\nいとを　だすので　みただけでは\nどっちが　あたまか　わからない。"
          silver: "つねに　おしりから　でている\nとくべつな　いっぽんの　いとを\nたどっていくと　すにつながっている。"
        en:
          gold: "It spins string\nnot only from its\nrear but also from\fits mouth. It is\nhard to tell which\nend is which."
          silver: "A single strand of\na special string\nis endlessly spun\fout of its rear.\nThe string leads\nback to its nest."
        fr:
          gold: "Il peut produire\ndes fils de soie\npar l’arrière ou\fpar sa bouche. Il\nest difficile de\nles différencier."
          silver: "Il ne crée qu’un\nseul fil très\nsolide qui relie\fson corps directe-\nment à son nid."
        it:
          gold: "Tesse un filo\nsia dalla bocca,\nsia dall’estremi-\ftà opposta. È dura\ndistinguerne l’i-\nnizio e la fine."
          silver: "Sputa un filo\nininterrotto dalla\nsua parte poste-\friore. Seguendo il\nfilo si giunge\nal suo nido."
        de:
          gold: "Es spinnt die Fä-\nden sowohl mit dem\nHinterleib, als\fauch mit dem Mund.\nDas Ende ist\nschwer zu sehen."
          silver: "Es spinnt nur ei-\nnen endlosen Faden\naus seinem Hinter-\fleib. Folgt man\nihm, gelangt man\nin sein Nest."
        es:
          gold: "Teje su telaraña\ndesde atràs y\ndesde su boca.\fEs muy difícil\nsaber dónde\nestà cada cual."
          silver: "Una hebra de un\nhilo especial\nes tejida sin fin\fdesde su parte\ntrasera. El hilo\nacaba en su nido."
        ko:
          gold: "꼬리에서만이 아니고 입에서도\n실을 뿜기 때문에 봐서는\n어느쪽이 머리인지 모른다"
          silver: "항상 엉덩이에서 나오는\n특별한 꼬리의 실을 더듬어 가면\n보금자리와 연결되어 있다"
crobat:
  species_id: 169
  names:
    jp_kana: クロバット
    en: CROBAT
    fr: NOSTENFER
    it: CROBAT
    de: IKSBAT
    es: CROBAT
    ko: 크로뱃
  forms:
    crobat:
      form_id: 0
      base_stats:
        hp: 85
        attack: 90
        defense: 80
        special_attack: 70
        special_defense: 80
        speed: 130
      types:
        - poison
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "４まいに　ふえた　つばさで\nくらやみを　しずかに　とんでいく。\nとなりを　とおられても　きづかない。"
          silver: "あしにも　ハネが　はったつしたので\nこうそくで　とべるように　なったが\nとまって　やすむのは　へたになった。"
        en:
          gold: "It flies so si-\nlently through the\ndark on its four\fwings that it may\nnot be noticed\neven when nearby."
          silver: "The development of\nwings on its legs\nenables it to fly\ffast but also\nmakes it tough to\nstop and rest."
        fr:
          gold: "Il vole en silence\ndans l’obscurité à\nl’aide de ses\fquatre ailes. Même\ntrès proche on ne\nl’entend pas."
          silver: "Les ailes qui ont\npoussé sur ses\npattes lui permet-\ftent de voler très\nvite."
        it:
          gold: "È così silenzioso\nquando vola nel\nbuio con le sue\fquattro ali, che\nè diffile notarlo\nanche se è vicino."
          silver: "Le ali sviluppa-\ntissime lo fanno\nvolare veloce, ma\fgli rendono anche\ndifficile fermarsi\ne riposarsi."
        de:
          gold: "Mit seinen vier\nFlügeln fliegt es\nso geräuschlos\fdurch die Nacht,\ndass man es nicht\nbemerkt."
          silver: "Durch die Bildung\nvon Flügeln an\nseinen Beinen\ffliegt es schnell,\naber hat Probleme\nbei der Landung."
        es:
          gold: "Es tan silencioso\ncuando vuela en la\noscuridad con sus\fcuatro alas, que\ncuesta percibirlo\ncuando se acerca."
          silver: "Las alas de sus\npatas le permiten\nvolar ràpidamente,\fpero también le\ndificultan pararse\ny descansar."
        ko:
          gold: "4장으로 많아진 날개로\n어둠 속을 조용하게 날아간다\n주위를 지나쳐가도 알아채지 못한다"
          silver: "발에도 날개가 발달해있어서\n고속으로 날 수 있도록 되었지만\n멈춰서 쉬는 것은 어렵게 되었다"
chinchou:
  species_id: 170
  names:
    jp_kana: チョンチー
    en: CHINCHOU
    fr: LOUPIO
    it: CHINCHOU
    de: LAMPI
    es: CHINCHOU
    ko: 초라기
  forms:
    chinchou:
      form_id: 0
      base_stats:
        hp: 75
        attack: 38
        defense: 38
        special_attack: 56
        special_defense: 56
        speed: 67
      types:
        - water
        - electric
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          gold: "２つの　しょくしゅの　さきから\nプラスと　マイナスの　でんきを\nながして　あいてを　しびれさせる。"
          silver: "くらい　かいていでは　いつも\nてんめつ　している　しょくしゅの\nあかり　だけが　つうしんしゅだん。"
        en:
          gold: "It shoots positive\nand negative elec-\ntricity between\fthe tips of its\ntwo antennae and\nzaps its enemies."
          silver: "On the dark ocean\nfloor, its only\nmeans of communi-\fcation is its\nconstantly flash-\ning lights."
        fr:
          gold: "Il émet avec ses\nantennes des im-\npulsions positives\fet négatives qui\npeuvent électrocu-\nter ses ennemis."
          silver: "Au plus profond de\nl’océan, son seul\nmoyen de communi-\fcation est la\nlumière qui cli-\ngnote constamment."
        it:
          gold: "Spara elettricità\npositiva e negati-\nva tra le punte\fdelle due antenne\nper colpire\ni nemici."
          silver: "Negli oscuri fon-\ndali oceanici il\nsuo unico mezzo di\fcomunicazione sono\nle luci sempre\nlampeggianti."
        de:
          gold: "Es verschießt ne-\ngative und positi-\nve Elektronen\fzwischen seinen\nAntennen, um seine\nFeinde zu erlegen."
          silver: "Am Meeresgrund\nkann es sich nur\ndurch ständiges\fFlackern seiner\nLichter der\nUmgebung kundtun."
        es:
          gold: "Descarga electri-\ncidad positiva y\nnegativa entre las\fpuntas de sus dos\nantenas y electro-\ncuta al enemigo."
          silver: "En el oscuro fondo\ndel océano, su\nùnico modo de\fcomunicarse es\nemitiendo luces\nparpadeantes."
        ko:
          gold: "2개의 촉수 끝에서\n양극과 음극의 전기를\n흐르게 해서 상대를 감전시킨다"
          silver: "어두운 해저에서는 항상\n깜빡거리고 있는 촉수의\n빛만이 통신수단이다"
lanturn:
  species_id: 171
  names:
    jp_kana: ランターン
    en: LANTURN
    fr: LANTURN
    it: LANTURN
    de: LANTURN
    es: LANTURN
    ko: 랜턴
  forms:
    lanturn:
      form_id: 0
      base_stats:
        hp: 125
        attack: 58
        defense: 58
        special_attack: 76
        special_defense: 76
        speed: 67
      types:
        - water
        - electric
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          gold: "ランターンのだす　ひかりは\n５０００メートルの　ふかさ　からでも\nすいめんまで　とどくほど　あかるい。"
          silver: "まぶしい　ひかりを　はなって\nあいての　めを　くらませ　うごけない\nあいだに　まるのみに　してしまう。"
        en:
          gold: "The light it emits\nis so bright that\nit can illuminate\fthe sea’s surface\nfrom a depth of\nover three miles."
          silver: "It blinds prey\nwith an intense\nburst of light,\fthen swallows the\nimmobilized prey\nin a single gulp."
        fr:
          gold: "Sa brillance est\nsi forte qu’il\npeut illuminer\fles fonds marins\nà 5000 mètres de\nprofondeur."
          silver: "Il aveugle sa\nproie avec une\nlumière intense,\fpuis l’avale d’un\nseul trait une\nfois immobilisée."
        it:
          gold: "Emette una luce\ncosì intensa che\npuò illuminare la\fsuperficie del\nmare da oltre 5 km\ndi profondità."
          silver: "Acceca la preda\ncon un’intensa\nondata di luce,\fimmobilizzandola,\nper poi ingoiarla\nin un sol boccone."
        de:
          gold: "Sein Licht ist so\nhell, dass es\nselbst vom Meeres-\fgrund aus 5000 Me-\ntern Tiefe an die\nOberfläche dringt."
          silver: "Es blendet seine\nBeute mit einem\nstarken Blitz und\fverschlingt die\ngelähmte Beute\nmit einem Schluck."
        es:
          gold: "La luz que emite\nes tan brillante\nque puede iluminar\fla superficie del\nmar desde unos 5\nkm de profundidad."
          silver: "Ciega a su presa\ncon una luz\nintensa, y\fluego se la\ntraga de un\nsolo bocado."
        ko:
          gold: "랜턴이 내는 빛은\n5000m의 깊이에서도\n수면까지 전해질 정도로 밝다"
          silver: "눈부신 빛을 발산해서 상대의 눈을\n어둡게 만들어 움직이지 못하는\n동안에 통째로 삼켜버린다"
pichu:
  species_id: 172
  names:
    jp_kana: ピチュー
    en: PICHU
    fr: PICHU
    it: PICHU
    de: PICHU
    es: PICHU
    ko: 피츄
  forms:
    pichu:
      form_id: 0
      base_stats:
        hp: 20
        attack: 40
        defense: 15
        special_attack: 35
        special_defense: 35
        speed: 60
      types:
        - electric
      egg_groups:
        - undiscovered
      held_items:
        rare: berry
      descriptions:
        jp_kana:
          gold: "まだまだ　でんきを　ためるのがへた。\nおどろいたり　わらったりすると\nすぐに　ほうでん　してしまう。"
          silver: "ちいさくても　おとなを　ビリビり\nさせるほどの　でんげきを　はなてる。\nただし　じぶんも　おどろいてしまう。"
        en:
          gold: "It is not yet\nskilled at storing\nelectricity.\fIt may send out a\njolt if amused\nor startled."
          silver: "Despite its small\nsize, it can zap\neven adult humans.\fHowever, if it\ndoes so, it also\nsurprises itself."
        fr:
          gold: "Il ne sait pas\nencore stocker\nl’électricité. Il\fenvoie des dé-\ncharges par jeu ou\npar peur."
          silver: "Malgré sa petite\ntaille, il peut\nélectrocuter des\fadultes. Il se\nsurprend lui-même\nen le faisant."
        it:
          gold: "Non è ancora bravo\nad immagazzinare\nelettricità.\fSe si emoziona o\nè divertito ne\nperde un po’."
          silver: "Nonostante sia\nminuto può abbat-\ntere anche una\fpersona. Ma se lo\nfa, sorprende\npersino se stesso."
        de:
          gold: "Es kann noch nicht\nmit Elektrizität\numgehen. Es wirft\fBlitze, wenn es\nsich freut oder\nerstaunt ist."
          silver: "Obwohl es so klein\nist, kann es sogar\nErwachsene über-\fwältigen. Tritt\ndies ein, ist es\nselbst erstaunt."
        es:
          gold: "Todavía no domina\nel almacenamiento\nde electricidad, y\fdescargarà un\nrayo si se\ndivierte o asusta."
          silver: "A pesar de su\npequeño tamaño,\nataca incluso a\flos humanos, algo\nque le sorprende\nincluso a él."
        ko:
          gold: "아직 전기를 잘 모으지 못한다\n놀라거나 웃거나 하면\n바로 방전해 버린다"
          silver: "작아도 어른을 찌릿찌릿\n감전 시킬 정도의 전기를 낸다\n단 자신도 놀라 어쩔줄 모른다"
cleffa:
  species_id: 173
  names:
    jp_kana: ピィ
    en: CLEFFA
    fr: MELO
    it: CLEFFA
    de: PII
    es: CLEFFA
    ko: 삐
  forms:
    cleffa:
      form_id: 0
      base_stats:
        hp: 50
        attack: 25
        defense: 28
        special_attack: 45
        special_defense: 55
        speed: 15
      types:
        - normal
      egg_groups:
        - undiscovered
      held_items:
        common: mysteryberry
        rare: moon_stone
      descriptions:
        jp_kana:
          gold: "おほしさまのような　シルエット。\nそのすがたから　ながれぼしにのって\nやってくると　しんじられている。"
          silver: "ながれぼしが　おおい　よる。\nふしぎと　ピィの　すがたを\nみかけることが　おおくなる。"
        en:
          gold: "Because of its\nunusual, star-like\nsilhouette, people\fbelieve that it\ncame here on\na meteor."
          silver: "When numerous me-\nteors illuminate\nthe night sky,\fsightings of\nCLEFFA strangely\nincrease."
        fr:
          gold: "Il ressemble un\npeu à une étoile.\nOn suppose qu’il\fest venu sur terre\naccroché à une\nmétéorite."
          silver: "Quand de nombreux\nmétéores illumi-\nnent le ciel, on\farrive à voir plus\nde MELO que\nd’habitude."
        it:
          gold: "Per il suo aspetto\nbizzarro, a forma\ndi stella, c’è\fchi crede che\nprovenga da\nuna meteora."
          silver: "Quando molte\nmeteore illuminano\nil cielo notturno,\fstranamente si\navvistano molti\npiù CLEFFA."
        de:
          gold: "Aufgrund seiner\nungewöhnlichen\nSternform sagt\fman, es sei auf\neinem Meteor\nhierher gereist."
          silver: "Erleuchten viele\nMeteore den Nacht-\nhimmel, dann kann\fman PII seltsamer-\nweise viel öfter\nbegegnen."
        es:
          gold: "Por su inusual\nforma estrellada,\nla gente cree que\fprocede de un\nmeteorito que\ncayó a la tierra."
          silver: "Cuando varios\nmeteoros iluminan\nel cielo nocturno,\fla vista de\nCLEFFA mejora\nde forma extraña."
        ko:
          gold: "별님같은 실루엣\n그 모습 때문에 유성을 타고\n나타난다고 믿어지고 있다"
          silver: "별똥별이 많은 밤\n이상하게도 삐의 모습을\n발견하는 일이 많아진다"
igglybuff:
  species_id: 174
  names:
    jp_kana: ププリン
    en: IGGLYBUFF
    fr: TOUDOUDOU
    it: IGGLYBUFF
    de: FLUFFELUFF
    es: IGGLYBUFF
    ko: 푸푸린
  forms:
    igglybuff:
      form_id: 0
      base_stats:
        hp: 90
        attack: 30
        defense: 15
        special_attack: 40
        special_defense: 20
        speed: 15
      types:
        - normal
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "とても　やわらかい　からだ。\nいちど　ころがると　はずみまくって\nぜんぜん　とまれなくなる。"
          silver: "だんりょくせい　あふれる\nからだの　もちぬしで　どこでも\nどんなときでも　はずんでいる。"
        en:
          gold: "It has a very soft\nbody. If it starts\nto roll, it will\fbounce all over\nand be impossible\nto stop."
          silver: "Its extremely\nflexible and elas-\ntic body makes it\fbounce continuous-\nly--anytime, any-\nwhere."
        fr:
          gold: "Son corps est très\ndoux. Quand il\ncommence à\frebondir il est\nimpossible de\nl’arrêter."
          silver: "Son corps est très\nélastique ce qui\nlui permet de\frebondir tout le\ntemps et où il\nveut."
        it:
          gold: "Il suo corpo è\nmorbidissimo. Se\ninizia a rotolare,\frimbalza così\nforte che è impos-\nsibile fermarlo."
          silver: "Il corpo molto\nflessibile ed\nelastico lo fa\frimbalzare\nda ogni parte\ncontinuamente."
        de:
          gold: "Sein Körper ist\nsehr weich. Kommt\nes ins Rollen,\fhüpft es herum\nund man kann es\nnicht aufhalten."
          silver: "Aufgrund seines\nextrem flexiblen\nund elastischen\fKörpers springt es\nständig überall\numher."
        es:
          gold: "Su cuerpo es muy\nblando. Si se pone\na rodar, rebotarà\fcontra todo y\nserà imposible\nde parar."
          silver: "Su cuerpo\nrealmente flexible\ny elàstico le\fpermite rebotar\ncuando sea\ny donde sea."
        ko:
          gold: "매우 부드러운 몸\n한번 구르면 탄성에 가속이 붙어\n전혀 멈출 수 없게된다"
          silver: "탄력성이 넘치는\n몸을 지녀서 언제\n어디서든 튀어다니고 있다"
togepi:
  species_id: 175
  names:
    jp_kana: トゲピー
    en: TOGEPI
    fr: TOGEPI
    it: TOGEPI
    de: TOGEPI
    es: TOGEPI
    ko: 토게피
  forms:
    togepi:
      form_id: 0
      base_stats:
        hp: 35
        attack: 20
        defense: 65
        special_attack: 40
        special_defense: 65
        speed: 20
      types:
        - normal
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "カラのなかに　しあわせが　たくさん\nつまっているらしく　やさしくされると\nこううんを　わけあたえる　という。"
          silver: "ねている　トゲピーを　うまく\nたたせることが　できれば　しあわせに\nなれるとの　いいつたえがある。"
        en:
          gold: "The shell seems to\nbe filled with\njoy. It is said\fthat it will share\ngood luck when\ntreated kindly."
          silver: "A proverb claims\nthat happiness\nwill come to any-\fone who can make a\nsleeping TOGEPI\nstand up."
        fr:
          gold: "Sa coquille est\nremplie de joie.\nOn dit que s’il\fest bien traité,\nil est porteur de\nchance."
          silver: "Un proverbe nous\nenseigne que le\nbonheur touchera\fcelui qui peut\nfaire tenir debout\nun TOGEPI endormi."
        it:
          gold: "Il suo guscio \nsembra ricolmo di\ngioia. Si dice che\fporti fortuna se\nlo si tratta\nbene."
          silver: "Un proverbio dice\nche chi riuscirà\na far alzare un\fTOGEPI dormiente\nsarà baciato dalla\nfelicità."
        de:
          gold: "Seine Schale ist\nvoll von Freude.\nEs teilt sein\fGlück, wenn man es\nfreundlich und\ngut behandelt."
          silver: "Ein Sprichwort be-\nsagt, dass Glück\ndem widerfährt,\fdem es gelingt,\nein schlafendes\nTOGEPI zu wecken."
        es:
          gold: "El cascarón parece\nestar lleno de\nalegría. Dicen que\ftrae buena suerte\nsi es tratado\ncon cariño."
          silver: "Dice el proverbio\nque quien\ndespierte a un\fTOGEPI de su\nsueño, alcanzarà\nla felicidad."
        ko:
          gold: "껍질 안에 행복이 많이\n들어 있는 것 같아서 잘 대해주면\n행운을 나누어 준다고 말한다"
          silver: "자고 있는 토게피를 잘\n세울 수 있다면 행복해질 수\n있다는 전설이 전해진다"
togetic:
  species_id: 176
  names:
    jp_kana: トゲチック
    en: TOGETIC
    fr: TOGETIC
    it: TOGETIC
    de: TOGETIC
    es: TOGETIC
    ko: 토게틱
  forms:
    togetic:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 85
        special_attack: 80
        special_defense: 105
        speed: 40
      types:
        - normal
        - flying
      egg_groups:
        - flying
        - fairy
      descriptions:
        jp_kana:
          gold: "こころやさしい　ひとの　まえに\nしあわせを　もたらすため\nすがたを　あらわすと　いわれている。"
          silver: "やさしいひとの　そばに　いないと\nげんきが　でなくなってしまう。\nはねをうごかさずに　そらにうかべる。"
        en:
          gold: "They say that it\nwill appear before\nkindhearted, car-\fing people and\nshower them with\nhappiness."
          silver: "It grows dispirit-\ned if it is not\nwith kind people.\fIt can float in\nmidair without\nmoving its wings."
        fr:
          gold: "On dit qu’il n’ap-\nparaît qu’aux\ncoeurs purs. Il\fapporte la joie et\nle bonheur à son\nmaître."
          silver: "Il se démoralise\nvite s’il n’est\npas avec des gens\fsympathiques. Il\npeut léviter sans\nbattre des ailes."
        it:
          gold: "Si dice che appaia\nalle persone\nbuone e\fpremurose,\ninondandole di\nfelicità."
          silver: "S’intristisce se\nnon si trova con\npersone gentili.\fPuò veleggiare in\naria senza bisogno\ndi muovere le ali."
        de:
          gold: "Man sagt, es zeigt\nsich nur guther-\nzigen und einfühl-\fsamen Menschen. Es\nüberschüttet sie\nmit Freude."
          silver: "Es wird entmutigt,\nwenn es unter\nunfreundlichen\fMenschen ist. Es\nkann ohne Flügel\nniedrig schweben."
        es:
          gold: "Dicen que aparece\nentre gentes\ncuidadosas y de\fbuen corazón, a\nquienes inunda\nde felicidad."
          silver: "Si no està con\ngente amable,\nse entristece.\fPuede flotar en\nel aire sin mover\nlas alas."
        ko:
          gold: "마음 좋은 사람 앞에\n행복을 가져다주기 위해\n모습을 나타낸다고 전해지고 있다"
          silver: "상냥한 사람 곁에 있지 않으면\n기운이 나지 않게 되어버린다\n날개를 움직이지 않고 뜰 수 있다"
natu:
  species_id: 177
  names:
    jp_kana: ネイティ
    en: NATU
    fr: NATU
    it: NATU
    de: NATU
    es: NATU
    ko: 네이티
  forms:
    natu:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 45
        special_attack: 70
        special_defense: 45
        speed: 70
      types:
        - psychic
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "はねが　そだちきって　おらず\nとびはねるようにして　いどうする。\nいつも　なにかを　みつめている。"
          silver: "ふだんは　ちじょうで　エサをさがすが\nごくたまに　きのえだに　とびのって\nきのめを　ついばんだりする。"
        en:
          gold: "Because its wings\naren’t yet fully\ngrown, it has to\fhop to get around.\nIt is always star-\ning at something."
          silver: "It usually forages\nfor food on the\nground but may, on\frare occasions,\nhop onto branches\nto peck at shoots."
        fr:
          gold: "Ses ailes ne sont\npas encore assez\ndéveloppées. Il\fne peut que planer\npéniblement."
          silver: "Il cherche sa\nnourriture par\nterre, mais quel-\fquefois il grimpe\naux arbres pour\nmanger."
        it:
          gold: "Poiché le sue ali\nnon sono ancora\nben sviluppate,\fdeve saltellare.\nSembra fissare\nsempre qualcosa."
          silver: "Di solito cerca il\ncibo per terra, ma\nin rare occasioni\fpuò saltare sui\nrami e beccare\ni germogli."
        de:
          gold: "Da seine Flügel\nnicht voll ausge-\nbildet sind, be-\fwegt es sich hüp-\nfend. Es starrt\nimmer etwas an."
          silver: "Gewöhnlich sucht\nes am Boden nach\nFutter, aber\fmanchmal springt\nes auch auf Äste,\num dort zu suchen."
        es:
          gold: "Va dando saltitos\nporque sus alas no\nhan crecido lo\fsuficiente.\nSiempre està\npendiente de algo."
          silver: "Normalmente busca\ncomida por el\nsuelo. En raras\focasiones, salta\na las ramas para\npicotear brotes."
        ko:
          gold: "날개가 아직 잘 발달하지 못해서\n뛰어오를 듯이 해서 이동한다\n항상 무언가를 바라보고 있다"
          silver: "보통은 지상에서 먹이를 찾지만\n극히 드물게 나뭇가지에 날아 앉아\n나무 싹을 쪼아먹기도 한다"
xatu:
  species_id: 178
  names:
    jp_kana: ネイティオ
    en: XATU
    fr: XATU
    it: XATU
    de: XATU
    es: XATU
    ko: 네이티오
  forms:
    xatu:
      form_id: 0
      base_stats:
        hp: 65
        attack: 75
        defense: 70
        special_attack: 95
        special_defense: 70
        speed: 95
      types:
        - psychic
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "ほとんど　うごかず　なきもせず\nじっとするのは　かこと　みらいを\nみているからだと　しんじられている。"
          silver: "みぎめは　みらいを\nひだりめは　かこを　みていると\nみなみアメリカで　つたえられている。"
        en:
          gold: "They say that it\nstays still and\nquiet because it\fis seeing both the\npast and future at\nthe same time."
          silver: "In South America,\nit is said that\nits right eye sees\fthe future and its\nleft eye views the\npast."
        fr:
          gold: "On dit qu’il est\ncalme et tran-\nquille car il peut\fvoir en permanence\nle passé et le\nfutur."
          silver: "Il paraît que son\noeil gauche peut\nvoir le passé et\fque son oeil droit\nest capable de\nvoir le futur."
        it:
          gold: "Si dice che sia\ncosì quieto\nperché sta\fosservando passato\ne futuro allo\nstesso tempo."
          silver: "In Sudamerica si\ndice che il suo\nocchio destro veda\fil futuro, e\nquello sinistro il\npassato."
        de:
          gold: "Man sagt, es sei\nso still und in\nsich gekehrt, weil\fes die Zukunft und\ndie Vergangenheit\nparallel sieht."
          silver: "In Südamerika\nglaubt man, dass\nsein rechtes Auge\fdie Zukunft und\ndas linke die Ver-\ngangenheit sieht."
        es:
          gold: "Dicen que se\nmantiene quieto\ny en silencio\fporque observa el\npasado y el futuro\nal mismo tiempo."
          silver: "Dicen en\nSudamérica que\nsu ojo derecho ve\fel futuro y que\nel izquierdo ve\nel pasado."
        ko:
          gold: "거의 움직이거나 울지도 않고\n가만히 있는 것은 과거와 미래를\n보고있기 때문이라고 믿어지고 있다"
          silver: "오른쪽 눈은 미래를\n왼쪽 눈은 과거를 보고 있다고\n남아메리카에서 전해지고 있다"
mareep:
  species_id: 179
  names:
    jp_kana: メリープ
    en: MAREEP
    fr: WATTOUAT
    it: MAREEP
    de: VOLTILAMM
    es: MAREEP
    ko: 메리프
  forms:
    mareep:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 40
        special_attack: 65
        special_defense: 45
        speed: 35
      types:
        - electric
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "からだに　せいでんきが　たまると\nたいもうが　いつもの　２ばいほどに\nふくらむ。さわると　しびれる。"
          silver: "たいもうは　どんどん　のびる。\nなつになると　ぜんぶ　ぬけおちるが\nいっしゅうかんで　もとどおりになる。"
        en:
          gold: "If static elec-\ntricity builds in\nits body, its\ffleece doubles in\nvolume. Touching\nit will shock you."
          silver: "Its fleece grows\ncontinually. In\nthe summer, the\ffleece is fully\nshed, but it grows\nback in a week."
        fr:
          gold: "Son corps produit\nde l’électricité\nstatique. Quand il\fest bien chargé,\nson poil double de\nvolume."
          silver: "Sa toison pousse\nconstamment. En\nété, même tondu,\fsa laine repousse\nen moins d’une\nsemaine."
        it:
          gold: "Se il suo corpo si\nriempie d’elettri-\ncità, il volume\fdella lana raddop-\npia. Il contatto\ncausa uno shock."
          silver: "La lana ricresce\ndi continuo. In\nestate la perde\fcompletamente, ma\nricresce nel giro\ndi una settimana."
        de:
          gold: "Lädt es sich sta-\ntisch auf, ver-\ndoppelt sich sein\fUmfang. Wer es be-\nrührt, erhält ei-\nnen Elektroschock."
          silver: "Sein Fell wächst\nständig. Im Sommer\nwird es geschert,\faber sein Fell\nwächst binnen ei-\nner Woche nach."
        es:
          gold: "Cuando almacena\nelectricidad en\nsu cuerpo, dobla\fsu volumen.\nTócalo y recibiràs\nuna descarga."
          silver: "Su lana crece\ncontinuamente.\nEn verano la\fpierde toda, pero\nle vuelve a crecer\nen una semana."
        ko:
          gold: "몸에 정전기가 모이면\n털이 평상시의 2배정도로\n부풀어 오른다  만지면 감전됨"
          silver: "몸의 털은 점점 자란다\n여름이 되면 전부 빠지지만\n일주일 정도면 원래대로 자라난다"
flaaffy:
  species_id: 180
  names:
    jp_kana: モココ
    en: FLAAFFY
    fr: LAINERGIE
    it: FLAAFFY
    de: WAATY
    es: FLAAFFY
    ko: 보송송
  forms:
    flaaffy:
      form_id: 0
      base_stats:
        hp: 70
        attack: 55
        defense: 55
        special_attack: 80
        special_defense: 60
        speed: 45
      types:
        - electric
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "でんきを　たくわえすぎた　けっか\nからだの　ひょうめんに　うぶげすら\nはえない　ぶぶんが　できてしまった。"
          silver: "ふかふかの　たいもうは　でんきを\nためやすいが　ゴムのような　ひふの\nおかげで　じぶんは　しびれない。"
        en:
          gold: "As a result of\nstoring too much\nelectricity, it\fdeveloped patches\nwhere even downy\nwool won’t grow."
          silver: "Its fluffy fleece\neasily stores\nelectricity. Its\frubbery hide keeps\nit from being\nelectrocuted."
        fr:
          gold: "Il stocke trop\nd’électricté et\nson poil ne peut\fplus repousser à\ncertains endroits\nde son corps."
          silver: "Sa douce laine\nstocke facilement\nl’électricité. Sa\fpeau caoutchou-\nteuse prévient\nl’électrocution."
        it:
          gold: "Avendo immagazzi-\nnato troppa elet-\ntricità, su intere\fparti del corpo\nnon cresce neppure\nla lanugine."
          silver: "La soffice pellic-\ncia raccoglie\nelettricità. Non\fsi fulmina grazie\nad uno strato di\npelle gommosa."
        de:
          gold: "Da es zuviel Elek-\ntrizität gespei-\nchert hat, hat es\fFlecken, an denen\nnicht einmal feine\nWolle wächst."
          silver: "Sein flauschiges\nFell speichert\nElektrizität.\fSeine Gummihaut\nschützt es vor\nStromstößen."
        es:
          gold: "Como almacena\ntanta\nelectricidad,\fha desarrollado\nparches donde no\ncrece ni la lana."
          silver: "Su esponjosa lana\nalmacena\nelectricidad. Su\fpiel gomosa\nevita que sea\nelectrocutado."
        ko:
          gold: "전기를 너무 많이 모은 결과\n몸의 표면에 솜털조차\n자라지 않는 부분이 생겼다"
          silver: "푹신푹신한 털은 전기를\n모으기 쉽지만 고무같은 피부\n덕분에 자신은 감전되지 않는다"
ampharos:
  species_id: 181
  names:
    jp_kana: デンリュウ
    en: AMPHAROS
    fr: PHARAMP
    it: AMPHAROS
    de: AMPHAROS
    es: AMPHAROS
    ko: 전룡
  forms:
    ampharos:
      form_id: 0
      base_stats:
        hp: 90
        attack: 75
        defense: 75
        special_attack: 115
        special_defense: 90
        speed: 55
      types:
        - electric
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "シッポのさきが　ひかりかがやく。\nひかりは　はるか　とおくまで　とどき\nまよったものの　みちしるべとなる。"
          silver: "シッポの　あかりは　とおくまで\nとどくので　むかしより　かがりび\nとして　だいじに　されている。"
        en:
          gold: "The tail’s tip\nshines brightly\nand can be seen\ffrom far away. It\nacts as a beacon\nfor lost people."
          silver: "The bright light\non its tail can be\nseen far away. It\fhas been treasured\nsince ancient\ntimes as a beacon."
        fr:
          gold: "Le bout de sa\nqueue brille si\nfort qu’il peut\fêtre vu de très\nloin. Il sert de\nbalise aux gens."
          silver: "La lumière vive\nsur sa queue peut\nêtre vue de loin.\fIl a longtemps été\nvénéré comme un\nphare."
        it:
          gold: "La punta della\ncoda è molto lumi-\nnosa, visibile da\fgrandi distanze.\nFa da segnale per\nchi si è perso."
          silver: "La forte luce che\nha sulla coda è\nvisibile da molto\flontano. Da sempre\nè un riferimento\nper chi si perde."
        de:
          gold: "Seine Schwanzspit-\nze ist so hell,\ndass viele Ver-\fschollene es als\nOrientierungspunkt\nbenutzen."
          silver: "Das helle Licht an\nseinem Schwanzende\nist von Weitem zu\fsehen. Es gilt\nseit der Antike\nals Leuchtfeuer."
        es:
          gold: "La punta de su\ncola reluce\nbrillantemente y\fpuede ser vista\ndesde lejos. Es\nusado como faro."
          silver: "El brillo de su\ncola es visible\ndesde lejos.\fEn la antigüedad\nse usaba mucho\ncomo faro."
        ko:
          gold: "꼬리 끝이 빛나며 반짝인다\n빛은 아주 먼 곳까지 닿아서\n길잃은 자들의 이정표가 된다"
          silver: "꼬리의 빛은 멀리까지\n전해지기 때문에 예전부터 봉화\n역할로서 중요하게 여겨지고 있다"
bellossom:
  species_id: 182
  names:
    jp_kana: キレイハナ
    en: BELLOSSOM
    fr: JOLIFLOR
    it: BELLOSSOM
    de: BLUBELLA
    es: BELLOSSOM
    ko: 아르코
  forms:
    bellossom:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 85
        special_attack: 90
        special_defense: 100
        speed: 50
      types:
        - grass
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "ときおり　キレイハナが　あつまって\nおどるような　しぐさを　みせる。\nたいようをよぶ　ぎしき　といわれる。"
          silver: "なんごくに　おおく　せいそくする。\nおどるとき　はなびらが　ふれあい\nここちよい　おとが　なりひびく。"
        en:
          gold: "BELLOSSOM gather\nat times and\nappear to dance.\fThey say that the\ndance is a ritual\nto summon the sun."
          silver: "Plentiful in the\ntropics. When it\ndances, its petals\frub together and\nmake a pleasant\nringing sound."
        fr:
          gold: "JOLIFLOR danse\nla majorité du\ntemps. Certains\fpensent que c’est\nun rituel pour\nappeler le soleil."
          silver: "Fréquent dans les\ntropiques. Quand\nil danse, ses\fpétales se frot-\ntent, créant un\nson mélodieux."
        it:
          gold: "A volte gruppi di\nBELLOSSOM sembrano\ndanzare.\fSi dice che sia un\nrito per invocare\nil sole."
          silver: "Molto comune ai\ntropici. Quando\ndanza, i petali\fsi sfregano produ-\ncendo un piacevole\ntintinnio."
        de:
          gold: "BLUBELLAS kommen\nzusammen, um zu\ntanzen. Sie sagen,\fdieser Tanz sei\nein Ritual, um der\nSonne zu huldigen."
          silver: "Es lebt in den\nTropen. Beim Tan-\nzen reiben seine\fBlüten aneinander\nund erzeugen ein\nwohliges Geräusch."
        es:
          gold: "Los BELLOSSOM\nsuelen reunirse\npara bailar. Dicen\fque sus danzas son\nun ritual para\ninvocar al sol."
          silver: "Abundan en los\ntrópicos. Cuando\nbaila, sus pétalos\fse rozan creando\nun agradable\ntintineo."
        ko:
          gold: "가끔 아르코가 모여서\n춤을 추는 듯한 행동을 보인다\n태양을 부르는 의식이라 전해진다"
          silver: "남국에 넓게 분포하여 서식하고있다\n춤출 때 꽃잎끼리 서로 부딪히며\n기분 좋은 소리가 울려 퍼진다"
marill:
  species_id: 183
  names:
    jp_kana: マリル
    en: MARILL
    fr: MARILL
    it: MARILL
    de: MARILL
    es: MARILL
    ko: 마릴
  forms:
    marill:
      form_id: 0
      base_stats:
        hp: 70
        attack: 20
        defense: 50
        special_attack: 20
        special_defense: 50
        speed: 40
      types:
        - water
      egg_groups:
        - water_1
        - fairy
      descriptions:
        jp_kana:
          gold: "しっぽの　さきには　みずよりも\nかるい　あぶらが　つまっているから\nおぼれることなく　かわをすすめる。"
          silver: "シッポの　さきっぽが　うきぶくろの\nやくわりを　はたすので　はげしい\nながれでも　おぼれたりしない。"
        en:
          gold: "The tip of its\ntail, which con-\ntains oil that is\flighter than wa-\nter, lets it swim\nwithout drowning."
          silver: "The end of its\ntail serves as a\nbuoy that keeps\fit from drowning,\neven in a vicious\ncurrent."
        fr:
          gold: "Le bout de sa\nqueue est rempli\nd’huile plus\flégère que l’eau,\nce qui lui permet\nde ne pas couler."
          silver: "Le bout de sa\nqueue lui sert de\nbouée, l’empêchant\fde se noyer même\npar fort courant."
        it:
          gold: "La punta della\ncoda, contenendo\nun olio più leg-\fgero dell’acqua,\nlo fa nuotare\nsenza affogare."
          silver: "La punta della\ncoda funziona come\nuna boa e non lo\ffa affogare\nneppure in una\nviolenta corrente."
        de:
          gold: "Da seine Schwanz-\nspitze Öl enthält,\ndas leichter als\fWasser ist, kann\nes schwimmen, ohne\nunterzugehen."
          silver: "Da es am Schwanz-\nende eine Art Boje\nträgt, kann es\fselbst bei der\nstärksten Strömung\nnicht ertrinken."
        es:
          gold: "La punta de\nsu cola, que\ncontiene aceite,\fle permite nadar\nsin miedo a\nahogarse."
          silver: "Usa el extremo de\nsu cola como boya\nque le impide\fahogarse, incluso\nsi lo arrastra una\nfuerte corriente."
        ko:
          gold: "꼬리 끝에는 물보다도\n가벼운 기름이 담겨져 있어서\n물에 빠짐없이 강을 건넌다"
          silver: "꼬리의 끝이 부레의\n역할을 하기 때문에 거센\n물살에도 빠져 죽거나 하지 않는다"
azumarill:
  species_id: 184
  names:
    jp_kana: マリルリ
    en: AZUMARILL
    fr: AZUMARILL
    it: AZUMARILL
    de: AZUMARILL
    es: AZUMARILL
    ko: 마릴리
  forms:
    azumarill:
      form_id: 0
      base_stats:
        hp: 100
        attack: 50
        defense: 80
        special_attack: 50
        special_defense: 80
        speed: 50
      types:
        - water
      egg_groups:
        - water_1
        - fairy
      descriptions:
        jp_kana:
          gold: "じっと　みみを　すますと\nはげしい　ながれの　かわの　なかに\nなにが　いるのか　ききわけられる。"
          silver: "みずあそびを　するとき\nみずが　はいってこないように\nながい　みみを　まいている。"
        en:
          gold: "By keeping still\nand listening in-\ntently, it can\ftell what is in\neven wild, fast-\nmoving rivers."
          silver: "When it plays in\nwater, it rolls up\nits elongated ears\fto prevent their\ninsides from get-\nting wet."
        fr:
          gold: "En ne bougeant\nplus et en écou-\ntant il peut\fdiscerner ce qu’il\ny a au fond des\nfleuves."
          silver: "Quand il joue dans\nl’eau, il roule en\nboule ses oreilles\fpour éviter de\nles mouiller."
        it:
          gold: "Stando in silenzio\ne ascoltando con\nattenzione può\fdire ciò che si\ntrova anche nei\nfiumi impetuosi."
          silver: "Quando gioca in\nacqua arrotola le\nlunghe orecchie\fperché non si\nbagnino\nall’interno."
        de:
          gold: "Verhält es sich\nregungslos und\nlauscht, hört es,\fwas sich in wilden\nund reißenden\nFlüssen abspielt."
          silver: "Spielt es im Was-\nser, rollt es sei-\nne langen Ohren\fzusammen, um zu\nverhindern, dass\nWasser eindringt."
        es:
          gold: "Guardando silencio\ny prestando mucha\natención puede\fsaber lo que hay\nen los ràpidos\ny salvajes ríos."
          silver: "Cuando juega en el\nagua, enrolla sus\nalargadas orejas\fpara evitar\nque le entre\nagua."
        ko:
          gold: "가만히 귀를 기울이면\n거세게 흐르는 강 안에\n무엇이 있는가 들어서 구별한다"
          silver: "물놀이를 할 때\n물이 귀에 들어가지 않도록\n긴 귀를 감아 접고 있다"
sudowoodo:
  species_id: 185
  names:
    jp_kana: ウソッキー
    en: SUDOWOODO
    fr: SIMULARBRE
    it: SUDOWOODO
    de: MOGELBAUM
    es: SUDOWOODO
    ko: 꼬지모
  forms:
    sudowoodo:
      form_id: 0
      base_stats:
        hp: 70
        attack: 100
        defense: 115
        special_attack: 30
        special_defense: 65
        speed: 30
      types:
        - rock
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          gold: "いつも　きのふりを　している。\nからだの　つくりは　しょくぶつより\nいしや　いわなどに　ちかいようだ。"
          silver: "おそわれないように　きのまねをする。\nみずがにがてで　あめが　ふりだすと\nいつのまにか　すがたを　けす。"
        en:
          gold: "Although it always\npretends to be a\ntree, its composi-\ftion appears to be\ncloser to a rock\nthan a plant."
          silver: "It disguises it-\nself as a tree to\navoid attack. It\fhates water, so it\nwill disappear if\nit starts raining."
        fr:
          gold: "Il fait semblant\nd’être un arbre.\nSa composition est\fen fait plus\nproche de la\npierre."
          silver: "Il se déguise en\narbre pour éviter\nles problèmes.\fIl déteste l’eau\net se cache par\ntemps de pluie."
        it:
          gold: "Sebbene finga di\nessere un albero,\nla composizione\fsembra più simile\na quella di\nuna roccia."
          silver: "Si traveste da\nalbero per evitare\ngli attacchi.\fOdiando l’acqua,\nscompare appena\ninizia a piovere."
        de:
          gold: "Obwohl es vorgibt,\nein Baum zu sein,\nkommt seine Ver-\ffassung einem\nStein näher als\neiner Pflanze."
          silver: "Es tarnt sich als\nBaum, um nicht an-\ngegriffen zu wer-\fden. Es hasst Was-\nser, darum läuft\nes bei Regen weg."
        es:
          gold: "Aunque pretende\nser un àrbol, en\nsu composición se\fparece màs a\nuna roca que\na una planta."
          silver: "Se disfraza de\nàrbol para no ser\natacado. Odia el\fagua, por lo que\ndesaparecerà si\nempieza a llover."
        ko:
          gold: "항상 나무행세를 하고 있다\n몸의 구성은 식물보다\n돌이나 바위쪽에 가깝다"
          silver: "습격당하지 않도록 나무흉내를 낸다\n물에 약하기 때문에 비가 내리면\n어느 순간에 모습을 감춰버린다"
politoed:
  species_id: 186
  names:
    jp_kana: ニョロトノ
    en: POLITOED
    fr: TARPAUD
    it: POLITOED
    de: QUAXO
    es: POLITOED
    ko: 왕구리
  forms:
    politoed:
      form_id: 0
      base_stats:
        hp: 90
        attack: 75
        defense: 75
        special_attack: 90
        special_defense: 100
        speed: 70
      types:
        - water
      egg_groups:
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          gold: "なきごえが　ひびきわたると\nあちこちから　ニョロモや\nニョロゾたちが　あつまってくる。"
          silver: "３びき　いじょう　ニョロトノが\nあつまると　かならず　どなるような\nなきごえで　がっしょうを　はじめる。"
        en:
          gold: "If POLIWAG and\nPOLIWHIRL hear its\nechoing cry, they\frespond by gather-\ning from far and\nwide."
          silver: "Whenever three or\nmore of these get\ntogether, they\fsing in a loud\nvoice that sounds\nlike bellowing."
        fr:
          gold: "Si PTITARD et\nTETARTE entendent\nson cri, ils se\frassemblent pour\nvenir le ren-\ncontrer."
          silver: "Quand trois ou\nplus se réunis-\nsent, ils\fchantent d’une\nvoix ressemblant\nà un beuglement."
        it:
          gold: "Se i POLIWAG o i\nPOLIWHIRL odono il\nsuo verso rimbom-\fbante si riuni-\nscono anche da\nenormi distanze."
          silver: "Quando si trovano\nin tre o più\niniziano a cantare\fad alta voce, pro-\nducendo una sorta\ndi gracchio."
        de:
          gold: "Hören QUAPUTZI und\nQUAPPO seinen Ruf,\nantworten sie,\findem sie sich\nvon nah und fern\nversammeln."
          silver: "Sind drei oder\nmehr von ihnen zu-\nsammen, singen sie\fso laut, dass man\nan Hundegebell\nerinnert wird."
        es:
          gold: "Si POLIWAG y\nPOLIWHIRL oyen su\ngrito, responderàn\freuniéndose a lo\nlargo y ancho\nde este mundo."
          silver: "Cuando tres o màs\nde éstos se\njuntan, emiten\fun sonido muy\nfuerte parecido\na un bramido."
        ko:
          gold: "울음소리가 울려퍼지면\n여기저기서 발챙이랑\n수륙챙이들이 모인다"
          silver: "3마리 이상 왕구리가\n모이면 반드시 큰소리로 아우성치는\n울음소리로 합창을 하기 시작한다"
hoppip:
  species_id: 187
  names:
    jp_kana: ハネッコ
    en: HOPPIP
    fr: GRANIVOL
    it: HOPPIP
    de: HOPPSPROSS
    es: HOPPIP
    ko: 통통코
  forms:
    hoppip:
      form_id: 0
      base_stats:
        hp: 35
        attack: 35
        defense: 40
        special_attack: 35
        special_defense: 55
        speed: 50
      types:
        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      descriptions:
        jp_kana:
          gold: "ハネッコどうし　あつまって　かぜに\nふきとばされないように　している。\nでも　そよかぜに　ふかれるのはすき。"
          silver: "とても　かるい　からだ。\nふきとばされないよう　しっかり\nじめんを　ふみしめている。"
        en:
          gold: "To keep from being\nblown away by the\nwind, they gather\fin clusters. They\ndo enjoy gentle\nbreezes, though."
          silver: "Its body is so\nlight, it must\ngrip the ground\ffirmly with its\nfeet to keep from\nbeing blown away."
        fr:
          gold: "Pour éviter d’être\nbalayés par les\nvents, ils se\frassemblent en\npetits groupes."
          silver: "Son corps est si\nléger qu’il doit\ns’agripper au sol\fpour éviter de\ns’envoler les\njours de brise."
        it:
          gold: "Si stringono uno\naccanto all’altro\nper resistere al\fvento. Al contra-\nrio, amano la\nbrezza leggera."
          silver: "Ha un corpo così\nleggero che deve\naggrapparsi\fsaldamente\nal suolo per non\nvolare via."
        de:
          gold: "Um nicht vom Wind\ndavongeweht zu\nwerden, treten sie\fstets in Gruppen\nauf. Eine Brise\ngefällt ihnen."
          silver: "Sein Körper ist so\nleicht, dass es\nseine Füße im Bo-\fden verankert, da-\nmit es nicht\ndavongeweht wird."
        es:
          gold: "Para evitar ser\nllevados por el\nviento, se reùnen\fen grupos, aunque\nadoran las suaves\nbrisas."
          silver: "Su cuerpo es tan\nligero, que debe\nagarrarse bien al\fsuelo con las\npatas para no irse\ncon el viento."
        ko:
          gold: "통통코끼리 모여서 바람에\n날려가지 않도록 하고있다\n단 산들바람에 날리는 것은 좋아함"
          silver: "매우 가벼운 몸을 가졌다\n바람에 날아가지 않도록 단단히\n지면을 밟아 지탱하고 있다"
skiploom:
  species_id: 188
  names:
    jp_kana: ポポッコ
    en: SKIPLOOM
    fr: FLORAVOL
    it: SKIPLOOM
    de: HUBELUPF
    es: SKIPLOOM
    ko: 두코
  forms:
    skiploom:
      form_id: 0
      base_stats:
        hp: 55
        attack: 45
        defense: 50
        special_attack: 45
        special_defense: 65
        speed: 80
      types:
        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      descriptions:
        jp_kana:
          gold: "あたまのうえに　さいた　ハナは\nきおんに　よって　ひらいたり\nとじたりする　せいしつを　もつ。"
          silver: "たいようの　ひかりを　あびるため\nはなびらを　ひろげるだけでなく\nちかづこうと　そらにうかんでしまう。"
        en:
          gold: "The bloom on top\nof its head opens\nand closes as the\ftemperature fluc-\ntuates up and\ndown."
          silver: "It spreads its\npetals to absorb\nsunlight. It also\ffloats in the air\nto get closer to\nthe sun."
        fr:
          gold: "Le bourgeon sur sa\ntête s’ouvre et se\nferme en fonction\fdes fluctuations\nde la température\nambiante."
          silver: "Il étend ses pé-\ntales pour absor-\nber la lumière du\fsoleil. Il flotte\npour se rapprocher\ndu soleil."
        it:
          gold: "Il fiore sul capo\nsi apre e si\nchiude con il\fcontinuo mutare\ndella temperatura\ncorporea."
          silver: "Spalanca i petali\nper assorbire la\nluce solare.\fFluttua nell’aria\nper essere più\nvicino al sole."
        de:
          gold: "Temperaturschwan-\nkungen veranlassen\nes, die Blüte auf\fseinem Kopf immer\nzu öffnen oder zu\nschließen."
          silver: "Es öffnet seine\nBlüte, um Sonnen-\nlicht aufzunehmen.\fEs schwebt in der\nLuft, um der Sonne\nnäher zu sein."
        es:
          gold: "La flor de\nsu cabeza se\nabre y cierra\fsegùn suba o\nbaje la\ntemperatura."
          silver: "Abre sus pétalos\npara absorber la\nluz solar. También\fflota en el aire\npara estar màs\ncerca del sol."
        ko:
          gold: "머리 위에 핀 꽃은\n기온에 의해 피거나\n지거나 하는 성질을 가지고 있다"
          silver: "태양 빛을 잘 받기 위해\n꽃잎을 펼칠 뿐만 아니라\n가까이 가려고 하늘로 떠올라버린다"
jumpluff:
  species_id: 189
  names:
