      descriptions:
        jp_kana:
          gold: "ミツをみつけると　みかづきもようが\nかがやく。あまいミツが　しみこんだ\nてのひらを　いつも　なめている。"
          silver: "たべものが　へる　ふゆのまえに\nあちこちに　たべものを　かくす\nしゅうせいを　もっている。"
        en:
          gold: "If it finds honey,\nits crescent mark\nglows. It always\flicks its paws\nbecause they are\nsoaked with honey."
          silver: "Before food be-\ncomes scarce in\nwintertime, its\fhabit is to hoard\nfood in many hid-\nden locations."
        fr:
          gold: "Quand il trouve du\nmiel, sa marque en\nforme de lune\fbrille. Il lèche\nses pattes cou-\nvertes de miel."
          silver: "Il se fait des\nréserves de nour-\nriture dans des\fcachettes avant\nl’arrivée de\nl’hiver."
        it:
          gold: "Se trova del miele\nla sua mezzaluna\ndiventa più lumi-\fnosa. Si lecca\nle zampe intrise\ndi miele."
          silver: "Per prepararsi\nall’inverno,\nè sua abitudine\faccumulare il cibo\nin diversi\nnascondigli."
        de:
          gold: "Findet es Honig,\nleuchtet die Si-\nchel auf seinem\fKopf. Es leckt oft\nseine mit Honig\nbedeckten Pfoten."
          silver: "Steht der Winter\nvor der Türe, hor-\ntet es Nahrung an\fvielen verschiede-\nnen nur ihm bekan-\nten Orten."
        es:
          gold: "Si encuentra miel,\nbrillarà la marca\nde su frente.\fSe lame las garras\ncuando estàn\nllenas de miel."
          silver: "Antes de que la\ncomida escasee en\ninvierno, tiene\fpor costumbre\nocultar comida en\nlugares secretos."
        ko:
          gold: "꿀을 발견하면 초승달 문양이\n빛난다  달콤한 꿀이 흡착된\n손바닥을 항상 핥고 있다"
          silver: "먹이가 줄어드는 겨울 전에\n이곳저곳에 먹을 것을 숨겨두는\n습성을 지니고 있다"
ursaring:
  species_id: 217
  names:
    jp_kana: リングマ
    en: URSARING
    fr: URSARING
    it: URSARING
    de: URSARING
    es: URSARING
    ko: 링곰
  forms:
    ursaring:
      form_id: 0
      base_stats:
        hp: 90
        attack: 130
        defense: 75
        special_attack: 75
        special_defense: 75
        speed: 55
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "きのぼりも　とくいだが\nまえあしで　ふといみきを　へしおって\nおちてきた　きのみを　たべる。"
          silver: "どんな　においも　かぎわける。\nじめんふかくに　うまっている\nたべものも　のこらず　みつけだす。"
        en:
          gold: "Although it is a\ngood climber, it\nprefers to snap\ftrees with its\nforelegs and eat\nfallen BERRIES."
          silver: "With its ability\nto distinguish any\naroma, it unfail-\fingly finds all\nfood buried deep\nunderground."
        fr:
          gold: "Même s’il grimpe\nbien, il préfére\nsecouer les arbres\favec ses quatre\npattes pour faire\ntomber des BAIES."
          silver: "Avec sa capacité\nà sentir toute\nodeur, il trouve\fsans faillir de la\nnourriture enfouie\ndans le sol."
        it:
          gold: "È un buon scala-\ntore, ma preferi-\nsce raccogliere\fBACCHE scrollando\ngli alberi con le\nzampe anteriori."
          silver: "Con la sua abilità\ndi distinguere\nqualsiasi odore,\ftrova cibo nel\nterreno anche a\ngrandi profondità."
        de:
          gold: "Obwohl es gut\nklettern kann,\nstößt es mit den\fPranken gegen die\nBäume und isst die\nBEEREN vom Boden."
          silver: "Da es alle Gerüche\nperfekt unter-\nscheiden kann,\ffindet es sogar\nNahrung, die tief\nim Erdreich ist."
        es:
          gold: "Aunque trepa\nmuy bien,\nprefiere agitar\flos àrboles con\nsus patas y comer\nlas BAYAS caídas."
          silver: "Capaz de percibir\ncualquier tipo de\naroma, encuentra\fsin problemas todo\nalimento enterrado\nbajo tierra."
        ko:
          gold: "나무타기가 특기이지만\n앞발로 나무줄기를 꺾어서\n떨어진 열매를 먹는다"
          silver: "어떠한 냄새도 구별한다\n땅속깊이 파묻힌\n먹이도 남김없이 찾아낸다"
slugma:
  species_id: 218
  names:
    jp_kana: マグマッグ
    en: SLUGMA
    fr: LIMAGMA
    it: SLUGMA
    de: SCHNECKMAG
    es: SLUGMA
    ko: 마그마그
  forms:
    slugma:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 40
        special_attack: 70
        special_defense: 40
        speed: 20
      types:
        - fire
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "じっとしていると　ようがんで　できた\nからだが　ひえて　かたまるから\nねむることなく　うごきまわっている。"
          silver: "かざんちたいに　おおく　はっせい。\nあたたかい　ところを　さがして\nのろのろ　はいずりまわっている。"
        en:
          gold: "It never sleeps.\nIt has to keep\nmoving because if\fit stopped, its\nmagma body would\ncool and harden."
          silver: "A common sight in\nvolcanic areas, it\nslowly slithers\faround in a con-\nstant search for\nwarm places."
        fr:
          gold: "Il ne dort jamais.\nIl doit toujours\nse déplacer, car\fs’il est immobile,\nson corps de lave\nse solidifie."
          silver: "Commun dans les\nrégions volcani-\nques, il se\fdéplace sans cesse\npour trouver des\nendroits chauds."
        it:
          gold: "Non dorme mai.\nDeve essere sempre\nin movimento, o\fil suo corpo di\nmagma si raffredda\ne si secca."
          silver: "Comune nelle aree\nvulcaniche,\nstriscia intorno\flentamente, sempre\nalla ricerca di\nluoghi caldi."
        de:
          gold: "Es schläft nie. Es\nmuss in Bewegung\nbleiben, da sein\fMagma-Körper sonst\nabkühlen und\nerhärten würde."
          silver: "Es hält sich stän-\ndig bei Vulkanen\nauf und ist stets\fkriechend auf der\nSuche nach warmen\nAufenthaltsorten."
        es:
          gold: "No duerme nunca.\nTiene que seguir\nmoviéndose porque\fsi se detiene,\nsu cuerpo de lava\npodría enfriarse."
          silver: "Asiduo a las\nzonas volcànicas,\nse desliza\flentamente en\nbusca de lugares\ncalientes."
        ko:
          gold: "가만히 있으면 용암으로 만들어진\n몸이 식어서 딱딱해지기 때문에\n잠도 자지 않고 항상 움직인다"
          silver: "화산지대에 많이 나타난다\n따뜻한 곳을 찾아서\n느릿느릿 기어다니고 있다"
magcargo:
  species_id: 219
  names:
    jp_kana: マグカルゴ
    en: MAGCARGO
    fr: VOLCAROPOD
    it: MAGCARGO
    de: MAGCARGO
    es: MAGCARGO
    ko: 마그카르고
  forms:
    magcargo:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 120
        special_attack: 80
        special_defense: 80
        speed: 30
      types:
        - fire
        - rock
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "せなかのカラは　ひふが　ひえて\nかたまっただけ。なにかが\nふれただけで　かんたんに　くずれる。"
          silver: "せなかの　カラは　くずれやすいが\nときどき　たいないを　めぐっている\nこうねつの　ほのおが　ふきだす。"
        en:
          gold: "The shell on its\nback is just skin\nthat has cooled\fand hardened. It\nbreaks easily with\na slight touch."
          silver: "Its brittle shell\noccasionally\nspouts intense\fflames that cir-\nculate throughout\nits body."
        fr:
          gold: "La coquille sur\nson dos est une\npartie de sa peau\fqui s’est refroi-\ndie et solidifiée.\nElle est fragile."
          silver: "Sa coquille, très\nfragile, projette\nrégulièrement des\fflammes qui cir-\nculent dans son\ncorps."
        it:
          gold: "Il guscio sul\ndorso è pelle\nraffreddata e\fsecca. Si rompe\nfacilmente al\nminimo tocco."
          silver: "A volte, intense\nfiamme partono dal\nfragile guscio,\fcircolando lungo\ntutto il suo\ncorpo."
        de:
          gold: "Das Haus auf sei-\nnem Rücken ist\nausgehärtete Haut.\fEs zerbricht schon\nbei der geringsten\nBerührung."
          silver: "Aus seinem porösen\nSchneckengehäuse\nsprudeln Feuer-\ffontänen, die\nseinen Körper\ndurchfluten."
        es:
          gold: "La concha de su\nlomo son restos\nde piel enfriada y\fendurecida. Se\nrompe fàcilmente\ncon sólo tocarla."
          silver: "En ocasiones, su\nresbaladiza concha\nlanza intensas\fllamaradas que\nrecorren todo su\ncuerpo."
        ko:
          gold: "등껍질은 피부가 식어서\n딱딱해진 것으로 뭔가가\n부딪히기만 하면 간단히 부서진다"
          silver: "등껍질은 깨어지기 쉽지만\n가끔 체내를 순환하고 있는\n고열의 화염을 뿜어낸다"
swinub:
  species_id: 220
  names:
    jp_kana: ウリムー
    en: SWINUB
    fr: MARCACRIN
    it: SWINUB
    de: QUIEKEL
    es: SWINUB
    ko: 꾸꾸리
  forms:
    swinub:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 40
        special_attack: 30
        special_defense: 30
        speed: 50
      types:
        - ice
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "エサを　さがすため　はなを\nこすりあわせ　じめんを　ほっている。\nたまに　おんせんを　ほりあてる。"
          silver: "いい　においを　かぎつけると\nあとさき　かんがえず　においの\nほうこうへ　ダッシュしてしまう。"
        en:
          gold: "It rubs its snout\non the ground to\nfind and dig up\ffood. It sometimes\ndiscovers hot\nsprings."
          silver: "If it smells some-\nthing enticing, it\ndashes headlong\foff to find the\nsource of the\naroma."
        fr:
          gold: "Il renifle le sol\navec sa truffe\npour y dénicher de\fla nourriture. Il\ntrouve des fois\ndes sources d’eau."
          silver: "S’il sent une\nodeur attirante,\nil fonce tête la\fpremière pour en\ntrouver l’origine."
        it:
          gold: "Sfrega il muso sul\nterreno per scova-\nre del cibo.\fTalvolta scopre\nsorgenti d’acqua\ncalda."
          silver: "Appena avverte un\nprofumo invitante,\ncerca subito di\fcapire la\nprovenienza di\nquell’odore."
        de:
          gold: "Auf Nahrungssuche\nschnüffelt es am\nBoden entlang. Es\fentdeckt dabei\nmanchmal auch\nheiße Quellen."
          silver: "Wenn es etwas\nVielversprechendes\nerschnuppert, dann\fstürzt es in\nWindeseile\ndarauf zu."
        es:
          gold: "Frota su hocico\ncontra el suelo\npara desenterrar\fcomida. A veces\ndescubre aguas\ntermales."
          silver: "Si percibe un\naroma tentador,\nse tira de cabeza\fpara encontrar\nel origen de\ndicho olor."
        ko:
          gold: "먹이를 찾기 위해 코를\n이용해서 지면을 파고 있다\n가끔씩 온천을 발굴해낸다"
          silver: "좋은 냄새를 맡으면\n뒷일을 생각하지 않고 냄새나는\n방향으로 뛰어 달려간다"
piloswine:
  species_id: 221
  names:
    jp_kana: イノムー
    en: PILOSWINE
    fr: COCHIGNON
    it: PILOSWINE
    de: KEIFEL
    es: PILOSWINE
    ko: 메꾸리
  forms:
    piloswine:
      form_id: 0
      base_stats:
        hp: 100
        attack: 100
        defense: 80
        special_attack: 60
        special_defense: 60
        speed: 50
      types:
        - ice
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ながい　たいもうに　おおわれて\nめのまえの　ようすが　わからず\nひたすらに　とっしんを　くりかえす。"
          silver: "あいて　めがけて　とっしんするとき\nせなかの　たいもうが　さかだつ。\nおとに　ものすごく　びんかん。"
        en:
          gold: "Because the long\nhair all over its\nbody obscures its\fsight, it just\nkeeps charging\nrepeatedly."
          silver: "If it charges at\nan enemy, the\nhairs on its back\fstand up straight.\nIt is very sensi-\ntive to sound."
        fr:
          gold: "Ses yeux sont\nmasqués par ses\nlongs poils. Il ne\fvoit rien et se\ndéplace en\nchargeant."
          silver: "S’il charge un\nennemi, les poils\nde son dos se\fdressent. Il est\ntrès sensible au\nson."
        it:
          gold: "Poiché il lungo\npelo sul suo corpo\ngli impedisce di\fvedere, non fa che\ncaricare il nemico\nsenza tregua."
          silver: "Quando carica il\nnemico, i peli gli\nsi rizzano sul\fdorso. È molto\nsensibile ai\nsuoni."
        de:
          gold: "Da sein haariges\nFell seine Sicht\nenorm beeinträch-\ftigt, greift es\nständig an, um den\nGegner zu treffen."
          silver: "Beim Angriff auf\neinen Gegner\nstellen sich seine\fRückenhaare auf.\nEs hört außerge-\nwöhnlich gut."
        es:
          gold: "Como su largo\nvello corporal\nle impide ver con\fclaridad, sigue\natacando\nrepetidamente."
          silver: "Si carga contra un\nenemigo, los pelos\nde su lomo se\ferizaràn. Es muy\nsensible al\nsonido."
        ko:
          gold: "길다란 털로 덮혀있어서\n눈앞의 상태를 잘 모르고\n오직 돌진만을 반복한다"
          silver: "상대를 목표로 삼고 돌진할 때\n등에 있는 털이 곤두선다\n소리에 매우 민감하다"
corsola:
  species_id: 222
  names:
    jp_kana: サニーゴ
    en: CORSOLA
    fr: CORAYON
    it: CORSOLA
    de: CORASONN
    es: CORSOLA
    ko: 코산호
  forms:
    corsola:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 85
        special_attack: 65
        special_defense: 85
        speed: 35
      types:
        - water
        - rock
      egg_groups:
        - water_1
        - water_3
      descriptions:
        jp_kana:
          gold: "どんどん　そだっては　はえかわる\nあたまの　さきは　きれいなので\nたからもの　として　にんきがたかい。"
          silver: "みなみの　うみの　くにでは\nサニーゴの　しゅうだんの　うえで\nひとびとが　せいかつ　している。"
        en:
          gold: "It continuously\nsheds and grows.\nThe tip of its\fhead is prized as\na treasure for its\nbeauty."
          silver: "In a south sea\nnation, the people\nlive in communi-\fties that are\nbuilt on groups of\nthese POKéMON."
        fr:
          gold: "Il grandit en\npermanence. Le\nbout de sa tête\fest très recherché\nen témoignage de\nbeauté."
          silver: "Dans les îles du\nSud, des communau-\ntés se sont for-\fmées sur le dos de\ntels POKéMON."
        it:
          gold: "Muta la pelle e\ncresce di conti-\nnuo. La punta che\fha sul capo è un\nsimbolo della sua\nbellezza."
          silver: "A sud, vi è un\npopolo di mare che\nvive in comunità\ffondate su\nquesto tipo di\nPOKéMON."
        de:
          gold: "Es häutet sich im-\nmer und wächst.\nSeine Kopfspitze\fwurde als Schatz\nder Schönheit aus-\ngezeichnet."
          silver: "Sie schließen sich\nin Gruppen zu-\nsammen und bilden\fInseln, auf denen\nim Südmeer\nMenschen leben."
        es:
          gold: "Crece y muda\ncontinuamente.\nLa parte superior\fde su cabeza es\nmuy apreciada\npor su belleza."
          silver: "En un país\ncostero del sur,\nla gente vive en\fcomunidades sobre\ngrupos de este\nPOKéMON."
        ko:
          gold: "점점 자라면서 돋아나는\n머리의 끝은 아름답기에\n보석으로서 매우 인기가 높다"
          silver: "남쪽 바다의 나라에서는\n코산호의 집단 위에\n사람들이 생활을 하고 있다"
remoraid:
  species_id: 223
  names:
    jp_kana: テッポウオ
    en: REMORAID
    fr: REMORAID
    it: REMORAID
    de: REMORAID
    es: REMORAID
    ko: 총어
  forms:
    remoraid:
      form_id: 0
      base_stats:
        hp: 35
        attack: 65
        defense: 35
        special_attack: 65
        special_defense: 35
        speed: 65
      types:
        - water
      egg_groups:
        - water_1
        - water_2
      descriptions:
        jp_kana:
          gold: "ねらいは　せいかく。ふきだす　みずは\n１００メートルさきで　うごく\nえものに　かならず　めいちゅうする。"
          silver: "きゅうばんの　ように　へんかした\nせびれで　マンタインに　くっつき\nたべのこしを　わけてもらっている。"
        en:
          gold: "It has superb ac-\ncuracy. The water\nit shoots out can\fstrike even moving\nprey from more\nthan 300 feet."
          silver: "Using its dorsal\nfin as a suction\npad, it clings to\fa MANTINE’s under-\nside to scavenge\nfor leftovers."
        fr:
          gold: "Il est très précis\nquand il crache\nses jets d’eau.\fIl peut toucher\nune cible mouvante\nà 100 mètres."
          silver: "Se servant de sa\nnageoire dorsale,\nil s’accroche sous\fun DEMANTA pour\nrécupérer ses\nrestes."
        it:
          gold: "La sua precisione\nè straordinaria.\nPuò colpire una\fpreda in movimento\nanche a più\ndi 100 metri."
          silver: "Usando la pinna\ndorsale come una\nventosa, s’attacca\falla pancia di un\nMANTINE cibandosi\ndei suoi avanzi."
        de:
          gold: "Es ist äußerst\npräzise. Es kann\nmit seinem Wasser-\fschuss Beute erle-\ngen, die 100 Meter\nentfernt ist."
          silver: "Mit seiner Rücken-\nflosse saugt es\nsich an der Unter-\fseite eines MANTAX\nfest und lebt von\nSpeiseresten."
        es:
          gold: "Tiene muy buena\npuntería. Dispara\nagua a sus presas,\fhasta si se estàn\nmoviendo, a màs\nde 100 metros."
          silver: "Usando su aleta\ndorsal para\nsuccionar, se\fune a un MANTINE\npara buscar\nrestos de comida."
        ko:
          gold: "명사수로서 뿜어낸 물은\n100m 앞에서 움직이는\n먹이를 반드시 명중시킨다"
          silver: "빨판처럼 변화한\n등지느러미로 만타인에게 달라붙어\n먹다 남은 것을 얻어먹고 있다"
octillery:
  species_id: 224
  names:
    jp_kana: オクタン
    en: OCTILLERY
    fr: OCTILLERY
    it: OCTILLERY
    de: OCTILLERY
    es: OCTILLERY
    ko: 대포무노
  forms:
    octillery:
      form_id: 0
      base_stats:
        hp: 75
        attack: 105
        defense: 75
        special_attack: 105
        special_defense: 75
        speed: 45
      types:
        - water
      egg_groups:
        - water_1
        - water_2
      descriptions:
        jp_kana:
          gold: "がんじょうな　いしあたま。\nきゅうばんつきの　あしを　からませ\nひたすら　あたまで　うちすえる。"
          silver: "いわあなに　もぐりこむ　せいしつの\nもちぬしで　ねむくなると　ほかの\nオクタンの　すあなを　うばう。"
        en:
          gold: "It traps enemies\nwith its suction-\ncupped tentacles\fthen smashes them\nwith its rock-hard\nhead."
          silver: "It instinctively\nsneaks into rocky\nholes. If it gets\fsleepy, it steals\nthe nest of a fel-\nlow OCTILLERY."
        fr:
          gold: "Il capture ses\nennemis avec ses\ntentacules et les\fécrase ensuite\navec sa tête dure\ncomme la pierre."
          silver: "Il s’introduit\nfurtivement dans\nles rochers. S’il\fest fatigué, il\nprend le nid d’un\nautre OCTILLERY."
        it:
          gold: "Cattura i nemici\ncon le ventose dei\ntentacoli per poi\fcolpirli con il\nsuo capo duro\ncome pietra."
          silver: "S’introduce istin-\ntivamente in buchi\nnella roccia.\fSe ha sonno occupa\nla tana di un\naltro OCTILLERY."
        de:
          gold: "Beim Beutefang\nsetzt es seine\nTentakel ein. Es\fzermalmt seine\nBeute mit seinem\nsteinharten Kopf."
          silver: "Es verkriecht sich\ninstinktiv in\nFelshöhlen. Wird\fes müde, raubt es\ndas Versteck eines\nfremden OCTILLERY."
        es:
          gold: "Atrapa a los\nenemigos con\nsus tentàculos,\fy después los\ngolpea con su\ndura cabeza."
          silver: "Instintivamente\nse escabulle entre\nlas rocas. Si le\fentra sueño,\nrobarà la guarida\nde otro OCTILLERY."
        ko:
          gold: "견고한 돌머리\n빨판이 붙어있는 다리를 휘감아서\n오직 머리로 때려 공격한다"
          silver: "바위구멍에 숨어드는 성질을\n지녀서 잠이 오면 다른\n대포무노의 바위구멍 집을 빼앗는다"
delibird:
  species_id: 225
  names:
    jp_kana: デリバード
    en: DELIBIRD
    fr: CADOIZO
    it: DELIBIRD
    de: BOTOGEL
    es: DELIBIRD
    ko: 딜리버드
  forms:
    delibird:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 45
        special_attack: 65
        special_defense: 45
        speed: 75
      types:
        - ice
        - flying
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          gold: "１にち　ずっと　えさをはこんでる。\nそうなんした　ひとが　デリバードの\nえさで　たすかった　はなしもある。"
          silver: "きりたった　がけの　さきにある\nすで　まつ　ヒナたちのため\n１にちじゅう　えさを　はこんでいる。"
        en:
          gold: "It carries food\nall day long.\nThere are tales\fabout lost people\nwho were saved by\nthe food it had."
          silver: "It nests at the\nedge of sharp\ncliffs. It spends\fall day carrying\nfood to its await-\ning chicks."
        fr:
          gold: "Il transporte de\nla nourriture\ntoute la journée.\fIl porte secours\naux égarés en leur\ndonnant à manger."
          silver: "Il fait son nid\nau bord des falai-\nses abruptes. Il\fpasse sa journée à\nnourrir ses\npetits."
        it:
          gold: "Trasporta cibo per\ntutto il giorno.\nSi racconta che\fmolti dispersi si\nsiano salvati con\nil suo cibo."
          silver: "Fa la tana sugli\nspigoli di scogli\naguzzi. Passa il\fgiorno a portare\ncibo ai piccoli\naffamati."
        de:
          gold: "Es trägt immer\nLebensmittel bei\nsich. Man sagt,\fdass Verschollene\nnur wegen ihm\nüberlebten."
          silver: "Sein Nest baut es\nan scharfkantigen\nFelsklippen. Es\fist den ganzen Tag\nauf Futtersuche\nfür seine Jungen."
        es:
          gold: "Siempre lleva\ncomida. Dicen\nque hay muchos\fdesaparecidos que\nsobrevivieron\ngracias a ésta."
          silver: "Anida en el borde\nde escarpados\nacantilados. Se\fpasa todo el día\nllevando comida a\nsus polluelos."
        ko:
          gold: "하루종일 먹이를 운반한다\n조난당한 사람이 딜리버드의\n먹이로 살아난 이야기도 있다"
          silver: "깎아 세운 듯한 절벽 끝에 있는\n둥지에서 기다리는 새끼들을 위해\n하루종일 먹이를 운반하고 있다"
mantine:
  species_id: 226
  names:
    jp_kana: マンタイン
    en: MANTINE
    fr: DEMANTA
    it: MANTINE
    de: MANTAX
    es: MANTINE
    ko: 만타인
  forms:
    mantine:
      form_id: 0
      base_stats:
        hp: 65
        attack: 40
        defense: 70
        special_attack: 80
        special_defense: 140
        speed: 70
      types:
        - water
        - flying
      egg_groups:
        - water_1
      descriptions:
        jp_kana:
          gold: "ゆうぜんと　うみを　およぐ。\nたべのこしを　ねらった　テッポウオが\nくっついていても　きにしていない。"
          silver: "ひろい　うみを　じゆうに　およぐ。\nスピードが　のってくると　そのまま\nなみのうえに　とびだしてしまう。"
        en:
          gold: "As it majestically\nswims, it doesn’t\ncare if REMORAID\fattach to it for\nscavenging its\nleftovers."
          silver: "Swimming freely in\nopen seas, it may\nfly out of the\fwater and over the\nwaves if it builds\nup enough speed."
        fr:
          gold: "Il nage avec ma-\njesté. Il ne se\nsoucie pas si un\fREMORAID est at-\ntaché à son corps."
          silver: "Vivant en pleine\nmer, il peut voler\nhors de l’eau\fau-dessus des\nvagues s’il a\nassez de vitesse."
        it:
          gold: "Nuotando maesto-\nsamente, neppure\nsi accorge se un\fREMORAID gli sta\nattaccato per man-\ngiarne gli avanzi."
          silver: "Nuotando libero\nin mare aperto,\nse acquista velo-\fcità può uscire\ndall’acqua volando\nsulle onde."
        de:
          gold: "Da es so majes-\ntätisch schwimmt,\nschert es sich\fnicht um REMORAID,\ndas seine Essens-\nreste vertilgt."
          silver: "Auf offener See\nkann es so schnell\nwerden, dass es\fnach oben schwimmt\nund über den\nWellen fliegt."
        es:
          gold: "Mientras nada\nmajestuosamente,\nno le importa\fque REMORAID le\nsiga para comerse\nsus sobras."
          silver: "Nada libremente\nen mar abierto.\nSi va lo\fbastante ràpido,\nvolarà sobre las\nolas del mar."
        ko:
          gold: "유연하게 바다를 헤엄친다\n먹다 남긴 것을 노린 총어가\n달라붙어 있어도 신경쓰지 않는다"
          silver: "넓은 바다를 자유롭게 헤엄친다\n속도가 올라가면 그대로\n파도 위를 날아올라버린다"
skarmory:
  species_id: 227
  names:
    jp_kana: エアームド
    en: SKARMORY
    fr: AIRMURE
    it: SKARMORY
    de: PANZAERON
    es: SKARMORY
    ko: 무장조
  forms:
    skarmory:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 140
        special_attack: 40
        special_defense: 70
        speed: 70
      types:
        - steel
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "じょうぶな　ハネは　おもそうだが\nホネのなかは　くうどうで　かるく\nじゆうに　おおぞらを　とびまわる。"
          silver: "いばらの　なかに　すをつくる。\nトゲで　きずつきながら　そだてられた\nひなの　ハネは　かたくなる。"
        en:
          gold: "Its sturdy wings\nlook heavy, but\nthey are actually\fhollow and light,\nallowing it to fly\nfreely in the sky."
          silver: "After nesting in\nbramble bushes,\nthe wings of its\fchicks grow hard\nfrom scratches by\nthorns."
        fr:
          gold: "Ses ailes sont en\nfait légères et\ncreuses. Il vole\ffacilement et peut\natteindre de très\nhautes altitudes."
          silver: "Après avoir fait\nson nid dans les\nronces, ses petits\fs’endurcissent à\nforce d’être sans\ncesse éraflés."
        it:
          gold: "Le imponenti ali\nsembrano pesanti,\nma in realtà sono\fvuote e leggere, e\nlo fanno volare\nlibero nel cielo."
          silver: "Facendo il nido\ntra i rovi, le ali\ndei suoi piccoli\fsi rinforzano per\ni graffi causati\ndalle spine."
        de:
          gold: "Seine robusten\nFlügel scheinen\nschwer zu sein.\fAber sie sind hohl\nund es kann frei\nempor fliegen."
          silver: "Die dornigen\nZweige seines\nNests bewirken,\fdass die Flügel\nseiner Jungen fest\nund hart werden."
        es:
          gold: "Sus fuertes alas\nparecen pesadas,\naunque son\fhuecas y ligeras,\ny le permiten\nvolar libremente."
          silver: "Después de anidar\nen zarzas, las\nalas de sus\fpolluelos crecen\nfortalecidas por\nlos rasguños."
        ko:
          gold: "튼튼한 날개는 무겁게 보이지만\n뼛속은 비어있어서 가볍기에\n자유롭게 높은 하늘을 날아다닌다"
          silver: "가시나무 안에 둥지를 만든다\n가시에 상처를 입어가며 자란\n새끼들의 날개는 단단해진다"
houndour:
  species_id: 228
  names:
    jp_kana: デルビル
    en: HOUNDOUR
    fr: MALOSSE
    it: HOUNDOUR
    de: HUNDUSTER
    es: HOUNDOUR
    ko: 델빌
  forms:
    houndour:
      form_id: 0
      base_stats:
        hp: 45
        attack: 60
        defense: 30
        special_attack: 80
        special_defense: 50
        speed: 65
      types:
        - dark
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "なかまに　れんらく　するときと\nえものを　おいつめるときでは\nなきごえの　しゅるいが　ちがうのだ。"
          silver: "なかまだけで　わかりあえる\nなきごえで　おたがいの　いちを\nたしかめながら　えものをおいつめる。"
        en:
          gold: "It uses different\nkinds of cries for\ncommunicating with\fothers of its kind\nand for pursuing\nits prey."
          silver: "To corner prey,\nthey check each\nother’s location\fusing barks that\nonly they can\nunderstand."
        fr:
          gold: "Il communique en\nproduisant diffé-\nrents cris avec\fses semblables ou\nquand il poursuit\nsa proie."
          silver: "Pour traquer leur\nproie, ils se\nlocalisent mutuel-\flement avec des\naboiements compris\npar eux seuls."
        it:
          gold: "Usa versi diffe-\nrenti per \ncomunicare con\faltri del suo tipo\ne per inseguire\nla preda."
          silver: "Per circondare la\npreda, decidono\nla loro posizione\fcomunicando con\nguaiti che ca-\npiscono solo loro."
        de:
          gold: "Sein Ruf bei der\nBeutejagd unter-\nscheidet sich von\fdem Ruf, wenn es\nmit Artgenossen\nkommuniziert."
          silver: "Sie treiben ihre\nBeute in die Enge\nund orientieren\fsich dabei anhand\nihres Bellens, das\nnur sie verstehen."
        es:
          gold: "Usa diferentes\ntipos de gritos\npara comunicarse\fcon los de su\nespecie, o para\nseguir a su presa."
          silver: "Para arrinconar\na su presa,\ncomprueban sus\fposiciones con\nladridos que sólo\nellos entienden."
        ko:
          gold: "동료에게 연락을 할 때랑\n먹이를 쫓을 때에는\n울음소리의 종류가 다르다"
          silver: "동료들끼리만 서로 알 수 있는\n울음소리로 서로의 위치를\n확인해가며 먹이를 몰아 붙인다"
houndoom:
  species_id: 229
  names:
    jp_kana: ヘルガー
    en: HOUNDOOM
    fr: DEMOLOSSE
    it: HOUNDOOM
    de: HUNDEMON
    es: HOUNDOOM
    ko: 헬가
  forms:
    houndoom:
      form_id: 0
      base_stats:
        hp: 75
        attack: 90
        defense: 50
        special_attack: 110
        special_defense: 80
        speed: 95
      types:
        - dark
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "くちから　ふきだす　ほのおで\nやけどすると　いつまでたっても\nキズぐちが　うずいてしまう。"
          silver: "ぶきみな　とおぼえを　きいた\nポケモンは　ふるえ　いちもくさんに\nじぶんの　すに　もどる。"
        en:
          gold: "If you are burned\nby the flames it\nshoots from its\fmouth, the pain\nwill never go\naway."
          silver: "Upon hearing its\neerie howls, other\nPOKéMON get the\fshivers and head\nstraight back to\ntheir nests."
        fr:
          gold: "Les blessures\nprovoquées par son\nsouffle de flamme\fsont permanentes\net la douleur ne\ns’en va jamais."
          silver: "En entendant ses\nhurlements sinis-\ntres, les autres\fPOKéMON prennent\npeur et fuient\nvers leur nid."
        it:
          gold: "Se si è bruciati\ndalle fiamme che\nsputa dalla bocca,\fil dolore\nrimarrà per\nsempre."
          silver: "Udendo i loro spa-\nventosi latrati,\ngli altri POKéMON\finiziano a tremare\ne si precipitano\nnelle loro tane."
        de:
          gold: "Wirst du von den\nFlammen getroffen,\ndie aus seinem\fMund schießen,\nwirst du für immer\ngebrandmarkt sein."
          silver: "Wenn andere\nPOKéMON sein\ngräuliches Geheul\fhören, erschauern\nsie und verstecken\nsich schleunigst."
        es:
          gold: "Si te quemas con\nlas llamas que\nlanza por su\fboca, el dolor\nno desaparecerà\nnunca."
          silver: "Al oír sus\nsiniestros\naullidos, los\fotros POKéMON se\nestremecen y\nse guarecen."
        ko:
          gold: "입에서 뿜어내는 화염으로\n화상을 입으면 시간이 흘러도\n상처난 자리가 쑤시고 지끈거린다"
          silver: "기분나쁜 울음소리를 들은\n포켓몬은 겁을 내서 그대로 곧장\n자신의 둥지에 되돌아온다"
kingdra:
  species_id: 230
  names:
    jp_kana: キングドラ
    en: KINGDRA
    fr: HYPOROI
    it: KINGDRA
    de: SEEDRAKING
    es: KINGDRA
    ko: 킹드라
  forms:
    kingdra:
      form_id: 0
      base_stats:
        hp: 75
        attack: 95
        defense: 95
        special_attack: 95
        special_defense: 95
        speed: 85
      types:
        - water
        - dragon
      egg_groups:
        - water_1
        - dragon
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          gold: "ふだんは　かいていどうくつに\nみを　ひそめているらしい。あくびで\nうずしおを　はっせいさせる。"
          silver: "ちからを　たくわえるため　ふかい\nかいていで　ねむっているらしい。\nめざめると　たつまきに　なるという。"
        en:
          gold: "It is said that it\nusually hides in\nunderwater caves.\fIt can create\nwhirlpools by\nyawning."
          silver: "It sleeps deep on\nthe ocean floor to\nbuild its energy.\fIt is said to\ncause tornadoes as\nit wakes."
        fr:
          gold: "On dit qu’il se\ncache dans les\ngrottes marines.\fIl peut créer des\ntourbillons en\nbaillant."
          silver: "Il dort au plus\nprofond de l’océ-\nan pour accumuler\fde l’énergie. Son\nréveil cause des\ntornades."
        it:
          gold: "Si dice che si\nnasconda in grotte\nsottacqua.\fIl suo sbadiglio\npuò provocare\ndei vortici."
          silver: "Dorme sul fondo\ndell’oceano per\nricaricarsi di\fenergia. Si dice\nche causi uragani\nquando si sveglia."
        de:
          gold: "Man sagt, es hause\nin Unterwasserhöh-\nlen. Es kann mäch-\ftige Strudel ge-\nnerieren, wenn es\ngähnt."
          silver: "Tief unten am\nMeeresboden tankt\nes Energie im\fSchlaf. Wacht es\nauf, kann es\nTornados auslösen."
        es:
          gold: "Dicen que suele\nesconderse en\ncuevas submarinas.\fPuede crear\ntorbellinos al\nbostezar."
          silver: "Duerme en el fondo\ndel océano para\nrecargarse de\fenergía. Dicen que\ncausa tornados\ncuando se levanta."
        ko:
          gold: "보통은 해저동굴에\n몸을 숨기고 있다는 것 같다\n하품으로 소용돌이를 발생시킨다"
          silver: "힘을 비축하기 위해 깊은\n해저에서 잠들어 있다고 전해진다\n눈을 뜨면 회오리가 된다고 한다"
phanpy:
  species_id: 231
  names:
    jp_kana: ゴマゾウ
    en: PHANPY
    fr: PHANPY
    it: PHANPY
    de: PHANPY
    es: PHANPY
    ko: 코코리
  forms:
    phanpy:
      form_id: 0
      base_stats:
        hp: 90
        attack: 60
        defense: 60
        special_attack: 40
        special_defense: 40
        speed: 40
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "じゃれている　つもりで\nはなを　ふりまわしてくるが\nかなりの　ちからなので　あぶない。"
          silver: "あいじょう　ひょうげんで　はなを\nぶつけてくるが　ちからが　あるので\nきをつけないと　ふっとばされる。"
        en:
          gold: "It swings its long\nsnout around play-\nfully, but because\fit is so strong,\nthat can be dan-\ngerous."
          silver: "As a sign of af-\nfection, it bumps\nwith its snout.\fHowever, it is so\nstrong, it may\nsend you flying."
        fr:
          gold: "Il balance sa\ntrompe pour\ns’amuser, mais il\fest si fort que\ncela peut être\ndangereux."
          silver: "Il se cogne sur\ncelui ou celle\nqu’il apprécie.\fIl est cependant\nsi fort qu’il\nfait souvent mal."
        it:
          gold: "Agita la\nproboscide per\ngioco, ma è\fcosì forte che\npuò essere\npericoloso."
          silver: "Dà colpi con il\nmuso in segno di\naffetto, ma è così\fforte che può far\nvolare la gente in\nquesto modo."
        de:
          gold: "Es wirft seinen\nlangen Rüssel im\nSpiel wild umher.\fDa es so stark\nist, könnte dies\ngefährlich werden."
          silver: "Als Zeichen seiner\nZuneigung stubbst\nes dich mit dem\fRüssel, was dich\naber buchstäblich\numwerfen könnte."
        es:
          gold: "Mueve su larga\ntrompa para jugar,\npero como es tan\ffuerte, esto\npodría resultar\npeligroso."
          silver: "Como muestra de\nafecto, golpea\ncon su trompa.\fAunque es tan\nfuerte que te\nmandarà lejos."
        ko:
          gold: "재롱을 부릴 생각으로\n코를 휘두르며 오지만\n굉장한 힘이 실려있어서 위험하다"
          silver: "애정표현으로 코를\n부딛치지만 힘이 있기 때문에\n조심하지 않으면 날아가 버린다"
donphan:
  species_id: 232
  names:
    jp_kana: ドンファン
    en: DONPHAN
    fr: DONPHAN
    it: DONPHAN
    de: DONPHAN
    es: DONPHAN
    ko: 코리갑
  forms:
    donphan:
      form_id: 0
      base_stats:
        hp: 90
        attack: 120
        defense: 120
        special_attack: 60
        special_defense: 60
        speed: 50
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "するどく　かたい　キバと\nさらに　がんじょうな　ひふでの\nたいあたりは　いえをも　こわすほど。"
          silver: "キバが　ながくて　おおきいほど\nむれのなかでの　ランクが　たかい。\nキバがのびるには　じかんがかかる。"
        en:
          gold: "It has sharp, hard\ntusks and a rugged\nhide. Its TACKLE\fis strong enough\nto knock down a\nhouse."
          silver: "The longer and\nbigger its tusks,\nthe higher its\frank in its herd.\nThe tusks take\nlong to grow."
        fr:
          gold: "Il a des défenses\naiguisées et une\npeau épaisse. Ses\fCHARGES peuvent\ndétruire une\nmaison."
          silver: "Plus grandes sont\nses défenses, plus\nhaut est son rang\fdans le troupeau.\nSes défenses pous-\nsent lentement."
        it:
          gold: "Ha zanne dure e\naffilate e la\npelle grinzosa.\fLa sua AZIONE è\ncosì forte da ab-\nbattere una casa."
          silver: "Più grandi sono le\nzanne, più alto è\nil suo rango nel\fbranco.\nLe zanne crescono\nlentamente."
        de:
          gold: "Aufgrund seiner\nscharfen Stoßzähne\nund seiner rauen\fHaut, könnte es\nmit TACKLE ein\nHaus niederreißen."
          silver: "Je größer und\nlänger die Stoß-\nzähne, desto höher\fist ihr Rang in\nder Herde, doch\ndas dauert lange."
        es:
          gold: "Tiene afilados y\nduros colmillos, y\nuna gruesa piel.\fSu PLACAJE es tan\nfuerte que puede\nderribar una casa."
          silver: "Cuanto màs grandes\nson sus colmillos,\nmayor su estatus\fen la manada. Los\ncolmillos tardan\nmucho en crecer."
        ko:
          gold: "잘 드는 단단한 송곳니랑\n더욱이 견고한 피부로 \n몸통박치기는 집을 무너뜨릴 정도다"
          silver: "송곳니가 길고 클수록\n무리 중에서 서열이 높다\n송곳니가 자라는데는 시간이 걸린다"
porygon2:
  species_id: 233
  names:
    jp_kana: ポリゴン２
    en: PORYGON2
    fr: PORYGON2
    it: PORYGON2
    de: PORYGON2
    es: PORYGON2
    ko: 폴리곤2
  forms:
    porygon2:
      form_id: 0
      base_stats:
        hp: 85
        attack: 80
        defense: 90
        special_attack: 105
        special_defense: 95
        speed: 60
      types:
        - normal
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          gold: "わくせい　かいはつが　できるよう\nポリゴンを　バージョンアップしたが\nまだ　そらも　とべない。"
          silver: "さらに　けんきゅうが　すすめられ\nのうりょくが　たかまった。ときどき\nプログラムにない　しぐさを　みせる。"
        en:
          gold: "This upgraded\nversion of PORYGON\nis designed for\fspace exploration.\nIt can’t fly,\nthough."
          silver: "Further research\nenhanced its abil-\nities. Sometimes,\fit may exhibit\nmotions that were\nnot programmed."
        fr:
          gold: "Cette version\naméliorée de\nPORYGON a été\fcréée pour\nl’exploration de\nl’espace."
          silver: "Des recherches\npoussées ont amé-\nlioré ses capa-\fcités. Il a appris\nde nouveaux\nmouvements."
        it:
          gold: "Questa evoluzione\ndi PORYGON è\nadatta alle\fesplorazioni nello\nspazio. Tuttavia\nnon sa volare."
          silver: "Ricerche avanzate\nhanno potenziato\nle sue capacità.\fOra può fare movi-\nmenti che non\nerano programmati."
        de:
          gold: "Diese verbesserte\nPORYGON-Version,\nwurde für den Ein-\fsatz im Weltall\ngebaut. Es kann a-\nber nicht fliegen."
          silver: "Seine Fähigkeiten\nwurden verbessert.\nEs zeigt manchmal\fsogar Handlungen,\ndie nicht einpro-\ngrammiert sind."
        es:
          gold: "Esta versión\nmejorada de\nPORYGON fue creada\fpara explorar el\nespacio, aunque\nno puede volar."
          silver: "La investigación\nmejoró sus\nhabilidades. A\fveces, puede\nactuar de forma\nno programada."
        ko:
          gold: "혹성 개발을 할 수 있도록\n폴리곤을 버전업 했지만\n아직 하늘도 날지 못한다"
          silver: "더욱 연구가 진행되어\n능력이 올라갔다. 가끔\n프로그램에 없는 동작을 보인다"
stantler:
  species_id: 234
  names:
    jp_kana: オドシシ
    en: STANTLER
    fr: CERFROUSSE
    it: STANTLER
    de: DAMHIRPLEX
    es: STANTLER
    ko: 노라키
  forms:
    stantler:
      form_id: 0
      base_stats:
        hp: 73
        attack: 95
        defense: 62
        special_attack: 85
        special_defense: 65
        speed: 85
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ツノの　まがりぐあいが　まわりの\nくうきの　ながれを　びみょうにかえ\nふしぎな　くうかんを　つくりだす。"
          silver: "ツノの　かたちを　みていると\nかんかくが　だんだん　おかしくなり\nじぶんの　ちからで　たてなくなる。"
        en:
          gold: "The curved antlers\nsubtly change the\nflow of air to\fcreate a strange\nspace where real-\nity is distorted."
          silver: "Those who stare at\nits antlers will\ngradually lose\fcontrol of their\nsenses and be\nunable to stand."
        fr:
          gold: "Ses bois tordus\nchangent le flot\nde l’air et créent\fune distorsion\nspatiale dans\nla réalité."
          silver: "Ceux qui observent\nses bois perdront\nprogressivement\fleurs sens et ne\npourront plus se\ntenir debout."
        it:
          gold: "Le corna ricurve\nmodificano le cor-\nrenti d’aria,\fcreando una strana\nzona di distorsio-\nne della realtà."
          silver: "Chi osserva le sue\ncorna perde gra-\ndualmente i\fsensi e la\ncapacità di stare\nin piedi."
        de:
          gold: "Sein gebogenes Ge-\nweih generiert\nvia Luftänderung\feinen Raum, in dem\ndie Wirklichkeit\nverzerrt wird."
          silver: "Der Anblick seines\nGeweihs lässt den\nBetrachter ohn-\fmächtig werden\nund zu Boden\nsinken."
        es:
          gold: "Su cornamenta\ncambia el flujo\ndel aire para\fcrear un espacio\nde realidad\ndistorsionada."
          silver: "Todo aquél que se\nquede mirando\nsu cornamenta,\fperderà el\ncontrol y el\nequilibrio."
        ko:
          gold: "뿔의 휘어진 상태가 주변의\n공기흐름을 미묘하게 바꿔서\n이상한 공간을 만들어낸다"
          silver: "뿔의 모양을 보고있으면\n감각이 점점 이상해져서\n자신의 힘으로 서있을 수 없게된다"
smeargle:
  species_id: 235
  names:
    jp_kana: ドーブル
    en: SMEARGLE
    fr: QUEULORIOR
    it: SMEARGLE
    de: FARBEAGLE
    es: SMEARGLE
    ko: 루브도
  forms:
    smeargle:
      form_id: 0
      base_stats:
        hp: 55
        attack: 20
        defense: 35
        special_attack: 20
        special_defense: 45
        speed: 75
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "シッポの　さきから　ぶんぴつする\nえきたいを　あちこちに　ぬりつけて\nじぶんの　なわばりを　アピールする。"
          silver: "おとなになると　なかまから\nせなかに　あしあとの　マークを\nつけられる　しゅうせいを　もつ。"
        en:
          gold: "A special fluid\noozes from the tip\nof its tail. It\fpaints the fluid\neverywhere to mark\nits territory."
          silver: "Once it becomes an\nadult, it has a\ntendency to let\fits comrades plant\nfootprints on its\nback."
        fr:
          gold: "Un liquide coule\ndu bout de sa\nqueue. Il peint\favec ce fluide\npour marquer son\nterritoire."
          silver: "Arrivé à l’âge\nadulte, il laisse\nses camarades po-\fser leur emprein-\nte de patte sur\nson dos."
        it:
          gold: "Sulla coda ha un\nfluido speciale,\nche lascia\fovunque per\nmarcare il suo\nterritorio."
          silver: "Quando è adulto\ntende a farsi\nlasciare orme\fdi zampe sul\ndorso dai propri\ncompagni."
        de:
          gold: "Eine spezielle\nFlüssigkeit tritt\nan seiner Schwanz-\fspitze aus, mit\nder es sein Re-\nvier markiert."
          silver: "Ist es erwachsen,\nlässt es sich gern\nvon seinen Kamera-\fden Fußabdrücke\nauf den Rücken\nsetzen."
        es:
          gold: "La punta de su\ncola rezuma un\nfluido especial.\fLo pinta todo con\neste líquido para\nmarcar su terreno."
          silver: "Cuando llega a\nadulto, suele\ndejar que sus\fcamaradas dejen\nsus huellas sobre\nsu lomo."
        ko:
          gold: "꼬리 끝에서 분비하는\n액체를 여기저기에 칠해서\n자신의 세력권을 어필한다"
          silver: "어른이되면 동료로부터\n등에 발자국의 마크를\n받는 습성을 가진다"
tyrogue:
  species_id: 236
  names:
    jp_kana: バルキー
    en: TYROGUE
    fr: DEBUGANT
    it: TYROGUE
    de: RABAUZ
    es: TYROGUE
    ko: 배루키
  forms:
    tyrogue:
      form_id: 0
      base_stats:
        hp: 35
        attack: 35
        defense: 35
        special_attack: 35
        special_defense: 35
        speed: 35
      types:
        - fighting
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "いつでも　げんきいっぱい。\nつよくなるため　まけても　まけても\nあいてに　たちむかっていく。"
          silver: "てごろな　あいてを　みつけると\nすぐに　なぐりかかってくるので\nちいさくても　ゆだんならない。"
        en:
          gold: "It is always\nbursting with en-\nergy. To make it-\fself stronger, it\nkeeps on fighting\neven if it loses."
          silver: "Even though it is\nsmall, it can’t be\nignored because\fit will slug any\nhandy target with-\nout warning."
        fr:
          gold: "Il est plein\nd’énergie. Il se\nbat tout le temps\fpour être plus\nfort, quitte à\nperdre un combat."
          silver: "Même petit il ne\nvaut mieux pas\nl’ignorer:\fil frappe fort\net souvent\nsans prévenir."
        it:
          gold: "È sempre traboc-\ncante di energia.\nPer rinforzarsi\fcontinua a combat-\ntere anche dopo\naver perso."
          silver: "È piccolo, ma non\npassa inosservato,\nperché colpisce\fsenza preavviso\nqualsiasi oggetto\nnelle vicinanze."
        de:
          gold: "Es strotzt vor\nEnergie. Um noch\nstärker zu werden,\fkämpft es weiter,\nauch wenn es ver-\nloren hat."
          silver: "Es ist zwar nicht\ngroß, aber dennoch\nunübersehbar, denn\fes schlägt jeder\nZeit ohne\nVorwarnung zu."
        es:
          gold: "Ataca siempre con\nmucha energía.\nPara fortalecerse\fa sí mismo, sigue\nluchando aunque\npierda."
          silver: "Aunque es pequeño,\nes mejor no\nignorarlo porque\fatacarà cualquier\nobjetivo sin\nprevio aviso."
        ko:
          gold: "항상 기운이 넘친다\n강해지기 위해 계속 져도\n상대에게 덤벼든다"
          silver: "어울리는 상대를 발견하면\n바로 공격해오기 때문에\n몸집이 작아도 방심은 할 수 없다"
hitmontop:
  species_id: 237
  names:
    jp_kana: カポエラー
    en: HITMONTOP
    fr: KAPOERA
    it: HITMONTOP
    de: KAPOERA
    es: HITMONTOP
    ko: 카포에라
  forms:
    hitmontop:
      form_id: 0
      base_stats:
        hp: 50
        attack: 95
        defense: 95
        special_attack: 35
        special_defense: 110
        speed: 70
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "おどるように　かれいで　なめらかな\nキックわざに　みとれていると\nきつい　いちげきを　おみまいされる。"
          silver: "くるくる　まわって　キックをはなつ。\nこうそくで　まわっていると\nそのまま　じめんに　もぐっていく。"
        en:
          gold: "If you become\nenchanted by its\nsmooth, elegant,\fdance-like kicks,\nyou may get\ndrilled hard."
          silver: "It launches kicks\nwhile spinning. If\nit spins at high\fspeed, it may bore\nits way into the\nground."
        fr:
          gold: "Si vous êtes\nfasciné par sa\ndanse de coups\fde pieds, vous\nrisquez de le\nregretter."
          silver: "Il donne des coups\nde pied tout en\ntournant. Il\ftourne si vite\nqu’il peut ainsi\ncreuser le sol."
        it:
          gold: "Se ci si fa incan-\ntare dall’elegante\ndanza dei suoi\fcalci, si rischia\ndi ricevere una\nbella lezione."
          silver: "Gira su se stesso\ntirando calci.\nSe gira molto\fvelocemente può\nscavare una fossa\nnel terreno."
        de:
          gold: "Lässt du dich von\nseinen eleganten,\nanmutigen und\ftanzartigen Trit-\nten betören, wirst\ndu vermöbelt."
          silver: "Es dreht sich um\nsich selbst und\nverteilt Tritte.\fIst es schnell\ngenug, bohrt es\nsich in den Boden."
        es:
          gold: "Si te gustan sus\nsuaves, elegantes\ny danzarinas\fpatadas,\nacabaràs\ntaladrado."
          silver: "Lanza patadas\nmientras gira.\nSi alcanza mucha\fvelocidad, puede\ncavar un hoyo\nen la tierra."
        ko:
          gold: "춤추듯이 화려하고 거침없는\n발차기 기술에 넋을 잃고있으면\n강력한 일격을 선사한다"
          silver: "빙글빙글 돌며 킥을 날린다\n고속으로 돌다보면\n그대로 지면을 파고들어 간다"
smoochum:
  species_id: 238
  names:
    jp_kana: ムチュール
    en: SMOOCHUM
    fr: LIPPOUTI
    it: SMOOCHUM
    de: KUSSILLA
    es: SMOOCHUM
    ko: 뽀뽀라
  forms:
    smoochum:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 15
        special_attack: 85
        special_defense: 65
        speed: 65
      types:
        - ice
        - psychic
      egg_groups:
        - undiscovered
      held_items:
        common: ice_berry
        rare: ice_berry
      descriptions:
        jp_kana:
          gold: "くちびるが　いちばん　びんかん。\nなんでも　まず　くちびるで　ふれて\nどんなものか　かくにんする。"
          silver: "いつも　くちづけ　するかのように\nゆったりとした　りズムで\nくびを　ぜんごに　ゆらしている。"
        en:
          gold: "Its lips are the\nmost sensitive\nparts on its body.\fIt always uses its\nlips first to\nexamine things."
          silver: "It always rocks\nits head slowly\nbackwards and for-\fwards as if it is\ntrying to kiss\nsomeone."
        fr:
          gold: "Ses lèvres sont la\npartie la plus\nsensible de son\fcorps. Il les\nutilise pour exa-\nminer les objets."
          silver: "Il balance sa tête\nd’avant en arrière\net donne l’imp-\fression d’essayer\nd’embrasser\nquelqu’un."
        it:
          gold: "Le labbra sono la\nparte più sensi-\nbile del corpo, il\fprimo organo con\ncui analizza\nnuovi oggetti."
          silver: "Continua a muovere\nla testa avanti e\nindietro lentamen-\fte, come se\nprovasse a baciare\nqualcuno."
        de:
          gold: "Die Lippen sind\nsein empfindlichs-\nter Körperteil.\fNeue Dinge unter-\nsucht es zuerst\ndamit."
          silver: "Es wippt mit dem\nKopf langsam vor\nund zurück, als\fversuche es,\njemanden zu\nküssen."
        es:
          gold: "Sus labios son la\nparte màs sensible\nde su cuerpo.\fSiempre los usa\npara examinar\nlas cosas."
          silver: "Siempre mueve la\ncabeza hacia\ndelante y hacia\fatràs como si\nquisiera besar\na alguien."
        ko:
          gold: "입술이 제일 민감하다\n무엇이든지 먼저 입술로 건드려서\n어떤 것인지 확인한다"
          silver: "항상 뽀뽀를 하려는듯이\n편안한 리듬으로\n목을 전후로 흔들고 있다"
elekid:
  species_id: 239
  names:
    jp_kana: エレキッド
    en: ELEKID
    fr: ELEKID
    it: ELEKID
    de: ELEKID
    es: ELEKID
    ko: 에레키드
  forms:
    elekid:
      form_id: 0
      base_stats:
        hp: 45
        attack: 63
        defense: 37
        special_attack: 65
        special_defense: 55
        speed: 95
      types:
        - electric
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "うでを　ぐるぐるまわして　でんきを\nはっせいさせるが　すぐ　つかれるので\nすこししか　でんきが　ためられない。"
          silver: "どんなに　はげしい　あらしでも\nかみなりが　なっていれば\nたのしそうに　あそびまわる。"
        en:
          gold: "It rotates its\narms to generate\nelectricity, but\fit tires easily,\nso it charges up\nonly a little bit."
          silver: "Even in the most\nvicious storm,\nthis POKéMON plays\fhappily if thunder\nrumbles in the\nsky."
        fr:
          gold: "Il fait pivoter\nses bras pour\ncréer de l’énergie\fpendant un bref\ninstant car il se\nfatigue vite."
          silver: "Ce POKéMON joue\ntoujours gaiement,\nmême dans le plus\fviolent des ora-\nges, au milieu de\nterribles éclairs."
        it:
          gold: "Genera elettricità\nruotando le\nbraccia, ma non fa\fmai una ricarica\ncompleta perché si\nstanca presto."
          silver: "Anche nelle più\nimpetuose tempeste\nquesto POKéMON\fgioca allegramente\nse ode il rombo di\nun tuono in cielo."
        de:
          gold: "Es rotiert mit den\nArmen, um Elektri-\nzität zu erzeugen.\fDa es sehr schnell\nmüde wird, erzeugt\nes nur wenig."
          silver: "Im schlimmsten\nSturm, mit Blitzen\nund Donnergetöse,\ffühlt sich dieses\nPOKéMON am\nwohlsten."
        es:
          gold: "Gira sus brazos\npara generar\nelectricidad, pero\fse agota ràpido,\nasí que sólo se\nrecarga un poco."
          silver: "Incluso en la\npeor de las\ntormentas, este\fPOKéMON juega\nfeliz si un trueno\ncruza el cielo."
        ko:
          gold: "팔을 빙글빙글 돌려서 전기를\n발생시키지만 곧 지쳐버려\n조금밖에 전기가 모이지 않는다"
          silver: "아무리 거친 폭풍 속이라도\n번개가 치고 있다면\n즐겁게 놀고 다닌다"
magby:
  species_id: 240
  names:
    jp_kana: ブビィ
    en: MAGBY
    fr: MAGBY
    it: MAGBY
    de: MAGBY
    es: MAGBY
    ko: 마그비
  forms:
    magby:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 37
        special_attack: 70
        special_defense: 55
        speed: 83
      types:
        - fire
      egg_groups:
        - undiscovered
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          gold: "いきを　すったり　はいたり\nするたびに　くちと　はなから\nひのこが　もれてしまう。"
          silver: "かざんの　ふんかこうで　みつかる。\nたいおんは　６００ども　あるので\nこがらだが　あなどれない。"
        en:
          gold: "Each and every\ntime it inhales\nand exhales, hot\fembers dribble out\nof its mouth and\nnostrils."
          silver: "It is found in\nvolcanic craters.\nIts body temp. is\fover 1100 degrees,\nso don’t under-\nestimate it."
        fr:
          gold: "A chaque fois\nqu’il respire, des\nbraises brûlantes\fsortent de sa\nbouche et de ses\nnarines."
          silver: "On le trouve dans\nle cratère des\nvolcans. Sa tempé-\frature dépasse les\n600 degrés, alors\nfaites attention!"
        it:
          gold: "Ogni volta che\ninspira ed espira,\nbrace ardente gli\fesce dalla\nbocca e\ndalle narici."
          silver: "Si trova nei cra-\nteri dei vulcani e\nla sua temperatura\fcorporea supera i\n600 gradi. Non è\nda sottovalutare."
        de:
          gold: "Bei jedem Atemzug\nspringen glühende\nKohlenstücke aus\fseinem Mund und\naus seinen Nasen-\nlöchern."
          silver: "Zu finden ist es\nin Vulkankratern.\nSeine Körpertem-\fperatur erreicht\nüber 600 Grad.\nVergiss das nicht!"
        es:
          gold: "Cada vez que\ninspira y expira,\nlanza ascuas\fpor su boca y\npor sus fosas\nnasales."
          silver: "Aparece en los\ncràteres de los\nvolcanes. Puede\falcanzar los\n600’v, así que\nno lo subestimes."
        ko:
          gold: "숨을 쉬거나 뱉거나\n할 때마다 입과 코에서\n불꽃이 새어나와 버린다"
          silver: "화산의 분화구에서 발견할 수 있다\n체온은 600도가 넘기 때문에\n작다고 업신여길 수 없다"
miltank:
  species_id: 241
  names:
    jp_kana: ミルタンク
    en: MILTANK
    fr: ECREMEUH
    it: MILTANK
    de: MILTANK
    es: MILTANK
    ko: 밀탱크
  forms:
    miltank:
      form_id: 0
      base_stats:
        hp: 95
        attack: 80
        defense: 105
        special_attack: 40
        special_defense: 70
        speed: 100
      types:
        - normal
      egg_groups:
        - field
      held_items:
        common: moomoo_milk
        rare: moomoo_milk
      descriptions:
        jp_kana:
          gold: "ミルクは　えいようまんてん。\nおとしよりや　びょうきの　ひとに\nとって　さいこうの　のみもの。"
          silver: "こどもが　うまれたときに\nしぼられた　ミルクには　いつもより\nえいようが　たっぷり　つまっている。"
        en:
          gold: "Its milk is packed\nwith nutrition,\nmaking it the\fultimate beverage\nfor the sick or\nweary."
          silver: "If it has just had\na baby, the milk\nit produces con-\ftains much more\nnutrition than\nusual."
        fr:
          gold: "Son lait est plein\nd’énergie nutri-\ntive. C’est une\fboisson parfaite\npour les malades\net les fatigués."
          silver: "Si elle vient\nd’avoir un petit,\nson lait est bien\fplus nutritif que\nd’habitude."
        it:
          gold: "Il suo latte è\nricco di sostanze\nnutritenti, che ne\ffanno il miglior\nrimedio per chi è\nstanco o ammalato."
          silver: "Se ha appena avuto\nun piccolo, il\nlatte che produce\fè molto più\nnutriente del\nnormale."
        de:
          gold: "Aufgrund der vie-\nlen Nährstoffe\nstellt seine Milch\fdas ideale Getränk\nfür Kranke und\nSchwache dar."
          silver: "Wenn es gerade ein\nJunges hat, dann\nenthält seine\fMilch mehr Nähr-\nstoffe als\ngewöhnlich."
        es:
          gold: "Su leche, rica en\nnutrientes, es la\nmejor bebida\fcontra el\ncansancio y\nla enfermedad."
          silver: "Si sólo tiene una\ncría, la leche\nque produce\fcontiene muchos\nmàs nutrientes\nde lo normal."
        ko:
          gold: "우유는 영양만점이다\n노인이랑 병자들에게\n있어서 최고의 음식이다"
          silver: "새끼가 태어났을 때에\n짜낸 우유는 평상시보다\n영양이 듬뿍 담겨져 있다"
blissey:
  species_id: 242
  names:
    jp_kana: ハピナス
    en: BLISSEY
    fr: LEUPHORIE
    it: BLISSEY
    de: HEITEIRA
    es: BLISSEY
    ko: 해피너스
  forms:
    blissey:
      form_id: 0
      base_stats:
        hp: 255
        attack: 10
        defense: 10
        special_attack: 75
        special_defense: 135
        speed: 55
      types:
        - normal
      egg_groups:
        - fairy
      held_items:
        rare: lucky_egg
      descriptions:
        jp_kana:
          gold: "ハピナスが　うんだ　タマゴを\nひとくちでも　たべた　ひとは\nだれにでも　やさしく　なれる。"
          silver: "こころやさしい　せいかくで\nびょうきの　ポケモンを　みつけては\nなおるまで　かんびょう　してあげる。"
        en:
          gold: "Anyone who takes\neven one bite of\nBLISSEY’s egg be-\fcomes unfailingly\ncaring and pleas-\nant to everyone."
          silver: "It has a very com-\npassionate nature.\nIf it sees a sick\fPOKéMON, it will\nnurse the sufferer\nback to health."
        fr:
          gold: "Celui qui mange\nun peu de l’oeuf\nde LEUPHORIE\fdevient aimable\net plaisant avec\ntout le monde."
          silver: "Il est d’une natu-\nre protectrice.\nS’il voit un\fPOKéMON malade,\nil le soignera\njusqu’à guérison."
        it:
          gold: "Basta anche solo\nassaggiare un uovo\ndi BLISSEY per\fdiventare gentili\ne premurosi con\nchiunque."
          silver: "È di natura molto\ncompassionevole.\nSe trova un\fPOKéMON ammala-\nto lo accudisce\nper farlo guarire."
        de:
          gold: "Jeder, der einen\nBissen von dem Ei,\ndas HEITEIRA hält,\fnimmt, wird gegen-\nüber anderen sorg-\nsam und höflich."
          silver: "Es ist sehr mit-\nfühlend. Wenn es\nein krankes POKé-\fMON sieht, pflegt\nes dieses wieder\ngesund."
        es:
          gold: "Cualquiera que\npruebe un poco de\nhuevo de BLISSEY,\fse volverà màs\namable y agradable\ncon todos."
          silver: "Es de naturaleza\ncompasiva. Si\nve a un POKéMON\fenfermo, lo\ncuidarà hasta que\nse recupere."
        ko:
          gold: "해피너스가 낳은 알을\n한입이라도 먹은 사람은\n누구에게든지 상냥하게 되어진다"
          silver: "마음 착한 성격으로\n병들은 포켓몬을 발견하면\n회복될 때까지 간병을 해준다"
raikou:
  species_id: 243
  names:
    jp_kana: ライコウ
    en: RAIKOU
    fr: RAIKOU
    it: RAIKOU
    de: RAIKOU
    es: RAIKOU
    ko: 라이코
  forms:
    raikou:
      form_id: 0
      base_stats:
        hp: 90
        attack: 85
        defense: 75
        special_attack: 115
        special_defense: 100
        speed: 115
      types:
        - electric
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "あまぐもを　せおっているので\nどんなときでも　かみなりを　だせる。\nかみなりとともに　おちてきたという。"
          silver: "かみなりが　おちたときのような\nなきごえで　ほえながら\nだいちを　かけめぐる　ポケモン。"
        en:
          gold: "The rain clouds it\ncarries let it\nfire thunderbolts\fat will. They say\nthat it descended\nwith lightning."
          silver: "A POKéMON that\nraces across the\nland while barking\fa cry that sounds\nlike crashing\nthunder."
        fr:
          gold: "Le nuage de pluie\nqu’il porte peut\nrelâcher la foudre\fà volonté. On dit\nde lui qu’il est\nvenu avec l’orage."
          silver: "Un POKéMON qui\nparcourt les\nplaines avec un\faboiement proche\nd’un coup de\ntonnerre."
        it:
          gold: "Grazie alle nubi\ndi pioggia che ha\ncon sé lancia ful-\fmini a volontà.\nPare che sia arri-\nvato con un lampo."
          silver: "Un POKéMON che\ncorre in lungo e\nin largo lanciando\fun verso che\nsembra il rumore\ndi un tuono."
        de:
          gold: "Die Regenwolken,\ndie es trägt, er-\nmöglichen ihm Ge-\fwitter zu erzeu-\ngen. Es strotzt\nvor Blitzen."
          silver: "Dieses POKéMON\njagt über das Land\nund stößt dabei\fein Gebrüll aus,\ndas wie krachender\nDonner klingt."
        es:
          gold: "Las nubes de\nlluvia que lleva\nle permiten lanzar\frayos a voluntad.\nDicen que apareció\ncon un rayo."
          silver: "Un POKéMON que\ncorre por el\ncampo mientras\flanza un grito\nque recuerda\nal trueno."
        ko:
          gold: "비구름을 등에 짊어지고 있어서\n어떠한 때든 번개를 칠 수 있다\n번개와 함깨 떨어졌다고 말한다"
          silver: "번개가 쳤을 때 같은\n울음소리로 짖으며\n대지를 달리는 포켓몬"
entei:
  species_id: 244
  names:
    jp_kana: エンテイ
    en: ENTEI
    fr: ENTEI
    it: ENTEI
    de: ENTEI
    es: ENTEI
    ko: 앤테이
  forms:
    entei:
      form_id: 0
      base_stats:
        hp: 115
        attack: 115
        defense: 85
        special_attack: 90
        special_defense: 75
        speed: 100
      types:
        - fire
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "ほえると　かざんが　ふんかする。\nみなぎる　ちからを　おさえきれず\nみちという　みちを　かけめぐる。"
          silver: "あたらしい　かざんが　できるたび\nうまれてくると　つたえられる\nだいちを　かけめぐる　ポケモン。"
        en:
          gold: "Volcanoes erupt\nwhen it barks. Un-\nable to restrain\fits extreme power,\nit races headlong\naround the land."
          silver: "A POKéMON that\nraces across the\nland. It is said\fthat one is born\nevery time a new\nvolcano appears."
        fr:
          gold: "Les volcans en-\ntrent en éruption\nquand il rugit. Il\fdoit courir sans\ncesse pour contrô-\nler sa puissance."
          silver: "Un POKéMON qui\nparcourt les\nplaines. A chaque\ffois qu’un volcan\napparaît, il en\nnaît un."
        it:
          gold: "Se abbaia, fa\neruttare i\nvulcani. Sfoga la\fsua incontenibile\npotenza correndo\ndappertutto."
          silver: "Un POKéMON che\ncorre in lungo e\nin largo. Si dice\fche nasca ogni\nvolta che si forma\nun nuovo vulcano."
        de:
          gold: "Sein Bellen löst\nEruptionen aus. Es\nkann seine Kraft\fnicht zügeln und\nes streift rastlos\ndurchs Land."
          silver: "Dieses POKéMON\njagt über das Land\nund man sagt, in\fjedem neuen Vulkan\nwird ein ENTEI\ngeboren."
        es:
          gold: "Cuando ladra, los\nvolcanes entran\nen erupción. Como\fno puede controlar\nsu poder, corre\nsiempre en cabeza."
          silver: "Un POKéMON que\ncorre por la\ntierra. Dicen que\fsiempre nace uno\ncuando aparece\nun nuevo volcàn."
        ko:
          gold: "울부짖으면 화산이 분화한다\n가득 넘치는 힘을 주체하지 못하고\n길이란 길은 죄다 돌아다닌다"
          silver: "새로운 화산이 생길 때마다\n태어난다고 전해지는\n대지를 달리는 포켓몬"
suicune:
  species_id: 245
  names:
    jp_kana: スイクン
    en: SUICUNE
    fr: SUICUNE
    it: SUICUNE
    de: SUICUNE
    es: SUICUNE
    ko: 스이쿤
  forms:
    suicune:
      form_id: 0
      base_stats:
        hp: 100
        attack: 75
        defense: 115
        special_attack: 90
        special_defense: 115
        speed: 85
      types:
        - water
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "いっしゅんで　きたなく　にごった\nみずも　きよめる　ちからをもつ。\nきたかぜの　うまれかわり　という。"
          silver: "すがたを　あらわしたとき\nなぜか　きたかぜが　ふくといわれる\nだいちを　かけめぐる　ポケモン。"
        en:
          gold: "Said to be the\nreincarnation of\nnorth winds, it\fcan instantly\npurify filthy,\nmurky water."
          silver: "This POKéMON races\nacross the land.\nIt is said that\fnorth winds will\nsomehow blow when-\never it appears."
        fr:
          gold: "Il serait la réin-\ncarnation du vent\ndu Nord. Il peut\fpurifier instan-\ntanément les eaux\npolluées."
          silver: "Un POKéMON qui\nparcourt les\nplaines. Le vent\fdu nord souffle\nà chaque fois\nqu’il apparaît."
        it:
          gold: "Si dice che sia la\nreincarnazione dei\nventi nordici. Può\fpurificare all’\nistante l’acqua\ntorbida e putrida."
          silver: "Un POKéMON che\ncorre in lungo e\nin largo. Si dice\fche ogni volta che\nappare, soffino i\nventi del nord."
        de:
          gold: "Man sagt, es sei\ndie Wiedergeburt\ndes Nordwindes. Es\fkann verschmutztes\nWasser im Nu\nreinigen."
          silver: "Dieses POKéMON\njagt über das Land\nund man sagt, der\fkalte Nordwind\nbegleitet es\nauf seinen Wegen."
        es:
          gold: "Conocido como la\nreencarnación de\nlos vientos del\fnorte, puede\npurificar aguas\nturbias y sucias."
          silver: "Este POKéMON corre\npor la tierra.\nDicen que siempre\fque aparece,\nsoplan vientos\ndel norte."
        ko:
          gold: "일순간에 더럽고 탁한\n물도 맑게 하는 힘을 지녔다\n북풍이 새로 태어났다고 말한다"
          silver: "모습을 나타냈을 때\n어쩐지 북풍이 불어온다고 전해지는\n대지를 달리는 포켓몬"
larvitar:
  species_id: 246
  names:
    jp_kana: ヨーギラス
    en: LARVITAR
    fr: EMBRYLEX
    it: LARVITAR
    de: LARVITAR
    es: LARVITAR
    ko: 애버라스
  forms:
    larvitar:
      form_id: 0
      base_stats:
        hp: 50
        attack: 64
        defense: 50
        special_attack: 45
        special_defense: 50
        speed: 41
      types:
        - rock
        - ground
      egg_groups:
        - monster
      descriptions:
        jp_kana:
          gold: "つちを　たべて　いきている。\nおおきな　やまひとつ　たべおわると\nせいちょうのため　ねむりはじめる。"
          silver: "ちちゅう　ふかくで　うまれる。\nまわりの　つちを　たいらげないと\nちじょうに　でてこれない。"
        en:
          gold: "It feeds on soil.\nAfter it has eaten\na large mountain,\fit will fall\nasleep so it can\ngrow."
          silver: "It is born deep\nunderground. It\ncan’t emerge until\fit has entirely\nconsumed the soil\naround it."
        fr:
          gold: "Il se nourrit du\nsol. Une fois\nqu’il a absorbé\fune montagne, il\ns’endort et com-\nmence à évoluer."
          silver: "Né sous terre, il\nne peut atteindre\nla surface que\fs’il a mangé toute\nla terre qui\nl’entoure."
        it:
          gold: "Si nutre di terra.\nDopo aver divorato\nuna montagna\fintera, si\naddormenta per\npoter crescere."
          silver: "Nato nel profondo\nsottosuolo, non\npuò emerge finché\fnon ha consumato\ntutto il terreno\nintorno a sé."
        de:
          gold: "Es ernährt sich\nvon Erde. Nachdem\nes einen Berg ver-\fspeist hat,\nschläft es ein, um\nzu wachsen."
          silver: "Es wird tief unter\nder Erde geboren\nund kann erst an\fdie Oberfläche,\nwenn es diese\naufgefressen hat."
        es:
          gold: "Se alimenta de\ntierra. Después\nde comer una gran\fmontaña, se duerme\ny empieza\na crecer."
          silver: "Nace muy profundo\nen el suelo, y no\npodrà salir hasta\fque se haya comido\nla tierra que\nle rodea."
        ko:
          gold: "흙을 먹으며 살고있다\n커다란 산 하나를 먹어치우면\n성충이 되기 위해 잠들기 시작한다"
          silver: "땅속 깊은곳에서 태어난다\n근처의 흙을 치우지 않으면\n지상으로 나오지 않는다"
pupitar:
  species_id: 247
  names:
    jp_kana: サナギラス
    en: PUPITAR
    fr: YMPHECT
    it: PUPITAR
    de: PUPITAR
    es: PUPITAR
    ko: 데기라스
  forms:
    pupitar:
      form_id: 0
      base_stats:
        hp: 70
        attack: 84
        defense: 70
        special_attack: 65
        special_defense: 70
        speed: 51
      types:
        - rock
        - ground
      egg_groups:
        - monster
      descriptions:
        jp_kana:
          gold: "がんばんのような　かたい　カラに\nおおわれているが　ちからは　つよく\nあばれると　やまも　くずれてしまう。"
          silver: "カラに　おおわれているが　じゆうに\nとびまわれる。かたさと　はやさを\nもつので　はかいりょく　ばつぐんだ。"
        en:
          gold: "Its shell is as\nhard as sheet\nrock, and it is\falso very strong.\nIts THRASHING can\ntopple a mountain."
          silver: "Even sealed in its\nshell, it can move\nfreely. Hard and\ffast, it has out-\nstanding destruc-\ntive power."
        fr:
          gold: "Sa carapace est\naussi dure que la\npierre et il est\ftrès fort. Ses\ncoups peuvent ra-\nser une montagne."
          silver: "Même coincé dans\nsa coquille, il\npeut se déplacer.\fIl est doté d’une\npuissance destruc-\ntrice terrible."
        it:
          gold: "È fortissimo, ed \nha un guscio duro\ncome roccia.\fHa un COLPO capace\ndi abbattere\nuna montagna."
          silver: "Può muoversi libe-\nramente anche se è\nchiuso nel guscio.\fForte e rapido, ha\nun enorme potere\ndistruttivo."
        de:
          gold: "Es ist sehr stark\nund sein Panzer\nist steinhart.\fSetzt es FUCHTLER\nein, kann es einen\nBerg umstürzen."
          silver: "Trotz seiner\nharten Schale kann\nes sich frei bewe-\fgen. Es ist flink\nund äußerst\nzerstörerisch."
        es:
          gold: "Su caparazón es\nduro como una\npiedra, y muy\fresistente.\nSu GOLPE puede\nderribar montañas."
          silver: "Hasta encerrado\nen su coraza, se\nmueve libremente.\fDuro y ràpido, su\npoder destructivo\nes enorme."
        ko:
          gold: "암반 같은 단단한 껍질로\n둘러싸여있지만 힘은 강해서\n화가나면 산도 무너뜨려 버린다"
          silver: "껍질에 덮혀있지만 자유로이\n뛰어다닌다. 단단함과 스피드를\n지니고 있어서 파괴력이 대단하다"
tyranitar:
  species_id: 248
  names:
    jp_kana: バンギラス
    en: TYRANITAR
    fr: TYRANOCIF
    it: TYRANITAR
    de: DESPOTAR
    es: TYRANITAR
    ko: 마기라스
  forms:
    tyranitar:
      form_id: 0
      base_stats:
        hp: 100
        attack: 134
        defense: 110
        special_attack: 95
        special_defense: 100
        speed: 61
      types:
        - rock
        - dark
      egg_groups:
        - monster
      descriptions:
        jp_kana:
          gold: "どんな　こうげきにも　びくともしない\nからだを　もっているため\nどんどん　しょうぶを　しかけてくる。"
          silver: "あたりの　ちけいを　かえるぐらい\nあさめしまえの　ちからもち。まわりを\nきにしない　ふてぶてしい　せいかく。"
        en:
          gold: "Its body can’t be\nharmed by any sort\nof attack, so it\fis very eager to\nmake challenges\nagainst enemies."
          silver: "Extremely strong,\nit can change the\nlandscape. It has\fan insolent nature\nthat makes it not\ncare about others."
        fr:
          gold: "Son corps ne peut\nêtre blessé par\nune attaque\fphysique. Il pense\ntout le temps\nà se battre."
          silver: "Il est si fort\nqu’il peut changer\nla topographie du\fterrain. Il ne se\npréoccupe pas des\nautres."
        it:
          gold: "Il suo corpo non\nè scalfito da\nalcun attacco,\fperciò sfida i\nnemici con\nestrema facilità."
          silver: "È tanto forte che\npuò cambiare il\npaesaggio. La sua\fnatura insolente\nlo rende indiffe-\nrente agli altri."
        de:
          gold: "Sein Körper ist\ngegen Attacken\nimmun, daher sucht\fes ständig nach\nneuen Gegnern, die\ngegen es antreten."
          silver: "Es ist so stark,\ndass es ganze\nLandstriche ver-\fwüsten kann. Es\nist kaltblütig und\nrücksichtslos."
        es:
          gold: "Su cuerpo es casi\ninmune a los\nataques. Por eso\fle encanta\ndesafiar a\nsus enemigos."
          silver: "Tiene tanta fuerza\nque puede cambiar\nel paisaje. Su\fnaturaleza\ninsolente le hace\nser muy egoísta."
        ko:
          gold: "어떤 공격에도 꿈쩍도 하지 않는\n몸을 지니고 있기 때문에\n점점 승부를 걸어온다"
          silver: "주변지형을 바꾸는 정도 쯤은\n누워서 떡먹기의 힘을 가지고 있다\n주위에 신경쓰지 않는 대담한 성격"
lugia:
  species_id: 249
  names:
    jp_kana: ルギア
    en: LUGIA
    fr: LUGIA
    it: LUGIA
    de: LUGIA
    es: LUGIA
    ko: 루기아
  forms:
    lugia:
      form_id: 0
      base_stats:
        hp: 106
        attack: 90
        defense: 130
        special_attack: 90
        special_defense: 154
        speed: 110
      types:
        - psychic
        - flying
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "つよすぎる　のうりょくを　もつため\nふかい　うみのそこで　しずかに\nときを　すごすと　つたえられる。"
          silver: "うみのかみさま　と　つたえられる\nポケモン。あらしのよる　すがたを\nみたという　はなしが　つたえられる。"
        en:
          gold: "It is said that it\nquietly spends its\ntime deep at the\fbottom of the sea\nbecause its powers\nare too strong."
          silver: "It is said to be\nthe guardian of\nthe seas. It is\frumored to have\nbeen seen on the\nnight of a storm."
        fr:
          gold: "Il paraît qu’il se\nréfugie au fond\ndes océans car\fson pouvoir est\nbeaucoup trop\ngrand."
          silver: "Il est supposé\nêtre le gardien\ndes 7 mers. On\fraconte qu’il est\napparu une nuit de\nforte tempête."
        it:
          gold: "Si dice che\nriposi sempre\nsul fondo del mare\fperché la sua\nforza è troppo\nelevata."
          silver: "È chiamato il\nguardiano dei\nmari. Si dice che\fsia stato visto in\nuna notte di\ntempesta."
        de:
          gold: "Man sagt, dass es\nsich meist ruhig\nam Meeresboden\faufhält, um seine\nKräfte im Zaum\nzu halten."
          silver: "Man berichtet, es\nsei der Wächter\nder Meere und man\fhabe es im Herzen\neines tosenden\nSturmes gesehen."
        es:
          gold: "Dicen que\npermanece en\nsilencio en el\ffondo del mar\ndebido a su\ninmenso poder."
          silver: "Dicen que es el\nguardiàn de los\nmares. Hay rumores\fde que fue visto\nen una noche\nde tormenta."
        ko:
          gold: "너무나도 강한 능력을 지녔기에\n깊은 바다 밑에서 조용히\n시간을 보낸다고 전해지고 있다"
          silver: "바다의 신이라고 전해지는\n포켓몬  폭풍의 밤에 모습을\n보았다는 이야기가 전해져온다"
ho_oh:
  species_id: 250
  names:
    jp_kana: ホウオウ
    en: HO-OH
    fr: HO-OH
    it: HO-OH
    de: HO-OH
    es: HO-OH
    ko: 칠색조
  forms:
    ho_oh:
      form_id: 0
      base_stats:
        hp: 106
        attack: 130
        defense: 90
        special_attack: 110
        special_defense: 154
        speed: 90
      types:
        - fire
        - flying
      egg_groups:
        - undiscovered
      held_items:
        common: sacred_ash
        rare: sacred_ash
      descriptions:
        jp_kana:
          gold: "なないろの　みごとな　つばさで\nせかいの　そらを　とびつづけると\nしんわに　つたえられる　ポケモン。"
          silver: "からだは　なないろに　かがやき\nとんだあとに　にじが　できると\nしんわに　のこされている　ポケモン。"
        en:
          gold: "Legends claim this\nPOKéMON flies the\nworld’s skies con-\ftinuously on its\nmagnificent seven-\ncolored wings."
          silver: "A legend says that\nits body glows in\nseven colors. A\frainbow is said to\nform behind it\nwhen it flies."
        fr:
          gold: "Les légendes ra-\ncontent qu’il sur-\nvole le monde en\fpermanence grâce à\nses merveilleuses\nailes colorées."
          silver: "Son corps brille\ndes sept couleurs\nde l’arc-en-ciel.\fArc-en-ciel qui se\nconstitue derrière\nlui quand il vole."
        it:
          gold: "Narra la leggenda\nche questo POKéMON\nsorvoli instanca-\fbilmente il mondo\ncon splendide ali\ndai sette colori."
          silver: "Narra la leggenda\nche il suo corpo\nbrilli di sette\fcolori. Volando\nlascia un arcoba-\nleno dietro di sé."
        de:
          gold: "Man sagt, dass\ndieses POKéMON\nauf seinen sieben-\ffarbigen Schwingen\ndurch die Lüfte\nfliegt."
          silver: "Sein Körper soll\nin sieben Farben\nleuchten.\fIm Flug zieht es\neinen Regenbogen\nhinter sich her."
        es:
          gold: "Cuenta la leyenda\nque este POKéMON\nvuela por el\fcielo con sus\nmagníficas alas\nde siete colores."
          silver: "Cuenta la leyenda\nque brilla en\nsiete colores.\fDicen que deja un\narco iris tras\nde sí al volar."
        ko:
          gold: "무지개색의 훌륭한 날개로\n전 세계의 하늘을 날고 있다는\n신화로 전해지고 있는 포켓몬"
          silver: "몸은 일곱빛으로 빛나고\n날아간 자리에는 무지개가 생긴다고\n신화속에 전해져 오는 포켓몬"
celebi:
  species_id: 251
  names:
    jp_kana: セレビィ
    en: CELEBI
    fr: CELEBI
    it: CELEBI
    de: CELEBI
    es: CELEBI
    ko: 세레비
