      descriptions:
        jp_kana:
          gold: "じまんのツノを　あいての　おなかの\nしたに　ねじこみ　いっきに　もちあげ\nぶんなげてしまう　ちからもち。"
          silver: "ふだんは　とても　おとなしいが\nミツをすうのを　じゃまする　やつは\nツノを　つかって　おいはらう。"
        en:
