      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "はったつした　むねの　きんにくは\nかるく　はばたいただけで\nおおかぜを　おこせるほどだ。"
          silver: "うつくしい　ハネは　ひろげて\nあいてを　いかく　するだけでなく\nマッハ２で　そらをとべる。"
        en:
          gold: "Its well-developed\nchest muscles make\nit strong enough\fto whip up a gusty\nwindstorm with\njust a few flaps."
          silver: "It spreads its\nbeautiful wings\nwide to frighten\fits enemies. It\ncan fly at Mach 2\nspeed."
        fr:
          gold: "Son torse musclé\nlui permet de\nbattre puissamment\fses ailes pour\ncréer de terribles\ntourbillons."
          silver: "Il déploie ses\nmagnifiques ailes\npour effrayer ses\fennemis. En vol,\nil peut atteindre\nMach 2."
        it:
          gold: "I forti muscoli\npettorali gli\npermettono di\fprovocare una\ntempesta di vento\nbattendo le ali."
          silver: "Spiega le belle\nali per terroriz-\nzare i nemici.\fPuò raggiungere\nla velocità di\nMach 2."
        de:
          gold: "Seine Brustmuskeln\nsind so kräftig,\ndass es mit wenig\fFlattern einen\nstarken Windstoß\nerzeugen kann."
          silver: "Es spreizt seine\nmächtigen Flügel,\num seine Feinde zu\fverängstigen. Es\nkann bis zu Mach 2\nschnell fliegen."
        es:
          gold: "Sus mùsculos\npectorales son\ntan fuertes que\fpodría parar una\nventisca con unos\ncuantos aleteos."
          silver: "Despliega sus\nbellas alas\npara acobardar a\fsus enemigos.\nPuede volar a\nvelocidad Mach 2."
        ko:
          gold: "발달한 가슴 근육은\n가볍게 날갯짓을 하는 것만으로\n큰 바람을 일으킬 정도다"
          silver: "아름다운 날개는 펼쳐서\n상대를 위협하는 것 뿐만 아니라\n마하2로 하늘을 난다"
rattata:
  species_id: 19
  names:
    jp_kana: コラッタ
    en: RATTATA
    fr: RATTATA
    it: RATTATA
    de: RATTFRATZ
    es: RATTATA
    ko: 꼬렛
  forms:
    rattata:
      form_id: 0
      base_stats:
        hp: 30
        attack: 56
        defense: 35
        special_attack: 25
        special_defense: 35
        speed: 72
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "どんな　ものでも　たべるので\nエサとなるものが　ある　ばしょに\nすみついて　どんどん　こどもをうむ。"
          silver: "たべるものが　あるところなら\nどこにだって　せいそくする。\n１にちじゅう　エサを　さがしている。"
        en:
          gold: "It eats anything.\nWherever food is\navailable, it will\fsettle down and\nproduce offspring\ncontinuously."
          silver: "Living wherever\nthere is food\navailable, it\fceaselessly scav-\nenges for edibles\nthe entire day."
        fr:
          gold: "Ils s’installent\nen colonies dans\ndes endroits qui\fregorgent de\nnourriture et se\nmultiplient."
          silver: "Vivant là où se\ntrouve la nour-\nriture, ce\fcharognard passe\nses journées à sa\nrecherche."
        it:
          gold: "Mangia qualsiasi\ncosa. Si sistema\novunque ci sia\fdel cibo,\nmoltiplicandosi\nininterrottamente."
          silver: "Vive ovunque si\ntrovi del cibo,\ncercando per tutto\fil giorno\nqualsiasi cosa\ndi cui cibarsi."
        de:
          gold: "Es frisst alles.\nWo es Nahrung\nfindet, baut es\fein Nest und\npflanzt sich\nständig fort."
          silver: "Es baut sein Nest,\nwo es Futter fin-\ndet. Es ist den\fganzen Tag auf der\nSuche nach etwas\nEssbarem."
        es:
          gold: "Come de todo. Se\nestablece donde\nquiera que haya\fcomida, y se\nreproduce\ncontinuamente."
          silver: "Vive allí donde\nhaya comida\ndisponible. Busca\ftodo el día, sin\ndescanso, algo\ncomestible."
        ko:
          gold: "어떤 것이든 먹어치우기 때문에\n먹이가 될만한 것이 있는 장소에\n정착하여 점점 새끼를 낳는다"
          silver: "먹을 것이 있는 곳이라면\n어디서든 서식한다\n하루종일 먹이를 찾아다닌다"
raticate:
  species_id: 20
  names:
    jp_kana: ラッタ
    en: RATICATE
    fr: RATTATAC
    it: RATICATE
    de: RATTIKARL
    es: RATICATE
    ko: 레트라
  forms:
    raticate:
      form_id: 0
      base_stats:
        hp: 55
        attack: 81
        defense: 60
        special_attack: 50
        special_defense: 70
        speed: 97
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "かたい　キバで　なんでも　かじる。\nコンクリートで　できた　ビルすら\nかじって　たおしてしまう。"
          silver: "ヒゲで　バランスを　とっている。\nキバは　どんどん　のびるので\nなんでも　かじって　けずっている。"
        en:
          gold: "Gnaws on anything\nwith its tough\nfangs. It can even\ftopple concrete\nbuildings by gnaw-\ning on them."
          silver: "Its whiskers help\nit to maintain\nbalance. Its fangs\fnever stop grow-\ning, so it gnaws\nto pare them down."
        fr:
          gold: "Sa morsure est\nredoutable. Ses\nterribles crocs\fpeuvent ronger les\nfondations des\nimmeubles."
          silver: "Ses moustaches\nfavorisent son\néquilibre. Ses\fcrocs grandissent\nsans cesse pour\nmieux mâcher."
        it:
          gold: "Rosicchia ovunque\ncon i denti\nrobusti. Può anche\fabbattere edifici\ndi cemento\nrosicchiandoli."
          silver: "Con i baffi si\ntiene in equili-\nbrio. La continua\fcrescita dei denti\nlo forza a rosic-\nchiare sempre."
        de:
          gold: "Es nagt mit seinen\nZähnen alles an.\nEs kann sogar Ge-\fbäude aus Beton\ndadurch zum\nEinsturz bringen."
          silver: "Mit seinen Bart-\nhaaren hält es die\nBalance. Da seine\fZähne stetig wach-\nsen, muss es stän-\ndig etwas annagen."
        es:
          gold: "Roe cualquier cosa\ncon sus duros\ncolmillos. Puede\fhasta derribar\nciertos edificios\nroyéndolos."
          silver: "Sus bigotes le\nayudan a guardar\nel equilibrio. Sus\fcolmillos no dejan\nde crecer, y los\nreduce mordiendo."
        ko:
          gold: "단단한 앞니로 무엇이든 갉는다\n콘크리드로 만들어진 빌딩도\n갉아서 넘어뜨려버린다"
          silver: "수염으로 밸런스를 잡고 있다\n앞니는 점점 길어지기때문에\n무엇이든 갉아서 문지르고 있다"
spearow:
  species_id: 21
  names:
    jp_kana: オニスズメ
    en: SPEAROW
    fr: PIAFABEC
    it: SPEAROW
    de: HABITAK
    es: SPEAROW
    ko: 깨비참
  forms:
    spearow:
      form_id: 0
      base_stats:
        hp: 40
        attack: 60
        defense: 30
        special_attack: 31
        special_defense: 31
        speed: 70
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "みじかい　ハネを　はばたかせ\nくさむらの　ムシを　おいだしては\nみじかい　くちばしで　ついばむ。"
          silver: "じぶんの　テリトリーを　まもるため\nみじかいハネを　はばたかせ\nいそがしく　とびまわっている。"
        en:
          gold: "It flaps its short\nwings to flush out\ninsects from tall\fgrass. It then\nplucks them with\nits stubby beak."
          silver: "Very protective of\nits territory, it\nflaps its short\fwings busily to\ndart around at\nhigh speed."
        fr:
          gold: "Il bat des ailes\npour éjecter les\ninsectes réfugiés\fdans les herbes et\nles picore ensuite\navec son bec."
          silver: "Très protecteur de\nson territoire, il\nbat vite des ailes\fpour se déplacer à\ntoute allure."
        it:
          gold: "Battendo le corte\nali scova insetti\nnell’erba alta.\fPoi li raccoglie\ncon il suo tozzo\nbecco."
          silver: "Molto geloso del\nsuo territorio,\nsvolazza in giro\fcon grande rapidi-\ntà battendo le ali\ncontinuamente."
        de:
          gold: "Es flattert mit\nseinen kleinen\nFlügeln, um Insek-\ften aus dem Gras\nzu scheuchen und\nzu verspeisen."
          silver: "Es beschützt sein\nGebiet stets vor\nEindringlingen.\fDaher fliegt es\nständig wild\numher."
        es:
          gold: "Aletea con sus\ncortas alas para\nhacer salir a los\finsectos de la\nhierba, y los\ncaza con su pico."
          silver: "Muy protector de\nsu territorio,\nmueve sus cortas\falas sin descanso\npara lanzarse a\ntoda velocidad."
        ko:
          gold: "짧은 날개를 쳐서\n풀숲의 벌레를 나오게 하고\n짧은 부리로 쪼아먹는다"
          silver: "자신의 구역을 지키기위해\n작은 날개를 쳐서\n바쁘게 주위를 날아 맴돈다"
fearow:
  species_id: 22
  names:
    jp_kana: オニドリル
    en: FEAROW
    fr: RAPASDEPIC
    it: FEAROW
    de: IBITAK
    es: FEAROW
    ko: 깨비드릴조
  forms:
    fearow:
      form_id: 0
      base_stats:
        hp: 65
        attack: 90
        defense: 65
        special_attack: 61
        special_defense: 61
        speed: 100
      types:
        - normal
        - flying
      egg_groups:
        - flying
      held_items:
        rare: sharp_beak
      descriptions:
        jp_kana:
          gold: "いっきに　おおぞらまで　まいあがり\nそこから　きゅうこうかで\nいっきに　おそいかかるのだ。"
          silver: "ほそながい　くちばしを　じょうずに\nつかって　じめんのなかの　ちいさな\nムシを　つまみだし　たべてしまう。"
        en:
          gold: "It shoots itself\nsuddenly high into\nthe sky, then\fplummets down in\none fell swoop to\nstrike its prey."
          silver: "It cleverly uses\nits thin, long\nbeak to pluck and\feat small insects\nthat hide under\nthe ground."
        fr:
          gold: "Il se propulse en\nl’air d’un coup\nd’aile pour fondre\fen un piqué\nfoudroyant sur sa\nproie."
          silver: "Il se sert\nhabilement de son\nbec pour dénicher\fde petits\ninsectes enfouis\ndans le sol."
        it:
          gold: "Si libra improv-\nvisamente alto nel\ncielo, poi si lan-\fcia in picchiata\ne colpisce spieta-\ntamente la preda."
          silver: "Usa con astuzia il\nsuo becco lungo e\nsottile per cattu-\frare e mangiare\npiccoli insetti\nnel terreno."
        de:
          gold: "Es fliegt steil\nempor und stürzt\nsich anschließend\fherab, um seine\nBeute zu\nerlegen."
          silver: "Es setzt seinen\nlangen, dünnen\nSchnabel geschickt\fein, um kleine In-\nsekten am Boden\naufzupicken."
        es:
          gold: "Asciende al cielo\nrepentinamente\npara caer después\fen picado, y de un\nsolo golpe atrapar\na su presa."
          silver: "Usa sabiamente\nsu fino y largo\npico para extraer\fy comer insectos\nque se ocultan\nbajo tierra."
        ko:
          gold: "단숨에 높은 하늘까지 날아올라\n거기서부터 급강하로\n단숨에 공격해온다"
          silver: "가늘고 긴 부리를 능숙하게\n사용하여 지면의 작은\n벌레를 집어 먹는다"
ekans:
  species_id: 23
  names:
    jp_kana: アーボ
    en: EKANS
    fr: ABO
    it: EKANS
    de: RETTAN
    es: EKANS
    ko: 아보
  forms:
    ekans:
      form_id: 0
      base_stats:
        hp: 35
        attack: 60
        defense: 44
        special_attack: 40
        special_defense: 54
        speed: 55
      types:
        - poison
      egg_groups:
        - field
        - dragon
      descriptions:
        jp_kana:
          gold: "じゆうに　あごを　はずせるので\nおおきな　えものでも　のみこめるが\nおもくなって　うごけなくなる。"
          silver: "いつもは　くさむらに　かくれている。\nうまれたては　どくを　もたないので\nかまれても　いたいだけだ。"
        en:
          gold: "It can freely de-\ntach its jaw to\nswallow large prey\fwhole. It can be-\ncome too heavy to\nmove, however."
          silver: "It always hides in\ngrass. When first\nborn, it has no\fpoison, so its\nbite is painful,\nbut harmless."
        fr:
          gold: "Sa mâchoire peut\nse désarticuler\nafin d’avaler de\flarges proies. Il\ndevient alors trop\ngros pour bouger."
          silver: "Il se cache dans\nles hautes herbes.\nA sa naissance, il\fn’a pas de poison\nmais sa morsure\nest douloureuse."
        it:
          gold: "Può facilmente\nspostare la mandi-\nbola per ingoiare\fgrosse prede. Per\nil peso, si muove\ncon difficoltà."
          silver: "Si nasconde sempre\nnell’erba. Appena\nnato non ha vele-\fno, quindi la sua\npuntura è dolorosa\nma non velenosa."
        de:
          gold: "Es hängt seinen\nKiefer aus, um\nBeute zu ver-\fschlingen. Es ist\ndann zu schwer, um\nzu kriechen."
          silver: "Es versteckt sich\nstets im Gras. Bei\nGeburt hat es noch\fkein Gift. Sein\nBiss tut weh, ist\naber harmlos."
        es:
          gold: "Puede separar su\nmandíbula para\nengullir a grandes\fpresas, aunque\nesto le dificulte\nel movimiento."
          silver: "Siempre se esconde\nen la hierba. Como\nno tiene veneno al\fnacer, su mordisco\nes doloroso pero\ninofensivo."
        ko:
          gold: "자유롭게 턱을 뺄 수 있어서\n커다란 먹이라도 삼킬 수 있지만\n무거워져서 움직일 수 없게된다"
          silver: "보통은 풀숲에 숨어지낸다\n아기 때는 독을 지니지 않아\n물려도 조금 아플뿐이다"
arbok:
  species_id: 24
  names:
    jp_kana: アーボック
    en: ARBOK
    fr: ARBOK
    it: ARBOK
    de: ARBOK
    es: ARBOK
    ko: 아보크
  forms:
    arbok:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 69
        special_attack: 65
        special_defense: 79
        speed: 80
      types:
        - poison
      egg_groups:
        - field
        - dragon
      descriptions:
        jp_kana:
          gold: "おなかの　おそろしい　かおのような\nもようを　みせつけ　すくんだ\nえものを　しめつけ　どくをあたえる。"
          silver: "とても　しゅうねんぶかい　せいかく。\nいちど　ターゲットに　きめた\nえものは　どこまでも　おいつづける。"
        en:
          gold: "Transfixing prey\nwith the face-like\npattern on its\fbelly, it binds\nand poisons the\nfrightened victim."
          silver: "With a very venge-\nful nature, it\nwon’t give up the\fchase, no matter\nhow far, once it\ntargets its prey."
        fr:
          gold: "Hypnotisant sa\nvictime avec les\nmotifs dessinés\fsur son ventre, il\npeut ensuite\nl’empoisonner."
          silver: "De nature revan-\ncharde, il n’aban-\ndonne jamais sa\fproie lorsqu’il\ndécide de la pren-\ndre en chasse."
        it:
          gold: "Terrorizza la\npreda con il viso\ndisegnato sulla\fpancia, poi blocca\ne avvelena la vit-\ntima atterrita."
          silver: "Molto vendicativo,\nse individua una\npreda non si dà\fpace finché non la\nraggiunge, non\nimporta quando."
        de:
          gold: "Mit seiner Muste-\nrung lähmt es den\nGegner, um ihn an-\fschließend zu\numwickeln und\nzu vergiften."
          silver: "Es ist sehr rach-\nsüchtig, denn es\nverfolgt seine\fBeute, egal wie\nweit, wenn es sie\nerst erspäht hat."
        es:
          gold: "Paralizando a su\npresa con los\ndibujos de su\fpiel, apresa y\nenvenena a la\nasustada víctima."
          silver: "De naturaleza muy\nvengativa, no\ncejarà en la\fpersecución. Irà\ntras su presa, no\nimporta dónde."
        ko:
          gold: "배에 무서운 얼굴 같은\n모양을 보여 뛰쳐나온\n먹이를 조이고 중독시킨다"
          silver: "매우 집념이 강한 성격\n한번 타겟으로 정한\n먹이는 어디든지 쫓아간다"
pikachu:
  species_id: 25
  names:
    jp_kana: ピカチュウ
    en: PIKACHU
    fr: PIKACHU
    it: PIKACHU
    de: PIKACHU
    es: PIKACHU
    ko: 피카츄
  forms:
    pikachu:
      form_id: 0
      base_stats:
        hp: 35
        attack: 55
        defense: 30
        special_attack: 50
        special_defense: 40
        speed: 90
      types:
        - electric
      egg_groups:
        - field
        - fairy
      held_items:
        rare: berry
      descriptions:
        jp_kana:
          gold: "かたい　きのみも　でんげきで\nやいて　やわらかくしてから\nたべる　ちえを　もちあわせている。"
          silver: "しっぽを　たてて　まわりの\nようすを　さぐっていると　ときどき\nかみなりが　しっぽに　おちてくる。"
        en:
          gold: "This intelligent\nPOKéMON roasts\nhard BERRIES with\felectricity to\nmake them tender\nenough to eat."
          silver: "It raises its tail\nto check its sur-\nroundings. The\ftail is sometimes\nstruck by light-\nning in this pose."
        fr:
          gold: "Ce POKéMON rusé\nélectrifie les\nfruits pas assez\fmûrs pour les\nrendre tendres et\nbons à manger."
          silver: "Il élève sa queue\npour surveiller\nles environs. Elle\fattire souvent la\nfoudre dans cette\nposition."
        it:
          gold: "Questo POKéMON\ncuoce le BACCHE\ndure con elettri-\fcità, per renderle\ntenere prima di\nmangiarle."
          silver: "Solleva la coda\nper analizzare l’\nambiente. La coda\ftalvolta è colpita\nda un lampo in\nquesta posizione."
        de:
          gold: "Dieses clevere\nPOKéMON grillt\nharte BEEREN mit\fElektrizität, um\nsie anschließend\nzu essen."
          silver: "Es streckt seinen\nSchwanz nach oben,\num seine Umgebung\fzu prüfen. Häufig\nfährt ein Blitz\nin den Schwanz."
        es:
          gold: "Este inteligente\nPOKéMON tuesta\nlas duras BAYAS\fcon electricidad\npara hacerlas\nmàs comestibles."
          silver: "Levanta su cola\npara vigilar los\nalrededores. A\fveces, puede ser\nalcanzado por un\nrayo en esa pose."
        ko:
          gold: "딱딱한 열매도 전기로\n구워서 부드럽게 만든 뒤에\n먹는 지혜를 가지고 있다"
          silver: "꼬리를 세우고\n주변을 살피다 보면\n가끔 꼬리에 번개가 친다"
raichu:
  species_id: 26
  names:
    jp_kana: ライチュウ
    en: RAICHU
    fr: RAICHU
    it: RAICHU
    de: RAICHU
    es: RAICHU
    ko: 라이츄
  forms:
    raichu:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 55
        special_attack: 90
        special_defense: 80
        speed: 100
      types:
        - electric
      egg_groups:
        - field
        - fairy
      held_items:
        rare: berry
      descriptions:
        jp_kana:
          gold: "でんきが　たまってくると\nきんにくが　しげきされ　いつもより\nこうげきてきに　なってしまう。"
          silver: "ほほの　でんきぶくろに　たまった\nでんきが　さいだいりょうに　なると\nりょうみみは　まっすぐ　のびる。"
        en:
          gold: "When its electric-\nity builds, its\nmuscles are stimu-\flated, and it be-\ncomes more aggres-\nsive than usual."
          silver: "If the electric\npouches in its\ncheeks become\ffully charged,\nboth ears will\nstand straight up."
        fr:
          gold: "Quand son taux\nd’énergie monte,\nses muscles se\fcontractent et il\ndevient plus\nagressif."
          silver: "Ses oreilles se\ndressent lorsque\nles poches à\félectricité sur\nses joues sont\nremplies."
        it:
          gold: "Se l’elettricità\naumenta, i muscoli\nsono sollecitati\fe diventa più\naggressivo del\nsolito."
          silver: "Se le tasche elet-\ntriche sulle sue\nguance si caricano\fcompletamente, gli\nsi rizzano\nle orecchie."
        de:
          gold: "Wenn es sich auf-\nlädt, zucken seine\nMuskeln und es\fwird aggressiver\nund kampf-\nlustiger."
          silver: "Wenn seine Backen-\ntaschen voll auf-\ngeladen sind,\fstehen seine bei-\nden Ohren senk-\nrecht nach oben."
        es:
          gold: "Cuando se carga de\nelectricidad, sus\nmùsculos se tensan\fy se vuelve màs\nagresivo de lo\nnormal."
          silver: "Si sus mejillas\nse cargan por\ncompleto de\felectricidad,\nambas orejas se\nlevantaràn."
        ko:
          gold: "전기가 모이면\n근육이 자극되어 평상시보다\n공격적으로 되어버린다"
          silver: "양 볼의 전기주머니에 모인\n전기가 가득차게 되면\n두 귀가 곧게 선다"
sandshrew:
  species_id: 27
  names:
    jp_kana: サンド
    en: SANDSHREW
    fr: SABELETTE
    it: SANDSHREW
    de: SANDAN
    es: SANDSHREW
    ko: 모래두지
  forms:
    sandshrew:
      form_id: 0
      base_stats:
        hp: 50
        attack: 75
        defense: 85
        special_attack: 20
        special_defense: 30
        speed: 40
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "どんなに　たかい　ところから\nおちても　からだを　まるめれば\nバウンドできて　たすかるのだ。"
          silver: "みずけを　きらい　かんそうちに\nふかいあなを　ほって　せいかつする。\nいっしゅんで　からだを　まるめる。"
        en:
          gold: "If it fell from a\ngreat height, this\nPOKéMON could save\fitself by rolling\ninto a ball and\nbouncing."
          silver: "Disliking water,\nit lives in deep\nburrows in arid\fareas. It can roll\nitself instantly\ninto a ball."
        fr:
          gold: "S’il tombe de\nhaut, il peut\namortir sa chute\fen se roulant en\nboule pour ainsi\nrebondir."
          silver: "Détestant l’eau,\nil vit dans de\nprofondes tanières\fdans des régions\narides. Il aime se\nrouler en boule."
        it:
          gold: "Se cade da una\ngrande altezza,\nquesto POKéMON può\fsalvarsi\nappallottolandosi\ne rimbalzando."
          silver: "Odiando l’acqua,\nvive in profonde\ntane in zone ari-\fde. È capace di\nappallottolarsi\nin un istante."
        de:
          gold: "Fällt es aus\ngroßer Höhe, rollt\nsich dieses POKé-\fMON zusammen, um\nso den Sturz\nabzufangen."
          silver: "Da es Wasser ver-\nabscheut, gräbt es\nsich in trockenes\fErdreich ein. Es\nkann sich rasch zu\neinem Ball rollen."
        es:
          gold: "Si cae de gran\naltura, este\nPOKéMON podría\fconvertirse en una\npelota y rebotar\ncontra el suelo."
          silver: "Como odia el agua,\nvive en madrigue-\nras muy profundas\fen zonas àridas.\nPuede hacerse una\nbola al instante."
        ko:
          gold: "아무리 높은 곳에서부터\n떨어져도 몸을 둥글게 말면\n바운드가 되어 살 수 있다"
          silver: "습기를 싫어해서 건조한 땅에\n깊은 구멍을 파서 생활을 한다\n눈 깜짝할 새에 몸을 둥글게 만다"
sandslash:
  species_id: 28
  names:
    jp_kana: サンドパン
    en: SANDSLASH
    fr: SABLAIREAU
    it: SANDSLASH
    de: SANDAMER
    es: SANDSLASH
    ko: 고지
  forms:
    sandslash:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 110
        special_attack: 45
        special_defense: 55
        speed: 65
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ぜんそくりょくで　はしりまわって\nすなけむりを　まきあげ\nじぶんの　すがたを　かくそうとする。"
          silver: "すごい　いきおいで　じめんをほると\nトゲや　ツメが　おれてしまうが\nつぎのひには　はえそろっている。"
        en:
          gold: "In an attempt to\nhide itself, it\nwill run around\fat top speed to\nkick up a blinding\ndust storm."
          silver: "If it digs at an\nincredible pace,\nit may snap off\fits spikes and\nclaws. They grow\nback in a day."
        fr:
          gold: "S’il est menacé\nil se met à courir\nfrénétiquement\fpour soulever un\nnuage de poussière\naveuglant."
          silver: "Il creuse si vite\nqu’il peut briser\nses épines et ses\fgriffes. Mais\nelles repoussent\nen une journée."
        it:
          gold: "Per nascondersi\npuò girare su se\nstesso velocemente\fe provocare una\ntempesta di\npolvere accecante."
          silver: "Se scava ad incre-\ndibile velocità,\npuò consumarsi le\fpunte e gli arti-\ngli. Gli ricresco-\nno in un giorno."
        de:
          gold: "Um sich zu ver-\nstecken, wirbelt\nes wild herum und\ferzeugt so einen\nSandsturm, der den\nGegner verwirrt."
          silver: "Wenn es schnell\ngräbt, können\nseine Stacheln und\fKrallen abbrechen.\nSie wachsen binnen\neines Tages nach."
        es:
          gold: "En un intento por\nesconderse, saldrà\ncorriendo a gran\fvelocidad, dejando\ntras de sí una\ngran polvareda."
          silver: "Si cava a gran\nvelocidad, puede\nque se le caigan\flas garras y pùas.\nVuelven a crecerle\nen un día."
        ko:
          gold: "전속력으로 주변을 달려서\n모래먼지를 일으켜\n자신의 모습을 감추려한다"
          silver: "굉장한 힘으로 지면을 파면\n가시와 발톱이 부러져버리지만\n다음에 바로 돋아나 있다"
nidoran_f:
  species_id: 29
  names:
    jp_kana: ニドラン♀
    en: NIDORAN♀
    fr: NIDORAN♀
    it: NIDORAN♀
    de: NIDORAN♀
    es: NIDORAN♀
    ko: 니드런♀
  forms:
    nidoran_f:
      form_id: 0
      base_stats:
        hp: 55
        attack: 47
        defense: 52
        special_attack: 40
        special_defense: 40
        speed: 41
      types:
        - poison
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "ちいさな　ツノに　ひめられた\nどくの　いりょくは　ものすごい。\nわずかな　キズでも　いのちとりだ。"
          silver: "たたかいは　あまり　このまないが\nいざと　いうときは\nツノのどくで　あいてを　くるしめる。"
        en:
          gold: "The poison hidden\nin its small horn\nis extremely po-\ftent. Even a tiny\nscratch can have\nfatal results."
          silver: "Although not very\ncombative, it will\ntorment its foes\fwith poison spikes\nif it is threat-\nened in any way."
        fr:
          gold: "Un poison très\npuissant suinte de\nses cornes. Une\fégratignure peut\ncauser un empoi-\nsonnement fatal."
          silver: "Peu combatif, il\npréfère tourmenter\nses ennemis à\fl’aide de dards\nempoisonnés s’il\nest menacé."
        it:
          gold: "Il veleno del suo\npiccolo corno è\npotentissimo.\fAnche una lieve\nferita può essere\nfatale."
          silver: "Sebbene non troppo\nagguerrito, se si\nsente minacciato\ftormenta i nemici\ncon i suoi aculei\nvelenosi."
        de:
          gold: "Das Gift in seinem\nkleinen Horn ist\nsehr potent. Ein\fkleiner Krat-\nzer kann fatale\nFolgen haben."
          silver: "Obwohl es nicht\naggressiv ist,\nmalträtiert es\fseine Feinde bei\nBedrohung mit sei-\nnen Giftstacheln."
        es:
          gold: "El veneno oculto\nen su pequeño\ncuerno es\fextremadamente\npotente. El menor\nroce sería fatal."
          silver: "Aunque no es\nmuy agresivo,\ncastiga a sus\fenemigos con pùas\nvenenosas, si se\nsiente amenazado."
        ko:
          gold: "작은 뿔에 담겨있는\n독의 위력은 대단하다\n작은 상처에도 목숨을 잃는다"
          silver: "싸움을 그리 좋아하지 않지만\n위기가 닥쳤을 때\n뿔의 독으로 상대를 물리친다"
nidorina:
  species_id: 30
  names:
    jp_kana: ニドリーナ
    en: NIDORINA
    fr: NIDORINA
    it: NIDORINA
    de: NIDORINA
    es: NIDORINA
    ko: 니드리나
  forms:
    nidorina:
      form_id: 0
      base_stats:
        hp: 70
        attack: 62
        defense: 67
        special_attack: 55
        special_defense: 55
        speed: 56
      types:
        - poison
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "こどもに　エサを　わけあたえるとき\nおやが　かみくだき　やわらかくした\nエサを　はきもどして　あたえる。"
          silver: "おんこうで　やさしい　せいかく。\nツノのそだちも　おそいため\nこのんで　たたかおうとはしない。"
        en:
          gold: "When feeding its\nyoung, it first\nchews and tender-\fizes the food,\nthen spits it out\nfor the offspring."
          silver: "It has a calm and\ncaring nature.\nBecause its horn\fgrows slowly, it\nprefers not to\nfight."
        fr:
          gold: "Pour nourrir ses\npetits, il mâche\nles aliments pour\fles rendre tendres\net il les recrache\nà ses bébés."
          silver: "De nature calme et\naffectueuse,il\npréfère éviter les\fcombats car sa\ncorne grandit\nlentement."
        it:
          gold: "Per nutrire i\npiccoli, prima\nintenerisce il\fcibo masticandolo,\npoi lo sputa per\ni cuccioli."
          silver: "Mite e compassio-\nnevole. Poiché il\nsuo corno ricresce\flentamente,\npreferisce non\nlottare."
        de:
          gold: "Ehe es seine\nJungen füttert,\nzerkaut es das\fFutter und\ngibt es ihnen\nanschließend."
          silver: "Es ist von Natur\naus sehr ruhig\nund umsorgend. Da\fsein Horn langsam\nwächst, vermeidet\nes den Kampf."
        es:
          gold: "Cuando alimenta a\nsus crías, primero\nmastica y ablanda\fla comida y luego\nla escupe para\nsu prole."
          silver: "Es tranquilo por\nnaturaleza. Como\nsu cuerno\fcrece lentamente,\nprefiere no\nluchar."
        ko:
          gold: "새끼에게 먹이를 나누어줄 때\n어미가 씹어서 소화해놓은\n먹이를 토해서 준다"
          silver: "온화하고 부드러운 성격\n뿔의 성장도 늦기때문에\n먼저 싸움을 걸지는 않는다"
nidoqueen:
  species_id: 31
  names:
    jp_kana: ニドクイン
    en: NIDOQUEEN
    fr: NIDOQUEEN
    it: NIDOQUEEN
    de: NIDOQUEEN
    es: NIDOQUEEN
    ko: 니드퀸
  forms:
    nidoqueen:
      form_id: 0
      base_stats:
        hp: 90
        attack: 82
        defense: 87
        special_attack: 75
        special_defense: 85
        speed: 76
      types:
        - poison
        - ground
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "ぜんしん　はりのような　ウロコで\nおおわれている。どんな　こうげきにも\nひるんだ　ようすは　みせない。"
          silver: "ウロコで　おおわれた　がんじょうな\nからだで　すあなの　いりぐちをふさぎ\nてきから　こどもたちを　まもる。"
        en:
          gold: "Its body is cover-\ned with needle-\nlike scales. It\fnever shows signs\nof shrinking from\nany attack."
          silver: "It uses its scaly,\nrugged body to\nseal the entrance\fof its nest and\nprotect its young\nfrom predators."
        fr:
          gold: "Son corps est cou-\nvert de pointes\nformant une\fcarapace très\nrésistante qui le\nprotège en combat."
          silver: "Il se sert de son\ncorps lourdement\nprotégé pour\fempêcher les\nprédateurs d’ac-\ncéder à son nid."
        it:
          gold: "Il suo corpo è\ncoperto di squame\nappuntite. Non\findietreggia\ndavanti ad\nalcun attacco."
          silver: "Con il suo corpo\nrobusto e squamoso\nsbarra l’accesso\falla tana e\nprotegge i piccoli\ndai predatori."
        de:
          gold: "Sein Körper ist\nmit nadelähnli-\nchen Schuppen be-\fdeckt. Dies macht\nes gegen Attacken\nnahezu immun."
          silver: "Es benutzt seinen\nschuppigen Körper,\num den Höhlenein-\fgang als Schutz\nfür seine Jungen\nzu sperren."
        es:
          gold: "Su cuerpo està\ncubierto por\npequeñas escamas.\fNunca parece\nacobardarse ante\nningùn ataque."
          silver: "Usa su cuerpo duro\ny con escamas para\nsellar la entrada\fa su madriguera\ny protegerse de\nlos depredadores."
        ko:
          gold: "전신이 바늘같은 비늘로\n뒤덮혀 있다  어떠한 공격에도\n기가 죽은 모습은 보이지 않는다"
          silver: "비늘로 뒤덮인 튼튼한\n몸으로 둥지의 입구를 지켜\n적으로부터 새끼들을 지킨다"
nidoran_m:
  species_id: 32
  names:
    jp_kana: ニドラン♂
    en: NIDORAN♂
    fr: NIDORAN♂
    it: NIDORAN♂
    de: NIDORAN♂
    es: NIDORAN♂
    ko: 니드런♂
  forms:
    nidoran_m:
      form_id: 0
      base_stats:
        hp: 46
        attack: 57
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 50
      types:
        - poison
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "こがらだが　ツノのなかには　どくが\nいっぱい。ぜんしんで　とびこんできて\nツノをさし　どくを　ながしこむ。"
          silver: "おおきな　みみを　たてて\nまわりをさぐり　きけんが　せまると\nさきに　こうげきを　しかけてくる。"
        en:
          gold: "It is small, but\nits horn is filled\nwith poison. It\fcharges then stabs\nwith the horn to\ninject poison."
          silver: "It raises its big\nears to check its\nsurroundings.\fIt will strike\nfirst if it senses\nany danger."
        fr:
          gold: "Il est tout petit,\nmais ses cornes\nsont enduites d’un\fpoison fulgurant\nqu’il inocule en\nchargeant."
          silver: "Il soulève ses\noreilles pour\nsurveiller les\fenvirons et frap-\npe en premier en\ncas de danger."
        it:
          gold: "È piccolo, ma il\ncorno è colmo di\nveleno. Carica,\fpoi infilza con\nil corno iniet-\ntando il veleno."
          silver: "Rizza le orecchie\nper analizzare\nl’ambiente.\fAppena avverte il\npericolo attacca\nper primo."
        de:
          gold: "Es ist klein, aber\nsein Horn ist gif-\ntig. Es bohrt sein\fHorn in seine\nGegner, um Gift\nzu injizieren."
          silver: "Es stellt seine\nOhren auf, um die\nUmgebung zu prü-\ffen. Spürt es Ge-\nfahr, greift es\nstets zuerst an."
        es:
          gold: "Es pequeño, pero\nsu cuerno està\nlleno de veneno.\fPrimero embiste, y\ndespués lanza su\nvenenosa cornada."
          silver: "Levanta sus orejas\npara vigilar los\nalrededores. Serà\fel primero en\natacar si se\nsiente amenazado."
        ko:
          gold: "작은 몸이지만 뿔 안에는 독이\n가득하다\n뿔로 찔러 중독시킨다"
          silver: "커다란 귀를 세워서\n주변을 살피고 위험이 닥치면\n먼저 공격을 해온다"
nidorino:
  species_id: 33
  names:
    jp_kana: ニドリーノ
    en: NIDORINO
    fr: NIDORINO
    it: NIDORINO
    de: NIDORINO
    es: NIDORINO
    ko: 니드리노
  forms:
    nidorino:
      form_id: 0
      base_stats:
        hp: 61
        attack: 72
        defense: 57
        special_attack: 55
        special_defense: 55
        speed: 65
      types:
        - poison
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "はったつした　みみを　たてて\nまわりの　けはいを　さぐる。\nなにかあると　すぐに　とびかかる。"
          silver: "おこりっぽい　せいかくで\nこうふんすると　ツノを　つきさし\nもうどくを　ながしこんでくる。"
        en:
          gold: "It raises its big\nears to check its\nsurroundings. If\fit senses any-\nthing, it attacks\nimmediately."
          silver: "Quick to anger, it\nstabs enemies with\nits horn to inject\fa powerful poison\nwhen it becomes\nagitated."
        fr:
          gold: "Il dresse ses\noreilles à l’affût\nd’un bruit suspect\fet attaque toute\nmenace se rap-\nprochant de lui."
          silver: "Rapidement énervé,\nil frappe ses ad-\nversaires de sa\fcorne qui injec-\nte un puissant\npoison."
        it:
          gold: "Rizza le grandi\norecchie per esa-\nminare la zona.\fSe avverte\nqualcosa, attacca\nimmediatamente."
          silver: "Irascibile, quando\nsi innervosisce\ninfilza i nemici\fcon il corno e\ninietta un potente\nveleno."
        de:
          gold: "Es überwacht mit\nseinen riesigen\nOhren die Umge-\fbung. Registriert\nes eine Bewegung,\ngreift es an."
          silver: "Es ist aufbrausend\nund setzt sein\nHorn, dessen Gift\fim Kampf noch\npotenter ist, ohne\nzu zögern ein."
        es:
          gold: "Levanta sus\ngrandes orejas\npara vigilar.\fSi detecta algo,\natacarà de\ninmediato."
          silver: "Muy irascible. Si\nse altera, clava\nel cuerno a sus\fenemigos para\ninyectarles un\npotente veneno."
        ko:
          gold: "발달한 귀를 세워서\n주변의 상황을 살핀다\n뭔가 있으면 바로 힘차게 달려든다"
          silver: "화를 잘내는 성격으로\n흥분을 하면 뿔로 찔러서\n맹독을 흘려 넣는다"
nidoking:
  species_id: 34
  names:
    jp_kana: ニドキング
    en: NIDOKING
    fr: NIDOKING
    it: NIDOKING
    de: NIDOKING
    es: NIDOKING
    ko: 니드킹
  forms:
    nidoking:
      form_id: 0
      base_stats:
        hp: 81
        attack: 92
        defense: 77
        special_attack: 85
        special_defense: 75
        speed: 85
      types:
        - poison
        - ground
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "おおきな　シッポを　ふりまわし\nあいてが　ひるむと　がんじょうな\nからだで　つっこんでくる。"
          silver: "パワーあふれる　ふとい　シッポは\nしめつけた　あいての　せぼねも\nかんたんに　へしおってしまう。"
        en:
          gold: "It swings its big\ntail around during\nbattle. If its foe\fflinches, it will\ncharge with its\nsturdy body."
          silver: "Its tail is thick\nand powerful. If\nit binds an enemy,\fit can snap the\nvictim’s spine\nquite easily."
        fr:
          gold: "Il bouscule ses\nennemis de sa\npuissante queue et\fles charge ensuite\npour les écraser\nau sol."
          silver: "Si elle enserre un\nennemi, sa queue\nredoutable peut\fbriser sa colonne\nvertébrale comme\nun biscuit sec."
        it:
          gold: "In battaglia fa\ngirare la coda. Se\nil nemico tenten-\fna, lo carica con\nil suo fisico\npossente."
          silver: "Ha una coda spessa\ne potente. Se\navvolge un nemico,\fpuò facilmente\nspezzargli la\nspina dorsale."
        de:
          gold: "Es greift zuerst\nmit dem Schwanz\nan. Weicht sein\fGegner aus, greift\nes mit seinem\nKörper an."
          silver: "Sein Schwanz ist\nsehr stark. Wi-\nckelt es einen\fGegner ein, kann\nes mühelos sein\nRückgrat brechen."
        es:
          gold: "Mueve su cola\nen combate. Si\nsu enemigo queda\fatontado, le\nembiste con su\nrobusto cuerpo."
          silver: "Su cola es gruesa\ny potente. Si\natrapa al enemigo\fcon ella, podría\nromperle la\ncolumna."
        ko:
          gold: "커다란 꼬리를 휘둘러\n상대의 기가 죽으면 튼튼한\n몸으로 돌진해온다"
          silver: "힘이 넘치는 두꺼운 꼬리는\n힘껏 조르고 있는 상대의 척추를\n간단하게 부러뜨려버린다"
clefairy:
  species_id: 35
  names:
    jp_kana: ピッピ
    en: CLEFAIRY
    fr: MELOFEE
    it: CLEFAIRY
    de: PIEPI
    es: CLEFAIRY
    ko: 삐삐
  forms:
    clefairy:
      form_id: 0
      base_stats:
        hp: 70
        attack: 45
        defense: 48
        special_attack: 60
        special_defense: 65
        speed: 35
      types:
        - normal
      egg_groups:
        - fairy
      held_items:
        common: mysteryberry
        rare: moon_stone
      descriptions:
        jp_kana:
          gold: "せなかの　つばさに　つきのひかりを\nあつめることで　くうちゅうに\nうかぶことが　できるらしい。"
          silver: "あいくるしい　しぐさと　なきごえで\nかわいいと　だいにんきの　ポケモン。\nだが　めったに　みつからない。"
        en:
          gold: "The moonlight that\nit stores in the\nwings on its back\fapparently gives\nit the ability to\nfloat in midair."
          silver: "Its adorable be-\nhavior and cry\nmake it highly\fpopular. However,\nthis cute POKéMON\nis rarely found."
        fr:
          gold: "La lumière de la\nlune qu’il em-\nmagasine dans ses\failes dorsales lui\npermet de flotter\ndans les airs."
          silver: "Son comportement\nadorable le rend\ntrès populaire.\fMalheureusement,\nil est très très\nrare."
        it:
          gold: "Sembra che la luce\nlunare che racco-\nglie nelle ali sul\fdorso gli permetta\ndi volare\na mezz’aria."
          silver: "Il suo verso e il\ncomportamento lo\nrendono molto po-\fpolare, anche se\nquesto dolce POKé-\nMON è raro."
        de:
          gold: "Aufgrund des ge-\nspeicherten Mond-\nlichts in seinen\fFlügeln auf dem\nRücken kann es in\nder Luft schweben."
          silver: "Aufgrund seines\nfreundlichen Ver-\nhaltens ist es\fsehr beliebt. Die-\nses POKéMON ist\njedoch selten."
        es:
          gold: "La luz de luna\nque guarda en las\nalas de su lomo\fparece darle\nla habilidad de\nflotar en el aire."
          silver: "Su adorable grito\ny comportamiento\nlo hacen muy\fpopular. Sin\nembargo, es muy\nraro de encontrar."
        ko:
          gold: "등의 날개에 달빛을\n모으는 것으로 공중에\n떠오를 수 있다는 것 같다"
          silver: "귀여운 몸 동작과 울음소리로\n귀엽고도 인기있는 포켓몬\n그러나 좀처럼 눈에 띄지 않는다"
clefable:
