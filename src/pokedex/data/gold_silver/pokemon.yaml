          silver: "Vicious in nature,\nit drives PIDGEY\nfrom their nests\fand feasts on the\neggs that are left\nbehind."
        fr:
          gold: "Ses griffes sont\ncachées dans ses\npattes. S’il est\fattaqué, il les\nsort pour frapper\nses ennemis."
