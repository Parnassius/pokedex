          silver: "S’il est attaqué\npar un ennemi trop\nfort pour lui,\fil feint la bles-\nsure pour s’échap-\nper facilement."
        it:
          gold: "Crescendo, la sua\ncoda bianca si\ncolora e si divi-\fde in sei. È\nmolto tenero e\naffettuoso."
          silver: "Se è attaccato da\nun nemico più\nforte, si finge\fferito per\ningannarlo e\nfuggire."
        de:
          gold: "Beim Heranwachsen\nteilt sich sein\nSchweif sechsfach\fund wird farbig.\nEs ist warm und\nanschmiegsam."
          silver: "Greift es ein\ngrößerer Gegner\nan, täuscht es ei-\fne Verletzung vor,\num sicher vor ihm\nzu flüchten."
        es:
          gold: "A medida que\ncrece, su blanca\ncola gana color\fy se divide en\nseis. Es càlido\ny adorable."
          silver: "Si le ataca un\nenemigo màs fuerte\nque él, finge\festar herido para\nconfundirle\ny huir."
        ko:
          gold: "하얀 꼬리가 크게 자라면\n색이 생겨 6개로 나누어진다\n끌어안으면  따뜻하다"
          silver: "자신보다 강한 상대에게\n공격을 받으면 다친 척을 해서\n속이고 그 틈을 타서 도망친다"
ninetales:
