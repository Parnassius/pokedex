      descriptions:
        jp_kana:
          gold: "ほんとうは　おくびょうで　こわがり。\nおそわれると　ひっしに　てあしを\nふって　てきを　おいはらおうとする。"
          silver: "おもすぎる　キバのため\nいつも　くびを　かしげている。\nただし　かみつきは　きょうりょく。"
        en:
          gold: "It is actually\ntimid and easily\nspooked. If at-\ftacked, it flails\nabout to fend off\nits attacker."
          silver: "Because its fangs\nare too heavy, it\nalways keeps its\fhead tilted down.\nHowever, its BITE\nis powerful."
        fr:
          gold: "Il est en fait\ntrès timide et\nun peu hésitant.\fS’il est attaqué,\nil se défend avec\nénergie."
          silver: "Ses crocs sont\ntrop lourds, ce\nqui lui fait pen-\fcher la tête.\nAttention à sa\nMORSURE."
        it:
          gold: "È timido e facile\nda spaventare.\nSe è attaccato,\finizia ad agitarsi\nper tenere lontano\nil nemico."
          silver: "Sta sempre con il\ncapo piegato in\navanti, perché ha\fi denti troppo\npesanti. Il suo\nMORSO è potente."
        de:
          gold: "Es ist sehr scheu\nund ängstlich.\nAttackiert man es,\ffuchtelt es wild\nherum, um den Geg-\nner abzuschütteln."
          silver: "Weil seine Reiß-\nzähne so schwer\nsind, ist sein\fKopf gesenkt. Sein\nBISS ist jedoch\nschmerzhaft."
        es:
          gold: "Es muy tímido\ny asustadizo.\nSi se siente\fatacado, se moverà\npara evitar\nal enemigo."
          silver: "Debido a que sus\ncolmillos son muy\npesados, siempre\fva boca abajo. Su\nMORDISCO es\nmuy potente."
        ko:
          gold: "정말은 겁쟁이라서 겁이 많다\n공격받으면 필사적으로 손발을\n흔들어 적을 쫓으려고 한다"
          silver: "너무 무거운 송곳니 때문에\n항상 목을 기울이고 있다\n단 물어뜯기는 강력하다"
qwilfish:
  species_id: 211
