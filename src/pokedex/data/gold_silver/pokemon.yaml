        it:
          gold: "Per quanto dura\nsia la pelle della\nvittima, la fora\fcon le zanne affi-\nlate macchiandosi\ndi sangue."
          silver: "Può bere più di\n300 cc di sangue\nalla volta.\fSe ne beve troppo,\nsi appesantisce e\nvola goffamente."
        de:
          gold: "Wie dick die Haut\ndes Opfers auch\nist, seine spitzen\fZähne durchbohren\nsie und es trinkt\nvon seinem Blut."
          silver: "Es kann bis zu 0,3\nLiter Blut auf\neinmal trinken.\fTrinkt es zu viel,\nwird es schwer und\nfliegt behäbig."
        es:
          gold: "Por muy dura que\nsea la piel de su\nvíctima, clava sus\fafilados colmillos\npara atiborrarse\nde su sangre."
          silver: "Puede succionar\nmàs de 300 ml de\nsangre de golpe.\fSi toma demasiada,\nengorda mucho y\nvuela torpemente."
        ko:
          gold: "아무리 단단한 피부라도\n날카로운 송곳니로 뚫어서\n피를 듬뿍 빨아 마신다"
          silver: "300cc의 피를 빨 수 있지만\n한번에 너무 많이 빨면 몸이\n몸이 무거워져서 비틀거린다"
oddish:
  species_id: 43
