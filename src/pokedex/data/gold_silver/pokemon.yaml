          silver: "Nel guscio racco-\nglie BACCHE. Per\nevitare attacchi,\fsi nasconde sotto\nle rocce e non fa\nalcun rumore."
        de:
          gold: "Die BEEREN, die es\nin seinem Inneren\nlagert, verrotten\fund daraus ent-\nsteht ein dick-\nflüssiger Saft."
