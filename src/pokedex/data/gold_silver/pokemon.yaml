        en:
          gold: "It converts sun-\nlight into energy.\nIn the darkness\fafter sunset, it\ncloses its petals\nand becomes still."
          silver: "In the daytime, it\nrushes about in a\nhectic manner, but\fit comes to a com-\nplete stop when\nthe sun sets."
        fr:
          gold: "Il convertit la\nlumière du soleil\nen énergie. Quand\fla nuit tombe, ses\npétales se\nreferment."
          silver: "Durant la journée,\nil erre sans but,\nmais dès la tombée\fde la nuit, il\ns’arrête\ncomplètement."
        it:
          gold: "Converte la luce\nsolare in energia.\nNell’oscurità,\fdopo il tramonto,\nrichiude i petali\ne si fa quieto."
          silver: "Di giorno si muove\nfreneticamente, ma\nquando cala il\fsole si ferma e\ninterrompe ogni\nattività."
        de:
          gold: "Es wandelt Sonnen-\nlicht in Energie.\nNach Sonnenunter-\fgang schließt es\nseine Blüten und\nwird still."
          silver: "Tagsüber rennt es\nhektisch umher,\naber sobald die\fSonne unterge-\ngangen ist, wird\nes bewegungslos."
        es:
          gold: "Convierte la luz\nsolar en energía.\nEn la oscuridad,\ftras el atardecer,\ncierra sus pétalos\ny queda inmóvil."
          silver: "De día, corre\nhistérico de un\nlado a otro, pero\fcuando se pone el\nsol, se detiene\npor completo."
        ko:
          gold: "햇빛을 에너지로 바꾼다\n태양이 저물어 어두워지면\n꽃잎을 닫고 그자리에서 머문다"
          silver: "낮에는 지나칠 정도로 활발히\n돌아다니지만 해가 저물면\n돌연히 움직이지 않게 된다"
yanma:
