          gold: "Three MAGNEMITE\nare linked by a\nstrong magnetic\fforce. Earaches\nwill occur if you\nget too close."
          silver: "The MAGNEMITE are\nunited by a mag-\nnetism so power-\fful, it dries all\nmoisture in its\nvicinities."
        fr:
