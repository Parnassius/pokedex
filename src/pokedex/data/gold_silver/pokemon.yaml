        fr:
          gold: "Son fin pelage\nenregistre les\ncourants d’air\fprovoqués par les\ndéplacements de\nses ennemis."
          silver: "En analysant les\ncourants aériens,\nil peut prédire\fle climat ou même\nles mouvements de\nson adversaire."
        it:
          gold: "Il pelo sottile\nche ricopre il suo\ncorpo analizza le\fcorrenti d’aria e\npredice le mosse\ndel nemico."
          silver: "Legge le correnti\nd’aria per predi-\nre le condizioni\fatmosferiche o la\nprossima mossa del\nnemico."
        de:
          gold: "Mit seinen Kör- \nperhaaren nimmt es\nLuftströmungen\fwahr. Dadurch sagt\nes gegnerische\nAttacken voraus."
          silver: "Es liest die Luft-\nströmungen und\nkann dadurch das\fWetter oder den\nAngriff des Geg-\nners vorhersehen."
        es:
          gold: "Usa el corto\npelaje que cubre\nsu cuerpo para\fsentir el viento\ny predecir las\nacciones enemigas."
          silver: "Basàndose en las\ncorrientes de\naire predice cosas\fcomo el clima o\nel próximo ataque\ndel enemigo."
        ko:
          gold: "전신의 세밀한 털로\n공기의 흐름을 느껴서\n상대방의 행동을 예측한다"
          silver: "공기의 흐름을 읽어내는 것으로\n이제부터의 날씨와 상대방의\n움직임등을 모두 맞혀버린다"
umbreon:
  species_id: 197
