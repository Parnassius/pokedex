          silver: "If exposed to\nmoonlight, it\nstarts to move.\fIt roams far and\nwide at night to\nscatter its seeds."
        fr:
          gold: "La lumière de la\nlune le tient\néveillé. Pendant\fla journée il se\ndissimule sous la\nterre."
          silver: "Il ne se déplace\npour disséminer\nses graines que\florsqu’il est\nexposé aux rayons\nde lune."
        it:
