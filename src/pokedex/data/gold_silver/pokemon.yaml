        attack: 30
        defense: 30
        special_attack: 30
        special_defense: 30
        speed: 30
      types:
        - grass
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "あるあさ　とつぜん　ふってくる。\nオニスズメに　おそわれると　はっぱを\nはげしく　ふって　おいはらう。"
          silver: "はっぱの　うらがわに　たまった\nあさつゆ　だけを　のんで　くらす。\nほかには　なにも　たべないという。"
        en:
          gold: "It may drop out of\nthe sky suddenly.\nIf attacked by a\fSPEAROW, it will\nviolently shake\nits leaves."
          silver: "It lives by drink-\ning only dewdrops\nfrom under the\fleaves of plants.\nIt is said that it\neats nothing else."
        fr:
          gold: "Il tombe du ciel\nsoudainement. S’il\nest attaqué par un\fPIAFABEC, il\nsecoue violemment\nses feuilles."
          silver: "Il vit en buvant\nla rosée sur les\nfeuilles.\fOn dit qu’il ne\npeut rien manger\nd’autre."
        it:
          gold: "Piomba dall’alto\nimprovvisamente.\nSe è attaccato da\funo SPEAROW, agita\nviolentemente le\nfoglie."
          silver: "Vive nutrendosi\ndelle gocce di ru-\ngiada che cadono\fdalle foglie delle\npiante. Pare che\nnon mangi altro."
        de:
          gold: "Manchmal fällt es\nplötzlich vom Him-\nmel. Wird es von\fHABITAK angegrif-\nfen, schüttelt es\nseine Blätter."
          silver: "Es ernährt sich\nausschließlich von\nden Tautropfen,\fdie von den Blät-\ntern über ihm\nhinabfallen."
        es:
          gold: "Puede caer del\ncielo de repente.\nSi le ataca un\fSPEAROW, moverà\nviolentamente\nsus hojas."
          silver: "Se alimenta del\nrocío que hay\nsobre las hojas\fde las plantas.\nDicen que no\ncome nada màs."
        ko:
          gold: "어느 아침에 돌연 날려온다\n깨비참에 공격을 받으면 잎사귀를\n거세게 흔들어서 쫓아낸다"
          silver: "잎사귀의 뒷면에 모인\n이슬만을 먹고산다. 그밖에는\n아무것도 먹지 않는다고 한다"
sunflora:
  species_id: 192
  names:
    jp_kana: キマワリ
    en: SUNFLORA
