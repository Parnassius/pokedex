          silver: "Quand il marche\nsur la terre\nferme, il répand\fune fine couche de\npoison tout le\nlong de son corps."
        it:
          gold: "È un POKéMON che\nvive nell’acqua\nfredda. Quando fa\ffreddo fuori,\nesce dall’acqua\nper cercare cibo."
          silver: "Camminando avanti\ne indietro,\nricopre il corpo\fdi una pellicola\nvischiosa e\nvelenosa."
        de:
          gold: "Dieses POKéMON\nlebt in Eiswasser.\nWird es an Land\fkalt, verlässt es\ndas Wasser und\nsucht nach Futter."
          silver: "Bewegt es sich an\nLand, bedeckt es\nseinen gesamten\fKörper mit einem\nschleimigen Gift-\nfilm."
        es:
          gold: "Este POKéMON vive\nen aguas frías.\nSale del agua\fpara buscar comida\ncuando refresca\nel ambiente."
          silver: "Cuando camina por\nel suelo, envuelve\nsu cuerpo con\funa película\nsuave y\nvenenosa."
        ko:
          gold: "차가운 물속에서 생활한다\n근처가 선선해지면 먹이를\n찾으러 지상에도 나타난다"
          silver: "지상을 돌아다닐 때는\n미끈미끈한 독의 점막으로\n몸의 표면을 덮고 있다"
quagsire:
