        rare: kings_rock
      descriptions:
        jp_kana:
          gold: "みずべで　ボーッとしている。\nなにかが　シッポに　かみついても\nまる１にち　きづかない。"
          silver: "シッポの　さきから　あまみが\nにじみでている。えいようは　ないが\nかんでいると　しあわせな　きぶん。"
        en:
          gold: "It lazes vacantly\nnear water. If\nsomething bites\fits tail, it won’t\neven notice for a\nwhole day."
          silver: "A sweet sap leaks\nfrom its tail’s\ntip. Although not\fnutritious, the\ntail is pleasant\nto chew on."
        fr:
          gold: "Il est tellement\nparesseux, qu’il\nlui faut une jour-\fnée pour remarquer\nqu’on lui mord la\nqueue."
          silver: "Une sève sucrée\ncoule du bout de\nsa queue. Peu\fnutritive, elle\nreste agréable à\nmachouiller."
        it:
          gold: "Ozia con aria as-\nsente vicino all’\nacqua. Se gli si\fmorsicasse la coda\nnon se ne accorge-\nrebbe neppure."
          silver: "Una dolce linfa\ngli cola dalla\npunta della coda.\fNon è nutriente,\nma ha un buon\nsapore."
        de:
          gold: "Es faulenzt am\nWasser. Wenn es\nin den Schwanz ge-\fbissen wird, be-\nmerkt es das erst\nam nächsten Tag."
          silver: "Süßer Saft ist auf\nseiner Rute. Ob-\nwohl sie nicht\fnahrhaft ist,\nmacht es Spaß,\ndarauf zu kauen."
        es:
          gold: "Descansa ocioso\njunto al agua.\nSi algo muerde\fsu cola, no lo\nnotarà en todo\nel día."
          silver: "De la punta de su\ncola gotea una\nsavia muy dulce.\fNo es nutritiva,\npero es deliciosa\npara mascar."
        ko:
          gold: "물가에서 멍하게 지내고 있다\n무언가가 꼬리를 깨물어도\n대략 하루정도 모르고 지낸다"
          silver: "꼬리의 끝에서 달콤한 맛이\n번져나오고 있다  영양은 없지만\n물고 있으면 행복한 기분이 든다"
slowbro:
  species_id: 80
