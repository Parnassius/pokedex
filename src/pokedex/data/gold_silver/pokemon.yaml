      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "どんなに　かたい　ひふでも\nするどい　キバで　つらぬいて\nたっぷりと　ちを　すいまくる。"
          silver: "３００シーシーの　ちを　すえるが\nいちどに　すいすぎると　からだが\nおもたくなって　ふらふら　する。"
        en:
          gold: "However hard its\nvictim’s hide may\nbe, it punctures\fwith sharp fangs\nand gorges itself\nwith blood."
          silver: "It can drink more\nthan 10 ounces of\nblood at once. If\fit has too much,\nit gets heavy and\nflies clumsily."
        fr:
          gold: "Sa morsure peut\npercer l’épiderme\nle plus dur. Il\fpeut ainsi boire\nle sang de ses\nennemis."
