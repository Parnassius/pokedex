bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    en: BULBASAUR
    fr: BULBIZARRE
    it: BULBASAUR
    de: BISASAM
    es: BULBASAUR
    ko: 이상해씨
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          gold: "せなかの　たねの　なかには\nえいようが　たっぷり。たねは\nからだと　いっしょに　おおきくなる。"
          silver: "うまれたときから　せなかに　タネを\nせおっている。からだが　おおきく\nそだつごとに　タネも　おおきくなる。"
        en:
          gold: "The seed on its\nback is filled\nwith nutrients.\fThe seed grows\nsteadily larger as\nits body grows."
          silver: "It carries a seed\non its back right\nfrom birth. As it\fgrows older, the\nseed also grows\nlarger."
        fr:
          gold: "La graine sur son\ndos est gorgée de\nnutriments.\fLa graine grossit\nen conséquence de\nsa croissance."
          silver: "Il porte une\ngraine sur son\ndos depuis la\fnaissance. Elle\ngrandit avec lui."
        it:
          gold: "Il seme che ha sul\ndorso è ricco di\nsostanze nutrien-\fti. Il seme cresce\ncostantemente con\nil suo corpo."
          silver: "Dalla nascita ha\nun seme sul\ndorso. Quando\fcresce, anche il\nseme diventa\npiù grande."
        de:
          gold: "Der Samen auf dem\nRücken enthält\nNährstoffe.\fEr wächst mit\nzunehmender\nKörpergröße."
          silver: "Von Geburt an\nträgt es einen\nSamen auf seinem\fRücken. Wächst es,\nso wächst auch\nder Samen."
        es:
          gold: "La semilla de su\nlomo està llena\nde nutrientes.\fLa semilla brota\na medida que el\nPOKéMON crece."
          silver: "Lleva una semilla\nen su lomo desde\nque nació. A\fmedida que crece,\nla semilla se hace\nmàs grande."
        ko:
          gold: "등의 씨앗 안에는\n영양이 가득하다  씨앗은\n몸과함께 크게 자란다"
          silver: "태어날 때부터 등에 씨앗을\n짊어지고 있다  몸이 크게\n성장함에 따라 씨앗도 커진다"
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    en: IVYSAUR
    fr: HERBIZARRE
    it: IVYSAUR
    de: BISAKNOSP
    es: IVYSAUR
    ko: 이상해풀
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          gold: "たいようの　ひかりを　あびるほど\nからだに　ちからが　わいて\nせなかの　つぼみが　そだっていく。"
          silver: "せなかの　つぼみから　あまいかおりが\nただよいはじめたのは　もうすぐ\nおおきなハナが　ひらく　しょうこだ。"
        en:
          gold: "Exposure to sun-\nlight adds to its\nstrength. Sunlight\falso makes the bud\non its back grow\nlarger."
          silver: "If the bud on its\nback starts to\nsmell sweet, it\fis evidence that\nthe large flower\nwill soon bloom."
        fr:
          gold: "La lumière du so-\nleil le rend plus\nfort et vigoureux.\fLe bulbe sur son\ndos grossit en\nconséquence."
          silver: "Si le bourgeon\nsur son dos\ncommence à sentir\fbon, la fleur\nrisque d’éclore\nbientôt."
        it:
          gold: "L’esposizione alla\nluce solare lo\nrafforza e fa\fcrescere il\nbocciolo che ha\nsul dorso."
          silver: "Se il bocciolo\nche ha sulla\nschiena emana un\fdolce profumo,\npresto sboccerà\nil grande fiore."
        de:
          gold: "Die Sonne macht es\nstärker. Die\nKnospe auf seinem\fRücken wächst\nunter dem Einfluss\nvon Sonnenlicht."
          silver: "Verbreitet die\nKnospe auf seinem\nRücken einen süßen\fDuft, ist das ein\nAnzeichen, dass\nsie bald blüht."
        es:
          gold: "Puede aumentar su\nfuerza con energía\nsolar. Ésta\ftambién hace que\ncrezca el capullo\nde su lomo."
          silver: "Si el capullo de\nsu lomo comienza\na oler dulce,\findica que la\ngran flor pronto\nflorecerà."
        ko:
          gold: "햇빛을 받는만큼\n몸에 힘이 솟아 나와\n등의 꽃봉오리가 자라난다"
          silver: "등의 꽃봉오리에서 달콤한 향기가\n나기 시작했다는 것은 이제 곧\n커다란 꽃이 핀다는 증거다"
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    en: VENUSAUR
    fr: FLORIZARRE
    it: VENUSAUR
    de: BISAFLOR
    es: VENUSAUR
    ko: 이상해꽃
  forms:
    venusaur:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          gold: "おおきな　はなびらを　ひろげ\nたいようの　ひかりを　あびていると\nからだに　げんきが　みなぎっていく。"
          silver: "あびた　たいようの　ひかりを\nエネルギーに　へんかんできるので\nなつの　ほうが　つよくなる。"
        en:
          gold: "By spreading the\nbroad petals of\nits flower and\fcatching the sun’s\nrays, it fills its\nbody with power."
          silver: "It is able to con-\nvert sunlight into\nenergy. As a\fresult, it is more\npowerful in the\nsummertime."
        fr:
          gold: "Ses pétales lui\nservent à capter\nla lumière du\fsoleil. Il peut\nainsi en canaliser\nl’énergie."
          silver: "Il est capable\nde transformer\nla lumière en\fénergie. Il est\ndonc redoutable\nen été."
        it:
          gold: "Si riempie di\nenergia grazie ai\ngrandi petali del\ffiore, che spa-\nlanca catturando\ni raggi solari."
          silver: "Può convertire la\nluce solare in\nenergia.\fPer questo\nè più forte\nin estate."
        de:
          gold: "Es spreizt die\nbreiten Blätter\nseiner Blüte, um\fseinen Körper\nmit Sonnenenergie\nzu durchfluten."
          silver: "Es verwandelt Son-\nnenlicht in Ener-\ngie. Dadurch ist\fes im Sommer stets\nstärker als im\nWinter."
        es:
          gold: "Llena su cuerpo de\nenergía con los\nrayos solares que\fcaptan los anchos\npétalos de su\nflor."
          silver: "Puede convertir\nla luz del sol\nen energía.\fPor esa razón,\nes màs poderoso\nen verano."
        ko:
          gold: "커다란 꽃잎을 펴서\n햇빛을 받고 있으면\n몸에 힘이 가득 넘쳐난다"
          silver: "내리쪼이는 태양의 빛을\n에너지로 변환할 수 있기 때문에\n여름 때에 더욱 강해진다"
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    en: CHARMANDER
    fr: SALAMECHE
    it: CHARMANDER
    de: GLUMANDA
    es: CHARMANDER
    ko: 파이리
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      descriptions:
        jp_kana:
          gold: "シッポで　もえる　ほのおは\nせいめいりょくの　あらわれ。\nげんきがないと　ほのおは　よわまる。"
          silver: "しっぽの　ほのおは　ヒトカゲの\nせいめいりょくの　あかし。\nげんきだと　さかんに　もえさかる。"
        en:
          gold: "The flame on its\ntail shows the\nstrength of its\flife force. If it\nis weak, the flame\nalso burns weakly."
          silver: "The flame on its\ntail indicates\nCHARMANDER’s life\fforce. If it is\nhealthy, the flame\nburns brightly."
        fr:
          gold: "La flamme au bout\nde sa queue montre\nla vivacité de son\fénergie. S’il est\nfaible, sa flamme\nsera petite."
          silver: "La flamme sur sa\nqueue représente\nl’énergie vitale\fde SALAMECHE. Si\nelle est forte,\nil a la santé!"
        it:
          gold: "La fiamma che ha\nsulla coda\ndimostra tutta la\fsua forza.\nSe è fiacco,\nla fiamma è fioca."
          silver: "La fiamma che\nCHARMANDER ha sul-\nla coda indica la\fsua forza vitale.\nSe è in forma, la\nfiamma è vivace."
        de:
          gold: "Die Flamme auf \nder Schwanzspitze\nzeigt die Lebens-\fenergie. Ist sie\nschwach, ist die\nFlamme klein."
          silver: "Die Flamme auf\nseiner Schwanz-\nspitze zeigt seine\fLebensenergie an.\nIst es gesund,\nleuchtet sie hell."
        es:
          gold: "La llama de su\ncola indica su\nfuerza vital.\fSi està débil,\nla llama arderà\nmàs tenue."
          silver: "La llama de su\ncola indica la\nfuerza vital de\fCHARMANDER. Serà\nbrillante si està\nsano."
        ko:
          gold: "꼬리에서 타오르는 화염은\n생명력의 상징\n힘이 없으면 화염은 약해진다"
          silver: "꼬리의 화염은 파이리의\n생명력의 상징\n건강할 때 왕성하게 불타오른다"
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    en: CHARMELEON
    fr: REPTINCEL
    it: CHARMELEON
    de: GLUTEXO
    es: CHARMELEON
    ko: 리자드
  forms:
    charmeleon:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        special_attack: 80
        special_defense: 65
        speed: 80
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      descriptions:
        jp_kana:
          gold: "もえたぎるような　せいかくで　いつも\nたたかう　あいてを　さがしている。\nかたないと　ちが　しずまらない。"
          silver: "もえる　しっぽを　ふりまわし\nするどい　ツメで　あいてを　きりさく\nあらあらしい　せいかく。"
        en:
          gold: "It is very hot-\nheaded by nature,\nso it constantly\fseeks opponents.\nIt calms down only\nwhen it wins."
          silver: "It has a barbaric\nnature. In battle,\nit whips its\ffiery tail around\nand slashes away\nwith sharp claws."
        fr:
          gold: "Il a le sang chaud\nde par sa nature.\nIl est constamment\fà la recherche de\nnouveaux adversai-\nres."
          silver: "Il est très\nsauvage. En\ncombat, il se\fsert de ses grif-\nfes acérées et\nde sa queue."
        it:
          gold: "È turbolento di\nnatura, sempre\nalla ricerca di\favversari. Si\nplaca solo dopo\naver vinto."
          silver: "Ha un’indole\nspietata. Durante\nla lotta frusta\fcon la forte coda\ne taglia con\nartigli affilati."
        de:
          gold: "Es ist hitzig und\nsucht ständig\nnach Gegnern. Es\fberuhigt sich\nnur, wenn es\ngewinnt."
          silver: "Es ist brutal ver-\nanlagt. Im Kampf\nschlägt es mit\fseinem Schwanz und\nsetzt seine schar-\nfen Klauen ein."
        es:
          gold: "Por naturaleza,\nse acalora con\nfacilidad: siempre\festà buscando\nenemigos. Sólo se\ncalma cuando gana."
          silver: "De naturaleza\nbàrbara, en la\nbatalla esgrime\fsu fiera cola,\ny araña con sus\nafiladas garras."
        ko:
          gold: "불타오르는 듯한 성격으로 항상\n싸울 상대를 찾아다닌다\n이기지 못하면 마음을 잡지 못한다"
          silver: "불꽃의 꼬리를 휘두르며\n날카로운 발톱으로 상대를 공격\n몹시 거칠은 성격"
charizard:
  species_id: 6
  names:
    jp_kana: リザードン
    en: CHARIZARD
    fr: DRACAUFEU
    it: CHARIZARD
    de: GLURAK
    es: CHARIZARD
    ko: 리자몽
  forms:
    charizard:
      form_id: 0
      base_stats:
        hp: 78
        attack: 84
        defense: 78
        special_attack: 109
        special_defense: 85
        speed: 100
      types:
        - fire
        - flying
      egg_groups:
        - monster
        - dragon
      descriptions:
        jp_kana:
          gold: "ほんきで　おこった　りザードンの\nしっぽの　さきの　ほのおは\nあおじろく　もえあがる。"
          silver: "なんでも　とかしてしまうほどの\nしゃくねつの　ほのおを　ふきだし\nあいてを　くるしめる。"
        en:
          gold: "If CHARIZARD be-\ncomes furious, the\nflame at the tip\fof its tail flares\nup in a whitish-\nblue color."
          silver: "Breathing intense,\nhot flames, it can\nmelt almost any-\fthing. Its breath\ninflicts terrible\npain on enemies."
        fr:
          gold: "Quand DRACAUFEU\ns’énerve, la flam-\nme au bout de sa\fqueue brille d’une\nlueur blanche avec\ndes reflets bleus."
          silver: "Pouvant souffler\ndes flammes\nintenses, il peut\ffaire fondre\nn’importe quoi.\nGare à sa colère!"
        it:
          gold: "Se s’infuria,\nla fiamma che ha\nsulla punta della\fcoda si colora\ndi un blu\nbiancastro."
          silver: "Sputando fiamme\ncaldissime può\nsciogliere quasi\fogni cosa. Le sue\nfiamme causano\ndolori terribili."
        de:
          gold: "Wenn Glurak wütend\nwird, flackert die\nFlamme auf seiner\fSchwanzspitze\nin einem\nbläulichen Ton."
          silver: "Sein heißer Feu-\neratem kann fast\nalles schmelzen.\fSein Atem fügt\nden Gegnern enorme\nSchmerzen zu."
        es:
          gold: "Si CHARIZARD se\nenfurece, la llama\nde la punta de su\fcola producirà\ndestellos de\ncolor azul claro."
          silver: "Con sus intensas\nllamas, derrite\ncasi cualquier\fcosa. Su aliento\ncausa un terrible\ndolor al enemigo."
        ko:
          gold: "정말 화가 난 리자몽의\n꼬리 끝의 화염은\n푸른빛으로 불타오른다"
          silver: "무엇이든 녹여버릴 정도의\n작열하는 화염을 뿜어\n상대를 공격한다"
squirtle:
  species_id: 7
  names:
    jp_kana: ゼニガメ
    en: SQUIRTLE
    fr: CARAPUCE
    it: SQUIRTLE
    de: SCHIGGY
    es: SQUIRTLE
    ko: 꼬부기
  forms:
    squirtle:
      form_id: 0
      base_stats:
        hp: 44
        attack: 48
        defense: 65
        special_attack: 50
        special_defense: 64
        speed: 43
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "うまれたては　やわらかい　こうらも\nすぐに　ゆびでつつくと　はじくほどの\nだんりょくせいを　もつようになる。"
          silver: "うまれて　しばらくすると　かたまる\nこうらには　だんりょくせいが　あって\nゆびで　つつくと　はじきかえされる。"
        en:
          gold: "The shell is soft\nwhen it is born.\nIt soon becomes so\fresilient, prod-\nding fingers will\nbounce off it."
          silver: "The shell, which\nhardens soon after\nit is born, is\fresilient. If you\npoke it, it will\nbounce back out."
        fr:
          gold: "Sa carapace est\nmolle à la nais-\nsance, mais elle\fdevient de plus en\nplus dure avec\nl’âge."
          silver: "Sa coquille com-\nmence à durcir\njuste après sa\fnaissance.\nJeune, elle est\nassez tendre."
        it:
          gold: "Quando nasce, il\nsuo guscio è\ntenero. Ma presto\fdiviene elastico:\nse un dito lo\ntocca, rimbalza."
          silver: "Ha un guscio\nelastico, che si\nindurisce subito\fdopo la nascita.\nI colpi gli\nrimbalzano contro."
        de:
          gold: "Sein Panzer ist\nbei Geburt weich.\nEr wird bald so\felastisch, dass\nkleinere Stöße von\nihm abprallen."
          silver: "Sein Panzer, der\nbald nach der Ge-\nburt aushärtet,\fbleibt federnd.\nDrückt man darauf,\nspringt er zurück."
        es:
          gold: "Su caparazón es\nblando al nacer.\nPero pronto se\fendurecerà y serà\ncapaz de resistir\ncualquier amenaza."
          silver: "La concha, que\nse endurece al\npoco de nacer, es\felàstica. Si\nla golpeas,\nrebotarà."
        ko:
          gold: "태어나서는 부드러운 껍질도\n곧 손으로 찌르면 뜅겨나갈 정도의\n탄력성을 지니도록 된다"
          silver: "태어나서 조금 지나면 딱딱해지는\n껍질에는 반발력이 있어서\n손가락으로 찌르면 튕겨져버린다"
wartortle:
  species_id: 8
  names:
    jp_kana: カメール
    en: WARTORTLE
    fr: CARABAFFE
    it: WARTORTLE
    de: SCHILLOK
    es: WARTORTLE
    ko: 어니부기
  forms:
    wartortle:
      form_id: 0
      base_stats:
        hp: 59
        attack: 63
        defense: 80
        special_attack: 65
        special_defense: 80
        speed: 58
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "ながいきの　シンボルと　されている。\nこうらに　コケが　ついているのは\nとくに　ながいきの　カメールだ。"
          silver: "ふさふさの　みみと　しっぽを\nたくみに　あやつって　すいちゅうでの\nバランスを　たもつ。"
        en:
          gold: "It is recognized\nas a symbol of\nlongevity. If its\fshell has algae on\nit, that WARTORTLE\nis very old."
          silver: "It cleverly con-\ntrols its furry\nears and tail to\fmaintain its\nbalance while\nswimming."
        fr:
          gold: "Il est considéré\ncomme un symbole\nde longévité. Les\falgues accrochées\nà sa carapace\nindiquent son âge."
          silver: "Il contrôle ef-\nficacement sa\nqueue et ses\foreilles pour\nnager encore\nplus vite."
        it:
          gold: "È considerato un\nsimbolo di longe-\nvità. Se ci sono\falghe sul suo\nguscio, allora\nè molto anziano."
          silver: "Controlla abil-\nmente le orecchie\ne la coda coperte\fdi pelo, mantenen-\ndo l’equilibrio\nmentre nuota."
        de:
          gold: "Es gilt als Symbol\nvon Langlebigkeit.\nIst sein Panzer\fmit Algen übersät,\nist SCHILLOK sehr\nalt."
          silver: "Es balanciert ge-\nschickt mit seinen\nbuschigen Ohren\fund dem Schwanz,\nwährend es im\nWasser schwimmt."
        es:
          gold: "Es reconocido\ncomo símbolo de\nlongevidad. Los\fWARTORTLE ancianos\ntienen algas sobre\nel caparazón."
          silver: "Utiliza sus\npeludas orejas\ny patas para\fmantener el\nequilibrio\nal nadar."
        ko:
          gold: "장수의 상징으로 여겨지고 있다\n껍질에 이끼가 붙어있는 것은\n특별히 장수를 한 거북이다"
          silver: "탐스러운 귀와 꼬리를\n능숙하게 다뤄서 수중에서의\n밸런스를 유지한다"
blastoise:
  species_id: 9
  names:
    jp_kana: カメックス
    en: BLASTOISE
    fr: TORTANK
    it: BLASTOISE
    de: TURTOK
    es: BLASTOISE
    ko: 거북왕
  forms:
    blastoise:
      form_id: 0
      base_stats:
        hp: 79
        attack: 83
        defense: 100
        special_attack: 85
        special_defense: 105
        speed: 78
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "ふんしゃした　みずの　いきおいに\nまけないように　わざと\nたいじゅうを　おもくしているのだ。"
          silver: "こうらの　ロケットほう　から\nふきだした　ジェットすいりゅうは\nぶあつい　てっぱんも　つらぬく。"
        en:
          gold: "It deliberately\nmakes itself heavy\nso it can with-\fstand the recoil\nof the water jets\nit fires."
          silver: "The rocket cannons\non its shell fire\njets of water\fcapable of punch-\ning holes through\nthick steel."
        fr:
          gold: "Il devient énorme\nafin de supporter\nle puissant recul\fprovoqué par le\ntir de ses\nHydrocanons."
          silver: "Les canons sur sa\ncoquille tirent\ndes jets d’eau\fcapables de percer\nmême de l’acier\ntrempé!"
        it:
          gold: "Aumenta il suo\npeso per poter\nresistere al\fcontraccolpo dei\ngetti d’acqua\nche spara."
          silver: "I cannoni\nsul suo guscio\nsparano getti\fd’acqua capaci\ndi bucare\nl’acciaio."
        de:
          gold: "Es macht sich ab-\nsichtlich schwer,\num den Rückstoß\fseiner Hydropumpe\nabzufangen."
          silver: "Die Wassersalven,\ndie es mit den\nKanonen in seinem\fPanzer abfeuert,\ndurchdringen sogar\nPanzerstahl."
        es:
          gold: "Deliberadamente se\nhace màs pesado\npara contrarrestar\fla fuerza de los\nchorros de agua\nque dispara."
          silver: "Los cañones de su\nconcha disparan\nchorros de agua\fcapaces de hacer\nagujeros en las\nplanchas de acero."
        ko:
          gold: "분사한 물의 위력에\n밀리지 않도록 특별히\n체중을 무겁게 불리고 있다"
          silver: "껍질의 로켓포로부터\n뿜어져 나오는 제트수류는\n두꺼운 철판도 뚫는다"
caterpie:
  species_id: 10
  names:
    jp_kana: キャタピー
    en: CATERPIE
    fr: CHENIPAN
    it: CATERPIE
    de: RAUPY
    es: CATERPIE
    ko: 캐터피
  forms:
    caterpie:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 35
        special_attack: 20
        special_defense: 20
        speed: 45
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "あたまの　しょっかく　から\nきょうれつな　においを　だして\nてきを　おいはらい　みをまもる。"
          silver: "あしの　さきは　どんなところにも\nすいつく　きゅうばん。ひっしに\nきのぼりをして　はっぱを　たべる。"
        en:
          gold: "For protection, it\nreleases a horri-\nble stench from\fthe antenna on its\nhead to drive away\nenemies."
          silver: "Its feet have\nsuction cups\ndesigned to stick\fto any surface. It\ntenaciously climbs\ntrees to forage."
        fr:
          gold: "Pour se protéger,\nil émet un gaz\npuant par ses\fantennes qui fait\nfuir ses ennemis\naudacieux."
          silver: "Ses pattes ont\ndes ventouses lui\npermettant de\fgrimper sur toute\nsurface, notam-\nment les arbres."
        it:
          gold: "Per proteggersi\nemette un puzzo\nterribile dall’\fantenna sul\ncapo, tenendo\nlontani i nemici."
          silver: "Le sue zampe hanno\nventose che\npossono aderire ad\fogni superficie.\nSale sugli alberi\ncercando cibo."
        de:
          gold: "Als Schutz vor\nFeinden\nsondert es einen\fübelriechenden\nGestank mit seinen\nAntennen ab."
          silver: "Die Saugnäpfe an\nden Beinen haften\nauf jedem Unter-\fgrund. Es sucht\nhartnäckig in Bäu-\nmen nach Futter."
        es:
          gold: "Para protegerse\ndespide un hedor\nhorrible de sus\fantenas, con el\nque repele a\nsus enemigos."
          silver: "Sus patas tienen\nventosas con las\nque se adhieren a\fcualquier sitio.\nEscala àrboles en\nbusca de forraje."
        ko:
          gold: "머리의 더듬이로부터\n강렬한 냄새를 풍겨서\n적을 물리치고 몸을 보호한다"
          silver: "발 끝에 있는 어디든지\n달라붙는 빨판으로 필사적으로\n나무타기를 해서 잎사귀를 먹는다"
metapod:
  species_id: 11
  names:
    jp_kana: トランセル
    en: METAPOD
    fr: CHRYSACIER
    it: METAPOD
    de: SAFCON
    es: METAPOD
    ko: 단데기
  forms:
    metapod:
      form_id: 0
      base_stats:
        hp: 50
        attack: 20
        defense: 55
        special_attack: 25
        special_defense: 25
        speed: 30
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "カラのなかは　しんかの　じゅんびで\nとても　やわらかく　くずれやすい。\nなるべく　うごかないようにしている。"
          silver: "いっしょうけんめい　そとがわの\nカラをかため　しんかの　じゅんびで\nやわらかい　からだを　まもっている。"
        en:
          gold: "Inside the shell,\nit is soft and\nweak as it pre-\fpares to evolve.\nIt stays motion-\nless in the shell."
          silver: "It prepares for\nevolution by har-\ndening its shell\fas much as possi-\nble to protect its\nsoft body."
        fr:
          gold: "Son corps, sous sa\ncarapace, est mou\net tendre. Il\freste immobile\nen attendant\nd’évoluer."
          silver: "Avant d’évoluer,\nil durcit autant\nque possible sa\fcarapace pour\nprotéger son\ncorps vulnérable."
        it:
          gold: "Morbido e debole\ndentro al suo gu-\nscio, si prepara\fad evolversi.\nNel guscio non fa\nalcun movimento."
          silver: "Prepara l’evolu-\nzione indurendo\nil guscio il più\fpossibile, per\nproteggere il\nmorbido corpo."
        de:
          gold: "Im Inneren ist\nes weich, da es\nsich auf seine\fEntwicklung vorbe-\nreitet. Es bewegt\nsich dabei nicht."
          silver: "Steht seine Ent-\nwicklung bevor,\nhärtet es seine\fSchale, um seinen\nempfindlichen Kör-\nper zu schützen."
        es:
          gold: "En el caparazón,\nmientras se\nprepara para\fevolucionar, està\nblando y débil, en\nestado catatónico."
          silver: "Prepara su\nevolución\nfortaleciendo su\fcaparazón para\nproteger su\ndébil cuerpo."
        ko:
          gold: "껍질 안은 진화의 준비로\n매우 부드럽고 부서지기 쉽다\n되도록이면 움직이지 않으려 한다"
          silver: "열심히 바깥쪽에\n고치를 쳐서 진화의 준비를 하여\n부드러운 몸을 보호하고 있다"
butterfree:
  species_id: 12
  names:
    jp_kana: バタフリー
    en: BUTTERFREE
    fr: PAPILUSION
    it: BUTTERFREE
    de: SMETTBO
    es: BUTTERFREE
    ko: 버터플
  forms:
    butterfree:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 50
        special_attack: 80
        special_defense: 80
        speed: 70
      types:
        - bug
        - flying
      egg_groups:
        - bug
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          gold: "まいにち　ミツを　あつめまわる。\nあしの　うぶげに　ミツを　ぬりこんで\nすに　もちかえる　しゅうせいをもつ。"
          silver: "ハネの　りんぷんは　みずをはじく。\nどんな　あめが　ふっていても\nミツを　あつめるため　とびまわる。"
        en:
          gold: "It collects honey\nevery day. It rubs\nhoney onto the\fhairs on its legs\nto carry it back\nto its nest."
          silver: "Water-repellent\npowder on its\nwings enables it\fto collect honey,\neven in the heav-\niest of rains."
        fr:
          gold: "Il ramasse du miel\nchaque jour et\nil l’agglutine sur\fles poils de ses\npattes pour le\ntransporter."
          silver: "Une poudre\nimperméable pro-\ntège ses ailes\fet lui permet de\nrécupérer du miel\npar tout temps."
        it:
          gold: "Raccoglie miele\ntutti i giorni, e\nse lo spalma\fsui peli delle\nzampe per traspor-\ntarlo al nido."
          silver: "Grazie alla pol-\nvere idrorepel-\nlente sulle ali,\fpuò raccogliere\nmiele anche sotto\nla forte pioggia."
        de:
          gold: "Es sammelt täg-\nlich Honig. Es\nreibt ihn in seine\fBeinhaare, um ihn\nin sein Nest zu\ntransportieren."
          silver: "Da seine Flügel\nmit einem wasser-\nabweisenden Puder\füberzogen sind,\nkann es im Regen\nHonig sammeln."
        es:
          gold: "Recoge miel a\ndiario y la\nadhiere al pelo\fde sus patas\npara llevarla\na su colmena."
          silver: "El polvo hidrófugo\nde sus alas le\npermite recoger\fmiel, incluso\nbajo la lluvia\nmàs intensa."
        ko:
          gold: "매일 꿀을 모으러 다닌다\n다리의 털에 꿀을 모아\n집에 가지고 돌아가는 습성이 있다"
          silver: "날개의 가루는 방수 기능을 하기에\n아무리 비가 내려도\n꿀을 모으기 위해 날아다닌다"
weedle:
  species_id: 13
  names:
    jp_kana: ビードル
    en: WEEDLE
    fr: ASPICOT
    it: WEEDLE
    de: HORNLIU
    es: WEEDLE
    ko: 뿔충이
  forms:
    weedle:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 30
        special_attack: 20
        special_defense: 20
        speed: 50
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "どくバりは　とても　きょうりょく。\nめだつ　からだの　いろは\nあいてに　けいかいを　させるためだ。"
          silver: "あたまのさき　５センチの　どくバりで\nこうげき　してくる。いつもは\nエサとなる　ハッパのしたにいる。"
        en:
          gold: "Its poison stinger\nis very powerful.\nIts bright-colored\fbody is intended\nto warn off its\nenemies."
          silver: "It attacks using a\ntwo-inch poison\nbarb on its head.\fIt can usually be\nfound under the\nleaves it eats."
        fr:
          gold: "Son aiguillon em-\npoisonné est très\ndangereux. Son\fcorps est coloré\npour repousser\nses ennemis."
          silver: "Il attaque grâce\nau pic empoison-\nné de sa tête. Il\fse cache sous les\nfeuilles qu’il\nmange."
        it:
          gold: "Ha un pungiglione\nmolto velenoso. La\nvivace colorazione\fdel suo corpo è\nun avvertimento\nper i nemici."
          silver: "Attacca con l’a-\nculeo lungo 5 cm\nche ha sul capo.\fÈ facile trovarlo\nsotto le foglie\ndi cui si nutre."
        de:
          gold: "Sein Giftstachel\nist gefährlich.\nSein hellleuch-\ftender Körper\nsoll Feinde ab-\nschrecken."
          silver: "Es greift mit dem\n5 cm großen Gift-\nstachel auf seinem\fKopf an. Es ist\nstets unter \nLaub anzutreffen."
        es:
          gold: "Su venenoso\naguijón es muy\npotente, y su\fcolorido cuerpo\nhace que los\nenemigos huyan."
          silver: "Ataca con la pùa\nde 5 cm de su\ncabeza. Suele\fencontrarse\ndebajo de las\nhojas que come."
        ko:
          gold: "독침은 매우 강력하다\n눈에 띄는 몸의 색깔은\n상대방에게 경계심을 심어준다"
          silver: "머리끝 5cm정도의 독침으로\n공격을 해온다  보통은\n먹이가 되는 잎사귀 아래 있다"
kakuna:
  species_id: 14
  names:
    jp_kana: コクーン
    en: KAKUNA
    fr: COCONFORT
    it: KAKUNA
    de: KOKUNA
    es: KAKUNA
    ko: 딱충이
  forms:
    kakuna:
      form_id: 0
      base_stats:
        hp: 45
        attack: 25
        defense: 50
        special_attack: 25
        special_defense: 25
        speed: 35
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "サナギだが　すこしなら　うごける。\nてきに　おそわれそうになると\nどくバりを　だしてくることもある。"
          silver: "おとなの　からだを　つくっている。\nなかみが　やわらかくなるほど\nそとのカラは　かたくなっていく。"
        en:
          gold: "Although it is a\ncocoon, it can\nmove a little. It\fcan extend its\npoison barb if it\nis attacked."
          silver: "From this form,\nit will grow into\nan adult. As its\fbody becomes soft-\ner, the external\nshell hardens."
        fr:
          gold: "Bien qu’il ne soit\nqu’un cocon, il\npeut se déplacer\flentement. Il se\ndéfend avec une\npique empoisonnée."
          silver: "De cette forme,\nil deviendra\nadulte. Son corps\fplus tendre est\nprotégé par sa\ncarapace."
        it:
          gold: "Pur essendo un\nbozzolo, può\nmuoversi un po’.\fPuò estendere il\npungiglione quando\nè attaccato."
          silver: "È destinato ad\nevolversi in un\nadulto. Mentre il\fcorpo diventa più\nmorbido, il guscio\ns’indurisce."
        de:
          gold: "Obwohl es ein\nKokon ist, kann es\nsich bewegen. Wird\fes angegriffen,\nfährt es seinen\nGiftstachel aus."
          silver: "Es befindet sich\nin einem Zwischen-\nstadium. Sein\fKörper wird immer\nweicher und seine\nSchale härter."
        es:
          gold: "Aunque sea un\ncapullo, es capaz\nde moverse.\fExtenderà su pùa\nvenenosa si es\natacado."
          silver: "A partir de esta\nforma, crece hasta\nser adulto. Su\fcuerpo se ablanda\nmientras su capu-\nllo se fortalece."
        ko:
          gold: "번데기지만 조금이라면 움직인다\n적에게 공격을 받을듯하면\n독침을 쏘는 일도 있다"
          silver: "성충의 몸을 만들고 있다\n안쪽이 부드러워지는 만큼\n바깥의 고치는 딱딱해져간다"
beedrill:
  species_id: 15
  names:
    jp_kana: スピアー
    en: BEEDRILL
    fr: DARDARGNAN
    it: BEEDRILL
    de: BIBOR
    es: BEEDRILL
    ko: 독침붕
  forms:
    beedrill:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 40
        special_attack: 45
        special_defense: 80
        speed: 75
      types:
        - bug
        - poison
      egg_groups:
        - bug
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          gold: "どんな　あいてでも　きょうりょくな\nどくバりで　しとめてしまう。\nたまに　しゅうだんで　おそってくる。"
          silver: "３ぼんの　どくバりの　なかでは\nおしりに　ついているのが　いちばん\nきょうりょくな　どくをだす。"
        en:
          gold: "It can take down\nany opponent with\nits powerful poi-\fson stingers. It\nsometimes attacks\nin swarms."
          silver: "It has three\npoison barbs.\nThe barb on its\ftail secretes the\nmost powerful\npoison."
        fr:
          gold: "Il peut venir\nà bout de ses\nadversaires grâce\fà ses aiguillons.\nIl attaque souvent\nen nuées."
          silver: "Il a trois dards\nvénéneux. Le dard\nsur sa queue\fsécrète le poison\nle plus puissant\net dangereux."
        it:
          gold: "Può abbattere ogni\navversario con i\nvelenosissimi\faculei.\nTalvolta attacca\nin sciami."
          silver: "Ha tre aculei\nvelenosi.\nQuello sulla\fcoda secerne\nil veleno più\npotente."
        de:
          gold: "Mit seinen gefähr-\nlichen Stacheln\nkann es jeden Geg-\fner besiegen. Es\ntritt auch in\nSchwärmen auf."
          silver: "Es besitzt drei\nGiftstacheln. Mit\ndem Stachel an\fseinem Hinterleib\ninjiziert es das\nwirksamste Gift."
        es:
          gold: "Puede vencer a\ncualquier rival\ncon sus potentes\faguijones\nvenenosos. Puede\natacar en grupo."
          silver: "Tiene tres pùas\nvenenosas. La\npùa de su cola\fsegrega un\nveneno muy\npotente."
        ko:
          gold: "어떠한 상대라도 강력한\n독침으로 쏴 죽인다\n가끔은 집단적으로 공격해온다"
          silver: "3개의 독침중에서\n엉덩이에 있는 것이 제일\n강력한 독을 낸다"
pidgey:
  species_id: 16
  names:
    jp_kana: ポッポ
    en: PIDGEY
    fr: ROUCOOL
    it: PIDGEY
    de: TAUBSI
    es: PIDGEY
    ko: 구구
  forms:
    pidgey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 40
        special_attack: 35
        special_defense: 35
        speed: 56
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "ふだんは　くさむらに　かくれている。\nたたかいは　このまず　おそわれると\nひっしに　すなをかけて　みをまもる。"
          silver: "くさむらや　もりに　おおく　ぶんぷ。\nおとなしい　せいかくで　はばたいて\nすなをかけ　てきを　おいはらう。"
        en:
          gold: "It usually hides\nin tall grass. Be-\ncause it dislikes\ffighting, it pro-\ntects itself by\nkicking up sand."
          silver: "Common in grassy\nareas and forests,\nit is very docile\fand will chase off\nenemies by flap-\nping up sand."
        fr:
          gold: "Il se cache dans\nles hautes herbes.\nIl n’aime pas se\fbattre. Il se\ndéfend en jetant\ndu sable."
          silver: "Commun dans les\nforêts et les\nplaines, docile,\fil fait fuir ses\nennemis en en-\nvoyant du sable."
        it:
          gold: "Di solito si na-\nsconde nell’erba\nalta. Poiché odia\flottare, tira la\nsabbia con le zam-\npe come difesa."
          silver: "Comune tra l’erba\ne nelle foreste, è\nmolto docile e\ftiene alla larga\ni nemici\nsollevando sabbia."
        de:
          gold: "Es versteckt sich\nim hohen Gras. Da\nes Kämpfe verab-\fscheut, wirbelt\nes Sand auf, um\nsich zu schützen."
          silver: "Es ist meist in\nWäldern anzutref-\nfen. Es ist ruhig\fund verjagt seine\nFeinde, indem es\nSand aufwirbelt."
        es:
          gold: "Suele ocultarse\nentre altas\nhierbas. Como no\fle gusta luchar,\nse defiende\npateando arena."
          silver: "Comùn en zonas de\nhierba y bosques,\nes muy dócil y\fahuyenta a sus\nenemigos\nlevantando arena."
        ko:
          gold: "보통은 풀숲에 숨어 있다\n싸움을 바라지 않고 공격받으면\n필사적으로 모래를뿌려 몸을 보호함"
          silver: "풀숲과 숲속에 많이 분포되어 있다\n얌전한 성격으로 날개짓을 해서\n모래를 뿌려 적을 쫓아낸다"
pidgeotto:
  species_id: 17
  names:
    jp_kana: ピジョン
    en: PIDGEOTTO
    fr: ROUCOUPS
    it: PIDGEOTTO
    de: TAUBOGA
    es: PIDGEOTTO
    ko: 피죤
  forms:
    pidgeotto:
      form_id: 0
      base_stats:
        hp: 63
        attack: 60
        defense: 55
        special_attack: 50
        special_defense: 50
        speed: 71
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "とても　しりょくが　いい。\nどんなに　たかい　ばしょ　からでも\nえものの　うごくすがたを　みわける。"
          silver: "はったつした　あしの　ツメを\nエサに　くいこませ　うごけなくして\n１００キロさきの　す　まで　はこぶ。"
        en:
          gold: "It has outstanding\nvision. However\nhigh it flies, it\fis able to distin-\nguish the move-\nments of its prey."
          silver: "It immobilizes its\nprey using well-\ndeveloped claws,\fthen carries the\nprey more than 60\nmiles to its nest."
        fr:
          gold: "Il possède une\ntrès bonne vue qui\nlui permet de\fdistinguer ses\nproies d’une très\nhaute altitude."
          silver: "Il immobilise sa\nproie avec ses\npuissantes serres\fet peut la trans-\nporter sur plus\nde 100 km."
        it:
          gold: "Ha una vista\neccellente. Per\nquanto alto stia\fvolando, scorge\nsempre i movimenti\ndella preda."
          silver: "Immobilizza la\npreda con artigli\nben sviluppati,\fper poi traspor-\ntarla al suo nido,\na più di 100 km."
        de:
          gold: "Sein Sehvermögen\nist ausgezeichnet.\nEgal wie hoch es\fauch fliegt, es\nkann seine Beute\ngenau beobachten."
          silver: "Es lähmt seine\nGegner mit seinen\nKrallen und trägt\fdie Beute in sein\nbis zu 100 km\nentferntes Nest."
        es:
          gold: "Su visión es\nextraordinaria.\nAunque vuele muy\falto, detectarà\ntodo movimiento\nde su presa."
          silver: "Inmoviliza a su\npresa usando sus\nenormes garras, y\fdespués la lleva\nhasta su nido,\na unos 100 Km."
        ko:
          gold: "매우 시력이 좋다\n아무리 높은 장소에서라도\n먹이의 움직이는 모습을 구별한다"
          silver: "발달한 발의 발톱으로\n먹이를 꼼짝 못하게 움켜쥐고\n100Km떨어진 둥지까지 운반한다"
pidgeot:
  species_id: 18
