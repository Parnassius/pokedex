        it:
          gold: "Mentre vola emette\ncontinuamente\nultrasuoni dalla\fbocca per analiz-\nzare l’ambiente\ncircostante."
          silver: "Capace di volare\ntranquillamente al\nbuio, emette versi\fad ultrasuoni per\nschivare gli\nostacoli."
        de:
          gold: "Im Flug sendet es\nständig Schall-\nwellen aus, um ein\fgenaues Bild der\nUmgebung zu\nerhalten."
          silver: "Es kann sicher im\nDunkeln fliegen,\nda es sich mittels\fUltraschallwellen\nperfekt orien-\ntieren kann."
        es:
          gold: "Al volar, emite\nconstantemente\nondas ultrasónicas\fpor la boca para\ncomprobar los\nalrededores."
          silver: "Capaz de volar con\nseguridad en la\noscuridad, emite\fultrasonidos\npara detectar\nlos obstàculos."
        ko:
          gold: "날고있을 때는 항상 입에서\n나오는 초음파로 주변이\n어떤 상태인가 판단하고 있다"
          silver: "어두운 곳도 잘 날아다니는 것은\n초음파를 내서 주변의\n상태를 조사하기 때문이다"
golbat:
  species_id: 42
