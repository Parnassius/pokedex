      descriptions:
        jp_kana:
          gold: "よるになると　からだの　ちゅうしんが\nひとの　こどうと　おなじりズムで\nゆっくりと　てんめつする。"
          silver: "からだの　ちゅうしんで　ひかる\nコアが　あるかぎり　からだが\nちぎれても　さいせい　できる。"
        en:
          gold: "At night, the cen-\nter of its body\nslowly flickers\fwith the same\nrhythm as a human\nheartbeat."
          silver: "Even if its body\nis torn, it can\nregenerate as long\fas the glowing\ncentral core re-\nmains intact."
        fr:
          gold: "La nuit, le centre\nde son corps émet\ndes pulsations au\fmême rythme que\nle coeur des\nhumains."
          silver: "Même si son corps\nest détruit, il\npeut régénérer\faussi longtemps\nque son coeur est\nen bon état."
        it:
          gold: "Di notte il centro\ndel suo corpo\npulsa lentamente,\fallo stesso ritmo\ndel cuore\numano."
          silver: "Anche se il corpo\nè lacerato, conti-\nnua a rigenerarsi\ffinché il nucleo\nardente centrale\nrimane intatto."
        de:
          gold: "Nachts blinkt\ndie Mitte seines\nKörpers im selben\fRhythmus, wie\ndas menschliche\nHerz."
          silver: "Auch wenn sein\nKörper nicht mehr\nintakt ist, kann\fes sich regenerie-\nren, wenn der\nKern leuchtet."
        es:
          gold: "De noche, la parte\ncentral de su\ncuerpo parpadea\fal ritmo del\nlatido cardíaco\nde los humanos."
          silver: "Aunque sus brazos\nse rompan podràn\nregenerarse,\fsiempre y cuando\nsu nùcleo siga\nintacto."
        ko:
          gold: "밤이되면 몸의 중심이\n사람들의 움직임과 같은 리듬으로\n천천히 깜빡거린다"
          silver: "몸의 중심에서 빛나는\n코어가 있는 한 몸이\n뜯겨나가도 재생할 수 있다"
starmie:
  species_id: 121
  names:
    jp_kana: スターミー
    en: STARMIE
    fr: STAROSS
    it: STARMIE
    de: STARMIE
    es: STARMIE
    ko: 아쿠스타
  forms:
    starmie:
      form_id: 0
      base_stats:
        hp: 60
        attack: 75
        defense: 85
        special_attack: 100
        special_defense: 85
        speed: 115
      types:
        - water
        - psychic
      egg_groups:
        - water_3
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          gold: "からだの　ちゅうおうに　ある\nコアとよばれる　ぶぶんは　みるたびに\nちがう　いろの　ひかりをはなつ。"
          silver: "どんな　かんきょうでも\nおおきくなると　さゆうたいしょうの\nきかがくてきなボディに　そだつ。"
        en:
          gold: "The center section\nof its body is\ncalled the core.\fIt glows in a dif-\nferent color each\ntime it is seen."
          silver: "Regardless of the\nenvironment it\nlives in, its body\fgrows to form a\nsymmetrical geo-\nmetric shape."
        fr:
          gold: "La partie centrale\nde son corps est\nappelée le coeur.\fIl brille d’une\ncouleur différente\nà chaque fois."
          silver: "Quel que soit son\nenvironnement, son\ncorps grandit de\ffaçon à créer une\nforme géométrique\net symétrique."
        it:
          gold: "La parte centrale\ndel suo corpo è\nchiamata nucleo.\fOgni volta ha\nsempre un\ncolore diverso."
          silver: "Indipendentemente\nda dove vive, il\nsuo corpo cresce\fassumendo una\nforma geometrica\nsimmetrica."
        de:
          gold: "Der Mittelteil\nseines Körpers\nwird Kern genannt.\fEr leuchtet immer\nandersfarbig, wenn\nman es sieht."
          silver: "Egal, wo es auch\naufwächst, sein\nKörper entwickelt\fsich stets zu ei-\nner geometrischen\nFigur."
        es:
          gold: "La parte central\nde su cuerpo se\ndenomina nùcleo.\fBrilla en colores\ndiferentes cada\nvez que es visto."
          silver: "Sin tener en\ncuenta el entorno\nen el que vive, su\fcuerpo crece para\nformar una figura\ngeométrica."
        ko:
          gold: "몸의 중앙에 있는 코어라고\n불려지는 부분은 볼 때마다\n다른 색의 빛을 발산한다"
          silver: "어떠한 환경에서든\n크게되면 좌우대칭의\n기하학적인 몸으로 성장한다"
mr_mime:
  species_id: 122
  names:
    jp_kana: バリヤード
    en: MR.MIME
    fr: M.MIME
    it: MR.MIME
    de: PANTIMOS
    es: MR.MIME
    ko: 마임맨
  forms:
    mr_mime:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 65
        special_attack: 100
        special_defense: 120
        speed: 90
      types:
        - psychic
      egg_groups:
        - human_like
      held_items:
        rare: mysteryberry
      descriptions:
        jp_kana:
          gold: "うまれつき　パントマイムが　うまい。\nそだつごとに　わざは　じょうたつして\nみえないものも　うみだすようになる。"
          silver: "ゆびさきから　はなたれる\nふしぎな　はどうが　くうきをかためて\nほんとうの　かべを　つくりだす。"
        en:
          gold: "A skilled mime\nfrom birth, it\ngains the ability\fto create invisi-\nble objects as it\nmatures."
          silver: "Its fingertips\nemit a peculiar\nforce field that\fhardens air to\ncreate an actual\nwall."
        fr:
          gold: "C’est un excellent\nmime. Avec le\ntemps il gagne la\fcapacité de créer\ndes objets invi-\nsibles."
          silver: "Le bout de ses\ndoigts émet un\nchamp de force\fsolidifiant l’air\nau point d’en\nfaire un mur."
        it:
          gold: "Mimo esperto fin\ndalla nascita,\ncrescendo impara\faddirittura a\ncreare oggetti\ninvisibili."
          silver: "Le punte delle\ndita emettono un\ncampo di forza che\findurisce l’aria\ncreando una vera\nbarriera."
        de:
          gold: "Ein begabter Mime\nvon Geburt an.\nWird es älter,\fkann es unsicht-\nbare Objekte\ngenerieren."
          silver: "Seine Fingerkuppen\nerzeugen ein spe-\nzielles Kraftfeld,\fdas die Luft er-\nhärtet und eine\nWand generiert."
        es:
          gold: "Un hàbil mimo\ndesde que nace.\nAprende a crear\fobjetos invisibles\na medida que\ncrece."
          silver: "Sus dedos emiten\nun campo de fuerza\nmuy especial,\fque endurece el\naire para crear\nun auténtico muro."
        ko:
          gold: "판토마임의 실력을 타고났다\n자라면서 기술은 향상되어\n보이지 않는 것도 만들어내게 된다"
          silver: "손가락 끝에서 발산되는\n이상한 파동이 공기를 단단한\n형질로 바꿔서 벽을 만들어낸다"
scyther:
  species_id: 123
  names:
    jp_kana: ストライク
    en: SCYTHER
    fr: INSECATEUR
    it: SCYTHER
    de: SICHLOR
    es: SCYTHER
    ko: 스라크
  forms:
    scyther:
      form_id: 0
      base_stats:
        hp: 70
        attack: 110
        defense: 80
        special_attack: 55
        special_defense: 80
        speed: 105
      types:
        - bug
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "きれあじ　するどい　カマをつかって\nくさむらを　きりすすむ。あまりに\nはやい　うごきで　めがおいつかない。"
          silver: "うごいても　ざんぞうしか　みえない。\nとまっても　くさむらに　みをかくすと\nほごしょくで　わからない。"
        en:
          gold: "It slashes through\ngrass with its\nsharp scythes,\fmoving too fast\nfor the human eye\nto track."
          silver: "When it moves, it\nleaves only a\nblur. If it hides\fin grass, its pro-\ntective colors\nmake it invisible."
        fr:
          gold: "Il fauche les\nherbes avec ses\nlames acérées. Il\fbouge si vite\nqu’on ne peut le\nvoir à l’oeil nu."
          silver: "Quand il se\ndéplace, il appa-\nraît en rémanence.\fS’il se cache, son\ncamouflage le rend\ninvisible."
        it:
          gold: "Si fa strada tra\nl’erba grazie alle\nlame affilate,\fmuovendosi troppo\nvelocemente per\nl’occhio umano."
          silver: "Quando si muove si\nvede solo una\nscia. Nell’erba\fi suoi colori\nprotettivi lo ren-\ndono invisibile."
        de:
          gold: "Es bewegt sich mit\nseinen Sensen so\nschnell durch das\fGras, dass es\nkein Mensch sehen\nkann."
          silver: "Wenn es sich be-\nwegt, sieht man\nes nur flüchtig.\fIm Gras ist es\naufgrund seiner\nFarbe unsichtbar."
        es:
          gold: "Avanza por la\nhierba con sus\nafiladas guadañas,\fmàs ràpido de lo\nque el ojo humano\npueda percibir."
          silver: "Al moverse deja\nsólo una estela.\nSi se esconde\fen la hierba,\nsus colores le\nhacen invisible."
        ko:
          gold: "잘 들고 날카로운 낫을 사용하여\n풀숲을 베고 지나간다  매우 빠른\n움직임에 눈이 따라가지 못한다"
          silver: "움직여도 잔상밖에 보이지 않는다\n멈춰서도 풀숲에 몸을 숨기면\n보호색 때문에 보이지 않는다"
jynx:
  species_id: 124
  names:
    jp_kana: ルージュラ
    en: JYNX
    fr: LIPPOUTOU
    it: JYNX
    de: ROSSANA
    es: JYNX
    ko: 루주라
  forms:
    jynx:
      form_id: 0
      base_stats:
        hp: 65
        attack: 50
        defense: 35
        special_attack: 115
        special_defense: 95
        speed: 95
      types:
        - ice
        - psychic
      egg_groups:
        - human_like
      held_items:
        common: ice_berry
        rare: ice_berry
      descriptions:
        jp_kana:
          gold: "リズミカルに　からだを　ゆらしてる。\nそのときの　かんじょうに　よって\nりズムは　ことなるらしい。"
          silver: "にんげんの　ような　ことばも\nはなしているが　それよりも\nおどりで　きもちを　つたえるらしい。"
        en:
          gold: "It rocks its body\nrhythmically. It\nappears to alter\fthe rhythm depend-\ning on how it is\nfeeling."
          silver: "It speaks a lan-\nguage similar to\nthat of humans.\fHowever, it seems\nto use dancing to\ncommunicate."
        fr:
          gold: "Il bouge son corps\nen cadence. Le\nrythme change en\ffonction de son\nhumeur."
          silver: "Il utilise un lan-\ngage proche de\ncelui des humains.\fIl semble\ncommuniquer en\ndansant."
        it:
          gold: "Agita il corpo\nritmicamente.\nPare che il ritmo\fdipenda dal\nsuo stato\nd’animo."
          silver: "Parla una lingua\nsimile a quella\numana. Tuttavia,\fsembra comunicare\nattraverso la\ndanza."
        de:
          gold: "Es bewegt seinen\nKörper rhythmisch\nhin und her.\fSeine Gemütslage\nbestimmt den\nRhythmus."
          silver: "Seine Sprache ist\nder Sprache der\nMenschen ähnlich.\fAber es scheint,\nals ob es durch\nTanz kommuniziert."
        es:
          gold: "Mueve su cuerpo\nrítmicamente.\nParece cambiar de\fritmo dependiendo\nde cómo se\nsienta."
          silver: "Habla un idioma\nsimilar al de\nlos humanos. Sin\fembargo, parece\nque usa la danza\npara comunicarse."
        ko:
          gold: "리드미컬하게 몸을 흔들고 있다\n그당시의 감정에 따라\n리듬은 바뀌는 것 같다"
          silver: "인간처럼 말도\n하고 있지만 그것 보다는\n춤으로 감정을 전하는 것 같다"
electabuzz:
  species_id: 125
  names:
    jp_kana: エレブー
    en: ELECTABUZZ
    fr: ELEKTEK
    it: ELECTABUZZ
    de: ELEKTEK
    es: ELECTABUZZ
    ko: 에레브
  forms:
    electabuzz:
      form_id: 0
      base_stats:
        hp: 65
        attack: 83
        defense: 57
        special_attack: 95
        special_defense: 85
        speed: 105
      types:
        - electric
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "からだの　ひょうめんには　でんきが\nながれている。あたりが　くらいと\nぜんしんが　あおじろく　ひかるのだ。"
          silver: "ぜんしんから　つねに　でんきが\nはなたれているため　ちかづくと\nかみのけが　さかだってしまう。"
        en:
          gold: "Electricity runs\nacross the surface\nof its body. In\fdarkness, its en-\ntire body glows a\nwhitish-blue."
          silver: "Its body constant-\nly discharges\nelectricity. Get-\fting close to it\nwill make your\nhair stand on end."
        fr:
          gold: "Des ondes élec-\ntriques parcourent\nla surface de son\fcorps. Il brille\nd’un éclat bleuté\ndans le noir."
          silver: "Son corps décharge\nconstamment de\nl’électricité. En\frestant à côté de\nlui, vos poils\ns’hérisseront."
        it:
          gold: "Corrente elettrica\ngli attraversa la\nsuperficie del\fcorpo, che al buio\nriluce di un\nblu biancastro."
          silver: "Il corpo scarica\ncontinuamente\nelettricità.\fA chi gli è vicino\nsi rizzano\ni capelli."
        de:
          gold: "Elektrizität be-\ndeckt seinen Kör-\nper. Im Dunkeln\ferstrahlt es in\neinem bläulichen\nTon."
          silver: "Sein Körper ent-\nlädt sich ständig.\nKommt man ihm zu\fnahe, stehen einem\ndie Haare senk-\nrecht vom Kopf ab."
        es:
          gold: "Por la superficie\nde su piel corre\nla electricidad.\fEn la oscuridad,\nsu cuerpo se torna\nblanquecino."
          silver: "Su cuerpo descarga\nelectricidad\nconstantemente. Si\fte acercas, te\npondrà los pelos\nde punta."
        ko:
          gold: "몸의 표면에는 전기가\n흐르고 있다  주위가 어두우면\n전신이 푸르스름하게 빛난다"
          silver: "전신에서 항상 전기가\n흐르고있기 때문에 가까이가면\n머리카락이 곤두서버린다"
magmar:
  species_id: 126
  names:
    jp_kana: ブーバー
    en: MAGMAR
    fr: MAGMAR
    it: MAGMAR
    de: MAGMAR
    es: MAGMAR
    ko: 마그마
  forms:
    magmar:
      form_id: 0
      base_stats:
        hp: 65
        attack: 95
        defense: 57
        special_attack: 100
        special_defense: 85
        speed: 93
      types:
        - fire
      egg_groups:
        - human_like
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          gold: "さむいところは　にがて。あつい\nほのおを　ふきだし　すみやすいように\nまわりの　かんきょうを　かえるのだ。"
          silver: "からだの　ひょうめんには\nたいようと　おなじような　ほのおの\nゆらめきが　はっせい　している。"
        en:
          gold: "It dislikes cold\nplaces, so it\nblows scorching\fflames to make the\nenvironment suit-\nable for itself."
          silver: "The fiery surface\nof its body gives\noff a wavering,\frippling glare\nthat is similar to\nthe sun."
        fr:
          gold: "Il n’aime pas les\nendroits froids.\nIl façonne son nid\favec son souffle\nde feu selon ses\nconvenances."
          silver: "La surface ardente\nde son corps émet\ndes éclats de\flumière aussi\npuissants que ceux\ndu soleil."
        it:
          gold: "Odiando i luoghi\nfreddi, li bru-\nciacchia sputando\ffiamme che li\nrendono più adatti\nai suoi gusti."
          silver: "La superficie\nardente del corpo\nemana una luce\firregolare e vio-\nlenta, simile a\nquella solare."
        de:
          gold: "Es hasst kalte\nOrte. Um es für\nsich angenehmer zu\fgestalten, erwärmt\nes seine Umgebung\nmit seinem Atem."
          silver: "Die feurige Haut\nseines Körpers\nbesitzt einen\fflackernden Glanz,\nder an die Sonne\nerinnert."
        es:
          gold: "Odia los lugares\nfríos, y despide\ncalientes llamas\fpara hacer el\nentorno un poco\nmàs confortable."
          silver: "Su ardiente piel\ndesprende un\nbrillo ondeante\fy cegador,\nsimilar al\ndel sol."
        ko:
          gold: "추운곳을 싫어한다  뜨거운\n화염을 뿜어내서 살기 쉽도록\n주변의 환경을 바꾼다"
          silver: "몸의 표면에는\n태양과 같은 정도의 화염의\n흔들림이 발생하고 있다"
pinsir:
  species_id: 127
  names:
    jp_kana: カイロス
    en: PINSIR
    fr: SCARABRUTE
    it: PINSIR
    de: PINSIR
    es: PINSIR
    ko: 쁘사이저
  forms:
    pinsir:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 100
        special_attack: 55
        special_defense: 70
        speed: 85
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "よるは　ツノで　じめんをほって\nなかで　ねむる。あさはやくだと\nひふに　しめった　つちがついている。"
          silver: "ながいツノを　ふりまわして\nこうげき　してくる。さむいときは\nもりのおくに　すがたをかくす。"
        en:
          gold: "With its horns, it\ndigs burrows to\nsleep in at night.\fIn the morning,\ndamp soil clings\nto its body."
          silver: "Swings its long\nantlers wildly to\nattack. During\fcold periods, it\nhides deep in\nforests."
        fr:
          gold: "Il creuse des a-\nbris de ses cornes\npour y dormir.\fLe matin, la terre\nhumide reste col-\nlée à son corps."
          silver: "Il attaque sauva-\ngement avec ses\nbois. En hiver,\fil se cache au\nplus profond des\nforêts."
        it:
          gold: "Di notte dorme in\ncunicoli che scava\ncon le sue corna.\fAl mattino ha il\ncorpo coperto di\nterra umida."
          silver: "Quando attacca\nagita le lunghe\ncorna.\fNei periodi freddi\nsta nascosto nelle\nforeste."
        de:
          gold: "Es gräbt sich mit\nseinen Hörnern\neinen Unterschlupf\ffür die Nacht. Am\nMorgen klebt nasse\nErde an ihm."
          silver: "Beim Angriff ver-\ndreht es sein Ge-\nweih. In Kälte-\fperioden versteckt\nes sich tief im\nWald."
        es:
          gold: "Cava guaridas con\nsus cuernos para\npasar la noche.\fPor la mañana, la\ntierra hùmeda se\npega a su cuerpo."
          silver: "Arremete\nviolentamente con\nsu cornamenta.\fCuando llega el\nfrío, se adentra\nen los bosques."
        ko:
          gold: "밤에은 뿔로 지면을 파고\n안에서 잔다  아침일찍 일어나면\n피부에 젖은 흙이 붙어있다"
          silver: "긴 뿔을 휘둘러서\n공격을 해온다  추울 때는\n깊은 숲에서 몸을 숨긴다"
tauros:
  species_id: 128
  names:
    jp_kana: ケンタロス
    en: TAUROS
    fr: TAUROS
    it: TAUROS
    de: TAUROS
    es: TAUROS
    ko: 켄타로스
  forms:
    tauros:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 95
        special_attack: 40
        special_defense: 70
        speed: 110
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ツノを　つきあわせて　たたかう。\nむれをまもる　つよい　ケンタロスは\nキズだらけの　ツノを　じまんする。"
          silver: "３ぼんのしっぽで　じぶんを　たたき\nたたかう　きもちを　たかめると\nぜんそくりょくで　つっこんでくる。"
        en:
          gold: "They fight each\nother by locking\nhorns. The herd’s\fprotector takes\npride in its bat-\ntle-scarred horns."
          silver: "After heightening\nits will to fight\nby whipping itself\fwith its three\ntails, it charges\nat full speed."
        fr:
          gold: "Ils se heurtent\nentre eux avec\nleurs cornes pour\fchoisir celui qui\nsera le protecteur\nde la tribu."
          silver: "Après s’être\nfouetté avec ses\ntrois queues pour\faugmenter son\nagressivité, il\ncharge."
        it:
          gold: "Lottano tra loro\nincrociando le\ncorna. Il capo-\fbranco è fiero dei\nsegni delle lotte\nsulle sue corna."
          silver: "Prima si frusta\ncon le tre code\nper caricarsi, per\fpoi partire\nall’attacco a\ntutta velocità."
        de:
          gold: "Sie kämpfen mit\nihren Hörnern. Der\nHerdenführer ist\fstolz auf seine\nHörner, die viele\nKampfspuren haben."
          silver: "Es kämpft mit vol-\nlem Einsatz, nach-\ndem es sich mit\fseinen 3 Schwänzen\nauspeitschte, um\nsich anzustacheln."
        es:
          gold: "Luchan entre sí\ncon sus cuernos.\nEl jefe de la\fmanada alardea de\nlas cicatrices\nde sus cuernos."
          silver: "Después de\nanimarse a luchar\nfustigàndose con\fsus tres colas,\ncarga a toda\nvelocidad."
        ko:
          gold: "뿔을 마주대고 싸운다\n무리를 지키는 강한 켄타로스는\n상처투성인 뿔을 자랑한다"
          silver: "3개의 꼬리로 자신을 때려서\n투지가 끓어오르면\n전속력으로 돌진해온다"
magikarp:
  species_id: 129
  names:
    jp_kana: コイキング
    en: MAGIKARP
    fr: MAGICARPE
    it: MAGIKARP
    de: KARPADOR
    es: MAGIKARP
    ko: 잉어킹
  forms:
    magikarp:
      form_id: 0
      base_stats:
        hp: 20
        attack: 10
        defense: 55
        special_attack: 15
        special_defense: 20
        speed: 80
      types:
        - water
      egg_groups:
        - water_2
        - dragon
      descriptions:
        jp_kana:
          gold: "ちからのない　なさけない　ポケモン。\nたまに　たかく　とびはねても\n２メートルを　こすのが　やっとだ。"
          silver: "とにかくはねる。いみもなく　はねる。\nはねているときに　とんできた\nピジョンなどに　つかまってしまう。"
        en:
          gold: "An underpowered,\npathetic POKéMON.\nIt may jump high\fon rare occasions,\nbut never more\nthan seven feet."
          silver: "For no reason, it\njumps and splashes\nabout, making it\feasy for predators\nlike PIDGEOTTO to\ncatch it mid-jump."
        fr:
          gold: "Un POKéMON tout à\nfait pathétique.\nIl peut juste\fsauter haut en de\nrares occasions."
          silver: "Il effectue des\nbonds hors de\nl’eau, faisant de\flui une proie fa-\ncile pour\nles ROUCOUPS."
        it:
          gold: "Un POKéMON debole,\npatetico.\nIn rare occasioni\fpuò saltare in\nalto, comunque non\npiù di due metri."
          silver: "Salta e sguazza\nsenza ragione:\ncosì, predatori\fcome PIDGEOTTO lo\npossono catturare\nal volo."
        de:
          gold: "Ein schwaches und\nträges POKéMON.\nManchmal springt\fes sehr hoch, aber\nnie höher als\nzwei Meter."
          silver: "Es springt grund-\nlos in die Luft.\nDas macht es ein-\ffach für Räuber\nwie TAUBOGA, es im\nSprung zu fangen."
        es:
          gold: "Un POKéMON\ndesvalido y\npatético. A veces\fes capaz de saltar\nalto, pero nunca\nmàs de 2 metros."
          silver: "Salta y chapotea\nsin razón alguna.\nEs una presa fàcil\fpara PIDGEOTTO,\nque lo atrapa\nen pleno salto."
        ko:
          gold: "힘이 없는 불쌍한 포켓몬\n가끔 높이 뛰어오르지만\n겨우 2m를 넘는것이 고작이다"
          silver: "어쨌든 뛴다  이유도 없이 뛴다\n펄떡거리고 있을때 날아 온\n피죤등에게 잡혀버린다"
gyarados:
  species_id: 130
  names:
    jp_kana: ギャラドス
    en: GYARADOS
    fr: LEVIATOR
    it: GYARADOS
    de: GARADOS
    es: GYARADOS
    ko: 갸라도스
  forms:
    gyarados:
      form_id: 0
      base_stats:
        hp: 95
        attack: 125
        defense: 79
        special_attack: 60
        special_defense: 100
        speed: 81
      types:
        - water
        - flying
      egg_groups:
        - water_2
        - dragon
      descriptions:
        jp_kana:
          gold: "むかし　いくさに　なるたびに\nギャラドスが　あらわれ　あちこちを\nひのうみに　していった　という。"
          silver: "いちど　すがたを　あらわすと\nまわりを　すべて　やきつくさないと\nいかりが　しずまらない　という。"
        en:
          gold: "They say that\nduring past wars,\nGYARADOS would\fappear and leave\nblazing ruins in\nits wake."
          silver: "Once it appears,\nit goes on a ram-\npage. It remains\fenraged until it\ndemolishes every-\nthing around it."
        fr:
          gold: "On dit que pendant\nles guerres il\nserait apparu et\fil aurait semé\nchaos et destruc-\ntion sur le monde."
          silver: "Quand il apparaît,\nil se lance dans\nune rage destruc-\ftrice jusqu’à ce\nque tout soit dé-\ntruit."
        it:
          gold: "Si dice che in\nguerra i GYARADOS\napparissero\flasciando soltanto\nincendi e rovine\nsul loro cammino."
          silver: "Appena appare\nmonta su tutte le\nfurie.\fNon si placa fin-\nché non demolisce\nqualsiasi cosa."
        de:
          gold: "Man sagt, dass\nGARADOS in den\nalten Kriegen\faufgetaucht sei\nund Ruinen\nhinterlassen hat."
          silver: "Taucht es auf,\nrandaliert es. Es\nberuhigt sich\ferst, wenn es al-\nles um sich zer-\nstört hat."
        es:
          gold: "Dicen que en\nguerras pasadas,\nGYARADOS aparecía\fdejando a su\npaso la ruina\ny el caos."
          silver: "Cuando aparece\nlo destroza todo.\nNo deja de\festar furioso\nhasta que lo\ndestruye todo."
        ko:
          gold: "옛날에 전쟁이 날 때에\n갸라도스가 나타나서 여기저기를\n불바다로 만들었다고 전해진다"
          silver: "한번 모습을 나타내면\n주변 전체를 박살내지 않고는\n분노가 가라앉지 않는다고 한다"
lapras:
  species_id: 131
  names:
    jp_kana: ラプラス
    en: LAPRAS
    fr: LOKHLASS
    it: LAPRAS
    de: LAPRAS
    es: LAPRAS
    ko: 라프라스
  forms:
    lapras:
      form_id: 0
      base_stats:
        hp: 130
        attack: 85
        defense: 80
        special_attack: 85
        special_defense: 95
        speed: 60
      types:
        - water
        - ice
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "やさしい　こころの　もちぬし。\nめったに　あらそわないため　たくさん\nつかまえられ　かずが　へった。"
          silver: "ひとを　せなかにのせて　うみをいく。\nきげんがいいと　きれいな　なきごえで\nうたうことも　あるらしい。"
        en:
          gold: "They have gentle\nhearts. Because\nthey rarely fight,\fmany have been\ncaught. Their num-\nber has dwindled."
          silver: "It ferries people\nacross the sea on\nits back. It may\fsing an enchanting\ncry if it is in a\ngood mood."
        fr:
          gold: "Ils sont d’une\nnature gentille.\nIls se battent\frarement et\nsont en voie\nd’extinction."
          silver: "Il transporte les\ngens sur son dos.\nS’il est de bonne\fhumeur, il se met\nà chanter un air\nagréable."
        it:
          gold: "Sono buoni d’animo\ne lottano di rado,\ncosì molti di loro\fsono facili prede:\nsono stati\ndecimati."
          silver: "Trasporta la\ngente per il mare\nsul suo dorso.\fSe è di buon umore\nemette un verso\ndolce, melodioso."
        de:
          gold: "Sie sind gutmütig.\nDa sie selten\nkämpfen, wurden\fsie oft gefangen.\nIhre Anzahl ist\nstark reduziert."
          silver: "Die Menschen über-\nqueren das Meer\nauf seinem Rücken.\fIst es fröhlich,\nstimmt es ein ent-\nzückendes Lied an."
        es:
          gold: "Son buenos de\ncorazón. Muchos\nfueron capturados\fpor ser tan\npacíficos. Ahora\nhay muchos menos."
          silver: "Lleva a la gente\npor el mar en su\nlomo. Si està de\fbuen humor,\ncanta una bella\nmelodía."
        ko:
          gold: "부드러운 마음씨의 소유자\n좀처럼 싸우려 하지 않기 때문에\n많이 잡혀서 수가 줄었다"
          silver: "사람을 등에 태우고 바다를 건넌다\n기분이 좋으면 아름다운 목소리로\n노래를 하기도 하는 것 같다"
ditto:
  species_id: 132
  names:
    jp_kana: メタモン
    en: DITTO
    fr: METAMORPH
    it: DITTO
    de: DITTO
    es: DITTO
    ko: 메타몽
  forms:
    ditto:
      form_id: 0
      base_stats:
        hp: 48
        attack: 48
        defense: 48
        special_attack: 48
        special_defense: 48
        speed: 48
      types:
        - normal
      egg_groups:
        - ditto
      descriptions:
        jp_kana:
          gold: "どんなものにも　へんしんできる。\nねるときは　いしに　へんしんして\nおそわれないように　している。"
          silver: "へんしんは　かんぺき　なのだが\nわらわされて　ちからが　ぬけると\nへんしんは　とけてしまう。"
        en:
          gold: "It can transform\ninto anything.\nWhen it sleeps, it\fchanges into a\nstone to avoid\nbeing attacked."
          silver: "Its transformation\nability is per-\nfect. However, if\fmade to laugh, it\ncan’t maintain its\ndisguise."
        fr:
          gold: "Il peut se trans-\nformer en tout.\nQuand il dort, il\fse change en\npierre pour éviter\nd’être attaqué."
          silver: "Sa capacité de\ntransformation est\nparfaite. Si\fvous le faites\nrire, il ne pourra\nrester déguisé."
        it:
          gold: "Si può trasformare\nin qualsiasi cosa.\nQuando dorme\fsi tramuta in\npietra per evitare\ngli attacchi."
          silver: "La sua capacità di\ntrasformarsi è\nperfetta. Ma se lo\fsi fa ridere,\nperde subito il\ntravestimento."
        de:
          gold: "Es kann sich in\nalles verwandeln.\nWenn es schläft,\fverwandelt es sich\nin einen Stein,\num sicher zu sein."
          silver: "Seine Verwand-\nlungskunst ist\nperfekt. Bringt\fman es jedoch zum\nLachen, fällt\nseine Tarnung."
        es:
          gold: "Se puede\ntransformar en\ncualquier cosa.\fCuando duerme, se\nvuelve roca para\nevitar el ataque."
          silver: "Su habilidad para\ntransformarse es\nperfecta. Pero si\fse le hace reír,\nperderà su poder\nde transformación."
        ko:
          gold: "어떤 것이든 변신할 수 있다\n잘 때는 돌로 변신해서\n공격받지 않도록 하고 있다"
          silver: "변신은 완벽하지만\n비웃음을 당해 힘이 빠지면\n변신이 풀려버리고 만다"
eevee:
  species_id: 133
  names:
    jp_kana: イーブイ
    en: EEVEE
    fr: EVOLI
    it: EEVEE
    de: EVOLI
    es: EEVEE
    ko: 이브이
  forms:
    eevee:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 50
        special_attack: 45
        special_defense: 65
        speed: 55
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "まわりの　かんきょうに　あわせて\nからだの　つくりを　かえていく\nのうりょくの　もちぬし。"
          silver: "ふきそくな　かたちの　いでんしは\nまわりの　えいきょうを　うけやすい。\nかんきょうが　かわると　しんかする。"
        en:
          gold: "It has the ability\nto alter the com-\nposition of its\fbody to suit its\nsurrounding envi-\nronment."
          silver: "Its irregularly\nconfigured DNA is\naffected by its\fsurroundings. It\nevolves if its en-\nvironment changes."
        fr:
          gold: "Il a la capacité\nde changer la com-\nposition de son\fcorps pour\ns’adapter à son\nenvironnement."
          silver: "Son ADN très\ninstable s’adapte\ntoujours à son\fenvironnement. Il\névolue quand ce\ndernier change."
        it:
          gold: "Ha la capacità di\nalterare la compo-\nsizione del corpo\fper adattarsi\nall’ambiente\ncircostante."
          silver: "Il suo DNA è irre-\ngolare, ed è\ncondizionato\fdall’ambiente.\nMuta con le condi-\nzioni ambientali."
        de:
          gold: "Es verfügt über\ndie Fähigkeit,\nseinen Körper per-\ffekt an die jewei-\nlige Umgebung\nanzupassen."
          silver: "Seine anomale\nDNS-Struktur hängt\nvon der Umgebung\fab. Verändert sich\ndiese, so entwi-\nckelt es sich."
        es:
          gold: "Es capaz de\nalterar la\ncomposición de\fsu cuerpo para\nconfundirse con\nel entorno."
          silver: "Su ADN irregular\nse ve afectado\npor el entorno.\fEvoluciona si\ncambia su\nentorno."
        ko:
          gold: "주변환경에 따라서\n몸의 구조를 바꿔나가는\n능력의 소유자"
          silver: "불규칙한 형태의 유전자는\n주변의 영향을 받기 쉽다\n환경이 바뀌면 진화한다"
vaporeon:
  species_id: 134
  names:
    jp_kana: シャワーズ
    en: VAPOREON
    fr: AQUALI
    it: VAPOREON
    de: AQUANA
    es: VAPOREON
    ko: 샤미드
  forms:
    vaporeon:
      form_id: 0
      base_stats:
        hp: 130
        attack: 65
        defense: 60
        special_attack: 110
        special_defense: 95
        speed: 65
      types:
        - water
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "シャワーズの　ぜんしんの　ひれが\nこきざみに　ふるえはじめるのは\nすうじかんごに　あめがふる　しるし。"
          silver: "きれいな　みずべを　このんでいる。\nさいぼうが　みずのぶんしに　にており\nみずに　とけることもできる。"
        en:
          gold: "When VAPOREON’s\nfins begin to vi-\nbrate, it is a\fsign that rain\nwill come within a\nfew hours."
          silver: "It prefers beauti-\nful shores. With\ncells similar to\fwater molecules,\nit could melt in\nwater."
        fr:
          gold: "Si ses nageoires\nvibrent, il y a\ndes chances pour\fqu’il se mette à\npleuvoir dans les\nprochaines heures."
          silver: "Il préfère les\nbelles plages. Il\npeut se dissoudre\fdans l’eau grâce à\nses cellules\nproches de l’eau."
        it:
          gold: "Se le pinne di\nVAPOREON iniziano\na vibrare, vuol\fdire che pioverà\nnel giro di poche\nore."
          silver: "Preferisce stare\nsulle belle rive.\nNell’acqua, le sue\fcellule simili a\nmolecole acquee si\npossono scomporre."
        de:
          gold: "Vibrieren die\nFlossen AQUANAS,\nbedeutet dies,\fdass es in den\nnächsten Stunden\nzu regnen beginnt."
          silver: "Es liebt schöne\nUfer. Da seine\nZellstruktur Was-\fsermolekülen ähn-\nlich ist, schmilzt\nes im Wasser."
        es:
          gold: "Cuando las aletas\nde VAPOREON\nvibran, significa\fque lloverà en\nlas próximas\nhoras."
          silver: "Prefiere las\nbellas costas.\nCon células\fparecidas al agua,\npodría fundirse\nen la misma."
        ko:
          gold: "샤미드의 전신의 지느러미가\n빨리 움직이기 시작하는 것은\n몇 시간 뒤에 비가 내린다는 증거"
          silver: "아름다운 해변을 좋아한다\n세포가 물의 분자구조와 닮아서\n물에 녹는 것도 가능하다"
jolteon:
  species_id: 135
  names:
    jp_kana: サンダース
    en: JOLTEON
    fr: VOLTALI
    it: JOLTEON
    de: BLITZA
    es: JOLTEON
    ko: 쥬피썬더
  forms:
    jolteon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 60
        special_attack: 110
        special_defense: 95
        speed: 130
      types:
        - electric
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "さいぼうが　だしている　よわい\nでんきを　ひとまとめにして\nきょうりょくな　でんげきを　はなつ。"
          silver: "たいないに　でんきが　たまると\nぜんしんの　たいもうが　ぜんぶ\nするどく　とがりはじめる。"
        en:
          gold: "It concentrates\nthe weak electric\ncharges emitted\fby its cells and\nlaunches wicked\nlightning bolts."
          silver: "Every hair on its\nbody starts to\nstand sharply on\fend if it becomes\ncharged with\nelectricity."
        fr:
          gold: "Il concentre la\ncharge électrique\ncréée dans chacune\fde ses cellules\npour projeter un\néclair."
          silver: "Chaque poil sur\nson corps se\ndresse quand il\fse charge en\nélectricité."
        it:
          gold: "Le sue deboli sca-\nriche elettriche\nsi concentrano\fnelle cellule,\nlanciando sinistre\nsaette luminose."
          silver: "Quando inizia a\ncaricarsi di\nelettricità,\fgli si rizza\nogni pelo\ndel corpo."
        de:
          gold: "Es sammelt die\nschwache Energie,\ndie von seinen\fZellen ausgeht und\nschleudert starke\nBlitze aus."
          silver: "Lädt es sich mit\nElektrizität auf,\nsteht jedes ein-\fzelne seiner Kör-\nperhaare steil\nnach oben."
        es:
          gold: "Concentra la\ndébil actividad\neléctrica de sus\fcélulas para\nlanzar dañinas\ndescargas."
          silver: "Todos los pelos\nde su cuerpo se\nponen de punta si\fempieza a\ncargarse de\nelectricidad."
        ko:
          gold: "세포가 발산하고 있는 약한\n전기를 한데 모아서\n강력한 전기를 만들어 낸다"
          silver: "체내에 전기가 모이면\n전신의 털이 전체적으로\n날카롭게 곤두서기 시작한다"
flareon:
  species_id: 136
  names:
    jp_kana: ブースター
    en: FLAREON
    fr: PYROLI
    it: FLAREON
    de: FLAMARA
    es: FLAREON
    ko: 부스터
  forms:
    flareon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 130
        defense: 60
        special_attack: 95
        special_defense: 110
        speed: 65
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "すいこんだ　くうきの　いちぶは\nたいないの　ほのおぶくろに　おくられ\n１７００どの　ほのおに　なる。"
          silver: "くびのまわりの　ふかふかした\nたいもうを　ひろげ　９００どまで\nあがった　たいおんを　さましている。"
        en:
          gold: "It stores some of\nthe air it inhales\nin its internal\fflame pouch, which\nheats it to over\n3,000 degrees."
          silver: "It fluffs out its\nfur collar to cool\ndown its body\ftemperature, which\ncan reach 1,650\ndegrees."
        fr:
          gold: "Il stocke de l’air\ndans sa poche de\nflamme et il le\fchauffe à une\ntempérature de\n1700 degrés."
          silver: "Il ébouriffe sa\ncollerette pour\nabaisser sa tempé-\frature qui peut\navoisiner les\n900 degrés."
        it:
          gold: "Immagazzina parte\ndell’aria che\ninala in una\ftasca ardente in-\nterna, che arriva\nfino a 1700 gradi."
          silver: "Arruffa il folto\npelo intorno al\ncollo per raffred-\fdare il corpo, che\npuò raggiungere i\n900 gradi."
        de:
          gold: "Es speichert einen\nTeil seiner Atem-\nluft in seinem\fKörper und erhitzt\nsie auf bis zu\n1700 Grad."
          silver: "Es fährt seinen\nPelzkragen aus,\num seine Körper-\ftemperatur, die\nbis 900 Grad be-\nträgt, abzukühlen."
        es:
          gold: "Almacena parte del\naire que inhala en\nsu bolsa interior,\fque llega a\ncalentarse a màs\nde 1.700 grados."
          silver: "Ahueca el pelaje\nde su cuello para\nbajar la\ftemperatura de su\ncuerpo, que puede\nllegar a 900’v."
        ko:
          gold: "들이마신 공기의 일부는\n체내의 화염주머니에 보내져서\n1700도의 화염이 된다"
          silver: "목 주위의 부드러운\n털을 펼쳐 섭씨 900도까지\n올라간 체온을 식히고 있다"
porygon:
  species_id: 137
  names:
    jp_kana: ポリゴン
    en: PORYGON
    fr: PORYGON
    it: PORYGON
    de: PORYGON
    es: PORYGON
    ko: 폴리곤
  forms:
    porygon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 60
        defense: 70
        special_attack: 85
        special_defense: 75
        speed: 40
      types:
        - normal
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          gold: "こきゅうを　していないので\nどんなところでも　かつやく　できると\nきたいされる　じんこうの　ポケモン。"
          silver: "けんきゅうのすえ　うみだされた\nじんこうの　ポケモン。きほんてきな\nどうさしか　プログラムされていない。"
        en:
          gold: "It is a manmade\nPOKéMON. Since it\ndoesn’t breathe,\fpeople are eager\nto try it in any\nenvironment."
          silver: "A manmade POKéMON\nthat came about as\na result of re-\fsearch. It is pro-\ngrammed with only\nbasic motions."
        fr:
