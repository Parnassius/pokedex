      descriptions:
        jp_kana:
          gold: "ぜんしんの　どくばりを　とばすため\n１０りットルの　みずを　いっきに\nのみこみ　からだを　ふくらませる。"
          silver: "ぜんしんの　ちいさな　ハりは\nうろこが　へんかしたもの。\nささると　どくで　きをうしなう。"
        en:
          gold: "To fire its poison\nspikes, it must\ninflate its body\fby drinking over\n2.6 gallons of\nwater all at once."
          silver: "The small spikes\ncovering its body\ndeveloped from\fscales. They in-\nject a toxin that\ncauses fainting."
        fr:
          gold: "Pour tirer ses\ndards empoisonnés,\nil gonfle son\fcorps en buvant\n10 litres d’eau\nsubitement."
          silver: "Son corps est\nrecouvert de pics\nprovenant de ses\fécailles. Ils\nsécrètent un poi-\nson étourdissant."
        it:
          gold: "Per sparare le\npunte velenose,\ngonfia il corpo\fbevendo più di\n10 litri d’acqua\nin una volta."
          silver: "I piccoli aculei\nche coprono il suo\ncorpo sono nati\fdalle squame. Con-\ntengono una tossi-\nna che fa svenire."
        de:
          gold: "Um seine Gift-\nstacheln abzufeu-\nern, muss es sei-\fnen Körper auf-\npumpen, indem es\n10 Liter trinkt."
          silver: "Die kleinen Sta-\ncheln an seinem\nKörper sind aus\fSchuppen entstan-\nden. Damit inji-\nziert es Gift."
        es:
          gold: "Para arrojar sus\nvenenosas pùas,\ninfla su cuerpo\fbebiendo hasta\n10 litros de agua\nde una sola vez."
          silver: "Las pequeñas pùas\nque cubren su\ncuerpo eran\fescamas. Inyectan\nuna toxina que\ndebilita."
        ko:
          gold: "전신의 독침을 날리기 위해\n10리터의 물을 한번에\n마시고 몸을 부풀려놓는다"
          silver: "전신의 작은 바늘은\n비늘이 변화한 것\n찔리면 독 때문에 정신을 잃게된다"
scizor:
  species_id: 212
