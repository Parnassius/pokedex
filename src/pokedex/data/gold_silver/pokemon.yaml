          silver: "あしあとの　ふかさが　１０センチにも\nなるほど　じめんを　ちからづよく\nふみしめ　そうげんを　かけぬける。"
        en:
          gold: "By alternately\nraising and lower-\ning its two heads,\fit balances itself\nto be more stable\nwhile running."
          silver: "It races through\ngrassy plains with\npowerful strides,\fleaving footprints\nup to four inches\ndeep."
        fr:
          gold: "En dressant altér-\nnativement ses\ndeux têtes il peut\fcourir plus vite\net garder son\néquilibre."
          silver: "Il parcourt les\nplaines verdoyan-\ntes en laissant\fdes empreintes de\npas profondes de\nplus de 10 cm."
        it:
          gold: "Alzando e abbas-\nsando le 2 teste\nalternativamente,\fsi rende più\nstabile durante\nla corsa."
          silver: "Corre a grandi\nbalzi per le pra-\nterie, lasciando\forme che arrivano\nfino a 10 cm\ndi profondità."
        de:
          gold: "Um beim Rennen\nnicht das Gleich-\ngewicht zu verlie-\fren, streckt es\nseine Köpfe ab-\nwechselnd voraus."
          silver: "Es rennt sehr\nschnell über be-\nwachsene Felder\fund hinterlässt 10\ncm tiefe Fuß-\nspuren."
        es:
          gold: "Alternando ambas\ncabezas arriba y\nabajo, se\fequilibra para\ncorrer de una\nforma màs estable."
          silver: "Corre por las\npraderas con\npotentes zancadas,\fdejando huellas\nde hasta 10 cm\nde profundidad."
        ko:
          gold: "2개의 머리를 순서대로\n상하로 움직여서 달릴 때의\n안정감을 높게 만든다"
          silver: "깊이 10cm이상의 발자국이\n생길 정도로 힘차게\n지면을 박차고 초원을 달린다"
dodrio:
