        it:
          gold: "Con il suo fine\nudito può captare\nsuoni molto\fdistanti. Di soli-\nto si nasconde in\nluoghi tranquilli."
          silver: "Grazie all’udito\nfinissimo può av-\nvertire suoni lon-\ftani. Per questo\npreferisce luoghi\nsilenziosi."
        de:
          gold: "Mit seinem sen-\nsiblen Gehör\nnimmt es entfernte\fGeräusche wahr. Es\nversteckt sich\nan ruhigen Orten."
          silver: "Mit seinen sensib-\nlen Ohren kann es\nselbst entfernte\fGeräusche unter-\nscheiden. Daher\nliebt es Stille."
        es:
          gold: "Con su fino oído\npuede percibir\nsonidos muy\flejanos. Suele\nhabitar en lugares\nsilenciosos."
          silver: "Sus sensibles\noídos le permiten\ndistinguir sonidos\flejanos. Por eso,\nprefiere lugares\ntranquilos."
        ko:
          gold: "아무리 먼 곳에서 나는 소리라도\n구별할 수 있기 때문에 보통은\n조용한 곳에 숨어 있다"
          silver: "어떤 먼 곳에서 나는 소리도\n구별할 수 있을 정도로 귀가 밝아\n보통은 조용한 곳을 좋아한다"
vulpix:
