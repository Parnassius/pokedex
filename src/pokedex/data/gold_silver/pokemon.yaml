          silver: "Inizia a muoversi\nquando è esposto\nalla luce lunare.\fDi notte percorre\ngrandi distanze\nspargendo i semi."
        de:
          gold: "Es erwacht bei\nMondschein und\nwandert rastlos.\fTagsüber versteckt\nes sich still\nunter der Erde."
          silver: "Wird es vom Mond-\nschein getroffen,\nbewegt es sich.\fNachts wandert es\nweite Wege, um\nSamen zu streuen."
        es:
          gold: "Despertado por la\nluz de la luna,\nvaga por la noche.\fDe día se mantiene\nen silencio bajo\nla tierra."
          silver: "Se mueve si se\nexpone a la luz de\nla luna. Merodea\fpor la noche\npara esparcir\nsus semillas."
        ko:
          gold: "달빛을 받아 눈을 뜨면\n이곳저곳을 돌아다닌다  낮에는\n땅속에서 꼼짝않고 있다"
          silver: "달빛을 받아 움직인다\n밤중에 씨앗을 여기저기에\n뿌리기 위해 돌아다닌다"
gloom:
  species_id: 44
  names:
    jp_kana: クサイハナ
    en: GLOOM
    fr: ORTIDE
    it: GLOOM
    de: DUFLOR
    es: GLOOM
    ko: 냄새꼬
  forms:
    gloom:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 70
        special_attack: 85
        special_defense: 75
        speed: 40
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "よだれのように　みえる　あまいミツ。\nとても　ねばねば　しており\nふれると　いつまでも　まとわりつく。"
          silver: "ねばねばした　よだれのような　ミツ。\nとても　あまいのだが　においが\nいじょうに　くさくて　ちかよれない。"
        en:
          gold: "What appears to be\ndrool is actually\nsweet honey. It is\fvery sticky and\nclings stubbornly\nif touched."
          silver: "It secretes a\nsticky, drool-like\nhoney. Although\fsweet, it smells\ntoo repulsive to\nget very close."
        fr:
          gold: "Ce qui semble être\nsa bave est en\nfait du miel très\fcollant. Si on le\ntouche, il adhère\nfortement."
          silver: "Il sécrète un miel\ngluant, semblable\nà de la bave.\fIl est sucré mais\nsent beaucoup trop\nmauvais."
        it:
          gold: "Ciò che sembra\nbava è in realtà\ndolce miele.\fÈ molto viscoso:\nsi attacca appena\nlo si sfiora."
          silver: "Secerne un miele\nviscoso, simile a\nbava. È dolce, ma\fha un odore\ninsopportabile\nse ci si avvicina."
        de:
          gold: "Was wie Speichel\naussieht, ist\neigentlich Honig.\fEr ist zähflüssig\nund klebrig, wenn\nman ihn berührt."
          silver: "Es scheidet zähen,\nsabberähnlichen\nHonig aus. Obwohl\fdieser süß riecht,\nist es eklig in\nseiner Nähe."
        es:
          gold: "Lo que parece ser\nbaba es realmente\nmiel. Es muy\fpegajoso y se\nadhiere tercamente\nsi lo tocas."
          silver: "Segrega una miel\npegajosa. Aunque\nes dulce, su olor\fes demasiado\nrepulsivo como\npara acercarse."
        ko:
          gold: "군침을 흘리는 듯한 달콤한 꿀\n매우 끈적거려서 몸에 닿으면\n오랫동안 떨어지지 않는다"
          silver: "끈적끈적 거리는 침 같은 꿀\n매우 달콤하지만 냄새가\n의외로 역겨워서 다가갈 수 없다"
vileplume:
  species_id: 45
  names:
    jp_kana: ラフレシア
    en: VILEPLUME
    fr: RAFFLESIA
    it: VILEPLUME
    de: GIFLOR
    es: VILEPLUME
    ko: 라플레시아
  forms:
    vileplume:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 85
        special_attack: 100
        special_defense: 90
        speed: 50
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "せかいいち　おおきな　はなびらは\nあるくたびに　ゆれて　たいりょうの\nどくかふんを　ばらまいてしまう。"
          silver: "ボンッという　おとがして　つぼみが\nひらくと　アレルギーを　おこす\nどくかふんを　ばらまきはじめる。"
        en:
          gold: "It has the world’s\nlargest petals.\nWith every step,\fthe petals shake\nout heavy clouds\nof toxic pollen."
          silver: "The bud bursts\ninto bloom with a\nbang. It then\fstarts scattering\nallergenic, poi-\nsonous pollen."
        fr:
          gold: "Il possède des\npétales énormes.\nA chaque pas ils\fsèment des épais\nnuages de pollen\ntoxique."
          silver: "Le bourgeon éclôt\nen détonant. Il\ncommence alors\fà disperser son\npollen empoisonné\nirritant la peau."
        it:
          gold: "Ha i petali più\ngrandi del mondo.\nAd ogni suo passo,\fi petali liberano\nfitte nubi di\npolline tossico."
          silver: "Il bocciolo fiori-\nsce con un’esplo-\nsione. Poi inizia\fa spargere polline\nirritante e\nvelenoso."
        de:
          gold: "Es besitzt die\ngrößten Blätter\nder Welt. Bei\fjedem Schritt\nstreut es Gift-\npollen zu Boden."
          silver: "Die Knospe wird\nmit einem Knall\nzur Blüte. Dann\fverteilt es seine\nallergetischen,\ngiftigen Pollen."
        es:
          gold: "Tiene los pétalos\nmàs grandes del\nmundo. Éstos\fexpulsan densas\nnubes de polen\ntóxico al caminar."
          silver: "El capullo\nflorece de\ngolpe. Entonces,\fempieza a soltar\npolen alergénico\ny venenoso."
        ko:
          gold: "세계최고의 커다란 꽃잎은\n걸어다닐 때마다 흔들려 대량의\n독가루를 흩뿌리게 되어버린다"
          silver: "뽕 하는 소리가 나며 꽃봉오리가\n열리면 알레르기를 일으키는\n독가루를 뿌리기 시작한다"
paras:
  species_id: 46
  names:
    jp_kana: パラス
    en: PARAS
    fr: PARAS
    it: PARAS
    de: PARAS
    es: PARAS
    ko: 파라스
  forms:
    paras:
      form_id: 0
      base_stats:
        hp: 35
        attack: 70
        defense: 55
        special_attack: 45
        special_defense: 55
        speed: 25
      types:
        - bug
        - grass
      egg_groups:
        - bug
        - grass
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          gold: "ぜんしんに　キノコのほうしを　あびて\nうまれてくる。からだが　そだつと\nせなかから　キノコが　はえてくる。"
          silver: "からだが　おおきくなると\nせなかから　とうちゅうかそう\nという　キノコが　はえてくる。"
        en:
          gold: "It is doused with\nmushroom spores\nwhen it is born.\fAs its body grows,\nmushrooms sprout\nfrom its back."
          silver: "As its body grows\nlarge, oriental\nmushrooms named\ftochukaso start\nsprouting out of\nits back."
        fr:
          gold: "Il est couvert de\nspores à la nais-\nsance qui se\ftransforment en\nchampignons quand\nil grandit."
          silver: "Quand son corps\ngrandit des cham-\npignons orientaux,\fdes Tochukasos, se\nmettent à pousser\nsur son dos."
        it:
          gold: "Quando nasce è\ncoperto di spore\ndi fungo.\fQuando cresce gli\nspuntano funghi\nsulla schiena."
          silver: "Mentre il corpo\ncresce, sul dorso\ngli spuntano\ffunghi orientali\nchiamati\ntochukaso."
        de:
          gold: "Es ist von Geburt\nan mit Pilzsporen\nübersät. Wenn es\fwächst, sprießen\nPilze auf seinem\nRücken."
          silver: "Während es langsam\nheranwächst,\nsprießen große,\fexotische Pilze\naus seinem\nRücken."
        es:
          gold: "Està cubierto de\nesporas de seta\nal nacer. A medida\fque crece, las\nsetas brotan\nde su lomo."
          silver: "Al crecer, unas\nsetas orientales\nllamadas tochukaso\fcomienzan a\nflorecer en su\nlomo."
        ko:
          gold: "전신에 버섯포자를 뒤집어쓰고\n태어난다  몸이 자라면\n등에서 버섯이 자라난다"
          silver: "몸이 자라게 되면\n등에서 동충하초\n라고 하는 버섯이 돋아난다"
parasect:
  species_id: 47
  names:
    jp_kana: パラセクト
    en: PARASECT
    fr: PARASECT
    it: PARASECT
    de: PARASEK
    es: PARASECT
    ko: 파라섹트
  forms:
    parasect:
      form_id: 0
      base_stats:
        hp: 60
        attack: 95
        defense: 80
        special_attack: 60
        special_defense: 80
        speed: 30
      types:
        - bug
        - grass
      egg_groups:
        - bug
        - grass
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          gold: "くらくて　しめった　ばしょをこのむ。\nそれは　ムシではなく　おおきくなった\nせなかの　キノコの　このみなのだ。"
          silver: "せなかの　キノコが　そだつほど\nばらまかれる　キノコのほうしの\nこうかは　きょうりょくになる。"
        en:
          gold: "It stays mostly in\ndark, damp places,\nthe preference not\fof the bug, but\nof the big mush-\nrooms on its back."
          silver: "The larger the\nmushroom on its\nback grows, the\fstronger the mush-\nroom spores it\nscatters."
        fr:
          gold: "Il se cache dans\nles endroits\nsombres et humides\fpour s’accommoder\naux exigences des\nchampignons."
          silver: "Plus le champignon\nsur son dos\ngrandit, plus\fcelui-ci émet des\nspores puissantes\ndans l’air."
        it:
          gold: "Di solito sta in\nluoghi oscuri e\numidi, non per se\fstesso, ma per i\ngrossi funghi che\nha sulla schiena."
          silver: "Più cresce il\nfungo che ha sul\ndorso, più forti\fdiventano le\nspore che\nsparge."
        de:
          gold: "Es hält sich meist\nan dunklen und\nfeuchten Orten\fauf. Der Riesen-\npilz auf seinem\nRücken mag das."
          silver: "Je größer der Pilz\nauf seinem Rücken\nwird, desto stär-\fker werden auch\ndie Sporen, die\nes verteilt."
        es:
          gold: "Suele vivir en\nlugares oscuros\ny hùmedos, los\fpreferidos, no del\nbicho, sino de la\nseta de su lomo."
          silver: "Cuanto màs grande\nsea la seta de\nsu lomo, màs\fresistentes seràn\nlas esporas que\nésta suelta."
        ko:
          gold: "어둡고 축축한 장소를 좋아한다\n그것은 벌레가 아닌 크게자란\n등의 버섯의 바램이다"
          silver: "등의 버섯이 자랄수록\n흩뿌려지는 버섯포자의\n효과는 강력해진다"
venonat:
  species_id: 48
  names:
    jp_kana: コンパン
    en: VENONAT
    fr: MIMITOSS
    it: VENONAT
    de: BLUZUK
    es: VENONAT
    ko: 콘팡
  forms:
    venonat:
      form_id: 0
      base_stats:
        hp: 60
        attack: 55
        defense: 50
        special_attack: 40
        special_defense: 55
        speed: 45
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "りょうめは　レーダーきのうを\nそなえている。くらやみに　かくれた\nちいさなムシも　つかまえてたべる。"
          silver: "ぜんしんから　どくが　にじみでる。\nくらくなると　あかりに　むらがった\nちいさなムシを　とらえて　たべる。"
        en:
          gold: "Its eyes also\nfunction as radar\nunits. It catches\fand eats small\nbugs that hide in\ndarkness."
          silver: "Poison oozes from\nall over its body.\nIt catches and\feats small bugs at\nnight that are at-\ntracted by light."
        fr:
          gold: "Ses yeux fonction-\nnent comme des\nradars. Il se\fnourrit de petits\ninsectes cachés\ndans le noir."
          silver: "Son corps sécrète\nun poison redouta-\nble. La nuit, il\fmange de petits\ninsectes attirés\npar la lumière."
        it:
          gold: "I suoi occhi fanno\nanche da radar,\nper catturare\fe mangiare piccoli\ninsetti che vivono\nnell’oscurità."
          silver: "Da tutto il suo\ncorpo cola veleno.\nDi notte cattura e\fmangia piccoli\ninsetti attratti\ndalla luce."
        de:
          gold: "Seine Augen dienen\nihm gleichzeitig\nals Radar. Es er-\fnährt sich von\nKäfern, die\nim Dunkeln leben."
          silver: "Gift bedeckt sei-\nnen Körper. Es\nfängt und frisst\fnachts kleine Kä-\nfer, die von Licht\nangelockt wurden."
        es:
          gold: "Sus ojos también\nfuncionan como\nradares. Atrapa\fy come pequeños\nbichos ocultos\nen la oscuridad."
          silver: "Rezuma veneno por\ntodo su cuerpo.\nAtrapa y come\fpequeños bichos\nnocturnos atraídos\npor la luz."
        ko:
          gold: "양쪽 눈은 레이더 기능을\n가지고 있다  어둠에 숨어있는\n작은 벌레도 잡아먹는다"
          silver: "전신에서 독이 번져나온다\n어두워지면 밝은 곳에 모인\n작은 벌레를 잡아 먹는다"
venomoth:
  species_id: 49
  names:
    jp_kana: モルフォン
    en: VENOMOTH
    fr: AEROMITE
    it: VENOMOTH
    de: OMOT
    es: VENOMOTH
    ko: 도나리
  forms:
    venomoth:
      form_id: 0
      base_stats:
        hp: 70
        attack: 65
        defense: 60
        special_attack: 90
        special_defense: 75
        speed: 90
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "こうげき　するときは　はげしく\nおおきな　はねを　はばたかせ\nどくのこなを　ふりまく。"
          silver: "はねの　りんぷんは　いろがこいと\nどくをあたえ　うすいと　しびれさすと\nいったぐあいに　こうかが　ちがう。"
        en:
          gold: "When it attacks,\nit flaps its large\nwings violently to\fscatter its poi-\nsonous powder all\naround."
          silver: "The powder on its\nwings is poisonous\nif it is dark in\fcolor. If it is\nlight, it causes\nparalysis."
        fr:
          gold: "Il bat des ailes\nviolemment pour\nprojeter des\fpoudres empoison-\nnées vers ses\nadversaires."
          silver: "Si la poudre sur\nses ailes est\nsombre, elle\fempoisonne. Si\nelle est claire,\nelle paralyse."
        it:
          gold: "Quando attacca\nbatte con forza\nle sue larghe ali\fspargendo ovunque\nla sua polvere\nvelenosa."
          silver: "La polvere sulle\nsue ali è velenosa\nse è di colore\fscuro. Se è\nchiara provoca\nparalisi."
        de:
          gold: "Beim Angriff\nschlägt es wild\nmit seinen Flü-\fgeln, um seinen\nGiftpuder überall\nzu verstreuen."
          silver: "Ist es schwarz,\nenthält sein Puder\nGift. Ist es weiß,\fparalysiert sein\nPuder alle Gegner\nbei Berührung."
        es:
          gold: "Cuando ataca,\nagita sus largas\nalas violentamente\fpara esparcir\npolvo venenoso\na su alrededor."
          silver: "El polvo de sus\nalas es venenoso\nsi es de color\foscuro. Si es\nclaro, causa\nparàlisis."
        ko:
          gold: "공격할 때는 격하게\n커다란 날개를 움직여서\n독가루를 뿌린다"
          silver: "날개의 가루는 상태에 따라 색이\n짙어지면 독의 성질을 내고 색이\n옅어지면 마비의 효과를 나타낸다"
diglett:
  species_id: 50
  names:
    jp_kana: ディグダ
    en: DIGLETT
    fr: TAUPIQUEUR
    it: DIGLETT
    de: DIGDA
    es: DIGLETT
    ko: 디그다
  forms:
    diglett:
      form_id: 0
      base_stats:
        hp: 10
        attack: 55
        defense: 25
        special_attack: 35
        special_defense: 45
        speed: 95
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ひふが　とても　うすいので\nひかりに　てらされると　けつえきが\nあたためられて　よわってしまう。"
          silver: "ディグダが　とおったあとの\nだいちは　ほどよく　たがやされて\nさいこうの　はたけに　なる。"
        en:
          gold: "Its skin is very\nthin. If it is\nexposed to light,\fits blood heats\nup, causing it to\ngrow weak."
          silver: "If a DIGLETT DIGS\nthrough a field,\nit leaves the soil\fperfectly tilled\nand ideal for\nplanting crops."
        fr:
          gold: "Son épiderme est\ntrès fin. S’il est\nexposé au soleil\fson sang se\nréchauffe, ce qui\nl’affaiblit."
          silver: "Si un TAUPIQUEUR\ncreuse un TUNNEL\nsous un champ, il\fretourne la terre\net améliore les\nrécoltes."
        it:
          gold: "La sua pelle è\nsottilissima.\nSe si espone alla\fluce, il sangue\nsi riscalda,\nindebolendolo."
          silver: "Se un DIGLETT\nscava una FOSSA\nlascia il terreno\fperfettamente\nlavorato e pronto\nper la semina."
        de:
          gold: "Seine Haut ist\nsehr dünn. Wird es\nSonnenlicht ausge-\fsetzt, erhitzt\nsich sein Blut und\nes wird schwach."
          silver: "Setzt ein DIGDA\nSCHAUFLER auf\neinem Acker ein,\fist die Erde ideal\ngepflügt, um etwas\nanzupflanzen."
        es:
          gold: "Su piel es muy\nfina. Si se expone\na la luz, su\fsangre se calienta\ny su crecimiento\nse debilita."
          silver: "Si un DIGLETT\nEXCAVA un terreno,\nlo deja\fperfectamente\narado y preparado\npara sembrarlo."
        ko:
          gold: "피부가 매우 얇기 때문에\n빛에 쪼이게 되면 혈액이\n데워져서 약해져버린다"
          silver: "디그다가 지나간 뒤의\n대지는 알맞게 땅이 갈려\n최고의 밭이 된다"
dugtrio:
  species_id: 51
  names:
    jp_kana: ダグトリオ
    en: DUGTRIO
    fr: TRIOPIKEUR
    it: DUGTRIO
    de: DIGDRI
    es: DUGTRIO
    ko: 닥트리오
  forms:
    dugtrio:
      form_id: 0
      base_stats:
        hp: 35
        attack: 80
        defense: 50
        special_attack: 50
        special_defense: 70
        speed: 120
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "３つの　あたまが　たがいちがいに\nうごくのは　まわりの　つちを\nやわらかくして　ほりやすくするため。"
          silver: "すごい　ちからの　もちぬしで\nどんなに　かたい　じめんでも\nちか１００キロまで　ほりすすむ。"
        en:
          gold: "Its three heads\nbob separately up\nand down to loosen\fthe soil nearby,\nmaking it easier\nfor it to burrow."
          silver: "Extremely power-\nful, they can DIG\nthrough even the\fhardest ground to\na depth of over 60\nmiles."
        fr:
          gold: "Ses trois têtes\npilonnent le sol\npour le rendre\ffriable pour\nainsi le creuser\nplus facilement."
          silver: "Terriblement puis-\nsant, il peut\ncreuser un TUNNEL\fsur tout type de\nsol et jusqu’à 100\nkm de profondeur."
        it:
          gold: "Le sue tre teste\nindipendenti smuo-\nvono il terreno\fper poter scavare\ncon maggiore\nfacilità."
          silver: "Estremamente\nforte, può scavare\nuna FOSSA anche\fnella terra più\ndura fino a 100 km\ndi profondità."
        de:
          gold: "Seine drei Köpfe\nbewegen sich\nabwechselnd hinauf\fund hinunter, um\ndas Erdreich um\nihn zu lockern."
          silver: "Es ist so stark,\ndass es sich mit\nSCHAUFLER sogar\fdurch steinharten\nBoden bis in 100\nkm Tiefe gräbt."
        es:
          gold: "Sus tres cabezas\nsuben y bajan\npara remover la\ftierra cercana,\nfacilitàndole\nla excavación."
          silver: "Muy poderosos,\npueden EXCAVAR\nhasta los terrenos\fmàs duros a una\nprofundidad de\nmàs de 100 km."
        ko:
          gold: "3개의 머리가 서로 어긋나게\n움직이는 것은 주변의 흙을\n부드럽게해서 파기 쉽게하기 위함임"
          silver: "엄청난 힘의 소유자로\n그 어떤 딱딱한 땅이라도\n지하 100Km까지 파들어 간다"
meowth:
  species_id: 52
  names:
    jp_kana: ニャース
    en: MEOWTH
    fr: MIAOUSS
    it: MEOWTH
    de: MAUZI
    es: MEOWTH
    ko: 나옹
  forms:
    meowth:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 40
        special_defense: 40
        speed: 90
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "まるいものを　みつけると\nじかんを　わすれて　あそんでしまう。\nそして　つかれて　ねてしまう。"
          silver: "きらきら　ひかるモノが　だいすき。\nとくに　コインが　おきにいりで\nひろっては　どこかに　かくしている。"
        en:
          gold: "It is fascinated\nby round objects.\nIt can’t stop\fplaying with them\nuntil it tires and\nfalls asleep."
          silver: "It loves anything\nthat shines. It\nespecially adores\fcoins that it\npicks up and se-\ncretly hoards."
        fr:
          gold: "Il est fasciné par\nles objets ronds.\nIl ne peut pas\fs’empêcher de\njouer jusqu’à\nl’épuisement."
          silver: "Il aime tout ce\nqui brille, et\nparticulièrement\fles pièces qu’il\nramasse et ac-\ncumule en secret."
        it:
          gold: "È affascinato da\noggetti rotondi.\nNon può fare a\fmeno di giocarci\nfino a stancarsi\ne addormentarsi."
          silver: "Ama tutto ciò che\nsplende,\nsoprattutto le\fmonete che racco-\nglie e accumula\nsegretamente."
        de:
          gold: "Es ist von runden\nObjekten faszi-\nniert. Es spielt\fsolange damit, bis\nes müde wird\nund einschläft."
          silver: "Es liebt alles\nGlänzende. Es hat\neine Vorliebe für\fMünzen, die es\naufliest und unbe-\nmerkt hortet."
        es:
          gold: "Le fascinan los\nobjetos redondos.\nNo deja de jugar\fcon ellos hasta\nque se cansa\ny cae rendido."
          silver: "Le encanta todo lo\nque brilla. Adora\nespecialmente\flas monedas que\nrecoge y va\namontonando."
        ko:
          gold: "둥근 물건을 발견하면\n장난치느라 시간가는 줄 모른다\n그리고 지쳐서 잠들어버린다"
          silver: "반짝반짝 빛나는 물건을 좋아한다\n특히 동전을 제일 좋아해서\n주워서 어딘가에 감춰 놓는다"
persian:
  species_id: 53
  names:
    jp_kana: ペルシアン
    en: PERSIAN
    fr: PERSIAN
    it: PERSIAN
    de: SNOBILIKAT
    es: PERSIAN
    ko: 페르시온
  forms:
    persian:
      form_id: 0
      base_stats:
        hp: 65
        attack: 70
        defense: 60
        special_attack: 65
        special_defense: 65
        speed: 115
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ぜんしんから　ただよう　きひんに\nあこがれる　ひとも　おおいが\nなにかあると　すぐ　ひっかいてくる。"
          silver: "しなやかな　きんにくの　おかげで\nあしおとひとつ　たてずに　あるける。\nえものを　かるときは　いっしゅん。"
        en:
          gold: "Many adore it for\nits sophisticated\nair. However, it\fwill lash out and\nscratch for little\nreason."
          silver: "Its lithe muscles\nallow it to walk\nwithout making\fa sound. It\nattacks in an\ninstant."
        fr:
          gold: "Très apprécié pour\nson air sophisti-\nqué, il est très\fcapricieux et se\nmet à griffer pour\nun rien."
          silver: "Ses muscles soup-\nles lui permettent\nde marcher sans un\fbruit et d’at-\ntaquer en l’espace\nd’un instant."
        it:
          gold: "Molti lo amano per\nil suo aspetto\nelegante. Tuttavia\fpuò scatenarsi e\ngraffiare alla mi-\nnima provocazione."
          silver: "I muscoli flessi-\nbili lo fanno\ncamminare senza\ffare alcun rumore.\nAttacca in un\nlampo."
        de:
          gold: "Viele bewundern\nsein erhabenes\nAuftreten. Es\fattackiert und\nkratzt ohne\nwirklichen Grund."
          silver: "Aufgrund seiner\ngeschmeidigen Mus-\nkeln kann es sich\flautlos bewegen.\nEs greift ohne\nVorwarnung an."
        es:
          gold: "Muy valorado\npor su aire\nsofisticado. Sin\fembargo, ataca y\naraña por el màs\nmínimo motivo."
          silver: "Sus àgiles\nmùsculos le\npermiten moverse\fsin hacer ruido.\nAtaca al\ninstante."
        ko:
          gold: "전신에서 감도는 기품에\n마음이 끌리는 사람도 많지만\n뭔일이 있으면 바로 할퀴려고 한다"
          silver: "부드러운 근육 덕분으로\n발소리를 내지 않고 걸을 수 있다\n먹이를 사냥할 때는 순식간이다"
psyduck:
  species_id: 54
  names:
    jp_kana: コダック
    en: PSYDUCK
    fr: PSYKOKWAK
    it: PSYDUCK
    de: ENTON
    es: PSYDUCK
    ko: 고라파덕
  forms:
    psyduck:
      form_id: 0
      base_stats:
        hp: 50
        attack: 52
        defense: 48
        special_attack: 65
        special_defense: 50
        speed: 55
      types:
        - water
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          gold: "ふしぎな　ちからを　ひめているが\nつかった　きおくが　ないので\nいつも　くびを　かしげている。"
          silver: "いつもの　ずつうが　はげしくなると\nふしぎなちからを　はっきするが\nそのときの　きおくは　ないらしい。"
        en:
          gold: "It has mystical\npowers but doesn’t\nrecall that it has\fused them. That is\nwhy it always\nlooks puzzled."
          silver: "If its chronic\nheadache peaks, it\nmay exhibit odd\fpowers. It seems\nunable to recall\nsuch an episode."
        fr:
          gold: "Il ne se souvient\npas qu’il a des\npouvoirs PSY.\fC’est pour cela\nqu’il a l’air si\nconfus."
          silver: "Plus sa migraine\ndevient forte,\nplus il gagne\fd’étranges\npouvoirs. Mais il\noublie tout après."
        it:
          gold: "Ha poteri sopran-\nnaturali ma non\nricorda di averli\fusati. Per questo\nsembra sempre\nperplesso."
          silver: "Se il suo mal di\ntesta cronico si\nacuisce può\facquistare strani\npoteri, per poi\ndimenticarsene."
        de:
          gold: "Es besitzt mys-\ntische Kräfte, die\nes unbewusst ein-\fsetzt. Daher ist\nsein Blick immer\nverwirrt."
          silver: "Es leidet unter\nstarker Migräne,\naufgrund der es\fKräfte entwickelt.\nDanach erinnert es\nsich an nichts."
        es:
          gold: "Tiene poderes\nmísticos que no\nrecuerda haber\fusado. Por eso,\nsiempre parece\ndesconcertado."
          silver: "Si su jaqueca\ncrónica empeora,\npodría mostrar\fextraños poderes.\nParece que después\nno recuerda nada."
        ko:
          gold: "신비한 힘을 소유하고 있지만\n사용한 기억이 없기때문에\n항상 고개를 갸우뚱거리고 있다"
          silver: "두통이 심해지면\n신비한 힘을 나타내지만\n그때의 기억은 없는 것 같다"
golduck:
  species_id: 55
  names:
    jp_kana: ゴルダック
    en: GOLDUCK
    fr: AKWAKWAK
    it: GOLDUCK
    de: ENTORON
    es: GOLDUCK
    ko: 골덕
  forms:
    golduck:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 78
        special_attack: 95
        special_defense: 80
        speed: 85
      types:
        - water
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          gold: "みずかきのついた　ながい　てあしを\nつかい　ぜんりょくで　およぎだすと\nなぜか　ひたいが　ひかりかがやく。"
          silver: "ゆうぐれ　みずべに　すがたをみせる。\nひたいが　あやしく　ひかるとき\nじんつうりきを　つかいこなすという。"
        en:
          gold: "When it swims at\nfull speed using\nits long, webbed\flimbs, its fore-\nhead somehow be-\ngins to glow."
          silver: "It appears by\nwaterways at dusk.\nIt may use tele-\fkinetic powers if\nits forehead glows\nmysteriously."
        fr:
          gold: "Quand il nage à\nvitesse maximale\ngrâce à ses pattes\fpalmées, son front\német une lueur\nétrange."
          silver: "Il apparaît dans\nles étendues d’eau\nau crépuscule. Si\fson front brille,\nil se sert de sa\ntélékinésie."
        it:
          gold: "Quando nuota a\ntutta velocità con\ni suoi lunghi arti\fpalmati, la fronte\ngli diventa\nincandescente."
          silver: "Appare presso i\ncorsi d’acqua\ncol buio. Acquista\fpoteri cinetici se\nla sua fronte è\nincandescente."
        de:
          gold: "Wenn es mit\nseinen Flossen\nschnell durch das\fWasser schwimmt,\nbeginnt seine\nStirn zu glühen."
          silver: "Es taucht bei Son-\nnenuntergang am\nWasser auf. Leuch-\ftet seine Stirn,\nsetzt es telekine-\ntische Kräfte ein."
        es:
          gold: "Cuando nada a toda\nvelocidad usando\nsus palmeadas\fextremidades,\nsu frente comienza\na brillar."
          silver: "Aparece en ríos\nal anochecer.\nPuede usar poderes\ftelekinéticos si\nsu frente brilla\nmisteriosamente."
        ko:
          gold: "물갈퀴가 있는 긴 손발을\n사용하여 전력으로 헤엄치면\n어떤 이유인지 이마에서 빛이 난다"
          silver: "해질 무렵 강가에 모습을 나타낸다\n이마가 이상하게 빛날 때\n신통력을 발휘한다고 전해진다"
mankey:
  species_id: 56
  names:
    jp_kana: マンキー
    en: MANKEY
    fr: FEROSINGE
    it: MANKEY
    de: MENKI
    es: MANKEY
    ko: 망키
  forms:
    mankey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 35
        special_attack: 35
        special_defense: 45
        speed: 70
      types:
        - fighting
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "いつも　おこっている。\nてごろな　えものを　みかけると\nむれを　なして　おそいかかる。"
          silver: "いみもなく　おこって　あばれだすと\nなかまの　くべつも　つかなくなるので\nちかよるのは　ひじょうに　きけんだ。"
        en:
          gold: "It is extremely\nill-tempered.\nGroups of them\fwill attack any\nhandy target for\nno reason."
          silver: "It’s unsafe to ap-\nproach if it gets\nviolently enraged\ffor no reason and\ncan’t distinguish\nfriends from foes."
        fr:
          gold: "Agressif et de\nmauvais caractère,\nil attaque en\fbande et sans\nraison tout ce qui\ns’approche de lui."
          silver: "Il ne peut dis-\nsocier ses amis de\nses ennemis et a\ftendance à enrager\nlorsqu’on l’ap-\nproche."
        it:
          gold: "Ha un pessimo\ncarattere. Può\nattaccare in\fgruppo qualsiasi\nobiettivo senza\nalcuna ragione."
          silver: "È pericoloso\navvicinarlo se è\ntanto arrabbiato\fda non poter più\ndistinguere gli\namici dai nemici."
        de:
          gold: "Es ist extrem\njähzornig. Tritt\nes in Gruppen auf,\fgreift es grund-\nlos alles an, was\nin Reichweite ist."
          silver: "Da es grundlos an-\ngreift und nicht\nzwischen Freund\foder Feind unter-\nscheidet, ist es\nsehr gefährlich."
        es:
          gold: "Tiene muy mal\nhumor. Cuando\nse agrupan atacan\fa cualquier cosa\nsin motivo\naparente."
          silver: "Es peligroso\nacercarse si se\nenfada sin razón\faparente, ya que\nno distingue entre\namigos y enemigos."
        ko:
          gold: "항상 화를내고 있다\n근처의 먹이를 발견하면\n무리를 일으켜 덤벼든다"
          silver: "이유없이 화나서 날뛰기 시작하면\n동료도 구별 할 수 없기에\n가까이 가는것은 매우 위험하다"
primeape:
  species_id: 57
  names:
    jp_kana: オコリザル
    en: PRIMEAPE
    fr: COLOSSINGE
    it: PRIMEAPE
    de: RASAFF
    es: PRIMEAPE
    ko: 성원숭
  forms:
    primeape:
      form_id: 0
      base_stats:
        hp: 65
        attack: 105
        defense: 60
        special_attack: 60
        special_defense: 70
        speed: 95
      types:
        - fighting
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "ねているときに　ちかよると\nねぼけたまま　おこりだして\nわけもわからず　おいかけてくる。"
          silver: "だれかの　しせんを　かんじただけで\nもうれつに　おこりだす。そして\nめがあった　ものを　おいかけるのだ。"
        en:
          gold: "If approached\nwhile asleep, it\nmay awaken and\fangrily give chase\nin a groggy state\nof semi-sleep."
          silver: "It becomes wildly\nfurious if it even\nsenses someone\flooking at it. It\nchases anyone that\nmeets its glare."
        fr:
          gold: "Dérangé dans son\nsommeil, il peut\nse défendre comme\fune furie alors\nqu’il est encore à\nmoitié endormi."
          silver: "Il devient fou\nfurieux s’il se\nsent observé et\fpourchasse ceux\nsur qui il pose\nson regard."
        it:
          gold: "Se lo si avvicina\nmentre dorme può\nscagliarsi con\frabbia all’inse-\nguimento, mezzo\naddormentato."
          silver: "Diventa furioso\nse si sente\nosservato.\fAttacca chiunque\nincontri il suo\nsguardo."
        de:
          gold: "Wenn man sich ihm\nnähert, während es\nschläft, wacht es\fauf und startet\neine Verfolgung\nim Halbschlaf."
          silver: "Spürt es, dass je-\nmand es anblickt,\nwird es zornig. Es\ffolgt jedem, der\nes wagt, seinen\nBlick zu erwidern."
        es:
          gold: "Si te acercas a él\nmientras duerme,\nse despertarà y te\fdarà caza en\nestado medio\nsonàmbulo."
          silver: "Se pone furioso\nsi nota que\nalguien le està\fmirando. Persigue\na cualquiera que\nle vea enfadado."
        ko:
          gold: "자고있을 때 다가가면\n잠든 채로 화를 내기 시작하여\n영문도 모른 채 덤벼든다"
          silver: "누가 쳐다보기만 해도\n대단히 화를 낸다  그리고\n눈이 마주친 상대를 쫓아다닌다"
growlithe:
  species_id: 58
  names:
    jp_kana: ガーディ
    en: GROWLITHE
    fr: CANINOS
    it: GROWLITHE
    de: FUKANO
    es: GROWLITHE
    ko: 가디
  forms:
    growlithe:
      form_id: 0
      base_stats:
        hp: 55
        attack: 70
        defense: 45
        special_attack: 70
        special_defense: 50
        speed: 60
      types:
        - fire
      egg_groups:
        - field
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          gold: "じぶんより　つよくて　おおきな\nあいてにも　おそれずに　たちむかう\nゆうかんで　たのもしい　せいかく。"
          silver: "ちゅうじつな　せいかくで\nおやの　トレーナーを　まもるため\nひっしに　あいてに　ほえかかる。"
        en:
          gold: "It has a brave and\ntrustworthy na-\nture. It fear-\flessly stands up\nto bigger and\nstronger foes."
          silver: "Extremely loyal,\nit will fearlessly\nbark at any oppo-\fnent to protect\nits own trainer\nfrom harm."
        fr:
          gold: "Il est courageux\net fier. Il se\ndresse vaillamment\fdevant ses ennemis\nmême s’ils sont\nplus puissants."
          silver: "Très fidèle, il\naboiera sans peur\npour protéger son\fmaître du danger\nqui le guette."
        it:
          gold: "Coraggioso e fede-\nle, si oppone\nsenza timore anche\fa nemici più\ngrandi e forti\ndi lui."
          silver: "Decisamente leale,\nringhia furiosa-\nmente a chiunque\fper proteggere\nil suo allenatore\nda un attacco."
        de:
          gold: "Es ist von Natur\naus tapfer und\nvertrauenswürdig.\fEs scheut nicht\nvor starken\nGegnern zurück."
          silver: "Es ist sehr loyal.\nEs bellt furchtlos\njeden Gegner an,\fum seinen Trainer\nvor Schaden zu\nbewahren."
        es:
          gold: "De naturaleza\nvaliente y\nhonrada, se\fenfrenta sin miedo\na enemigos màs\ngrandes y fuertes."
          silver: "Extremadamente\nfiel, ladrarà sin\ntemor a cualquier\fenemigo para\ndefender a su\nentrenador."
        ko:
          gold: "자신보다 강하고 커다란\n상대라도 겁없이 덤벼드는\n용감하고 믿음직한 성격이다"
          silver: "충직한 성격으로\n자신의 트레이너를 지키기 위해\n필사적으로 상대방에게 짖어댄다"
arcanine:
  species_id: 59
  names:
    jp_kana: ウインディ
    en: ARCANINE
    fr: ARCANIN
    it: ARCANINE
    de: ARKANI
    es: ARCANINE
    ko: 윈디
  forms:
    arcanine:
      form_id: 0
      base_stats:
        hp: 90
        attack: 110
        defense: 80
        special_attack: 100
        special_defense: 80
        speed: 95
      types:
        - fire
      egg_groups:
        - field
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          gold: "りっぱな　たてがみに　みとれる\nひとがいるほど　どうどうとしている\nちゅうごくの　でんせつポケモン。"
          silver: "どうどうとした　なきごえは\nいげんに　あふれ　きいたものは\nおもわず　ひれふしてしまう。"
        en:
          gold: "This legendary\nChinese POKEMON is\nconsidered magnif-\ficent. Many people\nare enchanted by\nits grand mane."
          silver: "Its magnificent\nbark conveys a\nsense of majesty.\fAnyone hearing it\ncan’t help but\ngrovel before it."
        fr:
          gold: "Ce POKEMON légen-\ndaire est magni-\nfique. Son aura\fmagique et sa\ncrinière sont\nadorées en Chine."
          silver: "Son aboiement est\ntout simplement\nmajestueux. On ne\fpeut que ramper\nà ses pieds après\nl’avoir entendu."
        it:
          gold: "Questo POKéMON\nleggendario cinese\nè considerato ma-\fgnifico. La sua\ngrandiosa criniera\nincanta molti."
          silver: "Abbaia magnifica-\nmente, anzi\nmaestosamente.\fChiunque lo senta\nnon può che\nprostrarsi."
        de:
          gold: "Dieses legendäre\nchinesische POKE-\nMON wird wegen\fseiner Schönheit\nverehrt. Vor allem\nwegen der Mähne."
          silver: "Sein bezauberndes\nBellen klingt ma-\njestätisch. Jeder,\fder es vernimmt,\nmuss sich auto-\nmatisch verbeugen."
        es:
          gold: "Este POKéMON chino\nlegendario es\nconsiderado\fmagnífico. A mucha\ngente le encanta\nsu gran melena."
          silver: "Su magnífico\nladrido transmite\nmajestuosidad.\fTodo el que lo\nescuche no podrà\nevitar adularlo."
        ko:
          gold: "훌륭한 갈기에 반해버린\n사람들이 있을 정도로 위풍당당한\n중국 전설의 포켓몬이다"
          silver: "위풍당당한 울음소리는\n위엄이 넘쳐 소리를 들은 상대는\n무의식중에 몸을 움츠리게된다"
poliwag:
  species_id: 60
  names:
    jp_kana: ニョロモ
    en: POLIWAG
    fr: PTITARD
    it: POLIWAG
    de: QUAPSEL
    es: POLIWAG
    ko: 발챙이
  forms:
    poliwag:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 90
      types:
        - water
      egg_groups:
        - water_1
      descriptions:
        jp_kana:
          gold: "はえたばかりの　あしで\nあるくのは　にがてなので　いつも\nみずのなかを　およぎまわってる。"
          silver: "おなかの　うずまきの　むきは\nちほうによって　ことなる。どうやら\nせきどうが　かんけい　するらしい。"
        en:
          gold: "Because it is in-\nept at walking on\nits newly grown\flegs, it always \nswims around in\nwater."
          silver: "The direction of\nits belly spiral\ndiffers by area.\fThe equator is\nthought to have an\neffect on this."
        fr:
          gold: "A la naissance ses\njambes ne peuvent\nle supporter,\fc’est pour cela\nqu’il ne fait que\nnager dans l’eau."
          silver: "Le sens de la\nspirale sur son\nventre change\fsuivant la région.\nOn pense que c’est\ndû à l’équateur."
        it:
          gold: "Non potendo cammi-\nnare sulle sue\ngambe appena spun-\ftate, non fa che\nnuotare avanti e\nindietro."
          silver: "La direzione della\nspirale sulla\npancia varia da\fzona a zona. Si\ndice che dipenda\ndall’equatore."
        de:
          gold: "Da es mit seinen\nneu gewachsenen\nFüßen noch nicht\fgut laufen kann,\nschwimmt es nur im\nWasser umher."
          silver: "Die Ausrichtung\nseiner Spirale\nhängt von dem Ge-\fbiet ab. Man sagt,\nder Äquator hat\ndamit zu tun."
        es:
          gold: "Por ser un poco\ntorpe al caminar\ncon sus jóvenes\fpatas, siempre\nprefiere nadar\na caminar."
          silver: "La dirección de\nla espiral de su\ntripa cambia por\fzonas. Se cree\nque le influye\nel ecuador."
        ko:
          gold: "생기기 시작한 다리로\n걸어다니기에는 힘들기에 항상\n물속을 헤엄치고 돌아다닌다"
          silver: "배의 소용돌이 무늬의 방향은\n지방에따라 다르다  어쩐지\n적도와 관계가 있는 것 같다"
poliwhirl:
  species_id: 61
  names:
    jp_kana: ニョロゾ
    en: POLIWHIRL
    fr: TETARTE
    it: POLIWHIRL
    de: QUAPUTZI
    es: POLIWHIRL
    ko: 수륙챙이
  forms:
    poliwhirl:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 65
        special_attack: 50
        special_defense: 50
        speed: 90
      types:
        - water
      egg_groups:
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          gold: "おなかの　うずは　びみょうに\nうねっているので　じっと　みていると\nだんだん　ねむくなってしまう。"
          silver: "ぜんしんの　ひふは　しめっているが\nおなかの　うずまきの　ぶぶんの\nかんしょくは　すべすべと　している。"
        en:
          gold: "The swirl on its\nbelly subtly un-\ndulates. Staring\fat it may gradual-\nly cause drowsi-\nness."
          silver: "The skin on most\nof its body is\nmoist. However,\fthe skin on its\nbelly spiral feels\nsmooth."
        fr:
          gold: "Le tourbillon sur\nson ventre bouge\nlégèrement. Le\fregarder longtemps\npeut engendrer une\nsomnolence."
          silver: "Sur la plus grande\npartie de son\ncorps, sa peau est\fmoite. La peau de\nsa spirale est\ntrès douce."
        it:
          gold: "La spirale dise-\ngnata sulla pancia\ngira piano.\fFissandola, si\ncade lentamente\naddormentati."
          silver: "Ha la pelle umida\nsu gran parte del\ncorpo. Quella\fdella spirale che\nha sulla pancia\nè liscia."
        de:
          gold: "Die Spirale auf\nseinem Bauch dreht\nsich langsam. Wer\fsie zu lange an-\nsieht, verfällt in\neine Art Hypnose."
          silver: "Der Großteil sei-\nner Haut ist\nfeucht. Dennoch\fist die Haut um\nseine Spirale\nglatt und weich."
        es:
          gold: "La espiral de su\npecho se ondula\ndelicadamente.\fMirarlo provoca\ngradualmente un\nestado de sopor."
          silver: "Gran parte de\nsu piel es\nesponjosa. Sin\fembargo, la piel\nde su espiral\nes muy suave."
        ko:
          gold: "배의 소용돌이 문양은 미묘하게\n꾸불거리고 있어서 계속 쳐다보면\n점점 졸립게 되어버린다"
          silver: "전신의 피부는 젖어 있지만\n배의 소용돌이 부분의\n감촉은 미끈미끈하다"
poliwrath:
  species_id: 62
  names:
    jp_kana: ニョロボン
    en: POLIWRATH
    fr: TARTARD
    it: POLIWRATH
    de: QUAPPO
    es: POLIWRATH
    ko: 강챙이
  forms:
    poliwrath:
      form_id: 0
      base_stats:
        hp: 90
        attack: 85
        defense: 95
        special_attack: 70
        special_defense: 90
        speed: 70
      types:
        - water
        - fighting
      egg_groups:
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          gold: "バタあし　だけでも\nたいへいようを　おうだん　できるほど\nおよぐのが　じょうずだ。"
          silver: "きんにくを　すべて　つかった\nダイナミックな　およぎが　とくいだが\nなぜか　ちじょうで　せいかつする。"
        en:
          gold: "This strong and\nskilled swimmer is\neven capable of\fcrossing the\nPacific Ocean just\nby kicking."
          silver: "Although an ener-\ngetic, skilled\nswimmer that uses\fall of its mus-\ncles, it lives on\ndry land."
        fr:
          gold: "Ce puissant nageur\npourrait traverser\nl’Océan Pacifique\fen quelques\nbattements de\npieds."
          silver: "Nageur émérite se\nservant du moindre\nde ses muscles,\fil préfère cepen-\ndant vivre sur la\nterre ferme."
        it:
          gold: "Questo forte ed\nesperto nuotatore\npotrebbe attraver-\fsare l’oceano nuo-\ntando solo con gli\narti inferiori."
          silver: "Sebbene nuoti con\npotenza e abilità\nutilizzando tutti\fi suoi muscoli,\npreferisce vivere\nsulla terraferma."
        de:
          gold: "QUAPPO ist ein gu-\nter Schwimmer. Es\nkann den Pazifik\fnur mit Einsatz\nseiner Beine\ndurchschwimmen."
          silver: "Obwohl es ein ge-\nschickter und aus-\ndauernder Schwim-\fmer ist, der alle\nMuskeln einsetzt,\nlebt es an Land."
        es:
          gold: "Este fuerte\ny hàbil nadador\nes capaz hasta\fde cruzar los\ngrandes océanos,\nsólo por placer."
          silver: "Aunque es un\nnadador muy hàbil\ny enérgico, que\fusa todos sus\nmùsculos, vive\nen tierra firme."
        ko:
          gold: "앞다리만으로도\n태평양을 횡단할 수 있을 정도로\n헤엄치는 실력이 뛰어나다"
          silver: "근육을 전부 사용하는\n다이나믹한 헤엄치기가 특기이지만\n어쩐지 지상에서 생활을 한다"
abra:
  species_id: 63
  names:
    jp_kana: ケーシィ
    en: ABRA
    fr: ABRA
    it: ABRA
    de: ABRA
    es: ABRA
    ko: 캐이시
  forms:
    abra:
      form_id: 0
      base_stats:
        hp: 25
        attack: 20
        defense: 15
        special_attack: 105
        special_defense: 55
        speed: 90
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "こうげきの　けはいを　よみとって\nおそわれるまえに　さっさと\nテレポートで　そのばを　さっていく。"
          silver: "きまぐれに　テレポートを\nくりかえしていると　まるで\nぶんしん　したかのように　みえる。"
        en:
          gold: "It senses impend-\ning attacks and\nTELEPORTS away to\fsafety before the\nactual attacks can\nstrike."
          silver: "If it decides to\nTELEPORT randomly,\nit creates the\fillusion that it\nhas created copies\nof itself."
        fr:
          gold: "Il prévoit les\nattaques futures\net lance TELEPORT\fpour se mettre à\nl’abri et éviter\nle combat."
          silver: "En utilisant\nTELEPORT d’une\nfaçon aléatoire,\fil donne l’impres-\nsion d’avoir des\ndoubles."
        it:
          gold: "Avverte gli attac-\nchi imminenti e si\nTELETRASPORTA in\fsalvo prima che\nl’attacco lo possa\ncolpire."
          silver: "Se inizia ad usare\nTELETRASPORTO a\ncaso, si ha\fl’illusione che\nabbia creato copie\ndi se stesso."
        de:
          gold: "Es sieht die At-\ntacken der Gegner\nvoraus und setzt\fTELEPORT ein, um\nsich in Sicher-\nheit zu bringen."
          silver: "Durch den zufäl-\nligen Einsatz von\nTELEPORT entsteht\fder Eindruck, es\ngeneriere Abbilder\nvon sich."
        es:
          gold: "Siente los ataques\ninminentes y se\nTELETRANSPORTA a\fun lugar seguro,\nantes de que éstos\npuedan darle."
          silver: "Si decide\nTELETRANSPORTARSE\nal azar, darà la\fimpresión de haber\ncreado copias\nde sí mismo."
        ko:
          gold: "상대의 공격방향을 읽어서\n덤벼들기 직전에 \n순간이동으로 그 장소를 떠난다"
          silver: "제멋대로 순간이동을\n반복하고 있으면 마치\n분신술을 펼치고 있는 듯 보인다"
kadabra:
  species_id: 64
  names:
    jp_kana: ユンゲラー
    en: KADABRA
    fr: KADABRA
    it: KADABRA
    de: KADABRA
    es: KADABRA
    ko: 윤겔라
  forms:
    kadabra:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 30
        special_attack: 120
        special_defense: 70
        speed: 105
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "つよい　せいしんりょくの　もちぬし。\nピンチに　なれば　なるほど\nのうりょくが　たかまっていく。"
          silver: "のうりょくを　つかうたびに\nからだから　とくしゅな　アルファはを\nだして　きかいをくるわせる。"
        en:
          gold: "It possesses\nstrong spiritual\npower. The more\fdanger it faces,\nthe stronger its\npsychic power."
          silver: "If it uses its\nabilities, it\nemits special\falpha waves that\ncause machines to\nmalfunction."
        fr:
          gold: "Il est doté de\npuissants pouvoirs\nPSY qui s’adaptent\fà la force des\nennemis qu’il\nrencontre."
          silver: "En utilisant ses\npouvoirs, il émet\ndes ondes alpha\fet cause des dis-\ntortions élec-\ntroniques."
        it:
          gold: "Possiede un forte\npotere psicolo-\ngico. La sua forza\fpsichica aumenta\nquando si trova in\npericolo."
          silver: "Usando le sue\nabilità emette\nspeciali onde\falfa che causano\nmalfunzionamenti\nnei macchinari."
        de:
          gold: "Es verfügt über\nstarke Psi-Kräfte.\nJe größer die Ge-\ffahr, desto stär-\nker werden seine\nPsi-Kräfte."
          silver: "Setzt es seine\nKräfte ein, sendet\nes Alphawellen\faus, die einen De-\nfekt bei Maschinen\nerzeugen können."
        es:
          gold: "Es muy fuerte\nespiritualmente.\nCuanto mayor sea\fel peligro,\nmayor serà su\npoder psíquico."
          silver: "Si usa sus\nhabilidades,\nemite ondas alfa\fespeciales que\nhacen que las\nmàquinas fallen."
        ko:
          gold: "강한 정신력의 소유자로\n궁지에 몰리면 몰릴수록\n능력이 높아져간다"
          silver: "능력을 사용할 때마다\n몸에서부터 특수한 알파파를\n발산해서 기계를 고장낸다"
alakazam:
  species_id: 65
  names:
    jp_kana: フーディン
    en: ALAKAZAM
    fr: ALAKAZAM
    it: ALAKAZAM
    de: SIMSALA
    es: ALAKAZAM
    ko: 후딘
  forms:
    alakazam:
      form_id: 0
      base_stats:
        hp: 55
        attack: 50
        defense: 45
        special_attack: 135
        special_defense: 85
        speed: 120
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "りょうめを　とじると　ぜんしんの\nかんかくが　いっそう　とぎすまされ\nさいこうの　のうりょくが　だせる。"
          silver: "のうさいぼうは　いつも　ぶんれつして\nしぬまで　ふえつづけるので\nあらゆることを　おぼえておける。"
        en:
          gold: "Closing both its\neyes heightens all\nits other senses.\fThis enables it to\nuse its abilities\nto their extremes."
          silver: "Its brain cells\nmultiply continu-\nally until it\fdies. As a result,\nit remembers\neverything."
        fr:
          gold: "En fermant ses\nyeux il aiguise\nses autres sens,\fce qui lui permet\nd’augmenter ses\npouvoirs."
          silver: "Ses cellules\ncérébrales se mul-\ntiplient jusqu’à\fsa mort. Il se\nsouvient donc de\ntout."
        it:
          gold: "Se chiude gli\nocchi potenzia\ngli altri sensi.\fCosì può sfruttare\nal meglio le sue\ncapacità."
          silver: "Le cellule cere-\nbrali si\nmoltiplicano di\fcontinuo. Perciò\nricorda qualsiasi\ncosa."
        de:
          gold: "Schließt es die\nAugen, schärfen\nsich seine anderen\fSinne. Dadurch\nperfektioniert es\nseine Fähigkeiten."
          silver: "Seine Gehirnzellen\nvervielfachen sich\nsein ganzes Leben\flang. Daher kann\nes sich immer an\nalles erinnern."
        es:
          gold: "Cerrando sus ojos\naumenta sus demàs\nsentidos. Esto le\fpermite usar\nsus habilidades\nal màximo."
          silver: "Sus neuronas se\nmultiplican\ncontinuamente\fdurante su vida.\nPor eso, siempre\nlo recuerda todo."
        ko:
          gold: "양쪽 눈을 감으면 전신의\n감각이 한층 더 높아져서\n최상의 능력을 발휘한다"
          silver: "뇌세포는 항상 분열해서\n죽을 때까지 늘어나기 때문에\n모든 것을 기억해 놓을 수 있다"
machop:
  species_id: 66
  names:
    jp_kana: ワンリキー
    en: MACHOP
    fr: MACHOC
    it: MACHOP
    de: MACHOLLO
    es: MACHOP
    ko: 알통몬
  forms:
    machop:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 50
        special_attack: 35
        special_defense: 35
        speed: 35
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "いつも　パワフル。たいりょくが\nありあまっているので　ひまつぶしに\nいわをもちあげ　さらに　つよくなる。"
          silver: "からだを　きたえるのが　だいすき。\nいちにちじゅう　しゅぎょう　しても\nぜんぜん　まだ　ものたりない。"
        en:
          gold: "Always brimming\nwith power, it\npasses time by\flifting boulders.\nDoing so makes it\neven stronger."
          silver: "It loves to work\nout and build its\nmuscles. It is\fnever satisfied,\neven if it trains\nhard all day long."
        fr:
          gold: "Toujours en train\nde s’entraîner, il\npasse son temps à\fsoulever des poids\npour devenir plus\npuissant."
          silver: "Il aime faire de\nla musculation.\nConstamment in-\fsatisfait, il s’\nentraîne toute\nla journée."
        it:
          gold: "Sempre traboccante\ndi energia, passa\nil tempo a\fsollevare massi.\nCosì diventa\nancora più forte."
          silver: "Gli piace svilup-\npare i muscoli.\nNon è soddisfatto\fneppure dopo\nessersi allenato\ntutto il giorno."
        de:
          gold: "Da es vor Kraft\nstrotzt, hebt es\nzum Zeitvertreib\fFelsen. Dadurch\ngewinnt es an zu-\nsätzlicher Stärke."
          silver: "Es liebt das Mus-\nkelaufbautraining.\nEs ist nie zufrie-\ffrieden, selbst\nwenn es den ganzen\nTag trainierte."
        es:
          gold: "Siempre rebosante\nde fuerza, pasa el\ntiempo levantando\fpiedras. Esto\nle lleva a ser\naùn màs fuerte."
          silver: "Adora ejercitar\nsus mùsculos.\nNunca està\fcontento, aunque\nlleve todo el día\nentrenando."
        ko:
          gold: "항상 강력한 체력을\n유지하기 위해서 심심풀이로\n바위를 들어올려 힘을 기른다"
          silver: "체력단련을 제일 좋아한다\n하루종일 수행을 해도\n전혀 지치지 않는다"
machoke:
  species_id: 67
  names:
    jp_kana: ゴーリキー
    en: MACHOKE
    fr: MACHOPEUR
    it: MACHOKE
    de: MASCHOCK
    es: MACHOKE
    ko: 근육몬
  forms:
    machoke:
      form_id: 0
      base_stats:
        hp: 80
        attack: 100
        defense: 70
        special_attack: 50
        special_defense: 60
        speed: 45
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "どんなときでも　ぜんりょくで\nこうどう　するが　つかれたりしない\nタフで　じょうぶな　ポケモン。"
          silver: "ぜんしんの　きんにくに　ちからが\nみなぎっている。じっと　していても\nすごい　いあつかんを　だしている。"
        en:
          gold: "It always goes at\nits full power,\nbut this very\ftough and durable\nPOKéMON never gets\ntired."
          silver: "The muscles cover-\ning its body teem\nwith power. Even\fwhen still, it\nexudes an amazing\nsense of strength."
        fr:
          gold: "Il se donne tou-\njours à fond, mais\nce POKéMON ne se\ffatigue jamais. Il\nest très résistant\nà l’effort."
          silver: "Tous les muscles\nde son corps\nregorgent de\fpuissance. Il\ndégage une aura\npuissante."
        it:
          gold: "Utilizza sempre il\nmassimo della sua\nenergia, ma questo\fPOKéMON potente\ne resistente non\nsi stanca mai."
          silver: "I muscoli del suo\ncorpo traboccano\ndi forza. Anche\fda fermo trasmette\nun incredibile\nsenso di potenza."
        de:
          gold: "Es kämpft immer\nmit all seiner\nKraft. Dieses\fPOKéMON hat eine\nenorme Kondition\nund wird nie müde."
          silver: "Sein muskulöser\nKörper strotzt vor\nKraft. Sein Körper\fstrahlt auch im\nRuhezustand pure\nKraft aus."
        es:
          gold: "Siempre va a\nmàxima potencia,\npero este fuerte\fy resistente\nPOKéMON no se\ncansa nunca."
          silver: "Los mùsculos que\ncubren su cuerpo\nirradian poder.\fAun inmóvil,\nrezuma una\nfuerza increíble."
        ko:
          gold: "어떠한 상황에서든 전력으로\n행동하지만 지치거나 하지 않는다\n터프하고 튼튼한 포켓몬이다"
          silver: "전신 근육의 힘이\n가득 넘친다  가만히 있어도\n엄청난 압박감을 느끼게 한다"
machamp:
  species_id: 68
  names:
    jp_kana: カイリキー
    en: MACHAMP
    fr: MACKOGNEUR
    it: MACHAMP
    de: MACHOMEI
    es: MACHAMP
    ko: 괴력몬
  forms:
    machamp:
      form_id: 0
      base_stats:
        hp: 90
        attack: 130
        defense: 80
        special_attack: 65
        special_defense: 85
        speed: 55
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "４ほんのうでを　すばやく　うごかし\nあらゆる　かくどから　やすむことなく\nパンチや　チョップを　たたきこむ。"
          silver: "４ほんのうでで　あいての　てあしを\nおさえこみ　じゆうを　うばうと\nちへいせんのむこうまで　なげとばす。"
        en:
          gold: "It quickly swings\nits four arms to\nrock its opponents\fwith ceaseless\npunches and chops\nfrom all angles."
          silver: "It uses its four\npowerful arms to\npin the limbs of\fits foe, then\nthrows the victim\nover the horizon."
        fr:
          gold: "Il balance ses\nquatre bras avec\nviolence pour\fbroyer son adver-\nsaire sous une\npluie de coups."
          silver: "Il se sert de ses\nquatre bras pour\nenserrer les\fmembres de sa vic-\ntime puis il la\nprojette au loin."
        it:
          gold: "Agita velocemente\nle quattro braccia\nscuotendo gli\favversari con\npugni e colpi da\nogni direzione."
          silver: "Con le sue quattro\npotenti braccia\nafferra gli arti\fdel nemico, per\npoi lanciarlo\nlontano."
        de:
          gold: "Es benutzt seine\nvier Arme, um\nseine Gegner mit\fSchlägen aus\nallen Winkeln\neinzudecken."
          silver: "Es setzt seine\nvier Arme ein, um\ndie Glieder seiner\fGegner festzuhal-\nten. Dann wirft es\nsie hinfort."
        es:
          gold: "Mueve ràpidamente\nsus cuatro brazos\npara golpear con\fincesantes golpes\ny puñetazos desde\ntodos los àngulos."
          silver: "Usa sus cuatro\npoderosos brazos\npara agarrar\fa su enemigo y\nlanzarlo lo màs\nlejos posible."
        ko:
          gold: "4개의 팔을 재빠르게 움직여서\n모든 각도에서 쉬지않고\n펀치와 당수를 날려온다"
          silver: "4개의 팔로 상대방의 손발을\n붙잡아 꼼짝 못하게 만들고\n지평선 멀리까지 던져버린다"
bellsprout:
  species_id: 69
  names:
    jp_kana: マダツボミ
    en: BELLSPROUT
    fr: CHETIFLOR
    it: BELLSPROUT
    de: KNOFENSA
    es: BELLSPROUT
    ko: 모다피
  forms:
    bellsprout:
      form_id: 0
      base_stats:
        hp: 50
        attack: 75
        defense: 35
        special_attack: 70
        special_defense: 30
        speed: 40
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "ひょろっとした　からだつき　だが\nえものを　とらえるときの　うごきは\nめにも　とまらないほど　すばやい。"
          silver: "あしを　じめんふかくまで　のばして\nすいぶんを　ほきゅうする。そのとき\nおそわれると　にげだせない。"
        en:
          gold: "Even though its\nbody is extremely\nskinny, it is\fblindingly fast\nwhen catching its\nprey."
          silver: "It plants its feet\ndeep underground\nto replenish wa-\fter. It can’t es-\ncape its enemy\nwhile it’s rooted."
        fr:
          gold: "Même si son corps\nest très frêle, il\nest extrêmement\frapide quand il\nattaque ses\nadversaires."
          silver: "Il enracine\nprofondément ses\npieds pour puiser\fde l’eau. Il ne\npeut pas fuir dans\ncette position."
        it:
          gold: "Sebbene abbia un\ncorpo magrissimo,\nsa essere molto\frapido quando\nsi scaglia sulla\npreda."
          silver: "Penetra il terreno\ncon le zampe per\nrifornirsi\fd’acqua. Durante\nquest’azione non\npuò difendersi."
        de:
          gold: "Obwohl sein\nKörper sehr schmal\nist, schnappt es\fblitzschnell\nnach Beute."
          silver: "Es bohrt seine\nFüße tief in die\nErde, um Wasser\faufzunehmen. Dann\nkann es nicht vor\nFeinden fliehen."
        es:
          gold: "Aunque su cuerpo\nes extremadamente\ndelgado, es muy\fràpido a la hora\nde capturar a\nsus presas."
          silver: "Planta sus patas\nbajo tierra para\nabsorber agua.\fNo puede escapar\nde su enemigo si\nestà arraigado."
        ko:
          gold: "가늘고 긴 몸을 가졌지만\n먹이를 잡을 때의 움직임은\n눈에 보이지 않을 정도로 빠르다"
          silver: "다리를 지면 깊이 뻗어서\n수분을 보충한다  그때\n공격을 받으면 도망치지 못한다"
weepinbell:
  species_id: 70
  names:
    jp_kana: ウツドン
    en: WEEPINBELL
    fr: BOUSTIFLOR
    it: WEEPINBELL
    de: ULTRIGARIA
    es: WEEPINBELL
    ko: 우츠동
  forms:
    weepinbell:
      form_id: 0
      base_stats:
        hp: 65
        attack: 90
        defense: 50
        special_attack: 85
        special_defense: 45
        speed: 55
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "ようかいえきの　ききめを　なくす\nえきたいも　ぶんぴつ　しているので\nじぶんは　とけたり　しないのだ。"
          silver: "くちよりも　おおきな　えものは\nきれあじ　するどい　ハッパで\nきざんで　のこさず　たべるのだ。"
        en:
          gold: "Even though it is\nfilled with ACID,\nit does not melt\fbecause it also\noozes a neutral-\nizing fluid."
          silver: "If its prey is\nbigger than its\nmouth, it slices\fup the victim with\nsharp leaves, then\neats every morsel."
        fr:
          gold: "Il sécrète de\nl’ACIDE mais il ne\nse consume pas car\fil produit aussi\nun élément qui le\nneutralise."
          silver: "Si sa proie est\nplus grande que sa\nbouche, il la\fdécoupe avec ses\nfeuilles acérées\npuis la dévore."
        it:
          gold: "Sebbene sia pieno\ndi ACIDO, riesce\na non sciogliersi\fperché emette\nun liquido\nneutralizzante."
          silver: "Se la preda è più\ngrande della sua\nbocca, la fa a\fpezzi con foglie\naffilate prima di\nmangiarla."
        de:
          gold: "Obwohl es mit\nSÄURE angefüllt\nist, verätzt es\fsich nicht, da es\ngegen SÄURE\nresistent ist."
          silver: "Wenn die Beute\nnicht in sein\nMaul passt, zer-\fstückelt es sie\nund frisst jeden\nKrümel."
        es:
          gold: "Aunque està lleno\nde ÁCIDO, no llega\na derretirse\fporque también\nrezuma fluidos\nneutralizantes."
          silver: "Si su presa no le\ncabe en la boca,\nla corta con\fhojas afiladas,\nfacilitando\nsu digestión."
        ko:
          gold: "용해액의 효능을 없애는\n액체도 분비하고 있기 때문에\n자신은 용해액의 해를 입지 않는다"
          silver: "입보다도 큰 먹이는\n잘 드는 날카로운 잎사귀로 잘라\n남김없이 먹어치운다"
victreebel:
  species_id: 71
  names:
    jp_kana: ウツボット
    en: VICTREEBEL
    fr: EMPIFLOR
    it: VICTREEBEL
    de: SARZENIA
    es: VICTREEBEL
    ko: 우츠보트
  forms:
    victreebel:
      form_id: 0
      base_stats:
        hp: 80
        attack: 105
        defense: 65
        special_attack: 100
        special_defense: 60
        speed: 70
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "たくさんの　エサを　とかした\nようかいえきは　あまさが　まして\nもっと　エサを　あつめやすくなる。"
          silver: "ミツのにおいに　むらがった　もの\nすべて　くちのなかで　とかしてしまう\nきょうぼうな　しょくぶつポケモン。"
        en:
          gold: "ACID that has dis-\nsolved many prey\nbecomes sweeter,\fmaking it even\nmore effective at\nattracting prey."
          silver: "This horrifying\nplant POKéMON at-\ntracts prey with\faromatic honey,\nthen melts them in\nits mouth."
        fr:
          gold: "Son ACIDE devient\navec le temps plus\ndoux, ce qui le\frend plus at-\ntractif pour son\ngibier."
          silver: "Ce terrible POKé-\nMON des plantes\nattire ses proies\favec un miel\nonctueux puis les\navale tout rond."
        it:
          gold: "L’ACIDO si fa più\ndolce dopo avervi\ndissolto molte\fprede. Così attrae\nnuove prede ancora\npiù facilmente."
          silver: "Questo spaventoso\nPOKéMON simile ad\nuna pianta attrae\fla preda con miele\nprofumato e se la\nscioglie in bocca."
        de:
          gold: "SÄURE, in der be-\nreits viele Insek-\nten aufgelöst wur-\fden, ist süßer\nund effektiver\nbeim Beutefang."
          silver: "Dieses grausame\nPflanzen-POKéMON\nködert Beute mit\fHonigaroma und\nzersetzt sie\nin seinem Maul."
        es:
          gold: "El ÁCIDO con que\ndisuelve a muchas\npresas se endulza,\fhaciéndolo hasta\nmàs efectivo para\natraer a su presa."
          silver: "Este terrorífico\nPOKéMON planta\natrae a su presa\fcon miel aromàtica\npara derretirla\nluego en su boca."
        ko:
          gold: "많은 먹이를 녹인\n용해액은 단맛이 많이 나서\n더욱 먹이를 모으기 쉽게된다"
          silver: "꿀냄새를 맡고 모여든 먹이\n전부를 입안에서 녹여버리는\n난폭한 식물포켓몬"
tentacool:
  species_id: 72
  names:
    jp_kana: メノクラゲ
    en: TENTACOOL
    fr: TENTACOOL
    it: TENTACOOL
    de: TENTACHA
    es: TENTACOOL
    ko: 왕눈해
  forms:
    tentacool:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 35
        special_attack: 50
        special_defense: 100
        speed: 70
      types:
        - water
        - poison
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          gold: "しおが　ひくと　すなはまに\nのこされて　ひからびた\nメノクラゲを　みることが　できる。"
          silver: "みなもを　あてもなく　ただよう。\nみずのなかでは　すがたが　みえにくく\nさされるまで　きづかないこともある。"
        en:
          gold: "When the tide goes\nout, dehydrated\nTENTACOOL remains\fcan be found\nwashed up on the\nshore."
          silver: "It drifts aimless-\nly in waves. Very\ndifficult to see\fin water, it may\nnot be noticed\nuntil it stings."
        fr:
          gold: "Quand la marée\ndescend, il est\nassez fréquent de\fretrouver des\nTENTACOOL échoués\nsur le sable."
          silver: "Il se laisse\nporter par le\ncourant. Il est\fdifficile à voir\njusqu’à ce qu’il\npique."
        it:
          gold: "Con la bassa marea\nsi possono \ntrovare resti\fdisidratati di \nTENTACOOL sul\nbagnasciuga."
          silver: "Si lascia traspor-\ntare dalle onde.\nDifficilmente\fvisibile in acqua,\nsi fa notare solo\nquando punge."
        de:
          gold: "Bei Ebbe kann man\ndie Überreste\nvon TENTACHA fin-\fden, die an den\nStrand gespült\nwurden."
          silver: "Es treibt ziellos\nim Wasser. Es ist\nschwer zu erkennen\fund wird erst be-\nmerkt, wenn es zu-\nsticht."
        es:
          gold: "Cuando baja la\nmarea, podrían\naparecer restos\fdeshidratados de\nTENTACOOL junto\na la orilla."
          silver: "Nada sin rumbo\npor las olas. Es\ndifícil de ver en\fel agua. A veces\nno se le ve\nhasta que pica."
        ko:
          gold: "바닷물이 빠지면 모래변에\n남겨져 바싹 마른\n왕눈해를 볼 수가 있다"
          silver: "파도위를 정처없이 떠다닌다\n물속에서는 모습을 보기 어려워\n찔릴 때까지 느끼지 못하기도 한다"
tentacruel:
  species_id: 73
  names:
    jp_kana: ドククラゲ
    en: TENTACRUEL
    fr: TENTACRUEL
    it: TENTACRUEL
    de: TENTOXA
    es: TENTACRUEL
    ko: 독파리
  forms:
    tentacruel:
      form_id: 0
      base_stats:
        hp: 80
        attack: 70
        defense: 65
        special_attack: 80
        special_defense: 120
        speed: 100
      types:
        - water
        - poison
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          gold: "８０ぽんもの　たくさんの\nしょくしゅは　すいぶんを　ふくんで\nどこまでも　のびて　からみつく。"
          silver: "たたかいのとき　８０ぽんの\nしょくしゅを　すべて　のばして\nどくの　ほういもうを　つくりあげる。"
        en:
          gold: "Its 80 tentacles\nabsorb water and\nstretch almost\fendlessly to CON-\nSTRICT its prey\nand enemies."
          silver: "In battle, it\nextends all 80 of\nits tentacles to\fentrap its oppo-\nnent inside a\npoisonous net."
        fr:
          gold: "Ses 80 tentacules\nabsorbent de l’eau\net s’étirent sans\ffin pour enserrer\net capturer ses\nadversaires."
          silver: "En combat, il se\nsert de ses 80\ntentacules pour\femprisonner son\nadversaire dans un\nfilet vénéneux."
        it:
          gold: "Ha 80 tentacoli\nche assorbono\nl’acqua e\fsi distendono per\nsoffocare la preda\n(LIMITAZIONE)."
          silver: "Nella lotta\nestende gli 80\ntentacoli per\fintrappolare il\nnemico in una rete\nvelenosa."
        de:
          gold: "Seine 80 Tentakel\nabsorbieren das\nWasser und sind\fsehr dehnbar,\num Beute und Fein-\nde zu UMKLAMMERN."
          silver: "Im Kampf bilden\nseine 80 Tentakel\nein Giftnetz, in\fdem es seine Geg-\nner fängt und sie\nvergiftet."
        es:
          gold: "Sus 80 tentàculos\nabsorben agua y\nse alargan para\fOPRIMIR la\nrespiración de sus\npresas y enemigos."
          silver: "En la batalla,\nextiende sus 80\ntentàculos para\fatrapar al enemigo\nen una red\nvenenosa."
        ko:
          gold: "80개가 넘는 많은\n촉수는 수분을 머금어서\n어디까지든 늘여서 휘감을 수 있다"
          silver: "싸울 때 80개의\n촉수를 전부 뻗어서\n독의 포위망을 펼친다"
geodude:
  species_id: 74
  names:
    jp_kana: イシツブテ
    en: GEODUDE
    fr: RACAILLOU
    it: GEODUDE
    de: KLEINSTEIN
    es: GEODUDE
    ko: 꼬마돌
  forms:
    geodude:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 100
        special_attack: 30
        special_defense: 30
        speed: 20
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          gold: "おおくの　ひとは　きづかないだけ。\nあたりを　よく　みてみれば\nイシツブテは　たくさん　いる。"
          silver: "りょうてを　つかい　どんな　けわしい\nやまみちも　どんどん　のぼっていく。\nおこると　げんこつを　ふりまわす。"
        en:
          gold: "Most people may\nnot notice, but\na closer look\fshould reveal that\nthere are many\nGEODUDE around."
          silver: "It uses its arms\nto steadily climb\nsteep mountain\fpaths. It swings\nits fists around\nif angered."
        fr:
          gold: "On ne les remarque\ngénéralement pas,\nmais nous sommes\fen fait entourés\npar des colonies\nde RACAILLOU."
          silver: "Il se sert de ses\nbras pour es-\ncalader. En\fcolère, il\nvirevolte avec\nses poings."
        it:
          gold: "Possono passare\ninosservati, ma se\nsi guarda con\fattenzione si\npossono notare\nparecchi GEODUDE."
          silver: "Scala di continuo\nripide montagne\ncon le braccia.\fSe è arrabbiato\ninizia ad agitare\ni pugni."
        de:
          gold: "Viele Leute wissen\ndas nicht, aber\nbei näherer Be-\ftrachtung erkennt\nman, dass es viele\nKLEINSTEINS gibt."
          silver: "Es setzt seine Ar-\nme ein, um steile\nBerge zu erklim-\fmen. Ist es ver-\närgert, wirbelt es\nmit den Fäusten."
        es:
          gold: "Puede que mucha\ngente no se dé\ncuenta, pero si lo\fmiras de cerca,\ndescubriràs muchos\nGEODUDE alrededor."
          silver: "Usa sus brazos\npara escalar\nmontañas\fescarpadas. Si se\nenfada, balancea\nsus puños."
        ko:
          gold: "많은 사람들이 알아차리지 못할뿐\n주변 근처를 잘 살펴본다면\n꼬마돌이 많이 있다"
          silver: "양손을 사용하여 아무리 험난한\n산길이라도 헤쳐 올라간다\n화가나면 주먹을 휘두른다"
graveler:
  species_id: 75
  names:
    jp_kana: ゴローン
    en: GRAVELER
    fr: GRAVALANCH
    it: GRAVELER
    de: GEOROK
    es: GRAVELER
    ko: 데구리
  forms:
    graveler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 95
        defense: 115
        special_attack: 45
        special_defense: 45
        speed: 35
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          gold: "やまから　ころがり　おちるとき\nからだの　あちこちが　とれても\nきにしない　ごうかいな　せいかく。"
          silver: "あるいても　おそいので\nころがって　いどう。とちゅうに\nなにがあっても　きにしない。"
        en:
          gold: "With a free and\nuncaring nature,\nit doesn’t mind if\fpieces break off\nwhile it rolls\ndown mountains."
          silver: "A slow walker, it\nrolls to move. It\npays no attention\fto any object that\nhappens to be in\nits path."
        fr:
          gold: "D’une nature témé-\nraire, il se moque\nde perdre des\fparties de son\ncorps quand il dé-\nvale les pentes."
          silver: "Plutôt lent, il\nse déplace en\nroulant sans\fprêter attention à\nce qu’il y a sur\nsa route."
        it:
          gold: "Di natura libera e\nincurante, non\nsi preoccupa se\fperde dei pezzi\nmentre si rotola\ngiù dai monti."
          silver: "Lento a camminare,\nsi sposta rotolan-\ndo. Non fa\fattenzione agli\noggetti che trova\nsulla sua strada."
        de:
          gold: "Es ist ihm völlig\ngleichgültig,\nwenn Stücke aus\fihm herausbrechen,\nwährend es Berge\nhinabrollt."
          silver: "Da es nur langsam\ngehen kann, bewegt\nes sich rollend.\fEs nimmt keine\nRücksicht auf\nHindernisse."
        es:
          gold: "De naturaleza\ndescuidada y\nlibre, no le\fimporta dañarse\ncuando baja\nrodando montañas."
          silver: "Rueda lentamente\npara moverse. No\npresta atención\fa ningùn objeto\nque se cruce\nen su camino."
        ko:
          gold: "산에서 굴러 떨어질 때\n몸의 여기저기가 떨어져나가도\n신경쓰지 않는 호쾌한 성격이다"
          silver: "걸음이 늦기 때문에\n굴러서 이동한다  도중에\n어떤 일이 있어도 신경쓰지 않는다"
golem:
  species_id: 76
  names:
    jp_kana: ゴローニャ
    en: GOLEM
    fr: GROLEM
    it: GOLEM
    de: GEOWAZ
    es: GOLEM
    ko: 딱구리
  forms:
    golem:
      form_id: 0
      base_stats:
        hp: 80
        attack: 110
        defense: 130
        special_attack: 55
        special_defense: 65
        speed: 45
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          gold: "１ねんに　１ど　だっぴをする。\nぬぎすてたカラは　すぐに　かたまって\nぼろぼろに　くだけちる。"
          silver: "わざと　からだを　ばくはつさせ\nその　いきおいを　りようして\nやまから　やまへと　とんでいく。"
        en:
          gold: "It sheds its skin\nonce a year. The\ndiscarded shell\fimmediately hard-\nens and crumbles\naway."
          silver: "It is capable of\nblowing itself up.\nIt uses this\fexplosive force to\njump from mountain\nto mountain."
        fr:
          gold: "Il change de peau\nune fois par an.\nSa vieille armure\fse durcit alors\net tombe en\npoussière."
          silver: "Capable de se\nfaire exploser, il\nse sert de ce\fpouvoir pour\nsauter de montagne\nen montagne."
        it:
          gold: "Cambia pelle una\nvolta all’anno.\nIl vecchio guscio\fsubito si\nindurisce e\nsi sgretola."
          silver: "Ha la capacità di\nesplodere. Se usa\nla sua forza\fesplosiva può\nsaltare da un\nmonte all’altro."
        de:
          gold: "Es häutet sich\neinmal im Jahr.\nDie abgestreifte\fHaut wird sofort\nhart und bröckelt\nab."
          silver: "Es kann sich in\ndie Luft sprengen.\nEs setzt diese\fExplosionen ein,\num von Berg zu\nBerg zu springen."
        es:
          gold: "Muda su piel una\nvez al año. La\nconcha desechada\fse endurece de\ninmediato y se\ndesmorona."
          silver: "Es capaz de\ninflarse a sí\nmismo. Usa esta\ffuerza explosiva\npara saltar de\nmontaña a montaña."
        ko:
          gold: "1년에 한번 탈피를 한다\n탈피하고 남은 껍질은 바로 굳어\n금이가서 깨져 떨어진다"
          silver: "고의로 몸을 폭발시켜\n그 기세를 이용하여\n산에서 산으로 날아서 이동한다"
ponyta:
  species_id: 77
  names:
    jp_kana: ポニータ
    en: PONYTA
    fr: PONYTA
    it: PONYTA
    de: PONITA
    es: PONYTA
    ko: 포니타
  forms:
    ponyta:
      form_id: 0
      base_stats:
        hp: 50
        attack: 85
        defense: 55
        special_attack: 65
        special_defense: 65
        speed: 90
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "うまれて　すぐは　はしるのがへた。\nおやを　おいかけるうちに　どんどん\nはやく　はしれるようになるのだ。"
          silver: "はいごに　けはいを　かんじると\nダイヤモンドより　かたい　ひづめの\nうしろあしで　けりあげてしまう。"
        en:
          gold: "It is a weak run-\nner immediately\nafter birth. It\fgradually becomes\nfaster by chasing\nafter its parents."
          silver: "Its hind legs,\nwhich have hard-\ner-than-diamond\fhooves, kick back\nat any presence it\nsenses behind it."
        fr:
          gold: "A la naissance il\nne court pas très\nvite. Il devient\fde plus en plus\nrapide en courant\naprès ses parents."
          silver: "Ses pattes arriè-\nres ont des sabots\nplus solides que\fle diamant. Il rue\ndès qu’il sent une\nprésence."
        it:
          gold: "Appena nato non è\nun buon corridore.\nImpara a correre\fsempre più veloce\nrincorrendo i\nsuoi genitori."
          silver: "I suoi arti poste-\nriori hanno zoc-\ncoli più duri del\fdiamante. Se sente\nqualcuno dietro di\nsé, scalcia."
        de:
          gold: "Nach der Geburt\nist es noch lang-\nsam, aber es wird\fbald schneller, da\nes seinen Eltern\nnachrennt."
          silver: "Es schlägt mit\nseinen Hinterläu-\nfen, die härter\fals Diamant sind\naus, wenn es etwas\nhinter sich spürt."
        es:
          gold: "Al nacer es un\npoco lento, pero\npoco a poco se\fvuelve màs ràpido\npara poder seguir\na sus padres."
          silver: "Sus patas traseras\ntienen pezuñas\ntan duras como el\fdiamante, con las\nque da coces a\nquien està detràs."
        ko:
          gold: "태어나서 바로는 잘 달리지 못한다\n어미를 따라다니면서 점점\n빨리 달릴 수 있도록 된다"
          silver: "배후에서 이상한 기미를 느끼면\n뒷다리의 다이아몬드보다 단단한\n발굽으로 걷어차 버린다"
rapidash:
