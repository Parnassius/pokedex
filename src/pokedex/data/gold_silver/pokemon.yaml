          silver: "Usually docile,\nbut if disturbed\nwhile sipping\fhoney, it chases\noff the intruder\nwith its horn."
        fr:
          gold: "Ce POKéMON puis-\nsant attaque avec\nses cornes sous le\fventre de ses en-\nnemis pour les\nsoulever ensuite."
          silver: "Le plus souvent\ndocile, il chasse\nles intrus avec\fsa corne s’il est\nattaqué quand il\nmange du miel."
        it:
          gold: "Questo potente\nPOKéMON infilza\ncon il corno la\fpancia del nemico,\nsollevandolo e\ntirandolo lontano."
          silver: "È pacifico, ma se\nlo si disturba\nmentre gusta il\fmiele scaccia\nl’intruso con il\nsuo corno."
        de:
          gold: "Dieses kräftige\nPOKéMON rammt\nsein prämiertes\fHorn unter den\nRumpf des Gegners\nund wirft ihn um."
          silver: "Es ist ruhig. Wird\nes aber beim\nHonignaschen ge-\fstört, verjagt es\nden Störenfried\nmit seinem Horn."
        es:
          gold: "Este fuerte\nPOKéMON clava su\npreciado cuerno\fen la tripa del\nenemigo, lo eleva\ny luego lo arroja."
          silver: "Suele ser dócil,\npero si se le\nmolesta mientras\fsucciona miel,\nperseguirà con su\ncuerno al intruso."
        ko:
          gold: "자랑스런 뿔을 상대의 배\n밑에 비틀어 박고 한번에 들어올려\n집어던져 버리는 천하장사"
          silver: "보동은 매우 얌전하지만\n꿀을 먹을 때 방해하는 것은\n뿔을 사용해 쫓아 버린다"
sneasel:
  species_id: 215
