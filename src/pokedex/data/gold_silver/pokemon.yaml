wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    en: WOBBUFFET
    fr: QULBUTOKE
    it: WOBBUFFET
    de: WOINGENAU
    es: WOBBUFFET
    ko: 마자용
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      types:
        - psychic
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "ひかりや　ショックを　きらう。\nこうげきされると　からだが　ふくらみ\nはんげきが　きょうりょくに　なる。"
          silver: "まっくろな　シッポを　かくすため\nくらやみで　ひっそりと　いきている。\nじぶんからは　こうげき　しない。"
        en:
          gold: "It hates light and\nshock. If attack-\ned, it inflates\fits body to pump\nup its counter-\nstrike."
          silver: "To keep its pitch-\nblack tail hidden,\nit lives quietly\fin the darkness.\nIt is never first\nto attack."
        fr:
          gold: "Il déteste la\nlumière. S’il est\nattaqué, il se\fgonfle pour ripo-\nster avec plus de\nviolence."
          silver: "Pour cacher sa\nqueue noire, il\nvit discrètement\fdans l’obscurité.\nIl n’attaque\njamais le premier."
        it:
          gold: "Odia la luce e gli\nshock. Se è attac-\ncato, gonfia il\fcorpo per\npreparare il\ncontrattacco."
          silver: "Se ne sta sempre\ntranquillo al buio\nper nascondere la\fcoda nera come la\npece. Non attacca\nmai per primo."
        de:
          gold: "Es hasst Licht und\nSchläge. Wird es\nangegriffen, pumpt\fes sich auf, um\neinen Gegenschlag\nvorzubereiten."
          silver: "Es lebt in der\nDunkelheit, um\nseinen schwarzen\fSchwanz zu ver-\nstecken. Es greift\nnie zuerst an."
        es:
          gold: "Odia la luz y las\nsacudidas. Si le\natacan, infla su\fcuerpo para\naumentar su con-\ntraataque."
          silver: "Para mantener\noculta su negra\ncola, vive en\fsilencio en la\noscuridad. Nunca\nataca primero."
        ko:
          gold: "빛과 충격을 싫어함\n공격받으면 몸이 부풀어올라\n반격이 강력해진다"
          silver: "새까만 꼬리를 숨기기 위해\n어둠속에서 은밀히 지내고 있다\n먼저 공격하는 일은 없다"
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    en: GIRAFARIG
    fr: GIRAFARIG
    it: GIRAFARIG
    de: GIRAFARIG
    es: GIRAFARIG
    ko: 키링키
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      types:
        - normal
        - psychic
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "シッポにも　ちいさな　のうがある。\nちかよると　においに　はんのうして\nかみついて　くるので　ちゅうい。"
          silver: "シッポにも　ちいさな　のう　がある。\nにおいに　つられて　かってに\nシッポが　かみついてくることもある。"
        en:
          gold: "Its tail has a\nsmall brain of its\nown. Beware! If\fyou get close, it\nmay react to your\nscent and bite."
          silver: "Its tail, which\nalso contains a\nsmall brain, may\fbite on its own if\nit notices an\nalluring smell."
        fr:
          gold: "Sa queue possède\nun cerveau. Si\nvous vous en\fapprochez, il vous\nsentira et vous\nmordra."
          silver: "Sa queue qui\ncontient égale-\nment un petit\fcerveau, peut\nmordre\nd’elle-même."
        it:
          gold: "La coda possiede\nun cervello\nautonomo. Se\fci si avvicina può\nfiutare una pre-\nsenza e mordere."
          silver: "La coda, provvista\ndi un piccolo\ncervello, morde di\fpropria volontà se\navverte un profumo\nallettante."
        de:
          gold: "Sein Schwanz hat\nein eigenes Ge-\nhirn. Achtung!\fKommst du ihm zu\nnahe, kann es dich\nriechen und beißt."
          silver: "Sein Schwanz, der\nauch ein Gehirn\nhat, beißt manch-\fmal von alleine\nzu, wenn er einen\nDuft wahrnimmt."
        es:
          gold: "Su cola tiene un\npequeño cerebro.\n¡Cuidado!\fSi te acercas,\npuede reaccionar a\ntu olor y morder."
          silver: "Su cola, que\ntambién tiene un\npequeño cerebro,\fmuerde por su\ncuenta si nota un\nolor seductor."
        ko:
          gold: "꼬리에 작은 뇌가 있다\n가까이 가면 냄새에 반응해서\n물려고 오기때문에 주의가 필요하다"
          silver: "꼬리에도 작은 뇌가 있다\n냄새에 이끌려서 맘대로\n꼬리가 달려든 적도 있다"
pineco:
  species_id: 204
  names:
    jp_kana: クヌギダマ
    en: PINECO
    fr: POMDEPIK
    it: PINECO
    de: TANNZA
    es: PINECO
    ko: 피콘
  forms:
    pineco:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 90
        special_attack: 35
        special_defense: 35
        speed: 15
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "きの　かわを　かさねあわせて\nカラを　ぶあつくするのが　だいすき。\nおもくなっても　きにしない。"
          silver: "ぶらさがったまま　エサとなる\nムシが　とんでくるのを　まっている。\nじぶんじしんは　あまり　うごかない。"
        en:
          gold: "It likes to make\nits shell thicker\nby adding layers\fof tree bark. The\nadditional weight\ndoesn’t bother it."
          silver: "It hangs and waits\nfor flying insect\nprey to come near.\fIt does not move\nabout much on its\nown."
        fr:
          gold: "Il renforce sa\ncarapace en y\najoutant des\fécorces d’arbre.\nIl devient alors\nplus lourd."
          silver: "Il se suspend et\nattend qu’un in-\nsecte vole à pro-\fximité. Il ne\nbougera pas de\nlui-même."
        it:
          gold: "Inspessisce il\nguscio aggiungendo\nstrati di\fcorteccia. Non lo\nimpensierisce\nl’aumento di peso."
          silver: "Sta appeso atten-\ndendo di catturare\ngli insetti che\fsi avvicinano in\nvolo. Non ama\nmolto muoversi."
        de:
          gold: "Es fügt seiner\nSchale schichten-\nweise Baumrinde\fhinzu. Die zusätz-\nliche Belastung\nist ihm gleich."
          silver: "Es lauert vorbei-\nfliegender Beute\nauf, die in seine\fNähe kommt. Daher\nbewegt es sich nur\nsehr selten."
        es:
          gold: "Le gusta engrosar\nsu coraza\nañadiendo cortezas\fde àrbol. El\naumento de peso\nno le molesta."
          silver: "Se cuelga y espera\na los insectos\nque pasan cerca.\fNo suele moverse\nmucho por\nsu cuenta."
        ko:
          gold: "나무껍질을 짜맞춰서\n껍질을 두껍게 하는 것을 좋아한다\n무거워져도 걱정하지 않는다"
          silver: "매달려있는 채로 먹이가 되는\n벌레가 날아오는 것을 기다리고있다\n자기자신은 그다지 움직이지 않는다"
forretress:
  species_id: 205
  names:
    jp_kana: フォレトス
    en: FORRETRESS
    fr: FORETRESS
    it: FORRETRESS
    de: FORSTELLKA
    es: FORRETRESS
    ko: 쏘콘
  forms:
    forretress:
      form_id: 0
      base_stats:
        hp: 75
        attack: 90
        defense: 140
        special_attack: 60
        special_defense: 60
        speed: 40
      types:
        - bug
        - steel
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "こうてつのように　かたい　カラで\nぜんしんを　おおっている。\nなかの　しょうたいは　ふめい。"
          silver: "きに　くっついたまま　うごかない。\nかたいカラの　はへんを　ばらまいて\nちかづくものを　おいはらう。"
        en:
          gold: "Its entire body is\nshielded by a\nsteel-hard shell.\fWhat lurks inside\nthe armor is a\ntotal mystery."
          silver: "It remains immova-\nbly rooted to its\ntree. It scatters\fpieces of its hard\nshell to drive its\nenemies away."
        fr:
          gold: "Son corps est\nprotégé par une\nénorme carapace.\fCe qui se trouve\nsous cette armure\nest un mystère."
          silver: "Il est totalement\nfixé à son arbre.\nIl lance des\fmorceaux de sa ca-\nrapace pour faire\nfuir son ennemi."
        it:
          gold: "L’intero corpo è\nprotetto da un\nguscio duro come\facciaio. Nessuno\nsa cosa si trovi\nsotto l’armatura."
          silver: "Rimane saldamente\nattaccato al suo\nalbero. Tiene lon-\ftani i nemici\nlanciando pezzi\ndel duro guscio."
        de:
          gold: "Sein gesamter Kör-\nper steckt in ei-\nner stahlharten\fSchale. Sein In-\nneres bleibt ein\nGeheimnis."
          silver: "Es bleibt stets\nbei seinem Baum.\nEs verstreut Teile\fseiner Schale, um\nso seine Feinde\nzu verjagen."
        es:
          gold: "Todo su cuerpo\nestà protegido por\nuna coraza de\fmetal. Lo que\nesconde la coraza\nes un misterio."
          silver: "Permanece inmóvil\nagarrado a su\nàrbol. Dispara\ftrozos de su dura\ncoraza para alejar\nal enemigo."
        ko:
          gold: "강철 같은 단단한 껍질로\n전신을 둘러싸고 있다\n안의 정체는 불명"
          silver: "나무에 붙어있는 채로 안 움직인다\n단단한 껍질 파편을 흩뿌려서\n다가오는 무리들을 쫓아 버린다"
dunsparce:
  species_id: 206
  names:
    jp_kana: ノコッチ
    en: DUNSPARCE
    fr: INSOLOURDO
    it: DUNSPARCE
    de: DUMMISEL
    es: DUNSPARCE
    ko: 노고치
  forms:
    dunsparce:
      form_id: 0
      base_stats:
        hp: 100
        attack: 70
        defense: 70
        special_attack: 65
        special_defense: 65
        speed: 45
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "だれかに　みられると\nシッポで　じめんを　ほって\nうしろむきに　にげだすのだ。"
          silver: "だれかに　すがたを　みられると\nしっぽで　あなをほって　にげだす。\nハネで　すこしだけ　うかべる。"
        en:
          gold: "When spotted, this\nPOKéMON escapes\nbackward by furi-\fously boring into\nthe ground with\nits tail."
          silver: "If spotted, it es-\ncapes by burrowing\nwith its tail.\fIt can float just\nslightly using its\nwings."
        fr:
          gold: "Il s’enfuit en\ncreusant à recu-\nlons dans le sol\favec sa queue dès\nqu’un ennemi le\nrepère."
          silver: "S’il est repéré,\nil fuit en creu-\nsant avec sa\fqueue. Il peut\nléviter avec ses\nailes."
        it:
          gold: "Se lo si scopre,\nquesto POKéMON\nfugge all’indietro\fscavando furiosa-\nmente nel terreno\ncon la coda."
          silver: "Se lo scoprono,\nfugge scavando con\nla coda.\fLe ali non gli\npermettono che\npiccoli voli."
        de:
          gold: "Wird es entdeckt,\nflüchtet dieses\nPOKéMON, indem es\fsich mit seinem\nSchwanz in den\nBoden gräbt."
          silver: "Wird es entdeckt,\ngräbt es sich ins\nErdreich, um zu\ffliehen. Setzt es\nseine Flügel ein,\nkann es schweben."
        es:
          gold: "Este POKéMON\nescapa hacia\natràs perforando\fel suelo con\nsu cola, si es\ndescubierto."
          silver: "Si se siente\namenazado, escapa\ncavando con su\fcola. Puede flotar\nligeramente\nusando sus alas."
        ko:
          gold: "누군가에게 들키면\n꼬리로 땅을 파서\n뒤를 보이고 도망치기 시작한다"
          silver: "누군가에게 모습을 보이면\n꼬리로 구멍을 파서 도망친다\n날개로 약간은 공중에 뜰 수 있다"
gligar:
  species_id: 207
  names:
    jp_kana: グライガー
    en: GLIGAR
    fr: SCORPLANE
    it: GLIGAR
    de: SKORGLA
    es: GLIGAR
    ko: 글라이거
  forms:
    gligar:
      form_id: 0
      base_stats:
        hp: 65
        attack: 75
        defense: 105
        special_attack: 35
        special_defense: 65
        speed: 85
      types:
        - ground
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "がんめん　めがけて　とんでくる。\nはりつかれた　えものが　おどろく\nあいだに　どくバりを　さしこむ。"
          silver: "いつもは　がけに　はりついている。\nえものをみつけると　はねをひろげ\nかぜにのり　おそいかかってくる。"
        en:
          gold: "It flies straight\nat its target’s\nface then clamps\fdown on the star-\ntled victim to\ninject poison."
          silver: "It usually clings\nto cliffs. When it\nspots its prey, it\fspreads its wings\nand glides down to\nattack."
        fr:
          gold: "Il vole droit vers\nle visage de sa\ncible effrayée\fet s’y accroche\npour lui injecter\nson poison."
          silver: "Il s’accroche\nsouvent aux falai-\nses. Sa proie\frepérée, il plane\nvers elle pour\nl’attaquer."
        it:
          gold: "Vola verso il viso\ndel nemico, lo\natterrisce e poi\flo afferra\nper iniettargli\nil suo veleno."
          silver: "Di solito sta\nattaccato agli\nscogli. Attacca\fla preda spalan-\ncando le ali e\nplanando."
        de:
          gold: "Es fliegt direkt\nauf das Gesicht\nseiner Feinde zu\fund injiziert ih-\nnen eine Überdosis\ntödlichen Gifts."
          silver: "Es hängt meist an\nKlippen. Erspäht\nes Beute, spreizt\fes seine Flügel\nund greift diese\nsofort an."
        es:
          gold: "Vuela directo a la\ncara del objetivo,\ny acaba con su\faterrada víctima\ninyectàndole\nveneno."
          silver: "A veces se sujeta\na los precipicios.\nCuando divisa una\fpresa, despliega\nsus alas y planea\npara atacar."
        ko:
          gold: "안면을 노리고 덤벼든다\n붙어 있던 먹이가 놀라는\n순간에 독침을 찌른다"
          silver: "항상은 벼랑에 붙어 있다\n먹이를 발견하면 날개를 펼쳐\n바람을 타고 날아 덮친다"
steelix:
  species_id: 208
  names:
    jp_kana: ハガネール
    en: STEELIX
    fr: STEELIX
    it: STEELIX
    de: STAHLOS
    es: STEELIX
    ko: 강철톤
  forms:
    steelix:
      form_id: 0
      base_stats:
        hp: 75
        attack: 85
        defense: 200
        special_attack: 55
        special_defense: 65
        speed: 30
      types:
        - steel
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          gold: "ふかい　じめんの　したで\nあっしゅく　された　からだは\nダイヤモンドよりも　かたいのだ。"
          silver: "イワークが　１００ねん　いじょう\nいきると　からだの　せいぶんが\nダイヤのように　へんかする　という。"
        en:
          gold: "Its body has been\ncompressed deep\nunder the ground.\fAs a result, it is\neven harder than a\ndiamond."
          silver: "It is said that if\nan ONIX lives for\nover 100 years,\fits composition\nchanges to become\ndiamond-like."
        fr:
          gold: "Son corps a été\ncompressé sous la\nterre. Il est\fdevenu plus\nrésistant que le\ndiamant."
          silver: "On raconte qu’il\ns’agit d’un ONIX\nde plus de\f100 ans d’une\nmatière proche\ndu diamant."
        it:
          gold: "Il suo corpo,\npressato a\ngrandissime\fprofondità, è\ndiventato più\nduro del diamante."
          silver: "Sembra che se\nONIX vive per più\ndi 100 anni, cambi\fla composizione\nper diventare duro\ncome il diamante."
        de:
          gold: "Es wurde tief in\nder Erde derartig\nzusammengestaucht,\fdass sein Körper\nhärter als ein\nDiamant wurde."
          silver: "Man sagt, dass ein\nONIX, das über 100\nJahre alt ist,\fhart wie ein\nDiamant sein\nsoll."
        es:
          gold: "Su cuerpo ha sido\ncomprimido en el\ninterior de la\ftierra, y por eso\nes hasta màs duro\nque el diamante."
          silver: "Dicen que si ONIX\nviviera màs de 100\naños, su\fcomposición sería\nla del diamante,\ncomo STEELIX."
        ko:
          gold: "깊은 땅속 아래서\n압축되어진 몸은\n다이아몬드보다 단단하다"
          silver: "롱스톤이 100년 이상\n살면 몸의 성분이\n다이아몬드처럼 변한다고 전해진다"
snubbull:
