          silver: "たかい　きの　うえで　くらしている。\nえだから　えだへ　とびうつるとき\nシッポで　たくみに　バランスをとる。"
        en:
          gold: "Its tail is so\npowerful that it\ncan use it to grab\fa tree branch and\nhold itself up in\nthe air."
          silver: "It lives atop tall\ntrees. When leap-\ning from branch\fto branch, it\ndeftly uses its\ntail for balance."
        fr:
          gold: "Sa queue est si\nforte qu’il peut\nl’utiliser pour\fse suspendre aux\nbranches des\narbres."
          silver: "Il vit sur les\nplus hautes cimes.\nSautant de branche\fen branche, sa\nqueue lui assure\nun bon équilibre."
        it:
          gold: "La sua coda è\ncosì forte che può\nappendersi ad un\falbero e\nrimanere\nsospeso."
          silver: "Vive sugli alti\nalberi. Usando\nabilmente la coda,\fmantiene l’equili-\nbrio quando salta\ndi ramo in ramo."
        de:
          gold: "Sein Schweif ist\nso kräftig, dass\nes sich stunden-\flang damit an\neinem Ast in der\nLuft halten kann."
          silver: "Es lebt in den\nKronen großer Bäu-\nme. Es hüpft von\fAst zu Ast und\nbalanciert mit\nseinem Schwanz."
        es:
          gold: "Su cola es tan\npotente que puede\nusarla para\fagarrarse a la\nrama de un àrbol\ny no caer."
          silver: "Vive en lo alto\nde los àrboles.\nCuando salta de\frama en rama,\nusa su cola para\nequilibrarse."
        ko:
          gold: "힘이 센 꼬리만으로\n나뭇가지에 매달려서\n몸을 지탱할 수 있다"
          silver: "높은 나무 위에서 살고 있다\n나뭇가지에서 가지로 뛰어 건널 때\n꼬리로 능숙하게 중심을 잡는다"
sunkern:
  species_id: 191
  names:
    jp_kana: ヒマナッツ
    en: SUNKERN
    fr: TOURNEGRIN
    it: SUNKERN
    de: SONNKERN
    es: SUNKERN
    ko: 해너츠
