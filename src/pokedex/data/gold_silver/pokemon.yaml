        jp_kana:
          gold: "こうふんすると　からだじゅうの\nけあなから　どくその　まじった\nあせを　ふきとばし　みをまもる。"
          silver: "ちかよるものを　おそれさせるため\nからだの　わっかもようは\nくらくなると　しぜんにひかりだす。"
        en:
          gold: "When agitated,\nthis POKéMON pro-\ntects itself by\fspraying poisonous\nsweat from its\npores."
          silver: "When darkness\nfalls, the rings\non the body begin\fto glow, striking\nfear in the hearts\nof anyone nearby."
        fr:
          gold: "Pour se défendre\nce POKéMON émet\nun gaz empoisonné\fpar les pores de\nsa peau."
          silver: "Quand la nuit\ntombe, les anneaux\nsur son corps se\fmettent à luire,\nterrorisant ceux\nqui sont proches."
        it:
          gold: "Quando è nervoso,\nquesto POKéMON si\ndifende spruzzando\fsudore velenoso\ndai suoi\npori."
          silver: "Nell’oscurità, gli\nanelli sul suo\ncorpo brillano,\fterrorizzando chi\nsi trova nelle\nvicinanze."
        de:
          gold: "Fühlt es sich be-\ndroht, sondert es\ntödlichen Gift-\fschweiß aus seinen\nPoren ab, um sich\nzu schützen."
          silver: "Bei Einbruch der\nDunkelheit leuch-\nten die Ringe auf\fseinem Körper und\nverängstigen alle\nin seiner Nähe."
        es:
          gold: "Cuando se siente\namenazado, este\nPOKéMON se protege\flanzando sudor\nvenenoso por\ntodos sus poros."
          silver: "Cuando oscurece,\nlos anillos de su\ncuerpo comienzan a\fbrillar, asustando\na cualquiera que\nse acerque."
        ko:
          gold: "흥분하면 몸 전체의\n모공에서 독소가 섞인\n땀을 흩뿌려 몸을 보호한다"
          silver: "접근하는 무리에게 겁을주기 위해\n몸에있는 고리모양의 문양은\n어두워지면 자연적으로 빛을 낸다"
murkrow:
  species_id: 198
  names:
    jp_kana: ヤミカラス
    en: MURKROW
    fr: CORNEBRE
    it: MURKROW
    de: KRAMURX
    es: MURKROW
    ko: 니로우
  forms:
    murkrow:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 42
        special_attack: 85
        special_defense: 42
        speed: 91
      types:
        - dark
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "よる　すがたを　みかけると\nふきつなことが　おきると　しんじられ\nいみきらわれている　ポケモン。"
          silver: "おいかけてくるものが　いると\nくらい　やまみちに　さそいこみ\nさんざん　まよわせるという。"
        en:
          gold: "Feared and loathed\nby many, it is\nbelieved to bring\fmisfortune to all\nthose who see it\nat night."
          silver: "It is said that\nwhen chased, it\nlures its attacker\fonto dark mountain\ntrails where the\nfoe will get lost."
        fr:
          gold: "Craint et peu\naimé, il paraît\nqu’il porte\fmalheur à ceux qui\ncroisent son che-\nmin la nuit."
          silver: "Il paraît qu’une\nfois pourchassé,\nil attire son en-\fnemi dans la mon-\ntagne où il se\nperdra."
        it:
          gold: "Molti lo temono e\nlo detestano cre-\ndendo che porti\fsfortuna a tutti\ncoloro che lo\nvedono di notte."
          silver: "Si dice che quando\nè inseguito\nattiri il nemico\fverso oscure mon-\ntagne, per farlo\nperdere."
        de:
          gold: "Viele verabscheuen\nund hassen es, da\nsie glauben, es\fbringe Verderben,\nwenn sie ihm\nnachts begegnen."
          silver: "Wird es von einem\nGegner verfolgt,\nlockt es ihn auf\fdunkle Bergpfade,\nwo sein Gegner\nsich verläuft."
        es:
          gold: "Temido y odiado\npor muchos, dicen\nque trae la\fdesgracia a todos\naquéllos que lo\nven por la noche."
          silver: "Dicen que al ser\nperseguido, atrae\nal atacante hacia\flos caminos de la\noscura montaña,\ndonde se perderà."
        ko:
          gold: "밤에 모습을 발견하면\n불길한 일이 생긴다고 믿어져\n미움을 받고있는 포켓몬"
          silver: "따라오는 무리가 있으면\n어둠의 산길로 끌어들여\n호되게 혼을 빼놓는다"
slowking:
  species_id: 199
  names:
    jp_kana: ヤドキング
    en: SLOWKING
    fr: ROIGADA
    it: SLOWKING
    de: LASCHOKING
    es: SLOWKING
    ko: 야도킹
  forms:
    slowking:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 80
        special_attack: 100
        special_defense: 110
        speed: 30
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          gold: "すごい　ちせいと　ひらめきを\nもっている。どんなときでも　あわてず\nさわがず　のんびりとしている。"
          silver: "かまれたとき　あたまに　しみこんだ\nどくそに　よって　ただならない\nのうりょくに　めざめた　ヤドン。"
        en:
          gold: "It has incredible\nintellect and in-\ntuition. Whatever\fthe situation, it\nremains calm and\ncollected."
          silver: "When its head was\nbitten, toxins\nentered SLOWPOKE’s\fhead and unlocked\nan extraordinary\npower."
        fr:
          gold: "D’une grande in-\ntelligence, il\nsait rester calme\fen toute situa-\ntion stressante."
          silver: "Une fois sa tête\nmordue, des to-\nxines ont envahi\fRAMOLOSS et lui\nont conféré des\npouvoirs immenses."
        it:
          gold: "Dotato di incredi-\nbile intelligenza\ne intuito, sa\frestare calmo e\npadrone di sé in\nogni situazione."
          silver: "Quando la testa di\nSLOWPOKE fu morsa,\nvi penetrarono\fdelle tossine che\nprodussero un\nenorme potere."
        de:
          gold: "Seine Vorahnungen\nund sein Intellekt\nzeichnen es aus.\fEs bleibt in jeder\nSituation gelassen\nund besonnen."
          silver: "Als FLEGMON in den\nKopf gebissen wur-\nde, floß Gift in\fseinen Kopf und\nsetzte eine gewal-\ntige Kraft frei."
        es:
          gold: "Su intelecto e\nintuición son\nincreíbles.\fNo pierde la\ncompostura en\nninguna situación."
          silver: "Al ser mordido\nen la cabeza,\nSLOWPOKE absorbió\funas toxinas\nque liberaron\nsu oculto poder."
        ko:
          gold: "대단한 지성과 번뜩임을\n지니고 있다  어느 때든 놀라거나\n소란피우지 않고 태연하게 있다"
          silver: "물렸을 때 머리에 깊게 스며든\n독소에 의해 심상치 않은\n능력에 눈을 뜬 야돈"
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    en: MISDREAVUS
    fr: FEUFOREVE
    it: MISDREAVUS
    de: TRAUNFUGIL
    es: MISDREAVUS
    ko: 무우마
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      types:
        - ghost
      egg_groups:
        - amorphous
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          gold: "よなかに　ひとの　なきさけぶような\nなきごえを　だして　みんなを\nおどろかせる　いたずらずき。"
          silver: "いきなり　うしろがみに　かみつき\nひっぱっては　ひとの　おどろく\nすがたをみて　よろこんでいる。"
        en:
          gold: "It likes playing\nmischievous tricks\nsuch as screaming\fand wailing to\nstartle people at\nnight."
          silver: "It loves to bite\nand yank people’s\nhair from behind\fwithout warning,\njust to see their\nshocked reactions."
        fr:
          gold: "Il aime jouer des\ntours malicieux\net effrayants\fpendant la nuit\npour s’amuser."
          silver: "Il adore mordre\net tirer les che-\nveux des gens par\fsurprise, juste\npour voir leur\nréaction."
        it:
          gold: "Si diverte a fare\nbrutti scherzi,\ncome gridare e la-\fmentarsi in piena\nnotte spaventando\nla gente."
          silver: "Gli piace mordere\ne tirare i capelli\ndella gente all’\fimprovviso, tanto\nper vedere come si\nspaventa."
        de:
          gold: "Es liebt Streiche\nund erschreckt\nnachts Menschen,\findem es heult\noder ihnen im\nDunkeln auflauert."
          silver: "Es liebt, Menschen\nzu beißen und sie\nan den Haaren zu\fziehen, nur um\nihre Reaktionen\nzu sehen."
        es:
          gold: "Le gusta hacer\ntravesuras como\ngritar y aullar\fpor la noche,\npara asustar\na la gente."
          silver: "Le gusta morder y\ntirar del pelo de\nla gente desde\fatràs sin avisar,\nsólo para ver su\nreacción."
        ko:
          gold: "밤중에 사람의 통곡소리 같은\n울음소리를 내서 모두를\n놀래키는 장난꾸러기"
          silver: "갑자기 뒷머리에 달려들어\n잡아당기고는 사람들이 놀래는\n모습을 보고 즐거워한다"
unown:
  species_id: 201
  names:
    jp_kana: アンノーン
    en: UNOWN
    fr: ZARBI
    it: UNOWN
    de: ICOGNITO
    es: UNOWN
    ko: 안농
  forms:
    unown_a:
      form_id: 0
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      types:
        - psychic
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          gold: "すがたかたちが　むかしの　せきばんに\nしるされた　もじに　にており\nかんけいあるのではと　ウワサされる。"
          silver: "からだじたいは　うすっぺらく\nいつも　かべに　はりついている。\nかたちに　なにか　いみがあるらしい。"
        en:
          gold: "Their shapes look\nlike hieroglyphs\non ancient tab-\flets. It is said\nthat the two are\nsomehow related."
          silver: "Its flat, thin\nbody is always\nstuck on walls.\fIts shape appears\nto have some mean-\ning."
        fr:
          gold: "Ils ressemblent\naux vieux hiéro-\nglyphes inscrits\fsur les tablettes.\nIl semble qu’ils y\nsoient liés."
          silver: "Son corps plat et\nfin est toujours\ncollé aux murs.\fOn pense que sa\nforme a une\nsignification."
        it:
          gold: "La loro forma è\nsimile a gerogli-\nfici su antiche\ftavole. Si pensa\nche non sia una\ncoincidenza."
          silver: "Il corpo piatto e\nsottile sta sempre\nattaccato ai muri.\fPare che la forma\nabbia un preciso\nsignificato."
        de:
          gold: "Ihr Äußeres erin-\nnert an Hierogly-\nphen auf antiken\fSteinplatten. Man\nsagt, es gäbe ei-\nnen Zusammenhang."
          silver: "Sein flacher, dün-\nner Körper hängt\nimmer an Wänden.\fSeine Form scheint\neine Bedeutung zu\nhaben."
        es:
          gold: "Tienen forma de\njeroglíficos\nsobre làpidas\fantiguas. Dicen\nque ambos estàn\nrelacionados."
          silver: "Su cuerpo fino y\nplano aparece\nsiempre en los\fmuros. Su forma\nparece tener algùn\nsignificado."
        ko:
          gold: "모습과 형태가 옛날 석판에\n새겨진 문자랑 닮아서 관계가\n있을 것이라는 소문이 돌고 있다"
          silver: "몸자체는 굉장히 얇고\n항상 벽에 들러붙어 있다\n몸의 형태에는 뭔가 의미가 있는듯"
