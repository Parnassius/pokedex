          silver: "Le nove belle\ncode sono cariche\ndi una favolosa e-\fnergia, capace di\ntenerlo in vita\nper mille anni."
        de:
          gold: "Eine Legende sagt,\ndass jedem seiner\nneun Schwänze eine\feinzigartige\nmystische Kraft\ninnewohnt."
          silver: "Seine neun schönen\nSchweife sind er-\nfüllt von einer\fmagischen Energie,\num es 1000 Jahre\nleben zu lassen."
        es:
