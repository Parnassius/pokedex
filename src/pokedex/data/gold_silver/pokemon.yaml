          silver: "Looking into its\ncute, round eyes\ncauses it to sing\fa relaxing melody,\ninducing its\nenemies to sleep."
        fr:
          gold: "En se gonflant il\npeut chanter une\nlongue BERCEUSE\fqui endort\ninévitablement ses\nadversaires."
          silver: "Le regarder dans\nles yeux le pousse\nà chantonner une\fdouce mélopée qui\nendort ses\nadversaires."
        it:
          gold: "Se si gonfia\ne usa il suo CANTO\ndiventa più resi-\fstente e causa una\nforte sonnolenza\nin chi lo ascolta."
          silver: "Se lo si fissa nei\ndolci occhi tondi\nintona una melodia\frilassante, che\nspinge i nemici\nad addormentarsi."
        de:
          gold: "Wenn es GESANG\neinsetzt, steigt\nseine Ausdauer und\fseine Zuhörer\nwerden in Tief-\nschlaf versetzt."
          silver: "Schaut man ihm in\nseine niedlichen\nKulleraugen, be-\fginnt es zu singen\nund seine Gegner\nschlafen ein."
        es:
          gold: "Si se hincha para\nCANTAR una nana,\ncantarà màs\ftiempo, y puede\ncausar sopor\nen el pùblico."
          silver: "Si le miras a sus\nbonitos y redondos\nojos, cantarà una\frelajante melodía\ncon la que duerme\nal enemigo."
        ko:
          gold: "커다랗게 몸을 부풀려서\n노래하는 자장가는 평상시보다\n길어서 반드시 잠이들게 된다"
          silver: "둥글고 또렷한 눈동자를 쳐다보면\n잠이 올 것 같은 기분 좋은\n노래를 부르기 시작한다"
wigglytuff:
