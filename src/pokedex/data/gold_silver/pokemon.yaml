          silver: "Se una delle teste\ntrova del cibo,\nanche le altre\fsono soddisfatte\ne smettono di\nbisticciare."
        de:
          gold: "Es sammelt Daten\nund überlegt sich\nalles dreimal, ehe\fes sich entschei-\ndet. Dadurch wird\nes oft gelähmt."
          silver: "Bekommt einer der\nKöpfe Futter, sind\nauch die anderen\fzufrieden und\nhören auf zu\nstreiten."
        es:
          gold: "Recoge datos y\nhace planes el\ntriple de ràpido,\fpero si piensa\ndemasiado podría\nquedar paralizado."
          silver: "Si una de las\ncabezas come,\nlas otras quedaràn\fsatisfechas y\ndejaràn de\npelearse."
        ko:
          gold: "3배의 정보를 모아서 고도의\n작전을 짠다  가끔은 많은 생각을\n해서 움직이지 못하게 될 때도있다"
          silver: "어딘가 1개의 머리로 먹이를\n먹으면 남은 머리들도\n충족되어 날뛰지 않게 된다"
