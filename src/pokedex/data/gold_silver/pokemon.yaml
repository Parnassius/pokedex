        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "りょうめは　とくしゅな　つくり。\nわずかな　ひかりを　あつめては\nくらやみでも　まわりを　みわける。"
          silver: "ものごとを　かんがえだすと\nくびを　１８０ど　かいてん　させて\nあたまの　はたらきを　たかめる。"
        en:
          gold: "Its eyes are\nspecially adapted.\nThey concentrate\feven faint light\nand enable it to\nsee in the dark."
          silver: "When it needs to\nthink, it rotates\nits head 180 de-\fgrees to sharpen\nits intellectual\npower."
        fr:
          gold: "Ses yeux sont a-\ndaptés à la nuit.\nIls peuvent\fconcentrer la\nfaible lumière de\nl’obscurité."
          silver: "Quand il réflé-\nchit, il tourne\nsa tête sur 180\fdegrés pour opti-\nmiser son mode\nde pensée."
        it:
          gold: "Ha degli occhi\nspeciali con cui\nconcentra anche\fla luce più fioca\nper poter vedere\nal buio."
          silver: "Quando pensa ruota\nla testa di 180\ngradi per\fpotenziare le\nsue capacità\nintellettive."
        de:
          gold: "Sein Sehvermögen\nist hervorragend.\nSelbst bei schwa-\fchem Licht kann\nes jedes Detail\nerkennen."
          silver: "Muss es nachden-\nken, dreht es sei-\nnen Kopf um 180\fGrad, um so seinen\nIntellekt zu\nschärfen."
        es:
          gold: "Sus ojos estàn\nespecialmente\nadaptados,\fconcentrando la\nluz para poder ver\nen la oscuridad."
          silver: "Cuando necesita\npensar, gira su\ncabeza 180 grados\fpara agudizar\nsu capacidad\nintelectual."
        ko:
          gold: "양쪽 눈은 특수한 형태\n적은 빛을 집중시키면\n어둠속에서도 주변을 식별한다"
          silver: "뭔가를 생각해내면\n목을 180도 회전시켜\n머리회전을 높인다"
ledyba:
  species_id: 165
  names:
    jp_kana: レディバ
    en: LEDYBA
    fr: COXY
    it: LEDYBA
    de: LEDYBA
    es: LEDYBA
    ko: 레디바
  forms:
    ledyba:
      form_id: 0
      base_stats:
        hp: 40
        attack: 20
        defense: 30
        special_attack: 40
        special_defense: 80
        speed: 55
      types:
        - bug
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          gold: "むれを　つくらないと　ふあんで\nうごけなくなるほど　おくびょうだが\nなかまがいると　かっぱつに　うごく。"
          silver: "さむくなると　あちこちから\nレディバが　たくさん　あつまって\nよりそいあい　あたためあう。"
        en:
          gold: "It is very timid.\nIt will be afraid\nto move if it is\falone. But it will\nbe active if it is\nin a group."
          silver: "When the weather\nturns cold, lots\nof LEDYBA gather\ffrom everywhere to\ncluster and keep\neach other warm."
        fr:
          gold: "De nature timide,\nil a peur de se\ndéplacer seul.\fIl est plus actif\net courageux dans\nun groupe."
          silver: "Quand le temps se\nrafraîchit, de\nnombreux COXY se\fréunissent pour\nconserver un maxi-\nmum de chaleur."
        it:
          gold: "È timidissimo.\nHa sempre paura di\nmuoversi da solo.\fMa in gruppo sa\ndiventare molto\nattivo."
          silver: "Quando inizia a\nfar freddo, i\nLEDYBA si riuni-\fscono da ogni\nluogo per scal-\ndarsi tra loro."
        de:
          gold: "Es ist sehr scheu.\nEs hat Angst sich\nzu bewegen, wenn\fes alleine ist.\nIn Gruppen ist\nes sehr aktiv."
          silver: "Wird es kalt, ver-\nsammeln sich viele\nLEDYBAS von nah\fund fern, um sich\ngegenseitig Wärme\nzu schenken."
        es:
          gold: "Es muy tímido.\nTiene miedo de\nmoverse cuando va\fsolo. Pero si\nva en grupo, se\nvuelve muy activo."
          silver: "Cuando llega el\nfrío, se reùnen\nmuchos LEDYBA\fde todas partes\npara darse\ncalor."
        ko:
          gold: "무리를 만들지 않으면 불안해서\n움직이지 못할 정도로 겁이 많지만\n동료가 있으면 활발하게 움직인다"
          silver: "추워지면 여기저기로부터\n레디바가 많이 모여들어\n바싹 붙어 서로 따뜻하게 해준다"
ledian:
  species_id: 166
  names:
    jp_kana: レディアン
