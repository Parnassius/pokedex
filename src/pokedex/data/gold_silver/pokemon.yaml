          silver: "Due to its relaxed\nand carefree atti-\ntude, it often\fbumps its head on\nboulders and boat\nhulls as it swims."
        fr:
          gold: "Ce POKéMON est\ntrès insouciant.\nQuand il nage,\fil fonce tête la\npremière dans la\ncoque des bateaux."
          silver: "Très distrait,\nil se cogne sou-\nvent la tête sur\fdes rochers ou\nsur des coques de\nbateaux."
        it:
          gold: "Questo POKéMON\nsbarazzino non si\nfa grossi proble-\fmi: nuotando urta\nsempre gli scafi\ndelle barche."
          silver: "Con il suo atteg-\ngiamento rilassato\ne disinvolto,\fnuota scontrando\ni massi e gli sca-\nfi delle barche."
        de:
          gold: "Dieses genügsame\nPOKéMON ist sehr\numgänglich. Beim\fSchwimmen stößt es\nimmer wieder gegen\nSchiffe."
          silver: "Aufgrund seiner\ngleichgültigen\nEinstellung, rammt\fes seinen Kopf oft\ngegen Felsen oder\nSchiffsrümpfe."
        es:
          gold: "Este despreocupado\nPOKéMON es de\nnaturaleza\ftranquila. Siempre\nque nada, choca\ncon los barcos."
          silver: "Debido a su\ndespreocupada\nactitud, a menudo\fgolpea su cabeza\ncontra rocas o\nbarcos al nadar."
        ko:
          gold: "태평한 성격으로\n제멋대로 헤엄치고는 항상\n배 밑에 머리를 부딪히고 있다"
          silver: "태평스러운 성격으로\n헤엄치고 있을 때는 강바닥의 돌과\n배 밑에 머리를 부딪치고 있다"
espeon:
  species_id: 196
