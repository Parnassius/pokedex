      descriptions:
        jp_kana:
          gold: "じかんをこえて　あちこち　さまよう。\nセレビィが　すがたを　あらわした\nもりは　くさきが　おいしげるという。"
          silver: "セレビィが　すがたを　けした\nもりのおくに　のこされた　タマゴは\nみらいから　もってきたもの　らしい。"
        en:
          gold: "This POKéMON wan-\nders across time.\nGrass and trees\fflourish in the\nforests in which\nit has appeared."
          silver: "When CELEBI disap-\npears deep in a\nforest, it is said\fto leave behind an\negg it brought\nfrom the future."
        fr:
          gold: "Ce POKéMON voyage\ndans le temps.\nLa végétation est\fluxuriante là où\nil s’installe."
          silver: "Quand CELEBI dis-\nparaît au fin fond\nde la forêt, il\flaisse derrière\nlui un oeuf venant\ndu futur."
        it:
          gold: "Questo POKéMON\nviaggia attraverso\nil tempo.\fLe foreste in cui\nappare prosperano\nrigogliose."
          silver: "Quando scompare\nnella foresta, si\ndice che lasci\fdietro di sé un\nuovo che proviene\ndal futuro."
        de:
          gold: "Dieses POKéMON\nreist durch Zeit\nund Raum. Bäume\fund Wiesen\nwuchern, wenn es\nin der Nähe ist."
          silver: "Wenn CELEBI in\neinem Wald ver-\nschwindet, lässt\fes laut Legende\nein Ei aus der\nZukunft zurück."
        es:
          gold: "Este POKéMON vaga\npor el tiempo. La\nhierba y los\fàrboles crecen\npor los campos\npor donde pasa."
          silver: "Dicen que cuando\nCELEBI se interna\nen un bosque, deja\ftras de sí\nun huevo traído\ndel futuro."
        ko:
          gold: "시간을 넘어서 여기저기 방황한다\n세레비가 모습을 나타낸\n숲은 수풀이 무성하다고 전해진다"
          silver: "세레비가 모습을 감춘\n숲 깊은 곳에 남겨진 알은\n미래로부터 가져온 것 같다"
