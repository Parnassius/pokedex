        en:
          gold: "As it develops, \nits single white\ntail gains color\fand splits into\nsix. It is quite\nwarm and cuddly."
          silver: "If it is attacked\nby an enemy that\nis stronger than\fitself, it feigns\ninjury to fool the\nenemy and escapes."
