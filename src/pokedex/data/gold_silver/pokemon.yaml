      descriptions:
        jp_kana:
          gold: "よぞらに　ほしが　またたくとき\nかがやく　こなを　ふりまきながら\nひらひらと　とんでいく。"
          silver: "せなかの　ほしもようは\nよぞらの　ほしのかずに　はんのうして\nおおきくなったり　ちいさくなる。"
        en:
          gold: "When the stars\nflicker in the\nnight sky, it\fflutters about,\nscattering a\nglowing powder."
          silver: "The star patterns\non its back grow\nlarger or smaller\fdepending on the\nnumber of stars in\nthe night sky."
        fr:
          gold: "Quand les étoiles\nbrillent dans le\nciel, il volette\fpartout en semant\nderrière lui une\npoudre brillante."
          silver: "Les étoiles sur\nson dos deviennent\nplus grandes ou\fplus petites selon\nle nombre d’étoi-\nles dans le ciel."
        it:
          gold: "Si aggira nella\nnotte stellata\nlasciando\fcadere una\nscia di polvere\nincandescente."
          silver: "Le stelle disegna-\nte sulla schiena\nsono più grandi o\fpiù piccole secon-\ndo il numero di\nstelle nel cielo."
        de:
          gold: "Leuchten die Ster-\nne am Nachthimmel,\nschwirrt es umher\fund verstreut ei-\nnen strahlenden,\nleuchtenden Puder."
          silver: "Die Größe des\nSternenmusters,\nhängt direkt mit\fder Anzahl der\nSterne am Firma-\nment zusammen."
        es:
          gold: "Cuando parpadean\nlas estrellas en\nel cielo nocturno,\fse mece,\ndesprendiendo un\npolvo brillante."
          silver: "Las estrellas de\nsu lomo crecen y\ndecrecen\fdependiendo de\nlas estrellas del\ncielo nocturno."
        ko:
          gold: "밤하늘의 별이 깜빡거릴 때\n반짝이는 가루를 흩뿌리며\n팔랑팔랑 날아간다"
          silver: "등의 별 모양은\n밤하늘의 별의 숫자에 반응하여\n많아졌다가 적어지기도 한다"
spinarak:
  species_id: 167
  names:
    jp_kana: イトマル
    en: SPINARAK
    fr: MIMIGAL
    it: SPINARAK
    de: WEBARAK
    es: SPINARAK
    ko: 페이검
  forms:
    spinarak:
      form_id: 0
