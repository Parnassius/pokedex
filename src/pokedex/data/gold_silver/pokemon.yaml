          silver: "ものすごい　かそくりょく。\nはしりだして　たったの　１０ぽで\nさいこうじそく　２４０キロになる。"
        en:
          gold: "At full gallop,\nits four hooves\nbarely touch the\fground because it\nmoves so incredi-\nbly fast."
          silver: "With incredible\nacceleration, it\nreaches its top\fspeed of 150 mph\nafter running just\nten steps."
        fr:
          gold: "Quand il galope,\nses sabots frôlent\nle sol, ce qui\fdonne l’impression\nqu’il glisse sur\nle vent."
