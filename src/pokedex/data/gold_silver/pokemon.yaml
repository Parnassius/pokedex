        fr:
          gold: "L’arôme qui émane\nde ses pétales\ncontient une\fsubstance qui\ncalme les pulsions\nagressives."
          silver: "Le souffle de\nMEGANIUM a le\npouvoir de\fredonner la santé\naux plantes mala-\ndes ou mortes."
        it:
          gold: "L’aroma che si\nspande dai suoi\npetali contiene\funa sostanza che\nplaca gli istinti\naggressivi."
          silver: "Il respiro di\nMEGANIUM può\nfar riprendere\fl’erba e le piante\nmorte, che ricre-\nscono rigogliose."
        de:
          gold: "Das Aroma aus\nseiner Blüte\nenthält Stoffe,\fdie jegliche\nAggressivität\nschwinden lassen."
          silver: "MEGANIE kann mit\nseinem Atem abge-\nstorbene Gräser\fund Planzen reani-\nmieren. Sie sind\ndann gesund."
        es:
          gold: "El olor que\ndesprenden sus\npétalos contiene\funa sustancia que\ncalma el instinto\nagresivo."
          silver: "El aliento de\nMEGANIUM tiene\nel poder de\frevivir los\nrastrojos, ademàs\nde regenerarlos."
        ko:
          gold: "꽃잎에서 발산되어지는\n향기에는 싸울 기분을\n가라앉게 하는 성분이 담겨있다"
          silver: "매가니움이 뿜어내는 숨결에는\n말라죽은 풀과 나무를 살려내는\n힘이 담겨져 있다"
cyndaquil:
  species_id: 155
  names:
    jp_kana: ヒノアラシ
    en: CYNDAQUIL
    fr: HERICENDRE
    it: CYNDAQUIL
    de: FEURIGEL
    es: CYNDAQUIL
    ko: 브케인
  forms:
    cyndaquil:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "おくびょうで　いつも　からだを\nまるめている。おそわれると　せなかの\nほのおを　もえあがらせ　みをまもる。"
          silver: "いつもは　せなかを　まるめている。\nおこったとき　おどろいたとき\nせなかから　ほのおが　ふきだす。"
        en:
          gold: "It is timid, and\nalways curls it-\nself up in a ball.\fIf attacked, it\nflares up its back\nfor protection."
          silver: "It usually stays\nhunched over.\nIf it is angry or\fsurprised, it\nshoots flames out\nof its back."
        fr:
          gold: "Il est timide et\nse roule en boule\npour se protéger.\fAttaqué, il s’en-\nflamme le dos pour\nriposter."
          silver: "Il reste en géné-\nral courbé. S’il\nest en colère ou\fsurpris, des flam-\nmes jaillissent de\nson dos."
        it:
          gold: "È timido: spesso\nse ne sta\nappallottolato.\fSe è attaccato,\nsi difende infuo-\ncando il dorso."
          silver: "Di solito sta\nraggomitolato. Se\nha paura o è\fsorpreso, lancia\nfiamme dal\ndorso."
        de:
          gold: "Es ist ruhig und\nkugelt sich\nstets zusammen.\fZum Schutz ent-\nflammt es seinen\nRücken."
          silver: "Es ist immer ge-\nbeugt. Wird es an-\ngegriffen oder ist\fes überrascht,\nschießen Flammen\naus seinem Rücken."
        es:
          gold: "Es tímido, y\nsiempre se enrosca\ncomo una pelota.\fSi es atacado,\nenciende su lomo\npara protegerse."
          silver: "Suele estar\nacurrucado.\nSi se enfada o\fasusta, lanzarà\nllamas por\nsu lomo."
        ko:
          gold: "겁이 많아서 항상 몸을\n움츠리고 있다  공격받으면 등의\n화염을 타올려 몸을 보호한다"
          silver: "보통은 등을 둥글게하고 있다\n화가 났을 때와 놀랐을때\n등에서 화염이 피어오른다"
quilava:
  species_id: 156
  names:
    jp_kana: マグマラシ
    en: QUILAVA
    fr: FEURISSON
    it: QUILAVA
    de: IGELAVAR
    es: QUILAVA
    ko: 마그케인
  forms:
    quilava:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        special_attack: 80
        special_defense: 65
        speed: 80
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "せんとうちゅう　せなかを　むけたら\nようちゅうい。せなかの　ほのおで\nこうげき　してくる　まえぶれだ。"
          silver: "からだを　おおう　けがわは\nぜったいに　もえたりしない。\nどんな　ほのおこうげきも　へいきだ。"
        en:
          gold: "Be careful if it\nturns its back\nduring battle. It\fmeans that it will\nattack with the\nfire on its back."
          silver: "This POKéMON is\nfully covered by\nnonflammable fur.\fIt can withstand\nany kind of fire\nattack."
        fr:
          gold: "Attention! Quand\nil tourne le dos\ndans un combat,\fc’est qu’il va\nattaquer avec ses\nflammes dorsales."
          silver: "Ce POKéMON est\ncouvert de four-\nrure ininflamma-\fble. Il résiste\nà toute attaque de\ntype feu."
        it:
          gold: "Nella lotta, se\ns’incurva vuol\ndire che sta per\fattaccare con le\nfiamme che ha sul\ndorso."
          silver: "Un POKéMON comple-\ntamente ricoperto\nda una pelliccia\fnon infiammabile.\nPuò resistere a\nqualsiasi attacco."
        de:
          gold: "Dreht es dir im\nKampf den Rücken\nzu, wird es dich\fmit den Flammen\nseines Rückens\nangreifen."
          silver: "Das Fell dieses\nPOKéMON ist nicht\nentflammbar. Es\fist gegen jegliche\nFeuerattacken\nimmun."
        es:
          gold: "Ten cuidado si\nte da la espalda\nen combate.\fSignifica que te\nva a atacar con\nsu lomo de fuego."
          silver: "El pelaje de\neste POKéMON\nes ignífugo.\fPuede soportar\ncualquier ataque\nde fuego."
        ko:
          gold: "전투중에 등을 보이면\n요주의  등의 화염으로\n공격을 해온다는 예고이다"
          silver: "몸을 뒤덮는 털가죽은\n절대로 불에타지 않는다\n어떤한 불의 공격에도 괜찮다"
typhlosion:
  species_id: 157
  names:
    jp_kana: バクフーン
    en: TYPHLOSION
    fr: TYPHLOSION
    it: TYPHLOSION
    de: TORNUPTO
    es: TYPHLOSION
    ko: 블레이범
  forms:
    typhlosion:
      form_id: 0
      base_stats:
        hp: 78
        attack: 84
        defense: 78
        special_attack: 109
        special_defense: 85
        speed: 100
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          gold: "いかりが　さいこうちょうのとき\nさわったもの　すべて　いっしゅんで\nもえあがらせるほどに　あつい。"
          silver: "もえさかる　たいもうを　こすりあわせ\nばくふうを　おこして　こうげきする\nおおわざを　かくしもっている。"
        en:
          gold: "If its rage peaks,\nit becomes so hot\nthat anything that\ftouches it will\ninstantly go\nup in flames."
          silver: "It has a secret,\ndevastating move.\nIt rubs its blaz-\fing fur together\nto cause huge\nexplosions."
        fr:
          gold: "Quand il est fu-\nrieux, il devient\nsi chaud que tout\fce qui le touche\ns’enflamme\ninstantanément."
          silver: "Il a un coup\nsecret dévasta-\nteur. En frottant\fsa fourrure ar-\ndente il crée une\nforte explosion."
        it:
          gold: "Quando è davvero\narrabbiato diventa\ncosì caldo che\fqualsiasi cosa\ntocchi va subito\na fuoco."
          silver: "Ha una devastante\nmossa segreta.\nPuò sfregare la\fpelliccia infuoca-\nta causando forti\nesplosioni."
        de:
          gold: "Wenn sein Zorn den\nZenit übersteigt,\nwird es so heiß,\fdass alles, was es\nberührt, in Flam-\nmen aufgeht."
          silver: "Es verfügt über\neine verheerende\nGeheimattacke. Es\freibt sein Fell,\num Explosionen zu\nerzeugen."
        es:
          gold: "Si su furia crece,\nse calienta tanto\nque cualquier cosa\fque toque se\nprenderà al\ninstante."
          silver: "Tiene una\nhabilidad secreta\ny devastadora.\fCausa explosiones\nal frotar\nsu pelaje."
        ko:
          gold: "분노가 최고조에 달할 때\n건드린 자는 모두 일순간에\n불태워버릴 정도로 뜨겁다"
          silver: "한창 타오르는 털을 문질러\n폭풍을 일으켜서 공격한다\n큰 기술을 감추어 놓고 있다"
totodile:
  species_id: 158
  names:
    jp_kana: ワニノコ
    en: TOTODILE
    fr: KAIMINUS
    it: TOTODILE
    de: KARNIMANI
    es: TOTODILE
    ko: 리아코
  forms:
    totodile:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 64
        special_attack: 44
        special_defense: 48
        speed: 43
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "はったつした　あごは　パワフルで\nなんでも　かみくだいて　しまうので\nおやのトレーナーでも　ようちゅうい。"
          silver: "ちいさいながらも　あばれんぼう。\nめのまえで　うごくものが　あれば\nとにかく　かみついてくる。"
        en:
          gold: "Its well-developed\njaws are powerful\nand capable of\fcrushing anything.\nEven its trainer\nmust be careful."
          silver: "It is small but\nrough and tough.\nIt won’t hesitate\fto take a bite out\nof anything that\nmoves."
        fr:
          gold: "Sa machoire sur-\ndéveloppée est\ncapable de tout\fbroyer. Même son\ndresseur doit\ns’en méfier."
          silver: "Petit mais\ncostaud, il\nn’hésite pas à\fmordre tout ce\nqui passe à portée\nde dents."
        it:
          gold: "Le sue potenti\nmandibole possono\nfrantumare\fqualsiasi cosa.\nAnche l’allenatore\ndev’essere cauto."
          silver: "È piccolo, ma\nforte e deciso.\nNon esita ad\favventarsi su\nqualsiasi cosa\nsi muova."
        de:
          gold: "Seine starken Kie-\nfer können alles\nzermalmen. Selbst\fsein Trainer muss\nsich vor ihm in\nAcht nehmen."
          silver: "Es ist klein, aber\nzäh und stark. Es\nzögert nicht, je-\fden anzugreifen,\nwenn dieser ihm zu\nnahe kommt."
        es:
          gold: "Sus desarrolladas\ny potentes fauces\npueden romper\fcualquier cosa. Su\nentrenador debe\ntener cuidado."
          silver: "Es pequeño pero\nviolento. No\ndudarà en morder\fcualquier cosa\nque se mueva\ncerca."
        ko:
          gold: "발달한 턱은 매우 강해서\n뭐든지 물어뜯어 버리기 때문에\n어버이 트레이너라도 주의해야 한다"
          silver: "작아도 성격은 거칠다\n눈 앞에서 움직이는 것이 있으면\n무조건 물어버린다"
croconaw:
  species_id: 159
  names:
    jp_kana: アリゲイツ
    en: CROCONAW
    fr: CROCRODIL
    it: CROCONAW
    de: TYRACROC
    es: CROCONAW
    ko: 엘리게이
  forms:
    croconaw:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 80
        special_attack: 59
        special_defense: 63
        speed: 58
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "キバは　ぬけても　つぎから　つぎに\nはえてくる。いつも　くちのなかには\n４８ぽんの　キバが　そろっている。"
          silver: "おおぐちを　あけて　こうげき。\nかみついたとき　ぬけた　キバは\nつぎからつぎに　はえてくる。"
        en:
          gold: "If it loses a\nfang, a new one\ngrows back in its\fplace. There are\nalways 48 fangs\nlining its mouth."
          silver: "It opens its huge\njaws wide when\nattacking. If it\floses any fangs\nwhile biting, they\ngrow back in."
        fr:
          gold: "Quand il perd un\ncroc, il en re-\npousse un autre.\fSa bouche est en\npermanence compo-\nsée de 48 dents."
          silver: "Il ouvre grand ses\nmachoires quand il\nattaque. Si ses\fcrocs se cassent,\nils repoussent\ntrès vite."
        it:
          gold: "Se perde un dente\ngliene ricresce\nun altro.\fLa sua bocca\ncontiene sempre\n48 denti."
          silver: "Quando attacca,\nspalanca le grandi\nmascelle.\fSe morsicando\nperde un dente,\ngli ricresce."
        de:
          gold: "Verliert es einen\nseiner Zähne,\nwächst ein neuer\fnach. Es hat immer\n48 Zähne in seinem\nKiefer."
          silver: "Beim Angriff reißt\nes sein Maul auf.\nVerliert es dabei\feinen Zahn, wächst\ndieser schnell\nwieder nach."
        es:
          gold: "Si pierde un\ncolmillo, le\ncrecerà otro en su\flugar. Siempre\ntiene 48 colmillos\nen su boca."
          silver: "Abre sus grandes\nfauces cuando le\natacan. Si pierde\falgùn colmillo al\nmorder, le vuelve\na crecer."
        ko:
          gold: "이빨이 빠져도 계속해서\n자라 나온다  항상 입안에는\n48개의 이빨이 늘어서 있다"
          silver: "큰 입을 벌려서 공격\n깨물었을 때 빠진 이빨은\n계속해서 돋아난다"
feraligatr:
  species_id: 160
  names:
    jp_kana: オーダイル
    en: FERALIGATR
    fr: ALIGATUEUR
    it: FERALIGATR
    de: IMPERGATOR
    es: FERALIGATR
    ko: 장크로다일
  forms:
    feraligatr:
      form_id: 0
      base_stats:
        hp: 85
        attack: 105
        defense: 100
        special_attack: 79
        special_defense: 83
        speed: 78
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          gold: "おおきく　ちからづよい　あごで\nかみつくと　そのまま　くびをふって\nあいてを　ずたずたに　ひきちぎる。"
          silver: "ちじょうでは　からだを　ささえるのが\nつらいので　よつんばいだが\nとても　すばやく　いどうできる。"
        en:
          gold: "When it bites with\nits massive and\npowerful jaws, it\fshakes its head\nand savagely tears\nits victim up."
          silver: "It is hard for it\nto support its own\nweight out of\fwater, so it gets\ndown on all fours.\nBut it moves fast."
        fr:
          gold: "Quand il mord avec\nsa puissante mâ-\nchoire, il secoue\fsa tête pour dé-\nchiqueter sa\npauvre victime."
          silver: "Il a du mal à\nse mouvoir hors\nde l’eau, alors\fil marche à quatre\npattes. Il reste\ntrès rapide."
        it:
          gold: "Mordendo con le\ngrandi e potenti\nmandibole, agita\fil capo riducendo\nla vittima in\nbrandelli."
          silver: "Non potendo regge-\nre il suo grande\npeso fuori dall’\facqua, si muove a\nquattro zampe, ma\nè molto rapido."
        de:
          gold: "Wenn es mit seinem\nkräftigen Kiefer\nzubeißt, schüttelt\fes seinen Kopf\nund reißt seine\nOpfer in Stücke."
          silver: "Aufgrund seines\nGewichts, verlässt\nes das Wasser nur\fselten. Also geht\nes auf allen\nVieren."
        es:
          gold: "Al morder con sus\nferoces fauces,\nmueve su cabeza\fdespedazando\nsalvajemente\na su víctima."
          silver: "Le cuesta\nsoportar su\npropio peso fuera\fdel agua, así que\nva a cuatro patas.\nAun así es ràpido."
        ko:
          gold: "크고 강력한 턱으로\n물어뜯으면 그대로 목을 흔들어\n상대를 산산조각 내버린다"
          silver: "지상에서는 몸을 지탱하기가\n힘들기 때문에 엎드려 다니지만\n매우 빠르게 이동할 수 있다"
sentret:
  species_id: 161
  names:
    jp_kana: オタチ
    en: SENTRET
    fr: FOUINETTE
    it: SENTRET
    de: WIESOR
    es: SENTRET
    ko: 꼬리선
  forms:
    sentret:
      form_id: 0
      base_stats:
        hp: 35
        attack: 46
        defense: 34
        special_attack: 35
        special_defense: 45
        speed: 20
      types:
        - normal
      egg_groups:
        - field
      held_items:
        rare: berry
      descriptions:
        jp_kana:
          gold: "シッポを　たてて　すこしでも\nとおくの　ようすを　しらべている\nけいかいしんが　つよい　ポケモン。"
          silver: "とおくまで　みれるように　シッポを\nつかってたつ。てきを　みつけると\nおおごえで　なかまに　しらせる。"
        en:
          gold: "A very cautious\nPOKéMON, it raises\nitself up using\fits tail to get a\nbetter view of its\nsurroundings."
          silver: "It stands on its\ntail so it can see\na long way. If it\fspots an enemy, it\ncries loudly to\nwarn its kind."
        fr:
          gold: "C’est un POKéMON\ntrès prudent, il\nse dresse sur sa\fqueue pour mieux\nobserver les\nenvirons."
          silver: "Il se tient dressé\nsur sa queue pour\nvoir les ennemis\farriver de loin. A\nce moment, il\navertit ses amis."
        it:
          gold: "È un POKéMON\nmolto cauto, che\nsi alza da terra\fcon la coda per\nscrutare\ni dintorni."
          silver: "Ritto sulla coda,\nguarda lontano. Se\nnota un nemico fa\fforti versi per\navvertire quelli\ndella sua specie."
        de:
          gold: "Ein sehr vorsich-\ntiges POKéMON, es\nstellt sich auf\fseinen Schweif, um\ndie Umgebung\nzu überblicken."
          silver: "Es stellt sich auf\nden Schwanz, um\nweiter zu blicken.\fErspäht es einen\nFeind, schreit es\nlaut auf."
        es:
          gold: "Un POKéMON muy\nprecavido. Se\nlevanta con su\fcola para tener\nuna mejor vista de\nlos alrededores."
          silver: "Se apoya sobre\nsu cola para ver\na mucha distancia.\fSi divisa a un\nenemigo, darà la\nalarma a gritos."
        ko:
          gold: "꼬리를 세워서 조금이라도\n먼곳의 상태를 살피고 있다\n경계심이 강한 포켓몬이다"
          silver: "먼 곳까지 볼 수 있도록 꼬리를\n사용해서 선다  적을 발견하면\n큰 소리로 동료들에게 알린다"
furret:
  species_id: 162
  names:
    jp_kana: オオタチ
    en: FURRET
    fr: FOUINAR
    it: FURRET
    de: WIESENIOR
    es: FURRET
    ko: 다꼬리
  forms:
    furret:
      form_id: 0
      base_stats:
        hp: 85
        attack: 76
        defense: 64
        special_attack: 45
        special_defense: 55
        speed: 90
      types:
        - normal
      egg_groups:
        - field
      held_items:
        common: berry
        rare: gold_berry
      descriptions:
        jp_kana:
          gold: "ほそながい　からだの　かたちに\nあわせた　すを　つくり　ほかの\nポケモンは　はいれなくしている。"
          silver: "どこから　シッポか　よくわからない。\nてあしは　みじかいが　すばしっこく\nうごきまわって　コラッタを　おそう。"
        en:
          gold: "It makes a nest to\nsuit its long and\nskinny body. The\fnest is impossible\nfor other POKéMON\nto enter."
          silver: "There is no tell-\ning where the tail\nbegins. Despite\fits short legs, it\nis quick at hunt-\ning RATTATA."
        fr:
          gold: "Il fabrique un nid\nqui convient à son\ncorps très fin.\fIl est le seul à\npouvoir entrer\ndans ce nid."
          silver: "On ne peut déter-\nminer l’endroit où\ncommence la queue.\fIl est aussi bon\nchasseur qu’un\nRATTATA."
        it:
          gold: "Il suo nido è\nadatto al corpo\nlungo e magro.\fGli altri POKéMON\nnon riescono ad\nentrarci."
          silver: "Impossibile dire\ndove inizi la\ncoda. Nonostante\fle zampe corte, è\nveloce a cacciare\ni RATTATA."
        de:
          gold: "Sein Nest ist sei-\nnem schmalen und\ndünnen Körper an-\fgepasst. Kein\nanderes POKéMON\nkommt hinein."
          silver: "Niemand weiß, wo\nsein Schwanz be-\nginnt. Trotz sei-\fner kurzen Beine\njagt es RATTFRATZ\nschnell nach."
        es:
          gold: "Construye un nido\ndonde introducir\nsu largo y delgado\fcuerpo, en el que\nno pueden entrar\notros POKéMON."
          silver: "No se sabe dónde\ncomienza su cola.\nA pesar de sus\fcortas patas, es\nràpido en cazar\na RATTATA."
        ko:
          gold: "가늘고 긴 몸의 형태에\n맞춘 집을 만들어서 다른\n포켓몬은 들어오지 못하게 하고있다"
          silver: "어디서부터 꼬리인지 잘 모른다\n손발은 짧지만 재빠르게\n움직여서 꼬렛을 덮친다"
hoothoot:
  species_id: 163
  names:
    jp_kana: ホーホー
    en: HOOTHOOT
    fr: HOOTHOOT
    it: HOOTHOOT
    de: HOOTHOOT
    es: HOOTHOOT
    ko: 부우부
  forms:
    hoothoot:
      form_id: 0
      base_stats:
        hp: 60
        attack: 30
        defense: 30
        special_attack: 36
        special_defense: 56
        speed: 50
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          gold: "いつも　いっぽんあしで　たっている。\nあしを　いれかえる　しゅんかんは\nすばやくて　なかなか　みられない。"
          silver: "たいないの　じかんの　かんかくは\nどんなときでも　せいかくで\nきまった　りズムで　くびをかしげる。"
        en:
          gold: "It always stands\non one foot. It\nchanges feet so\ffast, the movement\ncan rarely be\nseen."
          silver: "It has a perfect\nsense of time.\nWhatever happens,\fit keeps rhythm by\nprecisely tilting\nits head in time."
        fr:
          gold: "Il se tient tou-\njours sur un pied.\nIl change de pied\fsi vite qu’on peut\nà peine distinguer\nce mouvement."
          silver: "Il a un sens du\ntiming parfait.\nIl reste toujours\fen rythme en ba-\nlançant sa tête."
        it:
          gold: "Sta sempre su un\npiede solo.\nCambia piede così\frapidamente che è\nraro vederlo\nmentre lo fa."
          silver: "Ha un eccezionale\nsenso del ritmo.\nTiene il tempo\fpiegando la testa\na intervalli\nregolari."
        de:
          gold: "Es steht immer auf\neinem Bein. Es\nwechselt sein\fStandbein so\nschnell, dass man\nes kaum sieht."
          silver: "Sein Zeitgefühl\nist perfekt. Was\nauch immer pas-\fsiert, es behält\nden Rhythmus, da\nsein Kopf wackelt."
        es:
          gold: "Camina con un\nsolo pie.\nCambia tan\fràpidamente de\npie que apenas\nse le ve."
          silver: "Su percepción del\ntiempo es exacta.\nOcurra lo que\focurra, lleva el\nritmo moviendo\nla cabeza."
        ko:
          gold: "항상 한 개의 다리로 서있다\n다리를 바꾸는 순간은\n너무 빨라서 눈에 잘 띄지 않는다"
          silver: "체내의 시간 감각은\n어느 때든 정확해서\n규칙적인 리듬으로 목을 기울인다"
noctowl:
  species_id: 164
  names:
    jp_kana: ヨルノズク
    en: NOCTOWL
    fr: NOARFANG
    it: NOCTOWL
    de: NOCTUH
    es: NOCTOWL
    ko: 야부엉
  forms:
