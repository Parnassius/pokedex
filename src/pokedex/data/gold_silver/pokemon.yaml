          silver: "Il est d’une\nnature joviale.\nDe nombreuses\ffemmes l’ap-\nprécient pour sa\ngentillesse."
        it:
          gold: "Nonostante l’\naspetto spaventoso\nè in realtà caro\fe affettuoso.\nÈ molto popolare\ntra le donne."
          silver: "Ha uno spirito at-\ntivo e giocoso.\nA molti piace gio-\fcherellare con lui\nper i suoi modi\naffettuosi."
        de:
          gold: "Obwohl es angst-\neinflößend aus-\nsieht, ist es sehr\fliebevoll und\nbei Frauen sehr\nbeliebt."
          silver: "Es ist von Natur\naus verspielt.\nEs tollt mit vie-\flen Frauen herum,\nda es ihnen zuge-\nneigt ist."
        es:
          gold: "Aunque parezca\naterrador, en\nrealidad es amable\fy afectuoso. Es\nmuy popular entre\nlas mujeres."
          silver: "Muy travieso\npor naturaleza,\na muchas mujeres\fles gusta jugar\ncon él porque es\nmuy cariñoso."
        ko:
          gold: "무서운 얼굴 표정이지만 마음은\n매우 상냥해서 여성들에게도\n매우 인기있는 포켓몬"
          silver: "활발하고 노는 것을 좋아하는 성격\n잘 따르기 때문에 함께\n놀고싶어하는 여성들이 많다"
granbull:
  species_id: 210
  names:
    jp_kana: グランブル
    en: GRANBULL
    fr: GRANBULL
    it: GRANBULL
    de: GRANBULL
