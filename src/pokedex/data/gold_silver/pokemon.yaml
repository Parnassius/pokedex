          silver: "Les MAGNETI sont\nunis par un mag-\nnétisme si puis-\fsant qu’il assèche\ntoute humidité\nà proximité."
        it:
          gold: "Tre MAGNEMITE sono\nuniti da un forte\ncampo magnetico.\fAvvicinandosi\ntroppo le orecchie\npossono fischiare."
          silver: "I MAGNEMITE sono\nuniti da un campo\nmagnetico così\fforte da seccare\nogni liquido\nnelle vicinanze."
        de:
          gold: "Drei MAGNETILOS\nsind durch ein\nMagnetfeld verbun-\fden. In seiner\nNähe bekommt man\nOhrenschmerzen."
          silver: "Die MAGNETILOS\nwerden von einem\nstarken Magnet-\ffeld zusammenge-\nhalten, das Feuch-\ntigkeit aufsaugt."
        es:
          gold: "Tres MAGNEMITE se\nenlazan por una\nintensa fuerza\fmagnética. Si te\nacercas, te\ndoleràn los oídos."
          silver: "Los MAGNEMITE\nestàn unidos por\nun magnetismo tan\ffuerte, que repele\nla humedad que hay\na su alrededor."
        ko:
          gold: "3개의 코일은 강한 자력으로\n묶여있다  가까이 다가가면\n강한 귀울림으로 공격받는다"
          silver: "상호간에 코일을 엮어서\n강력하게 만든 자력은 주변의\n수분을 건조하게 만들정도다"
farfetchd:
