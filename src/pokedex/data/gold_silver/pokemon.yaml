        it:
          gold: "Se agita le ali ad\naltissima velocità\npuò generare onde\fche distruggono i\nvetri delle fine-\nstre nella zona."
          silver: "I suoi grandi\nocchi vedono a 360\ngradi, cercando\fin ogni direzione\ninsetti da\ncatturare."
        de:
          gold: "Schlägt es schnell\nmit den Flügeln,\nerzeugt es Schock-\fwellen, durch die\nsogar Fenster\nzerbersten."
          silver: "Seine riesigen Au-\ngen verfügen über\neinen Blickwinkel\fvon 360 Grad. Es\nerspäht mit ihnen\nBeutetiere."
        es:
          gold: "Si aletea muy\nràpido, genera\nondas expansivas\fcapaces de hacer\nañicos todas las\nventanas próximas."
          silver: "Sus grandes ojos\npueden girar 360’v.\nMira en todas\fdirecciones en\nbusca de insectos\ncomo presa."
        ko:
          gold: "고속으로 날개를 치면\n충격파가 발생해서\n주변의 유리창이 깨진다"
          silver: "커다란 양쪽 눈으로 360도\n모든 방향을 멀리 살펴서\n먹이가 되는 벌레를 찾고 있다"
wooper:
