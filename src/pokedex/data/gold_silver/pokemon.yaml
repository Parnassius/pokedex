        es:
          gold: "Las BAYAS que\nalmacena en su\nconcha se\fdescomponen en\nun líquido\npegajoso."
          silver: "Almacena BAYAS\ndentro de su\nconcha. Para\fevitar ataques, se\nesconde inmóvil\nbajo las rocas."
        ko:
