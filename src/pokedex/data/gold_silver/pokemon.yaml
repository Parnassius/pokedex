      descriptions:
        jp_kana:
          gold: "つめたい　うみが　だいすき。\nちじょうでは　うまく　あるけないが\nすいちゅうなら　じゆうに　およげる。"
          silver: "ひるまは　あさい　かいていで\nねていることが　おおい。\nおよぐときは　はなのあなが　とじる。"
        en:
          gold: "Although it can’t\nwalk well on land,\nit is a graceful\fswimmer. It espe-\ncially loves being\nin frigid seas."
          silver: "In daytime, it is\noften found asleep\non the seabed in\fshallow waters.\nIts nostrils close\nwhile it swims."
        fr:
          gold: "Bien qu’il puisse\nmarcher sur la\nterre ferme, ce\fformidable nageur\npréfère les eaux\nfroides."
          silver: "De jour, il passe\nle plus clair de\nson temps à dormir\fdans des eaux peu\nprofondes."
        it:
          gold: "Sebbene poco abile\nsulla terraferma,\nè un elegante nuo-\ftatore. Apprezza\nparticolarmente i\nmari gelidi."
          silver: "Di giorno lo si\npuò trovare addor-\nmentato sul fondo\fdel mare in acque\nbasse. Se nuota\nchiude le narici."
        de:
          gold: "Obwohl es an Land\nnicht gut laufen\nkann, ist es ein\fgraziler Schwim-\nmer. Es liebt vor\nallem das Eismeer."
          silver: "Tagsüber ist es\nin Flussbetten\nflacher Gewässer\fzu finden. Es\nschließt unter\nWasser die Nase."
        es:
          gold: "Aunque torpe en\ntierra, es un\nhàbil nadador.\fLo que màs le\ngusta es nadar\nen mares helados."
          silver: "De día, puedes\nverlo dormido en\nel fondo de aguas\fpoco profundas.\nCierra sus fosas\nnasales al nadar."
        ko:
          gold: "차가운 바다를 좋아한다\n지상에서는 잘 걸을 수 없지만\n수중에선 자유롭게 헤엄칠 수 있다"
          silver: "낮에는 얕은 바다 밑에서\n자고있을 때가 많다\n헤엄칠 때는 콧구멍이 닫힌다"
dewgong:
  species_id: 87
  names:
    jp_kana: ジュゴン
    en: DEWGONG
    fr: LAMANTINE
    it: DEWGONG
    de: JUGONG
    es: DEWGONG
    ko: 쥬레곤
  forms:
    dewgong:
      form_id: 0
      base_stats:
        hp: 90
        attack: 70
        defense: 80
        special_attack: 70
        special_defense: 95
        speed: 70
      types:
        - water
        - ice
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          gold: "からだは　みずの　ていこうが\nすくない　りゅうせんけい。\nさむくなるほど　げんきが　でてくる。"
          silver: "こおりが　うかぶ　つめたい　うみが\nだいすき。ながいシッポは　むきを\nすばやく　かえるのに　やくだつ。"
        en:
          gold: "Its streamlined\nbody has little\ndrag in water.\fThe colder the\ntemperature, the\nfriskier it gets."
          silver: "It loves frigid\nseas with ice\nfloes. It uses its\flong tail to\nchange swimming\ndirection quickly."
        fr:
          gold: "Son corps hydro-\ndynamique glisse\ndans l’eau. Plus\fl’eau est froide\nplus il se sent à\nl’aise."
          silver: "Il aime les mers\nglaciales. Sa\nlongue queue lui\fpermet de changer\nde direction très\nvite."
        it:
          gold: "Il suo corpo affu-\nsolato ha poco\nattrito nell’\facqua. Le basse\ntemperature lo\nrendono vivace."
          silver: "Ama le acque geli-\nde, in cui galleg-\ngia il ghiaccio.\fMuovendo la coda,\npuò cambiare rapi-\ndamente direzione."
        de:
          gold: "Es verspürt kaum\nWiderstand im Was-\nser. Je niedriger\fdie Temperatur,\ndesto verspielter\nverhält es sich."
          silver: "Es liebt das Eis-\nmeer. Beim Schwim-\nmen setzt es sei-\fnen langen Schwanz\nein, um die Rich-\ntung zu ändern."
        es:
          gold: "Su aerodinàmico\ncuerpo avanza\nfàcilmente por el\fagua. Cuanto màs\nfría, màs\ndiversión."
          silver: "Adora los mares\nhelados con\ntémpanos. Usa su\flarga cola para\ncambiar de rumbo\nal nadar."
        ko:
          gold: "몸은 물의 저항이\n적은 유선형으로 되어있다\n추워질수록 기운이 솟아난다"
          silver: "얼음이 떠다니는 차가운 바다를\n좋아한다  긴 꼬리는 방향을\n재빨리 바꾸는데 도움이 된다"
grimer:
  species_id: 88
  names:
    jp_kana: ベトベター
    en: GRIMER
    fr: TADMORV
    it: GRIMER
    de: SLEIMA
    es: GRIMER
    ko: 질퍽이
  forms:
    grimer:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 25
      types:
        - poison
      egg_groups:
        - amorphous
      held_items:
        rare: nugget
      descriptions:
        jp_kana:
          gold: "とおったあとに　のこった　からだの\nいちぶから　また　べトベターがうまれ\nあたりは　いっそう　くさくなる。"
          silver: "ベトベターが　とおったあとは\nバイきん　だらけ　なので\nどんな　くさも　はえなくなる。"
        en:
          gold: "As it moves, it\nloses bits of its\nbody from which\fnew GRIMER emerge.\nThis worsens the\nstench around it."
          silver: "Wherever GRIMER\nhas passed, so\nmany germs are\fleft behind that\nno plants will\never grow again."
        fr:
          gold: "En se déplaçant il\nsème des parties\nde son corps qui\fdeviendront plus\ntard des TADMORV."
          silver: "Là où TADMORV\npasse, les plantes\ntrépassent et\fne repoussent plus\njamais."
        it:
          gold: "Muovendosi perde\npezzetti del pro-\nprio corpo, da cui\fnascono nuovi\nGRIMER. Così il\nfetore aumenta."
          silver: "Ovunque passi,\nGRIMER lascia così\ntanti germi che\fnessuna pianta\nvi potrà più\ncrescere."
        de:
          gold: "Bei jeder Bewegung\nverliert es Teile,\naus denen neue\fSLEIMAS entstehen.\nDies verschlimmert\nden Gestank."
          silver: "Egal, wo SLEIMA\nauch vorbeikommt,\nes hinterlässt so\fviele Keime, dass\ndort nie wieder\nPflanzen wachsen."
        es:
          gold: "Mientras se mueve,\npierde partes\nde su cuerpo, de\fdonde saldrà un\nnuevo GRIMER. Esto\naumenta su hedor."
          silver: "GRIMER deja tantos\ngérmenes por\ndonde pasa,\fque allí no\nvuelve a crecer\nninguna planta."
        ko:
          gold: "지나간 뒤에 남은 몸의\n일부에서 다시 질퍽이가 태어나\n주변은 더욱 썩은 냄새가 난다"
          silver: "질퍽이가 지나간 자리는\n세균 투성이기 때문에\n어떠한 잡초도 생기지 않게 된다"
muk:
  species_id: 89
  names:
    jp_kana: ベトベトン
    en: MUK
    fr: GROTADMORV
    it: MUK
    de: SLEIMOK
    es: MUK
    ko: 질뻐기
  forms:
    muk:
      form_id: 0
      base_stats:
        hp: 105
        attack: 105
        defense: 75
        special_attack: 65
        special_defense: 100
        speed: 50
      types:
        - poison
      egg_groups:
        - amorphous
      held_items:
        rare: nugget
      descriptions:
        jp_kana:
          gold: "ヘドロが　たまる　くさい　ばしょを\nこのんで　あつまってくるので\nあたりは　いっそう　くさくなる。"
          silver: "からだの　せいぶんは　もうどく。\nうっかり　ふれてしまうと\nねつを　だして　ねこんでしまう。"
        en:
          gold: "They love to gath-\ner in smelly areas\nwhere sludge ac-\fcumulates, making\nthe stench around\nthem worse."
          silver: "Its body is made\nof a powerful poi-\nson. Touching it\faccidentally will\ncause a fever that\nrequires bed rest."
        fr:
          gold: "Il recherche les\nendroits sales où\nil y a des ordures\fpour y établir son\nhabitat puant et\ndégueulasse."
          silver: "Son corps sécrète\nun puissant poison\npouvant causer de\fviolents accès de\nfièvre en cas de\ncontact."
        it:
          gold: "Amano riunirsi\nvicino a puzzolen-\nti liquami di\fscolo, rendendo il\nfetore ancora più\nintenso."
          silver: "Il corpo è fatto\ndi un potente\nveleno. Il\fcontatto causa la\nfebbre e obbliga\na stare a letto."
        de:
          gold: "Sie treffen sich\nan stinkenden\nOrten, an denen\fder Schleim sich\ntürmt. Dies merkt\nman am Gestank."
          silver: "Sein Körper be-\nsteht aus Gift.\nEine zufällige Be-\frührung reicht\naus, um fiebrig\nim Bett zu liegen."
        es:
          gold: "Les encanta\nreunirse en zonas\napestosas donde se\facumula el lodo,\nhaciendo su olor\nmàs insoportable."
          silver: "Su cuerpo està\nhecho de un veneno\nmuy potente.\fSi se toca, causa\nfiebre y obliga\na guardar cama."
        ko:
          gold: "진흙탕이 모인 썩은 장소를\n좋아해서 모여들기 때문에\n주변은 더욱 역겨운 냄새가 난다"
          silver: "몸의 성분은 맹독이다\n실수로 만지게 되면\n온몸에 열이 나서 눕게 되어버린다"
shellder:
  species_id: 90
  names:
    jp_kana: シェルダー
    en: SHELLDER
    fr: KOKIYAS
    it: SHELLDER
    de: MUSCHAS
    es: SHELLDER
    ko: 셀러
  forms:
    shellder:
      form_id: 0
      base_stats:
        hp: 30
        attack: 65
        defense: 100
        special_attack: 45
        special_defense: 25
        speed: 40
      types:
        - water
      egg_groups:
        - water_3
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          gold: "２まいのカラを　あけたり　とじたり\nすることで　うしろむきに　およぐ。\nそのスピードは　けっこう　はやい。"
          silver: "カラのなかに　たまった　すなつぶが\nシェルダーの　たいえきと　まじりあい\nきれいな　しんじゅが　うみだされる。"
        en:
          gold: "It swims facing\nbackward by open-\ning and closing\fits two-piece\nshell. It is\nsurprisingly fast."
          silver: "Grains of sand\ntrapped in its\nshells mix with\fits body fluids to\nform beautiful\npearls."
        fr:
          gold: "Il nage à l’envers\nen ouvrant et en\nrefermant sa\fcoquille. Il peut\natteindre une\ngrande vitesse."
          silver: "Les grains de\nsable coincés dans\nsa coquille mélan-\fgés à ses fluides\ncréent de superbes\nperles."
        it:
          gold: "Nuota all’indietro\naprendo e chiuden-\ndo le due parti\fdel guscio. È\nsorprendentemente\nrapido."
          silver: "La sabbia tratte-\nnuta dai gusci si\nmischia ai\ffluidi corporei\nformando perle\nbellissime."
        de:
          gold: "Es schwimmt auf\ndem Rücken, indem\nes seine Schalen-\fhälften öffnet und\nschließt. Es ist\nsehr schnell."
          silver: "Winzige Sandkörner\nin seiner Schale\nvermischen sich\fmit seinem Körper-\nsaft und daraus\nentstehen Perlen."
        es:
          gold: "Nada hacia atràs\nabriendo y\ncerrando su\fconcha. Es\nsorprendentemente\nràpido."
          silver: "Los granos de\narena atrapados\nen sus valvas se\fmezclan con sus\nfluidos corporales\npara crear perlas."
        ko:
          gold: "2개의 껍질을 열고 닫는\n것으로 뒷방향으로 헤엄친다\n그 스피드는 제법 빠르다"
          silver: "껍질 안에 모인 모래알이\n셀러의 체액과 섞여\n아름다운 진주를 만들어낸다"
cloyster:
  species_id: 91
  names:
    jp_kana: パルシェン
    en: CLOYSTER
    fr: CRUSTABRI
    it: CLOYSTER
    de: AUSTOS
    es: CLOYSTER
    ko: 파르셀
  forms:
    cloyster:
      form_id: 0
      base_stats:
        hp: 50
        attack: 95
        defense: 180
        special_attack: 85
        special_defense: 45
        speed: 70
      types:
        - water
        - ice
      egg_groups:
        - water_3
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          gold: "いちど　カラを　とじてしまうと\nどんな　かいりきの　もちぬしでも\nあけることは　ふかのうだ。"
          silver: "しおのながれが　はげしい　うみに\nせいそくしている　パルシェンの\nからのトゲは　おおきく　するどい。"
        en:
          gold: "Once it slams its\nshell shut, it is\nimpossible to\fopen, even by\nthose with superi-\nor strength."
          silver: "CLOYSTER that live\nin seas with harsh\ntidal currents\fgrow large, sharp\nspikes on their\nshells."
        fr:
          gold: "Quand il referme\nsa coquille, il\nest impossible de\fla rouvrir, même\navec une force\nhors du commun."
          silver: "Les KOKIYAS vivant\ndans des mers aux\ncourants forts\fdéveloppent des\ndards sur leur\ncoquille."
        it:
          gold: "Quando richiude il\nguscio nessuno\npuò aprirlo, nep-\fpure chi è dotato\ndi una forza\nstraordinaria."
          silver: "Ai CLOYSTER che\nvivono in mari con\nforti maree\fcrescono grandi\naculei affilati\nsui gusci."
        de:
          gold: "Ist seine Muschel\nerst geschlossen,\nist es selbst mit\fviel Kraft nicht\nmehr möglich,\ndiese zu öffnen."
          silver: "AUSTOS, die im\nMeer mit star-\nker Stömung leben,\fwerden groß und\nentwickeln scharfe\nStacheln."
        es:
          gold: "Cuando cierra de\ngolpe su concha\nserà imposible\fabrirla, hasta\npor los màs\nfuertes."
          silver: "A los CLOYSTER que\nviven en las\nfuertes corrientes\fmarinas les crecen\nlargas y afiladas\npùas en la concha."
        ko:
          gold: "한번 껍질을 닫아버리면\n어떠한 괴력을 소유한 자도\n여는 것은 불가능하다"
          silver: "조수의 흐름이 격한 바다에\n서식하고 있는 파르셀의\n껍질의 가시는 크고 날카롭다"
gastly:
  species_id: 92
  names:
    jp_kana: ゴース
    en: GASTLY
    fr: FANTOMINUS
    it: GASTLY
    de: NEBULAK
    es: GASTLY
    ko: 고오스
  forms:
    gastly:
      form_id: 0
      base_stats:
        hp: 30
        attack: 35
        defense: 30
        special_attack: 100
        special_defense: 35
        speed: 80
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "うすい　ガスのような　からだで\nどこにでも　しのびこむが\nかぜが　ふくと　ふきとばされる。"
          silver: "ガスでできた　うすい　からだは\nどんな　おおきさの　あいても\nつつみこみ　いきのねを　とめる。"
        en:
          gold: "With its gas-like\nbody, it can sneak\ninto any place it\fdesires. However,\nit can be blown\naway by wind."
          silver: "Its thin body is\nmade of gas. It\ncan envelop an\fopponent of any\nsize and cause\nsuffocation."
        fr:
          gold: "Son corps gazéi-\nforme lui permet\nde se dissimuler\fn’importe où, mais\nle vent peut le\ndéloger."
          silver: "Son corps est\ncomposé de gaz.\nIl peut ainsi\fenvelopper un ad-\nversaire et le\nfaire suffoquer."
        it:
          gold: "Il suo corpo gas-\nsoso può infilarsi\novunque.\fTuttavia un colpo\ndi vento lo può\nspazzare via."
          silver: "Il suo corpo\nsottile è fatto\ndi gas. Avvolge\fnemici di ogni\ndimensione,\nsoffocandoli."
        de:
          gold: "Aufgrund seines\nGas-Körpers kommt\nes an jeden Ort.\fEs kann jedoch\nvom Wind davon-\ngeweht werden."
          silver: "Es hat einen gas-\nförmigen Körper.\nEs kann jeden Geg-\fner mit Giftgas\neinnebeln und\ndadurch ersticken."
        es:
          gold: "Con su cuerpo\ngaseoso puede\ncolarse por donde\fquiera, aunque con\nun golpe de viento\nsaldría despedido."
          silver: "Su delgado cuerpo\nestà hecho de gas.\nPuede envolver a\fun oponente de\ncualquier tamaño\nhasta ahogarlo."
        ko:
          gold: "옅은 가스 같은 몸으로\n어디든지 숨어들지만\n바람이 불면 날려가버린다"
          silver: "가스로 만들어진 몸은\n어떠한 크기의 상대도\n둘러싸서 숨을 못 쉬게 한다"
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
    en: HAUNTER
    fr: SPECTRUM
    it: HAUNTER
    de: ALPOLLO
    es: HAUNTER
    ko: 고우스트
  forms:
    haunter:
      form_id: 0
      base_stats:
        hp: 45
        attack: 50
        defense: 45
        special_attack: 115
        special_defense: 55
        speed: 95
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "ほんとうに　なにも　みえない\nくらやみで　ゴーストは　しずかに\nえものを　ねらっているのだ。"
          silver: "ガスじょうの　したで　なめられると\nからだの　ふるえが　とまらなくなり\nやがては　し　に　いたるという。"
        en:
          gold: "In total darkness,\nwhere nothing is\nvisible, HAUNTER\flurks, silently\nstalking its next\nvictim."
          silver: "Its tongue is made\nof gas. If licked,\nits victim starts\fshaking constantly\nuntil death even-\ntually comes."
        fr:
          gold: "Dans les ténébres\nobscures, là où on\nne voit rien, il\fse déplace en\nsilence à l’affût\nde sa proie."
          silver: "Sa langue est\nde gaz. Si léchée,\nla cible est prise\fde tremblements\njusqu’à ce que\nmort s’en suive."
        it:
          gold: "Nella totale oscu-\nrità, dove non si\nvede nulla,\fHAUNTER s’avvicina\nfurtivamente alla\nprossima vittima."
          silver: "La sua lingua è\ngassosa. Se la\nvittima viene\fleccata, si agita\nfino a cadere\nsfinita."
        de:
          gold: "ALPOLLO wartet in\nder Finsternis\nauf seine Opfer.\fEs lauert ihnen\nauf und stellt\nihnen nach."
          silver: "Seine Zunge ist\naus Gas. Leckt es\nan einem Gegner,\fzittert er und\nverliert eventuell\ndas Bewusstsein."
        es:
          gold: "En la oscuridad\ntotal, donde no\nse ve nada,\fHAUNTER acecha\na su próxima\nvíctima."
          silver: "Su lengua està\nhecha de gas. Si\nlame a su víctima,\fésta sufrirà cons-\ntantes temblores\nhasta que muere."
        ko:
          gold: "정말 아무것도 보이지 않는\n어둠속에서 고우스트는 조용히\n먹이를 노리고 있다"
          silver: "가스로 되어진 혀로 핥게되면\n몸의 떨림이 멈추지 않게 되어\n결국에는 죽음에 이르게 된다"
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
    en: GENGAR
    fr: ECTOPLASMA
    it: GENGAR
    de: GENGAR
    es: GENGAR
    ko: 팬텀
  forms:
    gengar:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 75
        speed: 110
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "まわりの　ねつを　うばっている。\nとつぜん　さむけが　するのは\nゲンガーが　あらわれたからだ。"
          silver: "いのちを　うばおうと　きめた\nえものの　かげに　もぐりこみ\nじっと　チャンスを　ねらってる。"
        en:
          gold: "It steals heat\nfrom its surround-\nings. If you feel\fa sudden chill, it\nis certain that a\nGENGAR appeared."
          silver: "To steal the life\nof its target, it\nslips into the\fprey’s shadow and\nsilently waits for\nan opportunity."
        fr:
          gold: "Il capture la\nchaleur de son\nentourage. Quand\fl’air se rafraî-\nchit, c’est que\nECTOPLASMA est là."
          silver: "Il se cache dans\nl’ombre de sa vic-\ntime pour, le\fmoment venu, lui\nvoler son énergie\nvitale."
        it:
          gold: "Assorbe calore\ndall’ambiente. Se\nsi sente un brivi-\fdo di gelo improv-\nviso, è senz’altro\napparso un GENGAR."
          silver: "Per sottrarre vita\nalla vittima si\nnasconde nella sua\fombra e attende in\nsilenzio il\nmomento opportuno."
        de:
          gold: "Es entzieht seiner\nUmgebung Wärme.\nWird dir plötzlich\fkalt, ist bestimmt\nein GENGAR in der\nNähe."
          silver: "Um den Gegner zu\nbesiegen, stellt\nes sich in deren\fSchatten und war-\ntet auf eine güns-\ntige Gelegenheit."
        es:
          gold: "Roba el calor de\nsus alrededores.\nSi sientes un\fescalofrío, seguro\nque hay algùn\nGENGAR cerca."
          silver: "Para quitar la\nvida a su presa,\nse desliza en su\fsombra y espera\nsu oportunidad\nen silencio."
        ko:
          gold: "주변의 열을 빼앗고 있다\n갑자기 한기가 느껴지는 것은\n팬텀이 나타났기 때문이다"
          silver: "생명을 빼앗으려고 정한\n먹이의 그림자에 숨어들어\n꼼짝않고 기회를 노리고 있다"
onix:
  species_id: 95
  names:
    jp_kana: イワーク
    en: ONIX
    fr: ONIX
    it: ONIX
    de: ONIX
    es: ONIX
    ko: 롱스톤
  forms:
    onix:
      form_id: 0
      base_stats:
        hp: 35
        attack: 45
        defense: 160
        special_attack: 30
        special_defense: 45
        speed: 70
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          gold: "からだを　くねらせ　よじらせ\nちちゅうを　ほりすすむ　おとは\nはるか　とおくまで　なりひびく。"
          silver: "おおきく　じょうぶな　からだを\nくねらせ　よじらせ　じそく８０キロで\nじめんを　いきおいよく　ほりすすむ。"
        en:
          gold: "It twists and\nsquirms through\nthe ground. The\fthunderous roar of\nits tunneling\nechoes a long way."
          silver: "It rapidly bores\nthrough the ground\nat 50 mph by\fsquirming and\ntwisting its mas-\nsive, rugged body."
        fr:
          gold: "Il se trémousse et\nse convulse sur le\nsol. Le son qu’il\fproduit en creu-\nsant la terre\nrésonne très loin."
          silver: "Il creuse dans le\nsol à une vitesse\nde 80 km/h en\fcontorsionnant son\nimmense corps de\npierre."
        it:
          gold: "Si contorce e si\ndimena attraverso\nil terreno.\fIl cupo boato del\nsuo scavare giunge\nmolto lontano."
          silver: "Si fa strada nel\nterreno fino ad\n80 km/h contorcen-\fdosi e agitando il\ncorpo grande e\npossente."
        de:
          gold: "Es gräbt sich\ndurchs Erdreich.\nDas laute Bohren,\fwenn es einen Tun-\nnel gräbt, ist von\nWeitem zu hören."
          silver: "Es bohrt sich mit\n80 km/h durch das\nErdreich, indem es\fseinen massiven,\nrauhen Körper\ndreht und windet."
        es:
          gold: "Gira y se retuerce\nbajo la tierra.\nEl atronador\frugido de su\nexcavación resuena\na lo lejos."
          silver: "Perfora el suelo\nràpidamente, a\n80 km/h, girando\fy retorciendo\nsu robusto y\nenorme cuerpo."
        ko:
          gold: "몸을 구부리고 비틀어서\n땅속을 파고 지나가는 소리는\n아주 먼 곳까지 울려퍼진다"
          silver: "크고 튼튼한 몸을\n뒤틀어서 땅을 파며\n시속 80km로 땅속을 전진한다"
drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
    en: DROWZEE
    fr: SOPORIFIK
    it: DROWZEE
    de: TRAUMATO
    es: DROWZEE
    ko: 슬리프
  forms:
    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
        defense: 45
        special_attack: 43
        special_defense: 90
        speed: 42
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "たのしいユメを　みていたはずなのに\nどんなユメか　おもいだせないとき。\nきっと　スリープに　たべられたのだ。"
          silver: "たべたユメは　ぜんぶ　おぼえている。\nこどもの　ユメのほうが　おいしいので\nめったに　おとなの　ユメはたべない。"
        en:
          gold: "If you think that\nyou had a good\ndream, but you\fcan’t remember it,\na DROWZEE has\nprobably eaten it."
          silver: "It remembers every\ndream it eats. It\nrarely eats the\fdreams of adults\nbecause children’s\nare much tastier."
        fr:
          gold: "Si vous pensez\navoir rêvé mais\nque vous ne vous\fen souvenez pas,\nc’est que SOPORI-\nFIK a tout mangé."
          silver: "Il se souvient de\ntous les rêves\nqu’il a avalés. Il\fpréfère les rêves\nplus goûtus des\nenfants."
        it:
          gold: "Se si pensa di\naver fatto un bel\nsogno, ma non lo\fsi ricorda, proba-\nbilmente l’ha man-\ngiato un DROWZEE."
          silver: "Ricorda ogni\nsingolo sogno che\nmangia. Preferisce\fquelli dei bambini\nperché sono molto\npiù gustosi."
        de:
          gold: "Hast du gut ge-\nträumt und kannst\ndich nicht erin-\fnern, hat ein\nTRAUMATO deinen\nTraum gefressen."
          silver: "Es kann sich an\njeden gefressenen\nTraum erinnern.\fDie Träume von\nKindern bekommen\nihm besser."
        es:
          gold: "Si crees haber\ntenido un buen\nsueño, y no puedes\facordarte, seguro\nque se lo ha\ncomido un DROWZEE."
          silver: "Recuerda todos los\nsueños que come.\nRaramente come\fsueños de adultos,\nporque los de los\nniños son mejores."
        ko:
          gold: "즐거운 꿈을 꾸고 있었지만\n어떤 꿈인지 생각나지 않을 때는\n슬리프가 그 꿈을 먹었을 것이다"
          silver: "먹어치운 꿈은 전부 기억하고 있다\n아이들의 꿈쪽이 맛있기 때문에\n좀처럼 어른들의 꿈은 먹지 않는다"
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
    en: HYPNO
    fr: HYPNOMADE
    it: HYPNO
    de: HYPNO
    es: HYPNO
    ko: 슬리퍼
  forms:
    hypno:
      form_id: 0
      base_stats:
        hp: 85
        attack: 73
        defense: 70
        special_attack: 73
        special_defense: 115
        speed: 67
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "とても　おなかが　すいてると\nであった　にんげんを　むりやり\nねむらせ　ユメを　たべてしまう。"
          silver: "どんなときでも　もっている　ふりこを\nきまったりズムで　ゆらしている。\nちかよると　なぜか　ねむくなる。"
        en:
          gold: "When it is very\nhungry, it puts\nhumans it meets to\fsleep, then it\nfeasts on their\ndreams."
          silver: "Always holding a\npendulum that it\nrocks at a steady\frhythm, it causes\ndrowsiness in any-\none nearby."
        fr:
          gold: "S’il est affamé,\nil endort les\nhumains qu’il\frencontre pour\nse repaître de\nleurs rêves."
          silver: "Il a un pendule\nqui va et vient\nde façon régulière\fet qui peut endor-\nmir les ennemis\naux alentours."
        it:
          gold: "Quando ha molta\nfame addormenta\ngli umani che\fincontra, per poi\nmangiare i loro\nsogni."
          silver: "Il pendolo che ha\nsempre con sé e\nche agita sempre\fallo stesso ritmo\nfa assopire\nchiunque lo veda."
        de:
          gold: "Wenn es hungrig\nist, versetzt es\ndie Menschen, die\fes trifft in\nSchlaf, um ihre\nTräume zu fressen."
          silver: "Es hält immer ein\nPendel, das es\nständig bewegt.\fDas verursacht bei\njedem in seiner\nNähe Müdigkeit."
        es:
          gold: "Cuando està muy\nhambriento, duerme\na los humanos que\fencuentra para\npoder devorar\nsus sueños."
          silver: "Lleva siempre un\npéndulo que oscila\na un ritmo\fconstante. Éste\ncausa sueño a\nsu alrededor."
        ko:
          gold: "매우 배가 고파있을 때\n만난 인간을 강제로\n잠재워 꿈을 먹어치운다"
          silver: "항상 지니고 있는 추를\n규칙적인 리듬으로 흔들고 있다\n가까이 가면 어쩐지 졸립다"
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
    en: KRABBY
    fr: KRABBY
    it: KRABBY
    de: KRABBY
    es: KRABBY
    ko: 크랩
  forms:
    krabby:
      form_id: 0
      base_stats:
        hp: 30
        attack: 105
        defense: 90
        special_attack: 25
        special_defense: 25
        speed: 50
      types:
        - water
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          gold: "きけんがせまると　くちから　はきだす\nあわで　ぜんしんを　つつんで\nからだを　おおきく　みせようとする。"
          silver: "ハサミは　かんたんに　もげる。\nハサミが　なくなると　どうしてだか\nよこあるき　できなくなってしまう。"
        en:
          gold: "If it senses dan-\nger approaching,\nit cloaks itself\fwith bubbles from\nits mouth so it\nwill look bigger."
          silver: "The pincers break\noff easily. If it\nloses a pincer,\fit somehow becomes\nincapable of walk-\ning sideways."
        fr:
          gold: "S’il est menacé,\nil se cache der-\nrière les bulles\fémises par sa\nbouche pour pa-\nraître plus gros."
          silver: "Ses pinces sont\nfragiles. S’il en\nperd une, il\fn’arrive plus à\nmarcher de côté."
        it:
          gold: "Se si sente in\npericolo, si\ncirconda di bolle\fche produce con la\nbocca per sembrare\npiù grande."
          silver: "Le chele si rompo-\nno facilmente. Se\nne perde una\fdiventa incapace\ndi camminare\nlateralmente."
        de:
          gold: "Bei Gefahr tarnt\nes sich, indem es\nsich in Blasen aus\fseinem Maul\nhüllt, um größer\nzu erscheinen."
          silver: "Seine Scheren bre-\nchen leicht ab.\nWenn es eine ver-\fliert, kann es\nnicht mehr seit-\nwärts laufen."
        es:
          gold: "Ante el peligro,\nse camufla con\nlas burbujas\fque desprende su\nboca, para parecer\nmàs grande."
          silver: "Sus pinzas se\nrompen fàcilmente.\nSi pierde una,\faparentemente se\nvuelve incapaz de\ncaminar de lado."
        ko:
          gold: "위험이 닥치면 입에서 뿜어내는\n거품으로 전신을 감싸서\n몸을 크게 보이려고 한다"
          silver: "집게는 간단하게 분리된다\n집게가 없어지면 어째서인지\n게걸음을 하지 못하게 된다"
kingler:
  species_id: 99
  names:
    jp_kana: キングラー
    en: KINGLER
    fr: KRABBOSS
    it: KINGLER
    de: KINGLER
    es: KINGLER
    ko: 킹크랩
  forms:
    kingler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 130
        defense: 115
        special_attack: 50
        special_defense: 50
        speed: 75
      types:
        - water
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          gold: "あまりにも　おおきくなりすぎた\nはさみは　もちあげるのが　やっとで\nねらいなんか　うまく　つけられない。"
          silver: "ぶかっこうに　おおきくなった\nハサミを　いきおいよく　もちあげると\nバランスがくずれ　よたついてしまう。"
        en:
          gold: "It can hardly\nlift its massive,\novergrown pincer.\fThe pincer’s size\nmakes it difficult\nto aim properly."
          silver: "Its pincers grow\npeculiarly large.\nIf it lifts the\fpincers too fast,\nit loses its bal-\nance and staggers."
        fr:
          gold: "Il soulève péni-\nblement son émorme\npince. Elle est si\fgrosse, qu’il lui\nest difficile de\nbien viser avec."
          silver: "Ses pinces devien-\nnent énormes. S’il\nles soulève trop\fvite, il risque\nde perdre\nl’équilibre."
        it:
          gold: "Gli è difficile\nsollevare le sue\nenormi chele. La\fdimensione rende\ndifficile usarle\nefficacemente."
          silver: "Le sue chele sono\nparticolarmente\nlarghe. Se le alza\ftroppo rapidamente\nperde l’equilibrio\ne vacilla."
        de:
          gold: "Es kann seine\nRiesenscheren kaum\nheben. Die Größe\fseiner Scheren\nerschwert ihm\ndas Zielen."
          silver: "Seine Scheren wer-\nden sehr groß.\nHebt es sie zu\fschnell, verliert\nes die Balance und\nstrauchelt."
        es:
          gold: "Le cuesta levantar\nsu exagerada y\ndesproporcionada\fpinza. Su tamaño\nle impide apuntar\ncorrectamente."
          silver: "Sus pinzas son muy\ngrandes. Si las\nlevanta demasiado\fràpido, pierde\nel equilibrio\ny se tambalea."
        ko:
          gold: "지나치게 크게 자란\n집게는 들어올릴 수는 있지만 \n생각한대로 잘 사용할 수 없다"
          silver: "볼품없이 크게 자라난\n집게를 위세좋게 들고 걷다보면\n중심을 잡지 못해서 뒤뚱거리게된다"
voltorb:
  species_id: 100
  names:
    jp_kana: ビリリダマ
    en: VOLTORB
    fr: VOLTORBE
    it: VOLTORB
    de: VOLTOBAL
    es: VOLTORB
    ko: 찌리리공
  forms:
    voltorb:
      form_id: 0
      base_stats:
        hp: 40
        attack: 30
        defense: 50
        special_attack: 55
        special_defense: 55
        speed: 100
      types:
        - electric
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          gold: "ころがって　いどう　するので\nじめんが　でこぼこ　だと\nショックで　ばくはつ　してしまう。"
          silver: "モンスターボールが　うりだされたのと\nおなじ　じきに　はっけんされた。\nなにか　かんけいがある　といわれる。"
        en:
          gold: "It rolls to move.\nIf the ground is\nuneven, a sudden\fjolt from hitting\na bump can cause\nit to explode."
          silver: "It was discovered\nwhen POKé BALLS\nwere introduced.\fIt is said that\nthere is some\nconnection."
        fr:
          gold: "Il se déplace en\nroulant. S’il\ntrébuche sur une\faspérité, un\néclair jaillit et\nil explose."
          silver: "Découvert en même\ntemps que les\nPOKé BALLS. Il\fparaît qu’il\nexiste un lien\nentre les deux."
        it:
          gold: "Rotola. Se il\nterreno è\nirregolare,\fpuò esplodere all’\nimprovviso scon-\ntrando una gobba."
          silver: "Scoperto all’epoca\ndell’invenzione\ndelle POKé BALL.\fSi pensa che i\ndue fatti siano\ncorrelati."
        de:
          gold: "Es bewegt sich\nrollend fort.\nRollt es gegen ein\fHindernis, kann\nes plötzlich\nexplodieren."
          silver: "Es wurde entdeckt,\nals man POKéBÄLLE\neinführte. Es\fscheint, als gäbe\nes da einen Zusam-\nmenhang."
        es:
          gold: "Se mueve rodando.\nSi el terreno es\nirregular, una\fchispa provocada\npor algùn bache\nlo haría explotar."
          silver: "Fue descubierto\ncuando se crearon\nlas POKé BALL.\fSe dice que\ntienen algo\nque ver con ellas."
        ko:
          gold: "굴러서 이동하기 때문에\n지면이 울퉁불퉁하면\n충격으로 폭발해버린다"
          silver: "몬스터볼이 팔리기 시작했을 때와\n같은 시기에 발견되었다\n뭔가 관계가 있다고 전해진다"
electrode:
  species_id: 101
  names:
    jp_kana: マルマイン
    en: ELECTRODE
    fr: ELECTRODE
    it: ELECTRODE
    de: LEKTROBAL
    es: ELECTRODE
    ko: 붐볼
  forms:
    electrode:
      form_id: 0
      base_stats:
        hp: 60
        attack: 50
        defense: 70
        special_attack: 80
        special_defense: 80
        speed: 140
      types:
        - electric
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          gold: "たいりょうの　でんきエネルギーを\nもてあまし　ひまに　なると\nばくはつして　あそぶので　きけん。"
          silver: "あふれるほどの　でんきエネルギーを\nたいないに　ためこんでいるので\nすこしの　しげきで　ばくはつする。"
        en:
          gold: "It is dangerous.\nIf it has too much\nelectricity and\fhas nothing to do,\nit amuses itself\nby exploding."
          silver: "It stores an over-\nflowing amount of\nelectric energy\finside its body.\nEven a small shock\nmakes it explode."
        fr:
          gold: "Il est dangereux.\nS’il est trop\nchargé en électri-\fcité et qu’il\ns’ennuit, il\nexplose."
          silver: "Il stocke tel-\nlement d’énergie\ndans son corps\fqu’une simple\nsecousse peut le\nfaire exploser."
        it:
          gold: "È pericoloso.\nSe ha troppa\nelettricità e non\fha di meglio da\nfare, si diverte\nad esplodere."
          silver: "Immagazzinando\nelettricità in\nsovrabbondanza,\fesplode alla\nminima\nprovocazione."
        de:
          gold: "Es ist gefährlich.\nBesitzt es zu viel\nElektrizität und\fFreizeit, amüsiert\nes sich, indem\nes explodiert."
          silver: "Es speichert eine\nriesige Menge\nElektrizität in\fseinem Körper. Es\nexplodiert beim\nkleinsten Ruck."
        es:
          gold: "Es peligroso. Si\nalmacena mucha\nelectricidad y\festà ocioso,\nse entretiene\nexplosionando."
          silver: "Almacena una\nenorme cantidad\nde electricidad en\fsu cuerpo. Una\npequeña sacudida\nle harà explotar."
        ko:
          gold: "대량의 전기 에너지를\n지니고 있어서 한가해지면\n폭발을 하며 놀기 때문에 위험하다"
          silver: "넘칠 정도의 전기에너지를\n체내에 모으고있기 때문에\n약간의 자극만으로도 폭발한다"
exeggcute:
  species_id: 102
  names:
    jp_kana: タマタマ
    en: EXEGGCUTE
    fr: NOEUNOEUF
    it: EXEGGCUTE
    de: OWEI
    es: EXEGGCUTE
    ko: 아라리
  forms:
    exeggcute:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 80
        special_attack: 60
        special_defense: 45
        speed: 40
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "ひょうめんは　けっこう　かたい。\nひびわれても　なかみが　こぼれたり\nすることなく　いきていける。"
          silver: "タマタマだけに　つたわる\nテレパシーを　だしあっているので\nどんなときでも　６ぴき　あつまれる。"
        en:
          gold: "The shell is very\ndurable. Even if\nit cracks, it can\fsurvive without\nspilling the\ncontents."
          silver: "Using telepathy\nonly they can\nreceive, they\falways form a\ncluster of six\nEXEGGCUTE."
        fr:
          gold: "Sa coquille est\ntrès résistante.\nSi elle est fendue\fil peut survivre\nen gardant son\nintégrité."
          silver: "En utilisant leurs\npouvoirs télépa-\nthiques, ils\fforment des\ngrappes de six\nNOEUNOEUF."
        it:
          gold: "Ha un guscio\nmolto resistente.\nAnche se si rompe,\fsopravvive senza\nperdere il\ncontenuto."
          silver: "Con un richiamo\ntelepatico che\nsolo loro possono\fricevere, formano\nun gruppo di sei\nEXEGGCUTE."
        de:
          gold: "Seine Schale ist\nsehr hart. Selbst\nRisse darin scha-\fden ihm nicht, da\nes sein Inneres\nnicht verschüttet."
          silver: "Mit Telepathie,\ndie nur sie\nverstehen, bilden\fsie stets eine\nGruppe von sechs\nOWEIS."
        es:
          gold: "Su càscara es muy\nresistente. Si\nllega a romperse,\fpodría sobrevivir\nsi evita derramar\nsu contenido."
          silver: "Usan poderes\ntelepàticos\nentre ellos\fpara reunirse en\ngrupos de seis\nEXEGGCUTE."
        ko:
          gold: "표면은 제법 단단하다\n금이 생겨도 내용물이 흐르거나\n하는 것 없이 살아갈 수 있다"
          silver: "아라리에게만 전해지는\n텔레파시를 주고받고 있어서\n어떤 때든 6마리가 함께 모여있다"
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
    en: EXEGGUTOR
    fr: NOADKOKO
    it: EXEGGUTOR
    de: KOKOWEI
    es: EXEGGUTOR
    ko: 나시
  forms:
    exeggutor:
      form_id: 0
      base_stats:
        hp: 95
        attack: 95
        defense: 85
        special_attack: 125
        special_defense: 65
        speed: 55
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "３つの　あたまは　かんがえることは\nべつべつでも　なかよし　なので\nケンカしたり　しないらしい。"
          silver: "おちた　あたまは　タマタマとして\nなかまを　さがすため　とくしゅな\nテレパシーを　だしはじめる。"
        en:
          gold: "Its three heads\nthink independent-\nly. However, they\fare friendly and\nnever appear to\nsquabble."
          silver: "If a head drops\noff, it emits a\ntelepathic call in\fsearch of others\nto form an\nEXEGGCUTE cluster."
        fr:
          gold: "Ses trois têtes\nsont autonomes.\nElles semblent,\ftoutefois, en\nharmonie et ne se\ndisputent jamais."
          silver: "Si une des têtes\ntombe, il émet un\nappel télépathique\fpour reconstituer\nla grappe de\nNOEUNOEUF."
        it:
          gold: "Ha tre teste che\nragionano\nautonomamente. Ma\fsono amichevoli e\nnon litigano mai\ntra di loro."
          silver: "Se una testa cade,\nemette un ri-\nchiamo telepatico\fper formare un\ngruppo di\nEXEGGCUTE."
        de:
          gold: "Seine drei Köpfe\ndenken unabhängig\nvoneinander. Den-\fnoch sind sie\nnett zueinander\nund streiten nie."
          silver: "Fällt einer der\nKöpfe ab, sendet\ner Telepathiewel-\flen aus, um mit\nanderen OWEIS eine\nGruppe zu bilden."
        es:
          gold: "Sus tres cabezas\npiensan de forma\nindependiente.\fSin embargo, son\namigas y no suelen\ndiscutir nunca."
          silver: "Si se le cae una\ncabeza, emite una\nseñal telepàtica\fpara buscar a màs\ny formar un grupo\nde EXEGGCUTE."
        ko:
          gold: "3개의 머리는 생각하는 것이\n따로따로 지만 사이가 좋기에\n싸우는 일은 없다는 것 같다"
          silver: "떨어진 머리는 아라리가 되어서\n동료를 찾기 위해 특수한\n텔레파시를 내기 시작한다"
cubone:
  species_id: 104
  names:
    jp_kana: カラカラ
    en: CUBONE
    fr: OSSELAIT
    it: CUBONE
    de: TRAGOSSO
    es: CUBONE
    ko: 탕구리
  forms:
    cubone:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 95
        special_attack: 40
        special_defense: 50
        speed: 35
      types:
        - ground
      egg_groups:
        - monster
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          gold: "かなしいとき　さみしいとき\nかぶっている　ホネが　ゆれて\nはかなく　せつない　おとがする。"
          silver: "しにわかれた　ははおやの　ホネを\nいつも　かぶっているので\nすがおが　どんなふうか　わからない。"
        en:
          gold: "If it is sad or\nlonely, the skull\nit wears shakes,\fand emits a plain-\ntive and mournful\nsound."
          silver: "It always wears\nthe skull of its\ndead mother, so no\fone has any idea\nwhat its hidden\nface looks like."
        fr:
          gold: "S’il est triste et\nseul, le crâne\nqu’il porte se met\fà bouger. Il émet\nalors un son\nplaintif."
          silver: "Il porte constam-\nment le crâne de\nsa mère. Personne\fne sait à quoi il\nressemble sans ce\ncrâne."
        it:
          gold: "Se è stanco o si\nsente solo, il\nteschio che ha in\ftesta vibra ed\nemette un suono\nlamentoso."
          silver: "Indossa sempre il\nteschio della\nmamma morta:\fnessuno l’ha mai\npotuto vedere in\nfaccia."
        de:
          gold: "Ist es einsam oder\ntraurig, wackelt\nder Schädel den es\fträgt und man hört\nes jammern und\nwimmern."
          silver: "Es trägt immer den\nSchädel seiner\nverstorbenen Mut-\fter. Darum weiß\nniemand, wie sein\nGesicht aussieht."
        es:
          gold: "Si està triste o\nsolitario, agita\nla calavera y\femite un sonido\nlùgubre y\nlastimero."
          silver: "Siempre lleva la\ncalavera de su\ndifunta madre, así\fque nadie sabe\ncómo es su\ncara oculta."
        ko:
          gold: "슬플 때와 외로울 때에는\n뒤집어쓴 해골이 흔들려\n덧없고 허무한 소리가 난다"
          silver: "죽은 어미의 해골을\n항상 뒤집어쓰고 있어서\n얼굴이 어떻게 생겼는지 모른다"
marowak:
  species_id: 105
  names:
    jp_kana: ガラガラ
    en: MAROWAK
    fr: OSSATUEUR
    it: MAROWAK
    de: KNOGGA
    es: MAROWAK
    ko: 텅구리
  forms:
    marowak:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 110
        special_attack: 50
        special_defense: 80
        speed: 45
      types:
        - ground
      egg_groups:
        - monster
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          gold: "もっている　ホネで　いしをたたいて\nおとをだし　なかまに　れんらくする\nようすが　もくげき　された。"
          silver: "どこからか　ホネを　ひろってくる。\nせかいの　どこかに　ガラガラだけの\nはかばが　あるという　ウワサだ。"
        en:
          gold: "It has been seen\npounding boulders\nwith the bone it\fcarries in order\nto tap out mes-\nsages to others."
          silver: "It collects bones\nfrom an unknown\nplace. A MAROWAK\fgraveyard exists\nsomewhere in the\nworld, rumors say."
        fr:
          gold: "Il projette des\nrochers avec sa\nmassue-os pour\fenvoyer des mes-\nsages à ses com-\npagnons éloignés."
          silver: "Il collectionne\ndes os. Il paraît\nqu’il existe un\fcimetière\nd’OSSATUEUR\nquelque part..."
        it:
          gold: "È stato visto\ncolpire massi\ncon l’osso che\fimpugna, per\ntrasmettere\nmessaggi."
          silver: "Raccoglie ossa da\nun luogo scono-\nsciuto. Si dice\fche da qualche\nparte ci sia un\ncimitero MAROWAK."
        de:
          gold: "Es schlägt mit dem\nKnochen in seiner\nHand gegen Felsen,\fum anderen\nBotschaften\nzu übermitteln."
          silver: "Es sammelt Knochen\nan geheimen Orten.\nEs soll irgendwo\feine Begräbnis-\nstätte für\nKNOGGAS geben."
        es:
          gold: "Se le ha visto\ngolpeando rocas\ncon el hueso\fque lleva, para\nenviar mensajes\na los demàs."
          silver: "Recoge huesos de\nalgùn lugar.\nDicen que existe\fun cementerio\nde MAROWAK en\nalgùn sitio."
        ko:
          gold: "들고 있는 뼈로 돌을 두드려\n소리를 내서 동료에게 연락을 하는\n모습이 목격되었다"
          silver: "어디선가 뼈를 주워온다\n이 세상 어딘가에 텅구리만의\n무덤이 존재한다는 소문이 있다"
hitmonlee:
  species_id: 106
  names:
    jp_kana: サワムラー
    en: HITMONLEE
    fr: KICKLEE
    it: HITMONLEE
    de: KICKLEE
    es: HITMONLEE
    ko: 시라소몬
  forms:
    hitmonlee:
      form_id: 0
      base_stats:
        hp: 50
        attack: 120
        defense: 53
        special_attack: 35
        special_defense: 110
        speed: 87
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "みごとな　バランスかんかく。\nどんな　しせいでも　れんぞくで\nキックを　はなてる　すごい　やつ。"
          silver: "れんぞくで　キックを　はなつうちに\nりょうあしは　どんどん　のびて\nにげだそうとする　あいても　けれる。"
        en:
          gold: "This amazing POKé-\nMON has an awesome\nsense of balance.\fIt can kick in\nsuccession from\nany position."
          silver: "If it starts kick-\ning repeatedly,\nboth legs will\fstretch even long-\ner to strike a\nfleeing foe."
        fr:
          gold: "Il possède un\nfantastique sens\nde l’équilibre.Il\fdonne des coups de\npieds dans toutes\nles positions."
          silver: "S’il commence à\ndonner des séries\nde coups de pied,\fses jambes gran-\ndissent et il ga-\ngne en allonge."
        it:
          gold: "Questo straordina-\nrio POKéMON ha un\ngrande equilibrio.\fPuò scalciare\nripetutamente da\nogni posizione."
          silver: "Se parte con una\nscarica di colpi,\nle gambe possono\ffarsi ancora più\nlunghe per colpire\nun nemico in fuga."
        de:
          gold: "Dieses POKéMON\nbesitzt einen for-\nmidablen Gleich-\fgewichtssinn. Es\nkann pausenlos\nzutreten."
          silver: "Wenn es anfängt\npausenlos zu tre-\nten, kann es seine\fBeine ausfahren,\num fliehende\nFeinde zu treffen."
        es:
          gold: "Este POKéMON\ntiene un sentido\ndel equilibrio\fincreíble. Puede\ndar patadas desde\ncualquier sitio."
          silver: "Si empieza a dar\npatadas, sus\npatas se alargaràn\faùn màs para\ngolpear al enemigo\nen su huida."
        ko:
          gold: "풍부한 균형감각의 소유자\n어떠한 자세에서도 연속으로\n발차기를 하는 대단한 녀석이다"
          silver: "연속으로 킥을 하는 동안\n양쪽 다리는 점점 길어져서\n도망치려고 하는 상대를 걷어찬다"
hitmonchan:
  species_id: 107
  names:
    jp_kana: エビワラー
    en: HITMONCHAN
    fr: TYGNON
    it: HITMONCHAN
    de: NOCKCHAN
    es: HITMONCHAN
    ko: 홍수몬
  forms:
    hitmonchan:
      form_id: 0
      base_stats:
        hp: 50
        attack: 105
        defense: 79
        special_attack: 35
        special_defense: 110
        speed: 76
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          gold: "くうきをも　きりさく　パンチ。\nだが　３ぷんかん　こうげきすると\nひとやすみ　したくなるらしい。"
          silver: "くうきを　きりさく　パンチ。\nかすっただけで　やけどに　なるほど\nパンチの　スピードは　はやいのだ。"
        en:
          gold: "Its punches slice\nthe air. However,\nit seems to need a\fshort break after\nfighting for three\nminutes."
          silver: "Its punches slice\nthe air. They are\nlaunched at such\fhigh speed, even a\nslight graze could\ncause a burn."
        fr:
          gold: "Ses poings fendent\nl’air! Mais il a\nbesoin d’une\fpetite pause\ntoutes les trois\nminutes."
          silver: "Ses poings fendent\nl’air. Ils sont si\nrapides qu’un\fsimple frôlement\npeut causer une\nbrûlure."
        it:
          gold: "Fende l’aria con\ni suoi pugni.\nTuttavia, deve\fsempre fare una\npausa dopo tre\nminuti di lotta."
          silver: "I suoi pugni fen-\ndono l’aria. Hanno\nuna tale velocità\fche se sfiorano\nqualcosa causano\nuna scottatura."
        de:
          gold: "Seine Fäuste zer-\nschneiden die\nLuft. Es muss je-\fdoch alle drei\nMinuten eine kurze\nPause einlegen."
          silver: "Seine Fäuste zer-\nschneiden regel-\nrecht die Luft.\fBei der geringsten\nReibung entzünden\nsie sich."
        es:
          gold: "Sus puños cortan\nel aire, aunque\nparece necesitar\fun descanso tras\n3 minutos de\ncombate."
          silver: "Sus puñetazos\ncortan el aire.\nSon tan veloces\fque el màs mínimo\nroce podría causar\nuna quemadura."
        ko:
          gold: "바람을 가르는 펀치의 소유자\n그러나 3분동안 공격을 하면\n잠시 쉬고싶어하는 것 같다"
          silver: "주변의 공기를 가르는 펀치\n스쳐도 화상을 입힐 정도로\n펀치 스피드는 매우 빠르다"
lickitung:
  species_id: 108
  names:
    jp_kana: ベロリンガ
    en: LICKITUNG
    fr: EXCELANGUE
    it: LICKITUNG
    de: SCHLURP
    es: LICKITUNG
    ko: 내루미
  forms:
    lickitung:
      form_id: 0
      base_stats:
        hp: 90
        attack: 55
        defense: 75
        special_attack: 60
        special_defense: 75
        speed: 30
      types:
        - normal
      egg_groups:
        - monster
      descriptions:
        jp_kana:
          gold: "ベロの　さきまで　しんけいが\nはったつ　しているので\nびみょうな　うごきが　かのうだ。"
          silver: "ながい　したは　ねばねばした\nだえきで　べっとり。どんなものでも\nくっついて　とても　べんり。"
        en:
          gold: "Its tongue has\nwell-developed\nnerves that run\fto the very tip,\nso it can be deft-\nly manipulated."
          silver: "Its long tongue,\nslathered with a\ngooey saliva,\fsticks to any-\nthing, so it is\nvery useful."
        fr:
          gold: "Sa langue est très\nsensible. Il peut\nl’utiliser pour\fmanipuler adroi-\ntement des objets."
          silver: "Sa longue langue\nsécrète une salive\ngluante qui se\fcolle à n’importe\nquoi. Elle est\ntrès efficace!"
        it:
          gold: "La sua lingua ha\nnervi ben svilup-\npati che vanno\ffino alla punta,\ned è quindi facil-\nmente governabile."
          silver: "La lunga lingua\nintrisa di saliva\nappiccicosa\fsi attacca ovun-\nque e perciò\nè molto utile."
        de:
          gold: "In seiner sensib-\nlen Zunge reichen\ndie Muskeln bis in\fdie Spitze. Darum\nkann es sie stark\nverbiegen."
          silver: "Seine Zunge ist\nmit klebrigem\nSpeichel bedeckt,\fder überall haf-\ntet. Dies ist sehr\nnützlich."
        es:
          gold: "Los nervios sùper-\ndesarrollados\nhallados por toda\fsu lengua permiten\nque la manipule\nhàbilmente."
          silver: "Su larga lengua,\nrecubierta de\nsaliva pegajosa,\fse pega a todo,\npor lo que es\nmuy ùtil."
        ko:
          gold: "혀 끝까지 신경이\n발달해 있어서\n미묘한 움직임이 가능하다"
          silver: "긴 혀는 끈적끈적한\n침으로 덮혀있다  어떤 것이든\n달라붙어서 매우 편리하다"
koffing:
  species_id: 109
  names:
    jp_kana: ドガース
    en: KOFFING
    fr: SMOGO
    it: KOFFING
    de: SMOGON
    es: KOFFING
    ko: 또가스
  forms:
    koffing:
      form_id: 0
      base_stats:
        hp: 40
        attack: 65
        defense: 95
        special_attack: 60
        special_defense: 45
        speed: 35
      types:
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "うすい　まくじょうの　からだには\nなみだと　せきと　はなみずが\nとまらなくなる　ガスが　いっぱい。"
          silver: "たいないの　どくガスは　くうきより\nすこし　かるい　せいぶん。だから\nいつも　すこしだけ　うかんでいる。"
        en:
          gold: "Its thin, filmy\nbody is filled\nwith gases that\fcause constant\nsniffles, coughs\nand teary eyes."
          silver: "The poisonous\ngases it contains\nare a little bit\flighter than air,\nkeeping it slight-\nly airborne."
        fr:
          gold: "Sa fine enveloppe\nest remplie de\ngaz qui provoquent\fen permanence des\nreniflements et\ndes irritations."
          silver: "Les gaz nocifs\nqu’il contient\nsont un peu plus\flégers que l’air\net le maintiennent\nen lévitation."
        it:
          gold: "Il suo corpo rare-\nfatto e sottile è\ncomposto da gas\fche causano\nraffreddori, tosse\ne lacrimazione."
          silver: "I gas velenosi che\ncontiene sono di\npoco più leggeri\fdell’aria, perciò\nresta sollevato\nda terra."
        de:
          gold: "Sein dünner Körper\nist mit Gasen an-\ngefüllt, die Hus-\ften und Schnupfen\nverursachen und\ndie Augen reizen."
          silver: "Das Giftgas, das\nes umgibt, ist et-\nwas leichter als\fLuft. Dadurch\nschwebt es in\ngeringer Höhe."
        es:
          gold: "Su fino y delgado\ncuerpo està lleno\nde gases que\fcausan tos, estor-\nnudos y lagrimeos\nconstantes."
          silver: "Los gases\nvenenosos que\ncontiene son màs\fligeros que el\naire, y por eso\npuede flotar."
        ko:
          gold: "얇은 막과 같은 형상의 몸에는\n눈물과 기침과 콧물을 멈추게\n할 수 없는 가스가 가득하다"
          silver: "체내의 독가스는 공기보다\n약간 가벼운 성분이기때문에\n항상 공중에 약간 떠있다"
weezing:
  species_id: 110
  names:
    jp_kana: マタドガス
    en: WEEZING
    fr: SMOGOGO
    it: WEEZING
    de: SMOGMOG
    es: WEEZING
    ko: 또도가스
  forms:
    weezing:
      form_id: 0
      base_stats:
        hp: 65
        attack: 90
        defense: 120
        special_attack: 85
        special_defense: 70
        speed: 60
      types:
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          gold: "どちらかが　ふくらむと　かたほうは\nしぼむ　ふたごの　ドガース。いつも\nたいないの　どくガスを　まぜている。"
          silver: "たいないに　ふくまれる　どくガスを\nぎりぎりまで　うすめると\nさいこうきゅうの　こうすいができる。"
        en:
          gold: "If one of the twin\nKOFFING inflates,\nthe other one\fdeflates. It con-\nstantly mixes its\npoisonous gases."
          silver: "Top-grade perfume\nis made using its\ninternal poison\fgases by diluting\nthem to the high-\nest level."
        fr:
          gold: "Si l’un des deux\nSMOGO se gonfle\nl’autre se\fdégonfle. Ils\nmélangent leurs\ngaz en permanence."
          silver: "En diluant au plus\nhaut point ses gaz\ninternes, on peut\fobtenir des par-\nfums de premier\nchoix."
        it:
          gold: "Se uno dei gemelli\nKOFFING si sgonfia\nl’altro si gonfia.\fI loro gas veleno-\nsi si mischiano\nincessantemente."
          silver: "I suoi velenosi\ngas interni\ndiluiti al massimo\fsono usati per\nprodurre profumi\npregiatissimi."
        de:
          gold: "Pumpt sich eines\nder zwei SMOGONS\nauf, lässt eines\fLuft ab. So findet\nein Giftgas-\naustausch statt."
          silver: "Aus seinem Gift\nwird ein edles\nParfum gewonnen,\findem man es auf\ndas Äußerste\nverdünnt."
        es:
          gold: "Si uno de los\ngemelos KOFFING se\ninfla, el otro se\fdesinfla. Mezclan\nconstantemente sus\nvenenosos gases."
          silver: "El mejor perfume\nse fabrica con\nsus venenosos\fgases internos,\ndiluyéndolos lo\nmàximo posible."
        ko:
          gold: "어느 한쪽이 부풀어오르면 다른쪽은\n쪼그라드는 쌍둥이 또가스. 항상\n체내의 독가스를 섞고 있다"
          silver: "체내에 모여있는 독가스를\n극한까지 농도를 낮추면\n최고급의 향수가 된다"
rhyhorn:
  species_id: 111
  names:
    jp_kana: サイホーン
    en: RHYHORN
    fr: RHINOCORNE
    it: RHYHORN
    de: RIHORN
    es: RHYHORN
    ko: 뿔카노
  forms:
    rhyhorn:
      form_id: 0
      base_stats:
        hp: 80
        attack: 85
        defense: 95
        special_attack: 30
        special_defense: 30
        speed: 25
      types:
        - ground
        - rock
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "４ほんの　あしは　みじかくて\nうまく　まがれない。ただひたすらに\nとっしん　するだけだ。"
          silver: "じぶんの　すすんでいる　ほうこうに\nなにが　あろうと　きにしていない。\nぜんぶ　とっしんで　こわすだけだ。"
        en:
          gold: "It is inept at\nturning because of\nits four short\flegs. It can only\ncharge and run in\none direction."
          silver: "It doesn’t care if\nthere is anything\nin its way. It\fjust charges and\ndestroys all ob-\nstacles."
        fr:
          gold: "Ses petites jambes\nne lui permettent\npas de tourner\ffacilement. Il ne\npeut que charger\ntout droit."
          silver: "Quand il est\nlancé, plus rien\nne l’arrête. Il\fne vaut mieux pas\nse trouver sur son\npassage!"
        it:
          gold: "Le quattro piccole\nzampe gli impedi-\nscono di voltarsi.\fPerciò corre\ne attacca in una\nsola direzione."
          silver: "Non si preoccupa\ndegli oggetti che\ntrova sulla sua\fstrada: carica e\ndistrugge ogni\nostacolo."
        de:
          gold: "Aufgrund seiner\nkurzen Beine kann\nes sich nicht um-\fdrehen. Es kann\nimmer nur in eine\nRichtung laufen."
          silver: "Es schert sich\nnicht um Hinder-\nnisse in seinem\fWeg. Es greift an\nund zerstört alles\nin seinem Weg."
        es:
          gold: "Es un poco torpe\nal girar debido a\nsus cuatro cortas\fpatas. Sólo puede\natacar y correr en\nuna dirección."
          silver: "No le importa si\nhay algo en su\ncamino. Se limita\fa arremeter\ncontra cualquier\nobstàculo."
        ko:
          gold: "4개의 다리는 짧아서\n잘 굽혀지지 않는다  단지\n한곳으로 돌진할 뿐이다"
          silver: "자신이 향하고 있는 방향에\n무엇이 있는가 신경쓰지 않는다\n전부 돌진해서 부술 뿐이다"
rhydon:
  species_id: 112
  names:
    jp_kana: サイドン
    en: RHYDON
    fr: RHINOFEROS
    it: RHYDON
    de: RIZEROS
    es: RHYDON
    ko: 코뿌리
  forms:
    rhydon:
      form_id: 0
      base_stats:
        hp: 105
        attack: 130
        defense: 120
        special_attack: 45
        special_defense: 45
        speed: 40
      types:
        - ground
        - rock
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          gold: "ようがんの　あつさすら　かんじない\nがんじょうな　ひふの　もちぬし。\nそのぶん　にぶいところが　ある。"
          silver: "うしろあしだけで　たつようになり\nのうが　はったつした。ぶあつい\nひふは　マグマのなかでも　へいきだ。"
        en:
          gold: "Its rugged hide\nprotects it from\neven the heat of\flava. However, the\nhide also makes it\ninsensitive."
          silver: "Its brain devel-\noped when it began\nwalking on hind\flegs. Its thick\nhide protects it\neven in magma."
        fr:
          gold: "Son épiderme épais\nle protège\nmême de la chaleur\fde la lave, mais\nil est en consé-\nquence insensible."
          silver: "Son cerveau s’est\ndéveloppé quand il\na commencé à mar-\fcher sur 2 pattes.\nSa peau le protège\nmême du magma."
        it:
          gold: "La sua pelle dura\nlo protegge anche\ndalla lava.\fLa sua pelle però\nlo rende anche\ninsensibile."
          silver: "Il cervello si\nè sviluppato da\nquando si muove\fsulle zampe poste-\nriori. La pelle lo\ndifende dal magma."
        de:
          gold: "Seine dicke Haut\nschützt es vor\nheißer Lava, aber\fsie macht es\nauch sonst\nunempfindlich."
          silver: "Sein Gehirn ent-\nwickelte sich, als\nes seine Hinterfü-\fße benutzte. Seine\nHaut schützt es\nvor Magma."
        es:
          gold: "Su dura coraza\nle protege hasta\ndel calor de la\flava. Sin embargo,\nla coraza le\nhace insensible."
          silver: "Su cerebro se\ndesarrolló cuando\nempezó a usar sus\fpatas traseras.\nSu piel resiste\nhasta la lava."
        ko:
          gold: "용암의 뜨거움도 느끼지 않는\n견고한 피부의 소유자로\n그만큼 둔한 곳도 있다"
          silver: "뒷다리로만 설 수 있게 되어\n뇌가 발달했다  두꺼운\n피부는 마그마 안에서도 문제 없다"
chansey:
  species_id: 113
  names:
    jp_kana: ラッキー
    en: CHANSEY
    fr: LEVEINARD
    it: CHANSEY
    de: CHANEIRA
    es: CHANSEY
    ko: 럭키
  forms:
    chansey:
      form_id: 0
      base_stats:
        hp: 250
        attack: 5
        defense: 5
        special_attack: 35
        special_defense: 105
        speed: 50
      types:
        - normal
      egg_groups:
        - fairy
      held_items:
        rare: lucky_egg
      descriptions:
        jp_kana:
          gold: "もっている　タマゴを\nわらないように　きをつけて　あるく。\nでも　にげあしは　とても　はやい。"
          silver: "かずが　すくなく　つかまえにくい。\nつかまえた　トレーナーに\nしあわせを　もたらすと　いわれる。"
        en:
          gold: "It walks carefully\nto prevent its\negg from breaking.\fHowever, it is\nextremely fast at\nrunning away."
          silver: "Few in number and\ndifficult to cap-\nture, it is said\fto bring happiness\nto the trainer who\ncatches it."
        fr:
          gold: "Il marche lente-\nment pour ne pas\nabîmer son oeuf.\fMais il peut,\ntoutefois, s’en-\nfuir très vite."
          silver: "Extrêmement rare\net difficile à\ntrouver, il appor-\fte joie et bonheur\nà celui qui le\npossède."
        it:
          gold: "Cammina con pru-\ndenza per non rom-\npere il suo uovo.\fTuttavia, può\nfuggire con\nestrema rapidità."
          silver: "Poco numerosi e\ndifficili da pren-\ndere, si dice che\fportino fortuna a\nchi riesce a\ncatturarli."
        de:
          gold: "Es läuft extrem\nlangsam, damit\nsein Ei nicht zer-\fbricht. Es kann\njedoch schnell\ndavonlaufen."
          silver: "Es ist selten und\nschwer zu fangen.\nMan sagt, es würde\fdem Trainer, der\nes gefangen hat,\nFreude bringen."
        es:
          gold: "Camina con cuidado\npara que no se\nrompa su huevo.\fSin embargo, es\nextremadamente\nràpido escapando."
          silver: "Poco numerosos y\ndifíciles de\ncapturar. Dicen\fque traen la\nfelicidad al que\nlos captura."
        ko:
          gold: "가지고 있는 알을\n깨지지 않도록 조심해서 걸어다닌다\n그러나 도망치는 것은 매우 빠르다"
          silver: "수가 적어서 잡기 힘들다\n자신을 잡은 트레이너에게\n행복을 가져다 준다고 전해진다"
tangela:
  species_id: 114
  names:
    jp_kana: モンジャラ
    en: TANGELA
    fr: SAQUEDENEU
    it: TANGELA
    de: TANGELA
    es: TANGELA
    ko: 덩구리
  forms:
    tangela:
      form_id: 0
      base_stats:
        hp: 65
        attack: 55
        defense: 115
        special_attack: 100
        special_defense: 40
        speed: 60
      types:
        - grass
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          gold: "ぜんしんを　おおう　ツタは\nいつも　こまかく　うごきつづけて\nあいての　しんけいを　かきみだす。"
          silver: "うごくものに　ツルを　からめる。\nツルは　びみょうに　ゆれているので\nからみつかれると　くすぐったい。"
        en:
          gold: "The vines that\ncloak its entire\nbody are always\fjiggling. They\neffectively un-\nnerve its foes."
          silver: "It tangles any\nmoving thing with\nits vines. Their\fsubtle shaking\nis ticklish if you\nget ensnared."
        fr:
          gold: "Les lianes qui\ncamouflent son\ncorps bougent tout\fle temps ce qui\nagace souvent ses\nadversaires."
          silver: "Il paralyse tout\nce qui bouge avec\nses lianes.\fElles vous cha-\ntouillent si vous\nêtes capturé."
        it:
          gold: "Le liane che\ncoprono il suo\ncorpo dondolano\fin continuazione.\nCiò innervosisce\nmolto i nemici."
          silver: "Intrappola nelle\nliane qualsiasi\ncosa che si muova.\fIl loro lieve mo-\nvimento può fare\nil solletico."
        de:
          gold: "Die Ranken an\nseinem Körper sind\nständig in Bewe-\fgung. Dadurch\nwerden seine\nGegner verwirrt."
          silver: "Es berührt alles,\nwas sich bewegt,\nmit seinen Ranken.\fDiese Berührungen\nsind sehr\nkitzelig."
        es:
          gold: "Las cintas que\nocultan todo su\ncuerpo no dejan de\fmoverse. Esto\ndesconcierta a\nsus enemigos."
          silver: "Enreda cualquier\ncosa que se mueva\ncon sus parras. Si\fte atrapa, te harà\ncosquillas con su\ndelicado balanceo."
        ko:
          gold: "전신을 뒤덮는 덩쿨은\n항상 섬세하게 움직임을 계속해서\n상대의 신경을 혼란스럽게 만든다"
          silver: "움직이는 것에 넝쿨을 감는다\n넝쿨은 미묘하게 흔들리기 때문에\n휘감기면 간지럽다"
kangaskhan:
  species_id: 115
  names:
    jp_kana: ガルーラ
    en: KANGASKHAN
    fr: KANGOUREX
    it: KANGASKHAN
    de: KANGAMA
    es: KANGASKHAN
    ko: 캥카
  forms:
    kangaskhan:
      form_id: 0
      base_stats:
        hp: 105
        attack: 95
        defense: 80
        special_attack: 40
        special_defense: 80
        speed: 90
      types:
        - normal
      egg_groups:
        - monster
      descriptions:
        jp_kana:
          gold: "あんぜんな　ばしょなら　こどもも\nおなかの　ふくろから　でて　あそぶ。\nおやは　それを　じっと　みまもる。"
          silver: "こどもを　まもるためなら\nどんなに　キズついても　けっして\nたたかいを　あきらめない。"
        en:
          gold: "If it is safe, the\nyoung gets out of\nthe belly pouch to\fplay. The adult\nkeeps a close eye\non the youngster."
          silver: "To protect its\nyoung, it will\nnever give up\fduring battle, no\nmatter how badly\nwounded it is."
        fr:
          gold: "Dans les endroits\nsécurisés, le\npetit quitte sa\fpoche pour jouer\nsous la protection\ndes adultes."
          silver: "Pour protéger ses\npetits, il n’aban-\ndonnera jamais un\fcombat, quel que\nsoit son état."
        it:
          gold: "Se è al sicuro, il\npiccolo esce dal\nmarsupio e inizia\fa giocare sotto\ngli occhi vigili\ndell’adulto."
          silver: "Per proteggere i\npiccoli non si\narrende mai nella\flotta, per quanto\ngravi siano le sue\nferite."
        de:
          gold: "Fühlt es sich\nsicher, dann ver-\nlässt das Junge\fden Beutel. Die\nMutter behält es\nständig im Auge."
          silver: "Um sein Junges zu\nbeschützen, gibt\nes einen Kampf\fnie auf, egal\nwie schwer verwun-\ndet es ist."
        es:
          gold: "Si no hay peligro,\nel joven sale de\nla bolsa y juega.\fEl adulto vigila\natentamente\nal joven."
          silver: "Para proteger a\nsu pequeño, nunca\nabandonarà el\fcombate, sin\nimportar lo herido\nque esté."
        ko:
          gold: "안전한 장소라면 새끼도\n배의 주머니에서 나와 논다\n어미는 그것을 곰곰히 지켜본다"
          silver: "자식을 지키기 위해서라면\n어떠한 상처를 입더라도\n싸움을 멈추지 않는다"
horsea:
  species_id: 116
  names:
    jp_kana: タッツー
    en: HORSEA
    fr: HYPOTREMPE
    it: HORSEA
    de: SEEPER
    es: HORSEA
    ko: 쏘드라
  forms:
    horsea:
      form_id: 0
      base_stats:
        hp: 30
        attack: 40
        defense: 70
        special_attack: 70
        special_defense: 25
        speed: 60
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          gold: "おおきな　あいてに　おそわれても\n２まいのせびれを　たくみにあやつり\nすいちゅうを　じゆうに　にげる。"
          silver: "はったつした　おおきな　ヒレを\nすばやく　うごかすことで　まえを\nむいたまま　うしろに　いどうできる。"
        en:
          gold: "If attacked by a\nlarger enemy, it\nquickly swims to\fsafety by adeptly\ncontrolling its\ndorsal fin."
          silver: "Its big, developed\nfins move rapidly,\nallowing it to\fswim backward\nwhile still facing\nforward."
        fr:
          gold: "S’il est menacé\npar un gros adver-\nsaire, il s’enfuit\fen nageant rapi-\ndement grâce à\nses nageoires."
          silver: "Ses larges\nnageoires lui per-\nmettent de se\fdéplacer à recu-\nlons tout en re-\ngardant en avant."
        it:
          gold: "Se è attaccato da\nun nemico più\ngrande, si mette\fin salvo nuotando\nagilmente con la\npinna dorsale."
          silver: "Con le sue pinne\ngrandi e ben\nsviluppate\fnuota all’indietro\nmentre sta ancora\nguardando avanti."
        de:
          gold: "Wird es von einem\ngrößeren Gegner \nangegriffen, setzt\fes seine Rücken-\nflosse ein, um\ndavonzuschwimmen."
          silver: "Seine Flossen sind\nsehr schnell. Da-\ndurch kann es\frückwärts schwim-\nmen, ohne seinen\nKopf umzudrehen."
        es:
          gold: "Si es atacado por\nun enemigo màs\ngrande, nada veloz\fa un lugar seguro\ngracias a su\naleta dorsal."
          silver: "Sus desarrolladas\naletas son ràpidas\ny le permiten\fnadar hacia atràs\naunque mire hacia\ndelante."
        ko:
          gold: "커다란 상대에게 공격을 받아도\n2개의 지느러미로 능숙하게\n수중을 자유롭게 도망친다"
          silver: "발달한 커다란 지느러미를\n재빠르게 움직이는 것으로 앞을\n향한 채 뒤로 이동할 수 있다"
seadra:
  species_id: 117
  names:
    jp_kana: シードラ
    en: SEADRA
    fr: HYPOCEAN
    it: SEADRA
    de: SEEMON
    es: SEADRA
    ko: 시드라
  forms:
    seadra:
      form_id: 0
      base_stats:
        hp: 55
        attack: 65
        defense: 95
        special_attack: 95
        special_defense: 45
        speed: 85
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          gold: "さいぼうを　しらべると　タッツーには\nなかった　あらたな　いでんしが\nはっけんされ　わだいと　なっている。"
          silver: "ひれの　さきから　どくを　ぶんぴつ。\nひれや　ほねは　かんぽうやくの\nざいりょうとして　ちょうほうされる。"
        en:
          gold: "An examination of\nits cells revealed\nthe presence of a\fgene not found in\nHORSEA. It became\na hot topic."
          silver: "Its fin-tips leak\npoison. Its fins\nand bones are\fhighly valued as\ningredients in\nherbal medicine."
        fr:
          gold: "Son analyse cel-\nlulaire révèle\nla présence de\fgènes n’apparte-\nnant pas aux HYPO-\nCEAN."
          silver: "Ses nageoires et\nses os sont des\ningrédients très\frecherchés de la\nmédecine natu-\nrelle."
        it:
          gold: "Un esame delle sue\ncellule ha rivela-\nto la presenza di\fun gene assente in\nHORSEA. Se ne è\nparlato molto."
          silver: "Dalle punte delle\npinne cola veleno.\nLe pinne e le ossa\fsono ingredienti\nmolto apprezzati\nin erboristeria."
        de:
          gold: "Eine Zelluntersu-\nchung ergab, dass\nes ein Gen besizt,\fdas SEEPER nicht\nhat. Ein bemer-\nkenswerter Fund."
          silver: "An seinen Flossen\ntritt Gift aus.\nSeine Knochen und\fFlossen sind eine\nbeliebte Zutat\nfür Arznei."
        es:
          gold: "Un anàlisis de sus\ncélulas revela la\npresencia de un\fgen no encontrado\nen HORSEA. Es un\ntema muy polémico."
          silver: "Las puntas de sus\naletas segregan\nveneno. Sus aletas\fy huesos son muy\nvalorados en la\nmedicina natural."
        ko:
          gold: "세포를 조사해보면 쏘드라에게는\n없었던 새로운 유전자가\n발견되어 화제가 되고있다"
          silver: "지느러미 끝에서 독을 분비한다\n지느러미와 뼈는 한약의\n재료로서 중요하게 여겨지고 있다"
goldeen:
  species_id: 118
  names:
    jp_kana: トサキント
    en: GOLDEEN
    fr: POISSIRENE
    it: GOLDEEN
    de: GOLDINI
    es: GOLDEEN
    ko: 콘치
  forms:
    goldeen:
      form_id: 0
      base_stats:
        hp: 45
        attack: 67
        defense: 60
        special_attack: 35
        special_defense: 50
        speed: 63
      types:
        - water
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          gold: "せびれ　むなびれ　おひれが\nゆうがに　たなびくので\nみずのおどりこ　とよばれる。"
          silver: "きゅうな　ながれの　かわも\n５ノットの　スピードで\nぐんぐん　さかのぼっていく。"
        en:
          gold: "Its dorsal, pecto-\nral and tail fins\nwave elegantly in\fwater. That is why\nit is known as the\nwater dancer."
          silver: "A strong swimmer,\nit is capable of\nswimming nonstop\fup fast streams at\na steady speed of\nfive knots."
        fr:
          gold: "Ses nageoires\ndorsales et pec-\ntorales bougent\favec élégance. Il\nest surnommé le\ndanseur des flots."
          silver: "Un bon nageur,\ncapable de remon-\nter un torrent à\fla vitesse im-\npressionnante de\n5 noeuds."
        it:
          gold: "Le pinne su dorso,\npetto e coda ondu-\nlano con grazia in\facqua. Perciò lo\nchiamano\ndanzatore d’acqua."
          silver: "Forte nuotatore,\ncapace di risalire\ntorrenti impetuosi\falla velocità\ncostante di\ncinque nodi."
        de:
          gold: "Seine Brust-, Rü-\ncken- und Schwanz-\nflossen sehen an-\fmutig aus. Daher\nnennt man es den\nWassertänzer."
          silver: "Es ist ein guter\nSchwimmer. Es kann\nselbst reißende\fStröme mit kon-\nstant fünf Knoten\nhinaufschwimmen."
        es:
          gold: "Sus aletas dorsal,\ntrasera y pectoral\nondean gràciles en\fel agua. Por eso\nes llamado el\nbailarín acuàtico."
          silver: "Un gran nadador,\ncapaz de remontar\nfuertes corrientes\fsin parar y a una\nvelocidad media\nde 5 nudos."
        ko:
          gold: "등, 가슴, 꼬리지느러미가\n우아하게 움직이기 때문에\n수중의 무녀라고 불려진다"
          silver: "물살이 빠른 강도\n5노트의 스피드로\n슥슥 거슬러올라간다"
seaking:
  species_id: 119
  names:
    jp_kana: アズマオウ
    en: SEAKING
    fr: POISSOROY
    it: SEAKING
    de: GOLKING
    es: SEAKING
    ko: 왕콘치
  forms:
    seaking:
      form_id: 0
      base_stats:
        hp: 80
        attack: 92
        defense: 65
        special_attack: 65
        special_defense: 80
        speed: 68
      types:
        - water
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          gold: "さんらんの　じきに　なると\nかくちから　アズマオウが　あつまり\nかわのいろが　まっかに　そまる。"
          silver: "ツノで　かわぞこの　いわを　くりぬき\nすをつくるのは　うみつけた　タマゴが\nながされないように　するためだ。"
        en:
          gold: "During spawning\nseason, SEAKING\ngather from all\fover, coloring\nthe rivers a\nbrilliant red."
          silver: "Using its horn, it\nbores holes in\nriverbed boulders,\fmaking nests to\nprevent its eggs\nfrom washing away."
        fr:
          gold: "Pendant la saison\ndes pontes,\nPOISSOROY explore\fles environs,\ncolorant les ri-\nvières en rouge."
          silver: "Il fait des trous\ndans les rochers\ndes berges pour\fy faire son joli\npetit nid."
        it:
          gold: "Durante la deposi-\nzione delle uova,\ni SEAKING riuniti\fcolorano l’acqua\ndei fiumi di un\nrosso intenso."
          silver: "Con il corno scava\nbuchi nei massi\ndei fiumi, co-\fstruendo nidi che\ndifendono le uova\ndalla corrente."
        de:
          gold: "In der Laichzeit\nsammeln sich viele\nGOLKINGS in den\fFlüssen, die\ndadurch rot\nerstrahlen."
          silver: "Es laicht in Lö-\nchern, die es mit\nseinem Horn in\fFelsen gebohrt\nhat, damit sein\nLaich sicher ist."
        es:
          gold: "Durante la puesta\nacuden SEAKING de\ntodas partes,\fcoloreando los\nríos de un\nrojo brillante."
          silver: "Cava con su cuerno\nun nido en las\npiedras del lecho\fdel río para\nque sus huevos no\nsean arrastrados."
        ko:
          gold: "산란할 시기가 되면\n각지에서 왕콘치가 모여들어\n강물색깔을 빨갛게 물들인다"
          silver: "뿔로 강바닥의 바위를 파헤쳐\n집을 만드는 것은 태어난 알이\n떠내려가지 않도록 하기 위함이다"
staryu:
  species_id: 120
  names:
    jp_kana: ヒトデマン
