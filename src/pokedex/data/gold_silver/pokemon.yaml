        jp_kana:
          gold: "はげしい　たたかいで　シッポに\nかみついた　シェルダーが　はずれると\nもとの　ヤドンに　もどってしまう。"
          silver: "もともと　かんかくが　にぶかったが\nシェルダーの　どくそが　しみこみ\nいたさを　かんじなくなった。"
        en:
          gold: "If the tail-biting\nSHELLDER is thrown\noff in a harsh\fbattle, it reverts\nto being an ordi-\nnary SLOWPOKE."
          silver: "Naturally dull to\nbegin with, it\nlost its ability\fto feel pain due\nto SHELLDER’s\nseeping poison."
        fr:
          gold: "Si pendant un com-\nbat le KOKIYAS\naccroché à sa\fqueue est arraché,\nil redevient un\nRAMOLOSS."
          silver: "D’une nature assez\nléthargique, il\nne ressent plus la\fdouleur à cause\ndu poison injecté\npar le KOKIYAS."
        it:
          gold: "Se combattendo\nperde lo SHELLDER\nche gli morde la\fcoda, si trasforma\nin un comune\nSLOWPOKE."
          silver: "Di natura piutto-\nsto ottusa, ha\nperso la sensibi-\flità al dolore\na causa del veleno\ndi uno SHELLDER."
        de:
          gold: "Wenn das MUSCHAS\nan seinem Schwanz\nin einem Kampf ab-\fgeschüttelt wird,\nentwickelt es sich\nin FLEGMON zurück."
          silver: "Von Natur aus\nlahm, hat es auf-\ngrund von MUSCHAS\fbetäubendem Gift\nsein Schmerzemp-\nfinden verloren."
        es:
          gold: "Si el SHELLDER que\nmuerde su cola se\ndesprende durante\funa lucha, se\nconvertirà en un\nsimple SLOWPOKE."
          silver: "Algo torpe por\nnaturaleza, ha\ndejado de sentir\fdolor por\nel veneno\nde SHELLDER."
        ko:
          gold: "격한 싸움에서 꼬리를\n물고있는 셀러가 떨어지면\n원래의 야돈의 모습이 되어버린다"
          silver: "원래 감각이 둔했었지만\n셀러의 독소가 퍼져\n아픔을 느끼지 못하게 되었다"
magnemite:
