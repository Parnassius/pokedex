          silver: "さゆうの　ユニットから\nじゅうりょくを　さえぎる　ちからを\nだすので　くうちゅうに　うかべる。"
        en:
          gold: "It is attracted by\nelectromagnetic\nwaves. It may\fapproach trainers\nif they are using\ntheir POKéGEAR."
          silver: "The units at the\nsides of its body\ngenerate anti-\fgravity energy to\nkeep it aloft in\nthe air."
        fr:
          gold: "Il est attiré par\nles ondes électro-\nmagnétiques et le\fPOKéMATOS\ndes dresseurs\nen chasse."
          silver: "Les parties sur\nles côtés de son\ncorps génèrent une\fénergie lui\npermettant de\nléviter."
        it:
          gold: "È attratto dalle\nonde elettromagne-\ntiche. È facile\fche si avvicini ad\nun allenatore che\nusa il POKéGEAR."
          silver: "Le unità alle\ndue estremità del\ncorpo producono\fenergia antigravi-\ntazionale che lo\ntiene a mezz’aria."
        de:
          gold: "Elektromagnetische\nWellen ziehen es\nan. Trainer, die\fden POKéCOM be-\nnutzen, ziehen\nMAGNETILO an."
          silver: "Die Magneten an\nseinem Körper er-\nzeugen ein Anti-\fGrav.-Feld, um es\nständig in der\nSchwebe zu halten."
        es:
          gold: "Atraído por ondas\nelectromagnéticas,\npodría acercarse\fa los entrenadores\nque estén usando\nel POKéGEAR."
          silver: "Las unidades a los\nlados de su cuerpo\ngeneran energía\fantigravitatoria\npara mantenerlo\nen el aire."
        ko:
          gold: "전파에 이끌리는 성질을 지녔다\n포켓기어를 사용하면\n가까이 다가오는 일도 있는 듯하다"
          silver: "좌우의 유닛으로부터\n중력을 차단하는 힘을 발휘\n하기 때문에 공중에 뜰 수 있다"
magneton:
