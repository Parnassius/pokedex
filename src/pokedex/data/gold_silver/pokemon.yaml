        it:
          gold: "Quando è lanciato\nal galoppo corre\ncosì velocemente\fche le sue zampe\nquasi non toccano\nterra."
          silver: "Ha un’incredibile\naccelerazione:\nraggiunge la sua\fmassima velocità\n(240 km/h) in soli\ndieci passi."
        de:
          gold: "Bei vollem Galopp\nberühren seine\nHufe kaum den\fBoden, da es so\nunglaublich\nschnell ist."
          silver: "Bereits nach 10\nSchritten erreicht\nes seine Höchst-\fgeschwindigkeit\nvon sage und\nschreibe 240 km/h."
        es:
          gold: "Al galope,\nsus cuatro\ncascos apenas\ftocan el suelo\nporque se mueve\nrapidísimo."
          silver: "Con una\naceleración\nincreíble, puede\falcanzar los\n240 km/h en sólo\ndiez trotes."
        ko:
          gold: "달릴 때 4개의 다리는\n거의 지면에 닿지 않는다\n그정도로 빨리 달린다는 것이다"
          silver: "엄청나게 빠른 가속력\n달리기 시작해 겨우 10걸음으로\n최고시속 240Km가 된다"
slowpoke:
