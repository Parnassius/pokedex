    jp_kana: "かたいツノを　ものすごい　いきおいで\nつきだして　こうげき"
    en: "A powerful charge\nattack."
    fr: "Une charge\npuissante."
    it: "Una potente\ncarica."
    de: Starke Attacke.
    es: "Ataque muy\npotente."
    ko: "단단한 뿔을 엄청난 기세를 몰아\n들이받아 공격한다"
metal_claw:
  names:
    jp_kana: メタルクロー
