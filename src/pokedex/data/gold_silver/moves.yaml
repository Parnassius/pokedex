    jp_kana: "つよいでんげきを　あびせて　こうげき\nてきを　まひさせることがある"
    en: "An attack that may\ncause paralysis."
    fr: "Attaque pouvant\nparalyser."
    it: "Un attacco che può\ncausare paralisi."
    de: "Gegner ist evtl.\nparalysiert."
    es: "Ataque que puede\nparalizar."
    ko: "강력한 전기를 발산해서 공격\n적을 마비시키기도 한다"
toxic:
  names:
    jp_kana: どくどく
    en: TOXIC
    fr: TOXIK
    it: TOSSINA
    de: TOXIN
    es: TÓXICO
    ko: 맹독
  descriptions:
    jp_kana: "じょじょに　ダメージがふえる　どくを\nてきに　あたえる"
    en: "A poison move with\nincreasing damage."
    fr: "Poison à dégâts\ncroissants."
    it: "Avvelena con ef-\nficacia crescente."
    de: "Gift-Attacke mit\nSchadenszuwachs."
    es: "Veneno que aumenta\nel daño."
    ko: "점점 데미지가 늘어가는 독을\n적에게 중독시킨다"
transform:
  names:
    jp_kana: へんしん
    en: TRANSFORM
