    fr: "Pour s’enfuir\nd’un combat."
    it: "Per fuggire da\nuna lotta."
    de: "Ermöglicht Flucht\naus Kämpfen."
    es: "Sirve para huir\nde la batalla."
    ko: "초능력을 사용하여\n전투에서 탈출한다"
thief:
  names:
    jp_kana: どろぼう
    en: THIEF
    fr: LARCIN
    it: FURTO
    de: RAUB
    es: LADRÓN
    ko: 도둑
