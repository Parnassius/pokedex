absorb:
  names:
    jp_kana: すいとる
    en: ABSORB
    fr: VOL-VIE
    it: ASSORBIMENTO
    de: ABSORBER
    es: ABSORBER
    ko: 흡수
  descriptions:
    jp_kana: "てきに　あたえた　ダメージの\nはんぶん　たいりょくを　かいふくする"
    en: "Steals 1/2 of the\ndamage inflicted."
    fr: "Vole 1/2 des dé-\ngâts infligés."
    it: "Ruba PS pari a\n1/2 del danno."
    de: "Erhält Hälfte des\nSchadens als KP."
    es: "Quita la mitad del\ndaño producido."
    ko: "적에게 입힌 데미지의\n반정도를 체력으로 회복한다"
acid:
  names:
    jp_kana: ようかいえき
    en: ACID
    fr: ACIDE
    it: ACIDO
    de: SÄURE
    es: ÁCIDO
    ko: 용해액
  descriptions:
    jp_kana: "つよいさんで　てきの　ひふを　とかす\nぼうぎょを　さげることがある"
    en: "An attack that may\nlower DEFENSE."
    fr: "Peut baisser\nla DEFENSE."
    it: "Può ridurre\nDIFESA."
    de: "Senkt evtl. VERT-\nWert des Gegners."
    es: "Ataque que puede\nbajar la DEFENSA."
    ko: "강한 산으로 적의 피부를 녹인다\n방어력을 떨어뜨린다"
acid_armor:
  names:
    jp_kana: とける
    en: ACID ARMOR
    fr: ACIDARMURE
    it: SCUDO ACIDO
    de: SÄUREPANZER
    es: ARMAD. ÁCIDA
    ko: 녹기
  descriptions:
    jp_kana: "からだを　えきじょうに　へんかさせて\nぼうぎょを　グーンとあげる"
    en: "Sharply raises the\nuser’s DEFENSE."
    fr: "Monte DEF. du lan-\nceur énormément."
    it: "Aumenta di molto\npropria DIFESA."
    de: "Hebt VERT-Wert des\nAngreifers enorm."
    es: "Aumenta bastante\ntu DEFENSA."
    ko: "몸을 액상으로 변화시켜서\n방어력을 팍 높인다"
aeroblast:
  names:
    jp_kana: エアロブラスト
    en: AEROBLAST
    fr: AEROBLAST
    it: AEROCOLPO
    de: LUFTSTOSS
    es: AEROCHORRO
    ko: 에어로블레스트
  descriptions:
    jp_kana: "しんくうはを　はっしゃして　こうげき\nきゅうしょに　あたりやすい"
    en: "Has a high criti-\ncal hit ratio."
    fr: "Haut taux de coup\ncritique."
    it: "Può assestare un\nbrutto colpo."
    de: "Volltrefferquote\nhoch."
    es: "Alta probabilidad\nde golpe crítico."
    ko: "진공파를 발사해서 공격\n급소를 맞추기 쉽다"
agility:
  names:
    jp_kana: こうそくいどう
    en: AGILITY
    fr: HATE
    it: AGILITÀ
    de: AGILITÄT
    es: AGILIDAD
    ko: 고속이동
  descriptions:
    jp_kana: "ちからを　ぬいて　からだを　かるくし\nすばやさを　グーンとあげる"
    en: "Sharply increases\nthe user’s SPEED."
    fr: "Monte VIT. du lan-\nceur énormément."
    it: "Potenzia di molto\nVELOCITÀ."
    de: "Hebt INIT-Wert\nenorm."
    es: "Aumenta mucho\ntu VELOCIDAD."
    ko: "힘을 빼서 몸을 가볍게하고\n스피드를 많이 높인다"
amnesia:
  names:
    jp_kana: ドわすれ
    en: AMNESIA
    fr: AMNESIE
    it: AMNESIA
    de: AMNESIE
    es: AMNESIA
    ko: 망각술
  descriptions:
    jp_kana: "いっしゅん　なにかを　わすれることで\nとくしゅぼうぎょを　グーンとあげる"
    en: "Sharply raises the\nuser’s SPCL.DEF."
    fr: "Monte DEF.SPE.\nénormément."
    it: "Aumenta di molto\nDIFESA SPEC."
    de: "Hebt SPEZ-VER. des\nAngreifers enorm."
    es: "Aumenta bastante\ntu DEFENSA ESP."
    ko: "일순 무엇인가를 잊어먹는 것으로\n특수방어를 높이 올린다"
ancient_power:
  names:
    jp_kana: げんしのちから
    en: ANCIENTPOWER
    fr: POUV.ANTIQUE
    it: FORZANTICA
    de: ANTIK-KRAFT
    es: PODER PASADO
    ko: 원시의 힘
  descriptions:
    jp_kana: "げんしの　ちからを　よびさます\nのうりょくが　あがることがある"
    en: "An attack that may\nraise all stats."
    fr: "Attaque pouvant\nmonter les stats."
    it: "Attacco che può\nmigliorare stat."
    de: "Hebt evtl. alle\nStatuswerte an."
    es: "Puede subir todas\nlas caract."
    ko: "원시의 힘을 불러들여\n능력이 높아진다"
attract:
  names:
    jp_kana: メロメロ
    en: ATTRACT
    fr: ATTRACTION
    it: ATTRAZIONE
    de: ANZIEHUNG
    es: ATRACCIÓN
    ko: 헤롱헤롱
  descriptions:
    jp_kana: "オスなら　メスに　メスなら　オスに\nわざが　だしにくくなる"
    en: "Makes the opposite\ngender infatuated."
    fr: "Rend le genre op-\nposé amoureux."
    it: "Fa infatuare il\ngenere opposto."
    de: "Schutz, da Gegner\nsich verliebt."
    es: "Enamora al género\nopuesto."
    ko: "숫놈이라면 암놈에게 암놈이라면\n숫놈에게 발휘하기 힘들게 된다"
aurora_beam:
  names:
    jp_kana: オーロラビーム
    en: AURORA BEAM
    fr: ONDE BOREALE
    it: RAGGIAURORA
    de: AURORASTRAHL
    es: RAYO AURORA
    ko: 오로라 빔
  descriptions:
    jp_kana: "にじいろの　ひかりを　はっしゃする\nこうげきを　さげることがある"
    en: "An attack that may\nlower ATTACK."
    fr: "Attaque pouvant\nbaisser ATTAQUE."
    it: "Può ridurre\nATTACCO."
    de: "Senkt evtl. ANGR-\nWert des Gegners."
    es: "Ataque que puede\nreducir el ATAQUE."
    ko: "무지개 빛을 발사한다\n공격력을 저하시키기도 한다"
barrage:
  names:
    jp_kana: たまなげ
    en: BARRAGE
    fr: PILONNAGE
    it: ATT. PIOGGIA
    de: STAKKATO
    es: PRESA
    ko: 알던지기
  descriptions:
    jp_kana: "まるいものを　てきに　なげつけて\n２ー５かい　れんぞくで　こうげき"
    en: "Throws orbs to hit\n2-5 times."
    fr: "Lance des orbes\n2 à 5 fois."
    it: "Sfere che colpi-\nscono 2-5 volte."
    de: "Trifft bis zu\n5 mal."
    es: "Arroja orbes de\n2 a 5 veces."
    ko: "둥근 물건을 적에게 던져서\n2-5회 연속으로 공격"
barrier:
  names:
    jp_kana: バリアー
    en: BARRIER
    fr: BOUCLIER
    it: BARRIERA
    de: BARRIERE
    es: BARRERA
    ko: 배리어
  descriptions:
    jp_kana: "めのまえに　かべを　つくりだし\nぼうぎょを　グーンとあげる"
    en: "Sharply increases\nuser’s DEFENSE."
    fr: "Monte DEF. du lan-\nceur énormément."
    it: "Migliora di molto\nDIFESA."
    de: "Hebt VERT-Wert des\nAngreifers enorm."
    es: "Aumenta bastante\ntu DEFENSA."
    ko: "눈 앞에 벽을 만들어서\n방어력을 팍 올린다"
baton_pass:
  names:
    jp_kana: バトンタッチ
    en: BATON PASS
    fr: RELAIS
    it: STAFFETTA
    de: STAFFETTE
    es: RELEVO
    ko: 바톤 터치
  descriptions:
    jp_kana: "ついかこうかを　のこしたまま\nほかの　ポケモンと　いれかわる"
    en: "Switches while\nkeeping effects."
    fr: "Change et garde\nles effets."
    it: "Mantiene effetti\ndurante cambio."
    de: "Tausch von Status-\nveränderungen."
    es: "Cambia y mantiene\nlos efectos."
    ko: "추가효과를 남겨놓은 채로\n다른 포켓몬으로 교체한다"
beat_up:
  names:
    jp_kana: ふくろだたき
    en: BEAT UP
    fr: BASTON
    it: PICCHIADURO
    de: PRÜGLER
    es: PALIZA
    ko: 집단구타
  descriptions:
    jp_kana: "なかまの　ポケモンが\nこうげきに　さんか　してくれる"
    en: "Party POKéMON join\nin the attack."
    fr: "Les PKMN d’équipe\nfrappent ensemble."
    it: "Tutta la squadra\nall’attacco."
    de: "POKéMON vom Team\ngreifen auch an."
    es: "Ataque de todo el\nequipo POKéMON."
    ko: "동료 포켓몬이\n공격에 참가해준다"
belly_drum:
  names:
    jp_kana: はらだいこ
    en: BELLY DRUM
    fr: COGNOBIDON
    it: PANCIAMBURO
    de: BAUCHTROMMEL
    es: TAMBOR
    ko: 배북
  descriptions:
    jp_kana: "じぶんの　たいりょくを　けずって\nこうげきを　さいだいまで　あげる"
    en: "Reduces own HP to\nmaximize ATTACK."
    fr: "Baisse les PV pour\nmaximiser ATTAQUE."
    it: "Potenzia ATTACCO\nma riduce i PS."
    de: "Senkt KP + maxi- \nmiert ANGR-Wert."
    es: "Reduce tus PS para\nmejorar el ATAQUE."
    ko: "자신의 체력을 떨어뜨려서\n공격력을 최대로 끌어올린다"
bide:
  names:
    jp_kana: がまん
    en: BIDE
    fr: PATIENCE
    it: PAZIENZA
    de: GEDULD
    es: VENGANZA
    ko: 참기
  descriptions:
    jp_kana: "２ー３ターン　こうげきに　たえて\nうけたダメージを　ばいにしてかえす"
    en: "Waits 2-3 turns &\nhits back double."
    fr: "Attend 2 à 3 tours\net frappe double."
    it: "Restit.il colpo\nX2 dopo 2-3 turni."
    de: "Trifft nach 2-3\nRunden doppelt."
    es: "Espera 2-3 turnos\ny dobla el ataque."
    ko: "2-3턴 공격을 참고 견뎌서\n받은 데미지를 배로해서 돌려준다"
bind:
  names:
    jp_kana: しめつける
    en: BIND
    fr: ETREINTE
    it: LEGATUTTO
    de: KLAMMERGRIFF
    es: ATADURA
    ko: 조이기
  descriptions:
    jp_kana: "２ー５ターンのあいだ　ながいからだや\nつるを　つかって　てきを　しめつける"
    en: "Binds the target\nfor 2-5 turns."
    fr: "Aveugle la cible\nde 2 à 5 tours."
    it: "Lega il nemico\nper 2-5 turni."
    de: "Umklammert Gegner\nbis zu 5 mal."
    es: "Ataca al enemigo\nde 2 a 5 turnos."
    ko: "2-5턴 동안에 긴 몸이나\n넝쿨을 사용하여 적을 힘껏 조른다"
bite:
  names:
    jp_kana: かみつく
    en: BITE
    fr: MORSURE
    it: MORSO
    de: BISS
    es: MORDISCO
    ko: 물기
  descriptions:
    jp_kana: "するどい　はで　かみついて　こうげき\nてきを　ひるませることがある"
    en: "An attack that may\ncause flinching."
    fr: "Attaque pouvant a-\npeurer la cible."
    it: "Può far tentennare\nl’avversario."
    de: "Gegner muss evtl.\nausweichen."
    es: "Ataque que puede\ncausar retirada."
    ko: "날카로운 이빨로 물어뜯어 공격\n적의 기세를 꺾기도 한다"
blizzard:
  names:
    jp_kana: ふぶき
    en: BLIZZARD
    fr: BLIZZARD
    it: BORA
    de: BLIZZARD
    es: VENTISCA
    ko: 눈보라
  descriptions:
    jp_kana: "ゆきを　つよいかぜにのせて　こうげき\nてきを　こおらせることがある"
    en: "An attack that may\nfreeze the foe."
    fr: "Attaque pouvant\ngeler la cible."
    it: "Può congelare\nil nemico."
    de: "Gegner wird evtl.\neingefroren."
    es: "Ataque que puede\ncongelar al rival."
    ko: "눈을 강한 바람에 실어서 공격\n적을 얼게 만들기도 한다"
body_slam:
  names:
    jp_kana: のしかかり
    en: BODY SLAM
    fr: PLAQUAGE
    it: BODY SLAM
    de: BODYSLAM
    es: GOLPE CUERPO
    ko: 누르기
  descriptions:
    jp_kana: "からだごと　たおれこんで　こうげき\nてきを　まひさせることがある"
    en: "An attack that may\ncause paralysis."
    fr: "Attaque pouvant\nparalyser."
    it: "Attacco che può\ncausare paralisi."
    de: "Gegner ist evtl.\nparalysiert."
    es: "Ataque que puede\nparalizar."
    ko: "몸 전체로 쓰러지며 공격\n적을 마비시키기도 한다"
bone_club:
  names:
    jp_kana: ホネこんぼう
    en: BONE CLUB
    fr: MASSD’OS
    it: OSSOCLAVA
    de: KNOCHENKEULE
    es: HUESO PALO
    ko: 뼈다귀치기
  descriptions:
    jp_kana: "てにもった　ホネで　てきを　こうげき\nてきを　ひるませることがある"
    en: "An attack that may\ncause flinching."
    fr: "Attaque pouvant a-\npeurer la cible."
    it: "Può far vacillare\nl’avversario."
    de: "Gegner muss evtl.\nausweichen."
    es: "Ataque que causa\nla retirada."
    ko: "손에 쥔 뼈다귀로 적을 공격\n적의 기세를 꺾기도 한다"
bone_rush:
  names:
    jp_kana: ボーンラッシュ
    en: BONE RUSH
    fr: CHARGE-OS
    it: OSSORAFFICA
    de: KNOCHENHATZ
    es: ATAQUE ÓSEO
    ko: 본러쉬
  descriptions:
    jp_kana: "てにもった　ホネで　２ー５かい\nれんぞくで　てきを　こうげきする"
    en: "An attack that\nhits 2-5 times."
    fr: "Attaque touchant\n2 à 5 fois."
    it: "Colpisce\n2-5 volte."
    de: "Trifft bis zu\n5 mal."
    es: "Ataque que golpea\nde 2 a 5 veces."
    ko: "손에 들은 뼈다귀로 2-5회\n연속으로 적을 공격한다"
bonemerang:
  names:
    jp_kana: ホネブーメラン
    en: BONEMERANG
    fr: OSMERANG
    it: OSSOMERANG
    de: KNOCHMERANG
    es: HUESOMERANG
    ko: 뼈다귀부메랑
  descriptions:
    jp_kana: "ホネを　なげつけて　いきと　かえりで\n２かい　れんぞくで　こうげき"
    en: "An attack that\nstrikes twice."
    fr: "Attaque touchant\ndeux fois."
    it: "Un attacco che\ncolpisce 2 volte."
    de: Trifft 2 mal.
    es: "Ataque que golpea\ndos veces."
    ko: "뼈다귀를 던져 갔다가 돌아오면서\n2회 연속으로 공격한다"
bubble:
  names:
    jp_kana: あわ
    en: BUBBLE
    fr: ECUME
    it: BOLLA
    de: BLUBBER
    es: BURBUJA
    ko: 거품
  descriptions:
    jp_kana: "あわを　ふきかけて　こうげき\nてきの　すばやさを　さげることがある"
    en: "An attack that may\nreduce SPEED."
    fr: "Attaque pouvant\nbaisser VITESSE."
    it: "Un attacco che può\nridurre VELOCITÀ."
    de: "Senkt evtl. INIT-\nWert des Gegners."
    es: "Puede reducir\nla VELOCIDAD."
    ko: "거품을 뿜어서 공격한다\n적의 스피드를 둔화시키기도 한다"
bubble_beam:
  names:
    jp_kana: バブルこうせん
    en: BUBBLEBEAM
    fr: BULLES D’O
    it: BOLLARAGGIO
    de: BLUBBSTRAHL
    es: RAYO BURBUJA
    ko: 거품광선
  descriptions:
    jp_kana: "あわを　いきおいよく　はっしゃする\nてきの　すばやさを　さげることがある"
    en: "An attack that may\nlower SPEED."
    fr: "Attaque pouvant\nbaisser VITESSE."
    it: "Può dimimuire la\nVELOCITÀ."
    de: "Senkt evtl. INIT-\nWert des Gegners."
    es: "Puede reducir\nla VELOCIDAD."
    ko: "거품을 단숨에 발사한다\n적의 빠르기를 낮추게 하기도 한다"
charm:
  names:
    jp_kana: あまえる
    en: CHARM
    fr: CHARME
    it: FASCINO
    de: CHARME
    es: ENCANTO
    ko: 애교부리기
  descriptions:
    jp_kana: "かわいくあまえて　てきを　ゆだんさせ\nこうげきを　ガクッとさげさせる"
    en: "Sharply lowers the\nfoe’s ATTACK."
    fr: "Baisse ATTAQUE de\ncible énormément."
    it: "Riduce di molto\nATTACCO nemico."
    de: "Senkt ANGR-Wert\ndes Gegners enorm."
    es: "Reduce bastante el\nATAQUE del rival."
    ko: "귀여운 애교로 적을 방심시켜서\n공격력을 떨어뜨린다"
clamp:
  names:
    jp_kana: からではさむ
    en: CLAMP
    fr: CLAQUOIR
    it: TENAGLIA
    de: SCHNAPPER
    es: TENAZA
    ko: 껍질끼우기
  descriptions:
    jp_kana: "２ー５ターンのあいだ　てきを\nからに　はさみこんでしまう"
    en: "Traps the foe for\n2-5 turns."
    fr: "Piège la cible de\n2 à 5 tours."
    it: "Blocca il nemico\nper 2-5 turni."
    de: "Trifft Gegner bis\nzu 5 mal."
    es: "Atrapa al enemigo\nde 2 a 5 turnos."
    ko: "2-5턴 동안에 적을\n껍질로 찝어 버린다"
comet_punch:
  names:
    jp_kana: れんぞくパンチ
    en: COMET PUNCH
    fr: POING COMETE
    it: COMETAPUGNO
    de: KOMETENHIEB
    es: PUÑO COMETA
    ko: 연속펀치
  descriptions:
    jp_kana: "てきを　れんぞくで　なぐりつけ\n２ー５かい　れんぞくで　こうげき"
    en: "Repeatedly punches\n2-5 times."
    fr: "Frappe de 2 à\n5 fois."
    it: "2-5 pugni\nripetuti."
    de: "Trifft bis zu\n5 mal."
    es: "Pega de 2 a 5\nveces seguidas."
    ko: "적을 연속으로 두들겨 패서\n2-5회 연속으로 공격"
confuse_ray:
  names:
    jp_kana: あやしいひかり
    en: CONFUSE RAY
    fr: ONDE FOLIE
    it: STORDIRAGGIO
    de: KONFUSTRAHL
    es: RAYO CONFUSO
    ko: 이상한빛
  descriptions:
    jp_kana: "あやしいひかりで　てきを\nまどわし　こんらんさせてしまう"
    en: "A move that causes\nconfusion."
    fr: "Une capacité ren-\ndant confus."
    it: "Una mossa che\ncausa confusione."
    de: "Verursacht\nVerwirrung."
    es: "Provoca\nconfusión."
    ko: "이상한 빛으로 적을\n홀려서 곤란상태로 만든다"
confusion:
  names:
    jp_kana: ねんりき
    en: CONFUSION
    fr: CHOC MENTAL
    it: CONFUSIONE
    de: KONFUSION
    es: CONFUSIÓN
    ko: 염동력
  descriptions:
    jp_kana: "ちょうのうりょくで　こうげき\nてきを　こんらんさせることがある"
    en: "An attack that may\ncause confusion."
    fr: "Attaque pouvant\nrendre confus."
    it: "Può causare\nconfusione."
    de: "Gegner ist evtl.\nverwirrt."
    es: "Ataque que puede\nconfundir."
    ko: "초능력으로 공격\n적을 혼란에 빠뜨리기도 한다"
constrict:
  names:
    jp_kana: からみつく
    en: CONSTRICT
    fr: CONSTRICTION
    it: LIMITAZIONE
    de: UMKLAMMERUNG
    es: RESTRICCIÓN
    ko: 휘감기
  descriptions:
