    jp_kana: "かたいツメで　てきを　こうげき\nこうげきが　あがることがある"
    en: "An attack that may\nup user’s ATTACK."
    fr: "Peut monter l’AT-\nTAQUE du lanceur."
    it: "Potenzia ATTACCO\ndi chi lo usa."
    de: "Hebt evtl. den\nANGR-Wert."
    es: "Puede aumentar\ntu ATAQUE."
    ko: "단단한 손톱으로 적을 공격\n공격력이 높아지기도 한다"
metronome:
  names:
    jp_kana: ゆびをふる
