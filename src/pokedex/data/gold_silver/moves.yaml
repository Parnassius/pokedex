    fr: "Restaure 1/2 PV\ndu max."
    it: "Restituisce 1/2\ndei PS max."
    de: "Füllt KP zur\nHälfte auf."
    es: "Restaura la mitad\nde los PS màximos."
    ko: "상처 입은 몸을 체력의\n반정도 회복시켜준다"
mimic:
