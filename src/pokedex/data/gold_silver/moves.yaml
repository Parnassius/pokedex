    fr: CAGE-ECLAIR
    it: TUONONDA
    de: DONNERWELLE
    es: ONDA TRUENO
    ko: 전기자석파
  descriptions:
    jp_kana: "よわいでんげきを　てきに　ぶつけて\nまひさせてしまう"
    en: "A move that may\ncause paralysis."
    fr: "Capacité pouvant\nparalyser."
    it: "Una mossa che può\ncausare paralisi."
    de: "Gegner ist evtl.\nparalysiert."
    es: "Provoca paràlisis\nal enemigo."
    ko: "약한 전기를 발산해서 적에게\n부딛쳐 마비를 시킨다"
thunderbolt:
  names:
    jp_kana: １０まんボルト
    en: THUNDERBOLT
    fr: TONNERRE
    it: FULMINE
    de: DONNERBLITZ
    es: RAYO
    ko: 10만볼트
