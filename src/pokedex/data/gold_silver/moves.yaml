    fr: "Lance des dards\n2 à 5 fois."
    it: "Spilli di fuoco:\nda 3 a 5 colpi."
    de: "Trifft Gegner bis\nzu 5 mal."
    es: "Lanza pùas que\nhieren 2-5 veces."
    ko: "날카로운 바늘을 적에게 발사해서\n2-5회 연속으로 공격"
poison_gas:
  names:
    jp_kana: どくガス
