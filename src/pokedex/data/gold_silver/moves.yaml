    it: "Imita la mossa\nusata dal nemico."
    de: "Ahmt Attacke des\nAngreifers nach."
    es: "Copia un ataque\ndel enemigo."
    ko: "적이 사용한 기술이\n그때만큼만 자신의 기술이 된다"
mind_reader:
