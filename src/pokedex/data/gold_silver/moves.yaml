    jp_kana: "ものすごい　ちからをこめた　パンチで\nてきを　なぐって　こうげき"
    en: "A powerful punch\nthrown very hard."
    fr: "Un coup de poing\ntrès puissant."
    it: "Un pugno dato\ncon molta potenza."
    de: "Ein kräftiger\nPunch."
    es: "Un puñetazo de\ngran potencia."
    ko: "엄청난 힘이 실린 펀치로\n적을 때려서 공격"
megahorn:
  names:
    jp_kana: メガホーン
