    es: SOL MATINAL
    ko: 아침햇살
  descriptions:
    jp_kana: "たいりょくを　かいふくする\nじかんで　かいふくりょうが　かわる"
    en: "Restores HP\n(varies by time)."
    fr: "Restaure les PV\n(varie)."
    it: "Restituisce PS\n(varia con l’ora)."
    de: "Füllt KP auf.\n(Anzahl zufällig)"
