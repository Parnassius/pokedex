    fr: POING-ECLAIR
    it: TUONOPUGNO
    de: DONNERSCHLAG
    es: PUÑO-TRUENO
    ko: 번개펀치
  descriptions:
    jp_kana: "でんげきをこめた　パンチで　こうげき\nてきを　まひさせることがある"
