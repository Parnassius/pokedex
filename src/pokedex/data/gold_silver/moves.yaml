    fr: "Coup de pied\npuissant."
    it: "Un potente\ncalcio."
    de: "Starke\nFuß-Attacke."
    es: "Una patada muy\npotente."
    ko: "엄청낭 힘이 담긴 킥으로\n적을 걷어차서 공격"
mega_punch:
  names:
    jp_kana: メガトンパンチ
    en: MEGA PUNCH
    fr: ULTIMAPOING
    it: MEGAPUGNO
    de: MEGAHIEB
    es: MEGA PUÑO
    ko: 메가톤펀치
