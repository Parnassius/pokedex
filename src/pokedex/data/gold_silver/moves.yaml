    jp_kana: "てきの　ポケモンと　おなじ　すがたに\nさいぼうを　へんかさせ　へんしんする"
    en: "The user assumes\nthe foe’s guise."
    fr: "Le lanceur voit\nclair..."
    it: "Chi lo usa diventa\ncopia del nemico."
    de: "Angreifer erkennt\nTarnung."
    es: "Te disfrazas\ndel enemigo."
