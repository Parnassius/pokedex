    jp_kana: "あたりにくいが　ダメージは　おおきい\nあたれば　かならず　まひさせる"
    en: "An attack that\nalways paralyzes."
    fr: "Attaque paralysant\nà coup sûr."
    it: "Un attacco che\nparalizza sempre."
    de: "Gegner wird\nparalysiert."
    es: "Ataque que\nparaliza siempre."
    ko: "명중률이 낮지만 데미지는 크다\n명중하면 반드시 마비되어 버린다"
