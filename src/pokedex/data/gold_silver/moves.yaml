    fr: "Baisse la DEFENSE\nde la cible."
    it: "Riduce DIFESA\ndel nemico."
    de: "Senkt VERT-Wert\ndes Gegners."
    es: "Baja la DEFENSA\ndel enemigo."
    ko: "적에게 꼬리를 흔들어 방심하게\n만들어서 방어력을 낮춘다"
take_down:
  names:
    jp_kana: とっしん
    en: TAKE DOWN
    fr: BELIER
    it: RIDUTTORE
    de: BODYCHECK
