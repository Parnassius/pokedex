    fr: DANSE-FLEUR
    it: PETALODANZA
    de: BLÄTTERTANZ
    es: DANZA PÉTALO
    ko: 꽃잎댄스
  descriptions:
    jp_kana: "２ー３ターンのあいだ　あばれつづける\nあばれたあとは　こんらんしてしまう"
    en: "Works 2-3 turns\nand confuses user."
    fr: "Dure 2 à 3 tours.\nLanceur confus."
    it: "Dura 2-3 turni ma\nconf. chi attacca."
    de: "Hält 2-3 Runden.\nVerw. Angreifer."
