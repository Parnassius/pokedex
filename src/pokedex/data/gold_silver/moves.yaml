    fr: "Vole 1/2 des dé-\ngâts infligés."
    it: "Ruba PS pari a\n1/2 del danno."
    de: "Erhält Hälfte des\nSchadens als KP."
    es: "Quita la mitad del\ndaño producido."
    ko: "적에게 입힌 데미지의\n반정도를 체력으로 회복한다"
mega_kick:
  names:
    jp_kana: メガトンキック
