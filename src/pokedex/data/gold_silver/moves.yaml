    fr: POUDRE TOXIK
    it: VELENPOLVERE
    de: GIFTPUDER
    es: POLVO VENENO
    ko: 독가루
  descriptions:
    jp_kana: "どくそを　ふくんだ　こなを　ふりまき\nてきに　どくをあたえる"
    en: "A move that may\npoison the foe."
    fr: "Capacité pouvant\nempoisonner."
    it: "Può causare\navvelenamento."
    de: "Gegner wird evtl.\nvergiftet."
    es: "Puede envenenar\nal enemigo."
    ko: "독소를 지닌 가루를 뿌려서\n적을 중독시킨다"
poison_sting:
  names:
    jp_kana: どくばり
