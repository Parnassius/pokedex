    fr: "N’a aucun effet.\nRien. Zéro."
    it: "È sempre\ninefficace."
    de: Keine Wirkung.
    es: "No tiene ningùn\nefecto."
    ko: "팔딱 튀기만 하고 아무 일도\n일어나지 않는다⋯"
spore:
  names:
    jp_kana: キノコのほうし
