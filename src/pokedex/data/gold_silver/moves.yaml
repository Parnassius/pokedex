    it: "La mossa seguente\nandrà a segno."
    de: "Treffergarantie\nbeim Angriff."
    es: "Garantiza el éxito\ndel próximo golpe."
    ko: "적의 움직임을 마음으로 느껴서\n다음의 공격을 반드시 맞춘다"
minimize:
