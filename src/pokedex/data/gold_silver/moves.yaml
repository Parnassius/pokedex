    fr: "Frappe avec un\nbec, etc."
    it: "Colpisce con\nbeccate e altro."
    de: "Greift Gegner mit\nSchnabel an."
    es: "Ataca al enemigo\ncon el pico."
    ko: "부리 등을 사용하여\n적을 쪼아서 공격한다"
perish_song:
  names:
