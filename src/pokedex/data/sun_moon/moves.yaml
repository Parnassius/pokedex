10_000_000_volt_thunderbolt:
  names:
    jp_kana: １０００まんボルト
    jp_kanji: １０００まんボルト
    en: 10,000,000 Volt Thunderbolt
    fr: Giga-Tonnerre
    it: Iperfulmine
    de: Tausendfacher Donnerblitz
    es: Gigarrayo Fulminante
    ko: 1000만볼트
    zh_simp: 千万伏特
    zh_trad: 千萬伏特
  descriptions:
    jp_kana: "ぼうしを　かぶった　ピカチュウが\nＺパワーで　パワーアップした　でんげきを\nはなつ。　きゅうしょに　あたりやすい。"
    jp_kanji: "帽子を　かぶった　ピカチュウが\nＺパワーで　パワーアップした　電撃を\n放つ。　急所に　当たりやすい。"
    en: "The user, Pikachu wearing a cap, powers up a jolt of\nelectricity using its Z-Power and unleashes it.\nCritical hits land more easily."
    fr: "Le Pikachu à casquette utilise la Force Z pour\naugmenter sa puissance électrique avant de\nla déchaîner sur la cible. Taux de critique élevé."
    it: "Grazie al Potere Z, Pikachu con il berretto scatena\nuna potentissima scarica elettrica. Probabile brutto\ncolpo."
    de: "Das eine Kappe tragende Pikachu greift das Ziel mit\neinem durch Z-Kraft verstärkten Elektroschock an.\nHohe Volltrefferquote."
    es: "Los Pikachu con gorra acumulan una carga eléctrica\ndescomunal gracias al Poder Z y la lanzan contra el\nobjetivo. Suele ser crítico."
    ko: "모자를 쓴 피카츄가\nZ파워로 파워업한 전격을\n쏜다. 급소에 맞기 쉽다."
    zh_simp: "戴着帽子的皮卡丘将通过Ｚ力量\n增强的电击全力释放给对手。\n容易击中要害。"
    zh_trad: "戴著帽子的皮卡丘向對手\n釋放出藉由Ｚ力量增強的電流。\n容易擊中要害。"
absorb:
  names:
    jp_kana: すいとる
    jp_kanji: すいとる
    en: Absorb
    fr: Vol-Vie
    it: Assorbimento
    de: Absorber
    es: Absorber
    ko: 흡수
    zh_simp: 吸取
    zh_trad: 吸取
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあいてに　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふくできる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: Attacke, die die Hälfte des Schadens absorbiert.
    es: "Absorbe la mitad del daño producido en el objetivo \npara restaurar los PS del usuario."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
accelerock:
  names:
    jp_kana: アクセルロック
    jp_kanji: アクセルロック
    en: Accelerock
    fr: Vif Roc
    it: Rocciarapida
    de: Turbofelsen
    es: Roca Veloz
    ko: 액셀록
    zh_simp: 冲岩
    zh_trad: 衝岩
  descriptions:
    jp_kana: "すばやい　スピードで\nあいてに　ぶつかって　こうげきする。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "素早い　スピードで\n相手に　ぶつかって　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user smashes into the target at high speed.\nThis move always goes first."
    fr: "Le lanceur charge l’ennemi à toute vitesse.\nFrappe en priorité."
    it: "Chi la usa attacca il bersaglio colpendolo a tutta\nvelocità. Questa mossa ha priorità alta."
    de: "Der Anwender prallt mit großer Geschwindigkeit\nauf das Ziel. Hohe Erstschlagquote."
    es: "El usuario se lanza contra el objetivo a gran\nvelocidad. Siempre ataca primero."
    ko: "재빠른 스피드로\n상대에게 부딪쳐서 공격한다.\n반드시 선제공격할 수 있다."
    zh_simp: "迅速撞向对手进行攻击。\n必定能够先制攻击。"
    zh_trad: "迅速撞向對手進行攻擊。\n必定能夠發動先制攻擊。"
acid:
  names:
    jp_kana: ようかいえき
    jp_kanji: ようかいえき
    en: Acid
    fr: Acide
    it: Acido
    de: Säure
    es: Ácido
    ko: 용해액
    zh_simp: 溶解液
    zh_trad: 溶解液
  descriptions:
    jp_kana: "つよい　さんを　あいてに　かけて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　酸を　相手に　かけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The opposing Pokémon are attacked with a spray of\nharsh acid. This may also lower their Sp. Def stat."
    fr: "Le lanceur attaque l’ennemi avec un jet d’acide\ncorrosif. Peut aussi baisser sa Défense Spéciale."
    it: "Colpisce i nemici intorno spruzzando un acido\ncorrosivo. Può anche ridurne la Difesa Speciale."
    de: "Versprüht ätzende Flüssigkeit, die eventuell die\nSpezial-Verteidigung der Gegner in der Nähe des\nAnwenders senkt."
    es: "Rocía a los enemigos con un ácido corrosivo. \nPuede bajar la Defensa Especial."
    ko: "강한 산을 상대에게 끼얹어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将强酸泼向对手进行攻击。\n有时会降低对手的特防。"
    zh_trad: "將強酸潑向對手進行攻擊。\n有時會降低對手的特防。"
acid_armor:
  names:
    jp_kana: とける
    jp_kanji: とける
    en: Acid Armor
    fr: Acidarmure
    it: Scudo Acido
    de: Säurepanzer
    es: Armadura Ácida
    ko: 녹기
    zh_simp: 溶化
    zh_trad: 溶化
  descriptions:
    jp_kana: "さいぼうの　へんかで　えきじょうに　なり\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "細胞の　変化で　液状に　なり\n自分の　防御を　ぐーんと　あげる。"
    en: "The user alters its cellular structure to liquefy itself,\nsharply raising its Defense stat."
    fr: "Le lanceur modifie sa structure moléculaire pour\nse liquéfier et beaucoup augmenter sa Défense."
    it: "Chi la usa altera la sua struttura cellulare passando\nallo stato liquido. La Difesa sale di molto."
    de: "Verflüssigt Körperzellen des Anwenders. Erhöht den\nVerteidigungs-Wert stark."
    es: "Transforma la estructura celular para hacerse líquido\ny aumenta mucho la Defensa."
    ko: "세포의 변화로 액체가 되어\n자신의 방어를 크게 올린다."
    zh_simp: "通过细胞的变化进行液化，\n从而大幅提高自己的防御。"
    zh_trad: "藉由細胞的變化讓身體液化，\n大幅提高自己的防禦。"
acid_downpour:physical:
  names:
    jp_kana: アシッドポイズンデリート
    jp_kanji: アシッドポイズンデリート
    en: Acid Downpour
    fr: Déluge Causti-Toxique
    it: Acidiluvio Corrosivo
    de: Vernichtender Säureregen
    es: Diluvio Corrosivo
    ko: 애시드포이즌딜리트
    zh_simp: 强酸剧毒灭绝雨
    zh_trad: 強酸劇毒滅絕雨
  descriptions:
    jp_kana: "Ｚパワーで　どくの　ぬまを　わきあがらせ\nぜんりょくで　あいてを　しずめる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　毒の　沼を　湧きあがらせ\n全力で　相手を　沈める。\n元になった　技で　威力が　変わる。"
    en: "The user creates a poisonous swamp using its\nZ-Power and sinks the target into it at full force.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour répandre\nun marécage empoisonné où l’adversaire sombre. La\npuissance varie selon celle de la capacité originale."
    it: "Chi la usa sfrutta il Potere Z per creare una palude\nvelenosa che sommerge il bersaglio. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Der Anwender kreiert mit Z-Kraft ein giftiges Moor,\nin dem das Ziel versinkt. Die Stärke variiert je nach\nzugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para crear una ciénaga\nvenenosa en la que sumerge al objetivo. Su potencia\ndepende de la del movimiento original."
    ko: "Z파워로 독의 늪을 만들어\n전력으로 상대를 가라앉힌다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量使毒沼涌起，\n全力让对手沉下去。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量湧起毒沼，\n全力使對手下沉。\n威力會隨原本的招式而改變。"
acid_downpour:special:
  names:
    jp_kana: アシッドポイズンデリート
    jp_kanji: アシッドポイズンデリート
    en: Acid Downpour
    fr: Déluge Causti-Toxique
    it: Acidiluvio Corrosivo
    de: Vernichtender Säureregen
    es: Diluvio Corrosivo
    ko: 애시드포이즌딜리트
    zh_simp: 强酸剧毒灭绝雨
    zh_trad: 強酸劇毒滅絕雨
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
acid_spray:
  names:
    jp_kana: アシッドボム
    jp_kanji: アシッドボム
    en: Acid Spray
    fr: Bombe Acide
    it: Acidobomba
    de: Säurespeier
    es: Bomba Ácida
    ko: 애시드봄
    zh_simp: 酸液炸弹
    zh_trad: 酸液炸彈
  descriptions:
    jp_kana: "あいてを　とかす　えきたいを\nはきだして　こうげきする。\nあいての　とくぼうを　がくっと　さげる。"
    jp_kanji: "相手を　とかす　液体を\n吐きだして　攻撃する。\n相手の　特防を　がくっと　さげる。"
    en: "The user spits fluid that works to melt the target.\nThis harshly lowers the target’s Sp. Def stat."
    fr: "Projette un liquide acide qui fait fondre l’ennemi.\nSa Défense Spéciale diminue beaucoup."
    it: "Chi la usa attacca il bersaglio con un acido\naltamente corrosivo. Il fluido riduce di molto\nla Difesa Speciale del bersaglio."
    de: "Anwender greift an, indem er eine ätzende\nFlüssigkeit auf das Ziel speit. Senkt dessen\nSpezial-Verteidigung stark."
    es: "Ataca con un líquido corrosivo, reduciendo mucho \nla Defensa Especial del objetivo."
    ko: "상대를 녹이는 액체를\n토해내서 공격한다.\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "喷出能溶化对手的液体进行攻击。\n大幅降低对手的特防。"
    zh_trad: "噴出能溶化對手的液體進行攻擊。\n可大幅降低對手的特防。"
acrobatics:
  names:
    jp_kana: アクロバット
    jp_kanji: アクロバット
    en: Acrobatics
    fr: Acrobatie
    it: Acrobazia
    de: Akrobatik
    es: Acróbata
    ko: 애크러뱃
    zh_simp: 杂技
    zh_trad: 雜技
  descriptions:
    jp_kana: "かろやかに　あいてを　こうげきする。\nじぶんが　どうぐを　もっていない　とき\nおおきな　ダメージを　あたえる。"
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target. If the user is not\nholding an item, this attack inflicts massive damage."
    fr: "Attaque agile. Si le lanceur ne tient pas d’objet,\nl’attaque inflige davantage de dégâts."
    it: "Attacca rapidamente il bersaglio. Se chi la usa non\nha uno strumento, infligge al nemico grossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt der Anwender\nkein Item bei sich, richtet die Attacke großen\nSchaden an."
    es: "Golpea ágilmente. Si el usuario no porta ningún \nobjeto, el objetivo resulta seriamente dañado."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
    zh_simp: "轻巧地攻击对手。\n自己没有携带道具时，\n会给予较大的伤害。"
    zh_trad: "輕巧地攻擊對手。\n自己沒有攜帶道具時，\n能給予對手較大的傷害。"
acupressure:
  names:
    jp_kana: つぼをつく
    jp_kanji: つぼをつく
    en: Acupressure
    fr: Acupression
    it: Acupressione
    de: Akupressur
    es: Acupresión
    ko: 경혈찌르기
    zh_simp: 点穴
    zh_trad: 點穴
  descriptions:
    jp_kana: "つぼおしで　からだを\nかっせいか　させる。　のうりょくの\nどれか　１つを　ぐーんと　あげる。"
    jp_kanji: "つぼおしで　体を　活性化させる。\n能力の　どれか　１つを\nぐーんと　あげる。"
    en: "The user applies pressure to stress points, sharply\nboosting one of its or its allies’ stats."
    fr: "Le lanceur utilise sa connaissance des points\nde pression pour beaucoup augmenter une stat."
    it: "Chi la usa esercita pressione su alcuni punti\nnevralgici e aumenta di molto una statistica a caso."
    de: "Anwender übt Druck auf Stresspunkte aus und\nerhöht einen Statuswert stark."
    es: "Aplica presión en puntos clave del cuerpo para\npotenciar una de sus características."
    ko: "경혈을 눌러 몸을 활성화시킨다.\n능력 중 하나를 크게 올린다."
    zh_simp: "通过点穴\n让身体舒筋活络。\n大幅提高某１项能力。"
    zh_trad: "利用點穴激發身體的活力，\n大幅提高自己的某一項能力。"
aerial_ace:
  names:
    jp_kana: つばめがえし
    jp_kanji: つばめがえし
    en: Aerial Ace
    fr: Aéropique
    it: Aeroassalto
    de: Aero-Ass
    es: Golpe Aéreo
    ko: 제비반환
    zh_simp: 燕返
    zh_trad: 燕返
  descriptions:
    jp_kana: "すばやい　うごきで\nあいてを　ほんろうして　きりつける。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    en: "The user confounds the target with speed, then\nslashes. This attack never misses."
    fr: "Le lanceur prend l’ennemi de vitesse et le lacère.\nN’échoue jamais."
    it: "Chi la usa attacca il bersaglio a grande velocità.\nQuesta mossa è infallibile."
    de: "Eine extrem schnelle Attacke, der das Ziel nicht\nausweichen kann."
    es: El usuario lanza un ataque muy rápido e ineludible.
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
    zh_simp: "以敏捷的动作\n戏弄对手后进行切斩。\n攻击必定会命中。"
    zh_trad: "以敏捷的動作\n戲弄對手後進行切斬。\n攻擊必定會命中。"
aeroblast:
  names:
    jp_kana: エアロブラスト
    jp_kanji: エアロブラスト
    en: Aeroblast
    fr: Aéroblast
    it: Aerocolpo
    de: Luftstoß
    es: Aerochorro
    ko: 에어로블라스트
    zh_simp: 气旋攻击
    zh_trad: 氣旋攻擊
  descriptions:
    jp_kana: "くうきの　うずを\nはっしゃして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "空気の　渦を\n発射して　攻撃する。\n急所に　当たりやすい。"
    en: "A vortex of air is shot at the target to inflict damage.\nCritical hits land more easily."
    fr: "Le lanceur projette une tornade sur l’ennemi pour\ninfliger des dégâts. Taux de critique élevé."
    it: "Colpisce il bersaglio con un vortice d’aria\nper danneggiarlo. Probabile brutto colpo."
    de: "Erzeugt Luftstrudel gegen das Ziel.\nHohe Volltrefferquote."
    es: "Lanza un chorro de aire que suele dar un golpe \ncrítico."
    ko: "공기의 소용돌이를\n발사하여 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "发射空气旋涡\n进行攻击。\n容易击中要害。"
    zh_trad: "向對手發射空氣漩渦\n進行攻擊。\n容易擊中要害。"
after_you:
  names:
    jp_kana: おさきにどうぞ
    jp_kanji: おさきにどうぞ
    en: After You
    fr: Après Vous
    it: Cortesia
    de: Galanterie
    es: Cede Paso
    ko: 당신먼저
    zh_simp: 您先请
    zh_trad: 您先請
  descriptions:
    jp_kana: "あいての　こうどうを　サポートして\nじぶんの　こうどうの　あとに\nつづけて　うごけるように　する。"
    jp_kanji: "相手の　行動を　サポートして\n自分の　行動の　あとに\n続けて　動けるように　する。"
    en: "The user helps the target and makes it use its move\nright after the user."
    fr: "S’il est le premier à agir, le lanceur permet à sa\ncible d’utiliser une capacité juste après lui."
    it: "Chi la usa aiuta un bersaglio più lento\npermettendogli di agire subito dopo."
    de: "Anwender ermöglicht dem Ziel direkt nach ihm zu\nhandeln, solange der Anwender als Erstes zum Zug\nkommt."
    es: "Si el usuario es el más rápido, permite al objetivo \nusar un movimiento justo tras él, adelantándose a \nPokémon más rápidos."
    ko: "상대의 행동을 도와서\n자신이 행동한 뒤에 바로\n움직일 수 있도록 한다."
    zh_simp: "支援我方或对手的行动，\n使其紧接着此招式之后行动。"
    zh_trad: "支援對手，\n讓對手緊接在自己之後行動。"
agility:
  names:
    jp_kana: こうそくいどう
    jp_kanji: こうそくいどう
    en: Agility
    fr: Hâte
    it: Agilità
    de: Agilität
    es: Agilidad
    ko: 고속이동
    zh_simp: 高速移动
    zh_trad: 高速移動
  descriptions:
    jp_kana: "ちからを　ぬいて　からだを　かるくして\nこうそくで　うごく。\nじぶんの　すばやさを　ぐーんと　あげる。"
    jp_kanji: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    en: "The user relaxes and lightens its body to move\nfaster. This sharply raises the Speed stat."
    fr: "Le lanceur se relaxe et allège son corps pour\nbeaucoup augmenter sa Vitesse."
    it: "Chi la usa rilassa e alleggerisce il proprio corpo\nper far salire di molto la Velocità."
    de: "Entspannt den Körper, um den Initiative-Wert stark\nzu erhöhen."
    es: Relaja el cuerpo para ganar mucha Velocidad.
    ko: "힘을 빼고 몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를 크게 올린다."
    zh_simp: "让身体放松变得轻盈，\n以便高速移动。\n大幅提高自己的速度。"
    zh_trad: "放鬆身體，\n讓自己變得輕盈以進行高速移動。\n可大幅提高自己的速度。"
air_cutter:
  names:
    jp_kana: エアカッター
    jp_kanji: エアカッター
    en: Air Cutter
    fr: Tranch’Air
    it: Aerasoio
    de: Windschnitt
    es: Aire Afilado
    ko: 에어컷터
    zh_simp: 空气利刃
    zh_trad: 空氣利刃
  descriptions:
    jp_kana: "するどい　かぜで\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "鋭い　風で\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user launches razor-like wind to slash the\nopposing Pokémon. Critical hits land more easily."
    fr: "Le lanceur appelle des vents tranchants qui\nlacèrent l’ennemi. Taux de critique élevé."
    it: "Chi la usa provoca un vento tagliente che sferza\ni nemici intorno. Probabile brutto colpo."
    de: "Greift mit rasierklingenartigem Wind an.\nHohe Volltrefferquote."
    es: "Viento cortante que azota. Suele ser un golpe \ncrítico."
    ko: "날카로운 바람으로\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用锐利的风\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "用鋒利的風刃\n斬切對手進行攻擊。\n容易擊中要害。"
air_slash:
  names:
    jp_kana: エアスラッシュ
    jp_kanji: エアスラッシュ
    en: Air Slash
    fr: Lame d’Air
    it: Eterelama
    de: Luftschnitt
    es: Tajo Aéreo
    ko: 에어슬래시
    zh_simp: 空气斩
    zh_trad: 空氣斬
  descriptions:
    jp_kana: "そらをも　きりさく\nくうきの　やいばで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "空をも　切り裂く\n空気の　刃で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks with a blade of air that slices even\nthe sky. This may also make the target flinch."
    fr: "Le lanceur attaque avec une lame d’air qui fend\ntout. Peut aussi apeurer l’ennemi."
    it: "Chi la usa attacca con un vento tagliente\nche squarcia il cielo. Può anche far tentennare\nil Pokémon colpito."
    de: "Das Ziel wird mit einer Luftklinge angegriffen.\nZiel schreckt eventuell zurück."
    es: "Ataca con una hoja de aire que incluso corta el cielo. \nTambién puede hacer retroceder al objetivo."
    ko: "하늘까지 베어 가르는\n공기의 칼날로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用连天空也能劈开的\n空气之刃进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用連天空也能劈開的\n空氣之刃進行攻擊。\n有時會使對手畏縮。"
all_out_pummeling:physical:
  names:
    jp_kana: ぜんりょくむそうげきれつけん
    jp_kanji: ぜんりょくむそうげきれつけん
    en: All-Out Pummeling
    fr: Combo Hyper-Furie
    it: Iperscarica Furiosa
    de: Fulminante Faustschläge
    es: Ráfaga Demoledora
    ko: 전력무쌍격렬권
    zh_simp: 全力无双激烈拳
    zh_trad: 全力無雙激烈拳
  descriptions:
    jp_kana: "Ｚパワーで　つくった　エネルギーの　たまを\nぜんりょくで　あいてに　ぶつける。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　作った　エネルギーの　弾を\n全力で　相手に　ぶつける。\n元になった　技で　威力が　変わる。"
    en: "The user rams an energy orb created by its Z-Power\ninto the target with full force. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour créer une boule\nd’énergie qu’il projette sur l’adversaire. La puissance\nvarie selon celle de la capacité originale."
    it: "Chi la usa scaglia sul bersaglio una scarica di colpi\ncarichi di Potere Z. La potenza varia a seconda\ndella mossa su cui si basa."
    de: "Aus Z-Kraft hergestellte Energiebälle prallen mit\nvoller Wucht auf das Ziel. Die Stärke variiert je nach\nzugrunde liegender Attacke."
    es: "Emplea el Poder Z para lanzar una sarta de golpes\ndemoledores contra el objetivo. Su potencia depende\nde la del movimiento original."
    ko: "Z파워로 만든 에너지 구슬을\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量制造出能量弹，\n全力撞向对手。\n威力会根据原来的招式而改变。"
    zh_trad: "將透過Ｚ力量製造的\n能量彈全力撞向對手。\n威力會隨原本的招式而改變。"
all_out_pummeling:special:
  names:
    jp_kana: ぜんりょくむそうげきれつけん
    jp_kanji: ぜんりょくむそうげきれつけん
    en: All-Out Pummeling
    fr: Combo Hyper-Furie
    it: Iperscarica Furiosa
    de: Fulminante Faustschläge
    es: Ráfaga Demoledora
    ko: 전력무쌍격렬권
    zh_simp: 全力无双激烈拳
    zh_trad: 全力無雙激烈拳
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
ally_switch:
  names:
    jp_kana: サイドチェンジ
    jp_kanji: サイドチェンジ
    en: Ally Switch
    fr: Interversion
    it: Cambiaposto
    de: Seitentausch
    es: Cambio Banda
    ko: 사이드체인지
    zh_simp: 交换场地
    zh_trad: 交換場地
  descriptions:
    jp_kana: "ふしぎな　ちからで　テレポートして\nじぶんと　みかたの　いばしょを\nいれかえる。"
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ替える。"
    en: "The user teleports using a strange power and\nswitches places with one of its allies."
    fr: "Le lanceur se téléporte à l’aide d’un pouvoir\nmystérieux. Il échange sa place avec celle d’un\nallié sur le terrain."
    it: "Chi la usa cambia di posto con un alleato\nin campo grazie a un misterioso potere."
    de: "Wundersame Kräfte teleportieren den Anwender an\nden Platz eines Mitstreiters."
    es: "Extraño poder que intercambia la posición del \nusuario con la de un aliado sobre el terreno de \ncombate."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편이 있는 장소를\n바꾼다."
    zh_simp: "用神奇的力量瞬间移动，\n互换自己和同伴所在的位置。"
    zh_trad: "用神奇的力量瞬間移動，\n讓自己和同伴的所在位置互換。"
amnesia:
  names:
    jp_kana: ドわすれ
    jp_kanji: ドわすれ
    en: Amnesia
    fr: Amnésie
    it: Amnesia
    de: Amnesie
    es: Amnesia
    ko: 망각술
    zh_simp: 瞬间失忆
    zh_trad: 瞬間失憶
  descriptions:
    jp_kana: "あたまを　からにして\nいっしゅん　なにかを　わすれる　ことで\nじぶんの　とくぼうを　ぐーんと　あげる。"
    jp_kanji: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    en: "The user temporarily empties its mind to forget its\nconcerns. This sharply raises the user’s Sp. Def stat."
    fr: "Le lanceur fait le vide dans son esprit pour\noublier ses soucis. Augmente beaucoup sa\nDéfense Spéciale."
    it: "Chi la usa svuota per un po’ la mente per\ndimenticare i problemi. La Difesa Speciale\naumenta di molto."
    de: "Gedächtnisverlust, der die Spezial-Verteidigung\nstark erhöht."
    es: "El usuario olvida sus preocupaciones y aumenta \nmucho la Defensa Especial."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n자신의 특수방어를 크게 올린다."
    zh_simp: "将头脑清空，\n瞬间忘记某事，\n从而大幅提高自己的特防。"
    zh_trad: "將頭腦清空，\n藉由在一瞬間遺忘某些事\n大幅提高自己的特防。"
anchor_shot:
  names:
    jp_kana: アンカーショット
    jp_kanji: アンカーショット
    en: Anchor Shot
    fr: Ancrage
    it: Colpo d’Ancora
    de: Ankerschuss
    es: Anclaje
    ko: 앵커숏
    zh_simp: 掷锚
    zh_trad: 擲錨
  descriptions:
    jp_kana: "アンカーを　あいてに　からませて\nこうげきする。　あいては\nにげることが　できなくなる。"
    jp_kanji: "アンカーを　相手に　からませて\n攻撃する。　相手は\n逃げることが　できなくなる。"
    en: "The user entangles the target with its anchor chain\nwhile attacking. The target becomes unable to flee."
    fr: "Le lanceur jette son ancre sur la cible pour l’attaquer.\nUne fois accrochée, elle l’empêche de s’enfuir."
    it: "Chi la usa attacca il nemico con un’ancora e lo\nintrappola nella catena impedendogli di fuggire."
    de: "Der Anwender greift das Ziel an, indem er es mit\neiner Ankerkette umwickelt. Dadurch wird das Ziel\nan der Flucht gehindert."
    es: "Ataca lanzando un ancla al oponente, que queda\natrapado y no puede huir."
    ko: "앵커를 상대에게 휘감아서\n공격한다. 상대는\n도망칠 수 없게 된다."
    zh_simp: "将锚缠住对手进行攻击。\n使对手无法逃走。"
    zh_trad: "將錨纏住對手進行攻擊。\n使對手無法逃走。"
ancient_power:
  names:
    jp_kana: げんしのちから
    jp_kanji: げんしのちから
    en: Ancient Power
    fr: Pouvoir Antique
    it: Forzantica
    de: Antik-Kraft
    es: Poder Pasado
    ko: 원시의힘
    zh_simp: 原始之力
    zh_trad: 原始之力
  descriptions:
    jp_kana: "げんしの　ちからで　こうげきする。\nじぶんの　すべての\nのうりょくが　あがることが　ある。"
    jp_kanji: "原始の　力で　攻撃する。\n自分の　すべての\n能力が　あがることが　ある。"
    en: "The user attacks with a prehistoric power.\nThis may also raise all the user’s stats at once."
    fr: "Une attaque préhistorique qui peut augmenter\ntoutes les stats du lanceur d’un seul coup."
    it: "Colpisce il bersaglio con una forza primordiale.\nPuò aumentare tutte le statistiche."
    de: "Angriff mit antiker Kraft, der alle Statuswerte\nerhöhen kann."
    es: "Ataque prehistórico que puede subir todas las \ncaracterísticas."
    ko: "원시의 힘으로 공격한다.\n자신의 모든\n능력이 오를 때가 있다."
    zh_simp: "用原始之力进行攻击。\n有时会提高\n自己所有的能力。"
    zh_trad: "用原始之力進行攻擊。\n有時會提高\n自己的所有能力。"
aqua_jet:
  names:
    jp_kana: アクアジェット
    jp_kanji: アクアジェット
    en: Aqua Jet
    fr: Aqua-Jet
    it: Acquagetto
    de: Wasserdüse
    es: Acua Jet
    ko: 아쿠아제트
    zh_simp: 水流喷射
    zh_trad: 水流噴射
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nあいてに　つっこむ。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    en: "The user lunges at the target at a speed that makes\nit almost invisible. This move always goes first."
    fr: "Le lanceur fonce sur l’ennemi si rapidement qu’on\nparvient à peine à le discerner. Frappe en priorité."
    it: "Chi la usa colpisce a una tale velocità da rendersi\nquasi invisibile.\nQuesta mossa ha priorità alta."
    de: Sehr schneller Angriff mit hoher Erstschlagquote.
    es: "Ataque de una rapidez espeluznante. Este\nmovimiento tiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n반드시 선제공격할 수 있다."
    zh_simp: "以迅雷不及掩耳之势\n扑向对手。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢衝撞對手。\n必定能夠發動先制攻擊。"
aqua_ring:
  names:
    jp_kana: アクアリング
    jp_kanji: アクアリング
    en: Aqua Ring
    fr: Anneau Hydro
    it: Acquanello
    de: Wasserring
    es: Acua Aro
    ko: 아쿠아링
    zh_simp: 水流环
    zh_trad: 水流環
  descriptions:
    jp_kana: "じぶんの　からだの　まわりを\nみずで　つくった　ベールで　おおう。\nまいターン　ＨＰを　かいふく　する。"
    jp_kanji: "自分の　体の　周りを\n水で　つくった　ベールで　おおう。\n毎ターン　ＨＰを　回復する。"
    en: "The user envelops itself in a veil made of water.\nIt regains some HP every turn."
    fr: "Un voile d’eau recouvre le lanceur et régénère\nses PV à chaque tour."
    it: "Chi la usa si avvolge in un velo d’acqua. Recupera\nalcuni PS a ogni turno."
    de: "Anwender umgibt sich mit einem Schleier aus\nWasser. Dabei regeneriert er einige KP pro Runde."
    es: "Un manto de agua cubre al Pokémon que lo usa. \nRecupera algunos PS en cada turno."
    ko: "자신의 몸 주변을\n물로 만든 베일로 덮는다.\n매 턴 HP를 회복한다."
    zh_simp: "在自己身体的周围\n覆盖用水制造的幕。\n每回合回复ＨＰ。"
    zh_trad: "在自己的身邊套上水流環。\n每回合會回復自己的ＨＰ。"
aqua_tail:
  names:
    jp_kana: アクアテール
    jp_kanji: アクアテール
    en: Aqua Tail
    fr: Hydroqueue
    it: Idrondata
    de: Nassschweif
    es: Acua Cola
    ko: 아쿠아테일
    zh_simp: 水流尾
    zh_trad: 水流尾
  descriptions:
    jp_kana: "はげしく　あれくるう　あらなみの　ように\nおおきな　しっぽを　ふって\nあいてを　こうげきする。"
    jp_kanji: "激しく　あれくるう　荒波の　ように\n大きな　しっぽを　ふって\n相手を　攻撃する。"
    en: "The user attacks by swinging its tail as if it were a\nvicious wave in a raging storm."
    fr: "Le lanceur attaque en balançant sa queue comme\nune lame de fond en pleine tempête."
    it: "Chi la usa attacca agitando la coda come se fosse\nuna violenta ondata in una tempesta furiosa."
    de: "Anwender attackiert mit dem Schweif, als ob dieser\neine brutale Welle in einem tosenden Sturm sei."
    es: "Ataca agitando la cola como si fuera una ola rabiosa \nen una tormenta devastadora."
    ko: "세차게 날뛰는 거친 파도와 같이\n큰 꼬리를 흔들어서\n상대를 공격한다."
    zh_simp: "如惊涛骇浪般挥动\n大尾巴攻击对手。"
    zh_trad: "如驚濤駭浪般地甩動\n大尾巴攻擊對手。"
arm_thrust:
  names:
    jp_kana: つっぱり
    jp_kanji: つっぱり
    en: Arm Thrust
    fr: Cogne
    it: Sberletese
    de: Armstoß
    es: Empujón
    ko: 손바닥치기
    zh_simp: 猛推
    zh_trad: 猛推
  descriptions:
    jp_kana: "ひらいた　りょうてで\nあいてを　つっぱって　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "ひらいた　両手で\n相手を　つっぱって　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user lets loose a flurry of open-palmed arm\nthrusts that hit two to five times in a row."
    fr: "Un déluge de coups adressés avec la paume qui\nfrappe de deux à cinq fois d’affilée."
    it: "Raffica di ceffoni che colpisce da due a\ncinque volte di fila."
    de: "Schläge mit geradem Arm, die das Ziel zwei- bis\nfünfmal treffen."
    es: "Fuertes empujones que golpean de dos a cinco\nveces seguidas."
    ko: "펼친 양손으로\n상대를 번갈아 쳐서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用张开着的双手\n猛推对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用張開的雙手\n猛推對手進行攻擊。\n連續攻擊２～５次。"
aromatherapy:
  names:
    jp_kana: アロマセラピー
    jp_kanji: アロマセラピー
    en: Aromatherapy
    fr: Aromathérapie
    it: Aromaterapia
    de: Aromakur
    es: Aromaterapia
    ko: 아로마테라피
    zh_simp: 芳香治疗
    zh_trad: 芳香治療
  descriptions:
    jp_kana: "ここちよい　やすらぐ　かおりを　かがせて\nみかた　ぜんいんの\nじょうたい　いじょうを　かいふく　する。"
    jp_kanji: "心地好い　やすらぐ　香りを　かがせて\n味方全員の　状態異常を　回復する。"
    en: "The user releases a soothing scent that heals all\nstatus conditions affecting the user’s party."
    fr: "Le lanceur libère un parfum apaisant qui guérit\ntous les problèmes de statut de l’équipe."
    it: "Chi la usa rilascia un dolce profumo che cura\ntutti i problemi di stato propri e degli alleati."
    de: "Heilt alle Statusprobleme des Teams mit\nberuhigendem Duft."
    es: "Cura todos los problemas de estado del equipo \ncon un suave aroma."
    ko: "기분 좋은 평온한 향기를 맡게 하여\n같은 편 모두의 상태 이상을 회복한다."
    zh_simp: "让同伴闻沁人心脾的香气，\n从而治愈我方全员的异常状态。"
    zh_trad: "釋放出宜人的香氣，\n治癒我方全體的異常狀態。"
aromatic_mist:
  names:
    jp_kana: アロマミスト
    jp_kanji: アロマミスト
    en: Aromatic Mist
    fr: Brume Capiteuse
    it: Nebularoma
    de: Duftwolke
    es: Niebla Aromática
    ko: 아로마미스트
    zh_simp: 芳香薄雾
    zh_trad: 芳香薄霧
  descriptions:
    jp_kana: "ふしぎな　アロマの　かおりによって\nみかたの　とくぼうを　あげる。"
    jp_kanji: "不思議な　アロマの　香りによって\n味方の　特防を　あげる。"
    en: "The user raises the Sp. Def stat of an ally Pokémon\nby using a mysterious aroma."
    fr: "Grâce à un parfum mystérieux, augmente la\nDéfense Spéciale d’un allié."
    it: "Aumenta la Difesa Speciale di un alleato\ntramite un misterioso aroma."
    de: "Der Anwender erhöht mithilfe eines mysteriösen\nDuftes die Spezial-Verteidigung eines Mitstreiters."
    es: "Consigue aumentar la Defensa Especial de un \nPokémon de su equipo con una fragancia misteriosa."
    ko: "신비한 아로마 향으로\n같은 편의 특수방어를 올린다."
    zh_simp: "通过神奇的芳香，\n提高我方宝可梦的特防。"
    zh_trad: "利用神奇的芳香，\n提高我方寶可夢的特防。"
assist:
  names:
    jp_kana: ねこのて
    jp_kanji: ねこのて
    en: Assist
    fr: Assistance
    it: Assistente
    de: Zuschuss
    es: Ayuda
    ko: 조수
    zh_simp: 借助
    zh_trad: 借助
  descriptions:
    jp_kana: "おおいそぎで　みかたの　たすけを　かりて\nみかたの　ポケモンが　おぼえている\nわざを　どれか　１つ　つかう。"
    jp_kanji: "大急ぎで　味方の　助けを　かりて\n味方の　ポケモンが　おぼえている\n技を　どれか　１つ　使う。"
    en: "The user hurriedly and randomly uses a move among\nthose known by ally Pokémon."
    fr: "Le lanceur se dépêche d’utiliser une capacité au\nhasard parmi celles des Pokémon de l’équipe."
    it: "Chi la usa utilizza in fretta e a caso una\ndelle mosse degli altri Pokémon della squadra."
    de: Greift zufällig mit einer Attacke eines Mitstreiters an.
    es: "Usa un movimiento de un miembro del equipo \nelegido al azar."
    ko: "서둘러서 같은 편의 도움을 받아\n같은 편 포켓몬이 기억하고 있는\n기술 중 하나를 쓴다."
    zh_simp: "向我方紧急求助，\n从我方宝可梦已学会的\n招式中随机使用１个。"
    zh_trad: "緊急向同伴求救，\n從我方寶可夢已學會的招式中\n隨機選出１個使用。"
assurance:
  names:
    jp_kana: ダメおし
    jp_kanji: ダメおし
    en: Assurance
    fr: Assurance
    it: Garanzia
    de: Gewissheit
    es: Buena Baza
    ko: 승부굳히기
    zh_simp: 恶意追击
    zh_trad: 惡意追擊
  descriptions:
    jp_kana: "そのターンに　あいてが\nすでに　ダメージを　うけて　いたら\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "そのターンに　相手が\nすでに　ダメージを　受けていたら\n技の　威力は　２倍に　なる。"
    en: "If the target has already taken some damage in the\nsame turn, this attack’s power is doubled."
    fr: "Cette attaque est deux fois plus efficace si\nl’ennemi a déjà été blessé durant ce tour."
    it: "Se il bersaglio ha già subito dei danni nello stesso\nturno, la potenza di questa mossa raddoppia."
    de: "Hat das Ziel während der Runde schon Schaden\ngenommen, wird die Stärke der Attacke verdoppelt."
    es: "Si el objetivo ya ha sufrido daño en ese turno, la \nfuerza del ataque se duplica."
    ko: "그 턴에 상대가\n이미 데미지를 입었다면\n기술의 위력은 2배가 된다."
    zh_simp: "如果此回合内对手\n已经受到伤害的话，\n招式威力会变成２倍。"
    zh_trad: "如果此回合內對手\n已受到傷害，\n招式威力會變成２倍。"
astonish:
  names:
    jp_kana: おどろかす
    jp_kanji: おどろかす
    en: Astonish
    fr: Étonnement
    it: Sgomento
    de: Erstauner
    es: Impresionar
    ko: 놀래키기
    zh_simp: 惊吓
    zh_trad: 驚嚇
  descriptions:
    jp_kana: "おおきな　こえなどで\nふいに　おどろかして　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　声などで\n不意に　驚かして　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks the target while shouting in a\nstartling fashion. This may also make the\ntarget flinch."
    fr: "Le lanceur attaque l’ennemi en poussant un cri\nterrifiant. Peut aussi l’apeurer."
    it: "Chi la usa attacca il bersaglio emettendo un verso\nterrificante. Può anche farlo tentennare."
    de: "Anwender greift mit einem Schrei an. Ein Angriff,\nder das Ziel eventuell zurückschrecken lässt."
    es: "Impresiona tanto que puede hacer retroceder al \nobjetivo."
    ko: "큰 소리 등으로\n불시에 놀래켜서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用尖叫声等\n突然惊吓对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用巨大的聲響等\n突然驚嚇對手進行攻擊。\n有時會讓對手畏縮。"
attack_order:
  names:
    jp_kana: こうげきしれい
    jp_kanji: こうげきしれい
    en: Attack Order
    fr: Appel Attaque
    it: Comandourto
    de: Schlagbefehl
    es: Al Ataque
    ko: 공격지령
    zh_simp: 攻击指令
    zh_trad: 攻擊指令
  descriptions:
    jp_kana: "しもべを　よびだして\nあいてに　むかって　こうげき　させる。\nきゅうしょに　あたりやすい。"
    jp_kanji: "しもべを　呼びだして\n相手に　むかって　攻撃させる。\n急所に　当たりやすい。"
    en: "The user calls out its underlings to pummel the\ntarget. Critical hits land more easily."
    fr: "Le lanceur appelle ses sous-fifres pour frapper\nl’ennemi. Taux de critique élevé."
    it: "Chi la usa raduna i suoi sgherri per colpire\nil bersaglio. Probabile brutto colpo."
    de: "Anwender ruft seine Untergebenen zum Angriff.\nHat eine hohe Volltrefferquote."
    es: "El usuario llama a sus súbditos para que ataquen \nal objetivo. Suele ser crítico."
    ko: "부하를 불러내어\n상대를 향해서 공격시킨다.\n급소에 맞기 쉽다."
    zh_simp: "召唤手下，\n让其朝对手发起攻击。\n容易击中要害。"
    zh_trad: "呼喚手下，\n向對手發動攻擊。\n容易擊中要害。"
attract:
  names:
    jp_kana: メロメロ
    jp_kanji: メロメロ
    en: Attract
    fr: Attraction
    it: Attrazione
    de: Anziehung
    es: Atracción
    ko: 헤롱헤롱
    zh_simp: 迷人
    zh_trad: 迷人
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nメロメロに　する。\nあいては　わざが　だしにくく　なる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If it is the opposite gender of the user, the target\nbecomes infatuated and less likely to attack."
    fr: "Si l’ennemi est du sexe opposé, il tombe amoureux\net rechigne alors à attaquer."
    it: "Se il bersaglio è del sesso opposto, s’infatua\ne diventa riluttante ad attaccare."
    de: "Wenn das Ziel nicht dem Geschlecht des Anwenders\nangehört, fühlt es sich zu ihm hingezogen und greift\neventuell nicht an."
    es: "Si el objetivo es del sexo opuesto, se enamorará y \nbajará la posibilidad de que ataque."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
    zh_simp: "♂诱惑♀或♀诱惑♂，\n让对手着迷。\n对手将很难使出招式。"
    zh_trad: "♂誘惑♀而♀誘惑♂，\n讓對手著迷。\n對手將難以使用招式。"
aura_sphere:
  names:
    jp_kana: はどうだん
    jp_kanji: はどうだん
    en: Aura Sphere
    fr: Aurasphère
    it: Forzasfera
    de: Aurasphäre
    es: Esfera Aural
    ko: 파동탄
    zh_simp: 波导弹
    zh_trad: 波導彈
  descriptions:
    jp_kana: "からだの　おくから　はどうの　ちからを\nあいてに　うちはなつ。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "体の　奥から　波導の　力を\n相手に　うち放つ。\n攻撃は　必ず　命中する。"
    en: "The user lets loose a blast of aura power from deep\nwithin its body at the target. This attack\nnever misses."
    fr: "Le lanceur dégage une aura et projette de\nl’énergie. N’échoue jamais."
    it: "Chi la usa rilascia una forza eterea dal profondo\ndel corpo. La mossa è infallibile."
    de: "Tief aus dem Inneren des Anwenders löst sich ein\nkraftvoller Stoß Aura-Energie. Trifft in jedem Fall."
    es: "Libera una descarga de la fuerza del aura desde \nsu interior. Es infalible."
    ko: "몸속에서 파동의 힘을\n끌어내 쏜다.\n공격은 반드시 명중한다."
    zh_simp: "从体内产生出波导之力，\n然后向对手发出。\n攻击必定会命中。"
    zh_trad: "將來自體內深處的波導之力\n擊向對手。\n攻擊必定會命中。"
aurora_beam:
  names:
    jp_kana: オーロラビーム
    jp_kanji: オーロラビーム
    en: Aurora Beam
    fr: Onde Boréale
    it: Raggiaurora
    de: Aurorastrahl
    es: Rayo Aurora
    ko: 오로라빔
    zh_simp: 极光束
    zh_trad: 極光束
  descriptions:
    jp_kana: "にじいろの　ビームを\nあいてに　はっしゃして　こうげきする。\nこうげきを　さげる　ことが　ある。"
    jp_kanji: "にじいろの　ビームを\n相手に　発射して　攻撃する。\n攻撃を　さげる　ことが　ある。"
    en: "The target is hit with a rainbow-colored beam.\nThis may also lower the target’s Attack stat."
    fr: "Envoie un rayon arc-en-ciel sur l’ennemi.\nPeut aussi baisser son Attaque."
    it: "Colpisce il bersaglio con un raggio dai colori\ndell’iride. Può anche ridurne l’Attacco."
    de: "Regenbogenfarbener Strahl, der eventuell den\nAngriffs-Wert des Zieles senkt."
    es: Rayo multicolor que puede reducir el Ataque.
    ko: "무지개색의 빔을\n상대에게 발사하여 공격한다.\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "向对手发射\n虹色光束进行攻击。\n有时会降低对手的攻击。"
    zh_trad: "向對手發射\n七彩光束進行攻擊。\n有時會降低對手的攻擊。"
aurora_veil:
  names:
    jp_kana: オーロラベール
    jp_kanji: オーロラベール
    en: Aurora Veil
    fr: Voile Aurore
    it: Velaurora
    de: Auroraschleier
    es: Velo Aurora
    ko: 오로라베일
    zh_simp: 极光幕
    zh_trad: 極光幕
  descriptions:
    jp_kana: "５ターンの　あいだ　ぶつりと\nとくしゅの　ダメージを　よわめる。\nあられの　ときしか　だすことが　できない。"
    jp_kanji: "５ターンの　間　物理と\n特殊の　ダメージを　弱める。\nあられの　時しか　出すことが　できない。"
    en: "This move reduces damage from physical and\nspecial moves for five turns. This can be used only\nin a hailstorm."
    fr: "Réduit les dégâts causés par les capacités\nphysiques et spéciales durant cinq tours.\nNe peut être utilisé que lorsqu’il grêle."
    it: "Riduce i danni subiti dalle mosse fisiche e dalle\nmosse speciali per cinque turni.\nSi può usare solo quando grandina."
    de: "Diese Attacke schwächt fünf Runden lang den durch\nphysische sowie durch Spezial-Attacken erhaltenen\nSchaden. Kann nur bei Hagel eingesetzt werden."
    es: "Reduce el daño de los ataques físicos y especiales\nque ejecuta el rival durante cinco turnos. Solo puede\nusarse cuando está granizando."
    ko: "5턴 동안 물리와 특수 기술의\n데미지를 약하게 한다.\n싸라기눈일 때만 쓸 수 있다."
    zh_simp: "在５回合内减弱\n物理和特殊的伤害。\n只有冰雹时才能使出。"
    zh_trad: "在５回合內減弱\n物理和特殊的傷害。\n在下冰雹時才有效果。"
autotomize:
  names:
    jp_kana: ボディパージ
    jp_kanji: ボディパージ
    en: Autotomize
    fr: Allègement
    it: Sganciapesi
    de: Autotomie
    es: Aligerar
    ko: 바디퍼지
    zh_simp: 身体轻量化
    zh_trad: 身體輕量化
  descriptions:
    jp_kana: "からだの　ムダな　ぶぶんを　けずる。\nじぶんの　すばやさを　ぐーんと　あげて\nたいじゅうも　かるく　なる。"
    jp_kanji: "体の　ムダな　部分を　削る。\n自分の　素早さを　ぐーんと　あげて\n体重も　軽くなる。"
    en: "The user sheds part of its body to make itself lighter\nand sharply raise its Speed stat."
    fr: "Le lanceur se débarrasse des parties inutiles de\nson corps. Son poids diminue et sa Vitesse augmente\nbeaucoup."
    it: "Chi la usa si libera di tutti i pesi in eccesso,\nalleggerendosi e aumentando di molto la propria\nVelocità."
    de: "Anwender trennt sich von überflüssigen Körperteilen\nund erhöht seine Initiative stark. Sein Gewicht nimmt\ndeutlich ab."
    es: "El usuario se desprende de partes prescindibles de\nsu cuerpo para hacerse más ligero y aumentar \nmucho su Velocidad."
    ko: "몸의 쓸모없는 부분을 깎는다.\n자신의 스피드를 크게 올리고\n체중도 가벼워진다."
    zh_simp: "削掉身体上没用的部分。\n大幅提高自己的速度，\n同时体重也会变轻。"
    zh_trad: "削去身體上多餘的部分。\n以大幅提高自己的速度，\n同時體重也會變輕。"
avalanche:
  names:
    jp_kana: ゆきなだれ
    jp_kanji: ゆきなだれ
    en: Avalanche
    fr: Avalanche
    it: Slavina
    de: Lawine
    es: Alud
    ko: 눈사태
    zh_simp: 雪崩
    zh_trad: 雪崩
  descriptions:
    jp_kana: "あいてから　わざを　うけていると\nその　あいてに　たいして\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "相手から　技を　受けていると\nその　相手に　対して\n技の　威力が　２倍に　なる。"
    en: "The power of this attack move is doubled if the user\nhas been hurt by the target in the same turn."
    fr: "Une attaque deux fois plus puissante si le lanceur\na été blessé par l’ennemi durant le tour."
    it: "Mossa d’attacco che infligge doppi danni se chi\nla usa è stato ferito dal Pokémon bersaglio nello\nstesso turno."
    de: "Wurde der Anwender in dieser Runde vom Ziel\ngetroffen, verdoppelt sich die Stärke aller Attacken\ndes Anwenders bei Angriffen auf dieses Ziel."
    es: "Este ataque inflige el doble de daño a un objetivo\nque haya golpeado al usuario en ese mismo turno."
    ko: "상대로부터 기술을 받으면\n그 상대에 대해서\n기술의 위력이 2배가 된다."
    zh_simp: "如果受到对手的招式攻击，\n就能给予该对手\n２倍威力的攻击。"
    zh_trad: "如果受到對手的招式攻擊，\n給予該對手的招式威力就會變成２倍。"
baby_doll_eyes:
  names:
    jp_kana: つぶらなひとみ
    jp_kanji: つぶらなひとみ
    en: Baby-Doll Eyes
    fr: Regard Touchant
    it: Occhioni Teneri
    de: Kulleraugen
    es: Ojitos Tiernos
    ko: 초롱초롱눈동자
    zh_simp: 圆瞳
    zh_trad: 圓瞳
  descriptions:
    jp_kana: "つぶらなひとみで　あいてを　みつめて\nこうげきを　さげる。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "つぶらなひとみで　相手を　みつめて\n攻撃を　さげる。\n必ず　先制攻撃　できる。"
    en: "The user stares at the target with its baby-doll\neyes, which lowers its Attack stat. This move always\ngoes first."
    fr: "Fixe l’ennemi d’un air très attendrissant qui\nle touche et diminue son Attaque. Agit en priorité."
    it: "Chi la usa rivolge i propri occhioni languidi\nal bersaglio, riducendone l’Attacco.\nQuesta mossa ha priorità alta."
    de: "Der Anwender erobert das Herz des Zieles, indem er\nes mit Kulleraugen ansieht. Senkt den Angriffs-Wert\ndes Zieles. Hohe Erstschlagquote."
    es: "Lanza una mirada al objetivo con ojos acaramelados,\ncon lo que logra que su Ataque se reduzca. Este\nmovimiento tiene prioridad alta."
    ko: "초롱초롱한 눈동자로 상대를\n바라보며 공격을 떨어뜨린다.\n반드시 선제공격할 수 있다."
    zh_simp: "用圆瞳凝视对手，\n从而降低其攻击。\n必定能够先制攻击。"
    zh_trad: "用圓圓的眼睛凝視對手，\n降低對手的攻擊。\n必定能夠發動先制攻擊。"
baneful_bunker:
  names:
    jp_kana: トーチカ
    jp_kanji: トーチカ
    en: Baneful Bunker
    fr: Blockhaus
    it: Fortino
    de: Bunker
    es: Búnker
    ko: 토치카
    zh_simp: 碉堡
    zh_trad: 碉堡
  descriptions:
    jp_kana: "あいての　こうげきを　ふせぐと\nどうじに　ふれた　あいてに\nどくを　あたえて　しまう。"
    jp_kanji: "相手の　攻撃を　防ぐと\n同時に　触れた　相手に\n毒を　与えてしまう。"
    en: "In addition to protecting the user from attacks, this\nmove also poisons any attacker that makes\ndirect contact."
    fr: "Protège le lanceur contre les attaques de l’ennemi\net empoisonne ce dernier s’il utilise une attaque\ndirecte sur le lanceur."
    it: "Protegge dagli attacchi e avvelena i Pokémon\nche lanciano un attacco diretto su chi la usa."
    de: "Der Anwender wird vor Angriffen geschützt.\nGleichzeitig werden alle Pokémon, die mit ihm in\nBerührung kommen, vergiftet."
    es: "Protege de los ataques y, al mismo tiempo, envenena\nal Pokémon que use un movimiento de contacto\ncontra el usuario."
    ko: "상대의 공격을 막음과\n동시에 접촉한 상대에게\n독을 퍼뜨린다."
    zh_simp: "防住对手攻击的同时，\n让接触到自己的对手中毒。"
    zh_trad: "防住對手攻擊的同時，\n讓碰觸到自己的對手中毒。"
barrage:
  names:
    jp_kana: たまなげ
    jp_kanji: たまなげ
    en: Barrage
    fr: Pilonnage
    it: Attacco Pioggia
    de: Stakkato
    es: Presa
    ko: 구슬던지기
    zh_simp: 投球
    zh_trad: 投球
  descriptions:
    jp_kana: "まるい　ものを\nあいてに　なげつけて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "まるい　ものを\n相手に　投げつけて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "Round objects are hurled at the target to strike two\nto five times in a row."
    fr: "Projette de deux à cinq grosses boules sur\nl’ennemi."
    it: "Piovono enormi sfere sulla testa del bersaglio\nda due a cinque volte di fila."
    de: "Wirft zwei- bis fünfmal runde Gegenstände auf\ndas Ziel."
    es: "Arroja esferas al objetivo entre dos y cinco veces \nseguidas."
    ko: "둥근 것을\n상대에게 내던져서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "向对手投掷\n圆形物体进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手投擲\n球狀物體進行攻擊。\n可連續攻擊２～５次。"
barrier:
  names:
    jp_kana: バリアー
    jp_kanji: バリアー
    en: Barrier
    fr: Bouclier
    it: Barriera
    de: Barriere
    es: Barrera
    ko: 배리어
    zh_simp: 屏障
    zh_trad: 屏障
  descriptions:
    jp_kana: "がんじょうな　かべを　つくって\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "頑丈な　壁を　つくって\n自分の　防御を　ぐーんと　あげる。"
    en: "The user throws up a sturdy wall that sharply raises\nits Defense stat."
    fr: "Le lanceur érige un mur solide qui augmente\nbeaucoup sa Défense."
    it: "Innalza una barriera resistente che aumenta molto\nla Difesa."
    de: "Erzeugt eine Barriere, die den Verteidigungs-Wert\nstark erhöht."
    es: Crea una barrera que aumenta mucho la Defensa.
    ko: "튼튼한 장막을 만들어\n자신의 방어를 크게 올린다."
    zh_simp: "制造坚固的壁障，\n从而大幅提高自己的防御。"
    zh_trad: "製造堅固的屏障，\n大幅提高自己的防禦。"
baton_pass:
  names:
    jp_kana: バトンタッチ
    jp_kanji: バトンタッチ
    en: Baton Pass
    fr: Relais
    it: Staffetta
    de: Stafette
    es: Relevo
    ko: 바톤터치
    zh_simp: 接棒
    zh_trad: 接棒
  descriptions:
    jp_kana: "ひかえの　ポケモンと　いれかわる。\nのうりょく　へんかは　かわった\nポケモンが　そのまま　うけつぐ。"
    jp_kanji: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    en: "The user switches places with a party Pokémon in\nwaiting and passes along any stat changes."
    fr: "Le lanceur échange sa place et tout changement\nde stat avec un Pokémon de l’équipe."
    it: "Chi la usa è sostituito da un Pokémon della\nsquadra, che eredita anche ogni modifica\nalle statistiche."
    de: "Tauscht den Anwender aus und überträgt alle\nStatusveränderungen auf das eingewechselte\nPokémon."
    es: "Cambia el puesto con un compañero y le pasa los \ncambios de características."
    ko: "교대 포켓몬과 바뀐다.\n능력 변화는 바뀐 포켓몬이\n그대로 이어받는다."
    zh_simp: "和后备宝可梦进行替换。\n换上的宝可梦能直接继承\n其能力的变化。"
    zh_trad: "與後備寶可夢進行替換。\n替換上場的寶可夢，\n將承接目前寶可夢的能力變化。"
beak_blast:
  names:
    jp_kana: くちばしキャノン
    jp_kanji: くちばしキャノン
    en: Beak Blast
    fr: Bec-Canon
    it: Cannonbecco
    de: Schnabelkanone
    es: Pico Cañón
    ko: 부리캐논
    zh_simp: 鸟嘴加农炮
    zh_trad: 鳥嘴加農炮
  descriptions:
    jp_kana: "さいしょに　クチバシを　かねつしてから\nこうげきを　くりだす。\nかねつちゅうに　さわると　やけどする。"
    jp_kanji: "最初に　クチバシを　加熱してから\n攻撃を　くりだす。\n加熱中に　さわると　やけどする。"
    en: "The user first heats up its beak, and then it attacks\nthe target. Making direct contact with the Pokémon\nwhile it’s heating up its beak results in a burn."
    fr: "Le lanceur fait chauffer son bec avant d’attaquer.\nS’il subit une attaque directe pendant la montée\nen température, l’attaquant sera brûlé."
    it: "Chi la usa arroventa il proprio becco e poi attacca.\nSe un Pokémon lo colpisce con un attacco diretto\nmentre sta accumulando calore, resta scottato."
    de: "Der Anwender erhitzt zuerst seinen Schnabel und\ngreift dann an. Pokémon, die ihn während des\nErhitzens berühren, erleiden Verbrennungen."
    es: "Primero aumenta la temperatura de su pico y luego\nejecuta un ataque. Quema al rival si este le propina\nun ataque físico mientras está calentando el pico."
    ko: "먼저 부리를 가열시킨 다음\n공격을 날린다.\n가열 중에 만지면 화상을 입는다."
    zh_simp: "先加热鸟嘴后再进行攻击。\n鸟嘴在加热时对手触碰的话，\n就会使其灼伤。"
    zh_trad: "先加熱鳥嘴後再進行攻擊。\n若對手在加熱時觸碰的話，\n就會灼傷。"
beat_up:
  names:
    jp_kana: ふくろだたき
    jp_kanji: ふくろだたき
    en: Beat Up
    fr: Baston
    it: Picchiaduro
    de: Prügler
    es: Paliza
    ko: 집단구타
    zh_simp: 围攻
    zh_trad: 圍攻
  descriptions:
    jp_kana: "みかた　ぜんいんで　こうげきする。\nなかまの　ポケモンが　おおいほど\nわざの　こうげきかいすうが　ふえる。"
    jp_kanji: "味方　全員で　攻撃する。\n仲間の　ポケモンが　多いほど\n技の　攻撃回数が　増える。"
    en: "The user gets all party Pokémon to attack the target.\nThe more party Pokémon, the greater the number\nof attacks."
    fr: "Le lanceur appelle tous les Pokémon de son\néquipe à attaquer. Plus ils sont nombreux, plus\nil y a d’attaques."
    it: "Chi la usa chiama in aiuto i Pokémon della\nsquadra: più ce ne sono, maggiore è il numero\ndi attacchi."
    de: "Das gesamte Team nimmt aktiv am Kampf teil.\nJe mehr Pokémon, desto höher die Anzahl der\nAngriffe."
    es: "Ataque de todo el equipo Pokémon. Cuantos más \nhaya, más veces se atacará."
    ko: "같은 편 전원이 공격한다.\n동료 포켓몬이 많을수록\n기술의 공격 횟수가 증가한다."
    zh_simp: "我方全员进行攻击。\n同行的宝可梦越多，\n招式的攻击次数越多。"
    zh_trad: "讓我方所有寶可夢進行攻擊。\n同行的寶可夢越多，\n招式的攻擊次數越多。"
belch:
  names:
    jp_kana: ゲップ
    jp_kanji: ゲップ
    en: Belch
    fr: Éructation
    it: Rutto
    de: Rülpser
    es: Eructo
    ko: 트림
    zh_simp: 打嗝
    zh_trad: 打嗝
  descriptions:
    jp_kana: "あいてに　むかって　ゲップを\nあびせて　ダメージを　あたえる。\nきのみを　たべないと　だせない。"
    jp_kanji: "相手に　向かって　ゲップを\n浴びせて　ダメージを　与える。\nきのみを　食べないと　だせない。"
    en: "The user lets out a damaging belch at the target.\nThe user must eat a held Berry to use this move."
    fr: "Le lanceur se tourne vers l’ennemi et lui éructe\ndessus, infligeant des dégâts. Ne fonctionne\nque si le lanceur consomme la Baie qu’il tient."
    it: "Chi la usa attacca il bersaglio con un rutto potente. \nPer utilizzare questa mossa, il Pokémon deve\nmangiare la bacca che possiede."
    de: "Der Anwender fügt dem Ziel Schaden zu, indem er\nes anrülpst. Diese Attacke gelingt nur nach dem\nKonsum einer getragenen Beere."
    es: "El Pokémon causa daño a su oponente lanzándole \nun eructo. Para poder utilizar este movimiento tiene \nque llevar una baya y comérsela."
    ko: "상대를 향해 트림을 하여\n데미지를 준다.\n나무열매를 먹지 않으면 쓸 수 없다."
    zh_simp: "朝着对手打嗝，\n并给予伤害。\n如果不吃树果则无法使出。"
    zh_trad: "朝著對手打嗝進行攻擊。\n沒吃下樹果時無法使用。"
belly_drum:
  names:
    jp_kana: はらだいこ
    jp_kanji: はらだいこ
    en: Belly Drum
    fr: Cognobidon
    it: Panciamburo
    de: Bauchtrommel
    es: Tambor
    ko: 배북
    zh_simp: 腹鼓
    zh_trad: 腹鼓
  descriptions:
    jp_kana: "じぶんの　ＨＰを　さいだい　ＨＰの\nはんぶん　へらして　じぶんの　こうげきを\nさいだいに　あげる。"
    jp_kanji: "自分の　ＨＰを　最大ＨＰの\n半分　減らして　自分の　攻撃を\n最大に　あげる。"
    en: "The user maximizes its Attack stat in exchange for\nHP equal to half its max HP."
    fr: "Améliore l’Attaque au maximum en sacrifiant\nla moitié des PV max."
    it: "Chi la usa massimizza l’Attacco in cambio di metà\ndei PS massimi."
    de: "Der Anwender maximiert den Angriffs-Wert auf\nKosten der Hälfte seiner maximalen KP."
    es: "Reduce la mitad de los PS máximos para mejorar \nal máximo el Ataque."
    ko: "자신의 HP를 최대 HP의\n절반만큼 감소시켜 자신의 공격을\n최대로 올린다."
    zh_simp: "将自己的ＨＰ减少到\n最大ＨＰ的一半，\n从而最大限度提高自己的攻击。"
    zh_trad: "將現有的ＨＰ\n減去最大ＨＰ的一半，\n讓自己的攻擊提高至最大值。"
bestow:
  names:
    jp_kana: ギフトパス
    jp_kanji: ギフトパス
    en: Bestow
    fr: Passe-Cadeau
    it: Cediregalo
    de: Offerte
    es: Ofrenda
    ko: 기프트패스
    zh_simp: 传递礼物
    zh_trad: 傳遞禮物
  descriptions:
    jp_kana: "あいてが　どうぐを　もっていない　とき\nじぶんが　もっている　どうぐを\nあいてに　わたす。"
    jp_kanji: "相手が　道具を　持っていないとき\n自分が　持っている　道具を\n相手に　わたす。"
    en: "The user passes its held item to the target when the\ntarget isn’t holding an item."
    fr: "Si la cible ne tient pas d’objet, le lanceur lui\ndonne l’objet qu’il tient."
    it: "Chi la usa consegna il proprio strumento\nal bersaglio, se questi ne è sprovvisto."
    de: "Trägt das Ziel gerade kein Item bei sich, erhält es\ndas Item, das sich aktuell im Besitz des Anwenders\nbefindet."
    es: "Entrega el objeto que lleva al objetivo en caso de \nque este no tenga ninguno."
    ko: "상대가 도구를 지니고 있지 않을 때\n자신이 지니고 있는 도구를\n상대에게 건넨다."
    zh_simp: "当对手未携带道具时，\n能够将自己携带的道具交给对手。"
    zh_trad: "當對手沒有攜帶道具時，\n能夠將自己攜帶的道具交給對手。"
bide:
  names:
    jp_kana: がまん
    jp_kanji: がまん
    en: Bide
    fr: Patience
    it: Pazienza
    de: Geduld
    es: Venganza
    ko: 참기
    zh_simp: 忍耐
    zh_trad: 忍耐
  descriptions:
    jp_kana: "２ターンの　あいだ　こうげきに　たえて\nうけた　ダメージを　２ばいに　して\nあいてに　かえす。"
    jp_kanji: "２ターンの　間　攻撃に　たえて\n受けた　ダメージを　２倍にして\n相手に　返す。"
    en: "The user endures attacks for two turns, then strikes\nback to cause double the damage taken."
    fr: "Le lanceur encaisse les coups durant deux tours et\nréplique en infligeant le double des dégâts subis."
    it: "Chi la usa subisce attacchi per due turni\ne poi restituisce il danno moltiplicato per due."
    de: "Erträgt zwei Runden Angriffe und schlägt dann mit\ndem doppelten Wert des erlittenen Schadens zurück."
    es: "Espera dos turnos para atacar con el doble de \npotencia del daño recibido."
    ko: "2턴 동안 공격을 견뎌\n입은 데미지를 2배로 만들어\n상대에게 돌려준다."
    zh_simp: "在２回合内忍受攻击，\n受到的伤害会\n２倍返还给对手。"
    zh_trad: "在２回合內忍受攻擊，\n然後將受到的傷害\n加倍返還給對手。"
bind:
  names:
    jp_kana: しめつける
    jp_kanji: しめつける
    en: Bind
    fr: Étreinte
    it: Legatutto
    de: Klammergriff
    es: Atadura
    ko: 조이기
    zh_simp: 绑紧
    zh_trad: 綁緊
  descriptions:
    jp_kana: "ながい　からだや　つるなどを　つかい\n４ー５ターンの　あいだ\nあいてを　しめつけて　こうげきする。"
    jp_kanji: "長い　体や　つるなどを　使い\n４ー５ターンの　間\n相手を　締めつけて　攻撃する。"
    en: "Things such as long bodies or tentacles are used to\nbind and squeeze the target for four to five turns."
    fr: "Ligote l’ennemi avec les tentacules ou le corps\npour l’écraser durant quatre à cinq tours."
    it: "Il lungo corpo o i tentacoli di chi la usa legano e\nstritolano il bersaglio per quattro o cinque turni."
    de: "Umklammert und quetscht das Ziel über vier bis fünf\nRunden."
    es: Ata y oprime de cuatro a cinco turnos.
    ko: "긴 몸이나 덩굴 등을 써서\n4-5턴 동안\n상대를 조여 공격한다."
    zh_simp: "使用长长的身体或藤蔓等，\n在４～５回合内\n绑紧对手进行攻击。"
    zh_trad: "使用長長的身體或藤蔓等，\n在４～５回合內\n綁緊對手進行攻擊。"
bite:
  names:
    jp_kana: かみつく
    jp_kanji: かみつく
    en: Bite
    fr: Morsure
    it: Morso
    de: Biss
    es: Mordisco
    ko: 물기
    zh_simp: 咬住
    zh_trad: 咬住
  descriptions:
    jp_kana: "するどく　とがった　はで\nかみついて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋭く　とがった　歯で\nかみついて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The target is bitten with viciously sharp fangs.\nThis may also make the target flinch."
    fr: "L’ennemi est mordu par de tranchantes canines.\nPeut l’apeurer."
    it: "Il bersaglio viene morso da denti affilatissimi\nche possono farlo tentennare."
    de: "Beißt zu und lässt das Ziel eventuell\nzurückschrecken."
    es: "Un voraz bocado que puede hacer retroceder al \nobjetivo."
    ko: "날카롭고 뾰족한 이빨로\n물어서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用尖锐的牙\n咬住对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用尖銳的牙齒\n咬住對手進行攻擊。\n有時會使對手畏縮。"
black_hole_eclipse:physical:
  names:
    jp_kana: ブラックホールイクリプス
    jp_kanji: ブラックホールイクリプス
    en: Black Hole Eclipse
    fr: Trou Noir des Ombres
    it: Buco Nero del Non Ritorno
    de: Schwarzes Loch des Grauens
    es: Agujero Negro Aniquilador
    ko: 블랙홀이클립스
    zh_simp: 黑洞吞噬万物灭
    zh_trad: 黑洞吞噬萬物滅
  descriptions:
    jp_kana: "Ｚパワーで　あくの　エネルギーを　あつめ\nぜんりょくで　あいてを　すいよせる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　悪の　エネルギーを　集め\n全力で　相手を　吸いよせる。\n元になった　技で　威力が　変わる。"
    en: "The user gathers dark energy using its Z-Power\nand sucks the target into it. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour rassembler\nl’énergie négative et y aspirer l’adversaire. La\npuissance varie selon celle de la capacité originale."
    it: "Chi la usa si serve del Potere Z per concentrare\nenergia negativa con cui inghiotte il bersaglio. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender sammelt mit Z-Kraft dunkle Energie\nan, die das Ziel verschlingt. Die Stärke variiert je\nnach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para generar un agujero\nnegro que absorbe al objetivo. Su potencia depende\nde la del movimiento original."
    ko: "Z파워로 어둠의 에너지를 모아\n전력으로 상대를 끌어당긴다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量收集恶能量，\n全力将对手吸入。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量收集惡能量，\n全力將對手吸入。\n威力會隨原本的招式而改變。"
black_hole_eclipse:special:
  names:
    jp_kana: ブラックホールイクリプス
    jp_kanji: ブラックホールイクリプス
    en: Black Hole Eclipse
    fr: Trou Noir des Ombres
    it: Buco Nero del Non Ritorno
    de: Schwarzes Loch des Grauens
    es: Agujero Negro Aniquilador
    ko: 블랙홀이클립스
    zh_simp: 黑洞吞噬万物灭
    zh_trad: 黑洞吞噬萬物滅
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
blast_burn:
  names:
    jp_kana: ブラストバーン
    jp_kanji: ブラストバーン
    en: Blast Burn
    fr: Rafale Feu
    it: Incendio
    de: Lohekanonade
    es: Anillo Ígneo
    ko: 블러스트번
    zh_simp: 爆炸烈焰
    zh_trad: 爆炸烈焰
  descriptions:
    jp_kana: "ばくはつの　ほのおで\nあいてを　やきつくして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "爆発の　炎で\n相手を　焼きつくして　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is razed by a fiery explosion. The user\ncan’t move on the next turn."
    fr: "Une explosion ardente souffle l’adversaire.\nLe lanceur doit se reposer au tour suivant."
    it: "Potente esplosione che danneggia il bersaglio,\nma fa saltare il turno successivo a chi la provoca."
    de: "Das Ziel wird von einer starken Explosion getroffen.\nAngreifer setzt eine Runde aus."
    es: "Explosión de fuego. El atacante debe descansar el \nsiguiente turno."
    ko: "폭발하는 불꽃으로\n상대를 태워서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用爆炸的火焰\n烧尽对手进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "用爆炸的火焰\n燒盡對手進行攻擊。\n下一回合自己將無法動彈。"
blaze_kick:
  names:
    jp_kana: ブレイズキック
    jp_kanji: ブレイズキック
    en: Blaze Kick
    fr: Pied Brûleur
    it: Calciardente
    de: Feuerfeger
    es: Patada Ígnea
    ko: 브레이즈킥
    zh_simp: 火焰踢
    zh_trad: 火焰踢
  descriptions:
    jp_kana: "こうげきした　あいてを\nやけど　じょうたいに　することが　ある。\nきゅうしょにも　あたりやすい。"
    jp_kanji: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    en: "The user launches a kick that lands a critical hit\nmore easily. This may also leave the target with\na burn."
    fr: "Le lanceur envoie un coup de pied au taux de\ncritique élevé. Peut aussi brûler la cible."
    it: "Chi la usa tira un calcio. Probabile brutto colpo.\nPuò anche scottare il bersaglio."
    de: "Starker Tritt mit hoher Volltrefferquote.\nVerursacht eventuell Verbrennungen."
    es: "Patada que suele ser un golpe crítico y puede \ncausar quemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
    zh_simp: "攻击对手后，\n有时会使其陷入灼伤状态。\n也容易击中要害。"
    zh_trad: "有時會讓受到攻擊的對手\n陷入灼傷狀態。\n且容易擊中要害。"
blizzard:
  names:
    jp_kana: ふぶき
    jp_kanji: ふぶき
    en: Blizzard
    fr: Blizzard
    it: Bora
    de: Blizzard
    es: Ventisca
    ko: 눈보라
    zh_simp: 暴风雪
    zh_trad: 暴風雪
  descriptions:
    jp_kana: "はげしい　ふぶきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike opposing\nPokémon. This may also leave the opposing\nPokémon frozen."
    fr: "Une violente tempête de neige s’abat sur l’ennemi.\nPeut aussi le geler."
    it: "Colpisce i nemici intorno con una tremenda\ntempesta di ghiaccio che può anche congelarli."
    de: Ein Schneesturm wütet, der das Ziel einfrieren kann.
    es: Tormenta de hielo que puede llegar a congelar.
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
block:
  names:
    jp_kana: とおせんぼう
    jp_kanji: とおせんぼう
    en: Block
    fr: Barrage
    it: Blocco
    de: Rückentzug
    es: Bloqueo
    ko: 블록
    zh_simp: 挡路
    zh_trad: 擋路
  descriptions:
    jp_kana: "りょうてを　ひろげて　たちはだかり\nあいての　にげみちを　ふさいで\nにげられなく　する。"
    jp_kanji: "両手を　ひろげて　たちはだかり\n相手の　逃げ道を　ふさいで\n逃げられなくする。"
    en: "The user blocks the target’s way with arms spread\nwide to prevent escape."
    fr: "Le lanceur bloque la route de l’ennemi pour\nempêcher sa fuite."
    it: "Chi la usa sbarra la strada al bersaglio\nimpedendone la fuga o la sostituzione."
    de: Anwender versperrt den Fluchtweg des Zieles.
    es: "Le corta el paso al objetivo para que no pueda \nescapar."
    ko: "양팔을 벌려 막아서서\n상대의 도주로를 가로막아\n도망칠 수 없게 한다."
    zh_simp: "张开双手进行阻挡，\n封住对手的退路，\n使其不能逃走。"
    zh_trad: "張開雙手進行阻擋，\n封住對手的退路，\n讓對手無法逃走。"
bloom_doom:physical:
  names:
    jp_kana: ブルームシャインエクストラ
    jp_kanji: ブルームシャインエクストラ
    en: Bloom Doom
    fr: Pétalexplosion Éblouissante
    it: Floriscoppio Sfolgorante
    de: Brillante Blütenpracht
    es: Megatón Floral
    ko: 블룸샤인엑스트라
    zh_simp: 绚烂缤纷花怒放
    zh_trad: 絢爛繽紛花怒放
  descriptions:
    jp_kana: "Ｚパワーで　くさばなの　エネルギーを　かり\nぜんりょくで　あいてを　こうげきする。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　草花の　エネルギーを　借り\n全力で　相手を　攻撃する。\n元になった　技で　威力が　変わる。"
    en: "The user collects energy from plants using its\nZ-Power and attacks the target with full force.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour libérer l’énergie\ndes plantes et attaquer l’adversaire. La puissance\nvarie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa concentra l’energia\ndelle piante per scatenare un potente attacco. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender leiht sich durch Z-Kraft die Energie\nvon Wiesenblumen und greift das Ziel damit an. Die\nStärke variiert je nach zugrunde liegender Attacke."
    es: "Emplea el Poder Z para concentrar la energía de la\nvegetación que lo rodea y atacar al objetivo. Su\npotencia depende de la del movimiento original."
    ko: "Z파워로 화초들의 에너지를 빌려\n전력으로 상대를 공격한다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量借助花草的能量，\n全力攻击对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量借助花草的能量，\n全力攻擊對手。\n威力會隨原本的招式而改變。"
bloom_doom:special:
  names:
    jp_kana: ブルームシャインエクストラ
    jp_kanji: ブルームシャインエクストラ
    en: Bloom Doom
    fr: Pétalexplosion Éblouissante
    it: Floriscoppio Sfolgorante
    de: Brillante Blütenpracht
    es: Megatón Floral
    ko: 블룸샤인엑스트라
    zh_simp: 绚烂缤纷花怒放
    zh_trad: 絢爛繽紛花怒放
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
blue_flare:
  names:
    jp_kana: あおいほのお
    jp_kanji: あおいほのお
    en: Blue Flare
    fr: Flamme Bleue
    it: Fuocoblu
    de: Blauflammen
    es: Llama Azul
    ko: 푸른불꽃
    zh_simp: 青焰
    zh_trad: 青焰
  descriptions:
    jp_kana: "うつくしくも　はげしい　あおいほのおで\nあいてを　つつみこんで　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "美しくも　激しい　青い炎で\n相手を　包みこんで　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by engulfing the target in an\nintense, yet beautiful, blue flame. This may also leave\nthe target with a burn."
    fr: "De magnifiques et redoutables flammes bleues\nfondent sur l’ennemi. Peut aussi le brûler."
    it: "Chi la usa attacca il bersaglio avvolgendolo con\nmagnifiche e intense fiamme blu che possono\nanche scottarlo."
    de: "Anwender greift an, indem er das Ziel in\nwunderschöne, intensivblaue Flammen hüllt,\ndurch die es eventuell Verbrennungen erleidet."
    es: "Ataca con una bella pero potente llama azul que \nrodea al objetivo. Puede quemarlo."
    ko: "아름다우면서도 격렬한 푸른불꽃으로\n상대를 둘러싸서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用美丽而激烈的青焰\n包裹住对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用美麗而激烈的青焰\n燃燒對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
body_slam:
  names:
    jp_kana: のしかかり
    jp_kanji: のしかかり
    en: Body Slam
    fr: Plaquage
    it: Corposcontro
    de: Bodyslam
    es: Golpe Cuerpo
    ko: 누르기
    zh_simp: 泰山压顶
    zh_trad: 泰山壓頂
  descriptions:
    jp_kana: "からだ　ぜんたいで\nあいてに　のしかかり　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "全身で\n相手に　のしかかり　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user drops onto the target with its full body\nweight. This may also leave the target with paralysis."
    fr: "Le lanceur se laisse tomber sur l’ennemi de tout\nson poids. Peut aussi le paralyser."
    it: "Chi la usa carica il bersaglio con tutto il corpo.\nPuò causarne anche la paralisi."
    de: "Trifft das Ziel mit vollem Körpereinsatz.\nBewirkt eventuell Paralyse."
    es: "Salta sobre el objetivo con todo su peso.\nPuede paralizar."
    ko: "몸 전체로\n상대를 덮쳐눌러 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用整个身体\n压住对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用整個身體\n壓住對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
bolt_strike:
  names:
    jp_kana: らいげき
    jp_kanji: らいげき
    en: Bolt Strike
    fr: Charge Foudre
    it: Lucesiluro
    de: Blitzschlag
    es: Ataque Fulgor
    ko: 뇌격
    zh_simp: 雷击
    zh_trad: 雷擊
  descriptions:
    jp_kana: "ぼうだいな　でんきを　みに　まとって\nあいてに　とっしんして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "ぼうだいな　電気を　身に　まとって\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user surrounds itself with a great amount of\nelectricity and charges its target. This may also\nleave the target with paralysis."
    fr: "Le lanceur s’enveloppe d’une charge électrique\nsurpuissante et se jette sur l’ennemi. Peut aussi\nle paralyser."
    it: "Colpisce il bersaglio con una possente carica\nelettrica e può anche paralizzarlo."
    de: "Lädt seinen Körper mit einer gewaltigen Menge an\nElektrizität auf und rammt damit das Ziel. Ziel wird\neventuell paralysiert."
    es: "Ataca envolviéndose de una gran carga eléctrica y \nembistiendo al objetivo con ella. Puede paralizar."
    ko: "방대한 전기를 몸에 둘러\n상대에게 돌진해서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "让强大的电流覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用強大的電流圍繞身體，\n猛撞對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
bone_club:
  names:
    jp_kana: ホネこんぼう
    jp_kanji: ホネこんぼう
    en: Bone Club
    fr: Massd’Os
    it: Ossoclava
    de: Knochenkeule
    es: Hueso Palo
    ko: 뼈다귀치기
    zh_simp: 骨棒
    zh_trad: 骨棒
  descriptions:
    jp_kana: "てに　もった　ホネで\nあいてを　なぐりつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "手に　持った　ホネで\n相手を　なぐりつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user clubs the target with a bone. This may also\nmake the target flinch."
    fr: "Le lanceur frappe l’ennemi à grands coups d’os.\nPeut aussi l’apeurer."
    it: "Chi la usa colpisce il bersaglio con un osso e\npuò farlo anche tentennare."
    de: "Schlägt das Ziel mit einer Keule und lässt es\neventuell zurückschrecken."
    es: "Aporrea con un hueso. Puede hacer retroceder al \nobjetivo."
    ko: "손에 들고 있는 뼈로\n상대를 세게 때려서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用手中的骨头\n殴打对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用手中的骨頭\n毆打對手進行攻擊。\n有時會使對手畏縮。"
bone_rush:
  names:
    jp_kana: ボーンラッシュ
    jp_kanji: ボーンラッシュ
    en: Bone Rush
    fr: Charge-Os
    it: Ossoraffica
    de: Knochenhatz
    es: Ataque Óseo
    ko: 본러쉬
    zh_simp: 骨棒乱打
    zh_trad: 骨棒亂打
  descriptions:
    jp_kana: "かたい　ホネで\nあいてを　なぐりつけて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "硬い　ホネで\n相手を　なぐりつけて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user strikes the target with a hard bone two to\nfive times in a row."
    fr: "Le lanceur frappe l’ennemi avec un os\nde deux à cinq fois d’affilée."
    it: "Chi la usa colpisce il bersaglio con un osso\nda due a cinque volte di fila."
    de: "Greift Ziel zwei- bis fünfmal in Folge mit einem harten\nKnochen an."
    es: "Hueso en ristre, aporrea al objetivo de dos a cinco \nveces."
    ko: "단단한 뼈로\n상대를 세게 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用坚硬的骨头\n殴打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用堅硬的骨頭\n毆打對手進行攻擊。\n連續攻擊２～５次。"
bonemerang:
  names:
    jp_kana: ホネブーメラン
    jp_kanji: ホネブーメラン
    en: Bonemerang
    fr: Osmerang
    it: Ossomerang
    de: Knochmerang
    es: Huesomerang
    ko: 뼈다귀부메랑
    zh_simp: 骨头回力镖
    zh_trad: 骨頭回力鏢
  descriptions:
    jp_kana: "てに　もった　ホネを　あいてに　なげつけ\nいきと　かえりの　２かい　れんぞくで\nダメージを　あたえる。"
    jp_kanji: "手に　持った　ホネを　相手に　投げつけ\n行きと　帰りの　２回連続で\nダメージを　与える。"
    en: "The user throws the bone it holds. The bone loops\naround to hit the target twice—coming and going."
    fr: "Le lanceur projette son os comme un boomerang.\nCette attaque frappe à l’aller et au retour."
    it: "Chi la usa lancia l’osso che ha con sé.\nL’osso colpisce due volte e ritorna come un vero\ne proprio boomerang."
    de: Ein Bumerang aus Knochen, der zweimal trifft.
    es: "Lanza un hueso a modo de bumerán que golpea dos \nveces."
    ko: "손에 들고 있는 뼈를 상대에게 날려서\n날아갈 때와 돌아올 때 2회 연속\n데미지를 준다."
    zh_simp: "用手中的骨头投掷对手，\n来回连续２次给予伤害。"
    zh_trad: "向對手投擲手中的骨頭，\n來回連續２次給予傷害。"
boomburst:
  names:
    jp_kana: ばくおんぱ
    jp_kanji: ばくおんぱ
    en: Boomburst
    fr: Bang Sonique
    it: Ondaboato
    de: Überschallknall
    es: Estruendo
    ko: 폭음파
    zh_simp: 爆音波
    zh_trad: 爆音波
  descriptions:
    jp_kana: "すさまじい　ばくおんの\nはかいりょくに　よって\nまわりに　いるものを　こうげきする。"
    jp_kanji: "すさまじい　爆音の\n破壊力に　よって\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it with the\ndestructive power of a terrible, explosive sound."
    fr: "Attaque les Pokémon alentour grâce à une onde\nsonore assourdissante qui détruit tout sur son\npassage."
    it: "Colpisce i Pokémon che ha intorno\ncon la forza di un boato distruttivo."
    de: "Der Anwender greift alle Pokémon in der Umgebung\nmit einem gewaltigen Knall an."
    es: "Ataca a todos los Pokémon a su alrededor con una \npotentísima onda sonora."
    ko: "무시무시한 폭음의\n파괴력으로\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "通过震耳欲聋的爆炸声\n产生的破坏力，\n攻击自己周围所有的宝可梦。"
    zh_trad: "利用震耳欲聾的爆炸聲\n所產生的破壞力，\n攻擊自己周圍所有的寶可夢。"
bounce:
  names:
    jp_kana: とびはねる
    jp_kanji: とびはねる
    en: Bounce
    fr: Rebond
    it: Rimbalzo
    de: Sprungfeder
    es: Bote
    ko: 뛰어오르다
    zh_simp: 弹跳
    zh_trad: 彈跳
  descriptions:
    jp_kana: "そらたかく　とびはねて\n２ターンめに　あいてを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "空高く　飛び跳ねて\n２ターン目に　相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user bounces up high, then drops on the target\non the second turn. This may also leave the target\nwith paralysis."
    fr: "Le lanceur bondit très haut et plonge sur l’ennemi\nau second tour. Peut aussi le paralyser."
    it: "Chi la usa balza in alto e ricade sul bersaglio dopo\nun turno. Può anche paralizzarlo."
    de: "Angreifer springt und landet in der nächsten Runde\nauf dem Ziel. Das Ziel wird eventuell paralysiert."
    es: "Primer turno: bota. Segundo turno: golpea. Puede \nparalizar."
    ko: "하늘 높이 뛰어올라\n2턴째에 상대를 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "弹跳到高高的空中，\n第２回合攻击对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "彈跳到高空中，\n在下一回合攻擊對手。\n有時會讓對手陷入麻痺狀態。"
brave_bird:
  names:
    jp_kana: ブレイブバード
    jp_kanji: ブレイブバード
    en: Brave Bird
    fr: Rapace
    it: Baldeali
    de: Sturzflug
    es: Pájaro Osado
    ko: 브레이브버드
    zh_simp: 勇鸟猛攻
    zh_trad: 勇鳥猛攻
  descriptions:
    jp_kana: "はねを　おりたたみ\nていくう　ひこうで　とつげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "はねを　おりたたみ\n低空飛行で　突撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user tucks in its wings and charges from a low\naltitude. This also damages the user quite a lot."
    fr: "Le lanceur replie ses ailes et charge en rase-mottes.\nBlesse gravement le lanceur."
    it: "Chi la usa ripiega le ali e carica da bassa quota.\nTuttavia, subisce considerevoli danni."
    de: "Anwender greift aus niedriger Höhe an. Er erleidet\nbei dieser Attacke selbst großen Schaden."
    es: "Pliega sus alas y ataca con un vuelo rasante. El \nPokémon que lo usa también resulta seriamente \ndañado."
    ko: "날개를 접어\n저공비행으로 돌격한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "收拢翅膀，\n通过低空飞行突击对手。\n自己也会受到不小的伤害。"
    zh_trad: "收起翅膀，\n低空飛行突擊對手。\n自己也會受到不小的傷害。"
breakneck_blitz:physical:
  names:
    jp_kana: ウルトラダッシュアタック
    jp_kanji: ウルトラダッシュアタック
    en: Breakneck Blitz
    fr: Turbo-Charge Bulldozer
    it: Carica Travolgente
    de: Hyper-Sprintangriff
    es: Carrera Arrolladora
    ko: 울트라대시어택
    zh_simp: 究极无敌大冲撞
    zh_trad: 究極無敵大衝撞
  descriptions:
    jp_kana: "Ｚパワーで　いきおいを　つけて\nぜんりょくで　あいてに　ぶつかる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　勢いを　つけて\n全力で　相手に　ぶつかる。\n元になった　技で　威力が　変わる。"
    en: "The user builds up its momentum using its Z-Power\nand crashes into the target at full speed. The power\nvaries, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour s’élancer à toute\nvitesse sur l’adversaire. La puissance varie selon\ncelle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa accumula energia e si\nlancia a tutta forza contro il bersaglio. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Der durch Z-Kraft energiegeladene Anwender rennt\nmit ganzer Kraft gegen das Ziel. Die Stärke variiert\nje nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para coger carrerilla y\narremeter contra el objetivo con gran fuerza. Su\npotencia depende de la del movimiento original."
    ko: "Z파워로 기세를 몰아\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量气势猛烈地\n全力撞上对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量氣勢猛烈地\n全力撞擊對手。\n威力會隨原本的招式而改變。"
breakneck_blitz:special:
  names:
    jp_kana: ウルトラダッシュアタック
    jp_kanji: ウルトラダッシュアタック
    en: Breakneck Blitz
    fr: Turbo-Charge Bulldozer
    it: Carica Travolgente
    de: Hyper-Sprintangriff
    es: Carrera Arrolladora
    ko: 울트라대시어택
    zh_simp: 究极无敌大冲撞
    zh_trad: 究極無敵大衝撞
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
brick_break:
  names:
    jp_kana: かわらわり
    jp_kanji: かわらわり
    en: Brick Break
    fr: Casse-Brique
    it: Breccia
    de: Durchbruch
    es: Demolición
    ko: 깨트리다
    zh_simp: 劈瓦
    zh_trad: 劈瓦
  descriptions:
    jp_kana: "しゅとうを　いきおいよく　ふりおろして\nあいてを　こうげきする。　ひかりのかべや\nリフレクター　なども　はかいできる。"
    jp_kanji: "手刀を　勢いよく　振りおろして\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user attacks with a swift chop. It can also break\nbarriers, such as Light Screen and Reflect."
    fr: "Une attaque avec le tranchant de la main.\nPermet aussi de briser les barrières comme\nMur Lumière et Protection."
    it: "Colpisce il bersaglio con una mano e rompe\nbarriere come Riflesso e Schermoluce."
    de: "Ein beherzter Handkantenschlag.\nDurchbricht Barrieren wie Lichtschild und Reflektor."
    es: "Potente ataque que también es capaz de destruir \nbarreras como Pantalla de Luz y Reflejo."
    ko: "수도로 기세 좋게 내려쳐서\n상대를 공격한다. 빛의장막이나\n리플렉터 등도 파괴할 수 있다."
    zh_simp: "将手刀猛烈地挥下攻击对手。\n还可以破坏光墙和反射壁等。"
    zh_trad: "猛烈地揮下手刀\n攻擊對手。還可以破壞\n光牆和反射壁等。"
brine:
  names:
    jp_kana: しおみず
    jp_kanji: しおみず
    en: Brine
    fr: Saumure
    it: Acquadisale
    de: Lake
    es: Salmuera
    ko: 소금물
    zh_simp: 盐水
    zh_trad: 鹽水
  descriptions:
    jp_kana: "あいてが　ＨＰの　はんぶん　くらい\nきずを　おっていると　わざの　いりょくが\n２ばいに　なる。"
    jp_kanji: "相手が　ＨＰの　半分くらい\nきずを　おっていると　技の　威力が\n２倍に　なる。"
    en: "If the target’s HP is half or less, this attack will hit\nwith double the power."
    fr: "Cette attaque est deux fois plus puissante lorsque\nl’ennemi a moins de la moitié de ses PV."
    it: "Se i PS del bersaglio sono scesi a metà o meno,\nquesta mossa colpirà con il doppio della potenza."
    de: "Hat das Ziel die Hälfte oder weniger seiner\nmaximalen KP, trifft diese Attacke mit doppelter\nKraft."
    es: "Si al objetivo le queda la mitad o menos de sus PS, \nel ataque será el doble de fuerte."
    ko: "상대가 HP의 절반 정도\n상처를 입고 있으면 기술의\n위력이 2배가 된다."
    zh_simp: "当对手的ＨＰ\n负伤到一半左右时，\n招式威力会变成２倍。"
    zh_trad: "當對手負傷，\nＨＰ剩一半左右時，\n招式威力會變成２倍。"
brutal_swing:
  names:
    jp_kana: ぶんまわす
    jp_kanji: ぶんまわす
    en: Brutal Swing
    fr: Centrifugifle
    it: Vorticolpo
    de: Wirbler
    es: Giro Vil
    ko: 세차게휘두르기
    zh_simp: 狂舞挥打
    zh_trad: 狂舞揮打
  descriptions:
    jp_kana: "じぶんの　からだを\nぶんまわして　あいてに\nダメージを　あたえる。"
    jp_kanji: "自分の　体を\nぶんまわして　相手に\nダメージを　与える。"
    en: "The user swings its body around violently to inflict\ndamage on everything in its vicinity."
    fr: "Le lanceur pivote pour prendre de l’élan et infliger\ndes dégâts."
    it: "Chi la usa infligge danni intorno a sé facendo\nruotare una parte del suo corpo."
    de: "Der Anwender dreht schwungvoll seinen Körper und\nfügt den Pokémon in seiner Nähe dabei Schaden zu."
    es: Hace pivotar su cuerpo para infligir daño a su rival.
    ko: "자신의 몸을\n세차게 휘둘러서\n상대에게 데미지를 준다."
    zh_simp: "用自己的身体狂舞挥打，\n给予对手伤害。"
    zh_trad: "用自己的身體狂舞揮打，\n給予對手傷害。"
bubble:
  names:
    jp_kana: あわ
    jp_kanji: あわ
    en: Bubble
    fr: Écume
    it: Bolla
    de: Blubber
    es: Burbuja
    ko: 거품
    zh_simp: 泡沫
    zh_trad: 泡沫
  descriptions:
    jp_kana: "むすうの　あわを　あいてに　ふきかけて\nこうげきする。　あいての　すばやさを\nさげることが　ある。"
    jp_kanji: "無数の　泡を　相手に　吹きかけて\n攻撃する。　相手の　素早さを\nさげることが　ある。"
    en: "A spray of countless bubbles is jetted at the\nopposing Pokémon. This may also lower their\nSpeed stat."
    fr: "Des bulles frappent l’ennemi.\nPeut réduire sa Vitesse."
    it: "Una pioggia di bolle investe i nemici intorno\ne può anche ridurne la Velocità."
    de: "Angriff mit Blasen. Initiative-Wert des Zieles wird\neventuell gesenkt."
    es: "Lanza burbujas a los contrincantes y puede reducir \nsu Velocidad."
    ko: "매우 많은 거품을 상대에게 내뿜어\n공격한다. 상대의 스피드를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手用力吹起无数泡泡进行攻击。\n有时会降低对手的速度。"
    zh_trad: "將無數的泡泡吹向對手進行攻擊。\n有時會降低對手的速度。"
bubble_beam:
  names:
    jp_kana: バブルこうせん
    jp_kanji: バブルこうせん
    en: Bubble Beam
    fr: Bulles d’O
    it: Bollaraggio
    de: Blubbstrahl
    es: Rayo Burbuja
    ko: 거품광선
    zh_simp: 泡沫光线
    zh_trad: 泡沫光線
  descriptions:
    jp_kana: "あわを　いきおいよく\nあいてに　はっしゃして　こうげきする。\nすばやさを　さげる　ことが　ある。"
    jp_kanji: "泡を　勢いよく\n相手に　発射して　攻撃する。\n素早さを　さげる　ことが　ある。"
    en: "A spray of bubbles is forcefully ejected at the\ntarget. This may also lower its Speed stat."
    fr: "Des bulles sont envoyées avec puissance\nsur l’ennemi. Peut aussi baisser sa Vitesse."
    it: "Colpisce il bersaglio con una forte scarica di bolle.\nPuò anche ridurne la Velocità."
    de: "Versprüht Blasen, die eventuell den Initiative-Wert\ndes Zieles senken."
    es: Diluvio de burbujas que puede bajar la Velocidad.
    ko: "거품을 기세 좋게\n상대에게 발사하여 공격한다.\n스피드를 떨어뜨릴 때가 있다."
    zh_simp: "向对手猛烈地喷射\n泡沫进行攻击。\n有时会降低对手的速度。"
    zh_trad: "向對手猛烈地噴射\n泡沫進行攻擊。\n有時會降低對手的速度。"
bug_bite:
  names:
    jp_kana: むしくい
    jp_kanji: むしくい
    en: Bug Bite
    fr: Piqûre
    it: Coleomorso
    de: Käferbiss
    es: Picadura
    ko: 벌레먹음
    zh_simp: 虫咬
    zh_trad: 蟲咬
  descriptions:
    jp_kana: "かみついて　こうげきする。\nあいてが　きのみを　もっている　とき\nたべて　きのみの　こうかを　うけられる。"
    jp_kanji: "かみついて　攻撃する。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user bites the target. If the target is holding a\nBerry, the user eats it and gains its effect."
    fr: "Le lanceur pique l’ennemi.\nSi ce dernier tient une Baie, le lanceur la dévore\net obtient son effet."
    it: "Chi la usa morde il bersaglio. Inoltre, se questi ha\nuna bacca, gliela ruba e ne sfrutta gli effetti."
    de: "Anwender beißt das Ziel. Trägt dieses eine Beere,\nisst der Anwender sie und erhält ihren Effekt."
    es: "Pica al objetivo. Si el objetivo lleva una baya, el \nusuario se la come y se beneficia de su efecto."
    ko: "물어서 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
    zh_simp: "咬住进行攻击。\n当对手携带树果时，\n可以食用并获得其效果。"
    zh_trad: "叮咬對手進行攻擊。\n可以吃下對手攜帶的樹果，\n並獲得樹果的效果。"
bug_buzz:
  names:
    jp_kana: むしのさざめき
    jp_kanji: むしのさざめき
    en: Bug Buzz
    fr: Bourdon
    it: Ronzio
    de: Käfergebrumm
    es: Zumbido
    ko: 벌레의야단법석
    zh_simp: 虫鸣
    zh_trad: 蟲鳴
  descriptions:
    jp_kana: "しんどうで　おんぱを　おこして\nこうげきする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "振動で　音波を　おこして\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user generates a damaging sound wave by\nvibration. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur fait vibrer son corps pour\nlancer une vague sonique. Peut aussi\nbaisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa crea un’onda sonora che infligge danni.\nPuò anche ridurre la Difesa Speciale del bersaglio."
    de: "Anwender erzeugt Schallwellen, die beim Ziel\nSchaden verursachen und eventuell dessen\nSpezial-Verteidigung senken."
    es: "El usuario crea una onda sónica dañina moviendo\nsu cuerpo que también puede disminuir la Defensa\nEspecial del objetivo."
    ko: "진동으로 음파를 일으켜서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "利用振动发出音波进行攻击。\n有时会降低对手的特防。"
    zh_trad: "利用振動產生出的音波進行攻擊。\n有時會降低對手的特防。"
bulk_up:
  names:
    jp_kana: ビルドアップ
    jp_kanji: ビルドアップ
    en: Bulk Up
    fr: Gonflette
    it: Granfisico
    de: Protzer
    es: Corpulencia
    ko: 벌크업
    zh_simp: 健美
    zh_trad: 健美
  descriptions:
    jp_kana: "からだに　ちからを　こめて　きんにくを\nぶあつく　することで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up its body,\nraising both its Attack and Defense stats."
    fr: "Le lanceur tend ses muscles pour se gonfler,\nce qui booste son Attaque et sa Défense."
    it: "Chi la usa tende i muscoli per gonfiare il corpo,\naumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an, um den\nAngriff und die Verteidigung zu erhöhen."
    es: "Robustece el cuerpo para subir el Ataque y la \nDefensa."
    ko: "몸에 힘을 담아\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而提高自己的攻击和防御。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n提高自己的攻擊和防禦。"
bulldoze:
  names:
    jp_kana: じならし
    jp_kanji: じならし
    en: Bulldoze
    fr: Piétisol
    it: Battiterra
    de: Dampfwalze
    es: Terratemblor
    ko: 땅고르기
    zh_simp: 重踏
    zh_trad: 重踏
  descriptions:
    jp_kana: "じめんを　ふみならして　じぶんの\nまわりに　いるものを　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "地面を　踏みならして　自分の\n周りに　いるものを　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user strikes everything around it by stomping\ndown on the ground. This lowers the Speed stat of\nthose hit."
    fr: "Le lanceur piétine le sol et inflige des dégâts\nà tous les Pokémon autour de lui. Baisse aussi\nleur Vitesse."
    it: "Chi la usa calpesta il terreno e scatena un\nterremoto che danneggia i Pokémon nei paraggi,\nriducendone la Velocità."
    de: "Anwender greift an, indem er den Boden um sich\nherum plattwalzt. Die Initiative aller betroffenen\nPokémon sinkt."
    es: "Sacudida sísmica que afecta a los demás Pokémon \nadyacentes y también reduce su Velocidad."
    ko: "땅을 힘껏 밟아 자신의\n주위에 있는 포켓몬을 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用力踩踏地面并攻击\n自己周围所有的宝可梦。\n降低对方的速度。"
    zh_trad: "用力踩踏地面，\n攻擊自己周圍所有的寶可夢。\n可降低對手的速度。"
bullet_punch:
  names:
    jp_kana: バレットパンチ
    jp_kanji: バレットパンチ
    en: Bullet Punch
    fr: Pisto-Poing
    it: Pugnoscarica
    de: Patronenhieb
    es: Puño Bala
    ko: 불릿펀치
    zh_simp: 子弹拳
    zh_trad: 子彈拳
  descriptions:
    jp_kana: "だんがんの　ような　はやくて　かたい\nパンチを　あいてに　くりだす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "弾丸の　ような　速くて　硬い\nパンチを　相手に　くりだす。\n必ず　先制攻撃　できる。"
    en: "The user strikes the target with tough punches as\nfast as bullets. This move always goes first."
    fr: "Le lanceur envoie des coups de poing aussi rapides\nque des balles de revolver. Frappe en priorité."
    it: "Chi la usa attacca con una scarica di pugni veloci\ncome proiettili.\nQuesta mossa ha priorità alta."
    de: "Das Ziel wird von ultraschnellen Hieben getroffen.\nHohe Erstschlagquote."
    es: "Ataca con fuertes puñetazos tan rápidos como\nproyectiles. Este movimiento tiene prioridad alta."
    ko: "탄환처럼 빠르고 단단한\n펀치를 상대에게 날린다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "向对手使出如子弹般\n快速而坚硬的拳头。\n必定能够先制攻击。"
    zh_trad: "向對手連續揮出如子彈般\n快速且堅硬的拳頭。\n必定能夠發動先制攻擊。"
bullet_seed:
  names:
    jp_kana: タネマシンガン
    jp_kanji: タネマシンガン
    en: Bullet Seed
    fr: Balle Graine
    it: Semitraglia
    de: Kugelsaat
    es: Recurrente
    ko: 기관총
    zh_simp: 种子机关枪
    zh_trad: 種子機關槍
  descriptions:
    jp_kana: "タネを　いきおいよく\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "タネを　勢いよく\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user forcefully shoots seeds at the target two\nto five times in a row."
    fr: "Le lanceur mitraille l’ennemi avec une rafale de\ngraines. De deux à cinq rafales sont lancées à\nla suite."
    it: "Chi la usa spara da due a cinque raffiche di semi\ncontro il bersaglio in successione."
    de: "Der Anwender wirft zwei- bis fünfmal in rascher\nFolge Samen auf das Ziel."
    es: "Dispara rápido de dos a cinco ráfagas de semillas \nde manera consecutiva."
    ko: "씨앗을 기세 좋게\n상대에게 발사하여 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "向对手猛烈地\n发射种子进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手猛烈地\n發射種子進行攻擊。\n連續攻擊２～５次。"
burn_up:
  names:
    jp_kana: もえつきる
    jp_kanji: もえつきる
    en: Burn Up
    fr: Flamme Ultime
    it: Ultima Fiamma
    de: Ausbrennen
    es: Llama Final
    ko: 불사르기
    zh_simp: 燃尽
    zh_trad: 燃盡
  descriptions:
    jp_kana: "ぜんしんの　ほのおを　すべて\nもやして　だいダメージを　あたえる。\nじぶんの　ほのおタイプが　なくなる。"
    jp_kanji: "全身の　ほのおを　すべて\n燃やして　大ダメージを　与える。\n自分の　ほのおタイプが　なくなる。"
    en: "To inflict massive damage, the user burns itself out.\nAfter using this move, the user will no longer be\nFire type."
    fr: "Le Pokémon se consume et les flammes de son\ncorps infligent des dégâts élevés à la cible.\nLe lanceur perd le type Feu."
    it: "Chi la usa attacca sfruttando tutta la sua potenza\nincendiaria per infliggere gravi danni al bersaglio,\nma come conseguenza perde il tipo Fuoco."
    de: "Der Anwender nutzt das gesamte Feuer in seinem\nKörper, um großen Schaden auszuteilen. Die restliche\nKampfdauer gehört er nicht mehr dem Typ Feuer an."
    es: "Utiliza hasta el último resquicio de llamas de su\ncuerpo para infligir un grave daño al oponente. Tras\nel ataque, el usuario deja de ser de tipo Fuego."
    ko: "전신의 불꽃을 모두\n태워서 큰 데미지를 준다.\n자신의 불꽃타입이 없어진다."
    zh_simp: "将自己全身燃烧起火焰来，\n给予对手大大的伤害。\n自己的火属性将会消失。"
    zh_trad: "燃盡全身的火焰，\n給予對手巨大的傷害。\n自己的火屬性將會消失。"
calm_mind:
  names:
    jp_kana: めいそう
    jp_kanji: めいそう
    en: Calm Mind
    fr: Plénitude
    it: Calmamente
    de: Gedankengut
    es: Paz Mental
    ko: 명상
    zh_simp: 冥想
    zh_trad: 冥想
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつし\nこころを　しずめる　ことで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and calms its\nspirit to raise its Sp. Atk and Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide dans son\nesprit pour augmenter son Attaque Spéciale et\nsa Défense Spéciale."
    it: "Chi la usa placa il proprio spirito meditando per\naumentare l’Attacco Speciale e la Difesa Speciale."
    de: "Erhöht Spezial-Angriff und Spezial-Verteidigung\ndurch Konzentration."
    es: "Aumenta la concentración y calma el espíritu para \nsubir el Ataque Especial y la Defensa Especial."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서 자신의\n특수공격과 특수방어를 올린다."
    zh_simp: "静心凝神，\n从而提高自己的特攻和特防。"
    zh_trad: "屏氣凝神，\n提高自己的特攻和特防。"
camouflage:
  names:
    jp_kana: ほごしょく
    jp_kanji: ほごしょく
    en: Camouflage
    fr: Camouflage
    it: Camuffamento
    de: Tarnung
    es: Camuflaje
    ko: 보호색
    zh_simp: 保护色
    zh_trad: 保護色
  descriptions:
    jp_kana: "みずべや　くさむら　どうくつなど\nいる　ばしょに　あわせて\nじぶんの　タイプを　かえる。"
    jp_kanji: "水辺や　草むら　どうくつなど\nいる　場所に　あわせて\n自分の　タイプを　変える。"
    en: "The user’s type is changed depending on its\nenvironment, such as at water’s edge, in grass, or in\na cave."
    fr: "Modifie le type du lanceur en fonction du terrain,\ncomme une berge, une grotte, l’herbe, etc."
    it: "Modifica il tipo di chi la usa a seconda del luogo,\nad esempio sull’acqua, nell’erba o in una grotta."
    de: "Der Typ des Anwenders passt sich der Umgebung\nan, sei es im Wasser, im Gras oder in einer Höhle."
    es: "Modifica el tipo del Pokémon según el terreno de \ncombate donde esté."
    ko: "물가나 풀밭, 동굴 등\n있는 장소에 맞춰서\n자신의 타입을 바꾼다."
    zh_simp: "根据所在场所不同，\n如水边、草丛和洞窟等，\n可以改变自己的属性。"
    zh_trad: "可以因應所在的地點如\n水邊、草叢和洞窟等，\n改變自己的屬性。"
captivate:
  names:
    jp_kana: ゆうわく
    jp_kanji: ゆうわく
    en: Captivate
    fr: Séduction
    it: Incanto
    de: Liebreiz
    es: Seducción
    ko: 유혹
    zh_simp: 诱惑
    zh_trad: 誘惑
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nあいての　とくこうを　がくっと　さげる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\n相手の　特攻を　がくっと　さげる。"
    en: "If any opposing Pokémon is the opposite gender of\nthe user, it is charmed, which harshly lowers its\nSp. Atk stat."
    fr: "Si l’ennemi est de sexe opposé au lanceur, il est\nséduit et son Attaque Spéciale baisse beaucoup."
    it: "Se i nemici che ha intorno sono del sesso opposto \na chi la usa, saranno ammaliati e il loro Attacco\nSpeciale diminuirà di molto."
    de: "Charme-Attacke, die den Spezial-Angriff des Zieles\nstark senkt, falls es dem anderen Geschlecht\nangehört."
    es: "Si el objetivo es del sexo opuesto, queda\nembelesado y baja mucho su Ataque Especial."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n상대의 특수공격을 크게 떨어뜨린다."
    zh_simp: "♂诱惑♀或♀诱惑♂，\n从而大幅降低对手的特攻。"
    zh_trad: "♂誘惑♀而♀誘惑♂，\n大幅降低對手的特攻。"
catastropika:
  names:
    jp_kana: ひっさつのピカチュート
    jp_kanji: ひっさつのピカチュート
    en: Catastropika
    fr: Pikachute Foudroyante
    it: Super Pikaboom
    de: Perfektes Pika-Projektil
    es: Pikavoltio Letal
    ko: 필살피카슛
    zh_simp: 皮卡皮卡必杀击
    zh_trad: 皮卡皮卡必殺擊
  descriptions:
    jp_kana: "Ｚパワーで　さいだい　でんりょくを\nみに　まとった　ピカチュウが\nぜんりょくで　あいてに　とびかかる。"
    jp_kanji: "Ｚパワーで　最大　電力を\n身に　まとったピカチュウが\n全力で　相手に　飛び掛る。"
    en: "The user, Pikachu, surrounds itself with the\nmaximum amount of electricity using its Z-Power\nand pounces on its target with full force."
    fr: "Pikachu utilise la Force Z pour concentrer toute\nson électricité avant de se jeter à toute vitesse\nsur l’adversaire."
    it: "Grazie al Potere Z, Pikachu accumula un’enorme\nquantità di energia elettrica e si lancia contro\nil bersaglio a tutta forza."
    de: "Pikachu umhüllt sich durch Z-Kraft mit gewaltiger\nelektrischer Energie und stürzt sich mit voller Kraft\nauf das Ziel."
    es: "Pikachu emplea el Poder Z para acumular una gran\ncantidad de electricidad en su cuerpo y arremeter\ncontra el objetivo."
    ko: "Z파워로 최대 전력을\n몸에 두른 피카츄가\n전력으로 상대에게 덤벼든다."
    zh_simp: "通过Ｚ力量，\n皮卡丘全身覆盖最强电力，\n全力猛扑对手。"
    zh_trad: "透過Ｚ力量，\n全身覆蓋最大電力的\n皮卡丘全力猛撲對手。"
celebrate:
  names:
    jp_kana: おいわい
    jp_kanji: おいわい
    en: Celebrate
    fr: Célébration
    it: Auguri
    de: Ehrentag
    es: Celebración
    ko: 축하
    zh_simp: 庆祝
    zh_trad: 慶祝
  descriptions:
    jp_kana: "ポケモンが　とっても\nハッピーな　あなたのことを\nおいわい　してくれる。"
    jp_kanji: "ポケモンが　とっても\nハッピーな　あなたのことを\nお祝い　してくれる。"
    en: The Pokémon congratulates you on your special day!
    fr: "Le Pokémon vous souhaite plein de bonnes choses\npour cet événement spécial."
    it: Il Pokémon ti fa gli auguri nel tuo giorno speciale.
    de: Das Pokémon gratuliert dir zu deinem Geburtstag!
    es: El Pokémon te felicita en un día muy especial para ti.
    ko: "포켓몬이 매우\n행복한 당신을\n축하해 준다."
    zh_simp: "宝可梦为十分\n开心的你庆祝。"
    zh_trad: "寶可夢會為了\n非常開心的你而慶祝。"
charge:
  names:
    jp_kana: じゅうでん
    jp_kanji: じゅうでん
    en: Charge
    fr: Chargeur
    it: Sottocarica
    de: Ladevorgang
    es: Carga
    ko: 충전
    zh_simp: 充电
    zh_trad: 充電
  descriptions:
    jp_kana: "つぎの　ターンに　だす　でんきタイプの\nわざの　いりょくを　あげる。\nじぶんの　とくぼうも　あがる。"
    jp_kanji: "次の　ターンに　だす　でんきタイプの\n技の　威力を　あげる。\n自分の　特防も　あがる。"
    en: "The user boosts the power of the Electric move it\nuses on the next turn. This also raises the user’s\nSp. Def stat."
    fr: "Le lanceur concentre sa puissance pour\nsa prochaine attaque Électrik. Augmente sa\nDéfense Spéciale."
    it: "Potenzia la mossa di tipo Elettro usata subito\ndopo. Aumenta anche la Difesa Speciale\ndi chi la usa."
    de: "Hebt die Stärke für die kommende Elektro-Attacke\nan und erhöht die Spezial-Verteidigung."
    es: "Recarga energía para potenciar el siguiente \nmovimiento de tipo Eléctrico. También sube la \nDefensa Especial."
    ko: "다음 턴에 쓸 전기타입\n기술의 위력을 올린다.\n자신의 특수방어도 올라간다."
    zh_simp: "提高下一回合使出的\n电属性的招式威力。\n自己的特防也会提高。"
    zh_trad: "提高下一回合使出的\n電屬性招式威力。\n也會提高自己的特防。"
charge_beam:
  names:
    jp_kana: チャージビーム
    jp_kanji: チャージビーム
    en: Charge Beam
    fr: Rayon Chargé
    it: Raggioscossa
    de: Ladestrahl
    es: Rayo Carga
    ko: 차지빔
    zh_simp: 充电光束
    zh_trad: 充電光束
  descriptions:
    jp_kana: "でんげきの　たばを　あいてに\nはっしゃする。でんきを　ためて　じぶんの\nとくこうを　あげることが　ある。"
    jp_kanji: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    en: "The user attacks with an electric charge. The user\nmay use any remaining electricity to raise its\nSp. Atk stat."
    fr: "Le lanceur tire un rayon chargé d’électricité.\nPeut aussi augmenter son Attaque Spéciale."
    it: "Chi la usa lancia un fascio di elettricità molto\nintensa. Può anche aumentare il suo Attacco\nSpeciale."
    de: "Ziel wird von einem Elektrostrahl getroffen.\nErhöht eventuell Spezial-Angriff des Anwenders."
    es: "Lanza un rayo eléctrico contra el objetivo. Puede \nsubir el Ataque Especial de quien lo usa."
    ko: "전격의 다발을 상대에게\n발사한다. 전기를 모아서 자신의\n특수공격을 올릴 때가 있다."
    zh_simp: "向对手发射电击光束。\n由于蓄满电流，\n有时会提高自己的特攻。"
    zh_trad: "向對手發射電擊光束。\n有時會因電流蓄積，\n提高自己的特攻。"
charm:
  names:
    jp_kana: あまえる
    jp_kanji: あまえる
    en: Charm
    fr: Charme
    it: Fascino
    de: Charme
    es: Encanto
    ko: 애교부리기
    zh_simp: 撒娇
    zh_trad: 撒嬌
  descriptions:
    jp_kana: "かわいく　みつめて　ゆだんを　さそい\nあいての　こうげきを　がくっと　さげる。"
    jp_kanji: "かわいく　みつめて　油断を　誘い\n相手の　攻撃を　がくっと　さげる。"
    en: "The user gazes at the target rather charmingly,\nmaking it less wary. This harshly lowers its\nAttack stat."
    fr: "Le lanceur fait les yeux doux pour berner l’ennemi\net beaucoup réduire son Attaque."
    it: "Ammalia il bersaglio con lo sguardo per renderlo\nmeno cauto. Ne riduce molto l’Attacco."
    de: "Betört das Ziel und reduziert dessen Angriffs-Wert\nstark."
    es: Engatusa al objetivo y reduce bastante su Ataque.
    ko: "귀엽게 바라보고 방심을 유도하여\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "可爱地凝视，\n诱使对手疏忽大意，\n从而大幅降低对手的攻击。"
    zh_trad: "用撒嬌的眼神\n誘使對手疏忽大意，\n大幅降低對手的攻擊。"
chatter:
  names:
    jp_kana: おしゃべり
    jp_kanji: おしゃべり
    en: Chatter
    fr: Babil
    it: Schiamazzo
    de: Geschwätz
    es: Cháchara
    ko: 수다
    zh_simp: 喋喋不休
    zh_trad: 喋喋不休
  descriptions:
    jp_kana: "とても　うるさい　おしゃべりの\nおんぱで　あいてを　こうげきする。\nあいてを　こんらん　させる。"
    jp_kanji: "とても　うるさい　おしゃべりの\n音波で　相手を　攻撃する。\n相手を　混乱させる。"
    en: "The user attacks the target with sound waves of\ndeafening chatter. This confuses the target."
    fr: "Attaque avec les ondes sonores assourdissantes\nqu’il émet en bavardant. Rend l’ennemi confus."
    it: "Chi la usa attacca creando un’onda sonora\ndi parole a vanvera e confonde il bersaglio."
    de: "Der Anwender labert das Ziel zu und greift es mit\nden dadurch entstehenden Schallwellen an, wodurch\ndas Ziel verwirrt wird."
    es: "Ataca con una onda de sonido muy ruidosa\ncompuesta por palabras y confunde al objetivo."
    ko: "매우 시끄럽고 수다스러운\n음파로 상대를 공격한다.\n상대를 혼란시킨다."
    zh_simp: "用非常烦人的，\n喋喋不休的音波攻击对手。\n使对手混乱。"
    zh_trad: "用非常煩人且喋喋不休的\n音波攻擊對手。\n使對手混亂。"
chip_away:
  names:
    jp_kana: なしくずし
    jp_kanji: なしくずし
    en: Chip Away
    fr: Attrition
    it: Insidia
    de: Zermürben
    es: Guardia Baja
    ko: 야금야금
    zh_simp: 逐步击破
    zh_trad: 逐步擊破
  descriptions:
    jp_kana: "すきを　みて　けんじつに　こうげきする。\nあいての　のうりょく　へんかに\nかんけいなく　ダメージを　あたえる。"
    jp_kanji: "すきを　みて　堅実に　攻撃する。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "Looking for an opening, the user strikes consistently.\nThe target’s stat changes don’t affect this\nattack’s damage."
    fr: "Une attaque puissante quand l’ennemi baisse\nsa garde. Inflige des dégâts sans tenir compte\ndes changements de stats."
    it: "Chi la usa attacca non appena il bersaglio\nabbassa la guardia. Il danno inflitto prescinde\ndalle modifiche alle statistiche del bersaglio."
    de: "Eine durchdachte Attacke zur rechten Zeit.\nRichtet unabhängig von den Statusveränderungen\ndes Zieles Schaden an."
    es: "Un ataque que busca los puntos débiles del\nobjetivo y puede causarle daño aunque cambien \nsus características."
    ko: "틈을 보며 착실하게 공격한다.\n상대의 능력 변화에\n관계없이 데미지를 준다."
    zh_simp: "看准机会稳步攻击。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "看準時機，確實地攻擊對手。\n可不顧對手的能力變化\n給予傷害。"
circle_throw:
  names:
    jp_kana: ともえなげ
    jp_kanji: ともえなげ
    en: Circle Throw
    fr: Projection
    it: Ribaltiro
    de: Überkopfwurf
    es: Llave Giro
    ko: 배대뒤치기
    zh_simp: 巴投
    zh_trad: 巴投
  descriptions:
    jp_kana: "あいてを　なげとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　投げとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is thrown, and a different Pokémon is\ndragged out. In the wild, this ends a battle against\na single Pokémon."
    fr: "Projette le Pokémon ennemi et le remplace par\nun autre. Lors d’un combat contre un Pokémon\nsauvage seul, met fin au combat."
    it: "Il bersaglio è scaraventato via ed è costretto\na lasciare il posto a un altro. Mette fine alle lotte\ncontro singoli Pokémon selvatici."
    de: "Schleudert das Ziel davon und bewirkt damit,\ndass ein anderes Pokémon eingewechselt wird.\nBeendet Kämpfe gegen wilde Pokémon."
    es: "Lanza por los aires al objetivo y hace que salga otro \nPokémon. Si es uno salvaje, acaba el combate."
    ko: "상대를 내던져서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "扔飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "摔飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
clamp:
  names:
    jp_kana: からではさむ
    jp_kanji: からではさむ
    en: Clamp
    fr: Claquoir
    it: Tenaglia
    de: Schnapper
    es: Tenaza
    ko: 껍질끼우기
    zh_simp: 贝壳夹击
    zh_trad: 貝殼夾擊
  descriptions:
    jp_kana: "とても　がんじょうな　ぶあつい　からに\n４ー５ターンの　あいだ\nあいてを　はさんで　こうげきする。"
    jp_kanji: "とても　頑丈な　ぶあつい　殻に\n４ー５ターンの　間\n相手を　はさんで　攻撃する。"
    en: "The target is clamped and squeezed by the user’s\nvery thick and sturdy shell for four to five turns."
    fr: "Le lanceur piège l’ennemi dans sa dure coquille et\nl’écrase pendant quatre à cinq tours."
    it: "Chi la usa intrappola e stritola il bersaglio con\nla sua corazza spessa e forte per quattro\no cinque turni."
    de: "Fängt und quetscht das Ziel über vier bis fünf\nRunden durch die harte Schale des Anwenders."
    es: "Atrapa y atenaza con fuerza durante cuatro o cinco \nturnos."
    ko: "매우 튼튼하고 두꺼운 껍질에\n4-5턴 동안\n상대를 끼워서 공격한다."
    zh_simp: "用非常坚固且厚实的贝壳，\n在４～５回合内\n夹住对手进行攻击。"
    zh_trad: "用非常堅固且厚實的貝殼，\n在４～５回合內\n夾住對手進行攻擊。"
clanging_scales:
  names:
    jp_kana: スケイルノイズ
    jp_kanji: スケイルノイズ
    en: Clanging Scales
    fr: Vibrécaille
    it: Clamorsquame
    de: Schuppenrasseln
    es: Fragor Escamas
    ko: 스케일노이즈
    zh_simp: 鳞片噪音
    zh_trad: 鱗片噪音
  descriptions:
    jp_kana: "ぜんしんの　うろこを　こすり\nおおきな　おとを　だして　こうげきする。\nこうげきご　じぶんの　ぼうぎょが　さがる。"
    jp_kanji: "全身の　うろこを　こすり\n大きな　音を　出して　攻撃する。\n攻撃後　自分の　防御が　さがる。"
    en: "The user rubs the scales on its entire body and\nmakes a huge noise to attack the opposing Pokémon.\nThe user’s Defense stat goes down after the attack."
    fr: "Le lanceur déclenche un vacarme en frottant\nses écailles les unes contre les autres pour\nattaquer. Baisse la Défense du lanceur."
    it: "Chi la usa attacca il bersaglio con un suono\nfortissimo che genera sfregando le scaglie del corpo.\nDopo aver attaccato, la sua Difesa diminuisce."
    de: "Der Anwender erzeugt durch das Rasseln mit seinen\nSchuppen ein lautes Geräusch und greift an.\nAnschließend sinkt seine Verteidigung."
    es: "Frota todas las escamas de su cuerpo para crear un\nfuerte sonido con el que ataca. Cuando el ataque\ntermina, su Defensa se ve reducida."
    ko: "전신의 비늘을 비벼서\n큰 소리를 내 공격한다.\n공격 후 자신의 방어가 떨어진다."
    zh_simp: "摩擦全身鳞片，\n发出响亮的声音进行攻击。\n攻击后自己的防御会降低。"
    zh_trad: "摩擦全身鱗片，\n發出響亮的聲音並進行攻擊。\n攻擊後自己的防禦會降低。"
clear_smog:
  names:
    jp_kana: クリアスモッグ
    jp_kanji: クリアスモッグ
    en: Clear Smog
    fr: Bain de Smog
    it: Pulifumo
    de: Klärsmog
    es: Niebla Clara
    ko: 클리어스모그
    zh_simp: 清除之烟
    zh_trad: 清除之煙
  descriptions:
    jp_kana: "とくしゅな　どろの　かたまりを\nあいてに　なげつけて　こうげきする。\nのうりょく　へんかを　もとに　もどす。"
    jp_kanji: "特殊な　泥の　塊を\n相手に　投げつけて　攻撃する。\n能力変化を　もとに　もどす。"
    en: "The user attacks by throwing a clump of special\nmud. All stat changes are returned to normal."
    fr: "Le lanceur jette un tas de détritus spéciaux sur\nla cible. Les changements de stats de la cible\nsont annulés."
    it: "Attacca il bersaglio lanciandogli contro una nuvola\ndi fumo speciale, che annulla ogni modifica\nalle statistiche."
    de: "Anwender greift das Ziel mit spezialgefertigtem Smog\nan. Setzt dessen Statusveränderungen zurück."
    es: "Ataca al objetivo con una singular bola de lodo que\nelimina cualquier cambio en sus características."
    ko: "특수한 진흙 덩어리를\n상대에게 내던져서 공격한다.\n능력 변화를 원래대로 돌린다."
    zh_simp: "向对手投掷\n特殊的泥块进行攻击。\n使其能力变回原点。"
    zh_trad: "向對手投擲特殊的泥塊進行攻擊。\n能讓對手的能力變化\n回復到初始狀態。"
close_combat:
  names:
    jp_kana: インファイト
    jp_kanji: インファイト
    en: Close Combat
    fr: Close Combat
    it: Zuffa
    de: Nahkampf
    es: A Bocajarro
    ko: 인파이트
    zh_simp: 近身战
    zh_trad: 近身戰
  descriptions:
    jp_kana: "まもりを　すてて　あいての　ふところに\nとつげきする。　じぶんの\nぼうぎょと　とくぼうが　さがる。"
    jp_kanji: "守りを　捨てて　相手の　ふところに\n突撃する。　自分の\n防御と　特防が　さがる。"
    en: "The user fights the target up close without guarding\nitself. This also lowers the user’s Defense and\nSp. Def stats."
    fr: "Le lanceur combat au corps à corps sans se\nprotéger. Baisse aussi sa Défense et sa Défense\nSpéciale."
    it: "Chi la usa attacca abbassando la guardia.\nLa propria Difesa e la Difesa Speciale si riducono."
    de: "Nahkampf-Attacke ohne Rücksicht auf Verluste.\nSenkt Verteidigung und Spezial-Verteidigung des\nAnwenders."
    es: "Lucha abiertamente contra el objetivo sin\nprotegerse. También reduce la Defensa y la Defensa\nEspecial del usuario."
    ko: "방어를 포기하고 상대 깊숙이\n돌격한다. 자신의\n방어와 특수방어가 떨어진다."
    zh_simp: "放弃守护，\n向对手的怀里突击。\n自己的防御和特防会降低。"
    zh_trad: "反守為攻，近身突擊對手。\n自己的防禦和特防會降低。"
coil:
  names:
    jp_kana: とぐろをまく
    jp_kanji: とぐろをまく
    en: Coil
    fr: Enroulement
    it: Arrotola
    de: Einrollen
    es: Enrosque
    ko: 똬리틀기
    zh_simp: 盘蜷
    zh_trad: 盤蜷
  descriptions:
    jp_kana: "とぐろを　まいて　しゅうちゅう　する。\nじぶんの　こうげきと　ぼうぎょと\nめいちゅうりつを　あげる。"
    jp_kanji: "とぐろを　まいて　集中する。\n自分の　攻撃と　防御と\n命中率を　あげる。"
    en: "The user coils up and concentrates. This raises its\nAttack and Defense stats as well as its accuracy."
    fr: "Le lanceur s’enroule sur lui-même et se concentre.\nSon Attaque, sa Défense et sa Précision augmentent."
    it: "Chi la usa si concentra aumentando Attacco,\nDifesa e precisione."
    de: "Anwender rollt sich zusammen und sammelt sich.\nDabei werden Angriff, Verteidigung und Genauigkeit\nerhöht."
    es: "El usuario se concentra, lo que le permite aumentar \nsu Ataque, Defensa y Precisión."
    ko: "똬리를 틀어서 집중한다.\n자신의 공격과 방어와\n명중률을 올린다."
    zh_simp: "盘蜷着集中精神。\n提高自己的攻击、防御和命中率。"
    zh_trad: "盤蜷身體集中精神。\n可提高自己的攻擊、防禦和命中率。"
comet_punch:
  names:
    jp_kana: れんぞくパンチ
    jp_kanji: れんぞくパンチ
    en: Comet Punch
    fr: Poing Comète
    it: Cometapugno
    de: Kometenhieb
    es: Puño Cometa
    ko: 연속펀치
    zh_simp: 连续拳
    zh_trad: 連續拳
  descriptions:
    jp_kana: "どとうの　パンチで\nあいてを　なぐりつけて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "どとうの　パンチで\n相手を　なぐりつけて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The target is hit with a flurry of punches that strike\ntwo to five times in a row."
    fr: "Une tornade de coups de poing qui frappe de\ndeux à cinq fois d’affilée."
    it: "Colpisce il bersaglio con una scarica di pugni\nda due a cinque volte di fila."
    de: "Trifft das Ziel zwei- bis fünfmal hintereinander mit\nkräftigen Hieben."
    es: Pega de dos a cinco veces seguidas.
    ko: "노도 같은 펀치로\n상대를 세게 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用拳头怒涛般的\n殴打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用怒濤般的拳頭\n毆打對手進行攻擊。\n連續攻擊２～５次。"
confide:
  names:
    jp_kana: ないしょばなし
    jp_kanji: ないしょばなし
    en: Confide
    fr: Confidence
    it: Confidenza
    de: Vertrauenssache
    es: Confidencia
    ko: 비밀이야기
    zh_simp: 密语
    zh_trad: 密語
  descriptions:
    jp_kana: "ないしょばなしを　することで　あいての\nしゅうちゅうりょくを　うしなわせ\nあいての　とくこうを　さげる。"
    jp_kanji: "ないしょばなしを　することで　相手の\n集中力を　失わせ\n相手の　特攻を　さげる。"
    en: "The user tells the target a secret, and the target\nloses its ability to concentrate. This lowers\nthe target’s Sp. Atk stat."
    fr: "Dévoile des secrets à l’ennemi, qui perd alors\nsa concentration et voit son Attaque Spéciale\ndiminuer."
    it: "Chi la usa svela dei segreti al bersaglio,\ndistraendolo e riducendone l’Attacco Speciale."
    de: "Der Anwender vertraut dem Ziel ein Geheimnis an\nund stört auf diese Weise dessen Konzentration.\nDer Spezial-Angriff des Zieles sinkt."
    es: "Hace que el objetivo pierda la concentración \ncontándole un secreto. Disminuye el Ataque\nEspecial del oponente."
    ko: "비밀 이야기를 해서\n상대의 집중력을 잃게 하여\n특수공격을 떨어뜨린다."
    zh_simp: "和对手进行密语，\n使其失去集中力，\n从而降低对手的特攻。"
    zh_trad: "向對手低聲密語，\n使對手失去集中力，\n降低對手的特攻。"
confuse_ray:
  names:
    jp_kana: あやしいひかり
    jp_kanji: あやしいひかり
    en: Confuse Ray
    fr: Onde Folie
    it: Stordiraggio
    de: Konfustrahl
    es: Rayo Confuso
    ko: 이상한빛
    zh_simp: 奇异之光
    zh_trad: 奇異之光
  descriptions:
    jp_kana: "あやしい　ひかりを\nあいてに　みせて　まどわせる。\nあいてを　こんらん　させる。"
    jp_kanji: "怪しい　光を\n相手に　みせて　まどわせる。\n相手を　混乱させる。"
    en: "The target is exposed to a sinister ray that\ntriggers confusion."
    fr: "Un rayon sinistre qui plonge l’ennemi dans un état\nde confusion."
    it: "Colpisce il bersaglio con un raggio funesto\nche lo confonde."
    de: Ein fieser Strahl, der das Ziel verwirrt.
    es: Rayo siniestro que confunde al objetivo.
    ko: "이상한 빛을\n상대에게 비춰 당황하게 한다.\n상대를 혼란시킨다."
    zh_simp: "显示奇怪的光，\n扰乱对手。\n使对手混乱。"
    zh_trad: "讓對手看奇怪的光線\n擾亂對手。\n使對手混亂。"
confusion:
  names:
    jp_kana: ねんりき
    jp_kanji: ねんりき
    en: Confusion
    fr: Choc Mental
    it: Confusione
    de: Konfusion
    es: Confusión
    ko: 염동력
    zh_simp: 念力
    zh_trad: 念力
  descriptions:
    jp_kana: "よわい　ねんりきを\nあいてに　おくって　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "弱い　念力を\n相手に　送って　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The target is hit by a weak telekinetic force.\nThis may also confuse the target."
    fr: "Une faible vague télékinétique frappe l’ennemi.\nPeut aussi le plonger dans la confusion."
    it: "Colpisce il bersaglio con una leggera forza\ntelecinetica e può anche confonderlo."
    de: "Das Ziel wird von schwacher telekinetischer Energie\ngetroffen und eventuell verwirrt."
    es: "Débil ataque telequinético que puede causar \nconfusión."
    ko: "약한 염동력을\n상대에게 보내어 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "向对手发送\n微弱的念力进行攻击。\n有时会使对手混乱。"
    zh_trad: "向對手發送\n微弱的念力進行攻擊。\n有時會使對手混亂。"
constrict:
  names:
    jp_kana: からみつく
    jp_kanji: からみつく
    en: Constrict
    fr: Constriction
    it: Limitazione
    de: Umklammerung
    es: Restricción
    ko: 휘감기
    zh_simp: 缠绕
    zh_trad: 纏繞
  descriptions:
    jp_kana: "しょくしゅや　ツタ　などを　からみつけて\nこうげきする。あいての　すばやさを\nさげることが　ある。"
    jp_kanji: "触手や　ツタなどを　からみつけて\n攻撃する。相手の　素早さを\nさげることが　ある。"
    en: "The target is attacked with long, creeping tentacles,\nvines, or the like. This may also lower the target’s \nSpeed stat."
    fr: "De longs tentacules ou lianes attaquent l’ennemi.\nPeut aussi baisser sa Vitesse."
    it: "Colpisce il bersaglio con lunghi tentacoli o piante\nrampicanti. Può anche ridurne la Velocità."
    de: "Angriff mit langen Tentakeln oder Ranken.\nSenkt eventuell den Initiative-Wert."
    es: "Ataca con largos tentáculos o zarcillos que pueden\nbajar la Velocidad."
    ko: "촉수나 덩굴 등을 휘감아서\n공격한다. 상대의 스피드를\n떨어뜨릴 때가 있다."
    zh_simp: "用触手或青藤等缠绕进行攻击。\n有时会降低对手的速度。"
    zh_trad: "用觸手或青藤等纏繞對手進行攻擊。\n有時會降低對手的速度。"
continental_crush:physical:
  names:
    jp_kana: ワールズエンドフォール
    jp_kanji: ワールズエンドフォール
    en: Continental Crush
    fr: Apocalypse Gigalithique
    it: Gigamacigno Polverizzante
    de: Apokalyptische Steinpresse
    es: Aplastamiento Gigalítico
    ko: 월즈엔드폴
    zh_simp: 毁天灭地巨岩坠
    zh_trad: 毀天滅地巨岩墜
  descriptions:
    jp_kana: "Ｚパワーで　おおきな　いわやまを　よびだし\nぜんりょくで　あいてに　ぶつける。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　大きな　岩山を　呼びだし\n全力で　相手に　ぶつける。\n元になった　技で　威力が　変わる。"
    en: "The user summons a huge rock mountain using its\nZ-Power and drops it onto the target with full force.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour créer un immense\nrocher et écraser l’adversaire avec. La puissance\nvarie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa crea un masso enorme\ne lo lancia sul bersaglio schiacciandolo. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Der Anwender beschwört mit Z-Kraft einen großen\nFelsen herbei und lässt ihn auf das Ziel fallen. Die\nStärke variiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para crear una montaña\nrocosa con la que aplasta al objetivo. Su potencia\ndepende de la del movimiento original."
    ko: "Z파워로 큰 바위산을 불러내\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量召唤大大的岩山，\n全力撞向对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量召喚大大的岩山，\n全力撞向對手。\n威力會隨原本的招式而改變。"
continental_crush:special:
  names:
    jp_kana: ワールズエンドフォール
    jp_kanji: ワールズエンドフォール
    en: Continental Crush
    fr: Apocalypse Gigalithique
    it: Gigamacigno Polverizzante
    de: Apokalyptische Steinpresse
    es: Aplastamiento Gigalítico
    ko: 월즈엔드폴
    zh_simp: 毁天灭地巨岩坠
    zh_trad: 毀天滅地巨岩墜
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
conversion:
  names:
    jp_kana: テクスチャー
    jp_kanji: テクスチャー
    en: Conversion
    fr: Conversion
    it: Conversione
    de: Umwandlung
    es: Conversión
    ko: 텍스처
    zh_simp: 纹理
    zh_trad: 紋理
  descriptions:
    jp_kana: "じぶんの　タイプを\nおぼえている　わざで　いちばん　うえの\nわざと　おなじ　タイプに　する。"
    jp_kanji: "自分の　タイプを\nおぼえている　技で　一番　上の\n技と　同じ　タイプに　する。"
    en: "The user changes its type to become the same type\nas the move at the top of the list of moves it knows."
    fr: "Le lanceur change de type pour prendre celui\nde la première capacité de sa liste."
    it: "Il tipo di chi la usa muta in quello della prima\nmossa nella lista delle sue mosse."
    de: "Wandelt den Typ des Anwenders in den Typ der\nersten Attacke des Anwenders um."
    es: "Cambia el tipo del usuario por el del primero de sus \nmovimientos."
    ko: "자신의 타입을 배운 기술 중\n가장 위에 있는 기술과\n같은 타입으로 바꾼다."
    zh_simp: "将自己的属性转换成\n和已学会的招式中\n第一个招式相同的属性。"
    zh_trad: "將自己的屬性轉換成\n與已學會的招式中\n第１個招式相同的屬性。"
conversion_2:
  names:
    jp_kana: テクスチャー２
    jp_kanji: テクスチャー２
    en: Conversion 2
    fr: Conversion 2
    it: Conversione2
    de: Umwandlung2
    es: Conversión2
    ko: 텍스처2
    zh_simp: 纹理２
    zh_trad: 紋理２
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざに\nていこう　できる　ように\nじぶんの　タイプを　へんか　させる。"
    jp_kanji: "相手が　最後に　使った技に\n抵抗できる　ように\n自分の　タイプを　変化させる。"
    en: "The user changes its type to make itself resistant to\nthe type of the attack the opponent used last."
    fr: "Le lanceur change de type pour être résistant au\ntype de la dernière attaque lancée par sa cible."
    it: "Chi la usa cambia tipo per rendersi resistente\nal tipo dell’ultima mossa usata dal bersaglio."
    de: "Anwender ändert Typ und wird gegen letzten\nAngriffstyp resistent."
    es: "El usuario cambia de tipo para hacerse resistente \nal último tipo de movimiento usado por el objetivo."
    ko: "상대가 마지막으로 쓴 기술에\n저항할 수 있도록\n자신의 타입을 변화시킨다."
    zh_simp: "为了可以抵抗对手\n最后使用的招式，\n从而使自己的属性发生变化。"
    zh_trad: "改變屬性，\n讓自己能夠抵抗對手\n最近一次使出的招式。"
copycat:
  names:
    jp_kana: まねっこ
    jp_kanji: まねっこ
    en: Copycat
    fr: Photocopie
    it: Copione
    de: Imitator
    es: Copión
    ko: 흉내쟁이
    zh_simp: 仿效
    zh_trad: 仿效
  descriptions:
    jp_kana: "ちょくぜんに　でた　わざを　まねして\nおなじ　わざを　だす。\nわざが　でていないと　しっぱい　する。"
    jp_kanji: "直前に　でた　技を　まねして\n同じ　技を　だす。\n技が　でていないと　失敗する。"
    en: "The user mimics the move used immediately before\nit. The move fails if no other move has been\nused yet."
    fr: "Le lanceur imite la dernière capacité employée.\nÉchoue si aucune capacité n’a été utilisée."
    it: "Chi la usa mima l’ultima mossa eseguita.\nFallisce se non è stata ancora usata alcuna\nmossa."
    de: "Anwender imitiert die gerade verwendete Attacke.\nDies schlägt fehl, falls zuvor keine Attacke\nverwendet wurde."
    es: "Imita el movimiento usado justo antes.\nEl movimiento falla si no se ha usado aún ninguno."
    ko: "직전에 나온 기술을 흉내 내어\n같은 기술을 쓴다.\n기술이 나오지 않았으면 실패한다."
    zh_simp: "模仿对手刚才使出的招式，\n并使出相同招式。\n如果对手还没出招则会失败。"
    zh_trad: "模仿對手最近一次使用的招式，\n若對手沒有成功出招則會失敗。"
core_enforcer:
  names:
    jp_kana: コアパニッシャー
    jp_kanji: コアパニッシャー
    en: Core Enforcer
    fr: Sanction Suprême
    it: Nucleocastigo
    de: Sanktionskern
    es: Núcleo Castigo
    ko: 코어퍼니셔
    zh_simp: 核心惩罚者
    zh_trad: 核心懲罰者
  descriptions:
    jp_kana: "ダメージを　あたえた　あいてが\nすでに　こうどうを　おえて　いたら\nあいての　とくせいを　けして　しまう。"
    jp_kanji: "ダメージを　与えた　相手が\nすでに　行動を　終えていたら\n相手の　特性を　消してしまう。"
    en: "If the Pokémon the user has inflicted damage on\nhave already used their moves, this move eliminates\nthe effect of the target’s Ability."
    fr: "La cible subit des dégâts et, si elle a déjà agi\nà ce tour, elle perd aussi son talent."
    it: "Il bersaglio subisce dei danni e, se ha già agito\nnel turno, perde la sua abilità."
    de: "Hat das Pokémon, das durch diese Attacke Schaden\ngenommen hat, in dieser Runde bereits gehandelt,\nverliert es seine Fähigkeit."
    es: "Inflige daño al rival, y si este ya ha hecho uso de\nalgún movimiento, pierde su habilidad."
    ko: "데미지를 준 상대가\n이미 행동을 끝냈다면\n상대의 특성을 없애버린다."
    zh_simp: "如果给予过伤害的对手\n已经结束行动，\n其特性就会被消除。"
    zh_trad: "如果攻擊的對手在該回合\n已經結束行動，\n對手的特性就會被消除。"
corkscrew_crash:physical:
  names:
    jp_kana: ちょうぜつらせんれんげき
    jp_kanji: ちょうぜつらせんれんげき
    en: Corkscrew Crash
    fr: Vrille Maximum
    it: Spirale Perforante
    de: Turbo-Spiralkombo
    es: Hélice Trepanadora
    ko: 초월나선연격
    zh_simp: 超绝螺旋连击
    zh_trad: 超絕螺旋連擊
  descriptions:
    jp_kana: "Ｚパワーで　こうそくかいてんを　おこない\nぜんりょくで　あいてに　ぶつかる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　高速回転を　おこない\n全力で　相手に　ぶつかる。\n元になった　技で　威力が　変わる。"
    en: "The user spins very fast and rams into the target\nwith the full force of its Z-Power. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour tourner à toute\nvitesse et écraser l’adversaire. La puissance varie\nselon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa vortica su se stesso\ne si scaglia sul bersaglio con tutte le sue forze. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender wirbelt durch Z-Kraft sehr schnell\numher und prallt mit dem Ziel zusammen. Die Stärke\nvariiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para girar a toda\nvelocidad y perforar al objetivo. Su potencia\ndepende de la del movimiento original."
    ko: "Z파워로 고속 회전을 하여\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量进行高速旋转，\n全力撞上对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量進行高速旋轉，\n全力撞擊對手。\n威力會隨原本的招式而改變。"
corkscrew_crash:special:
  names:
    jp_kana: ちょうぜつらせんれんげき
    jp_kanji: ちょうぜつらせんれんげき
    en: Corkscrew Crash
    fr: Vrille Maximum
    it: Spirale Perforante
    de: Turbo-Spiralkombo
    es: Hélice Trepanadora
    ko: 초월나선연격
    zh_simp: 超绝螺旋连击
    zh_trad: 超絕螺旋連擊
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
cosmic_power:
  names:
    jp_kana: コスモパワー
    jp_kanji: コスモパワー
    en: Cosmic Power
    fr: Force Cosmik
    it: Cosmoforza
    de: Kosmik-Kraft
    es: Masa Cósmica
    ko: 코스믹파워
    zh_simp: 宇宙力量
    zh_trad: 宇宙力量
  descriptions:
    jp_kana: "うちゅう　から　しんぴの　ちからを\nとりこむ　ことで　じぶんの\nぼうぎょと　とくぼうを　あげる。"
    jp_kanji: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    en: "The user absorbs a mystical power from space to\nraise its Defense and Sp. Def stats."
    fr: "Le lanceur absorbe un pouvoir mystique spatial qui\naugmente sa Défense et sa Défense Spéciale."
    it: "Chi la usa assorbe una forza mistica dallo spazio\nche aumenta la Difesa e la Difesa Speciale."
    de: "Erhöht Verteidigung und Spezial-Verteidigung durch\neine mystische Kraft."
    es: "Sube la Defensa y la Defensa Especial propias con \nenergía mística."
    ko: "우주로부터 신비한 힘을\n손에 넣음으로써\n자신의 방어와 특수방어를 올린다."
    zh_simp: "汲取宇宙中神秘的力量，\n从而提高自己的防御和特防。"
    zh_trad: "吸取來自宇宙的神秘力量，\n提高自己的防禦和特防。"
cotton_guard:
  names:
    jp_kana: コットンガード
    jp_kanji: コットンガード
    en: Cotton Guard
    fr: Cotogarde
    it: Cotonscudo
    de: Watteschild
    es: Rizo Algodón
    ko: 코튼가드
    zh_simp: 棉花防守
    zh_trad: 棉花防守
  descriptions:
    jp_kana: "フワフワの　わたげで　じぶんの\nからだを　つつみこんで　まもる。\nぼうぎょを　ぐぐーんと　あげる。"
    jp_kanji: "フワフワの　綿毛で　自分の\n体を　包みこんで　守る。\n防御を　ぐぐーんと　あげる。"
    en: "The user protects itself by wrapping its body in soft\ncotton, which drastically raises the user’s\nDefense stat."
    fr: "Le lanceur se protège en s’emmitouflant dans du\ncoton. Sa Défense augmente énormément."
    it: "Chi la usa avvolge il proprio corpo con del cotone\nmolto morbido, proteggendosi e aumentando\nmoltissimo la propria Difesa."
    de: "Anwender schützt sich, indem er sich in einen\nluftigen Flaum hüllt. Erhöht die Verteidigung\ndrastisch."
    es: "Cubre al Pokémon con una madeja protectora.\nAumenta muchísimo la Defensa."
    ko: "푹신푹신한 솜털로 자신의\n몸을 둘러싸서 지킨다.\n방어를 매우 크게 올린다."
    zh_simp: "用软绵绵的绒毛包裹住\n自己的身体进行守护。\n巨幅提高自己的防御。"
    zh_trad: "用軟綿綿的絨毛\n保護自己的身體。\n極大幅提高自己的防禦。"
cotton_spore:
  names:
    jp_kana: わたほうし
    jp_kanji: わたほうし
    en: Cotton Spore
    fr: Spore Coton
    it: Cottonspora
    de: Baumwollsaat
    es: Esporagodón
    ko: 목화포자
    zh_simp: 棉孢子
    zh_trad: 棉孢子
  descriptions:
    jp_kana: "わたのような　フワフワの　ほうしを\nまとわり　つかせて\nあいての　すばやさを　がくっと　さげる。"
    jp_kanji: "綿のような　フワフワの　胞子を\nまとわり　つかせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user releases cotton-like spores that cling to\nthe opposing Pokémon, which harshly lowers their\nSpeed stat."
    fr: "Le lanceur libère des spores cotonneuses qui\ncollent à l’ennemi et baissent beaucoup sa Vitesse."
    it: "Rilascia spore simili al cotone che si attaccano\nai nemici nei paraggi e ne riducono di molto\nla Velocità."
    de: "Wattebäusche heften sich an das Ziel.\nDer Initiative-Wert sinkt stark."
    es: "Adhiere esporas a los rivales para reducir mucho su \nVelocidad."
    ko: "솜처럼 폭신폭신한 포자를\n착 달라붙게 해서\n상대의 스피드를 크게 떨어뜨린다."
    zh_simp: "将棉花般柔软的孢子\n紧贴对手，\n从而大幅降低对手的速度。"
    zh_trad: "將棉花般柔軟的孢子\n纏繞對手，\n大幅降低對手的速度。"
counter:
  names:
    jp_kana: カウンター
    jp_kanji: カウンター
    en: Counter
    fr: Riposte
    it: Contrattacco
    de: Konter
    es: Contraataque
    ko: 카운터
    zh_simp: 双倍奉还
    zh_trad: 雙倍奉還
  descriptions:
    jp_kana: "あいてから　うけた　ぶつり　こうげきの\nダメージを　２ばいに　して\nおなじ　あいてに　かえす。"
    jp_kanji: "相手から　受けた　物理攻撃の\nダメージを　２倍に　して\n同じ　相手に　返す。"
    en: "A retaliation move that counters any physical attack,\ninflicting double the damage taken."
    fr: "Une riposte qui répond à toute capacité physique\nen infligeant le double de dégâts."
    it: "Mossa che contrasta ogni attacco fisico,\narrecando il doppio del danno ricevuto."
    de: "Kontert physische Treffer und fügt dem Ziel das\nDoppelte des Schadens zu, den der Anwender\nerlitten hat."
    es: Devuelve un golpe físico por duplicado.
    ko: "상대로부터 받은 물리공격의\n데미지를 2배로 만들어\n같은 상대에게 돌려준다."
    zh_simp: "从对手那里受到\n物理攻击的伤害将以\n２倍返还给同一个对手。"
    zh_trad: "將來自對手的物理攻擊傷害加倍後，\n返還給該對手。"
covet:
  names:
    jp_kana: ほしがる
    jp_kanji: ほしがる
    en: Covet
    fr: Implore
    it: Supplica
    de: Bezirzer
    es: Antojo
    ko: 탐내다
    zh_simp: 渴望
    zh_trad: 渴望
  descriptions:
    jp_kana: "かわいく　あまえながら\nあいてに　ちかづき\nもっている　どうぐを　うばう。"
    jp_kanji: "かわいく　あまえながら\n相手に　ちかづき\n持っている　道具を　うばう。"
    en: "The user endearingly approaches the target, then\nsteals the target’s held item."
    fr: "Le lanceur s’approche de la cible avec un air\nangélique afin de dérober l’objet qu’elle tient."
    it: "Chi la usa attacca il bersaglio sorridendo e\ngli ruba lo strumento."
    de: "Der Anwender schmeichelt sich beim Ziel ein und\nstiehlt dann das von ihm getragene Item."
    es: "Se acerca con ternura al objetivo, pero le ataca \ny le roba el objeto que lleve."
    ko: "귀엽게 애교 부리며\n상대에게 다가가\n지니고 있는 도구를 뺏는다."
    zh_simp: "一边可爱地撒娇，\n一边靠近对手进行攻击，\n还能夺取对手携带的道具。"
    zh_trad: "一邊可愛地撒嬌，\n一邊靠近對手，\n奪取對手攜帶的道具。"
crabhammer:
  names:
    jp_kana: クラブハンマー
    jp_kanji: クラブハンマー
    en: Crabhammer
    fr: Pince-Masse
    it: Martellata
    de: Krabbhammer
    es: Martillazo
    ko: 찝게햄머
    zh_simp: 蟹钳锤
    zh_trad: 蟹鉗錘
  descriptions:
    jp_kana: "おおきな　ハサミを\nあいてに　たたきつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "大きな　ハサミを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is hammered with a large pincer. Critical\nhits land more easily."
    fr: "Une grande pince martèle l’ennemi.\nTaux de critique élevé."
    it: "Danneggia il bersaglio servendosi di una grande\ntenaglia. Probabile brutto colpo."
    de: Schlägt mit Schere zu. Hohe Volltrefferquote.
    es: "Golpea con fuerza con una pinza enorme.\nSuele ser crítico."
    ko: "큰 집게를\n상대에게 내리쳐서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用大钳子\n敲打对手进行攻击。\n容易击中要害。"
    zh_trad: "用巨大的鉗子\n敲打對手進行攻擊。\n容易擊中要害。"
crafty_shield:
  names:
    jp_kana: トリックガード
    jp_kanji: トリックガード
    en: Crafty Shield
    fr: Vigilance
    it: Truccodifesa
    de: Trickschutz
    es: Truco Defensa
    ko: 트릭가드
    zh_simp: 戏法防守
    zh_trad: 戲法防守
  descriptions:
    jp_kana: "ふしぎな　ちからを　つかって\nみかたへの　へんかわざを　ふせぐ。\nダメージわざは　うけてしまう。"
    jp_kanji: "不思議な　力を　使って\n味方への　変化技を　防ぐ。\nダメージ技は　受けてしまう。"
    en: "The user protects itself and its allies from status\nmoves with a mysterious power. This does not stop\nmoves that do damage."
    fr: "Utilise une force mystérieuse pour protéger\nl’équipe des capacités de statut. Ne protège\npas des autres capacités."
    it: "Grazie a un misterioso potere, protegge chi la usa\ne gli alleati dalle mosse di stato. È tuttavia\ninefficace contro mosse che infliggono danni."
    de: "Schützt mit einer mysteriösen Macht seine\nMitstreiter und sich vor Status-Attacken, nicht\njedoch vor Attacken, die Schaden verursachen."
    es: "Usa unos misteriosos poderes para protegerse a sí \nmismo y a sus aliados de ataques de estado, pero\nno de otro tipo de ataques."
    ko: "이상한 힘을 사용하여\n같은 편을 공격하는 변화 기술을 막는다.\n데미지 기술은 받는다."
    zh_simp: "使用神奇的力量\n防住攻击我方的变化招式。\n但无法防住伤害招式的攻击。"
    zh_trad: "使用神奇的力量\n防禦住攻擊我方的變化招式。\n但無法防禦住攻擊招式的攻擊。"
cross_chop:
  names:
    jp_kana: クロスチョップ
    jp_kanji: クロスチョップ
    en: Cross Chop
    fr: Coup-Croix
    it: Incrocolpo
    de: Kreuzhieb
    es: Tajo Cruzado
    ko: 크로스촙
    zh_simp: 十字劈
    zh_trad: 十字劈
  descriptions:
    jp_kana: "りょうて　チョップを\nあいてに　たたきつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "両手チョップを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user delivers a double chop with its forearms\ncrossed. Critical hits land more easily."
    fr: "Le lanceur délivre un coup double en croisant\nles avant-bras. Taux de critique élevé."
    it: "Investe il bersaglio con un colpo sferrato\ncon entrambe le braccia incrociate.\nProbabile brutto colpo."
    de: "Doppelter Hieb mit den Unterarmen.\nHohe Volltrefferquote."
    es: Corte doble que suele propinar un golpe crítico.
    ko: "양손으로 당수를\n상대에게 힘껏 쳐서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用两手呈十字\n劈打对手进行攻击。\n容易击中要害。"
    zh_trad: "用左右手刀\n劈打對手進行攻擊。\n容易擊中要害。"
cross_poison:
  names:
    jp_kana: クロスポイズン
    jp_kanji: クロスポイズン
    en: Cross Poison
    fr: Poison-Croix
    it: Velenocroce
    de: Giftstreich
    es: Veneno X
    ko: 크로스포이즌
    zh_simp: 十字毒刃
    zh_trad: 十字毒刃
  descriptions:
    jp_kana: "どくの　やいばで　あいてを　きりさく。\nどく　じょうたいに　することが　あり\nきゅうしょにも　あたりやすい。"
    jp_kanji: "毒の　刃で　相手を　切り裂く。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "A slashing attack with a poisonous blade that may\nalso poison the target. Critical hits land more easily."
    fr: "Un coup tranchant qui peut empoisonner l’ennemi.\nTaux de critique élevé."
    it: "Attacco con zanne avvelenate che può anche\navvelenare il Pokémon colpito. Probabile\nbrutto colpo."
    de: "Ein schneidender Hieb, der das Ziel eventuell\nvergiftet. Hat eine hohe Volltrefferquote."
    es: "Tajo que puede envenenar al objetivo. Suele ser \ncrítico."
    ko: "독 칼날로 상대를 베어 가른다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
    zh_simp: "用毒刃劈开对手。\n有时会让对手陷入中毒状态，\n也容易击中要害。"
    zh_trad: "用毒刃劈開對手。\n有時會讓對手陷入中毒狀態，\n也容易擊中要害。"
crunch:
  names:
    jp_kana: かみくだく
    jp_kanji: かみくだく
    en: Crunch
    fr: Mâchouille
    it: Sgranocchio
    de: Knirscher
    es: Triturar
    ko: 깨물어부수기
    zh_simp: 咬碎
    zh_trad: 咬碎
  descriptions:
    jp_kana: "するどい　はで　あいてを　かみくだいて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "鋭い　歯で\n相手を　かみくだいて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user crunches up the target with sharp fangs.\nThis may also lower the target’s Defense stat."
    fr: "Le lanceur mord l’ennemi de ses crocs pointus.\nPeut aussi baisser sa Défense."
    it: "Il bersaglio viene morso con denti affilati.\nPuò anche ridurne la Difesa."
    de: "Beißt mit scharfen Reißzähnen zu und senkt\neventuell die Verteidigung."
    es: "Tritura con afilados colmillos y puede bajar la\nDefensa del objetivo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用利牙咬碎对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用尖銳的牙齒咬碎對手進行攻擊。\n有時會降低對手的防禦。"
crush_claw:
  names:
    jp_kana: ブレイククロー
    jp_kanji: ブレイククロー
    en: Crush Claw
    fr: Éclate Griffe
    it: Tritartigli
    de: Zermalmklaue
    es: Garra Brutal
    ko: 브레이크크루
    zh_simp: 撕裂爪
    zh_trad: 撕裂爪
  descriptions:
    jp_kana: "かたく　するどい　ツメで　きりさいて\nこうげきする。あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬く　鋭い　ツメで\n切り裂いて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user slashes the target with hard and sharp\nclaws. This may also lower the target’s Defense stat."
    fr: "Lacère l’ennemi avec des griffes solides et\naiguisées. Peut aussi baisser sa Défense."
    it: "Colpisce il bersaglio con artigli robusti e affilati\nche possono ridurne la Difesa."
    de: "Angriff mit scharfen Klauen. Senkt eventuell den\nVerteidigungs-Wert."
    es: "Hace trizas al objetivo con garras afiladas y puede \nbajar su Defensa."
    ko: "단단하고 날카로운 손톱으로\n베어 갈라서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用坚硬的锐爪\n劈开对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用堅硬的銳爪\n撕裂對手進行攻擊。\n有時會降低對手的防禦。"
crush_grip:
  names:
    jp_kana: にぎりつぶす
    jp_kanji: にぎりつぶす
    en: Crush Grip
    fr: Presse
    it: Sbriciolmano
    de: Quetschgriff
    es: Agarrón
    ko: 묵사발
    zh_simp: 捏碎
    zh_trad: 捏碎
  descriptions:
    jp_kana: "すさまじい　ちからで　あいてを　にぎり\nつぶす。あいての　ＨＰが　のこっている\nほど　いりょくが　あがる。"
    jp_kanji: "すさまじい　力で　相手を　にぎりつぶす。\n相手の　ＨＰが　残っているほど\n威力が　あがる。"
    en: "The target is crushed with great force. The more HP\nthe target has left, the greater this move’s power."
    fr: "Une force puissante écrase l’ennemi. Plus il lui\nreste de PV et plus l’attaque est puissante."
    it: "Colpisce il bersaglio con grande forza. Più PS\nha il Pokémon colpito, maggiore è la potenza\ndella mossa."
    de: "Ziel wird mit großer Kraft getroffen. Je höher die KP\ndes Zieles, desto stärker die Attacke."
    es: "Estruja al objetivo con gran fuerza. Cuantos más \nPS le queden al objetivo, más fuerte será el\nataque."
    ko: "굉장한 힘으로 상대를 묵사발로\n만든다. 상대의 HP가 남아 있을수록\n위력이 올라간다."
    zh_simp: "用骇人的力量捏碎对手。\n对手的ＨＰ越多，\n威力越大。"
    zh_trad: "用驚人的力量捏碎對手。\n對手現有的ＨＰ越多，\n招式的威力越大。"
curse:
  names:
    jp_kana: のろい
    jp_kanji: のろい
    en: Curse
    fr: Malédiction
    it: Maledizione
    de: Fluch
    es: Maldición
    ko: 저주
    zh_simp: 诅咒
    zh_trad: 詛咒
  descriptions:
    jp_kana: "つかう　ポケモンが\nゴーストタイプと　それいがい　とでは\nこうかが　かわる。"
    jp_kanji: "使う　ポケモンが\nゴーストタイプと　それ以外　とでは\n効果が　変わる。"
    en: "A move that works differently for the Ghost type\nthan for all other types."
    fr: "Une capacité à l’effet différent selon que le\nlanceur est un Pokémon Spectre ou non."
    it: "Una mossa che agisce in modo diverso\nse chi la usa è di tipo Spettro."
    de: "Attacke, deren Wirkung davon abhängt, ob der\nAnwender ein Geister-Pokémon ist."
    es: "Un movimiento que tiene efectos distintos si el \nusuario es de tipo Fantasma o no."
    ko: "기술을 쓰는 포켓몬이\n고스트타입일 때와 그 이외의\n타입일 때는 효과가 다르다."
    zh_simp: "使用该招式的宝可梦，\n其属性是幽灵属性或其他属性时，\n效果会不一样。"
    zh_trad: "使用詛咒時，\n幽靈屬性的寶可夢和其他屬性的寶可夢，\n會獲得不同的招式效果。"
cut:
  names:
    jp_kana: いあいぎり
    jp_kanji: いあいぎり
    en: Cut
    fr: Coupe
    it: Taglio
    de: Zerschneider
    es: Corte
    ko: 풀베기
    zh_simp: 居合斩
    zh_trad: 居合斬
  descriptions:
    jp_kana: "カマや　ツメなどで\nあいてを　きりつけて　こうげきする。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。"
    en: The target is cut with a scythe or claw.
    fr: Coupe l’ennemi avec des lames ou des griffes.
    it: Attacca il bersaglio con artigli o falci affilate.
    de: Ein Basisangriff mit Schere oder Klaue.
    es: Corta al adversario con garras, guadañas, etc.
    ko: "낫이나 발톱 등으로\n상대를 베어 공격한다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。"
dark_pulse:
  names:
    jp_kana: あくのはどう
    jp_kanji: あくのはどう
    en: Dark Pulse
    fr: Vibrobscur
    it: Neropulsar
    de: Finsteraura
    es: Pulso Umbrío
    ko: 악의파동
    zh_simp: 恶之波动
    zh_trad: 惡之波動
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with dark\nthoughts. This may also make the target flinch."
    fr: "Le lanceur dégage une horrible aura chargée\nd’idées noires. Peut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di oscuri\npensieri. Può anche far tentennare il Pokémon\ncolpito."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos \ny puede hacer retroceder al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
dark_void:
  names:
    jp_kana: ダークホール
    jp_kanji: ダークホール
    en: Dark Void
    fr: Trou Noir
    it: Vuototetro
    de: Schlummerort
    es: Brecha Negra
    ko: 다크홀
    zh_simp: 暗黑洞
    zh_trad: 暗黑洞
  descriptions:
    jp_kana: "あんこくの　せかいに　ひきずり　おとして\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "暗黒の　世界に　ひきずり　落として\n相手を　眠り状態に　する。"
    en: "Opposing Pokémon are dragged into a world of total\ndarkness that makes them sleep."
    fr: "L’ennemi est plongé dans les ténèbres.\nIl tombe dans un profond sommeil."
    it: "Trascina i nemici intorno in un mondo\ndi totale oscurità e li fa addormentare."
    de: "Das Ziel wird in eine Welt der Dunkelheit gezogen\nund in Schlaf versetzt."
    es: "El objetivo es enviado a un mundo de tinieblas \nque lo hace dormir."
    ko: "암흑의 세계로 끌고 가서 떨어뜨려\n상대를 잠듦 상태로 만든다."
    zh_simp: "将对手强制拖入黑暗的世界，\n从而让对手陷入睡眠状态。"
    zh_trad: "將對手強制拉進黑暗的世界，\n讓對手陷入睡眠狀態。"
darkest_lariat:
  names:
    jp_kana: ＤＤラリアット
    jp_kanji: ＤＤラリアット
    en: Darkest Lariat
    fr: Dark Lariat
    it: Braccioteso
    de: Dark Lariat
    es: Lariat Oscuro
    ko: DD래리어트
    zh_simp: ＤＤ金勾臂
    zh_trad: ＤＤ金勾臂
  descriptions:
    jp_kana: "りょううでを　まわし　あいてに　あてる。\nあいての　のうりょく　へんかに\nかんけいなく　ダメージを　あたえる。"
    jp_kanji: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user swings both arms and hits the target.\nThe target’s stat changes don’t affect this\nattack’s damage."
    fr: "Le Pokémon étend les bras et frappe l’adversaire\nen tournant violemment. Inflige des dégâts et ignore\nles changements de stats de la cible."
    it: "Chi la usa attacca il bersaglio mulinando gli arti.\nIl danno inflitto ignora le modifiche alle statistiche\ndel bersaglio."
    de: "Der Anwender wirbelt mit beiden Armen und prallt\nso auf das Ziel. Richtet unabhängig von den\nStatusveränderungen des Zieles Schaden an."
    es: "Gira sobre sí mismo y golpea al oponente con ambos\nbrazos. Ignora los cambios en las características del\nobjetivo."
    ko: "양팔을 돌려 상대에 부딪친다.\n상대의 능력 변화에\n상관없이 데미지를 준다."
    zh_simp: "旋转双臂打向对手。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "旋轉雙臂並打向對手。\n可不顧對手的能力變化\n給予傷害。"
dazzling_gleam:
  names:
    jp_kana: マジカルシャイン
    jp_kanji: マジカルシャイン
    en: Dazzling Gleam
    fr: Éclat Magique
    it: Magibrillio
    de: Zauberschein
    es: Brillo Mágico
    ko: 매지컬샤인
    zh_simp: 魔法闪耀
    zh_trad: 魔法閃耀
  descriptions:
    jp_kana: "きょうりょくな　ひかりを　はなち\nあいてに　ダメージを　あたえる。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Libère une puissante décharge lumineuse qui inflige\ndes dégâts à l’ennemi."
    it: "Chi la usa emette una luce potentissima che\ninfligge danni ai nemici intorno."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder dem Ziel Schaden zufügt."
    es: Inflige daño a los oponentes con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
defend_order:
  names:
    jp_kana: ぼうぎょしれい
    jp_kanji: ぼうぎょしれい
    en: Defend Order
    fr: Appel Défense
    it: Comandoscudo
    de: Blockbefehl
    es: A Defender
    ko: 방어지령
    zh_simp: 防御指令
    zh_trad: 防禦指令
  descriptions:
    jp_kana: "しもべを　よびだして　じぶんの　からだに\nおおい　つかせる。ぼうぎょと　とくぼうを\nあげることが　できる。"
    jp_kanji: "しもべを　呼びだして　自分の　体に\nおおい　つかせる。防御と　特防を\nあげることが　できる。"
    en: "The user calls out its underlings to shield its body,\nraising its Defense and Sp. Def stats."
    fr: "Le lanceur appelle ses sous-fifres pour former un\nbouclier qui augmente sa Défense et sa Défense\nSpéciale."
    it: "Chi la usa raduna i suoi sgherri per creare\nuno scudo, aumentando Difesa e Difesa Speciale."
    de: "Untergebene bilden einen lebenden Schild um\nden Anwender. Erhöht Verteidigung und\nSpezial-Verteidigung."
    es: "El usuario llama a sus súbditos para que formen\nun escudo viviente. Sube la Defensa y la Defensa \nEspecial."
    ko: "부하를 불러내어 자신의 몸을\n뒤덮게 한다. 방어와 특수방어를\n올릴 수 있다."
    zh_simp: "召唤手下，\n让其附在自己的身体上。\n可以提高自己的防御和特防。"
    zh_trad: "呼喚手下，覆蓋住自己的身體。\n可提高自己的防禦和特防。"
defense_curl:
  names:
    jp_kana: まるくなる
    jp_kanji: まるくなる
    en: Defense Curl
    fr: Boul’Armure
    it: Ricciolscudo
    de: Einigler
    es: Rizo Defensa
    ko: 웅크리기
    zh_simp: 变圆
    zh_trad: 變圓
  descriptions:
    jp_kana: "からだを　まるめて　ちぢこまり\nじぶんの　ぼうぎょを　あげる。"
    jp_kanji: "体を　まるめて　ちぢこまり\n自分の　防御を　あげる。"
    en: "The user curls up to conceal weak spots and raise\nits Defense stat."
    fr: "Le lanceur s’enroule pour cacher ses points\nfaibles, ce qui augmente sa Défense."
    it: "Chi la usa si raggomitola per nascondere\ni punti deboli e aumentare la propria Difesa."
    de: "Verbirgt Schwächen durch Einrollen und hebt\ngleichzeitig den Verteidigungs-Wert."
    es: "Se enrosca para ocultar sus puntos débiles y\naumentar la Defensa."
    ko: "몸을 둥글게 웅크려서\n자신의 방어를 올린다."
    zh_simp: "将身体蜷曲变圆，\n从而提高自己的防御。"
    zh_trad: "將身體蜷縮成圓形，\n提高自己的防禦。"
defog:
  names:
    jp_kana: きりばらい
    jp_kanji: きりばらい
    en: Defog
    fr: Anti-Brume
    it: Scacciabruma
    de: Auflockern
    es: Despejar
    ko: 안개제거
    zh_simp: 清除浓雾
    zh_trad: 清除濃霧
  descriptions:
    jp_kana: "つよいかぜで　あいての　リフレクターや\nひかりのかべ　などを　はらいのける。\nかいひりつも　さげる。"
    jp_kanji: "強い風で　相手の　リフレクターや\nひかりのかべ　などを　はらいのける。\n回避率も　さげる。"
    en: "A strong wind blows away the target’s barriers such\nas Reflect or Light Screen. This also lowers the\ntarget’s evasiveness."
    fr: "Un grand coup de vent qui disperse la Protection\nou le Mur Lumière de l’ennemi. Diminue aussi\nson Esquive."
    it: "Chi la usa spazza via barriere come Riflesso e\nSchermoluce con un forte vento e riduce\nla capacità d’elusione del bersaglio."
    de: "Starker Wind hebt Attacken wie Reflektor und\nLichtschild des Zieles auf. Senkt außerdem den\nFluchtwert."
    es: "Potente viento que barre el Reflejo o Pantalla de Luz \ndel objetivo y puede reducir su Evasión."
    ko: "강한 바람으로 상대의 리플렉터나\n빛의장막 등을 제거한다.\n회피율도 떨어뜨린다."
    zh_simp: "用强风吹开对手的\n反射壁或光墙等。\n也会降低对手的闪避率。"
    zh_trad: "用強風吹開對手的\n反射壁或光牆等。\n也會降低對手的閃避率。"
destiny_bond:
  names:
    jp_kana: みちづれ
    jp_kanji: みちづれ
    en: Destiny Bond
    fr: Prélèvem. Destin
    it: Destinobbligato
    de: Abgangsbund
    es: Mismo Destino
    ko: 길동무
    zh_simp: 同命
    zh_trad: 同命
  descriptions:
    jp_kana: "わざのあと　あいての　こうげきで　ひんしに\nなると　こうげき　あいても　ひんしにする。\nれんぞくして　だすと　しっぱいする。"
    jp_kanji: "技のあと　相手の　攻撃で　ひんしに\nなると　攻撃　相手も　ひんしにする。\n連続して　出すと　失敗する。"
    en: "After using this move, if the user faints, the\nPokémon that landed the knockout hit also faints.\nIts chance of failing rises if it is used in succession."
    fr: "Quand cette capacité est activée, elle met K.O.\nun ennemi qui porte un coup fatal au lanceur.\nElle échoue si elle est réutilisée après activation."
    it: "Se chi la usa va KO prima del turno successivo,\nchi ha sferrato il colpo da KO fa la stessa fine.\nSe usata in successione fallisce."
    de: "Wird der Anwender nach Einsatz dieser Attacke\nkampfunfähig, führt dies auch beim Pokémon, das\nihn besiegt hat, zum K.O. Scheitert bei Wiederholung."
    es: "Si el usuario se debilita por un ataque rival antes de\nusar otro movimiento, el Pokémon rival se debilitará\ntambién. Puede fallar si se usa repetidamente."
    ko: "기술을 쓴 뒤 상대의 공격으로 기절했을 때\n공격 상대도 기절하게 한다.\n연속으로 쓰면 실패한다."
    zh_simp: "使出招式后，当受到对手攻击\n陷入濒死时，对手也会一同濒死。\n连续使出则会失败。"
    zh_trad: "使出招式後，當受到對手攻擊\n陷入瀕死時，對手也會一同陷入瀕死。\n連續使用時會失敗。"
detect:
  names:
    jp_kana: みきり
    jp_kanji: みきり
    en: Detect
    fr: Détection
    it: Individua
    de: Scanner
    es: Detección
    ko: 판별
    zh_simp: 看穿
    zh_trad: 看穿
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "Enables the user to evade all attacks. Its chance of\nfailing rises if it is used in succession."
    fr: "Le lanceur esquive toutes les attaques.\nLe risque d’échec augmente lorsque la capacité\nest utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender weicht jeder Attacke aus.\nScheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa \nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
devastating_drake:physical:
  names:
    jp_kana: アルティメットドラゴンバーン
    jp_kanji: アルティメットドラゴンバーン
    en: Devastating Drake
    fr: Chaos Draconique
    it: Dragoschianto Finale
    de: Drastisches Drachendröhnen
    es: Dracoaliento Devastador
    ko: 얼티메이트드래곤번
    zh_simp: 究极巨龙震天地
    zh_trad: 究極巨龍震天地
  descriptions:
    jp_kana: "Ｚパワーで　オーラを　じったいかし\nぜんりょくで　あいてに　おそいかかる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　オーラを　実体化し\n全力で　相手に　襲いかかる。\n元になった　技で　威力が　変わる。"
    en: "The user materializes its aura using its Z-Power and\nattacks the target with full force. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour matérialiser\nson aura et assaillir l’adversaire. La puissance varie\nselon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa materializza la propria\naura per colpire con forza il nemico. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Der Anwender materialisiert durch Z-Kraft seine\nAura und greift damit das Ziel an. Die Stärke variiert\nje nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para materializar su\naura y golpear al objetivo. Su potencia depende de\nla del movimiento original."
    ko: "Z파워로 오라를 실체화시켜\n전력으로 상대를 공격한다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量将气场实体化，\n向对手全力发动袭击。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量將氣場實體化，\n向對手全力發動襲擊。\n威力會隨原本的招式而改變。"
devastating_drake:special:
  names:
    jp_kana: アルティメットドラゴンバーン
    jp_kanji: アルティメットドラゴンバーン
    en: Devastating Drake
    fr: Chaos Draconique
    it: Dragoschianto Finale
    de: Drastisches Drachendröhnen
    es: Dracoaliento Devastador
    ko: 얼티메이트드래곤번
    zh_simp: 究极巨龙震天地
    zh_trad: 究極巨龍震天地
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
diamond_storm:
  names:
    jp_kana: ダイヤストーム
    jp_kanji: ダイヤストーム
    en: Diamond Storm
    fr: Orage Adamantin
    it: Diamantempesta
    de: Diamantsturm
    es: Torm. Diamantes
    ko: 다이아스톰
    zh_simp: 钻石风暴
    zh_trad: 鑽石風暴
  descriptions:
    jp_kana: "ダイヤの　あらしを　まきおこし\nダメージを　あたえる。　じぶんの\nぼうぎょを　ぐーんと　あげることが　ある。"
    jp_kanji: "ダイヤの　嵐を　巻き起こし\nダメージを　与える。　自分の\n防御を　ぐーんと　あげることが　ある。"
    en: "The user whips up a storm of diamonds to damage\nopposing Pokémon. This may also sharply raise the\nuser’s Defense stat."
    fr: "Provoque une tempête de diamants qui\ninflige des dégâts. Peut beaucoup augmenter\nla Défense du lanceur."
    it: "Colpisce i nemici che ha intorno con una tempesta\ndi diamanti. Può anche aumentare di molto la Difesa\ndi chi la usa."
    de: "Der Anwender beschwört einen zerstörerischen\nDiamantsturm herauf. Kann die Verteidigung des\nAnwenders stark erhöhen."
    es: "Desata un devastador vendaval de diamantes para \ndañar a los oponentes. Puede aumentar mucho la\nDefensa del usuario."
    ko: "다이아 폭풍을 일으켜\n데미지를 준다. 자신의\n방어를 크게 올릴 때가 있다."
    zh_simp: "掀起钻石风暴给予伤害。\n有时会大幅提高自己的防御。"
    zh_trad: "吹起鑽石風暴給予對手傷害。\n有時會大幅提高自己的防禦。"
dig:
  names:
    jp_kana: あなをほる
    jp_kanji: あなをほる
    en: Dig
    fr: Tunnel
    it: Fossa
    de: Schaufler
    es: Excavar
    ko: 구멍파기
    zh_simp: 挖洞
    zh_trad: 挖洞
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nあいてを　こうげきする。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。"
    en: The user burrows, then attacks on the next turn.
    fr: "Le lanceur creuse au premier tour et frappe au\nsecond."
    it: "Chi la usa scava al primo turno e attacca\nal successivo."
    de: "In Runde 1 gräbt sich der Anwender ein und in\nRunde 2 greift er an."
    es: "Primer turno: cava. Segundo turno: ataca."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다."
    zh_simp: "第１回合钻入，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合潛入地底，\n並於第２回合攻擊對手。"
disable:
  names:
    jp_kana: かなしばり
    jp_kanji: かなしばり
    en: Disable
    fr: Entrave
    it: Inibitore
    de: Aussetzer
    es: Anulación
    ko: 사슬묶기
    zh_simp: 定身法
    zh_trad: 定身法
  descriptions:
    jp_kana: "あいての　うごきを　とめて\nちょくぜんに　だしていた　わざを\n４ターンの　あいだ　つかえなく　する。"
    jp_kanji: "相手の　動きを　とめて\n直前に　だしていた　技を\n４ターンの　間　使えなくする。"
    en: "For four turns, this move prevents the target from\nusing the move it last used."
    fr: "Empêche l’ennemi d’employer à nouveau\nsa dernière attaque. Dure quatre tours."
    it: "Per quattro turni impedisce al bersaglio\ndi riutilizzare l’ultima mossa usata."
    de: "Die zuletzt eingesetzte Attacke des Zieles wird für\nvier Runden blockiert."
    es: "Desactiva el último movimiento del objetivo durante \ncuatro turnos."
    ko: "상대의 움직임을 막아\n바로 전에 쓴 기술을\n4턴 동안 사용할 수 없게 만든다."
    zh_simp: "阻碍对手行动，\n之前使出的招式\n将在４回合内无法使用。"
    zh_trad: "阻止對手出招，\n最近一次使用的招式\n在４回合內無法使用。"
disarming_voice:
  names:
    jp_kana: チャームボイス
    jp_kanji: チャームボイス
    en: Disarming Voice
    fr: Voix Enjôleuse
    it: Incantavoce
    de: Säuselstimme
    es: Voz Cautivadora
    ko: 차밍보이스
    zh_simp: 魅惑之声
    zh_trad: 魅惑之聲
  descriptions:
    jp_kana: "みわくの　なきごえを　だして　あいてに\nせいしんてきな　ダメージを　あたえる。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "魅惑の　鳴き声を　だして　相手に\n精神的な　ダメージを　与える。\n攻撃は　必ず　命中　する。"
    en: "Letting out a charming cry, the user does emotional\ndamage to opposing Pokémon. This attack\nnever misses."
    fr: "Laisse s’échapper une voix enchanteresse qui\ninflige des dégâts psychiques à l’ennemi.\nTouche à coup sûr."
    it: "Chi la usa infligge un danno spirituale ai nemici nei\nparaggi con una voce suadente. L’attacco andrà\nimmancabilmente a segno."
    de: "Der Anwender stößt einen bezirzenden Ruf aus, mit\ndem er das Ziel in seinen Bann schlägt und ihm\nimmer mentalen Schaden zufügt."
    es: "Obnubila a los oponentes con su fascinante voz y \nles provoca daños emocionales. Siempre acierta\nal objetivo."
    ko: "매혹적인 울음소리를 내어\n상대에게 정신적 데미지를 준다.\n공격은 반드시 명중한다."
    zh_simp: "发出魅惑的叫声，\n给予对手精神上的伤害。\n攻击必定会命中。"
    zh_trad: "發出迷人的叫聲，\n給予對手精神上的傷害。\n攻擊必定會命中。"
discharge:
  names:
    jp_kana: ほうでん
    jp_kanji: ほうでん
    en: Discharge
    fr: Coup d’Jus
    it: Scarica
    de: Ladungsstoß
    es: Chispazo
    ko: 방전
    zh_simp: 放电
    zh_trad: 放電
  descriptions:
    jp_kana: "まばゆい　でんげきで　じぶんの\nまわりに　いるものを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "まばゆい　電撃で　自分の\n周りに　いるものを　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user strikes everything around it by letting loose\na flare of electricity. This may also cause paralysis."
    fr: "Un flamboiement d’électricité frappe tous les\nPokémon autour du lanceur. Peut aussi les paralyser."
    it: "Chi la usa colpisce i Pokémon che ha intorno\ncon un bagliore elettrico. Può anche paralizzarli."
    de: "Anwender greift die Pokémon in seiner Umgebung mit\nElektrizität an. Paralysiert eventuell."
    es: "Una deslumbradora onda eléctrica afecta a los\nPokémon que hay combatiendo alrededor. Puede \nparalizar."
    ko: "눈부신 전격으로 자신의\n주위에 있는 포켓몬을 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用耀眼的电击\n攻击自己周围所有的宝可梦。\n有时会陷入麻痹状态。"
    zh_trad: "用耀眼的電流\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入麻痺狀態。"
dive:
  names:
    jp_kana: ダイビング
    jp_kanji: ダイビング
    en: Dive
    fr: Plongée
    it: Sub
    de: Taucher
    es: Buceo
    ko: 다이빙
    zh_simp: 潜水
    zh_trad: 潛水
  descriptions:
    jp_kana: "１ターンめで　もぐり　２ターンめに\nうきあがって　こうげきする。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    en: "Diving on the first turn, the user floats up and\nattacks on the next turn."
    fr: "Le lanceur plonge sous l’eau au premier tour\net frappe au second."
    it: "Chi la usa si tuffa in acqua per emergere\ne attaccare al turno seguente."
    de: "Anwender taucht in Runde 1 ab und greift in\nRunde 2 aus der Tiefe an."
    es: "El usuario se sumerge en el primer turno\ny ataca en el segundo."
    ko: "1턴째에 잠수했다가 2턴째에\n떠올라 공격한다."
    zh_simp: "第１回合潜入，\n第２回合浮上来进行攻击。"
    zh_trad: "使用後的第１回合潛入水中，\n並於第２回合浮上來進行攻擊。"
dizzy_punch:
  names:
    jp_kana: ピヨピヨパンチ
    jp_kanji: ピヨピヨパンチ
    en: Dizzy Punch
    fr: Uppercut
    it: Stordipugno
    de: Irrschlag
    es: Puño Mareo
    ko: 잼잼펀치
    zh_simp: 迷昏拳
    zh_trad: 迷昏拳
  descriptions:
    jp_kana: "リズミカルに　パンチを　くりだして\nあいてを　こうげきする。\nこんらん　させることが　ある。"
    jp_kanji: "リズミカルに　パンチを　くりだして\n相手を　攻撃する。\n混乱させることが　ある。"
    en: "The target is hit with rhythmically launched\npunches. This may also leave the target confused."
    fr: "Un enchaînement de coups de poing cadencés\nfrappe l’ennemi. Peut aussi le rendre confus."
    it: "Colpisce il bersaglio con una sequenza di pugni\nche può anche confonderlo."
    de: Rhythmische Schläge, die das Ziel verwirren können.
    es: Rítmicos puñetazos que pueden causar confusión.
    ko: "리드미컬한 펀치를 날려\n상대를 공격한다.\n혼란시킬 때가 있다."
    zh_simp: "有节奏地出拳攻击对手。\n有时会使对手混乱。"
    zh_trad: "有節奏地出拳攻擊對手。\n有時會使對手混亂。"
doom_desire:
  names:
    jp_kana: はめつのねがい
    jp_kanji: はめつのねがい
    en: Doom Desire
    fr: Carnareket
    it: Obbliderio
    de: Kismetwunsch
    es: Deseo Oculto
    ko: 파멸의소원
    zh_simp: 破灭之愿
    zh_trad: 破滅之願
  descriptions:
    jp_kana: "わざを　つかった　２ターン　あとに\nむすうの　ひかりの　たばで\nあいてを　こうげきする。"
    jp_kanji: "技を　使った　２ターン後に\n無数の　光の　束で\n相手を　攻撃する。"
    en: "Two turns after this move is used, a concentrated\nbundle of light blasts the target."
    fr: "Le lanceur génère une sphère lumineuse qu’il\nprojette sur l’ennemi deux tours plus tard."
    it: "Intenso fascio di luce che colpisce il bersaglio\ndopo due turni dall’uso della mossa."
    de: "Angriff mit gebündeltem Licht erfolgt zwei Runden\nnach Attackeneinsatz."
    es: "Concentra un haz de luz y ataca dos turnos\ndespués."
    ko: "기술을 사용한 2턴 뒤에\n무수한 빛의 다발이\n상대를 공격한다."
    zh_simp: "使用招式２回合后，\n会用无数道光束攻击对手。"
    zh_trad: "使用招式的２回合後，\n向對手發射無數道光束\n進行攻擊。"
double_edge:
  names:
    jp_kana: すてみタックル
    jp_kanji: すてみタックル
    en: Double-Edge
    fr: Damoclès
    it: Sdoppiatore
    de: Risikotackle
    es: Doble Filo
    ko: 이판사판태클
    zh_simp: 舍身冲撞
    zh_trad: 捨身衝撞
  descriptions:
    jp_kana: "いのちを　かけて\nあいてに　とっしんして　こうげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "命を　懸けて\n相手に　突進して　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "A reckless, life-risking tackle. This also damages the\nuser quite a lot."
    fr: "Une charge dangereuse et imprudente.\nBlesse aussi gravement le lanceur."
    it: "Carica spietata e pericolosa che danneggia molto\nanche chi la usa."
    de: "Lebensgefährlicher Angriff, bei dem sich der\nAngreifer selbst verletzt."
    es: Ataque arriesgado que también hiere al agresor.
    ko: "목숨을 걸고\n상대에게 돌진하여 공격을 한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "拼命地猛撞向对手进行攻击。\n自己也会受到不小的伤害。"
    zh_trad: "捨身衝撞對手進行攻擊。\n自己也會受到不小的傷害。"
double_hit:
  names:
    jp_kana: ダブルアタック
    jp_kanji: ダブルアタック
    en: Double Hit
    fr: Coup Double
    it: Doppiosmash
    de: Doppelschlag
    es: Doble Golpe
    ko: 더블어택
    zh_simp: 二连击
    zh_trad: 二連擊
  descriptions:
    jp_kana: "しっぽなどを　つかい　あいてを　たたいて\nこうげきする。　２かい　れんぞくで\nダメージを　あたえる。"
    jp_kanji: "しっぽなどを　使い\n相手を　たたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user slams the target with a long tail, vines, or a\ntentacle. The target is hit twice in a row."
    fr: "Le lanceur frappe l’ennemi deux fois d’affilée à l’aide\nde sa queue, de lianes ou d’un autre membre."
    it: "Chi la usa colpisce il bersaglio due volte di fila\ncon la coda, una liana o simili."
    de: "Anwender trifft das Ziel mit dem Schweif oder\nÄhnlichem. Ziel wird doppelt getroffen."
    es: "Golpea al objetivo dos veces seguidas con la cola \nu otras partes de su cuerpo."
    ko: "꼬리 등을 써서\n상대를 때려 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "使用尾巴等\n拍打对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用尾巴等\n向對手進行攻擊。\n連續２次給予傷害。"
double_kick:
  names:
    jp_kana: にどげり
    jp_kanji: にどげり
    en: Double Kick
    fr: Double Pied
    it: Doppiocalcio
    de: Doppelkick
    es: Doble Patada
    ko: 두번치기
    zh_simp: 二连踢
    zh_trad: 二連踢
  descriptions:
    jp_kana: "２ほんの　あしで　あいてを　けとばして\nこうげきする。　２かい　れんぞくで\nダメージを　あたえる。"
    jp_kanji: "２本の　足で　相手を　けとばして\n攻撃する。　２回連続で\nダメージを　与える。"
    en: "The target is quickly kicked twice in succession\nusing both feet."
    fr: "Deux coups de pied qui frappent l’ennemi deux\nfois d’affilée."
    it: "Colpisce il bersaglio due volte con una raffica\ndi calci inferti con entrambi i piedi."
    de: Der Anwender tritt in einer Runde zweimal schnell zu.
    es: Una patada doble. Golpea dos veces.
    ko: "2개의 다리로 상대를 걷어차서\n공격한다. 2회 연속으로\n데미지를 준다."
    zh_simp: "用２只脚踢飞对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用２隻腳踢飛對手進行攻擊。\n連續２次給予傷害。"
double_slap:
  names:
    jp_kana: おうふくビンタ
    jp_kanji: おうふくビンタ
    en: Double Slap
    fr: Torgnoles
    it: Doppiasberla
    de: Duplexhieb
    es: Doble Bofetón
    ko: 연속뺨치기
    zh_simp: 连环巴掌
    zh_trad: 連環巴掌
  descriptions:
    jp_kana: "おうふく　ビンタで\nあいてを　たたいて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "おうふく　ビンタで\n相手を　たたいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The target is slapped repeatedly, back and forth,\ntwo to five times in a row."
    fr: "Gifle rapidement l’ennemi de deux à cinq fois\nd’affilée."
    it: "Schiaffeggia il bersaglio da due a cinque volte\ndi fila."
    de: "Trifft das Ziel zwei- bis fünfmal hintereinander mit\neinem Duplexhieb."
    es: Abofetea de dos a cinco veces seguidas.
    ko: "연속 뺨치기로\n상대를 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用连环巴掌\n拍打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用連環巴掌\n拍打對手進行攻擊。\n會連續攻擊２～５次。"
double_team:
  names:
    jp_kana: かげぶんしん
    jp_kanji: かげぶんしん
    en: Double Team
    fr: Reflet
    it: Doppioteam
    de: Doppelteam
    es: Doble Equipo
    ko: 그림자분신
    zh_simp: 影子分身
    zh_trad: 影子分身
  descriptions:
    jp_kana: "すばやい　うごきで　ぶんしんを　つくり\nあいてを　まどわせて\nかいひりつを　あげる。"
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes illusory copies of\nitself to raise its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée des copies\nillusoires de lui-même, augmentant son Esquive."
    it: "Chi la usa si muove in fretta e crea copie illusorie\ndi se stesso che aumentano la capacità di elusione."
    de: "Erzeugt durch schnelle Bewegungen Ebenbilder,\num den Fluchtwert zu erhöhen."
    es: Crea copias de sí mismo para mejorar la Evasión.
    ko: "재빠른 움직임으로 분신을 만들어\n상대를 혼란시켜\n회피율을 올린다."
    zh_simp: "通过快速移动来制造分身，\n扰乱对手，从而提高闪避率。"
    zh_trad: "利用快速移動\n製造出分身擾亂對手，\n提高自己的閃避率。"
draco_meteor:
  names:
    jp_kana: りゅうせいぐん
    jp_kanji: りゅうせいぐん
    en: Draco Meteor
    fr: Draco Météore
    it: Dragobolide
    de: Draco Meteor
    es: Cometa Draco
    ko: 용성군
    zh_simp: 流星群
    zh_trad: 流星群
  descriptions:
    jp_kana: "てんくうから　いんせきを\nあいてに　おとす。つかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "天空から　隕石を\n相手に　落とす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "Comets are summoned down from the sky onto the\ntarget. The attack’s recoil harshly lowers the user’s\nSp. Atk stat."
    fr: "Le lanceur invoque des comètes.\nLe contrecoup réduit beaucoup son Attaque\nSpéciale."
    it: "Attacca con meteore che cadono dal cielo.\nIl contraccolpo fa calare di molto\nl’Attacco Speciale di chi la usa."
    de: "Kometen werden heraufbeschworen. Der Rückstoß\nreduziert den Spezial-Angriff des Anwenders stark."
    es: "Hace que grandes cometas caigan del cielo sobre \nel objetivo. Baja mucho el Ataque Especial del que \nlo usa."
    ko: "천공에서 운석을 상대에게\n떨어뜨린다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "从天空中向对手落下陨石。\n使用之后因为反作用力，\n自己的特攻会大幅降低。"
    zh_trad: "讓隕石從空中落下以攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
dragon_ascent:
  names:
    jp_kana: ガリョウテンセイ
    jp_kanji: ガリョウテンセイ
    en: Dragon Ascent
    fr: Draco Ascension
    it: Ascesa del Drago
    de: Zenitstürmer
    es: Ascenso Draco
    ko: 화룡점정
    zh_simp: 画龙点睛
    zh_trad: 畫龍點睛
  descriptions:
    jp_kana: "おおぞらから　きゅうそくらっか　して\nあいてを　こうげきする。\nじぶんの　ぼうぎょと　とくぼうが　さがる。"
    jp_kanji: "大空から　急速落下　して\n相手を　攻撃する。\n自分の　防御と　特防が　さがる。"
    en: "After soaring upward, the user attacks its target by\ndropping out of the sky at high speeds. But it lowers\nits own Defense and Sp. Def stats in the process."
    fr: "Le Pokémon s’abat à toute vitesse sur la cible\ndepuis les hautes couches de l’atmosphère.\nBaisse la Défense et la Défense Spéciale du lanceur."
    it: "Permette di proiettarsi in aria e fiondarsi\nsul bersaglio attaccando ad altissima velocità.\nRiduce la Difesa e la Difesa Speciale di chi la usa."
    de: "Der Anwender greift das Ziel aus atemberaubender\nHöhe im Sturzflug an. Senkt Verteidigung und\nSpezial-Verteidigung des Anwenders."
    es: "El usuario se precipita desde el cielo a una velocidad \nde vértigo para atacar al objetivo, pero hace que\nbajen la Defensa y la Defensa Especial del usuario."
    ko: "넓은 하늘에서 급속으로 강하하여\n상대를 공격한다.\n자신의 방어와 특수방어가 떨어진다."
    zh_simp: "从天空中急速下降攻击对手。\n自己的防御和特防会降低。"
    zh_trad: "從天空中急速下降攻擊對手。\n自己的防禦和特防會降低。"
dragon_breath:
  names:
    jp_kana: りゅうのいぶき
    jp_kanji: りゅうのいぶき
    en: Dragon Breath
    fr: Dracosouffle
    it: Dragospiro
    de: Feuerodem
    es: Dragoaliento
    ko: 용의숨결
    zh_simp: 龙息
    zh_trad: 龍息
  descriptions:
    jp_kana: "ものすごい　いきを\nあいてに　ふきつけて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "ものすごい　息を\n相手に　吹きつけて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user exhales a mighty gust that inflicts damage.\nThis may also leave the target with paralysis."
    fr: "Le lanceur souffle fort sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Investe il bersaglio con una raffica potentissima\nche arreca danni. Può anche paralizzarlo."
    de: "Fegt das Ziel mit zerstörerisch heißem Atem weg.\nParalysiert das Ziel eventuell."
    es: "Poderosa ráfaga de aliento que golpea al objetivo y \npuede paralizarlo."
    ko: "굉장한 숨결을\n상대에게 내뿜어 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "将强烈的气息\n吹向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "將強烈的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
dragon_claw:
  names:
    jp_kana: ドラゴンクロー
    jp_kanji: ドラゴンクロー
    en: Dragon Claw
    fr: Dracogriffe
    it: Dragartigli
    de: Drachenklaue
    es: Garra Dragón
    ko: 드래곤크루
    zh_simp: 龙爪
    zh_trad: 龍爪
  descriptions:
    jp_kana: "するどく　とがった　きょだいな　ツメで\nあいてを　きりさいて　こうげきする。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: The user slashes the target with huge sharp claws.
    fr: "Le lanceur lacère l’ennemi de ses grandes griffes\naiguisées."
    it: "Chi la usa attacca con artigli affilati che graffiano\nil bersaglio rapidamente e con grande forza."
    de: "Das Ziel wird mit riesigen, scharfen Klauen stark\nverletzt."
    es: Araña al objetivo con garras afiladas.
    ko: "날카롭고 뾰족한 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。"
dragon_dance:
  names:
    jp_kana: りゅうのまい
    jp_kanji: りゅうのまい
    en: Dragon Dance
    fr: Danse Draco
    it: Dragodanza
    de: Drachentanz
    es: Danza Dragón
    ko: 용의춤
    zh_simp: 龙之舞
    zh_trad: 龍之舞
  descriptions:
    jp_kana: "しんぴてきで　ちからづよい　まいを\nはげしく　おどる。　じぶんの\nこうげきと　すばやさを　あげる。"
    jp_kanji: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    en: "The user vigorously performs a mystic, powerful\ndance that raises its Attack and Speed stats."
    fr: "Une danse mystique dont le rythme effréné\naugmente l’Attaque et la Vitesse du lanceur."
    it: "Danza mistica e vigorosa che aumenta l’Attacco\ne la Velocità di chi la usa."
    de: "Ein mystischer Tanz, der den Angriffs- und\nInitiative-Wert erhöht."
    es: Danza mística que sube el Ataque y la Velocidad.
    ko: "신비롭고 힘센 춤을\n격렬하게 춘다. 자신의\n공격과 스피드를 올린다."
    zh_simp: "激烈地跳起神秘\n且强有力的舞蹈。\n从而提高自己的攻击和速度。"
    zh_trad: "激烈地跳起神秘又強而有力的舞蹈。\n提高自己的攻擊和速度。"
dragon_hammer:
  names:
    jp_kana: ドラゴンハンマー
    jp_kanji: ドラゴンハンマー
    en: Dragon Hammer
    fr: Draco-Marteau
    it: Marteldrago
    de: Drachenhammer
    es: Martillo Dragón
    ko: 드래곤해머
    zh_simp: 龙锤
    zh_trad: 龍錘
  descriptions:
    jp_kana: "からだを　ハンマーのように\nつかって　あいてに　おそいかかり\nダメージを　あたえる。"
    jp_kanji: "体を　ハンマーのように\n使って　相手に　襲いかかり\nダメージを　与える。"
    en: "The user uses its body like a hammer to attack the\ntarget and inflict damage."
    fr: "Le lanceur utilise son corps comme un véritable\nmarteau pour écraser la cible."
    it: "Chi la usa infligge danni al bersaglio usando\nil proprio corpo come se fosse un martello."
    de: "Der Anwender nutzt seinen Körper wie einen\nHammer und stürzt sich auf das Ziel, wodurch\ndieses Schaden erleidet."
    es: "Usa el cuerpo como un martillo para abalanzarse\nsobre su rival y causarle daño."
    ko: "몸을 해머처럼\n써서 상대를 덮쳐\n데미지를 준다."
    zh_simp: "将身体当作锤子，\n向对手发动袭击，\n给予伤害。"
    zh_trad: "像錘子般地使用身體\n向對手發動襲擊，\n給予傷害。"
dragon_pulse:
  names:
    jp_kana: りゅうのはどう
    jp_kanji: りゅうのはどう
    en: Dragon Pulse
    fr: Dracochoc
    it: Dragopulsar
    de: Drachenpuls
    es: Pulso Dragón
    ko: 용의파동
    zh_simp: 龙之波动
    zh_trad: 龍之波動
  descriptions:
    jp_kana: "おおきな　くちから　しょうげきはを\nまきおこして　あいてを　こうげきする。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave generated\nby the user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour envoyer une onde\nde choc qui frappe l’ennemi."
    it: "Chi la usa spalanca la bocca e genera un’onda\nd’urto che colpisce il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt."
    es: "Abre mucho la boca y libera una onda de choque \nque ataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
dragon_rage:
  names:
    jp_kana: りゅうのいかり
    jp_kanji: りゅうのいかり
    en: Dragon Rage
    fr: Draco-Rage
    it: Ira di Drago
    de: Drachenwut
    es: Furia Dragón
    ko: 용의분노
    zh_simp: 龙之怒
    zh_trad: 龍之怒
  descriptions:
    jp_kana: "いかりの　しょうげきはを\nあいてに　ぶつけて　こうげきする。\n４０の　ダメージを　きまって　あたえる。"
    jp_kanji: "怒りの　衝撃波を\n相手に　ぶつけて　攻撃する。\n４０の　ダメージを　決まって　与える。"
    en: "This attack hits the target with a shock wave of\npure rage. This attack always inflicts 40 HP damage."
    fr: "La colère du lanceur déclenche une onde de choc\ndestructrice qui inflige toujours 40 PV de dégâts."
    it: "Colpisce il bersaglio con un’onda d’urto generata\ndall’ira. Questo attacco provoca sempre un danno\ndi 40 PS."
    de: "Stößt eine wutgeladene Schockwelle aus, die stets\n40 KP Schaden anrichtet."
    es: "Ráfaga de furiosas ondas de choque que quitan \n40 PS."
    ko: "분노의 충격파를\n상대에게 부딪쳐서 공격한다.\n언제나 40의 데미지를 준다."
    zh_simp: "将愤怒的冲击波\n撞向对手进行攻击。\n必定会给予４０的伤害。"
    zh_trad: "向對手發射憤怒的\n衝擊波進行攻擊。\n固定給予４０的傷害。"
dragon_rush:
  names:
    jp_kana: ドラゴンダイブ
    jp_kanji: ドラゴンダイブ
    en: Dragon Rush
    fr: Dracocharge
    it: Dragofuria
    de: Drachenstoß
    es: Carga Dragón
    ko: 드래곤다이브
    zh_simp: 龙之俯冲
    zh_trad: 龍之俯衝
  descriptions:
    jp_kana: "すさまじい　さっきで　いあつ　しながら\nたいあたりする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "すさまじい　殺気で　威圧しながら\n体当たりする。\n相手を　ひるませることが　ある。"
    en: "The user tackles the target while exhibiting\noverwhelming menace. This may also make the\ntarget flinch."
    fr: "Le lanceur frappe l’ennemi en prenant un air\nmenaçant. Peut aussi l’apeurer."
    it: "Chi la usa attacca con fare minaccioso e in questo\nmodo può anche far tentennare il bersaglio."
    de: "Anwender führt einen furchteinflößenden Angriff\naus. Das Ziel schreckt eventuell zurück."
    es: "Ataca de forma brutal mientras intimida al objetivo. \nTambién puede hacerlo retroceder."
    ko: "굉장한 살기로 위압하면서\n몸통박치기한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "释放出骇人的杀气，\n一边威慑一边撞击对手。\n有时会使对手畏缩。"
    zh_trad: "釋放出駭人的殺氣，\n威嚇並撞擊對手。\n有時會使對手畏縮。"
dragon_tail:
  names:
    jp_kana: ドラゴンテール
    jp_kanji: ドラゴンテール
    en: Dragon Tail
    fr: Draco-Queue
    it: Codadrago
    de: Drachenrute
    es: Cola Dragón
    ko: 드래곤테일
    zh_simp: 龙尾
    zh_trad: 龍尾
  descriptions:
    jp_kana: "あいてを　はじきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is knocked away, and a different Pokémon\nis dragged out. In the wild, this ends a battle against\na single Pokémon."
    fr: "Un coup puissant qui blesse la cible et l’envoie\nau loin. Lors d’un combat contre un Pokémon\nsauvage seul, met fin au combat."
    it: "Chi la usa fa volar via il bersaglio in modo che\nvenga sostituito. Se il bersaglio è un singolo\nPokémon selvatico, la lotta finisce."
    de: "Putzt das Ziel vom Feld und wechselt es mit einem\nanderen Pokémon aus. Beendet Kämpfe gegen wilde\nPokémon."
    es: "Ataca al objetivo y lo obliga a cambiarse por otro \nPokémon. Si es uno salvaje, acaba el combate."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "弹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "彈飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
drain_punch:
  names:
    jp_kana: ドレインパンチ
    jp_kanji: ドレインパンチ
    en: Drain Punch
    fr: Vampipoing
    it: Assorbipugno
    de: Ableithieb
    es: Puño Drenaje
    ko: 드레인펀치
    zh_simp: 吸取拳
    zh_trad: 吸取拳
  descriptions:
    jp_kana: "こぶしから　あいての　ちからを\nすいとる。　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "こぶしから　相手の　力を　吸い取る。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "An energy-draining punch. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Un coup de poing qui draine l’énergie.\nConvertit la moitié des dégâts infligés en PV pour\nle lanceur."
    it: "Pugno che assorbe energia. Fa recuperare una\nquantità di PS pari alla metà del danno inferto."
    de: "Entzieht dem Ziel Energie. Die Hälfte des Schadens\nwird den KP des Anwenders zugerechnet."
    es: "Un golpe que drena energía. El Pokémon recupera \nla mitad de los PS arrebatados al objetivo."
    ko: "주먹으로 상대의 힘을 흡수한다.\n입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "用拳头吸取对手的力量。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "從拳頭吸取對手的力量。\n可以回復給予對手\n傷害的一半ＨＰ。"
draining_kiss:
  names:
    jp_kana: ドレインキッス
    jp_kanji: ドレインキッス
    en: Draining Kiss
    fr: Vampibaiser
    it: Assorbibacio
    de: Diebeskuss
    es: Beso Drenaje
    ko: 드레인키스
    zh_simp: 吸取之吻
    zh_trad: 吸取之吻
  descriptions:
    jp_kana: "キッスによって　あいてから　ＨＰを\nすいとる。　あたえた　ダメージの\nはんぶんいじょう　ＨＰを　かいふくする。"
    jp_kanji: "キッスによって　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    en: "The user steals the target’s HP with a kiss. The\nuser’s HP is restored by over half of the damage\ntaken by the target."
    fr: "Aspire la force vitale de l’ennemi par un baiser.\nRend au lanceur un nombre de PV supérieur ou\négal à la moitié des dégâts infligés."
    it: "Chi la usa assorbe energia dal bersaglio con\nun bacio, recuperando così PS in quantità pari\na più della metà del danno inferto."
    de: "Der Anwender stiehlt dem Ziel mit einem Kuss KP.\nDie Höhe der Heilung beträgt mehr als die Hälfte des\nbeim Ziel angerichteten Schadens."
    es: "Absorbe PS del objetivo con un beso y restaura su\npropia energía en una cantidad igual o superior a \nla mitad del daño infligido."
    ko: "키스로 상대로부터 HP를\n흡수한다. 준 데미지의\n반 이상 HP를 회복한다."
    zh_simp: "用一个吻吸取对手的ＨＰ。\n回复给予对手\n伤害的一半以上的ＨＰ。"
    zh_trad: "親吻對手來吸取對手的ＨＰ。\n可以回復給予對手\n傷害的一半以上的ＨＰ。"
dream_eater:
  names:
    jp_kana: ゆめくい
    jp_kanji: ゆめくい
    en: Dream Eater
    fr: Dévorêve
    it: Mangiasogni
    de: Traumfresser
    es: Come Sueños
    ko: 꿈먹기
    zh_simp: 食梦
    zh_trad: 食夢
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　ダメージの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping target. It\nabsorbs half the damage caused to heal its own HP."
    fr: "Le lanceur mange le rêve de l’ennemi endormi\net récupère en PV la moitié des dégâts infligés."
    it: "Attacco che funziona solo su un bersaglio\nche dorme. Chi lo usa riceve metà dei PS\npersi dal Pokémon colpito."
    de: "Attacke gegen schlafendes Ziel. Die Hälfte des\nzugefügten Schadens wird dem Anwender\ngutgeschrieben."
    es: "Restaura al usuario la mitad del daño causado a un \nobjetivo dormido."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
    zh_simp: "吃掉正在睡觉的对手的梦\n进行攻击。回复对手\n所受到伤害的一半ＨＰ。"
    zh_trad: "吃掉熟睡中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一半ＨＰ。"
drill_peck:
  names:
    jp_kana: ドリルくちばし
    jp_kanji: ドリルくちばし
    en: Drill Peck
    fr: Bec Vrille
    it: Perforbecco
    de: Bohrschnabel
    es: Pico Taladro
    ko: 회전부리
    zh_simp: 啄钻
    zh_trad: 啄鑽
  descriptions:
    jp_kana: "かいてん　しながら　とがった　くちばしを\nあいてに　つきさして　こうげきする。"
    jp_kanji: "回転しながら　とがった　くちばしを\n相手に　突き刺して　攻撃する。"
    en: "A corkscrewing attack with a sharp beak acting as\na drill."
    fr: Une attaque utilisant le bec comme une perceuse.
    it: "Attacco a spirale con un becco aguzzo\nche fa da trapano."
    de: "Korkenzieherangriff, bei dem der Schnabel als\nBohrer dient."
    es: Picotazo giratorio y perforador muy potente.
    ko: "회전하면서 뾰족한 부리를\n상대에게 꿰찔러 공격한다."
    zh_simp: "一边旋转，一边将尖喙\n刺入对手进行攻击。"
    zh_trad: "一邊旋轉，一邊將尖喙\n刺進對手進行攻擊。"
drill_run:
  names:
    jp_kana: ドリルライナー
    jp_kanji: ドリルライナー
    en: Drill Run
    fr: Tunnelier
    it: Giravvita
    de: Schlagbohrer
    es: Taladradora
    ko: 드릴라이너
    zh_simp: 直冲钻
    zh_trad: 直衝鑽
  descriptions:
    jp_kana: "ドリルのように　からだを　かいてん\nしながら　あいてに　たいあたりする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into its target while rotating its\nbody like a drill. Critical hits land more easily."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur l’ennemi. Taux de critique élevé."
    it: "Chi la usa si scaglia sul bersaglio ruotando su se\nstesso come un trapano perforante. Probabile\nbrutto colpo."
    de: "Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro. \nSuele ser crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，一边旋转身体\n一边撞击对手。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體，\n猛烈地撞擊對手。\n容易擊中要害。"
dual_chop:
  names:
    jp_kana: ダブルチョップ
    jp_kanji: ダブルチョップ
    en: Dual Chop
    fr: Double Baffe
    it: Doppiocolpo
    de: Doppelhieb
    es: Golpe Bis
    ko: 더블촙
    zh_simp: 二连劈
    zh_trad: 二連劈
  descriptions:
    jp_kana: "からだの　かたいぶぶんで　あいてを\nたたいて　こうげきする。２かい\nれんぞくで　ダメージを　あたえる。"
    jp_kanji: "体の　硬い部分で　相手を\nたたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks its target by hitting it with brutal\nstrikes. The target is hit twice in a row."
    fr: "Le lanceur frappe l’ennemi deux fois d’affilée avec\nles parties les plus robustes de son corps."
    it: "Chi la usa attacca due volte il bersaglio con dei\ncolpi estremamente forti."
    de: "Versetzt dem Ziel mit massiven Extremitäten Hiebe.\nAngriff erfolgt zweimal hintereinander."
    es: "Golpea dos veces seguidas con las partes más\nrecias de su cuerpo."
    ko: "몸의 단단한 부분으로 상대를\n때려 공격한다. 2회 연속으로\n데미지를 준다."
    zh_simp: "用身体坚硬的部分\n拍打对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用身體的堅硬部分攻擊對手。\n連續２次給予傷害。"
dynamic_punch:
  names:
    jp_kana: ばくれつパンチ
    jp_kanji: ばくれつパンチ
    en: Dynamic Punch
    fr: Dynamopoing
    it: Dinamipugno
    de: Wuchtschlag
    es: Puño Dinámico
    ko: 폭발펀치
    zh_simp: 爆裂拳
    zh_trad: 爆裂拳
  descriptions:
    jp_kana: "こんしんの　ちからで\nパンチを　くりだして　こうげきする。\nあいてを　かならず　こんらん　させる。"
    jp_kanji: "こん身の　力で\nパンチを　くりだして　攻撃する。\n相手を　必ず　混乱させる。"
    en: "The user punches the target with full, concentrated\npower. This confuses the target if it hits."
    fr: "Le lanceur rassemble ses forces et envoie un coup\nde poing à l’ennemi. Rend ce dernier confus."
    it: "Colpisce il bersaglio con un pugno davvero forte.\nSe va a segno, lo confonde."
    de: Kräftiger Schlag, der das Ziel bei Erfolg verwirrt.
    es: "Puñetazo con toda la fuerza concentrada. Causa \nconfusión si atina."
    ko: "혼신의 힘으로\n펀치를 날려서 공격한다.\n상대를 반드시 혼란시킨다."
    zh_simp: "使出浑身力气出拳进行攻击。\n必定会使对手混乱。"
    zh_trad: "使出渾身力量出拳進行攻擊。\n必定會使對手混亂。"
earth_power:
  names:
    jp_kana: だいちのちから
    jp_kanji: だいちのちから
    en: Earth Power
    fr: Telluriforce
    it: Geoforza
    de: Erdkräfte
    es: Tierra Viva
    ko: 대지의힘
    zh_simp: 大地之力
    zh_trad: 大地之力
  descriptions:
    jp_kana: "あいての　あしもとへ　だいちの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "相手の　足下へ　大地の力を\n放出する。相手の　特防を\nさげることが　ある。"
    en: "The user makes the ground under the target erupt\nwith power. This may also lower the target’s \nSp. Def stat."
    fr: "De terribles séismes secouent l’ennemi.\nPeut aussi baisser sa Défense Spéciale."
    it: "Dal terreno sotto il bersaglio si sprigiona una forza\ndevastante. Può anche ridurne la Difesa Speciale."
    de: "Der Boden unter dem Ziel erzittert durch die Kraft\nder Erde. Senkt eventuell Spezial-Verteidigung."
    es: "La tierra a los pies del objetivo erupciona\nviolentamente. Puede disminuir la Defensa Especial \ndel objetivo."
    ko: "상대의 발밑에 대지의 힘을\n방출한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手脚下\n释放出大地之力。\n有时会降低对手的特防。"
    zh_trad: "向對手腳下\n釋放出大地之力。\n有時會降低對手的特防。"
earthquake:
  names:
    jp_kana: じしん
    jp_kanji: じしん
    en: Earthquake
    fr: Séisme
    it: Terremoto
    de: Erdbeben
    es: Terremoto
    ko: 지진
    zh_simp: 地震
    zh_trad: 地震
  descriptions:
    jp_kana: "じしんの　しょうげきで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa provoca un potente sisma che colpisce\ni Pokémon che ha intorno."
    de: "Ein mächtiges Beben, das die anderen Pokémon in\nder Nähe des Anwenders trifft."
    es: "Un terremoto que afecta a los Pokémon de alrededor \nen combate."
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
echoed_voice:
  names:
    jp_kana: エコーボイス
    jp_kanji: エコーボイス
    en: Echoed Voice
    fr: Écho
    it: Echeggiavoce
    de: Widerhall
    es: Eco Voz
    ko: 에코보이스
    zh_simp: 回声
    zh_trad: 回聲
  descriptions:
    jp_kana: "ひびく　こえで　あいてを　こうげきする。\nまいターン　だれかが　わざを\nつかい　つづけると　いりょくが　あがる。"
    jp_kanji: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　技を\n使い続けると　威力が　あがる。"
    en: "The user attacks the target with an echoing voice.\nIf this move is used every turn, its power\nis increased."
    fr: "Un cri retentissant blesse l’ennemi.\nSi le lanceur ou d’autres Pokémon l’utilisent\nà chaque tour, l’effet augmente."
    it: "Attacca il bersaglio con la propria voce\necheggiante. Se usata a ripetizione da uno\no più Pokémon il danno aumenta."
    de: "Angriff mit widerhallender Stimme. Wenn in jeder\nRunde ein Teilnehmer wiederholt die Attacke\neinsetzt, steigt die Stärke."
    es: "Un susurro que aumenta de potencia conforme el \nusuario y otros Pokémon lo van utilizando."
    ko: "울리는 목소리로 상대를 공격한다.\n매 턴 누군가 이 기술을\n계속해서 쓰면 위력이 올라간다."
    zh_simp: "用回声攻击对手。\n如果每回合都有宝可梦接着\n使用该招式，威力就会提高。"
    zh_trad: "用回聲攻擊對手。\n每回合有寶可夢持續使用回聲時，\n招式的威力會提高。"
eerie_impulse:
  names:
    jp_kana: かいでんぱ
    jp_kanji: かいでんぱ
    en: Eerie Impulse
    fr: Ondes Étranges
    it: Elettromistero
    de: Mystowellen
    es: Onda Anómala
    ko: 괴전파
    zh_simp: 怪异电波
    zh_trad: 怪異電波
  descriptions:
    jp_kana: "からだから　かいでんぱを　はなち\nあいてに　あびせる　ことによって\nとくこうを　がくっと　さげる。"
    jp_kanji: "体から　かいでんぱを　放ち\n相手に　浴びせる　ことによって\n特攻を　がくっと　さげる。"
    en: "The user’s body generates an eerie impulse.\nExposing the target to it harshly lowers the target’s\nSp. Atk stat."
    fr: "Le corps du lanceur produit des ondes anormales\nqui enveloppent l’ennemi et diminuent beaucoup\nson Attaque Spéciale."
    it: "Il corpo di chi la usa emette onde anomale che\ninvestono il bersaglio, riducendone di molto\nl’Attacco Speciale."
    de: "Der Körper des Anwenders erzeugt mysteriöse\nWellen und senkt den Spezial-Angriff des Zieles\ndadurch stark."
    es: "Su cuerpo irradia unas raras ondas que, al alcanzar \na un oponente, hacen que disminuya mucho su\nAtaque Especial."
    ko: "몸에서 괴전파를 내어\n상대에게 쏨으로써\n특수공격을 크게 떨어뜨린다."
    zh_simp: "从身体放射出怪异电波，\n让对手沐浴其中，\n从而大幅降低其特攻。"
    zh_trad: "從身體發出怪異電波\n影響對手，\n大幅降低對手的特攻。"
egg_bomb:
  names:
    jp_kana: タマゴばくだん
    jp_kanji: タマゴばくだん
    en: Egg Bomb
    fr: Bomb’Œuf
    it: Uovobomba
    de: Eierbombe
    es: Bomba Huevo
    ko: 알폭탄
    zh_simp: 炸蛋
    zh_trad: 炸蛋
  descriptions:
    jp_kana: "おおきな　タマゴを　ちから　いっぱい\nあいてに　なげつけて　こうげきする。"
    jp_kanji: "大きな　タマゴを　力いっぱい\n相手に　投げつけて　攻撃する。"
    en: "A large egg is hurled at the target with maximum\nforce to inflict damage."
    fr: "De toutes ses forces, le lanceur jette un gros œuf\nsur l’ennemi pour lui infliger des dégâts."
    it: "Colpisce il bersaglio con un grande uovo\nscaraventato con enorme forza."
    de: "Ein großes Ei wird auf das Ziel abgefeuert, um ihm zu\nschaden."
    es: Arroja un huevo enorme al objetivo con gran fuerza.
    ko: "큰 알을 온 힘을 다해\n상대에게 내던져서 공격한다."
    zh_simp: "向对手用力投掷\n大大的蛋进行攻击。"
    zh_trad: "向對手用力投擲\n大大的蛋進行攻擊。"
electric_terrain:
  names:
    jp_kana: エレキフィールド
    jp_kanji: エレキフィールド
    en: Electric Terrain
    fr: Champ Électrifié
    it: Campo Elettrico
    de: Elektrofeld
    es: Campo Eléctrico
    ko: 일렉트릭필드
    zh_simp: 电气场地
    zh_trad: 電氣場地
  descriptions:
    jp_kana: "５ターンのあいだ　エレキフィールドにする。\nじめんにいる　ポケモンは　ねむらない。\nでんきタイプの　いりょくが　あがる。"
    jp_kanji: "５ターンの　間　エレキフィールドにする。\n地面にいる　ポケモンは　眠らない。\nでんきタイプの　威力が　あがる。"
    en: "The user electrifies the ground for five turns,\npowering up Electric-type moves. Pokémon on the\nground no longer fall asleep."
    fr: "Pendant cinq tours, le terrain se charge d’électricité.\nLes Pokémon au sol ne peuvent pas s’endormir et la\npuissance des capacités de type Électrik augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nElettrico: i Pokémon a terra non si addormentano e la\npotenza delle mosse di tipo Elettro aumenta."
    de: "Hindert fünf Runden lang alle Pokémon, die den\nBoden berühren, am Einschlafen. Erhöht die Stärke\nvon Elektro-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos\nde tipo Eléctrico y los Pokémon que están en\ncontacto con el suelo no pueden quedarse dormidos."
    ko: "5턴 동안 일렉트릭필드로 만든다.\n땅에 있는 포켓몬은 잠들지 않는다.\n전기타입의 위력이 올라간다."
    zh_simp: "在５回合内变成电气场地。\n地面上的宝可梦将无法入眠。\n电属性的招式威力还会提高。"
    zh_trad: "在５回合內將腳下變成電氣場地。\n地面上的寶可夢將不會陷入睡眠狀態。\n電屬性招式的威力會提高。"
electrify:
  names:
    jp_kana: そうでん
    jp_kanji: そうでん
    en: Electrify
    fr: Électrisation
    it: Elettrocontagio
    de: Elektrifizierung
    es: Electrificación
    ko: 송전
    zh_simp: 输电
    zh_trad: 輸電
  descriptions:
    jp_kana: "あいてが　わざを　だすまえに\nそうでん　すると　そのターン\nあいての　わざは　でんきタイプになる。"
    jp_kanji: "相手が　技を　だす前に\nそうでん　すると　そのターン\n相手の　技は　でんきタイプになる。"
    en: "If the target is electrified before it uses a move\nduring that turn, the target’s move becomes\nElectric type."
    fr: "Si le lanceur attaque avant la cible, les capacités\nde celle-ci seront de type Électrik jusqu’à la fin\ndu tour."
    it: "Se si contagia il bersaglio prima che usi la sua\nmossa, per quel turno questa sarà di tipo Elettro."
    de: "Kommt die Attacke zum Einsatz, bevor das Ziel seine\nAttacke ausführt, nimmt diese für die Dauer dieser\nRunde den Typ Elektro an."
    es: "Si el objetivo queda electrificado antes de usar un\nmovimiento, este será de tipo Eléctrico."
    ko: "상대가 기술을 쓰기 전에\n송전하면 그 턴에 상대가\n사용하는 기술은 전기타입이 된다."
    zh_simp: "对手使出招式前，\n如果输电，则该回合\n对手的招式变成电属性。"
    zh_trad: "如果在對手使用招式前輸電，\n該回合對手的招式會變成電屬性。"
electro_ball:
  names:
    jp_kana: エレキボール
    jp_kanji: エレキボール
    en: Electro Ball
    fr: Boule Élek
    it: Energisfera
    de: Elektroball
    es: Bola Voltio
    ko: 일렉트릭볼
    zh_simp: 电球
    zh_trad: 電球
  descriptions:
    jp_kana: "でんきの　かたまりを　あいてに\nぶつける。あいてより　すばやさが\nはやいほど　いりょくが　あがる。"
    jp_kanji: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    en: "The user hurls an electric orb at the target. The\nfaster the user is than the target, the greater the\nmove’s power."
    fr: "Le lanceur envoie une boule d’électricité.\nSi sa Vitesse est plus grande que celle de l’ennemi,\nles dégâts augmentent d’autant."
    it: "Chi la usa attacca con una sfera d’energia elettrica. \nPiù è rapido rispetto al bersaglio, più danni arreca."
    de: "Je höher die Initiative des Anwenders im Vergleich\nzum Ziel ist, desto stärker trifft dieses eine geballte\nLadung Strom."
    es: "Lanza una bola eléctrica. Cuanto mayor sea la\nVelocidad del usuario en comparación con la del \nobjetivo, mayor será el daño causado."
    ko: "전기 덩어리를 상대에게 부딪쳐서\n공격한다. 상대보다 스피드가\n빠를수록 위력이 올라간다."
    zh_simp: "用电气团撞向对手。\n自己比对手速度越快，\n威力越大。"
    zh_trad: "用電球攻擊對手。\n速度比對手快越多，\n威力越大。"
electroweb:
  names:
    jp_kana: エレキネット
    jp_kanji: エレキネット
    en: Electroweb
    fr: Toile Élek
    it: Elettrotela
    de: Elektronetz
    es: Electrotela
    ko: 일렉트릭네트
    zh_simp: 电网
    zh_trad: 電網
  descriptions:
    jp_kana: "でんきの　ネットで\nあいてを　つかまえて　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "電気の　ネットで\n相手を　捕まえて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks and captures opposing Pokémon\nusing an electric net. This lowers their Speed stat."
    fr: "Attrape l’ennemi dans un filet électrique.\nBaisse aussi la Vitesse de l’ennemi."
    it: "Chi la usa attacca i nemici intorno a sé\ncatturandoli con una ragnatela elettrica\ne riducendone la Velocità."
    de: "Fängt Ziele mit einem elektrischen Netz und senkt\nderen Initiative."
    es: "Atrapa y ataca a los objetivos con una telaraña \neléctrica. También reduce su Velocidad."
    ko: "전기 네트로\n상대를 붙잡아서 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用电网捉住对手进行攻击。\n降低对手的速度。"
    zh_trad: "用電網捉住對手進行攻擊。\n可降低對手的速度。"
embargo:
  names:
    jp_kana: さしおさえ
    jp_kanji: さしおさえ
    en: Embargo
    fr: Embargo
    it: Divieto
    de: Itemsperre
    es: Embargo
    ko: 금제
    zh_simp: 查封
    zh_trad: 查封
  descriptions:
    jp_kana: "もたせた　どうぐを　５ターンの　あいだ\nつかえなくする。　トレーナーも\nその　ポケモンには　どうぐを　つかえない。"
    jp_kanji: "持たせた　道具を　５ターンの　間\n使えなくする。　トレーナーも\nその　ポケモンには　道具を　使えない。"
    en: "This move prevents the target from using its held\nitem for five turns. Its Trainer is also prevented from\nusing items on it."
    fr: "Empêche la cible d’utiliser un objet tenu\net son Dresseur d’utiliser un objet sur lui\npendant cinq tours."
    it: "Impedisce al bersaglio di usare il suo strumento\ne al suo Allenatore di usarne altri sul Pokémon\nper cinque turni."
    de: "Das Ziel kann fünf Runden lang weder getragene\nItems nutzen, noch kann sein Trainer Items auf es\nanwenden."
    es: "Impide al objetivo usar el objeto que lleva durante\ncinco turnos. Su Entrenador tampoco puede usar\nobjetos con él."
    ko: "지니게 한 도구를 5턴 동안\n쓸 수 없게 한다. 트레이너도\n그 포켓몬에게는 도구를 쓸 수 없다."
    zh_simp: "让对手在５回合内不能使用\n宝可梦携带的道具。训练家也\n不能给那只宝可梦使用道具。"
    zh_trad: "讓對手在５回合內無法使用攜帶的道具。\n訓練家也不能對\n該寶可夢使用道具。"
ember:
  names:
    jp_kana: ひのこ
    jp_kanji: ひのこ
    en: Ember
    fr: Flammèche
    it: Braciere
    de: Glut
    es: Ascuas
    ko: 불꽃세례
    zh_simp: 火花
    zh_trad: 火花
  descriptions:
    jp_kana: "ちいさな　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "小さな　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is attacked with small flames. This may\nalso leave the target with a burn."
    fr: "L’ennemi est attaqué par une faible flamme.\nPeut aussi le brûler."
    it: "Il bersaglio viene colpito da fiammelle che possono\nanche scottarlo."
    de: "Schwache Feuer-Attacke, durch die das Ziel\neventuell Verbrennungen erleidet."
    es: "Ataca con llamas pequeñas que pueden causar \nquemaduras."
    ko: "작은 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n小型火焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n小火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
encore:
  names:
    jp_kana: アンコール
    jp_kanji: アンコール
    en: Encore
    fr: Encore
    it: Ripeti
    de: Zugabe
    es: Otra Vez
    ko: 앵콜
    zh_simp: 再来一次
    zh_trad: 再來一次
  descriptions:
    jp_kana: "あいてに　アンコールした　わざを\n３かい　つづけて　ださせる。"
    jp_kanji: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    en: "The user compels the target to keep using the move\nit encored for three turns."
    fr: "Oblige l’ennemi à répéter durant trois tours\nla dernière capacité utilisée."
    it: "Chi la usa obbliga il bersaglio a ripetere per tre\nturni l’ultima mossa eseguita."
    de: "Das Ziel wiederholt die letzte Attacke\ndrei Runden lang."
    es: "El objetivo repite su último movimiento durante tres \nturnos."
    ko: "상대에게 앵콜시킨 기술을\n3번 연속으로 쓰게 한다."
    zh_simp: "让对手接受再来一次，\n连续３次使出最后使用的招式。"
    zh_trad: "要求對手再來一次，\n讓對手連續３次\n使出最近一次使用的招式。"
endeavor:
  names:
    jp_kana: がむしゃら
    jp_kanji: がむしゃら
    en: Endeavor
    fr: Effort
    it: Rimonta
    de: Notsituation
    es: Esfuerzo
    ko: 죽기살기
    zh_simp: 蛮干
    zh_trad: 蠻幹
  descriptions:
    jp_kana: "あいての　ＨＰが　じぶんの　ＨＰと\nおなじ　くらいに　なるように\nダメージを　あたえる。"
    jp_kanji: "相手の　ＨＰが　自分の　ＨＰと\n同じくらいに　なるように\nダメージを　与える。"
    en: "This attack move cuts down the target’s HP to equal\nthe user’s HP."
    fr: "Une attaque qui réduit les PV de l’ennemi au\nniveau des PV du lanceur."
    it: "Attacco che riduce i PS del bersaglio a una\nquantità pari ai PS di chi lo usa."
    de: "Trifft nur, wenn KP des Anwenders geringer als KP\ndes Zieles sind. Senkt dessen KP auf die Höhe der\nKP des Anwenders."
    es: "Reduce los PS del objetivo para que igualen a los \ndel atacante."
    ko: "상대의 HP가 자신의 HP와\n같아지도록\n데미지를 준다."
    zh_simp: "给予伤害，\n使对手的ＨＰ变得\n和自己的ＨＰ一样。"
    zh_trad: "給予傷害，\n使對手的ＨＰ變得\n和自己的ＨＰ一樣。"
endure:
  names:
    jp_kana: こらえる
    jp_kanji: こらえる
    en: Endure
    fr: Ténacité
    it: Resistenza
    de: Ausdauer
    es: Aguante
    ko: 버티기
    zh_simp: 挺住
    zh_trad: 挺住
  descriptions:
    jp_kana: "こうげきを　うけても\nＨＰを　かならず　１だけ　のこせる。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least 1 HP.\nIts chance of failing rises if it is used in succession."
    fr: "Le lanceur résiste aux attaques avec 1 PV.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Chi la usa resta con un PS anche se subisce un\ncolpo da KO in quel turno. Usata in successione\npuò fallire."
    de: "Nach fatalen Attacken bleibt stets 1 KP übrig.\nMisserfolg bei Wiederholung möglich."
    es: "Resiste cualquier ataque y deja al menos 1 PS. \nPuede fallar si se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "即使受到攻击，\n也至少会留下１ＨＰ。\n连续使出则容易失败。"
    zh_trad: "即使受到再強烈的攻擊，\n也一定會剩下１ＨＰ。\n連續使用時容易失敗。"
energy_ball:
  names:
    jp_kana: エナジーボール
    jp_kanji: エナジーボール
    en: Energy Ball
    fr: Éco-Sphère
    it: Energipalla
    de: Energieball
    es: Energibola
    ko: 에너지볼
    zh_simp: 能量球
    zh_trad: 能量球
  descriptions:
    jp_kana: "しぜんから　あつめた\nいのちの　ちからを　はっしゃする。\nあいての　とくぼうを　さげることがある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることがある。"
    en: "The user draws power from nature and fires it at the\ntarget. This may also lower the target’s Sp. Def stat."
    fr: "Utilise les pouvoirs de la nature pour attaquer\nl’ennemi. Peut aussi baisser sa Défense Spéciale."
    it: "Chi la usa attinge energia dalla natura e la\nscaglia contro il bersaglio. Può anche ridurne\nla Difesa Speciale."
    de: "Anwender zieht Kraft aus der Natur und feuert sie\nauf das Ziel. Senkt eventuell Spezial-Verteidigung\ndes Zieles."
    es: "Aúna fuerzas de la naturaleza y libera su ataque. \nPuede disminuir la Defensa Especial del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다.\n상대의 특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时会降低对手的特防。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時會降低對手的特防。"
entrainment:
  names:
    jp_kana: なかまづくり
    jp_kanji: なかまづくり
    en: Entrainment
    fr: Ten-danse
    it: Saltamicizia
    de: Zwango
    es: Danza Amiga
    ko: 동료만들기
    zh_simp: 找伙伴
    zh_trad: 找夥伴
  descriptions:
    jp_kana: "ふしぎな　リズムで　おどる。\nうごきを　まねさせて　じぶんと　あいての\nとくせいを　おなじに　する。"
    jp_kanji: "不思議な　リズムで　おどる。\n動きを　まねさせて　自分と　相手の\n特性を　同じに　する。"
    en: "The user dances with an odd rhythm that compels\nthe target to mimic it, making the target’s Ability\nthe same as the user’s."
    fr: "Le lanceur danse sur un rythme étrange.\nIl force sa cible à l’imiter, ce qui lui fait adopter\nson talent."
    it: "Chi la usa saltella con un buffo ritmo, inducendo\nil bersaglio a imitarlo e rendendo la sua abilità\nidentica alla propria."
    de: "Anwender tanzt zu einem seltsamen Rhythmus und\nzwingt das Ziel mitzumachen. Dieses nimmt dabei die\nFähigkeit des Anwenders an."
    es: "Una extraña danza que hace que el usuario y el \nobjetivo tengan la misma habilidad."
    ko: "이상한 리듬으로 춤춘다.\n움직임을 흉내 내게 해서\n자신과 상대의 특성을 똑같게 만든다."
    zh_simp: "用神奇的节奏跳舞。\n使对手模仿自己的动作，\n从而将特性变成一样。"
    zh_trad: "用神奇的節奏跳舞。\n讓對手模仿自己的動作，\n變成和自己一樣的特性。"
eruption:
  names:
    jp_kana: ふんか
    jp_kanji: ふんか
    en: Eruption
    fr: Éruption
    it: Eruzione
    de: Eruption
    es: Estallido
    ko: 분화
    zh_simp: 喷火
    zh_trad: 噴火
  descriptions:
    jp_kana: "いかりを　ばくはつ　させて　あいてを\nこうげきする。　じぶんの　ＨＰが　すくない\nほど　わざの　いりょくは　さがる。"
    jp_kanji: "怒りを　爆発させて　相手を\n攻撃する。　自分の　ＨＰが\n少ないほど　技の　威力は　さがる。"
    en: "The user attacks opposing Pokémon with explosive\nfury. The lower the user’s HP, the lower the\nmove’s power."
    fr: "Le lanceur laisse exploser sa colère.\nPlus ses PV sont bas et moins l’attaque est\npuissante."
    it: "Attacco impetuoso ed esplosivo la cui potenza\nè proporzionale ai PS di chi lo usa."
    de: "Explosiver Angriff. Je höher die KP des Anwenders\nsind, desto mehr Schaden wird angerichtet."
    es: "Furia explosiva. Cuanto menor sea el número de \nPS del usuario, menos daño hará el ataque."
    ko: "분노를 폭발시켜 상대를\n공격한다. 자신의 HP가\n적을수록 기술의 위력이 떨어진다."
    zh_simp: "爆发怒火攻击对手。\n自己的ＨＰ越少，\n招式的威力越小。"
    zh_trad: "爆發怒火攻擊對手。\n自己的ＨＰ越少，\n招式的威力越小。"
explosion:
  names:
    jp_kana: だいばくはつ
    jp_kanji: だいばくはつ
    en: Explosion
    fr: Explosion
    it: Esplosione
    de: Explosion
    es: Explosión
    ko: 대폭발
    zh_simp: 大爆炸
    zh_trad: 大爆炸
  descriptions:
    jp_kana: "おおきな　ばくはつで　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing a\ntremendous explosion. The user faints upon using\nthis move."
    fr: "Le lanceur explose et inflige des dégâts à tous\nles Pokémon autour de lui. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni\nagli altri Pokémon attorno, ma va KO."
    de: "Anwender explodiert, richtet bei allen Pokémon in\nseiner Umgebung großen Schaden an und wird selbst\nkampfunfähig."
    es: "El atacante causa una grandísima explosión y hiere \na todos a su alrededor. El usuario se debilita de \ninmediato."
    ko: "큰 폭발로 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서는 기절한다."
    zh_simp: "引发大爆炸，\n攻击自己周围所有的宝可梦。\n使用后自己会陷入濒死。"
    zh_trad: "引起大爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
extrasensory:
  names:
    jp_kana: じんつうりき
    jp_kanji: じんつうりき
    en: Extrasensory
    fr: Extrasenseur
    it: Extrasenso
    de: Sondersensor
    es: Paranormal
    ko: 신통력
    zh_simp: 神通力
    zh_trad: 神通力
  descriptions:
    jp_kana: "みえない　ふしぎな　ちからを\nおくって　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "みえない　不思議な　力を\n送って　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks with an odd, unseeable power.\nThis may also make the target flinch."
    fr: "Le lanceur attaque avec un pouvoir étrange et\ninvisible. Peut aussi apeurer l’ennemi."
    it: "Chi la usa attacca con una misteriosa\nforza invisibile. Può far tentennare il bersaglio."
    de: "Besonderer Angriff mit einer unsichtbaren Kraft,\ndie das Ziel eventuell zurückschrecken lässt."
    es: "Energía muy extraña que puede hacer retroceder \nal objetivo."
    ko: "보이지 않는 이상한 힘을\n보내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "发出看不见的\n神奇力量进行攻击。\n有时会使对手畏缩。"
    zh_trad: "發送看不見的\n神奇力量進行攻擊。\n有時會使對手畏縮。"
extreme_evoboost:
  names:
    jp_kana: ナインエボルブースト
    jp_kanji: ナインエボルブースト
    en: Extreme Evoboost
    fr: Neuf pour Un
    it: Potenziamento Eevolutivo
    de: Macht der Neun
    es: Novena Potencia
    ko: 나인이볼부스트
    zh_simp: 九彩升华齐聚顶
    zh_trad: 九彩昇華齊聚頂
  descriptions:
    jp_kana: "Ｚパワーを　えた　イーブイが\nしんかした　なかまたちの　ちからを　かりて\nのうりょくを　ぐーんと　あげる。"
    jp_kanji: "Ｚパワーを　得た　イーブイが\n進化した　仲間たちの　力を　借りて\n能力を　ぐーんと　上げる。"
    en: "After obtaining Z-Power, the user, Eevee, gets\nenergy from its evolved friends and boosts its\nstats sharply."
    fr: "Évoli utilise la Force Z pour emprunter la puissance\nde tous ses amis évolués et beaucoup augmenter\ntoutes ses stats."
    it: "Grazie al Potere Z, Eevee evoca a sé tutta\nl’energia delle sue possibili evoluzioni e\naumenta di molto le sue statistiche."
    de: "Evoli macht sich durch Z-Kraft die Stärke seiner\nWeiterentwicklungen zunutze und erhöht seine\nStatuswerte stark."
    es: "Cuando Eevee obtiene el Poder Z, toma prestada la\nenergía de sus amigos evolucionados para potenciar\nenormemente sus características."
    ko: "Z파워를 얻은 이브이가\n진화한 동료들의 힘을 빌려\n능력을 크게 올린다."
    zh_simp: "得到Ｚ力量的伊布\n将借助进化后伙伴们的力量，\n大幅提高能力。"
    zh_trad: "得到Ｚ力量的伊布\n借助進化後的夥伴們的力量\n大幅提升自己的能力。"
extreme_speed:
  names:
    jp_kana: しんそく
    jp_kanji: しんそく
    en: Extreme Speed
    fr: Vitesse Extrême
    it: Extrarapido
    de: Turbotempo
    es: Veloc. Extrema
    ko: 신속
    zh_simp: 神速
    zh_trad: 神速
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nあいてに　とっしんして　こうげきする。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　突進して　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user charges the target at blinding speed.\nThis move always goes first."
    fr: "Le lanceur charge à une vitesse renversante.\nFrappe en priorité."
    it: "Chi la usa carica il bersaglio a una velocità\nimpressionante.\nQuesta mossa ha priorità alta."
    de: "Extrem schnelle und kraftvolle Attacke mit hoher\nErstschlagquote."
    es: "Ataque de una velocidad extrema. Este movimiento\ntiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진하여 공격한다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "以迅雷不及掩耳之势\n猛撞向对手进行攻击。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n猛撞向對手進行攻擊。\n必定能夠發動先制攻擊。"
facade:
  names:
    jp_kana: からげんき
    jp_kanji: からげんき
    en: Facade
    fr: Façade
    it: Facciata
    de: Fassade
    es: Imagen
    ko: 객기
    zh_simp: 硬撑
    zh_trad: 硬撐
  descriptions:
    jp_kana: "じぶんが　どく　まひ　やけど\nじょうたいの　とき　あいてに　くりだすと\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "This attack move doubles its power if the user is\npoisoned, burned, or paralyzed."
    fr: "Une attaque dont la puissance double lorsque\nle lanceur est empoisonné, paralysé ou brûlé."
    it: "Mossa d’attacco che raddoppia la potenza\nse chi la usa è scottato, avvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert oder leidet er\nunter Verbrennungen, verdoppelt sich die Kraft der\nAttacke."
    es: "Ataca con el doble de potencia si el usuario está \nquemado, paralizado o envenenado."
    ko: "자신이 독, 마비, 화상\n상태일 때 날리면\n기술의 위력이 2배가 된다."
    zh_simp: "当自己处于中毒、麻痹、灼伤状态时，\n向对手使出此招式的话，\n威力会变成２倍。"
    zh_trad: "當自己陷入中毒、麻痺、灼傷等\n狀態時，向對手使用此招式，\n威力會變成２倍。"
fairy_lock:
  names:
    jp_kana: フェアリーロック
    jp_kanji: フェアリーロック
    en: Fairy Lock
    fr: Verrou Enchanté
    it: Blocco Fatato
    de: Feenschloss
    es: Cerrojo Feérico
    ko: 페어리록
    zh_simp: 妖精之锁
    zh_trad: 妖精之鎖
  descriptions:
    jp_kana: "ロックを　かけることによって\nつぎのターン　すべての\nポケモンを　にげられなくする。"
    jp_kanji: "ロックを　かけることによって\n次のターン　すべての\nポケモンを　逃げられなくする。"
    en: "By locking down the battlefield, the user keeps all\nPokémon from fleeing during the next turn."
    fr: "Des chaînes entourent la zone de combat,\nempêchant tous les Pokémon de fuir au\nprochain tour."
    it: "Impone un blocco al terreno di lotta che nel turno\nsuccessivo impedisce a tutti i Pokémon di fuggire."
    de: "Der Anwender sperrt alle Pokémon ein und hindert\nsie damit in der nächsten Runde an der Flucht."
    es: "Consigue que ningún Pokémon pueda huir en el \nsiguiente turno echando un cerrojo."
    ko: "록을 걸어\n다음 턴의 모든 포켓몬을\n도망가지 못하게 한다."
    zh_simp: "通过封锁，\n下一回合所有的\n宝可梦都无法逃走。"
    zh_trad: "封鎖對戰場地，\n下一回合所有的\n寶可夢都無法逃走。"
fairy_wind:
  names:
    jp_kana: ようせいのかぜ
    jp_kanji: ようせいのかぜ
    en: Fairy Wind
    fr: Vent Féérique
    it: Vento di Fata
    de: Feenbrise
    es: Viento Feérico
    ko: 요정의바람
    zh_simp: 妖精之风
    zh_trad: 妖精之風
  descriptions:
    jp_kana: "ようせいのかぜを　おこし\nあいてに　ふきつけて　こうげきする。"
    jp_kanji: "ようせいのかぜを　起こし\n相手に　吹きつけて　攻撃する。"
    en: "The user stirs up a fairy wind and strikes the target\nwith it."
    fr: Déchaîne un vent magique qui cingle l’ennemi.
    it: "Chi la usa solleva un vento fatato che investe\nil bersaglio."
    de: "Lässt eine Feenbrise aufkommen, die das Ziel erfasst\nund ihm Schaden zufügt."
    es: "El Pokémon que lo usa desata un vendaval feérico \nque arremete contra el objetivo."
    ko: "요정의 바람을 일으켜\n상대에게 몰아쳐서 공격한다."
    zh_simp: "刮起妖精之风，\n吹向对手进行攻击。"
    zh_trad: "刮起妖精之風，\n吹向對手進行攻擊。"
fake_out:
  names:
    jp_kana: ねこだまし
    jp_kanji: ねこだまし
    en: Fake Out
    fr: Bluff
    it: Bruciapelo
    de: Mogelhieb
    es: Sorpresa
    ko: 속이다
    zh_simp: 击掌奇袭
    zh_trad: 擊掌奇襲
  descriptions:
    jp_kana: "せんせい　こうげきで　あいてを\nひるませる。せんとうに　でたら\nすぐに　ださないと　せいこう　しない。"
    jp_kanji: "先制攻撃で　相手を　ひるませる。\n戦闘に　でたら\nすぐに　ださないと　成功しない。"
    en: "This attack hits first and makes the target flinch.\nIt only works the first turn the user is in battle."
    fr: "Permet de frapper en priorité et apeure l’ennemi.\nNe fonctionne qu’au premier tour."
    it: "Mossa ad alta priorità che fa tentennare\nil bersaglio. Funziona solo appena scesi in campo."
    de: "Attacke mit hoher Erstschlagquote. Das Ziel\nschreckt zurück. Gelingt nur in der ersten Runde\neines Kampfes."
    es: "Movimiento de prioridad alta que, además, hace\nretroceder al objetivo. Solo sirve en el primer turno."
    ko: "선제공격으로 상대를 풀죽게 한다.\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "进行先制攻击，使对手畏缩。\n要在出场后立刻使出才能成功。"
    zh_trad: "利用先制攻擊使對手畏縮。\n要在上場後立即使用才會成功。"
fake_tears:
  names:
    jp_kana: うそなき
    jp_kanji: うそなき
    en: Fake Tears
    fr: Croco Larme
    it: Falselacrime
    de: Trugträne
    es: Llanto Falso
    ko: 거짓울음
    zh_simp: 假哭
    zh_trad: 假哭
  descriptions:
    jp_kana: "ないた　ふりをして　なみだを　ながす。\nこまらせる　ことで\nあいての　とくぼうを　がくっと　さげる。"
    jp_kanji: "ないた　ふりをして　涙を　流す。\nこまらせる　ことで\n相手の　特防を　がくっと　さげる。"
    en: "The user feigns crying to fluster the target, harshly\nlowering its Sp. Def stat."
    fr: "Le lanceur fait semblant de pleurer pour troubler\nl’ennemi et beaucoup baisser sa Défense Spéciale."
    it: "Chi la usa inscena un pianto teatrale per\ncommuovere il bersaglio. Ne riduce di molto la\nDifesa Speciale."
    de: "Täuscht Weinen vor, um die Spezial-Verteidigung des\nZieles stark zu senken."
    es: "Lágrimas de cocodrilo que bajan mucho la\nDefensa Especial del objetivo."
    ko: "우는 척을 하며 눈물을 흘린다.\n난처하게 만들어\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "装哭流泪。\n使对手不知所措，\n从而大幅降低对手的特防。"
    zh_trad: "裝哭掉眼淚。\n讓對手不知所措，\n大幅降低對手的特防。"
false_swipe:
  names:
    jp_kana: みねうち
    jp_kanji: みねうち
    en: False Swipe
    fr: Faux-Chage
    it: Falsofinale
    de: Trugschlag
    es: Falsotortazo
    ko: 칼등치기
    zh_simp: 点到为止
    zh_trad: 點到為止
  descriptions:
    jp_kana: "あいての　ＨＰが\nかならず　１だけ　のこる　ように\nてかげん　して　こうげきする。"
    jp_kanji: "相手の　ＨＰが\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    en: "A restrained attack that prevents the target from\nfainting. The target is left with at least 1 HP."
    fr: "Le lanceur retient ses coups pour que l’ennemi\ngarde au moins 1 PV et ne tombe pas K.O."
    it: "Chi la usa trattiene il colpo per impedire al bersaglio\ndi andare KO, lasciandolo con almeno un PS."
    de: Ein Angriff, der dem Ziel zumindest 1 KP lässt.
    es: "Ataque moderado que no debilita al objetivo y le\ndeja al menos 1 PS."
    ko: "상대의 HP가\n반드시 1만큼 남도록\n조절하여 공격한다."
    zh_simp: "对手的ＨＰ\n至少会留下１ＨＰ，\n如此般手下留情地攻击。"
    zh_trad: "手下留情地攻擊對手，\n一定會讓對手剩下１ＨＰ。"
feather_dance:
  names:
    jp_kana: フェザーダンス
    jp_kanji: フェザーダンス
    en: Feather Dance
    fr: Danse-Plume
    it: Danzadipiume
    de: Daunenreigen
    es: Danza Pluma
    ko: 깃털댄스
    zh_simp: 羽毛舞
    zh_trad: 羽毛舞
  descriptions:
    jp_kana: "うもうを　ふりまいて\nあいての　からだに　からませる。\nあいての　こうげきを　がくっと　さげる。"
    jp_kanji: "羽毛を　ふりまいて\n相手の　体に　からませる。\n相手の　攻撃を　がくっと　さげる。"
    en: "The user covers the target’s body with a mass of\ndown that harshly lowers its Attack stat."
    fr: "Une montagne de plumes ensevelit l’ennemi et\nréduit beaucoup son Attaque."
    it: "Chi la usa circonda il bersaglio con un turbinio\ndi piume riducendo di molto il suo Attacco."
    de: "Hüllt das Ziel in Daunen und senkt dessen\nAngriffs-Wert stark."
    es: "Envuelve al objetivo con un manto de plumas para \nreducir mucho su Ataque."
    ko: "깃털을 흩뿌려\n상대의 몸에 휘감는다.\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "撒出羽毛，\n笼罩在对手的周围。\n大幅降低对手的攻击。"
    zh_trad: "撒出羽毛，\n纏住對手的身體。\n大幅降低對手的攻擊。"
feint:
  names:
    jp_kana: フェイント
    jp_kanji: フェイント
    en: Feint
    fr: Ruse
    it: Fintoattacco
    de: Offenlegung
    es: Amago
    ko: 페인트
    zh_simp: 佯攻
    zh_trad: 佯攻
  descriptions:
    jp_kana: "まもるや　みきり　などを　している\nあいてに　こうげきが　できる。\nまもりの　こうかを　かいじょ　させる。"
    jp_kanji: "まもるや　みきり　などを　している\n相手に　攻撃が　できる。\n守りの　効果を　解除させる。"
    en: "This attack hits a target using a move such as\nProtect or Detect.\nThis also lifts the effects of those moves."
    fr: "Une attaque capable de toucher un ennemi qui\nutilise une capacité comme Détection ou Abri.\nAnnule l’effet de ces capacités."
    it: "Colpisce anche un bersaglio che ha usato mosse\ncome Protezione e Individua, annullandone gli effetti."
    de: "Ziele, die Attacken wie Schutzschild oder Scanner\neingesetzt haben, werden getroffen. Entfernt Effekte\ndieser Attacken."
    es: "Permite golpear a objetivos que han utilizado\nmovimientos como Protección o Detección y anula\nsus efectos."
    ko: "방어나 판별 등을 하고 있는\n상대에게 공격할 수 있다.\n방어 효과를 해제시킨다."
    zh_simp: "能够攻击正在使用\n守住或看穿等招式的对手。\n解除其守护效果。"
    zh_trad: "能夠攻擊使用了\n守住或看穿的對手。\n並解除對手的防守效果。"
feint_attack:
  names:
    jp_kana: だましうち
    jp_kanji: だましうち
    en: Feint Attack
    fr: Feinte
    it: Finta
    de: Finte
    es: Finta
    ko: 속여때리기
    zh_simp: 出奇一击
    zh_trad: 出奇一擊
  descriptions:
    jp_kana: "さりげなく　あいてに　ちかづき\nゆだんした　すきを　みて　なぐりつける。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "さりげなく　相手に　ちかづき\n油断した　すきを　みて　なぐりつける。\n攻撃は　必ず　命中する。"
    en: "The user approaches the target disarmingly, then\nthrows a sucker punch. This attack never misses."
    fr: "Le lanceur s’approche l’air de rien avant de frapper\npar surprise. N’échoue jamais."
    it: "Chi la usa si avvicina al bersaglio facendo finta\ndi niente, per poi scagliare un pugno infallibile\na tradimento."
    de: "Anwender nähert sich mit Unschuldsmiene dem Ziel\nund schlägt zu, sobald dieses unachtsam wird.\nEin Treffer ist gewiss."
    es: "Engaña al objetivo para acercarse y dar un puñetazo \nque no falla."
    ko: "슬금슬금 상대에게 다가가\n방심한 틈을 타서 세게 때린다.\n공격은 반드시 명중한다."
    zh_simp: "悄悄地靠近对手，\n趁其不备进行殴打。\n攻击必定会命中。"
    zh_trad: "若無其事地靠近對手，\n出其不意地進行攻擊。\n攻擊必定會命中。"
fell_stinger:
  names:
    jp_kana: とどめばり
    jp_kanji: とどめばり
    en: Fell Stinger
    fr: Dard Mortel
    it: Pungiglione
    de: Stachelfinale
    es: Aguijón Letal
    ko: 마지막일침
    zh_simp: 致命针刺
    zh_trad: 致命針刺
  descriptions:
    jp_kana: "この　わざを　つかって\nあいてを　たおすと\nこうげきが　ぐぐーんと　あがる。"
    jp_kanji: "この　技を　使って\n相手を　倒すと\n攻撃が　ぐぐーんと　あがる。"
    en: "When the user knocks out a target with this move,\nthe user’s Attack stat rises drastically."
    fr: "Augmente beaucoup l’Attaque du lanceur si\nun ennemi est mis K.O. avec cette capacité."
    it: "L’Attacco di chi la usa aumenta moltissimo se\ngrazie alla mossa il bersaglio va KO."
    de: "Gelingt es dem Anwender, das Ziel mit dieser\nAttacke zu besiegen, steigt sein Angriffs-Wert\ndrastisch."
    es: "Si se derrota al objetivo utilizando este movimiento,\naumenta muchísimo el Ataque del usuario."
    ko: "이 기술을 사용하여\n상대를 쓰러뜨리면\n공격이 매우 크게 오른다."
    zh_simp: "如果使用此招式打倒对手，\n攻击会巨幅提高。"
    zh_trad: "使用此招式打倒對手時，\n自己的攻擊會極大幅提高。"
fiery_dance:
  names:
    jp_kana: ほのおのまい
    jp_kanji: ほのおのまい
    en: Fiery Dance
    fr: Danse du Feu
    it: Voldifuoco
    de: Feuerreigen
    es: Danza Llama
    ko: 불꽃춤
    zh_simp: 火之舞
    zh_trad: 火之舞
  descriptions:
    jp_kana: "ほのおを　まとい　はばたいて　あいてを\nこうげきする。じぶんの　とくこうが\nあがることが　ある。"
    jp_kanji: "炎を　まとい　はばたいて　相手を\n攻撃する。自分の　特攻が\nあがることが　ある。"
    en: "Cloaked in flames, the user dances and flaps its\nwings. This may also raise the user’s Sp. Atk stat."
    fr: "Le lanceur enveloppe l’ennemi de flammes.\nPeut aussi augmenter l’Attaque Spéciale du lanceur."
    it: "Chi la usa viene avvolto da fiamme che scaglia\ncontro il bersaglio, sbattendo le ali. Può anche\naumentare l’Attacco Speciale."
    de: "Hüllt das Ziel mit einer Feuerhose in Flammen.\nKann den Spezial-Angriff des Anwenders erhöhen."
    es: "Envuelve en llamas y daña al objetivo. Puede\naumentar el Ataque Especial de quien lo usa."
    ko: "불꽃을 두른 날개를 쳐서\n공격한다. 자신의 특수공격이\n오를 때가 있다."
    zh_simp: "让火焰覆盖全身，\n振翅攻击对手。\n有时会提高自己的特攻。"
    zh_trad: "讓火焰圍繞全身後，\n振翅攻擊對手。\n有時會提高自己的特攻。"
final_gambit:
  names:
    jp_kana: いのちがけ
    jp_kanji: いのちがけ
    en: Final Gambit
    fr: Tout ou Rien
    it: Azzardo
    de: Wagemut
    es: Sacrificio
    ko: 목숨걸기
    zh_simp: 搏命
    zh_trad: 搏命
  descriptions:
    jp_kana: "いのちがけで　あいてを　こうげきする。\nじぶんは　ひんしに　なるが　あいてに\nＨＰぶんの　ダメージを　あたえる。"
    jp_kanji: "命懸けで　相手を　攻撃する。\n自分は　ひんしに　なるが　相手に\nＨＰ分の　ダメージを　与える。"
    en: "The user risks everything to attack its target. The\nuser faints but does damage equal to its HP."
    fr: "Une attaque très risquée.\nLe lanceur perd tous ses PV restants et inflige\nautant de dégâts à l’ennemi."
    it: "Chi la usa attacca con tutta la potenza di cui\ndispone e va KO, ma infligge al bersaglio un danno\npari ai PS che ha perso."
    de: "Ein Angriff, der dem Ziel Schaden in Höhe der\naktuellen KP des Anwenders zufügt. Letzterer wird\ndadurch selbst besiegt."
    es: "El usuario se sacrifica causándole un daño al \nobjetivo equivalente a sus propios PS perdidos."
    ko: "목숨을 걸고 상대를 공격한다.\n자신은 기절하게 되지만 상대에게\nHP만큼의 데미지를 준다."
    zh_simp: "拼命攻击对手。\n虽然自己陷入濒死，但会给予对手\n和自己目前ＨＰ等量的伤害。"
    zh_trad: "捨身攻擊對手。\n雖然自己會陷入瀕死，但能夠給予對手\n和自己現有ＨＰ相同的傷害。"
fire_blast:
  names:
    jp_kana: だいもんじ
    jp_kanji: だいもんじ
    en: Fire Blast
    fr: Déflagration
    it: Fuocobomba
    de: Feuersturm
    es: Llamarada
    ko: 불대문자
    zh_simp: 大字爆炎
    zh_trad: 大字爆炎
  descriptions:
    jp_kana: "だいのじの　ほのおで\nあいてを　やきつくす。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense blast of\nall-consuming fire. This may also leave the target\nwith a burn."
    fr: "Un déluge de flammes ardentes submerge\nl’ennemi. Peut aussi le brûler."
    it: "Investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm\neventuell eine Verbrennung zufügt."
    es: "Llama intensa que chamusca y puede causar \nquemaduras."
    ko: "큰 대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧尽对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時會讓對手陷入灼傷狀態。"
fire_fang:
  names:
    jp_kana: ほのおのキバ
    jp_kanji: ほのおのキバ
    en: Fire Fang
    fr: Crocs Feu
    it: Rogodenti
    de: Feuerzahn
    es: Colmillo Ígneo
    ko: 불꽃엄니
    zh_simp: 火焰牙
    zh_trad: 火焰牙
  descriptions:
    jp_kana: "ほのおを　まとった　キバで　かみつく。\nあいてを　ひるませたり\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとった　キバで　かみつく。\n相手を　ひるませたり\nやけど状態に　することが　ある。"
    en: "The user bites with flame-cloaked fangs. This may\nalso make the target flinch or leave it with a burn."
    fr: "Le lanceur utilise une morsure enflammée.\nPeut aussi brûler ou apeurer l’ennemi."
    it: "Chi la usa morde con denti infuocati. Può anche\nscottare o far tentennare il bersaglio."
    de: "Anwender beißt mit flammenden Reißzähnen zu.\nZiel schreckt eventuell zurück oder erleidet\nVerbrennungen."
    es: "Usa colmillos en llamas para morder. Puede hacer \nque el objetivo retroceda o reciba quemaduras."
    ko: "불꽃을 두른 이빨로 문다.\n상대를 풀죽게 하거나\n화상 상태로 만들 때가 있다."
    zh_simp: "用覆盖着火焰的牙齿咬住对手。\n有时会使对手畏缩\n或陷入灼伤状态。"
    zh_trad: "用纏繞火焰的牙齒咬住對手。\n有時會讓對手畏縮\n或陷入灼傷狀態。"
fire_lash:
  names:
    jp_kana: ほのおのムチ
    jp_kanji: ほのおのムチ
    en: Fire Lash
    fr: Fouet de Feu
    it: Frusta di Fuoco
    de: Feuerpeitsche
    es: Látigo Ígneo
    ko: 불꽃채찍
    zh_simp: 火焰鞭
    zh_trad: 火焰鞭
  descriptions:
    jp_kana: "やけたムチで　あいてを　うちつける。\nこうげきを　うけた　あいては\nぼうぎょが　さがる。"
    jp_kanji: "焼けたムチで　相手を　打ちつける。\n攻撃を　受けた　相手は\n防御が　さがる。"
    en: "The user strikes the target with a burning lash. This\nalso lowers the target’s Defense stat."
    fr: "Frappe la cible avec un fouet incandescent\net baisse sa Défense."
    it: "Colpisce il bersaglio con una frusta infuocata\ne ne riduce la Difesa."
    de: "Der Anwender greift das Ziel mit einer brennenden\nPeitsche an und senkt dabei zusätzlich dessen\nVerteidigungs-Wert."
    es: "Golpea al oponente con un látigo incandescente y\nreduce su Defensa."
    ko: "불타는 채찍으로 상대를 친다.\n공격을 받은 상대는\n방어가 떨어진다."
    zh_simp: "用燃烧的鞭子抽打对手。\n受到攻击的对手防御会降低。"
    zh_trad: "用燃燒的鞭子抽打對手。\n受到攻擊的對手防禦會降低。"
fire_pledge:
  names:
    jp_kana: ほのおのちかい
    jp_kanji: ほのおのちかい
    en: Fire Pledge
    fr: Aire de Feu
    it: Fiammapatto
    de: Feuersäulen
    es: Voto Fuego
    ko: 불꽃의맹세
    zh_simp: 火之誓约
    zh_trad: 火之誓約
  descriptions:
    jp_kana: "ほのおの　はしらで　こうげきする。\nくさと　くみあわせると　いりょくが\nあがって　あたりが　ひの　うみに　なる。"
    jp_kanji: "炎の柱で　攻撃する。\nくさと　組みあわせると　威力が\nあがって　周りが　火の海に　なる。"
    en: "A column of fire hits the target. When used with its\ngrass equivalent, its power increases and a vast sea\nof fire appears."
    fr: "Une masse de feu s’abat sur l’ennemi.\nEn l’utilisant avec Aire d’Herbe, l’effet augmente\net une mer de feu apparaît."
    it: "Attacca il bersaglio con una colonna di fuoco.\nSe usata con Erbapatto, gli effetti aumentano\ne il campo diventa un mare di fuoco."
    de: "Ein Angriff mit Feuersäulen. Mit Pflanzensäulen\nkombiniert steigt die Wirkung und die Umgebung\nwird zu einem Meer aus Feuer."
    es: "Ataca con columnas de fuego. Combinado con\nVoto Planta, crea un mar de llamas y aumenta su \npotencia."
    ko: "불꽃기둥으로 공격한다.\n풀과 조합하면 위력이\n올라가고 주위가 불바다가 된다."
    zh_simp: "用火柱进行攻击。\n如果和草组合，威力就会提高，\n周围会变成火海。"
    zh_trad: "用火柱進行攻擊。\n和草之誓約同時使用時，威力會提高，\n周圍會變成火海。"
fire_punch:
  names:
    jp_kana: ほのおのパンチ
    jp_kanji: ほのおのパンチ
    en: Fire Punch
    fr: Poing de Feu
    it: Fuocopugno
    de: Feuerschlag
    es: Puño Fuego
    ko: 불꽃펀치
    zh_simp: 火焰拳
    zh_trad: 火焰拳
  descriptions:
    jp_kana: "ほのおを　こめた　パンチで\nあいてを　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　こめた　パンチで\n相手を　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is punched with a fiery fist. This may also\nleave the target with a burn."
    fr: "Un coup de poing enflammé vient frapper l’ennemi.\nPeut le brûler."
    it: "Colpisce il bersaglio con un pugno ardente\nche può scottarlo."
    de: "Feuriger Schlag, der dem Ziel eventuell\nVerbrennungen zufügt."
    es: Puñetazo ardiente. Puede quemar.
    ko: "불꽃을 담은 펀치로\n상대를 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用充满火焰的拳头攻击对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用帶有火焰的拳頭\n攻擊對手。\n有時會讓對手陷入灼傷狀態。"
fire_spin:
  names:
    jp_kana: ほのおのうず
    jp_kanji: ほのおのうず
    en: Fire Spin
    fr: Danse Flamme
    it: Turbofuoco
    de: Feuerwirbel
    es: Giro Fuego
    ko: 회오리불꽃
    zh_simp: 火焰旋涡
    zh_trad: 火焰旋渦
  descriptions:
    jp_kana: "はげしく　うずをまく　ほのおの　なかに\n４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　渦をまく　炎の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The target becomes trapped within a fierce vortex\nof fire that rages for four to five turns."
    fr: "Un tourbillon de flammes emprisonne l’ennemi\npendant quatre à cinq tours."
    it: "Intrappola il bersaglio in un turbine di fuoco\nche dura per quattro o cinque turni."
    de: "Das Ziel wird für vier bis fünf Runden in einem\nFeuerkreis gefangen."
    es: "Un aro de fuego que atrapa al objetivo de cuatro a \ncinco turnos."
    ko: "세차게 소용돌이치는 불꽃 속에\n4-5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n激烈的火焰旋涡中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n熊熊燃燒的火焰旋渦中，\n在４～５回合內進行攻擊。"
first_impression:
  names:
    jp_kana: であいがしら
    jp_kanji: であいがしら
    en: First Impression
    fr: Escarmouche
    it: Schermaglia
    de: Überrumpler
    es: Escaramuza
    ko: 만나자마자
    zh_simp: 迎头一击
    zh_trad: 迎頭一擊
  descriptions:
    jp_kana: "いりょくが　たかい　わざ　だが\nせんとうに　でたら\nすぐに　ださないと　せいこう　しない。"
    jp_kanji: "威力が　高い　技　だが\n戦闘に　出たら\nすぐに　出さないと　成功　しない。"
    en: "Although this move has great power, it only works\nthe first turn the user is in battle."
    fr: "Une capacité très puissante, mais qui ne fonctionne\nqu’au premier tour."
    it: "È una mossa molto potente, ma funziona\nsolo appena scesi in campo."
    de: "Eine sehr starke Attacke, die jedoch nur erfolgreich\nist, wenn sie sofort eingesetzt wird, nachdem der\nAnwender das Kampffeld betreten hat."
    es: "Movimiento de gran potencia que solo puede usarse\nen el turno en que el usuario sale al combate."
    ko: "위력이 높은 기술이지만\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "威力很高的招式，\n但只有在出场战斗时，\n立刻使出才能成功。"
    zh_trad: "招式的威力雖高，\n但只有在出場戰鬥時，\n立刻使出才能成功。"
fissure:
  names:
    jp_kana: じわれ
    jp_kanji: じわれ
    en: Fissure
    fr: Abîme
    it: Abisso
    de: Geofissur
    es: Fisura
    ko: 땅가르기
    zh_simp: 地裂
    zh_trad: 地裂
  descriptions:
    jp_kana: "じわれの　さけめに\nあいてを　おとして　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "地割れの　裂け目に\n相手を　落として　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user opens up a fissure in the ground and drops\nthe target in. The target faints instantly if this\nattack hits."
    fr: "Le lanceur fait tomber l’ennemi dans une crevasse.\nSi cette attaque réussit, elle met K.O. sur le coup."
    it: "Chi la usa crea una spaccatura nel terreno e cerca\ndi gettarvici dentro il bersaglio. Se va a segno,\nil Pokémon colpito va KO."
    de: "Das Ziel wird in eine Erdspalte geworfen. Ist die\nAttacke erfolgreich, führt sie zu einem K.O."
    es: "Abre una grieta en el suelo y mete al objetivo en ella. \nFulmina en un golpe."
    ko: "땅이 갈라진 곳에\n상대를 떨어뜨려 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "让对手掉落于地裂的\n裂缝中进行攻击。\n只要命中就会一击濒死。"
    zh_trad: "讓對手掉進地面的\n裂縫中進行攻擊。\n只要命中就會一擊瀕死。"
flail:
  names:
    jp_kana: じたばた
    jp_kanji: じたばた
    en: Flail
    fr: Fléau
    it: Flagello
    de: Dreschflegel
    es: Azote
    ko: 바둥바둥
    zh_simp: 抓狂
    zh_trad: 抓狂
  descriptions:
    jp_kana: "じたばた　あばれて　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　あがる。"
    jp_kanji: "じたばた　暴れて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "The user flails about aimlessly to attack. The less HP\nthe user has, the greater the move’s power."
    fr: "Le lanceur fait tournoyer son fléau.\nPlus ses PV sont bas, plus l’attaque est puissante."
    it: "Chi la usa si dimena per attaccare. È più efficace\nse i suoi PS sono bassi."
    de: "Attacke richtet mehr Schaden an, wenn eigene KP\nniedrig sind."
    es: "Ataque frenético. Cuantos menos PS tenga el usuario,\nmás daño producirá."
    ko: "바둥바둥 난동 부려서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "抓狂般乱打进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "抓狂般亂打進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
flame_burst:
  names:
    jp_kana: はじけるほのお
    jp_kanji: はじけるほのお
    en: Flame Burst
    fr: Rebondifeu
    it: Pirolancio
    de: Funkenflug
    es: Pirotecnia
    ko: 불꽃튀기기
    zh_simp: 烈焰溅射
    zh_trad: 烈焰濺射
  descriptions:
    jp_kana: "あたると　はじける　ほのおで　あいてを\nこうげきする。はじけた　ほのおは\nとなりの　あいてにも　ふりかかる。"
    jp_kanji: "当たると　はじける　炎で　相手を\n攻撃する。はじけた　炎は\n隣の　相手にも　ふりかかる。"
    en: "The user attacks the target with a bursting flame.\nThe bursting flame damages Pokémon next to the\ntarget as well."
    fr: "Quand l’attaque atteint sa cible, elle projette des\nflammes qui touchent tout ennemi situé à côté."
    it: "Chi la usa emana una fiammata che colpisce\nil bersaglio e si propaga fino a raggiungere\ni Pokémon vicini."
    de: "Bei Erfolg greift der Anwender mit berstenden\nFeuerblasen an. Die Funken der geplatzten Blasen\ntreffen auch benachbarte Ziele."
    es: "Golpea al objetivo con una llamarada que afecta \ntambién a los Pokémon adyacentes."
    ko: "맞으면 튀는 불꽃으로 상대를\n공격한다. 튕긴 불꽃은\n옆의 상대에게도 쏟아진다."
    zh_simp: "如果击中，爆裂的火焰会\n攻击到对手。爆裂出的火焰\n还会飞溅到旁边的对手。"
    zh_trad: "用命中後會爆裂開來的火焰\n攻擊對手。爆裂後的火焰\n也會波及到對手身旁的同伴。"
flame_charge:
  names:
    jp_kana: ニトロチャージ
    jp_kanji: ニトロチャージ
    en: Flame Charge
    fr: Nitrocharge
    it: Nitrocarica
    de: Nitroladung
    es: Nitrocarga
    ko: 니트로차지
    zh_simp: 蓄能焰袭
    zh_trad: 蓄能焰襲
  descriptions:
    jp_kana: "ほのおを　まとい　あいてを\nこうげきする。ちからを　ためて　じぶんの\nすばやさを　あげる。"
    jp_kanji: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    en: "Cloaking itself in flame, the user attacks. Then,\nbuilding up more power, the user raises its\nSpeed stat."
    fr: "Le lanceur s’entoure de flammes pour attaquer\nl’ennemi. Il se concentre et sa Vitesse augmente."
    it: "Chi la usa si copre di fuoco e attacca il bersaglio.\nConcentrandosi aumenta, inoltre, la propria\nVelocità."
    de: "Anwender hüllt sich in Flammen und greift das Ziel\nan. Sammelt seine Energie und erhöht dadurch die\neigene Initiative."
    es: "Llamas que golpean al objetivo y aumentan la \nVelocidad del atacante."
    ko: "불꽃을 둘러 상대를 공격한다.\n힘을 모아서 자신의\n스피드를 올린다."
    zh_simp: "让火焰覆盖全身，攻击对手。\n积蓄力量并提高自己的速度。"
    zh_trad: "讓火焰圍繞全身後攻擊對手。\n同時蓄積力量來提高自己的速度。"
flame_wheel:
  names:
    jp_kana: かえんぐるま
    jp_kanji: かえんぐるま
    en: Flame Wheel
    fr: Roue de Feu
    it: Ruotafuoco
    de: Flammenrad
    es: Rueda Fuego
    ko: 화염자동차
    zh_simp: 火焰轮
    zh_trad: 火焰輪
  descriptions:
    jp_kana: "ほのおを　まとい\nあいてに　とっしんして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとい\n相手に　突進して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and charges at the\ntarget. This may also leave the target with a burn."
    fr: "Le lanceur s’entoure de feu et charge l’ennemi.\nPeut aussi le brûler."
    it: "Chi la usa si copre di fuoco e carica il bersaglio.\nPuò anche scottarlo."
    de: "Feuer-Attacke, die beim Ziel eventuell\nVerbrennungen verursacht."
    es: Ataca envuelto en fuego. Puede causar quemaduras.
    ko: "불꽃을 둘러\n상대에게 돌진하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用火焰圍繞身體，\n猛撞對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
flamethrower:
  names:
    jp_kana: かえんほうしゃ
    jp_kanji: かえんほうしゃ
    en: Flamethrower
    fr: Lance-Flammes
    it: Lanciafiamme
    de: Flammenwurf
    es: Lanzallamas
    ko: 화염방사
    zh_simp: 喷射火焰
    zh_trad: 噴射火焰
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il bersaglio viene colpito da intense fiammate\nche possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede\ncausar quemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n強烈火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
flare_blitz:
  names:
    jp_kana: フレアドライブ
    jp_kanji: フレアドライブ
    en: Flare Blitz
    fr: Boutefeu
    it: Fuococarica
    de: Flammenblitz
    es: Envite Ígneo
    ko: 플레어드라이브
    zh_simp: 闪焰冲锋
    zh_trad: 閃焰衝鋒
  descriptions:
    jp_kana: "ほのおを　まとって　とっしんする。\nじぶんも　かなり　ダメージを　うける。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nやけど状態に　することが　ある。"
    en: "The user cloaks itself in fire and charges the target.\nThis also damages the user quite a lot. This attack\nmay leave the target with a burn."
    fr: "Le lanceur s’embrase avant de charger l’ennemi.\nLe choc blesse aussi gravement le lanceur.\nPeut brûler l’ennemi."
    it: "Chi la usa si ricopre di fuoco e carica il bersaglio,\nma subisce il contraccolpo. Può anche scottare\nil Pokémon colpito."
    de: "Anwender hüllt sich in Flammen und stürmt auf das\nZiel zu, das dadurch eventuell Verbrennungen\nerleidet. Anwender nimmt selbst großen Schaden."
    es: "El Pokémon se cubre de llamas y carga contra el\nobjetivo, aunque él también recibe daño. Puede\nquemar."
    ko: "불꽃을 두르고 돌진한다.\n자신도 상당한 데미지를 입는다.\n화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身猛撞向对手。\n自己也会受到不小的伤害。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將火焰圍繞全身後猛撞對手。\n自己也會受到不小的傷害。\n有時會讓對手陷入灼傷狀態。"
flash:
  names:
    jp_kana: フラッシュ
    jp_kanji: フラッシュ
    en: Flash
    fr: Flash
    it: Flash
    de: Blitz
    es: Destello
    ko: 플래시
    zh_simp: 闪光
    zh_trad: 閃光
  descriptions:
    jp_kana: "まぶしい　ひかりで　あいての\nめいちゅうりつを　さげる。"
    jp_kanji: "まぶしい　光で　相手の\n命中率を　さげる。"
    en: "The user flashes a bright light that cuts the\ntarget’s accuracy."
    fr: "Explosion lumineuse qui fait baisser la Précision\nde l’ennemi."
    it: "Investe il bersaglio con una luce abbagliante\nche ne riduce la precisione."
    de: "Erzeugt helles Licht, das die Genauigkeit des Zieles\nsenkt."
    es: Luz cegadora que baja la Precisión del objetivo.
    ko: "눈이 부신 빛으로 상대의\n명중률을 떨어뜨린다."
    zh_simp: "使出耀眼光芒，\n从而降低对手的命中率。"
    zh_trad: "放出耀眼的光芒，\n降低對手的命中率。"
flash_cannon:
  names:
    jp_kana: ラスターカノン
    jp_kanji: ラスターカノン
    en: Flash Cannon
    fr: Luminocanon
    it: Cannonflash
    de: Lichtkanone
    es: Foco Resplandor
    ko: 러스터캐논
    zh_simp: 加农光炮
    zh_trad: 加農光炮
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに　あつめて\nちからを　はなつ。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it\nall at once. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse et\nla fait exploser. Peut aussi baisser la Défense\nSpéciale de l’ennemi."
    it: "Chi la usa attacca raccogliendo e rilasciando\nenergia luminosa. Può ridurre la Difesa Speciale\ndel bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede bajar la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 쏜다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
flatter:
  names:
    jp_kana: おだてる
    jp_kanji: おだてる
    en: Flatter
    fr: Flatterie
    it: Adulazione
    de: Schmeichler
    es: Camelo
    ko: 부추기기
    zh_simp: 吹捧
    zh_trad: 吹捧
  descriptions:
    jp_kana: "あいてを　おだてて　こんらん　させる。\nどうじに　あいての　とくこうも\nあげて　しまう。"
    jp_kanji: "相手を　おだてて　混乱させる。\n同時に　相手の　特攻も\nあげてしまう。"
    en: "Flattery is used to confuse the target. However,\nthis also raises the target’s Sp. Atk stat."
    fr: "Rend la cible confuse, mais augmente son\nAttaque Spéciale."
    it: "Adula il bersaglio e lo confonde, ma ne aumenta\nl’Attacco Speciale."
    de: "Schmeichelt dem Ziel, um es zu verwirren.\nErhöht dessen Spezial-Angriff."
    es: "Halaga al objetivo y lo confunde, pero también \nsube su Ataque Especial."
    ko: "상대를 부추겨서 혼란시킨다.\n동시에 상대의 특수공격도\n올라가 버린다."
    zh_simp: "吹捧对手，使其混乱。\n同时还会提高对手的特攻。"
    zh_trad: "吹捧對手，使其混亂。\n同時還會提高對手的特攻。"
fleur_cannon:
  names:
    jp_kana: フルールカノン
    jp_kanji: フルールカノン
    en: Fleur Cannon
    fr: Canon Floral
    it: Cannonfiore
    de: Kanonenbouquet
    es: Cañón Floral
    ko: 플뢰르캐논
    zh_simp: 花朵加农炮
    zh_trad: 花朵加農炮
  descriptions:
    jp_kana: "きょうりょくな　ビームを　はなったあと\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "強力な　ビームを　放ったあと\n自分の　特攻が　がくっと　さがる。"
    en: "The user unleashes a strong beam. The attack’s\nrecoil harshly lowers the user’s Sp. Atk stat."
    fr: "Envoie un rayon laser dévastateur.\nBaisse beaucoup l’Attaque Spéciale du lanceur."
    it: "Colpisce il bersaglio con un potente raggio,\nma riduce di molto l’Attacco Speciale di chi\nla usa."
    de: "Der Anwender greift das Ziel mit einem gewaltigen\nStrahl an. Sein eigener Spezial-Angriff sinkt dadurch\nstark."
    es: "El usuario emite un potente rayo, pero su Ataque\nEspecial se reduce mucho."
    ko: "강력한 빔을 발산한 후\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "放出强力光束后，\n自己的特攻会大幅降低。"
    zh_trad: "放出強力光束後，\n自己的特攻會大幅降低。"
fling:
  names:
    jp_kana: なげつける
    jp_kanji: なげつける
    en: Fling
    fr: Dégommage
    it: Lancio
    de: Schleuder
    es: Lanzamiento
    ko: 내던지기
    zh_simp: 投掷
    zh_trad: 投擲
  descriptions:
    jp_kana: "もたせた　どうぐを\nすばやく　なげつけて　こうげきする。\nどうぐで　いりょくと　こうかが　かわる。"
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　変わる。"
    en: "The user flings its held item at the target to attack.\nThis move’s power and effects depend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient sur l’ennemi.\nLa puissance et les effets dépendent de l’objet."
    it: "Chi la usa lancia il suo strumento addosso\nal bersaglio. La forza e l’effetto dipendono\ndallo strumento."
    de: "Anwender schleudert sein Item auf das Ziel.\nStärke und Effekt der Attacke hängen vom Item ab."
    es: "Lanza contra el objetivo el objeto que lleva. La\nfuerza del ataque y su efecto varían según el objeto."
    ko: "지니게 한 도구를\n재빠르게 내던져서 공격한다.\n도구에 따라 위력과 효과가 바뀐다."
    zh_simp: "快速投掷携带的道具进行攻击。\n根据道具不同，\n威力和效果会改变。"
    zh_trad: "快速投擲攜帶的道具進行攻擊。\n招式威力和效果會隨著\n道具不同而改變。"
floral_healing:
  names:
    jp_kana: フラワーヒール
    jp_kanji: フラワーヒール
    en: Floral Healing
    fr: Soin Floral
    it: Cura Floreale
    de: Florakur
    es: Cura Floral
    ko: 플라워힐
    zh_simp: 花疗
    zh_trad: 花療
  descriptions:
    jp_kana: "さいだい　ＨＰの　はんぶん\nあいての　ＨＰを　かいふく　する。\nグラスフィールドのとき　こうかが　あがる。"
    jp_kanji: "最大ＨＰの　半分\n相手の　ＨＰを　回復する。\nグラスフィールドの時　効果が　あがる。"
    en: "The user restores the target’s HP by up to half of its\nmax HP. It restores more HP when the terrain\nis grass."
    fr: "Rend la moitié de ses PV max à la cible.\nPlus efficace sur un Champ Herbu."
    it: "Fa recuperare metà dei PS massimi al bersaglio.\nÈ più efficace quando il terreno di lotta è nello\nstato di Campo Erboso."
    de: "KP des Zieles werden um 50 % der maximalen KP\naufgefüllt. Die Wirkung steigt, wenn der Untergrund\nin ein Grasfeld verwandelt wurde."
    es: "Restaura la mitad de los PS máximos del objetivo.\nEs más efectivo cuando se usa en conjunción con\nCampo de Hierba."
    ko: "최대 HP의 절반만큼\n상대의 HP를 회복한다.\n그래스필드일 때 효과가 올라간다."
    zh_simp: "回复对手最大ＨＰ的一半。\n在青草场地时，效果会提高。"
    zh_trad: "回復對手最大ＨＰ的一半。\n在青草場地時，效果會提高。"
flower_shield:
  names:
    jp_kana: フラワーガード
    jp_kanji: フラワーガード
    en: Flower Shield
    fr: Garde Florale
    it: Fiordifesa
    de: Floraschutz
    es: Defensa Floral
    ko: 플라워가드
    zh_simp: 鲜花防守
    zh_trad: 鮮花防守
  descriptions:
    jp_kana: "ふしぎな　ちからを　つかって\nばにいる　くさタイプの　ポケモン\nぜんいんの　ぼうぎょを　あげる。"
    jp_kanji: "不思議な　力を　使って\n場にいる　くさタイプの　ポケモン\n全員の　防御を　あげる。"
    en: "The user raises the Defense stat of all Grass-type\nPokémon in battle with a mysterious power."
    fr: "Grâce à une force mystérieuse, la Défense de tous\nles Pokémon Plante au combat augmente."
    it: "Grazie a un misterioso potere, aumenta la Difesa\ndi tutti i Pokémon di tipo Erba presenti in campo."
    de: "Erhöht mit einer mysteriösen Macht die Verteidigung\naller am Kampf beteiligten Pflanzen-Pokémon."
    es: "Aumenta la Defensa de todos los Pokémon de tipo \nPlanta que hay en el combate usando unos\nmisteriosos poderes."
    ko: "이상한 힘을 사용하여\n배틀에 나와 있는 모든\n풀타입 포켓몬의 방어를 올린다."
    zh_simp: "使用神奇的力量\n提高在场的所有\n草属性宝可梦的防御。"
    zh_trad: "使用神奇的力量，\n提高場上全體\n草屬性寶可夢的防禦。"
fly:
  names:
    jp_kana: そらをとぶ
    jp_kanji: そらをとぶ
    en: Fly
    fr: Vol
    it: Volo
    de: Fliegen
    es: Vuelo
    ko: 공중날기
    zh_simp: 飞翔
    zh_trad: 飛翔
  descriptions:
    jp_kana: "１ターンめで　そらへ　とび\n２ターンめに　あいてを　こうげきする。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。"
    en: "The user soars and then strikes its target on the\nnext turn."
    fr: "Le lanceur s’envole au premier tour et frappe au\nsecond."
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente."
    de: "Steigt in Runde 1 empor und trifft das Ziel in\nRunde 2."
    es: Vuela en el primer turno y ataca en el segundo.
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。"
flying_press:
  names:
    jp_kana: フライングプレス
    jp_kanji: フライングプレス
    en: Flying Press
    fr: Flying Press
    it: Schiacciatuffo
    de: Flying Press
    es: Plancha Voladora
    ko: 플라잉프레스
    zh_simp: 飞身重压
    zh_trad: 飛身重壓
  descriptions:
    jp_kana: "くうちゅうから　あいてに　ダイブする。\nこのわざは　かくとうタイプと　どうじに\nひこうタイプでも　ある。"
    jp_kanji: "空中から　相手に　ダイブする。\nこの技は　かくとうタイプと　同時に\nひこうタイプでも　ある。"
    en: "The user dives down onto the target from the sky.\nThis move is Fighting and Flying type simultaneously."
    fr: "Une attaque en piqué depuis le ciel, à la fois de\ntype Combat et de type Vol."
    it: "Chi la usa si tuffa sul bersaglio dall’alto. È una\nmossa di tipo Lotta e Volante allo stesso tempo."
    de: "Der Anwender stürzt sich aus der Luft auf das Ziel.\nDie Attacke gehört sowohl dem Typ Kampf als auch\ndem Typ Flug an."
    es: "El Pokémon que lo usa se lanza sobre su oponente. \nEste movimiento es de tipo Lucha y tipo Volador al \nmismo tiempo."
    ko: "공중에서 상대에게 다이브한다.\n이 기술은 격투타입임과 동시에\n비행타입이기도 하다."
    zh_simp: "从空中俯冲向对手。\n此招式同时带有\n格斗属性和飞行属性。"
    zh_trad: "從空中俯衝向對手進行攻擊。\n此招式同時具有\n格鬥屬性和飛行屬性。"
focus_blast:
  names:
    jp_kana: きあいだま
    jp_kanji: きあいだま
    en: Focus Blast
    fr: Exploforce
    it: Focalcolpo
    de: Fokusstoß
    es: Onda Certera
    ko: 기합구슬
    zh_simp: 真气弹
    zh_trad: 真氣彈
  descriptions:
    jp_kana: "きあいを　たかめて　こんしんの　ちからを\nほうしゅつする。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and unleashes\nits power. This may also lower the target’s \nSp. Def stat."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del Pokémon\ncolpito."
    de: "Anwender erhöht seinen mentalen Fokus und greift\ndann an. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Agudiza la concentración mental y libera su poder. \nPuede disminuir la Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時會降低對手的特防。"
focus_energy:
  names:
    jp_kana: きあいだめ
    jp_kanji: きあいだめ
    en: Focus Energy
    fr: Puissance
    it: Focalenergia
    de: Energiefokus
    es: Foco Energía
    ko: 기충전
    zh_simp: 聚气
    zh_trad: 聚氣
  descriptions:
    jp_kana: "ふかく　いきを　すい　きあいを　こめる。\nじぶんの　こうげきが\nきゅうしょに　あたりやすく　なる。"
    jp_kanji: "深く　息を　吸い　気合を　こめる。\n自分の　攻撃が\n急所に　当たりやすくなる。"
    en: "The user takes a deep breath and focuses so that\ncritical hits land more easily."
    fr: "Le lanceur prend une profonde inspiration et se\nconcentre pour augmenter son taux de critique."
    it: "Chi la usa fa un profondo respiro e si concentra\nper rendere più probabili i brutti colpi."
    de: "Anwender atmet ein und bündelt Kraft.\nDie Volltrefferquote steigt dadurch."
    es: "Concentra energía para aumentar las posibilidades \nde un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n자신의 공격이\n급소에 맞기 쉬워진다."
    zh_simp: "深深地吸口气，集中精神。\n自己的攻击\n会变得容易击中要害。"
    zh_trad: "深呼吸後集中精神。\n讓自己的攻擊\n變得容易擊中要害。"
focus_punch:
  names:
    jp_kana: きあいパンチ
    jp_kanji: きあいパンチ
    en: Focus Punch
    fr: Mitra-Poing
    it: Centripugno
    de: Power-Punch
    es: Puño Certero
    ko: 힘껏펀치
    zh_simp: 真气拳
    zh_trad: 真氣拳
  descriptions:
    jp_kana: "せいしんを　たかめて　パンチを\nくりだす。　わざを　だす　までに\nこうげきを　うけると　しっぱい　する。"
    jp_kanji: "精神を　高めて　パンチを　くりだす。\n技を　だすまでに\n攻撃を　受けると　失敗する。"
    en: "The user focuses its mind before launching a punch.\nThis move fails if the user is hit before it is used."
    fr: "Le lanceur se concentre avant d’attaquer.\nÉchoue s’il est touché avant d’avoir frappé."
    it: "Chi la usa prende la mira prima di sferrare\nun pugno. Fallirà se verrà colpito prima\ndi eseguire la mossa."
    de: "Anwender konzentriert sich, bevor er angreift.\nWird er vorher getroffen, ist die Attacke erfolglos."
    es: "Se concentra para dar un puñetazo. Falla si se \nsufre un golpe antes de su uso."
    ko: "정신력을 높여 펀치를 날린다.\n기술을 쓰기 전에\n공격을 받으면 실패한다."
    zh_simp: "集中精神出拳。\n在招式使出前\n若受到攻击则会失败。"
    zh_trad: "集中精神後出拳。\n若出拳前受到攻擊，\n則會失敗。"
follow_me:
  names:
    jp_kana: このゆびとまれ
    jp_kanji: このゆびとまれ
    en: Follow Me
    fr: Par Ici
    it: Sonoqui
    de: Spotlight
    es: Señuelo
    ko: 날따름
    zh_simp: 看我嘛
    zh_trad: 看我嘛
  descriptions:
    jp_kana: "じぶんに　ちゅうもく　させて\nあいてからの　こうげきを\nすべて　じぶんに　むけさせる。"
    jp_kanji: "自分に　注目させて\n相手からの　攻撃を\nすべて　自分に　むけさせる。"
    en: "The user draws attention to itself, making all targets\ntake aim only at the user."
    fr: "Attire l’attention des ennemis pour les forcer à\nn’attaquer que le lanceur."
    it: "Chi la usa attira l’attenzione su di sé, costringendo \ni nemici a sceglierlo sempre come bersaglio."
    de: "Zieht Aufmerksamkeit auf sich. Gegner greift nur\nAnwender an."
    es: "Llama la atención para concentrar todos los\nataques de todos los del equipo rival hacia sí\nmismo."
    ko: "자신에게 주목시켜\n상대로부터의 공격을\n모두 자신에게 향하게 한다."
    zh_simp: "引起对手的注意，\n将对手的攻击\n全部转移到自己身上。"
    zh_trad: "吸引對手的注意，\n將對手的攻擊\n全部轉移到自己身上。"
force_palm:
  names:
    jp_kana: はっけい
    jp_kanji: はっけい
    en: Force Palm
    fr: Forte-Paume
    it: Palmoforza
    de: Kraftwelle
    es: Palmeo
    ko: 발경
    zh_simp: 发劲
    zh_trad: 發勁
  descriptions:
    jp_kana: "あいての　からだに\nしょうげきはを　あてて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "相手の　体に\n衝撃波を　当てて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is attacked with a shock wave. This may\nalso leave the target with paralysis."
    fr: "Une onde de choc frappe l’ennemi.\nPeut aussi paralyser la cible."
    it: "Chi la usa attacca con un’onda d’urto che\npuò anche paralizzare il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie es eventuell paralysiert."
    es: "Ataca al objetivo con una onda de choque y puede \nllegar a paralizarlo."
    ko: "상대의 몸에\n충격파를 부딪쳐 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手的身体\n发出冲击波进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手的身體\n發出衝擊波進行攻擊。\n有時會讓對手陷入麻痺狀態。"
foresight:
  names:
    jp_kana: みやぶる
    jp_kanji: みやぶる
    en: Foresight
    fr: Clairvoyance
    it: Preveggenza
    de: Gesichte
    es: Profecía
    ko: 꿰뚫어보기
    zh_simp: 识破
    zh_trad: 識破
  descriptions:
    jp_kana: "ゴーストタイプに　こうかがない　わざや\nかいひりつの　たかい　あいてに\nこうげきが　あたるように　なる。"
    jp_kanji: "ゴーストタイプに　効果がない　技や\n回避率の　高い　相手に\n攻撃が　当たるように　なる。"
    en: "Enables a Ghost-type target to be hit by Normal-\nand Fighting-type attacks. This also enables an\nevasive target to be hit."
    fr: "Permet de toucher un Pokémon Spectre avec\nn’importe quelle capacité ou de toucher un\nennemi insaisissable."
    it: "Chi la usa rende i Pokémon di tipo Spettro\nvulnerabili a qualsiasi tipo di mossa e può,\ninoltre, colpire i nemici sfuggenti."
    de: "Ermöglicht es, Geister-Pokémon mit Normal- und\nKampf-Attacken anzugreifen. Ignoriert den\nFluchtwert des Zieles."
    es: "Permite atacar con cualquier movimiento a objetivos \nde tipo Fantasma y golpear a Pokémon evasivos."
    ko: "고스트타입에 효과가 없는 기술이나\n회피율이 높은 상대라 할지라도\n공격이 맞게 된다."
    zh_simp: "对幽灵属性宝可梦没有效果的招式\n以及闪避率高的对手，\n使用后变得能够打中。"
    zh_trad: "讓對幽靈屬性寶可夢無效的招式\n能夠發揮效果，也可不顧對手\n提高後的閃避率進行攻擊。"
forests_curse:
  names:
    jp_kana: もりののろい
    jp_kanji: もりののろい
    en: Forest’s Curse
    fr: Maléfice Sylvain
    it: Boscomalocchio
    de: Waldesfluch
    es: Condena Silvana
    ko: 숲의저주
    zh_simp: 森林诅咒
    zh_trad: 森林詛咒
  descriptions:
    jp_kana: "あいてに　もりののろいを　かける。\nのろいを　かけられた　あいては\nタイプに　くさタイプが　ついかされる。"
    jp_kanji: "相手に　森ののろいを　かける。\nのろいを　かけられた　相手は\nタイプに　くさタイプが　追加される。"
    en: "The user puts a forest curse on the target.\nThe target is now Grass type as well."
    fr: "La cible est charmée par l’esprit de la forêt.\nLe type Plante est ajouté à ses types actuels."
    it: "Chi la usa invoca la maledizione del bosco sul\nbersaglio, che acquisisce così anche il tipo Erba."
    de: "Der Anwender belegt das Ziel mit einem Waldesfluch,\ndurch den dieses zusätzlich den Typ Pflanze\nannimmt."
    es: "El objetivo es presa de la maldición del bosque,\npor lo que pasa a ser un Pokémon de tipo Planta, \nademás de conservar sus tipos habituales."
    ko: "상대에게 숲의 저주를 건다.\n저주에 걸린 상대는\n타입에 풀타입이 추가된다."
    zh_simp: "向对手施加森林诅咒。\n中了诅咒的对手\n会被追加草属性。"
    zh_trad: "向對手施加森林詛咒。\n中了詛咒的對手\n會被追加草屬性。"
foul_play:
  names:
    jp_kana: イカサマ
    jp_kanji: イカサマ
    en: Foul Play
    fr: Tricherie
    it: Ripicca
    de: Schmarotzer
    es: Juego Sucio
    ko: 속임수
    zh_simp: 欺诈
    zh_trad: 欺詐
  descriptions:
    jp_kana: "あいての　ちからを　りようする。\nたたかっている　あいての　こうげきが\nたかいほど　ダメージが　あがる。"
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s power against it. The\nhigher the target’s Attack stat, the greater the\nmove’s power."
    fr: "Le lanceur utilise la force de l’ennemi.\nPlus l’Attaque de l’ennemi est élevée, plus le lanceur\ninflige de dégâts."
    it: "Chi la usa sfrutta la forza del bersaglio. Il danno\ninflitto è proporzionale all’Attacco del nemico."
    de: "Anwender macht sich die Kraft des Zieles zunutze.\nJe höher dessen Angriff, desto mehr Schaden richtet\ndie Attacke an."
    es: "El usuario emplea la fuerza del objetivo para \natacarlo. Cuanto mayor es el Ataque del objetivo,\nmás daño provoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
    zh_simp: "利用对手的力量进行攻击。\n正和自己战斗的对手，\n其攻击越高，伤害越大。"
    zh_trad: "利用對手的力量進行攻擊。\n對手的攻擊越高，\n給予對手的傷害越大。"
freeze_dry:
  names:
    jp_kana: フリーズドライ
    jp_kanji: フリーズドライ
    en: Freeze-Dry
    fr: Lyophilisation
    it: Liofilizzazione
    de: Gefriertrockner
    es: Liofilización
    ko: 프리즈드라이
    zh_simp: 冷冻干燥
    zh_trad: 冷凍乾燥
  descriptions:
    jp_kana: "あいてを　きゅうげきに　ひやして\nこおり　じょうたいに　することが　ある。\nみずタイプにも　こうかばつぐんに　なる。"
    jp_kanji: "相手を　急激に　冷やして\nこおり　状態に　することが　ある。\nみずタイプにも　効果バツグンになる。"
    en: "The user rapidly cools the target. This may also\nleave the target frozen. This move is super effective\non Water types."
    fr: "Refroidit violemment l’ennemi et peut le geler.\nSuper efficace sur les Pokémon de type Eau."
    it: "Chi la usa raffredda istantaneamente il bersaglio\ne può congelarlo. Risulta superefficace contro\ni Pokémon di tipo Acqua."
    de: "Das Ziel wird stark abgekühlt und manchmal sogar\neingefroren. Die Attacke ist sehr effektiv gegen\nWasser-Pokémon."
    es: "Enfría súbitamente al objetivo e incluso puede \ncongelarlo. Es supereficaz contra Pokémon de \ntipo Agua."
    ko: "상대를 급격히 차갑게 하여\n얼음 상태로 만들 때가 있다.\n물타입 포켓몬에게도 효과가 굉장해진다."
    zh_simp: "急剧冷冻对手，\n有时会让对手陷入冰冻状态。\n对于水属性宝可梦也是效果绝佳。"
    zh_trad: "急速冷凍對手，\n有時會讓對手陷入冰凍狀態。\n對水屬性寶可夢也是效果絕佳。"
freeze_shock:
  names:
    jp_kana: フリーズボルト
    jp_kanji: フリーズボルト
    en: Freeze Shock
    fr: Éclair Gelé
    it: Elettrogelo
    de: Frostvolt
    es: Rayo Gélido
    ko: 프리즈볼트
    zh_simp: 冰冻伏特
    zh_trad: 冰凍伏特
  descriptions:
    jp_kana: "でんきを　まとった　こおりの　かたまりで\n２ターンめに　あいてを　たたきつける。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　まとった　氷の　塊で\n２ターン目に　相手を　たたきつける。\nまひ状態に　することが　ある。"
    en: "On the second turn, the user hits the target with\nelectrically charged ice. This may also leave the\ntarget with paralysis."
    fr: "Projette un bloc de glace électrifié sur l’ennemi au\nsecond tour. Peut aussi le paralyser."
    it: "Chi la usa lancia contro il bersaglio al turno\nsuccessivo una sfera di ghiaccio ricoperta di\nelettricità. Può anche paralizzarlo."
    de: "Feuert in der zweiten Runde elektrisch geladene\nEisklumpen auf das Ziel ab. Paralysiert das Ziel\neventuell."
    es: "El usuario carga un bloque de hielo con electricidad \nen el primer turno y ataca con él en el segundo.\nPuede paralizar."
    ko: "전기를 두른 얼음덩어리로\n2턴째에 상대를 내리친다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用覆盖着电流的冰块，\n在第２回合撞向对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "製造出帶有電流的冰塊，\n在下一回合攻擊對手。\n有時會讓對手陷入麻痺狀態。"
frenzy_plant:
  names:
    jp_kana: ハードプラント
    jp_kanji: ハードプラント
    en: Frenzy Plant
    fr: Végé-Attak
    it: Radicalbero
    de: Flora-Statue
    es: Planta Feroz
    ko: 하드플랜트
    zh_simp: 疯狂植物
    zh_trad: 瘋狂植物
  descriptions:
    jp_kana: "おおきな　じゅもくで\nあいてを　たたきつけて　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "大きな　樹木で\n相手を　たたきつけて　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user slams the target with an enormous tree.\nThe user can’t move on the next turn."
    fr: "Un violent coup de racines s’abat sur l’ennemi.\nImmobilise le lanceur au tour suivant."
    it: "Un groviglio di radici colpisce il bersaglio.\nChi la usa salta il turno successivo."
    de: "Mächtiger Angriff mit Ästen. Der Angreifer muss eine\nRunde aussetzen."
    es: "Golpea con una enorme planta. Quien lo usa no \npuede moverse en el siguiente turno."
    ko: "큰 나무로\n상대를 힘껏 쳐서 공격한다.\n다음 턴은 움직일 수 없게 된다."
    zh_simp: "用大树摔打对手进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "將大大的樹木\n甩向對手進行攻擊。\n下一回合自己將無法動彈。"
frost_breath:
  names:
    jp_kana: こおりのいぶき
    jp_kanji: こおりのいぶき
    en: Frost Breath
    fr: Souffle Glacé
    it: Alitogelido
    de: Eisesodem
    es: Vaho Gélido
    ko: 얼음숨결
    zh_simp: 冰息
    zh_trad: 冰息
  descriptions:
    jp_kana: "つめたい　いきを\nあいてに　ふきつけて　こうげきする。\nかならず　きゅうしょに　あたる。"
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user blows its cold breath on the target. This\nattack always results in a critical hit."
    fr: "Un souffle froid blesse l’ennemi.\nL’effet est toujours critique."
    it: "Chi la usa attacca il bersaglio con un soffio\nd’aria gelida. Brutto colpo assicurato."
    de: "Anwender greift an, indem er dem Ziel eisigen Atem\nentgegenhaucht. Volltreffergarantie."
    es: "Quien lo usa ataca lanzando un aliento gélido.\nSiempre asesta un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
    zh_simp: "将冰冷的气息\n吹向对手进行攻击。\n必定会击中要害。"
    zh_trad: "將冰冷的氣息\n吹向對手進行攻擊。\n必定會擊中要害。"
frustration:
  names:
    jp_kana: やつあたり
    jp_kanji: やつあたり
    en: Frustration
    fr: Frustration
    it: Frustrazione
    de: Frustration
    es: Frustración
    ko: 화풀이
    zh_simp: 迁怒
    zh_trad: 遷怒
  descriptions:
    jp_kana: "ふまんを　はらすため　ぜんりょくで\nあいてを　こうげきする。なついて\nいないほど　いりょくは　あがる。"
    jp_kanji: "不満を　はらすため　全力で\n相手を　攻撃する。\nなついていないほど　威力は　あがる。"
    en: "This full-power attack grows more powerful the\nless the user likes its Trainer."
    fr: "Moins le Pokémon aime son Dresseur, plus cette\nattaque est puissante."
    it: "Mossa che diventa tanto più potente quanto\nminore è il grado di affezione del Pokémon\nper il proprio Allenatore."
    de: "Die Attacke wird stärker, je weniger der Anwender\nseinen Trainer mag."
    es: "Cuanto menor sea la amistad con el Entrenador, más \npoderoso será este ataque."
    ko: "불만을 풀기 위해 전력으로\n상대를 공격한다.\n친밀하지 않을수록 위력이 올라간다."
    zh_simp: "为了发泄不满而\n全力攻击对手。\n亲密度越低，威力越大。"
    zh_trad: "為了發洩不滿而\n全力攻擊對手。\n親密度越低，威力越大。"
fury_attack:
  names:
    jp_kana: みだれづき
    jp_kanji: みだれづき
    en: Fury Attack
    fr: Furie
    it: Furia
    de: Furienschlag
    es: Ataque Furia
    ko: 마구찌르기
    zh_simp: 乱击
    zh_trad: 亂擊
  descriptions:
    jp_kana: "つのや　くちばしで\nあいてを　つついて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "つのや　くちばしで\n相手を　つついて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The target is jabbed repeatedly with a horn or beak\ntwo to five times in a row."
    fr: "Frappe l’ennemi deux à cinq fois d’affilée avec\nun bec ou une corne, par exemple."
    it: "Infilza il bersaglio con corna affilate o con il becco\nda due a cinque volte di fila."
    de: "Spießt das Ziel zwei- bis fünfmal mit spitzem Horn\noder Schnabel auf."
    es: Cornea al objetivo de dos a cinco veces.
    ko: "뿔이나 부리로\n상대를 찔러서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用角或喙\n刺向对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用角或喙\n刺向對手進行攻擊。\n連續攻擊２～５次。"
fury_cutter:
  names:
    jp_kana: れんぞくぎり
    jp_kanji: れんぞくぎり
    en: Fury Cutter
    fr: Taillade
    it: Tagliofuria
    de: Zornklinge
    es: Corte Furia
    ko: 연속자르기
    zh_simp: 连斩
    zh_trad: 連斬
  descriptions:
    jp_kana: "カマや　ツメ　などで　あいてを\nきりつけて　こうげきする。　れんぞくで\nあてると　いりょくが　あがる。"
    jp_kanji: "カマや　ツメなどで　相手を\n切りつけて　攻撃する。\n連続で　当てると　威力が　あがる。"
    en: "The target is slashed with scythes or claws. This\nattack becomes more powerful if it hits\nin succession."
    fr: "Un coup de faux ou de griffe dont la force augmente\nquand il touche plusieurs fois d’affilée."
    it: "Colpisce il bersaglio con falci o artigli. Se usata\nin successione aumenta di potenza ogni volta\nche va a segno."
    de: "Eine Attacke mit Scheren oder Klauen, deren Härte\nbei aufeinanderfolgenden Treffern zunimmt."
    es: "Ataque con garras o guadaña que crece en\nintensidad si se usa repetidas veces."
    ko: "낫이나 발톱 등으로 상대를\n베어 공격한다.\n연속으로 맞히면 위력이 올라간다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。\n连续击中，威力就会提高。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。\n連續命中時威力會提高。"
fury_swipes:
  names:
    jp_kana: みだれひっかき
    jp_kanji: みだれひっかき
    en: Fury Swipes
    fr: Combo-Griffe
    it: Sfuriate
    de: Kratzfurie
    es: Golpes Furia
    ko: 마구할퀴기
    zh_simp: 乱抓
    zh_trad: 亂抓
  descriptions:
    jp_kana: "ツメや　カマなどで\nあいてを　ひっかいて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "ツメや　カマなどで\n相手を　ひっかいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The target is raked with sharp claws or scythes\nquickly two to five times in a row."
    fr: "L’ennemi est lacéré par des faux ou des griffes\nde deux à cinq fois d’affilée."
    it: "Colpisce il bersaglio con artigli o falci affilate\nda due a cinque volte in rapida successione."
    de: "Beharkt das Ziel zwei- bis fünfmal mit scharfen\nKlauen oder Sicheln."
    es: Araña rápidamente de dos a cinco veces.
    ko: "손톱이나 낫 등으로\n상대를 할퀴어서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用爪子或镰刀等\n抓对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用爪子或鐮刀等\n向對手進行攻擊。\n可連續攻擊２～５次。"
fusion_bolt:
  names:
    jp_kana: クロスサンダー
    jp_kanji: クロスサンダー
    en: Fusion Bolt
    fr: Éclair Croix
    it: Incrotuono
    de: Kreuzdonner
    es: Rayo Fusión
    ko: 크로스썬더
    zh_simp: 交错闪电
    zh_trad: 交錯閃電
  descriptions:
    jp_kana: "きょだいな　いかずちを　たたきつける。\nきょだいな　ほのおの　えいきょうをうけ\nわざの　いりょくが　あがる。"
    jp_kanji: "巨大な　雷を　たたきつける。\n巨大な　炎の　影響を受け\n技の　威力が　あがる。"
    en: "The user throws down a giant lightning bolt. This\nmove’s power is increased when influenced by an\nenormous flame."
    fr: "Projette un orbe électrique gigantesque.\nL’effet augmente sous l’influence de Flamme Croix."
    it: "Chi la usa lancia un fulmine enorme. Se usata in\ncombinazione con Incrofiamma, il danno provocato\ndalla mossa aumenta."
    de: "Feuert einen monströsen Blitz ab. Wird die Attacke\ndurch eine gigantische Flamme modifiziert, steigt die\nStärke."
    es: "Ataca con una enorme descarga eléctrica. Aumenta \nsu potencia si es influenciada por una gigantesca \nllamarada."
    ko: "거대한 천둥을 내리친다.\n거대한 불꽃의 영향을 받아\n기술의 위력이 올라간다."
    zh_simp: "释放出巨大的闪电。\n受到巨大的火焰影响时，\n招式威力会提高。"
    zh_trad: "放出巨大的閃電攻擊對手。\n受到巨大的火焰影響時，\n招式的威力會提高。"
fusion_flare:
  names:
    jp_kana: クロスフレイム
    jp_kanji: クロスフレイム
    en: Fusion Flare
    fr: Flamme Croix
    it: Incrofiamma
    de: Kreuzflamme
    es: Llama Fusión
    ko: 크로스플레임
    zh_simp: 交错火焰
    zh_trad: 交錯火焰
  descriptions:
    jp_kana: "きょだいな　ほのおを　たたきつける。\nきょだいな　いかずちの　えいきょうをうけ\nわざの　いりょくが　あがる。"
    jp_kanji: "巨大な　炎を　たたきつける。\n巨大な　雷の　影響を受け\n技の　威力が　あがる。"
    en: "The user brings down a giant flame. This move’s\npower is increased when influenced by an enormous\nlightning bolt."
    fr: "Projette une boule de feu gigantesque.\nL’effet augmente sous l’influence d’Éclair Croix."
    it: "Chi la usa lancia una fiammata enorme. Se usata in\ncombinazione con Incrotuono, il danno provocato\ndalla mossa aumenta."
    de: "Feuert eine monströse Flamme ab. Wird die Attacke\ndurch einen gigantischen Blitz modifiziert, steigt die\nStärke."
    es: "Ataca con una llamarada gigantesca. Aumenta su \npotencia si es influenciada por una gran energía\neléctrica."
    ko: "거대한 불꽃을 내리친다.\n거대한 천둥의 영향을 받아\n기술의 위력이 올라간다."
    zh_simp: "释放出巨大的火焰。\n受到巨大的闪电影响时，\n招式威力会提高。"
    zh_trad: "放出巨大的火焰攻擊對手。\n受到巨大的閃電影響時，\n招式的威力會提高。"
future_sight:
  names:
    jp_kana: みらいよち
    jp_kanji: みらいよち
    en: Future Sight
    fr: Prescience
    it: Divinazione
    de: Seher
    es: Premonición
    ko: 미래예지
    zh_simp: 预知未来
    zh_trad: 預知未來
  descriptions:
    jp_kana: "わざを　つかった　２ターン　あとに\nあいてに　ねんりきの\nかたまりを　おくって　こうげきする。"
    jp_kanji: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    en: "Two turns after this move is used, a hunk of psychic\nenergy attacks the target."
    fr: "De l’énergie psychique vient frapper l’ennemi\ndeux tours après l’utilisation de cette capacité."
    it: "Due turni dopo l’utilizzo di questa mossa,\nil bersaglio viene attaccato con energia psichica."
    de: "Zwei Runden, nachdem Seher eingesetzt wurde,\nerfolgt der Angriff."
    es: "Concentra energía psíquica para golpear al objetivo \ndos turnos después."
    ko: "기술을 사용한 2턴 뒤에\n상대에게 염동력의\n덩어리를 보내어 공격한다."
    zh_simp: "在使用招式２回合后，\n向对手发送一团念力进行攻击。"
    zh_trad: "使用招式的２回合後，\n向對手發送一團念力進行攻擊。"
gastro_acid:
  names:
    jp_kana: いえき
    jp_kanji: いえき
    en: Gastro Acid
    fr: Suc Digestif
    it: Gastroacido
    de: Magensäfte
    es: Bilis
    ko: 위액
    zh_simp: 胃液
    zh_trad: 胃液
  descriptions:
    jp_kana: "いえきを　あいての\nからだに　はきつける。　ついた　いえきは\nあいての　とくせいの　こうかを　けす。"
    jp_kanji: "胃液を　相手の\n体に　吐きつける。　ついた　胃液は\n相手の　特性の　効果を　消す。"
    en: "The user hurls up its stomach acids on the target.\nThe fluid eliminates the effect of the target’s Ability."
    fr: "Le lanceur répand ses sucs digestifs sur l’ennemi.\nLe fluide neutralise le talent de l’ennemi."
    it: "Chi la usa lancia acidi gastrici sul bersaglio.\nIl fluido annulla l’abilità del Pokémon colpito."
    de: "Anwender greift das Ziel mit eigenen Magensäften\nan. Entfernt Effekte von dessen Fähigkeit."
    es: "El usuario arroja sus jugos biliares al objetivo, lo \nque anula el efecto de la habilidad en uso."
    ko: "상대의 몸에 위액을 내뱉는다.\n달라붙은 위액은 상대의\n특성 효과를 지운다."
    zh_simp: "将胃液吐向对手的身体。\n沾上的胃液会消除\n对手的特性效果。"
    zh_trad: "將胃液吐向對手的身體。\n沾到的胃液會消除\n對手的特性效果。"
gear_grind:
  names:
    jp_kana: ギアソーサー
    jp_kanji: ギアソーサー
    en: Gear Grind
    fr: Lancécrou
    it: Ingracolpo
    de: Klikkdiskus
    es: Rueda Doble
    ko: 기어소서
    zh_simp: 齿轮飞盘
    zh_trad: 齒輪飛盤
  descriptions:
    jp_kana: "こうてつの　ギアを　あいてに\nなげつけて　こうげきする。２かい\nれんぞくで　ダメージを　あたえる。"
    jp_kanji: "鋼鉄の　ギアを　相手に\n投げつけて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks by throwing steel gears at its\ntarget twice."
    fr: "Le lanceur jette deux écrous d’acier qui frappent\nl’ennemi deux fois d’affilée."
    it: "Chi la usa colpisce il bersaglio due volte di fila\nlanciandogli contro degli ingranaggi d’acciaio."
    de: "Anwender greift an, indem er stählerne Zahnräder\nauf das Ziel schleudert. Angriff erfolgt zweimal\nhintereinander."
    es: "Rota dos engranajes de hierro sobre el objetivo. \nGolpea dos veces."
    ko: "강철의 기어를 상대에게\n던져서 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "向对手投掷\n钢铁齿轮进行攻击。\n连续２次给予伤害。"
    zh_trad: "向對手投擲\n鋼鐵齒輪進行攻擊。\n連續２次給予傷害。"
gear_up:
  names:
    jp_kana: アシストギア
    jp_kanji: アシストギア
    en: Gear Up
    fr: Engrenage
    it: Marciainpiù
    de: Hilfsmechanik
    es: Piñón Auxiliar
    ko: 어시스트기어
    zh_simp: 辅助齿轮
    zh_trad: 輔助齒輪
  descriptions:
    jp_kana: "ギアを　いれる　ことによって\nとくせい　プラスと　マイナスの\nこうげきと　とくこうが　あがる。"
    jp_kanji: "ギアを　入れる　ことによって\n特性　プラスと　マイナスの\n攻撃と　特攻が　あがる。"
    en: "The user engages its gears to raise the Attack and\nSp. Atk stats of ally Pokémon with the Plus or\nMinus Ability."
    fr: "Change de réglage pour augmenter l’Attaque et\nl’Attaque Spéciale des alliés ayant les talents\nPlus ou Minus."
    it: "Dà una marcia in più agli alleati con le abilità\nMeno o Più aumentandone l’Attacco e l’Attacco\nSpeciale."
    de: "Der Anwender erhöht mithilfe von Zahnrädern\nAngriff und Spezial-Angriff von Team-Pokémon\nmit der Fähigkeit Plus oder Minus."
    es: "Cambia de marcha y logra aumentar el Ataque y el\nAtaque Especial de los Pokémon aliados que cuenten\ncon las habilidades Más y Menos."
    ko: "기어를 넣는 것으로\n특성 플러스와 마이너스의\n공격과 특수공격이 올라간다."
    zh_simp: "启动齿轮，\n提高特性为正电和负电的\n宝可梦的攻击和特攻。"
    zh_trad: "藉由啟動齒輪，\n提高特性為正電和負電的\n寶可夢的攻擊和特攻。"
genesis_supernova:
  names:
    jp_kana: オリジンズスーパーノヴァ
    jp_kanji: オリジンズスーパーノヴァ
    en: Genesis Supernova
    fr: Supernova Originelle
    it: Supernova delle Origini
    de: Supernova des Ursprungs
    es: Supernova Original
    ko: 오리진즈슈퍼노바
    zh_simp: 起源超新星大爆炸
    zh_trad: 起源超新星大爆炸
  descriptions:
    jp_kana: "Ｚパワーを　えた　ミュウが\nぜんりょくで　あいてを　こうげきする。\nあしもとが　サイコフィールドになる。"
    jp_kanji: "Ｚパワーを　得た　ミュウが\n全力で　相手を　攻撃する。\n足元が　サイコフィールドになる。"
    en: "After obtaining Z-Power, the user, Mew, attacks\nthe target with full force. The terrain will be charged\nwith psychic energy."
    fr: "Mew utilise la Force Z pour attaquer la cible.\nLe terrain devient un Champ Psychique."
    it: "Grazie al Potere Z, Mew attacca il bersaglio con\ntutta la sua forza e genera un Campo Psichico\na terra."
    de: "Mew greift das Ziel mithilfe von Z-Kraft mit voller\nWucht an. Der Untergrund wird dabei in ein\nPsychofeld verwandelt."
    es: "Mew usa el Poder Z para realizar un potente ataque\ncontra su adversario y crear un Campo Psíquico\nsobre el terreno."
    ko: "Z파워를 얻은 뮤가\n전력으로 상대를 공격한다.\n발밑이 사이코필드가 된다."
    zh_simp: "得到Ｚ力量的梦幻\n将全力攻击对手。\n脚下会变成精神场地。"
    zh_trad: "得到Ｚ力量的夢幻\n全力攻擊對手。\n腳下變成精神場地。"
geomancy:
  names:
    jp_kana: ジオコントロール
    jp_kanji: ジオコントロール
    en: Geomancy
    fr: Géo-Contrôle
    it: Geocontrollo
    de: Geokontrolle
    es: Geocontrol
    ko: 지오컨트롤
    zh_simp: 大地掌控
    zh_trad: 大地掌控
  descriptions:
    jp_kana: "１ターンめで　エネルギーを\nきゅうしゅうし　２ターンめに　とくこう\nとくぼう　すばやさを　ぐーんと　あげる。"
    jp_kanji: "１ターン目で　エネルギーを\n吸収し　２ターン目に　特攻\n特防　素早さを　ぐーんと　あげる。"
    en: "The user absorbs energy and sharply raises its\nSp. Atk, Sp. Def, and Speed stats on the next turn."
    fr: "Le lanceur absorbe de l’énergie au premier tour\net augmente beaucoup son Attaque Spéciale,\nsa Défense Spéciale et sa Vitesse au second."
    it: "Chi la usa assorbe energia nel primo turno per\naumentare poi notevolmente l’Attacco Speciale,\nla Difesa Speciale e la Velocità in quello seguente."
    de: "Der Anwender saugt in Runde 1 Energie auf.\nIn Runde 2 steigen der Spezial-Angriff, die\nSpezial-Verteidigung und die Initiative stark."
    es: "Concentra energía durante el primer turno, de forma \nque su Velocidad, Ataque Especial y Defensa\nEspecial aumenten mucho en el segundo."
    ko: "1턴째에 에너지를 흡수하여\n2턴째에 특수공격, 특수방어,\n스피드를 크게 올린다."
    zh_simp: "第１回合吸收能量，\n第２回合大幅提高\n特攻、特防和速度。"
    zh_trad: "使用後的第１回合吸收能量，\n並於第２回合大幅提高\n自己的特攻、特防和速度。"
giga_drain:
  names:
    jp_kana: ギガドレイン
    jp_kanji: ギガドレイン
    en: Giga Drain
    fr: Giga-Sangsue
    it: Gigassorbimento
    de: Gigasauger
    es: Gigadrenado
    ko: 기가드레인
    zh_simp: 终极吸取
    zh_trad: 終極吸取
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: "Das Ziel wird angegriffen und die Hälfte des\nzugefügten Schadens dem Angreifer als KP\ngutgeschrieben."
    es: "Un ataque que absorbe nutrientes. Quien lo usa \nrecupera la mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n입힌 데미지의 절반에 해당하는\nHP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
giga_impact:
  names:
    jp_kana: ギガインパクト
    jp_kanji: ギガインパクト
    en: Giga Impact
    fr: Giga Impact
    it: Gigaimpatto
    de: Gigastoß
    es: Giga Impacto
    ko: 기가임팩트
    zh_simp: 终极冲击
    zh_trad: 終極衝擊
  descriptions:
    jp_kana: "もてる　ちからを　すべて　つかって\nあいてに　とつげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using every bit of its\npower. The user can’t move on the next turn."
    fr: "Le lanceur charge l’ennemi de toute sa puissance\net doit ensuite se reposer au tour suivant."
    it: "Chi la usa carica il bersaglio usando tutta la sua\nforza, ma al turno successivo deve riposarsi."
    de: "Anwender rennt mit seiner ganzen Kraft gegen das\nZiel an und muss dann eine Runde ruhen."
    es: "Carga contra el objetivo usando toda la fuerza que \ntiene. El Pokémon descansa el turno siguiente."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "使出自己浑身力量突击对手。\n下一回合自己将无法动弹。"
    zh_trad: "使出全身上下所有力量突擊對手。\n下一回合自己將無法動彈。"
gigavolt_havoc:physical:
  names:
    jp_kana: スパーキングギガボルト
    jp_kanji: スパーキングギガボルト
    en: Gigavolt Havoc
    fr: Fulguro-Lance Gigavolt
    it: Gigascarica Folgorante
    de: Gigavolt-Funkensalve
    es: Gigavoltio Destructor
    ko: 스파킹기가볼트
    zh_simp: 终极伏特狂雷闪
    zh_trad: 終極伏特狂雷閃
  descriptions:
    jp_kana: "Ｚパワーで　ためた　つよい　でんきを\nぜんりょくで　あいてに　ぶつける。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　溜めた　強い　電気を\n全力で　相手に　ぶつける。\n元になった　技で　威力が　変わる。"
    en: "The user hits the target with a powerful electric\ncurrent collected by its Z-Power. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour générer un courant\nélectrique puissant qu’il projette sur l’adversaire. La\npuissance varie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa genera una fortissima\nscarica elettrica che colpisce il bersaglio. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Der Anwender greift das Ziel mit durch Z-Kraft\ngesammelter starker Elektrizität an. Die Stärke\nvariiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para generar una fuerte\ndescarga eléctrica con la que electrocuta al objetivo.\nSu potencia depende de la del movimiento original."
    ko: "Z파워로 비축한 강한 전기를\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量将蓄积的强大电流\n全力撞向对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量將蓄積的強大電流\n全力撞向對手。\n威力會隨原本的招式而改變。"
gigavolt_havoc:special:
  names:
    jp_kana: スパーキングギガボルト
    jp_kanji: スパーキングギガボルト
    en: Gigavolt Havoc
    fr: Fulguro-Lance Gigavolt
    it: Gigascarica Folgorante
    de: Gigavolt-Funkensalve
    es: Gigavoltio Destructor
    ko: 스파킹기가볼트
    zh_simp: 终极伏特狂雷闪
    zh_trad: 終極伏特狂雷閃
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
glaciate:
  names:
    jp_kana: こごえるせかい
    jp_kanji: こごえるせかい
    en: Glaciate
    fr: Ère Glaciaire
    it: Gelamondo
    de: Eiszeit
    es: Mundo Gélido
    ko: 얼다세계
    zh_simp: 冰封世界
    zh_trad: 冰封世界
  descriptions:
    jp_kana: "こごえる　ような　れいきを\nあいてに　ふきつけて　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "凍えるような　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks by blowing freezing cold air at\nopposing Pokémon. This lowers their Speed stat."
    fr: "Un souffle de vent qui congèle tout sur son\npassage s’abat sur l’ennemi. Réduit aussi sa\nVitesse."
    it: "Chi la usa attacca i nemici intorno con una\nfolata d’aria gelida e ne riduce anche\nla Velocità."
    de: "Anwender greift an, indem er dem Ziel klirrend kalte\nLuft entgegenbläst. Senkt die Initiative des Zieles."
    es: "Ataque con aire helado que baja la Velocidad del \nobjetivo."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "将冰冻的冷气\n吹向对手进行攻击。\n会降低对手的速度。"
    zh_trad: "放出冰凍的寒氣\n向對手進行攻擊。\n可降低對手的速度。"
glare:
  names:
    jp_kana: へびにらみ
    jp_kanji: へびにらみ
    en: Glare
    fr: Regard Médusant
    it: Sguardo Feroce
    de: Giftblick
    es: Deslumbrar
    ko: 뱀눈초리
    zh_simp: 大蛇瞪眼
    zh_trad: 大蛇瞪眼
  descriptions:
    jp_kana: "おなかの　もようで　おびえさせて\nあいてを　まひの　じょうたいに　する。"
    jp_kanji: "おなかの　模様で　おびえさせて\n相手を　まひの　状態に　する。"
    en: "The user intimidates the target with the pattern on\nits belly to cause paralysis."
    fr: "Le lanceur intimide l’ennemi grâce à son regard\nterrifiant pour le paralyser."
    it: "Chi la usa spaventa il bersaglio con uno sguardo\nterrificante e ne causa la paralisi."
    de: Schüchtert Ziel ein, sodass dieses paralysiert wird.
    es: "Intimida y asusta al objetivo con la mirada para \ndejarlo paralizado."
    ko: "배의 무늬로 겁을 주어\n상대를 마비 상태로 만든다."
    zh_simp: "用腹部的花纹使对手害怕，\n从而让其陷入麻痹状态。"
    zh_trad: "用腹部的花紋使對手心生恐懼，\n讓對手陷入麻痺狀態。"
grass_knot:
  names:
    jp_kana: くさむすび
    jp_kanji: くさむすび
    en: Grass Knot
    fr: Nœud Herbe
    it: Laccioerboso
    de: Strauchler
    es: Hierba Lazo
    ko: 풀묶기
    zh_simp: 打草结
    zh_trad: 打草結
  descriptions:
    jp_kana: "くさを　からませて　あいてを\nころばせる。あいてが　おもいほど\nいりょくが　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the\nmove’s power."
    fr: "L’ennemi est piégé dans de l’herbe qui le fait\ntrébucher. Plus il est lourd, plus il subit de dégâts."
    it: "Chi la usa intrappola il bersaglio con l’erba e lo fa\ncadere. Danneggia maggiormente i Pokémon\npiù pesanti."
    de: "Ziel wird durch Gras ins Straucheln gebracht.\nJe schwerer das Ziel, desto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba.\nCuanto más pesado es el objetivo, más daño inflige."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
grass_pledge:
  names:
    jp_kana: くさのちかい
    jp_kanji: くさのちかい
    en: Grass Pledge
    fr: Aire d’Herbe
    it: Erbapatto
    de: Pflanzensäulen
    es: Voto Planta
    ko: 풀의맹세
    zh_simp: 草之誓约
    zh_trad: 草之誓約
  descriptions:
    jp_kana: "くさの　はしらで　こうげきする。\nみずと　くみあわせると　いりょくが\nあがって　あたりが　しつげんに　なる。"
    jp_kanji: "草の柱で　攻撃する。\nみずと　組みあわせると　威力が\nあがって　あたりが　湿原に　なる。"
    en: "A column of grass hits the target. When used with\nits water equivalent, its power increases and a vast\nswamp appears."
    fr: "Une masse végétale s’abat sur l’ennemi.\nEn l’utilisant avec Aire d’Eau, l’effet augmente\net un marécage apparaît."
    it: "Attacca il bersaglio con una colonna d’erba.\nSe usata con Acquapatto, gli effetti aumentano\ne il campo diventa una palude."
    de: "Ein Angriff mit Pflanzensäulen. Mit Wassersäulen\nkombiniert steigt die Wirkung und die Umgebung\nwird zu einem Sumpf."
    es: "Ataca con columnas de hojas. Combinado con \nVoto Agua, crea un pantano y aumenta su\npotencia."
    ko: "풀기둥으로 공격한다.\n물과 조합하면 위력이\n올라가고 주변이 습지초원이 된다."
    zh_simp: "用草柱进行攻击。\n如果和水组合，威力就会提高，\n周围会变成湿地。"
    zh_trad: "用草柱進行攻擊。\n和水之誓約同時使用時，威力會提高，\n周圍會變成濕地。"
grass_whistle:
  names:
    jp_kana: くさぶえ
    jp_kanji: くさぶえ
    en: Grass Whistle
    fr: Siffl’Herbe
    it: Meloderba
    de: Grasflöte
    es: Silbato
    ko: 풀피리
    zh_simp: 草笛
    zh_trad: 草笛
  descriptions:
    jp_kana: "ここちよい　ふえの　ねいろを　きかせて\nあいてを　ねむりの　じょうたいに　する。"
    jp_kanji: "心地好い　笛の　音色を　聞かせて\n相手を　眠りの　状態に　する。"
    en: "The user plays a pleasant melody that lulls the\ntarget into a deep sleep."
    fr: "Le lanceur joue une douce mélodie qui plonge\nl’ennemi dans un profond sommeil."
    it: "Una dolce melodia culla il bersaglio e lo costringe\nad addormentarsi."
    de: "Versetzt das Ziel durch eine schöne Melodie in\nTiefschlaf."
    es: Agradable melodía que adormece al objetivo.
    ko: "기분 좋은 피리 소리를 들려주어\n상대를 잠듦 상태로 만든다."
    zh_simp: "让对手听舒适的笛声，\n从而陷入睡眠状态。"
    zh_trad: "發出悅耳的笛聲，\n讓對手陷入睡眠狀態。"
grassy_terrain:
  names:
    jp_kana: グラスフィールド
    jp_kanji: グラスフィールド
    en: Grassy Terrain
    fr: Champ Herbu
    it: Campo Erboso
    de: Grasfeld
    es: Campo de Hierba
    ko: 그래스필드
    zh_simp: 青草场地
    zh_trad: 青草場地
  descriptions:
    jp_kana: "５ターンのあいだ　グラスフィールドにする。\nじめんにいると　まいターン　かいふくする。\nくさタイプの　いりょくが　あがる。"
    jp_kanji: "５ターンの　間　グラスフィールドにする。\n地面にいると　毎ターン　回復する。\nくさタイプの　威力が　あがる。"
    en: "The user turns the ground to grass for five turns.\nThis restores the HP of Pokémon on the ground a\nlittle every turn and powers up Grass type-moves."
    fr: "Pendant cinq tours, les Pokémon au sol récupèrent\nquelques PV à chaque tour et la puissance\ndes capacités de type Plante augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nErboso: i Pokémon a terra recuperano PS e la\npotenza delle mosse di tipo Erba aumenta."
    de: "Regeneriert fünf Runden lang in jeder neuen Runde\nein paar KP aller Pokémon, die den Boden berühren.\nErhöht die Stärke von Pflanzen-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos\nde tipo Planta y los Pokémon que están en contacto\ncon el suelo recuperan PS en cada turno."
    ko: "5턴 동안 그래스필드로 만든다.\n땅에 있으면 매 턴 회복한다.\n풀타입의 위력이 올라간다."
    zh_simp: "在５回合内变成青草场地。\n地面上的宝可梦每回合都能回复。\n草属性的招式威力还会提高。"
    zh_trad: "在５回合內將腳下變成青草場地。\n地面上的寶可夢每回合都會回復ＨＰ。\n草屬性招式的威力會提高。"
gravity:
  names:
    jp_kana: じゅうりょく
    jp_kanji: じゅうりょく
    en: Gravity
    fr: Gravité
    it: Gravità
    de: Erdanziehung
    es: Gravedad
    ko: 중력
    zh_simp: 重力
    zh_trad: 重力
  descriptions:
    jp_kana: "５ターンのあいだ　ふゆうや　ひこうタイプに\nじめんタイプの　わざが　あたるようになる。\nくうちゅうに　とぶ　わざも　つかえない。"
    jp_kanji: "５ターンの間　ふゆうや　ひこうタイプに\nじめんタイプの　技が　当たるようになる。\n空中に　飛ぶ　技も　使えない。"
    en: "Enables Flying-type Pokémon or Pokémon with the\nLevitate Ability to be hit by Ground-type moves.\nFlying moves can’t be used."
    fr: "Pendant cinq tours, les Pokémon Vol ou qui ont\nLévitation deviennent sensibles aux capacités Sol,\net les capacités volantes deviennent inutilisables."
    it: "Per cinque turni rende vulnerabili alle mosse di tipo\nTerra i Pokémon con Levitazione o di tipo Volante.\nNon è possibile usare mosse che fanno volare."
    de: "Ermöglicht es, Flug-Pokémon oder Pokémon mit der\nFähigkeit Schwebe mit Boden-Attacken zu treffen.\nVerhindert Attacken, bei denen der Anwender fliegt."
    es: "Durante cinco turnos, se anulan los movimientos que\nalzan el vuelo y los Pokémon de tipo Volador o que\nlevitan son vulnerables a movimientos de tipo Tierra."
    ko: "5턴 동안 부유나 비행타입에\n땅타입의 기술이 맞게 된다.\n공중으로 나는 기술도 사용할 수 없다."
    zh_simp: "在５回合内，飘浮特性和飞行属性的\n宝可梦会被地面属性的招式击中。\n飞向空中的招式也将无法使用。"
    zh_trad: "在５回合內，飄浮特性和飛行屬性的\n寶可夢會被地面屬性的招式擊中。\n且無法使用飛向空中的招式。"
growl:
  names:
    jp_kana: なきごえ
    jp_kanji: なきごえ
    en: Growl
    fr: Rugissement
    it: Ruggito
    de: Heuler
    es: Gruñido
    ko: 울음소리
    zh_simp: 叫声
    zh_trad: 叫聲
  descriptions:
    jp_kana: "かわいい　なきごえを　きかせて\nきを　ひき　ゆだんを　させて\nあいての　こうげきを　さげる。"
    jp_kanji: "かわいい　なきごえを　聞かせて\n気を　ひき　油断を　させて\n相手の　攻撃を　さげる。"
    en: "The user growls in an endearing way, making\nopposing Pokémon less wary. This lowers their\nAttack stat."
    fr: "Le lanceur pousse un cri tout mimi pour tromper\nla vigilance de l’ennemi et baisser son Attaque."
    it: "Distrae i nemici intorno con un ruggito potente\ne ne riduce l’Attacco."
    de: "Der Anwender nimmt das Ziel für sich ein und senkt\ndessen Angriffs-Wert."
    es: Dulce gruñido que reduce el Ataque del contrincante.
    ko: "귀여운 울음소리를 들려주고\n관심을 끌어 방심한 사이에\n상대의 공격을 떨어뜨린다."
    zh_simp: "让对手听可爱的叫声，\n引开注意力使其疏忽，\n从而降低对手的攻击。"
    zh_trad: "發出可愛的叫聲，\n誘使對手疏忽大意，\n降低對手的攻擊。"
growth:
  names:
    jp_kana: せいちょう
    jp_kanji: せいちょう
    en: Growth
    fr: Croissance
    it: Crescita
    de: Wachstum
    es: Desarrollo
    ko: 성장
    zh_simp: 生长
    zh_trad: 生長
  descriptions:
    jp_kana: "からだを　いっきに\nおおきく　せいちょう　させて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "体を　一気に\n大きく　生長させて\n攻撃と　特攻を　あげる。"
    en: "The user’s body grows all at once, raising the\nAttack and Sp. Atk stats."
    fr: "Le corps du lanceur se développe.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Provoca la crescita immediata del corpo\ne l’aumento dell’Attacco e dell’Attacco Speciale\ndi chi la usa."
    de: "Der Körper wächst. Dadurch steigen Angriff und\nSpezial-Angriff."
    es: "El cuerpo del usuario crece a marchas forzadas y \naumenta el Ataque y el Ataque Especial."
    ko: "몸을 일시에\n크게 성장시켜\n공격과 특수공격을 올린다."
    zh_simp: "让身体一下子长大，\n从而提高攻击和特攻。"
    zh_trad: "讓身體瞬間長大，\n提高自己的攻擊和特攻。"
grudge:
  names:
    jp_kana: おんねん
    jp_kanji: おんねん
    en: Grudge
    fr: Rancune
    it: Rancore
    de: Nachspiel
    es: Rabia
    ko: 원념
    zh_simp: 怨念
    zh_trad: 怨念
  descriptions:
    jp_kana: "あいての　わざで　ひんしに　されたとき\nおんねんを　かけて\nそのわざの　ＰＰを　０に　する。"
    jp_kanji: "相手の　技で　ひんしに　されたとき\nおんねんを　かけて\nその技の　ＰＰを　０に　する。"
    en: "If the user faints, the user’s grudge fully depletes\nthe PP of the opponent’s move that knocked it out."
    fr: "Si le lanceur est mis K.O., sa rancune épuise les\nPP de la capacité utilisée par l’ennemi pour le\nmettre K.O."
    it: "Se chi la usa va KO, i PP della mossa nemica\nche lo ha messo fuori gioco si azzerano."
    de: "Bei K.O. des Anwenders werden die AP der Attacke,\ndurch die er besiegt wurde, auf 0 herabgesetzt."
    es: "Si el usuario se debilita al recibir un ataque, todos \nlos PP de este último ataque serán eliminados."
    ko: "상대의 기술로 기절하면\n원념을 담아\n그 기술의 PP를 0으로 만든다."
    zh_simp: "因对手的招式而陷入濒死时\n给对手施加怨念，\n让该招式的ＰＰ变成０。"
    zh_trad: "因為對手的招式而陷入瀕死時，\n施加怨念，\n讓該招式的ＰＰ變成０。"
guard_split:
  names:
    jp_kana: ガードシェア
    jp_kanji: ガードシェア
    en: Guard Split
    fr: Partage Garde
    it: Paridifesa
    de: Schutzteiler
    es: Isoguardia
    ko: 가드셰어
    zh_simp: 防守平分
    zh_trad: 防守平分
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nぼうぎょと　とくぼうを　たして\nはんぶんに　わける。"
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防を　たして\n半分に　わける。"
    en: "The user employs its psychic power to average its\nDefense and Sp. Def stats with those of the target."
    fr: "Additionne la Défense et la Défense Spéciale\ndu lanceur et de sa cible et les redistribue\néquitablement entre les deux."
    it: "Chi la usa sfrutta la sua forza psichica per sommare \nDifesa e Difesa Speciale a quelle del bersaglio\ne dividerle equamente."
    de: "Durch Psycho-Kräfte werden Verteidigung und\nSpezial-Verteidigung des Anwenders und des\nZieles addiert und in zwei gleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer la media \nde su Defensa y Defensa Especial con las de su\nobjetivo y compartirlas."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어를 더해서\n반으로 나눈다."
    zh_simp: "利用超能力将自己和对手的\n防御和特防相加，\n再进行平分。"
    zh_trad: "用超能力將自己和對手的\n防禦和特防各別相加後，\n再進行平分。"
guard_swap:
  names:
    jp_kana: ガードスワップ
    jp_kanji: ガードスワップ
    en: Guard Swap
    fr: Permugarde
    it: Barattoscudo
    de: Schutztausch
    es: Cambia Defensa
    ko: 가드스웹
    zh_simp: 防守互换
    zh_trad: 防守互換
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nぼうぎょと　とくぼうの\nのうりょく　へんかを　いれかえる。"
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch\nchanges to its Defense and Sp. Def stats with\nthe target."
    fr: "Pouvoir qui échange les modifications de\nla Défense Spéciale et de la Défense avec la cible."
    it: "Chi la usa sfrutta la sua forza psichica per\nscambiare le modifiche a Difesa e Difesa Speciale\ncon il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen an\nVerteidigung und Spezial-Verteidigung mit denen\ndes Zieles."
    es: "El usuario emplea su poder mental para intercambiar \nlos cambios en Defensa y Defensa Especial con el\nobjetivo."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어의\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手的防御\n以及特防的能力变化。"
    zh_trad: "用超能力將自己和對手的\n防禦與特防的能力變化互相交換。"
guardian_of_alola:
  names:
    jp_kana: ガーディアン・デ・アローラ
    jp_kanji: ガーディアン・デ・アローラ
    en: Guardian of Alola
    fr: Colère du Gardien d’Alola
    it: Collera del Guardiano
    de: Alolas Wächter
    es: Cólera del Guardián
    ko: 알로라의수호자
    zh_simp: 巨人卫士・阿罗拉
    zh_trad: 巨人衛士・阿羅拉
  descriptions:
    jp_kana: "Ｚパワーで　アローラの　ちからを　えた\nとちがみポケモン　ぜんりょくの　こうげき。\nあいての　のこりＨＰを　たくさん　へらす。"
    jp_kanji: "Ｚパワーで　アローラの　力を　得た\nとちがみポケモン　全力の　攻撃。\n相手の　残りＨＰを　たくさん　減らす。"
    en: "The user, the Land Spirit Pokémon, obtains Alola’s\nenergy using its Z-Power and attacks the target with\nfull force. This reduces the target’s HP greatly."
    fr: "Le Pokémon Tutélaire utilise la Force Z et déchaîne\ntoute la puissance d’Alola sur sa cible. Inflige des\ndégâts en fonction des PV restants de celle-ci."
    it: "Grazie al Potere Z, il Nume Locale evoca l’energia\ndi Alola e attacca con grande potenza, facendo\nperdere al bersaglio la maggior parte dei suoi PS."
    de: "Ein gewaltiger Angriff des Schutzpatrons, der durch\nZ-Kraft die Kraft Alolas erlangt hat. Reduziert die\nverbleibenden KP des Zieles stark."
    es: "Los Pokémon Dios Nativo canalizan la energía de\nAlola gracias al Poder Z y atacan con gran fuerza a\nsus rivales reduciendo un gran porcentaje de sus PS."
    ko: "Z파워로 알로라의 힘을 얻은\n토속신포켓몬 전력의 공격.\n상대의 남은 HP를 많이 줄인다."
    zh_simp: "通过Ｚ力量得到阿罗拉之力的\n土地神宝可梦将全力进行攻击。\n对手的剩余ＨＰ会减少很多。"
    zh_trad: "透過Ｚ力量得到阿羅拉之力的\n土地神寶可夢的全力攻擊。\n會大量減少對手的現有ＨＰ。"
guillotine:
  names:
    jp_kana: ハサミギロチン
    jp_kanji: ハサミギロチン
    en: Guillotine
    fr: Guillotine
    it: Ghigliottina
    de: Guillotine
    es: Guillotina
    ko: 가위자르기
    zh_simp: 断头钳
    zh_trad: 斷頭鉗
  descriptions:
    jp_kana: "おおきな　ハサミで\nあいてを　きりさいて　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "大きな　ハサミで\n相手を　切り裂いて　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "A vicious, tearing attack with big pincers. The target\nfaints instantly if this attack hits."
    fr: "Des pinces lacèrent violemment l’ennemi, le mettant\nK.O. sur le coup s’il est touché."
    it: "Attacca il bersaglio con pericolose tenaglie.\nSe l’attacco va a segno, il Pokémon colpito\nva subito KO."
    de: "Kräftige Scheren-Attacke. Führt beim Ziel sofort\nzum K.O."
    es: "Ataque cortante que debilita al oponente de un \ngolpe si acierta."
    ko: "큰 집게로\n상대를 베어 갈라 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "用大钳子或剪刀等\n夹断对手进行攻击。\n只要命中就会一击濒死。"
    zh_trad: "用巨大的鉗子或剪刀等\n撕裂對手進行攻擊。\n只要命中就會一擊瀕死。"
gunk_shot:
  names:
    jp_kana: ダストシュート
    jp_kanji: ダストシュート
    en: Gunk Shot
    fr: Détricanon
    it: Sporcolancio
    de: Mülltreffer
    es: Lanza Mugre
    ko: 더스트슈트
    zh_simp: 垃圾射击
    zh_trad: 垃圾射擊
  descriptions:
    jp_kana: "きたない　ゴミを\nあいてに　ぶつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user shoots filthy garbage at the target to\nattack. This may also poison the target."
    fr: "Le lanceur envoie des détritus sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa attacca il bersaglio con rifiuti sudici\nche possono anche avvelenarlo."
    de: "Anwender schießt mit Müll auf das Ziel.\nVergiftet dieses eventuell."
    es: "Lanza contra el objetivo basura asquerosa. Puede \nenvenenar al objetivo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用肮脏的垃圾\n撞向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的垃圾\n丟向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
gust:
  names:
    jp_kana: かぜおこし
    jp_kanji: かぜおこし
    en: Gust
    fr: Tornade
    it: Raffica
    de: Windstoß
    es: Tornado
    ko: 바람일으키기
    zh_simp: 起风
    zh_trad: 起風
  descriptions:
    jp_kana: "つばさで　おこした　はげしい　かぜを\nあいてに　ぶつけて　こうげきする。"
    jp_kanji: "翼で　おこした　激しい　風を\n相手に　ぶつけて　攻撃する。"
    en: "A gust of wind is whipped up by wings and launched\nat the target to inflict damage."
    fr: "Le lanceur bat des ailes pour générer une\nbourrasque qui blesse l’ennemi."
    it: "Infligge danni al bersaglio con una folata di vento\nsollevata dalle ali."
    de: "Trifft das Ziel mit einem Windstoß durch einen\nFlügelschlag."
    es: "Crea un tornado con las alas y lo lanza contra el \nobjetivo."
    ko: "날개로 일으킨 격한 바람을\n상대에게 부딪쳐서 공격한다."
    zh_simp: "用翅膀将刮起的狂风\n袭向对手进行攻击。"
    zh_trad: "用翅膀刮起狂風，\n吹向對手進行攻擊。"
gyro_ball:
  names:
    jp_kana: ジャイロボール
    jp_kanji: ジャイロボール
    en: Gyro Ball
    fr: Gyroballe
    it: Vortexpalla
    de: Gyroball
    es: Giro Bola
    ko: 자이로볼
    zh_simp: 陀螺球
    zh_trad: 陀螺球
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん　させて\nたいあたりする。あいてより　すばやさが\nひくいほど　つよい。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user compared to the target, the\ngreater the move’s power."
    fr: "Le lanceur effectue une rotation et frappe l’ennemi.\nPlus la Vitesse du lanceur est basse, plus il fait\nde dégâts."
    it: "Chi la usa colpisce il bersaglio con un vortice\nrapidissimo. Più lento è chi la usa, maggiore\nè il danno."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Embiste al objetivo con un potente ataque giratorio. \nCuanto más lento es el usuario, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
hail:
  names:
    jp_kana: あられ
    jp_kanji: あられ
    en: Hail
    fr: Grêle
    it: Grandine
    de: Hagelsturm
    es: Granizo
    ko: 싸라기눈
    zh_simp: 冰雹
    zh_trad: 冰雹
  descriptions:
    jp_kana: "５ターンの　あいだ　あられを　ふらして\nこおりタイプで　ない　ポケモン\nぜんいんに　ダメージを　あたえる。"
    jp_kanji: "５ターンの　間　あられを　降らして\nこおりタイプで　ない　ポケモン\n全員に　ダメージを　与える。"
    en: "The user summons a hailstorm lasting five turns.\nIt damages all Pokémon except the Ice type."
    fr: "Invoque une tempête de grêle qui dure cinq tours.\nNe blesse pas les Pokémon de type Glace."
    it: "Chi la usa causa una grandinata che dura\ncinque turni. Danneggia tutti i Pokémon\ntranne quelli di tipo Ghiaccio."
    de: "Hagelsturm für fünf Runden. Schadet allen außer\nEis-Pokémon."
    es: "Tormenta de granizo que dura cinco turnos. Hiere \na todos los Pokémon excepto a los de tipo Hielo."
    ko: "5턴 동안 싸라기눈을 내리게 해\n얼음타입이 아닌 포켓몬\n모두에게 데미지를 준다."
    zh_simp: "在５回合内一直降冰雹，\n除冰属性的宝可梦以外，\n给予全体宝可梦伤害。"
    zh_trad: "降下冰雹，在５回合內\n場上除了冰屬性以外的寶可夢\n都會受到傷害。"
hammer_arm:
  names:
    jp_kana: アームハンマー
    jp_kanji: アームハンマー
    en: Hammer Arm
    fr: Marto-Poing
    it: Martelpugno
    de: Hammerarm
    es: Machada
    ko: 암해머
    zh_simp: 臂锤
    zh_trad: 臂錘
  descriptions:
    jp_kana: "つよくて　おもい　こぶしを\nふるって　ダメージを　あたえる。\nじぶんの　すばやさが　さがる。"
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings and hits with its strong, heavy fist.\nIt lowers the user’s Speed, however."
    fr: "Le lanceur donne un puissant coup de poing à\nl’ennemi. Réduit la Vitesse du lanceur."
    it: "Chi la usa colpisce il bersaglio con il suo pugno\nforte e pesante, ma perde Velocità."
    de: "Anwender trifft mit einem starken Hieb.\nSenkt Initiative des Anwenders."
    es: "Gira con fuerza el puño y da un gran golpe. No\nobstante, baja la Velocidad."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的速度会降低。"
    zh_trad: "揮出強力而沉重的拳頭，\n給予對手傷害。\n自己的速度會降低。"
happy_hour:
  names:
    jp_kana: ハッピータイム
    jp_kanji: ハッピータイム
    en: Happy Hour
    fr: Étrennes
    it: Cuccagna
    de: Goldene Zeiten
    es: Paga Extra
    ko: 해피타임
    zh_simp: 欢乐时光
    zh_trad: 歡樂時光
  descriptions:
    jp_kana: "ハッピータイムの　わざを　つかうと\nせんとうの　あとで　もらえる\nおかねが　ばいになる。"
    jp_kanji: "ハッピータイムの　技を　使うと\n戦闘の　あとで　もらえる\nお金が　倍になる。"
    en: "Using Happy Hour doubles the amount of prize\nmoney received after battle."
    fr: "Utilisé pendant un combat, multiplie par deux\nl’argent gagné à la fin."
    it: "Questa mossa raddoppia la ricompensa ricevuta\ndopo aver vinto una lotta."
    de: "Nach Einsatz der Attacke Goldene Zeiten verdoppelt\nsich das Preisgeld, das du im Falle eines Sieges\nerhältst."
    es: "Al usar este movimiento se consigue duplicar la \nrecompensa recibida tras el combate."
    ko: "해피타임 기술을 쓰면\n배틀 후에 받을 수 있는\n돈이 배가 된다."
    zh_simp: "如果使用欢乐时光，\n战斗后得到的钱会翻倍。"
    zh_trad: "使用歡樂時光後，\n戰鬥結束時獲得的錢會加倍。"
harden:
  names:
    jp_kana: かたくなる
    jp_kanji: かたくなる
    en: Harden
    fr: Armure
    it: Rafforzatore
    de: Härtner
    es: Fortaleza
    ko: 단단해지기
    zh_simp: 变硬
    zh_trad: 變硬
  descriptions:
    jp_kana: "ぜんしんに　ちからを　こめて\nからだを　かたくして\nじぶんの　ぼうぎょを　あげる。"
    jp_kanji: "全身に　力を　こめて\n体を　硬くして\n自分の　防御を　あげる。"
    en: "The user stiffens all the muscles in its body to raise\nits Defense stat."
    fr: "Le lanceur contracte tous ses muscles pour\naugmenter sa Défense."
    it: "Tutti i muscoli del corpo si tonificano\nper aumentare la Difesa."
    de: "Stärkt die Muskulatur und erhöht den\nVerteidigungs-Wert."
    es: "Tensa la musculatura del usuario para aumentar la \nDefensa."
    ko: "전신에 힘을 담아\n몸을 단단하게 해서\n자신의 방어를 올린다."
    zh_simp: "全身使劲，让身体变硬，\n从而提高自己的防御。"
    zh_trad: "使用全身的力量讓身體硬化，\n提高自己的防禦。"
haze:
  names:
    jp_kana: くろいきり
    jp_kanji: くろいきり
    en: Haze
    fr: Buée Noire
    it: Nube
    de: Dunkelnebel
    es: Niebla
    ko: 흑안개
    zh_simp: 黑雾
    zh_trad: 黑霧
  descriptions:
    jp_kana: "くろいきりを　だして　せんとうに\nでている　ポケモン　ぜんいんの\nのうりょく　へんかを　もとに　もどす。"
    jp_kanji: "黒い霧を　だして　戦闘に\nでている　ポケモン　全員の\n能力変化を　もとに　もどす。"
    en: "The user creates a haze that eliminates every stat\nchange among all the Pokémon engaged in battle."
    fr: "Un brouillard qui annule les changements de stats\nde tous les Pokémon au combat."
    it: "Chi la usa crea una nube nera che annulla\nogni modifica alle statistiche di tutti i Pokémon\nin campo."
    de: "Erzeugt einen dunklen Nebel. Alle Veränderungen der\nStatuswerte der Kampfteilnehmer werden annulliert."
    es: "Neblina que elimina los cambios de características\nde todos los Pokémon en combate."
    ko: "흑안개를 뿜어 배틀에\n참가 중인 포켓몬 전원의\n능력 변화를 원래대로 돌린다."
    zh_simp: "升起黑雾，将正在场上战斗的\n全体宝可梦的能力变回原点。"
    zh_trad: "放出黑霧，讓場上全體寶可夢的\n能力變化回到初始狀態。"
head_charge:
  names:
    jp_kana: アフロブレイク
    jp_kanji: アフロブレイク
    en: Head Charge
    fr: Peignée
    it: Ricciolata
    de: Steinschädel
    es: Ariete
    ko: 아프로브레이크
    zh_simp: 爆炸头突击
    zh_trad: 爆炸頭突擊
  descriptions:
    jp_kana: "すごい　アフロの　あたまで\nあいてに　とっしんして　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "すごい　アフロの　頭で\n相手に　突進して　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user charges its head into its target, using its\npowerful guard hair. This also damages the user\na little."
    fr: "Le lanceur donne un coup avec sa tête couronnée\nd’une fière crinière. Blesse aussi légèrement\nle lanceur."
    it: "Chi la usa carica il bersaglio con la testa in\nstile afro, ma subisce un po’ di danni per il\ncontraccolpo."
    de: "Rempelattacke mit ausgeflippter Retrofrisur.\nAnwender nimmt selbst leichten Schaden."
    es: "Propina un tremendo cabezazo. También daña al \nusuario un poco."
    ko: "굉장한 아프로 머리로\n상대에게 돌진하여 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "用厉害的爆炸头\n猛撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "用帥氣的爆炸頭\n猛撞對手進行攻擊。\n自己也會受到少許傷害。"
head_smash:
  names:
    jp_kana: もろはのずつき
    jp_kanji: もろはのずつき
    en: Head Smash
    fr: Fracass’Tête
    it: Zuccata
    de: Kopfstoß
    es: Testarazo
    ko: 양날박치기
    zh_simp: 双刃头锤
    zh_trad: 雙刃頭錘
  descriptions:
    jp_kana: "いのちを　かけて　こんしんの　ちからで\nあいてに　ずつきを　する。　じぶんも\nものすごい　ダメージを　うける。"
    jp_kanji: "命を　懸けて　こん身の　力で\n相手に　ずつきを　する。　自分も\nものすごい　ダメージを　受ける。"
    en: "The user attacks the target with a hazardous,\nfull-power headbutt. This also damages the\nuser terribly."
    fr: "Le lanceur assène un coup de tête désespéré.\nBlesse aussi gravement le lanceur."
    it: "Chi la usa attacca con tutta la potenza di cui\ndispone, ma subisce danni considerevoli."
    de: "Anwender greift unter Einsatz seines Lebens mit\neinem Kopfstoß an und nimmt dabei selbst jede\nMenge Schaden."
    es: "El usuario arriesga su vida y lanza un cabezazo\ncon toda su fuerza. El agresor resulta seriamente \ndañado."
    ko: "목숨을 걸고 혼신의 힘으로\n상대에게 박치기를 한다.\n자신도 굉장한 데미지를 입는다."
    zh_simp: "拼命使出浑身力气，\n向对手进行头锤攻击。\n自己也会受到非常大的伤害。"
    zh_trad: "使出渾身力量，\n捨身向對手進行頭錘攻擊。\n自己也會受到非常大的傷害。"
headbutt:
  names:
    jp_kana: ずつき
    jp_kanji: ずつき
    en: Headbutt
    fr: Coup d’Boule
    it: Bottintesta
    de: Kopfnuss
    es: Golpe Cabeza
    ko: 박치기
    zh_simp: 头锤
    zh_trad: 頭錘
  descriptions:
    jp_kana: "あたまを　つきだして\nまっすぐ　つっこんで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "頭を　突きだして\nまっすぐ　つっこんで　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user sticks out its head and attacks by charging\nstraight into the target. This may also make the\ntarget flinch."
    fr: "Le lanceur donne un coup de tête.\nPeut apeurer l’ennemi."
    it: "Chi la usa si lancia diritto di testa contro\nil bersaglio. Può anche farlo tentennare."
    de: "Rammt das Ziel mit einer Kopfnuss. Ziel schreckt\neventuell zurück."
    es: "Lanza un potente cabezazo que puede hacer \nretroceder al objetivo."
    ko: "머리를 내밀어\n곧장 돌진하여 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将头伸出，\n笔直地扑向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將頭伸出，\n直直衝向對手進行攻擊。\n有時會讓對手畏縮。"
heal_bell:
  names:
    jp_kana: いやしのすず
    jp_kanji: いやしのすず
    en: Heal Bell
    fr: Glas de Soin
    it: Rintoccasana
    de: Vitalglocke
    es: Campana Cura
    ko: 치료방울
    zh_simp: 治愈铃声
    zh_trad: 治癒鈴聲
  descriptions:
    jp_kana: "ここちよい　すずの　ねいろを　きかせて\nみかた　ぜんいんの\nじょうたい　いじょうを　かいふく　する。"
    jp_kanji: "心地好い　鈴の　音色を　聞かせて\n味方　全員の\n状態異常を　回復　する。"
    en: "The user makes a soothing bell chime to heal the\nstatus conditions of all the party Pokémon."
    fr: "Carillon apaisant qui soigne les problèmes de\nstatut de tous les Pokémon de l’équipe."
    it: "Chi la usa produce uno scampanellio che cura\ni problemi di stato suoi e dei Pokémon alleati."
    de: "Läutet beruhigend und heilt alle Statusprobleme\nim Team."
    es: "Tañido que cura los problemas de estado de todos \nlos Pokémon del equipo."
    ko: "기분 좋은 방울소리를\n들려주어 같은 편 전원의\n상태 이상을 회복한다."
    zh_simp: "让同伴听舒适的铃音，\n从而治愈我方全员的异常状态。"
    zh_trad: "發出悅耳的鈴聲，\n治癒我方全體的異常狀態。"
heal_block:
  names:
    jp_kana: かいふくふうじ
    jp_kanji: かいふくふうじ
    en: Heal Block
    fr: Anti-Soin
    it: Anticura
    de: Heilblockade
    es: Anticura
    ko: 회복봉인
    zh_simp: 回复封锁
    zh_trad: 回復封鎖
  descriptions:
    jp_kana: "５ターンの　あいだ　わざや\nとくせいや　もっている　どうぐによって\nＨＰを　かいふく　できなく　する。"
    jp_kanji: "５ターンの　間　技や\n特性や　持っている　道具によって\nＨＰを　回復　できなくする。"
    en: "For five turns, the user prevents the opposing team\nfrom using any moves, Abilities, or held items that\nrecover HP."
    fr: "Le lanceur empêche l’ennemi de récupérer des PV\nà l’aide de capacités, talents ou objets tenus,\npendant cinq tours."
    it: "Chi la usa impedisce ai nemici che ha intorno\ndi utilizzare mosse o abilità recupera-PS\nper cinque turni."
    de: "Anwender verhindert für fünf Runden, dass Ziele\ndurch Attacken, Fähigkeiten oder Items KP\nregenerieren."
    es: "Impide al objetivo usar movimientos, habilidades \ny objetos equipados que recuperan PS durante\ncinco turnos."
    ko: "5턴 동안 기술이나 특성,\n지니고 있는 도구에 의한\nHP 회복을 할 수 없게 한다."
    zh_simp: "在５回合内\n无法通过招式、特性或\n携带的道具来回复ＨＰ。"
    zh_trad: "讓對手在５回合內\n無法利用招式、特性或\n攜帶的道具回復ＨＰ。"
heal_order:
  names:
    jp_kana: かいふくしれい
    jp_kanji: かいふくしれい
    en: Heal Order
    fr: Appel Soins
    it: Comandocura
    de: Heilbefehl
    es: Auxilio
    ko: 회복지령
    zh_simp: 回复指令
    zh_trad: 回復指令
  descriptions:
    jp_kana: "しもべを　よびだして　きずを　なおす。\nさいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "しもべを　呼びだして　きずを　治す。\n最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: "The user calls out its underlings to heal it. The user\nregains up to half of its max HP."
    fr: "Le lanceur appelle ses sous-fifres pour le soigner.\nIl récupère jusqu’à la moitié de ses PV max."
    it: "Chi la usa raduna i suoi sgherri per farsi curare.\nRecupera metà dei PS massimi."
    de: "Untergebene heilen den Anwender. KP des\nAnwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: "El usuario llama a sus súbditos para que lo curen. \nRecupera hasta la mitad de los PS máximos."
    ko: "부하를 불러내어 상처를 회복한다.\n최대 HP의 절반만큼\n자신의 HP를 회복한다."
    zh_simp: "召唤手下疗伤。\n回复自己最大ＨＰ的一半。"
    zh_trad: "呼喚手下，治療自己的傷勢。\n回復自己最大ＨＰ的一半。"
heal_pulse:
  names:
    jp_kana: いやしのはどう
    jp_kanji: いやしのはどう
    en: Heal Pulse
    fr: Vibra Soin
    it: Ondasana
    de: Heilwoge
    es: Pulso Cura
    ko: 치유파동
    zh_simp: 治愈波动
    zh_trad: 治癒波動
  descriptions:
    jp_kana: "いやしのはどうを　とばして\nさいだい　ＨＰの　はんぶん\nあいての　ＨＰを　かいふく　する。"
    jp_kanji: "いやしのはどうを　とばして\n最大ＨＰの　半分\n相手の　ＨＰを　回復する。"
    en: "The user emits a healing pulse that restores the\ntarget’s HP by up to half of its max HP."
    fr: "Une aura de bien-être fait récupérer la moitié de\nses PV max à la cible."
    it: "Chi la usa lancia un’onda rilassante che fa\nrecuperare al bersaglio metà dei suoi PS massimi."
    de: "Anwender löst eine Schmerzen lindernde Welle aus\nund heilt dabei das Ziel mit der Hälfte von dessen\nmaximalen KP."
    es: "Una onda curativa restaura la mitad de los PS\nmáximos del objetivo."
    ko: "치유파동을 날려서\n최대 HP의 절반만큼\n상대의 HP를 회복한다."
    zh_simp: "放出治愈波动，\n从而回复对手\n最大ＨＰ的一半。"
    zh_trad: "釋放出治癒波動，\n讓對手回復\n最大ＨＰ的一半。"
healing_wish:
  names:
    jp_kana: いやしのねがい
    jp_kanji: いやしのねがい
    en: Healing Wish
    fr: Vœu Soin
    it: Curardore
    de: Heilopfer
    es: Deseo Cura
    ko: 치유소원
    zh_simp: 治愈之愿
    zh_trad: 治癒之願
  descriptions:
    jp_kana: "じぶんは　ひんしに　なるが　ひかえから\nでてくる　ポケモンの　じょうたい\nいじょうと　ＨＰを　かいふく　する。"
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\n状態異常と　ＨＰを　回復する。"
    en: "The user faints. In return, the Pokémon taking its\nplace will have its HP restored and status\nconditions cured."
    fr: "Le lanceur tombe K.O. pour soigner les PV et\nle statut du Pokémon qui passe après lui."
    it: "Chi la usa va KO, ma il Pokémon che lo sostituisce\nrecupera tutti i PS e guarisce dai problemi di stato."
    de: "Anwender geht K.O. Das an seine Stelle tretende\nPokémon hat volle KP. Statusprobleme werden\ngeheilt."
    es: "El Pokémon cae debilitado, pero su sustituto\nrecupera su estado y los PS."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n상태 이상과 HP를 회복한다."
    zh_simp: "虽然自己陷入濒死，\n但可以治愈后备上场的\n宝可梦的异常状态以及回复ＨＰ。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以治癒接替上場的\n寶可夢的異常狀態並回復ＨＰ。"
heart_stamp:
  names:
    jp_kana: ハートスタンプ
    jp_kanji: ハートスタンプ
    en: Heart Stamp
    fr: Crève-Cœur
    it: Cuorestampo
    de: Herzstempel
    es: Arrumaco
    ko: 하트스탬프
    zh_simp: 爱心印章
    zh_trad: 愛心印章
  descriptions:
    jp_kana: "かわいい　しぐさで　ゆだん　させて\nきょうれつな　いちげきを　あびせる。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "かわいい　しぐさで　油断させて\n強烈な　一撃を　浴びせる。\n相手を　ひるませることが　ある。"
    en: "The user unleashes a vicious blow after its cute act\nmakes the target less wary. This may also make the\ntarget flinch."
    fr: "Déconcentre l’ennemi avec des mouvements\nmignons avant de le frapper violemment.\nPeut aussi l’apeurer."
    it: "Chi la usa distrae il bersaglio con un faccino\ninnocente per poi sferrargli un colpo devastante\nche può farlo tentennare."
    de: "Verleitet Ziel durch Kokettieren zu Unachtsamkeit\nund verpasst ihm dann einen harten Schlag.\nZiel schreckt eventuell zurück."
    es: "El usuario despista al objetivo con gestos adorables\ny aprovecha la ocasión para asestarle un golpe\ntremendo que puede hacerlo retroceder."
    ko: "귀여운 모습으로 방심시켜서\n강렬한 일격을 날린다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以可爱的动作使对手疏忽，\n乘机给出强烈的一击。\n有时会使对手畏缩。"
    zh_trad: "用可愛的動作讓對手疏忽，\n趁機發出強烈的一擊。\n有時會使對手畏縮。"
heart_swap:
  names:
    jp_kana: ハートスワップ
    jp_kanji: ハートスワップ
    en: Heart Swap
    fr: Permucœur
    it: Cuorbaratto
    de: Statustausch
    es: Cambia Almas
    ko: 하트스웹
    zh_simp: 心灵互换
    zh_trad: 心靈互換
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんと　あいてに　かかっている\nのうりょく　へんかを　いれかえる。"
    jp_kanji: "超能力で\n自分と　相手に　かかっている\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch stat\nchanges with the target."
    fr: "Le lanceur utilise un pouvoir psychique pour\néchanger ses changements de stats avec la cible."
    it: "Chi la usa sfrutta la sua forza psichica per\nscambiare le modifiche alle statistiche con\nil bersaglio."
    de: "Anwender setzt Psycho-Kräfte ein,\num Statusveränderungen des Zieles\nmit den eigenen zu tauschen."
    es: "Usa la fuerza mental para intercambiar con el\nobjetivo los cambios en las características."
    ko: "초능력으로\n자신과 상대에 걸려 있는\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手之间的\n能力变化。"
    zh_trad: "用超能力將自己和對手的\n能力變化互相交換。"
heat_crash:
  names:
    jp_kana: ヒートスタンプ
    jp_kanji: ヒートスタンプ
    en: Heat Crash
    fr: Tacle Feu
    it: Marchiafuoco
    de: Brandstempel
    es: Golpe Calor
    ko: 히트스탬프
    zh_simp: 高温重压
    zh_trad: 高溫重壓
  descriptions:
    jp_kana: "もえる　からだで　あいてに　ぶつかって\nこうげきする。　じぶんが　あいてより\nおもいほど　いりょくが　あがる。"
    jp_kanji: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams its target with its flame-covered\nbody. The more the user outweighs the target, the\ngreater the move’s power."
    fr: "Le lanceur projette son corps enflammé contre\nl’ennemi. S’il est plus lourd que l’ennemi, l’effet\naugmente en conséquence."
    it: "Chi la usa carica con il suo corpo rovente. Più è\npesante rispetto al bersaglio, più danni causa."
    de: "Rempelattacke mit brennendem Körper. Je schwerer\nder Anwender im Vergleich zum Ziel ist, desto\nstärker die Attacke."
    es: "El usuario ataca con su cuerpo ardiente. Cuanto\nmayor sea su peso comparado con el del objetivo, \nmás daño causará."
    ko: "불타는 몸으로 상대에게 부딪쳐서\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用燃烧的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用燃燒的身體重壓對手\n進行攻擊。體重比對手\n重越多，威力越大。"
heat_wave:
  names:
    jp_kana: ねっぷう
    jp_kanji: ねっぷう
    en: Heat Wave
    fr: Canicule
    it: Ondacalda
    de: Hitzewelle
    es: Onda Ígnea
    ko: 열풍
    zh_simp: 热风
    zh_trad: 熱風
  descriptions:
    jp_kana: "あつい　いきを\nあいてに　ふきつけて　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by exhaling hot breath on the\nopposing Pokémon. This may also leave those\nPokémon with a burn."
    fr: "Le lanceur provoque une vague de chaleur.\nPeut aussi brûler l’ennemi."
    it: "Chi la usa investe i nemici che ha intorno con\nuna folata di vento caldo. Può anche scottarli."
    de: "Ziele werden von Sturm aus heißer Luft getroffen und\nverbrennen sich eventuell."
    es: "Provoca un viento abrasador que puede quemar al \nobjetivo."
    ko: "뜨거운 숨결을\n상대에게 내뿜어 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将炎热的气息\n吹向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將炎熱的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
heavy_slam:
  names:
    jp_kana: ヘビーボンバー
    jp_kanji: ヘビーボンバー
    en: Heavy Slam
    fr: Tacle Lourd
    it: Pesobomba
    de: Rammboss
    es: Cuerpo Pesado
    ko: 헤비봄버
    zh_simp: 重磅冲撞
    zh_trad: 重磅衝撞
  descriptions:
    jp_kana: "おもたい　からだで　あいてに　ぶつかって\nこうげきする。　じぶんが　あいてより\nおもいほど　いりょくが　あがる。"
    jp_kanji: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its heavy body.\nThe more the user outweighs the target, the greater\nthe move’s power."
    fr: "Le lanceur se jette sur l’ennemi de tout son poids.\nS’il est plus lourd que l’ennemi, l’effet augmente\nen conséquence."
    it: "Chi la usa si lancia contro il bersaglio con tutto\nil proprio peso. Più è pesante rispetto ad esso,\npiù danni causa."
    de: "Anwender rammt das Ziel mit massivem Körper.\nJe schwerer er im Vergleich zum Ziel ist, desto\nstärker die Attacke."
    es: "El usuario golpea con todo su cuerpo. Cuanto mayor \nsea su peso comparado con el del objetivo, más\ndaño causará."
    ko: "무거운 몸으로 상대에게 부딪쳐\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用沉重的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用沉重的身體衝撞對手進行攻擊。\n體重比對手重越多，威力越大。"
helping_hand:
  names:
    jp_kana: てだすけ
    jp_kanji: てだすけ
    en: Helping Hand
    fr: Coup d’Main
    it: Altruismo
    de: Rechte Hand
    es: Refuerzo
    ko: 도우미
    zh_simp: 帮助
    zh_trad: 幫助
  descriptions:
    jp_kana: "なかまを　たすける。\nてだすけ　された　ポケモンの　わざの\nいりょくは　いつもより　おおきく　なる。"
    jp_kanji: "仲間を　助ける。\nてだすけ　された　ポケモンの　技の\n威力は　いつもより　大きくなる。"
    en: "The user assists an ally by boosting the power of\nthat ally’s attack."
    fr: "Une capacité qui augmente la puissance d’attaque\nd’un allié."
    it: "Mossa che aumenta la potenza dell’attacco\ndi un alleato."
    de: "Anwender steigert die Kraft eines Angriffes eines\nMitstreiters."
    es: "El usuario ayuda a un aliado reforzando la\npotencia de su ataque."
    ko: "동료를 돕는다.\n도움받은 포켓몬이 쓰는 기술의\n위력은 여느 때보다 커진다."
    zh_simp: "帮助伙伴。\n被帮助的宝可梦，\n其招式威力变得比平时大。"
    zh_trad: "幫助夥伴。\n被幫助的寶可夢，\n招式的威力會比原來更大。"
hex:
  names:
    jp_kana: たたりめ
    jp_kanji: たたりめ
    en: Hex
    fr: Châtiment
    it: Sciagura
    de: Bürde
    es: Infortunio
    ko: 병상첨병
    zh_simp: 祸不单行
    zh_trad: 禍不單行
  descriptions:
    jp_kana: "たたみかける　ように　こうげきする。\nじょうたい　いじょうの　あいてに\nおおきな　ダメージを　あたえる。"
    jp_kanji: "たたみかける　ように　攻撃する。\n状態異常の　相手に\n大きな　ダメージを　与える。"
    en: "This relentless attack does massive damage to a\ntarget affected by status conditions."
    fr: "Attaque acharnée qui cause davantage de dégâts\nà l’ennemi s’il a un problème de statut."
    it: "Attacco che causa un danno enorme se il bersaglio \nha problemi di stato."
    de: "Eine Attacke, bei der der Anwender das Ziel\nbedrängt. Fügt Zielen mit Statusproblemen hohen\nSchaden zu."
    es: "Ataque que causa un gran daño a los objetivos que \nsufren problemas de estado."
    ko: "엎친 데 덮친 격으로 공격한다.\n상태 이상인 상대에게\n큰 데미지를 준다."
    zh_simp: "接二连三地进行攻击。\n对处于异常状态的对手\n给予较大的伤害。"
    zh_trad: "接二連三地向對手進行攻擊。\n攻擊陷入異常狀態的對手時，\n能給予較大的傷害。"
hidden_power:
  names:
    jp_kana: めざめるパワー
    jp_kanji: めざめるパワー
    en: Hidden Power
    fr: Puissance Cachée
    it: Introforza
    de: Kraftreserve
    es: Poder Oculto
    ko: 잠재파워
    zh_simp: 觉醒力量
    zh_trad: 覺醒力量
  descriptions:
    jp_kana: "わざを　つかった　ポケモンに　よって\nわざの　タイプが　かわる。"
    jp_kanji: "技を　使った　ポケモンに　よって\n技の　タイプが　変わる。"
    en: "A unique attack that varies in type depending on the\nPokémon using it."
    fr: "Attaque dont le type dépend du Pokémon\nqui l’utilise."
    it: "Mossa singolare che cambia tipo a seconda\ndel Pokémon che la usa."
    de: "Wirkung und Typ der Attacke hängen vom\nAnwender ab."
    es: "Movimiento cuyo tipo varía en función del Pokémon \nque lo usa."
    ko: "기술을 쓴 포켓몬에 따라\n기술의 타입이 바뀐다."
    zh_simp: "招式的属性会随着\n使用此招式的宝可梦而改变。"
    zh_trad: "招式的屬性會隨著\n使用此招式的寶可夢而改變。"
high_horsepower:
  names:
    jp_kana: １０まんばりき
    jp_kanji: １０まんばりき
    en: High Horsepower
    fr: Cavalerie Lourde
    it: Forza Equina
    de: Pferdestärke
    es: Fuerza Equina
    ko: 10만마력
    zh_simp: 十万马力
    zh_trad: 十萬馬力
  descriptions:
    jp_kana: "ぜんしんを　つかって\nあいてに　もうアタックする。"
    jp_kanji: "全身を　使って\n相手に　猛アタックする。"
    en: "The user fiercely attacks the target using its\nentire body."
    fr: "Le lanceur attaque violemment en utilisant\ntout son poids."
    it: "Chi la usa travolge il bersaglio con un attacco\npossente."
    de: "Der Anwender greift das Ziel mit einer heftigen\nGanzkörper-Attacke an."
    es: Asesta un golpe devastador usando todo su cuerpo.
    ko: "온몸을 써서 상대에게\n맹렬히 어택한다."
    zh_simp: "使出全身力量，\n猛攻对手。"
    zh_trad: "使出全身力量，\n猛攻對手。"
high_jump_kick:
  names:
    jp_kana: とびひざげり
    jp_kanji: とびひざげり
    en: High Jump Kick
    fr: Pied Voltige
    it: Calcinvolo
    de: Turmkick
    es: Pat. Salto Alta
    ko: 무릎차기
    zh_simp: 飞膝踢
    zh_trad: 飛膝踢
  descriptions:
    jp_kana: "ジャンプからの　ひざげりで\nあいてを　こうげきする。\nはずすと　じぶんが　ダメージを　うける。"
    jp_kanji: "ジャンプからの　ひざげりで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    en: "The target is attacked with a knee kick from a jump.\nIf it misses, the user is hurt instead."
    fr: "Le lanceur s’élance pour effectuer un coup de\ngenou sauté. S’il échoue, le lanceur se blesse."
    it: "Chi la usa colpisce il bersaglio con una ginocchiata\nin volo. Se fallisce, subisce danni."
    de: "Sprungtritt mit Knie. Bei Misserfolg verletzt sich der\nAnwender selbst."
    es: "Salta muy alto y da un rodillazo. Si falla, dañará \nal usuario."
    ko: "점프해서 무릎차기로\n상대를 공격한다.\n빗나가면 자신이 데미지를 입는다."
    zh_simp: "跳起后用膝盖撞对手进行攻击。\n如果撞偏则自己会受到伤害。"
    zh_trad: "跳起後用膝蓋踢擊對手。\n沒踢中對手時自己會受到傷害。"
hold_back:
  names:
    jp_kana: てかげん
    jp_kanji: てかげん
    en: Hold Back
    fr: Retenue
    it: Riguardo
    de: Zurückhaltung
    es: Clemencia
    ko: 적당히손봐주기
    zh_simp: 手下留情
    zh_trad: 手下留情
  descriptions:
    jp_kana: "てかげん　した　こうげきで\nあいての　ＨＰを\nかならず　１だけ　のこす。"
    jp_kanji: "手加減　した　攻撃で\n相手の　ＨＰを\n必ず　１だけ　残す。"
    en: "The user holds back when it attacks, and the target\nis left with at least 1 HP."
    fr: "Le lanceur attaque avec retenue, et laisse\nau moins 1 PV à l’ennemi."
    it: "Chi la usa attacca il bersaglio, modulando il colpo\nin modo da lasciargli almeno un PS."
    de: "Der Anwender hält sich beim Angriff zurück und\nsorgt auf diese Weise dafür, dass dem Ziel danach\nmindestens 1 KP verbleibt."
    es: "El usuario se contiene a la hora de atacar y deja\nal objetivo con al menos 1 PS."
    ko: "적당히 공격하여\n상대의 HP를\n반드시 1은 남긴다."
    zh_simp: "在攻击的时候手下留情，\n从而使对手的ＨＰ\n至少会留下１ＨＰ。"
    zh_trad: "在攻擊的時候手下留情，\n讓對手的ＨＰ一定會剩下１。"
hold_hands:
  names:
    jp_kana: てをつなぐ
    jp_kanji: てをつなぐ
    en: Hold Hands
    fr: Mains Jointes
    it: Mano nella Mano
    de: Händchenhalten
    es: Manos Juntas
    ko: 손에손잡기
    zh_simp: 牵手
    zh_trad: 牽手
  descriptions:
    jp_kana: "みかたの　ポケモン　どうしが\nてをつなぐ。　とっても　しあわせな\nきもちに　なれる。"
    jp_kanji: "味方の　ポケモン　同士が\n手をつなぐ。　とっても　幸せな\n気持ちに　なれる。"
    en: "The user and an ally hold hands. This makes them\nvery happy."
    fr: "Le lanceur et un allié se prennent la main,\nce qui les rend heureux."
    it: "Il Pokémon che la usa e un alleato si prendono\nper mano e fanno salti di gioia."
    de: "Der Anwender und ein Mitstreiter reichen einander\ndie Hände und verfallen in einen Zustand tiefster\nZufriedenheit."
    es: "El Pokémon le da la mano a un aliado y ambos se \nsienten muy felices."
    ko: "같은 편 포켓몬끼리\n손에 손을 잡는다. 굉장히\n행복한 기분이 들게 된다."
    zh_simp: "我方宝可梦之间牵手。\n能带来非常幸福的心情。"
    zh_trad: "我方的寶可夢手牽手。\n心情會變得非常幸福。"
hone_claws:
  names:
    jp_kana: つめとぎ
    jp_kanji: つめとぎ
    en: Hone Claws
    fr: Aiguisage
    it: Unghiaguzze
    de: Klauenwetzer
    es: Afilagarras
    ko: 손톱갈기
    zh_simp: 磨爪
    zh_trad: 磨爪
  descriptions:
    jp_kana: "ツメを　みがいて　するどく　する。\nじぶんの　こうげきと\nめいちゅうりつを　あげる。"
    jp_kanji: "ツメを　磨いて　鋭く　する。\n自分の　攻撃と\n命中率を　あげる。"
    en: "The user sharpens its claws to boost its Attack stat\nand accuracy."
    fr: "Le lanceur s’aiguise les griffes.\nAugmente l’Attaque et la Précision."
    it: "Chi la usa affila i propri artigli aumentando\nAttacco e precisione."
    de: "Wetzt seine Klauen, um sie zu schärfen.\nErhöht Angriff und Genauigkeit des Anwenders."
    es: "El usuario se afila las garras para aumentar su \nAtaque y Precisión."
    ko: "손톱을 갈아 날카롭게 한다.\n자신의 공격과\n명중률을 올린다."
    zh_simp: "将爪子磨得更加锋利。\n提高自己的攻击和命中率。"
    zh_trad: "將爪子磨得更加鋒利。\n可提高自己的攻擊和命中率。"
horn_attack:
  names:
    jp_kana: つのでつく
    jp_kanji: つのでつく
    en: Horn Attack
    fr: Koud’Korne
    it: Incornata
    de: Hornattacke
    es: Cornada
    ko: 뿔찌르기
    zh_simp: 角撞
    zh_trad: 角撞
  descriptions:
    jp_kana: "するどく　とがった　つので\nあいてを　こうげきする。"
    jp_kanji: "鋭く　とがった　つので\n相手を　攻撃する。"
    en: "The target is jabbed with a sharply pointed horn to\ninflict damage."
    fr: "Frappe l’ennemi d’un coup de corne pointue pour\ninfliger des dégâts."
    it: "Danneggia il bersaglio infilzandolo con un corno\naffilato."
    de: Spießt das Ziel mit einem spitzen Horn auf.
    es: Ataca al objetivo con una cornada.
    ko: "날카롭고 뾰족한 뿔로\n상대를 공격한다."
    zh_simp: 用尖锐的角攻击对手。
    zh_trad: 用尖銳的角攻擊對手。
horn_drill:
  names:
    jp_kana: つのドリル
    jp_kanji: つのドリル
    en: Horn Drill
    fr: Empal’Korne
    it: Perforcorno
    de: Hornbohrer
    es: Perforador
    ko: 뿔드릴
    zh_simp: 角钻
    zh_trad: 角鑽
  descriptions:
    jp_kana: "かいてんする　つのを\nあいてに　つきさして　こうげきする。\nあたれば　いちげきで　ひんしに　する。"
    jp_kanji: "回転する　つのを\n相手に　突き刺して　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user stabs the target with a horn that rotates\nlike a drill. The target faints instantly if this\nattack hits."
    fr: "Un coup de corne en vrille qui empale l’ennemi,\nle mettant K.O. sur le coup s’il est touché."
    it: "Colpisce il bersaglio con un corno perforante\ncome un trapano. Se il colpo va a segno,\nil Pokémon colpito va KO."
    de: "Attacke, bei der ein Horn als Bohrer eingesetzt wird.\nIst sie erfolgreich, führt sie zu einem K.O."
    es: "Ataque con un cuerno giratorio que fulmina de un\nsolo golpe al objetivo si lo alcanza."
    ko: "회전하는 뿔을\n상대에게 꿰찔러서 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "用旋转的角\n刺入对手进行攻击。\n只要命中就会一击濒死。"
    zh_trad: "用旋轉的角\n刺進對手進行攻擊。\n只要命中就會一擊瀕死。"
horn_leech:
  names:
    jp_kana: ウッドホーン
    jp_kanji: ウッドホーン
    en: Horn Leech
    fr: Encornebois
    it: Legnicorno
    de: Holzgeweih
    es: Asta Drenaje
    ko: 우드호른
    zh_simp: 木角
    zh_trad: 木角
  descriptions:
    jp_kana: "つのを　つきさして　あいての　ようぶんを\nすいとる。　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "つのを　突き刺して　相手の　養分を\n吸い取る。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s energy with its horns.\nThe user’s HP is restored by half the damage taken\nby the target."
    fr: "Un coup de corne qui draine l’énergie de l’ennemi.\nConvertit la moitié des dégâts infligés en PV pour\nle lanceur."
    it: "Chi la usa infilza il bersaglio con le corna e\nassorbe una quantità di PS pari a metà\ndel danno inferto."
    de: "Greift Ziel mit einem Astgeweih an und zapft diesem\nEnergie ab. Anwender wird um die Hälfte des\nzugefügten Schadens geheilt."
    es: "Un golpe que drena energía. El Pokémon recupera \nla mitad de los PS arrebatados al objetivo."
    ko: "뿔을 꿰찔러서 상대의 양분을\n흡수한다. 입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "将角刺入，吸取对手的养分。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "將角刺進對手，吸取養分。\n可以回復給予對手\n傷害的一半ＨＰ。"
howl:
  names:
    jp_kana: とおぼえ
    jp_kanji: とおぼえ
    en: Howl
    fr: Grondement
    it: Gridodilotta
    de: Jauler
    es: Aullido
    ko: 멀리짖음
    zh_simp: 长嚎
    zh_trad: 長嚎
  descriptions:
    jp_kana: "おおごえで　ほえて　きあいを　たかめ\nじぶんの　こうげきを　あげる。"
    jp_kanji: "大声で　ほえて　気合を　高め\n自分の　攻撃を　あげる。"
    en: "The user howls loudly to raise its spirit, which raises\nits Attack stat."
    fr: "Le lanceur grogne pour se rassurer, ce qui augmente\nson Attaque."
    it: "Chi la usa emette un forte verso per darsi\ncoraggio e aumentare l’Attacco."
    de: "Anwender jault, um seinen Kampfgeist und seinen\nAngriffs-Wert zu erhöhen."
    es: Aullido que sube el ánimo y aumenta el Ataque.
    ko: "큰 소리로 짖고 기합을 높여\n자신의 공격을 올린다."
    zh_simp: "大声吼叫提高气势，\n从而提高自己的攻击。"
    zh_trad: "大聲地吼叫提升氣勢，\n提高自己的攻擊。"
hurricane:
  names:
    jp_kana: ぼうふう
    jp_kanji: ぼうふう
    en: Hurricane
    fr: Vent Violent
    it: Tifone
    de: Orkan
    es: Vendaval
    ko: 폭풍
    zh_simp: 暴风
    zh_trad: 暴風
  descriptions:
    jp_kana: "きょうれつな　かぜで　あいてを\nつつみこんで　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "強烈な　風で　相手を\n包みこんで　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks by wrapping its opponent in a\nfierce wind that flies up into the sky. This may also\nconfuse the target."
    fr: "Le lanceur déclenche une tempête de vents\nviolents qui s’abat sur l’ennemi. Peut aussi le\nrendre confus."
    it: "Chi la usa attacca il bersaglio avvolgendolo con\nun vento fortissimo. Può anche confonderlo."
    de: "Anwender greift das Ziel an, indem er es mit heftigen\nWindböen umgibt. Ziel wird eventuell verwirrt."
    es: "Golpea al objetivo con un fuerte torbellino que\nenvuelve al rival y puede confundirlo."
    ko: "강렬한 바람으로 상대를\n둘러싸서 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用强烈的风席卷\n对手进行攻击。\n有时会使对手混乱。"
    zh_trad: "用強烈的風席捲\n對手進行攻擊。\n有時會使對手混亂。"
hydro_cannon:
  names:
    jp_kana: ハイドロカノン
    jp_kanji: ハイドロカノン
    en: Hydro Cannon
    fr: Hydroblast
    it: Idrocannone
    de: Aquahaubitze
    es: Hidrocañón
    ko: 하이드로캐논
    zh_simp: 加农水炮
    zh_trad: 加農水炮
  descriptions:
    jp_kana: "みずの　たいほうを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "水の　大砲を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is hit with a watery blast. The user can’t\nmove on the next turn."
    fr: "Une trombe d’eau heurte l’ennemi.\nLe lanceur doit se reposer au tour suivant."
    it: "Colpisce il bersaglio con un potente getto d’acqua.\nChi la usa salta il turno successivo."
    de: "Das Ziel wird von einer Wasserkanone getroffen.\nAngreifer setzt eine Runde aus."
    es: "Disparo de agua. El atacante debe descansar el \nsiguiente turno."
    ko: "물의 대포를\n상대에게 발사해서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手喷射水炮进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射水炮進行攻擊。\n下一回合自己將無法動彈。"
hydro_pump:
  names:
    jp_kana: ハイドロポンプ
    jp_kanji: ハイドロポンプ
    en: Hydro Pump
    fr: Hydrocanon
    it: Idropompa
    de: Hydropumpe
    es: Hidrobomba
    ko: 하이드로펌프
    zh_simp: 水炮
    zh_trad: 水炮
  descriptions:
    jp_kana: "たいりょうの　みずを\nはげしい　いきおいで\nあいてに　はっしゃして　こうげきする。"
    jp_kanji: "大量の　水を\n激しい　勢いで\n相手に　発射して　攻撃する。"
    en: "The target is blasted by a huge volume of water\nlaunched under great pressure."
    fr: Un puissant jet d’eau est dirigé sur l’ennemi.
    it: "Il bersaglio è travolto da un potente getto d’acqua\nspruzzato ad altissima pressione."
    de: "Spritzt eine Menge Wasser mit Hochdruck auf\ndas Ziel."
    es: Lanza una gran masa de agua a presión para atacar.
    ko: "대량의 물을\n세찬 기세로\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n大量水流进行攻击。"
    zh_trad: "向對手猛烈地噴射\n大量水流進行攻擊。"
hydro_vortex:physical:
  names:
    jp_kana: スーパーアクアトルネード
    jp_kanji: スーパーアクアトルネード
    en: Hydro Vortex
    fr: Super Tourbillon Abyssal
    it: Idrovortice Abissale
    de: Super-Wassertornado
    es: Hidrovórtice Abisal
    ko: 슈퍼아쿠아토네이도
    zh_simp: 超级水流大漩涡
    zh_trad: 超級水流大漩渦
  descriptions:
    jp_kana: "Ｚパワーで　おおきな　うずしおを　つくり\nぜんりょくで　あいてを　のみこむ。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　大きな　渦潮を　作り\n全力で　相手を　飲みこむ。\n元になった　技で　威力が　変わる。"
    en: "The user creates a huge whirling current using\nits Z-Power to swallow the target with full force.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour créer un tourbillon\ngigantesque qui avale l’adversaire. La puissance\nvarie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa crea un enorme vortice\nche inghiotte il bersaglio. La potenza varia\na seconda della mossa su cui si basa."
    de: "Der Anwender kreiert mit Z-Kraft einen riesigen\nWasserstrudel, der das Ziel verschluckt. Die Stärke\nvariiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para crear un potente\ntorbellino de agua que engulle al objetivo. Su\npotencia depende de la del movimiento original."
    ko: "Z파워로 큰 바다회오리를 만들어\n전력으로 상대를 집어삼킨다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量制造大大的潮旋，\n全力吞没对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量製造大大的潮旋，\n全力吞沒對手。\n威力會隨原本的招式而改變。"
hydro_vortex:special:
  names:
    jp_kana: スーパーアクアトルネード
    jp_kanji: スーパーアクアトルネード
    en: Hydro Vortex
    fr: Super Tourbillon Abyssal
    it: Idrovortice Abissale
    de: Super-Wassertornado
    es: Hidrovórtice Abisal
    ko: 슈퍼아쿠아토네이도
    zh_simp: 超级水流大漩涡
    zh_trad: 超級水流大漩渦
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
hyper_beam:
  names:
    jp_kana: はかいこうせん
    jp_kanji: はかいこうせん
    en: Hyper Beam
    fr: Ultralaser
    it: Iper Raggio
    de: Hyperstrahl
    es: Hiperrayo
    ko: 파괴광선
    zh_simp: 破坏光线
    zh_trad: 破壞光線
  descriptions:
    jp_kana: "つよい　こうせんを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful beam.\nThe user can’t move on the next turn."
    fr: "Projette un puissant rayon sur l’ennemi.\nLe lanceur doit se reposer au tour suivant."
    it: "Colpisce il bersaglio con un potente raggio.\nChi la usa salta il turno successivo per recuperare\nenergia."
    de: "Starke Attacke, die den Anwender zwingt,\neine Runde auszusetzen."
    es: "Es eficaz, pero el atacante deberá descansar en el \nsiguiente turno."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手发射\n强烈的光线进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n強烈的光線進行攻擊。\n下一回合自己將無法動彈。"
hyper_fang:
  names:
    jp_kana: ひっさつまえば
    jp_kanji: ひっさつまえば
    en: Hyper Fang
    fr: Croc de Mort
    it: Iperzanna
    de: Hyperzahn
    es: Hipercolmillo
    ko: 필살앞니
    zh_simp: 必杀门牙
    zh_trad: 必殺門牙
  descriptions:
    jp_kana: "するどい　まえばで\nつよく　かみついて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋭い　前歯で\n強く　かみついて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user bites hard on the target with its sharp\nfront fangs. This may also make the target flinch."
    fr: "Le lanceur mord l’ennemi à l’aide de ses incisives\naiguisées. Peut aussi l’apeurer."
    it: "Chi la usa morde il bersaglio con i suoi incisivi\naffilati. Può anche farlo tentennare."
    de: "Angriff mit scharfen Reißzähnen. Ziel schreckt\neventuell zurück."
    es: "Ataque con finos colmillos. Puede hacer retroceder \nal objetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用锋利的门牙\n牢牢地咬住对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用銳利的門牙\n牢牢咬住對手進行攻擊。\n有時會使對手畏縮。"
hyper_voice:
  names:
    jp_kana: ハイパーボイス
    jp_kanji: ハイパーボイス
    en: Hyper Voice
    fr: Mégaphone
    it: Granvoce
    de: Schallwelle
    es: Vozarrón
    ko: 하이퍼보이스
    zh_simp: 巨声
    zh_trad: 巨聲
  descriptions:
    jp_kana: "うるさく　ひびく　おおきな　しんどうを\nあいてに　あたえて　こうげきする。"
    jp_kanji: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user lets loose a horribly echoing shout with\nthe power to inflict damage."
    fr: "Le lanceur pousse un cri dont l’écho terrifiant a\nle pouvoir d’infliger des dégâts à l’ennemi."
    it: "Chi la usa lancia un urlo straziante che danneggia\ni nemici intorno a sé."
    de: Laute Attacke mit Schallwellen.
    es: Grito desgarrador que inflige daño al objetivo.
    ko: "시끄럽게 울리는 큰 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "给予对手又吵又响的\n巨大震动进行攻击。"
    zh_trad: "製造出震耳欲聾的\n巨大聲波攻擊對手。"
hyperspace_fury:
  names:
    jp_kana: いじげんラッシュ
    jp_kanji: いじげんラッシュ
    en: Hyperspace Fury
    fr: Furie Dimension
    it: Urtodimensionale
    de: Dimensionswahn
    es: Cerco Dimensión
    ko: 다른차원러시
    zh_simp: 异次元猛攻
    zh_trad: 異次元猛攻
  descriptions:
    jp_kana: "たくさんの　うでで　まもるや　みきり\nなどを　むしした　れんぞくこうげき。\nじぶんの　ぼうぎょが　さがる。"
    jp_kanji: "たくさんの　腕で　まもるや　みきり\nなどを　無視した　連続攻撃。\n自分の　防御が　さがる。"
    en: "Using its many arms, the user unleashes a barrage of\nattacks that ignore the effects of moves like Protect\nand Detect. But the user’s Defense stat falls."
    fr: "Le Pokémon utilise sa multitude de bras pour infliger\nune nuée de coups qui ignorent les capacités telles\nqu’Abri ou Détection. Baisse la Défense du lanceur."
    it: "Permette di attaccare ripetutamente grazie ai molti\narti, ignorando mosse come Protezione o Individua. \nRiduce la Difesa di chi la usa."
    de: "Eine Angriffsserie mit vielen Armen, die die Wirkung\nvon Attacken wie Schutzschild und Scanner durch-\nbricht. Dabei sinkt die Verteidigung des Anwenders."
    es: "Ataca al objetivo con una ráfaga de golpes que \npasan por alto los efectos de movimientos como \nProtección o Detección. Baja la Defensa del usuario."
    ko: "많은 팔로 방어와 판별 등을\n무시하는 연속 공격이다.\n자신의 방어가 떨어진다."
    zh_simp: "用许多手臂，无视对手的\n守住或看穿等招式进行连续攻击，\n自己的防御会降低。"
    zh_trad: "使用許多手臂，發動可\n不顧守住和看穿的連續攻擊。\n自己的防禦會降低。"
hyperspace_hole:
  names:
    jp_kana: いじげんホール
    jp_kanji: いじげんホール
    en: Hyperspace Hole
    fr: TrouDimensionnel
    it: Forodimensionale
    de: Dimensionsloch
    es: Paso Dimensional
    ko: 다른차원홀
    zh_simp: 异次元洞
    zh_trad: 異次元洞
  descriptions:
    jp_kana: "いじげんホールで　とつぜん　あいての\nまよこに　あらわれ　こうげきする。\nまもるや　みきり　なども　むし　できる。"
    jp_kanji: "異次元ホールで　突然　相手の\n真横に　現れ　攻撃する。\nまもるや　みきり　なども　無視　できる。"
    en: "Using a hyperspace hole, the user appears right\nnext to the target and strikes. This also hits a target\nusing a move such as Protect or Detect."
    fr: "Crée une faille dimensionnelle pour attaquer\nsoudainement l’ennemi de côté. Ignore même\nles capacités comme Abri ou Détection."
    it: "Chi la usa sfrutta un passaggio interdimensionale\nper comparire a fianco del bersaglio e colpirlo,\neludendo mosse come Protezione e Individua."
    de: "Der Anwender positioniert sich mithilfe eines\nDimensionslochs direkt neben dem Ziel und\ndurchbricht selbst Schutzschild, Scanner etc."
    es: "El usuario aparece junto al rival usando un agujero\ndimensional y le asesta un golpe que movimientos\ncomo Protección o Detección no pueden evitar."
    ko: "다른차원홀로 갑자기 상대\n바로 옆에 나타나 공격한다.\n방어나 판별 등도 무시할 수 있다."
    zh_simp: "通过异次元洞，\n突然出现在对手的侧面进行攻击。\n还可以无视守住和看穿等招式。"
    zh_trad: "利用異次元洞，\n突然出現在對手的側面進行攻擊。\n可避開對手的守住和看穿等招式。"
hypnosis:
  names:
    jp_kana: さいみんじゅつ
    jp_kanji: さいみんじゅつ
    en: Hypnosis
    fr: Hypnose
    it: Ipnosi
    de: Hypnose
    es: Hipnosis
    ko: 최면술
    zh_simp: 催眠术
    zh_trad: 催眠術
  descriptions:
    jp_kana: "ねむけを　さそう　あんじを　かけて\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "眠気を　誘う　暗示を　かけて\n相手を　眠り状態に　する。"
    en: "The user employs hypnotic suggestion to make the\ntarget fall into a deep sleep."
    fr: "Le lanceur hypnotise l’ennemi pour le plonger\ndans un profond sommeil."
    it: "Chi la usa si avvale della suggestione ipnotica\nper far addormentare il bersaglio."
    de: Hypnose-Attacke, die das Ziel in Schlaf versetzt.
    es: "Ataque hipnótico que hace dormir profundamente al \nobjetivo."
    ko: "졸음을 유도하는 암시를 걸어서\n상대를 잠듦 상태로 만든다."
    zh_simp: "施以诱导睡意的暗示，\n让对手陷入睡眠状态。"
    zh_trad: "施加引發睡意的暗示，\n讓對手陷入睡眠狀態。"
ice_ball:
  names:
    jp_kana: アイスボール
    jp_kanji: アイスボール
    en: Ice Ball
    fr: Ball’Glace
    it: Palla Gelo
    de: Frostbeule
    es: Bola Hielo
    ko: 아이스볼
    zh_simp: 冰球
    zh_trad: 冰球
  descriptions:
    jp_kana: "５ターンの　あいだ\nあいてを　こうげきする。\nわざが　あたるたび　いりょくが　あがる。"
    jp_kanji: "５ターンの　間　相手を　攻撃する。\n技が　当たるたび　威力が　あがる。"
    en: "The user attacks the target for five turns.\nThe move’s power increases each time it hits."
    fr: "Frappe l’ennemi pendant cinq tours.\nL’attaque gagne en puissance à chaque coup."
    it: "Chi la usa attacca il bersaglio per cinque turni,\ncon aumento progressivo della potenza ogni volta\nche va a segno."
    de: "Attacke, die fünf Runden dauert. Mit jedem Treffer\nsteigt der Schaden in der nächsten Runde."
    es: "El atacante rueda contra el objetivo durante cinco \nturnos, cada vez con mayor fuerza."
    ko: "5턴 동안\n상대를 공격한다.\n기술이 맞을 때마다 위력이 올라간다."
    zh_simp: "在５回合内攻击对手。\n招式每次击中，威力就会提高。"
    zh_trad: "在５回合內不斷攻擊對手。\n每擊中一次，威力就會提高。"
ice_beam:
  names:
    jp_kana: れいとうビーム
    jp_kanji: れいとうビーム
    en: Ice Beam
    fr: Laser Glace
    it: Geloraggio
    de: Eisstrahl
    es: Rayo Hielo
    ko: 냉동빔
    zh_simp: 冰冻光束
    zh_trad: 冰凍光束
  descriptions:
    jp_kana: "こごえる　ビームを\nあいてに　はっしゃして　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target frozen."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il bersaglio è colpito da un raggio di energia gelida\nche può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und friert\neventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n冰冻光束进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時會讓對手陷入冰凍狀態。"
ice_burn:
  names:
    jp_kana: コールドフレア
    jp_kanji: コールドフレア
    en: Ice Burn
    fr: Feu Glacé
    it: Vampagelida
    de: Frosthauch
    es: Llama Gélida
    ko: 콜드플레어
    zh_simp: 极寒冷焰
    zh_trad: 極寒冷焰
  descriptions:
    jp_kana: "すべてを　こおらせる　はげしい　れいきで\n２ターンめに　あいてを　つつみこむ。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "すべてを　凍らせる　激しい　冷気で\n２ターン目に　相手を　包みこむ。\nやけど状態に　することが　ある。"
    en: "On the second turn, an ultracold, freezing wind\nsurrounds the target. This may leave the target with\na burn."
    fr: "Au second tour, le lanceur projette un souffle de\nvent glacial dévastateur sur l’ennemi. Peut aussi le\nbrûler."
    it: "Chi la usa attacca il bersaglio al turno successivo\ne lo avvolge in un soffio d’aria gelida.\nPuò anche scottarlo."
    de: "Umgibt das Ziel in der nächsten Runde mit heftigen,\nalles gefrierenden Eisböen. Fügt dem Ziel eventuell\nVerbrennungen zu."
    es: "Ataca al objetivo en el segundo turno rodeándolo \nde un aire gélido. Puede causar quemaduras."
    ko: "모든 것을 얼려버리는 격렬한 냉기로\n2턴째에 상대를 둘러싼다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用能够冻结一切的强烈冷气，\n在第２回合包裹住对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "在使用後的下一回合，\n用能夠凍結一切的強烈寒氣包圍對手。\n有時會讓對手陷入灼傷狀態。"
ice_fang:
  names:
    jp_kana: こおりのキバ
    jp_kanji: こおりのキバ
    en: Ice Fang
    fr: Crocs Givre
    it: Gelodenti
    de: Eiszahn
    es: Colmillo Hielo
    ko: 얼음엄니
    zh_simp: 冰冻牙
    zh_trad: 冰凍牙
  descriptions:
    jp_kana: "れいきを　ひめた　キバで　かみつく。\nあいてを　ひるませたり\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷気を　ひめた　キバで　かみつく。\n相手を　ひるませたり\nこおり状態に　することが　ある。"
    en: "The user bites with cold-infused fangs. This may\nalso make the target flinch or leave it frozen."
    fr: "Le lanceur utilise une morsure glaciale.\nPeut aussi geler ou apeurer l’ennemi."
    it: "Chi la usa morde con denti ghiacciati. Può anche\ncongelare o far tentennare il bersaglio."
    de: "Anwender beißt mit eiskalten Reißzähnen zu.\nZiel schreckt eventuell zurück oder friert ein."
    es: "Usa colmillos helados para morder. Puede hacer que \nel objetivo retroceda o se congele."
    ko: "냉기를 품은 이빨로 문다.\n상대를 풀죽게 하거나\n얼음 상태로 만들 때가 있다."
    zh_simp: "用藏有冷气的牙齿咬住对手。\n有时会使对手畏缩\n或陷入冰冻状态。"
    zh_trad: "用帶有寒氣的牙齒咬住對手。\n有時會讓對手畏縮\n或陷入冰凍狀態。"
ice_hammer:
  names:
    jp_kana: アイスハンマー
    jp_kanji: アイスハンマー
    en: Ice Hammer
    fr: Marteau de Glace
    it: Martelgelo
    de: Eishammer
    es: Martillo Hielo
    ko: 아이스해머
    zh_simp: 冰锤
    zh_trad: 冰錘
  descriptions:
    jp_kana: "つよくて　おもい　こぶしを\nふるって　ダメージを　あたえる。\nじぶんの　すばやさが　さがる。"
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings and hits with its strong, heavy fist.\nIt lowers the user’s Speed, however."
    fr: "Le lanceur donne un puissant coup de poing à\nl’ennemi. Réduit la Vitesse du lanceur."
    it: "Infligge danni al bersaglio colpendolo con\nun pugno molto potente. Riduce la Velocità\ndi chi la usa."
    de: "Anwender trifft mit einem starken Hieb.\nSenkt Initiative des Anwenders."
    es: "Un terrible puño golpea al contrincante, pero la\nVelocidad del usuario se ve reducida."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的速度会降低。"
    zh_trad: "揮舞強力而沉重的拳頭，\n給予對手傷害。\n自己的速度會降低。"
ice_punch:
  names:
    jp_kana: れいとうパンチ
    jp_kanji: れいとうパンチ
    en: Ice Punch
    fr: Poing-Glace
    it: Gelopugno
    de: Eishieb
    es: Puño Hielo
    ko: 냉동펀치
    zh_simp: 冰冻拳
    zh_trad: 冰凍拳
  descriptions:
    jp_kana: "れいきを　こめた　パンチで\nあいてを　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷気を　こめた　パンチで\n相手を　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is punched with an icy fist. This may also\nleave the target frozen."
    fr: "Un coup de poing glacé vient frapper l’ennemi.\nPeut le geler."
    it: "Colpisce il bersaglio con un pugno di ghiaccio\nche può congelarlo."
    de: Ein eisiger Schlag, der das Ziel eventuell einfriert.
    es: Puñetazo helado. Puede congelar.
    ko: "냉기를 담은 펀치로\n상대를 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "用充满寒气的拳头攻击对手。\n有时会让对手陷入冰冻状态。"
    zh_trad: "用帶有寒氣的拳頭\n攻擊對手。\n有時會讓對手陷入冰凍狀態。"
ice_shard:
  names:
    jp_kana: こおりのつぶて
    jp_kanji: こおりのつぶて
    en: Ice Shard
    fr: Éclats Glace
    it: Geloscheggia
    de: Eissplitter
    es: Canto Helado
    ko: 얼음뭉치
    zh_simp: 冰砾
    zh_trad: 冰礫
  descriptions:
    jp_kana: "こおりの　かたまりを　いっしゅんで\nつくり　あいてに　すばやく　はなつ。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "氷の塊を　一瞬で　つくり\n相手に　素早く　放つ。\n必ず　先制攻撃　できる。"
    en: "The user flash-freezes chunks of ice and hurls them\nat the target. This move always goes first."
    fr: "Le lanceur crée des éclats de glace qu’il envoie\nsur l’ennemi. Frappe en priorité."
    it: "Chi la usa crea dei pezzi di ghiaccio e li lancia.\nQuesta mossa ha priorità alta."
    de: "Das Ziel wird mit Eisklumpen beworfen.\nHohe Erstschlagquote."
    es: "Crea bolas de hielo y las lanza a gran velocidad. \nEste movimiento tiene prioridad alta."
    ko: "얼음덩어리를 순식간에 만들어\n상대에게 빠르게 쏜다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "瞬间制作冰块，\n快速地扔向对手。\n必定能够先制攻击。"
    zh_trad: "將瞬間製造出的冰塊\n快速地扔向對手。\n必定能夠發動先制攻擊。"
icicle_crash:
  names:
    jp_kana: つららおとし
    jp_kanji: つららおとし
    en: Icicle Crash
    fr: Chute Glace
    it: Scagliagelo
    de: Eiszapfhagel
    es: Chuzos
    ko: 고드름떨구기
    zh_simp: 冰柱坠击
    zh_trad: 冰柱墜擊
  descriptions:
    jp_kana: "おおきな　つららを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　氷柱を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks by harshly dropping large icicles\nonto the target. This may also make the target flinch."
    fr: "Envoie de gros blocs de glace sur l’ennemi pour\nlui infliger des dégâts. Peut aussi l’apeurer."
    it: "Chi la usa attacca violentemente il bersaglio con\ngrosse stalattiti di ghiaccio che possono anche\nfarlo tentennare."
    de: "Lässt große, schwere Eiszapfen auf das Ziel\nherabregnen. Ziel schreckt eventuell zurück."
    es: "Lanza grandes carámbanos. Puede hacer retroceder \nal objetivo."
    ko: "큰 고드름을\n격렬하게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用大冰柱激烈地\n撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將巨大冰柱猛烈地\n砸向對手進行攻擊。\n有時會使對手畏縮。"
icicle_spear:
  names:
    jp_kana: つららばり
    jp_kanji: つららばり
    en: Icicle Spear
    fr: Stalagtite
    it: Gelolancia
    de: Eisspeer
    es: Carámbano
    ko: 고드름침
    zh_simp: 冰锥
    zh_trad: 冰錐
  descriptions:
    jp_kana: "するどい　つららを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "鋭い　氷柱を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user launches sharp icicles at the target two to\nfive times in a row."
    fr: "Le lanceur jette des pics de glace sur l’ennemi,\nde deux à cinq fois de suite."
    it: "Chi la usa spara ghiaccioli affilati contro il bersaglio \nda due a cinque volte di fila."
    de: Feuert zwei bis fünf Eiszapfen auf das Ziel.
    es: "Ataca lanzando de dos a cinco ráfagas\nconsecutivas de carámbanos."
    ko: "날카로운 고드름을\n상대에게 발사하여 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "向对手发射\n锋利的冰柱进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n尖銳的冰柱進行攻擊。\n可連續攻擊２～５次。"
icy_wind:
  names:
    jp_kana: こごえるかぜ
    jp_kanji: こごえるかぜ
    en: Icy Wind
    fr: Vent Glace
    it: Ventogelato
    de: Eissturm
    es: Viento Hielo
    ko: 얼다바람
    zh_simp: 冰冻之风
    zh_trad: 冰凍之風
  descriptions:
    jp_kana: "つめたい　れいきを\nあいてに　ふきつけて　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "凍てつく　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks with a gust of chilled air. This also\nlowers the opposing Pokémon’s Speed stats."
    fr: "Une bourrasque de vent froid blesse l’ennemi.\nRéduit aussi sa Vitesse."
    it: "Chi la usa attacca i nemici intorno con\nuna folata di aria gelida e ne riduce anche\nla Velocità."
    de: "Eis-Attacke, die dem Ziel Schaden zufügt und seinen\nInitiative-Wert senkt."
    es: "Ataque con aire helado que baja la Velocidad de los \nrivales."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "将结冰的冷气\n吹向对手进行攻击。\n会降低对手的速度。"
    zh_trad: "將冰冷的寒氣\n吹向對手進行攻擊。\n可降低對手的速度。"
imprison:
  names:
    jp_kana: ふういん
    jp_kanji: ふういん
    en: Imprison
    fr: Possessif
    it: Esclusiva
    de: Begrenzer
    es: Cerca
    ko: 봉인
    zh_simp: 封印
    zh_trad: 封印
  descriptions:
    jp_kana: "あいてが　じぶんと　おなじ　わざを\nおぼえていたら　あいてだけ\nそのわざを　つかえなく　する。"
    jp_kanji: "相手が　自分と　同じ　技を\nおぼえていたら　相手だけ\nその技を　使えなくする。"
    en: "If opposing Pokémon know any move also known by\nthe user, they are prevented from using it."
    fr: "Si l’ennemi et le lanceur ont des capacités en\ncommun, l’ennemi ne pourra pas les utiliser."
    it: "Chi la usa impedisce al nemico di usare mosse\nche conoscono entrambi."
    de: "Hindert Gegner am Einsatz von Attacken, die der\nAnwender selbst auch kennt."
    es: "Impide a los contrincantes usar ataques conocidos \npor el usuario durante el combate."
    ko: "상대가 자신과 같은 기술을\n기억하고 있으면 상대만\n그 기술을 사용할 수 없게 한다."
    zh_simp: "如果对手有和自己相同的招式，\n那么只有对手无法使用该招式。"
    zh_trad: "如果對手也學會了和自己\n相同的招式，則對手將\n不能使用該招式。"
incinerate:
  names:
    jp_kana: やきつくす
    jp_kanji: やきつくす
    en: Incinerate
    fr: Calcination
    it: Bruciatutto
    de: Einäschern
    es: Calcinación
    ko: 불태우기
    zh_simp: 烧尽
    zh_trad: 燒盡
  descriptions:
    jp_kana: "ほのおで　あいてを　こうげきする。\nあいてが　きのみなどを　もっている　とき\nもやして　つかえなく　する。"
    jp_kanji: "炎で　相手を　攻撃する。\n相手が　きのみなどを　持っているとき\n燃やして　使えなくする。"
    en: "The user attacks opposing Pokémon with fire.\nIf a Pokémon is holding a certain item, such as a\nBerry, the item becomes burned up and unusable."
    fr: "Des flammes calcinent l’ennemi.\nS’il tient un objet, une Baie par exemple, celui-ci\nest brûlé et devient inutilisable."
    it: "Attacca i nemici che ha intorno con una fiammata.\nIl fuoco distruggerà le bacche o alcuni tipi di\nstrumenti che i Pokémon hanno con sé."
    de: "Eine Feuer-Attacke. Trägt das Ziel eine Beere oder\nein ähnliches Item bei sich, wird dieses von den\nFlammen verzehrt und geht verloren."
    es: "Llamas que golpean a los objetivos adyacentes. \nSi estos llevan bayas u otros objetos, estos se\nquemarán y ya no se podrán usar."
    ko: "불꽃으로 상대를 공격한다.\n상대가 나무열매 등을 지니고 있을 때\n불태워서 쓸 수 없게 만든다."
    zh_simp: "用火焰攻击对手。\n对手携带树果等时，\n会烧掉，使其不能使用。"
    zh_trad: "用火焰攻擊對手。\n能夠燒掉對手攜帶的樹果等道具，\n讓對手無法使用。"
inferno:
  names:
    jp_kana: れんごく
    jp_kanji: れんごく
    en: Inferno
    fr: Feu d’Enfer
    it: Marchiatura
    de: Inferno
    es: Infierno
    ko: 연옥
    zh_simp: 炼狱
    zh_trad: 煉獄
  descriptions:
    jp_kana: "はげしい　ほのおで\nあいてを　つつみこみ　こうげきする。\nやけど　じょうたいに　する。"
    jp_kanji: "激しい　炎で\n相手を　包みこみ　攻撃する。\nやけど状態に　する。"
    en: "The user attacks by engulfing the target in an\nintense fire. This leaves the target with a burn."
    fr: "L’ennemi est entouré d’un torrent de flammes\nardentes qui le brûlent."
    it: "Il bersaglio viene avvolto da intense fiammate\nche causano scottature."
    de: "Anwender greift das Ziel an, indem er es mit dichten\nFlammen umhüllt. Ziel erleidet Verbrennungen."
    es: "Ataca con una gran ráfaga de fuego que causa \nquemaduras."
    ko: "격렬한 불꽃으로\n상대를 둘러싸 공격한다.\n화상 상태로 만든다."
    zh_simp: "用烈焰包裹住对手进行攻击。\n让对手陷入灼伤状态。"
    zh_trad: "用猛烈的火焰\n包圍對手進行攻擊。\n能讓對手陷入灼傷狀態。"
inferno_overdrive:physical:
  names:
    jp_kana: ダイナミックフルフレイム
    jp_kanji: ダイナミックフルフレイム
    en: Inferno Overdrive
    fr: Pyro-Explosion Cataclysmique
    it: Fiammobomba Detonante
    de: Dynamische Maxiflamme
    es: Hecatombe Pírica
    ko: 다이내믹풀플레임
    zh_simp: 超强极限爆焰弹
    zh_trad: 超強極限爆焰彈
  descriptions:
    jp_kana: "Ｚパワーで　もえさかる　ほのおを　はきだし\nぜんりょくで　あいてに　ぶつける。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　燃えさかる　炎を　吐きだし\n全力で　相手に　ぶつける。\n元になった　技で　威力が　変わる。"
    en: "The user breathes a stream of intense fire toward\nthe target with the full force of its Z-Power.\nThe power varies depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour cracher une boule\nde feu qui réduit l’adversaire en cendres. La\npuissance varie selon celle de la capacité originale."
    it: "Chi la usa sfrutta il Potere Z per emettere fiamme\nincandescenti che inceneriscono il bersaglio. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender speit dank Z-Kraft eine gewaltige\nKugel aus Flammen auf das Ziel. Die Stärke variiert\nje nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para lanzar una\nenorme llamarada con la que calcina a su objetivo.\nSu potencia depende de la del movimiento original."
    ko: "Z파워로 활활 타는 불꽃을 뱉어내\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量喷出熊熊烈火，\n全力撞向对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量噴出熊熊烈火，\n全力撞向對手。\n威力會隨原本的招式而改變。"
inferno_overdrive:special:
  names:
    jp_kana: ダイナミックフルフレイム
    jp_kanji: ダイナミックフルフレイム
    en: Inferno Overdrive
    fr: Pyro-Explosion Cataclysmique
    it: Fiammobomba Detonante
    de: Dynamische Maxiflamme
    es: Hecatombe Pírica
    ko: 다이내믹풀플레임
    zh_simp: 超强极限爆焰弹
    zh_trad: 超強極限爆焰彈
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
infestation:
  names:
    jp_kana: まとわりつく
    jp_kanji: まとわりつく
    en: Infestation
    fr: Harcèlement
    it: Assillo
    de: Plage
    es: Acoso
    ko: 엉겨붙기
    zh_simp: 死缠烂打
    zh_trad: 死纏爛打
  descriptions:
    jp_kana: "４ー５ターンの　あいだ　あいてに\nまとわりついて　こうげきする。\nそのあいだ　あいては　にげられない。"
    jp_kanji: "４ー５ターンの　間　相手に\nまとわりついて　攻撃する。\nそのあいだ　相手は　逃げられない。"
    en: "The target is infested and attacked for four to five\nturns. The target can’t flee during this time."
    fr: "Cette attaque perdure pendant quatre à cinq\ntours. L’ennemi ne peut pas fuir au cours de\ncette période."
    it: "Chi la usa lancia un attacco che tormenta\nil bersaglio per quattro o cinque turni, durante\ni quali gli impedisce di fuggire."
    de: "Der Anwender fällt vier bis fünf Runden lang wie eine\nPlage über das Ziel her und greift es an. In diesem\nZeitraum kann es nicht fliehen."
    es: "Hostiga al objetivo durante cuatro o cinco turnos e\nimpide que pueda huir mientras tanto."
    ko: "4-5턴 동안 상대에게\n엉겨 붙어서 공격한다.\n그동안 상대는 도망갈 수 없다."
    zh_simp: "在４～５回合内\n死缠烂打地进行攻击。\n在此期间对手将无法逃走。"
    zh_trad: "在４～５回合內\n死纏爛打地進行攻擊。\n在此期間對手將無法逃走。"
ingrain:
  names:
    jp_kana: ねをはる
    jp_kanji: ねをはる
    en: Ingrain
    fr: Racines
    it: Radicamento
    de: Verwurzler
    es: Arraigo
    ko: 뿌리박기
    zh_simp: 扎根
    zh_trad: 扎根
  descriptions:
    jp_kana: "だいちに　ねを　はり　まいターン\nじぶんの　ＨＰを　かいふく　する。\nねを　はっているので　いれかえられない。"
    jp_kanji: "大地に　根を　張り\n毎ターン　自分の　ＨＰを　回復する。\n根を　張っているので　入れ替えられない。"
    en: "The user lays roots that restore its HP on every turn.\nBecause it’s rooted, it can’t switch out."
    fr: "Le lanceur plante ses racines et récupère des\nPV à chaque tour. Une fois enraciné, il ne peut\nplus fuir."
    it: "Chi la usa mette delle radici che gli fanno\nrecuperare PS a ogni turno. Non può\nessere sostituito."
    de: "Verwurzelung füllt jede Runde KP auf.\nAustausch und Flucht sind unmöglich."
    es: "Echa raíces para recuperar PS en cada turno, pero \nimpide el relevo."
    ko: "대지에 뿌리를 박아\n매 턴마다 자신의 HP를 회복한다.\n뿌리 박고 있으므로 교체할 수 없다."
    zh_simp: "在大地上扎根，\n每回合回复自己的ＨＰ。\n因为扎根了，所以不能替换宝可梦。"
    zh_trad: "在大地上扎根，\n每回合會回復自己的ＨＰ。\n但扎根之後無法進行替換。"
instruct:
  names:
    jp_kana: さいはい
    jp_kanji: さいはい
    en: Instruct
    fr: Sommation
    it: Imposizione
    de: Kommando
    es: Mandato
    ko: 지휘
    zh_simp: 号令
    zh_trad: 號令
  descriptions:
    jp_kana: "あいてが　だした　わざを\nしじして　もういちど\nださせる　ことが　できる。"
    jp_kanji: "相手が　出した　技を\n指示して　もう一度\n出させることが　できる。"
    en: "The user instructs the target to use the target’s last\nmove again."
    fr: "Force la cible à lancer immédiatement la dernière\ncapacité qu’elle a utilisée."
    it: "Costringe il bersaglio a ripetere immediatamente\nl’ultima mossa che ha sferrato."
    de: "Der Anwender befiehlt dem Ziel, dessen zuletzt\nausgeführte Attacke sofort wieder einzusetzen."
    es: "Fuerza al objetivo a repetir inmediatamente su último\nmovimiento."
    ko: "상대에게 지시하여\n상대가 쓴 기술을\n다시 한 번 쓰게 할 수 있다."
    zh_simp: "向对手下达指示，\n让其再次使出刚才的招式。"
    zh_trad: "對手使出招式之後，\n能夠透過指令讓對手\n再次使出相同招式。"
ion_deluge:
  names:
    jp_kana: プラズマシャワー
    jp_kanji: プラズマシャワー
    en: Ion Deluge
    fr: DélugePlasmique
    it: Pioggiaplasma
    de: Plasmaschauer
    es: Cortina Plasma
    ko: 플라스마샤워
    zh_simp: 等离子浴
    zh_trad: 等離子浴
  descriptions:
    jp_kana: "でんきを　おびた　りゅうしを\nかくさんし　ノーマルタイプの　わざを\nでんきタイプに　してしまう。"
    jp_kanji: "電気を　帯びた　粒子を\n拡散し　ノーマルタイプの　技を\nでんきタイプに　してしまう。"
    en: "The user disperses electrically charged particles,\nwhich changes Normal-type moves to\nElectric-type moves."
    fr: "Diffuse des particules saturées d’électricité qui\ntransforment les capacités de type Normal en\ncapacités de type Électrik."
    it: "Chi la usa disperde delle particelle elettrizzate che\ntrasformano le mosse di tipo Normale in mosse\ndi tipo Elettro."
    de: "Versprüht elektrisch geladene Partikel und bewirkt,\ndass Normal-Attacken den Typ Elektro annehmen."
    es: "El Pokémon disemina partículas con carga eléctrica \nque convierten los movimientos de tipo Normal en\ntipo Eléctrico."
    ko: "전기를 띤 입자를\n확산시켜 노말타입 기술을\n전기타입으로 바꿔버린다."
    zh_simp: "将带电粒子扩散开来，\n使一般属性的招式变成电属性。"
    zh_trad: "讓帶電粒子擴散開來，\n使一般屬性的招式\n變成電屬性。"
iron_defense:
  names:
    jp_kana: てっぺき
    jp_kanji: てっぺき
    en: Iron Defense
    fr: Mur de Fer
    it: Ferroscudo
    de: Eisenabwehr
    es: Defensa Férrea
    ko: 철벽
    zh_simp: 铁壁
    zh_trad: 鐵壁
  descriptions:
    jp_kana: "ひふを　てつのように\nかたくする　ことで\nじぶんの　ぼうぎょを　ぐーんと　あげる。"
    jp_kanji: "皮膚を　鉄のように\n硬くする　ことで\n自分の　防御を　ぐーんと　あげる。"
    en: "The user hardens its body’s surface like iron,\nsharply raising its Defense stat."
    fr: "L’épiderme du lanceur devient dur comme du fer,\nce qui augmente beaucoup sa Défense."
    it: "Il corpo di chi la usa si indurisce come il ferro,\nfacendone salire di molto la Difesa."
    de: "Anwender stärkt den Körper, um den\nVerteidigungs-Wert stark zu erhöhen."
    es: "Fortalece el cuerpo como si fuera de hierro y sube \nmucho la Defensa."
    ko: "피부를 쇠처럼\n단단하게 함으로써\n자신의 방어를 크게 올린다."
    zh_simp: "将皮肤变得坚硬如铁，\n从而大幅提高自己的防御。"
    zh_trad: "將皮膚變得堅硬如鐵，\n大幅提高自己的防禦。"
iron_head:
  names:
    jp_kana: アイアンヘッド
    jp_kanji: アイアンヘッド
    en: Iron Head
    fr: Tête de Fer
    it: Metaltestata
    de: Eisenschädel
    es: Cabeza de Hierro
    ko: 아이언헤드
    zh_simp: 铁头
    zh_trad: 鐵頭
  descriptions:
    jp_kana: "はがねの　ような\nかたい　あたまで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "鋼の　ような\n硬い　頭で　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user slams the target with its steel-hard head.\nThis may also make the target flinch."
    fr: "Le lanceur heurte l’ennemi avec sa tête dure\ncomme de l’acier. Peut aussi l’apeurer."
    it: "Chi la usa colpisce il bersaglio con la sua testa\ndura come l’acciaio. Può anche farlo tentennare."
    de: "Ziel wird durch stahlharten Kopf des Anwenders\ngetroffen und schreckt eventuell zurück."
    es: "Ataca con su dura cabeza de hierro. Puede hacer \nque el objetivo retroceda."
    ko: "강철과 같은\n단단한 머리로 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用钢铁般\n坚硬的头部进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用如同鋼鐵般\n堅硬的頭部進行攻擊。\n有時會讓對手畏縮。"
iron_tail:
  names:
    jp_kana: アイアンテール
    jp_kanji: アイアンテール
    en: Iron Tail
    fr: Queue de Fer
    it: Codacciaio
    de: Eisenschweif
    es: Cola Férrea
    ko: 아이언테일
    zh_simp: 铁尾
    zh_trad: 鐵尾
  descriptions:
    jp_kana: "かたい　しっぽで　あいてを　たたきつけて\nこうげきする。　あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard tail.\nThis may also lower the target’s Defense stat."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser sa Défense."
    it: "Il bersaglio viene colpito da una robusta coda\nd’acciaio. Può anche ridurne la Difesa."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell\nden Verteidigungs-Wert des Zieles."
    es: "Ataca con una cola férrea y puede bajar la Defensa \ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時會降低對手的防禦。"
judgment:
  names:
    jp_kana: さばきのつぶて
    jp_kanji: さばきのつぶて
    en: Judgment
    fr: Jugement
    it: Giudizio
    de: Urteilskraft
    es: Sentencia
    ko: 심판의뭉치
    zh_simp: 制裁光砾
    zh_trad: 制裁光礫
  descriptions:
    jp_kana: "むすうの　こうだんを　あいてに\nほうしゅつする。じぶんの　もつ\nプレートに　より　タイプが　かわる。"
    jp_kanji: "無数の　光弾を　相手に　放出する。\n自分の　持つ　プレートに　より\nタイプが　変わる。"
    en: "The user releases countless shots of light at the\ntarget. This move’s type varies depending on the\nkind of Plate the user is holding."
    fr: "Le lanceur libère une myriade de rayons de lumière.\nLe type varie selon la Plaque que tient le lanceur."
    it: "Chi la usa rilascia numerosi colpi di luce. Il tipo\nvaria a seconda della lastra che ha."
    de: "Anwender feuert unzählige Lichtstrahlen ab.\nDeren Typ hängt von der gehaltenen Tafel ab."
    es: "Emite incontables haces de luz. Varía según el tipo \nde tabla que lleve el usuario."
    ko: "무수한 광탄을 상대에게 방출한다.\n자신이 가지고 있는 플레이트에 따라\n타입이 바뀐다."
    zh_simp: "向对手放出无数的光弹。\n属性会根据自己\n携带的石板不同而改变。"
    zh_trad: "向對手放出無數的光彈。\n招式的屬性會隨著自己\n攜帶的石板不同而改變。"
jump_kick:
  names:
    jp_kana: とびげり
    jp_kanji: とびげり
    en: Jump Kick
    fr: Pied Sauté
    it: Calciosalto
    de: Sprungkick
    es: Patada Salto
    ko: 점프킥
    zh_simp: 飞踢
    zh_trad: 飛踢
  descriptions:
    jp_kana: "たかい　ジャンプからの　キックで\nあいてを　こうげきする。\nはずすと　じぶんが　ダメージを　うける。"
    jp_kanji: "高い　ジャンプからの　キックで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    en: "The user jumps up high, then strikes with a kick.\nIf the kick misses, the user hurts itself."
    fr: "Le lanceur s’envole pour décocher un coup de\npied sauté. S’il échoue, le lanceur se blesse."
    it: "Permette di saltare in alto per attaccare con un\ncalcio. Se non va a buon fine, chi la usa si ferisce."
    de: "Der Angreifer hüpft hoch und tritt zu. Bei Misserfolg\nschadet er sich selbst."
    es: Da un salto y pega una patada. Si falla, se lesiona.
    ko: "높이 점프해서 킥으로\n상대를 공격한다.\n빗나가면 자신이 데미지를 입는다."
    zh_simp: "使出高高的腾空踢攻击对手。\n如果踢偏则自己会受到伤害。"
    zh_trad: "高高跳起之後使出飛踢攻擊對手。\n沒踢中對手時自己會受到傷害。"
karate_chop:
  names:
    jp_kana: からてチョップ
    jp_kanji: からてチョップ
    en: Karate Chop
    fr: Poing-Karaté
    it: Colpokarate
    de: Karateschlag
    es: Golpe Kárate
    ko: 태권당수
    zh_simp: 空手劈
    zh_trad: 空手劈
  descriptions:
    jp_kana: "するどい　チョップで\nあいてを　たたいて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "鋭い　チョップで\n相手を　たたいて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is attacked with a sharp chop. Critical\nhits land more easily."
    fr: "L’ennemi est tranché violemment.\nTaux de critique élevé."
    it: "Colpisce il bersaglio con un colpo netto.\nProbabile brutto colpo."
    de: Gute Möglichkeit, einen Volltreffer zu landen.
    es: Da un golpe cortante. Suele ser crítico.
    ko: "날카로운 당수로\n상대를 때려서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用锋利的手刀\n劈向对手进行攻击。\n容易击中要害。"
    zh_trad: "用鋒利的手刀\n劈向對手進行攻擊。\n容易擊中要害。"
kinesis:
  names:
    jp_kana: スプーンまげ
    jp_kanji: スプーンまげ
    en: Kinesis
    fr: Télékinésie
    it: Cinèsi
    de: Psykraft
    es: Kinético
    ko: 숟가락휘기
    zh_simp: 折弯汤匙
    zh_trad: 折彎湯匙
  descriptions:
    jp_kana: "スプーンを　まげて　ちゅういを　ひき\nあいての　めいちゅうりつを　さげる。"
    jp_kanji: "スプーンを　まげて　注意を　ひき\n相手の　命中率を　さげる。"
    en: "The user distracts the target by bending a spoon.\nThis lowers the target’s accuracy."
    fr: "Le lanceur distrait l’ennemi en pliant une cuiller,\nce qui baisse sa Précision."
    it: "Chi la usa distrae il bersaglio piegando\nun cucchiaio e ne riduce la precisione."
    de: "Lenkt Ziel durch Verbiegen eines Löffels ab.\nSenkt dessen Genauigkeit."
    es: "Dobla una cuchara para distraer al objetivo y bajar \nsu nivel de Precisión."
    ko: "숟가락을 휘어서 주의를 끌어\n상대의 명중률을 낮춘다."
    zh_simp: "折弯汤匙引开注意，\n从而降低对手的命中率。"
    zh_trad: "折彎湯匙引起注意，\n降低對手的命中率。"
kings_shield:
  names:
    jp_kana: キングシールド
    jp_kanji: キングシールド
    en: King’s Shield
    fr: Bouclier Royal
    it: Scudo Reale
    de: Königsschild
    es: Escudo Real
    ko: 킹실드
    zh_simp: 王者盾牌
    zh_trad: 王者盾牌
  descriptions:
    jp_kana: "あいての　こうげきを　ふせぐと　どうじに\nぼうぎょたいせいになる。　ふれた\nあいての　こうげきを　がくっと　さげる。"
    jp_kanji: "相手の　攻撃を　防ぐと　同時に\n防御態勢になる。　触れた\n相手の　攻撃を　がくっと　さげる。"
    en: "The user takes a defensive stance while it protects\nitself from damage. It also harshly lowers the Attack\nstat of any attacker who makes direct contact."
    fr: "Prend une posture défensive pour bloquer les\ndégâts. Diminue beaucoup l’Attaque de tout\nPokémon qui entre en contact avec le lanceur."
    it: "Chi la usa si protegge, assumendo una posizione\ndi difesa e riducendo di molto l’Attacco di nemici\no alleati con cui entra in contatto."
    de: "Der Anwender geht in die Defensive und wird vor\nAngriffen geschützt. Berührt ihn nun ein Pokémon,\nsinkt dessen Angriffs-Wert stark."
    es: "El usuario adopta una postura defensiva y se\nprotege de cualquier daño. Reduce mucho el Ataque\nde cualquier Pokémon con el que entre en contacto."
    ko: "상대의 공격을 막음과 동시에\n방어 태세를 갖춘다. 접촉한\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n自己变为防御姿态。\n大幅降低所接触到的对手的攻击。"
    zh_trad: "防禦來自對手的攻擊，\n同時讓自己變形成盾牌型態。\n讓接觸到自己的對手攻擊大幅降低。"
knock_off:
  names:
    jp_kana: はたきおとす
    jp_kanji: はたきおとす
    en: Knock Off
    fr: Sabotage
    it: Privazione
    de: Abschlag
    es: Desarme
    ko: 탁쳐서떨구기
    zh_simp: 拍落
    zh_trad: 拍落
  descriptions:
    jp_kana: "あいての　もちものを　はたき　おとして\nせんとうが　おわるまで　つかえなくする。\nものをもつ　あいてには　ダメージがます。"
    jp_kanji: "相手の　持ち物を　はたき　落として\n戦闘が　終わるまで　使えなくする。\n物を持つ　相手には　ダメージが増す。"
    en: "The user slaps down the target’s held item, and that\nitem can’t be used in that battle. The move does\nmore damage if the target has a held item."
    fr: "Fait plus de dégâts aux cibles qui tiennent un\nobjet. De plus, fait tomber cet objet et empêche\nla cible de l’utiliser jusqu’à la fin du combat."
    it: "Attacco che fa cadere lo strumento del bersaglio,\nimpedendone l’uso nella lotta. La sua potenza\naumenta se il Pokémon colpito ha uno strumento."
    de: "Schlägt das Item des Zieles weg und vereitelt so\ndessen Gebrauch während des Kampfes. Mehr\nSchaden gegen Ziele, die ein Item bei sich tragen."
    es: "Impide al objetivo usar el objeto que lleva durante \nel combate. La potencia del movimiento se \nmultiplica si el objetivo lleva un objeto."
    ko: "상대의 지닌 물건을 탁 쳐서 떨어뜨려\n배틀이 끝날 때까지 사용할 수 없게 한다.\n물건을 가진 상대에게는 데미지를 더 준다."
    zh_simp: "拍落对手的持有物，\n直到战斗结束都不能使用。\n对手携带道具时会增加伤害。"
    zh_trad: "拍落對手的持有物，\n讓對手在戰鬥結束前都無法使用。\n對手有攜帶物品時，傷害會增加。"
lands_wrath:
  names:
    jp_kana: グランドフォース
    jp_kanji: グランドフォース
    en: Land’s Wrath
    fr: Force Chtonienne
    it: Forza Tellurica
    de: Bodengewalt
    es: Fuerza Telúrica
    ko: 그라운드포스
    zh_simp: 大地神力
    zh_trad: 大地神力
  descriptions:
    jp_kana: "だいちの　パワーを　あつめ\nちからを　あいてに　しゅうちゅう\nさせて　ダメージを　あたえる。"
    jp_kanji: "大地の　パワーを　集め\n力を　相手に　集中させて\nダメージを　与える。"
    en: "The user gathers the energy of the land and focuses\nthat power on opposing Pokémon to damage them."
    fr: "Utilise la puissance du sol et la concentre sur\nl’ennemi pour infliger des dégâts."
    it: "Chi la usa raccoglie energia tellurica e ne\nconcentra il potere sui nemici che ha intorno,\ndanneggiandoli."
    de: "Der Anwender sammelt die Kraft des weiten Landes\nund greift an, indem er sie gebündelt auf das Ziel\nlenkt."
    es: "Acumula energía de la corteza terrestre y la\nconcentra contra los oponentes, dañándolos."
    ko: "대지의 힘을 모으고\n그 힘을 상대에게 집중시켜서\n데미지를 준다."
    zh_simp: "聚集大地的力量，\n将此力量集中攻击对手，\n并给予伤害。"
    zh_trad: "聚集大地的能量後，\n將力量集中攻擊對手給予傷害。"
laser_focus:
  names:
    jp_kana: とぎすます
    jp_kanji: とぎすます
    en: Laser Focus
    fr: Affilage
    it: Concentrazione
    de: Konzentration
    es: Aguzar
    ko: 예민해지기
    zh_simp: 磨砺
    zh_trad: 磨礪
  descriptions:
    jp_kana: "せいしんを　しゅうちゅうして\nつぎの　こうげきを　かならず\nきゅうしょに　あてる。"
    jp_kanji: "精神を　集中して\n次の　攻撃を　必ず\n急所に　当てる。"
    en: "The user concentrates intensely. The attack on the\nnext turn always results in a critical hit."
    fr: "Le lanceur se concentre pour être sûr de porter\nun coup critique au tour suivant."
    it: "Chi la usa si concentra e nel turno successivo\nmetterà sicuramente a segno un brutto colpo."
    de: "Der Anwender konzentriert sich, wodurch sein\nnächster Angriff garantiert ein Volltreffer wird."
    es: "El usuario se concentra para que el siguiente ataque\npropine un golpe crítico."
    ko: "정신을 집중해서\n다음 공격을 반드시\n급소에 맞춘다."
    zh_simp: "集中精神，\n下次攻击必定会击中要害。"
    zh_trad: "集中精神，\n下次攻擊必定會擊中要害。"
last_resort:
  names:
    jp_kana: とっておき
    jp_kanji: とっておき
    en: Last Resort
    fr: Dernier Recours
    it: Ultimascelta
    de: Zuflucht
    es: Última Baza
    ko: 뒀다쓰기
    zh_simp: 珍藏
    zh_trad: 珍藏
  descriptions:
    jp_kana: "せんとうちゅうに　おぼえている　わざを\nすべて　つかうと　はじめて　だせる\nとっておきの　わざ。"
    jp_kanji: "戦闘中に　おぼえている　技を\nすべて　使うと　はじめて　だせる\nとっておきの　技。"
    en: "This move can be used only after the user has used\nall the other moves it knows in the battle."
    fr: "Cette capacité ne peut être utilisée qu’après que\nle lanceur a utilisé toutes les autres."
    it: "Per usare questa mossa, bisogna prima avvalersi\nin lotta di tutte le altre mosse conosciute."
    de: "Diese Attacke kann nur eingesetzt werden, nachdem\nalle verfügbaren Attacken ausgeführt worden sind."
    es: "Este movimiento solo puede utilizarse tras haber \nusado al menos una vez todos los demás\nconocidos por el Pokémon."
    ko: "배틀 중에 기억하고 있는 기술을\n모두 사용하면 그때부터 쓸 수 있는\n필살기이다."
    zh_simp: "当战斗中已学会的招式\n全部使用过后，\n才能开始使出珍藏的招式。"
    zh_trad: "在戰鬥中將其他已學會的招式\n全部使用過後，\n才能夠使出的珍藏招式。"
lava_plume:
  names:
    jp_kana: ふんえん
    jp_kanji: ふんえん
    en: Lava Plume
    fr: Ébullilave
    it: Lavasbuffo
    de: Flammensturm
    es: Humareda
    ko: 분연
    zh_simp: 喷烟
    zh_trad: 噴煙
  descriptions:
    jp_kana: "まっかな　ほのおで　じぶんの\nまわりに　いるものを　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user torches everything around it in an inferno\nof scarlet flames. This may also leave those it hits\nwith a burn."
    fr: "Des boules de feu s’abattent sur tous les Pokémon\nautour du lanceur. Peut aussi les brûler."
    it: "Chi la usa lancia fiamme scarlatte su tutti i\nPokémon nelle vicinanze, danneggiandoli.\nPuò anche scottarli."
    de: "Greift alles in seiner Umgebung mit tiefroten Flammen\nan. Ziel kann Verbrennungen erleiden."
    es: "Un infierno de llamas daña a los Pokémon\nadyacentes en combate. Puede quemar."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击自己周围所有的宝可梦。\n有时会陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入灼傷狀態。"
leaf_blade:
  names:
    jp_kana: リーフブレード
    jp_kanji: リーフブレード
    en: Leaf Blade
    fr: Lame-Feuille
    it: Fendifoglia
    de: Laubklinge
    es: Hoja Aguda
    ko: 리프블레이드
    zh_simp: 叶刃
    zh_trad: 葉刃
  descriptions:
    jp_kana: "はっぱを　つるぎのように　あやつり\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "はっぱを　剣のように　あやつり\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user handles a sharp leaf like a sword and\nattacks by cutting its target. Critical hits land\nmore easily."
    fr: "Une feuille coupante comme une lame entaille\nl’ennemi. Taux de critique élevé."
    it: "Colpisce il bersaglio usando una foglia affilata\ncome una spada. Probabile brutto colpo."
    de: Hieb mit scharfkantigem Blatt. Hohe Volltrefferquote.
    es: "Acuchilla con una hoja fina. Suele dar un golpe \ncrítico."
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "像用剑一般操纵叶片\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "如用劍般操控葉子\n切斬對手進行攻擊。\n容易擊中要害。"
leaf_storm:
  names:
    jp_kana: リーフストーム
    jp_kanji: リーフストーム
    en: Leaf Storm
    fr: Tempête Verte
    it: Verdebufera
    de: Blättersturm
    es: Lluevehojas
    ko: 리프스톰
    zh_simp: 飞叶风暴
    zh_trad: 飛葉風暴
  descriptions:
    jp_kana: "とがった　はっぱで　あいてに　あらしを\nおこす。つかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "とがった　はっぱで　相手に　あらしを\nおこす。使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user whips up a storm of leaves around the\ntarget. The attack’s recoil harshly lowers the user’s\nSp. Atk stat."
    fr: "Invoque une tempête de feuilles acérées.\nLe contrecoup réduit beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Si forma una tempesta di foglie affilate.\nIl contraccolpo riduce di molto l’Attacco Speciale\ndi chi la usa."
    de: "Anwender erzeugt einen Sturm aus scharfen\nBlättern. Rückstoß senkt Spezial-Angriff des\nAnwenders stark."
    es: "Una lluvia de hojas afiladas envuelve al objetivo.\nEl retroceso baja mucho el Ataque Especial de quien\nlo usa."
    ko: "뾰족한 잎사귀로 상대에게 바람을\n일으킨다. 사용하면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "用尖尖的叶片向对手卷起风暴。\n使用之后因为反作用力\n自己的特攻会大幅降低。"
    zh_trad: "用尖銳的葉子捲起風暴向對手進行攻擊。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
leaf_tornado:
  names:
    jp_kana: グラスミキサー
    jp_kanji: グラスミキサー
    en: Leaf Tornado
    fr: Phytomixeur
    it: Vorticerba
    de: Grasmixer
    es: Ciclón de Hojas
    ko: 그래스믹서
    zh_simp: 青草搅拌器
    zh_trad: 青草攪拌器
  descriptions:
    jp_kana: "するどい　はっぱで　あいてを\nつつみこんで　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "鋭い　はっぱで　相手を\n包みこんで　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks its target by encircling it in sharp\nleaves. This attack may also lower the\ntarget’s accuracy."
    fr: "L’ennemi est pris dans un tourbillon de feuilles\nacérées. Peut aussi baisser sa Précision."
    it: "Chi la usa avvolge e attacca il bersaglio con foglie\naffilate che possono anche ridurne la precisione."
    de: "Anwender greift an, indem er das Ziel in scharfes\nBlattwerk einwickelt. Kann die Genauigkeit des Zieles\nsenken."
    es: "Tritura con afiladas hojas y puede bajar la Precisión \ndel objetivo."
    ko: "날카로운 잎사귀로 상대를\n둘러싸서 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "用锋利的叶片包裹住\n对手进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用銳利的葉子包圍住\n對手進行攻擊。\n有時會降低對手的命中率。"
leafage:
  names:
    jp_kana: このは
    jp_kanji: このは
    en: Leafage
    fr: Feuillage
    it: Fogliame
    de: Blattwerk
    es: Follaje
    ko: 나뭇잎
    zh_simp: 树叶
    zh_trad: 樹葉
  descriptions:
    jp_kana: "はっぱを　あいてに　あてて\nこうげきする。"
    jp_kanji: "はっぱを　相手に　当てて\n攻撃する。"
    en: The user attacks by pelting the target with leaves.
    fr: Le lanceur attaque l’ennemi avec des feuilles.
    it: Attacca il bersaglio con delle foglie.
    de: Der Anwender greift das Ziel mit Blättern an.
    es: Ataca al oponente lanzando hojas.
    ko: "잎을 상대에 맞춰\n공격한다."
    zh_simp: "将叶片打向对手，\n进行攻击。"
    zh_trad: "將葉片打向對手，\n進行攻擊。"
leech_life:
  names:
    jp_kana: きゅうけつ
    jp_kanji: きゅうけつ
    en: Leech Life
    fr: Vampirisme
    it: Sanguisuga
    de: Blutsauger
    es: Chupavidas
    ko: 흡혈
    zh_simp: 吸血
    zh_trad: 吸血
  descriptions:
    jp_kana: "ちを　すいとって　あいてを\nこうげきする。　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふく　できる。"
    jp_kanji: "血を　吸い取って　相手を\n攻撃する。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s blood. The user’s HP is\nrestored by half the damage taken by the target."
    fr: "Une attaque qui aspire le sang de l’ennemi.\nLa moitié des dégâts sont convertis en PV\npour le lanceur."
    it: "Mossa succhiasangue. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: "Die Hälfte des zugefügten Schadens wird dem\nAnwender gutgeschrieben."
    es: "Restaura al usuario la mitad del daño causado al \nobjetivo."
    ko: "피를 빨아서 상대를\n공격한다. 준 데미지의\n절반을 HP로 회복한다."
    zh_simp: "吸取血液攻击对手。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的血液進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
leech_seed:
  names:
    jp_kana: やどりぎのタネ
    jp_kanji: やどりぎのタネ
    en: Leech Seed
    fr: Vampigraine
    it: Parassiseme
    de: Egelsamen
    es: Drenadoras
    ko: 씨뿌리기
    zh_simp: 寄生种子
    zh_trad: 寄生種子
  descriptions:
    jp_kana: "うえつけた　あいての　ＨＰを\nまいターン　すこしだけ　すいとり\nじぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "植えつけた　相手の　ＨＰを\n毎ターン　少しだけ　吸い取り\n自分の　ＨＰを　回復する。"
    en: "A seed is planted on the target. It steals some HP\nfrom the target every turn."
    fr: "Une graine est semée sur l’ennemi.\nÀ chaque tour, elle lui dérobe des PV que le lanceur\nrécupère."
    it: "Vengono piantati semi sul bersaglio. Questi\nsottraggono PS a ogni turno permettendo\na chi la usa di curarsi."
    de: "Ziel wird bepflanzt und verliert jede Runde KP, die\nein Pokémon aus dem Team des Anwenders heilen."
    es: "Planta semillas que absorben PS para recuperar la \nsalud del usuario en cada turno."
    ko: "씨가 뿌려진 상대의 HP를\n매 턴 조금씩 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "植入寄生种子后，将在每回合\n一点一点吸取对手的ＨＰ，\n从而用来回复自己的ＨＰ。"
    zh_trad: "在對手身上植入種子，\n每回合吸取對手少許的ＨＰ，\n用來回復自己的ＨＰ。"
leer:
  names:
    jp_kana: にらみつける
    jp_kanji: にらみつける
    en: Leer
    fr: Groz’Yeux
    it: Fulmisguardo
    de: Silberblick
    es: Malicioso
    ko: 째려보기
    zh_simp: 瞪眼
    zh_trad: 瞪眼
  descriptions:
    jp_kana: "するどい　めつきで　おびえさせて\nあいての　ぼうぎょを　さげる。"
    jp_kanji: "鋭い　目つきで　おびえさせて\n相手の　防御を　さげる。"
    en: "The user gives opposing Pokémon an intimidating\nleer that lowers the Defense stat."
    fr: "Le lanceur fait les gros yeux à l’ennemi pour\nl’intimider et baisser sa Défense."
    it: "Terrorizza i nemici intorno con uno sguardo\nfulminante e intimidatorio, riducendone la Difesa."
    de: "Gegnerischer Verteidigungs-Wert wird durch\nangsteinflößenden Blick gesenkt."
    es: Intimida a los rivales para bajar su Defensa.
    ko: "날카로운 눈초리로 겁을 주어\n상대의 방어를 떨어뜨린다."
    zh_simp: "用犀利的眼神使其害怕，\n从而降低对手的防御。"
    zh_trad: "用犀利的眼神使對手害怕，\n降低對手的防禦。"
lick:
  names:
    jp_kana: したでなめる
    jp_kanji: したでなめる
    en: Lick
    fr: Léchouille
    it: Leccata
    de: Schlecker
    es: Lengüetazo
    ko: 핥기
    zh_simp: 舌舔
    zh_trad: 舌舔
  descriptions:
    jp_kana: "ながい　したで\nあいてを　なめまわして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "長い　舌で\n相手を　なめまわして　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is licked with a long tongue, causing\ndamage. This may also leave the target\nwith paralysis."
    fr: "Un grand coup de langue qui inflige des dégâts\nà l’ennemi. Peut aussi le paralyser."
    it: "Una lingua lunga infligge danni al bersaglio\ne può anche paralizzarlo."
    de: "Leck-Attacke mit langer Zunge. Das Ziel wird\neventuell paralysiert."
    es: Una lengua ataca al objetivo. Puede causar parálisis.
    ko: "긴 혀로\n상대를 핥아서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用长长的舌头，\n舔遍对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用長長的舌頭，\n舔遍對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
light_of_ruin:
  names:
    jp_kana: はめつのひかり
    jp_kanji: はめつのひかり
    en: Light of Ruin
    fr: Lumière du Néant
    it: Luce Nefasta
    de: Lux Calamitatis
    es: Luz Aniquiladora
    ko: 파멸의빛
    zh_simp: 破灭之光
    zh_trad: 破滅之光
  descriptions:
    jp_kana: "えいえんのはな　の　パワーを　かりて\nきょうりょくな　こうせんを　うちだす。\nじぶんも　かなりの　ダメージを　うける。"
    jp_kanji: "永遠の花　の　パワーを　かりて\n強力な　光線を　撃ちだす。\n自分も　かなりの　ダメージを　受ける。"
    en: "Drawing power from the Eternal Flower, the user\nfires a powerful beam of light. This also damages the\nuser quite a lot."
    fr: "Utilise la puissance de la fleur Éternelle pour\nlancer un formidable rayon d’énergie.\nBlesse aussi gravement le lanceur."
    it: "Concentra il potere del Fiore Eterno in un raggio\ndi luce potentissimo con cui attacca il bersaglio.\nCausa danni ingenti anche a chi la usa."
    de: "Die Attacke basiert auf der Kraft des Ewigblütlers,\ndie als mächtiger Lichtstrahl abgefeuert wird.\nDer Anwender nimmt dabei selbst großen Schaden."
    es: "El usuario emplea el poder de la Flor Eterna para\nlanzar un potente rayo de luz, pero sufre bastante \ndaño al hacerlo."
    ko: "영원의 꽃의 파워를 빌려서\n강력한 광선을 쏜다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "借用永恒之花的力量，\n发射出强力光线。\n自己也会受到不小的伤害。"
    zh_trad: "借用永恆之花的力量，\n發射出強力光線。\n自己也會受到不小的傷害。"
light_screen:
  names:
    jp_kana: ひかりのかべ
    jp_kanji: ひかりのかべ
    en: Light Screen
    fr: Mur Lumière
    it: Schermoluce
    de: Lichtschild
    es: Pantalla de Luz
    ko: 빛의장막
    zh_simp: 光墙
    zh_trad: 光牆
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅ　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom special attacks for five turns."
    fr: "Un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités spéciales durant\ncinq tours."
    it: "Innalza una barriera di luce fantastica che riduce\ni danni degli attacchi speciali per sé e gli alleati\nper cinque turni."
    de: "Erzeugt eine Lichtwand und senkt den Schaden\ndurch Spezial-Angriffe für fünf Runden."
    es: "Pared de luz que reduce durante cinco turnos el\ndaño producido por los ataques especiales."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 특수공격의\n데미지를 약하게 한다."
    zh_simp: "在５回合内使用神奇的墙，\n减弱从对手那受到的\n特殊攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的特殊攻擊傷害。"
liquidation:
  names:
    jp_kana: アクアブレイク
    jp_kanji: アクアブレイク
    en: Liquidation
    fr: Aqua-Brèche
    it: Idrobreccia
    de: Aquadurchstoß
    es: Hidroariete
    ko: 아쿠아브레이크
    zh_simp: 水流裂破
    zh_trad: 水流裂破
  descriptions:
    jp_kana: "みずの　ちからで　あいてに\nぶつかって　こうげきする。\nあいての　ぼうぎょを　さげる　ことがある。"
    jp_kanji: "水の　力で　相手に\nぶつかって　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user slams into the target using a full-force\nblast of water. This may also lower the target’s\nDefense stat."
    fr: "Le lanceur utilise la force de l’eau pour attaquer.\nPeut aussi baisser la Défense de la cible."
    it: "Chi la usa colpisce il bersaglio con la forza\ndell’acqua. Può anche ridurne la Difesa."
    de: "Der Anwender greift das Ziel mit der Kraft des\nWassers an. Senkt eventuell die Verteidigung des\nZieles."
    es: "Ataca golpeando gracias a la fuerza del agua.\nTambién puede reducir la Defensa del objetivo."
    ko: "물의 힘으로 상대에게\n부딪쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用水之力量撞向对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用水之力量撞向對手進行攻擊。\n有時會降低對手的防禦。"
lock_on:
  names:
    jp_kana: ロックオン
    jp_kanji: ロックオン
    en: Lock-On
    fr: Verrouillage
    it: Localizza
    de: Zielschuss
    es: Fijar Blanco
    ko: 록온
    zh_simp: 锁定
    zh_trad: 鎖定
  descriptions:
    jp_kana: "しょうじゅんを　しっかり　あわせて\nつぎの　こうげきが　かならず\nあいてに　あたるように　する。"
    jp_kanji: "照準を　しっかり　あわせて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    en: "The user takes sure aim at the target. This ensures\nthe next attack does not miss the target."
    fr: "Verrouille l’ennemi pour ne pas le rater au tour\nsuivant."
    it: "Chi la usa punta il bersaglio con precisione.\nLa mossa successiva andrà a segno."
    de: "Visiert das Ziel an und trifft in der nächsten Runde\ngarantiert."
    es: Fija el blanco para que el siguiente ataque no falle.
    ko: "조준을 잘 맞춰\n다음 공격이 반드시\n상대에게 명중하도록 한다."
    zh_simp: "紧紧瞄准对手，\n下次攻击必定会打中。"
    zh_trad: "精確地瞄準，\n下次攻擊時一定\n會命中對手。"
lovely_kiss:
  names:
    jp_kana: あくまのキッス
    jp_kanji: あくまのキッス
    en: Lovely Kiss
    fr: Grobisou
    it: Demonbacio
    de: Todeskuss
    es: Beso Amoroso
    ko: 악마의키스
    zh_simp: 恶魔之吻
    zh_trad: 惡魔之吻
  descriptions:
    jp_kana: "おそろしい　かおで　キスを　せまる。\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "恐ろしい　顔で　キスを　せまる。\n相手を　眠り状態に　する。"
    en: "With a scary face, the user tries to force a kiss on\nthe target. If it succeeds, the target falls asleep."
    fr: "Le lanceur fait un bisou à l’ennemi en prenant\nune mine effrayante. Endort l’ennemi."
    it: "Chi la usa intimidisce il bersaglio con una faccia\npaurosa e gli schiocca un bacio che lo fa\naddormentare."
    de: "Anwender zwingt dem Ziel einen Kuss auf, der Schlaf\nverursacht."
    es: "Intimida al objetivo con una cara que asusta y le\nda un beso que lo deja dormido."
    ko: "무서운 얼굴로 키스한다.\n상대를 잠듦 상태로 만든다."
    zh_simp: "用恐怖的脸强吻对手。\n让对手陷入睡眠状态。"
    zh_trad: "用恐怖的臉強吻對手。\n能讓對手陷入睡眠狀態。"
low_kick:
  names:
    jp_kana: けたぐり
    jp_kanji: けたぐり
    en: Low Kick
    fr: Balayage
    it: Colpo Basso
    de: Fußkick
    es: Patada Baja
    ko: 안다리걸기
    zh_simp: 踢倒
    zh_trad: 踢倒
  descriptions:
    jp_kana: "あしを　つよく　けり　あいてを\nころばせて　こうげきする。あいてが\nおもいほど　いりょくが　あがる。"
    jp_kanji: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    en: "A powerful low kick that makes the target fall over.\nThe heavier the target, the greater the\nmove’s power."
    fr: "Un puissant coup de pied bas qui fauche l’ennemi.\nIl est plus efficace contre les ennemis lourds."
    it: "Un calcio basso e potente che fa cadere\nil bersaglio. Danneggia maggiormente\ni Pokémon più pesanti."
    de: "Ein Tritt, der das Ziel umwirft. Je schwerer das Ziel\nist, desto mehr Schaden fügt ihm die Attacke zu."
    es: "Patada baja que derriba al oponente. Cuanto más\npesa el objetivo, más daño le causa."
    ko: "발을 강하게 걸고\n상대를 넘어뜨려 공격한다.\n상대가 무거울수록 위력이 올라간다."
    zh_simp: "用力踢对手的脚，\n使其摔倒进行攻击。\n对手越重，威力越大。"
    zh_trad: "用力踢對手的腳，\n讓對手摔倒進行攻擊。\n對手越重，威力越大。"
low_sweep:
  names:
    jp_kana: ローキック
    jp_kanji: ローキック
    en: Low Sweep
    fr: Balayette
    it: Calciobasso
    de: Fußtritt
    es: Puntapié
    ko: 로킥
    zh_simp: 下盘踢
    zh_trad: 下盤踢
  descriptions:
    jp_kana: "すばやい　うごきで　あいての　あしを\nねらって　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user makes a swift attack on the target’s legs,\nwhich lowers the target’s Speed stat."
    fr: "Un coup rapide qui affecte la mobilité de l’ennemi\net diminue sa Vitesse."
    it: "Chi la usa colpisce con un attacco fulmineo\nla parte inferiore del corpo del bersaglio,\nriducendone la Velocità."
    de: "Anwender greift mit blitzschnellen Bewegungen die\nBeine des Zieles an und senkt dessen Initiative."
    es: "Ataque rápido dirigido a los pies del objetivo que \nle hace perder Velocidad."
    ko: "재빠른 움직임으로 상대의 다리를\n노려 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "以敏捷的动作瞄准\n对手的脚进行攻击。\n降低对手的速度。"
    zh_trad: "瞄準對手的腳，\n以敏捷的動作進行攻擊。\n可降低對手的速度。"
lucky_chant:
  names:
    jp_kana: おまじない
    jp_kanji: おまじない
    en: Lucky Chant
    fr: Air Veinard
    it: Fortuncanto
    de: Beschwörung
    es: Conjuro
    ko: 주술
    zh_simp: 幸运咒语
    zh_trad: 幸運咒語
  descriptions:
    jp_kana: "てんに　むかって　おいのりを　ささげ\n５ターンの　あいだ　あいての　こうげきを\nきゅうしょに　あたらなく　する。"
    jp_kanji: "天に　むかって　おいのりを　ささげ\n５ターンの　間　相手の　攻撃を\n急所に　当たらなくする。"
    en: "The user chants an incantation toward the sky,\npreventing opposing Pokémon from landing\ncritical hits for five turns."
    fr: "Le lanceur envoie une incantation vers le ciel\net protège l’équipe des coups critiques pendant\ncinq tours."
    it: "Chi la usa rivolge un incantesimo al cielo,\nimpedendo al nemico di sferrare brutti colpi\nalla squadra per cinque turni."
    de: "Anwender singt eine Beschwörungsformel,\ndie fünf Runden lang Volltreffer gegen sein\nTeam verhindert."
    es: "Lanza al cielo un conjuro que protege a todo su\nequipo de golpes críticos."
    ko: "하늘을 향해 기도를 올려\n5턴 동안 상대의 공격을\n급소에 맞지 않게 한다."
    zh_simp: "向天许愿，\n从而在５回合内不会\n被对手的攻击打中要害。"
    zh_trad: "對天許願，\n讓自己在５回合內不會\n被對手的攻擊命中要害。"
lunar_dance:
  names:
    jp_kana: みかづきのまい
    jp_kanji: みかづきのまい
    en: Lunar Dance
    fr: Danse-Lune
    it: Lunardanza
    de: Lunartanz
    es: Danza Lunar
    ko: 초승달춤
    zh_simp: 新月舞
    zh_trad: 新月舞
  descriptions:
    jp_kana: "じぶんは　ひんしに　なるが\nひかえから　でてくる　ポケモンの\nすべての　じょうたいを　かいふく　する。"
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\nすべての　状態を　回復する。"
    en: "The user faints. In return, the Pokémon taking its\nplace will have its status and HP fully restored."
    fr: "Le lanceur tombe K.O. pour soigner le statut et les\nPV du Pokémon qui prendra sa place au combat."
    it: "Chi la usa va KO. Il Pokémon che lo sostituisce\nguarisce dai propri problemi di stato e recupera\ntutti i PS."
    de: "Anwender geht K.O. Das an seine Stelle tretende\nPokémon hat dafür volle KP sowie AP und wird von\nStatusproblemen geheilt."
    es: "El usuario se debilita, pero el Pokémon que lo \nsustituye recupera su estado, los PS y los PP."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n모든 상태를 회복한다."
    zh_simp: "虽然自己陷入濒死，\n但可以治愈后备上场的\n宝可梦的全部状态。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以讓接替上場的\n寶可夢回復到萬全狀態。"
lunge:
  names:
    jp_kana: とびかかる
    jp_kanji: とびかかる
    en: Lunge
    fr: Furie-Bond
    it: Assalto
    de: Anfallen
    es: Plancha
    ko: 덤벼들기
    zh_simp: 猛扑
    zh_trad: 猛撲
  descriptions:
    jp_kana: "ぜんりょくで　あいてに\nとびかかって　こうげき。\nあいての　こうげきを　さげる。"
    jp_kanji: "全力で　相手に\n飛びかかって　攻撃。\n相手の　攻撃を　さげる。"
    en: "The user makes a lunge at the target, attacking with\nfull force. This also lowers the target’s Attack stat."
    fr: "Le lanceur se jette sur la cible de toutes ses forces\npour lui infliger des dégâts et baisser son Attaque."
    it: "Chi la usa si lancia con tutte le sue forze\nsul bersaglio e ne riduce l’Attacco."
    de: "Der Anwender greift das Ziel mit ganzer Kraft an,\nwodurch auch der Angriffs-Wert des Zieles sinkt."
    es: "Ataca al oponente abalanzándose sobre él con todas\nsus fuerzas y reduce su Ataque."
    ko: "전력으로 상대에게\n덤벼들며 공격한다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "全力猛扑对手进行攻击。\n从而降低对手的攻击。"
    zh_trad: "全力猛撲對手進行攻擊。\n進而降低對手的攻擊。"
luster_purge:
  names:
    jp_kana: ラスターパージ
    jp_kanji: ラスターパージ
    en: Luster Purge
    fr: Lumi-Éclat
    it: Abbagliante
    de: Scheinwerfer
    es: Resplandor
    ko: 라스트버지
    zh_simp: 洁净光芒
    zh_trad: 潔淨光芒
  descriptions:
    jp_kana: "まばゆい　ひかりを　ときはなって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "まばゆい　光を\n解放して　攻撃する。\n相手の　特防を　さげることが　ある。"
    en: "The user lets loose a damaging burst of light. This\nmay also lower the target’s Sp. Def stat."
    fr: "Le lanceur libère un éclair lumineux.\nPeut aussi baisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa scatena un’esplosione abbagliante\nche può anche ridurre la Difesa Speciale\ndel Pokémon colpito."
    de: "Angriff mit einem grellem Licht, der die\nSpezial-Verteidigung des Zieles eventuell senkt."
    es: "Fogonazo de luz que puede bajar la Defensa \nEspecial del objetivo."
    ko: "눈부신 빛을 발산하여\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "释放耀眼的光芒进行攻击。\n有时会降低对手的特防。"
    zh_trad: "放出耀眼的光芒進行攻擊。\n有時會降低對手的特防。"
mach_punch:
  names:
    jp_kana: マッハパンチ
    jp_kanji: マッハパンチ
    en: Mach Punch
    fr: Mach Punch
    it: Pugnorapido
    de: Tempohieb
    es: Ultrapuño
    ko: 마하펀치
    zh_simp: 音速拳
    zh_trad: 音速拳
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nパンチを　くりだす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\nパンチを　くりだす。\n必ず　先制攻撃　できる。"
    en: "The user throws a punch at blinding speed. This\nmove always goes first."
    fr: "Coup de poing fulgurant.\nFrappe en priorité."
    it: "Chi la usa tira un pugno a una velocità\nimpressionante.\nQuesta mossa ha priorità alta."
    de: Extrem schneller Hieb mit hoher Erstschlagquote.
    es: "Puñetazo de velocidad fulminante. Este movimiento\ntiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n펀치를 날린다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "以迅雷不及掩耳之势出拳。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢出拳。\n必定能夠發動先制攻擊。"
magic_coat:
  names:
    jp_kana: マジックコート
    jp_kanji: マジックコート
    en: Magic Coat
    fr: Reflet Magik
    it: Magivelo
    de: Magiemantel
    es: Capa Mágica
    ko: 매직코트
    zh_simp: 魔法反射
    zh_trad: 魔法反射
  descriptions:
    jp_kana: "じょうたい　いじょうに　なる　ワザや\nやどりぎのタネ　などを\nだされたとき　あいてに　はねかえす。"
    jp_kanji: "状態異常に　なる　技や\nやどりぎのタネ　などを\nだされたとき　相手に　跳ね返す。"
    en: "A barrier reflects back to the target moves like\nLeech Seed and moves that damage status."
    fr: "Une barrière qui renvoie les capacités comme\nVampigraine et celles affectant le statut et\nles stats."
    it: "Una barriera rimanda al mittente l’effetto\ndi mosse come Parassiseme e di mosse\nche influenzano lo stato."
    de: "Alle Status-Attacken wie Egelsamen werden\nreflektiert."
    es: "Barrera capaz de devolver al agresor movimientos \ncomo Drenadoras y otros que alteran el estado o \nlas características."
    ko: "상대가 상태 이상이 되는 기술이나\n씨뿌리기 등을 썼을 때 되받아친다."
    zh_simp: "当对手使出会变成异常状态的\n招式或寄生种子等时，\n会将对手的招式反射回去。"
    zh_trad: "若對手使用寄生種子或\n其他會讓寶可夢陷入異常狀態的招式時，\n可將對手的招式反彈回去。"
magic_room:
  names:
    jp_kana: マジックルーム
    jp_kanji: マジックルーム
    en: Magic Room
    fr: Zone Magique
    it: Magicozona
    de: Magieraum
    es: Zona Mágica
    ko: 매직룸
    zh_simp: 魔法空间
    zh_trad: 魔法空間
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンのあいだ　すべてのポケモンの\nどうぐの　こうかが　なくなる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの間　すべてのポケモンの\n道具の　効果が　なくなる。"
    en: "The user creates a bizarre area in which Pokémon’s\nheld items lose their effects for five turns."
    fr: "Le lanceur crée une zone étrange.\nPendant cinq tours, les objets tenus par tous\nles Pokémon n’ont plus aucun effet."
    it: "Chi la usa crea una dimensione in cui l’effetto\ndegli strumenti di tutti i Pokémon è annullato\nper cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem\nüber fünf Runden die Wirkung aller von Pokémon\ngetragenen Items aufgehoben ist."
    es: "Crea un espacio misterioso que inutiliza todos los \nobjetos de los Pokémon durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n도구의 효과가 사라진다."
    zh_simp: "制造出离奇的空间。\n在５回合内所有宝可梦\n携带道具的效果都会消失。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，所有寶可夢\n攜帶的道具都會失去效果。"
magical_leaf:
  names:
    jp_kana: マジカルリーフ
    jp_kanji: マジカルリーフ
    en: Magical Leaf
    fr: Feuille Magik
    it: Fogliamagica
    de: Zauberblatt
    es: Hoja Mágica
    ko: 메지컬리프
    zh_simp: 魔法叶
    zh_trad: 魔法葉
  descriptions:
    jp_kana: "あいてを　ついせきする\nふしぎな　はっぱを　まきちらす。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "相手を　追跡する\n不思議な　はっぱを　まきちらす。\n攻撃は　必ず　命中する。"
    en: "The user scatters curious leaves that chase the\ntarget. This attack never misses."
    fr: "Le lanceur disperse d’étranges feuilles qui\npoursuivent l’ennemi. N’échoue jamais."
    it: "Chi la usa sparpaglia strane foglie che inseguono\nil bersaglio. Questa mossa è infallibile."
    de: Magischer Blattangriff, dem nicht auszuweichen ist.
    es: "Esparce extrañas hojas que persiguen al objetivo. \nNo se puede esquivar."
    ko: "상대를 추적하는\n이상한 잎사귀를 흩뿌린다.\n공격은 반드시 명중한다."
    zh_simp: "散落可以追踪\n对手的神奇叶片。\n攻击必定会命中。"
    zh_trad: "散落可以追蹤\n對手的神奇葉子。\n攻擊必定會命中。"
magma_storm:
  names:
    jp_kana: マグマストーム
    jp_kanji: マグマストーム
    en: Magma Storm
    fr: Vortex Magma
    it: Magmaclisma
    de: Lavasturm
    es: Lluvia Ígnea
    ko: 마그마스톰
    zh_simp: 熔岩风暴
    zh_trad: 熔岩風暴
  descriptions:
    jp_kana: "はげしく　もえたぎる　ほのおの　なかに\n４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　燃えたぎる　炎の　なかに\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The target becomes trapped within a maelstrom of\nfire that rages for four to five turns."
    fr: "L’ennemi est pris dans un tourbillon de feu qui\ndure de quatre à cinq tours."
    it: "Intrappola il bersaglio in un turbine di fuoco che\ndura per quattro o cinque turni."
    de: "Das Ziel wird in einen Feuersog gezogen, der vier bis\nfünf Runden aktiv ist."
    es: "El objetivo queda atrapado en una tormenta de \nfuego que dura de cuatro a cinco turnos."
    ko: "세차게 타오르는 불꽃 속에\n4-5턴 동안 상대를\n가두어 공격한다."
    zh_simp: "将对手困在\n熊熊燃烧的火焰中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n熊熊燃燒的火焰中，\n在４～５回合內進行攻擊。"
magnet_bomb:
  names:
    jp_kana: マグネットボム
    jp_kanji: マグネットボム
    en: Magnet Bomb
    fr: Bombaimant
    it: Bombagnete
    de: Magnetbombe
    es: Bomba Imán
    ko: 마그넷봄
    zh_simp: 磁铁炸弹
    zh_trad: 磁鐵炸彈
  descriptions:
    jp_kana: "あいてに　すいつく\nはがねの　ばくだんを　はっしゃする。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "相手に　吸いつく\n鋼の　爆弾を　発射する。\n攻撃は　必ず　命中　する。"
    en: "The user launches steel bombs that stick to the\ntarget. This attack never misses."
    fr: "Le lanceur projette des bombes d’acier qui collent\nà l’ennemi. N’échoue jamais."
    it: "Chi la usa lancia bombe d’acciaio che si attaccano\nal bersaglio. Una mossa infallibile."
    de: "Ziel wird durch Haftbomben getroffen. Diese Attacke\ntrifft immer."
    es: "Lanza unas bombas de hierro que se pegan al \nadversario. No se puede esquivar."
    ko: "상대에게 달라붙는\n강철의 폭탄을 발사한다.\n공격은 반드시 명중한다."
    zh_simp: "发射吸住对手的\n钢铁炸弹。\n攻击必定会命中。"
    zh_trad: "發射能吸住對手的\n鋼鐵炸彈。\n攻擊必定會命中。"
magnet_rise:
  names:
    jp_kana: でんじふゆう
    jp_kanji: でんじふゆう
    en: Magnet Rise
    fr: Vol Magnétik
    it: Magnetascesa
    de: Magnetflug
    es: Levitón
    ko: 전자부유
    zh_simp: 电磁飘浮
    zh_trad: 電磁飄浮
  descriptions:
    jp_kana: "でんきで　つくった　じりょくの　ちからで\nちゅうに　うかぶ。\n５ターンの　あいだ　ふゆう　できる。"
    jp_kanji: "電気で　つくった　磁力の　力で\n宙に　浮かぶ。\n５ターンの　間　浮遊できる。"
    en: "The user levitates using electrically generated\nmagnetism for five turns."
    fr: "Le lanceur utilise l’électricité pour générer un\nchamp magnétique et léviter durant cinq tours."
    it: "Chi la usa si solleva in aria per cinque turni\ngrazie a un campo elettromagnetico."
    de: "Anwender schwebt für fünf Runden durch elektrisch\nerzeugten Magnetismus."
    es: "Levita gracias a un campo magnético generado por \nelectricidad durante cinco turnos."
    ko: "전기로 만든 자력의 힘으로\n허공에 뜬다.\n5턴 동안 부유할 수 있다."
    zh_simp: "利用电气产生的磁力浮在空中。\n在５回合内可以飘浮。"
    zh_trad: "利用電氣產生的磁力浮在空中。\n在５回合內可以飄浮。"
magnetic_flux:
  names:
    jp_kana: じばそうさ
    jp_kanji: じばそうさ
    en: Magnetic Flux
    fr: Magné-Contrôle
    it: Controllo Polare
    de: Magnetregler
    es: Aura Magnética
    ko: 자기장조작
    zh_simp: 磁场操控
    zh_trad: 磁場操控
  descriptions:
    jp_kana: "じばを　そうさ　することによって\nとくせい　プラスと　マイナスの\nぼうぎょ　とくぼうが　あがる。"
    jp_kanji: "磁場を　操作　することによって\n特性　プラスと　マイナスの\n防御　特防が　あがる。"
    en: "The user manipulates magnetic fields, which raises\nthe Defense and Sp. Def stats of ally Pokémon with\nthe Plus or Minus Ability."
    fr: "Manipule les champs magnétiques pour augmenter\nla Défense et la Défense Spéciale des Pokémon\nalliés dotés du talent Plus ou du talent Minus."
    it: "Tramite il controllo dei campi magnetici, aumenta\nla Difesa e la Difesa Speciale dei Pokémon alleati\ndotati delle abilità Più o Meno."
    de: "Das Magnetfeld wird so manipuliert, dass Spezial-\nVerteidigung und Verteidigung von Team-Pokémon\nmit der Fähigkeit Plus oder Minus steigen."
    es: "Manipula el campo magnético y logra aumentar la \nDefensa y la Def. Esp. de los Pokémon aliados\nque cuenten con las habilidades Más y Menos."
    ko: "자기장 조작으로 인해\n특성 플러스와 마이너스의\n방어, 특수방어가 오른다."
    zh_simp: "通过操控磁场，\n会提高特性为正电和负电的\n宝可梦的防御和特防。"
    zh_trad: "操控磁場，\n提高特性是正電和負電的\n寶可夢的防禦和特防。"
magnitude:
  names:
    jp_kana: マグニチュード
    jp_kanji: マグニチュード
    en: Magnitude
    fr: Ampleur
    it: Magnitudo
    de: Intensität
    es: Magnitud
    ko: 매그니튜드
    zh_simp: 震级
    zh_trad: 震級
  descriptions:
    jp_kana: "じめんを　ゆらして　じぶんの\nまわりに　いるものを　こうげきする。\nわざの　いりょくは　いろいろ　かわる。"
    jp_kanji: "地面を　揺らして　自分の\n周りに　いるものを　攻撃する。\n技の　威力は　いろいろ　変わる。"
    en: "The user attacks everything around it with a\nground-shaking quake. Its power varies."
    fr: "Provoque un tremblement de terre d’intensité\nvariable qui affecte tous les Pokémon alentour.\nL’efficacité varie."
    it: "Chi la usa scatena un terremoto d’intensità\nvariabile che danneggia i Pokémon che ha intorno."
    de: "Erdbebenartiger Angriff von zufälliger Stärke gegen\nandere Pokémon in der Umgebung des Anwenders."
    es: "Sacudida sísmica de intensidad variable que afecta \na todos los Pokémon a su alrededor."
    ko: "땅을 흔들어서 자신의\n주위에 있는 포켓몬을 공격한다.\n기술의 위력이 여러모로 바뀐다."
    zh_simp: "晃动地面，攻击自己\n周围所有的宝可梦。\n招式的威力会有各种变化。"
    zh_trad: "晃動地面，攻擊自己\n周圍所有的寶可夢。\n招式的威力有多種變化。"
malicious_moonsault:
  names:
    jp_kana: ハイパーダーククラッシャー
    jp_kanji: ハイパーダーククラッシャー
    en: Malicious Moonsault
    fr: Dark Body Press
    it: Iperschianto delle Tenebre
    de: Hyper Dark Crusher
    es: Hiperplancha Oscura
    ko: 하이퍼다크크러셔
    zh_simp: 极恶飞跃粉碎击
    zh_trad: 極惡飛躍粉碎擊
  descriptions:
    jp_kana: "Ｚパワーで　タフな　にくたいを　えた\nガオガエンが　ぜんりょくで\nあいてに　ぶつかって　こうげきする。"
    jp_kanji: "Ｚパワーで　タフな　肉体を　得た\nガオガエンが　全力で\n相手に　ぶつかって　攻撃する。"
    en: "The user, Incineroar, strengthens its body using\nits Z-Power and crashes into the target with\nfull force."
    fr: "Félinferno utilise la Force Z pour gonfler ses muscles\net écraser la cible de toutes ses forces."
    it: "Grazie al Potere Z, Incineroar richiama tutta la sua\nforza e si lancia impetuosamente sul bersaglio."
    de: "Mit seinem durch Z-Kraft gestählten Körper stürzt\nsich Fuegro mit ganzer Kraft auf das Ziel."
    es: "Incineroar refuerza sus músculos con el Poder Z para\ngolpear con todas sus fuerzas a su oponente."
    ko: "Z파워로 강한 육체를 얻은\n어흥염이 전력으로\n상대에게 부딪쳐 공격한다."
    zh_simp: "通过Ｚ力量得到\n强壮肉体的炽焰咆哮虎\n将全力撞向对手进行攻击。"
    zh_trad: "透過Ｚ力量得到\n強壯肉體的熾焰咆哮虎\n全力撞向對手進行攻擊。"
mat_block:
  names:
    jp_kana: たたみがえし
    jp_kanji: たたみがえし
    en: Mat Block
    fr: Tatamigaeshi
    it: Ribaltappeto
    de: Tatami-Schild
    es: Escudo Tatami
    ko: 마룻바닥세워막기
    zh_simp: 掀榻榻米
    zh_trad: 掀榻榻米
  descriptions:
    jp_kana: "かえした　タタミを　たてにして　じぶんや\nみかたへの　わざの　ダメージを　ふせぐ。\nへんかわざは　ふせぐことが　できない。"
    jp_kanji: "かえした　タタミを　盾にして　自分や\n味方への　技の　ダメージを　防ぐ。\n変化技は　防ぐことが　できない。"
    en: "Using a pulled-up mat as a shield, the user protects\nitself and its allies from damaging moves. This does\nnot stop status moves."
    fr: "Retourne un tatami pour bloquer, comme avec un\nbouclier, les capacités visant le lanceur ou ses\nalliés. N’a pas d’effet sur les attaques de statut."
    it: "Chi la usa protegge se stesso e i propri alleati dai\ndanni di mosse nemiche, adoperando un tappetino\ncome scudo. Non è efficace contro mosse di stato."
    de: "Der Anwender richtet eine Tatami-Matte auf, um sich\nund sein Team vor Schaden zu schützen. Kein Schutz\nvor Status-Attacken."
    es: "El usuario usa un tatami para escudarse de los \nmovimientos enemigos. Protege también a los \naliados. No funciona contra ataques de estado."
    ko: "뒤집어 세운 마룻바닥을 방패로 하여 자신과\n같은 편으로 향하는 기술 데미지를 막는다.\n변화 기술은 막을 수 없다."
    zh_simp: "将掀起来的榻榻米当作盾牌，\n防住自己和同伴免受招式伤害。\n变化招式无法防住。"
    zh_trad: "將掀起來的榻榻米當作盾牌，\n防禦住攻擊我方的攻擊招式。\n但無法防禦住變化招式的攻擊。"
me_first:
  names:
    jp_kana: さきどり
    jp_kanji: さきどり
    en: Me First
    fr: Moi d’Abord
    it: Precedenza
    de: Egotrip
    es: Yo Primero
    ko: 선취
    zh_simp: 抢先一步
    zh_trad: 搶先一步
  descriptions:
    jp_kana: "いりょくを　あげて　あいてが\nだそうとする　わざを　さきにだす。\nさきに　だせないと　しっぱい　する。"
    jp_kanji: "威力を　あげて　相手が\nだそうとする　技を　先にだす。\n先に　だせないと　失敗する。"
    en: "The user cuts ahead of the target to copy and use\nthe target’s intended move with greater power.\nThis move fails if it isn’t used first."
    fr: "Le lanceur vole la capacité prévue par l’ennemi et\nl’utilise en faisant plus de dégâts. Il doit frapper en\npremier."
    it: "Se chi la usa è più veloce del nemico, gli ruba\nla mossa e gliela ritorce contro con potenza\npersino maggiore."
    de: "Anwender führt die Attacke des Zieles zuerst und\nmit höherer Stärke aus. Dies schlägt fehl, falls der\nAnwender nicht vor dem Ziel zum Zug kommt."
    es: "Se adelanta al movimiento que pretende usar el \nobjetivo y lo lanza antes con más fuerza. Si el\nusuario es más lento, falla."
    ko: "위력을 올려 상대가\n쓰려고 하는 기술을 먼저 쓴다.\n먼저 쓰지 않으면 실패한다."
    zh_simp: "提高威力，抢先使出\n对手想要使出的招式。\n如果不先使出则会失败。"
    zh_trad: "以更高的威力，搶先發動\n對手準備使出的招式。\n若行動順序在對手之後則會失敗。"
mean_look:
  names:
    jp_kana: くろいまなざし
    jp_kanji: くろいまなざし
    en: Mean Look
    fr: Regard Noir
    it: Malosguardo
    de: Horrorblick
    es: Mal de Ojo
    ko: 검은눈빛
    zh_simp: 黑色目光
    zh_trad: 黑色目光
  descriptions:
    jp_kana: "すいこまれる　ような　くろい　まなざしで\nじっと　みつめて　あいてを\nせんとうから　にげられなく　する。"
    jp_kanji: "吸いこまれるような　黒い　まなざしで\nじっと　みつめて　相手を\n戦闘から　逃げられなくする。"
    en: "The user pins the target with a dark, arresting look.\nThe target becomes unable to flee."
    fr: "Le lanceur pétrifie l’ennemi en lui lançant un\nregard noir. Il devient incapable de s’enfuir."
    it: "Chi la usa blocca il bersaglio con uno sguardo\noscuro e ammaliante, impedendogli la fuga."
    de: Böser Blick, der die Flucht des Zieles vereitelt.
    es: Mal de ojo que impide al objetivo huir del combate.
    ko: "빨려 들어갈 것 같은 까만 눈빛으로\n가만히 응시하여 상대를\n배틀에서 도망갈 수 없게 한다."
    zh_simp: "用好似要勾人心魂的黑色目光\n一动不动地凝视对手，\n使其不能从战斗中逃走。"
    zh_trad: "用漆黑深邃的眼神\n一動也不動地凝視對手，\n讓對手無法從戰鬥中逃走。"
meditate:
  names:
    jp_kana: ヨガのポーズ
    jp_kanji: ヨガのポーズ
    en: Meditate
    fr: Yoga
    it: Meditazione
    de: Meditation
    es: Meditación
    ko: 요가포즈
    zh_simp: 瑜伽姿势
    zh_trad: 瑜伽姿勢
  descriptions:
    jp_kana: "ねむっている　ちからを\nからだの　おくから　ひきだして\nじぶんの　こうげきを　あげる。"
    jp_kanji: "眠っている　力を\n体の　奥から　ひきだして\n自分の　攻撃を　あげる。"
    en: "The user meditates to awaken the power deep\nwithin its body and raise its Attack stat."
    fr: "Le lanceur médite pour éveiller son pouvoir latent\net augmenter son Attaque."
    it: "Chi la usa medita per risvegliare la propria\nforza interiore e migliorare l’Attacco."
    de: "Anwender aktiviert Kräfte, die tief in seinem Inneren\nschlummern, und erhöht so seinen Angriffs-Wert."
    es: El usuario reposa y medita para potenciar el Ataque.
    ko: "잠들어 있는 힘을\n몸속에서 끌어내어\n자신의 공격을 올린다."
    zh_simp: "唤醒身体深处\n沉睡的力量，\n从而提高自己的攻击。"
    zh_trad: "喚醒身體深處\n沉睡的力量，\n提高自己的攻擊。"
mega_drain:
  names:
    jp_kana: メガドレイン
    jp_kanji: メガドレイン
    en: Mega Drain
    fr: Méga-Sangsue
    it: Megassorbimento
    de: Megasauger
    es: Megaagotar
    ko: 메가드레인
    zh_simp: 超级吸取
    zh_trad: 超級吸取
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあいてに　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふくできる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: Attacke, die die Hälfte des Schadens absorbiert.
    es: "Absorbe la mitad del daño producido en el objetivo \npara restaurar los PS del usuario."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
mega_kick:
  names:
    jp_kana: メガトンキック
    jp_kanji: メガトンキック
    en: Mega Kick
    fr: Ultimawashi
    it: Megacalcio
    de: Megakick
    es: Megapatada
    ko: 메가톤킥
    zh_simp: 百万吨重踢
    zh_trad: 百萬噸重踢
  descriptions:
    jp_kana: "ものすごい　ちからを　こめた　キックで\nあいてを　けとばして　こうげきする。"
    jp_kanji: "ものすごい　力を　こめた　キックで\n相手を　けとばして　攻撃する。"
    en: "The target is attacked by a kick launched with\nmuscle-packed power."
    fr: Un coup de pied surpuissant qui frappe l’ennemi.
    it: "Colpisce il bersaglio con un calcio sferrato\ncon la forza di muscoli poderosi."
    de: "Das Ziel wird mit einem extrem heftigen Tritt\nangegriffen."
    es: Patada de extrema fuerza.
    ko: "굉장한 힘을 담은 킥으로\n상대를 걷어차서 공격한다."
    zh_simp: "使出力大无穷的重踢\n踢飞对手进行攻击。"
    zh_trad: "用灌注了巨大力量的重踢\n踢飛對手進行攻擊。"
mega_punch:
  names:
    jp_kana: メガトンパンチ
    jp_kanji: メガトンパンチ
    en: Mega Punch
    fr: Ultimapoing
    it: Megapugno
    de: Megahieb
    es: Megapuño
    ko: 메가톤펀치
    zh_simp: 百万吨重拳
    zh_trad: 百萬噸重拳
  descriptions:
    jp_kana: "ちからを　こめた　パンチで\nあいてを　こうげきする。"
    jp_kanji: "力を　こめた　パンチで\n相手を　攻撃する。"
    en: "The target is slugged by a punch thrown with\nmuscle-packed power."
    fr: "L’ennemi reçoit un coup de poing d’une puissance\nincroyable."
    it: Colpisce il bersaglio con un pugno poderoso.
    de: Ein unglaublich kräftiger Hieb.
    es: Un puñetazo de gran potencia.
    ko: "힘을 담은 펀치로\n상대를 공격한다."
    zh_simp: 用充满力量的拳头攻击对手。
    zh_trad: "用帶有強大力量的拳頭\n攻擊對手。"
megahorn:
  names:
    jp_kana: メガホーン
    jp_kanji: メガホーン
    en: Megahorn
    fr: Mégacorne
    it: Megacorno
    de: Vielender
    es: Megacuerno
    ko: 메가폰
    zh_simp: 超级角击
    zh_trad: 超級角擊
  descriptions:
    jp_kana: "かたくて　りっぱな　つので　おもいっきり\nあいてを　つきさして　こうげきする。"
    jp_kanji: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    en: "Using its tough and impressive horn, the user rams\ninto the target with no letup."
    fr: "Le lanceur utilise ses gigantesques cornes pour\ncharger l’ennemi."
    it: "Chi la usa utilizza il suo robusto e imponente\ncorno per colpire il bersaglio con tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: Violenta embestida con cuernos imponentes.
    ko: "단단하고 훌륭한 뿔로 마음껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
memento:
  names:
    jp_kana: おきみやげ
    jp_kanji: おきみやげ
    en: Memento
    fr: Souvenir
    it: Memento
    de: Memento-Mori
    es: Legado
    ko: 추억의선물
    zh_simp: 临别礼物
    zh_trad: 臨別禮物
  descriptions:
    jp_kana: "じぶんは　ひんしに　なるが　そのかわりに\nあいての　こうげきと　とくこうを\nがくっと　さげる。"
    jp_kanji: "自分は　ひんしに　なるが　そのかわりに\n相手の　攻撃と　特攻を\nがくっと　さげる。"
    en: "The user faints when using this move. In return, this\nharshly lowers the target’s Attack and Sp. Atk stats."
    fr: "Le lanceur est mis K.O., mais l’Attaque et\nl’Attaque Spéciale de l’ennemi baissent beaucoup."
    it: "Chi la usa va KO. Tuttavia, riduce di molto\nl’Attacco e l’Attacco Speciale del bersaglio."
    de: "Der Anwender wird besiegt. Gleichzeitig werden der\nAngriff und Spezial-Angriff des Zieles stark gesenkt."
    es: "El usuario se debilita, pero baja mucho tanto el \nAtaque como el Ataque Especial del objetivo."
    ko: "자신은 기절하게 되지만 그 대신\n상대의 공격과 특수공격을\n크게 떨어뜨린다."
    zh_simp: "虽然会使自己陷入濒死，\n但是能够大幅降低\n对手的攻击和特攻。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以大幅降低\n對手的攻擊和特攻。"
metal_burst:
  names:
    jp_kana: メタルバースト
    jp_kanji: メタルバースト
    en: Metal Burst
    fr: Fulmifer
    it: Metalscoppio
    de: Metallstoß
    es: Represión Metal
    ko: 메탈버스트
    zh_simp: 金属爆炸
    zh_trad: 金屬爆炸
  descriptions:
    jp_kana: "わざを　だすまえに\nさいごに　うけた　わざの　ダメージを\nおおきくして　だした　あいてに　かえす。"
    jp_kanji: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　返す。"
    en: "The user retaliates with much greater force against\nthe opponent that last inflicted damage on it."
    fr: "Le lanceur attaque le dernier ennemi l’ayant blessé\ndurant le même tour en frappant plus fort."
    it: "Chi la usa si vendica sul nemico che l’ha appena\nferito con una mossa anche più potente."
    de: "Attacke mit großer Kraft gegen den Gegner, der dem\nAnwender in derselben Runde zuletzt Schaden\nzufügte."
    es: "Devuelve al rival el último ataque recibido, pero con \nmucha más fuerza."
    ko: "기술을 쓰기 전에\n마지막으로 받은 기술의 데미지를\n늘려서 기술을 쓴 상대에게 돌려준다."
    zh_simp: "使出招式前，\n将最后受到的招式的伤害\n大力返还给对手。"
    zh_trad: "將發動攻擊前\n最後受到的招式傷害放大，\n向對手進行反擊。"
metal_claw:
  names:
    jp_kana: メタルクロー
    jp_kanji: メタルクロー
    en: Metal Claw
    fr: Griffe Acier
    it: Ferrartigli
    de: Metallklaue
    es: Garra Metal
    ko: 메탈크로우
    zh_simp: 金属爪
    zh_trad: 金屬爪
  descriptions:
    jp_kana: "こうてつの　ツメで　あいてを　きりさいて\nこうげきする。　じぶんの　こうげきが\nあがることが　ある。"
    jp_kanji: "鋼鉄の　ツメで\n相手を　切り裂いて　攻撃する。\n自分の　攻撃が　あがることが　ある。"
    en: "The target is raked with steel claws. This may also\nraise the user’s Attack stat."
    fr: "Attaque avec des griffes d’acier.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Colpisce il bersaglio con artigli d’acciaio.\nPuò anche aumentare l’Attacco di chi la usa."
    de: "Klauen-Attacke, die eventuell den Angriffs-Wert des\nAnwenders erhöht."
    es: "Ataque con garras de acero que puede aumentar el \nAtaque del usuario."
    ko: "강철의 발톱으로\n상대를 베어 갈라 공격한다.\n자신의 공격이 올라갈 때도 있다."
    zh_simp: "用钢铁之爪\n劈开对手进行攻击。\n有时会提高自己的攻击。"
    zh_trad: "用鋼鐵之爪\n撕裂對手進行攻擊。\n有時會提高自己的攻擊。"
metal_sound:
  names:
    jp_kana: きんぞくおん
    jp_kanji: きんぞくおん
    en: Metal Sound
    fr: Strido-Son
    it: Ferrostrido
    de: Metallsound
    es: Eco Metálico
    ko: 금속음
    zh_simp: 金属音
    zh_trad: 金屬音
  descriptions:
    jp_kana: "きんぞくを　こすって　でるような\nいやな　おとを　きかせる。\nあいての　とくぼうを　がくっと　さげる。"
    jp_kanji: "金属を　こすって　でるような\nいやな　音を　聞かせる。\n相手の　特防を　がくっと　さげる。"
    en: "A horrible sound like scraping metal harshly lowers\nthe target’s Sp. Def stat."
    fr: "Un cri horrible tel un crissement métallique qui\nréduit beaucoup la Défense Spéciale de l’ennemi."
    it: "Orribile stridio, simile a quello prodotto dal\nmetallo, che riduce di molto la Difesa Speciale\ndel bersaglio."
    de: "Stößt einen spitzen Schrei aus, der die\nSpezial-Verteidigung des Zieles stark senkt."
    es: "Horrible chirrido metálico que baja mucho la \nDefensa Especial del objetivo."
    ko: "금속을 긁을 때 나는 듯한\n싫은 소리를 들려준다.\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "让对手听摩擦金属般\n讨厌的声音。\n大幅降低对手的特防。"
    zh_trad: "讓對手聽如同金屬摩擦般\n的刺耳聲。\n大幅降低對手的特防。"
meteor_mash:
  names:
    jp_kana: コメットパンチ
    jp_kanji: コメットパンチ
    en: Meteor Mash
    fr: Poing Météore
    it: Meteorpugno
    de: Sternenhieb
    es: Puño Meteoro
    ko: 코멧펀치
    zh_simp: 彗星拳
    zh_trad: 彗星拳
  descriptions:
    jp_kana: "すいせいの　ごとく　パンチを　くりだして\nあいてを　こうげきする。　じぶんの\nこうげきが　あがることが　ある。"
    jp_kanji: "すい星の　ごとく　パンチを　くりだして\n相手を　攻撃する。　自分の\n攻撃が　あがることが　ある。"
    en: "The target is hit with a hard punch fired like a\nmeteor. This may also raise the user’s Attack stat."
    fr: "Un coup de poing lancé à la vitesse d’un météore.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Colpisce il bersaglio con un pugno veloce come\nuna meteora. Può far salire l’Attacco di chi la usa."
    de: "Angriff mit einem harten, schnellen Schlag.\nErhöht eventuell Angriffs-Wert des Anwenders."
    es: "Puñetazo que impacta como un meteorito y puede \nsubir el Ataque del agresor."
    ko: "혜성과 같은 펀치를 날려서\n상대를 공격한다. 자신의\n공격이 올라갈 때가 있다."
    zh_simp: "使出彗星般的拳头攻击对手。\n有时会提高自己的攻击。"
    zh_trad: "使出如同彗星般的拳頭攻擊對手。\n有時會提高自己的攻擊。"
metronome:
  names:
    jp_kana: ゆびをふる
    jp_kanji: ゆびをふる
    en: Metronome
    fr: Métronome
    it: Metronomo
    de: Metronom
    es: Metrónomo
    ko: 손가락흔들기
    zh_simp: 挥指
    zh_trad: 揮指
  descriptions:
    jp_kana: "ゆびをふり　じぶんの　のうを　しげきして\nすべての　わざの　なかから\nどれか　１つを　くりだす。"
    jp_kanji: "指をふり　自分の　脳を　刺激して\nすべての　技の　なかから\nどれか　１つを　くりだす。"
    en: "The user waggles a finger and stimulates its brain\ninto randomly using nearly any move."
    fr: "Le lanceur agite un doigt et stimule son cerveau pour\nutiliser presque n’importe quelle capacité au hasard."
    it: "Chi la usa fa di no con il dito e stimola il cervello\na usare a caso una delle tante mosse esistenti."
    de: "Bewegt Finger, um das Gehirn zu stimulieren.\nWählt zufällig eine Attacke aus."
    es: "El usuario mueve un dedo y estimula su cerebro \npara usar al azar casi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를\n자극해서 모든 기술 중\n어느 하나를 날린다."
    zh_simp: "挥动手指刺激自己的大脑，\n从所有的招式中\n任意使出１个。"
    zh_trad: "揮動手指刺激自己的大腦，\n從全部的招式中\n隨機選出１招使出。"
milk_drink:
  names:
    jp_kana: ミルクのみ
    jp_kanji: ミルクのみ
    en: Milk Drink
    fr: Lait à Boire
    it: Buonlatte
    de: Milchgetränk
    es: Batido
    ko: 우유마시기
    zh_simp: 喝牛奶
    zh_trad: 喝牛奶
  descriptions:
    jp_kana: "さいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: "The user restores its own HP by up to half of its\nmax HP."
    fr: "Le lanceur récupère jusqu’à la moitié de ses\nPV max."
    it: Chi la usa recupera metà dei propri PS massimi.
    de: "KP des Anwenders werden um 50 % der maximalen\nKP aufgefüllt."
    es: Restaura la mitad de los PS máximos del usuario.
    ko: "자신의 최대 HP 절반을\n회복한다."
    zh_simp: 回复自己最大ＨＰ的一半。
    zh_trad: 回復自己最大ＨＰ的一半。
mimic:
  names:
    jp_kana: ものまね
    jp_kanji: ものまね
    en: Mimic
    fr: Copie
    it: Mimica
    de: Mimikry
    es: Mimético
    ko: 흉내내기
    zh_simp: 模仿
    zh_trad: 模仿
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざを\nせんとうの　あいだ\nじぶんの　わざに　することが　できる。"
    jp_kanji: "相手が　最後に　使った　技を\n戦闘の　あいだ\n自分の　技に　することが　できる。"
    en: "The user copies the target’s last move. The move\ncan be used during battle until the Pokémon is\nswitched out."
    fr: "Le lanceur copie la dernière capacité utilisée par\nla cible et la conserve tant qu’il reste au combat."
    it: "Chi la usa copia l’ultima mossa usata dal bersaglio\ne la conserva finché rimane in campo."
    de: "Kopiert die zuvor ausgeführte Attacke des Zieles.\nKann im Kampf bis zur Auswechslung verwendet\nwerden."
    es: "Copia el último movimiento usado por el objetivo, y \npuede utilizarlo mientras esté en el combate."
    ko: "상대가 마지막에 사용한 기술을\n배틀을 하는 동안\n자신의 기술로 만들 수 있다."
    zh_simp: "可以将对手\n最后使用的招式，\n在战斗内变成自己的招式。"
    zh_trad: "在戰鬥期間，\n將對手最近一次使用的招式\n變成自己的招式。"
mind_reader:
  names:
    jp_kana: こころのめ
    jp_kanji: こころのめ
    en: Mind Reader
    fr: Lire-Esprit
    it: Leggimente
    de: Willensleser
    es: Telépata
    ko: 마음의눈
    zh_simp: 心之眼
    zh_trad: 心之眼
  descriptions:
    jp_kana: "あいての　うごきを　こころで　かんじて\nつぎの　こうげきが　かならず\nあいてに　あたるように　する。"
    jp_kanji: "相手の　動きを　心で　感じて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    en: "The user senses the target’s movements with its\nmind to ensure its next attack does not miss\nthe target."
    fr: "Le lanceur analyse les mouvements de l’ennemi\npour être sûr de toucher au coup suivant."
    it: "Chi la usa prevede i movimenti del bersaglio\nper mandare a segno l’attacco successivo."
    de: "Ahnt Bewegungen des Zieles voraus, um zu\ngewährleisten, dass die nächste eigene Attacke\ntrifft."
    es: "El usuario adivina los movimientos del objetivo para \nhacer que su siguiente ataque no falle."
    ko: "상대의 움직임을 마음으로 읽고\n다음 공격이 반드시\n상대에게 명중되게 한다."
    zh_simp: "用心感受对手的行动，\n下次攻击必定\n会击中对手。"
    zh_trad: "用心感受對手的行動模式，\n下次攻擊時必定\n會命中對手。"
minimize:
  names:
    jp_kana: ちいさくなる
    jp_kanji: ちいさくなる
    en: Minimize
    fr: Lilliput
    it: Minimizzato
    de: Komprimator
    es: Reducción
    ko: 작아지기
    zh_simp: 变小
    zh_trad: 變小
  descriptions:
    jp_kana: "からだを　ちぢめて　ちいさく　みせて\nじぶんの　かいひりつを\nぐーんと　あげる。"
    jp_kanji: "体を　ちぢめて　小さく　みせて\n自分の　回避率を\nぐーんと　あげる。"
    en: "The user compresses its body to make itself look\nsmaller, which sharply raises its evasiveness."
    fr: "Le lanceur comprime son corps pour se faire tout\npetit et beaucoup augmenter son Esquive."
    it: "Il corpo di chi la usa si comprime e diventa\npiù piccolo. La sua capacità di elusione\naumenta di molto."
    de: "Anwender schrumpft, um seinen Fluchtwert stark zu\nerhöhen."
    es: El usuario mengua para aumentar mucho la Evasión.
    ko: "몸을 축소하여 작게 보임으로써\n자신의 회피율을 크게 올린다."
    zh_simp: "蜷缩身体显得很小，\n从而大幅提高\n自己的闪避率。"
    zh_trad: "蜷縮身體使自己顯得很小，\n大幅提高\n自己的閃避率。"
miracle_eye:
  names:
    jp_kana: ミラクルアイ
    jp_kanji: ミラクルアイ
    en: Miracle Eye
    fr: Œil Miracle
    it: Miracolvista
    de: Wunderauge
    es: Gran Ojo
    ko: 미라클아이
    zh_simp: 奇迹之眼
    zh_trad: 奇跡之眼
  descriptions:
    jp_kana: "あくタイプに　こうかがない　わざや\nかいひりつの　たかい　あいてに\nこうげきが　あたるように　なる。"
    jp_kanji: "あくタイプに　効果がない　技や\n回避率の　高い　相手に\n攻撃が　当たるように　なる。"
    en: "Enables a Dark-type target to be hit by\nPsychic-type attacks. This also enables an evasive\ntarget to be hit."
    fr: "Permet de toucher un Pokémon Ténèbres avec\nles capacités de type Psy ou de toucher un ennemi\nayant beaucoup d’esquive."
    it: "Rende i Pokémon di tipo Buio vulnerabili a qualsiasi \ntipo di mossa e, inoltre, permette di colpire i nemici \nindipendentemente dall’elusione."
    de: "Ermöglicht es, Unlicht-Pokémon mit Psycho-Attacken\nanzugreifen. Ignoriert den Fluchtwert des Zieles."
    es: "Permite atacar con cualquier movimiento a objetivos \nde tipo Siniestro y golpear a Pokémon evasivos."
    ko: "악타입에 효과가 없는 기술이나\n회피율이 높은 상대라 할지라도\n공격이 맞게 된다."
    zh_simp: "对恶属性宝可梦没有效果的招式\n以及闪避率高的对手，\n使用后变得能够打中。"
    zh_trad: "讓對惡屬性寶可夢無效的招式\n能夠發揮效果，也可不顧對手\n提高後的閃避率進行攻擊。"
mirror_coat:
  names:
    jp_kana: ミラーコート
    jp_kanji: ミラーコート
    en: Mirror Coat
    fr: Voile Miroir
    it: Specchiovelo
    de: Spiegelcape
    es: Manto Espejo
    ko: 미러코트
    zh_simp: 镜面反射
    zh_trad: 鏡面反射
  descriptions:
    jp_kana: "あいてから　うけた　とくしゅ　こうげきの\nダメージを　２ばいに　して\nそのあいてに　かえす。"
    jp_kanji: "相手から　受けた　特殊攻撃の\nダメージを　２倍に　して\nその相手に　返す。"
    en: "A retaliation move that counters any special attack,\ninflicting double the damage taken."
    fr: "Une riposte qui contre n’importe quelle capacité\nspéciale en infligeant le double des dégâts subis."
    it: "Mossa che replica ogni attacco speciale,\narrecando il doppio del danno ricevuto."
    de: "Kontert den Spezial-Angriff des Gegners mit\ndoppeltem Schaden."
    es: "Responde a un ataque especial ocasionando el doble \ndel daño recibido."
    ko: "상대에게 받은 특수공격의\n데미지를 2배로 만들어\n그 상대에게 돌려준다."
    zh_simp: "从对手那里受到\n特殊攻击的伤害将以\n２倍返还给同一个对手。"
    zh_trad: "將來自對手的特殊攻擊傷害加倍後，\n返還給該對手。"
mirror_move:
  names:
    jp_kana: オウムがえし
    jp_kanji: オウムがえし
    en: Mirror Move
    fr: Mimique
    it: Speculmossa
    de: Spiegeltrick
    es: Mov. Espejo
    ko: 따라하기
    zh_simp: 鹦鹉学舌
    zh_trad: 鸚鵡學舌
  descriptions:
    jp_kana: "あいての　つかった　わざを　まねして\nじぶんも　おなじ　わざを　つかう。"
    jp_kanji: "相手の　使った　技を　まねして\n自分も　同じ技を　使う。"
    en: "The user counters the target by mimicking the\ntarget’s last move."
    fr: "Le lanceur riposte à l’attaque de l’ennemi avec la\nmême attaque."
    it: "Chi la usa colpisce il bersaglio copiandone\nl’ultima mossa usata."
    de: "Kopiert die letzte Attacke des Zieles und greift\nes an."
    es: "Ataca al objetivo con el último movimiento que este\nhaya usado."
    ko: "상대가 사용한 기술을 흉내 내어\n자신도 똑같은 기술을 쓴다."
    zh_simp: "模仿对手使用的招式，\n自己也使用相同招式。"
    zh_trad: "模仿對手使用的招式，\n自己也使用相同招式。"
mirror_shot:
  names:
    jp_kana: ミラーショット
    jp_kanji: ミラーショット
    en: Mirror Shot
    fr: Miroi-Tir
    it: Cristalcolpo
    de: Spiegelsalve
    es: Disparo Espejo
    ko: 미러숏
    zh_simp: 镜光射击
    zh_trad: 鏡光射擊
  descriptions:
    jp_kana: "みがき　あげられた　からだから\nせんこうの　ちからを　あいてに　はなつ。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "磨きあげられた　体から\nせん光の　力を　相手に　放つ。\n命中率を　さげることが　ある。"
    en: "The user lets loose a flash of energy at the target\nfrom its polished body. This may also lower the\ntarget’s accuracy."
    fr: "Le corps poli du lanceur libère un éclair d’énergie.\nPeut aussi baisser la Précision de l’ennemi."
    it: "Chi la usa rilascia fasci d’energia dal corpo\nlevigato. Può anche ridurre la precisione\ndel bersaglio."
    de: "Anwender feuert Energiestrahl aus seinem Körper\nab. Senkt eventuell Genauigkeit des Zieles."
    es: "El usuario libera un haz de energía desde su pulido \ncuerpo. Puede bajar la Precisión."
    ko: "갈고닦은 몸에서\n섬광의 힘을 상대에게 쏜다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "抛光自己的身体，\n向对手释放出闪光之力。\n有时会降低对手的命中率。"
    zh_trad: "用磨得亮晶晶的身體\n向對手放出閃光之力進行攻擊。\n有時會降低對手的命中率。"
mist:
  names:
    jp_kana: しろいきり
    jp_kanji: しろいきり
    en: Mist
    fr: Brume
    it: Nebbia
    de: Weißnebel
    es: Neblina
    ko: 흰안개
    zh_simp: 白雾
    zh_trad: 白霧
  descriptions:
    jp_kana: "しろいきりで　からだを　おおう。\n５ターンの　あいだ　あいてに\nのうりょくを　さげられなく　なる。"
    jp_kanji: "白い霧で　体を　おおう。\n５ターンの　間　相手に\n能力を　さげられなく　なる。"
    en: "The user cloaks itself and its allies in a white mist\nthat prevents any of their stats from being lowered\nfor five turns."
    fr: "Une brume blanche enveloppe l’équipe du lanceur\net empêche la réduction des stats pour cinq tours."
    it: "Chi la usa attira una nebbia che blocca la riduzione\ndelle statistiche per sé e gli alleati per cinque turni."
    de: "Anwender schützt das Team mit einem Nebel.\nVerhindert Statussenkungen für fünf Runden."
    es: "Rodea de fina niebla al usuario y protege las \ncaracterísticas de su equipo durante cinco turnos."
    ko: "하얀 안개로 몸을 덮는다.\n5턴 동안 상대에 의해\n능력이 떨어지지 않게 된다."
    zh_simp: "用白雾覆盖身体。\n在５回合内不会让对手\n降低自己的能力。"
    zh_trad: "用白霧覆蓋身體。\n在５回合內不會讓對手\n降低自己的能力。"
mist_ball:
  names:
    jp_kana: ミストボール
    jp_kanji: ミストボール
    en: Mist Ball
    fr: Ball’Brume
    it: Foschisfera
    de: Nebelball
    es: Bola Neblina
    ko: 미스트볼
    zh_simp: 薄雾球
    zh_trad: 薄霧球
  descriptions:
    jp_kana: "きりじょうの　うもうで　つつみこみ\nこうげきする。　あいての　とくこうを\nさげることが　ある。"
    jp_kanji: "霧状の　羽毛で　包みこみ\n攻撃する。\n相手の　特攻を　さげることが　ある。"
    en: "A mist-like flurry of down envelops and damages the\ntarget. This may also lower the target’s Sp. Atk stat."
    fr: "Une bulle de brume inflige des dégâts à l’ennemi.\nPeut aussi réduire son Attaque Spéciale."
    it: "Una sfera di nebbia avvolge e danneggia il bersaglio.\nPuò anche ridurne l’Attacco Speciale."
    de: "Angriff mit einer Nebelwolke aus Daunen.\nSenkt eventuell den Spezial-Angriff des Zieles."
    es: "Banco de niebla que puede bajar el Ataque\nEspecial del objetivo."
    ko: "안개의 깃털로 둘러싸\n공격한다. 상대의 특수공격을\n떨어뜨릴 때가 있다."
    zh_simp: "用围绕着雾状\n羽毛的球进行攻击。\n有时会降低对手的特攻。"
    zh_trad: "將霧狀的羽毛聚集成團進行攻擊。\n有時會降低對手的特攻。"
misty_terrain:
  names:
    jp_kana: ミストフィールド
    jp_kanji: ミストフィールド
    en: Misty Terrain
    fr: Champ Brumeux
    it: Campo Nebbioso
    de: Nebelfeld
    es: Campo de Niebla
    ko: 미스트필드
    zh_simp: 薄雾场地
    zh_trad: 薄霧場地
  descriptions:
    jp_kana: "５ターンのあいだ　じめんにいると\nじょうたいいじょうに　ならず　ドラゴン\nわざの　ダメージも　はんぶんになる。"
    jp_kanji: "５ターンの　間　地面にいると\n状態異常に　ならず　ドラゴン技の\nダメージも　半分になる。"
    en: "This protects Pokémon on the ground from status\nconditions and halves damage from Dragon-type\nmoves for five turns."
    fr: "Pendant cinq tours, les Pokémon au sol ne peuvent\npas subir d’altération de statut et la puissance\ndes capacités de type Dragon est divisée par deux."
    it: "Per cinque turni il terreno entra nello stato di Campo\nNebbioso: i Pokémon a terra sono immuni ai problemi\ndi stato e la potenza delle mosse Drago è dimezzata."
    de: "Schützt fünf Runden lang alle Pokémon, die den\nBoden berühren, vor Statusproblemen. Der erlittene\nSchaden durch Drachen-Attacken wird halbiert."
    es: "Durante cinco turnos, los Pokémon que están en el\nsuelo no sufren cambios de estado y se reduce a la\nmitad el daño de los movimientos de tipo Dragón."
    ko: "5턴 동안 땅에 있으면\n상태 이상이 되지 않고\n드래곤타입 기술의 데미지도 절반이 된다."
    zh_simp: "在５回合内，\n地面上的宝可梦不会陷入异常状态。\n龙属性招式的伤害也会减半。"
    zh_trad: "在５回合內，\n地面上的寶可夢不會陷入異常狀態。\n龍屬性招式的傷害也會減半。"
moonblast:
  names:
    jp_kana: ムーンフォース
    jp_kanji: ムーンフォース
    en: Moonblast
    fr: Pouvoir Lunaire
    it: Forza Lunare
    de: Mondgewalt
    es: Fuerza Lunar
    ko: 문포스
    zh_simp: 月亮之力
    zh_trad: 月亮之力
  descriptions:
    jp_kana: "つきの　パワーを　かりて\nあいてを　こうげきする。　あいての\nとくこうを　さげる　ことがある。"
    jp_kanji: "月の　パワーを　かりて\n相手を　攻撃する。　相手の\n特攻を　さげる　ことがある。"
    en: "Borrowing the power of the moon, the user attacks\nthe target. This may also lower the target’s\nSp. Atk stat."
    fr: "Attaque l’ennemi grâce au pouvoir de la lune.\nPeut diminuer son Attaque Spéciale."
    it: "Chi la usa sfrutta il potere della luna per attaccare\nil bersaglio. Può anche ridurne l’Attacco Speciale."
    de: "Der Anwender macht sich die Kraft des Mondes\nzunutze, um anzugreifen. Gelegentlich wird dabei\nder Spezial-Angriff des Zieles gesenkt."
    es: "Invoca el poder de la luna para atacar al objetivo. \nPuede disminuir el Ataque Especial del objetivo."
    ko: "달의 파워를 빌려서\n상대를 공격한다. 상대의\n특수공격을 떨어뜨릴 때가 있다."
    zh_simp: "借用月亮的力量攻击对手。\n有时会降低对手的特攻。"
    zh_trad: "借用月亮的力量攻擊對手。\n有時會降低對手的特攻。"
moongeist_beam:
  names:
    jp_kana: シャドーレイ
    jp_kanji: シャドーレイ
    en: Moongeist Beam
    fr: Rayon Spectral
    it: Raggio d’Ombra
    de: Schattenstrahl
    es: Rayo Umbrío
    ko: 섀도레이
    zh_simp: 暗影之光
    zh_trad: 暗影之光
  descriptions:
    jp_kana: "あやしい　こうせんを　はなって\nこうげきする。あいての　とくせいを\nむしして　こうげき　することが　できる。"
    jp_kanji: "怪しい　光線を　放って\n攻撃する。相手の　特性を\n無視して　攻撃　することが　できる。"
    en: "The user emits a sinister ray to attack the target.\nThis move can be used on the target regardless of \nits Abilities."
    fr: "Le lanceur attaque avec un rayon de lumière\nmystérieux. Ignore le talent de la cible."
    it: "Chi la usa proietta sul bersaglio un misterioso\nraggio di luce. Questo attacco ignora l’abilità\ndel bersaglio."
    de: "Der Anwender greift mit einem unheimlichen\nLichtstrahl an. Diese Attacke ignoriert die Fähigkeit\ndes Zieles."
    es: "Ataca con un rayo misterioso que ignora la habilidad\ndel objetivo."
    ko: "괴상한 광선을 쏘아\n공격한다. 상대의 특성을\n무시하고 공격할 수 있다."
    zh_simp: "放出奇怪的光线攻击对手。\n可以无视对手的特性进行攻击。"
    zh_trad: "放出奇怪的光線攻擊對手。\n可不顧對手的特性進行攻擊。"
moonlight:
  names:
    jp_kana: つきのひかり
    jp_kanji: つきのひかり
    en: Moonlight
    fr: Rayon Lune
    it: Lucelunare
    de: Mondschein
    es: Luz Lunar
    ko: 달의불빛
    zh_simp: 月光
    zh_trad: 月光
  descriptions:
    jp_kana: "じぶんの　ＨＰを　かいふく　する。\nてんきに　よって\nかいふくの　りょうが　へんか　する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP\nregained varies with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Chi la usa recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según \nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
morning_sun:
  names:
    jp_kana: あさのひざし
    jp_kanji: あさのひざし
    en: Morning Sun
    fr: Aurore
    it: Mattindoro
    de: Morgengrauen
    es: Sol Matinal
    ko: 아침햇살
    zh_simp: 晨光
    zh_trad: 晨光
  descriptions:
    jp_kana: "じぶんの　ＨＰを　かいふく　する。\nてんきに　よって\nかいふくの　りょうが　へんか　する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP\nregained varies with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Chi la usa recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según \nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
mud_bomb:
  names:
    jp_kana: どろばくだん
    jp_kanji: どろばくだん
    en: Mud Bomb
    fr: Boue-Bombe
    it: Pantanobomba
    de: Schlammbombe
    es: Bomba Fango
    ko: 진흙폭탄
    zh_simp: 泥巴炸弹
    zh_trad: 泥巴炸彈
  descriptions:
    jp_kana: "かたい　どろのたまを\nあいてに　はっしゃして　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "硬い　泥の　弾を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user launches a hard-packed mud ball to attack.\nThis may also lower the target’s accuracy."
    fr: "Le lanceur attaque à l’aide d’une boule de boue\nsolidifiée. Peut aussi baisser la Précision de l’ennemi."
    it: "Chi la usa lancia una compatta palla di fango. Può\nanche ridurre la precisione del Pokémon colpito."
    de: "Anwender greift mit einem festen Schlammklumpen\nan. Senkt eventuell Genauigkeit des Zieles."
    es: "Ataca lanzando una compacta bola de fango.\nPuede bajar la Precisión del objetivo."
    ko: "단단한 진흙구슬을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手发射\n坚硬的泥弹进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "向對手發射\n堅硬的泥彈進行攻擊。\n有時會降低對手的命中率。"
mud_shot:
  names:
    jp_kana: マッドショット
    jp_kanji: マッドショット
    en: Mud Shot
    fr: Tir de Boue
    it: Colpodifango
    de: Lehmschuss
    es: Disparo Lodo
    ko: 머드숏
    zh_simp: 泥巴射击
    zh_trad: 泥巴射擊
  descriptions:
    jp_kana: "どろの　かたまりを\nあいてに　なげつけて　こうげきする。\nどうじに　あいての　すばやさを　さげる。"
    jp_kanji: "泥の　塊を\n相手に　投げつけて　攻撃する。\n同時に　相手の　素早さを　さげる。"
    en: "The user attacks by hurling a blob of mud at the\ntarget. This also lowers the target’s Speed stat."
    fr: "Le lanceur attaque en projetant de la boue sur\nl’ennemi. Réduit aussi la Vitesse de la cible."
    it: "Chi la usa attacca lanciando fango sul bersaglio,\nriducendone anche la Velocità."
    de: "Angriff mit Lehm, der den Initiative-Wert des Zieles\nsenkt."
    es: "El usuario lanza lodo al objetivo y reduce su \nVelocidad."
    ko: "진흙 덩어리를\n상대에게 내던져서 공격한다.\n동시에 상대의 스피드를 떨어뜨린다."
    zh_simp: "向对手投掷\n泥块进行攻击。\n同时降低对手的速度。"
    zh_trad: "向對手投擲\n泥塊進行攻擊。\n同時降低對手的速度。"
mud_slap:
  names:
    jp_kana: どろかけ
    jp_kanji: どろかけ
    en: Mud-Slap
    fr: Coud’Boue
    it: Fangosberla
    de: Lehmschelle
    es: Bofetón Lodo
    ko: 진흙뿌리기
    zh_simp: 掷泥
    zh_trad: 擲泥
  descriptions:
    jp_kana: "あいての　かおなどに\nドロを　なげつけて　こうげきする。\nめいちゅうりつを　さげる。"
    jp_kanji: "相手の　顔などに\n泥を　投げつけて　攻撃する。\n命中率を　さげる。"
    en: "The user hurls mud in the target’s face to inflict\ndamage and lower its accuracy."
    fr: "Le lanceur envoie de la boue au visage de\nl’ennemi pour infliger des dégâts et baisser\nsa Précision."
    it: "Chi la usa butta fango in faccia al bersaglio\nper arrecargli danni e ridurne la precisione."
    de: "Schadet dem Ziel durch Matsch. Dessen Genauigkeit\nsinkt."
    es: Echa lodo en la cara para bajar la Precisión.
    ko: "상대의 얼굴 등에\n진흙을 내던져서 공격한다.\n명중률을 떨어뜨린다."
    zh_simp: "向对手的脸等\n投掷泥块进行攻击。\n会降低对手的命中率。"
    zh_trad: "向對手的臉等處\n投擲泥巴進行攻擊。\n可降低對手的命中率。"
mud_sport:
  names:
    jp_kana: どろあそび
    jp_kanji: どろあそび
    en: Mud Sport
    fr: Lance-Boue
    it: Fangata
    de: Lehmsuhler
    es: Chapoteo Lodo
    ko: 흙놀이
    zh_simp: 玩泥巴
    zh_trad: 玩泥巴
  descriptions:
    jp_kana: "あたりを　どろまみれにする。\n５ターンの　あいだ\nでんきタイプの　わざを　よわめる。"
    jp_kanji: "あたりを　泥まみれにする。\n５ターンの　間\nでんきタイプの　技を　弱める。"
    en: "The user kicks up mud on the battlefield. This\nweakens Electric-type moves for five turns."
    fr: "Asperge les alentours de boue.\nAffaiblit les capacités Électrik pendant cinq tours."
    it: "Chi la usa sparge fango sul campo di lotta\nindebolendo per cinque turni le mosse\ndi tipo Elettro."
    de: "Schwächt Elektro-Attacken für die Dauer von fünf\nRunden."
    es: "El usuario esparce lodo a su alrededor, lo que \ndebilita los movimientos de tipo Eléctrico durante \ncinco turnos."
    ko: "주위를 진흙투성이로 만든다.\n5턴 동안\n전기타입의 기술을 약하게 한다."
    zh_simp: "一旦使用此招式，\n周围就会弄得到处是泥。\n在５回合内减弱电属性的招式。"
    zh_trad: "將周圍弄得到處是泥。\n在５回合內減弱電屬性的招式。"
muddy_water:
  names:
    jp_kana: だくりゅう
    jp_kanji: だくりゅう
    en: Muddy Water
    fr: Ocroupi
    it: Fanghiglia
    de: Lehmbrühe
    es: Agua Lodosa
    ko: 탁류
    zh_simp: 浊流
    zh_trad: 濁流
  descriptions:
    jp_kana: "にごった　みずを\nあいてに　はっしゃして　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by shooting muddy water at the\nopposing Pokémon. This may also lower\ntheir accuracy."
    fr: "Le lanceur attaque en projetant de l’eau boueuse.\nPeut aussi réduire la Précision de l’ennemi."
    it: "Chi la usa attacca i nemici che ha intorno con un\ngetto di fango che può anche ridurne la precisione."
    de: "Greift mit Matsch an und senkt eventuell die\nGenauigkeit des Zieles."
    es: "Ataque con agua lodosa que puede bajar la \nPrecisión del equipo rival."
    ko: "탁해진 물을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手喷射\n浑浊的水进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用渾濁的污水攻擊對手。\n有時會降低對手的命中率。"
multi_attack:
  names:
    jp_kana: マルチアタック
    jp_kanji: マルチアタック
    en: Multi-Attack
    fr: Coup Varia-Type
    it: Multiattacco
    de: Multi-Angriff
    es: Multiataque
    ko: 멀티어택
    zh_simp: 多属性攻击
    zh_trad: 多屬性攻擊
  descriptions:
    jp_kana: "たかい　エネルギーを　まといつつ\nあいてに　ぶつかって　こうげきする。\nメモリに　より　タイプが　かわる。"
    jp_kanji: "高い　エネルギーを　まといつつ\n相手に　ぶつかって　攻撃する。\nメモリに　より　タイプが　変わる。"
    en: "Cloaking itself in high energy, the user slams into the\ntarget. The memory held determines the move’s type."
    fr: "Le Pokémon s’entoure d’une puissante énergie\navant de foncer sur sa cible. Le type de la capacité\ndépend de la ROM installée."
    it: "Chi la usa si avvolge in un potente campo\nenergetico e colpisce il bersaglio. Il tipo della\nmossa varia in base alla ROM installata."
    de: "Der Anwender sammelt eine große Menge Energie\nund greift das Ziel damit an. Der Typ der Attacke\nhängt von dem der Disc ab."
    es: "El Pokémon se rodea de una potente energía con la\nque golpea al rival. El tipo del movimiento depende\ndel disco que lleva el usuario."
    ko: "높은 에너지를 둘러싸\n상대에게 부딪쳐 공격한다.\n메모리에 따라 타입이 바뀐다."
    zh_simp: "一边覆盖高能量，\n一边撞向对手进行攻击。\n根据存储碟不同，属性会改变。"
    zh_trad: "讓強大能量圍繞全身，\n撞向對手進行攻擊。\n招式屬性會隨著記憶碟而改變。"
mystical_fire:
  names:
    jp_kana: マジカルフレイム
    jp_kanji: マジカルフレイム
    en: Mystical Fire
    fr: Feu Ensorcelé
    it: Magifiamma
    de: Magieflamme
    es: Llama Embrujada
    ko: 매지컬플레임
    zh_simp: 魔法火焰
    zh_trad: 魔法火焰
  descriptions:
    jp_kana: "くちから　はきだす　とくべつ\nあつい　ほのおで　こうげきする。\nあいての　とくこうを　さげる。"
    jp_kanji: "口から　吐きだす　特別\n熱い　炎で　攻撃する。\n相手の　特攻を　さげる。"
    en: "The user attacks by breathing a special, hot fire.\nThis also lowers the target’s Sp. Atk stat."
    fr: "Attaque avec des flammes brûlantes soufflées\nde la bouche du lanceur. Diminue l’Attaque\nSpéciale de l’ennemi."
    it: "Colpisce il bersaglio soffiandogli contro delle\nfiammate incredibilmente roventi, riducendone\nl’Attacco Speciale."
    de: "Der Anwender greift das Ziel an, indem er ihm\neine besondere, heiße Flamme entgegenbläst.\nDer Spezial-Angriff des Zieles sinkt."
    es: "Lanza por su boca una singular llama a gran\ntemperatura con la que ataca a su oponente y\nbaja su Ataque Especial."
    ko: "입에서 내뱉는 아주\n뜨거운 불꽃으로 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "从口中喷出特别灼热的\n火焰进行攻击。\n降低对手的特攻。"
    zh_trad: "從口中吐出特別灼熱的\n火焰進行攻擊。\n可降低對手的特攻。"
nasty_plot:
  names:
    jp_kana: わるだくみ
    jp_kanji: わるだくみ
    en: Nasty Plot
    fr: Machination
    it: Congiura
    de: Ränkeschmied
    es: Maquinación
    ko: 나쁜음모
    zh_simp: 诡计
    zh_trad: 詭計
  descriptions:
    jp_kana: "わるいことを　かんがえて\nあたまを　かっせいか　させる。\nじぶんの　とくこうを　ぐーんと　あげる。"
    jp_kanji: "悪いことを　考えて\n頭を　活性化させる。\n自分の　特攻を　ぐーんと　あげる。"
    en: "The user stimulates its brain by thinking bad\nthoughts. This sharply raises the user’s Sp. Atk stat."
    fr: "Stimule l’esprit par de mauvaises pensées.\nAugmente beaucoup l’Attaque Spéciale du lanceur."
    it: "Chi la usa stimola il cervello pensando a cose\ncattive. Aumenta di molto l’Attacco Speciale."
    de: "Anwender stimuliert sein Gehirn und hat finstere\nGedanken. Erhöht Spezial-Angriff stark."
    es: "Estimula su cerebro pensando en cosas malas.\nAumenta considerablemente el Ataque Especial."
    ko: "나쁜 일을 생각해서\n머리를 활성화시킨다.\n자신의 특수공격을 크게 올린다."
    zh_simp: "谋划诡计，激活头脑。\n大幅提高自己的特攻。"
    zh_trad: "動歪腦筋，活化大腦。\n大幅提高自己的特攻。"
natural_gift:
  names:
    jp_kana: しぜんのめぐみ
    jp_kanji: しぜんのめぐみ
    en: Natural Gift
    fr: Don Naturel
    it: Dononaturale
    de: Beerenkräfte
    es: Don Natural
    ko: 자연의은혜
    zh_simp: 自然之恩
    zh_trad: 自然之恩
  descriptions:
    jp_kana: "きのみから　ちからを　もらい\nこうげきする。もたせた　きのみで\nわざの　タイプと　いりょくが　かわる。"
    jp_kanji: "きのみから　力を　もらい\n攻撃する。持たせた　きのみで\n技の　タイプと　威力が　変わる。"
    en: "The user draws power to attack by using its held\nBerry. The Berry determines the move’s type\nand power."
    fr: "Avant d’attaquer, le lanceur rassemble ses forces\ngrâce à sa Baie. Elle détermine le type et la\npuissance de l’attaque."
    it: "Chi la usa trae forza dalla bacca che ha. Da questa\ndipendono il tipo e la potenza dell’attacco."
    de: "Anwender zieht aus seiner derzeitigen Beere Kraft.\nSie bestimmt Typ und Stärke der Attacke."
    es: "La baya que lleva presta su fuerza para atacar. El \ntipo de ataque y su fuerza dependen de la baya."
    ko: "나무열매에서 힘을 얻어\n공격한다. 지니게 한 나무열매에 따라\n기술의 타입과 위력이 바뀐다."
    zh_simp: "从树果上获得力量进行攻击。\n根据携带的树果，\n招式属性和威力会改变。"
    zh_trad: "從樹果上獲得力量進行攻擊。\n招式屬性和威力會隨著\n攜帶的樹果不同而改變。"
nature_power:
  names:
    jp_kana: しぜんのちから
    jp_kanji: しぜんのちから
    en: Nature Power
    fr: Force-Nature
    it: Naturforza
    de: Natur-Kraft
    es: Adaptación
    ko: 자연의힘
    zh_simp: 自然之力
    zh_trad: 自然之力
  descriptions:
    jp_kana: "しぜんの　ちからで　こうげきする。\nつかう　ばしょで\nでてくる　わざが　へんかする。"
    jp_kanji: "自然の　力で　攻撃する。\n使う　場所で\nでてくる　技が　変化する。"
    en: "This attack makes use of nature’s power. Its\neffects vary depending on the user’s environment."
    fr: "Une attaque qui tire sa force de la nature.\nSon type varie selon le terrain."
    it: "Mossa che fa uso della forza della natura.\nIl suo effetto varia in base all’ambiente."
    de: "Angriff mit der Kraft der Natur. Die Wirkung dieser\nAttacke ist ortsabhängig."
    es: "Usa el poder de la naturaleza para atacar.\nSu efecto varía según el entorno de combate."
    ko: "자연의 힘으로 공격한다.\n사용하는 장소에 따라\n나오는 기술이 변화한다."
    zh_simp: "用自然之力进行攻击。\n根据所使用场所的不同，\n使出的招式也会有所变化。"
    zh_trad: "用自然之力進行攻擊。\n隨著使用地點的不同，\n使出的招式也會改變。"
natures_madness:
  names:
    jp_kana: しぜんのいかり
    jp_kanji: しぜんのいかり
    en: Nature’s Madness
    fr: Ire de la Nature
    it: Ira della Natura
    de: Naturzorn
    es: Furia Natural
    ko: 자연의분노
    zh_simp: 自然之怒
    zh_trad: 自然之怒
  descriptions:
    jp_kana: "しぜんの　いかりを　あいてに　ぶつける。\nあいての　ＨＰは　はんぶんに　なる。"
    jp_kanji: "自然の　怒りを　相手に　ぶつける。\n相手の　ＨＰは　半分に　なる。"
    en: "The user hits the target with the force of nature.\nIt halves the target’s HP."
    fr: "Le lanceur déchaîne toute la colère de la nature\npour baisser les PV de la cible de moitié."
    it: "Scatena l’ira della natura sul bersaglio\ne ne dimezza i PS."
    de: "Das Ziel wird vom Zorn der Natur getroffen und\nverliert dadurch die Hälfte seiner KP."
    es: "Golpea al objetivo con la furia de la naturaleza y\nreduce sus PS a la mitad."
    ko: "자연의 분노를 상대에게 부딪친다.\n상대의 HP는 절반이 된다."
    zh_simp: "向对手释放自然之怒。\n对手的ＨＰ会减半。"
    zh_trad: "向對手發洩自然之怒。\n會使對手的ＨＰ減半。"
needle_arm:
  names:
    jp_kana: ニードルアーム
    jp_kanji: ニードルアーム
    en: Needle Arm
    fr: Poing Dard
    it: Pugnospine
    de: Nietenranke
    es: Brazo Pincho
    ko: 바늘팔
    zh_simp: 尖刺臂
    zh_trad: 尖刺臂
  descriptions:
    jp_kana: "トゲの　うでを\nはげしく　ふるって　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "トゲの　腕を\n激しく　ふるって　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user attacks by wildly swinging its thorny arms.\nThis may also make the target flinch."
    fr: "Le lanceur attaque en fouettant l’ennemi de ses\nbras épineux. Peut aussi l’apeurer."
    it: "Chi la usa attacca colpendo il bersaglio con i suoi\narti pieni di spine. Può far tentennare il Pokémon\ncolpito."
    de: "Angriff mit dornigen Armen. Das Ziel schreckt\neventuell zurück."
    es: "Pega con brazos de pinchos y puede hacer\nretroceder al objetivo."
    ko: "바늘팔을\n세차게 흔들어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用带刺的手臂\n猛烈地挥舞进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用帶刺的手臂\n猛烈揮打進行攻擊。\n有時會使對手畏縮。"
never_ending_nightmare:physical:
  names:
    jp_kana: むげんあんやへのいざない
    jp_kanji: むげんあんやへのいざない
    en: Never-Ending Nightmare
    fr: Appel des Ombres Éternelles
    it: Abbraccio Spettrale
    de: Ewige Nacht
    es: Presa Espectral
    ko: 무한암야로의유인
    zh_simp: 无尽暗夜之诱惑
    zh_trad: 無盡暗夜之誘惑
  descriptions:
    jp_kana: "Ｚパワーで　よびよせた　つよい　おんねんが\nぜんりょくで　あいてに　ふりかかる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　呼びよせた　強い　怨念が\n全力で　相手に　降りかかる。\n元になった　技で　威力が　変わる。"
    en: "Deep-seated grudges summoned by the user’s\nZ-Power trap the target. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour invoquer des\nesprits rancuniers qui s’abattent sur l’adversaire. La\npuissance varie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa intrappola il bersaglio\nin una morsa generata dal proprio rancore. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender beschwört mit Z-Kraft tiefen Groll\nherbei und lässt diesen auf das Ziel los. Die Stärke\nvariiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para invocar a unos\nespectros encolerizados que apresan al objetivo. \nSu potencia depende de la del movimiento original."
    ko: "Z파워로 불러낸 강한 원념이\n전력으로 상대에게 쏟아진다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量召唤强烈的怨念，\n全力降临到对手身上。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量召喚強烈的怨念，\n全力降禍到對手身上。\n威力會隨原本的招式而改變。"
never_ending_nightmare:special:
  names:
    jp_kana: むげんあんやへのいざない
    jp_kanji: むげんあんやへのいざない
    en: Never-Ending Nightmare
    fr: Appel des Ombres Éternelles
    it: Abbraccio Spettrale
    de: Ewige Nacht
    es: Presa Espectral
    ko: 무한암야로의유인
    zh_simp: 无尽暗夜之诱惑
    zh_trad: 無盡暗夜之誘惑
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
night_daze:
  names:
    jp_kana: ナイトバースト
    jp_kanji: ナイトバースト
    en: Night Daze
    fr: Explonuit
    it: Urtoscuro
    de: Nachtflut
    es: Pulso Noche
    ko: 나이트버스트
    zh_simp: 暗黑爆破
    zh_trad: 暗黑爆破
  descriptions:
    jp_kana: "あんこくの　しょうげきはを\nとばして　あいてを　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "暗黒の　衝撃波を\nとばして　相手を　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user lets loose a pitch-black shock wave at its\ntarget. This may also lower the target’s accuracy."
    fr: "Le lanceur attaque l’ennemi avec une onde de\nchoc ténébreuse. Peut aussi baisser sa Précision."
    it: "Chi la usa attacca il bersaglio con un’onda d’urto\noscura che può ridurne la precisione."
    de: "Anwender greift Ziel mit finsteren Schockwellen an.\nSenkt eventuell die Genauigkeit."
    es: "Ataca al objetivo con una onda siniestra.\nPuede bajar su Precisión."
    ko: "암흑의 충격파를\n날려서 상대를 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "放出黑暗的冲击波攻击对手。\n有时会降低对手的命中率。"
    zh_trad: "放出黑暗的衝擊波攻擊對手。\n有時會降低對手的命中率。"
night_shade:
  names:
    jp_kana: ナイトヘッド
    jp_kanji: ナイトヘッド
    en: Night Shade
    fr: Ombre Nocturne
    it: Ombra Notturna
    de: Nachtnebel
    es: Tinieblas
    ko: 나이트헤드
    zh_simp: 黑夜魔影
    zh_trad: 黑夜魔影
  descriptions:
    jp_kana: "おそろしい　まぼろしを　みせて\nじぶんの　レベルと　おなじ　だけの\nダメージを　あいてに　あたえる。"
    jp_kanji: "恐ろしい　幻を　みせて\n自分の　レベルと　同じだけの\nダメージを　相手に　与える。"
    en: "The user makes the target see a frightening mirage.\nIt inflicts damage equal to the user’s level."
    fr: "Le lanceur invoque un mirage.\nInflige des dégâts équivalents au niveau du\nlanceur."
    it: "Fa apparire un orribile miraggio al bersaglio\ne infligge un danno pari al livello di chi la usa."
    de: "Das Ziel sieht eine Illusion. Richtet Schaden gemäß\ndem Level des Anwenders an."
    es: "Produce un espejismo ante el objetivo, que pierde\ntantos PS como nivel tenga el usuario."
    ko: "무시무시한 환상을 보게 해서\n자신의 레벨과 똑같은 만큼의\n데미지를 상대에게 준다."
    zh_simp: "显示恐怖幻影，\n只给予对手\n和自己等级相同的伤害。"
    zh_trad: "讓對手看見恐怖幻影，\n給予對手和自己等級\n相同的傷害。"
night_slash:
  names:
    jp_kana: つじぎり
    jp_kanji: つじぎり
    en: Night Slash
    fr: Tranche-Nuit
    it: Nottesferza
    de: Nachthieb
    es: Tajo Umbrío
    ko: 깜짝베기
    zh_simp: 暗袭要害
    zh_trad: 暗襲要害
  descriptions:
    jp_kana: "いっしゅんの　すきを　ついて\nあいてを　きりはらう。\nきゅうしょに　あたりやすい。"
    jp_kanji: "一瞬の　すきを　ついて\n相手を　切りはらう。\n急所に　当たりやすい。"
    en: "The user slashes the target the instant an\nopportunity arises. Critical hits land more easily."
    fr: "Le lanceur lacère l’ennemi à la première occasion.\nTaux de critique élevé."
    it: "Chi la usa colpisce il bersaglio appena si presenta\nl’occasione. Probabile brutto colpo."
    de: "Anwender greift bei der ersten Gelegenheit mit\nscharfen Klauen an. Hohe Volltrefferquote."
    es: "Ataca al objetivo a la primera oportunidad. Suele \nser crítico."
    ko: "순간적으로 틈을 노려\n상대를 베어 버린다.\n급소에 맞기 쉽다."
    zh_simp: "抓住瞬间的空隙\n切斩对手。\n容易击中要害。"
    zh_trad: "抓住瞬間的空隙\n斬切對手。\n容易擊中要害。"
nightmare:
  names:
    jp_kana: あくむ
    jp_kanji: あくむ
    en: Nightmare
    fr: Cauchemar
    it: Incubo
    de: Nachtmahr
    es: Pesadilla
    ko: 악몽
    zh_simp: 恶梦
    zh_trad: 惡夢
  descriptions:
    jp_kana: "ねむり　じょうたいの　あいてに\nあくむを　みせて　まいターン　すこしずつ\nＨＰを　へらしていく。"
    jp_kanji: "眠り状態の　相手に\n悪夢を　みせて　毎ターン　少しずつ\nＨＰを　減らしていく。"
    en: "A sleeping target sees a nightmare that inflicts some\ndamage every turn."
    fr: "Un cauchemar qui inflige des dégâts à chaque tour\nà un ennemi endormi."
    it: "Il bersaglio addormentato ha un incubo e\nperde PS a ogni turno."
    de: "Dem schlafenden Ziel wird durch einen Alptraum in\njeder Runde Schaden zugefügt, solang es schläft."
    es: "El objetivo dormido sufre una pesadilla que le hace \nperder PS en cada turno."
    ko: "잠듦 상태의 상대에게\n악몽을 꾸게 하여 매 턴 조금씩\nHP를 떨어뜨려 간다."
    zh_simp: "让在睡眠状态下的对手做恶梦，\n每回合会缓缓减少ＨＰ。"
    zh_trad: "讓處於睡眠狀態的對手作惡夢，\n每回合減少一部分ＨＰ。"
noble_roar:
  names:
    jp_kana: おたけび
    jp_kanji: おたけび
    en: Noble Roar
    fr: Râle Mâle
    it: Urlo
    de: Kampfgebrüll
    es: Rugido de Guerra
    ko: 부르짖기
    zh_simp: 战吼
    zh_trad: 戰吼
  descriptions:
    jp_kana: "おたけびを　あげて\nあいてを　いかくし　あいての\nこうげきと　とくこうを　さげる。"
    jp_kanji: "おたけびを　あげて\n相手を　威嚇し　相手の\n攻撃と　特攻を　さげる。"
    en: "Letting out a noble roar, the user intimidates the\ntarget and lowers its Attack and Sp. Atk stats."
    fr: "Le lanceur pousse un rugissement qui intimide\nl’ennemi et diminue son Attaque et son Attaque\nSpéciale."
    it: "Chi la usa emette un urlo potente che intimidisce\nil bersaglio, riducendone l’Attacco e l’Attacco\nSpeciale."
    de: "Der Anwender stößt ein Kampfgebrüll aus, das das\nZiel einschüchtert und zugleich seinen Angriffs- und\nSpezial-Angriffs-Wert senkt."
    es: "Intimida a su oponente con un rugido de guerra, \nhaciendo que disminuyan tanto su Ataque como \nsu Ataque Especial."
    ko: "우렁차게 부르짖어서\n상대를 위협하여 상대의 공격과\n특수공격을 떨어뜨린다."
    zh_simp: "发出战吼威吓对手，\n从而降低对手的攻击和特攻。"
    zh_trad: "發出戰吼威嚇對手，\n降低對手的\n攻擊和特攻。"
nuzzle:
  names:
    jp_kana: ほっぺすりすり
    jp_kanji: ほっぺすりすり
    en: Nuzzle
    fr: Frotte-Frimousse
    it: Elettrococcola
    de: Wangenrubbler
    es: Moflete Estático
    ko: 볼부비부비
    zh_simp: 蹭蹭脸颊
    zh_trad: 蹭蹭臉頰
  descriptions:
    jp_kana: "でんきを　おびた　ほっぺを\nすりつけて　こうげき。\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "電気を　帯びた　ほっぺを\nすりつけて　攻撃。\n相手を　まひ状態に　する。"
    en: "The user attacks by nuzzling its electrified cheeks\nagainst the target. This also leaves the target\nwith paralysis."
    fr: "Le lanceur attaque en frottant ses bajoues\nchargées d’électricité. Paralyse l’ennemi."
    it: "Chi la usa strofina le guance elettrizzate contro\nil bersaglio, paralizzandolo."
    de: "Der Anwender lädt seine Wangen elektrisch auf und\ngreift an, indem er sich damit am Ziel reibt. Das Ziel\nwird paralysiert."
    es: "Quien lo usa frota sus mofletes cargados de\nelectricidad contra el objetivo y consigue paralizarlo."
    ko: "전기가 흐르는 볼을\n비벼서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "将带电的脸颊\n蹭蹭对手进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "用帶電的臉頰\n磨蹭對手進行攻擊。\n能讓對手陷入麻痺狀態。"
oblivion_wing:
  names:
    jp_kana: デスウイング
    jp_kanji: デスウイング
    en: Oblivion Wing
    fr: Mort-Ailes
    it: Ali del Fato
    de: Unheilsschwingen
    es: Ala Mortífera
    ko: 데스윙
    zh_simp: 死亡之翼
    zh_trad: 死亡之翼
  descriptions:
    jp_kana: "ねらいを　さだめた　あいてから　ＨＰを\nすいとる。　あたえた　ダメージの\nはんぶんいじょう　ＨＰを　かいふくする。"
    jp_kanji: "ねらいを　定めた　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    en: "The user absorbs its target’s HP. The user’s HP is\nrestored by over half of the damage taken by\nthe target."
    fr: "Vole l’énergie de la cible.\nRend au lanceur un nombre de PV supérieur ou\négal à la moitié des dégâts infligés."
    it: "Chi la usa assorbe energia dal bersaglio\nrecuperando una quantità di PS pari a più\ndella metà del danno inferto."
    de: "Der Anwender raubt dem Ziel KP. Die Höhe der\nHeilung beträgt mehr als die Hälfte des beim Ziel\nangerichteten Schadens."
    es: "El usuario absorbe energía del objetivo y aumenta\nsus PS en una cantidad igual o superior a la mitad\ndel daño infligido."
    ko: "조준한 상대로부터 HP를\n흡수한다. 준 데미지의\n반 이상 HP를 회복한다."
    zh_simp: "从锁定的对手身上吸取ＨＰ。\n回复给予对手\n伤害的一半以上的ＨＰ。"
    zh_trad: "從鎖定的對手身上吸取ＨＰ。\n可以回復給予對手\n傷害的一半以上的ＨＰ。"
oceanic_operetta:
  names:
    jp_kana: わだつみのシンフォニア
    jp_kanji: わだつみのシンフォニア
    en: Oceanic Operetta
    fr: Symphonie des Ondines
    it: Sinfonia del Mare
    de: Grandiose Meeressymphonie
    es: Sinfonía de la Diva Marina
    ko: 바다의심포니
    zh_simp: 海神庄严交响乐
    zh_trad: 海神莊嚴交響樂
  descriptions:
    jp_kana: "Ｚパワーで　たいりょうの　みずを　よんだ\nアシレーヌが　ぜんりょくで\nあいてを　こうげきする。"
    jp_kanji: "Ｚパワーで　大量の　水を　呼んだ\nアシレーヌが　全力で\n相手を　攻撃する。"
    en: "The user, Primarina, summons a massive amount of \nwater using its Z-Power and attacks the target with \nfull force."
    fr: "Oratoria utilise la Force Z pour rassembler\nune grande quantité d’eau et la projeter sur\nla cible à pleine puissance."
    it: "Grazie al Potere Z, Primarina concentra un’enorme\nquantità d’acqua e attacca il bersaglio con una\npotenza smisurata."
    de: "Primarene ruft mit Z-Kraft große Mengen an Wasser\nherbei und greift damit das Ziel an."
    es: "Primarina invoca ingentes cantidades de agua con el\nPoder Z para atacar con gran potencia a su rival."
    ko: "Z파워로 대량의 물을 부른\n누리레느가 전력으로\n상대를 공격한다."
    zh_simp: "通过Ｚ力量召唤\n大量水的西狮海壬\n将全力攻击对手。"
    zh_trad: "透過Ｚ力量呼喚\n大量水的西獅海壬\n全力攻擊對手。"
octazooka:
  names:
    jp_kana: オクタンほう
    jp_kanji: オクタンほう
    en: Octazooka
    fr: Octazooka
    it: Octazooka
    de: Octazooka
    es: Pulpocañón
    ko: 대포무노포
    zh_simp: 章鱼桶炮
    zh_trad: 章魚桶炮
  descriptions:
    jp_kana: "あいての　かおなどに\nすみを　ふきかけて　こうげきする。\nめいちゅうりつを　さげることが　ある。"
    jp_kanji: "相手の　顔などに\n墨を　吹きかけて　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by spraying ink in the target’s face\nor eyes. This may also lower the target’s accuracy."
    fr: "Le lanceur attaque en projetant de l’encre au\nvisage de l’ennemi. Peut aussi baisser sa Précision."
    it: "Chi la usa spruzza inchiostro in faccia al bersaglio.\nPuò anche ridurne la precisione."
    de: "Schießt mit Tinte, um Schaden anzurichten und die\nGenauigkeit zu senken."
    es: Dispara tinta a la cara. Puede bajar la Precisión.
    ko: "상대의 얼굴 등에\n먹물을 내뿜어 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手的脸等\n喷出墨汁进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "向對手的臉等\n噴出墨汁進行攻擊。\n有時會降低對手的命中率。"
odor_sleuth:
  names:
    jp_kana: かぎわける
    jp_kanji: かぎわける
    en: Odor Sleuth
    fr: Flair
    it: Segugio
    de: Schnüffler
    es: Rastreo
    ko: 냄새구별
    zh_simp: 气味侦测
    zh_trad: 氣味偵測
  descriptions:
    jp_kana: "ゴーストタイプに　こうかがない　わざや\nかいひりつの　たかい　あいてに\nこうげきが　あたるように　なる。"
    jp_kanji: "ゴーストタイプに　効果がない　技や\n回避率の　高い　相手に\n攻撃が　当たるように　なる。"
    en: "Enables a Ghost-type target to be hit by Normal-\nand Fighting-type attacks. This also enables an\nevasive target to be hit."
    fr: "Permet de toucher un Pokémon Spectre avec\nn’importe quelle capacité ou de toucher un ennemi\ninsaisissable."
    it: "Chi la usa rende i Pokémon di tipo Spettro\nvulnerabili a qualsiasi tipo di mossa e può,\ninoltre, colpire i nemici sfuggenti."
    de: "Ermöglicht es, Geister-Pokémon mit Normal- und\nKampf-Attacken anzugreifen. Ignoriert den\nFluchtwert des Zieles."
    es: "Permite atacar con cualquier movimiento a objetivos \nde tipo Fantasma y golpear a Pokémon evasivos."
    ko: "고스트타입에 효과가 없는 기술이나\n회피율이 높은 상대라 할지라도\n공격이 맞게 된다."
    zh_simp: "对幽灵属性宝可梦没有效果的招式\n以及闪避率高的对手，\n使用后变得能够打中。"
    zh_trad: "讓對幽靈屬性寶可夢無效的招式\n能夠發揮效果，也可不顧對手\n提高後的閃避率進行攻擊。"
ominous_wind:
  names:
    jp_kana: あやしいかぜ
    jp_kanji: あやしいかぜ
    en: Ominous Wind
    fr: Vent Mauvais
    it: Funestovento
    de: Unheilböen
    es: Viento Aciago
    ko: 괴상한바람
    zh_simp: 奇异之风
    zh_trad: 奇異之風
  descriptions:
    jp_kana: "みのけも　よだつ　とっぷうで　あいてを\nこうげきする。じぶんの　すべての\nのうりょくが　あがることが　ある。"
    jp_kanji: "みのけも　よだつ　突風で　相手を\n攻撃する。自分の　すべての\n能力が　あがることが　ある。"
    en: "The user blasts the target with a gust of repulsive\nwind. This may also raise all the user’s stats at once."
    fr: "Le lanceur crée une violente bourrasque.\nPeut aussi augmenter toutes ses stats."
    it: "Chi la usa attacca con una forte raffica di vento\nche può aumentare tutte le sue statistiche."
    de: "Das Ziel treffen abscheuliche Winde.\nErhöht eventuell alle Statuswerte des Anwenders."
    es: "Produce un viento horripilante. Puede subir de golpe \ntodas las características del usuario."
    ko: "소름이 끼칠 만한 돌풍으로 상대를\n공격한다. 자신의 모든\n능력이 올라갈 때가 있다."
    zh_simp: "突然刮起毛骨悚然的暴风\n攻击对手。有时会提高\n自己的全部能力。"
    zh_trad: "用令人毛骨悚然的強風\n攻擊對手。有時會提高\n自己的所有能力。"
origin_pulse:
  names:
    jp_kana: こんげんのはどう
    jp_kanji: こんげんのはどう
    en: Origin Pulse
    fr: Onde Originelle
    it: Primopulsar
    de: Ursprungswoge
    es: Pulso Primigenio
    ko: 근원의파동
    zh_simp: 根源波动
    zh_trad: 根源波動
  descriptions:
    jp_kana: "あおく　かがやく　むすうの　こうせんで\nあいてを　こうげきする。"
    jp_kanji: "青白く　輝く　無数の　光線で\n相手を　攻撃する。"
    en: "The user attacks opposing Pokémon with countless\nbeams of light that glow a deep and brilliant blue."
    fr: "D’innombrables rayons lumineux d’un bleu étincelant\ns’abattent sur la cible."
    it: "Attacca i nemici intorno colpendoli\ncon miriadi di raggi di luce blu."
    de: "Der Anwender greift das Ziel mit unzähligen blau\nleuchtenden Strahlen an."
    es: "Ataca al objetivo con una infinidad de rayos de luz \nazulada."
    ko: "파랗게 빛나는 무수한 광선으로\n상대를 공격한다."
    zh_simp: "用无数青白色\n且闪耀的光线攻击对手。"
    zh_trad: "放出無數閃耀著青白色光輝的\n光線攻擊對手。"
outrage:
  names:
    jp_kana: げきりん
    jp_kanji: げきりん
    en: Outrage
    fr: Colère
    it: Oltraggio
    de: Wutanfall
    es: Enfado
    ko: 역린
    zh_simp: 逆鳞
    zh_trad: 逆鱗
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって　こうげきする。\nあばれた　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three\nturns. The user then becomes confused."
    fr: "Le lanceur enrage et attaque pendant deux\nou trois tours avant de devenir confus."
    it: "Chi la usa sfoga la sua ira e attacca il nemico\nper due o tre turni prima di essere lasciato\nin preda alla confusione."
    de: "Attacke über zwei bis drei Runden, die den\nAnwender verwirrt."
    es: "Ataca de dos a tres turnos y acaba confundiendo al \nagresor."
    ko: "2-3턴 동안\n마구 난동 부려서 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地进行攻击。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
overheat:
  names:
    jp_kana: オーバーヒート
    jp_kanji: オーバーヒート
    en: Overheat
    fr: Surchauffe
    it: Vampata
    de: Hitzekoller
    es: Sofoco
    ko: 오버히트
    zh_simp: 过热
    zh_trad: 過熱
  descriptions:
    jp_kana: "フルパワーで　あいてを　こうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power. The\nattack’s recoil harshly lowers the user’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse beaucoup l’Attaque\nSpéciale du lanceur."
    it: "Chi la usa sferra un potente attacco, ma\nil contraccolpo riduce di molto il suo\nAttacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho el Ataque \nEspecial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
pain_split:
  names:
    jp_kana: いたみわけ
    jp_kanji: いたみわけ
    en: Pain Split
    fr: Balance
    it: Malcomune
    de: Leidteiler
    es: Divide Dolor
    ko: 아픔나누기
    zh_simp: 分担痛楚
    zh_trad: 分擔痛楚
  descriptions:
    jp_kana: "じぶんの　ＨＰと　あいての　ＨＰを\nあわせて　それを　じぶんと　あいてで\nなかよく　わける。"
    jp_kanji: "自分の　ＨＰと　相手の　ＨＰを\nあわせて　それを　自分と　相手で\nなかよく　わける。"
    en: "The user adds its HP to the target’s HP, then equally\nshares the combined HP with the target."
    fr: "Le lanceur ajoute ses PV à ceux de sa cible et les\nrépartit équitablement."
    it: "Chi la usa somma i propri PS a quelli di un altro\nPokémon per poi dividerli in parti uguali."
    de: "Addiert KP von Anwender und Ziel.\nTeilt sie gerecht auf."
    es: "Suma los PS del usuario a los del objetivo y los \nreparte a partes iguales."
    ko: "자신의 HP와 상대의 HP를\n합친 것을 자신과 상대가\n사이좋게 나눈다."
    zh_simp: "将自己的ＨＰ和\n对手的ＨＰ相加，\n然后自己和对手友好地平分。"
    zh_trad: "將自己的ＨＰ和\n對手的ＨＰ相加，\n然後雙方友好地平分。"
parabolic_charge:
  names:
    jp_kana: パラボラチャージ
    jp_kanji: パラボラチャージ
    en: Parabolic Charge
    fr: Parabocharge
    it: Caricaparabola
    de: Parabolladung
    es: Carga Parábola
    ko: 파라볼라차지
    zh_simp: 抛物面充电
    zh_trad: 拋物面充電
  descriptions:
    jp_kana: "まわりにいる　ポケモン　ぜんいんに\nダメージ。　あたえた　ダメージの\nはんぶんを　じぶんが　かいふくする。"
    jp_kanji: "周りにいる　ポケモン　全員に\nダメージ。　与えた　ダメージの\n半分を　自分が　回復する。"
    en: "The user attacks everything around it. The user’s HP\nis restored by half the damage taken by those hit."
    fr: "Inflige des dégâts à tous les Pokémon autour du\nlanceur. Il récupère en PV la moitié des dégâts\ninfligés."
    it: "Infligge danni a tutti i Pokémon vicini. Chi la\nusa recupera una quantità di PS pari alla metà\ndel danno inferto."
    de: "Fügt allen Pokémon in der Umgebung Schaden zu.\nDer Anwender wird um die Hälfte des insgesamt\nangerichteten Schadens geheilt."
    es: "Inflige daño a todos los Pokémon a su alrededor. \nEl usuario absorbe la mitad del daño producido\npara restaurar sus propios PS."
    ko: "주위에 있는 모든 포켓몬에게\n데미지를 준다. 준 데미지의\n절반을 자신이 회복한다."
    zh_simp: "给周围全体宝可梦造成伤害。\n可以回复给予伤害的一半ＨＰ。"
    zh_trad: "攻擊自己周圍所有的寶可夢。\n可以回復給予傷害的一半ＨＰ。"
parting_shot:
  names:
    jp_kana: すてゼリフ
    jp_kanji: すてゼリフ
    en: Parting Shot
    fr: Dernier Mot
    it: Monito
    de: Abgangstirade
    es: Última Palabra
    ko: 막말내뱉기
    zh_simp: 抛下狠话
    zh_trad: 拋下狠話
  descriptions:
    jp_kana: "すてゼリフで　あいてを　いかくし\nこうげきと　とくこうを　さげたのち\nひかえの　ポケモンと　いれかわる。"
    jp_kanji: "すてゼリフで　相手を　いかくし\n攻撃と　特攻を　さげたのち\n控えの　ポケモンと　入れ替わる。"
    en: "With a parting threat, the user lowers the target’s\nAttack and Sp. Atk stats. Then it switches with a\nparty Pokémon."
    fr: "Menace l’ennemi dans une ultime tirade avant\nde changer de place avec un autre Pokémon.\nRéduit l’Attaque et l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa lancia un monito intimidatorio al bersaglio, \nriducendone l’Attacco e l’Attacco Speciale, e si fa\nsostituire da un altro Pokémon della squadra."
    de: "Schüchtert das Ziel mit einer Abgangstirade ein,\nsodass dessen Angriffs- und Spezial-Angriffs-Wert\nsinken. Danach wird der Anwender ausgewechselt."
    es: "El usuario se cambia por otro Pokémon de su equipo, \npero antes amedrenta a su oponente y hace que\ndisminuyan su Ataque y Ataque Especial."
    ko: "막말을 내뱉어 상대를 위협하여\n공격과 특수공격을 떨어뜨린 후\n교대 포켓몬과 교체한다."
    zh_simp: "抛下狠话威吓对手，\n降低攻击和特攻后，\n和后备宝可梦进行替换。"
    zh_trad: "拋下狠話恐嚇對手，\n降低對手的攻擊和特攻後，\n和後備寶可夢進行替換。"
pay_day:
  names:
    jp_kana: ネコにこばん
    jp_kanji: ネコにこばん
    en: Pay Day
    fr: Jackpot
    it: Giornopaga
    de: Zahltag
    es: Día de Pago
    ko: 고양이돈받기
    zh_simp: 聚宝功
    zh_trad: 聚寶功
  descriptions:
    jp_kana: "あいての　からだに\nこばんを　なげつけて　こうげきする。\nせんとうの　あとで　おかねが　もらえる。"
    jp_kanji: "相手の　体に\n小判を　投げつけて　攻撃する。\n戦闘の　あとで　お金が　もらえる。"
    en: "Numerous coins are hurled at the target to inflict\ndamage. Money is earned after the battle."
    fr: "Des pièces sont lancées sur l’ennemi.\nPermet d’obtenir de l’argent à la fin du combat."
    it: "Colpisce il bersaglio con una gran quantità\ndi monete recuperabili dopo la lotta."
    de: "Das Ziel wird mit Münzen beworfen. Das Geld wird\nnach dem Kampf aufgesammelt."
    es: "Arroja monedas al objetivo.\nLas recupera al final del combate."
    ko: "상대의 몸에\n돈을 세게 던져서 공격한다.\n배틀 후에 돈을 받을 수 있다."
    zh_simp: "向对手的身体\n投掷小金币进行攻击。\n战斗后可以拿到钱。"
    zh_trad: "往對手身上\n投擲金幣進行攻擊。\n戰鬥後可以得到錢。"
payback:
  names:
    jp_kana: しっぺがえし
    jp_kanji: しっぺがえし
    en: Payback
    fr: Représailles
    it: Rivincita
    de: Gegenstoß
    es: Vendetta
    ko: 보복
    zh_simp: 以牙还牙
    zh_trad: 以牙還牙
  descriptions:
    jp_kana: "ためこんで　こうげきする。\nあいてより　あとに　こうげき　できると\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　あとに　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks. If the user\nmoves after the target, this attack’s power will\nbe doubled."
    fr: "Le lanceur charge son énergie, puis attaque.\nLa puissance est doublée si le lanceur agit\naprès l’ennemi."
    it: "Chi la usa accumula forza, poi attacca. La potenza\nraddoppia se il Pokémon agisce dopo il bersaglio."
    de: "Der Anwender lädt die Attacke auf. Handelt das\nZiel vor dem Anwender, verdoppelt sich die Stärke\nder Attacke."
    es: "El usuario contraataca con el doble de fuerza si el \nobjetivo usa un movimiento antes."
    ko: "모아서 공격한다.\n상대보다 뒤에 공격할 수 있으면\n기술의 위력은 2배가 된다."
    zh_simp: "蓄力攻击。\n如果能在对手之后攻击，\n招式的威力会变成２倍。"
    zh_trad: "累積力量進行攻擊。\n若在對手之後進行攻擊，\n招式的威力會變成２倍。"
peck:
  names:
    jp_kana: つつく
    jp_kanji: つつく
    en: Peck
    fr: Picpic
    it: Beccata
    de: Schnabel
    es: Picotazo
    ko: 쪼기
    zh_simp: 啄
    zh_trad: 啄
  descriptions:
    jp_kana: "するどく　とがった　くちばしや　つので\nあいてを　つついて　こうげきする。"
    jp_kanji: "鋭く　とがった　くちばしや　つので\n相手を　突いて　攻撃する。"
    en: "The target is jabbed with a sharply pointed beak\nor horn."
    fr: "Frappe l’ennemi d’un bec pointu ou d’une corne\npour infliger des dégâts."
    it: "Colpisce il bersaglio con il becco appuntito\no con un corno."
    de: Greift das Ziel mit dem Schnabel oder Horn an.
    es: Ensarta al objetivo con un cuerno o pico punzante.
    ko: "날카롭고 뾰족한 부리나 뿔로\n상대를 쪼아서 공격한다."
    zh_simp: "用尖锐的喙或角\n刺向对手进行攻击。"
    zh_trad: "用尖銳的喙或角\n刺向對手進行攻擊。"
perish_song:
  names:
    jp_kana: ほろびのうた
    jp_kanji: ほろびのうた
    en: Perish Song
    fr: Requiem
    it: Ultimocanto
    de: Abgesang
    es: Canto Mortal
    ko: 멸망의노래
    zh_simp: 灭亡之歌
    zh_trad: 滅亡之歌
  descriptions:
    jp_kana: "うたを　きいた　ポケモンは\n３ターン　たつと　ひんしに　なる。\nこうたいすると　こうかは　なくなる。"
    jp_kanji: "歌を　聴いた　ポケモンは\n３ターン　たつと　ひんしに　なる。\n交代すると　効果は　なくなる。"
    en: "Any Pokémon that hears this song faints in three\nturns, unless it switches out of battle."
    fr: "Tout Pokémon qui entend ce requiem est K.O.\ndans trois tours à moins qu’il ne soit remplacé."
    it: "Qualunque Pokémon che senta questo canto va\nKO in tre turni, se non lo si sostituisce."
    de: "Wer diese Musik hört, wird nach drei Runden besiegt.\nRettung ist durch den Eintausch eines neuen\nPokémon möglich."
    es: "Si un Pokémon escucha este canto y no es cambiado \npor otro en tres turnos, acaba debilitándose."
    ko: "노래를 들은 포켓몬은\n3턴이 지나면 기절한다.\n교체되면 효과가 없어진다."
    zh_simp: "倾听歌声的宝可梦\n经过３回合陷入濒死。\n替换后效果消失。"
    zh_trad: "聽了歌聲的寶可夢\n３回合後將陷入瀕死。\n替換寶可夢後效果就會消失。"
petal_blizzard:
  names:
    jp_kana: はなふぶき
    jp_kanji: はなふぶき
    en: Petal Blizzard
    fr: Tempête Florale
    it: Fiortempesta
    de: Blütenwirbel
    es: Tormenta Floral
    ko: 꽃보라
    zh_simp: 落英缤纷
    zh_trad: 落英繽紛
  descriptions:
    jp_kana: "はげしい　はなふぶきを　おこし\nまわりに　いるものに　こうげきして\nダメージを　あたえる。"
    jp_kanji: "激しい　花吹雪を　起こし\n周りに　いるものに　攻撃して\nダメージを　与える。"
    en: "The user stirs up a violent petal blizzard and attacks\neverything around it."
    fr: "Déclenche une violente tempête de fleurs qui\ninflige des dégâts à tous les Pokémon alentour."
    it: "Infligge danni ai Pokémon che ha intorno\nattaccandoli con una tempesta di fiori."
    de: "Der Anwender erzeugt einen turbulenten\nBlütenwirbel, der alle Pokémon in der Nähe\nerfasst und ihnen Schaden zufügt."
    es: "El usuario desata un intenso vendaval de pétalos \nque daña a los Pokémon a su alrededor."
    ko: "세찬 꽃보라를 일으켜서\n주위에 있는 포켓몬을 공격하여\n데미지를 준다."
    zh_simp: "猛烈地刮起飞雪般的落花，\n攻击周围所有的宝可梦，\n并给予伤害。"
    zh_trad: "猛烈地刮起飛雪般的落花，\n攻擊周圍所有的寶可夢。"
petal_dance:
  names:
    jp_kana: はなびらのまい
    jp_kanji: はなびらのまい
    en: Petal Dance
    fr: Danse-Fleur
    it: Petalodanza
    de: Blättertanz
    es: Danza Pétalo
    ko: 꽃잎댄스
    zh_simp: 花瓣舞
    zh_trad: 花瓣舞
  descriptions:
    jp_kana: "２ー３ターンの　あいだ　はなを\nまきちらして　あいてを　こうげきする。\nまきちらした　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　間　花を\nまきちらして　相手を　攻撃する。\nまきちらした　あとは　混乱する。"
    en: "The user attacks the target by scattering petals for\ntwo to three turns. The user then becomes confused."
    fr: "Le lanceur attaque en projetant des pétales\npendant deux à trois tours avant de céder à\nla confusion."
    it: "Attacca il nemico cospargendolo di petali\nper due o tre turni, ma chi la usa rimane confuso."
    de: "Angriff mit Blütenblättern für zwei bis drei Runden.\nAngreifer wird verwirrt."
    es: "Lanza pétalos de dos a tres turnos y acaba \nconfundiendo al atacante."
    ko: "2-3턴 동안 꽃을\n흩뿌려서 상대를 공격한다.\n흩뿌린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n散落花瓣攻击对手。\n之后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n不斷灑出花瓣攻擊對手。\n招式結束後自己會陷入混亂狀態。"
phantom_force:
  names:
    jp_kana: ゴーストダイブ
    jp_kanji: ゴーストダイブ
    en: Phantom Force
    fr: Hantise
    it: Spettrotuffo
    de: Phantomkraft
    es: Golpe Fantasma
    ko: 고스트다이브
    zh_simp: 潜灵奇袭
    zh_trad: 潛靈奇襲
  descriptions:
    jp_kana: "１ターンめで　どこかに　きえて\n２ターンめに　あいてを　こうげきする。\nまもりを　むしして　こうげきできる。"
    jp_kanji: "１ターンめで　どこかに　消えて\n２ターンめに　相手を　攻撃する。\n守りを　無視して　攻撃できる。"
    en: "The user vanishes somewhere, then strikes the\ntarget on the next turn. This move hits even if the\ntarget protects itself."
    fr: "Le lanceur disparaît au premier tour et frappe au\nsecond. Cette attaque passe outre les protections."
    it: "Chi la usa scompare improvvisamente per attaccare \npoi nel turno seguente. Questa mossa neutralizza\nle protezioni del bersaglio."
    de: "Der Anwender verschwindet, um eine Runde lang\nseine Kraft zu sammeln und in der nächsten Runde\nanzugreifen. Durchbricht die Defensive des Zieles."
    es: "El usuario desaparece en el primer turno y ataca a \nsu objetivo en el segundo. Permite acertar aunque \nel objetivo esté protegiéndose."
    ko: "1턴째에 어디론가 사라져서\n2턴째에 상대를 공격한다.\n기술 방어를 무시하고 공격할 수 있다."
    zh_simp: "第１回合消失在某处，\n第２回合攻击对手。\n可以无视守护进行攻击。"
    zh_trad: "使用後的第１回合消失到某處，\n並於第２回合攻擊對手。\n可不顧對手的守護進行攻擊。"
pin_missile:
  names:
    jp_kana: ミサイルばり
    jp_kanji: ミサイルばり
    en: Pin Missile
    fr: Dard-Nuée
    it: Missilspillo
    de: Nadelrakete
    es: Pin Misil
    ko: 바늘미사일
    zh_simp: 飞弹针
    zh_trad: 飛彈針
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "鋭い　ハリを\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "Sharp spikes are shot at the target in rapid\nsuccession. They hit two to five times in a row."
    fr: "Envoie une rafale de dards.\nPeut toucher de deux à cinq fois."
    it: "Il bersaglio viene colpito da due a cinque volte\nin rapida successione con delle spine."
    de: "Spitze Nadeln treffen das Ziel zwei- bis fünfmal\nhintereinander."
    es: Lanza finas púas que hieren de dos a cinco veces.
    ko: "날카로운 침을\n상대에게 발사해서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "向对手发射\n锐针进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n銳利的針進行攻擊。\n可連續攻擊２～５次。"
play_nice:
  names:
    jp_kana: なかよくする
    jp_kanji: なかよくする
    en: Play Nice
    fr: Camaraderie
    it: Simpatia
    de: Kameradschaft
    es: Camaradería
    ko: 친해지기
    zh_simp: 和睦相处
    zh_trad: 和睦相處
  descriptions:
    jp_kana: "あいてと　なかよくなって\nたたかう　きりょくを　うしなわせ\nあいての　こうげきを　さげる。"
    jp_kanji: "相手と　仲良くなって\n戦う　気力を　失わせ\n相手の　攻撃を　さげる。"
    en: "The user and the target become friends, and the\ntarget loses its will to fight. This lowers the target’s\nAttack stat."
    fr: "L’ennemi se lie d’amitié avec le lanceur et perd\nsa combativité, diminuant son Attaque."
    it: "Chi la usa diventa amico del bersaglio,\nrabbonendolo e riducendone così l’Attacco."
    de: "Der Anwender schließt mit dem Ziel Freundschaft\nund nimmt ihm seine Angriffslust. Der Angriffs-Wert\ndes Zieles sinkt."
    es: "Se hace amigo de su oponente y consigue que a \neste se le quiten las ganas de combatir. Además, \nreduce su Ataque."
    ko: "상대와 친해져서\n싸울 마음을 잃게 하여\n상대의 공격을 떨어뜨린다."
    zh_simp: "和对手和睦相处，\n使其失去战斗的气力，\n从而降低对手的攻击。"
    zh_trad: "和對手和睦相處，\n讓對手失去戰鬥意志，\n降低對手的攻擊。"
play_rough:
  names:
    jp_kana: じゃれつく
    jp_kanji: じゃれつく
    en: Play Rough
    fr: Câlinerie
    it: Carineria
    de: Knuddler
    es: Carantoña
    ko: 치근거리기
    zh_simp: 嬉闹
    zh_trad: 嬉鬧
  descriptions:
    jp_kana: "あいてに　じゃれついて\nこうげきする。　あいての\nこうげきを　さげる　ことがある。"
    jp_kanji: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    en: "The user plays rough with the target and attacks it.\nThis may also lower the target’s Attack stat."
    fr: "Attaque l’ennemi avec un câlin.\nPeut diminuer son Attaque."
    it: "Chi la usa attacca il bersaglio con delle carinerie.\nPuò anche ridurne l’Attacco."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nGelegentlich sinkt dabei auch dessen Angriffs-Wert."
    es: "El Pokémon que lo usa le hace cucamonas al \nobjetivo y lo ataca. Puede disminuir el Ataque\ndel objetivo."
    ko: "상대에게 치근거리며\n공격한다. 상대의\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "与对手嬉闹并攻击。\n有时会降低对手的攻击。"
    zh_trad: "在和對手嬉鬧的同時進行攻擊。\n有時會降低對手的攻擊。"
pluck:
  names:
    jp_kana: ついばむ
    jp_kanji: ついばむ
    en: Pluck
    fr: Picore
    it: Spennata
    de: Pflücker
    es: Picoteo
    ko: 쪼아대기
    zh_simp: 啄食
    zh_trad: 啄食
  descriptions:
    jp_kana: "くちばしで　こうげき。\nあいてが　きのみを　もっている　とき\nたべて　きのみの　こうかを　うけられる。"
    jp_kanji: "くちばしで　攻撃。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user pecks the target. If the target is holding a\nBerry, the user eats it and gains its effect."
    fr: "Le lanceur picore la cible.\nSi cette dernière tient une Baie, le lanceur la mange\net profite de ses effets."
    it: "Chi la usa becca il bersaglio. Inoltre, se questi ha\nuna bacca, gliela ruba e ne sfrutta gli effetti."
    de: "Anwender pickt das Ziel, nimmt die Beere, falls das\nZiel eine trägt, und erhält ihren Effekt."
    es: "Picotea al objetivo. Si este sostiene una baya, la \npicotea también y obtiene sus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
    zh_simp: "用喙进行攻击。\n当对手携带树果时，\n可以食用并获得其效果。"
    zh_trad: "用烏喙進行攻擊。\n可以吃下對手攜帶的樹果，\n並獲得樹果的效果。"
poison_fang:
  names:
    jp_kana: どくどくのキバ
    jp_kanji: どくどくのキバ
    en: Poison Fang
    fr: Crochet Venin
    it: Velenodenti
    de: Giftzahn
    es: Colmillo Ven
    ko: 독엄니
    zh_simp: 剧毒牙
    zh_trad: 劇毒牙
  descriptions:
    jp_kana: "どくの　ある　キバで\nあいてに　かみついて　こうげきする。\nもうどくを　おわせる　ことが　ある。"
    jp_kanji: "毒の　ある　キバで\n相手に　かみついて　攻撃する。\n猛毒を　おわせる　ことが　ある。"
    en: "The user bites the target with toxic fangs. This may\nalso leave the target badly poisoned."
    fr: "Le lanceur mord l’ennemi de ses crocs toxiques.\nPeut aussi l’empoisonner gravement."
    it: "Chi la usa morde il bersaglio con denti avvelenati\nche possono anche iperavvelenarlo."
    de: "Angriff mit giftigen Reißzähnen. Das Ziel wird\neventuell schwer vergiftet."
    es: "Colmillos tóxicos que pueden envenenar\ngravemente al objetivo."
    ko: "독이 있는 이빨로\n상대를 물어서 공격한다.\n맹독을 주입할 때가 있다."
    zh_simp: "用有毒的牙齿\n咬住对手进行攻击。\n有时会使对手中剧毒。"
    zh_trad: "用有毒的牙齒\n咬住對手進行攻擊。\n有時會讓對手陷入劇毒狀態。"
poison_gas:
  names:
    jp_kana: どくガス
    jp_kanji: どくガス
    en: Poison Gas
    fr: Gaz Toxik
    it: Velenogas
    de: Giftwolke
    es: Gas Venenoso
    ko: 독가스
    zh_simp: 毒瓦斯
    zh_trad: 毒瓦斯
  descriptions:
    jp_kana: "どくガスを　あいての　かおに　ふきかけて\nどくの　じょうたいに　する。"
    jp_kanji: "毒ガスを　相手の　顔に　吹きかけて\n毒の　状態に　する。"
    en: "A cloud of poison gas is sprayed in the face of\nopposing Pokémon, poisoning those hit."
    fr: "Un nuage de gaz toxique est projeté au visage de\nl’ennemi pour l’empoisonner."
    it: "Spruzza in faccia ai nemici che ha intorno\nuna nuvola di gas tossico che avvelena."
    de: "Hüllt Gegner in der Umgebung in Gas ein, das sie\nvergiftet."
    es: "Lanza una nube de gas tóxico al objetivo.\nProduce envenenamiento."
    ko: "독가스를 상대의 얼굴에 내뿜어\n독 상태로 만든다."
    zh_simp: "将毒瓦斯吹到对手的脸上，\n从而让对手陷入中毒状态。"
    zh_trad: "將毒瓦斯吹到對手的臉上，\n讓對手陷入中毒狀態。"
poison_jab:
  names:
    jp_kana: どくづき
    jp_kanji: どくづき
    en: Poison Jab
    fr: Direct Toxik
    it: Velenpuntura
    de: Gifthieb
    es: Puya Nociva
    ko: 독찌르기
    zh_simp: 毒击
    zh_trad: 毒擊
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや　うでで\nあいてを　つきさす。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle or arm steeped\nin poison. This may also poison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre plein de poison. Peut aussi\nl’empoisonner."
    it: "Il bersaglio è colpito da un tentacolo o da un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Ziel wird mit vergiftetem Arm oder Tentakel verletzt.\nEs wird dabei eventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo\nenvenenado. Puede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
poison_powder:
  names:
    jp_kana: どくのこな
    jp_kanji: どくのこな
    en: Poison Powder
    fr: Poudre Toxik
    it: Velenpolvere
    de: Giftpuder
    es: Polvo Veneno
    ko: 독가루
    zh_simp: 毒粉
    zh_trad: 毒粉
  descriptions:
    jp_kana: "どくの　ある　こなを\nたくさん　ふりまいて\nあいてを　どく　じょうたいに　する。"
    jp_kanji: "毒の　ある　粉を\nたくさん　ふりまいて\n相手を　毒状態に　する。"
    en: "The user scatters a cloud of poisonous dust that\npoisons the target."
    fr: Une poudre toxique empoisonne l’ennemi.
    it: "Investe il bersaglio con una nuvola di polvere\ntossica che avvelena."
    de: "Verstreut giftigen Puder, der das Ziel eventuell\nvergiftet."
    es: Polvo tóxico que envenena al objetivo.
    ko: "독이 있는 가루를\n많이 흩뿌려서\n상대를 독 상태로 만든다."
    zh_simp: "撒出毒粉，\n从而让对手陷入中毒状态。"
    zh_trad: "撒出大量的有毒粉末\n讓對手陷入中毒狀態。"
poison_sting:
  names:
    jp_kana: どくばり
    jp_kanji: どくばり
    en: Poison Sting
    fr: Dard-Venin
    it: Velenospina
    de: Giftstachel
    es: Picotazo Ven
    ko: 독침
    zh_simp: 毒针
    zh_trad: 毒針
  descriptions:
    jp_kana: "どくの　ある　ハリを\nあいてに　つきさして　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒の　ある　ハリを\n相手に　突き刺して　攻撃する。\n毒状態に　することが　ある。"
    en: "The user stabs the target with a poisonous stinger.\nThis may also poison the target."
    fr: "Un dard toxique qui transperce l’ennemi.\nPeut aussi l’empoisonner."
    it: "Colpisce il bersaglio con un aculeo tossico\nche può anche avvelenarlo."
    de: "Angriff mit Giftstachel. Das Ziel wird eventuell\nvergiftet."
    es: "Lanza un aguijón tóxico que puede envenenar al \nobjetivo."
    ko: "독이 있는 침을\n상대에게 꿰찔러서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "将有毒的针\n刺入对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將有毒的針\n刺進對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
poison_tail:
  names:
    jp_kana: ポイズンテール
    jp_kanji: ポイズンテール
    en: Poison Tail
    fr: Queue-Poison
    it: Velenocoda
    de: Giftschweif
    es: Cola Veneno
    ko: 포이즌테일
    zh_simp: 毒尾
    zh_trad: 毒尾
  descriptions:
    jp_kana: "しっぽで　たたく。\nどく　じょうたいに　することが　あり\nきゅうしょにも　あたりやすい。"
    jp_kanji: "しっぽで　たたく。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "The user hits the target with its tail. This may also\npoison the target. Critical hits land more easily."
    fr: "Attaque à taux de critique élevé.\nPeut aussi empoisonner l’ennemi."
    it: "Chi la usa colpisce con la coda e può avvelenare\nil bersaglio. Probabile brutto colpo."
    de: "Angriff mit hoher Volltrefferquote.\nDiese Schweifattacke vergiftet das Ziel eventuell."
    es: Puede envenenar y dar un golpe crítico.
    ko: "꼬리로 때린다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
    zh_simp: "用尾巴拍打。\n有时会让对手陷入中毒状态，\n也容易击中要害。"
    zh_trad: "將尾巴甩向對手進行攻擊。\n有時會讓對手陷入中毒狀態，\n且容易擊中要害。"
pollen_puff:
  names:
    jp_kana: かふんだんご
    jp_kanji: かふんだんご
    en: Pollen Puff
    fr: Boule Pollen
    it: Sferapolline
    de: Pollenknödel
    es: Bola de Polen
    ko: 꽃가루경단
    zh_simp: 花粉团
    zh_trad: 花粉團
  descriptions:
    jp_kana: "てきには　ばくはつする　だんごを\nつかって　こうげき。　みかたには\nかいふくする　だんごを　あたえる。"
    jp_kanji: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    en: "The user attacks the enemy with a pollen puff that\nexplodes. If the target is an ally, it gives the ally a\npollen puff that restores its HP instead."
    fr: "Utilisé sur l’ennemi, envoie une boule explosive qui\nfait des dégâts ; sur un allié, donne du bon pollen\nnutritif qui fait récupérer des PV."
    it: "Chi la usa attacca il nemico con una sfera\nesplosiva. Se colpisce degli alleati, fa recuperare\nloro dei PS."
    de: "Der Anwender greift mit einem Ball aus Pollen an,\nder beim Ziel explodiert. Mitstreiter werden von\neinem Ball getroffen, der ihre KP auffüllt."
    es: "Ataca al oponente con una bola explosiva. Si esta\nalcanza a un aliado, le hará recuperar PS."
    ko: "상대에게는 폭발하는 경단을\n사용하여 공격한다. 같은 편에게는\n회복하는 경단을 준다."
    zh_simp: "对敌人使用是会爆炸的团子。\n对我方使用则是给予回复的团子。"
    zh_trad: "對敵人使用時，用會爆炸的花粉團來攻擊。\n對我方同伴使用時，\n則給予有回復效果的花粉團。"
pound:
  names:
    jp_kana: はたく
    jp_kanji: はたく
    en: Pound
    fr: Écras’Face
    it: Botta
    de: Pfund
    es: Destructor
    ko: 막치기
    zh_simp: 拍击
    zh_trad: 拍擊
  descriptions:
    jp_kana: "ながい　しっぽや　てなどを　つかって\nあいてを　はたいて　こうげきする。"
    jp_kanji: "長い　しっぽや　手などを　使って\n相手を　はたいて　攻撃する。"
    en: "The target is physically pounded with a long tail, a\nforeleg, or the like."
    fr: "Écrase l’ennemi avec les pattes avant ou la queue,\npar exemple."
    it: "Colpisce il bersaglio con la coda o le zampe\nanteriori."
    de: Ein Hieb mit den Vorderbeinen oder dem Schweif.
    es: Golpea con las patas o la cola.
    ko: "긴 꼬리나 손 등을 사용하여\n상대를 때려서 공격한다."
    zh_simp: "使用长长的尾巴或手等\n拍打对手进行攻击。"
    zh_trad: "使用長長的尾巴或手等\n拍打對手進行攻擊。"
powder:
  names:
    jp_kana: ふんじん
    jp_kanji: ふんじん
    en: Powder
    fr: Nuée de Poudre
    it: Pulviscoppio
    de: Pulverschleuder
    es: Polvo Explosivo
    ko: 분진
    zh_simp: 粉尘
    zh_trad: 粉塵
  descriptions:
    jp_kana: "ふんじんを　あびせた　あいてが\nほのおわざを　つかうと\nばくはつして　ダメージを　あたえる。"
    jp_kanji: "ふんじんを　浴びせた　相手が\nほのお技を　使うと\n爆発して　ダメージを　与える。"
    en: "The user covers the target in a combustible powder.\nIf the target uses a Fire-type move, the powder\nexplodes and damages the target."
    fr: "L’ennemi est pris dans un nuage de poudre.\nS’il utilise une capacité de type Feu lors du même\ntour, le nuage explose et lui inflige des dégâts."
    it: "Il bersaglio viene coperto da un pulviscolo che\nesplode danneggiandolo se questi utilizza\nuna mossa di tipo Fuoco nello stesso turno."
    de: "Setzt das Ziel nach Einsatz von Pulverschleuder in\nderselben Runde eine Feuer-Attacke ein, kommt es\nzu einer Explosion, die ihm schadet."
    es: "Esparce un polvo sobre el objetivo. Si este usa un\nmovimiento de tipo Fuego en el mismo turno, el polvo\nexplota y le inflige daño."
    ko: "분진을 뒤집어쓴 상대가\n불꽃 기술을 쓰면\n폭발하여 데미지를 준다."
    zh_simp: "如果被撒到粉尘的对手\n使用火招式，\n则会爆炸并给予伤害。"
    zh_trad: "被撒到粉塵的對手\n使用火屬性招式時，\n會發生爆炸並受到傷害。"
powder_snow:
  names:
    jp_kana: こなゆき
    jp_kanji: こなゆき
    en: Powder Snow
    fr: Poudreuse
    it: Polneve
    de: Pulverschnee
    es: Nieve Polvo
    ko: 눈싸라기
    zh_simp: 细雪
    zh_trad: 細雪
  descriptions:
    jp_kana: "つめたい　こなゆきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷たい　粉雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "The user attacks with a chilling gust of powdery\nsnow. This may also freeze the opposing Pokémon."
    fr: "Le lanceur projette de la neige poudreuse.\nPeut aussi geler l’ennemi."
    it: "Attacca i nemici che ha intorno con una raffica\ndi neve farinosa e può anche congelarli."
    de: "Angriff mit Schnee. Das Ziel wird eventuell\neingefroren."
    es: Lanza nieve que puede llegar a congelar.
    ko: "차가운 가랑눈을\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将冰冷的细雪\n吹向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將冰冷的細雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
power_gem:
  names:
    jp_kana: パワージェム
    jp_kanji: パワージェム
    en: Power Gem
    fr: Rayon Gemme
    it: Gemmoforza
    de: Juwelenkraft
    es: Joya de Luz
    ko: 파워젬
    zh_simp: 力量宝石
    zh_trad: 力量寶石
  descriptions:
    jp_kana: "ほうせきの　ように　きらめく　ひかりを\nはっしゃして　あいてを　こうげきする。"
    jp_kanji: "宝石のように　きらめく　光を\n発射して　相手を　攻撃する。"
    en: "The user attacks with a ray of light that sparkles as\nif it were made of gemstones."
    fr: "Le lanceur attaque avec un rayon de lumière qui\nscintille comme s’il était composé de gemmes."
    it: "Chi la usa attacca con un raggio di luce che brilla\ncome se fosse fatto di pietre preziose."
    de: "Anwender attackiert mit einem Lichtstrahl,\nder funkelt, als sei er aus Juwelen."
    es: "Ataca con un rayo de luz que centellea como si lo \nformaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을\n발사하여 상대를 공격한다."
    zh_simp: "发射如宝石般\n闪耀的光芒攻击对手。"
    zh_trad: "發射如寶石般\n閃耀的光芒攻擊對手。"
power_split:
  names:
    jp_kana: パワーシェア
    jp_kanji: パワーシェア
    en: Power Split
    fr: Partage Force
    it: Pariattacco
    de: Kraftteiler
    es: Isofuerza
    ko: 파워셰어
    zh_simp: 力量平分
    zh_trad: 力量平分
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nこうげきと　とくこうを　たして\nはんぶんに　わける。"
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻を　たして\n半分に　わける。"
    en: "The user employs its psychic power to average its\nAttack and Sp. Atk stats with those of the target."
    fr: "Additionne l’Attaque Spéciale et l’Attaque\ndu lanceur et de sa cible et les redistribue\néquitablement entre les deux."
    it: "Chi la usa sfrutta la sua forza psichica per sommare \nAttacco e Attacco Speciale a quelli del bersaglio\ne dividerli equamente."
    de: "Durch Psycho-Kräfte werden Angriff und\nSpezial-Angriff des Anwenders und des Zieles\naddiert und in zwei gleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer la media \nde su Ataque y Ataque Especial con los de su\nobjetivo y compartirlos."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격을 더해서\n반으로 나눈다."
    zh_simp: "利用超能力将自己和对手的\n攻击和特攻相加，\n再进行平分。"
    zh_trad: "用超能力將自己和對手的\n攻擊和特攻各別相加後，\n再進行平分。"
power_swap:
  names:
    jp_kana: パワースワップ
    jp_kanji: パワースワップ
    en: Power Swap
    fr: Permuforce
    it: Barattoforza
    de: Krafttausch
    es: Cambia Fuerza
    ko: 파워스웹
    zh_simp: 力量互换
    zh_trad: 力量互換
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんと　あいての\nこうげきと　とくこうの\nのうりょく　へんかを　いれかえる。"
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch\nchanges to its Attack and Sp. Atk stats with\nthe target."
    fr: "Pouvoir qui échange les modifications de\nl’Attaque Spéciale et de l’Attaque du lanceur\navec la cible."
    it: "Chi la usa sfrutta la sua forza psichica per\nscambiare le modifiche ad Attacco e Attacco\nSpeciale con il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen an Angriff\nund Spezial-Angriff mit denen des Zieles."
    es: "El usuario emplea su poder mental para\nintercambiar los cambios en Ataque y Ataque\nEspecial con el objetivo."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격의\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手的攻击\n以及特攻的能力变化。"
    zh_trad: "用超能力將自己和對手的\n攻擊與特攻的能力變化互相交換。"
power_trick:
  names:
    jp_kana: パワートリック
    jp_kanji: パワートリック
    en: Power Trick
    fr: Astuce Force
    it: Ingannoforza
    de: Krafttrick
    es: Truco Fuerza
    ko: 파워트릭
    zh_simp: 力量戏法
    zh_trad: 力量戲法
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんの　こうげきと　ぼうぎょの\nちからを　こうかん　する。"
    jp_kanji: "超能力で\n自分の　攻撃と　防御の\n力を　交換する。"
    en: "The user employs its psychic power to switch its\nAttack stat with its Defense stat."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour\néchanger sa Défense et son Attaque."
    it: "Mossa psichica che permette a chi la usa\ndi scambiare i valori delle sue statistiche\ndi Attacco e Difesa."
    de: "Anwender setzt Psycho-Kräfte ein, um eigenen\nAngriffs- mit Verteidigungs-Wert auszutauschen."
    es: "Usa sus poderes mentales para intercambiar su \ncaracterística de Ataque por Defensa."
    ko: "초능력으로\n자신의 공격과 방어의\n힘을 교환한다."
    zh_simp: "利用超能力交换\n自己的攻击和\n防御的力量。"
    zh_trad: "利用超能力，\n將自己的攻擊和\n防禦互相交換。"
power_trip:
  names:
    jp_kana: つけあがる
    jp_kanji: つけあがる
    en: Power Trip
    fr: Arrogance
    it: Tracotanza
    de: Überheblichkeit
    es: Chulería
    ko: 기어오르기
    zh_simp: 嚣张
    zh_trad: 囂張
  descriptions:
    jp_kana: "じぶんの　つよさを　はなたかだかに\nこうげきする。じぶんの　のうりょくが\nあがって　いるほど　いりょくが　あがる。"
    jp_kanji: "自分の　強さを　鼻高々に\n攻撃する。自分の　能力が\nあがって　いるほど　威力が　あがる。"
    en: "The user boasts its strength and attacks the target.\nThe more the user’s stats are raised, the greater the\nmove’s power."
    fr: "Ivre de puissance, le lanceur attaque de toutes\nses forces. Plus ses stats ont été augmentées,\nplus la puissance de l’attaque est élevée."
    it: "Chi la usa attacca il bersaglio sfoggiando\nla propria forza. Più le sue statistiche sono\nstate aumentate, più la mossa è potente."
    de: "Der Anwender prahlt mit seiner Stärke und greift\ndas Ziel an. Dieser Angriff ist umso stärker, je weiter\ndie Statuswerte des Anwenders erhöht sind."
    es: "Ataca al oponente presumiendo de su fuerza. Cuanto\nmás hayan subido las características del usuario,\nmayor será el daño."
    ko: "자신의 강함을 뻐기고\n공격한다. 자신의 능력이\n올라가 있는 만큼 위력이 오른다."
    zh_simp: "耀武扬威地攻击对手，\n自己的能力提高得越多，\n威力就越大。"
    zh_trad: "耀武揚威地攻擊對手，\n自己的能力提高得越多，\n威力就越大。"
power_up_punch:
  names:
    jp_kana: グロウパンチ
    jp_kanji: グロウパンチ
    en: Power-Up Punch
    fr: Poing Boost
    it: Crescipugno
    de: Steigerungshieb
    es: Puño Incremento
    ko: 그로우펀치
    zh_simp: 增强拳
    zh_trad: 增強拳
  descriptions:
    jp_kana: "くりかえし　うつことで\nだんだん　こぶしが　かたくなる。\nあいてに　あてると　こうげきが　あがる。"
    jp_kanji: "繰り返し　打つことで\nだんだん　こぶしが　固くなる。\n相手に　当てると　攻撃が　あがる。"
    en: "Striking opponents over and over makes the user’s\nfists harder. Hitting a target raises the Attack stat."
    fr: "À force de frapper, les poings deviennent plus\ndurs. Augmente l’Attaque du lanceur si l’ennemi\nest touché."
    it: "Rende i pugni più duri a ogni colpo inferto.\nSe i pugni vanno a segno, l’Attacco di chi\nla usa aumenta."
    de: "Die Fäuste des Anwenders härten durch\nwiederholtes Zuschlagen ab. Mit jedem\nTreffer steigt sein Angriffs-Wert."
    es: "Cada vez que golpea a un oponente se endurecen \nsus puños. Si acierta al objetivo, el Ataque del\nusuario aumenta."
    ko: "반복하여 때리면\n점점 주먹이 단단해진다.\n상대를 때리면 공격이 오른다."
    zh_simp: "通过反复击打对手，\n使自己的拳头慢慢变硬。\n打中对手攻击就会提高。"
    zh_trad: "反覆出拳擊打對手，\n使自己的拳頭慢慢變硬。\n命中對手時會提高自己的攻擊。"
power_whip:
  names:
    jp_kana: パワーウィップ
    jp_kanji: パワーウィップ
    en: Power Whip
    fr: Mégafouet
    it: Vigorcolpo
    de: Blattgeißel
    es: Latigazo
    ko: 파워휩
    zh_simp: 强力鞭打
    zh_trad: 強力鞭打
  descriptions:
    jp_kana: "ツタや　しょくしゅを　はげしく　ふるって\nあいてを　たたきつけ　こうげきする。"
    jp_kanji: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    en: "The user violently whirls its vines, tentacles, or the \nlike to harshly lash the target."
    fr: "Le lanceur fait virevolter violemment ses lianes ou\nses tentacules pour fouetter l’ennemi."
    it: "Chi la usa agita violentemente liane o tentacoli\nper sferzare il bersaglio."
    de: "Anwender wirbelt seine Ranken oder Tentakel\npeitschenartig gegen das Ziel."
    es: "El usuario agita violentamente sus lianas o tentáculos \npara golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 흔들어\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "激烈地挥舞青藤或触手\n摔打对手进行攻击。"
    zh_trad: "激烈地揮舞藤蔓或觸手\n向對手進行攻擊。"
precipice_blades:
  names:
    jp_kana: だんがいのつるぎ
    jp_kanji: だんがいのつるぎ
    en: Precipice Blades
    fr: Lame Pangéenne
    it: Spade Telluriche
    de: Abgrundsklinge
    es: Filo del Abismo
    ko: 단애의칼
    zh_simp: 断崖之剑
    zh_trad: 斷崖之劍
  descriptions:
    jp_kana: "だいちの　ちからを　やいばに　かえて\nあいてを　こうげきする。"
    jp_kanji: "大地の　力を　刃に　変えて\n相手を　攻撃する。"
    en: "The user attacks opposing Pokémon by manifesting\nthe power of the land in fearsome blades of stone."
    fr: "Le Pokémon transforme la puissance de la terre\net attaque la cible avec une lame acérée."
    it: "Attacca i nemici intorno trasformando la potenza\ndella terra in lame affilate."
    de: "Der Anwender wandelt die Kraft des Erdreichs in\nKlingen um, mit denen er das Ziel angreift."
    es: "Hace que el poder latente de la tierra se manifieste \nen forma de hojas afiladas y ataca al objetivo con\nellas."
    ko: "대지의 힘을 칼날로 바꿔\n상대를 공격한다."
    zh_simp: "将大地的力量变化为利刃\n攻击对手。"
    zh_trad: "將大地的力量化為利刃\n攻擊對手。"
present:
  names:
    jp_kana: プレゼント
    jp_kanji: プレゼント
    en: Present
    fr: Cadeau
    it: Regalino
    de: Geschenk
    es: Presente
    ko: 프레젠트
    zh_simp: 礼物
    zh_trad: 禮物
  descriptions:
    jp_kana: "わなを　しかけた　はこを\nあいてに　わたして　こうげきする。ＨＰが\nかいふくして　しまうことも　ある。"
    jp_kanji: "わなを　しかけた　箱を\n相手に　わたして　攻撃する。ＨＰが\n回復して　しまうことも　ある。"
    en: "The user attacks by giving the target a gift with a\nhidden trap. It restores HP sometimes, however."
    fr: "Le lanceur attaque en offrant un cadeau piégé à la\ncible. Peut cependant restaurer certains de ses PV."
    it: "Chi la usa dà un regalo bomba al bersaglio.\nA volte, però, può fargli recuperare PS."
    de: "Eine Bombe als Geschenk. Kann auch KP des Zieles\nwiederherstellen."
    es: "Quien lo usa ataca al objetivo dándole un regalo con\nbomba trampa. Sin embargo, a veces restaura sus\nPS."
    ko: "덫을 설치한 상자를\n상대에게 건네어 공격한다.\nHP가 회복돼버릴 때도 있다."
    zh_simp: "递给对手设有圈套的\n盒子进行攻击。\n也有可能回复对手ＨＰ。"
    zh_trad: "將暗藏機關的盒子\n遞給對手進行攻擊。\n但也有可能回復對手的ＨＰ。"
prismatic_laser:
  names:
    jp_kana: プリズムレーザー
    jp_kanji: プリズムレーザー
    en: Prismatic Laser
    fr: Laser Prisme
    it: Prismalaser
    de: Prisma-Laser
    es: Láser Prisma
    ko: 프리즘레이저
    zh_simp: 棱镜镭射
    zh_trad: 稜鏡鐳射
  descriptions:
    jp_kana: "プリズムの　ちからで　きょうりょくな\nこうせんを　はっしゃする。\nつぎの　ターンは　うごけなくなる。"
    jp_kanji: "プリズムの　力で　強力な\n光線を　発射する。\n次の　ターンは　動けなくなる。"
    en: "The user shoots powerful lasers using the power of\na prism. The user can’t move on the next turn."
    fr: "Le lanceur utilise la puissance d’un prisme\npour envoyer un laser destructeur, mais il doit\nse reposer au tour suivant."
    it: "Chi la usa proietta dei potenti raggi di luce\ngrazie alla potenza del suo prisma, ma non\npuò agire nel turno successivo."
    de: "Der Anwender feuert mithilfe von Prisma-Kraft\nmächtige Lichtstrahlen ab. In der nächsten Runde\nkann er nicht handeln."
    es: "El usuario utiliza un prisma para emitir un rayo de\ngran potencia, pero no puede moverse en el turno\nsiguiente."
    ko: "프리즘의 힘으로 강력한\n광선을 발사한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用棱镜的力量发射强烈光线。\n下一回合自己将无法动弹。"
    zh_trad: "用稜鏡的力量發射強烈光線。\n下一回合自己將無法動彈。"
protect:
  names:
    jp_kana: まもる
    jp_kanji: まもる
    en: Protect
    fr: Abri
    it: Protezione
    de: Schutzschild
    es: Protección
    ko: 방어
    zh_simp: 守住
    zh_trad: 守住
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "Enables the user to evade all attacks. Its chance of\nfailing rises if it is used in succession."
    fr: "Le lanceur esquive toutes les attaques.\nLe risque d’échec augmente lorsque la capacité\nest utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender weicht jeder Attacke aus.\nScheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa \nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
psybeam:
  names:
    jp_kana: サイケこうせん
    jp_kanji: サイケこうせん
    en: Psybeam
    fr: Rafale Psy
    it: Psicoraggio
    de: Psystrahl
    es: Psicorrayo
    ko: 환상빔
    zh_simp: 幻象光线
    zh_trad: 幻象光線
  descriptions:
    jp_kana: "ふしぎな　こうせんを\nあいてに　はっしゃして　こうげきする。\nこんらん　させることが　ある。"
    jp_kanji: "不思議な　光線を\n相手に　発射して　攻撃する。\n混乱させることが　ある。"
    en: "The target is attacked with a peculiar ray. This may\nalso leave the target confused."
    fr: "Un étrange rayon frappe l’ennemi.\nPeut aussi le rendre confus."
    it: "Colpisce il bersaglio con un raggio speciale.\nPuò anche confonderlo."
    de: Feuert einen Strahl ab, der das Ziel verwirren kann.
    es: Extraño rayo que puede causar confusión.
    ko: "이상한 광선을\n상대에게 발사하여 공격한다.\n혼란시킬 때가 있다."
    zh_simp: "向对手发射\n神奇的光线进行攻击。\n有时会使对手混乱。"
    zh_trad: "向對手發射\n神奇的光線進行攻擊。\n有時會使對手混亂。"
psych_up:
  names:
    jp_kana: じこあんじ
    jp_kanji: じこあんじ
    en: Psych Up
    fr: Boost
    it: Psicamisù
    de: Psycho-Plus
    es: Más Psique
    ko: 자기암시
    zh_simp: 自我暗示
    zh_trad: 自我暗示
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into copying any stat\nchange made by the target."
    fr: "Une autohypnose qui permet au lanceur de copier\nles changements de stats de la cible."
    it: "Chi la usa s’ipnotizza per copiare ogni modifica\nalle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um die\nStatusveränderungen des Zieles zu kopieren."
    es: "Quien lo usa se sume en un trance y copia cualquier\ncambio que haya en las características de su\nobjetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
    zh_simp: "向自己施以自我暗示，\n将能力变化的状态\n变得和对手一样。"
    zh_trad: "向自己施加自我暗示，\n讓能力變化的狀態\n變得與對手相同。"
psychic:
  names:
    jp_kana: サイコキネシス
    jp_kanji: サイコキネシス
    en: Psychic
    fr: Psyko
    it: Psichico
    de: Psychokinese
    es: Psíquico
    ko: 사이코키네시스
    zh_simp: 精神强念
    zh_trad: 精神強念
  descriptions:
    jp_kana: "つよい　ねんりきを　あいてに　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic force.\nThis may also lower the target’s Sp. Def stat."
    fr: "Une puissante force télékinétique frappe l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Il bersaglio viene colpito da una potente\nforza telecinetica che può anche ridurne\nla Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede bajar la \nDefensa Especial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手发送\n强大的念力进行攻击。\n有时会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時會降低對手的特防。"
psychic_fangs:
  names:
    jp_kana: サイコファング
    jp_kanji: サイコファング
    en: Psychic Fangs
    fr: Psycho-Croc
    it: Psicozanna
    de: Psychobeißer
    es: Psicocolmillo
    ko: 사이코팽
    zh_simp: 精神之牙
    zh_trad: 精神之牙
  descriptions:
    jp_kana: "サイコパワーで　かみついて\nあいてを　こうげきする。　ひかりのかべや\nリフレクター　なども　はかいできる。"
    jp_kanji: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user bites the target with its psychic\ncapabilities. This can also destroy Light Screen\nand Reflect."
    fr: "Le lanceur mord la cible avec ses pouvoirs\npsychiques. Brise aussi les barrières comme\nMur Lumière et Protection."
    it: "Morde il bersaglio con delle zanne generate\ncon l’energia psichica e rompe barriere come\nRiflesso e Schermoluce."
    de: "Der Anwender beißt das Ziel mithilfe von\nPsycho-Kräften. Die Attacke durchbricht auch\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca a sus rivales con poderes psíquicos que\nademás destruyen barreras como Pantalla de Luz y\nReflejo."
    ko: "사이코 파워로 물어서\n상대를 공격한다. 빛의장막이나\n리플렉터도 파괴할 수 있다."
    zh_simp: "利用精神力量咬住对手进行攻击。\n还可以破坏光墙和反射壁等。"
    zh_trad: "利用精神力量咬住對手進行攻擊。\n並可破壞光牆和反射壁等。"
psychic_terrain:
  names:
    jp_kana: サイコフィールド
    jp_kanji: サイコフィールド
    en: Psychic Terrain
    fr: Champ Psychique
    it: Campo Psichico
    de: Psychofeld
    es: Campo Psíquico
    ko: 사이코필드
    zh_simp: 精神场地
    zh_trad: 精神場地
  descriptions:
    jp_kana: "５ターンの　あいだ　じめんにいると\nせんせいわざを　うけない。\nエスパータイプの　いりょくが　あがる。"
    jp_kanji: "５ターンの間　地面にいると\n先制技を　受けない。\nエスパータイプの　威力が　あがる。"
    en: "This protects Pokémon on the ground from priority\nmoves and powers up Psychic-type moves for\nfive turns."
    fr: "Pendant cinq tours, les Pokémon au sol ne peuvent\nplus subir d’attaques prioritaires et la puissance\ndes capacités de type Psy augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nPsichico: i Pokémon a terra non subiscono mosse ad\nalta priorità e le mosse di tipo Psico sono potenziate."
    de: "Verhindert für fünf Runden, dass Pokémon am Boden\nvon Attacken mit hoher Erstschlagquote getroffen\nwerden. Erhöht die Stärke von Psycho-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos\nde tipo Psíquico y los Pokémon que están en el suelo\nquedan protegidos contra movimientos con prioridad."
    ko: "5턴 동안 땅에 있으면\n선제공격을 받지 않는다.\n에스퍼타입의 위력이 올라간다."
    zh_simp: "在５回合内，地面上的宝可梦\n不会受到先制招式的攻击。\n超能力属性的招式威力会提高。"
    zh_trad: "在５回合內，地面上的寶可夢\n不會受到先制招式攻擊。\n超能力屬性的招式威力會提高。"
psycho_boost:
  names:
    jp_kana: サイコブースト
    jp_kanji: サイコブースト
    en: Psycho Boost
    fr: Psycho Boost
    it: Psicoslancio
    de: Psyschub
    es: Psicoataque
    ko: 사이코부스트
    zh_simp: 精神突进
    zh_trad: 精神突進
  descriptions:
    jp_kana: "フルパワーで　あいてを　こうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが　がくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power. The\nattack’s recoil harshly lowers the user’s\nSp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse beaucoup l’Attaque Spéciale\ndu lanceur."
    it: "Chi la usa sferra un potente attacco, ma\nil contraccolpo riduce di molto il suo\nAttacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho el Ataque \nEspecial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
psycho_cut:
  names:
    jp_kana: サイコカッター
    jp_kanji: サイコカッター
    en: Psycho Cut
    fr: Coupe Psycho
    it: Psicotaglio
    de: Psychoklinge
    es: Psicocorte
    ko: 사이코커터
    zh_simp: 精神利刃
    zh_trad: 精神利刃
  descriptions:
    jp_kana: "じったいか　させた\nこころの　やいばで　あいてを　きりさく。\nきゅうしょに　あたりやすい。"
    jp_kanji: "実体化させた\n心の　刃で　相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user tears at the target with blades formed by\npsychic power. Critical hits land more easily."
    fr: "Le lanceur entaille l’ennemi grâce à des lames faites\nd’énergie psychique. Taux de critique élevé."
    it: "Chi la usa colpisce il bersaglio con lame fatte\ndi forza psichica. Probabile brutto colpo."
    de: "Das Ziel wird mit Klingen attackiert, die aus\nPsycho-Energie bestehen. Hohe Volltrefferquote."
    es: "Ataca al objetivo con cuchillas formadas por energía \npsíquica. Suele ser crítico."
    ko: "실체화시킨\n마음의 칼날로 상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "用实体化的\n心之利刃劈开对手。\n容易击中要害。"
    zh_trad: "用實體化的\n精神利刃斬向對手。\n容易擊中要害。"
psycho_shift:
  names:
    jp_kana: サイコシフト
    jp_kanji: サイコシフト
    en: Psycho Shift
    fr: Échange Psy
    it: Psicotrasfer
    de: Psybann
    es: Psicocambio
    ko: 사이코시프트
    zh_simp: 精神转移
    zh_trad: 精神轉移
  descriptions:
    jp_kana: "ちょうのうりょくで　あんじを　かけて\nじぶんの　うけている　じょうたい\nいじょうを　あいてに　うつす。"
    jp_kanji: "超能力で　暗示を　かけて\n自分の　受けている　状態異常を\n相手に　うつす。"
    en: "Using its psychic power of suggestion, the user\ntransfers its status conditions to the target."
    fr: "Le lanceur transfère ses problèmes de statut\nà l’ennemi grâce à son pouvoir de suggestion."
    it: "Con la forza psichica e la suggestione, chi la usa\npuò trasferire i suoi problemi di stato al Pokémon\ncolpito."
    de: "Anwender nutzt seine Suggestivkräfte, um eigene\nStatusprobleme auf das Ziel zu transferieren."
    es: "Usa su poder mental para transferir al objetivo sus \nproblemas de estado."
    ko: "초능력으로 암시를 걸어서\n자신에게 걸려 있는 상태 이상을\n상대에게 옮긴다."
    zh_simp: "利用超能力施以暗示，\n从而将自己受到的异常状态\n转移给对手。"
    zh_trad: "用超能力施加暗示，\n將自己的異常狀態\n轉移給對手。"
psyshock:
  names:
    jp_kana: サイコショック
    jp_kanji: サイコショック
    en: Psyshock
    fr: Choc Psy
    it: Psicoshock
    de: Psychoschock
    es: Psicocarga
    ko: 사이코쇼크
    zh_simp: 精神冲击
    zh_trad: 精神衝擊
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd psychic wave to attack\nthe target. This attack does physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur l’ennemi. Inflige des dégâts\nphysiques."
    it: "Chi la usa attacca il bersaglio facendo\nmaterializzare un misterioso raggio psichico\nche provoca danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle,\ndie dem Ziel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al \nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
    zh_simp: "将神奇的念波实体化攻击对手。\n给予物理伤害。"
    zh_trad: "將神奇的念力波實體化後攻擊對手。\n給予對手物理傷害。"
psystrike:
  names:
    jp_kana: サイコブレイク
    jp_kanji: サイコブレイク
    en: Psystrike
    fr: Frappe Psy
    it: Psicobotta
    de: Psychostoß
    es: Onda Mental
    ko: 사이코브레이크
    zh_simp: 精神击破
    zh_trad: 精神擊破
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd psychic wave to attack\nthe target. This attack does physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur l’ennemi. Inflige des dégâts\nphysiques."
    it: "Chi la usa attacca il bersaglio facendo\nmaterializzare un misterioso raggio psichico\nche provoca danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle,\ndie dem Ziel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al \nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
    zh_simp: "将神奇的念波实体化攻击对手。\n给予物理伤害。"
    zh_trad: "將神奇的念力波實體化後攻擊對手。\n給予對手物理傷害。"
psywave:
  names:
    jp_kana: サイコウェーブ
    jp_kanji: サイコウェーブ
    en: Psywave
    fr: Vague Psy
    it: Psiconda
    de: Psywelle
    es: Psicoonda
    ko: 사이코웨이브
    zh_simp: 精神波
    zh_trad: 精神波
  descriptions:
    jp_kana: "ふしぎな　ねんぱを\nあいてに　はっしゃして　こうげきする。\nつかう　たびに　ダメージが　かわる。"
    jp_kanji: "不思議な　念波を\n相手に　発射して　攻撃する。\n使うたびに　ダメージが　変わる。"
    en: "The target is attacked with an odd psychic wave.\nThe attack varies in intensity."
    fr: "Une étrange onde d’énergie chaude frappe\nl’ennemi. Cette attaque est d’intensité variable."
    it: "Colpisce il bersaglio con una strana onda psichica.\nHa un’intensità variabile."
    de: "Anwender erzeugt eine mysteriöse Energiewelle,\nderen Intensität von Mal zu Mal anders ausfällt."
    es: "Ataque con una onda de energía de intensidad \nvariable."
    ko: "이상한 염력파를\n상대에게 발사하여 공격한다.\n사용할 때마다 데미지가 바뀐다."
    zh_simp: "向对手发射\n神奇的念波进行攻击。\n每次使用，伤害都会改变。"
    zh_trad: "向對手發射\n神奇的念力波進行攻擊。\n每次給予的傷害都不同。"
pulverizing_pancake:
  names:
    jp_kana: ほんきをだす　こうげき
    jp_kanji: ほんきをだす　こうげき
    en: Pulverizing Pancake
    fr: Gare au Ronflex
    it: Adesso Faccio sul Serio
    de: Schluss mit lustig
    es: Arrojo Intempestivo
    ko: 진심의공격
    zh_simp: 认真起来大爆击
    zh_trad: 認真起來大爆擊
  descriptions:
    jp_kana: "Ｚパワーで　ほんきを　だした　カビゴンが\nきょたいを　やくどうさせて\nぜんりょくで　あいてに　おそいかかる。"
    jp_kanji: "Ｚパワーで　本気を　出した　カビゴンが\n巨体を　躍動させて\n全力で　相手に　襲いかかる。"
    en: "Z-Power brings out the true capabilities of the user,\nSnorlax. The Pokémon moves its enormous body\nenergetically and attacks the target with full force."
    fr: "Ronflex utilise la Force Z pour montrer ce qu’il a\ndans le ventre et écraser la cible de tout son poids."
    it: "Grazie al Potere Z, Snorlax tira fuori la grinta e,\nmuovendo energicamente il suo enorme corpo,\nattacca il bersaglio con tutta la sua forza."
    de: "Relaxo wird von Z-Kraft erfüllt und macht Ernst.\nEs bringt seinen riesigen Körper in Schwung und\nstürzt sich mit ganzer Kraft auf das Ziel."
    es: "Gracias al Poder Z, Snorlax puede mover su enorme\ncuerpo con gran agilidad y determinación, cargando\nsobre el oponente con todas sus fuerzas."
    ko: "Z파워로 진심을 낸 잠만보가\n거대한 몸을 움직여서\n전력으로 상대를 공격한다."
    zh_simp: "通过Ｚ力量使得认真起来的\n卡比兽跃动巨大身躯，\n全力向对手发动袭击。"
    zh_trad: "透過Ｚ力量使認真起來的\n卡比獸躍動其巨大身軀，\n全力向對手發動襲擊。"
punishment:
  names:
    jp_kana: おしおき
    jp_kanji: おしおき
    en: Punishment
    fr: Punition
    it: Punizione
    de: Strafattacke
    es: Castigo
    ko: 혼내기
    zh_simp: 惩罚
    zh_trad: 懲罰
  descriptions:
    jp_kana: "のうりょく　へんかで\nあいてが　パワーアップ　しているほど\nわざの　いりょくが　あがる。"
    jp_kanji: "能力変化で\n相手が　パワーアップ　しているほど\n技の　威力が　あがる。"
    en: "The more the target has powered up with stat\nchanges, the greater the move’s power."
    fr: "Plus l’ennemi a utilisé d’augmentations de stats\net plus cette capacité est puissante."
    it: "Questa mossa diventa più potente ogni volta che\nil bersaglio aumenta le proprie statistiche."
    de: "Je stärker das Ziel durch Statusveränderungen ist,\ndesto stärker wirkt diese Attacke."
    es: "La fuerza del ataque aumenta cuanto más se\nha fortalecido el objetivo con cambios de\ncaracterísticas."
    ko: "능력 변화로\n상대가 파워업한 만큼\n기술의 위력이 올라간다."
    zh_simp: "根据能力变化，\n对手提高的力量越大，\n招式的威力越大。"
    zh_trad: "對手的能力因為\n能力變化而提高得越多，\n招式的威力就越大。"
purify:
  names:
    jp_kana: じょうか
    jp_kanji: じょうか
    en: Purify
    fr: Purification
    it: Purificazione
    de: Läuterung
    es: Purificación
    ko: 정화
    zh_simp: 净化
    zh_trad: 淨化
  descriptions:
    jp_kana: "あいての　じょうたいいじょうを　なおす。\nなおすと　じぶんは　ＨＰを\nかいふく　することが　できる。"
    jp_kanji: "相手の　状態異常を　治す。\n治すと　自分は　ＨＰを\n回復　することが　できる。"
    en: "The user heals the target’s status condition. If the\nmove succeeds, it also restores the user’s own HP."
    fr: "Le lanceur soigne les altérations de statut de la cible,\nce qui lui permet de regagner des PV."
    it: "Chi la usa cura i problemi di stato del bersaglio\ne in cambio recupera PS."
    de: "Der Anwender heilt das Statusproblem des Zieles\nund füllt dadurch seine eigenen KP auf."
    es: "Cura los problemas de estado del Pokémon rival y\na cambio recupera PS propios."
    ko: "상대의 상태 이상을 회복한다.\n회복하면 자신은 HP를\n회복할 수 있다."
    zh_simp: "治愈对手的异常状态。\n治愈后可以回复自己的ＨＰ。"
    zh_trad: "治癒對手的異常狀態。\n治癒後可以回復自己的ＨＰ。"
pursuit:
  names:
    jp_kana: おいうち
    jp_kanji: おいうち
    en: Pursuit
    fr: Poursuite
    it: Inseguimento
    de: Verfolgung
    es: Persecución
    ko: 따라가때리기
    zh_simp: 追打
    zh_trad: 追打
  descriptions:
    jp_kana: "あいて　ポケモンが　いれかわる　ときに\nわざを　だしていると\nばいの　いりょくで　こうげき　できる。"
    jp_kanji: "相手　ポケモンが　入れ替わるときに\n技を　だしていると\n倍の　威力で　攻撃できる。"
    en: "The power of this attack move is doubled if it’s used\non a target that’s switching out of battle."
    fr: "Une attaque qui inflige deux fois plus de dégâts à\nun ennemi qui s’apprête à être remplacé."
    it: "Una mossa d’attacco che infligge un danno doppio\nse il bersaglio è in fase di sostituzione."
    de: "Die Attacke richtet beim Ziel doppelten Schaden an,\nfalls es ausgetauscht wird."
    es: Hace el doble de daño al objetivo que pide el relevo.
    ko: "상대 포켓몬이 교체될 때\n기술을 쓰면 2배의 위력으로\n공격할 수 있다."
    zh_simp: "当对手替换宝可梦上场时\n使出此招式的话，\n能够以２倍的威力进行攻击。"
    zh_trad: "在對手替換寶可夢時\n使用此招式的話，\n便能以２倍的威力進行攻擊。"
quash:
  names:
    jp_kana: さきおくり
    jp_kanji: さきおくり
    en: Quash
    fr: À la Queue
    it: Spintone
    de: Verzögerung
    es: Último Lugar
    ko: 순서미루기
    zh_simp: 延后
    zh_trad: 延後
  descriptions:
    jp_kana: "あいてを　おさえつけて\nこうどうの　じゅんばんを\nさいごに　する。"
    jp_kanji: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    en: "The user suppresses the target and makes its move\ngo last."
    fr: "Retient la cible de force, l’obligeant à agir\nen dernier."
    it: "Chi la usa spinge via il bersaglio, costringendolo\nad agire per ultimo."
    de: "Anwender stemmt sich gegen das Ziel und bewirkt,\ndass dieses erst als Letztes angreift."
    es: Consigue que el objetivo sea el último en moverse.
    ko: "상대를 억눌러서\n행동의 순서를\n마지막으로 만든다."
    zh_simp: "压制对手，\n从而将其行动顺序放到最后。"
    zh_trad: "壓制對手，讓對手在\n回合的最後才能行動。"
quick_attack:
  names:
    jp_kana: でんこうせっか
    jp_kanji: でんこうせっか
    en: Quick Attack
    fr: Vive-Attaque
    it: Attacco Rapido
    de: Ruckzuckhieb
    es: Ataque Rápido
    ko: 전광석화
    zh_simp: 电光一闪
    zh_trad: 電光一閃
  descriptions:
    jp_kana: "めにも　とまらぬ　ものすごい　はやさで\nあいてに　つっこむ。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　つっこむ。\n必ず　先制攻撃　できる。"
    en: "The user lunges at the target at a speed that makes\nit almost invisible. This move always goes first."
    fr: "Le lanceur fonce sur l’ennemi si rapidement qu’on\nparvient à peine à le discerner. Frappe en priorité."
    it: "Chi la usa colpisce a una tale velocità da rendersi\nquasi invisibile. Questa mossa ha priorità alta."
    de: Sehr schneller Angriff mit hoher Erstschlagquote.
    es: "Ataca al objetivo a gran velocidad. Este movimiento\ntiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n반드시 선제공격할 수 있다."
    zh_simp: "以迅雷不及掩耳之势扑向对手。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n撲向對手。\n必定能夠發動先制攻擊。"
quick_guard:
  names:
    jp_kana: ファストガード
    jp_kanji: ファストガード
    en: Quick Guard
    fr: Prévention
    it: Anticipo
    de: Rapidschutz
    es: Anticipo
    ko: 퍼스트가드
    zh_simp: 快速防守
    zh_trad: 快速防守
  descriptions:
    jp_kana: "じぶんと　みかたを　あいての\nせんせい　こうげきから　まもる。"
    jp_kanji: "自分と　味方を　相手の\n先制攻撃から　守る。"
    en: "The user protects itself and its allies from\npriority moves."
    fr: "Le lanceur et son équipe sont protégés contre\nles attaques prioritaires."
    it: "Chi la usa protegge sé e gli alleati dalle mosse\nad alta priorità."
    de: "Schützt Anwender und Mitstreiter vor\nErstschlag-Attacken."
    es: "Protege a todo el equipo de los movimientos que \nse adelantan y atacan primero."
    ko: "자신과 같은 편을 상대의\n선제공격으로부터 지킨다."
    zh_simp: "守护自己和同伴，\n以防对手的先制攻击。"
    zh_trad: "保護自己和同伴，\n防禦來自對手的先制攻擊。"
quiver_dance:
  names:
    jp_kana: ちょうのまい
    jp_kanji: ちょうのまい
    en: Quiver Dance
    fr: Papillodanse
    it: Eledanza
    de: Falterreigen
    es: Danza Aleteo
    ko: 나비춤
    zh_simp: 蝶舞
    zh_trad: 蝶舞
  descriptions:
    jp_kana: "しんぴてきで　うつくしい　まいを\nかろやかに　おどる。　じぶんの　とくこうと\nとくぼうと　すばやさを　あげる。"
    jp_kanji: "神秘的で　美しい　舞を\n軽やかに　おどる。　自分の　特攻と\n特防と　素早さを　あげる。"
    en: "The user lightly performs a beautiful, mystic dance.\nThis boosts the user’s Sp. Atk, Sp. Def, and\nSpeed stats."
    fr: "Une danse mystique dont le rythme parfait\naugmente l’Attaque Spéciale, la Défense Spéciale\net la Vitesse du lanceur."
    it: "Danza leggiadra ed elegante che aumenta\nl’Attacco Speciale, la Difesa Speciale e la Velocità\ndi chi la usa."
    de: "Anwender legt behände einen mystischen,\nformvollendeten Tanz aufs Parkett. Spezial-Angriff,\nSpezial-Verteidigung und Initiative steigen."
    es: "Danza mística que sube el Ataque Especial, la \nDefensa Especial y la Velocidad."
    ko: "신비롭고 아름다운 춤을\n경쾌하게 춘다. 자신의 특수공격과\n특수방어와 스피드를 올린다."
    zh_simp: "轻巧地跳起神秘而又美丽的舞蹈。\n提高自己的特攻、特防和速度。"
    zh_trad: "輕巧地跳起神秘又美麗的舞蹈。\n提高自己的特攻、特防和速度。"
rage:
  names:
    jp_kana: いかり
    jp_kanji: いかり
    en: Rage
    fr: Frénésie
    it: Ira
    de: Raserei
    es: Furia
    ko: 분노
    zh_simp: 愤怒
    zh_trad: 憤怒
  descriptions:
    jp_kana: "わざを　だしたときに　こうげきを\nうけると　いかりの　ちからで\nこうげきが　あがる。"
    jp_kanji: "技を　だしたときに　攻撃を\n受けると　怒りの　力で\n攻撃が　あがる。"
    en: "As long as this move is in use, the power of rage\nraises the Attack stat each time the user is hit\nin battle."
    fr: "Une fois activée, cette capacité augmente\nl’Attaque du lanceur à mesure que celui-ci subit\ndes attaques."
    it: "Questa mossa ha il potere di aumentare\nla statistica Attacco ogni volta che chi la usa\nviene colpito durante una lotta."
    de: "Erhöht Angriff des Anwenders, wenn dieser\ngetroffen wird, solange die Attacke aktiviert ist."
    es: "Al usarse, aumenta el Ataque del usuario cada vez\nque es golpeado."
    ko: "기술을 썼을 때 공격을\n받으면 분노의 힘으로\n공격이 올라간다."
    zh_simp: "如果在使出招式后\n受到攻击的话，\n会因愤怒的力量而提高攻击。"
    zh_trad: "在使用招式後受到攻擊時，\n會因憤怒的力量而\n提高自己的攻擊。"
rage_powder:
  names:
    jp_kana: いかりのこな
    jp_kanji: いかりのこな
    en: Rage Powder
    fr: Poudre Fureur
    it: Polverabbia
    de: Wutpulver
    es: Polvo Ira
    ko: 분노가루
    zh_simp: 愤怒粉
    zh_trad: 憤怒粉
  descriptions:
    jp_kana: "イライラさせる　こなを　じぶんに\nふりかけて　ちゅういを　ひく。　あいての\nこうげきを　すべて　じぶんに　むける。"
    jp_kanji: "イライラさせる　粉を　自分に\nふりかけて　注意を　ひく。　相手の\n攻撃を　すべて　自分に　むける。"
    en: "The user scatters a cloud of irritating powder to\ndraw attention to itself. Opponents aim only at\nthe user."
    fr: "Le lanceur s’asperge d’une poudre irritante pour\nattirer l’attention. Il attire toutes les attaques\nennemies."
    it: "Chi la usa attira l’attenzione dei nemici\ncospargendosi di una polvere irritante\ne diventando bersaglio di tutti gli attacchi."
    de: "Anwender zieht gegnerische Aufmerksamkeit und\nAngriffe auf sich, indem er ein Wut erzeugendes\nPulver über sich streut."
    es: "Usa un polvo que irrita y centra en el usuario la \natención y los ataques de los rivales."
    ko: "안절부절못하게 하는 가루를\n자신에게 뿌려서 주의를 끈다.\n상대의 공격은 모두 자신에게 향한다."
    zh_simp: "将令人烦躁的粉末撒在自己身上，\n用以吸引对手的注意。\n使对手的攻击全部指向自己。"
    zh_trad: "將令人煩躁的粉末撒在自己身上，\n吸引對手的注意。進而將對手的攻擊\n全部轉移到自己身上。"
rain_dance:
  names:
    jp_kana: あまごい
    jp_kanji: あまごい
    en: Rain Dance
    fr: Danse Pluie
    it: Pioggiadanza
    de: Regentanz
    es: Danza Lluvia
    ko: 비바라기
    zh_simp: 求雨
    zh_trad: 求雨
  descriptions:
    jp_kana: "５ターンの　あいだ　あめを　ふらせて\nみずタイプの　いりょくを　あげる。\nほのおタイプの　いりょくは　さがる。"
    jp_kanji: "５ターンの　間　雨を　降らせて\nみずタイプの　威力を　あげる。\nほのおタイプの　威力は　さがる。"
    en: "The user summons a heavy rain that falls for five\nturns, powering up Water-type moves. It lowers\nthe power of Fire-type moves."
    fr: "Invoque de fortes pluies qui durent cinq tours,\naugmentant la puissance des capacités de type\nEau et baissant celle des capacités de type Feu."
    it: "Chi la usa provoca una forte pioggia per cinque\nturni, potenziando le mosse di tipo Acqua e\nriducendo la potenza di quelle di tipo Fuoco."
    de: "Anwender erzeugt starken Regen. Die Stärke von\nWasser-Attacken erhöht sich fünf Runden lang,\nwährend die Stärke von Feuer-Attacken sinkt."
    es: "Genera una fuerte lluvia que refuerza los\nmovimientos de tipo Agua durante cinco turnos\ny debilita los de tipo Fuego."
    ko: "5턴 동안 비를 내리게 하여\n물타입 기술의 위력을 올린다.\n불꽃타입의 위력은 떨어진다."
    zh_simp: "在５回合内一直降雨，\n从而提高水属性的招式威力。\n火属性的招式威力则降低。"
    zh_trad: "降下大雨，在５回合內\n提高水屬性招式的威力。\n火屬性招式的威力會降低。"
rapid_spin:
  names:
    jp_kana: こうそくスピン
    jp_kanji: こうそくスピン
    en: Rapid Spin
    fr: Tour Rapide
    it: Rapigiro
    de: Turbodreher
    es: Giro Rápido
    ko: 고속스핀
    zh_simp: 高速旋转
    zh_trad: 高速旋轉
  descriptions:
    jp_kana: "かいてんして　あいてを　こうげきする。\nしめつける　まきつく　やどりぎのタネ\nまきびし　なども　ふきとばせる。"
    jp_kanji: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ\nまきびし　なども　吹きとばせる。"
    en: "A spin attack that can also eliminate such moves as\nBind, Wrap, Leech Seed, and Spikes."
    fr: "Une attaque tournoyante pouvant aussi annuler\npar exemple Étreinte, Ligotage, Vampigraine ou\nPicots."
    it: "Attacco rotante che elimina gli effetti di\nmosse come Legatutto, Avvolgibotta, Punte\ne Parassiseme."
    de: "Trifft das Ziel mit einer Dreh-Attacke. Befreit den\nAnwender unter anderem von Wickel, Klammergriff,\nEgelsamen und Stachler."
    es: "Ataque giratorio que puede eliminar movimientos \ncomo Atadura, Constricción, Drenadoras y Púas."
    ko: "회전해서 상대를 공격한다.\n조이기, 김밥말이, 씨뿌리기,\n압정뿌리기 등도 날려버린다."
    zh_simp: "通过旋转来攻击对手。\n还可以摆脱绑紧、紧束、\n寄生种子和撒菱等招式。"
    zh_trad: "利用旋轉來攻擊對手。\n也可以擺脫綁緊、緊束，\n以及解除寄生種子和撒菱等招式。"
razor_leaf:
  names:
    jp_kana: はっぱカッター
    jp_kanji: はっぱカッター
    en: Razor Leaf
    fr: Tranch’Herbe
    it: Foglielama
    de: Rasierblatt
    es: Hoja Afilada
    ko: 잎날가르기
    zh_simp: 飞叶快刀
    zh_trad: 飛葉快刀
  descriptions:
    jp_kana: "はっぱを　とばして\nあいてを　きりつけて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "はっぱを　とばして\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "Sharp-edged leaves are launched to slash at the\nopposing Pokémon. Critical hits land more easily."
    fr: "Des feuilles aiguisées comme des rasoirs entaillent\nl’ennemi. Taux de critique élevé."
    it: "Foglie taglienti sferzano i nemici intorno.\nProbabile brutto colpo."
    de: Trifft das Ziel mit Blättern. Hohe Volltrefferquote.
    es: Corta con hojas afiladas. Suele ser crítico.
    ko: "잎사귀를 날려\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "飞出叶片，\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "飛射葉子，\n切斬對手進行攻擊。\n容易擊中要害。"
razor_shell:
  names:
    jp_kana: シェルブレード
    jp_kanji: シェルブレード
    en: Razor Shell
    fr: Coquilame
    it: Conchilama
    de: Kalkklinge
    es: Concha Filo
    ko: 셸블레이드
    zh_simp: 贝壳刃
    zh_trad: 貝殼刃
  descriptions:
    jp_kana: "するどい　かいがらで　きりつけて\nこうげきする。　あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "鋭い　貝殻で　切りつけて\n攻撃する。　相手の　防御を\nさげることが　ある。"
    en: "The user cuts its target with sharp shells. This may\nalso lower the target’s Defense stat."
    fr: "Un coquillage aiguisé lacère l’ennemi.\nPeut aussi baisser sa Défense."
    it: "Chi la usa colpisce il bersaglio con il suo guscio\naffilato. Il colpo può anche ridurre la Difesa\ndel bersaglio."
    de: "Schneideangriff mit einer scharfen Muschelschale.\nSenkt eventuell die Verteidigung des Zieles."
    es: "Una afilada vieira ataca al objetivo. También puede \nhacer disminuir su Defensa."
    ko: "날카로운 조개껍질로 베어\n공격한다. 상대의 방어를\n떨어뜨릴 때가 있다."
    zh_simp: "用锋利的贝壳切斩\n对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用鋒利的貝殼斬切\n對手進行攻擊。\n有時會降低對手的防禦。"
razor_wind:
  names:
    jp_kana: かまいたち
    jp_kanji: かまいたち
    en: Razor Wind
    fr: Coupe-Vent
    it: Ventagliente
    de: Klingensturm
    es: Viento Cortante
    ko: 칼바람
    zh_simp: 旋风刀
    zh_trad: 旋風刀
  descriptions:
    jp_kana: "かぜの　やいばを　つくり\n２ターンめに　あいてを　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "風の　刃を　つくり\n２ターン目に　相手を　攻撃する。\n急所に　当たりやすい。"
    en: "In this two-turn attack, blades of wind hit opposing\nPokémon on the second turn. Critical hits land\nmore easily."
    fr: "Attaque en deux tours.\nDes lames de vent frappent l’ennemi au second\ntour. Taux de critique élevé."
    it: "Chi la usa genera un turbine al primo turno\ne attacca al secondo. Probabile brutto colpo."
    de: "Eine Attacke, die über zwei Runden geht.\nHohe Volltrefferquote."
    es: "Primero se prepara y en el segundo turno\nataca al oponente con ráfagas de viento\ncortante. Alta probabilidad de ser crítico."
    ko: "바람의 칼날을 만들어\n2턴째에 상대를 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "制造风之刃，\n于第２回合攻击对手。\n容易击中要害。"
    zh_trad: "製造出風之刃，\n在下一回合攻擊對手。\n容易擊中要害。"
recover:
  names:
    jp_kana: じこさいせい
    jp_kanji: じこさいせい
    en: Recover
    fr: Soin
    it: Ripresa
    de: Genesung
    es: Recuperación
    ko: HP회복
    zh_simp: 自我再生
    zh_trad: 自我再生
  descriptions:
    jp_kana: "さいぼうを　さいせい　させて\nじぶんの　さいだい　ＨＰの\nはんぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "細胞を　再生させて\n自分の　最大ＨＰの\n半分の　ＨＰを　回復する。"
    en: "Restoring its own cells, the user restores its own HP\nby half of its max HP."
    fr: "Un soin qui permet au lanceur de récupérer\njusqu’à la moitié de ses PV max."
    it: "Mossa autocurativa. Chi la usa recupera metà\ndei PS massimi."
    de: "Eine Selbstheilung. KP des Anwenders werden um\n50 % des maximalen Wertes aufgefüllt."
    es: Restaura hasta la mitad de los PS máximos.
    ko: "세포를 재생시켜\n자신의 최대 HP의\n절반만큼 HP를 회복한다."
    zh_simp: "让细胞再生，\n从而回复自己\n最大ＨＰ的一半。"
    zh_trad: "讓細胞再生，\n回復自己最大ＨＰ的一半。"
recycle:
  names:
    jp_kana: リサイクル
    jp_kanji: リサイクル
    en: Recycle
    fr: Recyclage
    it: Riciclo
    de: Aufbereitung
    es: Reciclaje
    ko: 리사이클
    zh_simp: 回收利用
    zh_trad: 回收利用
  descriptions:
    jp_kana: "せんとうちゅうに　つかって　なくなった\nじぶんの　もちものを　さいせい　させて\nつかえるように　する。"
    jp_kanji: "戦闘中に　使って　なくなった\n自分の　持ち物を　再生させて\n使えるように　する。"
    en: "The user recycles a held item that has been used in\nbattle so it can be used again."
    fr: "Recycle un objet tenu à usage unique déjà utilisé\nlors du combat pour pouvoir l’utiliser à nouveau."
    it: "Chi la usa ricicla uno strumento che ha usato\nnella lotta e può riutilizzarlo."
    de: "Recycling eines getragenen Items, das zuvor im\nKampf verwendet wurde."
    es: "Recicla y así recupera un objeto equipado de un \nsolo uso que ya haya sido empleado durante el \ncombate."
    ko: "배틀 중에 사용하여 없어진\n자신의 지닌 물건을 재생시켜\n사용할 수 있게 한다."
    zh_simp: "使战斗中已经消耗掉的\n自己的持有物再生，\n并可以再次使用。"
    zh_trad: "將在戰鬥中已消耗完的\n寶可夢持有物回收後，\n回復成可以使用的狀態。"
reflect:
  names:
    jp_kana: リフレクター
    jp_kanji: リフレクター
    en: Reflect
    fr: Protection
    it: Riflesso
    de: Reflektor
    es: Reflejo
    ko: 리플렉터
    zh_simp: 反射壁
    zh_trad: 反射壁
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつり　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom physical attacks for five turns."
    fr: "Un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités physiques durant\ncinq tours."
    it: "Innalza una barriera di luce fantastica che riduce\ni danni degli attacchi fisici per sé e gli alleati\nper cinque turni."
    de: "Eine mysteriöse Wand, die fünf Runden den Schaden\nvon physischen gegnerischen Treffern reduziert."
    es: "Pared de luz que reduce durante cinco turnos el \ndaño producido por los ataques físicos."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 물리공격의\n데미지를 약하게 한다."
    zh_simp: "在５回合内使用神奇的墙，\n减弱从对手那受到的\n物理攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的物理攻擊傷害。"
reflect_type:
  names:
    jp_kana: ミラータイプ
    jp_kanji: ミラータイプ
    en: Reflect Type
    fr: Copie Type
    it: Riflettipo
    de: Typenspiegel
    es: Clonatipo
    ko: 미러타입
    zh_simp: 镜面属性
    zh_trad: 鏡面屬性
  descriptions:
    jp_kana: "あいての　タイプを　はんしゃして\nじぶんも　おなじ　タイプに　なる。"
    jp_kanji: "相手の　タイプを　反射して\n自分も　同じ　タイプに　なる。"
    en: "The user reflects the target’s type, making it the\nsame type as the target."
    fr: "Le lanceur copie le type de la cible et devient du\nmême type."
    it: "Chi la usa cambia il proprio tipo in quello\ndel bersaglio."
    de: "Anwender ahmt das Ziel nach und nimmt dabei\ndessen Typ an."
    es: "Cambia el tipo del Pokémon al mismo tipo que el \ndel objetivo."
    ko: "상대의 타입을 반사해서\n자신도 똑같은 타입이 된다."
    zh_simp: "反射对手的属性，\n让自己也变成一样的属性。"
    zh_trad: "在自己身上反映出對手的屬性，\n讓自己也變成相同的屬性。"
refresh:
  names:
    jp_kana: リフレッシュ
    jp_kanji: リフレッシュ
    en: Refresh
    fr: Régénération
    it: Rinfrescata
    de: Heilung
    es: Alivio
    ko: 리프레쉬
    zh_simp: 焕然一新
    zh_trad: 煥然一新
  descriptions:
    jp_kana: "からだを　やすめて　じぶんが　おっている\nどく　まひ　やけどの\nじょうたい　いじょうを　なおす。"
    jp_kanji: "体を　やすめて　自分が　おっている\n毒　まひ　やけどの\n状態異常を　治す。"
    en: "The user rests to cure itself of poisoning, a burn,\nor paralysis."
    fr: "Le lanceur se repose pour guérir d’un\nempoisonnement, d’une brûlure ou d’une\nparalysie."
    it: "Chi la usa riposa per guarire da avvelenamento,\nparalisi e scottatura."
    de: "Selbstheilung bei Vergiftung, Paralyse und\nVerbrennung."
    es: "Descansa para curar parálisis, envenenamiento o \nquemaduras."
    ko: "몸을 쉬게 하여 자신이 입은\n독, 마비, 화상의\n상태 이상을 치료한다."
    zh_simp: "让身体休息，\n治愈自己身上所中的\n毒、麻痹、灼伤的异常状态。"
    zh_trad: "讓身體休息，\n治癒自己身上的\n中毒、麻痺、灼傷的異常狀態。"
relic_song:
  names:
    jp_kana: いにしえのうた
    jp_kanji: いにしえのうた
    en: Relic Song
    fr: Chant Antique
    it: Cantoantico
    de: Urgesang
    es: Canto Arcaico
    ko: 옛노래
    zh_simp: 古老之歌
    zh_trad: 古老之歌
  descriptions:
    jp_kana: "いにしえのうたを　あいてに　きかせて\nこころに　うったえて　こうげきする。\nねむり　じょうたいに　することが　ある。"
    jp_kanji: "いにしえのうたを　相手に　聞かせて\n心に　うったえて　攻撃する。\n眠り状態に　することが　ある。"
    en: "The user sings an ancient song and attacks by\nappealing to the hearts of the listening opposing\nPokémon. This may also induce sleep."
    fr: "Le lanceur attaque l’ennemi en lui chantant une\nchanson d’un autre temps. Peut l’endormir."
    it: "Chi la usa attacca i nemici intorno a sé\nintonando un’antica melodia che colpisce\nil loro spirito. Può anche farli addormentare."
    de: "Anwender greift mit Urgesang an, der Ziele in der\nNähe im tiefsten Inneren anspricht. Diese schlafen\neventuell ein."
    es: "Ataca conmoviendo a los rivales de alrededor con \nun antiguo canto. Puede dormirlos."
    ko: "옛 노래를 상대에게 들려주고\n마음에 호소하여 공격한다.\n잠듦 상태로 만들 때가 있다."
    zh_simp: "让对手听古老之歌，\n打动对手的内心进行攻击。\n有时会让对手陷入睡眠状态。"
    zh_trad: "唱出古老之歌，\n打動對手的心進行攻擊。\n有時會讓對手陷入睡眠狀態。"
rest:
  names:
    jp_kana: ねむる
    jp_kanji: ねむる
    en: Rest
    fr: Repos
    it: Riposo
    de: Erholung
    es: Descanso
    ko: 잠자기
    zh_simp: 睡觉
    zh_trad: 睡覺
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむり　つづける。\nじぶんの　ＨＰと　じょうたいいじょうを\nすべて　かいふく　する。"
    jp_kanji: "２ターンの　間　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two turns. This fully\nrestores the user’s HP and heals any\nstatus conditions."
    fr: "Le lanceur regagne tous ses PV et soigne ses\nproblèmes de statut, puis il dort pendant deux\ntours."
    it: "Chi la usa recupera tutti i PS e guarisce da tutti\ni suoi problemi di stato, ma dorme per due turni."
    de: "Anwender wird vollkommen geheilt, von allen\nStatusproblemen befreit und schläft die folgenden\nzwei Runden."
    es: "Restaura todos los PS y cura todos los problemas de \nestado del usuario. Duerme los dos próximos turnos."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
    zh_simp: "连续睡上２回合。\n回复自己的全部ＨＰ\n以及治愈所有异常状态。"
    zh_trad: "連續睡２回合。\n回復自己的全部ＨＰ\n以及治癒所有異常狀態。"
retaliate:
  names:
    jp_kana: かたきうち
    jp_kanji: かたきうち
    en: Retaliate
    fr: Vengeance
    it: Nemesi
    de: Heimzahlung
    es: Represalia
    ko: 원수갚기
    zh_simp: 报仇
    zh_trad: 報仇
  descriptions:
    jp_kana: "たおれた　みかたの　かたきを　うつ。\nまえの　ターンに　みかたが　たおされて\nいると　いりょくが　あがる。"
    jp_kanji: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    en: "The user gets revenge for a fainted ally. If an ally\nfainted in the previous turn, this move’s power\nis increased."
    fr: "Venge un Pokémon de l’équipe mis K.O.\nSi un Pokémon de l’équipe a été mis K.O. au tour\nd’avant, l’effet augmente."
    it: "Vendica un alleato messo KO. Se ciò è\naccaduto al turno precedente, il danno è\nmaggiore."
    de: "Anwender nimmt Rache für einen besiegten\nMitstreiter. Wurde in der vorigen Runde ein\nMitstreiter besiegt, steigt die Stärke."
    es: "Venga a los amigos derrotados. Si en el turno\nanterior han derrotado a uno, la potencia del\nataque aumentará."
    ko: "쓰러진 같은 편의 원수를 갚는다.\n앞 턴에서 같은 편이\n쓰러졌다면 위력이 올라간다."
    zh_simp: "为倒下的同伴报仇。\n如果上一回合有同伴倒下，\n威力就会提高。"
    zh_trad: "為倒下的同伴報仇。\n前一回合有同伴被打倒時，\n招式的威力會提高。"
return:
  names:
    jp_kana: おんがえし
    jp_kanji: おんがえし
    en: Return
    fr: Retour
    it: Ritorno
    de: Rückkehr
    es: Retribución
    ko: 은혜갚기
    zh_simp: 报恩
    zh_trad: 報恩
  descriptions:
    jp_kana: "トレーナーの　ために　ぜんりょくで\nあいてを　こうげきする。\nなついて　いるほど　いりょくは　あがる。"
    jp_kanji: "トレーナーの　ために　全力で\n相手を　攻撃する。\nなついているほど　威力は　あがる。"
    en: "This full-power attack grows more powerful the\nmore the user likes its Trainer."
    fr: "Plus le Pokémon apprécie son Dresseur, plus\nla puissance de cette attaque furieuse augmente."
    it: "Mossa che diventa tanto più potente quanto\nmaggiore è il grado di affezione del Pokémon\nper il proprio Allenatore."
    de: "Die Attacke wird stärker, je mehr der Anwender\nseinen Trainer mag."
    es: "Cuanto mayor sea la amistad con el Entrenador, más \npoderoso será este ataque."
    ko: "트레이너를 위해 전력으로\n상대를 공격한다.\n친밀할수록 위력이 올라간다."
    zh_simp: "为了训练家而\n全力攻击对手。\n亲密度越高，威力越大。"
    zh_trad: "為了訓練家而\n全力攻擊對手。\n親密度越高，威力越大。"
revelation_dance:
  names:
    jp_kana: めざめるダンス
    jp_kanji: めざめるダンス
    en: Revelation Dance
    fr: Danse Éveil
    it: Mutadanza
    de: Wecktanz
    es: Danza Despertar
    ko: 잠재댄스
    zh_simp: 觉醒之舞
    zh_trad: 覺醒之舞
  descriptions:
    jp_kana: "ぜんりょくで　おどって　こうげきする。\nこの　わざの　タイプは\nじぶんの　タイプと　おなじに　なる。"
    jp_kanji: "全力で　踊って　攻撃する。\nこの　技の　タイプは\n自分の　タイプと　同じになる。"
    en: "The user attacks the target by dancing very hard.\nThe user’s type determines the type of this move."
    fr: "Le lanceur attaque en dansant avec enthousiasme.\nLe type de la capacité est le même que celui\ndu lanceur."
    it: "Chi la usa si lancia in una danza e attacca il nemico\ncon tutte le sue forze. Il tipo della mossa corrisponde\nal tipo del Pokémon che la usa."
    de: "Der Anwender tanzt und greift dabei das Ziel mit\nvoller Kraft an. Die Attacke hat denselben Typ wie\ndas Pokémon, das sie einsetzt."
    es: "Ataque que consiste en un baile muy enérgico. El tipo\nde este ataque se corresponde con el del Pokémon\nque lo ejecuta."
    ko: "전력으로 춤추며 공격한다.\n이 기술의 타입은\n자신의 타입과 같아진다."
    zh_simp: "全力跳舞进行攻击。\n此招式的属性将\n变得和自己的属性相同。"
    zh_trad: "全力跳舞進行攻擊。\n此招式的屬性將\n變得和自己的屬性相同。"
revenge:
  names:
    jp_kana: リベンジ
    jp_kanji: リベンジ
    en: Revenge
    fr: Vendetta
    it: Vendetta
    de: Vergeltung
    es: Desquite
    ko: 리벤지
    zh_simp: 报复
    zh_trad: 報復
  descriptions:
    jp_kana: "あいてから　わざを　うけていると\nその　あいてに　たいして\nあたえる　ダメージが　２ばいに　なる。"
    jp_kanji: "相手から　技を　受けていると\nその相手に　対して\n与える　ダメージが　２倍に　なる。"
    en: "This attack move’s power is doubled if the user has\nbeen hurt by the opponent in the same turn."
    fr: "Une attaque deux fois plus puissante si le lanceur\na été blessé par l’ennemi durant ce tour."
    it: "Mossa d’attacco che infligge un danno doppio\nse si è stati colpiti dal Pokémon bersaglio nello\nstesso turno."
    de: "Schaden verdoppelt sich, wenn der Anwender in der\nRunde bereits Schaden durch das Ziel erlitten hat."
    es: "Ataque que produce el doble de daño si el usuario \nes herido en el mismo turno."
    ko: "상대에게 기술을 받으면\n그 상대에게 주는 데미지가\n2배가 된다."
    zh_simp: "如果受到对手的招式攻击，\n就能给予对手２倍的伤害。"
    zh_trad: "如果受到對手的招式攻擊，\n給予該對手的傷害就會變成２倍。"
reversal:
  names:
    jp_kana: きしかいせい
    jp_kanji: きしかいせい
    en: Reversal
    fr: Contre
    it: Contropiede
    de: Gegenschlag
    es: Inversión
    ko: 기사회생
    zh_simp: 起死回生
    zh_trad: 起死回生
  descriptions:
    jp_kana: "ちからを　ふりしぼり　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　あがる。"
    jp_kanji: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "An all-out attack that becomes more powerful the\nless HP the user has."
    fr: "Le lanceur ne retient plus ses coups.\nPlus ses PV sont bas et plus l’attaque est puissante."
    it: "Chi la usa attacca con tutte le sue forze.\nPiù i PS sono bassi, maggiore è la potenza\ndi questa mossa."
    de: "Richtet mehr Schaden an, wenn eigene KP\nniedrig sind."
    es: "Ataque desesperado que causa más daño cuantos \nmenos PS tenga el usuario."
    ko: "힘을 쥐어짜서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "竭尽全力进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "竭盡全力進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
roar:
  names:
    jp_kana: ほえる
    jp_kanji: ほえる
    en: Roar
    fr: Hurlement
    it: Boato
    de: Brüller
    es: Rugido
    ko: 울부짖기
    zh_simp: 吼叫
    zh_trad: 吼叫
  descriptions:
    jp_kana: "あいてを　にがして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Effraie le Pokémon ennemi et le remplace par\nun autre. Lors d’un combat contre un Pokémon\nsauvage seul, met fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nMette fine alle lotte contro singoli Pokémon\nselvatici."
    de: "Verjagt das Ziel und ersetzt es durch ein anderes\nPokémon. Beendet den Kampf in der Wildnis."
    es: "Se lleva al objetivo, que es cambiado por otro \nPokémon. Si es un Pokémon salvaje, acaba el \ncombate."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "放走对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "趕走對手，強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
roar_of_time:
  names:
    jp_kana: ときのほうこう
    jp_kanji: ときのほうこう
    en: Roar of Time
    fr: Hurle-Temps
    it: Fragortempo
    de: Zeitenlärm
    es: Distorsión
    ko: 시간의포효
    zh_simp: 时光咆哮
    zh_trad: 時光咆哮
  descriptions:
    jp_kana: "じかんが　ゆがむほどの　ちからを\nうちだして　あいてを　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "時間が　ゆがむほどの　力を\nうちだして　相手を　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user blasts the target with power that distorts\neven time. The user can’t move on the next turn."
    fr: "Le lanceur frappe si fort qu’il affecte le cours du\ntemps. Il se repose au tour suivant."
    it: "Chi la usa colpisce il bersaglio con una forza\ncapace di alterare il tempo, ma deve stare fermo\nal turno successivo."
    de: "Anwender attackiert mit einer Kraft, die selbst die\nZeit verzerrt. In der nächsten Runde muss er ruhen."
    es: "Ataca al objetivo usando tal energía que el tiempo \nse distorsiona. El usuario descansa el siguiente\nturno."
    ko: "시간이 뒤틀릴 정도의 힘을\n사용해서 상대를 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "释放出扭曲时间般的\n强大力量攻击对手。\n下一回合自己将无法动弹。"
    zh_trad: "釋放出足以扭曲時間的\n強大力量攻擊對手。\n下一回合自己將無法動彈。"
rock_blast:
  names:
    jp_kana: ロックブラスト
    jp_kanji: ロックブラスト
    en: Rock Blast
    fr: Boule Roc
    it: Cadutamassi
    de: Felswurf
    es: Pedrada
    ko: 락블레스트
    zh_simp: 岩石爆击
    zh_trad: 岩石爆擊
  descriptions:
    jp_kana: "かたい　がんせきを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "硬い　岩石を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user hurls hard rocks at the target. Two to five\nrocks are launched in a row."
    fr: "Le lanceur projette un rocher sur l’ennemi de\ndeux à cinq fois d’affilée."
    it: "Colpisce il bersaglio con dei massi pesanti lanciati\nin rapida successione. Il numero di massi varia\nda due a cinque."
    de: "Wirft zwei- bis fünfmal in Folge Felsblöcke auf\ndas Ziel."
    es: "Lanza pedruscos al objetivo de dos a cinco veces \nconsecutivas."
    ko: "단단한 암석을\n상대에게 발사하여 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "向对手发射\n坚硬的岩石进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n堅硬的岩石進行攻擊。\n連續攻擊２～５次。"
rock_climb:
  names:
    jp_kana: ロッククライム
    jp_kanji: ロッククライム
    en: Rock Climb
    fr: Escalade
    it: Scalaroccia
    de: Kraxler
    es: Treparrocas
    ko: 락클라임
    zh_simp: 攀岩
    zh_trad: 攀岩
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに\nつっこみ　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "すごい　勢いで　相手に\nつっこみ　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks the target by smashing into it with\nincredible force. This may also confuse the target."
    fr: "Le lanceur se jette violemment sur l’ennemi.\nPeut aussi le rendre confus."
    it: "Chi la usa carica con impeto incredibile.\nIl colpo può confondere il bersaglio."
    de: "Eine stürmische Attacke, die das Ziel eventuell\nverwirrt."
    es: "Ataca con una gran embestida. Puede confundir al \nobjetivo."
    ko: "굉장한 기세로 상대에게\n돌진하여 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用尽全力扑向对手进行攻击。\n有时会使对手混乱。"
    zh_trad: "用盡全力撲向對手進行攻擊。\n有時會使對手混亂。"
rock_polish:
  names:
    jp_kana: ロックカット
    jp_kanji: ロックカット
    en: Rock Polish
    fr: Poliroche
    it: Lucidatura
    de: Steinpolitur
    es: Pulimento
    ko: 록커트
    zh_simp: 岩石打磨
    zh_trad: 岩石打磨
  descriptions:
    jp_kana: "じぶんの　からだを　みがいて　くうきの\nていこうを　すくなくする。すばやさを\nぐーんと　あげることが　できる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag.\nThis can sharply raise the Speed stat."
    fr: "Le lanceur polit son corps pour diminuer\nsa résistance au vent. Augmente beaucoup\nla Vitesse."
    it: "Chi la usa leviga il proprio corpo per ridurne\nl’attrito. Aumenta di molto la Velocità."
    de: "Anwender reduziert so gut wie möglich den\nLuftwiderstand. Erhöht den Initiative-Wert stark."
    es: "Reduce la resistencia puliendo su cuerpo. Aumenta \nla Velocidad considerablemente."
    ko: "자신의 몸을 갈아 공기의\n저항을 적게 한다. 스피드를\n크게 올릴 수 있다."
    zh_simp: "打磨自己的身体，\n减少空气阻力。\n可以大幅提高自己的速度。"
    zh_trad: "打磨自己的身體，\n減少空氣阻力。\n可大幅提高自己的速度。"
rock_slide:
  names:
    jp_kana: いわなだれ
    jp_kanji: いわなだれ
    en: Rock Slide
    fr: Éboulement
    it: Frana
    de: Steinhagel
    es: Avalancha
    ko: 스톤샤워
    zh_simp: 岩崩
    zh_trad: 岩崩
  descriptions:
    jp_kana: "おおきな　いわを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at the opposing Pokémon\nto inflict damage. This may also make the opposing\nPokémon flinch."
    fr: "Envoie de gros rochers sur l’ennemi pour infliger\ndes dégâts. Peut aussi l’apeurer."
    it: "I nemici vengono colpiti con violenza da grandi\nmassi che possono anche farli tentennare."
    de: "Schleudert riesige Felsen auf Ziele in der Umgebung,\ndie eventuell zurückschrecken."
    es: "Lanza grandes pedruscos. Puede hacer retroceder a \nlos rivales."
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。\n有時會讓對手畏縮。"
rock_smash:
  names:
    jp_kana: いわくだき
    jp_kanji: いわくだき
    en: Rock Smash
    fr: Éclate-Roc
    it: Spaccaroccia
    de: Zertrümmerer
    es: Golpe Roca
    ko: 바위깨기
    zh_simp: 碎岩
    zh_trad: 碎岩
  descriptions:
    jp_kana: "パンチで　こうげき。　あいての\nぼうぎょを　さげる　ことが　ある。"
    jp_kanji: "パンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。"
    en: "The user attacks with a punch. This may also lower\nthe target’s Defense stat."
    fr: "Porte un coup de poing à l’ennemi qui peut baisser\nsa Défense."
    it: "Chi la usa colpisce il bersaglio con un pugno\nche può anche ridurne la Difesa."
    de: "Diese steinbrechende Attacke kann den\nVerteidigungs-Wert des Zieles senken."
    es: "Ataque con los puños. Puede bajar la Defensa del\nobjetivo."
    ko: "펀치로 공격한다. 상대의\n방어를 떨어뜨릴 때가 있다."
    zh_simp: "用拳头进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用拳頭進行攻擊。\n有時會降低對手的防禦。"
rock_throw:
  names:
    jp_kana: いわおとし
    jp_kanji: いわおとし
    en: Rock Throw
    fr: Jet-Pierres
    it: Sassata
    de: Steinwurf
    es: Lanzarrocas
    ko: 돌떨구기
    zh_simp: 落石
    zh_trad: 落石
  descriptions:
    jp_kana: "ちいさな　いわを　もちあげて\nあいてに　なげつけて　こうげきする。"
    jp_kanji: "小さな　岩を　持ちあげて\n相手に　投げつけて　攻撃する。"
    en: "The user picks up and throws a small rock at the\ntarget to attack."
    fr: Le lanceur lâche une pierre sur l’ennemi.
    it: "Chi la usa raccoglie una pietra e la lancia\ncontro il bersaglio."
    de: Das Ziel wird mit einem kleinen Stein beworfen.
    es: Tira una pequeña roca al objetivo.
    ko: "작은 바위를 들어올려\n상대에게 내던져서 공격한다."
    zh_simp: "拿起小岩石，\n投掷对手进行攻击。"
    zh_trad: "舉起小岩石，\n向對手投擲進行攻擊。"
rock_tomb:
  names:
    jp_kana: がんせきふうじ
    jp_kanji: がんせきふうじ
    en: Rock Tomb
    fr: Tomberoche
    it: Rocciotomba
    de: Felsgrab
    es: Tumba Rocas
    ko: 암석봉인
    zh_simp: 岩石封锁
    zh_trad: 岩石封鎖
  descriptions:
    jp_kana: "がんせきを　なげつけて　こうげきする。\nあいての　うごきを　ふうじることで\nすばやさを　さげる。"
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "Boulders are hurled at the target. This also lowers\nthe target’s Speed stat by preventing its movement."
    fr: "Des rochers frappent l’ennemi.\nRéduit aussi sa Vitesse."
    it: "Colpisce il bersaglio con rocce. Inoltre, lo rallenta\nriducendone la Velocità."
    de: "Angriff mit Felsen. Bei Erfolg wird der Initiative-Wert\ndes Zieles gesenkt."
    es: "Tira rocas que detienen al objetivo y bajan su \nVelocidad."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
    zh_simp: "投掷岩石进行攻击。\n封住对手的行动，\n从而降低速度。"
    zh_trad: "投擲岩石進行攻擊。\n封住對手的行動，\n進而降低其速度。"
rock_wrecker:
  names:
    jp_kana: がんせきほう
    jp_kanji: がんせきほう
    en: Rock Wrecker
    fr: Roc-Boulet
    it: Devastomasso
    de: Felswerfer
    es: Romperrocas
    ko: 암석포
    zh_simp: 岩石炮
    zh_trad: 岩石炮
  descriptions:
    jp_kana: "きょだいな　いわを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "巨大な　岩を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user launches a huge boulder at the target to\nattack. The user can’t move on the next turn."
    fr: "Le lanceur attaque en projetant un gros rocher sur\nl’ennemi. Il doit se reposer au tour suivant."
    it: "Chi la usa attacca il bersaglio con un enorme\nmasso, ma si deve riposare al turno successivo."
    de: "Anwender wirft einen riesigen Felsen auf das Ziel.\nIn der nächsten Runde muss der Anwender ruhen."
    es: "Lanza una piedra enorme contra el objetivo, pero \ntiene que descansar el siguiente turno."
    ko: "거대한 바위를\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없게 된다."
    zh_simp: "向对手发射\n巨大的岩石进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n巨大的岩石進行攻擊。\n下一回合自己將無法動彈。"
role_play:
  names:
    jp_kana: なりきり
    jp_kanji: なりきり
    en: Role Play
    fr: Imitation
    it: Giocodiruolo
    de: Rollentausch
    es: Imitación
    ko: 역할
    zh_simp: 扮演
    zh_trad: 扮演
  descriptions:
    jp_kana: "あいてに　なりきって　じぶんも　あいてと\nおなじ　とくせいに　へんかする。"
    jp_kanji: "相手に　なりきって　自分も　相手と\n同じ　特性に　変化する。"
    en: "The user mimics the target completely, copying the\ntarget’s natural Ability."
    fr: Imite la cible et copie son talent.
    it: "Chi la usa mima in tutto il bersaglio, copiandone\nl’abilità."
    de: Ahmt das Ziel nach und kopiert seine Fähigkeit.
    es: Imita al objetivo por completo y copia su habilidad.
    ko: "상대의 역할을 하여 자신도 상대와\n같은 특성으로 변화한다."
    zh_simp: "扮演对手，\n让自己的特性\n变得和对手相同。"
    zh_trad: "扮演成對手，\n讓自己的特性\n也變得和對手相同。"
rolling_kick:
  names:
    jp_kana: まわしげり
    jp_kanji: まわしげり
    en: Rolling Kick
    fr: Mawashi Geri
    it: Calciorullo
    de: Fegekick
    es: Patada Giro
    ko: 돌려차기
    zh_simp: 回旋踢
    zh_trad: 迴旋踢
  descriptions:
    jp_kana: "からだを　すばやく　かいてん　させながら\nけとばして　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体を　素早く　回転させながら\nけとばして　攻撃する。\n相手を　ひるませる　ことが　ある。"
    en: "The user lashes out with a quick, spinning kick.\nThis may also make the target flinch."
    fr: "Le lanceur effectue un coup de pied tournoyant\net extrêmement rapide. Peut apeurer l’ennemi."
    it: "Chi la usa infierisce sul bersaglio con un calcio\nrotante. Può anche farlo tentennare."
    de: "Heftiger Tritt aus einer schnellen Drehbewegung.\nLässt das Ziel eventuell zurückschrecken."
    es: "Da una patada rápida y circular.\nPuede hacer retroceder al objetivo."
    ko: "몸을 재빨리 회전시키며\n걷어차서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "一边使身体快速旋转，\n一边踢飞对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "一邊使身體快速旋轉，\n一邊踢飛對手進行攻擊。\n有時會使對手畏縮。"
rollout:
  names:
    jp_kana: ころがる
    jp_kanji: ころがる
    en: Rollout
    fr: Roulade
    it: Rotolamento
    de: Walzer
    es: Desenrollar
    ko: 구르기
    zh_simp: 滚动
    zh_trad: 滾動
  descriptions:
    jp_kana: "５ターンの　あいだ　ころがりつづけて\nこうげきする。　わざが　あたる　たびに\nいりょくが　あがる。"
    jp_kanji: "５ターンの　間　転がり続けて\n攻撃する。　技が　当たるたびに\n威力が　あがる。"
    en: "The user continually rolls into the target over five\nturns. It becomes more powerful each time it hits."
    fr: "Un rocher roule sur l’ennemi pendant cinq tours.\nL’attaque gagne en puissance à chaque coup."
    it: "Chi la usa colpisce il bersaglio rotolando\nper cinque turni, con aumento progressivo\ndella potenza ogni volta che va a segno."
    de: "Attacke, die fünf Runden dauert. Die Härte nimmt von\nMal zu Mal zu."
    es: "El atacante rueda contra el objetivo durante cinco \nturnos, cada vez con mayor fuerza."
    ko: "5턴 동안 구르기를 반복하여\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "在５回合内连续滚动攻击对手。\n招式每次击中，威力就会提高。"
    zh_trad: "在５回合內連續滾動攻擊對手。\n每擊中一次，威力就會提高。"
roost:
  names:
    jp_kana: はねやすめ
    jp_kanji: はねやすめ
    en: Roost
    fr: Atterrissage
    it: Trespolo
    de: Ruheort
    es: Respiro
    ko: 날개쉬기
    zh_simp: 羽栖
    zh_trad: 羽棲
  descriptions:
    jp_kana: "じめんに　おりて　からだを　やすめる。\nさいだい　ＨＰの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    en: "The user lands and rests its body. It restores the\nuser’s HP by up to half of its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié de ses PV max."
    it: "Chi la usa sta fermo e riposa, recuperando\nmetà dei propri PS massimi."
    de: "Anwender landet und ruht sich aus. KP des\nAnwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: "Aterriza sobre la superficie para descansar.\nRecupera hasta la mitad del total de sus PS."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
    zh_simp: "降到地面，使身体休息。\n回复自己最大ＨＰ的一半。"
    zh_trad: "降落到地面，讓身體休息。\n回復自己最大ＨＰ的一半。"
rototiller:
  names:
    jp_kana: たがやす
    jp_kanji: たがやす
    en: Rototiller
    fr: Fertilisation
    it: Aracampo
    de: Pflüger
    es: Fertilizante
    ko: 일구기
    zh_simp: 耕地
    zh_trad: 耕地
  descriptions:
    jp_kana: "じめんを　たがやして　くさきが\nそだちやすいようにする。　くさタイプの\nこうげきと　とくこうが　あがる。"
    jp_kanji: "地面を　耕して　草木が\n育ちやすいようにする。　くさタイプの\n攻撃と　特攻が　あがる。"
    en: "Tilling the soil, the user makes it easier for plants to\ngrow. This raises the Attack and Sp. Atk stats of\nGrass-type Pokémon."
    fr: "Laboure le sol et le rend plus fertile.\nAugmente l’Attaque et l’Attaque Spéciale des\nPokémon de type Plante."
    it: "Chi la usa dissoda la terra per far crescere meglio\nl’erba. Questa mossa aumenta l’Attacco e\nl’Attacco Speciale dei Pokémon di tipo Erba."
    de: "Der Anwender pflügt den Boden und macht die\nErde fruchtbarer. Erhöht den Angriff und den\nSpezial-Angriff von Pflanzen-Pokémon."
    es: "Labra la tierra haciendo que sea más fácil cultivarla \ny consigue que aumente el Ataque y el\nAtaque Especial de los Pokémon de tipo Planta."
    ko: "땅을 일구어 초목이\n자라기 쉽게 한다. 풀타입의\n공격과 특수공격이 오른다."
    zh_simp: "翻耕土地，\n使草木更容易成长。\n会提高草属性宝可梦的攻击和特攻。"
    zh_trad: "耕耘土地，讓草木更容易成長。\n可提高草屬性寶可夢的攻擊和特攻。"
round:
  names:
    jp_kana: りんしょう
    jp_kanji: りんしょう
    en: Round
    fr: Chant Canon
    it: Coro
    de: Kanon
    es: Canon
    ko: 돌림노래
    zh_simp: 轮唱
    zh_trad: 輪唱
  descriptions:
    jp_kana: "うたで　あいてを　こうげきする。\nみんなで　りんしょう　すると　つづけて\nだすことが　でき　いりょくも　あがる。"
    jp_kanji: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    en: "The user attacks the target with a song. Others can\njoin in the Round to increase the power of\nthe attack."
    fr: "Le lanceur attaque l’ennemi en chantant.\nSi plusieurs Pokémon déclenchent cette attaque\nà la suite, l’effet augmente."
    it: "Attacca il bersaglio con una melodia. Se usata\ndurante lo stesso turno da più Pokémon, i danni\ninflitti aumentano."
    de: "Angriff mit Gesang. Singt der Anwender mit allen im\nKanon, steigt die Stärke."
    es: "Un canto que ataca al objetivo. Cuantos más\nPokémon lo usan, más aumenta de potencia."
    ko: "노래로 상대를 공격한다.\n함께 돌림노래를 하면 계속해서\n쓸 수 있고 위력도 올라간다."
    zh_simp: "用歌声攻击对手。\n同伴还可以接着使出轮唱招式，\n威力也会提高。"
    zh_trad: "用歌聲攻擊對手。\n大家一起輪唱便可以接連使出，\n威力也會提高。"
sacred_fire:
  names:
    jp_kana: せいなるほのお
    jp_kanji: せいなるほのお
    en: Sacred Fire
    fr: Feu Sacré
    it: Magifuoco
    de: Läuterfeuer
    es: Fuego Sagrado
    ko: 성스러운불꽃
    zh_simp: 神圣之火
    zh_trad: 神聖之火
  descriptions:
    jp_kana: "しんぴの　ほのおで\nあいてを　やきつくして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "神秘の　炎で\n相手を　焼きつくして　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is razed with a mystical fire of great\nintensity. This may also leave the target with a burn."
    fr: "Le lanceur génère un feu mystique d’une intensité\nredoutable pour attaquer l’ennemi.\nPeut aussi le brûler."
    it: "Colpisce il bersaglio con un fuoco mistico di\nenorme intensità che può anche causargli\nuna scottatura."
    de: "Mystische Feuer-Attacke, durch die das Ziel\neventuell Verbrennungen erleidet."
    es: "Fuego místico de gran intensidad que puede causar \nquemaduras."
    ko: "신비한 불꽃으로\n상대를 태워서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用神秘的火焰\n烧尽对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用神秘的火焰\n燒盡對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
sacred_sword:
  names:
    jp_kana: せいなるつるぎ
    jp_kanji: せいなるつるぎ
    en: Sacred Sword
    fr: Lame Sainte
    it: Spadasolenne
    de: Sanctoklinge
    es: Espada Santa
    ko: 성스러운칼
    zh_simp: 圣剑
    zh_trad: 聖劍
  descriptions:
    jp_kana: "ながい　つので　きりつけ　こうげきする。\nあいての　のうりょく　へんかに\nかんけいなく　ダメージを　あたえる。"
    jp_kanji: "長い　つので　切りつけ　攻撃する。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user attacks by slicing with a long horn. The\ntarget’s stat changes don’t affect this\nattack’s damage."
    fr: "Un coup de corne violent qui lacère l’ennemi\net lui inflige des dégâts quels que soient ses\nchangements de stats."
    it: "Chi la usa taglia il bersaglio con una spada magica. \nIl danno inflitto ignora le modifiche alle statistiche\ndel Pokémon colpito."
    de: "Schneideangriff mit langem Horn. Richtet unabhängig\nvon den Statusveränderungen des Zieles Schaden an."
    es: "El usuario ataca con una espada, ignorando cualquier \ncambio en las características del objetivo."
    ko: "긴 뿔로 베어 공격한다.\n상대의 능력 변화에\n관계없이 데미지를 준다."
    zh_simp: "用长角切斩对手进行攻击。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "用長角斬切對手進行攻擊。\n可不顧對手的能力變化\n給予傷害。"
safeguard:
  names:
    jp_kana: しんぴのまもり
    jp_kanji: しんぴのまもり
    en: Safeguard
    fr: Rune Protect
    it: Salvaguardia
    de: Bodyguard
    es: Velo Sagrado
    ko: 신비의부적
    zh_simp: 神秘守护
    zh_trad: 神秘守護
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　ちからに　まもられて\nじょうたい　いじょうに　ならなくなる。"
    jp_kanji: "５ターンの　間\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field that prevents\nstatus conditions for five turns."
    fr: "Crée un champ protecteur qui empêche tous\nles problèmes de statut pendant cinq tours."
    it: "Chi la usa crea un campo protettivo che evita\nproblemi di stato per sé e gli alleati\nper cinque turni."
    de: "Team des Anwenders ist fünf Runden vor\nStatusproblemen geschützt."
    es: "Un escudo que protege de problemas de estado, \ncomo el sueño o la parálisis, durante cinco turnos."
    ko: "5턴 동안\n이상한 힘으로 보호받아\n상태 이상이 되지 않는다."
    zh_simp: "在５回合内\n被神奇的力量守护，\n从而不会陷入异常状态。"
    zh_trad: "在５回合內\n被神奇的力量守護，\n不會陷入異常狀態。"
sand_attack:
  names:
    jp_kana: すなかけ
    jp_kanji: すなかけ
    en: Sand Attack
    fr: Jet de Sable
    it: Turbosabbia
    de: Sandwirbel
    es: Ataque Arena
    ko: 모래뿌리기
    zh_simp: 泼沙
    zh_trad: 潑沙
  descriptions:
    jp_kana: "あいての　かおに　すなを　かけて\nめいちゅうりつを　さげる。"
    jp_kanji: "相手の　顔に　砂を　かけて\n命中率を　さげる。"
    en: "Sand is hurled in the target’s face, reducing the\ntarget’s accuracy."
    fr: "Lance du sable au visage de l’ennemi pour baisser\nsa Précision."
    it: "Getta sabbia in faccia al bersaglio e ne riduce\nla precisione."
    de: "Senkt Genauigkeit des Zieles, indem ihm Sand ins\nGesicht geworfen wird."
    es: Arroja arena a la cara y baja la Precisión.
    ko: "상대의 얼굴에 모래를 뿌려서\n명중률을 떨어뜨린다."
    zh_simp: "向对手脸上泼沙子，\n从而降低命中率。"
    zh_trad: "向對手的臉上潑沙，\n降低對手的命中率。"
sand_tomb:
  names:
    jp_kana: すなじごく
    jp_kanji: すなじごく
    en: Sand Tomb
    fr: Tourbi-Sable
    it: Sabbiotomba
    de: Sandgrab
    es: Bucle Arena
    ko: 모래지옥
    zh_simp: 流沙地狱
    zh_trad: 流沙地獄
  descriptions:
    jp_kana: "はげしく　ふきあれる　すなあらしの\nなかに　４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　吹きあれる　砂あらしの\n中に　４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a harshly raging\nsandstorm for four to five turns."
    fr: "Le lanceur emprisonne l’ennemi dans une tempête\nde sable terrifiante qui dure de quatre à cinq tours."
    it: "Chi la usa intrappola il bersaglio in un turbine\ndi sabbia per quattro o cinque turni."
    de: "Das Ziel leidet für vier bis fünf Runden in einer\nSandhose."
    es: "Enreda al objetivo en un remolino de arena de \ncuatro a cinco turnos."
    ko: "세차게 불어대는\n모래바람 속에 4-5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n铺天盖地的沙暴中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n鋪天蓋地的沙暴中，\n在４～５回合內進行攻擊。"
sandstorm:
  names:
    jp_kana: すなあらし
    jp_kanji: すなあらし
    en: Sandstorm
    fr: Tempête de Sable
    it: Terrempesta
    de: Sandsturm
    es: Tormenta Arena
    ko: 모래바람
    zh_simp: 沙暴
    zh_trad: 沙暴
  descriptions:
    jp_kana: "５ターンの　あいだ　すなあらしで　いわ\nじめん　はがねタイプ　いがいに　ダメージ。\nいわタイプの　とくぼうが　あがる。"
    jp_kanji: "５ターンの　間　砂あらしで　いわ\nじめん　はがねタイプ　以外に　ダメージ。\nいわタイプの　特防が　あがる。"
    en: "A five-turn sandstorm is summoned to hurt all\ncombatants except the Rock, Ground, and\nSteel types. It raises the Sp. Def stat of Rock types."
    fr: "Une tempête de sable qui blesse tous les Pokémon\ndurant cinq tours, sauf ceux de type Roche, Sol ou\nAcier. Augmente la Déf. Spé. des Pokémon Roche."
    it: "Causa una tempesta di sabbia per cinque turni che\ndanneggia tutti i tipi esclusi Terra, Roccia e Acciaio.\nAumenta la Dif. Speciale dei Pokémon di tipo Roccia."
    de: "Sandsturm für fünf Runden. Schadet Pokémon aller\nTypen außer Gestein, Boden und Stahl. Erhöht die\nSpezial-Verteidigung von Gesteins-Pokémon."
    es: "Tormenta de arena que dura cinco turnos y hiere a \ntodos, excepto a los de tipo Roca, Tierra y Acero,\ny aumenta la Defensa Especial de los de tipo Roca."
    ko: "5턴 동안 모래바람으로 바위\n땅, 강철타입 이외에 데미지를 준다.\n바위타입의 특수방어가 올라간다."
    zh_simp: "在５回合内扬起沙暴，除岩石、地面和\n钢属性以外的宝可梦，都会受到伤害。\n岩石属性的特防还会提高。"
    zh_trad: "揚起沙暴，在５回合內給予\n岩石、地面和鋼屬性以外的寶可夢傷害。\n岩石屬性寶可夢的特防會提高。"
savage_spin_out:physical:
  names:
    jp_kana: ぜったいほしょくかいてんざん
    jp_kanji: ぜったいほしょくかいてんざん
    en: Savage Spin-Out
    fr: Cocon Fatal
    it: Bozzolo Fatale
    de: Wirbelnder Insektenhieb
    es: Guadaña Sedosa
    ko: 절대포식회전참
    zh_simp: 绝对捕食回旋斩
    zh_trad: 絕對捕食迴旋斬
  descriptions:
    jp_kana: "Ｚパワーで　はきだした　いとが\nぜんりょくで　あいてを　しばりつける。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　吐きだした　糸が\n全力で　相手を　縛りつける。\n元になった　技で　威力が　変わる。"
    en: "The user binds the target with full force with\nthreads of silk that the user spits using its Z-Power.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour cracher de longs\nfils de soie et enserrer l’adversaire. La puissance\nvarie selon celle de la capacité originale."
    it: "Chi la usa sfrutta il Potere Z per creare dei\nfilamenti che intrappolano il bersaglio. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Mithilfe von Z-Kraft umwickelt der Anwender das\nZiel mit Fäden. Die Stärke variiert je nach zugrunde\nliegender Attacke."
    es: "Emplea el Poder Z para encerrar a su oponente en\nun capullo contra el que arremete con fuerza. \nSu potencia depende de la del movimiento original."
    ko: "Z파워로 뱉어낸 실이\n전력으로 상대를 붙들어 맨다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量将吐出的丝线\n全力束缚对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量用吐出的絲線\n全力束縛對手。\n威力會隨原本的招式而改變。"
savage_spin_out:special:
  names:
    jp_kana: ぜったいほしょくかいてんざん
    jp_kanji: ぜったいほしょくかいてんざん
    en: Savage Spin-Out
    fr: Cocon Fatal
    it: Bozzolo Fatale
    de: Wirbelnder Insektenhieb
    es: Guadaña Sedosa
    ko: 절대포식회전참
    zh_simp: 绝对捕食回旋斩
    zh_trad: 絕對捕食迴旋斬
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
scald:
  names:
    jp_kana: ねっとう
    jp_kanji: ねっとう
    en: Scald
    fr: Ébullition
    it: Idrovampata
    de: Siedewasser
    es: Escaldar
    ko: 열탕
    zh_simp: 热水
    zh_trad: 熱水
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at its target.\nThis may also leave the target with a burn."
    fr: "L’ennemi est attaqué par un jet d’eau bouillante.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo.\nPuede causar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
scary_face:
  names:
    jp_kana: こわいかお
    jp_kanji: こわいかお
    en: Scary Face
    fr: Grimace
    it: Visotruce
    de: Grimasse
    es: Cara Susto
    ko: 겁나는얼굴
    zh_simp: 鬼面
    zh_trad: 鬼面
  descriptions:
    jp_kana: "おそろしい　かおで　にらみ　おびえさせて\nあいての　すばやさを　がくっと　さげる。"
    jp_kanji: "恐ろしい　顔で　にらみ　おびえさせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user frightens the target with a scary face to\nharshly lower its Speed stat."
    fr: "Une grimace qui effraie l’ennemi et réduit\nbeaucoup sa Vitesse."
    it: "Chi la usa spaventa il bersaglio con una faccia\nterribile e ne riduce di molto la Velocità."
    de: "Jagt dem Ziel mit einer Grimasse Angst ein.\nDessen Initiative-Wert sinkt stark."
    es: Asusta al objetivo para reducir mucho su Velocidad.
    ko: "무서운 얼굴로 노려보고 겁주어\n상대의 스피드를 크게 떨어뜨린다."
    zh_simp: "用恐怖的脸瞪着对手，\n使其害怕，\n从而大幅降低对手的速度。"
    zh_trad: "用恐怖的表情瞪著對手，\n讓對手害怕，\n大幅降低對手的速度。"
scratch:
  names:
    jp_kana: ひっかく
    jp_kanji: ひっかく
    en: Scratch
    fr: Griffe
    it: Graffio
    de: Kratzer
    es: Arañazo
    ko: 할퀴기
    zh_simp: 抓
    zh_trad: 抓
  descriptions:
    jp_kana: "かたく　とがった　するどい　ツメで\nあいてを　ひっかいて　こうげきする。"
    jp_kanji: "硬く　とがった　鋭い　ツメで\n相手を　ひっかいて　攻撃する。"
    en: "Hard, pointed, sharp claws rake the target to\ninflict damage."
    fr: "Lacère l’ennemi avec des griffes acérées pour lui\ninfliger des dégâts."
    it: "Infligge danni al bersaglio con artigli acuminati,\nduri e affilati."
    de: Das Ziel wird mit scharfen Klauen zerkratzt.
    es: Araña con afiladas garras.
    ko: "단단하고 뾰족한 날카로운 손톱으로\n상대를 할퀴어서 공격한다."
    zh_simp: "用坚硬且无比锋利的爪子\n抓对手进行攻击。"
    zh_trad: "用堅硬且無比鋒利的爪子\n抓對手進行攻擊。"
screech:
  names:
    jp_kana: いやなおと
    jp_kanji: いやなおと
    en: Screech
    fr: Grincement
    it: Stridio
    de: Kreideschrei
    es: Chirrido
    ko: 싫은소리
    zh_simp: 刺耳声
    zh_trad: 刺耳聲
  descriptions:
    jp_kana: "おもわず　みみを　ふさぎたくなる\nいやなおとを　だして\nあいての　ぼうぎょを　がくっと　さげる。"
    jp_kanji: "おもわず　耳を　ふさぎたくなる\nいやなおとを　だして\n相手の　防御を　がくっと　さげる。"
    en: "An earsplitting screech harshly lowers the target’s\nDefense stat."
    fr: "Cri strident qui baisse beaucoup la Défense\nde l’ennemi."
    it: "Stridio assordante che riduce di molto la Difesa\ndel bersaglio."
    de: "Stößt einen Schrei aus, um die Verteidigung des\nZieles stark zu senken."
    es: "Alarido agudo que reduce mucho la Defensa del \nobjetivo."
    ko: "그만 귀를 막아버리고 싶은\n싫은 소리를 내어\n상대의 방어를 크게 떨어뜨린다."
    zh_simp: "发出不由自主想要\n捂起耳朵的刺耳声，\n从而大幅降低对手的防御。"
    zh_trad: "發出令人不由自主想要\n摀起耳朵的刺耳聲，\n大幅降低對手的防禦。"
searing_shot:
  names:
    jp_kana: かえんだん
    jp_kanji: かえんだん
    en: Searing Shot
    fr: Incendie
    it: Sparafuoco
    de: Flammenball
    es: Bomba Ígnea
    ko: 화염탄
    zh_simp: 火焰弹
    zh_trad: 火焰彈
  descriptions:
    jp_kana: "まっかな　ほのおで　じぶんの\nまわりに　いるものを　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user torches everything around it in an inferno\nof scarlet flames. This may also leave those it hits\nwith a burn."
    fr: "Des boules de feu s’abattent sur tous les Pokémon\nautour du lanceur. Peut aussi les brûler."
    it: "Chi la usa lancia fiamme scarlatte su tutti i Pokémon \nnelle vicinanze, danneggiandoli. Può anche scottarli."
    de: "Anwender greift alles in seiner Umgebung mit\ntiefroten Flammen an. Ziele erleiden eventuell\nVerbrennungen."
    es: "Un infierno de llamas daña a los Pokémon \nadyacentes en combate. Puede quemar."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击自己周围所有的宝可梦。\n有时会陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入灼傷狀態。"
secret_power:
  names:
    jp_kana: ひみつのちから
    jp_kanji: ひみつのちから
    en: Secret Power
    fr: Force Cachée
    it: Forzasegreta
    de: Geheimpower
    es: Daño Secreto
    ko: 비밀의힘
    zh_simp: 秘密之力
    zh_trad: 秘密之力
  descriptions:
    jp_kana: "つかう　ばしょで　ついかこうか　が\nへんかする　こうげき。"
    jp_kanji: "使う場所で　追加効果が\n変化する　攻撃。"
    en: "The additional effects of this attack depend upon\nwhere it was used."
    fr: "Les effets de cette attaque varient en fonction\nde l’environnement."
    it: "Attacco che può avere un effetto aggiuntivo\na seconda del luogo in cui si trova chi lo usa."
    de: Die Wirkung dieser Attacke ist ortsabhängig.
    es: "Ataque cuyos efectos secundarios varían según el\nentorno de combate."
    ko: "사용하는 장소에 따라 추가 효과가\n변화하는 공격이다."
    zh_simp: "根据使用场所不同，\n该招式的追加效果也会有所变化。"
    zh_trad: "隨著使用地點的不同，\n招式的追加效果也會改變。"
secret_sword:
  names:
    jp_kana: しんぴのつるぎ
    jp_kanji: しんぴのつるぎ
    en: Secret Sword
    fr: Lame Ointe
    it: Spadamistica
    de: Mystoschwert
    es: Sable Místico
    ko: 신비의칼
    zh_simp: 神秘之剑
    zh_trad: 神秘之劍
  descriptions:
    jp_kana: "ながい　つので　きりつけ　こうげきする。\nつのが　まとった　ふしぎな　ちからは\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "長い　つので　切りつけ　攻撃する。\nつのが　まとった　不思議な　力は\n物理的な　ダメージを　与える。"
    en: "The user cuts with its long horn. The odd power\ncontained in the horn does physical damage to\nthe target."
    fr: "L’ennemi est lacéré par une longue corne.\nSon pouvoir mystérieux inflige des dégâts\nphysiques."
    it: "Chi la usa attacca il bersaglio tagliandolo con una\nspada mistica. La misteriosa energia sprigionata\nprovoca danni fisici."
    de: "Schneideangriff mit dem langen Horn des Anwenders.\nDie mysteriöse Kraft aus dem Horn erzeugt\nphysischen Schaden."
    es: "Ensarta al objetivo con un largo cuerno dotado de un\npoder místico que provoca daño físico."
    ko: "긴 뿔로 베어 공격한다.\n뿔이 머금은 이상한 힘은\n물리적인 데미지를 준다."
    zh_simp: "用长角切斩对手进行攻击。\n角上拥有的神奇力量\n将给予物理伤害。"
    zh_trad: "用長角斬切對手進行攻擊。\n角上擁有的神奇力量\n會給予對手物理傷害。"
seed_bomb:
  names:
    jp_kana: タネばくだん
    jp_kanji: タネばくだん
    en: Seed Bomb
    fr: Canon Graine
    it: Semebomba
    de: Samenbomben
    es: Bomba Germen
    ko: 씨폭탄
    zh_simp: 种子炸弹
    zh_trad: 種子炸彈
  descriptions:
    jp_kana: "かたい　からを　もつ　おおきな　タネを\nうえから　たたきつけて\nあいてを　こうげきする。"
    jp_kanji: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    en: "The user slams a barrage of hard-shelled seeds\ndown on the target from above."
    fr: "Le lanceur fait pleuvoir un déluge de graines\nexplosives sur l’ennemi."
    it: "Chi la usa emette una raffica di semi dal guscio\nduro che colpiscono il bersaglio dall’alto."
    de: "Anwender lässt eine Menge Samen mit harter Schale\nvon oben auf das Ziel fallen."
    es: "Lanza al objetivo una descarga de semillas\nexplosivas desde arriba."
    ko: "단단한 껍질을 가지고 있는\n큰 씨앗을 힘껏 내던져\n상대를 공격한다."
    zh_simp: "将外壳坚硬的大种子，\n从上方砸下攻击对手。"
    zh_trad: "從上方砸下外殼堅硬的\n大種子，攻擊對手。"
seed_flare:
  names:
    jp_kana: シードフレア
    jp_kanji: シードフレア
    en: Seed Flare
    fr: Fulmigraine
    it: Infuriaseme
    de: Schocksamen
    es: Fogonazo
    ko: 시드플레어
    zh_simp: 种子闪光
    zh_trad: 種子閃光
  descriptions:
    jp_kana: "からだの　なかから　しょうげきはを\nはっせい　させる。あいての　とくぼうを\nがくっと　さげることが　ある。"
    jp_kanji: "体の　中から　衝撃波を\n発生させる。相手の　特防を\nがくっと　さげることが　ある。"
    en: "The user emits a shock wave from its body to attack\nits target. This may also harshly lower the target’s\nSp. Def stat."
    fr: "Le corps du lanceur émet une onde de choc.\nPeut aussi beaucoup baisser la Défense Spéciale\nde la cible."
    it: "Chi la usa genera un’onda d’urto dal suo corpo.\nPuò anche ridurre di molto la Difesa Speciale\ndel bersaglio."
    de: "Anwender erzeugt eine Schockwelle.\nSpezial-Verteidigung des Zieles wird\neventuell stark gesenkt."
    es: "Una onda de choque se libera del cuerpo. Puede \nbajar mucho la Defensa Especial del objetivo."
    ko: "몸속에서 충격파를\n발생시킨다. 상대의 특수방어를\n크게 떨어뜨릴 때가 있다."
    zh_simp: "从身体里产生冲击波。\n有时会大幅降低对手的特防。"
    zh_trad: "從身體裡發出衝擊波攻擊對手。\n有時會大幅降低對手的特防。"
seismic_toss:
  names:
    jp_kana: ちきゅうなげ
    jp_kanji: ちきゅうなげ
    en: Seismic Toss
    fr: Frappe Atlas
    it: Movim. Sismico
    de: Geowurf
    es: Mov. Sísmico
    ko: 지구던지기
    zh_simp: 地球上投
    zh_trad: 地球上投
  descriptions:
    jp_kana: "いんりょくを　つかい　なげとばす。\nじぶんの　レベルと　おなじ　ダメージを\nあいてに　あたえる。"
    jp_kanji: "引力を　使い　投げとばす。\n自分の　レベルと　同じ　ダメージを\n相手に　与える。"
    en: "The target is thrown using the power of gravity.\nIt inflicts damage equal to the user’s level."
    fr: "L’ennemi est projeté grâce au pouvoir de la gravité.\nInflige des dégâts équivalents au niveau du lanceur."
    it: "Colpisce il bersaglio con la forza di gravità.\nInfligge un danno pari al livello di chi la usa."
    de: "Ziel wird mit der Kraft der Gravitation umgeworfen.\nRichtet Schaden gemäß Level des Angreifers an."
    es: "La gravedad derriba al objetivo. Se restarán tantos\nPS como nivel tenga el agresor."
    ko: "인력을 사용해 내던진다.\n자신의 레벨과 똑같은 데미지를\n상대에게 준다."
    zh_simp: "利用引力将对手甩飞出去。\n给予对手和自己等级相同的伤害。"
    zh_trad: "利用引力將對手甩飛出去。\n給予對手和自己等級相同的傷害。"
self_destruct:
  names:
    jp_kana: じばく
    jp_kanji: じばく
    en: Self-Destruct
    fr: Destruction
    it: Autodistruzione
    de: Finale
    es: Autodestrucción
    ko: 자폭
    zh_simp: 自爆
    zh_trad: 自爆
  descriptions:
    jp_kana: "ばくはつを　おこして　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "爆発を　おこして　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing an\nexplosion. The user faints upon using this move."
    fr: "Le lanceur explose en blessant tous les Pokémon\nautour de lui. Le lanceur tombe K.O."
    it: "Chi la usa esplode e infligge danni ai Pokémon\nche ha intorno, ma poi va KO."
    de: "Anwender verursacht eine Explosion, mit der er\nrundum Riesenschaden anrichtet und selbst\nkampfunfähig wird."
    es: "El atacante explota y hiere a todos a su alrededor. \nEl usuario se debilita de inmediato."
    ko: "폭발을 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서 기절하게 된다."
    zh_simp: "引发爆炸，\n攻击自己周围所有的宝可梦。\n使用后陷入濒死。"
    zh_trad: "引起爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
shadow_ball:
  names:
    jp_kana: シャドーボール
    jp_kanji: シャドーボール
    en: Shadow Ball
    fr: Ball’Ombre
    it: Palla Ombra
    de: Spukball
    es: Bola Sombra
    ko: 섀도볼
    zh_simp: 暗影球
    zh_trad: 暗影球
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげつけて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the target.\nThis may also lower the target’s Sp. Def stat."
    fr: "Projette une grande ombre sur l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Lancia sul bersaglio una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit gruseligem Ball und senkt\neventuell die Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede bajar la Defensa \nEspecial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時會降低對手的特防。"
shadow_bone:
  names:
    jp_kana: シャドーボーン
    jp_kanji: シャドーボーン
    en: Shadow Bone
    fr: Os’Ombre
    it: Ossotetro
    de: Schattenknochen
    es: Hueso Sombrío
    ko: 섀도본
    zh_simp: 暗影之骨
    zh_trad: 暗影之骨
  descriptions:
    jp_kana: "たましいの　やどった　ホネで\nあいてを　なぐりつけて　こうげきする。\nあいての　ぼうぎょを　さげる　ことがある。"
    jp_kanji: "魂の　宿った　ホネで\n相手を　なぐりつけて　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user attacks by beating the target with a\nbone that contains a spirit. This may also lower\nthe target’s Defense stat."
    fr: "Le lanceur frappe avec un os possédé par\nl’âme d’un défunt. Peut aussi baisser la Défense\nde la cible."
    it: "Chi la usa colpisce il bersaglio con un osso\nin cui alberga uno spirito. Può anche ridurne\nla Difesa."
    de: "Der Anwender greift das Ziel mit einem Knochen an,\nin dem eine Seele haust. Senkt eventuell die\nVerteidigung des Zieles."
    es: "Ataca al oponente golpeándole con un hueso poseído\npor un espíritu. Puede reducir la Defensa del\nobjetivo."
    ko: "영혼이 머물고 있는 뼈로\n상대를 세게 때려서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用附有灵魂的骨头\n殴打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用寄宿了靈魂的骨頭\n毆打對手進行攻擊。\n有時會降低對手的防禦。"
shadow_claw:
  names:
    jp_kana: シャドークロー
    jp_kanji: シャドークロー
    en: Shadow Claw
    fr: Griffe Ombre
    it: Ombrartigli
    de: Dunkelklaue
    es: Garra Umbría
    ko: 섀도크루
    zh_simp: 暗影爪
    zh_trad: 暗影爪
  descriptions:
    jp_kana: "かげから　つくった　するどい　ツメで\nあいてを　きりさく。\nきゅうしょに　あたりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user slashes with a sharp claw made from\nshadows. Critical hits land more easily."
    fr: "Attaque avec une griffe puissante faite d’ombres.\nTaux de critique élevé."
    it: "Chi la usa attacca con artigli d’ombra che\ncolpiscono con gran forza. Probabile brutto colpo."
    de: "Das Ziel wird mit scharfen Klauen aus der\nSchattenwelt attackiert. Hohe Volltrefferquote."
    es: "Ataca con una garra afilada hecha de sombras.\nSuele ser crítico."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "以影子做成的锐爪，\n劈开对手。\n容易击中要害。"
    zh_trad: "用黑影化成的銳利爪子\n撕裂對手。\n容易擊中要害。"
shadow_force:
  names:
    jp_kana: シャドーダイブ
    jp_kanji: シャドーダイブ
    en: Shadow Force
    fr: Revenant
    it: Oscurotuffo
    de: Schemenkraft
    es: Golpe Umbrío
    ko: 섀도다이브
    zh_simp: 暗影潜袭
    zh_trad: 暗影潛襲
  descriptions:
    jp_kana: "１ターンめで　すがたを　けして\n２ターンめに　あいてを　こうげきする。\nまもっていても　こうげきは　あたる。"
    jp_kanji: "１ターン目で　姿を　消して\n２ターン目に　相手を　攻撃する。\n守っていても　攻撃は　当たる。"
    en: "The user disappears, then strikes the target on the\nnext turn. This move hits even if the target\nprotects itself."
    fr: "Le lanceur disparaît et frappe l’ennemi au second\ntour. Fonctionne même si l’ennemi se protège."
    it: "Chi la usa sparisce e poi colpisce il bersaglio\nal turno successivo. Colpisce anche un Pokémon\nche ha usato Protezione, Individua o simili."
    de: "Anwender verschwindet in Runde 1 und attackiert\nin Runde 2. Trifft auch, wenn sich das Ziel selbst\nschützt."
    es: "En el primer turno, desaparece. En el segundo, \ngolpea al objetivo aunque se esté protegiendo."
    ko: "1턴째에 모습을 감춰\n2턴째에 상대를 공격한다.\n방어하고 있어도 공격은 맞는다."
    zh_simp: "第１回合消失踪影，\n第２回合攻击对手。\n即使对手正受保护，也能击中。"
    zh_trad: "使用後的第１回合消失身影，\n並於第２回合攻擊對手。\n處於守護的對手也能擊中。"
shadow_punch:
  names:
    jp_kana: シャドーパンチ
    jp_kanji: シャドーパンチ
    en: Shadow Punch
    fr: Poing Ombre
    it: Pugnodombra
    de: Finsterfaust
    es: Puño Sombra
    ko: 섀도펀치
    zh_simp: 暗影拳
    zh_trad: 暗影拳
  descriptions:
    jp_kana: "かげに　まぎれて　パンチを　くりだす。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "影に　まぎれて　パンチを　くりだす。\n攻撃は　必ず　命中する。"
    en: "The user throws a punch from the shadows. This\nattack never misses."
    fr: "Le lanceur surgit des ombres et donne un coup\nde poing. N’échoue jamais."
    it: "Il bersaglio riceve un pugno proveniente\ndalle tenebre. Questa mossa è infallibile."
    de: "Angriff mit der Faust aus dem Schattenreich.\nAusweichen unmöglich."
    es: Puñetazo ineludible procedente de las sombras.
    ko: "그림자에 섞여 펀치를 날린다.\n공격은 반드시 명중한다."
    zh_simp: "使出混影之拳。\n攻击必定会命中。"
    zh_trad: "暗藏在陰影之中出拳。\n攻擊必定會命中。"
shadow_sneak:
  names:
    jp_kana: かげうち
    jp_kanji: かげうち
    en: Shadow Sneak
    fr: Ombre Portée
    it: Furtivombra
    de: Schattenstoß
    es: Sombra Vil
    ko: 야습
    zh_simp: 影子偷袭
    zh_trad: 影子偷襲
  descriptions:
    jp_kana: "かげを　のばして\nあいての　はいごから　こうげきする。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "影を　のばして\n相手の　背後から　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user extends its shadow and attacks the target\nfrom behind. This move always goes first."
    fr: "Le lanceur étend son ombre pour frapper\npar-derrière. Frappe en priorité."
    it: "Chi la usa estende la sua ombra e attacca\nil nemico alle spalle.\nQuesta mossa ha priorità alta."
    de: "Anwender erweitert Schatten und greift das Ziel von\nhinten an. Hohe Erstschlagquote."
    es: "Extiende su sombra y ataca al objetivo por la\nespalda. Este movimiento tiene prioridad alta."
    ko: "그림자를 늘려\n상대의 배후에서 공격한다.\n반드시 선제공격할 수 있다."
    zh_simp: "伸长影子，\n从对手的背后进行攻击。\n必定能够先制攻击。"
    zh_trad: "伸長自己的影子，\n從對手的背後進行攻擊。\n必定能夠發動先制攻擊。"
sharpen:
  names:
    jp_kana: かくばる
    jp_kanji: かくばる
    en: Sharpen
    fr: Affûtage
    it: Affilatore
    de: Schärfer
    es: Afilar
    ko: 각지기
    zh_simp: 棱角化
    zh_trad: 稜角化
  descriptions:
    jp_kana: "からだの　かどを　ふやして\nカクカクに　なることで\nじぶんの　こうげきを　あげる。"
    jp_kanji: "体の　かどを　増やして\nカクカクに　なることで\n自分の　攻撃を　あげる。"
    en: "The user makes its edges more jagged, \nwhich raises its Attack stat."
    fr: "Le lanceur réduit son nombre de polygones pour\naccentuer ses angles et augmenter son Attaque."
    it: "Chi la usa riduce il numero di poligoni sul\nproprio corpo per accentuarne gli spigoli\ne aumentare l’Attacco."
    de: "Anwender macht seinen Körper kantiger und erhöht\nso seinen Angriffs-Wert."
    es: "El perfil del usuario se hace más afilado y su Ataque \nmejora."
    ko: "몸의 각을 늘려서\n더욱 각지게 하여\n자신의 공격을 올린다."
    zh_simp: "增加身体的角，\n变得棱棱角角，\n从而提高自己的攻击。"
    zh_trad: "增加身體的稜角，\n變得方方正正，\n提高自己的攻擊。"
shattered_psyche:physical:
  names:
    jp_kana: マキシマムサイブレイカー
    jp_kanji: マキシマムサイブレイカー
    en: Shattered Psyche
    fr: Psycho-Pulvérisation EX
    it: Impatto Psicocinetico
    de: Psycho-Schmetterschlag
    es: Disruptor Psíquico
    ko: 맥시멈사이브레이커
    zh_simp: 至高精神破坏波
    zh_trad: 至高精神破壞波
  descriptions:
    jp_kana: "Ｚパワーで　あいてを　あやつり\nぜんりょくで　いたい　おもいを　させる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　相手を　操り\n全力で　痛い　思いを　させる。\n元になった　技で　威力が　変わる。"
    en: "The user controls the target with its Z-Power and\nhurts the target with full force. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour manipuler\nl’adversaire et lui infliger de sérieux dégâts. La\npuissance varie selon celle de la capacité originale."
    it: "Chi la usa si serve del Potere Z per manipolare\nla mente del bersaglio causando ingenti danni. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender kontrolliert das Ziel mit Z-Kraft und\nmacht ihm so das Leben schwer. Die Stärke variiert\nje nach zugrunde liegender Attacke."
    es: "Emplea el Poder Z para manipular la mente del\nobjetivo, infligiéndole un daño ingente. Su potencia\ndepende de la del movimiento original."
    ko: "Z파워로 상대를 조종해\n전력으로 매서운 맛을 보여준다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量操纵对手，\n全力使其感受到痛苦。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量操縱對手，\n全力使其感受到痛苦。\n威力會隨原本的招式而改變。"
shattered_psyche:special:
  names:
    jp_kana: マキシマムサイブレイカー
    jp_kanji: マキシマムサイブレイカー
    en: Shattered Psyche
    fr: Psycho-Pulvérisation EX
    it: Impatto Psicocinetico
    de: Psycho-Schmetterschlag
    es: Disruptor Psíquico
    ko: 맥시멈사이브레이커
    zh_simp: 至高精神破坏波
    zh_trad: 至高精神破壞波
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
sheer_cold:
  names:
    jp_kana: ぜったいれいど
    jp_kanji: ぜったいれいど
    en: Sheer Cold
    fr: Glaciation
    it: Purogelo
    de: Eiseskälte
    es: Frío Polar
    ko: 절대영도
    zh_simp: 绝对零度
    zh_trad: 絕對零度
  descriptions:
    jp_kana: "あいてを　いちげきで　ひんしに　する。\nこおりタイプ　いがいの　ポケモンが\nつかうと　あたりにくい。"
    jp_kanji: "相手を　一撃で　瀕死に　する。\nこおりタイプ　以外の　ポケモンが\n使うと　当たりにくい。"
    en: "The target faints instantly. It’s less likely to hit the\ntarget if it’s used by Pokémon other than Ice types."
    fr: "Une vague de froid glacial frappe l’ennemi pour le\nmettre K.O. en un coup. A peu de chances de réussir\nsi le lanceur ne possède pas le type Glace."
    it: "Il bersaglio esaurisce i PS in un colpo solo.\nSe viene usata da Pokémon che non sono di tipo\nGhiaccio, difficilmente va a segno."
    de: "Diese Attacke führt beim Ziel sofort zum K.O. Wird\nsie von einem Pokémon eingesetzt, das nicht dem\nTyp Eis angehört, trifft sie seltener."
    es: "Debilita al objetivo de un solo golpe. Si lo usa un\nPokémon que no sea de tipo Hielo, es difícil que\nacierte."
    ko: "상대를 일격에 기절시킨다.\n얼음타입 이외의 포켓몬이\n사용하면 잘 맞지 않는다."
    zh_simp: "给对手一击濒死。\n如果是冰属性以外的宝可梦使用，\n就会难以打中。"
    zh_trad: "一擊讓對手陷入瀕死。\n冰屬性以外的寶可夢使用時，\n會比較不易命中對手。"
shell_smash:
  names:
    jp_kana: からをやぶる
    jp_kanji: からをやぶる
    en: Shell Smash
    fr: Exuviation
    it: Gettaguscio
    de: Hausbruch
    es: Rompecoraza
    ko: 껍질깨기
    zh_simp: 破壳
    zh_trad: 破殼
  descriptions:
    jp_kana: "からを　やぶって　じぶんの　ぼうぎょ\nとくぼうを　さげるが　こうげき　とくこう\nすばやさを　ぐーんと　あげる。"
    jp_kanji: "殻を　やぶって　自分の　防御\n特防を　さげるが　攻撃　特攻\n素早さを　ぐーんと　あげる。"
    en: "The user breaks its shell, which lowers Defense and\nSp. Def stats but sharply raises its Attack, Sp. Atk,\nand Speed stats."
    fr: "Le lanceur brise sa coquille. Il baisse sa Défense\net sa Défense Spéciale, mais augmente beaucoup\nson Attaque, son Attaque Spéciale et sa Vitesse."
    it: "Chi la usa si disfa del guscio. Difesa e Difesa\nSpeciale calano, ma aumentano di molto Attacco,\nAttacco Speciale e Velocità."
    de: "Anwender zerbricht seine Schale und senkt seine\nVerteidigung und Spezial-Verteidigung, aber dafür\nsteigen Angriff, Spezial-Angriff und Initiative stark."
    es: "El usuario rompe su coraza y baja su Defensa y\nDefensa Especial, pero aumenta mucho su Ataque, \nAtaque Especial y Velocidad."
    ko: "껍질을 깨서 자신의 방어와\n특수방어를 떨어뜨리지만 공격과\n특수공격, 스피드를 크게 올린다."
    zh_simp: "打破外壳，\n降低自己的防御和特防，\n但大幅提高攻击、特攻和速度。"
    zh_trad: "破殼而出。\n自己的防禦和特防會降低，\n但能大幅提高攻擊、特攻和速度。"
shell_trap:
  names:
    jp_kana: トラップシェル
    jp_kanji: トラップシェル
    en: Shell Trap
    fr: Carapiège
    it: Gusciotrappola
    de: Panzerfalle
    es: Coraza Trampa
    ko: 트랩셸
    zh_simp: 陷阱甲壳
    zh_trad: 陷阱甲殼
  descriptions:
    jp_kana: "こうらの　トラップを　しかける。\nあいてが　ぶつり　わざを　だすと\nばくはつして　ダメージを　あたえる。"
    jp_kanji: "こうらの　トラップを　しかける。\n相手が　物理技を　出すと\n爆発して　ダメージを　与える。"
    en: "The user sets a shell trap. If the user is hit by a\nphysical move, the trap will explode and inflict\ndamage on the opposing Pokémon."
    fr: "Pose une carapace piégée. Si l’adversaire utilise\nune capacité physique, la carapace explose et\nlui inflige des dégâts."
    it: "Il guscio del Pokémon diventa una trappola.\nSe un nemico lo colpisce con una mossa fisica,\ninnesca un’esplosione e subisce dei danni."
    de: "Der Anwender legt eine Panzerfalle. Wird er von einer\nphysischen Attacke getroffen, explodiert die Falle\nund fügt dem Angreifer Schaden zu."
    es: "El caparazón del Pokémon se convierte en una\ntrampa. Si le alcanza un ataque físico, la trampa\nestalla y el atacante sufre daño."
    ko: "껍질의 트랩을 설치한다.\n상대가 물리 기술을 쓰면\n폭발해서 데미지를 준다."
    zh_simp: "设下甲壳陷阱。\n如果对手使出物理招式，\n陷阱就会爆炸并给予对手伤害。"
    zh_trad: "設下甲殼陷阱。\n若對手使出物理招式，\n就會爆炸並給予傷害。"
shift_gear:
  names:
    jp_kana: ギアチェンジ
    jp_kanji: ギアチェンジ
    en: Shift Gear
    fr: Chgt Vitesse
    it: Cambiomarcia
    de: Gangwechsel
    es: Cambio de Marcha
    ko: 기어체인지
    zh_simp: 换挡
    zh_trad: 換檔
  descriptions:
    jp_kana: "はぐるまを　まわして\nじぶんの　こうげきを　あげる　だけでなく\nすばやさも　ぐーんと　あげる。"
    jp_kanji: "歯車を　回して\n自分の　攻撃を　あげる　だけでなく\n素早さも　ぐーんと　あげる。"
    en: "The user rotates its gears, raising its Attack stat and\nsharply raising its Speed stat."
    fr: "Le lanceur fait tourner ses engrenages.\nCela augmente son Attaque et augmente beaucoup\nsa Vitesse."
    it: "Facendo ruotare gli ingranaggi, chi la usa aumenta\nnon solo il proprio Attacco, ma anche di molto\nla propria Velocità."
    de: "Durch Drehen der Zahnräder erhöht sich nicht nur\nder Angriffs-Wert, sondern auch die Initiative des\nAnwenders stark."
    es: "Al hacer girar los engranajes, el usuario mejora su\nAtaque y aumenta su Velocidad espectacularmente."
    ko: "톱니바퀴를 돌려서 자신의\n공격을 올리는 것뿐만 아니라\n스피드도 크게 올린다."
    zh_simp: "转动齿轮，\n不仅提高自己的攻击，\n还会大幅提高速度。"
    zh_trad: "轉動齒輪，\n提高自己的攻擊，\n同時大幅提高自己的速度。"
shock_wave:
  names:
    jp_kana: でんげきは
    jp_kanji: でんげきは
    en: Shock Wave
    fr: Onde de Choc
    it: Ondashock
    de: Schockwelle
    es: Onda Voltio
    ko: 전격파
    zh_simp: 电击波
    zh_trad: 電擊波
  descriptions:
    jp_kana: "でんげきを　すばやく\nあいてに　あびせる。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "電撃を　素早く\n相手に　浴びせる。\n攻撃は　必ず　命中する。"
    en: "The user strikes the target with a quick jolt of\nelectricity. This attack never misses."
    fr: "Le lanceur envoie un choc électrique rapide à\nl’ennemi. Impossible à esquiver."
    it: "Chi la usa colpisce il bersaglio con una scossa\ndi elettricità. È impossibile eludere questa mossa."
    de: "Angriff mit schnellem Elektro-Schlag.\nAusweichen nicht möglich."
    es: Ataque eléctrico muy rápido e ineludible.
    ko: "전격을 재빠르게\n상대에게 날린다.\n공격은 반드시 명중한다."
    zh_simp: "向对手快速发出电击。\n攻击必定会命中。"
    zh_trad: "向對手迅速放出電流。\n攻擊一定會命中。"
shore_up:
  names:
    jp_kana: すなあつめ
    jp_kanji: すなあつめ
    en: Shore Up
    fr: Amass’Sable
    it: Sabbiaccumulo
    de: Sandsammler
    es: Recogearena
    ko: 모래모으기
    zh_simp: 集沙
    zh_trad: 集沙
  descriptions:
    jp_kana: "さいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。\nすなあらしのときは　おおく　かいふく。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。\nすなあらしの時は　多く　回復。"
    en: "The user regains up to half of its max HP. It restores\nmore HP in a sandstorm."
    fr: "Le lanceur récupère jusqu’à la moitié de ses PV max.\nDurant une tempête de sable, il en récupère encore\nplus."
    it: "Chi la usa recupera metà dei propri PS massimi.\nDurante le tempeste di sabbia ne recupera di più."
    de: "KP des Anwenders werden um 50 % der maximalen\nKP aufgefüllt. Tobt ein Sandsturm, werden noch\nmehr KP aufgefüllt."
    es: "Restaura la mitad de los PS máximos del usuario.\nDurante las tormentas de arena, restaura aún más\nPS."
    ko: "자신의 최대 HP 절반을\n회복한다. 모래바람일 때는\n많이 회복한다."
    zh_simp: "回复自己最大ＨＰ的一半。\n在沙暴中回复得更多。"
    zh_trad: "回復自己最大ＨＰ的一半。\n在沙暴中回復得更多。"
signal_beam:
  names:
    jp_kana: シグナルビーム
    jp_kanji: シグナルビーム
    en: Signal Beam
    fr: Rayon Signal
    it: Segnoraggio
    de: Ampelleuchte
    es: Doble Rayo
    ko: 시그널빔
    zh_simp: 信号光束
    zh_trad: 信號光束
  descriptions:
    jp_kana: "ふしぎな　ひかりを\nはっしゃして　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "不思議な　光を\n発射して　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks with a sinister beam of light.\nThis may also confuse the target."
    fr: "Le lanceur projette un rayon de lumière sinistre.\nPeut aussi rendre l’ennemi confus."
    it: "Chi la usa attacca con uno strano raggio di luce\nche può anche confondere il Pokémon colpito."
    de: Strahlenattacke, die das Ziel eventuell verwirrt.
    es: "Ataca con un rayo de luz siniestro. Puede\nconfundir al objetivo."
    ko: "이상한 빛을\n발사해서 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "发射神奇的光线进行攻击。\n有时会使对手混乱。"
    zh_trad: "發射神奇的光線進行攻擊。\n有時會使對手混亂。"
silver_wind:
  names:
    jp_kana: ぎんいろのかぜ
    jp_kanji: ぎんいろのかぜ
    en: Silver Wind
    fr: Vent Argenté
    it: Ventargenteo
    de: Silberhauch
    es: Viento Plata
    ko: 은빛바람
    zh_simp: 银色旋风
    zh_trad: 銀色旋風
  descriptions:
    jp_kana: "かぜに　りんぷんを　のせて　あいてを\nこうげきする。じぶんの　すべての\nのうりょくが　あがることが　ある。"
    jp_kanji: "風に　りんぷんを　のせて　相手を\n攻撃する。自分の　すべての\n能力が　あがることが　ある。"
    en: "The target is attacked with powdery scales blown\nby the wind. This may also raise all the user’s stats."
    fr: "Vent qui projette des écailles poudreuses sur\nl’ennemi. Peut aussi monter toutes les stats\ndu lanceur."
    it: "Attacca con un forte vento di polvere di squame.\nTutte le statistiche di chi la usa possono salire."
    de: "Angriff mit Silberstaub. Eventuell werden alle\nStatuswerte des Anwenders erhöht."
    es: "Fuerte viento con polvo de escamas. Puede subir \ntodas las características de quien lo usa."
    ko: "바람에 날개 가루를 날려서 상대를\n공격한다. 자신의 모든\n능력이 올라갈 때가 있다."
    zh_simp: "在风中掺入鳞粉攻击对手。\n有时会提高自己的全部能力。"
    zh_trad: "乘著風飄送鱗粉攻擊對手。\n有時會提高自己的所有能力。"
simple_beam:
  names:
    jp_kana: シンプルビーム
    jp_kanji: シンプルビーム
    en: Simple Beam
    fr: Rayon Simple
    it: Ondisinvolta
    de: Wankelstrahl
    es: Onda Simple
    ko: 심플빔
    zh_simp: 单纯光束
    zh_trad: 單純光束
  descriptions:
    jp_kana: "なぞの　ねんぱを　あいてに　おくる。\nねんぱを　うけとった　あいては\nとくせいが　たんじゅんに　なる。"
    jp_kanji: "なぞの　念波を　相手に　送る。\n念波を　受けとった　相手は\n特性が　たんじゅんに　なる。"
    en: "The user’s mysterious psychic wave changes the\ntarget’s Ability to Simple."
    fr: "Le lanceur envoie des ondes mystérieuses à l’ennemi.\nSon talent devient Simple."
    it: "Chi la usa emette un misterioso raggio psichico\nche trasforma l’abilità del Pokémon colpito in\nDisinvoltura."
    de: "Bestrahlt das Ziel mit mysteriösen Energiewellen.\nBei einem Treffer wird dessen Fähigkeit zu\nWankelmut."
    es: "Lanza una onda psíquica que hace que la habilidad \ndel objetivo pase a ser Simple."
    ko: "수수께끼의 염력파를 상대에게 보낸다.\n염력파를 받은 상대는\n특성이 단순으로 바뀐다."
    zh_simp: "向对手发送谜之念波。\n接收到念波的对手，\n其特性会变为单纯。"
    zh_trad: "向對手發射謎樣的念力波。\n接收了念力波的對手，\n特性會變成單純。"
sing:
  names:
    jp_kana: うたう
    jp_kanji: うたう
    en: Sing
    fr: Berceuse
    it: Canto
    de: Gesang
    es: Canto
    ko: 노래하기
    zh_simp: 唱歌
    zh_trad: 唱歌
  descriptions:
    jp_kana: "ここちよい　きれいな\nうたごえを　きかせて\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "心地好い　きれいな\n歌声を　聞かせて\n相手を　眠り状態に　する。"
    en: "A soothing lullaby is sung in a calming voice that\nputs the target into a deep slumber."
    fr: "Une berceuse plonge l’ennemi dans un profond\nsommeil."
    it: "Dolce ninnananna, cantata da una voce suadente,\nche fa addormentare il bersaglio."
    de: Ein Lied, das das Ziel in tiefen Schlaf versetzt.
    es: "Cancioncilla que hace dormir profundamente al \nobjetivo."
    ko: "기분 좋은 예쁜\n노랫소리를 들려주고\n상대를 잠듦 상태로 만든다."
    zh_simp: "让对手听舒适、\n美妙的歌声，\n从而陷入睡眠状态。"
    zh_trad: "唱出舒服美妙的歌聲，\n讓對手陷入睡眠狀態。"
sinister_arrow_raid:
  names:
    jp_kana: シャドーアローズストライク
    jp_kanji: シャドーアローズストライク
    en: Sinister Arrow Raid
    fr: Fureur des Plumes Spectrales
    it: Dardoassalto Spettrale
    de: Schatten-Pfeilregen
    es: Aluvión de Flechas Sombrías
    ko: 섀도애로우즈스트라이크
    zh_simp: 遮天蔽日暗影箭
    zh_trad: 遮天蔽日暗影箭
  descriptions:
    jp_kana: "Ｚパワーで　むすうの　やを　つくりだした\nジュナイパーが　ぜんりょくで\nあいてを　いぬく　こうげき。"
    jp_kanji: "Ｚパワーで　無数の　矢を　作りだした\nジュナイパーが　全力で\n相手を　射抜く　攻撃。"
    en: "The user, Decidueye, creates countless arrows\nusing its Z-Power and shoots the target with\nfull force."
    fr: "Archéduc utilise la Force Z pour créer un nuage de\nflèches qui transpercent la cible."
    it: "Grazie al Potere Z, Decidueye crea una formazione\ndi frecce che colpisce il bersaglio a gran velocità."
    de: "Silvarro stellt mit Z-Kraft unzählige Pfeile her und\nlässt diese auf das Ziel niederprasseln."
    es: "Decidueye usa el Poder Z para proyectar multitud de\nflechas potentísimas que atraviesan a su oponente."
    ko: "Z파워로 무수한 화살을 만들어낸\n모크나이퍼가 전력으로\n상대를 꿰뚫는 공격이다."
    zh_simp: "通过Ｚ力量制造出\n无数箭的狙射树枭\n将全力射穿对手进行攻击。"
    zh_trad: "透過Ｚ力量製造出\n無數箭的狙射樹梟\n全力射穿對手進行攻擊。"
sketch:
  names:
    jp_kana: スケッチ
    jp_kanji: スケッチ
    en: Sketch
    fr: Gribouille
    it: Schizzo
    de: Nachahmer
    es: Esquema
    ko: 스케치
    zh_simp: 写生
    zh_trad: 寫生
  descriptions:
    jp_kana: "あいてが　つかった　わざを\nじぶんの　ものに　する。\n１かい　つかうと　スケッチは　きえる。"
    jp_kanji: "相手が　使った　技を\n自分の　ものに　する。\n１回　使うと　スケッチは　消える。"
    en: "It enables the user to permanently learn the move\nlast used by the target. Once used,\nSketch disappears."
    fr: "Le lanceur apprend la dernière capacité utilisée\npar la cible. Gribouille disparaît après utilisation."
    it: "Permette a chi la usa di imparare l’ultima mossa\nusata dal bersaglio. La nuova mossa appresa\nsostituisce Schizzo."
    de: "Anwender erlernt die letzte Attacke des Zieles\ndauerhaft. Nachahmer verschwindet nach Gebrauch."
    es: "Aprende de forma permanente el último movimiento \nutilizado por el objetivo. Es de un solo uso."
    ko: "상대가 쓴 기술을\n자신의 것으로 만든다.\n한 번 사용하면 스케치는 사라진다."
    zh_simp: "将对手使用的招式\n变成自己的招式。\n使用１次后写生消失。"
    zh_trad: "將對手使用的招式變成自己的。\n寫生在使用１次之後就會消失。"
skill_swap:
  names:
    jp_kana: スキルスワップ
    jp_kanji: スキルスワップ
    en: Skill Swap
    fr: Échange
    it: Baratto
    de: Wertewechsel
    es: Intercambio
    ko: 스킬스웹
    zh_simp: 特性互换
    zh_trad: 特性互換
  descriptions:
    jp_kana: "ちょうのうりょくで　じぶんの　とくせいと\nあいての　とくせいを　いれかえる。"
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to exchange\nAbilities with the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques\npour échanger son talent avec la cible."
    it: "Chi la usa sfrutta le sue facoltà mentali\nper scambiare l’abilità con il bersaglio."
    de: Anwender tauscht Fähigkeit mit dem Ziel.
    es: "Usa el poder psíquico para intercambiar\nhabilidades con el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
    zh_simp: "利用超能力互换\n自己和对手的特性。"
    zh_trad: "用超能力將自己和\n對手的特性互相交換。"
skull_bash:
  names:
    jp_kana: ロケットずつき
    jp_kanji: ロケットずつき
    en: Skull Bash
    fr: Coud’Krâne
    it: Capocciata
    de: Schädelwumme
    es: Cabezazo
    ko: 로케트박치기
    zh_simp: 火箭头锤
    zh_trad: 火箭頭錘
  descriptions:
    jp_kana: "１ターンめに　あたまを　ひっこめて\nぼうぎょを　あげる。\n２ターンめに　あいてを　こうげきする。"
    jp_kanji: "１ターン目に　頭を　ひっこめて\n防御を　あげる。\n２ターン目に　相手を　攻撃する。"
    en: "The user tucks in its head to raise its Defense\nstat on the first turn, then rams the target on the\nnext turn."
    fr: "Le lanceur baisse la tête pour augmenter sa\nDéfense au premier tour et percuter l’ennemi au\nsecond."
    it: "Chi la usa ritira la testa per aumentare la Difesa\ne poi attacca al turno successivo."
    de: "Der Anwender erhöht in Runde 1 seine Verteidigung\nund greift in Runde 2 an."
    es: "Primer turno: se prepara y sube la Defensa del \nusuario. Segundo turno: da el cabezazo."
    ko: "1턴째에 머리를 움츠려\n방어를 올린다.\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合把头缩进去，\n从而提高防御。\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合把頭後縮，提高防禦。\n並於第２回合攻擊對手。"
sky_attack:
  names:
    jp_kana: ゴッドバード
    jp_kanji: ゴッドバード
    en: Sky Attack
    fr: Piqué
    it: Aeroattacco
    de: Himmelsfeger
    es: Ataque Aéreo
    ko: 불새
    zh_simp: 神鸟猛击
    zh_trad: 神鳥猛擊
  descriptions:
    jp_kana: "２ターンめに　あいてを　こうげきする。\nたまに　ひるませる。\nきゅうしょにも　あたりやすい。"
    jp_kanji: "２ターン目に　相手を　攻撃する。\nたまに　ひるませる。\n急所にも　当たりやすい。"
    en: "A second-turn attack move where critical hits land\nmore easily. This may also make the target flinch."
    fr: "Une attaque en deux tours au taux de critique\nélevé. Peut aussi apeurer l’ennemi."
    it: "Attacco in due turni e probabile brutto colpo.\nPuò anche far tentennare il bersaglio."
    de: "Anwender greift in der zweiten Runde mit hoher\nVolltrefferquote an. Ziel schreckt eventuell zurück."
    es: "Ataque en dos turnos que suele ser crítico.\nPuede hacer retroceder al objetivo."
    ko: "2턴째에 상대를 공격한다.\n가끔 풀죽게 만든다.\n급소에도 맞기 쉽다."
    zh_simp: "第２回合攻击对手。\n偶尔使对手畏缩。\n也容易击中要害。"
    zh_trad: "在使用後的下一回合進行攻擊。\n有時會使對手畏縮。\n且容易擊中要害。"
sky_drop:
  names:
    jp_kana: フリーフォール
    jp_kanji: フリーフォール
    en: Sky Drop
    fr: Chute Libre
    it: Cadutalibera
    de: Freier Fall
    es: Caída Libre
    ko: 프리폴
    zh_simp: 自由落体
    zh_trad: 自由落體
  descriptions:
    jp_kana: "１ターンめで　あいてを　そらへ　つれさり\n２ターンめに　おとして　こうげきする。\nつれさられた　あいては　うごけない。"
    jp_kanji: "１ターン目で　相手を　空へ　連れさり\n２ターン目に　落として　攻撃する。\n連れさられた　相手は　動けない。"
    en: "The user takes the target into the sky, then drops it\nduring the next turn. The target cannot attack while\nin the sky."
    fr: "Le lanceur emmène l’ennemi dans les airs au\npremier tour et le lâche dans le vide au second.\nL’ennemi saisi ne peut pas attaquer."
    it: "Porta il bersaglio in cielo e lo scaglia a terra\nal turno successivo. Il bersaglio catturato non può\nmuoversi."
    de: "Steigt in Runde 1 mit dem Ziel in die Luft auf und\nlässt es in Runde 2 fallen. Das Ziel kann dabei nicht\nangreifen."
    es: "Primer turno: lanza al objetivo al aire. Segundo\nturno: lo hace caer. Mientras está en el aire, no lo \ndeja moverse."
    ko: "1턴째에 상대를 하늘로 끌고 가서\n2턴째에 떨어뜨려 공격한다.\n끌려간 상대는 움직일 수 없다."
    zh_simp: "第１回合将对手带到空中，\n第２回合将其摔下进行攻击。\n被带到空中的对手不能动弹。"
    zh_trad: "使用後的第１回合將對手帶到空中，\n並於第２回合摔下對手進行攻擊。\n被帶到空中的對手將無法行動。"
sky_uppercut:
  names:
    jp_kana: スカイアッパー
    jp_kanji: スカイアッパー
    en: Sky Uppercut
    fr: Stratopercut
    it: Stramontante
    de: Himmelhieb
    es: Gancho Alto
    ko: 스카이업퍼
    zh_simp: 冲天拳
    zh_trad: 衝天拳
  descriptions:
    jp_kana: "そらに　むかうような　たかい　アッパーで\nあいてを　つきあげて　こうげきする。"
    jp_kanji: "空に　むかうような　高い　アッパーで\n相手を　突きあげて　攻撃する。"
    en: "The user attacks the target with an uppercut thrown\nskyward with force."
    fr: "Le lanceur attaque avec un uppercut.\nIl envoie son poing vers le ciel de toutes ses\nforces."
    it: "Chi la usa attacca il bersaglio con un\nmontante che può arrivare fino al cielo."
    de: Kinnhaken, der das Ziel gen Himmel schickt.
    es: Gancho ascendente de gran ímpetu.
    ko: "하늘을 향하는 듯한 높은 업퍼로\n상대를 밀어올려 공격한다."
    zh_simp: "用冲向天空般高高的上勾拳\n顶起对手进行攻击。"
    zh_trad: "用直衝天空般的上勾拳\n高高地打飛對手進行攻擊。"
slack_off:
  names:
    jp_kana: なまける
    jp_kanji: なまける
    en: Slack Off
    fr: Paresse
    it: Pigro
    de: Tagedieb
    es: Relajo
    ko: 태만함
    zh_simp: 偷懒
    zh_trad: 偷懶
  descriptions:
    jp_kana: "なまけて　やすむ。\nじぶんの　ＨＰを　さいだい　ＨＰの\nはんぶん　かいふく　する。"
    jp_kanji: "怠けて　やすむ。\n自分の　ＨＰを　最大ＨＰの\n半分　回復する。"
    en: "The user slacks off, restoring its own HP by up to\nhalf of its max HP."
    fr: "Le lanceur se tourne les pouces et récupère\njusqu’à la moitié de ses PV max."
    it: "Chi la usa si rilassa recuperando metà dei propri\nPS massimi."
    de: "Durch Müßiggang werden KP des Anwenders um\n50 % der maximalen KP aufgefüllt."
    es: "El usuario se relaja y restaura la mitad de sus PS \nmáximos."
    ko: "게으름 피우며 쉰다.\n자신의 HP를 최대 HP의\n절반만큼 회복한다."
    zh_simp: "偷懒休息。\n回复自己最大ＨＰ的一半。"
    zh_trad: "偷懶休息。\n回復自己最大ＨＰ的一半。"
slam:
  names:
    jp_kana: たたきつける
    jp_kanji: たたきつける
    en: Slam
    fr: Souplesse
    it: Schianto
    de: Slam
    es: Atizar
    ko: 힘껏치기
    zh_simp: 摔打
    zh_trad: 摔打
  descriptions:
    jp_kana: "ながい　しっぽや　つるなどを　つかい\nあいてを　たたきつけて　こうげきする。"
    jp_kanji: "長い　しっぽや　つるなどを　使い\n相手を　たたきつけて　攻撃する。"
    en: "The target is slammed with a long tail, vines, or the\nlike to inflict damage."
    fr: "Fouette l’ennemi avec la queue ou une liane,\npar exemple, pour infliger des dégâts."
    it: "Infligge danni al bersaglio con la coda, con una\nliana o con qualcosa di simile."
    de: "Schlag mit einem langen Schweif, einer Ranke oder\nÄhnlichem."
    es: "Golpea con la cola o con lianas, por ejemplo, para\ncausar daño al objetivo."
    ko: "긴 꼬리나 덩굴 등을 사용해\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "使用长长的尾巴或藤蔓等\n摔打对手进行攻击。"
    zh_trad: "將長長的尾巴或藤蔓等\n甩向對手進行攻擊。"
slash:
  names:
    jp_kana: きりさく
    jp_kanji: きりさく
    en: Slash
    fr: Tranche
    it: Lacerazione
    de: Schlitzer
    es: Cuchillada
    ko: 베어가르기
    zh_simp: 劈开
    zh_trad: 劈開
  descriptions:
    jp_kana: "ツメや　カマ　などで\nあいてを　きりさいて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "ツメや　カマなどで\n相手を　切り裂いて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is attacked with a slash of claws or\nblades. Critical hits land more easily."
    fr: "Un coup de griffe ou autre tranche l’ennemi.\nTaux de critique élevé."
    it: "Attacca il bersaglio con artigli, falci o altro.\nProbabile brutto colpo."
    de: "Hieb mit Klauen oder Ähnlichem.\nHohe Volltrefferquote."
    es: "Ataca con cuchillas o con pinzas. Suele dar un golpe \ncrítico."
    ko: "발톱이나 낫 등으로\n상대를 베어 갈라서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用爪子或镰刀等\n劈开对手进行攻击。\n容易击中要害。"
    zh_trad: "用爪子或鐮刀等\n劈開對手進行攻擊。\n容易擊中要害。"
sleep_powder:
  names:
    jp_kana: ねむりごな
    jp_kanji: ねむりごな
    en: Sleep Powder
    fr: Poudre Dodo
    it: Sonnifero
    de: Schlafpuder
    es: Somnífero
    ko: 수면가루
    zh_simp: 催眠粉
    zh_trad: 催眠粉
  descriptions:
    jp_kana: "ねむくなる　こなを\nたくさん　ふりまいて\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "眠くなる　粉を\nたくさん　ふりまいて\n相手を　眠り状態に　する。"
    en: "The user scatters a big cloud of sleep-inducing dust\naround the target."
    fr: "Le lanceur répand une poudre soporifique qui\nendort la cible."
    it: "Investe il bersaglio con una grande nuvola\ndi polvere soporifera che lo fa addormentare."
    de: "Verstreut Schlafpuder, der das Ziel eventuell in\nSchlaf versetzt."
    es: Esparce polvo que duerme al objetivo.
    ko: "잠이 오는 가루를\n많이 흩뿌려서\n상대를 잠듦 상태로 만든다."
    zh_simp: "撒出催眠粉，\n从而让对手陷入睡眠状态。"
    zh_trad: "撒出大量令人想睡的粉末，\n讓對手陷入睡眠狀態。"
sleep_talk:
  names:
    jp_kana: ねごと
    jp_kanji: ねごと
    en: Sleep Talk
    fr: Blabla Dodo
    it: Sonnolalia
    de: Schlafrede
    es: Sonámbulo
    ko: 잠꼬대
    zh_simp: 梦话
    zh_trad: 夢話
  descriptions:
    jp_kana: "じぶんが　おぼえている　わざの　うち\nどれか　１つを　くりだす。\nじぶんが　ねている　ときだけ　つかえる。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses one of the\nmoves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard\npendant qu’il dort."
    it: "Chi la usa sfodera a caso una delle proprie mosse\nmentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm bekannte\nAttacke ein. Klappt nur, wenn der Anwender gerade\nschläft."
    es: "Mientras duerme, usa uno de sus movimientos \nelegido al azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
sludge:
  names:
    jp_kana: ヘドロこうげき
    jp_kanji: ヘドロこうげき
    en: Sludge
    fr: Détritus
    it: Fango
    de: Schlammbad
    es: Residuos
    ko: 오물공격
    zh_simp: 污泥攻击
    zh_trad: 污泥攻擊
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
sludge_bomb:
  names:
    jp_kana: ヘドロばくだん
    jp_kanji: ヘドロばくだん
    en: Sludge Bomb
    fr: Bomb-Beurk
    it: Fangobomba
    de: Matschbombe
    es: Bomba Lodo
    ko: 오물폭탄
    zh_simp: 污泥炸弹
    zh_trad: 污泥炸彈
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
sludge_wave:
  names:
    jp_kana: ヘドロウェーブ
    jp_kanji: ヘドロウェーブ
    en: Sludge Wave
    fr: Cradovague
    it: Fangonda
    de: Schlammwoge
    es: Onda Tóxica
    ko: 오물웨이브
    zh_simp: 污泥波
    zh_trad: 污泥波
  descriptions:
    jp_kana: "ヘドロの　なみで　じぶんの\nまわりに　いるものを　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "The user strikes everything around it by swamping\nthe area with a giant sludge wave. This may also\npoison those hit."
    fr: "Une vague de détritus attaque tous les Pokémon\nautour du lanceur. Peut aussi empoisonner."
    it: "Lancia un’onda di fango che attacca tutti\ni Pokémon nelle vicinanze. Può anche avvelenarli."
    de: "Greift Pokémon in der Nähe des Anwenders mit einer\nSchlammwelle an. Diese werden eventuell vergiftet."
    es: "Una onda tóxica que daña a los Pokémon de\nalrededor. Puede envenenar."
    ko: "오물 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥波攻击\n自己周围所有的宝可梦。\n有时会陷入中毒状态。"
    zh_trad: "用污泥波攻擊\n自己周圍所有的寶可夢。\n有時會讓對手陷入中毒狀態。"
smack_down:
  names:
    jp_kana: うちおとす
    jp_kanji: うちおとす
    en: Smack Down
    fr: Anti-Air
    it: Abbattimento
    de: Katapult
    es: Antiaéreo
    ko: 떨어뜨리기
    zh_simp: 击落
    zh_trad: 擊落
  descriptions:
    jp_kana: "いしや　たまを　なげて　とんでいる\nあいてを　こうげきする。　あいては\nうちおとされて　じめんに　おちる。"
    jp_kanji: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。　相手は\nうち落とされて　地面に　落ちる。"
    en: "The user throws a stone or similar projectile to\nattack an opponent. A flying Pokémon will fall to the\nground when it’s hit."
    fr: "Le lanceur jette toutes sortes de projectiles à\nun ennemi. Si ce dernier vole, il tombe au sol."
    it: "Chi la usa lancia una pietra o un proiettile.\nPuò colpire anche un bersaglio in volo\ne farlo cadere."
    de: "Greift das Ziel mit Steinen und Wurfgeschossen an.\nFliegende Ziele fallen dabei vom Himmel und landen\nauf dem Boden."
    es: "El usuario ataca lanzando una piedra o un proyectil. \nPuede estrellar contra el suelo al objetivo si vuela."
    ko: "돌이나 구슬을 던져서 날고 있는\n상대를 공격한다.\n맞은 상대는 땅에 떨어진다."
    zh_simp: "扔石头或炮弹，\n攻击飞行的对手。\n对手会被击落，掉到地面。"
    zh_trad: "向空中的對手投擲石頭或炮彈等物體\n進行攻擊。對手會被擊落，掉到地面。"
smart_strike:
  names:
    jp_kana: スマートホーン
    jp_kanji: スマートホーン
    en: Smart Strike
    fr: Estocorne
    it: Sottilcorno
    de: Schmalhorn
    es: Cuerno Certero
    ko: 스마트호른
    zh_simp: 修长之角
    zh_trad: 修長之角
  descriptions:
    jp_kana: "とがった　つので　あいてを\nつきさして　こうげきする。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "とがった　つので　相手を\n突き刺して　攻撃する。\n攻撃は　必ず　命中する。"
    en: "The user stabs the target with a sharp horn. This\nattack never misses."
    fr: "Le lanceur transperce la cible avec sa corne effilée.\nTouche toujours l’ennemi."
    it: "Chi la usa colpisce il bersaglio con un corno\nappuntito. Questa mossa va sempre a segno."
    de: "Der Anwender durchbohrt das Ziel mit seinem\nspitzen Horn. Diese Attacke trifft immer."
    es: "Ensarta al adversario con su afilada cornamenta.\nEste movimiento acierta siempre."
    ko: "뾰족한 뿔로 상대를\n꿰찔러서 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "用尖尖的角刺入对手进行攻击。\n攻击必定会命中。"
    zh_trad: "用尖尖的角刺進對手進行攻擊。\n攻擊必定會命中。"
smelling_salts:
  names:
    jp_kana: きつけ
    jp_kanji: きつけ
    en: Smelling Salts
    fr: Stimulant
    it: Maniereforti
    de: Riechsalz
    es: Estímulo
    ko: 정신차리기
    zh_simp: 清醒
    zh_trad: 清醒
  descriptions:
    jp_kana: "まひ　じょうたいの　あいてには\nいりょくが　２ばいに　なるが\nかわりに　あいての　まひが　なおる。"
    jp_kanji: "まひ状態の　相手には\n威力が　２倍に　なるが\nかわりに　相手の　まひが　治る。"
    en: "This attack’s power is doubled when used on a\ntarget with paralysis. This also cures the target’s\nparalysis, however."
    fr: "Cette attaque est doublement efficace sur les\nPokémon paralysés, mais elle soigne leur paralysie."
    it: "Infligge un danno doppio a un bersaglio\nparalizzato, ma ne cura anche la paralisi."
    de: "Doppelt wirksam gegen paralysierte Ziele, heilt sie\naber auch von der Paralyse."
    es: "Hace el doble de daño a objetivos paralizados, \npero también cura la parálisis."
    ko: "마비 상태의 상대에게는\n위력이 2배가 되지만\n대신 상대의 마비가 풀린다."
    zh_simp: "对于麻痹状态下的对手，\n威力会变成２倍。\n但相反对手的麻痹也会被治愈。"
    zh_trad: "攻擊陷入麻痺狀態的對手時，\n威力會變成２倍。\n但也會治癒對手的麻痺。"
smog:
  names:
    jp_kana: スモッグ
    jp_kanji: スモッグ
    en: Smog
    fr: Purédpois
    it: Smog
    de: Smog
    es: Polución
    ko: 스모그
    zh_simp: 浊雾
    zh_trad: 濁霧
  descriptions:
    jp_kana: "よごれた　ガスを\nあいてに　ふきつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚れた　ガスを\n相手に　吹きつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The target is attacked with a discharge of filthy\ngases. This may also poison the target."
    fr: "Le lanceur attaque à l’aide d’une éruption de gaz\nrépugnants. Peut aussi empoisonner l’ennemi."
    it: "Colpisce il bersaglio con una scarica di gas\nmaleodoranti. Può anche avvelenarlo."
    de: "Angriff mit Gas. Das Ziel kann eventuell vergiftet\nwerden."
    es: "El objetivo es atacado con gases tóxicos que\npueden llegar a envenenar."
    ko: "더러운 가스를\n상대에게 내뿜어 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "将肮脏的浓雾\n吹向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的濃霧\n吹向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
smokescreen:
  names:
    jp_kana: えんまく
    jp_kanji: えんまく
    en: Smokescreen
    fr: Brouillard
    it: Muro di Fumo
    de: Rauchwolke
    es: Pantalla de Humo
    ko: 연막
    zh_simp: 烟幕
    zh_trad: 煙幕
  descriptions:
    jp_kana: "けむりや　スミなどを　ふきかけて\nあいての　めいちゅうりつを　さげる。"
    jp_kanji: "煙や　墨などを　吹きかけて\n相手の　命中率を　さげる。"
    en: "The user releases an obscuring cloud of smoke or\nink. This lowers the target’s accuracy."
    fr: "Le lanceur disperse un nuage d’encre ou de\nfumée. Réduit la Précision de l’ennemi."
    it: "Nuvola di fumo o inchiostro che riduce\nla precisione del bersaglio."
    de: "Senkt Genauigkeit des Zieles mit Rauch, Tinte oder\nÄhnlichem."
    es: "Baja la Precisión del objetivo con una nube de humo \no tinta."
    ko: "연기나 먹물을 내뿜어\n상대의 명중률을 떨어뜨린다."
    zh_simp: "向对手喷出烟或墨汁等，\n从而降低对手的命中率。"
    zh_trad: "向對手噴出煙霧或墨汁等，\n降低對手的命中率。"
snarl:
  names:
    jp_kana: バークアウト
    jp_kanji: バークアウト
    en: Snarl
    fr: Aboiement
    it: Urlorabbia
    de: Standpauke
    es: Alarido
    ko: 바크아웃
    zh_simp: 大声咆哮
    zh_trad: 大聲咆哮
  descriptions:
    jp_kana: "まくしたてる　ように　どなりつけて\nあいての　とくこうを　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it’s ranting about something,\nwhich lowers the Sp. Atk stat of opposing Pokémon."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa si mette a urlare per un po’, riducendo\nl’Attacco Speciale dei nemici intorno."
    de: "Wäscht Zielen in der Nähe mit einer ausführlichen\nStandpauke den Kopf und senkt dabei deren\nSpezial-Angriff."
    es: "Ataca con un chillido desagradable que baja el \nAtaque Especial del rival."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "没完没了地大声斥责，\n从而降低对手的特攻。"
    zh_trad: "沒完沒了地向對手大聲咆哮，\n降低對手的特攻。"
snatch:
  names:
    jp_kana: よこどり
    jp_kanji: よこどり
    en: Snatch
    fr: Saisie
    it: Scippo
    de: Übernahme
    es: Robo
    ko: 가로챔
    zh_simp: 抢夺
    zh_trad: 搶奪
  descriptions:
    jp_kana: "あいてが　つかおうと　した\nかいふくわざや　のうりょく　へんかの\nわざを　うばって　じぶんに　つかう。"
    jp_kanji: "相手が　使おうと　した\n回復技や　能力変化の\n技を　うばって　自分に　使う。"
    en: "The user steals the effects of any attempts to use a\nhealing or stat-changing move."
    fr: "Lorsqu’une capacité de soin ou de changement\nde stats est utilisée, le lanceur vole ses effets."
    it: "Chi la usa ruba e utilizza la mossa curativa\no modifica-statistiche che un altro Pokémon\nstava per usare."
    de: "Raubt den Effekt heilender oder Werte verändernder\nAttacken des Zieles."
    es: "Roba el efecto de los movimientos de curación \no de cambio de características que se usen."
    ko: "상대가 사용하려고 한\n회복 기술이나 능력 변화의\n기술을 빼앗아 자신에게 쓴다."
    zh_simp: "将对手打算使用的回复招式\n或能力变化招式夺为己用。"
    zh_trad: "將對手打算使用的回復招式\n或能力變化招式奪為己用。"
snore:
  names:
    jp_kana: いびき
    jp_kanji: いびき
    en: Snore
    fr: Ronflement
    it: Russare
    de: Schnarcher
    es: Ronquido
    ko: 코골기
    zh_simp: 打鼾
    zh_trad: 打鼾
  descriptions:
    jp_kana: "じぶんが　ねている　ときに\nざつおんを　だして　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "自分が　寝ているときに\n雑音を　だして　攻撃する。\n相手を　ひるませることが　ある。"
    en: "This attack can be used only if the user is asleep.\nThe harsh noise may also make the target flinch."
    fr: "Une attaque qui ne fonctionne que si le lanceur\nest endormi. Le boucan peut aussi apeurer\nl’ennemi."
    it: "Mossa da usare solo mentre si dorme. Il chiasso\nassordante può anche far tentennare il bersaglio."
    de: "Attacke nur im Schlaf möglich. Ziel schreckt\neventuell zurück."
    es: "Fuerte ronquido que solo puede usarse dormido. \nPuede hacer retroceder al objetivo."
    ko: "자신이 잠들어 있을 때\n소음을 내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "在自己睡觉时，\n发出噪音进行攻击。\n有时会使对手畏缩。"
    zh_trad: "在自己睡著時，\n發出噪音進行攻擊。\n有時會讓對手畏縮。"
soak:
  names:
    jp_kana: みずびたし
    jp_kanji: みずびたし
    en: Soak
    fr: Détrempage
    it: Inondazione
    de: Überflutung
    es: Anegar
    ko: 물붓기
    zh_simp: 浸水
    zh_trad: 浸水
  descriptions:
    jp_kana: "たくさんの　みずを　あびせかけて\nあいてを　みずタイプに　する。"
    jp_kanji: "たくさんの　水を　浴びせかけて\n相手を　みずタイプに　する。"
    en: "The user shoots a torrent of water at the target and\nchanges the target’s type to Water."
    fr: "Le lanceur projette beaucoup d’eau sur sa cible,\nqui devient de type Eau."
    it: "Chi la usa proietta un lungo getto d’acqua contro\nil bersaglio e lo rende un Pokémon di tipo Acqua."
    de: "Überschüttet das Ziel mit Unmengen an Wasser und\nändert den Typ damit in Wasser um."
    es: "Potente lluvia que transforma al objetivo en un \nPokémon de tipo Agua."
    ko: "많은 물을 끼얹어서\n상대를 물타입으로 바꾼다."
    zh_simp: "将大量的水泼向对手，\n从而使其变成水属性。"
    zh_trad: "朝對手灑下大量的水，\n讓對手變成水屬性。"
soft_boiled:
  names:
    jp_kana: タマゴうみ
    jp_kanji: タマゴうみ
    en: Soft-Boiled
    fr: E-Coque
    it: Covauova
    de: Weichei
    es: Amortiguador
    ko: 알낳기
    zh_simp: 生蛋
    zh_trad: 生蛋
  descriptions:
    jp_kana: "さいだい　ＨＰの　はんぶん\nじぶんの　ＨＰを　かいふく　する。"
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: "The user restores its own HP by up to half of its\nmax HP."
    fr: "Le lanceur récupère jusqu’à la moitié de ses\nPV max."
    it: Chi la usa recupera metà dei propri PS massimi.
    de: "KP des Anwenders werden um 50 % der maximalen\nKP aufgefüllt."
    es: Restaura la mitad de los PS máximos del usuario.
    ko: "자신의 최대 HP 절반을\n회복한다."
    zh_simp: 回复自己最大ＨＰ的一半。
    zh_trad: 回復自己最大ＨＰ的一半。
solar_beam:
  names:
    jp_kana: ソーラービーム
    jp_kanji: ソーラービーム
    en: Solar Beam
    fr: Lance-Soleil
    it: Solarraggio
    de: Solarstrahl
    es: Rayo Solar
    ko: 솔라빔
    zh_simp: 日光束
    zh_trad: 日光束
  descriptions:
    jp_kana: "１ターンめに　ひかりを　いっぱいに\nあつめ　２ターンめに　ひかりの　たばを\nはっしゃして　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "In this two-turn attack, the user gathers light, then\nblasts a bundled beam on the next turn."
    fr: "Absorbe la lumière au premier tour et envoie\nun rayon puissant au tour suivant."
    it: "Chi la usa assorbe luce al primo turno per\nproiettare un raggio intenso al turno successivo."
    de: "Absorbiert Licht in Runde 1. In Runde 2 erfolgt der\nAngriff."
    es: "Primer turno: absorbe luz. Segundo turno: lanza un\npotente rayo de energía."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合发射光束进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合發射光束進行攻擊。"
solar_blade:
  names:
    jp_kana: ソーラーブレード
    jp_kanji: ソーラーブレード
    en: Solar Blade
    fr: Lame Solaire
    it: Lama Solare
    de: Solarklinge
    es: Cuchilla Solar
    ko: 솔라블레이드
    zh_simp: 日光刃
    zh_trad: 日光刃
  descriptions:
    jp_kana: "１ターンめに　ひかりを　いっぱいに\nあつめ　２ターンめに　そのちからを\nけんに　こめて　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　その　力を\n剣に　込めて　攻撃する。"
    en: "In this two-turn attack, the user gathers light and\nfills a blade with the light’s energy, attacking the\ntarget on the next turn."
    fr: "Le lanceur absorbe la lumière au premier tour\net attaque au second tour en libérant cette énergie\nsous forme de lames."
    it: "Chi la usa assorbe la luce condensandola in\nuna lama al primo turno per poi attaccare al\nturno successivo."
    de: "Der Anwender absorbiert in der 1. Runde Licht,\ndas er in der 2. Runde zu einem Schwert formt,\nmit dem er angreift."
    es: "El usuario dedica un turno a absorber energía\nlumínica y concentrarla en forma de cuchilla con la\nque ataca al rival al turno siguiente."
    ko: "1턴째 빛을 가득하게\n모으고 2턴째 그 힘을\n검에 담아 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合将此力量\n集中在剑上进行攻击。"
    zh_trad: "第１回合收集滿滿的日光，\n第２回合將此力量\n集中在劍上並進行攻擊。"
sonic_boom:
  names:
    jp_kana: ソニックブーム
    jp_kanji: ソニックブーム
    en: Sonic Boom
    fr: Sonicboom
    it: Sonicboom
    de: Ultraschall
    es: Bomba Sónica
    ko: 소닉붐
    zh_simp: 音爆
    zh_trad: 音爆
  descriptions:
    jp_kana: "しょうげきはを\nあいてに　ぶつけて　こうげきする。\n２０の　ダメージを　きまって　あたえる。"
    jp_kanji: "衝撃波を\n相手に　ぶつけて　攻撃する。\n２０の　ダメージを　決まって　与える。"
    en: "The target is hit with a destructive shock wave that\nalways inflicts 20 HP damage."
    fr: "Une onde de choc destructrice qui inflige toujours\n20 PV de dégâts."
    it: "Il bersaglio viene colpito da onde acustiche\ndevastanti che gli provocano un danno\npari a 20 PS."
    de: "Das Ziel wird von einer Schockwelle getroffen,\ndie stets 20 KP Schaden anrichtet."
    es: "Lanza ondas de choque que restan 20 PS al\nobjetivo."
    ko: "충격파를\n상대에 부딪쳐서 공격한다.\n언제나 20의 데미지를 준다."
    zh_simp: "将冲击波\n撞向对手进行攻击。\n必定会给予２０的伤害。"
    zh_trad: "向對手發射衝擊波\n進行攻擊。\n固定給予２０的傷害。"
soul_stealing_7_star_strike:
  names:
    jp_kana: しちせいだっこんたい
    jp_kanji: しちせいだっこんたい
    en: Soul-Stealing 7-Star Strike
    fr: Fauche-Âme des Sept Étoiles
    it: Colpo Eptastellare Rubanima
    de: Sternbild des Seelenraubes
    es: Constelación Robaalmas
    ko: 칠성탈혼퇴
    zh_simp: 七星夺魂腿
    zh_trad: 七星奪魂腿
  descriptions:
    jp_kana: "Ｚパワーを　えた　マーシャドーが\nパンチと　キックの　れんぞくわざを\nぜんりょくで　あいてに　たたきこむ。"
    jp_kanji: "Ｚパワーを　得た　マーシャドーが\nパンチと　キックの　連続技を\n全力で　相手に　叩き込む。"
    en: "After obtaining Z-Power, the user, Marshadow,\npunches and kicks the target consecutively\nwith full force."
    fr: "Marshadow concentre toute la Force Z dans ses\npoings et ses pieds pour infliger un déluge de\ncoups à la cible."
    it: "Grazie al Potere Z, Marshadow fa appello a\ntutte le sue forze e colpisce il bersaglio con\nuna scarica di calci e pugni potentissimi."
    de: "Marshadow schlägt mit durch Z-Kraft gestärkten\nSchlägen und Tritten in einer Serien-Attacke auf das\nZiel ein."
    es: "Cuando Marshadow obtiene el Poder Z, lanza una\npotente y continua oleada de puñetazos y patadas\ncon la que castiga a su rival."
    ko: "Z파워를 얻은 마샤도가\n펀치와 킥의 연속기술을\n전력으로 상대에게 퍼붓는다."
    zh_simp: "得到Ｚ力量的玛夏多\n将全力使出拳头和脚踢的\n连续招式叩打对手。"
    zh_trad: "得到Ｚ力量的瑪夏多\n全力使出拳頭和腳踢的\n連續招式叩打對手。"
spacial_rend:
  names:
    jp_kana: あくうせつだん
    jp_kanji: あくうせつだん
    en: Spacial Rend
    fr: Spatio-Rift
    it: Fendispazio
    de: Raumschlag
    es: Corte Vacío
    ko: 공간절단
    zh_simp: 亚空裂斩
    zh_trad: 亞空裂斬
  descriptions:
    jp_kana: "まわりの　くうかんごと　あいてを\nひきさき　ダメージを　あたえる。\nきゅうしょに　あたりやすい。"
    jp_kanji: "周りの　空間ごと　相手を\n引き裂き　ダメージを　与える。\n急所に　当たりやすい。"
    en: "The user tears the target along with the space\naround it. Critical hits land more easily."
    fr: "Le lanceur déchire l’ennemi et l’espace autour\nde lui. Taux de critique élevé."
    it: "Chi la usa lacera il bersaglio e lo spazio che\nlo circonda. Probabile brutto colpo."
    de: "Schwere, raumgreifende Attacke.\nHohe Volltrefferquote."
    es: "Desgarra al objetivo y el espacio a su alrededor. \nSuele ser crítico."
    ko: "주위의 공간과 더불어 상대를\n찢어서 데미지를 준다.\n급소에 맞기 쉽다."
    zh_simp: "将对手连同周围的空间一起\n撕裂并给予伤害。\n容易击中要害。"
    zh_trad: "將對手連同周圍的空間\n一起切開，給予對手傷害。\n容易擊中要害。"
spark:
  names:
    jp_kana: スパーク
    jp_kanji: スパーク
    en: Spark
    fr: Étincelle
    it: Scintilla
    de: Funkensprung
    es: Chispa
    ko: 스파크
    zh_simp: 电光
    zh_trad: 電光
  descriptions:
    jp_kana: "でんきを　まとい\nあいてに　とっしんして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　まとい\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user throws an electrically charged tackle at the\ntarget. This may also leave the target with paralysis."
    fr: "Lance une charge électrique sur l’ennemi.\nPeut aussi le paralyser."
    it: "Colpisce il bersaglio con una scarica elettrica\ne può anche paralizzarlo."
    de: Elektro-Hieb, der das Ziel paralysieren kann.
    es: Ataque eléctrico que puede llegar a paralizar.
    ko: "전기를 둘러\n상대에게 돌진하여 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞身體，\n猛撞對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
sparkling_aria:
  names:
    jp_kana: うたかたのアリア
    jp_kanji: うたかたのアリア
    en: Sparkling Aria
    fr: Aria de l’Écume
    it: Canto Effimero
    de: Schaumserenade
    es: Aria Burbuja
    ko: 물거품아리아
    zh_simp: 泡影的咏叹调
    zh_trad: 泡影的詠歎調
  descriptions:
    jp_kana: "うたうことによって　たくさんの\nバルーンを　ほうしゅつする。\nわざを　うけると　やけどが　なおる。"
    jp_kanji: "歌うことによって　たくさんの\nバルーンを　放出する。\n技を　受けると　やけどが　治る。"
    en: "The user bursts into song, emitting many bubbles.\nAny Pokémon suffering from a burn will be healed\nby the touch of these bubbles."
    fr: "Le lanceur émet plusieurs bulles en chantant.\nSoigne les brûlures des Pokémon touchés par\nces bulles."
    it: "Chi la usa si mette a cantare emettendo tanti\npalloncini d’acqua. I Pokémon che subiscono danni\nda questa mossa guariscono dalle scottature."
    de: "Durch Gesang erzeugte Blasen werden auf das Ziel\ngeschleudert. Alle Pokémon, die dadurch Schaden\nerleiden, werden auch von Verbrennungen geheilt."
    es: "Libera burbujas al cantar. Este movimiento cura las\nquemaduras de los Pokémon que reciban daño."
    ko: "노래 부르는 것으로 많은\n벌룬을 방출한다.\n기술에 맞으면 화상이 낫는다."
    zh_simp: "随着唱歌会放出很多气球。\n受到此招式攻击时，\n灼伤会被治愈。"
    zh_trad: "隨著歌聲放出許多水球。\n受此招式攻擊時，\n灼傷會被治癒。"
spectral_thief:
  names:
    jp_kana: シャドースチール
    jp_kanji: シャドースチール
    en: Spectral Thief
    fr: Clepto-Mânes
    it: Ombrafurto
    de: Diebesschatten
    es: Robasombra
    ko: 섀도스틸
    zh_simp: 暗影偷盗
    zh_trad: 暗影偷盜
  descriptions:
    jp_kana: "あいての　かげに　もぐりこみ\nあいての　のうりょく　アップを\nうばって　こうげきする。"
    jp_kanji: "相手の　影に　潜り込み\n相手の　能力アップを\n奪って　攻撃する。"
    en: "The user hides in the target’s shadow, steals\nthe target’s stat boosts, and then attacks."
    fr: "Le lanceur plonge dans l’ombre de la cible,\nvole ses augmentations de stats et l’attaque."
    it: "Chi la usa ruba gli aumenti delle statistiche\ndel bersaglio, poi si nasconde nella sua ombra\ne lo attacca."
    de: "Der Anwender schleicht sich in den Schatten des\nZieles, stiehlt dessen erhöhte Statuswerte und fügt\nihm Schaden zu."
    es: "El usuario se esconde en la sombra del objetivo y lo\nataca tras robarle las mejoras en sus\ncaracterísticas."
    ko: "상대의 그림자에 숨어들어\n상대의 능력이 올라가는 것을\n뺏어 공격한다."
    zh_simp: "潜入对手的影子进行攻击。\n会夺取对手的能力提升。"
    zh_trad: "潛入對手的影子，\n奪取對手的能力提升進行攻擊。"
speed_swap:
  names:
    jp_kana: スピードスワップ
    jp_kanji: スピードスワップ
    en: Speed Swap
    fr: Permuvitesse
    it: Velociscambio
    de: Initiativetausch
    es: Cambia Velocidad
    ko: 스피드스웹
    zh_simp: 速度互换
    zh_trad: 速度互換
  descriptions:
    jp_kana: "あいての　すばやさと\nじぶんの　すばやさを\nいれかえて　しまう。"
    jp_kanji: "相手の　素早さと\n自分の　素早さを\n入れ替えてしまう。"
    en: The user exchanges Speed stats with the target.
    fr: Intervertit la Vitesse du lanceur et celle de la cible.
    it: "Chi la usa scambia la propria Velocità\ncon quella del bersaglio."
    de: "Der Anwender tauscht seinen Initiative-Wert mit dem\ndes Zieles."
    es: Intercambia su Velocidad por la del oponente.
    ko: "상대의 스피드와\n자신의 스피드를\n교체한다."
    zh_simp: "将对手和自己的速度\n进行互换。"
    zh_trad: "將對手和自己的速度\n進行互換。"
spider_web:
  names:
    jp_kana: クモのす
    jp_kanji: クモのす
    en: Spider Web
    fr: Toile
    it: Ragnatela
    de: Spinnennetz
    es: Telaraña
    ko: 거미집
    zh_simp: 蛛网
    zh_trad: 蛛網
  descriptions:
    jp_kana: "ネバネバした　ほそい　いとを\nグルグルと　からませて　あいてを\nせんとうから　にげられなく　する。"
    jp_kanji: "ネバネバした　細い　糸を\nグルグルと　からませて　相手を\n戦闘から　逃げられなくする。"
    en: "The user ensnares the target with thin, gooey silk\nso it can’t flee from battle."
    fr: "Le lanceur enserre l’ennemi à l’aide d’une fine\nsoie gluante pour l’empêcher de fuir le combat."
    it: "Copre il bersaglio con un filo di seta sottile e\nappiccicoso. Il Pokémon colpito non può fuggire."
    de: Wickelt das Ziel ein. Flucht oder Tausch unmöglich.
    es: "Enreda al objetivo para evitar que abandone el\ncombate."
    ko: "끈적끈적하고 가는 실을\n칭칭 휘감아 상대를\n배틀에서 도망칠 수 없게 한다."
    zh_simp: "将黏糊糊的细丝\n一层一层缠住对手，\n使其不能从战斗中逃走。"
    zh_trad: "用黏糊糊的細絲\n一層一層纏住對手，\n讓對手不能從戰鬥中逃走。"
spike_cannon:
  names:
    jp_kana: とげキャノン
    jp_kanji: とげキャノン
    en: Spike Cannon
    fr: Picanon
    it: Sparalance
    de: Dornkanone
    es: Clavo Cañón
    ko: 가시대포
    zh_simp: 尖刺加农炮
    zh_trad: 尖刺加農炮
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "鋭い　ハリを\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "Sharp spikes are shot at the target in rapid\nsuccession. They hit two to five times in a row."
    fr: "Envoie une rafale de dards.\nPeut toucher de deux à cinq fois."
    it: "Il bersaglio viene colpito da due a cinque volte\nin rapida successione con delle spine."
    de: "Spitze Nadeln treffen das Ziel zwei- bis fünfmal\nhintereinander."
    es: Lanza finas púas que hieren de dos a cinco veces.
    ko: "날카로운 침을\n상대에게 발사해서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "向对手发射\n锐针进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n銳利的針進行攻擊。\n可連續攻擊２～５次。"
spikes:
  names:
    jp_kana: まきびし
    jp_kanji: まきびし
    en: Spikes
    fr: Picots
    it: Punte
    de: Stachler
    es: Púas
    ko: 압정뿌리기
    zh_simp: 撒菱
    zh_trad: 撒菱
  descriptions:
    jp_kana: "あいての　あしもとに　まきびしを\nしかける。こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　足下に　まきびしを\nしかける。交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of spikes at the opposing\nteam’s feet. The trap hurts Pokémon that switch\ninto battle."
    fr: "Le lanceur disperse des piquants sur le sol pour\nblesser tout ennemi qui entre au combat."
    it: "Chi la usa piazza sul terreno una trappola\ndi punte che danneggia i nemici quando\nscendono in campo."
    de: "Der Anwender legt Stacheln aus, die gegnerische\nPokémon verletzen, die in den Kampf gerufen\nwerden."
    es: "Esparce púas alrededor del equipo rival que hieren \na los Pokémon rivales que entran en combate."
    ko: "상대의 발밑에 압정을\n뿌린다. 교체된 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "在对手的脚下扔撒菱。\n对替换出场的对手的宝可梦\n给予伤害。"
    zh_trad: "將撒菱散布在對手的腳下。\n讓對手替換出場的寶可夢\n受到傷害。"
spiky_shield:
  names:
    jp_kana: ニードルガード
    jp_kanji: ニードルガード
    en: Spiky Shield
    fr: Pico-Défense
    it: Agodifesa
    de: Schutzstacheln
    es: Barrera Espinosa
    ko: 니들가드
    zh_simp: 尖刺防守
    zh_trad: 尖刺防守
  descriptions:
    jp_kana: "あいての　こうげきを　ふせぐと\nどうじに　ふれた　あいての\nたいりょくを　けずって　しまう。"
    jp_kanji: "相手の　攻撃を　防ぐと\n同時に　触れた　相手の\n体力を　削って　しまう。"
    en: "In addition to protecting the user from attacks, this\nmove also damages any attacker who makes\ndirect contact."
    fr: "Protège des attaques, et diminue les PV de tout\nattaquant qui entre en contact avec le lanceur."
    it: "Protegge dagli attacchi, riducendo inoltre i PS\ndei Pokémon che entrano in contatto con\nchi la usa."
    de: "Der Anwender wird vor Angriffen geschützt.\nGleichzeitig nehmen alle Pokémon, die mit\nihm in Berührung kommen, Schaden."
    es: "Protege al usuario de ataques, e inflige daño a quien \nse los lance si entra en contacto con él."
    ko: "상대의 공격을 막음과\n동시에 접촉한 상대의\n체력을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n削减接触到自己的对手的体力。"
    zh_trad: "防禦來自對手的攻擊，\n同時削減接觸到自己的\n對手的ＨＰ。"
spirit_shackle:
  names:
    jp_kana: かげぬい
    jp_kanji: かげぬい
    en: Spirit Shackle
    fr: Tisse Ombre
    it: Cucitura d’Ombra
    de: Schattenfessel
    es: Puntada Sombría
    ko: 그림자꿰매기
    zh_simp: 缝影
    zh_trad: 縫影
  descriptions:
    jp_kana: "こうげきと　どうじに\nあいての　かげを　ぬいつけて\nにげられなくする。"
    jp_kanji: "攻撃と　同時に\n相手の　影を　縫い付けて\n逃げられなくする。"
    en: "The user attacks while simultaneously stitching the\ntarget’s shadow to the ground to prevent the target\nfrom escaping."
    fr: "Une attaque qui coud l’ennemi à son ombre,\nce qui l’empêche de s’enfuir."
    it: "Chi la usa attacca il bersaglio e fissa la sua ombra\na terra impedendogli di fuggire."
    de: "Der Anwender greift das Ziel an und näht zugleich\ndessen Schatten am Boden fest, sodass es nicht\nentkommen kann."
    es: "Ataca al oponente y, al mismo tiempo, fija su sombra\nal terreno, impidiendo su huida."
    ko: "공격과 동시에\n상대의 그림자를 꿰매\n도망칠 수 없게 한다."
    zh_simp: "攻击的同时，\n缝住对手的影子，\n使其无法逃走。"
    zh_trad: "攻擊的同時，\n縫住對手的影子，\n使其無法逃走。"
spit_up:
  names:
    jp_kana: はきだす
    jp_kanji: はきだす
    en: Spit Up
    fr: Relâche
    it: Sfoghenergia
    de: Entfessler
    es: Escupir
    ko: 토해내기
    zh_simp: 喷出
    zh_trad: 噴出
  descriptions:
    jp_kana: "たくわえた　ちからを　あいてに　ぶつけて\nこうげきする。たくわえて　いるほど\nいりょくが　あがる。"
    jp_kanji: "蓄えた　力を\n相手に　ぶつけて　攻撃する。\n蓄えているほど　威力が　あがる。"
    en: "The power stored using the move Stockpile is\nreleased at once in an attack. The more power\nis stored, the greater the move’s power."
    fr: "Libère dans une attaque la puissance\nprécédemment accumulée avec Stockage."
    it: "Tutta l’energia accumulata in precedenza\ncon Accumulo è rilasciata nell’attacco.\nMaggiore è l’energia, più danni si arrecano."
    de: "Entlädt die Kraft, die während des Einsatzes von\nHorter gesammelt wurde. Je mehr Energie gehortet\nwurde, desto stärker der Angriff."
    es: "Libera de una vez la energía acumulada con Reserva.\nLa potencia del ataque será proporcional a la\ncantidad de energía acumulada."
    ko: "비축된 힘을\n상대에게 부딪쳐서 공격한다.\n비축된 만큼 위력이 올라간다."
    zh_simp: "将积蓄的力量\n撞向对手进行攻击。\n积蓄得越多，威力越大。"
    zh_trad: "將蓄積的力量\n撞向對手進行攻擊。\n蓄積得越多，威力越大。"
spite:
  names:
    jp_kana: うらみ
    jp_kanji: うらみ
    en: Spite
    fr: Dépit
    it: Dispetto
    de: Groll
    es: Rencor
    ko: 원한
    zh_simp: 怨恨
    zh_trad: 怨恨
  descriptions:
    jp_kana: "あいてが　さいごに　つかった　わざに\nうらみを　いだいて\nそのわざの　ＰＰを　４だけ　へらす。"
    jp_kanji: "相手が　最後に　使った技に\n恨みを　抱いて\nその技の　ＰＰを　４だけ　減らす。"
    en: "The user unleashes its grudge on the move last used\nby the target by cutting 4 PP from it."
    fr: "Le lanceur exprime son ressentiment en retirant\n4 PP de la dernière attaque de l’ennemi."
    it: "Chi la usa sfoga la propria rabbia sull’ultima mossa\nusata dal bersaglio e le sottrae quattro PP."
    de: "AP der letzten Attacke des Zieles werden um 4\ngesenkt."
    es: "Da rienda suelta a su rencor para reducir cuatro PP \ndel último movimiento usado por el objetivo."
    ko: "상대가 마지막으로\n사용한 기술에 원한을 품어\n그 기술의 PP를 4만큼 줄인다."
    zh_simp: "对对手最后使用的招式\n怀有怨恨，\n减少４ＰＰ该招式。"
    zh_trad: "向對手最近一次使用的招式\n發出怨念，\n讓該招式減少４ＰＰ。"
splash:
  names:
    jp_kana: はねる
    jp_kanji: はねる
    en: Splash
    fr: Trempette
    it: Splash
    de: Platscher
    es: Salpicadura
    ko: 튀어오르기
    zh_simp: 跃起
    zh_trad: 躍起
  descriptions:
    jp_kana: "こうげきも　せずに　ピョン　ピョンと\nはねるだけで　なにも　おこらない……。"
    jp_kanji: "攻撃もせずに　ピョン　ピョンと\n跳ねるだけで　なにも　おこらない……。"
    en: "The user just flops and splashes around to no effect\nat all..."
    fr: "Le lanceur barbote et éclabousse les environs.\nCette capacité n’a aucun effet."
    it: "Chi la usa sguazza nell’acqua, senza ottenere\nalcun effetto."
    de: Nur ein Platscher, der überhaupt nichts bewirkt.
    es: No tiene ningún efecto. Solo salpica.
    ko: "공격도 하지 않고 팔딱팔딱 튈 뿐\n아무 일도 일어나지 않는다..."
    zh_simp: "也不攻击只是一蹦一蹦地跳，\n什么都不会发生……"
    zh_trad: "不攻擊對手，只是蹦蹦跳跳的，\n什麼事也不會發生……"
spore:
  names:
    jp_kana: キノコのほうし
    jp_kanji: キノコのほうし
    en: Spore
    fr: Spore
    it: Spora
    de: Pilzspore
    es: Espora
    ko: 버섯포자
    zh_simp: 蘑菇孢子
    zh_trad: 蘑菇孢子
  descriptions:
    jp_kana: "さいみん　こうかの　ある\nほうしを　パラパラと　ふりまき\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "催眠効果の　ある\n胞子を　パラパラと　ふりまき\n相手を　眠り状態に　する。"
    en: "The user scatters bursts of spores that\ninduce sleep."
    fr: Le lanceur répand un nuage de spores qui endort.
    it: "Nube di spore che fa sempre addormentare\nil bersaglio."
    de: "Erzeugt eine Sporenwolke, die das Ziel in Schlaf\nversetzt."
    es: Esparce esporas que inducen al sueño.
    ko: "최면 효과가 있는\n포자를 훌훌 흩뿌려서\n상대를 잠듦 상태로 만든다."
    zh_simp: "沙沙沙地撒满具有\n催眠效果的孢子，\n从而让对手陷入睡眠状态。"
    zh_trad: "大把撒出有催眠效果的孢子，\n讓對手陷入睡眠狀態。"
spotlight:
  names:
    jp_kana: スポットライト
    jp_kanji: スポットライト
    en: Spotlight
    fr: Projecteur
    it: Riflettore
    de: Rampenlicht
    es: Foco
    ko: 스포트라이트
    zh_simp: 聚光灯
    zh_trad: 聚光燈
  descriptions:
    jp_kana: "ポケモンに　スポットライトを　あて\nそのターンに　そのポケモンしか\nねらえない　ようにする。"
    jp_kanji: "ポケモンに　スポットライトを　当て\nそのターンに　そのポケモンしか\n狙えない　ようにする。"
    en: "The user shines a spotlight on the target so that\nonly the target will be attacked during the turn."
    fr: "Met un Pokémon sous le feu des projecteurs\net force tout le monde à le viser."
    it: "Chi la usa accende un riflettore sopra il bersaglio\ndeviando su di lui per quel turno tutti gli attacchi\ndei suoi nemici."
    de: "Der Anwender lenkt die Aufmerksamkeit auf das Ziel,\nsodass in dieser Runde nur noch dieses Pokémon\nangegriffen wird."
    es: "Convierte a uno de los Pokémon que están\ncombatiendo en el foco de atención, de modo que\ntodos los ataques se dirijan hacia él."
    ko: "포켓몬에게 스포트라이트를 비춰\n그 턴에서 그 포켓몬만\n공격할 수 있게 한다."
    zh_simp: "给宝可梦打上聚光灯，\n该回合只能瞄准该宝可梦。"
    zh_trad: "幫寶可夢打聚光燈，\n該回合只能瞄準該寶可夢。"
stealth_rock:
  names:
    jp_kana: ステルスロック
    jp_kanji: ステルスロック
    en: Stealth Rock
    fr: Piège de Roc
    it: Levitoroccia
    de: Tarnsteine
    es: Trampa Rocas
    ko: 스텔스록
    zh_simp: 隐形岩
    zh_trad: 隱形岩
  descriptions:
    jp_kana: "あいての　まわりに　むすうの　いわを\nうかべて　こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones around the\nopposing team. The trap hurts opposing Pokémon\nthat switch into battle."
    fr: "Lance des pierres flottantes autour de l’ennemi,\nqui blessent tout adversaire entrant au combat."
    it: "Chi la usa piazza una trappola di rocce sospese\nche danneggia i nemici che entrano in campo."
    de: "Falle mit schwebenden Steinen. In den Kampf\neingewechselte Ziele nehmen Schaden."
    es: "Una trampa de rocas que flota en el aire y daña a \nlos objetivos que entran en combate."
    ko: "상대의 주위에 무수한 바위를\n띄워 교체해서 나온 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "将无数岩石悬浮在对手的周围，\n从而对替换出场的对手的\n宝可梦给予伤害。"
    zh_trad: "在對手周圍撒下無數飄浮的岩石，\n讓對手替換出場的寶可夢受到傷害。"
steam_eruption:
  names:
    jp_kana: スチームバースト
    jp_kanji: スチームバースト
    en: Steam Eruption
    fr: Jet de Vapeur
    it: Vaporscoppio
    de: Dampfschwall
    es: Chorro de Vapor
    ko: 스팀버스트
    zh_simp: 蒸汽爆炸
    zh_trad: 蒸汽爆炸
  descriptions:
    jp_kana: "ものすごく　あつい　じょうきを\nあいてに　あびせる。\nあいては　やけどする　ことがある。"
    jp_kanji: "ものすごく　熱い　蒸気を\n相手に　浴びせる。\n相手は　やけどする　ことがある。"
    en: "The user immerses the target in superheated steam.\nThis may also leave the target with a burn."
    fr: "Plonge l’ennemi dans une chaleur étouffante.\nPeut le brûler."
    it: "Travolge il bersaglio con un’ondata di vapore\nrovente che può anche scottarlo."
    de: "Der Anwender feuert einen siedend heißen\nDampfschwall auf das Ziel ab. Dieses kann\ndabei Verbrennungen erleiden."
    es: "Envuelve al Pokémon oponente con vapor\nextremadamente caliente que puede llegar a\nquemarlo."
    ko: "상대에게 굉장히 뜨거운\n증기를 뿜는다.\n상대는 화상을 입기도 한다."
    zh_simp: "将滚烫的蒸汽喷向对手。\n有时会让对手灼伤。"
    zh_trad: "將超高溫的蒸汽噴向對手。\n有時會讓對手陷入灼傷狀態。"
steamroller:
  names:
    jp_kana: ハードローラー
    jp_kanji: ハードローラー
    en: Steamroller
    fr: Bulldoboule
    it: Rulloduro
    de: Quetschwalze
    es: Rodillo de Púas
    ko: 하드롤러
    zh_simp: 疯狂滚压
    zh_trad: 瘋狂滾壓
  descriptions:
    jp_kana: "まるめた　からだで　かいてんして\nあいてを　おしつぶす。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "まるめた　体で　回転して\n相手を　おしつぶす。\n相手を　ひるませることが　ある。"
    en: "The user crushes its target by rolling over the target\nwith its rolled-up body. This may also make the\ntarget flinch."
    fr: "Le lanceur se roule en boule et écrase son ennemi.\nPeut aussi l’apeurer."
    it: "Chi la usa ruota su se stesso e schiaccia il bersaglio.\nPuò anche farlo tentennare."
    de: "Anwender rollt mit rundlichem Körper über das Ziel\nund drückt es platt. Ziel schreckt eventuell zurück."
    es: "El usuario se hace una bola y arrolla al objetivo con \nsu cuerpo. Puede hacerlo retroceder."
    ko: "둥글게 뭉친 몸을 회전하여\n상대를 뭉개 버린다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "旋转揉成团的身体\n压扁对手。\n有时会使对手畏缩。"
    zh_trad: "旋轉蜷縮成圓形的身體，\n壓扁對手。\n有時會使對手畏縮。"
steel_wing:
  names:
    jp_kana: はがねのつばさ
    jp_kanji: はがねのつばさ
    en: Steel Wing
    fr: Aile d’Acier
    it: Alacciaio
    de: Stahlflügel
    es: Ala de Acero
    ko: 강철날개
    zh_simp: 钢翼
    zh_trad: 鋼翼
  descriptions:
    jp_kana: "かたい　つばさを　あいてに　たたきつけて\nこうげきする。　じぶんの　ぼうぎょが\nあがることが　ある。"
    jp_kanji: "硬い　翼を　相手に　たたきつけて\n攻撃する。　自分の　防御が\nあがることが　ある。"
    en: "The target is hit with wings of steel. This may also\nraise the user’s Defense stat."
    fr: "Le lanceur frappe l’ennemi avec des ailes d’acier.\nPeut aussi augmenter la Défense du lanceur."
    it: "Colpisce il bersaglio con ali d’acciaio. Può anche\naumentare la Difesa di chi la usa."
    de: "Trifft das Ziel mit Stahlflügeln. Verteidigungs-Wert\ndes Anwenders steigt eventuell."
    es: "Alas macizas que golpean al objetivo y pueden subir \nla Defensa del usuario."
    ko: "단단한 날개를 상대에게 부딪쳐서\n공격한다. 자신의 방어가\n올라갈 때가 있다."
    zh_simp: "用坚硬的翅膀敲打\n对手进行攻击。\n有时会提高自己的防御。"
    zh_trad: "用堅硬的翅膀撞擊\n對手進行攻擊。\n有時會提高自己的防禦。"
sticky_web:
  names:
    jp_kana: ねばねばネット
    jp_kanji: ねばねばネット
    en: Sticky Web
    fr: Toile Gluante
    it: Rete Vischiosa
    de: Klebenetz
    es: Red Viscosa
    ko: 끈적끈적네트
    zh_simp: 黏黏网
    zh_trad: 黏黏網
  descriptions:
    jp_kana: "あいての　まわりに　ねばねばした\nネットを　はりめぐらせ　こうたいで\nでてきた　あいての　すばやさを　さげる。"
    jp_kanji: "相手の　周りに　ねばねばした\nネットを　はりめぐらせ　交代で\nでてきた　相手の　素早さを　さげる。"
    en: "The user weaves a sticky net around the opposing\nteam, which lowers their Speed stat upon switching\ninto battle."
    fr: "Déploie une toile visqueuse autour de l’ennemi\nqui ralentit la Vitesse de tout adversaire entrant\nau combat."
    it: "Chi la usa intreccia una rete appiccicosa attorno\nalla squadra avversaria, diminuendo la Velocità dei\nPokémon nemici che entreranno in campo."
    de: "Der Anwender spinnt in der Umgebung des\ngegnerischen Teams ein klebriges Netz und senkt\nso die Initiative neu eingewechselter Pokémon."
    es: "Coloca una red pegajosa alrededor del equipo rival, \nhaciendo que baje la Velocidad de cualquier \nPokémon adversario que entre al combate."
    ko: "상대의 주위에 끈적끈적한\n네트를 둘러 펼쳐 교체되어\n나온 상대의 스피드를 떨어뜨린다."
    zh_simp: "在对手周围围上黏黏的网，\n降低替换出场的对手的速度。"
    zh_trad: "在對手周圍撒下黏黏的網，\n降低替換出場的對手的速度。"
stockpile:
  names:
    jp_kana: たくわえる
    jp_kanji: たくわえる
    en: Stockpile
    fr: Stockage
    it: Accumulo
    de: Horter
    es: Reserva
    ko: 비축하기
    zh_simp: 蓄力
    zh_trad: 蓄力
  descriptions:
    jp_kana: "ちからを　たくわえて　じぶんの\nぼうぎょと　とくぼうを　あげる。\nさいだい　３かいまで　たくわえられる。"
    jp_kanji: "力を　蓄えて　自分の\n防御と　特防を　あげる。\n最大　３回まで　蓄えられる。"
    en: "The user charges up power and raises both its\nDefense and Sp. Def stats. The move can be used\nthree times."
    fr: "Le lanceur accumule de la puissance et augmente\nsa Défense et sa Défense Spéciale.\nPeut être utilisé trois fois."
    it: "Chi la usa accumula energia aumentando\nla Difesa e la Difesa Speciale.\nSi può utilizzare tre volte."
    de: "Lädt Kraft für später auf. Erhöht Verteidigung und\nSpezial-Verteidigung. Kann bis zu dreimal eingesetzt\nwerden."
    es: "Acumula energía y sube la Defensa y la Defensa \nEspecial. Puede utilizarse hasta tres veces."
    ko: "힘을 비축해서 자신의\n방어와 특수방어를 올린다.\n최대 3회까지 비축할 수 있다."
    zh_simp: "积蓄力量，\n提高自己的防御和特防。\n最多积蓄３次。"
    zh_trad: "蓄積力量，\n提高自己的防禦和特防。\n最多蓄積３次。"
stoked_sparksurfer:
  names:
    jp_kana: ライトニングサーフライド
    jp_kanji: ライトニングサーフライド
    en: Stoked Sparksurfer
    fr: Électro-Surf Survolté
    it: Elettrosurf Folgorante
    de: Blitz-Wellenritt
    es: Surfeo Galvánico
    ko: 라이트닝서프라이드
    zh_simp: 驾雷驭电戏冲浪
    zh_trad: 駕雷馭電戲衝浪
  descriptions:
    jp_kana: "Ｚパワーを　えた　アローラちほうの\nライチュウが　ぜんりょくで　こうげきする。\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "Ｚパワーを　得た　アローラ地方の\nライチュウが　全力で　攻撃する。\n相手を　まひ　状態に　する。"
    en: "After obtaining Z-Power, the user, Alolan Raichu,\nattacks the target with full force. This move leaves\nthe target with paralysis."
    fr: "Le Raichu de la région d’Alola utilise la Force Z\npour frapper la cible et la paralyser."
    it: "Grazie al Potere Z, il Raichu di Alola attacca\ncon tutta la sua potenza e paralizza il bersaglio."
    de: "Das Alola-Raichu greift das Ziel mithilfe von Z-Kraft\nmit voller Wucht an und paralysiert es."
    es: "Cuando un Raichu de Alola obtiene el Poder Z, lanza\nun potente ataque contra su enemigo y lo deja\nparalizado."
    ko: "Z파워를 얻은 알로라지방의\n라이츄가 전력으로 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "得到Ｚ力量的阿罗拉地区的\n雷丘将全力进行攻击。\n从而让对手陷入麻痹状态。"
    zh_trad: "得到Ｚ力量的阿羅拉地區的\n雷丘全力進行攻擊。\n讓對手陷入麻痺狀態。"
stomp:
  names:
    jp_kana: ふみつけ
    jp_kanji: ふみつけ
    en: Stomp
    fr: Écrasement
    it: Pestone
    de: Stampfer
    es: Pisotón
    ko: 짓밟기
    zh_simp: 踩踏
    zh_trad: 踩踏
  descriptions:
    jp_kana: "おおきな　あしで\nあいてを　ふみつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　足で\n相手を　踏みつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The target is stomped with a big foot. This may also\nmake the target flinch."
    fr: "Écrase l’ennemi avec un énorme pied.\nPeut aussi l’apeurer."
    it: "Colpisce il bersaglio con un grosso piede\ne può anche farlo tentennare."
    de: "Stampfen mit dem Fuß. Das Ziel schreckt eventuell\nzurück."
    es: "Tremendo pisotón que puede hacer retroceder al \nobjetivo."
    ko: "큰 발로\n상대를 짓밟아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用大脚踩踏对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用大腳踩踏對手進行攻擊。\n有時會讓對手畏縮。"
stomping_tantrum:
  names:
    jp_kana: じだんだ
    jp_kanji: じだんだ
    en: Stomping Tantrum
    fr: Trépignement
    it: Battipiedi
    de: Fruststampfer
    es: Pataleta
    ko: 분함의발구르기
    zh_simp: 跺脚
    zh_trad: 跺腳
  descriptions:
    jp_kana: "くやしさを　バネにして　こうげきする。\nまえの　ターンに　わざを　はずしていると\nいりょくが　ばいに　なる。"
    jp_kanji: "悔しさを　バネにして　攻撃する。\n前の　ターンに　技を　外していると\n威力が　倍に　なる。"
    en: "Driven by frustration, the user attacks the target. If\nthe user’s previous move has failed, the power of\nthis move doubles."
    fr: "Le lanceur attaque en utilisant sa frustration. S’il a\nutilisé une capacité qui a échoué au tour précédent,\nla puissance de Trépignement est doublée."
    it: "Chi la usa attacca battendo i piedi per la rabbia.\nSe la mossa usata al turno precedente non è\nandata a segno, la potenza raddoppia."
    de: "Von Frust getrieben greift der Anwender an. Wenn\nseine vorige Attacke fehlgeschlagen ist, verdoppelt\nsich die Stärke der Attacke."
    es: "Usa la frustración como revulsivo para atacar. La\npotencia de Pataleta se duplica si el usuario ha\nfallado el último movimiento usado."
    ko: "분함을 발판삼아 공격한다.\n앞 턴에서 기술이 빗나갔다면\n위력이 배가 된다."
    zh_simp: "化悔恨为力量进行攻击。\n如果上一回合招式没有打中，\n威力就会翻倍。"
    zh_trad: "化悔恨為力量進行攻擊。\n如果上一回合的招式沒有命中，\n威力就會加倍。"
stone_edge:
  names:
    jp_kana: ストーンエッジ
    jp_kanji: ストーンエッジ
    en: Stone Edge
    fr: Lame de Roc
    it: Pietrataglio
    de: Steinkante
    es: Roca Afilada
    ko: 스톤에지
    zh_simp: 尖石攻击
    zh_trad: 尖石攻擊
  descriptions:
    jp_kana: "とがった　いわを\nあいてに　つきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target from below with\nsharpened stones. Critical hits land more easily."
    fr: "Fait surgir des pierres aiguisées sous l’ennemi.\nTaux de critique élevé."
    it: "Chi la usa colpisce il bersaglio dal basso con\npietre affilate. Probabile brutto colpo."
    de: "Anwender sticht das Ziel mit spitzen Steinen.\nHohe Volltrefferquote."
    es: "Clava piedras muy afiladas al objetivo. Suele ser \ncrítico."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
stored_power:
  names:
    jp_kana: アシストパワー
    jp_kanji: アシストパワー
    en: Stored Power
    fr: Force Ajoutée
    it: Veicolaforza
    de: Kraftvorrat
    es: Poder Reserva
    ko: 어시스트파워
    zh_simp: 辅助力量
    zh_trad: 輔助力量
  descriptions:
    jp_kana: "ちくせき　された　パワーで　あいてを\nこうげきする。じぶんの　のうりょくが\nあがって　いるほど　いりょくが　あがる。"
    jp_kanji: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    en: "The user attacks the target with stored power. The\nmore the user’s stats are raised, the greater the\nmove’s power."
    fr: "Le lanceur attaque l’ennemi avec une force\naccumulée. Plus les stats du lanceur sont\naugmentées, plus le coup est efficace."
    it: "Attacca il bersaglio con l’energia accumulata.\nPiù sono state aumentate le statistiche, maggiore\nè il danno inflitto."
    de: "Angriff mit angesparter Energie. Je höher die\nStatuswerte des Anwenders, desto stärker fällt\ndie Attacke aus."
    es: "Acumula poder para golpear. Cuanto más suban \nlas características del usuario, mayor será el daño."
    ko: "축적된 파워로 상대를\n공격한다. 자신의 능력이\n올라가 있는 만큼 위력이 오른다."
    zh_simp: "用蓄积起来的力量攻击对手。\n自己的能力提高得越多，\n威力就越大。"
    zh_trad: "用蓄積的力量攻擊對手。\n自己的能力提高越多，\n招式的威力越大。"
storm_throw:
  names:
    jp_kana: やまあらし
    jp_kanji: やまあらし
    en: Storm Throw
    fr: Yama Arashi
    it: Tempestretta
    de: Bergsturm
    es: Llave Corsé
    ko: 업어후리기
    zh_simp: 山岚摔
    zh_trad: 山嵐摔
  descriptions:
    jp_kana: "きょうれつな　いちげきを\nあいてに　くりだす。こうげきは\nかならず　きゅうしょに　あたる。"
    jp_kanji: "強烈な　一撃を\n相手に　くりだす。攻撃は\n必ず　急所に　当たる。"
    en: "The user strikes the target with a fierce blow. This\nattack always results in a critical hit."
    fr: "Un coup très puissant dont l’effet est toujours\ncritique."
    it: "Chi la usa sferra un colpo micidiale al bersaglio.\nBrutto colpo assicurato."
    de: Ein Angriff mit voller Wucht und Volltreffergarantie.
    es: "Lanza un golpe fulminante. Siempre asesta un golpe\ncrítico."
    ko: "강렬한 일격을\n상대에게 날린다. 공격은\n반드시 급소에 맞는다."
    zh_simp: "向对手使出强烈的一击。\n攻击必定会击中要害。"
    zh_trad: "向對手發動強烈的一擊。\n一定會擊中要害。"
strength:
  names:
    jp_kana: かいりき
    jp_kanji: かいりき
    en: Strength
    fr: Force
    it: Forza
    de: Stärke
    es: Fuerza
    ko: 괴력
    zh_simp: 怪力
    zh_trad: 怪力
  descriptions:
    jp_kana: "こんしんの　ちからで\nあいてを　なぐりつけて　こうげきする。"
    jp_kanji: "こん身の　力で\n相手を　なぐりつけて　攻撃する。"
    en: "The target is slugged with a punch thrown at\nmaximum power."
    fr: Le lanceur cogne l’ennemi de toutes ses forces.
    it: Colpisce il bersaglio con un’enorme energia.
    de: Das Ziel wird extrem stark getroffen.
    es: Propina un potente puñetazo con todas sus fuerzas.
    ko: "혼신의 힘으로\n상대를 세게 때려서 공격한다."
    zh_simp: "使出浑身力气\n殴打对手进行攻击。"
    zh_trad: "使出渾身力量\n毆打對手進行攻擊。"
strength_sap:
  names:
    jp_kana: ちからをすいとる
    jp_kanji: ちからをすいとる
    en: Strength Sap
    fr: Vol-Force
    it: Assorbiforza
    de: Kraftabsorber
    es: Absorbefuerza
    ko: 힘흡수
    zh_simp: 吸取力量
    zh_trad: 吸取力量
  descriptions:
    jp_kana: "あいての　こうげきりょくと　おなじだけ\nじぶんの　ＨＰを　かいふくする。\nそして　あいての　こうげきを　さげる。"
    jp_kanji: "相手の　攻撃力と　同じだけ\n自分の　ＨＰを　回復する。\nそして　相手の　攻撃を　さげる。"
    en: "The user restores its HP by the same amount as the\ntarget’s Attack stat. It also lowers the target’s\nAttack stat."
    fr: "Rend au lanceur une quantité de PV équivalente\nà la stat d’Attaque de la cible, puis baisse celle-ci."
    it: "Fa recuperare una quantità di PS pari all’Attacco\ndel bersaglio, che vedrà diminuire questa statistica."
    de: "Ein Angriff, der die KP des Anwenders um die Höhe\ndes Angriffs-Werts des Zieles heilt. Anschließend\nwird der Angriff des Zieles gesenkt."
    es: "Restaura una cantidad de PS equivalente al valor de\nAtaque del rival, que además verá reducida esta\ncaracterística."
    ko: "상대 공격력과 동일하게\n자신의 HP를 회복한다.\n그리고 상대의 공격을 떨어뜨린다."
    zh_simp: "给自己回复和对手攻击力\n相同数值的ＨＰ，\n然后降低对手的攻击。"
    zh_trad: "將自己的ＨＰ回復到和\n對手的攻擊力相同。\n然後降低對手的攻擊。"
string_shot:
  names:
    jp_kana: いとをはく
    jp_kanji: いとをはく
    en: String Shot
    fr: Sécrétion
    it: Millebave
    de: Fadenschuss
    es: Disparo Demora
    ko: 실뿜기
    zh_simp: 吐丝
    zh_trad: 吐絲
  descriptions:
    jp_kana: "くちから　ふきだした\nいとを　まきつけて　あいての\nすばやさを　がくっと　さげる。"
    jp_kanji: "口から　吹きだした\n糸を　まきつけて　相手の\n素早さを　がくっと　さげる。"
    en: "The opposing Pokémon are bound with silk blown\nfrom the user’s mouth that harshly lowers the\nSpeed stat."
    fr: "Le lanceur crache de la soie pour ligoter l’ennemi\net beaucoup baisser sa Vitesse."
    it: "Chi la usa produce della seta che avvolge\ni nemici intorno e ne riduce di molto la Velocità."
    de: "Umwickelt Gegner in der Nähe mit Fäden aus dem\nMund und senkt den Initiative-Wert."
    es: "Lanza seda a los rivales y reduce mucho su\nVelocidad."
    ko: "입에서 뿜어낸\n실을 휘감아서 상대의\n스피드를 크게 떨어뜨린다."
    zh_simp: "用口中吐出的丝缠绕对手，\n从而大幅降低对手的速度。"
    zh_trad: "用口中吐出的絲纏繞對手，\n大幅降低對手的速度。"
struggle:
  names:
    jp_kana: わるあがき
    jp_kanji: わるあがき
    en: Struggle
    fr: Lutte
    it: Scontro
    de: Verzweifler
    es: Forcejeo
    ko: 발버둥
    zh_simp: 挣扎
    zh_trad: 掙扎
  descriptions:
    jp_kana: "じぶんの　ＰＰが　なくなると\nあがいて　あいてを　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "自分の　ＰＰが　なくなると\nあがいて　相手を　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "This attack is used in desperation only if the user\nhas no PP. It also damages the user a little."
    fr: "Une attaque désespérée, utilisée quand le lanceur\nn’a plus de PP. Le blesse aussi légèrement."
    it: "Mossa da usare solo in caso estremo, quando\nnon si hanno più PP. Danneggia anche chi la usa."
    de: "Angriff nur bei verbrauchten AP. Anwender verletzt\nsich selbst leicht."
    es: "Solo se usa como último recurso al acabarse los PP. \nHiere un poco al agresor."
    ko: "자신의 PP가 떨어지면\n발버둥 쳐 상대를 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "当自己的ＰＰ耗尽时，\n努力挣扎攻击对手。\n自己也会受到少许伤害。"
    zh_trad: "在自己的ＰＰ耗盡時，\n努力掙扎攻擊對手。\n自己也會受到少許傷害。"
struggle_bug:
  names:
    jp_kana: むしのていこう
    jp_kanji: むしのていこう
    en: Struggle Bug
    fr: Survinsecte
    it: Entomoblocco
    de: Käfertrutz
    es: Estoicismo
    ko: 벌레의저항
    zh_simp: 虫之抵抗
    zh_trad: 蟲之抵抗
  descriptions:
    jp_kana: "ていこう　して　あいてを　こうげきする。\nあいての　とくこうを　さげる。"
    jp_kanji: "抵抗して　相手を　攻撃する。\n相手の　特攻を　さげる。"
    en: "While resisting, the user attacks the opposing\nPokémon. This lowers the Sp. Atk stat of those hit."
    fr: "Le lanceur se débat de toutes ses forces, et\nbaisse l’Attaque Spéciale de l’ennemi."
    it: "Colpisce i nemici intorno opponendo resistenza\ne riducendo il loro Attacco Speciale."
    de: "Anwender leistet Widerstand und greift an.\nDer Spezial-Angriff der Ziele sinkt."
    es: "El usuario opone resistencia y ataca a los oponentes. \nTambién reduce su Ataque Especial."
    ko: "저항해서 상대를 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "抵抗并攻击对手。\n降低对手的特攻。"
    zh_trad: "抵抗對手進行攻擊。\n可降低對手的特攻。"
stun_spore:
  names:
    jp_kana: しびれごな
    jp_kanji: しびれごな
    en: Stun Spore
    fr: Para-Spore
    it: Paralizzante
    de: Stachelspore
    es: Paralizador
    ko: 저리가루
    zh_simp: 麻痹粉
    zh_trad: 麻痺粉
  descriptions:
    jp_kana: "しびれる　こなを\nたくさん　ふりまいて\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "しびれる　粉を\nたくさん　ふりまいて\n相手を　まひ状態に　する。"
    en: "The user scatters a cloud of numbing powder that\nparalyzes the target."
    fr: "Le lanceur répand sur l’ennemi une poudre qui\nle paralyse."
    it: "Investe il bersaglio con una nuvola di polvere\nche paralizza."
    de: "Verstreut lähmenden Puder, der das Ziel eventuell\nparalysiert."
    es: Esparce polvo que paraliza al objetivo.
    ko: "저리가루를\n많이 흩뿌려서\n상대를 마비 상태로 만든다."
    zh_simp: "撒出麻痹粉，\n从而让对手陷入麻痹状态。"
    zh_trad: "撒出大量令人麻痺的粉末，\n讓對手陷入麻痺狀態。"
submission:
  names:
    jp_kana: じごくぐるま
    jp_kanji: じごくぐるま
    en: Submission
    fr: Sacrifice
    it: Sottomissione
    de: Überroller
    es: Sumisión
    ko: 지옥의바퀴
    zh_simp: 地狱翻滚
    zh_trad: 地獄翻滾
  descriptions:
    jp_kana: "じめんに　じぶんごと\nあいてを　なげつけて　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "地面に　自分ごと\n相手を　投げつけて　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user grabs the target and recklessly dives for\nthe ground. This also damages the user a little."
    fr: "Le lanceur agrippe l’ennemi et l’écrase au sol.\nBlesse aussi légèrement le lanceur."
    it: "Chi la usa carica il bersaglio in modo spericolato,\nma danneggia anche se stesso."
    de: "Harte Körperattacke, bei der sich der Angreifer\nselbst leicht verletzt."
    es: "El usuario se lanza al suelo con el oponente en\nbrazos y también se hace un poco de daño."
    ko: "땅에 자신과 함께\n상대를 내던져 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "将对手连同自己一起\n摔向地面进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "將對手連同自己一起\n摔向地面進行攻擊。\n自己也會受到少許傷害。"
substitute:
  names:
    jp_kana: みがわり
    jp_kanji: みがわり
    en: Substitute
    fr: Clonage
    it: Sostituto
    de: Delegator
    es: Sustituto
    ko: 대타출동
    zh_simp: 替身
    zh_trad: 替身
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの　みがわりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user makes a copy of itself using some of its HP.\nThe copy serves as the user’s decoy."
    fr: "Le lanceur fait une copie de lui-même en sacrifiant\nquelques PV. La copie sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando\nalcuni PS. La copia serve come esca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP ein, um\neinen Doppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un \nsustituto que actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。\n分身將成為自己的替身。"
subzero_slammer:physical:
  names:
    jp_kana: レイジングジオフリーズ
    jp_kanji: レイジングジオフリーズ
    en: Subzero Slammer
    fr: Laser Cryogénique
    it: Criodistruzione Polare
    de: Tobender Geofrost
    es: Crioaliento Despiadado
    ko: 레이징지오프리즈
    zh_simp: 激狂大地万里冰
    zh_trad: 激狂大地萬里冰
  descriptions:
    jp_kana: "Ｚパワーで　きおんを　きゅうげきに　さげ\nぜんりょくで　あいてを　こおらせる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　気温を　急激に　下げ\n全力で　相手を　凍らせる。\n元になった　技で　威力が　変わる。"
    en: "The user dramatically drops the temperature using\nits Z-Power and freezes the target with full force.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour baisser la\ntempérature brutalement et congeler l’adversaire. La\npuissance varie selon celle de la capacité originale."
    it: "Chi la usa sfrutta il Potere Z per far calare di colpo\nla temperatura e congelare il bersaglio. La potenza\nvaria a seconda della mossa su cui si basa."
    de: "Der Anwender senkt mit Z-Kraft die Temperatur\ndrastisch und lässt das Ziel einfrieren. Die Stärke\nvariiert je nach zugrunde liegender Attacke."
    es: "Emplea el Poder Z para lanzar un rayo de hielo que\nbaja la temperatura de golpe y congela al objetivo.\nSu potencia depende de la del movimiento original."
    ko: "Z파워로 기온을 급격하게 떨어뜨려\n전력으로 상대를 얼린다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量急剧降低气温，\n全力冰冻对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量急遽降低氣溫，\n全力冰凍對手。\n威力會隨原本的招式而改變。"
subzero_slammer:special:
  names:
    jp_kana: レイジングジオフリーズ
    jp_kanji: レイジングジオフリーズ
    en: Subzero Slammer
    fr: Laser Cryogénique
    it: Criodistruzione Polare
    de: Tobender Geofrost
    es: Crioaliento Despiadado
    ko: 레이징지오프리즈
    zh_simp: 激狂大地万里冰
    zh_trad: 激狂大地萬里冰
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
sucker_punch:
  names:
    jp_kana: ふいうち
    jp_kanji: ふいうち
    en: Sucker Punch
    fr: Coup Bas
    it: Sbigoattacco
    de: Tiefschlag
    es: Golpe Bajo
    ko: 기습
    zh_simp: 突袭
    zh_trad: 突襲
  descriptions:
    jp_kana: "あいてより　さきに　こうげき　できる。\nあいてが　だすわざが\nこうげきわざ　でないと　しっぱい　する。"
    jp_kanji: "相手より　先に　攻撃　できる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    en: "This move enables the user to attack first. This move\nfails if the target is not readying an attack."
    fr: "Permet au lanceur de frapper en priorité.\nÉchoue si l’ennemi ne prépare pas une attaque."
    it: "Chi la usa attacca con alta priorità, ma fallisce\nse il bersaglio non sta preparando un attacco."
    de: "Attacke mit hoher Erstschlagquote. Gelingt aber nur,\nwenn das Ziel gerade eine Attacke vorbereitet, die\nKP-Schaden zufügen würde."
    es: "Permite atacar con prioridad. Falla si el objetivo no\nestá preparando ningún ataque."
    ko: "상대보다 먼저 공격할 수 있다.\n상대가 쓴 기술이\n공격기술이 아니면 실패한다."
    zh_simp: "可以比对手先攻击。\n对手使出的招式\n如果不是攻击招式则会失败。"
    zh_trad: "可以搶先對手一步進行攻擊。\n若對手使用的不是攻擊招式則會失敗。"
sunny_day:
  names:
    jp_kana: にほんばれ
    jp_kanji: にほんばれ
    en: Sunny Day
    fr: Zénith
    it: Giornodisole
    de: Sonnentag
    es: Día Soleado
    ko: 쾌청
    zh_simp: 大晴天
    zh_trad: 大晴天
  descriptions:
    jp_kana: "５ターンの　あいだ　ひざしを　つよくして\nほのおタイプの　いりょくを　あげる。\nみずタイプの　いりょくは　さがる。"
    jp_kanji: "５ターンの　間　日差しを　強くして\nほのおタイプの　威力を　あげる。\nみずタイプの　威力は　さがる。"
    en: "The user intensifies the sun for five turns, powering\nup Fire-type moves. It lowers the power of\nWater-type moves."
    fr: "Fait briller le soleil pendant cinq tours, augmentant\nla puissance des capacités de type Feu et baissant\ncelle des capacités de type Eau."
    it: "Chi la usa intensifica i raggi solari per cinque\nturni, potenziando le mosse di tipo Fuoco e\nriducendo la potenza di quelle di tipo Acqua."
    de: "Die Sonne brennt unbarmherzig fünf Runden lang.\nDadurch werden Attacken vom Typ Feuer verstärkt,\nwährend Wasser-Attacken abgeschwächt werden."
    es: "Hace que se intensifique el efecto del sol durante\ncinco turnos, lo que potencia los movimientos de tipo\nFuego y debilita los de tipo Agua."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다.\n물타입의 위력은 떨어진다."
    zh_simp: "在５回合内阳光变得强烈，\n从而提高火属性的招式威力。\n水属性的招式威力则降低。"
    zh_trad: "讓陽光增強，在５回合內\n提高火屬性招式的威力。\n水屬性招式的威力會降低。"
sunsteel_strike:
  names:
    jp_kana: メテオドライブ
    jp_kanji: メテオドライブ
    en: Sunsteel Strike
    fr: Choc Météore
    it: Astrocarica
    de: Stahlgestirn
    es: Meteoimpacto
    ko: 메테오드라이브
    zh_simp: 流星闪冲
    zh_trad: 流星閃衝
  descriptions:
    jp_kana: "りゅうせいの　ような　いきおいで\nとっしんする。　あいての　とくせいを\nむしして　こうげき　することが　できる。"
    jp_kanji: "流星の　ような　勢いで\n突進する。　相手の　特性を\n無視して　攻撃　することが　できる。"
    en: "The user slams into the target with the force of a\nmeteor. This move can be used on the target \nregardless of its Abilities."
    fr: "Le lanceur fonce sur la cible à la vitesse\nd’une météorite. Ignore le talent de l’ennemi."
    it: "Chi la usa travolge il bersaglio con la potenza\ndi una meteora. Questo attacco ignora l’abilità\ndel bersaglio."
    de: "Der Anwender stürzt mit der Gewalt eines Meteors\nauf das Ziel. Die Fähigkeit des Zieles wird dabei\nignoriert."
    es: "Ataca al objetivo con la potencia de un meteoro,\nignorando su habilidad."
    ko: "유성 같은 기세로\n돌진한다. 상대의 특성을\n무시하고 공격할 수 있다."
    zh_simp: "以流星般的气势猛撞对手。\n可以无视对手的特性进行攻击。"
    zh_trad: "以流星般的氣勢猛撞對手。\n可不顧對手的特性進行攻擊。"
super_fang:
  names:
    jp_kana: いかりのまえば
    jp_kanji: いかりのまえば
    en: Super Fang
    fr: Croc Fatal
    it: Superzanna
    de: Superzahn
    es: Superdiente
    ko: 분노의앞니
    zh_simp: 愤怒门牙
    zh_trad: 憤怒門牙
  descriptions:
    jp_kana: "するどい　まえばで\nはげしく　かみついて　こうげきする。\nあいての　ＨＰは　はんぶんに　なる。"
    jp_kanji: "鋭い　前歯で\n激しく　かみついて　攻撃する。\n相手の　ＨＰは　半分に　なる。"
    en: "The user chomps hard on the target with its sharp\nfront fangs. This cuts the target’s HP in half."
    fr: "Une vilaine morsure d’incisives qui réduit de moitié\nles PV de l’ennemi."
    it: "Chi la usa salta sul bersaglio azzannandolo\ncon i suoi incisivi affilati e facendogli perdere\nmetà dei PS."
    de: "Greift mit scharfen Reißzähnen an. KP des Zieles\nwerden halbiert."
    es: "Finos colmillos que reducen a la mitad los PS del \nobjetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대의 HP는 절반이 된다."
    zh_simp: "用锋利的门牙\n猛烈地咬住对手进行攻击。\n对手的ＨＰ减半。"
    zh_trad: "用銳利的門牙\n猛烈地咬住對手進行攻擊。\n對手的ＨＰ將會減半。"
superpower:
  names:
    jp_kana: ばかぢから
    jp_kanji: ばかぢから
    en: Superpower
    fr: Surpuissance
    it: Troppoforte
    de: Kraftkoloss
    es: Fuerza Bruta
    ko: 엄청난힘
    zh_simp: 蛮力
    zh_trad: 蠻力
  descriptions:
    jp_kana: "すごい　ちからを　はっきして\nあいてを　こうげきする。じぶんの\nこうげきと　ぼうぎょが　さがる。"
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great power.\nHowever, this also lowers the user’s Attack and\nDefense stats."
    fr: "Une attaque puissante, mais qui baisse l’Attaque\net la Défense du lanceur."
    it: "Chi la usa attacca il bersaglio con grande forza,\nma il suo Attacco e la sua Difesa diminuiscono."
    de: "Starke Attacke, die jedoch auch den Angriff und die\nVerteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce el \nAtaque y la Defensa del agresor."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
    zh_simp: "发挥惊人的力量攻击对手。\n自己的攻击和防御会降低。"
    zh_trad: "發揮驚人的力量攻擊對手。\n自己的攻擊和防禦會降低。"
supersonic:
  names:
    jp_kana: ちょうおんぱ
    jp_kanji: ちょうおんぱ
    en: Supersonic
    fr: Ultrason
    it: Supersuono
    de: Superschall
    es: Supersónico
    ko: 초음파
    zh_simp: 超音波
    zh_trad: 超音波
  descriptions:
    jp_kana: "とくしゅな　おんぱを\nからだから　はっして\nあいてを　こんらん　させる。"
    jp_kanji: "特殊な　音波を\n体から　発して\n相手を　混乱させる。"
    en: "The user generates odd sound waves from its body\nthat confuse the target."
    fr: "Le lanceur produit d’étranges ondes sonores qui\nrendent la cible confuse."
    it: "Chi la usa genera dal proprio corpo strane onde\nacustiche che possono confondere il bersaglio."
    de: Ausstoß bizarrer Schallwellen. Das Ziel wird verwirrt.
    es: Raras ondas sónicas que confunden al objetivo.
    ko: "특수한 음파를\n몸에서 발산하여\n상대를 혼란시킨다."
    zh_simp: "从身体发出\n特殊的音波，\n从而使对手混乱。"
    zh_trad: "從身上發出\n特殊的音波，\n讓對手陷入混亂狀態。"
supersonic_skystrike:physical:
  names:
    jp_kana: ファイナルダイブクラッシュ
    jp_kanji: ファイナルダイブクラッシュ
    en: Supersonic Skystrike
    fr: Piqué Supersonique
    it: Picchiata Devastante
    de: Finaler Steilflug
    es: Picado Supersónico
    ko: 파이널다이브클래시
    zh_simp: 极速俯冲轰烈撞
    zh_trad: 極速俯衝轟烈撞
  descriptions:
    jp_kana: "Ｚパワーで　いきおいよく　とびあがり\nあいてに　むかって　ぜんりょくで　らっか。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　勢いよく　飛びあがり\n相手に　向かって　全力で　落下。\n元になった　技で　威力が　変わる。"
    en: "The user soars up with its Z-Power and plummets\ntoward the target at full speed. The power varies,\ndepending on the original move."
    fr: "Le Pokémon utilise la Force Z pour s’envoler très haut\ndans le ciel avant de plonger sur l’adversaire. La\npuissance varie selon celle de la capacité originale."
    it: "Chi la usa si serve del Potere Z per alzarsi in volo\ne attaccare il bersaglio piombandogli addosso. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender schwingt sich durch Z-Kraft in die\nLüfte und stürzt sich dann auf das Ziel hinab. Die\nStärke variiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para volar muy alto y\nabalanzarse en picado sobre el objetivo. Su potencia\ndepende de la del movimiento original."
    ko: "Z파워로 기세 좋게 날아올라\n상대를 향해 전력으로 낙하한다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量猛烈地飞向天空，\n朝对手全力落下。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量猛烈地飛向天空，\n向著對手全力墜下。\n威力會隨原本的招式而改變。"
supersonic_skystrike:special:
  names:
    jp_kana: ファイナルダイブクラッシュ
    jp_kanji: ファイナルダイブクラッシュ
    en: Supersonic Skystrike
    fr: Piqué Supersonique
    it: Picchiata Devastante
    de: Finaler Steilflug
    es: Picado Supersónico
    ko: 파이널다이브클래시
    zh_simp: 极速俯冲轰烈撞
    zh_trad: 極速俯衝轟烈撞
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
surf:
  names:
    jp_kana: なみのり
    jp_kanji: なみのり
    en: Surf
    fr: Surf
    it: Surf
    de: Surfer
    es: Surf
    ko: 파도타기
    zh_simp: 冲浪
    zh_trad: 衝浪
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena."
    de: "Eine Welle bricht über alle Pokémon in der Nähe des\nAnwenders herein."
    es: Inunda el terreno de combate con una ola gigante.
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
swagger:
  names:
    jp_kana: いばる
    jp_kanji: いばる
    en: Swagger
    fr: Vantardise
    it: Bullo
    de: Angeberei
    es: Contoneo
    ko: 뽐내기
    zh_simp: 虚张声势
    zh_trad: 虛張聲勢
  descriptions:
    jp_kana: "あいてを　おこらせて　こんらん　させる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the target. However,\nthis also sharply raises the target’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans la confusion,\nmais augmente beaucoup son Attaque."
    it: "Chi la usa provoca il bersaglio e lo confonde,\nfacendo aumentare però di molto il suo Attacco."
    de: "Verwirrt das Ziel und erhöht dessen Angriffs-Wert\nstark."
    es: "Provoca confusión en el objetivo, pero también sube \nmucho su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
    zh_simp: "激怒对手，使其混乱。\n因为愤怒，对手的攻击\n会大幅提高。"
    zh_trad: "讓對手火大並陷入混亂。\n但對手的攻擊會因憤怒\n而大幅提高。"
swallow:
  names:
    jp_kana: のみこむ
    jp_kanji: のみこむ
    en: Swallow
    fr: Avale
    it: Introenergia
    de: Verzehrer
    es: Tragar
    ko: 꿀꺽
    zh_simp: 吞下
    zh_trad: 吞下
  descriptions:
    jp_kana: "たくわえた　ちからを　のみこんで\nじぶんの　ＨＰを　かいふく　する。\nたくわえて　いるほど　かいふく　する。"
    jp_kanji: "蓄えた　力を　のみこんで\n自分の　ＨＰを　回復する。\n蓄えているほど　回復する。"
    en: "The power stored using the move Stockpile is\nabsorbed by the user to heal its HP. Storing more\npower heals more HP."
    fr: "Le lanceur absorbe la puissance accumulée avec\nStockage pour restaurer ses PV."
    it: "Chi la usa assorbe l’energia raccolta\ncon la mossa Accumulo e recupera PS.\nMaggiore è l’energia, più PS si recuperano."
    de: "Absorbiert die gehortete Kraft, um KP aufzufüllen.\nJe mehr Energie gehortet wurde, desto mehr KP\nwerden aufgefüllt."
    es: "Absorbe la energía acumulada con Reserva para\nrecobrar salud. Cuanta más se haya acumulado,\nmayor será el número de PS que se recuperen."
    ko: "비축된 힘을 꿀꺽해서\n자신의 HP를 회복한다.\n비축된 만큼 회복한다."
    zh_simp: "将积蓄的力量吞下，\n从而回复自己的ＨＰ。\n积蓄得越多，回复越大。"
    zh_trad: "將蓄積的力量吞下，\n回復自己的ＨＰ。\n蓄積得越多，回復越多。"
sweet_kiss:
  names:
    jp_kana: てんしのキッス
    jp_kanji: てんしのキッス
    en: Sweet Kiss
    fr: Doux Baiser
    it: Dolcebacio
    de: Bitterkuss
    es: Beso Dulce
    ko: 천사의키스
    zh_simp: 天使之吻
    zh_trad: 天使之吻
  descriptions:
    jp_kana: "てんしのように　かわいく　キスして\nあいてを　こんらん　させる。"
    jp_kanji: "天使のように　かわいく　キスして\n相手を　混乱させる。"
    en: "The user kisses the target with a sweet, angelic\ncuteness that causes confusion."
    fr: "Le lanceur envoie un bisou si mignon et désarmant\nqu’il plonge l’ennemi dans la confusion."
    it: "Chi la usa bacia il bersaglio con una dolcezza\nangelica, confondendolo."
    de: "Anwender küsst das Ziel, das durch diese\nNiedlichkeit verwirrt wird."
    es: Da un beso con tal dulzura que causa confusión.
    ko: "천사처럼 귀엽게 키스하여\n상대를 혼란시킨다."
    zh_simp: "像天使般可爱地亲吻对手，\n从而使对手混乱。"
    zh_trad: "像天使般可愛地親吻對手，\n進而使對手混亂。"
sweet_scent:
  names:
    jp_kana: あまいかおり
    jp_kanji: あまいかおり
    en: Sweet Scent
    fr: Doux Parfum
    it: Profumino
    de: Lockduft
    es: Dulce Aroma
    ko: 달콤한향기
    zh_simp: 甜甜香气
    zh_trad: 甜甜香氣
  descriptions:
    jp_kana: "かおりで　あいての　かいひりつを\nがくっと　さげる。"
    jp_kanji: "香りで　相手の　回避率を\nがくっと　さげる。"
    en: "A sweet scent that harshly lowers opposing\nPokémon’s evasiveness."
    fr: "Un doux parfum qui réduit beaucoup l’Esquive\nde l’ennemi."
    it: "Un dolce profumo che riduce di molto l’elusione\ndei nemici intorno a chi la usa."
    de: Senkt den Fluchtwert des Zieles stark.
    es: "Un dulce aroma engatusa al objetivo, por lo que se\nreduce mucho su Evasión."
    ko: "향기로 상대의 회피율을\n크게 떨어뜨린다."
    zh_simp: 用香气大幅降低对手的闪避率。
    zh_trad: 用香氣大幅降低對手的閃避率。
swift:
  names:
    jp_kana: スピードスター
    jp_kanji: スピードスター
    en: Swift
    fr: Météores
    it: Comete
    de: Sternschauer
    es: Rapidez
    ko: 스피드스타
    zh_simp: 高速星星
    zh_trad: 高速星星
  descriptions:
    jp_kana: "ほしがたの　ひかりを　はっしゃして\nあいてを　こうげきする。\nこうげきは　かならず　めいちゅう　する。"
    jp_kanji: "星型の　光を　発射して\n相手を　攻撃する。\n攻撃は　必ず　命中する。"
    en: "Star-shaped rays are shot at the opposing Pokémon.\nThis attack never misses."
    fr: "Le lanceur envoie des rayons d’étoiles.\nTouche toujours l’ennemi."
    it: "Chi la usa colpisce i nemici intorno con raggi\na forma di stella. Questo attacco è infallibile."
    de: "Verschießt sternförmige Strahlen, die stets treffen,\nauf Gegner in der Umgebung."
    es: Lanza rayos en forma de estrella que no fallan nunca.
    ko: "별 모양의 빛을 발사해서\n상대를 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "发射星形的光攻击对手。\n攻击必定会命中。"
    zh_trad: "發射星型光線攻擊對手。\n攻擊必定會命中。"
switcheroo:
  names:
    jp_kana: すりかえ
    jp_kanji: すりかえ
    en: Switcheroo
    fr: Passe-Passe
    it: Rapidscambio
    de: Wechseldich
    es: Trapicheo
    ko: 바꿔치기
    zh_simp: 掉包
    zh_trad: 掉包
  descriptions:
    jp_kana: "めにも　とまらぬ　はやさで\nじぶんと　あいての\nもちものを　こうかんする。"
    jp_kanji: "目にも　とまらぬ　速さで\n自分と　相手の\n持ち物を　交換する。"
    en: "The user trades held items with the target faster\nthan the eye can follow."
    fr: "Le lanceur échange son objet avec celui de la cible\nà une vitesse que l’œil a du mal à suivre."
    it: "Chi la usa scambia lo strumento che ha con quello\ndel bersaglio a una velocità impressionante."
    de: Item wird in Windeseile mit dem Ziel getauscht.
    es: "Intercambia con el objetivo los objetos que llevan \ntan rápido que es imposible verlo a simple vista."
    ko: "눈에 보이지 않는 속도로\n자신과 상대가\n지닌 물건을 교환한다."
    zh_simp: "用一闪而过的速度\n交换自己和对手的持有物。"
    zh_trad: "以肉眼看不清的速度\n將自己和對手的持有物互相交換。"
swords_dance:
  names:
    jp_kana: つるぎのまい
    jp_kanji: つるぎのまい
    en: Swords Dance
    fr: Danse-Lames
    it: Danzaspada
    de: Schwerttanz
    es: Danza Espada
    ko: 칼춤
    zh_simp: 剑舞
    zh_trad: 劍舞
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどって\nきあいを　たかめる。\nじぶんの　こうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　おどって\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting spirit.\nThis sharply raises the user’s Attack stat."
    fr: "Danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito\ncombattivo. Chi la usa aumenta di molto\nil suo Attacco."
    de: "Ein wilder Kampftanz, der den eigenen Angriffs-Wert\nstark erhöht."
    es: Baile frenético que aumenta mucho el Ataque.
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n大幅提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞提升氣勢。\n大幅提高自己的攻擊。"
synchronoise:
  names:
    jp_kana: シンクロノイズ
    jp_kanji: シンクロノイズ
    en: Synchronoise
    fr: Synchropeine
    it: Sincrumore
    de: Synchrolärm
    es: Sincrorruido
    ko: 싱크로노이즈
    zh_simp: 同步干扰
    zh_trad: 同步干擾
  descriptions:
    jp_kana: "ふしぎな　でんぱで　まわりに　いる\nじぶんと　おなじ　タイプの\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "不思議な　電波で　周りに　いる\n自分と　同じ　タイプの\nポケモンに　ダメージを　与える。"
    en: "Using an odd shock wave, the user inflicts damage\non any Pokémon of the same type in the area\naround it."
    fr: "Des ondes mystérieuses blessent tous les\nPokémon alentour qui sont du même type que\nle lanceur."
    it: "Chi la usa infligge danni a tutti i Pokémon\ndello stesso tipo che si trovano nelle vicinanze\nusando misteriose onde elettromagnetiche."
    de: "Fügt Pokémon vom selben Typ, die sich in der Nähe\ndes Anwenders aufhalten, mit seltsamen Druckwellen\nSchaden zu."
    es: "Una extraña onda que daña a todos los Pokémon \nadyacentes del mismo tipo que el que la ejecuta."
    ko: "이상한 전파로 주위에 있는\n자신과 같은 타입의\n포켓몬에게 데미지를 준다."
    zh_simp: "用神奇电波对\n周围所有和自己属性相同的\n宝可梦给予伤害。"
    zh_trad: "用神奇的電波，\n攻擊周圍所有\n和自己相同屬性的寶可夢。"
synthesis:
  names:
    jp_kana: こうごうせい
    jp_kanji: こうごうせい
    en: Synthesis
    fr: Synthèse
    it: Sintesi
    de: Synthese
    es: Síntesis
    ko: 광합성
    zh_simp: 光合作用
    zh_trad: 光合作用
  descriptions:
    jp_kana: "じぶんの　ＨＰを　かいふく　する。\nてんきに　よって\nかいふくの　りょうが　へんか　する。"
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP\nregained varies with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Chi la usa recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según \nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
tackle:
  names:
    jp_kana: たいあたり
    jp_kanji: たいあたり
    en: Tackle
    fr: Charge
    it: Azione
    de: Tackle
    es: Placaje
    ko: 몸통박치기
    zh_simp: 撞击
    zh_trad: 撞擊
  descriptions:
    jp_kana: "あいてに　むかって　からだ　ぜんたいで\nぶつかって　いき　こうげきする。"
    jp_kanji: "相手に　むかって　全身で\nぶつかっていき　攻撃する。"
    en: "A physical attack in which the user charges and\nslams into the target with its whole body."
    fr: "Le lanceur charge l’ennemi et le percute de tout\nson poids."
    it: "Attacco fisico che colpisce il bersaglio\ninvestendolo con tutto il corpo."
    de: Trifft das Ziel mit vollem Körpereinsatz.
    es: Embiste con todo el cuerpo.
    ko: "상대를 향해서 몸 전체를\n부딪쳐가며 공격한다."
    zh_simp: "用整个身体\n撞向对手进行攻击。"
    zh_trad: "用整個身體\n撞向對手進行攻擊。"
tail_glow:
  names:
    jp_kana: ほたるび
    jp_kanji: ほたるび
    en: Tail Glow
    fr: Lumiqueue
    it: Codadiluce
    de: Schweifglanz
    es: Ráfaga
    ko: 반딧불
    zh_simp: 萤火
    zh_trad: 螢火
  descriptions:
    jp_kana: "てんめつする　ひかりを　ながめて\nじぶんの　せいしんを　とういつし\nとくこうを　ぐぐーんと　あげる。"
    jp_kanji: "点滅する　光を　眺めて\n自分の　精神を　統一し\n特攻を　ぐぐーんと　あげる。"
    en: "The user stares at flashing lights to focus its mind,\ndrastically raising its Sp. Atk stat."
    fr: "Le lanceur regarde un flash lumineux fixement.\nAugmente énormément son Attaque Spéciale."
    it: "Chi la usa fissa una luce forte per concentrarsi\ne aumentare moltissimo l’Attacco Speciale."
    de: "Ein blinkendes Licht, das den Spezial-Angriff\ndrastisch erhöht."
    es: "Se concentra en una ráfaga de luz que sube \nmuchísimo el Ataque Especial."
    ko: "깜빡거리는 빛을 바라보고\n자신의 정신을 통일하여\n특수공격을 매우 크게 올린다."
    zh_simp: "凝视闪烁的光芒，\n集中自己的精神，\n从而巨幅提高特攻。"
    zh_trad: "凝視閃爍的光芒，\n集中精神，\n極大幅提高自己的特攻。"
tail_slap:
  names:
    jp_kana: スイープビンタ
    jp_kanji: スイープビンタ
    en: Tail Slap
    fr: Plumo-Queue
    it: Spazzasberla
    de: Kehrschelle
    es: Plumerazo
    ko: 스위프뺨치기
    zh_simp: 扫尾拍打
    zh_trad: 掃尾拍打
  descriptions:
    jp_kana: "かたい　しっぽで\nあいてを　たたいて　こうげきする。\n２ー５かいの　あいだ　れんぞくで　だす。"
    jp_kanji: "硬い　しっぽで\n相手を　たたいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by striking the target with its hard\ntail. It hits the target two to five times in a row."
    fr: "Le lanceur frappe l’ennemi de deux à cinq fois\nd’affilée avec sa queue robuste."
    it: "Chi la usa colpisce il bersaglio con la sua coda\ndura da due a cinque volte di fila."
    de: "Anwender greift das Ziel mit seiner schlagfesten\nRute zwei- bis fünfmal hintereinander an."
    es: Golpea con la cola de dos a cinco veces seguidas.
    ko: "단단한 꼬리로\n상대를 때려서 공격한다.\n2-5회 동안 연속으로 쓴다."
    zh_simp: "用坚硬的尾巴\n拍打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "將堅硬的尾巴\n掃向對手進行攻擊。\n可連續攻擊２～５次。"
tail_whip:
  names:
    jp_kana: しっぽをふる
    jp_kanji: しっぽをふる
    en: Tail Whip
    fr: Mimi-Queue
    it: Colpocoda
    de: Rutenschlag
    es: Látigo
    ko: 꼬리흔들기
    zh_simp: 摇尾巴
    zh_trad: 搖尾巴
  descriptions:
    jp_kana: "しっぽを　さゆうに　かわいく　ふって\nゆだんを　さそう。\nあいての　ぼうぎょを　さげる。"
    jp_kanji: "しっぽを　左右に　かわいく　ふって\n油断を　誘う。\n相手の　防御を　さげる。"
    en: "The user wags its tail cutely, making opposing\nPokémon less wary and lowering their Defense stat."
    fr: "Le lanceur remue son adorable queue pour\ntromper la vigilance de l’ennemi et baisser\nsa Défense."
    it: "Chi la usa agita la coda per distrarre i nemici\nche ha intorno, riducendone la Difesa."
    de: "Hieb mit dem Schweif. Senkt die Verteidigung des\nZieles."
    es: Agita la cola para bajar la Defensa del equipo rival.
    ko: "꼬리를 좌우로 귀엽게 흔들어\n방심을 유도한다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "可爱地左右摇晃尾巴，\n诱使对手疏忽大意。\n会降低对手的防御。"
    zh_trad: "可愛地左右搖晃尾巴，\n誘使對手疏忽大意。\n可降低對手的防禦。"
tailwind:
  names:
    jp_kana: おいかぜ
    jp_kanji: おいかぜ
    en: Tailwind
    fr: Vent Arrière
    it: Ventoincoda
    de: Rückenwind
    es: Viento Afín
    ko: 순풍
    zh_simp: 顺风
    zh_trad: 順風
  descriptions:
    jp_kana: "はげしく　ふきあれる\nかぜのうずを　つくり　４ターンの　あいだ\nみかた　ぜんいんの　すばやさを　あげる。"
    jp_kanji: "激しく　吹きあれる\n風の渦を　つくり　４ターンの　間\n味方　全員の　素早さを　あげる。"
    en: "The user whips up a turbulent whirlwind that ups\nthe Speed stat of the user and its allies for\nfour turns."
    fr: "Génère une rafale de vent qui augmente la Vitesse\ndes Pokémon de l’équipe pendant 4 tours."
    it: "Chi la usa scatena un turbine che aumenta\nla Velocità di tutti i Pokémon della squadra\nper quattro turni."
    de: "Anwender erzeugt einen Wirbelwind, der die Initiative\naller Pokémon im Team für vier Runden erhöht."
    es: "Crea un fuerte remolino que aumenta la Velocidad \nde los Pokémon de tu equipo durante cuatro\nturnos."
    ko: "세차게 불어대는\n바람의 소용돌이를 만들어 4턴 동안\n같은 편 모두의 스피드를 올린다."
    zh_simp: "刮起猛烈的旋风，\n在４回合内\n提高我方全员的速度。"
    zh_trad: "刮起猛烈的強風，\n在４回合內\n提高我方全體的速度。"
take_down:
  names:
    jp_kana: とっしん
    jp_kanji: とっしん
    en: Take Down
    fr: Bélier
    it: Riduttore
    de: Bodycheck
    es: Derribo
    ko: 돌진
    zh_simp: 猛撞
    zh_trad: 猛撞
  descriptions:
    jp_kana: "すごい　いきおいで\nあいてに　ぶつかって　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "すごい　勢いで\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "A reckless, full-body charge attack for slamming into\nthe target. This also damages the user a little."
    fr: "Une charge violente qui blesse aussi légèrement\nle lanceur."
    it: "Carica spericolata con tutto il corpo contro\nil bersaglio. Danneggia un po’ anche chi la usa."
    de: "Rücksichtslose Attacke, bei der sich der Angreifer\nselbst leicht verletzt."
    es: Carga desmedida que también hiere al agresor.
    ko: "굉장한 기세로\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "以惊人的气势\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "以驚人的氣勢\n撞向對手進行攻擊。\n自己也會受到少許傷害。"
taunt:
  names:
    jp_kana: ちょうはつ
    jp_kanji: ちょうはつ
    en: Taunt
    fr: Provoc
    it: Provocazione
    de: Verhöhner
    es: Mofa
    ko: 도발
    zh_simp: 挑衅
    zh_trad: 挑釁
  descriptions:
    jp_kana: "あいてを　おこらせる。　３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなく　なる。"
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser que des\nattaques pendant trois tours."
    it: "Provoca il bersaglio inducendolo a usare\nsolo mosse d’attacco per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use\nmovimientos de ataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手\n只能使出给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tearful_look:
  names:
    jp_kana: なみだめ
    jp_kanji: なみだめ
    en: Tearful Look
    fr: Larme à l’Œil
    it: Occhionilucidi
    de: Tränendrüse
    es: Ojos Llorosos
    ko: 눈물그렁그렁
    zh_simp: 泪眼汪汪
    zh_trad: 淚眼汪汪
  descriptions:
    jp_kana: "なみだめに　なって\nあいての　せんりょくを　そうしつさせる。\nあいての　こうげきと　とくこうが　さがる。"
    jp_kanji: "なみだめに　なって\n相手の　戦力を　喪失させる。\n相手の　攻撃と　特攻が　さがる。"
    en: "The user gets teary eyed to make the target lose\nits combative spirit. This lowers the target’s\nAttack and Sp. Atk stats."
    fr: "Le lanceur jette un regard plein de larmes à la cible.\nCelle-ci perd toute velléité de combat et voit\nson Attaque et son Attaque Spéciale baisser."
    it: "Chi la usa guarda il bersaglio con gli occhi pieni\ndi lacrime e gli fa perdere lo spirito combattivo,\nriducendone l’Attacco e l’Attacco Speciale."
    de: "Dem Anwender stehen Tränen in den Augen,\nwodurch das Ziel seinen Kampfeswillen verliert.\nAngriff und Spezial-Angriff des Zieles sinken."
    es: "Mira al objetivo con ojos llorosos para hacerle\nperder su espíritu combativo y reduce su Ataque y\nAtaque Especial."
    ko: "눈물을 그렁그렁거려\n상대의 전의를 상실하게 한다.\n상대의 공격과 특수공격이 떨어진다."
    zh_simp: "变得泪眼汪汪，\n让对手丧失斗志。\n从而降低对手的攻击和特攻。"
    zh_trad: "變得淚眼汪汪，\n令對手喪失鬥志。\n進而降低對手的攻擊和特攻。"
techno_blast:
  names:
    jp_kana: テクノバスター
    jp_kanji: テクノバスター
    en: Techno Blast
    fr: Techno-Buster
    it: Tecnobotto
    de: Techblaster
    es: Tecno Shock
    ko: 테크노버스터
    zh_simp: 高科技光炮
    zh_trad: 高科技光炮
  descriptions:
    jp_kana: "こうだんを　あいてに\nほうしゅつする。じぶんの　もつ\nカセットに　より　タイプが　かわる。"
    jp_kanji: "光弾を　相手に　放出する。\n自分の　持つ\nカセットにより　タイプが　変わる。"
    en: "The user fires a beam of light at its target. The\nmove’s type changes depending on the Drive the\nuser holds."
    fr: "Le lanceur projette un rayon lumineux sur l’ennemi.\nLe type varie selon le Module que tient le lanceur."
    it: "Chi la usa rilascia un colpo di luce contro\nil bersaglio. Il tipo varia a seconda del modulo\nche ha."
    de: "Anwender feuert ein Lichtgeschoss auf das Ziel ab.\nDer Typ der Attacke hängt von dem des Moduls ab."
    es: "Ataca al objetivo con un gran láser. El tipo del\nataque lo determina el cartucho que porta el usuario."
    ko: "광탄을 상대에게 방출한다.\n자신이 지니고 있는\n카세트에 의해 타입이 바뀐다."
    zh_simp: "向对手放出光弹。\n属性会根据自己\n携带的卡带不同而改变。"
    zh_trad: "向對手發射光彈。\n招式的屬性會隨著自己\n攜帶的卡帶不同而改變。"
tectonic_rage:physical:
  names:
    jp_kana: ライジングランドオーバー
    jp_kanji: ライジングランドオーバー
    en: Tectonic Rage
    fr: Éruption Géo-Sismique
    it: Furore della Terra
    de: Seismische Eruption
    es: Barrena Telúrica
    ko: 라이징랜드오버
    zh_simp: 地隆啸天大终结
    zh_trad: 地隆嘯天大終結
  descriptions:
    jp_kana: "Ｚパワーで　じめんの　おくふかくに　もぐり\nぜんりょくで　あいてに　ぶつかる。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　地面の　奥深くに　潜り\n全力で　相手に　ぶつかる。\n元になった　技で　威力が　変わる。"
    en: "The user burrows deep into the ground and slams\ninto the target with the full force of its Z-Power.\nThe power varies, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour entraîner\nl’adversaire dans les profondeurs de la terre. La\npuissance varie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa si tuffa nelle viscere\ndella terra e colpisce con violenza il bersaglio. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender zerrt das Ziel mit Z-Kraft tief in den\nBoden und kollidiert dort mit ihm. Die Stärke variiert\nje nach zugrunde liegender Attacke."
    es: "Emplea el Poder Z para abrir una profunda grieta en\nel suelo que se traga al oponente. Su potencia\ndepende de la del movimiento original."
    ko: "Z파워로 땅 깊숙이 파고들어\n전력으로 상대에게 부딪친다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量潜入地里最深处，\n全力撞上对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量潛入地底深處，\n全力撞擊對手。\n威力會隨原本的招式而改變。"
tectonic_rage:special:
  names:
    jp_kana: ライジングランドオーバー
    jp_kanji: ライジングランドオーバー
    en: Tectonic Rage
    fr: Éruption Géo-Sismique
    it: Furore della Terra
    de: Seismische Eruption
    es: Barrena Telúrica
    ko: 라이징랜드오버
    zh_simp: 地隆啸天大终结
    zh_trad: 地隆嘯天大終結
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
teeter_dance:
  names:
    jp_kana: フラフラダンス
    jp_kanji: フラフラダンス
    en: Teeter Dance
    fr: Danse-Folle
    it: Strampadanza
    de: Taumeltanz
    es: Danza Caos
    ko: 흔들흔들댄스
    zh_simp: 摇晃舞
    zh_trad: 搖晃舞
  descriptions:
    jp_kana: "フラフラと　ダンスを　おどって\nじぶんの　まわりに　いるものを\nこんらん　じょうたいに　させる。"
    jp_kanji: "フラフラと　ダンスを　おどって\n自分の　周りに　いるものを\n混乱状態に　させる。"
    en: "The user performs a wobbly dance that confuses\nthe Pokémon around it."
    fr: "Danse qui rend confus tous les Pokémon autour\ndu lanceur."
    it: "Chi la usa esegue una danza goffa che confonde\ntutti i Pokémon attorno."
    de: "Ein Wackeltanz, der andere Pokémon in der\nUmgebung des Anwenders verwirrt."
    es: "Danza histérica que confunde a los Pokémon que \nestán alrededor del usuario."
    ko: "흔들흔들 댄스를 춰서\n주위에 있는 포켓몬을\n혼란 상태로 만든다."
    zh_simp: "摇摇晃晃地跳起舞蹈，\n让自己周围的宝可梦\n陷入混乱状态。"
    zh_trad: "搖搖晃晃地跳起舞，\n讓自己周圍的寶可夢\n陷入混亂狀態。"
telekinesis:
  names:
    jp_kana: テレキネシス
    jp_kanji: テレキネシス
    en: Telekinesis
    fr: Lévikinésie
    it: Telecinesi
    de: Telekinese
    es: Telequinesis
    ko: 텔레키네시스
    zh_simp: 意念移物
    zh_trad: 意念移物
  descriptions:
    jp_kana: "ちょうのうりょくで　あいてを　うかせる。\n３ターンの　あいだ　こうげきが\nあいてに　あたりやすく　なる。"
    jp_kanji: "超能力で　相手を　浮かせる。\n３ターンの　間　攻撃が\n相手に　当たりやすく　なる。"
    en: "The user makes the target float with its psychic\npower. The target is easier to hit for three turns."
    fr: "Un pouvoir qui fait flotter l’ennemi dans les airs.\nPendant trois tours, il devient plus facile à atteindre."
    it: "Chi la usa fa fluttuare in aria il bersaglio,\nrendendolo facile da colpire per tre turni."
    de: "Bringt das Ziel durch Psycho-Kräfte zum Schweben.\nDieses lässt sich so über drei Runden hinweg\nbesonders leicht treffen."
    es: "El usuario emplea su poder mental para hacer flotar \nal objetivo, y lo convierte en un blanco fácil durante \ntres turnos."
    ko: "초능력으로 상대를 띄운다.\n3턴 동안 공격이\n상대에게 맞기 쉬워진다."
    zh_simp: "利用超能力使对手浮起来。\n在３回合内\n攻击会变得容易打中对手。"
    zh_trad: "用超能力使對手浮起來。\n在３回合內\n攻擊會變得容易命中對手。"
teleport:
  names:
    jp_kana: テレポート
    jp_kanji: テレポート
    en: Teleport
    fr: Téléport
    it: Teletrasporto
    de: Teleport
    es: Teletransporte
    ko: 순간이동
    zh_simp: 瞬间移动
    zh_trad: 瞬間移動
  descriptions:
    jp_kana: "やせい　ポケモン　との\nせんとうを　やめて　にげる。"
    jp_kanji: "野生　ポケモンとの\n戦闘を　やめて　逃げる。"
    en: Use it to flee from any wild Pokémon.
    fr: "Permet de fuir une rencontre avec un Pokémon\nsauvage."
    it: Fa fuggire dai Pokémon selvatici.
    de: Ermöglicht die sofortige Flucht vor wilden Pokémon.
    es: "Permite huir al instante de combates contra\nPokémon salvajes."
    ko: "야생 포켓몬과 배틀을\n그만두고 도망간다."
    zh_simp: 停止和野生宝可梦战斗并逃走。
    zh_trad: 停止和野生寶可夢戰鬥並逃走。
thief:
  names:
    jp_kana: どろぼう
    jp_kanji: どろぼう
    en: Thief
    fr: Larcin
    it: Furto
    de: Raub
    es: Ladrón
    ko: 도둑질
    zh_simp: 小偷
    zh_trad: 小偷
  descriptions:
    jp_kana: "こうげきと　どうじに　どうぐを　ぬすむ。\nじぶんが　どうぐを　もっている　ばあいは\nぬすめない。"
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the target’s held item\nsimultaneously. The user can’t steal anything if it\nalready holds an item."
    fr: "Le lanceur attaque la cible et vole son objet.\nLe lanceur ne peut rien voler s’il tient déjà\nun objet."
    it: "Chi la usa attacca il bersaglio e può rubargli\nlo strumento, se non ne ha già uno."
    de: "Ermöglicht es, das Item des Zieles zu stehlen, solang\nder Anwender selbst keins bei sich trägt."
    es: "Ataca y le quita el objeto al objetivo siempre y \ncuando el agresor no lleve ninguno."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
    zh_simp: "攻击的同时盗取道具。\n当自己携带道具时，\n不会去盗取。"
    zh_trad: "在攻擊的同時偷取道具。\n當寶可夢自己有攜帶道具時，\n則無法偷取。"
thousand_arrows:
  names:
    jp_kana: サウザンアロー
    jp_kanji: サウザンアロー
    en: Thousand Arrows
    fr: Myria-Flèches
    it: Mille Frecce
    de: Tausend Pfeile
    es: Mil Flechas
    ko: 사우전드애로
    zh_simp: 千箭齐发
    zh_trad: 千箭齊發
  descriptions:
    jp_kana: "ういている　ポケモンにも　あたる。\nういていた　あいては\nうちおとされて　じめんに　おちる。"
    jp_kanji: "浮いている　ポケモンにも　当たる。\n浮いていた　相手は\n撃ち落とされて　地面に　落ちる。"
    en: "This move also hits opposing Pokémon that are in\nthe air. Those Pokémon are knocked down to\nthe ground."
    fr: "Touche même les Pokémon dans les airs.\nDans ce cas, la cible retombe au sol."
    it: "Colpisce i nemici intorno scaraventando\na terra quelli che si trovano in aria."
    de: "Die Attacke erfasst auch fliegende und schwebende\nPokémon. Werden sie getroffen, fallen sie zu Boden."
    es: "Acierta incluso a Pokémon que estén en el aire y \nlos hace caer al suelo."
    ko: "떠 있는 포켓몬도 맞힐 수 있다.\n떠 있던 상대는\n맞아서 땅에 떨어진다."
    zh_simp: "可以击中浮在空中的宝可梦。\n空中的对手被击落后，\n会掉到地面。"
    zh_trad: "能夠命中飄浮在空中的寶可夢。\n飄浮在空中的對手\n會被擊落掉到地面。"
thousand_waves:
  names:
    jp_kana: サウザンウェーブ
    jp_kanji: サウザンウェーブ
    en: Thousand Waves
    fr: Myria-Vagues
    it: Mille Onde
    de: Tausend Wellen
    es: Mil Temblores
    ko: 사우전드웨이브
    zh_simp: 千波激荡
    zh_trad: 千波激盪
  descriptions:
    jp_kana: "ちをはう　なみによって　こうげき。\nなみに　まきこまれた　あいては\nせんとうから　にげられなくなる。"
    jp_kanji: "地をはう　波によって　攻撃。\n波に　巻き込まれた　相手は\n戦闘から　逃げられなくなる。"
    en: "The user attacks with a wave that crawls along the\nground. Those hit can’t flee from battle."
    fr: "Attaque avec des vagues glissant au sol.\nL’ennemi pris dedans ne peut pas s’échapper."
    it: "Un’onda strisciante investe i nemici intorno\nimpedendo loro di fuggire."
    de: "Der Anwender greift mit einer Welle an, die dicht\nüber dem Boden verläuft und alle Pokémon, die sie\nerfasst, an der Flucht hindert."
    es: "El usuario genera ondas sísmicas que se propagan \npor el suelo y sacuden a los oponentes. Los\nPokémon alcanzados no podrán huir del combate."
    ko: "땅 위를 뻗어 나가는 파도로 공격한다.\n파도에 휩쓸린 상대는\n전투에서 도망칠 수 없게 된다."
    zh_simp: "从地面掀起波浪进行攻击。\n被掀入波浪中的对手，\n将无法从战斗中逃走。"
    zh_trad: "化成波浪從地面進行攻擊。\n被捲入波浪中的對手\n將無法從戰鬥中逃走。"
thrash:
  names:
    jp_kana: あばれる
    jp_kanji: あばれる
    en: Thrash
    fr: Mania
    it: Colpo
    de: Fuchtler
    es: Golpe
    ko: 난동부리기
    zh_simp: 大闹一番
    zh_trad: 大鬧一番
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって　あいてを　こうげきする。\nあばれた　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　相手を　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three\nturns. The user then becomes confused."
    fr: "Une attaque furieuse qui dure de deux à trois tours.\nLe lanceur devient confus."
    it: "Assale e attacca il nemico per due o tre turni,\nma confonde chi la usa."
    de: "Attacke über zwei bis drei Runden, die den Angreifer\nverwirrt."
    es: "Ataca de dos a tres turnos y acaba confundiendo al \nagresor."
    ko: "2-3턴 동안\n마구 난동 부려서 상대를 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地攻击对手。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
throat_chop:
  names:
    jp_kana: じごくづき
    jp_kanji: じごくづき
    en: Throat Chop
    fr: Exécu-Son
    it: Colpo Infernale
    de: Neck Strike
    es: Golpe Mordaza
    ko: 지옥찌르기
    zh_simp: 地狱突刺
    zh_trad: 地獄突刺
  descriptions:
    jp_kana: "この　わざを　うけた　あいては\nじごくの　くるしみから　２ターンのあいだ\nおとの　わざを　だすことが　できなくなる。"
    jp_kanji: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    en: "The user attacks the target’s throat, and the\nresultant suffering prevents the target from using\nmoves that emit sound for two turns."
    fr: "Inflige une douleur tellement violente à la cible\nqu’elle ne peut plus émettre de sons pendant\ndeux tours."
    it: "Chi viene colpito da questa mossa prova un\ndolore lancinante e non può più usare mosse\nbasate sul suono per due turni."
    de: "Das Pokémon, das von dieser Attacke getroffen wird,\nerleidet starke Schmerzen und kann deswegen zwei\nRunden lang keine Lärm-Attacken mehr einsetzen."
    es: "Inflige al rival un dolor tan abrumador que le impide\nutilizar durante dos turnos ataques que se sirven del\nsonido."
    ko: "이 기술에 맞은 상대는\n지옥의 고통 때문에 2턴 동안\n소리 기술을 낼 수 없다."
    zh_simp: "受到此招式攻击的对手，\n会因为地狱般的痛苦，在２回合内，\n变得无法使出声音类招式。"
    zh_trad: "受到此招式攻擊的對手，\n會因為地獄般的痛苦，在２回合內\n無法使用會發出聲音的招式。"
thunder:
  names:
    jp_kana: かみなり
    jp_kanji: かみなり
    en: Thunder
    fr: Fatal-Foudre
    it: Tuono
    de: Donner
    es: Trueno
    ko: 번개
    zh_simp: 打雷
    zh_trad: 打雷
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on the target to\ninflict damage. This may also leave the target\nwith paralysis."
    fr: "La foudre tombe sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Il bersaglio è colpito da un lampo molto violento\nche può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel\neventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo y puede \nparalizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手劈下暴雷進行攻擊。\n有時會讓對手陷入麻痺狀態。"
thunder_fang:
  names:
    jp_kana: かみなりのキバ
    jp_kanji: かみなりのキバ
    en: Thunder Fang
    fr: Crocs Éclair
    it: Fulmindenti
    de: Donnerzahn
    es: Colmillo Rayo
    ko: 번개엄니
    zh_simp: 雷电牙
    zh_trad: 雷電牙
  descriptions:
    jp_kana: "でんきを　ためた　キバで　かみつく。\nあいてを　ひるませたり\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　ためた　キバで　かみつく。\n相手を　ひるませたり\nまひ状態に　することが　ある。"
    en: "The user bites with electrified fangs. This may also\nmake the target flinch or leave it with paralysis."
    fr: "Le lanceur utilise une morsure électrifiée.\nPeut aussi paralyser ou apeurer l’ennemi."
    it: "Chi la usa morde con denti elettrificati che\npossono anche paralizzare o far tentennare\nil bersaglio."
    de: "Anwender beißt mit elektrifizierten Reißzähnen zu.\nDas Ziel schreckt eventuell zurück oder wird\nparalysiert."
    es: "Usa colmillos electrificados para morder. Puede\nhacer que el objetivo retroceda o se paralice."
    ko: "전기를 모은 이빨로 문다.\n상대를 풀죽게 하거나\n마비 상태로 만들 때가 있다."
    zh_simp: "用蓄满电流的牙齿咬住对手。\n有时会使对手畏缩\n或陷入麻痹状态。"
    zh_trad: "用蓄滿電流的牙齒咬住對手。\n有時會讓對手畏縮\n或陷入麻痺狀態。"
thunder_punch:
  names:
    jp_kana: かみなりパンチ
    jp_kanji: かみなりパンチ
    en: Thunder Punch
    fr: Poing-Éclair
    it: Tuonopugno
    de: Donnerschlag
    es: Puño Trueno
    ko: 번개펀치
    zh_simp: 雷电拳
    zh_trad: 雷電拳
  descriptions:
    jp_kana: "でんげきを　こめた　パンチで\nあいてを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電撃を　こめた　パンチで\n相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is punched with an electrified fist.\nThis may also leave the target with paralysis."
    fr: "Un coup de poing électrique vient frapper l’ennemi.\nPeut le paralyser."
    it: "Colpisce il bersaglio con un pugno elettrico\nche può paralizzarlo."
    de: "Ein elektrischer Schlag, der das Ziel eventuell\nparalysiert."
    es: Puñetazo eléctrico. Puede paralizar.
    ko: "전격을 담은 펀치로\n상대를 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用充满电流的拳头攻击对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用帶有電流的拳頭\n攻擊對手。\n有時會讓對手陷入麻痺狀態。"
thunder_shock:
  names:
    jp_kana: でんきショック
    jp_kanji: でんきショック
    en: Thunder Shock
    fr: Éclair
    it: Tuonoshock
    de: Donnerschock
    es: Impactrueno
    ko: 전기쇼크
    zh_simp: 电击
    zh_trad: 電擊
  descriptions:
    jp_kana: "でんきの　しげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気の　刺激を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A jolt of electricity crashes down on the target to\ninflict damage. This may also leave the target\nwith paralysis."
    fr: "Une décharge électrique tombe sur l’ennemi.\nPeut aussi le paralyser."
    it: "Danneggia il bersaglio con una scarica elettrica\nche può anche paralizzarlo."
    de: "Eine Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: Ataque eléctrico que puede paralizar al objetivo.
    ko: "전기 자극을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "发出电流刺激对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "發出電流刺激對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
thunder_wave:
  names:
    jp_kana: でんじは
    jp_kanji: でんじは
    en: Thunder Wave
    fr: Cage-Éclair
    it: Tuononda
    de: Donnerwelle
    es: Onda Trueno
    ko: 전기자석파
    zh_simp: 电磁波
    zh_trad: 電磁波
  descriptions:
    jp_kana: "よわい　でんげきを　あびせる　ことで\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "The user launches a weak jolt of electricity that\nparalyzes the target."
    fr: "Un faible choc électrique frappe l’ennemi.\nSi l’attaque le touche, celui-ci est paralysé."
    it: "Colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: Ein schwacher Stromstoß, der das Ziel paralysiert.
    es: "Una ligera descarga que paraliza al objetivo si lo \nalcanza."
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
    zh_simp: "向对手发出\n微弱的电击，\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
thunderbolt:
  names:
    jp_kana: １０まんボルト
    jp_kanji: １０まんボルト
    en: Thunderbolt
    fr: Tonnerre
    it: Fulmine
    de: Donnerblitz
    es: Rayo
    ko: 10만볼트
    zh_simp: 十万伏特
    zh_trad: 十萬伏特
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast crashes down on the target.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur\nl’ennemi. Peut aussi le paralyser."
    it: "Il bersaglio viene colpito da una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al \nobjetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出\n强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tickle:
  names:
    jp_kana: くすぐる
    jp_kanji: くすぐる
    en: Tickle
    fr: Chatouille
    it: Solletico
    de: Spaßkanone
    es: Cosquillas
    ko: 간지르기
    zh_simp: 挠痒
    zh_trad: 搔癢
  descriptions:
    jp_kana: "からだを　くすぐり　わらわせる　ことで\nあいての　こうげきと　ぼうぎょを\nさげる。"
    jp_kanji: "体を　くすぐり　笑わせる　ことで\n相手の　攻撃と　防御を　さげる。"
    en: "The user tickles the target into laughing, reducing its\nAttack and Defense stats."
    fr: "Le lanceur chatouille l’ennemi, ce qui baisse son\nAttaque et sa Défense."
    it: "Chi la usa solletica il bersaglio e lo fa ridere,\nriducendo il suo Attacco e la sua Difesa."
    de: "Bringt das Ziel zum Lachen und senkt dadurch\ndessen Angriff und Verteidigung."
    es: "Hace reír al objetivo para bajar su Ataque y \nDefensa."
    ko: "몸을 간질여 웃게 만들어서\n상대의 공격과 방어를 떨어뜨린다."
    zh_simp: "给对手挠痒，使其发笑，\n从而降低对手的攻击和防御。"
    zh_trad: "搔癢對手的身體，讓對手發笑，\n降低對手的攻擊和防禦。"
topsy_turvy:
  names:
    jp_kana: ひっくりかえす
    jp_kanji: ひっくりかえす
    en: Topsy-Turvy
    fr: Renversement
    it: Sottosopra
    de: Invertigo
    es: Reversión
    ko: 뒤집어엎기
    zh_simp: 颠倒
    zh_trad: 顛倒
  descriptions:
    jp_kana: "あいてに　かかっている\nすべての　のうりょくへんかを\nひっくりかえして　ぎゃくにする。"
    jp_kanji: "相手に　かかっている\nすべての　能力変化を\nひっくり返して　逆にする。"
    en: "All stat changes affecting the target turn\ntopsy-turvy and become the opposite of what\nthey were."
    fr: "Inverse tous les changements de stats de\nla cible."
    it: "Inverte tutte le modifiche alle statistiche\ndel Pokémon bersaglio."
    de: Invertiert alle Statusveränderungen des Zieles.
    es: "Invierte por completo los cambios en las\ncaracterísticas del objetivo."
    ko: "상대에게 걸려 있는\n모든 능력 변화를\n뒤집어서 반대로 만든다."
    zh_simp: "颠倒对手身上的\n所有能力变化，\n变成和原来相反的状态。"
    zh_trad: "讓對手身上所有的\n能力變化顛倒過來，\n變成和原來相反的狀態。"
torment:
  names:
    jp_kana: いちゃもん
    jp_kanji: いちゃもん
    en: Torment
    fr: Tourmente
    it: Attaccalite
    de: Folterknecht
    es: Tormento
    ko: 트집
    zh_simp: 无理取闹
    zh_trad: 無理取鬧
  descriptions:
    jp_kana: "あいてに　いちゃもんを　つけて\nおなじ　わざを　２かい　れんぞくで\nだせなくする。"
    jp_kanji: "相手に　いちゃもんを　つけて\n同じ　技を　２回連続で\nだせなくする。"
    en: "The user torments and enrages the target, making it\nincapable of using the same move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour l’empêcher d’utiliser\nla même capacité deux fois de suite."
    it: "Chi la usa tormenta e fa infuriare il bersaglio,\nimpedendogli di usare la stessa mossa\ndue volte di seguito."
    de: "Erzürnt das Ziel, um wiederholten Einsatz derselben\nAttacke zu verhindern."
    es: "Atormenta y enfurece al objetivo, que no puede \nusar dos veces seguidas el mismo movimiento."
    ko: "상대에게 트집을 잡아서\n똑같은 기술을 2회 연속으로\n쓸 수 없게 한다."
    zh_simp: "向对手无理取闹，\n令其不能连续２次\n使出相同招式。"
    zh_trad: "無理取鬧，\n讓對手不能連續２次\n使出相同招式。"
toxic:
  names:
    jp_kana: どくどく
    jp_kanji: どくどく
    en: Toxic
    fr: Toxik
    it: Tossina
    de: Toxin
    es: Tóxico
    ko: 맹독
    zh_simp: 剧毒
    zh_trad: 劇毒
  descriptions:
    jp_kana: "あいてを　もうどくの\nじょうたいに　する。　ターンが　すすむほど\nどくの　ダメージが　ふえていく。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target badly poisoned.\nIts poison damage worsens every turn."
    fr: "Empoisonne gravement l’ennemi.\nLes dégâts dus au poison augmentent à chaque\ntour."
    it: "Iperavvelena il bersaglio con una potente tossina.\nIl danno peggiora a ogni turno."
    de: "Vergiftet das Ziel mit einem potenten Toxin schwer.\nDie Vergiftung wird von Runde zu Runde stärker."
    es: "Envenena gravemente al objetivo y causa un daño \nmayor en cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
    zh_simp: "让对手陷入剧毒状态。\n随着回合的推进，\n中毒伤害会增加。"
    zh_trad: "讓對手陷入劇毒狀態。\n中毒傷害會隨著\n回合的進行而增加。"
toxic_spikes:
  names:
    jp_kana: どくびし
    jp_kanji: どくびし
    en: Toxic Spikes
    fr: Pics Toxik
    it: Fielepunte
    de: Giftspitzen
    es: Púas Tóxicas
    ko: 독압정
    zh_simp: 毒菱
    zh_trad: 毒菱
  descriptions:
    jp_kana: "あいての　あしもとに　どくびしを\nしかける。　こうたいで　でてきた　あいての\nポケモンに　どくを　おわせる。"
    jp_kanji: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    en: "The user lays a trap of poison spikes at the feet of\nthe opposing team. The spikes will poison opposing\nPokémon that switch into battle."
    fr: "Lance des pics autour de l’ennemi.\nIls empoisonnent les ennemis qui entrent au combat."
    it: "Chi la usa piazza una trappola di punte che\navvelenano i nemici che scendono in campo."
    de: "Anwender legt eine Falle mit Giftdornen aus. In den\nKampf eingewechselte gegnerische Pokémon werden\nvergiftet."
    es: "Lanza una trampa de púas tóxicas a los pies del \nobjetivo. El veneno afecta a los Pokémon que\nentran en combate."
    ko: "상대의 발밑에 독압정을\n뿌린다. 교체로 나온 상대\n포켓몬에 독을 덮어씌운다."
    zh_simp: "在对手的脚下撒毒菱。\n使对手替换出场的宝可梦中毒。"
    zh_trad: "在對手腳下散布毒菱。\n讓對手替換出場的寶可夢\n陷入中毒狀態。"
toxic_thread:
  names:
    jp_kana: どくのいと
    jp_kanji: どくのいと
    en: Toxic Thread
    fr: Fil Toxique
    it: Velenotela
    de: Giftfaden
    es: Hilo Venenoso
    ko: 독실
    zh_simp: 毒丝
    zh_trad: 毒絲
  descriptions:
    jp_kana: "どくの　まじった　いとを　ふきつける。\nあいてを　どくにして\nすばやさを　さげる。"
    jp_kanji: "毒の　混じった　糸を　吹き付ける。\n相手を　毒にして\n素早さを　さげる。"
    en: "The user shoots poisonous threads to poison the\ntarget and lower the target’s Speed stat."
    fr: "Tisse un fil imprégné de venin. Empoisonne la cible\net baisse sa Vitesse."
    it: "Avvelena il bersaglio avvolgendolo con filamenti\ntossici e ne riduce la Velocità."
    de: "Der Anwender schießt giftige Fäden auf das Ziel,\ndas dadurch vergiftet wird. Außerdem sinkt seine\nInitiative."
    es: "Ataca al oponente con hilillos venenosos que\nreducen su Velocidad y lo envenenan."
    ko: "독이 섞인 실을 뿜어낸다.\n상대를 독 상태로 만들고\n스피드를 떨어뜨린다."
    zh_simp: "将混有毒的丝吐向对手。\n使其中毒，\n从而降低对手的速度。"
    zh_trad: "將混有毒的絲吐向對手。\n使其中毒，\n進而降低對手的速度。"
transform:
  names:
    jp_kana: へんしん
    jp_kanji: へんしん
    en: Transform
    fr: Morphing
    it: Trasformazione
    de: Wandler
    es: Transformación
    ko: 변신
    zh_simp: 变身
    zh_trad: 變身
  descriptions:
    jp_kana: "あいての　ポケモンに　へんしん\nすることで　あいてと　まったく\nおなじ　わざが　つかえる。"
    jp_kanji: "相手の　ポケモンに　変身することで\n相手と　まったく\n同じ　技が　使える。"
    en: "The user transforms into a copy of the target right\ndown to having the same move set."
    fr: "Le lanceur devient une copie de sa cible et obtient\nla même palette de capacités."
    it: "Chi la usa si trasforma in una copia esatta\ndel bersaglio per sfruttarne le mosse."
    de: "Anwender verwandelt sich in ein Abbild des Zieles\nund kann so auf die gleichen Attacken zugreifen."
    es: "El usuario se transforma en una copia del objetivo, \ncon los mismos movimientos."
    ko: "상대 포켓몬으로 변신하여\n상대와 완전히 똑같은\n기술을 사용할 수 있다."
    zh_simp: "变身成对手宝可梦的样子，\n能够使用和对手\n完全相同的招式。"
    zh_trad: "變身成對手寶可夢的樣子，\n能夠使用和對手\n完全相同的招式。"
tri_attack:
  names:
    jp_kana: トライアタック
    jp_kanji: トライアタック
    en: Tri Attack
    fr: Triplattaque
    it: Tripletta
    de: Triplette
    es: Triataque
    ko: 트라이어택
    zh_simp: 三重攻击
    zh_trad: 三重攻擊
  descriptions:
    jp_kana: "３つの　こうせんで　こうげきする。\nまひか　やけどか　こおりじょうたいの\nどれかに　することが　ある。"
    jp_kanji: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    en: "The user strikes with a simultaneous three-beam\nattack. May also burn, freeze, or paralyze the target."
    fr: "Le lanceur envoie trois boules d’énergie\nsimultanément. Peut aussi paralyser, brûler ou\ngeler l’ennemi."
    it: "Colpisce il bersaglio con tre sfere simultanee che\npossono paralizzarlo, scottarlo o congelarlo."
    de: "Feuert drei Strahlen ab. Verursacht eventuell\nParalyse, Verbrennung oder Einfrieren."
    es: "Ataque triple que puede paralizar, quemar o congelar\nal objetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冰冻的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或冰凍的狀態。"
trick:
  names:
    jp_kana: トリック
    jp_kanji: トリック
    en: Trick
    fr: Tourmagik
    it: Raggiro
    de: Trickbetrug
    es: Truco
    ko: 트릭
    zh_simp: 戏法
    zh_trad: 戲法
  descriptions:
    jp_kana: "あいての　すきを　ついて\nじぶんと　あいての\nもちものを　こうかんする。"
    jp_kanji: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    en: "The user catches the target off guard and swaps its\nheld item with its own."
    fr: "Le lanceur prend la cible au dépourvu et l’oblige\nà échanger son objet contre le sien."
    it: "Chi la usa coglie il bersaglio in contropiede\ne lo obbliga a cambiare il suo strumento\ncon il proprio."
    de: "Der Anwender überrumpelt das Ziel und tauscht mit\nihm die getragenen Items."
    es: "Engaña al objetivo desprevenido e intercambia \nobjetos."
    ko: "상대의 빈틈을 노려\n자신과 상대가 지닌 물건을\n교환한다."
    zh_simp: "抓住对手的空隙，\n交换自己和对手的持有物。"
    zh_trad: "在對手露出空隙時，\n趁機交換自己和對手的持有物。"
trick_or_treat:
  names:
    jp_kana: ハロウィン
    jp_kanji: ハロウィン
    en: Trick-or-Treat
    fr: Halloween
    it: Halloween
    de: Halloween
    es: Halloween
    ko: 핼러윈
    zh_simp: 万圣夜
    zh_trad: 萬聖夜
  descriptions:
    jp_kana: "あいてを　ハロウィンに　さそう。\nあいての　タイプに\nゴーストタイプが　ついかされる。"
    jp_kanji: "相手を　ハロウィンに　誘う。\n相手の　タイプに\nゴーストタイプが　追加される。"
    en: "The user takes the target trick-or-treating.\nThis adds Ghost type to the target’s type."
    fr: "Insuffle à la cible l’esprit d’Halloween, et\najoute le type Spectre à ses types actuels."
    it: "Il bersaglio viene invitato a festeggiare Halloween\ne aggiunge così al proprio tipo anche il tipo\nSpettro."
    de: "Der Anwender lehrt das Ziel das Fürchten.\nDieses nimmt dadurch zusätzlich den Typ Geist an."
    es: "Invita al objetivo a celebrar Halloween, haciendo \nque pase a ser también de tipo Fantasma además \nde conservar sus propios tipos."
    ko: "상대를 핼러윈으로 초대한다.\n상대 타입에\n고스트타입이 추가된다."
    zh_simp: "邀请对手参加万圣夜。\n使对手被追加幽灵属性。"
    zh_trad: "邀請對手參加萬聖夜。\n讓對手追加幽靈屬性。"
trick_room:
  names:
    jp_kana: トリックルーム
    jp_kanji: トリックルーム
    en: Trick Room
    fr: Distorsion
    it: Distortozona
    de: Bizarroraum
    es: Espacio Raro
    ko: 트릭룸
    zh_simp: 戏法空间
    zh_trad: 戲法空間
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ\nおそい　ポケモンから　こうどう　できる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの　間\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in which slower\nPokémon get to move first for five turns."
    fr: "Le lanceur crée une zone étrange où les Pokémon\nles plus lents frappent en priorité pendant cinq\ntours."
    it: "Chi la usa crea una dimensione in cui i Pokémon\npiù lenti agiscono per primi per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem\nlangsame Pokémon fünf Runden lang zuerst agieren."
    es: "Se crea un espacio extraño en el que los Pokémon \nlentos se mueven primero durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 느린 포켓몬부터\n행동할 수 있다."
    zh_simp: "制造出离奇的空间。\n在５回合内\n速度慢的宝可梦可以先行动。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，\n速度慢的寶可夢可以先行動。"
triple_kick:
  names:
    jp_kana: トリプルキック
    jp_kanji: トリプルキック
    en: Triple Kick
    fr: Triple Pied
    it: Triplocalcio
    de: Dreifachkick
    es: Triple Patada
    ko: 트리플킥
    zh_simp: 三连踢
    zh_trad: 三連踢
  descriptions:
    jp_kana: "３かい　れんぞくで　キックを　くりだして\nこうげきする。　わざが　あたる　たびに\nいりょくは　あがる。"
    jp_kanji: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    en: "A consecutive three-kick attack that becomes more\npowerful with each successive hit."
    fr: "Une salve de un à trois coups de pied dont\nla puissance augmente à chaque coup porté."
    it: "Chi la usa sferra fino a tre calci consecutivi\nla cui potenza aumenta a ogni colpo."
    de: "Tritt das Ziel ein- bis dreimal nacheinander.\nDie Härte der Tritte nimmt von Treffer zu Treffer zu."
    es: "Patea hasta tres veces seguidas y cada vez más\nfuerte."
    ko: "3회 연속으로 킥을 날려\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "连续３次踢对手进行攻击。\n每踢中一次，威力就会提高。"
    zh_trad: "連續踢對手３次進行攻擊。\n每踢中一次，威力就會提高。"
trop_kick:
  names:
    jp_kana: トロピカルキック
    jp_kanji: トロピカルキック
    en: Trop Kick
    fr: Botte Sucrette
    it: Tropicalcio
    de: Tropenkick
    es: Patada Tropical
    ko: 트로피컬킥
    zh_simp: 热带踢
    zh_trad: 熱帶踢
  descriptions:
    jp_kana: "なんごく　ゆらいの　あつい\nキックを　あいてに　あびせる。\nあいての　こうげきを　さげる。"
    jp_kanji: "南国　由来の　熱い\nキックを　相手に　浴びせる。\n相手の　攻撃を　さげる。"
    en: "The user lands an intense kick of tropical origins on\nthe target. This also lowers the target’s Attack stat."
    fr: "Un coup de pied chaud comme les tropiques qui\ninflige des dégâts à la cible et baisse son Attaque."
    it: "Chi la usa colpisce il bersaglio con un potente calcio\nsfruttando una tecnica originaria dei paesi tropicali\ne ne riduce l’Attacco."
    de: "Der Anwender greift den Gegner mit einem heftigen\nTritt tropischer Herkunft an. Dabei sinkt auch der\nAngriffs-Wert des Gegners."
    es: "Lanza una patada con la fuerza del trópico que\ngolpea al rival y reduce su Ataque."
    ko: "남쪽 나라에서 유래된\n뜨거운 킥을 상대에게 날린다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "向对手使出来自南国的火热脚踢。\n从而降低对手的攻击。"
    zh_trad: "向對手使出來自南國的火熱腳踢。\n進而降低對手的攻擊。"
trump_card:
  names:
    jp_kana: きりふだ
    jp_kanji: きりふだ
    en: Trump Card
    fr: Atout
    it: Asso
    de: Trumpfkarte
    es: As Oculto
    ko: 마지막수단
    zh_simp: 王牌
    zh_trad: 王牌
  descriptions:
    jp_kana: "きりふだの　のこり　ＰＰが\nすくなければ　すくないほど\nわざの　いりょくが　あがる。"
    jp_kanji: "きりふだの　残り　ＰＰが\n少なければ　少ないほど\n技の　威力が　あがる。"
    en: The fewer PP this move has, the greater its power.
    fr: "Moins cette capacité possède de PP, plus elle est\npuissante."
    it: "La potenza di questa mossa aumenta man mano\nche i suoi PP diminuiscono."
    de: "Je weniger AP diese Attacke hat, desto höher fällt\nihre Stärke aus."
    es: "Cuantos menos PP tenga el movimiento, mayor será \nla fuerza para atacar."
    ko: "마지막수단의 남은 PP가\n적으면 적을수록\n기술의 위력이 올라간다."
    zh_simp: "王牌招式的\n剩余ＰＰ越少，\n招式的威力越大。"
    zh_trad: "這個招式的\n剩餘ＰＰ越少，\n威力越大。"
twineedle:
  names:
    jp_kana: ダブルニードル
    jp_kanji: ダブルニードル
    en: Twineedle
    fr: Double-Dard
    it: Doppio Ago
    de: Duonadel
    es: Doble Ataque
    ko: 더블니들
    zh_simp: 双针
    zh_trad: 雙針
  descriptions:
    jp_kana: "２ほんの　ハリを　あいてに　つきさし\n２かい　れんぞくで　ダメージ。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "２本の　ハリを　相手に　突き刺し\n２回連続で　ダメージ。\n毒状態に　することが　ある。"
    en: "The user damages the target twice in succession\nby jabbing it with two spikes. This may also poison\nthe target."
    fr: "Un double coup de dard qui transperce l’ennemi\ndeux fois d’affilée. Peut aussi l’empoisonner."
    it: "Colpisce il bersaglio due volte di seguito con\ndue spine. Può anche avvelenarlo."
    de: "Stacheln treffen das Ziel zweimal. Das Ziel wird\neventuell vergiftet."
    es: "Pincha dos veces con dos espinas. Puede\nenvenenar."
    ko: "2개의 침을 상대에게 꿰찔러\n2회 연속으로 데미지를 준다.\n독 상태로 만들 때가 있다."
    zh_simp: "将２根针刺入对手，\n连续２次给予伤害。\n有时会让对手陷入中毒状态。"
    zh_trad: "將２根針刺進對手，\n連續２次給予傷害。\n有時會讓對手陷入中毒狀態。"
twinkle_tackle:physical:
  names:
    jp_kana: ラブリースターインパクト
    jp_kanji: ラブリースターインパクト
    en: Twinkle Tackle
    fr: Impact Choupinova
    it: Astroimpatto Fatato
    de: Entzückender Sternenstoß
    es: Arrumaco Sideral
    ko: 러블리스타임팩트
    zh_simp: 可爱星星飞天撞
    zh_trad: 可愛星星飛天撞
  descriptions:
    jp_kana: "Ｚパワーで　みわくの　くうかんを　つくり\nぜんりょくで　あいてを　もてあそぶ。\nもとになった　わざで　いりょくが　かわる。"
    jp_kanji: "Ｚパワーで　魅惑の　空間を　作り\n全力で　相手を　もてあそぶ。\n元になった　技で　威力が　変わる。"
    en: "The user creates a very charming space using its\nZ-Power and totally toys with the target. The power\nvaries, depending on the original move."
    fr: "Le Pokémon utilise la Force Z pour créer une\ndimension irréelle où l’adversaire est à sa merci. La\npuissance varie selon celle de la capacité originale."
    it: "Grazie al Potere Z, chi la usa crea una dimensione\nfatata in cui fa ciò che vuole del proprio bersaglio. La\npotenza varia a seconda della mossa su cui si basa."
    de: "Der Anwender kreiert mit Z-Kraft eine zauberhafte\nDimension und treibt dort sein Spiel mit dem Ziel. Die\nStärke variiert je nach zugrunde liegender Attacke."
    es: "El usuario emplea el Poder Z para crear una\ndimensión fascinante que deja al rival a su merced.\nSu potencia depende de la del movimiento original."
    ko: "Z파워로 매혹의 공간을 만들어\n전력으로 상대를 가지고 논다.\n원래 기술에 따라 위력이 변한다."
    zh_simp: "通过Ｚ力量制造魅惑空间，\n全力捉弄对手。\n威力会根据原来的招式而改变。"
    zh_trad: "透過Ｚ力量製造魅惑空間，\n全力玩弄對手。\n威力會隨原本的招式而改變。"
twinkle_tackle:special:
  names:
    jp_kana: ラブリースターインパクト
    jp_kanji: ラブリースターインパクト
    en: Twinkle Tackle
    fr: Impact Choupinova
    it: Astroimpatto Fatato
    de: Entzückender Sternenstoß
    es: Arrumaco Sideral
    ko: 러블리스타임팩트
    zh_simp: 可爱星星飞天撞
    zh_trad: 可愛星星飛天撞
  descriptions:
    jp_kana: ダミーデータ
    jp_kanji: ダミーデータ
    en: Dummy Data
    fr: Dummy
    it: Dummy Data
    de: Dummy data
    es: Dummy data
    ko: Dummy Data
    zh_simp: ダミーデータ
    zh_trad: ダミーデータ
twister:
  names:
    jp_kana: たつまき
    jp_kanji: たつまき
    en: Twister
    fr: Ouragan
    it: Tornado
    de: Windhose
    es: Ciclón
    ko: 회오리
    zh_simp: 龙卷风
    zh_trad: 龍捲風
  descriptions:
    jp_kana: "たつまきを　おこして\nあいてを　まきこみ　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "竜巻を　おこして\n相手を　まきこみ　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user whips up a vicious tornado to tear at the\nopposing Pokémon. This may also make them flinch."
    fr: "Déclenche un terrible ouragan sur l’ennemi.\nPeut aussi l’apeurer."
    it: "Un potente tornado si abbatte sui nemici nei\nparaggi. Può anche farli tentennare."
    de: "Trifft Ziele in der Umgebung mit einem heftigen\nWirbelsturm, was diese eventuell zurückschrecken\nlässt."
    es: "Crea un violento tornado para hacer trizas al\nenemigo. Puede hacerlo retroceder."
    ko: "회오리를 일으켜\n상대를 끌어들여 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "兴起龙卷风，\n将对手卷入进行攻击。\n有时会使对手畏缩。"
    zh_trad: "刮起龍捲風，\n將對手捲入進行攻擊。\n有時會使對手畏縮。"
u_turn:
  names:
    jp_kana: とんぼがえり
    jp_kanji: とんぼがえり
    en: U-turn
    fr: Demi-Tour
    it: Retromarcia
    de: Kehrtwende
    es: Ida y Vuelta
    ko: 유턴
    zh_simp: 急速折返
    zh_trad: 急速折返
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute\nvitesse et change de place avec un Pokémon\nde l’équipe prêt au combat."
    it: "Chi usa questa mossa fa marcia indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para dar paso a \notro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
uproar:
  names:
    jp_kana: さわぐ
    jp_kanji: さわぐ
    en: Uproar
    fr: Brouhaha
    it: Baraonda
    de: Aufruhr
    es: Alboroto
    ko: 소란피기
    zh_simp: 吵闹
    zh_trad: 吵鬧
  descriptions:
    jp_kana: "３ターンの　あいだ\nさわいで　あいてを　こうげきする。\nそのあいだは　だれも　ねむれなく　なる。"
    jp_kanji: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    en: "The user attacks in an uproar for three turns.\nDuring that time, no Pokémon can fall asleep."
    fr: "Le lanceur attaque en rugissant durant trois tours.\nPendant ce temps, aucun Pokémon ne peut\ns’endormir."
    it: "Chi la usa attacca per tre turni con un frastuono\nche non fa dormire nessuno."
    de: "Anwender greift an, indem er über drei Runden\nhinweg einen Aufruhr erzeugt. Verhindert Schlaf."
    es: "Ataca de forma alborotada durante tres turnos. \nMantiene despiertos a todos."
    ko: "3턴 동안\n소란 피워 공격한다.\n그동안은 아무도 잠들지 않게 된다."
    zh_simp: "在３回合内\n用骚乱攻击对手。\n在此期间谁都不能入眠。"
    zh_trad: "在３回合內\n大吵大鬧攻擊對手。\n在此期間誰都無法入眠。"
v_create:
  names:
    jp_kana: Ｖジェネレート
    jp_kanji: Ｖジェネレート
    en: V-create
    fr: Coup Victoire
    it: Generatore V
    de: V-Generator
    es: V de Fuego
    ko: V제너레이트
    zh_simp: Ｖ热焰
    zh_trad: Ｖ熱焰
  descriptions:
    jp_kana: "しゃくねつの　ほのおを　ひたいから\nはっせいさせて　すてみの　たいあたり。\nぼうぎょ　とくぼう　すばやさが　さがる。"
    jp_kanji: "灼熱の　炎を　額から\n発生させて　捨て身の　体当たり。\n防御　特防　素早さが　さがる。"
    en: "With a hot flame on its forehead, the user hurls itself\nat its target. This lowers the user’s Defense, Sp. Def,\nand Speed stats."
    fr: "Le lanceur projette une flamme ardente de son\nfront et se jette sur l’ennemi. Baisse la Défense,\nla Défense Spéciale et la Vitesse."
    it: "Chi la usa carica emettendo fiamme ardenti dalla\nfronte, a costo di una riduzione di Difesa,\nDifesa Speciale e Velocità."
    de: "Eine Verzweiflungsattacke. Anwender entfacht\nglühend heißes Feuer. Senkt dessen Verteidigung,\nSpezial-Verteidigung und Initiative."
    es: "Golpea con una V de llamas al objetivo. Baja la \nDefensa, la Defensa Especial y la Velocidad de \nquien lo usa."
    ko: "작열하는 불꽃을 이마에서\n발생시켜 이판사판으로 몸통박치기한다.\n방어, 특수방어, 스피드가 떨어진다."
    zh_simp: "从前额产生灼热的火焰，\n舍身撞击对手。\n防御、特防和速度会降低。"
    zh_trad: "在前額產生灼熱的火焰，\n然後捨身撞擊對手。\n自己的防禦、特防和速度會降低。"
vacuum_wave:
  names:
    jp_kana: しんくうは
    jp_kanji: しんくうは
    en: Vacuum Wave
    fr: Onde Vide
    it: Vuotonda
    de: Vakuumwelle
    es: Onda Vacío
    ko: 진공파
    zh_simp: 真空波
    zh_trad: 真空波
  descriptions:
    jp_kana: "こぶしを　ふって\nしんくうの　なみを　まきおこす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "こぶしを　ふって\n真空の　波を　まきおこす。\n必ず　先制攻撃できる。"
    en: "The user whirls its fists to send a wave of pure\nvacuum at the target. This move always goes first."
    fr: "Le lanceur agite son poing pour projeter une onde\nde vide. Frappe en priorité."
    it: "Chi la usa rotea i pugni per lanciare un’onda di\nvuoto assoluto verso il bersaglio.\nQuesta mossa ha priorità alta."
    de: "Ein Faustwirbel sendet eine Vakuumwelle auf das\nZiel. Hohe Erstschlagquote."
    es: "Gira los puños y libera una onda de vacío contra \nel objetivo. Este movimiento tiene prioridad alta."
    ko: "주먹을 흔들어\n진공의 파도를 일으킨다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "挥动拳头，\n掀起真空波。\n必定能够先制攻击。"
    zh_trad: "揮動拳頭，\n捲起真空波。\n必定能夠發動先制攻擊。"
venom_drench:
  names:
    jp_kana: ベノムトラップ
    jp_kanji: ベノムトラップ
    en: Venom Drench
    fr: Piège de Venin
    it: Velenotrappola
    de: Giftfalle
    es: Trampa Venenosa
    ko: 베놈트랩
    zh_simp: 毒液陷阱
    zh_trad: 毒液陷阱
  descriptions:
    jp_kana: "とくしゅな　どくえきを　あびせかける。\nどく　じょうたいの　あいては\nこうげき　とくこう　すばやさが　さがる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手は\n攻撃　特攻　素早さが　さがる。"
    en: "Opposing Pokémon are drenched in an odd\npoisonous liquid. This lowers the Attack, Sp. Atk, and\nSpeed stats of a poisoned target."
    fr: "Sécrète un liquide empoisonné.\nDiminue l’Attaque, l’Attaque Spéciale et la Vitesse\nde l’ennemi empoisonné."
    it: "Emette un liquido particolare che riduce\nl’Attacco, l’Attacco Speciale e la Velocità\ndei nemici avvelenati intorno a chi la usa."
    de: "Anwender bespritzt das Ziel mit einer speziellen\nGiftflüssigkeit. Senkt den Angriff, den Spezial-Angriff\nund die Initiative von vergifteten Zielen."
    es: "Impregna a su objetivo con un líquido venenoso que \ndisminuye el Ataque, el At. Esp. y la Velocidad. \nSolo afecta a Pokémon ya envenenados."
    ko: "특수한 독액을 끼얹는다.\n독 상태인 상대는\n공격, 특수공격, 스피드가 떨어진다."
    zh_simp: "将特殊的毒液泼向对手。\n对处于中毒状态的对手，\n其攻击、特攻和速度都会降低。"
    zh_trad: "向對手發射特殊的毒液。\n陷入中毒狀態的對手\n攻擊、特攻和速度會降低。"
venoshock:
  names:
    jp_kana: ベノムショック
    jp_kanji: ベノムショック
    en: Venoshock
    fr: Choc Venin
    it: Velenoshock
    de: Giftschock
    es: Carga Tóxica
    ko: 베놈쇼크
    zh_simp: 毒液冲击
    zh_trad: 毒液衝擊
  descriptions:
    jp_kana: "とくしゅな　どくえきを　あびせかける。\nどく　じょうたいの　あいてには\nいりょくが　２ばいに　なる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手には\n威力が　２倍に　なる。"
    en: "The user drenches the target in a special poisonous\nliquid. This move’s power is doubled if the target\nis poisoned."
    fr: "Le lanceur inocule un poison spécial à l’ennemi.\nL’effet est doublé si l’ennemi est déjà empoisonné."
    it: "Lancia uno speciale liquido tossico sul bersaglio.\nSe questi è avvelenato, il danno provocato\nraddoppia."
    de: "Überschüttet das Ziel mit einer speziellen toxischen\nFlüssigkeit. Doppelt so stark gegen vergiftete Ziele."
    es: "Ataca cubriendo al objetivo con un líquido venenoso. \nEl daño será doble si este ya está envenenado."
    ko: "특수한 독액을 끼얹는다.\n독 상태의 상대에게는\n위력이 2배가 된다."
    zh_simp: "将特殊的毒液泼向对手。\n对处于中毒状态的对手，\n威力会变成２倍。"
    zh_trad: "將特殊的毒液潑向對手。\n攻擊陷入中毒狀態的對手時，\n威力會變成２倍。"
vine_whip:
  names:
    jp_kana: つるのムチ
    jp_kanji: つるのムチ
    en: Vine Whip
    fr: Fouet Lianes
    it: Frustata
    de: Rankenhieb
    es: Látigo Cepa
    ko: 덩굴채찍
    zh_simp: 藤鞭
    zh_trad: 藤鞭
  descriptions:
    jp_kana: "ムチのように　しなる　ほそながい　つるで\nあいてを　たたきつけて　こうげきする。"
    jp_kanji: "ムチのように　しなる　細長い　つるで\n相手を　たたきつけて　攻撃する。"
    en: "The target is struck with slender, whiplike vines to\ninflict damage."
    fr: "Fouette l’ennemi avec de fines lianes pour infliger\ndes dégâts."
    it: "Infligge danni al bersaglio con liane sottili\nsimili a fruste."
    de: Peitschenähnlicher Schlag mit Ranken.
    es: Azota al objetivo con ramas finas.
    ko: "채찍처럼 휘어지는 가늘고 긴 덩굴로\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "用如同鞭子般弯曲而细长的藤蔓\n摔打对手进行攻击。"
    zh_trad: "將如同鞭子般彎曲而細長的藤蔓\n甩向對手進行攻擊。"
vise_grip:
  names:
    jp_kana: はさむ
    jp_kanji: はさむ
    en: Vice Grip
    fr: Force Poigne
    it: Presa
    de: Klammer
    es: Agarre
    ko: 찝기
    zh_simp: 夹住
    zh_trad: 夾住
  descriptions:
    jp_kana: "あいてを　りょうがわから　はさんで\nダメージを　あたえる。"
    jp_kanji: "相手を　両側から　はさんで\nダメージを　あたえる。"
    en: "The target is gripped and squeezed from both sides\nto inflict damage."
    fr: L’ennemi est attrapé et compressé par les côtés.
    it: Stringe il bersaglio in una morsa.
    de: Das Ziel wird umklammert und zusammengequetscht.
    es: Atrapa y atenaza al objetivo.
    ko: "상대를 양쪽에서 집어서\n데미지를 준다."
    zh_simp: "将对手从两侧夹住，\n给予伤害。"
    zh_trad: "從兩側夾住對手，\n給予傷害。"
vital_throw:
  names:
    jp_kana: あてみなげ
    jp_kanji: あてみなげ
    en: Vital Throw
    fr: Corps Perdu
    it: Vitaltiro
    de: Überwurf
    es: Tiro Vital
    ko: 받아던지기
    zh_simp: 借力摔
    zh_trad: 借力摔
  descriptions:
    jp_kana: "あいてより　あとに　こうげきする。\nそのかわり　じぶんの　こうげきは\nかならず　めいちゅうする。"
    jp_kanji: "相手より　あとに　攻撃する。\nそのかわり　自分の　攻撃は\n必ず　命中する。"
    en: "The user attacks last. In return, this throw move\nnever misses."
    fr: "Le lanceur porte son coup en dernier.\nEn échange, cette capacité n’échoue jamais."
    it: "Chi la usa attacca per ultimo, ma il colpo\nè sempre infallibile."
    de: "Anwender greift als Letzter an, hat dafür aber eine\nTreffergarantie beim eigenen Angriff."
    es: El usuario ataca el último, pero no falla.
    ko: "상대보다 나중에 공격한다.\n그 대신 자신의 공격은\n반드시 명중한다."
    zh_simp: "会在对手之后进行攻击。\n但是自己的攻击必定会命中。"
    zh_trad: "攻擊的順序會在對手之後。\n但是自己的攻擊必定會命中。"
volt_switch:
  names:
    jp_kana: ボルトチェンジ
    jp_kanji: ボルトチェンジ
    en: Volt Switch
    fr: Change Éclair
    it: Invertivolt
    de: Voltwechsel
    es: Voltiocambio
    ko: 볼트체인지
    zh_simp: 伏特替换
    zh_trad: 伏特替換
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute\nvitesse et change de place avec un Pokémon\nde l’équipe prêt au combat."
    it: "Chi usa questa mossa si tira indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Anwender kehrt nach dem Angriff mit\natemberaubender Geschwindigkeit zurück\nund tauscht Platz mit einem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para dar paso a otro \nPokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
volt_tackle:
  names:
    jp_kana: ボルテッカー
    jp_kanji: ボルテッカー
    en: Volt Tackle
    fr: Électacle
    it: Locomovolt
    de: Volttackle
    es: Placaje Eléc
    ko: 볼트태클
    zh_simp: 伏特攻击
    zh_trad: 伏特攻擊
  descriptions:
    jp_kana: "でんきを　まとって　とっしんする。\nじぶんも　かなり　ダメージを　うける。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電気を　まとって　突進する。\n自分も　かなり　ダメージを　受ける。\nまひ状態に　することが　ある。"
    en: "The user electrifies itself and charges the target.\nThis also damages the user quite a lot. This attack\nmay leave the target with paralysis."
    fr: "Le lanceur électrifie son corps avant de charger.\nLe choc blesse aussi gravement le lanceur et peut\nparalyser l’ennemi."
    it: "Chi la usa si carica di elettricità e poi attacca.\nPuò paralizzare il bersaglio. Il contraccolpo causa\nseri danni."
    de: "Angriff mit Elektro-Tackle. Der Anwender nimmt\ndabei selbst großen Schaden. Das Ziel wird eventuell\nparalysiert."
    es: "Quien lo usa electrifica su cuerpo para luego atacar. \nSe hiere mucho a sí mismo, pero puede paralizar al \nobjetivo."
    ko: "전기를 한데 모아 돌진한다.\n자신도 상당한 데미지를 입는다.\n마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身猛撞向对手。\n自己也会受到不小的伤害。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞全身後猛撞對手。\n自己也會受到不小的傷害。\n有時會讓對手陷入麻痺狀態。"
wake_up_slap:
  names:
    jp_kana: めざましビンタ
    jp_kanji: めざましビンタ
    en: Wake-Up Slap
    fr: Réveil Forcé
    it: Svegliopacca
    de: Weckruf
    es: Espabila
    ko: 잠깨움뺨치기
    zh_simp: 唤醒巴掌
    zh_trad: 喚醒巴掌
  descriptions:
    jp_kana: "ねむり　じょうたいの　あいてに\nおおきな　ダメージを　あたえる。\nかわりに　あいては　ねむりから　さめる。"
    jp_kanji: "眠り状態の　相手に\n大きな　ダメージを　与える。\nかわりに　相手は　眠りから　さめる。"
    en: "This attack inflicts big damage on a sleeping target.\nThis also wakes the target up, however."
    fr: "Cette attaque inflige d’importants dégâts à un\nPokémon endormi. Mais elle le réveille également."
    it: "Questa mossa infligge un danno doppio a un\nbersaglio addormentato, ma allo stesso tempo\nlo risveglia."
    de: "Richtet großen Schaden bei einem schlafenden Ziel\nan, weckt es aber auch auf."
    es: "Inflige gran daño a objetivos dormidos.\nSin embargo, los bofetones también los despiertan."
    ko: "잠듦 상태의 상대에게\n큰 데미지를 준다.\n대신 상대는 잠에서 깬다."
    zh_simp: "给予睡眠状态下的对手较大的伤害。\n但相反对手会从睡眠中醒过来。"
    zh_trad: "攻擊陷入睡眠狀態的對手時，\n可以給予較大的傷害。\n但對手也會從睡眠中醒過來。"
water_gun:
  names:
    jp_kana: みずでっぽう
    jp_kanji: みずでっぽう
    en: Water Gun
    fr: Pistolet à O
    it: Pistolacqua
    de: Aquaknarre
    es: Pistola Agua
    ko: 물대포
    zh_simp: 水枪
    zh_trad: 水槍
  descriptions:
    jp_kana: "みずを　いきおいよく\nあいてに　はっしゃして　こうげきする。"
    jp_kanji: "水を　勢いよく\n相手に　発射して　攻撃する。"
    en: The target is blasted with a forceful shot of water.
    fr: De l’eau est projetée avec force sur l’ennemi.
    it: Il bersaglio è colpito da un potente getto d’acqua.
    de: Das Ziel wird mit Wasser bespritzt.
    es: Ataca disparando agua con gran potencia.
    ko: "물을 기세 좋게\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n水流进行攻击。"
    zh_trad: "向對手噴射\n強烈水流進行攻擊。"
water_pledge:
  names:
    jp_kana: みずのちかい
    jp_kanji: みずのちかい
    en: Water Pledge
    fr: Aire d’Eau
    it: Acquapatto
    de: Wassersäulen
    es: Voto Agua
    ko: 물의맹세
    zh_simp: 水之誓约
    zh_trad: 水之誓約
  descriptions:
    jp_kana: "みずの　はしらで　こうげきする。\nほのおと　くみあわせると　いりょくが\nあがって　そらに　にじが　かかる。"
    jp_kanji: "水の柱で　攻撃する。\nほのおと　組みあわせると　威力が\nあがって　空に　にじが　かかる。"
    en: "A column of water strikes the target. When combined\nwith its fire equivalent, its power increases and a\nrainbow appears."
    fr: "Une masse d’eau s’abat sur l’ennemi.\nEn l’utilisant avec Aire de Feu, l’effet augmente\net un arc-en-ciel apparaît."
    it: "Attacca il bersaglio con una colonna d’acqua.\nSe usata con Fiammapatto, gli effetti aumentano\ne appare un arcobaleno."
    de: "Ein Angriff mit Wassersäulen. Mit Feuersäulen\nkombiniert steigt die Wirkung und ein Regenbogen\nerscheint."
    es: "Ataca con columnas de agua. Combinado con \nVoto Fuego, crea un arcoíris y aumenta su\npotencia."
    ko: "물기둥으로 공격한다.\n불꽃과 조합하면 위력이\n올라가고 하늘에 무지개가 걸린다."
    zh_simp: "用水柱进行攻击。\n如果和火组合，威力就会提高，\n天空中会挂上彩虹。"
    zh_trad: "用水柱進行攻擊。\n和火之誓約同時使用時，威力會提高，\n天空會出現彩虹。"
water_pulse:
  names:
    jp_kana: みずのはどう
    jp_kanji: みずのはどう
    en: Water Pulse
    fr: Vibraqua
    it: Idropulsar
    de: Aquawelle
    es: Hidropulso
    ko: 물의파동
    zh_simp: 水之波动
    zh_trad: 水之波動
  descriptions:
    jp_kana: "みずの　しんどうを\nあいてに　あたえて　こうげきする。\nあいてを　こんらん　させることが　ある。"
    jp_kanji: "水の　振動を\n相手に　与えて　攻撃する。\n相手を　混乱させることが　ある。"
    en: "The user attacks the target with a pulsing blast of\nwater. This may also confuse the target."
    fr: "Le lanceur envoie un puissant jet d’eau sur l’ennemi.\nPeut le rendre confus."
    it: "Il bersaglio viene colpito da un getto d’acqua\npotentissimo che può anche confonderlo."
    de: "Angriff mit Wasserwelle, die das Ziel eventuell\nverwirren kann."
    es: "Ataca con un potente chorro de agua. Puede \nconfundir al objetivo."
    ko: "물의 진동을\n상대에게 가하여 공격한다.\n상대를 혼란시킬 때가 있다."
    zh_simp: "用水的震动攻击对手。\n有时会使对手混乱。"
    zh_trad: "用水的震動攻擊對手。\n有時會使對手混亂。"
water_shuriken:
  names:
    jp_kana: みずしゅりけん
    jp_kanji: みずしゅりけん
    en: Water Shuriken
    fr: Sheauriken
    it: Acqualame
    de: Wasser-Shuriken
    es: Shuriken de Agua
    ko: 물수리검
    zh_simp: 飞水手里剑
    zh_trad: 飛水手裡劍
  descriptions:
    jp_kana: "ねんえきで　できた　しゅりけんを\n２ー５かいの　あいだ　れんぞくで　だす。\nかならず　せんせい　こうげき　できる。"
    jp_kanji: "粘液で　できた　手裏剣を\n２ー５回の　間　連続で　だす。\n必ず　先制攻撃　できる。"
    en: "The user hits the target with throwing stars two to\nfive times in a row. This move always goes first."
    fr: "Attaque l’ennemi avec des shuriken de mucus.\nFrappe en priorité deux à cinq fois d’affilée en\nun tour."
    it: "Chi la usa attacca il bersaglio con degli shuriken\ndi muco da due a cinque volte di fila.\nQuesta mossa ha priorità alta."
    de: "Der Anwender schleudert dem Ziel Wurfsterne aus\neinem verdickten Sekret entgegen. Die Attacke trifft\nzwei- bis fünfmal. Hohe Erstschlagquote."
    es: "Golpea al oponente de 2 a 5 veces con estrellas \narrojadizas hechas de mucosidad. Este movimiento\ntiene prioridad alta."
    ko: "점액으로 만든 수리검을\n2-5회 동안 연속으로 던진다.\n반드시 선제공격할 수 있다."
    zh_simp: "用粘液制成的手里剑，\n连续攻击２～５次。\n必定能够先制攻击。"
    zh_trad: "射出用黏液製成的手裡劍，\n連續攻擊２～５次。\n必定能夠發動先制攻擊。"
water_sport:
  names:
    jp_kana: みずあそび
    jp_kanji: みずあそび
    en: Water Sport
    fr: Tourniquet
    it: Docciascudo
    de: Nassmacher
    es: Hidrochorro
    ko: 물놀이
    zh_simp: 玩水
    zh_trad: 玩水
  descriptions:
    jp_kana: "あたりを　みずで　びしょびしょにする。\n５ターンの　あいだ\nほのおタイプの　わざを　よわめる。"
    jp_kanji: "あたりを　水で　びしょびしょにする。\n５ターンの　間\nほのおタイプの　技を　弱める。"
    en: "The user soaks the battlefield with water. This\nweakens Fire-type moves for five turns."
    fr: "Asperge d’eau les alentours.\nAffaiblit les capacités de type Feu\npendant cinq tours."
    it: "Chi la usa sparge acqua sul campo di lotta\nindebolendo per cinque turni le mosse\ndi tipo Fuoco."
    de: "Der Anwender lässt Wasser herabregnen und\nschwächt damit fünf Runden lang Feuer-Attacken."
    es: "El usuario se empapa en agua, lo que debilita \nlos movimientos de tipo Fuego durante cinco \nturnos."
    ko: "주위를 물로 흠뻑 젖게 만든다.\n5턴 동안\n불꽃타입의 기술을 약하게 한다."
    zh_simp: "用水湿透周围。\n在５回合内\n减弱火属性的招式。"
    zh_trad: "用水把周圍弄得濕答答。\n在５回合內減弱火屬性的招式。"
water_spout:
  names:
    jp_kana: しおふき
    jp_kanji: しおふき
    en: Water Spout
    fr: Giclédo
    it: Zampillo
    de: Fontränen
    es: Salpicar
    ko: 해수스파우팅
    zh_simp: 喷水
    zh_trad: 噴水
  descriptions:
    jp_kana: "しおを　ふきつけて　こうげきする。\nじぶんの　ＨＰが　すくないほど\nわざの　いりょくは　さがる。"
    jp_kanji: "潮を　吹きつけて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    en: "The user spouts water to damage opposing\nPokémon. The lower the user’s HP, the lower the\nmove’s power."
    fr: "Le lanceur attaque avec un jet d’eau.\nMoins il a de PV et moins l’attaque est puissante."
    it: "Lancia un getto d’acqua contro il nemico che ha\ndavanti e quelli adiacenti. La potenza è\nproporzionale al numero di PS di chi la usa."
    de: "Wasser-Attacke, die wirkungsvoller ist, wenn KP des\nAnwenders hoch sind."
    es: "Chorro de agua. Cuantos menos PS tenga el \nusuario, menos dañino será."
    ko: "바닷물을 내뿜어 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 떨어진다."
    zh_simp: "掀起潮水进行攻击。\n自己的ＨＰ越少，\n招式的威力越小。"
    zh_trad: "噴起潮水進行攻擊。\n自己的ＨＰ越少，\n招式的威力越小。"
waterfall:
  names:
    jp_kana: たきのぼり
    jp_kanji: たきのぼり
    en: Waterfall
    fr: Cascade
    it: Cascata
    de: Kaskade
    es: Cascada
    ko: 폭포오르기
    zh_simp: 攀瀑
    zh_trad: 攀瀑
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに　つっこむ。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: "The user charges at the target and may make\nit flinch."
    fr: "Le lanceur charge l’ennemi à une vitesse\nremarquable, ce qui peut l’apeurer."
    it: "Carica il bersaglio a grande velocità e può farlo\ntentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso que puede hacer\nretroceder."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
weather_ball:
  names:
    jp_kana: ウェザーボール
    jp_kanji: ウェザーボール
    en: Weather Ball
    fr: Ball’Météo
    it: Palla Clima
    de: Meteorologe
    es: Meteorobola
    ko: 웨더볼
    zh_simp: 气象球
    zh_trad: 氣象球
  descriptions:
    jp_kana: "つかった　ときの　てんきに　よって\nわざの　タイプと　いりょくが　かわる。"
    jp_kanji: "使ったときの　天気に　よって\n技の　タイプと　威力が　変わる。"
    en: "This attack move varies in power and type\ndepending on the weather."
    fr: "Une attaque dont la puissance et le type varient\nen fonction du temps qu’il fait."
    it: "Mossa d’attacco il cui tipo e la cui potenza variano\nin base alle condizioni atmosferiche."
    de: "Typ und Stärke der Attacke sind vom Wetter zum\nZeitpunkt der Anwendung abhängig."
    es: "El tipo y fuerza del ataque varían según el tiempo \nque haga."
    ko: "사용했을 때의 날씨에 따라서\n기술 타입과 위력이 바뀐다."
    zh_simp: "根据使用时的天气，\n招式属性和威力会改变。"
    zh_trad: "招式屬性和威力會隨著\n使用時天氣的不同而改變。"
whirlpool:
  names:
    jp_kana: うずしお
    jp_kanji: うずしお
    en: Whirlpool
    fr: Siphon
    it: Mulinello
    de: Whirlpool
    es: Torbellino
    ko: 바다회오리
    zh_simp: 潮旋
    zh_trad: 潮旋
  descriptions:
    jp_kana: "はげしく　うずをまく　みずの　なかに\n４ー５ターンの　あいだ\nあいてを　とじこめて　こうげきする。"
    jp_kanji: "激しく　渦をまく　水の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target in a violent swirling\nwhirlpool for four to five turns."
    fr: "Piège l’ennemi dans une trombe d’eau pendant\nquatre à cinq tours."
    it: "Intrappola il bersaglio in un turbine d’acqua per\nquattro o cinque turni infliggendo danni\na ogni turno."
    de: "Das Ziel wird für vier bis fünf Runden in einer\nWasserhose gefangen."
    es: "Una tromba de agua atrapa al objetivo durante\ncuatro o cinco turnos."
    ko: "세차게 소용돌이치는\n물속에 4-5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在激烈的\n水流旋涡中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在激烈的\n水流漩渦中，\n在４～５回合內進行攻擊。"
whirlwind:
  names:
    jp_kana: ふきとばし
    jp_kanji: ふきとばし
    en: Whirlwind
    fr: Cyclone
    it: Turbine
    de: Wirbelwind
    es: Remolino
    ko: 날려버리기
    zh_simp: 吹飞
    zh_trad: 吹飛
  descriptions:
    jp_kana: "あいてを　ふきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　吹きとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is blown away, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Éjecte le Pokémon ennemi et le remplace par\nun autre. Lors d’un combat contre un Pokémon\nsauvage seul, met fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nMette fine alle lotte contro singoli Pokémon\nselvatici."
    de: "Weht das Ziel weg und ersetzt es durch ein anderes\nPokémon. In der Wildnis endet der Kampf."
    es: "Se lleva al objetivo, que es cambiado por otro \nPokémon. Si es un Pokémon salvaje, acaba el \ncombate."
    ko: "상대를 날려버려서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "吹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "吹飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
wide_guard:
  names:
    jp_kana: ワイドガード
    jp_kanji: ワイドガード
    en: Wide Guard
    fr: Garde Large
    it: Bodyguard
    de: Rundumschutz
    es: Vastaguardia
    ko: 와이드가드
    zh_simp: 广域防守
    zh_trad: 廣域防守
  descriptions:
    jp_kana: "みかた　ぜんいんに　あたる　こうげきを\n１ターンの　あいだ　ふせぐ。"
    jp_kanji: "味方全員に　当たる　攻撃を\n１ターンの　間　防ぐ。"
    en: "The user and its allies are protected from\nwide-ranging attacks for one turn."
    fr: "Annule les attaques visant toute l’équipe pendant\nun tour."
    it: "Chi la usa protegge sé e gli alleati da colpi\nad ampio raggio per un turno."
    de: "Schützt eine Runde lang vor Angriffen, die alle\nPokémon auf deiner Seite treffen."
    es: "Bloquea los ataques de objetivo múltiple lanzados \ncontra tu equipo durante un turno."
    ko: "같은 편 전원에게 향하는 공격을\n1턴 동안 막는다."
    zh_simp: "在１回合内防住\n击打我方全员的攻击。"
    zh_trad: "在１回合內，\n防禦住攻擊我方全體的攻擊招式。"
wild_charge:
  names:
    jp_kana: ワイルドボルト
    jp_kanji: ワイルドボルト
    en: Wild Charge
    fr: Éclair Fou
    it: Sprizzalampo
    de: Stromstoß
    es: Voltio Cruel
    ko: 와일드볼트
    zh_simp: 疯狂伏特
    zh_trad: 瘋狂伏特
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　ぶつかって　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity and smashes\ninto its target. This also damages the user a little."
    fr: "Une charge électrique violente qui blesse aussi\nlégèrement le lanceur."
    it: "Chi la usa si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce dei danni per\nil contraccolpo."
    de: "Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Er selbst erleidet dabei\nebenfalls leichten Schaden."
    es: "Carga eléctrica muy potente que también hiere \nligeramente a quien la usa."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "让电流覆盖全身\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "讓電流圍繞全身，\n衝撞對手進行攻擊。\n自己也會受到少許傷害。"
will_o_wisp:
  names:
    jp_kana: おにび
    jp_kanji: おにび
    en: Will-O-Wisp
    fr: Feu Follet
    it: Fuocofatuo
    de: Irrlicht
    es: Fuego Fatuo
    ko: 도깨비불
    zh_simp: 鬼火
    zh_trad: 鬼火
  descriptions:
    jp_kana: "ぶきみで　あやしい　ほのおを　はなって\nあいてを　やけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister, bluish-white flame at the\ntarget to inflict a burn."
    fr: "Lance un bouquet de flammes maléfiques à l’ennemi\npour lui infliger une brûlure."
    it: "Fiamme intense di colore viola causano\nuna scottatura al bersaglio."
    de: "Angriff mit unheimlicher Flamme, die beim Ziel\nVerbrennungen verursacht."
    es: Siniestra llama morada que produce quemaduras.
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
wing_attack:
  names:
    jp_kana: つばさでうつ
    jp_kanji: つばさでうつ
    en: Wing Attack
    fr: Cru-Aile
    it: Attacco d’Ala
    de: Flügelschlag
    es: Ataque Ala
    ko: 날개치기
    zh_simp: 翅膀攻击
    zh_trad: 翅膀攻擊
  descriptions:
    jp_kana: "おおきく　ひろげた　りっぱな　つばさを\nあいてに　ぶつけて　こうげきする。"
    jp_kanji: "大きく　ひろげた　りっぱな　翼を\n相手に　ぶつけて　攻撃する。"
    en: "The target is struck with large, imposing wings\nspread wide to inflict damage."
    fr: "L’ennemi est frappé par de larges ailes déployées\npour infliger des dégâts."
    it: "Infligge danni al bersaglio spiegando delle grandi\nali possenti."
    de: Trifft das Ziel mit ausgebreiteten Flügeln.
    es: Golpea al objetivo con unas grandes alas.
    ko: "크게 펼친 훌륭한 날개를\n상대에게 부딪쳐서 공격한다."
    zh_simp: "大大地展开美丽的翅膀，\n将其撞向对手进行攻击。"
    zh_trad: "用大大伸展開來的美麗翅膀，\n撞向對手進行攻擊。"
wish:
  names:
    jp_kana: ねがいごと
    jp_kanji: ねがいごと
    en: Wish
    fr: Vœu
    it: Desiderio
    de: Wunschtraum
    es: Deseo
    ko: 희망사항
    zh_simp: 祈愿
    zh_trad: 祈願
  descriptions:
    jp_kana: "つぎの　ターンに　じぶん　もしくは\nいれかわった　ポケモンの　ＨＰを\nさいだい　ＨＰの　はんぶん　かいふくする。"
    jp_kanji: "次の　ターンに　自分　もしくは\n入れ替わった　ポケモンの　ＨＰを\n最大ＨＰの　半分　回復する。"
    en: "One turn after this move is used, the user’s or its\nreplacement’s HP is restored by half the user’s\nmax HP."
    fr: "Un vœu qui permet au lanceur ou au Pokémon\nentrant sur le terrain au tour suivant de récupérer\nla moitié des PV max du lanceur."
    it: "Quando un Pokémon la usa, al turno successivo\nla metà dei suoi PS massimi viene recuperata\nda lui stesso o dal Pokémon che lo sostituisce."
    de: "Ein Wunsch füllt in der nächsten Runde 50 %\nder KP des Anwenders bei diesem oder einem\neingewechselten Pokémon auf."
    es: "Restaura en el siguiente turno la mitad de los PS\nmáximos del usuario o se los pasa al Pokémon que lo\nsustituye."
    ko: "다음 턴에 자신 또는\n교체한 포켓몬의 HP를\n최대 HP의 절반만큼 회복한다."
    zh_simp: "在下一回合回复自己或是\n替换出场的宝可梦最大ＨＰ的一半。"
    zh_trad: "在下一回合回復自己或是\n替換上場的寶可夢最大ＨＰ的一半。"
withdraw:
  names:
    jp_kana: からにこもる
    jp_kanji: からにこもる
    en: Withdraw
    fr: Repli
    it: Ritirata
    de: Panzerschutz
    es: Refugio
    ko: 껍질에숨기
    zh_simp: 缩入壳中
    zh_trad: 縮入殼中
  descriptions:
    jp_kana: "からに　もぐりこんで　みをまもり\nじぶんの　ぼうぎょを　あげる。"
    jp_kanji: "殻に　潜りこんで　身を守り\n自分の　防御を　あげる。"
    en: "The user withdraws its body into its hard shell,\nraising its Defense stat."
    fr: "Le lanceur se recroqueville dans sa carapace,\nce qui augmente sa Défense."
    it: "Il corpo si ritira nel suo duro guscio per aumentare\nla Difesa."
    de: "Rückzug in den harten Panzer. Erhöht den\nVerteidigungs-Wert."
    es: "El usuario se resguarda en su coraza por lo que le\nsube la Defensa."
    ko: "껍질에 숨어 몸을 보호하여\n자신의 방어를 올린다."
    zh_simp: "缩入壳里保护身体，\n从而提高自己的防御。"
    zh_trad: "縮入殼中保護身體，\n提高自己的防禦。"
wonder_room:
  names:
    jp_kana: ワンダールーム
    jp_kanji: ワンダールーム
    en: Wonder Room
    fr: Zone Étrange
    it: Mirabilzona
    de: Wunderraum
    es: Zona Extraña
    ko: 원더룸
    zh_simp: 奇妙空间
    zh_trad: 奇妙空間
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンのあいだ　すべてのポケモンの\nぼうぎょと　とくぼうが　いれかわる。"
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンのあいだ　すべてのポケモンの\n防御と　特防が　入れ替わる。"
    en: "The user creates a bizarre area in which Pokémon’s\nDefense and Sp. Def stats are swapped for\nfive turns."
    fr: "Crée une zone étrange où pendant cinq tours,\nla Défense et la Défense Spéciale de tous les\nPokémon sont inversées."
    it: "Chi la usa crea una dimensione in cui Difesa\ne Difesa Speciale di tutti i Pokémon vengono\nscambiate per cinque turni."
    de: "Anwender erzeugt bizarren Raum, in dem über fünf\nRunden die Verteidigung aller Pokémon mit ihrer\nSpezial-Verteidigung getauscht wird."
    es: "Crea una zona misteriosa donde se intercambian \nla Defensa y la Defensa Especial de todos los\nPokémon durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n방어와 특수방어가 바뀐다."
    zh_simp: "制造出离奇的空间。\n在５回合内互换\n所有宝可梦的防御和特防。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，讓所有寶可夢的\n防禦和特防互相交換。"
wood_hammer:
  names:
    jp_kana: ウッドハンマー
    jp_kanji: ウッドハンマー
    en: Wood Hammer
    fr: Martobois
    it: Mazzuolegno
    de: Holzhammer
    es: Mazazo
    ko: 우드해머
    zh_simp: 木槌
    zh_trad: 木槌
  descriptions:
    jp_kana: "かたい　どうたいを\nあいてに　たたきつけて　こうげきする。\nじぶんも　かなり　ダメージを　うける。"
    jp_kanji: "硬い　胴体を\n相手に　たたきつけて　攻撃する。\n自分も　かなり　ダメージを　受ける。"
    en: "The user slams its rugged body into the target to\nattack. This also damages the user quite a lot."
    fr: "Le lanceur heurte l’ennemi de son corps robuste.\nBlesse aussi gravement le lanceur."
    it: "Chi la usa si lancia con tutto il corpo contro\nil bersaglio, ma subisce anche considerevoli danni."
    de: "Anwender attackiert mit seinem robusten Körper.\nEr erleidet dabei auch selbst großen Schaden."
    es: "Arremete contra el objetivo con su robusto cuerpo. \nEl agresor también sufre bastante daño."
    ko: "단단한 몸통을\n상대에게 부딪쳐서 공격한다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "用坚硬的躯体\n撞击对手进行攻击。\n自己也会受到不小的伤害。"
    zh_trad: "用堅硬的軀體\n撞擊對手進行攻擊。\n自己也會受到不小的傷害。"
work_up:
  names:
    jp_kana: ふるいたてる
    jp_kanji: ふるいたてる
    en: Work Up
    fr: Rengorgement
    it: Cuordileone
    de: Kraftschub
    es: Avivar
    ko: 분발
    zh_simp: 自我激励
    zh_trad: 自我激勵
  descriptions:
    jp_kana: "じぶんを　ふるいたてて\nこうげきと　とくこうを　あげる。"
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack and Sp. Atk\nstats increase."
    fr: "Le lanceur se rengorge.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Chi la usa si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der seinen\nAngriff und Spezial-Angriff erhöht."
    es: "Quien lo usa se concentra y potencia su Ataque y \nsu Ataque Especial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而提高攻击和特攻。"
    zh_trad: "激勵自己，\n提高自己的攻擊和特攻。"
worry_seed:
  names:
    jp_kana: なやみのタネ
    jp_kanji: なやみのタネ
    en: Worry Seed
    fr: Soucigraine
    it: Affannoseme
    de: Sorgensamen
    es: Abatidoras
    ko: 고민씨
    zh_simp: 烦恼种子
    zh_trad: 煩惱種子
  descriptions:
    jp_kana: "こころを　なやませる　タネを\nうえつける。　あいてを　ねむれなく　して\nとくせいを　ふみんに　する。"
    jp_kanji: "心を　なやませる　タネを\n植えつける。　相手を　眠れなくして\n特性を　ふみんに　する。"
    en: "A seed that causes worry is planted on the target.\nIt prevents sleep by making the target’s\nAbility Insomnia."
    fr: "Plante sur la cible une graine qui la rend soucieuse\net remplace son talent par Insomnia, l’empêchant\nainsi de dormir."
    it: "Un seme che causa ansia viene piantato sul\nbersaglio. Ne muta l’abilità in Insonnia e ne\npreviene o rimuove il sonno."
    de: "Ziel wird bepflanzt. Seine Fähigkeit wandelt sich zu\nInsomnia und hindert es daran, einzuschlafen."
    es: "Se planta una semilla en el objetivo que le causa \npesar. Evita el sueño gracias a la habilidad\nInsomnio."
    ko: "마음을 괴롭히는 씨앗을\n심는다. 상대를 잠잘 수 없게 해서\n특성을 불면으로 만든다."
    zh_simp: "种植心神不宁的种子。\n使对手不能入眠，\n并将特性变成不眠。"
    zh_trad: "埋下令人心煩意亂的種子，\n讓對手睡不著，\n將對手的特性變成不眠。"
wrap:
  names:
    jp_kana: まきつく
    jp_kanji: まきつく
    en: Wrap
    fr: Ligotage
    it: Avvolgibotta
    de: Wickel
    es: Constricción
    ko: 김밥말이
    zh_simp: 紧束
    zh_trad: 緊束
  descriptions:
    jp_kana: "ながい　からだや　つるなどを　つかって\n４ー５ターンの　あいだ\nあいてに　まきついて　こうげきする。"
    jp_kanji: "長い　体や　つるなどを　使って\n４ー５ターンの　間\n相手に　まきついて　攻撃する。"
    en: "A long body, vines, or the like are used to wrap and \nsqueeze the target for four to five turns."
    fr: "Le lanceur ligote l’ennemi avec des lianes ou son\ncorps pour l’écraser durant quatre à cinq tours."
    it: "Il lungo corpo o le liane di chi la usa avvolgono\ne stritolano il bersaglio per quattro o cinque turni."
    de: "Umwickelt das Ziel über vier bis fünf Runden mit\nRanken oder Ähnlichem und fügt ihm Schaden zu."
    es: "Oprime al objetivo de cuatro a cinco turnos con\nramas o con su cuerpo."
    ko: "긴 몸이나 덩굴 등을 사용해\n4-5턴 동안\n상대를 휘감아 공격한다."
    zh_simp: "使用长长的身体或藤蔓等，\n在４～５回合内\n紧束对手进行攻击。"
    zh_trad: "使用長長的身體或藤蔓等，\n在４～５回合內\n緊束對手進行攻擊。"
wring_out:
  names:
    jp_kana: しぼりとる
    jp_kanji: しぼりとる
    en: Wring Out
    fr: Essorage
    it: Strizzata
    de: Auswringen
    es: Estrujón
    ko: 쥐어짜기
    zh_simp: 绞紧
    zh_trad: 絞緊
  descriptions:
    jp_kana: "つよく　しめあげて　こうげきを　する。\nあいての　ＨＰが　のこっている　ほど\nいりょくは　あがる。"
    jp_kanji: "強く　締めあげて　攻撃を　する。\n相手の　ＨＰが　残っているほど\n威力は　あがる。"
    en: "The user powerfully wrings the target. The more HP\nthe target has, the greater the move’s power."
    fr: "Le lanceur essore l’ennemi. Plus l’ennemi a de PV,\nplus cette attaque est puissante."
    it: "Chi la usa stritola con forza il bersaglio. Più PS ha\nil Pokémon colpito, maggiore è la potenza\ndella mossa."
    de: "Anwender presst sein Ziel aus. Je höher die KP des\nZieles sind, desto höher fällt die Stärke der Attacke\naus."
    es: "Estruja con fuerza al objetivo. Cuantos más PS \ntenga el objetivo, más fuerza tendrá el ataque."
    ko: "강하게 조여 공격을 한다.\n상대의 HP가 많이 남아 있을수록\n위력이 올라간다."
    zh_simp: "用力勒紧对手进行攻击。\n对手的ＨＰ越多，\n威力越大。"
    zh_trad: "用力勒緊對手進行攻擊。\n對手現有的ＨＰ越多，\n招式的威力越大。"
x_scissor:
  names:
    jp_kana: シザークロス
    jp_kanji: シザークロス
    en: X-Scissor
    fr: Plaie-Croix
    it: Forbice X
    de: Kreuzschere
    es: Tijera X
    ko: 시저크로스
    zh_simp: 十字剪
    zh_trad: 十字剪
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　あいてを　きりさく。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its\nscythes or claws as if they were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Chi la usa colpisce il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt."
    es: "Cruza las guadañas o las garras para atacar al\nobjetivo como si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
yawn:
  names:
    jp_kana: あくび
    jp_kanji: あくび
    en: Yawn
    fr: Bâillement
    it: Sbadiglio
    de: Gähner
    es: Bostezo
    ko: 하품
    zh_simp: 哈欠
    zh_trad: 哈欠
  descriptions:
    jp_kana: "おおきな　あくびで　ねむけを　さそう。\nつぎの　ターンに\nあいてを　ねむり　じょうたいに　する。"
    jp_kanji: "大きな　あくびで　眠気を　誘う。\n次の　ターンに\n相手を　眠り状態に　する。"
    en: "The user lets loose a huge yawn that lulls the target\ninto falling asleep on the next turn."
    fr: Fait bâiller l’ennemi qui s’endort au tour suivant.
    it: "Chi la usa fa un grande sbadiglio che\naddormenta il bersaglio al turno seguente."
    de: "Angreifer gähnt und das Ziel schläft in der nächsten\nRunde ein."
    es: "Gran bostezo que induce al sueño al objetivo en \nel siguiente turno."
    ko: "큰 하품으로 졸음을 유도한다.\n다음 턴에 상대를\n잠듦 상태로 만든다."
    zh_simp: "打个大哈欠引起睡意。\n在下一回合让对手陷入睡眠状态。"
    zh_trad: "打個大哈欠引起睡意。\n在下一回合\n讓對手陷入睡眠狀態。"
zap_cannon:
  names:
    jp_kana: でんじほう
    jp_kanji: でんじほう
    en: Zap Cannon
    fr: Élecanon
    it: Falcecannone
    de: Blitzkanone
    es: Electrocañón
    ko: 전자포
    zh_simp: 电磁炮
    zh_trad: 電磁炮
  descriptions:
    jp_kana: "たいほうの　ような\nでんきを　はっしゃして　こうげきする。\nあいてを　まひの　じょうたいに　する。"
    jp_kanji: "大砲の　ような\n電気を　発射して　攻撃する。\n相手を　まひの　状態に　する。"
    en: "The user fires an electric blast like a cannon to inflict\ndamage and cause paralysis."
    fr: "Un boulet de canon électrifié qui inflige des\ndégâts et paralyse l’ennemi."
    it: "Chi la usa scaglia una sfera elettrica\nche infligge danni e paralizza il bersaglio."
    de: "Kanonenähnlicher Elektro-Schuss, der schadet und\nparalysiert."
    es: "Dispara una descarga eléctrica que causa daño y \nparálisis."
    ko: "대포처럼\n전기를 발사해서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "发射大炮一样的\n电流进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "發射如大炮般的\n電流進行攻擊。\n能讓對手陷入麻痺狀態。"
zen_headbutt:
  names:
    jp_kana: しねんのずつき
    jp_kanji: しねんのずつき
    en: Zen Headbutt
    fr: Psykoud’Boul
    it: Cozzata Zen
    de: Zen-Kopfstoß
    es: Cabezazo Zen
    ko: 사념의박치기
    zh_simp: 意念头锤
    zh_trad: 意念頭錘
  descriptions:
    jp_kana: "しねんの　ちからを\nひたいに　あつめて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "思念の　力を\n額に　集めて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user focuses its willpower to its head and\nattacks the target. This may also make the\ntarget flinch."
    fr: "Le lanceur concentre sa volonté et donne un coup\nde tête. Peut aussi apeurer l’ennemi."
    it: "Chi la usa concentra la forza nella testa e si lancia\ncontro il bersaglio. Può anche farlo tentennare."
    de: "Anwender konzentriert seinen Willen und rammt das\nZiel. Dieses schreckt eventuell zurück."
    es: "Concentra su energía psíquica en la cabeza para \ngolpear. Puede hacer que el objetivo retroceda."
    ko: "사념의 힘을\n이마에 모아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将思念的力量集中在\n前额进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將意念的力量集中在\n前額進行攻擊。\n有時會讓對手畏縮。"
zing_zap:
  names:
    jp_kana: びりびりちくちく
    jp_kanji: びりびりちくちく
    en: Zing Zap
    fr: Électrikipik
    it: Elettropizzico
    de: Elektropikser
    es: Electropunzada
    ko: 찌리리따끔따끔
    zh_simp: 麻麻刺刺
    zh_trad: 麻麻刺刺
  descriptions:
    jp_kana: "あいてに　ぶつかって　きょうりょくな\nでんきをあびせ　びりびりちくちく　させる。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "相手に　ぶつかって　強力な\n電気を浴びせ　びりびりちくちく　させる。\n相手を　ひるませる　ことが　ある。"
    en: "A strong electric blast crashes down on the target,\ngiving it an electric shock. This may also make the\ntarget flinch."
    fr: "Le lanceur fonce sur la cible et lui envoie un puissant\nchoc électrique. Peut aussi l’effrayer."
    it: "Chi la usa colpisce il bersaglio investendolo\ncon una potente scarica elettrica che può\nanche farlo tentennare."
    de: "Der Anwender rammt das Ziel und schockt es mit\nstarkem Strom. Das Ziel schreckt eventuell zurück."
    es: "El usuario se lanza contra el objetivo y le suelta una\npotente descarga eléctrica que puede hacerlo\nretroceder."
    ko: "상대에게 부딪쳐 강력한\n전기를 날려서 찌리리따끔따끔하게 만든다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "撞向对手，并发出强电，\n使其感到麻麻刺刺的。\n有时会使对手畏缩。"
    zh_trad: "撞向對手，並利用\n強電流使其感到麻麻刺刺的。\n有時會使對手畏縮。"
