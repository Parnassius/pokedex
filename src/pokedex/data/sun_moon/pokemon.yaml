      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - synchronize
        - inner_focus
      hidden_ability: magic_guard
      held_items:
        rare: twisted_spoon
      descriptions:
        jp_kana:
          sun: "１にち　１８じかんは　ねむる。\nねたまま　テレポートで　きのうえに\nいどうし　きのみを　とって　くう。"
          moon: "ねむっているときも　テレポートして\nみを　まもっているが　めざめたときに\nどこに　いるか　わからず　あわてる。"
        jp_kanji:
          sun: "１日　１８時間は　眠る。\n寝たまま　テレポートで　木の上に\n移動し　木の実を　取って　喰う。"
          moon: "眠っているときも　テレポートして\n身を　守っているが　目覚めたときに\nどこに　いるか　分からず　あわてる。"
        en:
          sun: "It sleeps 18 hours a day. Even while sleeping,\nit will teleport itself to treetops and pick and\neat berries there."
          moon: "It can teleport itself to safety while it’s asleep,\nbut when it wakes, it doesn’t know where it is,\nso it panics."
        fr:
          sun: "Il dort 18 heures par jour. Il lui arrive de se\ntéléporter dans les arbres et d’en manger\nles Baies sans même se réveiller."
          moon: "Il lui arrive de se téléporter pendant son sommeil\npour se protéger, mais lorsqu’il se réveille, il se\nretrouve dans un endroit inconnu et panique."
        it:
          sun: "Dorme 18 ore al giorno. Anche nel sonno,\nsi teletrasporta sugli alberi, coglie le bacche\ne le mangia."
          moon: "Può teletrasportarsi al sicuro anche mentre\ndorme, ma quando si sveglia non capisce dove\nsi trova e viene preso dall’agitazione."
        de:
          sun: "Abra schläft 18 Stunden am Tag. Es kann sich\nim Schlaf auf Bäume teleportieren, um dort\nBeeren zu pflücken und zu essen."
          moon: "Es bringt sich selbst im Schlaf mit Teleport vor\nAngreifern in Sicherheit. Wacht es danach auf,\ngerät es in Panik, weil es nicht weiß, wo es ist."
        es:
          sun: "Abra duerme 18 horas al día. Se teletransporta\na las copas de los árboles y, aún dormido,\nse alimenta de bayas."
          moon: "Puede teletransportarse mientras duerme para\nevitar todo tipo de peligros, pero luego se\ndespierta desconcertado en un lugar extraño."
        ko:
          sun: "1일 18시간을 잔다.\n잠든 채 순간이동으로 나무 위에\n이동하여 나무열매를 따서 먹는다."
          moon: "잠든 사이에도 순간이동 해서\n몸을 지키지만 깨어났을 때\n어디에 있는지 몰라서 당황한다."
        zh_simp:
          sun: "１天中有１８个小时在睡觉。\n即使睡着，也能用瞬间移动\n在树上移动，采树果吃。"
          moon: "即使是睡着的时候也会用\n瞬间移动保护身体，\n但醒来时会因不知自己在何处而慌张。"
        zh_trad:
          sun: "１天中有１８個小時都在睡覺。\n即使在睡夢中也能用瞬間移動\n跑到樹上去採樹果吃。"
          moon: "即使在睡著的時候也會用\n瞬間移動保護自己的安全，\n但醒來時會因不知自己在何處而慌張。"
