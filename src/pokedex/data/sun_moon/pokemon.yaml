      types:
        - fighting
        - steel
      egg_groups:
        - field
        - human_like
      abilities:
        - steadfast
        - inner_focus
      hidden_ability: justified
      descriptions:
        jp_kana:
          sun: "よみとるだけ　ではなく　はどうを\nあやつる　ちからを　てに　いれた。\nたたかいにも　りよう　するぞ。"
          moon: "１キロさきの　いきものの　しゅるいや\nきもちを　キャッチする。　はどうを\nあやつり　むれで　えものを　かる。"
        jp_kanji:
          sun: "読み取るだけ　ではなく　波動を\n操る　力を　手に　入れた。\n戦いにも　利用　するぞ。"
          moon: "１キロ先の　生き物の　種類や\n気持ちを　キャッチする。　波動を\n操り　群れで　獲物を　狩る。"
        en:
          sun: "Not only does it perceive auras, but it has also\ngained the power to control them. It employs\nthem in battle."
          moon: "They can detect the species of a living being—\nand its emotions—from over half a mile away.\nThey control auras and hunt their prey in packs."
        fr:
          sun: "Ne se contentant pas de percevoir les auras,\nil peut également les modifier. Il n’hésite pas\nà s’en servir en plein combat."
          moon: "Il peut détecter les émotions des individus\nse trouvant à 1 km, ainsi que leur espèce.\nIl chasse en meute en se servant des auras."
        it:
          sun: "Oltre a essere in grado di percepire l’aura,\nha anche la capacità di controllarla.\nSfrutta questa sua abilità anche nelle lotte."
          moon: "Riesce a identificare creature ed emozioni a\n1 km di distanza. Sfrutta la sua capacità di\npercepire l’aura per cacciare in gruppo."
        de:
          sun: "Es kann Auren nicht nur wahrnehmen, sondern\nauch manipulieren. Diese Fähigkeit nutzt es\nbeim Kämpfen."
          moon: "Es kann aus 1 km Entfernung die Art und auch\ndie Gefühle von Lebewesen erfassen. Es jagt\nim Rudel und manipuliert die Aura der Beute."
        es:
          sun: "No solo es capaz de detectar auras, sino\ntambién de manipularlas. Esta habilidad le\nresulta muy útil durante los combates."
          moon: "Detecta la presencia y los sentimientos de los\nseres vivos a más de 1 km de distancia,\nhabilidad que aprovecha para cazar en grupos."
        ko:
          sun: "간파하는 것뿐만 아니라\n파동을 조종하는 힘을 얻었다.\n싸울 때도 이용한다."
          moon: "1km 앞의 생물의 종류나\n기분을 캐치한다. 파동을\n이용해 무리로 먹이를 사냥한다."
        zh_simp:
          sun: "不仅仅是读取，\n还获得了操控波导的能力。\n也会被用于战斗。"
          moon: "能侦测到１公里开外\n生物的种类和心情。\n操纵波导以群体形式狩猎。"
        zh_trad:
          sun: "不僅僅是讀取，\n還獲得了操控波導的能力。\n也會用於戰鬥。"
          moon: "能察覺到１公里外\n生物的種類和心情。\n操縱波導以群體形式狩獵。"
    lucario_mega:
      form_id: 1
      names:
        jp_kana: メガルカリオ
        jp_kanji: メガルカリオ
        en: Mega Lucario
        fr: Méga-Lucario
        it: MegaLucario
        de: Mega-Lucario
        es: Mega-Lucario
        ko: 메가루카리오
        zh_simp: 超级路卡利欧
        zh_trad: 超級路卡利歐
      base_stats:
        hp: 70
        attack: 145
        defense: 88
        special_attack: 140
        special_defense: 70
        speed: 112
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fighting
        - steel
      egg_groups:
        - field
        - human_like
      abilities:
        - adaptability
      descriptions:
        jp_kana:
          sun: "メガシンカ　エネルギーと　はどうが\nまじりあい　かけめぐった　あとが\nぜんしんに　くろく　きざまれている。"
          moon: "ぜんしんけいを　しゅうちゅうして\nめのまえの　てきに　いどむ。\nたたかいぶりは　ひじょうの　ひとこと。"
        jp_kanji:
          sun: "メガシンカ　エネルギーと　波動が\n混じり合い　駆け廻った　痕が\n全身に　黒く　刻まれている。"
          moon: "全神経を　集中して\n目の前の　敵に　挑む。\n戦いぶりは　非情の　一言。"
        en:
          sun: "Black streaks all over its body show where\nits auras and the energy of Mega Evolution\nintermingled and raced through it."
          moon: "It readies itself to face its enemies by focusing\nits mental energies. Its fighting style can be\nsummed up in a single word: heartless."
        fr:
          sun: "L’énergie de la Méga-Évolution s’est mélangée\nà son aura. Ensemble, elles ont coulé sur son\ncorps et y ont laissé des traces noires."
          moon: "Tout son système nerveux est mis à contribution\nlorsqu’il engage un combat. Il est absolument\nsans pitié lorsqu’il se bat."
        it:
          sun: "L’energia della megaevoluzione si è mescolata\na quella della sua aura e attraversando il suo\ncorpo ha lasciato delle cicatrici scure."
          moon: "Ha la padronanza totale del proprio sistema\nnervoso e si lancia sul nemico con la massima\nconcentrazione. Lotta con una furia implacabile."
        de:
          sun: "Als die mit seiner Aura vermischte Energie der\nMega-Entwicklung seinen Körper durchströmte,\nhinterließ sie schwarze Muster auf der Haut."
          moon: "Es fokussiert all seine Sinne auf den\nbevorstehenden Angriff. Rücksichtnahme\nim Kampf kennt es nicht."
        es:
          sun: "La energía de la megaevolución se funde con su\naura y recorre su cuerpo, lo que le deja unas\nprofundas marcas negras en la piel."
          moon: "Se concentra al máximo para atacar a su\noponente, al que se enfrenta de forma\ndespiadada."
        ko:
          sun: "메가진화 에너지와 파동이\n섞여 돌아다닌 흔적이\n온몸에 검게 새겨져 있다"
          moon: "모든 신경을 집중해서\n눈 앞의 적에게 맞선다.\n싸우는 모습은 한마디로 비정하다."
        zh_simp:
          sun: "超级进化的能量和波导\n混合在一起来回乱窜，\n将全身刻满了黑色的痕迹。"
          moon: "集中全部精神，\n向眼前的敌人发起挑战。\n战斗风格就是一个词“无情”。"
        zh_trad:
          sun: "超級進化的能量和波導\n交互混合在體內流竄，\n讓全身留下黑色的痕跡。"
          moon: "全神貫注，向眼前的敵人挑戰。\n戰鬥風格只能用「無情」兩字形容。"
