          moon: "생태계를 감시하고 있다고\n여겨지고 있다. 더 큰\n힘을 숨기고 있다는 소문이다."
        zh_simp:
          sun: "细胞聚集了５０％的样子。\n会毫不留情地把敌对者全部消灭。"
          moon: "被认为监视着生态系统。\n有传言，它蕴藏着更为强大的力量。"
        zh_trad:
          sun: "細胞聚集了５０％的樣子。\n會毫不留情地把敵對者全部消滅。"
          moon: "被認為監視著生態系統。\n有傳言說牠蘊藏著更為強大的力量。"
    zygarde_10_forme:
      form_id: 1
      names:
        jp_kana: １０％フォルム
        jp_kanji: １０％フォルム
        en: 10% Forme
        fr: Forme 10 %
        it: Forma 10%
        de: 10%-Form
        es: Forma 10%
        ko: 10%폼
        zh_simp: １０％形态
        zh_trad: １０％形態
      base_stats:
        hp: 54
        attack: 100
        defense: 71
        special_attack: 61
        special_defense: 85
        speed: 115
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - undiscovered
      abilities:
        - aura_break
      descriptions:
        jp_kana:
          sun: "するどい　キバで　てきを　しとめる。\nずっと　このからだを　いじ　できず\nいっていじかんで　バラバラになる。"
          moon: "セルと　よばれる　ジガルデの　いちぶが\n１０％ほど　あつまった　すがた。\nじそく１００キロで　ちを　かける。"
        jp_kanji:
          sun: "鋭い　キバで　敵を　仕留める。\nずっと　この身体を　維持　できず\n一定時間で　バラバラになる。"
          moon: "セルと　呼ばれる　ジガルデの　一部が\n１０％ほど　集まった　姿。\n時速１００キロで　地を　駆ける。"
        en:
          sun: "Its sharp fangs make short work of finishing off\nits enemies, but it’s unable to maintain this body\nindefinitely. After a period of time, it falls apart."
          moon: "This is Zygarde’s form when about 10% of its\ncells have been gathered. It runs across the\nland at speeds greater than 60 mph."
        fr:
          sun: "Ses griffes acérées déchirent ses adversaires.\nIl ne peut pas conserver cette forme longtemps,\net se délite après un certain temps."
          moon: "La forme que Zygarde prend lorsqu’il rassemble\nenviron 10 % de ses Cellules. Il est capable de\nse déplacer à 100 km/h."
        it:
          sun: "Si abbatte sul nemico con le sue zanne affilate.\nÈ una forma instabile e non riesce a mantenerla\na lungo, per cui dopo un certo tempo si disgrega."
          moon: "Quando il 10% delle sue cellule si aggrega,\nZygarde assume questa forma.\nPuò correre alla velocità di 100 km/h."
        de:
          sun: "Es greift seine Beute mit spitzen Fangzähnen an.\nDa es diese Form nicht lange beibehalten kann,\nzerfällt es nach einer Weile in seine Bestandteile."
          moon: "Diese Form besteht aus Zellen von Zygarde,\ndie 10 % seiner maximalen Masse darstellen.\nAn Land erreicht es bis zu 100 km/h."
        es:
          sun: "Abate a sus enemigos con sus afilados colmillos.\nEsta forma es inestable, por lo que termina\ndeshaciéndose transcurrido un tiempo."
          moon: "Zygarde adopta esta forma al reunir cerca\ndel 10% de sus células. Puede desplazarse\na 100 km/h."
        ko:
          sun: "날카로운 이빨로 상대를 처리한다.\n계속 이 몸을 유지할 수 없어서\n일정 시간이 지나면 흩어져버린다."
          moon: "셀이라고 불리는 지가르데의 일부가\n10% 정도 모인 모습.\n시속 100km로 대지를 달린다."
        zh_simp:
          sun: "用锋利的牙齿了结敌人。\n无法一直维持这个身体，\n一段时间后就会变得七零八落。"
          moon: "被称为细胞的基格尔德的一部分\n聚集了１０％左右的样子。\n以时速１００公里在地面奔驰。"
        zh_trad:
          sun: "用鋒利的牙齒了結敵人。\n無法一直維持這個身體，\n一段時間後就會變得七零八落。"
          moon: "基格爾德組成分子「細胞」\n聚集了１０％左右的樣子。\n會以１００公里的時速在地面奔馳。"
