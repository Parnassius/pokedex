carvanha:
  species_id: 318
  names:
    jp_kana: キバニア
    jp_kanji: キバニア
    en: Carvanha
    fr: Carvanha
    it: Carvanha
    de: Kanivanha
    es: Carvanha
    ko: 샤프니아
    zh_simp: 利牙鱼
    zh_trad: 利牙魚
  forms:
    carvanha:
      form_id: 0
      base_stats:
        hp: 45
        attack: 90
        defense: 20
        special_attack: 65
        special_defense: 20
        speed: 65
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
      abilities:
        - rough_skin
      hidden_ability: speed_boost
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          sun: "むれごとに　テリトリーを　もっている。\nしんにゅうする　ものは　ようしゃなく\nキバを　むきだしにして　おそいかかる。"
          moon: "わずかな　ちの　においを　かぎつけ\nしゅうだんで　えものを　おそう。\n１ぴきでは　けっこう　おくびょう。"
        jp_kanji:
          sun: "群れごとに　テリトリーを　持っている。\n侵入する　者は　容赦なく\nキバを　むきだしにして　襲いかかる。"
          moon: "わずかな　血の　匂いを　嗅ぎつけ\n集団で　獲物を　襲う。\n１匹では　結構　おくびょう。"
        en:
          sun: "Each school has its own territory. Any intruders\nare mercilessly attacked with fangs bared."
          moon: "If they scent the faintest trace of blood, they\nrush to attack en masse. When alone, they’re\nrather cowardly."
        fr:
          sun: "Il protège son territoire en se déplaçant en banc.\nLe moindre intrus est raccompagné sans pitié,\nà grands claquements de mâchoire."
          moon: "En banc, il guette l’odeur du sang et fond sur\nsa proie sans aucune pitié. Seul, il se montre\nplus timoré."
        it:
          sun: "I branchi di Carvanha difendono il territorio\nlanciandosi contro gli intrusi e attaccandoli\ncon le zanne micidiali."
          moon: "In gruppo, questo Pokémon attacca le prede\nappena avverte odore di sangue.\nDa solo, invece, è molto timido."
        de:
          sun: "Schwärme von Kanivanha schützen ihr Revier,\nindem sie sich mit gefletschten Zähnen\ngnadenlos auf Eindringlinge stürzen."
          moon: "Wittert es auch nur einen Hauch von Blut,\ngreift es im Schwarm seine Beute an.\nAlleine ist es hingegen ziemlich furchtsam."
        es:
          sun: "Cada banco de Carvanha tiene su propio\nterritorio. En cuanto detectan a un intruso, sacan\nlos dientes y lo atacan sin miramientos."
          moon: "En cuanto huelen la menor cantidad de sangre,\ntodo el grupo ataca a la presa, pero cuando van\nen solitario se amilanan fácilmente."
        ko:
          sun: "무리별로 영역이 있다.\n침입하는 자는 봐주지 않고\n이빨을 드러내며 덤벼든다."
          moon: "아주 적은 피 냄새에도 먹이를 찾아내\n집단으로 먹이를 덮친다.\n1마리만 있으면 꽤 겁쟁이다."
        zh_simp:
          sun: "每个群体都拥有自己的领地。\n对于入侵者，会毫不留情地\n露出牙齿发动袭击。"
          moon: "即使一丝丝血的味道也能闻到，\n并以集群形式袭击猎物。\n但只有１只的话，就相当胆小。"
        zh_trad:
          sun: "每個群體都擁有自己的地盤。\n對於入侵者，會毫不留情地\n露出牙齒發動攻擊。"
          moon: "能聞出些微的鮮血氣味，\n集體攻擊獵物。\n只有１隻的時候相當膽小。"
sharpedo:
  species_id: 319
  names:
    jp_kana: サメハダー
    jp_kanji: サメハダー
    en: Sharpedo
    fr: Sharpedo
    it: Sharpedo
    de: Tohaido
    es: Sharpedo
    ko: 샤크니아
    zh_simp: 巨牙鲨
    zh_trad: 巨牙鯊
  forms:
