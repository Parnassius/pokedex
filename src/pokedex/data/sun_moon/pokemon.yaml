drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    jp_kanji: フワンテ
    en: Drifloon
    fr: Baudrive
    it: Drifloon
    de: Driftlon
    es: Drifloon
    ko: 흔들풍손
    zh_simp: 飘飘球
    zh_trad: 飄飄球
  forms:
    drifloon:
      form_id: 0
      base_stats:
        hp: 90
        attack: 50
        defense: 34
        special_attack: 60
        special_defense: 44
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      hidden_ability: flare_boost
      descriptions:
        jp_kana:
          sun: "おさないこどもの　てを　にぎり\nあのよへと　つれさる　という。\nおもたい　こどもは　キライ。"
          moon: "なにかの　ひょうしで　からだが\nわれると　さけびのような　おとと\nともに　たましいが　あふれだす。"
        jp_kanji:
          sun: "幼い子どもの　手を　握り\nあの世へと　連れ去る　という。\n重たい　子どもは　キライ。"
          moon: "なにかの　拍子で　身体が\n割れると　叫びのような　音と\nともに　魂が　あふれだす。"
        en:
          sun: "Stories go that it grabs the hands of small\nchildren and drags them away to the afterlife.\nIt dislikes heavy children."
          moon: "If for some reason its body bursts, its soul spills\nout with a screaming sound."
        fr:
          sun: "Il guide les petits enfants par la main vers\nl’autre monde. Mais seulement les plus jeunes,\ncar après, ils sont trop lourds pour lui."
          moon: "Si par malheur il éclate, le Baudrive émet alors\nun bruit terrible, comme un cri déchirant.\nC’est à vous fendre le cœur."
        it:
          sun: "Si dice che prenda per mano i bambini e li\naccompagni nell’aldilà. Preferisce quelli piccoli\ne leggeri."
          moon: "Se il suo corpo si buca accidentalmente, la sua\nessenza vitale fuoriesce con un suono simile\na un lamento."
        de:
          sun: "Es heißt, dass es kleine Kinder an die\nHand nehme und ins Jenseits zerre.\nSchwere Kinder sind ihm eine Last."
          moon: "Wenn aus irgendeinem Grund sein Körper platzt,\nentweicht seine Seele mit einem Geräusch, das\nwie ein Schrei klingt."
        es:
          sun: "Se dice que coge a niños pequeños de la mano\ny se los lleva al otro mundo. Prefiere a los niños\nque no pesan mucho."
          moon: "Si por alguna razón su cuerpo llega a reventar,\nemite un sonido parecido al de un grito al tiempo\nque se escapa su energía vital."
        ko:
          sun: "어린아이의 손을 잡고\n저세상으로 데려간다고 한다.\n무거운 아이를 싫어한다."
          moon: "어떤 박자에 몸이\n터지면 비명 같은 소리와\n함께 영혼이 흘러나온다"
        zh_simp:
          sun: "据说会牵着年幼孩子的手，\n将其带去另一个世界。\n不喜欢身体重的孩子。"
          moon: "身体因某种原因弄破的话，\n就会伴随着呼喊一样的声音\n溢出魂魄来。"
        zh_trad:
          sun: "據說會牽著年幼孩子的手，\n將其帶去另一個世界。\n不喜歡身體重的孩子。"
          moon: "身體因某種原因破掉的話，\n就會伴隨著呼喊一樣的聲音\n溢出魂魄來。"
