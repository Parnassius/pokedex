slowpoke:
  species_id: 79
  names:
    jp_kana: ヤドン
    jp_kanji: ヤドン
    en: Slowpoke
    fr: Ramoloss
    it: Slowpoke
    de: Flegmon
    es: Slowpoke
    ko: 야돈
    zh_simp: 呆呆兽
    zh_trad: 呆呆獸
  forms:
    slowpoke:
      form_id: 0
      base_stats:
        hp: 90
        attack: 65
        defense: 65
        special_attack: 40
        special_defense: 40
        speed: 15
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      hidden_ability: regenerator
      held_items:
        rare: lagging_tail
      descriptions:
        jp_kana:
          sun: "ながい　しっぽは　よくちぎれる。\nとくに　いたみも　かんじないし\nすぐに　はえるので　きにしない。"
          moon: "ヤドンのしっぽを　ほしたあと\nしおみずで　にこんだ　りょうりは\nアローラの　かていの　あじ。"
        jp_kanji:
          sun: "長い　尻尾は　よく千切れる。\n特に　痛みも　感じないし\nすぐに　生えるので　気にしない。"
          moon: "ヤドンの尻尾を　干したあと\n塩水で　煮込んだ　料理は\nアローラの　家庭の　味。"
        en:
          sun: "Its long tail often breaks off. It doesn’t really\nfeel any pain, though, and the tail grows back,\nso Slowpoke isn’t particularly bothered."
          moon: "Alolan home cooking involves drying Slowpoke\ntails and then simmering them into a salty stew."
        fr:
          sun: "Souvent, sa longue queue se coupe toute seule.\nCela ne lui cause aucune douleur et une autre\npousse aussitôt, donc il n’y a pas à s’en faire."
          moon: "Une recette traditionnelle d’Alola consiste à\nfaire sécher des queues de Ramoloss puis à\nles faire bouillir dans de l’eau salée."
        it:
          sun: "La sua lunga coda si spezza facilmente, ma\nsenza causargli dolore. Inoltre, ricresce sempre,\nquindi il Pokémon non sembra preoccuparsene."
          moon: "La coda di Slowpoke essiccata e bollita a fuoco\nlento in acqua salata è un piatto tipico della\ncucina di Alola."
        de:
          sun: "Seine Rute bricht sehr leicht ab. Dies kümmert\nes jedoch wenig, da es dabei keine Schmerzen\nspürt und sie sofort wieder nachwächst."
          moon: "In Alola bereiten viele Familien Flegmon-Ruten\nzu, indem sie diese zuerst trocknen und dann\nin Salzwasser kochen."
        es:
          sun: "Pierde la cola con frecuencia, pero, como no\nle duele y le crece de nuevo rápidamente, no\nle da ninguna importancia."
          moon: "Un plato típico de la cocina de Alola son las\ncolas de Slowpoke desecadas y cocinadas\nen agua salada."
        ko:
          sun: "긴 꼬리는 잘 잘린다.\n특별히 아픔도 느끼지 않고\n바로 자라기 때문에 신경 쓰지 않는다."
          moon: "야돈의 꼬리를 말린 뒤\n소금물에 푹 끓인 요리는\n알로라의 가정식 메뉴다."
        zh_simp:
          sun: "长长的尾巴经常被揪断。\n因为也不会觉得特别痛，\n马上会长出来，所以并不在意。"
          moon: "把呆呆兽的尾巴晒干后\n再用盐水煮成的小菜，\n是阿罗拉的家常美味。"
        zh_trad:
          sun: "長長的尾巴經常斷掉。\n因為不會感到什麼疼痛，\n而且馬上又會長出來，所以並不在意。"
          moon: "把呆呆獸的尾巴曬乾\n再用鹽水煮成的小菜，\n是阿羅拉的家常美味。"
slowbro:
  species_id: 80
  names:
    jp_kana: ヤドラン
    jp_kanji: ヤドラン
    en: Slowbro
    fr: Flagadoss
    it: Slowbro
    de: Lahmus
    es: Slowbro
    ko: 야도란
    zh_simp: 呆壳兽
    zh_trad: 呆殼獸
  forms:
    slowbro:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 110
        special_attack: 100
        special_defense: 80
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      hidden_ability: regenerator
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          sun: "うみを　ながめ　ぼーっと　している。\nシェルダーのどくが　からだに　まわり\nより　ぼんやりするように　なった。"
          moon: "シェルダーが　つよく　かむたび\nいっしゅん　なにかを　ひらめくが\nあっというまに　わすれてしまう。"
        jp_kanji:
          sun: "海を　眺め　ぼーっと　している。\nシェルダーの毒が　身体に　回り\nより　ぼんやりするように　なった。"
          moon: "シェルダーが　強く　噛むたび\n一瞬　なにかを　閃くが\nあっという間に　忘れてしまう。"
        en:
          sun: "It spaces out while gazing at the sea.\nWith Shellder’s poison flowing through its body,\nit becomes even spacier."
          moon: "Whenever Shellder bites down hard on its tail,\nit gives Slowbro a flash of inspiration...which it\nforgets a moment later."
        fr:
          sun: "Il aime contempler la mer sans bouger. Le poison\ndu Kokiyas répandu dans son organisme a\nencore plus ralenti son métabolisme."
          moon: "Chaque fois que le Kokiyas mord avec force,\nil a soudain une idée de génie, mais il l’oublie\nimmédiatement."
        it:
          sun: "Contempla il mare con aria assente.\nIl veleno di Shellder che circola nel suo corpo\nlo rende ancora più stordito."
          moon: "Ogni volta che lo Shellder che ha sulla coda\nlo morde, aguzza l’ingegno e gli viene un’idea\nbrillante, ma un attimo dopo l’ha già dimenticata."
        de:
          sun: "Es betrachtet oft mit leerem Blick das Meer.\nDas Gift, das Muschas in seinen Körper injiziert,\nerhöht seine Begriffsstutzigkeit noch weiter."
          moon: "Beißt das Muschas an seinem Schweif beherzt\nzu, hat es eine geniale Idee, die es aber sofort\nwieder vergisst."
        es:
          sun: "Contemplar el océano le permite relajarse y\ndesconectar. Si el veneno de Shellder circula por\nsus venas, alcanza el culmen de la relajación."
          moon: "Cada vez que Shellder le muerde la cola, se le\nocurre una idea brillante, pero la olvida instantes\ndespués."
        ko:
          sun: "바다를 바라보며 멍하니 있다.\n셀러의 독이 몸에 퍼져서\n더욱 멍하니 있게 되었다."
          moon: "셀러가 세게 물 때마다\n퍼뜩 무언가가 떠오르지만\n순식간에 잊어버린다."
        zh_simp:
          sun: "呆呆地望着大海。\n因大舌贝的毒在身体中循环\n而变得越来越傻乎乎。"
          moon: "每次大舌贝狠狠咬下去的瞬间\n会有什么在脑海中闪过，\n但转瞬之间就全部忘光了。"
        zh_trad:
          sun: "呆呆地遠望著大海。\n大舌貝的毒因為在身體中循環，\n變得越來越呆呆笨笨的。"
          moon: "每次大舌貝狠狠咬下去的瞬間\n會有什麼在腦海中閃過，\n但轉瞬之間就全部忘光了。"
    slowbro_mega:
      form_id: 1
      names:
        jp_kana: メガヤドラン
        jp_kanji: メガヤドラン
        en: Mega Slowbro
        fr: Méga-Flagadoss
        it: MegaSlowbro
        de: Mega-Lahmus
        es: Mega-Slowbro
        ko: 메가야도란
        zh_simp: 超级呆壳兽
        zh_trad: 超級呆殼獸
      base_stats:
        hp: 95
        attack: 75
        defense: 180
        special_attack: 130
        special_defense: 80
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - shell_armor
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          sun: "メガシンカの　エネルギーは　すべて\nしっぽの　シェルダーに　そそがれた。\nそして　ヤドンは　まるのみに　された。"
          moon: "メガシンカの　エネルギーを　あびた\nシェルダーは　てっぺきの　よろい。\nヤドンには　とくに　へんかナシ。"
        jp_kanji:
          sun: "メガシンカの　エネルギーは　すべて\n尻尾の　シェルダーに　注がれた。\nそして　ヤドンは　丸呑みに　された。"
          moon: "メガシンカの　エネルギーを浴びた\nシェルダーは　鉄壁の　鎧。\nヤドンには　特に　変化ナシ。"
        en:
          sun: "All the energy from Mega Evolution poured into\nthe Shellder on its tail, leaving Slowpoke to be\nswallowed whole."
          moon: "When bathed in the energy of Mega Evolution,\nShellder converts into impregnable armor.\nThere is virtually no change in Slowpoke."
        fr:
          sun: "Toute l’énergie de la Méga-Évolution a été\ndétournée au profit du Kokiyas de sa queue,\nqui n’a fait qu’une bouchée du Ramoloss."
          moon: "L’énergie de la Méga-Évolution a transformé le\nKokiyas en une armure indestructible.\nLe Ramoloss, lui, n’a subi aucun changement."
        it:
          sun: "L’energia della megaevoluzione si è riversata\ntutta sullo Shellder attaccato alla coda che\nha finito per inghiottire lo Slowpoke."
          moon: "La megaevoluzione ha trasformato lo Shellder\nin un’armatura impenetrabile. Lo Slowpoke,\ninvece, non sembra aver subito cambiamenti."
        de:
          sun: "Das Muschas an Flegmons Rute hat die gesamte\nEnergie der Mega-Entwicklung in sich absorbiert.\nSo wurde Flegmon fast vollständig verschlungen."
          moon: "Muschas wurde durch die Energie der\nMega-Entwicklung zu einem eisernen Panzer.\nFlegmon hingegen hat sich kaum verändert."
        es:
          sun: "Toda la energía derivada de la megaevolución ha\nrecaído sobre el Shellder que porta en su cola,\nque ha engullido casi del todo al propio Slowpoke."
          moon: "La energía de la megaevolución ha convertido\na Shellder en una armadura impenetrable.\nNo hay ningún cambio aparente en Slowpoke."
        ko:
          sun: "메가진화의 에너지는 모두\n꼬리의 셀러에게 흘러 들어갔다.\n그리고 야돈은 통째로 먹혔다."
          moon: "메가진화 에너지를 받은\n셀러는 철벽의 갑옷이다.\n야돈에게는 특별히 변화 없음."
        zh_simp:
          sun: "超级进化的能量全部被\n注入到了尾部的大舌贝里。\n然后呆呆兽被整个吞下。"
          moon: "沐浴了超级进化能量的\n大舌贝是铜墙铁壁般的铠甲。\n对于呆呆兽来说并没有特别的变化。"
        zh_trad:
          sun: "超級進化的能量全部被\n注入到了尾部的大舌貝裡。\n然後呆呆獸被整個吞下。"
          moon: "吸收了超級進化能量的\n大舌貝成了銅牆鐵壁般的鎧甲。\n呆呆獸本身並沒有什麼變化。"
magnemite:
  species_id: 81
  names:
    jp_kana: コイル
    jp_kanji: コイル
