wingull:
  species_id: 278
  names:
    jp_kana: キャモメ
    jp_kanji: キャモメ
    en: Wingull
    fr: Goélise
    it: Wingull
    de: Wingull
    es: Wingull
    ko: 갈모매
    zh_simp: 长翅鸥
    zh_trad: 長翅鷗
  forms:
    wingull:
      form_id: 0
      base_stats:
        hp: 40
        attack: 30
        defense: 30
        special_attack: 55
        special_defense: 30
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
        - flying
      egg_groups:
        - water_1
        - flying
      abilities:
        - keen_eye
        - hydration
      hidden_ability: rain_dish
      held_items:
        common: pretty_feather
      descriptions:
        jp_kana:
          sun: "ホネは　かるさのために　スカスカ。\nおおきな　つばさで　かぜを　うけ\nおおぞらへと　まいあがる。"
          moon: "キャモメが　とびかう　うみの　したは\nさかなポケモンが　むれているので\nりょうしは　まずキャモメを　さがす。"
        jp_kanji:
          sun: "骨は　軽さのために　スカスカ。\n大きな　翼で　風を　受け\n大空へと　舞いあがる。"
          moon: "キャモメが　飛び交う　海の　下は\nさかなポケモンが　群れているので\n漁師は　まずキャモメを　探す。"
        en:
          sun: "Its hollow bones enhance its lightness.\nIt spreads its wings to the wind and soars away\ninto the sky."
          moon: "Fishermen keep an eye out for Wingull in the\nsky, because wherever they’re circling, the\nocean is sure to be teeming with fish Pokémon."
        fr:
          sun: "Son ossature légère lui confère un vol gracieux,\ntandis que le vent s’engouffre sous ses grandes\nailes, lui permettant de s’élever au firmament."
          moon: "Les Goélise survolent les mers qui grouillent de\nPokémon poissons. Un grand pêcheur a dit :\n« Si tu veux une bonne prise, suis le Goélise. »"
        it:
          sun: "Volteggia lieve nel cielo sfruttando le correnti\ngrazie alle ossa leggere e alle grandi ali."
          moon: "I pescatori li tengono d’occhio per via della\nloro abitudine di volare sui tratti di mare dove\nsi radunano i Pokémon acquatici."
        de:
          sun: "Seine Knochen sind hohl und daher sehr leicht.\nMit seinen ausgebreiteten großen Flügeln steigt\nes hoch in den Himmel empor."
          moon: "Fischer halten gerne Ausschau nach Wingull,\ndenn wo diese ihre Kreise ziehen, scharen sich\nunter Wasser Schwärme von Fisch-Pokémon."
        es:
          sun: "Sus huesos livianos y sus grandes alas le\npermiten dejarse llevar por el viento y surcar\nlos cielos grácilmente."
          moon: "Suele sobrevolar los bancos de Pokémon pez,\npor lo que los pescadores siguen a Wingull\ncuando buscan buenas capturas."
        ko:
          sun: "뼈는 무게를 줄이기 위해 비어 있다.\n큰 날개로 바람을 타고\n넓은 하늘로 날아오른다."
          moon: "갈모매가 어지럽게 나는 바다 아래에는\n물고기포켓몬이 무리 지어 있으므로\n어부들은 우선 갈모매부터 찾는다."
        zh_simp:
          sun: "为了轻盈，骨骼空空的。\n用大大的翅膀迎风，\n向着浩瀚天空飞翔。"
          moon: "在长翅鸥飞来飞去的海下面\n聚集着成群的鱼宝可梦，\n所以渔夫会先寻找长翅鸥。"
        zh_trad:
          sun: "空心的骨頭是為了保持輕盈。\n用大大的翅膀迎著風，\n飛向浩瀚的天空。"
          moon: "在長翅鷗飛來飛去的海底下\n聚集著成群的魚寶可夢，\n所以漁夫會先尋找長翅鷗。"
pelipper:
  species_id: 279
  names:
