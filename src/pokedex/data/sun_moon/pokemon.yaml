          sun: "ギャラドスを　おこらせた　あるまちは\nひとばんの　うちに　やきつくされ\nあとかたも　なくなったと　いわれる。"
          moon: "ギャラドスが　あらわれる　ばしょは\nはかいされる　さだめに　あると\nしんじている　ひとも　いる。"
        jp_kanji:
          sun: "ギャラドスを　怒らせた　ある街は\n一晩の　うちに　焼き尽くされ\n跡形も　なくなったと　いわれる。"
          moon: "ギャラドスが　現れる　場所は\n破壊される　定めに　あると\n信じている　人も　いる。"
        en:
          sun: "A tale is told of a town that angered Gyarados.\nBefore the sun rose the next day, flames utterly\nconsumed the town, leaving not a trace behind."
          moon: "There are people who swear that any place\nGyarados appears is fated for destruction."
        fr:
          sun: "Il existe une légende à propos d’une ville qui a\nmis un Léviator en colère et qui a été réduite\nen cendres en une nuit."
          moon: "Certaines personnes croient que les endroits où\nun Léviator apparaît sont destinés à connaître\nla destruction."
        it:
          sun: "Si racconta che Gyarados, infuriato contro gli\nabitanti di una città, la incenerì nel giro di\nuna notte."
          moon: "Secondo alcuni, i luoghi dove appare Gyarados\nsono destinati alla distruzione."
        de:
          sun: "Es heißt, es habe eine ganze Stadt, deren\nBewohner es verärgert hatten, über Nacht\nvollständig in Schutt und Asche gelegt."
          moon: "Manche Menschen sind fest davon überzeugt,\ndass Orte, an denen ein Garados erscheint,\ndem Untergang geweiht sind."
        es:
          sun: "Cuentan que un Gyarados se enfadó tanto que\narrasó un poblado en una sola noche y no dejó\nni rastro."
          moon: "Alguna gente cree que aquellos lugares donde\naparece Gyarados están abocados a la\ndestrucción."
        ko:
          sun: "갸라도스를 화나게 한 어떤 마을은\n하룻밤 만에 다 타버려서\n흔적도 없어졌다고 전해진다."
          moon: "갸라도스가 나타난 장소는\n파괴될 운명이라고\n믿고 있는 사람도 있다."
        zh_simp:
          sun: "据说，让暴鲤龙怒火中烧的\n某个街镇在一晚上就被燃烧殆尽，\n然后便消失无踪了。"
          moon: "暴鲤龙出现的地方肯定会遭到破坏，\n相信这个说法的人也是有的。"
        zh_trad:
          sun: "據說，某個激怒了暴鯉龍的城鎮\n在一夜之間就被燃燒殆盡，\n連一點痕跡都沒有留下。"
          moon: "暴鯉龍出現的地方肯定會遭到破壞，\n有些人相信這種說法。"
    gyarados_mega:
      form_id: 1
      names:
        jp_kana: メガギャラドス
        jp_kanji: メガギャラドス
        en: Mega Gyarados
        fr: Méga-Léviator
        it: MegaGyarados
        de: Mega-Garados
        es: Mega-Gyarados
        ko: 메가갸라도스
        zh_simp: 超级暴鲤龙
        zh_trad: 超級暴鯉龍
      base_stats:
        hp: 95
        attack: 155
        defense: 109
        special_attack: 70
