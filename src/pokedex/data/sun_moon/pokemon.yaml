    jp_kanji: アゴジムシ
    en: Grubbin
    fr: Larvibule
    it: Grubbin
    de: Mabula
    es: Grubbin
    ko: 턱지충이
    zh_simp: 强颚鸡母虫
    zh_trad: 強顎雞母蟲
  forms:
    grubbin:
      form_id: 0
      base_stats:
        hp: 47
        attack: 62
        defense: 45
        special_attack: 55
        special_defense: 45
