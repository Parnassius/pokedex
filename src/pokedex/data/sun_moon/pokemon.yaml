      types:
        - fire
      egg_groups:
        - human_like
      abilities:
        - flame_body
      hidden_ability: vital_spirit
      held_items:
        rare: magmarizer
      descriptions:
        jp_kana:
          sun: "つかれると　かこうに　とびこみ\nマグマに　つかって　からだを　いやす。\nぜんしんが　１２００どで　もえている。"
          moon: "おこると　ぜんしんから　しゃくねつの\nほのおを　ふきあげる。　あいてを\nすみに　するまで　おさまらない。"
        jp_kanji:
          sun: "疲れると　火口に　飛び込み\nマグマに　浸かって　体を　癒す。\n全身が　１２００度で　燃えている。"
          moon: "怒ると　全身から　灼熱の\n炎を　噴き上げる。　相手を\n炭に　するまで　収まらない。"
        en:
          sun: "When it’s tired, it leaps into the mouth of a\nvolcano and soaks its body in magma to ease its\nweariness. Its body burns at 2,192 degrees F."
          moon: "When angered, it spouts brilliant fire from all\nover its body. It doesn’t calm down until its\nopponent has burned to ash."
        fr:
          sun: "Quand il est fatigué, il se jette dans un volcan\npour se soigner dans le magma. Son corps brûle\nà 1 200 °C."
          moon: "Quand il s’énerve, une flamme ardente\nl’enveloppe tout entier. Il ne se calme que\nquand son adversaire est réduit en cendres."
        it:
          sun: "Quando è stanco, si tuffa in un vulcano e si\nimmerge nel magma per rimettersi in forze. Il suo\ncorpo ardente ha una temperatura di 1.200 °C."
          moon: "Quando si arrabbia, sprigiona fiamme roventi\nda tutto il corpo. Non si placa finché il nemico\nnon è carbonizzato."
        de:
          sun: "Wenn es erschöpft ist, springt es in einen\nVulkankrater und entspannt sich in der Lava.\nSein brennender Körper ist 1 200 °C heiß."
          moon: "Ist es wütend, stößt es glühend heiße Flammen\naus. Es hört damit erst auf, wenn von seinem\nGegner nur noch Asche übrig ist."
        es:
          sun: "Cuando está agotado, se zambulle en el cráter\nde un volcán para reponer energías. Su cuerpo\nalcanza una temperatura de 1200 °C."
          moon: "Cuando se enfada, llamas candentes empiezan a\nbrotar de su cuerpo. No se tranquiliza hasta que\nsu rival queda carbonizado por completo."
        ko:
          sun: "피곤하면 화구에 뛰어들어\n마그마에 잠겨 몸을 치유한다.\n전신이 1200도로 타고 있다."
          moon: "화가 나면 전신에서 작열하는\n불꽃을 뿜어 올린다. 상대를\n재로 만들 때까지 멈추지 않는다."
        zh_simp:
          sun: "感到疲劳时就跳入火山口，\n浸泡在熔岩中让身体解乏。\n全身以１２００度燃烧着。"
          moon: "生气的时候会从全身喷出\n灼热的火焰，不把对手烧成\n灰烬就无法平息怒火。"
        zh_trad:
          sun: "感到疲勞時會跳入火山口，\n浸泡在熔岩中讓身體舒緩疲勞。\n全身以１２００度燃燒著。"
          moon: "生氣的時候會從全身噴出\n灼熱的火焰，不把對手燒成\n灰燼就無法平息怒火。"
pinsir:
