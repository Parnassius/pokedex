      descriptions:
        jp_kana:
          sun: "てきを　みると　しっぽの　ウロコを\nジャラジャラ　ならして　いかく。\nよわいものは　あわてて　にげだす。"
          moon: "かたい　ウロコは　こうぼういったい。\nかつては　ぶきや　にちようひんに\nかこう　されて　つかわれた。"
        jp_kanji:
          sun: "敵を　見ると　尻尾の　ウロコを\nジャラジャラ　鳴らして　いかく。\n弱い者は　あわてて　逃げ出す。"
          moon: "硬い　鱗は　攻防一体。\nかつては　武器や　日用品に\n加工　されて　使われた。"
        en:
          sun: "When it spots enemies, it threatens them by\njingling the scales on its tail. Weak opponents\nwill crack and flee in panic."
          moon: "Its rigid scales function as offense and defense.\nIn the past, its scales were processed and used\nto make weapons and other commodities."
        fr:
          sun: "Quand il voit un ennemi, il cherche à l’intimider\nen faisant sonner les écailles de sa queue. Les\nplus faibles perdent contenance et s’enfuient."
          moon: "Ses écailles lui servent aussi bien en attaque\nqu’en défense. Jadis, les hommes s’en servaient\npour fabriquer des armes et des objets usuels."
        it:
          sun: "Intimorisce gli avversari con il rumore prodotto\ndalla vibrazione delle scaglie che ha sulla coda.\nSentendolo, i nemici più deboli si danno alla fuga."
          moon: "Le sue squame robuste sono molto versatili.\nUn tempo venivano utilizzate sia come armi,\nsia per costruire oggetti d’uso quotidiano."
        de:
          sun: "Wenn es einen Gegner sieht, rasselt es drohend\nmit seinen Schwanzschuppen. Schwache Gegner\nverlieren dadurch die Fassung und fliehen."
          moon: "Seine harten Schuppen dienen sowohl Angriff\nals auch Verteidigung. Früher wurden aus ihnen\nWaffen und Gebrauchsgüter hergestellt."
        es:
          sun: "Al avistar a su enemigo, lo intimida con el\ntintineo que producen las escamas de su cola.\nLos más débiles se asustan y huyen."
          moon: "Sus sólidas escamas le sirven tanto para atacar\ncomo para defenderse. Antaño se usaban para\nfabricar armas u objetos de uso cotidiano."
        ko:
          sun: "적을 보면 꼬리의 비늘을\n짤랑짤랑 소리를 내며 위협한다.\n약한 자는 허둥대며 도망간다."
          moon: "단단한 비늘은 공방일체.\n한때 무기나 일용품으로\n가공되어 쓰여졌다."
        zh_simp:
          sun: "看到敌人后，会让尾部的鳞片\n发出哐啷哐啷的声音进行威吓。\n弱小的家伙听到声音就会逃走。"
          moon: "坚硬的鳞片集攻防于一体。\n过去曾被加工成武器和日用品来使用。"
        zh_trad:
          sun: "看到敵人後，會讓尾部的鱗片\n發出噹啷噹啷的聲音進行威嚇。\n弱小的傢伙聽到聲音就會逃走。"
          moon: "堅硬的鱗片集攻防於一體。\n過去曾被加工成武器和日用品來使用。"
