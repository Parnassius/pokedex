      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
      hidden_ability: sniper
      held_items:
        rare: sharp_beak
      descriptions:
        jp_kana:
          sun: "ハネが　みじかく　とぶのは　にがて。\nせわしなく　うごきまわり　くさむらの\nむしポケモンを　ついばんでいる。"
          moon: "しょくよくおうせいで　よく　たべる。\nむしポケモンに　なやむ　のうかは\nオニスズメを　たいせつに　する。"
        jp_kanji:
          sun: "ハネが　短く　飛ぶのは　やや苦手。\nせわしなく　動き回り　草むらの\nむしポケモンを　ついばんでいる。"
          moon: "食欲旺盛で　よく　食べる。\nむしポケモンに　悩む　農家は\nオニスズメを　大切に　する。"
        en:
          sun: "Its short wings make it inept at flying.\nIt moves about hurriedly and pecks at\nBug-type Pokémon in the tall grass."
          moon: "Farmers whose fields are troubled by bug\nPokémon appreciate Spearow for its vigorous\nappetite and look after it."
        fr:
          sun: "Ses petites ailes le handicapent pour voler.\nIl préfère se déplacer en hâte et piquer les\nPokémon Insecte dans les hautes herbes."
          moon: "Il est doté d’un appétit insatiable.\nLes fermiers assaillis par des Pokémon Insecte\nprennent grand soin des Piafabec."
        it:
          sun: "A causa delle ali troppo corte, non riesce a\nvolare bene. Scorrazza tra l’erba alta alla ricerca\ndi Pokémon Coleottero da beccare."
          moon: "Ha sempre un grande appetito.\nÈ molto amato dagli agricoltori perché tiene\na bada i Pokémon di tipo Coleottero."
        de:
          sun: "Es kann nicht gut fliegen, da seine Flügel sehr\nkurz sind. Es rennt wild durch hohes Gras, um\nKäfer-Pokémon aufzupicken."
          moon: "Bauern, deren Felder von Käfer-Pokémon\nbefallen sind, schätzen Habitak wegen seines\nunstillbaren Appetits ganz besonders."
        es:
          sun: "Sus alas cortas hacen que no se le dé muy bien\nvolar. Corretea apresuradamente, picoteando los\nPokémon insecto que se encuentre en la hierba."
          moon: "Tiene un apetito voraz y come con frecuencia.\nEn las granjas crían Spearow para combatir\nplagas de Pokémon insecto."
        ko:
          sun: "날개가 짧아 나는 것이 서툴다.\n쉴 새 없이 움직이며 풀숲의\n벌레포켓몬을 쪼아대고 있다."
          moon: "식욕이 왕성해서 잘 먹는다.\n벌레포켓몬으로 고생하는 농가에서는\n깨비참을 소중히 여긴다."
        zh_simp:
          sun: "翅膀很短，飞行也不大在行。\n忙忙碌碌地来回走动，\n啄食草丛里的虫宝可梦。"
          moon: "食欲旺盛而吃得很多。\n因虫宝可梦而烦恼的农户\n对烈雀非常重视。"
        zh_trad:
          sun: "翅膀很短，不太擅長飛行。\n總是忙碌地來回走動，\n啄食草叢裡的蟲寶可夢。"
          moon: "食欲旺盛所以很會吃。\n因蟲寶可夢而煩惱的農戶\n對烈雀非常重視。"
fearow:
