        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - swarm
      descriptions:
        jp_kana:
          sun: "じょうぶな　アゴで　じゅもくを\nけずり　じゅえきを　すする。\nふだんは　じめんの　なかで　くらす。"
          moon: "とりポケモンに　おそわれないよう\nでんきポケモンが　すむ　ばしょに\nあつまっていることが　おおい。"
        jp_kanji:
          sun: "丈夫な　顎で　樹木を\n削り　樹液を　すする。\n普段は　地面の　中で　暮らす。"
          moon: "とりポケモンに　襲われないよう\nでんきポケモンが　棲む　場所に\n集まっていることが　多い。"
        en:
          sun: "Its strong jaw enables it to scrape trees and\nslurp out the sap. It normally lives underground."
          moon: "They often gather near places frequented by\nelectric Pokémon in order to avoid being\nattacked by bird Pokémon."
        fr:
          sun: "Il creuse l’écorce des arbres avec ses robustes\nmandibules pour en siroter la sève. Il vit en\ntemps normal dans le sol."
          moon: "Bien souvent, il se rend là où vivent les Pokémon\nÉlectrik, afin de se prémunir des attaques des\nPokémon oiseaux."
        it:
          sun: "Raschia le cortecce degli alberi con le sue\nrobuste mandibole per succhiarne la linfa.\nVive solitamente sottoterra."
          moon: "Per difendersi dai Pokémon alati, spesso\nsi rifugia nei luoghi abitati da Pokémon\ndi tipo Elettro."
        de:
          sun: "Mit seinem robusten Kiefer schabt es an\nBäumen, um an ihren Pflanzensaft zu\ngelangen. Es lebt normalerweise im Erdreich."
          moon: "Um nicht von Vogel-Pokémon angegriffen\nzu werden, zieht es Orte vor, an denen\nElektro-Pokémon leben."
        es:
          sun: "Con sus duras mandíbulas arranca la corteza de\nlos árboles y sorbe la savia. Suele habitar bajo\ntierra."
          moon: "Para evitar que los Pokémon pájaro los\natormenten, suelen agruparse en lugares donde\nhabitan Pokémon de tipo Eléctrico."
        ko:
          sun: "튼튼한 턱으로 나무를\n갉아서 수액을 마신다.\n평소에는 땅속에서 산다."
          moon: "새포켓몬에게 공격받지 않도록\n전류포켓몬이 사는 장소에\n모여있는 일이 많다."
        zh_simp:
          sun: "用结实的颚部削树木，\n吸取树的汁液。\n平常就在地里生活。"
          moon: "为了不被鸟宝可梦袭击，\n经常聚集在电属性宝可梦栖息的地方。"
        zh_trad:
          sun: "會用結實的下顎切削樹木，\n並吸取樹的汁液。\n平常則是在地底下生活。"
          moon: "為了不被鳥寶可夢襲擊，\n經常聚集在電屬性寶可夢棲息的地方。"
charjabug:
