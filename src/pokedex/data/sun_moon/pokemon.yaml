emolga:
  species_id: 587
  names:
    jp_kana: エモンガ
    jp_kanji: エモンガ
    en: Emolga
    fr: Emolga
    it: Emolga
    de: Emolga
    es: Emolga
    ko: 에몽가
    zh_simp: 电飞鼠
    zh_trad: 電飛鼠
  forms:
    emolga:
      form_id: 0
      base_stats:
        hp: 55
        attack: 75
        defense: 60
        special_attack: 75
        special_defense: 60
        speed: 103
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
        - flying
      egg_groups:
        - field
      abilities:
        - static
      hidden_ability: motor_drive
      descriptions:
        jp_kana:
          sun: "マントのような　まくで　かっくう。\nでんきを　まきちらして　てきも\nみかたも　かんでん　させまくる。"
          moon: "でんげきで　きのみや　むしポケモンを\nこんがり　やいて　くう。　ツツケラが\nあけた　きのあなが　おもな　すだ。"
        jp_kanji:
          sun: "マントのような　膜で　滑空。\n電気を　まき散らして　敵も\n味方も　感電　させまくる。"
          moon: "電撃で　木の実や　むしポケモンを\nこんがり　焼いて　喰う。　ツツケラが\n空けた　木の穴が　主な　巣だ。"
        en:
          sun: "It glides using its cape-like membrane.\nElectrical energy scatters from it, shocking\nits friends and foes alike."
          moon: "It grills berries and bug Pokémon with electric\nshocks and makes a meal of them. It usually\nnests in the holes gouged in trees by Pikipek."
        fr:
          sun: "Telle une cape de super-héros, sa membrane\nde peau lui permet de planer. Il décharge alors\nson électricité sur ses ennemis... et ses alliés."
          moon: "L’électricité lui sert à griller à point fruits et\nPokémon Insecte. Il fait généralement son nid\ndans les arbres creusés par les Picassaut."
        it:
          sun: "Si serve della membrana simile a un mantello\nper planare. Emana scariche elettriche che\npossono colpire nemici e alleati."
          moon: "Arrostisce bacche e Pokémon Coleottero con\nscariche elettriche per poi mangiarli. Fa il nido\nnei buchi degli alberi fatti da Pikipek."
        de:
          sun: "Es gleitet mit seinen Fluglappen, die einem Cape\nähneln, durch die Luft. Es entlädt ständig Strom,\nder Freund und Feind Stromschläge verpasst."
          moon: "Mit Strom röstet es Beeren und Käfer-Pokémon,\nbevor es sie frisst. Es lebt hauptsächlich in\nBaumhöhlen, die von Peppeck gemeißelt wurden."
        es:
          sun: "Planea con su membrana, que hace las veces de\ncapa. La electricidad que despide electrocuta\nsin distinción a enemigos y aliados."
          moon: "Suelta una descarga eléctrica para achicharrar\nbayas o Pokémon insecto. Suele habitar los\nnidos que los Pikipek horadan en los árboles."
        ko:
          sun: "망토 같은 막으로 활공한다.\n전기를 흩뿌려서 적도\n자기편도 전부 감전시킨다."
          moon: "전격으로 나무열매나 벌레포켓몬을\n알맞게 구워서 먹는다. 콕코구리가\n뚫은 나무 구멍이 주된 서식지다."
        zh_simp:
          sun: "用斗篷一样的膜滑翔。\n到处放电，\n让敌人和同伴都纷纷触电。"
          moon: "用电击将树果和虫宝可梦\n烧得刚刚好后再吃掉。\n以小笃儿啄空的树洞为主要巢穴。"
        zh_trad:
          sun: "用斗篷一樣的翼膜滑翔。\n到處散布電流，\n讓敵人和同伴都紛紛觸電。"
          moon: "會用電擊將樹果和蟲寶可夢\n烤得恰到好處後再吃掉。\n主要是把小篤兒挖出的樹洞當成巢穴。"
