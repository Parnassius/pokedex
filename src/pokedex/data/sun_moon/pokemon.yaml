      descriptions:
        jp_kana:
          sun: "さいぼう　すべてが　じしゃく。\nじりょくを　つかって　なかまと\nコミュニケーションを　とる。"
          moon: "じりょくを　はなって　あいてを\nひきよせた　ところで　おしりの\nツメで　きりさくのだ。"
        jp_kanji:
          sun: "細胞　すべてが　磁石。\n磁力を　使って　仲間と\nコミュニケーションを　取る。"
          moon: "磁力を　放って　相手を\nひき寄せた　ところで　お尻の\nツメで　切り裂くのだ。"
        en:
          sun: "Its cells are all magnets. It uses magnetism\nto communicate with others of its kind."
          moon: "With magnetic traction, it pulls its opponents in\nclose. When they’re in range, it slashes them\nwith its rear claws."
        fr:
          sun: "Toutes ses cellules sont en fait des aimants.\nIl utilise la force magnétique pour communiquer\navec ses congénères."
          moon: "Il attire ses ennemis avec des ondes\nmagnétiques et les pourfend avec ses griffes\ncaudales dès qu’ils sont à portée."
        it:
          sun: "Tutte le sue cellule sono calamite.\nIl suo corpo emette onde magnetiche, tramite\nle quali comunica con i suoi simili."
          moon: "Attira a sé i nemici grazie alla propria forza\nmagnetica per poi farli a pezzi con gli artigli\nposteriori."
        de:
          sun: "Seine Zellen sind magnetisch geladen.\nEs kommuniziert mit anderen, indem es\nmagnetische Impulse aussendet."
          moon: "Es sendet magnetische Impulse aus, um Gegner\nzu sich heranzuziehen und sie dann mit den\nKrallen an seinem Hinterteil aufzuschlitzen."
        es:
          sun: "Todas las células de su cuerpo son imanes. Se\ncomunica con los suyos mediante magnetismo."
          moon: "Atrae a sus rivales con el magnetismo que emite,\ny, cuando están cerca, los despedaza con las\ngarras que tiene en la parte trasera."
        ko:
          sun: "모든 세포가 자석이다.\n자력을 사용해 동료와\n커뮤니케이션을 한다."
          moon: "자력을 발산해 상대를\n끌어들이고 엉덩이의\n발톱으로 베어 가른다."
        zh_simp:
          sun: "细胞全部是磁铁。\n使用磁力和伙伴之间进行交流。"
          moon: "放出磁力将对手吸到身边的时候，\n用臀部的爪子将对方劈开。"
        zh_trad:
          sun: "細胞全部是磁鐵。\n會使用磁力和夥伴之間進行交流。"
          moon: "放出磁力將對手吸到身邊，\n然後用臀部的爪子將對方割開。"
