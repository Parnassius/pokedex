        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
        - snow_cloak
      hidden_ability: weak_armor
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          sun: "あつい　ひには　からだが　とける。\nこおらせれば　もとに　もどるけど\nからだの　かたちは　すこし　ゆがむ。"
          moon: "ひょうがきから　そんざい　している。\nこおりの　つぶを　あやつって　てきを\nこおらせたあと　ずつきで　くだく。"
        jp_kanji:
          sun: "暑い　日には　身体が　溶ける。\n凍らせれば　元に　戻るけど\n身体の　形は　少し　歪む。"
          moon: "氷河期から　存在　している。\n氷の　粒を　操って　敵を\n凍らせたあと　頭突きで　砕く。"
        en:
          sun: "Hot days cause its body to melt. It can be\nrestored by refreezing it, but the process\nleaves its body slightly warped."
          moon: "This Pokémon has existed since the Ice Age. It\ncontrols particles of ice, freezes its opponents,\nand then shatters them with a headbutt."
        fr:
          sun: "Son corps fond les jours de canicule. Il suffit\nheureusement de le congeler pour qu’il reprenne\nforme, mais il restera un tantinet flagada."
          moon: "Déjà présent à l’ère glaciaire, ce Pokémon peut\ncontrôler les particules de glace pour geler ses\nennemis, qu’il éclate ensuite d’un coup de boule."
        it:
          sun: "Si scioglie nelle giornate calde. Riprende le\nproprie sembianze se viene congelato, pur\nrimanendo leggermente deformato."
          moon: "Le sue origini risalgono all’era glaciale.\nUsa granelli di ghiaccio per congelare\ni nemici, che poi riduce in frantumi a testate."
        de:
          sun: "An heißen Tagen schmilzt sein Körper. Friert\nman es ein, nimmt es seine alte Gestalt wieder\nan, aber sein Körper ist leicht verbogen."
          moon: "Dieses Pokémon existiert seit der Eiszeit.\nEs friert seine Gegner mit Eiskörnern ein und\nzerschmettert sie dann mit einem Kopfstoß."
        es:
          sun: "Su cuerpo se derrite en los días calurosos. Al\ncongelarse recobra su aspecto original, aunque\nligeramente deformado."
          moon: "Sus orígenes se remontan a la era glacial. Usa\npartículas de hielo para congelar a su enemigo y\nhacerlo después añicos de un cabezazo."
        ko:
          sun: "더운 날에는 몸이 녹는다.\n얼리면 다시 돌아오지만\n몸 형태는 조금 일그러진다."
          moon: "빙하기 때부터 존재해왔다.\n얼음 결정을 조종하여 적을\n얼린 뒤 박치기로 부순다."
        zh_simp:
          sun: "在炎热的天气里身体会融化。\n如果让它冻住就会恢复原状，\n但身体的形状会稍稍歪掉。"
          moon: "从冰河时期就已经存在了。\n操纵冰粒让敌人冻住后，\n用头锤将对方打碎。"
        zh_trad:
          sun: "在炎熱的天氣裡身體會溶化。\n如果冰凍起來就會恢復原狀，\n但身體的形狀會稍稍歪掉。"
          moon: "從冰河時期就已經存在。\n操縱冰粒讓敵人凍僵後，\n再用頭錘將對方打碎。"
vanilluxe:
  species_id: 584
  names:
    jp_kana: バイバニラ
    jp_kanji: バイバニラ
    en: Vanilluxe
    fr: Sorbouboul
    it: Vanilluxe
    de: Gelatwino
    es: Vanilluxe
    ko: 배바닐라
    zh_simp: 双倍多多冰
    zh_trad: 雙倍多多冰
  forms:
    vanilluxe:
      form_id: 0
      base_stats:
        hp: 71
        attack: 95
        defense: 85
        special_attack: 110
        special_defense: 95
        speed: 79
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
