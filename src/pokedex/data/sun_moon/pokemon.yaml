      descriptions:
        jp_kana:
          sun: "しあわせが　つまっていると　いわれる\nハピナスの　タマゴを　たべれば　どんな\nきょうぼうな　ポケモンも　おだやかに。"
          moon: "ふわふわの　たいもうは　センサー。\nポケモンや　ひとの　きもちを\nキャッチすることが　できるのだ。"
        jp_kanji:
          sun: "幸せが　つまっていると　いわれる\nハピナスの　タマゴを　食べれば　どんな\n凶暴な　ポケモンも　穏やかに。"
          moon: "ふわふわの　体毛は　センサー。\nポケモンや　人の　気持ちを\nキャッチすることが　できるのだ。"
        en:
          sun: "Even the most ferocious Pokémon become calm\nwhen they eat Blissey’s egg, which is said\nto be filled with happiness."
          moon: "Its fluffy fur coat acts as a sensor, enabling it to\nread the feelings of people and Pokémon."
        fr:
          sun: "On dit que les œufs de Leuphorie seraient\nde véritables concentrés de bonheur, capables\nd’adoucir les Pokémon les plus hargneux."
          moon: "Le pelage de ce Pokémon lui fait office de radar\nà émotions. Il est ainsi capable de capter\nles humeurs des Pokémon et humains alentour."
        it:
          sun: "Si dice che le sue uova siano ricche di felicità\ne che rendano mansueti persino i Pokémon più\naggressivi."
          moon: "È in grado di percepire i sentimenti di Pokémon\ned esseri umani tramite la sua soffice pelliccia."
        de:
          sun: "Ein Bissen von seinem Glücks-Ei, das voller\nFröhlichkeit steckt, lässt selbst das wildeste\nPokémon ganz sanft und ruhig werden."
          moon: "Sein flauschiges Fell ist wie ein Sensor,\nmit dem es die Gefühle von Pokémon und\nMenschen wahrnehmen kann."
        es:
          sun: "Se dice que los huevos de Blissey están llenos\nde felicidad y que un solo bocado puede calmar\nhasta al más feroz de los Pokémon."
          moon: "Con su sedoso pelaje, que funciona como un\nsensor, puede detectar los sentimientos de los\nPokémon y las personas."
        ko:
          sun: "행복이 가득 차 있다고 전해지는\n해피너스의 알을 먹으면 어떤\n난폭한 포켓몬도 온화해진다."
          moon: "푹신푹신한 털은 센서다.\n포켓몬이나 사람의 기분을\n캐치할 수 있다."
        zh_simp:
          sun: "如果吃了据说饱含着幸福的\n幸福蛋的蛋，无论怎么\n残暴的宝可梦都会变得温和。"
          moon: "蓬松的体毛是感应器。\n可以捕捉到宝可梦和人类的心情。"
        zh_trad:
          sun: "只要吃了據說飽含著幸福的\n幸福蛋的蛋，無論多麼\n殘暴的寶可夢都會變得溫馴。"
          moon: "蓬鬆的體毛有感應的作用。\n能夠察覺寶可夢和人類的心情。"
