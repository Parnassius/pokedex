          moon: "むれで　かりを　していた。　えものを\nおいつめてから　べつの　なかまが\nそらから　きゅうしゅう　するのだ。"
        jp_kanji:
          sun: "飛ぶことも　できたようだが　おもに\n地上を　駆けまわっていた。\nその　時速は　平均４０キロ。"
          moon: "群れで　狩りを　していた。　獲物を\n追いつめてから　別の　仲間が\n空から　急襲　するのだ。"
        en:
          sun: "Although apparently able to fly, they tended\nto run along the ground, averaging speeds of\nroughly 25 mph."
          moon: "They hunted in flocks. When one Archeops had\nthe prey cornered, another would swoop on it."
        fr:
          sun: "Bien qu’ayant enfin acquis la capacité de voler,\nce Pokémon préférait bien souvent courir\nsur le sol, à une vitesse moyenne de 40 km/h."
          moon: "Ce Pokémon avait pour habitude de chasser en\ngroupe. Une partie de la volée était chargée\nd’acculer la proie, et l’autre de porter l’estoc."
        it:
          sun: "Nonostante sapesse volare, si spostava\nprincipalmente via terra a una velocità media\ndi 40 km/h."
          moon: "Cacciava in gruppo: alcuni Pokémon\nintrappolavano la preda e i loro compagni\nla assalivano."
        de:
          sun: "Es kann anscheinend auch fliegen, bewegt sich\naber überwiegend mit einer durchschnittlichen\nGeschwindigkeit von 40 km/h am Boden fort."
          moon: "Es jagt in Gruppen. Sobald es die Beute in die\nEnge getrieben hat, stürzt sich ein Artgenosse\naus der Luft auf sie."
        es:
          sun: "Pese a haber desarrollado la capacidad de\nvolar, prefería seguir corriendo por la superficie\nterrestre, con una velocidad media de 40 km/h."
          moon: "Se agrupaban en bandadas para salir de caza.\nPrimero, unos arrinconaban a la presa y luego\notros se lanzaban en picado sobre ella."
        ko:
          sun: "날 수도 있었지만 대부분\n지상을 뛰어다녔다.\n그 시속은 평균 40km이다."
          moon: "무리 지어 사냥을 했다. 먹이를\n몰아넣으면 다른 동료가\n하늘에서 급습한다."
        zh_simp:
          sun: "好像也会飞行，\n但主要是在地上四处飞奔。\n平均时速达到４０公里。"
          moon: "成群结队进行捕猎。\n将猎物追到无路可逃时，\n其他伙伴就会从空中发动突袭。"
        zh_trad:
          sun: "好像也懂得飛行，\n但主要是在地上四處飛奔。\n平均時速達到４０公里。"
          moon: "會成群結隊進行捕獵。\n將獵物追到無路可逃時，\n其他夥伴便會從空中突然發動襲擊。"
trubbish:
  species_id: 568
  names:
    jp_kana: ヤブクロン
    jp_kanji: ヤブクロン
    en: Trubbish
    fr: Miamiasme
    it: Trubbish
    de: Unratütox
    es: Trubbish
    ko: 깨봉이
    zh_simp: 破破袋
    zh_trad: 破破袋
  forms:
