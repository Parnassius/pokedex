      descriptions:
        jp_kana:
          sun: "えものの　こんせきを　みつけると\nねばりづよく　そのばに　はりこむが\nひぐれには　うつらうつら　している。"
          moon: "コラッタや　ラッタが　こうぶつなのに\nちゅうこうせいのため　であえない。\nにんたいづよさが　じまんの　ポケモン。"
        jp_kanji:
          sun: "獲物の　痕跡を　みつけると\n粘り強く　その場に　張り込むが\n日暮れには　うつらうつら　している。"
          moon: "コラッタや　ラッタが　好物なのに\n昼行性のため　出会えない。\n忍耐強さが　自慢の　ポケモン。"
        en:
          sun: "When it finds a trace of its prey, it patiently\nstakes out the location...but it’s always snoozing\nby nightfall."
          moon: "It adores having Rattata and Raticate for dinner,\nbut as it’s diurnal, it never encounters them.\nThis Pokémon boasts incredible patience."
        fr:
          sun: "Lorsqu’il est sur les traces d’une proie,\nce Pokémon n’est pas du genre à abandonner.\nSauf le soir, lorsqu’il tombe de sommeil."
          moon: "Il est accro au goût des Rattata et Rattatac,\nmais n’en croise pas beaucoup car ceux-ci sont\nnocturnes. Heureusement, il sait rester patient."
        it:
          sun: "Scovate le tracce della preda, rimane di guardia\nsul posto senza battere ciglio fino al calare\ndel sole, poi cede alla stanchezza."
          moon: "È ghiotto di Rattata e Raticate, ma poiché\nè un Pokémon diurno, non ne incontra molti.\nLa perseveranza è la sua dote di spicco."
        de:
          sun: "Findet es Spuren potenzieller Beute, legt\nes sich sofort auf die Lauer. Spätestens\nbei Sonnenuntergang nickt es aber ein."
          moon: "Rattfratz und Rattikarl sind seine Leibspeise,\naber leider nachtaktiv und daher selten auf\ndem Speiseplan. Ein sehr geduldiges Pokémon."
        es:
          sun: "Al detectar el rastro de una presa, la acecha\ncon tenacidad, pero al ponerse el sol le vence\nel sueño."
          moon: "Sus presas favoritas son los Rattata y Raticate,\npero, al ser estos diurnos, rara vez se cruza con\nellos. La perseverancia es su gran virtud."
        ko:
          sun: "먹이의 흔적을 찾으면\n끈질기게 그 자리에 잠복하지만\n날이 저물면 꾸벅꾸벅 존다."
          moon: "꼬렛과 레트라를 좋아하지만\n주행성이라 마주치지 못한다.\n강한 인내력이 자랑인 포켓몬이다."
        zh_simp:
          sun: "找到猎物的踪迹后，\n就会坚持蹲守在那个地方，\n但到了傍晚就会昏昏欲睡。"
          moon: "喜欢吃小拉达和拉达，\n但因为昼行性而无法遇到。\n是以忍耐力强而自豪的宝可梦。"
        zh_trad:
          sun: "找到獵物的蹤跡後，\n就會堅持蹲守在那個地方，\n但到了傍晚就會昏昏欲睡。"
          moon: "喜歡吃小拉達和拉達，\n但因為是晝行性而沒機會遇到。\n是以忍耐力強而自豪的寶可夢。"
