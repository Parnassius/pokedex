        jp_kana:
          sun: "おこると　われを　わすれ　あたりを\nこわしまわる。　ボーマンダが\nつかれはてるまで　はかいは　つづく。"
          moon: "ついに　はえた　つばさで　おおぞらを\nかけめぐる。　うれしくて　かえんを\nはいて　いちめんを　やけのはらにする。"
        jp_kanji:
          sun: "怒ると　我を　忘れ　あたりを\n壊しまわる。　ボーマンダが\n疲れ果てるまで　破壊は　続く。"
          moon: "ついに　生えた　翼で　大空を\n駆け廻る。　うれしくて　火炎を\n吐いて　一面を　焼け野原にする。"
        en:
          sun: "When angered, it loses all sense of itself and\ndestroys everything around it. The destruction\nwill continue until Salamence has tired itself out."
          moon: "It flies around on its wings, which have grown in\nat last. In its happiness, it gushes hot flames,\nburning up the fields it passes over."
        fr:
          sun: "Quand il est pris de colère, il perd toute mesure\net détruit ce qui l’entoure. Tant qu’il lui reste une\nonce d’énergie, il continue de tout dévaster."
          moon: "Il fend l’air et virevolte dans le ciel grâce à ses\nailes fraîchement formées. De bonheur, il crache\ndu feu et dévaste toutes les cultures au sol."
        it:
          sun: "Se si infuria, perde completamente il controllo.\nDevasta tutto ciò che ha intorno e non si ferma\nfinché non è sfinito."
          moon: "Volteggia nel cielo con le grandi ali cresciutegli\ncon l’evoluzione. Esprime la sua gioia sputando\nfiamme e bruciando le campagne che sorvola."
        de:
          sun: "Wenn es wütend ist, kann es nicht mehr klar\ndenken und zerstört alles um sich herum.\nDas tut es bis zur völligen Erschöpfung."
          moon: "Nun, da ihm Flügel gewachsen sind, zieht es\nseine Kreise am Himmel. Vor Freude spuckt\nes Flammen und hinterlässt eine Brandwüste."
        es:
          sun: "Cuando se enfada, pierde el control y destruye\ntodo lo que está a su alcance. Solo se calma\ncuando se queda sin fuerzas."
          moon: "Feliz de haber desarrollado al fin sus alas y de\npoder volar por el cielo, calcina con sus llamas\ntodos los campos que sobrevuela."
        ko:
          sun: "화가 나면 이성을 잃고 주변을\n부수며 돌아다닌다. 보만다가\n녹초가 될 때까지 파괴는 계속된다."
          moon: "드디어 자라난 날개로 넓은 하늘을\n날아다닌다. 기쁜 마음에 화염을\n뿜어 일대를 불태워 버린다."
        zh_simp:
          sun: "一生气就会忘记自我，把周围\n都破坏掉。破坏会持续不断，\n直到暴飞龙精疲力尽。"
          moon: "用最后终于长出来的翅膀在浩瀚的\n天空翱翔。兴奋地喷出火焰，\n将大地变成一片燃烧的原野。"
        zh_trad:
          sun: "一生氣就會忘記自我，把周圍\n都破壞掉。破壞會持續不斷，\n直到暴飛龍精疲力盡。"
          moon: "用終於長出來的翅膀在浩瀚的\n天空翱翔。高興地噴出火焰，\n將大地變成一片火海。"
    salamence_mega:
      form_id: 1
      names:
        jp_kana: メガボーマンダ
        jp_kanji: メガボーマンダ
        en: Mega Salamence
        fr: Méga-Drattak
        it: MegaSalamence
        de: Mega-Brutalanda
        es: Mega-Salamence
        ko: 메가보만다
        zh_simp: 超级暴飞龙
        zh_trad: 超級暴飛龍
      base_stats:
        hp: 95
        attack: 145
        defense: 130
        special_attack: 120
        special_defense: 90
