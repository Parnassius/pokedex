      types:
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - swift_swim
        - oblivious
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          sun: "きたない　みずでも　ぜんぜん　へいきな\nタフな　ポケモン。　でも　ボロボロで\nみすぼらしいので　にんきは　ない。"
          moon: "みためが　わるいので　にんきはないが\nきょういの　せいめいりょくが　あり\nけんきゅうたいしょうには　なっている。"
        jp_kanji:
          sun: "汚い　水でも　ぜんぜん　平気な\nタフな　ポケモン。　でも　ボロボロで\nみすぼらしいので　人気は　ない。"
          moon: "見た目が　悪いので　人気はないが\n脅威の　生命力が　あり\n研究対象には　なっている。"
        en:
          sun: "A tough Pokémon that is perfectly fine even\nin dirty water. However, due to its ragged,\nshabby appearance, it isn’t popular."
          moon: "Although unattractive and unpopular, this\nPokémon’s marvelous vitality has made it a\nsubject of research."
        fr:
          sun: "Ce Pokémon n’a pas beaucoup d’adeptes, du\nfait de son air miteux. Il est pourtant robuste\net n’a pas peur de nager en eaux troubles."
          moon: "Comme il est tout de même franchement laid,\nce Pokémon a un succès très mitigé. Sa grande\nvitalité fait néanmoins l’objet de moult études."
        it:
          sun: "Non è molto popolare per via del suo misero\naspetto, ma è molto resistente e in grado di\nvivere anche in acque inquinate."
          moon: "È un Pokémon poco popolare per via del suo\nmisero aspetto. Tuttavia, la sua prodigiosa\nvitalità ha attirato l’interesse dei ricercatori."
        de:
          sun: "Dieses robuste Pokémon fühlt sich selbst in\nverschmutztem Wasser wohl. So schäbig und\nzerfetzt es ist, so unbeliebt ist es auch."
          moon: "Sein unvorteilhaftes Aussehen macht es zwar\nunbeliebt, doch seine erstaunliche Lebenskraft\nhat das Interesse der Forscher an ihm geweckt."
        es:
          sun: "Este Pokémon es tan resistente que puede vivir\nsin problema hasta en las aguas más sucias,\npero no es muy popular a causa de su aspecto."
          moon: "Como su aspecto deja bastante que desear, no\nse le aprecia mucho. Aun así, su gran vitalidad\npuede ser muy interesante para la ciencia."
        ko:
          sun: "더러운 물이라도 아무렇지 않은\n터프한 포켓몬. 하지만 추레하고\n초라해서 인기는 없다."
          moon: "겉모습이 좋지 않아 인기는 없지만\n경이로운 생명력을 지니고 있어\n연구대상이 되고 있다."
        zh_simp:
          sun: "即使在脏水里也完全不介意的\n强壮的宝可梦。但破破烂烂一副\n寒酸的样子，所以不受欢迎。"
          moon: "外表丑陋，所以不受欢迎。\n拥有惊人的生命力，\n因而成为了研究对象。"
        zh_trad:
          sun: "即使在髒水裡也毫不介意的\n堅強寶可夢。但那一副破破爛爛的\n寒酸樣子並不受到歡迎。"
          moon: "外表醜陋，所以不受歡迎。\n擁有驚人的生命力，\n因而成為了研究對象。"
milotic:
