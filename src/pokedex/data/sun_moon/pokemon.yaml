      descriptions:
        jp_kana:
          sun: "たいおんを　じざいに　コントロールし\nたいきの　すいぶんを　こおらせて\nダイヤモンドダストを　まきおこす。"
          moon: "たいもうを　こおらせ　するどい\nつららの　ように　とがらせてから\nえものを　めがけ　タックルする。"
        jp_kanji:
          sun: "体温を　自在に　コントロールし\n大気の　水分を　凍らせて\nダイヤモンドダストを　巻き起こす。"
          moon: "体毛を　凍らせ　鋭い\n氷柱の　ように　尖らせてから\n獲物を　目掛け　タックルする。"
        en:
          sun: "It can control its body temperature at will.\nThis enables it to freeze the moisture in the\natmosphere, creating flurries of diamond dust."
          moon: "It freezes its fur into icicles, spiky and sharp,\nand tackles its prey."
        fr:
          sun: "Il peut contrôler la température de son corps\nà volonté et générer des cristaux de glace en\ngelant l’humidité de l’air."
          moon: "Il gèle ses poils pour les transformer en pics\nde glace, qu’il utilise ensuite pour terrasser\nses proies."
        it:
          sun: "Può congelare l’umidità dell’aria modificando la\nsua temperatura corporea e creare cristalli\ndi ghiaccio intorno a sé."
          moon: "Congela la sua pelliccia creando tanti piccoli\nghiaccioli appuntiti, con cui poi attacca\nle sue prede."
        de:
          sun: "Es kann seine Körpertemperatur frei regulieren.\nIndem es die Wasserbestandteile der Luft\ngefrieren lässt, wirbelt es Diamantstaub auf."
          moon: "Es lässt sein Fell gefrieren und macht es\ndadurch so spitz wie Eiszapfen, mit denen\nes dann seine Beute attackiert."
        es:
          sun: "Controla a su antojo la temperatura corporal y\ncongela las partículas de agua que flotan en el\naire para provocar ráfagas de nieve en polvo."
          moon: "Al congelar su pelaje, este se eriza formando\ncarámbanos con los que ataca a su presa en\ncuanto la avista."
        ko:
          sun: "체온을 자유자재로 컨트롤해\n대기의 수분을 얼려서\n다이아몬드더스트를 일으킨다."
          moon: "털을 얼려서 날카로운\n고드름처럼 뾰족하게 한 뒤\n먹이를 향해 태클을 건다."
        zh_simp:
          sun: "自由地控制体温，\n让大气中的水分冻结，\n卷起冰晶。"
          moon: "把体毛冻得像锐利的冰柱\n那样尖之后，朝猎物冲撞过去。"
        zh_trad:
          sun: "能自由地控制體溫，\n讓大氣中的水分凍結，\n捲起冰晶。"
          moon: "冰凍體毛，讓其像\n銳利的冰柱那樣變尖之後，\n向著獵物衝撞。"
