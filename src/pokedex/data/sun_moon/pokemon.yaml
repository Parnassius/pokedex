      descriptions:
        jp_kana:
          sun: "エスパーしょうねんが　じぶんの　なかの\nサイコパワーを　おさえきれなくなり\nへんしんして　しまったとの　せつも。"
          moon: "ユンゲラーが　いるとき　テレビなど\nきかいの　モニターに　ふこうを　よぶ\nぶきみな　かげが　とおりすぎる。"
        jp_kanji:
          sun: "エスパー少年が　自分の　中の\nサイコパワーを　抑えきれなくなり\n変身して　しまったとの　説も。"
          moon: "ユンゲラーが　いるとき　テレビなど\n機械の　モニターに　不幸を　呼ぶ\n不気味な　影が　通り過ぎる。"
        en:
          sun: "A theory exists that this Pokémon was a young\nboy who couldn’t control his psychic powers\nand ended up transformed into this Pokémon."
          moon: "Kadabra’s presence infests televisions and\nmonitors with creepy shadows that bring\nbad luck."
        fr:
          sun: "Certains pensent que lorsqu’un enfant humain\ntélépathe perd le contrôle de ses pouvoirs\npsychiques, il devient un Kadabra."
          moon: "Lorsqu’un Kadabra se trouve à proximité d’un\nécran, une télé par exemple, une ombre sinistre\ndont la vision porte malheur traverse l’image."
        it:
          sun: "Secondo una teoria, in realtà è un ragazzo che\nnon è riuscito a controllare i suoi poteri psichici,\ntrasformandosi in Pokémon."
          moon: "In sua presenza, sugli schermi di televisori o\ndispositivi simili appare un’ombra inquietante\nche porta sfortuna a chi la guarda."
        de:
          sun: "Es heißt, dass es früher ein Junge mit Psikräften\nwar, der sich zu Kadabra verwandelte, weil er\nseine Fähigkeiten nicht kontrollieren konnte."
          moon: "Hält sich Kadabra in der Nähe von Geräten mit\nBildschirmen wie Fernsehern auf, huscht ein\nUnglück bringender Schatten über den Screen."
        es:
          sun: "Algunos creen que Kadabra no es más que un\njoven que perdió el control de sus poderes\npsíquicos y que acabó transformándose."
          moon: "Cuando Kadabra está cerca de la pantalla de\nalgún dispositivo, en esta aparece una sombra\nominosa que se dice que solo trae desdicha."
        ko:
          sun: "에스퍼 소년이 자신 안의\n사이코 파워를 억누르지 못하고\n변신했다는 설도 있다."
          moon: "윤겔라가 있을 때 TV 등\n기계 모니터에 불행을 부르는\n으스스한 그림자가 스쳐 간다."
        zh_simp:
          sun: "也有说是超能力少年\n无法抑制自己体内的\n精神力量，变身而成。"
          moon: "勇基拉在的时候，\n电视机等机械的显示器中会有\n召唤不幸的可怕影像闪现。"
        zh_trad:
          sun: "也有說法是說，牠是\n超能力少年因無法抑制自己\n體內的精神力量而變身成的。"
          moon: "勇基拉在的時候，\n電視機等機械的螢幕中會有\n喚來不幸的可怕影像閃現。"
