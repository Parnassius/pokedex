      descriptions:
        jp_kana:
          sun: "２ほんの　しょくしゅは　もとは　ヒレ。\nでんきを　はなって　えものを\nしびれさせてから　おそう。"
          moon: "ひかりの　とどかない　かいていに\nくらす。　しょくしゅを　ひからせ\nなかまと　コミュニケーション。"
        jp_kanji:
          sun: "２本の　触手は　元は　ヒレ。\n電気を　放って　獲物を\nしびれさせてから　襲う。"
          moon: "光の　届かない　海底に\n暮らす。　触手を　光らせ\n仲間と　コミュニケーション。"
        en:
          sun: "Its two antennae were originally fins.\nIt discharges electricity to stun its prey\nbefore attacking."
          moon: "It lives in the depths beyond the reach of\nsunlight. It flashes lights on its antennae\nto communicate with others of its kind."
        fr:
          sun: "Ses deux antennes étaient à l’origine des\nailerons. Il libère de l’électricité pour étourdir\nses proies avant de passer à l’attaque."
          moon: "Il vit dans les profondeurs marines que le soleil\nn’atteint pas. Il utilise ses antennes lumineuses\npour communiquer avec ses congénères."
        it:
          sun: "Le sue due antenne sono l’evoluzione di pinne\nprimitive da cui emette scariche elettriche per\ntramortire la preda prima di attaccarla."
          moon: "Vive in profondità marine al riparo dalla luce\ndel sole. Usa le antenne luminose per\ncomunicare con i suoi simili."
        de:
          sun: "Seine zwei Antennen waren ursprünglich\nFlossen. Es greift seine Beute an, indem es\nsie mit Strom lähmt."
          moon: "Es lebt in den Tiefen des Meeres, zu denen kein\nLicht durchdringt. Es kommuniziert mit anderen\nLampi, indem es seine Antennen aufblitzen lässt."
        es:
          sun: "Sus dos antenas antes eran aletas. Ataca a sus\npresas después de haberlas paralizado de una\ndescarga eléctrica."
          moon: "Vive en lo más profundo del océano, donde ya\nno alcanza la luz. Se comunica con los de su\nespecie emitiendo luces con sus antenas."
        ko:
          sun: "2개의 촉수는 원래는 지느러미이다.\n전기를 발산해서 먹이를\n마비시킨 다음 덮친다."
          moon: "빛이 닿지 않는 해저에 산다.\n촉수를 빛내 동료들과\n커뮤니케이션을 한다."
        zh_simp:
          sun: "２根触手原本是鳍。\n释放电力让猎物麻痹后进行袭击。"
          moon: "在光线都无法到达的海底生活。\n让触手发光来与伙伴们交流。"
        zh_trad:
          sun: "２根觸手原本是鰭。\n會釋放電力讓獵物麻痺後進行襲擊。"
          moon: "在光線無法觸及的海底生活。\n讓觸手發光來與夥伴們交流。"
