morelull:
  species_id: 755
  names:
    jp_kana: ネマシュ
    jp_kanji: ネマシュ
    en: Morelull
    fr: Spododo
    it: Morelull
    de: Bubungus
    es: Morelull
    ko: 자마슈
    zh_simp: 睡睡菇
    zh_trad: 睡睡菇
  forms:
    morelull:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 55
        special_attack: 65
        special_defense: 75
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
