        jp_kanji:
          sun: "光で　獲物を　おびき寄せるが\n天敵である　獰猛な\nさかなポケモンまで　寄ってくるのだ。"
          moon: "海底に　棲む　深海のポケモン。\nヒレを使い　海底を　はって\n好物の　スターミーを　探す。"
        en:
          sun: "With its shining light, it lures its prey close.\nHowever, the light also happens to attract\nferocious fish Pokémon—its natural predators."
          moon: "This deep-sea Pokémon lives at the bottom of\nthe sea. Its fins haul it over the seabed in\nsearch of its favorite food—Starmie."
        fr:
          sun: "Il attire ses proies en émettant de la lumière,\nmais à son grand dam, cela attire aussi ses\nprédateurs : les Pokémon poissons carnassiers."
          moon: "Ce Pokémon des profondeurs vit tout au fond\nde l’océan. Il rampe à l’aide de ses nageoires\nventrales et cherche les Staross dont il raffole."
        it:
          sun: "Con la sua luce attira le prede, ma anche i\nPokémon acquatici suoi predatori."
          moon: "Vive negli abissi marini. Si sposta sui fondali\nmuovendo agilmente le pinne in cerca degli\nStarmie, di cui è ghiotto."
        de:
          sun: "Mit seinem blinkenden Muster lockt es Beute an.\nLeider zieht es hierdurch auch seine\nFressfeinde an."
          moon: "Dieses Tiefsee-Pokémon lebt am Meeresboden,\nüber den es mit seinen Flossen krabbelt, um\nStarmie, seine Leibspeise, aufzuspüren."
        es:
          sun: "Atrae a sus presas con el destello que emite,\naunque eso también llama la atención de sus\nferoces depredadores marinos."
          moon: "Un Pokémon abisal que vive en el lecho marino.\nUsa sus aletas ventrales para arrastrarse en\nbusca de Starmie, su presa favorita."
        ko:
          sun: "빛으로 먹이를 유인하지만\n천적인 사나운\n물고기포켓몬까지 다가온다."
          moon: "해저에 사는 심해의 포켓몬이다.\n지느러미를 사용해 해저를 기어\n좋아하는 아쿠스타를 찾는다."
        zh_simp:
          sun: "利用光来诱惑猎物靠近，\n但是作为天敌的凶猛\n鱼宝可梦也靠了过来。"
          moon: "栖息在海底的深海宝可梦。\n使用鳍在海底爬行，\n寻找爱吃的宝石海星。"
        zh_trad:
          sun: "利用光來引誘獵物靠近，\n但往往連天敵的兇猛\n魚寶可夢也引了過來。"
          moon: "棲息在海底的深海寶可夢。\n使用鰭在海底爬行，\n尋找愛吃的寶石海星。"
