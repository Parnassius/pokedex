      descriptions:
        jp_kana:
          sun: "ちかで　ねむりに　ついていたようだ。\nたいこに　べつせかいから　やってきたと\nおもわれる　ＵＢらしき　せいぶつ。"
          moon: "ひかりが　エネルギーげん　らしい。\nレーザーこうを　ぶっぱなしまくる\nひじょうに　きょうぼうな　せいしつ。"
        jp_kanji:
          sun: "地下で　眠りに　ついていたようだ。\n太古に　別世界から　やってきたと\nおもわれる　ＵＢらしき　生物。"
          moon: "光が　エネルギー源　らしい。\nレーザー光を　ぶっ放しまくる\n非常に　凶暴な　性質。"
        en:
          sun: "Reminiscent of the Ultra Beasts, this life-form,\napparently asleep underground, is thought to\nhave come from another world in ancient times."
          moon: "Light is apparently the source of its energy.\nIt has an extraordinarily vicious disposition\nand is constantly firing off laser beams."
        fr:
          sun: "Une créature endormie sous terre. On suppose\nqu’il s’agit d’une Ultra-Chimère et qu’elle serait\nvenue d’un autre monde, il y a bien longtemps."
          moon: "La lumière semble être sa source d’énergie.\nUne créature extrêmement agressive, capable\nd’émettre des rayons laser au moindre prétexte."
        it:
          sun: "Pare che questo essere simile a un’Ultracreatura\nsia giunto da un altro mondo in tempi antichi e\nsia rimasto a lungo dormiente sottoterra."
          moon: "La luce sembra essere la sua fonte di energia.\nÈ estremamente aggressivo e gli basta molto\npoco per mettersi a sparare raggi laser."
        de:
          sun: "Diese einer Ultrabestie ähnelnde Kreatur ist\nwohl vor Urzeiten aus einer anderen Welt\ngekommen und ruhte lange Zeit unter der Erde."
          moon: "Dieses extrem grausame Lebewesen wandelt\nLicht in Energie um und stößt unablässig\nLaserstrahlen aus."
        es:
          sun: "Se dice que yacía en el interior de la tierra. Se\ncree que esta criatura, parecida a un Ultraente,\nvino de otro mundo hace muchísimo tiempo."
          moon: "Este Ultraente parece alimentarse de luz. Posee\nun carácter muy hostil y no duda en lanzar\nrayos láser."
        ko:
          sun: "지하에서 잠들어 있던 것 같다.\n태고의 다른 세계에서 왔다고\n추측되는 UB같은 생물이다."
          moon: "빛이 에너지원인 듯하다.\n레이저 광선을 마구 쏘아대는\n매우 난폭한 성질을 가졌다."
        zh_simp:
          sun: "好像一直都沉睡在地下。\n被认为是太古时代从其他世界\n来到此地的类似究极异兽的生物。"
          moon: "光似乎是它的能量源。\n一个劲儿地发射激光，\n性格非常粗暴。"
        zh_trad:
          sun: "好像一直都沉睡在地底下。\n被認為是在太古時代從另一個世界\n來到此地，是種類似ＵＢ的生物。"
          moon: "光似乎是牠的能量來源。\n毫無節制地不停發射雷射，\n性格非常凶暴。"
