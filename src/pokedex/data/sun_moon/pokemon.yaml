        - grass
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - grassy_surge
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          sun: "たいぼくを　ひきぬき　ブンブン\nふりまわす。　くさきを　しげらせて\nそのエネルギーを　きゅうしゅうする。"
          moon: "ウラウラの　まもりがみで　ものぐさ。\nくさきを　あやつり　てきを　しばりつけ\nうごきを　とめて　ツノで　ひとつき。"
        jp_kanji:
          sun: "大木を　引き抜き　ブンブン\n振り回す。　草木を　茂らせて\nそのエネルギーを　吸収する。"
          moon: "ウラウラの　守り神で　物臭。\n草木を　操り　敵を　縛りつけ\n動きを　止めて　角で　一突き。"
        en:
          sun: "It pulls large trees up by the roots and swings\nthem around. It causes vegetation to grow,\nand then it absorbs energy from the growth."
          moon: "The guardian deity of Ula’ula is a lazy Pokémon.\nIt commands plants to immobilize its foes and\nthen deals them a savage blow with its horns."
        fr:
          sun: "Il arrache de grands arbres et fait des moulinets\navec. Il a le pouvoir de rendre la végétation\nluxuriante pour ensuite se nourrir de cette force."
          moon: "C’est l’indolent gardien d’Ula-Ula.\nIl se sert de la végétation pour immobiliser ses\nennemis, avant de les empaler avec ses cornes."
        it:
          sun: "Sradica gli alberi e li fa roteare maneggiandoli\nabilmente. Fa crescere la vegetazione per poi\nassorbirne l’energia."
          moon: "Protettore di Ula Ula, è un Pokémon molto pigro.\nControlla la vegetazione con cui immobilizza\nil nemico per poi trafiggerlo con le sue corna."
        de:
          sun: "Dieses Pokémon entwurzelt große Bäume und\nschwingt sie herum. Es lässt Pflanzen üppig\ngedeihen und absorbiert dann ihre Energie."
          moon: "Der träge Schutzpatron von Ula-Ula. Es stoppt\nseine Gegner mithilfe von Pflanzen und spießt\nsie dann mit seinen Hörnern auf."
        es:
          sun: "Arranca de cuajo árboles grandes para hacerlos\ngirar. Vuelve exuberante la vegetación y luego\nabsorbe su energía."
          moon: "El indolente espíritu guardián de Ula-Ula.\nInmoviliza al enemigo con la vegetación y lo\nembiste con sus cuernos."
        ko:
          sun: "큰 나무를 뽑아서 빙빙 휘두른다.\n초목을 무성하게 만들어\n그 에너지를 흡수한다."
          moon: "울라울라의 수호신으로 게으름뱅이다.\n초목을 조종해 적을 묶어서\n움직임을 멈추게 하고 뿔로 단번에 받는다."
        zh_simp:
          sun: "拔出巨大的树木，轰轰地来回挥舞。\n让草木茂盛，吸收其中的能量。"
          moon: "乌拉乌拉的守护神，很懒惰。\n操纵草木将敌人捆得动弹不得后，\n用角一下子刺向对方。"
        zh_trad:
          sun: "拔出巨大的樹木，轟轟地來回揮舞。\n會讓草木茂盛生長，再吸收其中的能量。"
          moon: "烏拉烏拉的守護神，性情懶散。\n透過操縱草木捆住敵人，\n讓對方動彈不得後，再用角一下刺入。"
tapu_fini:
  species_id: 788
  names:
    jp_kana: カプ・レヒレ
    jp_kanji: カプ・レヒレ
    en: Tapu Fini
    fr: Tokopisco
    it: Tapu Fini
    de: Kapu-Kime
    es: Tapu Fini
    ko: 카푸느지느
    zh_simp: 卡璞・鳍鳍
    zh_trad: 卡璞・鰭鰭
  forms:
    tapu_fini:
      form_id: 0
      base_stats:
