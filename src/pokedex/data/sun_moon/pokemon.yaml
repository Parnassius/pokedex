      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          sun: "ちねつで　あたたかい　どうくつに\nくらしている。　それでも　さむくなると\nなかまと　みを　よせあって　かたまる。"
          moon: "あなぐらに　ひそみ　えものや　てきが\nよこぎると　とびだして　かみつく。\nいきおいあまり　はが　かけることも。"
        jp_kanji:
          sun: "地熱で　温かい　洞窟に\n暮らしている。　それでも　寒くなると\n仲間と　身を　寄せ合って　かたまる。"
          moon: "穴倉に　潜み　獲物や　敵が\n横切ると　飛びだして　噛みつく。\n勢い余り　歯が　欠けることも。"
        en:
          sun: "It lives in caves warmed by geothermal heat.\nEven so, when the weather gets cold, it will\nhuddle close with others of its kind."
          moon: "It skulks in caves, and when prey or an enemy\npasses by, it leaps out and chomps them. The\nforce of its attack sometimes chips its teeth."
        fr:
          sun: "On le trouve dans les cavernes bien chauffées\npar géothermie. S’il a froid malgré tout, il dort en\ntas avec ses congénères pour se réchauffer."
          moon: "Il attend le passage d’une proie pour bondir\nhors de son trou et la croquer. Dans son élan,\nil se casse parfois les dents."
        it:
          sun: "I Gible vivono in gallerie scaldate dal calore\ngeotermico. Se hanno freddo, fanno gruppo\ne rimangono appiccicati gli uni agli altri."
          moon: "Aspetta nemici e prede in agguato nella sua\ntana. Quando gli arrivano a tiro, li addenta con\ntale forza che a volte si spezza i denti."
        de:
          sun: "Es lebt in Höhlen, die Erdwärme ausgesetzt sind.\nFalls es trotzdem kalt wird, rückt es eng mit\nseinen Freunden zusammen."
          moon: "Es verbirgt sich in kleinen Höhlen, aus denen es\nherausspringt und vorbeilaufende Gegner beißt.\nManchmal bricht dabei ein Zahn ab."
        es:
          sun: "Vive en el interior de cuevas, al amparo del calor\ngeotérmico. Si aun así sigue sintiendo frío, se\njunta con sus congéneres haciendo una piña."
          moon: "Permanece oculto en cuevas y cuando pasa una\npresa, se abalanza sobre ella y la muerde con\ntanta fuerza que hasta se le rompen los dientes."
        ko:
          sun: "지열로 따뜻한 동굴에서\n살고 있다. 그래도 추워지면\n동료들과 몸을 맞대어 뭉친다."
          moon: "구멍에 숨어서 먹이나 적이\n지나가면 뛰쳐나가 문다.\n기세가 대단해 이가 빠질 때도 있다."
        zh_simp:
          sun: "生活在因地热而温暖的洞窟里。\n即便如此，一旦变冷就会和\n伙伴们紧紧挨在一起。"
          moon: "潜伏在地洞内，如果有猎物\n或敌人经过，就会扑出来咬住。\n有时会用力过猛牙齿豁掉。"
        zh_trad:
          sun: "生活在充滿地熱的溫暖洞窟裡。\n即便如此，一旦變冷就會和\n夥伴們緊緊靠在一起。"
          moon: "潛伏在地洞內，如果有獵物\n或敵人經過，就會撲出來咬住。\n有時會用力過猛而咬壞牙齒。"
gabite:
  species_id: 444
  names:
    jp_kana: ガバイト
    jp_kanji: ガバイト
    en: Gabite
    fr: Carmache
    it: Gabite
    de: Knarksel
    es: Gabite
    ko: 한바이트
    zh_simp: 尖牙陆鲨
    zh_trad: 尖牙陸鯊
  forms:
    gabite:
      form_id: 0
      base_stats:
        hp: 68
        attack: 90
        defense: 65
        special_attack: 50
        special_defense: 55
        speed: 82
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
