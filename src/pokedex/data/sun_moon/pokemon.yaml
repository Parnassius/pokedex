      descriptions:
        jp_kana:
          sun: "ひたいの　あかい　ぶぶんを　もつと\nじんつうりきを　さずかると　いわれ\nらんかく　された　かこも　ある。"
          moon: "みずうみの　ほとりを　およぎまわり\nつかまえた　さかなポケモンを\nきしべで　しずかに　くっている。"
        jp_kanji:
          sun: "額の　赤い　部分を　持つと\n神通力を　授かると　いわれ\n乱獲　された　過去も　ある。"
          moon: "湖の　ほとりを　泳ぎまわり\n捕まえた　さかなポケモンを\n岸辺で　静かに　喰っている。"
        en:
          sun: "It is said that the red part of its forehead\ngrants supernatural powers to those who\npossess one, so it was over-hunted in the past."
          moon: "It swims along the banks of lakes and catches\nfish Pokémon. It takes them to the shore and\nquietly eats them up."
        fr:
          sun: "Certains prétendaient que tenir la gemme rouge\nde son front donnait des pouvoirs psychiques,\naussi a-t-il été braconné à certaines époques."
          moon: "Il nage à travers les lacs pour attraper des\nPokémon poissons, puis il remonte sur la rive\npour les déguster tranquillement."
        it:
          sun: "È stato a lungo oggetto di una caccia sfrenata\na causa dell’escrescenza rossa che ha sulla\nfronte, ritenuta fonte di poteri soprannaturali."
          moon: "Nuota nei laghi in cerca di Pokémon acquatici\ne, dopo averli catturati, torna a riva per\nmangiarli tranquillamente."
        de:
          sun: "Besitzt man den roten Fortsatz seiner Stirn,\nerhält man angeblich telekinetische Kräfte. Einst\nwar es sehr selten, da es maßlos gejagt wurde."
          moon: "Es schwimmt Küstengebiete auf der Suche nach\nFisch-Pokémon ab. Hat es eines gefangen, geht\nes ans Ufer, um es in aller Ruhe zu verschlingen."
        es:
          sun: "En el pasado fue objeto de una caza\nindiscriminada, pues se decía que la parte roja\nde su frente daba poderes a quien la poseyera."
          moon: "Se sumerge en las aguas de los lagos en busca\nde Pokémon pez para luego darse un apacible\nbanquete en la orilla."
        ko:
          sun: "이마의 붉은 부분을 가지면\n신통력을 얻을 수 있다고 전해져\n남획되었던 과거도 있다."
          moon: "호수 근처를 헤엄쳐 다니며\n잡은 물고기포켓몬을\n물가에서 조용히 먹고 있다."
        zh_simp:
          sun: "据说戴着额头红色的部分\n就会被赋予神通力，\n过去也曾因此被人类过度捕捉。"
          moon: "在湖边游来游去，\n在岸边静静地啃食\n捕捉到的鱼宝可梦。"
        zh_trad:
          sun: "據說只有持有牠前額的紅色部分\n就會被授予神通力。\n這讓牠曾有過被濫捕的過去。"
          moon: "在湖邊游來游去，\n在岸邊靜靜地吃著\n捕捉到的魚寶可夢。"
mankey:
  species_id: 56
  names:
    jp_kana: マンキー
    jp_kanji: マンキー
    en: Mankey
    fr: Férosinge
    it: Mankey
    de: Menki
    es: Mankey
    ko: 망키
    zh_simp: 猴怪
    zh_trad: 猴怪
  forms:
    mankey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 35
        special_attack: 35
        special_defense: 45
        speed: 70
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
        - anger_point
      hidden_ability: defiant
      descriptions:
        jp_kana:
          sun: "まえぶれもなく　とつぜん　おこる。\nあばれまくって　だれも　いなくなると\nこどくに　たえられなくて　またおこる。"
          moon: "いかりちらして　つかれて　ねむるが\nゆめの　なかで　はらをたて　いかりで\nめざめ　めざめたことに　またいかる。"
        jp_kanji:
          sun: "前触れもなく　突然　怒る。\n暴れまくって　誰も　いなくなると\n孤独に　耐えられなくて　また怒る。"
          moon: "怒り散らして　疲れて　眠るが\n夢の　中で　腹を立て　怒りで\n目覚め　目覚めたことに　また怒る。"
        en:
          sun: "It can spontaneously become enraged. Everyone\nnear it clears out as it rampages, and the\nresulting loneliness makes it angrier still."
          moon: "Its raging tires it out and causes it to fall asleep,\nbut the anger resonating in its dreams causes it\nto wake up—which infuriates it all over again."
        fr:
          sun: "Quand il pique soudain une terrible colère, tout\nle monde autour de lui s’enfuit. Mais il supporte\nmal la solitude, et ça l’énerve encore davantage."
          moon: "Fatigué de sa colère permanente, il lui arrive\nde dormir, mais il rêve de ses frustrations, se\nréveille, et se met en colère d’avoir été réveillé."
        it:
          sun: "È soggetto ad attacchi di rabbia improvvisi e se\ntutti attorno a lui si dileguano, si arrabbia ancora\ndi più per la stizza di essere rimasto solo."
          moon: "Quando si infuria si stanca così tanto che si\naddormenta, ma si arrabbia anche in sogno,\ne si risveglia ancora più arrabbiato."
        de:
          sun: "Es rastet häufig völlig unvermittelt aus. Danach\nfindet es sich oft mutterseelenallein wieder.\nDas macht es schließlich noch wütender."
          moon: "Es ärgert sich, bis es vor Erschöpfung eindöst.\nDoch selbst im Traum findet es keine Ruhe, also\nwacht es wieder auf und wird noch wütender."
        es:
          sun: "Se enfada sin razón aparente. Cuando todos lo\ndejan solo para no tener que lidiar con su ira,\nMankey se enoja más aún."
          moon: "Tras desatar su ira, le entra sueño y se duerme.\nSin embargo, sus pesadillas lo atormentan aún\nmás, por lo que se despierta de muy mal humor."
        ko:
          sun: "예고 없이 갑자기 화낸다. 마구\n난동을 부려 모두가 곁을 떠나면\n고독을 참지 못하고 또 화낸다."
          moon: "마구 화를 내다 지쳐서 잠이 들지만\n꿈속에서 화를 내서 분노로 일어나고\n일어났다는 사실에 또 화를 낸다."
        zh_simp:
          sun: "会没有任何征兆突然发怒。\n如果大肆胡闹后谁都不在了的话，\n又会因无法忍受孤独而再次发怒。"
          moon: "发泄完怒气后累得睡着了，\n却在梦里发怒而醒来，\n于是又因为醒来而再次发怒了。"
        zh_trad:
          sun: "會沒有任何徵兆突然發怒。\n大肆胡鬧把周圍的一切都趕走之後，\n又會因受不了孤獨而再次發怒。"
          moon: "發洩完怒氣後累得睡著了，\n但卻在夢裡生氣而醒來，\n然後又因為醒來而再次發怒了。"
