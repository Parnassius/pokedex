      hidden_ability: sand_veil
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          sun: "コケの　ついた　いわが　だいこうぶつ。\nボリボリと　おとを　たてながら\n１にち　１トンいじょうを　くらう。"
          moon: "あしが　のろいので　からだを　まるめ\nころがって　いどう。　いきおいづくと\nじそくは　１００キロを　こえる。"
        jp_kanji:
          sun: "コケの　ついた　岩が　大好物。\nボリボリと　音を　立てながら\n１日　１トン以上を　喰らう。"
          moon: "足が　のろいので　身体を　丸め\n転がって　移動。　勢いづくと\n時速は　１００キロを　超える。"
        en:
          sun: "Mossy rocks are its favorite food.\nIt can devour a ton a day while crunching loudly."
          moon: "This slow-footed Pokémon moves by curling up\nand rolling instead of walking. With enough\nmomentum, its speed can exceed 60 mph."
        fr:
          sun: "Ses aliments préférés sont les cailloux couverts\nde mousse. Il peut en engloutir une tonne par\njour en les broyant bruyamment."
          moon: "Ses jambes sont faibles, aussi se déplace-t-il\nen se roulant en boule. Il peut ainsi rouler\njusqu’à 100 km/h."
        it:
          sun: "Adora mangiare le rocce coperte di muschio.\nOgni giorno ne sgranocchia più di 10 quintali."
          moon: "È molto lento nel camminare e si sposta\nrotolando. Se acquista velocità, può superare\ni 100 km/h."
        de:
          sun: "Mit Moos überzogene Steine sind seine absolute\nLeibspeise. Es vertilgt täglich laut knirschend\neine ganze Tonne davon."
          moon: "Da sich seine Beine nicht zum Gehen eignen,\nbewegt es sich rollend fort. Kommt es richtig\nin Fahrt, erreicht es dabei bis zu 100 km/h."
        es:
          sun: "Su comida preferida son las rocas cubiertas de\nmusgo. Llega a comer más de una tonelada en un\ndía y causa un gran estruendo al masticar."
          moon: "Se desplaza rodando, pues a pie va muy\ndespacio. Si toma carrerilla, puede superar los\n100 km/h."
        ko:
          sun: "이끼가 낀 바위를 아주 좋아한다.\n어적어적 소리를 내면서\n1일 1톤 이상을 먹는다."
          moon: "발이 둔해서 몸을 둥글게 말아\n굴러서 이동한다. 기세가 더해지면\n시속 100km를 넘는다."
        zh_simp:
          sun: "非常喜欢吃长有苔藓的岩石。\n发着嘎吱嘎吱的声音，\n１天吃１吨以上。"
          moon: "因腿脚笨拙而把身体蜷成一团\n翻滚着移动。蓄势而发的话，\n时速能超过１００千米。"
        zh_trad:
          sun: "最喜歡的食物是長有青苔的岩石。\n吃的時候會發出咯吱咯吱的聲音，\n每天會吃１噸以上。"
          moon: "因腿腳笨拙而把身體蜷成一團\n翻滾著移動。滾出勢頭來的話，\n時速能超過１００公里。"
    graveler_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 55
        attack: 95
        defense: 115
        special_attack: 45
        special_defense: 45
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - electric
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: galvanize
      held_items:
        rare: cell_battery
      descriptions:
        jp_kana:
          sun: "ドラバイトを　このんで　くらう。\nくった　せいぶんが　けっしょうになり\nからだのいちぶに　うきだしているぞ。"
          moon: "エサの　いしを　もとめて　ケンカ。\nゴローンどうしが　ぶつかるたびに\nばくおんと　ひかりが　ほとばしる。"
        jp_kanji:
          sun: "ドラバイトを　好んで　喰らう。\n喰った　成分が　結晶になり\n身体の一部に　浮きだしているぞ。"
          moon: "餌の　石を　求めて　ケンカ。\nゴローン同士が　ぶつかるたびに\n爆音と　光が　ほとばしる。"
        en:
          sun: "Its preferred food is dravite. After it has eaten\nthis mineral, crystals form inside the Pokémon,\nrising to the surface of part of its body."
          moon: "They eat rocks and often get into a scrap over\nthem. The shock of Graveler smashing together\ncauses a flash of light and a booming noise."
        fr:
          sun: "Ses pierres préférées sont les dravites.\nIngérées, elles se transforment en cristaux\net apparaissent à la surface de son corps."
          moon: "Ils se disputent les cailloux qu’ils mangent.\nLe choc de deux Gravalanch provoque\ndes explosions et des flashs lumineux."
        it:
          sun: "Si nutre preferibilmente di rocce di dravite.\nI minerali ingeriti diventano dei cristalli che poi\nemergono sulla superficie del suo corpo."
          moon: "I Graveler litigano spesso per le pietre di cui\nsi nutrono. Quando cozzano l’uno contro l’altro\nsi verifica una piccola esplosione."
        de:
          sun: "Georok ernährt sich vorzugsweise von Draviten.\nDie verzehrten Teilchen werden zu Kristallen,\ndie an einer Körperstelle hervortreten."
          moon: "Georok streiten sich um ihre Gesteinsnahrung,\nindem sie zusammenstoßen. Bei der Kollision\nertönt ein lauter Knall und Licht strömt aus."
        es:
          sun: "Se alimenta de dravita, su manjar favorito. Tras\ndigerirla, queda convertida en cristales que\nbrotan en la superficie de su cuerpo."
          moon: "Se pelea por las rocas con las que se alimenta.\nAl chocar contra otros Graveler, se oyen\ndetonaciones y saltan chispas."
        ko:
          sun: "드라바이트를 즐겨 먹는다.\n그 성분이 몸에서 결정이 되어\n몸 일부에 솟아나고 있다."
          moon: "먹이인 돌을 두고 싸운다.\n데구리끼리 부딪힐 때마다\n폭음과 빛을 내뿜는다."
        zh_simp:
          sun: "很喜欢吃镁电气石，\n吃下的成分会形成结晶，\n在身体的某些地方显现出来。"
          moon: "为寻找吃的石头而打架。\n每次隆隆石之间互相碰撞\n都会迸发出爆炸声和光芒。"
        zh_trad:
          sun: "很喜歡吃鎂電氣石，\n吃下的成分會變為結晶，\n在身體的一部分上浮現出來。"
          moon: "為尋找吃的石頭而打架。\n隆隆石們每次互相碰撞\n都會發出爆炸聲和耀眼的光芒。"
golem:
  species_id: 76
  names:
    jp_kana: ゴローニャ
    jp_kanji: ゴローニャ
    en: Golem
    fr: Grolem
    it: Golem
    de: Geowaz
    es: Golem
    ko: 딱구리
    zh_simp: 隆隆岩
    zh_trad: 隆隆岩
  forms:
    golem:
      form_id: 0
      base_stats:
        hp: 80
        attack: 120
        defense: 130
        special_attack: 55
        special_defense: 65
        speed: 45
      evs_yield:
