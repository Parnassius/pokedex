        jp_kana:
          sun: "どこからともなく　あらわれ　じゅもんを\nつぶやき　のろいを　かけたり\nおそろしい　まぼろしを　みせる。"
          moon: "こいの　ねがいが　かなう　のろいを\nかけることも　あるので　いのちがけで\nムウマージを　さがすものも　いる。"
        jp_kanji:
          sun: "どこからともなく　現れ　呪文を\nつぶやき　呪いを　かけたり\n恐ろしい　幻を　みせる。"
          moon: "恋の　願いが　かなう　呪いを\nかけることも　あるので　命懸けで\nムウマージを　探す者も　いる。"
        en:
          sun: "It appears as if from nowhere—muttering\nincantations, placing curses, and giving\npeople terrifying visions."
          moon: "Mismagius have been known to cast spells to\nmake people fall in love, so some people search\nfor this Pokémon as if their life depended on it."
        fr:
          sun: "Un Pokémon aux pouvoirs terrifiants : il sort de\nnulle part en maugréant des incantations et en\nlançant des malédictions."
          moon: "Comme Magirêve aurait le pouvoir de réaliser\nles souhaits des amoureux, certaines personnes\nse lancent désespérément à sa poursuite."
        it:
          sun: "Appare dal nulla recitando formule magiche\nche causano sventura o provocano spaventose\nvisioni."
          moon: "Conosce formule magiche e incantesimi\nd’amore. Molti fanno della sua ricerca la loro\nragione di vita."
        de:
          sun: "Es erscheint aus dem Nichts, flüstert\nBeschwörungen, spricht Flüche aus und\nerzeugt furchteinflößende Trugbilder."
          moon: "Manche Leute suchen verzweifelt nach einem\nTraunmagil, weil es mit seinen Beschwörungen\nLiebeswünsche in Erfüllung gehen lassen kann."
        es:
          sun: "Aparece de la nada sin previo aviso y lanza\nconjuros por medio de cánticos. Quienes los\nescuchan pueden sufrir terroríficas visiones."
          moon: "Es capaz de lanzar hechizos y conjuros de\namor, por lo que hay gente totalmente\nobsesionada con encontrar a un Mismagius."
        ko:
          sun: "예고 없이 나타나\n주문을 외워 저주를 걸거나\n무서운 환상을 보여준다."
          moon: "사랑의 소원을 이뤄주는 저주를\n하는 일도 있어서 목숨을 걸고\n무우마직을 찾는 자도 있다."
        zh_simp:
          sun: "不知从何处出现，\n碎碎念着咒文，施加诅咒，\n制造恐怖的幻象。"
          moon: "因为也会施加实现恋爱愿望的咒语，\n所以也有拼命寻找梦妖魔的人。"
        zh_trad:
          sun: "不知從何處出現，\n碎碎念著咒文，施加詛咒，\n製造恐怖的幻象。"
          moon: "因為也會施加實現戀愛願望的咒語，\n所以也有不惜性命尋找夢妖魔的人。"
honchkrow:
  species_id: 430
  names:
    jp_kana: ドンカラス
    jp_kanji: ドンカラス
    en: Honchkrow
