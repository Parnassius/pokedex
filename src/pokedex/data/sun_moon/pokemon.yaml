        - intimidate
        - flash_fire
      hidden_ability: justified
      descriptions:
        jp_kana:
          sun: "りこうで　ちゅうじつ。　ただし\nみしらぬものや　なわばりを　おかす\nものには　ほえたてて　いかく　するぞ。"
          moon: "かわいいからと　いって　しらない\nトレーナーの　ガーディに　ちかづくと\nほえかかられて　かみつかれるぞ。"
        jp_kanji:
          sun: "利口で　忠実。　ただし\n見知らぬ者や　縄張りを　侵す\n者には　吠えたてて　いかく　するぞ。"
          moon: "可愛いからと　いって　知らない\nトレーナーの　ガーディに　近づくと\n吠えかかられて　噛みつかれるぞ。"
        en:
          sun: "It’s both clever and loyal, but if a stranger tries\nto invade its territory, it barks threateningly."
          moon: "It looks cute, but when you approach another\nTrainer’s Growlithe, it will bark at you and bite."
        fr:
          sun: "Un Pokémon très intelligent et affectueux.\nIl aboie pour intimider les inconnus et ceux qui\npénètrent sur son territoire."
          moon: "Même s’il a l’air adorable, mieux vaut ne pas\ns’approcher du Caninos d’un Dresseur inconnu.\nOn risque de se faire mordre."
        it:
          sun: "È intelligente e fedele, ma abbaia minaccioso\ncontro gli sconosciuti e contro chiunque invada\nil suo territorio."
          moon: "Sembra tanto carino, ma se qualcuno si avvicina\nal suo Allenatore, reagisce abbaiando\ne mordendo."
        de:
          sun: "Es ist klug und loyal. Sein Revier verteidigt es\njedoch mit lautem Bellen gegen Fremde und\nEindringlinge."
          moon: "Es mag zwar niedlich aussehen, doch nähert\nman sich dem Fukano eines fremden Trainers,\nbellt es laut und schnappt nach einem."
        es:
          sun: "Es muy leal e inteligente por naturaleza. No\nobstante, si un extraño invade su territorio,\nle ladrará a modo de amenaza."
          moon: "Por muy adorable que parezca, si te acercas al\nGrowlithe de otro Entrenador, lo más probable\nes que te ladre e intente morderte."
        ko:
          sun: "똑똑하고 충실하다. 다만\n모르는 자나 영역을 침범하는\n자에게는 짖어대서 위협한다."
          moon: "귀엽다고 해서 모르는\n트레이너의 가디에게 다가가면\n짖거나 물리기도 한다."
        zh_simp:
          sun: "机灵而忠诚。但是对于\n不认识的或是侵犯领地的，\n会狂吠不停并作出威吓。"
          moon: "虽说很可爱，但如果靠近\n不认识的训练家的卡蒂狗，\n是会被狂吠撕咬的。"
        zh_trad:
          sun: "聰明而忠誠。但是遇到\n不認識或是侵犯領地的對手，\n會不停狂吠來威嚇。"
          moon: "雖說很可愛，但如果靠近\n不認識的訓練家的卡蒂狗，\n是會被狂吠撕咬的。"
