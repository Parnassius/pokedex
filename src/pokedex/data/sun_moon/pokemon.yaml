        - own_tempo
        - technician
      hidden_ability: moody
      descriptions:
        jp_kana:
          sun: "シッポの　さきから　にじみでてくる\nたいえきで　どくじの　マークを\nえがいて　なわばりを　アピール。"
          moon: "じぶんの　なわばりを　しめす　マークを\nえがきちらすので　ドーブルの　おおい\nまちの　かべは　らくがき　だらけ。"
        jp_kanji:
          sun: "シッポの　先から　にじみでてくる\n体液で　独自の　マークを\n描いて　縄張りを　アピール。"
          moon: "自分の　縄張りを　示す　マークを\n描き散らすので　ドーブルの　多い\n街の　壁は　落書き　だらけ。"
        en:
          sun: "The unique creations produced by each\nSmeargle are painted using the fluid that oozes\nfrom its tail. This is how it marks its territory."
          moon: "It draws symbols all over the place to mark its\nterritory. In towns with many Smeargle, the walls\nare covered in graffiti."
        fr:
          sun: "Ce Pokémon marque son territoire en peignant\nà l’aide du liquide suintant du bout de sa queue."
          moon: "Ce Pokémon peint pour marquer son territoire.\nOn reconnaît les villes peuplées de nombreux\nQueulorior à leurs murs recouverts de graffitis."
        it:
          sun: "Delimita i confini del suo territorio dipingendo\nsegni particolari con il fluido corporeo\nche secerne dalla punta della coda."
          moon: "Marca il suo territorio dipingendo con la coda.\nNelle città che ospitano molti Smeargle, i muri\nsono pieni di graffiti."
        de:
          sun: "Farbeagle markiert sein Revier mit einer\nFlüssigkeit, die aus seiner Schweifspitze\naustritt."
          moon: "Hinterlässt allerlei Markierungen, um sein Revier\nzu kennzeichnen. Wände in Städten mit vielen\nFarbeagle sind daher ziemlich vollgeschmiert."
        es:
          sun: "Smeargle marca los límites de su territorio\ndibujando marcas personales con el fluido\nque libera por la punta de la cola."
          moon: "Los muros de las ciudades donde viven\nSmeargle están llenos de las marcas que van\ndejando para indicar los límites de su territorio."
        ko:
          sun: "꼬리의 끝에서 배어 나오는\n체액으로 독자적인 마크를\n그려 영역을 어필한다."
          moon: "자신의 영역을 나타내는 마크를\n여기저기 그리기 때문에 루브도가 많은\n동네의 벽은 낙서투성이다."
        zh_simp:
          sun: "用从尾巴尖尖慢慢渗出的\n体液绘出独有的标记，\n宣告自己的领地。"
          moon: "到处描绘昭示自己领地的标记，\n所以在图图犬多的街边墙壁上\n全都是这些乱涂乱画的。"
        zh_trad:
          sun: "用從尾巴尖端慢慢滲出的\n體液繪出獨有的標記，\n用以宣告自己的地盤。"
          moon: "會到處畫下展示自己地盤的標記，\n所以在圖圖犬比較多的城市，\n路邊牆上到處都是這些塗鴉。"
