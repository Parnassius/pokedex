    jp_kana: ケイコウオ
    jp_kanji: ケイコウオ
    en: Finneon
    fr: Écayon
    it: Finneon
    de: Finneon
    es: Finneon
    ko: 형광어
    zh_simp: 荧光鱼
    zh_trad: 螢光魚
  forms:
