      descriptions:
        jp_kana:
          sun: "ダンスが　とくいで　おどりながら\nつぎつぎに　みずの　バルーンを\nつくりだし　てきに　ぶつけるぞ。"
          moon: "なかまを　おもう　きもちが　つよい。\nトレーナーが　おちこんでいると\nダンスを　おどって　はげまそうとする。"
        jp_kanji:
          sun: "ダンスが　得意で　踊りながら\n次々に　水の　バルーンを\n作りだし　敵に　ぶつけるぞ。"
          moon: "仲間を　思う　気持ちが　強い。\nトレーナーが　落ち込んでいると\nダンスを　踊って　励まそうとする。"
        en:
          sun: "A skillful dancer, it creates a sequence of water\nballoons as it dances, and briskly bombards\nits enemies."
          moon: "It cares deeply for its companions. When its\nTrainer is feeling down, it performs a cheery\ndance to try and help."
        fr:
          sun: "Danseur hors pair, il produit des ballons d’eau\nà la chaîne afin d’éclabousser l’adversaire lors\nd’un impitoyable ballet funeste."
          moon: "Il est très soucieux du bien-être des autres\net n’hésite pas à exécuter une petite danse\ns’il sent que son Dresseur a le moral à zéro."
        it:
          sun: "È un provetto ballerino e scaglia contro il nemico\nuna serie di palloncini d’acqua, che crea a ritmo\ndi danza."
          moon: "Stringe profondi legami d’amicizia e, se\npercepisce che il suo Allenatore è un po’ giù\ndi morale, si mette a danzare per tirarlo su."
        de:
          sun: "Dieser begnadete Tänzer erzeugt beim Tanzen\neine Wasserblase nach der anderen und greift\ndamit seine Feinde an."
          moon: "Fühlt sich anderen sehr verbunden. Wenn sein\nTrainer schlechte Laune hat, muntert es ihn mit\neinem Tänzchen auf."
        es:
          sun: "Un bailarín consumado. Crea globos de agua\ncon los que golpea a sus rivales una y otra vez\nsin dejar de bailar."
          moon: "Este Pokémon tiene un gran sentido de la\ncamaradería y no duda en echarse a bailar si\nnota que su Entrenador está con la moral baja."
        ko:
          sun: "댄스가 특기이며 춤추면서\n계속해서 물의 풍선을\n만들어 적에게 부딪힌다."
          moon: "동료를 생각하는 마음이 강하다.\n트레이너가 풀이 죽어 있으면\n춤을 추며 격려해주려 한다."
        zh_simp:
          sun: "擅长跳舞，能够边跳舞，\n边一个接一个地\n制作水做的气球扔向敌人。"
          moon: "非常关心自己的伙伴。\n训练家如果情绪低落，\n就会跳舞给予鼓励。"
        zh_trad:
          sun: "很擅長跳舞，會邊跳舞\n邊一個接一個地\n製造水氣球扔向敵人。"
          moon: "非常關心自己的夥伴。\n訓練家如果情緒低落，\n就會跳舞給予鼓勵。"
