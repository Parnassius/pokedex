      names:
        jp_kana: メガプテラ
        jp_kanji: メガプテラ
        en: Mega Aerodactyl
        fr: Méga-Ptéra
        it: MegaAerodactyl
        de: Mega-Aerodactyl
        es: Mega-Aerodactyl
        ko: 메가프테라
        zh_simp: 超级化石翼龙
        zh_trad: 超級化石翼龍
      base_stats:
        hp: 80
        attack: 135
        defense: 85
        special_attack: 70
        special_defense: 95
        speed: 150
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - rock
        - flying
      egg_groups:
        - flying
      abilities:
        - tough_claws
      descriptions:
        jp_kana:
          sun: "からだの　いちぶが　いしに　なった。\nこのすがたが　しんの　プテラであると\nしゅちょうする　がくしゃも　いる。"
          moon: "メガシンカし　いぜんに　わを　かけて\nきょうぼうに。　かじょうな　パワーに\nくるしんでいるためと　いわれる。"
        jp_kanji:
          sun: "身体の　一部が　石に　なった。\nこの姿が　真の　プテラであると\n主張する　学者も　いる。"
          moon: "メガシンカし　以前に　輪を　かけて\n凶暴に。　過剰な　パワーに\n苦しんでいるためと　いわれる。"
        en:
          sun: "Part of its body has become stone. Some\nscholars claim that this is Aerodactyl’s\ntrue appearance."
          moon: "When it Mega Evolves, it becomes more vicious\nthan ever before. Some say that’s because its\nexcess of power is causing it pain."
        fr:
          sun: "Une partie de son corps est devenue pierreuse.\nCertains scientifiques pensent qu’il s’agit là de\nla véritable apparence du Ptéra préhistorique."
          moon: "La Méga-Évolution l’a rendu encore plus violent.\nOn suppose que son trop-plein d’énergie\nle fait souffrir continuellement."
        it:
          sun: "Delle parti del suo corpo si sono trasformate\nin pietra. Alcuni studiosi affermano che questa\nsia la vera forma di Aerodactyl."
          moon: "La megaevoluzione l’ha reso ancora più feroce\ndel solito, probabilmente per lo stress causato\ndall’eccessivo aumento di energia."
        de:
          sun: "Ein Teil seines Körpers wurde zu Stein. Einige\nForscher behaupten, dies sei die ursprüngliche\nForm von Aerodactyl."
          moon: "Die Mega-Entwicklung hat es noch grausamer\ngemacht. Man sagt, dass der Grund dafür ein\nÜberschuss an Kraft sei, unter dem es leide."
        es:
          sun: "Parte de su cuerpo se ha petrificado. Algunos\nestudiosos afirman que esta es la verdadera\nforma de Aerodactyl."
          moon: "Tras la megaevolución, se vuelve mucho más\nferoz que antes. Se dice que es por el\nsufrimiento que le causa el exceso de poder."
        ko:
          sun: "몸 일부가 돌이 되었다.\n이 모습이 진짜 프테라라고\n주장하는 학자도 있다."
          moon: "메가진화해서 이전보다 한층 더\n난폭해졌다. 넘치는 파워에\n괴로워하고 있기 때문이라고 전해진다."
        zh_simp:
          sun: "身体的一部分变成了石头。\n也有学者主张，\n这个样子才是真正的化石翼龙。"
          moon: "超级进化后，\n粗暴的脾气比以前更胜一筹。\n据说因为过剩的力量而苦恼。"
        zh_trad:
          sun: "身體的一部分變成了石頭。\n也有學者主張這才是\n化石翼龍真正的模樣。"
          moon: "超級進化後，粗暴的脾氣\n比以前更勝一籌。據說那是因為\n力量過剩讓牠感到痛苦的緣故。"
snorlax:
  species_id: 143
  names:
    jp_kana: カビゴン
    jp_kanji: カビゴン
    en: Snorlax
    fr: Ronflex
    it: Snorlax
    de: Relaxo
    es: Snorlax
    ko: 잠만보
    zh_simp: 卡比兽
    zh_trad: 卡比獸
  forms:
    snorlax:
      form_id: 0
      base_stats:
        hp: 160
