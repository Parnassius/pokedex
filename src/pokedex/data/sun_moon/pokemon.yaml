      egg_groups:
        - field
      abilities:
        - sand_veil
        - tangling_hair
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          sun: "きんいろに　かがやく　ヒゲで　みを\nまもっている。　ぬけおちた　ヒゲを\nもちかえると　ふこうに　なると　いう。"
          moon: "だいちの　めがみたちの　けしんと\nかんがえられ　アローラちほうでは\nとても　たいせつに　されている。"
        jp_kanji:
          sun: "金色に　輝く　髭で　身を\n守っている。　抜け落ちた　髭を\n持ち帰ると　不幸に　なると　いう。"
          moon: "大地の　女神たちの　化身と\n考えられ　アローラ地方では\nとても　大切に　されている。"
        en:
          sun: "Its shining gold hair provides it with protection.\nIt’s reputed that keeping any of its fallen hairs\nwill bring bad luck."
          moon: "These Pokémon are cherished in the Alola\nregion, where they are thought to be feminine\ndeities of the land incarnate."
        fr:
          sun: "Sa chevelure d’or étincelante lui permet de\nprotéger son corps. On dit que ramasser\nses cheveux tombés au sol porte malheur."
          moon: "Les habitants d’Alola en prennent grand soin,\ncar ils le voient comme une incarnation des\ndéesses de la terre."
        it:
          sun: "Usa le sue chiome dorate per proteggersi.\nSi dice che raccogliere i suoi peli caduti a terra\nporti sfortuna."
          moon: "Viene trattato con grande riguardo dagli\nabitanti di Alola perché è ritenuto\nun’incarnazione delle divinità della terra."
        de:
          sun: "Mit seinen golden leuchtenden Haaren\nschützt es sich. Es soll Unglück bringen,\nseine ausgefallenen Haare mitzunehmen."
          moon: "Man hält es für die Verkörperung der Göttinnen\ndes Landes. In der Alola-Region wird es daher\naußerordentlich geschätzt."
        es:
          sun: "Su pelo dorado y brillante le sirve de protección.\nSe dice que recoger los pelos que se le caen\ntrae mala suerte."
          moon: "En Alola son Pokémon muy importantes porque\nse piensa que son encarnaciones de las\ndivinidades de la tierra."
        ko:
          sun: "금색으로 빛나는 수염으로 몸을\n지키고 있다. 빠진 수염을\n가져가면 불행해진다고 한다."
          moon: "대지 여신들의 화신으로\n여겨져 알로라지방에서는\n매우 소중히 여겨진다."
        zh_simp:
          sun: "用金光闪烁的胡子保护身体。\n听说，如果把脱落的胡须带回家，\n会招来不幸。"
          moon: "被认为是大地女神们的化身，\n在阿罗拉地区非常受重视。"
        zh_trad:
          sun: "用金光閃爍的鬍子保護身體。\n聽說如果把脫落的鬍鬚帶回家，\n會招來不幸。"
          moon: "被認為是大地女神們的化身，\n在阿羅拉地區非常受重視。"
meowth:
  species_id: 52
  names:
    jp_kana: ニャース
    jp_kanji: ニャース
    en: Meowth
    fr: Miaouss
    it: Meowth
    de: Mauzi
    es: Meowth
    ko: 나옹
    zh_simp: 喵喵
    zh_trad: 喵喵
  forms:
    meowth:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 40
        special_defense: 40
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
        - technician
      hidden_ability: unnerve
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          sun: "ひるまは　だらだら　ねてすごし\nひが　くれるころに　かつどうかいし。\nよるのまちで　コインを　さがす。"
          moon: "キラキラした　ものが　だいすき。\nよく　ヤミカラスと　えものを\nうばいあって　ケンカを　している。"
        jp_kanji:
          sun: "昼間は　だらだら　寝て過ごし\n日が　暮れるころに　活動開始。\n夜の街で　コインを　探す。"
          moon: "キラキラした　ものが　大好き。\nよく　ヤミカラスと　獲物を\n奪い合って　ケンカを　している。"
        en:
          sun: "It lies around all day, becoming active near dusk.\nAt night, it wanders the city in search of\nloose change."
          moon: "It loves shiny things. It often fights with\nMurkrow over prey they’re both trying to catch."
        fr:
          sun: "Il fait la sieste pendant la journée et devient\nactif quand le soir tombe. Il passe sa nuit à\nchercher des pièces perdues dans les rues."
          moon: "Il adore tout ce qui brille et doit souvent\naffronter des Cornèbre qui convoitent\nle même trophée que lui."
        it:
          sun: "Dorme tutto il giorno e si attiva verso\nil tramonto. Durante la notte gira per la città\nin cerca di monetine."
          moon: "Ama gli oggetti luccicanti.\nSpesso se li contende con Murkrow."
        de:
          sun: "Tagsüber ist es faul und schläft ständig.\nErst nach Sonnenuntergang wird es aktiv\nund durchstöbert die Stadt nach Münzen."
          moon: "Es liebt glänzende Objekte. Mauzi und Kramurx\nnehmen sich oft gegenseitig die Beute weg,\nwas regelmäßig zu heftigem Streit führt."
        es:
          sun: "Se pasa casi todo el día durmiendo y se vuelve\nmás activo al caer el sol. Por la noche merodea\npor la ciudad buscando monedas."
          moon: "Le fascinan los objetos brillantes, por lo que a\nmenudo se disputa el botín con algún Murkrow."
        ko:
          sun: "낮에는 느긋하게 자면서 지내고\n해가 떨어지면 활동을 시작한다.\n밤이 되면 거리에서 동전을 찾는다."
          moon: "반짝이는 물건을 매우 좋아한다.\n자주 니로우와 먹이를\n서로 빼앗으며 싸우고 있다."
        zh_simp:
          sun: "白天就一直睡啊睡地度过，\n太阳落山时才开始活动。\n在夜晚的街道上搜寻硬币。"
          moon: "非常喜欢闪闪亮亮的东西。\n经常和黑暗鸦为了争夺猎物而打架。"
        zh_trad:
          sun: "總是懶懶地睡著度過白天，\n太陽下山時才開始活動。\n會在夜晚的街道上搜尋硬幣。"
          moon: "非常喜歡亮晶晶的東西。\n經常和黑暗鴉為了爭奪獵物而打架。"
    meowth_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 40
        attack: 35
        defense: 35
        special_attack: 50
        special_defense: 40
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - pickup
        - technician
      hidden_ability: rattled
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          sun: "もともと　アローラには　いなかったが\nひとの　てで　ふえたのち　やせいか。\nズルがしこくて　プライドが　たかい。"
          moon: "たかいプライドを　きずつけられたり\nひたいの　こばんを　よごされると\nくるったような　ヒステリーを　おこす。"
        jp_kanji:
          sun: "元々　アローラには　いなかったが\n人の　手で　増えたのち　野生化。\nズル賢くて　プライドが　高い。"
          moon: "高いプライドを　傷つけられたり\n額の　小判を　汚されると\n狂ったような　ヒステリーを　起こす。"
        en:
          sun: "This Pokémon was not originally found in Alola.\nHuman actions caused a surge in their numbers,\nand they went feral. They’re prideful and crafty."
          moon: "When its delicate pride is wounded, or when the\ngold coin on its forehead is dirtied, it flies into a\nhysterical rage."
        fr:
          sun: "Il ne s’agit pas d’un Pokémon natif d’Alola. Après\ny avoir été introduit par l’Homme, il est revenu à\nl’état sauvage. Il est intelligent et très fier."
          moon: "Si l’on insulte sa fierté ou que la pièce sur son\nfront a la moindre salissure, il entre dans une\nrage hystérique."
        it:
          sun: "Non è un Pokémon autoctono di Alola, è stato\nintrodotto dall’uomo per poi inselvatichirsi.\nÈ un Pokémon furbo e molto orgoglioso."
          moon: "Se qualcuno ferisce il suo orgoglio o sporca\nla moneta sulla sua fronte, perde le staffe\ne scatena una furia incontrollabile."
        de:
          sun: "Ursprünglich existierte es in Alola nicht.\nDurch Menschenhand wurde es verbreitet und\nausgewildert. Es ist listig und sehr stolz."
          moon: "Verletzt man seinen großen Stolz oder macht\ndie Münze an seiner Stirn schmutzig, so verfällt\nes in eine wahnsinnige Hysterie."
        es:
          sun: "Este Pokémon astuto y orgulloso no es originario\nde Alola. Tras su proliferación, debida a la mano\ndel hombre, recobró su estado salvaje."
          moon: "Si se hiere su frágil orgullo o se le mancha\nla moneda que lleva en la frente, sufre tales\nataques de histeria que parece enajenado."
        ko:
          sun: "원래 알로라에는 없었으나 사람에 의해\n개체 수가 늘어난 후 야생화되었다.\n교활하고 프라이드가 높다."
          moon: "높은 자존심에 상처를 입거나\n이마의 금화가 더러워지면\n미친 듯이 히스테리를 부린다."
        zh_simp:
          sun: "原本阿罗拉是没有的，\n人工繁殖后野化而来。\n狡黠聪慧，自尊心很强。"
          moon: "如果被伤到高傲的自尊心，\n或是被弄脏额头的金币，\n就会发狂般情绪失控。"
        zh_trad:
          sun: "原本不棲息在阿羅拉，\n是人為引進後在野外繁殖而來的。\n性格聰明狡猾，自尊心很強。"
          moon: "如果被傷到高傲的自尊心，\n或是額頭上的金幣被弄髒時，\n就會發狂般情緒失控。"
persian:
