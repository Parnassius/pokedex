          moon: "みずのなかに　とけこんで　けはいを\nかくし　えものの　さかなポケモンが\nくるのを　じっと　まちかまえている。"
        jp_kanji:
          sun: "細胞構造が　水の　分子に\nよく　似ている。　水辺に　棲むので\n人魚に　間違われることも。"
          moon: "水の中に　溶け込んで　気配を\n隠し　獲物の　さかなポケモンが\n来るのを　じっと　待ち構えている。"
        en:
          sun: "Its cells are composed of units much like water\nmolecules. It lives close to water and is often\nmistaken for a mermaid."
          moon: "Blending in with the water and erasing all signs\nof its presence, it patiently waits for its prey,\nfish Pokémon."
        fr:
          sun: "La structure de ses cellules ressemble à celle\ndes molécules d’eau. Il vit sur les rives, et il\narrive qu’il soit pris pour une sirène."
          moon: "Ce Pokémon plonge dans l’eau et y reste caché\njusqu’à ce qu’un Pokémon poisson passe à\nsa portée."
        it:
          sun: "La sua struttura cellulare è simile a quella delle\nmolecole d’acqua. Vive sulle rive dei mari e dei\nlaghi e a volte viene scambiato per una sirena."
          moon: "Si nasconde alle prede dissolvendosi nell’acqua\ne aspetta paziente che arrivi un Pokémon\nacquatico per catturarlo."
        de:
          sun: "Seine Zellstruktur ist der von Wassermolekülen\nähnlich. Es lebt in der Nähe von Ufern, daher\nwird es oft mit einer Meerjungfrau verwechselt."
          moon: "Es wird eins mit dem Wasser und somit\nunsichtbar. So wartet es heimlich, still und leise\nauf Fisch-Pokémon, die es sich als Beute fängt."
        es:
          sun: "Su composición celular es muy parecida a la\nestructura molecular del agua. Vive cerca de\nríos y mares y a veces lo toman por una sirena."
          moon: "Se funde con el agua y se oculta por completo.\nEntonces espera pacientemente a que aparezca\nalgún Pokémon pez para atraparlo."
        ko:
          sun: "세포구조가 물 분자와\n아주 닮았다. 물가에 살아서\n인어로 착각하기도 한다."
          moon: "물속에 녹아들어 기척을\n숨기고 먹이인 물고기포켓몬이\n오는 것을 가만히 기다리고 있다."
        zh_simp:
          sun: "细胞构造与水分子非常相似。\n在水边栖息，所以有时候\n会被错认为是人鱼。"
          moon: "与水融为一体，隐藏自己的气息，\n一动不动地埋伏着等待猎物\n——鱼宝可梦的到来。"
        zh_trad:
          sun: "細胞構造與水分子非常相似。\n由於在水邊棲息，有時候\n會被誤認為是人魚。"
          moon: "與水融為一體，隱藏自己的氣息，\n一動不動地埋伏著等待獵物\n──魚寶可夢的到來。"
