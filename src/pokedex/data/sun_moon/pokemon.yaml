      descriptions:
        jp_kana:
          sun: "あしを　いかした　けりが　とくい。\nたおした　あいてを　あしげに　して\nたかわらいで　しょうりを　アピール。"
          moon: "びきゃくの　ポケモンとして　しられ\nびようクリニックなどの　こうこくの\nマスコットに　なっている。"
        jp_kanji:
          sun: "脚を　活かした　蹴りが　得意。\n倒した　相手を　足蹴に　して\n高笑いで　勝利を　アピール。"
          moon: "美脚の　ポケモンとして　知られ\n美容クリニックなどの　広告の\nマスコットに　なっている。"
        en:
          sun: "Its long, striking legs aren’t just for show but to\nbe used to kick with skill. In victory, it shows off\nby kicking the defeated, laughing boisterously."
          moon: "A Pokémon known for the beauty of its\nwell-shaped legs, it sometimes appears as a\nmascot in advertisements for beauty salons."
        fr:
          sun: "Spécialiste du coup de pied bien placé, ce\nPokémon prend un malin plaisir à savater\nses ennemis au sol en riant aux éclats."
          moon: "Ce Pokémon est connu pour la forme parfaite de\nses jambes. Les instituts de beauté n’hésitent\npas à l’utiliser comme mascotte dans leurs pubs."
        it:
          sun: "Tirare calci è la sua specialità. Quando batte\nun avversario, adora umiliarlo ridendogli in\nfaccia e vantandosi della vittoria."
          moon: "È talmente noto per la perfezione delle sue\ngambe che spesso viene ritratto nei manifesti\npubblicitari dei saloni di bellezza."
        de:
          sun: "Dieses Pokémon ist für seine heftigen Tritte\nbekannt. Oft tritt es auch noch nach und lacht,\num seinen Sieg an die große Glocke zu hängen."
          moon: "Dieses Pokémon ist für seine schönen Beine\nbekannt. Da verwundert es nicht, dass es für\nAnzeigen von Schönheitssalons gebucht wird."
        es:
          sun: "Propinar patadas implacables es su\nespecialidad. Patea a sus oponentes derrotados\ny proclama su victoria con una gran carcajada."
          moon: "La belleza de sus piernas es bien conocida.\nPor eso no es de extrañar que se utilice como\nreclamo para salones de belleza y similares."
        ko:
          sun: "다리를 활용한 발차기가 특기다.\n쓰러뜨린 상대를 걷어차며\n큰 웃음으로 승리를 어필한다."
          moon: "다리가 예쁜 포켓몬으로 알려져\n미용 클리닉 등의 광고의\n마스코트가 되었다."
        zh_simp:
          sun: "擅长运用自己的脚来踢。\n用脚踩住已被打倒的对手，\n大笑着炫耀自己的胜利。"
          moon: "作为腿部优美的宝可梦为人所知，\n成为了美容沙龙等广告的吉祥物。"
        zh_trad:
          sun: "擅長運用自己的腳使出踢擊。\n會狠狠教訓被打倒的對手，\n大笑著炫耀自己的勝利。"
          moon: "以擁有美腿的寶可夢為人所知，\n成了美容沙龍等廣告的吉祥物。"
