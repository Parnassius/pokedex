      descriptions:
        jp_kana:
          sun: "ずるがしこく　どうもうな　せいしつ。\nおやが　いない　スキに　すあなに\nしんにゅう。　タマゴを　ぬすみだす。"
          moon: "ツメで　タマゴに　あなを　あけて\nなかみを　すする。　ブリーダーに\nにくまれ　くじょ　されることもある。"
        jp_kanji:
          sun: "ずる賢く　獰猛な　性質。\n親が　いない　スキに　巣穴に\n侵入。　タマゴを　盗みだす。"
          moon: "ツメで　タマゴに　穴を　開けて\n中味を　すする。　ブリーダーに\n憎まれ　駆除　されることもある。"
        en:
          sun: "It has a cunning yet savage disposition.\nIt waits for parents to leave their nests,\nand then it sneaks in to steal their eggs."
          moon: "It uses its claws to poke holes in eggs so it can\nslurp out the insides. Breeders consider it a\nscourge and will drive it away or eradicate it."
        fr:
          sun: "Un Pokémon aussi roublard que fourbe.\nIl se glisse dans le nid des autres Pokémon\nen leur absence pour leur dérober leurs œufs."
          moon: "Avec ses griffes, il perce un trou dans les œufs\nqu’il trouve pour en sucer le contenu. Bête noire\ndes Éleveurs qui le traquent parfois."
        it:
          sun: "È furbo e subdolo. Si intrufola nei nidi\nincustoditi per rubare le uova mentre i genitori\nsono assenti."
          moon: "Buca le uova con gli artigli per succhiarne\nil contenuto. Gli Allevapokémon lo considerano\nun flagello e cercano di tenerlo alla larga."
        de:
          sun: "Dieses Pokémon hat ein durchtriebenes,\ngrausames Wesen. Es sucht nach unbewachten\nNestern und stiehlt die Eier."
          moon: "Es rammt seine Krallen in Eier und schlürft\nihren Inhalt aus. Pokémon-Züchter können es\naus diesem Grund nicht ausstehen."
        es:
          sun: "Es un Pokémon de naturaleza astuta y fiera.\nSe cuela en los nidos de otros Pokémon cuando\nno están y roba sus huevos."
          moon: "Abre un pequeño agujero en los huevos con sus\ngarras y sorbe el interior. Los Criapokémon lo\ndetestan e intentan tomar medidas contra él."
        ko:
          sun: "교활하고 사나운 성질을 가졌다.\n부모가 없는 틈에 둥지에\n침입해서 알을 훔쳐낸다."
          moon: "손톱으로 알에 구멍을 뚫어서\n내용물을 마신다. 브리더에게\n미움을 받아 제거될 때도 있다."
        zh_simp:
          sun: "狡黠凶恶的性格。\n趁着双亲不在就侵入巢穴，\n将蛋盗出。"
          moon: "用爪子在蛋上开个孔，\n吸食里面的美味。\n也会被培育家憎恶而遭到驱逐。"
        zh_trad:
          sun: "性格狡猾且兇猛。\n會趁著雙親不在時\n侵入巢穴把蛋盜走。"
          moon: "用爪子在蛋上開個孔，\n吸食中間的美味。\n有時會被培育家憎惡而遭到驅逐。"
