      descriptions:
        jp_kana:
          sun: "せいぎょマスクを　みずから　はかい。\nとくしゅメモリを　そうび　することで\nタイプを　かえられるように　なった。"
          moon: "かくせいし　ＡＲシステムが　はつどう。\nとくしゅな　メモリに　たいおうして\nタイプチェンジし　てきに　たちむかう。"
        jp_kanji:
          sun: "制御マスクを　自ら　破壊。\n特殊メモリを　装備　することで\nタイプを　変えられるように　なった。"
          moon: "覚醒し　ＡＲシステムが　発動。\n特殊な　メモリに　対応して\nタイプチェンジし　敵に　立ち向かう。"
        en:
          sun: "It destroyed its own control mask. It has\nbecome capable of changing its type by\nequipping special memories."
          moon: "Upon awakening, its RKS System is activated.\nBy employing specific memories, this Pokémon\ncan adapt its type to confound its enemies."
        fr:
          sun: "Il est parvenu à détruire le masque qui le\nrestreignait. Il peut maintenant changer de\ntype en équipant des mémoires spécifiques."
          moon: "Il s’est éveillé et son Système Alpha s’est activé.\nEn utilisant des mémoires spécifiques, il peut\nchanger de type pour défier ses ennemis."
        it:
          sun: "È riuscito a distruggere la maschera che lo\ncontrollava e ora può cambiare tipo grazie\na delle speciali ROM."
          moon: "Quando si sveglia, il Sistema Primevo si attiva.\nModifica il proprio tipo grazie a delle speciali\nROM per affrontare al meglio il nemico."
        de:
          sun: "Es hat seine Kontrollmaske selbst zerstört.\nNun kann es seinen Typ ändern, indem es sich\nmit speziellen Speicherdaten ausrüstet."
          moon: "Durch sein Erwachen wurde das Alpha-System\naktiviert. Es trotzt Gegnern, indem es mithilfe\nvon speziellen Speicherdaten seinen Typ ändert."
        es:
          sun: "Tras destruir la máscara de contención que lo\ncontrolaba, ahora puede modificar su tipo en\nfunción del disco que utilice."
          moon: "Al despertar, se activa su Sistema Alfa, lo que\nle permite usar ciertos discos para cambiar de\ntipo y adaptarse al rival."
        ko:
          sun: "제어마스크를 스스로 파괴했다.\n특수메모리를 장착하여\n타입을 변환할 수 있게 되었다."
          moon: "각성하여 AR시스템이 발동.\n특수한 메모리에 반응하여\n타입 체인지해서 적에게 맞선다."
        zh_simp:
          sun: "自己破坏了控制面罩。\n通过装备上特殊的存储碟，\n变得可以改变自己的属性。"
          moon: "觉醒后，启动ＡＲ系统。\n对应特殊的存储碟，\n改变属性对抗敌人。"
        zh_trad:
          sun: "自己破壞了控制面罩。\n變得能透過裝備特殊記憶碟\n來改變自己的屬性。"
          moon: "覺醒後，ＡＲ系統啟動。\n對應特殊的記憶碟，\n能夠改變屬性對抗敵人。"
