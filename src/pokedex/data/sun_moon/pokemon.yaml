      abilities:
        - clear_body
        - liquid_ooze
      hidden_ability: rain_dish
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          sun: "どくのしょくしゅは　ふつう　８０ぽん。\nながく　いきているもの　ほど\nその　ほんすうは　へっていく。"
          moon: "まれに　たいりょうはっせい　すると\nあたりの　うみから　さかなポケモンが\nいっさい　いなくなってしまう。"
        jp_kanji:
          sun: "毒の触手は　普通　８０本。\n長く　生きているもの　ほど\nその　本数は　減っていく。"
          moon: "まれに　大量発生　すると\nあたりの　海から　さかなポケモンが\n一切　いなくなってしまう。"
        en:
          sun: "Normally, it has 80 poisonous tentacles.\nThe longer one has been alive, the fewer\ntentacles it will have."
          moon: "Although these Pokémon are rare, when a large\noutbreak of them occurs, all fish Pokémon\ndisappear from the surrounding sea."
        fr:
          sun: "Ce Pokémon a en moyenne 80 tentacules\nvenimeux. Plus un spécimen vit longtemps,\nmoins il lui en reste."
          moon: "Il arrive qu’une foule de Tentacruel se regroupe\nen masse dans la mer. Lorsque cela arrive, tous\nles Pokémon poissons alentour disparaissent."
        it:
          sun: "Ha circa 80 tentacoli velenosi, il cui numero\nsi riduce quando vive molto a lungo."
          moon: "Accade di rado, ma una comparsa massiccia\ndi Tentacruel può far piazza pulita di tutti\ni Pokémon acquatici nel mare circostante."
        de:
          sun: "Es hat für gewöhnlich 80 giftige Tentakel.\nMit dem Alter verliert es diese jedoch nach\nund nach."
          moon: "In äußerst seltenen Fällen bilden sie einen\nSchwarm und rotten alle Fisch-Pokémon\nin der näheren Umgebung aus."
        es:
          sun: "Lo normal es que tenga 80 tentáculos\nvenenosos. Conforme se hace viejo, va\nperdiendo extremidades."
          moon: "En ocasiones, los Tentacruel se concentran en\ngrandes bancos. Si eso ocurre, los Pokémon pez\nde su alrededor desaparecen sin dejar rastro."
        ko:
          sun: "독 촉수는 보통 80개다.\n오래 산 포켓몬일수록\n그 개수는 줄어든다."
          moon: "드물게 대량 발생하면\n주변 바다에서 물고기포켓몬이\n모두 사라져 버리고 만다."
        zh_simp:
          sun: "有毒的触手通常是８０根。\n活得越久，触手的数量就越会减少。"
          moon: "很罕见地大量出现时，\n周围海域的鱼宝可梦\n会变得一只都不剩。"
        zh_trad:
          sun: "有毒的觸手通常有８０根。\n活得越久，觸手的數量就越少。"
          moon: "罕見地大量出現時，\n周圍海域的魚寶可夢\n會一隻不剩地全部消失。"
geodude:
  species_id: 74
  names:
    jp_kana: イシツブテ
    jp_kanji: イシツブテ
    en: Geodude
    fr: Racaillou
    it: Geodude
    de: Kleinstein
    es: Geodude
    ko: 꼬마돌
    zh_simp: 小拳石
    zh_trad: 小拳石
  forms:
    geodude:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 100
        special_attack: 30
        special_defense: 30
        speed: 20
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      abilities:
        - rock_head
        - sturdy
      hidden_ability: sand_veil
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          sun: "まるく　もちやすいが　なげあうには\nかたくて　おもい。　ゆきだまの　ように\nぶつけあって　あそぶには　キケンだ。"
          moon: "そこらのみちばたに　いくらでも　いる。\nヒマな　がくしゃが　かぞえてみたら\n１つのどうろに　１００ぴき　いた。"
        jp_kanji:
          sun: "丸く　持ちやすいが　投げあうには\n硬くて　重い。　雪玉の　ように\nぶつけあって　遊ぶには　キケンだ。"
          moon: "そこらの道端に　いくらでも　いる。\nヒマな　学者が　数えてみたら\n１つの道路に　１００匹　いた。"
        en:
          sun: "Its round body makes it easy to pick up,\nbut it is hard and heavy. It’s dangerous\nto play with them as if they were snowballs."
          moon: "There are plenty of them to be found along any\nroad. A scholar with too much free time once\ncounted a hundred of them along a single route."
        fr:
          sun: "Il est rond comme une balle, mais aussi très\ndur et lourd. Mieux vaut ne pas le lancer sur\nquelqu’un comme si c’était une boule de neige."
          moon: "On en trouve en masse sur le bas-côté des\nroutes. Un universitaire qui s’ennuyait en a\ndénombré une centaine sur la même route."
        it:
          sun: "La forma arrotondata lo rende facilmente\nafferrabile, ma è duro e pesante. Lanciarlo\ncome se fosse una palla di neve è pericoloso."
          moon: "Se ne trovano spesso in gran numero ai lati delle\nstrade. Uno studioso senza nulla di meglio da\nfare ne ha contati 100 in un certo percorso."
        de:
          sun: "Trotz seiner griffigen, runden Form ist Kleinstein\nhart und schwer. Bewirft man sich damit wie\nmit Schneebällen, besteht Verletzungsgefahr!"
          moon: "Man findet sie in rauen Mengen am Straßenrand.\nEin Forscher hat in seiner Freizeit auf einer\nStraße einmal 100 Exemplare gezählt."
        es:
          sun: "Aunque su forma invita a lanzarlo cual bola de\nnieve, su peso y dureza hacen de esta una\nactividad de riesgo nada recomendable."
          moon: "Se encuentran en masa en las cunetas de los\ncaminos. Un investigador con mucho tiempo libre\nllegó a contar una vez una centena de Geodude."
        ko:
          sun: "동글고 들기 쉽지만 서로 던지기에는\n딱딱하고 무겁다. 눈싸움처럼\n서로 맞히며 놀기에는 위험하다."
          moon: "길가에서 흔히 볼 수 있다.\n한가한 학자가 세어봤더니\n하나의 도로에 100마리가 있었다."
        zh_simp:
          sun: "圆圆的很容易拿，\n但要互相扔的话，又硬又重。\n像打雪仗那样扔着玩会很危险。"
          moon: "那儿的路边要多少有多少。\n有空的学者试着数了数，\n１条路上有１００只。"
        zh_trad:
          sun: "圓圓的很容易拿在手裡，\n但要拿來互相投擲的話就太硬太重了。\n像打雪仗般互相投擲的話是很危險的。"
          moon: "在路邊隨處可見。\n有空的學者試著數了一下，\n光是１條路上就有１００隻。"
    geodude_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 40
        attack: 80
        defense: 100
        special_attack: 30
        special_defense: 30
        speed: 20
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - electric
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: galvanize
      held_items:
        rare: cell_battery
      descriptions:
        jp_kana:
          sun: "じりょくを　おびた　いしの　からだ。\nとくに　じりょくが　つよい　ぶぶんには\nさてつが　ビッシリ　ついてるよ。"
          moon: "じめんで　ねている　イシツブテを\nふむと　バチンと　おとが　して\nビリッと　ぜんしんが　しびれる。"
        jp_kanji:
          sun: "磁力を　帯びた　石の身体。\n特に　磁力が　強い　部分には\n砂鉄が　ビッシリ　ついてるよ。"
          moon: "地面で　寝ている　イシツブテを\n踏むと　バチンと　音が　して\nビリッと　全身が　しびれる。"
        en:
          sun: "Its body is a magnetic stone. Iron sand attaches\nfirmly to the portions of its body that are\nparticularly magnetic."
          moon: "If you accidentally step on a Geodude sleeping\non the ground, you’ll hear a crunching sound and\nfeel a shock ripple through your entire body."
        fr:
          sun: "Son corps est fait de pierre magnétique.\nDe la poussière métallique recouvre les parties\noù le magnétisme est le plus fort."
          moon: "Quand on piétine par inadvertance un Racaillou\nendormi sur le chemin, un bruit sec retentit et\nun choc électrique vous parcourt le corps."
        it:
          sun: "Ha un corpo di pietra magnetizzato.\nNei punti in cui il magnetismo è più intenso\nsi formano grumi di polvere metallica."
          moon: "Chi calpesta accidentalmente un Geodude che\ndorme a terra udirà uno schiocco e sentirà una\nscarica elettrica corrergli lungo la schiena."
        de:
          sun: "Sein Steinkörper ist von Magnetkraft erfüllt.\nAn den Stellen, wo diese besonders stark wirkt,\nheften sich Schichten von Eisensand an."
          moon: "Wenn man auf ein am Boden schlafendes\nKleinstein tritt, hört man ein lautes Klappern\nund ein Stromschlag durchfährt den Körper."
        es:
          sun: "Su cuerpo de piedra está magnetizado. En los\npuntos donde el campo magnético se intensifica\nhay masas compactas de arena ferruginosa."
          moon: "Si alguien pisa por error a un Geodude que esté\ndurmiendo en el suelo, se oirá un chasquido y un\ncalambre le recorrerá todo el cuerpo."
        ko:
          sun: "자력을 띤 돌의 몸을 가졌다.\n특히 자력이 강한 부분에는\n사철이 빽빽이 붙어 있다."
          moon: "땅에서 자는 꼬마돌을\n밟으면 찌릿하는 소리가 난 뒤\n찌르르하고 전신이 마비된다."
        zh_simp:
          sun: "带有磁力的石头身体。\n在磁力特别强的部分，\n铁矿砂密密麻麻地附着哦。"
          moon: "如果踩到在地面睡觉的小拳石，\n就会发出叮——的响声，\n一下子全身都麻痹了。"
        zh_trad:
          sun: "石頭身體帶有磁力。\n在磁力特別強的部分\n附著密密麻麻的鐵砂哦。"
          moon: "如果踩到在地面睡覺的小拳石，\n就會發出叮──的響聲，\n全身會一下子變得麻痺。"
graveler:
