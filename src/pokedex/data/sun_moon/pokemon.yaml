gible:
  species_id: 443
  names:
    jp_kana: フカマル
    jp_kanji: フカマル
    en: Gible
    fr: Griknot
    it: Gible
    de: Kaumalat
    es: Gible
    ko: 딥상어동
    zh_simp: 圆陆鲨
    zh_trad: 圓陸鯊
  forms:
    gible:
      form_id: 0
      base_stats:
        hp: 58
        attack: 70
        defense: 45
        special_attack: 40
        special_defense: 45
        speed: 42
      evs_yield:
        hp: 0
        attack: 1
