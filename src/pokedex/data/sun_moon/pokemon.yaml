      descriptions:
        jp_kana:
          sun: "アリアドスの　いとを　つかって\nはたを　おる　ちいきも　ある。\nじょうぶな　ぬので　こうひょうだ。"
          moon: "しりからも　くちからも　いとをだす。\nいとで　えものを　からめとり\nゆっくりと　たいえきを　すする。"
        jp_kanji:
          sun: "アリアドスの　糸を　使って\n機を　織る　地域も　ある。\n丈夫な　布で　好評だ。"
          moon: "尻からも　口からも　糸をだす。\n糸で　獲物を　絡め取り\nゆっくりと　体液を　すする。"
        en:
          sun: "There are some areas where people use the\nstring Ariados spins for their own weaving.\nThe resulting cloth is popular for its strength."
          moon: "It spins thread from both its rear and its mouth.\nThen it wraps its prey up in thread and sips\ntheir bodily fluids at its leisure."
        fr:
          sun: "Dans certaines régions, on utilise le fil de\nMigalos pour tisser des étoffes. Leur grande\nsolidité les rend très populaires."
          moon: "Ce Pokémon peut créer du fil avec sa bouche\nou son abdomen. Il l’utilise pour ligoter sa proie,\npuis aspire lentement ses fluides vitaux."
        it:
          sun: "In alcune regioni il filo di Ariados viene usato per\ntessere al telaio, grazie alla sua straordinaria\nresistenza."
          moon: "Tesse un filo sia dalla bocca che dalla parte\nposteriore del corpo. Vi avvolge la preda\ne lentamente ne succhia i fluidi vitali."
        de:
          sun: "Man schätzt die Fäden von Ariados aufgrund\nihrer Stärke. Vielerorts werden sie zum Weben\nverwendet."
          moon: "Es kann mit dem Hinterleib und dem Mund Fäden\nspinnen. Mit diesen fesselt es seine Beute und\nentzieht ihr gemächlich alle Flüssigkeit."
        es:
          sun: "En ciertas regiones, se utiliza la telaraña de\nAriados para tejer. La tela tejida con este\nhilo tiene fama de ser muy resistente."
          moon: "Teje su telaraña con el abdomen o la boca.\nInmoviliza a sus presas con su hilo y se alimenta\nlentamente de sus fluidos corporales."
        ko:
          sun: "아리아도스의 실을 사용해\n직물을 짜는 지역도 있다.\n튼튼한 천으로 호평이다."
          moon: "엉덩이에서도 입에서도 실을 뿜는다.\n실로 먹이를 휘감아 잡고\n천천히 체액을 빨아들인다."
        zh_simp:
          sun: "也有地区会使用\n阿利多斯的丝来织布。\n因布料结实而广受好评。"
          moon: "屁股和嘴里都会吐出丝。\n用丝绑住猎物，\n慢慢地吸食它的体液。"
        zh_trad:
          sun: "也有地方會使用\n阿利多斯的絲來織布。\n結實的布料廣受好評。"
          moon: "屁股和嘴裡都會吐出絲。\n用絲綁住獵物，\n慢慢地吸食獵物的體液。"
