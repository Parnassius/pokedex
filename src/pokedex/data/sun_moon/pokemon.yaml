        - immunity
        - thick_fat
      hidden_ability: gluttony
      held_items:
        common: leftovers
        rare: leftovers
      descriptions:
        jp_kana:
          sun: "さいきょうの　いぶくろを　もつと\nいわれる。　ベトベトンの　どくでさえ\nカビゴンの　したには　スパイスなのだ。"
          moon: "まいにち　４００キロの　エサを　くう。\nくってるはじから　いねむりを　はじめ\nねむったままでも　くっている。"
        jp_kanji:
          sun: "最強の　胃袋を　持つと\nいわれる。　ベトベトンの　毒でさえ\nカビゴンの　舌には　スパイスなのだ。"
          moon: "毎日　４００キロの　餌を　喰う。\n喰ってるはじから　居眠りを　はじめ\n眠ったままでも　喰っている。"
        en:
          sun: "Its stomach is said to be incomparably strong.\nEven Muk’s poison is nothing more than a hint of\nspice on Snorlax’s tongue."
          moon: "It eats nearly 900 pounds of food every day.\nIt starts nodding off while eating—and continues\nto eat even while it’s asleep."
        fr:
          sun: "On dit que son estomac n’a pas d’égal.\nMême les toxines de Grotadmorv ne sont rien\nde plus qu’un assaisonnement épicé pour lui."
          moon: "Il mange 400 kg de nourriture par jour.\nIl arrive que sa sieste commence pendant qu’il\nmange, mais il continue à manger même endormi."
        it:
          sun: "Sembra che abbia uno stomaco fortissimo.\nIl fluido tossico di Muk per lui è solo un\ncondimento un po’ speziato."
          moon: "Ogni giorno mangia 400 kg di cibo.\nAppena inizia a mangiare, si addormenta, ma\ncontinua anche mentre dorme."
        de:
          sun: "Es heißt, sein Magen sei an Widerstandsfähigkeit\nnicht zu übertreffen. Für Relaxo ist selbst das\nGift eines Sleimok nicht mehr als ein Würzstoff."
          moon: "Es nimmt jeden Tag 400 kg an Nahrung zu sich.\nEs schläft beim Essen ein und frisst selbst im\nSchlaf noch weiter."
        es:
          sun: "Su estómago es exageradamente resistente.\nTanto que podría condimentar su comida con el\nveneno de Muk sin inmutarse."
          moon: "Engulle 400 kg de comida a diario. Si le entra\nsueño cuando está alimentándose, sigue\ncomiendo mientras echa una cabezada."
        ko:
          sun: "최강의 위를 가졌다고\n전해진다. 질뻐기의 독조차\n잠만보의 혀에는 향신료인 셈이다."
          moon: "매일 400kg의 먹이를 먹는다.\n먹기 시작할 때부터 졸기 시작하여\n자는 동안에도 먹고 있다."
        zh_simp:
          sun: "据说拥有最强的胃袋。\n就连臭臭泥的毒对卡比兽的\n舌头来说也只是调味料而已。"
          moon: "每天要吃下４００公斤的食物。\n开吃之后，就会开始打瞌睡，\n即使是睡着的状态也会继续吃。"
        zh_trad:
          sun: "據說擁有最強的胃袋。\n就連臭臭泥的毒對卡比獸的\n舌頭來說也只是調味料而已。"
          moon: "每天要吃下４００公斤的食物。\n一開始吃就會打瞌睡，\n即使是睡著的狀態也會繼續吃。"
