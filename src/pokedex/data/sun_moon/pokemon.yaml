        - solid_rock
        - sturdy
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sun: "じょうぶな　こうらを　つくるため\nえものの　かたいカラや　ホネも\nまるごと　かみくだいて　くっていた。"
          moon: "うみと　りくちの　りょうほうで\nかつどうする。　りくの　えものは\nうみに　ひきずりこんで　しとめる。"
        jp_kanji:
          sun: "丈夫な　甲羅を　つくるため\n獲物の　硬い殻や　骨も\n丸ごと　噛み砕いて　喰っていた。"
          moon: "海と　陸地の　両方で\n活動する。　陸の　獲物は\n海に　引きずり込んで　仕留める。"
        en:
          sun: "It constructed its sturdy shell by crunching and\nswallowing the hard shells or bones of its prey."
          moon: "Active both on land and in the sea, this\nPokémon drags its land-based prey into the\nwater to finish it off."
        fr:
          sun: "Pour se constituer une carapace solide, il devait\nréduire en miettes les os et coquilles riches en\nminéraux de ses proies avant de les avaler."
          moon: "Aussi à l’aise sur terre que dans l’eau,\nce Pokémon chasse ses proies à la surface\npuis les entraîne sous la mer pour les noyer."
        it:
          sun: "Per rafforzare il proprio carapace, mangiava le\nprede intere, frantumandone corazza e ossa."
          moon: "Questo Pokémon è a suo agio sia in mare che\nsulla terraferma. Cattura le prede a terra e\nle trascina in mare per finirle."
        de:
          sun: "Um seinen harten Panzer zu erlangen, fraß es\nseine Beute im Ganzen und zerkaute deren harte\nSchale und Knochen."
          moon: "Es ist sowohl im Meer als auch an Land\nunterwegs. Landlebende Beute schleift\nes ins Meer und erlegt sie dort."
        es:
          sun: "Trituraba los huesos y las duras conchas de\nsus presas para aprovechar bien los nutrientes\ny reforzar así su propio caparazón."
          moon: "Vive tanto en el mar como en la superficie.\nEn tierra firme, caza a sus presas y las arrastra\nhacia el mar, donde les da el golpe de gracia."
        ko:
          sun: "단단한 등껍질을 만들기 위해\n먹이의 딱딱한 껍데기나 뼈도\n통째로 깨물어 먹었다."
          moon: "바다와 육지 양쪽에서\n활동한다. 육지의 먹이는\n바다로 끌고 들어가 처리한다."
        zh_simp:
          sun: "为了形成结实的甲壳，\n会把猎物的硬壳和骨头\n都整个嚼碎了吃下去。"
          moon: "在大海和陆地两个地方活动。\n将陆地的猎物拖入海中后杀死。"
        zh_trad:
          sun: "為了形成結實的甲殼，\n會把獵物的硬殼和骨頭\n整個嚼碎後吃下去。"
          moon: "在大海和陸地兩個地方活動。\n會將陸地的獵物拖入海中後殺死。"
archen:
  species_id: 566
  names:
    jp_kana: アーケン
    jp_kanji: アーケン
    en: Archen
    fr: Arkéapti
    it: Archen
    de: Flapteryx
    es: Archen
    ko: 아켄
    zh_simp: 始祖小鸟
    zh_trad: 始祖小鳥
