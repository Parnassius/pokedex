        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - oblivious
      hidden_ability: sweet_veil
      held_items:
        rare: grassy_seed
      descriptions:
        jp_kana:
          sun: "おいしそうな　かおりが　からだから\nもれだしている。　においに　さそわれた\nドデカバシに　まるのみに　される。"
          moon: "ひとが　たべるには　あますぎるが\nアマカジの　あせを　みずと　わると\nほどよい　あまさの　ジュースになる。"
        jp_kanji:
          sun: "美味しそうな　香りが　体から\n漏れ出している。　匂いに　誘われた\nドデカバシに　丸呑みに　される。"
          moon: "人が　食べるには　甘すぎるが\nアマカジの汗を　水と　割ると\nほどよい　甘さの　ジュースになる。"
        en:
          sun: "A delectable aroma pours from its body.\nThey are often swallowed whole by Toucannon\nlured by that wafting deliciousness."
          moon: "Although it’s too sugary for human consumption,\nBounsweet’s sweat can be watered down into a\njuice with just the right amount of sweetness."
        fr:
          sun: "Une odeur terriblement appétissante émane\ndu corps des Croquine. Alléchés, les Bazoucan\nrappliquent et les gobent goulument."
          moon: "Trop sucrée pour être consommée telle quelle,\nla sueur de Croquine doit être diluée dans l’eau\npour obtenir un jus sucré juste comme il faut."
        it:
          sun: "Emana dal corpo un profumino delizioso, che\nper sua sfortuna spinge i Toucannon a\ninghiottirlo in un solo boccone."
          moon: "Il suo sudore è eccessivamente dolce, ma se\nviene diluito con la quantità giusta d’acqua\ndiventa una bevanda gradevolmente zuccherata."
        de:
          sun: "Sein Körper verströmt einen köstlichen Duft, der\nleider seinen Fressfeind Tukanon anlockt. Dem\nkommt ein aromatischer Snack höchst gelegen."
          moon: "Die meisten Menschen finden den Schweiß\nvon Frubberl zu süß. Verdünnt man ihn aber\nmit Wasser, erhält man einen köstlichen Saft."
        es:
          sun: "Atraídos por el apetitoso aroma que desprende\nsu cuerpo, los Toucannon los engullen con\navidez sin ni siquiera masticar."
          moon: "La gente lo nota demasiado dulce como para\ncomerlo, pero al diluir el sudor que exhala se\nobtiene un zumo con el toque justo de dulzura."
        ko:
          sun: "맛있는 냄새가 몸에서\n풍긴다. 냄새를 맡고 다가온\n왕큰부리에게 통째로 먹힌다."
          moon: "사람이 먹기에는 너무 달지만\n달콤아의 땀을 물에 희석하면\n적당히 달콤한 주스가 된다."
        zh_simp:
          sun: "闻起来很美味的香气从体内\n渗透出来。会被受气味诱惑的\n铳嘴大鸟整个吞下。"
          moon: "人要是直接吃的话，就太甜了。\n但是如果把甜竹竹的汗用水兑一下，\n就会成为甜度刚刚好的果汁。"
        zh_trad:
          sun: "聞起來很美味的香氣從體內\n滲透出來。會被受氣味誘惑的\n銃嘴大鳥整個吞下。"
          moon: "人若直接吃下的話就太甜了。\n但若把甜竹竹的汗利用水稀釋一下，\n便會成為甜度剛剛好的果汁。"
