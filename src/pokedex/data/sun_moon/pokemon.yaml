      descriptions:
        jp_kana:
          sun: "ほんらい　さむい　とちを　このむが\nアローラの　デリバードは　あるていどの\nあつさでも　たえられる　ようだ。"
          moon: "じぶんの　エサを　ひとや　ポケモンに\nわける　しゅうせいが　あるため\nいつも　エサを　さがしまわっている。"
        jp_kanji:
          sun: "本来　寒い　土地を　好むが\nアローラの　デリバードは　ある程度の\n暑さでも　耐えられる　ようだ。"
          moon: "自分の　餌を　人や　ポケモンに\n分け与える　習性が　あるため\nいつも　餌を　探しまわっている。"
        en:
          sun: "Although it naturally prefers colder locales,\nDelibird in Alola seem able to withstand the\nheat to a certain extent."
          moon: "It has a generous habit of sharing its food with\npeople and Pokémon, so it’s always scrounging\naround for more food."
        fr:
          sun: "Il s’agit à l’origine d’un Pokémon venant du froid,\nmais les Cadoizo se sont acclimatés à la chaleur\nd’Alola."
          moon: "Ce Pokémon partage facilement son repas avec\nd’autres Pokémon et humains, ce qui l’oblige\nconstamment à courir après la nourriture."
        it:
          sun: "I Delibird prediligono normalmente i climi freddi,\nma quelli di Alola sembrano trovarsi a loro agio\nanche con temperature piuttosto calde."
          moon: "È sempre alla ricerca di cibo, che ama\ncondividere con esseri umani e Pokémon."
        de:
          sun: "Sie bevorzugen eigentlich kühle Gegenden,\naber die Botogel Alolas können bis zu einem\ngewissen Grad auch heißes Klima ertragen."
          moon: "Es hat die Angewohnheit, seine eigene Nahrung\nmit Menschen und Pokémon zu teilen, und ist\ndeshalb stets unterwegs auf Futtersuche."
        es:
          sun: "Este Pokémon es originario de tierras frías,\npero los Delibird de Alola se han adaptado\nsin problemas al entorno cálido de la región."
          moon: "Tiene la costumbre de compartir su comida con\ntodo el mundo, ya sea humano o Pokémon, por lo\nque está constantemente en busca de alimento."
        ko:
          sun: "원래 추운 토지를 좋아하지만\n알로라의 딜리버드는 어느 정도의\n더위도 견딜 수 있는 것 같다."
          moon: "자신의 먹이를 사람이나 포켓몬에게\n나눠주는 습성이 있어\n언제나 먹이를 찾아다니고 있다."
        zh_simp:
          sun: "原本很喜欢寒冷的地方，\n但是阿罗拉的信使鸟好像\n即便是有点儿炎热也能忍耐。"
          moon: "因为有跟人类及宝可梦\n分享自己食物的习性，\n所以一直都在到处寻找食物。"
        zh_trad:
          sun: "原本很喜歡寒冷的地方，\n但是阿羅拉的信使鳥好像\n也能忍耐一定程度的炎熱。"
          moon: "因為有跟人類及寶可夢\n分享自己食物的習性，\n所以一直都在到處尋找食物。"
