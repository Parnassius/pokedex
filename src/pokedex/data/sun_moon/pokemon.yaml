        - beast_boost
      descriptions:
        jp_kana:
          sun: "やまを　くらい　けずり　ビルを\nのみこむ　すがたが　ほうこく　された。\nウルトラビーストの　いっしゅ。"
          moon: "きけんせいぶつ　ビーストの　いっしゅ。\nつねに　なにかを　くらっているようだが\nなぜか　フンは　みはっけん。"
        jp_kanji:
          sun: "山を　喰らい　削り　ビルを\n飲みこむ　姿が　報告　された。\nウルトラビーストの　一種。"
          moon: "危険生物　ビーストの　一種。\nつねに　なにかを　喰らっているようだが\nなぜか　フンは　未発見。"
        en:
          sun: "It has gobbled mountains and swallowed whole\nbuildings, according to reports. It’s one of the\nUltra Beasts."
          moon: "A dangerous Ultra Beast, it appears to be eating\nconstantly, but for some reason its droppings\nhave never been found."
        fr:
          sun: "Une espèce d’Ultra-Chimère.\nOn l’aurait aperçue dévorant des montagnes\net des gratte-ciel."
          moon: "L’une des dangereuses Ultra-Chimères.\nElle est constamment en train de manger,\nmais ne semble pas produire d’excréments."
        it:
          sun: "Stando alle testimonianze, è in grado di divorare\nintere montagne e di inghiottire edifici in un solo\nboccone. È una delle Ultracreature."
          moon: "È una delle pericolose Ultracreature.\nMangia continuamente, ma per qualche strano\nmotivo non produce escrementi."
        de:
          sun: "Eine Ultrabestie, die einigen Berichten zufolge\nganze Berge vertilgt und selbst mehrstöckige\nGebäude verschlingen kann."
          moon: "Eine gefährliche Ultrabestie, die ununterbrochen\nmit Fressen beschäftigt zu sein scheint.\nEs wurden jedoch nie Exkremente gefunden."
        es:
          sun: "Se dice que este Ultraente ha sido avistado\ndevorando montañas enteras y tragándose\nprominentes edificios."
          moon: "Un Ultraente extremadamente peligroso. Engulle\ntodo lo que encuentra, pero, por alguna razón,\nno se han encontrado excrementos suyos."
        ko:
          sun: "산을 깎아 먹고 빌딩을\n삼키는 모습이 보고되었다.\n울트라비스트 중 하나이다."
          moon: "위험생물 비스트의 일종.\n항상 무언가를 먹고 있는 듯하지만\n왜인지 배설물은 발견되지 않았다."
        zh_simp:
          sun: "有人报告过它啃噬山体，\n以及吞掉大楼的模样。\n是究极异兽的一种。"
          moon: "危险生物，究极异兽的一种。\n好像一直都在吃着什么，\n但不知为何从没发现过粪便。"
        zh_trad:
          sun: "報告指出有人見過牠\n削山吞樓的模樣。\n是究極異獸的一種。"
          moon: "危險生物，是究極異獸的一種。\n好像一直都在吃著什麼，\n但不知為何從未發現過糞便。"
