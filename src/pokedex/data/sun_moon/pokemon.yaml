      types:
        - rock
        - steel
      egg_groups:
        - monster
      abilities:
        - sturdy
      hidden_ability: soundproof
      descriptions:
        jp_kana:
          sun: "おおくの　かせきが　みつかっているが\nかおの　ぶぶんが　きずついていたり\nかけているものは　ほぼ　ない。"
          moon: "がんじょうな　かおの　おかげで\nてきは　すくなかったと　おもわれる。\nたいこの　ジャングルに　すんでいた。"
        jp_kanji:
          sun: "多くの　化石が　みつかっているが\n顔の　部分が　傷ついていたり\n欠けているものは　ほぼ　ない。"
          moon: "頑丈な　顔の　おかげで\n敵は　少なかったと　思われる。\n太古の　ジャングルに　棲んでいた。"
        en:
          sun: "Many fossils of this Pokémon have been found,\nbut almost none have shown signs of damage\nto the face."
          moon: "This Pokémon lived in primeval jungles. Few\nenemies would have been willing to square off\nagainst its heavily armored face, so it’s thought."
        fr:
          sun: "Dans les nombreux fossiles trouvés, presque\naucune plaque faciale ne porte de trace de\nblessure ou d’ébréchure."
          moon: "Grâce à sa tête très robuste, on suppose qu’il\nn’avait que très peu d’ennemis. Il vivait dans les\nforêts primaires, il y a fort longtemps."
        it:
          sun: "Tutti gli esemplari fossilizzati di questo\nPokémon sono perfettamente conservati nella\nzona del muso, priva di qualsiasi scalfittura."
          moon: "Viveva nelle giungle preistoriche. Si pensa\nche avesse pochi predatori per via del muso\nincredibilmente robusto."
        de:
          sun: "Es wurden viele Fossilien dieses Pokémon\ngefunden und nur bei sehr wenigen war\ndas Gesicht beschädigt oder fehlte ganz."
          moon: "Man nimmt an, dass es dank seines\ngepanzerten Gesichts kaum Feinde hatte.\nEs lebte vor Urzeiten im Dschungel."
        es:
          sun: "Se han encontrado innumerables fósiles de este\nPokémon y prácticamente ninguno presenta\ndaños en la parte facial."
          moon: "Debido a la extraordinaria dureza de su rostro,\nse piensa que tenía pocos enemigos. Vivía en las\njunglas prehistóricas."
        ko:
          sun: "많은 화석이 발견되었지만\n얼굴 부분에 상처가 있거나\n이가 빠져 있는 것은 거의 없다."
          moon: "튼튼한 얼굴 덕분에\n적은 적었을 것으로 여겨진다.\n태고의 정글에 살았다."
        zh_simp:
          sun: "大量的化石被发现，\n但是几乎没有\n脸的部分有损伤或缺失的情况。"
          moon: "看来多亏了那张结实的脸，\n敌人也少了。\n栖息在太古时代的丛林里。"
        zh_trad:
          sun: "大量的化石被發現，\n但幾乎所有化石\n臉的部位都沒有任何損傷或缺失。"
          moon: "多虧那張結實的臉，\n牠的敵人應該不多。\n棲息在太古時代的叢林裡。"
