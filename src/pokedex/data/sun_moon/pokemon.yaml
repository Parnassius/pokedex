          moon: "あたまの　えだを　ねらい　ヒドイデが\nおいかけてくると　じぶんで　えだを\nポキリと　おって　にげだすよ。"
        jp_kanji:
          sun: "サンゴの枝が　頭に　生える。\nかなり　簡単に　折れるけど\n３日くらいで　元に　戻るよ。"
          moon: "頭の　枝を　狙い　ヒドイデが\n追いかけてくると　自分で　枝を\nポキリと　折って　逃げだすよ。"
        en:
          sun: "Coral branches grow from its head.\nThey break off quite easily, but they\ngrow back in about three days."
          moon: "Pursued by Mareanie for the branches on its\nhead, this Pokémon will sometimes snap its own\nbranches off as a diversion while it escapes."
        fr:
          sun: "Des cornes de corail poussent sur la tête\nde ce Pokémon. Elles sont assez fragiles,\nmais repoussent en trois jours seulement."
          moon: "Lorsqu’il est poursuivi par des Vorastérie attirés\npar les cornes sur sa tête, il les détache de\nlui-même pour faire diversion et détaler."
        it:
          sun: "Sul suo capo crescono dei coralli molto fragili.\nSe un ramo si spezza e cade, viene rigenerato\nnell’arco di tre giorni."
          moon: "Quando è inseguito da un Mareanie attirato dai\ncoralli che ha sul capo, li stacca per distrarlo\ne fuggire più agevolmente."
        de:
          sun: "Auf seinem Kopf wachsen Korallenarme, die\nziemlich leicht abbrechen, allerdings innerhalb\nvon etwa drei Tagen wieder nachwachsen."
          moon: "Drohen die Arme auf seinem Kopf von einem\nGarstella verschlungen zu werden, wirft es\ndiese ab und sucht das Weite."
        es:
          sun: "De su cabeza brotan ramas de coral. Son muy\nfrágiles, pero pueden regenerarse en un lapso\nde tres días."
          moon: "Cuando Mareanie lo persigue para hacerse con\nsus ramas de coral, Corsola se desprende de\nellas adrede para poder huir sin problemas."
        ko:
          sun: "산호 가지가 머리에 자란다.\n꽤 간단히 부러지지만\n사흘 정도면 원래대로 돌아온다."
          moon: "머리의 가지를 노리고 시마사리가\n쫓아오면 자신의 가지를\n뚝 부러뜨리고 도망친다."
        zh_simp:
          sun: "头顶上长着珊瑚枝。\n虽然相当容易折断，\n但大约３天就能恢复哦。"
          moon: "好坏星追过来袭击它\n头顶枝条的时候，\n会果断地自己折断枝条逃生哦。"
        zh_trad:
          sun: "頭頂上長有珊瑚枝。\n雖然相當容易被折斷，\n但大約３天就能恢復原狀哦。"
          moon: "襲擊頭頂枝條的好壞星\n追過來的時候，\n會果斷地自己折斷枝條逃生哦。"
