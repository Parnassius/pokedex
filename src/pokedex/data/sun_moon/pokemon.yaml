      descriptions:
        jp_kana:
          sun: "パートナーである　トレーナーの\nぼうしを　かぶった　ちょっと\nめずらしい　ピカチュウの　すがた。"
          moon: "あいぼうの　トレーナーの　ぼうしを\nかぶった　ピカチュウ。　サイズが\nあっておらず　すこし　ブカブカだ。"
        jp_kanji:
          sun: "パートナーである　トレーナーの\n帽子を　かぶった　ちょっと\n珍しい　ピカチュウの　姿。"
          moon: "相棒の　トレーナーの　帽子を\n被った　ピカチュウ。　サイズが\nあっておらず　少し　ブカブカだ。"
        en:
          sun: "This form of Pikachu is somewhat rare. It wears\nthe hat of its Trainer, who is also its partner."
          moon: "This Pikachu is wearing its Trainer’s cap. Since\nthe cap’s not the right size, the fit is a bit loose."
        fr:
          sun: "Ce Pikachu hors du commun ne se sépare\npas de la casquette de son Dresseur,\nqu’il considère comme son partenaire."
          moon: "Un Pikachu portant la casquette de son\nDresseur, qu’il considère comme son partenaire.\nElle est trop grande pour lui et glisse un peu."
        it:
          sun: "Un Pikachu fuori dal comune, con indosso\nil cappello del suo inseparabile Allenatore."
          moon: "Un Pikachu che indossa il cappello del suo\namato Allenatore. La taglia però non è quella\ngiusta e gli sta un po’ largo."
        de:
          sun: "Dieses Pikachu trägt die Kappe des Trainers,\nmit dem es sich zusammengeschlossen hat.\nEin Anblick, den man nicht alle Tage sieht!"
          moon: "Dieses Pikachu trägt die Kappe des Trainers,\nmit dem es sich zusammengeschlossen hat.\nSie ist ihm allerdings ein bisschen zu groß."
        es:
          sun: "Un Pikachu poco común que lleva puesta la\ngorra de su Entrenador."
          moon: "Un Pikachu que lleva puesta la gorra de su\nEntrenador, aunque le queda un poco grande."
        ko:
          sun: "파트너인 트레이너의\n모자를 쓴 조금\n특이한 피카츄의 모습이다."
          moon: "파트너인 트레이너의 모자를\n쓴 피카츄. 사이즈가\n맞지 않아 조금 헐렁하다."
        zh_simp:
          sun: "戴着同伴训练家的帽子，\n有点珍稀的皮卡丘的样子。"
          moon: "戴着搭档训练家帽子的皮卡丘。\n尺寸不太合适，有点空空荡荡的。"
        zh_trad:
          sun: "戴著同伴訓練家的帽子，\n樣子有點珍稀的皮卡丘。"
          moon: "戴著拍檔訓練家帽子的皮卡丘。\n因為尺寸不太合適，\n戴起來有點鬆垮垮的。"
