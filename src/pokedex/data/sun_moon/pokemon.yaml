      hidden_ability: scrappy
      descriptions:
        jp_kana:
          sun: "かしこく　おんこうで　ゆうかん。\nレスキューたいの　たいいんたちの\nたよれる　あいぼう　だぞ。"
          moon: "かしこく　ひとに　おそいかかる\nしんぱいが　ないので　こどもの\nおもりを　まかせる　おやも　いる。"
        jp_kanji:
          sun: "賢く　温厚で　勇敢。\nレスキュー隊の　隊員たちの\n頼れる　相棒　だぞ。"
          moon: "賢く　人に　襲い掛かる\n心配が　ないので　子どもの\nお守りを　任せる　親も　いる。"
        en:
          sun: "Intelligent, good-natured, and valiant,\nit’s a trustworthy partner on rescue teams."
          moon: "With this wise Pokémon, there could be no\nconcern that it would ever attack people. Some\nparents even trust it to babysit."
        fr:
          sun: "Sagesse, gentillesse et bravoure sont les mots\nqui qualifient le mieux ce Pokémon, devenu\nl’inséparable partenaire des équipes de secours."
          moon: "Modèle de sagesse, il ne s’en prend jamais aux\nhumains sans raison, et assume volontiers le\nrôle de nounou pour les parents occupés."
        it:
          sun: "Intelligente, calmo e coraggioso, è il compagno\nideale degli addetti alle missioni di soccorso."
          moon: "La sua intelligenza e docilità verso gli esseri\numani fanno sì che molti genitori si affidino\na lui per la cura dei figli."
        de:
          sun: "Es ist ein kluges, sanftmütiges und tapferes\nPokémon. Für Mitglieder von Rettungstruppen\nstellt es einen zuverlässigen Partner dar."
          moon: "Da es klug ist und keine Gefahr besteht, dass\nes Menschen angreift, geben Eltern ihre Kinder\nin seine Obhut."
        es:
          sun: "A su inteligencia y carácter afable se suma su\nvalentía. Presta una ayuda inestimable a los\nequipos de rescate."
          moon: "Debido a su inteligencia y a lo manso que se\nmuestra al tratar con personas, algunos padres\nconfían en él incluso para proteger a sus hijos."
        ko:
          sun: "똑똑하고 온후하며 용감하다.\n구조대 대원들의\n믿음직한 동료이다."
          moon: "영리해서 사람을 공격할\n걱정이 없어 아이를\n돌보게 하는 부모도 있다."
        zh_simp:
          sun: "聪明温厚而勇敢。\n是救援队队员们可以信赖的伙伴。"
          moon: "很聪明，且不用担心会朝人\n猛扑过来，所以也有家长会\n把保护孩子的任务交给它。"
        zh_trad:
          sun: "聰明溫厚而勇敢。\n是深受救援隊隊員們\n信賴的好夥伴。"
          moon: "很聰明，不用擔心牠會\n襲擊人，所以也有家長會\n把保護孩子的任務交給牠。"
