        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - insomnia
        - forewarn
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          sun: "ひじょうに　きけんな　ポケモンだが\nあんみんを　もとめる　ひとびとには\nきゅうせいしゅと　よばれている。"
          moon: "であったものを　とりあえず　ねむらせ\nそのユメを　あじみ。　いいユメを\nみていたら　そのまま　つれさる。"
        jp_kanji:
          sun: "非常に　危険な　ポケモンだが\n安眠を　求める　人々には\n救世主と　呼ばれている。"
          moon: "出会った者を　取りあえず　眠らせ\nその夢を　味見。　いい夢を\n見ていたら　そのまま　連れ去る。"
        en:
          sun: "While it is an extremely dangerous Pokémon,\npeople who are in need of a good, sound sleep\ncall it their savior."
          moon: "As a matter of course, it makes anyone it meets\nfall asleep and has a taste of their dreams.\nAnyone having a good dream, it carries off."
        fr:
          sun: "Bien que ce soit un Pokémon extrêmement\ndangereux, les personnes victimes d’insomnie\nle considèrent comme un sauveur."
          moon: "Quand il rencontre quelqu’un, il l’endort et goûte\nses rêves. S’ils ont bon goût, il emporte la\npersonne avec lui."
        it:
          sun: "È un Pokémon molto pericoloso, ma coloro che\nsoffrono di insonnia lo considerano il loro\nsalvatore."
          moon: "Fa addormentare chi incontra, assaggia i suoi\nsogni e, se sono di suo gradimento, se lo porta\nvia con sé."
        de:
          sun: "Dieses Pokémon ist äußerst gefährlich.\nFür Menschen, die an Schlaflosigkeit leiden,\nist es aber ein wahrer Retter in der Not."
          moon: "Es versetzt jeden, dem es begegnet, sofort in\nSchlaf und kostet seine Träume. Schmeckt ihm\nein Traum, nimmt es die Person mit."
        es:
          sun: "Es un Pokémon muy peligroso, pero la gente\nque padece de insomnio lo considera su\nsalvación."
          moon: "Cuando se encuentra a una persona, la duerme\ny posteriormente cata sus sueños. Si estos son\nde su agrado, la retiene consigo."
        ko:
          sun: "상당히 위험한 포켓몬이지만\n편안한 잠을 원하는 사람들에게는\n구세주로 불리고 있다."
          moon: "마주친 자를 일단 잠들게 해\n그 꿈을 맛본다. 좋은 꿈을\n꾸고 있다면 그대로 데리고 간다."
        zh_simp:
          sun: "是非常危险的宝可梦，\n但祈求良好睡眠的人们\n称其为救世主。"
          moon: "不管不顾地让遇到的都睡着，\n品尝对方的梦。如果遇到了好梦，\n就会这么强行带走。"
        zh_trad:
          sun: "非常危險的寶可夢，\n卻被祈求一夜好眠的人們\n稱為救世主。"
          moon: "不論遇到誰都先讓對方睡著，\n品嘗對方的夢。如果遇到了好夢，\n就會強行帶走。"
