      descriptions:
        jp_kana:
          sun: "つきよに　あつまり　だいがっしょう。\nそのなきごえは　どなりごえのようで\nうつくしくはないが　あじが　あるぞ。"
          moon: "ニョロモや　ニョロゾの　リーダー。\nニョロトノが　いっかつ　すると\nみな　おびえて　そのばに　ふせる。"
        jp_kanji:
          sun: "月夜に　集まり　大合唱。\nその鳴き声は　怒鳴り声のようで\n美しくはないが　味が　あるぞ。"
          moon: "ニョロモや　ニョロゾの　リーダー。\nニョロトノが　一喝　すると\n皆　怯えて　その場に　伏せる。"
        en:
          sun: "They gather on moonlit nights to form a large\nchorus. Their cries sound angry and not at all\npleasant, but they are certainly distinctive."
          moon: "It’s the leader of Poliwag and Poliwhirl.\nWhen Politoed roars, they all cower in fear."
        fr:
          sun: "Ils se regroupent sous la lune pour chanter.\nLeur musique est très bruyante et s’apparente à\nune dispute, mais certains esthètes l’apprécient."
          moon: "Les Ptitard et Têtarte lui obéissent. Il n’a qu’à\ndonner de la voix pour les faire trembler comme\ndes feuilles."
        it:
          sun: "Nelle notti di luna si radunano in grandi gruppi\ne cantano in coro. Il loro verso gracchiante\nnon è proprio bello, ma ha un certo fascino."
          moon: "È il re dei Poliwag e dei Poliwhirl. Il suo verso\ntonante fa fuggire atterriti gli avversari."
        de:
          sun: "In klaren Mondnächten versammeln sie sich und\nsingen im Chor. Ihr Gesang ist zwar nicht schön\nund klingt eher wie Geschrei, aber er hat Stil."
          moon: "Es ist der Anführer von Quapsel und Quaputzi.\nFängt Quaxo an seinen Unmut zu äußern,\nnehmen alle vor lauter Angst sofort Reißaus."
        es:
          sun: "Se reúnen bajo la luz de la luna para cantar a\ncoro. No es la más bonita de las melodías, pues\nparecen estar enfadados, pero tiene su encanto."
          moon: "Lidera a Poliwag y a Poliwhirl. Cuando Politoed\nemite un bramido, todos se esconden en el acto\nasustados."
        ko:
          sun: "달밤에 모여 대합창을 한다.\n그 울음소리는 고함치는 것 같아\n아름답지는 않지만 멋이 있다."
          moon: "발챙이와 슈륙챙이의 리더.\n왕구리가 크게 꾸짖으면\n모두 겁을 먹고 그 자리에 엎드린다."
        zh_simp:
          sun: "在有月亮的夜晚聚集起来大合唱。\n那鸣叫声如怒吼般，并不美妙，\n但却别有韵味。"
          moon: "蚊香蝌蚪和蚊香君的头领。\n蚊香蛙皇一声吼，\n大家都吓得伏在地上一动不动。"
        zh_trad:
          sun: "在月圓之夜聚集起來大合唱。\n那歌聲像是怒吼一般，\n雖然並不美妙，但卻別有韻味。"
          moon: "蚊香蝌蚪和蚊香君的領袖。\n蚊香蛙皇一聲吼，\n大家都嚇得伏在地上一動不動。"
