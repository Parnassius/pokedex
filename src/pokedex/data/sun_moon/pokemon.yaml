komala:
  species_id: 775
  names:
    jp_kana: ネッコアラ
    jp_kanji: ネッコアラ
    en: Komala
    fr: Dodoala
    it: Komala
    de: Koalelu
    es: Komala
    ko: 자말라
    zh_simp: 树枕尾熊
    zh_trad: 樹枕尾熊
  forms:
    komala:
      form_id: 0
      base_stats:
        hp: 65
        attack: 115
        defense: 65
        special_attack: 75
        special_defense: 95
        speed: 65
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - comatose
      descriptions:
        jp_kana:
          sun: "ねたまま　うまれ　ねたまま　しぬ。\nすべての　こうどうは　みている\nゆめに　よる　ねぞう　らしい。"
          moon: "だいた　きは　うまれたとき　おやから\nあたえられたもの。　よく　なつけば\nトレーナーの　うでにも　しがみつく。"
        jp_kanji:
          sun: "寝たまま　生まれ　寝たまま　死ぬ。\nすべての　行動は　みている\n夢に　よる　寝相　らしい。"
          moon: "抱いた　木は　生まれたとき　親から\n与えられたもの。　よく　なつけば\nトレーナーの　腕にも　しがみつく。"
        en:
          sun: "It is born asleep, and it dies asleep. All its\nmovements are apparently no more than the\nresults of it tossing and turning in its dreams."
          moon: "The log it holds was given to it by its parents at\nbirth. It has also been known to cling to the arm\nof a friendly Trainer."
        fr:
          sun: "Il rejoint et quitte ce monde en dormant. Son\nexistence se déroule comme un rêve paisible.\nIl dort du sommeil du juste toute sa vie durant."
          moon: "La bûche qu’il tient est un cadeau de naissance\nde ses parents. S’il est bien apprivoisé,\nil s’accrochera au bras de son Dresseur."
        it:
          sun: "Trascorre la sua intera esistenza dormendo.\nPare che le sue azioni siano determinate\nda quello che sta sognando."
          moon: "Il tronco che ha con sé è un dono dei genitori\nricevuto alla nascita. Quando è molto affezionato\nal proprio Allenatore, si aggrappa al suo braccio."
        de:
          sun: "Es wird schlafend geboren und stirbt schlafend.\nSein ganzes Leben ist ein Traum, seine einzige\nkörperliche Aktivität das Umdrehen im Schlaf."
          moon: "Den Baumstumpf bekam es zu seiner Geburt\nvon seinen Eltern. Fasst es Zutrauen, klammert\nes sich aber auch am Arm seines Trainers fest."
        es:
          sun: "Pasa la vida entera sumido en un profundo\nsueño. Toda su actividad parece reflejar los\nsueños que tiene en ese momento."
          moon: "El tronco que agarra es un regalo que le dieron\nsus padres al nacer. También se aferra al brazo\nde todo aquel Entrenador con el que congenie."
        ko:
          sun: "잔 채 태어나고 잔 채 죽는다.\n모든 행동은 꾸고 있는\n꿈에 의한 잠버릇인 것 같다."
          moon: "안고 있는 나무는 태어났을 때 부모로부터\n받은 것이다. 잘 길들이면\n트레이너의 팔에도 달라붙는다."
        zh_simp:
          sun: "睡着生，睡着死。\n似乎所有的行动都是根据\n所看见的梦而引发的睡相。"
          moon: "抱住的树干是出生时父母所给予的。\n关系亲密的话，也会紧紧抱着\n训练家的胳膊。"
        zh_trad:
          sun: "睡著生，睡著死。\n似乎所有的行動都是根據\n所看見的夢而引發的睡相。"
          moon: "抱住的樹是出生時父母所贈的。\n關係親密的話，也會緊緊抱著\n訓練家的胳膊。"
turtonator:
  species_id: 776
  names:
    jp_kana: バクガメス
    jp_kanji: バクガメス
    en: Turtonator
    fr: Boumata
    it: Turtonator
    de: Tortunator
    es: Turtonator
    ko: 폭거북스
    zh_simp: 爆焰龟兽
    zh_trad: 爆焰龜獸
  forms:
    turtonator:
      form_id: 0
      base_stats:
        hp: 60
        attack: 78
        defense: 135
        special_attack: 91
        special_defense: 85
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - shell_armor
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          sun: "せなかの　こうらは　ばくはつぶつ。\nうっかり　なぐれば　だいばくはつ。\nおなかの　あなが　じゃくてん。"
          moon: "はなの　あなから　ほのおや　どくガスを\nふく。　フンは　ばくはつぶつで\nいろんな　つかいみちが　ある。"
        jp_kanji:
          sun: "背中の　甲羅は　爆発物。\nうっかり　殴れば　大爆発。\nお腹の　穴が　弱点。"
          moon: "鼻の　孔から　炎や　毒ガスを\n吹く。　フンは　爆発物で\n色んな　使い道が　ある。"
        en:
          sun: "The shell on its back is chemically unstable\nand explodes violently if struck. The hole in its\nstomach is its weak point."
          moon: "It gushes fire and poisonous gases from its\nnostrils. Its dung is an explosive substance and\ncan be put to various uses."
        fr:
          sun: "Sa carapace est très instable. Si on la heurte\npar mégarde, elle explose. Le creux sur\nson ventre est son point faible."
          moon: "Il peut cracher des flammes et du gaz toxique\npar les naseaux. Ses excréments sont des\nexplosifs qui peuvent servir à plein de choses."
        it:
          sun: "Il carapace sulla schiena è esplosivo e, se\nlo si urta per errore, scoppia. Il suo punto\ndebole è il buco sulla pancia."
          moon: "Espelle dalle narici fiamme e gas velenosi.\nI suoi escrementi sono esplosivi e per questo\ntrovano molte applicazioni."
        de:
          sun: "Sein Rückenpanzer ist explosiv, man sollte ihm\nalso niemals auf den Rücken klopfen. Das Loch\nin seinem Bauch ist seine Schwachstelle."
          moon: "Es greift mit Feuer und Giftgas aus den\nNasenlöchern an. Sein Kot ist explosiv\nund vielseitig einsetzbar."
        es:
          sun: "Posee un caparazón que estalla al contacto.\nEl orificio que se aprecia en su vientre es su\npunto débil."
          moon: "Despide llamas y gas venenoso por sus fosas\nnasales. Sus excrementos tienen un sinfín de\naplicaciones por sus propiedades explosivas."
        ko:
          sun: "등의 등껍질은 폭발물이다.\n실수로 때리면 대폭발한다.\n배의 구멍이 약점이다."
          moon: "콧구멍으로 불꽃과 독가스를\n뿜는다. 배설물은 폭발물이며\n다양한 용도가 있다."
        zh_simp:
          sun: "背上的甲壳是爆炸物。\n不小心打到的话会发生大爆炸。\n肚子上的小洞是弱点。"
          moon: "从鼻孔里喷出火焰和毒瓦斯。\n粪便是爆炸物，有各式各样的用途。"
        zh_trad:
          sun: "背上的甲殼是爆裂物，\n不小心打到的話會發生大爆炸。\n肚子上的小洞是弱點。"
          moon: "從鼻孔裡噴出火焰和毒瓦斯。\n糞便是爆裂物，具有各式各樣的用途。"
