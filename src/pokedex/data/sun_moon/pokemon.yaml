cranidos:
  species_id: 408
  names:
    jp_kana: ズガイドス
    jp_kanji: ズガイドス
    en: Cranidos
    fr: Kranidos
    it: Cranidos
    de: Koknodon
    es: Cranidos
    ko: 두개도스
    zh_simp: 头盖龙
    zh_trad: 頭蓋龍
  forms:
    cranidos:
      form_id: 0
      base_stats:
        hp: 67
        attack: 125
        defense: 40
        special_attack: 30
        special_defense: 30
        speed: 58
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          sun: "１おくねんほど　まえの　みつりんで\nくらしていた。　とくいの　ずつきで\nプテラに　たいこう　していた。"
          moon: "ズガイドスの　かせきが　みつかる\nちそうでは　へしおれた　じゅもくの\nかせきも　いっしょに　でてくるぞ。"
        jp_kanji:
          sun: "１億年ほど　前の　密林で\n暮らしていた。　得意の　頭突きで\nプテラに　対抗　していた。"
          moon: "ズガイドスの　化石が　見つかる\n地層では　へし折れた　樹木の\n化石も　一緒に　出てくるぞ。"
        en:
          sun: "It lived in jungles around a hundred million years\nago. It used its skillful headbutts to\ncombat Aerodactyl."
          moon: "In rock layers where Cranidos fossils are found,\nthe fossilized trunks of trees snapped in two\nare also often found."
        fr:
          sun: "Il peuplait les jungles il y a 100 millions\nd’années et se débarrassait de son grand rival,\nPtéra, en lui donnant des coups de tête."
          moon: "Auprès des fossiles de Kranidos, il n’est pas\nrare de trouver des arbres pétrifiés\ncomplètement broyés."
        it:
          sun: "Viveva nella giungla circa 100 milioni di anni fa.\nSi difendeva con potenti testate dal suo nemico\nnaturale Aerodactyl."
          moon: "Nelle zone ricche di fossili di Cranidos si\ntrovano spesso anche numerosi fossili di\nalberi spezzati."
        de:
          sun: "Vor Urzeiten lebte es im Dschungel.\nMit seinem Kopfstoß setzt es sich\ngegen Aerodactyl zur Wehr."
          moon: "In den Erdschichten, in denen Fossilien von\nKoknodon entdeckt werden, finden sich\nauch Überreste abgebrochener Bäume."
        es:
          sun: "Vivía en la jungla hace 100 millones de años.\nGracias a su destreza propinando cabezazos\npodía hacerle frente a Aerodactyl."
          moon: "En los estratos geológicos donde se encuentran\nfósiles de Cranidos también aparecen muchos\nfósiles de árboles destrozados."
        ko:
          sun: "1억 년 정도 전의 밀림에서\n살았었다. 특기인 박치기로\n프테라에게 저항했었다."
          moon: "두개도스의 화석이 발견되는\n지층에는 부러진 나무의\n화석도 같이 발굴된다."
        zh_simp:
          sun: "生活在大约１亿年前的密林中。\n用最拿手的头锤对抗化石翼龙。"
          moon: "在发现头盖龙化石的\n地层里也一并出土了\n被锤断了的树木的化石。"
        zh_trad:
          sun: "曾經生活在大約１億年前的密林中。\n用最拿手的頭錘對抗化石翼龍。"
          moon: "在發現頭蓋龍化石的\n地層裡也能發現\n折斷了的樹木的化石。"
rampardos:
  species_id: 409
  names:
    jp_kana: ラムパルド
    jp_kanji: ラムパルド
    en: Rampardos
    fr: Charkos
    it: Rampardos
    de: Rameidon
    es: Rampardos
    ko: 램펄드
    zh_simp: 战槌龙
    zh_trad: 戰槌龍
  forms:
    rampardos:
      form_id: 0
      base_stats:
        hp: 97
        attack: 165
        defense: 60
        special_attack: 65
        special_defense: 50
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          sun: "ずつきを　くりかえし　ずがいこつは\nかたく　あつくなったが　のうみそは\nズガイドスより　ちぢんでいる。"
          moon: "ふくげんされ　しんかした　ラムパルドが\nにげだして　ずつきで　こうそうビルを\nはかいしたという　きろくが　ある。"
        jp_kanji:
          sun: "頭突きを　繰り返し　頭がい骨は\n硬く　厚くなったが　脳味噌は\nズガイドスより　縮んでいる。"
          moon: "復元され　進化した　ラムパルドが\n逃げだして　頭突きで　高層ビルを\n破壊したという　記録が　ある。"
        en:
          sun: "The result of repeated headbutts is a skull\ngrown thick and hard. However, its brain has\nshrunk in size compared with Cranidos’s."
          moon: "Records exist of a revived fossil that evolved\ninto Rampardos. It proceeded to escape and\nthen destroy a skyscraper with a headbutt."
        fr:
          sun: "À force d’enchaîner les coups de tête, sa calotte\ncrânienne s’est épaissie. Son cerveau a donc dû\nrétrécir et il est plus petit que celui du Kranidos."
          moon: "Des rapports font état d’un Charkos qui, après\nreconstitution et évolution, aurait pris la fuite en\ndémolissant un gratte-ciel d’un coup de tête."
        it:
          sun: "A furia di testate, il suo cranio è diventato\nspesso e robusto, ma il cervello si è\nrimpicciolito rispetto a quello di Cranidos."
          moon: "Un Rampardos, evolutosi da un Cranidos\nrigenerato da un fossile, fuggì da un laboratorio\ne abbatté un enorme palazzo a testate."
        de:
          sun: "Durch häufige Kopfstöße ist sein Schädel\nhart und dick geworden. Seine Hirnmasse litt\ndarunter und ist kleiner als bei Koknodon."
          moon: "Es ist die Weiterentwicklung eines fossilen\nPokémon. Einmal entkam ein Rameidon und\nzerstörte per Kopfstoß ein ganzes Hochhaus."
        es:
          sun: "Debido a los continuos cabezazos que propina,\nsu cráneo se ha vuelto más duro y grueso. Sin\nembargo, tiene menos sesos que Cranidos."
          moon: "Corren historias de un Cranidos regenerado a\npartir de un fósil que, tras evolucionar, escapó\ny derribó un rascacielos de un cabezazo."
        ko:
          sun: "박치기를 반복해서 두개골은\n단단하고 두꺼워졌지만\n뇌는 두개도스보다 작아졌다."
          moon: "복원되어 진화한 램펄드가 도망쳐\n박치기로 고층 빌딩을\n파괴했다는 기록이 있다."
        zh_simp:
          sun: "反复使出头锤的头盖骨变得又硬又厚。\n但脑子比起头盖龙有所缩减。"
          moon: "曾经有过复原进化后的\n战槌龙逃之夭夭，\n用头锤破坏高层建筑的记录。"
        zh_trad:
          sun: "反復使出頭錘的頭蓋骨變得又硬又厚。\n但腦容量比起頭蓋龍有所縮減。"
          moon: "曾經有過復原進化後的\n戰槌龍逃之夭夭，\n用頭錘破壞高層建築的記錄。"
shieldon:
  species_id: 410
  names:
    jp_kana: タテトプス
