  names:
    jp_kana: ノズパス
    jp_kanji: ノズパス
    en: Nosepass
    fr: Tarinor
    it: Nosepass
    de: Nasgnet
    es: Nosepass
    ko: 코코파스
    zh_simp: 朝北鼻
    zh_trad: 朝北鼻
  forms:
    nosepass:
      form_id: 0
      base_stats:
        hp: 30
        attack: 45
        defense: 135
        special_attack: 45
        special_defense: 90
        speed: 30
      evs_yield:
        hp: 0
