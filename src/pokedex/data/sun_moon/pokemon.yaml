      descriptions:
        jp_kana:
          sun: "おそわれないため　じゅもくの　マネを\nするが　きらいな　みずを　かけられて\nあわてて　にげだしていく。"
          moon: "おとしよりを　ちゅうしんに　にんき。\nみどりの　ぶぶんが　おおきいほど\nマニアの　ひょうかは　あがるらしい。"
        jp_kanji:
          sun: "襲われないため　樹木の　真似を\nするが　嫌いな　水を　かけられて\nあわてて　逃げだしていく。"
          moon: "お年寄りを　中心に　人気。\n緑の　部分が　大きいほど\nマニアの　評価は　あがるらしい。"
        en:
          sun: "To avoid attack, it mimics a tree. It will run off\nif splashed with water, which it hates."
          moon: "Apparently, the larger the green parts of this\nPokémon, the more collectors value it. It’s a\nparticular favorite among elderly people."
        fr:
          sun: "Il imite un arbre pour passer inaperçu, mais il\ndéteste tellement l’eau qu’il prend ses jambes\nà son cou s’il se fait arroser."
          moon: "Très populaire, notamment chez les personnes\nâgées. Plus la partie verte est grande, plus\nses fans se l’arrachent."
        it:
          sun: "Si camuffa da albero per evitare gli attacchi\nnemici, ma odia l’acqua e se viene annaffiato\nscappa via."
          moon: "È popolare soprattutto tra gli anziani.\nGli appassionati apprezzano in particolare\nquelli con la parte verde più sviluppata."
        de:
          sun: "Es tarnt sich als Baum, um Angriffen aus dem\nWeg zu gehen. Es hasst jedoch Wasser und\nergreift die Flucht, wenn man es nass macht."
          moon: "Es ist vor allem bei alten Leuten beliebt.\nJe größer sein Grünanteil, desto mehr wird\nes in Fankreisen geschätzt."
        es:
          sun: "Se disfraza de árbol para no ser atacado. Huirá\nrápidamente si alguien le echa agua por encima,\npues no la soporta."
          moon: "Es bastante popular entre la gente de mayor\nedad. La pasión que le profesan los fanáticos\nes proporcional al tamaño de su parte verde."
        ko:
          sun: "공격을 당하지 않기 위해 나무인 척\n하지만 싫어하는 물을 뒤집어쓰면\n당황해서 도망가버린다."
          moon: "노인을 중심으로 인기다.\n초록색 부분이 클수록\n마니아의 평가가 높아지는 듯하다."
        zh_simp:
          sun: "为了不被袭击而模仿成树木的样子，\n但如果被讨厌的水泼到，\n就会慌慌张张地逃走。"
          moon: "在老年人当中很受欢迎。\n听说绿色的部分越大，\n爱好者们的评价就越高。"
        zh_trad:
          sun: "為了不被襲擊而模仿成樹木的樣子，\n但如果被討厭的水潑到，\n就會慌慌張張地逃走。"
          moon: "很受以老年人為中心的人們歡迎。\n聽說綠色的部分越大，\n愛好者們的評價就越高。"
