      descriptions:
        jp_kana:
          sun: "うずまきは　すけてみえる　ないぞう。\nそのいろが　しろみがかっているときは\nなにかの　びょうきに　かかっている。"
          moon: "まだまだ　あるくのが　ヘタ。\nトレーナーに　なったら　まいにち\nあるく　くんれんを　してあげよう。"
        jp_kanji:
          sun: "渦巻きは　透けて見える　内臓。\nその色が　白みがかっているときは\nなにかの　病気に　かかっている。"
          moon: "まだまだ　歩くのが　下手。\nトレーナーに　なったら　毎日\n歩く　訓練を　してあげよう。"
        en:
          sun: "The swirl on its belly is its internal organs\nshowing through. If the swirl is tinged white,\nthat means it’s affected by some disease."
          moon: "It’s still not very good at walking. Its Trainers\nshould train this Pokémon to walk every day."
        fr:
          sun: "La spirale est son intestin que l’on distingue\npar transparence. Lorsqu’elle blanchit, c’est\nsigne qu’il a attrapé une maladie."
          moon: "Il ne sait pas encore bien marcher. Un Dresseur\nde Ptitard doit l’entraîner à marcher tous\nles jours."
        it:
          sun: "La spirale sulla pancia sono i suoi organi interni,\nvisibili sotto la pelle sottile. Se diventa bianca,\nè segno che è malato."
          moon: "Non è ancora in grado di camminare bene.\nÈ importante che l’Allenatore lo inciti a\nesercitarsi ogni giorno."
        de:
          sun: "Durch seine Haut hindurch kann man sein\nspiralförmiges Inneres sehen. Färbt sich dieses\nweiß, deutet das darauf hin, dass es krank ist."
          moon: "Es kann noch nicht gut laufen. Sein Trainer\nsollte daher jeden Tag Laufübungen mit ihm\ndurchführen."
        es:
          sun: "La espiral de su vientre no es otra cosa que sus\nvísceras. Cuando estas se tornan de color\nblanco, significa que Poliwag está enfermo."
          moon: "No se le da nada bien andar, por lo que se\nrecomienda a los Entrenadores que le hagan\npracticar un poco cada día."
        ko:
          sun: "소용돌이는 비쳐서 보이는 내장이다.\n그 색이 희뿌열 때는\n뭔가 병에 걸린 것이다."
          moon: "아직 걷는 것이 서투르다.\n트레이너가 되면 매일\n걷는 훈련을 시켜주자."
        zh_simp:
          sun: "漩涡是透明可见的内脏。\n当颜色带有白色时，\n说明是生什么病了。"
          moon: "走路还是很不利索。\n成为它的训练家后，\n要每天都给它做走路训练。"
        zh_trad:
          sun: "漩渦是透明可見的內臟。\n當顏色帶有白色時，\n代表是有什麼地方生病了。"
          moon: "走路還是很不純熟。\n成為牠的訓練家後，\n要每天給牠做走路訓練哦。"
poliwhirl:
  species_id: 61
  names:
    jp_kana: ニョロゾ
    jp_kanji: ニョロゾ
    en: Poliwhirl
    fr: Têtarte
