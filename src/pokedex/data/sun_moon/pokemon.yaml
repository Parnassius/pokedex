      descriptions:
        jp_kana:
          sun: "１２ほんのあしで　かいていを　はう。\nドヒドイデの　はったあとには\nサニーゴのカスが　ちらばっている。"
          moon: "ドヒドイデの　どくに　やられると\n３か３ばん　げきつうに　くるしみ\nたすかっても　こういしょうが　のこる。"
        jp_kanji:
          sun: "１２本の足で　海底を　はう。\nドヒドイデの　はったあとには\nサニーゴのカスが　散らばっている。"
          moon: "ドヒドイデの　毒に　やられると\n３日３晩　激痛に　苦しみ\n助かっても　後遺症が　残る。"
        en:
          sun: "Toxapex crawls along the ocean floor on its\n12 legs. It leaves a trail of Corsola bits\nscattered in its wake."
          moon: "Those attacked by Toxapex’s poison will suffer\nintense pain for three days and three nights.\nPost-recovery, there will be some aftereffects."
        fr:
          sun: "Il arpente le fond des océans du haut de ses\ndouze pattes, en laissant derrière lui une traînée\nde miettes de Corayon."
          moon: "Son poison provoque chez sa victime des\ndouleurs aiguës pendant trois jours et trois\nnuits, et laisse des séquelles irréversibles."
        it:
          sun: "Striscia sui fondali marini con i suoi dodici\ntentacoli, lasciando dietro di sé una scia\ndi resti di Corsola."
          moon: "Il suo veleno provoca nella vittima tre giorni\ne tre notti di dolori lancinanti, e lascia dei danni\npermanenti."
        de:
          sun: "Kriecht mit seinen zwölf Beinen über den\nMeeresboden. Es hinterlässt oft etliche\nÜberreste von Corasonn."
          moon: "Wer das Gift von Aggrostella abbekommt,\ndurchleidet drei schlimme Tage und Nächte.\nÜberlebende tragen bleibende Schäden davon."
        es:
          sun: "Se arrastra por el lecho marino con sus doce\nextremidades. Deja siempre una estela de\nrestos de Corsola por donde pasa."
          moon: "Los afectados por su veneno sufren dolores\nintensos durante tres días y tres noches.\nAunque sobrevivan, las secuelas permanecerán."
        ko:
          sun: "12개의 다리로 해저를 기어 다닌다.\n더시마사리가 기어 다닌 자리에는\n코산호의 찌꺼기가 흩어져있다."
          moon: "더시마사리의 독에 당하면\n3일 밤낮으로 심한 고통에 시달리며\n살아나더라도 후유증이 남는다."
        zh_simp:
          sun: "用１２只脚在海底爬行。\n在超坏星爬过的地方\n会散落太阳珊瑚的碎屑。"
          moon: "如果被超坏星的毒伤到，\n会遭受３天３夜的剧烈疼痛，\n即使得到救助，也会留下后遗症。"
        zh_trad:
          sun: "利用１２隻腳在海底爬行。\n在超壞星爬過的地方\n會散落太陽珊瑚的碎屑。"
          moon: "如果被超壞星的毒傷到，\n會連續３天３夜遭受劇烈的疼痛，\n即使得到救助也會留下後遺症。"
mudbray:
