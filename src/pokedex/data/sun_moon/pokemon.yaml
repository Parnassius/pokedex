      hidden_ability: pressure
      descriptions:
        jp_kana:
          sun: "むれで　えものを　おう　しゅうせい。\nおおきな　くちで　ヨワシの　むれごと\nいっきに　のみこんでしまうぞ。"
          moon: "とにかく　どでかいので　にんき。\nホエルオーウォッチングは　かくちで\nにんきの　かんこうプラン　なのだ。"
        jp_kanji:
          sun: "群れで　獲物を　追う　習性。\n大きな　口で　ヨワシの　群れごと\n一気に　呑み込んでしまうぞ。"
          moon: "とにかく　どでかいので　人気。\nホエルオーウォッチングは　各地で\n人気の　観光プラン　なのだ。"
        en:
          sun: "Wailord pursue their prey in pods. With their\nlarge mouths, they can swallow entire schools\nof Wishiwashi whole."
          moon: "Its immense size is the reason for its popularity.\nWailord watching is a favorite sightseeing\nactivity in various parts of the world."
        fr:
          sun: "Il a pour habitude de chasser en groupe.\nSa large gueule lui permet d’engloutir un banc\nde Froussardine d’un seul coup."
          moon: "Sa taille fait de lui un Pokémon fascinant.\nLes sites touristiques proposant d’observer\nles Wailord ont toujours beaucoup de succès."
        it:
          sun: "Ha l’abitudine di cacciare le prede in branco.\nCon la sua enorme bocca può inghiottire\nin un colpo solo un banco di Wishiwashi."
          moon: "È molto amato per la sua enorme stazza.\nIl Wailord watching è un’attività turistica\npopolare in tutto il mondo."
        de:
          sun: "Wailord jagt seine Beute in der Gruppe. Mit\nseinem enormen Maul kann es ganze Schwärme\nvon Lusardin auf einmal verschlingen."
          moon: "Es ist allein schon aufgrund seiner schieren\nGröße sehr beliebt. Wailord-Watching gilt\nvielerorts als beliebte Touristenattraktion."
        es:
          sun: "Tienen el hábito de cazar en grupo. Con sus\ntremendas bocas pueden engullir de un trago\nbancos enteros de Wishiwashi."
          moon: "Su descomunal tamaño lo convierte en un\nPokémon muy popular. Los enclaves turísticos\ndonde se observan Wailord son todo un éxito."
        ko:
          sun: "무리 지어 먹이를 쫓는 습성이 있다.\n큰 입으로 약어리의 무리를\n통째로 삼켜버린다."
          moon: "어찌 됐든 거대해서 인기가 있다.\n고래왕 워칭은 각지에서\n인기 있는 관광 코스다."
        zh_simp:
          sun: "有成群结队追逐猎物的习性。\n用大大的嘴巴将弱丁鱼群\n一口气尽数吞下。"
          moon: "总之，因为超级巨大而受欢迎。\n观看吼鲸王在各地都是\n非常受欢迎的游览项目。"
        zh_trad:
          sun: "有成群結隊追逐獵物的習性。\n會用大大的嘴巴將整群的弱丁魚\n一口氣吞下。"
          moon: "因為無比巨大而受歡迎。\n觀看吼鯨王的生態在各地都是\n非常受歡迎的遊覽項目。"
