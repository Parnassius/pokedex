      descriptions:
        jp_kana:
          sun: "ハネを　つかい　たいおんちょうせつ。\nたたかいで　あつくなりすぎて\nきんぞくの　からだが　とけないため。"
          moon: "ひとたび　てきと　にんしきすると\nこうてつの　こうどを　もつ　ハサミで\nようしゃなく　たたきつぶす。"
        jp_kanji:
          sun: "ハネを　使い　体温調節。\n戦いで　熱くなり過ぎて\n金属の　身体が　溶けないため。"
          moon: "ひとたび　敵と　認識すると\n鋼鉄の　硬度を　持つ　ハサミで\n容赦なく　叩き潰す。"
        en:
          sun: "It uses its wings to adjust its body temperature.\nOtherwise, its metal body would become\ntoo hot and melt in the heat of battle."
          moon: "Once it has identified an enemy, this Pokémon\nsmashes it mercilessly with pincers hard\nas steel."
        fr:
          sun: "Il utilise ses ailes pour réguler sa température\ncorporelle, ce qui empêche sa carcasse d’acier\nde fondre en cas d’ardent combat."
          moon: "Avec ses puissantes pinces d’acier, ce Pokémon\nimplacable s’acharne sur tout ce qu’il considère\ncomme un ennemi jusqu’à le briser."
        it:
          sun: "Quando lotta, sbatte continuamente le ali per\nregolare la temperatura corporea ed evitare che\nil suo corpo metallico si surriscaldi e fonda."
          moon: "Si scaglia implacabile sul nemico, attaccandolo\ncon le sue chele dure come l’acciaio."
        de:
          sun: "Es schlägt mit den Flügeln, um seine Körper-\ntemperatur zu regulieren. So überhitzt und\nschmilzt sein stählerner Körper im Kampf nicht."
          moon: "Sobald es einen Gegner bemerkt, schlägt es ihn\nmit seinen stahlharten Scheren erbarmungslos\nnieder."
        es:
          sun: "Este Pokémon bate las alas para regular su\ntemperatura corporal y evitar que su cuerpo\nmetálico se derrita en el fragor de la batalla."
          moon: "Arremete contra sus enemigos con sus\npoderosas pinzas, tan duras como el acero, sin\nningún tipo de compasión."
        ko:
          sun: "날개를 사용해 체온조절을 한다.\n싸움으로 너무 뜨거워져서\n금속 몸이 녹지 않게 하기 위함이다."
          moon: "한 번 적이라고 인식하면\n강철의 경도를 지닌 집게로\n봐주지 않고 때려눕힌다."
        zh_simp:
          sun: "为了防止战斗时变得过热，\n而令金属的身体熔化，\n会使用翅膀调节体温。"
          moon: "一旦认出敌人，\n就会用具有钢铁硬度的钳子\n毫不留情地将对方击溃。"
        zh_trad:
          sun: "為了防止戰鬥時變得過熱，\n而令金屬的身體熔化，\n會使用翅膀調節體溫。"
          moon: "一旦認定對方是敵人，\n就會用具有鋼鐵硬度的鉗子\n毫不留情地將對方擊倒。"
    scizor_mega:
      form_id: 1
      names:
        jp_kana: メガハッサム
        jp_kanji: メガハッサム
        en: Mega Scizor
