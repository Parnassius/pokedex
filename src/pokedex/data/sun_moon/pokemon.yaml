      descriptions:
        jp_kana:
          sun: "かげのなかに　ひそむことが　でき\nひとまえに　すがたを　みせないので\nそのそんざいは　まぼろし　だった。"
          moon: "あいての　かげに　もぐりこみ\nその　うごきや　ちからを　コピーする。\nおくびょうで　よわきな　ポケモン。"
        jp_kanji:
          sun: "影の中に　潜むことが　でき\n人前に　姿を　みせないので\nその存在は　幻　だった。"
          moon: "相手の　影に　潜り込み\nその　動きや　力を　コピーする。\nおくびょうで　弱気な　ポケモン。"
        en:
          sun: "Able to conceal itself in shadows, it never\nappears before humans, so its very existence\nwas the stuff of myth."
          moon: "It lurks in the shadows of others, copying their\nmovements and powers. This Pokémon is craven\nand cowering."
        fr:
          sun: "Il dissimule son apparence aux autres en se\ntapissant dans l’ombre. Son existence pourrait\nse révéler n’être qu’une fable."
          moon: "En se glissant dans l’ombre de son adversaire,\nil peut copier ses mouvements et ses forces.\nC’est un Pokémon au caractère timide et craintif."
        it:
          sun: "Si nasconde nelle ombre per sfuggire alla vista\ndegli esseri viventi, e per questo si è dubitato\nper molto tempo della sua esistenza."
          moon: "Si infiltra nell’ombra del nemico, copiandone\ni movimenti e la forza. È un Pokémon timido\ne insicuro."
        de:
          sun: "Da es sich im Schatten verbergen und so für\nmenschliche Augen unsichtbar werden kann,\nwar seine Existenz lange bezweifelt worden."
          moon: "Es verschmilzt mit dem Schatten seiner Gegner\nund kopiert deren Bewegungen und Kräfte.\nEs ist ein feiges und schwaches Pokémon."
        es:
          sun: "Debido a que siempre se ha ocultado en las\nsombras y no le gusta dejarse ver, su misma\nexistencia es todo un misterio."
          moon: "Se infiltra en la sombra de su oponente y copia\nsus movimientos y su fuerza. Es un Pokémon\ntímido y un poco cobardica."
        ko:
          sun: "그림자 안에 숨어 들을 수 있어\n사람들 앞에 모습을 보이지 않아\n그 존재는 환상이었다."
          moon: "상대의 그림자에 숨어들어\n그 움직임과 힘을 복사한다.\n겁이 많고 나약한 포켓몬이다."
        zh_simp:
          sun: "可以潜入影子中，\n因为不会在人的面前展露身姿，\n所以其存在曾是个幻想。"
          moon: "潜入对手的影子，\n复制其动作和力量。\n是胆小软弱的宝可梦。"
        zh_trad:
          sun: "可以潛入影子中，\n因為從不在人前現身，\n所以其存在曾被視為幻想。"
          moon: "會潛入對手的影子，\n複製其動作和力量。\n是種性格膽小而孱弱的寶可夢。"
