        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          sun: "ゆきに　ふられる　ポワルンの　すがた。\nぜんしんが　こおりの　ようで\nたいおんは　マイナス５ど　ぜんご。"
          moon: "あられに　ふられる　ポワルンの\nすがた。　ひふは　つめたく\nこおりの　ように　ツルツルだ。"
        jp_kanji:
          sun: "雪に　降られる　ポワルンの　姿。\n全身が　氷の　ようで\n体温は　マイナス５度　前後。"
          moon: "あられに　降られる　ポワルンの\n姿。　皮膚は　冷たく\n氷の　ように　ツルツルだ。"
        en:
          sun: "This is the form Castform takes when covered\nin snow. Its body becomes an ice-like material,\nwith a temperature near 23 degrees Fahrenheit."
          moon: "This is Castform’s form when caught in a\nhailstorm. Its cold skin is as smooth as ice."
        fr:
          sun: "Morphéo prend cette apparence les jours de\nneige. Son corps est alors froid comme de la\nglace, à environ -5 °C."
          moon: "Morphéo prend cette apparence quand il est\nfrappé par la grêle. Sa peau est froide et lisse\ncomme de la glace."
        it:
          sun: "È la forma di Castform quando cade la neve.\nIl suo corpo diventa simile al ghiaccio e la sua\ntemperatura corporea scende a -5 °C."
          moon: "È la forma di Castform quando grandina.\nLa sua pelle si raffredda e diventa liscia\ncome il ghiaccio."
        de:
          sun: "Diese Gestalt nimmt Formeo an, wenn es hagelt\noder schneit. Sein Körper ist wie Eis und hat\neine Temperatur von etwa -5 °C."
          moon: "Diese Gestalt nimmt Formeo bei Hagel oder\nSchneefall an. Seine Haut ist kalt und glatt\nwie Eis."
        es:
          sun: "Castform adopta esta forma cuando nieva.\nSu cuerpo se vuelve frío como un témpano, con\nuna temperatura que alcanza los -5 °C."
          moon: "Castform adopta esta forma cuando graniza.\nSu piel se vuelve tan fría y resbaladiza como\nel hielo."
        ko:
          sun: "눈을 맞는 캐스퐁의 모습이다.\n온몸이 얼음 같으며\n체온은 마이너스 5도 전후다."
          moon: "싸라기눈을 맞은 캐스퐁의\n모습. 피부는 차갑고\n얼음처럼 반들반들하다."
        zh_simp:
          sun: "被雪落到时飘浮泡泡的样子。\n全身像冰一般，\n体温是零下５度左右。"
          moon: "被冰雹砸到的\n飘浮泡泡的样子。\n皮肤冷冷的，像冰一样滑溜溜。"
        zh_trad:
          sun: "飄浮泡泡被雪碰到時的樣子。\n全身像冰一般，\n體溫是零下５度左右。"
          moon: "被冰雹落到身上的\n飄浮泡泡的樣子。\n皮膚冷冷的，像冰面一樣光滑。"
