          sun: "とにかく　はなが　まがるほど　くさい。\nだが　いちぶには　それがいいと　いう\nベトベトンマニアも　そんざいする。"
          moon: "かんきょうが　せいびされた　さいきんは\nめっきり　すがたを　みなくなった。\nいずれ　ぜつめつすると　いわれている。"
        jp_kanji:
          sun: "とにかく　鼻が　曲がるほど　臭い。\nだが　一部には　それがいいと　いう\nベトベトンマニアも　存在する。"
          moon: "環境が　整備された　最近は\nめっきり　姿を　みなくなった。\nいずれ　絶滅すると　いわれている。"
        en:
          sun: "The stench it gives off will make your nose\nscrunch up. Still, there are Muk fans who think\nthat’s a good thing."
          moon: "After recent environmental improvements, this\nPokémon is now hardly seen at all. People\nspeculate that it may go extinct at some point."
        fr:
          sun: "La puanteur qu’il dégage est presque\ninsoutenable. Mais certains aficionados trouvent\nque c’est ce qui fait son charme."
          moon: "La qualité de l’environnement s’étant améliorée\nrécemment, ce Pokémon est devenu plus rare.\nOn dit qu’il est en voie d’extinction."
        it:
          sun: "Emana un fetore insopportabile, ma i fanatici\ndi questo Pokémon lo considerano un pregio."
          moon: "Ultimamente, l’accresciuta sensibilità ambientale\nha portato a una diminuzione degli esemplari\ndi questo Pokémon, che rischia l’estinzione."
        de:
          sun: "Es sondert einen widerlichen Gestank ab.\nIn Fankreisen wird jedoch ausgerechnet\ndiese Eigenschaft besonders geschätzt."
          moon: "Es wird immer seltener gesehen, da zunehmend\nmehr Wert auf Umweltschutz gelegt wird. Man\nvermutet, dass es irgendwann ganz ausstirbt."
        es:
          sun: "Desprende un hedor insoportable que invita a\ntaparse la nariz. A algunos fanáticos de este\nPokémon, este hecho les parece encantador."
          moon: "Con la reciente preocupación por el medio\nambiente, este Pokémon escasea cada vez más.\nPodría considerarse en peligro de extinción."
        ko:
          sun: "코를 찌를 정도로 지독한 냄새가 난다.\n하지만 오히려 그 냄새가 좋다는\n질뻐기 마니아도 일부 존재한다."
          moon: "환경이 정비된 최근에는\n좀처럼 모습을 볼 수 없게 되었다.\n언젠가는 멸종될 것이라고 전해진다."
        zh_simp:
          sun: "总之就是臭得鼻子都不敢呼吸。\n但是也存在着部分觉得这味道\n很不错的臭臭泥爱好者。"
          moon: "在环境治理后的现在，\n明显已经看不到它们的身影了。\n据说早晚会灭绝。"
        zh_trad:
          sun: "總之就是臭得讓人不敢用鼻子呼吸。\n但是也存在著少數覺得這味道\n很不錯的臭臭泥愛好者。"
          moon: "經過環境整治後，\n最近已經很難看到牠的身影了。\n據說早晚會滅絕。"
    muk_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 105
        attack: 105
        defense: 75
        special_attack: 65
        special_defense: 100
        speed: 50
      evs_yield:
        hp: 1
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - dark
      egg_groups:
        - amorphous
      abilities:
        - poison_touch
        - gluttony
      hidden_ability: power_of_alchemy
      held_items:
        common: black_sludge
      descriptions:
        jp_kana:
          sun: "やたら　あざやかな　からだの　いろは\nくらった　ゴミが　たいないで　つねに\nかがくへんかを　おこしているから。"
          moon: "いがいに　おとなしく　なつくが\nエサの　ゴミを　ずっと　あげていないと\nいえの　かぐを　こわして　くらいだす。"
        jp_kanji:
          sun: "やたら　鮮やかな　身体の　色は\n喰らった　ゴミが　体内で　常に\n化学変化を　起こしているから。"
          moon: "意外に　大人しく　なつくが\n餌の　ゴミを　ずっと　あげていないと\n家の　家具を　壊して　喰らいだす。"
        en:
          sun: "The garbage it eats causes continuous chemical\nchanges in its body, which produce its\nexceedingly vivid coloration."
          moon: "While it’s unexpectedly quiet and friendly, if it’s\nnot fed any trash for a while, it will smash its\nTrainer’s furnishings and eat up the fragments."
        fr:
          sun: "Ses vives couleurs sont dues aux réactions\nchimiques produites continuellement par\nles ordures qu’il a ingérées."
          moon: "Il est étonnamment affectueux et calme. Mais il\nfaut continuellement le nourrir avec des ordures,\nsinon il brisera les meubles pour les manger."
        it:
          sun: "La sua colorazione sgargiante è dovuta alle\nreazioni chimiche prodotte all’interno del suo\ncorpo in base ai rifiuti che mangia."
          moon: "È sorprendentemente calmo e affettuoso, ma se\nsi vuole evitare che inizi a mangiarsi i mobili,\noccorre sfamarlo costantemente con dei rifiuti."
        de:
          sun: "Der Müll, den Sleimok verzehrt, löst im Inneren\nseines Körpers chemische Reaktionen aus.\nDiese sorgen für seine lebhafte Färbung."
          moon: "Es kann sich unerwartet zahm verhalten, aber\nwenn man ihm lange keinen Müll zu fressen gibt,\nzerstört und verschlingt es die Möbel im Haus."
        es:
          sun: "Los colores vivísimos que presenta su cuerpo se\ndeben a las constantes reacciones químicas que\nproduce en su interior la ingesta de basura."
          moon: "A pesar de su apariencia, tiene un carácter\nbastante dócil, pero si no se le da basura para\ncomer, la emprende con los muebles de la casa."
        ko:
          sun: "터무니없이 선명한 몸의 색은\n먹어치운 쓰레기가 체내에서 계속\n화학변화를 일으키기 때문이다."
          moon: "의외로 얌전히 따르지만\n먹이인 쓰레기를 꾸준히 주지 않으면\n집안 가구를 부수고 먹어버린다."
        zh_simp:
          sun: "身体的颜色极度鲜艳，\n这是因为吃下的垃圾\n经常在体内引起化学反应。"
          moon: "意外地沉稳友好，\n但如果一直不给它垃圾吃，\n就会开始破坏家具当食物吃。"
        zh_trad:
          sun: "極度鮮豔的身體顏色\n是因為吃下的垃圾不斷\n在體內引起化學反應。"
          moon: "意外地沉穩且友善，\n但若一直不給牠垃圾吃，\n牠就會破壞傢具，把傢具當食物吃掉。"
