      descriptions:
        jp_kana:
          sun: "まいにち　じぶんの　たいじゅうと\nおなじ　りょうの　エサが　ひつよう。\nあじに　ついては　きに　しない。"
          moon: "くえそうな　ものを　みつけたら\nとりあえず　ひろって　まるのみ。\nだから　ひにひに　ふとっていく。"
        jp_kanji:
          sun: "毎日　自分の　体重と\n同じ　量の　餌が　必要。\n味に　ついては　気に　しない。"
          moon: "喰えそうな　ものを　見つけたら\nとりあえず　拾って　丸呑み。\nだから　日に日に　肥っていく。"
        en:
          sun: "It needs to consume its own weight in food\nevery day. As far as flavor is concerned,\nit’s indifferent."
          moon: "When it finds something that looks like it might\nbe edible, it goes right ahead and swallows it\nwhole. That’s why it gets fatter day by day."
        fr:
          sun: "Il mange chaque jour l’équivalent de son propre\npoids. Il consomme sa nourriture en quantité,\nmais il se moque bien du goût qu’elle a."
          moon: "Dès qu’il voit un mets alléchant, il le ramasse\naussitôt et l’avale tout de go. C’est pour cela\nqu’il grossit à vue d’œil, ce petit glouton."
        it:
          sun: "Deve divorare ogni giorno una quantità di cibo\npari al suo peso corporeo. Mangia qualunque\ncosa, senza badare troppo al sapore."
          moon: "Appena trova qualcosa di commestibile, lo\ninghiotte senza masticarlo. Per questo il suo\npeso aumenta a vista d’occhio."
        de:
          sun: "Es braucht eine tägliche Nahrungsmenge,\ndie seinem Körpergewicht entspricht.\nDer Geschmack ist ihm dabei egal."
          moon: "Findet es essbar aussehende Dinge, liest es\ndiese auf und verschlingt sie mit einem Happs.\nDeswegen steigt sein Gewicht von Tag zu Tag."
        es:
          sun: "Necesita ingerir cada día el equivalente a su\npeso corporal en comida. Le importa poco el\nsabor que pueda tener."
          moon: "En cuanto encuentra algo comestible, lo recoge\ny lo engulle de un bocado, por lo que cada día\nestá más y más gordo."
        ko:
          sun: "매일 자신의 체중과\n같은 양의 먹이가 필요하다.\n맛에 대해서는 신경 쓰지 않는다."
          moon: "먹을 수 있을 것 같은 것을 발견하면\n일단 주워서 통째로 삼킨다.\n그래서 나날이 살이 찌고 있다."
        zh_simp:
          sun: "每天必须要吃和自重\n同等分量的食物。\n味道的好坏并不在意。"
          moon: "一旦找到看起来能吃的东西，\n就不管三七二十一先捡起来吞了。\n所以就这么一天天地变胖起来。"
        zh_trad:
          sun: "每天必須要吃和自身體重\n同等份量的食物。\n並不在意味道的好壞。"
          moon: "一旦找到看起來能吃的東西，\n就不管三七二十一先撿起來吞了。\n所以就這麼一天天地變胖起來。"
