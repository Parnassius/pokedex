          sun: "ウルトラホールから　あらわれた。\nこうそくで　そらを　とぶ　すがたが\nもくげき　された　ウルトラビースト。"
          moon: "ＵＢの　いっしゅ。　２ほんの　うでから\nガスを　ふきだし　もりを　やきはらう\nすがたが　かくにん　されている。"
        jp_kanji:
          sun: "ウルトラホールから　現れた。\n高速で　空を　飛ぶ　姿が\n目撃　された　ウルトラビースト。"
          moon: "ＵＢの　一種。　２本の　腕から\nガスを　噴きだし　森を　焼き払う\n姿が　確認　されている。"
        en:
          sun: "It appeared from the Ultra Wormhole. Witnesses\nobserved it flying across the sky at high speed."
          moon: "One kind of Ultra Beast. Witnesses have seen it\nburn down a forest by expelling gas from its\ntwo arms."
        fr:
          sun: "Une Ultra-Chimère qui a traversé l’Ultra-Brèche.\nOn l’aurait aperçue parcourir le ciel à grande\nvitesse."
          moon: "Une espèce d’Ultra-Chimère. On l’aurait\naperçue expulsant du gaz par ses deux bras\net réduisant une forêt tout entière en cendres."
        it:
          sun: "Questa Ultracreatura è arrivata attraverso\nun Ultravarco ed è stata avvistata mentre\nsolcava il cielo ad altissima velocità."
          moon: "È una delle Ultracreature. È stata vista\nincenerire un’intera foresta emettendo gas\ndalle sue due braccia."
        de:
          sun: "Eine Ultrabestie, die mit extremer\nGeschwindigkeit durch die Lüfte rast.\nSie ist durch die Ultrapforte gekommen."
          moon: "Diese Ultrabestie wurde dabei gesichtet, wie sie\nmithilfe des Gases, das aus ihren beiden Armen\nströmt, große Waldflächen niederbrannte."
        es:
          sun: "Este Ultraente surgió de un Ultraumbral. Parece\nhaber sido avistado surcando los cielos a\nvelocidades vertiginosas."
          moon: "Varios testigos afirman haber visto como este\nUltraente carbonizaba un bosque entero con el\ngas expelido por sus extremidades."
        ko:
          sun: "울트라홀에서 나타났다.\n고속으로 하늘을 나는 모습이\n목격된 울트라비스트다."
          moon: "UB의 일종. 2개의 팔에서\n가스를 뿜어내어 숲을 불태워버리는\n모습이 확인되었다."
        zh_simp:
          sun: "从究极之洞出现的究极异兽。\n被人目击到以高速在\n空中飞行的样子。"
          moon: "究极异兽的一种。\n从２条手臂喷出气体烧毁\n森林的样子已被确认无疑。"
        zh_trad:
          sun: "從究極之洞裡出現。\n被人目擊以高速在\n空中飛行的究極異獸。"
          moon: "ＵＢ的一種。\n有人看見牠從２條手臂\n噴出氣體燒毀森林的樣子。"
