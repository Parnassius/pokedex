        - swift_swim
      hidden_ability: hydration
      held_items:
        common: heart_scale
      descriptions:
        jp_kana:
          sun: "１ぴきだけに　なった　ラブカスは\nげんきが　なくなり　スキだらけ。\nそこを　ペリッパーに　さらわれる。"
          moon: "カップルに　にんきが　たかいので\nハネムーンきゃくが　とまる　ホテルの\nプールに　ほうりゅう　される。"
        jp_kanji:
          sun: "１匹だけに　なった　ラブカスは\n元気が　なくなり　スキだらけ。\nそこを　ペリッパーに　さらわれる。"
          moon: "カップルに　人気が　高いので\nハネムーン客が　泊まる　ホテルの\nプールに　放流　される。"
        en:
          sun: "If a Luvdisc is left on its own, it becomes\ndespondent, leaving itself open to attack.\nThat is when Pelipper snatch them up."
          moon: "Loving couples have a soft spot for this\nPokémon, so honeymoon hotels often release\nthis Pokémon into their pools."
        fr:
          sun: "Un Lovdisc esseulé perd tout entrain et baisse\nsa garde. Le Bekipan n’attend que cela pour\nfrapper."
          moon: "Comme il est très populaire auprès des\namoureux, les hôtels fréquentés par les couples\nen lune de miel en ont souvent dans leur piscine."
        it:
          sun: "Se rimane solo, Luvdisc perde vitalità\ne abbassa la guardia, diventando una facile\npreda per Pelipper."
          moon: "È molto popolare tra gli innamorati, perciò viene\nmesso nelle piscine degli hotel frequentati\ndalle coppiette in luna di miele."
        de:
          sun: "Einsame Liebiskus verlieren den Lebensmut und\nvernachlässigen die Deckung. Diese Schwäche\nnutzen Pelipper, um sie sich zu schnappen."
          moon: "Da Liebiskus besonders bei Pärchen beliebt\nsind, findet man sie oft in Swimmingpools von\nHotels für Frischvermählte."
        es:
          sun: "Cuando un Luvdisc se halla solo, su energía\ndisminuye y baja la guardia, momento que\naprovechan los Pelipper para hacerse con ellos."
          moon: "Es popular entre las parejas de enamorados,\npor lo que se suelen soltar en las piscinas de\nlos hoteles donde se celebran lunas de miel."
        ko:
          sun: "혼자가 된 사랑동이는\n기력이 없어지고 빈틈이 많다.\n그럴 때 패리퍼가 잡아간다."
          moon: "커플에게 인기가 높아서\n신혼 여행객이 묵는 호텔의\n수영장에 방류된다."
        zh_simp:
          sun: "变成只有独自１只的爱心鱼\n无精打采地，尽是空虚。\n就在那时被大嘴鸥叼走了。"
          moon: "在情侣中人气很高，\n因此被放养在蜜月客人\n住宿的酒店泳池里。"
        zh_trad:
          sun: "變成只有獨自１隻的愛心魚\n會變得無精打采而破綻處處。\n於是就被大嘴鷗趁機叼走了。"
          moon: "很受情侶歡迎，\n因此被放養在蜜月客人\n住宿的旅館泳池裡。"
bagon:
  species_id: 371
  names:
    jp_kana: タツベイ
