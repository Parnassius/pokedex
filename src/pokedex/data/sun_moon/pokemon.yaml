        - grass
        - fairy
      abilities:
        - prankster
        - infiltrator
      hidden_ability: chlorophyll
      held_items:
        rare: absorb_bulb
      descriptions:
        jp_kana:
          sun: "かぜに　のり　みんかに　しんにゅう。\nへやじゅうを　わたまみれに　すると\nニコニコ　わらって　さっていく。"
          moon: "かぜに　のって　あらわれるが\nあまりに　かぜが　つよすぎると\nあたまの　わたが　ちぎれてしまう。"
        jp_kanji:
          sun: "風に　乗り　民家に　侵入。\n部屋中を　綿まみれに　すると\nニコニコ　笑って　去っていく。"
          moon: "風に　乗って　現れるが\nあまりに　風が　強すぎると\n頭の　綿が　千切れてしまう。"
        en:
          sun: "It rides on the wind and slips into people’s\nhomes. After it has turned a room into a cotton-\nfilled mess, it giggles to itself and takes off."
          moon: "This Pokémon appears, riding upon the wind.\nBut if the wind gusts up, it’ll blow the cotton on\nthis Pokémon’s head clean off."
        fr:
          sun: "Il s’introduit chez les gens à la faveur d’un\ncourant d’air, répand du coton aux quatre coins\nde la pièce puis repart comme si de rien n’était."
          moon: "Ce Pokémon se déplace au gré du vent. Lorsqu’il\nsouffle trop fort, il arrive que Farfaduvet perde\nle coton qu’il porte sur sa tête."
        it:
          sun: "Entra nelle case trasportato dal vento.\nDopo averle riempite di cotone, se ne va\nridendo felice."
          moon: "Si sposta fluttuando nell’aria.\nSe il vento è troppo forte, perde il cotone che ha\nsulla testa."
        de:
          sun: "Über Luftzüge dringt es in Häuser ein, verstreut\nin allen Zimmern Watte und macht sich dann\nlächelnd davon."
          moon: "Es reitet auf dem Wind, doch wenn dieser\nzu stark ist, wird die Watte an seinem Kopf\nabgerissen."
        es:
          sun: "Entra en las casas con las corrientes de aire y\nesparce algodón por todas partes. Desaparece\nentre risas tras su travesura."
          moon: "Aparece al levantarse el viento, pero, cuando\neste arrecia, pierde el algodón de la cabeza."
        ko:
          sun: "바람을 타고 민가에 침입한다.\n방 안을 솜투성이로 만들고\n싱글벙글 웃으며 떠난다."
          moon: "바람을 타고 나타나지만\n바람이 너무 강하면\n머리의 솜이 흩어져 버린다."
        zh_simp:
          sun: "乘着风侵入民居。\n把房间里弄得满是棉花后，\n咯咯咯地笑着离去。"
          moon: "乘着风出现，\n但如果风力过强，\n头上的棉花就会被风扯掉。"
        zh_trad:
          sun: "乘著風侵入民居。\n把房間裡弄得滿是棉絮後，\n就會嘻嘻哈哈地笑著離去。"
          moon: "乘著風出現，\n但如果風力過強，\n頭上的棉花就會被風扯掉。"
