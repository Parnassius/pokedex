      descriptions:
        jp_kana:
          sun: "りくのうえでも　ふつうに　くらせるが\nてんてきの　ポケモンが　すくないので\nみずの　なかの　せいかつを　このむ。"
          moon: "りくじょうを　ねりあるいて\nエサの　むしポケモンを　さがす。\nたべるのは　あんぜんな　みずのなか。"
        jp_kanji:
          sun: "陸の上でも　普通に　暮らせるが\n天敵の　ポケモンが　少ないので\n水の　中の　生活を　好む。"
          moon: "陸上を　練り歩いて\n餌の　むしポケモンを　探す。\n食べるのは　安全な　水の中。"
        en:
          sun: "Although it can live on land, it prefers to stay in\nthe water, where it has fewer natural enemies."
          moon: "It marches over the land in search of bug\nPokémon to eat. Then it takes them underwater\nso it can dine on them where it’s safe."
        fr:
          sun: "Il est capable de vivre normalement sur la terre\nferme, mais il préfère vivre dans l’eau, où il a\nbeaucoup moins de prédateurs naturels."
          moon: "Il patrouille sur la terre ferme à la recherche de\nnourriture, à savoir des Pokémon Insecte.\nIl les mange dans l’eau, où il est en sécurité."
        it:
          sun: "Può vivere anche sulla terraferma, ma preferisce\nstare in acqua, dove ha meno nemici naturali."
          moon: "Cammina lentamente sulla terraferma in cerca\ndi Pokémon di tipo Coleottero di cui cibarsi.\nMangia solo in acqua, dove si sente più al sicuro."
        de:
          sun: "Es kann zwar auch an Land überleben, aber\nbevorzugt das Wasser, da es dort kaum\nnatürliche Feinde hat."
          moon: "Es geht an Land, um sich auf die Suche nach\nKäfer-Pokémon zu machen. Diese nimmt es\nals Beute mit ins Wasser, wo es sie verzehrt."
        es:
          sun: "Puede vivir en tierra firme perfectamente, pero\nprefiere el agua, donde encuentra menos\nenemigos naturales."
          moon: "Sale a la superficie en busca de Pokémon\ninsecto que llevarse a la boca, aunque luego\nprefiere comérselos bajo la seguridad del agua."
        ko:
          sun: "육지 위에서도 문제없이 살 수 있지만\n천적인 포켓몬이 적어서\n물속 생활을 선호한다."
          moon: "육지를 누비며\n먹이인 벌레포켓몬을 찾는다.\n먹는 곳은 안전한 물 속이다."
        zh_simp:
          sun: "即使在陆地上也能正常生活，\n但因为天敌的宝可梦较少，\n所以更喜欢在水中生活。"
          moon: "在陆地上四处游走，\n搜寻猎物——虫宝可梦。\n回到安全的水中食用。"
        zh_trad:
          sun: "即使在陸地上也能正常生活，\n但因為天敵較少，\n所以更喜歡在水中生活。"
          moon: "在陸地上到處走著，\n搜尋愛吃的蟲寶可夢，\n然後回到安全的水中享用。"
