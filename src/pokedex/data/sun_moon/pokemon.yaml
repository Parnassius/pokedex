        jp_kana:
          sun: "むらさきのミツを　すった　オドリドリ。\nみやびで　あでやかな　まいは　てきの\nみも　こころも　いかいへ　いざなう。"
          moon: "げんそうてきな　まいで　ししゃを\nよびよせる。　そのおんねんの　ちからを\nかりて　てきに　のろいを　かけるぞ。"
        jp_kanji:
          sun: "むらさきのミツを　吸った　オドリドリ。\n雅で　あでやかな　舞は　敵の\n身も　心も　異界へ　誘う。"
          moon: "幻想的な　舞で　死者を\n呼び寄せる。　その怨念の　力を\n借りて　敵に　呪いを　かけるぞ。"
        en:
          sun: "This Oricorio has sipped purple nectar. Its\nelegant, attractive dance will send the minds\nand hearts of its enemies to another world."
          moon: "It summons the dead with its dreamy dancing.\nFrom their malice, it draws power with which to\ncurse its enemies."
        fr:
          sun: "Après avoir bu du Nectar Mauve, Plumeline\nengage une élégante danse qui emporte\nses ennemis corps et âme vers l’autre monde."
          moon: "Sa danse hypnotique invoque les âmes\ndes morts, dont il rassemble la rancœur\nafin de maudire ses ennemis."
        it:
          sun: "Un Oricorio che si è nutrito di Nettare viola. La\nsua ammaliante danza raffinata spinge l’anima e\nil corpo dei nemici sul confine con l’altro mondo."
          moon: "Chiama a sé le anime dei morti con un ballo\nammaliante e sfrutta il rancore che le pervade\nper scagliare una maledizione contro i nemici."
        de:
          sun: "Ein Choreogel, das purpurnen Nektar geschlürft\nhat. Mit seinem anmutigen Tanz entführt es\nseine Gegner buchstäblich in eine andere Welt."
          moon: "Mit einem anmutigen Tanz beschwört es die\nToten und nutzt deren Groll, um seine Gegner\nzu verfluchen."
        es:
          sun: "Forma que toma Oricorio al libar Néctar Violeta.\nCon su refinada y elegante danza, puede enviar\nal otro mundo a sus enemigos en cuerpo y alma."
          moon: "Su refinada danza le permite contactar con las\nalmas de los fallecidos y canalizar su energía\nnegativa contra el enemigo."
        ko:
          sun: "보라꿀을 빨아들인 춤추새이다.\n우아하고 품위있는 춤은 상대의\n몸도 마음도 다른 세계로 데려간다."
          moon: "환상적인 춤으로 죽은 자를\n불러들인다. 그 원념의 힘을\n빌려 적에게 저주를 건다."
        zh_simp:
          sun: "吸食了兰紫色花蜜的花舞鸟。\n用优雅华丽的舞蹈\n将敌人的身心都诱惑到异世界。"
          moon: "用充满幻想的舞蹈召唤死者。\n借助这股怨念的力量\n对敌人施加诅咒。"
        zh_trad:
          sun: "吸食了蘭紫色花蜜的花舞鳥。\n用優雅華麗的舞蹈\n將敵人的身心都誘惑到異世界。"
          moon: "用充滿幻想的舞蹈召喚死者。\n借助這股怨念的力量\n對敵人施加詛咒。"
