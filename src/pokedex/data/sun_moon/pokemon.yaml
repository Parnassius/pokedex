torkoal:
  species_id: 324
  names:
    jp_kana: コータス
    jp_kanji: コータス
    en: Torkoal
    fr: Chartor
    it: Torkoal
    de: Qurtel
    es: Torkoal
    ko: 코터스
    zh_simp: 煤炭龟
    zh_trad: 煤炭龜
  forms:
    torkoal:
      form_id: 0
      base_stats:
        hp: 70
        attack: 85
        defense: 140
        special_attack: 85
        special_defense: 70
        speed: 20
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - white_smoke
        - drought
      hidden_ability: shell_armor
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          sun: "せきたんが　エネルギーの　みなもと。\nコータスの　すんでいる　やまには\nおおくの　せきたんが　ねむっている。"
          moon: "こうらのなかの　ほのおが　きえると\nしんでしまう。　いえで　そだてるには\nつねに　もやすものが　いるぞ。"
        jp_kanji:
          sun: "石炭が　エネルギーの　源。\nコータスの　棲んでいる　山には\n多くの　石炭が　眠っている。"
          moon: "甲羅の中の　炎が　消えると\n死んでしまう。　家で　育てるには\n常に　燃やすものが　いるぞ。"
        en:
          sun: "Coal is the source of Torkoal’s energy. Large\namounts of coal can be found in the mountains\nwhere they live."
          moon: "If the fire burning within its shell goes out, it will\ndie. Those who wish to raise one in their home\nmust always keep something flammable at hand."
        fr:
          sun: "Les Chartor peuplent les montagnes abritant\nde grands gisements de charbon, dont ils se\nservent comme source d’énergie."
          moon: "Si le feu brûlant sous sa carapace s’éteint,\nil meurt. Si vous le gardez à la maison, il y a\ntoujours quelque chose qui flambe."
        it:
          sun: "Genera energia bruciando carbone all’interno\ndella corazza. Le montagne in cui vive sono\nricche di questo materiale."
          moon: "Se il fuoco che brucia dentro la sua corazza si\nestingue, le sue energie vitali si esauriscono.\nSe tenuto in casa, dà spesso fuoco agli oggetti."
        de:
          sun: "Kohle ist die Quelle seiner Energie. Ein Glück,\ndass in den von Qurtel bewohnten Bergen\ngroße Kohlevorkommen schlummern."
          moon: "Erlöschen die Flammen in seinem Panzer,\nstirbt es. Will man es bei sich zu Hause halten,\nbraucht man daher stets brennbares Material."
        es:
          sun: "La fuente de su energía es el carbón. Torkoal\nsuele vivir en montañas donde yacen grandes\ncantidades de esta roca mineral."
          moon: "Si se extingue el fuego que arde en el interior de\nsu caparazón, puede perecer. Si se cría en casa,\nno hay día que no queme algo accidentalmente."
        ko:
          sun: "석탄이 에너지의 근원이다.\n코터스가 사는 산에는\n많은 석탄이 잠들어 있다."
          moon: "등껍질 안의 불꽃이 꺼지면\n죽어버린다. 집에서 키우기 위해서는\n항상 태울 것이 필요하다."
        zh_simp:
          sun: "煤炭是其能量的来源。\n在煤炭龟栖息着的山里，\n沉睡着大量的煤炭。"
          moon: "如果甲壳中的火焰消失就会死亡。\n要在家里培育的话，必须常备燃料。"
        zh_trad:
          sun: "煤炭是牠的能量來源。\n在煤炭龜棲息著的山裡，\n沉睡著大量的煤炭。"
          moon: "如果甲殼中的火焰熄滅就會死亡。\n要在家裡培育的話，必須常備燃料。"
