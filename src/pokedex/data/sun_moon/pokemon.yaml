      form_id: 0
      names:
        jp_kana: めらめらスタイル
        jp_kanji: めらめらスタイル
        en: Baile Style
        fr: Style Flamenco
        it: Stile Flamenco
        de: Flamenco-Stil
        es: Estilo Apasionado
        ko: 이글이글스타일
        zh_simp: 热辣热辣风格
        zh_trad: 熱辣熱辣風格
      base_stats:
