          sun: "でかい　イカリを　ブンブン　ふりまわし\nホエルオーさえ　いちげきで　ＫＯ。\nみどりの　モズクが　ほんたいだ。"
          moon: "うみに　ただよう　モズクの　たましいが\nうまれかわった。　かいていの　ゴミを\nモズクに　からめて　からだを　たもつ。"
        jp_kanji:
          sun: "でかい　錨を　ブンブン　振り回し\nホエルオーさえ　一撃で　ＫＯ。\n緑の　モズクが　本体だ。"
          moon: "海に　漂う　モズクの　魂が\n生まれ変わった。　海の　ゴミを\nモズクに　絡めて　身体を　保つ。"
        en:
          sun: "Swinging its massive anchor, it can KO Wailord\nin a single blow. What appears to be green\nseaweed is actually its body."
          moon: "The soul of seaweed adrift in the waves became\nreborn as this Pokémon. It maintains itself with\nnew infusions of seabed detritus and seaweed."
        fr:
          sun: "Avec un bon coup d’ancre bien senti, il peut\nmême assommer un Wailord. Son véritable corps\nest la partie composée de limon."
          moon: "C’est une réincarnation de l’âme des algues.\nSon corps est formé de détritus marins qu’il\nenveloppe de limon."
        it:
          sun: "Roteando l’enorme ancora, è capace di mandare\nKO con un solo colpo persino un Wailord.\nIl suo vero corpo è composto da alghe verdi."
          moon: "È la reincarnazione dello spirito delle alghe\nmarine. Si protegge stringendo a sé i rifiuti\nche trova in mare avvolgendoli nelle sue alghe."
        de:
          sun: "Wenn es seinen riesigen Anker schwingt, kann\nes sogar ein Wailord mit einem Schlag K.O.\nhauen. Der grüne Seetang ist sein Körper."
          moon: "Es ist die Wiedergeburt der Seelen von im Meer\ntreibendem Seetang. Es schützt seinen Körper,\nindem es Meeresmüll an Seetang bindet."
        es:
          sun: "Los giros de su enorme ancla son capaces de\nnoquear al mismísimo Wailord de un solo golpe.\nEl alga verde es su verdadero cuerpo."
          moon: "Es la reencarnación del espíritu de las algas que\nflotan a la deriva. Protege su cuerpo acoplando\na las algas los desperdicios que halla en el mar."
        ko:
          sun: "큰 닻을 빙빙 휘둘러\n고래왕조차 일격에 KO 시킨다.\n녹색의 해초가 본체다."
          moon: "바다를 떠도는 해초의 영혼이\n다시 태어났다. 해저의 쓰레기를\n해초에 감아서 몸을 유지한다."
        zh_simp:
          sun: "咣咣地来回摆动巨大的船锚，\n连吼鲸王也能一击击倒。\n绿色的海藻是它的本体。"
          moon: "在海上飘荡的海藻的魂魄转生而成。\n用海藻网罗海里的垃圾，维持身体。"
        zh_trad:
          sun: "來回揮舞巨大的船錨，\n連吼鯨王也能一擊打倒。\n綠色的海藻是牠的本體。"
          moon: "由海上飄蕩的海藻的魂魄轉生而成。\n利用海藻網羅海裡的垃圾，鞏固身體。"
jangmo_o:
  species_id: 782
  names:
    jp_kana: ジャラコ
    jp_kanji: ジャラコ
    en: Jangmo-o
    fr: Bébécaille
    it: Jangmo-o
    de: Miniras
    es: Jangmo-o
    ko: 짜랑꼬
    zh_simp: 心鳞宝
    zh_trad: 心鱗寶
  forms:
    jangmo_o:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 65
        special_attack: 45
        special_defense: 45
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - bulletproof
        - soundproof
      hidden_ability: overcoat
      held_items:
        rare: razor_claw
      descriptions:
        jp_kana:
          sun: "ウロコを　たたき　きもちを　つたえる。\nジャラコの　すむ　こうざんでは\nきんぞくおんが　こだまする。"
          moon: "ひとけの　ない　やまに　くらす。\nジャラコどうし　たたかいながら\nすこしずつ　せいちょう　していく。"
        jp_kanji:
          sun: "ウロコを　叩き　気持ちを　伝える。\nジャラコの　棲む　高山では\n金属音が　木霊する。"
          moon: "人気の　ない　山に　暮らす。\nジャラコ同士　戦いながら\n少しずつ　成長　していく。"
        en:
          sun: "It expresses its feelings by smacking\nits scales. Metallic sounds echo through\nthe tall mountains where Jangmo-o lives."
          moon: "They live in mountains where no trace of\nhumans can be detected. Jangmo-o grow\nlittle by little as they battle one another."
        fr:
          sun: "Il communique ses sentiments en frottant ses\nécailles. Les montagnes peuplées de Bébécaille\nbruissent d’un écho métallique."
          moon: "Il vit dans les montagnes inhabitées.\nEn affrontant d’autres Bébécaille, il grandit\net se développe petit à petit."
        it:
          sun: "Trasmette le sue emozioni scuotendo le squame.\nNelle aree montane in cui vive riecheggia spesso\nun suono metallico."
          moon: "Vive sulle montagne troppo impervie per gli\nesseri umani. Cresce e diventa più forte poco\na poco lottando con i propri simili."
        de:
          sun: "Es übermittelt seine Gefühle durch das Rasseln\nseiner Schuppen, wodurch im Hochgebirge, in\ndem es lebt, ein metallisches Geräusch erhallt."
          moon: "Es lebt auf Bergen, auf die sich kein Mensch\nwagt. Indem es gegen andere Miniras kämpft,\nwird es stetig stärker."
        es:
          sun: "Comunica sus sentimientos haciendo sonar sus\nescamas. El ruido metálico producido reverbera\nen las altas montañas donde habita."
          moon: "Habita en montañas despobladas. Luchan entre\nellos para fortalecerse poco a poco."
        ko:
          sun: "비늘을 때려 마음을 전달한다.\n짜랑꼬가 사는 고산에서는\n금속음이 메아리친다."
          moon: "인적이 없는 산에 산다.\n짜랑꼬끼리 싸우면서\n조금씩 성장해간다."
        zh_simp:
          sun: "敲击鳞片，传递自己的心情。\n在心鳞宝栖息的高山上，\n回荡着金属的声音。"
          moon: "生活在渺无人烟的山里。\n心鳞宝们一边互相战斗，\n一边渐渐地成长。"
        zh_trad:
          sun: "透過敲擊鱗片來傳遞自己的心情。\n在心鱗寶棲息的高山上，\n迴盪著金屬的聲音。"
          moon: "生活在渺無人煙的山裡。\n心鱗寶們會透過和同伴間的\n戰鬥而逐漸成長。"
hakamo_o:
  species_id: 783
  names:
    jp_kana: ジャランゴ
    jp_kanji: ジャランゴ
    en: Hakamo-o
    fr: Écaïd
    it: Hakamo-o
    de: Mediras
    es: Hakamo-o
    ko: 짜랑고우
    zh_simp: 鳞甲龙
    zh_trad: 鱗甲龍
  forms:
    hakamo_o:
      form_id: 0
      base_stats:
        hp: 55
        attack: 75
        defense: 90
        special_attack: 65
        special_defense: 70
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - fighting
      egg_groups:
        - dragon
      abilities:
        - bulletproof
        - soundproof
      hidden_ability: overcoat
      held_items:
        rare: razor_claw
      descriptions:
        jp_kana:
          sun: "おたけびと　ともに　えものに\nとびかかる。　ウロコの　パンチは\nあいてを　ズタズタに　ひきさくぞ。"
          moon: "ウロコは　どんどん　はえかわる。\nあたらしくなるたび　ウロコは\nかたく　するどく　なっていく。"
        jp_kanji:
          sun: "雄叫びと　ともに　獲物に\n飛びかかる。　ウロコの　パンチは\n相手を　ズタズタに　引き裂くぞ。"
          moon: "鱗は　どんどん　生え変わる。\n新しくなるたび　鱗は\n硬く　鋭く　なっていく。"
        en:
          sun: "It leaps at its prey with a courageous shout.\nIts scaly punches tear its opponents to shreds."
          moon: "It sheds and regrows its scales on a continuous\nbasis. The scales become harder and sharper\neach time they’re regrown."
        fr:
          sun: "Il se jette sur ses proies en poussant un terrible\ncri de guerre. Il les déchiquette ensuite avec\nses poings écaillés."
          moon: "Ses écailles poussent très vite.\nChaque nouvelle écaille est plus dure et plus\npointue que l’ancienne."
        it:
          sun: "Piomba sulla preda con un urlo possente.\nLe sue squame riducono a fettine i nemici."
          moon: "Cambia frequentemente le scaglie, che\ndiventano più dure e taglienti ogni volta\nche ricrescono."
        de:
          sun: "Mit einem Kampfschrei stürzt es sich auf seine\nBeute und reißt sie mithilfe seiner Schuppen in\nkleine Stücke."
          moon: "Seine Schuppen wachsen sehr schnell nach.\nJede neue Schuppe ist härter und schärfer\nals die vorherige."
        es:
          sun: "Se lanza sobre su presa entonando un grito de\nguerra. Golpea al enemigo y lo hace trizas con\nsus escamas."
          moon: "Muda constantemente sus escamas, que cada\nvez se vuelven más duras y afiladas."
        ko:
          sun: "기합을 외치며 먹이에게\n달려든다. 비늘의 펀치는\n상대를 갈기갈기 찢는다."
          moon: "비늘은 점점 새로 자란다.\n새로워질수록 비늘은\n단단하고 예리해진다."
        zh_simp:
          sun: "伴随着战吼猛扑猎物。\n用布满鳞片的拳头将对手撕成碎片。"
          moon: "鳞片会不断更替。\n随着每次崭新蜕变，\n鳞片会变得坚硬又锋利。"
        zh_trad:
          sun: "伴隨著吼叫聲猛撲獵物。\n用鱗片的拳頭將對手撕成碎片。"
          moon: "鱗片會不斷更替。\n隨著每次嶄新蛻變，\n鱗片會變得堅硬又鋒利。"
