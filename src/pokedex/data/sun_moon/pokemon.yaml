        - aerilate
      descriptions:
        jp_kana:
          sun: "メガシンカの　えいきょうで　つねに\nこうふん。　２ほんの　おおヅノで\nてきを　さしつらぬいてから　ひきさく。"
          moon: "メガシンカの　エネルギーを　あびて\nはねが　いじょうに　はったつした。\nおよそ　じそく　５０キロで　とぶ。"
        jp_kanji:
          sun: "メガシンカの　影響で　常に\n興奮。　２本の　大角で\n敵を　刺し貫いてから　引き裂く。"
          moon: "メガシンカの　エネルギーを　浴びて\n羽が　異常に　発達した。\nおよそ　時速　５０キロで　飛ぶ。"
        en:
          sun: "The influence of Mega Evolution leaves it in a\nstate of constant excitement. It pierces enemies\nwith its two large horns before shredding them."
          moon: "Bathed in the energy of Mega Evolution, its\nwings become unusually developed. It flies\nat speeds of approximately 30 mph."
        fr:
          sun: "La Méga-Évolution le maintient excité en\npermanence. Il embroche ses ennemis sur\nses pinces avant de les déchirer en deux."
          moon: "Grâce à la Méga-Évolution, ses ailes ont atteint\nune taille démesurée. Sa vitesse de pointe est\nd’environ 50 km/h."
        it:
          sun: "Quando si megaevolve entra in uno stato di\nirrequietezza costante. Trafigge il nemico con\nle sue grandi corna e poi lo fa a pezzetti."
          moon: "Grazie all’energia della megaevoluzione le sue ali\nsi sono sviluppate a dismisura. Può volare a una\nvelocità di circa 50 km/h."
        de:
          sun: "Durch die Mega-Entwicklung ist es permanent\naufgedreht. Mit seinen zwei großen Hörnern\nspießt es seine Feinde auf und teilt sie entzwei."
          moon: "Die Energie der Mega-Entwicklung hat seine\nFlügel außergewöhnlich groß werden lassen.\nSeine Höchstgeschwindigkeit beträgt 50 km/h."
        es:
          sun: "Su constante excitación se atribuye al efecto de\nla megaevolución. Ensarta al enemigo con sus\npinzas para luego hacerlo trizas."
          moon: "La energía de la megaevolución ha hecho que\nsus alas crezcan de forma desmesurada. Puede\ndesplazarse a unos 50 km/h."
        ko:
          sun: "메가진화의 영향으로 항상\n흥분한 상태이다. 2개의 큰 뿔로\n적을 꿰뚫은 다음 찢는다."
          moon: "메가진화 에너지를 받아서\n날개가 비정상적으로 발달했다.\n대략 시속 50km로 날아간다."
        zh_simp:
          sun: "因超级进化的影响而经常兴奋。\n用２只大角将敌人刺穿后撕裂。"
          moon: "沐浴着超级进化的力量，\n翅膀变得异常发达。\n会以时速大约５０公里飞行。"
        zh_trad:
          sun: "受到超級進化的影響，\n隨時都處於興奮狀態。\n會用２隻大角將敵人刺穿後撕裂。"
          moon: "吸收了超級進化的能量，\n翅膀變得異常發達。\n能以大約５０公里的時速飛行。"
