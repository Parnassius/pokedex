      descriptions:
        jp_kana:
          sun: "かざんちたいで　おおく　みかける。\nヘタに　エサを　あげると　よろこび\nこうふんして　６００どの　ひを　ふく。"
          moon: "ブビィと　くらす　ゆうめいな\nとうげいかが　いる。　やわらかい\nほのおが　いいさくひんを　うむらしい。"
        jp_kanji:
          sun: "火山地帯で　多く　みかける。\nヘタに　餌を　あげると　喜び\n興奮して　６００度の　火を　吹く。"
          moon: "ブビィと　暮らす　有名な\n陶芸家が　いる。　柔らかい\n炎が　いい作品を　生むらしい。"
        en:
          sun: "Many of these Pokémon can be seen in areas\nwith volcanic activity. Feeding can get them so\nexcited, they exhale flames of 1,100 degrees F."
          moon: "A famous potter lives with a Magby.\nApparently its soft flames produce fine works."
        fr:
          sun: "Ce Pokémon est souvent aperçu dans les\nrégions volcaniques. Donnez-lui à manger\net il vous déclarera sa flamme... littéralement."
          moon: "Magby est le partenaire privilégié d’un potier\nextrêmement célèbre. Sa flamme légère l’aiderait\nà créer des œuvres d’un raffinement exquis."
        it:
          sun: "Viene spesso avvistato nelle zone vulcaniche.\nQuando gli si dà da mangiare, si entusiasma\ne sputa fiamme a 600 °C."
          moon: "Pare che alcuni famosi vasai lavorino assieme\na questi Pokémon, creando delle opere stupende\ngrazie alle fiamme che producono."
        de:
          sun: "Häufig in Vulkangebieten anzutreffen. Füttert\nman es, kann es sein, dass es vor lauter\nFreude 600 °C heißes Feuer ausstößt."
          moon: "Ein berühmter Kunstkeramiker hat ein Magby\nals Mitbewohner. Seine Kunstwerke profitieren\nvon den sanften Flammen, die es ausstößt."
        es:
          sun: "Es fácil encontrarse con un Magby en áreas\ncercanas a volcanes. Si se le da comida, se\nemociona y expulsa fuego a 600 °C."
          moon: "Hay reputados alfareros que viven con Magby.\nAl parecer, sus suaves llamas son ideales para\ncocer grandes obras de alfarería."
        ko:
          sun: "화산지대에서 많이 보인다.\n어설프게 먹이를 주면 좋아하며\n흥분해서 600도의 불을 뿜는다."
          moon: "마그비와 사는 유명한\n도예가가 있다. 부드러운\n불꽃이 좋은 작품을 만드는 듯하다."
        zh_simp:
          sun: "在火山地带经常能见到。\n如果冒失地给了它食物的话会很高兴，\n激动地喷出６００度的火。"
          moon: "有和鸭嘴宝宝一起生活的\n著名的陶艺家。\n听说会用柔和的火创作出很棒的作品。"
        zh_trad:
          sun: "經常能在火山地帶發現牠的蹤影。\n如果隨意餵牠東西吃的話，\n牠會很高興並激動得噴出６００度的火焰。"
          moon: "有位著名的陶藝家和鴨嘴寶寶\n一起生活。用牠柔和的火似乎能\n創作出很棒的作品。"
