          sun: "かざんの　かこうに　すむ。\n１つの　かざんには　ひとつがいの\nブーバーンしかいないと　いわれる。"
          moon: "うでさきから　せっし　２０００どの\nひのたまを　はっしゃ。　れんしゃを\nすると　うでさきが　すこし　とける。"
        jp_kanji:
          sun: "火山の　火口に　棲む。\n１つの　火山には　ひとつがいの\nブーバーンしかいないと　いわれる。"
          moon: "腕先から　摂氏２０００度の\n火の玉を　発射。　連射を\nすると　腕先が　少し　溶ける。"
        en:
          sun: "They dwell in volcanic craters. According to\nwhat is known, a single pair of male and female\nMagmortar lives in one volcano."
          moon: "From its arm, it launches fireballs hotter than\n3,500 degrees Fahrenheit. Its arm starts to\nmelt when it fires a whole barrage."
        fr:
          sun: "Il vit dans les cratères de volcans. On dit que\nchaque volcan ne peut abriter qu’un seul couple\nde Maganon."
          moon: "Son bras peut expulser des boules enflammées\nd’une température de 2 000 °C. S’il en tire trop\nd’un coup, son bras commence à fondre."
        it:
          sun: "Vive nei crateri vulcanici. Sembra che in ogni\nvulcano possa abitare solo una coppia\ndi Magmortar."
          moon: "Lancia palle di fuoco a 2.000 °C dagli arti\nsuperiori. Se spara colpi a raffica, i suoi arti\ncominciano a fondere alle estremità."
        de:
          sun: "Es lebt in Vulkankratern. Angeblich gibt es\npro Vulkan immer nur ein Magbrant-Paar."
          moon: "Aus den Enden seiner Arme feuert es 2 000 °C\nheiße Feuerbälle ab. Dadurch verkohlen sie nach\nmehrmaligem Einsatz leicht."
        es:
          sun: "Vive en cráteres volcánicos. Al parecer, en cada\nvolcán solo habita una pareja de Magmortar."
          moon: "Expulsa bolas de fuego por los brazos que\nalcanzan los 2000 °C. Si lanza ráfagas, sus\nbazos pueden llegar a fundirse un poco."
        ko:
          sun: "화산의 화구에 산다.\n1개의 화산에는 암수 한 쌍의\n마그마번 밖에 없다고 한다."
          moon: "팔 끝에서 섭씨 2000도의\n불구슬을 발사한다. 연사하면\n팔 끝이 조금 녹는다."
        zh_simp:
          sun: "栖息在火山口。\n据说一座火山只有一对鸭嘴炎兽。"
          moon: "从手腕处发射出\n摄氏２０００度的火球。\n连射时手腕会稍稍熔化。"
        zh_trad:
          sun: "棲息在火山口。\n據說１座火山只有一對鴨嘴炎獸。"
          moon: "從手部前端發射出\n攝氏２０００度的火球。\n連發時手會稍稍熔化。"
