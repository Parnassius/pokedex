      descriptions:
        jp_kana:
          sun: "がんばりやな　せいしつで　ゆうめい。\nたいえきを　はなで　ふくらませた\nバルーンを　てきに　ぶつける。"
          moon: "みずの　バルーンを　あやつる。\nおおきな　バルーンを　つくるため\nコツコツ　れんしゅうを　くりかえす。"
        jp_kanji:
          sun: "頑張り屋な　性質で　有名。\n体液を　鼻で　膨らませた\nバルーンを　敵に　ぶつける。"
          moon: "水の　バルーンを　操る。\n大きな　バルーンを　作るため\nコツコツ　練習を　繰り返す。"
        en:
          sun: "This Pokémon snorts body fluids from its nose,\nblowing balloons to smash into its foes.\nIt’s famous for being a hard worker."
          moon: "This Pokémon can control water bubbles. It\npractices diligently so it can learn to make\nbig bubbles."
        fr:
          sun: "Connu pour son tempérament de battant,\nil rassemble l’eau de son corps au bout de son\nmuseau en un ballon qu’il projette sur l’ennemi."
          moon: "Ce Pokémon fabrique des ballons remplis d’eau\npour se battre. Il ne peut produire un gros ballon\nqu’au prix d’un entraînement rigoureux."
        it:
          sun: "È conosciuto per la sua forza di volontà.\nLancia sul nemico dei palloncini pieni d’acqua\nche gonfia con il naso."
          moon: "Crea dei palloncini d’acqua che controlla\nnella lotta. Si allena costantemente per riuscire\na produrre palloni di grandi dimensioni."
        de:
          sun: "Dieses Pokémon ist für seine Willensstärke\nbekannt. Bläst es Körperflüssigkeit durch die\nNase, entsteht eine Blase, die als Waffe fungiert."
          moon: "Es kontrolliert Wasserblasen. Um eine große\nBlase zu erschaffen, muss es unermüdlich üben."
        es:
          sun: "Se le conoce por su diligencia y predisposición.\nSegrega agua por la nariz para hinchar globos\ncon los que golpea a sus rivales."
          moon: "Maneja con soltura los globos de agua que crea,\npero, para poder hacer uno bien grande,\nnecesita practicar sin descanso."
        ko:
          sun: "노력하는 성질로 유명하다.\n체액을 코로 부풀린\n풍선을 적에게 부딪힌다."
          moon: "물로 된 풍선을 조종한다.\n커다란 풍선을 만들기 위해\n꾸준히 연습을 반복한다."
        zh_simp:
          sun: "因为勤奋的性格而有名。\n用鼻子将体液吹成气球，\n扔向敌人。"
          moon: "操纵水做的气球。\n为了制作大大的球，\n孜孜不倦地反复练习。"
        zh_trad:
          sun: "因勤奮的性格而聞名。\n會用鼻子將體液吹成氣球，\n然後扔向敵人。"
          moon: "操縱水做的氣球。\n為了製造大大的氣球，\n孜孜不倦地反復練習。"
