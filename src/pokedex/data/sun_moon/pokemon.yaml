      hidden_ability: speed_boost
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          sun: "じそく　１２０キロで　えものを　おい\nてつをも　くだく　キバで　しとめる。\nつうしょう　うみのギャング。"
          moon: "かつては　せビレが　しょくざいとして\nちんちょうされ　らんかく　された\nかなしい　かこを　もっている。"
        jp_kanji:
          sun: "時速　１２０キロで　獲物を　追い\n鉄をも　砕く　キバで　仕留める。\n通称　海のギャング。"
          moon: "かつては　背ビレが　食材として\n珍重され　乱獲　された\n悲しい　過去を　持っている。"
        en:
          sun: "It pursues its prey at speeds of 75 mph and\nfinishes them off with fangs that can crush iron.\nIt is known as the bully of the sea."
          moon: "It has a sad history. In the past, its dorsal fin\nwas a treasured foodstuff, so this Pokémon\nbecame a victim of overfishing."
        fr:
          sun: "Sa vitesse de pointe atteint les 120 km/h et\nses dents acérées viennent même à bout de\nl’acier. On le surnomme le « tyran des mers »."
          moon: "Ce Pokémon a un bien triste passé : il était\nen effet impitoyablement chassé pour son\naileron, fort apprécié des gourmets."
        it:
          sun: "Insegue le prede nuotando a 120 km/h e le\nafferra con le potenti zanne in grado di\nspezzare il ferro. È detto il “Tiranno del mare”."
          moon: "In un triste passato, la sua pinna dorsale era\nconsiderata una prelibatezza e questo l’ha\nreso vittima di una caccia indiscriminata."
        de:
          sun: "Es jagt mit 120 km/h seine Beute und erlegt sie\nmithilfe seiner Zähne, die selbst Eisen durch-\ndringen. Sein Spitzname ist „Tyrann des Meeres“."
          moon: "Tohaido hat eine traurige Vergangenheit: Seine\nRückenflosse gilt als Delikatesse, weshalb es\nlange Zeit gnadenlos überfischt wurde."
        es:
          sun: "Puede nadar a 120 km/h y abatir a su presa\ncon sus colmillos, capaces de destrozar incluso\nel metal. Su apodo es el Terror de los Mares."
          moon: "Este Pokémon tiene un pasado triste, ya que\nantaño fue pescado en exceso por lo deliciosa\nque era su aleta dorsal."
        ko:
          sun: "시속 120km로 먹이를 쫓아\n철도 부수는 어금니로 잡는다.\n통칭 바다의 건달."
          moon: "한때 등지느러미가 귀한\n식재료로 여겨져 남획된\n슬픈 과거를 갖고 있다."
        zh_simp:
          sun: "以１２０公里的时速追击猎物，\n用连铁都能咬碎的牙齿捕杀。\n通常称之为大海恶霸。"
          moon: "过去，它的背鳍被当做贵重的食材，\n因此有着被滥捕的悲惨历史。"
        zh_trad:
          sun: "以１２０公里的時速追逐獵物，\n再用連鐵都能咬碎的牙齒捕殺。\n人稱牠為大海惡霸。"
          moon: "在過去，牠的背鰭被當作貴重的食材，\n因此有著被濫捕的悲慘歷史。"
    sharpedo_mega:
      form_id: 1
      names:
        jp_kana: メガサメハダー
        jp_kanji: メガサメハダー
        en: Mega Sharpedo
        fr: Méga-Sharpedo
        it: MegaSharpedo
        de: Mega-Tohaido
        es: Mega-Sharpedo
        ko: 메가샤크니아
        zh_simp: 超级巨牙鲨
        zh_trad: 超級巨牙鯊
      base_stats:
        hp: 70
        attack: 140
        defense: 70
        special_attack: 110
        special_defense: 65
        speed: 105
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
      abilities:
        - strong_jaw
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          sun: "とうぶに　はえる　トゲは　キバが\nへんかしたもの。　きずつき　おれても\nそのばで　なんどでも　はえかわる。"
          moon: "メガシンカにより　とうそうほんのうが\nばくはつ。　きいろい　もようは\nかこの　れきせんの　きずあと。"
        jp_kanji:
          sun: "頭部に　生える　トゲは　キバが\n変化したもの。　傷つき　折れても\nその場で　何度でも　生え変わる。"
          moon: "メガシンカにより　闘争本能が\n爆発。　黄色い　模様は\n過去の　歴戦の　傷跡。"
        en:
          sun: "The spines sprouting from its head are\ntransformed fangs. If they’re injured or broken\noff, the spines will regenerate countless times."
          moon: "As a consequence of Mega Evolution, its\ncombative instincts exploded. The yellow marks\nit bears are scars from a long history of battles."
        fr:
          sun: "Les épines de sa tête sont des dents qui\nse sont transformées. Si elles s’abîment ou\nse brisent, elles repoussent comme neuves."
          moon: "Quand il méga-évolue, sa combativité explose.\nLes marques jaunes sur son corps retracent\nl’historique de ses batailles passées."
        it:
          sun: "Alcuni denti hanno cambiato forma, diventando\ndelle lame ai lati della sua bocca. Ricrescono\ncome nuove se si rompono o si sciupano."
          moon: "La megaevoluzione aumenta enormemente il suo\nistinto combattivo. I segni gialli di cui è ricoperto\nsono le cicatrici che si è procurato nelle lotte."
        de:
          sun: "Die Stacheln an seinem Kopf haben sich aus\nZähnen entwickelt. Werden sie beschädigt oder\nbrechen ab, wachsen sie immer wieder nach."
          moon: "Durch die Mega-Entwicklung ist sein Kampftrieb\nimmens angestiegen. Die gelben Muster sind\nNarben, die es sich in Kämpfen zugezogen hat."
        es:
          sun: "Tras la megaevolución, le flanquean el morro\nsendas filas de colmillos que, si se quiebran,\nse regeneran tantas veces como haga falta."
          moon: "Su habilidad en combate aumenta muchísimo\ncuando megaevoluciona. Las marcas amarillas de\nsu cuerpo son cicatrices de batallas pasadas."
        ko:
          sun: "머리에 돋아난 가시는 이빨이\n변화한 것이다. 상처 입고 부러져도\n그 자리에 몇 번이고 생겨난다."
          moon: "메가진화에 의해 투쟁본능이\n폭발했다. 노란 모양은\n과거에 싸웠던 흔적이다."
        zh_simp:
          sun: "长在头部的尖刺是牙齿变化而来的。\n即使受伤折断，\n也能无数次地立刻长回来。"
          moon: "由于超级进化，\n好斗的本性暴露无遗。\n黄色的花纹是过去历次战斗的伤痕。"
        zh_trad:
          sun: "長在頭部的尖刺是牙齒變化而來的。\n即使受傷折斷，\n也能無數次地立刻長回來。"
          moon: "由於超級進化，\n爆發出鬥爭的本能。\n黃色的花紋是過去歷次鬥爭的傷痕。"
wailmer:
  species_id: 320
  names:
    jp_kana: ホエルコ
    jp_kanji: ホエルコ
    en: Wailmer
    fr: Wailmer
    it: Wailmer
    de: Wailmer
    es: Wailmer
    ko: 고래왕자
    zh_simp: 吼吼鲸
    zh_trad: 吼吼鯨
  forms:
    wailmer:
      form_id: 0
      base_stats:
        hp: 130
        attack: 70
