      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          sun: "まれに　だっぴし　ウロコが　はげる。\nそのせいぶんが　ふくまれる　くすりは\nつかれた　からだを　ギンギンにする。"
          moon: "ひかり　かがやくものが　だいすき。\nほうせきや　つかまえた　メレシーを\nすあなで　じーっと　ながめている。"
        jp_kanji:
          sun: "稀に　脱皮し　ウロコが　剥げる。\nその成分が　含まれる　薬は\n疲れた　体を　ギンギンにする。"
          moon: "光り　輝くものが　大好き。\n宝石や　捕まえた　メレシーを\n巣穴で　じーっと　眺めている。"
        en:
          sun: "In rare cases, it molts and sheds its scales.\nMedicine containing its scales as an ingredient\nwill make a weary body feel invigorated."
          moon: "Shiny objects are its passion. It can be found in\nits cave, scarcely moving, its gaze fixed on the\njewels it’s amassed or Carbink it has caught."
        fr:
          sun: "Il perd parfois ses écailles quand il mue.\nLes remèdes à base d’écailles de Carmache\nsont de puissants toniques."
          moon: "Il adore tout ce qui brille. Au fond de sa tanière,\nil contemple les joyaux qu’il a dérobés et les\nStrassie qu’il a kidnappés."
        it:
          sun: "Con le scaglie che a volte perde durante la muta\nsi possono preparare tonici che alleviano\nla stanchezza e ripristinano le energie."
          moon: "Adora gli oggetti luccicanti. Passa molto tempo\nnella sua tana a rimirare la sua scorta di gemme\ne Carbink."
        de:
          sun: "Ab und zu häutet es sich und verliert Schuppen.\nMedizin, die solche Schuppen enthält, macht\nmüde Körper munter."
          moon: "Es liebt funkelnde Dinge. Edelsteine und\ngefangene Rocara nimmt es mit in sein Nest,\num sich an ihrem Anblick zu weiden."
        es:
          sun: "Muy ocasionalmente puede mudar la piel y\nperder las escamas. Las medicinas que las usan\ncomo ingrediente son muy reconstituyentes."
          moon: "Le gustan las cosas brillantes. Pasa largas\nhoras en su cueva, admirando las gemas y los\nCarbink que ha capturado."
        ko:
          sun: "드물게 탈피해서 비늘이 벗겨진다.\n그 성분이 들어 있는 약은\n피곤한 몸을 회복시켜 준다."
          moon: "반짝반짝 빛나는 것을 아주 좋아한다.\n보석이나 잡은 멜리시를\n둥지에서 가만히 바라보고 있다."
        zh_simp:
          sun: "偶尔蜕皮，鳞片会脱落。\n其成分中所含的药物成分\n可以让疲劳的身体活力四射。"
          moon: "最喜欢闪闪发光的东西。\n一直呆在巢穴里，\n盯着宝石和捕捉到的小碎钻。"
        zh_trad:
          sun: "偶爾脫皮，鱗片會脫落。\n含有其成分的藥可以\n讓疲勞的身體活力四射。"
          moon: "最喜歡閃閃發光的東西。\n會一直呆在巢穴裡\n盯著寶石和捕捉到的小碎鑽。"
garchomp:
  species_id: 445
  names:
    jp_kana: ガブリアス
    jp_kanji: ガブリアス
    en: Garchomp
    fr: Carchacrok
    it: Garchomp
    de: Knakrack
    es: Garchomp
    ko: 한카리아스
    zh_simp: 烈咬陆鲨
    zh_trad: 烈咬陸鯊
  forms:
    garchomp:
      form_id: 0
      base_stats:
        hp: 108
