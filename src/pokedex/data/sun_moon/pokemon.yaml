      form_id: 0
      base_stats:
        hp: 50
        attack: 80
        defense: 95
        special_attack: 10
        special_defense: 45
        speed: 10
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - undiscovered
      abilities:
        - sturdy
        - rock_head
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sun: "みずが　にがてで　かわいた　ばしょに\nすんでいる。　まわりに　みどりが\nすくないので　よく　めだつ。"
          moon: "からだの　よけいな　すいぶんを　めから\nそとに　だす。　その　せいぶんは\nにんげんの　あせに　にている。"
        jp_kanji:
          sun: "水が　苦手で　乾いた　場所に\n棲んでいる。　周りに　緑が\n少ないので　よく　目立つ。"
          moon: "身体の　余計な　水分を　目から\n外に　出す。　その　成分は\n人間の　汗に　似ている。"
        en:
          sun: "It does not deal well with water, so it lives in dry\nlocales. Since its surroundings tend to lack\ngreenery, it stands out noticeably."
          moon: "From its eyes, it can expel excess moisture from\nits body. This liquid is similar in composition to\nhuman sweat."
        fr:
          sun: "Comme il a horreur de l’eau, on le trouve surtout\ndans les régions arides. Avec si peu de verdure\nalentour, on le repère tout de suite."
          moon: "Il se débarrasse des liquides superflus par ses\nyeux. La composition chimique de ces liquides\nressemble à celle de la sueur humaine."
        it:
          sun: "Non ama l’acqua e preferisce vivere in ambienti\naridi. Data la mancanza di vegetazione in questi\nluoghi, individuarlo è molto facile."
          moon: "Espelle dagli occhi l’umidità corporea in eccesso.\nSi tratta di un fenomeno fisiologico simile alla\nsudorazione."
        de:
          sun: "Es mag kein Wasser und lebt an trockenen\nOrten. Da es in seiner Umgebung nur wenig\ngrüne Pflanzen gibt, sticht es deutlich heraus."
          moon: "Überschüssiges Wasser in seinem Körper\nscheidet es über die Augen aus. Dieses ist\nvergleichbar mit dem Schweiß des Menschen."
        es:
          sun: "No le gusta el agua, por lo que suele vivir en\nlugares secos. Como hay poco verdor a su\nalrededor, suele destacar mucho."
          moon: "Expulsa por los ojos el líquido corporal que le\nsobra. La composición química de este líquido\nse parece a la del sudor de los seres humanos."
        ko:
          sun: "물을 싫어해 건조한 장소에\n살고 있다. 주변에는 녹색이\n적어 눈에 잘 띈다."
          moon: "몸에 불필요한 수분은 눈을\n통해 밖으로 내보낸다. 그 성분은\n인간의 땀과 비슷하다."
        zh_simp:
          sun: "很怕水，所以生活在干燥的地方。\n因为周围绿色很少，所以相当醒目。"
          moon: "会从眼睛排出体内多余的水分。\n该成分接近人类的汗液。"
        zh_trad:
          sun: "很怕水，所以生活在乾燥的地方。\n因為周圍綠色植物很少，所以相當顯眼。"
          moon: "會從眼睛排出體內多餘的水分。\n該成分接近人類的汗液。"
