      descriptions:
        jp_kana:
          sun: "けづくろいで　おなかに　たまった\nぬけげを　もやして　ひを　ふく。\nけの　はきかたで　ほのおも　へんか。"
          moon: "かんじょうを　ださず　ひとりで\nいることを　このむ。　しんらいを\nえるまでには　じかんが　かかるぞ。"
        jp_kanji:
          sun: "毛づくろいで　お腹に　溜まった\n抜け毛を　燃やして　火を　吹く。\n毛の　吐きかたで　炎も　変化。"
          moon: "感情を　ださず　独りで\nいることを　好む。　信頼を\n得るまでには　時間が　かかるぞ。"
        en:
          sun: "While grooming itself, it builds up fur inside its\nstomach. It sets the fur alight and spews fiery\nattacks, which change based on how it coughs."
          moon: "It doesn’t allow its emotions to be easily seen.\nEarning its trust takes time. It prefers solitude."
        fr:
          sun: "Les poils qu’il avale pendant sa toilette brûlent\net forment une flamme dans son ventre. Celle-ci\nchange selon la façon dont il la recrache."
          moon: "Ce Pokémon n’exprime jamais ses émotions.\nIl aime la vie en solitaire, et n’accorde pas\nsa confiance au premier venu."
        it:
          sun: "Incendia i grumi di pelo accumulati nella pancia\ndurante la toeletta per sputare fiamme che\nplasma a suo piacimento."
          moon: "Ama la solitudine e non lascia mai trapelare\nle proprie emozioni. Per guadagnarsi la sua\nfiducia occorre molto tempo."
        de:
          sun: "Es verbrennt Haare, die es bei der Körperpflege\nverschluckt hat, indem es Feuer speit. Die\nFlammen variieren je nach Art des Speiens."
          moon: "Es zeigt nie seine Gefühle und ist am liebsten\nallein. Sein Zutrauen zu gewinnen, kann einige\nZeit in Anspruch nehmen."
        es:
          sun: "Prende las bolas de pelo que se forman en su\nestómago tras acicalarse. Las llamas que\nescupe tienen formas variopintas."
          moon: "A este Pokémon le encanta la vida en solitario y\nno expresa nunca sus emociones. Se necesita\nmuchísimo tiempo para ganarse su confianza."
        ko:
          sun: "혀로 털을 정리하면서 배에 쌓인\n빠진 털을 태워서 불을 뿜는다.\n털을 뱉어내는 방법에 따라 불꽃도 변한다."
          moon: "감정을 드러내지 않고 혼자\n있는 것을 좋아한다. 신뢰를\n얻기까지 시간이 걸린다."
        zh_simp:
          sun: "通过理毛然后将积在腹中的\n落毛燃烧，喷出火焰。\n根据吐毛的方式不同，火焰也会变化。"
          moon: "喜欢不流露感情，独自生活。\n要取得它的信任，得花点时间。"
        zh_trad:
          sun: "將理毛時屯積在肚子裡的\n落毛引燃並吐出火焰。\n火焰會隨著吐毛的方式不同而變化。"
          moon: "不喜歡流露感情，喜歡獨處。\n要取得牠的信任，需要花不少時間。"
