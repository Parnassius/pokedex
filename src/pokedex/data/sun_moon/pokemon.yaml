      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - no_guard
      hidden_ability: steadfast
      held_items:
        rare: focus_band
      descriptions:
        jp_kana:
          sun: "きたえるのが　だいすき。　ひにひに\nふくれていく　きんにくを　ながめて\nますます　トレーニングに　はげむぞ。"
          moon: "おとな１００にんを　なげとばすほどの\nかいりきは　まいにち　ゴローンを\nもちあげることで　つくられる。"
        jp_kanji:
          sun: "きたえるのが　大好き。　日に日に\n膨れていく　筋肉を　ながめて\nますます　トレーニングに　励むぞ。"
          moon: "大人１００人を　投げ飛ばすほどの\n怪力は　毎日　ゴローンを\n持ち上げることで　つくられる。"
        en:
          sun: "It loves working out. As it gazes at its muscles,\nwhich continue to swell day by day, it becomes\nmore and more dedicated to its training."
          moon: "With its superhuman strength, it’s able to throw\na hundred people all at the same time. Its\nstrength comes from lifting Graveler every day."
        fr:
          sun: "Il aime faire travailler ses muscles. Jour après\njour, il regarde sa masse musculaire gonfler, et\ncela l’encourage à s’entraîner encore davantage."
          moon: "Il s’entraîne en soulevant des Gravalanch tous\nles jours jusqu’à pouvoir projeter en l’air\nune centaine d’humains adultes d’un coup."
        it:
          sun: "Prova un particolare piacere ad allenarsi.\nOsservando i suoi muscoli svilupparsi ogni\ngiorno, si sente spinto ad allenarsi ulteriormente."
          moon: "Si allena ogni giorno sollevando Graveler.\nLa sua forza è tale che sarebbe in grado\ndi scagliare lontano 100 uomini."
        de:
          sun: "Es liebt Muskelaufbautraining und verfolgt jeden\nTag das Wachstum seiner Muskeln. Dies spornt\nes zu noch intensiverem Training an."
          moon: "Es stemmt jeden Tag Georok, wodurch seine\nMuskelkraft ins schier Unendliche steigt. Daher\nkann es auch 100 Erwachsene zugleich tragen."
        es:
          sun: "Le encanta entrenar su cuerpo. Cuando observa\ncómo crecen sus músculos día tras día, se\napasiona más por su entrenamiento."
          moon: "Obtiene su fuerza descomunal, con la que es\ncapaz de lanzar a 100 personas por los aires,\nmediante un levantamiento de Graveler diario."
        ko:
          sun: "단련하는 것을 아주 좋아한다.\n날마다 커지는 근육을 보면서\n더욱 트레이닝을 열심히 한다."
          moon: "어른 100명을 내던질 정도의\n괴력은 매일 데구리를\n들어 올리는 과정에서 만들어진다."
        zh_simp:
          sun: "非常喜欢锻炼。\n盯着自己每天不断增大的肌肉，\n愈加勤奋地锻炼。"
          moon: "那种能扔飞１００个\n成年人的可怕力量是通过\n每天上举隆隆石来练成的。"
        zh_trad:
          sun: "最喜歡鍛煉。\n盯著每天不斷增大的肌肉，\n就會越來越勤奮地鍛煉自己。"
          moon: "那種能扔飛１００個\n成年人的可怕力量是透過\n每天舉隆隆石來練成的。"
machoke:
  species_id: 67
  names:
    jp_kana: ゴーリキー
    jp_kanji: ゴーリキー
    en: Machoke
    fr: Machopeur
    it: Machoke
    de: Maschock
    es: Machoke
    ko: 근육몬
    zh_simp: 豪力
    zh_trad: 豪力
