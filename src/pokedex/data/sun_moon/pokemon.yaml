raichu:
  species_id: 26
  names:
    jp_kana: ライチュウ
    jp_kanji: ライチュウ
    en: Raichu
    fr: Raichu
    it: Raichu
    de: Raichu
    es: Raichu
    ko: 라이츄
    zh_simp: 雷丘
    zh_trad: 雷丘
  forms:
    raichu:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 55
        special_attack: 90
        special_defense: 80
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
      egg_groups:
        - field
        - fairy
      abilities:
        - static
      hidden_ability: lightning_rod
      descriptions:
        jp_kana:
          sun: "でんげきは　１０まんボルトに\nたっすることもあり　ヘタにさわると\nインドぞうでも　きぜつする。"
          moon: "でんきが　たまると　きしょうが\nあらくなる。　トレーナーでも\nちゅうい　しないと　おそわれる。"
        jp_kanji:
          sun: "電撃は　１０万ボルトに\n達することもあり　ヘタに触ると\nインド象でも　気絶する。"
          moon: "電気が　溜まると　気性が\n荒くなる。　トレーナーでも\n注意　しないと　襲われる。"
        en:
          sun: "It unleashes electric shocks that can reach\n100,000 volts. When agitated, it can knock out\neven an Indian elephant."
          moon: "It becomes aggressive when it has electricity\nstored up. At such times, even its Trainer has to\ntake care to avoid being attacked."
        fr:
          sun: "Ce Pokémon peut accumuler jusqu’à\n100 000 volts. Il peut ainsi assommer\nun éléphant juste en le touchant."
          moon: "Il devient plus agressif au fur et à mesure qu’il\naccumule de l’électricité. Même son Dresseur\ndoit faire attention à ne pas se faire attaquer."
        it:
          sun: "Le sue scariche elettriche, che raggiungono\ni 100.000 volt, potrebbero far svenire persino\nun elefante indiano."
          moon: "Quando accumula elettricità, fatica a\ncontrollarsi. Perfino il suo Allenatore rischia\ndi essere attaccato, se non fa attenzione."
        de:
          sun: "Seine elektrischen Ladungen erreichen bis zu\n100 000 V. Bei unvorsichtigem Kontakt wird\nsogar ein indischer Elefant bewusstlos."
          moon: "Wenn es sich elektrisch auflädt, steigt seine\nAggressivität. Selbst sein Trainer läuft dann\nGefahr, von ihm angegriffen zu werden."
        es:
          sun: "Suelta descargas eléctricas de hasta 100 000\nvoltios, con lo que es capaz de derribar al mayor\nde los Pokémon."
          moon: "Se vuelve más agresivo cuando se carga de\nelectricidad. Puede incluso llegar a atacar a su\nEntrenador si este no se anda con cuidado."
        ko:
          sun: "전격은 10만볼트에\n이르기도 해서 잘못 만지면\n인도코끼리라도 기절한다."
          moon: "전기가 모이면 성질이\n거칠어진다. 트레이너라도\n주의하지 않으면 공격당한다."
        zh_simp:
          sun: "电击有时候会达到十万伏特，\n不小心碰到的话，\n连印度象也会昏厥。"
          moon: "电力积聚的话，脾气就会变坏。\n即便是训练家，一不留神也会被袭击。"
        zh_trad:
          sun: "電擊有時候會達到十萬伏特，\n不小心碰到的話，\n連印度象也會昏厥。"
          moon: "電力積聚的話，脾氣就會變壞。\n即使是訓練家，一不留神也會被襲擊。"
    raichu_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 60
        attack: 85
        defense: 50
        special_attack: 95
        special_defense: 85
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
        - psychic
      egg_groups:
        - field
        - fairy
      abilities:
        - surge_surfer
      descriptions:
        jp_kana:
          sun: "アローラちほう　でのみ　このすがたに\nしんかする。　そのよういんの　ひとつが\nエサであると　けんきゅうかは　かたる。"
          moon: "ねんりきで　でんきを　あやつる。\nしっぽに　のると　サイコパワーで\nうきあがり　そのまま　いどう。"
        jp_kanji:
          sun: "アローラ地方　でのみ　この姿に\n進化する。　その要因の　ひとつが\n餌であると　研究家は　語る。"
          moon: "念力で　電気を　操る。\n尻尾に　乗ると　サイコパワーで\n浮きあがり　そのまま　移動。"
        en:
          sun: "It only evolves to this form in the Alola region.\nAccording to researchers, its diet is one of the\ncauses of this change."
          moon: "It uses psychokinesis to control electricity. It\nhops aboard its own tail, using psychic power\nto lift the tail and move about while riding it."
        fr:
          sun: "Cette évolution ne se produit qu’à Alola.\nLes scientifiques pensent que la nourriture\nen est la cause."
          moon: "Il contrôle l’électricité grâce à ses pouvoirs psy.\nPour se déplacer, il monte sur sa queue et la\nfait léviter par télékinésie."
        it:
          sun: "Sviluppa questa forma solo nella regione di Alola.\nSecondo gli studiosi, questa differenziazione\nè dovuta alla diversa alimentazione."
          moon: "Controlla l’elettricità con i suoi poteri psichici.\nSi sposta fluttuando a mezz’aria sulla propria\ncoda grazie alla telecinesi."
        de:
          sun: "Es entwickelt sich nur in Alola zu dieser Form.\nForscher behaupten, dass einer der Gründe\ndafür das dortige Futter sei."
          moon: "Es kontrolliert Elektrizität mit Gedankenkraft.\nDank seiner Psycho-Kräfte kann es sich auf\nseinem Schweif schwebend fortbewegen."
        es:
          sun: "Esta forma es exclusiva de la región de Alola.\nLos investigadores apuntan al alimento del que\nse nutre como principal motivo."
          moon: "Controla la electricidad a voluntad. Puede\nsubirse a su propia cola y desplazarse flotando\ncon sus poderes telequinéticos."
        ko:
          sun: "알로라지방에서만 이 모습으로\n진화한다. 그 요인 중 하나가\n먹이일 것이라고 연구가들은 말한다."
          moon: "염동력으로 전기를 조종한다.\n꼬리에 타면 사이코 파워로\n떠올라 그대로 이동한다."
        zh_simp:
          sun: "只有在阿罗拉地区才会\n进化成这个样子。\n研究者说，其主要原因之一是食物。"
          moon: "用念力操纵电力。\n乘在尾巴上，利用精神力量浮起，\n就这么移动。"
        zh_trad:
          sun: "只有在阿羅拉地區才會\n進化成這個樣子。\n研究者說，其主要原因之一是食物。"
          moon: "透過念力操縱電力。\n乘在尾巴上，利用精神力量\n浮起來進行移動。"
sandshrew:
  species_id: 27
  names:
    jp_kana: サンド
    jp_kanji: サンド
    en: Sandshrew
    fr: Sabelette
    it: Sandshrew
    de: Sandan
    es: Sandshrew
    ko: 모래두지
    zh_simp: 穿山鼠
    zh_trad: 穿山鼠
  forms:
    sandshrew:
      form_id: 0
      base_stats:
        hp: 50
        attack: 75
        defense: 85
        special_attack: 20
        special_defense: 30
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_veil
      hidden_ability: sand_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          sun: "からだを　まるめて　ボールのような\nすがたに　なれる。　ころがりながら\nさばくを　こうそくで　いどうする。"
          moon: "あめの　ふらない　かんそうちたいや\nさばくが　おもな　すみか。　あなを\nほって　むしポケモンを　とらえる。"
        jp_kanji:
          sun: "身体を　丸めて　ボールのような\n姿に　なれる。　転がりながら\n砂漠を　高速で　移動する。"
          moon: "雨の　降らない　乾燥地帯や\n砂漠が　おもな　棲みか。　穴を\n掘って　むしポケモンを　捕らえる。"
        en:
          sun: "It can roll its body into a ball. It moves through\nthe desert by rolling at high speeds."
          moon: "It usually makes its home in deserts and arid\nzones, where rain does not fall. It digs holes to\ncatch Bug-type Pokémon."
        fr:
          sun: "Il peut se changer en boule parfaitement ronde\net rouler à toute allure à travers le désert."
          moon: "Il vit principalement dans les zones désertiques\noù il ne pleut jamais. Il creuse dans le sol\npour dénicher des Pokémon Insecte."
        it:
          sun: "Quando si raggomitola su se stesso sembra\nuna palla. Si muove nel deserto rotolando a\ngran velocità."
          moon: "Vive per lo più nei deserti e in zone aride.\nScava buche nel terreno per catturare Pokémon\ndi tipo Coleottero."
        de:
          sun: "Es kann sich blitzschnell durch die Wüste\nfortbewegen, indem es sich zu einem Ball\nzusammenrollt."
          moon: "Es lebt hauptsächlich in trockenen Regionen und\nWüsten, wo wenig Regen fällt. Es gräbt Löcher,\num Käfer-Pokémon zu fangen."
        es:
          sun: "Enrolla su cuerpo hasta hacerse una bola\ny rueda por el desierto a gran velocidad."
          moon: "Habita principalmente en zonas desérticas\ndonde las lluvias son escasas. Excava agujeros\nen el suelo en busca de Pokémon insecto."
        ko:
          sun: "몸을 웅크려서 공 같은\n모습이 된다. 구르면서\n사막을 고속으로 이동한다."
          moon: "비가 내리지 않는 건조지대나\n사막이 주된 거처다. 구멍을\n파서 벌레포켓몬을 잡는다."
        zh_simp:
          sun: "可以蜷缩身体变成球的样子。\n骨碌碌滚动着在沙漠里高速移动。"
          moon: "不下雨的干燥地区和沙漠\n是它的主要栖息地。\n会挖洞捕捉虫宝可梦。"
        zh_trad:
          sun: "可以蜷縮身體變成球的樣子。\n骨碌碌滾動著，在沙漠裡高速移動。"
          moon: "不下雨的乾燥地區和沙漠\n是牠的主要棲息地。\n會挖洞捕捉蟲寶可夢。"
    sandshrew_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 50
        attack: 75
        defense: 90
        special_attack: 10
        special_defense: 35
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - steel
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: slush_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          sun: "ゆきやまに　すむ。　はがねのこうらは\nとても　がんじょうだが　かたすぎて\nからだを　まるめることが　できない。"
          moon: "こおりの　うえで　サンドを　すべらせ\nそのきょりを　きそう。　こらいから\nつづく　アローラのまつりの　ひとつ。"
        jp_kanji:
          sun: "雪山に　棲む。　鋼の甲羅は\nとても　頑丈だが　硬すぎて\n身体を　丸めることが　できない。"
          moon: "氷の　上で　サンドを　滑らせ\nその距離を　競う。　古来から\n続く　アローラの祭りの　ひとつ。"
        en:
          sun: "It lives on snowy mountains. Its steel shell is\nvery hard—so much so, it can’t roll its body up\ninto a ball."
          moon: "An ancient tradition of Alolan festivals, still\ncarried on to this day, is a competition to slide\nSandshrew across ice as far as one can."
        fr:
          sun: "Il vit dans les montagnes enneigées. Sa carapace\nd’acier est très solide, mais elle est trop rigide\npour qu’il puisse entièrement se rouler en boule."
          moon: "Faire glisser des Sabelette le plus loin possible\nsur la glace lors de concours fait partie des\nvieilles traditions festives d’Alola."
        it:
          sun: "Vive sulle montagne innevate. La sua corazza\nd’acciaio è molto robusta, ma la sua durezza gli\nimpedisce di arrotolarsi del tutto su se stesso."
          moon: "In una delle feste tradizionali della regione\ndi Alola, i partecipanti gareggiano a far scivolare\nun Sandshrew più lontano possibile sul ghiaccio."
        de:
          sun: "Es lebt auf verschneiten Bergen. Sein Panzer\nist zwar robust, aber so hart, dass es seinen\nKörper nicht vollständig zusammenrollen kann."
          moon: "Bei einem der traditionellen Feste Alolas messen\nsich die Teilnehmer darin, ihre Sandan so weit\nwie möglich über Eisflächen gleiten zu lassen."
        es:
          sun: "Vive en montañas nevadas. Su caparazón de\nacero es muy resistente, pero tiene tal dureza\nque no le permite enrollarse del todo."
          moon: "Un festival ancestral que se sigue celebrando en\nAlola consiste en hacer deslizar a un Sandshrew\nsobre el hielo para ver quién lo lanza más lejos."
        ko:
          sun: "설산에 산다. 강철의 등껍질은\n아주 튼튼하지만 너무 딱딱해서\n몸을 구부릴 수가 없다."
          moon: "얼음 위에 모래두지를 미끄러뜨려\n그 거리를 겨룬다. 먼 옛날부터\n이어진 알로라의 축제 중 하나다."
        zh_simp:
          sun: "栖息在雪山。钢的甲壳\n非常坚固，但因为过于坚硬，\n身体没法蜷缩起来。"
          moon: "让穿山鼠在冰上滑行，\n比赛滑行的距离。\n这是自古就有的阿罗拉的庆典之一。"
        zh_trad:
          sun: "棲息在雪山。鋼鐵的甲殼\n非常堅固，但因為過於堅硬，\n身體沒法蜷縮起來。"
          moon: "讓穿山鼠在冰上滑行，\n比賽滑行的距離。\n這是阿羅拉自古就有的慶典之一。"
sandslash:
  species_id: 28
  names:
    jp_kana: サンドパン
    jp_kanji: サンドパン
    en: Sandslash
    fr: Sablaireau
    it: Sandslash
    de: Sandamer
    es: Sandslash
    ko: 고지
    zh_simp: 穿山王
    zh_trad: 穿山王
  forms:
    sandslash:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 110
        special_attack: 45
        special_defense: 55
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_veil
      hidden_ability: sand_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          sun: "するどいが　やや　もろい　ツメや\nトゲは　よく　おれる。　よくじつには\nはえそろうので　きに　しなくてよい。"
          moon: "ツメで　きに　のぼり　えものが\nあらわれると　からだを　まるめて\nトゲのボールに　なって　らっかする。"
        jp_kanji:
          sun: "鋭いが　やや　もろい　ツメや\nトゲは　よく　折れる。　翌日には\n生えそろうので　気に　しなくてよい。"
          moon: "ツメで　木に　登り　獲物が\n現れると　身体を　丸めて\nトゲのボールに　なって　落下する。"
        en:
          sun: "Although they are sharp, its claws and spikes\noften break off. They grow back the next day,\nso it is not bothered by the temporary loss."
          moon: "It uses its claws to climb trees and then curls\nits body into a spiny ball, ready to drop onto\nany prey that appears."
        fr:
          sun: "Ses griffes et épines sont tranchantes, mais\nelles se brisent facilement. Cela dit, il n’en a\nque faire, puisqu’elles repoussent le lendemain."
          moon: "Il escalade les arbres avec ses griffes. Quand\nune proie passe à proximité, il se laisse tomber\ndessus toutes épines dressées."
        it:
          sun: "I suoi artigli e aculei sono molto affilati, ma\nanche piuttosto fragili e si spezzano spesso.\nTuttavia, ricrescono nel giro di un giorno."
          moon: "Si arrampica sugli alberi con gli artigli affilati e,\navvistata la preda, si raggomitola diventando\nuna sfera irta di aculei e le piomba addosso."
        de:
          sun: "Seine Krallen und Stacheln sind scharf, aber\nauch spröde und brechen oft ab. Sie wachsen\njedoch innerhalb eines Tages wieder nach."
          moon: "Es erklimmt mit seinen Krallen Bäume, rollt sich\nein und wartet, bis Beute erscheint. Dann stürzt\nes sich als stachelige Kugel auf sie herab."
        es:
          sun: "No suele inquietarse por el hecho de que sus\nafiladas garras y púas se rompan con facilidad,\nya que estas vuelven a crecer al día siguiente."
          moon: "Trepa a los árboles con sus garras. Cuando\navista una presa, se convierte en una bola de\npúas y se deja caer sobre ella."
        ko:
          sun: "날카롭지만 약간 약한 발톱이나\n가시는 자주 부러진다. 다음 날에는 다시\n돋아나기 때문에 신경 쓰지 않아도 된다."
          moon: "발톱으로 나무에 올라 먹이가\n나타나면 몸을 둥글게 만들어\n가시 공이 되어 낙하한다."
        zh_simp:
          sun: "虽然锐利却有点儿脆弱的爪子\n和刺经常会折断。因为第二天\n就会长好，所以不必在意。"
          moon: "用爪子爬上树，当猎物出现时，\n身体就蜷缩成尖刺球从高处落下。"
        zh_trad:
          sun: "銳利卻有點脆弱的爪子和\n尖刺經常折斷。但因為第二天\n就會長回來，所以不必在意。"
          moon: "用爪子爬上樹，當獵物出現時，\n身體就蜷縮成尖刺球從高處落下。"
    sandslash_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
