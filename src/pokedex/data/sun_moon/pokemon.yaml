        - dry_skin
      hidden_ability: damp
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          sun: "くっても　くっても　せなかに\nはえている　キノコが　ほとんど\nえいようを　うばっていくのだ。"
          moon: "とうちゅうかそうと　いう　せなかの\nキノコは　ちょうじゅの　くすり。\nかわかし　ふんまつにして　つかう。"
        jp_kanji:
          sun: "喰っても　喰っても　背中に\n生えている　キノコが　ほとんど\n栄養を　奪っていくのだ。"
          moon: "冬虫夏草と　いう　背中の\nキノコは　長寿の　薬。\n乾かし　粉末にして　使う。"
        en:
          sun: "No matter how much it eats, the mushrooms\ngrowing on its back steal away most of\nthe nutrients it consumes."
          moon: "Mushrooms called tochukaso sprout from its\nback. They can be dried and powdered to make\na medicine used to extend life."
        fr:
          sun: "Il a beau manger autant qu’il peut,\nles champignons qui poussent sur son dos\nlui volent la plupart de ses nutriments."
          moon: "Les champignons qui poussent sur son dos,\nappelés tochukaso, peuvent être séchés puis\nbroyés pour obtenir un élixir de longue vie."
        it:
          sun: "Mangia a più non posso, ma i funghi che\ncrescono sul suo dorso gli rubano quasi\ntutto il nutrimento."
          moon: "I funghi che ha sul dorso, chiamati tochukaso,\nsono considerati un farmaco di longevità.\nPrima dell’uso, vanno essiccati e polverizzati."
        de:
          sun: "Egal, wie viel Nahrung es auch zu sich nimmt,\ndie Pilze, die auf seinem Rücken wachsen,\nentziehen ihm so gut wie alle Nährstoffe."
          moon: "Die Pilze auf seinem Rücken heißen Tochukaso.\nSie lassen sich als lebensverlängernde Medizin\nverwerten, wenn man sie trocknet und zermahlt."
        es:
          sun: "Por mucho que coma, las setas parásitas que\ntiene en el lomo le roban la mayor parte de los\nnutrientes."
          moon: "Las setas que lleva en su lomo, llamadas\ntochukaso, se pueden deshidratar y pulverizar\npara crear un elixir que alarga la vida."
        ko:
          sun: "먹어도 먹어도 등에\n돋아나 있는 버섯이 대부분의\n영양을 빼앗아간다."
          moon: "동충하초라고 불리는 등의\n버섯은 장수의 약이다.\n말려서 가루로 만들어 사용한다."
        zh_simp:
          sun: "即使不停地吃，\n获取的营养也几乎都会被\n背上生长的蘑菇夺走。"
          moon: "背上生长的被称为冬虫夏草的\n蘑菇是长寿之药。\n干燥后磨成粉末使用。"
        zh_trad:
          sun: "即使不停地吃，不停地吃，\n大部分攝取的營養都會被\n生長在背上的蘑菇奪走。"
          moon: "背上生長蘑菇被稱為冬蟲夏草，\n是一種能延年益壽的藥。\n乾燥後磨成粉末使用。"
