      descriptions:
        jp_kana:
          sun: "むじゃきで　ざんこくな　アーカラの\nまもりがみ。　はなの　かぐわしい\nかおりが　エネルギーの　みなもと。"
          moon: "ヒラヒラ　とびまわり　ふしぎに　ひかる\nりんぷんを　ふりまく。　ふれたものは\nたちまち　げんきを　とりもどすという。"
        jp_kanji:
          sun: "無邪気で　残酷な　アーカラの\n守り神。　花の　芳しい\n香りが　エネルギーの　源。"
          moon: "ヒラヒラ　飛びまわり　不思議に　光る\n鱗粉を　振りまく。　触れた者は\nたちまち　元気を　取り戻すという。"
        en:
          sun: "This guardian deity of Akala is guilelessly cruel.\nThe fragrant aroma of flowers is the source of\nits energy."
          moon: "As it flutters about, it scatters its strangely\nglowing scales. Touching them is said to restore\ngood health on the spot."
        fr:
          sun: "Pokémon candide mais terriblement cruel,\nc’est le gardien d’Akala. Il puise son énergie\ndans le parfum entêtant des fleurs."
          moon: "Avec ses ailes délicates, il répand une poudre\nmystérieuse et lumineuse quand il vole. Il suffit\nde le toucher pour retrouver aussitôt le sourire."
        it:
          sun: "Protettore di Akala, è un Pokémon innocente e\nspietato al tempo stesso. Il profumo soave\ndei fiori è la fonte della sua energia."
          moon: "Svolazza nel cielo spargendo nuvole di scaglie\ndal misterioso luccichio che fanno tornare\nimmediatamente il buon umore a chi le tocca."
        de:
          sun: "Der arglose, doch unbarmherzige Schutzpatron\nvon Akala. Seine Energie zieht es aus dem\nlieblichen Duft von Blumen."
          moon: "Beim Umherflattern verstreut es geheimnisvoll\nleuchtenden Flügelstaub. Es heißt, wer diesen\nabbekomme, sei sofort wieder voller Energie."
        es:
          sun: "El espíritu guardián de Akala, tan inocente como\ncruel. La fragancia de las flores constituye su\nfuente de energía."
          moon: "Al revolotear esparce escamas que desprenden\nun brillo misterioso. Se dice que todo aquel que\nlas toca vuelve a sentirse pletórico al instante."
        ko:
          sun: "천진난만하고 잔혹한 아칼라의\n수호신이다. 향기로운\n꽃향기가 에너지의 근원이다."
          moon: "팔랑팔랑 날아다니며 이상하게 빛나는\n인분을 흩뿌린다. 이것에 닿은 자는\n곧 건강을 되찾는다고 한다."
        zh_simp:
          sun: "天真无邪，残酷的阿卡拉的守护神。\n鲜花的芳香气息是它能量的来源。"
          moon: "四处翩翩飞舞，\n撒下闪着不可思议光芒的鳞粉。\n据说碰到的人眨眼间就会恢复活力。"
        zh_trad:
          sun: "天真無邪但殘酷的阿卡拉守護神。\n鮮花的芳香氣息是牠的能量來源。"
          moon: "四處翩翩飛舞，\n撒下閃著不可思議光芒的鱗粉。\n據說碰到的人眨眼間就會恢復活力。"
tapu_bulu:
  species_id: 787
  names:
    jp_kana: カプ・ブルル
    jp_kanji: カプ・ブルル
    en: Tapu Bulu
    fr: Tokotoro
    it: Tapu Bulu
    de: Kapu-Toro
    es: Tapu Bulu
    ko: 카푸브루루
    zh_simp: 卡璞・哞哞
    zh_trad: 卡璞・哞哞
  forms:
    tapu_bulu:
      form_id: 0
      base_stats:
        hp: 70
        attack: 130
        defense: 115
        special_attack: 85
        special_defense: 95
