      descriptions:
        jp_kana:
          sun: "きのみや　えものを　つかまえると\nほのおを　ふいて　ウェルダンぐらいに\nなるまで　やきあげてから　ガブリ。"
          moon: "へいきんたいおん　７～８００ど。\nたいないに　ある　ほのおぶくろでは\n１７００どの　ほのおが　もえている。"
        jp_kanji:
          sun: "木の実や　獲物を　捕まえると\n炎を　吹いて　ウェルダンぐらいに\nなるまで　焼きあげてから　ガブリ。"
          moon: "平均体温　７～８００度。\n体内に　ある　炎袋では\n１７００度の　炎が　燃えている。"
        en:
          sun: "When it catches prey or finds berries, it\nbreathes fire on them until they’re well done,\nand then it gobbles them up."
          moon: "Its average body temperature is between 1,300\nand 1,500 degrees Fahrenheit. In its internal\nflame sac, temperatures reach 3,000 degrees."
        fr:
          sun: "Après avoir trouvé une proie et quelques Baies,\nil crache du feu jusqu’à ce qu’elles soient cuites\nà point avant de les gober."
          moon: "Sa température moyenne est entre 700 et\n800 °C. La poche de feu à l’intérieur de son\ncorps peut atteindre 1 700 °C."
        it:
          sun: "Arrostisce con le sue fiamme le prede che\ncattura e le bacche che raccoglie finché non\nsono ben cotte e poi le mangia."
          moon: "La sua temperatura corporea media oscilla tra\ni 700 e gli 800 °C. In una sacca all’interno del\nsuo corpo ardono fiamme a 1.700 °C."
        de:
          sun: "Hat es Beeren oder Pokémon erbeutet, speit es\nso lange Feuer, bis beides gut durchgebraten\nist. Danach beißt es beherzt zu."
          moon: "Seine Körpertemperatur beträgt im Durchschnitt\n700 bis 800 °C. In einem Flammensack im\nKörper erzeugt es ein Feuer von 1 700 °C."
        es:
          sun: "Antes de hincarle el diente a algo, ya sean\nbayas o alguna presa, lo cocina con sus llamas\nhasta que queda bien hecho."
          moon: "La temperatura corporal de este Pokémon ronda\nlos 700 u 800 °C. Las llamas que almacena en\nsu bolsa interior pueden llegar a los 1700 °C."
        ko:
          sun: "나무열매나 먹이를 잡으면\n불꽃을 뿜어 웰던 정도가\n될 때까지 구운 다음 꿀꺽한다."
          moon: "평균 체온 7~800도.\n체내에 있는 불꽃 주머니에서는\n1700도의 불꽃이 타고 있다."
        zh_simp:
          sun: "如果寻获树果或是捉到猎物，\n就会喷出火焰将其烤至完全熟透，\n之后大口大口吃掉。"
          moon: "平均体温７００～８００度。\n在体内的火袋里熊熊燃烧着\n１７００度的火焰。"
        zh_trad:
          sun: "如果尋獲樹果或捕捉到獵物，\n就會噴出火焰將其烤至熟透，\n然後大口吃掉。"
          moon: "平均體溫７００～８００度。\n在體內的火袋裡熊熊燃燒著\n１７００度的火焰。"
