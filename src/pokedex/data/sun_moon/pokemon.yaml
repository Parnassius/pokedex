      descriptions:
        jp_kana:
          sun: "メガトンきゅうの　パンチを　はなち\nたちふさがる　てきを　ちへいせんの\nかなたまで　ぶっとばすのだ。"
          moon: "ダンプさえ　かるがる　もちあげる。\nただし　ゆびさきは　ぶきようで\nこまかい　しごとは　まるで　むり。"
        jp_kanji:
          sun: "メガトン級の　パンチを　放ち\n立ちふさがる　敵を　地平線の\n彼方まで　ぶっ飛ばすのだ。"
          moon: "ダンプさえ　軽々　持ち上げる。\nただし　指先は　不器用で\n細かい　仕事は　まるで　無理。"
        en:
          sun: "It unleashes megaton-level punches that send\nopponents flying clear over the horizon."
          moon: "It can lift heavy loads with the greatest of ease.\nIt can even heft dump trucks. But its clumsy\nfingers prevent it from doing any precision work."
        fr:
          sun: "Il est capable de donner des coups de poing\nd’une puissance d’une mégatonne, qui envoient\nses adversaires voler jusqu’à l’horizon."
          moon: "Il soulève sans effort les plus gros camions à\nbenne. Mais il n’est pas habile de ses mains,\net est incapable de faire un travail de précision."
        it:
          sun: "Sferra pugni di una potenza equivalente a\nun megaton che fanno volare oltre l’orizzonte\ni nemici che gli si parano davanti."
          moon: "Può sollevare senza sforzo anche un camion, ma\nè piuttosto maldestro nei lavori di precisione."
        de:
          sun: "Gegner, die sich ihm in den Weg stellen, werden\nmit einem Faustschlag, dessen Wucht 1 Million\nTonnen übersteigt, gen Horizont geschleudert."
          moon: "Es kann mühelos Kipplaster hochheben. Da es\njedoch Grobmotoriker ist, sollte man ihm keine\nArbeit geben, die Fingerspitzengefühl erfordert."
        es:
          sun: "Puede hacer que sus rivales se pierdan en el\nhorizonte con puñetazos que llegan a alcanzar\nhasta un megatón de potencia."
          moon: "Puede levantar camiones pesados con gran\nfacilidad, pero cuando tiene que hacer algún\ntrabajo más delicado, fracasa estrepitosamente."
        ko:
          sun: "메가톤급의 펀치를 날려\n앞을 가로막는 적을 지평선\n너머까지 날려버린다."
          moon: "덤프트럭마저 가볍게 들어 올린다.\n그러나 손끝은 둔해서\n세밀한 작업은 전혀 못 한다."
        zh_simp:
          sun: "使出百万吨级的拳击，\n将阻挡的敌人击飞到\n地平线的另一端。"
          moon: "即使是翻斗车也能轻松举起。\n但是手指很笨拙，\n所以细微的工作完全不行。"
        zh_trad:
          sun: "能使出百萬噸級的拳擊，\n將擋路的敵人擊飛到\n地平線的另一端。"
          moon: "即使是大卡車也能輕鬆舉起。\n但是手指很笨拙，\n所以細微的工作完全不行。"
