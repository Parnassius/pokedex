pancham:
  species_id: 674
  names:
    jp_kana: ヤンチャム
    jp_kanji: ヤンチャム
    en: Pancham
    fr: Pandespiègle
    it: Pancham
    de: Pam-Pam
    es: Pancham
    ko: 판짱
    zh_simp: 顽皮熊猫
    zh_trad: 頑皮熊貓
  forms:
    pancham:
      form_id: 0
      base_stats:
        hp: 67
        attack: 82
        defense: 62
        special_attack: 46
        special_defense: 48
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          sun: "おやぶんの　ように　したっている\nゴロンダの　しぐさを　まねながら\nいちにんまえに　なっていくぞ。"
          moon: "くわえている　はっぱに　いみは　なく\nただの　かっこつけ。　やんちゃなので\nしろうとトレーナーには　むかない。"
        jp_kanji:
          sun: "親分の　ように　慕っている\nゴロンダの　仕草を　真似ながら\n一人前に　なっていくぞ。"
          moon: "咥えている　葉っぱに　意味は　なく\nただの　かっこつけ。　やんちゃなので\n素人トレーナーには　向かない。"
        en:
          sun: "It grows up imitating the behavior of Pangoro,\nwhich it looks up to as a leader."
          moon: "There’s no point to the leaf in its mouth, aside\nfrom an effort to look cool. It’s mischievous,\nso it’s not well suited to inexperienced Trainers."
        fr:
          sun: "Il grandit en copiant les poses et les mimiques\nde ce gros cador de Pandarbare, qu’il considère\ncomme son mentor."
          moon: "C’est juste pour se donner un air qu’il mâche\nune feuille. Comme c’est un petit galopin,\nil est déconseillé aux Dresseurs inexpérimentés."
        it:
          sun: "Aspira a diventare un Pokémon rispettato e\ntemuto imitando Pangoro, che considera il suo\nmentore."
          moon: "Tiene in bocca una foglia per darsi un tono.\nEssendo piuttosto birichino, non è molto adatto\nper gli Allenatori inesperti."
        de:
          sun: "Pandagro ist sein großes Vorbild, das es stets\nnachahmt. Dabei ist es so eifrig, dass es daran\nwächst."
          moon: "Das Kauen auf einem Blatt ist sein Marken-\nzeichen. Dieses sehr ungezogene Pokémon\ndürfte frischgebackene Trainer überfordern."
        es:
          sun: "En su afán por madurar, toma como modelo a\nPangoro, hacia el que profesa sumo respeto.\nPara él es como una especie de mentor."
          moon: "Solo masca la hoja que lleva porque le gusta el\naire que le confiere. Su carácter pícaro lo hace\nincompatible con los Entrenadores novatos."
        ko:
          sun: "형님처럼 의지하며 따르는\n부란다의 행동을 따라 하면서\n성장해 간다."
          moon: "물고 있는 나뭇잎은 특별한 의미 없이\n그냥 멋이다. 개구쟁이라\n초급 트레이너에게는 적합하지 않다."
        zh_simp:
          sun: "模仿像头领那样敬仰着的\n流氓熊猫的举止，\n渐渐变得独当一面。"
          moon: "嘴里叼着的叶子没有任何意义，\n只是为了装酷。因为很顽皮，\n所以不适合没经验的训练家。"
        zh_trad:
          sun: "不斷模仿被自己當成老大哥般\n敬仰著的流氓熊貓的舉止，\n由此漸漸變得獨當一面。"
          moon: "嘴裡叼著的葉子沒有任何意義，\n只是為了裝酷。因為很頑皮，\n所以不適合沒經驗的訓練家。"
pangoro:
  species_id: 675
  names:
    jp_kana: ゴロンダ
    jp_kanji: ゴロンダ
    en: Pangoro
    fr: Pandarbare
    it: Pangoro
    de: Pandagro
    es: Pangoro
    ko: 부란다
    zh_simp: 流氓熊猫
    zh_trad: 流氓熊貓
  forms:
    pangoro:
      form_id: 0
      base_stats:
        hp: 95
        attack: 124
        defense: 78
        special_attack: 69
        special_defense: 71
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - dark
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          sun: "うでっぷしが　じまんで　ごうかい。\nゴロンダの　トレーナーに　なりたいなら\nこぶしで　かたりあう　しかない。"
          moon: "たけの　はっぱの　ゆれで　てきの\nうごきを　よむ。　ケンカっぱやいが\nなかまへの　じょうは　あつい。"
        jp_kanji:
          sun: "腕っぷしが　自慢で　豪快。\nゴロンダの　トレーナーに　なりたいなら\n拳で　語り合う　しかない。"
          moon: "竹の　葉っぱの　揺れで　敵の\n動きを　読む。　ケンカっ早いが\n仲間への　情は　厚い。"
        en:
          sun: "It boasts superb physical strength. Those who\nwish to become Pangoro’s Trainer have no\nchoice but to converse with their fists."
          moon: "From the slight twitches of its bamboo leaf, it\ndeduces its opponent’s movements. It’s eager to\ntussle but kindhearted toward its companions."
        fr:
          sun: "Ses gros bras sont sa plus grande fierté. Si vous\nvoulez devenir un Dresseur de Pandarbare,\nil va falloir jouer des poings !"
          moon: "Il peut détecter les mouvements ennemis grâce\naux vibrations de sa feuille. Avec ses amis,\nce grand lunatique a en fait le cœur sur la main."
        it:
          sun: "Va molto fiero dell’enorme forza delle sue\nbraccia. Gli Allenatori sono avvisati: la lingua\nche capisce meglio è quella dei pugni."
          moon: "È un attaccabrighe, ma è anche generoso con gli\namici. Prevede i movimenti dei nemici dalle\nvibrazioni della foglia che tiene in bocca."
        de:
          sun: "Seine mächtigen Arme sind sehr imposant.\nWer als Pandagro-Trainer Karriere machen will,\nmuss wohl die Fäuste sprechen lassen!"
          moon: "Mit seinem Blatt erspürt es die Bewegungen\ndes Gegners. Es ist sehr grob und streitlustig,\nhält aber stets zu seinen Artgenossen."
        es:
          sun: "Su aspecto imponente rinde justicia a la fuerza\nde la que hace gala. Todo aspirante a entrenarlo\ndeberá entender el lenguaje de los puños."
          moon: "Predice los movimientos del enemigo mediante\nsu hoja. Pese a su carácter temperamental, se\nmuestra muy afable con sus compañeros."
        ko:
          sun: "완력이 자랑거리이며 호쾌하다.\n부란다의 트레이너가 되고 싶으면\n주먹으로 이야기하는 수밖에 없다."
          moon: "대나무 잎의 움직임으로 적의\n행동을 읽는다. 싸움꾼이지만\n동료에 대한 정은 두텁다."
        zh_simp:
          sun: "以腕力为傲，很豪迈。\n想要成为流氓熊猫的训练家的话，\n只能用拳头来和它磋商。"
          moon: "通过竹叶的摇摆来洞悉\n敌人的动向。很粗暴，\n但是对伙伴的感情很深厚。"
        zh_trad:
          sun: "以腕力為傲，個性豪邁。\n想要成為流氓熊貓的訓練家的話，\n只能用拳頭來和牠交心。"
          moon: "透過竹葉的擺動來洞悉\n敵人的動向。性格很粗暴，\n但是對夥伴的感情很深厚。"
