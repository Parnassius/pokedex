    minior_red_core:
      form_id: 7
      names:
        jp_kana: あかいろのコア
        jp_kanji: あかいろのコア
        en: Red Core
        fr: Noyau Rouge
        it: Nucleo Rosso
        de: Roter Kern
        es: Núcleo Rojo
        ko: 빨간색 코어
        zh_simp: 红色核心
        zh_trad: 紅色核心
      base_stats:
        hp: 60
        attack: 100
        defense: 60
        special_attack: 100
        special_defense: 60
        speed: 120
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - mineral
      abilities:
        - shields_down
      descriptions:
        jp_kana:
          sun: "たいきちゅうの　チリを　くっている。\nくった　チリの　せいぶんに　よって\nコアの　いろあいが　きまる。"
          moon: "コアが　むきだしの　ままだと　じきに\nしょうめつ。　いそいで　ボールに\nいれれば　いきながらえると　いう。"
        jp_kanji:
          sun: "大気中の　チリを　喰っている。\n喰った　チリの　成分に　よって\nコアの　色合いが　決まる。"
          moon: "コアが　むきだしの　ままだと　じきに\n消滅。　急いで　ボールに\n入れれば　生きながらえると　いう。"
        en:
          sun: "It eats dust in the atmosphere. The composition\nof the dust determines the color of its core."
          moon: "If its core stays exposed, it will soon die off.\nIt’s possible that it may survive if it’s put into a\nPoké Ball quickly enough."
        fr:
          sun: "Il mange la poussière flottant dans l’atmosphère.\nLa couleur de son noyau change en fonction de\nla composition de la poussière ingérée."
          moon: "Si son noyau est exposé, il se désagrège petit\nà petit. Il peut survivre s’il s’abrite rapidement\nà l’intérieur d’une Poké Ball."
        it:
          sun: "Si nutre del pulviscolo atmosferico e il suo\nnucleo cambia colore a seconda degli elementi\nassimilati."
          moon: "Se il nucleo rimane esposto all’aria, inizia a\ndisgregarsi e per mantenerlo in vita bisogna\nfarlo entrare immediatamente in una Poké Ball."
        de:
          sun: "Es ernährt sich von Partikeln in der Atmosphäre.\nDie Farbe seines Kerns ist abhängig von der\nZusammensetzung der Partikeln, die es frisst."
          moon: "Ist sein Kern entblößt, erlischt es schon bald.\nDies lässt sich jedoch hinauszögern, indem man\nes schnell in einen Pokéball steckt."
        es:
          sun: "Se alimenta de las partículas que flotan en la\natmósfera. El color de su núcleo depende de la\ncomposición de estas."
          moon: "Si su núcleo queda expuesto, su vida corre\npeligro, aunque puede sobrevivir si se introduce\nrápidamente dentro de una Poké Ball."
        ko:
          sun: "대기 중의 먼지를 먹고 있다.\n먹은 먼지의 성분에 따라\n코어의 색조가 정해진다."
          moon: "코어가 드러난 채로 있으면 금방\n소멸해버린다. 서둘러 볼에\n넣으면 살아남을 수 있다고 한다."
        zh_simp:
          sun: "吃大气中的尘埃。\n根据吃下的尘埃的成分，\n来决定内核的色调。"
          moon: "内核如果一直暴露着，\n就会很快消散。听说如果赶紧\n放入精灵球，就能活下来。"
        zh_trad:
          sun: "會吃下大氣中的塵埃，\n並依照吃下的塵埃成分\n來決定核心的色調。"
          moon: "核心如果一直處在外露狀態，\n就會很快消散。聽說趕緊\n放進精靈球就能讓牠活下來。"
