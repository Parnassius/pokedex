        jp_kana:
          sun: "はなのミツや　かふんが　エサ。\nオーラを　かんじる　ちからを　もち\nさきそうな　はなを　みわけている。"
          moon: "はなに　にた　オーラを　もつ　ひとの\nあたまの　うえには　たくさんの\nアブリーが　あつまってくるよ。"
        jp_kanji:
          sun: "花のミツや　花粉が　餌。\nオーラを　感じる　力を　持ち\n咲きそうな　花を　見分けている。"
          moon: "花に　似た　オーラを　持つ　人の\n頭の　上には　たくさんの\nアブリーが　集まってくるよ。"
        en:
          sun: "It feeds on the nectar and pollen of flowers.\nBecause it’s able to sense auras, it can identify\nwhich flowers are about to bloom."
          moon: "Myriads of Cutiefly flutter above the heads of\npeople who have auras resembling those\nof flowers."
        fr:
          sun: "Il se nourrit du nectar et du pollen des fleurs.\nAyant la capacité de percevoir l’aura des\nchoses, il sait quelles fleurs vont bientôt éclore."
          moon: "Ils volettent gaiement en nombre au-dessus de\nla tête de certaines personnes dont l’aura\ns’apparenterait à celle d’une fleur."
        it:
          sun: "Si nutre di nettare e polline. È in grado di\npercepire l’aura di tutte le cose intorno a sé\ne avverte quando un fiore sta per sbocciare."
          moon: "Svolazzano numerosi sulla testa di persone\nche emanano un’aura somigliante in qualche\nmodo a quella dei fiori."
        de:
          sun: "Es ernährt sich von Blütenstaub und Honig. Da\nes die Aura von Lebewesen wahrnehmen kann,\nspürt es, wenn eine Blume bald blühen wird."
          moon: "Über den Köpfen von Menschen, deren Auren\ndenen von Blumen gleichen, finden sich\nzahlreich Wommel ein."
        es:
          sun: "Se alimenta de néctar y polen. Es capaz de\ndetectar los capullos que están a punto de\nabrirse."
          moon: "Revolotean en bandadas en torno a la cabeza de\naquellas personas que cuentan con un aura\nsimilar a la de las flores."
        ko:
          sun: "꽃의 꿀이나 꽃가루가 먹이다.\n오라를 느끼는 힘을 지니고 있어\n필 것 같은 꽃을 구별한다."
          moon: "꽃을 닮은 오라를 가진 사람의\n머리 위에는 많은\n에블리가 모여든다."
        zh_simp:
          sun: "花蜜和花粉是它的食物。\n拥有感知气场的力量，\n能分辨出要开放的花。"
          moon: "拥有像花一样的气场的人，\n头上会有许多萌虻聚集过来哦。"
        zh_trad:
          sun: "花蜜和花粉是牠的食物。\n擁有感知氣場的力量，\n能分辨出要綻放的花。"
          moon: "擁有像花一般氣場的人，\n頭上會有許多萌虻聚集過來哦。"
