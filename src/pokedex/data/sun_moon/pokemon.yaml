      descriptions:
        jp_kana:
          sun: "くちから　はく　ドロは　かたまると\nあめかぜにも　つよいので　むかしの\nいえの　かべには　よくぬられている。"
          moon: "どろを　まとった　おもたい　キックが\nとくい　こうげき。　おおがたトラックも\nかんたんに　スクラップに　するぞ。"
        jp_kanji:
          sun: "口から　吐く　泥は　固まると\n雨風にも　強いので　昔の\n家の　壁には　よく塗られている。"
          moon: "泥を　まとった　重たい　キックが\n得意　攻撃。　大型トラックも\n簡単に　スクラップに　するぞ。"
        en:
          sun: "It spits a mud that provides resistance to both\nwind and rain, so the walls of old houses were\noften coated with it."
          moon: "Its heavy, mud-covered kicks are its best\nmeans of attack, and it can reduce large trucks\nto scrap without breaking a sweat."
        fr:
          sun: "Une fois sèche, la boue qu’il crache reste solide\nmême sous le vent et la pluie. Elle était autrefois\ntrès utilisée dans les revêtements muraux."
          moon: "C’est le spécialiste du gros coup de sabot\nboueux. Grâce à cela, il peut facilement réduire\nun camion entier en un tas de ferraille."
        it:
          sun: "Una volta essiccato, il fango che produce\ndalla bocca resiste alla pioggia e al vento, tanto\nche un tempo vi si rivestivano i muri delle case."
          moon: "È particolarmente bravo a sferrare calci con le\nzampe infangate, così potenti da ridurre in un\nammasso di ferraglia persino un grosso camion."
        de:
          sun: "Der Schlamm, den es ausspuckt, schützt gegen\nWind und Wetter, wenn er hart wird. Deshalb hat\nman früher auch Hauswände damit verstärkt."
          moon: "Sein wohl bester Angriff ist ein heftiger,\nschlammiger Tritt. Damit kann es auch\ngroße Laster mühelos verschrotten."
        es:
          sun: "El lodo que segrega por la boca se vuelve\nimpermeable al secarse, por lo que solía usarse\ncomo capa aislante en las paredes de las casas."
          moon: "Su especialidad son los ataques a base de\npatadas con lodo endurecido, con las que puede\nreducir a chatarra un camión de gran tamaño."
        ko:
          sun: "입에서 뱉어내는 진흙이 굳으면\n비바람에도 끄떡없어 옛날\n집의 벽에는 자주 발려 있었다."
          moon: "진흙을 두른 묵직한 킥이\n특기 공격. 대형 트럭도\n간단하게 고철이 되고 만다."
        zh_simp:
          sun: "从嘴里吐出的泥凝固后，\n即便是风雨也能经得住，\n所以常被涂在以前家里的外墙上。"
          moon: "它拿手的攻击方式是\n用沾满了泥的沉重的脚踢对手。\n即使是大型卡车也能轻松踢成废铁。"
        zh_trad:
          sun: "從嘴裡吐出的泥凝固後，\n即使是風雨也能擋得住，\n所以過去常被塗在家屋的外牆上。"
          moon: "牠擅長利用沾滿了泥的\n沉重腳踢來進行攻擊。\n即使是大型貨車也能輕鬆踢成廢鐵。"
