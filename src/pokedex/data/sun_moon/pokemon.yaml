      types:
        - water
        - ice
      egg_groups:
        - water_3
      abilities:
        - shell_armor
        - skill_link
      hidden_ability: overcoat
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          sun: "かたいカラは　ナパームだん　でも\nくだけない。　カラの　なかみの\nしょうたいは　いまだ　ふめい。"
          moon: "カラから　ぬけた　トゲで　つくった\nヤリが　しゅりょうみんぞくの\nこふんから　たくさん　しゅつどする。"
        jp_kanji:
          sun: "硬い殻は　ナパーム弾　でも\n砕けない。　カラの　中味の\n正体は　未だ　不明。"
          moon: "殻から　抜けた　トゲで　造った\nヤリが　狩猟民族の\n古墳から　たくさん　出土する。"
        en:
          sun: "Its hard shell cannot be shattered—not even\nby a bomb. The contents of the shell\nremain unknown."
          moon: "Excavation of the tombs of ancient hunting\ntribes has turned up many spears tipped with\nspikes that had fallen off this Pokémon’s shell."
        fr:
          sun: "Sa carapace peut même résister à une bombe\nau napalm. Personne ne sait ce qu’elle dissimule."
          moon: "Les archéologues qui explorent les tombes de\nchasseurs primitifs trouvent souvent des lances\nfaites avec des épines tombées de sa carapace."
        it:
          sun: "Il suo guscio non può essere scalfito neanche\nda una bomba. Nessuno sa cosa si cela\nal suo interno."
          moon: "Nei tumuli di popoli dediti alla caccia sono state\nrinvenute lance fabbricate con aculei provenienti\ndal guscio di questo Pokémon."
        de:
          sun: "Seine Schale ist so hart, dass nicht einmal eine\nBombe sie zerschmettern kann. Bis heute weiß\nniemand, wie das Innere seiner Schale aussieht."
          moon: "In Gräbern alter Jägervölker werden oft Speere\nausgegraben, welche aus abgebrochenen\nStacheln seiner Schale gefertigt wurden."
        es:
          sun: "Su dura concha es capaz de aguantar el impacto\nde una bomba. La forma de su cuerpo, oculto en\nel interior, sigue siendo un misterio."
          moon: "Se han desenterrado numerosas lanzas hechas\ncon pinchos de la concha de Cloyster. Eran\nutilizadas por antiguos pueblos de cazadores."
        ko:
          sun: "단단한 껍질은 폭탄이라도\n깨지지 않는다. 껍질 속의\n정체는 아직 밝혀지지 않았다."
          moon: "껍질에서 떨어진 가시로 만든\n창이 수렵 민족의\n고분에서 많이 출토되었다."
        zh_simp:
          sun: "坚硬的外壳连燃烧弹也无法击碎。\n壳中的正身至今不明。"
          moon: "从狩猎民族的古墓中大量\n出土了使用壳上拔下的尖刺\n制造而成的长矛。"
        zh_trad:
          sun: "堅硬的外殼連凝固汽油彈也無法擊碎。\n殼裡的真面目至今仍然不得而知。"
          moon: "從狩獵民族的古墓中大量\n出土了使用殼上拔下的尖刺\n製造而成的長矛。"
