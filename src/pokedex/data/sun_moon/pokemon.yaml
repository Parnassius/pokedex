        - fairy
      egg_groups:
        - fairy
      abilities:
        - cute_charm
        - magic_guard
      hidden_ability: friend_guard
      held_items:
        rare: moon_stone
      descriptions:
        jp_kana:
          sun: "あいくるしい　しぐさと　すがたで\nろうにゃくなんにょ　とわずに\nにんきだが　そのかずは　すくない。"
          moon: "まんげつの　ばんに　あつまって\nなかまと　ダンス。　そのしゅういは\nいじょうな　じばに　つつまれる。"
        jp_kanji:
          sun: "愛くるしい　仕草と　姿で\n老若男女　問わずに\n人気だが　その数は　少ない。"
          moon: "満月の　晩に　集まって\n仲間と　ダンス。　その周囲は\n異常な　磁場に　包まれる。"
        en:
          sun: "Its adorable behavior and appearance make it\npopular with men and women, young and old.\nIts numbers are few, however."
          moon: "On nights with a full moon, they gather together\nand dance. The surrounding area is enveloped\nin an abnormal magnetic field."
        fr:
          sun: "Son apparence et ses mimiques charmantes lui\nont valu de nombreux fans de tous âges, mais\nil reste un Pokémon relativement rare."
          moon: "Ce Pokémon retrouve ses congénères et danse\nlors des nuits de pleine lune. Un champ\nmagnétique mystérieux s’étend alors alentour."
        it:
          sun: "È amato da donne e uomini di tutte le età per\nil suo aspetto adorabile e le sue graziose\nmovenze. Ne esistono solo pochi esemplari."
          moon: "Nelle notti di luna piena, i Clefairy si radunano\nper danzare. Intorno a loro si crea un misterioso\ncampo magnetico."
        de:
          sun: "Dank seiner verspielten Art und seines süßen\nAussehens ist es bei Jung und Alt sehr beliebt.\nDieses Pokémon ist jedoch selten."
          moon: "Bei Vollmond versammeln sie sich und tanzen\ngemeinsam. Um sie herum entsteht dadurch\nein ungewöhnliches Magnetfeld."
        es:
          sun: "Tanto niños como adultos de todas las edades\nlos encuentran adorables por su aspecto y su\ncomportamiento. No quedan muchos ejemplares."
          moon: "Cuando hay luna llena, los Clefairy salen en\ngrupo a bailar. A su alrededor se genera un\nmisterioso campo magnético."
        ko:
          sun: "사랑스러운 몸짓과 모습으로\n남녀노소 가리지 않고\n인기가 있지만, 그 수는 적다."
          moon: "보름달 밤에 모여서\n동료와 춤을 춘다. 그 주변은\n이상한 자기장으로 둘러싸인다."
        zh_simp:
          sun: "因为可爱的举止和样子，\n不论男女老幼都很喜欢它。\n但数量稀少。"
          moon: "在月圆之夜聚集，和伙伴一起跳舞。\n那周围也会被异常的磁场包围。"
        zh_trad:
          sun: "因為可愛的舉止和模樣，\n不論男女老幼都很喜歡牠。\n但數量很稀少。"
          moon: "在月圓之夜聚集，和夥伴一起跳舞。\n周圍被異常的磁場包圍著。"
