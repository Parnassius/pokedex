      descriptions:
        jp_kana:
          sun: "どんなに　てまと　おかねを　かけても\nひとの　てで　さかせるよりも　やせいで\nさく　はなの　ほうが　うつくしい。"
          moon: "パートナーとなる　♂が　できた\nとたんに　うつくしい　はなは\nくすんで　しおれ　かれていく。"
        jp_kanji:
          sun: "どんなに　手間と　お金を　かけても\n人の　手で　咲かせるよりも　野生で\n咲く　花の　ほうが　美しい。"
          moon: "パートナーとなる　♂が　できた\n途端に　美しい　花は\nくすんで　しおれ　枯れていく。"
        en:
          sun: "No matter how much time and money is spent\nraising it, its flowers are the most beautiful\nwhen they bloom in the wild."
          moon: "As soon as it finds a male to be its partner,\nthe beautiful flower on its head darkens,\ndroops, and withers away."
        fr:
          sun: "La main la plus verte au monde ne saurait faire\néclore une fleur de Fragilady aussi belle que\ncelles qui s’épanouissent à l’état sauvage."
          moon: "Dès lors qu’une Fragilady trouve un compagnon\nmâle, sa si jolie fleur se dessèche, se flétrit\net finit par se faner."
        it:
          sun: "Per quanto si possano impiegare tempo, denaro\ne fatica nella cura di questo Pokémon, il suo\nfiore sarà sempre più bello se sboccia in natura."
          moon: "Appena trova un compagno, il meraviglioso fiore\nche ha sulla testa appassisce e si secca."
        de:
          sun: "Egal, wie viel Mühe und Geld investiert wird,\nsein Blumenschmuck ist wild gewachsen immer\nschöner als von Menschenhand gezüchtet."
          moon: "Sobald es einen Partner gefunden hat, verwelkt\nsein wunderschöner Blumenschmuck."
        es:
          sun: "Por muchos esfuerzos o dinero que destine la\ngente para hacerla florecer, siempre es más\nbella la flor que brota en un ejemplar salvaje."
          moon: "Nada más encontrar un compañero, su bella flor\ncomienza a languidecer y poco a poco se va\nmarchitando sin remedio."
        ko:
          sun: "아무리 시간과 돈을 들여도\n사람 손으로 피우는 것보다\n야생에서 피는 꽃이 더 아름답다."
          moon: "파트너인 수컷이 생기면\n아름다운 꽃은 곧\n생기 없이 시들어 말라간다."
        zh_simp:
          sun: "无论花多少工夫和金钱，\n比起借助人工手段让它开放，\n在野外绽放的花更美。"
          moon: "一旦找到了♂作为同伴，\n美丽的花就会渐渐黯淡，\n变得枯萎。"
        zh_trad:
          sun: "無論花多少功夫和金錢，\n比起借助人工手段培育出的花，\n在野外綻放的花更美。"
          moon: "一旦和♂成為伴侶，\n美麗的花就會漸漸黯淡，\n變得枯萎。"
