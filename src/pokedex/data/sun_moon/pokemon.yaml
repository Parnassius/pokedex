      abilities:
        - stench
        - sticky_hold
      hidden_ability: aftermath
      held_items:
        rare: silk_scarf
      descriptions:
        jp_kana:
          sun: "ふえいせいな　ばしょが　すき。\nアローラでは　よく　ベトベターに\nおいまわされる　すがたを　みかける。"
          moon: "まんぷくまで　ゴミを　くらうと\nくちから　どくガスを　はきだす。\nうっかり　かぐと　そく　にゅういん。"
        jp_kanji:
          sun: "不衛生な　場所が　好き。\nアローラでは　よく　ベトベターに\n追いまわされる　姿を　みかける。"
          moon: "満腹まで　ゴミを　喰らうと\n口から　毒ガスを　吐きだす。\nうっかり　かぐと　即　入院。"
        en:
          sun: "Unsanitary places are what they like best.\nThey can be spotted in Alola, often with Grimer\nin hot pursuit."
          moon: "It gorges on trash until its stomach is full. Then\nit belches toxic gas. An unlucky whiff of gas will\nput a person in the hospital."
        fr:
          sun: "Il affectionne particulièrement les endroits\ninsalubres. À Alola, il n’est pas rare de voir\ndes Tadmorv courir après des Miamiasme."
          moon: "Une fois qu’il a gobé assez d’ordures, il relâche\nun gaz toxique par la bouche. Ne le respirez\npas, surtout s’il n’y a aucun hôpital à la ronde."
        it:
          sun: "Predilige luoghi insalubri. Nella regione\ndi Alola lo si vede spesso inseguito da\nGrimer."
          moon: "Quando si rimpinza di spazzatura esala dalle\nfauci un gas tossico. Chi lo respira finisce\nimmediatamente all’ospedale."
        de:
          sun: "Es liebt schmutzige Orte. In Alola sieht man oft,\nwie es von Sleima verfolgt wird."
          moon: "Wenn es sich mit Müll vollstopft, rülpst es giftige\nGase. Wer diese unabsichtlich einatmet, muss\nsofort ins Krankenhaus."
        es:
          sun: "Le gustan los lugares sucios. En Alola se lo\nsuele ver junto a Grimer, que lo sigue a todas\npartes."
          moon: "Tras atiborrarse de basura, eructa unos gases\nvenenosos capaces de llevar a cualquiera al\nhospital en caso de inhalarlos sin querer."
        ko:
          sun: "비위생적인 곳을 좋아한다.\n알로라에서는 자주 질퍽이에게\n쫓겨 다니는 모습을 볼 수 있다."
          moon: "배가 부를 때까지 쓰레기를 먹은 후\n입에서 독가스를 토해낸다.\n실수로 맡으면 즉시 입원해야 한다."
        zh_simp:
          sun: "喜欢不卫生的场所。\n在阿罗拉经常可以发现\n被臭泥追着到处跑的样子。"
          moon: "吃垃圾吃到肚子鼓鼓之后，\n从嘴里喷出毒瓦斯来。\n不小心闻到的话要立即进医院。"
        zh_trad:
          sun: "喜歡不衛生的地方。\n在阿羅拉經常可以看見牠\n被臭泥追著到處跑的樣子。"
          moon: "吃垃圾吃到肚子鼓鼓之後，\n便會從嘴裡噴出毒瓦斯來。\n不小心聞到的話就得立即進醫院。"
