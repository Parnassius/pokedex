sableye:
  species_id: 302
  names:
    jp_kana: ヤミラミ
    jp_kanji: ヤミラミ
    en: Sableye
    fr: Ténéfix
    it: Sableye
    de: Zobiris
    es: Sableye
    ko: 깜까미
    zh_simp: 勾魂眼
    zh_trad: 勾魂眼
  forms:
    sableye:
      form_id: 0
      base_stats:
        hp: 50
        attack: 75
        defense: 75
        special_attack: 65
        special_defense: 65
