      abilities:
        - overgrow
      hidden_ability: long_reach
      descriptions:
        jp_kana:
          sun: "けいかいしんが　つよい。　ひるは\nこうごうせいで　ちからを　ためて\nよるに　なったら　かつどうかいし。"
          moon: "いっさい　おとを　たてず　かっくうし\nてきに　きゅうせっきん。　きづかぬまに\nきょうれつな　けりを　あびせる。"
        jp_kanji:
          sun: "警戒心が　強い。　昼は\n光合成で　力を　溜めて\n夜になったら　活動開始。"
          moon: "一切　音を　立てず　滑空し\n敵に　急接近。　気づかぬ間に\n強烈な　蹴りを　浴びせる。"
        en:
          sun: "This wary Pokémon uses photosynthesis to\nstore up energy during the day, while becoming\nactive at night."
          moon: "Silently it glides, drawing near its targets. Before\nthey even notice it, it begins to pelt them with\nvicious kicks."
        fr:
          sun: "Ce Pokémon ne baisse jamais sa garde.\nPendant la journée, il accumule de l’énergie par\nphotosynthèse, pour mieux agir la nuit venue."
          moon: "Il s’approche de ses ennemis en glissant dans\nles airs sans faire le moindre bruit, puis leur\nassène de puissants coups de patte."
        it:
          sun: "Questo Pokémon è sempre all’erta.\nDi giorno accumula energia tramite fotosintesi\nper poi passare all’azione di notte."
          moon: "Si avvicina ai nemici ignari planando su di loro\nsenza produrre il minimo rumore e li tempesta\ndi poderosi calci."
        de:
          sun: "Ein wachsames und nachtaktives Pokémon.\nTagsüber sammelt es per Photosynthese\nKräfte, um fit für die Nacht zu sein."
          moon: "Nachdem es sich seinem Feind lautlos\nim Gleitflug genähert hat, wird dieser mit\nheftigen Tritten völlig überrascht."
        es:
          sun: "Es cauteloso, desconfiado y de naturaleza\nnocturna. Durante el día acumula energía\nmediante la fotosíntesis."
          moon: "Se aproxima a sus enemigos planeando por el\naire sin hacer el menor ruido y les propina unas\npatadas de lo más poderosas."
        ko:
          sun: "경계심이 강하다. 낮에는\n광합성으로 힘을 비축하고\n밤이 되면 활동을 개시한다."
          moon: "전혀 소리를 내지 않고 활공하여\n적에게 빠르게 접근한다. 눈치채기 전에\n강렬한 발차기를 퍼붓는다."
        zh_simp:
          sun: "戒备心很强。\n白天利用光合作用积蓄力量，\n到了晚上就开始活动。"
          moon: "不发出一丝声响地滑翔，\n急速接近敌人。在对方还未发觉时，\n就使出猛烈的脚踢。"
        zh_trad:
          sun: "警戒心很強。\n白天利用光合作用積蓄力量，\n到了夜晚才開始活動。"
          moon: "能不發出一絲聲響地滑翔，\n極速接近敵人。在對方還未發覺時，\n使出猛烈的腳踢來攻擊。"
