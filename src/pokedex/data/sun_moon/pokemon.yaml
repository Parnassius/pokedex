      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - sap_sipper
        - hydration
      hidden_ability: gooey
      descriptions:
        jp_kana:
          sun: "すごく　ひとなつっこい　ポケモン。\nかまわないでいると　さみしくて\nヌルヌルの　なみだを　ながし　なく。"
          moon: "おとなしいからと　からかうと\nツノで　おもいきり　つかれ\nふとい　しっぽで　なぎはらわれる。"
        jp_kanji:
          sun: "すごく　人懐っこい　ポケモン。\n構わないでいると　寂しくて\nヌルヌルの　涙を　流し　鳴く。"
          moon: "大人しいからと　からかうと\n角で　思い切り　突かれ\n太い　尻尾で　薙ぎ払われる。"
        en:
          sun: "An amazingly friendly Pokémon, but if left to\nitself, loneliness overcomes it, and it oozes\ngooey tears."
          moon: "It gets picked on because it’s meek. But then,\nwhoever teased it gets to feel the full force of\nits horns and a good swatting from its thick tail."
        fr:
          sun: "Ce Pokémon adore la compagnie humaine.\nSi son Dresseur ne lui donne pas assez d’amour,\nil pleure à grosses larmes visqueuses."
          moon: "Ceux qui l’importunent en le pensant inoffensif\npeuvent vite se retrouver du mauvais côté de\nses cornes et goûter de sa puissante queue."
        it:
          sun: "Questo Pokémon adora la compagnia e, se viene\ntrascurato, si rattrista e si mette a piangere\nversando viscidi lacrimoni."
          moon: "Chi lo prende in giro credendolo inoffensivo\npotrebbe ritrovarsi ad assaggiare la potenza\ndei suoi corni e della sua grossa coda."
        de:
          sun: "Dieses äußerst freundliche Pokémon benötigt\nsehr viel Aufmerksamkeit, sonst fühlt es sich\neinsam und weint schleimige Tränen."
          moon: "Wer dieses Pokémon nicht ernst nimmt,\nbekommt es mit seinen Fühlern zu tun oder\nwird von seinem Schwanz umgehauen."
        es:
          sun: "Es muy afable y cariñoso. Si lo ignoran, le invade\nla tristeza y llora lágrimas viscosas."
          moon: "Golpea con sus antenas retráctiles y derriba con\nsu gruesa cola a aquellos que se burlan de él\ncreyendo que es inofensivo."
        ko:
          sun: "굉장히 사람을 잘 따르는 포켓몬이다.\n신경을 안 쓰고 있으면 외로워서\n미끈미끈한 눈물을 흘리며 운다."
          moon: "얌전하다고 놀리면\n뿔에 힘껏 찔리고\n굵은 꼬리로 내동댕이쳐진다."
        zh_simp:
          sun: "和人非常亲近的宝可梦。\n不管它的话，就会很寂寞，\n流着黏糊糊的眼泪鸣叫。"
          moon: "因为很温顺就去戏弄的话，\n就会被它用角狠狠戳，\n用粗粗的尾巴扫荡。"
        zh_trad:
          sun: "和人非常親近的寶可夢。\n沒人理睬的話就會很寂寞，\n流著黏糊糊的眼淚鳴叫。"
          moon: "如果因為牠性情溫順\n就去戲弄牠，會被牠用角狠戳，\n再用粗粗的尾巴掃倒。"
