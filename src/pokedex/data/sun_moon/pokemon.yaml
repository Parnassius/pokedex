sandile:
  species_id: 551
  names:
    jp_kana: メグロコ
    jp_kanji: メグロコ
    en: Sandile
    fr: Mascaïman
    it: Sandile
    de: Ganovil
    es: Sandile
    ko: 깜눈크
    zh_simp: 黑眼鳄
    zh_trad: 黑眼鱷
  forms:
    sandile:
      form_id: 0
      base_stats:
        hp: 50
        attack: 72
        defense: 35
        special_attack: 35
        special_defense: 35
        speed: 65
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
