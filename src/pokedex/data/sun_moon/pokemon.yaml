      descriptions:
        jp_kana:
          sun: "およそ　２０ねんまえに　とうじの\nかがくりょくを　けっしゅうし\nうみだされた　じんこうの　ポケモン。"
          moon: "からだを　デジタルデータか　することが\nできるので　でんのう　くうかんに\nはいりこむことが　できるのだ。"
        jp_kanji:
          sun: "およそ　２０年前に　当時の\n科学力を　結集し\n生みだされた　人工の　ポケモン。"
          moon: "身体を　デジタルデータ化　することが\nできるので　電脳空間に\n入り込むことが　できるのだ。"
        en:
          sun: "Roughly 20 years ago, it was artificially created,\nutilizing the latest technology of the time."
          moon: "It can convert its body into digital data,\nwhich enables it to enter cyberspace."
        fr:
          sun: "Un Pokémon artificiel créé il y a vingt ans\nen utilisant des méthodes à la pointe de\nla technologie de l’époque."
          moon: "Il peut transformer son corps en données\nnumériques pour pénétrer dans le cyberespace."
        it:
          sun: "Un Pokémon artificiale creato circa 20 anni fa\nsfruttando le conoscenze scientifiche più\navanzate dell’epoca."
          moon: "Il suo corpo può essere digitalizzato, rendendolo\nin grado di entrare nel cyberspazio."
        de:
          sun: "Dieses Pokémon wurde vor 20 Jahren künstlich\nerschaffen. Damals stellte es das Nonplusultra\nder technischen Möglichkeiten dar."
          moon: "Es kann seinen Körper in Daten umwandeln\nund somit nach Belieben den virtuellen Raum\nbetreten und verlassen."
        es:
          sun: "Un Pokémon que fue creado por el hombre hace\nunos 20 años con los medios tecnológicos que\nhabía disponibles en aquel momento."
          moon: "Porygon es capaz de convertirse en datos\ninformáticos y de entrar en el ciberespacio."
        ko:
          sun: "약 20년 전에 당시의\n과학력을 결집해서\n태어난 인공 포켓몬이다."
          moon: "몸을 디지털 데이터화 하는 것이\n가능해서 컴퓨터 공간에\n파고들어 갈 수 있다."
        zh_simp:
          sun: "大约２０年前，\n集当时的科学力量于一身，\n创造出来的人工宝可梦。"
          moon: "因为能将身体化为数字数据，\n所以可以进入电脑空间。"
        zh_trad:
          sun: "大約２０年前，\n集結了當時的科學力量\n創造出來的人工寶可夢。"
          moon: "可將身體化為數位資料，\n所以可進入電腦空間。"
