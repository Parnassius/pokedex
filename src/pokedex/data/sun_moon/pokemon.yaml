        - battle_armor
      descriptions:
        jp_kana:
          sun: "おもい　せいぎょマスクを　つけており\nほんらいの　のうりょくを　だせない。\nとくべつな　ちからを　ひめている。"
          moon: "じんこうの　ポケモン。　ぼうそうの\nきけんが　あるため　せいぎょマスクで\nちからを　ふういん　されている。"
        jp_kanji:
          sun: "重い　制御マスクを　つけており\n本来の　能力を　だせない。\n特別な　力を　秘めている。"
          moon: "人工の　ポケモン。　暴走の\n危険が　あるため　制御マスクで\n力を　封印　されている。"
        en:
          sun: "The heavy control mask it wears suppresses its\nintrinsic capabilities. This Pokémon has some\nhidden special power."
          moon: "Due to the danger that this synthetic Pokémon\nmay go on a rampage, it wears a control mask\nto restrain its power."
        fr:
          sun: "Le lourd masque qu’il porte est un limiteur qui\nl’empêche d’exprimer toute l’étendue de\nsa puissance. Il recèle une force mystérieuse."
          moon: "Ce Pokémon créé de toutes pièces porte un\nmasque qui contient sa puissance et l’empêche\nde perdre le contrôle et de tout détruire."
        it:
          sun: "La pesante maschera che indossa agisce come\nun freno che gli impedisce di usare la sua vera\npotenza. Nasconde in sé un potere speciale."
          moon: "È un Pokémon artificiale. La maschera che porta\nha la funzione di tenere a freno la sua potenza\ne impedirgli di perdere il controllo."
        de:
          sun: "Seine schwere Maske unterdrückt seine wahre\nMacht. In ihm schlummern nämlich besondere\nKräfte."
          moon: "Ein künstliches Pokémon. Da die Gefahr besteht,\ndass es alles kurz und klein schlagen könnte,\nmuss es eine Kontrollmaske tragen."
        es:
          sun: "La pesada máscara le impide liberar toda su\nfuerza, que se cree que es extraordinaria."
          moon: "Un Pokémon artificial. La máscara de contención\nque lleva sirve para evitar que se descontrole."
        ko:
          sun: "무거운 제어마스크를 쓰고 있어\n본래의 능력을 발휘할 수 없다.\n특별한 힘을 숨기고 있다."
          moon: "인공의 포켓몬이다. 폭주할\n위험이 있어 제어마스크로\n힘을 봉인하고 있다."
        zh_simp:
          sun: "带着沉重的控制面罩，\n不能释放出原来的能力。\n蕴藏着特别的力量。"
          moon: "人工的宝可梦。\n因为有暴走的危险，\n所以被控制面罩封印住了力量。"
        zh_trad:
          sun: "帶著沉重的控制面罩，\n無法釋放出原有的能力。\n蘊藏著特別的力量。"
          moon: "人工創造出的寶可夢。\n因為有暴走的危險，\n所以其力量被控制面罩封印住了。"
