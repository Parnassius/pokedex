      descriptions:
        jp_kana:
          sun: "ビーチなど　あさい　うみに　すむ。\nからだから　たいないきかんを　だして\nエサを　とったり　てきと　たたかう。"
          moon: "すなはまに　たくさん　いる。　からだを\nつつむ　ネバネバの　ねんえきは\nひやけあとの　スキンケアに　べんり。"
        jp_kanji:
          sun: "ビーチなど　浅い　海に　棲む。\n身体から　体内器官を　だして\n餌を　捕ったり　敵と　戦う。"
          moon: "砂浜に　たくさん　いる。　身体を\n包む　ネバネバの　粘液は\n日焼け後の　スキンケアに　便利。"
        en:
          sun: "It lives in shallow seas, such as areas near a\nbeach. It can eject its internal organs, which it\nuses to engulf its prey or battle enemies."
          moon: "These Pokémon line the beaches. The sticky\nmucous that covers their bodies can be used to\nsoothe sunburned skin. How convenient!"
        fr:
          sun: "Il vit en bord de mer, ou en eaux peu profondes.\nSes organes peuvent sortir de son corps pour\nsaisir de la nourriture ou frapper l’ennemi."
          moon: "On en rencontre beaucoup sur les plages.\nLe mucus gluant qui entoure son corps est idéal\npour soulager les coups de soleil."
        it:
          sun: "Vive nei pressi delle spiagge e in acque\npoco profonde. Espelle gli organi interni per\ncatturare le prede e attaccare i nemici."
          moon: "Vive in gruppi numerosi nei pressi delle spiagge.\nIl liquido vischioso che ne ricopre il corpo\nè una perfetta lozione doposole."
        de:
          sun: "Es lebt an Stränden oder in flachen Gewässern.\nIm Kampf und zum Schnappen von Beute lässt\nes seine Organe hervorschnellen."
          moon: "Es lebt häufig an Stränden. Seine Schleimschicht\neignet sich nach jedem Sonnenbad optimal zur\nHautpflege."
        es:
          sun: "Vive en las playas y en aguas poco profundas.\nExpulsa sus entrañas para engañar a sus\ndepredadores y librarse de ellos."
          moon: "En las playas se encuentran muchos ejemplares.\nLa mucosidad tan pegajosa que lo envuelve es\nmuy útil como loción tras tomar el sol."
        ko:
          sun: "해변 등 얕은 바다에 산다.\n몸에서 체내기관을 꺼내서\n먹이를 잡거나 적과 싸운다."
          moon: "모래 해변에 많이 있다. 몸을\n감싸는 끈적끈적한 점액은\n햇볕에 탄 피부 관리에 편리하다."
        zh_simp:
          sun: "栖息在沙滩等浅海地区。\n从身体里飞出体内器官，\n捕捉食物，或是与敌人战斗。"
          moon: "大量生活在沙滩上。\n包裹着身体的黏糊糊液体\n对于日晒后的护肤非常有用。"
        zh_trad:
          sun: "棲息在沙灘等淺海地區。\n會從身體裡彈出體內器官，\n藉此捕捉食物或是與敵人戰鬥。"
          moon: "在沙灘隨處可見。\n包裹著身體的黏糊糊液體\n對日曬後的護膚非常有用。"
