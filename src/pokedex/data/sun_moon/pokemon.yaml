        jp_kana:
          sun: "パートナーとの　しんらいで　かくせい。\nじざいに　タイプを　チェンジする\nのうりょくを　はっきし　たたかう。"
          moon: "そのなは　タイプ：ヌルを　はじめて\nこのすがたに　しんか　させた\nしょうねんに　よって　なづけられた。"
        jp_kanji:
          sun: "パートナーとの　信頼で　覚醒。\n自在に　タイプを　チェンジする\n能力を　発揮し　戦う。"
          moon: "その名は　タイプ：ヌルを　初めて\nこの姿に　進化　させた\n少年に　よって　名づけられた。"
        en:
          sun: "Its trust in its partner is what awakens it.\nThis Pokémon is capable of changing its type,\na flexibility that is well displayed in battle."
          moon: "Although its name was Type: Null at first, the\nboy who evolved it into this form gave it the\nname by which it is now known."
        fr:
          sun: "La confiance qu’il place en son Dresseur a\nréveillé ses pouvoirs. Il est à présent capable\nde changer de type à loisir durant le combat."
          moon: "Son nom lui a été donné par le jeune homme\nqui a le premier réussi à faire évoluer Type:0."
        it:
          sun: "La fiducia nel proprio Allenatore gli consente\ndi risvegliare il suo potere nascosto. Durante\nla lotta può cambiare il suo tipo a piacimento."
          moon: "Deve il suo nome al ragazzo che ha fatto\nevolvere Tipo Zero per la prima volta."
        de:
          sun: "Das Vertrauen zu seinem Trainer weckt seine\nKräfte. Es kann seinen Typ im Kampf nach\nBelieben wechseln."
          moon: "Seinen Namen hat es von dem Jungen erhalten,\nder es Typ:Null zum ersten Mal ermöglichte,\nsich zu entwickeln."
        es:
          sun: "La confianza con su Entrenador ha despertado\nsu potencial. Ahora es capaz de cambiar de tipo\na voluntad durante el combate."
          moon: "Debe su nombre al joven que hizo evolucionar\npor primera vez a Código Cero para que\nadquiriese este aspecto."
        ko:
          sun: "파트너와의 신뢰로 각성한다.\n자유자재로 타입을 바꾸는\n능력을 발휘하며 싸운다."
          moon: "그 이름은 타입:널을 처음으로\n이 모습으로 진화시킨\n소년에 의해 지어졌다."
        zh_simp:
          sun: "因为与同伴之间的信赖而觉醒。\n发挥自由变换属性的能力进行战斗。"
          moon: "这个名字是由第一个\n让“属性：空”进化成\n这个样子的少年来取的。"
        zh_trad:
          sun: "因為與同伴之間的信賴而覺醒。\n發揮自由變換屬性的能力進行戰鬥。"
          moon: "這個名字是由第一個\n讓「屬性：空」進化成\n這個樣子的少年所取名的。"
