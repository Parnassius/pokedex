        - electric
      egg_groups:
        - undiscovered
      abilities:
        - static
      hidden_ability: vital_spirit
      held_items:
        rare: electirizer
      descriptions:
        jp_kana:
          sun: "いえに　いるときは　コンセントが\nほにゅうびん　がわり。　でんきを\nちゅうちゅう　すってるよ。"
          moon: "でんきを　うばいにきた　トゲデマルと\nしょっちゅう　ケンカ。　けっかは\nだいたい　ごかくと　いった　ところ。"
        jp_kanji:
          sun: "家に　いるときは　コンセントが\nほ乳びん　代わり。　電気を\nちゅうちゅう　吸ってるよ。"
          moon: "電気を　奪いにきた　トゲデマルと\nしょっちゅう　ケンカ。　結果は\n大体　互角と　いった　ところ。"
        en:
          sun: "When it’s in a house, electrical outlets serve as\nits baby bottles. It sucks down electricity."
          moon: "This Pokémon is constantly fighting with\nTogedemaru that try to steal its electricity.\nIt’s a pretty even match."
        fr:
          sun: "Ce Pokémon « tète » les prises électriques\ndes maisons comme s’il s’agissait de biberons\nde lait, et ce jusqu’au dernier ampère."
          moon: "Togedemaru et lui se disputent les mêmes\nsources d’électricité. Leurs combats\nse terminent souvent par une égalité."
        it:
          sun: "Quando si trova in una casa, succhia l’energia\nelettrica attaccandosi alle prese di corrente."
          moon: "Spesso si azzuffa con i Togedemaru che\nentrano in casa per rubare l’energia elettrica.\nIn genere, i loro scontri finiscono in parità."
        de:
          sun: "Daheim hängt es an der Steckdose wie an\neinem Babyfläschchen und nuckelt genüsslich\nden Strom."
          moon: "Es muss sich oft mit Togedemaru herumärgern,\ndas ihm Strom klauen will. Ihre Raufereien enden\njedoch meist unentschieden."
        es:
          sun: "Cuando está en una casa, usa los enchufes de\nla pared a modo de biberones. Le encanta\nchupar electricidad."
          moon: "Los Togedemaru siempre intentan robarles la\nelectricidad, lo que suele terminar en combates\nmuy reñidos."
        ko:
          sun: "집에 있을 때는 콘센트가\n젖병 대신이다. 전기를\n쪽쪽 빨고 있다."
          moon: "전기를 빼앗으러 온\n토게데마루와 늘 싸운다.\n결과는 거의 무승부."
        zh_simp:
          sun: "在家的时候，插座就相当于奶瓶。\n可以从中滋滋地吸取电力哦。"
          moon: "与过来抢夺电的托戈德玛尔经常发生斗殴。\n胜负大体上可以说是不相上下。"
        zh_trad:
          sun: "在家的時候，插座就相當於奶瓶。\n會啜啜地吸取電力哦。"
          moon: "常常跟來搶奪電力的\n托戈德瑪爾打架。\n結果通常是不分上下。"
magby:
