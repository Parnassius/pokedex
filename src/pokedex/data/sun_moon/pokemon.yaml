snorunt:
  species_id: 361
  names:
    jp_kana: ユキワラシ
    jp_kanji: ユキワラシ
    en: Snorunt
    fr: Stalgamin
    it: Snorunt
    de: Schneppke
    es: Snorunt
    ko: 눈꼬마
    zh_simp: 雪童子
    zh_trad: 雪童子
  forms:
    snorunt:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 50
        special_attack: 50
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - inner_focus
        - ice_body
      hidden_ability: moody
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          sun: "きづくと　アローラで　ふえていた。\nユキワラシが　すみついた　いえは\nししそんそんに　さかえると　いう。"
          moon: "さむい　とちでしか　いきられない。\nマイナス　１００どの　かんきょうでも\nげんきに　はねまわっているよ。"
        jp_kanji:
          sun: "気づくと　アローラで　増えていた。\nユキワラシが　棲みついた　家は\n子々孫々に　栄えると　いう。"
          moon: "寒い　土地でしか　生きられない。\nマイナス　１００度の　環境でも\n元気に　跳ねまわっているよ。"
        en:
          sun: "Their numbers seem to have rapidly increased in\nAlola. Custom has it that houses where Snorunt\nlive will be prosperous for generations to come."
          moon: "It can only survive in cold areas. It bounces\nhappily around, even in environments as cold as\n-150 degrees Fahrenheit."
        fr:
          sun: "De nombreux spécimens de ce Pokémon vivent\ndans la région d’Alola. On dit que les maisons\nabritant un Stalgamin seront prospères."
          moon: "Il ne peut voir le jour que dans les plus froides\ncontrées. Il s’accommode parfaitement de\ntempératures atteignant les -100 °C."
        it:
          sun: "È sempre più diffuso nella regione di Alola.\nSi dice che porti prosperità per generazioni\nagli abitanti delle case in cui vive."
          moon: "Sopravvive solo nelle regioni fredde.\nSi trova perfettamente a suo agio anche\na una temperatura di -100 °C."
        de:
          sun: "Schneppke hat sich rasant in Alola verbreitet.\nEs heißt, das Haus, in dem es lebt, werde über\nviele Generationen blühen und gedeihen."
          moon: "Schneppke kann nur in besonders kalten\nGebieten leben. Selbst bei -100 °C hopst es\nmunter umher."
        es:
          sun: "Su número ha aumentado en la región de Alola.\nDicen que traen prosperidad durante\ngeneraciones a las casas en las que habitan."
          moon: "Las regiones frías son su hábitat natural. Se\nencuentra a sus anchas en lugares donde la\ntemperatura alcanza los -100 °C."
        ko:
          sun: "어느새 알로라에서 늘어나 있었다.\n눈꼬마가 살고 있는 집은\n자자손손 번창한다고 한다."
          moon: "추운 땅에서만 살 수 있다.\n영하 100도의 환경에서도\n건강하게 뛰어다닌다."
        zh_simp:
          sun: "等发觉时，已在阿罗拉增多起来。\n据说，雪童子栖息过的家庭\n会子孙满堂家族繁荣。"
          moon: "只能在寒冷的土地上生存。\n即使在零下１００度的环境下\n也能充满活力地到处蹦蹦跳跳哦。"
        zh_trad:
          sun: "不知不覺間已在阿羅拉增多起來。\n據說，有雪童子棲息的家庭\n會子孫滿堂家族繁榮。"
          moon: "只能在寒冷的土地上生存。\n即使在零下１００度的環境下\n也能充滿活力地到處蹦蹦跳跳哦。"
glalie:
  species_id: 362
  names:
    jp_kana: オニゴーリ
    jp_kanji: オニゴーリ
    en: Glalie
    fr: Oniglali
    it: Glalie
    de: Firnontor
    es: Glalie
    ko: 얼음귀신
    zh_simp: 冰鬼护
    zh_trad: 冰鬼護
  forms:
    glalie:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 80
        special_attack: 80
        special_defense: 80
        speed: 80
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - inner_focus
        - ice_body
      hidden_ability: moody
      descriptions:
        jp_kana:
          sun: "とうちょう　まぢかに　ゆきやまで\nそうなんした　とざんかの　むねんが\nいわに　とりつき　うまれたと　いう。"
          moon: "おおきな　くちから　はく　れいきで\nえものは　いっしゅんで　カチコチ。\nそのまま　バリバリ　いただくのだ。"
        jp_kanji:
          sun: "登頂　間近に　雪山で\n遭難した　登山家の　無念が\n岩に　取りつき　生まれたと　いう。"
          moon: "大きな　口から　吐く　冷気で\n獲物は　一瞬で　カチコチ。\nそのまま　バリバリ　頂くのだ。"
        en:
          sun: "Legend says a boulder on an icy mountain\nabsorbed the distress and regrets of a\nstranded mountaineer, giving rise to Glalie."
          moon: "Its prey is instantaneously frozen stiff by the\ncold air it exhales from its huge mouth. While\nthey’re in that frozen state, it gobbles them up."
        fr:
          sun: "La légende veut qu’il naisse de la détresse\net de la rancœur des alpinistes égarés dans\nles cimes enneigées."
          moon: "Le souffle glacé qui sort de sa large gueule lui\npermet de congeler instantanément ses proies.\nIl les croque ensuite comme des glaçons."
        it:
          sun: "Lo sconforto degli scalatori smarritisi a un passo\ndalla vetta ha animato certe rocce di montagna\ne dato vita a questo Pokémon."
          moon: "Congela le prede in un istante soffiando\naria gelida dalla grande bocca e poi\nle sgranocchia ancora ghiacciate."
        de:
          sun: "Man sagt, Firnontor sei aus dem Unmut\nverunglückter Bergsteiger geboren, der\nvon einem Felsen Besitz ergriff."
          moon: "Mit dem Eiseshauch aus seinem riesigen Mund\nfriert es seine Beute augenblicklich ein, um sie\ndann genüsslich zu verspeisen."
        es:
          sun: "Se cree que estos Pokémon surgen de la\ndesazón de los montañeros perdidos en las\ncumbres nevadas."
          moon: "Congela a sus presas instantáneamente con el\naire frío que expulsa por la boca y acto seguido\nlas devora."
        ko:
          sun: "등정을 코앞에 둔 설산에서\n조난당한 등산가의 원통함이\n바위에 씌어서 태어났다고 한다."
          moon: "커다란 입에서 뿜는 냉기로\n먹이는 한순간에 꽁꽁.\n그대로 아드득아드득 잡아먹는다."
        zh_simp:
          sun: "据说是即将登顶雪山，\n却罹难的登山家的遗憾，\n附在岩石上诞生而成。"
          moon: "从大大的嘴巴里喷出冷气，\n把猎物瞬间冻得硬邦邦的。\n就这么嘎嘣嘎嘣地享用食物。"
        zh_trad:
          sun: "據說是在即將登頂時\n在雪山上罹難的登山家心中的\n遺憾附在岩石上而形成的。"
          moon: "從大大的嘴巴裡噴出寒氣，\n把獵物瞬間凍得硬梆梆的，\n然後大口咬碎享用。"
    glalie_mega:
      form_id: 1
      names:
        jp_kana: メガオニゴーリ
        jp_kanji: メガオニゴーリ
        en: Mega Glalie
        fr: Méga-Oniglali
        it: MegaGlalie
        de: Mega-Firnontor
        es: Mega-Glalie
        ko: 메가얼음귀신
        zh_simp: 超级冰鬼护
        zh_trad: 超級冰鬼護
      base_stats:
        hp: 80
        attack: 120
        defense: 80
        special_attack: 120
        special_defense: 80
        speed: 100
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - refrigerate
      descriptions:
        jp_kana:
          sun: "かじょうな　メガシンカ　エネルギーが\nくちから　あふれ　アゴが　くだけた。\nつねに　ふぶきを　はいている。"
          moon: "くちの　なかに　えものを　ほうりこみ\nしゅんじに　こおらせるが　アゴが\nはずれているので　たべられない。"
        jp_kanji:
          sun: "過剰な　メガシンカ　エネルギーが\n口から　あふれ　アゴが　砕けた。\n常に　吹雪を　吐いている。"
          moon: "口の　中に　獲物を　放り込み\n瞬時に　凍らせるが　アゴが\n外れているので　食べられない。"
        en:
          sun: "The excess energy from Mega Evolution spilled\nover from its mouth, breaking its jaw. It spews\nendless blizzards."
          moon: "It envelops prey in its mouth, freezing them\ninstantly. But its jaw is dislocated, so it’s unable\nto eat them."
        fr:
          sun: "Le surplus d’énergie de la Méga-Évolution s’est\ndéversé par sa bouche et a démis sa mâchoire.\nIl projette en continu un puissant blizzard."
          moon: "Il enfourne ses proies dans sa bouche et les\ngèle instantanément, mais sa mâchoire étant\ndéboîtée, il ne peut pas les manger."
        it:
          sun: "Durante la megaevoluzione, l’energia sprigionata\nè uscita dalla bocca sganciandogli la mandibola.\nVomita neve senza sosta."
          moon: "Congela istantaneamente le prede in mezzo\nalle fauci, ma a causa della sua mandibola\ndisarticolata non riesce a mangiarle."
        de:
          sun: "Bei der Mega-Entwicklung tritt gewaltige Energie\naus seinem Mund aus und bricht den Kiefer ab.\nEs stößt nun permanent eiskalte Luftströme aus."
          moon: "Gegner, die in seinem klaffenden Schlund landen,\ngefrieren augenblicklich zu Eis. Da sein Kiefer\nausgerenkt ist, kann es sie aber nicht fressen."
        es:
          sun: "La potente energía de la megaevolución quebró\nsu coraza y le desencajó la mandíbula, de la que\nbrota ahora una ventisca constante."
          moon: "Atrapa a sus presas con la boca y estas se\ncongelan al instante. Sin embargo, su mandíbula\nestá desencajada y no puede comérselas."
        ko:
          sun: "과잉 메가진화 에너지가\n입에서 넘쳐 턱이 빠졌다.\n항상 눈보라를 내뿜고 있다."
          moon: "입안에 먹이를 넣고\n순식간에 얼려버리지만 턱이\n빠져 있어서 먹을 수 없다."
        zh_simp:
          sun: "过剩的超级进化能量\n从口中溢出，击碎下颚。\n经常都会喷着暴风雪。"
          moon: "把猎物放入口中的瞬间\n就会让其冻结，\n但因为下颚脱臼而没法吃。"
        zh_trad:
          sun: "過剩的超級進化能量\n從口中溢出，擊碎下顎。\n隨時都噴著暴風雪。"
          moon: "把獵物放入口中的瞬間\n就會讓其凍結，\n但因下顎脫臼所以沒辦法吃。"
