      descriptions:
        jp_kana:
          sun: "はばたく　はおとは　まるで　うたごえ。\nおとに　みせられたものは　すなあらしに\nまきこまれ　フライゴンの　えじきに。"
          moon: "みずからが　まきおこす　すなあらしの\nちゅうしんに　いるので　めったに\nひとまえに　あらわれない　ポケモン。"
        jp_kanji:
          sun: "羽ばたく　羽音は　まるで　歌声。\n音に　魅せられた者は　砂嵐に\n巻き込まれ　フライゴンの　餌食に。"
          moon: "自らが　巻き起こす　砂嵐の\n中心に　いるので　滅多に\n人前に　現れない　ポケモン。"
        en:
          sun: "The flapping of its wings sounds something like\nsinging. Those lured by the sound are enveloped\nin a sandstorm, becoming Flygon’s prey."
          moon: "This Pokémon hides in the heart of sandstorms\nit creates and seldom appears where people\ncan see it."
        fr:
          sun: "Le bruissement de ses ailes est très mélodieux.\nLes malheureux envoûtés par ce chant se\nretrouvent prisonniers de sa tempête de sable."
          moon: "Comme il est souvent caché au cœur des\ntempêtes de sable qu’il déclenche, ce Pokémon\nn’est que rarement aperçu par l’homme."
        it:
          sun: "Agitando le ali, emette un suono simile a un\ncanto. Le prede ammaliate si ritrovano\nintrappolate in una tempesta di sabbia."
          moon: "Si nasconde nelle tempeste di sabbia che\ngenera sbattendo le ali. Raramente gli esseri\numani riescono a vederlo."
        de:
          sun: "Erzeugt mit seinem Flügelschlag Töne, die wie\nGesang klingen. Der so bezirzte Gegner wird von\neinem Sandsturm umgeben und zu seiner Beute."
          moon: "Da es sich stets im Zentrum des von ihm\nentfachten Sandsturms aufhält, bekommen\nMenschen es so gut wie nie zu Gesicht."
        es:
          sun: "Al batir las alas, crea una melodía que atrae a\nsus presas. Cuando estas se acercan, quedan\natrapadas en una tormenta de arena."
          moon: "Al batir las alas, provoca tormentas de arena\nque lo ocultan por completo, por lo que rara vez\nse ha visto a este Pokémon."
        ko:
          sun: "날개 치는 날갯소리는 마치 노랫소리 같다.\n소리에 매혹된 자는 모래 폭풍에\n휩쓸려 플라이곤의 먹이가 된다."
          moon: "스스로 일으키는 모래바람의\n중심에 있어 좀처럼\n사람들 앞에 나타나지 않는 포켓몬이다."
        zh_simp:
          sun: "挥动翅膀的声音简直就是歌声。\n凡是被这声音迷惑的，\n最终会被卷入沙暴成为沙漠蜻蜓的食物。"
          moon: "因为位于自己卷起的沙暴中心，\n所以是很少现身于人前的宝可梦。"
        zh_trad:
          sun: "揮動翅膀的振翅聲簡直有如歌聲。\n凡是被這聲音迷惑的，\n最終會被捲入沙暴成為沙漠蜻蜓的食物。"
          moon: "因為總是位於自己引發的沙暴中心，\n所以是極少現身於人前的寶可夢。"
