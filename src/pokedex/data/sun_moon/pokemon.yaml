      descriptions:
        jp_kana:
          sun: "ゆらゆら　ゆれて　リラックス。\nこうして　たかまった　サイコパワーを\nてきに　めがけて　ほうしゃするぞ。"
          moon: "うすもものミツを　すった　オドリドリ。\nおだやかに　こしをふり　てきの\nみも　こころも　とろけさせる。"
        jp_kanji:
          sun: "ゆらゆら　揺れて　リラックス。\nこうして　高まった　サイコパワーを\n敵に　目掛けて　放射するぞ。"
          moon: "うすもものミツを　吸った　オドリドリ。\n穏やかに　腰を振り　敵の\n身も　心も　とろけさせる。"
        en:
          sun: "This Oricorio relaxes by swaying gently. This\nincreases its psychic energy, which it then fires\nat its enemies."
          moon: "This Oricorio has sipped pink nectar.\nIts enemies’ hearts melt at the sight of its\ngently swaying hips."
        fr:
          sun: "Il se relaxe en se déhanchant lentement. Cela\nlui permet d’accumuler de l’énergie psychique,\nqu’il déverse sur le premier ennemi qu’il trouve."
          moon: "Après avoir bu du Nectar Rose, Plumeline\ndonne des coups de hanche langoureux\nqui font fondre le cœur de ses ennemis."
        it:
          sun: "Si rilassa dondolando dolcemente per aumentare\ni suoi poteri psichici, di cui si serve per\nattaccare il nemico dopo aver preso la mira."
          moon: "Un Oricorio che si è nutrito di Nettare rosa.\nLa sua danza ondeggiante e ipnotica scioglie le\ndifese del corpo e della mente dei suoi nemici."
        de:
          sun: "Es entspannt sich durch sanft kreisende\nBewegungen. Dies verstärkt seine Psycho-\nKräfte, welche es auf den Gegner abfeuert."
          moon: "Ein Choreogel, das rosa Nektar geschlürft hat.\nMit einem ruhigen Hüftschwung lässt es Körper\nund Geist eines jeden Gegners dahinschmelzen."
        es:
          sun: "Baila de forma pausada acumulando poder\npsíquico que después libera contra su rival\ntras mirarlo fijamente."
          moon: "Forma que toma Oricorio al libar Néctar Rosa.\nCon su suave contoneo de caderas, derrite\nel corazón de sus rivales."
        ko:
          sun: "흔들흔들 흔들며 긴장을 푼다.\n이렇게 고양된 사이코 파워를\n적을 향해 발사한다."
          moon: "연분홍꿀을 빨아들인 춤추새.\n부드럽게 허리를 흔들어 적의\n몸도 마음도 녹여버린다."
        zh_simp:
          sun: "摇摇摆摆地放松自己。\n这之后，将提高的精神力量\n瞄准敌人发射出去。"
          moon: "吸食了桃粉色花蜜的花舞鸟。\n稳健地摆动腰部，\n让敌人的身心都融化。"
        zh_trad:
          sun: "搖搖擺擺地放鬆自己。\n之後瞄準敵人將提升的\n精神力量發射出去。"
          moon: "吸食了桃粉色花蜜的花舞鳥。\n輕柔地擺動腰部，\n讓敵人的身心都溶化。"
