        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
        - snow_warning
      hidden_ability: weak_armor
      held_items:
        common: never_melt_ice
      descriptions:
        jp_kana:
          sun: "２つのあたま　それぞれに　のうがあり\nりょうしゃの　いけんが　いっちすると\nもうふぶきを　はいて　てきを　おそう。"
          moon: "かたほうの　あたまを　うしなっても\nとくに　もんだいなく　いきられる。\nからだの　なかに　ゆきぐもを　つくる。"
        jp_kanji:
          sun: "２つの頭　それぞれに　脳があり\n両者の　意見が　一致すると\n猛吹雪を　吐いて　敵を　襲う。"
          moon: "片方の　頭を　失っても\n特に　問題なく　生きられる。\n身体の　中に　雪雲を　つくる。"
        en:
          sun: "Each of its two heads has a brain, and when\nthey are in agreement, it attacks its enemies\nby exhaling a violent blizzard."
          moon: "Even if it loses one of its heads, it can live\nrelatively problem-free. It makes snow clouds\ninside its body."
        fr:
          sun: "Chacune de ses deux têtes possède un cerveau\ndistinct. Elles doivent s’entendre pour que\nSorbouboul souffle son blizzard sur l’ennemi."
          moon: "Il peut perdre l’une de ses têtes et continuer à\nvivre sa vie sans souci. Des flocons de neige\nsont fabriqués en permanence dans son corps."
        it:
          sun: "Ha un cervello in ognuna delle due teste.\nQuando queste riescono a mettersi d’accordo,\nattacca il nemico scatenando una bufera."
          moon: "Sopravvive senza problemi anche se perde una\ndelle due teste. All’interno del corpo genera\nnuvole di neve."
        de:
          sun: "Seine zwei Köpfe haben je ein eigenes Gehirn.\nSind sich beide einig, greifen sie den Gegner an,\nindem sie heftige Eisböen ausstoßen."
          moon: "Selbst wenn es einen seiner Köpfe verliert,\nkann es ohne besondere Probleme weiterleben.\nIn seinem Inneren erzeugt es Schneewolken."
        es:
          sun: "Las dos cabezas tienen su propio cerebro.\nCuando se ponen de acuerdo, generan una\nventisca con la que atacan a su enemigo."
          moon: "Pueden sobrevivir sin grandes problemas aun\nperdiendo una de las cabezas. Crean ventiscas\nen el interior de su cuerpo."
        ko:
          sun: "두 개의 머리 각각에 뇌가 있고\n각자의 의견이 일치하면\n강한 눈보라를 뿜어 적을 덮친다."
          moon: "한쪽 머리를 잃어도\n특별히 문제없이 살 수 있다.\n몸속에서 눈구름을 만든다."
        zh_simp:
          sun: "２个头拥有各自的大脑，\n如果两者意见一致，\n就会喷出猛烈的暴风雪袭击敌人。"
          moon: "即使失去了一侧的头也不会\n有什么问题，能继续活着。\n在身体的内部制造雪云。"
        zh_trad:
          sun: "２個頭擁有各自的大腦，\n如果兩者意見一致，\n就會噴出猛烈的暴風雪襲擊敵人。"
          moon: "即使失去其中一邊的頭\n也可以毫無問題地繼續存活。\n會在身體的內部製造雪雲。"
