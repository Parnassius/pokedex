      descriptions:
        jp_kana:
          sun: "すいしょうの　ような　タマには\nてんこうを　あやつる　パワーが\nひめられていると　いわれている。"
          moon: "てんこうを　つかさどる　ものとして\nたいこから　のうぎょうを　いとなむ\nひとびとに　あがめられてきた。"
        jp_kanji:
          sun: "水晶の　ような　玉には\n天候を　操る　パワーが\n秘められていると　いわれている。"
          moon: "天候を　司る　者として\n太古から　農業を　営む\n人々に　崇められてきた。"
        en:
          sun: "It has long been thought that its crystalline\norbs are imbued with the power to control\nthe weather."
          moon: "From time immemorial, it has been venerated by\nagricultural peoples as an entity able to control\nthe weather."
        fr:
          sun: "Beaucoup pensent que les orbes cristallins\nde ce Pokémon ont le pouvoir de modifier\nle climat."
          moon: "Il est adoré depuis l’Antiquité dans certaines\ncommunautés paysannes en tant que divinité\ndes conditions climatiques."
        it:
          sun: "Si dice che le sfere di cristallo che ha sul corpo\ngli permettano di controllare le condizioni\natmosferiche."
          moon: "Fin dall’antichità è venerato dai popoli dediti\nall’agricoltura per la sua capacità di controllare\nle condizioni atmosferiche."
        de:
          sun: "Es heißt, es könne mit den kristallenen Bällen\nan seinem Schweif das Wetter beeinflussen."
          moon: "Bauern verehren es schon seit Urzeiten,\nda es die Fähigkeit besitzt, das Wetter\nzu beeinflussen."
        es:
          sun: "Se dice que sus cristalinos orbes confieren a\neste Pokémon el poder de controlar el clima."
          moon: "Ha sido venerado desde tiempos ancestrales\npor los pueblos agrícolas, debido a que con sus\npoderes puede controlar el clima."
        ko:
          sun: "수정 같은 구슬에는\n날씨를 조종하는 힘이\n숨겨져 있다고 전해진다."
          moon: "날씨를 지배하는 존재로서\n태고부터 농업에 종사하는\n사람들에게 받들어져 왔다."
        zh_simp:
          sun: "据说，在水晶般的珠子里\n蕴含着操纵天气的力量。"
          moon: "自太古时代起就被\n从事农业的人们当做\n掌管天气者而崇拜着。"
        zh_trad:
          sun: "據說，在水晶般的珠子裡\n蘊含著操縱天氣的力量。"
          moon: "自太古時代就被\n從事農業的人們當做\n掌管天氣者而崇拜著。"
