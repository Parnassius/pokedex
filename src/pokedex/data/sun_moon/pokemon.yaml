        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          sun: "ジェットき　なみの　こうそくで　とぶ。\nとりポケモンの　むれに　つっこむと\nそのまま　むれごと　まるのみだ。"
          moon: "あたまに　ついた　２つの　とっきは\nセンサーの　やくめ。　はるか　さきの\nえものの　ようすも　わかる。"
        jp_kanji:
          sun: "ジェット機　並の　高速で　飛ぶ。\nとりポケモンの　群れに　突っ込むと\nそのまま　群れごと　丸呑みだ。"
          moon: "頭に　ついた　２つの　突起は\nセンサーの　役目。　遥か　先の\n獲物の　様子も　わかる。"
        en:
          sun: "It can fly at speeds rivaling jet planes.\nIt dives into flocks of bird Pokémon and\ngulps the entire flock down whole."
          moon: "The protuberances on its head serve as\nsensors. It can even detect distant prey."
        fr:
          sun: "Il vole aussi vite qu’un avion à réaction. Si en vol\nil croise une nuée de Pokémon oiseaux, il les\navale d’une seule bouchée."
          moon: "Les deux protubérances qu’il a sur la tête lui\nservent de capteurs. Il peut ainsi détecter les\nmouvements de proies très éloignées."
        it:
          sun: "Vola alla velocità di un jet. Caccia attaccando\ni Pokémon alati, di cui può divorare interi stormi."
          moon: "Le protuberanze che ha ai lati della testa hanno\nfunzione di sensori e percepiscono le prede\nanche a grande distanza."
        de:
          sun: "Es fliegt mit der Geschwindigkeit eines Jets.\nWenn es sich auf einen Schwarm Vogel-Pokémon\nstürzt, schlingt es ihn im Ganzen hinunter."
          moon: "Die beiden Fortsätze an seinem Kopf haben\ndie Funktion eines Sensors. Mit ihnen kann\nes auch weit entfernte Beute aufspüren."
        es:
          sun: "Vuela tan rápido como un avión a reacción.\nEmbiste a bandadas de Pokémon pájaro y, si\natrapa a alguno, se lo traga de un bocado."
          moon: "Las dos protuberancias que tiene en la cabeza\nle sirven de sensores. Puede rastrear presas\nque se encuentren a gran distancia."
        ko:
          sun: "제트기만큼 빠른 속도로 난다.\n새포켓몬 무리에 돌진하여\n그대로 무리째 삼켜버린다."
          moon: "머리에 달린 2개의 돌기는\n센서 역할을 한다. 저 멀리 있는\n먹이의 모습도 알 수 있다."
        zh_simp:
          sun: "以媲美喷气式飞机的高速来飞行。\n如果冲入鸟宝可梦的群体中，\n会就这么把整个群体都吞掉。"
          moon: "头上长着的２个突起物\n是起感应器作用的。\n前方很远处猎物的样子也能知道。"
        zh_trad:
          sun: "以媲美噴射機的速度高速飛行。\n如果衝入鳥寶可夢的群體中，\n會就直接把整個群體都吞掉。"
          moon: "頭上長著的２個突起物\n是作為感應器的用途。\n就連遠處獵物的狀況也能察覺。"
    garchomp_mega:
      form_id: 1
      names:
        jp_kana: メガガブリアス
        jp_kanji: メガガブリアス
        en: Mega Garchomp
        fr: Méga-Carchacrok
        it: MegaGarchomp
        de: Mega-Knakrack
        es: Mega-Garchomp
        ko: 메가한카리아스
        zh_simp: 超级烈咬陆鲨
        zh_trad: 超級烈咬陸鯊
      base_stats:
        hp: 108
        attack: 170
        defense: 115
        special_attack: 120
        special_defense: 95
        speed: 92
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_force
      descriptions:
        jp_kana:
          sun: "かじょうな　エネルギーで　りょうてと\nはねが　とけてしまい　きょだいな\nカマじょうの　かたちに　へんかした。"
          moon: "じまんの　はねが　カマに　なって\nいかりくるっている。　カマを　ふるって\nだいちを　みじんに　きりきざむ。"
        jp_kanji:
          sun: "過剰な　エネルギーで　両手と\n羽が　溶けてしまい　巨大な\n鎌状の　形に　変化した。"
          moon: "自慢の　羽が　鎌に　なって\n怒り狂っている。　鎌を　振るって\n大地を　みじんに　切り刻む。"
        en:
          sun: "Excess energy melted its arms and wings,\ntransforming them into giant scythes."
          moon: "Its vaunted wings become scythes, sending it\nmad with rage. It swings its scythes wildly and\nslices the ground to pieces."
        fr:
          sun: "Le soudain influx d’énergie a transformé\nles ailerons de ses bras en énormes faux\ntranchantes."
          moon: "Il est fou de colère que ses ailerons, dont il était\nsi fier, soient devenus des faux. Il les agite\navec rage en lacérant la terre."
        it:
          sun: "L’improvvisa esplosione di energia della\nmegaevoluzione gli ha fuso le ali insieme\nalle braccia, tramutandole in enormi falci."
          moon: "È accecato dalla rabbia perché le ali di cui va\nfiero si sono trasformate in falci. Sfoga la\npropria ira sbattendole furiosamente a terra."
        de:
          sun: "Der extreme Energieschub hat seine Flügel\nmit seinen Armen verschmelzen lassen,\nwodurch sie zu riesigen Sicheln wurden."
          moon: "Es ist wütend, weil sich seine geliebten Flügel zu\nSicheln verformt haben. Diese wirbelt es zornig\nherum und zerhackt dabei den Boden."
        es:
          sun: "La descomunal energía de la megaevolución\nfunde sus extremidades con sus alas, lo que les\notorga aspecto de hoz."
          moon: "Presa de la ira al ver que sus preciadas alas se\nhan fundido con sus extremidades, las usa para\ngolpear la tierra con fuerza."
        ko:
          sun: "과한 에너지로 양손과\n날개가 녹아버려 거대한\n낫 모양으로 변화했다."
          moon: "자랑스러운 날개가 낫으로 변해\n격분하고 있다. 낫을 휘둘러\n대지를 산산조각낸다."
        zh_simp:
          sun: "因为过剩的能量，\n双手和翅膀熔化，\n变成了巨大的镰刀状。"
          moon: "引以为傲的翅膀变成镰刀，\n脾气也变得异常狂暴。\n挥舞镰刀，把大地剁成粉末。"
        zh_trad:
          sun: "因為能量過剩，\n雙手和翅膀溶化，\n變成了巨大的鐮刀狀。"
          moon: "因為引以為傲的翅膀變成鐮刀\n而大發雷霆。揮舞鐮刀，\n把大地剁成粉末。"
