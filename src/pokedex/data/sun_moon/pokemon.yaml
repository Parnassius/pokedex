sylveon:
  species_id: 700
  names:
    jp_kana: ニンフィア
    jp_kanji: ニンフィア
    en: Sylveon
    fr: Nymphali
    it: Sylveon
    de: Feelinara
    es: Sylveon
    ko: 님피아
    zh_simp: 仙子伊布
    zh_trad: 仙子伊布
