      descriptions:
        jp_kana:
          sun: "こうおん　こうあつの　ちかふかくで\nうまれる。　ほうせきの　ぶぶんから\nビームを　はなち　みを　まもるぞ。"
          moon: "さほど　めずらしいわけではないが\nキラキラと　かがやく　ほうせきの\nからだが　じょせいに　にんきだ。"
        jp_kanji:
          sun: "高温　高圧の　地下深くで\n生まれる。　宝石の　部分から\nビームを　放ち　身を　守るぞ。"
          moon: "さほど　珍しいわけではないが\nキラキラと　輝く　宝石の\n身体が　女性に　人気だ。"
        en:
          sun: "Born from the high temperatures and pressures\ndeep underground, it defends itself by firing\nbeams from the jewel part of its body."
          moon: "Although this Pokémon is not especially rare,\nits glittering, jewel-draped body draws\nattention from people."
        fr:
          sun: "Les Strassie sont nés sous la terre, à de hautes\npressions et températures. Ils se défendent\nen lançant des lasers depuis leurs cristaux."
          moon: "Il ne s’agit pas d’un Pokémon particulièrement\nrare, mais son allure strass et paillettes attire\nles gens."
        it:
          sun: "Questo Pokémon nasce sottoterra in condizioni\ndi pressione e temperatura estreme. Si difende\nemettendo raggi dalle gemme."
          moon: "Pur non essendo particolarmente raro, è molto\napprezzato per le scintillanti pietre preziose\ndi cui è cosparso il suo corpo."
        de:
          sun: "Druck und Hitze tiefster Erdschichten erzeugten\ndieses Pokémon. Seine funkelnden Körperstellen\nsondern Strahlen ab, mit denen es sich schützt."
          moon: "Der Edelstein, der in seinem Körper steckt,\nist zwar recht gewöhnlich, aber da er schön\nfunkelt, ist das Pokémon trotzdem sehr beliebt."
        es:
          sun: "Nace en las profundidades subterráneas, a altas\ntemperaturas y a gran presión. Lanza rayos por\nsus gemas a modo de defensa."
          moon: "Aunque no es un Pokémon especialmente raro\nde ver, el brillo de las joyas que lleva\nincrustadas lo hace muy popular."
        ko:
          sun: "고온 고압의 지하 깊은 곳에서\n태어난다. 보석 부분에서\n빔을 발사하여 몸을 지킨다."
          moon: "그다지 희귀하지는 않지만\n반짝반짝 빛나는 보석으로 된\n몸이 여성에게 인기다."
        zh_simp:
          sun: "出生在高温高压的地下深处。\n从宝石的部分放出光束保护身体。"
          moon: "虽然并不是那么的稀有，\n但闪闪发光的宝石身体\n在女性中很受欢迎。"
        zh_trad:
          sun: "出生在高溫高壓的地底深處。\n從寶石的部分釋放光束保護身體。"
          moon: "雖然並不是很稀有，\n但閃閃發光的寶石身體\n很受女性歡迎。"
goomy:
