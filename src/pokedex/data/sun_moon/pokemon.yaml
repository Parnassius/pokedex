      hidden_ability: defiant
      descriptions:
        jp_kana:
          sun: "あまりに　おこりすぎて　そのまま\nしんでしまうことが　あるほどだが\nそのしにがおは　とても　やすらか。"
          moon: "あるけんきゅうしゃの　がくせつでは\nモンスターボールの　なかでも\nオコリザルは　おこっているらしい。"
        jp_kanji:
          sun: "あまりに　怒りすぎて　そのまま\n死んでしまうことが　あるほどだが\nその死に顔は　とても　安らか。"
          moon: "ある研究者の　学説では\nモンスターボールの　中でも\nオコリザルは　怒っているらしい。"
        en:
          sun: "It has been known to become so angry that\nit dies as a result. Its face looks peaceful in\ndeath, however."
          moon: "Some researchers theorize that Primeape\nremains angry even when inside a Poké Ball."
        fr:
          sun: "Il arrive qu’il s’énerve tellement qu’il en meurt.\nSon visage, lorsqu’il meurt ainsi, est empreint\nd’une grande sérénité."
          moon: "D’après les recherches d’un certain scientifique,\nles Colossinge continuent de bouillonner de\nfureur même à l’intérieur d’une Poké Ball."
        it:
          sun: "A volte si arrabbia così tanto da morirne,\ne allora finalmente il suo volto diventa sereno."
          moon: "Secondo le teorie di un certo studioso,\nPrimeape è arrabbiato anche quando\nsi trova dentro la Poké Ball."
        de:
          sun: "Manchmal rastet es so aus, dass es auf der\nStelle tot umfällt. Sein Gesichtsausdruck ist\ndanach jedoch äußerst friedlich."
          moon: "Der Theorie eines Forschers zufolge schäumt\nRasaff sogar im Inneren von Pokébällen weiter\nvor Wut."
        es:
          sun: "Se han conocido casos de Primeape que se han\nenfadado tanto que han llegado a fallecer. Aun\nasí, sus rostros expresaban sosiego."
          moon: "Según muestran los estudios de un investigador\nPokémon, Primeape sigue enfadado incluso\ndentro de la Poké Ball."
        ko:
          sun: "너무 화를 내서 그대로\n사망하는 경우가 있을 정도지만\n죽은 후의 얼굴은 매우 평온하다."
          moon: "어느 연구자의 학설에 의하면\n몬스터볼 안에서도\n성원숭은 화나 있다는 듯하다."
        zh_simp:
          sun: "因为太过生气以致于就这么死去，\n这种事也是有的。\n但死的时候表情很安详。"
          moon: "根据某位研究者的论文，\n即使在精灵球里，\n火暴猴好像也在发怒。"
        zh_trad:
          sun: "因為太過生氣而就這樣死去，\n這樣的事也是有的。\n但死的時候表情很安詳。"
          moon: "某位研究者的學說中提到，\n即使在精靈球裡，\n火爆猴好像也在發怒。"
