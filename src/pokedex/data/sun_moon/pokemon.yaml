        - normal
      egg_groups:
        - field
      abilities:
        - stakeout
        - strong_jaw
      hidden_ability: adaptability
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          sun: "するどいキバで　なんにでも　かみつく。\nもともと　アローラには　すんでおらず\nほかのちほうから　つれてこられた。"
          moon: "エサを　さがし　うろつきつづける。\nひが　くれるころには　つかれはて\nたおれこむように　そのばで　ねむる。"
        jp_kanji:
          sun: "鋭いキバで　なんにでも　かみつく。\n元々　アローラには　棲んでおらず\n他の地方から　連れてこられた。"
          moon: "餌を　探し　うろつき続ける。\n日が　暮れるころには　疲れ果て\n倒れ込むように　その場で　眠る。"
        en:
          sun: "With its sharp fangs, it will bite anything.\nIt did not originally live in Alola but was\nimported from another region."
          moon: "It wanders around in a never-ending search for\nfood. At dusk, it collapses from exhaustion and\nfalls asleep on the spot."
        fr:
          sun: "Avec ses crocs acérés, il ne peut s’empêcher\nde mordre tout ce qui bouge. Il fut introduit à\nAlola il y a longtemps, depuis une autre région."
          moon: "Il furète du matin au soir en quête de nourriture.\nLa nuit, exténué, il tombe comme une brique\net s’endort sur place."
        it:
          sun: "Addenta qualsiasi cosa con le sue zanne\naguzze. È stato introdotto ad Alola tempo fa\nda un’altra regione."
          moon: "Si muove continuamente in cerca di cibo.\nQuando si fa sera crolla esausto al suolo\ne si addormenta sul posto."
        de:
          sun: "Mit seinen scharfen Zähnen schnappt es nach\nallem. Es lebte ursprünglich nicht in Alola und\nwurde aus einer anderen Region eingeführt."
          moon: "Die Futtersuche treibt es unaufhörlich umher,\ndoch sobald die Sonne untergeht, wird es von\nMüdigkeit überfallen und schläft sofort ein."
        es:
          sun: "Sus afilados colmillos lo atraviesan todo. No es\nautóctono de Alola, sino que proviene de otra\nregión."
          moon: "Deambula todo el día en busca de alimento. Al\nanochecer, exhausto, se deja caer en cualquier\nlugar y se queda dormido."
        ko:
          sun: "날카로운 이빨로 아무거나 물어버린다.\n원래 알로라에 서식하지 않고\n다른 지방에서 데리고 왔다."
          moon: "먹이를 찾아 계속 돌아다닌다.\n날이 저물 즈음엔 지쳐서\n쓰러지듯이 그 자리에서 잠든다."
        zh_simp:
          sun: "无论什么都能用锐利的牙齿咬住。\n原本并不住在阿罗拉，\n是从其他地区被带过来的。"
          moon: "不断巡回着寻找食物。\n到了太阳落山的时候，\n因为精疲力尽而一头栽倒就这么睡着。"
        zh_trad:
          sun: "銳利的牙齒可咬住任何東西。\n原本並不住在阿羅拉，\n是從其他地區被帶過來的。"
          moon: "不斷徘徊著尋找食物。\n到了太陽下山的時候，\n會因為精疲力盡而一頭倒下睡著。"
