      descriptions:
        jp_kana:
          sun: "やく１００００ボルトの　でんきを\nはきだす。　かなり　しんけいしつで\nなつかせるのは　たいへんだ。"
          moon: "たいもうが　さかだったら　でんきを\nはく　サイン。　そばに　かみなりが\nおちることも　あるので　ちゅうい。"
        jp_kanji:
          sun: "約１００００ボルトの　電気を\n吐き出す。　かなり　神経質で\nなつかせるのは　大変だ。"
          moon: "体毛が　逆立ったら　電気を\n吐く　サイン。　側に　雷が\n落ちることも　あるので　注意。"
        en:
          sun: "They send out electrical charges of about\n10,000 volts. Because they are high-strung,\nit can be difficult to grow close to them."
          moon: "When its fur stands on end, that’s a sign it’s\nabout to give off a jolt of electricity. Take care,\nas sometimes lightning strikes next to it, too."
        fr:
          sun: "Il peut projeter des décharges de 10 000 volts.\nIl est très nerveux, ce qui le rend difficile à\napprivoiser."
          moon: "Quand son pelage se hérisse, c’est signe qu’il\nva projeter de l’électricité. Attention, car il\narrive que la foudre tombe près de lui."
        it:
          sun: "Lancia scariche da 10.000 volt.\nÈ piuttosto nervoso e non è facile conquistarsi\nil suo affetto."
          moon: "Quando rizza il pelo, è segno che sta per\nlanciare una scarica elettrica. A volte attira\ni fulmini, quindi è meglio stare attenti."
        de:
          sun: "Es feuert Blitze von 10 000 V Stärke aus seinem\nMund ab. Es ist sehr nervös, daher haben es\nTrainer schwer, seine Zuneigung zu gewinnen."
          moon: "Steht ihm das Fell zu Berge, ist das ein Zeichen,\ndass es gleich aus seinem Mund einen Blitz\nabfeuert. In seiner Nähe schlagen oft Blitze ein."
        es:
          sun: "Lanza rayos de 10 000 voltios de potencia. Es\ndifícil congeniar con este Pokémon debido a su\nnaturaleza nerviosa."
          moon: "Cuando su pelaje se pone de punta, es señal de\nque va a soltar una descarga. Hay que tener\ncuidado porque pueden caer rayos cerca."
        ko:
          sun: "약 10000볼트의 전기를\n토해낸다. 꽤 신경질적이어서\n길들이는 것은 힘들다."
          moon: "털이 곤두서면 전기를\n뿜는다는 신호다. 근처에 번개가\n떨어질 때도 있으므로 주의."
        zh_simp:
          sun: "喷出大约１００００伏特的电力。\n因为相当神经质，所以要与它\n变得亲密是非常困难的。"
          moon: "体毛竖起来的话，是要喷出电的信号。\n因为旁边也可能会有雷落下，\n所以要注意。"
        zh_trad:
          sun: "能噴出大約１００００伏特的電力。\n因為相當神經質，所以要與牠\n變得親密是非常困難的。"
          moon: "體毛豎立就是要噴出電流的信號。\n旁邊可能會有落雷，\n所以要多加注意。"
