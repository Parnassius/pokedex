      hidden_ability: moxie
      descriptions:
        jp_kana:
          sun: "やこうせい。　ひとこえ　なけば\n１００ぴきを　こえる　こぶんの\nヤミカラスが　しゅうけつする。"
          moon: "えものを　とるのを　しっぱいしたり\nうらぎった　こぶんの　ヤミカラスを\nどこまでも　おいつめ　しょぶんする。"
        jp_kanji:
          sun: "夜行性。　一声　鳴けば\n１００匹を　超える　子分の\nヤミカラスが　集結する。"
          moon: "獲物を　捕るのを　失敗したり\n裏切った　子分の　ヤミカラスを\nどこまでも　追い詰め　処分する。"
        en:
          sun: "A single cry from this nocturnal Pokémon, and\nmore than a hundred of its Murkrow cronies\nwill assemble."
          moon: "If its Murkrow cronies fail to catch food for it,\nor if it feels they have betrayed it, it will hunt\nthem down wherever they are and punish them."
        fr:
          sun: "Un seul des puissants croassements de ce\nPokémon nocturne lui permet de rassembler\nune centaine de Cornèbre, ses sous-fifres."
          moon: "Si l’un de ses sous-fifres Cornèbre a le malheur\nde le décevoir ou d’échouer dans sa mission, le\nCorboss le pourchassera sans le moindre répit."
        it:
          sun: "È un Pokémon notturno. Basta un suo solo\nverso per far accorrere all’istante centinaia di\nMurkrow suoi seguaci."
          moon: "Se uno dei Murkrow suoi seguaci non riesce\na catturare la preda o tradisce la sua fiducia,\nHonchkrow lo insegue ovunque per punirlo."
        de:
          sun: "Dieses nachtaktive Pokémon kann mit einem\neinzigen Ruf über 100 seiner untergebenen\nKramurx versammeln."
          moon: "Untergebene Kramurx, die beim Beutefang\nversagen und Kramshef damit enttäuschen, jagt\nes bis ans Ende der Welt, um sie zu bestrafen."
        es:
          sun: "Es un Pokémon nocturno. Con un solo grito\npuede hacer que acudan más de cien de sus\nleales Murkrow."
          moon: "Si alguno de sus leales Murkrow fracasa en\nconseguirle una presa o se la guarda para sí,\nlo perseguirá sin descanso para castigarle."
        ko:
          sun: "야행성이다. 한번 울면\n100마리를 넘는 부하\n니로우가 집결한다."
          moon: "먹이를 잡는 데 실패하거나\n배신한 부하 니로우를\n끝까지 추적해서 처리한다."
        zh_simp:
          sun: "夜行性。只要鸣叫一声，\n就会有超过１００只的\n黑暗鸦跟班聚集起来。"
          moon: "对于捕猎失败还有\n背叛了的黑暗鸦跟班们，\n无论天涯海角都会穷追过去处罚。"
        zh_trad:
          sun: "夜行性。只要鳴叫一聲，\n就會有超過１００隻的\n黑暗鴉跟班聚集起來。"
          moon: "對於捕獵失敗還有\n背叛了的黑暗鴉跟班們，\n無論天涯海角都會窮追過去施以處罰。"
