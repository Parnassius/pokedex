fletchling:
  species_id: 661
  names:
    jp_kana: ヤヤコマ
    jp_kanji: ヤヤコマ
    en: Fletchling
    fr: Passerouge
    it: Fletchling
    de: Dartiri
    es: Fletchling
    ko: 화살꼬빈
    zh_simp: 小箭雀
    zh_trad: 小箭雀
  forms:
