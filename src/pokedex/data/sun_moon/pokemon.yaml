          moon: "ラムパルドと　にた　ばしょに　いた。\n２ひきが　あらそい　ともだおれに\nなった　かせきが　みつかることも。"
        jp_kanji:
          sun: "正面からで　あれば　あらゆる\n攻撃を　ガードできるが\n後ろを　取られると　なす術なし。"
          moon: "ラムパルドと　似た　場所に　いた。\n２匹が　争い　共倒れに\nなった　化石が　見つかることも。"
        en:
          sun: "While it can guard against any sort of attack\nfrom the front, it is left without recourse when\nattacked from behind."
          moon: "It lived in the same environments as Rampardos.\nTheir fossils have been found together—\nseemingly from after they’d fought to the finish."
        fr:
          sun: "S’il peut parer quasiment tous les assauts de\nface, il est extrêmement vulnérable aux attaques\npar-derrière."
          moon: "Il vivait dans les mêmes zones que le Charkos.\nOn trouve parfois leurs fossiles embrassés pour\nl’éternité suite à un K.O. mutuel."
        it:
          sun: "La sua difesa è impenetrabile se viene attaccato\ndi fronte, ma se viene preso alle spalle\nè estremamente vulnerabile."
          moon: "In passato condivideva l’habitat con Rampardos.\nSpesso i loro scontri finivano in parità e non è\nraro trovarli fossilizzati insieme."
        de:
          sun: "Alle möglichen Angriffe von vorn kann es\nabwehren, aber von hinten ist es schutzlos."
          moon: "Es lebte in denselben Gebieten wie Rameidon.\nManche Fossilienfunde legen nahe, dass sie sich\nerbitterte Kämpfe geliefert haben."
        es:
          sun: "Es capaz de repeler cualquier ataque frontal,\npero se encuentra totalmente a merced de los\nataques por la retaguardia."
          moon: "Compartía hábitat con Rampardos. A veces se\nhan encontrado fósiles de ambas especies\nyaciendo juntos tras una lucha encarnizada."
        ko:
          sun: "정면에서라면 어떤 공격이든\n가드할 수 있지만\n뒤를 뺏기면 방법이 없다."
          moon: "램펄드와 비슷한 장소에 있었다.\n2마리가 싸워 같이 쓰러져\n있는 화석이 발견될 때도 있다."
        zh_simp:
          sun: "如果是从正面的话，\n可以防住所有的攻击，\n但从后方被袭的话就束手无策了。"
          moon: "与战槌龙生活在相似的地方。\n也曾发现过２只互相争斗\n一起倒下后变成的化石。"
        zh_trad:
          sun: "如果是從正面的話，\n可以防住所有的攻擊，\n但從後方遇襲的話就束手無策了。"
          moon: "與戰槌龍生活在相似的地方。\n也曾發現過２隻互相爭鬥後\n同歸於盡而變成的化石。"
