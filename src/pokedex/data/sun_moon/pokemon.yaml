      descriptions:
        jp_kana:
          sun: "もともとは　ほかの　ちほうから\nつれてこられたが　いまは　アローラの\nマクノシタの　ほうが　ゆうめい。"
          moon: "あさ　めざめると　みんなで　けいこ。\nひるに　なると　エサを　たべ　ひるね。\nめざめれば　また　けいこの　まいにち。"
        jp_kanji:
          sun: "元々は　他の　地方から\n連れてこられたが　今は　アローラの\nマクノシタの　ほうが　有名。"
          moon: "朝　目覚めると　皆で　けいこ。\n昼に　なると　餌を　食べ　昼寝。\n目覚めれば　また　けいこの　毎日。"
        en:
          sun: "It was originally brought in from another region,\nbut now Makuhita from Alola are more famous."
          moon: "Their daily routine consists of training together\nfirst thing in the morning, eating and napping in\nthe afternoon, and then more training afterward."
        fr:
          sun: "Les Makuhita d’Alola sont aujourd’hui les plus\nconnus, bien qu’ils aient à l’origine été amenés\nsur l’archipel depuis des régions étrangères."
          moon: "La journée de ce Pokémon est placée sous\nle signe de l’entraînement intensif, qui ne\ns’interrompt que pour manger et faire la sieste."
        it:
          sun: "Pur non essendo un Pokémon originario di Alola,\noggi i Makuhita di Alola sono quelli più famosi."
          moon: "Si allena duramente ogni giorno assieme ai suoi\ncompagni, fermandosi solo per mangiare e per\nfare un pisolino."
        de:
          sun: "Obwohl sie ursprünglich aus einer anderen\nRegion kommen, sind Alola-Makuhita heute\nbekannter als ihre übrigen Artgenossen."
          moon: "Seine Tage beginnen morgens mit Training.\nEs folgen Mittagessen und Mittagsschlaf.\nDanach wird wieder fleißig weitertrainiert."
        es:
          sun: "Aunque son originarios de otras regiones, los\nMakuhita de Alola son ahora los más populares\nde todos."
          moon: "Su jornada gira en torno al entrenamiento\nintensivo, que solo interrumpe para comer\ny para echarse una siestecilla."
        ko:
          sun: "원래는 다른 지방에서\n데려왔지만 지금은 알로라의\n마크탕이 더 유명하다."
          moon: "아침에 눈을 뜨면 모두와 연습한다.\n낮이 되면 먹이를 먹고 낮잠을 잔다.\n눈을 뜨면 다시 연습을 하는 매일을 보낸다."
        zh_simp:
          sun: "最早是从其他地区被带到这儿来的，\n但现在阿罗拉的幕下力士比较有名。"
          moon: "每天早上醒来后大家一起训练，\n到了中午就吃东西午睡，\n醒来后又继续训练。"
        zh_trad:
          sun: "最早是從其他地區被帶到這裡來的，\n但現在阿羅拉的幕下力士比較有名。"
          moon: "每天早上醒來後大家一起訓練。\n到了中午吃完東西後就睡午覺。\n睡醒後又繼續訓練。"
