      descriptions:
        jp_kana:
          sun: "よるの　かいめんを　のぞきこんで\nかがやく　ほしの　ような　ひかりが\nみえたら　それは　ランターンだよ。"
          moon: "つよい　ひかりを　はなち　えものの\nめを　くらませる。　スキが　できたら\nでんげきを　おみまいする。"
        jp_kanji:
          sun: "夜の　海面を　覗き込んで\n輝く　星の　ような　光が\n見えたら　それは　ランターンだよ。"
          moon: "強い　光を　放ち　獲物の\n目を　くらませる。　隙が　できたら\n電撃を　お見舞いする。"
        en:
          sun: "Should you peer into the ocean at night and see\na light shining like the stars, that is Lanturn."
          moon: "This Pokémon flashes a bright light that blinds\nits prey. This creates an opening for it to deliver\nan electrical attack."
        fr:
          sun: "Lorsqu’on regarde au fond de la mer au milieu\nde la nuit et que l’on croit apercevoir le reflet\ndes étoiles, c’est probablement un Lanturn."
          moon: "Il dégage une vive lumière pour éblouir ses\nproies, puis les achève d’un choc électrique\nbien senti."
        it:
          sun: "Quando sulla superficie del mare si vede brillare\nuna luce che sembra una stella, si tratta di\nun Lanturn."
          moon: "Acceca la preda con una luce intensa per poi\nattaccarla immediatamente con una scossa\nelettrica."
        de:
          sun: "Blickt man nachts in die Tiefen des Meeres\nhinab und sieht am Grund ein helles Licht,\nhandelt es sich dabei um ein Lanturn."
          moon: "Es blendet seine Beute mit einem starken Blitz.\nSieht es eine Chance zuzuschlagen, greift es\nsie mit Elektrizität an."
        es:
          sun: "Cuando por la noche el mar parece un cielo\nestrellado, es muy probable que se trate de\nLanturn haciendo brillar su antena."
          moon: "Ciega a sus presas con una luz intensa. Si tiene\nla ocasión, les propina una buena descarga\neléctrica."
        ko:
          sun: "밤에 해면을 들여다보다\n반짝이는 별 같은 빛이\n보이면 그것은 랜턴이다."
          moon: "강한 빛을 발산해 먹이의 눈을\n멀게 한다. 허점이 생기면\n전격을 먹인다."
        zh_simp:
          sun: "探头望向夜晚的海面，\n如果看到犹如闪烁的星星\n一样的光，那是电灯怪哦。"
          moon: "发出强光蒙住猎物的眼睛。\n抓住那一瞬间的空档，\n使其遭受电的攻击。"
        zh_trad:
          sun: "探頭望向夜晚的海面，\n如果能看到有如星星閃爍\n一樣的光，那就是電燈怪哦。"
          moon: "發出強光讓獵物暫時失明。\n趁獵物露出破綻時，\n用電擊招呼對手。"
