        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
        - flying
      egg_groups:
        - flying
      abilities:
        - dancer
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          sun: "はねを　うちあわせて　はっか。\nかれいな　ステップを　ふみながら\nはげしい　ほのおを　あびせかけるぞ。"
          moon: "くれないのミツを　すった　オドリドリ。\nじょうねつてきな　ステップで　てきの\nみも　こころも　やきつくす。"
        jp_kanji:
          sun: "羽を　打ち合わせて　発火。\n華麗な　ステップを　踏みながら\n激しい　炎を　浴びせかけるぞ。"
          moon: "くれないのミツを　吸った　オドリドリ。\n情熱的な　ステップで　敵の\n身も　心も　焼き尽くす。"
        en:
          sun: "It beats its wings together to create fire.\nAs it moves in the steps of its beautiful dance,\nit bathes opponents in intense flames."
          moon: "This Oricorio has sipped red nectar. Its\npassionate dance moves cause its enemies\nto combust in both body and mind."
        fr:
          sun: "Il réunit ses ailes pour générer du feu.\nSa chorégraphie envoûtante noie l’ennemi\nsous un torrent de flammes."
          moon: "Après avoir bu du Nectar Rouge, Plumeline\nse lance dans une ardente danse qui consume\nle cœur de ses ennemis."
        it:
          sun: "Genera del fuoco congiungendo le ali.\nAvvolge il nemico con violente fiamme mentre\nsi esibisce in un’elegante coreografia di danza."
          moon: "Un Oricorio che si è nutrito di Nettare rosso.\nCon i suoi ardenti passi di danza trascina i suoi\nnemici in una lotta infuocata."
        de:
          sun: "Schlägt es mit den Flügeln, gibt es Zunder!\nMit eleganten Ausfallschritten lässt es dann\nFeuer auf seine Gegner herabregnen."
          moon: "Ein Choreogel, das roten Nektar geschlürft hat.\nMit seinen hitzigen Tanzschritten versengt es\nKörper und Geist eines jeden Gegners."
        es:
          sun: "Junta las alas y lanza voraces llamas al rival.\nSu ataque se asemeja a una elaborada\ncoreografía de fuego."
          moon: "Forma que toma Oricorio al libar Néctar Rojo.\nHace arder el corazón de sus adversarios con\nsu cálida danza."
        ko:
          sun: "날개를 부딪쳐서 발화시킨다.\n화려한 스텝을 밟으면서\n격렬한 불꽃을 퍼붓는다."
          moon: "다홍꿀을 빨아들인 춤추새.\n정열적인 스텝으로 적의\n몸도 마음도 불태운다."
        zh_simp:
          sun: "拍打翅膀生火。\n一边踩着华丽的步伐，\n一边洒下猛烈的火焰。"
          moon: "吸食了朱红色花蜜的花舞鸟。\n以热情的步伐将敌人的身心\n全部燃烧殆尽。"
        zh_trad:
          sun: "拍打翅膀生火。\n一邊踩著華麗的步伐，\n一邊灑下猛烈的火焰。"
          moon: "吸食了朱紅色花蜜的花舞鳥。\n以熱情的舞步將敵人的身心\n全部燃燒殆盡。"
    oricorio_pom_pom_style:
