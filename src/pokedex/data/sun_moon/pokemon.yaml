        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
        - dragon
      abilities:
        - mold_breaker
      descriptions:
        jp_kana:
          sun: "メガシンカが　のうにも　さよう。\nすべてを　やきつくす　はかいの\nほんのうしか　のこっていない。"
          moon: "からだの　わきの　ふんしゃこう　から\nみずを　ふきだし　すいめんへ　とぶ。\nそのスピードは　マッハを　こえるぞ。"
        jp_kanji:
          sun: "メガシンカが　脳にも　作用。\nすべてを　焼き尽す　破壊の\n本能しか　残っていない。"
          moon: "身体の　脇の　噴射口　から\n水を　吹き出し　水面へ　飛ぶ。\nそのスピードは　マッハを　超えるぞ。"
        en:
          sun: "Mega Evolution also affects its brain, leaving\nno other function except its destructive instinct\nto burn everything to cinders."
          moon: "It jets water from the orifices on its sides,\nstreaking above the water surface at\nsupersonic speed."
        fr:
          sun: "La Méga-Évolution a endommagé son cerveau.\nIl ne lui reste donc plus que l’instinct sauvage\nde tout réduire en cendres."
          moon: "Les ouïes sur ses côtés projettent de l’eau\nhorizontalement pour lui faire atteindre une\nvitesse supérieure à Mach 1."
        it:
          sun: "L’effetto della megaevoluzione ha avuto delle\nripercussioni sul suo cervello, lasciandogli solo\nl’istinto di ridurre tutto in cenere."
          moon: "Spruzzando acqua dalle aperture ai lati del suo\ncorpo riesce a volare sulla superficie dell’acqua\na una velocità supersonica."
        de:
          sun: "Die Mega-Entwicklung wirkt sich auch auf sein\nGehirn aus. Nur der zerstörerische Trieb,\nalles niederzubrennen, ist übrig geblieben."
          moon: "Über Körperöffnungen an der Seite stößt es\nWasserstrahlen aus und dringt mit mehr als\nMach-Geschwindigkeit an die Wasseroberfläche."
        es:
          sun: "La megaevolución también ha afectado a su\ncerebro. Solo ha permanecido intacto su\ninstinto de reducirlo todo a cenizas."
          moon: "Expulsa agua a presión por las agallas de sus\ncostados para así poder volar a una velocidad\nsupersónica."
        ko:
          sun: "메가진화가 뇌에도 작용했다.\n모든 것을 불태우는 파괴의\n본능밖에 남아있지 않다."
          moon: "몸의 측면의 분사구에서\n물을 뿜어 수면으로 날아오른다.\n그 스피드는 마하를 넘는다."
        zh_simp:
          sun: "超级进化对大脑也会有作用。\n只残留下了将一切都烧毁破坏的本能。"
          moon: "从身体侧面的喷射口\n喷出水来，沿着水面飞行。\n那速度超过了音速。"
        zh_trad:
          sun: "超級進化對大腦也會起作用。\n只剩下將一切都燒毀破壞的本能。"
          moon: "從身體側面的噴射口\n噴出水來，沿著水面飛行。\n那速度超過了音速。"
lapras:
