      types:
        - grass
        - psychic
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      hidden_ability: harvest
      descriptions:
        jp_kana:
          sun: "それぞれの　あたまに　いしが　あり\nテレパシーで　はなしあい　みんなで\nなにを　するのか　きめている。"
          moon: "あるじきが　くると　３つの　あたまの\nどれかが　おちる。　それが　やがて\nタマタマへと　せいちょう　していく。"
        jp_kanji:
          sun: "それぞれの　頭に　意思が　あり\nテレパシーで　話し合い　みんなで\nなにを　するのか　決めている。"
          moon: "ある時期が　くると　３つの　頭の\nどれかが　落ちる。　それが　やがて\nタマタマへと　成長　していく。"
        en:
          sun: "Each of its heads has its own will. They use\ntelepathy to discuss their plans before coming\nto a joint decision."
          moon: "When the time comes, one of its three heads\nfalls off. Before long, the fallen head grows into\nan Exeggcute."
        fr:
          sun: "Chaque tête a sa volonté propre. Toutes\ndiscutent ensemble par télépathie et décident\nde ce qu’elles vont faire d’un commun accord."
          moon: "À un certain moment de sa vie, l’une des trois\ntêtes tombe. Elle germera en un nouveau\nNoeunoeuf."
        it:
          sun: "Le tre teste ragionano autonomamente e\ncomunicano tramite telepatia per prendere\ndecisioni in comune."
          moon: "Durante la crescita, una delle sue tre teste\ncade e dà vita a un nuovo Exeggcute."
        de:
          sun: "Jeder seiner Köpfe hat einen eigenen Willen.\nSie kommunizieren telepathisch miteinander,\num gemeinsam Entscheidungen zu treffen."
          moon: "Zu einer bestimmten Jahreszeit fällt einer seiner\ndrei Köpfe ab. Dieser wird schließlich zu einem\nneuen Owei."
        es:
          sun: "Cada una de sus cabezas piensa de forma\nindividual. Para tomar decisiones, se comunican\nentre ellas telepáticamente."
          moon: "En algún momento de su vida, una de sus tres\ncabezas se desprende y se transforma en un\nnuevo Exeggcute."
        ko:
          sun: "각각의 머리에 의지가 있어\n텔레파시로 대화하여 모두와\n무엇을 할건지 정한다."
          moon: "어느 시기가 되면 3개의 머리 중\n하나가 떨어진다. 그것이 그대로\n아라리로 성장해간다."
        zh_simp:
          sun: "各个脑袋里有各自的思想，\n通过心灵感应来交谈，\n决定大家要做什么。"
          moon: "某个时期到来的时候，\n３个头的某一个会掉落。\n之后不久就会成长为蛋蛋。"
        zh_trad:
          sun: "每個腦袋各有各的思想，\n會通過心靈感應來交談，\n決定大家要做什麼。"
          moon: "某個時期到來的時候，\n３個頭的某一個便會掉落，\n不久就會成長為蛋蛋。"
    exeggutor_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 95
        attack: 105
        defense: 85
        special_attack: 125
        special_defense: 75
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - grass
        - dragon
      egg_groups:
        - grass
      abilities:
        - frisk
      hidden_ability: harvest
      descriptions:
        jp_kana:
          sun: "アローラは　さいこうの　かんきょう。\nこのすがたが　ほんらいの　ナッシーだと\nじもとの　ひとびとは　ほこらしげだ。"
          moon: "のびのび　そだって　サイコパワーは\nいらなくなり　ねむれる　ドラゴンの\nちからが　かくせい　したのだ。"
        jp_kanji:
          sun: "アローラは　最高の　環境。\nこの姿が　本来の　ナッシーだと\n地元の　人々は　誇らしげだ。"
          moon: "伸び伸び　育って　サイコパワーは\nいらなくなり　眠れる　ドラゴンの\n力が　覚醒　したのだ。"
        en:
          sun: "Alola is the best environment for this Pokémon.\nLocal people take pride in its appearance,\nsaying this is how Exeggutor ought to look."
          moon: "As it grew taller and taller, it outgrew its\nreliance on psychic powers, while within it\nawakened the power of the sleeping dragon."
        fr:
          sun: "Le climat idéal d’Alola a permis à ce Pokémon\nde révéler sa véritable apparence. Les habitants\nn’en sont pas peu fiers."
          moon: "En grandissant, ses pouvoirs psychiques sont\ndevenus inutiles, mais le pouvoir des dragons\ns’est manifesté à la place."
        it:
          sun: "Alola è l’ambiente ideale per gli Exeggutor.\nGli abitanti del posto sono orgogliosi della forma\nlocale che ritengono essere quella originale."
          moon: "Con la crescita i suoi poteri psichici sono\ndiventati obsoleti, mentre si è risvegliata nel\nPokémon la forza latente del tipo Drago."
        de:
          sun: "In Alola herrschen für Kokowei die besten\nBedingungen. Die Einwohner behaupten voller\nStolz, dass dies seine ursprüngliche Form sei."
          moon: "Der Wachstumsschub machte seine Psycho-\nKräfte überflüssig. Stattdessen wurden die\nin ihm schlafenden Drachen-Kräfte geweckt."
        es:
          sun: "En Alola se encuentra como pez en el agua. Los\nlugareños se muestran orgullosos de su aspecto,\nya que lo consideran el original."
          moon: "Su poder psíquico ha desaparecido al crecer,\npero ha despertado en cambio el poder dragón\nque tenía latente."
        ko:
          sun: "알로라는 최고의 환경이다.\n이 모습이 본래의 나시라고\n그 지방 사람들은 자랑스러워한다."
          moon: "무럭무럭 자라 사이코 파워는\n필요 없게 되어 잠들어 있던\n드래곤의 힘이 각성했다."
        zh_simp:
          sun: "对它来说，阿罗拉是最棒的环境。\n当地的人们夸赞这个样子\n才是真正的椰蛋树。"
          moon: "悠然惬意地长大之后，\n它便不再需要原来的精神力量，\n沉睡于体内的龙之力量已经觉醒。"
        zh_trad:
          sun: "對牠來說，阿羅拉是最棒的環境。\n當地的人們誇讚說\n這才是椰蛋樹原本該有的樣子。"
          moon: "悠悠地成長，\n變得不再需要精神力量，\n沉睡的龍之力也覺醒了。"
cubone:
  species_id: 104
  names:
    jp_kana: カラカラ
    jp_kanji: カラカラ
    en: Cubone
    fr: Osselait
    it: Cubone
    de: Tragosso
    es: Cubone
    ko: 탕구리
    zh_simp: 卡拉卡拉
    zh_trad: 卡拉卡拉
  forms:
    cubone:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 95
        special_attack: 40
        special_defense: 50
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - monster
      abilities:
        - rock_head
        - lightning_rod
      hidden_ability: battle_armor
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          sun: "しにわかれた　ははを　おもいだして\nおおごえで　なく。　こえをききつけた\nバルジーナに　そらから　ねらわれる。"
          moon: "あたまに　かぶった　ずがいこつは\nしんだ　ははおや。　しの　かなしみを\nのりこえたとき　しんかする　という。"
        jp_kanji:
          sun: "死に別れた　母を　思いだして\n大声で　泣く。　声を聞きつけた\nバルジーナに　空から　狙われる。"
          moon: "頭に　被った　頭がい骨は\n死んだ　母親。　死の　悲しみを\n乗り越えたとき　進化する　という。"
        en:
          sun: "When it thinks of its deceased mother, it weeps\nloudly. Mandibuzz that hear its cries will attack\nit from the air."
          moon: "The skull it wears on its head is that of its dead\nmother. According to some, it will evolve when\nit comes to terms with the pain of her death."
        fr:
          sun: "Quand il se souvient de la mort de sa mère,\nil pleure à grands sanglots. Les Vaututrice\nentendent ces cris et fondent sur leur proie."
          moon: "Le crâne qu’il porte sur la tête est celui de sa\nmère décédée. On dit qu’il évolue lorsqu’il\nparvient à surpasser la douleur de sa mort."
        it:
          sun: "Piange disperatamente pensando alla madre\nmorta. Quando i Mandibuzz lo sentono,\nsi lanciano in picchiata per attaccarlo."
          moon: "Il teschio che porta in testa apparteneva alla\nmadre morta. Si evolve dopo aver superato\nil lutto per la sua perdita."
        de:
          sun: "Denkt es an seine verstorbene Mutter, weint es\nlaut. Hört dies ein Grypheldis, nutzt dieses die\nGelegenheit, um es aus der Luft anzugreifen."
          moon: "Der Schädel auf seinem Kopf gehörte seiner\nverstorbenen Mutter. Überwindet es diesen\nVerlust, setzt angeblich die Entwicklung ein."
        es:
          sun: "Llora desconsoladamente por la pérdida de su\nmadre. Los Mandibuzz que escuchan su llanto\nse lanzan en picado al ataque."
          moon: "El cráneo que lleva en la cabeza pertenece a su\nmadre. Se dice que evoluciona una vez que ha\nconseguido superar su pérdida."
        ko:
          sun: "사별한 어머니를 생각하며\n큰 소리로 운다. 목소리를 들은\n버랜지나가 하늘에서 노린다."
          moon: "머리에 뒤집어쓴 두개골은\n죽은 어미의 것. 죽음의 슬픔을\n뛰어넘었을 때 진화한다고 전해진다."
        zh_simp:
          sun: "想起与自己天人永隔的母亲\n而大声哭泣。被听到声音的\n秃鹰娜从空中袭击。"
          moon: "头上戴着的是死去母亲的\n头盖骨。据说，当它摆脱\n母亲死亡的悲痛时就会进化。"
        zh_trad:
          sun: "想起與自己死別的母親\n而大聲哭泣，被聽到聲音的\n禿鷹娜從空中襲擊。"
          moon: "頭上戴著的是死去母親的\n頭蓋骨。據說，當牠擺脫\n母親死亡的悲痛時就會進化。"
marowak:
  species_id: 105
  names:
    jp_kana: ガラガラ
    jp_kanji: ガラガラ
    en: Marowak
    fr: Ossatueur
    it: Marowak
    de: Knogga
    es: Marowak
    ko: 텅구리
    zh_simp: 嘎啦嘎啦
    zh_trad: 嘎啦嘎啦
  forms:
    marowak:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 110
        special_attack: 50
        special_defense: 80
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - monster
      abilities:
        - rock_head
        - lightning_rod
      hidden_ability: battle_armor
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          sun: "もともとは　ひよわで　おくびょう。\nしんかで　ホネを　ふりまわす\nきょうぼうな　せいしつに　なる。"
          moon: "ホネを　ブーメランのように　なげつけ\nてんてきだった　バルジーナを\nうちおとし　ふくしゅう　するのだ。"
        jp_kanji:
          sun: "元々は　ひ弱で　おくびょう。\n進化で　骨を　振り回す\n乱暴な　性質に　なる。"
          moon: "骨を　ブーメランのように　投げつけ\n天敵だった　バルジーナを\n撃ち落とし　復しゅう　するのだ。"
        en:
          sun: "Originally, it was weak and timid. After evolution,\nits temperament becomes violent, and it begins\nto wield bones as weapons."
          moon: "This Pokémon is out for vengeance on its natural\nenemy, Mandibuzz. It throws bones like\nboomerangs to try to take it down."
        fr:
          sun: "Il était faible et peureux, mais après avoir\névolué, il a appris à manier son os avec férocité\net est devenu plus violent et agressif."
          moon: "Il lance le grand os comme un boomerang pour\nabattre son ancien prédateur, les Vaututrice,\npour se venger."
        it:
          sun: "Prima era timido e pauroso, ma dopo\nl’evoluzione è diventato aggressivo, come\ndimostra l’osso che brandisce."
          moon: "Scaglia il suo osso come un boomerang per\nabbattere i Mandibuzz, suoi antichi predatori,\ne vendicarsi."
        de:
          sun: "Vor der Entwicklung war es schwach und\nängstlich. Jetzt ist es hitzköpfig und schlägt\nwild mit einem Knochen um sich."
          moon: "Es wirft seinen Knochen bumeranggleich nach\nGrypheldis, dem Erzfeind seiner Vorstufe, um es\nvom Himmel zu holen und sich an ihm zu rächen."
        es:
          sun: "Cuando Cubone evoluciona a Marowak, deja de\nser débil y cobarde, se vuelve más agresivo y\nusa el hueso como arma."
          moon: "Utiliza su hueso como si fuese un bumerán para\nderribar a Mandibuzz, su enemigo natural, a\nmodo de venganza."
        ko:
          sun: "원래는 약하고 겁이 많다.\n진화로 뼈다귀를 휘두르는\n난폭한 성질이 된다."
          moon: "뼈다귀를 부메랑처럼 내던져서\n천적이었던 버랜지나를\n떨어뜨려 복수한다."
        zh_simp:
          sun: "原本因体弱而很胆小。\n进化后变成了挥舞着骨头的粗暴性格。"
          moon: "将骨头像回力镖一样扔出去，\n击落天敌秃鹰娜来复仇。"
        zh_trad:
          sun: "原本因體弱而很膽小。\n進化後變成了揮舞著骨頭的粗暴性格。"
          moon: "將骨頭像回力鏢一樣扔出去，\n擊落天敵禿鷹娜來復仇。"
    marowak_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 60
        attack: 80
        defense: 110
        special_attack: 50
        special_defense: 80
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - ghost
      egg_groups:
        - monster
      abilities:
        - cursed_body
        - lightning_rod
      hidden_ability: rock_head
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          sun: "てにした　ホネは　ははのホネ。\nししてなお　こをおもう　ははのむねんは\nほのおとなって　ガラガラを　まもる。"
          moon: "なかまを　とむらう　しゅうせい。\nみちの　すみに　もりあがった　つちが\nあったら　それは　ガラガラの　はか。"
        jp_kanji:
          sun: "手にした　ホネは　母のホネ。\n死してなお　子を想う　母の無念は\n炎となって　ガラガラを　守る。"
          moon: "仲間を　弔う　習性。\n道の　すみに　盛り上がった　土が\nあったら　それは　ガラガラの　墓。"
        en:
          sun: "The bones it possesses were once its mother’s.\nIts mother’s regrets have become like a vengeful\nspirit protecting this Pokémon."
          moon: "Its custom is to mourn its lost companions.\nMounds of dirt by the side of the road mark\nthe graves of the Marowak."
        fr:
          sun: "L’os qu’il tient dans la main appartenait à sa\nmère. Les regrets de celle-ci se sont mués en\nflammes qui le protègent par-delà la mort."
          moon: "Il pleure la mort de ses alliés et leur bâtit des\nsépultures aux coins des chemins sous forme\nde monticules de terre caractéristiques."
        it:
          sun: "L’osso che impugna apparteneva alla madre, la\ncui apprensione si è trasformata in una fiamma\nche protegge i figli anche dopo la morte."
          moon: "Soffre molto per la perdita dei propri compagni.\nI cumuli di terra che si vedono ogni tanto agli\nangoli delle strade sono tombe di Marowak."
        de:
          sun: "Die Knochen in seinem Besitz stammen von der\nMutter. Nach ihrem Tod wurde ihre Trauer zu\nFlammen, die Knogga nun schützen."
          moon: "Es hält Trauerfeiern für verstorbene Knogga ab.\nFindet sich ein Haufen Erde am Straßenrand,\nso handelt es sich um das Grab eines Knogga."
        es:
          sun: "El hueso que lleva en la mano es de su madre.\nLa pena que siente por su hijo es tan intensa\nque lo protege con llamas más allá de la muerte."
          moon: "Llora mucho la pérdida de sus compañeros y les\nda sepultura en los recesos del camino, donde\nforma pequeños montículos de arena."
        ko:
          sun: "손에 있는 뼈는 어머니의 뼈다.\n죽어서도 자식을 생각하는 어머니의\n마음은 불꽃이 되어 텅구리를 지킨다."
          moon: "동료를 기리는 습성을 가졌다.\n길 한구석에 솟아오른 흙이\n있다면 그것은 텅구리의 무덤이다."
        zh_simp:
          sun: "手里的骨头是母亲的骸骨。\n死后还念着孩子的母亲的遗憾，\n化为火焰守护着嘎啦嘎啦。"
          moon: "有哀悼伙伴的习性。\n如果路边有隆起的土，\n那是嘎啦嘎啦的坟墓。"
        zh_trad:
          sun: "手裡的骨頭是母親的骸骨。\n死後還思念著孩子的母親帶著遺憾，\n化為火焰守護著嘎啦嘎啦。"
          moon: "有哀悼夥伴的習性。\n若路邊有隆起的土，\n那是嘎啦嘎啦的墳墓。"
