        jp_kana:
          sun: "９にんの　せいじゃが　がったいし\nキュウコンに　なったという　でんせつも\nのこるほど　しんぴにみちた　ポケモン。"
          moon: "１０００ねん　いきると　いわれている。\nじんつうりきで　かえんを　じざいに\nあやつり　えものを　やきこがす。"
        jp_kanji:
          sun: "９人の　聖者が　合体し\nキュウコンに　なったという　伝説も\n残るほど　神秘に満ちた　ポケモン。"
          moon: "１０００年　生きると　いわれている。\n神通力で　火炎を　自在に\n操り　獲物を　焼き焦がす。"
        en:
          sun: "Legend has it that this mystical Pokémon was\nformed when nine saints coalesced into one."
          moon: "Said to live for a thousand years, this Pokémon\nuses its supernatural abilities to manipulate fire.\nIt can burn its prey to a crisp as it pleases."
        fr:
          sun: "L’aura mystique de ce Pokémon est telle qu’une\nlégende raconte que neuf grands sages ont\nun jour fusionné pour devenir un Feunard."
          moon: "On raconte que ce Pokémon vit 1 000 ans.\nSes pouvoirs lui permettent de contrôler les\nflammes à volonté pour griller ses proies."
        it:
          sun: "Questo Pokémon è avvolto nel mistero.\nLa leggenda narra che sia nato dalla fusione\ndi nove saggi."
          moon: "Si dice che possa vivere mille anni.\nGrazie ai suoi poteri magici, è in grado di\ncontrollare le fiamme e incenerire le sue prede."
        de:
          sun: "Einer Legende nach entstand dieses mystische\nPokémon, als einst neun Zauberer mit heiligen\nKräften zu einem verschmolzen."
          moon: "Man sagt, es könne bis zu 1 000 Jahre alt\nwerden. Mit mystischen Kräften kontrolliert es\ndas Feuer und brät sich damit seine Beute."
        es:
          sun: "Siempre se le ha considerado un Pokémon\nmístico. Una leyenda asegura que se originó\na partir de la unión de nueve deidades."
          moon: "Se dice que este Pokémon llega a vivir mil años.\nCon sus poderes, es capaz de controlar el fuego\na voluntad y calcinar a sus presas."
        ko:
          sun: "9명의 성자가 합체하여\n나인테일이 되었다는 전설이\n남을 정도로 신비함이 가득한 포켓몬."
          moon: "1000년을 산다고 전해진다.\n신통력으로 화염을 자유자재로\n조종해서 먹이를 불태워버린다."
        zh_simp:
          sun: "至今还流传着９位圣者\n合体变成九尾的传说，\n是充满神秘色彩的宝可梦。"
          moon: "据说生存了１０００年。\n利用神通力自由地操纵火焰，\n将猎物烧焦。"
        zh_trad:
          sun: "至今還流傳著９位聖者\n合體變成九尾的傳說，\n是充滿神秘色彩的寶可夢。"
          moon: "據說生存了１０００年。\n利用神通力自由地操縱火焰，\n將獵物燒焦。"
