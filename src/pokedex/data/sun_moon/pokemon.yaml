      descriptions:
        jp_kana:
          sun: "たいようこうせんから　つくりだす\nエネルギーだんは　すごい　いりょく。\nただ　よるや　あめのひは　うてない。"
          moon: "かなりの　ばりきを　もっているので\nけんせつかんけいしゃが　このんで\nパートナーに　えらぶ　ポケモンだ。"
        jp_kanji:
          sun: "太陽光線から　つくりだす\nエネルギー弾は　凄い　威力。\nただ　夜や　雨の日は　撃てない。"
          moon: "かなりの　馬力を　持っているので\n建設関係者が　好んで\nパートナーに　選ぶ　ポケモンだ。"
        en:
          sun: "The blasts of energy it makes from sunbeams\nhave terrifying power. However, it’s not able to\nfire its blasts at night or on rainy days."
          moon: "Known for its hefty horsepower, this Pokémon\nis a popular partner for construction workers."
        fr:
          sun: "Il absorbe les rayons solaires pour tirer des\nballes d’énergie incroyablement destructrices.\nUne arme inutilisable s’il pleut ou s’il fait nuit."
          moon: "Ce Pokémon jouit d’une force physique\nhors-norme, ce qui fait de lui le meilleur allié\ndes chefs de chantier."
        it:
          sun: "Assorbe l’energia solare e la usa per sparare\npotentissime sfere di energia. Questa capacità\ndiventa inutile di notte e nei giorni di pioggia."
          moon: "La grande forza di questo Pokémon lo rende\nun partner ideale nei lavori di edilizia."
        de:
          sun: "Es verarbeitet Sonnenstrahlen zu Energiekugeln\nvon ungeheurer Stärke. Nachts sowie bei Regen\nkann es diese jedoch nicht abfeuern."
          moon: "Es verfügt über gewaltige Stärke und ist\ndeshalb bei Bauarbeitern sehr beliebt.\nDiese wählen es oft als Partner-Pokémon."
        es:
          sun: "Absorbe los rayos solares y los transforma en\npoderosas bolas de energía. Sin embargo, no\npuede hacerlo de noche o en días lluviosos."
          moon: "La soberbia potencia de la que hace gala lo\nconvierte en un ayudante idóneo para todo\ntrabajador de la construcción."
        ko:
          sun: "태양광선으로부터 만든\n에너지탄은 엄청난 위력이다.\n하지만 밤과 비 오는 날에는 쏠 수 없다."
          moon: "상당한 체력을 지니고 있어\n건설 관계자가 파트너를\n선택할 때 선호하는 포켓몬이다."
        zh_simp:
          sun: "从太阳光线中造出来的\n能量弹威力巨大。\n但是晚上和雨天无法射击。"
          moon: "因为拥有相当大的马力，\n所以是深受建设相关人员喜爱，\n被选作同伴的宝可梦。"
        zh_trad:
          sun: "利用太陽光製造出來的\n能量彈威力強大。\n但是晚上和雨天都無法發射。"
          moon: "因為擁有相當大的馬力，\n所以建築相關人員很喜歡\n選擇這個寶可夢當拍檔。"
