bruxish:
  species_id: 779
  names:
    jp_kana: ハギギシリ
    jp_kanji: ハギギシリ
    en: Bruxish
    fr: Denticrisse
    it: Bruxish
    de: Knirfish
    es: Bruxish
    ko: 치갈기
    zh_simp: 磨牙彩皮鱼
    zh_trad: 磨牙彩皮魚
  forms:
    bruxish:
      form_id: 0
      base_stats:
        hp: 68
        attack: 105
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 92
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - water_2
      abilities:
        - dazzling
        - strong_jaw
      hidden_ability: wonder_skin
      held_items:
        rare: razor_fang
      descriptions:
        jp_kana:
          sun: "あたまの　とっきから　サイコパワーを\nはなつとき　とても　みみざわりな\nはぎしりの　おとが　あたりに　ひびく。"
          moon: "ねんりきで　えものを　しびれさせ\nじょうぶな　はで　かみくだく。\nシェルダーの　カラでも　よゆうだ。"
        jp_kanji:
          sun: "頭の　突起から　サイコパワーを\n放つとき　とても　耳障りな\n歯ぎしりの　音が　あたりに　響く。"
          moon: "念力で　獲物を　しびれさせ\n丈夫な　歯で　噛み砕く。\nシェルダーの　殻でも　よゆうだ。"
        en:
          sun: "When it unleashes its psychic power from the\nprotuberance on its head, the grating sound\nof grinding teeth echoes through the area."
          moon: "It stuns its prey with psychokinesis and then\ngrinds them to mush with its strong teeth.\nEven Shellder’s shell is no match for it."
        fr:
          sun: "Lorsqu’il utilise l’appendice sur sa tête pour\nprojeter ses pouvoirs psychiques, il émet un\nbruit aussi irritant qu’un grincement de dents."
          moon: "Il engourdit ses proies grâce à sa force mentale\navant de les dévorer avec ses grosses dents.\nIl peut briser les Kokiyas sans problème."
        it:
          sun: "Quando proietta il suo potere psichico dalla\nprotuberanza sulla testa, diffonde tutto intorno\nun fastidioso rumore di denti che stridono."
          moon: "Paralizza le prede con la telecinesi e le addenta\ncon le sue robuste zanne, capaci di frantumare\npersino il guscio di uno Shellder."
        de:
          sun: "Wenn es über den Fortsatz an seinem Kopf\nPsycho-Kräfte freisetzt, ertönt in seiner\nUmgebung ein unangenehmes Zähneknirschen."
          moon: "Es lähmt seine Beute mit Psycho-Kräften und\nzerkaut sie mit seinen kräftigen Zähnen. Auch\ndie Schale von Muschas knackt es problemlos."
        es:
          sun: "Cuando la protuberancia que tiene en la cabeza\nemite poderes psíquicos, se escucha como un\nruido de dientes rechinando muy molesto."
          moon: "Paraliza a su presa con poderes telequinéticos\ny la hace picadillo con su robusta dentadura.\nNi siquiera Shellder se le resiste."
        ko:
          sun: "머리의 돌기에서 사이코 파워를\n발산할 때 아주 귀에 거슬리는\n이가는 소리가 주변에 울려 퍼진다."
          moon: "염동력으로 먹이를 마비시켜\n튼튼한 이빨로 깨물어 부순다.\n셀러의 껍질도 거뜬히 부순다."
        zh_simp:
          sun: "从头部的突起物放出精神力量的时候，\n周围会响起非常刺耳的磨牙声。"
          moon: "用念力让猎物麻痹，\n用结实的牙齿将其咬碎。\n即使是大舌贝的壳也不在话下。"
        zh_trad:
          sun: "從頭部的突起物發出精神力量的時候，\n周圍會響起非常刺耳的磨牙聲。"
          moon: "用念力令獵物麻痺後，\n再用結實的牙齒將其咬碎。\n即使是大舌貝的殼也毫不費力。"
drampa:
  species_id: 780
  names:
    jp_kana: ジジーロン
    jp_kanji: ジジーロン
    en: Drampa
    fr: Draïeul
    it: Drampa
    de: Sen-Long
    es: Drampa
    ko: 할비롱
    zh_simp: 老翁龙
    zh_trad: 老翁龍
  forms:
    drampa:
      form_id: 0
      base_stats:
        hp: 78
        attack: 60
        defense: 85
        special_attack: 135
        special_defense: 91
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - berserk
        - sap_sipper
      hidden_ability: cloud_nine
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          sun: "こころやさしい　せいしつ。　だが\nいちど　いかりに　かられると　はげしい\nいぶきで　あたりを　はかい　しつくす。"
          moon: "ひとなつっこく　こどもが　だいすき。\nなかよしの　こどもと　あそぶために\nやまおくから　まちに　おりてくる。"
        jp_kanji:
          sun: "心優しい　性質。　だが\n一度　怒りに　かられると　激しい\n息吹で　あたりを　破壊　し尽くす。"
          moon: "人懐っこく　子どもが　大好き。\n仲良しの　子どもと　遊ぶために\n山奥から　町に　降りてくる。"
        en:
          sun: "It has a compassionate personality, but if it is\nangered, it completely destroys its surroundings\nwith its intense breath."
          moon: "This Pokémon is friendly to people and loves\nchildren most of all. It comes from deep in the\nmountains to play with children it likes in town."
        fr:
          sun: "C’est une bonne pâte de nature, mais si par\nmalheur il s’énerve, il peut détruire tout ce qui\nl’entoure de son souffle puissant."
          moon: "Il adore les enfants rieurs. Il n’hésite pas à\ndescendre de sa montagne pour venir en ville\njouer avec ses petits amis."
        it:
          sun: "Ha un’indole gentile, ma se si arrabbia\ndistrugge tutto quello che ha intorno\ncon un soffio devastante."
          moon: "È molto socievole e adora i bambini, tanto da\nscendere dalle montagne e recarsi in città\nper giocare con i suoi piccoli amici."
        de:
          sun: "Es hat ein freundliches Wesen, aber wenn es zur\nWeißglut gebracht wird, zerstört es mit einem\nheftigen Hauch die gesamte Umgebung."
          moon: "Es ist sehr freundlich und liebt Kinder. Häufig\nkommt es aus den Bergen herab in die Städte,\num mit seinen kleinen Freunden zu spielen."
        es:
          sun: "Es de naturaleza mansa, pero si se le provoca\ny monta en cólera, destruye todo lo que le rodea\ncon su aliento devastador."
          moon: "Le encantan los niños amistosos, hasta el punto\nde abandonar las montañas para acercarse a\nlos pueblos y así poder jugar con ellos."
        ko:
          sun: "마음이 따뜻하고 착하다. 하지만\n한번 화에 사로잡히면 거친\n숨결로 주변을 파괴해 버린다."
          moon: "사람을 잘 따르고 아이를 좋아한다.\n사이 좋은 아이와 놀기 위해\n깊은 산 속에서 마을로 내려온다."
        zh_simp:
          sun: "心地非常善良。可一旦被激怒，\n就会用非常猛烈的气息\n把周围破坏殆尽。"
          moon: "容易和人亲近，最喜欢小孩子。\n为了和关系好的小孩子玩耍，\n会从深山里降落到城镇。"
        zh_trad:
          sun: "心地非常善良。一旦被激怒，\n就會用非常猛烈的氣息\n把周圍破壞殆盡。"
          moon: "容易和人親近，最喜歡小孩子。\n為了和關係好的小孩子玩耍，\n會從深山裡來到城鎮。"
