      descriptions:
        jp_kana:
          sun: "４つの　ツメと　おおきな　からだで\nえものを　しっかり　おさえつけると\nおなかの　はで　バリバリ　かじる。"
          moon: "２ひきの　メタングが　れんけつ。\n４つの　のうの　へいれつしょりで\nどんな　けいさんも　あっというま。"
        jp_kanji:
          sun: "４つの　ツメと　大きな　身体で\n獲物を　しっかり　押さえつけると\nお腹の　歯で　バリバリ　かじる。"
          moon: "２匹の　メタングが　連結。\n４つの　脳の　並列処理で\nどんな　計算も　あっという間。"
        en:
          sun: "It firmly pins its prey using its four claws and\nlarge body. Then the teeth in the mouth on its\nstomach chew the prey to bits."
          moon: "A linkage of two Metang, this Pokémon can\nperform any calculation in a flash by utilizing\nparallel processing in its four brains."
        fr:
          sun: "Avec ses quatre groupes de griffes et son\ncorps imposant, il immobilise ses victimes\npour ensuite mieux les dévorer."
          moon: "Il est né de l’assemblage de deux Métang.\nAvec ses quatre cerveaux montés en parallèle,\nil peut résoudre n’importe quelle équation."
        it:
          sun: "Blocca la preda al suolo con le quattro zampe\nartigliate e il corpo massiccio, poi la divora con i\ndenti sulla pancia."
          moon: "È formato dalla fusione di due Metang.\nGrazie all’attività in parallelo dei suoi quattro\ncervelli, può risolvere qualsiasi calcolo."
        de:
          sun: "Mit seinen spitzen Beinkrallen und dem massigen\nKörper drückt es seine Beute zu Boden und\nzerkaut sie dann mit seinen Zähnen am Bauch."
          moon: "Es ging aus der Verschmelzung zweier Metang\nhervor. Dank vier Gehirnen und paralleler Daten-\nverarbeitung sind Berechnungen im Nu gelöst."
        es:
          sun: "Con sus cuatro garras y su descomunal cuerpo\naprisiona a sus presas para luego devorarlas\ncon sus dientes."
          moon: "Metagross es el resultado de la fusión de dos\nMetang. Con sus cuatro cerebros funcionando\nen paralelo realiza cualquier cálculo al instante."
        ko:
          sun: "4개의 발톱과 큰 몸집으로\n먹이를 확실하게 누른 후\n배의 이빨로 으드득 씹는다."
          moon: "2마리의 메탕구가 연결되었다.\n4개의 뇌의 병렬처리로\n어떤 계산도 순식간이다."
        zh_simp:
          sun: "用４只爪子和庞大的身体\n牢牢地按住猎物后，\n用腹部的牙齿嘎嘣嘎嘣地啃咬。"
          moon: "２只金属怪组合起来。\n通过４个大脑的并行处理，\n什么样的计算都只要一瞬间。"
        zh_trad:
          sun: "用４隻爪子和龐大的身體\n牢牢地按住獵物後，\n用腹部的牙齒嚼食。"
          moon: "２隻金屬怪連結起來。\n透過４個腦袋的同步處理，\n只要一瞬間就可完成任何的計算。"
