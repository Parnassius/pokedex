      descriptions:
        jp_kana:
          sun: "おなかの　ふくろに　しろくて　まるい\nいしを　いれている。　なかよくなると\nわけて　くれることも　あるよ。"
          moon: "ちいさいので　まだ　タマゴを\nうむことが　できない。　かわりに\nしろくて　まるい　いしを　さがす。"
        jp_kanji:
          sun: "お腹の　袋に　白くて　丸い\n石を　入れている。　仲良くなると\nわけて　くれることも　あるよ。"
          moon: "小さいので　まだ　タマゴを\n産むことが　できない。　代わりに\n白くて　丸い　石を　探す。"
        en:
          sun: "It carries a round white rock in its belly pouch.\nIf it gets along well with someone, it will\nsometimes give that person the rock."
          moon: "It’s too small to lay eggs yet. As a surrogate,\nit searches out round white stones."
        fr:
          sun: "Il transporte un petit caillou rond et blanc dans\nsa poche ventrale. Il arrive même qu’il le donne\naux personnes qu’il aime bien."
          moon: "Comme il est très jeune, il ne peut pas encore\npondre d’œuf. À la place, il cherche un joli petit\ncaillou blanc, bien rond."
        it:
          sun: "Trasporta nella tasca ventrale una roccia\na forma di uovo, che a volte regala ai suoi amici."
          moon: "Dato che è ancora piccolo e non può deporre\nuova, cerca pietre bianche e tonde da usare\nin sostituzione."
        de:
          sun: "In seinem Beutel trägt es einen runden, weißen\nStein. Freundet man sich mit ihm an, kann es\nvorkommen, dass man ihn geschenkt bekommt."
          moon: "Es ist noch zu jung, um Eier zu legen. Als Ersatz\nsucht es nach runden, weißen Steinen."
        es:
          sun: "En la bolsa de su panza transporta una roca\nredonda y blanca. Cuando hace amigos puede\nllegar a regalársela."
          moon: "Como todavía no puede poner huevos, busca\nrocas blancas y redondas en su lugar."
        ko:
          sun: "배의 주머니에 하얗고 동그란\n돌을 넣고 있다. 사이가 좋아지면\n나누어 주는 일도 있다."
          moon: "작아서 아직 알을\n낳을 수 없다. 대신에\n하얗고 둥근 돌을 찾는다."
        zh_simp:
          sun: "腹部的袋子里装着白色的\n圆形石头。如果关系变好，\n也可能会分给你哦。"
          moon: "因为很小，还不能生蛋。\n会寻找白白的圆圆的\n石头来作为替代。"
        zh_trad:
          sun: "腹部的袋子裡裝著白色的\n圓形石頭。如果和牠變得友好，\n也可能會分一點給你哦。"
          moon: "因為很小，還不能生蛋。\n會尋找白白圓圓的\n石頭來代替。"
