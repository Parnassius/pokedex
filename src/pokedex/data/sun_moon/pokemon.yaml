          sun: "うたうのが　すきだが　まだまだ　へた。\nちゃんと　ほめてあげると　すこしずつ\nじょうずに　なっていくよ。"
          moon: "ポンポン　はずみながら　いどう。\nたくさん　うごいて　あせを　かくと\nほんのり　あまい　たいしゅうが　する。"
        jp_kanji:
          sun: "歌うのが　好きだが　まだまだ　下手。\nちゃんと　ほめてあげると　少しずつ\n上手に　なっていくよ。"
          moon: "ポンポン　弾みながら　移動。\nたくさん　動いて　汗を　かくと\nほんのり　甘い　体臭が　する。"
        en:
          sun: "It likes to sing but is not yet good at it.\nWith praise and encouragement, it will get\nbetter little by little."
          moon: "It moves by bouncing along. As it moves a lot,\nit sweats, and its body gives off a sweet aroma."
        fr:
          sun: "Il adore chanter, mais il n’est pas encore très\ndoué. Il s’améliore progressivement si on le\ncomplimente suffisamment."
          moon: "Il se déplace en rebondissant comme une balle.\nQuand il a beaucoup bougé et qu’il sue, son\ncorps dégage une légère odeur sucrée."
        it:
          sun: "Gli piace molto cantare, ma è ancora inesperto.\nSe incoraggiato nel modo giusto, migliora\na poco a poco."
          moon: "Si muove rimbalzando e quando suda molto\nemana un lieve aroma dolciastro."
        de:
          sun: "Es liebt das Singen, ist aber noch nicht sehr gut\ndarin. Lobt man es regelmäßig, verbessern sich\nseine Gesangskünste jedoch nach und nach."
          moon: "Es bewegt sich hüpfend umher. Gerät es\ndabei ins Schwitzen, sondert es einen\nsüßlichen Duft ab."
        es:
          sun: "Le apasiona cantar, pero no se le da muy bien.\nCuantos más elogios reciba, más mejorarán sus\ndotes de cantante."
          moon: "Se desplaza dando botes con su cuerpo.\nDespués de hacer mucho ejercicio, empieza a\nsudar y desprende un ligero aroma dulce."
        ko:
          sun: "노래 부르기를 좋아하지만\n아직 서툴다. 제대로 칭찬해주면\n조금씩 잘하게 된다."
          moon: "통통 튀면서 이동한다.\n많이 움직여서 땀이 나면\n은은하게 달콤한 체취가 난다."
        zh_simp:
          sun: "喜欢唱歌，但还不怎么在行。\n如果能给予恰当的表扬，\n就会渐渐有所提高哦。"
          moon: "嘭嘭嘭地弹跳着移动。\n动得多了出汗的话，\n会发出微甜的体味。"
        zh_trad:
          sun: "很喜歡唱歌，但唱得不怎麼樣。\n如果好好地稱讚牠，\n就會越唱越好哦。"
          moon: "蹦蹦蹦地彈跳著移動。\n因大量運動而流汗時，\n會發出微甜的體味。"
