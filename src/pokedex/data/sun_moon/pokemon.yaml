      descriptions:
        jp_kana:
          sun: "はいきょに　なった　たてものに\nあやしいひかりが　ともっていたら\nそこに　ゴースが　ひそんでいる。"
          moon: "そのすがたは　ほとんど　みえないが\nゴースが　ちかくに　あらわれると\nかすかに　あまい　においが　する。"
        jp_kanji:
          sun: "廃墟に　なった　建物に\n怪しい光が　灯っていたら\nそこに　ゴースが　潜んでいる。"
          moon: "その姿は　ほとんど　みえないが\nゴースが　近くに　現れると\n微かに　甘い　匂いが　する。"
        en:
          sun: "Should a strange light be seen flickering\nin an abandoned building, Gastly is lurking there."
          moon: "Although Gastly is barely visible, when it’s near,\na faint sweet smell lingers."
        fr:
          sun: "Lorsqu’on aperçoit une lueur diaphane dans\nun bâtiment désaffecté, c’est qu’un Fantominus\ns’y terre."
          moon: "Il est presque invisible, mais lorsqu’il se\nmanifeste à proximité, une étrange odeur\nsucrée flotte dans l’air."
        it:
          sun: "Gli strani bagliori che a volte si scorgono negli\nedifici abbandonati potrebbero indicare la\npresenza di Gastly."
          moon: "È molto difficile scorgere la sua sagoma,\nma è facilmente riconoscibile per via dell’odore\nvagamente dolciastro che emana."
        de:
          sun: "Flackert in einem verlassenen alten Gebäude\nplötzlich ein rätselhaftes Licht auf, hält sich\ndort ein Nebulak versteckt."
          moon: "Dass sich ein Nebulak in der Nähe aufhält,\nerkennt man hauptsächlich an einem süßlichen\nDuft. Sehen kann man es fast gar nicht."
        es:
          sun: "Si se aprecia una tenue luz en el interior de un\nedificio abandonado, suele ser indicio de que\nun Gastly mora en él."
          moon: "El cuerpo de Gastly es casi invisible. Aun así,\npuede percibirse su presencia cuando está\ncerca, pues desprende un sutil olor dulce."
        ko:
          sun: "폐허가 된 건물에\n수상한 빛이 비친다면\n그곳에 고오스가 살고 있다."
          moon: "그 모습은 거의 보이지 않지만\n고오스가 근처에 나타나면\n희미하게 달콤한 향기가 난다."
        zh_simp:
          sun: "如果在已成废墟的\n建筑物里亮着怪异的光，\n说明那里潜藏着鬼斯。"
          moon: "它的样子几乎看不到，\n但鬼斯一旦出现，\n附近就会发出淡淡的甜香味。"
        zh_trad:
          sun: "如果在已成廢墟的\n建築物裡亮著怪異的光，\n代表那裡潛藏著鬼斯。"
          moon: "幾乎沒人能看到鬼斯的模樣，\n但牠在近處出現時，\n會聞到淡淡的甜香味。"
