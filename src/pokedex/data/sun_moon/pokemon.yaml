          sun: "かふんを　まるめ　だんごを　つくる。\nしょくよう　から　せんとうよう　まで\nたくさんの　しゅるいが　あるよ。"
          moon: "アブリボンの　かふんだんごは\nえいようまんてんの　ものも　ある。\nサプリメントとして　うられることも。"
        jp_kanji:
          sun: "花粉を　丸め　団子を　つくる。\n食用　から　戦闘用　まで\nたくさんの　種類が　あるよ。"
          moon: "アブリボンの　花粉団子は\n栄養満点の　ものも　ある。\nサプリメントとして　売られることも。"
        en:
          sun: "It rolls up pollen into puffs. It makes many\ndifferent varieties, some used as food and\nothers used in battle."
          moon: "Some of Ribombee’s pollen puffs are highly\nnutritious. They are sometimes sold\nas supplements."
        fr:
          sun: "Il confectionne de petites boules de pollen\nde diverses natures, certaines lui servant de\nrepas, d’autres à attaquer l’ennemi."
          moon: "Certaines boules de pollen de Rubombelle sont\ntrès utiles d’un point de vue nutritif. Vendues\nen complément alimentaire, elles font un carton."
        it:
          sun: "Crea delle sfere di polline di vario genere in\nbase alle necessità: alcune gli servono per\nnutrirsi, altre per lottare."
          moon: "Alcune sfere di polline prodotte da questo\nPokémon sono talmente nutrienti da essere\nvendute come integratori alimentari."
        de:
          sun: "Dieses Pokémon rollt Blütenstaub zu Kugeln.\nManche dieser Pollenknödel dienen als Nahrung,\nandere setzt es aber auch im Kampf ein."
          moon: "Unter den Pollenknödeln eines Bandelby finden\nsich so nahrhafte Varianten, dass sie als\nNahrungsergänzungsmittel verkauft werden."
        es:
          sun: "Fabrica varios tipos de bolas de polen. Algunas\nse usan como alimento y otras para el combate."
          moon: "Algunas de las bolas de polen que fabrican son\nextremadamente nutritivas, por lo que a veces\nse venden como suplementos alimenticios."
        ko:
          sun: "꽃가루를 뭉쳐서 경단을 만든다.\n식용부터 전투용까지\n많은 종류가 있다."
          moon: "에리본의 꽃가루경단은\n영양 만점인 것도 있다.\n영양제로 팔리기도 한다."
        zh_simp:
          sun: "把花粉做成圆形的团子。\n可以食用或战斗中使用，\n有许多的种类哦。"
          moon: "蝶结萌虻的花粉团里\n也有富含营养的东西。\n有时候也作为营养补给品出售。"
        zh_trad:
          sun: "把花粉揉成圓形，做成花粉團。\n花粉團從食用到戰鬥用，\n分成很多種類哦。"
          moon: "蝶結萌虻做出來的花粉團中\n有些含有豐富的營養。\n有時還會被當成營養補給品出售。"
