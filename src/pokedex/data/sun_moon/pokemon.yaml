      abilities:
        - dancer
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          sun: "やまぶきのミツを　すった　オドリドリ。\nあかるく　ようきな　ダンスは　てきの\nみも　こころも　はじけさせる。"
          moon: "うもうを　こすりあわせ　たいでん。\nおどるように　てきに　ちかづき\nでんげきパンチを　おみまいするぞ。"
        jp_kanji:
          sun: "やまぶきのミツを　吸った　オドリドリ。\n明るく　陽気な　ダンスで　敵の\n身も　心も　弾けさせる。"
          moon: "羽毛を　こすり合わせ　帯電。\n踊るように　敵に　近づき\n電撃パンチを　お見舞いするぞ。"
        en:
          sun: "This Oricorio has sipped bright yellow nectar.\nIts bright, cheerful dance melts the hearts of\nits enemies."
          moon: "It creates an electric charge by rubbing its\nfeathers together. It dances over to its enemies\nand delivers shocking electrical punches."
        fr:
          sun: "Après avoir bu du Nectar Jaune, Plumeline\nengage une danse vive et joyeuse qui électrise\nle cœur de ses ennemis."
          moon: "Il se charge en électricité en frottant ses plumes\nles unes contre les autres, puis s’approche de\nses ennemis en dansant et les abat d’un coup."
        it:
          sun: "Un Oricorio che si è nutrito di Nettare giallo.\nLa sua danza allegra e vivace può colpire\nil nemico sia nel corpo che nello spirito."
          moon: "Carica le piume di elettricità sfregandole\ninsieme, poi si avvicina al nemico a passo di\ndanza e lo colpisce con una scarica elettrica."
        de:
          sun: "Ein Choreogel, das gelben Nektar geschlürft hat.\nMit seinem heiteren Tanz kann es selbst die\nHerzen seiner Gegner mit Wonne erfüllen."
          moon: "Es reibt seine Federn aneinander, um sich\nelektrisch aufzuladen. Danach tanzt es zum\nGegner und verpasst ihm einen Elektrohieb."
        es:
          sun: "Forma que toma Oricorio al libar Néctar Amarillo.\nElectrifica el corazón de sus adversarios con su\nalegre y cálida danza."
          moon: "Electrifica su plumaje mediante fricción. Se\nacerca al rival como si bailara y le asesta\nuna potente descarga."
        ko:
          sun: "진노랑꿀을 빨아들인 춤추새이다.\n밝고 쾌활한 댄스는 적의\n몸도 마음도 들뜨게 한다."
          moon: "깃털을 비벼서 전기를 낸다.\n춤추듯 적에게 다가가\n전격 펀치를 가한다."
        zh_simp:
          sun: "吸食了金黄色花蜜的花舞鸟。\n以明快欢乐的舞蹈\n让敌人的身心都彻底释放。"
          moon: "摩擦羽毛生电。\n像跳舞一样接近敌人，\n施展出电击拳。"
        zh_trad:
          sun: "吸食了金黃色花蜜的花舞鳥。\n以輕快歡樂的舞蹈\n讓敵人的身心都徹底得到釋放。"
          moon: "摩擦羽毛生電。\n像跳舞一樣接近敵人，\n施展出電擊拳。"
