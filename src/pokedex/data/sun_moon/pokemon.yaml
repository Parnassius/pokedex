        fr:
          sun: "L’une des mystérieuses Ultra-Chimères.\nOn l’aurait vue émettre une formidable quantité\nd’électricité autour d’elle."
          moon: "Une créature échappée de l’Ultra-Brèche.\nElle a attaqué une centrale électrique, aussi\nsuppose-t-on qu’elle se nourrit d’électricité."
        it:
          sun: "Una delle misteriose Ultracreature.\nÈ stata vista sprigionare scariche elettriche\nterrificanti da tutto il corpo."
          moon: "Arrivato attraverso un Ultravarco, si ritiene che\nla sua fonte primaria di energia sia l’elettricità\ndato che ha attaccato una centrale elettrica."
        de:
          sun: "Eine geheimnisvolle Ultrabestie, aus deren\nKörper furchterregende Mengen an elektrischer\nEnergie strömen."
          moon: "Es ist durch die Ultrapforte erschienen. Seine\nÜberfälle auf Kraftwerke lassen vermuten,\ndass es seine Lebensenergie aus Strom bezieht."
        es:
          sun: "Un Ultraente rodeado de misterio. Se dice que\nsu cuerpo desprende descargas eléctricas de\ninmensa potencia."
          moon: "Este Ultraente surgió de un Ultraumbral. Se cree\nque la electricidad es su fuente de energía, ya\nque una vez asaltó una central eléctrica."
        ko:
          sun: "온몸에서 엄청난 전격을\n내뿜는 광경이 목격되었다.\n수수께끼의 생물 UB 중 하나다."
          moon: "울트라홀에서 출현했다.\n발전소를 습격한 것으로 보아\n전기가 에너지원인 것으로 여겨진다."
        zh_simp:
          sun: "被目击到了从全身喷涌出\n骇人电击的光景。\n谜一般的生物究极异兽的一种。"
          moon: "从究极之洞出现。\n因为袭击了发电厂，\n所以被认为电力就是它的能量。"
