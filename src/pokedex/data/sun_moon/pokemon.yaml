          moon: "小さいころから　しっかり　育てると\n絶対　トレーナーを　裏切らない\n頼もしい　相棒に　なる。"
        en:
          sun: "Its quick movements confuse its enemies.\nWell equipped with claws and fangs, it also uses\nthe sharp rocks in its mane as weapons."
          moon: "When properly raised from a young age, it will\nbecome a trustworthy partner that will\nabsolutely never betray its Trainer."
        fr:
          sun: "Il fait tourner en bourrique ses ennemis à cause\nde sa vitesse. Outre ses crocs et ses griffes,\nil peut compter sur le roc acéré de sa crinière."
          moon: "Pour peu qu’on l’élève comme il se doit, ce\nPokémon restera à jamais fidèle à son Dresseur\net deviendra son partenaire le plus dévoué."
        it:
          sun: "Confonde l’avversario grazie alla rapidità dei\nmovimenti. Oltre ad artigli e zanne, nella lotta si\nserve anche delle pietre appuntite della criniera."
          moon: "Se lo si allena nel modo giusto fin dalla tenera\netà, diventa un fedele compagno devoto\nal proprio Allenatore."
        de:
          sun: "Irritiert seine Feinde mit schnellen Bewegungen.\nAls Waffen hat es nicht nur Krallen und Hauer,\nsondern auch die spitzen Felsen seiner Mähne."
          moon: "Zieht man dieses Pokémon von klein auf groß,\nwird es seinen Trainer niemals hintergehen und\nihm stets ein treuer Freund sein."
        es:
          sun: "Su velocidad desconcierta a sus rivales. Ataca\ncon garras, colmillos y con las piedras afiladas\nde su melena."
          moon: "Si se lo entrena a conciencia desde temprana\nedad, se convierte en un leal compañero que\njamás dejará en la estacada a su Entrenador."
        ko:
          sun: "재빨리 움직여 적을 어지럽힌다.\n발톱이나 이빨 외에 갈기의\n뾰족한 바위도 무기의 하나다."
          moon: "어릴 때부터 바르게 키우면\n절대 트레이너를 배신하지 않는\n믿음직한 동료가 된다."
        zh_simp:
          sun: "快速移动迷惑敌人。\n除了爪子和牙齿之外，\n鬃毛里的尖锐岩石也是武器之一。"
          moon: "从小时候就开始好好培育的话，\n会成为绝不背叛训练家，\n值得信赖的好伙伴。"
        zh_trad:
          sun: "快速移動迷惑敵人。\n除了爪子和牙齒之外，\n鬃毛裡的尖銳岩石也是武器之一。"
          moon: "從小開始好好培育的話，\n會成為絕不背叛訓練家，\n值得信賴的好夥伴。"
    lycanroc_midnight_form:
      form_id: 1
      names:
        jp_kana: まよなかのすがた
        jp_kanji: まよなかのすがた
        en: Midnight Form
        fr: Forme Nocturne
        it: Forma Notte
        de: Nachtform
        es: Forma Nocturna
        ko: 한밤중의 모습
        zh_simp: 黑夜的样子
        zh_trad: 黑夜的樣子
      base_stats:
        hp: 85
        attack: 115
        defense: 75
        special_attack: 55
        special_defense: 75
        speed: 82
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - keen_eye
        - vital_spirit
      hidden_ability: no_guard
      descriptions:
        jp_kana:
          sun: "てごわい　あいてを　まえに　するほど\nちが　たかぶる。　かつためなら\nわがみを　かえりみず　おそいかかる。"
          moon: "てきを　ちょうはつし　おそわせる。\nにくを　きらせて　ずつきを　くらわせ\nタテガミの　いわで　ほねを　くだく。"
        jp_kanji:
          sun: "手強い　相手を　前に　するほど\n血が　高ぶる。　勝つためなら\n我が身を　かえりみず　襲いかかる。"
          moon: "敵を　挑発し　襲わせる。\n肉を　切らせて　頭突きを　くらわせ\nタテガミの　岩で　骨を　砕く。"
        en:
          sun: "The more intimidating the opponent it faces,\nthe more this Pokémon’s blood boils.\nIt will attack with no regard for its own safety."
          moon: "It goads its enemies into attacking, withstands\nthe hits, and in return, delivers a headbutt,\ncrushing their bones with its rocky mane."
        fr:
          sun: "Il est d’autant plus combatif qu’il affronte un\nadversaire puissant. Il déploie toutes ses forces\ndans la bataille et oublie son instinct de survie."
          moon: "Il provoque ses adversaires avant d’attaquer.\nIl tranche leurs chairs et brise leurs os en les\nfrappant avec sa crinière de pierre."
        it:
          sun: "Più è forte il nemico che deve affrontare, più si\nfa combattivo. Pensa solo alla vittoria e si lancia\nsul nemico senza pensare alle conseguenze."
          moon: "Provoca il nemico per spingerlo ad attaccare.\nLacera le carni, tira poderose testate e frantuma\nle ossa dei nemici con la sua criniera di pietra."
        de:
          sun: "Je gefährlicher sein Gegner, desto mehr kommt\nes in Fahrt. Im Kampf ist es bereit, alles aufs\nSpiel zu setzen, um den Sieg zu erringen."
          moon: "Wiegt den Gegner im Glauben, er sei im Vorteil,\nbis es ihn mit einer Kopfnuss überrascht und\nihm mit seiner Steinmähne die Knochen bricht."
        es:
          sun: "Cuanto más fuerte es su rival, más se crece.\nSus ansias de ganar lo llevan a arrojarse sobre\nél sin consideración por su propia vida."
          moon: "Provoca al enemigo antes de atacarlo. Desgarra\ncarne y rompe huesos golpeándolo con su\nmelena de piedra."
        ko:
          sun: "강한 상대를 앞에 둘수록\n피가 끓어오른다. 이기기 위해서라면\n자신을 돌아보지 않고 공격한다."
          moon: "적을 도발해 공격하게 한다.\n공격을 맞으며 박치기를 하고\n갈기의 바위로 뼈를 부순다."
        zh_simp:
          sun: "面前的对手越是强大，\n越是热血沸腾。为了取胜，\n会不惜一切，发动袭击。"
          moon: "挑衅敌人来袭击自己。\n以杀敌一千自损八百的决心头锤敌人，\n并用鬃毛上的岩石将对方的骨头砸碎。"
        zh_trad:
          sun: "面前的對手越是強大，\n越是熱血沸騰。為了取勝，\n會奮不顧身發動襲擊。"
          moon: "挑釁敵人來襲擊自己。\n在敵人砍中自己的同時用頭錘攻擊，\n再用鬃毛裡的岩石將骨頭壓碎。"
wishiwashi:
  species_id: 746
  names:
    jp_kana: ヨワシ
    jp_kanji: ヨワシ
    en: Wishiwashi
    fr: Froussardine
    it: Wishiwashi
    de: Lusardin
    es: Wishiwashi
    ko: 약어리
    zh_simp: 弱丁鱼
    zh_trad: 弱丁魚
  forms:
    wishiwashi_solo_form:
      form_id: 0
      names:
        jp_kana: たんどくのすがた
        jp_kanji: たんどくのすがた
        en: Solo Form
        fr: Forme Solitaire
        it: Forma Individuale
        de: Einzelform
        es: Forma Individual
        ko: 단독의 모습
        zh_simp: 单独的样子
        zh_trad: 單獨的樣子
      base_stats:
        hp: 45
        attack: 20
        defense: 20
        special_attack: 25
        special_defense: 25
        speed: 40
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - schooling
      descriptions:
        jp_kana:
          sun: "ピンチになると　めが　うるみだし\nかがやく。　そのひかりに　むれる\nなかまと　てきに　たちむかうのだ。"
          moon: "とても　よわく　とても　おいしいので\nつねに　だれからも　ねらわれているが\nいじめていると　ひどいめに　あうぞ。"
        jp_kanji:
          sun: "ピンチになると　目が　潤みだし\n輝く。　その光に　群れる\n仲間と　敵に　立ち向かうのだ。"
          moon: "とても　弱く　とても　美味しいので\n常に　誰からも　狙われているが\nいじめていると　ひどい目に　あうぞ。"
        en:
          sun: "When it’s in trouble, its eyes moisten and begin\nto shine. The shining light attracts its comrades,\nand they stand together against their enemies."
          moon: "It’s awfully weak and notably tasty, so everyone\nis always out to get it. As it happens, anyone\ntrying to bully it receives a painful lesson."
        fr:
          sun: "Quand il est dans le pétrin, ses yeux deviennent\nluisants. Ses semblables accourent alors et\nforment avec lui un banc de combat."
          moon: "Avec son air chétif et sa chair appétissante,\ntous les Pokémon en ont après lui... mais ceux\nqui ont essayé ont eu des problèmes."
        it:
          sun: "Quando è in pericolo, i suoi occhi iniziano\na brillare e il luccichio richiama i suoi simili,\ncon cui forma un banco per attaccare il nemico."
          moon: "A causa dell’aspetto inoffensivo e del sapore\ndelizioso, attira su di sé molti predatori che però\nsi pentono regolarmente di averlo importunato."
        de:
          sun: "Gerät es in Not, tränen seine Augen. Ihr Glänzen\nlockt Artgenossen an, mit denen es dann im\nVerbund den Feind angreift."
          moon: "Ein sehr schwaches und leckeres Pokémon,\nauf das es stets irgendjemand abgesehen hat.\nDoch Vorsicht: Wer es ärgert, wird dies bereuen!"
        es:
          sun: "Al sentirse amenazado, sus ojos emiten cierto\nbrillo, algo que atrae a otros miembros de su\nespecie, y juntos luchan como un mismo ente."
          moon: "Debido a su aspecto débil y a su apetitoso\nsabor, son el blanco de muchos depredadores,\npero quien se las ve con ellos sale mal parado."
        ko:
          sun: "위험해지면 눈을 글썽이면서\n반짝인다. 그 빛에 모이는\n동료와 함께 적에 대항한다."
          moon: "너무도 약하고 너무도 맛있어서\n항상 모두가 노리지만\n괴롭히면 험한 꼴을 당한다."
        zh_simp:
          sun: "一旦陷入危机，眼睛就会变得\n湿润并发光。和汇聚在这光亮中的\n伙伴们一起对抗敌人。"
          moon: "因为非常弱小，又非常美味，\n所以谁都会袭击它，\n但如果欺负它，就会吃苦头哦。"
        zh_trad:
          sun: "一旦陷入危機，眼睛就會變得\n濕潤並發光。和被光亮召集來的\n夥伴們一起對抗敵人。"
          moon: "牠非常弱小，又非常美味，\n所以總是成為被攻擊的目標，\n不過若欺負牠，只會吃苦頭哦。"
    wishiwashi_school_form:
      form_id: 1
      names:
        jp_kana: むれたすがた
        jp_kanji: むれたすがた
        en: School Form
        fr: Forme Banc
        it: Forma Banco
        de: Schwarmform
        es: Forma Banco
        ko: 군집의 모습
        zh_simp: 鱼群的样子
        zh_trad: 魚群的樣子
      base_stats:
        hp: 45
        attack: 140
        defense: 130
        special_attack: 140
        special_defense: 135
        speed: 30
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - schooling
      descriptions:
        jp_kana:
          sun: "よわい　ヨワシたちが　むれて　ちからを\nけっしゅう。　うみの　まものと\nおそれられるほどの　ちからを　もつ。"
          moon: "そのすがたに　ギャラドスも　にげだす。\nちからを　あわせ　うつ　みずでっぽうは\nハイドロポンプを　しのぐ　いりょく。"
        jp_kanji:
          sun: "弱い　ヨワシたちが　群れて　力を\n結集。　海の　魔物と\n恐れられるほどの　力を　持つ。"
          moon: "その姿に　ギャラドスも　逃げ出す。\n力を　合わせ　撃つ　みずでっぽうは\nハイドロポンプを　しのぐ　威力。"
        en:
          sun: "Weak Wishiwashi school together to concentrate\ntheir power. Their united force makes them the\ndemon of the sea, feared near and far."
          moon: "At their appearance, even Gyarados will flee.\nWhen they team up to use Water Gun, its power\nexceeds that of Hydro Pump."
        fr:
          sun: "Les chétifs petits Froussardine joignent leurs\nforces pour devenir un démon des mers\nsurpuissant, redouté de tous."
          moon: "Sous cette forme, ils font fuir même les Léviator.\nQuand ils utilisent Pistolet à O tous ensemble,\nc’est comme s’ils utilisaient Hydrocanon."
        it:
          sun: "Poiché sono molto deboli, si organizzano in\nbanchi. Quando si uniscono formano un mostro\nmarino conosciuto come “Demone del mare”."
          moon: "Se assume questo aspetto, fa paura anche ai\nGyarados. Se più esemplari usano Pistolacqua in\ngruppo, raggiungono la potenza di Idropompa."
        de:
          sun: "Im Schwarm sind selbst die sonst eher\nschwachen Lusardin stark. So stark sogar, dass\nman sie auch „Ungeheuer der Meere“ nennt."
          moon: "Bei seinem Anblick nehmen selbst Garados\nReißaus. Setzen sie gemeinsam Aquaknarre ein,\nist die Attacke stärker als jede Hydropumpe."
        es:
          sun: "Cuando los pequeños y débiles Wishiwashi se\nagrupan en bancos, se convierten en una bestia\nmarina temida por todos."
          moon: "En esta forma, es temido incluso por Gyarados.\nCuando combinan sus fuerzas, el poder de su\nPistola Agua puede superar al de Hidrobomba."
        ko:
          sun: "약한 약어리들이 무리 지어 힘을\n결집한다. 바다의 마물로 불리며\n두려움을 살 정도의 힘을 가진다."
          moon: "그 모습을 보고 갸라도스도 도망간다.\n힘을 합쳐서 쏘는 물대포는\n하이드로펌프를 누르는 위력이다."
        zh_simp:
          sun: "弱小的弱丁鱼们聚在一起，\n把力量集合起来。\n拥有令人恐惧的堪比海之魔物的力量。"
          moon: "这个样子连暴鲤龙都会逃跑。\n齐心协力发射出的水枪\n拥有超越水炮的威力。"
        zh_trad:
          sun: "弱小的弱丁魚們聚在一起，\n把力量集合起來。擁有足以\n被稱為海中魔物的可怕力量。"
          moon: "這個樣子連暴鯉龍看了都會逃跑。\n齊心協力發射出的水槍\n擁有超越水炮的威力。"
mareanie:
  species_id: 747
  names:
    jp_kana: ヒドイデ
    jp_kanji: ヒドイデ
    en: Mareanie
    fr: Vorastérie
    it: Mareanie
    de: Garstella
    es: Mareanie
    ko: 시마사리
    zh_simp: 好坏星
    zh_trad: 好壞星
  forms:
    mareanie:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 62
        special_attack: 43
        special_defense: 52
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - water
      egg_groups:
        - water_1
      abilities:
        - merciless
        - limber
      hidden_ability: regenerator
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          sun: "あたまに　ある　どくトゲで　えものを\nズブリ。よわったところを　１０ぽんの\nしょくしゅで　とらえ　とどめを　さす。"
          moon: "かいていや　かいがんを　はいまわる。\nサニーゴの　あたまに　はえる\nサンゴが　だいこうぶつ　だぞ。"
        jp_kanji:
          sun: "頭に　ある　毒トゲで　獲物を\nズブリ。　弱ったところを　１０本の\n触手で　捕らえ　止めを　刺す。"
          moon: "海底や　海岸を　はいまわる。\nサニーゴの　頭に　生える\nサンゴが　大好物だぞ。"
        en:
          sun: "It plunges the poison spike on its head into its\nprey. When the prey has weakened, Mareanie\ndeals the finishing blow with its 10 tentacles."
          moon: "It’s found crawling on beaches and seafloors.\nThe coral that grows on Corsola’s head is as\ngood as a five-star banquet to this Pokémon."
        fr:
          sun: "Les épines sur sa tête transpercent et\nempoisonnent l’ennemi. Ses dix tentacules\nse chargent ensuite du reste."
          moon: "Il rampe le long des fonds marins et des plages\nde sable. Les cornes de corail des Corayon sont\nses biscuits apéritifs préférés."
        it:
          sun: "Trafigge e indebolisce le prede con gli aculei\navvelenati sulla testa, per poi immobilizzarle\ncon i dieci tentacoli e infliggere il colpo di grazia."
          moon: "Si aggira sui fondali marini e sulle spiagge.\nÈ ghiotto dei coralli che crescono sulla testa\ndei Corsola."
        de:
          sun: "Mit seinem Giftstachel am Kopf attackiert es\nBeute. Ist diese geschwächt, umschlingt es sie\nmit seinen zehn Tentakeln und gibt ihr den Rest."
          moon: "Kriecht auf dem Meeresgrund oder am Strand\nherum. Die Korallen, die auf den Köpfen von\nCorasonn wachsen, sind seine Leibspeise."
        es:
          sun: "Aturde a su presa con los aguijones venenosos\nde la cabeza. Cuando esta se debilita, la rodea\ncon sus diez extremidades y la remata."
          moon: "Reptan por las profundidades marinas o junto a\nla costa. Les encantan las ramas de coral que\ncrecen en la cabeza de los Corsola."
        ko:
          sun: "머리에 있는 독 가시로 먹이를\n찌른다. 약해졌을 때 10개의\n촉수로 잡아서 마무리한다."
          moon: "해저나 해안을 기어다닌다.\n코산호의 머리에서 자라는\n산호를 아주 좋아한다."
        zh_simp:
          sun: "用头上的毒刺扎猎物。\n在其虚弱的时候，\n用１０条触手抓住，一击毙命。"
          moon: "在海底和海岸爬来爬去。\n生长在太阳珊瑚头上的\n珊瑚是它非常喜欢吃的东西。"
        zh_trad:
          sun: "用頭上的毒刺扎進獵物身體。\n獵物變虛弱後，再用１０根觸手捉住\n並給予致命的一擊。"
          moon: "牠會在海底和海岸爬來爬去。\n非常喜歡吃生長在太陽珊瑚\n頭上的珊瑚。"
toxapex:
  species_id: 748
