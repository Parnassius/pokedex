    jp_kana: ジーランス
    jp_kanji: ジーランス
    en: Relicanth
    fr: Relicanth
    it: Relicanth
    de: Relicanth
    es: Relicanth
    ko: 시라칸
    zh_simp: 古空棘鱼
    zh_trad: 古空棘魚
