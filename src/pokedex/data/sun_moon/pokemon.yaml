        jp_kana:
          sun: "フワライドに　のって　たびにでた\nおとこが　そのまま　ゆくえふめいに\nなったという　じけんが　ある。"
          moon: "ゆうぐれに　とぶ　フワライドの\nたいぐんは　じっと　かんさつして\nいても　いつのまにか　きえている。"
        jp_kanji:
          sun: "フワライドに　乗って　旅に出た\n男が　そのまま　行方不明に\nなったという　事件が　ある。"
          moon: "夕暮れに　飛ぶ　フワライドの\n大群は　じっと　観察して\nいても　いつのまにか　消えている。"
        en:
          sun: "There was once an incident in which a man\ntook a trip riding a Drifblim, only to go missing."
          moon: "Even while under careful observation, large\nflocks of Drifblim flying at dusk will inexplicably\ndisappear from view."
        fr:
          sun: "Un jour, un homme a grimpé sur un Grodrive\npour partir en voyage. Personne ne l’a jamais\nrevu."
          moon: "Même si à la tombée de la nuit on peut observer\ndes nuées entières de Grodrive, elles finissent\ntoujours par s’évanouir dans la nature."
        it:
          sun: "Si racconta di un uomo che un giorno è volato via\nin groppa a un Drifblim. Di lui non si è saputo\npiù nulla."
          moon: "Se si osservano attentamente i gruppi di Drifblim\ntrascinati dal vento al tramonto, si noterà che a\nun certo punto svaniscono nel nulla."
        de:
          sun: "Einst stieg ein Mann auf ein Drifzepeli\nund brach zu einer Reise auf.\nEr wurde nie wieder gesehen."
          moon: "Bemerkt man einen in der Dämmerung driftenden\nSchwarm von Drifzepeli, verschwindet dieser\nauch wieder sogleich."
        es:
          sun: "Hubo un caso de un chico que se subió a un\nDrifblim y salió de viaje. Desde entonces está\nen paradero desconocido."
          moon: "Al anochecer, se reúnen en grupos y vuelan a la\nderiva. Si alguien trata de seguirlos con la\nmirada, desaparecen al instante."
        ko:
          sun: "둥실라이드에 타고 여행을 떠난\n남자가 그대로 행방불명이\n되었다는 사건이 있다."
          moon: "석양을 나는 둥실라이드의\n큰 무리는 가만히 관찰하고\n있어도 어느새 사라져있다."
        zh_simp:
          sun: "曾经发生过乘着随风球\n外出旅行的男人就这么\n行踪不明的事件。"
          moon: "日暮时分飞行的大群随风球，\n即使一直盯着观察，\n也会在一不留神间消失。"
        zh_trad:
          sun: "曾經發生過乘著隨風球\n出發旅行的男人就這樣\n失蹤的事件。"
          moon: "日暮時分飛行的大群隨風球，\n即使一直盯著觀察，\n也會在一不留神間消失。"
