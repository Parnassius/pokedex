        jp_kana:
          sun: "そうなんした　おとこが　たすけられ\nつれていかれた　ことう　は\nカイリューだけの　らくえんだった。"
          moon: "ふだんは　きわめて　おだやかだが\nその　げきりんに　ふれると　すべてを\nこわしつくすまで　おさまらない。"
        jp_kanji:
          sun: "遭難した　男が　助けられ\n連れて行かれた　孤島　は\nカイリューだけの　楽園だった。"
          moon: "普段は　極めて　穏やかだが\nその　逆鱗に　触れると　すべてを\n壊し尽くすまで　収まらない。"
        en:
          sun: "This Pokémon saved a shipwrecked man, taking\nhim to a remote island—a paradise occupied\nsolely by Dragonite."
          moon: "Incur the wrath of this normally calm Pokémon\nat your peril, because it will smash everything\nto smithereens before it’s satisfied."
        fr:
          sun: "On raconte l’histoire d’un naufragé sauvé par\nce Pokémon et emmené sur une île paradisiaque\nuniquement peuplée de Dracolosse."
          moon: "Il est d’un naturel débonnaire, mais si quelque\nchose parvient à le mettre en colère, il ne se\ncalmera qu’après avoir tout réduit en miettes."
        it:
          sun: "Si racconta che un naufrago fu soccorso da\nquesto Pokémon e portato su una meravigliosa\nisola remota abitata solo da Dragonite."
          moon: "Di solito è molto calmo, ma se qualcuno o\nqualcosa lo fa infuriare, non si placa finché\nnon ha distrutto ogni cosa."
        de:
          sun: "Einst rettete ein Dragoran einen Schiffbrüchigen\nund nahm ihn zu einem einsamen Inselparadies\nmit. Dort wohnten angeblich nur Dragoran."
          moon: "Eigentlich ist es ein äußerst sanftmütiges\nPokémon, aber wenn man es verärgert,\nschlägt es alles um sich herum kurz und klein."
        es:
          sun: "Se narra la historia de un náufrago que fue\nrescatado y transportado hasta una isla perdida\ny habitada únicamente por Dragonite."
          moon: "Es bastante pacífico por naturaleza, pero, si\nalguien le hace enfadar, no se calmará hasta\nhaber destruido todo lo que le rodea."
        ko:
          sun: "조난당한 남자가 도움을 받아\n따라간 외딴섬은\n망나뇽만의 낙원이었다."
          moon: "평소에는 극히 온화하지만\n역린을 건드리면 모든 것을\n부술 때까지 진정하지 않는다."
        zh_simp:
          sun: "遇难得救的男人\n被带去的那个孤岛，\n是曾属于快龙的乐园。"
          moon: "平常都是非常稳重的，\n但如果触碰到了它的逆鳞，\n就会不毁灭一切不罢休。"
        zh_trad:
          sun: "遇難的男人獲救後\n被帶去的孤島\n是只屬於快龍的樂園。"
          moon: "一般都是非常穩重的，\n但如果觸碰到了牠的逆鱗，\n牠將毀滅一切才肯罷休。"
