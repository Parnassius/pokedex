        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - flying
        - water_3
      abilities:
        - defeatist
      descriptions:
        jp_kana:
          sun: "あらゆる　とりポケモンの　そせん。\nアーケンじたいは　まだ　とべず\nきのうえを　ジャンプして　いどうした。"
          moon: "とぶことは　できなかった　ようだが\nたかい　きのうえ　から　かっくうし\nえものを　とっていたらしい。"
        jp_kanji:
          sun: "あらゆる　とりポケモンの　祖先。\nアーケン自体は　まだ　飛べず\n木の上を　ジャンプして　移動した。"
          moon: "飛ぶことは　できなかった　ようだが\n高い　木の上　から　滑空し\n獲物を　捕っていたらしい。"
        en:
          sun: "It is the ancestor of all bird Pokémon. Archen\nitself could not actually fly but moved by\nhopping from treetop to treetop."
          moon: "To all appearances flightless, it was able to\nglide down from tall treetops to snag its prey."
        fr:
          sun: "Il est l’ancêtre commun de tous les Pokémon\noiseaux. Incapable de voler, il se déplaçait\nen planant depuis la cime des arbres."
          moon: "Ce Pokémon était apparemment incapable\nde voler. Il savait néanmoins planer depuis\nla cime des arbres pour fondre sur ses proies."
        it:
          sun: "È l’antenato di tutti i Pokémon alati.\nPoiché non sapeva volare, si spostava tra gli\nalberi saltando."
          moon: "Sembra che, non essendo in grado di volare,\ncatturasse le prede planando da alti rami."
        de:
          sun: "Es ist der Urahn aller Vogel-Pokémon. Da es\nnicht fliegen kann, bewegt es sich fort, indem\nes von Baum zu Baum springt."
          moon: "Es kann nicht fliegen. Seine Beute fängt es,\nindem es von hohen Bäumen gleitet."
        es:
          sun: "El antecesor de todo Pokémon pájaro. Como era\nincapaz de volar, se desplazaba saltando de\nárbol en árbol."
          moon: "Al parecer no podía volar, por lo que se lanzaba\ndesde las copas de árboles altos para planear\ny atrapar así a su presa."
        ko:
          sun: "모든 새포켓몬의 조상이다.\n아켄 자체는 아직 날지 못해\n나무 위를 점프해서 이동했다."
          moon: "날 수는 없었던 것 같으나\n나무 위에서부터 활공하여\n먹이를 잡았다고 한다."
        zh_simp:
          sun: "是所有鸟宝可梦的祖先。\n始祖小鸟本身还不会飞，\n在树上跳着移动。"
          moon: "似乎不会飞行，\n但听说会从高高的树上\n滑翔捕捉猎物。"
        zh_trad:
          sun: "是所有鳥寶可夢的祖先。\n始祖小鳥本身還不會飛，\n而是在樹上跳著移動。"
          moon: "似乎不會飛行，\n但聽說會從高高的樹上\n滑翔捕捉獵物。"
