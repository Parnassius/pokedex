      hidden_ability: harvest
      descriptions:
        jp_kana:
          sun: "もりを　あらすものを　くってしまうと\nいわれる　ポケモン。　もりに　くらす\nいきものたちには　とても　やさしい。"
          moon: "ねっこを　つうじて　ほかの　きぎを\nあやつる。　オーロットの　すむ　もりで\nきを　きると　のろい　ころされる。"
        jp_kanji:
          sun: "森を　荒らす者を　喰ってしまうと\nいわれる　ポケモン。　森に　暮らす\n生き物たちには　とても　優しい。"
          moon: "根っ子を　通じて　他の　木々を\n操る。　オーロットの　棲む　森で\n木を　切ると　呪い　殺される。"
        en:
          sun: "This Pokémon is said to devour anyone daring to\nravage the forest. To the creatures dwelling in\nthe forest, it offers great kindness."
          moon: "Through its roots, it exerts control over other\ntrees. A deadly curse falls upon anyone cutting\ndown trees in forests where Trevenant dwell."
        fr:
          sun: "On raconte que ce Pokémon mange tous ceux\nqui s’en prennent à sa forêt. Il est toutefois\ntrès gentil avec ses voisins sylvains."
          moon: "Grâce à ses racines, il contrôle les arbres de\nla forêt où il a élu refuge, et maudit quiconque\na le malheur de les abattre."
        it:
          sun: "Tratta con gentilezza i Pokémon che vivono\nnel bosco che protegge, ma si dice che divori\nchiunque osi danneggiarlo."
          moon: "È in grado di controllare gli alberi attraverso le\nproprie radici. Lancia maledizioni terribili su\nchi abbatte gli alberi del bosco dove vive."
        de:
          sun: "Menschen, die dem Wald Schaden zufügen,\nsoll es angeblich auffressen. Es ist nett zu\nallen Lebewesen, die im Wald leben."
          moon: "Es nutzt seine Wurzeln als Nervensystem und\nkontrolliert so andere Bäume. Wer einen Baum im\nWald eines Trombork fällt, wird tödlich verflucht."
        es:
          sun: "Es amable con los seres que habitan los\nbosques, pero se cuenta que devora a quienes\nlos mancillan."
          moon: "Controla los árboles con sus raíces. Si alguien\ntala un árbol en los bosques en los que habita,\nserá maldecido de por vida."
        ko:
          sun: "숲을 망치는 자를 먹어버린다고\n전해지는 포켓몬이다. 숲에 사는\n생물들에게는 매우 친절하다."
          moon: "뿌리를 통해 다른 나무들을\n조종한다. 대로트가 사는 숲에서\n나무를 베면 저주에 걸려 죽게 된다."
        zh_simp:
          sun: "据说会把毁坏森林者吃掉的宝可梦。\n对生活在森林中的生物们非常温柔。"
          moon: "通过根茎操纵其他的树木。\n在朽木妖栖息的森林里\n砍伐树木的话，会被诅咒杀害。"
        zh_trad:
          sun: "據說會把破壞森林的人吃掉的寶可夢。\n對生活在森林中的生物們非常溫柔。"
          moon: "透過樹根操縱其他樹木。\n在朽木妖棲息的森林裡\n砍伐樹木的話，會因詛咒而死。"
