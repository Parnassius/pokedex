drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
    jp_kanji: スリープ
    en: Drowzee
    fr: Soporifik
    it: Drowzee
    de: Traumato
    es: Drowzee
    ko: 슬리프
    zh_simp: 催眠貘
    zh_trad: 催眠貘
  forms:
    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
        defense: 45
        special_attack: 43
        special_defense: 90
        speed: 42
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - insomnia
        - forewarn
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          sun: "ユメを　くらって　いきる　ポケモン。\nムンナや　ムシャーナと　きょうつうの\nそせんを　もつと　かんがえられている。"
          moon: "こと　たのしいユメは　うまいらしい。\nなつくと　いちばん　おいしかった\nユメを　みせてくれることも　あるよ。"
        jp_kanji:
          sun: "夢を　喰らって　生きる　ポケモン。\nムンナや　ムシャーナと　共通の\n祖先を　持つと　考えられている。"
          moon: "こと　楽しい夢は　美味いらしい。\nなつくと　一番　美味しかった\n夢を　みせてくれることも　あるよ。"
        en:
          sun: "A Pokémon that nourishes itself by eating\ndreams, it is thought to share common ancestry\nwith Munna and Musharna."
          moon: "It finds really fun dreams tasty. When it makes\nfriends with people, it may show them the most\ndelicious dreams it’s ever eaten."
        fr:
          sun: "Un Pokémon qui se nourrit de rêves.\nOn suppose qu’il a un ancêtre commun avec\nMunna et Mushana."
          moon: "Les rêves agréables ont meilleur goût. S’il vous\nconsidère comme un ami, il peut transformer les\nvôtres en ceux qu’il a trouvés les plus délicieux."
        it:
          sun: "Si nutre dei sogni degli altri. Si pensa che abbia\ndegli antenati in comune con Munna e Musharna."
          moon: "Sembra che sia ghiotto di sogni divertenti.\nSe si affeziona a qualcuno, gli mostra i sogni\nche ha trovato più gustosi."
        de:
          sun: "Es ernährt sich von Träumen. Man geht davon\naus, dass es von demselben Vorfahren wie\nSomniam und Somnivora abstammt."
          moon: "Lustige Träume schmecken ihm am besten.\nIst man nett zu ihm, zeigt es einem ab und an\nTräume, die ihm besonders gemundet haben."
        es:
          sun: "Drowzee se alimenta de sueños. Se cree que\ncomparte antepasados con Munna y Musharna."
          moon: "Los sueños divertidos son sus favoritos. Si\nconsigues hacerte su amigo, es posible que te\nenseñe el sueño más delicioso que haya tenido."
        ko:
          sun: "꿈을 먹으며 살아가는 포켓몬이다.\n몽나나 몽얌나와 선조가\n같다고 여겨지고 있다."
          moon: "특히 즐거운 꿈이 맛있다고 한다.\n친해지면 가장 맛있었던\n꿈을 보여줄 때도 있다."
        zh_simp:
          sun: "吞食梦来生存的宝可梦。\n被认为与食梦梦和梦梦蚀\n有着共同的祖先。"
          moon: "听说愉快的梦特别美味。\n变得亲密后，\n有时也会呈现最美味的梦哦。"
        zh_trad:
          sun: "吞食夢來生存的寶可夢。\n被認為與食夢夢和夢夢蝕\n有著共同的祖先。"
          moon: "聽說愉快的夢特別美味。\n變得親密後，\n有時也會讓人作最美味的夢哦。"
hypno:
  species_id: 97
