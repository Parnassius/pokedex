      descriptions:
        jp_kana:
          sun: "おおきく　ふくらんだ　クチバシは\nようちえんじ　くらいの　こどもなら\nすっぽり　はいる　おおきさだ。"
          moon: "エサあつめは　わかい　♂の　しごと。\nおおきなクチバシに　エサを　ためて\nなかまが　まつ　すまで　はこぶ。"
        jp_kanji:
          sun: "大きく　膨らんだ　クチバシは\n幼稚園児　くらいの　子どもなら\nすっぽり　入る　大きさだ。"
          moon: "餌集めは　若い　♂の　仕事。\n大きなクチバシに　餌を　溜めて\n仲間が　待つ　巣まで　運ぶ。"
        en:
          sun: "Its spacious beak is large enough for a\nsmall child to fit right inside."
          moon: "Gathering food is the work of young males.\nThey store food in their capacious beaks and\ncarry it back to others waiting in the nest."
        fr:
          sun: "Le bec de ce Pokémon est énorme, tellement\nénorme qu’un petit enfant pourrait grimper\ndedans et s’y cacher sans problème."
          moon: "Les Bekipan mâles ramènent la nourriture, qu’ils\ntransportent dans leur énorme bec jusqu’au nid\noù les attendent leurs congénères."
        it:
          sun: "Il suo becco è talmente grande che potrebbe\ncontenere senza problemi un bambino piccolo."
          moon: "I giovani maschi hanno il compito di procurare\nil cibo. Catturano le prede col loro becco enorme\ne le portano al nido dai loro compagni."
        de:
          sun: "Sein riesiger Schnabel ist so groß, dass sogar\nein kleines Kind problemlos hineinpassen würde."
          moon: "Die jungen Männchen beschaffen die Nahrung.\nSie sammeln die Beute in ihrem großen Schnabel\nund bringen sie zurück ins Nest zu den anderen."
        es:
          sun: "Su pico es tan grande que podría acomodar a un\nniño pequeño sin ningún problema."
          moon: "Los machos jóvenes se encargan de reunir\ncomida. La acumulan en sus grandes picos para\nluego llevarla a sus compañeros en los nidos."
        ko:
          sun: "크게 부풀어 오른 부리는\n유치원생 정도의 어린아이라면\n쏙 들어갈 수 있는 크기이다."
          moon: "먹이를 모으는 일은 젊은 수컷의 일이다.\n커다란 부리에 먹이를 저장해서\n동료가 기다리는 둥지까지 운반한다."
        zh_simp:
          sun: "鸟嘴鼓得大大的，\n幼儿园小朋友这么大的孩子\n正好能完全进入。"
          moon: "收集食物是年轻♂的活儿。\n在大大的鸟嘴里储藏食物，\n运送到伙伴等待的巢穴中。"
        zh_trad:
          sun: "鼓脹得大大的鳥嘴\n是連幼稚園生那麼大的\n孩子都能裝進去的大小。"
          moon: "收集食物是年輕♂的工作。\n會在大大的鳥嘴裡儲藏食物，\n運送到夥伴等待的巢穴中。"
