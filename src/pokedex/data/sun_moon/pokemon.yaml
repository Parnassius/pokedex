diglett:
  species_id: 50
  names:
    jp_kana: ディグダ
    jp_kanji: ディグダ
    en: Diglett
    fr: Taupiqueur
    it: Diglett
    de: Digda
    es: Diglett
    ko: 디그다
    zh_simp: 地鼠
    zh_trad: 地鼠
  forms:
    diglett:
      form_id: 0
      base_stats:
        hp: 10
        attack: 55
        defense: 25
        special_attack: 35
        special_defense: 45
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_veil
        - arena_trap
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          sun: "ちかで　きのねを　かじる。　そだてる\nやさいの　ひんしゅに　よっては\nのうかに　がいを　なす　ポケモン。"
          moon: "ディグダが　すむ　とちは　たがやされ\nフンで　ゆたかに　なるため　おおくの\nのうかが　たいせつに　そだてている。"
        jp_kanji:
          sun: "地下で　木の根を　かじる。　育てる\n野菜の　品種に　よっては\n農家に　害を　なす　ポケモン。"
          moon: "ディグダが　棲む　土地は　耕され\nフンで　豊かに　なるため　多くの\n農家が　大切に　育てている。"
        en:
          sun: "It chews on plant roots underground.\nFarmers whose vegetables are vulnerable\nfind it can be quite a pest."
          moon: "Many farmers cherish and nurture Diglett\nbecause its droppings enrich the soil it lives in."
        fr:
          sun: "Il mange les racines souterraines des arbres,\net cause beaucoup de soucis aux fermiers\nqui cultivent certains légumes."
          moon: "Ce Pokémon laboure le sol et le fertilise avec\nses déjections. Pour cette raison, beaucoup\nd’agriculteurs l’élèvent avec soin."
        it:
          sun: "Vive nutrendosi delle radici che trova\nsottoterra. Causa problemi agli agricoltori\nper la coltivazione di certe verdure."
          moon: "È allevato in molte aziende agricole perché,\nvivendo sottoterra, ara il terreno e lo concima\ncon i suoi escrementi."
        de:
          sun: "Es knabbert im Erdreich die Wurzeln von Bäumen\nund Pflanzen an. Bei manchen Gemüsesorten\nkann dies zu Ernteschäden führen."
          moon: "Digda wird gerne auf Farmen gezüchtet, da es\ndas Erdreich, in dem es wohnt, gut durchpflügt\nund mit seinen Ausscheidungen düngt."
        es:
          sun: "Le gusta mordisquear las raíces subterráneas\nde las plantas. Puede causar estragos en las\ngranjas según el tipo de cultivos."
          moon: "En muchas granjas crían Diglett, pues dejan la\ntierra perfectamente labrada y abonada, y así\nlas cosechas son mucho más productivas."
        ko:
          sun: "지하에서 나무뿌리를 갉아먹는다.\n키우는 채소의 품종에 따라서는\n농가에 해를 끼치는 포켓몬이다."
          moon: "디그다가 사는 땅은 일궈져 있으며\n배설물로 비옥해져서 많은\n농가에서 소중히 기르고 있다."
        zh_simp:
          sun: "在地下啃食树根。\n因有些品种的蔬菜会遭其啃食，\n是可能对农户造成灾害的宝可梦。"
          moon: "地鼠会疏松栖息的土地，\n其粪便也会让土壤肥沃，\n所以很多农户会精心培育它们。"
        zh_trad:
          sun: "會在地下嚼食樹根。根據種植\n的蔬菜品種不同，有時會對農家\n造成災害的寶可夢。"
          moon: "地鼠棲息的土地會被翻掘，\n並因糞便而變得肥沃，所以很多\n農戶把牠們當成寶貝培育著。"
    diglett_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 10
        attack: 55
        defense: 30
        special_attack: 35
        special_defense: 45
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - ground
        - steel
      egg_groups:
        - field
      abilities:
        - sand_veil
        - tangling_hair
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          sun: "あたまから　はえているのは　ヒゲが\nへんか　したもので　きんぞくしつ。\nゆらゆら　うごき　なかまと　こうしん。"
          moon: "きんいろの　ヒゲは　センサーきのうを\nもっている。　あなから　だして\nまわりの　ようすを　うかがっている。"
        jp_kanji:
          sun: "頭から　生えているのは　髭が\n変化　したもので　金属質。\nゆらゆら　動き　仲間と　交信。"
          moon: "金色の　髭は　センサー機能を\n持っている。　穴から　だして\n周りの　様子を　うかがっている。"
        en:
          sun: "Its head sports an altered form of whiskers\nmade of metal. When in communication with its\ncomrades, its whiskers wobble to and fro."
          moon: "Its golden hairs function as sensors. It pokes\nthem out of its burrow to monitor\nits surroundings."
        fr:
          sun: "L’épi doré qui pousse sur sa tête est une\nmutation. Il communique avec ses congénères\nen oscillant doucement."
          moon: "Il se sert de l’épi doré sur sa tête comme d’une\nantenne et la laisse sortir de son terrier."
        it:
          sun: "I peli sulla testa sono dei fili metallici, frutto di\nuna mutazione dei suoi baffi. Comunica con\ni suoi simili oscillando dolcemente."
          moon: "I suoi capelli dorati fungono da antenne che\nfa sporgere dal buco dove si nasconde per\nesplorare i dintorni."
        de:
          sun: "Die metallischen Fortsätze auf seinem Kopf\nwaren ursprünglich Haare. Es kommuniziert\ndurch Schwanken mit anderen Digda."
          moon: "Seine goldenen Haare verfügen über sensorische\nFunktionen. Es streckt sie aus Löchern heraus,\num die Umgebung zu erkunden."
        es:
          sun: "Los pelillos metálicos de la cabeza son fruto de\nuna mutación. Se comunica con sus compañeros\nbamboleándose."
          moon: "Los pelillos dorados que tiene en la cabeza\nfuncionan como sensores. Los hace asomar por\nel agujero para explorar su entorno."
        ko:
          sun: "머리에 돋아나 있는 것은 수염이\n변화한 것으로 금속 질이다.\n흔들거리며 동료와 교신한다."
          moon: "금색 수염은 센서 기능을\n가지고 있다. 구멍에서 내밀어\n주변의 상황을 살피고 있다."
        zh_simp:
          sun: "从头上长出的金属物体\n是由胡子变化而来的。\n通过摆动跟伙伴进行交流。"
          moon: "金色的胡子拥有感应器的功能。\n从洞里伸出，查探周围的状态。"
        zh_trad:
          sun: "從頭上長出來的是\n鬍鬚變化而來的金屬物體。\n隨著擺動跟夥伴進行交流。"
          moon: "金色的鬍子擁有感應器的功能。\n會從洞裡伸出，查探周圍的狀態。"
dugtrio:
