      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        rare: black_glasses
      descriptions:
        jp_kana:
          sun: "すなのなかに　もぐり　およぐように\nいどう。　てきに　みつからないためと\nたいおんを　さげない　ちえ　なのだ。"
          moon: "すなのなかに　みを　ひそめ　うえを\nあるいた　えものの　あしを　ガブリ。\nだいこうぶつは　ナックラー。"
        jp_kanji:
          sun: "砂の中に　潜り　泳ぐように\n移動。　敵に　みつからないためと\n体温を　下げない　知恵　なのだ。"
          moon: "砂の中に　身を　潜め　上を\n歩いた　獲物の　足を　ガブリ。\n大好物は　ナックラー。"
        en:
          sun: "It submerges itself in sand and moves as if\nswimming. This wise behavior keeps its enemies\nfrom finding it and maintains its temperature."
          moon: "It conceals itself in the sand and chomps down\non the legs of any prey that unwarily walk over\nit. Its favorite food is Trapinch."
        fr:
          sun: "Ce Pokémon avance tapi dans le sable, une\nmanière pour lui de se cacher des prédateurs\net de maintenir sa température corporelle."
          moon: "Tapi dans le sable, il attend qu’une proie passe\npour lui croquer la patte. Il a notamment un gros\nfaible pour les Kraknoix en guise d’apéritif."
        it:
          sun: "Si nasconde sotto la sabbia e si sposta come\nse nuotasse. In questo modo evita i nemici e\nmantiene alta la sua temperatura corporea."
          moon: "Si nasconde sotto la sabbia e azzanna le zampe\ndei Pokémon che gli camminano sopra. È ghiotto\ndi Trapinch."
        de:
          sun: "Es bewegt sich verborgen im Sand mithilfe von\nSchwimmbewegungen fort. So versteckt es sich\nvor Gegnern und bleibt immer schön warm."
          moon: "Es verbirgt sich im Sand und wartet auf Beute,\num sie von unten in die Beine zu beißen.\nBesonders gern frisst es Knacklion."
        es:
          sun: "Se desplaza sumergido bajo la arena, como si\nnadase. Así se esconde de sus enemigos y evita\nque descienda su temperatura corporal."
          moon: "Se desplaza hundido en la arena y atrapa a las\npresas incautas de la superficie mordiéndoles la\npata. Su manjar favorito son los Trapinch."
        ko:
          sun: "모래 속에 숨어서 헤엄치는 것처럼\n이동한다. 적에게 들키지 않으면서\n체온이 내려가지 않기 위한 지혜다."
          moon: "모래 속에 몸을 숨기고 위를\n걸어가는 먹이의 다리를 덥석 문다.\n가장 좋아하는 것은 톱치."
        zh_simp:
          sun: "潜藏在沙中像游泳一样移动。\n是为了不被敌人发现和\n不让体温下降而采取的机智行为。"
          moon: "把身体潜藏在沙子中，\n一口吃掉在上面行走的猎物的脚。\n最喜欢吃的东西是大颚蚁。"
        zh_trad:
          sun: "潛藏在沙中像游泳一樣移動。\n這是種兼具不被敵人發現和\n保持體溫效果的生存智慧。"
          moon: "把身體潛藏在沙子中，\n一口吃掉在上面行走的獵物的腳。\n最喜歡吃的東西是大顎蟻。"
krokorok:
  species_id: 552
  names:
    jp_kana: ワルビル
    jp_kanji: ワルビル
    en: Krokorok
    fr: Escroco
    it: Krokorok
    de: Rokkaiman
    es: Krokorok
    ko: 악비르
    zh_simp: 混混鳄
    zh_trad: 混混鱷
  forms:
    krokorok:
      form_id: 0
      base_stats:
        hp: 60
        attack: 82
        defense: 45
        special_attack: 45
        special_defense: 45
        speed: 74
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        rare: black_glasses
      descriptions:
        jp_kana:
          sun: "すうひきの　むれを　なして　こうどう。\nむれの　ちゅうしんは　♀の　ばあいが\nおおく　♂たちが　エサを　あつめる。"
          moon: "めを　おおう　とくしゅな　まくの\nおかげで　まよなかでも　あたりを\nはっきり　みることが　できるぞ。"
        jp_kanji:
          sun: "数匹の　群れを　成して　行動。\n群れの　中心は　♀の　場合が\n多く　♂たちが　餌を　集める。"
          moon: "目を　覆う　特殊な　膜の\nおかげで　真夜中でも　あたりを\nはっきり　見ることが　できるぞ。"
        en:
          sun: "They move in groups of a few individuals.\nA female is often the leader of the group, and\nthe males will gather food."
          moon: "Thanks to the special membrane covering its\neyes, it can see its surroundings clearly, even in\nthe middle of the night."
        fr:
          sun: "Les Escroco se déplacent en bandes, souvent\nmenées par une femelle. La plupart du temps,\nles mâles se chargent de collecter la nourriture."
          moon: "Grâce à la membrane spéciale qui recouvre\nses yeux, il peut distinguer parfaitement\nses environs, même en pleine nuit."
        it:
          sun: "Vive in piccoli gruppi.\nSe il capogruppo è una femmina, i maschi\nsi occupano di procurare il cibo."
          moon: "La membrana speciale che ricopre i suoi occhi\ngli permette di vedere chiaramente l’ambiente\ncircostante anche al buio."
        de:
          sun: "Es bildet mit mehreren Artgenossen ein Rudel.\nMeistens führen Weibchen die Gruppe an und\nMännchen müssen Nahrung beschaffen."
          moon: "Durch die spezielle Membran um seine Augen\nkann es seine Umgebung auch im Dunkeln\ndeutlich sehen."
        es:
          sun: "Viven en manadas. En muchos casos, las\nhembras ejercen una posición dominante y los\nmachos se encargan de buscar alimento."
          moon: "La membrana especial que le recubre los ojos\nle permite discernir con claridad lo que se halla\na su alrededor, incluso en plena noche."
        ko:
          sun: "몇 마리씩 무리를 지어 행동한다.\n무리의 중심은 암컷인 경우가\n많고 수컷들이 먹이를 모은다."
          moon: "눈을 감싸는 특수한 막\n덕분에 한밤중에도 주변을\n똑똑히 볼 수 있다."
        zh_simp:
          sun: "数只成群后行动。\n群体的中心大多都是♀，\n♂们会收集食物。"
          moon: "多亏了盖住眼睛的特殊膜，\n即使在深夜也能把周围\n看得一清二楚。"
        zh_trad:
          sun: "通常以數隻為單位成群行動。\n群體的中心大多都是♀，\n♂們負責收集食物。"
          moon: "多虧蓋住眼睛的特殊膜，\n即使在深夜也能把周圍\n看得一清二楚。"
