      descriptions:
        jp_kana:
          sun: "エサを　もとめ　ちじょうに　あがる。\nすいほうを　かぶるのは　こきゅうと\nやわらかい　あたまを　まもるため。"
          moon: "えものや　てきを　みつけると\nあたまに　かぶった　すいほうを\nはじいて　みずを　ぶつけるぞ。"
        jp_kanji:
          sun: "餌を　求め　地上に　あがる。\n水泡を　被るのは　呼吸と\n柔らかい　頭を　守るため。"
          moon: "獲物や　敵を　見つけると\n頭に　被った　水泡を\n弾いて　水を　ぶつけるぞ。"
        en:
          sun: "It crawls onto the land in search of food.\nIts water bubble allows it to breathe and\nprotects its soft head."
          moon: "When it comes across enemies or potential prey,\nthis Pokémon smashes its\nwater-bubble-covered head into them."
        fr:
          sun: "Il lui arrive d’aller chercher sa nourriture sur\nla terre ferme. Sa bulle lui sert alors aussi bien\nà respirer qu’à protéger sa tête molle."
          moon: "Dès qu’il tombe sur une proie ou un prédateur,\nil ouvre les hostilités en lui lançant de l’eau\nprovenant de la bulle qui entoure sa tête."
        it:
          sun: "Sale sulla terraferma in cerca di prede.\nLa sua bolla d’acqua gli permette di respirare\ne protegge la sua testa molle."
          moon: "Quando avvista delle prede o dei nemici,\nli attacca scagliando contro di loro l’acqua\ndella bolla che ha in testa."
        de:
          sun: "Die Futtersuche treibt es an Land. Eine\nWasserblase versorgt es mit Atemluft und\nschützt zugleich seinen weichen Kopf."
          moon: "Wenn es Beute oder Feinde erspäht hat, lässt\nes die Wasserblase auf seinem Kopf platzen\nund bespritzt sein Gegenüber mit Wasser."
        es:
          sun: "Emerge a la superficie para alimentarse.\nLa burbuja con la que se rodea le sirve para\nrespirar y proteger su delicada cabeza."
          moon: "Si se topa con una presa o un enemigo, le lanza\nun chorro de agua desde la burbuja con la que\nse protege la cabeza."
        ko:
          sun: "먹이를 찾아서 지상으로 올라온다.\n수포를 뒤집어쓴 것은 호흡과\n부드러운 머리를 보호하기 위해서다."
          moon: "먹이나 적을 발견하면\n머리에 쓴 수포를\n튕겨서 물을 맞힌다."
        zh_simp:
          sun: "为了寻找食物而到地面上来。\n戴着水泡是为了呼吸，\n以及保护柔软的头部。"
          moon: "发现猎物或敌人后，\n会将头上戴着的水泡弹出，\n将水砸出去。"
        zh_trad:
          sun: "為了尋找食物而到地上來。\n戴著水泡是為了呼吸，\n以及保護柔軟的頭部。"
          moon: "發現獵物或敵人後，\n會將頭上戴著的水泡彈出去，\n用水進行攻擊。"
