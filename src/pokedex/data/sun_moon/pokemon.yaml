          sun: "ビーチなどで　ひからびているが\nまだ　いきていることも　おおい。\nみずに　ひたせば　ふやけて　ふっかつ。"
          moon: "すなはま　などの　あさせを　ただよう。\nどくの　しょくしゅに　さされたり\nかまれたら　びょういんに　いそげ。"
        jp_kanji:
          sun: "ビーチなどで　干からびているが\nまだ　生きていることも　多い。\n水に　浸せば　ふやけて　復活。"
          moon: "砂浜　などの　浅瀬を　漂う。\n毒の　触手に　刺されたり\nかまれたら　病院に　急げ。"
        en:
          sun: "They can be found lying dehydrated on\nbeaches, but they are often still alive.\nWhen soaked in water, they will revive."
          moon: "It drifts in shallow seas, such as the areas near\nbeaches. If you get bitten or stabbed by its\ntoxic tentacles, rush to the hospital."
        fr:
          sun: "On en trouve parfois échoués sur le sable et\ndesséchés, mais certains sont encore en vie. Il\nsuffit de les mettre à l’eau pour les ranimer."
          moon: "Il flotte dans les chenaux sablonneux. En cas de\npiqûre par l’un de ses tentacules empoisonnés,\nil faut aller à l’hôpital de toute urgence."
        it:
          sun: "Se ne trovano spesso esemplari disidratati\nsulla spiaggia. Se rigettati in acqua, di solito\nsi riprendono immediatamente."
          moon: "Si aggira nelle secche vicino alle spiagge.\nSe si viene punti dai suoi tentacoli velenosi,\nè meglio correre subito all’ospedale."
        de:
          sun: "Am Strand kann man oft stark ausgetrocknete\nExemplare finden, die aber noch leben. Taucht\nman sie in Wasser, werden sie wieder topfit."
          moon: "Es treibt durch seichte Gewässer in der Nähe\nvon Stränden. Durch seine Tentakel verursachte\nVerletzungen müssen sofort untersucht werden."
        es:
          sun: "A veces es posible encontrarlos deshidratados\nen la playa, pero, si se los pone en remojo,\nvolverán a henchirse de vida."
          moon: "Suele rondar las aguas poco profundas de la\norilla. Sus tentáculos son muy venenosos y, en\ncaso de picadura, hay que correr al hospital."
        ko:
          sun: "해변 등에서 말라버렸지만\n아직 살아 있는 경우도 많다.\n물에 적시면 불면서 부활한다."
          moon: "모래 해변 등의 얕은 물가를 떠돈다.\n독 촉수에 쏘이거나\n물리면 서둘러 병원에 가자."
        zh_simp:
          sun: "在沙滩等地方晒干后，\n依然能存活的情况也有很多。\n泡在水里的话就会湿润复活。"
          moon: "漂浮在沙滩等浅滩地区。\n一旦被有毒的触手刺到或是被咬到，\n就要立刻去医院。"
        zh_trad:
          sun: "就算在沙灘等地方曬得乾乾的，\n在很多情況下依然可以存活。\n泡在水裡就會回復濕潤而復活了。"
          moon: "漂浮在沙灘等淺灘地區。\n要是被牠有毒的觸手刺到或是被咬到，\n就趕快去醫院吧。"
tentacruel:
  species_id: 73
  names:
    jp_kana: ドククラゲ
    jp_kanji: ドククラゲ
    en: Tentacruel
    fr: Tentacruel
    it: Tentacruel
    de: Tentoxa
    es: Tentacruel
    ko: 독파리
    zh_simp: 毒刺水母
    zh_trad: 毒刺水母
