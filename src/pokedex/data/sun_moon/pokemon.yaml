      types:
        - water
      egg_groups:
        - water_3
      abilities:
        - illuminate
        - natural_cure
      hidden_ability: analytic
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          sun: "うみべに　おおく　せいそく。\nよるに　なると　からだの　ちゅうしんが\nあやしく　あかく　かがやきだす。"
          moon: "ネオラントなどに　かじられるが\nあかいコアが　あるかぎり　すぐに\nさいせいするので　きにしていない。"
        jp_kanji:
          sun: "海辺に　多く　生息。\n夜に　なると　身体の　中心が\n怪しく　赤く　輝きだす。"
          moon: "ネオラントなどに　かじられるが\n赤いコアが　ある限り　すぐに\n再生するので　気にしていない。"
        en:
          sun: "Large numbers of these Pokémon make their\nhome at the seaside. At night, a strange red\nglow radiates from the center of their bodies."
          moon: "This Pokémon gets nibbled on by Lumineon and\nothers. Thanks to its red core, it regenerates\nfast, so it’s unconcerned by their snack attacks."
        fr:
          sun: "Ce Pokémon vit en grand nombre au fond de\nla mer. À la nuit tombée, son cœur émet une\nétrange lumière rouge."
          moon: "Même s’il se fait manger des bras par un\nLuminéon, il peut les régénérer tant que son\ncœur rouge est intact, aussi ne s’en fait-il pas."
        it:
          sun: "Gli Staryu vivono numerosi in riva al mare.\nDi notte, il nucleo al centro del corpo brilla\ndi una strana luce rossa."
          moon: "Se gli capita di venire mangiucchiato da un\nLumineon, non si preoccupa, perché finché\nil nucleo rosso rimane intatto, può rigenerarsi."
        de:
          sun: "Es taucht in großer Zahl an Ufern auf.\nNachts erstrahlt der Kern in seiner Mitte\nin einem unheimlichen Rot."
          moon: "Es wird ab und zu von Lumineon angeknabbert,\naber solange es seinen roten Kern hat, kann es\nden abgebissenen Teil sofort wiederherstellen."
        es:
          sun: "Suelen vivir en el mar, cerca de la costa. Por la\nnoche, su núcleo brilla con una misteriosa luz\nroja."
          moon: "A veces recibe ataques de Lumineon y otros\nPokémon, pero puede regenerar cualquier parte\nde su cuerpo mientras su núcleo siga intacto."
        ko:
          sun: "해변에 많이 서식한다.\n밤이 되면 몸의 중심이\n이상하고 빨갛게 빛을 낸다."
          moon: "네오라이트 등에게 물리지만\n빨간 핵이 있는 한 바로\n재생되므로 신경 쓰지 않는다."
        zh_simp:
          sun: "大多在海边栖息。\n夜幕降临时，身体的正中\n会闪耀出怪异的红色。"
          moon: "即使被霓虹鱼等咬到，\n只要红色内核部分还在就会立刻再生，\n所以对此并不在意。"
        zh_trad:
          sun: "大多在海邊棲息。\n夜幕降臨時，身體的正中\n會閃耀出怪異的紅色光芒。"
          moon: "即使被霓虹魚之類的咬到，\n只要紅色的核心部分還在就會立刻再生，\n所以一點都不在意。"
