          moon: "どくガスには　おおくの　フェロモンが\nふくまれている。　うすめることで\nかんのうてきな　こうすいが　できる。"
        jp_kanji:
          sun: "なぜか　♀しか　見つかっていない。\nヤトウモリの♂を　引き連れて\n逆ハーレムを　作って　暮らす。"
          moon: "毒ガスには　多くの　フェロモンが\n含まれている。　薄めることで\n官能的な　香水が　できる。"
        en:
          sun: "For some reason, only females have been found.\nIt creates a reverse harem of male Salandit that\nit lives with."
          moon: "Filled with pheromones, its poisonous gas can\nbe diluted to use in the production of\nluscious perfumes."
        fr:
          sun: "Curieusement, cette espèce ne compte que\ndes femelles. Ces dernières aiment s’entourer\nde nombreux admirateurs Tritox mâles."
          moon: "Son gaz toxique est riche en phéromones. Il est\npossible d’isoler ces dernières pour concocter\nun puissant parfum aphrodisiaque."
        it:
          sun: "Sono stati trovati solo esemplari femmina,\nche sono soliti circondarsi di maschi\ndi Salandit."
          moon: "Il gas tossico che emana contiene feromoni.\nSe viene diluito, se ne ricava un profumo\nche ha un grande potere d’attrazione."
        de:
          sun: "Bisher wurden nur Weibchen entdeckt.\nSie werden von männlichen Molunk verehrt und\nleben mit einer Gruppe von ihnen zusammen."
          moon: "Ihr Giftgas enthält viele Pheromone.\nVerdünnt man es, lässt sich daraus\nein sinnliches Parfüm herstellen."
        es:
          sun: "Por algún motivo desconocido, solo hay\nhembras. Suele formarse su propio harén\ncompuesto por Salandit machos."
          moon: "Su gas venenoso contiene numerosas feromonas.\nAl diluirlo es posible elaborar un perfume que\nresulta verdaderamente embriagador."
        ko:
          sun: "어찌 된 영문인지 암컷만 발견되고 있다.\n야도뇽의 수컷을 거느리며\n역하렘을 만들어서 산다."
          moon: "독가스에는 많은 양의 페로몬이\n포함되어있다. 희석하면\n관능적인 향수가 만들어진다."
        zh_simp:
          sun: "不知为何只发现♀。\n率领夜盗火蜥的♂，\n组成逆后宫一起生活。"
          moon: "毒瓦斯中含有很多的费洛蒙。\n稀释以后可以制作成性感的香水。"
        zh_trad:
          sun: "不知為何只發現♀。\n率領夜盜火蜥的♂，\n組成逆後宮一起生活。"
          moon: "毒瓦斯裡含有很多的費洛蒙。\n稀釋後可用來製作性感的香水。"
