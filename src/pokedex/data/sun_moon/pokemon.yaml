      descriptions:
        jp_kana:
          sun: "タフで　じきゅうりょくに　すぐれる。\nおもたい　にもつを　のせたまま\nまる１にち　とびつづけても　へいき。"
          moon: "はるか　たいこの　へきがのなかに\nオニドリルらしき　ポケモンが\nえがかれていることが　わかった。"
        jp_kanji:
          sun: "タフで　持久力に　優れる。\n重たい　荷物を　乗せたまま\n丸１日　飛び続けても　平気。"
          moon: "遥か　太古の　壁画の中に\nオニドリルらしき　ポケモンが\n描かれていることが　判った。"
        en:
          sun: "It’s tough and has excellent stamina.\nIt has no problem flying continuously\nfor a whole day carrying a heavy load."
          moon: "Drawings of a Pokémon resembling Fearow can\nbe seen in murals from deep in ancient history."
        fr:
          sun: "Un Pokémon robuste et extrêmement endurant.\nIl est capable de voler du matin au soir tout\nen transportant de lourdes charges."
          moon: "Un Pokémon fort ancien, qui a même été identifié\nsur des fresques antiques."
        it:
          sun: "Ha una notevole resistenza fisica e può volare\nper un giorno intero trasportando oggetti\npesanti."
          moon: "Sembra che questo Pokémon sia raffigurato\nin pitture rupestri antichissime."
        de:
          sun: "Es ist belastbar und hat genügend Ausdauer,\num selbst mit schwerer Fracht beladen einen\nganzen Tag lang in der Luft zu bleiben."
          moon: "Wie kürzlich bekannt wurde, existieren uralte\nWandmalereien, auf denen Pokémon abgebildet\nsind, die Ähnlichkeiten mit Ibitak aufweisen."
        es:
          sun: "Son de destacar su dureza y resistencia.\nPuede volar sin parar durante un día entero\naunque lleve una pesada carga."
          moon: "En algunos murales de épocas arcaicas se han\nhallado pinturas de un Pokémon que guarda un\ngran parecido con Fearow."
        ko:
          sun: "터프하고 지구력도 우수하다.\n무거운 짐을 진 채\n온종일 날아도 끄떡없다."
          moon: "먼 태곳적 벽화 속에\n깨비드릴조처럼 보이는 포켓몬이\n그려져 있는 것이 발견되었다."
        zh_simp:
          sun: "因为很强壮而持久力优秀。\n即使载着很重的货物持续\n飞行一整天也平心静气。"
          moon: "经查证，在遥远的\n太古时代壁画中描绘有\n形似大嘴雀的宝可梦。"
        zh_trad:
          sun: "強壯且擁有優秀的持久力。\n即使載著很重的貨物\n持續飛行一整天也沒問題。"
          moon: "經調查發現，在遙遠\n太古時代的壁畫描繪著\n形似大嘴雀的寶可夢。"
