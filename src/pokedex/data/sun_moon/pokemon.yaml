      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        common: black_glasses
      descriptions:
        jp_kana:
          sun: "すなあらしでも　５０キロさきに　いる\nちいさな　えものも　はっけんする\nとくしゅな　りょうめを　もつ。"
          moon: "きょうりょくな　アゴで　かみつくと\nそのまま　おもいきり　からだを\nひねり　えものを　せつだんする。"
        jp_kanji:
          sun: "砂嵐でも　５０キロ先に　いる\n小さな　獲物も　発見する\n特殊な　両目を　持つ。"
          moon: "強力な　アゴで　かみつくと\nそのまま　思い切り　身体を\nひねり　獲物を　切断する。"
        en:
          sun: "Its unique faculty of sight can detect small prey\nmore than 30 miles away, even in the midst of\na sandstorm."
          moon: "After clamping down with its powerful jaws,\nit twists its body around to rip its prey in half."
        fr:
          sun: "Ses yeux perçants lui permettent de détecter\nune petite proie à 50 km, même au cœur\nd’une tempête de sable."
          moon: "Ses mâchoires sont si puissantes qu’il lui arrive\nde plier ou découper le corps de ses victimes\nsans même s’en rendre compte."
        it:
          sun: "I suoi occhi gli permettono di individuare prede\nminuscole a 50 km di distanza persino nelle\ntempeste di sabbia."
          moon: "Cattura la preda con le possenti mandibole\ne la serra con forza fino a tranciarla."
        de:
          sun: "Seine Augen sind so außergewöhnlich, dass es\nsogar in einem Sandsturm kleinste Beute aus\n50 km Entfernung entdecken kann."
          moon: "Wenn es mit seinem mächtigen Kiefer zubeißt,\nzerteilt es seine Beute mit einer Drehung seines\nKörpers."
        es:
          sun: "Su vista es tan perspicaz que puede divisar\npresas de pequeño tamaño a 50 km de\ndistancia, incluso en plena tormenta de arena."
          moon: "En cuanto le hinca el diente a su presa con sus\npotentes mandíbulas, comienza a retorcerle el\ncuerpo hasta despedazarla."
        ko:
          sun: "모래 폭풍 속에서도 50km 앞에 있는\n작은 먹이를 발견하는\n특수한 두 눈을 가졌다."
          moon: "강력한 턱으로 물고\n그대로 힘껏 몸을 비틀어\n먹이를 절단한다."
        zh_simp:
          sun: "拥有特殊的双眼，\n即使在沙暴中也能发现\n前方５０公里处的小猎物。"
          moon: "用强力的颚咬住后，\n就这么拼命扭转身体，\n将猎物切断。"
        zh_trad:
          sun: "擁有特殊的雙眼，\n即使在沙暴中也能發現\n前方５０公里處的小獵物。"
          moon: "用強力的顎咬住後，\n狠狠地扭動身體，\n將獵物切斷。"
