      descriptions:
        jp_kana:
          sun: "こうぶつは　キャモメや　ツツケラ。\nきょうれつな　キックを　おみまいし\nするどいツメで　がっちり　キャッチ。"
          moon: "はねの　すきまから　ひのこを\nふきだしながら　じそく５００キロで\nえものに　むかって　いっちょくせん。"
        jp_kanji:
          sun: "好物は　キャモメや　ツツケラ。\n強烈な　キックを　お見舞いし\n鋭いツメで　がっちり　キャッチ。"
          moon: "羽の　すき間から　火の粉を\n吹きだしながら　時速５００キロで\n獲物に　向かって　一直線。"
        en:
          sun: "Its favorite foods are Wingull and Pikipek.\nIt attacks with a powerful kick and grasps them\nfirmly in its talons."
          moon: "It zooms directly at its prey at flight speeds of\nclose to 310 mph, while fiery embers scatter\nfrom gaps in its feathers."
        fr:
          sun: "Il raffole des Goélise et des Picassaut.\nIl déstabilise ses proies d’un bon coup de patte\navant de les capturer avec ses serres acérées."
          moon: "Il fond sur ses proies en piqué à 500 km/h,\nsemant derrière lui une pluie d’escarbilles\néchappées de ses ailes."
        it:
          sun: "È ghiotto di Wingull e Pikipek.\nStordisce le prede con potenti zampate e poi\nle afferra saldamente con i suoi artigli aguzzi."
          moon: "Piomba dritto sulle prede a 500 km/h,\nsprizzando scintille dalle fessure che ha\ntra le piume."
        de:
          sun: "Auf seinem Speiseplan stehen bevorzugt Wingull\nund Peppeck. Es schaltet seine Beute mit einem\nkräftigen Tritt aus, um sie sich dann zu krallen."
          moon: "Bei bis zu 500 km/h sprüht es im Flug Funken\naus den Zwischenräumen seines Gefieders und\nstürzt sich schnurstracks auf seine Beute."
        es:
          sun: "Wingull y Pikipek son sus presas favoritas.\nLes asesta un potente golpe y después las\natrapa sin remisión con sus garras afiladas."
          moon: "Se abalanza en línea recta sobre su presa a una\nvelocidad de 500 km/h mientras arroja chispas\ny ascuas de los intersticios entre su plumaje."
        ko:
          sun: "좋아하는 것은 갈모매와 콕코구리다.\n강렬한 킥으로 타격을 가하고\n날카로운 발톱으로 꽉 잡는다."
          moon: "깃털 사이로 불꽃을 뿜어내며\n시속 500km로 먹이를 향해\n똑바로 날아간다."
        zh_simp:
          sun: "喜欢吃的是长翅鸥和小笃儿。\n会施展猛烈的踢腿，\n用锐利的爪子牢牢抓住。"
          moon: "从翅膀的缝隙里喷出火花，\n同时以５００公里的时速\n呈一直线冲向猎物。"
        zh_trad:
          sun: "喜歡吃長翅鷗和小篤兒。\n會對獵物施展猛烈的踢腿，\n再用銳利的爪子牢牢抓住。"
          moon: "從翅膀的縫隙裡噴出火花，\n同時以５００公里的時速\n直線衝向獵物。"
