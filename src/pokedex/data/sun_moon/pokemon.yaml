      types:
        - dragon
      egg_groups:
        - water_1
        - dragon
      abilities:
        - shed_skin
      hidden_ability: marvel_scale
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          sun: "だっぴを　くりかえし　おおきくなる。\nぬけがらを　なめして　つくった\nブーツは　ちょうこうきゅうひん。"
          moon: "とある　つりしが　１０じかんの\nファイトの　すえに　つりあげて\nそんざいが　かくにん　された。"
        jp_kanji:
          sun: "脱皮を　繰り返し　大きくなる。\n抜け殻を　なめして　つくった\nブーツは　超高級品。"
          moon: "とある　釣り師が　１０時間の\nファイトの　末に　釣り上げて\n存在が　確認　された。"
        en:
          sun: "It grows by molting repeatedly. Boots made from\nthe tanned cast-off skin are a super luxury item."
          moon: "After a 10-hour struggle, a fisherman was able\nto pull one up and confirm its existence."
        fr:
          sun: "Il grandit en enchaînant les mues.\nLes bottes faites avec la peau de ces mues\nsont des produits de grand luxe."
          moon: "La première preuve de l’existence de ce\nPokémon est due à un pêcheur ayant bataillé\n10 heures pour le tirer hors de l’eau."
        it:
          sun: "Cresce cambiando continuamente pelle.\nQuella vecchia viene conciata per ricavarne\nstivali di lusso."
          moon: "L’esistenza di questo Pokémon è stata scoperta\nda un pescatore che ha faticato 10 ore prima\ndi riuscire a pescarlo."
        de:
          sun: "Sein Wachstum wird durch wiederholtes Häuten\nunterstützt. Gerbt man seine abgestreifte Haut,\nkann man daraus hochwertige Stiefel schustern."
          moon: "Seine Existenz konnte endlich nachgewiesen\nwerden, nachdem es einem Angler gelang, es\nnach einem zehnstündigen Kampf zu fangen."
        es:
          sun: "Cada vez que muda la piel, se hace más grande.\nLas botas fabricadas con la piel de Dratini son\nun producto de lujo."
          moon: "La existencia de este Pokémon fue confirmada\npor un pescador que batalló durante más de\ndiez horas hasta que consiguió apresar a uno."
        ko:
          sun: "탈피를 반복하며 커진다.\n허물을 다듬어서 만든\n부츠는 최고급품이다."
          moon: "어떤 낚시꾼이 10시간의\n싸움 끝에 낚아 올려\n존재가 확인되었다."
        zh_simp:
          sun: "通过反复蜕皮一点点长大。\n将蜕下的皮鞣制后做成的\n靴子是超高级商品。"
          moon: "某个钓鱼人经过１０个小时的\n奋战才最终将其钓获，\n它的存在也终于被确认。"
        zh_trad:
          sun: "藉由反覆脫皮一點點地長大。\n將脫下的皮加工後制成的\n靴子是超高級商品。"
          moon: "某個釣手經過１０個小時的奮戰，\n最後才成功將牠釣上來，\n而牠的存在也終於被證實。"
