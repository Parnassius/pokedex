        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - ice
      egg_groups:
        - field
      abilities:
        - pressure
      hidden_ability: pickpocket
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          sun: "４～５ひきの　グループで　こうどう。\nいわや　じゅもくに　サインを　のこし\nれんけいプレイで　えものを　しとめる。"
          moon: "さむい　ばしょに　すみ　アローラでは\nロコンや　サンドが　おもな　エサ。\nえものは　なかまで　きちんと　わける。"
        jp_kanji:
          sun: "４～５匹の　グループで　行動。\n岩や　樹木に　サインを　残し\n連係プレイで　獲物を　仕留める。"
          moon: "寒い　場所に　棲み　アローラでは\nロコンや　サンドが　主な　餌。\n獲物は　仲間で　きちんと　分ける。"
        en:
          sun: "They travel in groups of four or five, leaving\nsigns for one another on trees and rocks. They\nbring down their prey with coordinated attacks."
          moon: "They dwell in cold places. This Pokémon’s main\nfood source in Alola is Vulpix and Sandshrew,\nwhich they carefully divide among their group."
        fr:
          sun: "Il se déplace en groupe de quatre ou cinq. Lors\nde la chasse, il laisse des signes sur les arbres\nou les rochers pour communiquer efficacement."
          moon: "Habitant des régions enneigées, il ne se nourrit\nque de Goupix et de Sabelette à Alola. Il partage\ntoujours ses proies avec ses amis."
        it:
          sun: "Si muove in gruppi di quattro o cinque individui.\nDurante la caccia, si coordina con i compagni\nlasciando dei segni sulle rocce e sugli alberi."
          moon: "È un Pokémon che vive nelle zone fredde.\nAd Alola caccia i Vulpix e i Sandshrew,\ndividendo le prede con i suoi compagni."
        de:
          sun: "Sie sind immer zu viert oder fünft unterwegs.\nBei der Jagd arbeiten sie zusammen, indem\nsie Zeichen in Felsen und Bäume ritzen."
          moon: "Sie leben in kalten Gebieten und ernähren sich\nin Alola hauptsächlich von Vulpix und Sandan.\nIhre Beute teilen sie gerecht untereinander auf."
        es:
          sun: "Siempre van en grupos de cuatro o cinco. Dejan\nmarcas en rocas y árboles al cazar para\ncoordinarse con sus compañeros."
          moon: "Habita en lugares fríos. En Alola se alimenta\nprincipalmente de Vulpix y Sandshrew, presas\nque reparte entre sus congéneres."
        ko:
          sun: "4~5마리의 그룹으로 행동한다.\n바위나 나무에 표시를 남겨\n연계 플레이로 먹이를 잡는다."
          moon: "추운 장소에 살며 알로라에서는\n식스테일과 모래두지가 주된 먹이다.\n사냥감은 동료끼리 정확히 나눈다."
        zh_simp:
          sun: "４～５只一组进行行动。\n在岩石和树木上留下记号，\n以团队合作捕杀猎物。"
          moon: "生活在寒冷的地方，\n在阿罗拉以六尾和穿山鼠为主要食物。\n伙伴之间会认真地分配猎物。"
        zh_trad:
          sun: "４～５隻一組行動。\n在岩石和樹木上留下記號，\n以團隊合作捕殺獵物。"
          moon: "生活在寒冷的地方，\n在阿羅拉以六尾和穿山鼠為主食。\n捕獲的獵物會和同伴們公平地分享。"
