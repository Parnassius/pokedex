        rare: hard_stone
      descriptions:
        jp_kana:
          sun: "オレンジの　けっしょうは　エネルギーの\nかたまり。　ひとかけらで　ダンプカー\n１００だいぶんの　ねんりょうになる。"
          moon: "どうくつで　ちかすいを　さがす。\nみずじたいは　とくいでは　ないので\nちびりちびりと　ゆっくり　なめる。"
        jp_kanji:
          sun: "オレンジの　結晶は　エネルギーの\n塊。　ひとかけらで　ダンプカー\n１００台分の　燃料になる。"
          moon: "洞窟で　地下水を　探す。\n水自体は　得意では　ないので\nちびりちびりと　ゆっくり　舐める。"
        en:
          sun: "Its orange crystal is a mass of energy.\nJust one crystal fragment would provide\nenough fuel for a hundred dump trucks."
          moon: "It explores caves in search of underground\nwater. It’s not comfortable around water, so\nthis Pokémon takes great care in lapping it up."
        fr:
          sun: "Chaque cristal orangé sur son corps est\nun condensé d’énergie pouvant fournir\ndu carburant à une centaine de poids lourds."
          moon: "Il explore les grottes à la recherche de nappes\nphréatiques. L’eau étant l’une de ses faiblesses,\nil ne peut la boire que par petites lapées."
        it:
          sun: "I cristalli arancioni sul suo corpo sono fatti\ndi energia condensata. Un unico frammento\npotrebbe fornire carburante a 100 camion."
          moon: "Perlustra le grotte alla ricerca di falde\nsotterranee. Quando trova l’acqua, la lecca\npiano piano per poterla assorbire."
        de:
          sun: "Bei seinen orangefarbenen Kristallen handelt es\nsich um verfestigte Energie. Bereits ein Splitter\nkönnte 100 Kipplastern als Treibstoff reichen."
          moon: "Es sucht in Höhlen nach Grundwasser. Da es\nWasser nicht gut verträgt, leckt es dieses ganz\nbehutsam auf."
        es:
          sun: "Los cristales naranjas de su cuerpo son energía\ncondensada. Uno solo puede suministrar\ncombustible para 100 camiones."
          moon: "Busca lagos subterráneos en las cuevas. Como\nle cuesta asimilar el agua, tiene que beber\nlentamente a base de lametones."
        ko:
          sun: "오렌지 결정은 에너지의\n덩어리다. 한 조각으로 덤프트럭\n100대분의 연료가 된다."
          moon: "동굴에서 지하수를 찾는다.\n물 자체는 잘 마시지 못해서\n홀짝홀짝 천천히 핥는다."
        zh_simp:
          sun: "橙色的结晶是能量块。\n一块结晶可提供１００辆\n翻斗车所需的燃料。"
          moon: "在洞窟里寻找地下水。\n对水本身不是很适应，\n所以都是一点点慢慢舔。"
        zh_trad:
          sun: "橙色的結晶是能量塊。\n一塊結晶可提供１００輛\n大卡車所需的燃料。"
          moon: "在洞窟裡尋找地下水。\n對水的抵抗力並不好，\n所以都是一點一點慢慢舔。"
