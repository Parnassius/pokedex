        jp_kana:
          sun: "ちのうしすうは　およそ　５０００。\nつよい　ねんりきが　あふれだしており\nそばに　いるだけで　ずつうが　する。"
          moon: "その　のうさいぼうは　しぬまで\nふえつづける。　おいた　フーディンほど\nおおきな　あたまを　しているのだ。"
        jp_kanji:
          sun: "知能指数は　およそ　５０００。\n強い　念力が　あふれだしており\nそばに　いるだけで　頭痛が　する。"
          moon: "その　脳細胞は　死ぬまで\n増え続ける。　老いた　フーディンほど\n大きな　頭を　しているのだ。"
        en:
          sun: "It is said to have an IQ of approximately 5,000.\nIts overflowing psychokinetic powers\ncause headaches to anyone nearby."
          moon: "Its brain cells continue to increase in number\nuntil its death. The older the Alakazam, the\nlarger its head."
        fr:
          sun: "Son Q.I. atteindrait les 5 000. Il émet des ondes\npsychiques si fortes qu’il suffit de se tenir\nprès de lui pour avoir mal à la tête."
          moon: "Ses neurones se développent jusqu’à sa mort.\nPlus un Alakazam est vieux, plus sa tête\nest grosse."
        it:
          sun: "Ha un quoziente intellettivo di circa 5.000. I suoi\npoteri psicocinetici sono talmente intensi da\nfar venire mal di testa a chi gli sta vicino."
          moon: "Le sue cellule cerebrali continuano a\nmoltiplicarsi per tutta la vita e man mano che\ncresce la sua testa diventa sempre più grossa."
        de:
          sun: "Es hat einen IQ von 5 000. Seine Psycho-Kräfte\nsind so stark ausgeprägt, dass man Kopfweh\nbekommt, wenn man nur neben ihm steht."
          moon: "Seine Gehirnzellen vervielfachen sich sein\nganzes Leben lang. Je älter ein Simsala ist,\ndesto größer ist demzufolge auch sein Kopf."
        es:
          sun: "Su coeficiente intelectual ronda los 5000. Los\npoderes telequinéticos que rezuma causan\njaquecas a cualquiera que se acerque."
          moon: "Las neuronas de su cerebro se multiplican sin\ndescanso hasta el día de su muerte. Cuanto más\nviejo es Alakazam, más grande es su cabeza."
        ko:
          sun: "지능지수는 약 5000.\n강한 염동력이 넘쳐흘러서\n곁에 있는 것만으로 두통이 생긴다."
          moon: "그 뇌세포는 죽을 때까지\n계속 늘어난다.\n늙은 후딘일수록 머리가 크다."
        zh_simp:
          sun: "智商大约有５０００。\n强大的念力满溢出来，\n光是呆在旁边就会头痛不已。"
          moon: "脑细胞会终生不断增长。\n越是年老的胡地\n越是会有巨大的脑袋。"
        zh_trad:
          sun: "智商大約有５０００。\n滿溢著強大的念力，\n光是在牠身旁就會頭痛不已。"
          moon: "腦細胞到死前都會不斷地增加。\n越年老的胡地頭部就越巨大。"
    alakazam_mega:
      form_id: 1
      names:
        jp_kana: メガフーディン
        jp_kanji: メガフーディン
        en: Mega Alakazam
        fr: Méga-Alakazam
        it: MegaAlakazam
        de: Mega-Simsala
        es: Mega-Alakazam
        ko: 메가후딘
        zh_simp: 超级胡地
        zh_trad: 超級胡地
      base_stats:
        hp: 55
        attack: 50
        defense: 65
        special_attack: 175
        special_defense: 105
        speed: 150
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - trace
      held_items:
        rare: twisted_spoon
      descriptions:
        jp_kana:
          sun: "メガシンカに　よって　そのちからの\nすべてが　サイコパワーに　へんかん。\nきんりょく　さえも　うしなった。"
          moon: "ひめられた　サイコパワーを　かいほう。\nみるだけで　あいての　うまれてから\nしぬまでを　しることが　できる。"
        jp_kanji:
          sun: "メガシンカに　よって　その力の\nすべてが　サイコパワーに　変換。\n筋力　さえも　失った。"
          moon: "秘められた　サイコパワーを　解放。\n見るだけで　相手の　生まれてから\n死ぬまでを　知ることが　できる。"
        en:
          sun: "As a result of Mega Evolution, its power has\nbeen entirely converted into psychic energy,\nand it has lost all strength in its muscles."
          moon: "Its hidden psychic power has been unleashed.\nA glance at someone gives it knowledge of the\ncourse of that person’s life, from birth to death."
        fr:
          sun: "La Méga-Évolution a utilisé tout ce qui lui\nrestait de force pour accentuer ses pouvoirs\npsychiques. Il a même perdu du muscle."
          moon: "Ses pouvoirs psychiques sont enfin libérés.\nIl n’a qu’à jeter un coup d’œil sur quelqu’un pour\ntout savoir de lui, de sa naissance à sa mort."
        it:
          sun: "La megaevoluzione ha trasformato ogni sua\nforza, compresa quella muscolare, in puro\npotere psichico."
          moon: "Ha scatenato i suoi poteri psichici latenti e ora\nne ha il pieno controllo. Gli basta un’occhiata per\nsapere tutto del nemico, dalla nascita alla morte."
        de:
          sun: "Durch die Mega-Entwicklung wurde seine\ngesamte Energie in Psycho-Kraft umgewandelt.\nSelbst seine Muskeln hat es dabei verloren."
          moon: "Es hat die in ihm schlummernden Psycho-Kräfte\ngeweckt. Ein Blick genügt, um das Leben des\nGegners zu sehen, von der Geburt bis zum Tod."
        es:
          sun: "La megaevolución ha transformado toda su\nfuerza, incluida la muscular, en poderes\npsíquicos."
          moon: "Todo su poder psíquico se ha liberado por fin.\nCon solo ver a su oponente, puede saberlo todo\nacerca de su pasado, presente y futuro."
        ko:
          sun: "메가진화에 의해 모든 힘이\n사이코 파워로 변환되었다.\n근력조차 잃어버렸다."
          moon: "숨겨진 사이코 파워를 해방시켰다.\n보는 것만으로도 상대가 태어나서\n죽을 때까지의 일을 알 수 있다."
        zh_simp:
          sun: "通过超级进化，它的力量\n会全部变换为精神力量。\n甚至连肌肉力量也失去了。"
          moon: "释放被蕴藏的精神力量。\n只要看一眼就能知道对手\n由生到死的全部事情。"
        zh_trad:
          sun: "透過超級進化，牠的力量\n全部變換為精神力量。\n甚至連肌肉力量也失去了。"
          moon: "釋放蘊藏著的精神力量。\n只要看一眼就能知道對手\n由生到死的全部事情。"
machop:
  species_id: 66
  names:
    jp_kana: ワンリキー
    jp_kanji: ワンリキー
    en: Machop
    fr: Machoc
    it: Machop
    de: Machollo
    es: Machop
    ko: 알통몬
    zh_simp: 腕力
    zh_trad: 腕力
  forms:
    machop:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
