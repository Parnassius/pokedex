          moon: "ツルに　ついた　はなを　うかべた\nおふろは　リラックスこうかが　あり\nおおくの　じょせいに　だいにんき。"
        jp_kanji:
          sun: "栄養満点の　ツルに　花を\nくっつける。　花は　活性化し\n香しい　アロマが　漂いだす。"
          moon: "ツルに　ついた　花を　浮かべた\nお風呂は　リラックス効果が　あり\n多くの　女性に　大人気。"
        en:
          sun: "It attaches flowers to its highly nutritious vine.\nThis revitalizes the flowers, and they give off\nan aromatic scent."
          moon: "Baths prepared with the flowers from its vine\nhave a relaxing effect, so this Pokémon\nis a hit with many people."
        fr:
          sun: "Sa liane gluante diffuse des nutriments dans les\nfleurs qu’elle happe. Ces dernières dégagent\nalors un léger parfum."
          moon: "Utilisées en bain, les fleurs qui se collent sur sa\nliane possèdent des vertus relaxantes. Elles\nont déjà séduit les gens du monde entier."
        it:
          sun: "Alla sua liana ricca di nutrienti attacca dei fiori\nche così riprendono vigore, emanando piacevoli\nfragranze."
          moon: "Se si immergono i suoi fiori in un bagno caldo\nsi produce un effetto rilassante. Ciò lo ha reso\nmolto popolare nei centri termali."
        de:
          sun: "Dieses Pokémon sieht aus, als hätte man Blüten\nan einer nahrhaften Ranke angebracht. Diese\nblühen auf und sind äußerst wohlriechend."
          moon: "Ein Wellness-Bad mit seinen Blüten hilft, dem\nAlltag zu entfliehen und gut zu entspannen.\nBei vielen Menschen daher äußerst beliebt."
        es:
          sun: "Prende flores en su tallo, que es muy rico en\nnutrientes. Las flores se revitalizan y\ndesprenden una agradable fragancia."
          moon: "Un baño aderezado con las flores ensartadas en\nsu sarmiento tiene un efecto muy relajante, por\nlo que este Pokémon se ha vuelto muy popular."
        ko:
          sun: "영양 만점의 줄기에 꽃을\n붙인다. 꽃이 활성화해서\n향기로운 아로마가 풍긴다."
          moon: "덩굴에 붙어 있는 꽃을 띄운 목욕은\n긴장을 풀어주는 효과가 있어\n많은 여성들에게 인기가 높다."
        zh_simp:
          sun: "将花粘在充满营养的藤蔓上。\n花会活化，芳香也会飘散出来。"
          moon: "把藤蔓上附着的花漂浮在浴盆里，\n泡澡时会有舒缓的效果，\n在广大女性中极具人气。"
        zh_trad:
          sun: "將花黏在充滿營養的藤蔓上。\n花會活化，飄散出迷人的芳香。"
          moon: "把藤蔓上附著的花放進浴盆裡飄浮，\n泡澡時就會有舒緩的效果，\n在廣大女性中極具人氣。"
oranguru:
  species_id: 765
  names:
    jp_kana: ヤレユータン
    jp_kanji: ヤレユータン
    en: Oranguru
    fr: Gouroutan
    it: Oranguru
    de: Kommandutan
    es: Oranguru
    ko: 하랑우탄
    zh_simp: 智挥猩
    zh_trad: 智揮猩
  forms:
    oranguru:
      form_id: 0
      base_stats:
        hp: 90
        attack: 60
        defense: 80
        special_attack: 90
        special_defense: 110
        speed: 60
      evs_yield:
        hp: 0
