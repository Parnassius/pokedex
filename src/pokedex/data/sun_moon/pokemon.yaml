      descriptions:
        jp_kana:
          sun: "たかい　ちのうを　もち　にんげんの\nことばを　りかいする。　ごきげんに\nなると　うつくしい　こえで　うたう。"
          moon: "みつりょうで　ぜつめつすんぜんに。\nたいせつに　ほご　された　けっか\nぎゃくに　ふえすぎてきたという。"
        jp_kanji:
          sun: "高い　知能を　持ち　人間の\n言葉を　理解する。　ご機嫌に\nなると　美しい　声で　歌う。"
          moon: "密漁で　絶滅寸前に。\n大切に　保護　された　結果\n逆に　増え過ぎてきたという。"
        en:
          sun: "Its high intelligence enables it to comprehend\nhuman speech. When it’s in a good mood,\nit sings in its beautiful voice."
          moon: "These Pokémon were once near extinction due\nto poaching. Following protective regulations,\nthere is now an overabundance of them."
        fr:
          sun: "Ce Pokémon est très intelligent et comprend\nle langage humain. Quand il est de bonne\nhumeur, il chante avec une voix magnifique."
          moon: "Il était en voie d’extinction à cause de la pêche\nillégale, mais après de stricts programmes de\nprotection, il y en a maintenant trop."
        it:
          sun: "È talmente intelligente da comprendere\nil linguaggio degli esseri umani. Quando è di\nbuon umore, canta con la sua bellissima voce."
          moon: "Le misure adottate per proteggerlo ne hanno\nscongiurato il pericolo di estinzione, ma ha finito\nper moltiplicarsi in modo eccessivo."
        de:
          sun: "Aufgrund seiner hohen Intelligenz kann es die\nmenschliche Sprache verstehen. Ist es gut\ngelaunt, singt es mit wunderschöner Stimme."
          moon: "Es wäre einst durch übermäßiges Fischen fast\nausgestorben. Durch ein strenges Abkommen\nzum Artenschutz gibt es nun fast zu viele."
        es:
          sun: "Es un Pokémon muy inteligente y comprende el\nlenguaje humano. Cuando está de buen humor,\ncanta con su bella voz."
          moon: "Estuvo en peligro de extinción debido a la caza\nilegal. Sin embargo, desde que está protegido, la\npoblación de Lapras ha crecido sin mesura."
        ko:
          sun: "높은 지능을 가졌으며 인간의\n말을 이해한다. 기분이 좋아지면\n아름다운 목소리로 노래한다."
          moon: "밀렵으로 멸종 위기에 처했다가\n소중히 보호한 결과\n오히려 수가 너무 늘었다고 한다."
        zh_simp:
          sun: "拥有很高的智商，理解人类的语言。\n心情好的时候会用美妙的声音唱歌。"
          moon: "曾因非法捕捞濒临灭绝。\n但听说重点保护却反而\n导致它有点泛滥成灾。"
        zh_trad:
          sun: "擁有很高的智商，理解人類的語言。\n心情好的時候會用美妙的聲音唱歌。"
          moon: "因違法捕撈而導致瀕臨絕種。\n但據說在受到重點保護之後，\n數量反而開始過度增加了。"
