    fr: Sovkipou
    it: Wimpod
    de: Reißlaus
    es: Wimpod
    ko: 꼬시레
    zh_simp: 胆小虫
    zh_trad: 膽小蟲
  forms:
    wimpod:
      form_id: 0
      base_stats:
        hp: 25
        attack: 35
        defense: 40
        special_attack: 20
        special_defense: 30
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - bug
        - water
      egg_groups:
        - bug
        - water_3
      abilities:
        - wimp_out
      descriptions:
        jp_kana:
          sun: "おくびょうで　たくさんの　あしを\nばたつかせ　ひっしに　にげまわる。\nにげたあとは　ピカピカ　きれい。"
          moon: "ビーチから　かいていまで　いろんな\nばしょに　すむ。　くさったエサ　でも\nよろこんで　たべる　しぜんのそうじや。"
        jp_kanji:
          sun: "臆病で　たくさんの　足を\nばたつかせ　必死に　逃げまわる。\n逃げたあとは　ピカピカ　綺麗。"
          moon: "ビーチから　海底まで　色んな\n場所に　棲む。　腐った餌　でも\n喜んで　食べる　自然の掃除屋。"
        en:
          sun: "This Pokémon is a coward. As it desperately\ndashes off, the flailing of its many legs leaves a\nsparkling clean path in its wake."
          moon: "Its habitat varies from beaches to seabeds.\nA natural scavenger, it will gleefully chow down\non anything edible, no matter how rotten."
        fr:
          sun: "De nature poltronne, il prend ses nombreuses\npattes à son cou au moindre danger et balaie\nle sol sur son passage."
          moon: "Il vit aussi bien en bord de mer que dans les\nfonds marins. Véritable aspirateur sur pattes, il\navale n’importe quelle nourriture, même pourrie."
        it:
          sun: "È un gran fifone e fugge agitando rapidamente\nle sue numerose zampette. Dopo il suo\npassaggio, tutto è lindo e pulito."
          moon: "Vive dappertutto, dalle spiagge ai fondali marini.\nMangia volentieri anche sostanze putrescenti,\nperciò viene chiamato lo spazzino della natura."
        de:
          sun: "Es ist so feige, dass es wild mit seinen vielen\nFüßen herumschlägt und verzweifelt davonläuft.\nNach seiner Flucht glänzt der Boden herrlich."
          moon: "Es mag verschiedene Habitate, vom Strand bis\nhin zum Meeresgrund. Unterwegs frisst es gern\nFaules und ist eine natürliche Reinigungskraft."
        es:
          sun: "Cuando se asusta, huye despavorido moviendo\nrápidamente sus múltiples patas. Deja el suelo\nlimpio y pulido allí por donde pasa."
          moon: "Su hábitat es muy variado, desde playas hasta\nel fondo del mar. Hace de barrendero natural al\nir engullendo presas podridas por el camino."
        ko:
          sun: "겁이 많아서 많은 다리를\n버둥거리며 필사적으로 도망친다.\n도망간 자리는 반짝반짝 깨끗하다."
          moon: "해변부터 해저까지 다양한\n장소에 산다. 썩은 먹이라도\n기꺼이 먹는 자연의 청소부."
        zh_simp:
          sun: "因为胆小，慌慌张张地\n挥动着许多脚，拼命逃跑。\n逃跑的痕迹会闪闪发光很漂亮。"
          moon: "从沙滩到海底，栖息在各式各样的地方。\n即使是腐烂的食物也能吃得很开心，\n是大自然的清洁员。"
        zh_trad:
          sun: "性格膽小，會慌慌張張地\n揮動著許多腳拼命逃跑。\n逃跑後會留下閃閃發亮的美麗痕跡。"
          moon: "從沙灘到海底，會棲息在各式各樣的地方。\n即使是腐爛的食物也能吃得很開心，\n是大自然的清潔員。"
