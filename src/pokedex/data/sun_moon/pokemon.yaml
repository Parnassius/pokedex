      descriptions:
        jp_kana:
          sun: "ひとを　あやつり　すなのやまを\nすなのしろまで　しんか　させた。\nのろいの　ちからも　あがっている。"
          moon: "しろの　したには　せいきを　すわれ\nひからびた　ものたちの　ホネが\nたいりょうに　うまっている。"
        jp_kanji:
          sun: "人を　操り　砂の山を\n砂の城まで　進化　させた。\n呪いの　力も　あがっている。"
          moon: "城の　下には　精気を　吸われ\n干からびた　者たちの　骨が\n大量に　埋まっている。"
        en:
          sun: "Possessed people controlled by this Pokémon\ntransformed its sand mound into a castle. As it\nevolved, its power to curse grew ever stronger."
          moon: "Buried beneath the castle are masses of\ndried-up bones from those whose vitality\nit has drained."
        fr:
          sun: "Il a possédé un humain pour que ce dernier\nle remodèle en château de sable, décuplant\nau passage ses pouvoirs de malédiction."
          moon: "On trouve de nombreux ossements sous\nses tours, restes de pauvres hères capturés.\nLeur énergie a servi à nourrir ce Pokémon."
        it:
          sun: "Si è evoluto servendosi degli esseri umani per\ndiventare un castello di sabbia, aumentando\ncosì la propria forza malefica."
          moon: "Succhia energia vitale dalle vittime e ne\nseppellisce le ossa rinsecchite sotto il castello."
        de:
          sun: "Brachte Menschen dazu, den Sandhügel zu einer\nstattlichen Sandburg auszubauen. Auch seine\nFlüche haben an Stärke gewonnen."
          moon: "Unter seiner Sandburg liegen zahlreiche\nKnochen qualvoll Verstorbener, denen\ndie Lebenskraft ausgesaugt wurde."
        es:
          sun: "Manipulando a la gente ha conseguido\ntransformarse en todo un castillo de arena,\nlo que ha aumentado su poder maligno."
          moon: "Su castillo alberga abundantes huesos de todos\naquellos incautos a los que absorbió su vitalidad\npor completo antes de quedar sepultados."
        ko:
          sun: "사람을 조종하여 모래언덕을\n모래성으로까지 진화시켰다.\n저주의 힘도 깊어졌다."
          moon: "성 아래에는 정기를 빨려\n바싹 말라버린 자들의 뼈가\n대량으로 묻혀있다."
        zh_simp:
          sun: "操纵人们，\n让沙丘进化为沙堡。\n诅咒的力量也得到了提升。"
          moon: "在城堡的下面埋藏着大量\n被吸干了精气者的骸骨。"
        zh_trad:
          sun: "操縱人們，\n讓沙山進化為沙堡。\n詛咒的力量也得到了提升。"
          moon: "在城堡的下面埋藏著大量\n被吸乾了精氣者的骸骨。"
