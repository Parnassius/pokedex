      descriptions:
        jp_kana:
          sun: "ながい　ツノで　あいてを　はさみこみ\nそのまま　まっぷたつに　してしまう。\nパワフルだが　さむいのは　にがて。"
          moon: "ツノの　いちげきは　たいぼく　さえ\nへしおるほど。　アローラでは\nクワガノンが　さいだいの　ライバル。"
        jp_kanji:
          sun: "長い　角で　相手を　挟み込み\nそのまま　真っ二つに　してしまう。\nパワフルだが　寒いのは　苦手。"
          moon: "角の　一撃は　大木　さえ\nへし折るほど。　アローラでは\nクワガノンが　最大の　ライバル。"
        en:
          sun: "It grips its prey in its pincers and splits them\napart. Although it is a powerful Pokémon, it\ncan’t deal with the cold."
          moon: "One solid blow from its horns is enough to split\napart a large tree. Its greatest rival in Alola\nis Vikavolt."
        fr:
          sun: "Il attrape ses adversaires entre ses cornes et\nles tranche en deux d’un seul coup. Malgré sa\nforce, il a une faiblesse : le froid."
          moon: "Il peut abattre un grand arbre d’un coup de\ncorne. À Alola, son plus grand rival est Lucanon."
        it:
          sun: "Afferra il nemico con le lunghe corna e lo trancia\nin due. È estremamente forte, ma non sopporta\nil freddo."
          moon: "Con le sue corna può abbattere un grande\nalbero in un colpo solo. Nella regione di Alola,\nVikavolt è il suo più acerrimo nemico."
        de:
          sun: "Es nimmt Gegner mit seinen langen Hörnern in\ndie Zange und reißt sie damit entzwei. Es ist\nsehr stark, aber es verabscheut Kälte."
          moon: "Ein Stoß mit seinen Hörnern reicht, um große\nBäume zu zersplittern. In Alola ist Donarion\nsein größter Rivale."
        es:
          sun: "Atrapa a sus rivales con las pinzas y los parte\nen dos con su enorme fuerza. A pesar de ser\nmuy fuerte, no soporta el frío."
          moon: "Es capaz de derribar un árbol de una sola\narremetida. En Alola, su mayor rival es Vikavolt."
        ko:
          sun: "긴 뿔로 상대를 끼워 넣어\n그대로 두 동강을 내 버린다.\n파워풀하지만 추운 것을 싫어한다."
          moon: "뿔의 일격은 큰 나무조차도\n부러뜨릴 정도다. 알로라에서는\n투구뿌논이 최대의 라이벌이다."
        zh_simp:
          sun: "用长长的角把对手夹住，\n就这么把对方夹成两半。\n非常强大，但很害怕寒冷。"
          moon: "用角一击连大树都能折断。\n在阿罗拉，锹农炮虫是它最大的竞争者。"
        zh_trad:
          sun: "會用長長的角把對手夾住，\n就這樣把對方夾成兩半。\n力量非常強大，但很害怕寒冷。"
          moon: "角的一擊連大樹都能折斷。\n在阿羅拉，鍬農炮蟲是牠最大的競爭者。"
    pinsir_mega:
