      types:
        - rock
        - flying
      egg_groups:
        - mineral
      abilities:
        - shields_down
      held_items:
        rare: star_piece
      descriptions:
        jp_kana:
          sun: "もともと　オゾンそうに　すんでおり\nからだの　カラが　おもくなると\nちじょうに　むかって　おちてくる。"
          moon: "つよい　しょうげきを　うけると　カラは\nはがれ　おちる。　ナノりゅうしが\nとつぜんへんいし　うまれたポケモン。"
        jp_kanji:
          sun: "もともと　オゾン層に　棲んでおり\n身体の　殻が　重くなると\n地上に　向かって　落ちてくる。"
          moon: "強い　衝撃を　うけると　殻は\nはがれ　落ちる。　ナノ粒子が\n突然変異し　生まれたポケモン。"
        en:
          sun: "Originally making its home in the ozone layer,\nit hurtles to the ground when the shell enclosing\nits body grows too heavy."
          moon: "Strong impacts can knock it out of its shell. This\nPokémon was born from mutated nanoparticles."
        fr:
          sun: "Il vivait dans la couche d’ozone, avant que\nsa carapace, devenue trop lourde, ne finisse\npar le faire chuter sur la terre ferme."
          moon: "La carapace qui le recouvre peut être arrachée\npar une violente attaque. Il est le fruit d’une\nmutation de nanoparticules."
        it:
          sun: "Vive normalmente nello strato d’ozono, ma\nquando il guscio esterno si indurisce precipita\na terra."
          moon: "Ha avuto origine da una mutazione improvvisa\ndi nanoparticelle. Un attacco violento può fargli\nperdere il guscio esterno."
        de:
          sun: "Eigentlich lebt es in der Ozonschicht, doch\nwenn seine Schale zu schwer wird, stürzt es\nauf die Erde."
          moon: "Heftige Stöße lassen seine Schale abblättern.\nEine Mutation von Nanopartikeln brachte\ndieses Pokémon hervor."
        es:
          sun: "Vive en la capa de ozono hasta que su\ncaparazón se hace demasiado pesado y cae\nsin remisión a tierra firme."
          moon: "Este Pokémon nació fruto de la mutación de\nnanopartículas. El caparazón que lo recubre\nse desprende al recibir un fuerte impacto."
        ko:
          sun: "원래 오존층에 살고 있으며\n몸의 껍질이 무거워지면\n지상을 향해 떨어진다."
          moon: "강한 충격을 받으면 껍데기는\n떨어져 나간다. 나노입자가\n돌연변이하여 태어난 포켓몬이다."
        zh_simp:
          sun: "原本栖息在臭氧层，\n身体的外壳变重后，\n就会向着地面落下。"
          moon: "如果受到强烈的冲击，外壳就会剥落。\n纳米粒子突变诞生而成的宝可梦。"
        zh_trad:
          sun: "原本棲息在臭氧層，\n身體的外殼變重後，\n就會向著地面落下。"
          moon: "若受到強烈的衝擊，外殼就會剝落。\n是奈米粒子突變而誕生的寶可夢。"
