      descriptions:
        jp_kana:
          sun: "とうぶの　すいほうで　ヘッドバット。\nちいさなポケモンで　あれば　そのまま\nすいほうに　とりこまれ　おぼれしぬ。"
          moon: "みかけに　よらず　めんどうみが　いい。\nよわく　ちいさな　なかまを　みつけると\nすいほうの　なかに　いれて　まもる。"
        jp_kanji:
          sun: "頭部の　水泡で　ヘッドバット。\n小さなポケモンで　あれば　そのまま\n水泡に　取り込まれ　溺れ死ぬ。"
          moon: "見かけに　よらず　面倒見が　いい。\n弱く　小さな　仲間を　見つけると\n水泡の　中に　入れて　守る。"
        en:
          sun: "It delivers headbutts with the water bubble\non its head. Small Pokémon get sucked into\nthe bubble, where they drown."
          moon: "Despite what its appearance suggests, it cares\nfor others. If it finds vulnerable, weak Pokémon,\nit protectively brings them into its water bubble."
        fr:
          sun: "Il se bat en donnant des « coups de bulle ».\nLes plus petits Pokémon peuvent se retrouver\npiégés à l’intérieur de sa bulle et mourir noyés."
          moon: "Bien plus attentionné qu’il n’y paraît, il n’hésite\npas à recueillir dans sa bulle ses camarades\nplus petits et fragiles."
        it:
          sun: "Usa la bolla d’acqua sulla testa per dare delle\ntestate. I Pokémon di piccola taglia vengono\ndirettamente intrappolati nella bolla e affogano."
          moon: "Nonostante l’apparenza, è molto protettivo.\nQuando trova dei suoi simili più piccoli e deboli,\nli accoglie nella sua bolla d’acqua."
        de:
          sun: "Es verteilt mit seiner Wasserblase Kopfstöße.\nKleine Pokémon werden dabei hineingezogen\nund ertrinken."
          moon: "Es ist fürsorglicher, als es aussieht. Findet es\neinen kleinen, schwachen Artgenossen, gewährt\nes ihm Einlass in seine Wasserblase."
        es:
          sun: "Propina cabezazos con su burbuja. Los\nPokémon de menor tamaño quedan atrapados\nen su interior y perecen ahogados."
          moon: "Es más atento de lo que parece. Si encuentra\na uno de los suyos débil o vulnerable, lo protege\nenvolviéndolo con su burbuja."
        ko:
          sun: "두부의 수포로 박치기한다.\n작은 포켓몬이라면 그대로\n수포에 싸여 익사한다."
          moon: "겉보기와 다르게 주위를 잘 챙긴다.\n작고 약한 동료를 발견하면\n수포 안에 넣어서 지킨다."
        zh_simp:
          sun: "用头部的水泡来进行撞头攻击。\n如果是弱小的宝可梦，\n就会被吸进水泡溺死。"
          moon: "与外表不同，非常体贴。\n发现弱小的伙伴后，\n会让对方进入水泡，保护它。"
        zh_trad:
          sun: "用頭部的水泡來進行頭錘攻擊。\n如果是弱小的寶可夢，\n會被裹進水泡溺死。"
          moon: "與外表不同，性格非常體貼。\n當發現弱小的夥伴時，\n會讓對方進入水泡來保護牠。"
fomantis:
