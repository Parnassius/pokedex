        fr:
          sun: "Né dans une colonne de glace, ce Pokémon\npeut créer des flocons de neige de son souffle\nglacé, voire même faire tomber la neige en été."
          moon: "Serrer Sorbébé contre soi procure une délicieuse\nsensation de fraîcheur. Dans les régions\nchaudes, c’est le Pokémon à avoir à la maison."
        it:
          sun: "Pokémon nato da una stalattite di ghiaccio.\nCon il suo fiato gelido forma dei cristalli\ndi neve e fa nevicare."
          moon: "Abbracciarlo dà una piacevole sensazione\ndi freschezza. Per chi vive in regioni calde, è\ndecisamente un Pokémon da tenere in casa."
        de:
          sun: "Dieses Pokémon ist aus einem Eiszapfen\nentstanden. Mit seinem kalten Odem erzeugt\nes Eiskristalle und lässt es schneien."
          moon: "Wenn man es umarmt, fühlt es sich angenehm\nund kühl an. In heißen Regionen hat man daher\ngern ein Exemplar im Haus."
        es:
          sun: "Pokémon nacido de un carámbano. Con su\naliento gélido es capaz de crear cristales de\nnieve y provocar una nevasca."
          moon: "Al abrazarlo transmite una sensación agradable\ny refrescante. La gente que vive en las regiones\ncálidas aprecia mucho su presencia en casa."
        ko:
          sun: "고드름에서 태어난 포켓몬이다.\n차가운 숨으로 눈 결정을\n만들어 눈을 뿌린다."
          moon: "껴안으면 차가워서 기분이 좋다.\n더운 지방에서는 한 집에 1마리씩 두고\n소중하게 여기는 포켓몬이다."
        zh_simp:
          sun: "从冰柱中诞生的宝可梦。\n用冰冷的气息制造雪的结晶，\n让天上下雪。"
          moon: "抱紧的话，就会感觉凉凉的\n非常舒服。在炎热地区，\n是每家必备１只的便利宝可梦。"
        zh_trad:
          sun: "從冰柱中誕生的寶可夢。\n用冰冷的氣息製造雪的結晶，\n讓周圍降雪。"
          moon: "抱緊牠就會感覺涼涼的\n非常舒服。在炎熱的地區，\n是每家必備１隻的便利寶可夢。"
vanillish:
  species_id: 583
  names:
    jp_kana: バニリッチ
    jp_kanji: バニリッチ
    en: Vanillish
    fr: Sorboul
    it: Vanillish
    de: Gelatroppo
    es: Vanillish
    ko: 바닐리치
    zh_simp: 多多冰
    zh_trad: 多多冰
  forms:
    vanillish:
      form_id: 0
      base_stats:
        hp: 51
        attack: 65
        defense: 65
        special_attack: 80
        special_defense: 75
        speed: 59
      evs_yield:
        hp: 0
