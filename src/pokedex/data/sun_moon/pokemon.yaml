      descriptions:
        jp_kana:
          sun: "せいちょうのたび　ぬけおちる　ハネは\nうすく　するどい。　むかしの　せんしは\nかたな　として　りようした。"
          moon: "てつの　からだは　がんじょうだが\nさびやすいので　あめの　ひは\nすあなで　じっと　しているよ。"
        jp_kanji:
          sun: "成長の度　抜け落ちる　羽は\n薄く　鋭い。　昔の　戦士は\n刀　として　利用した。"
          moon: "鉄の　身体は　頑丈だが\nさびやすいので　雨の　日は\n巣穴で　じっと　しているよ。"
        en:
          sun: "Its feathers, which fall off as it grows, are thin\nand sharp. In times long past, warriors used\nthem as swords."
          moon: "Its metal body is sturdy, but it does rust rather\neasily. So on rainy days, this Pokémon prefers\nto stay put in its nest."
        fr:
          sun: "Ce Pokémon perd ses plumes fines et acérées\ndurant sa croissance. Jadis, les guerriers s’en\nservaient pour fabriquer des lames."
          moon: "Son plumage d’acier, bien que très résistant,\nest sujet à la rouille. C’est pourquoi ce Pokémon\npréférera rester au nid les jours de pluie."
        it:
          sun: "Le piume che perde nella crescita sono sottili\ne taglienti. In passato, i guerrieri le usavano\nper fabbricare le spade."
          moon: "Il suo corpo d’acciaio è molto robusto, ma si\narrugginisce facilmente, quindi quando piove\ndeve starsene rintanato."
        de:
          sun: "Die im Zuge seines Wachstums abgefallenen\nFedern sind sehr scharf. Krieger verwendeten\nsie früher als Schwerter."
          moon: "Sein stählerner Körper ist robust, aber anfällig\nfür Rost. Regnerische Tage verbringt es daher\ngeduldig in seinem Nest."
        es:
          sun: "Las plumas que se le caen cuando lucha son\ndelgadas y afiladas. Guerreros de antaño las\nusaban a modo de espada."
          moon: "Su cuerpo metálico es muy robusto, pero se\noxida con facilidad, por lo que suele quedarse\ndescansando en su nido cuando llueve."
        ko:
          sun: "성장할 때마다 빠지는 날개는\n얇고 날카롭다. 옛 전사들은\n칼로 이용했다."
          moon: "철로 된 몸은 튼튼하지만\n녹슬기 쉬워서 비가 내리는 날엔\n둥지에서 가만히 있다."
        zh_simp:
          sun: "每次成长都会脱落的羽毛\n又薄又锐利。过去的战士\n将之当做刀来使用。"
          moon: "铁的身体十分结实，\n但很容易生锈，\n所以下雨天会一直呆在巢穴哦。"
        zh_trad:
          sun: "每次成長都會脫落的羽毛\n又薄又銳利。古時的戰士\n將之當作刀來使用。"
          moon: "鐵的身體十分結實，\n但很容易生銹，\n所以下雨天會一直留在巢穴哦。"
