          moon: "はつめいされた　とうじの　マギアナ。\nごうかけんらんな　そうしょくで\nおうさまの　むすめを　よろこばせた。"
        jp_kanji:
          sun: "５００年前　国王の　娘に\n献上された　当時の\n美しい　マギアナの　姿。"
          moon: "発明された　当時の　マギアナ。\n豪華けんらんな　装飾で\n王様の　娘を　喜ばせた。"
        en:
          sun: "This beautiful form reflects Magearna’s\nappearance when first presented to a\nking’s daughter 500 years ago."
          moon: "This gorgeous Magearna looks as it did at the\ntime of its invention. Its luxurious decoration\npleased the king’s daughter."
        fr:
          sun: "Il s’agit de Magearna tel qu’il était il y a\n500 ans, lorsqu’il fut offert à la fille du roi."
          moon: "Il s’agit de Magearna tel qu’il était quand il a\nété créé. Ses luxueux ornements ont ravi la fille\ndu roi."
        it:
          sun: "Questa è la forma dell’affascinante Pokémon\nMagearna quando venne offerto in regalo\nalla figlia di un re circa 500 anni fa."
          moon: "La forma originale di Magearna.\nSi racconta che i suoi sontuosi ornamenti\nfurono molto apprezzati dalla figlia di un re."
        de:
          sun: "So schön sah Magearna aus, als es\nvor 500 Jahren als Geschenk an eine\nKönigstochter überreicht wurde."
          moon: "So sah Magearna ursprünglich aus. Damals\nbereitete sein prächtiger Schmuck einer\nKönigstochter viel Freude."
        es:
          sun: "Este es el hermoso aspecto que presentaba\nMagearna cuando fue ofrecido como presente a\nla hija de un rey hace 500 años."
          moon: "Forma que tenía Magearna en el momento de su\nconcepción. Sus magníficos ornamentos hicieron\nmuy feliz a la hija de un rey."
        ko:
          sun: "500년 전 국왕의 딸에게\n진상된 당시의\n아름다운 마기아나의 모습이다."
          moon: "발명된 당시의 마기아나.\n호화찬란한 장식으로\n국왕의 딸을 기쁘게 해주었다."
        zh_simp:
          sun: "５００年前被献给国王的女儿的，\n当时美丽的玛机雅娜的样子。"
          moon: "刚被发明出来时的玛机雅娜。\n因为奢华绚烂的装饰\n而受到国王女儿的喜爱。"
        zh_trad:
          sun: "５００年前被獻給國王的女兒當時，\n瑪機雅娜的美麗模樣。"
          moon: "剛被發明出來時的瑪機雅娜。\n因為奢華絢爛的裝飾\n而受到國王女兒的喜愛。"
