      hidden_ability: long_reach
      descriptions:
        jp_kana:
          sun: "きどりやで　ひまが　あれば　つばさの\nていれ。　うもうの　よごれが　きに\nなりすぎて　たたかえないことも。"
          moon: "はばねと　よばれる　するどい　はねを\nてきや　えものに　なげつける。\nほぼ　ひゃっぱつひゃくちゅう　だ。"
        jp_kanji:
          sun: "気取り屋で　暇が　あれば　翼の\n手入れ。　羽毛の　汚れが　気に\nなりすぎて　戦えないことも。"
          moon: "刃羽根と　呼ばれる　鋭い　羽根を\n敵や　獲物に　投げつける。\nほぼ　百発百中　だ。"
        en:
          sun: "A bit of a dandy, it spends its free time\npreening its wings. Its preoccupation with any\ndirt on its plumage can leave it unable to battle."
          moon: "It throws sharp feathers called blade quills\nat enemies or prey. It seldom misses."
        fr:
          sun: "Légèrement vaniteux, il aime prendre soin de\nses ailes quand il en a le temps. Il refuse parfois\nde se battre si ses plumes sont trop sales."
          moon: "Il lance des plumes aussi effilées que des lames\nde rasoir pour abattre ennemis et proies.\nIl touche dans le mille presque à chaque fois."
        it:
          sun: "È un po’ vanitoso e non perde mai l’occasione\ndi dedicarsi alla cura delle proprie ali. A volte\nrinuncia a lottare per non sporcarsi le piume."
          moon: "Bersaglia nemici e prede con le sue piume\naffilate. Non manca quasi mai il bersaglio."
        de:
          sun: "Dieses affektierte Pokémon pflegt sein Gefieder,\nwann immer es kann. Mit verschmutzten Federn\nhat es nämlich oft keine Lust zu kämpfen."
          moon: "Es wirft „Flügelklingen“ genannte messerscharfe\nFedern nach Feind und Beute. Dabei erreicht es\neine nahezu hundertprozentige Trefferquote."
        es:
          sun: "Es un poco coqueto, por lo que, cuando puede,\nse acicala las alas. En ocasiones se niega a\ncombatir por temor a mancharse las plumas."
          moon: "Ataca a sus presas y enemigos lanzándoles\nplumas sorprendentemente afiladas. Acierta\nprácticamente siempre."
        ko:
          sun: "젠체하고 틈만 나면 날개의\n손질을 한다. 깃털의 얼룩이\n신경 쓰여 싸우지 못할 때도 있다."
          moon: "칼날깃이라고 불리는 날카로운\n날개를 적이나 먹잇감에 날린다.\n거의 백발백중이다."
        zh_simp:
          sun: "很注重外表，只要有空就会整理翅膀。\n有时候也会因为过于在意羽毛的\n整洁而无法战斗。"
          moon: "将被称为刃羽的锐利羽毛\n投向敌人和猎物。\n基本上百发百中。"
        zh_trad:
          sun: "很注重外表，只要有空就會整理翅膀。\n有時候也會因為過於在意羽毛的\n整潔而無法戰鬥。"
          moon: "將被稱為刃羽的銳利羽毛\n射向敵人或獵物。\n基本上百發百中。"
