    jp_kanji: カプ・コケコ
    en: Tapu Koko
    fr: Tokorico
    it: Tapu Koko
    de: Kapu-Riki
    es: Tapu Koko
    ko: 카푸꼬꼬꼭
    zh_simp: 卡璞・鸣鸣
    zh_trad: 卡璞・鳴鳴
  forms:
    tapu_koko:
      form_id: 0
      base_stats:
        hp: 70
        attack: 115
        defense: 85
        special_attack: 95
        special_defense: 75
        speed: 130
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - electric_surge
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          sun: "こうきしんおうせいな　メレメレの\nまもりがみ。　かみなりぐもを　よび\nいかずちを　からだに　ためこむ。"
          moon: "めにも　とまらぬ　スピードで　てきを\nかくらんする。　ひどく　おこりっぽいが\nなんで　おこったかは　すぐ　わすれる。"
        jp_kanji:
          sun: "好奇心旺盛な　メレメレの\n守り神。　雷雲を　呼び\n雷を　身体に　溜め込む。"
          moon: "目にも　止まらぬ　スピードで　敵を\nかく乱する。　ひどく　怒りっぽいが\nなんで　怒ったかは　すぐ　忘れる。"
        en:
          sun: "This guardian deity of Melemele is brimming with\ncuriosity. It summons thunderclouds and stores\ntheir lightning inside its body."
          moon: "It confuses its enemies by flying too quickly for\nthe eye to follow. It has a hair-trigger temper\nbut forgets what made it angry an instant later."
        fr:
          sun: "Gardien de Mele-Mele, il est curieux de tout.\nIl a le pouvoir d’appeler les nuages orageux\npour stocker la foudre dans son corps."
          moon: "Il déstabilise ses ennemis avec sa vitesse\nébouriffante. Il pique souvent des colères noires,\nmais il en oublie aussitôt la raison."
        it:
          sun: "Protettore di Mele Mele, è un Pokémon dalla\nvivace curiosità. Attira a sé le nuvole\ntemporalesche per assorbirne la carica elettrica."
          moon: "Confonde i nemici con i suoi spostamenti\nimprovvisi. È tremendamente irascibile, ma\nquando si arrabbia si scorda subito il perché."
        de:
          sun: "Der neugierige und lebhafte Schutzpatron von\nMele-Mele. Es kann Gewitterwolken rufen und\nBlitze in seinem Körper speichern."
          moon: "Mit atemberaubendem Tempo bringt es Gegner\naus dem Konzept. Es ist aufbrausend, vergisst\naber sofort, warum es so wütend geworden ist."
        es:
          sun: "El espíritu guardián de Melemele, curioso e\ninquisitivo. Invoca nubes de tormenta y acumula\nel poder de los rayos en su cuerpo."
          moon: "Su endiablada velocidad aturde por completo al\nenemigo. Pese a su extrema irascibilidad, olvida\nrápidamente el motivo de su enfado."
        ko:
          sun: "호기심 왕성한 멜레멜레의\n수호신이다. 번개 구름을 불러\n우레를 몸에 비축한다."
          moon: "눈에 보이지 않는 스피드로 적을\n교란한다. 심하게 화를 잘 내지만\n왜 화가 났는지는 금방 잊어버린다."
        zh_simp:
          sun: "好奇心旺盛的，\n美乐美乐的守护神。\n会呼唤雷雨云在体内储存雷。"
          moon: "以迅雷不及掩耳的速度扰乱敌人。\n看起来极度易怒，\n但却很快就会忘记为何生气。"
        zh_trad:
          sun: "擁有旺盛的好奇心，\n是美樂美樂的守護神。\n會呼喚雷雨雲，把雷儲存在體內。"
          moon: "以迅雷不及掩耳的速度擾亂敵人。\n雖然極度易怒，但卻很快就會\n忘記為何生氣。"
