        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - human_like
      abilities:
        - static
      hidden_ability: vital_spirit
      held_items:
        rare: electirizer
      descriptions:
        jp_kana:
          sun: "とつぜんおこる　ていでんの　はんぶんは\nエレブーが　はつでんしょに　あつまり\nでんきを　くいちらかした　からだ。"
          moon: "エサで　くう　でんきりょう　よりも\nからだから　もれる　でんきりょうの\nほうが　あっとうてきに　おおい。"
        jp_kanji:
          sun: "突然起こる　停電の　半分は\nエレブーが　発電所に　集まり\n電気を　喰い散らかした　からだ。"
          moon: "餌で　喰う　電気量　よりも\n身体から　漏れる　電気量の\nほうが　圧倒的に　多い。"
        en:
          sun: "Half of all sudden blackouts are caused\nby Electabuzz gathering at electric power\nplants and gobbling up electricity."
          moon: "Electricity leaks from it in amounts far greater\nthan the amount of electricity it eats."
        fr:
          sun: "La moitié des coupures de courant soudaines\nest due à des groupes d’Élektek rassemblés\ndans une centrale électrique pour se nourrir."
          moon: "L’électricité qui se dégage de son corps est\nlargement supérieure à celle qu’il ingère pour\nse nourrir."
        it:
          sun: "Una buona metà dei blackout improvvisi sono\ncausati da Electabuzz che si riversano nelle\ncentrali per nutrirsi di elettricità."
          moon: "La quantità di elettricità che libera dal suo\ncorpo è nettamente superiore a quella che\nassorbe come nutrimento."
        de:
          sun: "Für die Hälfte aller plötzlichen Stromausfälle\nsind Elektek verantwortlich. Sie belagern gerne\nKraftwerke und zapfen ihnen Strom ab."
          moon: "Die Menge an Elektrizität, die aus seinem Körper\naustritt, ist sehr viel größer als jene, die es über\nseine Nahrung zu sich nimmt."
        es:
          sun: "La mitad de los apagones los provoca este\nPokémon, pues suele merodear por las centrales\neléctricas para alimentarse de electricidad."
          moon: "La cantidad de electricidad que descarga su\ncuerpo supera con creces la cantidad que\nconsume para alimentarse."
        ko:
          sun: "갑자기 일어나는 정전의 반은\n에레브가 발전소에 모여\n전기를 마구 먹어대기 때문이다."
          moon: "먹이로 먹는 전기량보다\n몸에서 새는 전기량이\n압도적으로 많다."
        zh_simp:
          sun: "突发的停电，有一半\n是因为电击兽聚集在发电厂\n胡乱吞食电力造成的。"
          moon: "比起吃食物获得的电量，\n从身体泄露的电量要多得多。"
        zh_trad:
          sun: "突發的停電，有一半\n是因為電擊獸聚集在發電廠\n胡亂吞食電力造成的。"
          moon: "比起透過進食獲得的電量，\n從身體洩露的電量壓倒性地多。"
magmar:
  species_id: 126
  names:
    jp_kana: ブーバー
    jp_kanji: ブーバー
    en: Magmar
    fr: Magmar
    it: Magmar
    de: Magmar
    es: Magmar
    ko: 마그마
    zh_simp: 鸭嘴火兽
    zh_trad: 鴨嘴火獸
  forms:
    magmar:
      form_id: 0
      base_stats:
        hp: 65
        attack: 95
        defense: 57
        special_attack: 100
        special_defense: 85
        speed: 93
      evs_yield:
        hp: 0
