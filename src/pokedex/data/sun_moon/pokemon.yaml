lillipup:
  species_id: 506
  names:
    jp_kana: ヨーテリー
    jp_kanji: ヨーテリー
    en: Lillipup
    fr: Ponchiot
    it: Lillipup
    de: Yorkleff
    es: Lillipup
    ko: 요테리
    zh_simp: 小约克
    zh_trad: 小約克
  forms:
    lillipup:
      form_id: 0
      base_stats:
        hp: 45
