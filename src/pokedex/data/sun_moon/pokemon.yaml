alomomola:
  species_id: 594
  names:
    jp_kana: ママンボウ
    jp_kanji: ママンボウ
    en: Alomomola
    fr: Mamanbo
    it: Alomomola
    de: Mamolida
    es: Alomomola
    ko: 맘복치
    zh_simp: 保姆曼波
    zh_trad: 保母曼波
  forms:
    alomomola:
      form_id: 0
      base_stats:
        hp: 165
        attack: 75
        defense: 80
        special_attack: 40
        special_defense: 45
        speed: 65
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - water_2
      abilities:
        - healer
        - hydration
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          sun: "きずついた　ポケモンを　だきしめ\nとくしゅな　ねんえきで　きずを\nふさぐ。　そのりゆうは　ふめい。"
          moon: "おおうなばらを　ただよって　くらす。\nママンボウの　まわりには　おおくの\nみずポケモンが　あつまってくる。"
        jp_kanji:
          sun: "傷ついた　ポケモンを　抱きしめ\n特殊な　粘液で　傷を\nふさぐ。　その理由は　不明。"
          moon: "大海原を　漂って　暮らす。\nママンボウの　周りには　多くの\nみずポケモンが　集まってくる。"
        en:
          sun: "It uses its special mucus to close the wounds of\ninjured Pokémon. The reason for this behavior\nremains unknown."
          moon: "They float upon the open sea. Many water\nPokémon gather in the area around Alomomola."
        fr:
          sun: "Il recueille les Pokémon blessés et referme\nleurs plaies grâce à son mucus spécial.\nPar pur altruisme ? Nul ne le sait."
          moon: "Il se laisse dériver au gré des courants\nocéaniques profonds. De nombreux Pokémon\nEau se rassemblent toujours autour de lui."
        it:
          sun: "Abbraccia i Pokémon feriti e li guarisce grazie a\nuno speciale liquido viscoso.\nNon si sa perché lo faccia."
          moon: "Vive in mare aperto, lasciandosi trasportare\ndalle onde. Attorno gli si radunano molti\nPokémon di tipo Acqua."
        de:
          sun: "Es umarmt verletzte Pokémon und bedeckt ihre\nWunden mit einem speziellen Schleim. Niemand\nweiß, warum es das tut."
          moon: "Es treibt durch den Ozean. Um Mamolida\nversammeln sich stets viele Wasser-Pokémon."
        es:
          sun: "Se acerca a los Pokémon heridos y cura sus\nheridas con la mucosidad especial que segrega.\nSe desconoce el motivo de este comportamiento."
          moon: "Vive flotando a la deriva en mar abierto. Muchos\nPokémon de tipo Agua se arremolinan a su\nalrededor."
        ko:
          sun: "다친 포켓몬을 끌어안아\n특수한 점액으로 상처를\n덮는다. 그 이유는 불명이다."
          moon: "넓은 바다를 떠돌아다니며 산다.\n맘복치 주변에는 많은\n물포켓몬들이 모여든다."
        zh_simp:
          sun: "抱着受伤的宝可梦，\n用特殊的粘液敷伤口。\n但其中的理由不太清楚。"
          moon: "漂浮在汪洋大海上生活。\n保姆曼波的周围\n会聚集起许多水属性宝可梦。"
        zh_trad:
          sun: "抱著受傷的寶可夢，\n用特殊的黏液敷傷口。\n但理由不明。"
          moon: "漂浮在汪洋大海上生活。\n保母曼波的周圍\n會聚集起許多水屬性寶可夢。"
