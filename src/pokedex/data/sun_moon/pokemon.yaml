        jp_kana:
          sun: "びょうかん１６れんだ　で　きを　つつき\nあなを　ほる。　あけた　あなは　エサを\nしまう　ちょぞうこや　すに　つかう。"
          moon: "きのみが　エサ。　くらったあとの\nタネは　たまとして　くちから\nはっしゃし　こうげきに　りようする。"
        jp_kanji:
          sun: "秒間１６連打　で　木を　突き\n穴を　ほる。　開けた　穴は　餌を\n仕舞う　貯蔵庫や　巣に　使う。"
          moon: "きのみが　餌。　喰らった後の\nタネを　弾として　口から\n発射し　攻撃に　利用。"
        en:
          sun: "It can peck at a rate of 16 times a second to\ndrill holes in trees. It uses the holes for food\nstorage and for nesting."
          moon: "This Pokémon feeds on berries, whose leftover\nseeds become the ammunition for the attacks it\nfires off from its mouth."
        fr:
          sun: "Il creuse les arbres à raison de seize coups de\nbec par seconde. Le trou creusé lui sert ensuite\nà stocker des provisions ou à faire son nid."
          moon: "Il se nourrit essentiellement de fruits, dont il\nconserve les pépins dans son bec pour en\ncanarder ses ennemis, telle une mitraillette."
        it:
          sun: "Riesce a beccare i tronchi degli alberi al ritmo di\n16 colpi al secondo. Usa i buchi così scavati\ncome nido o per immagazzinare cibo."
          moon: "Si nutre di bacche. Usa come proiettili i semi\ndelle bacche mangiate, sputandoli dal becco\nper attaccare."
        de:
          sun: "Pickt 16-mal pro Sekunde auf Bäume ein,\num Löcher ins Holz zu schlagen. Diese nutzt\nes dann als Futterspeicher oder Nest."
          moon: "Dieses Pokémon ernährt sich von Beeren.\nDie Samen verschießt es später als Munition\naus seinem Schnabel."
        es:
          sun: "Hace agujeros en los árboles a una velocidad\nde 16 picotazos por segundo y los utiliza como\ndespensa o como su nido."
          moon: "Las bayas constituyen su principal alimento. Usa\nlas pepitas de las mismas a modo de proyectiles\npara atacar expulsándolas por su pico."
        ko:
          sun: "1초당 16번 나무를 쪼아서\n구멍을 낸다. 낸 구멍은 먹이를\n넣어두는 저장고나 둥지로 쓴다."
          moon: "나무열매가 먹이다. 먹고 남은\n씨앗은 총알처럼 입에서\n발사하여 공격에 사용한다."
        zh_simp:
          sun: "以每秒１６连击在树干上\n啄出洞来。啄开的洞穴\n用作收藏食物的仓库和巢穴。"
          moon: "树果是它的食物。\n将吃剩下的种子作为子弹\n从嘴里发射出，用来攻击。"
        zh_trad:
          sun: "以每秒１６下連擊在樹幹上\n啄出洞來。啄開的洞穴\n用作收藏食物的倉庫和巢穴。"
          moon: "主要的食物是樹果。\n會把吃完後剩下的種子當成子彈，\n從嘴裡發射用來攻擊。"
