      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sun: "りょうあしも　はねになった　けっか\nちじょうでの　うごきは　にがて。\nはいずりまわることしか　できない。"
          moon: "４まいのハネで　はやくしずかに　とぶ。\nきづかれるまえに　えものを　ガブリ。\nあっというまに　ちを　ぬきさるぞ。"
        jp_kanji:
          sun: "両足も　羽になった　結果\n地上での　動きは　苦手。\nはいずりまわることしか　できない。"
          moon: "４枚の羽で　速く静かに　飛ぶ。\n気づかれる前に　獲物を　ガブリ。\nあっというまに　血を　抜き去るぞ。"
        en:
          sun: "Both its legs became wings, and as a result,\nit can’t move well on the ground. All it can do\nis crawl around."
          moon: "Silent and swift in its four-winged flight, it bites\ndown on its prey before they realize what’s\nhappening. In a heartbeat, it drains their blood."
        fr:
          sun: "Comme ses pattes sont devenues des ailes,\nil a du mal à se mouvoir sur terre. Il ne peut\nque se traîner péniblement au sol."
          moon: "Il vole vite et sans bruit grâce à ses quatre\nailes, mord sa proie sans se faire remarquer,\net disparaît aussi vite, la laissant exsangue."
        it:
          sun: "Le sue zampe si sono trasformate in ali,\nrendendolo molto goffo negli spostamenti a\nterra, dove ormai può avanzare solo strisciando."
          moon: "Vola rapido e silenzioso grazie alle sue quattro\nali. Azzanna l’ignara preda e fugge via in un\nbaleno lasciandola esangue."
        de:
          sun: "Es kann sich nur schwer am Boden fortbewegen,\nda aus seinen zwei Beinen Flügel geworden sind.\nDaher ist es nur zu Kriechbewegungen fähig."
          moon: "Mit seinen vier Flügeln kann es schnell und leise\nfliegen. Ehe seine Beute sich versieht, hat es sie\nschon gebissen und ihr alles Blut ausgesaugt."
        es:
          sun: "Tiene una movilidad muy reducida en el suelo, ya\nque sus patas se transformaron en alas. La\núnica opción que le queda es arrastrarse."
          moon: "Puede volar rápida y sigilosamente gracias a sus\ncuatro alas. Se abalanza sobre sus presas y les\nchupa toda la sangre antes de que se percaten."
        ko:
          sun: "양발이 날개가 된 결과\n지상에서 움직이는 것이 서툴다.\n기어 돌아다니는 것밖에 못 한다."
          moon: "4장의 날개로 빠르고 조용하게 난다.\n눈치채기 전에 먹이를 덥석 문다.\n순식간에 피를 뽑아낸다."
        zh_simp:
          sun: "连双脚也变成翅膀的结果\n就是不擅长在地上行动。\n只能爬着到处活动。"
          moon: "用４根翅膀又快又静地飞行。\n在被发现之前一口咬住猎物。\n一瞬间就把血都吸掉。"
        zh_trad:
          sun: "因為連雙腳也變成翅膀，\n所以不擅長在地上行動，\n只能到處爬行。"
          moon: "用４隻翅膀快速而安靜地飛行。\n在被發現之前一口咬住獵物，\n一瞬間把血吸得乾乾淨淨。"
