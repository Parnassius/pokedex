        jp_kana:
          sun: "うごくものなら　なんでも　くいつく\nおおぐらい。　ふだんは　ぬまぞこで\nじっと　えものを　まちかまえている。"
          moon: "ナマズンの　むれが　すいめんを\nはねる　こうけいは　じしんの\nまえぶれと　しんじられている。"
        jp_kanji:
          sun: "動くものなら　なんでも　喰いつく\n大食らい。　普段は　沼底で\nじっと　獲物を　待ち構えている。"
          moon: "ナマズンの　群れが　水面を\n跳ねる　光景は　地震の\n前触れと　信じられている。"
        en:
          sun: "A glutton that devours anything that moves,\nit quietly lurks at the bottom of swamps,\nlying in wait for prey."
          moon: "Sighting Whiscash leaping from the water\nis believed to herald an earthquake."
        fr:
          sun: "Ce glouton dévore tout ce qui bouge.\nLa plupart du temps, il reste tapi au fond de\nson marais, en guettant sa proie."
          moon: "On dit que lorsqu’un banc de Barbicha jaillit\nhors de l’eau, un tremblement de terre est\nsur le point de se produire."
        it:
          sun: "Incredibilmente vorace, mangia qualunque\nessere vivente. Attende immobile le prede\nsul fondo delle paludi."
          moon: "Si dice che se si vedono gruppi di Whiscash\nsaltare fuori dall’acqua sia segno di un\nterremoto imminente."
        de:
          sun: "Es frisst einfach alles, was ihm vor die Kiemen\nkommt. Normalerweise verharrt es im Schlamm\nund wartet auf Beute."
          moon: "Man glaubt, der Anblick eines über die\nWasseroberfläche springenden Welsar-\nSchwarms sei ein Vorbote für ein Erdbeben."
        es:
          sun: "Es un Pokémon muy voraz que se come todo lo\nque se mueve. Suele quedarse quieto en el\nlecho del río esperando a sus presas."
          moon: "Se cree que cuando los bancos de Whiscash\nsaltan sobre la superficie del agua, es señal\npremonitoria de un terremoto."
        ko:
          sun: "움직이는 것이라면 뭐든지 먹으려는\n대식가다. 평소에는 늪 바닥에서\n가만히 먹이를 기다리고 있다."
          moon: "메깅 무리가 수면을\n튀어 오르는 광경은 지진의\n전조로 여기고 있다."
        zh_simp:
          sun: "只要是动的东西，无论什么都会\n咬住不放大吃特吃。平常就一直埋伏\n在沼泽底部一动不动地等待着猎物。"
          moon: "成群的鲶鱼王在水面上跳跃的景象\n被认为是地震的前兆。"
        zh_trad:
          sun: "只要是會動的東西，無論什麼都會\n咬住不放大吃特吃。平常會靜靜埋伏\n在沼澤底部動也不動地等待著獵物。"
          moon: "成群的鯰魚王在水面上跳躍的景象\n被認為是地震的先兆。"
