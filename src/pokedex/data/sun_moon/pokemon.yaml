snubbull:
  species_id: 209
  names:
    jp_kana: ブルー
    jp_kanji: ブルー
    en: Snubbull
    fr: Snubbull
    it: Snubbull
    de: Snubbull
    es: Snubbull
    ko: 블루
    zh_simp: 布鲁
    zh_trad: 布魯
  forms:
    snubbull:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 40
        speed: 30
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - field
        - fairy
      abilities:
        - intimidate
        - run_away
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sun: "かおは　いかついが　じつは　けっこう\nおくびょう。　ひっしに　いかくする\nひょうじょうが　じょせいに　にんき。"
          moon: "うなりごえは　あいてを　ふあんに\nさせる。　ふだんは　のんびりやで\n１にちの　はんぶんは　ねているよ。"
        jp_kanji:
          sun: "顔は　厳ついが　実は　結構\n臆病。　必死に　いかくする\n表情が　女性に　人気。"
          moon: "唸り声は　相手を　不安に\nさせる。　普段は　のんびり屋で\n１日の　半分は　寝ているよ。"
        en:
          sun: "Despite its intimidating face, it’s quite cowardly.\nIts desperate attempts to appear threatening\nmake it popular with people."
          moon: "Its growls make its opponents uneasy. This\nlaid-back Pokémon tends to sleep half the day."
        fr:
          sun: "Malgré sa mine renfrognée, il est en réalité plutôt\ncraintif. Son visage faussement intimidant\nfait craquer les gens."
          moon: "Lorsqu’il n’aboie pas pour effrayer ses\nadversaires, ce Pokémon aime se la couler\ndouce et dort 12 h par jour."
        it:
          sun: "Nonostante la faccia torva, è molto timido.\nSi sforza di apparire minaccioso, ma proprio per\nquesto molti lo trovano carino."
          moon: "Emette versi inquietanti, ma di solito è tranquillo\ne passa metà della giornata a dormire."
        de:
          sun: "Es macht ein furchterregendes Gesicht, ist aber\nan sich recht feige. Sein Bemühen, bedrohlich\nzu wirken, macht es bei vielen beliebt."
          moon: "Es brüllt, um seine Feinde zu verunsichern.\nNormalerweise geht es die Dinge gemütlich\nan und schläft den halben Tag."
        es:
          sun: "Su rostro da un poco de miedo, pero en realidad\nes bastante cobardica. A la gente suele hacerle\ngracia su cara de malas pulgas."
          moon: "Sus ladridos inquietan a sus adversarios.\nNormalmente tiene una personalidad afable y se\npasa la mitad del día durmiendo."
        ko:
          sun: "얼굴은 우락부락하지만 사실은 꽤\n겁쟁이다. 필사적으로 위협하는\n표정이 여성들에게 인기 있다."
          moon: "으르렁거리는 소리는 상대를 불안하게\n만든다. 평소에는 느긋한 성격으로\n하루의 절반은 자고 있다."
        zh_simp:
          sun: "脸很严厉，但其实相当胆小。\n拼命威吓的表情在女性中很有人气。"
          moon: "呜呜声让对手不安。\n平时是很悠闲的家伙，\n１天中有一半时间都在睡觉哦。"
        zh_trad:
          sun: "臉看起來很嚴厲，但其實相當膽小。\n那拼命作出威嚇的表情很受女性歡迎。"
          moon: "發出的嗚咽聲讓對手不安。\n平時是很悠閒的傢伙，\n１天中有一半時間都在睡覺哦。"
granbull:
  species_id: 210
  names:
    jp_kana: グランブル
    jp_kanji: グランブル
    en: Granbull
    fr: Granbull
    it: Granbull
    de: Granbull
    es: Granbull
    ko: 그랑블루
    zh_simp: 布鲁皇
    zh_trad: 布魯皇
  forms:
    granbull:
      form_id: 0
      base_stats:
        hp: 90
        attack: 120
        defense: 75
        special_attack: 60
        special_defense: 60
        speed: 45
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - field
        - fairy
      abilities:
        - intimidate
        - quick_feet
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sun: "はったつした　したアゴと　おもたい\nキバが　ぶき。　おこらせないかぎり\nめったに　かみついたり　しないよ。"
          moon: "ブルー　いじょうに　おくびょう。\nみためとの　ギャップが　うけて\nわかい　じょせいに　だいにんき。"
        jp_kanji:
          sun: "発達した　下アゴと　重たい\nキバが　武器。　怒らせない限り\n滅多に　噛みついたり　しないよ。"
          moon: "ブルー　以上に　臆病。\n見た目との　ギャップが　うけて\n若い　女性に　大人気。"
        en:
          sun: "Its well-developed lower jaw and heavy fangs\nare its weapons. As long as it’s not provoked,\nit rarely bites."
          moon: "More timid than Snubbull, this Pokémon is doted\non by young people amused at the contrast\nbetween its looks and its attitude."
        fr:
          sun: "Sa mâchoire inférieure et ses crocs\nsurdimensionnés sont ses armes de prédilection.\nIl ne mord pas tant qu’on ne l’énerve pas."
          moon: "Encore plus peureux que Snubbull, son\napparence ô combien trompeuse lui vaut\nun succès fou."
        it:
          sun: "Attacca i nemici con la grossa mascella\ninferiore, dotata di zanne massicce.\nMorde solo quando è arrabbiato."
          moon: "È persino più timido di Snubbull. I giovani lo\ntrovano irresistibile proprio per lo scarto tra\nil suo aspetto minaccioso e il suo carattere."
        de:
          sun: "Ein ausgeprägter Unterkiefer und schwere\nZähne sind seine Waffen. Es beißt nur zu,\nwenn es verärgert wird."
          moon: "Es ist noch schüchterner als Snubbull. Der\nKontrast zwischen seinem Äußeren und seinem\nWesen macht es bei jungen Leuten so beliebt."
        es:
          sun: "Ataca con su desarrollada mandíbula y sus\nenormes colmillos. Rara es la vez que muerde a\nalguien, a menos que le haya hecho enfadar."
          moon: "Es más miedica que Snubbull. Resulta muy\npopular entre la gente joven debido a su\naspecto de duro y a su afable personalidad."
        ko:
          sun: "발달한 아래턱과 묵직한 이빨이\n무기다. 화나게 하지 않는 한\n웬만해서는 물거나 하지 않는다."
          moon: "블루 이상으로 겁쟁이다.\n겉모습과의 차이가 인기를 얻어\n젊은 여성에게 인기가 높다."
        zh_simp:
          sun: "发达的下颚和沉重的牙齿\n是它的武器。只要不惹怒它，\n很少会被咬到哦。"
          moon: "比布鲁更加胆小。\n与外表之间的反差萌很受欢迎，\n在年轻女性中人气很高。"
        zh_trad:
          sun: "發達的下顎和沉重的牙齒\n是牠的武器。只要不惹牠生氣，\n就不太會咬人哦。"
          moon: "比布魯更加膽小。\n與外表之間的反差萌很受歡迎，\n在年輕女性中人氣很高。"
