          sun: "アンバランス　かつ　ふあんていな\nいでんしを　もっており　さまざまな\nしんかの　かのうせいを　ひめている。"
          moon: "いま　げんざいの　ちょうさでは\nなんと　８しゅるいもの　ポケモンへ\nしんかする　かのうせいを　もつ。"
        jp_kanji:
          sun: "アンバランス　かつ　不安定な\n遺伝子を　持っており　様々な\n進化の　可能性を　秘めている。"
          moon: "今　現在の　調査では\nなんと　８種類もの　ポケモンへ\n進化する　可能性を　持つ。"
        en:
          sun: "Possessing an unbalanced and unstable genetic\nmakeup, it conceals many possible evolutions."
          moon: "Current studies show it can evolve into an\nincredible eight different species of Pokémon."
        fr:
          sun: "Son ADN est instable et possède de\nnombreuses possibilités d’évolution."
          moon: "D’après les dernières recherches, il semble que\nce Pokémon soit capable d’évoluer en huit\nespèces différentes."
        it:
          sun: "Dotato di un corredo genetico instabile,\nserba in sé varie possibilità evolutive."
          moon: "Secondo le ultime ricerche, può evolversi in ben\notto specie diverse."
        de:
          sun: "Sein instabiles Erbmaterial ermöglicht es ihm,\nsich zu verschiedenen Pokémon zu entwickeln."
          moon: "Nach derzeitigem Forschungsstand kann es sich\nzu acht verschiedenen Pokémon entwickeln."
        es:
          sun: "Su irregular estructura genética encierra el\nsecreto de su capacidad para adoptar\nevoluciones de lo más diversas."
          moon: "Según las últimas investigaciones, Eevee es\ncapaz de evolucionar a ocho especies de\nPokémon distintas."
        ko:
          sun: "언밸런스하고도 불안정한\n유전자를 가지고 있어 다양한\n진화의 가능성을 품고 있다."
          moon: "지금까지 조사에 의하면\n무려 8종류의 포켓몬으로\n진화할 가능성을 갖고 있다."
        zh_simp:
          sun: "拥有不平衡性外加不稳定的\n遗传基因，因而蕴含着各种\n各样的进化可能性。"
          moon: "根据目前的调查，\n拥有进化为多达８种\n宝可梦的可能性。"
        zh_trad:
          sun: "擁有不平衡且不穩定的基因，\n因而蘊含著十分各種各樣的\n進化可能性。"
          moon: "根據目前的調查，\n擁有進化為多達８種\n寶可夢的可能性。"
