      descriptions:
        jp_kana:
          sun: "すいめんを　すべるように　いどう。\nエサを　もとめて　シズクモと\nケンカすることも　しばしば。"
          moon: "きけんが　およぶと　あたまの　さきから\nあまいあじの　えきたいが　にじみだす。\nとりポケモンが　きらいな　あじだ。"
        jp_kanji:
          sun: "水面を　滑るように　移動。\n餌を　求めて　シズクモと\nケンカすることも　しばしば。"
          moon: "危険が　及ぶと　頭の　先から\n甘い味の　液体が　にじみだす。\nとりポケモンが　嫌いな味だ。"
        en:
          sun: "It moves as if skating on the surface of the\nwater. It often fights with Dewpider over food."
          moon: "When this Pokémon senses danger, a sweet\nfluid oozes from the tip of its head. The taste\nof it disgusts bird Pokémon."
        fr:
          sun: "Ce Pokémon se déplace en glissant à la surface\nde l’eau. Les Arakdo se chamaillent souvent\navec les Araqua pour de la nourriture."
          moon: "Dès qu’il se sent en danger, le sommet de sa\ntête sécrète un liquide sucré, qui a le don de\nprovoquer le dégoût chez les Pokémon oiseaux."
        it:
          sun: "Si muove scivolando sul pelo dell’acqua come\nse stesse pattinando. Spesso si scontra con\ni Dewpider per il cibo."
          moon: "Quando si sente minacciato, secerne dalla punta\ndella testa un liquido dal sapore dolciastro che\ni Pokémon alati detestano."
        de:
          sun: "Es scheint, als würde es übers Wasser gleiten.\nAuf der Suche nach Futter gerät es immer\nwieder mit Araqua aneinander."
          moon: "Wittert es Gefahr, scheidet es eine süßliche\nFlüssigkeit aus seinem Kopf aus. Vogel-Pokémon\nbehagt dieser Geschmack überhaupt nicht."
        es:
          sun: "Se mueve como si patinara sobre el agua.\nSuele pelearse con Dewpider por la comida."
          moon: "Si se encuentra en peligro, segrega un líquido\ndulce que los Pokémon pájaro encuentran\ndesagradable."
        ko:
          sun: "수면을 미끄러지듯 이동한다.\n먹이를 구하고자 물거미와\n싸우는 일도 가끔씩 있다."
          moon: "위험에 처하면 머리끝에서\n달콤한 액체가 배어 나온다.\n새포켓몬이 싫어하는 맛이다."
        zh_simp:
          sun: "在水面像滑行一样移动。\n为了寻找食物，\n几次三番和滴蛛打架。"
          moon: "危险来临时，会从头的顶端\n渗出有甜味的液体。\n鸟宝可梦讨厌它的味道。"
        zh_trad:
          sun: "在水面像滑行一樣移動。\n偶爾會為了爭奪食物\n而和滴蛛打架。"
          moon: "危險來臨時，會從頭的頂端\n滲出有甜味的液體。\n是鳥寶可夢討厭的味道。"
