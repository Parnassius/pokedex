        defense: 50
        special_attack: 90
        special_defense: 80
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - compound_eyes
      hidden_ability: tinted_lens
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          sun: "おおきな　めを　よく　かんさつすると\nじつは　ちいさな　めが　むすうに\nあつまって　できているのが　わかる。"
          moon: "ほかの　ポケモンに　おそわれると\nどくの　りんぷんを　まきちらしながら\nはばたいて　ていこう　するのだ。"
        jp_kanji:
          sun: "大きな　眼を　よく　観察すると\n実は　小さな　眼が　無数に\n集まって　できているのが　わかる。"
          moon: "他の　ポケモンに　襲われると\n毒の　鱗粉を　撒き散らしながら\n羽ばたいて　抵抗　するのだ。"
        en:
          sun: "Close examination of its large eyes reveals that\neach eye is composed of a myriad of tiny eyes."
          moon: "When attacked by other Pokémon, it defends\nitself by scattering its poisonous scales and\nfluttering its wings."
        fr:
          sun: "Si l’on regarde ses grands yeux de plus près,\non remarque qu’il s’agit en réalité d’une\nmultitude de petits yeux réunis."
          moon: "Pour se défendre contre les agressions d’autres\nPokémon, il bat des ailes en éparpillant autour\nde lui un nuage de poussière toxique."
        it:
          sun: "Osservando da vicino i suoi grandi occhi\nsi nota che in realtà sono composti da una\nmiriade di minuscoli occhietti."
          moon: "Quando viene attaccato da altri Pokémon,\nsi difende sbattendo le ali e spargendo intorno\na sé polveri velenose."
        de:
          sun: "Bei genauerer Betrachtung zeigt sich, dass\nseine zwei großen Augen jeweils aus einer\nVielzahl an kleineren Augen bestehen."
          moon: "Wird es von einem anderen Pokémon angegriffen,\nwehrt es sich, indem es mit den Flügeln schlägt\nund giftigen Flügelstaub verstreut."
        es:
          sun: "Al mirar sus grandes ojos desde cerca, puede\nobservarse como en realidad están compuestos\nde incontables ojos diminutos."
          moon: "Cuando lo atacan, Butterfree aletea con fuerza\ny esparce escamas venenosas con las que hace\nfrente a su adversario."
        ko:
          sun: "커다란 눈을 잘 관찰하면\n사실 작은 눈이 무수히 모여\n만들어진 것을 알 수 있다."
          moon: "다른 포켓몬에게 습격당하면\n독 인분을 흩뿌리며\n날갯짓하여 저항한다."
        zh_simp:
          sun: "仔细观察那对大眼睛的话，\n会发现其实是许许多多小眼睛\n聚集在一起形成的。"
          moon: "如果被其他宝可梦袭击，\n就会一边挥洒有毒的鳞粉，\n一边拍动翅膀抵抗。"
        zh_trad:
          sun: "仔細觀察那雙大眼睛的話，\n會發現那其實是由無數小眼睛\n聚集在一起而形成的。"
          moon: "如果被其他寶可夢襲擊，\n就會一邊散布有毒的鱗粉，\n一邊拍動翅膀抵抗。"
