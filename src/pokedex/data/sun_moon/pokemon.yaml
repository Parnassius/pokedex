      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - telepathy
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          sun: "ひじょうに　かしこいことで　しられる。\nみじゅくな　トレーナーは　みくだす\nベテランむけの　ポケモンだぞ。"
          moon: "ジャングルおくちの　きのうえに　すむ。\nまれに　うみべに　あらわれて\nヤドキングと　ちえくらべを　する。"
        jp_kanji:
          sun: "非常に　賢いことで　知られる。\n未熟な　トレーナーは　見下す\nベテラン向けの　ポケモンだぞ。"
          moon: "ジャングル奥地の　木の上に　棲む。\nまれに　海辺に　現れて\nヤドキングと　知恵比べを　する。"
        en:
          sun: "Known for its extreme intelligence, this Pokémon\nwill look down on inexperienced Trainers, so it’s\nbest suited to veteran Trainers."
          moon: "Deep in the jungle, high in the lofty canopy, this\nPokémon abides. On rare occasions, it shows up\nat the beach to match wits with Slowking."
        fr:
          sun: "Célébré pour son intelligence exceptionnelle,\nce Pokémon vous prendra de haut si vous\ndébutez. À réserver aux Dresseurs aguerris."
          moon: "Il vit perché sur les arbres au plus profond de la\njungle. Plus rarement, on le croise sur le littoral,\nen plein concours d’intelligence avec un Roigada."
        it:
          sun: "Famoso per la sua intelligenza, questo Pokémon\ntende a guardare dall’alto in basso gli Allenatori\npoco esperti e a prediligere i più competenti."
          moon: "Vive sugli alberi nel profondo della giungla.\nRaramente viene avvistato sul litorale, dove\nsi cimenta in gare d’intelligenza con Slowking."
        de:
          sun: "Es ist als extrem schlaues Pokémon bekannt.\nNicht so beliebt bei unerfahrenen Trainern,\ndoch Veteranen wissen es zu schätzen."
          moon: "Lebt auf Baumwipfeln im tiefsten Dschungel.\nAb und an erscheint es am Strand, um sich\nepische Quiz-Duelle mit Laschoking zu liefern."
        es:
          sun: "Es un Pokémon famoso por su astucia e ingenio.\nDesprecia a los Entrenadores novatos y prefiere\na los más veteranos."
          moon: "Vive en lo alto de los árboles en plena espesura\nde la jungla. Muy de vez en cuando se acerca a\nla costa para medir su ingenio con Slowking."
        ko:
          sun: "굉장히 똑똑한 것으로 유명하다.\n미숙한 트레이너를 깔보기 때문에\n베테랑에게 맞는 포켓몬이다."
          moon: "정글 오지의 나무 위에 산다.\n드물게 바닷가에 나타나서\n야도킹과 지혜를 겨룬다."
        zh_simp:
          sun: "因为非常聪明而被知晓。\n看不起没经验的训练家，\n是面向资深训练家的宝可梦。"
          moon: "栖息在丛林深处的树上。\n偶尔出现在海边，\n与呆呆王较量谁更聪明。"
        zh_trad:
          sun: "因為非常聰明而被聞名。\n看不起沒經驗的訓練家，\n是種適合資深訓練家的寶可夢。"
          moon: "棲息在叢林深處的樹上。\n偶爾會出現在海邊，\n與呆呆王較量誰聰明。"
passimian:
  species_id: 766
  names:
    jp_kana: ナゲツケサル
    jp_kanji: ナゲツケサル
    en: Passimian
    fr: Quartermac
    it: Passimian
    de: Quartermak
    es: Passimian
    ko: 내던숭이
    zh_simp: 投掷猴
    zh_trad: 投擲猴
  forms:
    passimian:
      form_id: 0
      base_stats:
        hp: 100
        attack: 120
        defense: 90
        special_attack: 40
        special_defense: 60
