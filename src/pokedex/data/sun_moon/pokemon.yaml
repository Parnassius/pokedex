          sun: "とうようの　ふるい　いいつたえ　にも\nとうじょうする。　いげんに　あふれ\nたくましくも　うつくしい　ポケモン。"
          moon: "たいないで　もえさかる　ほのおを\nエネルギーに　だいちを　かける。\nおおくの　でんせつが　のこっている。"
        jp_kanji:
          sun: "東洋の　古い　言い伝え　にも\n登場する。　威厳に　あふれ\nたくましくも　美しい　ポケモン。"
          moon: "体内で　燃え盛る　炎を\nエネルギーに　大地を　駆ける。\n多くの　伝説が　残っている。"
        en:
          sun: "Overflowing with beauty and majesty,\nthis strong Pokémon appears in ancient\nEastern folklore."
          moon: "The fire burning inside its body serves as the\nenergy to fuel it as it runs great distances.\nIt appears in many legends."
        fr:
          sun: "Ce Pokémon apparaît dans de vieux contes\nd’Extrême-Orient. Aussi beau que majestueux,\nsa puissance est légendaire."
          moon: "La flamme qui brûle dans son corps lui donne\nl’énergie de parcourir les contrées.\nDe nombreuses légendes existent à son sujet."
        it:
          sun: "Il suo aspetto maestoso ed elegante incute\nrispetto. Di lui si parla anche in antiche\nleggende orientali."
          moon: "Corre instancabile attraverso distese sconfinate\ngrazie al fuoco indomabile che arde nel suo\ncorpo. Si narra di lui in molte leggende."
        de:
          sun: "Ein anmutiges Pokémon, das Kraft und Stolz\nausstrahlt. Bereits in alten Legenden aus dem\nweit entfernten Osten wurde von ihm berichtet."
          moon: "Mithilfe der Energie, die das in ihm lodernde\nFeuer erzeugt, eilt es über Berg und Tal. Viele\nLegenden ranken sich um dieses Pokémon."
        es:
          sun: "Aparece en algunas leyendas de la antigüedad.\nEs un Pokémon de una belleza y majestuosidad\ndesmesuradas."
          moon: "Puede recorrer grandes distancias gracias a la\nenergía producida por el fuego de su interior.\nHay innumerables leyendas sobre este Pokémon."
        ko:
          sun: "동양의 오래된 전설에도\n등장한다. 위엄이 넘치며\n늠름하면서 아름다운 포켓몬."
          moon: "체내에서 불타오르는 불꽃을\n에너지로 대지를 달린다.\n많은 전설이 남아 있다."
        zh_simp:
          sun: "在东方的古代传说中也会出现。\n充满威严，强壮而又美丽的宝可梦。"
          moon: "把体内熊熊燃烧的火焰\n作为能量在大地奔驰。\n留下了大量的传说。"
        zh_trad:
          sun: "在東方的古代傳說中也曾出現。\n充滿威嚴，強壯而又美麗的寶可夢。"
          moon: "把體內熊熊燃燒的火焰\n作為能量在大地奔馳。\n留下了大量的傳說。"
