      descriptions:
        jp_kana:
          sun: "きょうりゅう　じだいの　ポケモン。\nのこぎりのような　キバで　えものを\nひきさいて　くっていた。"
          moon: "こだいの　おおぞらの　おうじゃ。\nきょだい　いんせきの　らっかで\nぜつめつした　せつが　ねづよい。"
        jp_kanji:
          sun: "恐竜　時代の　ポケモン。\nのこぎりのような　キバで　獲物を\n引き裂いて　喰っていた。"
          moon: "古代の　大空の　王者。\n巨大　隕石の　落下で\n絶滅した　説が　根強い。"
        en:
          sun: "A Pokémon from the age of the dinosaurs.\nIt used its sawlike fangs to shred its prey\nbefore eating them."
          moon: "In ancient times, it ruled the skies. A widely\naccepted theory is that it went extinct due to\na large meteor impact."
        fr:
          sun: "Un Pokémon de l’époque préhistorique.\nIl mangeait ses proies en les déchiquetant\navec ses crocs acérés comme des scies."
          moon: "Le roi des airs à l’époque préhistorique.\nLa théorie la plus crédible est qu’il aurait été\nannihilé par la chute d’une énorme météorite."
        it:
          sun: "Questo Pokémon, risalente all’epoca dei\ndinosauri, lacerava le prede con le zanne\naffilate come lame per poi divorarle."
          moon: "In tempi antichi era il signore dei cieli.\nSecondo una teoria molto diffusa, fu sterminato\ndalla caduta di un meteorite."
        de:
          sun: "Es stammt aus dem Zeitalter der Dinosaurier.\nMit seinen Zähnen, die Sägeblättern gleichen,\nzerreißt es seine Beute, bevor es sie frisst."
          moon: "Zu Urzeiten war es der Herrscher der Lüfte.\nEs wird allgemein angenommen, dass es infolge\neines Kometenabsturzes ausstarb."
        es:
          sun: "Sus orígenes datan de la era de los dinosaurios.\nDesgarra a sus presas con sus colmillos afilados\ncomo sierras antes de devorarlas."
          moon: "Dominaba los cielos en la época prehistórica.\nSe extinguió tras la caída de un gran meteorito,\nsegún una de las teorías más arraigadas."
        ko:
          sun: "공룡시대의 포켓몬이다.\n톱 같은 엄니로 먹이를\n찢어서 먹었다."
          moon: "고대 하늘의 왕.\n거대한 운석의 낙하로\n멸종했다는 설이 뿌리깊다."
        zh_simp:
          sun: "恐龙时代的宝可梦。\n用锯子一样的牙齿\n将猎物撕碎后吞食。"
          moon: "古代广袤天空的王者。\n因巨大陨石的坠落而灭绝的\n学说在人们心中根深蒂固。"
        zh_trad:
          sun: "恐龍時代的寶可夢。\n會用鋸子般的牙齒\n將獵物撕碎後吞食。"
          moon: "在古代是廣闊天空的王者。\n因巨大隕石的墜落而滅絕的\n學說在人們心中根深蒂固。"
    aerodactyl_mega:
