          moon: "６ぴきで　１にんまえの　ポケモン。\nマケンカニに　よく　ねらわれるが\nねんりきを　つかって　げきたいする。"
        jp_kanji:
          sun: "テレパシーで　仲間と　交信する。\n植物と　ある種の　タイプの\n遺伝子を　併せ持つと　いう。"
          moon: "６匹で　１人前の　ポケモン。\nマケンカニに　よく　狙われるが\n念力を　使って　撃退する。"
        en:
          sun: "Its six eggs use telepathy to communicate\namong themselves. It is believed to carry\nplant genes and the genes of other species."
          moon: "Six of them together form a full-fledged\nPokémon. It’s often hunted by Crabrawler,\nbut uses psychokinesis to drive it off."
        fr:
          sun: "Il communique avec ses amis par télépathie.\nSon ADN est un mélange de celui d’une plante\net d’un autre type non identifié."
          moon: "Ce Pokémon est composé de six œufs.\nIls sont souvent attaqués par des Crabagarre,\nmais ils se défendent avec leurs pouvoirs psy."
        it:
          sun: "Le sei uova comunicano telepaticamente. Il loro\npatrimonio genetico sembra avere elementi in\ncomune con quello dei vegetali e di altre specie."
          moon: "È costituito da sei individui. Viene spesso preso\ndi mira dai Crabrawler, ma riesce a metterli\nin fuga con i suoi poteri psichici."
        de:
          sun: "Die sechs Eier kommunizieren telepathisch\nmiteinander. Sie tragen das Erbgut von Pflanzen\nsowie Pokémon eines bestimmten Typs in sich."
          moon: "Es besteht aus sechs Eiern. Krabbox versucht\noft, es sich einzuverleiben, doch wehrt es sich\ntapfer mit seinen Psycho-Kräften."
        es:
          sun: "Los seis huevos que componen a Exeggcute se\ncomunican por medio de la telepatía. Se dice que\ncontiene genes de plantas y de otras especies."
          moon: "Este Pokémon está formado por seis huevos.\nSe defiende con sus poderes psíquicos de los\nfrecuentes ataques de Crabrawler."
        ko:
          sun: "텔레파시로 동료와 교신한다.\n식물과 어떤 종의 타입의 유전자를\n모두 갖추고 있다고 한다."
          moon: "여섯 마리가 하나인 포켓몬이다.\n오기지게가 자주 노리지만\n염동력을 사용해서 물리친다."
        zh_simp:
          sun: "用心灵感应与伙伴交流。\n据说兼有植物与某种别的遗传基因。"
          moon: "６只成为１只完整的宝可梦。\n经常被好胜蟹袭击，\n但是会使用念力击退对方。"
        zh_trad:
          sun: "用心靈感應與夥伴交流。\n聽說同時具備植物與\n某種屬性的基因。"
          moon: "６隻為１個單位的寶可夢。\n經常被好勝蟹襲擊，\n但是會使用念力擊退對方。"
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
    jp_kanji: ナッシー
    en: Exeggutor
    fr: Noadkoko
    it: Exeggutor
    de: Kokowei
    es: Exeggutor
    ko: 나시
    zh_simp: 椰蛋树
    zh_trad: 椰蛋樹
  forms:
    exeggutor:
      form_id: 0
      base_stats:
        hp: 95
        attack: 95
        defense: 85
        special_attack: 125
        special_defense: 75
        speed: 55
      evs_yield:
        hp: 0
