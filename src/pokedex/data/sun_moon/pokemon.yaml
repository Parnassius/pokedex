    es: Phantump
    ko: 나목령
    zh_simp: 小木灵
    zh_trad: 小木靈
  forms:
    phantump:
      form_id: 0
      base_stats:
        hp: 43
        attack: 70
        defense: 48
        special_attack: 50
        special_defense: 60
        speed: 38
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - grass
        - amorphous
      abilities:
        - natural_cure
        - frisk
      hidden_ability: harvest
      descriptions:
        jp_kana:
          sun: "もりで　しんだ　こどもの　たましいが\nきりかぶに　やどった。　ひめいの\nような　ぶきみな　こえで　なく。"
          moon: "みどりの　はっぱを　つみとって\nせんじて　のめば　まんびょうに\nきくと　いう　いいつたえが　ある。"
        jp_kanji:
          sun: "森で　死んだ　子どもの　魂が\n切り株に　宿った。　悲鳴の\nような　不気味な　声で　鳴く。"
          moon: "緑の　葉っぱを　摘み取って\n煎じて　飲めば　万病に\n効くと　いう　言い伝えが　ある。"
        en:
          sun: "These Pokémon are stumps possessed by the\nspirits of children who died in the forest.\nTheir cries sound like eerie screams."
          moon: "According to legend, medicine to cure any illness\ncan be made by plucking the green leaves on its\nhead, brewing them, and boiling down the liquid."
        fr:
          sun: "Ce Pokémon est une souche d’arbre possédée\npar l’âme d’un enfant mort en forêt. Son cri\nressemble à des pleurs."
          moon: "Une légende raconte qu’il est possible de créer\nune panacée en infusant les feuilles vertes qui\npoussent sur ses branches."
        it:
          sun: "Ceppo di un albero in cui alberga lo spirito\ndi un bambino smarrito nel bosco.\nIl suo verso è simile a un grido sinistro."
          moon: "Secondo una credenza, dall’infusione delle foglie\nverdi che crescono sui suoi rami si produce una\nmedicina portentosa capace di curare ogni male."
        de:
          sun: "Es ist die Seele eines im Wald gestorbenen\nKindes, die von einem Baumstumpf Besitz\nergriffen hat. Sein Ruf gleicht einem Schluchzen."
          moon: "Röstet man seine grünen Blätter, lässt sich\ndaraus ein Tee kochen, der gegen sämtliche\nKrankheiten helfen soll."
        es:
          sun: "Nace cuando el alma de un niño perdido habita\nun tocón. Su grito se asemeja a un escalofriante\nchillido."
          moon: "Se cree que con las hojillas verdes que le\ncrecen se puede preparar una infusión capaz\nde curar cualquier enfermedad."
        ko:
          sun: "숲에서 죽은 어린아이의 영혼이\n그루터기에 깃들었다. 비명\n같은 기분 나쁜 목소리로 운다."
          moon: "녹색 잎사귀를 따다가\n달여 마시면 만병에\n듣는다고 하는 전설이 있다."
        zh_simp:
          sun: "在森林中死去的孩子的魂魄\n寄生在树桩上。\n用悲鸣般的诡异声音鸣叫。"
          moon: "传说，摘取绿色的树叶\n煎煮饮用的话，能治百病。"
        zh_trad:
          sun: "在森林中死去的孩子的靈魂\n寄生在樹樁上。\n用悲鳴般的詭異聲音鳴叫。"
          moon: "傳說摘取綠色的樹葉\n煎煮飲用的話，能治百病。"
trevenant:
  species_id: 709
  names:
    jp_kana: オーロット
    jp_kanji: オーロット
    en: Trevenant
    fr: Desséliande
    it: Trevenant
