rattata:
  species_id: 19
  names:
    jp_kana: コラッタ
    jp_kanji: コラッタ
    en: Rattata
    fr: Rattata
    it: Rattata
    de: Rattfratz
    es: Rattata
    ko: 꼬렛
    zh_simp: 小拉达
    zh_trad: 小拉達
  forms:
    rattata:
      form_id: 0
      base_stats:
        hp: 30
        attack: 56
        defense: 35
        special_attack: 25
        special_defense: 35
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - run_away
        - guts
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sun: "まえばは　しぬまで　のびつづけるので\nメンテナンスが　ひつよう。　ヤスリを\nよういしないと　はしらを　かじられる。"
          moon: "せいめいりょくが　つよく　きたない\nばしょでも　へいきで　くらす。\nほっておくと　どんどん　ふえていく。"
        jp_kanji:
          sun: "前歯は　死ぬまで　伸び続けるので\nメンテナンスが　必要。　ヤスリを\n用意しないと　柱を　かじられる。"
          moon: "生命力が　強く　汚い\n場所でも　平気で　暮らす。\nほっておくと　どんどん　増えていく。"
        en:
          sun: "Its incisors continue growing until its death.\nIf its Trainer doesn’t offer it a file to gnaw on, it\nwill gnaw on door frames, table legs, and so on."
          moon: "With their strong capacity for survival, they can\nlive in dirty places without concern. Left\nunchecked, their numbers multiply rapidly."
        fr:
          sun: "Il doit toujours prendre soin de ses incisives\ncar elles poussent sans arrêt. S’il n’a rien pour\nles limer, il se rabattra sur un pilier."
          moon: "Un Pokémon très résistant, capable de survivre\nmême dans des milieux très insalubres.\nIl prolifère si l’on n’y prend pas garde."
        it:
          sun: "I suoi incisivi non smettono mai di crescere e\nrichiedono continue cure. Se non gli viene data\nuna lima per regolarli, rosicchia i tavoli o altro."
          moon: "La sua straordinaria resistenza gli permette di\nadattarsi anche ad habitat insalubri. Se lasciato\nindisturbato, si riproduce in gran numero."
        de:
          sun: "Seine Nagezähne benötigen ständige Pflege, da\nsie sein ganzes Leben lang wachsen. Steht kein\nNagestein zur Verfügung, knabbert es an Holz."
          moon: "Sie strotzen vor Lebenskraft und können selbst\nan schmutzigen Orten problemlos überleben.\nBleiben sie ungestört, vermehren sie sich rasch."
        es:
          sun: "Debe cuidar regularmente sus incisivos, pues\nestos siguen creciendo hasta que muere. Si no\ntiene nada con qué afilarlos, suele roer pilares."
          moon: "Su gran resistencia le permite vivir en los\nlugares más insalubres. Su población puede\ncrecer rápidamente."
        ko:
          sun: "앞니는 죽을 때까지 계속 자라기 때문에\n관리가 필요하다. 이갈이 용품을\n준비하지 않으면 기둥을 갉는다."
          moon: "생명력이 강해서 더러운\n곳에서도 사는데 문제없다.\n내버려두면 점점 수가 불어난다."
        zh_simp:
          sun: "门牙会终生生长，所以必须要保养。\n不准备好锉刀的话，会把柱子都啃掉。"
          moon: "生命力很强，\n即使在肮脏的地方也能坦然生活。\n放任不管的话会不停繁殖。"
        zh_trad:
          sun: "門牙會終生生長，所以要隨時保養。\n不幫牠準備好銼刀的話，\n牠就會去咬柱子來磨牙。"
          moon: "生命力很強，\n即使在骯髒的地方也能安然生活。\n放任不管的話會不停繁殖。"
    rattata_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 30
        attack: 56
        defense: 35
        special_attack: 25
        special_defense: 35
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - normal
      egg_groups:
        - field
      abilities:
        - gluttony
        - hustle
      hidden_ability: thick_fat
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          sun: "まえばで　ドアを　かじり　みんかに\nしんにゅう。　ヒゲを　ひくつかせ\nエサを　さがしだし　ぬすんでいくぞ。"
          moon: "ひが　くれると　かつどう。　むれの\nボスである　ラッタのため　いいエサを\nもとめて　まちじゅうを　かけめぐる。"
        jp_kanji:
          sun: "前歯で　ドアを　かじり　民家に\n侵入。　ヒゲを　ひくつかせ\n餌を　探しだし　盗んでいくぞ。"
          moon: "日が　暮れると　活動。　群れの\nボスである　ラッタのため　いい餌を\n求めて　街中を　駆け廻る。"
        en:
          sun: "With its incisors, it gnaws through doors and\ninfiltrates people’s homes. Then, with a twitch\nof its whiskers, it steals whatever food it finds."
          moon: "When the sun goes down, it becomes active.\nIt runs around town on a chase for good food\nfor the boss of its nest—Raticate."
        fr:
          sun: "Avec ses incisives, il peut ronger les portes des\nmaisons pour s’y introduire. Ses moustaches\nvibrent pour détecter la nourriture à dérober."
          moon: "Quand le soleil se couche, les Rattata sortent et\nparcourent la ville en groupe à la recherche de\nnourriture pour leur chef de bande, un Rattatac."
        it:
          sun: "Rosicchia le porte delle case con le zanne\nper intrufolarvisi. È in grado di sondare l’aria\ncon i suoi baffi per individuare cibo da rubare."
          moon: "Si attiva dopo il tramonto. Setaccia la città\nin cerca di prelibatezze da portare al Raticate\ncapobranco."
        de:
          sun: "Mithilfe seiner Vorderzähne knabbert es sich\ndurch Wohnungstüren. Vibrierende Schnurrhaare\nhelfen ihm, Futter zu finden und es zu stehlen."
          moon: "Es wird bei Sonnenuntergang aktiv. Für seinen\nRudelführer Rattikarl durchstreift es die Stadt\nauf der Suche nach gutem Futter."
        es:
          sun: "Entra en las casas royendo las puertas con sus\nincisivos. Menea los bigotes para detectar\nalimento y robarlo."
          moon: "Comienza su actividad cuando se pone el sol.\nRecorre la ciudad en pos de buena comida\npara su jefe, que suele ser un Raticate."
        ko:
          sun: "앞니로 문을 갉아서 민가에\n침입한다. 수염을 실룩거리며\n먹이를 찾아내 훔쳐간다."
          moon: "날이 저물면 활동한다. 무리의\n보스인 레트라를 위해 좋은 먹이를\n찾아 온 마을을 뛰어다닌다."
        zh_simp:
          sun: "用门牙咬破大门侵入民宅。\n扯动胡须寻找出食物，\n来进行盗窃。"
          moon: "太阳落山后活动。\n为了给群落老大拉达\n寻找好的食物而在街上跑来跑去。"
        zh_trad:
          sun: "用門牙咬破大門侵入民宅。\n扯動鬍鬚尋找出食物然後偷走。"
          moon: "太陽下山後才活動。\n為了幫群體的老大拉達\n尋找好的食物而在街上跑來跑去。"
raticate:
  species_id: 20
  names:
    jp_kana: ラッタ
    jp_kanji: ラッタ
    en: Raticate
    fr: Rattatac
    it: Raticate
    de: Rattikarl
    es: Raticate
    ko: 레트라
    zh_simp: 拉达
    zh_trad: 拉達
  forms:
    raticate:
      form_id: 0
      base_stats:
        hp: 55
        attack: 81
        defense: 60
        special_attack: 50
        special_defense: 70
        speed: 97
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - run_away
        - guts
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sun: "およぐのが　とくい。　うしろあしに\nちいさな　みずかきが　ついていて\nかわや　ときに　うみを　わたることも。"
          moon: "みためよりも　ずっと　きょうぼうな\nせいしつ。　かおの　まえに　てを\nのばすと　かみちぎられる　かも。"
        jp_kanji:
          sun: "泳ぐのが　得意。　後ろ足に\n小さな　水かきが　ついていて\n河や　ときに　海を　渡ることも。"
          moon: "見た目よりも　ずっと　凶暴な\n性質。　顔の　前に　手を\n伸ばすと　噛み千切られる　かも。"
        en:
          sun: "Its hind feet are webbed, so it’s a strong\nswimmer. It can cross rivers and sometimes\neven oceans."
          moon: "Its disposition is far more violent than its looks\nwould suggest. Don’t let your hand get too close\nto its face, as it could bite your hand clean off."
        fr:
          sun: "C’est un très bon nageur. Les doigts de ses\npattes arrière sont palmés, ce qui lui permet de\ntraverser les rivières et parfois même les mers."
          moon: "Beaucoup plus agressif qu’il n’en a l’air, mieux\nvaut éviter de lui tendre la main si l’on veut la\nrécupérer entière."
        it:
          sun: "Abile nuotatore, attraversa fiumi e a volte\npersino il mare grazie alle minuscole membrane\ntra le dita delle zampe posteriori."
          moon: "È molto più feroce di quanto non sembri.\nSe si allunga una mano verso di lui, potrebbe\nstaccarla con un morso."
        de:
          sun: "Ein guter Schwimmer. An seinen Hinterläufen\nhat es Schwimmhäute, mit denen es Flüsse\nund manchmal sogar Meere durchquert."
          moon: "Es ist aggressiver, als sein Äußeres vermuten\nlässt. Hält man einen Finger vor sein Gesicht,\nmuss man damit rechnen, dass es hineinbeißt."
        es:
          sun: "Es un excelente nadador. Gracias a las\npequeñas membranas de sus patas traseras\npuede cruzar ríos y, en ocasiones, hasta mares."
          moon: "No hay que dejarse engañar por su aspecto,\npues es más feroz de lo que parece. Si alguien\nintenta tocarlo, puede llevarse un mordisco."
        ko:
          sun: "수영이 특기. 뒷발에\n작은 물갈퀴가 달려있어\n강 때로는 바다를 건너기도 한다."
          moon: "겉모습보다 훨씬 난폭한\n성질을 가졌다. 얼굴 앞에 손을\n내밀면 물어뜯길 수도 있다."
        zh_simp:
          sun: "游泳很在行。后脚带有小小的蹼，\n会渡过河流，有时还会渡过大海。"
          moon: "性格比外表看起来凶残得多。\n如果把手伸到面前，\n或许会被一口咬断。"
        zh_trad:
          sun: "擅長游泳。後腳帶有小小的足蹼，\n會游過河流，有時還會渡過大海。"
          moon: "性格比外表看來殘暴得多。\n如果把手伸到牠面前，\n或許會被一口咬斷。"
    raticate_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
