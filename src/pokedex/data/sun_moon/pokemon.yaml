      abilities:
        - swift_swim
        - water_veil
      hidden_ability: lightning_rod
      held_items:
        rare: mystic_water
      descriptions:
        jp_kana:
          sun: "あたたかくなってくると　むれをなし\nかわを　さかのぼる。　そのこうけいは\nはるを　つげる　ふうぶつしだ。"
          moon: "ツノの　ながさ　ひれの　うつくしさに\nみせられ　トサキントしか　そだてない\nおつな　トレーナーも　おおいのだ。"
        jp_kanji:
          sun: "暖かくなってくると　群れをなし\n川を　さかのぼる。　その光景は\n春を　告げる　風物詩だ。"
          moon: "角の　長さ　ヒレの　美しさに\n魅せられ　トサキント　しか育てない\n乙な　トレーナーも　多いのだ。"
        en:
          sun: "When the weather grows warm, they form\ngroups and swim upriver. This sight serves\nas a poetic reminder that spring has arrived."
          moon: "Spellbound by the length of its horn and the\nbeauty of its fins, many strange Trainers raise\nGoldeen and nothing but Goldeen."
        fr:
          sun: "À la fin de l’hiver, des bancs de Poissirène\nremontent les fleuves. Ce spectacle annonce\ntraditionnellement l’arrivée du printemps."
          moon: "Séduits par la longueur de sa corne et la beauté\nde ses nageoires, de nombreux Dresseurs\nesthètes n’élèvent plus que des Poissirène."
        it:
          sun: "Quando la temperatura comincia ad alzarsi,\nforma un banco con i suoi simili e inizia a risalire\ni fiumi, annunciando così l’inizio della primavera."
          moon: "Molti Allenatori dai gusti raffinati allenano solo\ni Goldeen, affascinati dal loro lungo corno\ne dalle bellissime pinne."
        de:
          sun: "Wenn es warm wird, bilden sie Schwärme und\nschwimmen stromaufwärts. Dies ist ein Zeichen\ndafür, dass der Frühling herannaht."
          moon: "Einige Trainer sind von seinem langem Horn\nund seiner Eleganz so entzückt, dass sie\nausschließlich Goldini trainieren."
        es:
          sun: "Cuando el tiempo se vuelve más cálido, se\nagrupan y nadan río arriba. Este espectáculo tan\npoético anuncia la llegada de la primavera."
          moon: "Hay muchos Entrenadores que, fascinados por\nel tamaño de su cuerno y la belleza de sus\naletas, entrenan únicamente Goldeen."
        ko:
          sun: "따뜻해지면 무리를 지어\n강을 거슬러 올라간다. 그 광경은\n봄을 알리는 풍물시이다."
          moon: "뿔의 길이와 지느러미의 아름다움에\n매혹되어 콘치만 키우게 되는\n특이한 트레이너도 많다."
        zh_simp:
          sun: "天气变得暖和之后，\n就会成群结队溯流而上。\n那画面正如告知春天的风景诗。"
          moon: "被角的长度和鱼鳍的美丽而迷住，\n只培育角金鱼的\n风雅训练家也是很多的。"
        zh_trad:
          sun: "天氣變得暖和之後，\n就會成群結隊溯流而上。\n那畫面正如宣告春天來臨的風景詩。"
          moon: "被角的長度和魚鰭的美麗所迷住，\n因而只培育角金魚的\n風雅訓練家也是很多的。"
seaking:
  species_id: 119
  names:
    jp_kana: アズマオウ
    jp_kanji: アズマオウ
    en: Seaking
    fr: Poissoroy
    it: Seaking
    de: Golking
    es: Seaking
    ko: 왕콘치
    zh_simp: 金鱼王
    zh_trad: 金魚王
  forms:
    seaking:
      form_id: 0
      base_stats:
        hp: 80
        attack: 92
        defense: 65
        special_attack: 65
        special_defense: 80
        speed: 68
      evs_yield:
        hp: 0
