      types:
        - normal
      egg_groups:
        - mineral
      abilities:
        - trace
        - download
      hidden_ability: analytic
      descriptions:
        jp_kana:
          sun: "わくせい　かいはつを　しやに　いれ\nとうじの　さいしん　ぎじゅつで\nポリゴンを　アップデートしたのだ。"
          moon: "わくせい　かいはつを　もくひょうに\nポリゴンを　バージョンアップしたが\nまだまだ　ゆめには　とどかない。"
        jp_kanji:
          sun: "惑星　開発を　視野に　入れ\n当時の　最新　技術で\nポリゴンを　アップデートしたのだ。"
          moon: "惑星　開発を　目標に\nポリゴンを　バージョンアップしたが\nまだまだ　夢には　届かない。"
        en:
          sun: "For the purposes of planetary development,\nPorygon was updated with the most\ncutting-edge technology available."
          moon: "Porygon was updated to a new version in\nreadiness for planetary development. But that\ndream remains unrealized as yet."
        fr:
          sun: "Cette mise à jour de Porygon a été conçue\ndans le cadre d’un projet de terraformation,\ngrâce aux avancées scientifiques de l’époque."
          moon: "Version évoluée de Porygon, créée dans l’espoir\nde pouvoir un jour terraformer des planètes,\nun rêve loin d’être concrétisé pour l’instant."
        it:
          sun: "È stato creato aggiornando Porygon con la\ntecnologia più avanzata per l’epoca, in vista\ndi un progetto di sviluppo planetario."
          moon: "È nato da un potenziamento di Porygon per un\nprogetto di esplorazione di altri pianeti che\nperò non ha avuto successo."
        de:
          sun: "In der Absicht, andere Planeten zu erforschen,\nverpasste man Porygon ein Upgrade auf dem\nhöchsten Stand der damaligen Technologie."
          moon: "Porygon erfuhr ein Upgrade auf diese Version\nmit dem Ziel, andere Planeten zu erschließen.\nBislang bleibt diese Vision unverwirklicht."
        es:
          sun: "Esta versión actualizada de Porygon ha sido\ndotada de la más avanzada tecnología, lo que,\nen teoría, le permite explorar otros planetas."
          moon: "Esta versión de Porygon mejorada se creó para\nposibilitar la exploración de otros planetas. Por\ndesgracia, este sueño sigue siendo inalcanzable."
        ko:
          sun: "행성 개발을 시야에 넣어\n당시의 최신 기술로\n폴리곤을 업데이트했다."
          moon: "행성 개발을 목표로\n폴리곤을 버전 업 했지만\n아직 꿈에 도달하지 못했다."
        zh_simp:
          sun: "将行星的开发纳入视野，\n以当时的最新技术升级了多边兽。"
          moon: "以行星的开发为目标\n将多边兽升级而成，\n但离实现梦想还有很长距离。"
        zh_trad:
          sun: "將行星的開發納入視野，\n以當時的最新技術升級了多邊獸。"
          moon: "以行星的開發為目標\n升級了多邊獸，\n但距離夢想實現還有很長的距離。"
