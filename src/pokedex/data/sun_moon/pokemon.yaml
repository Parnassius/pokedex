        speed: 0
      types:
        - fairy
      egg_groups:
        - field
      abilities:
        - cute_charm
      hidden_ability: pixilate
      descriptions:
        jp_kana:
          sun: "リボンの　ような　しょっかく　から\nてきいを　そぐ　はどうを　はなち\nえものを　ゆだんさせ　おそう。"
          moon: "えものを　みつけると　リボンじょうの\nしょっかくを　ゆらし　ゆだん　させ\nスキが　できると　とびかかる。"
        jp_kanji:
          sun: "リボンの　ような　触角　から\n敵意を　削ぐ　波動を　放ち\n獲物を　油断させ　襲う。"
          moon: "獲物を　見つけると　リボン状の\n触角を　揺らし　油断　させ\nスキが　できると　飛びかかる。"
        en:
          sun: "Its ribbonlike feelers give off an aura that\nweakens hostility in its prey, causing them\nto let down their guard. Then it attacks."
          moon: "When this Pokémon sights its prey, it swirls its\nribbonlike feelers as a distraction. A moment\nlater, it pounces."
        fr:
          sun: "Grâce à ses antennes semblables à des rubans,\nil peut émettre des ondes neutralisant l’hostilité\net ainsi endormir la méfiance de ses proies."
          moon: "Lorsqu’il trouve une proie, il agite ses antennes\nen forme de rubans pour la distraire. Ensuite,\nil passe à l’attaque."
        it:
          sun: "Le sue antenne simili a fiocchetti emettono onde\nche neutralizzano l’aggressività, riuscendo così\na far abbassare la guardia alle sue prede."
          moon: "Individuata una preda, agita le sue antenne\nsimili a fiocchetti per deconcentrarla e poi\nattacca approfittando della sua distrazione."
        de:
          sun: "Seinen bandförmigen Fühlern lässt es\nberuhigende Wellen entströmen, um\nseine Beute in Sicherheit zu wiegen."
          moon: "Hat es Beute entdeckt, wedelt es mit seinen\nbandförmigen Fühlern, um diese abzulenken.\nBei Erfolg stürzt es sich auf sie."
        es:
          sun: "Con sus apéndices sensoriales con forma de\ncinta, puede emitir ondas que neutralizan la\nhostilidad y hacen bajar la guardia a su presa."
          moon: "Al detectar a una presa, agita sus apéndices\nsensoriales con forma de cinta para distraerla y,\ncuando lo consigue, se abalanza sobre ella."
        ko:
          sun: "리본 같은 더듬이로부터\n적의를 없애는 파동을 내보내\n먹이를 방심하게 하고 덮친다."
          moon: "먹이를 발견하면 리본 모양의\n더듬이를 흔들어 방심하게 하고\n틈이 만들어지면 덤벼든다."
        zh_simp:
          sun: "从蝴蝶结那样的触角里\n释放出削弱敌意的波动，\n令猎物大意后袭击对方。"
          moon: "发现猎物后，就会摇晃\n蝴蝶结状的触角让对方大意，\n一旦出现可趁之机就会猛扑过去。"
        zh_trad:
          sun: "從有如蝴蝶結的觸角裡\n釋放出削弱敵意的波動，\n令獵物大意後襲擊對方。"
          moon: "發現獵物後，就會搖晃\n蝴蝶結形狀的觸角讓對方大意，\n一旦有機可乘就會猛撲過去。"
