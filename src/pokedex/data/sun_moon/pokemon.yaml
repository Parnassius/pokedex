        jp_kanji:
          sun: "迷信が　はびこる　昔\n災いを　もたらすと　忌み嫌われ\n山の　奥へと　追いやられた。"
          moon: "災いを　もたらすと　いわれるが\n実際には　おだやかな　性質。\n災害の　危機を　人に　伝える。"
        en:
          sun: "Long ago, superstitions were spread about it,\nsaying it brought disaster. This fed a hatred\nof it, and it was driven deep into the mountains."
          moon: "Although it’s said to bring disaster, in actuality,\nthis Pokémon possesses a calm disposition and\nwarns people of any crises that loom."
        fr:
          sun: "Autrefois la cible de superstitions le rendant\nresponsable des catastrophes, il s’est retiré\ndans les montagnes pour y échapper."
          moon: "On le dit annonciateur de catastrophes, mais\nc’est en fait un Pokémon paisible. Il prévient les\nhommes de l’imminence des cataclysmes."
        it:
          sun: "In un antico passato dominato dalle superstizioni\nera odiato perché ritenuto latore di disastri.\nQuesto l’ha costretto a rifugiarsi sulle montagne."
          moon: "Si dice che sia latore di disgrazie. In realtà\nha un carattere molto gentile e avvisa gli esseri\numani di disastri naturali imminenti."
        de:
          sun: "Aus Aberglauben war Absol einst\nals Unheilsbote verhasst und wurde\nin die tiefsten Berge vertrieben."
          moon: "Es heißt, Absol sei ein Unheilsbote, doch in\nWahrheit hat es ein sanftes Wesen. Es warnt\ndie Menschen vor drohenden Katastrophen."
        es:
          sun: "Repudiado por las supersticiones de antaño\nque lo proclamaban heraldo de catástrofes\nnaturales, tuvo que refugiarse en las montañas."
          moon: "Se rumorea que es portador de calamidades,\npero en realidad tiene un carácter muy dócil.\nAlerta a los humanos cuando vienen catástrofes."
        ko:
          sun: "미신이 만연했던 옛날에\n재앙을 초래한다고 미움을 받아\n산속으로 쫓겨났다."
          moon: "재앙을 가져온다고 전해지지만\n실제로는 온화한 성질이다.\n재해의 위기를 사람들에게 알린다."
        zh_simp:
          sun: "在迷信盛行的过去，\n因被认为会招来灾祸而遭到厌恶，\n并被赶到深山中去。"
          moon: "被认为会带来灾祸，\n而实际上性格很温和。\n会向人传递灾害危机的信息。"
        zh_trad:
          sun: "在迷信橫行的過去，\n因被認為會招來災禍而遭到厭惡，\n並被趕到了深山中去。"
          moon: "被認為會帶來災禍，\n但實際上性格很溫和。\n會將災害危機的警訊傳達給人們。"
    absol_mega:
      form_id: 1
      names:
        jp_kana: メガアブソル
        jp_kanji: メガアブソル
        en: Mega Absol
        fr: Méga-Absol
        it: MegaAbsol
        de: Mega-Absol
        es: Mega-Absol
        ko: 메가앱솔
        zh_simp: 超级阿勃梭鲁
        zh_trad: 超級阿勃梭魯
      base_stats:
        hp: 65
        attack: 150
        defense: 60
        special_attack: 115
        special_defense: 60
        speed: 115
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - magic_bounce
      descriptions:
        jp_kana:
          sun: "つばさのように　さかだつ　たいもうを\nはばたかせて　あいてを　いあつする\nオーラを　ほとばしらせるのだ。"
          moon: "メガシンカの　エネルギーが　みなぎり\nぜんしんの　たいもうが　さかだつ。\nつばさでは　ないので　とべは　しない。"
        jp_kanji:
          sun: "翼のように　逆立つ　体毛を\n羽ばたかせて　相手を　威圧する\nオーラを　ほとばしらせるのだ。"
          moon: "メガシンカの　エネルギーが　みなぎり\n全身の　体毛が　逆立つ。\n翼では　ないので　飛べは　しない。"
        en:
          sun: "When this Pokémon whips the winglike fur on its\nback as though beating its wings, it sends an\nintimidating aura flying at its opponents."
          moon: "As the energy of Mega Evolution fills it, its fur\nbristles. What you see on its back are not true\nwings, and this Pokémon isn’t able to fly."
        fr:
          sun: "Il projette une aura intimidante sur ses ennemis\nen agitant ses poils hérissés comme s’il\ns’agissait d’ailes."
          moon: "L’énergie de la Méga-Évolution a fait se hérisser\ntous les poils de son corps. Comme il ne s’agit\npas d’ailes, il ne peut pas voler."
        it:
          sun: "La sua pelliccia assume la forma di ali che,\nse agitate, emanano un’aura che mette\nin soggezione il nemico."
          moon: "L’energia della megaevoluzione lo pervade\nfacendogli rizzare il pelo sul corpo.\nLe sue non sono vere ali, quindi non può volare."
        de:
          sun: "Wenn es sein flügelartig aufgerichtetes Fell\nbewegt, strahlt es eine Aura aus, die seine\nFeinde einschüchtert."
          moon: "Von der Energie der Mega-Entwicklung erfüllt,\nhat sein Fell sich aufgerichtet. Da es keine\nrichtigen Flügel sind, kann es auch nicht fliegen."
        es:
          sun: "El pelaje erizado de su dorso se asemeja a un\npar de alas que, al agitarse, emiten una potente\naura que arrolla al rival."
          moon: "Al megaevolucionar, el pelaje del dorso se le\neriza de tal forma que parece tener alas. Pero al\nno tratarse de verdaderas alas, no puede volar."
        ko:
          sun: "날개처럼 곤두선 털을\n날갯짓하며 상대를\n위압하는 오라를 뿜어낸다."
          moon: "메가진화 에너지가 넘쳐나\n전신의 털이 곤두섰다.\n날개가 아니라 날 수는 없다."
        zh_simp:
          sun: "像挥动翅膀般挥动着倒立的体毛，\n让威吓对手的气场迸发出来。"
          moon: "体内充盈着超级进化的能量，\n因此全身的体毛都竖了起来。\n但这并非是翅膀，所以无法飞行。"
        zh_trad:
          sun: "像翅膀般揮動著倒立的體毛，\n讓威嚇對手的氣場迸發出來。"
          moon: "超級進化的能量高漲，\n全身的體毛都豎立起來。\n因為不是翅膀，所以無法飛行。"
