        - corrosion
      hidden_ability: oblivious
      held_items:
        rare: smoke_ball
      descriptions:
        jp_kana:
          sun: "たいえきを　もやし　どくガスを　たく。\nガスを　すった　てきが　フラフラに\nなったあと　おそいかかるのだ。"
          moon: "かざんや　かわいた　いわばに　すむ。\nあまい　かおりの　どくガスを　はなち\nむしポケモンを　おびきよせ　おそう。"
        jp_kanji:
          sun: "体液を　燃やし　毒ガスを　たく。\nガスを　吸った　敵が　フラフラに\nなったあと　襲いかかるのだ。"
          moon: "火山や　乾いた　岩場に　棲む。\n甘い　香りの　毒ガスを　放ち\nむしポケモンを　おびき寄せ　襲う。"
        en:
          sun: "It burns its bodily fluids to create a poisonous\ngas. When its enemies become disoriented from\ninhaling the gas, it attacks them."
          moon: "Volcanoes or dry, craggy places are its home.\nIt emanates a sweet-smelling poisonous gas\nthat attracts bug Pokémon, then attacks them."
        fr:
          sun: "Il consume ses fluides corporels pour générer\nun gaz toxique qui étourdit ses ennemis.\nIl ne lui reste alors qu’à les achever."
          moon: "Habitant des volcans et des régions rocheuses\narides, il exhale un gaz toxique au parfum doux\npour attirer et piéger les Pokémon Insecte."
        it:
          sun: "Dalla combustione di fluidi corporei crea un gas\nvelenoso che usa per stordire gli avversari.\nNe approfitta poi per attaccarli."
          moon: "Vive nei vulcani e in territori pietrosi e aridi.\nSprigiona un gas tossico dall’odore dolciastro\ncon cui attira Pokémon Coleottero per attaccarli."
        de:
          sun: "Durch Verbrennung von Körperflüssigkeit\nerzeugt es ein Gas, das Feinde schwindelig\nund so zu leichten Zielen macht."
          moon: "Lebt in Vulkanen und trockenen Felsgebieten.\nMit seinem süßlich duftenden Giftgas lockt es\nKäfer-Pokémon an, um sie anzugreifen."
        es:
          sun: "Aturde a sus oponentes con un gas venenoso\nque produce al quemar sus fluidos corporales\ny luego se abalanza sobre ellos."
          moon: "Vive en volcanes y desolados pedregales. El gas\nvenenoso que libera despide un aroma dulce con\nel que atrae a Pokémon insecto para atacarlos."
        ko:
          sun: "체액을 태워 독가스를 피운다.\n가스를 들이마신 적이\n휘청거리면 덮친다."
          moon: "화산이나 건조한 바위에 산다.\n달콤한 향기의 독가스를 발산해\n벌레포켓몬을 유인하여 덮친다."
        zh_simp:
          sun: "燃烧体液，释放毒瓦斯。\n等吸了毒气的敌人变得\n晕晕乎乎后就发动袭击。"
          moon: "栖息在火山和干燥的岩石地带。\n放出有甜甜香味的毒瓦斯，\n把虫宝可梦吸引过来再袭击。"
        zh_trad:
          sun: "燃燒體液製造毒瓦斯。\n在吸了毒瓦斯的敵人變得\n頭暈目眩之後發動襲擊。"
          moon: "棲息在火山和乾燥的岩石地帶。\n放出帶有甜甜香味的毒瓦斯，\n吸引蟲寶可夢過來後進行襲擊。"
