crabrawler:
  species_id: 739
  names:
    jp_kana: マケンカニ
    jp_kanji: マケンカニ
    en: Crabrawler
    fr: Crabagarre
    it: Crabrawler
    de: Krabbox
    es: Crabrawler
    ko: 오기지게
    zh_simp: 好胜蟹
    zh_trad: 好勝蟹
  forms:
    crabrawler:
      form_id: 0
      base_stats:
        hp: 47
        attack: 82
        defense: 57
        special_attack: 42
        special_defense: 47
        speed: 63
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - water_3
      abilities:
        - hyper_cutter
        - iron_fist
      hidden_ability: anger_point
      held_items:
        rare: aspear_berry
      descriptions:
        jp_kana:
          sun: "ハサミで　じゃくてんを　ガードしつつ\nスキを　うかがい　パンチを　はなつ。\nまけたほうは　アワを　ふいて　ダウン。"
          moon: "なぐりすぎで　ハサミは　よく　もげるが\nすぐに　はえる。　ハサミの　なかみは\nすくないが　コクがあって　うまいぞ。"
        jp_kanji:
          sun: "ハサミで　弱点を　ガードしつつ\n隙を　うかがい　パンチを　放つ。\n負けたほうは　泡を　ふいて　ダウン。"
          moon: "なぐり過ぎで　ハサミは　よく　もげるが\nすぐに　生える。　ハサミの　中味は\n少ないが　コクがあって　うまいぞ。"
        en:
          sun: "While guarding its weak points with its pincers,\nit looks for an opening and unleashes punches.\nWhen it loses, it foams at the mouth and faints."
          moon: "It punches so much, its pincers often come off\nfrom overuse, but they grow back quickly. What\nlittle meat they contain is rich and delicious."
        fr:
          sun: "Il protège ses points faibles avec ses pinces en\nguettant le moment propice pour riposter.\nIl crache de l’écume lorsqu’il tombe K.O."
          moon: "Ses pinces se décrochent lorsqu’il s’en sert trop\npour frapper, mais repoussent heureusement\naussitôt. Leur chair est fine et délicieuse."
        it:
          sun: "Protegge con le chele i propri punti deboli e, al\nmomento opportuno, contrattacca con potenti\npugni. Quando perde, crolla schiumante al suolo."
          moon: "A furia di sferrare pugni, le chele gli si\nstaccano, ma ricrescono sempre. La polpa al loro\ninterno è poca, ma molto saporita."
        de:
          sun: "Schützt mit den Scheren seine Schwachstellen\nund bereitet einen Gegenschlag vor. Verliert es,\nbläst es Trübsal."
          moon: "Es verliert oft seine Scheren im Kampf, aber sie\nwachsen schnell nach. Obwohl diese nur wenig\nFleisch enthalten, gelten sie als Delikatesse."
        es:
          sun: "Protege sus puntos débiles con las pinzas y\npropina puñetazos en cuanto tiene ocasión.\nCuando pierde, llora lágrimas espumosas."
          moon: "Suele perder las pinzas por usarlas demasiado,\npero enseguida le vuelven a crecer. Estas tienen\npoca carne, pero es muy apreciada."
        ko:
          sun: "가위로 약점을 가드 하면서\n틈을 노려 펀치를 날린다.\n진 쪽은 거품을 물고 다운된다."
          moon: "심하게 때려서 집게는 잘 떨어지지만\n바로 자란다. 집게 속살은\n적지만 풍미가 있고 맛있다."
        zh_simp:
          sun: "用钳子保护自己的弱点，\n同时伺机出拳。\n输了的话会吐泡泡倒下。"
          moon: "因为打架太频繁，钳子常常掉落，\n但很快又会长出来。钳子里的肉很少，\n但味道浓郁非常鲜美。"
        zh_trad:
          sun: "用鉗子保護自己的弱點，\n同時等候時機出拳。\n輸了的話會吐著泡泡倒下。"
          moon: "因為常常打架，鉗子經常掉落，\n不過很快又會長出來。鉗子裡的肉很少，\n但味道濃郁且非常美味。"
crabominable:
  species_id: 740
  names:
    jp_kana: ケケンカニ
    jp_kanji: ケケンカニ
    en: Crabominable
    fr: Crabominable
    it: Crabominable
    de: Krawell
    es: Crabominable
    ko: 모단단게
    zh_simp: 好胜毛蟹
    zh_trad: 好勝毛蟹
  forms:
    crabominable:
      form_id: 0
      base_stats:
        hp: 97
        attack: 132
        defense: 77
        special_attack: 62
        special_defense: 67
        speed: 43
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - ice
      egg_groups:
        - water_3
      abilities:
        - hyper_cutter
        - iron_fist
      hidden_ability: anger_point
      held_items:
        rare: cheri_berry
      descriptions:
        jp_kana:
          sun: "トップを　めざすはずが　ゆきやまに\nまよいのぼり　さむさに　たえるうちに\nけが　はえてきて　しんかしていた。"
          moon: "とにかく　みさかいなく　なぐる。\nいざと　なったら　ハサミを　じせつし\nロケットのように　はっしゃし　なぐる。"
        jp_kanji:
          sun: "トップを　目指すはずが　雪山に\n迷い登り　寒さに　耐えるうちに\n毛が　生えてきて　進化していた。"
          moon: "とにかく　見境なく　なぐる。\nいざと　なったら　ハサミを　自切し\nロケットのように　発射し　なぐる。"
        en:
          sun: "It aimed for the top but got lost and ended up\non a snowy mountain. Being forced to endure\nthe cold, this Pokémon evolved and grew fur."
          moon: "It just throws punches indiscriminately. In times\nof desperation, it can lop off its own pincers\nand fire them like rockets."
        fr:
          sun: "Il rêvait d’atteindre le sommet d’un pic enneigé,\nmais s’est égaré en chemin. Il a dû évoluer pour\nsurvivre au froid et a acquis un pelage fourni."
          moon: "Il distribue les coups de pince au petit bonheur\nla chance. En dernier recours, il les décroche et\nles envoie telles des roquettes."
        it:
          sun: "Dopo essersi smarrito su una montagna innevata\nche voleva scalare a ogni costo, si è evoluto\nsviluppando del pelo per proteggersi dal freddo."
          moon: "Sferra colpi alla cieca. Come ultima risorsa,\nsi stacca le chele e le spara come razzi per\ncolpire l’avversario."
        de:
          sun: "Es wollte auf eine verschneite Bergspitze,\nhat sich aber verlaufen. In der Kälte wuchs\nihm dann ein Fell und es entwickelte sich weiter."
          moon: "Schlägt erst einmal wahllos zu. Kommt es\nhart auf hart, stößt es seine Scheren ab\nund verschießt sie wie Raketen."
        es:
          sun: "Tras perderse intentando coronar una alta\nmontaña, desarrolló una capa de pelo para\nprotegerse del frío."
          moon: "Asesta golpes con las pinzas a diestro y\nsiniestro. Si se ve en apuros, se desprende de\nellas lanzándolas como si fueran cohetes."
        ko:
          sun: "톱을 노리려다 설산에서\n헤매게 되고 추위를 견디던 중에\n털이 생겨서 진화했다."
          moon: "아무튼 무작정 때린다.\n여차하면 집게를 스스로 끊어\n로켓처럼 발사해서 때린다."
        zh_simp:
          sun: "应该是以登顶为目标的，却阴差阳错地\n登上了雪山，在忍耐寒冷的过程中，\n由于毛发不断生长而进化成这样。"
          moon: "不管不顾地打架。\n遇到危机时刻，就会自断钳子，\n像发射火箭一样砸出去。"
        zh_trad:
          sun: "原本是為了超越顛峰而深入山中修行，\n卻走錯路登上雪山，在忍受寒冷的同時，\n毛髮不斷生長而產生了進化。"
          moon: "不顧一切地打架。\n遇到突發危機便會自斷鉗子，\n像發射火箭一樣砸出去。"
oricorio:
