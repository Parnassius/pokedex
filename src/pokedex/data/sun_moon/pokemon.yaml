        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
        - water_veil
      hidden_ability: lightning_rod
      held_items:
        rare: mystic_water
      descriptions:
        jp_kana:
          sun: "はだざむくなるころ　ぜんしんが\nくれないに　そまる。　そのすがたは\nあきを　かんじる　ふうぶつしだ。"
          moon: "アズマオウマニアの　トレーナーは\nツノあいこうかと　ヒレあいこうかに\nわかれ　たがいの　なかは　わるい。"
        jp_kanji:
          sun: "肌寒くなるころ　全身が\n紅に　染まる。　その姿は\n秋を　感じる　風物詩だ。"
          moon: "アズマオウマニアの　トレーナーは\nツノ愛好家と　ヒレ愛好家に\nわかれ　互いの　仲は　悪い。"
        en:
          sun: "When the weather grows cold, its whole body\nflushes a deep red. This sight serves as a\npoetic reminder that autumn has arrived."
          moon: "Trainers who are crazy for Seaking are divided\ninto horn enthusiasts and fin enthusiasts.\nThe two groups do not get along well."
        fr:
          sun: "Quand il commence à faire froid, son corps\ndevient rouge vif. Ce spectacle annonce\ntraditionnellement la venue de l’automne."
          moon: "Il existe deux types de Dresseurs de Poissoroy :\nceux qui aiment sa corne et ceux qui préfèrent\nses nageoires. Les deux groupes se détestent."
        it:
          sun: "Quando le giornate cominciano a rinfrescarsi,\nil suo corpo si tinge di rosso vivo, annunciando\ncosì l’inizio dell’autunno."
          moon: "Gli appassionati di Seaking si dividono in due\ngruppi: gli estimatori del corno e gli amanti\ndelle pinne. Tra di loro non corre buon sangue."
        de:
          sun: "Wenn es kälter wird, färbt sich sein ganzer\nKörper tiefrot. Dieser Anblick versetzt die\nLeute in Herbststimmung."
          moon: "Golkings Fangemeinde spaltet sich in zwei\nLager, die sich gegenseitig nicht riechen können:\ndie Hornenthusiasten und die Flossenfans."
        es:
          sun: "Cuando las temperaturas bajan mucho, su piel\nse torna de un color carmesí. Es una señal\ninequívoca de que se aproxima el otoño."
          moon: "Los fanáticos de este Pokémon pueden dividirse\nen dos grupos: los que adoran sus aletas y los\nque adoran su cuerno. No se llevan nada bien."
        ko:
          sun: "쌀쌀해질 무렵 전신이\n주홍색으로 물든다. 그 모습은\n가을을 느끼는 풍물시이다."
          moon: "왕콘치 마니아인 트레이너는\n뿔 애호가와 지느러미 애호가로\n갈라져 서로 사이가 나쁘다."
        zh_simp:
          sun: "凉飕飕的时候，全身就会\n晕染成鲜红色。那样子正如\n令人感觉到秋意的风景诗。"
          moon: "狂热爱好金鱼王的训练家\n分为角的爱好者和鱼鳍的爱好者。\n相互之间的关系很差。"
        zh_trad:
          sun: "天氣變涼的時候，全身就會\n暈染成鮮紅色。那樣子正如\n令人感覺到秋意的風景詩。"
          moon: "狂熱愛好金魚王的訓練家\n分為角的愛好者和魚鰭的愛好者。\n兩者之間的關係很差。"
staryu:
