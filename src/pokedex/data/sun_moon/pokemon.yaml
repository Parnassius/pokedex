      descriptions:
        jp_kana:
          sun: "れんけつするとき　３びきのコイルの\nのうも　ひとつに　れんけつする。\n３ばい　かしこくなりは　しない。"
          moon: "ほぼ　コイル　３ばいの　でんりょく。\nたいようのこくてんが　おおいとき\nなぜか　たいりょうはっせい。"
        jp_kanji:
          sun: "連結するとき　３匹のコイルの\n脳も　一つに　連結する。\n３倍　賢くなりは　しない。"
          moon: "ほぼ　コイル　３倍の　電力。\n太陽の黒点が　多いとき\nなぜか　大量発生。"
        en:
          sun: "When three Magnemite link together, their brains\nalso become one. They do not become three\ntimes more intelligent."
          moon: "It has about three times the electrical power of\nMagnemite. For some reason, outbreaks of this\nPokémon happen when lots of sunspots appear."
        fr:
          sun: "Lorsque trois Magnéti fusionnent, leurs cerveaux\nfusionnent aussi. Mais cela ne signifie pas que\nMagnéton est trois fois plus intelligent."
          moon: "Il possède le triple de la puissance d’un Magnéti.\nIl en apparaît beaucoup lorsque les taches\nsolaires sont nombreuses."
        it:
          sun: "Quando tre Magnemite formano un Magneton,\nanche il loro cervello si fonde. Ma non significa\nche Magneton è tre volte più intelligente."
          moon: "Ha una potenza elettrica tre volte superiore a\nquella di Magnemite. Si registrano comparse\nmassicce quando ci sono molte macchie solari."
        de:
          sun: "Drei Magnetilo schließen sich zusammen und\nvereinigen ihre Gehirne. Das heißt aber nicht,\ndass dieses Pokémon dreimal so schlau wird."
          moon: "Seine Stromstärke ist fast dreimal so hoch wie\ndie eines Magnetilos. Es erscheint vermehrt,\nwenn Flecken auf der Sonne auftauchen."
        es:
          sun: "Cuando tres Magnemite se unen, sus cerebros\nse convierten en uno. No obstante, su\ninteligencia no se multiplica por tres."
          moon: "Su poder eléctrico es unas tres veces superior\nal de Magnemite. Aparecen en gran cantidad\ncuando se vislumbran muchas manchas solares."
        ko:
          sun: "연결할 때 3마리의 코일의\n뇌도 하나로 연결된다.\n3배로 똑똑해지지는 않는다."
          moon: "거의 코일의 3배의 전력이다.\n태양의 흑점이 많을 때\n어찌 된 일인지 대량 발생한다."
        zh_simp:
          sun: "连接的时候，３只小磁怪的\n脑袋也会连成一体。\n但并不会变得３倍聪明。"
          moon: "大约有小磁怪３倍的电力。\n不知为何会在太阳黑子\n多的时候大量出现。"
        zh_trad:
          sun: "結合的時候，３隻小磁怪的\n腦袋也會連成一個。\n但並不會變得３倍聰明。"
          moon: "大約有小磁怪３倍的電力。\n太陽黑子多的時候，\n不知為何會大量出現。"
