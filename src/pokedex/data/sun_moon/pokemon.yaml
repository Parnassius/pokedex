      descriptions:
        jp_kana:
          sun: "りゅうせいの　きらめく　しんやに\nじっと　そらを　ながめる　すがたは\nこきょうに　おもいを　はせているよう。"
          moon: "そのシルエットから　おほしさまの\nうまれかわりと　しんじられている。\nなぜか　メテノが　だいすき。"
        jp_kanji:
          sun: "流星の　煌めく　深夜に\nじっと　空を　眺める　姿は\n故郷に　思いを　馳せているよう。"
          moon: "そのシルエットから　お星様の\n生まれ変わりと　信じられている。\nなぜか　メテノが　大好き。"
        en:
          sun: "On late nights illuminated by shooting stars,\nit gazes intently skyward, as if thinking of\nits home."
          moon: "Because of its silhouette, it’s believed to be a\nstar reborn. For some reason, it loves Minior."
        fr:
          sun: "On dit que s’il contemple fixement le ciel\nlorsque des étoiles filantes passent, c’est\nparce que cela lui rappelle son bercail."
          moon: "Selon certaines croyances, sa forme prouve\nqu’il s’agit de la réincarnation d’une étoile.\nÉtrangement, il aime beaucoup les Météno."
        it:
          sun: "Nel cuore della notte rimane a guardare le stelle\ncadenti pensando alla sua terra natale."
          moon: "Il suo strano aspetto fa pensare che sia la\nreincarnazione di una stella. Per qualche motivo\nsconosciuto, gli piacciono molto i Minior."
        de:
          sun: "Sieht man es tief in der Nacht gebannt das\nFunkeln von Sternschnuppen beobachten,\nschwelgt es wohl in Gedanken an seine Heimat."
          moon: "Aufgrund seines Aussehens wird es oft für\neinen Stern gehalten. Aus unbekannten Gründen\nliebt es Meteno über alles."
        es:
          sun: "Se dice que este Pokémon se acuerda de su\nhogar cuando observa el cielo durante una lluvia\nde estrellas."
          moon: "Algunos creen que su forma es un indicio de que\nCleffa es, en realidad, la reencarnación de una\nestrella. Por algún motivo, adora a los Minior."
        ko:
          sun: "유성이 반짝거리는 심야에\n지그시 하늘을 바라보는 모습은\n고향의 기억을 떠올리는 것 같다."
          moon: "실루엣 때문에 별님이\n다시 태어난 것이라고 여겨지고 있다.\n왜인지 메테노를 매우 좋아한다."
        zh_simp:
          sun: "在流星闪耀的深夜里\n凝望着天空的样子，\n似乎是在怀念故乡。"
          moon: "从它的轮廓判断，\n被认为是星星的转世。\n不知为何很喜欢小陨星。"
        zh_trad:
          sun: "在流星閃耀的深夜裡\n凝望著天空的樣子，\n似乎是在緬懷故鄉。"
          moon: "因為外表輪廓的關係，\n被認為是星星的轉世。\n不知為何很喜歡小隕星。"
