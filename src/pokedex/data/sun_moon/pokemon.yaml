      descriptions:
        jp_kana:
          sun: "たくさんの　ピカチュウを　あつめ\nはつでんしょを　つくる　けいかくが\nさいきん　はっぴょう　された。"
          moon: "でんきを　ためる　せいしつ。\nときどき　おもいきり　ほうでん\nしないと　ストレスを　かんじる。"
        jp_kanji:
          sun: "たくさんの　ピカチュウを　集め\n発電所を　造る　計画が\n最近　発表　された。"
          moon: "電気を　溜める　性質。\n時々　思い切り　放電\nしないと　ストレスを　感じる。"
        en:
          sun: "A plan was recently announced to gather\nmany Pikachu and make an electric power plant."
          moon: "It’s in its nature to store electricity. It feels\nstressed now and then if it’s unable to fully\ndischarge the electricity."
        fr:
          sun: "Un projet de centrale électrique fonctionnant\nen rassemblant une foule de Pikachu a été\nrécemment annoncé."
          moon: "Un Pokémon capable de condenser l’électricité.\nIl doit décharger l’énergie accumulée de temps\nen temps au risque d’accroître son stress."
        it:
          sun: "Recentemente è stato presentato un progetto\nper riunire numerosi Pikachu e costruire\nuna centrale elettrica."
          moon: "Accumula naturalmente elettricità. Se ogni tanto\nnon si sfoga emettendo scariche elettriche,\nrischia di essere sopraffatto dallo stress."
        de:
          sun: "Vor Kurzem wurden Pläne verkündet,\nmithilfe einer großen Anzahl an Pikachu\nein ganzes Kraftwerk zu betreiben."
          moon: "Es liegt in seiner Natur, konstant Elektrizität in\nsich anzustauen. Kann es diese nicht regelmäßig\nentladen, löst dies Stress aus."
        es:
          sun: "Recientemente se ha presentado un proyecto\npara reunir numerosos Pikachu y crear con ellos\nuna central eléctrica."
          moon: "Pikachu almacena electricidad en su cuerpo.\nSi no la libera de vez en cuando y se desfoga,\npuede sufrir estrés."
        ko:
          sun: "많은 피카츄를 모아서\n발전소를 만들 계획이\n최근 발표되었다."
          moon: "전기를 모으는 성질을 가졌다.\n가끔 마음껏 방전하지\n않으면 스트레스를 받는다."
        zh_simp:
          sun: "最近发表了聚集大量皮卡丘，\n建造发电厂的计划。"
          moon: "有积聚电力的特质。\n不时常尽情释放电力的话，\n就会倍感压力。"
        zh_trad:
          sun: "最近發表了聚集大量皮卡丘\n來建造發電廠的計畫。"
          moon: "有積聚電力的特質。\n不時常盡情釋放電力的話，\n就會倍感壓力。"
    pikachu_original_cap:
