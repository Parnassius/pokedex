      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      held_items:
        rare: chesto_berry
      descriptions:
        jp_kana:
          sun: "しょうたいふめい。　ボロきれの\nなかみを　みた　とある　がくしゃは\nきょうふの　あまり　ショックしした。"
          moon: "おそろしい　すがたを　ボロぬので\nかくし　ひとや　ほかの　ポケモンに\nちかづく　さみしがりや。"
        jp_kanji:
          sun: "正体不明。　ボロ布の\n中身を　みた　とある　学者は\n恐怖の　あまり　ショック死した。"
          moon: "恐ろしい　姿を　ボロ布で\n隠し　人や　他のポケモンに\n近づく　寂しがりや。"
        en:
          sun: "Its actual appearance is unknown. A scholar\nwho saw what was under its rag was\noverwhelmed by terror and died from the shock."
          moon: "A lonely Pokémon, it conceals its terrifying\nappearance beneath an old rag so it can get\ncloser to people and other Pokémon."
        fr:
          sun: "Sa véritable apparence est inconnue. Les\nchercheurs qui ont vu sous son déguisement\nsont littéralement morts de peur."
          moon: "Son apparence est si effrayante qu’il doit se\ndéguiser pour oser s’approcher des gens et\ndes autres Pokémon."
        it:
          sun: "Nessuno conosce il suo vero aspetto.\nPare che uno studioso sia morto di paura dopo\naver guardato sotto il panno che lo nasconde."
          moon: "Soffre molto la solitudine e per poter avvicinare\ngli esseri umani e gli altri Pokémon, cela il suo\ntremendo aspetto sotto a un panno."
        de:
          sun: "Niemand weiß, wie es wirklich aussieht. Ein\nForscher, der unter seinen Lumpen blickte, soll\nsich buchstäblich zu Tode erschreckt haben."
          moon: "Es versteckt seine schreckliche Gestalt unter\neinem Lumpen, um sich Menschen und anderen\nPokémon zu nähern. Oft fühlt es sich einsam."
        es:
          sun: "Su verdadero aspecto es un misterio total. Un\ninvestigador que intentó mirar dentro del saco\nrecibió, literalmente, un susto de muerte."
          moon: "El saco andrajoso le permite ocultar su aspecto\naterrador para acercarse a otros Pokémon o a la\ngente y vencer así la soledad que lo atenaza."
        ko:
          sun: "정체불명. 누더기 속을 본\n어떤 학자는 공포에서\n헤어나오지 못하고 쇼크사했다."
          moon: "무시무시한 모습을 누더기로 가리고\n사람이나 다른 포켓몬에게 다가가는\n외로움이 많은 포켓몬이다."
        zh_simp:
          sun: "正身不明。\n某位学者看过破布里面后，\n因为太过恐惧而被惊吓致死。"
          moon: "这个怕寂寞的家伙，\n会用破布隐藏自己可怕的样子\n来接近人和其他宝可梦。"
        zh_trad:
          sun: "真面目是個謎。\n某個看過破布裡面的學者\n因為太可怕而被活活嚇死了。"
          moon: "用破破爛爛的布隱藏起可怕的模樣，\n接近人類和其他寶可夢的寂寞傢伙。"
    mimikyu_busted_form:
      form_id: 1
      names:
        jp_kana: ばれたすがた
        jp_kanji: ばれたすがた
        en: Busted Form
        fr: Forme Démasquée
        it: Forma Smascherata
        de: Entlarvte Form
        es: Forma Descubierta
        ko: 들킨 모습
        zh_simp: 现形的样子
        zh_trad: 現形的樣子
      base_stats:
        hp: 55
        attack: 90
        defense: 80
        special_attack: 50
        special_defense: 105
        speed: 96
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      descriptions:
        jp_kana:
          sun: "せっかく　ばけていたのに　くびが\nおれてしまった。　なかみは　まだ\nたぶん　むきずだが　かなしいのだ。"
          moon: "こうげきされて　くびが　へしおれたり\nかぶった　ぬのが　やぶれてしまうと\nなかみが　よなべで　つくろうのだ。"
        jp_kanji:
          sun: "せっかく　化けていたのに　首が\n折れてしまった。　中身は　まだ\n多分　無傷だが　悲しいのだ。"
          moon: "攻撃されて　首が　へし折れたり\nかぶった　布が　破れてしまうと\n中身が　夜なべで　繕うのだ。"
        en:
          sun: "After going to all the effort of disguising itself,\nits neck was broken. Whatever is inside is\nprobably unharmed, but it’s still feeling sad."
          moon: "If its neck is broken or its rag torn during an\nattack, it works through the night to patch it."
        fr:
          sun: "Tous ces efforts pour se déguiser réduits à\nnéant ! Il n’a probablement pas eu mal,\nmais il doit être bien triste."
          moon: "Si le cou de son déguisement se brise sous\nles attaques, ou si le tissu se déchire, il reste\ndebout toute la nuit pour réparer les dégâts."
        it:
          sun: "Dopo tanti sforzi per camuffarsi, il collo del\ntravestimento si è rotto! Sembra che il Pokémon\nstia bene, ma dev’esserci rimasto un po’ male..."
          moon: "Se a causa di un attacco il tessuto del panno\nche lo ricopre si strappa, il Pokémon\nal suo interno passa la notte a ripararlo."
        de:
          sun: "Obwohl es sich mit seiner Verkleidung viel Mühe\ngegeben hat, ist der Hals umgeknickt. Mimigma\nselbst ist nur im übertragenen Sinne geknickt."
          moon: "Wenn im Kampf sein Hals umknickt oder der\nStoff reißt, bringt es die ganze Nacht damit zu,\nseine Verkleidung wieder zu flicken."
        es:
          sun: "Tanto esfuerzo en hacer el disfraz y al final\nse le ha roto el cuello. No parece que le haga\ndaño, pero se siente triste."
          moon: "Si durante un combate se le desgarra el saco\nque usa para disfrazarse, se pasa la noche\nentera reparando los daños."
        ko:
          sun: "겨우 둔갑했는데 목이\n부러져버렸다. 안은 아마도\n아직 멀쩡하겠지만 슬프다."
          moon: "공격을 받아 목이 꺾이거나\n뒤집어쓴 천이 찢어져 버리면\n밤을 새워서 수선한다."
        zh_simp:
          sun: "好不容易乔装打扮，脖子却折了。\n本体基本上还是好好的，\n但看着还是感觉很悲惨。"
          moon: "被攻击后脖子折了，\n或是身上披的布破了的话，\n本体就会加夜班进行修缮。"
        zh_trad:
          sun: "特地喬裝打扮，脖子卻折斷了。\n布裡面的牠應該沒事，\n但感覺牠很傷心。"
          moon: "被攻擊後脖子折斷，\n或是身上披的布破了的話，\n本體就會熬夜進行修補。"
