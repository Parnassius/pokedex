        jp_kana:
          sun: "クチバシに　くった　きのみの　タネを\nためこむ。　てきや　えものに\nであうと　いっきに　はっしゃする。"
          moon: "クチバシを　そりかえらせ　いろんな\nおとで　なく。　かなり　うるさいので\nまわりの　おたくには　きらわれるぞ。"
        jp_kanji:
          sun: "クチバシに　喰った　きのみの　タネを\n溜め込む。　敵や　獲物に\n出会うと　一気に　発射する。"
          moon: "クチバシを　反り返らせ　色んな\n音で　鳴く。　かなり　うるさいので\n周りの　御宅には　嫌われるぞ。"
        en:
          sun: "It eats berries and stores their seeds in its\nbeak. When it encounters enemies or prey,\nit fires off all the seeds in a burst."
          moon: "By bending its beak, it can produce a variety of\ncalls and brand itself a noisy nuisance for\nits neighbors."
        fr:
          sun: "Il garde toujours dans son bec les pépins des\nfruits qu’il mange, ce qui lui permet de faire feu\ndès qu’un ennemi se présente."
          moon: "En déformant son bec, il peut produire une\nribambelle de sons différents, plus bruyants les\nuns que les autres. Le cauchemar des voisins."
        it:
          sun: "Conserva nel becco i semi delle bacche\nche mangia, per poi spararli contro nemici\ne prede non appena ne incontra."
          moon: "Mutando la forma del becco è in grado di\nprodurre i suoni più svariati. La sua rumorosità\ngli ha conquistato la fama di incubo del vicinato."
        de:
          sun: "Sammelt Beerensamen in seinem Schnabel.\nBegegnet es Feinden oder Beute, kann es alle\nauf einmal verschießen."
          moon: "Indem es seinen Schnabel verformt, kann es\neine große Bandbreite an Lauten ausstoßen.\nDer Alptraum eines jeden Nachbarn."
        es:
          sun: "Almacena en su pico las semillas de las bayas\nde las que se alimenta para usarlas como arma\ncontra enemigos y posibles presas."
          moon: "Puede deformar su pico para producir los\nsonidos más diversos. Debido al estruendo que\ncrea, se granjea la enemistad de sus vecinos."
        ko:
          sun: "먹은 나무열매 씨앗을 부리에\n저장한다. 적이나 먹이와\n마주치면 한 번에 발사한다."
          moon: "부리를 젖혀서 여러 가지\n소리로 운다. 꽤 시끄러워서\n인근에 미움을 산다."
        zh_simp:
          sun: "把吃掉的树果的种子储藏在鸟嘴里。\n遇到敌人或猎物时，\n就一口气发射出去。"
          moon: "扬起鸟嘴，发出各种叫声。\n因为相当吵闹，\n所以周围的居民们很讨厌它。"
        zh_trad:
          sun: "把吃掉的樹果的種子儲藏在鳥嘴裡。\n遇到敵人或獵物時，\n就一口氣發射出去。"
          moon: "揚起鳥嘴，以各種聲音鳴叫。\n因為相當吵鬧，\n所以被周圍的居民們嫌棄。"
toucannon:
  species_id: 733
  names:
    jp_kana: ドデカバシ
    jp_kanji: ドデカバシ
    en: Toucannon
    fr: Bazoucan
    it: Toucannon
    de: Tukanon
    es: Toucannon
    ko: 왕큰부리
    zh_simp: 铳嘴大鸟
    zh_trad: 銃嘴大鳥
  forms:
    toucannon:
      form_id: 0
      base_stats:
        hp: 80
        attack: 120
        defense: 75
        special_attack: 75
        special_defense: 75
        speed: 60
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - skill_link
      hidden_ability: sheer_force
      held_items:
        rare: rawst_berry
      descriptions:
        jp_kana:
          sun: "クチバシを　はつねつさせ　たたかう。\nそのおんどは　１００どを　ゆうに　こえ\nつつかれるだけで　おおやけど。"
          moon: "たいないの　ガスを　クチバシの　なかで\nばくはつさせ　きのタネを　はっしゃ。\nおおいわも　こなごなにする　パワー。"
        jp_kanji:
          sun: "クチバシを　発熱させ　戦う。\nその温度は　１００度を　優に　超え\n突かれるだけで　大火傷。"
          moon: "体内の　ガスを　クチバシの　中で\n爆発させ　木のタネを　発射。\n大岩も　粉々にする　パワー。"
        en:
          sun: "When it battles, its beak heats up. The\ntemperature can easily exceed 212 degrees\nFahrenheit, causing severe burns when it hits."
          moon: "Within its beak, its internal gas ignites,\nexplosively launching seeds with enough power\nto pulverize boulders."
        fr:
          sun: "Pendant le combat, son bec chauffe et dépasse\nallègrement les 100 °C. Ses adversaires\nrepartent généralement avec de graves brûlures."
          moon: "Il fait exploser ses gaz digestifs pour propulser\nles pépins qu’il a dans le bec, avec une force\ncapable de réduire en miettes de gros rochers."
        it:
          sun: "Quando lotta arroventa il suo becco a una\ntemperatura di oltre 100 °C, sufficiente a\nprovocare delle bruciature ai suoi avversari."
          moon: "Sfruttando il gas del suo corpo, genera nel\nbecco un’esplosione per sparare semi con una\npotenza tale da ridurre in frantumi un macigno."
        de:
          sun: "Erhitzt vor jedem Kampf seinen Schnabel auf\nüber 100 °C. Dadurch erleiden Gepiesackte\nschwere Verbrennungen."
          moon: "Lässt körpereigene Gase in seinem Schnabel\nexplodieren, um Samen zu verschießen.\nSelbst große Felsen kann es damit zerstören."
        es:
          sun: "Cuando va a combatir, calienta su pico hasta\ntemperaturas que superan los 100 °C, lo que\npuede causar graves quemaduras al contacto."
          moon: "Hace estallar los gases de su interior para\ndisparar semillas por el pico con una potencia\ncapaz de pulverizar rocas enormes."
        ko:
          sun: "부리를 발열시켜 싸운다.\n그 온도는 100도를 훨씬 넘어\n쪼이기만 해도 큰 화상을 입는다."
          moon: "체내의 가스를 부리 안에서\n폭발시켜 씨앗을 발사. 큰 바위도\n가루로 만들어버릴 정도의 파워다."
        zh_simp:
          sun: "让鸟嘴发热来战斗。\n那温度足足超过１００度，\n只要被啄到就会严重灼伤。"
          moon: "让体内的气体在嘴里爆发，\n发射出树果的种子。\n是连巨大岩石也能粉碎的力量。"
        zh_trad:
          sun: "讓鳥嘴發熱來戰鬥。\n那溫度足足超過１００度，\n只要被啄到就會嚴重灼傷。"
          moon: "在嘴裡爆發體內的氣體，\n發射出樹果的種子。\n威力大到連巨大的岩石也能粉碎。"
yungoos:
  species_id: 734
  names:
    jp_kana: ヤングース
    jp_kanji: ヤングース
    en: Yungoos
    fr: Manglouton
    it: Yungoos
    de: Mangunior
    es: Yungoos
    ko: 영구스
    zh_simp: 猫鼬少
    zh_trad: 貓鼬少
  forms:
    yungoos:
      form_id: 0
      base_stats:
        hp: 48
        attack: 70
        defense: 30
        special_attack: 30
        special_defense: 30
        speed: 45
      evs_yield:
        hp: 0
        attack: 1
