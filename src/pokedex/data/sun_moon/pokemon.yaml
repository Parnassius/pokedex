      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
        - storm_drain
      hidden_ability: water_veil
      descriptions:
        jp_kana:
          sun: "ピンクいろの　かわの　ぶぶんは\nたいようこうを　ためて　ひかる。\nカモフラージュの　ためと　いわれる。"
          moon: "２まいの　おビレで　げんきにジャンプ。\nかいめんに　とびあがった　ところを\nキャモメが　くわえ　さらっていく。"
        jp_kanji:
          sun: "ピンク色の　皮の　部分は\n太陽光を　溜めて　光る。\nカモフラージュの　ためと　いわれる。"
          moon: "２枚の　尾ビレで　元気にジャンプ。\n海面に　飛びあがった　ところを\nキャモメが　くわえ　さらっていく。"
        en:
          sun: "It absorbs sunlight with the pink areas of its\nskin, which then shine. This appears to be a\nform of camouflage."
          moon: "Its double tail fins propel its energetic jumps.\nWhen it breaks the surface of the sea, Wingull\nswoop down to grab it on the fly."
        fr:
          sun: "Il stocke les rayons solaires grâce aux parties\nroses de sa peau, qui brillent ensuite. Il s’agirait\nen fait d’une technique de camouflage."
          moon: "Avec sa double nageoire caudale, il peut bondir\nhors de l’eau. C’est souvent à ce moment que\nles Goélise de passage l’attrapent et le gobent."
        it:
          sun: "I motivi rosa sul suo corpo brillano dopo aver\nimmagazzinato la luce solare. Pare che questa\nsia una forma di mimetismo."
          moon: "Le pinne caudali gli permettono di saltare fuori\ndall’acqua. Spesso Wingull approfitta di questi\nmomenti per acchiapparlo al volo."
        de:
          sun: "Der rosafarbene Teil seiner Haut speichert\nSonnenlicht und leuchtet. Es wird angenommen,\ndass dies der Tarnung dient."
          moon: "Mit ihren beiden Flossen können sie hoch in die\nLuft springen. Über der Meeresoberfläche lauern\njedoch Wingull."
        es:
          sun: "Las marcas rosadas de su piel brillan con\nintensidad tras almacenar luz solar. Se cree\nque esta característica le permite camuflarse."
          moon: "Sus dos aletas le permiten saltar fuera del agua,\nmomento que aprovechan los Wingull para\nllevárselos al buche."
        ko:
          sun: "핑크색의 가죽 부분은\n태양광을 모아서 빛을 낸다.\n위장하기 위해서라고 전해진다."
          moon: "2장의 꼬리지느러미로 힘차게 점프한다.\n해수면을 뛰어오르는 순간\n갈모매가 물고 가버린다."
        zh_simp:
          sun: "粉红色的那部分皮肤\n会储存太阳光并发光。\n听说是用来做保护色的。"
          moon: "用２片尾鳍活力四射地跳跃。\n跳出海面的那一刻，\n会被长翅鸥叼走。"
        zh_trad:
          sun: "粉紅色的皮膚部分\n會儲存太陽光發光。\n聽說是用來做保護色的。"
          moon: "用２枚尾鰭活力充沛地跳躍。\n跳出海面的那一刻，\n會被長翅鷗叼走。"
