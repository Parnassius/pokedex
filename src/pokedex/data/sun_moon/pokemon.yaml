      descriptions:
        jp_kana:
          sun: "べつせかいに　すむと　いわれる。\nぜんしんから　はげしいひかりを　はなち\nやみよも　まひるのように　てらすのだ。"
          moon: "コスモッグが　しんかした　♂だと\nいわれる。　だい３の　めが　うかぶとき\nべつせかいへと　かけぬけていく。"
        jp_kanji:
          sun: "別世界に　棲むと　いわれる。\n全身から　激しい光を　放ち\n闇夜も　真昼のように　照らすのだ。"
          moon: "コスモッグが　進化した　♂だと\nいわれる。　第３の　眼が　浮かぶとき\n別世界へと　駆け抜けていく。"
        en:
          sun: "It is said to live in another world. The intense\nlight it radiates from the surface of its body can\nmake the darkest of nights light up like midday."
          moon: "This Pokémon is said to be a male evolution of\nCosmog. At the activation of its third eye, it\ndeparts for another world."
        fr:
          sun: "Il viendrait d’un autre monde. Tout son corps\német une puissante lumière qui peut changer\nla nuit la plus noire en un jour radieux."
          moon: "On suppose que c’est l’évolution de Cosmog\nlorsqu’il s’agit d’un mâle. Son troisième œil\napparaît quand il s’en va vers un autre monde."
        it:
          sun: "Si dice che viva in un altro mondo. Dal corpo\nemette una luce così accecante da illuminare\na giorno anche la notte più buia."
          moon: "Si dice che sia l’evoluzione maschile di Cosmog.\nQuando il suo terzo occhio si manifesta, significa\nche è in viaggio verso un altro mondo."
        de:
          sun: "Es heißt, es komme aus einer anderen Welt.\nSein ganzer Körper leuchtet strahlend hell\nund macht die finsterste Nacht zum Tage."
          moon: "Es heißt, es sei die männliche Endstufe der\nEntwicklungsreihe von Cosmog. Ist sein drittes\nAuge aktiviert, zieht es in eine andere Welt."
        es:
          sun: "Se cree que proviene de otro mundo. El brillo\nque emite su cuerpo es tal que puede hacer\nque la noche más profunda parezca pleno día."
          moon: "Se dice que es la evolución final macho de\nCosmog. Cuando su tercer ojo se abre, parte\nhacia otro mundo."
        ko:
          sun: "다른 세계에 산다고 전해진다.\n온몸에서 격렬한 빛을 내뿜어\n깜깜한 밤도 한낮처럼 비춘다."
          moon: "코스모그가 진화한 수컷이라고\n전해진다. 제3의 눈이 뜰 때\n다른 세계로 달려나간다."
        zh_simp:
          sun: "据说是栖息在其他世界的。\n全身放出猛烈的光芒，\n即使是暗夜也会照得如同白昼。"
          moon: "据说是科斯莫古进化后的♂。\n当第３只眼浮现时，\n就会奔向其他世界。"
        zh_trad:
          sun: "傳說中棲息在另一個世界裡。\n當全身釋放出強烈的光芒時，\n能將暗夜照亮如白晝。"
          moon: "據說是科斯莫古進化後的♂。\n當第３隻眼浮現時，\n就會奔向其他世界。"
