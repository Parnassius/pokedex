          sun: "セルが　５０％　あつまった　すがた。\nてきたい　するものは　いっさいの\nてかげんなく　しょうめつ　させる。"
          moon: "せいたいけいを　かんし　していると\nかんがえられている。　さらなる\nちからを　ひめているとの　ウワサ。"
        jp_kanji:
          sun: "セルが　５０％　集まった　姿。\n敵対　する者は　一切の\n手加減なく　消滅　させる。"
          moon: "生態系を　監視　していると\n考えられている。　さらなる\n力を　秘めているとの　ウワサ。"
        en:
          sun: "This is Zygarde’s form when it has gathered\n50% of its cells. It wipes out all those who\noppose it, showing not a shred of mercy."
          moon: "It’s thought to be monitoring the ecosystem.\nThere are rumors that even greater power lies\nhidden within it."
        fr:
          sun: "La forme que Zygarde prend lorsqu’il rassemble\n50 % de ses Cellules. Il désintègre sans merci\ntout ennemi qui ose s’opposer à lui."
          moon: "Ce Pokémon surveille l’équilibre de l’écosystème\nen permanence. Si l’on en croit la rumeur, il aurait\nun grand pouvoir caché..."
        it:
          sun: "Quando il 50% delle sue cellule si aggrega,\nassume questa forma.\nAnnienta senza pietà chiunque gli si opponga."
          moon: "Si ritiene che vigili sull’equilibrio dell’ecosistema.\nCorre voce che nasconda in sé un potere\npiù grande di quanto si possa immaginare."
        de:
          sun: "Diese Form vereint 50 % der Zellen in sich.\nWer diesem Pokémon Widerstand leistet,\nwird ohne Gnade ausgelöscht."
          moon: "Man nimmt an, dass es das Ökosystem\nbeobachtet und über geheime Kräfte verfügt."
        es:
          sun: "La forma que adopta Zygarde al reunir el\n50% de sus células. Quienes se le oponen son\naniquilados sin la menor vacilación."
          moon: "Se cree que este Pokémon vela por el equilibrio\ndel ecosistema. Se rumorea que en su interior\nyace un poder que va más allá de la imaginación."
        ko:
