        jp_kana:
          sun: "おおきな　キノコが　パラセクトを\nあやつっている。　よく　マシェードと\nなわばりあらそいを　している。"
          moon: "キノコの　カサから　どくのほうしを\nまきちらす。　ほうしを　あつめて\nせんじると　かんぽうやくに　なる。"
        jp_kanji:
          sun: "大きな　キノコが　パラセクトを\n操っている。　よく　マシェードと\n縄張り争いを　している。"
          moon: "キノコの　カサから　毒の胞子を\n撒き散らす。　胞子を　集めて\n煎じると　漢方薬に　なる。"
        en:
          sun: "The large mushroom on its back controls it.\nIt often fights over territory with Shiinotic."
          moon: "It scatters toxic spores from its mushroom cap.\nOnce harvested, these spores can be steeped\nand boiled down to prepare herbal medicines."
        fr:
          sun: "Le gros champignon sur son dos contrôle\nle Pokémon. Lampignon et Parasect\nse disputent souvent un même territoire."
          moon: "Il répand des spores empoisonnées depuis son\nchapeau. On peut les récolter et les faire sécher\npour préparer des remèdes traditionnels."
        it:
          sun: "Parasect è controllato dal grande fungo che ha\nsul dorso. Spesso si contende il territorio con\ngli Shiinotic."
          moon: "Sparge spore velenose dal fungo che ha\nsul dorso. Se raccolte e fatte bollire, queste\nspore possono essere usate come farmaco."
        de:
          sun: "Parasek wird von dem Pilz auf seinen Rücken\nkontrolliert. Es ist oft mit Lamellux in\nRevierstreitigkeiten verstrickt."
          moon: "Der Pilz auf seinem Rücken stößt Giftsporen\naus. Kocht man ihn ab, lässt er sich als\nnatürliches Heilmittel verwerten."
        es:
          sun: "La gran seta en su lomo lo controla. A menudo\nlibra luchas territoriales contra Shiinotic."
          moon: "La gran seta en su lomo dispersa esporas\nvenenosas, que pueden servir para elaborar\nremedios medicinales."
        ko:
          sun: "큰 버섯이 파라섹트를\n조종하고 있다. 자주 마셰이드와\n영역싸움을 하고 있다."
          moon: "버섯의 갓에서 독 포자를\n흩뿌린다. 포자를 모아서\n달이면 한약이 된다."
        zh_simp:
          sun: "大大的蘑菇操纵着派拉斯特。\n经常和灯罩夜菇争夺领地。"
          moon: "从蘑菇的菌伞处撒出有毒的孢子。\n收集孢子用水煎就能成为中药。"
        zh_trad:
          sun: "大大的蘑菇操縱著派拉斯特。\n經常和燈罩夜菇爭奪地盤。"
          moon: "從蘑菇的菌傘處撒出有毒的孢子。\n收集孢子用水煎就能成為中藥。"
