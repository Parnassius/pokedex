      abilities:
        - swarm
        - technician
      hidden_ability: steadfast
      descriptions:
        jp_kana:
          sun: "ニンジャのように　すばやい　うごきで\nえものを　まどわせる。　いっしゅんの\nスキに　カマで　きりさいて　しまう。"
          moon: "わかいうちは　やまおくで　むれて\nくらし　カマでの　たたかいかたや\nこうそくいどうを　しゅぎょうする。"
        jp_kanji:
          sun: "ニンジャのように　素早い　動きで\n獲物を　惑わせる。　一瞬の\n隙に　鎌で　切り裂いて　しまう。"
          moon: "若いうちは　山奥で　群れて\n暮らし　鎌での　戦いかたや\n高速移動を　修行する。"
        en:
          sun: "It confuses its prey with its quick, ninja-like\nmovements. Then, in an instant, it cleaves\nthem with its scythes."
          moon: "While young, they live together deep in the\nmountains, training themselves in how to fight\nwith their scythes and move at high speeds."
        fr:
          sun: "Sa rapidité de ninja embrouille sa proie.\nAu moindre moment d’hésitation, il la coupe\nen deux d’un coup de tranchant."
          moon: "Les jeunes Insécateur se rassemblent au fond\ndes montagnes pour s’entraîner à se battre\navec leurs lames et à se déplacer à toute allure."
        it:
          sun: "Confonde la sua preda muovendosi veloce\ncome un ninja e in pochi attimi la fa a pezzi\ncon le sue falci."
          moon: "I giovani Scyther vivono in gruppi nei recessi\ndelle montagne, dove si esercitano a lottare\ncon le falci e a muoversi rapidissimi."
        de:
          sun: "Seine schnellen, Ninja-artigen Reflexe irritieren\nseine Beute. Findet es eine Lücke in ihrer\nDefensive, schlitzt es sie mit seinen Sicheln auf."
          moon: "Junge Sichlor wohnen in Gruppen tief in den\nBergen. Dort trainieren sie ihre Schnelligkeit\nund üben den Kampf mit Sicheln."
        es:
          sun: "Se mueve tan rápido como un ninja, lo que\ndesconcierta a sus presas. Es entonces cuando\naprovecha para atacar con su par de guadañas."
          moon: "Cuando es joven, vive en grupo en las montañas,\ndonde lucha con sus guadañas y practica sus\nraudos movimientos junto a sus compañeros."
        ko:
          sun: "닌자처럼 재빠른 행동으로\n먹이를 혼란스럽게 한다. 한순간의\n빈틈에 낫으로 잘라버린다."
          moon: "젊을 때는 산속에 무리 지어\n살며 낫으로 싸우는 법이나\n고속이동을 수련한다."
        zh_simp:
          sun: "以忍者般敏捷的动作令猎物感到迷惑。\n然后趁对方麻痹大意的一瞬间\n用镰刀将其切碎。"
          moon: "年轻的时候，在深山里群居生活，\n修炼用镰刀进行战斗以及高速移动。"
        zh_trad:
          sun: "以忍者般敏捷的動作迷惑獵物，\n然後趁對方露出破綻的一瞬間\n用鐮刀將獵物切碎。"
          moon: "年輕的時候在深山裡群居生活，\n修鍊用鐮刀戰鬥以及高速移動的技術。"
