kangaskhan:
  species_id: 115
  names:
    jp_kana: ガルーラ
    jp_kanji: ガルーラ
    en: Kangaskhan
    fr: Kangourex
    it: Kangaskhan
    de: Kangama
    es: Kangaskhan
    ko: 캥카
    zh_simp: 袋兽
    zh_trad: 袋獸
  forms:
    kangaskhan:
      form_id: 0
      base_stats:
        hp: 105
        attack: 95
        defense: 80
        special_attack: 40
        special_defense: 80
        speed: 90
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - monster
      abilities:
        - early_bird
        - scrappy
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          sun: "ガルーラの　ははおやの　あいじょうは\nふかい。　わがこを　まもるためならば\nしさえ　おそれないと　いわれている。"
          moon: "おなかの　こどもは　およそ　３ねんで\nおやばなれする。　ははおやが\nおおごえで　なくのは　そのときだけ。"
        jp_kanji:
          sun: "ガルーラの　母親の　愛情は\n深い。　我が子を　守るためならば\n死さえ　恐れないと　いわれている。"
          moon: "お腹の　子どもは　およそ　３年で\n親離れする。　母親が\n大声で　鳴くのは　その時だけ。"
        en:
          sun: "Kangaskhan’s maternal love is so deep that it\nwill brave death to protect its offspring."
          moon: "The child in its pouch leaves home after roughly\nthree years. That is the only time the mother is\nheard to cry wildly."
        fr:
          sun: "L’amour maternel de Kangourex est sans limites.\nElle marcherait au-devant de la mort pour\nprotéger son bébé."
          moon: "Le bébé quitte la poche de sa mère au bout\nde trois ans. C’est le seul moment de sa vie\noù elle pleure à chaudes larmes."
        it:
          sun: "L’amore materno di Kangaskhan è molto\nprofondo. Non esiterebbe a mettere in pericolo\nla propria vita pur di proteggere il suo piccolo."
          moon: "Il cucciolo esce dal marsupio verso i tre anni\ned è l’unico momento in cui la madre si lascia\nsfuggire possenti grida."
        de:
          sun: "Die Mutterliebe des ausgewachsenen Kangama\nist tief. Es wäre sogar bereit, sein eigenes Leben\nzu opfern, um sein Junges zu beschützen."
          moon: "Das Junge verlässt den Beutel der Mutter im\nAlter von drei Jahren. Dies ist der einzige Zeit-\npunkt, zu dem man die Mutter laut weinen hört."
        es:
          sun: "Profesa un fuerte amor por su cría. Se dice que\nes capaz de enfrentarse sin temor a cualquier\npeligro con tal de protegerla."
          moon: "La cría se separa de su madre cuando ronda los\ntres años. Es el único momento en el que la\nmadre llora con vehemencia."
        ko:
          sun: "캥카의 모성애는 깊다.\n자기 아이를 지키기 위해서라면\n죽음조차 두려워하지 않는다고 한다."
          moon: "뱃속의 새끼는 대략 3년이면\n자립한다. 어미가 큰 소리로\n우는 것은 그때뿐이다."
        zh_simp:
          sun: "袋兽的母爱很深。\n如果是为了守护自己的孩子，\n据说连死都毫不畏惧。"
          moon: "育儿袋中的孩子大约３年后\n才会离开母亲。\n只有在那个时候母亲才会大声地鸣叫。"
        zh_trad:
          sun: "袋獸的母愛很深。\n如果是為了守護自己的孩子，\n據說連死都毫不畏懼。"
          moon: "育兒袋裡的孩子\n大約３年左右會離開母親自立。\n只有在那個時候母親才會大聲鳴叫。"
    kangaskhan_mega:
      form_id: 1
      names:
        jp_kana: メガガルーラ
        jp_kanji: メガガルーラ
        en: Mega Kangaskhan
        fr: Méga-Kangourex
        it: MegaKangaskhan
        de: Mega-Kangama
        es: Mega-Kangaskhan
        ko: 메가캥카
        zh_simp: 超级袋兽
        zh_trad: 超級袋獸
      base_stats:
        hp: 105
        attack: 125
        defense: 100
        special_attack: 60
        special_defense: 100
        speed: 100
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - monster
      abilities:
        - parental_bond
      descriptions:
        jp_kana:
          sun: "メガガルーラが　つよい　りゆうは\nこどもの　せいちょうに　よろこび\nはりきっている　ママの　せい。"
          moon: "メガシンカで　こどもが　せいちょう。\nまけんきばかりが　つよく　ははおやは\nしょうらいが　すこし　しんぱい。"
        jp_kanji:
          sun: "メガガルーラが　強い　理由は\n子どもの　成長に　喜び\n張り切っている　ママの　せい。"
          moon: "メガシンカで　子どもが　成長。\n負けん気ばかりが　強く　母親は\n将来が　少し　心配。"
        en:
          sun: "Mega Kangaskhan’s strength derives from the\nmother’s happiness about her child’s growth.\nWatching it grow up keeps her spirits high."
          moon: "Thanks to Mega Evolution, its child grows. But\nas the child is good only at fighting and nothing\nelse, its mother feels uneasy about its future."
        fr:
          sun: "C’est grâce à la fierté d’une mère qui voit son\nenfant grandir que Méga-Kangourex est si fort."
          moon: "La Méga-Évolution a fait grandir le bébé. Il est\nhargneux et refuse de perdre, au point que\nsa mère s’inquiète pour son avenir."
        it:
          sun: "La sua forza nasce dalla gioia materna che\nprova nel vedere il suo piccolo crescere sano\ngrazie ai propri sforzi."
          moon: "Con la megaevoluzione, il suo piccolo è\ncresciuto diventando molto competitivo e sua\nmadre è preoccupata per il suo futuro."
        de:
          sun: "Der Grund für die Stärke von Mega-Kangama\nist die überschwängliche Freude der Mutter\nüber das Heranwachsen ihres Jungen."
          moon: "Durch die Mega-Entwicklung ist das Junge\ngewachsen. Auch sein unnachgiebiger Wille ist\nausgeprägter, was der Mutter Sorgen bereitet."
        es:
          sun: "La fuerza de Mega-Kangaskhan radica en la\nfelicidad que siente una madre al ver crecer\na sus hijos."
          moon: "Gracias a la megaevolución, su cría ha crecido.\nComo esta es de naturaleza muy competitiva, a\nsu madre le preocupa un poco su futuro."
        ko:
          sun: "메가캥카가 강한 이유는\n아이의 성장을 기뻐하면서\n의욕이 넘치는 엄마 때문이다."
          moon: "메가진화로 새끼가 성장했다.\n경쟁심이 강해서 어미는\n새끼의 장래가 조금 걱정된다."
        zh_simp:
          sun: "超级袋兽之所以强大，\n是母亲因孩子的成长而喜悦，\n变得干劲十足的缘故。"
          moon: "孩子会因超级进化而成长。\n可总是争强好胜，\n母亲对其将来有点担心。"
        zh_trad:
          sun: "超級袋獸之所以強大，\n是母親因孩子的成長而感到喜悅，\n變得幹勁十足的緣故。"
          moon: "孩子因超級進化而成長，\n但總是爭強好勝，\n所以母親對孩子的將來有點擔心。"
