      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - oblivious
      hidden_ability: sweet_veil
      held_items:
        rare: grassy_seed
      descriptions:
        jp_kana:
          sun: "みを　まもるため　ヘタが　はったつ。\nかなりの　かたさで　とりポケモンに\nつつかれても　ぜんぜん　へいきだ。"
          moon: "いつも　げんきに　とびはねている。\nげんきな　すがたと　いいかおりで\nまわりに　ポケモンが　あつまってくる。"
        jp_kanji:
          sun: "身を　守るため　ヘタが　発達。\nかなりの　硬さで　とりポケモンに\n突かれても　全然　平気だ。"
          moon: "いつも　元気に　飛び跳ねている。\n元気な　姿と　いい香りで\n周りに　ポケモンが　集まってくる。"
        en:
          sun: "The sepals on its head developed to protect its\nbody. These are quite hard, so even if pecked\nby bird Pokémon, this Pokémon is totally fine."
          moon: "This Pokémon is always bouncing around\nenergetically. Other Pokémon are attracted by\nits lively appearance and pleasant aroma."
        fr:
          sun: "Pour mieux se défendre, il a fait pousser sur\nson corps un calice assez solide pour résister\naux coups de bec des Pokémon oiseaux."
          moon: "Il passe son temps à gambader joyeusement.\nSa silhouette pleine d’entrain et son parfum\nagréable ont le don d’attirer les autres Pokémon."
        it:
          sun: "Per proteggersi ha sviluppato due enormi foglie\nsulla testa, così dure da resistere agli attacchi\ndei Pokémon alati."
          moon: "Lo si vede sempre saltellare in giro allegramente.\nIl suo buon umore e il buon profumo attirano\ni Pokémon nelle vicinanze."
        de:
          sun: "Seinen Blütenkelch hat es zum Selbstschutz\nausgebildet. Er ist so hart, dass selbst das\nPicken von Vogel-Pokémon es nicht stört."
          moon: "Es hüpft immerzu fröhlich umher. Seine\nlebensfrohe Art und sein Wohlgeruch\nziehen Pokémon in der Nähe förmlich an."
        es:
          sun: "El cáliz de su cabeza se ha desarrollado y le\nprotege todo el cuerpo. Es tan duro que no le\nimporta que lo picoteen los Pokémon pájaro."
          moon: "Se pasa el día saltando rebosante de felicidad.\nSu apariencia pizpireta y exquisita fragancia\nhace que otros Pokémon acudan a su lado."
        ko:
          sun: "몸을 지키기 위해 꼭지가 발달했다.\n상당히 단단해서 새포켓몬이\n쪼아도 전혀 문제없다."
          moon: "언제나 힘차게 뛰어오른다.\n힘찬 모습과 좋은 향기 때문에\n주변에 포켓몬이 모여든다."
        zh_simp:
          sun: "为了保护身体，壳盖很发达。\n因为相当坚硬，即使被鸟宝可梦啄到，\n也完全安然无恙。"
          moon: "总是精神饱满地跳来跳去。\n因为有着充满活力的样子和好闻的香味，\n宝可梦都会聚集到它周围来。"
        zh_trad:
          sun: "為了保護身體，殼蓋變得很發達。\n因為相當堅硬，即使被鳥寶可夢啄到，\n也能完全安然無恙。"
          moon: "總是精神飽滿地跳來跳去。\n因為有著充滿活力的樣子和好聞的香味，\n寶可夢都會聚集到牠的周圍來。"
