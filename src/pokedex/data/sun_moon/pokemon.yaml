      descriptions:
        jp_kana:
          sun: "とびまわって　スキを　うかがう。\nでんきエネルギーを　おおきなアゴで\nしゅうそくさせ　てきに　はっしゃ。"
          moon: "おなかに　ある　はつでんきかんで\nでんきを　おこす。　でんげきビームで\nとりポケモンも　あっとうする。"
        jp_kanji:
          sun: "飛び回って　隙を　うかがう。\n電気エネルギーを　大きなアゴで\n収束させ　敵に　発射。"
          moon: "お腹に　ある　発電器官で\n電気を　起こす。　電撃ビームで\nとりポケモンも　圧倒する。"
        en:
          sun: "It zips around, on sharp lookout for an opening.\nIt concentrates electrical energy within its large\njaws and uses it to zap its enemies."
          moon: "It produces electricity via an electrical organ in\nits abdomen. It overwhelms bird Pokémon with\nshocking beams of electrical energy."
        fr:
          sun: "Il virevolte dans tous les sens, guettant la faille\npour frapper. Il concentre l’électricité dans ses\ngrandes mandibules pour foudroyer l’ennemi."
          moon: "Il possède un organe spécial pouvant produire\nde l’électricité. Les Pokémon oiseaux ne font\npas le poids face à son rayon électrique."
        it:
          sun: "Sorvola l’area in attesa dell’occasione giusta per\nattaccare. Nelle grandi mandibole concentra\nenergia elettrica che scarica contro il nemico."
          moon: "Genera elettricità tramite un organo situato\nnella pancia. I Pokémon alati di solito battono\nin ritirata dinanzi ai suoi raggi elettrici."
        de:
          sun: "Es fliegt umher und wartet auf seine Chance.\nIn seinem großen Kiefer speichert es elektrische\nEnergie, die es auf Feinde abfeuern kann."
          moon: "In seinem Bauch hat es ein elektrisches Organ,\nwelches Strom erzeugt. Mit seinem Elektrostrahl\nkann es auch Vogel-Pokémon überwältigen."
        es:
          sun: "Sobrevuela un área en busca de presas. Puede\nconcentrar una potente carga eléctrica entre\nsus mandíbulas para atacar a sus rivales."
          moon: "En su estómago posee un órgano que genera\nenergía eléctrica. Los Pokémon pájaro no\npueden hacer nada contra los rayos que lanza."
        ko:
          sun: "날아다니며 틈을 노린다.\n전기 에너지를 큰 턱으로\n모아서 적에게 발사한다."
          moon: "배에 있는 발전기관에서\n전기를 일으킨다. 전격 빔으로\n새포켓몬도 압도한다."
        zh_simp:
          sun: "来回盘旋寻找机会。\n用巨大的颚部收集电能向敌人发射。"
          moon: "用位于腹部的发电器官\n发出电力。即便是鸟宝可梦\n也能被它用电击光束压制。"
        zh_trad:
          sun: "來回盤旋尋找機會。\n用巨大的顎部積蓄電能，\n向敵人發射。"
          moon: "利用位於腹部的發電器官\n製造電力。靠著電擊光束，\n即使面對鳥寶可夢也能佔據優勢。"
