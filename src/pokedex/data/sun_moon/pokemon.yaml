        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      hidden_ability: sheer_force
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          sun: "いつか　とべると　しんじているのは\nいでんしの　なかの　じょうほうが\nえいきょう　しているから　らしい。"
          moon: "こうてつなみの　いしあたまで\nやたら　めったら　ずつきする。\nそらを　とべない　ストレスの　せいだ。"
        jp_kanji:
          sun: "いつか　飛べると　信じているのは\n遺伝子の　中の　情報が\n影響　しているから　らしい。"
          moon: "鋼鉄並みの　石頭で\nやたら　めったら　頭突きする。\n空を　飛べない　ストレスの　せいだ。"
        en:
          sun: "Its belief that it will be able to fly one day\nis apparently the influence of information\ncarried in its genes."
          moon: "With its steel-hard stone head, it headbutts\nindiscriminately. This is because of the stress\nit feels at being unable to fly."
        fr:
          sun: "Sa lubie de voler lui viendrait d’une information\ncontenue dans ses gènes."
          moon: "Il charge sans distinction tout ce qui l’entoure,\ndistribuant allègrement les coups de tête.\nIl extériorise ainsi son stress de ne pas voler."
        it:
          sun: "Pare che la sua convinzione di poter imparare\na volare sia dovuta a delle informazioni\ncontenute nel suo codice genetico."
          moon: "Colpisce tutto quello che gli capita a tiro\ncon la testa dura come l’acciaio per sfogare\nla frustrazione dovuta all’incapacità di volare."
        de:
          sun: "Es liegt wohl an den Erbinformationen in\nseinen Genen, dass es glaubt, eines Tages\nfliegen zu können."
          moon: "Es verteilt oft Kopfstöße mit seinem stahlharten\nSchädel. Grund ist offenbar der Frust darüber,\ndass es nicht fliegen kann."
        es:
          sun: "Parece ser que la información genética de los\nBagon les impulsa a creer que algún día serán\ncapaces de volar."
          moon: "Se lanza de cabeza contra todo lo que se le\npone a tiro para lidiar con la frustración que le\ncausa el no poder surcar los cielos."
        ko:
          sun: "언젠가 날 수 있다고 믿는 것은\n유전자 안의 정보가\n영향을 주고 있기 때문이라고 한다."
          moon: "강철 수준의 돌머리로\n마구잡이로 박치기한다.\n하늘을 날 수 없는 스트레스 때문이다."
        zh_simp:
          sun: "它相信自己早晚能飞，\n听说是因为受到\n遗传基因中信息的影响。"
          moon: "用钢铁般坚硬的脑袋胡乱地\n头锤攻击。这是无法飞到\n空中的精神压力造成的。"
        zh_trad:
          sun: "牠之所以深信自己\n總有一天能飛，據說是因為\n受到基因中的資訊影響。"
          moon: "用鋼鐵般堅硬的腦袋胡亂地\n作出頭錘攻擊。這是無法飛到\n空中的精神壓力造成的。"
