          moon: "本体は　動かず　チビノーズと\n呼ばれる　３つのユニットを　自在に\n操り　獲物を　捕える。"
        en:
          sun: "It radiates such a powerful magnetic field that\nnearby electrical appliances become unusable."
          moon: "The main body controls three mobile units called\nMini-Noses, which it maneuvers to catch prey."
        fr:
          sun: "Il émet un puissant champ magnétique qui rend\ntous les appareils électriques des alentours\ninutilisables."
          moon: "Sans avoir besoin de se déplacer, il pilote ses\ntrois Mini-nez à distance afin de capturer\nses proies."
        it:
          sun: "Emette un forte campo magnetico che manda\nin cortocircuito le apparecchiature elettriche\nrendendole inutilizzabili."
          moon: "È in grado di controllare tre piccole unità dette\nMininasi per catturare le sue prede senza\ndoversi spostare."
        de:
          sun: "Durch seinen starken Magnetismus macht es\nElektrogeräte in seiner Nähe kaputt."
          moon: "Sein Körper selbst bewegt sich nicht. Um Beute\nzu fangen, steuert es drei kleine Einheiten,\ndie Mininasen genannt werden."
        es:
          sun: "Crea un campo magnético tan potente que\ninutiliza cualquier electrodoméstico que se\nencuentre cerca."
          moon: "Las tres unidades que controla, llamadas\nmininarices, le permiten atrapar a su presa\nsin necesidad de mover el resto de su cuerpo."
        ko:
          sun: "강한 자력을 뿜어내기 때문에\n가까이 있는 전기 제품은\n망가져 버리고 만다."
          moon: "본체는 움직이지 않고 꼬마코파스라고\n불리는 3개의 유닛을 자유자재로\n조종하여 먹이를 잡는다."
        zh_simp:
          sun: "因为会释放强大的磁力，\n所以导致附近的电器都变得无法使用。"
          moon: "可以本体不动，\n自由操纵被称为小朝北鼻的\n３个部件来捕捉猎物。"
        zh_trad:
          sun: "因為會釋放強大的磁力，\n導致附近的電器都變得\n無法使用。"
          moon: "可以本體不動，\n自由操縱被稱為小朝北鼻的\n３個組件來捕捉獵物。"
