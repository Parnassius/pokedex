      abilities:
        - swarm
        - insomnia
      hidden_ability: sniper
      descriptions:
        jp_kana:
          sun: "こうぶつの　アブリーが　すに\nかかるまで　ひたすら　まちつづける。\nじつに　しんぼうづよい　ポケモン。"
          moon: "じょうぶな　いとを　よりあわせ\nさかなポケモンを　とらえる　アミを\nこしらえる　りょうしも　いるぞ。"
        jp_kanji:
          sun: "好物の　アブリーが　巣に\nかかるまで　ひたすら　待ち続ける。\n実に　辛抱強い　ポケモン。"
          moon: "丈夫な　糸を　より合わせ\nさかなポケモンを　捕らえる　網を\nこしらえる　漁師も　いるぞ。"
        en:
          sun: "It waits intently until its preferred prey, Cutiefly,\ngets caught in its web. In fact, it’s quite a\npatient Pokémon."
          moon: "Some fishermen weave its sturdy thread into\nnets to catch fish Pokémon."
        fr:
          sun: "Il attend dans sa toile jusqu’à ce qu’un\nBombydou, son mets favori, s’y fasse prendre.\nC’est un Pokémon extrêmement patient."
          moon: "Certains pêcheurs récoltent son fil solide pour\ntisser des filets et attraper des Pokémon\npoissons."
        it:
          sun: "Aspetta immobile finché le sue prede\npreferite, i Cutiefly, non cadono nella tela.\nÈ un Pokémon molto paziente."
          moon: "Alcuni pescatori usano il suo filo resistente per\nfabbricare le reti con cui pescano i Pokémon\nacquatici."
        de:
          sun: "Ein sehr geduldiges Pokémon, das besonders\ngern Wommel frisst. Es wartet beharrlich darauf,\ndass sich welche in seinem Netz verfangen."
          moon: "Einige Fischer knüpfen sich aus seinem robusten\nFaden Netze, mit denen sie dann Fisch-Pokémon\nfangen."
        es:
          sun: "Espera con determinación hasta que un Cutiefly\ncae en su telaraña, pues es su comida favorita.\nEs un Pokémon extremadamente paciente."
          moon: "Algunos pescadores confeccionan redes para\npescar Pokémon pez con la robusta telaraña\nque produce Spinarak."
        ko:
          sun: "좋아하는 에블리가 둥지에\n걸릴 때까지 무작정 기다린다.\n정말 참을성 많은 포켓몬이다."
          moon: "튼튼한 실을 꼬아서\n물고기포켓몬을 잡는 그물을\n만드는 어부도 있다."
        zh_simp:
          sun: "一心一意地等着，\n直到爱吃的萌虻落入巢中。\n实在是有耐心的宝可梦。"
          moon: "有些渔夫会用其坚韧的丝，\n编织制作成可以捕捉鱼宝可梦的网。"
        zh_trad:
          sun: "總是一心一意地等待，\n直到愛吃的萌虻落入巢中。\n實在是很有耐心的寶可夢。"
          moon: "也有漁夫會將堅韌的絲編織起來，\n製作成可以捕捉魚寶可夢的網。"
ariados:
