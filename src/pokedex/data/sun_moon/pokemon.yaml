        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - steel
      egg_groups:
        - bug
      abilities:
        - technician
      descriptions:
        jp_kana:
          sun: "かじょうな　エネルギーを　あびて\nつねに　オーバーフローぎみ。\nちょうじかんは　たたかえないのだ。"
          moon: "メガシンカの　えいきょうで　ハサミは\nはさんだ　ものを　ズタズタに　さく\nきょうあくな　かたちに　へんかした。"
        jp_kanji:
          sun: "過剰な　エネルギーを　浴びて\n常に　オーバーフロー気味。\n長時間は　戦えないのだ。"
          moon: "メガシンカの　影響で　ハサミは\n挟んだ　ものを　ズタズタに　裂く\n凶悪な　形に　変化した。"
        en:
          sun: "The excess energy that bathes this Pokémon\nkeeps it in constant danger of overflow. It can’t\nsustain a battle over long periods of time."
          moon: "Due to the effects of Mega Evolution, its pincers\nhave taken on a more diabolical form, ripping\nanything they pinch to shreds."
        fr:
          sun: "Son énergie surpuissante déborde. Il lui est\ndifficile de combattre pendant de longues\npériodes."
          moon: "La Méga-Évolution a transformé ses pinces\nen de redoutables outils capables de mettre en\npièces tout ce qu’il saisit."
        it:
          sun: "Riesce a malapena a contenere l’energia\nsovrabbondante ottenuta con la megaevoluzione.\nNon può lottare per periodi troppo lunghi."
          moon: "La megaevoluzione ha trasformato le sue chele\nin strumenti mostruosi in grado di fare a pezzi\ntutto ciò che incontrano."
        de:
          sun: "Die Aufnahme von zu viel Energie hat es in einen\npermanenten Zustand der Ekstase versetzt.\nLangwierige Kämpfe kann es nicht ertragen."
          moon: "Durch die Mega-Entwicklung sind seine Scheren\nzu grausamen Werkzeugen geworden, die alles,\nwas sie zu fassen bekommen, zerreißen."
        es:
          sun: "Apenas logra contener su tremenda energía, que\nestá siempre a punto de desbordarse. No puede\ncombatir durante largos períodos."
          moon: "La megaevolución ha convertido sus pinzas en\ninstrumentos atroces, capaces de hacer trizas\ntodo lo que cae en ellas."
        ko:
          sun: "과다한 에너지를 받아\n항상 오버플로우 상태이다.\n장시간은 싸울 수 없다."
          moon: "메가진화의 영향으로 집게는\n잡은 것을 갈기갈기 찢어버리는\n흉악한 형태로 변했다."
        zh_simp:
          sun: "沐浴在过剩的能量中，\n经常都是有点溢出的感觉。\n无法长时间战斗。"
          moon: "受超级进化的影响，\n钳子变化成了会把夹住的东西\n都撕成碎片的凶恶形态。"
        zh_trad:
          sun: "沐浴在過剩的能量中，\n感覺隨時都會溢出來。\n無法長時間戰鬥。"
          moon: "受到超級進化的影響，\n鉗子變化成了會把夾住的東西\n都撕成碎片的兇惡形態。"
