      abilities:
        - thick_fat
        - guts
      hidden_ability: sheer_force
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          sun: "かいりきで　しられるが　としおいると\nたたかうことを　やめ　マクノシタに\nけいこを　つけるように　なるのだ。"
          moon: "はりて　いっぱつで　トラックを\nふっとばすほどの　かいりきで\nちからくらべが　だいすき。"
        jp_kanji:
          sun: "怪力で　知られるが　年老いると\n戦うことを　やめ　マクノシタに\n稽古を　つけるように　なるのだ。"
          moon: "張り手　一発で　トラックを\nふっ飛ばすほどの　怪力で\n力比べが　大好き。"
        en:
          sun: "It is known for its fantastic strength, but as it\ngrows older, it focuses more on\ntraining Makuhita."
          moon: "They love to compare their freakish strength—\nstrength enough to send a truck flying with a\nsingle slap."
        fr:
          sun: "Malgré leur force spectaculaire, les vieux\nHariyama préfèrent délaisser le combat au\nprofit de l’entraînement des jeunes Makuhita."
          moon: "Sa force herculéenne lui permet de renverser\nun camion d’une seule main. Les Hariyama\naiment s’adonner à des concours de force pure."
        it:
          sun: "È famoso per la sua incredibile forza.\nIn età avanzata, smette di lottare e inizia\nad allenare i Makuhita."
          moon: "Con uno dei suoi potentissimi schiaffi può\nscaraventare lontano un camion.\nAdora le gare di forza."
        de:
          sun: "Es ist für seine unglaubliche Stärke bekannt,\nlässt das Kämpfen mit dem Alter aber sein und\ntrainiert stattdessen Makuhita."
          moon: "Hariyama ist stark genug, um mit einem einzigen\nArmschlag einen LKW durch die Luft zu wirbeln.\nEs misst gerne seine Kräfte mit anderen."
        es:
          sun: "Los Hariyama veteranos son conocidos por su\nfuerza descomunal, pero prefieren retirarse de\nla vida de combate y entrenar a los Makuhita."
          moon: "Los Hariyama pueden tumbar un camión dándole\nun tortazo con la mano abierta. Les encantan\nlas pruebas de fuerza."
        ko:
          sun: "괴력으로 알려졌지만 나이가 들면\n싸우는 것을 그만두고\n마크탕을 훈련시키며 지낸다."
          moon: "손바닥 치기 한 번에 트럭을\n날려버릴 정도의 괴력으로\n힘겨루기를 아주 좋아한다."
        zh_simp:
          sun: "因怪力而为人所知，\n但上了年纪后就会停止战斗，\n转而负责训练幕下力士。"
          moon: "有着一巴掌能把卡车打飞\n那种程度的怪力，\n非常喜欢比力气。"
        zh_trad:
          sun: "因怪力而為人所知，\n但上了年紀後就會放棄戰鬥，\n轉而負責訓練幕下力士。"
          moon: "擁有一巴掌就能把貨車\n打飛的怪力，\n最喜歡和對手比力氣。"
