        - emergency_exit
      descriptions:
        jp_kana:
          sun: "するどく　きょだいな　ツメで\nいっせん。　くうきや　かいすいさえ\nいっとうりょうだんの　うでまえ。"
          moon: "６ぽんの　うでで　たくみに　たたかう。\nふだんは　しんかいの　いわあなで\nめいそうするように　しずかに　すごす。"
        jp_kanji:
          sun: "鋭く　巨大な　ツメで\n一閃。　空気や　海水さえ\n一刀両断の　腕前。"
          moon: "６本の　腕で　巧みに　戦う。\n普段は　深海の　岩穴で\n瞑想するように　静かに　過ごす。"
        en:
          sun: "With a flashing slash of its giant sharp claws,\nit cleaves seawater—or even air—right in two."
          moon: "It battles skillfully with its six arms, but spends\nmost of its time peacefully meditating in caves\ndeep beneath the sea."
        fr:
          sun: "Il fait miroiter ses énormes griffes acérées\navant d’attaquer. Elles sont assez puissantes\npour fendre en deux l’air comme la mer."
          moon: "Il utilise ses six pattes pour se battre.\nHabitant des grottes sous-marines, il passe\nson temps plongé dans un silence méditatif."
        it:
          sun: "È talmente abile con i suoi enormi artigli affilati\nda essere in grado di tagliare in due persino\nle particelle dell’aria e dell’acqua."
          moon: "Lotta con destrezza impiegando le sue sei\nbraccia. Preferisce condurre una vita quieta e\ncontemplativa nelle caverne degli abissi marini."
        de:
          sun: "Mithilfe seiner riesigen, glitzernden Klauen\nzerteilt es selbst Luft und Salzwasser mit\neinem Hieb."
          moon: "Seine sechs Arme setzt es geschickt im Kampf\nein. Sein natürliches Habitat sind Tiefseehöhlen,\nin denen es sich ganz der Meditation hingibt."
        es:
          sun: "Gracias a su destreza y sus enormes y afiladas\ngarras, puede cortar hasta el aire y el agua de\nun solo tajo."
          moon: "Usa con astucia sus seis patas superiores en\ncombate. Suele habitar las cavernas del fondo\nmarino, donde lleva una vida contemplativa."
        ko:
          sun: "날카롭고 거대한 발톱으로\n공격한다. 공기나 해수마저\n두 동강 낼 정도의 실력이다."
          moon: "6개의 팔로 능숙하게 싸운다.\n평소에는 심해의 바위굴에서\n명상하듯 조용히 지낸다."
        zh_simp:
          sun: "用锐利而巨大的爪子一挥而下。\n连空气和海水都能一分为二的本事。"
          moon: "用６条手臂灵活地战斗。\n平常就在深海的岩洞里\n好像冥想一般静静地生活。"
        zh_trad:
          sun: "本領高強，當銳利而巨大的爪子\n一揮而下，連空氣和海水都能一分為二。"
          moon: "用６條手臂靈活地戰鬥。\n平時就在深海的岩洞裡\n像在冥想一般靜靜地生活。"
