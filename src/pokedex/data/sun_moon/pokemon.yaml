          moon: "せなかの　ながい　けは　どうらいしん。\nらくらいを　ひきよせ　かみなりを\nあびると　でんきぶくろに　ためこむ。"
        jp_kanji:
          sun: "背中の　ハリの　毛は　普段は\n寝ている。　興奮すると　逆立ち\n襲ってくる　敵を　突き刺すのだ。"
          moon: "背中の　長い　毛は　導雷針。\n落雷を　引き寄せ　雷を\n浴びると　電気袋に　溜め込む。"
        en:
          sun: "The spiny fur on its back is normally at rest.\nWhen this Pokémon becomes agitated, its fur\nstands on end and stabs into its attackers."
          moon: "The long hairs on its back act as lightning rods.\nThe bolts of lightning it attracts are stored as\nenergy in its electric sac."
        fr:
          sun: "Les épines de ce Pokémon sont normalement\nbaissées, mais quand il s’énerve, elles se\ndressent afin de pourfendre ses agresseurs."
          moon: "Sa longue épine dorsale lui sert de paratonnerre.\nIl attire les éclairs et emmagasine la foudre\ndans sa poche électrique."
        it:
          sun: "Normalmente tiene le spine che ha sulla schiena\nabbassate, ma se viene infastidito le drizza\nper trafiggere chi lo attacca."
          moon: "Si serve delle grandi spine che ha sulla schiena\ncome parafulmini, attirando i fulmini su di sé\nper incamerare elettricità."
        de:
          sun: "Normalerweise liegen seine Stacheln am Rücken\nan, aber wenn es sich aufregt, stellen sie sich\nauf und stechen angreifende Gegner."
          moon: "Sein langer Stachel fungiert als Blitzableiter.\nDamit zieht es Blitze auf sich, die es dann in\nseinen Elektrotaschen speichert."
        es:
          sun: "Cuando se siente amenazado, eriza las púas de\nsu lomo para pinchar a quien ose atacarlo."
          moon: "El apéndice de su cabeza actúa a modo de\npararrayos. Aprovecha la energía de los rayos\nque atrae para llenar su bolsa eléctrica."
        ko:
          sun: "등의 가시 털은 평소에\n누워 있다가 흥분하면 곤두서\n덮쳐오는 적을 찌른다."
          moon: "등의 기다란 털은 피뢰침이다.\n낙뢰를 끌어들여 번개를\n맞으면 전기 주머니에 저장한다."
        zh_simp:
          sun: "背上的针毛平时是倒伏的。\n一旦兴奋就会倒立起来，\n刺向前来袭击的敌人。"
          moon: "背上的长毛是引雷针。\n引来打下的雷，沐浴雷电后，\n就会将之储存在电力袋中。"
        zh_trad:
          sun: "背上的針毛平時是倒伏的。\n一旦興奮就會倒立起來，\n刺向前來襲擊的敵人。"
          moon: "背上的長毛是引雷針。\n引來落雷，吸收雷電後，\n就會將之儲存在電力袋中。"
mimikyu:
  species_id: 778
  names:
    jp_kana: ミミッキュ
    jp_kanji: ミミッキュ
    en: Mimikyu
    fr: Mimiqui
    it: Mimikyu
    de: Mimigma
    es: Mimikyu
    ko: 따라큐
    zh_simp: 谜拟Ｑ
    zh_trad: 謎擬Ｑ
  forms:
    mimikyu_disguised_form:
      form_id: 0
      names:
        jp_kana: ばけたすがた
        jp_kanji: ばけたすがた
        en: Disguised Form
        fr: Forme Déguisée
        it: Forma Mascherata
        de: Verkleidete Form
        es: Forma Encubierta
        ko: 둔갑한 모습
        zh_simp: 化形的样子
        zh_trad: 化形的樣子
      base_stats:
