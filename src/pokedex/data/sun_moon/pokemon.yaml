        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - ghost
      egg_groups:
        - human_like
      abilities:
        - keen_eye
        - stall
      hidden_ability: prankster
      held_items:
        rare: wide_lens
      descriptions:
        jp_kana:
          sun: "ほうせきが　こうぶつで　メレシーを\nねらって　つけまわしているが\nガバイトに　よこどり　されてしまう。"
          moon: "ほうせきの　ひとみが　あやしく\nかがやくとき　ひとの　たましいを\nうばうと　おそれられる　ポケモン。"
        jp_kanji:
          sun: "宝石が　好物で　メレシーを\n狙って　付け回しているが\nガバイトに　横取り　されてしまう。"
          moon: "宝石の　瞳が　怪しく\n輝くとき　人の　魂を\n奪うと　恐れられる　ポケモン。"
        en:
          sun: "It’s a fiend for gemstones, so it stalks Carbink.\nUnfortunately, Gabite almost always grabs\nthem first."
          moon: "This Pokémon is feared. When its gemstone eyes\nbegin to glow with a sinister shine, it’s believed\nthat Sableye will steal people’s spirits away."
        fr:
          sun: "Comme il adore tout ce qui brille, il traque\nsouvent les Strassie. Malheureusement, il se fait\ntout aussi souvent devancer par Carmache."
          moon: "Pokémon redouté de beaucoup, car l’éclat\nde ses yeux précieux donne l’impression qu’il\ns’apprête à dérober l’âme de ceux qu’il regarde."
        it:
          sun: "È ghiotto di gemme e va sempre a caccia di\nCarbink, ma è spesso preceduto dai Gabite."
          moon: "È molto temuto perché si dice che rubi lo spirito\ndegli esseri umani con lo sguardo sinistro\ndei suoi occhi opalescenti."
        de:
          sun: "Seine Liebe zu Edelsteinen treibt es dazu,\nRocara nachzustellen. Knarksel kommt ihm\nallerdings immer zuvor."
          moon: "Es ist gefürchtet, da man sagt, es stehle\ndie Seelen der Menschen, wenn seine\nEdelsteinaugen furchterregend funkeln."
        es:
          sun: "Le gustan mucho las joyas, por lo que suele\nmerodear cerca de los Carbink. Sin embargo, los\nGabite siempre se le suelen adelantar."
          moon: "Se dice que, cuando las gemas de los ojos\nde estos Pokémon brillan de manera siniestra,\nestán robándole el alma a alguien."
        ko:
          sun: "보석을 좋아해서 멜리시를\n노리고 끈질기게 따라다니지만\n한바이트가 가로채 버린다."
          moon: "보석 눈동자가 수상하게 빛날 때\n사람의 영혼을 빼앗는다며\n두려움의 대상이 된 포켓몬이다."
        zh_simp:
          sun: "非常喜欢宝石，\n因此到处追着小碎钻。\n但却被尖牙陆鲨半路夺走。"
          moon: "宝石的眼睛发出诡异光芒时，\n就会摄取人的魂魄。\n是令人恐惧的宝可梦。"
        zh_trad:
          sun: "非常喜歡寶石，\n因此到處追著小碎鑽跑，\n但卻被尖牙陸鯊半路奪走。"
          moon: "寶石的眼睛發出詭異光芒時，\n就會攝取人的魂魄。\n是令人恐懼的寶可夢。"
    sableye_mega:
      form_id: 1
      names:
        jp_kana: メガヤミラミ
        jp_kanji: メガヤミラミ
        en: Mega Sableye
        fr: Méga-Ténéfix
        it: MegaSableye
        de: Mega-Zobiris
        es: Mega-Sableye
        ko: 메가깜까미
        zh_simp: 超级勾魂眼
        zh_trad: 超級勾魂眼
      base_stats:
        hp: 50
        attack: 85
        defense: 125
        special_attack: 85
        special_defense: 115
        speed: 20
      evs_yield:
        hp: 0
        attack: 1
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - ghost
      egg_groups:
        - human_like
      abilities:
        - magic_bounce
      descriptions:
        jp_kana:
          sun: "メガシンカの　えいきょうを　うけて\nきょだいかした　むねの　ほうせきは\nどんな　こうげきも　はねかえす。"
          moon: "きょだいな　ほうせきは　おもいので\nとっさの　ほうこうてんかんは　にがて。\nうしろからの　こうげきが　じゃくてん。"
        jp_kanji:
          sun: "メガシンカの　影響を　受けて\n巨大化した　胸の　宝石は\nどんな　攻撃も　はね返す。"
          moon: "巨大な　宝石は　重いので\nとっさの　方向転換は　苦手。\n後ろからの　攻撃が　弱点。"
        en:
          sun: "The jewel from its chest, which has grown\ngigantic due to the effects of Mega Evolution,\ncan turn back any attack."
          moon: "Supporting a giant heavy jewel, it can’t change\ndirection very nimbly and is vulnerable to attack\nfrom behind."
        fr:
          sun: "La Méga-Évolution a fait grossir le joyau sur\nsa poitrine. Il peut maintenant renvoyer\nn’importe quelle attaque."
          moon: "Le joyau géant est trop lourd pour qu’il puisse\nchanger facilement de direction. Il est très\nvulnérable aux attaques par-derrière."
        it:
          sun: "La gemma che era sul suo petto, ingigantita\ndalla megaevoluzione, è adesso in grado di\nrespingere qualsiasi attacco."
          moon: "La sua gemma gigante e pesantissima gli\nimpedisce di voltarsi con facilità. Il suo punto\ndebole sono gli attacchi alle spalle."
        de:
          sun: "Das Juwel auf Zobiris’ Brust ist durch die\nMega-Entwicklung so groß geworden, dass es\njeden Angriff reflektieren kann."
          moon: "Weil sein riesiger Edelstein so schwer ist,\nkann es nur mühsam die Richtung wechseln.\nAngriffe von hinten sind sein Schwachpunkt."
        es:
          sun: "Tras la megaevolución, la gema de su pecho\ncrece de forma impresionante, hasta el punto\nde que puede repeler cualquier ataque."
          moon: "El peso de su gema le dificulta cambiar de\ndirección con rapidez. Su punto débil son los\nataques por la espalda."
        ko:
          sun: "메가진화의 영향을 받아서\n거대화한 가슴의 보석은\n어떤 공격도 튕겨낸다."
          moon: "거대한 보석이 무겁기 때문에\n순간적인 방향전환이 서툴다.\n뒤로부터의 공격이 약점이다."
        zh_simp:
          sun: "受超级进化影响而巨大化的\n胸口的宝石，无论什么样的攻击\n都能反射回去。"
          moon: "因为巨大的宝石很沉，\n所以不擅长突然转变方向。\n来自后方的攻击是它的弱点。"
        zh_trad:
          sun: "因超級進化而巨大化的\n胸口的寶石，無論怎樣的攻擊\n都能反射回去。"
          moon: "巨大的寶石很沉重，\n所以不擅長突然轉變方向。\n來自後方的攻擊是牠的弱點。"
