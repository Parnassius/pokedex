        fr:
          sun: "L’une des mystérieuses Ultra-Chimères.\nOn l’aurait vue parasiter des gens en pleine\nrue, les rendant extrêmement violents."
          moon: "Nul ne sait si cette Ultra-Chimère possède\nune conscience propre, mais on l’aurait aperçue\nen train d’imiter les gestes d’une jeune fille."
        it:
          sun: "Una delle misteriose Ultracreature. Si riportano\ncasi in cui le persone vittime di questo parassita\nhanno manifestato comportamenti violenti."
          moon: "Una delle Ultracreature. Non è noto se abbia\nuna volontà propria, ma talvolta sembra imitare\nil comportamento di una ragazzina."
        de:
          sun: "Eine rätselhafte Ultrabestie. Einigen Berichten\nzufolge verwandelt sie harmlose Stadtbewohner\nper Symbiose in äußerst aggressive Menschen."
          moon: "Eine Ultrabestie, die gelegentlich das Verhalten\neines jungen Mädchens an den Tag legt. Es ist\nnicht bekannt, ob sie dies bewusst tut."
        es:
          sun: "Un Ultraente envuelto en misterio. Se dice que\nlas víctimas a las que posee se vuelven\nagresivas."
          moon: "Se desconoce si este Ultraente posee\nconsciencia propia, pero en ocasiones se\ncomporta como una chica joven."
        ko:
          sun: "수수께끼에 싸인 UB의 일종.\n길을 가던 사람이 기생 당해\n난폭해지는 모습이 목격되었다."
          moon: "UB의 일종. 의지가 있는지는\n불명확하지만 가끔\n소녀 같은 행동을 보인다."
        zh_simp:
          sun: "被谜团包围的究极异兽的一种。\n有人目击了街上的人们\n被寄生后暴走起来的样子。"
          moon: "究极异兽中的一种。\n是否有自主意识尚不清楚，\n但时不时会展现少女般的姿态。"
        zh_trad:
          sun: "是充滿謎團的ＵＢ的一種。\n有人曾目擊到走在街上的路人\n被寄生後暴走的模樣。"
