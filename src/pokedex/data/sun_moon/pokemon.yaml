  names:
    jp_kana: ピッピ
    jp_kanji: ピッピ
    en: Clefairy
    fr: Mélofée
    it: Clefairy
    de: Piepi
    es: Clefairy
    ko: 삐삐
    zh_simp: 皮皮
    zh_trad: 皮皮
  forms:
    clefairy:
      form_id: 0
      base_stats:
        hp: 70
        attack: 45
        defense: 48
        special_attack: 60
        special_defense: 65
