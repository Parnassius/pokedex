      types:
        - dark
      egg_groups:
        - field
      abilities:
        - synchronize
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          sun: "おこると　ぜんしんの　けあなから\nどくその　まじった　あせを　ふきだし\nあいての　めを　ねらう。"
          moon: "やみに　とけこむ　くろい　たいもう。\nじっと　えものの　スキを　うかがい\nのどぶえ　めがけて　くいかかる。"
        jp_kanji:
          sun: "怒ると　全身の　毛穴から\n毒素の　混じった　汗を　吹き出し\n相手の　目を　狙う。"
          moon: "闇に　溶け込む　黒い　体毛。\nじっと　獲物の　隙を　うかがい\n喉笛　目掛けて　喰いかかる。"
        en:
          sun: "When this Pokémon becomes angry, its pores\nsecrete a poisonous sweat, which it sprays at\nits opponent’s eyes."
          moon: "With its black fur, it blends into the darkness.\nIt bides its time, and when prey appears, this\nPokémon goes for its throat, and then eats it."
        fr:
          sun: "Quand il s’énerve, ses pores sécrètent une\nsueur empoisonnée qu’il envoie dans les yeux\nde ses ennemis."
          moon: "Son pelage noir lui permet de se fondre dans\nla nuit. Il attend que sa proie baisse sa garde\npour l’attaquer en visant la gorge."
        it:
          sun: "Quando si arrabbia, spruzza dai pori un\nsudore velenoso direttamente sugli occhi\ndel nemico."
          moon: "Si nasconde nell’oscurità grazie al colore del\nsuo pelo. Quando meno se l’aspetta, assale\nla preda puntando alla gola."
        de:
          sun: "Ist es wütend, feuert es tödlichen Giftschweiß\naus all seinen Poren auf die Augen seines\nGegners ab."
          moon: "Sein schwarzes Fell verschmilzt mit der Nacht.\nEs lauert seiner Beute geduldig auf und beißt\nihr bei erster Gelegenheit die Kehle durch."
        es:
          sun: "Cuando se enfurece, secreta un sudor venenoso\npor los poros que lanza a los ojos de sus\nenemigos."
          moon: "Su pelaje le permite camuflarse en la oscuridad,\ndonde espera con paciencia a que su presa se\ndistraiga para saltarle al cuello."
        ko:
          sun: "화가 나면 전신의 모공으로부터\n독소가 섞인 땀을 뿜어내어\n상대의 눈을 노린다."
          moon: "어둠에 녹아드는 검은 털.\n가만히 먹이의 틈을 살피며\n숨통을 노리고 덤벼든다."
        zh_simp:
          sun: "发怒的时候会从全身的毛孔里\n喷出混合了毒素的汗液，\n袭击对手的眼睛。"
          moon: "黑色体毛与黑暗融为一体。\n一动不动地等着猎物出现疏漏，\n然后一口咬住它的喉咙。"
        zh_trad:
          sun: "發怒的時候會從全身的毛孔裡\n噴出混合了毒素的汗液，\n瞄準對手的眼睛發動攻擊。"
          moon: "黑色的體毛與黑暗融為一體。\n一動不動地等待著獵物鬆懈，\n對準咽喉一口咬住。"
murkrow:
  species_id: 198
  names:
    jp_kana: ヤミカラス
    jp_kanji: ヤミカラス
    en: Murkrow
    fr: Cornèbre
    it: Murkrow
    de: Kramurx
    es: Murkrow
    ko: 니로우
    zh_simp: 黑暗鸦
    zh_trad: 黑暗鴉
  forms:
    murkrow:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 42
        special_attack: 85
        special_defense: 42
        speed: 91
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - flying
      egg_groups:
        - flying
      abilities:
        - insomnia
        - super_luck
      hidden_ability: prankster
      descriptions:
        jp_kana:
          sun: "ひぐれに　めざめ　ゆうやみを　とぶ。\nヤミカラスが　とぶまでに　いえに\nかえれ　という　ことわざも　あるぞ。"
          moon: "ふきつの　あかしと　きらわれるが\nなかよしの　トレーナーには　キラキラ\nひかるものを　プレゼントするよ。"
        jp_kanji:
          sun: "日暮れに　目覚め　夕闇を　飛ぶ。\nヤミカラスが　飛ぶまでに　家に\n帰れ　という　ことわざも　あるぞ。"
          moon: "不吉の　証と　嫌われるが\n仲良しの　トレーナーには　キラキラ\n光るものを　プレゼントするよ。"
        en:
          sun: "They awaken at dusk and take wing in the\ntwilight, leading to the expression,\n“Get home before the Murkrow fly.”"
          moon: "Seen as a symbol of bad luck, it’s generally\ndisliked. Yet it gives presents—objects that\nsparkle or shine—to Trainers it’s close to."
        fr:
          sun: "Il s’éveille au crépuscule et prend son envol à\nla nuit tombée. Un proverbe local conseille de\nrentrer chez soi avant l’envol du Cornèbre."
          moon: "Les gens voient en lui un oiseau de malheur,\nmais il offre des choses brillantes aux\nDresseurs dont il devient l’ami."
        it:
          sun: "Si sveglia al tramonto e vola nella notte buia.\nUn vecchio proverbio consiglia di tornare a casa\nprima che Murkrow si alzi in volo."
          moon: "Molti lo detestano credendo che porti sfortuna.\nSe si affeziona al suo Allenatore, gli porta in\nregalo oggetti luccicanti."
        de:
          sun: "Es wacht bei Dämmerung auf und fliegt durch\ndie Nacht. Daher das Sprichwort: „Flugs nach\nHaus, mein Kind, wenn Kramurx am Himmel sind!“"
          moon: "Es ist als Unglücksbringer verschrien, aber wenn\nes sich mit seinem Trainer gut versteht, schenkt\nes ihm allerlei funkelnde und glitzernde Objekte."
        es:
          sun: "Se despierta al ponerse el sol y vuela toda la\nnoche. Por eso, un viejo refrán aconseja volver\na casa antes de que Murkrow levante el vuelo."
          moon: "Es odiado por muchos, pues se dice que atrae\nla desgracia. Si se lleva bien con su Entrenador,\nlo obsequiará con objetos brillantes."
        ko:
          sun: "해가 지면 일어나 저녁 하늘을 난다.\n니로우가 날기 전에 집에\n돌아가라는 속담도 있다."
          moon: "불길의 상징으로 미움받지만\n사이 좋은 트레이너에게는 반짝반짝\n빛나는 물건을 선물한다."
        zh_simp:
          sun: "日落时醒来，夜晚飞行。\n也有俗话说，黑暗鸦出窝，\n赶紧要回家。"
          moon: "作为不吉的象征而被人嫌弃，\n但是会把亮晶晶发着光的\n东西送给关系好的训练家。"
        zh_trad:
          sun: "日落時醒來，於低垂的夜幕中飛行。\n也有所謂　「黑暗鴉出巢，\n快點回家吧」　的俗語。"
          moon: "被人嫌棄為不吉的象徵，\n但是會把亮晶晶發著光的\n東西送給關係好的訓練家。"
slowking:
  species_id: 199
  names:
    jp_kana: ヤドキング
    jp_kanji: ヤドキング
    en: Slowking
    fr: Roigada
    it: Slowking
    de: Laschoking
    es: Slowking
    ko: 야도킹
    zh_simp: 呆呆王
    zh_trad: 呆呆王
  forms:
    slowking:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 80
        special_attack: 100
        special_defense: 110
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      hidden_ability: regenerator
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          sun: "かまれた　どくその　えいきょうで\nてんさいてき　ずのうの　もちぬしに。\nサイコパワーを　じざいに　あやつる。"
          moon: "まよったら　ヤドキングにきけ　という\nことわざが　のこる　ちいきも　あるほど\nかしこいことで　ゆうめい　なのだ。"
        jp_kanji:
          sun: "噛まれた　毒素の　影響で\n天才的　頭脳の　持ち主に。\nサイコパワーを　自在に　操る。"
          moon: "迷ったら　ヤドキングに聞け　という\nことわざが　残る　地域も　あるほど\n賢いことで　有名　なのだ。"
        en:
          sun: "A poisonous bite reacted with its system,\nblessing it with the enhanced intellect of a\ngenius. It has full control of its psychic powers."
          moon: "This Pokémon is so famed for its intellect that a\nproverb still persists in some regions: “When in\ndoubt, ask Slowking.”"
        fr:
          sun: "Les toxines injectées dans son corps quand\nil s’est fait mordre ont fait de lui un génie.\nSes pouvoirs psy ont été grandement amplifiés."
          moon: "Il est tellement intelligent qu’il existe un\nproverbe dans certaines régions qui dit :\n« Si tu ne sais pas, demande au Roigada. »"
        it:
          sun: "Il morso velenoso di Shellder gli ha conferito\nun’intelligenza straordinaria. È in grado di usare\ni suoi poteri psichici con grande maestria."
          moon: "È famoso per la sua grande intelligenza.\nIn alcune regioni si dice comunemente:\n“Nel dubbio, chiedi a Slowking”."
        de:
          sun: "Durch einen giftigen Biss wurde es zu einer\nwahren Intelligenzbestie. Es verfügt über\nPsycho-Kräfte."
          moon: "Es ist so berühmt für seine Intelligenz, dass\nsich vielerorts das Sprichwort „Nicht verzagen,\nLaschoking fragen!“ durchgesetzt hat."
        es:
          sun: "El veneno de Shellder le confiere una inteligencia\nbrillante. Puede utilizar sus poderes psíquicos\ncon gran destreza."
          moon: "Es muy famoso por su inteligencia y, en algunas\nregiones, hasta tienen un refrán que dice:\n“En caso de duda, pregúntale a Slowking”."
        ko:
          sun: "물린 독소의 영향으로\n천재적인 두뇌를 가지게 되었다.\n사이코 파워를 자유자재로 다룬다."
          moon: "갈피를 못 잡을 때는 야도킹에게 물어보라는\n속담이 남아있는 지역도 있을 정도로\n똑똑한 것으로 유명하다."
        zh_simp:
          sun: "受被咬到的毒素影响，\n拥有天才的头脑。\n能自由自在地操纵精神力量。"
          moon: "迷路就问呆呆王，\n也有地区流传着这样的俗语，\n可见它因聪明而广为人知。"
        zh_trad:
          sun: "受被咬到時的毒素影響，\n擁有天才的頭腦。\n能自由自在地操縱精神力量。"
          moon: "迷路就問呆呆王，\n也有地區流傳著這樣的俗語，\n可見牠因聰明而廣為人知。"
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    jp_kanji: ムウマ
    en: Misdreavus
    fr: Feuforêve
    it: Misdreavus
    de: Traunfugil
    es: Misdreavus
    ko: 무우마
    zh_simp: 梦妖
    zh_trad: 夢妖
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          sun: "あのて　このてで　ひとを　おどろかし\nせいめいエネルギーを　すいとる。\nおどろかす　れんしゅうは　かかさない。"
          moon: "だれもいない　へやから　すすりなく\nような　こえが　きこえたら　それは\nムウマの　イタズラに　ちがいない。"
        jp_kanji:
          sun: "あの手　この手で　人を　驚かし\n生命エネルギーを　吸い取る。\n驚かす　練習は　欠かさない。"
          moon: "誰もいない　部屋から　すすり泣く\nような　声が　聞こえたら　それは\nムウマの　イタズラに　違いない。"
        en:
          sun: "It will use any means necessary to frighten\npeople and absorb their life energy. It practices\nconstantly to hone its skill in causing fear."
          moon: "If you hear a sobbing sound emanating from a\nvacant room, it’s undoubtedly a bit of mischief\nfrom Misdreavus."
        fr:
          sun: "Il ne recule devant rien pour effrayer les\nhumains et leur voler leur énergie vitale.\nPour cela, il s’entraîne régulièrement à faire peur."
          moon: "Si vous entendez des pleurs provenant d’une\npièce vide, c’est sûrement un Feuforêve\nqui vous fait une farce."
        it:
          sun: "Assorbe l’energia vitale degli esseri umani\nterrorizzandoli. Si allena per cercare di essere\nil più spaventoso possibile."
          moon: "Se vi sembra di sentire qualcuno singhiozzare\nin una stanza apparentemente vuota, è\nsicuramente un Misdreavus in vena di scherzi."
        de:
          sun: "Es lässt nichts unversucht, um Menschen\nzu erschrecken und ihnen Lebensenergie\nabzusaugen. Dafür übt es regelmäßig."
          moon: "Hört man ein Schluchzen in einem leeren Zimmer,\nhandelt es sich dabei eindeutig um einen Streich\nvon Traunfugil."
        es:
          sun: "Atemoriza a la gente de distintas formas y\nabsorbe su energía vital. Entrena todos los días\npara no perder su toque terrorífico."
          moon: "Si se escucha un sollozo proveniente de una\nhabitación que en teoría está vacía, es probable\nque sea Misdreavus haciendo de las suyas."
        ko:
          sun: "온갖 방법으로 사람을 놀라게 해서\n생명 에너지를 빨아들인다.\n놀라게 하는 연습을 꾸준히 한다."
          moon: "아무도 없는 방에서 흐느껴 우는\n듯한 소리가 들린다면 그것은\n무우마의 장난임에 틀림없다."
        zh_simp:
          sun: "千方百计地吓唬人类，\n吸取生命的能量。\n吓人的练习一天也不落。"
          moon: "如果从四下无人的房间里\n传来抽泣般的声音，\n那准是梦妖的恶作剧。"
        zh_trad:
          sun: "千方百計地驚嚇人類，\n吸取生命的能量。\n嚇人的練習從來不曾間斷。"
          moon: "如果從四下無人的房間裡\n傳來抽泣般的聲音，\n那一定是夢妖的惡作劇。"
