      descriptions:
        jp_kana:
          sun: "くろい　たいもうは　とても　かたくて\nどんどん　のびる。　トリミングだいが\nかかって　たいへんな　ポケモン。"
          moon: "あるじの　めいれいに　ちゅうじつ。\nだが　したに　みている　あいての\nいうことは　ぜったいに　きかない。"
        jp_kanji:
          sun: "黒い　体毛は　とても　硬くて\nどんどん　伸びる。　トリミング代が\nかかって　大変な　ポケモン。"
          moon: "主の　命令に　忠実。\nだが　下に　みている　相手の\nいうことは　絶対に　聞かない。"
        en:
          sun: "Its dense black fur grows continuously. The high\ncost of keeping its hard fur properly groomed\nmakes this a troublesome Pokémon to train."
          moon: "This Pokémon obeys its master’s orders\nfaithfully. However, it refuses to listen to\nanything said by a person it doesn’t respect."
        fr:
          sun: "Son poil long et très dur, pousse à une vitesse\nahurissante, et son toilettage coûte un bras.\nUne plaie à élever."
          moon: "Il est entièrement dévoué aux ordres de\nson maître. En revanche, il n’obéira jamais à\nquelqu’un qu’il considère comme inférieur à lui."
        it:
          sun: "La folta pelliccia scura di questo Pokémon\nè estremamente resistente, quindi i prezzi della\ntoelettatura sono sempre piuttosto alti."
          moon: "Se l’Allenatore si guadagna il suo rispetto,\nsegue fedelmente le istruzioni, altrimenti\nnon lo ascolta affatto."
        de:
          sun: "Sein dunkles Fell ist sehr widerstandsfähig und\nwächst schnell. Dadurch sind die Kosten für\ndas Trimmen sehr hoch."
          moon: "Es folgt geflissentlich den Befehlen seines\nTrainers. Auf jemanden, den es als unterlegen\nbetrachtet, hört es jedoch nicht."
        es:
          sun: "El recio y oscuro pelaje que le cubre el lomo\ncrece tan rápido que mantenerlo corto resulta\nde lo más caro."
          moon: "Obedece sin rechistar las órdenes de su dueño.\nAhora bien, ignora sin pudor a todo aquel que\nconsidere inferior."
        ko:
          sun: "검은 털은 매우 단단하며\n빠르게 자란다. 손질 비용이\n들어서 큰일인 포켓몬."
          moon: "주인의 명령에 충실하다.\n그러나 아래라고 보는 상대가\n하는 말은 절대로 듣지 않는다."
        zh_simp:
          sun: "黑色的体毛非常坚硬，\n会不断长出。是要花修剪费，\n很费事的宝可梦。"
          moon: "对主人的命令绝对服从。\n但绝对不会听看起来\n地位不如它的对手所说的话。"
        zh_trad:
          sun: "黑色的體毛非常堅硬，且會\n不斷長出，需要花錢修剪，\n是很費事的寶可夢。"
          moon: "會忠實地聽從主人的命令。\n但絕對不聽自己看不起的人\n所說的話。"
stoutland:
