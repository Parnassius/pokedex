      descriptions:
        jp_kana:
          sun: "シッポの　さきを　てきに　おしつけ\nこうあつでんりゅうを　ながしこむ。\nいっしゅんで　てきは　くろコゲ。"
          moon: "こうふんすると　むねを　うちならす。\nそのたびに　でんきひばなが　ちり\nらいめいが　あたりに　ひびきわたる。"
        jp_kanji:
          sun: "尻尾の　先を　敵に　押しつけ\n高圧電流を　流し込む。\n一瞬で　敵は　黒コゲ。"
          moon: "興奮すると　胸を　打ち鳴らす。\nそのたびに　電気火花が　散り\n雷鳴が　あたりに　響き渡る。"
        en:
          sun: "It pushes the tips of its tails against its foes\nand then lets loose a high-voltage current.\nIts foes are burned to a crisp in an instant."
          moon: "When it gets excited, it thumps its chest. With\nevery thud, thunder roars and electric sparks\nshower all around."
        fr:
          sun: "Il connecte le bout de sa queue à son ennemi\net libère une violente décharge. L’ennemi est\ninstantanément grillé."
          moon: "Quand il est excité, il se frappe violemment la\npoitrine de ses poings. Cela fait des étincelles\nélectriques et un vrai roulement de tonnerre."
        it:
          sun: "Tocca il nemico con la punta delle code\ne rilascia una scarica elettrica ad alto voltaggio\nche lo carbonizza all’istante."
          moon: "Quando è agitato, si batte il petto sprizzando\nscintille e producendo un rombo simile a\nun tuono."
        de:
          sun: "Es berührt Gegner mit seinen Schweifspitzen\nund entlädt dann starke Elektrizität. So kann\nes sie im Nullkommanichts verkohlen."
          moon: "Wenn es sich aufregt, schlägt es sich kräftig\nauf die Brust. Bei jedem Schlag sprühen Funken\nund es ertönt ein Donnern."
        es:
          sun: "Toca a su enemigo con la punta de sus colas\ny le suelta una descarga de alta tensión que lo\ndeja achicharrado al instante."
          moon: "Al exaltarse, se golpea con ímpetu el pecho.\nCada vez que lo hace saltan chispas y un\ntrueno resuena por la zona."
        ko:
          sun: "꼬리의 끝을 적에게 밀어붙여\n고압 전류를 흘려보낸다.\n한순간에 적은 까맣게 탄다."
          moon: "흥분하면 가슴을 두들긴다.\n그때마다 전기 불꽃이 튀며\n천둥소리가 주변에 울려 퍼진다."
        zh_simp:
          sun: "用尾巴尖尖按住敌人，\n输入高压电流。\n敌人瞬间就成黑炭了。"
          moon: "兴奋的时候会捶胸鸣叫。\n每到那时，电火花会飞溅，\n雷声会在四周回响。"
        zh_trad:
          sun: "用尾巴尖端按住敵人，\n灌注高壓電流。\n敵人瞬間就變成黑炭了。"
          moon: "興奮的時候會捶胸發出聲響。\n每次捶胸都會飛濺出電火花，\n雷聲會在四周回響。"
