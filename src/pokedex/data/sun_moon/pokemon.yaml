      abilities:
        - illuminate
        - effect_spore
      hidden_ability: rain_dish
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          sun: "てんめつしながら　ひかる　ほうしを\nあたりに　ばらまく。　そのひかりを\nみたものは　ふかいねむりに　おちる。"
          moon: "ひるは　ねながら　じゅもくの　ねから\nようぶんを　すう。　よるに　めざめ\nあらたな　じゅもくを　さがしあるく。"
        jp_kanji:
          sun: "点滅しながら　発光する　胞子を\nあたりに　ばら撒く。　その光を\n見た者は　深い眠りに　おちる。"
          moon: "昼は　寝ながら　樹木の　根から\n養分を　吸う。　夜に　目覚め\n新たな　樹木を　探し歩く。"
        en:
          sun: "It scatters spores that flicker and glow. Anyone\nseeing these lights falls into a deep slumber."
          moon: "As it drowses the day away, it nourishes itself\nby sucking from tree roots. It wakens at the fall\nof night, wandering off in search of a new tree."
        fr:
          sun: "Il répand des spores luminescentes qui\nclignotent autour de lui. Quiconque aperçoit\nces lumières tombe dans un sommeil profond."
          moon: "Le jour, il dort tout en absorbant des nutriments\nà la racine des arbres. Le soir, il se lève et part\nà la recherche d’un nouvel arbre où se poser."
        it:
          sun: "Sparge tutto intorno spore che emettono\nuna luce intermittente. Chi la vede cade\nprofondamente addormentato."
          moon: "Di giorno dorme mentre succhia sostanze\nnutritive dalle radici degli alberi. Di notte\nsi sveglia e va alla ricerca di nuove piante."
        de:
          sun: "Es streut blinkende Sporen aus. Jeder,\nder dieses Licht sieht, schläft fest ein."
          moon: "Tagsüber saugt es im Schlaf Nährstoffe aus den\nWurzeln der Bäume. Nachts wacht es auf und\nmacht sich auf die Suche nach frischen Bäumen."
        es:
          sun: "Cuando titila, esparce esporas luminosas a su\nalrededor. Todo aquel que ve esta luz cae en un\nprofundo sueño."
          moon: "Por el día, absorbe los nutrientes de las raíces\nde los árboles mientras duerme. Por la noche,\ndespierta y parte en busca de nuevos árboles."
        ko:
          sun: "깜빡이면서 빛나는 포자를\n주변에 뿌린다. 그 빛을\n본 자는 깊은 잠에 빠진다."
          moon: "낮에는 자면서 나무뿌리에서\n양분을 흡수한다. 밤에 일어나면\n새로운 나무를 찾아 걸어 다닌다."
        zh_simp:
          sun: "在周围到处撒播\n一闪一闪发着光的孢子。\n看到这个光的都会陷入沉睡中。"
          moon: "白天一边睡觉一边从树根吸取养分。\n会在晚上醒来，走路寻找新的树木。"
        zh_trad:
          sun: "在周圍到處散播\n一閃一閃發著光的孢子。\n看到這個光的都會陷入沉睡中。"
          moon: "在白天會一邊睡覺一邊從樹根吸取養分。\n到了晚上醒來，出走尋找新的樹木。"
shiinotic:
  species_id: 756
  names:
    jp_kana: マシェード
    jp_kanji: マシェード
    en: Shiinotic
    fr: Lampignon
    it: Shiinotic
    de: Lamellux
    es: Shiinotic
    ko: 마셰이드
    zh_simp: 灯罩夜菇
    zh_trad: 燈罩夜菇
  forms:
    shiinotic:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 80
        special_attack: 90
        special_defense: 100
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
