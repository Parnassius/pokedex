      types:
        - normal
        - fighting
      egg_groups:
        - field
      abilities:
        - fluffy
        - klutz
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          sun: "あっとうてきな　きんりょくを　もつ\nひじょうに　きけんな　ポケモン。\nせいそくちは　きほん　たちいりきんし。"
          moon: "なかまと　だきしめあう　くせが　ある。\nそのちからで　せぼねを　くだかれて\nよを　さる　トレーナーも　おおい。"
        jp_kanji:
          sun: "圧倒的な　筋力を　持つ\n非常に　危険な　ポケモン。\n生息地は　基本　立ち入り禁止。"
          moon: "仲間と　抱きしめあう　くせが　ある。\nその力で　背骨を　砕かれて\n世を　去る　トレーナーも　多い。"
        en:
          sun: "This immensely dangerous Pokémon\npossesses overwhelming physical strength.\nIts habitat is generally off-limits."
          moon: "This Pokémon has the habit of hugging its\ncompanions. Many Trainers have left this world\nafter their spines were squashed by its hug."
        fr:
          sun: "Sa force physique hors norme le rend assez\ndangereux. D’ailleurs, les zones qu’il habite sont\nsystématiquement interdites d’accès."
          moon: "Il fête chaque victoire par une accolade avec\nson Dresseur, au grand dam de ce dernier,\net en particulier de sa colonne vertébrale."
        it:
          sun: "La sua devastante forza fisica lo rende\nestremamente pericoloso, tanto che di solito\nè vietato l’accesso alle zone in cui vive."
          moon: "Ha il vizio di abbracciare gli amici con una forza\ndisumana. Le sue effusioni hanno un effetto\ndistruttivo sulle ossa del proprio Allenatore."
        de:
          sun: "Dieses Pokémon verfügt über immense\nMuskelkraft und ist äußerst gefährlich.\nSein Habitat ist generell Sperrgebiet."
          moon: "Hat die Angewohnheit, Kameraden zu umarmen.\nNur ist es leider so stark, dass so mancher\nTrainer schon einen kaputten Rücken davontrug."
        es:
          sun: "Es un Pokémon muy peligroso por su fuerza\ndescomunal. Normalmente, se desaconseja\npenetrar en su hábitat."
          moon: "Expresa su afecto abrazando a sus amigos,\naunque más de un Entrenador ha terminado con\nla espalda hecha polvo debido a esto."
        ko:
          sun: "압도적인 근력을 가지는\n아주 위험한 포켓몬이다.\n서식지는 기본 출입금지다."
          moon: "동료끼리 서로 껴안는 버릇이 있다.\n그 힘 때문에 척추가 부러져서\n세상을 떠나는 트레이너도 많다."
        zh_simp:
          sun: "拥有压倒性的肌肉力量，\n是非常危险的宝可梦。\n栖息地基本是禁止进入。"
          moon: "有和伙伴互相紧抱的习性。\n被这个力量压碎脊椎而去世的\n训练家也很多。"
        zh_trad:
          sun: "擁有壓倒性的肌肉力量，\n是非常危險的寶可夢。\n棲息地基本上是禁止進入。"
          moon: "有和夥伴互相緊抱的習性。\n被這個力量壓碎脊椎而去世的\n訓練家也很多。"
bounsweet:
  species_id: 761
  names:
    jp_kana: アマカジ
    jp_kanji: アマカジ
    en: Bounsweet
    fr: Croquine
    it: Bounsweet
    de: Frubberl
    es: Bounsweet
    ko: 달콤아
    zh_simp: 甜竹竹
    zh_trad: 甜竹竹
  forms:
    bounsweet:
      form_id: 0
      base_stats:
        hp: 42
        attack: 30
        defense: 38
        special_attack: 30
        special_defense: 38
        speed: 32
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
