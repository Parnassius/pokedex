      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: snow_warning
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          sun: "マイナス５０どの　れいきを　はく。\nアローラのろうじんは　ケオケオという\nむかしの　なまえで　よぶことも。"
          moon: "あついときには　６ぽんの　しっぽで\nこおりのつぶてを　つくり　あたりに\nばらまいて　からだを　ひやす。"
        jp_kanji:
          sun: "マイナス５０度の　冷気を　吐く。\nアローラの老人は　ケオケオという\n昔の　名前で　呼ぶことも。"
          moon: "暑いときには　６本の　尻尾で\n氷の礫を　作り　あたりに\nばらまいて　身体を　冷やす。"
        en:
          sun: "It exhales air colder than -58 degrees\nFahrenheit. Elderly people in Alola call this\nPokémon by an older name—Keokeo."
          moon: "In hot weather, this Pokémon makes ice shards\nwith its six tails and sprays them around to cool\nitself off."
        fr:
          sun: "La température de son souffle descend à\n-50 °C. Les anciens d’Alola l’appellent encore\npar son ancien nom : « Ke’oke’o »."
          moon: "Quand il fait chaud, il crée des boules de neige\navec ses six queues et les disperse autour de\nlui pour se rafraîchir."
        it:
          sun: "Il suo soffio gelido raggiunge -50 °C.\nI più anziani ad Alola lo chiamano ancora con\nil suo antico nome: “Ke’oke’o”."
          moon: "Quando ha troppo caldo abbassa la temperatura\nproiettando tutto attorno a sé pezzi di ghiaccio\nche crea dalle sue sei code."
        de:
          sun: "Sein eisiger Atem beträgt -50 °C. Einige der\nälteren Einwohner von Alola nennen es bei\nseinem früheren Namen „Ke’oke’o“."
          moon: "Wenn ihm heiß wird, erzeugt es mit seinen sechs\nSchweifen Kiesel aus Eis. Diese verteilt es in der\nNähe, um seinen Körper abzukühlen."
        es:
          sun: "Expulsa aire gélido a -50 °C. Los ancianos de\nAlola también se refieren a él por su antiguo\nnombre: Keo-Keo."
          moon: "Cuando hace calor, crea rocas de hielo con sus\nseis colas y las disemina por los alrededores\npara enfriar su cuerpo."
        ko:
          sun: "마이너스 50도의 냉기를 뿜어낸다.\n알로라의 노인은 케오케오라는\n옛날 이름으로 부르기도 한다."
          moon: "더울 때는 6개의 꼬리로\n얼음 뭉치를 만들어 주변에\n뿌려서 몸을 식힌다."
        zh_simp:
          sun: "会喷出零下５０度的冷气。\n阿罗拉的老人也会用凯欧凯欧\n这个过去的名字称呼它。"
          moon: "在炎热的时候，用６根尾巴\n制作冰砾在周围挥洒，\n让身体冷却下来。"
        zh_trad:
          sun: "會噴出零下５０度的冷氣。\n阿羅拉的老人也會用\n凱歐凱歐這個過去的名字稱呼牠。"
          moon: "天氣熱的時候會用６根尾巴\n製造冰礫再撒向周圍，\n藉此讓身體冷卻下來。"
