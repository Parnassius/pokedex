espeon:
  species_id: 196
  names:
    jp_kana: エーフィ
    jp_kanji: エーフィ
    en: Espeon
    fr: Mentali
    it: Espeon
    de: Psiana
    es: Espeon
    ko: 에브이
    zh_simp: 太阳伊布
    zh_trad: 太陽伊布
  forms:
    espeon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 95
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - synchronize
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          sun: "ほそく　みじかい　たいもうで　くうきの\nながれから　あいての　こうどう　まで\nいっしゅんで　よみとってしまう。"
          moon: "ひたいの　たまから　サイコパワーを\nほうしゃして　たたかう。　パワーが\nつきると　たまの　いろが　くすむ。"
        jp_kanji:
          sun: "細く　短い　体毛で　空気の\n流れから　相手の　行動　まで\n一瞬で　読み取ってしまう。"
          moon: "額の　玉から　サイコパワーを\n放射して　戦う。　パワーが\n尽きると　玉の　色が　くすむ。"
        en:
          sun: "It can instantaneously sense its opponent’s\nmovements by feeling air currents with its\nfine fur."
          moon: "It unleashes psychic power from the orb on its\nforehead. When its power is exhausted, the orb\ngrows dull and dark."
        fr:
          sun: "Son pelage court et clairsemé détecte en un\ninstant le moindre mouvement de l’air ou de\nl’ennemi."
          moon: "Le joyau sur son front projette des ondes\npsychiques en combat, et s’obscurcit lorsque\nMentali est à bout de force."
        it:
          sun: "Riesce a prevedere in un istante le mosse\ndei nemici analizzando le correnti d’aria\ngrazie al suo pelo corto e fine."
          moon: "Lotta emettendo poteri psichici dalla sfera\nche ha sulla fronte, che diventa più scura\nman mano che le sue energie diminuiscono."
        de:
          sun: "Mit seinem feinen, kurzen Fell kann es anhand\nvon Luftbewegungen augenblicklich erkennen,\nwas sein Gegner plant."
          moon: "Über die Kugel an seiner Stirn feuert es\nPsycho-Kräfte ab. Geht ihm die Kraft aus,\nverliert die Farbe der Kugel an Glanz."
        es:
          sun: "Su corto y fino pelaje percibe los cambios en el\naire y esto le permite predecir los movimientos\nde sus oponentes."
          moon: "Lucha con los poderes psíquicos que brotan de\nla esfera de su frente, que se oscurece cuando\nsu energía disminuye."
        ko:
          sun: "가늘고 짧은 털로 공기의\n흐름부터 상대의 행동까지\n순식간에 읽어버린다."
          moon: "이마의 구슬에서 사이코 파워를\n방사해서 싸운다. 파워가\n다하면 구슬의 색이 흐려진다."
        zh_simp:
          sun: "利用又细又短的体毛，\n从空气的流动中，连对手的行动\n也能一瞬间就察觉。"
          moon: "从额头的珠子放射出精神力量\n进行战斗。当力量用尽时，\n珠子的颜色也会褪去。"
        zh_trad:
          sun: "利用又細又短的體毛感受\n空氣的流動，連對手的行動\n也能一瞬間洞悉。"
          moon: "從額頭的珠子放射出精神力量\n進行戰鬥。當力量用盡時，\n珠子的顏色也會褪去。"
umbreon:
  species_id: 197
  names:
