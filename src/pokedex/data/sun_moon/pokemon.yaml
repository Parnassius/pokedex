      descriptions:
        jp_kana:
          sun: "まだ　でんきを　あつかうのが　ヘタ。\nちょっと　めを　はなすと　じぶんの\nでんきで　しびれていることも。"
          moon: "かわいいけれど　いっしょに　くらすなら\nでんきショックで　ビリビリに　される\nかくごを　しなければ　いけないのだ。"
        jp_kanji:
          sun: "まだ　電気を　扱うのが　ヘタ。\nちょっと　目を　離すと　自分の\n電気で　しびれていることも。"
          moon: "可愛いけれど　一緒に暮らすなら\n電気ショックで　ビリビリに　される\n覚悟を　しなければ　いけないのだ。"
        en:
          sun: "It is not yet skilled at controlling electricity.\nIf you take your eyes off it, it may shock itself."
          moon: "Despite this Pokémon’s cute appearance, those\nwho want to live with one should prepare to be\non the receiving end of its electric jolts."
        fr:
          sun: "Il ne contrôle pas encore bien son électricité.\nSi on le laisse sans surveillance, il est capable\nde s’électrocuter lui-même."
          moon: "Bien qu’il soit adorable, il faut être prêt à\nsupporter ses décharges électriques répétées\nsi l’on veut vivre avec un Pichu."
        it:
          sun: "Non sa ancora controllare bene l’elettricità.\nSe non lo si tiene d’occhio, rischia di darsi\nla scossa da solo."
          moon: "È molto carino, ma quando si sta con lui, bisogna\nrassegnarsi a prendere la scossa a causa delle\nsue scariche elettriche."
        de:
          sun: "Es ist noch nicht sehr geübt im Umgang mit\nElektrizität. Lässt man es kurz aus den Augen,\nlähmt es sich schon mal versehentlich selbst."
          moon: "Pichu sind sehr niedlich, aber wer mit einem\nzusammenleben will, sollte sich besser auf\nregelmäßige Stromschläge gefasst machen."
        es:
          sun: "No controla muy bien la electricidad. Como su\nEntrenador se descuide, Pichu puede acabar\nparalizado por sus propias descargas."
          moon: "Es un Pokémon adorable, pero cuando se\nconvive con él, uno tiene que estar preparado\npara recibir alguna que otra descarga eléctrica."
        ko:
          sun: "아직 전기를 다루는 것이 서툴다.\n잠시 한눈팔면 자기의 전기에\n마비되어 있을 때도 있다."
          moon: "귀엽지만 같이 산다면\n전기쇼크로 찌릿찌릿해질\n각오를 해야 한다."
        zh_simp:
          sun: "运用电的水平还不够。\n稍不留神就被自己的电\n麻到也时有发生。"
          moon: "虽然很可爱，但如果一起生活的话，\n就必须有被电击电得麻麻的觉悟。"
        zh_trad:
          sun: "還未能熟練地操縱電力。\n有時候稍不留神就會被\n自己的電麻痺到。"
          moon: "雖然很可愛，但如果一起生活的話，\n就必須有隨時被電擊電得麻麻的覺悟。"
cleffa:
