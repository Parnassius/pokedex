      names:
        jp_kana: にしのうみ
        jp_kanji: にしのうみ
        en: West Sea
        fr: Mer Occident
        it: Mare Ovest
        de: Westliches Meer
        es: Mar Oeste
        ko: 서쪽바다
        zh_simp: 西海
