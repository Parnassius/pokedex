      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          sun: "ホネで　きれいに　きかざるのは　♂に\nアピールするためと　いわれるが\nバルジーナの　♂は　みつかっていない。"
          moon: "おおぞらを　せんかい　しながら\nよわった　ポケモンを　ねらっている。\nだいこうぶつは　カラカラ。"
        jp_kanji:
          sun: "骨で　綺麗に　着飾るのは　♂に\nアピールするためと　いわれるが\nバルジーナの　♂は　みつかっていない。"
          moon: "大空を　旋回　しながら\n弱った　ポケモンを　狙っている。\n大好物は　カラカラ。"
        en:
          sun: "They adorn themselves beautifully with bones.\nThis is supposedly an effort to attract males,\nbut no male Mandibuzz have ever been found."
          moon: "It circles in the sky, keeping a keen eye out for\nPokémon in a weakened state. Its choicest food\nis Cubone."
        fr:
          sun: "Les Vaututrice femelles se parent d’ossements\npour leur parade nuptiale. On attend toujours\nde découvrir si les mâles existent ou pas."
          moon: "Il tournoie, haut dans le ciel, à la recherche\nd’un Pokémon affaibli. Sa proie favorite est\nle petit Osselait."
        it:
          sun: "Si dice che si adorni di ossa per attirare\nesemplari di sesso opposto. Tuttavia non\nsono mai stati avvistati Mandibuzz maschi."
          moon: "Volteggia nel cielo alla ricerca di Pokémon\nindeboliti. È ghiotto di Cubone."
        de:
          sun: "Trägt gern Knochenschmuck, um Männchen zu\ngefallen. Niemand hat bisher aber jemals ein\nmännliches Grypheldis gesehen."
          moon: "Es überblickt das Areal aus der Luft und stürzt\nsich auf geschwächte Pokémon. Tragosso ist\nseine bevorzugte Beute."
        es:
          sun: "Se dice que los huesos con los que se engalana\nle sirven para cortejar al otro sexo, aunque\nnunca se ha avistado ningún Mandibuzz macho."
          moon: "Revolotea por el cielo en busca de un Pokémon\ndébil al que convertir en su presa. Tiene una\nparticular debilidad por los Cubone."
        ko:
          sun: "뼈로 예쁘게 치장하는 것은 수컷에게\n어필하기 위한 것이라고 전해지지만\n버랜지나의 수컷은 발견되지 않았다."
          moon: "넓은 하늘을 선회하며\n약해진 포켓몬을 노리고 있다.\n가장 좋아하는 것은 탕구리."
        zh_simp:
          sun: "据说，用骨头华丽地装饰是为了吸引♂，\n但还没有发现过♂的秃鹰娜。"
          moon: "一边在天空盘旋，\n一边瞄准弱小的宝可梦。\n最喜欢吃的是卡拉卡拉。"
        zh_trad:
          sun: "據說，用骨頭華麗地裝飾是為了吸引♂，\n但還沒有發現過♂的禿鷹娜。"
          moon: "一邊在天空盤旋，\n一邊瞄準弱小的寶可夢。\n最喜歡吃的是卡拉卡拉。"
