        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 75
        attack: 71
        defense: 70
        special_attack: 40
        special_defense: 80
        speed: 77
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dark
        - normal
      egg_groups:
        - field
      abilities:
        - gluttony
        - hustle
      hidden_ability: thick_fat
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          sun: "コラッタを　ひきい　グループをつくる。\nグループには　テリトリーが　あり\nエサを　めぐり　こうそうに　なる。"
          moon: "エサの　あじと　せんどに　こだわる\nグルメな　ポケモン。　ラッタが　すむ\nレストランは　アタリと　いわれる。"
        jp_kanji:
          sun: "コラッタを　率い　グループをつくる。\nグループには　テリトリーが　あり\n餌を　巡り　抗争に　なる。"
          moon: "餌の　味と　鮮度に　こだわる\nグルメな　ポケモン。　ラッタが　棲む\nレストランは　アタリと　いわれる。"
        en:
          sun: "It forms a group of Rattata, which it assumes\ncommand of. Each group has its own territory,\nand disputes over food happen often."
          moon: "This gourmet Pokémon is particular about the\ntaste and freshness of its food. Restaurants\nwhere Raticate live have a good reputation."
        fr:
          sun: "Il rassemble des bandes de Rattata sous son\nautorité. Chaque bande a son territoire où les\nmembres se disputent la nourriture."
          moon: "Un Pokémon gastronome et extrêmement\npointilleux sur sa nourriture. On dit que les\nrestaurants où vit un Rattatac sont les meilleurs."
        it:
          sun: "Si circonda di Rattata con cui forma il proprio\nbranco. Ogni branco controlla un territorio\ne spesso sorgono dispute per il cibo."
          moon: "Ha il palato raffinato e mangia solo cibo fresco\ne gustoso. Si dice che avere un Raticate nel\nproprio ristorante sia una garanzia di qualità."
        de:
          sun: "Schart eine Gruppe Rattfratz um sich. Zwischen\nden Gruppen, die jeweils ihr eigenes Territorium\nbesitzen, entbrennen oft Kämpfe um Futter."
          moon: "Ein Gourmet, dem Geschmack und Frische\nseines Futters wichtig sind. Restaurants gelten\nals angesehen, wenn sich ein Rattikarl einnistet."
        es:
          sun: "Suele liderar grupos de Rattata. Cada uno de\nellos tiene su propio territorio y se producen\ndisputas por el alimento."
          moon: "Este gourmet es muy exigente con el sabor y\nla frescura de la comida. Si Raticate vive en un\nrestaurante, no cabe duda de que es uno bueno."
        ko:
          sun: "꼬렛을 통솔하여 그룹을 만든다.\n그룹 간에는 영역이 있어\n먹이를 둘러싸고 쟁탈전을 벌인다."
          moon: "먹이의 맛과 신선도에 까다로운\n미식가 포켓몬. 레트라가 사는\n레스토랑은 진짜 맛집이라고 전해진다."
        zh_simp:
          sun: "率领小拉达组成团队。\n每个团队都有自己的领地，\n会因为寻找食物而发生争斗。"
          moon: "对食物的味道和新鲜度\n很讲究的美食家宝可梦。\n选择有拉达居住的饭店被称为是选对了。"
        zh_trad:
          sun: "率領小拉達組成團隊。\n每個團隊各有自己的地盤，\n會為了爭奪食物而發生爭鬥。"
          moon: "對食物的味道和新鮮度\n非常講究的美食家寶可夢。\n據說有拉達棲息的餐廳肯定是好餐廳。"
