      descriptions:
        jp_kana:
          sun: "くびの　つけねに　ほのおの　スズが\nある。　ほのおが　ふきだすとき\nリンリンと　たかいおとが　なる。"
          moon: "まえあしの　ちからが　じまん。\nパンチの　いちげきで　てつのぼうも\nへしまげて　しまうのだ。"
        jp_kanji:
          sun: "首の　付け根に　炎の　鈴が\nある。　炎が　噴きだすとき\nリンリンと　高い音が　鳴る。"
          moon: "前足の　力が　自慢。\nパンチの　一撃で　鉄の棒も\nへし曲げて　しまうのだ。"
        en:
          sun: "At its throat, it bears a bell of fire. The bell rings\nbrightly whenever this Pokémon spits fire."
          moon: "It boasts powerful front legs. With a single\npunch, it can bend an iron bar right over."
        fr:
          sun: "Il porte à son cou une cloche de feu. Lorsqu’il\ncrache des flammes, cette dernière se met\nà tinter bruyamment."
          moon: "Il est très fier de ses pattes avant musclées,\net ne se gêne pas pour le montrer en tordant\ndes barres de fer d’un seul coup de poing."
        it:
          sun: "Quando si mette a sputare fuoco, il sonaglio\ninfuocato che tiene al collo emette un forte\ntintinnio."
          moon: "Va molto fiero della potenza delle sue zampe\nanteriori, grazie alle quali è capace di piegare\nuna spranga di ferro con un colpo solo."
        de:
          sun: "Es trägt ein feuriges Glöckchen um den Hals.\nImmer, wenn es Flammen ausstößt, ertönt ein\nhelles Läuten."
          moon: "Dieses Pokémon ist sehr stolz auf seine starken\nVorderbeine. Außerdem kann es mit nur einem\nSchlag eine Eisenstange verbiegen."
        es:
          sun: "Luce al cuello un cascabel incandescente que\ntintinea con fuerza cuando desprende llamas."
          moon: "Se enorgullece de la fuerza de sus patas\ndelanteras, con las que es capaz de doblar\nbarras de acero de un solo golpe."
        ko:
          sun: "목 주변에 불꽃의 방울이 있다.\n불꽃을 뿜어낼 때\n딸랑딸랑 높은 소리가 난다."
          moon: "앞발의 힘이 자랑거리다.\n펀치 한 방에 철봉도\n구부러트려 버린다."
        zh_simp:
          sun: "脖子上挂有火焰铃铛。\n喷出火焰的时候，\n会叮铃铃地发出很响的声音。"
          moon: "以前肢的力量而自豪。\n一记拳击，连铁棒都能弯折。"
        zh_trad:
          sun: "脖子上掛著火焰鈴鐺。\n噴出火焰的時候，\n會叮鈴鈴地發出響亮的聲音。"
          moon: "以前腳的力量而自豪。\n只要一拳就能把鐵棒都打彎。"
