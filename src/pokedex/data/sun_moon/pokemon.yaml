caterpie:
  species_id: 10
  names:
    jp_kana: キャタピー
    jp_kanji: キャタピー
    en: Caterpie
    fr: Chenipan
    it: Caterpie
    de: Raupy
    es: Caterpie
    ko: 캐터피
    zh_simp: 绿毛虫
    zh_trad: 綠毛蟲
  forms:
    caterpie:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 35
        special_attack: 20
        special_defense: 20
        speed: 45
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shield_dust
      hidden_ability: run_away
      descriptions:
        jp_kana:
          sun: "とりポケモンに　おそわれると　ツノから\nにおいを　だして　ていこう　するが\nえじきに　なることも　おおい。"
          moon: "つかまえやすく　せいちょうも　はやい。\nしんまいトレーナーの　パートナーに\nおススメの　ポケモンの　いっぴき。"
        jp_kanji:
          sun: "とりポケモンに　襲われると　ツノから\n臭いを　だして　抵抗　するが\n餌食に　なることも　多い。"
          moon: "捕まえやすく　成長も　早い。\n新米トレーナーの　パートナーに\nおススメの　ポケモンの　一匹。"
        en:
          sun: "When attacked by bird Pokémon, it resists by\nreleasing a terrifically strong odor from its\nantennae, but it often becomes their prey."
          moon: "It’s easy to catch, and it grows quickly, making\nit one of the top recommendations for novice\nPokémon Trainers."
        fr:
          sun: "Lorsqu’il est attaqué par un Pokémon Vol,\nil utilise ses antennes pour dégager une odeur\nnauséabonde, mais cela le sauve rarement."
          moon: "Un Pokémon facile à attraper et qui croît\nrapidement. C’est l’un des partenaires\nprivilégiés des Dresseurs débutants."
        it:
          sun: "Tenta di difendersi dai Pokémon alati\nemettendo un forte fetore dalle antenne,\nma cade spesso vittima dei loro attacchi."
          moon: "È facile da catturare e cresce in fretta.\nÈ uno dei Pokémon più indicati per gli Allenatori\nin erba."
        de:
          sun: "Es versucht, angreifende Vogel-Pokémon mit\ndem Gestank aus seinen Antennen in die Flucht\nzu schlagen. Das gelingt ihm aber nicht immer."
          moon: "Es eignet sich bestens für frischgebackene\nTrainer, da es sich leicht fangen lässt und\nsich sehr schnell entwickelt."
        es:
          sun: "A menudo resulta presa de Pokémon pájaro,\nfrente a los que su única defensa es el hedor\nrepulsivo que libera por su antena."
          moon: "Se desarrolla rápidamente y es fácil de atrapar.\nEs el compañero ideal para Entrenadores menos\nexperimentados."
        ko:
          sun: "새포켓몬에게 습격당하면 뿔에서\n냄새를 뿜어 저항하지만\n먹이가 되는 일도 많다."
          moon: "잡기 쉽고 성장도 빠르다.\n새내기 트레이너의 파트너로\n추천하는 포켓몬 중 한 마리."
        zh_simp:
          sun: "被鸟宝可梦袭击时\n会从触角中释放出臭气抵抗，\n但也经常会成为鸟食。"
          moon: "易于捕捉，成长也快。\n是推荐给新手训练家\n作为同伴的宝可梦之一。"
        zh_trad:
          sun: "被鳥寶可夢襲擊時，\n會從觸角釋放出臭氣抵抗，\n但還是經常淪為獵物。"
          moon: "易於捕捉，成長速度亦快。\n是推薦給新手訓練家\n作為同伴的寶可夢之一。"
metapod:
  species_id: 11
  names:
    jp_kana: トランセル
    jp_kanji: トランセル
    en: Metapod
    fr: Chrysacier
    it: Metapod
    de: Safcon
    es: Metapod
    ko: 단데기
    zh_simp: 铁甲蛹
    zh_trad: 鐵甲蛹
  forms:
    metapod:
      form_id: 0
      base_stats:
        hp: 50
        attack: 20
        defense: 55
        special_attack: 25
        special_defense: 25
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          sun: "カラのなかには　トロトロの　なかみが\nつまっている。　ほぼ　うごかないのは\nウッカリ　なかみが　こぼれないため。"
          moon: "かたいと　いっても　むしの　カラ。\nわれてしまうことも　あるので\nはげしい　たたかいは　きんもつ。"
        jp_kanji:
          sun: "カラの中には　トロトロの　中身が\n詰まっている。　ほぼ動かないのは\nウッカリ　中身が　こぼれないため。"
          moon: "硬いと　いっても　虫の　殻。\n割れてしまうことも　あるので\n激しい　戦いは　禁物。"
        en:
          sun: "Its shell is filled with its soft innards. It doesn’t\nmove much because of the risk it might\ncarelessly spill its innards out."
          moon: "Its shell is hard, but it’s still just a bug shell.\nIt’s been known to break, so intense battles\nwith it should be avoided."
        fr:
          sun: "Sous sa carapace, il est tout mou et tendre.\nIl bouge très peu afin de ne pas secouer son\ncorps encore fragile."
          moon: "Même si sa carapace est solide, elle n’est guère\ncomposée que de chitine et peut se briser\naisément. Mieux vaut éviter les combats rudes."
        it:
          sun: "La corazza racchiude un corpo estremamente\nmolle e il Pokémon si muove appena per paura\nche fuoriesca accidentalmente."
          moon: "La sua corazza è piuttosto dura per un\nPokémon Coleottero, ma potrebbe comunque\nrompersi. Meglio evitare lotte troppo veementi."
        de:
          sun: "Sein harter Panzer birgt ein weiches Inneres.\nUm zu vermeiden, dass dieses versehentlich\nausläuft, bewegt es sich kaum."
          moon: "Sein Panzer ist zwar hart, aber dennoch anfällig\nfür Risse, da es ein Käfer-Pokémon ist.\nFür schwere Kämpfe ist es daher ungeeignet."
        es:
          sun: "La dura capa que le recubre el cuerpo protege\nsus delicadas vísceras. Metapod apenas se\nmueve para evitar que estas se desparramen."
          moon: "Su coraza es muy dura, pero no deja de estar\nhecha de quitina, por lo que podría quebrarse.\nEs mejor no llevarlo en combates muy intensos."
        ko:
          sun: "껍질 안은 부드러운 내용물로 가득 차 있다.\n거의 움직이지 않는 것은 무심코\n내용물이 흘러나오게 하지 않기 위해서다."
          moon: "단단하다고는 해도 벌레의 껍질.\n갈라질 수도 있으므로\n격렬한 싸움은 금물이다."
        zh_simp:
          sun: "壳中藏着软乎乎的身体。\n几乎不动是为了防止\n身体一不留神就露出来。"
          moon: "虽说坚硬，但还是虫的外壳。\n因为有时也会破裂，\n所以禁止用于激烈的战斗。"
        zh_trad:
          sun: "殼中塞滿了軟綿綿的身體。\n幾乎動也不動是為了防止\n身體在不留神時露出來。"
          moon: "雖說堅硬，但還是蟲的外殼。\n有時還是會破裂的，\n所以禁止用於激烈的戰鬥。"
butterfree:
  species_id: 12
