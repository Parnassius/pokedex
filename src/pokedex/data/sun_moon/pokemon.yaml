        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - receiver
      hidden_ability: defiant
      descriptions:
        jp_kana:
          sun: "２０ぴきぜんごの　グループを　つくる。\nそのけっそくは　ひじょうに　かたく\nぜったい　なかまを　みすてない。"
          moon: "かたい　きのみを　つかい　たたかう。\nそのテクニックは　だいだいの　ボスから\nグループの　なかまに　うけつがれる。"
        jp_kanji:
          sun: "２０匹前後の　グループを　つくる。\nその結束は　非常に　固く\n絶対　仲間を　見捨てない。"
          moon: "硬い　木の実を　使い　戦う。\nそのテクニックは　代々の　ボスから\nグループの　仲間に　受け継がれる。"
        en:
          sun: "They form groups of roughly 20 individuals.\nTheir mutual bond is remarkable—they will never\nlet down a comrade."
          moon: "They battle with hard berries for weapons.\nTheir techniques are passed from the boss to\nthe group, generation upon generation."
        fr:
          sun: "Ils se rassemblent par groupes de vingt. Dans\ncette formation très soudée, nul ne songerait\nune seule seconde à abandonner ses alliés."
          moon: "Il choisit les Baies les plus dures pour s’en\nservir au combat : un stratagème bien rodé que\nles chefs de groupe enseignent à leurs alliés."
        it:
          sun: "Si muove in gruppi di circa 20 esemplari che,\nuniti da un fortissimo legame, sono pronti a tutto\nper aiutarsi a vicenda."
          moon: "Sceglie le bacche più dure per sfruttare una\ntecnica di lotta tramandata attraverso i leader\ndel gruppo di generazione in generazione."
        de:
          sun: "Es gründet Gruppen von etwa 20 Exemplaren.\nDer Zusammenhalt der Gruppe ist extrem stark,\nkein Kamerad wird jemals im Stich gelassen."
          moon: "Es setzt eine harte Beere im Kampf ein. Diese\nTechnik wird vom Anführer der Gruppe von\nGeneration zu Generation weitervererbt."
        es:
          sun: "Suele ir en grupos de unos veinte ejemplares.\nSus miembros permanecen siempre unidos y\nnunca se abandonan unos a otros."
          moon: "Utiliza bayas duras en combate. Para que esta\ntécnica perviva de generación en generación, los\njefes la transmiten a un grupo de elegidos."
        ko:
          sun: "20마리 전후의 그룹을 만든다.\n그 결속은 상당히 강하며\n절대 동료를 버리지 않는다."
          moon: "딱딱한 나무열매를 사용해서 싸운다.\n그 테크닉은 대대로 보스로부터\n그룹 동료들에게 전수된다."
        zh_simp:
          sun: "会形成２０只左右的团队。\n这样团结在一起，会非常坚固，\n绝对不会舍弃伙伴。"
          moon: "使用坚硬的树果战斗。\n每一代的老大会把这个技术\n传承给团队的伙伴们。"
        zh_trad:
          sun: "會組成２０隻左右的團隊。\n大家心連心非常團結，\n絕不會捨棄夥伴。"
          moon: "使用堅硬的樹果戰鬥。\n這個技術會透過每一代的老大\n傳承給團隊裡的夥伴們。"
wimpod:
