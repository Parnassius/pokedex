        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - overcoat
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          sun: "ぷよぷよの　おしりを　まもるのは\nくった　えものの　ホネ。\nせいちょうのたび　はきかえるよ。"
          moon: "まだまだ　あそびざかり。\nはねが　みじゅくで　とべないので\nぴょんぴょん　はねまわっているよ。"
        jp_kanji:
          sun: "ぷよぷよの　お尻を　守るのは\n喰った　獲物の　骨。\n成長のたび　はき替えるよ。"
          moon: "まだまだ　遊び盛り。\n羽が　未熟で　飛べないので\nぴょんぴょん　跳ね回っているよ。"
        en:
          sun: "It protects its plump posterior with the bones\nof prey it has consumed. As it grows, it \nreplaces the bones."
          moon: "It can’t fly yet and must wait until its wings have\ndeveloped more. Since it’s still at a playful age,\nit hops around friskily."
        fr:
          sun: "Il protège son tendre popotin avec le crâne\nd’une de ses proies. Il en change régulièrement\nen grandissant."
          moon: "Il est encore très joueur. Ses ailes n’étant pas\nassez développées pour lui permettre de voler,\nil se déplace en sautillant."
        it:
          sun: "Protegge il debole bacino con i teschi delle\nprede di cui si nutre. Man mano che cresce,\ndeve cambiare il teschio."
          moon: "È un giocherellone. Non potendo volare a causa\ndelle ali poco sviluppate, si sposta saltellando."
        de:
          sun: "Seinen weichen Bürzel schützt es mithilfe von\nSchädeln gefressener Beute. Ist es ein Stück\ngewachsen, muss ein größerer Schädel her."
          moon: "Dieses Pokémon ist noch sehr verspielt. Seine\nFlügel sind noch zu klein zum Fliegen, es kann\nsich also nur hüpfend fortbewegen."
        es:
          sun: "Protege sus posaderas blanduzcas con los\nhuesos de las presas que ha devorado. A\nmedida que crece se ve obligado a cambiarlos."
          moon: "Todavía está en su más tierna infancia. Como\nsus alas aún no se han desarrollado del todo,\nse desplaza dando saltos."
        ko:
          sun: "포동포동한 엉덩이를 지키는 것은\n먹어버린 먹이의 뼈다.\n성장할 때마다 갈아입는다."
          moon: "아직 한창 놀 때이다. 날개가\n다 자라지 않아 날지 못하기 때문에\n깡충깡충 뛰어다닌다."
        zh_simp:
          sun: "保护着软乎乎屁股的\n是吃完的猎物的尸骨。\n会随着每次生长丢弃更换哦。"
          moon: "还是最爱玩的年纪。\n翅膀还不发达，无法飞行，\n所以会来回地蹦蹦跳哦。"
        zh_trad:
          sun: "保護著軟綿綿屁股的\n是吃完獵物後剩下的骨頭。\n會隨著每次成長丟棄更換哦。"
          moon: "還是貪玩的年紀。\n翅膀還未發達，所以無法飛行，\n會來來回回地蹦蹦跳哦。"
mandibuzz:
  species_id: 630
  names:
    jp_kana: バルジーナ
    jp_kanji: バルジーナ
