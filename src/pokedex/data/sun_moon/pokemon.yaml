        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - no_guard
      hidden_ability: steadfast
      held_items:
        rare: focus_band
      descriptions:
        jp_kana:
          sun: "きたえにきたえた　けっか　すさまじい\nパワーを　てにいれた。　そのちからを\nいかし　ひとのしごとを　てつだう。"
          moon: "すすんで　じゅうろうどうを　てつだう。\nじぶんに　とっての　いい　きんりょく\nトレーニングになると　しっているから。"
        jp_kanji:
          sun: "きたえにきたえた　結果　凄まじい\nパワーを　手にいれた。　その力を\n活かし　人の仕事を　手伝う。"
          moon: "進んで　重労働を　手伝う。\n自分に　とっての　いい　筋力\nトレーニングになると　知っているから。"
        en:
          sun: "As a result of its continual workouts, it has\ndeveloped tremendous power. It uses that\npower to help people with their work."
          moon: "It willingly assists with hard labor because it\nknows the work is good training for its muscles."
        fr:
          sun: "Grâce à un long entraînement, il a obtenu\nune force incroyable, qu’il met au service des\nhumains pour les aider dans leurs travaux."
          moon: "Il aide les humains dans les travaux de force.\nIl n’y a aucun scrupule à avoir, car il est ravi\nde pouvoir faire travailler ses muscles."
        it:
          sun: "Grazie al costante allenamento fisico ha\nsviluppato una forza straordinaria, di cui si\nserve per aiutare gli uomini nel loro lavoro."
          moon: "È sempre disponibile ad aiutare nei lavori\npesanti, considerandoli un allenamento\nper accrescere la sua forza muscolare."
        de:
          sun: "Es hat sich durch unerbittliches Training\nunglaubliche Kräfte angeeignet, mit denen\nes die Menschen bei der Arbeit unterstützt."
          moon: "Es bietet freiwillig seine Hilfe bei körperlicher\nSchwerstarbeit an, da es weiß, dass dies eine\nsehr effektive Form des Muskeltrainings ist."
        es:
          sun: "Posee una fuerza extraordinaria, obtenida a\ntravés de un tenaz entrenamiento. Utiliza su\nfuerza para ayudar a las personas."
          moon: "Ayuda a las personas cuyos trabajos requieren\nmucha fuerza, ya que esto le sirve de\nentrenamiento para fortalecer sus músculos."
        ko:
          sun: "단련하고 단련한 결과 무시무시한\n파워를 손에 넣었다. 그 힘을\n살려서 사람 일을 돕는다."
          moon: "자진해서 중노동을 돕는다.\n자신에게 좋은 근력 트레이닝이\n되는 것을 알기 때문이다."
        zh_simp:
          sun: "不断锻炼的结果就是\n拥有了非常惊人的力量。\n灵活运用这力量帮助人类工作。"
          moon: "积极地帮忙做重体力劳动，\n因为知道这会成为对自己\n有用的肌肉锻炼。"
        zh_trad:
          sun: "不斷鍛煉的成果就是\n獲得了非常驚人的力量。\n會靈活運用這股力量幫助人工作。"
          moon: "會積極地幫忙做重體力勞動，\n因為牠知道這對自己來說\n是很好的肌肉鍛鍊方法。"
