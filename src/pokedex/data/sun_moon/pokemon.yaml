roggenrola:
  species_id: 524
  names:
    jp_kana: ダンゴロ
    jp_kanji: ダンゴロ
    en: Roggenrola
    fr: Nodulithe
    it: Roggenrola
    de: Kiesling
    es: Roggenrola
    ko: 단굴
    zh_simp: 石丸子
    zh_trad: 石丸子
  forms:
    roggenrola:
      form_id: 0
      base_stats:
        hp: 55
        attack: 75
        defense: 85
        special_attack: 25
        special_defense: 25
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - mineral
      abilities:
        - sturdy
        - weak_armor
      hidden_ability: sand_force
      held_items:
        common: everstone
        rare: hard_stone
      descriptions:
        jp_kana:
          sun: "ちちゅうの　おくふかくで　うまれた。\nちかい　なかまの　イシツブテや\nメレシーと　かたさくらべをする。"
          moon: "ろっかくけいの　くうどうは　みみ。\nおとが　なるほうへ　あるいていくが\nおとが　やむと　こまって　ころぶ。"
        jp_kanji:
          sun: "地中の　奥深くで　生まれた。\n近い　仲間の　イシツブテや\nメレシーと　硬さ比べをする。"
          moon: "六角形の　空洞は　耳。\n音が　鳴るほうへ　歩いていくが\n音が　止むと　困って　転ぶ。"
        en:
          sun: "Born deep within the ground, it compares itself\nwith similar species, such as Geodude and\nCarbink, to settle which has the hardest body."
          moon: "The hexagonal cavity is its ear. It walks in the\ndirection of sounds it hears, but if the sounds\ncease, it panics and topples over."
        fr:
          sun: "Ce Pokémon est né dans les entrailles de\nla terre. Il adore comparer sa solidité à celle\nde ses amis, Racaillou et Strassie."
          moon: "La cavité hexagonale qu’il arbore est son oreille.\nIl se précipite vers tout ce qu’il entend, mais\nperd l’équilibre et chute dès que le son s’arrête."
        it:
          sun: "Questo Pokémon è nato sottoterra.\nSi diverte a fare gare di durezza con i suoi amici\nGeodude e Carbink."
          moon: "La conca esagonale è il suo orecchio. Ha\nl’abitudine di camminare in direzione dei rumori,\nma se questi cessano, si confonde e cade."
        de:
          sun: "Es wurde tief unter der Erde geboren.\nMit befreundeten Kleinstein und Rocara stellt es\nVergleiche an, wessen Körper am härtesten sei."
          moon: "Die sechseckige Aushöhlung dient ihm als Ohr.\nEs bewegt sich immer auf Geräusche zu, fällt\njedoch ratlos um, sobald diese verstummen."
        es:
          sun: "Nació en las profundidades subterráneas.\nSiempre se compara con sus compañeros\nGeodude y Carbink para ver quién es más duro."
          moon: "La cavidad hexagonal es su oído. Camina hacia\ndonde se emite cualquier sonido, pero si este\ncesa pierde el equilibrio y cae al suelo."
        ko:
          sun: "땅속 깊은 곳에서 태어났다.\n가까운 친구인 꼬마돌이나\n멜리시와 딱딱함을 비교한다."
          moon: "육각형의 구멍은 귀다.\n소리가 나는 쪽으로 걸어가지만\n소리가 그치면 당황해서 넘어진다."
        zh_simp:
          sun: "在地下的最深处诞生。\n会与亲缘相近的小拳石\n和小碎钻较量硬度。"
          moon: "六角形的空洞是耳朵。\n会朝着声音响起的方向走过去，\n但声音一旦停止就迷惘地跌倒。"
        zh_trad:
          sun: "在地下的最深處誕生。\n會和血緣相近的小拳石\n還有小碎鑽互相較量硬度。"
          moon: "六角形的空洞是耳朵。\n會朝著聲音響起的方向走過去，\n但聲音一旦停止便會迷惘地跌倒。"
boldore:
  species_id: 525
  names:
    jp_kana: ガントル
    jp_kanji: ガントル
    en: Boldore
    fr: Géolithe
    it: Boldore
    de: Sedimantur
    es: Boldore
    ko: 암트르
    zh_simp: 地幔岩
