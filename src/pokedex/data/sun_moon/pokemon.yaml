      types:
        - fire
        - flying
      egg_groups:
        - flying
      abilities:
        - flame_body
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          sun: "クチバシから　ひのこを　とばして\nえものに　ぶつける。　つかまえた\nえものは　やいてから　いただくぞ。"
          moon: "はんけい　すうキロの　なわばりを\nもっており　ほかの　ヒノヤコマが\nはいってくることを　ゆるさない。"
        jp_kanji:
          sun: "クチバシから　火の粉を　飛ばして\n獲物に　ぶつける。　捕まえた\n獲物は　焼いてから　いただくぞ。"
          moon: "半径　数キロの　縄張りを\n持っており　他の　ヒノヤコマが\n入ってくることを　許さない。"
        en:
          sun: "From its beak, it fires embers at its prey. Once\nit has caught them, it grills them at high heat\nbefore feasting upon them."
          moon: "It will not tolerate other Fletchinder entering its\nterritory, which has a radius of several miles."
        fr:
          sun: "Il crache des escarbilles par le bec, en visant\nsa proie. Une fois celle-ci capturée, il la fait\nrôtir avant de la déguster."
          moon: "Son territoire s’étend sur plusieurs kilomètres.\nL’intrusion d’autres Braisillon n’est en aucun cas\ntolérée."
        it:
          sun: "Attacca le prede scagliando scintille dal becco\ne, dopo averle catturate, le arrostisce e le\nmangia."
          moon: "Difende gelosamente il suo territorio, che si\nestende per vari chilometri, tenendo lontani\ngli altri Fletchinder."
        de:
          sun: "Es speit Funken aus seinem Schnabel und\nschreckt so die Beute auf. Einmal gefangen,\nwird sie geröstet und dann verspeist."
          moon: "Sein Revier hat einen Radius von mehreren\nKilometern. Das Eindringen anderer Dartignis\nwird nicht geduldet."
        es:
          sun: "Lanza chispas por el pico para atacar a su\npresa, a la que devora una vez calcinada."
          moon: "No tolera bajo ningún concepto que otro\nFletchinder invada su territorio, cuyo radio\nabarca varios kilómetros."
        ko:
          sun: "부리로부터 불꽃을 날려\n먹이에 맞힌다. 잡은\n먹이는 구운 다음 먹는다."
          moon: "반경 수 km의 영역을\n차지하고 있어 다른 불화살빈이\n들어오는 것을 용서하지 않는다."
        zh_simp:
          sun: "从鸟嘴里喷出火花击中猎物。\n捉到的猎物烧了之后就会享用。"
          moon: "拥有半径数公里的领地，\n不允许其他火箭雀进入。"
        zh_trad:
          sun: "從鳥嘴裡噴出火花擊向獵物。\n會把捉到的獵物烤過之後再享用。"
          moon: "擁有半徑達數公里的地盤，\n並且不允許其他火箭雀進入。"
talonflame:
