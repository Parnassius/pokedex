tirtouga:
  species_id: 564
  names:
    jp_kana: プロトーガ
    jp_kanji: プロトーガ
    en: Tirtouga
    fr: Carapagos
    it: Tirtouga
    de: Galapaflos
    es: Tirtouga
    ko: 프로토가
    zh_simp: 原盖海龟
    zh_trad: 原蓋海龜
  forms:
    tirtouga:
      form_id: 0
      base_stats:
        hp: 54
        attack: 78
        defense: 103
        special_attack: 53
        special_defense: 45
        speed: 22
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - rock
      egg_groups:
        - water_1
        - water_3
      abilities:
        - solid_rock
        - sturdy
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          sun: "こっかくを　しらべるかぎり　およそ\n１０００メートルの　しんかいまで\nもぐっていくことが　できたようだ。"
          moon: "おおくの　かめポケモンの　せんぞと\nいわれる。　やく１おくねんまえの\nあたたかい　うみに　すんでいた。"
        jp_kanji:
          sun: "骨格を　調べる限り　およそ\n１０００メートルの　深海まで\n潜っていくことが　できたようだ。"
          moon: "多くの　かめポケモンの　先祖と\nいわれる。　約１億年前の\n温かい　海に　棲んでいた。"
        en:
          sun: "Based on studies of its skeletal structure, it can\napparently dive to ocean depths of over half\na mile."
          moon: "Reputed to be the ancestor of most turtle\nPokémon, it lived in warm seas approximately\na hundred million years ago."
        fr:
          sun: "L’étude de sa structure squelettique suggère\nqu’il était autrefois capable de plonger\njusqu’à 1 000 m de profondeur."
          moon: "Ancêtre présumé de nombreuses espèces de\nPokémon tortues, il peuplait les mers chaudes\ndu monde il y a environ 100 millions d’années."
        it:
          sun: "A giudicare dalla struttura ossea, sembra che\nfosse capace di immergersi fino a 1.000 m\ndi profondità."
          moon: "Si dice che sia l’antenato di molti Pokémon con\ncarapace. Nuotava nei mari caldi 100 milioni\ndi anni fa."
        de:
          sun: "Eine Untersuchung seiner Skelettstruktur hat\nergeben, dass es in Tiefen von bis zu 1 000 m\nabtauchen kann."
          moon: "Man sagt, es sei der Vorfahre der meisten\nSchildkröten-Pokémon. Es lebte vor etwa\n100 Millionen Jahren im warmen Meer."
        es:
          sun: "A juzgar por su estructura ósea, se calcula\nque podía sumergirse hasta 1 km de\nprofundidad."
          moon: "Se dice que es el predecesor de numerosos\nPokémon tortuga. Hace unos 100 millones de\naños ya habitaba mares templados."
        ko:
          sun: "골격을 조사해보니\n약 1000m의 심해까지\n잠수할 수 있었던 것 같다."
          moon: "많은 거북포켓몬의 조상이라\n전해진다. 약 1억 년 전의\n따뜻한 바다에서 살았다."
        zh_simp:
          sun: "根据对其骨骼的调查结果，\n它似乎能潜到大约\n１０００米的深海之中。"
          moon: "据说是大部分龟宝可梦的祖先。\n曾经生活在大约１亿年前的\n温暖大海里。"
        zh_trad:
          sun: "根據對其骨骼的調查結果，\n牠好像能潛水到大約\n１０００米的深海之中。"
          moon: "據說是大部分龜寶可夢的祖先。\n曾經生活在大約１億年前的\n溫暖大海裡。"
carracosta:
  species_id: 565
  names:
