      descriptions:
        jp_kana:
          sun: "きしょうが　あらく　めが　あうだけで\nとびかかってくる。　するどいツメに\nやられると　ふかい　きずを　おう。"
          moon: "アローラの　ペルシアンほどではないが\nきぐらいの　たかい　せいしつ。\nなつかせるのが　かなり　むずかしい。"
        jp_kanji:
          sun: "気性が　荒く　目が　合うだけで\n飛び掛ってくる。　鋭いツメに\nやられると　深い　傷を　負う。"
          moon: "アローラの　ペルシアンほどではないが\n気位の　高い　性質。\n懐かせるのが　かなり　難しい。"
        en:
          sun: "It has a violent temperament. It will attack\nanything that looks it in the eye. Its sharp\nclaws inflict deep wounds."
          moon: "It has a high opinion of itself, although not to\nthe same extent as the Alolan Persian. It’s quite\ndifficult to make friends with this Pokémon."
        fr:
          sun: "Un Pokémon très agressif, qui peut sauter à la\ngorge si on le regarde dans les yeux. Ses\ngriffes acérées infligent de graves blessures."
          moon: "Un Pokémon naturellement fier, mais pas aussi\norgueilleux que les Persian d’Alola. Il est très\ndifficile à apprivoiser."
        it:
          sun: "È particolarmente suscettibile, tanto da\nattaccare chiunque lo guardi negli occhi.\nI suoi artigli affilati provocano profonde ferite."
          moon: "È un Pokémon molto altezzoso, caratteristica\nparticolarmente marcata nei Persian di Alola.\nConquistarsi il suo affetto è un’impresa ardua."
        de:
          sun: "Sieht man diesem ungestümen Pokémon nur\nin die Augen, fällt es einen bereits an. Seine\nscharfen Klauen hinterlassen tiefe Wunden."
          moon: "Es ist von Natur aus sehr stolz, wenn auch\nnicht im gleichen Maße wie Snobilikat aus Alola.\nSie lassen sich nur sehr schwer zähmen."
        es:
          sun: "De temperamento violento, ataca a cualquiera\nque lo mira directamente a los ojos. Sus afiladas\ngarras infligen heridas muy profundas."
          moon: "Los Persian son Pokémon extremadamente\norgullosos, en especial los de Alola.\nNo es fácil hacerse amigo de este Pokémon."
        ko:
          sun: "기질이 거칠어 눈이 마주치는 것만으로\n덤벼든다. 날카로운 발톱으로\n공격당하면 깊은 상처를 입는다."
          moon: "알로라의 페르시온 정도는 아니지만\n자존심이 강하기 때문에\n길들이기가 꽤 어렵다."
        zh_simp:
          sun: "性情粗暴，只要视线对上就会\n猛扑过来。被锐利的爪子抓到的话，\n就会留下很深的伤口。"
          moon: "还没有达到阿罗拉的猫老大的地位，\n但是性情傲慢自大。\n要和它变得亲密相当困难。"
        zh_trad:
          sun: "性情粗暴，單單是視線對上就會\n猛撲過來。被銳利的爪子抓到的話，\n就會留下很深的傷口。"
          moon: "還沒有達到阿羅拉的貓老大的程度，\n但是性情傲慢自大。\n要和牠變得親密相當困難。"
    persian_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 65
        attack: 60
        defense: 60
        special_attack: 75
        special_defense: 65
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - fur_coat
        - technician
      hidden_ability: rattled
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          sun: "まるい　かおと　さいこうきゅうの\nベルベットより　なめらかな　けなみで\nアローラで　だいにんきの　ポケモン。"
          moon: "じぶんいがいの　すべてを　みくだす。\nふいうちや　やみうちなど　ひれつで\nひきょうな　せんぽうを　このむ。"
        jp_kanji:
          sun: "丸い　顔と　最高級の\nベルベットより　滑らかな　毛並みが\nアローラで　大人気の　ポケモン。"
          moon: "自分以外の　すべてを　見下す。\n不意打ちや　闇討ちなど　ひれつで\nひきょうな　戦法を　好む。"
        en:
          sun: "Its round face and smooth coat—softer than the\nmost high-class velvet—have made this a very\npopular Pokémon in Alola."
          moon: "It looks down on everyone other than itself.\nIts preferred tactics are sucker punches and\nblindside attacks."
        fr:
          sun: "Un Pokémon très populaire à Alola grâce à son\nvisage rond et son pelage plus doux que le\nplus raffiné des velours."
          moon: "Il regarde toutes les autres créatures avec\nmépris. Il affectionne les stratégies déloyales,\nles attaques dans le dos, les embuscades, etc."
        it:
          sun: "Il suo viso perfettamente tondo e il manto più\nliscio del velluto lo rendono uno dei Pokémon\npiù amati della regione di Alola."
          moon: "Disprezza tutte le altre creature all’infuori di sé.\nMeschino e codardo, preferisce attaccare\nil nemico di sorpresa o alle spalle."
        de:
          sun: "Sein rundes Gesicht und sein Fell, das weicher\nist als erstklassiger Samt, machen es in Alola\nzu einem sehr beliebten Pokémon."
          moon: "Bis auf sich selbst hält es alles und jeden für\nwertlos. Es bevorzugt fiese Angriffe aus dem\nHinterhalt oder der Dunkelheit."
        es:
          sun: "Es un Pokémon muy popular en Alola por su cara\nredonda y por su pelaje, que es más suave que\nel terciopelo de la mejor calidad."
          moon: "Muestra arrogancia hacia cualquier otro ser.\nCombate con tácticas rastreras y cobardes,\natacando por sorpresa o desde la oscuridad."
        ko:
          sun: "동그란 얼굴과 최고급\n벨벳보다 부드러운 털로\n알로라에서 인기가 많은 포켓몬이다."
          moon: "자신 이외의 모든 것을 깔본다.\n기습과 야습 등 비열하고\n비겁한 전법을 선호한다."
        zh_simp:
          sun: "圆圆的脸孔，比最高级的\n天鹅绒还光滑的毛发，\n是在阿罗拉非常受欢迎的宝可梦。"
          moon: "蔑视除自己之外的一切。\n喜欢突袭和夜袭等卑劣无耻的战法。"
        zh_trad:
          sun: "圓圓的臉孔，比最高級的\n天鵝絨還光滑的毛髮，\n在阿羅拉是非常受歡迎的寶可夢。"
          moon: "蔑視自己之外的一切。\n喜歡採用突襲和夜襲等卑劣無恥的戰法。"
