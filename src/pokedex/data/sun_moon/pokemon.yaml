          moon: "L’une des Ultra-Chimères. Elle semble refuser\nde toucher les choses de ce monde, comme si\ntout était souillé à ses yeux."
        it:
          sun: "Una delle temibili Ultracreature.\nÈ stata avvistata mentre correva a una velocità\nimpressionante."
          moon: "Un’Ultracreatura che cerca di evitare ogni\ncontatto con le cose di questo mondo, come\nse lo considerasse contaminato."
        de:
          sun: "Diese bedrohliche Ultrabestie wurde dabei\nbeobachtet, wie sie mit ungeheuerlicher\nGeschwindigkeit über die Erde hinwegfegt."
          moon: "Diese Ultrabestie scheint diese Welt für unrein\nzu halten und zieht es daher vor, mit nichts und\nniemandem in Berührung zu kommen."
        es:
          sun: "Uno de los temibles Ultraentes. Se dice\nque ha sido avistado recorriendo la superficie\nterrestre a velocidades de vértigo."
          moon: "Este Ultraente se muestra reacio al contacto,\nprobablemente porque percibe inmundicia en\ntodo cuanto le rodea."
        ko:
          sun: "위험한 UB 중 1마리이다. 굉장한\n속도로 대지를 질주하는\n모습이 목격되었다."
          moon: "UB의 일종. 이 세계의\n물건에 불결함을 느끼는 것인지\n전혀 손을 대려 하지 않는다."
        zh_simp:
          sun: "危险究极异兽中的一种。\n被人目击到以骇人的速度\n在大地狂奔的样子。"
          moon: "究极异兽中的一种。\n或许是觉得这个世界上万物污秽不堪，\n因此不愿用手触及分毫。"
        zh_trad:
          sun: "屬於危險ＵＢ的一種。\n被人目擊到以駭人的速度\n在大地狂奔的樣子。"
          moon: "ＵＢ的一種。\n或許是覺得這個世界上萬物污穢不堪，\n因此不願用手觸及分毫。"
