      hidden_ability: sheer_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          sun: "１しゅうかんは　なにも　くわずに\nいきられる。　すあなの　そこで\nえものが　くるのを　じっと　まつ。"
          moon: "おおきな　アゴで　じゃまな　いわを\nくだきながら　すなを　ほる。\nすあなの　かたちは　スリばちじょう。"
        jp_kanji:
          sun: "１週間は　なにも　喰わずに\n生きられる。　巣穴の　底で\n獲物が　くるのを　じっと　待つ。"
          moon: "大きな　顎で　邪魔な　岩を\n砕きながら　砂を　掘る。\n巣穴の　形は　スリ鉢状。"
        en:
          sun: "It can live for a week without eating a thing.\nIt waits patiently at the bottom of its nest for\nprey to appear."
          moon: "As it digs through the sand, its giant jaws\ncrush any rocks that obstruct its path. It builds\na funnel-shaped nest."
        fr:
          sun: "Il peut survivre une semaine entière sans se\nsustenter. Il attend patiemment au fond de\nson trou, guettant sa proie."
          moon: "Il creuse des trous dans le sable et brise les\nrochers qui le gênent d’un coup de mâchoire.\nSes terriers ressemblent à un entonnoir."
        it:
          sun: "Può sopravvivere senza cibo nella sua tana\nanche per una settimana, mentre attende\npaziente che le prede cadano in trappola."
          moon: "Scava una tana a forma di imbuto nella sabbia\nfrantumando le rocce che lo ostacolano\ncon le sue possenti mascelle."
        de:
          sun: "Knacklion kann eine Woche überleben, ohne\nzu essen. Es wartet geduldig in seinem Bau\ndarauf, dass seine Beute zu ihm kommt."
          moon: "Es gräbt im Sand und zerquetscht dabei mit\nseinem gigantischen Kiefer störende Felsen.\nSein Bau hat die Form eines Trichters."
        es:
          sun: "Puede sobrevivir una semana entera sin comer.\nSe queda muy quieto en su fosa, esperando a\nque se acerquen sus presas."
          moon: "Cava su nido de forma cóncava en la arena y, si\naparece una roca que le molesta, la destroza\ncon sus grandes mandíbulas."
        ko:
          sun: "1주일은 아무것도 먹지 않고\n살 수 있다. 보금자리의 속에서\n먹이가 오기만을 가만히 기다린다."
          moon: "커다란 턱으로 방해되는 바위를\n부수며 모래를 판다.\n둥지 모양은 원뿔형."
        zh_simp:
          sun: "一整个星期什么都不吃\n也能生存。一动不动地呆在\n巢穴底部等待猎物的到来。"
          moon: "一边用大大的颚把挡道的\n岩石咬碎，一边挖沙子。\n巢穴的形状是捣蒜钵那样的。"
        zh_trad:
          sun: "１整個星期什麼都不吃也能生存。\n總是動也不動地呆在巢穴底部\n等待獵物的到來。"
          moon: "一邊用大大的顎把礙事的\n岩石咬碎，一邊挖沙子。\n巢穴的形狀就像研磨缽一樣。"
