feebas:
  species_id: 349
  names:
    jp_kana: ヒンバス
    jp_kanji: ヒンバス
    en: Feebas
    fr: Barpau
    it: Feebas
    de: Barschwa
    es: Feebas
    ko: 빈티나
    zh_simp: 丑丑鱼
    zh_trad: 醜醜魚
  forms:
    feebas:
      form_id: 0
      base_stats:
        hp: 20
        attack: 15
        defense: 20
        special_attack: 10
        special_defense: 55
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
