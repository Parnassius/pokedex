      descriptions:
        jp_kana:
          sun: "もっとも　よわい　ドラゴンポケモン。\nひふが　かわくと　いきが　できないので\nひかげで　じーっと　しているよ。"
          moon: "ヌメヌメの　ねんまくで　みを　まもる。\nねんまくは　ざっきんまみれ　なので\nさわったら　しっかり　てを　あらおう。"
        jp_kanji:
          sun: "最も　弱い　ドラゴンポケモン。\n皮膚が　乾くと　息が　できないので\n日陰で　じーっと　しているよ。"
          moon: "ヌメヌメの　粘膜で　身を　守る。\n粘膜は　雑菌まみれ　なので\n触ったら　しっかり　手を　洗おう。"
        en:
          sun: "The weakest of all Dragon-type Pokémon,\nit’s unable to breathe if its skin dries out,\nso it sticks to shady places."
          moon: "Its source of protection is its slimy, germ-laden\nmucous membrane. Anyone who touches it\nneeds some thorough hand-washing."
        fr:
          sun: "C’est le plus faible de tous les Pokémon Dragon.\nSa peau doit rester hydratée pour respirer, c’est\npourquoi il préfère vivre tapi dans l’ombre."
          moon: "Son corps est recouvert d’une membrane\ngluante protectrice, mais pleine de germes.\nLavez-vous les mains si vous le touchez !"
        it:
          sun: "È il Pokémon di tipo Drago più debole di tutti.\nLa sua pelle deve restare umida per poter\nrespirare e per questo si rifugia nell’ombra."
          moon: "Il suo corpo è protetto da una membrana viscida\nche pullula di batteri. Meglio lavarsi bene le mani\ndopo averlo toccato!"
        de:
          sun: "Das schwächste aller Drachen-Pokémon.\nWenn seine Haut austrocknet, erstickt es.\nDaher hält es sich bevorzugt im Schatten auf."
          moon: "Sein Körper ist von einer schleimigen Schutz-\nschicht umhüllt, die voller Bakterien steckt.\nNach dem Anfassen also Hände waschen!"
        es:
          sun: "Es el Pokémon de tipo Dragón más débil.\nNecesita mantener la piel húmeda para respirar,\ny por eso se oculta en las sombras."
          moon: "Una membrana viscosa lo envuelve y lo protege,\npero tiene tal cantidad de gérmenes que hay\nque lavarse bien las manos tras tocarlo."
        ko:
          sun: "가장 약한 드래곤포켓몬.\n피부가 마르면 숨을 쉴 수 없어서\n그늘에서 가만히 있다."
          moon: "미끌미끌한 점막으로 몸을 지킨다.\n점막은 세균투성이이므로\n만지면 반드시 손을 씻자."
        zh_simp:
          sun: "最弱小的龙属性宝可梦。\n皮肤干燥的话就会无法呼吸，\n因此一直静静地呆在背阴处哦。"
          moon: "用滑腻腻的粘膜保护身体。\n因为粘膜上尽是各种细菌，\n接触后要好好地洗手哦。"
        zh_trad:
          sun: "最弱小的龍屬性寶可夢。\n皮膚一旦乾燥就會無法呼吸，\n因此總是靜靜地呆在遮蔭下哦。"
          moon: "用滑膩膩的黏膜保護身體。\n因為黏膜上佈滿各種細菌，\n接觸後要好好地洗手哦。"
