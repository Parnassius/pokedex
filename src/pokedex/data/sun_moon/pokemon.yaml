        - water_2
      abilities:
        - swift_swim
        - rock_head
      hidden_ability: sturdy
      held_items:
        rare: deep_sea_scale
      descriptions:
        jp_kana:
          sun: "１おくねんまえから　おなじ　すがた。\nたいないが　あぶらまみれ　なので\nしんかいの　すいあつに　たえられる。"
          moon: "しんかいちょうさちゅう　ぐうぜんに\nはっけん　された。　はが　たいかし\nすうようにして　びせいぶつを　とる。"
        jp_kanji:
          sun: "約１億年前から　同じ　姿。\n体内が　脂まみれ　なので\n深海の　水圧に　耐えられる。"
          moon: "深海調査中　偶然に\n発見　された。　歯が　退化し\n吸うようにして　微生物を　取る。"
        en:
          sun: "Its form has remained the same for one hundred\nmillion years. Its body is filled with fat, so it can\nwithstand the water pressure of the deep sea."
          moon: "It was fortuitously discovered during a deep sea\nexpedition. Its teeth have atrophied, so it now\nsurvives on microscopic organisms it sucks up."
        fr:
          sun: "Il n’a pas changé d’apparence en 100 millions\nd’années. La densité de sa couche graisseuse\nl’aide à supporter la pression des grands fonds."
          moon: "Il a été découvert complètement par hasard au\nfin fond de l’océan. Sa dentition déplorable le\ncontraint à se nourrir de micro-organismes."
        it:
          sun: "Il suo aspetto è immutato da 100 milioni di anni.\nResiste all’enorme pressione degli abissi marini\ngrazie a uno spesso strato di grasso corporeo."
          moon: "È stato scoperto per caso nelle profondità\nmarine durante una perlustrazione. Sprovvisto\ndi denti, si nutre risucchiando microrganismi."
        de:
          sun: "Relicanth existiert seit 100 Millionen Jahren in\nunveränderter Form. Dank seines Körperfetts\nhält es dem Wasserdruck der Tiefsee stand."
          moon: "Es wurde zufällig auf einer Tiefsee-Expedition\nentdeckt. Es ernährt sich von Mikroorganismen,\ndie es mit seinem zahnlosen Maul einsaugt."
        es:
          sun: "No ha cambiado de aspecto en 100 millones de\naños. Su gruesa capa de grasa le permite\nsoportar la presión abisal."
          moon: "Fue descubierto de forma accidental durante\nunas exploraciones marinas. No tiene dientes,\npor lo que se alimenta de microorganismos."
        ko:
          sun: "1억 년 전부터 같은 모습이다.\n체내가 기름투성이라서\n심해의 수압을 견딜 수 있다."
          moon: "심해 조사 중 우연히\n발견되었다. 이빨이 퇴화하여\n빨아들이듯 미생물을 먹는다."
        zh_simp:
          sun: "从１亿年前起就是相同的样子。\n因为体内富含脂肪，\n所以可以承受深海的水压。"
          moon: "在深海调查中被偶然发现。\n牙齿退化，靠吸食来摄取微生物。"
        zh_trad:
          sun: "從１億年前就長這個樣子。\n因為體內積存著厚厚的脂肪，\n所以能承受深海的水壓。"
          moon: "在深海調查中偶然被發現。\n牙齒退化，只能用吸食的方式\n攝取微生物。"
luvdisc:
  species_id: 370
  names:
    jp_kana: ラブカス
    jp_kanji: ラブカス
    en: Luvdisc
    fr: Lovdisc
    it: Luvdisc
    de: Liebiskus
    es: Luvdisc
    ko: 사랑동이
    zh_simp: 爱心鱼
    zh_trad: 愛心魚
  forms:
    luvdisc:
      form_id: 0
      base_stats:
        hp: 43
        attack: 30
        defense: 55
        special_attack: 40
        special_defense: 65
