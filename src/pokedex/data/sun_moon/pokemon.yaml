      descriptions:
        jp_kana:
          sun: "カギを　あつめる　しゅうせいが　ある。\nおだやかな　せいかくだが　みんかに\nしのびこみ　カギを　ぬすんでいく。"
          moon: "あたまのツノを　きんぞくの　すきまに\nつっこんで　きんぞくイオンを　すう。\nなぜか　カギを　あつめている。"
        jp_kanji:
          sun: "カギを　集める　習性が　ある。\n穏やかな　性格だが　民家に\n忍び込み　カギを　盗んでいく。"
          moon: "頭の角を　金属の　すき間に\n突っ込んで　金属イオンを　吸う。\nなぜか　カギを　集めている。"
        en:
          sun: "This even-tempered Pokémon has a habit of\ncollecting keys. It will sneak into people’s homes\nto steal their keys."
          moon: "It inserts its horn into chinks in metal, absorbing\nmetal ions. For some reason, it collects keys."
        fr:
          sun: "Malgré son caractère paisible, ce Pokémon ne\npeut s’empêcher de se faufiler dans les foyers\npour en voler les clés, qu’il aime collectionner."
          moon: "Il insère l’appendice situé sur sa tête dans les\ninterstices en métal afin d’en extraire les ions.\nIl collectionne les clés pour une raison inconnue."
        it:
          sun: "Ha un carattere pacifico, ma non resiste alla\ntentazione di intrufolarsi nelle case per rubare\nchiavi, che adora collezionare."
          moon: "Infila la sporgenza che ha sulla testa negli\ninterstizi tra oggetti di metallo per assorbire ioni.\nHa la strana abitudine di collezionare chiavi."
        de:
          sun: "Dieses Pokémon sammelt eifrig Schlüssel,\ndie es oft aus fremden Häusern entwendet.\nAnsonsten ist es aber sehr friedlich."
          moon: "Seinen Fortsatz steckt es gerne in metallene\nZwischenräume, um Metall-Ionen abzusaugen.\nSammelt aus unerfindlichen Gründen Schlüssel."
        es:
          sun: "Tiene el hábito de coleccionar llaves. Su carácter\ntranquilo no impide que le guste colarse en\ncasas ajenas a robar llaves."
          moon: "Introduce el apéndice de su cabeza por los\nresquicios de los metales para absorber los\niones. Por alguna razón, adora las llaves."
        ko:
          sun: "열쇠를 모으는 습성이 있다.\n온화한 성격이지만 민가에\n몰래 들어가 열쇠를 훔쳐간다."
          moon: "머리의 뿔을 금속 틈에\n찔러넣고 금속 이온을 빨아들인다.\n왜인지 열쇠를 모으고 있다."
        zh_simp:
          sun: "有着收集钥匙的习性。\n性格稳重，却会偷偷潜入\n民宅偷盗钥匙。"
          moon: "把头上的角刺入金属的缝隙中，\n吸取金属离子。\n不知为何在收集钥匙。"
        zh_trad:
          sun: "有收集鑰匙的習慣。\n性格穩重，卻會偷偷潛入\n民居偷盜鑰匙。"
          moon: "把頭上的角刺入金屬的縫隙中，\n吸取金屬離子。\n另外，不知為何在收集鑰匙。"
