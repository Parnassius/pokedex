      egg_groups:
        - fairy
      abilities:
        - cute_charm
        - magic_guard
      hidden_ability: unaware
      held_items:
        rare: moon_stone
      descriptions:
        jp_kana:
          sun: "ひとまえに　すがたを　みせることを\nこのまない。　ふかい　やまの　おくで\nむれに　なって　ひっそり　くらす。"
          moon: "つがいの　ピクシーが　スキップする\nすがたを　みると　しあわせな\nけっこんが　できると　いわれる。"
        jp_kanji:
          sun: "人前に　姿を　みせることを\n好まない。　深い　山の　奥で\n群れに　なって　ひっそり　暮らす。"
          moon: "つがいの　ピクシーが　スキップする\n姿を　みると　幸せな\n結婚が　できると　いわれる。"
        en:
          sun: "They don’t like to reveal themselves in front of\npeople. They live quietly in packs deep in\nthe mountains."
          moon: "According to tradition, people who see a pair\nof Clefable skipping by can look forward to a\nhappy marriage."
        fr:
          sun: "Il n’aime pas être aperçu par les humains.\nIl préfère donc vivre paisiblement en groupes\nau fond des montagnes."
          moon: "Une tradition raconte qu’apercevoir un Mélodelfe\ngambader joyeusement signifie que l’on fera\nun heureux mariage."
        it:
          sun: "È un Pokémon molto timido. Vive nascosto\nassieme ai suoi simili nei recessi montani."
          moon: "Si dice che chi vede saltellare una coppia\ndi Clefable avrà un matrimonio felice."
        de:
          sun: "Es zeigt sich Menschen nur ungern und führt\nzusammen mit anderen Artgenossen ein\nabgeschiedenes Leben tief in den Bergen."
          moon: "Man sagt, zwei herumtollende Pixi zu sehen,\nverheiße eine glückliche Ehe."
        es:
          sun: "No les gusta dejarse ver ante las personas.\nViven tranquilamente en grupos en lo profundo\nde las montañas."
          moon: "Se dice que avistar a una pareja de Clefable\ndando saltitos trae felicidad al matrimonio."
        ko:
          sun: "사람 앞에 모습을 보이는 것을\n좋아하지 않는다. 깊은 산 속에서\n무리를 지어 조용히 살고 있다."
          moon: "한 쌍의 픽시가 뛰어가는\n모습을 보면 행복한\n결혼을 할 수 있다고 전해진다."
        zh_simp:
          sun: "不喜欢在人面前现身。\n喜欢群居在深山里静静地生活。"
          moon: "据说，如果看到一对皮可西\n蹦蹦跳跳的样子，\n就能获得幸福的婚姻。"
        zh_trad:
          sun: "不喜歡在人面前現身。\n喜歡群居在深山裡靜靜地生活。"
          moon: "據說，如果看到一對皮可西\n蹦蹦跳跳的樣子，\n就能獲得幸福的婚姻。"
