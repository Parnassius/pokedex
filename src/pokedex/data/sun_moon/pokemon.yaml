        jp_kanji: ぱちぱちスタイル
        en: Pom-Pom Style
        fr: Style Pom-Pom
        it: Stile Cheerdance
        de: Cheerleading-Stil
        es: Estilo Animado
        ko: 파칙파칙스타일
        zh_simp: 啪滋啪滋风格
        zh_trad: 啪滋啪滋風格
