        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - mineral
      abilities:
        - sturdy
        - magnet_pull
      hidden_ability: sand_force
      held_items:
        rare: magnet
      descriptions:
        jp_kana:
          sun: "ノズパスの　はなの　じしゃくは\nぜったいに　くるわないので　たびする\nトレーナーの　よき　パートナーだ。"
          moon: "きょうりょくな　じりょくで　えものを\nひきよせる。　てつを　ひきよせ\nみを　まもることも　ある。"
        jp_kanji:
          sun: "ノズパスの　鼻の　磁石は\n絶対　狂わないので　旅する\nトレーナーの　良き　パートナーだ。"
          moon: "強力な　磁力で　獲物を\n引き寄せる。　鉄を　引き寄せ\n身を　守ることも　ある。"
        en:
          sun: "The magnet in Nosepass’s nose provides an\nunerring compass, making it an excellent\npartner for Trainers going on a journey."
          moon: "It uses powerful magnetism to drag its prey\ntoward it. It’s also been known to pull in metal,\nwhich it collects and uses to protect itself."
        fr:
          sun: "Le nez de Tarinor, qui fonctionne comme une\nboussole infaillible, en fait un allié de choix pour\ntout Dresseur Pokémon."
          moon: "Sa puissance magnétique lui sert à attirer\nses proies, mais également des objets\nmétalliques qu’il utilise en guise de bouclier."
        it:
          sun: "Il naso magnetico di Nosepass è una bussola\ninfallibile e questo lo rende il compagno\ndi viaggio ideale per ogni Allenatore."
          moon: "Il suo potente magnetismo gli permette di\nattirare le prede e anche oggetti di ferro, che\nusa per proteggersi."
        de:
          sun: "Seine magnetische Nase ist unbeirrbar und\nerweist sich daher als ganz hervorragender\nPartner für Pokémon-Trainer auf Reisen."
          moon: "Es nutzt sein starkes Magnetfeld, um Beute zu\nsich heranzuziehen. Ebenso zieht es Objekte\naus Eisen an, um sich mit ihnen zu schützen."
        es:
          sun: "Los Nosepass tienen una nariz brújula infalible,\npor lo que los Entrenadores viajeros suelen\nllevar uno consigo."
          moon: "Atraen a sus presas usando su potente fuerza\nmagnética. En algunos casos también atraen\nmetales para proteger sus cuerpos."
        ko:
          sun: "코코파스의 코의 자석은\n절대로 고장 나지 않아서 여행하는\n트레이너의 좋은 파트너이다."
          moon: "강력한 자력으로 먹이를\n끌어당긴다. 철을 끌어당겨\n몸을 지킬 때도 있다."
        zh_simp:
          sun: "朝北鼻鼻子上的磁铁绝对不会失灵，\n所以是训练家旅行时的良伴。"
          moon: "用强劲的磁力把猎物吸过来。\n也会吸引并收集铁来保护身躯。"
        zh_trad:
          sun: "朝北鼻鼻子上的磁鐵絕對不會失靈，\n所以是訓練家旅行時的良伴。"
          moon: "用強勁的磁力把獵物吸過來。\n也會吸引並收集鐵來保護身軀。"
