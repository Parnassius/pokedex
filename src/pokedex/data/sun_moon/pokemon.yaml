  names:
    jp_kana: ウソハチ
    jp_kanji: ウソハチ
    en: Bonsly
    fr: Manzaï
    it: Bonsly
    de: Mobai
    es: Bonsly
    ko: 꼬지지
    zh_simp: 盆才怪
    zh_trad: 盆才怪
  forms:
