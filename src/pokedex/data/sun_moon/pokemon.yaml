      descriptions:
        jp_kana:
          sun: "ひるまは　ひかりをあびて　ねむり\nよるに　なると　より　あんぜんな\nねどこを　さがし　あるきだす。"
          moon: "さわやかで　あまいかおりが　する。\nカリキリが　かくれている　くさむらには\nよく　アブリーが　むれている。"
        jp_kanji:
          sun: "昼間は　光を浴びて　眠り\n夜に　なると　より　安全な\n寝床を　探し　歩き出す。"
          moon: "爽やかで　甘い香りが　する。\nカリキリが　隠れている　草むらには\nよく　アブリーが　群れている。"
        en:
          sun: "During the day, it sleeps and soaks up light.\nWhen night falls, it walks around looking\nfor a safer place to sleep."
          moon: "They give off a sweet and refreshing scent.\nCutiefly often gather near the tall grass where\nFomantis are hiding."
        fr:
          sun: "La journée, il passe son temps à flâner au soleil\net à faire la sieste. Le soir venu, il part à la\nrecherche d’un lieu plus sûr pour passer la nuit."
          moon: "Le corps de Mimantis dégage un léger parfum\nsucré, qui a le don d’attirer les Bombydou dans\nles hautes herbes où il se cache."
        it:
          sun: "Di giorno dorme sotto il sole, mentre di notte\nsi mette in cerca di un posto più sicuro\nper continuare a dormire."
          moon: "Emana un odore fresco e dolce. Quando si\nnasconde nell’erba alta, attira dei Cutiefly\nche gli si radunano intorno."
        de:
          sun: "Mittags badet es in der Sonne und hält\nNickerchen. Nachts muss es sich aber einen\nsichereren Schlafplatz suchen und zieht los."
          moon: "Dieses Pokémon duftet frisch und lieblich.\nIm hohen Gras, wo sich Imantis gern versteckt,\nhalten sich oft auch viele Wommel auf."
        es:
          sun: "Mientras que de día duerme tranquilamente a la\nluz del sol, al caer la noche busca un sitio más\nseguro para dormir."
          moon: "Desprende un aroma fresco y dulce. En la hierba\nalta donde se esconde también suelen acudir\nCutiefly."
        ko:
          sun: "낮에는 빛을 쐬어 자고\n밤이 되면 더욱 안전한\n잠자리를 찾아 걸어 다닌다."
          moon: "산뜻하고 달콤한 향기가 난다.\n짜랑랑이 숨어있는 풀밭에는\n곧잘 에블리가 무리 지어있다."
        zh_simp:
          sun: "白天的时候，沐浴着阳光睡觉。\n到了晚上就会开始走动，\n寻找更安全的睡床。"
          moon: "会发出清爽而又甘甜的香味。\n在伪螳草藏匿的草丛里，\n经常聚集着萌虻。"
        zh_trad:
          sun: "白天的時候，一邊沐浴陽光\n一邊睡覺。到了晚上就會為\n尋找更安全的睡床而走出來。"
          moon: "會發出清爽而甘甜的香味。\n萌虻經常聚集在偽螳草\n藏匿的草叢裡。"
lurantis:
  species_id: 754
  names:
    jp_kana: ラランテス
    jp_kanji: ラランテス
    en: Lurantis
    fr: Floramantis
    it: Lurantis
    de: Mantidea
    es: Lurantis
    ko: 라란티스
    zh_simp: 兰螳花
    zh_trad: 蘭螳花
  forms:
    lurantis:
