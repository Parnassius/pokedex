      descriptions:
        jp_kana:
          sun: "けなみや　シッポが　うつくしいので\nだいにんき。　せいちょうに　つれ\nシッポは　わかれて　ふえていく。"
          moon: "くちから　ひとだまの　ような\nほのおを　はきだすので　おばけと\nみまちがえる　ひとも　いる。"
        jp_kanji:
          sun: "毛並みや　シッポが　美しいので\n大人気。　成長に　連れ\nシッポは　わかれて　増えていく。"
          moon: "口から　人魂の　ような\n炎を　吐きだすので　お化けと\n見間違える　人も　いる。"
        en:
          sun: "Its beautiful fur and tails have made it very\npopular. As it grows, its tails split to form\nmore tails."
          moon: "From its mouth spew flames that seem to\nresemble the spirits of the deceased. Some\npeople mistakenly think this fire is a ghost."
        fr:
          sun: "Un Pokémon très populaire de par son pelage\net ses superbes queues. Au fur et à mesure de\nsa croissance, elles se multiplient en se divisant."
          moon: "Certaines personnes prennent ce Pokémon pour\nun fantôme à cause des flammes qui sortent de\nsa bouche, similaires à des âmes de défunts."
        it:
          sun: "È molto amato per il suo manto e le sue code.\nMan mano che cresce, la sua coda sviluppa\ndiverse diramazioni."
          moon: "Emette dalla bocca fiamme simili a fuochi fatui,\ne per questo motivo a volte viene preso\nper un fantasma."
        de:
          sun: "Sein Fell und seine Schweife sind so hübsch,\ndass es sich großer Beliebtheit erfreut. Letztere\nspalten sich mit zunehmendem Alter weiter auf."
          moon: "Es kann Feuerbälle speien, die Irrlichtern ähneln.\nAus diesem Grund wird es gelegentlich für ein\nGespenst gehalten."
        es:
          sun: "Es muy popular por su pelaje y sus colas. A\nmedida que crece, las colas se dividen y\naumentan en número."
          moon: "Lanza llamas por la boca que se asemejan\na fuegos fatuos, por lo que algunos las\nconfunden con fantasmas."
        ko:
          sun: "털과 꼬리가 아름다워서\n인기가 많다. 성장함에 따라\n꼬리가 나뉘면서 늘어난다."
          moon: "입에서 도깨비불 같은\n불꽃을 내뱉어서 유령으로\n착각하는 사람도 있다."
        zh_simp:
          sun: "因为毛色和尾巴非常漂亮，\n所以很有人气。伴随着成长，\n尾巴会分开，长得越来越多。"
          moon: "因为会从口中喷出好像\n人的灵魂一样的火焰，\n所以也有人把它错看成妖怪。"
        zh_trad:
          sun: "因為毛色和尾巴非常漂亮，\n所以很受歡迎。伴隨著成長，\n尾巴會分開，長得越來越多。"
          moon: "因為會從口中噴出好像\n人的靈魂一樣的火焰，\n所以也有人把牠錯看成鬼怪。"
    vulpix_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 38
        attack: 41
        defense: 40
        special_attack: 50
        special_defense: 65
