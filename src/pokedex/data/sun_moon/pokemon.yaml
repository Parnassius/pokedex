          moon: "きょうれつな　パンチや　キックを\nおみまいしたあと　へその　あたりから\nほのおを　ふきだし　とどめを　さす。"
        jp_kanji:
          sun: "粗暴で　身勝手な　性格。\n気分が　乗らなければ　トレーナーの\n命令も　平気で　無視するぞ。"
          moon: "強烈な　パンチや　キックを\nお見舞いしたあと　へその　あたりから\n炎を　吹き出し　止めを　刺す。"
        en:
          sun: "This Pokémon has a violent, selfish disposition.\nIf it’s not in the mood to listen, it will ignore its\nTrainer’s orders with complete nonchalance."
          moon: "After hurling ferocious punches and flinging\nfurious kicks, it finishes opponents off by\nspewing fire from around its navel."
        fr:
          sun: "Un Pokémon brutal qui n’en fait qu’à sa tête.\nSelon son humeur du moment, il lui arrive\nd’ignorer sciemment les ordres de son Dresseur."
          moon: "Après avoir asséné une pluie de coups de pied\net de poing à son adversaire, il l’asperge de\nflammes ardentes sortant de son nombril."
        it:
          sun: "Ha un carattere aggressivo ed egoista.\nSe ha la luna storta, non si fa problemi\na ignorare gli ordini del proprio Allenatore."
          moon: "Stordisce il nemico con pugni e calci di grande\npotenza per poi metterlo KO con le fiammate\nche emette dal ventre."
        de:
          sun: "Ein raues und selbstsüchtiges Pokémon.\nWenn es keine Lust hat, ignoriert es auch\nschon mal die Befehle seines Trainers."
          moon: "Nach einer Reihe heftiger Schläge und Tritte\nschießt es Feuer aus seinem Bauchnabel,\num dem Gegner den Garaus zu machen."
        es:
          sun: "Posee un carácter rudo y egoísta. Si un\nEntrenador no le cae en gracia, ignora sus\nórdenes con total impasibilidad."
          moon: "Descarga ráfagas de demoledores puñetazos y\npatadas sobre sus rivales, a los que luego\nremata con las llamas que manan de su vientre."
        ko:
          sun: "거칠고 제멋대로인 성격이다.\n기분이 내키지 않으면 트레이너의\n명령도 아무렇지 않게 무시한다."
          moon: "강렬한 펀치와 킥을\n가한 후 배꼽 부근에서\n불꽃을 뿜어내 마무리한다."
        zh_simp:
          sun: "性格粗鲁又任性。\n心情不爽的时候，连训练家的\n命令也会淡定地无视。"
          moon: "在使出猛烈的拳击或脚踢后，\n会从肚脐周围喷出火焰，\n将敌人一击毙命。"
        zh_trad:
          sun: "性格粗魯又任性。\n心情不爽的時候，連訓練家的\n命令也會冷漠地無視。"
          moon: "在使出猛烈的拳擊或腳踢後，\n會從肚臍周圍噴出火焰，\n將敵人一擊斃命。"
