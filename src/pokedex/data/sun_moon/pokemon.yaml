ledyba:
  species_id: 165
  names:
    jp_kana: レディバ
    jp_kanji: レディバ
    en: Ledyba
    fr: Coxy
    it: Ledyba
    de: Ledyba
    es: Ledyba
    ko: 레디바
    zh_simp: 芭瓢虫
    zh_trad: 芭瓢蟲
  forms:
    ledyba:
      form_id: 0
      base_stats:
        hp: 40
        attack: 20
        defense: 30
        special_attack: 40
        special_defense: 80
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - swarm
        - early_bird
      hidden_ability: rattled
      descriptions:
        jp_kana:
          sun: "おくびょうで　つねに　むれていないと\nふあん。　せなかのもようは　１ぴき\n１ぴき　びみょうに　ちがう　かたち。"
          moon: "においのする　たいえきで　なかまと\nコミュニケーションする。　おこった\nときの　においは　すっぱいぞ。"
        jp_kanji:
          sun: "臆病で　常に　群れていないと\n不安。　背中の模様は　１匹\n１匹　微妙に　違う　形。"
          moon: "臭いのする　体液で　仲間と\nコミュニケーションする。　怒った\nときの　臭いは　すっぱいぞ。"
        en:
          sun: "They are timid and grow uneasy when not in a\nswarm with others of their kind. The pattern on\ntheir backs differs slightly from one to another."
          moon: "They communicate with one another using bodily\nfluids that give off odors. When they’re angry,\ntheir odor smells sour."
        fr:
          sun: "Il est si timide qu’il est inquiet s’il n’est pas\nen groupe. Les motifs sur son dos diffèrent\nlégèrement d’un individu à l’autre."
          moon: "Il communique avec ses congénères grâce à un\nfluide odorant. Quand il est en colère, l’odeur\nen devient vraiment aigre."
        it:
          sun: "È molto timido e senza il suo gruppo si sente\nperso. Il motivo sul dorso è leggermente diverso\nin ciascun esemplare."
          moon: "Secerne un fluido aromatico per comunicare con\ni suoi simili. Quando è arrabbiato, l’odore si fa\npungente."
        de:
          sun: "Es ist scheu und fürchtet sich, wenn es nicht\nTeil des Schwarms ist. Das Muster auf seinem\nRücken ist bei jedem Exemplar minimal anders."
          moon: "Es nutzt eine duftende Flüssigkeit, um mit seinen\nArtgenossen zu kommunizieren. Ist es wütend,\nnimmt diese einen stechenden Geruch an."
        es:
          sun: "Es muy tímido y se siente inseguro si no está\njunto a los de su especie. El estampado de sus\nalas varía de un Ledyba a otro."
          moon: "Ledyba segrega un fluido aromático con el que\nse comunica con los de su especie. El olor que\ndesprende cuando está enfadado es agrio."
        ko:
          sun: "겁이 많아 항상 무리 지어 있지\n않으면 불안하다. 등의 무늬는\n모두 미묘하게 다르게 생겼다"
          moon: "냄새나는 체액으로 동료와\n커뮤니케이션을 한다. 화가\n났을 때의 냄새는 시큼하다."
        zh_simp:
          sun: "因为胆小，不总是聚在一起\n就会感到不安。背后的花纹\n每只都会有细微的不同。"
          moon: "用带气味的体液与伙伴交流。\n发怒的时候，气味会酸酸的。"
        zh_trad:
          sun: "天性膽小，總是成群結隊，\n不然就會感到不安。背上的花紋\n每隻都有細微的不同。"
          moon: "用帶氣味的體液與夥伴交流。\n發怒的時候，氣味會酸酸的。"
ledian:
  species_id: 166
  names:
    jp_kana: レディアン
    jp_kanji: レディアン
    en: Ledian
    fr: Coxyclaque
    it: Ledian
