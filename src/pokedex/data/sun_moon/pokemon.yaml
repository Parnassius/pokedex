      descriptions:
        jp_kana:
          sun: "フラフラ　おぼつかない　あしどりだが\nパッチールじたいは　まっすぐに\nあるいている　つもりだよ。"
          moon: "ブチもようは　１ぴき１ぴき　ちがう。\nわずかなブチの　いちの　ちがいを\nたのしむ　マニアも　いるという。"
        jp_kanji:
          sun: "フラフラ　おぼつかない　足取りだが\nパッチール自体は　真っ直ぐに\n歩いている　つもりだよ。"
          moon: "ブチ模様は　１匹１匹　違う。\n僅かなブチの　位置の　違いを\n楽しむ　マニアも　いるという。"
        en:
          sun: "Its steps are staggering and unsteady, but\nSpinda thinks it’s walking in a straight line."
          moon: "Each and every Spinda has a slightly different\nconfiguration of spots. There are collectors who\nenjoy the tiny differences in their spot patterns."
        fr:
          sun: "Bien qu’il semble peu assuré sur ses pattes,\nSpinda est quant à lui persuadé d’avancer\ntout droit, faisant fi de ses embardées."
          moon: "Chaque Spinda possède un pelage unique.\nChercher les différences d’un Spinda à l’autre\nserait même un passe-temps pour certains."
        it:
          sun: "Si muove con passo incerto e barcollante,\ncercando invano di camminare dritto."
          moon: "Ogni Spinda ha un motivo maculato unico.\nAlcuni appassionati si divertono a notare\nle differenze nella posizione delle macchie."
        de:
          sun: "Pandir hat einen unsicheren, schwankenden\nGang, obwohl es sich große Mühe gibt,\ngeradeaus zu gehen."
          moon: "Jedes Pandir hat ein einzigartiges Flecken-\nmuster. Kleine, aber feine Unterschiede:\neine wahre Freude für eingefleischte Fans."
        es:
          sun: "Aunque Spinda pretende avanzar en línea recta,\nno puede evitar andar tambaleándose."
          moon: "Cada Spinda tiene dibujos diferentes en su\npelaje. Dicen que algunos estudiosos disfrutan\nanalizando los distintos patrones."
        ko:
          sun: "휘청휘청 불안한 걸음걸이지만\n얼루기 본인은 똑바로\n걷고 있다고 생각한다."
          moon: "얼룩무늬는 1마리 1마리 다르다.\n얼룩 위치의 근소한 차이를\n즐기는 마니아도 있다고 한다."
        zh_simp:
          sun: "晃晃悠悠，步伐不稳健，\n但晃晃斑自己是打算要\n笔直走路的哦。"
          moon: "每一只身上的斑点花纹都不同。\n听说也有爱好者以这细微的\n斑点位置的不同为乐。"
        zh_trad:
          sun: "雖然走路總是搖搖晃晃歪七扭八的，\n但晃晃斑自己是打算要\n筆直走路的哦。"
          moon: "每一隻身上的斑點花紋都不同。\n聽說也有愛好者以這細微的\n斑點位置的不同為樂。"
