leafeon:
  species_id: 470
  names:
    jp_kana: リーフィア
    jp_kanji: リーフィア
    en: Leafeon
    fr: Phyllali
    it: Leafeon
    de: Folipurba
    es: Leafeon
    ko: 리피아
    zh_simp: 叶伊布
    zh_trad: 葉伊布
  forms:
    leafeon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 110
        defense: 130
        special_attack: 60
        special_defense: 65
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - leaf_guard
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          sun: "さいぼうこうせいは　どうぶつ　より\nしょくぶつに　ちかい。　こうごうせいで\nくわずとも　エネルギーを　えられる。"
          moon: "わかい　リーフィアほど　ツンと　くる\nあおくさい　におい。　としおいると\nおちばの　ような　においに　なる。"
        jp_kanji:
          sun: "細胞構成は　動物　より\n植物に　近い。　光合成で\n喰わずとも　エネルギーを　得られる。"
          moon: "若い　リーフィアほど　ツンと　くる\n青臭い　匂い。　年老いると\n落ち葉の　ような　匂いになる。"
        en:
          sun: "Its cellular composition is closer to that of a\nplant than an animal. It uses photosynthesis to\nproduce its energy supply without eating food."
          moon: "The younger they are, the more they smell like\nfresh grass. With age, their fragrance takes on\nthe odor of fallen leaves."
        fr:
          sun: "Sa structure cellulaire est plus proche de celle\ndes végétaux que de celle des animaux.\nIl produit de l’énergie par photosynthèse."
          moon: "Les jeunes Phyllali sentent l’herbe fraîche.\nAvec l’âge, ce parfum se mue en une odeur\nde feuilles mortes."
        it:
          sun: "Le sue cellule hanno caratteristiche molto simili\na quelle dei vegetali. Può ricavare energia vitale\ntramite fotosintesi."
          moon: "Quando è giovane emette un forte profumo\nd’erba fresca, ma nella vecchiaia odora di\nfoglie morte."
        de:
          sun: "Seine Zellstruktur ähnelt jener von Pflanzen.\nDurch Photosynthese kann es ohne\nNahrungsaufnahme Energie gewinnen."
          moon: "Junge Folipurba riechen stark nach frischem\nGras, ältere hingegen verströmen den Geruch\nvon herabgefallenem Laub."
        es:
          sun: "Su estructura celular se asemeja más a la de las\nplantas que a la de los animales. Puede obtener\nenergía sin alimentos gracias a la fotosíntesis."
          moon: "Los Leafeon jóvenes desprenden un intenso\naroma a hierba fresca, mientras que el olor de\nlos mayores es más semejante a la hojarasca."
        ko:
          sun: "세포구성은 동물보다는\n식물에 가깝다. 광합성을 통해\n안 먹어도 에너지를 얻을 수 있다."
          moon: "어린 리피아일수록 코를 찌르는\n풋내가 난다. 나이를 먹으면\n낙엽 같은 냄새로 바뀐다."
        zh_simp:
          sun: "比起动物，细胞构成\n更接近植物。用光合作用，\n就算不吃也能获得能量。"
          moon: "越是年幼的叶伊布，\n越是有冲鼻的青草香味。\n年老后就变成好像落叶的味道。"
        zh_trad:
          sun: "比起動物，細胞構成\n更接近植物。靠著光合作用，\n就算不吃東西也能獲得能量。"
          moon: "越是年幼的葉伊布，\n越是有刺鼻的青草味。\n年老後就會變成好像落葉的味道。"
