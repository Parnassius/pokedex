      descriptions:
        jp_kana:
          sun: "ウルトラホールから　あらわれた　ＵＢ。\nみずから　てきを　おそわないようだが\nするどい　ぜんしんは　きょうきだ。"
          moon: "きょだいな　てっとうを　いっとうの\nもとに　きりすてる　すがたが\nもくげきされた　ビーストの　いっしゅ。"
        jp_kanji:
          sun: "ウルトラホールから　現れた　ＵＢ。\n自ら　敵を　襲わないようだが\n鋭い　全身は　凶器だ。"
          moon: "巨大な　鉄塔を　一刀の\nもとに　切り捨てる　姿が\n目撃された　ビーストの　一種。"
        en:
          sun: "This Ultra Beast came from the Ultra Wormhole.\nIt seems not to attack enemies on its own, but\nits sharp body is a dangerous weapon in itself."
          moon: "One of the Ultra Beast life-forms, it was\nobserved cutting down a gigantic steel tower\nwith one stroke of its blade."
        fr:
          sun: "Une Ultra-Chimère venue de l’Ultra-Brèche.\nElle ne semble pas agressive, bien que son\ncorps tout entier soit une arme tranchante."
          moon: "Une espèce d’Ultra-Chimère. On l’aurait aperçue\ncoupant un pylône métallique en deux d’un seul\ntranchant."
        it:
          sun: "Un’Ultracreatura arrivata attraverso un\nUltravarco. Non attacca di propria iniziativa,\nma il suo corpo affilato è un’arma letale."
          moon: "Questa Ultracreatura è stata vista tagliare\nin due un traliccio dell’alta tensione con un\nsolo colpo."
        de:
          sun: "Eine Ultrabestie, die zwar nicht von sich aus\nanzugreifen scheint, deren rasiermesserscharfer\nKörper aber eine gefährliche Waffe darstellt."
          moon: "Diese Ultrabestie wurde dabei beobachtet,\nwie sie einen riesigen stählernen Turm mit nur\neinem Hieb ihrer Klingen zerteilte."
        es:
          sun: "Este Ultraente surgió de un Ultraumbral. Se dice\nque no es muy agresivo, pero su afilado cuerpo\nes un arma realmente peligrosa."
          moon: "Varios testigos han observado como este\nUltraente cortaba en dos una enorme torre de\nacero como si fuera mantequilla."
        ko:
          sun: "울트라홀에서 나타난 UB이다.\n스스로 적을 덮치진 않지만\n온몸이 날카로운 흉기다."
          moon: "거대한 철탑을 단번에\n베어 버리는 모습이\n목격된 비스트의 일종."
        zh_simp:
          sun: "从究极之洞出现的究极异兽。\n本身并不打算恐吓敌人，\n但是锐利的全身就是凶器。"
          moon: "有人目击到了它\n一刀将巨大的铁搭切掉的样子。\n是究极异兽的一种。"
        zh_trad:
          sun: "來自究極之洞的ＵＢ。\n本身不會主動襲擊敵人，\n但是銳利的全身就是兇器。"
          moon: "被目擊到了一刀\n將巨大鐵塔切斷的樣子。\n是究極異獸的一種。"
guzzlord:
