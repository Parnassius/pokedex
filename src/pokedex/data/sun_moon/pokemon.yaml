      hidden_ability: long_reach
      descriptions:
        jp_kana:
          sun: "つばさに　しこまれた　やばねを\nつがえてはなつ。　１００メートルさきの\nこいしも　つらぬく　せいど。"
          moon: "きほんてきに　ようじんぶかく\nクールだが　ふいを　つかれると\nだいパニックに　おちいってしまう。"
        jp_kanji:
          sun: "翼に　仕込まれた　矢羽を\n番えて放つ。　１００メートル先の\n小石も　貫く　精度。"
          moon: "基本的に　用心深く\nクールだが　不意を　つかれると\n大パニックに　陥ってしまう。"
        en:
          sun: "It fires arrow quills from its wings with such\nprecision, they can pierce a pebble at distances\nover a hundred yards."
          moon: "Although basically cool and cautious, when it’s\ncaught by surprise, it’s seized by panic."
        fr:
          sun: "Les plumes de ses ailes lui servent de flèches.\nSa précision au tir est si grande qu’il peut\natteindre un gravillon à 100 m."
          moon: "Malgré sa grande vigilance et son air posé,\nil a tendance à céder à la panique dès qu’il est\npris de court."
        it:
          sun: "Scocca piume dalle sue ali come se fossero\nfrecce. È preciso al punto da riuscire a centrare\nuna piccola pietra a 100 m di distanza."
          moon: "In genere è molto cauto e misurato, ma nei rari\ncasi in cui viene colto di sorpresa si lascia\nfacilmente prendere dal panico."
        de:
          sun: "Dieses Pokémon kann die Federn seiner Flügel\nwie Pfeile verschießen. Dabei ist es so präzise,\ndass es einen Kiesel auf 100 m durchbohrt."
          moon: "Im Grunde ein vorsichtiges und gelassenes\nPokémon, das jedoch in wahnsinnige Panik\nverfällt, wenn es überrascht wird."
        es:
          sun: "Las plumas de sus alas le sirven de flechas con\nlas que puede acertar a un guijarro a 100 m."
          moon: "Aunque es extremadamente cauteloso y\ncalmado por naturaleza, si lo pillan por\nsorpresa, el pánico se apodera de él."
        ko:
          sun: "날개에 숨겨진 살깃을 시위에\n메겨서 날린다. 100m 앞의\n작은 돌도 관통하는 정밀함이다."
          moon: "기본적으로 신중하고\n쿨하지만 허를 찔리면\n크게 패닉에 빠져버린다."
        zh_simp:
          sun: "搭弦射出收藏在翅膀里的箭羽。\n有着连前方１００米的小石头\n也能穿透的精度。"
          moon: "基本上是十分谨慎且冷静的，\n但如果被冷不防地袭击了，\n就会陷入巨大的恐慌中。"
        zh_trad:
          sun: "托弓拉弦射出藏在翅膀裡的箭羽。\n精準度高到連前方１００米遠的\n小石頭也能貫穿。"
          moon: "基本上性格謹慎而冷靜，\n但如果受到突如其來的襲擊，\n就會陷入巨大的驚慌中。"
