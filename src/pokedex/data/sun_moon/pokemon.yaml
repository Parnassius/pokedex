        jp_kana:
          sun: "たいもうから　こおりのつぶを　うみ\nてきに　あびせかける。　おこらせると\nいっしゅんで　こおりづけに　される。"
          moon: "おだやかな　きしつ。　キュウコンの\nリージョンフォームと　わかるまでは\nかみのけしんと　うやまわれていた。"
        jp_kanji:
          sun: "体毛から　氷の粒を　生み\n敵に　浴びせかける。　怒らせると\n一瞬で　氷漬けに　される。"
          moon: "穏やかな　気質。　キュウコンの\nリージョンフォームと　わかるまでは\n神の化身と　敬われていた。"
        en:
          sun: "It creates drops of ice in its coat and showers\nthem over its enemies. Anyone who angers it\nwill be frozen stiff in an instant."
          moon: "Possessing a calm demeanor, this Pokémon was\nrevered as a deity incarnate before it was\nidentified as a regional variant of Ninetales."
        fr:
          sun: "Il fait de petites boules de glace avec sa\nfourrure et en canarde son adversaire.\nQuand il s’énerve, il peut le congeler sur place."
          moon: "Il est de nature très calme. Jusqu’à ce qu’on\nl’identifie comme une forme régionale de\nFeunard, il était adoré comme un avatar divin."
        it:
          sun: "Colpisce il nemico con una pioggia di cristalli\ndi ghiaccio che genera dal suo manto. Chi lo fa\narrabbiare si ritrova congelato all’istante."
          moon: "Un Pokémon dall’indole tranquilla, venerato come\nuna divinità prima di scoprire che si trattava\ndi una forma regionale di Ninetales."
        de:
          sun: "Es greift seine Feinde mittels Eiskristallen an,\ndie es mit seinem Fell erzeugt. Wer es wütend\nmacht, wird in Sekundenschnelle tiefgefroren."
          moon: "Ein sanftmütiges Pokémon, das als Gottheit\nverehrt wurde, bis man herausfand, dass es\nsich um eine Regionalform Vulnonas handelt."
        es:
          sun: "En su pelaje se crean cristales de hielo con los\nque cubre al enemigo. Quien lo enfada acaba\ncongelado al instante."
          moon: "Tiene un temperamento muy tranquilo. Hasta\nque se supo que era la forma regional de\nNinetales, se le veneraba como a una deidad."
        ko:
          sun: "털에서 얼음 알맹이를 만들어\n적에게 퍼붓는다. 화나게 하면\n한순간에 얼려버린다."
          moon: "온화한 기질을 가졌다. 나인테일의\n리전폼으로 알려지기 전에는\n신의 화신으로 숭상 받아왔다."
        zh_simp:
          sun: "从体毛中生出冰粒，泼向敌人。\n如果惹恼它，一瞬间就会被冰镇。"
          moon: "性格温和。在被人知道是\n九尾的地区形态之前，\n人们一直把它敬为神的化身。"
        zh_trad:
          sun: "從體毛中生出冰粒，潑向敵人。\n如果惹惱牠，一瞬間就會被冰鎮。"
          moon: "性格穩重。被人知道是\n九尾的地區形態之前，\n一直被尊敬為神的化身。"
jigglypuff:
  species_id: 39
  names:
    jp_kana: プリン
    jp_kanji: プリン
    en: Jigglypuff
    fr: Rondoudou
    it: Jigglypuff
    de: Pummeluff
    es: Jigglypuff
    ko: 푸린
    zh_simp: 胖丁
    zh_trad: 胖丁
  forms:
    jigglypuff:
      form_id: 0
      base_stats:
        hp: 115
        attack: 45
        defense: 20
        special_attack: 45
        special_defense: 25
        speed: 20
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - fairy
      egg_groups:
        - fairy
      abilities:
        - cute_charm
        - competitive
      hidden_ability: friend_guard
      held_items:
        rare: moon_stone
      descriptions:
        jp_kana:
          sun: "おおきく　おなかを　ふくらませて\nふしぎな　メロディーを　うたう。\nきくと　すぐに　ねむくなるぞ。"
          moon: "１２オクターブを　こえる　せいいきを\nもつが　うたが　うまいか　どうかは\nそれぞれの　プリンの　どりょくしだい。"
        jp_kanji:
          sun: "大きく　お腹を　膨らませて\n不思議な　メロディーを　歌う。\n聞くと　すぐに　眠くなるぞ。"
          moon: "１２オクターブを　超える　声域を\n持つが　歌が　上手いか　どうかは\nそれぞれの　プリンの　努力次第。"
        en:
          sun: "It hugely inflates its stomach and sings a\nmysterious melody. If you hear this melody,\nyou’ll become sleepy right away."
          moon: "Jigglypuff possess a vocal range that exceeds\n12 octaves, but each individual’s singing skill\ndepends on its own effort."
        fr:
          sun: "Ce Pokémon aime inspirer profondément\net chanter une mélodie mystérieuse qui endort\nimmédiatement tous ceux qui l’entendent."
          moon: "Cette espèce possède une tessiture de douze\noctaves, mais la beauté du chant dépend des\nefforts déployés par chaque individu."
        it:
          sun: "Gonfia la pancia per cantare una melodia\nmisteriosa che fa addormentare chiunque\nl’ascolti."
          moon: "Ha un’estensione vocale più ampia di 12 ottave.\nL’abilità nel canto è diversa da un esemplare\nall’altro e dipende dalla dedizione personale."
        de:
          sun: "Es kann tief einatmen und seinen Bauch mit Luft\nfüllen, um ein sonderbares Lied anzustimmen.\nWer dieses hört, schläft auf der Stelle ein."
          moon: "Sein Stimmumfang übersteigt zwölf Oktaven.\nWie gut ein Pummeluff singen kann, hängt\njedoch davon ab, wie fleißig es übt."
        es:
          sun: "Hincha su vientre considerablemente y entona\nuna melodía misteriosa que duerme en el acto\na todo aquel que la oye."
          moon: "Su tesitura suele ser de 12 octavas, pero su\nhabilidad en el canto dependerá del esfuerzo\nque realice cada individuo."
        ko:
          sun: "배를 크게 부풀려서\n신비한 멜로디를 노래한다.\n들으면 바로 졸음이 쏟아진다."
          moon: "12옥타브를 넘는 음역을\n지녔지만 노래를 잘하는지는\n푸린 저마다의 노력에 달렸다."
        zh_simp:
          sun: "把肚子鼓得大大的，\n唱出神奇的旋律。\n听到后就会马上昏昏欲睡。"
          moon: "拥有超过１２个音阶的音域，\n至于歌唱得好不好就要靠\n胖丁们各自努力了。"
        zh_trad:
          sun: "讓肚子脹得大大的，\n唱出神奇的旋律。\n聽到後就會馬上變得昏昏欲睡。"
          moon: "擁有超過１２個八度音的音域，\n不過歌唱得好不好就要看\n每隻胖丁自己努力的程度了。"
wigglytuff:
  species_id: 40
  names:
    jp_kana: プクリン
    jp_kanji: プクリン
    en: Wigglytuff
    fr: Grodoudou
    it: Wigglytuff
    de: Knuddeluff
    es: Wigglytuff
    ko: 푸크린
    zh_simp: 胖可丁
    zh_trad: 胖可丁
  forms:
    wigglytuff:
      form_id: 0
      base_stats:
        hp: 140
        attack: 70
        defense: 45
        special_attack: 85
        special_defense: 50
        speed: 45
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - fairy
      egg_groups:
        - fairy
      abilities:
        - cute_charm
        - competitive
      hidden_ability: frisk
      held_items:
        rare: moon_stone
      descriptions:
        jp_kana:
          sun: "ふわふわの　けは　きせつの　かわりめに\nぬけおちる。　それを　ひろいあつめて\nつむいだ　けいとは　こうきゅうひん。"
          moon: "いきを　すって　どんどん　ふくらむ。\nプクリンどうしは　どっちが　おおきく\nふくらめるか　しょうぶ　するよ。"
        jp_kanji:
          sun: "ふわふわの　毛は　季節の　変わり目に\n抜け落ちる。　それを　拾い集めて\n紡いだ　毛糸は　高級品。"
          moon: "息を　吸って　どんどん　膨らむ。\nプクリン同士は　どっちが　大きく\n膨らめるか　勝負　するよ。"
        en:
          sun: "It sheds its fine fur when the seasons change.\nThe fur is gathered and spun into a\nluxurious yarn."
          moon: "As it inhales, it expands...and expands...and\nexpands. Wigglytuff compete to see which one\ncan inflate itself the most."
        fr:
          sun: "Son pelage est doux et soyeux, mais il en\nchange à chaque saison. Certains le récupèrent\net en font des manteaux de grand luxe."
          moon: "Il aime se gonfler d’air au maximum. Les conflits\nde Grodoudou se règlent en regardant lequel\nréussit à se faire plus gros que les autres."
        it:
          sun: "Al cambio di stagione perde il suo morbido\nmanto, che può essere raccolto e filato per\nrealizzare prodotti di lusso."
          moon: "Respira profondamente per gonfiarsi più\nche può. Fa a gara con altri Wigglytuff a chi\nsi gonfia di più."
        de:
          sun: "Pünktlich zum Wechsel der Jahreszeiten streift\nes sein kuschelig weiches Fell ab. Der Stoff, der\nsich daraus spinnen lässt, gilt als Luxusgut."
          moon: "Es kann sich größer machen, indem es Luft\neinatmet. Mit Artgenossen wetteifert es, wer\nsich am meisten aufblasen kann."
        es:
          sun: "Este Pokémon muda con las estaciones su\npelaje suave y sedoso, que algunos recogen\npara elaborar artículos de lujo."
          moon: "Puede hinchar su cuerpo tragando aire. Los\nWigglytuff suelen competir para ver quién es\ncapaz de hincharse más."
        ko:
          sun: "푹신푹신한 털은 계절이 바뀔 때\n빠진다. 그걸 모아서\n뽑아낸 털실은 고급품이다."
          moon: "숨을 들이마셔서 점점 부풀어 오른다.\n푸크린끼리는 누가 크게\n부풀어 오르나 대결한다."
        zh_simp:
          sun: "蓬松的毛发会随着季节转换\n而掉落。收集这些毛发后\n纺织成的毛线是高级商品。"
          moon: "连续不停吸气，不断地膨胀起来。\n胖可丁之间会互相比较谁胀得大哦。"
        zh_trad:
          sun: "蓬鬆的毛髮會隨季節變遷而掉落。\n收集這些毛髮所紡織成的\n毛線是高級商品。"
          moon: "連續不停吸氣，不斷地膨脹起來。\n胖可丁之間會互相比試誰脹得比較大哦。"
zubat:
  species_id: 41
  names:
    jp_kana: ズバット
    jp_kanji: ズバット
    en: Zubat
    fr: Nosferapti
    it: Zubat
    de: Zubat
    es: Zubat
