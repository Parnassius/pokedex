      descriptions:
        jp_kana:
          sun: "せかいの　かくちに　ケンタロスに　のり\nせいかつ　してきた　れきしが　あるが\nそのはじまりは　アローラ　だという。"
          moon: "あらっぽい　ポケモンだが\nアローラちほうの　ケンタロスは\nやや　おちつきが　あるという。"
        jp_kanji:
          sun: "世界の　各地に　ケンタロスに　乗り\n生活　してきた　歴史が　あるが\nその始まりは　アローラ　だという。"
          moon: "荒っぽい　ポケモンだが\nアローラ地方の　ケンタロスは\nやや　落ち着きが　あるという。"
        en:
          sun: "Historically, people in areas all over the world\nhave ridden Tauros, but the practice is said to\nhave started in Alola."
          moon: "Although it’s known to be a fierce Pokémon,\nTauros in the Alola region are said to possess\na measure of calmness."
        fr:
          sun: "Beaucoup de sociétés à travers le monde ont\nappris à monter Tauros au cours de leur histoire.\nLes premières à l’avoir fait habitaient à Alola."
          moon: "Il s’agit normalement d’un Pokémon très agressif,\nmais les Tauros natifs d’Alola sont d’une nature\nun peu plus paisible."
        it:
          sun: "La storia insegna che in tutto il mondo gli esseri\numani hanno sempre cavalcato i Tauros.\nQuesta antica pratica nacque proprio ad Alola."
          moon: "Questo Pokémon ha un’indole violenta, ma\nsembra che i Tauros della regione di Alola\nsiano più docili."
        de:
          sun: "Schon seit vielen Jahren reiten Menschen überall\nauf der Welt auf Tauros. Diese Tradition hat\nangeblich in Alola ihren Ursprung genommen."
          moon: "Obwohl es sonst für seine ungestüme Art\nbekannt ist, gelten Exemplare aus Alola als\nvergleichsweise gelassen."
        es:
          sun: "El uso de Tauros como montura se remonta a\ntiempos muy remotos. Ahora es una práctica\nmuy extendida, pero parece que surgió en Alola."
          moon: "Es un Pokémon muy famoso por su naturaleza\nviolenta, aunque el Tauros de Alola parece ser\nalgo más sosegado."
        ko:
          sun: "세계 각지에 켄타로스에 타서\n생활해온 역사가 있으나\n그 시초는 알로라라고 한다."
          moon: "난폭한 포켓몬이지만\n알로라지방의 켄타로스는\n조금 침착하다고 한다."
        zh_simp:
          sun: "在世界各地都有骑着肯泰罗\n生活的历史，但这一切的开端\n据说是在阿罗拉。"
          moon: "是性格暴躁的宝可梦，\n但是听说阿罗拉地区的肯泰罗会比较稳重。"
        zh_trad:
          sun: "在世界各地都有騎著肯泰羅\n生活的歷史，但這一切的開端\n據說是在阿羅拉。"
          moon: "性格暴躁的寶可夢，\n但是聽說阿羅拉地區的肯泰羅\n會比較穩重。"
