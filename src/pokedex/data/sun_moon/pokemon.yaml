      descriptions:
        jp_kana:
          sun: "よく　なつくので　しょしんしゃに\nおすすめのポケモンと　いわれるが\nそだつと　きしょうは　あらくなる。"
          moon: "むかしから　ひとと　くらしてきた。\nトレーナーが　かなしんでいると\nそれを　さっして　そばを　はなれない。"
        jp_kanji:
          sun: "よく　なつくので　初心者に\nお勧めのポケモンと　いわれるが\n育つと　気性は　荒くなる。"
          moon: "昔から　人と　暮らしてきた。\nトレーナーが　悲しんでいると\nそれを　察して　側を　離れない。"
        en:
          sun: "It’s considered to be a good Pokémon for\nbeginners because of its friendliness, but its\ndisposition grows rougher as it grows up."
          moon: "This Pokémon has lived with people since times\nlong ago. It can sense when its Trainer is in the\ndumps and will stick close by its Trainer’s side."
        fr:
          sun: "Comme il s’attache facilement à son Dresseur,\non le conseille souvent aux débutants, bien qu’il\nait tendance à devenir plus rebelle avec l’âge."
          moon: "Ce Pokémon vit depuis toujours avec les\nhumains. Lorsque son Dresseur est triste, il\nreste à ses côtés pour le soutenir moralement."
        it:
          sun: "È ritenuto un Pokémon ideale per Allenatori\nalle prime armi perché si affeziona facilmente.\nCrescendo, però, tende a diventare aggressivo."
          moon: "Questo Pokémon vive insieme agli esseri umani\nda tempo immemore. Se il suo Allenatore è triste,\nresta al suo fianco per sostenerlo."
        de:
          sun: "Dieses sehr zutrauliche Pokémon wird oft\nfrischgebackenen Trainern empfohlen.\nMit dem Alter wird es jedoch immer wilder."
          moon: "Es lebte schon immer mit Menschen zusammen\nund kann spüren, wenn sein Trainer traurig ist.\nEs weicht dann nicht mehr von seiner Seite."
        es:
          sun: "Su carácter amigable lo convierte en el Pokémon\nideal para Entrenadores novatos. Sin embargo, al\ncrecer suele volverse un poco agresivo."
          moon: "Acostumbran a vivir con los humanos desde la\nantigüedad. Intuyen si su Entrenador está\ntriste, en cuyo caso no se despegan de su lado."
        ko:
          sun: "잘 따르기 때문에 초보자에게\n추천하는 포켓몬으로 불리지만\n크면 기질이 거칠어진다."
          moon: "옛날부터 사람과 살아왔다.\n트레이너가 슬퍼하면\n그것을 헤아리고 곁을 떠나지 않는다."
        zh_simp:
          sun: "非常容易亲近，因此据说是\n适合推荐给新手训练家的宝可梦。\n可一旦成长，脾气就会变粗暴。"
          moon: "从一开始就一直和人类生活。\n当训练家悲伤的时候，\n它会察觉到，不会离开对方的身边。"
        zh_trad:
          sun: "非常容易親近，據說是適合\n推薦給新手訓練家的寶可夢。\n可是一旦成長，脾氣就會變得粗暴。"
          moon: "從過去開始就一直和人類生活。\n當訓練家感到悲傷的時候，\n牠會察覺到，並不會離開對方身邊。"
