      descriptions:
        jp_kana:
          sun: "あしに　まとわりついた　ドロが\nグリップに　なり　ちからづよい\nはしりを　じつげん　しているのだ。"
          moon: "がんこで　マイペースな　せいかく。\nつちを　はんで　どろを　つくって\nどろあそび　するのが　にっか。"
        jp_kanji:
          sun: "足に　まとわりついた　泥が\nグリップに　なり　力強い\n走りを　実現しているのだ。"
          moon: "頑固で　マイペースな　性格。\n土を　食んで　泥を　つくって\n泥遊び　するのが　日課。"
        en:
          sun: "The mud stuck to Mudbray’s hooves enhances\nits grip and its powerful running gait."
          moon: "It has a stubborn, individualistic disposition.\nEating dirt, making mud, and playing in the mire\nall form part of its daily routine."
        fr:
          sun: "La boue qui lui colle aux pattes lui sert de\nsemelle antidérapante. Il peut ainsi courir\nà toute allure avec vigueur et assurance."
          moon: "Un Pokémon très têtu, qui aime faire les choses\nà son rythme. Il passe ses journées à mâcher de\nla terre pour en faire de la boue et jouer avec."
        it:
          sun: "Il fango attaccato alle zampe gli dà un’aderenza\ntale da permettergli di lanciarsi in una potente\ncorsa senza rischio di scivolare."
          moon: "È testardo e fa tutto secondo il suo ritmo.\nPassa le giornate a giocare con il fango che\ncrea mangiando terra."
        de:
          sun: "Der ganze Schlamm an seinen Füßen sorgt für\ndie nötige Bodenhaftung, die es für seinen\nkraftvollen Lauf braucht."
          moon: "Ein stures und eigensinniges Pokémon. Verbringt\ndie Tage damit, Erde zu fressen und Schlamm\ndaraus zu machen, mit dem es dann spielt."
        es:
          sun: "El lodo que impregna sus patas le otorga una\nfuerte tracción, lo que le permite alcanzar altas\nvelocidades al correr."
          moon: "Pokémon de naturaleza testaruda y amante de\nhacer las cosas a su propio ritmo. Se pasa el\ndía comiendo arena y chapoteando en el lodo."
        ko:
          sun: "다리에 달라붙은 진흙이\n다리를 튼튼히 받들어\n힘차게 달려나갈 수 있다."
          moon: "고집이 세고 제멋대로인 성격이다.\n흙을 삼켜서 진흙을 만들어\n진흙 장난을 하는 것이 일과다."
        zh_simp:
          sun: "牢牢地粘在脚上的泥\n会提高抓地力，\n让它能够矫健的奔跑。"
          moon: "性格顽固，我行我素。\n吃土制作泥巴，\n玩泥巴是每天的功课。"
        zh_trad:
          sun: "牢牢地黏在腳上的泥\n提高了抓地力，\n讓牠能夠盡情地全力奔馳。"
          moon: "性格頑固，並我行我素。\n會吃土製作泥巴，\n玩泥巴是每天的功課。"
mudsdale:
