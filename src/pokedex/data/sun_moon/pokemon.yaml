rufflet:
  species_id: 627
  names:
    jp_kana: ワシボン
    jp_kanji: ワシボン
    en: Rufflet
    fr: Furaiglon
    it: Rufflet
    de: Geronimatz
    es: Rufflet
    ko: 수리둥보
    zh_simp: 毛头小鹰
    zh_trad: 毛頭小鷹
  forms:
    rufflet:
      form_id: 0
      base_stats:
        hp: 70
        attack: 83
        defense: 50
        special_attack: 37
        special_defense: 50
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - sheer_force
      hidden_ability: hustle
      descriptions:
        jp_kana:
          sun: "みさかいなく　たたかいを　いどむ。\nたおれるたびに　きずつくたびに\nつよく　たくましく　そだっていく。"
          moon: "とがったツメを　えものに　つきたて\nついばんでいる。　きのみも　たべるが\nきほんてきに　にくしょくの　ポケモン。"
        jp_kanji:
          sun: "見境なく　勝負を　挑む。\n倒れるたびに　傷つくたびに\n強く　たくましく　育っていく。"
          moon: "尖ったツメを　獲物に　突き立て\nついばんでいる。　木の実も　食べるが\n基本的に　肉食の　ポケモン。"
        en:
          sun: "They pick fights indiscriminately. They grow\nstronger and more powerful each time they\nfaint or are injured."
          moon: "With its sharp claws, this Pokémon pierces its\nprey, and then it pecks at them. Although it also\nconsumes berries, it’s a carnivore at heart."
        fr:
          sun: "Il s’attaque à tout ce qui bouge, sans\ndiscrimination. Ses blessures et échecs\nne font que le rendre plus fort."
          moon: "Il agrippe ses proies avec ses serres effilées\net les picore. Il lui arrive de manger des Baies,\nmais au fond c’est un carnivore."
        it:
          sun: "Si scaglia contro qualsiasi avversario.\nOgni volta che viene ferito o sconfitto,\ndiventa più forte."
          moon: "Infilza le prede con i suoi artigli affilati e le\nattacca a beccate. È principalmente carnivoro,\nma può mangiare anche le bacche."
        de:
          sun: "Es zettelt willkürlich Kämpfe an, egal wie\nstark der Gegner auch ist. Es gewinnt mit\njeder Niederlage und Blessur an Stärke."
          moon: "Mit seinen scharfen Fängen packt es seine\nBeute und pickt danach. Generell ist es ein\nFleischfresser, es isst aber auch Beeren."
        es:
          sun: "Desafía indiscriminadamente a cualquier rival.\nCada vez que le hieren en combate o se debilita\nno hace sino aumentar su fortaleza."
          moon: "Es un Pokémon carnívoro, aunque no les hace\nascos a las bayas. Clava con ahínco sus garras\nafiladas en la presa para picotearla sin cesar."
        ko:
          sun: "무작정 싸움을 건다.\n쓰러질 때마다 다칠 때마다\n강하고 늠름하게 성장해간다."
          moon: "뾰족한 발톱을 사냥감에게 꽂고\n쪼아 먹는다. 나무열매도 먹지만\n기본적으로 육식 포켓몬이다."
        zh_simp:
          sun: "会不由分说挑起战斗。\n随着每次被打倒，每次受伤，\n成长得更强更壮。"
          moon: "用尖尖的爪子刺穿猎物\n并进行啄食。也会吃树果，\n但基本上是肉食类宝可梦。"
        zh_trad:
          sun: "會不由分說挑起戰鬥。\n隨著每次被打倒，每次受傷，\n會成長得更強更壯。"
          moon: "用尖尖的爪子刺穿獵物\n後啄食。雖然也會吃樹果，\n但基本上是肉食性寶可夢。"
braviary:
  species_id: 628
  names:
    jp_kana: ウォーグル
    jp_kanji: ウォーグル
    en: Braviary
    fr: Gueriaigle
    it: Braviary
    de: Washakwil
    es: Braviary
    ko: 워글
    zh_simp: 勇士雄鹰
    zh_trad: 勇士雄鷹
  forms:
    braviary:
      form_id: 0
      base_stats:
        hp: 100
        attack: 123
        defense: 75
        special_attack: 57
        special_defense: 75
        speed: 80
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - sheer_force
      hidden_ability: defiant
      descriptions:
        jp_kana:
          sun: "しさえ　おそれぬ　ゆうかんな　きしつ。\nたいこの　アローラの　ひとびとは\nそらのゆうしゃと　よび　そんけいした。"
          moon: "すみかを　ひとが　おびやかした\nかこが　あり　ウォーグルたちは\nいちがんに　なって　あらがったという。"
        jp_kanji:
          sun: "死さえ　恐れぬ　勇敢な　気質。\n太古の　アローラの　人々は\n空の勇者と　呼び　尊敬した。"
          moon: "棲みかを　人が　おびやかした\n過去が　あり　ウォーグルたちは\n一丸になって　抗ったという。"
        en:
          sun: "With its brave disposition, it fears nothing—not\neven death. Ancient Alolan people respected\nit, referring to it as “the hero of the sky.”"
          moon: "It’s thought that people disturbed their habitats\nin the past, so Braviary banded together to\nfight back."
        fr:
          sun: "Rien n’effraie cet intrépide Pokémon, pas même\nla mort. Jadis, les gens d’Alola le surnommaient\n« le preux chevalier du ciel » avec respect."
          moon: "Jadis, l’Homme a menacé son habitat. Tous les\nGueriaigle se sont alors rassemblés et ont fait\nfront commun pour repousser la menace."
        it:
          sun: "Pokémon intrepido che non teme nemmeno\nla morte. Venerato nell’antica Alola, era noto\ncome “l’eroe del cielo”."
          moon: "Il loro habitat era un tempo minacciato\ndagli uomini, ma i Braviary lottarono uniti\nper difenderlo."
        de:
          sun: "Dieses tapfere Pokémon fürchtet nicht einmal\nden Tod. Die Bewohner von Alola nannten es in\ngrauer Vorzeit ehrfürchtig „Krieger der Lüfte“."
          moon: "Als die Menschen einst ihren Lebensraum\nbedrohten, schlossen sich alle Washakwil\nzusammen und bekämpften sie."
        es:
          sun: "Por su talante aguerrido, no titubea a la hora de\njugarse el pellejo. Los antiguos habitantes de\nAlola lo veneraban como el Héroe del Cielo."
          moon: "Cuando los seres humanos amenazaban su\nhábitat en el pasado, los Braviary se agrupaban\npara oponer resistencia."
        ko:
          sun: "죽음조차 두려워하지 않는 용감한 기질이다.\n먼 옛날에 알로라 사람들은\n하늘의 용자라고 부르며 존경했다."
          moon: "사는 곳을 사람에게 위협받은\n과거가 있어 워글들은\n한마음이 되어 저항했다고 한다."
        zh_simp:
          sun: "连死都毫不畏惧的勇敢性格。\n太古时代，阿罗拉的人们称之为\n天空的勇士，并尊敬着它。"
          moon: "据说，人类过去曾经\n威胁过它们的栖息地，\n勇士雄鹰们团结一致进行了抵抗。"
        zh_trad:
          sun: "連死都毫不畏懼的勇敢性格。\n太古時代，阿羅拉的人們稱之為\n天空的勇士，並尊敬著牠。"
          moon: "據說過去棲息地曾經\n遭受人類的威脅，\n而勇士雄鷹們團結一致進行了抵抗。"
