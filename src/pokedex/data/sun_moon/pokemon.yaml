      descriptions:
        jp_kana:
          sun: "みじゅくな　ハネは　とぶことよりも\nこすって　ちょうおんぱを　はっせいさせ\nてきを　こうげきするのに　つかう。"
          moon: "ハネを　せいちょう　させるために\nまいにち　たいりょうの　えものを\nしょうかえきで　とかして　すする。"
        jp_kanji:
          sun: "未熟な　ハネは　飛ぶことよりも\n擦って　超音波を　発生させ\n敵を　攻撃するのに　使う。"
          moon: "ハネを　成長　させるために\n毎日　大量の　獲物を\n消化液で　溶かして　すする。"
        en:
          sun: "Rather than using its underdeveloped wings for\nflight, it rubs them together, producing\nultrasonic waves to attack its enemies."
          moon: "To help make its wings grow, it dissolves\nquantities of prey in its digestive juices and\nguzzles them down every day."
        fr:
          sun: "Ses ébauches d’ailes ne lui servent pas tant à\nvoler qu’à produire des ultrasons par frottement\npour neutraliser ses ennemis."
          moon: "Pour aider ses ailes à pousser, il fait un vrai\ncarnage tous les jours, arrosant ses moult\nproies d’acide pour les dissoudre et s’en nourrir."
        it:
          sun: "Le sue ali non sono del tutto sviluppate. Più che\nper volare, le usa per attaccare i nemici con le\nonde ultrasoniche prodotte dalle loro vibrazioni."
          moon: "Per far sviluppare le ali, si nutre ogni giorno\ndi una grande quantità di prede, che succhia\ndopo averle sciolte con il proprio acido."
        de:
          sun: "Vibravas Flügel sind zum Fliegen kaum geeignet.\nEs lässt sie vibrieren, um Ultraschallwellen\nzu erzeugen und so seine Gegner anzugreifen."
          moon: "Um das Wachstum seiner Flügel zu fördern,\nschlürft es täglich große Mengen an Beute,\ndie es zuvor in Säure aufgelöst hat."
        es:
          sun: "Las alas de Vibrava están subdesarrolladas.\nMás que para volar, las utiliza para crear ondas\nultrasónicas con las que ataca a sus enemigos."
          moon: "Para terminar de desarrollar sus alas, se nutre\na diario de un gran número de presas, a las que\ndisuelve con ácido antes de devorarlas."
        ko:
          sun: "미숙한 날개는 나는 것보다는\n비벼서 초음파를 발생시켜\n적을 공격하는 데 사용한다."
          moon: "날개를 성장시키기 위해\n매일 대량의 먹잇감을\n소화액으로 녹여 마신다."
        zh_simp:
          sun: "还不发达的翅膀，\n比起飞行，反而更多地用于\n通过摩擦产生超音波攻击敌人。"
          moon: "为了让翅膀成长，\n每天要吸食大量\n用消化液溶化的猎物。"
        zh_trad:
          sun: "還未發達的翅膀比起用於飛行，\n更常用來摩擦產生超音波，\n從而攻擊敵人。"
          moon: "為了讓翅膀成長，\n每天要用消化液溶化\n並吸食大量的獵物。"
