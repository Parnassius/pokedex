      descriptions:
        jp_kana:
          sun: "あいくるしい　みためだが　おこって\nジタバタする　てあしに　ぶつかると\nプロレスラーでも　ふっとばされる。"
          moon: "なついた　あいてや　なかまいがいに\nさわられると　ものすごい　ちからで\nあばれるので　ひじょうに　キケン。"
        jp_kanji:
          sun: "愛くるしい　見た目だが　怒って\nジタバタする　手足に　ぶつかると\nプロレスラーでも　吹っ飛ばされる。"
          moon: "なついた　相手や　仲間以外に\n触られると　物凄い　力で\n暴れるので　非常に　キケン。"
        en:
          sun: "Despite its adorable appearance, when it gets\nangry and flails about, its arms and legs could\nknock a pro wrestler sprawling."
          moon: "A touch from anyone except a known friend\nsends it into a surging frenzy. It’s an incredibly\ndangerous Pokémon."
        fr:
          sun: "Il est à croquer, sauf lorsqu’il s’énerve et frappe\nà tout va. Dans ce cas, laissez-le tranquille ou\nvous finirez à coup sûr dans le décor."
          moon: "Ne tentez pas de le caresser s’il ne vous connaît\npas assez : il entrerait dans une rage folle,\net vous encourriez un grand danger."
        it:
          sun: "Tenero all’apparenza, quando si arrabbia agita\nbraccia e gambe con una furia tale da atterrare\npersino un lottatore di wrestling."
          moon: "È molto pericoloso perché attacca furiosamente\nchiunque lo tocchi, a meno che non sia un amico\no un suo simile."
        de:
          sun: "Es sieht sehr süß aus, aber wehe, es wird\nwütend. Mit seinen Armen wirbelnd haut es\nselbst den stärksten Wrestler um."
          moon: "Wird es von irgendjemand anderem als seinen\nKameraden angefasst, flippt es aus und schlägt\nmit unglaublicher Kraft wild um sich."
        es:
          sun: "Pese a su aspecto encantador, cuando se enoja,\nsus pataletas son tan feroces que pueden\nderribar hasta a un luchador profesional."
          moon: "Cuando alguien con quien no haya congeniado lo\ntoca, se pone hecho una furia y despliega una\nfuerza tal que lo hace tremendamente peligroso."
        ko:
          sun: "사랑스러운 외모지만 화가 나서\n버둥거리는 손발에 부딪히면\n프로레슬러라도 날아가 버린다."
          moon: "친밀한 사이나 동료 이외의 사람이\n만지면 굉장한 힘으로\n날뛰기 때문에 매우 위험하다."
        zh_simp:
          sun: "外表惹人喜爱，但如果被\n发怒后胡乱挥舞的腿脚碰到，\n即便是职业摔角手也会被击飞。"
          moon: "如果被亲密的对象和伙伴以外的\n接触到，就会用可怕的力量发狂，\n所以很危险。"
        zh_trad:
          sun: "外表惹人喜愛，但如果被牠\n發怒後胡亂揮舞的腿碰到，\n即使是職業摔角手也會被踢到老遠。"
          moon: "除了親密的對象和夥伴以外，\n一旦被接觸到，便會用可怕的\n力量發狂，所以很危險。"
bewear:
  species_id: 760
  names:
    jp_kana: キテルグマ
    jp_kanji: キテルグマ
    en: Bewear
    fr: Chelours
    it: Bewear
    de: Kosturso
    es: Bewear
    ko: 이븐곰
    zh_simp: 穿着熊
    zh_trad: 穿著熊
  forms:
    bewear:
      form_id: 0
      base_stats:
        hp: 120
