      descriptions:
        jp_kana:
          sun: "ほしあかりが　エネルギーと　いわれるが\nふつうに　きのみも　だいこうぶつ。\nひるまは　くさに　くるまって　ねてる。"
          moon: "４つの　うでで　パンチを　くりだし\nたたかう。　１ぱつの　いりょくは\nさほどだが　てかずで　しょうぶする。"
        jp_kanji:
          sun: "星明りが　エネルギーと　いわれるが\n普通に　木の実も　大好物。\n昼間は　草に　包まって　寝てる。"
          moon: "４つの　腕で　パンチを　繰り出し\n戦う。　１発の　威力は\nさほどだが　手数で　勝負する。"
        en:
          sun: "While it’s believed that starlight provides it with\nenergy, this Pokémon also loves to eat berries.\nIn the daytime, it curls up in the grass to sleep."
          moon: "In battle, it throws punches with all four arms.\nThe power of each individual blow is piddly,\nso it aims to win by quantity rather than quality."
        fr:
          sun: "On dit qu’il se nourrit de la lumière des étoiles,\nmais il mange aussi des Baies comme les autres.\nIl dort pendant la journée dans un lit d’herbes."
          moon: "Il se bat en frappant avec ses quatre poings.\nChaque coup ne fait pas très mal mais assénées\nen rafale, ses attaques sont dévastatrices."
        it:
          sun: "Si dice che tragga energia dalla luce delle stelle,\nma è anche molto ghiotto di bacche.\nDi giorno dorme avvolto nell’erba."
          moon: "Lotta sferrando pugni con le sue quattro\nbraccia e sopperisce alla poca potenza dei\nsingoli pugni con temibili scariche."
        de:
          sun: "Es heißt, es ziehe seine Energie aus dem Licht\nder Sterne, aber es frisst trotzdem mit Wonne\nBeeren. Tagsüber schläft es im Gras."
          moon: "Es kämpft, indem es mit seinen vier Armen\nSchläge verteilt. Da diese jedoch kaum Wucht\nhaben, setzt es alles auf lange Schlagserien."
        es:
          sun: "Usa la luz de las estrellas como fuente de\nenergía, pero también adora las bayas. Durante\nel día, duerme envuelto en una manta de hierba."
          moon: "Combate asestando puñetazos con sus cuatro\nbrazos. Sus golpes no son muy poderosos, pero\nresultan muy efectivos cuando ataca en ráfaga."
        ko:
          sun: "별빛이 에너지라고 전해지지만\n평범하게 나무열매도 매우 좋아한다.\n낮에는 풀을 뒤집어쓰고 잔다."
          moon: "4개의 팔로 펀치를 날리며\n싸운다. 1발의 위력은\n별로지만 횟수로 승부한다."
        zh_simp:
          sun: "据说星光是它的能量，\n但平时也非常喜爱吃树果。\n白天就用草包裹着睡觉。"
          moon: "用４条手臂挥拳战斗。\n一拳的威力并不怎么样，\n但依靠出拳数取胜。"
        zh_trad:
          sun: "據說星光是牠的能量，\n但一般來說樹果也是牠喜愛的食物。\n白天會把身體包在草堆裡睡覺。"
          moon: "用４隻手臂揮拳戰鬥。\n一拳的威力並不怎麼樣，\n但依靠出拳數取勝。"
