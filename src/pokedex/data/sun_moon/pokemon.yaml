      descriptions:
        jp_kana:
          sun: "ちからは　よわく　たよりないのに\nはんしょくりょくだけ　ものすごい。\nあきるほど　みかけるぞ。"
          moon: "むやみに　はねて　すぐ　おそわれるが\nコイキングの　おかげで　おおくの\nポケモンが　いきのびられると　いう。"
        jp_kanji:
          sun: "力は　弱く　頼りないのに\n繁殖力だけ　物凄い。\n飽きるほど　みかけるぞ。"
          moon: "無闇に　跳ねて　すぐ　襲われるが\nコイキングの　おかげで　多くの\nポケモンが　生き延びられると　いう。"
        en:
          sun: "Although weak and helpless, this Pokémon is\nincredibly fertile. They exist in such multitudes,\nyou’ll soon grow tired of seeing them."
          moon: "Its reckless leaps make it easy pickings for\npredators. On the bright side, many Pokémon\nenjoy longer life spans, thanks to Magikarp."
        fr:
          sun: "Ce Pokémon est faible et ne sait pas faire\ngrand-chose à part se multiplier à toute allure.\nOn en trouve à ne plus savoir qu’en faire."
          moon: "Il bondit hors de l’eau sans faire attention et se\nfait attraper par toutes sortes de Pokémon.\nBeaucoup d’espèces dépendent de cette manne."
        it:
          sun: "È debole e indifeso, ma è particolarmente\nprolifico. Se ne vedono talmente tanti in giro\nche vengono a noia."
          moon: "Non fa che sguazzare senza cautela. Questa\nabitudine lo rende una facile preda e garantisce\nla sopravvivenza di molti altri Pokémon."
        de:
          sun: "Es ist schwach und unzuverlässig, aber es\nvermehrt sich unglaublich schnell. Deshalb\ntrifft man es auch öfter an, als einem lieb ist."
          moon: "Da es immer nur leichtsinnig herumplatscht,\nist es leichte Beute für hungrige Pokémon.\nFür viele ist es daher ein Lebensretter."
        es:
          sun: "Es muy débil y de poca utilidad, aunque su\ncapacidad reproductora resulta abrumadora.\nLo normal es encontrar Magikarp por doquier."
          moon: "Como lo único que hace es chapotear en el\nagua, resulta una presa fácil. Gracias a esto,\nmuchos otros Pokémon pueden sobrevivir."
        ko:
          sun: "힘은 약하고 믿음직스럽지 못하지만\n번식력만은 엄청나다.\n질릴 정도로 눈에 띈다."
          moon: "무턱대고 튀어 올라서 바로 공격당하지만\n잉어킹 덕분에 많은 포켓몬이\n살아남을 수 있다고 한다."
        zh_simp:
          sun: "力量很弱，派不上用场，\n但就只有繁殖力惊人。\n多得简直要看腻了。"
          moon: "因为胡乱跃起，马上就被袭击了，\n但据说多亏了鲤鱼王，\n大多数宝可梦都能活得更久。"
        zh_trad:
          sun: "力量很弱，派不上用場，\n只有繁殖力異常驚人。\n多得簡直要看膩了。"
          moon: "因為胡亂躍起，總是馬上就被襲擊。\n但據說多虧了鯉魚王，\n大多數寶可夢都能活得更久。"
