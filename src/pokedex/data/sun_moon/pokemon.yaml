      descriptions:
        jp_kana:
          sun: "２ほんのヒゲは　びんかんなレーダー。\nどろで　にごった　みずの　なかでも\nえものの　いちを　さっちするぞ。"
          moon: "ヌメる　からだは　つかみにくい。\nすでで　つかまえる　かずを\nきそう　おまつりが　あるほど。"
        jp_kanji:
          sun: "２本のヒゲは　敏感なレーダー。\n泥で　濁った　水の　中でも\n獲物の　位置を　察知するぞ。"
          moon: "ヌメる　身体は　掴みにくい。\n素手で　捕まえる　数を\n競う　お祭りが　あるほど。"
        en:
          sun: "Its two whiskers provide a sensitive radar.\nEven in muddy waters, it can detect its\nprey’s location."
          moon: "Its slippery body is hard to grasp, so much so\nthat there are festivals where people compete\nto see how many they can catch barehanded."
        fr:
          sun: "Il se sert de ses barbillons comme d’un radar\nultra-sophistiqué. Ils lui permettent de détecter\nses proies même dans l’eau boueuse."
          moon: "Son corps tout visqueux le rend impossible à\nattraper. Il existe des concours d’adresse dont\nle but est d’attraper des Barloche à mains nues."
        it:
          sun: "I suoi baffi sono un radar sensibilissimo, in grado\ndi individuare la preda persino nelle acque\npiù torbide."
          moon: "Il suo corpo viscido è così difficile da afferrare\nche nelle feste popolari si fa a gara a chi riesce\na prenderne di più a mani nude."
        de:
          sun: "Seine zwei Barthaare dienen als empfindliches\nRadarsystem. Selbst in schlammigem Wasser\nkennt es so die Position seiner Beute."
          moon: "Sein schleimiger Körper ist schwer zu greifen.\nAuf Volksfesten wetteifert man gar, wer mit\nbloßen Händen die meisten fangen kann."
        es:
          sun: "Sus bigotes son muy sensibles y le sirven de\nradar. Puede detectar la posición de su presa\nincluso en el agua turbia de los lodazales."
          moon: "Su cuerpo es tan escurridizo que incluso hay\ncompeticiones para ver cuántas veces puede\nser agarrado con las manos desnudas."
        ko:
          sun: "2개의 수염은 민감한 레이더이다.\n진흙으로 탁해진 물속에서도\n먹이의 위치를 감지한다."
          moon: "미끄러운 몸은 잡기 힘들다.\n맨손으로 잡은 수를\n겨루는 축제가 있을 정도다."
        zh_simp:
          sun: "２根胡子是灵敏的雷达。\n即使在泥泞浑浊的水中，\n也能侦查到猎物的位置。"
          moon: "滑溜溜的身体很难抓牢。\n甚至因此诞生了比试\n徒手捕捉量的节日。"
        zh_trad:
          sun: "２根鬍子是靈敏的雷達。\n即使在因為泥濘而渾濁的水中，\n也能偵查到獵物的位置。"
          moon: "滑溜溜的身體很難抓住。\n有的祭典甚至會舉辦\n看能徒手捉住多少隻的比賽。"
whiscash:
  species_id: 340
  names:
    jp_kana: ナマズン
