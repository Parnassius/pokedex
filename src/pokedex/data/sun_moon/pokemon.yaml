    de: Metagross
    es: Metagross
    ko: 메타그로스
    zh_simp: 巨金怪
    zh_trad: 巨金怪
  forms:
    metagross:
      form_id: 0
      base_stats:
        hp: 80
        attack: 135
        defense: 130
        special_attack: 95
        special_defense: 90
        speed: 70
      evs_yield:
        hp: 0
