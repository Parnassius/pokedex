          moon: "たまに　はっぱを　トリミングすると\nまるまるとした　りっぱな　すがたに\nそだって　いくのだ。"
        jp_kanji:
          sun: "頭の葉っぱは　めまいが　するほど\n苦いが　疲れた　身体に　効く。\n煎じて　飲めば　もっと　効く。"
          moon: "たまに　葉っぱを　トリミングすると\n丸々とした　立派な　姿に\n育って　いくのだ。"
        en:
          sun: "Although the leaves on its head are bitter\nenough to cause dizziness, they provide relief\nfrom weariness—even more so when boiled."
          moon: "By pruning the leaves on its head with\nregularity, this Pokémon can be grown into a\nfine plump shape."
        fr:
          sun: "Les feuilles sur sa tête sont amères à en\ncracher ses papilles, mais peuvent requinquer\nles corps les plus meurtris, surtout en infusion."
          moon: "Il est recommandé de tailler de temps à autre\nles feuilles de Chlorobule afin qu’il acquière\nune forme parfaitement ronde et harmonieuse."
        it:
          sun: "Le foglie che ha sul capo sono amarissime, ma\nhanno un effetto rinvigorente per il corpo.\nBevute in infusione, sono ancora più efficaci."
          moon: "Le foglie che ha sul capo vanno spuntate di\ntanto in tanto per permettergli di crescere\nflorido e pieno."
        de:
          sun: "Die Blätter auf seinem Kopf sind furchtbar\nbitter, helfen aber bei Erschöpfung. Als Tee\nzubereitet, sind sie noch wirksamer."
          moon: "Wenn man ab und zu seine Blätter schneidet,\nwächst sein Körper rund und prächtig heran."
        es:
          sun: "Las hojas de su cabeza son tan amargas que\ncasi producen náuseas, pero tienen un efecto\nrevitalizante, sobre todo en forma de infusión."
          moon: "Adquiere un aspecto esplendoroso cuando se\nle recortan las hojas de la cabeza con cierta\nasiduidad."
        ko:
          sun: "머리의 잎사귀는 현기증이 날 만큼\n쓰지만 몸이 피곤할 때 효과가 있다.\n달여먹으면 효과가 더 크다."
          moon: "가끔 잎을 손질해주면\n둥글둥글한 훌륭한 모습으로\n자라난다."
        zh_simp:
          sun: "头上的叶子苦得让人头晕眼花，\n但是对疲惫的身体很有效果。\n如果煎服饮用会更有效。"
          moon: "如果时不时修剪叶子，\n就会长成圆鼓鼓很华丽的样子。"
        zh_trad:
          sun: "頭上的葉子味道苦得讓人頭昏，\n但是對疲倦的身體很有效果。\n如果煎服飲用會更有效。"
          moon: "如果偶爾修剪葉子，\n就會長成圓鼓鼓很華麗的樣子。"
lilligant:
