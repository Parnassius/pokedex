      descriptions:
        jp_kana:
          sun: "くらやみから　にんげんを　ねらう。\nつめたい　したに　なめられると\nひにひに　よわり　しに　いたる。"
          moon: "ひかりに　おびえ　やみよを　このむ。\nよなかも　あかるい　とかいでは\nぜつめつの　ききに　あるという。"
        jp_kanji:
          sun: "暗闇から　人間を　狙う。\n冷たい　舌に　舐められると\n日に日に　弱り　死に　至る。"
          moon: "光に　おびえ　闇夜を　好む。\n夜中も　明るい　都会では\n絶滅の　危機に　あるという。"
        en:
          sun: "It strikes at humans from total darkness.\nThose licked by its cold tongue grow weaker\nwith each passing day until they die."
          moon: "It fears the light and revels in the dark. It may\nbe on the verge of extinction in cities that stay\nbrightly lit at night."
        fr:
          sun: "Il assaille les humains depuis les ténèbres.\nUne personne léchée par sa langue glaciale\ns’affaiblit jour après jour jusqu’à décéder."
          moon: "Il a peur de la lumière et se délecte de la nuit\nnoire. Dans les grandes villes où l’éclairage est\nomniprésent, il est en voie d’extinction."
        it:
          sun: "Si nasconde nel buio e tende agguati agli esseri\numani. Chi viene leccato dalla sua lingua gelida\nsi indebolisce lentamente fino allo sfinimento."
          moon: "Ama l’oscurità e rifugge la luce.\nNelle città illuminate anche di notte rischia\ndi scomparire."
        de:
          sun: "Es lauert Menschen im Dunkeln auf und leckt sie\nmit seiner kalten Zunge. Danach werden sie von\nTag zu Tag schwächer, bis sie dahinscheiden."
          moon: "Es ist lichtscheu und bevorzugt die Dunkelheit.\nAufgrund der hellen Lichter der Großstädte ist\nes dort vom Aussterben bedroht."
        es:
          sun: "Surge de la oscuridad para atacar a la gente.\nLas víctimas de sus lametazos se debilitan\npoco a poco hasta que se les escapa la vida."
          moon: "Rehúye la luz y adora las noches oscuras. En\nlas ciudades su presencia es casi inexistente,\npues por la noche todo se ilumina."
        ko:
          sun: "어둠 속에서 인간을 노린다.\n차가운 혀로 핥으면\n날이 갈수록 약해져 죽음에 이른다."
          moon: "빛을 무서워하고 어둠을 좋아한다.\n밤중에도 밝은 도시에서는\n멸종 위기에 처해있다고 전해진다."
        zh_simp:
          sun: "从阴暗处袭击人类。\n如果被其冰冷的舌头舔到，\n就会一天天虚弱至死。"
          moon: "害怕光亮，喜欢黑夜。\n据说在即便深夜都灯火如昼的\n大都市有灭绝的危险。"
        zh_trad:
          sun: "會從陰暗處襲擊人類。\n如果被其冰冷的舌頭舔到，\n就會一天天虛弱至死。"
          moon: "害怕光亮，喜歡黑夜。\n據說在深夜也燈火如晝的\n大都市中有滅絕的危險。"
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
    jp_kanji: ゲンガー
    en: Gengar
    fr: Ectoplasma
    it: Gengar
    de: Gengar
    es: Gengar
    ko: 팬텀
    zh_simp: 耿鬼
    zh_trad: 耿鬼
  forms:
    gengar:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 75
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - cursed_body
      descriptions:
        jp_kana:
          sun: "とつぜん　さむけに　おそわれたら\nゲンガーに　ねらわれた　しょうこ。\nにげるすべは　ないので　あきらめろ。"
          moon: "にんげんの　いのちを　ねらうのは\nゲンガーは　ひとの　なれのはてで\nみちづれを　つくるためらしい。"
        jp_kanji:
          sun: "突然　寒気に　襲われたら\nゲンガーに　狙われた　証拠。\n逃げる術は　ないので　諦めろ。"
          moon: "人間の　命を　狙うのは\nゲンガーは　人の　成れの果てで\n道連れを　つくるためらしい。"
        en:
          sun: "Should you feel yourself attacked by a sudden\nchill, it is evidence of an approaching Gengar.\nThere is no escaping it. Give up."
          moon: "It apparently wishes for a traveling companion.\nSince it was once human itself, it tries to create\none by taking the lives of other humans."
        fr:
          sun: "Si vous frissonnez soudainement, c’est qu’un\nEctoplasma en veut à votre vie. Vous ne pouvez\ny échapper. Abandonnez toute espérance."
          moon: "S’il attente à la vie des humains, c’est parce\nqu’ils deviendront des Ectoplasma après la mort\net qu’il veut les entraîner avec lui."
        it:
          sun: "Se all’improvviso si prova un brivido gelido,\nè Gengar che si avvicina.\nFuggire è impossibile, bisogna rassegnarsi."
          moon: "Si dice che piombi sugli esseri umani per\nimpossessarsi del loro spirito affinché gli faccia\ncompagnia."
        de:
          sun: "Läuft es einem plötzlich eiskalt den Rücken\nhinunter, wurde man von Gengar als nächstes\nOpfer auserkoren. Widerstand ist zwecklos."
          moon: "Gengar raubt Menschen das Leben, um einen\nBegleiter an seiner Seite zu haben, der wie es\nselbst einmal ein Mensch war."
        es:
          sun: "Un descenso repentino de la temperatura es\nseñal de que Gengar está al acecho. Frente a\nesta situación, no hay escapatoria alguna."
          moon: "Parece que el motivo por el que Gengar agrede\na la gente es porque quiere que sus almas\nle hagan compañía."
        ko:
          sun: "갑자기 졸음이 쏟아진다면\n팬텀이 노리고 있다는 증거다.\n도망갈 방법은 없으니 포기하자."
          moon: "인간의 목숨을 노리는 이유는\n팬텀이 인간의 비참한 말로여서\n길동무를 만들기 위해서라고 한다."
        zh_simp:
          sun: "如果突然被寒气侵袭，\n那就是被耿鬼袭击的证据。\n没有可逃之法，所以死心吧。"
          moon: "耿鬼之所以要夺取人类的性命，\n好像因为它是人类最终的下场，\n所以要找个同伴。"
        zh_trad:
          sun: "如果突然被寒氣侵襲，\n那就是被耿鬼盯上的證據。\n沒有逃脫之法，所以死心吧。"
          moon: "據說耿鬼之所以要人類的命，\n是因為牠就是人類的末路，\n想要增加旅伴的緣故。"
    gengar_mega:
      form_id: 1
      names:
        jp_kana: メガゲンガー
        jp_kanji: メガゲンガー
        en: Mega Gengar
        fr: Méga-Ectoplasma
        it: MegaGengar
        de: Mega-Gengar
        es: Mega-Gengar
        ko: 메가팬텀
        zh_simp: 超级耿鬼
        zh_trad: 超級耿鬼
      base_stats:
        hp: 60
        attack: 65
        defense: 80
        special_attack: 170
        special_defense: 95
        speed: 130
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          sun: "ゲンガーの　きずなは　いびつ。\nゲンガーが　えものとして　ねらう\nあいてとしか　めばえないとも。"
          moon: "メガシンカの　エネルギーで　かくせい。\nいじげんに　もぐって　こうげきの\nチャンスを　じっと　うかがっている。"
        jp_kanji:
          sun: "ゲンガーの　絆は　いびつ。\nゲンガーが　獲物として　狙う\n相手としか　芽生えないとも。"
          moon: "メガシンカの　エネルギーで　覚醒。\n異次元に　潜って　攻撃の\nチャンスを　じっと　伺っている。"
        en:
          sun: "Gengar’s relationships are warped. It has no\ninterest in opponents unless it perceives them\nas prey."
          moon: "The energy of Mega Evolution awakened it.\nIt sinks into another dimension, where it keeps\na patient watch for its chance to attack."
        fr:
          sun: "Certains disent que le lien invisible qui relie\nEctoplasma à un être vivant ne se crée qu’avec\ncelui qu’il a choisi comme proie."
          moon: "L’énergie de la Méga-Évolution l’a éveillé.\nIl se tapit dans une autre dimension en guettant\nune occasion de passer à l’attaque."
        it:
          sun: "Si dice che i Gengar riescano a instaurare un\nrapporto normale solo con coloro che hanno\ndesignato come loro prede."
          moon: "Si è risvegliato grazie alla megaevoluzione.\nSi nasconde in una dimensione parallela\naspettando il momento giusto per attaccare."
        de:
          sun: "Seine Auffassung von Freundschaft ist seltsam:\nSein Vertrauen gewinnt man nur, wenn man als\nBeute auf dem Speiseplan steht."
          moon: "Die Energie der Mega-Entwicklung hat es\nerweckt. Es taucht in eine andere Dimension ab\nund wartet dort auf eine Angriffsgelegenheit."
        es:
          sun: "Según se dice, Gengar solo es capaz de\nestablecer vínculos con las presas que acecha."
          moon: "La energía de la megaevolución le ha hecho\ndespertar. Se esconde en otra dimensión, a la\nespera de una buena oportunidad para atacar."
        ko:
          sun: "팬텀의 유대감은 비뚤어졌다.\n팬텀이 먹이로 노리는\n상대하고만 싹튼다고 한다."
          moon: "메가진화 에너지로 각성.\n다른 차원에 들어가 공격할\n기회를 가만히 살피고 있다."
        zh_simp:
          sun: "耿鬼的牵绊是扭曲的。\n听说耿鬼只会对被它当成\n猎物的对象萌生兴趣。"
          moon: "因为超级进化的能量而觉醒。\n潜伏在异次元，\n一直静静地等待着攻击的机会。"
        zh_trad:
          sun: "耿鬼的愛是扭曲的。\n聽說耿鬼只會對自己當成\n狩獵目標的對手萌生愛意。"
          moon: "因超級進化的能量而覺醒。\n潛伏在異次元，\n一直靜靜地等待著攻擊的機會。"
