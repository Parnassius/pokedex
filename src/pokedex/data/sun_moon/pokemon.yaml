cottonee:
  species_id: 546
  names:
    jp_kana: モンメン
    jp_kanji: モンメン
    en: Cottonee
    fr: Doudouvet
    it: Cottonee
    de: Waumboll
    es: Cottonee
    ko: 소미안
    zh_simp: 木棉球
    zh_trad: 木棉球
  forms:
    cottonee:
      form_id: 0
      base_stats:
        hp: 40
        attack: 27
        defense: 60
        special_attack: 37
        special_defense: 50
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
        - fairy
      egg_groups:
        - grass
        - fairy
      abilities:
        - prankster
        - infiltrator
      hidden_ability: chlorophyll
      held_items:
        rare: absorb_bulb
      descriptions:
        jp_kana:
          sun: "なかまを　みつけると　くっつく。\nあまりに　たくさん　くっつきすぎて\nにゅうどうぐも　みたいになることも。"
          moon: "モンメンの　はく　わたを　つかった\nまくらや　ふとんは　かるくて\nつうきの　よい　こうきゅうひんだ。"
        jp_kanji:
          sun: "仲間を　みつけると　くっつく。\nあまりに　たくさん　くっつきすぎて\n入道雲　みたいになることも。"
          moon: "モンメンの　吐く　綿を　使った\n枕や　布団は　軽くて\n通気の　良い　高級品だ。"
        en:
          sun: "When it finds others of its kind, they all stick\ntogether. When enough of them have collected,\nthe mass resembles a cumulonimbus cloud."
          moon: "Pillows and beds stuffed with cotton exhaled\nby Cottonee are soft and puffy, light and airy—\naltogether top quality."
        fr:
          sun: "Les Doudouvet se collent entre eux quand ils\nse rencontrent. Lorsqu’ils sont assez nombreux,\nils forment de véritables cumulonimbus vivants."
          moon: "Le coton qu’il produit est utilisé dans la\nconfection d’oreillers et de couettes de haute\nqualité, qui allient légèreté et fraîcheur."
        it:
          sun: "Quando si incontrano, i Cottonee si attaccano\nl’uno all’altro. Se sono in tanti, possono formare\nammassi simili a immense nuvole."
          moon: "Il cotone prodotto da Cottonee viene usato\nper cuscini e materassi leggeri, traspiranti\ne di ottima qualità."
        de:
          sun: "Begegnen sie Freunden, hängen sie eng\naufeinander. Wenn sich zu viele versammeln,\nsehen sie aus wie eine Gewitterwolke."
          moon: "Kissen und Bettdecken, die mit Watte von\nWaumboll gefüllt sind, gelten als Artikel von\nhoher Qualität, da sie leicht und luftig sind."
        es:
          sun: "Cuando se encuentran con amigos, se agrupan.\nSi son muchos, a veces pueden llegar a adquirir\nun aspecto semejante al de un cúmulo de nubes."
          moon: "Los colchones o almohadas rellenos del algodón\nque suelta Cottonee son un producto de alta\ncalidad por su ligereza y transpirabilidad."
        ko:
          sun: "동료를 발견하면 붙는다.\n너무 많이 붙어서\n적란운처럼 되는 일도 있다."
          moon: "소미안이 뱉는 솜을 사용한\n베개와 이불은 가볍고\n통기성이 좋은 고급품이다."
        zh_simp:
          sun: "找到伙伴后就会贴上去。\n贴得太多的话，\n有时候看上去就像积雨云。"
          moon: "使用木棉球吐出的棉花\n制作而成的枕头和被褥\n是又轻又透气的高级商品。"
        zh_trad:
          sun: "找到夥伴後就會黏過去。\n黏得太多的話，\n有時候看上去就像積雨雲。"
          moon: "使用木棉球吐出的棉花\n製作而成的枕頭和被褥\n是又輕又透氣的高級商品。"
whimsicott:
  species_id: 547
  names:
    jp_kana: エルフーン
    jp_kanji: エルフーン
    en: Whimsicott
    fr: Farfaduvet
    it: Whimsicott
    de: Elfun
    es: Whimsicott
    ko: 엘풍
    zh_simp: 风妖精
    zh_trad: 風妖精
