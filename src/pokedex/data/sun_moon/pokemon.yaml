        jp_kana:
          sun: "３つのユニットから　じりょくを　だす。\nよぞらを　とぶ　ジバコイルを　ＵＦＯと\nまちがえる　ほうこくが　たはつ。"
          moon: "かいでんぱを　はっしん　しながら\nそらを　とびまわり　みちの　でんぱを\nじゅしん　していると　いう。"
        jp_kanji:
          sun: "３つの　ユニットから　磁力を　だす。\n夜空を　飛ぶ　ジバコイルを　ＵＦＯと\n間違える　報告が　多発。"
          moon: "怪電波を　発信　しながら\n空を　飛び回り　未知の　電波を\n受信　していると　いう。"
        en:
          sun: "Three units generate magnetism. There have\nbeen many mistaken reports of UFO sightings\nwhen Magnezone flies through the night sky."
          moon: "As it zooms through the sky, this Pokémon\nseems to be receiving signals of unknown origin,\nwhile transmitting signals of unknown purpose."
        fr:
          sun: "Ses trois unités émettent une force magnétique.\nIl n’est pas rare que les gens le confondent avec\nun OVNI quand il vole dans le ciel."
          moon: "Il vole dans le ciel en émettant et en recevant\ndes ondes bien mystérieuses."
        it:
          sun: "Le sue tre unità generano magnetismo.\nQuando vola nel cielo notturno, viene spesso\nscambiato per un UFO."
          moon: "Fluttua in aria trasmettendo e ricevendo\nmisteriose onde elettromagnetiche."
        de:
          sun: "Seine drei Bestandteile erzeugen ein Magnetfeld.\nEs kommt oft vor, dass am Himmel fliegende\nMagnezone für Ufos gehalten werden."
          moon: "Es heißt, dass es beim Herumfliegen mysteriöse\nFunkwellen aussende und unbekannte empfange."
        es:
          sun: "Sus tres unidades generan un campo magnético.\nAl ser avistados volando por la noche, muchos\nlos han tomado por ovnis."
          moon: "Se dice que mientras vuela emite unas ondas\neléctricas misteriosas, a la vez que recibe otras\nondas desconocidas."
        ko:
          sun: "3개의 유닛으로부터 자력을 발산한다.\n밤하늘을 나는 자포코일을 UFO로\n착각하는 보고가 많이 발생한다."
          moon: "괴전파를 발신하면서\n하늘을 날아 미지의 전파를\n수신하고 있다고 한다."
        zh_simp:
          sun: "从３个组件中放出磁力。\n经常有把飞向夜空的自爆磁怪\n错看成ＵＦＯ的报告。"
          moon: "据说会一边在空中来回飞行，\n一边发送怪异电波\n和接收未知电波。"
        zh_trad:
          sun: "從３個組件中放出磁力。\n經常出現把飛上夜空的自爆磁怪\n錯看成ＵＦＯ的報告。"
          moon: "據說會一邊發送怪異電波\n一邊在空中四處飛行，\n接收未知的電波。"
