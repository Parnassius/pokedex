      descriptions:
        jp_kana:
          sun: "じぶんの　いしとは　かんけいなく\nときおり　ねんりきが　でてきて\nあたまが　いたくて　ないている。"
          moon: "いつも　ずつうで　なやんでいる。\nいたみが　ひどいときほど\nきょうりょくな　ねんりきを　はなつ。"
        jp_kanji:
          sun: "自分の　意思とは　関係なく\n時折　念力が　でてきて\n頭が　痛くて　鳴いている。"
          moon: "いつも　頭痛で　悩んでいる。\n痛みが　ひどいときほど\n強力な　念力を　放つ。"
        en:
          sun: "As a result of headaches so fierce they cause it\nto cry, it sometimes uses psychokinesis without\nmeaning to."
          moon: "This Pokémon is troubled by constant\nheadaches. The more pain it’s in, the more\npowerful its psychokinesis becomes."
        fr:
          sun: "Il arrive que des ondes psychiques fusent de\nson cerveau sans qu’il n’y soit pour rien, ce qui\nlui donne mal à la tête au point de gémir."
          moon: "Il souffre d’une migraine permanente. Plus sa\ndouleur augmente, plus il émet des ondes\npsychiques intenses."
        it:
          sun: "A volte i suoi poteri psicocinetici si attivano\nin modo indipendente dalla sua volontà e gli\ncausano mal di testa così forti da farlo gemere."
          moon: "È costantemente tormentato dal mal di testa.\nPiù si acuiscono, maggiore è la sua capacità\ndi usare poteri psicocinetici."
        de:
          sun: "Es weint oft, da es immer unter Kopfschmerzen\nleidet und seine Psycho-Kräfte von Zeit zu Zeit\ngegen seinen Willen ausgelöst werden."
          moon: "Es wird permanent von Kopfschmerzen geplagt.\nJe größer diese Schmerzen sind, desto stärker\nwerden seine Psycho-Kräfte."
        es:
          sun: "En ocasiones utiliza sus poderes psíquicos\nsin querer, lo que le provoca fuertes dolores\nde cabeza que le hacen chillar."
          moon: "Siempre padece dolores de cabeza. Cuando\nestos llegan a niveles insoportables, desata\nun poder psíquico extraordinario."
        ko:
          sun: "가끔 자신의 의지와 상관없이\n염동력이 나와버린다.\n그 때문에 머리가 아파서 울곤 한다."
          moon: "언제나 두통에 시달리고 있다.\n고통이 심할 때 일수록\n강력한 염동력을 발산한다."
        zh_simp:
          sun: "不受自己控制，\n时不时地会产生念力，\n导致头痛流泪。"
          moon: "一直因头痛而烦恼着。\n痛得越厉害，\n放出的念力越强。"
        zh_trad:
          sun: "身體無意識地\n不時產生念力，\n讓牠因為頭痛而哭泣。"
          moon: "一直因頭痛而煩惱著。\n痛得越厲害，\n放出的念力越強。"
golduck:
