      held_items:
        rare: shed_shell
      descriptions:
        jp_kana:
          sun: "エサと　なかまの　くべつが　あいまい。\nなかよくなっても　へいきで　とかして\nくらおうと　してくることが　ある。"
          moon: "はが　ないので　なんでも　とかす\nねんえきを　えものに　かけて\nとかしてから　すすって　くらう。"
        jp_kanji:
          sun: "餌と　仲間の　区別が　曖昧。\n仲良くなっても　平気で　溶かして\n喰らおうと　してくることが　ある。"
          moon: "歯が　ないので　なんでも　溶かす\n粘液を　獲物に　かけて\n溶かしてから　すすって　喰らう。"
        en:
          sun: "It has trouble drawing a line between friends\nand food. It will calmly try to melt and eat even\nthose it gets along well with."
          moon: "This Pokémon’s mucous can dissolve anything.\nToothless, it sprays mucous on its prey. Once\nthey’re nicely dissolved, it slurps them up."
        fr:
          sun: "Comme il a du mal à distinguer ses alliés de\nses proies, la faim peut parfois le pousser\nà asperger ses amis de son solvant."
          moon: "Comme il n’a pas de dent, il sécrète un solvant\ndont il asperge ses proies pour les liquéfier et\nles boire en smoothie."
        it:
          sun: "A volte non riesce a distinguere bene le prede\ndagli amici e, se ha fame, può capitare che\ncerchi di sciogliere un alleato per mangiarselo."
          moon: "Rimedia alla mancanza di denti spruzzando un\npotentissimo liquido corrosivo sulle prede per\nscioglierle e berle come un succo."
        de:
          sun: "Die Grenze zwischen Freund und Fressen\nist bei diesem Pokémon fließend.\nAls Freund geschätzt, zu Suppe zersetzt!"
          moon: "Da es keine Zähne hat, sondert es einen alles\nzersetzenden Schleim auf seine Beute ab.\nDanach schlürft es diese genüsslich auf."
        es:
          sun: "Le cuesta distinguir a sus presas de sus\naliados, por eso no es raro que se coma a uno\nde los suyos de vez en cuando sin inmutarse."
          moon: "Al carecer de dientes, segrega una mucosidad\nque disuelve a sus presas para facilitar su\nposterior ingestión."
        ko:
          sun: "먹이와 동료의 구별이 애매하다.\n사이가 좋아져도 아무렇지 않게 녹여서\n먹어버리려고 하는 경우가 있다."
          moon: "이빨이 없어서 무엇이든 녹이는\n점액을 먹이에 뿌려서\n녹인 다음에 마신다."
        zh_simp:
          sun: "食物和伙伴的区别模糊不清。\n即使关系很好，有时候也会\n淡定地将对方溶解吸食。"
          moon: "因为没有牙齿，\n所以会释放可溶解任何物体的粘液，\n将猎物溶化后再吸食。"
        zh_trad:
          sun: "獵物和夥伴的區別模糊不清。\n即使關係親密，有時候也會\n淡定地將對方溶解吸食。"
          moon: "因為沒有牙齒，\n所以會釋放可溶解任何物體的黏液，\n將獵物溶化後再吸食。"
