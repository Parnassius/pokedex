          sun: "１ぴきの　メタグロスと　１ぴきの\nメタングと　２ひきの　ダンバルが\nれんけつ　している　すがた　なのだ。"
          moon: "メガシンカで　のうを　しげきされ\nしょうりの　ためには　しゅだんを\nえらばない　れいこくな　せいかくに。"
        jp_kanji:
          sun: "１匹の　メタグロスと　１匹の\nメタングと　２匹の　ダンバルが\n連結　している　姿　なのだ。"
          moon: "メガシンカで　脳を　刺激され\n勝利の　ためには　手段を\n選ばない　冷酷な　性格に。"
        en:
          sun: "This form results from one Metagross,\none Metang, and two Beldum linking up."
          moon: "Mega Evolution stimulated its brain. It emerged\nas a ruthless Pokémon that will clutch at any\nmeans of ensuring its victories."
        fr:
          sun: "Il s’agit de la fusion d’un Métalosse, d’un Métang\net de deux Terhal."
          moon: "La Méga-Évolution a atteint son cerveau et\nchangé sa personnalité. Il est devenu cruel\net sans pitié au combat."
        it:
          sun: "È formato dall’unione di un Metagross, di un\nMetang e di due Beldum."
          moon: "La megaevoluzione ha influito sul suo cervello\ncambiandone la personalità e adesso persegue\nfreddamente la vittoria con qualsiasi mezzo."
        de:
          sun: "Ein Metagross, ein Metang und zwei Tanhel\nhaben sich zu dieser Gestalt vereint."
          moon: "Durch die Stimulation seines Gehirns bei der\nMega-Entwicklung verlor es jegliches Mitgefühl.\nFür einen Sieg ist ihm jedes Mittel recht."
        es:
          sun: "Este Pokémon es el resultado de la combinación\nentre un Metagross, un Metang y dos Beldum."
          moon: "Cuando megaevoluciona, se vuelve frío y\ndespiadado, y no le importan los medios con tal\nde conseguir la victoria."
        ko:
          sun: "1마리의 메타그로스와 1마리의\n메탕구와 2마리의 메탕이\n연결된 모습이다."
          moon: "메가진화가 뇌를 자극하여\n승리를 위해 수단을\n가리지 않는 냉혹한 성격이 되었다."
        zh_simp:
          sun: "是１只巨金怪、１只金属怪\n和２只铁哑铃组合在一起的样子。"
          moon: "因为超级进化，大脑受到刺激，\n变成了为胜利不择手段的冷酷性格。"
        zh_trad:
          sun: "是１隻巨金怪、１隻金屬怪\n和２隻鐵啞鈴結合在一起的樣子。"
          moon: "超級進化使得大腦受到刺激，\n變成了為勝利而不擇手段的冷酷性格。"
