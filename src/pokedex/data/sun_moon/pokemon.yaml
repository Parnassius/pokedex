chansey:
  species_id: 113
  names:
    jp_kana: ラッキー
    jp_kanji: ラッキー
    en: Chansey
    fr: Leveinard
    it: Chansey
    de: Chaneira
    es: Chansey
    ko: 럭키
    zh_simp: 吉利蛋
    zh_trad: 吉利蛋
  forms:
    chansey:
      form_id: 0
      base_stats:
        hp: 250
        attack: 5
        defense: 5
        special_attack: 35
        special_defense: 105
        speed: 50
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - fairy
      abilities:
        - natural_cure
        - serene_grace
      hidden_ability: healer
      held_items:
        common: lucky_punch
      descriptions:
        jp_kana:
          sun: "ラッキーの　うむ　タマゴは　えいようが\nたっぷり　つまっている。　おおくの\nポケモンが　だいこうぶつだ。"
          moon: "かずが　すくないうえに　にげあしの\nはやい　ポケモンなので\nみつけた　ひとは　うんが　いいぞ。"
        jp_kanji:
          sun: "ラッキーの　産む　タマゴは　栄養が\nたっぷり　つまっている。　多くの\nポケモンが　大好物だ。"
          moon: "数が　少ないうえに　逃げ足の\n速い　ポケモンなので\n見つけた　人は　運が　いいぞ。"
        en:
          sun: "The eggs laid by Chansey are rich in nutrients\nand a favorite food of many Pokémon."
          moon: "Not only are these Pokémon fast runners,\nthey’re also few in number, so anyone who finds\none must be lucky indeed."
        fr:
          sun: "Les œufs pondus par Leveinard sont\nextrêmement nutritifs. C’est la nourriture\nfavorite de beaucoup de Pokémon."
          moon: "C’est un Pokémon assez rare et qui prend la\nfuite très rapidement. Apercevoir ce Pokémon\nest un signe que la chance vous sourit."
        it:
          sun: "Le uova di Chansey sono molto nutrienti\ne molti Pokémon ne vanno ghiotti."
          moon: "Esistono pochi esemplari di questo Pokémon,\nche inoltre è anche velocissimo nella fuga.\nSolo chi ha la fortuna dalla sua riesce a trovarlo!"
        de:
          sun: "Die Eier, die es legt, sind ausgesprochen\nnahrhaft. Sie sind die Leibspeise vieler\nPokémon."
          moon: "Es ist äußerst selten und kann zudem sehr\nschnell davonlaufen. Schafft man es trotzdem,\neins zu fangen, bringt es angeblich Glück."
        es:
          sun: "Los huevos que pone Chansey tienen un valor\nnutritivo altísimo. Muchos Pokémon los\nconsideran un manjar."
          moon: "Es un Pokémon poco común que escapa\nrápidamente, por lo que quienes se topen con\nuno pueden considerarse afortunados."
        ko:
          sun: "럭키가 낳는 알은 영양이\n듬뿍 들어있다. 많은\n포켓몬들이 아주 좋아한다."
          moon: "수가 적은 데다가 도주도\n빠른 포켓몬이라\n발견한 사람은 운이 좋은 것이다."
        zh_simp:
          sun: "吉利蛋生下的蛋饱含丰富的营养。\n是许多宝可梦非常爱吃的东西。"
          moon: "因为是数量稀少\n而且逃跑很快的宝可梦，\n所以能找到它的人运气相当不错。"
        zh_trad:
          sun: "吉利蛋生下的蛋飽含豐富的營養。\n是許多寶可夢非常愛吃的東西。"
          moon: "因為是數量稀少\n而且逃跑很快的寶可夢，\n所以能找到牠的人運氣相當不錯。"
