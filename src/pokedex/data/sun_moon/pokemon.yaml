      descriptions:
        jp_kana:
          sun: "さいぼうを　くみかえ　みた　あいて\nそっくりに　すがたを　へんかさせる。\nさいげんどは　こたいに　よる。"
          moon: "おどろきの　へんしんのうりょくで\nどんなものとも　なかまに　なれる。\nメタモンどうしは　なかが　わるい。"
        jp_kanji:
          sun: "細胞を　組み替え　みた　相手\nそっくりに　姿を　変化させる。\n再現度は　個体に　よる。"
          moon: "驚きの　変身能力で\nどんな者とも　仲間に　なれる。\nメタモン同士は　仲が　悪い。"
        en:
          sun: "It can reorganize its cells to make itself into a\nduplicate of anything it sees. The quality of the\nduplicate depends on the individual."
          moon: "With its astonishing capacity for\nmetamorphosis, it can get along with anything.\nIt does not get along well with its fellow Ditto."
        fr:
          sun: "Il peut modifier sa structure moléculaire pour\nprendre l’apparence de son adversaire. Le degré\nde ressemblance dépend de chaque individu."
          moon: "Grâce à son don de transformation, ce Pokémon\npeut devenir l’ami de tous les êtres vivants, sauf\ndes autres Métamorph, qu’il déteste."
        it:
          sun: "Cambia la sua struttura molecolare per\nassumere le sembianze del nemico. Il grado di\nriuscita varia a seconda del Pokémon."
          moon: "Grazie alle sue incredibili doti metamorfiche,\npuò assumere le sembianze di qualunque essere\nvivente. I Ditto non vanno d’accordo fra di loro."
        de:
          sun: "Es verändert seine Zellstruktur, um die Gestalt\nanderer Lebewesen, die es sieht, anzunehmen.\nWie gut das Ebenbild ist, variiert nach Exemplar."
          moon: "Dank seiner Fähigkeiten als Gestaltwandler\nkann es sich mit allen Lebewesen anfreunden.\nNur mit Artgenossen kommt es nicht zurecht."
        es:
          sun: "Ditto reorganiza la estructura de sus células\npara adoptar la forma de su oponente. La\ncalidad de la copia varía de Ditto a Ditto."
          moon: "Ditto puede hacerse amigo de otros Pokémon\ngracias a su habilidad para transformarse. Sin\nembargo, los Ditto no se llevan bien entre sí."
        ko:
          sun: "세포를 재구성하여 본 상대와\n똑같이 모습을 변화시킨다.\n재현도는 개체에 따라 다르다."
          moon: "놀라운 변신 능력으로\n누구와도 동료가 될 수 있다.\n메타몽끼리는 사이가 나쁘다."
        zh_simp:
          sun: "通过重组细胞让自己样子变得\n和眼前的对手一模一样。\n相似度依个体而有所不同。"
          moon: "因其惊人的变身能力，\n无论与谁都能成为伙伴。\n但是百变怪同类间关系恶劣。"
        zh_trad:
          sun: "利用細胞重組將自己的模樣變成\n和眼前的對手一模一樣。\n相似度會因個體而異。"
          moon: "因其驚人的變身能力，\n無論與誰都能成為夥伴。\n但是百變怪同類之間的關係惡劣。"
