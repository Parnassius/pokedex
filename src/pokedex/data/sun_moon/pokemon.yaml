      form_id: 0
      names:
        jp_kana: りゅうせいのすがた
        jp_kanji: りゅうせいのすがた
        en: Meteor Form
        fr: Forme Météore
        it: Forma Meteora
        de: Meteorform
        es: Forma Meteorito
        ko: 유성의 모습
        zh_simp: 流星的样子
        zh_trad: 流星的樣子
      base_stats:
        hp: 60
        attack: 60
        defense: 100
        special_attack: 60
        special_defense: 100
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
