      descriptions:
        jp_kana:
          sun: "そのミルクは　えいようまんてんで\nこうカロリー。　ゆえに　のみすぎると\nミルタンクみたいな　たいけいに　なる。"
          moon: "ミルクを　とるため　そだてる　ひとが\nほとんどだが　かなり　たくましくて\nタフなので　たたかいにも　むいている。"
        jp_kanji:
          sun: "そのミルクは　栄養満点で\n高カロリー。　ゆえに　飲みすぎると\nミルタンクみたいな　体型に　なる。"
          moon: "ミルクを　採るため　育てる　人が\nほとんどだが　かなり　たくましくて\nタフなので　戦いにも　向いている。"
        en:
          sun: "Its milk is high in calories and packed with\nnutrients. Therefore, if you drink too much of it,\nyou may wind up with a body like Miltank’s."
          moon: "Most people raise it for its milk, but it’s quite\ntough and strong, so it’s also well suited\nfor battle."
        fr:
          sun: "Son lait est aussi nutritif qu’hypercalorique.\nÀ consommer avec modération, sous peine de\nfinir avec une silhouette « Écrémeuh-esque »."
          moon: "Ce Pokémon est surtout élevé pour son lait,\nbien que sa stature imposante en fasse un\nPokémon de combat tout à fait respectable."
        it:
          sun: "Il suo latte è ricco di sostanze nutritive e molto\ncalorico. Se se ne beve troppo, si finisce per\navere quello che si definisce “girovita Miltank”."
          moon: "Viene allevato principalmente per il latte,\nma poiché è piuttosto forte e robusto,\nè efficace anche nelle lotte."
        de:
          sun: "Seine Milch ist kalorienreich und enthält viele\nNährstoffe. Trinkt man zu viel davon, hat man\nallerdings selbst bald eine Figur wie Miltank."
          moon: "Den meisten Menschen dient Miltank in erster\nLinie als Milchlieferant, doch es ist stark genug,\num auch im Kampf eine gute Figur abzugeben."
        es:
          sun: "La leche que produce Miltank tiene muchas\ncalorías y es muy nutritiva. Si bebes demasiada,\ntu cuerpo se empezará a parecer al suyo."
          moon: "La mayoría de la gente cría Miltank por su leche,\npero al ser tan resistente, este Pokémon\ntambién puede usarse para combatir."
        ko:
          sun: "그 우유는 영양 만점에\n고칼로리이다. 고로 너무 많이\n마시면 밀탱크 같은 체형이 된다."
          moon: "우유를 얻기 위해 키우는 사람이\n대부분이지만 상당히 늠름하고\n터프해서 싸움에도 적합하다."
        zh_simp:
          sun: "这款牛奶营养丰富且热量很高。\n所以饮用过量的话\n就会变成大奶罐那样的体型。"
          moon: "人们几乎都是为了采集牛奶而培育它，\n但因为相当强壮和结实，\n也会用来战斗。"
        zh_trad:
          sun: "牠的牛奶營養豐富且熱量很高。\n如果飲用過量的話\n就會變成大奶罐般的體型。"
          moon: "人們幾乎都是為了生產鮮奶而培育牠，\n但因為相當強壯和結實，\n也很適合參加戰鬥。"
