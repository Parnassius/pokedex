      hidden_ability: pressure
      descriptions:
        jp_kana:
          sun: "ひとを　おどろかせるのが　すき。\nかいすいを　のみこんで　ボールの\nように　ふくらみ　はずんで　あそぶ。"
          moon: "のみこんだ　かいすいを　めの　うえの\nはなの　あなから　ふきだし　アピール。\nまいにち　１トンの　ヨワシを　くう。"
        jp_kanji:
          sun: "人を　驚かせるのが　好き。\n海水を　飲み込んで　ボールの\nように　ふくらみ　弾んで　遊ぶ。"
          moon: "飲み込んだ　海水を　目の　上の\n鼻の　穴から　吹きだし　アピール。\n毎日　１トンの　ヨワシを　喰う。"
        en:
          sun: "It loves to startle people. It fills itself up with\nseawater and plays by bouncing around like\na ball."
          moon: "It shows off by spraying jets of seawater from\nthe nostrils above its eyes. It eats a solid ton of\nWishiwashi every day."
        fr:
          sun: "Très joueur, il adore faire des blagues.\nIl engloutit des litres d’eau de mer et enfle\ncomme une baudruche, pour mieux rebondir."
          moon: "Il recrache l’eau avalée par son évent, c’est\nce qui le rend si charmant. Il gobe une tonne\nde Froussardine par jour."
        it:
          sun: "Si diverte a spaventare la gente.\nAma gonfiarsi riempiendosi d’acqua e rimbalzare\nqua e là."
          moon: "Gioca spruzzando l’acqua di mare dalle narici\nsituate sopra gli occhi.\nMangia una tonnellata di Wishiwashi al giorno."
        de:
          sun: "Wailmer liebt es, Menschen zu erschrecken.\nEs trinkt so viel Meerwasser, dass es sich in\neinen Ball verwandeln und herumhüpfen kann."
          moon: "Es prustet Meerwasser aus den über seinen\nAugen liegenden Nasenlöchern hinaus.\nAußerdem frisst es täglich eine Tonne Lusardin."
        es:
          sun: "A este Pokémon le gusta dar sustos a la gente.\nSe divierte tragando mucha agua de mar para\nhincharse como una bola y dar grandes saltos."
          moon: "Wailmer se come una tonelada de Wishiwashi\ncada día. Le gusta llamar la atención expulsando\nchorros de agua marina por su espiráculo."
        ko:
          sun: "사람을 놀라게 하는 것을 좋아한다.\n해수를 삼켜서 공처럼\n몸을 부풀려 튀면서 논다."
          moon: "들이마신 바닷물을 눈 위의\n콧구멍으로 뿜어내어 어필한다.\n매일 1톤의 약어리를 먹는다."
        zh_simp:
          sun: "喜欢吓人。\n喝入海水鼓成球一样，\n弹跳着玩。"
          moon: "把喝入的海水从眼睛上方的\n鼻孔中喷出来吸引他人。\n每天要吃１吨弱丁鱼。"
        zh_trad:
          sun: "很喜歡嚇人。\n會喝海水把肚子撐得\n跟球一樣來玩彈跳遊戲。"
          moon: "把喝入的海水從眼睛上方的\n鼻孔中噴出來吸引他人。\n每天要吃１噸弱丁魚。"
