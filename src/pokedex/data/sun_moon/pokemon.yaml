      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sun: "いそが　おもな　すみか。\nせいそくちの　かんきょうや　エサの\nしつで　いろや　すがたが　ことなる。"
          moon: "さわると　むらさきの　ねんえきが\nてに　つくぞ。　あらっても　あらっても\nなかなか　おちないので　ちゅうい。"
        jp_kanji:
          sun: "磯が　主な　棲みか。\n生息地の　環境や　餌の\n質で　色や　姿が　異なる。"
          moon: "触ると　紫の　粘液が\n手に　つくぞ。　洗っても　洗っても\nなかなか　落ちないので　注意。"
        en:
          sun: "For the most part, it makes its home along\nthe seashore. Its color and form differ according\nto its habitat and the quality of its food."
          moon: "Purple mucus sticks to the hands of anyone\nwho touches it. Take care, as the substance is\ntroublesome to wash off."
        fr:
          sun: "Il vit principalement sur les rivages rocheux.\nSa forme et sa couleur peuvent varier selon\nson environnement et son alimentation."
          moon: "Au toucher, une sécrétion mauve se dépose sur\nles mains. Faites bien attention, car elle ne part\nvraiment pas facilement, même en lavant bien."
        it:
          sun: "Vive principalmente sui litorali rocciosi.\nLa forma e il colore del suo corpo mutano in\nbase all’habitat e al cibo di cui si nutre."
          moon: "Quando lo si tocca, lascia sulle mani un viscoso\nliquido viola difficile da rimuovere anche dopo\nripetuti lavaggi."
        de:
          sun: "Es lebt hauptsächlich in Küstengebieten.\nSeine Form und Farbe ändern sich je nach\nLebensraum und Futter."
          moon: "Fasst man es an, schmiert man sich mit\nlilafarbenem Schleim voll, der nicht abgeht,\negal, wie oft man sich auch die Hände wäscht."
        es:
          sun: "Suele vivir cerca del agua y su forma y color\nvarían en función de factores como su hábitat\no su alimentación."
          moon: "Al tocarlo, segrega un fluido violáceo que\nmancha las manos y que es extremadamente\ndifícil de eliminar aún tras repetidos lavados."
        ko:
          sun: "물가가 주요 서식지다.\n서식지의 환경이나 먹이의\n질에 따라 색과 모습이 다르다."
          moon: "만지면 보라색 점액이\n손에 묻는다. 아무리 씻어도\n좀처럼 떨어지지 않으므로 주의."
        zh_simp:
          sun: "岩岸是它主要的居所。\n根据栖息地的环境和食物的质地，\n颜色和样子会有所不同。"
          moon: "一旦接触，紫色的粘液就\n会粘到手上。即使反复洗\n也不怎么能洗掉，所以要注意。"
        zh_trad:
          sun: "岩岸是牠主要的居所。\n根據棲息地的環境和所吃食物的質地，\n顏色和樣子會有所不同。"
          moon: "如果用手摸牠，紫色的黏液\n就會沾到手上。不管怎麼洗\n都很難洗掉，所以要注意。"
    shellos_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
        it: Mare Est
        de: Östliches Meer
        es: Mar Este
        ko: 동쪽바다
        zh_simp: 东海
        zh_trad: 東海
      base_stats:
        hp: 76
        attack: 48
        defense: 48
        special_attack: 57
        special_defense: 62
        speed: 34
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sun: "かいちゅうの　プランクトンを　くう。\nきれいな　うみに　すむ　カラナクシほど\nあざやかな　たいしょくを　している。"
          moon: "カラナクシの　いろの　ちがいは\nエサに　よるもの。　のうりょくに\nおおきな　へんかは　みられない。"
        jp_kanji:
          sun: "海中の　プランクトンを　喰う。\n綺麗な海に　棲む　カラナクシほど\n鮮やかな　体色を　している。"
          moon: "カラナクシの　色の　違いは\n餌に　よるもの。　能力に\n大きな　変化は　みられない。"
        en:
          sun: "Shellos lives in the sea and feasts on plankton.\nThe lovelier the ocean where Shellos resides,\nthe more vibrant its color becomes."
          moon: "The difference in color from one Shellos to\nanother seems to be a result of their diet. No\nlarge changes can be seen in their capabilities."
        fr:
          sun: "Il mange le plancton marin. Plus les eaux qu’il\nhabite sont pures, plus sa couleur est vive."
          moon: "La couleur des Sancoki dépend de leur\nalimentation. Aucune différence de puissance\nn’a été détectée entre les individus."
        it:
          sun: "Si nutre del plancton presente nel mare.\nPiù sono pulite le acque in cui vive, più i suoi\ncolori sono brillanti."
          moon: "La diversa colorazione negli Shellos è dovuta\nalla loro alimentazione. Non sembra però\nindicare particolari differenze nella loro forza."
        de:
          sun: "Es ernährt sich von Plankton. Je sauberer das\nMeer ist, das es bewohnt, desto kräftiger\nstrahlen die Farben seines Körpers."
          moon: "Die unterschiedlichen Farben dieses Pokémon\nhängen von seinem Futter ab. Dies hat allerdings\nkeinen Einfluss auf seine Fähigkeiten."
        es:
          sun: "Se alimenta de plancton marino. Su cuerpo\npresenta una coloración de extraordinaria\nviveza, acorde a las aguas en las que vive."
          moon: "El tipo de alimentación determina el color de su\ncuerpo, aunque no se observan cambios\nnotables en su fuerza."
        ko:
          sun: "바닷속의 플랑크톤을 먹는다.\n아름다운 바다에 사는 깝질무일수록\n선명한 몸의 색을 띠고 있다."
          moon: "깝질무 색의 차이는\n먹이에 따라 다르다. 능력에\n커다란 변화는 보이지 않는다."
        zh_simp:
          sun: "吃海里的浮游生物。\n越是生活在斑斓大海的无壳海兔，\n越是拥有鲜艳的体色。"
          moon: "无壳海兔的颜色差异\n是由食物决定的。\n但能力上并不会看到很大的差异。"
        zh_trad:
          sun: "專吃海裡的浮游生物。\n越是生活在清淨大海的無殼海兔，\n越是擁有鮮豔的體色。"
          moon: "無殼海兔的顏色差異\n是由食物決定的。\n在能力上並不會出現太大的改變。"
gastrodon:
  species_id: 423
  names:
    jp_kana: トリトドン
    jp_kanji: トリトドン
    en: Gastrodon
    fr: Tritosor
    it: Gastrodon
    de: Gastrodon
    es: Gastrodon
    ko: 트리토돈
    zh_simp: 海兔兽
    zh_trad: 海兔獸
  forms:
    gastrodon_west_sea:
      form_id: 0
      names:
        jp_kana: にしのうみ
        jp_kanji: にしのうみ
        en: West Sea
        fr: Mer Occident
        it: Mare Ovest
        de: Westliches Meer
        es: Mar Oeste
        ko: 서쪽바다
        zh_simp: 西海
        zh_trad: 西海
      base_stats:
        hp: 111
        attack: 83
