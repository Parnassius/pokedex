        jp_kana:
          sun: "２ひきの　ダンバルが　れんけつし\nサイコパワーは　２ばいに。　ただし\nかしこさじたいは　かわっていない。"
          moon: "じりょくを　はなつ　こうぶつが\nこうぶつ。　じそく　１００キロで\nノズパスを　おいつめるぞ。"
        jp_kanji:
          sun: "２匹の　ダンバルが　連結し\nサイコパワーは　２倍に。　ただし\n賢さ自体は　変わっていない。"
          moon: "磁力を　放つ　鉱物が\n好物。　時速　１００キロで\nノズパスを　追いつめるぞ。"
        en:
          sun: "When two Beldum link together, their psychic\npower is doubled. Their intelligence, however,\nremains unchanged."
          moon: "It adores magnetic minerals, so it pursues\nNosepass at speeds exceeding 60 mph."
        fr:
          sun: "Lorsque deux Terhal fusionnent, leurs pouvoirs\npsychiques sont doublés. En revanche, ils ne\ndeviennent pas plus futés."
          moon: "Il raffole des minéraux qui émettent des ondes\nmagnétiques. Il peut s’élancer à la poursuite\nd’un Tarinor à 100 km/h."
        it:
          sun: "Quando due Beldum si fondono per formare un\nMetang, i loro poteri psichici raddoppiano, ma\nl’intelligenza rimane la stessa."
          moon: "È ghiotto di minerali dotati di proprietà\nmagnetiche. Quando dà la caccia ai Nosepass,\npuò raggiungere i 100 km/h."
        de:
          sun: "Zwei Tanhel haben sich vereinigt und so ihre\nPsycho-Kräfte verdoppelt. Ihre Denkfähigkeit\nbleibt dabei aber unverändert."
          moon: "Es liebt Mineralien, die Magnetfelder erzeugen.\nKein Wunder, dass es Nasgnet mit 100 km/h\nhinterherjagt."
        es:
          sun: "Al unirse dos Beldum, sus poderes psíquicos se\nduplican. No obstante, su inteligencia no se ve\nafectada."
          moon: "Le encanta comer minerales con propiedades\nmagnéticas. Puede rastrear a un Nosepass\ndesplazándose a más de 100 km/h."
        ko:
          sun: "2마리의 메탕이 연결되어\n사이코 파워는 두 배가 된다. 단,\n영리함 자체는 변하지 않는다."
          moon: "자력을 발산하는 광물을\n좋아한다. 시속 100km로\n코코파스를 몰아넣는다."
        zh_simp:
          sun: "２只铁哑铃组合起来，\n精神力量也变为２倍。\n但是智商并没有发生改变。"
          moon: "非常喜欢能放出磁力的矿物。\n会以１００公里的时速穷追朝北鼻。"
        zh_trad:
          sun: "２隻鐵啞鈴結合起來，\n精神力量也變為２倍。\n但是智商並沒有發生改變。"
          moon: "非常喜歡能放出磁力的礦物。\n會以１００公里的時速窮追朝北鼻。"
metagross:
