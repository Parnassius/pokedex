          moon: "きかいじかけの　からだは　ただの\nうつわ。　ソウルハートと　よばれる\nじんぞうの　たましいが　ほんたい。"
        jp_kanji:
          sun: "５００年以上前に　造られた\n人造ポケモン。　人の　言葉を\n理解するが　しゃべれない。"
          moon: "機械仕掛けの　身体は　ただの\n器。　ソウルハートと　呼ばれる\n人造の　魂が　本体。"
        en:
          sun: "This artificial Pokémon, constructed more than\n500 years ago, can understand human speech\nbut cannot itself speak."
          moon: "Its mechanized body is merely a vessel. Its true\nself is its Soul-Heart, an artificial soul."
        fr:
          sun: "Ce Pokémon a été créé de toutes pièces il y a\n500 ans. Il comprend ce qu’on lui dit, mais\nil n’est pas doué de parole."
          moon: "Son corps mécanique n’est qu’une enveloppe.\nSa véritable nature est une âme artificielle\nnommée Animacœur."
        it:
          sun: "È un Pokémon artificiale costruito più di 500\nanni fa. Capisce il linguaggio degli esseri umani,\nma non è in grado di parlare."
          moon: "Il suo corpo meccanico è solo un contenitore.\nLa sua vera essenza è un’anima artificiale\nchiamata “Cuoreanima”."
        de:
          sun: "Dieses Pokémon wurde vor über 500 Jahren\nkünstlich erschaffen. Es versteht die Sprache\nder Menschen, ohne sie selbst zu sprechen."
          moon: "Sein mechanischer Körper ist nur ein Gefäß.\nDas eigentliche Pokémon ist eine künstlich\nerschaffene Seele namens „Seelenherz“."
        es:
          sun: "Pokémon artificial creado hace más de 500\naños. Es capaz de entender el lenguaje humano,\npero carece de la facultad del habla."
          moon: "El mecanismo que conforma su cuerpo es\ntan solo un recipiente. Su verdadera esencia\nes un alma artificial llamada Coránima."
        ko:
          sun: "500년 이상 전에 만들어진\n인조포켓몬이다. 사람의 말을\n이해하지만 말은 못 한다."
          moon: "기계장치로 된 몸은 그릇에\n불과하다. 소울하트라고 불리는\n인조 영혼이 본체다."
        zh_simp:
          sun: "５００多年前被制造出的人造宝可梦。\n理解人类的语言但不会说。"
          moon: "机械结构的身体只是一个容器。\n被称为魂心的人造魂魄才是它的本体。"
        zh_trad:
          sun: "５００多年前被製造出的人造寶可夢。\n可理解人類的語言，但本身無法說話。"
          moon: "機械結構的身體只是一個容器。\n被稱為魂心的人造靈魂才是牠的本體。"
