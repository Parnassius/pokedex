      descriptions:
        jp_kana:
          sun: "いきだおれたものの　おんねんが\nこどもが　つくった　すなやまに\nとりつき　たんじょう　したのだ。"
          moon: "くちのなかに　てを　いれたものを\nあやつってしまう。　すなやまの\nからだを　おおきく　させるためだ。"
        jp_kanji:
          sun: "行き倒れた者の　怨念が\n子どもが　つくった　砂山に\n取りつき　誕生　したのだ。"
          moon: "口の中に　手を　入れた者を\n操ってしまう。　砂山の\n身体を　大きく　させるためだ。"
        en:
          sun: "Born from a sand mound playfully built by a\nchild, this Pokémon embodies the grudges of\nthe departed."
          moon: "It takes control of anyone who puts a hand in its\nmouth. And so it adds to the accumulation of\nits sand-mound body."
        fr:
          sun: "Ce Pokémon est né de la rancœur d’un voyageur\nmort dans l’indifférence, laquelle s’est incarnée\ndans un pâté de sable."
          moon: "Ceux qui ont le malheur de mettre la main dans\nsa gueule deviennent ses pantins. Il est prêt à\ntout pour agrandir son corps en forme de dune."
        it:
          sun: "È nato quando della sabbia ammucchiata da un\nbambino è stata animata dallo spirito risentito di\nun viandante morto da solo durante un viaggio."
          moon: "Prende il controllo di chiunque gli metta le mani\nnella bocca, servendosi delle vittime per\naccrescere le dimensioni del proprio corpo."
        de:
          sun: "Der Groll eines verstorbenen Reisenden fuhr in\neinen Sandhügel, den ein Kind gebaut hatte,\nund brachte dieses Pokémon in die Welt."
          moon: "Es kann jeden kontrollieren, der seine Hand\nin sein Maul steckt, und bringt sie dann dazu,\nseinen Körper immer weiter zu vergrößern."
        es:
          sun: "Surgió cuando una persona murió abandonada\nen plena calle y su resentimiento poseyó un\nmontículo de arena apilado por un niño."
          moon: "Controla a todo aquel que ose meterle la mano\nen la boca. Su objetivo es aumentar el tamaño\nde su cuerpo en forma de duna."
        ko:
          sun: "객사한 자의 원통함이\n아이가 만든 모래언덕에\n깃들어 탄생했다."
          moon: "입안에 손을 넣은 자를\n조종한다. 모래언덕의\n몸집을 크게 만들기 위해서다."
        zh_simp:
          sun: "倒毙路边者的怨念\n附在孩子们堆砌的沙丘上，\n诞生而成的。"
          moon: "将手伸入其口中就会被其操纵。\n它这样做是为了让沙丘的身体变大。"
        zh_trad:
          sun: "倒斃路邊者的怨念\n附在孩子們堆砌的沙山上\n誕生而成。"
          moon: "為了讓沙山的身體變大，\n會操縱把手伸進自己嘴巴者。"
