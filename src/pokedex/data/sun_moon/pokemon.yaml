      descriptions:
        jp_kana:
          sun: "さらに　すぐれた　ポケモンを　めざし\nついかした　プログラムに　ふぐあいが\nあったらしく　うごきが　おかしい。"
          moon: "いじげんくうかんでの　かつどうを\nめざし　プログラムを　こうしんしたが\nおかしな　きょどうが　めだつ。"
        jp_kanji:
          sun: "さらに　優れた　ポケモンを　目指し\n追加した　プログラムに　不具合が\nあったらしく　動きが　おかしい。"
          moon: "異次元空間での　活動を\n目指し　プログラムを　更新したが\nおかしな　挙動が　目立つ。"
        en:
          sun: "In order to create a more advanced Pokémon, an\nadditional program was installed, but apparently\nit contained a defect that makes it move oddly."
          moon: "Its program was modified to facilitate\nextra-dimensional activities, but that led to\nnoticeably strange behavior."
        fr:
          sun: "Il a été modifié pour devenir encore plus\nefficace, mais cela a entraîné plusieurs bugs.\nMaintenant, il se conduit très bizarrement."
          moon: "Un nouveau logiciel était censé lui permettre\nde voyager entre les dimensions, mais tout ne\nse passe pas comme prévu et il y a des bugs."
        it:
          sun: "A volte mostra strani comportamenti a causa\ndi un errore nel software aggiuntivo usato\nper migliorare le sue prestazioni."
          moon: "Da quando è stato riprogrammato per lavorare\nin dimensioni sconosciute ha assunto\ncomportamenti visibilmente strani."
        de:
          sun: "Zusätzliche Software wurde installiert, um das\nPokémon zu verbessern. Etwas ging jedoch\nschief und seitdem benimmt es sich seltsam."
          moon: "Eine neue Software sollte es zu\ninterdimensionalen Reisen befähigen,\ndoch seitdem verhält es sich seltsam."
        es:
          sun: "Se le instaló un software para mejorarlo. Sin\nembargo, algo salió mal y a raíz de ello comenzó\na comportarse de manera extraña."
          moon: "La actualización de software que recibió para\nviajar a otras dimensiones ha causado cambios\nextraños y llamativos en su comportamiento."
        ko:
          sun: "더 우월한 포켓몬을 목표로\n추가한 프로그램에 문제가\n있었는지 움직임이 이상하다."
          moon: "다른 차원의 공간에서의 활동을\n목표로 프로그램을 갱신했으나\n괴상한 동작이 눈에 띈다."
        zh_simp:
          sun: "以更优秀的宝可梦为目标，\n好像新追加的程序状况不佳，\n动作很奇怪。"
          moon: "为了在异次元空间行动而\n更新了程序，但是其怪异的\n举动却很惹人注目。"
        zh_trad:
          sun: "以成為更優秀的寶可夢為目標\n所新追加的程式好像狀況不佳，\n使得動作變得很奇怪。"
          moon: "以能夠在異次元空間活動為目標\n更新了程式，但是怪異的動作\n非常惹人注目。"
