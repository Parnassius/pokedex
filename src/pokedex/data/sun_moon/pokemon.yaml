      descriptions:
        jp_kana:
          sun: "アローラの　ニョロボンは　ひらおよぎが\nとくい。　ニョロボンの　マネで\nおよぎを　まなぶ　こどもも　おおい。"
          moon: "たいしぼうりつは　だいたい０％。\nぜんしん　きんにくで　おもいので\nおよぐ　ちからが　はったつした。"
        jp_kanji:
          sun: "アローラの　ニョロボンは　平泳ぎが\n得意。　ニョロボンの　マネで\n泳ぎを　学ぶ　子どもも　多い。"
          moon: "体脂肪率は　大体０％。\n全身が　筋肉で　重いので\n泳ぐ　力が　発達した。"
        en:
          sun: "Poliwrath in the Alola region are strong\nswimmers that use the breaststroke. Many\nchildren learn to swim by imitating Poliwrath."
          moon: "Its percentage of body fat is nearly zero. Its\nbody is entirely muscle, which makes it heavy\nand forces its swimming prowess to develop."
        fr:
          sun: "Les Tartard d’Alola nagent la brasse avec\nhabileté. Beaucoup d’enfants apprennent à\nnager en les imitant."
          moon: "Il a un indice de masse grasse proche de zéro.\nComme il est plein de muscles, il est très lourd\net a dû apprendre à nager pour se déplacer."
        it:
          sun: "I Poliwrath di Alola sono specialisti del nuoto\na rana. Molti bambini imparano a nuotare\nimitandoli."
          moon: "Ha una percentuale di grasso corporeo pari a\nzero ed è tutto muscoli. Ha sviluppato una\ngrande forza per potersi spostare nuotando."
        de:
          sun: "Quappo, die aus Alola stammen, sind besonders\ngut im Brustschwimmen. Viele Kinder lernen\nSchwimmen, indem sie Quappo nachahmen."
          moon: "Sein Körperfettanteil geht gegen null. Es ist sehr\nschwer, besteht aber fast nur aus Muskeln. So\nkonnte es seine Schwimmfähigkeiten ausbauen."
        es:
          sun: "A los Poliwrath de Alola se les da de maravilla\nnadar a braza. Muchos niños imitan a este\nPokémon para aprender a nadar."
          moon: "Tiene prácticamente un 0% de grasa corporal.\nEs un excelente nadador debido a la fuerza que\nposee, ya que su cuerpo es todo músculo."
        ko:
          sun: "알로라의 강챙이는 평영을\n잘한다. 강챙이 흉내로\n헤엄을 배우는 아이들도 많다."
          moon: "체지방률은 거의 0%\n전신이 근육인 관계로 무거워서\n헤엄치는 힘이 발달했다."
        zh_simp:
          sun: "阿罗拉的蚊香泳士擅长蛙泳。\n模仿蚊香泳士学习游泳的孩子也很多。"
          moon: "体脂率基本是０％。\n因全身都是肌肉且很重，\n所以游泳能力很发达。"
        zh_trad:
          sun: "阿羅拉的蚊香泳士擅長蛙泳。\n模仿蚊香泳士學習游泳的孩子也有很多。"
          moon: "體脂肪率基本是０％。\n因全身都是肌肉而且很重，\n所以游泳能力很發達。"
