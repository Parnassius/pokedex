  species_id: 478
  names:
    jp_kana: ユキメノコ
    jp_kanji: ユキメノコ
    en: Froslass
    fr: Momartik
    it: Froslass
    de: Frosdedje
    es: Froslass
    ko: 눈여아
    zh_simp: 雪妖女
    zh_trad: 雪妖女
  forms:
