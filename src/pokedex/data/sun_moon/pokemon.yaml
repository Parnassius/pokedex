      abilities:
        - shell_armor
        - skill_link
      hidden_ability: overcoat
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          sun: "カラの　こうどは　ダイヤモンドを\nこえる。　むかしのひとは　カラを\nあつめて　たてを　つくっていた。"
          moon: "つねに　だしっぱなしの　ベロを\nきように　つかって　かいていの　すなを\nほりおこし　エサを　さがす。"
        jp_kanji:
          sun: "殻の　硬度は　ダイヤモンドを\n超える。　昔の人は　カラを\n集めて　盾を　造っていた。"
          moon: "常に　出しっぱなしの　ベロを\n器用に　使って　海底の\n砂を　掘り起し　餌を　探す。"
        en:
          sun: "The hardness of its shell surpasses the\nhardness of a diamond. In days gone by,\npeople used the shells to make shields."
          moon: "This Pokémon’s tongue is always hanging out.\nIt uses its tongue with great dexterity to dig up\nsand from the seabed in its search for food."
        fr:
          sun: "Sa coquille est plus dure que le diamant.\nDans l’Antiquité, elle a été utilisée comme\nbouclier."
          moon: "Il utilise sa langue protubérante avec habileté\npour creuser le sable au fond de la mer et\ntrouver sa nourriture."
        it:
          sun: "La conchiglia esterna è più dura del diamante.\nIn passato era usata per costruire scudi."
          moon: "Con la lingua che gli sporge sempre a penzoloni\nscava abilmente sul fondo del mare in cerca\ndi cibo."
        de:
          sun: "Ihre Schalen sind härter als Diamanten.\nVor langer Zeit sammelte man die Schalen\nvon Muschas und machte Schilde daraus."
          moon: "Seine Zunge hängt immer aus seiner Schale.\nEs sucht nach Beute, indem es mit ihr gezielt\nden Sand am Meeresboden aufwirbelt."
        es:
          sun: "Su concha, más dura que un diamante, se\nempleaba en la antigüedad para la fabricación\nde escudos."
          moon: "Este Pokémon usa su lengua diestramente para\nexcavar en el fondo del mar y buscar alimento."
        ko:
          sun: "껍질의 강도는 다이아몬드보다\n높다. 옛날 사람은 껍질을\n모아서 방패를 만들었었다."
          moon: "항상 내밀고 있는 혀를\n능숙히 사용하여 해저의 모래를\n파내 먹이를 찾는다."
        zh_simp:
          sun: "壳的硬度超过钻石。\n过去，人们会收集壳来做成盾牌。"
          moon: "灵活地运用一直伸着的舌头\n挖掘海底的沙子，寻找食物。"
        zh_trad:
          sun: "殼的硬度超越鑽石。\n古時的人會收集殼來做成盾牌。"
          moon: "靈活運用總是伸出的舌頭\n挖掘海底的沙子，尋找食物。"
cloyster:
