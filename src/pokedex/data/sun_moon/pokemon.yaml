        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - unaware
      descriptions:
        jp_kana:
          sun: "はかない　ガスじょうの　からだ。\nたいきの　チリを　あつめながら\nゆっくりと　せいちょうしていく。"
          moon: "おおむかしは　ほしのこ　という　なで\nよばれた。　べつせかいの　ポケモンと\nいわれているが　くわしくは　ふめい。"
        jp_kanji:
          sun: "はかない　ガス状の　身体。\n大気の　チリを　集めながら\nゆっくりと　成長していく。"
          moon: "大昔は　星の子　という　名で\n呼ばれた。　別世界の　ポケモンと\nいわれているが　詳しくは　不明。"
        en:
          sun: "Its body is gaseous and frail. It slowly grows as\nit collects dust from the atmosphere."
          moon: "In ages past, it was called the child of the stars.\nIt’s said to be a Pokémon from another world,\nbut no specific details are known."
        fr:
          sun: "Son corps est composé d’un gaz très volatile.\nIl croît lentement, en accumulant les poussières\natmosphériques au gré de ses déplacements."
          moon: "Jadis, on l’appelait l’enfant des étoiles.\nOn raconte qu’il viendrait d’un autre monde,\nmais rien n’est prouvé."
        it:
          sun: "Il suo corpo è formato da un gas volatile.\nCresce lentamente accumulando il pulviscolo\npresente nell’atmosfera."
          moon: "Nell’antichità era conosciuto con il nome di\n“Figlio delle stelle”. Si dice che provenga da\nun altro mondo, ma non vi sono certezze."
        de:
          sun: "Sein Körper besteht aus flüchtigem Gas.\nEs wächst durch das Sammeln von Staub\naus der Luft."
          moon: "Vor langer Zeit nannte man es „Kind der Sterne“.\nEs soll aus einer anderen Welt stammen, doch\nniemand weiß Genaueres darüber."
        es:
          sun: "Su cuerpo se compone de una materia gaseosa\ninestable. Crece poco a poco al acumular las\nmotas de polvo que flotan en el aire."
          moon: "En tiempos remotos recibía el nombre de Hijo\nde las estrellas. Cuentan que proviene de otro\nmundo, pero poco más se sabe al respecto."
        ko:
          sun: "연약한 가스 상태의 몸이다.\n대기의 먼지를 모으며\n천천히 성장한다."
          moon: "먼 옛날에는 별의 아이라는 이름으로\n불렸다. 다른 세계의 포켓몬이라고\n전해지지만 자세한 것은 불명확하다."
        zh_simp:
          sun: "容易消逝的气体状身体。\n一边收集大气的尘埃，\n一边慢慢地成长着。"
          moon: "在遥远的过去被称呼为星之子。\n据说是其他世界的宝可梦，\n但具体情况不详。"
        zh_trad:
          sun: "容易消逝的氣體狀身體。\n一邊收集大氣中的塵埃，\n一邊慢慢地成長著。"
          moon: "在遙遠的過去被稱為星之子。\n據說是屬於其他世界的寶可夢，\n但具體情況不詳。"
