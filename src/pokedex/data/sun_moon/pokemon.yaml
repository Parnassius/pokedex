      types:
        - dragon
        - flying
      egg_groups:
        - dragon
      abilities:
        - aerilate
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          sun: "やいばのように　するどい　はねで\nゆくてを　さえぎるもの　すべてを\nまっぷたつにし　とびつづける。"
          moon: "より　きょうぼうに　なって　そだての\nトレーナーにも　おそいかかるほど。\nべつめい　ちに　ぬれた　みかづき。"
        jp_kanji:
          sun: "刃のように　鋭い　羽で\n行く手を　遮るもの　すべてを\n真っ二つにし　飛び続ける。"
          moon: "より　凶暴に　なって　育ての\nトレーナーにも　襲いかかるほど。\n別名　血に　濡れた　三日月。"
        en:
          sun: "Anyone standing in its path gets sliced right in\ntwo, while this Pokémon continues its flight\nwithout interruption."
          moon: "Mega Evolution fuels its brutality, and it may\neven turn on the Trainer who raised it. It’s been\ndubbed “the blood-soaked crescent.”"
        fr:
          sun: "Son aile tranchante comme une lame découpe\ntous ceux qui se dressent sur son chemin,\nsans toutefois ralentir son vol."
          moon: "Il est devenu tellement violent qu’il agresserait\nmême le Dresseur qui l’a élevé. Il est surnommé\n« le croissant écarlate »."
        it:
          sun: "Taglia in due qualsiasi ostacolo incontri lungo\nla sua strada con le ali affilate come lame\ne prosegue indisturbato il suo volo."
          moon: "La megaevoluzione l’ha reso così feroce che\npuò rivoltarsi anche contro chi l’ha allenato.\nÈ conosciuto anche come “Mezzaluna scarlatta”."
        de:
          sun: "Mit seinen messerscharfen Flügeln teilt es\nalles entzwei, was sich ihm in den Weg stellt,\num dann ungehindert seinen Flug fortzusetzen."
          moon: "Es ist nun noch brutaler und greift manchmal\nsogar seinen eigenen Trainer an. Man nennt es\nauch „Rote Sichel“."
        es:
          sun: "Si algo le obstruye el camino, lo corta por la\nmitad con sus alas afiladas como cuchillas\ny prosigue el vuelo."
          moon: "Se vuelve tan violento que incluso puede llegar\na atacar a su Entrenador. Su silueta recuerda a\nuna luna creciente de color carmesí."
        ko:
          sun: "칼날처럼 날카로운 날개로\n가는 곳을 가로막은 모든 것을\n두 동강 내고 계속 날아다닌다."
          moon: "더욱 난폭해져서 키워준\n트레이너마저 덮칠 정도다.\n별명은 피에 젖은 초승달."
        zh_simp:
          sun: "用刀刃般锋利的翅膀\n一边将挡路的全都一切两半，\n一边不断飞行。"
          moon: "变得更为粗暴，连培育它的\n训练家也会袭击。\n别名是，染血的新月。"
        zh_trad:
          sun: "用刀刃般鋒利的翅膀不斷飛行，\n同時將擋路的一切全都切成兩半。"
          moon: "變得更為粗暴，連培育牠的\n訓練家也會不留情地襲擊。\n別名是「染血的新月」。"
beldum:
  species_id: 374
