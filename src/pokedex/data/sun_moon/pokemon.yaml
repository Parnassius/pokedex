        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 75
        attack: 100
        defense: 120
        special_attack: 25
        special_defense: 65
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - steel
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: slush_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          sun: "かざんふんか　から　のがれるうちに\nゆきやまに　すみつくように　なった。\nゆきしぶきをあげ　せつげんを　かける。"
          moon: "はがねのハリを　こおりが　おおう。\nささると　ふかい　きずと　いっしょに\nとうしょうにも　なってしまうぞ。"
        jp_kanji:
          sun: "火山噴火　から　逃れるうちに\n雪山に　棲みつくように　なった。\n雪しぶきをあげ　雪原を　駆ける。"
          moon: "鋼の針を　氷が　おおう。\n刺さると　深い　傷と　一緒に\n凍傷にも　なってしまうぞ。"
        en:
          sun: "Fleeing a volcanic eruption, it settled on a snowy\nmountain. As it races through the snowfields,\nit sends up a spray of snow."
          moon: "This Pokémon’s steel spikes are sheathed in ice.\nStabs from these spikes cause deep wounds\nand severe frostbite as well."
        fr:
          sun: "Cette espèce a fui une éruption volcanique\net s’est installée sur des pentes enneigées.\nElle fend la neige en projetant des flocons."
          moon: "Ses épines métalliques sont recouvertes de\nglace. Les proies qu’il transperce grâce à\ncelles-ci se retrouvent congelées."
        it:
          sun: "Questa specie si è trasferita sulle montagne\ninnevate dopo essere sfuggita a un’eruzione\nvulcanica. Solca la neve lanciandola dappertutto."
          moon: "I suoi aculei d’acciaio sono rivestiti di ghiaccio.\nChi li tocca subisce una ferita profonda e allo\nstesso tempo anche un gelone."
        de:
          sun: "Auf der Flucht vor Vulkanausbrüchen hat es\nsich auf verschneiten Bergen angesiedelt. Rast\nes durch den Schnee, wirbelt es Flocken auf."
          moon: "Eis bedeckt seine stählernen Stacheln.\nEin Angriff mit diesen Stacheln führt neben\ntiefen Wunden auch zu Erfrierungen."
        es:
          sun: "Cambió su hábitat a las montañas nevadas tras\nhuir de una erupción volcánica. Esparce nieve\npor doquier cuando corretea por ella."
          moon: "Sus púas de acero están cubiertas de hielo.\nCuando pincha con ellas, además de profundas\nheridas también causa daño por congelación."
        ko:
          sun: "화산분화로부터 도망치다가\n설산에 살게 되었다.\n눈보라를 뿌리며 설원을 달린다."
          moon: "강철로 된 가시를 얼음이 둘러싸고 있다.\n찔리면 깊은 상처와 함께\n동상도 걸릴 수 있다."
        zh_simp:
          sun: "在火山喷发逃出的过程中，\n在雪山栖息定居下来。\n会溅起雪花在雪原上奔驰。"
          moon: "钢针是用冰覆盖住的。\n被它刺中会造成很深的伤口，\n还会被冻伤。"
        zh_trad:
          sun: "從火山爆發逃難的最後，\n在雪山棲息定居下來。\n會濺起雪花在雪原上奔馳。"
          moon: "鋼針被冰覆蓋著。\n被刺中時不但會造成很深的傷口，\n同時也會凍傷。"
