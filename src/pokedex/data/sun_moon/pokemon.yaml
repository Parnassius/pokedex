grimer:
  species_id: 88
  names:
    jp_kana: ベトベター
    jp_kanji: ベトベター
    en: Grimer
    fr: Tadmorv
    it: Grimer
    de: Sleima
    es: Grimer
    ko: 질퍽이
    zh_simp: 臭泥
    zh_trad: 臭泥
  forms:
    grimer:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - amorphous
      abilities:
        - stench
        - sticky_hold
      hidden_ability: poison_touch
      held_items:
        rare: black_sludge
      descriptions:
        jp_kana:
          sun: "こうじょうが　たれながす　ヘドロの\nはいえきが　おもな　エサ　なのだ。\nさいきんは　かずが　へってきた。"
          moon: "つきからの　エックスせんを　あびた\nヘドロが　へんかし　たんじょう。\nからだの　ばいきんが　へると　しぬ。"
        jp_kanji:
          sun: "工場が　垂れ流す　ヘドロの\n廃液が　主な　餌　なのだ。\n最近は　数が　減ってきた。"
          moon: "月からの　Ｘ線を　浴びた\nヘドロが　変化し　誕生。\n身体の　ばい菌が　減ると　死ぬ。"
        en:
          sun: "Its main source of food is the slimy industrial\nwaste of factories. This Pokémon’s numbers\nhave been decreasing in recent years."
          moon: "It was born from sludge transformed by\nexposure to X-rays from the moon. When its\ninternal load of germs decreases, it dies."
        fr:
          sun: "Il s’alimente principalement des déchets\nchimiques rejetés par les usines. Ce Pokémon\nest devenu plus rare ces derniers temps."
          moon: "Né d’un tas de déchets exposés aux rayons X\nréfléchis par la lune, il meurt si les microbes qui\npullulent sur son corps diminuent en nombre."
        it:
          sun: "Si nutre principalmente di rifiuti industriali\nfangosi. Negli ultimi tempi, il numero di Grimer\nsta diminuendo."
          moon: "È nato da fango esposto ai raggi X provenienti\ndalla luna. Per sopravvivere, deve conservare\nun’elevata popolazione batterica."
        de:
          sun: "Es ernährt sich primär von Industrieabfällen.\nIn letzter Zeit sieht man es viel seltener als\nfrüher."
          moon: "Schlamm, der Röntgenstrahlung vom Mond\nausgesetzt war, wurde zu Sleima. Sinkt die\nZahl der Bakterien in seinem Körper, stirbt es."
        es:
          sun: "Su principal fuente de alimento son los residuos\nindustriales. Últimamente la población de Grimer\nha menguado bastante."
          moon: "Nace del lodo expuesto a los rayos X reflejados\npor la luna. Si el número de bacterias de su\ncuerpo disminuye, su vida corre peligro."
        ko:
          sun: "공장에서 흘러나오는\n오물 폐수가 주요 먹이다.\n최근에는 수가 줄어들고 있다."
          moon: "달의 엑스선을 쬔\n진흙이 변화하여 태어났다.\n몸의 세균이 줄어들면 죽는다."
        zh_simp:
          sun: "工厂排放的污泥废液\n是其主要的饵料。\n最近数量减少了。"
          moon: "污泥沐浴了来自月亮的Ｘ射线后，\n发生变化而诞生的。\n身体的细菌如果减少就会死亡。"
        zh_trad:
          sun: "主要的食物是\n工廠排放的污泥廢液。\n最近數量減少了。"
          moon: "照射了來自月亮的Ｘ射線後，\n污泥發生變化而誕生。\n身體的細菌如果減少就會死亡。"
    grimer_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 80
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - dark
      egg_groups:
        - amorphous
      abilities:
        - poison_touch
        - gluttony
      hidden_ability: power_of_alchemy
      held_items:
        rare: black_sludge
      descriptions:
        jp_kana:
          sun: "ゴミもんだいを　かいけつ　するため\nよそから　もちこんだ　ベトベターが\nいつのまにか　このすがたに　なった。"
          moon: "けっしょうは　どくその　かたまり。\nベトベターの　からだから　おちると\nしにいたる　どくそが　もれだすぞ。"
        jp_kanji:
          sun: "ゴミ問題を　解決　するため\nよそから　持ちこんだ　ベトベターが\nいつのまにか　この姿に　なった。"
          moon: "結晶は　毒素の　塊。\nベトベターの　身体から　落ちると\n死に至る　毒素が　漏れだすぞ。"
        en:
          sun: "A Grimer, which had been brought in to solve a\nproblem with garbage, developed over time into\nthis form."
          moon: "The crystals on Grimer’s body are lumps of\ntoxins. If one falls off, lethal poisons leak out."
        fr:
          sun: "Les Tadmorv ont été introduits pour régler le\nproblème des ordures à Alola. Personne ne\nsait pourquoi ils ont pris cette apparence."
          moon: "Les cristaux sur son corps sont des agrégats de\ntoxines. S’ils se détachent, des poisons mortels\ncommencent à se répandre."
        it:
          sun: "I Grimer sono stati introdotti ad Alola per\nrisolvere il problema dello smaltimento dei rifiuti.\nA un certo punto il loro aspetto è cambiato."
          moon: "I cristalli sul suo corpo sono grumi di tossine.\nSe si staccano e cadono a terra, rilasciano\nun veleno mortale."
        de:
          sun: "Sleima, die zur Lösung der Abfallproblematik aus\nanderen Regionen nach Alola gebracht wurden,\nentwickelten sich eines Tages zu dieser Form."
          moon: "Seine Kristalle bestehen aus verklumpten\nToxinen. Fallen sie von seinem Körper ab,\nentweichen die tödlichen Giftstoffe."
        es:
          sun: "Los Grimer se introdujeron para remediar la\nnociva proliferación de residuos. Su aspecto\ncambió de un día para otro."
          moon: "Está formado por un cúmulo de toxinas.\nGrimer exuda por su cuerpo una sustancia\nextremadamente tóxica."
        ko:
          sun: "쓰레기 문제를 해결하기 위해\n다른 곳에서 데려온 질퍽이가\n어느새 이 모습이 되었다."
          moon: "결정은 독소의 덩어리.\n질퍽이의 몸에서 떨어지면\n죽음에 이르는 독소가 흘러나온다."
        zh_simp:
          sun: "为了解决垃圾问题\n从其他地区带来的臭泥\n不知不觉就变成了这个样子。"
          moon: "结晶是毒素块。\n如果从臭泥的身体落下，\n就会泄露出足以致死的毒素。"
        zh_trad:
          sun: "為了解決垃圾問題\n從其他地區帶來的臭泥\n不知不覺就變成了這個樣子。"
          moon: "結晶是毒素塊。\n如果從臭泥的身上落下，\n就會流出足以致死的毒素。"
