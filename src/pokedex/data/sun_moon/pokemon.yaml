        - ground
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sun: "さいせいのうりょくが　たかい。\nさかなポケモンに　くいちぎられても\nすうじかんで　もとどおりに　なるよ。"
          moon: "めに　みえない　プランクトンが　おもな\nエサ。　りくに　あがってくるが\nりゆうは　まだ　わかっていない。"
        jp_kanji:
          sun: "再生能力が　高い。\nさかなポケモンに　喰い千切られても\n数時間で　元通りに　なるよ。"
          moon: "目に　見えない　プランクトンが　主な\n餌。　陸に　上ってくるが\n理由は　まだ　わかっていない。"
        en:
          sun: "It has strong regenerative capabilities. Even if\nparts of it are bitten off by fish Pokémon, it will\nreturn to normal within a few hours."
          moon: "Plankton, invisible to the naked eye, is its main\nfood source. It comes onto the land periodically,\nbut the reason for this is not known."
        fr:
          sun: "Il se régénère très vite. Même si des Pokémon\npoissons en croquent un bout, il est à nouveau\ncomme neuf au bout de quelques heures."
          moon: "Il s’alimente principalement de plancton invisible\nà l’œil nu. On ne sait toujours pas pourquoi il a\nquitté l’océan au profit de la terre ferme."
        it:
          sun: "Ha notevoli capacità rigenerative: anche se\nviene mangiucchiato dai Pokémon acquatici\npuò tornare come prima nel giro di qualche ora."
          moon: "Si nutre principalmente di plancton.\nA volte si sposta sulla terraferma per motivi\nancora sconosciuti."
        de:
          sun: "Es hat starke Regenerationskräfte. Selbst wenn\nFisch-Pokémon ein Stück von ihm abbeißen,\nwächst es innerhalb weniger Stunden nach."
          moon: "Es ernährt sich hauptsächlich von Plankton,\ndas man mit bloßem Auge nicht sehen kann.\nEs ist noch unklar, warum es an Land kommt."
        es:
          sun: "Posee una notable capacidad de regeneración.\nAunque los Pokémon pez lo mordisqueen, puede\nrecuperarse en tan solo unas pocas horas."
          moon: "Su principal alimento es plancton invisible. Sale\na la superficie, pero aún se desconoce el motivo."
        ko:
          sun: "재생능력이 높다.\n물고기포켓몬에게 물어뜯겨도\n몇 시간이면 원래대로 돌아온다."
          moon: "눈에 보이지 않는 플랑크톤이 주된\n먹이다. 육지에 올라오지만\n이유는 아직 밝혀지지 않았다."
        zh_simp:
          sun: "再生能力很高。\n即使被鱼宝可梦咬断，\n也会在几小时内恢复原状哦。"
          moon: "无形的浮游生物是它的主要食物。\n会到陆地上来，但原因尚不清楚。"
        zh_trad:
          sun: "再生能力很高。\n即使被魚寶可夢咬斷\n也會在幾小時內恢復原狀哦。"
          moon: "牠的主要食物是無形的浮游生物。\n會到陸地上來，但原因尚不清楚。"
    gastrodon_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
        it: Mare Est
        de: Östliches Meer
        es: Mar Este
        ko: 동쪽바다
        zh_simp: 东海
        zh_trad: 東海
      base_stats:
        hp: 111
        attack: 83
        defense: 68
        special_attack: 92
        special_defense: 82
        speed: 39
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          sun: "まだ　みぬ　いろの　トリトドンを\nみつけるために　けんきゅうチームが\nせかいの　うみを　ちょうさちゅう。"
          moon: "うまれた　うみとは　ちがう　ばしょで\nトリトドンを　そだてると　どうなるか\nじっけんが　おこなわれている。"
        jp_kanji:
          sun: "まだ　みぬ　色の　トリトドンを\nみつけるために　研究チームが\n世界の　海を　調査中。"
          moon: "生まれた　海とは　違う　場所で\nトリトドンを　育てると　どうなるか\n実験が　行われている。"
        en:
          sun: "A team of researchers is scouring the oceans\nof the world in search of a Gastrodon in a color\nnever seen before."
          moon: "Experiments are being conducted to discover\nwhat happens when a Gastrodon is raised in a\nlocation other than the sea where it was born."
        fr:
          sun: "Une équipe de scientifiques voyage à travers\nles océans pour trouver des Tritosor de couleurs\nencore inconnues."
          moon: "Des expériences sont en cours pour savoir\ncomment grandit un Tritosor élevé dans une mer\ndifférente de celle où il est né."
        it:
          sun: "Esiste una squadra di scienziati che sta\nstudiando i mari di tutto il mondo alla ricerca\ndi Gastrodon dai colori sconosciuti."
          moon: "Si stanno svolgendo esperimenti per scoprire\ncosa succede quando un Gastrodon cresce in\nun mare diverso da quello in cui è nato."
        de:
          sun: "Verschiedene Forscherteams suchen die\nMeere der Welt ab, um bisher unbekannte\nFarbvarianten von Gastrodon zu entdecken."
          moon: "Experimente sollen aufzeigen, was geschieht,\nwenn ein Gastrodon in einer anderen Gegend\nals dem Meer seiner Geburt aufgezogen wird."
        es:
          sun: "Los más destacados investigadores siguen\npeinando los mares en busca de un Gastrodon\nde color nunca visto."
          moon: "Se están llevando a cabo experimentos para\ncomprobar cómo cambia Gastrodon cuando no\nse le entrena en el mar en el que nació."
        ko:
          sun: "본 적 없는 색의 트리토돈을\n발견하기 위해 연구팀이\n세상의 바다를 조사 중이다."
          moon: "태어난 바다와 다른 장소에서\n트리토돈을 키우면 어떻게 될지\n실험이 진행되고 있다."
        zh_simp:
          sun: "为了寻找尚未发现过的\n其他颜色的海兔兽，\n研究小组在全世界的大海展开调查。"
          moon: "在非出生海域培育海兔兽的话，\n会变成什么样？\n正在进行着这样的实验。"
        zh_trad:
          sun: "為了尋找尚未發現的新色海兔獸，\n研究小組在全世界的大海展開調查。"
          moon: "在與出生海域不同的地方\n培育海兔獸的話，會變成怎樣呢？\n這樣的實驗正在進行著。"
