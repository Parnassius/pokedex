      descriptions:
        jp_kana:
          sun: "あざやかな　たいしょくを　たもつには\nひじょうに　てまが　かかるが　それを\nしゅみにする　こうずかも　いるのだ。"
          moon: "カマじょうの　はなびらから　ビームを\nはなつ。　ぶあつい　てっぱんも\nまっぷたつに　せつだんする　いりょく。"
        jp_kanji:
          sun: "鮮やかな　体色を　保つには\n非常に　手間が　かかるが　それを\n趣味にする　好事家も　いるのだ。"
          moon: "鎌状の　花びらから　ビームを\n放つ。　分厚い　鉄板も\n真っ二つに　切断する　威力。"
        en:
          sun: "It requires a lot of effort to maintain Lurantis’s\nvivid coloring, but some collectors enjoy this\nwork and treat it as their hobby."
          moon: "It fires beams from its sickle-shaped petals.\nThese beams are powerful enough to cleave\nthrough thick metal plates."
        fr:
          sun: "Préserver ses couleurs éclatantes requiert\nun travail titanesque. On trouve tout de même\ndes gens assez fous pour s’y atteler."
          moon: "Ses pétales en forme de faux envoient des\nrayons capables de couper un bloc de métal\nen deux avec une facilité déconcertante."
        it:
          sun: "Passano la maggior parte del tempo a curare\ni colori vivaci del loro corpo, tanto che per alcuni\ndi essi è un piacevole hobby a tempo pieno."
          moon: "Dai suoi petali a forma di falce sprigiona\nun raggio capace di tranciare in due una\nspranga di ferro."
        de:
          sun: "Es erfordert viel Arbeit, seine Farbenpracht zu\nerhalten, doch zum Glück gibt es Passionierte,\ndie den hohen Aufwand nicht scheuen."
          moon: "Kann aus seinen sichelförmigen Blättern\neinen Strahl abschießen, der selbst eine\nEisenplatte zerschneidet."
        es:
          sun: "Dedica mucho tiempo y esfuerzo a acicalarse\ny preservar sus vivos colores. A algunos\nejemplares incluso les lleva todo el día."
          moon: "Sus pétalos en forma de guadaña liberan un rayo\ncon una potencia capaz de partir por la mitad\nuna plancha de hierro bien gruesa."
        ko:
          sun: "선명한 몸의 색을 유지하기 위해서\n굉장히 손이 가지만 그것을\n취미로 하는 유별난 사람도 있다."
          moon: "낫 모양의 꽃잎에서 빔을\n발사한다. 두꺼운 철판도\n두 동강 나는 위력이다."
        zh_simp:
          sun: "要保持鲜艳的身体颜色，\n得花很多功夫。但把这个\n当做兴趣的爱好者也是有的。"
          moon: "从镰刀状的花瓣中放射出光束。\n威力大到连很厚的铁板也会一切两半。"
        zh_trad:
          sun: "要維持這鮮豔的體色，\n可是要花很多功夫的。\n但也有特殊嗜好的人把這當興趣。"
          moon: "從鐮刀狀的花瓣中放射光束。\n具有連厚厚的鐵板也能一切兩半的威力。"
