      descriptions:
        jp_kana:
          sun: "ふとい　キバは　ストローのように\nなかが　くうどうで　いがいに　もろい。\nちを　すうのに　とっか　したのだ。"
          moon: "ちを　すいすぎて　とべなくなり\nじめんに　おちて　ほかの　ポケモンの\nえじきに　なっていることも。"
        jp_kanji:
          sun: "太い　キバは　ストローのように\n中が　空洞で　意外に　もろい。\n血を　吸うのに　特化　したのだ。"
          moon: "血を　吸い過ぎて　飛べなくなり\n地面に　落ちて　他の　ポケモンの\n餌食に　なっていることも。"
        en:
          sun: "Its thick fangs are hollow like straws, making\nthem unexpectedly fragile. These fangs are\nspecialized for sucking blood."
          moon: "Sometimes they drink so much blood, they can’t\nfly anymore. Then they fall to the ground and\nbecome food for other Pokémon."
        fr:
          sun: "Ses crocs sont creux comme des pailles et\nétonnamment fragiles. Ils sont en revanche\nparfaits pour sucer le sang de ses victimes."
          moon: "Il arrive qu’un Nosferalto ayant trop sucé de\nsang ne puisse plus voler et tombe au sol,\noù il est dévoré par d’autres Pokémon."
        it:
          sun: "I suoi grossi canini sono cavi come cannucce\ne sorprendentemente fragili. Se ne serve per\nsucchiare il sangue."
          moon: "Se succhia troppo sangue, non riesce più\na volare e cade a terra diventando preda\ndi altri Pokémon."
        de:
          sun: "Seine dicken Reißzähne sind im Inneren hohl\nwie Strohhalme und zerbrechlich. Sie sind das\nProdukt seiner Entwicklung zum Blutsauger."
          moon: "Manchmal saugt es so viel Blut, dass es\nhilflos zu Boden fällt und leichte Beute für\nandere Pokémon wird."
        es:
          sun: "Succiona la sangre de sus presas con sus\ngruesos colmillos, que son huecos por dentro a\nmodo de caña y más frágiles de lo que parecen."
          moon: "A veces chupa tanta sangre que es incapaz de\nvolar y cae al suelo para acabar siendo presa\nde otros Pokémon."
        ko:
          sun: "두꺼운 이빨은 빨대처럼\n속이 비어있어 의외로 약하다.\n피를 빠는데 특화된 것이다."
          moon: "피를 너무 빨아들여 날 수 없게 되어\n땅에 떨어져 다른 포켓몬의\n먹이가 되는 일도 있다."
        zh_simp:
          sun: "粗粗的牙齿像吸管一样，\n中间是空的，因而意想不到的脆弱。\n是为了吸血而特别进化的。"
          moon: "因吸血过多无法飞行而落到\n地面成为其他宝可梦的食物，\n这样的事也有过。"
        zh_trad:
          sun: "粗粗的牙齒像吸管一樣是中空的，\n所以意想不到地脆弱。\n這牙齒是專為吸血而演變而成的。"
          moon: "也有發生過因吸血過多無法飛行\n而落到地面成為其他寶可夢的\n食物的事情。"
