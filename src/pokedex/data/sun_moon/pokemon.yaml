      descriptions:
        jp_kana:
          sun: "でんきが　ある　ばしょに　むれる。\nでんきを　おくる　てっとう　などに\nビッシリと　はりついていることも。"
          moon: "でんじはを　はなち　そらを　ただよう。\nでんきを　くっているときに　さわると\nぜんしんが　ビリッと　しびれるぞ。"
        jp_kanji:
          sun: "電気が　ある　場所に　群れる。\n電気を　送る　鉄塔　などに\nビッシリと　張りついていることも。"
          moon: "電磁波を　放ち　空を　漂う。\n電気を　喰っているときに　触ると\n全身が　ビリッと　痺れるぞ。"
        en:
          sun: "They gather in places where electricity is\navailable. They can be found clinging to the\nsteel towers used to support power lines."
          moon: "It sends out electromagnetic waves, which let it\nfloat through the air. Touching it while it’s eating\nelectricity will give you a full-body shock."
        fr:
          sun: "Les Magnéti se rassemblent aux endroits où\nil y a beaucoup d’électricité, et s’agglutinent\npar exemple autour des pylônes électriques."
          moon: "Il lévite en émettant des ondes électro-\nmagnétiques. Si on le touche quand il s’alimente\nen énergie, on risque un choc électrique."
        it:
          sun: "I Magnemite si radunano dove c’è elettricità.\nSi possono anche trovare attaccati ai tralicci\ndelle linee elettriche."
          moon: "Fluttua in aria emettendo onde\nelettromagnetiche. Se lo si tocca mentre si\nnutre di elettricità, si prende la scossa."
        de:
          sun: "Sie scharen sich um Orte, durch die Elektrizität\nfließt. Deshalb klammern sie sich zum Beispiel\nsehr oft in Massen an Strommasten fest."
          moon: "Es sendet elektromagnetische Wellen aus und\nsegelt durch die Luft. Berührt man es, während\nes Strom saugt, bekommt man einen Schlag."
        es:
          sun: "Estos Pokémon se agrupan en zonas donde hay\nelectricidad. A veces hasta se los ve\nmerodeando alrededor de las torres eléctricas."
          moon: "Flota gracias a las ondas electromagnéticas\nque desprende. Al tocarlo mientras está\nalimentándose, uno puede electrocutarse."
        ko:
          sun: "전기가 있는 장소에 무리를 짓는다.\n전기를 보내는 철탑 등에\n빈틈없이 붙어 있는 일도 있다."
          moon: "전기자석파를 발산하여 공중을 떠다닌다.\n전기를 먹고 있을 때 만지면\n전신이 찌릿하게 마비된다."
        zh_simp:
          sun: "聚集在有电的地方。\n也会密密麻麻地贴在\n输送电力的铁塔等地方。"
          moon: "释放出电磁波，在空中飘浮。\n如果在吞食电力的时候触碰它，\n就会全身被电得噼里啪啦的。"
        zh_trad:
          sun: "會群集在有電力的地方。\n有時還會成群緊貼在\n輸送電力的鐵塔等地方。"
          moon: "釋放出電磁波，在空中飄浮。\n如果在牠吞食電力的時候碰牠，\n全身就會被電得劈哩啪啦的。"
