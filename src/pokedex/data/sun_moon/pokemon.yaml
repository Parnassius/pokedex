      descriptions:
        jp_kana:
          sun: "３つごが　きょうりょくして　こうどう。\nちか１００キロを　ほりすすむほどの\nパワーは　チームワークの　たまもの。"
          moon: "のうかなど　おおくの　ひとびとに\nしたしまれているのに　じめんの　したの\nすがたを　みたものは　いない。"
        jp_kanji:
          sun: "三つ子が　協力し　行動。\n地下１００キロを　掘り進むほどの\nパワーは　チームワークの　賜物。"
          moon: "農家など　多くの　人々に\n親しまれているのに　地面の　下の\n姿を　みたものは　いない。"
        en:
          sun: "This set of triplets moves cooperatively.\nIt’s the power of teamwork that enables\nthis Pokémon to dig to a depth of 60 miles."
          moon: "Despite the closeness between this Pokémon\nand farmers and other people, no one has ever\nseen the parts of it concealed underground."
        fr:
          sun: "Des triplés Taupiqueur qui s’entraident en tout.\nEn se coordonnant, ils peuvent creuser en\néquipe jusqu’à 100 km de profondeur."
          moon: "Bien que beaucoup d’agriculteurs élèvent\nce Pokémon, personne n’a jamais vu la partie\nenfouie de son corps."
        it:
          sun: "Le tre unità agiscono collaborando fra loro.\nGrazie al lavoro di squadra possono scavare\nfino a raggiungere i 100 km di profondità."
          moon: "È un Pokémon amato da molti, soprattutto dagli\nagricoltori. Nessuno ha mai visto la parte del\nsuo corpo che si trova sottoterra."
        de:
          sun: "Die drei arbeiten und handeln stets zusammen.\nDurch Teamwork gelingt es dem Pokémon, sich\nbis zu 100 km tief ins Erdreich zu graben."
          moon: "Trotz seiner Beliebtheit bei Farmern und vielen\nanderen Menschen, hat noch niemand den unter\nder Erde versteckten Teil von Digdri gesehen."
        es:
          sun: "Este trío siempre trabaja en equipo, gracias a lo\ncual puede perforar hasta alcanzar 100 km de\nprofundidad."
          moon: "A pesar de ser muy comunes en las granjas,\nnadie ha visto jamás la parte de sus cuerpos\nque ocultan bajo tierra."
        ko:
          sun: "세쌍둥이가 협력해서 행동한다.\n지하 100km를 파고 갈 정도의\n파워는 팀워크 덕택이다."
          moon: "농가 등 많은 사람에게\n친숙하지만 땅 아래의\n모습을 본 사람은 없다."
        zh_simp:
          sun: "三胞胎合作行动。\n甚至连地下１００公里都能挖到，\n这种力量是团队合作的成果。"
          moon: "和农户等大多数人都很亲近，\n不过还是没有人见过\n它在地面下的样子。"
        zh_trad:
          sun: "三胞胎合作行動。\n足以挖到地下１００公里深的\n力量是團隊合作的成果。"
          moon: "和農戶等大多數人都很親近，\n不過還是沒有人見過\n牠在地面下的樣子。"
