        - snow_cloak
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          sun: "きにいった　にんげんや　ポケモンを\nれいきで　こおらせる。　すあなに\nもってかえって　かざるのだ。"
          moon: "ゆきやまで　そうなんした　じょせいの\nたましいが　つららに　のりうつった。\nだんせいの　たましいが　こうぶつ。"
        jp_kanji:
          sun: "気に入った　人間や　ポケモンを\n冷気で　凍らせる。　巣穴に\n持って帰って　飾るのだ。"
          moon: "雪山で　遭難した　女性の\n魂が　氷柱に　乗り移った。\n男性の　魂が　好物。"
        en:
          sun: "When it finds humans or Pokémon it likes,\nit freezes them and takes them to its chilly den,\nwhere they become decorations."
          moon: "The soul of a woman lost on a snowy mountain\npossessed an icicle, becoming this Pokémon.\nThe food it most relishes is the souls of men."
        fr:
          sun: "Il congèle les humains et les Pokémon qui lui\nplaisent. Il les emporte ensuite dans sa tanière\npour les admirer à loisir."
          moon: "Il s’agirait d’une stalagmite possédée par l’âme\nd’une jeune fille disparue dans les cimes\nenneigées. Il adore les âmes d’hommes."
        it:
          sun: "Congela con il suo alito glaciale gli esseri umani\ne i Pokémon che gli piacciono e li usa per\ndecorare la sua tana."
          moon: "È una stalattite di ghiaccio animata dallo spirito\ndi una donna dispersa tra le montagne. Si nutre\ndell’energia vitale degli uomini."
        de:
          sun: "Menschen und Pokémon, die ihm gefallen,\nfriert es mit eisiger Luft ein. Dann nimmt es\nsie mit in seinen Bau und stellt sie dort aus."
          moon: "Man sagt, die Seele einer in den Bergen\nverunglückten Frau sei in einen Eiszapfen\ngefahren. Es frisst am liebsten Männerseelen."
        es:
          sun: "Con su gélido aliento congela a todo Pokémon o\nhumano que le llame la atención y se lo lleva a\nsu guarida para usarlo como objeto decorativo."
          moon: "Cuenta la leyenda que es la reencarnación de\nmujeres que sufrieron accidentes en la nieve.\nSiente predilección por las almas masculinas."
        ko:
          sun: "마음에 든 인간과 포켓몬을\n냉기로 얼린다. 보금자리에\n가져가서 장식한다."
          moon: "설산에서 조난당한 여성의\n영혼이 고드름에 옮겨붙었다.\n남성의 영혼을 좋아한다."
        zh_simp:
          sun: "用冷气把中意的人类\n或宝可梦都冻起来。\n然后带回巢穴当装饰用。"
          moon: "在雪山遇难的女性魂魄\n附体在冰柱上。\n喜欢吃男性的魂魄。"
        zh_trad:
          sun: "會用寒氣把喜歡的人類\n或寶可夢都凍結起來，\n然後帶回巢穴當成裝飾。"
          moon: "在雪山遇難的女性魂魄\n附身在冰柱上。\n喜歡吃男性的魂魄。"
