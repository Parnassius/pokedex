      types:
        - water
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - misty_surge
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          sun: "ふかいきりで　てきを　まどわせ\nじめつさせる　おそろしさを　もつ。\nかいりゅうが　エネルギーの　みなもと。"
          moon: "みずを　あやつる　ポニの　まもりがみ。\nけがれを　はらう　きよらかな　みずを\nうみだすと　つたえられている。"
        jp_kanji:
          sun: "深い霧で　敵を　惑わせ\n自滅させる　恐ろしさを　持つ。\n海流が　エネルギーの　源。"
          moon: "水を　操る　ポニの　守り神。\nけがれを　払う　清らかな　水を\n生みだすと　伝えられている。"
        en:
          sun: "The dense fog it creates brings the downfall\nand destruction of its confused enemies.\nOcean currents are the source of its energy."
          moon: "The guardian deity of Poni, it can control water.\nPeople say it can create pure water that will\nwash away any uncleanness."
        fr:
          sun: "Il confond ses ennemis grâce au brouillard\net les pousse à s’en prendre à eux-mêmes.\nIl puise son énergie dans les courants marins."
          moon: "Gardien de Poni, il a le pouvoir de contrôler l’eau.\nOn raconte qu’il peut produire une eau limpide\nqui nettoie toutes les impuretés."
        it:
          sun: "Avvolge il nemico in una fitta nebbia che\nlo induce ad attaccare se stesso. Le correnti\nmarine sono la fonte della sua energia."
          moon: "Protettore di Poni, ha il potere di controllare\ni flutti. Si narra che possa generare acqua\nlimpidissima che neutralizza qualsiasi impurità."
        de:
          sun: "Es führt Gegner mit dichtem Nebel in die Irre\nund schickt sie so in ihren Untergang. Seine\nEnergie gewinnt es aus der Meeresströmung."
          moon: "Der Schutzpatron von Poni. Dieses Pokémon\nkontrolliert das Wasser. Man sagt, es könne\nschmutziges in klares Wasser verwandeln."
        es:
          sun: "Desconcierta al enemigo provocando una espesa\nniebla que se convierte en su perdición. Las\ncorrientes marinas son su fuente de energía."
          moon: "Es el espíritu guardián de Poni y tiene control\nsobre el agua. Dicen que puede purificar\ncualquier impureza con su agua límpida."
        ko:
          sun: "짙은 안개로 적을 혼란시켜\n자멸하게 만드는 무서움을 지녔다.\n해류가 에너지의 근원이다."
          moon: "물을 조종하는 포니의 수호신.\n부정을 없애는 깨끗한 물을\n만들어낸다고 전해져 온다."
        zh_simp:
          sun: "拥有利用浓雾迷惑敌人，\n让其自我毁灭那种程度的可怕。\n海流是其能量的来源。"
          moon: "操纵水的波尼的守护神。\n传说会生出去除污秽的清澈之水。"
        zh_trad:
          sun: "擁有利用濃霧迷惑敵人，\n讓其自我毀滅的可怕能力。\n海流是其能量的來源。"
          moon: "操縱水的波尼守護神。\n傳說會生出能夠除去污穢的清淨之水。"
cosmog:
