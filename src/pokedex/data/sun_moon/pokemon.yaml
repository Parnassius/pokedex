      descriptions:
        jp_kana:
          sun: "みずのバルーンを　うたで　あやつる。\nそのメロディは　なかまに　まなび\nだいだい　むれに　ひきつがれていく。"
          moon: "うたごえを　いかし　たたかう。\nまいにちの　のどの　メンテナンスは\nトレーナーの　たいせつな　やくめ。"
        jp_kanji:
          sun: "水のバルーンを　歌で　操る。\nそのメロディは　仲間に　学び\n代々　群れに　引き継がれていく。"
          moon: "歌声を　活かし　戦う。\n毎日の　のどの　メンテナンスは\nトレーナーの　大切な　役目。"
        en:
          sun: "It controls its water balloons with song. The\nmelody is learned from others of its kind and is\npassed down from one generation to the next."
          moon: "Its singing voice is its chief weapon in battle.\nThis Pokémon’s Trainer must prioritize the daily\nmaintenance of its throat at all costs."
        fr:
          sun: "Il contrôle ses ballons d’eau par son chant, dont\nla mélodie, apprise auprès de ses semblables,\nse transmet de génération en génération."
          moon: "Son chant est son principal atout en combat.\nSon Dresseur devra donc veiller à tout prix\nà la bonne santé de ses cordes vocales."
        it:
          sun: "Controlla i suoi palloncini d’acqua con il canto,\nintonando una melodia tramandata tra i propri\nsimili di generazione in generazione."
          moon: "Lotta sfruttando le proprie doti canore.\nChi lo allena deve dedicarsi con la massima\ncura alla salute delle sue corde vocali."
        de:
          sun: "Es kontrolliert mit seinem Gesang Wasserblasen.\nDie Melodie, die über Generationen im Rudel\nüberliefert wird, lernt es von seinen Kameraden."
          moon: "Es kämpft unter vollem Einsatz seiner Gesangs-\nstimme. Zu den Aufgaben seines Trainers zählen\nsomit Pflege und Schonung der Stimmbänder."
        es:
          sun: "Es capaz de controlar globos de agua mediante\nun canto cuya melodía se ha transmitido entre\nlos suyos de generación en generación."
          moon: "Se vale de su canto para atacar a los rivales.\nSu Entrenador deberá velar por que sus cuerdas\nvocales estén siempre en perfecto estado."
        ko:
          sun: "물의 풍선을 노래로 컨트롤한다.\n그 멜로디는 동료에게 배우며\n대대로 무리에 전해진다."
          moon: "노랫소리를 활용하여 싸운다.\n매일 목 상태 관리는\n트레이너의 중요한 역할이다."
        zh_simp:
          sun: "用歌声操纵水做的气球。\n这个旋律会在伙伴间学习，\n被一代代地群体传承下去。"
          moon: "灵活运用歌声来战斗。\n每天对嗓子的保养\n是训练家的重要任务。"
        zh_trad:
          sun: "用歌聲操縱水氣球。\n這個旋律會在夥伴間互相學習，\n在群體中一代代地傳承下去。"
          moon: "靈活運用歌聲來戰鬥。\n每天保養牠的喉嚨，\n是訓練家的重要任務。"
