      descriptions:
        jp_kana:
          sun: "みぎうでから　とびだす　どくえきに\nちゅうい。　ちょっと　かかるだけで\nみちの　どくそに　おかされる。"
          moon: "あるじき　アローラで　ばくはつてきに\nふえたが　ベトベターが　きてからは\nそのかずは　ガクンと　へった。"
        jp_kanji:
          sun: "右腕から　飛びだす　毒液に\n注意。　ちょっと　かかるだけで\n未知の　毒素に　冒される。"
          moon: "ある時期　アローラで　爆発的に\n増えたが　ベトベターが　来てからは\nその数は　ガクンと　減った。"
        en:
          sun: "Beware the poisonous liquid it shoots from its\nright arm. If even a little of it gets on you, you’ll\nexperience the effects of the unidentified toxin."
          moon: "For a time, their numbers increased explosively\nin Alola. Since the arrival of Grimer, their\npopulation has decreased dramatically."
        fr:
          sun: "Méfiez-vous du poison qu’il projette de son\nbras droit, sans quoi ses toxines non identifiées\nvous feront passer un sale quart d’heure."
          moon: "Il fut un temps où les Miasmax étaient LE fléau\nd’Alola. Heureusement, leur population a vite\ndiminué après l’arrivée des Tadmorv."
        it:
          sun: "Dall’arto destro spruzza un veleno altamente\nnocivo. Basta toccarlo per essere contaminati\nda tossine sconosciute."
          moon: "Un tempo questi Pokémon erano molto diffusi\nad Alola, ma il loro numero è notevolmente\ndiminuito con l’arrivo dei Grimer."
        de:
          sun: "Vorsicht vor dem Gift, das es aus seinem\nrechten Arm sprüht! Kleinste Mengen genügen,\num einen unbekannten Giftstoff zu übertragen."
          moon: "Einst haben sie sich explosionsartig in Alola\nausgebreitet. Mit der Ankunft von Sleima hat\nihr Bestand jedoch sehr rasch abgenommen."
        es:
          sun: "El veneno líquido que brota de su brazo derecho\nes muy nocivo. La mera exposición puede llevar\na inhalar accidentalmente toxinas desconocidas."
          moon: "Hubo un tiempo en el que la población de\nGarbodor en Alola era espectacular, pero su\nnúmero se desplomó cuando llegaron los Grimer."
        ko:
          sun: "오른쪽 팔에서 날리는 독액에\n주의. 살짝 닿기만 해도\n미지의 독소가 침범한다."
          moon: "한때 알로라에서 폭발적으로\n늘었지만 질퍽이가 오고 난 뒤로\n개체 수가 크게 줄었다."
        zh_simp:
          sun: "要注意从右臂喷出的毒液。\n只要沾到一点点，\n就会被未知的毒素侵袭。"
          moon: "某个时期在阿罗拉呈爆发式增长，\n但是臭泥来了之后，\n数量一下子减少了。"
        zh_trad:
          sun: "要注意從右臂噴出的毒液。\n只要沾到一點點，\n就會被未知的毒素侵襲。"
          moon: "在阿羅拉的數量從某個時期開始\n爆炸性增加，但是自從臭泥來了之後，\n數量一下子便減少了。"
