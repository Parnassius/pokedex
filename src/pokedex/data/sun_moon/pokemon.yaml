      descriptions:
        jp_kana:
          sun: "もっとも　うつくしい　ポケモンとも\nよばれ　おおくの　げいじゅつかに\nインスピレーションを　あたえてきた。"
          moon: "すんだ　みずうみの　そこに　すむ。\nせんそうが　おこるとき　あらわれ\nひとびとの　こころを　いやす。"
        jp_kanji:
          sun: "最も　美しい　ポケモンとも\n呼ばれ　多くの　芸術家に\nインスピレーションを　与えてきた。"
          moon: "澄んだ　湖の　底に　棲む。\n戦争が　起こるとき　現れ\n人々の　心を　いやす。"
        en:
          sun: "Milotic has provided inspiration to many artists.\nIt has even been referred to as the most\nbeautiful Pokémon of all."
          moon: "It lives at the bottom of clear lakes. In times of\nwar, it shows itself, which soothes people’s\nminds and hearts."
        fr:
          sun: "Célébré comme l’un des plus beaux Pokémon,\nil sert souvent de modèle et d’inspiration aux\nplus grands artistes."
          moon: "Il vit au fond des lacs à l’eau claire. Il se révèle\naux hommes en temps de guerre et apaise\nleurs cœurs meurtris."
        it:
          sun: "È considerato il Pokémon più bello del mondo\ned è fonte d’ispirazione per tantissimi artisti."
          moon: "Vive in laghi dalle acque cristalline.\nQuando scoppia una guerra, compare\nper placare i cuori degli esseri umani."
        de:
          sun: "Milotic soll das schönste aller Pokémon sein.\nEs hat schon so manchem Künstler\nals Quelle der Inspiration gedient."
          moon: "Es lebt auf dem Grund von klaren, ungetrübten\nSeen. Zu Kriegszeiten taucht es empor, um die\nMenschen zu besänftigen."
        es:
          sun: "Se dice que es el Pokémon más bello. Ha sido\nla fuente de inspiración de un gran número de\nartistas."
          moon: "Milotic vive en lo más profundo de lagos de\nagua cristalina. En tiempos de guerra aparece\npara calmar el corazón de los hombres."
        ko:
          sun: "가장 아름다운 포켓몬으로\n불리며 많은 예술가에게\n영감을 주고 있다."
          moon: "맑은 호수 바닥에 산다.\n전쟁이 일어날 때 나타나\n사람들의 마음을 치유한다."
        zh_simp:
          sun: "也被称为最美的宝可梦，\n一直给予许多艺术家灵感。"
          moon: "栖息在清澈的湖底。\n在发生战争时出现，\n治愈人们的心。"
        zh_trad:
          sun: "也被稱為最美的寶可夢，\n一直以來帶給了藝術家無數靈感。"
          moon: "棲息在清澈的湖底。\n在發生戰爭時出現，\n治癒人們的心。"
