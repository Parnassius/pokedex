        en:
          sun: "It changes its form depending on the weather.\nChanges in the temperature or humidity\nappear to affect its cellular structure."
          moon: "Its form changes on its own, due to its cells’\nsensitive reactions to temperature and humidity."
        fr:
          sun: "Son apparence change en fonction du temps.\nLes changements de température et d’humidité\ninfluenceraient sa structure cellulaire."
          moon: "Comme ses cellules réagissent au moindre\nchangement de température ou d’humidité, il ne\ncontrôle pas ses changements d’apparence."
        it:
          sun: "Le sue cellule reagiscono all’umidità\ne alla temperatura, facendogli assumere\nun aspetto diverso a seconda del clima."
          moon: "Il suo aspetto varia in base all’umidità\ne alla temperatura, che ne influenzano\nla struttura molecolare."
        de:
          sun: "Es ändert seine Erscheinung je nach Wetter.\nSeine Zellen reagieren anscheinend auf\nTemperatur- und Feuchtigkeitsschwankungen."
          moon: "Seine Zellen reagieren empfindlich auf\nTemperatur und Feuchtigkeit, wodurch sich\nunweigerlich seine Gestalt verändert."
        es:
          sun: "Cambia de apariencia en función del tiempo\natmosférico. Se cree que las variaciones en la\ntemperatura y la humedad afectan a sus células."
          moon: "Sus células captan la más mínima variación en la\ntemperatura y la humedad, y cambian la forma\nde este Pokémon de manera espontánea."
        ko:
          sun: "날씨에 따라 모습을 바꾼다.\n기온과 습도의 변화가\n세포에 영향을 준다고 한다."
          moon: "기온이나 습도에 세포가\n민감하게 반응해 모습이\n멋대로 변해버린다."
        zh_simp:
          sun: "根据天气而改变样子。\n听说气温和湿度的变化\n对细胞有影响。"
          moon: "细胞对气温和湿度的反应很敏感，\n导致样子会随意地变化。"
        zh_trad:
          sun: "會隨著天氣而改變樣子。\n氣溫和濕度的變化似乎會\n對牠的細胞產生影響。"
          moon: "細胞會靈敏地反應氣溫和濕度，\n導致樣子不由自主地變化。"
    castform_sunny_form:
      form_id: 1
      names:
        jp_kana: たいようのすがた
        jp_kanji: たいようのすがた
        en: Sunny Form
        fr: Forme Solaire
        it: Forma Sole
        de: Sonnenform
        es: Forma Sol
        ko: 태양의 모습
        zh_simp: 太阳的样子
        zh_trad: 太陽的樣子
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          sun: "よく　はれた　ひの　ポワルンの\nすがた。　ひふに　ふれると　いがいに\nあついので　ちゅうい　しよう。"
          moon: "かいせいに　めぐまれたときの\nポワルンの　すがた。　からだは\nポカポカと　ほてっているぞ。"
        jp_kanji:
          sun: "よく　晴れた　日の　ポワルンの\n姿。　皮膚に　触れると　意外に\n熱いので　注意　しよう。"
          moon: "快晴に　恵まれたときの\nポワルンの　姿。　身体は\nポカポカと　ほてっているぞ。"
        en:
          sun: "This is the form Castform takes on the\nbrightest of days. Its skin is unexpectedly hot\nto the touch, so approach with care."
          moon: "This is Castform’s form when basking in fair\nweather. Its body is warm and toasty."
        fr:
          sun: "Morphéo prend cette apparence les jours\nensoleillés. Attention à ne pas le toucher dans\ncet état, car sa peau est très chaude."
          moon: "Morphéo prend cette apparence lorsqu’il y a\ndu soleil. Son corps devient alors plus chaud."
        it:
          sun: "È la forma che Castform assume nei giorni\ndi sole. Bisogna fare attenzione a toccarlo\nperché la sua pelle è più calda di quanto sembri."
          moon: "È la forma di Castform quando il sole brilla\nnel cielo. La temperatura del suo corpo sale\ne inizia a irradiare calore."
        de:
          sun: "Diese Gestalt nimmt Formeo an sonnigen\nTagen an. Man sollte sich hüten, es anzufassen,\ndenn seine Haut ist außergewöhnlich heiß."
          moon: "Diese Gestalt nimmt Formeo bei heiterem Wetter\nan. Sein Körper glüht und strahlt dabei eine\nwohlige Wärme aus."
        es:
          sun: "Castform adopta esta forma cuando el sol brilla\ncon fuerza. Conviene tener cuidado al tocarlo,\nya que su piel alcanza altas temperaturas."
          moon: "Castform adopta esta forma cuando hace un\ntiempo espléndido. Su cuerpo comienza a\nirradiar calor."
        ko:
          sun: "맑은 날의 캐스퐁의 모습이다.\n피부에 닿으면 생각보다\n뜨거우니 주의하자."
          moon: "쾌청한 날씨에 영향을 받은\n캐스퐁의 모습. 몸은\n따끈따끈하게 달아올라 있다."
        zh_simp:
          sun: "万里无云时飘浮泡泡的样子。\n如果接触到皮肤，会出人意料的热。\n所以要小心哦。"
          moon: "受惠于晴朗天气时的\n飘浮泡泡的样子。\n身体被照得暖洋洋的。"
        zh_trad:
          sun: "飄浮泡泡在萬里無雲時的樣子。\n如果接觸到皮膚，會出人意料的燙，\n所以要小心哦。"
          moon: "遇到萬里無雲的好天氣時\n飄浮泡泡的樣子。\n身體被照得暖洋洋的。"
    castform_rainy_form:
      form_id: 2
      names:
        jp_kana: あまみずのすがた
        jp_kanji: あまみずのすがた
        en: Rainy Form
        fr: Forme Eau de Pluie
        it: Forma Pioggia
        de: Regenform
        es: Forma Lluvia
        ko: 빗방울의 모습
        zh_simp: 雨水的样子
        zh_trad: 雨水的樣子
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          sun: "あめに　したたる　ポワルンの　すがた。\nからだを　おすと　スポンジの　ように\nすこし　みずが　しみだしてくる。"
          moon: "ふりしきる　あめに　うたれる\nポワルンの　すがた。　からだは\nしっけを　おびて　ぬめっている。"
        jp_kanji:
          sun: "雨に　滴る　ポワルンの　姿。\n身体を　押すと　スポンジの　ように\n少し　水が　しみだしてくる。"
          moon: "降りしきる　雨に　打たれる\nポワルンの　姿。　身体は\n湿気を　帯びて　ぬめっている。"
        en:
          sun: "This is the form Castform takes when soaked\nwith rain. When its body is compressed, water\nwill seep out as if from a sponge."
          moon: "This is Castform’s form during a downpour of\nrain. Its body retains moisture and gets slippery."
        fr:
          sun: "Morphéo prend cette apparence les jours de\npluie. Si l’on presse son corps dans cet état, un\npeu d’eau s’en échappe, comme d’une éponge."
          moon: "Morphéo prend cette apparence quand il est\nsous la pluie. Son corps est imbibé d’humidité."
        it:
          sun: "Castform assume questa forma quando piove.\nIl suo corpo diventa come una spugna e,\nse lo si stringe, rilascia un po’ d’acqua."
          moon: "È la forma di Castform quando è bagnato dalla\npioggia. Il suo corpo trattiene l’umidità e diventa\nscivoloso."
        de:
          sun: "Diese Gestalt nimmt Formeo an Regentagen an.\nDrückt man seinen Körper, tritt Wasser aus wie\nbei einem Schwamm."
          moon: "Diese Gestalt nimmt Formeo bei starkem Regen\nan. Sein Körper hat sich mit Feuchtigkeit\nvollgesaugt und ist deshalb ganz glitschig."
        es:
          sun: "Castform adopta esta forma cuando llueve.\nSu cuerpo es como una esponja y suelta\nagua con solo presionarlo ligeramente."
          moon: "Castform adopta esta forma cuando llueve a\ncántaros. Su cuerpo se empapa de humedad y\nse vuelve escurridizo."
        ko:
          sun: "비에 젖은 캐스퐁의 모습이다.\n몸을 누르면 스폰지처럼\n조금 물이 배어 나온다."
          moon: "계속해서 내리는 비를 맞은\n캐스퐁의 모습. 몸은\n습기를 머금어 축축하다."
        zh_simp:
          sun: "被雨淋到时飘浮泡泡的样子。\n如果按它的身体，\n就会像海绵一样渗出些水来。"
          moon: "被下个不停的雨淋到的\n飘浮泡泡的样子。\n身体带着潮气，滑溜溜的。"
        zh_trad:
          sun: "飄浮泡泡被雨淋到時的樣子。\n如果按牠的身體，\n就會像海綿一樣滲出水來。"
          moon: "被下個不停的雨淋到的\n飄浮泡泡的樣子。\n身體帶著濕氣而滑溜溜的。"
    castform_snowy_form:
      form_id: 3
      names:
        jp_kana: ゆきぐものすがた
        jp_kanji: ゆきぐものすがた
        en: Snowy Form
        fr: Forme Blizzard
        it: Forma Nuvola di Neve
        de: Schneeform
        es: Forma Nieve
        ko: 설운의 모습
        zh_simp: 雪云的样子
        zh_trad: 雪雲的樣子
