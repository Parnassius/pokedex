        fr:
          sun: "Personne ne sait si cette Ultra-Chimère venue\nd’un autre monde montre ses muscles pour être\nadmirée ou pour intimider ceux qu’elle rencontre."
          moon: "L’une des mystérieuses Ultra-Chimères.\nOn l’aurait aperçue réduisant un camion à benne\nen miettes d’un seul coup de poing."
        it:
          sun: "È un’Ultracreatura arrivata da un altro mondo.\nEsibisce i propri muscoli, ma non è chiaro se\nlo faccia per orgoglio o a scopo intimidatorio."
          moon: "È una delle misteriose forme di vita note come\nUltracreature ed è stata vista ridurre in frantumi\nun camion con un solo pugno."
        de:
          sun: "Eine Ultrabestie aus einer anderen Welt.\nNiemand weiß, ob sie ihren Körper aus Stolz\noder zur Abschreckung stählt."
          moon: "Eine rätselhafte Ultrabestie, die angeblich mit\neinem einzigen Schlag einen beladenen Laster\npulverisieren kann."
        es:
          sun: "Un Ultraente procedente de otro mundo. Se\ndesconoce si exhibe su robusto cuerpo a modo\nde amenaza o para que lo admiren."
          moon: "Un Ultraente rodeado de misterio. Se le ha visto\nreducir a añicos un camión de un solo puñetazo."
        ko:
          sun: "다른 세계에서 나타난 UB이다.\n스스로 몸을 보여주는 행동이\n자랑인지 위협인지 알 수 없다."
          moon: "정체불명의 생물 UB. 한 방의\n펀치로 덤프트럭을 분쇄하는\n광경이 목격되었다."
        zh_simp:
          sun: "从其他世界出现的究极异兽。\n会向人展现自己的身体，\n但不知道是出于自豪还是威吓。"
          moon: "谜一般的生物究极异兽。\n被目击到了一拳把翻斗车\n打得粉碎的光景。"
        zh_trad:
          sun: "來自另一個世界的ＵＢ。\n會主動向人展示自己的身體，\n但不知道是想要自豪還是威嚇。"
          moon: "謎一般的生物──ＵＢ。\n被目擊到了一拳把大卡車\n打得粉碎的情景。"
