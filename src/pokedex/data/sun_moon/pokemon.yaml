      descriptions:
        jp_kana:
          sun: "ひとや　ポケモンの　かんじょうや\nしぜんの　ようすを　はどう　という\nなみの　かたちで　みているのだ。"
          moon: "ひとばんじゅう　はしっていられる\nタフさが　あり　がんばりや　だが\nまだまだ　ひよっこ　なのだ。"
        jp_kanji:
          sun: "人や　ポケモンの　感情や\n自然の　様子を　波動　という\n波の　形で　みているのだ。"
          moon: "一晩中　走っていられる\nタフさが　あり　頑張り屋　だが\nまだまだ　ひよっ子　なのだ。"
        en:
          sun: "It can discern the physical and emotional states\nof people, Pokémon, and other natural things\nfrom the shape of their aura waves."
          moon: "It’s tough enough to run right through the night,\nand it’s also a hard worker, but it’s still just\na youngster."
        fr:
          sun: "Il perçoit sous forme d’ondes les émotions\ndes humains et des Pokémon, ainsi que tout ce\nqui l’entoure."
          moon: "Comme il peut passer la nuit entière à courir,\nil paraît très robuste et persévérant, mais\nau fond, c’est encore un bébé."
        it:
          sun: "È in grado di percepire la natura e le emozioni\ndi Pokémon ed esseri umani sotto forma di onde."
          moon: "Pur essendo così piccolo, ha un’incredibile\nenergia che gli permette di correre anche per\nuna notte intera."
        de:
          sun: "Es sieht sowohl die Gefühle von Menschen\nund Pokémon als auch die ihn umgebende Natur\nin Form von Wellen, die Aura genannt werden."
          moon: "Dieses junge Pokémon ist bereits so robust und\nwillensstark, dass es die ganze Nacht hindurch\nrennen kann."
        es:
          sun: "Percibe en forma de ondas las emociones de\nPokémon y humanos."
          moon: "Es un Pokémon valiente y perseverante\ncapaz de pasarse toda una noche corriendo,\naunque en el fondo no es más que un bebé."
        ko:
          sun: "사람과 포켓몬의 감정이나\n자연의 상태를 파동이라는\n파장의 형태로 느낀다."
          moon: "밤새 달릴 수 있는 지구력을\n갖고 있고 노력가지만\n아직 햇병아리다."
        zh_simp:
          sun: "以“波导”这种波的形式\n观察人和宝可梦的感情，\n以及自然的样子。"
          moon: "能跑整整一晚上，\n是非常坚毅勤奋的家伙，\n不过仍然是毛头小子。"
        zh_trad:
          sun: "以「波導」這種波的形式\n觀察人和寶可夢的感情，\n以及自然的樣子。"
          moon: "能跑整整一晚上，\n是非常堅毅努力的傢伙，\n不過仍然是毛頭小子。"
lucario:
  species_id: 448
  names:
    jp_kana: ルカリオ
    jp_kanji: ルカリオ
    en: Lucario
    fr: Lucario
    it: Lucario
    de: Lucario
    es: Lucario
    ko: 루카리오
    zh_simp: 路卡利欧
    zh_trad: 路卡利歐
  forms:
    lucario:
      form_id: 0
      base_stats:
        hp: 70
        attack: 110
