        - water_3
      abilities:
        - illuminate
        - natural_cure
      hidden_ability: analytic
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          sun: "かがやく　コアから　なぞの　でんぱを\nそうじゅしん　していると　いう。\nちかづくと　ずつうが　することも。"
          moon: "アブストラクトな　ボディの　せいで\nうちゅうからの　しんりゃくしゃ　ではと\nじもとの　ひとは　うわさ　している。"
        jp_kanji:
          sun: "輝く　コアから　謎の　電波を\n送受信　していると　いう。\n近づくと　頭痛が　することも。"
          moon: "アブストラクトな　ボディの　せいで\n宇宙からの　侵略者　ではと\n地元の　人は　噂　している。"
        en:
          sun: "Its shining core is thought to receive and\ntransmit enigmatic signals. It has been known\nto cause headaches in those who approach it."
          moon: "Its unusual body shape, reminiscent of abstract\nart, led local people to spread rumors that this\nPokémon may be an invader from outer space."
        fr:
          sun: "Son cœur lumineux envoie et reçoit des signaux\nmystérieux. Ils donnent la migraine à quiconque\ns’en approche."
          moon: "La forme abstraite de son corps ne ressemble à\nrien de connu. On raconte dans les campagnes\nqu’il s’agit d’un envahisseur venu de l’espace."
        it:
          sun: "Si dice che il suo nucleo brillante emetta e riceva\nmisteriosi segnali radio.\nStargli vicino può far venire mal di testa."
          moon: "A causa dell’insolita forma del suo corpo, che\nmolti definiscono astratta, gira voce che si\ntratti di un invasore alieno."
        de:
          sun: "Offenbar sendet und empfängt sein leuchtender\nKern mysteriöse Radiowellen. Kommt man ihm\nzu nahe, löst es eventuell Kopfschmerzen aus."
          moon: "Aufgrund seiner ungewöhnlichen Körperform\nhegen viele Einheimische den Verdacht, es sei\nin Wirklichkeit ein Eindringling aus dem All."
        es:
          sun: "Su brillante núcleo emite y recibe extrañas\nseñales de radio que pueden causarle jaquecas\na cualquiera que se aproxime demasiado."
          moon: "Corre el rumor de que Starmie es un invasor del\nespacio exterior, debido a la forma tan peculiar\nde su cuerpo."
        ko:
          sun: "빛나는 핵으로부터 의문의 전파를\n송수신하고 있다고 한다.\n다가가면 두통이 생길 때도 있다."
          moon: "추상적인 몸 때문에\n우주에서 온 침략자가 아닐까 하고\n그 지방 사람들은 말한다."
        zh_simp:
          sun: "据说会从闪着光的内核\n收发神秘的电波。\n靠近的话可能会头痛。"
          moon: "因为身体外形很抽象的缘故，\n被当地的人谣传为来自宇宙的侵略者。"
        zh_trad:
          sun: "據說會從發光的核心\n收發神秘的電波。\n靠近的話可能會感到頭痛。"
          moon: "因為身體的造型很抽象，\n被本地的人謠傳為來自宇宙的侵略者。"
