      descriptions:
        jp_kana:
          sun: "しょっかくに　ある　めだまもようで\nてきを　いかく。　４まいの　はねで\nぜんごさゆうに　とびまわる。"
          moon: "はねや　しょっかくは　しっけが\nにがて。　あめあがりには　たいようの\nほうを　むいて　からだを　かわかす。"
        jp_kanji:
          sun: "触角に　ある　目玉模様で\n敵を　いかく。　４枚の　羽で\n前後左右に　飛びまわる。"
          moon: "羽や　触角は　湿気が\n苦手。　雨上がりには　太陽の\nほうを　向いて　身体を　乾かす。"
        en:
          sun: "It intimidates enemies with the eye-like\npatterns on its antennae. Its four wings\nallow it to fly in any direction."
          moon: "Its wings and antennae don’t cope well with\nmoisture. After a rain, it faces sunward to\ndry off."
        fr:
          sun: "Ses antennes semblables à des yeux servent\nà intimider ses ennemis, et ses quatre ailes lui\npermettent de voler dans toutes les directions."
          moon: "Ses ailes et ses antennes tolèrent mal l’humidité.\nEn cas de pluie, ce Pokémon se réfugie là où\nle soleil brille pour y faire sécher son corps."
        it:
          sun: "Intimorisce i nemici con i motivi a forma di\nocchio sulle antenne. Vola libero in ogni\ndirezione agitando le sue quattro ali."
          moon: "Le ali e le antenne sono molto sensibili\nall’umidità. Se ha piovuto, vola al sole per\nfarle asciugare."
        de:
          sun: "Schüchtert seine Feinde mit den augenähnlichen\nMustern auf seinen Antennen ein. Kann dank\nseiner vier Flügel frei in alle Richtungen fliegen."
          moon: "Seine Flügel und Fühler sind empfindlich gegen\nFeuchtigkeit. Nachdem es geregnet hat, streckt\nes sie gen Sonne, um sie zu trocknen."
        es:
          sun: "Amenaza a sus enemigos con las grandes\npupilas de sus antenas. Sus cuatro alas le\npermiten volar en cualquier dirección."
          moon: "Sus alas y antenas son muy sensibles a la\nhumedad. Cuando deja de llover se dirige\nvolando hacia el sol para secarlas."
        ko:
          sun: "더듬이에 있는 눈알 모양으로\n적을 위협한다. 4개의 날개로\n전후좌우로 날아다닌다."
          moon: "날개와 더듬이는 습기에 약하다.\n비가 갠 뒤에는 태양 쪽을\n향해 몸을 말린다."
        zh_simp:
          sun: "用触角上的眼珠花纹威吓敌人。\n用４根翅膀前后左右灵活飞行。"
          moon: "翅膀和触角很怕湿气。\n雨后会朝着太阳的方向晒干身体。"
        zh_trad:
          sun: "用觸角上的眼珠花紋威嚇敵人。\n用４根翅膀前後左右靈活飛行。"
          moon: "翅膀和觸角很怕濕氣。\n雨後會朝著太陽的方向曬乾身體。"
