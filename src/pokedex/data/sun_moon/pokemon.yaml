        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - poison
        - flying
      egg_groups:
        - flying
      abilities:
        - inner_focus
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          sun: "ひるまは　ほらあなで　ねている。\nめが　ないので　ちょうおんぱで\nまわりを　かくにんしながら　とぶ。"
          moon: "ひの　ひかりを　あびると　ヤケドする。\nつかう　ちょうおんぱの　しんどうは\nむれに　よって　びみょうに　ちがう。"
        jp_kanji:
          sun: "昼間は　洞穴で　寝ている。\n目が　ないので　超音波で\n周りを　確認しながら　飛ぶ。"
          moon: "日の　光を　浴びると　火傷する。\n使う　超音波の　振動は\n群れに　よって　微妙に　違う。"
        en:
          sun: "It sleeps in caves during the day. It has no eyes,\nso to check its surroundings while flying, it\nemits ultrasonic waves."
          moon: "When exposed to sunlight, they suffer burns.\nThe frequency of their ultrasonic waves can\ndiffer slightly from colony to colony."
        fr:
          sun: "Il dort dans des grottes pendant la journée.\nComme il n’a pas d’yeux, il vole en se repérant\ngrâce à ses ultrasons."
          moon: "S’il vole en journée, la lumière du soleil brûle\nsa peau. La fréquence de ses ultrasons est\nlégèrement différente d’un groupe à l’autre."
        it:
          sun: "Di giorno dorme dentro le grotte.\nNon ha occhi e quando vola emette ultrasuoni\ntramite i quali percepisce l’ambiente circostante."
          moon: "L’esposizione alla luce del sole gli provoca delle\nbruciature. La frequenza degli ultrasuoni che\nemette varia da un gruppo all’altro."
        de:
          sun: "Tagsüber schläft es in Höhlen. Da es keine\nAugen hat, erschließt es sich seine Umgebung\nim Flug durch das Aussenden von Schallwellen."
          moon: "Sonnenlicht verursacht bei ihm Verbrennungen.\nDie Frequenz seiner Ultraschallwellen variiert\nvon Schwarm zu Schwarm."
        es:
          sun: "Duerme en cuevas durante el día. Como no tiene\nojos, se guía emitiendo ultrasonidos cuando\nvuela."
          moon: "Si se expone al sol, puede sufrir quemaduras.\nLa vibración de las ondas ultrasónicas que emite\nvaría, curiosamente, de una colonia a otra."
        ko:
          sun: "낮에는 동굴에서 자고 있다.\n눈이 없어서 초음파로\n주변을 확인하면서 날아다닌다."
          moon: "햇빛을 받으면 화상을 입는다.\n사용하는 초음파의 진동은\n무리에 따라 조금씩 다르다."
        zh_simp:
          sun: "白天在洞穴里睡觉。\n因为没有眼睛，所以用超音波\n一边探测周围，一边飞行。"
          moon: "如果被阳光照射到就会灼伤。\n所使用的超音波的振动\n会因群体不同而有细微差异。"
        zh_trad:
          sun: "白天在洞穴裡睡覺。\n由於沒有眼睛，會利用超音波\n一邊確認周圍環境一邊飛行。"
          moon: "如果被陽光照射到就會灼傷。\n所使用的超音波的振動\n會因群體不同而有細微差異。"
