        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - vital_spirit
        - pickup
      hidden_ability: run_away
      descriptions:
        jp_kana:
          sun: "キャンキャン　ほえたり　しないので\nマンションぐらしの　トレーナーに\nにんきの　たかい　ポケモン。"
          moon: "かおを　おおう　けは　レーダーの\nやくめを　もっており　たたかう\nあいての　ようすを　さぐるのだ。"
        jp_kanji:
          sun: "キャンキャン　吠えたり　しないので\nマンション暮らしの　トレーナーに\n人気の　高い　ポケモン。"
          moon: "顔を　覆う　毛は　レーダーの\n役目を　持っており　戦う\n相手の　様子を　探るのだ。"
        en:
          sun: "Because it doesn’t yelp, it’s extremely popular\nwith Trainers who live in apartment buildings."
          moon: "The long fur surrounding its face functions as\nradar, enabling it to probe the condition of its\nbattle opponents."
        fr:
          sun: "Très sage, il n’aboie et ne mord pas sans raison,\nce qui en fait un Pokémon domestique très\napprécié des Dresseurs casaniers."
          moon: "Les poils qui masquent son visage lui servent\nde radar, et lui permettent ainsi d’évaluer\nla position et la puissance de ses ennemis."
        it:
          sun: "Niente affatto rumoroso, è molto popolare\ntra gli Allenatori che vivono nei condomini."
          moon: "I lunghi peli che gli coprono il muso fungono\nda radar e gli permettono di capire le condizioni\ndel nemico durante le lotte."
        de:
          sun: "Es jault nicht, weswegen es bei Trainern, die in\nApartmenthäusern wohnen, sehr beliebt ist."
          moon: "Das Fell auf seinem Gesicht fungiert als Radar,\nmit dem es Gegner aufspürt."
        es:
          sun: "No suele ladrar mucho, por lo que resulta muy\npopular entre los Entrenadores que viven\nen apartamentos."
          moon: "Los mechones que le cubren el rostro actúan\ncomo un radar con el que averiguan la\nenvergadura de posibles contrincantes."
        ko:
          sun: "컹컹 짖거나 하지 않으므로\n맨션에 사는 트레이너에게\n인기가 많은 포켓몬이다."
          moon: "얼굴을 둘러싼 털은\n레이더 역할을 하여\n싸우는 상대의 상태를 살핀다."
        zh_simp:
          sun: "因为不会汪汪汪地叫个不停，\n所以对于住在公寓里的训练家\n是人气很高的宝可梦。"
          moon: "覆盖着脸部的毛拥有雷达的功能，\n用来探索战斗对手的样子。"
        zh_trad:
          sun: "因為不會汪汪汪地叫個不停，\n所以很受住公寓的訓練家們的歡迎。"
          moon: "覆蓋著臉部的毛擁有雷達的功能，\n用來探測戰鬥對手的狀況。"
herdier:
  species_id: 507
  names:
