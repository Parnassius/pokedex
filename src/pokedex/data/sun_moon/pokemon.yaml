        - battery
      held_items:
        rare: cell_battery
      descriptions:
        jp_kana:
          sun: "たいないに　ちくでんきのうを　もつ。\nキャンプの　ときなど　１ぴき　いると\nとても　ありがたい　ポケモンだ。"
          moon: "くらった　エサを　しょうか　するとき\nはっせいした　でんきエネルギーを\nでんきぶくろに　ためこんでいる。"
        jp_kanji:
          sun: "体内に　蓄電機能を　持つ。\nキャンプの　ときなど　１匹　いると\nとても　ありがたい　ポケモンだ。"
          moon: "喰らった　餌を　消化　するとき\n発生した　電気エネルギーを\n電気袋に　溜め込んでいる。"
        en:
          sun: "Its body is capable of storing electricity. On\ncamping trips, people are grateful to have\none around."
          moon: "From the food it digests, it generates electricity,\nand it stores this energy in its electric sac."
        fr:
          sun: "Avec son corps capable de stocker l’électricité\ncomme une batterie, il a déjà sauvé la mise à\nplus d’un campeur peu prévoyant."
          moon: "Son processus de digestion produit de\nl’électricité, qui est immédiatement stockée\ndans une poche prévue à cet effet."
        it:
          sun: "Può immagazzinare elettricità all’interno del\ncorpo. Per questo la sua compagnia è utile\nquando si va in campeggio."
          moon: "Genera energia elettrica durante la digestione\ne la conserva in una sacca interna."
        de:
          sun: "Speichert Elektrizität in seinem Körper.\nBei einem Campingausflug kann man wohl kein\npraktischeres Pokémon dabeihaben!"
          moon: "Beim Verdauen der Nahrung entsteht\nelektrische Energie, die es in seinem\nStrombeutel speichert."
        es:
          sun: "Almacena electricidad en su cuerpo, lo que\npuede resultar útil en numerosas situaciones,\ncomo al salir de acampada."
          moon: "Al hacer la digestión genera energía eléctrica\nque almacena en la bolsa que posee para tal\nefecto."
        ko:
          sun: "체내에 축전 기능을 갖추고 있다.\n캠핑할 때 1마리 있으면\n아주 고마운 포켓몬이다."
          moon: "먹은 먹이를 소화할 때\n발생하는 전기 에너지를\n전기 주머니에 저장하고 있다."
        zh_simp:
          sun: "拥有在体内蓄电的能力。\n露营等时候有１只这种宝可梦的话，\n会非常值得庆幸。"
          moon: "会将消化吃下的食物时\n所产生的电能储藏在电力袋中。"
        zh_trad:
          sun: "擁有在體內蓄電的能力。\n露營的時候有１隻這種寶可夢在的話，\n是非常值得慶幸的。"
          moon: "吃下食物後進行消化時\n產生的電能會被儲藏在電力袋中。"
vikavolt:
  species_id: 738
  names:
    jp_kana: クワガノン
    jp_kanji: クワガノン
    en: Vikavolt
    fr: Lucanon
