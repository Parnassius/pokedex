        - grass
        - fairy
      egg_groups:
        - grass
      abilities:
        - illuminate
        - effect_spore
      hidden_ability: rain_dish
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          sun: "よなかに　マシェードのすむ　もりに\nいくのは　きけん。　あやしいひかりに\nまどわされ　にどと　かえれなくなる。"
          moon: "てんめつする　ほうしを　ふきだし\nねむりに　いざなう。　ねむった\nえものの　せいきを　すいとる。"
        jp_kanji:
          sun: "夜中に　マシェードの棲む　森に\nいくのは　危険。　怪しい光に\n惑わされ　二度と　帰れなくなる。"
          moon: "点滅する　胞子を　吹き出し\n眠りに　誘う。　眠った\n獲物の　精気を　吸い取る。"
        en:
          sun: "Forests where Shiinotic live are treacherous to\nenter at night. People confused by its strange\nlights can never find their way home again."
          moon: "It emits flickering spores that cause drowsiness.\nWhen its prey succumb to sleep, this Pokémon\nfeeds on them by sucking in their energy."
        fr:
          sun: "Il est risqué de s’aventurer la nuit dans un bois\npeuplé de Lampignon. Attirés par leur lumière\nenvoûtante, certains n’en sont jamais revenus."
          moon: "Il projette des spores clignotantes qui\nhypnotisent et endorment ses proies,\navant de venir absorber leur énergie vitale."
        it:
          sun: "Meglio non avventurarsi di notte in un bosco\nabitato da questi Pokémon, perché le loro luci\nfanno perdere il senso dell’orientamento."
          moon: "Libera spore soporifere che emettono una luce\nintermittente di cui si serve per addormentare\nle sue prede, a cui poi succhia l’energia vitale."
        de:
          sun: "Nachts sollte man Wälder meiden, in denen\nLamellux leben. Ihr unheimliches Licht raubt\njedem die Orientierung."
          moon: "Speit blinkende Sporen, die eine einschläfernde\nWirkung haben. Schläft die Beute ein, wird ihr\ndie Lebenskraft ausgesaugt."
        es:
          sun: "Es peligroso adentrarse por la noche en un\nbosque habitado por Shiinotic. Su luz confunde\na los caminantes, que terminan perdiéndose."
          moon: "Las esporas parpadeantes que despide tienen\nun efecto somnífero. Absorbe la vitalidad de su\npresa cuando esta se queda dormida."
        ko:
          sun: "한밤중에 마셰이드가 사는 숲에\n가는 것은 위험하다. 이상한빛에\n유인되어 다시는 돌아올 수 없게 된다."
          moon: "깜빡이는 포자를 뿜어내어\n잠으로 유도한다. 잠든\n먹이의 정기를 빨아들인다."
        zh_simp:
          sun: "深夜前往灯罩夜菇栖息的森林\n是很危险的。会被怪异的光线\n诱惑，再也回不来了。"
          moon: "喷出闪烁的孢子诱使对方睡眠。\n会吸取睡着了的猎物的精气。"
        zh_trad:
          sun: "深夜前往燈罩夜菇棲息的森林\n是很危險的。會被怪異的光線\n迷惑，從此再也回不來。"
          moon: "會噴出閃爍的孢子讓獵物睡著，\n再從睡著的獵物身上吸取精氣。"
