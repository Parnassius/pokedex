      egg_groups:
        - mineral
      abilities:
        - rock_head
        - sturdy
      hidden_ability: sand_veil
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          sun: "ダイナマイトで　ばくは　しても\nキズひとつ　つかない　からだ　だが\nしっけや　あめは　だいきらい。"
          moon: "１ねんに　１ど　だっぴ。　ぬいだカラは\nつちに　かえり　どじょうを　ゆたかに\nするので　のうかが　あつめている。"
        jp_kanji:
          sun: "ダイナマイトで　爆破　しても\n傷ひとつ　つかない　身体　だが\n湿気や　雨は　大嫌い。"
          moon: "１年に　１度　脱皮。　脱いだ殻は\n土に　かえり　土壌を　豊かに\nするので　農家が　集めている。"
        en:
          sun: "Its body can survive dynamite blasts without\na single scratch, but it hates rain and humidity."
          moon: "Once a year, this Pokémon molts, and its shed\nshell returns to the soil. This process creates\nenriched soil, so farmers collect the shells."
        fr:
          sun: "Son corps est si solide qu’il peut résister à\nl’explosion d’un bâton de dynamite, mais il\ncraint l’humidité et la pluie."
          moon: "Ce Pokémon mue une fois par an. Sa carapace\nse transforme en humus très prisé par les\nagriculteurs."
        it:
          sun: "Il suo corpo non viene scalfito neanche dalla\ndinamite. Tuttavia, teme la pioggia e l’umidità."
          moon: "Fa la muta una volta all’anno. Il guscio\nabbandonato viene recuperato dagli agricoltori\nper le sue proprietà fertilizzanti."
        de:
          sun: "Selbst Sprengstoff kann seinem harten Körper\nnichts anhaben. Es verabscheut Feuchtigkeit\nund Regen."
          moon: "Einmal im Jahr häutet es sich. Die abgestreifte\nHaut wird oft von Bauern eingesammelt, da sie\nsich ausgezeichnet als Dünger verwenden lässt."
        es:
          sun: "Su robusto cuerpo puede soportar una explosión\nde dinamita sin inmutarse, pero no tolera bien ni\nla humedad ni la lluvia."
          moon: "Muda su caparazón una vez al año. En muchas\ngranjas lo aprovechan, pues este se puede\nutilizar para fertilizar el suelo."
        ko:
          sun: "다이너마이트로 폭파해도\n상처 하나 입지 않는 몸이지만\n습기나 비는 아주 싫어한다."
          moon: "1년에 1번 탈피한다. 벗어낸 껍데기는\n흙으로 돌아가 토양을 비옥하게\n해서 농가에서 모으고 있다."
        zh_simp:
          sun: "即使用炸药爆破身体也毫发无伤，\n但非常讨厌湿气和雨。"
          moon: "１年蜕１次皮。\n蜕下的壳掉到土里会让土壤肥沃，\n因此农户会收集起来。"
        zh_trad:
          sun: "堅硬的身體就算\n被炸藥爆破也能毫無損傷，\n但最討厭濕氣和雨水。"
          moon: "每年脫皮１次。\n脫下的皮掉到土裡可讓土壤肥沃，\n因此農戶便會將它收集起來。"
    golem_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 80
        attack: 120
        defense: 130
        special_attack: 55
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 3
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - electric
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: galvanize
      held_items:
        common: cell_battery
      descriptions:
        jp_kana:
          sun: "でんきをおびた　がんせきを　はっしゃ。\nめいちゅう　せずとも　かするだけで\nあいては　しびれ　しっしんする。"
          moon: "がんせきは　れんしゃが　できないので\nそのあたりの　イシツブテを　つかまえ\nせなかに　こめ　はっしゃ　することも。"
        jp_kanji:
          sun: "電気を帯びた　岩石を　発射。\n命中　せずとも　かするだけで\n相手は　痺れ　失神する。"
          moon: "岩石は　連射が　できないので\nそのあたりの　イシツブテを　捕まえ\n背中に　込め　発射　することも。"
        en:
          sun: "It fires rocks charged with electricity. Even if\nthe rock isn’t fired that accurately, just grazing\nan opponent will cause numbness and fainting."
          moon: "Because it can’t fire boulders at a rapid pace,\nit’s been known to seize nearby Geodude and\nfire them from its back."
        fr:
          sun: "Il projette des pierres chargées d’électricité.\nIl suffit qu’elles effleurent leur cible pour que\ncelle-ci perde connaissance."
          moon: "Lorsqu’il n’a plus de pierres à portée de main,\nil ramasse des Racaillou trainant par là pour\nles projeter grâce au canon sur son dos."
        it:
          sun: "Spara rocce elettrizzate. Basta che sfiorino\nil nemico perché questo riceva una scossa\ncosì forte da fargli perdere conoscenza."
          moon: "Se non trova rocce da sparare, acchiappa dei\nGeodude che si trovano nelle vicinanze, li carica\nsulla schiena e li lancia come proiettili."
        de:
          sun: "Es feuert elektrisch geladene Felsen ab. Selbst\neine Schramme genügt, um seine Gegner damit\nbewusstlos zu machen."
          moon: "Wenn es keine Felsen mehr zur Hand hat, fängt\nes manchmal Kleinstein in seiner Nähe, die es\nan seinen Rücken heftet und dann abfeuert."
        es:
          sun: "Lanza rocas cargadas de electricidad. Basta con\nque rocen al enemigo para entumecerlo hasta el\npunto de hacerle perder la consciencia."
          moon: "Cuando no le quedan piedras alrededor, echa\nmano de los Geodude que tenga cerca y los\nlanza como proyectiles."
        ko:
          sun: "전기를 띤 암석을 발사한다.\n명중하지 않고 스치기만 해도\n상대는 마비되어 실신한다."
          moon: "암석은 연사할 수 없어서\n주변의 꼬마돌을 잡아\n등에 넣고 발사할 때도 있다."
        zh_simp:
          sun: "发射出带着电的岩石。\n哪怕没有命中，只是擦到，\n对手也会麻痹而失去意识。"
          moon: "因为无法连续射击岩石，\n所以有时候会捕捉附近的小拳石，\n放入背上后进行发射。"
        zh_trad:
          sun: "發射出帶著電的岩石。\n即使沒有擊中，只是擦到就能\n令對手因麻痺而失去意識。"
          moon: "因無法連續發射岩石，\n所以有時候會捕捉附近的小拳石，\n裝在背上用來發射。"
