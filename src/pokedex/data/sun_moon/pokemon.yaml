        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - sturdy
      descriptions:
        jp_kana:
          sun: "しんだように　まったく　うごかないが\nふれると　ほのかに　あたたかい。\nおおむかしは　ほしのマユと　よばれた。"
          moon: "かたいカラの　なかで　くろいコアに\nなにかが　あつまり　つづけている。\nべつせかいの　ポケモンと　いわれる。"
        jp_kanji:
          sun: "死んだように　まったく　動かないが\n触れると　ほのかに　温かい。\n大昔は　星の繭と　呼ばれた。"
          moon: "硬いカラの　中で　黒いコアに\nなにかが　集まり　続けている。\n別世界の　ポケモンと　いわれる。"
        en:
          sun: "Motionless as if dead, its body is faintly warm to\nthe touch. In the distant past, it was called the\ncocoon of the stars."
          moon: "There’s something accumulating around the\nblack core within its hard shell. People think\nthis Pokémon may come from another world."
        fr:
          sun: "On pourrait le croire mort car il ne bouge pas\ndu tout. Au toucher, il reste tiède. On le\nsurnomme « cocon céleste » depuis l’Antiquité."
          moon: "Sous sa lourde carapace, il amasse secrètement\nquelque chose en son sombre noyau.\nIl viendrait d’un autre monde."
        it:
          sun: "Resta completamente immobile, come se fosse\nmorto, ma al tatto si percepisce un lieve tepore.\nNell’antichità era chiamato “Bozzolo di stella”."
          moon: "Nel nucleo nero all’interno del suo duro\nesoscheletro continua ad accumularsi qualcosa.\nSi dice che provenga da un altro mondo."
        de:
          sun: "Es ist völlig reglos, als wäre es tot. Berührt man\nes, fühlt es sich jedoch leicht warm an. Vor\nlanger Zeit wurde es „Sternenkokon“ genannt."
          moon: "Unter seiner harten Schale häuft sich\nunaufhörlich etwas in seinem schwarzen Kern\nan. Es soll aus einer anderen Welt stammen."
        es:
          sun: "Permanece inmóvil, como si estuviera muerto,\naunque al tocarlo se percibe un ligero calor.\nAntaño se le llamaba Crisálida de las Estrellas."
          moon: "Se dice que es un Pokémon procedente de otro\nmundo. Alrededor del núcleo negro que alberga\nsu duro caparazón parece acumularse algo."
        ko:
          sun: "죽은 것처럼 전혀 움직이지 않지만\n만지면 어렴풋이 따뜻하다.\n아주 옛날에는 달의 고치로 불렸다."
          moon: "단단한 껍질 안의 검은 코어에\n무언가가 계속 모여들고 있다.\n다른 세계의 포켓몬으로 전해진다."
        zh_simp:
          sun: "就像死了一般几乎不动，\n但触碰后有些许温暖。\n在遥远的过去被称为星之茧。"
          moon: "在坚硬外壳内，有什么\n在源源不断地向黑色内核聚集着。\n据说是其他世界的宝可梦。"
        zh_trad:
          sun: "就像死去一樣動也不動，\n但觸碰後會感到些許溫暖。\n在遙遠的過去被稱為星之繭。"
          moon: "在堅硬的外殼內，有著某種東西\n在不斷地向黑色核心聚集著。\n據說是屬於其他世界的寶可夢。"
