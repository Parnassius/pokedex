      egg_groups:
        - dragon
      abilities:
        - rock_head
      hidden_ability: overcoat
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          sun: "カラの　なかでは　ばくはつてきな\nスピードで　さいぼうが　へんかし\nしんかの　じゅんびを　しているぞ。"
          moon: "ほらあなの　おくに　じっと　ひそみ\nなにも　くわず　なにも　のまない。\nなぜ　しなないのかは　ふめいだ。"
        jp_kanji:
          sun: "殻の　中では　爆発的な\nスピードで　細胞が　変化し\n進化の　準備を　しているぞ。"
          moon: "洞穴の　奥に　じっと　潜み\n何も　喰わず　何も　飲まない。\nなぜ　死なないのかは　不明だ。"
        en:
          sun: "The cells within its shell transform with\nexplosive speed, preparing it for evolution."
          moon: "They lurk deep within caves—motionless,\nneither eating nor drinking. Why they don’t die is\nnot known."
        fr:
          sun: "À l’intérieur de sa carapace, ses cellules\nsubissent un bouleversement cataclysmique.\nIl se prépare ainsi à son évolution."
          moon: "Il se cache sans bouger au fond de sa grotte,\nsans eau ni nourriture. Les raisons de sa survie\nsont, à franchement parler, un véritable mystère."
        it:
          sun: "Le cellule all’interno della sua corazza mutano\na velocità vertiginosa in vista dell’evoluzione."
          moon: "Si rintana nelle grotte senza bere né mangiare\nnulla. Gli studiosi non hanno ancora capito\ncome faccia a sopravvivere."
        de:
          sun: "In Draschels Schale vollziehen seine Zellen\nin Vorbereitung auf seine Entwicklung\neine explosionsartige Transformation."
          moon: "Es hält sich in den Tiefen einer Höhle versteckt,\nwo es weder trinkt noch isst. Niemand weiß so\nrecht, wie es eigentlich überleben kann."
        es:
          sun: "En el interior de su coraza, las células se\ntransforman a una velocidad vertiginosa para\npreparar su evolución."
          moon: "Permanece quieto en el fondo de las grutas sin\nprobar bocado ni beber ningún líquido. Resulta\nsorprendente que pueda sobrevivir así."
        ko:
          sun: "껍질 안에서는 폭발적인\n스피드로 세포가 변화하며\n진화의 준비를 하고 있다."
          moon: "동굴 깊숙한 곳에 가만히 숨어\n아무것도 먹지도 마시지도 않는다.\n어째서 죽지 않는지는 의문이다."
        zh_simp:
          sun: "细胞在壳中\n以爆发般的速度变化，\n为进化做准备。"
          moon: "一动不动地潜伏在洞穴深处，\n不吃也不喝。\n不知为何不会死掉。"
        zh_trad:
          sun: "細胞在殼中\n以爆發般的速度變化，\n正在為進化做準備。"
          moon: "一動不動地潛伏在洞穴深處，\n不吃也不喝。\n不知為何不會死掉。"
salamence:
