        special_defense: 0
        speed: 1
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          sun: "ひとなつっこいので　あつかいやすい\nポケモンだが　ひとたび　たたかいに\nなると　とても　あらあらしいぞ。"
          moon: "こうふん　すると　たいおんが\n２ばいまで　あがり　たいないの\nホルモンが　かっぱつに　なるのだ。"
        jp_kanji:
          sun: "人懐っこいので　扱いやすい\nポケモンだが　一度　戦いに\nなると　とても　荒々しいぞ。"
          moon: "興奮　すると　体温が\n２倍まで　上がり　体内の\nホルモンが　活発に　なるのだ。"
        en:
          sun: "This amiable Pokémon is easy to train.\nBut when battle is joined, it shows its\nferocious side."
          moon: "When it’s excited, its temperature can double,\nspiking hormone production in its body."
        fr:
          sun: "C’est un Pokémon affectueux et très facile à\nélever, mais une fois en situation de combat,\nil devient un adversaire implacable."
          moon: "Quand il est tout excité, sa température peut\ndoubler et ses hormones bouillonnent."
        it:
          sun: "È facile da allenare grazie alla sua indole\namichevole, ma nella lotta diventa\nestremamente aggressivo."
          moon: "Quando si innervosisce, la sua temperatura\ncorporea sale fino a raddoppiare e gli ormoni\nribollono."
        de:
          sun: "Ein sehr zutrauliches und pflegeleichtes\nPokémon, das im Kampf jedoch erstaunlich\nwild und ungestüm agiert."
          moon: "Ist es aufgeregt, steigt seine Körpertemperatur\nauf das Doppelte an und seine Hormone\nspielen verrückt."
        es:
          sun: "Su carácter amigable lo convierte en un Pokémon\nmuy dócil. Ahora bien, en cuanto se pone a\ncombatir, se vuelve un adversario implacable."
          moon: "Cuando se exalta, su temperatura corporal llega\na duplicarse y sus hormonas se descontrolan."
        ko:
          sun: "사람을 잘 따라서 다루기 쉬운\n포켓몬이지만 한번 싸움이\n붙으면 매우 거칠어진다."
          moon: "흥분하면 체온이\n2배까지 올라 체내의\n호르몬이 활발해진다."
        zh_simp:
          sun: "和人很亲近，所以是易于训练的\n宝可梦，但一旦进入战斗，\n就会变得非常凶猛。"
          moon: "一兴奋，体温就会上升２倍，\n体内的荷尔蒙就会变得活跃。"
        zh_trad:
          sun: "和人很親近，所以是易於訓練的\n寶可夢，但一旦進入戰鬥，\n就會變得非常兇猛。"
          moon: "一感到興奮，體溫會上升到２倍，\n同時體內的荷爾蒙會變得活躍。"
fletchinder:
  species_id: 662
  names:
    jp_kana: ヒノヤコマ
    jp_kanji: ヒノヤコマ
    en: Fletchinder
    fr: Braisillon
    it: Fletchinder
    de: Dartignis
    es: Fletchinder
    ko: 불화살빈
    zh_simp: 火箭雀
    zh_trad: 火箭雀
