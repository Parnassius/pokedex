        jp_kana:
          x: "からだの　ほとんどが　すいぶん。\nすいしょうのような　めだまから\nふしぎな　ビームを　はっしゃする。"
          y: "うみの　あさい　ところを　ただよう。\nつりびとが　まちがって　つりあげ\nさされる　ことが　おおいと　きく。"
        jp_kanji:
          x: "体の　ほとんどが　水分。\n水晶のような　目玉から\n不思議な　ビームを　発射する。"
          y: "海の　浅い　ところを　漂う。\n釣り人が　間違って　釣り上げ\n刺されることが　多いと　聞く。"
        en:
          x: "Its body is virtually composed of water. It shoots\nstrange beams from its crystal-like eyes."
          y: "Drifts in shallow seas. Anglers who hook them by\naccident are often punished by their stingers."
        fr:
          x: "Son corps est principalement composé d’eau.\nSes yeux cristallins projettent d’étranges rayons."
          y: "Il vit en bord de mer. Les pêcheurs se font souvent\narroser d’acide quand ils en accrochent un."
        it:
          x: "Il suo corpo è quasi interamente composto d’acqua.\nEmette dei raggi misteriosi dagli occhi cristallini."
          y: "Va alla deriva in acque poco profonde. Se pescato\nper sbaglio, colpisce con gli aculei pungenti."
        de:
          x: "Sein Körper besteht aus Wasser. Aus seinen\nkristallartigen Augen verschießt es eigenartige\nStrahlen."
          y: "Dieses Pokémon findet man in flachen Gewässern.\nUnachtsame Gegner empfängt es mit brennendem Gift."
        es:
          x: "Su cuerpo se compone casi en exclusiva de agua.\nLanza extraños rayos con sus ojos cristalinos."
          y: "Va a la deriva a poca profundidad. Si es pescado por\naccidente, el castigo será su punzante ácido."
        ko:
          x: "몸 대부분이 수분이다.\n수정 같은 눈에서\n이상한 빔을 발사한다."
          y: "바다 얕은 곳을 떠다닌다.\n낚시꾼이 실수로 낚아 올려\n찔리는 일이 많다고 한다."
tentacruel:
  species_id: 73
  names:
    jp_kana: ドククラゲ
    jp_kanji: ドククラゲ
