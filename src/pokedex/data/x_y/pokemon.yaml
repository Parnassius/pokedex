          x: "えいえんの　いのちを　わけあたえると\nいわれている。じゅもくの　すがたで\n１０００ねん　ねむり　ふっかつする。"
          y: "あたまの　ツノが　なないろに\nかがやくとき　えいえんの　いのちを\nわけあたえると　いわれている。"
        jp_kanji:
          x: "永遠の　命を　分け与えると\n言われている。樹木の　姿で\n１０００年　眠り　復活する。"
          y: "頭の　ツノが　七色に　輝くとき\n永遠の　命を\n分け与えると　言われている。"
        en:
          x: "Legends say it can share eternal life.\nIt slept for a thousand years in the form\nof a tree before its revival."
          y: "When the horns on its head shine\nin seven colors, it is said to be\nsharing everlasting life."
        fr:
          x: "On dit que ce Pokémon immortel peut offrir ses forces\nvitales. Il a été ranimé après avoir passé 1 000 ans\nendormi sous la forme d’un arbre."
          y: "D’après la légende, quand ses bois brillent de sept\ncouleurs, cela signifie qu’il prodigue la vie éternelle."
        it:
          x: "Si dice che possieda l’immortalità e possa farne dono\nagli altri. Torna in vita dopo aver dormito per\n1000 anni sotto forma di albero."
          y: "Si dice che possieda l’immortalità e che possa farne\ndono agli altri quando le sue corna brillano dei colori\ndell’arcobaleno."
        de:
          x: "Legenden nach kann dieses Pokémon ewiges\nLeben spenden. In Gestalt eines Baumes ist\nes aus seinem tausendjährigen Schlaf erwacht."
          y: "Es heißt, dieses Pokémon spende ewiges Leben,\nsobald das Geweih auf seinem Haupt in sieben\nverschiedenen Farben leuchtet."
        es:
          x: "Según las leyendas, puede compartir el secreto de la\nvida eterna. Ha despertado tras dormir durante mil\naños bajo la apariencia de un árbol."
          y: "Cuando los cuernos de su cabeza brillan en siete\ncolores, se dice que comparte el don de la vida\neterna."
        ko:
          x: "영원한 생명을 나누어 준다고 한다.\n수목의 모습으로 1000년 동안\n잠들고 부활한다."
          y: "머리의 뿔이 일곱 빛깔로\n빛날 때 영원한 생명을\n나눠준다고 전해진다."
