      descriptions:
        jp_kana:
          x: "カロスちほうの　せいたいけいが\nくずれると　すがたを　あらわして\nひめた　ちからを　はっきするらしい。"
          y: "どうくつの　おくふかくで　くらし\nせいたいけいを　はかいする　ものを\nかんししていると　いわれている。"
        jp_kanji:
          x: "カロス地方の　生態系が　崩れると\n姿を　現して\n秘めた　力を　発揮するらしい。"
          y: "洞窟の　奥深くで　暮らし\n生態系を　破壊する者を\n監視していると　言われている。"
        en:
          x: "When the Kalos region’s ecosystem falls into\ndisarray, it appears and reveals its secret power."
          y: "It’s hypothesized that it’s monitoring\nthose who destroy the ecosystem\nfrom deep in the cave where it lives."
        fr:
          x: "Lorsque l’écosystème de Kalos est menacé,\nce Pokémon apparaît et utilise son mystérieux pouvoir."
          y: "Il paraît qu’il vit au fond d’une grotte, d’où il\nsurveillerait les personnes qui détruisent l’écosystème."
        it:
          x: "Secondo le leggende, quando l’equilibrio\ndell’ecosistema della regione di Kalos è in pericolo,\nappare e libera il suo potere misterioso."
          y: "Si dice che viva nelle profondità di una caverna e\nprotegga l’equilibrio dell’ecosistema da qualsiasi\nminaccia."
        de:
          x: "Wenn das Ökosystem der Kalos-Region kippt,\nerscheint dieses Pokémon und offenbart seine\ngeheimen Kräfte."
          y: "Es wird gemutmaßt, dass es von seiner Höhle aus\nall jene beobachtet, die dem Ökosystem Schaden\nzufügen."
        es:
          x: "Cuando el ecosistema de Kalos se encuentra en\npeligro, aparece y revela su poder secreto."
          y: "Vive en las profundidades de las cavernas, desde\ndonde vigila a todos aquellos que se dediquen a\ndestruir el ecosistema."
        ko:
          x: "칼로스지방의 생태계가\n무너지면 모습을 나타내어\n숨겨진 힘을 발휘한다고 한다."
          y: "동굴 깊은 곳에서 지내면서\n생태계를 파괴하는 자를\n감시하고 있다고 전해진다."
