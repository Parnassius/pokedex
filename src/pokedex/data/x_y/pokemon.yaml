        jp_kana:
          x: "たいぼくに　なんども　たいあたりして\nきょうじんな　からだと　くじけない\nこころを　きたえ　あげるのだ。"
          y: "きびしい　けいこを　くりかえして\nつよくなる。どんな　こうげきにも\nたえる　こんじょうの　ポケモン。"
        jp_kanji:
          x: "大木に　何度も　体当たりして\n強靭な　体と　くじけない　心を\n鍛え上げるのだ。"
          y: "きびしい　けいこを　繰り返して\n強くなる。どんな　攻撃にも　耐える\n根性の　ポケモン。"
        en:
          x: "It toughens up by slamming into thick trees over\nand over. It gains a sturdy body and\ndauntless spirit."
          y: "It grows stronger by enduring harsh training. It is a\ngutsy Pokémon that can withstand any attack."
        fr:
          x: "Il fonce sur des arbres larges pour fortifier son corps\nrobuste et son cœur vaillant."
          y: "Il suit un entraînement drastique pour devenir encore\nplus fort. C’est un Pokémon plein de volonté, et\ncapable de faire face à toutes les attaques."
        it:
          x: "Sbattendo a ripetizione contro enormi alberi, si\ncostruisce un corpo e uno spirito indistruttibili."
          y: "Si rafforza allenandosi duramente. Molto coraggioso,\npuò resistere a qualsiasi attacco."
        de:
          x: "Indem es wieder und wieder Bäume rammt,\nerhält es einen zähen Körper und einen\nstahlharten Willen."
          y: "Sein hartes Training macht es stärker. Es ist ein\ntapferes Pokémon, das jeder Attacke trotzen kann."
        es:
          x: "Endurece su cuerpo golpeando grandes árboles sin\nperder jamás el ánimo."
          y: "A base de duro entrenamiento se hace cada vez más\nfuerte. Es tan resistente que puede soportar cualquier\nataque."
        ko:
          x: "큰 나무에 몇 번이나 몸통박치기를\n하며 강인한 몸과 굴하지 않는\n마음을 단련한다."
          y: "힘든 수행을 반복하며\n강해진다. 어떤 공격도\n참아내는 근성의 포켓몬이다."
hariyama:
