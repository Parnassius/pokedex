        jp_kana:
          x: "うみと　りくちで　せいかつする。\nはりてで　タンカーの　ふなぞこに\nあなを　あける　パワーの　もちぬし。"
          y: "はったつした　まえあしで　あいてを\nひっぱたき　きぜつさせると　カラや\nホネまで　まるごと　かみくだいた。"
        jp_kanji:
          x: "海と　陸地で　生活する。\n張り手で　タンカーの　船底に\n穴を　開ける　パワーの　持ち主。"
          y: "発達した　前足で　相手を\nひっぱたき　気絶させると　殻や\nホネまで　まるごと　かみくだいた。"
        en:
          x: "They can live both in the ocean and on land. A slap\nfrom one of them is enough to open a hole in the\nbottom of a tanker."
          y: "It could knock out a foe with a slap from one of its\ndeveloped front appendages and chew it up, shell\nor bones and all."
        fr:
          x: "Il vit sur terre et en mer. Ses bras surpuissants\npeuvent percer des trous dans la coque des\npaquebots."
          y: "Ses bras puissants serrent ses proies jusqu’à\nl’évanouissement. Il les dévore ensuite, carapace et\nos compris."
        it:
          x: "Vive nel mare e sulla terraferma. Ha una forza tale\nda sfondare con un solo colpo il fondo di una nave\ncisterna."
          y: "Un singolo colpo dei suoi arti anteriori può bastare\na far perdere i sensi alla preda e romperne ossa e\ncorazza."
        de:
          x: "Es lebt im Meer und an Land. Es ist so stark,\ndass es mit einem einzigen Hieb ein Loch in\nein Schiff reißen kann."
          y: "Ein Schlag mit seinen ausgeprägten Vorderflossen\nbrachte Gegner zu Fall und brach ihre Knochen\noder Schale."
        es:
          x: "Vive en el mar y en la superficie. Sus garras pueden\nabrir un agujero en el fondo de un petrolero."
          y: "Un golpe con sus desarrolladas aletas delanteras\npuede hacer perder a un rival el conocimiento o\nromperle los huesos."
        ko:
          x: "바다와 육지에서 생활한다.\n손바닥으로 쳐서 배 밑바닥에\n구멍을 내는 파워의 소유자다."
          y: "발달한 앞다리로 상대를\n세게 쳐서 기절시켜 껍데기나\n뼈까지 통째로 깨물어 부쉈다."
