        - oblivious
        - forewarn
      hidden_ability: dry_skin
      descriptions:
        jp_kana:
          x: "こしを　ふるように　あるいている。\nゆだんをすると　おもわず　つられて\nおどってしまうという。"
          y: "にんげんのような　ことばを　はなすが\nまだ　なにをいっているか　ふめいで\nげんざい　けんきゅうされている。"
        jp_kanji:
          x: "腰を　振るように　歩いている。\n油断をすると　思わず　釣られて\n踊ってしまうという。"
          y: "人間のような　言葉を　話すが\nまだ　なにを言っているか　不明で\n現在　研究されている。"
        en:
          x: "It wiggles its hips as it walks. It can\ncause people to dance in unison with it."
          y: "It speaks using a language that sounds human.\nResearch is under way to determine what is\nbeing said."
        fr:
          x: "Il ondule ses hanches en marchant et entraîne les\ngens dans des danses frénétiques."
          y: "Il communique en utilisant un langage qui semble\nêtre humain. Des recherches sont en cours pour\ndéterminer ce qu’il dit."
        it:
          x: "Camminando ancheggia in modo seducente.\nLa gente può essere indotta a seguire la sua danza."
          y: "Parla usando un linguaggio simile a quello umano.\nSono in corso studi per riuscire a interpretarlo."
        de:
          x: "Der beschwingte Gang dieses Pokémon bezaubert\nZuschauer und lässt sie im Takt dazu tanzen."
          y: "Es spricht und benutzt dabei eine Sprache, die der\ndes Menschen sehr ähnelt. Noch wird erforscht,\nwas es wirklich spricht."
        es:
          x: "Camina moviendo las caderas de forma llamativa.\nPuede hacer que la gente baile a su ritmo."
          y: "Habla emitiendo sonidos que parecen humanos. Se\nestá intentando descifrar lo que dice cuando habla."
        ko:
          x: "허리를 흔드는 듯이 걷고 있다.\n방심하면 엉겁결에 따라서\n춤춰버린다고 한다."
          y: "인간처럼 말을 하지만\n아직 무슨 말을 하는지 알 수 없어\n현재 연구 중이다."
