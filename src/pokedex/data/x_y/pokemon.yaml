        en:
          x: "Its enormous, retractable claws can cut through\nmost anything. Its entire body is clad in\nsturdy plates."
          y: "Protected by a hard shell, its body is very sturdy.\nIt skewers prey with its claws to feed."
        fr:
          x: "Ce Pokémon au corps blindé peut allonger ou\nrétracter ses énormes pinces pour embrocher ses\nproies."
          y: "Rien ne peut transpercer la cuirasse d’Armaldo.\nCe Pokémon embroche ses proies avec ses griffes\npour les avaler plus facilement."
        it:
          x: "Cattura il nemico infilzandolo con gli enormi artigli\nretrattili. È rivestito di una robusta corazza."
          y: "Ha un corpo molto resistente, protetto da un duro\nguscio. Infilza le prede con gli artigli per poi cibarsene."
        de:
          x: "Es spießt die Beute mit seinen Scheren auf,\nehe es sie verspeist. Den Körper umgibt\nein robuster Panzer."
