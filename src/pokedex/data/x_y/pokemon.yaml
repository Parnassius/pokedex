      descriptions:
        jp_kana:
          x: "たかい　きの　うえで　くらしている。\nえだから　えだへ　とびうつるとき\nしっぽで　たくみに　バランスをとる。"
          y: "ちからづよい　しっぽだけで\nきの　えだに　ぶらさがって\nからだを　ささえることが　できる。"
        jp_kanji:
          x: "高い　木の上で　暮らしている。\n枝から　枝へ　飛び移るとき\n尻尾で　巧みに　バランスをとる。"
          y: "力強い　尻尾だけで\n木の枝に　ぶら下がって\n体を　支えることが　できる。"
        en:
          x: "It lives atop tall trees. When leaping from branch to\nbranch, it deftly uses its tail for balance."
          y: "Its tail is so powerful that it can use it to grab a\ntree branch and hold itself up in the air."
        fr:
          x: "Il vit sur les plus hautes cimes. Sautant de branche\nen branche, sa queue lui assure un bon équilibre."
          y: "Sa queue est si forte qu’il peut l’utiliser pour se\nsuspendre aux branches des arbres."
        it:
          x: "Vive in cima agli alberi più alti. Usando abilmente\nla coda, mantiene l’equilibrio quando salta di ramo\nin ramo."
          y: "La sua coda è così forte che può appendersi a un\nalbero e rimanere sospeso."
        de:
          x: "Es lebt in den Kronen großer Bäume. Es hüpft von\nAst zu Ast und balanciert mit seinem Schweif."
          y: "Sein Schweif ist so kräftig, dass es sich stundenlang\ndamit an einem Ast in der Luft halten kann."
        es:
          x: "Vive en lo alto de los árboles. Cuando salta de rama\nen rama, usa su cola para equilibrarse."
          y: "Su cola es tan potente que puede usarla para\nagarrarse a la rama de un árbol y no caer."
        ko:
          x: "높은 나무 위에서 살고 있다.\n나뭇가지에서 가지로 건너뛸 때\n꼬리로 능숙하게 밸런스를 잡는다."
          y: "힘이 센 꼬리만으로\n나뭇가지에 매달려서\n몸을 지탱할 수 있다."
sunkern:
  species_id: 191
