          x: "A steel-hard shell protects its tender body.\nIt quietly endures hardships while\nawaiting evolution."
          y: "This Pokémon is vulnerable to attack while its shell\nis soft, exposing its weak and tender body."
        fr:
          x: "Son corps frêle est protégé par sa carapace d’acier.\nIl encaisse les coups durs en attendant d’évoluer."
          y: "Il est vulnérable aux attaques tant que sa carapace\nest molle, car il expose son corps tendre et mou."
        it:
          x: "Ha una corazza dura come l’acciaio che protegge\nil suo fragile corpo. Attende immobile di evolversi."
          y: "Quando la sua corazza è morbida, il corpo fragile di\nquesto Pokémon è più vulnerabile agli attacchi."
        de:
          x: "Der stahlharte Panzer schützt seinen zarten Körper.\nEs wartet geduldig auf seine Entwicklung."
          y: "Während der Panzer dieses Pokémon sehr weich ist,\nbietet er keinen großen Schutz vor Attacken."
        es:
          x: "Su frágil cuerpo está recubierto de una coraza dura\ncomo el acero. Permanece quieto en su desarrollo."
          y: "Este Pokémon es vulnerable al ataque cuando su\ncoraza es blanda y no lo protege del todo."
        ko:
          x: "강철같이 단단한 껍질로\n부드러운 몸을 보호하고 있다.\n진화할 때까지 가만히 참고 있다."
          y: "껍질이 단단해지기 전에\n강한 충격을 받으면\n속이 나와버리니 주의."
