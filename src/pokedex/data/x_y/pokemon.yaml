      descriptions:
        jp_kana:
          x: "はがねの　からだと　こころを　もつ。\nにらみつけるだけで　きょうぼうな\nポケモンも　したがわせてしまう。"
          y: "はがねの　こころと　からだを　もつ。\nひとが　ポケモンを　きずつけたとき\nなかまとともに　ひとを　こらしめた。"
        jp_kanji:
          x: "鋼の　体と　心を　持つ。\nにらみつけるだけで　凶暴な\nポケモンも　従わせてしまう。"
          y: "鋼の　心と　体を　持つ。\n人が　ポケモンを　傷つけたとき\n仲間とともに　人を　こらしめた。"
        en:
          x: "It has a body and heart of steel. Its glare is\nsufficient to make even an unruly Pokémon obey it."
          y: "It has a body and heart of steel. It worked with its\nallies to punish people when they hurt Pokémon."
        fr:
          x: "Il possède un corps et un cœur de fer. Il peut mater\nles Pokémon les plus agressifs d’un simple regard."
          y: "Un corps et un cœur en acier trempé, jadis au service\nde la défense des Pokémon blessés par les humains."
        it:
          x: "Ha un corpo e uno spirito d’acciaio. Gli basta lo\nsguardo per farsi ubbidire anche dai Pokémon più\nferoci."
          y: "Ha un corpo e uno spirito d’acciaio. È comparso con\ni suoi compagni per punire coloro che un tempo\nferirono i Pokémon."
        de:
          x: "Sein Körper und sein Herz sind aus Stahl. Ein böser\nBlick genügt und selbst die wildesten Pokémon\nunterwerfen sich ihm."
          y: "Sein Körper und Herz sind aus Stahl. Gemeinsam\nmit seinen Gefährten bestrafte es alle Menschen,\ndie Pokémon verletzen."
        es:
          x: "Posee un cuerpo y un corazón de acero. Basta una\nmirada suya para que Pokémon violentos le\nobedezcan."
          y: "Posee cuerpo y alma de acero. Junto con sus\ncompañeros, castiga a aquellas personas que hacen\ndaño a Pokémon."
        ko:
          x: "강철의 몸과 마음을 지녔다.\n째려보기만 해도 난폭한\n포켓몬마저도 따르게 된다."
          y: "강철의 마음과 몸을 지녔다.\n사람이 포켓몬을 상처 입혔을 때\n동료와 함께 사람을 벌했다."
