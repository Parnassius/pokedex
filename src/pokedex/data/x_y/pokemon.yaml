      descriptions:
        jp_kana:
          x: "おおあめと　おおつなみで　うみを\nひろげた　しんわの　ポケモン。\nグラードンと　はげしく　たたかった。"
          y: "おおあめを　ふらせる　のうりょくで\nうみを　ひろげたと　いわれている。\nかいこうの　そこで　ねむっていた。"
        jp_kanji:
          x: "大雨と　大津波で　海を　広げた\n神話の　ポケモン。\nグラードンと　激しく　戦った。"
          y: "大雨を　降らせる　能力で\n海を　広げたと　言われている。\n海溝の　底で　眠っていた。"
        en:
          x: "A mythical Pokémon said to have swelled the seas\nwith rain and tidal waves. It battled with Groudon."
          y: "It is said to have widened the seas by causing\ndownpours. It had been asleep in a marine trench."
        fr:
          x: "Ennemi juré de Groudon, la légende dit qu’il a étendu\nles mers en causant déluges et raz de marée."
          y: "On dit qu’il a fait monter les eaux en causant des\npluies diluviennes. Il somnolait dans une fosse marine."
        it:
          x: "Nella mitologia, Kyogre è il Pokémon che ha\nampliato i mari con megaonde e megapiogge.\nNemico di Groudon."
          y: "Si dice che abbia ampliato i mari provocando piogge\ntorrenziali. Si è assopito in una fossa marina."
        de:
          x: "Der Legende nach erschuf sein Regen das Meer.\nEs und Groudon lieferten sich einen langen Kampf."
          y: "Man sagt, es habe die Meere vergrößert, indem es\nes regnen ließ. Es schlief in einem Meeresgraben."
        es:
          x: "Pokémon legendario que aumentó los mares con\ndiluvios y maremotos. Fue un enemigo acérrimo de\nGroudon."
          y: "Se dice que aumentó el nivel del mar a base de\naguaceros. Ha estado durmiendo en una fosa marina."
        ko:
          x: "많은 비와 큰 해일로 바다를\n넓힌 신화의 포켓몬이다.\n그란돈과 격하게 싸웠다."
          y: "많은 비를 내리게 하는 능력으로\n바다를 넓혔다고 전해진다.\n해구의 밑바닥에서 잠들어 있었다."
