      descriptions:
        jp_kana:
          x: "からだの　ちゅうしんで　ひかる\nコアが　あるかぎり　からだが\nちぎれても　さいせい　できる。"
          y: "うみべに　おおく　あらわれ\nよるになると　ちゅうしんが\nあかく　てんめつする。"
        jp_kanji:
          x: "体の　中心で　光る\nコアが　ある限り\n体が　ちぎれても　再生できる。"
          y: "海辺に　多く　現れ\n夜になると　中心が\n赤く　点滅する。"
        en:
          x: "Even if its body is torn, it can regenerate as long as\nthe glowing central core remains intact."
          y: "It appears in large numbers by seashores. At night,\nits central core flashes with a red light."
        fr:
          x: "Même si son corps est détruit, il peut se régénérer\naussi longtemps que son cœur est en bon état."
          y: "On peut voir des Stari en grand nombre près des\ncôtes. La nuit, le centre de son corps clignote\nd’une lumière rouge."
        it:
          x: "Anche se il corpo è lacerato, continua a rigenerarsi\nfinché il nucleo ardente centrale rimane intatto."
          y: "Se ne trovano molti in riva al mare. Di notte, il nucleo\nal centro del corpo lampeggia di una luce rossa."
        de:
          x: "Auch wenn sein Körper nicht mehr intakt ist,\nkann es sich regenerieren, wenn der Kern leuchtet."
          y: "Es taucht in großer Anzahl an Ufern auf.\nNachts leuchtet der Kern in seiner Mitte rot auf."
        es:
          x: "Aunque sus brazos se rompan podrán regenerarse,\nsiempre y cuando su núcleo siga intacto."
          y: "Suele aparecer en grupos en la orilla de la playa. Por\nla noche, el órgano central que tiene brilla con una luz\nroja."
        ko:
          x: "몸의 중심에서 빛나는\n핵이 있는 한 몸이\n찢겨나가도 재생할 수 있다."
          y: "해변에 많이 나타나며\n밤이 되면 가운데가\n빨갛게 깜박거린다."
