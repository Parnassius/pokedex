        jp_kanji:
          x: "雨雲を　呼べる　ポケモンとして\n大昔から　まつられていた。\nときどき　地面に　埋められている。"
          y: "ドータクンに　祈りを　ささげると\n雨が　降り　作物を　育てると\n古代の　人々は　信じていた。"
        en:
          x: "In ages past, this Pokémon was revered as a\nbringer of rain. It was found buried in the ground."
          y: "Ancient people believed that petitioning Bronzong\nfor rain was the way to make crops grow."
        fr:
          x: "Il a longtemps été célébré pour avoir apporté la pluie.\nOn le trouve parfois enterré dans le sol."
          y: "On croyait autrefois que lui adresser des prières\nfaisait pleuvoir et assurait les récoltes."
        it:
          x: "È stato venerato per secoli come Pokémon che porta\nla pioggia. A volte lo si trova sepolto nel terreno."
          y: "Anticamente si credeva Bronzong potesse essere\ninvocato per ottenere pioggia e buoni raccolti."
        de:
          x: "Man verehrt sie schon seit Urzeiten als Regenmacher.\nManchmal findet man eines von ihnen\nim Boden vergraben."
          y: "Früher verehrten die Menschen die Bronzong,\nweil sie sich davon Regen oder gute Ernten erhofften."
        es:
          x: "Desde antaño se adora a este Pokémon para que\npropicie lluvias abundantes. A veces se esconde bajo\ntierra."
          y: "Antaño se creía que rezándole se conjuraba la lluvia\ny se propiciaban las buenas cosechas."
        ko:
          x: "비구름을 부르는 포켓몬으로\n아주 옛날부터 떠받들어졌다.\n가끔 땅에 묻혀 있다."
          y: "동탁군에게 소원을 빌면\n비가 내려 농작물을 자라게 한다고\n고대의 사람들은 믿고 있었다."
