          y: "細長い　体の　形に\n合わせた　巣を　作り\n他の　ポケモンは　入れなくしている。"
        en:
          x: "The mother puts its offspring to sleep by curling up\naround them. It corners foes with speed."
          y: "It makes a nest to suit its long and skinny body.\nThe nest is impossible for other Pokémon to enter."
        fr:
          x: "La femelle s’enroule autour des petits pour les bercer.\nIl accule l’ennemi grâce à sa vitesse."
          y: "Il fabrique un nid qui convient à son corps très fin,\net où lui seul peut entrer."
        it:
          x: "Si addormenta avvolto nell’esile corpo della madre.\nMette all’angolo i nemici con movimenti rapidi."
          y: "Il suo nido è adatto al corpo lungo e magro.\nGli altri Pokémon non riescono a entrarci."
        de:
          x: "Es rollt sich um seine Jungen, wenn diese schlafen\nsollen. Gegnern begegnet es mit Schnelligkeit."
          y: "Sein Nest ist seinem schmalen und dünnen Körper\nangepasst. Kein anderes Pokémon kommt hinein."
        es:
          x: "Acurruca a sus crías para que duerman. Acorrala a los\nenemigos con su enorme velocidad."
          y: "Construye un nido donde introducir su largo y delgado\ncuerpo, en el que no pueden entrar otros Pokémon."
        ko:
          x: "엄마 포켓몬이 가늘고 긴 몸으로\n새끼를 감싸 안아 재운다. 빠른\n움직임으로 상대를 몰아붙인다."
          y: "가늘고 긴 몸의 형태에\n맞춘 둥지를 만들어 다른\n포켓몬은 들어오지 못하게 한다."
hoothoot:
