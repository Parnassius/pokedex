          y: "ジャングルを　ながれる　たいがに\nせいそく。なわばりに　まぎれこんだ\nえものを　しゅうだんで　おそう。"
        jp_kanji:
          x: "集団で　船に　襲いかかり\n船底を　食いちぎり　沈める。\nジャングルの　川に　生息する。"
          y: "ジャングルを　流れる　大河に　生息。\n縄張りに　紛れこんだ　獲物を\n集団で　襲う。"
