          x: "こがらだが　たいおんは　６００ど。\nいきを　すったり　はいたりするたび\nくちと　はなから　ひのこが　もれる。"
          y: "マグマのような　けつえきが\nたいないに　ながれているため\nたいおんは　６００どにも　なる。"
        jp_kanji:
          x: "小柄だが　体温は　６００度。\n息を　吸ったり　吐いたりするたび\n口と　鼻から　火の粉が　漏れる。"
          y: "マグマのような　血液が\n体内に　流れているため\n体温は　６００度にも　なる。"
        en:
          x: "It’s small, but its body temperature is over\n1,100 degrees Fahrenheit. Embers escape its\nmouth and nose when it breathes."
          y: "Its magma-like blood circulates throughout\nits body. Its body’s heat can top\n1,100 degrees Fahrenheit."
        fr:
          x: "La température de son corps peut atteindre 600 °C.\nSon nez et sa bouche laissent échapper des\nflammèches."
          y: "Son sang est chaud comme du magma et la\ntempérature de son corps peut atteindre 600 °C."
        it:
          x: "È di piccole dimensioni, ma la temperatura del suo\ncorpo è di 600 °C. Quando respira emette scintille\nda naso e bocca."
          y: "Il suo sangue assomiglia al magma. La sua\ntemperatura corporea raggiunge i 600 °C."
        de:
          x: "Seine Körpertemperatur misst 600 °C.\nBeim Ein- und Ausatmen springen\nglühende Kohlenstücke aus seinem Mund."
          y: "Durch seinen Körper fließt magmaartiges Blut.\nDie Körpertemperatur kann auf ca. 600 °C steigen."
        es:
          x: "Es pequeño, pero su cuerpo puede llegar a alcanzar\n600 °C. Cuando inspira y espira, expulsa llamas por la\nnariz y por la boca."
          y: "Su sangre es como magma y su temperatura corporal\npuede alcanzar los 600 °C."
        ko:
          x: "작은 몸이지만 체온은 600도다.\n숨을 들이쉬고 내쉴 때마다\n입과 코에서 불꽃이 샌다."
          y: "마그마 같은 혈액이\n체내에 흐르고 있기 때문에\n체온은 600도나 된다."
