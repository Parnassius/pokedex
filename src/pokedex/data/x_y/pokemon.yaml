          y: "すいちゅうの　えものを　おいかける\nうちに　うきぶくろが　はったつした。\nゴムボートのように　ひとを　のせる。"
        jp_kanji:
          x: "発達した　浮き袋で　浮かぶ。\nおぼれた　人を　救助する\n手伝いを　している　ポケモンだ。"
          y: "水中の　獲物を　追いかける　うちに\n浮き袋が　発達した。\nゴムボートのように　人を　乗せる。"
        en:
          x: "It floats using its well-developed flotation sac.\nIt assists in the rescues of drowning people."
          y: "Its flotation sac developed as a result of pursuing\naquatic prey. It can double as a rubber raft."
        fr:
          x: "Il flotte grâce à sa bouée très développée. Il vole au\nsecours des gens sur le point de se noyer."
          y: "Il a développé une bouée pour poursuivre ses proies\naquatiques. Elle fait office de canot gonflable."
        it:
          x: "Nuota con il suo grosso galleggiante e aiuta a\nsoccorrere chi sta per annegare."
          y: "Il suo galleggiante, che funge da gommone, si è\nsviluppato perché caccia le prede nell’acqua."
        de:
          x: "Es treibt mithilfe einer Art Rettungsring auf dem\nWasser und hilft dem, der zu ertrinken droht."
          y: "Da es seit jeher Beute im Wasser jagt,\nentwickelte es einen Rettungsring."
        es:
          x: "Nada gracias a su flotador. Ayuda en los rescates de\ngente que se está ahogando."
          y: "Su flotador se desarrolló a raíz de perseguir presas\nacuáticas. También sirve como balsa."
        ko:
          x: "발달한 부낭으로 뜬다.\n물에 빠진 사람을 구조하는 것을\n돕는 포켓몬이다."
          y: "수중의 먹이를 쫓아가는\n사이에 부낭이 발달했다.\n고무보트처럼 사람을 태운다."
