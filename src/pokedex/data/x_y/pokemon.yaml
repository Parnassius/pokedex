        en:
          x: "It is not satisfied unless it eats over 880 pounds of\nfood every day. When it is done eating, it goes\npromptly to sleep."
          y: "Its stomach can digest any kind of food,\neven if it happens to be moldy or rotten."
        fr:
          x: "Ronflex n’est pas satisfait tant qu’il n’a pas avalé ses\n400 kg de nourriture quotidienne. Dès qu’il a fini de\nmanger, il commence une sieste pour digérer."
          y: "Son estomac peut digérer n’importe quel type de\nnourriture, même quand elle est moisie ou pourrie."
        it:
          x: "Dopo aver trangugiato i suoi immancabili 400 kg di\ncibo quotidiani, cade in un sonno profondo."
          y: "Il suo stomaco riesce a digerire qualsiasi tipo di cibo,\nanche se marcio o ammuffito."
        de:
          x: "Es ist erst satt, wenn es über 400 kg Nahrung am\nTag gefressen hat. Ist es mit dem Essen fertig,\nschläft es sofort ein."
          y: "Sein Magen kann jede Art von Nahrung verdauen,\nselbst wenn sie verschimmelt und verdorben ist."
        es:
          x: "No se encuentra satisfecho hasta que no se come\n400 kg de comida cada día. Cuando acaba de comer,\nse queda dormido."
          y: "Su estómago puede digerir todo tipo de comida,\nincluso si está podrida o mohosa."
        ko:
          x: "하루에 먹을 것을 400kg\n먹지 않으면 성에 차지 않는다.\n다 먹으면 잠이 들어 버린다."
          y: "곰팡이가 피어 있거나 상했어도\n괜찮다. 잠만보의 위는\n무엇이든 소화시킬 수 있다."
