        jp_kana:
          x: "こうねつで　みずを　じょうはつさせて\nだいちを　ひろげたと　いわれている。\nカイオーガと　はげしく　たたかった。"
          y: "カイオーガと　しとうの　すえ　ながい\nねむりに　ついた。だいちの　けしんと\nいわれる　でんせつの　ポケモン。"
        jp_kanji:
          x: "高熱で　水を　蒸発させて\n大地を　広げたと　言われている。\nカイオーガと　激しく　戦った。"
          y: "カイオーガと　死闘の末\n長い　眠りに　ついた。大地の　化身と\n言われる　伝説の　ポケモン。"
        en:
          x: "Said to have expanded the lands by evaporating\nwater with raging heat. It battled titanically\nwith Kyogre."
          y: "This legendary Pokémon is said to represent the\nland. It went to sleep after dueling Kyogre."
        fr:
          x: "Ennemi juré de Kyogre, sa haute chaleur corporelle\naurait fait évaporer l’eau et permis aux continents de\ns’étendre."
          y: "Ce Pokémon légendaire incarne la terre.\nIl plongea dans un profond sommeil après son combat\navec Kyogre."
        it:
          x: "Si tramanda che fece evaporare l’acqua per\naumentare la superficie terrestre. Nemico di Kyogre."
          y: "Pokémon leggendario che rappresenta la terra. Dopo\naver sfidato Kyogre, è caduto in un sonno profondo."
        de:
          x: "Sein Feuer erschuf einst das Land. Es und Kyogre\nlieferten sich einen langen Kampf."
          y: "Dieses Legendäre Pokémon soll das Land verkörpern.\nEs ist in einen Schlaf gefallen, nachdem es mit Kyogre\ngekämpft hat."
        es:
          x: "Dicen que aumentó la superficie terrestre evaporando\nel agua. Fue un enemigo acérrimo de Kyogre."
          y: "Dicen que este Pokémon legendario simboliza la tierra.\nTras batirse en duelo con Kyogre se echó a dormir."
        ko:
          x: "고열로 물을 증발시켜\n대지를 넓혔다고 전해진다.\n가이오가와 격하게 싸웠다."
          y: "가이오가와 사투 끝에 긴 잠에\n들었다. 대지의 화신이라\n불리는 전설의 포켓몬이다."
