      descriptions:
        jp_kana:
          x: "おなかの　ふくろで　こそだてをする。\nあんぜんな　ときだけ　こどもを\nふくろから　だして　あそばせる。"
          y: "あんぜんな　ばしょなら　こどもも\nおなかの　ふくろから　でて　あそぶ。\nおやは　それを　じっと　みまもる。"
        jp_kanji:
          x: "お腹の　袋で　子育てをする。\n安全な　ときだけ　子供を\n袋から　出して　遊ばせる。"
          y: "安全な　場所なら　子供も\nお腹の　袋から　出て　遊ぶ。\n親は　それを　じっと　見守る。"
        en:
          x: "It raises its offspring in its belly pouch. It lets the\nbaby out to play only when it feels safe."
          y: "If it is safe, the young gets out of the belly pouch\nto play. The adult keeps a close eye on\nthe youngster."
        fr:
          x: "Il élève ses petits dans sa poche ventrale. Il attend\nd’être en lieu sûr pour les laisser jouer dehors."
          y: "Dans les endroits sûrs, le petit quitte sa poche pour\njouer sous la protection des adultes."
        it:
          x: "Tiene il cucciolo nel marsupio che ha sulla pancia e\nlo lascia uscire solo quando non ci sono pericoli."
          y: "Se è al sicuro, il piccolo esce dal marsupio e inizia\na giocare sotto gli occhi vigili dell’adulto."
        de:
          x: "Sein Nachwuchs wächst in seinem Beutel heran.\nNur wenn es sicher ist, darf das Junge aus dem Beutel."
          y: "Fühlt es sich sicher, dann verlässt das Junge\nden Beutel. Die Mutter behält es ständig im Auge."
        es:
          x: "Lleva a su cría en la bolsa de su panza. Solo deja que\nsu cría salga a jugar cuando no siente peligro."
          y: "Si no hay peligro, el joven sale de la bolsa y juega.\nEl adulto vigila atentamente al joven."
        ko:
          x: "배의 주머니에서 새끼를 키운다.\n안전할 때만 새끼를\n주머니에서 꺼내어 놀게 한다."
          y: "안전한 장소라면 새끼도\n배의 주머니에서 나와서 논다.\n어미는 그것을 가만히 지켜본다."
