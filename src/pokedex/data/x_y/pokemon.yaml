      descriptions:
        jp_kana:
          x: "ひとや　ポケモンを　のせて　とぶが\nかぜに　ながされているだけなので\nどこへ　とんでいくか　わからない。"
          y: "ひるまは　ねぼけて　うかんでいるが\nゆうがた　たいぐんで　とんでいく。\nいきさきは　だれも　しらない。"
        jp_kanji:
          x: "人や　ポケモンを　乗せて　飛ぶが\n風に　流されているだけなので\nどこへ　飛んでいくか　わからない。"
          y: "昼間は　寝ぼけて　浮かんでいるが\n夕方　大群で　飛んでいく。\n行先は　だれも　知らない。"
        en:
          x: "It carries people and Pokémon when it flies.\nBut since it only drifts, it can end up anywhere."
          y: "It’s drowsy in daytime, but flies off in the evening in\nbig groups. No one knows where they go."
        fr:
          x: "Il peut embarquer des gens et des Pokémon, mais\nnul ne sait où il va atterrir car il ne fait que flotter."
          y: "Il somnole la journée et s’envole en grands groupes\nle soir venu. Nul ne sait où ils vont."
        it:
          x: "Vola trascinando persone e Pokémon. Poiché si fa\nportare dal vento, non si sa dove vada a finire."
          y: "Di giorno fluttua con aria sonnolenta, ma di notte\nvola via in gruppo. Nessuno sa dove vada."
        de:
          x: "Es trägt Menschen und Pokémon im Flug.\nDa es sich aber nur vom Wind tragen lässt,\nweiß man nie, wo es hingeht."
          y: "Tagsüber treibt es faul vor sich hin, nachts fliegt es\nmit anderen umher. Niemand weiß wohin."
        es:
          x: "Transporta a gente y a Pokémon volando, pero, como\nse deja llevar, puede acabar en cualquier sitio."
          y: "Durante el día está somnoliento, pero por la noche\nsale volando en grupo, aunque nadie sabe adónde."
        ko:
          x: "사람이나 포켓몬을 태우고 날지만\n바람에 떠밀려 다닐 뿐이므로\n어디로 날아갈지 모른다."
          y: "낮에는 잠이 덜 깨어 떠 있지만\n저녁 무렵에는 큰 무리를 지어\n날아간다. 목적지는 아무도 모른다."
