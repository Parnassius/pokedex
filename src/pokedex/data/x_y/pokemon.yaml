      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - sap_sipper
        - hydration
      hidden_ability: gooey
      descriptions:
        jp_kana:
          x: "ひとなつっこい　ドラゴンポケモン。\nだいすきな　トレーナーに　だきついて\nねんえきで　ヌルヌルにしてしまう。"
          y: "のびちぢみする　ツノで　こうげき。\nプロボクサー　１００にんぶんの\nパンチに　ひってきする　いりょく。"
        jp_kanji:
          x: "人懐っこい　ドラゴンポケモン。\n大好きな　トレーナーに　抱き着いて\n粘液で　ヌルヌルにしてしまう。"
          y: "伸び縮みする　ツノで　攻撃。\nプロボクサー　１００人分の\nパンチに　匹敵する　威力。"
        en:
          x: "This very friendly Dragon-type Pokémon\nwill hug its beloved Trainer, leaving\nthat Trainer covered in sticky slime."
          y: "It attacks with retractable horns.\nIt throws a punch that’s the equivalent\nof the force of a hundred pro boxers."
        fr:
          x: "Ce Pokémon Dragon peu farouche aime faire la fête\nà son Dresseur adoré, le couvrant au passage de\nsa bave collante."
          y: "Il attaque grâce à ses cornes extensibles.\nSes coups sont aussi puissants que ceux de 100\nboxeurs professionnels réunis."
        it:
          x: "Un Pokémon Drago davvero amichevole. Ama fare le\nfeste al suo Allenatore lasciandolo ricoperto di bava."
          y: "Attacca con i corni che possono allungarsi e\naccorciarsi. Ha una forza pari a quella di 100 pugili\nprofessionisti."
        de:
          x: "Dieses äußerst freundliche Drachen-Pokémon\nneigt dazu, seinen geliebten Trainer zu umarmen\nund so mit einer dicken Schleimschicht zu umhüllen."
          y: "Es greift den Gegner mit ausfahrbaren Fühlern an.\nSeine Stärke ist vergleichbar mit der Durchschlagskraft\nder Faustschläge von 100 Profiboxern."
        es:
          x: "Pokémon de tipo Dragón muy afable al que le gusta\nabrazar con efusión a su Entrenador, aunque después\nlo deja totalmente pringado."
          y: "Ataca con sus antenas retráctiles, desplegando\nuna fuerza comparable a los puñetazos de 100\nboxeadores profesionales."
        ko:
          x: "사람을 잘 따르는 드래곤포켓몬이다.\n좋아하는 트레이너에게 달려들어\n미끈미끈한 점액투성이로 만들어 버린다."
          y: "늘었다 줄었다 하는 뿔로 공격한다.\n프로 복서 100명분의\n펀치에 필적하는 위력을 가졌다."
klefki:
  species_id: 707
  names:
    jp_kana: クレッフィ
    jp_kanji: クレッフィ
    en: Klefki
    fr: Trousselin
    it: Klefki
    de: Clavion
    es: Klefki
    ko: 클레피
  forms:
    klefki:
      form_id: 0
      base_stats:
        hp: 57
        attack: 80
        defense: 91
        special_attack: 80
        special_defense: 87
        speed: 75
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - fairy
      egg_groups:
        - mineral
      abilities:
        - prankster
      hidden_ability: magician
      descriptions:
        jp_kana:
          x: "カギを　あつめる　しゅうせい。\nてきに　おそわれると　ジャラジャラと\nカギを　うちならして　いかくする。"
          y: "きにいった　カギは　ぜったいに\nてばなさないので　ぼうはんのために\nきんこの　カギを　もたせるのだ。"
        jp_kanji:
          x: "カギを　集める　習性。\n敵に　襲われると　ジャラジャラと\nカギを　打ち鳴らして　威嚇する。"
          y: "気に入った　カギは　絶対に\n手放さないので　防犯のために\n金庫の　カギを　持たせるのだ。"
        en:
          x: "These key collectors threaten any attackers\nby fiercely jingling their keys at them."
          y: "It never lets go of a key that it likes,\nso people give it the keys to vaults and\nsafes as a way to prevent crime."
        fr:
          x: "Ce Pokémon collectionne les clés qu’il agite devant\nses ennemis pour les intimider."
          y: "Comme il ne se sépare jamais d’une clé qu’il trouve\nà son goût, les gens lui confient celle de leurs coffres,\nafin d’éviter de se faire voler."
        it:
          x: "Ha l’abitudine di raccogliere chiavi. Quando viene\nattaccato, minaccia il nemico agitandole e facendo\nun gran chiasso."
          y: "Spesso gli esseri umani affidano a questo Pokémon\nle chiavi delle loro casseforti per prevenire i furti.\nSi sa infatti che custodisce con cura le chiavi che ama."
        de:
          x: "Dieses Pokémon sammelt eifrig Schlüssel, mit denen\nes wild herumfuchtelt, um Gegner abzuschrecken."
          y: "Da es Schlüssel, die ihm gefallen, wie seinen Augapfel\nhütet, vertrauen Menschen ihm die Schlüssel ihrer\nTresore an, um Diebstahl vorzubeugen."
        es:
          x: "Tiene el hábito de coleccionar llaves. Cuando un\nenemigo lo ataca, las hace tintinear como método\nde intimidación."
          y: "Como no se separa de las llaves que le gustan bajo\nningún concepto, la gente le encomienda las llaves\nde cajas fuertes para prevenir posibles robos."
        ko:
          x: "열쇠를 모으는 습성이 있다.\n적에게 습격당하면 열쇠로\n짤랑짤랑 소리를 내어 위협한다."
          y: "마음에 든 열쇠는 절대로\n손에서 놓지 않아서 방범을 위해\n금고 열쇠를 지니게 한다."
phantump:
  species_id: 708
  names:
    jp_kana: ボクレー
    jp_kanji: ボクレー
    en: Phantump
    fr: Brocélôme
    it: Phantump
    de: Paragoni
    es: Phantump
    ko: 나목령
  forms:
    phantump:
      form_id: 0
      base_stats:
        hp: 43
        attack: 70
        defense: 48
        special_attack: 50
        special_defense: 60
