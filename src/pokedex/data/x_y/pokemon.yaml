      descriptions:
        jp_kana:
          x: "ふだんは　やまおくで　くらしているが\nおなかが　すくと　ふもとに　あらわれ\nせんろや　くるまを　たべてしまう。"
          y: "からだを　おおう　はがねの　よろいは\nしんかするとき　ポロリと　はがれおち\nあたらしい　よろいが　つくられる。"
        jp_kanji:
          x: "普段は　山奥で　暮らしているが\nお腹が　すくと　ふもとに　現われ\n線路や　車を　食べてしまう。"
          y: "体を　覆う　鋼の　よろいは\n進化するとき　ポロリと　はがれ落ち\n新しい　よろいが　作られる。"
        en:
          x: "It usually lives deep in mountains. However, hunger\nmay drive it to eat railroad tracks and cars."
          y: "When it evolves, it sheds the steel carapace that\ncovered its whole body and develops a new one."
        fr:
          x: "Il vit habituellement au cœur des montagnes.\nAffamé, il dévore parfois des rails et des voitures."
          y: "L’armure d’acier qui recouvre son corps s’émiette\nquand il évolue pour laisser place à une nouvelle."
        it:
          x: "Vive generalmente sui monti ma, spinto dalla fame,\nscende per cibarsi di binari ferroviari e automobili."
          y: "L’armatura d’acciaio che riveste Aron viene sostituita\nda una nuova quando il Pokémon si evolve."
        de:
          x: "Normalerweise lebt es in dunklen Bergen. Ist es\nhungrig, frisst es auch Eisenbahnschienen und Autos."
          y: "Entwickelt es sich, wirft es seinen alten Stahlpanzer ab\nund bildet einen neuen aus."
        es:
          x: "Suele vivir en lugares inaccesibles de las montañas,\npero el hambre lo empuja a comer raíles y coches."
          y: "Al evolucionar, la coraza de acero que recubre todo\nsu cuerpo se cae para crear una nueva."
        ko:
          x: "평소에는 산속에서 살고 있지만\n배가 고프면 산기슭에 나타나\n선로나 차를 먹어 버린다."
          y: "몸을 감싼 강철 갑옷은\n진화할 때 똑 떨어져\n새 갑옷이 만들어진다."
lairon:
  species_id: 305
  names:
    jp_kana: コドラ
    jp_kanji: コドラ
    en: Lairon
    fr: Galegon
    it: Lairon
