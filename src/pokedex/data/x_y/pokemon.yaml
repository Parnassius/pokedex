      descriptions:
        jp_kana:
          x: "しょくぶつの　ツルで　できた　うでを\nのばして　えものを　からめとる。\nうでを　たべられても　へっちゃら。"
          y: "あたたかい　きせつに　なると\nめだまも　かくれて　しまうほど\nしょくぶつの　ツルが　のびつづける。"
        jp_kanji:
          x: "植物の　ツルで　できた　腕を\n伸ばして　獲物を　絡め取る。\n腕を　食べられても　へっちゃら。"
          y: "暖かい　季節に　なると\n目玉も　隠れてしまうほど\n植物の　ツルが　伸び続ける。"
        en:
          x: "It ensnares prey by extending arms made of vines.\nLosing arms to predators does not trouble it."
          y: "Its vines grow so profusely that, in the warm\nseason, you can’t even see its eyes."
        fr:
          x: "Il ligote sa proie en étirant ses bras en lianes. Il ne\ncraint pas de perdre un bras face à un ennemi."
          y: "Lorsque vient la belle saison, ses lianes sont si\nluxuriantes qu’elles cachent ses yeux."
        it:
          x: "Intrappola le prede con gli arti, che sono costituiti\nda liane. Se ne perde uno, non si turba affatto."
          y: "Nella stagione calda, le sue liane crescono al punto\nda coprirgli gli occhi."
        de:
          x: "Es umwickelt Beute, indem es seine Arme,\ndie aus Ranken bestehen, verlängert."
          y: "In warmen Jahreszeiten wuchern seine Ranken\nso dicht, dass man nicht einmal mehr seine Augen\nerkennt."
        es:
          x: "Atrapa a su presa desplegando las ramas de sus\nbrazos, que no le importa perder ante depredadores."
          y: "Cuando llega el calor, se cubre por completo con sus\nlianas y no se le pueden ver ni los ojos."
        ko:
          x: "식물의 덩굴로 이루어진 팔을\n늘여서 먹이를 포박한다.\n팔을 먹혀도 아무렇지도 않다."
          y: "따뜻한 계절이 오면\n눈이 보이지 않을 정도로\n식물의 덩굴이 계속 자란다."
