        jp_kanji: サバンナのもよう
        en: Savanna Pattern
        fr: Motif Mangrove
        it: Motivo Savana
        de: Savannenmuster
        es: Motivo Pantano
        ko: 사바나의 모양
      base_stats:
        hp: 80
        attack: 52
        defense: 50
        special_attack: 90
        special_defense: 50
