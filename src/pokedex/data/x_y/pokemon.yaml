          x: "だれかに　みられると\nしっぽで　じめんを　ほって\nうしろむきに　にげだすのだ。"
          y: "しっぽで　じめんを　ほって\nめいろのような　すあなを　つくる。\nはねで　すこしだけ　とべる。"
        jp_kanji:
          x: "だれかに　見られると\n尻尾で　地面を　掘って\n後ろ向きに　逃げ出すのだ。"
          y: "尻尾で　地面を　掘って\n迷路のような　巣穴を　作る。\n羽で　少しだけ　飛べる。"
        en:
          x: "When spotted, this Pokémon escapes backward by\nfuriously boring into the ground with its tail."
          y: "It digs into the ground with its tail and makes a\nmazelike nest. It can fly just a little."
        fr:
          x: "Il s’enfuit en creusant à reculons dans le sol avec\nsa queue dès qu’un ennemi le repère."
          y: "Son nid est un véritable labyrinthe qu’il creuse à l’aide\nde sa queue. Il sait à peine voler."
        it:
          x: "Se lo si scopre, questo Pokémon fugge all’indietro\nscavando furiosamente nel terreno con la coda."
          y: "Scava nel terreno con la coda creando una tana\nsimile a un labirinto. Sa spiccare brevissimi voli."
        de:
          x: "Wird es entdeckt, flüchtet dieses Pokémon,\nindem es sich mit seinem Schweif in den Boden gräbt."
          y: "Es gräbt sich mit seinem Schweif in die Erde und baut\nein labyrinthartiges Nest. Es kann kaum fliegen."
        es:
          x: "Este Pokémon escapa hacia atrás perforando el suelo\ncon su cola, si es descubierto."
          y: "Cava el suelo con su cola para construir su\nmadriguera. Puede volar distancias cortas."
        ko:
          x: "누군가에게 들키면\n꼬리로 땅을 파서\n뒤쪽으로 도망친다."
          y: "꼬리로 땅을 파서\n미로 같은 둥지를 만든다.\n날개로 조금 날 수 있다."
gligar:
