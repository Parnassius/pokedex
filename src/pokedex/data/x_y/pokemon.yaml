          y: "いじげん　くうかんを　じゆうに\nいどうできるように　プログラムを\nしゅうせいしたが　ミスした　らしい。"
        jp_kanji:
          x: "より　優れた　ポケモンに　するため\nプログラムを　追加したが　なぜか\nおかしな　行動を　はじめた。"
          y: "異次元空間を　自由に\n移動できるように　プログラムを\n修正したが　ミスした　らしい。"
        en:
          x: "Additional software was installed to make it a better\nPokémon. It began acting oddly, however."
          y: "Its programming was modified to enable it to travel\nthrough alien dimensions. Seems there might have\nbeen an error..."
        fr:
          x: "Un logiciel supplémentaire fut installé pour l’améliorer.\nMais depuis, il se comporte bizarrement."
          y: "On a modifié son programme pour qu’il puisse\nparcourir les dimensions, mais ce fut un échec."
        it:
          x: "È stato aggiunto un software per migliorare le\nprestazioni di questo Pokémon. Agisce in modo\nstrano."
          y: "Non sembra funzionare correttamente dopo essere\nstato riprogrammato per muoversi in dimensioni\nsconosciute."
        de:
          x: "Zusätzliche Software wurde installiert, um das\nPokémon zu verbessern. Seitdem benimmt es\nsich seltsam."
          y: "Eine neue Software sollte es zu interdimensionalen\nReisen befähigen, doch anscheinend ging etwas\nschief."
        es:
          x: "Se le instaló un software para mejorarlo. Sin embargo,\ncomenzó a comportarse de manera extraña."
          y: "Aunque le instalaron un software para desplazarse por\notras dimensiones, algo no funcionó bien."
        ko:
          x: "더욱 우수한 포켓몬으로 만들고자\n프로그램을 추가했지만 어쩐지\n괴상하게 행동하기 시작했다."
          y: "다른 차원의 공간을 자유롭게\n이동할 수 있도록 프로그램을\n수정했지만 실수한 것 같다."
