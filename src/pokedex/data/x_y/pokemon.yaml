          y: "つねに　かくざいを　もちあるき\nどぼくこうじを　てつだう。そだつと\nおおきな　かくざいに　もちかえる。"
        jp_kanji:
          x: "いつも　角材を　抱えている。\n建築　現場に　現れて\n工事を　手伝う　ポケモン。"
          y: "常に　角材を　持ち歩き\n土木工事を　手伝う。育つと\n大きな　角材に　持ち替える。"
        en:
          x: "These Pokémon appear at building sites and help\nout with construction. They always carry\nsquared logs."
          y: "Always carrying squared logs, they help out with\nconstruction. As they grow, they carry bigger logs."
        fr:
          x: "Il porte toujours une poutre. Il apparaît sur les\nchantiers pour aider aux travaux."
          y: "Il porte toujours une poutre en bois et aime aider aux\ntravaux. Il passe à un lourd madrier quand il grandit."
        it:
          x: "Porta sempre con sé una tavola di legno. Appare\nnei cantieri dove aiuta nei lavori."
          y: "Porta sempre con sé una tavola di legno e aiuta nei\nlavori edilizi. Quando cresce si sceglie una tavola\npiù grande."
        de:
          x: "Trägt stets einen Holzbalken bei sich. Es taucht\nhier und da auf Baustellen auf und hilft dort den\nArbeitern aus."
          y: "Trägt stets einen Holzbalken bei sich und hilft auf\nBaustellen aus. Nach einer Weile sucht es sich\neinen größeren Balken."
        es:
          x: "Siempre lleva vigas de madera. Normalmente ayuda\nen obras de construcción."
          y: "Siempre lleva una viga de madera y ayuda en las\nconstrucciones. Se busca una viga más grande cuando\nse hace más fuerte."
        ko:
          x: "항상 각목을 끼고 있다.\n건설 현장에 나타나\n공사를 도와주는 포켓몬이다."
          y: "항상 각재를 들고 다니며\n토목공사를 도와준다. 자라면\n큰 각재로 바꿔 든다."
gurdurr:
