          y: "ごきげんな　ニャルマーは　しっぽで\nしんたいそうの　リボンの　ような\nうつくしい　うごきを　みせる。"
        jp_kanji:
          x: "気に入らないと　ツメを　立てるが\nたまに　のどを　鳴らして\n甘える　性格が　一部に　大人気だ。"
          y: "ご機嫌な　ニャルマーは　尻尾で\n新体操の　リボンのような\n美しい　動きを　見せる。"
        en:
          x: "It claws if displeased and purrs when affectionate.\nIts fickleness is very popular among some."
          y: "When it’s happy, Glameow demonstrates beautiful\nmovements of its tail, like a dancing ribbon."
        fr:
          x: "Il griffe quand il est en colère et ronronne quand\nil est heureux. Certains aiment ce côté lunatique."
          y: "Lorsqu’il est heureux, sa queue décrit des arabesques\ncomme un ruban de gymnastique rythmique."
        it:
          x: "Se disturbato, tira fuori gli artigli; se soddisfatto,\nfa le fusa. La sua incostanza piace a molti."
          y: "Il lunatico Glameow fa sinuosi movimenti di coda\nche ricordano i nastri della ginnastica artistica."
        de:
          x: "Es schlägt mit Krallen zu oder schnurrt,\nje nachdem, ob es gerade wütend oder zutraulich ist."
          y: "Je nach Laune lässt es seinen Schweif anmutig\nwirbeln, ganz wie das Band eines Sportgymnasten."
        es:
          x: "Araña cuando está enfadado y ronronea cuando está\ncariñoso. Su imprevisibilidad es famosa."
          y: "Dependiendo de su humor, mueve grácilmente su\ncola, que se asemeja a un lazo de gimnasia rítmica."
        ko:
          x: "마음에 안 들면 발톱을 세우지만\n가끔 울음소리로 응석을 부리는\n성격이 일부에게 매우 인기가 있다."
          y: "기분이 좋은 나옹마는 꼬리로\n리듬 체조의 리본처럼\n아름다운 움직임을 보인다."
purugly:
