        defense: 70
        special_attack: 60
        special_defense: 120
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - color_change
      hidden_ability: protean
      descriptions:
        jp_kana:
          x: "からだの　いろを　じゆうに　かえる\nのうりょくを　もつ。おなかにある\nギザギザもよう　だけは　かわらない。"
          y: "からだの　いろを　かえて　けしきに\nとけこみ　えものに　しのびよる。\nおなかの　もようは　けせないのだ。"
        jp_kanji:
          x: "体の　色を　自由に　変える\n能力を　持つ。お腹にある\nギザギザ模様　だけは　変わらない。"
          y: "体の　色を　変えて　景色に　溶けこみ\n獲物に　忍び寄る。\nお腹の　模様は　消せないのだ。"
        en:
          x: "It can freely change its body’s color. The zigzag\npattern on its belly doesn’t change, however."
          y: "It changes its shading to match its surroundings\nso it can sneak up on prey. Only its belly patterns\nstay fixed."
        fr:
          x: "Il change de couleur à volonté, mais le motif en\nzigzag qui orne son ventre reste le même."
          y: "Il se fond dans son environnement en changeant de\ncouleur, mais le motif sur son ventre reste le même."
        it:
          x: "Può mutare il colore del corpo a piacimento.\nTuttavia, il motivo a zigzag sul ventre non cambia."
          y: "Cambia colore per mimetizzarsi e sorprendere la\npreda. Il disegno sulla pancia rimane sempre visibile."
        de:
          x: "Es kann nach Belieben seine Farbe ändern. Nur das\ngezackte Muster auf seinem Bauch bleibt gleich."
          y: "Beim Beutefang passt es seine Farbe der Umgebung\nan. Nur das Muster auf seinem Bauch bleibt gleich."
        es:
          x: "Puede mudar el color de su cuerpo a voluntad, pero el\ndibujo en zigzag de su panza nunca desaparece."
          y: "Acecha a sus presas adaptando sus colores a los del\npaisaje, pero los dibujos de su panza nunca cambian."
        ko:
          x: "몸의 색을 자유롭게 바꾸는\n능력을 가지고 있다. 배에 있는\n톱니무늬만은 바뀌지 않는다."
          y: "몸의 색을 바꿔 풍경에\n녹아들어 먹이에게 다가간다.\n배의 모양은 지울 수 없다."
shuppet:
  species_id: 353
  names:
    jp_kana: カゲボウズ
    jp_kanji: カゲボウズ
    en: Shuppet
    fr: Polichombr
    it: Shuppet
    de: Shuppet
    es: Shuppet
