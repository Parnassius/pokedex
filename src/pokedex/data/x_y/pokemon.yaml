          y: "くうかんを　ゆがめる　のうりょくを\nもち　シンオウちほうの　しんわでは\nかみさまとして　えがかれている。"
        jp_kanji:
          x: "並行して　並ぶ　空間の　狭間に\n住むと　言われている。\n神話に　登場する　ポケモン。"
          y: "空間を　ゆがめる　能力を　持ち\nシンオウ地方の　神話では\n神様として　描かれている。"
        en:
          x: "It is said to live in a gap in the spatial dimension\nparallel to ours. It appears in mythology."
          y: "It has the ability to distort space. It is described as\na deity in Sinnoh-region mythology."
        fr:
          x: "On dit qu’il hante une faille d’une dimension\nparallèle à la nôtre. Il apparaît dans la mythologie."
          y: "Il peut modeler l’espace. Les mythes de Sinnoh en\nparlent comme d’une divinité ancienne."
        it:
          x: "Si dice che viva in una dimensione parallela alla\nnostra. Appare nella mitologia."
          y: "Ha l’abilità di distorcere lo spazio. Nella mitologia\ndella regione di Sinnoh è una divinità."
        de:
          x: "Man sagt, es lebe in einem Spalt in einer\nParalleldimension. Es wird in der Mythologie erwähnt."
          y: "Es hat die Macht, den Raum zu krümmen. In den\nMythen von Sinnoh erscheint es als Gottheit."
        es:
          x: "Se dice que vive en una dimensión espacial paralela.\nAparece en la mitología."
          y: "Tiene la habilidad de distorsionar el espacio. La\nmitología de Sinnoh lo describe como una deidad."
        ko:
          x: "평행으로 늘어선 공간의\n틈새에 산다고 전해진다.\n신화에 등장하는 포켓몬이다."
          y: "공간을 뒤틀리게 하는 능력을\n가졌으며 신오지방의 신화에서는\n신으로 묘사되고 있다."
