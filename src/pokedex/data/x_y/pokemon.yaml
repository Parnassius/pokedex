          y: "サイコパワーで　あいての　のうみそを\nあやつり　きおくする　えいぞうを\nちがう　ものに　かきかえてしまう。"
        jp_kanji:
          x: "指先を　点滅　させて\n会話するらしいが　その　パターンは\nまだ　解読　できていない。"
          y: "サイコパワーで　相手の　脳みそを\n操り　記憶する　映像を\n違う　ものに　書き換えてしまう。"
        en:
          x: "Apparently, it communicates by flashing its three\nfingers, but those patterns haven’t been decoded."
          y: "It uses psychic power to control an opponent’s\nbrain and tamper with its memories."
        fr:
          x: "Il fait clignoter ses doigts tricolores pour communiquer\navec ses semblables. Son langage reste un mystère."
          y: "Il manipule l’esprit avec ses pouvoirs psychiques\net peut modifier les images conservées dans les\nsouvenirs."
        it:
          x: "Dialoga con i suoi simili tramite le luci sui suoi arti,\nma il suo linguaggio è ancora un mistero."
          y: "Controlla il cervello dell’avversario con poteri psichici\ne ne sostituisce i ricordi."
        de:
          x: "Es spricht, indem es seine Fingerspitzen leuchten\nlässt, doch noch konnte der Code dahinter nicht\nentziffert werden."
          y: "Es manipuliert die Gehirne seiner Gegner mit\nPsycho-Kräften, indem es die Bilder ihrer\nErinnerungen umgestaltet."
        es:
          x: "Parece que se comunica haciendo brillar sus dedos\ntricolores, pero nadie ha conseguido descifrar aún su\npatrón."
          y: "Controla el cerebro del rival con su poder psíquico y\nmanipula sus recuerdos."
        ko:
          x: "손끝을 점멸시켜서\n대화하는 듯하나 그 패턴은\n아직 해독하지 못했다."
          y: "사이코 파워로 상대의 뇌를\n조종하여 기억된 영상을\n다른 것으로 바꿔 버린다."
