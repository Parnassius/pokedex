          y: "みずいろの　たいもうに　おおわれた\nひふは　ぶあつくて　じょうぶ。\nれいか４０ど　でも　かつどうできる。"
        jp_kanji:
          x: "氷山で　暮らす　ポケモン。\n頭の　とがった　でっぱりで\n氷を　割って　海を　泳ぐ。"
          y: "水色の　体毛に　覆われた　皮膚は\n分厚くて　丈夫。\n零下４０度でも　活動できる。"
        en:
          x: "A Pokémon that lives on icebergs. It swims in the\nsea using the point on its head to break up ice."
          y: "Covered with light blue fur, its hide is thick and\ntough. It is active in bitter cold of\n-40 degrees Fahrenheit."
        fr:
          x: "Un habitant des icebergs. En mer, il utilise la corne\nsur sa tête pour briser la banquise."
          y: "Sa peau épaisse et dure est recouverte d’une\nfourrure bleu clair. Elle permet à ce Pokémon\nde résister aux températures les plus glaciales."
        it:
          x: "Pokémon che vive sugli iceberg. Nuota spaccando\nil ghiaccio con la punta che ha sulla testa."
          y: "Sotto la pelliccia azzurra ha una pelle spessa e dura.\nPuò resistere a una temperatura di -40 °C."
        de:
          x: "Dieses Pokémon lebt auf Eisbergen. Es schwimmt\nim Eiswasser und bricht das Eis mithilfe seines Horns."
          y: "Unter seinem hellblauen Pelz liegt eine dicke und\nfeste Haut. Es ist bei frostigen -40 °C noch aktiv."
        es:
          x: "Este Pokémon vive en icebergs. Nada en el mar y usa\nel cuerno de su cabeza para romper el hielo."
          y: "Está recubierto de un pelaje de color azul, y tiene una\npiel gruesa y tosca. Se mantiene activo a -40 °C."
        ko:
          x: "빙산에 사는 포켓몬이다.\n머리의 뾰족하게 돌출된 부분으로\n얼음을 깨고 바다를 헤엄친다."
          y: "하늘색의 털로 뒤덮인\n피부는 두껍고 튼튼하다.\n영하 40도라도 활동할 수 있다."
