          y: "ぜんしんの　こまやかな　たいもうで\nくうきの　ながれを　かんじて　てきの\nかんがえや　てんこうを　よそくする。"
        jp_kanji:
          x: "相手の　動きを　予知するとき\nふたまたに　なっている　尻尾の　先は\n微妙に　揺れている。"
          y: "全身の　細やかな　体毛で\n空気の　流れを　感じて　敵の\n考えや　天候を　予測する。"
        en:
          x: "The tip of its forked tail quivers when it is predicting\nits opponent’s next move."
          y: "Its fur is so sensitive, it can feel minute shifts in the\nair and predict the weather...and its foes’ thoughts."
        fr:
          x: "Le bout fourchu de sa queue frémit lorsqu’il prédit\nla prochaine attaque de son adversaire."
          y: "Sa fourrure ultrasensible détecte les vibrations de\nl’air. Il peut ainsi prédire le temps ou lire les pensées\nadverses."
        it:
          x: "Mentre predice la prossima mossa del nemico,\nla coda biforcuta gli inizia a tremare."
          y: "Grazie al pelo sensibile, percepisce pure gli\nspostamenti d’aria. Sa leggere nel pensiero e\nprevedere il tempo."
        de:
          x: "Die Spitze seines geteilten Schweifs bebt, wenn es\ndie nächste Attacke seines Feindes voraussagt."
          y: "Die Haare seines Fells sind so feinfühlig, dass es\nam Wind ablesen kann, was seine Gegner denken\nund wie das Wetter wird."
        es:
          x: "Al predecir el siguiente movimiento de su rival,\nchasquea el extremo de la cola bífida que tiene."
          y: "Su pelaje es tan sensible que percibe los cambios en\nel aire y predice así los ataques de sus enemigos y el\ntiempo."
        ko:
          x: "상대의 움직임을 예지할 때\n두 갈래로 갈라져 있는 꼬리의\n끝이 미세하게 떨리고 있다."
          y: "전신의 세밀한 털로\n공기의 흐름을 알아차려 상대의\n생각이나 날씨를 예측한다."
