          x: "はげしい　きしょうの　もちぬし。\nあらぶると　たてがみから　かみなりを\nしほうはっぽうに　ほうでんする。"
          y: "いなずまのような　しゅんぱつりょく。\nゼブライカが　ぜんそくりょくで\nはしると　らいめいが　ひびきわたる。"
        jp_kanji:
          x: "激しい　気性の　持ち主。\n荒ぶると　たてがみから　雷を\n四方八方に　放電する。"
          y: "稲妻のような　瞬発力。\nゼブライカが　全速力で　走ると\n雷鳴が　響きわたる。"
        en:
          x: "When this ill-tempered Pokémon runs wild, it\nshoots lightning from its mane in all directions."
          y: "They have lightning-like movements.\nWhen Zebstrika run at full speed, the sound of\nthunder reverberates."
        fr:
          x: "De caractère violent, il envoie avec sa crinière des\narcs électriques de tous les côtés lorsqu’il se sent\nprovoqué."
          y: "Il réagit à la vitesse de l’éclair. Lorsqu’il est en plein\ngalop, on peut entendre le grondement du tonnerre."
        it:
          x: "Ha un temperamento sanguigno. Quando si arrabbia\ndalla criniera lancia saette in ogni direzione."
          y: "È scattante come una saetta. Se corre alla massima\nvelocità, si sente un rimbombo di tuoni."
        de:
          x: "Ein stürmischer Geselle. Wenn es wütend ist,\nfeuert es über seine Mähne in alle Richtungen\nStromsalven ab."
          y: "Es ist explosiv wie ein Blitz. Galoppiert es mit voller\nGeschwindigkeit drauflos, kann man Donnerhall\nvernehmen."
        es:
          x: "Es un Pokémon con mucho temperamento. Cuando se\nenoja, lanza rayos desde su crin en todas direcciones."
          y: "Su velocidad se asemeja a la de un rayo. Si corre al\nmáximo, se dejan oír truenos por doquier."
        ko:
          x: "격렬한 기질의 소유자.\n날뛰면 갈기에서 번개를\n사방팔방으로 방전한다."
          y: "천둥번개 같은 순발력을 가지고 있다.\n제브라이카가 전속력으로 달리면\n천둥소리가 울려 퍼진다."
roggenrola:
