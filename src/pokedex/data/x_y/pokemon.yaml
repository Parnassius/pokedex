          x: "おほしさまのような　シルエット。\nそのすがたから　ながれぼしにのって\nやってくると　しんじられている。"
          y: "ながれぼしの　おおい　よるは\nピィが　たくさん　すがたを　みせる。\nあさひが　のぼると　いなくなる。"
        jp_kanji:
          x: "お星さまのような　シルエット。\nその姿から　流れ星に乗って\nやって来ると　信じられている。"
          y: "流れ星の　多い　夜は\nピィが　たくさん　姿を　見せる。\n朝日が　昇ると　いなくなる。"
        en:
          x: "Because of its unusual, starlike silhouette, people\nbelieve that it came here on a meteor."
          y: "Many appear when the night skies are filled with\nshooting stars. They disappear with sunrise."
        fr:
          x: "Il ressemble un peu à une étoile. On suppose qu’il est\nvenu sur terre accroché à une météorite."
          y: "On en voit beaucoup lorsque le ciel se remplit\nd’étoiles filantes. Ils s’éclipsent au lever du soleil."
        it:
          x: "Per il suo aspetto bizzarro, a forma di stella, c’è chi\ncrede che provenga da una meteora."
          y: "Se ne vedono molti nelle notti in cui il cielo è pieno\ndi stelle cadenti. Spariscono all’alba."
        de:
          x: "Aufgrund seiner ungewöhnlichen Sternform sagt\nman, es sei auf einem Meteor hierhergereist."
          y: "In Nächten mit vielen Sternschnuppen sieht man diese\nPokémon. Am Morgen sind sie verschwunden."
        es:
          x: "Por su inusual forma estrellada, la gente cree que\nprocede de un meteorito que cayó a la tierra."
          y: "Muchos aparecen cuando hay estrellas fugaces en el\ncielo nocturno. Se esfuman al amanecer."
        ko:
          x: "별님 같은 실루엣이다.\n그 모습 때문에 별똥별을 타고\n온다고 여겨진다."
          y: "별똥별이 많은 밤에는\n삐가 많이 모습을 드러낸다.\n아침 해가 떠오르면 사라지게 된다."
igglybuff:
