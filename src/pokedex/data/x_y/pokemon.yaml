        jp_kana:
          x: "しっぽの　ほのおの　いきおいを\nうまく　コントロールして　じぶんの\nとくいな　まあいで　たたかうのだ。"
          y: "てんじょうや　かべを　りようして\nくうちゅうさっぽうを　くりだす。\nしっぽの　ほのおも　ぶきの　ひとつ。"
        jp_kanji:
          x: "尻尾の　炎の　勢いを\nうまく　コントロールして\n自分の　得意な　間合いで　戦うのだ。"
          y: "天井や　壁を　利用して\n空中殺法を　繰り出す。\n尻尾の　炎も　武器の　ひとつ。"
        en:
          x: "It skillfully controls the intensity of the fire on its\ntail to keep its foes at an ideal distance."
          y: "It uses ceilings and walls to launch aerial attacks.\nIts fiery tail is but one weapon."
        fr:
          x: "Il contrôle habilement l’intensité de la flamme de\nsa queue pour tenir ses adversaires à distance."
          y: "Il attaque en prenant appui sur les murs et les\nplafonds. Sa queue ardente n’est pas son seul atout."
        it:
          x: "Controlla abilmente l’intensità delle fiamme sulla\nsua coda per tenere i nemici alla distanza ideale."
          y: "Attacca la preda lanciandosi da soffitti e pareti.\nLe fiamme sulla coda sono solo una delle sue armi."
        de:
          x: "Es kontrolliert die Stärke des Feuers auf seinem\nSchweif geschickt, um Gegner auf Distanz zu halten."
          y: "Es stürzt sich von Decken und Wänden auf Beute.\nSein feuriger Schweif ist nur eine seiner Waffen."
        es:
          x: "Controla hábilmente la intensidad del fuego de su cola\npara mantener al enemigo a una distancia ideal."
          y: "Utiliza techos y paredes para lanzar ataques aéreos.\nTambién emplea su cola ígnea como arma."
        ko:
          x: "꼬리의 불꽃 세기를\n잘 컨트롤하여 자신에게\n맞는 거리를 두고 싸운다."
          y: "천장이나 벽을 이용하여\n공중 내리찍기를 날린다.\n꼬리의 불꽃도 무기의 하나이다."
