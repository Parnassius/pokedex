        jp_kana:
          x: "ひるまは　たいようを　さけるため\nつめたい　じめんに　もぐっている。\nつきのひかりを　あびて　そだつ。"
          y: "べつめい　アルキメンデス。\nよるに　なると　２ほんの　ねっこで\n３００メートルも　あるくという。"
        jp_kanji:
          x: "昼間は　太陽を　避けるため\n冷たい　地面に　潜っている。\n月の　光を　浴びて　育つ。"
          y: "別名　アルキメンデス。\n夜になると　２本の　根っこで\n３００メートルも　歩くという。"
        en:
          x: "During the day, it stays in the cold underground\nto avoid the sun. It grows by bathing in moonlight."
          y: "Its scientific name is “Oddium Wanderus.” At night,\nit is said to walk nearly 1,000 feet on its two roots."
        fr:
          x: "Le jour, il reste en sous-sol et évite le soleil.\nIl grandit en se baignant au clair de lune."
          y: "Son nom scientifique est « Oddium Wanderus ».\nLorsqu’il fait nuit, il se déplace à l’aide de ses\nracines pour disséminer ses graines."
        it:
          x: "Di giorno vive nel freddo sottosuolo, per evitare la\nluce del sole. Cresce assorbendo la luce lunare."
          y: "Nome scientifico: “Oddium Viandantis”. Percorre fino\na 300 m in una notte sulle due radici fatte a piede."
        de:
          x: "Tagsüber versteckt es sich in der kalten Erde,\num die Sonne zu meiden. Es wächst im Mondschein."
          y: "Sein wissenschaftlicher Name lautet:\n„Oddium Wanderus“. Nachts soll es knapp\n300 m auf seinen zwei Wurzeln zurücklegen."
        es:
          x: "Durante el día, se agazapa en el frío subsuelo huyendo\ndel sol. La luz de la luna le hace crecer mucho."
          y: "Su nombre científico es “Oddium Wanderus”. Se dice\nque de noche puede llegar a desplazarse hasta 300 m\ncon sus dos raíces."
        ko:
          x: "낮에는 태양을 피하려고\n차가운 땅속에 들어가 있다.\n달빛을 쬐어 성장한다."
          y: "별명 걸어 다니는 독초.\n밤이 되면 2개의 뿌리로\n300m나 걷는다고 한다."
