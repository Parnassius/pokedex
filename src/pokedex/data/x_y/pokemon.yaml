      descriptions:
        jp_kana:
          x: "めだまもようの　しょっかくを　もつ。\n４まいの　はねで　うかびあがり\nぜんごさゆうに　うごくことができる。"
          y: "４まいの　はねで　うかびあがり\nぜんご　さゆうへ　じゆうじざいに\nとびまわる　ことが　できる。"
        jp_kanji:
          x: "目玉模様の　触角を　持つ。\n４枚の　羽で　浮かび上がり\n前後左右に　動くことができる。"
          y: "４枚の　羽で　浮かび上がり\n前後　左右　自由自在に\n飛び回る　ことが　できる。"
        en:
          x: "Its antennae have eye patterns on them. Its four\nwings enable it to hover and fly in any direction."
          y: "It flaps its four wings to hover and fly freely in any\ndirection--to and fro and sideways."
        fr:
          x: "Des motifs en forme d’yeux ornent ses antennes.\nSes quatre ailes l’aident à voler dans toutes les\ndirections."
          y: "Ses quatre ailes permettent à ce Pokémon de voler\ndans toutes les directions."
        it:
          x: "Le sue antenne presentano un motivo a occhi.\nCon le quattro ali riesce a volare in ogni direzione."
          y: "Spalanca le quattro ali per poter svolazzare a\npiacimento avanti e indietro, a destra e a sinistra."
        de:
          x: "Seine Antenne besitzt ein Augenmuster. Seine vier\nFlügel erlauben es, in alle Richtungen zu fliegen."
          y: "Dank seiner vier Flügel kann es frei in alle Richtungen\nfliegen, sogar seitwärts und rückwärts."
        es:
          x: "Sus antenas tienen dibujos de ojos, mientras que sus\nalas le permiten volar en cualquier dirección."
          y: "Sus cuatro alas le permiten volar en cualquier\ndirección a su antojo."
        ko:
          x: "눈알 모양의 더듬이를 가지고 있다.\n4장의 날개로 떠올라\n전후좌우로 움직일 수 있다."
          y: "4장의 날개로 떠올라\n전후좌우로 자유자재로\n날아다닐 수 있다."
