          y: "せいでんきを　たいもうに　たくわえて\nほうでんする。あらしが　ちかづくと\nぜんしんから　ひばなを　ちらす。"
        jp_kanji:
          x: "体毛に　ためた　電気を　使い\n筋肉を　刺激することで\n瞬発力を　高める。"
          y: "静電気を　体毛に　たくわえて\n放電する。嵐が　近づくと\n全身から　火花を　散らす。"
        en:
          x: "Using electricity stored in its fur, it stimulates its\nmuscles to heighten its reaction speed."
          y: "It stores static electricity in its fur for discharging.\nIt gives off sparks if a storm approaches."
        fr:
          x: "Il améliore ses réflexes en stimulant ses muscles\ngrâce à l’électricité dans sa fourrure."
          y: "Dynavolt stocke de l’électricité statique dans sa\nfourrure. Il produit des étincelles lorsque le temps\ndevient orageux."
        it:
          x: "L’elettricità immagazzinata nella pelliccia gli stimola\ni muscoli e aumenta la sua velocità di reazione."
          y: "Accumula elettricità statica nella pelliccia, che poi\nscarica. Se si avvicina una tempesta, lo si vede\nscintillare."
        de:
          x: "Die Elektrizität, die es im Fell speichert, nutzt es,\num seine Muskeln zu stimulieren."
          y: "In seinem Fell speichert es statische Elektrizität für\nspätere Entladungen. Braut sich ein Sturm zusammen,\nentlädt es Funken."
        es:
          x: "Estimula sus músculos y aumenta sus reflejos con la\nelectricidad que almacena su pelaje."
          y: "Acumula electricidad estática en el pelaje para lanzar\ndescargas. Cuando va a haber tormenta, suelta\nchispas."
        ko:
          x: "털에 모은 전기를 써서\n근육을 자극함으로써\n순발력을 높인다."
          y: "정전기를 털에 비축하여\n방전한다. 폭풍이 가까이 오면\n온몸에서 불꽃을 튀긴다."
