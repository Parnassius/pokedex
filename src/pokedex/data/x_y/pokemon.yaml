          y: "しっぽから　くさい　しるを　とばす。\nおなかで　じゅくせいさせる　じかんが\nながいほど　においが　ひどくなる。"
        jp_kanji:
          x: "尻尾の　先から　ひどい　においの\n液体を　飛ばして　攻撃する。\n飛距離は　５０メートル以上。"
          y: "尻尾から　くさい　汁を　飛ばす。\nお腹で　熟成させる　時間が\n長いほど　においが　ひどくなる。"
        en:
          x: "It sprays a vile-smelling fluid from the tip of its tail\nto attack. Its range is over 160 feet."
          y: "It sprays a stinky fluid from its tail. The fluid smells\nworse the longer it is allowed to fester."
        fr:
          x: "Il attaque en projetant un liquide fétide du bout de\nsa queue. Il peut tirer à 50 m."
          y: "Sa queue projette un fluide puant. Plus on le laisse\ns’écouler et plus son odeur est insoutenable."
        it:
          x: "Attacca spruzzando un fluido puzzolente dalla\ncoda. Ha un raggio d’azione di oltre 50 m."
          y: "Spruzza un fluido puzzolente dalla coda. Quest’odore\ndiventa insopportabile se fatto suppurare."
        de:
          x: "Über seine Schweifspitze versprüht es eine\nübelriechende Substanz. Die Reichweite liegt\nbei über 50 m."
          y: "Es spritzt eine stinkende Substanz aus seinem Schweif.\nHat sie lange gegärt, stinkt sie stärker."
        es:
          x: "Para atacar, emite un fluido maloliente por la punta de\nsu cola que puede llegar a más de 50 m."
          y: "Emite un fluido apestoso por la cola. Cuanto más\ntiempo pasa, peor huele."
        ko:
          x: "꼬리 끝에서 심한 냄새가 나는\n액체를 뿌려 공격한다.\n사정거리는 50m 이상이다."
          y: "꼬리에서 역한 분비액을 날린다.\n배에서 숙성된 시간이\n길수록 냄새가 심해진다."
bronzor:
