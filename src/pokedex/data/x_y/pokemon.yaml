          x: "カラのなかに　しあわせが　たくさん\nつまっているらしく　やさしくされると\nこううんを　わけあたえる　という。"
          y: "ねている　トゲピーを　うまく\nたたせることが　できれば　しあわせに\nなれるとの　いいつたえがある。"
        jp_kanji:
          x: "殻の中に　幸せが　たくさん\nつまっているらしく　優しくされると\n幸運を　分け与える　という。"
          y: "寝ている　トゲピーを　うまく\n立たせることが　できれば　幸せに\nなれるとの　言い伝えがある。"
        en:
          x: "The shell seems to be filled with joy. It is said that\nit will share good luck when treated kindly."
          y: "A proverb claims that happiness will come to\nanyone who can make a sleeping Togepi stand up."
        fr:
          x: "Sa coquille est remplie de joie. On dit que s’il est\nbien traité, il porte chance."
          y: "Un proverbe nous enseigne que le bonheur touchera\ncelui qui peut faire tenir debout un Togepi endormi."
        it:
          x: "Il suo guscio sembra ricolmo di gioia. Si dice che\nporti fortuna se lo si tratta bene."
          y: "Un proverbio dice che chi riuscirà a far alzare un\nTogepi dormiente sarà baciato dalla fortuna."
        de:
          x: "Seine Schale ist voll von Freude. Es teilt sein\nGlück, wenn man es freundlich und gut behandelt."
          y: "Ein Sprichwort besagt, dass Glück dem widerfährt,\ndem es gelingt, ein schlafendes Togepi zu wecken."
        es:
          x: "El cascarón parece estar lleno de alegría. Dicen que\ntrae buena suerte si es tratado con cariño."
          y: "Dice el proverbio que quien despierte a un Togepi de\nsu sueño, alcanzará la felicidad."
        ko:
          x: "껍질 안에 행복이 가득\n차 있어서 상냥하게 대하면\n행운을 나누어 준다고 한다."
          y: "자고 있는 토게피를 잘\n세울 수 있다면 행복해질 수\n있다는 이야기가 전해진다."
