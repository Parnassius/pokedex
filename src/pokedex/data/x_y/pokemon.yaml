        - amorphous
      abilities:
        - pickup
        - frisk
      hidden_ability: insomnia
      held_items:
        common: miracle_seed
        rare: miracle_seed
      descriptions:
        jp_kana:
          x: "じょうぶつできない　たましいを\nかぼちゃの　からだに　いれている。\nひぐれと　ともに　うごきはじめる。"
          y: "さまよう　たましいを　じょうぶつ\nさせるため　ししゃの　すむ　せかいへ\nはこんでいると　いわれている。"
        jp_kanji:
          x: "成仏できない　魂を\nカボチャの　体に　入れている。\n日暮れと　ともに　動きはじめる。"
          y: "さまよう　魂を　成仏させるため\n死者の　住む　世界へ\n運んでいると　言われている。"
        en:
          x: "The pumpkin body is inhabited by a spirit\ntrapped in this world. As the sun sets,\nit becomes restless and active."
          y: "It is said to carry wandering spirits\nto the place where they belong\nso they can move on."
        fr:
          x: "Ce Pokémon est né du mariage d’un esprit piégé\ndans le monde des vivants et d’une citrouille.\nIl commence à s’animer au coucher du soleil."
          y: "Il paraît qu’il accompagne les âmes des défunts\njusque dans l’au-delà, pour qu’elles puissent goûter\nau repos éternel."
        it:
          x: "Pokémon nato quando uno spirito inquieto è entrato\nin una zucca. Si attiva dopo il calar del sole."
          y: "Si dice che aiuti le anime smarrite a ritrovare\nil cammino."
        de:
          x: "Es entsteht aus der Vereinigung einer in der Welt\nder Lebenden gefangenen Seele mit einem Kürbis.\nEs wird erst nach Sonnenuntergang aktiv."
          y: "Man sagt, es führe verlorene Seelen dem Ende ihres\nrastlosen irdischen Wandelns entgegen und geleite sie\nsicher ins Jenseits."
        es:
          x: "En el interior de la calabaza reside un espíritu que ha\npermanecido atrapado en este mundo. Entra en acción\nal caer la noche."
          y: "Se dice que este Pokémon se dedica a guiar las almas\nerrantes al otro mundo para que así puedan descansar\nen paz durante toda la eternidad."
        ko:
          x: "성불하지 못한 혼을\n호박으로 된 몸속에 담고 있다.\n해가 지면 활동하기 시작한다."
          y: "떠도는 영혼을 성불시키기 위해\n죽은 자들이 사는 세계로\n옮기고 있다고 전해진다."
gourgeist:
  species_id: 711
  names:
    jp_kana: パンプジン
    jp_kanji: パンプジン
    en: Gourgeist
    fr: Banshitrouye
    it: Gourgeist
    de: Pumpdjinn
    es: Gourgeist
    ko: 펌킨인
  forms:
    gourgeist_medium_variety:
      form_id: 0
      names:
        jp_kana: ふつうのサイズ
        jp_kanji: ふつうのサイズ
        en: Average Size
        fr: Taille Normale
        it: Normale
        de: Größe M
        es: Tamaño Normal
        ko: 보통 사이즈
      base_stats:
        hp: 65
        attack: 90
        defense: 122
        special_attack: 58
        special_defense: 75
        speed: 84
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - amorphous
      abilities:
        - pickup
        - frisk
      hidden_ability: insomnia
      descriptions:
        jp_kana:
          x: "しんげつの　よるに　ぶきみな　こえで\nうたいながら　まちなかを　さまよう。\nその　うたを　きくと　のろわれる。"
          y: "かみのけのような　うでで　えものを\nしめつける。くるしむ　ようすを\nみながら　たのしそうに　うたうのだ。"
        jp_kanji:
          x: "新月の　夜に　不気味な　声で\n歌いながら　街中を　さまよう。\nその歌を　聞くと　のろわれる。"
          y: "髪の毛のような　腕で　獲物を\n締めつける。苦しむ　様子を　見ながら\n楽しそうに　歌うのだ。"
        en:
          x: "Singing in eerie voices, they wander\ntown streets on the night of the new moon.\nAnyone who hears their song is cursed."
          y: "It enwraps its prey in its hairlike arms.\nIt sings joyfully as it observes the\nsuffering of its prey."
        fr:
          x: "Les nuits de nouvelle lune, ce Pokémon erre dans\nles rues en chantant d’une voix lugubre.\nCeux qui l’entendent sont maudits."
          y: "Il enserre ses proies dans ses bras, semblables\nà de longues mèches de cheveux. Il se délecte\nde leur souffrance en chantonnant gaiement."
        it:
          x: "Vaga per le città nelle notti di luna nuova intonando\nuna melodia sinistra. Chi la ascolta, viene colpito da\nuna maledizione."
          y: "Intrappola le prede con i suoi arti simili a capelli e\ncanta dolcemente mentre queste si dibattono per\nliberarsi."
        de:
          x: "Unter unheimlichen Gesängen durchstreift es in\nNeumondnächten Städte und Dörfer. Wer dem\nunheilvollen Gesang lauscht, wird verflucht."
          y: "Mit seinen haarähnlichen Armen erfasst es seine Beute\nund stimmt angesichts deren offenkundiger Qualen\nfreudig ein Lied an."
        es:
          x: "En las noches de luna nueva deambula por las calles\nde las ciudades y emite espeluznantes alaridos que\nmaldicen a quienes los oyen."
          y: "Atrapa a su presa con los brazos, que parecen formar\nsendas matas de pelo, y entona una alegre canción\nmientras se regodea con su sufrimiento."
        ko:
          x: "초승달이 뜬 밤에 기분 나쁜 목소리로\n노래를 부르며 마을 안을 헤맨다.\n그 노래를 들으면 저주를 받는다."
          y: "머리카락 같은 팔로 사냥감을\n조른다. 괴로워하는 모습을\n지켜보며 즐거운 듯 노래한다."
