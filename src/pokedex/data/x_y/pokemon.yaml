        jp_kana:
          x: "コンクリートを　つくる　ぎじゅつは\n２０００ねんまえに　ローブシンから\nおそわったと　かんがえられている。"
          y: "ちからに　たよらず　えんしんりょくを\nうまく　いかして　コンクリートを\nふりまわす　わざを　つかいこなせる。"
        jp_kanji:
          x: "コンクリートを　作る　技術は\n２０００年前に　ローブシンから\n教わったと　考えられている。"
          y: "力に　頼らず　遠心力を\nうまく　活かして　コンクリートを\n振り回す　技を　使いこなせる。"
        en:
          x: "It is thought that Conkeldurr taught humans how to\nmake concrete more than 2,000 years ago."
          y: "Rather than rely on force, they master moves that\nutilize the centrifugal force of spinning concrete."
        fr:
          x: "On pense que la recette du ciment a été enseignée\naux humains par un Bétochef il y a 2 000 ans."
          y: "Il utilise l’effet centrifuge pour manier sans trop\nd’effort ses piliers de béton et déclencher des\nattaques puissantes."
        it:
          x: "Si pensa che la tecnica per fare il cemento sia stata\ndiffusa proprio da Conkeldurr, 2000 anni fa."
          y: "Non si affida solo ai muscoli, ma sfrutta la forza\ncentrifuga per far roteare con maestria i suoi pilastri\ndi cemento."
        de:
          x: "Man nimmt an, dass es der Menschheit\nvor ca. 2 000 Jahren das Betonmischen\nbeigebracht hat."
          y: "Es setzt Attacken ein, die sich die Zentrifugalkraft\nzunutze machen, indem es seine Betonpfeiler\numherschwingt."
        es:
          x: "Se cree que Conkeldurr enseñó a los humanos\nla técnica para elaborar cemento hace más de\n2000 años."
          y: "En vez de hacer uso de la fuerza bruta, blande\ncolumnas de hormigón con la energía centrífuga\nde sus movimientos."
        ko:
          x: "콘크리트를 만드는 기술은\n2000년 전에 노보청에게\n배운 것이라고 여겨지고 있다."
          y: "힘에 의지하지 않고 원심력을\n잘 활용하여 콘크리트를\n휘두르는 기술을 잘 다룬다."
