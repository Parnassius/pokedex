          x: "あいてと　おなじ　なきごえを　だす\nことで　なかまと　おもいこませて\nおそわれない　ように　しているのだ。"
          y: "ひとの　ことばを　おぼえて　なく。\nなかまが　いっかしょに　あつまると\nみんな　おなじ　ことばを　おぼえる。"
        jp_kanji:
          x: "相手と　同じ　鳴き声を　出す　ことで\n仲間と　思いこませて\n襲われないように　しているのだ。"
          y: "人の　言葉を　覚えて　鳴く。\n仲間が　一か所に　集まると\nみんな　同じ　言葉を　覚える。"
        en:
          x: "It mimics the cries of other Pokémon to trick them\ninto thinking it’s one of them. This way they won’t\nattack it."
          y: "It can learn and speak human words. If they gather,\nthey all learn the same saying."
        fr:
          x: "Il reproduit le cri de ses ennemis pour faire croire\nqu’il est des leurs et éviter d’être attaqué."
          y: "On peut lui enseigner quelques mots. S’il s’agit\nd’un groupe, ils retiendront les mêmes phrases."
        it:
          x: "Imita la voce dei nemici per far credere che è dei\nloro, evitando così di essere assalito."
          y: "Può imparare il linguaggio umano. Se un gruppo si\nraduna, tutti imparano le stesse parole."
        de:
          x: "Es versucht Attacken zu entgehen, indem es den Ruf\ndes Gegners nachahmt und einen Artgenossen mimt."
          y: "Es kann die menschliche Sprache nachahmen.\nVersammeln sie sich, bringen sich alle dasselbe bei."
        es:
          x: "Imita los sonidos de sus rivales, haciéndoles creer que\nson amigos e impidiendo que le ataquen."
          y: "Puede imitar el lenguaje humano. Si se juntan\nvarios, todos aprenden las mismas palabras."
        ko:
          x: "상대와 같은 울음소리를 내서\n동료라고 굳게 믿게 하여\n습격당하지 않도록 하고 있다."
          y: "사람의 말을 기억해서 운다.\n동료가 한 장소에 모이면\n모두 똑같은 말을 기억한다."
