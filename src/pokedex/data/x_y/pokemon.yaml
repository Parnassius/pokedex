          y: "チビノーズと　よばれる　ちいさな\n３つの　ユニットを　じりょくで\nじゆうじざいに　あやつっている。"
        jp_kanji:
          x: "全身から　強い　磁力を　出している。\n３個の　チビノーズと　呼ばれる\nユニットを　操る。"
          y: "チビノーズと　呼ばれる　小さな\n３つの　ユニットを　磁力で\n自由自在に　操っている。"
        en:
          x: "It exudes strong magnetism from all over.\nIt controls three small units called Mini-Noses."
          y: "It freely controls three small units called Mini-Noses\nusing magnetic force."
        fr:
          x: "Son corps libère une puissante force magnétique.\nIl dirige trois petites unités appelées Mini-nez."
          y: "Il utilise sa force magnétique pour diriger trois petites\nunités appelées Mini-nez."
        it:
          x: "Emana un forte magnetismo da tutto il corpo.\nControlla tre piccole unità, dette Mininasi."
          y: "Controlla tre piccole unità, dette Mininasi, usando\nla forza magnetica."
        de:
          x: "Es gibt starken Magnetismus ab. Es steuert drei\nkleine Einheiten, die sich Mininasen nennen."
          y: "Es steuert drei kleine Einheiten mithilfe von\nstarkem Magnetismus. Man nennt sie Mininasen."
        es:
          x: "Emana un fuerte magnetismo. Controla tres pequeñas\nunidades llamadas mininarices."
          y: "Con el magnetismo que emana, controla tres pequeñas\nunidades llamadas mininarices."
        ko:
          x: "전신에서 강한 자력을 발산하고\n있다. 꼬마코파스라고 불리는\n3개의 유닛을 조종한다."
          y: "꼬마코파스라고 불리는 작은\n3개의 유닛을 자력으로\n자유자재로 조종한다."
