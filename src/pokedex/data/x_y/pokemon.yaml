      types:
        - dragon
        - fire
      egg_groups:
        - undiscovered
      abilities:
        - turboblaze
      descriptions:
        jp_kana:
          x: "ほのおで　せかいを　もやしつくせる\nでんせつの　ポケモン。しんじつの\nせかいを　きずく　ひとを　たすける。"
          y: "レシラムの　しっぽが　もえると\nねつエネルギーで　たいきが　うごいて\nせかいの　てんきが　へんかする。"
        jp_kanji:
          x: "炎で　世界を　燃やしつくせる\n伝説の　ポケモン。真実の\n世界を　築く　人を　助ける。"
          y: "レシラムの　尻尾が　燃えると\n熱エネルギーで　大気が　動いて\n世界の　天気が　変化する。"
        en:
          x: "This legendary Pokémon can scorch the world with\nfire. It helps those who want to build a world\nof truth."
          y: "When Reshiram’s tail flares, the heat energy moves\nthe atmosphere and changes the world’s weather."
        fr:
          x: "Un Pokémon légendaire assez puissant pour embraser\nle monde entier. Il soutient les défenseurs de la\nRéalité."
          y: "Quand sa queue s’embrase, l’énergie thermique\ndégagée modifie l’atmosphère et bouleverse la météo\ndu monde entier."
        it:
          x: "Questo Pokémon leggendario può rendere il mondo\nun inferno di fiamme. Aiuta chi vuole costruire un\nmondo di verità."
          y: "Quando la sua coda brucia, il calore prodotto smuove\nl’aria provocando cambiamenti climatici in tutto il\nglobo."
        de:
          x: "Ein Legendäres Pokémon mit der Macht, die Welt\nmit seinen Flammen einzuäschern. Hilft allen,\ndie nach Wirklichkeit streben."
          y: "Lodert das Feuer in seinem Schweif auf, gerät die\nErdatmosphäre durch die Hitze in Wallung und\ndas Weltklima ändert sich."
        es:
          x: "Pokémon legendario capaz de abrasar el mundo con\nsus llamas. Ayuda a quienes persiguen un mundo\nveraz."
          y: "Cuando la cola de Reshiram arde, su energía calorífica\naltera la atmósfera, y el tiempo meteorológico cambia."
        ko:
          x: "불꽃으로 세상을 태워버릴 수 있는\n전설의 포켓몬. 진실의 세계를\n구축하는 사람을 도와준다."
          y: "레시라무의 꼬리가 불타면\n열에너지로 대기가 움직여서\n세계의 날씨가 변화된다."
