          y: "クレセリアの　はねを　もって　ねると\nたのしい　ゆめが　みられると　いう。\nみかづきのけしん　と　よばれている。"
        jp_kanji:
          x: "飛行するときは　ベールのような\n羽から　光る　粒子を　出す。\n三日月の化身と　呼ばれている。"
          y: "クレセリアの　羽を　持って　寝ると\n楽しい　夢が　見られると　いう。\n三日月の化身　と　呼ばれている。"
        en:
          x: "Shiny particles are released from its wings like a\nveil. It is said to represent the crescent moon."
          y: "Those who sleep holding Cresselia’s feather are\nassured of joyful dreams. It is said to represent\nthe crescent moon."
        fr:
          x: "Ses ailes libèrent un rideau de particules brillantes.\nCe Pokémon symboliserait le croissant de lune."
          y: "Dormir avec une de ses plumes à la main permet de\nfaire de beaux rêves. On le surnomme « avatar du\ncroissant de lune »."
        it:
          x: "Volando rilascia un velo di particelle brillanti.\nSi dice che rappresenti la luna crescente."
          y: "Se si dorme con piume di Cresselia, si faranno bei\nsogni. È l’incarnazione di uno spicchio di luna."
        de:
          x: "Seine Flügel geben schimmernde Partikel ab,\ndie wie ein Schleier herabrieseln. Man sagt,\nes verkörpere die Mondsichel."
          y: "Hält man eine seiner Federn, träumt man süß. Manche\nglauben, es sei die Verkörperung der Mondsichel."
        es:
          x: "Sus alas emiten un velo de partículas brillantes. Se\ndice que representa un cuarto lunar."
          y: "Si alguien se duerme con una pluma suya, tendrá\nsueños maravillosos. Encarna el creciente lunar."
        ko:
          x: "비행할 때는 베일 같은\n날개에서 빛나는 입자를 낸다.\n초승달의 화신으로 불리고 있다."
          y: "크레세리아의 날개를 가지고 자면\n즐거운 꿈을 꿀 수 있다고 한다.\n초승달의 화신으로 불리고 있다."
phione:
  species_id: 489
  names:
    jp_kana: フィオネ
    jp_kanji: フィオネ
    en: Phione
    fr: Phione
    it: Phione
    de: Phione
    es: Phione
    ko: 피오네
