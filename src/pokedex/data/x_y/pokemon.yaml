          x: "きゃくりょくで　きのみを　くだく。\nどんなに　つよい　あいてでも\nゆうかんに　たちむかう　しゅうせい。"
          y: "つよい　あいてにも　みさかいなく\nたたかいを　いどむ。たたかいを\nくりかえす　ことで　つよくなるのだ。"
        jp_kanji:
          x: "脚力で　木の実を　砕く。\nどんなに　強い　相手でも\n勇敢に　立ち向かう　習性。"
          y: "強い　相手にも　見境なく　戦いを\n挑む。戦いを　繰り返す　ことで\n強くなるのだ。"
        en:
          x: "They crush berries with their talons. They bravely\nstand up to any opponent, no matter how strong\nit is."
          y: "They will challenge anything, even strong\nopponents, without fear. Their frequent fights help\nthem become stronger."
        fr:
          x: "Il casse les Baies avec ses serres. Il combat\ncourageusement, quelle que soit la force de\nl’adversaire."
          y: "Il défie sans discernement même les ennemis\npuissants. Il devient plus fort en multipliant les\ncombats."
        it:
          x: "Si serve degli arti come schiaccianoci per rompere le\nbacche. Affronta con valore anche i nemici più forti."
          y: "Sfida indiscriminatamente avversari anche più forti\ndi lui. Si irrobustisce a forza di lottare."
        de:
          x: "Kann mit seinen Füßen Nüsse zermalmen.\nEs stellt sich jedem noch so starken Gegner\ntapfer zum Kampf."
          y: "Es zettelt willkürlich Kämpfe an, egal wie stark\nder Gegner auch ist. Es gewinnt an Stärke,\nindem es seine Fehler analysiert."
        es:
          x: "Quiebra bayas con sus extremidades. Se enfrenta con\nvalentía a todo enemigo por fuerte que este sea."
          y: "Desafía indiscriminadamente a rivales poderosos.\nLibrar numerosas batallas lo hace fuerte."
        ko:
          x: "다리 힘으로 나무열매를 으깬다.\n아무리 강한 상대라도\n용감히 맞서는 습성이 있다."
          y: "강한 상대에게도 무작정\n싸움을 건다. 싸움을 계속\n반복하며 강해진다."
