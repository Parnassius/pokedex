          y: "Es taucht auf, wenn es spürt, dass eine\nNaturkatastrophe kurz bevorsteht. Daher wurde es\nirrtümlicherweise für einen Unheilsboten gehalten."
        es:
          x: "Presiente desastres inminentes y se aparece a la gente\npara advertir del peligro."
          y: "Aparece cuando prevé una catástrofe natural\ninminente, por eso dicen que trae mala suerte."
        ko:
          x: "재해의 위험을 감지한다.\n위험을 알리는 때에만\n사람 앞에 나타난다고 한다."
          y: "재해의 징조를 느끼면 모습을\n보이기 때문에 재앙을 부르는\n포켓몬으로 오해받고 있었다."
wynaut:
