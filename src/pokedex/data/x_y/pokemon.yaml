          y: "ぶんれつした　２つの　のうみそで\nおなじことを　かんがえると　だせる\nサイコパワーは　さいこうと　なる。"
        jp_kanji:
          x: "２つに　分裂した　脳みそを\n持っているため　いきなり　違う\n行動を　とることが　あるのだ。"
          y: "分裂した　２つの　脳みそで\n同じことを　考えると　だせる\nサイコパワーは　最高と　なる。"
        en:
          x: "Since they have two divided brains, at times they\nsuddenly try to take two different actions at once."
          y: "When their two divided brains think the same\nthoughts, their psychic power is maximized."
        fr:
          x: "Il possède deux cerveaux séparés qui le font parfois\nagir de façon totalement incohérente."
          y: "Il dégage le maximum de sa puissance psychique\nquand ses deux cerveaux réfléchissent à la même\nchose."
        it:
          x: "Poiché ha due cervelli separati e indipendenti, può\ncapitare che si comporti in modo del tutto incoerente."
          y: "I suoi poteri psichici sono al massimo quando le due\nparti in cui è diviso il suo cervello pensano la stessa\ncosa."
        de:
          x: "Wegen seines gespaltenen Denkapparates kann es\nvorkommen, dass es sich abrupt einer anderen\nTätigkeit zuwendet."
          y: "Wenn beide Hälften seines gespaltenen Denkapparates\nan dasselbe denken, sind seine Psycho-Kräfte am\nstärksten."
        es:
          x: "Dado que su cerebro está dividido en dos, a veces\ntiene conflictos a la hora de decidir qué hacer."
          y: "Cuando las dos partes de su cerebro piensan lo\nmismo, saca todo su poder a relucir."
        ko:
          x: "둘로 분열된 뇌를\n가지고 있어서 갑자기 다른\n행동을 취할 때가 있다."
          y: "분열한 2개의 뇌로\n같은 생각을 하면 낼 수 있는\n사이코 파워는 최고가 된다."
reuniclus:
