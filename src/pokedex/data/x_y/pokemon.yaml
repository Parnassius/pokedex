      descriptions:
        jp_kana:
          x: "せまい　ほらあなを　はしりまわり\nえものを　するどい　ツメで　ほかく。\nかおの　ひふは　いわより　かたい。"
          y: "にっこうを　つばさで　うけて\nからだを　あたためる。たいおんが\nさがると　うごけなくなってしまう。"
        jp_kanji:
          x: "狭い　洞穴を　走り回り\n獲物を　鋭い　ツメで　捕獲。\n顔の　皮膚は　岩より　硬い。"
          y: "日光を　翼で　受けて　体を　温める。\n体温が　下がると\n動けなくなってしまう。"
        en:
          x: "It races through narrow caves, using its sharp claws\nto catch prey. The skin on its face is harder than\na rock."
          y: "It warms its body by absorbing sunlight with its\nwings. When its body temperature falls, it can no\nlonger move."
        fr:
          x: "Il sillonne les grottes étroites, capturant ses proies\navec ses griffes acérées. Sa face est dure comme\nle roc."
          y: "Il utilise ses ailes pour emmagasiner la chaleur du\nsoleil. Si la température de son corps baisse, il ne\npeut plus bouger."
        it:
          x: "Percorre le grotte anguste catturando le prede con\ngli artigli affilati. La pelle del muso è più dura della\nroccia."
          y: "Si riscalda assorbendo la luce del sole dalle ali.\nQuando la sua temperatura si abbassa, non riesce\npiù a muoversi."
        de:
          x: "Es jagt durch enge Höhlengänge und spießt seine\nGegner mit spitzen Klauen auf. Seine Kopfhaut ist\nfester als Stein."
          y: "Es erwärmt seinen Körper, indem es mit den Flügeln\ndas Sonnenlicht einfängt. Kühlt sein Körper ab,\nerstarrt es."
        es:
          x: "Corre por estrechas cavernas y atrapa a sus presas con\nsus afiladas garras. La piel de la cara es más dura que\nuna roca."
          y: "Calienta su cuerpo absorbiendo los rayos de sol por\nlas alas. No se puede mover si baja su temperatura\ncorporal."
        ko:
          x: "좁은 동굴을 뛰어다니며\n날카로운 손톱으로 먹이를 잡는다.\n얼굴 피부는 바위보다 단단하다."
          y: "날개로 햇빛을 받아\n몸을 따뜻하게 한다. 체온이\n내려가면 움직일 수 없게 된다."
golett:
