          y: "からだを　つくっている　がんせきと\nおなじ　ものが　せかいじゅうの\nあらゆる　ちそうで　みつかっている。"
        jp_kanji:
          x: "全身が　岩で　できている。\n戦いで　体が　欠けても\n岩を　くっつけて　治してしまう。"
          y: "体を　作っている　岩石と\n同じ　物が　世界中の\nあらゆる　地層で　見つかっている。"
        en:
          x: "Its entire body is made of rock. If any part chips off\nin battle, it attaches rocks to repair itself."
          y: "The same rocks that form its body have been found\nin ground layers around the world."
        fr:
          x: "Tout son corps est fait de roche. S’il s’ébrèche au\ncombat, il utilise des pierres pour le réparer."
          y: "Les roches qui composent son corps se retrouvent\négalement dans les diverses couches terrestres."
        it:
          x: "È formato interamente da rocce. Se si staccano\nnella lotta, ne cerca altre per sostituirle."
          y: "I tipi di roccia che compongono il suo corpo possono\ntrovarsi in tutti gli strati geologici del mondo."
        de:
          x: "Sein Körper besteht aus Stein. Bricht im Kampf\netwas heraus, wird es durch Stein wieder ersetzt."
          y: "Die Steine, aus denen sein Körper besteht,\nstammen aus den unterschiedlichsten Ecken der Welt."
        es:
          x: "Su cuerpo está hecho de roca. Si se astilla durante el\ncombate, emplea piedras para repararlo."
          y: "Las rocas que componen el cuerpo de Regirock\npueden encontrarse en todos los estratos geológicos."
        ko:
          x: "전신이 바위로 되어 있다.\n싸움으로 몸이 깨어져도\n바위를 붙여서 치료해 버린다."
          y: "몸을 이루는 암석과\n같은 것이 세계 곳곳의\n여러 지층에서 발견되고 있다."
