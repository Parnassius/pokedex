          y: "プライドが　たかく　ひとから\nたべものを　もらう　ことを　きらう。\nながい　うぶげが　さむさを　ふせぐ。"
        jp_kanji:
          x: "世話を　焼かれる　ことが　大嫌い。\nトレーナーの　指示を　聞かないので\n仲良く　なるのが　難しい。"
          y: "プライドが　高く　人から\n食べ物を　もらう　ことを　嫌う。\n長い　産毛が　寒さを　防ぐ。"
        en:
          x: "It doesn’t like to be taken care of. It’s difficult to\nbond with since it won’t listen to its Trainer."
          y: "Because it is very proud, it hates accepting food\nfrom people. Its thick down guards it from cold."
        fr:
          x: "Ce Pokémon est difficile à entraîner car il est très\ndésobéissant et déteste qu’on lui rende service."
          y: "Il est fier et déteste accepter la nourriture qu’on\nlui offre. Son pelage épais le protège du froid."
        it:
          x: "Molto orgoglioso. Difficile farci amicizia perché\nnon ascolta mai i consigli dell’Allenatore."
          y: "È molto orgoglioso e odia accettare cibo dalla gente.\nLe fitte piume lo proteggono dal freddo."
        de:
          x: "Einmischung kann es gar nicht leiden. Es ist bockig\nund fasst nur schwer Zutrauen zu seinem Trainer."
          y: "Es ist sehr stolz und nimmt daher kein Futter von\nanderen an. Seine dicken Daunen schützen vor Kälte."
        es:
          x: "No le gusta que lo cuiden. Como no aprecia el apoyo\nde su Entrenador, le cuesta coger confianza con él."
          y: "Es muy orgulloso, por lo que odia aceptar comida de\nla gente. Su grueso plumón lo protege del frío."
        ko:
          x: "신세를 지는 것을 싫어한다.\n트레이너의 지시를 듣지 않아\n친해지기 어렵다."
          y: "자존심이 강해서 사람에게\n먹이를 얻는 것을 싫어한다.\n긴 솜털이 추위를 막는다."
