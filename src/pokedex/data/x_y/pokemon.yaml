      descriptions:
        jp_kana:
          x: "しっぽの　ツメで　えものを　はさみ\nどくを　おくりこむ。どくが　きくまで\nぜったいに　はなさない　しゅうねん。"
          y: "すなの　なかに　かくれて　えものを\nまちぶせする。しっぽの　ツメから\nどくを　だして　えものを　しとめる。"
        jp_kanji:
          x: "尻尾の　ツメで　獲物を　挟み\n毒を　送りこむ。毒が　効くまで\n絶対に　放さない　執念。"
          y: "砂の　中に　隠れて　獲物を\n待ち伏せする。尻尾の　ツメから\n毒を　出して　獲物を　しとめる。"
        en:
          x: "It grips prey with its tail claws and injects poison.\nIt tenaciously hangs on until the poison takes."
          y: "It burrows under the sand to lie in wait for prey.\nIts tail claws can inject its prey with a\nsavage poison."
        fr:
          x: "Il saisit sa proie avec les pinces de sa queue, lui\ninjecte un poison et la retient jusqu’à ce qu’il agisse."
          y: "Il attend, en embuscade dans le sable, et empoisonne\nses proies avec les pinces de sa queue."
        it:
          x: "Afferra le prede con gli artigli della coda e non si\nallontana finché il veleno che inietta non agisce."
          y: "Si seppellisce nella sabbia e tende agguati alle prede,\npoi inietta loro il veleno dagli artigli della coda."
        de:
          x: "Es greift seine Beute mit den Krallen an seinem\nSchweif und vergiftet sie. Dann wartet es ab..."
          y: "Es wartet im Sand versteckt auf Beute, die es sich\nmit seinem giftigen Schweif krallt."
        es:
          x: "Agarra a sus presas con las pinzas de la cola y les\ninyecta veneno. Espera hasta que hace efecto."
          y: "Acecha a sus presas escondido en la arena y las\naturde con el veneno de su cola."
        ko:
          x: "꼬리의 발톱으로 먹이를 집어\n독을 주입한다. 독이 퍼질 때까지\n절대 놓치지 않는 집념이 있다."
          y: "모래 속에 숨어 먹이를\n기다리고 있다. 꼬리의 발톱에서\n독을 내서 먹이를 꼼짝 못하게 한다."
drapion:
  species_id: 452
  names:
    jp_kana: ドラピオン
    jp_kanji: ドラピオン
    en: Drapion
    fr: Drascore
    it: Drapion
    de: Piondragi
    es: Drapion
    ko: 드래피온
  forms:
    drapion:
      form_id: 0
      base_stats:
        hp: 70
        attack: 90
        defense: 110
        special_attack: 60
        special_defense: 75
