        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - fire
        - flying
      egg_groups:
        - flying
      abilities:
        - flame_body
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          x: "ひのこを　クチバシから　とばして\nくさむらを　こがし　おどろいて\nとびだした　えものを　つかまえる。"
          y: "おなかの　ほのおぶくろの　かりょくが\nつよまるほど　はやく　とべるが\nてんかするまで　じかんが　かかる。"
        jp_kanji:
          x: "火の粉を　クチバシから　飛ばして\n草むらを　焦がし　驚いて\n飛び出した　獲物を　捕まえる。"
          y: "お腹の　炎袋の　火力が\n強まるほど　速く　飛べるが\n点火するまで　時間が　かかる。"
        en:
          x: "From its beak, it expels embers that set\nthe tall grass on fire. Then it pounces on\nthe bewildered prey that pop out of the grass."
          y: "The hotter the flame sac on its belly,\nthe faster it can fly, but it takes some\ntime to get the fire going."
        fr:
          x: "Il crache des étincelles pour brûler les hautes herbes\net attraper les proies surprises qui tentent d’échapper\nà l’incendie."
          y: "Il possède une poche remplie de feu sur son ventre.\nPlus elle émet de chaleur, plus il vole vite.\nCependant, elle met quelque temps à chauffer."
        it:
          x: "Incendia i cespugli producendo scintille con il becco\ne cattura le prede che ne escono spaventate."
          y: "Nel ventre ha una sacca ardente che gli permette di\nvolare più velocemente in base all’intensità del fuoco,\nma per riscaldarla al punto giusto occorre del tempo."
        de:
          x: "Es speit Funken aus seinem Schnabel und fängt\ndie Beute, die überrascht aus dem angesengten Gras\nhervorspringt."
          y: "Je heißer die Flammen im Feuersack seines Bauches\nlodern, desto schneller kann es fliegen. Es dauert\njedoch eine Weile, bis es zur Zündung kommt."
        es:
          x: "Lanza chispas por su pico y prende fuego a la hierba\nalta para así sorprender a sus presas y atraparlas\ncuando intentan escapar."
          y: "Cuanto más intenso sea el calor que se genera en la\nsaca de fuego de su vientre, más rápido es capaz de\nvolar. Sin embargo, la llama tarda en prender."
        ko:
          x: "부리에서 불꽃을 뿜어\n풀숲을 태우고 놀라서\n뛰쳐나온 사냥감을 잡는다."
          y: "배에 있는 불꽃 주머니의 화력이\n강해질수록 빨리 날 수 있지만\n점화할 때까지 시간이 걸린다."
talonflame:
  species_id: 663
  names:
    jp_kana: ファイアロー
    jp_kanji: ファイアロー
    en: Talonflame
    fr: Flambusard
