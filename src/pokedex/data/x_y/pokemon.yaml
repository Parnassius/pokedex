          y: "ヤドンが　うみへ　エサを\nとりにいったとき　シェルダーに\nしっぽをかまれ　ヤドランになった。"
        jp_kanji:
          x: "くっついている　シェルダーは\n尻尾から　にじみ出る　うま味が\n欲しくて　ずっと　離れない。"
          y: "ヤドンが　海へ　エサを\n取りにいったとき　シェルダーに\n尻尾を　かまれ　ヤドランになった。"
        en:
          x: "An attached Shellder won’t let go because of\nthe tasty flavor that oozes out of its tail."
          y: "When a Slowpoke went hunting in the sea, its tail\nwas bitten by a Shellder. That made it evolve\ninto Slowbro."
        fr:
          x: "Le Kokiyas accroché à sa queue est friand de ce qu’il\ndévore et ne veut pas lâcher prise."
          y: "Un Kokiyas s’est un jour accroché à la queue d’un\nRamoloss qui pêchait et l’a fait évoluer en Flagadoss."
        it:
          x: "Lo Shellder che gli sta attaccato non si stacca mai\na causa del profumo appetitoso della coda."
          y: "Uno Slowpoke che si trovava in mare in cerca di cibo\nfu morso da uno Shellder, evolvendosi in Slowbro."
        de:
          x: "Das Muschas an seiner Rute lässt nicht locker,\nda ein leckerer Geschmack aus seiner Rute strömt."
          y: "Als Flegmon im Wasser jagen ging, wurde es von\neinem Muschas gebissen. Dadurch entwickelte es sich\nzu Lahmus."
        es:
          x: "Tiene una cola tan apetecible, que el Shellder que va\nenganchado a ella no se soltará por nada del mundo."
          y: "Según parece, cuando Slowpoke fue a pescar al río,\nle mordió un Shellder en la cola y así se convirtió en\nSlowbro."
        ko:
          x: "붙어 있는 셀러는\n꼬리에서 배어 나오는 맛을\n좋아해서 계속 떨어지지 않는다."
          y: "야돈이 바다로 먹이를\n잡으러 갔다가 셀러에게\n꼬리를 물려 야도란이 되었다."
