      descriptions:
        jp_kana:
          x: "たいないに　おさまりきらずに\nもれだした　エネルギーが　かたまり\nオレンジいろの　けっしょうになった。"
          y: "げんきだと　コアが　とびだしてくる。\nからだの　むきを　かえることなく\nぜんごさゆうに　すばやく　うごける。"
        jp_kanji:
          x: "体内に　収まりきらず　漏れ出した\nエネルギーが　固まり\nオレンジ色の　結晶になった。"
          y: "元気だと　コアが　飛びだしてくる。\n体の　向きを　変えることなく\n前後左右に　素早く　動ける。"
        en:
          x: "Because its energy was too great to be contained,\nthe energy leaked and formed orange crystals."
          y: "When it is healthy, its core sticks out. Always facing\nthe same way, it swiftly moves front to back and left\nto right."
        fr:
          x: "L’énergie de son corps qu’il ne parvient pas à retenir\ns’écoule à l’extérieur et forme des cristaux orangés."
          y: "Quand il est en forme, son noyau devient visible.\nIl peut se déplacer dans toutes les directions sans\nse tourner."
        it:
          x: "L’energia sovrabbondante cerca sfogo all’esterno\ndel corpo e si solidifica formando cristalli di colore\narancione."
          y: "Se è in forma, il suo nucleo è visibile. Si sposta\nrapidamente nelle quattro direzioni senza cambiare\norientamento."
        de:
          x: "Energie, die ungehindert aus seinem Körper austrat,\nhat sich an ihm zu orangefarbenen Kristallen verfestigt."
          y: "Ist es guter Dinge, kommt sein Kern zum Vorschein.\nKann blitzschnell die Richtung ändern, ohne sich\numdrehen zu müssen."
        es:
          x: "La energía que no puede contener en el interior de\nsu cuerpo se escapa formando cristales naranjas."
          y: "Si se encuentra bien, deja entrever su núcleo. Puede\ncambiar rápidamente la dirección en la que avanza sin\ngirarse."
        ko:
          x: "체내에서 처리되지 못하고\n빠져나온 에너지가 덩어리져서\n주황색 결정이 되었다."
          y: "기운이 넘치면 핵이 튀어나온다.\n몸의 방향을 바꾸지 않고\n전후좌우로 재빠르게 움직일 수 있다."
gigalith:
