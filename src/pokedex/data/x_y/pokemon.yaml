          y: "きたない　ばしょに　あらわれる。\nこうじょうが　ながす　ヘドロ\nはいえきを　のんで　いきている。"
        jp_kanji:
          x: "月からの　エックス線を　浴びた\nヘドロが　ベトベターに　変化した。\n汚いものが　大好物。"
          y: "汚い　場所に　現れる。\n工場が　流す　ヘドロ廃液を\n飲んで　生きている。"
        en:
          x: "Sludge exposed to X-rays from the moon\ntransformed into Grimer. It loves feeding\non filthy things."
          y: "Appears in filthy areas. It thrives by sucking up\npolluted sludge that is pumped out of factories."
        fr:
          x: "Tadmorv est né d’un tas de déchets exposé aux\nrayons X lunaires. Ce Pokémon adore se nourrir\nde choses dégoûtantes."
          y: "Vivant dans des tas d’ordures, il se nourrit des\ndéchets polluants rejetés par les usines."
        it:
          x: "Grimer è nato da fango esposto ai raggi X provenienti\ndalla luna. Ama nutrirsi di sostanze sudicie."
          y: "Prospera in zone paludose. Cresce nutrendosi dei\nliquami di scarico delle fabbriche."
        de:
          x: "Schlamm, der Röntgenstrahlung vom Mond\nausgesetzt war, wurde zu Sleima. Es isst\nam liebsten dreckige Dinge."
          y: "Dieses Pokémon lebt vorwiegend in schmutzigen\nGebieten und ernährt sich von Industrieabfällen."
        es:
          x: "Nace de lodo alterado al filtrarse en el agua los\nrayos X reflejados por la Luna. Se alimenta de\nsustancias desagradables."
          y: "Aparece en zonas asquerosas. Crece absorbiendo los\nresiduos tóxicos expulsados por las fábricas."
        ko:
          x: "달로부터의 X선을 쬔\n오물이 질퍽이로 변화했다.\n더러운 것을 좋아한다."
          y: "지저분한 곳에 모습을 드러낸다.\n공장에서 내보내는 오물\n폐수를 마시며 살고 있다."
