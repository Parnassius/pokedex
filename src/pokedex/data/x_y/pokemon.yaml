          y: "なぞのでんぱを　はっしんしており\nはんけい　１キロのはんいでは\nきおんが　２ど　あがる。"
        jp_kanji:
          x: "複数の　コイルが　連結して\n強力な　磁力線と\n高電圧を　放射する。"
          y: "ナゾの　電波を　発信しており\n半径１キロの　範囲では\n気温が　２度　上がる。"
        en:
