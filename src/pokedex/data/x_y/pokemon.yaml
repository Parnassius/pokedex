          y: "もえさかる　たいもうを　こすりあわせ\nばくふうを　おこして　こうげきする\nおおわざを　かくしもっている。"
        jp_kanji:
          x: "怒りが　最高潮のとき\n触ったもの　すべて　一瞬で\n燃え上がらせるほどに　熱い。"
          y: "燃えさかる　体毛を　こすり合わせ\n爆風を　起こして　攻撃する。\n大技を　隠し持っている。"
