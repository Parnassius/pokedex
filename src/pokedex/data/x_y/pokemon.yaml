          y: "くちから　たれている　ミツは\n２キロ　はなれていても　はなが\nまがるほど　もうれつに　くさい。"
        jp_kanji:
          x: "猛烈な　クサさ！　それなのに\n１０００人に　１人ぐらい\nこれを　好んで　かぐ　人がいる。"
          y: "口から　たれている　ミツは\n２キロ　離れていても　鼻が\nまがるほど　猛烈に　くさい。"
        en:
          x: "Smells incredibly foul! However, around one out\nof a thousand people enjoy sniffing its\nnose-bending stink."
          y: "The honey it drools from its mouth smells so\natrocious, it can curl noses more than a mile away."
        fr:
          x: "Il sent très mauvais ! Mais une personne sur 1 000\naime la puanteur de son corps nauséabond."
          y: "L’odeur du nectar de sa bouche est si répugnante\nqu’elle agresse les narines à 2 km."
        it:
          x: "Puzza da levare il fiato! Tuttavia circa una persona\nsu mille adora annusarne il fetido lezzo."
          y: "Il fluido che fuoriesce dalla sua bocca è così\npuzzolente che si sente anche a 2 km di distanza."
        de:
          x: "Dieses Pokémon sondert einen übelriechenden\nGeruch ab. Trotzdem halten einige Leute es im Haus."
          y: "Der Honig, den es abgibt, riecht so entsetzlich,\ndass sich sogar Nasen in 2 km Entfernung rümpfen."
        es:
          x: "¡Huele bastante mal! De todas formas, una de cada\nmil personas aprecian su fétido olor."
          y: "La miel que emana de su boca posee un hedor capaz\nde derribar enemigos a 2 km de distancia."
        ko:
          x: "강렬한 악취가 난다! 그럼에도\n불구하고 1000명에 한 명 정도\n이 냄새를 즐겨 맡는 사람이 있다."
          y: "입에서 흘러내리는 꿀은\n2km 떨어져 있어도 머리가\n아플 정도로 심한 악취가 난다."
