        jp_kanji:
          x: "ひょろっとした　体つきだが\n獲物を　捕らえるときの　動きは\n目にも　とまらないほど　素早い。"
          y: "人の　顔のような　つぼみから\n伝説の　マンドラゴラの\n一種ではないかと　ささやかれている。"
