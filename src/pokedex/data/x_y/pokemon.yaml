          y: "たたかいを　このまない　おとなしい\nせいかくだが　へたに　てを　だすと\nきょうれつに　はんげきされるぞ。"
        jp_kanji:
          x: "森や　林に　多く　分布。\n地上でも　激しく　はばたいて\n砂を　かけたりする。"
          y: "戦いを　好まない　おとなしい\n性格だが　下手に　手を　出すと\n強烈に　反撃されるぞ。"
        en:
          x: "A common sight in forests and woods. It flaps\nits wings at ground level to kick up blinding sand."
          y: "It is docile and prefers to avoid conflict.\nIf disturbed, however, it can ferociously strike back."
        fr:
          x: "On l’aperçoit souvent dans les forêts. Avec ses ailes,\nil brasse l’air près du sol pour projeter du sable."
          y: "Ce Pokémon docile préfère éviter le combat.\nToutefois, il se montre très féroce quand on l’agresse."
        it:
          x: "Molto comune in boschi e foreste, sbatte le ali a\nlivello del suolo per sollevare sabbia accecante."
          y: "È docile e preferisce evitare i conflitti. Ma se viene\ndisturbato, contrattacca ferocemente."
        de:
          x: "Ein vorwiegend in Wäldern lebendes Pokémon,\ndas zur Verteidigung mit den Flügeln Sand aufwirbelt."
          y: "Reizt man dieses an sich gutmütige Pokémon,\nwehrt es sich wütend."
        es:
          x: "Muy común en bosques y selvas. Aletea al nivel del\nsuelo para levantar la gravilla."
          y: "Es manso y prefiere evitar los problemas. Sin embargo,\nsi le molestan atacará ferozmente."
        ko:
          x: "숲이나 수풀에 많이 분포해 있다.\n땅에서도 격렬한 날갯짓으로\n모래를 뿌리기도 한다."
          y: "싸움을 좋아하지 않는 얌전한\n성격이지만 어설프게 건드리면\n강력한 반격을 당하게 된다."
