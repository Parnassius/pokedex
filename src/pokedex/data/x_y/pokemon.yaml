          y: "てきに　おそわれると　でんきを\nおびた　いとを　たくさん　はきだして\nでんきの　バリアを　つくる。"
        jp_kanji:
          x: "電気を　帯びた　糸で　ワナを\n仕掛ける。感電して　動けない　獲物を\nゆっくりと　いただくのだ。"
          y: "敵に　襲われると　電気を　帯びた\n糸を　たくさん　吐き出して\n電気の　バリアを　作る。"
        en:
          x: "They employ an electrically charged web to trap\ntheir prey. While it is immobilized by shock,\nthey leisurely consume it."
          y: "When attacked, they create an electric barrier by\nspitting out many electrically charged threads."
        fr:
          x: "Il tend des pièges avec ses fils électriques.\nIl déguste tranquillement ses proies une fois\nélectrocutées."
          y: "Quand on l’attaque, il projette une multitude de fils\nélectrifiés pour créer une barrière électrique."
        it:
          x: "Tende trappole con fili elettrificati. Consuma poi\ncon comodo le prede immobilizzate dalla scarica\nelettrica."
          y: "Quando viene attaccato, espelle una rete di fili\nelettrificati per formare una barriera elettrica."
        de:
          x: "Lässt seine Beute in elektrisch geladene Fäden\ntappen. Solang diese durch den Schock\ngelähmt ist, labt es sich an ihr."
          y: "Wird es angegriffen, spuckt es mit vielen elektrisch\ngeladenen Fäden um sich und baut sich eine\nElektrobarriere."
        es:
          x: "Pone trampas con hilos electrificados. De este modo,\nelectrocuta a sus enemigos y los inmoviliza por\ncompleto."
          y: "Cuando un enemigo lo ataca, expulsa por la boca hilos\nelectrificados para crear una barrera."
        ko:
          x: "전기를 띤 실로 함정을 설치한다.\n감전돼서 움직이지 못하는\n먹이를 천천히 먹어치운다."
          y: "상대에게 공격당하면 전기를\n띤 실을 무수히 뿜어내서\n전기 배리어를 만든다."
ferroseed:
