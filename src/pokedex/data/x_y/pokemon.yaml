      descriptions:
        jp_kana:
          x: "よあけごろ　あたりいったいに\nひびきわたる　ぶきみな　とおぼえで\nじぶんたちの　なわばりを　アピール。"
          y: "なかまだけで　わかりあえる\nなきごえで　おたがいの　いちを\nたしかめながら　えものをおいつめる。"
        jp_kanji:
          x: "夜明けごろ　あたり一帯に\n響きわたる　不気味な　遠ぼえで\n自分たちの　縄張りを　アピール。"
          y: "仲間だけで　わかりあえる\n鳴き声で　お互いの　位置を\n確かめながら　獲物を　追いつめる。"
        en:
          x: "Around dawn, its ominous howl echoes through\nthe area to announce that this is its territory."
          y: "To corner prey, they check each other’s location\nusing barks that only they can understand."
        fr:
          x: "Il hurle dès l’aube pour délimiter son territoire.\nOn l’entend à des kilomètres à la ronde."
          y: "Pour traquer leur proie, ils se localisent mutuellement\navec des aboiements compris par eux seuls."
        it:
          x: "All’alba, i suoi sinistri urli riecheggiano nell’aria.\nIn questo modo demarca il territorio."
          y: "Per circondare la preda, gli Houndour si comunicano\nla posizione reciproca con ululati che capiscono solo\nloro."
        de:
          x: "Im Morgengrauen schallt sein ominöses Geheule\nüber das Gebiet, das es für sich beansprucht."
          y: "Sie treiben ihre Beute in die Enge und orientieren sich\ndabei anhand ihres Bellens, das nur sie verstehen."
        es:
          x: "Al amanecer, resuena por la zona su inquietante\naullido para anunciar que es su territorio."
          y: "Para arrinconar a sus presas, comprueban sus\nposiciones con ladridos que solo ellos entienden."
        ko:
          x: "새벽녘에 주변 일대에\n울려 퍼지는 기분 나쁜 울음소리로\n자신들의 영역을 어필한다."
          y: "동료끼리만 서로 알 수 있는\n울음소리로 서로의 위치를\n확인해가며 먹이를 몰아붙인다."
