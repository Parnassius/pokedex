          x: "Il vient d’un virus extraterrestre arrivé avec une\nmétéorite et ayant subi une mutation génétique."
          y: "C’est un virus extraterrestre qui a muté en Pokémon.\nIl apparaît à proximité des aurores boréales."
        it:
          x: "È il risultato della mutazione genetica di un virus\nalieno giunto con un meteorite."
          y: "Una mutazione di virus alieni ha portato alla creazione\ndi questo Pokémon. Visibile in prossimità dell’aurora."
        de:
          x: "Ein außerirdischer Virus kam mit einem Meteor auf\ndie Erde. Seine DNA mutierte. So entstand Deoxys."
