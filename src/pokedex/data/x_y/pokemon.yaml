      descriptions:
        jp_kana:
          x: "おそわれると　からだから　わたを\nとばす。てきが　わたを　モンメンと\nまちがえている　すきに　にげるのだ。"
          y: "しゅうだんで　いると　おちつくのか\nなかまを　みつけると　くっついて\nいつのまにか　くものように　なる。"
        jp_kanji:
          x: "襲われると　体から　綿を　飛ばす。\n敵が　綿を　モンメンと\n間違えている　すきに　逃げるのだ。"
          y: "集団で　いると　落ち着くのか\n仲間を　みつけると　くっついて\nいつのまにか　雲のように　なる。"
        en:
          x: "When attacked, it escapes by shooting cotton from\nits body. The cotton serves as a decoy to distract\nthe attacker."
          y: "Perhaps because they feel more at ease in a group,\nthey stick to others they find. They end up looking\nlike a cloud."
        fr:
          x: "Si on l’attaque, il projette un nuage de coton.\nL’ennemi le confond avec lui, ce qui permet à\nDoudouvet de s’enfuir."
          y: "Pokémon à l’instinct grégaire, ils se collent les uns\naux autres et finissent par former un gros nuage."
        it:
          x: "Se viene attaccato crea una nuvola di cotone per\nconfondere il nemico, poi ne approfitta per fuggire."
          y: "Si sentono più sicuri in gruppo, e quando incontrano\ni loro simili non li lasciano più formando come una\ngrande nuvola."
        de:
          x: "Wird es angegriffen, verstreut es zur Täuschung\nWatte. Es flieht, während der Gegner nach dem\nwahren Waumboll sucht."
          y: "Sind sie mit Freunden unterwegs, hängen sie eng\naufeinander wie Wolken, wohl weil sie sich in der\nGruppe sicherer fühlen."
        es:
          x: "Despide motas de algodón cuando lo atacan para\nconfundir a los enemigos y poner pies en polvorosa."
          y: "Quizá por el hecho de que se relajan al estar con\nlos suyos, forman un grupo al encontrar amigos y\nparecen nubes."
        ko:
          x: "공격당하면 몸에서 솜을\n날린다. 상대가 솜을 소미안으로\n착각하고 있는 동안 도망친다."
          y: "집단으로 있으면 편안한지\n동료를 발견하면 달라붙어\n어느새 구름처럼 된다."
whimsicott:
  species_id: 547
  names:
    jp_kana: エルフーン
    jp_kanji: エルフーン
    en: Whimsicott
    fr: Farfaduvet
