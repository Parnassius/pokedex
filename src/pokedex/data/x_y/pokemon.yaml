          y: "おおむかしは　まだ　もうすこし\nつよかったらしい。しかし　いまは\nかなしいくらいに　よわいのだ。"
        jp_kanji:
          x: "力も　スピードも　ほとんど　ダメ。\n世界で　一番　弱くて\n情けない　ポケモンだ。"
          y: "大昔は　まだ　もう少し\n強かったらしい。しかし　今は\n悲しいくらいに　弱いのだ。"
        en:
          x: "It is virtually worthless in terms of both power and\nspeed. It is the most weak and pathetic Pokémon\nin the world."
          y: "In the distant past, it was somewhat stronger than\nthe horribly weak descendants that exist today."
        fr:
          x: "Magicarpe manque totalement de vitesse et de force.\nC’est le Pokémon le plus pathétique sur terre."
          y: "La puissance de cette créature a beaucoup régressé\nau fil des siècles."
        it:
          x: "La sua forza e velocità sono praticamente nulle.\nSi può tranquillamente definire il più debole e patetico\nPokémon del mondo."
          y: "Anticamente era molto più forte dell’odierno\ndiscendente, che è debolissimo."
        de:
          x: "Es ist nutzlos, was Kraft und Geschwindigkeit\nangeht. Dieses ist das schwächste\nund erbärmlichste Pokémon der Welt."
          y: "Die urzeitlichen Vorfahren dieses Pokémon waren\nsehr viel stärker als ihre heutigen Nachkommen."
        es:
          x: "No es precisamente rápido ni fuerte. Es el Pokémon\nmás debilucho y simplón de todos los que hay."
          y: "En un pasado lejano, era más fuerte de lo que hoy\nson sus débiles descendientes."
        ko:
          x: "힘도 스피드도 거의 없다.\n세상에서 가장 약하고\n한심한 포켓몬이다."
          y: "아주 먼 옛날에는 좀 더\n강했던 것 같다. 그러나 지금은\n안쓰러울 정도로 약하다."
