          x: "あたまは　わるいが　ちからが　つよく\nこうそうビルも　たいあたりで\nコナゴナに　ふんさいする。"
          y: "４ほんの　あしは　みじかくて\nうまく　まがれない。ただひたすらに\nとっしん　するだけだ。"
        jp_kanji:
          x: "頭は　悪いが　力が　強く\n高層ビルも　体当たりで\nコナゴナに　粉砕する。"
          y: "４本の　脚は　短くて\nうまく　曲がれない。ただひたすらに\n突進するだけだ。"
        en:
          x: "Strong, but not too bright, this Pokémon can\nshatter even a skyscraper with its charging Tackles."
          y: "It is inept at turning because of its four short legs.\nIt can only charge and run in one direction."
        fr:
          x: "Costaud mais pas très intelligent, ce Pokémon est\ncapable de détruire un immeuble entier en utilisant\nsa Charge."
          y: "Ses petites jambes ne lui permettent pas de tourner\nfacilement. Il ne peut charger que tout droit."
        it:
          x: "Potente, benché non particolarmente brillante, con\nAzione può distruggere anche un grattacielo."
          y: "Le quattro piccole zampe gli impediscono di voltarsi.\nCosì corre e attacca in una sola direzione."
        de:
          x: "Stark, aber nicht allzu klug, kann dieses Pokémon\nsogar Hochhäuser mit seinem Tackle-Angriff zum\nEinsturz bringen."
          y: "Aufgrund seiner kurzen Beine kann es sich nicht\numdrehen. Es kann immer nur in eine Richtung laufen."
        es:
          x: "Es muy fuerte, pero no especialmente listo. Es capaz\nde derribar rascacielos usando Placaje varias veces."
          y: "Es un poco torpe al girar debido a sus cuatro cortas\npatas. Solo puede atacar y correr en una dirección."
        ko:
          x: "머리는 나쁘지만 힘이 세서\n고층 빌딩도 몸통박치기로\n산산조각 낸다."
          y: "4개의 다리는 짧아서\n잘 굽혀지지 않는다. 단지 한결같이\n돌진할 뿐이다."
