          y: "ヌメヌメの　ねんまくで　おおわれた\nからだは　てきの　パンチや　キックを\nヌルリと　すべらせてしまうのだ。"
        jp_kanji:
          x: "一番　弱い　ドラゴンポケモン。\nヌメヌメの　体が　乾かないよう\nジメジメした　日陰で　暮らす。"
          y: "ヌメヌメの　粘膜で　覆われた　体は\n敵の　パンチや　キックを\nヌルリと　滑らせてしまうのだ。"
        en:
          x: "The weakest Dragon-type Pokémon,\nit lives in damp, shady places, so its\nbody doesn’t dry out."
          y: "It’s covered in a slimy membrane that makes\nany punches or kicks slide off it harmlessly."
        fr:
          x: "C’est le plus faible de tous les Pokémon Dragon.\nPour éviter que son corps ne se dessèche,\nil recherche les lieux humides et ombragés."
          y: "Son corps est recouvert d’une membrane gluante,\naussi les coups des ennemis glissent sur lui sans\nlui faire le moindre mal."
        it:
          x: "È il Pokémon Drago più debole di tutti. Vive in ambienti\numidi e in ombra per evitare che il suo corpo si secchi."
          y: "Il suo corpo è coperto da una membrana viscida\nche fa scivolare e devia i colpi dei nemici."
        de:
          x: "Dieses schwächste aller Drachen-Pokémon lebt\nan feuchten und schattigen Plätzen, um seinen\nglitschigen Körper vor dem Austrocknen zu bewahren."
          y: "Sein Körper ist von einer schleimigen Schicht umhüllt,\nan der gegnerische Tritte und Schläge abgleiten, ohne\nSchaden anzurichten."
        es:
          x: "Es el Pokémon de tipo Dragón más débil. Habita en\nzonas oscuras y húmedas para evitar que su viscoso\ncuerpo se seque."
          y: "La membrana mucosa que lo recubre hace resbalar\ntanto los puñetazos como las patadas de los\nenemigos que lo golpean, gracias a su viscosidad."
        ko:
          x: "가장 약한 드래곤포켓몬이다.\n미끌미끌한 몸이 마르지 않도록\n축축한 그늘에서 산다."
          y: "미끌미끌한 점막으로 덮여 있는\n몸은 적의 펀치나 킥을\n매끄럽게 미끄러뜨린다."
sliggoo:
