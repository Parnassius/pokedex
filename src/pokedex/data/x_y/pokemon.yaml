          y: "かみついて　もうどくを　あたえる。\nてんてきの　おおきな　とりポケモンも\nからだが　しびれて　うごけなくなる。"
        jp_kanji:
          x: "頭と　尻尾の　触角で\nまわりの　様子を　探る。\n非常に　凶暴な　性格。"
          y: "かみついて　猛毒を　与える。\n天敵の　大きな　とりポケモンも\n体が　しびれて　動けなくなる。"
        en:
          x: "It discovers what is going on around it by using the\nfeelers on its head and tail. It is brutally aggressive."
          y: "Its bite injects a potent poison, enough to paralyze\nlarge bird Pokémon that try to prey on it."
        fr:
          x: "Il sonde les alentours avec les antennes sur sa tête\net sa queue. Il est extrêmement brutal."
          y: "Sa morsure est très venimeuse. Elle paralyse\nmême les grands Pokémon Oiseaux, ses prédateurs."
        it:
          x: "Sonda l’ambiente circostante con le antenne del\ncapo e della coda. Ha un carattere estremamente\ncollerico."
          y: "Mordendo, inietta un veleno potente. Anche i grandi\nPokémon uccello, suoi predatori, ne rimangono\nparalizzati."
        de:
          x: "Mit seinen Ruten und den Fühlern an seinem Kopf\ntastet es die Umgebung ab. Ein überaus aggressiver\nGeselle."
          y: "Es beißt Angreifer und injiziert ihnen Gift, das selbst\ngroße Vogel-Pokémon, seine natürlichen Feinde,\nlähmt."
        es:
          x: "Percibe su entorno con su sentido del tacto, residente\nen su cabeza y cola. Su carácter es violento por\nnaturaleza."
          y: "Inocula un poderoso veneno al morder. Hasta sus\nenemigos acérrimos, los Pokémon pájaro, se quedan\ninmóviles."
        ko:
          x: "머리와 꼬리의 더듬이로\n주변 상황을 살핀다.\n성격이 매우 난폭하다."
          y: "물어서 맹독을 퍼뜨린다.\n천적인 커다란 새포켓몬도\n몸이 마비돼서 움직일 수 없다."
