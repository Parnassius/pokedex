        jp_kana:
          x: "たくさんの　むれで　こうどうする。\nからだは　ちいさいが　はばたく\nちからは　ひじょうに　つよい。"
          y: "むしポケモンを　ねらって　のやまを\nおおぜいの　むれで　とびまわる。\nなきごえが　とても　やかましい。"
        jp_kanji:
          x: "たくさんの　群れで　行動する。\n体は　小さいが\n羽ばたく　力は　非常に　強い。"
          y: "むしポケモンを　ねらって　野山を\n大勢の　群れで　飛び回る。\n鳴き声が　とても　やかましい。"
        en:
          x: "They flock in great numbers. Though small, they\nflap their wings with great power."
          y: "They flock around mountains and fields, chasing\nafter bug Pokémon. Their singing is noisy\nand annoying."
        fr:
          x: "Ils volent en nombre. Bien que minuscule, il bat\ndes ailes avec une vigueur impressionnante."
          y: "Ce Pokémon très bruyant parcourt champs et forêts\nen nuées pour chasser les Pokémon Insecte."
        it:
          x: "Si muove in grandi gruppi. Anche se piccolo, batte\nle ali in maniera molto energica."
          y: "Saltella per i campi in grandi stormi a caccia di\nPokémon Coleottero. Emette versi davvero acuti."
        de:
          x: "Ihr Schwarm ist stets groß. Obwohl es kleine Pokémon\nsind, schwingen sie ihre Flügel mit enormer Kraft."
          y: "Auf der Suche nach Käfer-Pokémon fliegen Schwärme\nvon ihnen durchs Land. Ihr Ruf erzeugt großen Lärm."
        es:
          x: "Viaja en grandes bandadas. Aunque es pequeño,\nagita las alas con gran fuerza."
          y: "Sobrevuela los campos buscando Pokémon de tipo\nBicho. Chilla de forma muy estridente."
        ko:
          x: "많은 수가 무리를 이루어\n행동한다. 몸은 작지만\n날개 치는 힘은 매우 강하다."
          y: "벌레 포켓몬을 노리고 산과 들을\n많은 무리로 날아다닌다.\n울음소리가 무척 시끄럽다."
