          y: "すぐに　おこって　たたかおうとする。\nしかも　あたまの　ツノは　ささると\nきょうれつな　どくそをだす　しくみ。"
        jp_kanji:
          x: "発達した　耳を　立てて\nまわりの　気配を　探る。\nなにかあると　すぐに　飛びかかる。"
          y: "すぐに　怒って　戦おうとする。\nしかも　頭の　ツノは　刺さると\n強烈な　毒素を　出す　仕組み。"
        en:
          x: "It raises its big ears to check its surroundings.\nIf it senses anything, it attacks immediately."
          y: "An aggressive Pokémon that is quick to attack.\nThe horn on its head secretes a powerful venom."
        fr:
          x: "Il dresse ses oreilles à l’affût d’un bruit suspect et\nattaque toute menace se rapprochant de lui."
          y: "Très agressif, il est prompt à répondre à la violence.\nLa corne sur sa tête est venimeuse."
        it:
          x: "Rizza le grandi orecchie per esaminare la zona.\nSe avverte qualcosa, attacca immediatamente."
          y: "Pokémon aggressivo sempre pronto all’attacco,\nsecerne un veleno potente dal corno sulla testa."
        de:
          x: "Es überwacht mit seinen riesigen Ohren die Umgebung.\nRegistriert es eine Bewegung, greift es an."
          y: "Ein aggressives Pokémon, das sehr flink angreift.\nDas Horn auf dem Kopf sondert starkes Gift ab."
        es:
          x: "Levanta sus grandes orejas para vigilar. Si detecta\nalgo, atacará de inmediato."
          y: "Un Pokémon agresivo, siempre listo para atacar.\nEl cuerno de la cabeza segrega un potente veneno."
        ko:
          x: "발달한 귀를 세워\n주위의 낌새를 살핀다.\n무슨 일이 생기면 바로 덤벼든다."
          y: "금방 화를 내며 싸우려 든다.\n게다가 머리의 뿔은 찔리면\n강렬한 독소를 내는 구조이다."
