spritzee:
  species_id: 682
  names:
    jp_kana: シュシュプ
    jp_kanji: シュシュプ
    en: Spritzee
    fr: Fluvetin
    it: Spritzee
    de: Parfi
    es: Spritzee
    ko: 슈쁘
  forms:
    spritzee:
      form_id: 0
      base_stats:
        hp: 78
        attack: 52
        defense: 60
        special_attack: 63
        special_defense: 65
        speed: 23
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - healer
      hidden_ability: aroma_veil
      descriptions:
        jp_kana:
          x: "かいだ　ものを　うっとりさせる\nかおりを　からだから　ただよわせる。\nたべた　もので　かおりが　かわる。"
          y: "むかしの　きふじんたちは　こうすいの\nかわりに　このみの　かおりを　だす\nシュシュプを　つれていた。"
        jp_kanji:
          x: "かいだ　者を　うっとりさせる\n香りを　体から　漂わせる。\n食べた　もので　香りが　変わる。"
          y: "昔の　貴婦人たちは　香水の　かわりに\n好みの　香りを　出す\nシュシュプを　連れていたという。"
        en:
          x: "It emits a scent that enraptures those\nwho smell it. This fragrance changes\ndepending on what it has eaten."
          y: "In the past, rather than using perfume,\nroyal ladies carried a Spritzee\nthat would waft a fragrance they liked."
        fr:
          x: "Son corps dégage un parfum qui envoûte ceux qui le\nrespirent et change en fonction de son alimentation."
          y: "Par le passé, les femmes de la noblesse ne se\nparfumaient pas, mais étaient accompagnées\nd’un Fluvetin exhalant leur parfum favori."
        it:
          x: "Il suo corpo emette un profumo che inebria chi lo\nannusa. La fragranza cambia in base a ciò che mangia."
          y: "Si dice che nell’antichità, al posto del profumo,\nle nobildonne portassero sempre con loro questo\nPokémon, che diffondeva la loro fragranza preferita."
        de:
          x: "Der von ihm verströmte Duft verzückt jeden, der ihn\nriecht. Je nachdem, was es frisst, ändert sich sein Duft."
          y: "In der Vergangenheit hatten vornehme Damen, anstatt\nParfüm zu benutzen, immer ein Parfi dabei, das ihren\nLieblingsduft verströmte."
        es:
          x: "Su cuerpo emana una fragancia que embelesa a quien\nla huele. La fragancia es diferente según los alimentos\nque ingiere."
          y: "Antaño, las damas de la nobleza llevaban un Spritzee\nconsigo que desprendía su aroma preferido, en vez de\nutilizar un perfume convencional."
        ko:
          x: "냄새를 맡은 자를 황홀하게 만드는\n향기를 몸에서 풍긴다.\n먹은 먹이에 따라 향기가 달라진다."
          y: "옛 귀부인들은 향수 대신에\n좋아하는 향을 내는\n슈쁘를 데리고 다녔다."
aromatisse:
  species_id: 683
  names:
    jp_kana: フレフワン
    jp_kanji: フレフワン
    en: Aromatisse
    fr: Cocotine
    it: Aromatisse
    de: Parfinesse
    es: Aromatisse
    ko: 프레프티르
  forms:
    aromatisse:
      form_id: 0
      base_stats:
        hp: 101
        attack: 72
        defense: 72
        special_attack: 99
        special_defense: 89
        speed: 29
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - healer
      hidden_ability: aroma_veil
      descriptions:
        jp_kana:
          x: "さまざまな　においを　つくりだす。\nあいての　いやがる　においを　だして\nたたかいを　ゆうりに　すすめるのだ。"
          y: "においが　つよすぎるため\nよほど　すきな　トレーナーでなければ\nつれて　あるくのは　キツイのだ。"
        jp_kanji:
          x: "さまざまな　においを　作り出す。\n相手の　嫌がる　においを　出して\n戦いを　有利に　進めるのだ。"
          y: "においが　強すぎるため\nよほど　好きな　トレーナーでなければ\n連れて　歩くのは　キツイのだ。"
        en:
          x: "It devises various scents, pleasant and unpleasant,\nand emits scents that its enemies dislike in order\nto gain an edge in battle."
          y: "Its scent is so overpowering that, unless a Trainer\nhappens to really enjoy the smell, he or she will\nhave a hard time walking alongside it."
        fr:
          x: "Ce Pokémon est capable d’émettre toutes sortes\nd’odeurs pour incommoder son adversaire et\naugmenter ses chances de gagner."
          y: "Son parfum est tellement capiteux qu’un Dresseur\nn’appréciant pas pleinement son odeur aura toutes\nles difficultés du monde à cheminer à ses côtés."
        it:
          x: "È in grado di emanare profumi di diversi tipi. Durante\nla lotta, mette in difficoltà i nemici emettendo odori\nsgradevoli."
          y: "Emette un profumo intensissimo. Se un Allenatore non\nè un assoluto estimatore di quel particolare aroma,\navrà grosse difficoltà anche solo a stargli vicino."
        de:
          x: "Es produziert verschiedene Düfte. Im Kampf verschafft\nes sich einen Vorteil, indem es einen Duft verströmt,\nder dem Gegner zuwider ist."
          y: "Sein Duft ist so stark, dass es für einen Trainer,\nder seinen Duft nicht mag, schwer ist, es an\nseiner Seite zu haben."
        es:
          x: "Puede producir multitud de olores diferentes y, en\ncombate, secreta los que le resultan molestos al\nenemigo para así contar con cierta ventaja."
          y: "La fragancia que despide es tan potente que solo\npodría caminar a su lado un Entrenador que tenga\nespecial predilección por ese aroma."
        ko:
          x: "여러 가지 향기를 만들어 낸다.\n상대가 싫어하는 냄새를 내보내\n싸움을 유리하게 이끌어 나간다."
          y: "향기가 지나치게 강하기 때문에\n어지간히 좋아하는 트레이너가 아니면\n데리고 다니기 힘들다."
swirlix:
  species_id: 684
  names:
    jp_kana: ペロッパフ
    jp_kanji: ペロッパフ
    en: Swirlix
    fr: Sucroquin
    it: Swirlix
    de: Flauschling
    es: Swirlix
    ko: 나룸퍼프
