          x: "すうひきの　コマタナを　たたかわせ\nきずつき　うごけなくなった　えものを\nまっぷたつにする　こわい　ポケモン。"
          y: "おおぜいの　コマタナを　したがえて\nえものを　むれで　おいつめる。\nとどめは　キリキザンが　さす。"
        jp_kanji:
          x: "数匹の　コマタナを　戦わせ\n傷つき　動けなくなった　獲物を\n真っ二つにする　怖い　ポケモン。"
          y: "大勢の　コマタナを　従えて\n獲物を　群れで　追いつめる。\nとどめは　キリキザンが　刺す。"
        en:
          x: "This pitiless Pokémon commands a group of\nPawniard to hound prey into immobility. It then\nmoves in to finish the prey off."
          y: "Bisharp pursues prey in the company of a large\ngroup of Pawniard. Then Bisharp finishes off\nthe prey."
        fr:
          x: "Un Pokémon sans pitié qui tranche en deux ses proies\nimmobilisées par les cohortes de Scalpion qu’il\ncommande."
          y: "Il chasse avec un groupe de Scalpion sous ses ordres,\nmais c’est lui qui donne le coup de grâce."
        it:
          x: "È molto crudele. Lascia che un gruppo di Pawniard\nattacchi la preda e, quando è ferita e non può più\nmuoversi, la finisce."
          y: "Accompagnato da molti Pawniard, blocca le prede\ngrazie alla forza del gruppo. È Bisharp a dare il\ncolpo di grazia."
        de:
          x: "Ein kaltblütiges Pokémon, das Gegner zunächst mit\neiner Schar von Gladiantri lähmt und dann zweiteilt."
          y: "Es rückt seinen Opfern mit einer Schar von Gladiantri\nim Gefolge auf den Pelz. Den letzten Hieb übernimmt\nes selbst."
        es:
          x: "Un Pokémon temible que remata a su presa una vez\nque su séquito de Pawniard la ha debilitado e\ninmovilizado."
          y: "Su séquito son los Pawniard. Acorralan a su presa con\ntodo el grupo y Bisharp propina el golpe de gracia."
        ko:
          x: "몇 마리의 자망칼과 싸우게 해서\n상처 입고 움직일 수 없게 된 먹이를\n두 동강 내버리는 무서운 포켓몬."
          y: "많은 자망칼을 거느리며\n무리를 지어 먹이를 바싹 몰아넣는다.\n마무리는 절각참이 한다."
bouffalant:
