        jp_kanji:
          x: "モンスターボールの　カサを　見せつけ\n獲物を　誘き寄せようとするが\nだまされる　ポケモンは　少ない。"
          y: "両腕の　モンスターボールに　似た\nカサを　ゆらゆらと　動かして\n獲物を　誘う　ダンスを　踊る。"
        en:
          x: "They show off their Poké Ball caps to lure prey,\nbut very few Pokémon are fooled by this."
          y: "It lures prey close by dancing and waving its\narm caps, which resemble Poké Balls, in a\nswaying motion."
        fr:
          x: "Il se sert de ses coupoles en forme de Poké Ball pour\nattirer ses proies, mais peu de Pokémon se laissent\navoir."
          y: "Il danse en faisant tournoyer les coupoles en forme\nde Poké Ball de ses bras pour attirer ses proies."
        it:
          x: "Cerca di attirare le prede esibendo un cappello a\nforma di Poké Ball, ma sono pochi i Pokémon che\nsi fanno ingannare."
          y: "Attira le sue prede con danze, durante le quali fa\nroteare i dischi simili a Poké Ball che porta sugli arti."
        de:
          x: "Um Beute anzulocken, bietet es seinen Hut feil,\nder einem Pokéball ähnelt. Doch kaum ein\nPokémon fällt darauf herein."
          y: "Es lockt seine Beute an, indem es die Hüte in Form\nvon Pokébällen an seinen Armen rüttelt und einen\nTanz aufführt."
        es:
          x: "Aunque intenta pasar por parte superior de una\nPoké Ball para atraer a sus presas, consigue engañar\na pocos."
          y: "Baila meciendo rítmicamente los dos brazos a modo\nde Poké Ball para hacer que sus presas se acerquen."
        ko:
          x: "몬스터볼 무늬의 삿갓을 보여주며\n먹이를 유인하려 하지만\n속아 넘어가는 포켓몬은 드물다."
          y: "양팔의 몬스터볼을 닮은\n삿갓을 한들한들 흔들어\n먹이를 유인하는 춤을 춘다."
