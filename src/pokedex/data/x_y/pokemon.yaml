        jp_kana:
          x: "まだ　じょうずに　およげず\nころがったほうが　はやく　うごける。\nうれしいと　みんなで　てをたたく。"
          y: "フサフサの　たいもうで　からだが\nおおわれて　いるので　こおりの\nうえを　ころがっても　つめたくない。"
        jp_kanji:
          x: "まだ　上手に　泳げず\n転がったほうが　速く　動ける。\nうれしいと　みんなで　手をたたく。"
          y: "フサフサの　体毛で\n体が　覆われて　いるので\n氷の　上を　転がっても　冷たくない。"
        en:
          x: "They can’t swim well yet, and they move much\nfaster by rolling. When they’re happy, they\nclap fins."
          y: "Its body is covered in fluffy fur. The fur keeps it\nfrom feeling cold while it is rolling on ice."
        fr:
          x: "Il se déplace en roulant, car il n’est pas doué pour\nla nage. Quand il est heureux, il applaudit avec ses\nnageoires."
          y: "Son corps est couvert d’une douce fourrure.\nElle le protège du sentiment de froid quand il se\ndéplace en roulant sur la glace."
        it:
          x: "Non sa ancora nuotare molto bene e si muove più\nvelocemente rotolando. Quando è felice batte le\npinne."
          y: "Ha il corpo ricoperto di una morbida pelliccia, che\ngli permette di rotolare sul ghiaccio senza avvertire\nil freddo."
        de:
          x: "Es ist noch kein guter Schwimmer und bewegt sich\nrollend schneller fort. Ist es froh, klatscht es mit\nseinen Flossen."
          y: "Sein Körper ist mit flauschigem Fell bedeckt.\nDas Fell sorgt dafür, dass es nicht friert, auch\nwenn es sich auf dem Eis hin und her rollt."
        es:
          x: "Como no saben nadar muy bien, se mueven\nrápidamente rodando. Cuando están alegres, dan\npalmadas con las aletas."
          y: "Tiene un suave pelaje que lo protege del frío cuando\nse revuelca por el hielo."
        ko:
          x: "아직 능숙하게 헤엄치지 못하고\n구르는 쪽이 빨리 움직일 수 있다.\n기쁘면 다 같이 손뼉을 친다."
          y: "북실북실한 털로 몸이\n뒤덮여있기 때문에 얼음 위를\n굴러도 차갑지 않다."
sealeo:
