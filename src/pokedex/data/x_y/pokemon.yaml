          y: "じょうぶな　あごで　がんせきを\nかみくだき　すすむ。まっくらな\nちちゅうでも　みえる　めを　もつ。"
        jp_kanji:
          x: "地中の　高い　圧力と　熱で\n鍛えられた　体は\nあらゆる　金属よりも　硬い。"
          y: "丈夫な　アゴで　岩石を\nかみくだき　進む。真っ暗な\n地中でも　見える　目を　持つ。"
        en:
          x: "Tempered underground under high pressure and\nheat, its body is harder than any metal."
          y: "It chews its way through boulders with its\nsturdy jaws. Its eyes can see in the\ndarkness underground."
        fr:
          x: "Grâce à la température élevée et à la haute pression\nsouterraines, son corps est plus dur que le métal."
          y: "Ses mâchoires robustes peuvent broyer la pierre.\nSes yeux percent la pénombre souterraine."
        it:
          x: "Temprato dalla pressione e dal calore sotterraneo,\nil suo corpo è più duro di qualsiasi metallo."
          y: "Distrugge le rocce con le mascelle robuste per farsi\nstrada. I suoi occhi vedono nei bui sotterranei."
        de:
          x: "Hoher Druck und hohe Temperaturen haben\nseinen Körper härter als Stahl werden lassen."
          y: "Es beißt sich mit seinen Kiefern seinen Weg durch\nFelsen. Es kann auch im Dunkeln sehen."
        es:
          x: "Su cuerpo es más duro que cualquier metal debido a la\ngran presión y calor de su hábitat."
          y: "Atraviesa rocas a mordisco limpio. Sus ojos pueden\nver en la oscuridad subterránea."
        ko:
          x: "땅속의 높은 압력과\n열로 단련된 몸은\n어떠한 금속보다도 단단하다."
          y: "튼튼한 턱으로 암석을 깨물어\n부수고 나아간다. 아주 캄캄한 땅속\n에서도 보이는 눈을 가지고 있다."
