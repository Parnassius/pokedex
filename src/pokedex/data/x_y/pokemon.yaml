          y: "ツチニンが　しんかする　ときに\nいつの　まにか　モンスターボールに\nはいっている　ふしぎな　ポケモンだ。"
        jp_kanji:
          x: "抜け殻が　魂を　宿した。\n背中の　すきまから　のぞきこむと\n魂を　吸われてしまうらしい。"
          y: "ツチニンが　進化する　ときに\nいつの間にか　モンスターボールに\n入っている　不思議な　ポケモンだ。"
        en:
          x: "A discarded bug shell that came to life. Peering into\nthe crack on its back is said to steal one’s spirit."
          y: "A most peculiar Pokémon that somehow appears in\na Poké Ball when a Nincada evolves."
        fr:
          x: "Une carapace d’insecte laissée à l’abandon. On dit\nqu’il vole l’âme de celui qui regarde à l’intérieur."
          y: "Un Pokémon étrange que l’on trouve dans les\nPoké Balls après l’évolution d’un Ningale."
        it:
          x: "È nato dal guscio vuoto di un insetto. Pare che\nchi spia nella fessura sul suo dorso perda l’anima."
          y: "Pokémon particolare, che appare misteriosamente\nin una Poké Ball dopo l’evoluzione di un Nincada."
        de:
          x: "Ein weggeworfener Käferpanzer, der zum Leben\nerwachte. Schaut man hinein, stiehlt es einem\ndie Seele."
          y: "Ein sehr spezielles Pokémon, das irgendwie in einem\nPokéball auftaucht, wenn Nincada sich entwickelt."
        es:
          x: "Es el caparazón de un bicho que cobró vida. Si alguien\nlo mira por la espalda, le robará el alma."
          y: "Es un Pokémon muy peculiar; aparece de repente en\nuna Poké Ball cuando Nincada evoluciona."
        ko:
          x: "허물 속으로 영혼이 들어갔다.\n등에 난 틈새로 들여다보면\n영혼을 빼앗겨버린다고 한다."
          y: "토중몬이 진화할 때\n어느샌가 몬스터볼에\n들어와 있는 신기한 포켓몬이다."
whismur:
