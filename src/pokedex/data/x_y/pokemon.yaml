          y: "あやしげな　ほのおで　もやされた\nたましいは　いきばを　なくし\nこの　よを　えいえんに　さまよう。"
        jp_kanji:
          x: "シャンデラの　炎に　包まれると\n魂が　吸い取られ　燃やされる。\n抜け殻の　体　だけが　残る。"
          y: "怪しげな　炎で　燃やされた\n魂は　行き場を　なくし\nこの　世を　永遠に　さまよう。"
        en:
          x: "Being consumed in Chandelure’s flame burns up\nthe spirit, leaving the body behind."
          y: "The spirits burned up in its ominous flame lose their\nway and wander this world forever."
        fr:
          x: "Les victimes des flammes de Lugulabre voient leur\nâme aspirée jusqu’à ce que leur corps ne soit plus\nque coquille vide."
          y: "Les âmes consumées par ses flammes étranges\nsont condamnées à l’errance pour l’éternité."
        it:
          x: "Le fiamme di Chandelure risucchiano lo spirito e\nlasciano il corpo come un guscio vuoto."
          y: "Le anime bruciate dalle sue fiamme cupe perdono\nla strada e rimangono a vagare in questo mondo\nper l’eternità."
        de:
          x: "Es saugt die Seele eines jeden auf, der in seinen\nFeuerkranz gerät, bis nur noch eine leere Hülle von\nihm übrig ist."
          y: "Seelen, die das Feuer seiner schaurigen Flammen\ngekostet haben, irren bis ans Ende der Tage ziellos\ndurch diese Welt."
        es:
          x: "Sus llamas absorben el alma del enemigo y la abrasan,\ndejando solo su cuerpo inerte."
          y: "Las almas que han ardido bajo sus oscuras llamas\nvagan sin rumbo y eternamente por este mundo."
        ko:
          x: "샹델라의 불꽃에 둘러싸이면\n영혼이 빨려가 불타버린다.\n빈 껍데기인 몸만 남는다."
          y: "괴상한 불꽃으로 태워진\n영혼은 갈 곳을 잃고\n이승을 영원히 헤맨다."
axew:
