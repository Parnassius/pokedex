        jp_kana:
          x: "たましいを　すいとり　ひをともす。\nひとが　しぬのを　まつため\nびょういんを　うろつくようになった。"
          y: "りんじゅうの　さいに　あらわれて\nたましいが　にくたいを　はなれると\nすかさず　すいとってしまうのだ。"
        jp_kanji:
          x: "魂を　吸いとり　火を灯す。\n人が　死ぬのを　待つため\n病院を　うろつくようになった。"
          y: "臨終の　際に　現れて\n魂が　肉体を　離れると\nすかさず　吸い取ってしまうのだ。"
        en:
          x: "The spirits it absorbs fuel its baleful fire. It hangs\naround hospitals waiting for people to pass on."
          y: "It arrives near the moment of death and steals spirit\nfrom the body."
        fr:
          x: "Il aspire les âmes pour entretenir sa flamme.\nIl erre dans les hôpitaux dans l’attente d’un trépas."
          y: "Il apparaît au moment du trépas et aspire l’âme\nà l’instant même où elle quitte le corps."
        it:
          x: "La sua fiamma si accende quando risucchia gli spettri.\nSi trova spesso nei pressi dei cimiteri, dove questi\nabbondano."
          y: "Appare sul finire della vita per risucchiare l’energia\ndelle anime vagabonde."
        de:
          x: "Es nährt seine Flamme mit den Seelen seiner Opfer.\nHeutzutage irrt es auf der Suche nach Seelen durch\nKrankenhäuser."
          y: "Es erscheint im Augenblick des Todes und verschlingt\ndie Seele des Verblichenen, sofort nachdem sie den\nKörper verlassen hat."
        es:
          x: "Al absorber almas, su llama se enciende. Espera a que\nla gente fallezca, así que suele deambular por los\nhospitales."
          y: "Aparece hacia el final de la vida y absorbe el alma\nen cuanto esta se separa del cuerpo."
        ko:
          x: "영혼을 빨아들여 불을 밝힌다.\n사람이 죽는 것을 기다리기 위해\n병원을 서성거리게 되었다."
          y: "임종 때 나타나서\n영혼이 육체를 떠나면\n재빨리 빨아들여 버린다."
chandelure:
