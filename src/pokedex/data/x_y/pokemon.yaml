          y: "うしろあしに　ついた　みずかきを\nつかって　かわをわたり　ひろい\nはんいで　エサを　さがしまわる。"
        jp_kanji:
          x: "伸び続ける　前歯を　削るため\n硬い　ものを　かじる　習性。\nブロック塀も　かじって　壊す。"
          y: "後ろ足に　ついた　水かきを　使って\n川を　渡り　広い　範囲で\nエサを　探し回る。"
        en:
          x: "It whittles its constantly growing fangs by gnawing\non hard things. It can chew apart cinder walls."
          y: "The webs on its hind legs enable it to cross rivers.\nIt searches wide areas for food."
        fr:
          x: "Il grignote sans cesse pour apaiser la poussée de ses\ncrocs. Il peut transpercer un mur de parpaings."
          y: "Ses pattes arrière lui permettent de traverser les\nrivières. Il est toujours en quête de nourriture."
        it:
          x: "Si affila le zanne in perenne crescita rosicchiando\ncose dure. Riesce a frantumare persino i muri."
          y: "Attraversa i fiumi con le zampe posteriori palmate.\nPerlustra vaste aree cercando cibo."
        de:
          x: "Es wetzt seine ständig wachsenden Zähne an\nharten Dingen. Es kann Wände aus Beton zernagen."
          y: "Auf der Suche nach Nahrung kann es mit den\nSchwimmhäuten an seinen Hinterbeinen\nFlüsse durchqueren."
        es:
          x: "Lima sus colmillos royendo objetos duros. Con ellos\npuede destruir incluso paredes de hormigón."
          y: "Con las membranas de las patas traseras, puede\natravesar ríos. Busca su alimento en zonas extensas."
        ko:
          x: "계속 자라는 앞니를 갈아내려고\n딱딱한 것을 갉는 습성이 있다.\n벽돌로 된 벽도 갉아서 부순다."
          y: "뒷다리에 달린 물갈퀴를\n사용하여 강을 건너 넓은\n범위에서 먹이를 찾아다닌다."
