      descriptions:
        jp_kana:
          x: "おとなしい　かおで　あいてを　ゆだん\nさせてから　おおあごで　がぶり。\nかみつくと　ぜったいに　はなさない。"
          y: "ツノが　へんけいして　できた\nおおあごが　あたまに　ついている。\nてっこつを　かみきってしまう。"
        jp_kanji:
          x: "おとなしい　顔で　相手を　油断\nさせてから　おおあごで　がぶり。\nかみつくと　絶対に　放さない。"
          y: "ツノが　変形して　できた\nおおあごが　頭に　ついている。\n鉄骨を　かみきってしまう。"
        en:
          x: "It uses its docile-looking face to lull foes into\ncomplacency, then bites with its huge,\nrelentless jaws."
          y: "Attached to its head is a huge set of jaws formed\nby horns. It can chew through iron beams."
        fr:
          x: "Il utilise son visage charmeur pour tromper ses\nennemis avant de les mordre avec ses énormes\nmâchoires."
          y: "Ses cornes forment une grande mâchoire attachée\nà sa tête. Elle peut broyer des barres de fer."
        it:
          x: "Intenerisce i nemici con la sua faccia innocente,\nper poi morderli con le forti e instancabili mascelle."
          y: "Le sue due enormi mandibole sono corna trasformate.\nCon esse può masticare persino travi di ferro."
        de:
          x: "Mit seinem friedlichen Gesicht bringt es Gegner zur\nSelbstgefälligkeit und beißt anschließend mit seinem\nriesigen Kiefer gnadenlos zu."
          y: "Auf seinem Kopf befindet sich ein riesiger Kiefer,\nder aus Hörnern besteht. Er kann Eisen zermalmen."
        es:
          x: "Engaña con su aspecto dócil; hace que el rival se\nconfíe y le da un mordisco con sus enormes e\nimplacables mandíbulas."
          y: "Las grandes fauces de su cabeza están formadas por\ncuernos. Puede romper el hierro con ellas."
        ko:
          x: "얌전한 얼굴로 상대를 방심하게\n만들고 큰 턱으로 덥석 문다.\n한번 물면 절대로 놓지 않는다."
          y: "뿔이 변형되어 생긴\n큰 턱이 머리에 달려 있다.\n철골을 물어서 끊어 버린다."
