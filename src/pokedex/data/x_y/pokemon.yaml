          y: "Generates strange radio signals. It raises the\ntemperature by 3.6 degrees Fahrenheit within\n3,300 feet."
        fr:
          x: "Ce Pokémon est composé de plusieurs Magnéti.\nIl est capable de projeter de puissantes décharges\nmagnétiques à haute tension."
          y: "Il émet un signal radio étrange. Sa présence\naugmente la température de 1 °C dans un rayon\nde 1 000 m."
        it:
          x: "Formato da vari Magnemite, è in grado di lanciare\nonde magnetiche ad alto voltaggio."
          y: "Produce strane onde radio con cui può aumentare\nla temperatura atmosferica di qualche grado."
        de:
          x: "Schließen sich mehrere Magnetilo zusammen,\nentsteht dieses Pokémon. Es entlädt kräftige\nHochspannungsmagnetwellen."
          y: "Dieses Pokémon erzeugt seltsame Radiowellen\nund kann die Lufttemperatur geringfügig anheben."
        es:
          x: "Lo constituye un grupo de Magnemite. Descarga\npotentes ondas magnéticas de alto voltaje."
          y: "Es capaz de elevar 2 °C la temperatura en un radio\nde un kilómetro emitiendo extrañas ondas\nelectromagnéticas."
        ko:
          x: "다수의 코일이 연결되어\n강력한 자기장과\n높은 전압을 방사한다."
          y: "알 수 없는 전파를 발신하고 있어\n반경 1km 범위는\n기온이 2도 오른다."
