        - insomnia
        - frisk
      hidden_ability: cursed_body
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          x: "すてられた　ぬいぐるみに　おんねんが\nやどり　ポケモンになった。じぶんを\nすてた　こどもを　さがしている。"
          y: "つよい　おんねんが　ぬいぐるみを\nポケモンに　かえた。くちを　あけると\nのろいの　エネルギーが　にげていく。"
        jp_kanji:
          x: "捨てられた　ぬいぐるみに　おんねんが\n宿り　ポケモンになった。自分を\n捨てた　子供を　捜している。"
          y: "強い　おん念が　ぬいぐるみを\nポケモンに　変えた。口を　開けると\nのろいの　エネルギーが　逃げていく。"
        en:
          x: "A doll that became a Pokémon over its grudge from\nbeing junked. It seeks the child that disowned it."
          y: "Strong feelings of hatred turned a puppet into a\nPokémon. If it opens its mouth, its cursed\nenergy escapes."
        fr:
          x: "Une poupée mue par la tristesse qui la ronge depuis\nqu’on l’a délaissée. Elle recherche son propriétaire."
          y: "Un très violent sentiment de haine a transformé\nune poupée de chiffon en Branette. S’il ouvre la\nbouche, une énergie négative s’en échappe."
        it:
          x: "Un peluche divenuto Pokémon per la rabbia di essere\nstato buttato via da un bimbo, di cui è alla ricerca."
          y: "Peluche trasformato in Pokémon da un forte odio.\nAppena apre la sua bocca, sprigiona una forte\nenergia negativa."
        de:
          x: "Dieses Pokémon war eine Puppe, die weggeworfen\nwurde. Es sucht nun das Kind, das dies getan hat."
          y: "Starke Gefühle des Hasses machten aus einer Puppe\nein Pokémon. Öffnet es seinen Mund, kann die ganze\nverfluchte Energie hinaus."
        es:
          x: "Este muñeco se convirtió en un Pokémon cuando lo\ntiraron a la basura. Busca a su antiguo dueño."
          y: "Cuando abandonaron a este muñeco de felpa, se\nconvirtió en Pokémon. Libera una energía que hechiza\nal enemigo."
        ko:
          x: "버려진 인형에 원념이\n깃들어 포켓몬이 되었다.\n자신을 버린 아이를 찾고 있다."
          y: "강한 원념이 인형을\n포켓몬으로 바꿨다. 입을 열면\n저주의 에너지가 빠져나간다."
