        - static
      hidden_ability: aftermath
      descriptions:
        jp_kana:
          x: "モンスターボールが　うりだされたのと\nおなじ　じきに　はっけんされた。\nなにか　かんけいがある　といわれる。"
          y: "はつでんしょなどに　あらわれる。\nモンスターボールと　まちがえて\nさわって　しびれるひとが　おおい。"
        jp_kanji:
          x: "モンスターボールが　売り出されたのと\n同じ　時期に　発見された。\nなにか　関係があると　いわれる。"
          y: "発電所などに　現れる。\nモンスターボールと　間違えて\n触って　しびれる　人が　多い。"
        en:
          x: "It was discovered when Poké Balls were\nintroduced. It is said that there is\nsome connection."
          y: "Usually found in power plants. Easily mistaken for a\nPoké Ball, it has zapped many people."
        fr:
          x: "Découvert en même temps que les Poké Balls.\nIl paraît qu’il existe un lien entre les deux."
          y: "Vivant près des centrales électriques, ce Pokémon\nsurvolté est souvent confondu avec une Poké Ball."
        it:
          x: "Scoperto all’epoca dell’invenzione delle Poké Ball.\nSi pensa che i due fatti siano correlati."
          y: "Di solito vive nelle centrali elettriche. Se confuso\ncon una Poké Ball, può essere fatale."
        de:
          x: "Es wurde entdeckt, als man Pokébälle einführte.\nEs scheint, als gäbe es da einen Zusammenhang."
          y: "Dieses Pokémon wird oftmals mit einem Pokéball\nverwechselt. Es lebt vorwiegend in Kraftwerken."
        es:
          x: "Fue descubierto cuando se crearon las Poké Balls.\nSe dice que tiene algo que ver con ellas."
          y: "Suele vivir en centrales de energía. Mucha gente\nacaba muy mal al confundirlo con una Poké Ball."
        ko:
          x: "몬스터볼이 팔리기 시작했을 때와\n같은 시기에 발견되었다.\n뭔가 관계가 있다고 전해진다."
          y: "발전소 등에서 나타난다.\n몬스터볼과 헷갈려서\n만지고 마비되는 사람이 많다."
electrode:
