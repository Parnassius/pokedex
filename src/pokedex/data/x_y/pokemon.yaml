        jp_kana:
          x: "おはかに　まいそうされた　ひとの\nたましいが　ポケモンに　へんかした。\nしぬまえの　きおくが　のこっている。"
          y: "もっている　マスクは　デスマスが\nにんげんだった　ときの　かお。\nたまに　みつめては　ないている。"
        jp_kanji:
          x: "お墓に　埋葬された　人の\n魂が　ポケモンに　変化した。\n死ぬ前の　記憶が　残っている。"
          y: "持っている　マスクは\nデスマスが　人間だった　ときの　顔。\nたまに　見つめては　泣いている。"
        en:
          x: "These Pokémon arose from the spirits of people\ninterred in graves. Each retains memories of its\nformer life."
          y: "Each of them carries a mask that used to be its face\nwhen it was human. Sometimes they look at it\nand cry."
        fr:
          x: "Il est né de l’âme d’un défunt inhumé dans une tombe\nantique. Il a conservé ses anciens souvenirs."
          y: "Le motif de son masque est son visage quand il était\nhumain. Parfois, il le regarde et se met à pleurer."
        it:
          x: "Erano un tempo spettri che riposavano in antiche\ntombe. Conservano la memoria della loro vita mortale."
          y: "La maschera che indossa è il volto che aveva quando\nera un umano. A volte si mette a piangere mentre\nla guarda."
        de:
          x: "Es entsteht aus den Seelen von längst begrabenen\nMenschen und kann sich immer noch an deren\nVergangenheit erinnern."
          y: "Seine Maske ist ein Abbild des Gesichts, das es\nals Mensch hatte. Manchmal weint es, wenn man\nihm in die Augen sieht."
        es:
          x: "Almas de humanos sepultados en tumbas que han\nadquirido forma de Pokémon. Recuerdan su vida antes\nde la muerte."
          y: "Su máscara representa la cara que poseía cuando\nera humano. A veces se le saltan las lágrimas al\ncontemplarla."
        ko:
          x: "무덤에 매장된 사람의\n영혼이 포켓몬으로 변했다.\n죽기 전 기억이 남아 있다."
          y: "가지고 있는 마스크는 데스마스가\n사람이었을 때의 얼굴이다.\n가끔 마스크를 쳐다보며 운다."
cofagrigus:
