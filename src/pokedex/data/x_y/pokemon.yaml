        jp_kanji:
          x: "３つの　頭が　見ている前で\nわずかでも　すきを　見せると\nクチバシで　激しく　つつかれる。"
          y: "めったに　見つからない　珍種。\n３つの　頭は　喜び　悲しみ\n怒りの　感情を　表す。"
        en:
          x: "An enemy that takes its eyes off any of the\nthree heads--even for a second--will get\npecked severely."
          y: "An odd species that is rarely found. The three\nheads respectively represent joy, sadness,\nand anger."
        fr:
          x: "Un ennemi ne faisant pas attention à l’une des trois\ntêtes pendant une seconde se fait picorer."
          y: "Une espèce étrange que l’on trouve rarement.\nLes trois têtes représentent la joie, la tristesse et\nla colère."
        it:
          x: "Occorre fare attenzione a tutte le sue tre teste,\naltrimenti si rischia d’essere colpiti duramente."
          y: "Pokémon raro e bizzarro. Le sue tre teste\nrappresentano rispettivamente la gioia, la tristezza\ne la rabbia."
        de:
          x: "Lässt ein Feind auch nur einen der drei Köpfe\nfür nur eine Sekunde aus den Augen, wird er\nsofort gepickt."
          y: "Ein seltsames Exemplar, das nur selten gefunden wird.\nDie drei Köpfe repräsentieren Freude, Trauer und Wut."
        es:
          x: "Más vale no perder de vista ninguna de las tres\ncabezas. De lo contrario, el número de picotazos\nserá enorme."
          y: "Es una especie muy rara y difícil de encontrar.\nLas tres cabezas simbolizan la alegría, la tristeza\ny la ira."
        ko:
          x: "3개의 머리가 보고 있는 앞에서\n조금이라도 빈틈을 보이면\n부리로 격렬하게 쪼아댄다."
          y: "좀처럼 발견하기 힘든 진귀한 종이다.\n3개의 머리는 기쁨, 슬픔, 분노의\n감정을 나타낸다."
