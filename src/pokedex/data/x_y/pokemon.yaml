      descriptions:
        jp_kana:
          x: "ほっぺたに　どくぶくろを　もつ。\nあいての　すきを　ついて　もうどくを\nにじませている　ゆびを　つきさす。"
          y: "どくぶくろを　ふくらませて　ならし\nあたりに　ぶきみな　おとを　ひびかせ\nあいてが　ひるむと　どくづきをする。"
        jp_kanji:
          x: "ほっぺたに　毒袋を　持つ。\n相手の　すきを　ついて　猛毒を\nにじませている　指を　突き刺す。"
          y: "毒袋を　ふくらませて　鳴らし\n辺りに　不気味な　音を　響かせ\n相手が　ひるむと　どくづきをする。"
        en:
          x: "Its cheeks hold poison sacs. It tries to catch foes\noff guard to jab them with toxic fingers."
          y: "Inflating its poison sacs, it fills the area with an odd\nsound and hits flinching opponents with a\npoison jab."
        fr:
          x: "Ses joues contiennent des glandes toxiques.\nIl attaque par surprise et utilise son toucher\nempoisonné."
          y: "Ses glandes se gonflent de venin tout en émettant\nun son effrayant, le laissant ainsi empoisonner ses\nproies pétrifiées."
        it:
          x: "Le sacche delle guance contengono veleno.\nInfilza i nemici con le sue unghie avvelenate."
          y: "Gonfia le sue sacche di veleno emettendo un verso\nsinistro che può far tentennare l’avversario, poi lo\navvelena."
        de:
          x: "In seinen Backen sammelt sich Gift. Es versucht,\nBeute zu überraschen und mit Giftfingern zu\nschnappen."
          y: "Bläst es seine Giftbeutel auf, ertönt ein unheimliches\nGeräusch, das Gegner zurückschrecken lässt\nund vergiftet."
        es:
          x: "Tiene bolsas venenosas en las mejillas. Pilla\ndesprevenidos a sus rivales para pincharles."
          y: "Infla sus bolsas venenosas para emitir un sonido\nmacabro mientras asesta golpes que hacen retroceder\na los rivales."
        ko:
          x: "볼에 독주머니를 가지고 있다.\n상대의 틈을 노려 맹독이\n배인 손가락을 꿰찌른다."
          y: "독주머니를 부풀려서 울어\n주변에 으스스한 소리를 퍼트려\n상대가 풀죽으면 독찌르기를 한다."
toxicroak:
  species_id: 454
  names:
