          y: "ごくまれに　とつぜんへんいで\nふたごの　ちいさい　ドガースが\nれんけつしたまま　でることがある。"
        jp_kanji:
          x: "どちらかが　ふくらむと　片方は\nしぼむ　双子の　ドガース。いつも\n体内の　毒ガスを　混ぜている。"
          y: "ごくまれに　突然変異で\n双子の　小さい　ドガースが\n連結したまま　出ることがある。"
        en:
          x: "If one of the twin Koffing inflates, the other one\ndeflates. It constantly mixes its poisonous gases."
          y: "Very rarely, a sudden mutation can result in two\nsmall Koffing twins becoming conjoined as\na Weezing."
        fr:
          x: "Si l’un des deux Smogo se gonfle, l’autre se\ndégonfle. Ils mélangent leurs gaz en permanence."
          y: "Il peut arriver que deux Smogo mutent et s’associent\npour former un Smogogo, mais c’est très rare."
        it:
          x: "Se un gemello Koffing si sgonfia, l’altro si gonfia.\nI gas velenosi dei due si mischiano continuamente."
          y: "Una rarissima mutazione può trasformare due\nKoffing gemelli in un Weezing."
        de:
          x: "Pumpt sich eines der zwei Smogon auf, lässt das\nandere Luft ab. So findet ein Giftgasaustausch statt."
          y: "Sehr selten führt eine plötzliche Mutation eines\nZwillings-Smogon zu einer Verbindung zu Smogmog."
        es:
          x: "Si uno de los gemelos Koffing se infla, el otro se\ndesinfla. Mezclan constantemente sus venenosos\ngases."
          y: "En raras ocasiones, se produce una mutación y dos\npequeños Koffing se unen formando un Weezing."
        ko:
          x: "한쪽이 부풀어 오르면 다른 한쪽은\n오그라드는 쌍둥이 또가스. 항상\n체내의 독가스를 섞고 있다."
          y: "극히 드물게 돌연변이로\n쌍둥이인 작은 또가스가\n연결된 채로 나오는 때가 있다."
rhyhorn:
