        jp_kana:
          x: "ほほの　ふくろに　エサを　ためこみ\nなんにちも　みはりを　つづける。\nしっぽで　なかまに　あいずする。"
          y: "けいかいしんが　つよく　かならず\nいっぴきは　みはりを　しているのだが\nうしろからの　てきには　きづかない。"
        jp_kanji:
          x: "ほほの　袋に　エサを　ためこみ\n何日も　見張りを　続ける。\n尻尾で　仲間に　合図する。"
          y: "警戒心が　強く　かならず\n１匹は　見張りを　しているのだが\n後ろからの　敵には　気づかない。"
        en:
          x: "Using food stored in cheek pouches, they can keep\nwatch for days. They use their tails to communicate\nwith others."
          y: "Extremely cautious, one of them will always be on\nthe lookout, but it won’t notice a foe coming\nfrom behind."
        fr:
          x: "Ils stockent à manger dans leurs bajoues et font\nle guet indéfiniment. Ils se font des signes en remuant\nla queue."
          y: "Très prudent, il surveille attentivement son territoire,\nmais oublie souvent de regarder derrière lui."
        it:
          x: "Immagazzina cibo nelle guance e monta la guardia\nper molti giorni di seguito. Usa la coda per fare\nsegnali ai compagni."
          y: "Sono molto guardinghi e almeno uno del branco è\nsempre di guardia. Non vedono però il nemico se li\nattacca da dietro."
        de:
          x: "Hortet in seinen Backentaschen Futter, um tagelang\nWache stehen zu können, und gibt Kameraden über\nseine Rute Signale."
          y: "Eines dieser vorsichtigen Pokémon steht immer vor\nihrem Bau Wache. Nähert sich jedoch ein Feind\nvon hinten, ist es aus."
        es:
          x: "Almacena víveres en unas bolsas en sus mofletes y\nvigila durante días. Hace señales con la cola a sus\ncompañeros."
          y: "Aunque es un Pokémon muy precavido y siempre hay\nuno montando guardia, si se acercan por detrás, no se\ndará cuenta."
        ko:
          x: "볼의 주머니에 먹이를 모아두고\n며칠이고 망보기를 계속한다.\n꼬리로 동료에게 신호한다."
          y: "경계심이 강해서 반드시\n한 마리는 망을 보고 있으나\n뒤에서 오는 상대는 알아차리지 못한다."
