      egg_groups:
        - water_1
        - water_2
      abilities:
        - suction_cups
        - sniper
      hidden_ability: moody
      descriptions:
        jp_kana:
          x: "あなに　はいりたがる　せいしつで\nいわあなや　ツボを　このみ　そこから\nスミを　ふきだして　こうげきする。"
          y: "がんじょうな　いしあたま。\nきゅうばんつきの　あしを　からませ\nひたすら　あたまで　うちすえる。"
        jp_kanji:
          x: "穴に　入りたがる　性質で\n岩穴や　ツボを　好み　そこから\n墨を　噴き出して　攻撃する。"
          y: "頑丈な　石頭。\n吸盤つきの　脚を　絡ませ\nひたすらに　頭で　打ちすえる。"
        en:
          x: "It has a tendency to want to be in holes. It prefers\nrock crags or pots and sprays ink from them\nbefore attacking."
          y: "It traps foes with the suction cups on its tentacles,\nthen smashes them with its rock-hard head."
        fr:
          x: "Il adore se cacher dans les fissures et les épaves,\nd’où il attaque en crachant de l’encre."
          y: "Il capture ses ennemis avec ses tentacules et les\nécrase ensuite avec sa tête dure comme la pierre."
        it:
          x: "Ama rintanarsi nei vasi o nelle fessure della roccia,\nda dove attacca sparando getti d’inchiostro."
          y: "Cattura i nemici con le ventose dei tentacoli per poi\ncolpirli con il suo capo duro come pietra."
        de:
          x: "Es verkriecht sich gerne in Löchern, von wo aus\nes Gegner mit Tinte beschießt. Es bevorzugt\nFelsspalten und Vasen."
          y: "Beim Beutefang setzt es seine Tentakel ein.\nEs zermalmt seine Beute mit seinem steinharten Kopf."
        es:
          x: "Tiene querencia por los agujeros. Ataca escupiendo\ntinta metido en las grietas de rocas o en recipientes."
          y: "Atrapa a los enemigos con sus tentáculos y después\nlos golpea con su dura cabeza."
        ko:
          x: "구멍에 들어가고 싶어 하는 성질로\n바위굴이나 항아리를 좋아해 거기서\n먹물을 뿜어내 공격한다."
          y: "튼튼한 돌머리다.\n빨판이 붙어 있는 다리를 휘감아\n한결같이 머리로 세게 때린다."
delibird:
  species_id: 225
  names:
    jp_kana: デリバード
    jp_kanji: デリバード
    en: Delibird
    fr: Cadoizo
    it: Delibird
    de: Botogel
    es: Delibird
    ko: 딜리버드
  forms:
    delibird:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 45
