      descriptions:
        jp_kana:
          x: "ふかい　うみの　そこで　くらす。\n４まいの　ひれの　もようを　ひからせ\nえものを　おびきよせる。"
          y: "てんてきに　みつからないように\nむねの　２まいの　ひれを　つかい\nかいていを　はって　いどうする。"
        jp_kanji:
          x: "深い　海の　底で　暮らす。\n４枚の　ヒレの　模様を　光らせて\n獲物を　おびき寄せる。"
          y: "天敵に　見つからないように\n胸の　２枚の　ヒレを　使い\n海底を　這って　移動する。"
        en:
          x: "It lives on the deep-sea floor. It attracts prey by\nflashing the patterns on its four tail fins."
          y: "To avoid detection by predators, it crawls along the\nseafloor using the two fins on its chest."
        fr:
          x: "Il vit au plus profond de l’océan. Il attire sa proie en\nilluminant les motifs de ses quatre nageoires."
          y: "Pour éviter de se faire voir par ses ennemis, il rampe\nau fond de l’eau grâce aux nageoires sur son torse."
        it:
          x: "Vive negli abissi marini. Attira le prede illuminando\ni motivi delle sue quattro pinne."
          y: "Per non farsi scoprire dai nemici, si muove lentamente\nsui fondali marini con le due pinne pettorali."
        de:
          x: "Es lebt tief auf dem Meeresboden. Das blinkende\nMuster auf seinen vier Rückenflossen zieht Beute an."
          y: "Um nicht von Fressfeinden entdeckt zu werden,\nkrabbelt es auf zwei Brustflossen am Meeresboden."
        es:
          x: "Vive en las profundidades marinas. Atrae a sus presas\ncon parpadeos del dibujo de sus cuatro aletas."
          y: "Para que los depredadores no lo detecten, se arrastra\npor el fondo marino con las aletas del pecho."
        ko:
          x: "깊은 바다의 밑바닥에서 산다.\n4개의 지느러미 무늬를 반짝거려\n먹이를 끌어들인다."
          y: "천적에게 발견되지 않도록\n가슴에 있는 2개의 지느러미로\n해저에 붙어서 이동한다."
mantyke:
