          y: "ガスから　うまれた　せいめいたい。\nどくをふくんだ　ガスの　からだに\nつつまれると　だれでも　きぜつする。"
        jp_kanji:
          x: "ガスでできた　薄い　体は\nどんな　大きさの　相手も\n包みこみ　息の根を　止める。"
          y: "ガスから　生まれた　生命体。\n毒を含んだ　ガスの　体に\n包まれると　だれでも　気絶する。"
        en:
          x: "Its body is made of gas. Despite lacking substance,\nit can envelop an opponent of any size and\ncause suffocation."
          y: "Born from gases, anyone would faint if engulfed by\nits gaseous body, which contains poison."
        fr:
          x: "Son corps est composé de gaz. Il peut ainsi\nenvelopper un adversaire et le faire suffoquer."
          y: "Son corps composé de gaz toxique pourrait asphyxier\nn’importe qui en quelques secondes."
        it:
          x: "Il suo corpo sottile è fatto di gas. Avvolge nemici\ndi ogni dimensione, soffocandoli."
          y: "Generato da sostanze gassose, fa perdere i sensi a\nchiunque respiri i gas tossici di cui è costituito."
        de:
          x: "Es hat einen gasförmigen Körper. Es kann jeden\nGegner mit Giftgas einnebeln und dadurch ersticken."
          y: "Eingehüllt in seinen gasförmigen, Gift enthaltenden\nKörper würde jeder in Ohnmacht fallen."
        es:
          x: "Su etéreo cuerpo está hecho de gas. Puede envolver\na un oponente de cualquier tamaño hasta ahogarlo."
          y: "Nació a partir de gases venenosos que asfixiarían a\ncualquiera que se viera envuelto en ellos."
        ko:
          x: "가스로 만들어진 몸은\n어떠한 크기의 상대라도\n둘러싸서 숨을 못 쉬게 한다."
          y: "가스에서 태어난 생명체다.\n독을 포함한 가스로 된 몸에\n둘러싸이면 누구든지 기절한다."
