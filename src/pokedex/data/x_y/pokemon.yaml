      descriptions:
        jp_kana:
          x: "タンカーの　せんたいを　くさらせる\nもうどくを　なわばりに　はいりこんだ\nものに　みさかいなく　はきかける。"
          y: "ドラミドロが　すむ　かいいきに\nまよいこんだ　ふねは　２どと\nいきて　もどれないと　いわれている。"
        jp_kanji:
          x: "タンカーの　船体を　腐らせる　猛毒を\n縄張りに　入りこんだ　ものに\n見境なく　吐きかける。"
          y: "ドラミドロが　住む　海域に\n迷いこんだ　船は　２度と\n生きて　戻れないと　言われている。"
        en:
          x: "Their poison is strong enough to eat through\nthe hull of a tanker, and they spit it indiscriminately\nat anything that enters their territory."
          y: "Tales are told of ships that wander into\nseas where Dragalge live, never to return."
        fr:
          x: "Il asperge tous ceux qui osent pénétrer sur son\nterritoire d’un poison assez corrosif pour dissoudre\nla coque d’un pétrolier."
          y: "Il paraît que les navires qui s’aventurent dans les eaux\npeuplées de Kravarech ne reviennent jamais de leur\npériple."
        it:
          x: "Spruzza su chiunque invada il suo territorio un veleno\ntalmente potente da sciogliere lo scafo di una\npetroliera."
          y: "Si dice che le navi che finiscono alla deriva nelle acque\nin cui vive questo Pokémon non tornino più indietro."
        de:
          x: "Das Gift, mit dem es Eindringlinge in seinem Revier\nbespritzt, ist ätzend genug, um sich durch\nden Stahl eines Tankschiffes zu fressen."
          y: "Es heißt, dass die Besatzung von Schiffen, die sich in\nTandraks Hoheitsgebiet begeben, nicht mehr lebend\nzurückkehrt."
        es:
          x: "Ataca de manera indiscriminada a quien ose adentrarse\nen su territorio, escupiéndole un virulento veneno\nque puede corroer hasta el casco de un petrolero."
          y: "Según se dice, los barcos que se aventuran en aguas\ndonde habitan Dragalge desaparecen del mapa y no\nregresan a puerto."
        ko:
          x: "유조선의 선체를 썩게 할 정도의\n맹독을 영역 안에 들어 온 것에\n무턱대고 끼얹는다"
          y: "드래캄이 사는 해역에\n길을 잘못 든 배는 두 번 다시\n살아서 돌아가지 못한다고 전해진다."
