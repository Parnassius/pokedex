          y: "ほらあなの　てんじょうに　はりつき\nしたを　とおる　えものに　むかって\nてつの　トゲを　うちこみ　おそう。"
        jp_kanji:
          x: "３本の　触手を　たたきつけ\nさらに　トゲを　飛ばして　相手を\n跡形残らず　粉砕する。"
          y: "洞穴の　天井に　はりつき\n下を　通る　獲物に　向かって\n鉄の　トゲを　打ちこみ　襲う。"
        en:
          x: "By swinging around its three spiky feelers and\nshooting spikes, it can obliterate an opponent."
          y: "They attach themselves to cave ceilings, firing steel\nspikes at targets passing beneath them."
        fr:
          x: "Il attaque grâce à ses trois tentacules épineux et\nlance des épines d’acier pour réduire ses ennemis\nen poussière."
          y: "Il s’accroche aux plafonds des grottes et attaque\nles proies qui passent en dessous avec ses épines\nd’acier."
        it:
          x: "Fa a pezzi il nemico colpendolo prima con le sue\ntre antenne e poi sparandogli addosso i suoi aculei."
          y: "Si appende al soffitto delle grotte e attacca le prede\nche passano al di sotto lanciando i suoi aculei di ferro."
        de:
          x: "Es macht mit Gegnern kurzen Prozess, indem es mit\nseinen drei Schlingen auf sie eindrischt und Dornen\nauf sie abfeuert."
          y: "Es setzt sich an der Decke von Höhlen fest und wirft\nseine dornengespickten Schlingen auf vorbeigehende\nBeute ab."
        es:
          x: "Azota al enemigo con sus tres tentáculos y después\ndispara púas hasta que no deja ni rastro del rival."
          y: "Se pega al techo de cuevas y lanza púas de metal a\ntodo el que pase por debajo de donde se encuentre."
        ko:
          x: "3개의 촉수를 세게 내리치고\n거기에 가시를 날려 상대를\n흔적도 없이 분쇄한다."
          y: "동굴 천장에 달라붙어\n아래를 지나가는 먹이를 향해\n철 가시를 쏘며 덮친다."
klink:
