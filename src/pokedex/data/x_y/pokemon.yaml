        - limber
        - reckless
      hidden_ability: unburden
      descriptions:
        jp_kana:
          x: "あしが　じゆうに　のびちぢみして\nとおく　はなれている　ばあいでも\nあいてを　けりあげることが　できる。"
          y: "れんぞくで　キックを　はなつうちに\nりょうあしは　どんどん　のびて\nにげだそうとする　あいても　けれる。"
        jp_kanji:
          x: "脚が　自由に　伸び縮みして\n遠く　離れている　場合でも\n相手を　蹴り上げることができる。"
          y: "連続で　キックを　放つうちに\n両足は　どんどん　伸びて\n逃げ出そうとする　相手も　蹴れる。"
        en:
          x: "The legs freely contract and stretch. The stretchy\nlegs allow it to hit a distant foe with a rising kick."
          y: "If it starts kicking repeatedly, both legs will stretch\neven longer to strike a fleeing foe."
        fr:
          x: "Kicklee peut rétracter et allonger ses jambes à sa\nguise. La formidable allonge dont il dispose lui donne\nsouvent l’avantage en plein combat."
          y: "S’il commence à donner des séries de coups de pied,\nses jambes grandissent et il gagne en allonge."
        it:
          x: "Le zampe gli si accorciano e allungano a piacere.\nCon le gambe allungate, con un calcio può colpire\nanche nemici distanti."
          y: "Se parte con una scarica di colpi, le gambe possono\nfarsi ancora più lunghe per colpire un nemico in fuga."
        de:
          x: "Die Beine ziehen und strecken sich unabhängig\nvoneinander. Mit seinen dehnbaren Beinen\nkann es einen entfernten Gegner treffen."
          y: "Wenn es anfängt pausenlos zu treten, kann es seine\nBeine ausfahren, um fliehende Feinde zu treffen."
        es:
          x: "Encoge y estira las patas a su antojo. Cuando las\nestira, es capaz de propinar una buena patada al\nenemigo."
          y: "Si empieza a dar patadas, sus patas se alargarán aún\nmás para golpear al enemigo en su huida."
        ko:
          x: "다리를 자유자재로 늘였다 줄였다 한다.\n멀리 떨어져 있을 때도\n상대를 차올릴 수 있다."
          y: "연속으로 킥을 하는 동안\n양쪽 다리는 점점 길어져서\n도망치려고 하는 상대도 걷어찬다."
hitmonchan:
