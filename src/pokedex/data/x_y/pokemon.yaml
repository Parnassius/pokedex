          y: "チラチーノの　体は　特別な\n油で　覆われており　パンチなど\n相手の　攻撃を　受け流す。"
        en:
          x: "Their white fur feels amazing to touch. Their fur\nrepels dust and prevents static electricity from\nbuilding up."
          y: "Cinccino’s body is coated in a special oil that helps\nit deflect attacks, such as punches."
        fr:
          x: "La texture de ses poils blancs est incomparable.\nElle n’attire ni la poussière, ni l’électricité statique."
          y: "Son corps est recouvert d’une sorte de lubrifiant qui\nfait glisser les coups sur lui comme si de rien n’était."
        it:
          x: "La sua pelliccia bianca è morbidissima al tatto.\nNon accumula né polvere né elettricità statica."
          y: "Il suo corpo è ricoperto di un grasso speciale sul\nquale scivolano via i colpi e i pugni dell’avversario."
        de:
          x: "Sein weißer Flaum fühlt sich wunderbar flauschig an\nund zieht weder Staub noch statische Elektrizität an."
          y: "Sein Körper ist mit einem speziellen Öl überzogen,\nan dem gegnerische Hiebe und ähnliche Angriffe\neinfach abgleiten."
        es:
          x: "El pelo que cubre su cuerpo proporciona una\nagradable sensación al tocarlo. No acumula ni polvo\nni electricidad estática."
          y: "El cuerpo de Cinccino está recubierto por una grasa\nespecial que hace que los golpes y ataques enemigos\nno acierten."
        ko:
          x: "하얀 털은 감촉이 정말 좋다.\n먼지나 정전기가\n전혀 생기지 않는다."
          y: "치라치노의 몸은 특별한\n기름으로 뒤덮여 있어 펀치 등\n상대의 공격을 받아넘긴다."
