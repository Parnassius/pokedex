        en:
          x: "It is a kind of Pokémon progenitor. It uses its\nextending claws to catch prey hiding among rocks\non the seafloor."
          y: "A Pokémon ancestor that was reanimated from a\nfossil. It lived in the sea and hunted with claws."
        fr:
          x: "C’est un Pokémon préhistorique. Caché derrière\nles rochers, il utilise ses pinces extensibles pour\nattraper ses proies."
          y: "Un ancêtre Pokémon réanimé à partir d’un fossile.\nIl vivait en mer et chassait avec ses pinces."
        it:
          x: "Pokémon di tipo primitivo, usa i lunghi artigli per\ncatturare prede nascoste tra le rocce in fondo al mare."
          y: "Un antico Pokémon rigenerato da un fossile. Viveva\nnel mare e catturava le prede con gli artigli."
        de:
          x: "Es ist eine Art Vorfahre der Pokémon. Mit seinen\nerweiterten Scheren geht es zwischen den Felsen\nam Meeresgrund auf Beutefang."
          y: "Ein Vorfahre der Pokémon, der aus einem Fossil neu\nbelebt wurde. Es lebte im Meer und jagte mit Klauen."
        es:
          x: "Es una especie de Pokémon predecesor. Estira las\npinzas para cazar a sus presas, que se esconden en\nlas rocas del mar."
          y: "Este Pokémon fue recreado a partir de restos fósiles.\nVivía en el mar y cazaba con sus pinzas."
        ko:
          x: "포켓몬의 조상 중 하나다.\n해저의 바위 지대에 숨어 있는\n먹잇감을 늘어나는 발톱으로 잡는다."
          y: "화석에서 부활한 포켓몬의\n조상 중 하나. 바다에서 살고\n발톱으로 먹이를 잡는다."
