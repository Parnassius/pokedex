      descriptions:
        jp_kana:
          x: "つむじかぜと　ともに　あらわれて\nいえのなかの　かぐを　うごかしたり\nわたを　のこす　いたずらをする。"
          y: "どんなに　ほそい　すきまでも\nかぜのように　くぐりぬけてしまう。\nしろい　けだまを　のこしていく。"
        jp_kanji:
          x: "つむじかぜと　ともに　現われて\n家の　中の　家具を　動かしたり\n綿を　残す　いたずらをする。"
          y: "どんなに　細い　すきまでも\n風のように　潜り抜けてしまう。\n白い　毛玉を　残していく。"
        en:
          x: "They appear along with whirlwinds. They pull\npranks, such as moving furniture and leaving balls\nof cotton in homes."
          y: "Like the wind, it can slip through any gap,\nno matter how small. It leaves balls of white\nfluff behind."
        fr:
          x: "Il apparaît dans un tourbillon de vent, s’introduit dans\nles maisons et y joue de mauvais tours."
          y: "Il se faufile comme le vent par les espaces les plus\nétroits, en laissant une touffe de poils blancs."
        it:
          x: "Appare con un vortice d’aria, facendo piccoli dispetti\ncome spostare i mobili nelle case o lasciare cotone\novunque."
          y: "Si infiltra nelle fessure più sottili, come un soffio di\nvento, lasciando dietro di sé dei batuffoli bianchi."
        de:
          x: "Sie erscheinen mit Orkanböen und spielen den\nLeuten Streiche, indem sie in Häusern Möbel\nverrücken oder Watte verstreuen."
          y: "Passiert wie ein Luftzug mühelos jeden noch so engen\nSpalt und hinterlässt dort nichts als ein weißes\nFellknäuel."
        es:
          x: "Aparecen en medio de un torbellino y entran en las\ncasas para descolocar los muebles o esparcir algodón\npor doquier."
          y: "Es capaz de atravesar las más mínimas fisuras. A su\npaso, deja bolitas blancas de pelo."
        ko:
          x: "회오리바람과 함께 나타나\n집 안의 가구를 움직이거나\n솜을 남기는 장난을 친다."
          y: "아무리 좁은 틈이라도\n바람처럼 빠져나간다.\n하얀 털 뭉치를 남기고 간다."
petilil:
