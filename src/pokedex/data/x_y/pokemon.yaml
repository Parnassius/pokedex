      descriptions:
        jp_kana:
          x: "あたりの　くうきを　ひやして\nこおりの　つぶを　はっせい　させて\nてきの　からだを　こおりつかせる。"
          y: "ゆきやまに　せいそくする　ポケモン。\nおおむかし　ひょうがきの　ときに\nみなみの　とちへ　いどうしてきた。"
        jp_kanji:
          x: "辺りの　空気を　冷やして\n氷の　粒を　発生　させて\n敵の　体を　凍りつかせる。"
          y: "雪山に　生息する　ポケモン。\n大昔　氷河期の　ときに\n南の　土地に　移動してきた。"
        en:
          x: "They cool down the surrounding air and create ice\nparticles, which they use to freeze their foes."
          y: "Snowy mountains are this Pokémon’s habitat.\nDuring an ancient ice age, they moved to\nsouthern areas."
        fr:
          x: "Il pétrifie ses ennemis en refroidissant l’air ambiant\net en le changeant en une myriade de petites\nparticules de glace."
          y: "Un Pokémon qui vit dans les montagnes enneigées.\nIl a émigré au sud durant l’ère glaciaire, il y a bien\nlongtemps."
        it:
          x: "Congela il corpo del nemico con granelli di ghiaccio\nche genera raffreddando l’aria circostante."
          y: "Vive sulle montagne innevate. Durante le antiche\nglaciazioni si è spostato nelle regioni del sud."
        de:
          x: "Es produziert Eiskörner, indem es die Luft um sich\nherum abkühlt, und zieht mit ihnen eine Eisschicht\num seinen Gegner."
          y: "Es lebt auf schneebedeckten Bergen. Vor vielen\nJahren fand es während einer Eiszeit seinen Weg\nin den Süden."
        es:
          x: "Enfrían el aire a su alrededor y crean partículas de\nhielo mediante las cuales congelan a sus oponentes."
          y: "Vive en las cumbres nevadas. Migró hacia el sur\ndurante la era glaciar hace muchísimos años."
        ko:
          x: "주변 공기를 차갑게 해서\n얼음 알갱이를 발생시켜서\n상대의 몸을 얼려버린다."
          y: "설산에 서식하는 포켓몬이다.\n먼 옛날 빙하기 때\n남쪽 땅으로 이동해 왔다."
vanilluxe:
