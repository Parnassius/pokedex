          y: "かたてで　ダンプカーを　もちあげる\nパワーを　いかして　ひとの　かわりに\nちからしごとを　てつだう　ポケモン。"
        jp_kanji:
          x: "すごく　強靭な　肉体なので\nパワーセーブ　ベルトを　つけて\n強さを　制御している。"
          y: "片手で　ダンプカーを　持ち上げる\nパワーを　活かして　人の　かわりに\n力仕事を　手伝う　ポケモン。"
        en:
          x: "Its muscular body is so powerful, it must wear a\npower-save belt to be able to regulate its motions."
          y: "It can lift a dump truck with one hand. Using that\npower, it helps people with heavy jobs."
        fr:
          x: "Son corps est si puissant qu’il lui faut une ceinture\nde force pour équilibrer ses mouvements."
          y: "Il peut soulever un camion d’une main. Il se sert\nde sa force pour aider dans les tâches physiques."
        it:
          x: "Il suo corpo muscoloso è così forte che usa una\ncintura antiforza per regolare i suoi movimenti."
          y: "È così forte da sollevare un autocarro con una sola\nmano. Aiuta le persone nei lavori pesanti."
        de:
          x: "Dieses Pokémon ist superstark. Es kann sich nur\nmit einem Kraft regulierenden Gürtel bewegen."
          y: "Es kann einen LKW mit einer Hand hochheben.\nEs nutzt die Kraft, um anderen bei der Arbeit zu helfen."
        es:
          x: "Su musculoso cuerpo es tan fuerte que usa un cinto\nantifuerza para controlar sus movimientos."
          y: "Puede levantar un gran camión con una mano. Utiliza\nsu fuerza para ayudar a la gente."
        ko:
          x: "엄청나게 강한 육체를 지녔기 때문에\n파워 세이브 벨트를 차서\n힘을 제어하고 있다."
          y: "한 손으로 덤프트럭을 들어 올린다.\n파워를 살려서 사람 대신\n힘쓰는 일을 돕는 포켓몬이다."
