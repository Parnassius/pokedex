      hidden_ability: prankster
      descriptions:
        jp_kana:
          x: "どうくつの　くらやみに　ひそむ。\nほうせきを　たべているうちに\nめが　ほうせきに　なってしまった。"
          y: "くらい　どうくつに　すみかを　つくり\nするどい　ツメを　つかって\nほうせきを　ほりだしては　たべる。"
        jp_kanji:
          x: "洞窟の　暗闇に　潜む。\n宝石を　食べているうちに\n目が　宝石に　なってしまった。"
          y: "暗い　洞窟に　住処を　作り\n鋭い　ツメを　使って\n宝石を　掘り出しては　食べる。"
        en:
          x: "It hides in the darkness of caves. Its diet of gems\nhas transformed its eyes into gemstones."
          y: "It dwells in the darkness of caves. It uses its sharp\nclaws to dig up gems to nourish itself."
        fr:
          x: "À force de manger des gemmes, les yeux de ce\nPokémon des grottes obscures sont devenus des\njoyaux."
          y: "Ce Pokémon vit dans les grottes obscures et mange\ndes gemmes qu’il déterre avec ses griffes acérées."
        it:
          x: "Si cela nell’oscurità delle caverne. Si nutre di gemme\ne per questo i suoi occhi sono pietre preziose."
          y: "Si costruisce la tana in grotte oscure dove con le\naffilate unghie scava gemme per poi nutrirsene."
        de:
          x: "Es versteckt sich im Dunkeln von Höhlen.\nSeine Augen sind Edelsteine."
          y: "Es haust in düsteren Höhlen, wo es mit seinen\nspitzen Klauen Edelsteine ausgräbt und verspeist."
        es:
          x: "Se oculta en cavernas oscuras. De tanto comer gemas,\nsus ojos son piedras preciosas."
          y: "Hace su guarida en cuevas oscuras. Usa sus afiladas\ngarras para desenterrar las gemas que se come."
        ko:
          x: "동굴의 어둠에 숨는다.\n보석을 먹는 사이에\n눈이 보석이 되어 버렸다."
          y: "어두운 동굴에 거처를 만들어\n예리한 손톱을 써서\n보석을 파내어 먹는다."
mawile:
  species_id: 303
