      descriptions:
        jp_kana:
          x: "どんなに　みずが　よごれた\nかわでも　てきおうして　ふえていく\nタフな　せいめいりょくの　もちぬし。"
          y: "どんな　かんきょうにも　てきおうする\nつよい　せいめいりょくの　もちぬし。\nはさんだ　えものは　はなさない。"
        jp_kanji:
          x: "どんなに　水が　汚れた\n川でも　適応して　増えていく\nタフな　生命力の　持ち主。"
          y: "どんな　環境にも　適応する\n強い　生命力の　持ち主。\n挟んだ　獲物は　離さない。"
        en:
          x: "No matter how dirty the water in the river, it will\nadapt and thrive. It has a strong will to survive."
          y: "Its hardy vitality enables it to adapt to any\nenvironment. Its pincers will never release prey."
        fr:
          x: "Sa nature robuste lui permet de prospérer dans\nn’importe quelles eaux, aussi polluées soient-elles."
          y: "Sa nature robuste lui permet de vivre sur n’importe\nquel terrain. Ses pinces ne lâchent jamais prise."
        it:
          x: "La sua grande vitalità gli permette di adattarsi e\nproliferare anche nelle acque dei fiumi più inquinati."
          y: "La sua grande vitalità gli permette di adattarsi a ogni\nhabitat. Le sue chele non rilasciano mai la preda."
        de:
          x: "Egal, wie schmutzig der Fluss ist, in dem sie leben,\nsie passen sich daran an und vermehren sich.\nSie sind hart im Nehmen."
          y: "Ein robustes Pokémon, das sich jeder Umgebung\nanpassen kann. Seine Zangen geben keine Beute frei."
        es:
          x: "Por sucio o contaminado que esté el río, se adaptan\nrápido y se multiplican. Poseen una gran fuerza vital."
          y: "Su organismo le permite adaptarse a cualquier\nentorno. Sus pinzas nunca sueltan a su presa."
        ko:
          x: "아무리 물이 더러운\n강이라도 적응해서 번식하는\n터프한 생명력의 소유자."
          y: "어떤 환경에도 적응하는\n강한 생명력의 소유자다.\n집은 먹이는 놓치지 않는다."
