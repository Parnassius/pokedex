          y: "ユクシー　エムリット　アグノムは\nおなじ　タマゴから　うまれた\nポケモンと　かんがえられている。"
        jp_kanji:
          x: "意思の神と　呼ばれている。\n湖の　底で　眠り続け\n世界の　バランスを　とっている。"
          y: "ユクシー　エムリット　アグノムは\n同じ　タマゴから　生まれた\nポケモンと　考えられている。"
        en:
          x: "Known as “The Being of Willpower.” It sleeps at the\nbottom of a lake to keep the world in balance."
          y: "It is thought that Uxie, Mesprit, and Azelf all came\nfrom the same egg."
        fr:
          x: "On l’appelle « être de la volonté ». Il dort au fond\nd’un lac pour maintenir l’équilibre du monde."
          y: "On raconte que Créhelf, Créfollet et Créfadet\nproviennent du même Œuf."
        it:
          x: "Detto “Essere della volontà”. Dorme sul fondo di\nun lago per mantenere il mondo in equilibrio."
          y: "Pare che Uxie, Mesprit e Azelf abbiano avuto origine\ndallo stesso uovo."
        de:
          x: "„Das starke Wesen“. Es schläft auf dem Grund\neines Sees und hält so die Welt in Balance."
          y: "Man glaubt, dass Selfe, Vesprit und Tobutz alle\naus demselben Ei kamen."
        es:
          x: "Se le conoce como el Ser de la Voluntad. Duerme en\nel fondo de un lago para equilibrar el mundo."
          y: "Se cree que Uxie, Mesprit y Azelf provienen del mismo\nhuevo."
        ko:
          x: "의지의 신이라 불리고 있다.\n호수의 밑바닥에서 계속 잠을 자며\n세계의 균형을 지키고 있다."
          y: "유크시, 엠라이트, 아그놈은\n같은 알에서 태어난\n포켓몬이라 여겨지고 있다."
