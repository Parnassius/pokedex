        jp_kana:
          x: "はれた　ひに　ねている　リーフィアは\nこうごうせいを　して　きれいな\nくうきを　つくりだしているのだ。"
          y: "しょくぶつのように　こうごうせいを\nするため　リーフィアの　まわりは\nすんだ　くうきに　つつまれている。"
        jp_kanji:
          x: "晴れた　日に　寝ている　リーフィアは\n光合成を　して　きれいな　空気を\n作り出しているのだ。"
          y: "植物のように　光合成を　するため\nリーフィアの　まわりは\n澄んだ　空気に　包まれている。"
        en:
          x: "When you see Leafeon asleep in a patch of\nsunshine, you’ll know it is using photosynthesis\nto produce clean air."
          y: "Just like a plant, it uses photosynthesis. As a result,\nit is always enveloped in clear air."
        fr:
          x: "Un Phyllali qui dort par beau temps produit un air frais\net pur par photosynthèse."
          y: "Il utilise la photosynthèse comme une plante.\nC’est pourquoi il est toujours entouré d’air pur."
        it:
          x: "Nelle belle giornate si sdraia al sole e usa la\nfotosintesi, producendo aria pulita."
          y: "Usa la fotosintesi, proprio come una pianta.\nPertanto è sempre circondato da aria pulita."
        de:
          x: "An klaren Tagen erzeugt Folipurba saubere Luft,\nindem es Photosynthese betreibt."
          y: "Genau wie eine Pflanze führt es die Photosynthese\naus. Deshalb ist es ständig von reiner Luft umgeben."
        es:
          x: "En días soleados duerme y hace la fotosíntesis,\nemitiendo aire puro a su alrededor."
          y: "Al igual que una planta, hace la fotosíntesis. Como\nconsecuencia, siempre está rodeado de aire puro."
        ko:
          x: "맑은 날에 잠든 리피아는\n광합성을 해서 깨끗한\n공기를 만들고 있다."
          y: "식물처럼 광합성을 하기\n때문에 리피아의 주위는\n맑은 공기로 둘러싸여 있다."
