          y: "くさった　かいそうに　そっくり。\nてきの　めを　ごまかしながら\nしんかする　ちからを　たくわえる。"
        jp_kanji:
          x: "腐った　海藻に　擬態する。\n気づかずに　近寄ってきた　獲物に\n毒液を　浴びせて　しとめる。"
          y: "腐った　海藻に　そっくり。\n敵の　目を　ごまかしながら\n進化する　力を　蓄える。"
        en:
          x: "Camouflaged as rotten kelp, they spray\nliquid poison on prey that approaches\nunawares and then finish it off."
          y: "It looks just like rotten kelp. It hides from foes\nwhile storing up power for its evolution."
        fr:
          x: "Il se cache parmi les algues en décomposition pour\nmieux approcher ses proies, qu’il achève en les\naspergeant de poison."
          y: "Sa ressemblance avec le varech pourri est\nconfondante. Il se soustrait à l’attention de\nses ennemis en attendant de pouvoir évoluer."
        it:
          x: "Si mimetizza assumendo l’aspetto della vegetazione\nmarina in decomposizione. Spruzza sulle prede ignare\nun liquido velenoso per poi finirle."
          y: "Il suo aspetto ricorda la vegetazione marina in\ndecomposizione. Sfugge ai nemici mimetizzandosi e\nresta nascosto accumulando energie per l’evoluzione."
        de:
          x: "Als verfaulter Seetang getarnt, lauert es auf Beute und\nbespritzt alles und jeden, der sich ahnungslos nähert,\nmit flüssigem Gift, bevor es ihm den Rest gibt."
          y: "Mit seinem an verfaulten Seetang erinnernden\nAussehen führt es den Gegner in die Irre, während\nes selbst Energie zur Weiterentwicklung speichert."
        es:
          x: "Adopta la apariencia de algas podridas y lanza un\nlíquido venenoso a las presas desprevenidas que\npasan cerca."
          y: "Es idéntico a un alga podrida. Mientras burla al\nenemigo, acumula energía para evolucionar."
        ko:
          x: "썩은 해조로 위장한다.\n눈치채지 못하고 가까이 다가온\n사냥감에 독액을 끼얹어 잡는다."
          y: "썩은 해조와 똑같이 생겼다.\n적의 눈을 속이며\n진화할 힘을 비축한다."
dragalge:
  species_id: 691
  names:
    jp_kana: ドラミドロ
    jp_kanji: ドラミドロ
    en: Dragalge
    fr: Kravarech
    it: Dragalge
    de: Tandrak
    es: Dragalge
    ko: 드래캄
