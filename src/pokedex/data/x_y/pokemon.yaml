      hidden_ability: insomnia
      descriptions:
        jp_kana:
          x: "じょうぶつできない　たましいを\nかぼちゃの　からだに　いれている。\nひぐれと　ともに　うごきはじめる。"
          y: "さまよう　たましいを　じょうぶつ\nさせるため　ししゃの　すむ　せかいへ\nはこんでいると　いわれている。"
        jp_kanji:
          x: "成仏できない　魂を\nカボチャの　体に　入れている。\n日暮れと　ともに　動きはじめる。"
          y: "さまよう　魂を　成仏させるため\n死者の　住む　世界へ\n運んでいると　言われている。"
        en:
          x: "The pumpkin body is inhabited by a spirit\ntrapped in this world. As the sun sets,\nit becomes restless and active."
          y: "It is said to carry wandering spirits\nto the place where they belong\nso they can move on."
        fr:
          x: "Ce Pokémon est né du mariage d’un esprit piégé\ndans le monde des vivants et d’une citrouille.\nIl commence à s’animer au coucher du soleil."
          y: "Il paraît qu’il accompagne les âmes des défunts\njusque dans l’au-delà, pour qu’elles puissent goûter\nau repos éternel."
        it:
          x: "Pokémon nato quando uno spirito inquieto è entrato\nin una zucca. Si attiva dopo il calar del sole."
          y: "Si dice che aiuti le anime smarrite a ritrovare\nil cammino."
        de:
          x: "Es entsteht aus der Vereinigung einer in der Welt\nder Lebenden gefangenen Seele mit einem Kürbis.\nEs wird erst nach Sonnenuntergang aktiv."
          y: "Man sagt, es führe verlorene Seelen dem Ende ihres\nrastlosen irdischen Wandelns entgegen und geleite sie\nsicher ins Jenseits."
        es:
          x: "En el interior de la calabaza reside un espíritu que ha\npermanecido atrapado en este mundo. Entra en acción\nal caer la noche."
          y: "Se dice que este Pokémon se dedica a guiar las almas\nerrantes al otro mundo para que así puedan descansar\nen paz durante toda la eternidad."
        ko:
          x: "성불하지 못한 혼을\n호박으로 된 몸속에 담고 있다.\n해가 지면 활동하기 시작한다."
          y: "떠도는 영혼을 성불시키기 위해\n죽은 자들이 사는 세계로\n옮기고 있다고 전해진다."
