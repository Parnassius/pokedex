      descriptions:
        jp_kana:
          x: "なくときは　ナイフのような　うでを\nむねの　まえで　こうささせる。\nそっきょうで　メロディを　つくる。"
          y: "かんじょうを　メロディで　あらわす。\nメロディの　ほうそくせいを\nがくしゃたちが　けんきゅうしている。"
        jp_kanji:
          x: "鳴くときは　ナイフのような　腕を\n胸の　前で　交差させる。\n即興で　メロディを　作る。"
          y: "感情を　メロディで　表す。\nメロディの　法則性を\n学者たちが　研究している。"
        en:
          x: "It crosses its knifelike arms in front of its chest\nwhen it cries. It can compose melodies ad lib."
          y: "It signals its emotions with its melodies. Scientists\nare studying these melodic patterns."
        fr:
          x: "Il croise ses bras affûtés devant son torse pour crier.\nIl compose tout un tas de mélodies."
          y: "Il exprime ses émotions par des mélodies.\nLes scientifiques étudient actuellement leur structure."
        it:
          x: "Quando canta tiene le zampe incrociate al petto.\nSa improvvisare melodie."
          y: "Esprime le proprie emozioni con melodie, che sono\noggetto di studio di molti scienziati."
        de:
          x: "Wenn es ruft, verschränkt es seine messerartigen\nArme vor der Brust. Es komponiert aus dem Stegreif."
          y: "Über seine Melodien teilt es seine Gefühle mit.\nWissenschaftler untersuchen das Muster der Melodien."
        es:
          x: "Cuando llora, cruza sus brazos con forma de cuchillo.\nPuede improvisar melodías."
          y: "Los científicos tratan de estudiar sus melodías, que\nson reflejo de sus emociones."
        ko:
          x: "울 때는 나이프 같은 팔을\n가슴 앞에서 교차시킨다.\n즉흥으로 멜로디를 만든다."
          y: "감정을 멜로디로 나타낸다.\n멜로디의 법칙성을\n학자들이 연구하고 있다."
shinx:
