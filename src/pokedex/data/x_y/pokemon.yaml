        jp_kana:
          x: "しにわかれた　ははおやの　ほねを\nあたまに　かぶっている。さびしいとき\nおおごえで　なくという。"
          y: "しにわかれた　ははおやの　ホネを\nいつも　かぶっているので\nすがおが　どんなふうか　わからない。"
        jp_kanji:
          x: "死に別れた　母親の　骨を\n頭に　覆っている。寂しいとき\n大声で　泣くという。"
          y: "死に別れた　母親の　骨を\nいつも　覆っているので\n素顔が　どんなふうか　わからない。"
        en:
          x: "It wears the skull of its dead mother on its head.\nWhen it becomes lonesome, it is said to cry loudly."
          y: "It always wears the skull of its dead mother, so no\none has any idea what its hidden face looks like."
        fr:
          x: "Ce Pokémon porte le crâne de sa défunte mère sur\nsa tête. On raconte qu’il se met à pleurer dès qu’il\nse retrouve seul."
          y: "Il porte constamment le crâne de sa mère.\nPersonne ne sait à quoi il ressemble sans ce crâne."
        it:
          x: "Indossa il teschio della madre morta come un casco.\nQuando si sente solo lancia urla strazianti."
          y: "Indossa sempre il teschio della mamma scomparsa:\nnessuno l’ha mai potuto vedere in faccia."
        de:
          x: "Es trägt den Schädel seiner verstorbenen Mutter auf\nseinem Kopf. Fühlt es sich einsam, soll es laut weinen."
          y: "Es trägt immer den Schädel seiner verstorbenen\nMutter. Darum weiß niemand, wie sein Gesicht\naussieht."
        es:
          x: "Lleva puesto el cráneo de su madre. Cuando se siente\nsolo se pone a gritar muy fuerte."
          y: "Siempre lleva la calavera de su difunta madre, así que\nnadie sabe cómo es su cara oculta."
        ko:
          x: "죽은 어미의 해골을\n머리에 쓰고 있다. 외로울 때는\n큰 소리로 운다고 한다."
          y: "죽은 어미의 해골을\n항상 뒤집어쓰고 있어서\n얼굴이 어떻게 생겼는지 모른다."
marowak:
