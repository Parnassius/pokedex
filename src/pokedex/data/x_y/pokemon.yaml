          y: "ツノの　まがりぐあいが　まわりの\nくうきの　ながれを　びみょうにかえ\nふしぎな　くうかんを　つくりだす。"
        jp_kanji:
          x: "ツノを　見つめていると　輪っかの\n中心に　吸いこまれそうな\n不思議な　気分に　なってしまう。"
          y: "ツノの　曲がり具合が　まわりの\n空気の　流れを　微妙に　変え\n不思議な　空間を　作り出す。"
        en:
          x: "Staring at its antlers creates an odd sensation\nas if one were being drawn into their centers."
          y: "The curved antlers subtly change the flow of air to\ncreate a strange space where reality is distorted."
        fr:
          x: "Quiconque observe ses bois ressent une sensation\nétrange, comme si leur centre l’attirait."
          y: "Ses bois tordus changent le flot de l’air et créent\nune distorsion spatiale dans la réalité."
        it:
          x: "Chi fissa le sue corna riceve una strana sensazione,\nquasi come se venisse risucchiato."
          y: "Le corna ricurve modificano le correnti d’aria, creando\nuna strana zona di distorsione della realtà."
        de:
          x: "Starrt man auf sein Geweih, bekommt man\ndas seltsame Gefühl, in dessen Mitte\ngezogen zu werden."
          y: "Sein gebogenes Geweih generiert via Luftänderung\neinen Raum, in dem die Wirklichkeit verzerrt wird."
        es:
          x: "Mirar a su cornamenta provoca una extraña sensación\nde pérdida de equilibrio."
          y: "Su cornamenta cambia el flujo del aire para crear un\nespacio de realidad distorsionada."
        ko:
          x: "뿔을 응시하고 있으면 원의\n중심에 빨려 들어가는 것 같은\n이상한 기분이 든다."
          y: "뿔의 휘어진 상태가 주변\n공기의 흐름을 미묘하게 바꿔서\n이상한 공간을 만들어낸다."
