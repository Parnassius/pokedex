          x: "Even though its body is extremely skinny, it is\nblindingly fast when catching its prey."
          y: "Its bud looks like a human face. Because of the\nbud, it is rumored to be a type of legendary\nmandrake plant."
        fr:
          x: "Même si son corps est très frêle, ce Pokémon est\nextrêmement rapide quand il attaque ses adversaires."
          y: "Son bourgeon ressemble à un visage humain.\nSelon la légende, Chétiflor serait un type de\nmandragore légendaire."
        it:
          x: "Sebbene abbia un corpo magrissimo, sa essere\nmolto rapido quando si scaglia sulla preda."
          y: "Il bocciolo somigliante a un volto umano fa ritenere\nche si tratti di un leggendario esemplare di\nmandragola."
        de:
          x: "Obwohl sein Körper sehr schmal ist,\nschnappt es blitzschnell nach Beute."
          y: "Seine Knospe ähnelt einem Menschengesicht.\nMan sagt, dass es mit der legendären Mandragora\nverwandt ist."
        es:
          x: "Aunque su cuerpo es extremadamente delgado, es\nmuy rápido a la hora de capturar sus presas."
          y: "Tiene cara de persona. Por el aspecto que tiene se ha\ncomentado que podría ser algún tipo de mandrágora\nlegendaria."
        ko:
          x: "홀쭉한 체격이지만\n먹이를 잡을 때의 움직임은\n눈에 보이지 않을 정도로 빠르다."
          y: "사람 얼굴 같은 봉오리 때문에\n전설의 꽃 만드라고라의 일종이\n아닐까 하는 소문이 돌고 있다."
