      descriptions:
        jp_kana:
          x: "たいようの　ひかりを　あびると\nいつもよりも　すばやく　うごける。\nてよりも　ツルを　うまくつかう。"
          y: "しっぽで　たいようを　あびて\nこうごうせいを　する。げんきを\nなくすと　しっぽが　たれさがる。"
        jp_kanji:
          x: "太陽の　光を　浴びると\nいつもよりも　素早く　動ける。\n手よりも　ツルを　うまく使う。"
          y: "尻尾で　太陽の光を　浴びて\n光合成を　する。元気を　なくすと\n尻尾が　たれさがる。"
        en:
          x: "Being exposed to sunlight makes its movements\nswifter. It uses vines more adeptly than its hands."
          y: "They photosynthesize by bathing their tails in\nsunlight. When they are not feeling well, their\ntails droop."
        fr:
          x: "La lumière du soleil augmente fortement son agilité.\nSes lianes sont plus habiles que ses mains."
          y: "Il laisse sa queue prendre le soleil pour sa\nphotosynthèse. Quand il est malade, sa queue pend\ntristement."
        it:
          x: "Quando è esposto alla luce solare può muoversi\npiù velocemente. Usa le sue liane meglio dei suoi\nstessi arti."
          y: "Assorbe i raggi solari dalla coda per operare la\nfotosintesi. Quando non sta bene, la sua coda si\naffloscia."
        de:
          x: "Im Sonnenlicht erhöht sich das Tempo seiner\nBewegungen. Es ist mit seinen Schlingen\ngeschickter als mit den Händen."
          y: "Fängt mit dem Schweif Sonnenlicht auf,\num Photosynthese zu betreiben. Fehlt ihm\ndie Kraft, hängt sein Schweif schlaff herab."
        es:
          x: "Cuando recibe los rayos de sol, se mueve mucho más\nrápido que de costumbre. Usa mejor sus lianas que\nsus manos."
          y: "Sintetiza la luz del sol que recoge con su cola. Esta\nse le queda abatida cuando le fallan las energías."
        ko:
          x: "태양의 빛을 받으면\n평소보다 빨리 움직일 수 있다.\n손보다 덩굴을 잘 사용한다."
          y: "꼬리로 태양의 빛을 받아\n광합성한다. 기운이\n빠지면 꼬리가 축 늘어진다."
servine:
