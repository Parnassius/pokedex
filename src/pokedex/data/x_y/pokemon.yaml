          y: "なわで　しばった　たいりくを\nひっぱって　うごかしたという\nでんせつが　のこされている。"
        jp_kanji:
          x: "特殊な　氷山や　岩石　マグマから\n自分の　姿に　似た　ポケモンを\nつくったと　言われる。"
          y: "縄で　縛った　大陸を\n引っ張って　動かしたという\n伝説が　残されている。"
