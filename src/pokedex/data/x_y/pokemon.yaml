    combee:
      form_id: 0
      base_stats:
        hp: 30
        attack: 30
        defense: 42
        special_attack: 30
        special_defense: 42
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - honey_gather
      hidden_ability: hustle
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          x: "うまれたときから　３びき　いっしょ。\nビークインに　よろこんでもらうため\nいつも　はなのミツを　あつめている。"
          y: "あつめた　ミツを　すみかに　はこぶ。\nよるには　たくさんの　ミツハニーが\nかさなって　はちのすになり　ねむる。"
        jp_kanji:
          x: "生まれたときから　３匹　一緒。\nビークインに　喜んでもらうため\nいつも　花のミツを　集めている。"
          y: "集めた　ミツを　住処に　運ぶ。\n夜には　たくさんの　ミツハニーが\n重なって　ハチの巣になり　眠る。"
        en:
          x: "The trio is together from birth. It constantly gathers\nhoney from flowers to please Vespiquen."
          y: "It collects and delivers honey to its colony.\nAt night, they cluster to form a beehive and sleep."
        fr:
          x: "Ce trio inséparable depuis la naissance récolte du miel\npour satisfaire Apireine."
          y: "Il récolte le nectar et l’amène à la colonie.\nLa nuit, les Pokémon de cette espèce s’assemblent\npour bâtir une ruche et s’endormir."
        it:
          x: "Il trio è insieme dalla nascita. È sempre impegnato\na portare il nettare dei fiori a Vespiquen."
          y: "Porta il nettare raccolto dai suoi simili. Di notte si\nriuniscono per formare un alveare e dormire."
        de:
          x: "Dieses Trio ist von Geburt an zusammen.\nFleißig bringt es Blütenhonig zu Honweisel."
          y: "Es sammelt Honig und bringt ihn in seine Kolonie.\nNachts bilden sie einen Bienenstock und schlafen."
        es:
          x: "El trío se forma al nacer y se pasa la vida recogiendo\nmiel de las flores para satisfacer a Vespiquen."
          y: "Almacenan miel en su colonia. Por la noche, se apiñan\npara formar una colmena y dormir."
        ko:
          x: "태어났을 때부터 3마리가 함께한다.\n비퀸을 기쁘게 하기 위해\n항상 꽃의 꿀을 모으고 있다."
          y: "모은 꿀을 거처로 운반한다.\n밤에는 많은 세꿀버리가\n겹쳐져 벌집이 되어 잠잔다."
vespiquen:
  species_id: 416
  names:
    jp_kana: ビークイン
    jp_kanji: ビークイン
    en: Vespiquen
    fr: Apireine
    it: Vespiquen
    de: Honweisel
    es: Vespiquen
    ko: 비퀸
