          y: "こおりの　けっしょうで　できた\nくさりをつかい　えものを　からめとり\nマイナス１００どに　こおらせる。"
        jp_kanji:
          x: "雪雲の　中で　生まれた。\n氷の　結晶で　できた　鎖で\n獲物を　捕まえる。"
          y: "氷の　結晶で　できた\n鎖を使い　獲物を　絡め取り\nマイナス１００度に　凍らせる。"
        en:
          x: "They are born in snow clouds. They use chains\nmade of ice crystals to capture prey."
          y: "They are composed of ice crystals. They capture\nprey with chains of ice, freezing the prey at\n-148 degrees Fahrenheit."
        fr:
          x: "Né d’un nuage neigeux, il attrape ses proies à l’aide\nde sa chaîne faite de cristaux de givre."
          y: "Il attrape ses proies à l’aide de sa chaîne faite de\ncristaux de givre et les gèle à près de -100 °C."
        it:
          x: "È nato nelle nuvole cariche di neve. Cattura le prede\ncon una catena fatta di cristalli di ghiaccio."
          y: "Cattura le sue prede con catene fatte di cristalli di\nghiaccio, poi le congela a una temperatura di -100 °C."
        de:
          x: "Es fängt seine Beute mit Ketten, die sich aus\nEiskristallen zusammensetzen. Entstanden ist es\naus einer Schneewolke."
          y: "Es fängt seine Beute mit Ketten aus Eiskristallen\nund kühlt sie auf eine Temperatur von -100 °C ab."
        es:
          x: "Nació entre nubes de nieve. Atrapa a sus presas con\nuna cadena hecha de hielo cristalizado."
          y: "Usa cadenas de cristales de hielo para atrapar a\nsus presas y congelarlas a temperaturas de hasta\n-100 °C."
        ko:
          x: "눈구름 속에서 태어났다.\n얼음 결정으로 만들어진\n사슬로 먹이를 잡는다."
          y: "얼음 결정으로 만들어진\n사슬로 먹이를 휘감아 잡고\n마이너스 100도로 얼린다."
shelmet:
