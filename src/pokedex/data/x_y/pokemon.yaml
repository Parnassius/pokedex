          y: "こどもに　エサを　わけあたえるとき\nおやが　かみくだき　やわらかくした\nエサを　はきもどして　あたえる。"
        jp_kanji:
          x: "メスなので　性格は　温厚。\n口から　出す　超音波は\n相手を　まどわす　力がある。"
          y: "子供に　エサを　分け与えるとき\n親が　かみくだき　やわらかくした\nエサを　吐き戻して　与える。"
