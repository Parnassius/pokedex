        - normal
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          x: "きおんや　しつどの　へんかが\nからだの　さいぼうに　えいきょうして\nすがたを　かえる　ポケモン。"
          y: "しぜんの　ちからを　うけて　たいよう\nあまみず　ゆきぐもと　すがたを\nかえる　のうりょくを　もっている。"
        jp_kanji:
          x: "気温や　湿度の　変化が\n体の　細胞に　影響して\n姿を　変える　ポケモン。"
          y: "自然の　力を　受けて\n太陽　雨水　雪雲と　姿を　変える\n能力を　持っている。"
        en:
          x: "This Pokémon can change its cells, taking different\nforms based on the temperature and humidity."
          y: "It has the ability to change its form into the sun,\nthe rain, or a snow cloud, depending on\nthe weather."
        fr:
          x: "Les variations de température ou d’humidité affectent\nsa structure cellulaire et son apparence."
          y: "Morphéo a la capacité de changer son apparence\nen fonction du temps. Il utilise la force de la nature\npour combattre."
        it:
          x: "Il suo aspetto varia con l’umidità e la temperatura,\nche influenzano la sua struttura molecolare."
          y: "Ha la capacità di trasformarsi in sole, pioggia o in una\nnuvola di neve, secondo le condizioni atmosferiche."
        de:
          x: "Formeo kann seine Gestalt ändern. Seine Zellen\nreagieren auf Temperaturschwankungen und\nFeuchtigkeit."
          y: "Es verfügt über die Eigenschaft, seinen Körper\nin die Sonne, den Regen oder eine Schneewolke,\nje nach Wetter, zu verändern."
        es:
          x: "Sus células son muy sensibles a los cambios de\ntemperatura y humedad y se adapta sin problema."
          y: "Tiene la habilidad de cambiar y adaptarse al tiempo.\nSegún el clima, se transformará en sol, nubarrones\nde lluvia o nieve."
        ko:
          x: "기온이나 습도의 변화가\n몸의 세포에 영향을 주어\n모습을 바꾸는 포켓몬이다."
          y: "자연의 힘을 받아 태양,\n빗물, 설운으로 모습을\n바꾸는 능력을 가지고 있다."
