          y: "It stores energy by sleeping at underwater depths\nat which no other life-forms can survive."
        fr:
          x: "On dit qu’il se cache dans les grottes sous-marines.\nIl peut créer des tourbillons en bâillant."
          y: "Il emmagasine de l’énergie en restant dans les fonds\nmarins, là où rien d’autre ne peut survivre."
        it:
          x: "Si dice che si nasconda in grotte sottacqua. Il suo\nsbadiglio può provocare dei vortici."
          y: "Accumula energia dormendo sott’acqua a profondità\nproibitive per ogni altra forma di vita."
        de:
          x: "Man sagt, es hause in Unterwasserhöhlen. Es kann\nmächtige Strudel generieren, wenn es gähnt."
          y: "Kein anderes Lebewesen kann in den Tiefen existieren,\nin denen es schläft und so Energie speichert."
        es:
          x: "Dicen que suele esconderse en cuevas submarinas.\nPuede crear torbellinos al bostezar."
          y: "Almacena energía durmiendo en las profundidades\nsubmarinas, allá donde no llegan otros seres."
        ko:
          x: "평소에는 해저동굴에\n몸을 숨기고 있는 것 같다. 하품으로\n소용돌이를 발생시킨다."
          y: "어떤 생물도 접근할 수 없는\n깊은 해저에서 자면서\n힘을 비축하고 있다고 한다."
phanpy:
