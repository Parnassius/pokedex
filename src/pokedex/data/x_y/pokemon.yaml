          y: "たたかいのときに　だす　うなりごえは\nまるで　じしんの　ように\nじめんを　グラグラと　ゆらす。"
        jp_kanji:
          x: "バクオングの　遠ぼえは　１０キロ\n先まで　届く。体中の　穴から\nさまざまな　音を　出す。"
          y: "戦いのときに　出す　うなり声は\nまるで　地震の　ように\n地面を　グラグラと　揺らす。"
        en:
          x: "Its howls can be heard over six miles away. It emits\nall sorts of noises from the ports on its body."
          y: "Its roar in battle shakes the ground like a\ntremor--or like an earthquake has struck."
        fr:
          x: "Son hurlement s’entend à 10 km à la ronde.\nSes orifices émettent toutes sortes de bruits."
          y: "Au combat, son hurlement fait trembler le sol comme\nun séisme."
        it:
          x: "Le sue urla si sentono a 10 km di distanza. Emette\ndiversi suoni dalle numerose aperture del suo corpo."
          y: "In lotta emette ululati che possono veramente far\ntremare la terra alla stregua di un terremoto."
        de:
          x: "Sein Heulen hört man in 10 km Entfernung.\nEs gibt alle Arten von Geräuschen von sich."
          y: "Sein Grollen, das es während des Kampfs ausstößt,\nerschüttert den Boden ganz wie bei einem Erdbeben."
        es:
          x: "Su aullido se puede oír a 10 km. Emite todo tipo de\nsonidos desde los tubos de su cuerpo."
          y: "El bramido que emite al atacar puede sacudir la tierra\ncon la intensidad de un terremoto."
        ko:
          x: "폭음룡이 짖는 소리는 10km\n전방까지 닿는다. 몸 곳곳의\n구멍에서 갖가지 소리를 낸다."
          y: "싸울 때 내는 으르렁거리는 소리는\n마치 지진처럼\n땅을 쿵쿵 울린다."
makuhita:
