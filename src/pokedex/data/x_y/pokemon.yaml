          y: "しゅうだんで　あらわれることもある。\nもうスピードで　とびまわり\nおしりの　どくばりで　さしまくる。"
        jp_kanji:
          x: "両手と　お尻にある　３本の　毒針で\n相手を　刺して　刺して\n刺しまくって　攻撃する。"
          y: "集団で　現れることもある。\n猛スピードで　飛び回り\nお尻の　毒針で　刺しまくる。"
        en:
          x: "It has three poisonous stingers on its forelegs and\nits tail. They are used to jab its enemy repeatedly."
          y: "May appear in a swarm. Flies at violent speeds,\nall the while stabbing with the toxic stinger on\nits rear."
        fr:
          x: "Il se sert de ses trois aiguillons empoisonnés pour\nattaquer sans relâche ses adversaires."
          y: "On le voit souvent voler dans un essaim. Il vole très\nrapidement, piquant sans cesse ses adversaires de\nson dard toxique."
        it:
          x: "Possiede tre aculei velenosi sulle zampe anteriori e\nsull’addome con cui punge i nemici ripetutamente."
          y: "Si può trovare anche in sciami. Vola a incredibili\nvelocità, colpendo con il velenoso pungiglione\nsituato sull’addome."
        de:
          x: "Dieses Pokémon verfügt über drei Giftstachel.\nEs kann seine Gegner damit wiederholt stechen."
          y: "Es kann in Schwärmen auftauchen. Während seines\nrasanten Fluges sticht es mit dem Giftstachel\nan seinem Hinterteil zu."
        es:
          x: "Tiene 3 aguijones venenosos en sus patas y cola.\nSuelen pinchar a sus enemigos repetidas veces."
          y: "Puede aparecer en enjambres volando a gran\nvelocidad. Suele usar el venenoso aguijón inferior\npara atacar."
        ko:
          x: "양손과 엉덩이에 있는 3개의\n독침으로 상대를 찌르고 찌르고\n또 찌르며 공격한다."
          y: "집단으로 나타나기도 한다.\n맹렬한 스피드로 날아\n엉덩이의 독침으로 마구 찌른다."
