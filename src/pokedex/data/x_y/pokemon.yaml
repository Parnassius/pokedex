          y: "こうせんてきな　ポケモンで　じぶんの\nなわばりから　あらゆる　ポケモンを\nハサミで　つまんで　なげとばすぞ！"
        jp_kanji:
          x: "池に　住む　ほかの　ポケモンを\nハサミで　つまみ上げ　池の　外へ\n放り出してしまう　暴れん坊。"
          y: "好戦的な　ポケモンで　自分の\n縄張りから　あらゆる　ポケモンを\nハサミで　つまんで　投げ飛ばすぞ！"
        en:
          x: "It is a ruffian that uses its pincers to pick up and\ntoss out other Pokémon from its pond."
          y: "Loving to battle, this Pokémon pinches all Pokémon\nthat enter its territory with its pincers and throws\nthem out."
        fr:
          x: "C’est un voyou qui utilise ses pinces pour chasser\nles autres Pokémon hors de sa mare."
          y: "C’est un voyou qui utilise ses pinces pour chasser\nles autres Pokémon hors de son territoire."
        it:
          x: "Pokémon violento che afferra il nemico con le chele\ne lo scaraventa fuori dal suo stagno."
          y: "È un Pokémon molto bellicoso che afferra con le\nchele chiunque osi entrare nel suo territorio per\nscaraventarlo fuori."
        de:
          x: "Dieser Grobian ergreift andere Pokémon mit seinen\nScheren und wirft sie aus seinem Teich."
          y: "Dieses rauflustige Pokémon nimmt Eindringlinge\nmit seinen Scheren in die Zange und wirft sie aus\nseinem Revier."
        es:
          x: "Este malandrín usa sus pinzas para atosigar y expulsar\na los otros Pokémon que viven en su estanque."
          y: "De naturaleza violenta. Si un Pokémon se aventura\nen su territorio, lo agarra con sus tenazas y lo arroja\npor los aires."
        ko:
          x: "연못에 사는 다른 포켓몬을\n집게로 집어들어 연못 밖으로\n내던져버리는 난동꾼이다."
          y: "호전적인 포켓몬으로 자신의\n영역에서 모든 포켓몬을\n집게로 집어서 내던진다!"
