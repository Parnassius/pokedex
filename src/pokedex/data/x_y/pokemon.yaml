        en:
          x: "Within its rugged shell, its cells have begun\nchanging. The shell peels off the instant it evolves."
          y: "Its armored body makes all attacks bounce off.\nThe armor is too tough, however, making it heavy\nand somewhat sluggish."
        fr:
          x: "Ses cellules ont commencé à changer dans sa\nrobuste coquille. Il la perd en évoluant."
          y: "Son corps renforcé repousse toutes les attaques.\nCependant, le poids important de cette armure\nempêche Drackhaus de se déplacer librement."
        it:
          x: "Nella sua dura corazza le cellule hanno cominciato\na cambiare. Quando si evolve, la corazza cade."
          y: "La sua corazza è capace di respingere qualsiasi\nattacco, ma lo appesantisce, rendendolo piuttosto\npigro."
        de:
          x: "Die Zellen seines Panzers fingen an, sich zu verändern.\nEr fällt ab, sobald sich das Pokémon entwickelt."
          y: "Von seinem gepanzerten Körper prallen alle\nAngriffe ab. Die Panzerung ist jedoch zu hart,\nsodass es schwer und träge ist."
        es:
          x: "Las células han empezado a cambiar dentro de su dura\nconcha, que se separa cuando evoluciona."
          y: "La robusta capa que lo rodea repele los ataques.\nAunque es una buena protección, lo hace lento y\npesado."
        ko:
          x: "단단한 껍질 안은 세포가\n변화를 시작하고 있다. 진화하는\n순간에 껍질이 벗겨져 떨어진다."
          y: "모든 공격을 튕겨낸다.\n너무 튼튼해서 몸이 무겁기 때문에\n약간 움직임이 둔하다."
