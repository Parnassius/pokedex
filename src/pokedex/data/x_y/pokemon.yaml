          y: "テレパシーで　にんげんと　きもちを\nかよわせる。ひかりを　くっせつさせる\nうもうで　べつの　すがたに　かわる。"
        jp_kanji:
          x: "テレパシーで　気持ちを　通わせる。\n光を　屈折させる　羽毛で\n体を　包み　姿を　消す。"
          y: "テレパシーで　人間と　気持ちを\n通わせる。光を　屈折させる\n羽毛で　別の　姿に　変わる。"
