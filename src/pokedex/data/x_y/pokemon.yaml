          y: "はげしい　ずつきを　くらわせても\nふさふさの　たいもうが　ダメージを\nきゅうしゅうして　くれるのだ。"
        jp_kanji:
          x: "見境なく　突進して　頭突きを\n食らわせる。走っている　列車を\n脱線させる　破壊力。"
          y: "激しい　頭突きを　食らわせても\nふさふさの　体毛が\nダメージを　吸収して　くれるのだ。"
        en:
          x: "They charge wildly and headbutt everything.\nTheir headbutts have enough destructive force to\nderail a train."
          y: "Their fluffy fur absorbs damage, even if they strike\nfoes with a fierce headbutt."
        fr:
          x: "Il charge tout ce qui bouge sans réfléchir. Il peut faire\ndérailler un train en marche."
          y: "Son pelage fourni absorbe les chocs et lui permet\nd’asséner sans broncher le plus violent des coups\nde tête."
        it:
          x: "Sferra testate contro tutto e tutti. Ha una forza\ndistruttiva tale da far deragliare un treno in corsa."
          y: "Anche se riceve una violenta testata, la folta pelliccia\nminimizza l’impatto."
        de:
          x: "Rammt seine Gegner ohne Rücksicht auf Verluste\nmit dem Kopf und vermag damit sogar Züge\nzum Entgleisen zu bringen."
          y: "Sein zotteliges Fell fängt selbst nach einer seiner\nwuchtigen Rempelattacken einiges an Schaden ab."
        es:
          x: "Embiste con la cabeza sin distinción. Su potencia es\ncapaz de hacer descarrilar un tren en marcha."
          y: "Aunque encaje un cabezazo violento, su pelaje\nabsorbe el daño."
        ko:
          x: "무작정 돌진하여 박치기를\n한다. 달리고 있는 열차를\n탈선시킬 정도의 파괴력이다."
          y: "세찬 박치기를 당해도\n탐스러운 털이 데미지를\n흡수해 준다."
rufflet:
