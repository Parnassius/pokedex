          y: "どくばりは　とても　きょうりょく。\nめだつ　からだの　いろは\nあいてに　けいかいを　させるためだ。"
        jp_kanji:
          x: "森や　草地に　多く　生息。\n頭の　先に　５センチぐらいの\n小さく　鋭い　毒針を持つ。"
          y: "毒針は　とても　強力。\n目立つ　体の　色は\n相手に　警戒を　させるためだ。"
        en:
          x: "Often found in forests and grasslands.\nIt has a sharp, toxic barb of around two inches\non top of its head."
          y: "Its poison stinger is very powerful.\nIts bright-colored body is intended to\nwarn off its enemies."
        fr:
          x: "On trouve souvent ce Pokémon dans les forêts et\nles hautes herbes. L’aiguillon de 5 cm sur sa tête\ncontient un venin très toxique."
          y: "Son aiguillon empoisonné est très dangereux.\nSon corps est coloré afin de repousser ses ennemis."
        it:
          x: "Vive soprattutto nei boschi e nei prati. Sul capo ha\nun affilato e velenoso pungiglione lungo 5 cm."
          y: "Ha un pungiglione molto velenoso. La vivace\ncolorazione del suo corpo è un avvertimento per i\nnemici."
        de:
          x: "Es lebt bevorzugt in Wäldern und in hohem Gras.\nAuf dem Kopf trägt es einen circa 5 cm langen,\nspitzen, giftigen Stachel."
          y: "Sein Giftstachel ist gefährlich. Sein hellleuchtender\nKörper soll Feinde abschrecken."
        es:
          x: "Suele habitar bosques y praderas. Tiene un afilado y\nvenenoso aguijón de unos 5 cm encima de la cabeza."
          y: "Su venenoso aguijón es muy potente y su colorido\ncuerpo hace que los enemigos huyan."
        ko:
          x: "숲이나 풀밭에 많이 서식한다.\n머리끝에 5cm 정도의\n작고 날카로운 독침을 지니고 있다."
          y: "독침이 매우 강력하다.\n눈에 띄는 몸의 색깔은\n상대방을 경계시키기 위해서다."
