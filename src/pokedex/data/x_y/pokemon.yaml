          y: "翼は　小さく　まだ　飛べない。\nバルジーナが　集めてきた\nガイコツで　お尻を　守っている。"
        en:
          x: "Its wings are too tiny to allow it to fly. As the time\napproaches for it to evolve, it discards the bones\nit was wearing."
          y: "Their wings are too tiny to allow them to fly.\nThey guard their posteriors with bones that were\ngathered by Mandibuzz."
        fr:
          x: "Ses ailes sont trop petites pour lui permettre de\nvoler. Quand l’évolution approche, il sort lui-même\ndu crâne qui le protège."
          y: "Ses ailes sont trop petites pour voler. Il protège son\ncroupion avec un crâne apporté par un Vaututrice."
        it:
          x: "Le piccole ali non gli consentono di volare. Quando si\navvicina il momento di evolversi, si libera del teschio."
          y: "Le sue ali sono ancora piccole e non può volare.\nUsa delle ossa ricevute da Mandibuzz per riparare\nil suo bacino."
        de:
          x: "Seine Flügel sind noch zu klein zum Fliegen.\nKurz bevor es sich entwickelt, wirft es seine\nSchädelwindel ab."
          y: "Seine Flügel sind noch zu klein zum Fliegen. Ein von\nGrypheldis beschaffter Schädel schützt seinen Bürzel."
        es:
          x: "No puede volar porque sus alas son muy pequeñas.\nCuando va a evolucionar, se deshace de su calavera."
          y: "Sus pequeñas alas no le permiten volar. Usa una\ncalavera que le dio Mandibuzz para proteger sus\nposaderas."
        ko:
          x: "날개가 작아서 날지 못한다.\n진화가 가까워지면\n자기 스스로 해골을 벗어버린다."
          y: "날개는 작아서 아직 날 수 없다.\n버랜지나가 모아온\n해골로 엉덩이를 지키고 있다."
