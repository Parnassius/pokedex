      descriptions:
        jp_kana:
          x: "おもいきり　すいこんだ　くうきを\nはったつした　ふっきんを　つかって\nはきだすことで　おおごえを　だす。"
          y: "おおごえの　しょうげきはで\nトラックを　ひっくりかえしてしまう。\nあしを　ふみならして　パワーアップ。"
        jp_kanji:
          x: "思い切り　吸いこんだ　空気を\n発達した　腹筋を　使って\n吐き出すことで　大声を　出す。"
          y: "大声の　衝撃波で\nトラックを　ひっくりかえしてしまう。\n足を　踏みならして　パワーアップ。"
        en:
          x: "It shouts loudly by inhaling air, and then uses its\nwell-developed stomach muscles to exhale."
          y: "The shock waves from its cries can tip over trucks.\nIt stamps its feet to power up."
        fr:
          x: "Grâce à ses puissants muscles abdominaux, il peut\ncrier en expulsant l’air qu’il avait aspiré."
          y: "L’onde de choc provoquée par son cri peut renverser\nun camion. Il trépigne pour augmenter sa force."
        it:
          x: "Leva potenti grida inspirando tanta aria e poi\nsparandola fuori con tutta la forza degli addominali."
          y: "Le onde d’urto dei suoi versi ribaltano anche i\ncamion. Pesta i piedi per accumulare energia."
        de:
          x: "Es atmet tief ein und nutzt seine Bauchmuskeln,\num die Luft in einem gewaltigen Schrei auszustoßen."
          y: "Die Schockwellen, die durch sein Rufen entstehen,\nkönnen einen LKW umkippen."
        es:
          x: "Aspira profundamente y luego, usando sus fuertes\nabdominales, suelta un potente vozarrón."
          y: "Las ondas de sus gritos pueden voltear un camión.\nPatea el suelo para ganar potencia."
        ko:
          x: "마음껏 들이마신 공기를\n발달한 복근을 써서\n토해내 큰 소리를 낸다."
          y: "큰 소리의 충격파로\n트럭을 뒤집어 버린다.\n발을 쿵쾅거리며 파워를 올린다."
exploud:
