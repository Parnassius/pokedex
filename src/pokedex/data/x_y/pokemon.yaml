          x: "３ぼんのしっぽで　じぶんを　たたき\nたたかう　きもちを　たかめると\nぜんそくりょくで　つっこんでくる。"
          y: "たいあたりしてくるとき\n３ぼんの　しっぽで　じぶんの\nからだを　ピシピシと　たたく。"
        jp_kanji:
          x: "３本の　尻尾で　自分を　たたき\n戦う　気持ちを　高めると\n全速力で　突っこんでくる。"
          y: "体当たりしてくるとき\n３本の　尻尾で　自分の　体を\nピシピシと　たたく。"
        en:
          x: "After heightening its will to fight by whipping itself\nwith its three tails, it charges at full speed."
          y: "When it is about to tackle, it whips its body\nrepeatedly with its three long tails."
        fr:
          x: "Après s’être fouetté avec ses trois queues pour\naugmenter son agressivité, il charge."
          y: "Juste avant d’utiliser Charge, ce Pokémon agite\nfrénétiquement ses trois grandes queues."
        it:
          x: "Prima si frusta con le tre code per caricarsi, poi\nparte all’attacco a tutta velocità."
          y: "Prima di usare Azione si frusta il corpo ripetutamente\ncon le tre lunghe code."
        de:
          x: "Es kämpft mit vollem Einsatz, nachdem es sich\nmit seinen drei Schweifen auspeitschte,\num sich anzustacheln."
          y: "Wenn es Tackle einsetzt, geißelt es mit seinen\ndrei Schwänzen wiederholt seinen Körper."
        es:
          x: "Después de animarse a luchar fustigándose con sus\ntres colas, carga a toda velocidad."
          y: "Cuando va a usar Placaje, se azota repetidas veces\ncon las tres colas que tiene."
        ko:
          x: "3개의 꼬리로 자신을 때려서\n투지가 끓어오르면\n전속력으로 돌진해온다."
          y: "몸통박치기로 공격해 올 때\n3개의 꼬리로 자신의\n몸을 가차 없이 때린다."
