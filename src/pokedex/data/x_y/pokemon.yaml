        jp_kana:
          x: "からだの　なかの　ほのおを　もやして\nあたまや　しっぽから　ひのこを\nまきちらせて　てきを　こがす。"
          y: "こうふんすると　あたまや　しっぽから\nひのこが　まいあがって　あつくなる。\nなぜか　あまいものが　だいこうぶつ。"
        jp_kanji:
          x: "体の　中の　炎を　燃やして\n頭や　尻尾から　火の粉を\nまき散らせて　敵を　焦がす。"
          y: "興奮すると　頭や　尻尾から\n火の粉が　舞いあがって　熱くなる。\nなぜか　甘いものが　大好物。"
        en:
          x: "A flame burns inside its body. It scatters embers\nfrom its head and tail to sear its opponents."
          y: "When it gets excited, embers rise from its head\nand tail and it gets hot. For some reason, it\nloves sweets."
        fr:
          x: "Son corps est en combustion. Il projette des\nflammèches par la tête et la queue pour carboniser\nses ennemis."
          y: "Quand il est excité, des flammèches brûlantes dansent\nsur sa tête et sa queue. Il raffole des choses sucrées."
        it:
          x: "Alimentando la fiamma all’interno del suo corpo,\nsparge dalla testa o dalla coda una pioggia di\nfuoco che scotta i nemici."
          y: "Quando è concitato si scalda e iniziano a levarsi\nscintille dalla testa e dalla coda. Per qualche motivo\nadora i dolci."
        de:
          x: "Es entfacht in seinem Körper ein Feuer und verkohlt\nGegner mit Funken aus seinem Kopf und Schweif."
          y: "Freut es sich, erhitzt sich sein Körper und aus\nseinem Kopf und Schweif sprühen Funken.\nEs liebt Süßigkeiten."
        es:
          x: "Achicharra a sus enemigos desprendiendo llamas\npor la cola y la cabeza, fruto de su desmesurado\ncalor interno."
          y: "Cuando se emociona, echa chispas por la cola y la\ncabeza, y calienta su cuerpo. Por alguna razón le\nencantan los dulces."
        ko:
          x: "몸속에서 태운 불꽃을\n머리나 꼬리로 흩뿌려서\n상대를 태운다."
          y: "흥분하면 머리나 꼬리에서\n불티가 날아올라 뜨거워진다.\n왜인지 달콤한 것을 매우 좋아한다."
