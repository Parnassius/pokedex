          y: "きけんを　かんじとると　りょうみみを\nたてて　けいかいする。さむい　よるは\nけがわに　かおを　うずめて　ねむる。"
        jp_kanji:
          x: "いつも　まるめている　耳を\n勢いよく　伸ばすと　大きな\n岩も　簡単に　壊せる。"
          y: "危険を　感じ取ると　両耳を　立てて\n警戒する。寒い　夜は\n毛皮に　顔を　埋めて　眠る。"
        en:
          x: "Its ears are always rolled up. They can be forcefully\nextended to shatter even a large boulder."
          y: "When it senses danger, it perks up its ears.\nOn cold nights, it sleeps with its head tucked into\nits fur."
        fr:
          x: "Ses oreilles repliées se déroulent avec une force\ncapable de briser un gros rocher."
          y: "Il dresse les oreilles quand il sent un danger.\nIl dort la tête dans sa fourrure pendant les nuits\nfroides."
        it:
          x: "Le sue orecchie sono sempre arrotolate. Può\nestenderle con forza per distruggere qualsiasi cosa."
          y: "Drizza le orecchie quando avverte un pericolo. Nelle\nnotti fredde, dorme con la testa nella pelliccia."
        de:
          x: "Seine Ohren sind immer aufgerollt. Mit ihnen kann\nes selbst große Felsbrocken zertrümmern."
          y: "Nimmt es Gefahr wahr, richtet es seine Ohren auf.\nIn kalten Nächten vergräbt es den Kopf in seinem Fell."
        es:
          x: "Lleva las orejas enrolladas. Cuando las extiende,\ngolpea con tal fuerza que incluso puede romper rocas."
          y: "Cuando siente peligro, levanta las orejas. En noches\nfrías, duerme con la cabeza metida en el pelaje."
        ko:
          x: "항상 말고 있는 귀를\n힘껏 늘리면 커다란\n바위도 간단히 부순다."
          y: "위험을 느끼면 양쪽 귀를\n세워서 경계한다. 추운 밤에는\n털에 얼굴을 묻고 잠잔다."
