          y: "みずべで　ボーッとしている。\nなにかが　しっぽに　かみついても\nまる１にち　きづかない。"
        jp_kanji:
          x: "いつも　ボーッとしていて　なにを\n考えているか　わからない。\n尻尾で　エサを　釣るのが　得意。"
          y: "水辺で　ボーッとしている。\nなにかが　尻尾に　かみついても\nまる１日　気づかない。"
        en:
          x: "It is always vacantly lost in thought, but no one\nknows what it is thinking about. It is good at fishing\nwith its tail."
          y: "It lazes vacantly near water. If something bites its\ntail, it won’t even notice for a whole day."
        fr:
          x: "Ramoloss semble toujours perdu dans ses pensées,\nmais personne ne sait vraiment à quoi il pense.\nIl adore pêcher en utilisant sa queue."
          y: "Il est tellement paresseux qu’il lui faut une journée\npour remarquer qu’on lui mord la queue."
        it:
          x: "È sempre assorto, ma nessuno sa a cosa stia\npensando. Si serve della coda per pescare."
          y: "Ozia distrattamente vicino all’acqua. Se gli si\nmordesse la coda non se ne accorgerebbe neppure."
        de:
          x: "Es ist stets in Gedanken versunken und niemand\nweiß, worüber es nachdenkt. Es kann mit seiner\nRute gut angeln."
          y: "Es faulenzt am Wasser. Wenn es in den Schweif\ngebissen wird, bemerkt es das erst am nächsten Tag."
        es:
          x: "Está siempre en su mundo, pero nadie sabe en qué\npiensa. Suele pescar con la cola."
          y: "Descansa ocioso junto al agua. Si algo muerde su\ncola, no lo notará en todo el día."
        ko:
          x: "항상 멍하니 있으므로 무슨\n생각을 하고 있는지 알 수 없다.\n꼬리로 먹이를 낚는 것이 특기다."
          y: "물가에서 멍하니 있다.\n뭔가가 꼬리를 깨물어도\n하루 종일 눈치채지 못한다."
slowbro:
