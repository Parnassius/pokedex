          x: "It hides any shiny object it finds in a secret\nlocation. Murkrow and Meowth loot one\nanother’s stashes."
          y: "Feared and loathed by many, it is believed to bring\nmisfortune to all those who see it at night."
        fr:
          x: "Il vole tous les objets brillants qu’il voit. Les Cornèbre\net les Miaouss se volent mutuellement."
          y: "Craint et peu aimé, il paraît qu’il porte malheur à ceux\nqui croisent son chemin la nuit."
        it:
          x: "Nasconde in un luogo segreto ogni oggetto che\ntrova. Murkrow e Meowth si derubano tra di loro."
          y: "Molti lo temono e lo detestano credendo che porti\nsfortuna a coloro che lo vedono di notte."
        de:
          x: "Es versteckt jeden schimmernden Gegenstand.\nKramurx und Mauzi rauben sich gegenseitig die Beute."
          y: "Viele verabscheuen und hassen es, da sie glauben,\nes bringe Verderben, wenn sie ihm nachts begegnen."
        es:
          x: "Esconde objetos brillantes en un lugar secreto.\nMeowth y Murkrow suelen saquear su escondite."
          y: "Temido y odiado por muchos, dicen que trae la\ndesgracia a todos aquellos que lo ven por la noche."
        ko:
          x: "반짝이는 물건을 주워\n비밀 장소에 숨겨 둔다.\n나옹과 자주 쟁탈전을 벌인다."
          y: "밤에 모습을 발견하면\n불길한 일이 생긴다고 여겨져\n몹시 미움받는 포켓몬이다."
