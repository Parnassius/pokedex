        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - fire
        - flying
      egg_groups:
        - flying
      abilities:
        - flame_body
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          x: "はげしい　たたかいで　こうふんすると\nぜんしんの　うもうの　すきまから\nひのこを　ふきだして　ひこうする。"
          y: "えものに　おそいかかるときの\nスピードは　じそく５００キロ。\nきょうれつな　キックで　しとめる。"
        jp_kanji:
          x: "激しい　戦いで　興奮すると\n全身の　羽毛の　すきまから\n火の粉を　噴き出して　飛行する。"
          y: "獲物に　襲いかかるときの\nスピードは　時速５００キロ。\n強烈な　キックで　しとめる。"
        en:
          x: "In the fever of an exciting battle, it\nshowers embers from the gaps between\nits feathers and takes to the air."
          y: "When attacking prey, it can reach speeds\nof up to 310 mph. It finishes its prey off\nwith a colossal kick."
        fr:
          x: "Exalté par un combat sans merci, il s’envole en\nsemant dans son sillage les escarbilles du feu qui\ncouve dans son plumage."
          y: "Quand il s’abat sur ses proies, sa vitesse dépasse\nles 500 km/h. Il les achève d’un puissant coup de\nserre."
        it:
          x: "Durante lotte senza esclusione di colpi, spicca il\nvolo sprizzando scintille dalle fessure che ha tra\nle piume."
          y: "Piomba sulle prede a 500 km/h e le attacca con\nartigli potentissimi."
        de:
          x: "Die Aufregung eines harten Kampfes veranlasst es\ndazu, im Flug Funken aus den Zwischenräumen\nseines Gefieders zu sprühen."
          y: "Bei der Jagd erreicht es Geschwindigkeiten von bis zu\n500 km/h. Es erledigt seine Beute mit einem kräftigen\nTritt."
        es:
          x: "Si se exalta durante un combate reñido, arroja chispas\ny ascuas de los intersticios entre su plumaje\nmientras vuela."
          y: "Llega a alcanzar los 500 km/h al perseguir a su presa,\na quien le asesta el golpe de gracia con una patada\nmuy potente."
        ko:
          x: "격렬한 싸움으로 흥분하게 되면\n온몸의 깃털 사이에서\n불꽃을 뿜어내며 비행한다."
          y: "사냥감을 덮칠 때의\n스피드는 시속 500km이다.\n강렬한 킥으로 꼼짝 못하게 한다."
scatterbug:
  species_id: 664
  names:
    jp_kana: コフキムシ
    jp_kanji: コフキムシ
    en: Scatterbug
    fr: Lépidonille
    it: Scatterbug
    de: Purmel
    es: Scatterbug
    ko: 분이벌레
  forms:
    scatterbug:
      form_id: 0
      base_stats:
        hp: 38
        attack: 35
        defense: 40
        special_attack: 27
        special_defense: 25
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shield_dust
        - compound_eyes
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          x: "とりポケモンに　おそわれると\nくろい　こなを　まきちらす。\nふれると　マヒする　どくのこなだ。"
          y: "からだを　おおう　こなが　たいおんを\nちょうせつするので　どんな　きこうや\nふうどの　ちいきでも　くらせる。"
        jp_kanji:
          x: "とりポケモンに　襲われると\n黒い　粉を　まき散らす。\n触れると　マヒする　毒の粉だ。"
          y: "体を　覆う　粉が　体温を\n調節するので　どんな　気候や　風土の\n地域でも　暮らせる。"
        en:
          x: "When under attack from bird Pokémon,\nit spews a poisonous black powder\nthat causes paralysis on contact."
          y: "The powder that covers its body\nregulates its temperature, so it\ncan live in any region or climate."
        fr:
          x: "Lorsqu’il est poursuivi par un Pokémon Oiseau,\nil projette une poudre noire qui paralyse tous ceux\nqu’elle touche."
          y: "La poudre qui recouvre son corps l’aide à réguler\nsa température. Il peut s’adapter à tous les climats."
        it:
          x: "Se assalito da Pokémon uccello, si difende emettendo\nvelenose scaglie nere che paralizzano al minimo\ncontatto."
          y: "La sua temperatura corporea è regolata dalle scaglie\nche ne ricoprono il corpo. Grazie ad esse può adattarsi\ne sopravvivere in qualsiasi condizione climatica."
        de:
          x: "Wird es von einem fliegenden Pokémon angegriffen,\nverstreut es schwarzen Puder. Der giftige Puder löst\nbei Berührung Paralyse aus."
          y: "Es reguliert seine Körpertemperatur mit dem Puder,\ndas seinen Körper bedeckt, und kommt deswegen\nin jedem Klima und jeder Region zurecht."
        es:
          x: "Cuando recibe el ataque de un Pokémon pájaro,\nexpulsa unas escamas negras que provocan parálisis\nsi se entra en contacto con ellas."
          y: "Gracias al polvo de escamas que lo recubre y regula\nsu temperatura, puede vivir en cualquier región, sin\nimportar las características del terreno o el clima."
        ko:
          x: "새포켓몬에게 습격당하면\n검은 가루를 흩뿌린다.\n만지면 마비되는 독가루다."
          y: "몸을 덮은 가루가 체온을\n조절하고 있어 어떤 기후나\n풍토의 지역에서도 살 수 있다."
spewpa:
  species_id: 665
  names:
    jp_kana: コフーライ
    jp_kanji: コフーライ
    en: Spewpa
    fr: Pérégrain
    it: Spewpa
    de: Puponcho
    es: Spewpa
    ko: 분떠도리
