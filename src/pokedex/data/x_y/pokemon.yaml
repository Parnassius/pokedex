          y: "２ほんの　あしは　はったつしており\nちじょうで　くらせるのに　なぜか\nすいちゅう　せいかつが　すき。"
        jp_kanji:
          x: "陸でも　水中でも　暮らせる。\n地上では　いつも　汗をかき\n皮膚を　ぬめぬめ　させている。"
          y: "２本の　脚は　発達しており\n地上で　暮らせるのに　なぜか\n水中　生活が　好き。"
        en:
          x: "It can live in or out of water. When out of water,\nit constantly sweats to keep its body slimy."
          y: "Its two legs are well developed. Even though it can\nlive on the ground, it prefers living in water."
        fr:
          x: "Ce Pokémon amphibie transpire continuellement\nquand il est hors de l’eau afin d’hydrater son corps."
          y: "Ses deux jambes sont très développées.\nBien qu’il puisse se déplacer sur la terre ferme,\nce Pokémon préfère vivre sous l’eau."
        it:
          x: "Capace di vivere dentro o fuori dall’acqua. Sulla\nterraferma suda per mantenere il suo corpo unto."
          y: "Ha arti inferiori molto sviluppati. Può vivere anche\nsulla terraferma, ma preferisce l’acqua."
        de:
          x: "Dieses Pokémon kann im Wasser und auch an Land\nleben. An Land schwitzt es sich den Körper nass."
          y: "Seine beiden Beine sind gut entwickelt. Auch wenn\nes an Land leben kann, bevorzugt es das Leben\nim Wasser."
        es:
          x: "Capaz de vivir dentro o fuera del agua. Fuera del agua\nsuda para mantener baboso su cuerpo."
          y: "Tiene unas extremidades inferiores muy desarrolladas.\nAunque puede vivir en tierra, prefiere el medio\nacuático."
        ko:
          x: "육지에서도 수중에서도 살 수 있다.\n지상에서는 항상 땀을 흘려서\n피부를 미끌미끌하게 하고 있다."
          y: "두 다리가 발달하여\n지상에서 살 수 있는데도 어째서인지\n수중 생활을 좋아한다."
poliwrath:
