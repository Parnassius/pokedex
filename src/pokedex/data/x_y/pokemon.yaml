          y: "はったつした　あごは　パワフルで\nなんでも　かみくだいて　しまうので\nおやのトレーナーでも　ようちゅうい。"
        jp_kanji:
          x: "小さいながらも　暴れん坊。\n目の前で　動くものが　あれば\nとにかく　かみついてくる。"
          y: "発達した　アゴは　パワフルで\nなんでも　かみくだいて　しまうので\n親のトレーナーでも　要注意。"
        en:
          x: "It is small but rough and tough. It won’t hesitate to\ntake a bite out of anything that moves."
          y: "Its powerful, well-developed jaws are capable of\ncrushing anything. Even its Trainer must be careful."
        fr:
          x: "Petit mais costaud, il n’hésite pas à mordre tout\nce qui passe à portée de ses dents."
          y: "Sa mâchoire surdéveloppée est capable de tout\nbroyer. Même son Dresseur doit s’en méfier."
        it:
          x: "Piccolo, ma forte e deciso. Non esita ad avventarsi\nsu qualsiasi cosa si muova."
          y: "Le sue potenti mandibole possono frantumare\nqualsiasi cosa. Anche l’Allenatore dev’essere cauto."
        de:
          x: "Es ist klein, aber zäh und stark. Es zögert nicht,\njeden anzugreifen, wenn dieser ihm zu nahe kommt."
          y: "Seine starken Kiefer können alles zermalmen.\nSelbst sein Trainer muss sich vor ihm in Acht nehmen."
        es:
          x: "Es pequeño pero violento. No dudará en morder\ncualquier cosa que se mueva cerca."
          y: "Sus desarrolladas y potentes fauces pueden romper\ncualquier cosa. Su Entrenador debe tener cuidado."
        ko:
          x: "작아도 성격은 아주 거칠다.\n눈앞에서 움직이는 것이 있으면\n무조건 물어버린다."
          y: "발달한 턱은 파워풀해서\n뭐든지 깨물어 부수기 때문에\n어버이 트레이너라도 주의해야 한다."
