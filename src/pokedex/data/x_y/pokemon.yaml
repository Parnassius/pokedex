          y: "つりびとを　みつけると\nすいちゅうから　つりいとを　ひっぱり\nジャマして　よろこぶ　いたずらもの。"
        jp_kanji:
          x: "日当たりの　良い　水辺に　住む。\n昼間は　水草の　ベッドで　眠り\n日が　暮れると　動き出す。"
          y: "釣り人を　見つけると\n水中から　釣り糸を　引っ張り\nジャマして　喜ぶ　いたずらもの。"
        en:
          x: "It lives at the water’s edge where it is sunny.\nIt sleeps on a bed of water-grass by day and\nbecomes active at night."
          y: "It has a mischievous spirit. If it spots an angler,\nit will tug on the fishing line to interfere."
        fr:
          x: "Il vit au bord de l’eau dans les endroits ensoleillés.\nLe jour, il s’endort sur un tas d’algues et ne se lève\nqu’à la nuit tombée."
          y: "C’est un mauvais plaisantin. Quand il repère un\npêcheur, il tire sur sa ligne pour le déranger."
        it:
          x: "Vive in riva a specchi d’acqua, in aree soleggiate.\nDi giorno dorme su di un letto di alghe, mentre la\nnotte è attivo."
          y: "È un po’ dispettoso. Se vede un pescatore, gli tira\nla lenza solo per dargli fastidio."
        de:
          x: "Es lebt am Ufer, wo die Sonne scheint.\nTagsüber schläft es in einem Bett aus Schilf\nund wird nachts aktiv."
          y: "Es hat ein spitzbübisches Wesen. Sieht es einen\nAngler, zieht es an der Angelschnur, um ihn zu ärgern."
        es:
          x: "Vive en el agua y, cuando hace sol, se queda en la\norilla. De día duerme sobre las algas y de noche entra\nen acción."
          y: "Tiene carácter travieso. Si ve un pescador, tira del\nanzuelo para confundirlo."
        ko:
          x: "햇볕이 잘 드는 물가에 산다.\n낮에는 수초로 된 침대에서\n자고 해가 지면 활동하기 시작한다."
          y: "낚시꾼을 발견하면\n물속에서 낚싯줄을 잡아당겨\n방해하며 좋아하는 장난꾸러기다."
ludicolo:
