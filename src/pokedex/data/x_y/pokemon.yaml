      descriptions:
        jp_kana:
          x: "いなずまで　せかいを　やきつくせる\nでんせつの　ポケモン。りそうの\nせかいを　つくる　ひとを　ほさする。"
          y: "しっぽで　でんきを　つくりだす。\nぜんしんを　かみなりぐもに　かくして\nイッシュちほうの　そらを　とぶ。"
        jp_kanji:
          x: "稲妻で　世界を　焼きつくせる\n伝説の　ポケモン。理想の\n世界を　つくる　人を　補佐する。"
          y: "尻尾で　電気を　作り出す。\n全身を　雷雲に　隠して\nイッシュ地方の　空を　飛ぶ。"
        en:
          x: "This legendary Pokémon can scorch the world with\nlightning. It assists those who want to build an\nideal world."
          y: "Concealing itself in lightning clouds, it flies\nthroughout the Unova region. It creates electricity\nin its tail."
        fr:
          x: "Un Pokémon légendaire assez puissant pour foudroyer\nle monde entier. Il soutient ceux qui suivent leur Idéal."
          y: "Sa queue produit de l’électricité. Il dissimule son\ncorps dans un nuage électrique et plane dans le ciel\nd’Unys."
        it:
          x: "Questo Pokémon leggendario può riempire il mondo\ndi fulmini e saette. Aiuta chi vuole costruire un mondo\nideale."
          y: "Produce elettricità con la coda. Vola nei cieli di\nUnima nascosto fra lampi e saette."
        de:
          x: "Ein Legendäres Pokémon mit der Macht, die Welt\ndurch Donner einzuäschern. Hilft allen, die einer\nWelt der Wünsche harren."
          y: "Sein Schweif erzeugt Strom. Es verbirgt sich hinter\ndichten Gewitterwolken und fliegt durch den Luftraum\nüber Einall."
        es:
          x: "Pokémon legendario capaz de chamuscar el mundo\ncon sus rayos. Ayuda a quienes persiguen un mundo\nde ideales."
          y: "Genera electricidad con su cola y, para ocultarse,\nsobrevuela Teselia envuelto en nubes de rayos."
        ko:
          x: "번개로 세상을 태워버릴 수 있는\n전설의 포켓몬. 이상의 세계를\n구축하는 사람을 보좌한다."
          y: "꼬리로 전기를 만들어 낸다.\n전신을 번개 구름에 숨기고\n하나지방의 하늘을 난다."
