      descriptions:
        jp_kana:
          x: "かわいらしい　しぐさで　ゆだんさせて\nその　すきに　もちものを　うばう。\nおこると　ツメを　たてて　はんげき。"
          y: "ひとの　ものを　あそびで　ぬすむ。\nぬすまれた　ひとも　あいくるしい\nしぐさに　つい　ゆるしてしまうのだ。"
        jp_kanji:
          x: "かわいらしい　仕草で　油断させて\nその　すきに　持ち物を　奪う。\n怒ると　ツメを　立てて　反撃。"
          y: "人の　物を　遊びで　盗む。\n盗まれた　人も　愛くるしい　仕草に\nつい　許してしまうのだ。"
        en:
          x: "Its cute act is a ruse. When victims let down their\nguard, they find their items taken. It attacks with\nsharp claws."
          y: "They steal from people for fun, but their victims\ncan’t help but forgive them. Their deceptively cute\nact is perfect."
        fr:
          x: "Il détourne l’attention de ses victimes avec ses gestes\nmignons pour mieux les détrousser. En colère,\nil griffe."
          y: "Il vole les gens pour le plaisir, mais il est tellement\nmignon que ses victimes finissent toujours par lui\npardonner."
        it:
          x: "Distrae con pose ammalianti i nemici incauti e ne\napprofitta per depredarli. Se si arrabbia, sguaina le\nunghie."
          y: "Ruba per gioco le cose alle persone, ma è talmente\ntenero che finiscono tutti per perdonarlo."
        de:
          x: "Es lenkt die Menschen durch sein süßes Verhalten ab,\num sie zu bestehlen. Ist es wütend, kratzt es gern mal."
          y: "Es stibitzt den Leuten spaßeshalber ihr Hab und Gut,\ndoch dank seiner reizenden Natur kann ihm niemand\nlang böse sein."
        es:
          x: "Distrae a su oponente con movimientos gráciles y\nsustrae sus pertenencias. Cuando se enfada, ataca\ncon las garras."
          y: "Hurta a los humanos por mera diversión, pero las\nvíctimas lo perdonan al ver a este Pokémon tan\nencantador."
        ko:
          x: "귀여운 행동으로 방심하게 한 후\n그 틈에 지닌 물건을 빼앗아 간다.\n화가 나면 손톱을 세워서 반격한다."
          y: "다른 사람의 물건을 장난삼아 훔친다.\n물건을 도둑맞은 사람도 애교 넘치는\n행동에 빠져 용서하고 만다."
liepard:
  species_id: 510
  names:
    jp_kana: レパルダス
    jp_kanji: レパルダス
    en: Liepard
    fr: Léopardus
    it: Liepard
    de: Kleoparda
    es: Liepard
    ko: 레파르다스
  forms:
    liepard:
      form_id: 0
      base_stats:
        hp: 64
        attack: 88
        defense: 50
        special_attack: 88
        special_defense: 50
