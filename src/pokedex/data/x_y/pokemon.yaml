        jp_kana:
          x: "じょうしきの　つうようしない\nこのよの　うらがわにあると　いわれる\nやぶれたせかいに　せいそくする。"
          y: "あばれもの　ゆえ　おいだされたが\nやぶれたせかいと　いわれる　ばしょで\nしずかに　もとのせかいを　みていた。"
        jp_kanji:
          x: "常識の　通用しない\nこの世の　裏側にあると　言われる\n破れた世界に　生息する。"
          y: "暴れ者　ゆえ　追い出されたが\n破れた世界と　言われる　場所で\n静かに　元の世界を　見ていた。"
        en:
          x: "This Pokémon is said to live in a world on the\nreverse side of ours, where common knowledge is\ndistorted and strange."
          y: "It was banished for its violence. It silently gazed\nupon the old world from the Distortion World."
        fr:
          x: "Il vit dans le Monde Distorsion, un monde à l’opposé\ndu nôtre qui échappe au sens commun."
          y: "Sa grande violence lui a valu d’être banni.\nIl observe les hommes en silence depuis le Monde\nDistorsion."
        it:
          x: "Vive nel Mondo Distorto che, sfidando l’ordine\ncosmico, si trova sul lato opposto al nostro."
          y: "È stato bandito per la sua violenza. Osserva il\nvecchio mondo in silenzio dal Mondo Distorto."
        de:
          x: "Es lebt in einer Zerrwelt, die auf der Kehrseite\nder unseren liegt und die sich aller Logik entzieht."
          y: "Es wurde aufgrund seines Verhaltens verbannt.\nAus der Zerrwelt schaut es auf die alte Welt."
        es:
          x: "Vive en el Mundo Distorsión, un mundo opuesto al\nnuestro y cuyas leyes desafían el sentido común."
          y: "Fue desterrado por su violencia. Observa el mundo\nen silencio desde el Mundo Distorsión."
        ko:
          x: "상식이 통하지 않는\n이 세상의 이면에 있다고 불리는\n깨어진 세계에 서식한다."
          y: "난폭하다는 이유로 쫓겨났지만\n깨어진 세계라고 전해지는 장소에서\n조용히 원래 세계를 보고 있었다."
