duskull:
  species_id: 355
  names:
    jp_kana: ヨマワル
    jp_kanji: ヨマワル
    en: Duskull
    fr: Skelénox
    it: Duskull
    de: Zwirrlicht
    es: Duskull
    ko: 해골몽
  forms:
    duskull:
      form_id: 0
      base_stats:
        hp: 20
        attack: 40
        defense: 90
        special_attack: 30
        special_defense: 90
        speed: 25
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      hidden_ability: frisk
      descriptions:
        jp_kana:
          x: "どこまでも　えものを　おいつづける\nしゅうねんぶかい　せいかくだが\nあさひが　のぼると　あきらめる。"
          y: "いいつけを　まもらない　こどもを\nみつけると　よなかに　どこかへ\nつれて　いくと　いわれている。"
        jp_kanji:
          x: "どこまでも　獲物を　追い続ける。\n執念深い　性格だが\n朝日が　昇ると　あきらめる。"
          y: "いいつけを　守らない　子供を\n見つけると　真夜中に　どこかへ\n連れて行くと　言われている。"
        en:
          x: "It doggedly pursues its prey wherever it goes.\nHowever, the chase is abandoned at sunrise."
          y: "If it finds bad children who won’t listen to their\nparents, it will spirit them away--or so it’s said."
        fr:
          x: "Il poursuit assidûment sa proie, où qu’elle aille.\nIl n’abandonne sa traque qu’au lever du soleil."
          y: "On dit que Skelénox emporte les enfants\ndésobéissants à la nuit tombée."
        it:
          x: "Segue ostinatamente la preda ovunque essa vada.\nAbbandona la caccia solo all’alba."
          y: "Si racconta che questo Pokémon porti via nella\nnotte i bambini che sono stati disobbedienti."
        de:
          x: "Verbissen verfolgt es seine Beute überallhin.\nDoch sobald die Sonne aufgeht, ist die Jagd vorbei."
          y: "Man sagt, es suche sich unartige Kinder und\nverschleppe sie nachts an einen unbekannten Ort."
        es:
          x: "Persigue a su presa sin descanso allá donde vaya.\nNo obstante, abandona la caza al amanecer."
          y: "Corre el rumor de que, por las noches, se lleva a los\nniños que no son obedientes."
        ko:
          x: "어디까지라도 먹이를 쫓아가는\n집념이 강한 성격이지만\n아침 해가 떠오르면 포기한다."
          y: "말을 잘 안 듣는 아이를\n발견하면 한밤중에 어딘가로\n데려간다고 전해진다."
dusclops:
  species_id: 356
  names:
    jp_kana: サマヨール
    jp_kanji: サマヨール
    en: Dusclops
    fr: Téraclope
    it: Dusclops
    de: Zwirrklop
    es: Dusclops
    ko: 미라몽
  forms:
    dusclops:
      form_id: 0
      base_stats:
        hp: 40
        attack: 70
        defense: 130
        special_attack: 60
        special_defense: 130
        speed: 25
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - pressure
      hidden_ability: frisk
      descriptions:
        jp_kana:
          x: "からだの　なかで　もえている\nひとだまを　のぞきこむと\nたましいを　すいとられてしまう。"
          y: "からだの　なかみは　くうどうに\nなっていて　のぞきこんだ　あいてを\nすいこんでしまうと　いわれている。"
        jp_kanji:
          x: "体の　中で　燃えている\n人魂を　のぞきこむと\n魂を　吸い取られてしまう。"
          y: "体の　中身は　空洞に　なっていて\nのぞきこんだ　相手を\n吸いこんでしまうと　言われている。"
        en:
          x: "Anyone who dares peer into its body to see its\nspectral ball of fire will have their spirit stolen away."
          y: "Its body is hollow. It is said that those who look\ninto its body are sucked into the void."
        fr:
          x: "Il aspire l’âme de ceux qui regardent dans son corps\ncreux où rougeoie son unique œil."
          y: "Son corps est creux. On raconte que celui qui regarde\nà l’intérieur finira aspiré par le néant."
        it:
          x: "Se si osserva troppo da vicino la palla di fuoco\ndentro Dusclops, la propria anima viene risucchiata."
          y: "Il suo corpo è vuoto. Pare che chiunque si avvicini\nper guardare dentro venga risucchiato."
        de:
          x: "Blickt man direkt in den Feuerball in seinem\nInneren, wird einem die Seele ausgesaugt."
          y: "Sein Körper ist hohl. Man sagt, dass diejenigen,\ndie in den Körper blicken, hineingezogen werden."
        es:
          x: "Si alguien mira los fuegos fatuos del interior de\nDusclops, perderá su alma irremediablemente."
          y: "Su cuerpo está hueco. Se dice que quien mire dentro,\nserá tragado por un agujero negro."
        ko:
          x: "몸 안에서 불타고 있는\n도깨비불을 들여다보면\n영혼을 빼앗겨버린다."
          y: "몸 안은 빈 공간으로\n이루어져 있어서 들여다본 상대를\n빨아들여 버린다고 전해진다."
tropius:
  species_id: 357
  names:
    jp_kana: トロピウス
    jp_kanji: トロピウス
    en: Tropius
    fr: Tropius
    it: Tropius
