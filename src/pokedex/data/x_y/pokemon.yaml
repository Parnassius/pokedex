      descriptions:
        jp_kana:
          x: "４ほんの　あしは　みじかいが\nヒヅメは　ひろく　ギザギザ　なので\nゆきのうえでも　すべらず　あるける。"
          y: "ながい　たいもうに　おおわれて\nめのまえの　ようすが　わからず\nひたすらに　とっしんを　くりかえす。"
        jp_kanji:
          x: "４本の　脚は　短いが\nひづめは　広く　ギザギザ　なので\n雪の上でも　滑らず　歩ける。"
          y: "長い　体毛に　覆われて\n目の前の　様子が　わからず\nひたすらに　突進を　繰り返す。"
        en:
          x: "Although its legs are short, its rugged hooves\nprevent it from slipping, even on icy ground."
          y: "Because the long hair all over its body obscures its\nsight, it just keeps charging repeatedly."
        fr:
          x: "Bien que pourvu de courtes pattes, ses sabots sont\npointus pour l’empêcher de glisser sur la glace."
          y: "Ses yeux sont masqués par ses longs poils. Il ne voit\nrien et se déplace en chargeant."
        it:
          x: "Ha le zampe corte, ma grazie agli zoccoli ruvidi,\nriesce a non scivolare neppure sul ghiaccio."
          y: "Poiché il lungo pelo sul suo corpo gli impedisce di\nvedere, non fa che caricare il nemico senza tregua."
        de:
          x: "Trotz kurzer Beine rutscht es auf eisigen Flächen\nnicht aus, da seine Hufe ihm genügend Halt bieten."
          y: "Da sein haariges Fell seine Sicht enorm beeinträchtigt,\ngreift es ständig an, um den Gegner zu treffen."
        es:
          x: "Aunque tiene las patas cortas, las fuertes pezuñas le\npermiten agarrarse bien al suelo, a pesar del hielo."
          y: "Como su largo pelaje le impide ver con claridad, sigue\natacando repetidamente."
        ko:
          x: "4개의 다리는 짧지만\n발굽이 넓고 거칠거칠하므로\n눈 위도 미끄러지지 않고 걸을 수 있다."
          y: "긴 털로 덮여 있어서\n눈앞의 상태를 모르고\n한결같이 돌진만을 반복한다."
corsola:
  species_id: 222
  names:
