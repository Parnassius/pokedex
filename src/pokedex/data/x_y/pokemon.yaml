        jp_kana:
          x: "いろ　あざやかな　はねの　もようが\nとくちょう。ほそい　くちを　のばして\nはなの　あまい　ミツを　すいとる。"
          y: "ほそながい　くちを　つきさして\nあいての　たいえきを　すいとる。\nこうげきてきな　せいかく。"
        jp_kanji:
          x: "色　鮮やかな　羽の　模様が　特徴。\n細い　口を　伸ばして\n花の　甘い　ミツを　吸い取る。"
          y: "長細い　口を　突き刺して\n相手の　体液を　吸い取る。\n攻撃的な　性格。"
        en:
          x: "Vibrantly patterned wings are its prominent feature.\nIt sucks sweet flower nectar with its long mouth."
          y: "It has an aggressive nature. It stabs prey with its\nlong, narrow mouth to drain the prey’s fluids."
        fr:
          x: "Réputé pour les motifs de ses ailes aux couleurs vives.\nIl allonge sa trompe pour butiner le nectar."
          y: "Il est très agressif. Il pique sa proie avec son long\nmuseau étroit et absorbe sa vitalité."
        it:
          x: "Sulle ali ha splendidi, vividi colori. Succhia il dolce\npolline dai fiori allungando la bocca sottile."
          y: "Ha un’indole aggressiva. Conficca la sua bocca\nlunga e sottile nelle prede e ne succhia i fluidi."
        de:
          x: "Die bunten Flügel sind sein Markenzeichen.\nMit seinem Rüssel saugt es süßen Honig aus Blumen."
          y: "Es besitzt ein aggressives Wesen. Es sticht seinen\nRüssel in seine Beute und saugt sie aus."
        es:
          x: "Los dibujos de sus coloridas alas son muy peculiares.\nLiba el néctar de las flores con su fina trompa."
          y: "Es un Pokémon agresivo. Con su boca larga y afilada\nataca a sus rivales para drenar sus fluidos."
        ko:
          x: "색이 선명한 날개의 무늬가\n특징이다. 가는 입을 뻗어\n꽃의 달콤한 꿀을 흡수한다."
          y: "가늘고 긴 입을 깊이 찔러\n상대의 체액을 흡수한다.\n공격적인 성격이다."
cascoon:
