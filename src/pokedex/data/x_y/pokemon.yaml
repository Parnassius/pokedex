      hidden_ability: rattled
      descriptions:
        jp_kana:
          x: "ふだんは　ささやき　ごえ。きけんを\nさっちすると　おおごえで　なきだす。\nみみの　ふたを　とじると　なきやむ。"
          y: "きけんを　さっちすると　ジェットきと\nおなじ　おんりょうの　なきごえを\nあげて　てきを　ひるませるのだ。"
        jp_kanji:
          x: "普段は　ささやき　声。危険を\n察知すると　大声で　泣き出す。\n耳の　蓋を　閉じると　泣きやむ。"
          y: "危険を　察知すると　ジェット機と\n同じ　音量の　鳴き声を　上げて\n敵を　ひるませるのだ。"
        en:
          x: "It usually murmurs but starts crying\nloudly if it senses danger. It stops\nwhen its ear covers are shut."
          y: "If it senses danger, it scares the foe by crying out\nwith the volume of a jet-plane engine."
        fr:
          x: "Il communique en murmurant, mais se met à hurler\ns’il sent le moindre danger. Il s’arrête quand on lui\nbouche les oreilles."
          y: "Il repousse ses ennemis grâce à un cri aussi puissant\nque le bruit d’un avion à réaction."
        it:
          x: "Di solito sussurra, ma se avverte un pericolo lancia\ngrida acute, che interrompe quando ha le orecchie\nchiuse."
          y: "Se sospetta un pericolo, leva grida agli stessi\nassordanti decibel di un jet, gettando nel panico i\nnemici."
        de:
          x: "Normalerweise murmelt es, aber bei Gefahr beginnt\nes laut zu schreien. Es hört auf zu schreien,\nwenn seine Ohrmuscheln bedeckt werden."
          y: "Sein Schrei ist so laut wie ein Düsenflugzeug.\nBei Gefahr vertreibt es damit seine Feinde."
        es:
          x: "Normalmente murmulla, pero cuando siente que hay\npeligro se pone a chillar. Solo para cuando se le\ncierran las orejas."
          y: "Cuando percibe peligro, lanza gritos con volumen\nsimilar al de un reactor e intimida a sus enemigos."
        ko:
          x: "평소에는 속삭이는 듯한 목소리다. 위험을\n감지하면 큰 소리로 울기 시작한다.\n귀의 덮개를 닫으면 울음을 멈춘다."
          y: "위험을 감지하면 제트기와\n같은 음량의 울음소리를\n내서 적을 풀죽게 한다."
loudred:
