      hidden_ability: run_away
      descriptions:
        jp_kana:
          x: "ながい　あいだ　ちちゅうで　くらして\nいたため　めは　ほとんど　みえない。\nしょっかくで　ようすを　さぐる。"
          y: "１０ねん　いじょう　つちの　なかで\nくらす　ことも　ある。じゅもくの\nねっこから　えいようを　すいとる。"
        jp_kanji:
          x: "長い　あいだ　地中で　暮らして\nいたため　目は　ほとんど　見えない。\n触覚で　様子を　探る。"
          y: "１０年以上　土の　中で\n暮らす　ことも　ある。樹木の\n根っこから　栄養を　吸い取る。"
        en:
          x: "Because it lived almost entirely underground, it is\nnearly blind. It uses its antennae instead."
          y: "It can sometimes live underground for more than\n10 years. It absorbs nutrients from the roots\nof trees."
        fr:
          x: "Comme il vit presque toujours sous terre, sa vue est\ntrès peu développée et il est presque aveugle.\nIl utilise ses antennes pour se repérer."
          y: "Il peut passer jusqu’à dix ans sous terre. Les racines\ndes arbres constituent son régime alimentaire."
        it:
          x: "Poiché passa quasi tutta l’esistenza sottoterra, è\nquasi cieco. Usa le antenne per orientarsi."
          y: "Gli capita di restare anche più di dieci anni sottoterra.\nSi nutre delle radici di enormi alberi."
        de:
          x: "Da es fast sein gesamtes Leben unter der Erde\nverbracht hat, ist es nahezu blind. Es setzt daher\nals Augenersatz seine Fühler ein."
          y: "Manches Nincada lebt bis zu zehn Jahre unter der Erde\nund saugt Nährstoffe aus Baumwurzeln."
        es:
          x: "Como se ha pasado casi toda la vida viviendo bajo\ntierra, no ve bien. Las antenas que tiene le ayudan\na orientarse."
          y: "Algunos pasan más de diez años bajo tierra.\nAbsorbe nutrientes de las raíces de los árboles."
        ko:
          x: "긴 시간 동안 땅속에서 살고\n있었기 때문에 눈은 거의 보이지 않는다.\n더듬이로 주변 상황을 살핀다."
          y: "10년 이상 땅속에서\n지내는 경우도 있다. 수목의\n뿌리에서 영양을 흡수한다."
ninjask:
