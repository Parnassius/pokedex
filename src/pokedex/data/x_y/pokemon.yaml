      descriptions:
        jp_kana:
          x: "しょくしゅは　ふだん　みじかくて\nえものを　さすときに　ながく\nのびて　からみつくのだ。"
          y: "８０ぽん　の　しょくしゅが　じゆうに\nうごく。さされると　どくに　おかされ\nするどい　いたみが　はしる。"
        jp_kanji:
          x: "触手は　普段　短くて\n獲物を　刺すときに\n長く　伸びて　絡みつくのだ。"
          y: "８０本の　触手が　自由に　動く。\n刺されると　毒に　侵され\n鋭い　痛みが　走る。"
        en:
          x: "The tentacles are normally kept short. On hunts,\nthey are extended to ensnare and immobilize prey."
          y: "It has 80 tentacles that move about freely.\nThey can sting, causing poisoning and sharp,\nstabbing pain."
        fr:
          x: "Ses tentacules sont rétractés au repos. En situation\nde chasse, ils s’allongent pour prendre ses proies\nau piège."
          y: "Les 80 tentacules que Tentacruel laisse s’agiter\nlui permettent d’injecter du poison dans le corps\nde ses ennemis mais aussi de les trancher."
        it:
          x: "I corti tentacoli si estendono durante la caccia\nper catturare e immobilizzare la preda."
          y: "Il contatto con i suoi 80 tentacoli, che si muovono\nliberamente, avvelena la vittima e causa un dolore\nlancinante."
        de:
          x: "Dieses Pokémon kann die Tentakel bei der Jagd\nausfahren, um die Beute leichter zu fangen."
          y: "Es verfügt über 80 Tentakel, die es frei bewegen kann.\nDamit kann es zustechen und so Vergiftung und starke\nSchmerzen verursachen."
        es:
          x: "Cuando caza, extiende los cortos tentáculos que tiene\npara atrapar e inmovilizar a su presa."
          y: "Tiene 80 tentáculos que se mueven a su aire. Con\nellos, pica, envenena y causa un dolor agudo e\nintenso."
        ko:
          x: "촉수는 평소에는 짧고\n먹이를 찌를 때\n길게 늘어나 휘감는다."
          y: "80개의 촉수를 자유롭게\n움직인다. 찔리면 독이 퍼져\n극심한 고통을 겪게 된다."
geodude:
