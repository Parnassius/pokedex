          y: "くちに　はいる　おおきさの　ものなら\nなんでも　まるのみ。とくしゅな\nいえきで　なんでも　しょうかする。"
        jp_kanji:
          x: "なんでも　まるのみしてしまう。\n毛穴から　猛毒の　体液を\n分泌して　敵に　浴びせかける。"
          y: "口に　入る　大きさの　ものなら\nなんでも　まる飲み。特殊な\n胃液で　なんでも　消化する。"
        en:
          x: "It swallows anything whole. It sweats toxic fluids\nfrom its follicles to douse foes."
          y: "It gulps anything that fits in its mouth. Its special\nenzymes can dissolve anything."
        fr:
          x: "Il avale tout en une bouchée. Ses follicules sécrètent\ndes fluides toxiques qui endorment l’ennemi."
          y: "Il avale tout en une bouchée. Ses sucs digestifs\npeuvent digérer n’importe quoi."
        it:
          x: "Inghiotte intera qualsiasi cosa. Dai pori traspira\nun liquido tossico con cui bagna i nemici."
          y: "Inghiotte qualunque cosa che possa infilarsi in\nbocca. Digerisce tutto con succhi gastrici speciali."
        de:
          x: "Es verschluckt alles in einem Stück und sondert\ngiftige Stoffe ab, mit denen es Gegner besprüht."
          y: "Es verschluckt, was in sein Maul passt, und verdaut es\nmit seiner alles zersetzenden Magensäure."
        es:
          x: "Se traga cualquier cosa de una pieza. Sus poros\nsegregan fluidos tóxicos que dañan a sus enemigos."
          y: "Se traga todo lo que le quepa en su enorme boca.\nSus jugos gástricos pueden digerir cualquier cosa."
        ko:
          x: "무엇이든 통째로 삼켜 버린다.\n모공에서 맹독의 체액을\n분비하여 상대에게 끼얹는다."
          y: "입에 들어가는 크기의 것이라면\n무엇이든 통째로 삼킨다. 특수한\n위액으로 무엇이든 소화한다."
