        jp_kana:
          x: "あいての　はっする　はどうを\nキャッチすることで　かんがえや\nうごきを　よみとることが　できる。"
          y: "あらゆる　ものが　だす　はどうを\nよみとることで　１キロさきに　いる\nあいての　きもちも　りかいできる。"
        jp_kanji:
          x: "相手の　発する　波動を\nキャッチすることで　考えや　動きを\n読み取ることが　できる。"
          y: "あらゆる　ものが　出す　波動を\n読みとることで　１キロ先に　いる\n相手の　気持ちも　理解できる。"
        en:
          x: "By catching the aura emanating from others, it can\nread their thoughts and movements."
          y: "By reading the auras of all things, it can tell how\nothers are feeling from over half a mile away."
        fr:
          x: "Il peut deviner les pensées et les mouvements des\nautres en analysant leur aura."
          y: "Il peut sentir et identifier les émotions de quelqu’un\nà plus d’un kilomètre."
        it:
          x: "Riesce a leggere i pensieri e i movimenti del\nnemico decifrando l’aura che questo emette."
          y: "Sa decifrare le onde emesse da ogni cosa. Questo gli\npermette di capire le emozioni di creature lontane\nanche 1 km."
        de:
          x: "Es nimmt die Aura seines Gegners wahr. So kann es\ndessen Gedanken und Bewegungen erkennen."
          y: "Kann aus 1 km Entfernung die Gefühle anderer Wesen\nerfassen, indem es die Wellen liest, die sie aussenden."
        es:
          x: "Puede leer los pensamientos y movimientos de su\nadversario a través de su aura."
          y: "Emite unas ondas que le permiten percibir todo lo que\nse encuentre a 1 km, incluso los sentimientos de otras\npersonas."
        ko:
          x: "상대가 발하는 파동을\n감지하여 생각이나\n움직임을 간파할 수 있다."
          y: "모든 물건이 내는 파동을\n읽어내어 1km 앞에 있는\n상대의 마음도 이해할 수 있다."
