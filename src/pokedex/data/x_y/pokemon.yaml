        jp_kanji:
          x: "のんびりとした　性格。\n川底で　口を　開けて　エサが\n飛びこんでくるのを　ひたすら　待つ。"
          y: "のんびりとした　性格で\n気ままに　泳いでは　いつも\n船底に　頭を　ぶつけている。"
        en:
          x: "It has a sluggish nature. It lies at the river’s bottom,\nwaiting for prey to stray into its mouth."
          y: "This carefree Pokémon has an easygoing nature.\nWhile swimming, it always bumps into boat hulls."
        fr:
          x: "C’est un grand paresseux qui attend au fond de\nla rivière qu’une proie lui tombe dans le bec."
          y: "Ce Pokémon est très insouciant. Quand il nage,\nil fonce tête la première dans la coque des bateaux."
        it:
          x: "È pigro per natura. Sta sul fondo dei fiumi con la\nbocca aperta in attesa di afferrare la preda."
          y: "Questo Pokémon sbarazzino non si fa grossi problemi:\nnuotando urta sempre gli scafi delle barche."
        de:
          x: "Ein träges Pokémon, das auf dem Grund des Flusses\nliegt und wartet, dass ihm Beute ins Maul schwimmt."
          y: "Dieses genügsame Pokémon ist sehr umgänglich.\nBeim Schwimmen stößt es immer wieder gegen Schiffe."
        es:
          x: "Es un Pokémon bastante perezoso. Para pescar\npermanece en el fondo del río con la boca abierta."
          y: "Este despreocupado Pokémon es de naturaleza\ntranquila. Siempre que nada, choca con los barcos."
        ko:
          x: "느긋한 성격이다.\n강바닥에서 입을 벌려 먹이가\n들어오는 것을 한결같이 기다린다."
          y: "느긋한 성격으로\n제멋대로 헤엄치고는 늘\n배의 밑바닥에 머리를 들이받곤 한다."
