          y: "まるければ　モンスターボールでも\nタマザラシでも　はなのうえに　のせて\nじゆうじざいに　くるくる　まわすぞ。"
        jp_kanji:
          x: "鼻の　神経が　敏感。\nはじめて　目に　する　物は\n鼻で　触って　覚えるのだ。"
          y: "まるければ　モンスターボールでも\nタマザラシでも　鼻の上に　乗せて\n自由自在に　くるくる　回すぞ。"
        en:
          x: "It has a very sensitive nose. It touches new things\nwith its nose to examine them."
          y: "Be it Spheal or Poké Ball, it will spin any round\nobject on its nose with the greatest of ease."
        fr:
          x: "Il utilise son museau hypersensible pour toucher et\ncomprendre tout ce qu’il voit pour la première fois."
          y: "Pour s’amuser, il fait tourner tout ce qui est rond\nsur son museau, qu’il s’agisse de Poké Balls ou\nd’Obalie."
        it:
          x: "Per memorizzare un nuovo oggetto, ha bisogno di\ntoccarlo con il naso, dove risiede la sua sensibilità."
          y: "Fa roteare sul naso qualsiasi cosa abbia forma sferica,\nPoké Ball e Spheal inclusi."
        de:
          x: "Die Nerven in seiner Nase sind sehr empfindlich.\nSieht es etwas Neues, berührt es es zuerst mit\nder Nase."
          y: "Pokébälle, Seemops und alles, was sonst noch\nrund ist, balanciert es mit großem Geschick\nauf seiner Nasenspitze."
        es:
          x: "Su nariz es muy sensible. Cuando ve algo por primera\nvez, lo toca con ella para recordarlo después."
          y: "Hace girar con pericia sobre la punta de su nariz\ncualquier cosa redondeada, ya sea una Poké Ball o\nun Spheal."
        ko:
          x: "코의 신경이 민감하다.\n처음 보는 것은\n코로 문질러서 기억한다."
          y: "둥글면 몬스터볼이든\n대굴레오든 코 위에 올려\n자유자재로 빙글빙글 돌린다."
walrein:
