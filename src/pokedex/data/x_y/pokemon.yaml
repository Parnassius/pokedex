          y: "りょううでを　ぐるぐる　まわして\nでんきを　はっせい　させると\nツノのあいだが　あおじろく　ひかる。"
        jp_kanji:
          x: "両腕を　ぐるぐる　振り回して\n電気を　発生させる。しかし\n作った　電気は　ためておけない。"
          y: "両腕を　ぐるぐる　まわして\n電気を　発生させると\nツノのあいだが　青白く　光る。"
        en:
          x: "It generates electricity by whirling its arms.\nHowever, it can’t store the energy it makes."
          y: "Spinning its arms around to generate electricity\nmakes the area between its horns shine light blue."
        fr:
          x: "Il génère de l’électricité en battant des bras, mais\nil n’a aucun moyen de stocker cette énergie."
          y: "Ses cornes s’illuminent lorsqu’il fait tourner ses bras\npour générer de l’électricité."
        it:
          x: "Genera elettricità roteando le braccia. Tuttavia,\nnon riesce a immagazzinare l’energia creata."
          y: "Quando rotea le braccia per produrre elettricità, le\nsue corna si illuminano."
        de:
          x: "Es bewegt seine Arme und generiert damit\nElektrizität. Diese kann es aber nicht speichern."
          y: "Wenn es seine Arme kreisen lässt, um Strom\nzu erzeugen, entstehen zwischen seinen Hörnern\nhellblaue Funken."
        es:
          x: "Genera electricidad girando los brazos. No obstante,\nes incapaz de almacenar la energía creada."
          y: "Al girar ambos brazos para generar electricidad, sus\ncuernos se iluminan con una luz blanquecina."
        ko:
          x: "양팔을 빙글빙글 휘둘러서\n전기를 발생시킨다. 그러나\n만들어낸 전기는 모아둘 수 없다."
          y: "양팔을 빙글빙글 돌려\n전기를 발생시키면\n뿔 사이가 푸르스름하게 빛난다."
magby:
