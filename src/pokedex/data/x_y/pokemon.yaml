          x: "ぐんぐん　のびる　ベロを　なんにでも\nまきつける。うかつに　ちかよると\nだえきで　べとべとに　されてしまう。"
          y: "だえきには　どんな　ものも　とかす\nせいぶんが　たっぷり　ふくまれており\nなめられると　いつまでも　しびれる。"
        jp_kanji:
          x: "ぐんぐん　伸びる　ベロを　なんにでも\n巻きつける。うかつに　近寄ると\nだえきで　べとべとに　されてしまう。"
          y: "だえきには　どんな　物も　溶かす\n成分が　たっぷり　含まれており\nなめられると　いつまでも　しびれる。"
        en:
          x: "It wraps things with its extensible tongue. Getting\ntoo close to it will leave you soaked with drool."
          y: "Their saliva contains lots of components that can\ndissolve anything. The numbness caused by their\nlick does not dissipate."
        fr:
          x: "Il enroule tout dans sa langue extensible. Ceux qui\nl’approchent finissent couverts de bave."
          y: "Sa bave anesthésiante est chargée d’une substance\ncapable de faire fondre n’importe quelle matière."
        it:
          x: "Avvolge ogni cosa con la sua lingua allungabile. Chi\nsi avvicina troppo, si ritroverà tutto bagnato di bava."
          y: "La sua saliva contiene una sostanza che scioglie\nqualsiasi cosa e causa la paralisi se si viene leccati."
        de:
          x: "Es umklammert Dinge mit seiner dehnbaren Zunge.\nKommt man ihm zu nahe, wird man eingespeichelt."
          y: "Ihr Speichel enthält eine ätzende Substanz, die bei\nKontakt mit der Haut anhaltende Taubheit erzeugt."
        es:
          x: "Agarra cosas con su lengua extensible. Si te acercas\nmucho, te deja lleno de babas."
          y: "La alta concentración de sustancias en su saliva lo\ndisuelve todo. Un lametón provoca un entumecimiento\npermanente."
        ko:
          x: "쭉쭉 늘어나는 혓바닥으로 무엇이든\n휘감는다. 함부로 다가가면\n타액으로 끈적끈적거리게 된다."
          y: "타액에는 어떤 것도 녹이는\n성분이 충분히 포함되어 있어\n핥으면 언제까지나 마비된다."
