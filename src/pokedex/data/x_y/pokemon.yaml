      descriptions:
        jp_kana:
          x: "すなの　なかに　もぐり　めと　はなを\nそとに　だして　いどうする。\nくろい　まくが　めを　まもる。"
          y: "さばくの　すなの　なかで　せいかつ。\nたいように　あたためられた　すなが\nたいおんの　ていかを　ふせぐのだ。"
        jp_kanji:
          x: "砂の　中に　潜り　目と　鼻を\n外に　出して　移動する。\n黒い　膜が　目を　守る。"
          y: "砂漠の　砂の　中で　生活。\n太陽に　暖められた　砂が\n体温の　低下を　防ぐのだ。"
        en:
          x: "It moves along below the sand’s surface, except\nfor its nose and eyes. A dark membrane shields its\neyes from the sun."
          y: "They live buried in the sands of the desert.\nThe sun-warmed sands prevent their body\ntemperature from dropping."
        fr:
          x: "Il se déplace dans le sable en gardant le nez et\nles yeux à découvert. La membrane noire protège\nses yeux."
          y: "Il vit dans le sable des déserts. Le sable chauffé par\nle soleil empêche son corps de refroidir."
        it:
          x: "Si nasconde sotto la sabbia e si sposta cacciando\nfuori gli occhi e il naso. Una membrana nera gli\nprotegge gli occhi."
          y: "Vive nella sabbia del deserto che, scaldata dal sole,\nimpedisce alla sua temperatura corporea di scendere."
        de:
          x: "Wenn es sich durch den Sand gräbt, ragen nur\nnoch Nase und Augen hervor. Die schwarze Haut\ndient als Augenschutz."
          y: "Es lebt im Wüstensand. Der durch die Sonne erhitzte\nSand gewährleistet, dass es immer schön warm\neingepackt ist."
        es:
          x: "Se desplaza hundido en la arena, dejando al\ndescubierto solo los ojos y la nariz. Una membrana\nnegra le protege los ojos."
          y: "Vive en las arenas desérticas, donde las altas\ntemperaturas de las mismas evitan que su cuerpo\nse enfríe."
        ko:
          x: "모래 속에 파고들어 눈과 코를\n밖에 내놓고 이동한다.\n검은 막이 눈을 보호한다."
          y: "사막의 모래 속에서 생활한다.\n태양 때문에 따뜻해진 모래가\n체온 저하를 막아준다."
krokorok:
  species_id: 552
  names:
