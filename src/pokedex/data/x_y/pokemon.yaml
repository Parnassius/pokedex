        jp_kana:
          x: "てきに　おそわれると　ぜんしんの\nうもうから　みずしぶきを　だす。\nみずけむりに　まぎれて　にげるのだ。"
          y: "とぶよりも　およぐのが　とくいで\nすいちゅうに　もぐっては　だいすきな\nみずゴケを　うれしそうに　たべる。"
        jp_kanji:
          x: "敵に　襲われると　全身の　羽毛から\n水しぶきを　出す。\n水煙に　紛れて　逃げるのだ。"
          y: "飛ぶよりも　泳ぐのが　得意で\n水中に　潜っては　大好きな\n水ゴケを　うれしそうに　食べる。"
        en:
          x: "When attacked, it uses its feathers to splash water,\nescaping under cover of the spray."
          y: "They are better at swimming than flying, and they\nhappily eat their favorite food, peat moss, as they\ndive underwater."
        fr:
          x: "Quand on l’attaque, il s’ébroue et fait jaillir de la\nvapeur d’eau de tout son corps. Il se cache dedans\npour s’enfuir."
          y: "Un Pokémon doué pour la plongée qui passe son\ntemps sous l’eau à chercher des sphaignes, son plat\npréféré."
        it:
          x: "Quando viene attaccato schizza acqua da tutte le\npiume del corpo. Fugge dileguandosi in una nuvola\ndi spruzzi."
          y: "È più ferrato nel nuoto che nel volo. Si immerge\nnell’acqua per mangiare i licheni marini di cui va matto."
        de:
          x: "Gerät es in Gefahr, versprüht es Wasser aus seinem\nFederkleid und nutzt den Sprühregen, um Reißaus\nzu nehmen."
          y: "Es schwimmt besser, als es fliegen kann. Am liebsten\ntaucht es ins kühle Nass ab, um Torfmoos, seine\nLeibspeise, zu essen."
        es:
          x: "Cuando se ve atacado, las plumas que lo recubren\ndespiden ráfagas de agua que lo ayudan a escapar."
          y: "Nada a mayor velocidad de la que puede volar. Se\nsumerge en el agua para buscar musgo acuático, su\ncomida favorita."
        ko:
          x: "상대에게 공격당하면 전신의\n깃털에서 물보라를 내뿜는다.\n물안개에 숨어들어 도망친다."
          y: "나는 것보다 헤엄치는 것이 특기로\n수중에 잠수해서는 제일 좋아하는\n물이끼를 기쁘게 먹는다."
swanna:
  species_id: 581
  names:
    jp_kana: スワンナ
    jp_kanji: スワンナ
    en: Swanna
    fr: Lakmécygne
    it: Swanna
    de: Swaroness
    es: Swanna
    ko: 스완나
