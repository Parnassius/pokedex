          y: "チョボマキを　おそっているときに\nでんきエネルギーを　あびると\nなぜだか　しんか　してしまうのだ。"
        jp_kanji:
          x: "チョボマキと　一緒に　いるときに\n電気的な　刺激を　受けると\n進化する　不思議な　ポケモンだ。"
          y: "チョボマキを　襲っているときに\n電気エネルギーを　浴びると\nなぜだか　進化　してしまうのだ。"
        en:
          x: "These mysterious Pokémon evolve when they\nreceive electrical stimulation while they are in the\nsame place as Shelmet."
          y: "For some reason they evolve when they receive\nelectrical energy while they are attacking Shelmet."
        fr:
          x: "Un Pokémon mystérieux qui évolue quand il reçoit un\nstimulus électrique en étant proche d’un Escargaume."
          y: "Pour une raison inconnue, ce Pokémon évolue\ns’il subit une décharge électrique pendant qu’il\nattaque un Escargaume."
        it:
          x: "Pokémon misterioso che si evolve ricevendo uno\nstimolo elettrico se si trova in presenza di Shelmet."
          y: "Per qualche motivo, si evolve a contatto dell’energia\nelettrica che si crea quando attacca Shelmet."
        de:
          x: "Ein mysteriöses Pokémon, das sich entwickelt,\nwenn es zusammen mit Schnuthelm einen\nStromschlag abbekommt."
          y: "Bekommt es im Kampf gegen Schnuthelm Strom ab,\nlöst dies aus unerklärlichen Gründen seine\nEntwicklung aus."
        es:
          x: "Si recibe un estímulo eléctrico al estar en contacto con\nun Shelmet, evoluciona."
          y: "Si recibe una descarga eléctrica durante un combate\ncontra un Shelmet, puede evolucionar. Se desconoce\nel porqué."
        ko:
          x: "쪼마리와 함께 있을 때\n전기적인 자극을 받으면\n진화하는 이상한 포켓몬이다."
          y: "쪼마리를 덮쳤을 때\n전기 에너지를 받으면\n왜인지 진화해 버린다."
