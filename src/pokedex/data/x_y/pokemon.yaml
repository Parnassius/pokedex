sawsbuck:
  species_id: 586
  names:
    jp_kana: メブキジカ
    jp_kanji: メブキジカ
    en: Sawsbuck
    fr: Haydaim
    it: Sawsbuck
    de: Kronjuwild
    es: Sawsbuck
    ko: 바라철록
  forms:
    sawsbuck_spring_form:
      form_id: 0
      names:
        jp_kana: はるのすがた
        jp_kanji: はるのすがた
        en: Spring Form
        fr: Forme Printemps
        it: Forma Primavera
        de: Frühlingsform
        es: Forma Primavera
        ko: 봄의 모습
      base_stats:
        hp: 80
        attack: 100
        defense: 70
        special_attack: 60
        special_defense: 70
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - grass
      egg_groups:
        - field
      abilities:
        - chlorophyll
        - sap_sipper
      hidden_ability: serene_grace
      descriptions:
        jp_kana:
          x: "きせつに　よって　すみかを　かえる。\nひとびとは　メブキジカの　ツノで\nきせつの　うつりかわりを　かんじる。"
          y: "きせつの　うつりかわりと　ともに\nすみかを　かえるので　メブキジカが\nはるをはこぶと　いう　ひともいる。"
        jp_kanji:
          x: "季節によって　住処を　変える。\n人々は　メブキジカの　ツノで\n季節の　移り変わりを　感じる。"
          y: "季節の　移り変わりと　ともに\n住処を　変えるので　メブキジカが\n春を運ぶと　いう　人もいる。"
        en:
          x: "They migrate according to the seasons. People can\ntell the season by looking at Sawsbuck’s horns."
          y: "They migrate according to the seasons, so some\npeople call Sawsbuck the harbingers of spring."
        fr:
          x: "Il change d’habitat selon les saisons. Les gens\nconstatent le passage des saisons en regardant\nses ramures."
          y: "Il change d’habitat selon les saisons. Certains disent\nmême qu’il est celui qui apporte le printemps."
        it:
          x: "Cambia dimora a seconda delle stagioni. Gli uomini\nsi accorgono del cambio di stagione osservando le\nsue corna."
          y: "Si spostano da un luogo all’altro al mutare delle\nstagioni. Per questo alcuni dicono che portano con\nsé la primavera."
        de:
          x: "An seinem Geweih kann man ablesen, wann eine\nneue Jahreszeit beginnt. Sein Revier wechselt mit\njeder neuen Jahreszeit."
          y: "Mancherorts sagt man, sie brächten den Frühling,\nda sie je nach Jahreszeit ihr Revier wechseln."
        es:
          x: "Cambia de morada dependiendo de las estaciones.\nObservando sus cuernos, la gente sabe cuándo estas\nvan a cambiar."
          y: "Migra con el cambio de estación, por lo que hay\nquien considera a Sawsbuck el heraldo de la\nprimavera."
        ko:
          x: "계절에 따라 거처를 바꾼다.\n사람들은 바라철록의 뿔에서\n계절의 변화를 느낀다."
          y: "계절의 변화와 함께\n거처를 바꾸기에 바라철록이\n봄을 나른다고 말하는 사람도 있다."
