          y: "おなじ　ブチもようの　パッチールが\nぐうぜんに　であう　かくりつは\n４０おくぶんの１　いかだ。"
        jp_kanji:
          x: "同じ　ブチ模様の　パッチールは\nいない。フラフラした　足取りで\n相手の　ねらいを　外す。"
          y: "同じ　ブチ模様の　パッチールが\n偶然に　出会う　確率は\n４０億分の１　以下だ。"
