          y: "いとに　ついた　あさつゆを　のんで\nしんかの　ときを　まちつづける。\nかたい　マユが　こうげきを　ふせぐ。"
        jp_kanji:
          x: "糸を　木の枝に　巻きつけている。\n糸についた　雨水を　飲みながら\n進化の　ときを　待っている。"
          y: "糸に　ついた　朝露を　飲んで\n進化の　ときを　待ち続ける。\n硬い　繭が　攻撃を　防ぐ。"
        en:
          x: "It wraps silk around the branches of a tree. It drinks\nrainwater on its silk while awaiting evolution."
          y: "It drinks dew that collects on its silk and waits for\nevolution. Its hard cocoon repels attacks."
        fr:
          x: "Il attend d’évoluer dans son cocon de soie accroché\naux branches et se nourrit d’eau de pluie."
          y: "Il boit la rosée récoltée par sa soie en attendant\nd’évoluer. Il est à l’abri dans son robuste cocon."
        it:
          x: "Si appende ai rami con fili di seta. Aspetta l’evoluzione\nbevendo l’acqua piovana che si posa sulla seta."
          y: "Beve la rugiada che si posa sulla seta e aspetta\nl’evoluzione. Il suo bozzolo duro respinge gli attacchi."
        de:
          x: "Es bindet sich mit Seide an Äste und trinkt\nRegenwasser, während es starr auf seine\nEntwicklung wartet."
          y: "Es trinkt den Tau, der sich in der Seide fängt, und\nwartet auf seine Entwicklung. Sein Kokon schützt es."
        es:
          x: "Se agarra con su seda a las ramas de un árbol y\nespera su evolución bebiendo agua de lluvia."
          y: "Bebe el rocío que recoge con su seda mientras espera\nevolucionar. Se defiende en su capullo."
        ko:
          x: "실을 나뭇가지에 휘감고 있다.\n실에 묻은 빗물을 마시며\n진화할 때를 기다리고 있다."
          y: "실에 묻은 아침 이슬을 마시고\n진화할 때를 기다린다.\n단단한 고치가 공격을 막는다."
