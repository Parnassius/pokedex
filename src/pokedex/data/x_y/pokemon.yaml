          y: "きょうてきに　であうと　てくびから\nほのおを　ふきだす。ジャンプで\nビルを　とびこす　きゃくりょく。"
        jp_kanji:
          x: "３０階建ての　ビルを　ジャンプで\n跳び越す　跳躍力。炎の　パンチが\n相手を　焼きつくす。"
