          y: "みみが　おおきく　とおくの　おとを\nきくとき　はばたくように　うごく。\nおこると　どくばりを　だす。"
        jp_kanji:
          x: "草むらの　上に　耳だけ　出して\nまわりの　気配を　探る。\n猛毒の　ツノで　身を　守る。"
          y: "耳が　大きく　遠くの　音を\n聞くとき　はばたくように　動く。\n怒ると　毒針を　出す。"
        en:
          x: "It scans its surroundings by raising its ears out of\nthe grass. Its toxic horn is for protection."
          y: "Its large ears are flapped like wings when it is\nlistening to distant sounds. It extends toxic barbs\nwhen angered."
        fr:
          x: "Il jauge le terrain en laissant ses oreilles dépasser\nde l’herbe. Il se défend avec sa corne toxique."
          y: "Ce Pokémon agite ses oreilles comme pour entendre\ntout ce qui se passe au loin. Il déploie des aiguillons\ntoxiques quand il est en colère."
        it:
          x: "Esamina l’ambiente circostante tendendo le orecchie\nfuori dall’erba. Si protegge con il corno velenoso."
          y: "Solleva le orecchie come ali per captare rumori in\nlontananza. Quando è adirato, estende i baffi velenosi."
        de:
          x: "Es untersucht die Umgebung, indem es die Ohren\nspitzt und lauscht. Sein giftiges Horn schützt es."
          y: "Seine großen Ohren schlagen wie Flügel, wenn es\nGeräusche in weiter Entfernung hört. Es fährt\ngiftige Stacheln aus, wenn es verärgert ist."
        es:
          x: "Saca las orejas por encima de la hierba para explorar\nel territorio. Le protege su cuerno venenoso."
          y: "Cambia la orientación de las grandes orejas que\ntiene para oír mejor. Si se enfada, despliega sus\npúas venenosas."
        ko:
          x: "풀밭 위로 귀만 내어\n주위의 낌새를 살핀다.\n맹독의 뿔로 몸을 보호한다."
          y: "귀가 커서 먼 곳의 소리를\n들을 때 날개 치듯 움직인다.\n화나면 독침을 쏜다."
