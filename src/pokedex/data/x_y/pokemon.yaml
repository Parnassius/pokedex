      descriptions:
        jp_kana:
          x: "やまから　ころがり　おちるとき\nからだの　あちこちが　とれても\nきにしない　ごうかいな　せいかく。"
          y: "さかみちを　ころがりながら　いどう。\nじゃまな　ものは　どんどん\nおしつぶして　すすんでいく。"
        jp_kanji:
          x: "山から　転がり　落ちるとき\n体の　あちこちが　取れても\n気にしない　豪快な　性格。"
          y: "坂道を　転がりながら　移動。\n邪魔な　ものは　どんどん\n押しつぶして　進んでいく。"
        en:
          x: "With a free and uncaring nature, it doesn’t mind\nif pieces break off while it rolls down mountains."
          y: "Rolls down slopes to move. It rolls over any\nobstacle without slowing or changing its direction."
        fr:
          x: "D’une nature téméraire, il se moque de perdre des\nparties de son corps quand il dévale les pentes."
          y: "Pour se déplacer, il dégringole le long des pentes.\nIl pulvérise tous les obstacles qui se trouvent sur\nson passage."
        it:
          x: "Di natura libera e incurante, non si preoccupa se\nperde dei pezzi mentre si rotola giù dai monti."
          y: "Si lancia in discesa, rotolando su ogni ostacolo\nsenza frenare o mutare direzione."
        de:
          x: "Es ist ihm völlig gleichgültig, wenn Stücke aus ihm\nherausbrechen, während es Berge hinabrollt."
          y: "Dieses Pokémon bewegt sich nur rollend fort.\nKein Hindernis kann es vom Kurs abbringen."
        es:
          x: "De naturaleza descuidada y libre, no le importa\ndañarse cuando baja rodando montañas."
          y: "Se mueve rodando cuesta abajo y sobre cualquier\nobstáculo, sin frenar ni cambiar de dirección."
        ko:
          x: "산에서 굴러 떨어질 때\n몸의 여기저기가 부서져도\n신경 쓰지 않는 호쾌한 성격이다."
          y: "언덕을 굴러서 이동한다.\n방해물은 마구\n짓누르며 나아간다."
golem:
