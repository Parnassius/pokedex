          y: "たたかいに　なると　たいないの\nほのおが　はげしく　もえあがる。\nキックは　はかいりょく　ばつぐんだ。"
        jp_kanji:
          x: "１秒間に　キックを　１０発\n繰り出す　足技の　持ち主。\n鋭い　鳴き声で　威嚇する。"
          y: "戦いに　なると　体内の　炎が\n激しく　燃え上がる。\nキックは　破壊力　抜群だ。"
        en:
          x: "Its kicking mastery lets it loose 10 kicks per\nsecond. It emits sharp cries to intimidate foes."
          y: "During a battle, the hot flame in its body increases.\nIts kicks have outstanding destructive power."
        fr:
          x: "Ce maître du coup de pied peut donner 10 coups\npar seconde. Ses cris aigus intimident l’ennemi."
          y: "Au combat, les flammes dans son corps redoublent\nd’intensité. Ses coups de pied sont dévastateurs."
        it:
          x: "Possiede l’abilità di sferrare anche dieci calci al\nsecondo. Emette urla strazianti per intimorire i nemici."
          y: "Quando lotta, il suo fuoco interiore diventa\nincandescente. Sferra calci di notevole potenza\ndistruttiva."
        de:
          x: "Es kann zehn Tritte pro Sekunde austeilen.\nEs gibt schrille Schreie von sich, um Gegner\neinzuschüchtern."
          y: "Im Kampf lodert sein inneres Feuer hoch auf. Wo seine\nmächtigen Tritte landen, wächst kein Gras mehr."
        es:
          x: "Su habilidad le permite dar diez patadas por segundo.\nLanza potentes gritos para intimidar."
          y: "Al pelear, el fuego de su interior se intensifica. Es\ncapaz de propinar unas patadas demoledoras."
        ko:
          x: "1초에 킥을 10번 날릴 정도로\n발을 사용하는 기술에 능하다.\n날카로운 울음소리로 위협한다."
          y: "싸우게 되면 체내의\n불꽃이 세차게 타오른다.\n킥은 파괴력이 굉장하다."
