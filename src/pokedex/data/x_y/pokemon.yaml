          y: "おこると　しゃくねつの　マグマを\nせなかの　コブから　ふきあげる。\nかざんの　かこうに　すみかが　ある。"
        jp_kanji:
          x: "背中の　コブの　火山は\n１０年ごとに　大噴火　するが\n激しく　怒っても　噴火する。"
          y: "怒ると　灼熱の　マグマを\n背中の　コブから　噴き上げる。\n火山の　火口に　住処が　ある。"
        en:
          x: "The volcanoes on its back have a major eruption\nevery 10 years--or whenever it becomes\nreally angry."
          y: "If angered, the humps on its back erupt in a shower\nof molten lava. It lives in the craters of volcanoes."
        fr:
          x: "Les volcans sur son dos entrent en éruption tous\nles dix ans ou chaque fois qu’il se met en colère."
          y: "S’il s’énerve, Camérupt fait jaillir de la lave en fusion\npar les bosses qui se trouvent sur son dos. Il vit dans\nles cratères des volcans."
        it:
          x: "I vulcani sul suo dorso eruttano ogni dieci anni o\nquando è veramente arrabbiato."
          y: "Vive nei crateri dei vulcani. Se è adirato, erutta una\npioggia di lava fusa dalle gobbe sul dorso."
        de:
          x: "Seine Vulkanhöcker brechen nur alle zehn Jahre\naus oder wenn es richtig wütend ist."
          y: "Wenn es wütend ist, regnet es aus den Höckern\nauf seinem Rücken flüssige Lava. Es lebt in den\nKratern von Vulkanen."
        es:
          x: "Los volcanes de su joroba entran en erupción cada\n10 años o cuando Camerupt se enfada mucho."
          y: "Cuando se enfada, las jorobas del lomo entran en\nerupción y expulsan lava. Habita los cráteres de los\nvolcanes."
        ko:
          x: "등의 혹 모양 화산은\n10년마다 대분화하나\n심하게 화가 나도 분화한다."
          y: "화나면 작열하는 마그마를\n등의 혹에서 분출한다.\n화산의 분화구에 거처가 있다."
