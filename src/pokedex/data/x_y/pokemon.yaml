        jp_kana:
          x: "すいめんから　いきおいよく　スミを\nはっしゃして　とんでいる　ムシを\nうちおとす　ことが　あるという。"
          y: "サンゴの　かげに　すみかを　つくる。\nきけんを　かんじると　くちから\nまっくろい　スミを　はいて　にげる。"
        jp_kanji:
          x: "水面から　勢いよく　墨を　発射して\n飛んでいる　虫を\n撃ち落とすことがあるという。"
          y: "サンゴの　陰に　住処を　作る。\n危険を　感じると　口から\n真っ黒い　墨を　吐いて　逃げる。"
        en:
          x: "Known to shoot down flying bugs with precision\nblasts of ink from the surface of the water."
          y: "It makes its nest in the shade of corals. If it senses\ndanger, it spits murky ink and flees."
        fr:
          x: "Il abat les insectes volants en leur tirant un jet\nd’encre depuis la surface de l’eau. Ses tirs sont\ntoujours précis."
          y: "Il niche à l’ombre du corail. Quand il se sent menacé,\nil disparaît dans un nuage d’encre opaque."
        it:
          x: "È noto per i suoi attacchi ai volatili con getti\nd’inchiostro dalla superficie dell’acqua."
          y: "Crea la sua tana all’ombra dei coralli. Se avverte un\npericolo, spruzza inchiostro nero e fugge."
        de:
          x: "Dieses Pokémon schießt mit Tinte auf über der\nWasseroberfläche fliegende Insekten."
          y: "Im Schatten von Korallen legt es sein Nest an.\nBei Gefahr versprüht es Tinte und flieht."
        es:
          x: "Es famoso por derribar a bichos voladores lanzando\ntinta desde la superficie del agua."
          y: "Hace su nido entre los corales. Si se siente en peligro,\nescupe tinta y huye."
        ko:
          x: "수면에서 힘차게 먹물을\n발사해서 날고 있는 벌레를\n맞춰서 떨어뜨릴 때가 있다고 한다."
          y: "산호의 그늘에 거처를 만든다.\n위험을 느끼면 입에서\n새까만 먹물을 내뿜고 도망간다."
