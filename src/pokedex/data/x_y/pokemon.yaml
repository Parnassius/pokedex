          y: "おちばが　はっこうする　ねつで\nタマゴを　あたためる。クルミルに\nはっぱで　おくるみを　つくる。"
        jp_kanji:
          x: "幼い　ポケモンを　みつけると\n口から　出す　粘着糸で\n葉っぱの　服を　縫ってあげる。"
          y: "落ち葉が　発酵する　熱で\nタマゴを　温める。クルミルに\n葉っぱで　おくるみを　作る。"
        en:
          x: "Upon finding a small Pokémon, it weaves clothing\nfor it from leaves by using the sticky silk secreted\nfrom its mouth."
          y: "It keeps its eggs warm with heat from fermenting\nleaves. It also uses leaves to make warm wrappings\nfor Sewaddle."
        fr:
          x: "Il fabrique des vêtements de feuilles pour les\nPokémon encore jeunes grâce à son fil de soie\nadhésif."
          y: "Il réchauffe les Œufs avec la chaleur de l’humus.\nIl fabrique des langes pour les Larveyette avec\ndes feuilles."
        it:
          x: "Quando incontra un giovane Pokémon gli fa un\nvestito di foglie che cuce con il filo appiccicoso\nprodotto dalla bocca."
          y: "Sfrutta il calore dell’humus per covare le sue uova\ne fabbrica coperte di foglie per avvolgere Sewaddle."
        de:
          x: "Begegnet es einem jungen Pokémon, näht es ihm\nmit den klebrigen Fäden aus seinem Mund\nein Kleid aus Blättern."
          y: "Nutzt die Hitze kompostierenden Laubes zum\nAusbrüten von Eiern. Es fertigt aus Blättern\nKleidchen für Strawickl an."
        es:
          x: "Si se encuentra con un Pokémon joven, segrega por la\nboca hilos pegadizos con los que le teje una prenda\nde ropa."
          y: "Calienta sus huevos con el calor desprendido por el\nhumus. Hace mantillas con las hojas para Sewaddle."
        ko:
          x: "어린 포켓몬을 보면\n입에서 내뿜는 점착실로\n잎사귀의 옷을 지어 준다."
          y: "낙엽이 발효되는 열로\n알을 따뜻하게 한다. 잎사귀로\n두르보의 포대기를 만든다."
