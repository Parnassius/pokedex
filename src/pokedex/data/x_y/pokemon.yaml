          y: "よろいに　しこまれた　つるぎの\nひとふりで　あいてを　たおす。\nひとにらみで　てきを　だまらせる。"
        jp_kanji:
          x: "敵が　瞬きする　あいだに\n前足に　ついた　アシガタナで\n相手を　切りつけ　元に戻せる。"
          y: "よろいに　仕込まれた　剣の　一振りで\n相手を　倒す。\nひとにらみで　敵を　黙らせる。"
        en:
          x: "In the time it takes a foe to blink, it can draw and\nsheathe the seamitars attached to its front legs."
          y: "One swing of the sword incorporated in its armor\ncan fell an opponent. A simple glare from one of\nthem quiets everybody."
        fr:
          x: "Il dissimule de grandes lames qu’il dégaine en un\néclair des fourreaux de ses pattes antérieures."
          y: "Il peut terrasser ses ennemis d’un coup de la lame\nenchâssée dans son armure, et les faire taire d’un\nseul regard."
        it:
          x: "Riesce a estrarre le sue spade, colpire il nemico\ne riporle al loro posto nelle zampe anteriori in un\nbatter d’occhio."
          y: "Atterra l’avversario con un solo colpo della spada\ninserita nell’armatura. Una sua occhiata ammutolisce\nil nemico."
        de:
          x: "Ehe man sichs versieht, hat es schon das\nLangschwert aus seinen Vorderbeinen gezogen\nund seinen Gegner besiegt."
          y: "Besiegt Gegner durch einen einzigen Hieb mit\nder Klinge an seinem Panzer. Ein böser Blick\nund seine Feinde verstummen."
        es:
          x: "En un abrir y cerrar de ojos, puede desenvainar y\nenvainar los sables que hay en sus patas delanteras."
          y: "Derriba a su rival con un solo tajo del sable que lleva\nen su coraza. Acalla al enemigo con una simple\nmirada."
        ko:
          x: "상대가 눈을 깜빡이는 동안에\n앞다리에 붙어 있는 각검으로\n상대를 베고 원래대로 되돌린다."
          y: "갑옷에 내장된 검으로 한칼에\n상대를 제압한다.\n눈빛만으로 상대를 침묵시킨다."
