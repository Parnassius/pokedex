        jp_kanji:
          x: "火花の　ボンボンを　作って\n仲間を　応援する。\n電柱から　電気を　吸い取る。"
          y: "電柱から　電気を　吸い取る。\n体に　ためた　電気を\nショートさせて　音を　出す。"
        en:
          x: "It cheers on friends with pom-poms made of sparks.\nIt drains power from telephone poles."
          y: "It absorbs electricity from telephone poles. It shorts\nout its body to create crackling noises."
        fr:
          x: "Il absorbe l’énergie des poteaux électriques et\nencourage ses amis avec des pompons d’étincelles."
          y: "Il absorbe l’énergie des poteaux électriques et\ncourt-circuite son corps pour produire du bruit."
        it:
          x: "Incoraggia gli amici con un vivace scoppiettio di\nscintille. Assorbe elettricità dai pali telefonici."
          y: "Assorbe elettricità dai pali della luce, la accumula\ne poi crea dei rumorosi cortocircuiti."
        de:
          x: "Es feuert Freunde mit Pompons an, die aus\nFunken bestehen. Es holt sich Energie aus\nTelegrafenmasten."
          y: "Es holt sich Energie aus Telegrafenmasten.\nWenn es diese entlädt, hört man ein lautes Prasseln."
        es:
          x: "Anima a sus compañeros con pompones de chispas.\nRoba energía de los postes telefónicos."
          y: "Absorbe electricidad de los postes de teléfono.\nLa almacena en su cuerpo y crea cortocircuitos."
        ko:
          x: "스파크를 톡톡 만들어\n동료를 응원한다.\n전신주에서 전기를 흡수한다."
          y: "전신주에서 전기를 흡수한다.\n몸에 모은 전기를\n합선시켜 소리를 낸다."
