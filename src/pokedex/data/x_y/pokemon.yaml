          x: "おおきな　こおりを　キバで　くだく。\nあつい　しぼうは　さむさだけでなく\nてきの　こうげきも　はねかえす。"
          y: "たくましい　キバで　りゅうひょうを\nふんさいする。ぶあつい　しぼうが\nてきの　こうげきを　はねかえす。"
        jp_kanji:
          x: "大きな　氷を　キバで　砕く。\n厚い　脂肪は　寒さだけでなく\n敵の　攻撃も　はね返す。"
          y: "たくましい　キバで　流氷を\n粉砕する。分厚い　脂肪が\n敵の　攻撃を　跳ね返す。"
        en:
          x: "It shatters ice with its big tusks. Its thick blubber\nrepels not only the cold, but also enemy attacks."
          y: "It shatters drift ice with its strong tusks. Its thick\nlayer of blubber repels enemy attacks."
        fr:
          x: "Il brise la glace avec ses grosses défenses.\nSa graisse le protège du froid, mais aussi des\nattaques."
          y: "Ses robustes défenses pulvérisent la glace, et son\népaisse couche de graisse repousse les attaques."
        it:
          x: "Frantuma il ghiaccio con le zanne. Lo spesso strato\nadiposo respinge il freddo e gli attacchi nemici."
          y: "Frantuma il ghiaccio con le potenti zanne. Il suo\nspesso strato adiposo respinge gli attacchi nemici."
        de:
          x: "Mit seinen Stoßzähnen bricht es durch Eis.\nEine Speckschicht schützt es vor Kälte und Angriffen."
          y: "Seine kräftigen Stoßzähne können Eisschollen\nzerschmettern. Sein dicker Speck wehrt Angriffe ab."
        es:
          x: "Rompe el hielo con sus colmillos. Su gruesa capa de\ngrasa le protege del frío y de los enemigos."
          y: "Sus fuertes colmillos destrozan los témpanos de hielo.\nSu capa de grasa lo protege de sus enemigos."
        ko:
          x: "큰 얼음을 이빨로 부순다.\n두꺼운 지방은 추위뿐만 아니라\n상대의 공격도 이겨낸다."
          y: "믿음직한 송곳니로 유빙을\n부스러뜨린다. 두꺼운 지방으로\n적의 공격을 이겨낸다."
clamperl:
