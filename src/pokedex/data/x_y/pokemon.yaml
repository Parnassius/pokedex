      descriptions:
        jp_kana:
          x: "１ぴきの　でんりょくは　ちいさいが\nたくさんの　シビシラスが　つながると\nカミナリと　おなじ　いりょくになる。"
          y: "よわい　でんきしか　だせないので\nたくさんの　シビシラスで　あつまり\nきょうりょくな　でんきを　はなつ。"
        jp_kanji:
          x: "１匹の　電力は　小さいが\nたくさんの　シビシラスが　つながると\n雷と　同じ　威力になる。"
          y: "弱い　電気しか　だせないので\nたくさんの　シビシラスで　集まり\n強力な　電気を　放つ。"
        en:
          x: "While one alone doesn’t have much power, a chain\nof many Tynamo can be as powerful as lightning."
          y: "One alone can emit only a trickle of electricity,\nso a group of them gathers to unleash a powerful\nelectric shock."
        fr:
          x: "Tout seuls, ils ne dégagent pas beaucoup\nd’électricité, mais un banc d’Anchwatt produit la\nmême puissance qu’un éclair."
          y: "Tout seul, il ne dégage pas beaucoup d’électricité.\nMais un banc d’Anchwatt produit des décharges\nsurpuissantes."
        it:
          x: "La carica elettrica di un Tynamo è debole, ma se\npiù esemplari si uniscono raggiungono la potenza\ndi un fulmine."
          y: "Da soli producono poca elettricità, per cui formano\ndei grossi branchi se vogliono lanciare una scossa\npiù potente."
        de:
          x: "Allein erzeugt es nur wenig Strom, doch tritt es\ngeschlossen im Schwarm auf, gleicht seine Kraft\nder eines Blitzes."
          y: "Alleine erzeugen sie nur geringe Mengen an\nElektrizität, aber im Schwarm können sie\nmächtige Stromsalven abfeuern."
        es:
          x: "La electricidad de uno solo es diminuta, pero, si\nmultitud de Tynamo se conectan, consiguen la\npotencia de un rayo."
          y: "Apenas puede generar energía por sí mismo, pero un\nbanco de Tynamo puede crear violentas descargas\neléctricas."
        ko:
          x: "한 마리의 전력은 적지만\n많은 저리어가 연결되면\n번개와 같은 위력이 된다."
          y: "약한 전기밖에 낼 수 없어\n많은 저리어가 모여서\n강력한 전기를 발산한다."
eelektrik:
