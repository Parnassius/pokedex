        - monster
      abilities:
        - refrigerate
      hidden_ability: snow_warning
      descriptions:
        jp_kana:
          x: "マイナス１５０どの　れいきを\nひしがたの　けっしょうから　だして\nてきを　つつみ　こおりづけにする。"
          y: "ひしがたの　けっしょうで　こおりの\nかべを　しゅんかんてきに　つくり\nてきの　こうげきを　ふせぐのだ。"
        jp_kanji:
          x: "マイナス１５０度の　冷気を\nひし形の　結晶から　出して\n敵を　包み　氷漬けにする。"
          y: "ひし形の　結晶で\n氷の　壁を　瞬間的に　作り\n敵の　攻撃を　防ぐのだ。"
        en:
          x: "The diamond-shaped crystals on its body\nexpel air as cold as -240 degrees Fahrenheit,\nsurrounding its enemies and encasing them in ice."
          y: "Using its diamond-shaped crystals,\nit can instantly create a wall of\nice to block an opponent’s attack."
        fr:
          x: "Les cristaux qui parsèment son corps lui permettent\nde piéger ses ennemis dans la glace en émettant\nde l’air refroidi à -150 °C."
          y: "En utilisant ses cristaux, il peut créer en un instant\nun mur de glace pour se protéger des attaques\nennemies."
        it:
          x: "Emette aria gelida a -150 °C dai cristalli romboidali che\nha sul corpo congelando i nemici."
          y: "Si difende dagli attacchi dei nemici creando in pochi\nistanti un muro di ghiaccio grazie ai cristalli romboidali\ndel suo corpo."
        de:
          x: "Mit der -150 °C kalten Luft, die den\ndiamantförmigen Kristallen auf seinem\nKörper entströmt, friert es Gegner ein."
          y: "Es nutzt seine diamantförmigen Kristalle, um im Nu\neine Wand aus Eis zur Abwehr gegnerischer Angriffe\nzu erschaffen."
        es:
          x: "Expulsa un gas gélido a temperaturas inferiores a los\n-150 ºC a través de sus cristales romboides y congela\nasí a su enemigo."
          y: "Gracias a sus cristales con forma de rombo, puede\ncrear al momento una barrera de hielo para bloquear\nel ataque de su enemigo."
        ko:
          x: "마이너스 150도의 냉기를\n마름모꼴의 결정에서 내뿜어\n적을 감싸 얼어붙게 한다."
          y: "마름모꼴의 결정으로\n얼음벽을 순간적으로 만들어\n적의 공격을 막는다."
