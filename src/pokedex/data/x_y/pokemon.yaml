        it:
          x: "Pokémon nato da un’antica statuetta d’argilla\nportata in vita da misteriose radiazioni."
          y: "Si tramanda che sia una statuetta d’argilla creata\ndagli antichi 20.000 anni fa che ha preso vita."
        de:
          x: "Eine antike Lehmstatue, die durch ein mysteriöses\nLicht zum Leben erwacht ist."
          y: "In die Puppe, die Menschen vor 20 000 Jahren aus\nLehm formten, ist anscheinend Leben eingefahren."
        es:
