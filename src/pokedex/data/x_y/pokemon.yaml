          y: "こだいとしの　まもりがみ。\nいつも　おなじルートを　じゅんかいし\nしんにゅうしゃを　みはっていた。"
        jp_kanji:
          x: "古代都市の　守り神だった。\n縄張りに　侵入した　敵を\nサイコパワーで　攻撃する。"
          y: "古代都市の　守り神。\nいつも　同じルートを　巡回し\n侵入者を　見張っていた。"
        en:
          x: "The guardians of an ancient city, they use their\npsychic power to attack enemies that invade\ntheir territory."
          y: "The guardians of an ancient city, they always fly\nthe same route while keeping watch for invaders."
        fr:
          x: "Il était le dieu protecteur d’une ville antique.\nIl repoussait les envahisseurs à coups de pouvoir\npsychique."
          y: "Dieu protecteur d’une ville antique, il suivait toujours\nle même itinéraire afin de prévenir tout risque\nd’invasion."
        it:
          x: "Era lo spirito custode di un’antica città. Attaccava\ncon poteri psichici i nemici che invadevano il suo\nterritorio."
          y: "Era lo spirito custode di un’antica città. Percorreva\nsempre lo stesso percorso per assicurarsi che non\nci fossero intrusi."
        de:
          x: "Einst war es der Wächter einer Stadt aus uralten\nZeiten. Wer sich in sein Revier wagt, lernt seine\nPsycho-Kräfte kennen."
          y: "Vor langer Zeit war es der Wächter einer Stadt.\nEs fliegt auf der Suche nach Eindringlingen immer\ndieselbe Route ab."
        es:
          x: "Fue la deidad protectora de una ciudad milenaria.\nAtaca con su poder psíquico a los enemigos que\ninvaden su territorio."
          y: "Deidad protectora de una antigua ciudad. Siempre\nmerodea por la misma ruta y permanece alerta en\nbusca de intrusos."
        ko:
          x: "고대 도시의 수호신이었다.\n자기 영역을 침범한 상대를\n사이코 파워로 공격한다."
          y: "고대 도시의 수호신.\n항상 같은 루트를 순회하며\n침입자를 감시하고 있었다."
yamask:
