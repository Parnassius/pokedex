          y: "５０ねんまえ　ＵＦＯが\nついらくしたと　うわさされる\nさばくから　やってきたと　いわれる。"
        jp_kanji:
          x: "強力な　サイコパワーを　操る。\nサイコパワーで　相手の　脳みそを\n絞めつけて　頭痛を　起こさせる。"
          y: "５０年前　ＵＦＯが\n墜落したと　うわさされる\n砂漠から　やってきたと　いわれる。"
        en:
          x: "It uses its strong psychic power to squeeze its\nopponent’s brain, causing unendurable headaches."
          y: "Rumors of its origin are linked to a UFO crash site\nin the desert 50 years ago."
        fr:
          x: "Avec son puissant pouvoir psychique, il peut\ncompresser le cerveau de ses ennemis et déclencher\ndes migraines."
          y: "On dit qu’il est apparu soudainement il y a 50 ans\ndes confins d’un désert où un OVNI se serait écrasé."
        it:
          x: "Con i suoi incredibili poteri psichici comprime il\ncervello dei suoi nemici provocando loro fortissime\nemicranie."
          y: "Si dice che sia arrivato 50 anni fa da un deserto in\ncui sembra si sia schiantato un UFO."
        de:
          x: "Es verfügt über mächtige Psycho-Kräfte, mit denen\nes die Hirne seiner Gegner verwirrt, um ihnen\nKopfweh zu bereiten."
          y: "Man sagt, es sei vor 50 Jahren aus den Tiefen einer\nWüste erschienen, in der zuvor angeblich ein UFO\nabgestürzt war."
        es:
          x: "Posee un gran poder psíquico. Lo usa para comprimir\nel cerebro del enemigo y ocasionarle dolores de\ncabeza."
          y: "Según cuentan los rumores, procede de un desierto\ndonde hace 50 años se estrelló un ovni."
        ko:
          x: "강력한 사이코 파워를 다룬다.\n사이코 파워로 상대의 뇌를\n조여서 두통을 일으킨다."
          y: "50년 전 UFO가\n추락했다는 소문이 도는\n사막에서 왔다고 전해진다."
beheeyem:
