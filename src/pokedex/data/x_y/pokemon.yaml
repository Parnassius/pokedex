      descriptions:
        jp_kana:
          x: "ぜんしんの　さいぼうを　くみかえて\nみたものの　かたち　そっくりに\nへんしんする　のうりょくを　もつ。"
          y: "からだの　さいぼうの　つくりを\nじぶんで　くみかえて　ほかの\nせいめいたいに　へんしんする。"
        jp_kanji:
          x: "全身の　細胞を　組み替えて\n見たものの　形　そっくりに\n変身する　能力を　持つ。"
          y: "体の　細胞の　作りを\n自分で　組み替えて\nほかの　生命体に　変身する。"
        en:
          x: "It has the ability to reconstitute its entire cellular\nstructure to transform into whatever it sees."
          y: "It can freely recombine its own cellular structure to\ntransform into other life-forms."
        fr:
          x: "Il a la capacité de modifier sa structure cellulaire pour\nprendre l’apparence de ce qu’il voit."
          y: "Métamorph peut modifier sa structure cellulaire à\nsa guise pour se transformer en n’importe quelle\nforme vivante."
        it:
          x: "Ha la capacità di modificare la sua struttura cellulare\nper trasformarsi in qualsiasi cosa veda."
          y: "Può ricombinare a piacere la propria struttura\ncellulare per trasformarsi in altri esseri viventi."
        de:
          x: "Es kann seine Zellstruktur so verändern, dass es\nsich in alles verwandeln kann, was es sieht."
          y: "Es kann seine eigene Zellstruktur frei zusammensetzen\nund sich in jede andere Lebensform verwandeln."
        es:
          x: "Puede alterar por completo su estructura celular para\nemular cualquier objeto que vea."
          y: "Tiene la capacidad de reorganizar su estructura celular\npara convertirse en otras formas de vida."
        ko:
          x: "전신의 세포를 재구성해서\n본 것의 모양과 똑 닮게\n변신하는 능력을 가지고 있다."
          y: "몸의 세포 구성을\n스스로 바꿔서 다른\n생명체로 변신한다."
