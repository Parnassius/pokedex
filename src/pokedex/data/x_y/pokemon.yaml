litleo:
  species_id: 667
  names:
    jp_kana: シシコ
    jp_kanji: シシコ
    en: Litleo
    fr: Hélionceau
    it: Litleo
    de: Leufeo
    es: Litleo
    ko: 레오꼬
  forms:
    litleo:
      form_id: 0
      base_stats:
        hp: 62
        attack: 50
        defense: 58
        special_attack: 73
        special_defense: 54
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fire
        - normal
      egg_groups:
        - field
      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          x: "つよい　あいてに　たちむかうときほど\nたてがみが　こうおんになり\nぜんしんに　ちからが　みなぎるのだ。"
          y: "つよくなるため　むれを　はなれて\n１ぴきで　せいかつするようになる。\nけっきさかんで　けんかっぱやい。"
        jp_kanji:
          x: "強い　相手に　立ち向かうときほど\nたてがみが　高温になり\n全身に　力が　みなぎるのだ。"
          y: "強くなるため　群れを　離れて\n１匹で　生活するようになる。\n血気盛んで　ケンカっ早い。"
        en:
          x: "The stronger the opponent it faces,\nthe more heat surges from its mane\nand the more power flows through its body."
          y: "They set off on their own from their pride\nand live by themselves to become stronger.\nThese hot-blooded Pokémon are quick to fight."
        fr:
          x: "Plus l’adversaire auquel il est confronté est fort,\nplus la température de sa crinière augmente, l’énergie\ngénérée se diffusant alors dans tout son corps."
          y: "Il n’hésite pas à quitter la horde et à mener une\nexistence solitaire pour mieux pouvoir s’entraîner.\nIl a le sang chaud et ne rechigne pas au combat."
        it:
          x: "Più l’avversario che affronta è temibile, più la sua\ncriniera si scalda, aumentandone la forza."
          y: "Si allontana dal gruppo e inizia una vita solitaria per\ndiventare più forte. Ha un carattere impetuoso ed è\nsempre pronto a gettarsi nella mischia."
        de:
          x: "Je stärker sein Gegner ist, desto heißer wird seine\nMähne und umso kraftvoller wird es."
          y: "Sie verlassen ihr Rudel schon sehr früh, um stärker\nzu werden und auf eigenen Pfoten zu stehen.\nSie sind sehr hitzköpfig und streitlustig."
        es:
          x: "Cuanto más poderoso es el enemigo al que se\nenfrenta, más calor desprende su mechón y más\nenergía recorre todo su cuerpo."
          y: "Se separa de su manada para hacerse más fuerte\ny aprender a valerse por sí mismo. Su excesiva\nfogosidad le hace saltar a la mínima."
        ko:
          x: "강한 상대에게 맞설 때일수록\n갈기의 온도가 높아지고\n전신에 힘이 넘쳐난다."
          y: "강해지기 위해 무리를 벗어나\n홀로 생활하게 된다.\n혈기 왕성하여 쉽게 싸우려 든다."
pyroar:
  species_id: 668
  names:
    jp_kana: カエンジシ
    jp_kanji: カエンジシ
    en: Pyroar
    fr: Némélios
    it: Pyroar
    de: Pyroleo
    es: Pyroar
    ko: 화염레오
  forms:
    pyroar:
      form_id: 0
      base_stats:
        hp: 86
        attack: 68
        defense: 72
        special_attack: 109
        special_defense: 66
        speed: 106
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
        - normal
      egg_groups:
        - field
      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          x: "むれの　なかで　いちばん　おおきな\nほのおの　たてがみを　もつ　オスが\nリーダーとして　なかまを　ひきいる。"
          y: "せっし６０００どの　いきを　はきだし\nはげしく　あいてを　いかくする。\nメスが　むれの　こどもを　まもる。"
        jp_kanji:
          x: "群れの　中で　一番　大きな　炎の\nたてがみを　持つ　オスが\nリーダーとして　仲間を　率いる。"
          y: "摂氏６０００度の　息を　吐き出し\n激しく　相手を　威嚇する。\nメスが　群れの　子供を　守る。"
        en:
          x: "The male with the largest mane of fire\nis the leader of the pride."
          y: "With fiery breath of more than 10,000 degrees\nFahrenheit, they viciously threaten any challenger.\nThe females protect the pride’s cubs."
        fr:
          x: "Le mâle qui possède la crinière de feu la plus\nimposante devient le chef de la horde."
          y: "Son souffle peut atteindre les 6 000 °C et il s’en sert\npour intimider l’ennemi. Dans la horde, les femelles\nprotègent les petits."
        it:
          x: "Di solito, il maschio con la criniera fiammeggiante\npiù ampia guida i compagni del gruppo."
          y: "Minaccia furiosamente i nemici soffiando aria a una\ntemperatura che raggiunge i 6000 °C. Le femmine\nproteggono i piccoli del gruppo."
        de:
          x: "Das Männchen mit der prächtigsten Feuermähne\nführt das Rudel an."
          y: "Sie bedrohen ihre Gegner, indem sie 6 000 °C heiße\nAtemluft ausstoßen. Die Weibchen beschützen die\nJungen des Rudels."
        es:
          x: "El macho con la melena de fuego más grande de toda\nla manada es el líder de sus compañeros."
          y: "Intimida con ferocidad al enemigo exhalando su aliento\nabrasador a 6000 °C de temperatura. Las hembras\nprotegen a los cachorros de la manada."
        ko:
          x: "무리 중에서 가장 커다란\n불꽃 갈기를 지닌 수컷이\n리더로서 동료들을 이끈다."
          y: "섭씨 6000도의 숨을 내뿜어\n격렬하게 상대를 위협한다.\n암컷이 무리의 새끼를 지킨다."
flabebe:
  species_id: 669
  names:
    jp_kana: フラベベ
    jp_kanji: フラベベ
    en: Flabébé
    fr: Flabébé
    it: Flabébé
    de: Flabébé
    es: Flabébé
    ko: 플라베베
  forms:
    flabebe_red_flower:
      form_id: 0
      names:
        jp_kana: あかいはな
        jp_kanji: あかいはな
        en: Red Flower
        fr: Fleur Rouge
        it: Fiore Rosso
        de: Rotblütler
        es: Flor Roja
        ko: 빨간 꽃
      base_stats:
        hp: 44
        attack: 38
        defense: 39
        special_attack: 61
        special_defense: 79
        speed: 42
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          x: "はなの　ひめた　ちからを　ひきだして\nじざいに　あやつる。フラベベが　もつ\nはなは　もはや　からだの　いちぶだ。"
          y: "きにいった　はなを　みつけると\nいっしょう　その　はなと　くらす。\nかぜに　のって　きままに　ただよう。"
        jp_kanji:
          x: "花の　秘めた　力を　引き出して\n自在に　操る。フラベベが　持つ　花は\nもはや　体の　一部だ。"
          y: "気に入った　花を　見つけると\n一生　その花と　暮らす。\n風に　乗って　気ままに　漂う。"
        en:
          x: "It draws out and controls the hidden power\nof flowers. The flower Flabébé holds\nis most likely part of its body."
          y: "When it finds a flower it likes, it dwells on\nthat flower its whole life long. It floats in the\nwind’s embrace with an untroubled heart."
        fr:
          x: "Capable de libérer et de contrôler la force cachée\ndes plantes. La fleur qu’il tient fait partie de lui."
          y: "Après avoir trouvé une fleur à son goût, il ne la quitte\nplus de toute sa vie. Il se laisse porter au gré du vent."
        it:
          x: "È in grado di controllare a piacimento la forza\nnascosta dei fiori. Il fiore a cui si aggrappa fa\nparte del suo stesso corpo."
          y: "Una volta trovato un fiore di suo gradimento, rimane\nin simbiosi con esso per tutta la vita. Va in giro\nlasciandosi trasportare dal vento."
        de:
          x: "Es entlockt Blumen ihre geheimen Kräfte und\nkontrolliert diese nach Belieben. Die Blume,\ndie es trägt, ist wie ein Teil seines Körpers."
          y: "Hat es eine Blume gefunden, die ihm gefällt, lebt es\nsein Leben lang in Symbiose mit ihr. Es lässt sich\nunbekümmert vom Wind treiben."
        es:
          x: "Puede controlar el poder oculto de las flores. La flor\nque lleva consigo es como si formara parte de su\ncuerpo."
          y: "En cuanto encuentra una flor de su agrado, la\nconvierte en su hogar para toda la vida.\nFlota en el aire a su antojo cabalgando el viento."
        ko:
          x: "꽃의 숨겨진 힘을 끌어내어\n자유자재로 조종한다. 플라베베가 지닌\n꽃은 이미 몸의 일부다."
          y: "마음에 든 꽃을 발견하면\n평생을 그 꽃과 지낸다.\n바람을 타고 내키는 대로 떠다닌다."
