        jp_kana:
          x: "さばくで　せいかつする。たいようの\nひかりを　あびて　はつでんすれば\nエサを　たべなくても　へいきなのだ。"
          y: "あたまの　りょうわきの　ひだには\nたいようの　ひかりを　あびると\nはつでんする　さいぼうが　あるのだ。"
        jp_kanji:
          x: "砂漠で　生活する。\n太陽の　光を　浴びて　発電すれば\nエサを　食べなくても　平気なのだ。"
          y: "頭の　両わきの　ひだには\n太陽の　光を　浴びると\n発電する　細胞が　あるのだ。"
        en:
          x: "They make their home in deserts. They can\ngenerate their energy from basking in the sun,\nso eating food is not a requirement."
          y: "The frills on either side of its head have cells\nthat generate electricity when exposed to sunlight."
        fr:
          x: "Ce Pokémon vit dans le désert.\nIl n’a pas besoin de se nourrir, car il est capable\nd’absorber l’énergie du soleil."
          y: "Les plis de peau de chaque côté de sa tête sont\ndotés de cellules produisant de l’électricité quand\nelles sont exposées à la lumière du soleil."
        it:
          x: "Vive nei deserti. Può produrre energia elettrica\nsfruttando la luce solare e, grazie a essa, può\nsopravvivere anche senza mangiare."
          y: "Le pieghe ai due lati della testa contengono cellule\nin grado di convertire la luce solare in energia\nelettrica."
        de:
          x: "Es ist in der Wüste zu Hause und wandelt\ndie Energie der Sonne in Körperkraft um,\nwodurch es auch ohne Nahrung auskommt."
          y: "Die Zellen der Hautlappen, die sich beidseitig an\nseinem Kopf befinden, erzeugen Strom, wenn sie\nvon Sonnenstrahlen beschienen werden."
        es:
          x: "Habita en los desiertos y, cuando toma el sol, acumula\nenergía, lo que le permite vivir sin la necesidad de\ningerir alimentos."
          y: "Bajo los pliegues situados a ambos lados de la cabeza\nresiden células que, al exponerse a la luz del sol, son\ncapaces de generar electricidad."
        ko:
          x: "사막에서 생활한다. 태양의\n빛을 쬐고 발전하면\n먹이를 먹지 않아도 괜찮다."
          y: "머리의 양측 주름에는\n태양의 빛을 쐬면\n발전하는 세포가 있다."
