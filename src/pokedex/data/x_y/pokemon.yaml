        es:
          x: "Almacena llamas en su cuerpo, que alcanza una\ntemperatura de 900 °C antes de un combate."
          y: "Almacena llamas en el interior de su cuerpo. Tras\ninhalar profundamente, las lanza a una temperatura\nde 1700 °C."
        ko:
          x: "체내에 불꽃 주머니를 가지고 있다.\n싸움이 시작되기 직전에는\n체온이 900도까지 올라간다."
          y: "체내에 불꽃 주머니가 있어\n깊이 숨을 들이킨 후\n1700도의 불을 내뿜는다."
