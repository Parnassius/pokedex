          y: "ビクティニが　むげんに　うみだす\nエネルギーを　わけあたえてもらうと\nぜんしんに　パワーが　あふれだす。"
        jp_kanji:
          x: "勝利を　もたらす　ポケモン。\nビクティニを　連れた　トレーナーは\nどんな　勝負にも　勝てるという。"
          y: "ビクティニが　無限に　生み出す\nエネルギーを　分け与えてもらうと\n全身に　パワーが　あふれ出す。"
        en:
          x: "This Pokémon brings victory. It is said that Trainers\nwith Victini always win, regardless of the type\nof encounter."
          y: "When it shares the infinite energy it creates,\nthat being’s entire body will be overflowing\nwith power."
        fr:
          x: "Un Pokémon qui amène la victoire. On dit que les\nDresseurs qui le possèdent peuvent gagner n’importe\nquel combat."
          y: "L’énergie sans limites qu’il produit donne une force\nincroyable à ceux qui entrent en contact avec elle."
        it:
          x: "Pokémon che porta la vittoria. Si dice che l’Allenatore\nche ha con sé Victini possa vincere qualsiasi lotta."
          y: "Può condividere l’energia infinita che emana,\ndonando un potere immenso a chi la riceve."
        de:
          x: "Ein siegverheißendes Pokémon. Man sagt,\nTrainer, die ein Victini in ihrem Team haben,\nseien unschlagbar."
          y: "Jeder, dem Victini seine grenzenlose Energie\nzuteilwerden lässt, strotzt nur so vor Kraft."
        es:
          x: "Pokémon que atrae la victoria. Dicen que el\nEntrenador que lo lleve saldrá vencedor de\ncualquier batalla."
          y: "Cuando Victini comparte su energía ilimitada, esa\npersona o Pokémon irradia abundante poder."
        ko:
          x: "승리를 부르는 포켓몬이다.\n비크티니와 함께하는 트레이너는\n그 어떤 승부에서도 승리한다고 한다."
          y: "비크티니가 무한히 만들어내는\n에너지를 나누어 받으면\n전신에 파워가 넘친다."
snivy:
