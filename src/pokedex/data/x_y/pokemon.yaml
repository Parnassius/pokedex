          y: "あたまの　てっぺんから　どくほうしを\nふきだす。ほうしを　すいこむと\nからだの　ふしぶしが　いたくなる。"
        jp_kanji:
          x: "湿った　場所を　好み　昼間は\n森の　木陰で　じっと　している。\n頭から　毒の　粉を　出す。"
          y: "頭の　てっぺんから　毒胞子を\n噴き出す。胞子を　吸いこむと\n体の　節々が　痛くなる。"
        en:
          x: "It prefers damp places. By day it remains still in\nthe forest shade. It releases toxic powder from\nits head."
          y: "It spouts poison spores from the top of its head.\nThese spores cause pain all over if inhaled."
        fr:
          x: "Il préfère les endroits humides. La journée, il reste\nà la lisière de la forêt. Il libère de la poudre toxique\npar sa tête."
          y: "Le sommet de sa tête libère des spores\nempoisonnées. Il est dangereux de les inhaler."
        it:
          x: "Predilige le aree umide. Di giorno resta immobile\nnell’ombra della foresta. Dal capo rilascia polvere\ntossica."
          y: "Sparge spore tossiche dalla sommità del capo. Se\ninalate, queste spore provocano dolore in tutto il\ncorpo."
        de:
          x: "Es bevorzugt feuchte Orte. Am Tag sitzt es\nregungslos im Schatten des Waldes. Von seinem\nKopf sondert es einen giftigen Puder ab."
          y: "Es setzt an seinem Kopf Giftsporen frei. Werden diese\neingeatmet, verursachen sie Schmerzen."
        es:
          x: "Prefiere los sitios húmedos. De día está tranquilamente\nen el bosque, a la sombra. Expulsa polvo tóxico por la\ncabeza."
          y: "Lanza esporas venenosas desde la parte superior de\nla cabeza. Inhalarlas es muy doloroso."
        ko:
          x: "습한 장소를 좋아해서 낮에는\n숲의 그늘에서 가만히 있다.\n머리에서 독가루를 뿌린다."
          y: "머리의 정수리에서 독 포자를\n뿜어낸다. 포자를 들이마시면\n몸의 마디마디가 아파진다."
