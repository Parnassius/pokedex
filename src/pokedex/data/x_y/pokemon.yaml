wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    jp_kanji: ソーナンス
    en: Wobbuffet
    fr: Qulbutoké
    it: Wobbuffet
    de: Woingenau
    es: Wobbuffet
    ko: 마자용
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          x: "ひかりや　ショックを　きらう。\nこうげきされると　からだが　ふくらみ\nはんげきが　きょうりょくに　なる。"
          y: "まっくろな　しっぽを　かくすため\nくらやみで　ひっそりと　いきている。\nじぶんからは　こうげき　しない。"
        jp_kanji:
          x: "光や　ショックを　嫌う。\n攻撃されると　体が　ふくらみ\n反撃が　強力に　なる。"
          y: "真っ黒な　尻尾を　隠すため\n暗闇で　ひっそりと　生きている。\n自分からは　攻撃しない。"
        en:
          x: "It hates light and shock. If attacked, it inflates its\nbody to build up its counterstrike."
          y: "To keep its pitch-black tail hidden, it lives quietly in\nthe darkness. It is never first to attack."
        fr:
          x: "Il déteste la lumière et les chocs. S’il est attaqué,\nil se gonflera pour riposter violemment."
          y: "Pour cacher sa queue noire, il vit discrètement dans\nl’obscurité. Il n’attaque jamais le premier."
        it:
          x: "Odia la luce e gli shock. Se è attaccato, gonfia il\ncorpo per preparare il contrattacco."
          y: "Se ne sta sempre tranquillo al buio per nascondere la\ncoda nera come la pece. Non attacca mai per primo."
        de:
          x: "Es hasst Licht und Schläge. Wird es angegriffen,\npumpt es sich auf, um einen Gegenschlag\nvorzubereiten."
          y: "Es lebt in der Dunkelheit, um seinen schwarzen\nSchweif zu verstecken. Es greift nie zuerst an."
        es:
          x: "Odia la luz y las sacudidas. Si le atacan, infla su\ncuerpo para aumentar su contraataque."
          y: "Para mantener oculta su negra cola, vive en silencio\nen la oscuridad. Nunca ataca primero."
        ko:
          x: "빛과 쇼크를 싫어한다.\n공격받으면 몸이 부풀어 올라\n반격이 강력해진다."
          y: "새까만 꼬리를 숨기기 위해\n어둠 속에서 은밀히 지내고 있다.\n자신이 먼저 공격하는 일은 없다."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    jp_kanji: キリンリキ
    en: Girafarig
    fr: Girafarig
    it: Girafarig
    de: Girafarig
    es: Girafarig
    ko: 키링키
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      hidden_ability: sap_sipper
      descriptions:
        jp_kana:
          x: "ねむっている　あいだ　しっぽの\nあたまが　あたりを　みはっている。\nしっぽは　ねむらなくても　へいき。"
          y: "しっぽにも　ちいさな　のうがある。\nちかよると　においに　はんのうして\nかみついて　くるので　ちゅうい。"
        jp_kanji:
          x: "眠っている　あいだ　尻尾の　頭が\nあたりを　見張っている。\n尻尾は　眠らなくても　平気。"
          y: "尻尾にも　小さな　脳がある。\n近寄ると　においに　反応して\nかみついて　くるので　注意。"
        en:
          x: "While it sleeps, the head on its tail keeps watch.\nThe tail doesn’t need to sleep."
          y: "Its tail has a small brain of its own. Beware! If you\nget close, it may react to your scent by biting."
        fr:
          x: "La tête sur sa queue monte la garde quand il dort.\nElle n’a pas besoin de dormir."
          y: "Sa queue possède un cerveau. Si vous vous en\napprochez, elle vous sentira et vous mordra."
        it:
          x: "La testa che ha sulla coda rimane vigile mentre dorme.\nLa coda, infatti, non ha bisogno di riposare."
          y: "La coda possiede un cervello autonomo. Se ci si\navvicina può fiutare la presenza e mordere."
        de:
          x: "Während es schläft, hält sein Schweif Wache.\nDieser benötigt keinen Schlaf."
          y: "Sein Schweif hat ein eigenes Gehirn. Achtung!\nKommst du ihm zu nahe, kann es dich riechen\nund beißt."
        es:
          x: "Cuando duerme, la cabeza de su cola se queda\nvigilando, ya que ella no necesita dormir."
          y: "Su cola tiene un pequeño cerebro. ¡Cuidado! Si te\nacercas, puede reaccionar a tu olor y morder."
        ko:
          x: "잠자는 동안 꼬리의\n머리가 주위를 망보고 있다.\n꼬리는 잠을 잘 필요가 없다."
          y: "꼬리에도 작은 뇌가 있다.\n다가가면 냄새에 반응해서\n물어서 공격하므로 주의하자."
pineco:
  species_id: 204
