      descriptions:
        jp_kana:
          x: "まんげつの　よるになると　かっぱつに\nかつどうするため　つきの　みちかけと\nかんけいしていると　いわれている。"
          y: "４０ねんまえに　いんせきの　おちた\nばしょで　はじめて　みつかった。\nにらむ　だけで　てきを　ねむらせる。"
        jp_kanji:
          x: "満月の　夜になると　活発に\n活動するため　月の　満ち欠けと\n関係していると　言われている。"
          y: "４０年前に　隕石の　落ちた\n場所で　初めて　見つかった。\nにらむ　だけで　敵を　眠らせる。"
        en:
          x: "Because it turns active on nights of the full moon,\nit is said to have some link to the lunar phases."
          y: "It was discovered at the site of a meteor strike\n40 years ago. Its stare can lull its foes to sleep."
        fr:
          x: "On suppose qu’il est lié au cycle lunaire, car il ne sort\nque les soirs de pleine lune."
          y: "Il a été découvert dans le cratère d’une météorite\nil y a 40 ans. Son simple regard endort ses ennemis."
        it:
          x: "Diventa attivo nelle notti di luna piena, pertanto\nsi dice che abbia qualche legame con le fasi lunari."
          y: "Fu scoperto 40 anni fa nella zona d’impatto di un\nmeteorite. Con il solo sguardo addormenta il nemico."
        de:
          x: "Da es in Vollmondnächten aktiv wird, sagt man ihm\nnach, mit den Mondphasen in Verbindung zu stehen."
          y: "Wurde erstmals vor 40 Jahren bei einem\nMeteoritenkrater entdeckt. Sein Blick wirkt\neinschläfernd."
        es:
          x: "Se piensa que está muy influido por las fases lunares,\nya que solo actúa en noches de luna llena."
          y: "Descubierto hace 40 años junto a un meteorito.\nDuerme a sus enemigos con solo mirarlos."
        ko:
          x: "보름달의 밤이 되면 활발하게\n활동하기 때문에 달의 변화와\n관계 있다고 전해진다."
          y: "40년 전에 운석이 떨어진\n장소에서 처음 발견되었다.\n노려보는 것만으로 적을 재운다."
solrock:
  species_id: 338
  names:
    jp_kana: ソルロック
    jp_kanji: ソルロック
