          y: "２つの　からだは　くみあわせが\nきまっている。べつの　からだとは\nかみあわずに　はなれてしまう。"
        jp_kanji:
          x: "２つの　体が　かみ合い\n回転することで　生きるための\nエネルギーを　作り出している。"
          y: "２つの　体は　組み合わせが\n決まっている。別の　体とは\nかみ合わずに　離れてしまう。"
        en:
          x: "Interlocking two bodies and spinning around\ngenerates the energy they need to live."
          y: "The two minigears that mesh together are\npredetermined. Each will rebound from other\nminigears without meshing."
        fr:
          x: "Le mouvement de ses deux corps enchâssés produit\nl’énergie qui lui est nécessaire pour vivre."
          y: "La compatibilité entre ses deux rouages est\nprédéterminée. Ceux-ci ne se fixeront à aucun autre."
        it:
          x: "Produce l’energia che gli serve per vivere incastrando\ne facendo ruotare le due parti che lo compongono."
          y: "I due ingranaggi che lo compongono combaciano\nunicamente l’uno con l’altro. Qualsiasi altro incastro\nè impossibile."
        de:
          x: "Es gewinnt lebenswichtige Energie, indem es seine\nzwei Einzelteile ineinander verzahnt und rotieren lässt."
          y: "Seine zwei Teile greifen ineinander wie ein Uhrwerk.\nJedes andere Objekt, das man mit ihm kombinieren\nwill, wird abgestoßen."
        es:
          x: "Genera la energía vital que necesita haciendo girar sus\ndos cuerpos."
          y: "La combinación de sus dos cuerpos es\npredeterminada. Si no se corresponde con\nsu homólogo, se separa."
        ko:
          x: "두 개의 몸을 맞물려\n회전시켜서 살아가기 위한\n에너지를 만들고 있다."
          y: "두 개의 몸은 그 조합 방법이\n정해져 있다. 다른 몸과는\n맞물리지 않고 떨어져 버린다."
