          y: "からだは　みずの　ていこうが\nすくない　りゅうせんけい。\nさむくなるほど　げんきが　でてくる。"
        jp_kanji:
          x: "全身が　真っ白な　毛で\n覆われている。寒さに　強く\nむしろ　寒いほど　元気になる。"
          y: "体は　水の　抵抗が\n少ない　流線型。\n寒くなるほど　元気が　出てくる。"
