        jp_kana:
          x: "からだも　ちいさく　もともと\nよわかった。ホネを　つかうようになり\nせいかくが　きょうぼうか　した。"
          y: "ほねは　だいじな　ぶき　である。\nブーメランの　ように　なげて\nえものに　ぶつけ　きぜつ　させる。"
        jp_kanji:
          x: "体も　小さく　もともと　弱かった。\n骨を　使うようになり\n性格が　凶暴化した。"
          y: "骨は　大事な　武器である。\nブーメランのように　投げて\n獲物に　ぶつけ　気絶させる。"
        en:
          x: "It is small and was originally very weak.\nIts temperament turned ferocious when it began\nusing bones."
          y: "The bone it holds is its key weapon. It throws the\nbone skillfully like a boomerang to KO targets."
        fr:
          x: "Ce petit Pokémon était à l’origine très faible. Il est\ndevenu redoutable le jour où il a appris à se servir\nde ses os."
          y: "L’os qu’il tient dans la main est son arme la plus\nefficace. Il s’en sert comme d’un boomerang pour\nassommer sa proie."
        it:
          x: "Di piccole dimensioni, un tempo era del tutto innocuo.\nÈ diventato più aggressivo brandendo un osso\ncome arma."
          y: "L’osso che impugna è la sua arma. Lo scaglia come\nun boomerang per mettere KO i suoi avversari."
        de:
          x: "Es ist klein und war ursprünglich sehr schwach.\nErst als es anfing Knochen einzusetzen, wurde es wild."
          y: "Der Knochen, den dieses Pokémon hält, ist seine\nPrimärwaffe. Es wirft ihn wie einen Bumerang."
        es:
          x: "Es pequeño y siempre ha sido muy débil. Cuando\nempezó a usar huesos, se volvió más violento."
          y: "El hueso que lleva es su gran arma. Lo lanza\nhábilmente como un bumerán y deja a todos fuera\nde combate."
        ko:
          x: "몸집도 작으며 원래는\n약했다. 뼈를 쓰기 시작하면서\n성격이 흉포해졌다."
          y: "뼈는 중요한 무기이다.\n부메랑처럼 던져서\n사냥감을 맞춰 기절시킨다."
hitmonlee:
