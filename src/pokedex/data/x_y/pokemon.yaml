          y: "いっしゅんで　きたなく　にごった\nみずも　きよめる　ちからをもつ。\nきたかぜの　うまれかわり　という。"
        jp_kanji:
          x: "世界中を　駆け巡り\n汚れた　水を　清めている。\n北風と　ともに　走り去る。"
          y: "一瞬で　汚く　濁った　水も\n清める　力を　持つ。\n北風の　生まれ変わり　という。"
        en:
          x: "It races around the world to purify fouled water.\nIt dashes away with the north wind."
          y: "Said to be the embodiment of north winds, it can\ninstantly purify filthy, murky water."
        fr:
          x: "Il parcourt le vaste monde pour purifier les eaux\npolluées. Il accompagne le vent du nord."
          y: "Il serait la réincarnation du vent du nord. Il peut\npurifier instantanément les eaux polluées."
        it:
          x: "Corre per tutto il mondo per purificare l’acqua\ncontaminata. Si allontana con i venti del nord."
          y: "Si dice che sia la reincarnazione dei venti nordici.\nPurifica all’istante l’acqua torbida e putrida."
        de:
          x: "Es wandert beständig in der Welt herum,\num verunreinigtes Wasser zu reinigen.\nEs zieht mit dem Nordwind."
          y: "Man sagt, es sei die Wiedergeburt des Nordwindes.\nEs kann verschmutztes Wasser im Nu reinigen."
        es:
          x: "Recorre el mundo para purificar agua contaminada.\nCorre veloz con el viento del norte."
          y: "Conocido como la reencarnación de los vientos del\nnorte, puede purificar aguas turbias y sucias."
        ko:
          x: "세계 곳곳을 뛰어다니며\n오염된 물을 정화시킨다.\n북풍과 함께 달려나간다."
          y: "순식간에 더럽고 탁한\n물도 깨끗하게 하는 힘을 가졌다.\n북풍이 다시 태어난 것이라고 한다."
larvitar:
  species_id: 246
  names:
