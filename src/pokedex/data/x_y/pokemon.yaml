          x: "はやく　うごく　ぶったいを　みると\nきょうそう　したくなり　もうれつな\nスピードで　おいかけ　はじめる。"
          y: "はしる　そくどは　じそく２４０キロ。\nたてがみの　ほのおが　はげしく　もえ\nやの　ように　かけぬける。"
        jp_kanji:
          x: "速く　動く　物体を　見ると\n競争したくなり　猛烈な\nスピードで　追いかけはじめる。"
          y: "走る　速度は　時速２４０キロ。\nたてがみの　炎が　激しく　燃え\n矢のように　駆け抜ける。"
        en:
          x: "Very competitive, this Pokémon will chase anything\nthat moves fast in the hopes of racing it."
          y: "It gallops at nearly 150 mph. With its mane blazing\nferociously, it races as if it were an arrow."
        fr:
          x: "Doté d’un esprit de compétition, il poursuit toute\ncréature rapide pour faire la course."
          y: "Son galop dépasse les 240 km/h. Il file comme\nune flèche, laissant flotter sa crinière ardente."
        it:
          x: "Pokémon molto competitivo, rincorre tutto ciò\nche si muove veloce, sperando di superarlo."
          y: "Galoppa alla velocità di 240 km/h. Corre come una\nfreccia facendo ondeggiare la criniera ardente."
        de:
          x: "Dieses Pokémon verfolgt schnelle Objekte in der\nHoffnung, ein Wettrennen gegen sie zu gewinnen."
          y: "Seine Mähne lodert auf, wenn es mit 240 km/h\npfeilschnell galoppiert."
        es:
          x: "Muy competitivo, este Pokémon perseguirá a todo lo\nque se mueva rápido e intentará salir airoso."
          y: "Galopa a casi 240 km por hora. Su crin ardiente\nparece una flecha cuando corre."
        ko:
          x: "빠르게 움직이는 물체를 보면\n경주를 하고 싶어져서 맹렬한\n스피드로 쫓아가기 시작한다."
          y: "달리는 속도는 시속 240km.\n갈기의 불꽃이 세차게 타오르고\n화살처럼 달려나간다."
slowpoke:
