        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - grass
        - amorphous
      abilities:
        - natural_cure
        - frisk
      hidden_ability: harvest
      descriptions:
        jp_kana:
          x: "ほかの　きぎを　じざいに　あやつる。\nもりを　あらす　にんげんは　しぬまで\nもりから　でられないようにするのだ。"
          y: "ねっこを　しんけいの　かわりにして\nもりの　きを　あやつる。からだに\nすみついた　ポケモンには　しんせつ。"
        jp_kanji:
          x: "ほかの　木々を　自在に　操る。\n森を　荒らす　人間は　死ぬまで\n森から　出られないようにするのだ。"
          y: "根っこを　神経の　かわりにして\n森の　木を　操る。体に　住みついた\nポケモンには　親切。"
        en:
          x: "It can control trees at will. It will trap people\nwho harm the forest, so they can never leave."
          y: "Using its roots as a nervous system,\nit controls the trees in the forest.\nIt’s kind to the Pokémon that reside in its body."
        fr:
          x: "Commande aux autres arbres.\nIl emprisonne jusqu’à la fin de leurs jours les humains\nqui abîment la forêt."
          y: "Ses racines sont un véritable système nerveux qui lui\npermet de contrôler les arbres de la forêt. Il se montre\ntrès gentil envers les Pokémon vivant dans son écorce."
        it:
          x: "In grado di manovrare gli alberi a piacimento,\nintrappola per sempre nei boschi gli umani\nche danneggiano la natura."
          y: "Usa le radici come un sistema nervoso per controllare\ngli alberi dei boschi. Tratta con gentilezza i Pokémon\nche fanno il nido nel suo corpo."
        de:
          x: "Die Bäume des Waldes folgen ihm blind.\nMenschen, die dem Wald Schaden zufügen,\nhält es bis an ihr Lebensende darin gefangen."
          y: "Es nutzt seine Wurzeln als Nervensystem und\nkontrolliert so andere Bäume. Es ist nett zu den\nPokémon, die in ihm leben."
        es:
          x: "Puede controlar los árboles a su voluntad. Retiene\nhasta el fin de sus días a los humanos que se adentran\nen el bosque y lo mancillan."
          y: "Sus raíces le permiten controlar los árboles del\nbosque, al funcionar como un sistema nervioso.\nEs amable con los Pokémon que habitan su cuerpo."
        ko:
          x: "다른 나무들을 자유자재로 조종한다.\n숲을 어지럽히는 인간은 죽을 때까지\n숲에서 벗어나지 못하게 한다."
          y: "뿌리를 신경 대신으로 삼아\n숲의 나무를 조종한다. 몸에 자리 잡은\n포켓몬에게는 친절하다."
