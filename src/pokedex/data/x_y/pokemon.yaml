          y: "とさかの　おおきさで　グループの\nリーダーを　きめる。キックこうげきで\nコンクリートブロックを　はかいする。"
        jp_kanji:
          x: "脱皮した　皮を　ずりあげて\nダメージを　減らしつつ　キック！\nとさかが　大きいほど　偉そうだ。"
          y: "トサカの　大きさで　グループの\nリーダーを　決める。キック攻撃で\nコンクリートブロックを　破壊する。"
        en:
          x: "It pulls up its shed skin to protect itself while\nit kicks. The bigger the crest, the more respected\nit is."
          y: "It can smash concrete blocks with its kicking\nattacks. The one with the biggest crest is the\ngroup leader."
        fr:
          x: "Son baggy de peau le protège quand il donne\ndes coups de pied. Les meneurs sont ceux qui ont\nla plus grande crête."
          y: "La plus grande crête détermine le meneur du groupe.\nIl détruit des blocs de béton à coups de pied."
        it:
          x: "Quando tira calci, si protegge dai danni con la pelle\ndella muta. Più grande è la cresta e più arie si dà."
          y: "Il capo del gruppo viene scelto in base alla grandezza\ndella cresta. Spacca blocchi di cemento con dei calci."
        de:
          x: "Es wehrt Angriffe mit seiner alten Haut ab\nund kontert mit Tritten. Sein Ego entspricht\nder Größe seines Kamms."
          y: "Wählt seinen Anführer über die Größe des Kamms\nauf dem Kopf. Ein Tritt von ihm reicht,\num Betonblöcke zu zertrümmern."
        es:
          x: "Se protege de los ataques con la muda de su piel\nmientras reparte patadas. Cuanto mayor es su cresta,\nmás se le respeta."
          y: "El líder del grupo es aquel cuya cresta es mayor.\nEs capaz de romper bloques de cemento con sus\npotentes patadas."
        ko:
          x: "탈피한 가죽을 끌어 올려\n데미지를 줄이면서 킥!\n볏이 클수록 거만하다."
          y: "볏의 크기로 그룹의\n리더를 정한다. 발차기로\n콘크리트 블록을 파괴한다."
sigilyph:
