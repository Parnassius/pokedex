          x: "ドンカラスが　ひくいこえで　なくと\nすぐさま　ヤミカラスが　あつまるため\nよるをまねくもの　とも　いわれる。"
          y: "よるになると　かつどうを　はじめる。\nたくさんの　ヤミカラスを　ひきつれ\nむれを　つくることで　しられる。"
        jp_kanji:
          x: "ドンカラスが　低い声で　鳴くと\nすぐさま　ヤミカラスが　集まるため\n夜を招くもの　とも　言われる。"
          y: "夜になると　活動を　はじめる。\nたくさんの　ヤミカラスを　引き連れ\n群れを　作ることで　知られる。"
        en:
          x: "If one utters a deep cry, many Murkrow gather\nquickly. For this, it is called “Summoner of Night.”"
          y: "Becoming active at night, it is known to swarm with\nnumerous Murkrow in tow."
        fr:
          x: "Son cri profond peut invoquer une meute de\nCornèbre. On l’appelle « le crieur de mauvais augure »."
          y: "Ce Pokémon nocturne évolue en grandes volées\nescortées par des Cornèbre."
        it:
          x: "Se emette un verso profondo, molti Murkrow\naccorrono all’istante. È detto “Evocatore della notte”."
          y: "Diventa attivo di notte e lo si vede spesso in\ncompagnia di numerosi Murkrow."
        de:
          x: "Sein tiefer Ruf lockt andere Kramurx herbei.\nMan nennt es daher „Beschwörer der Nacht“."
          y: "Ein nachtaktives Pokémon, das sich in Schwärmen\nmit Kramurx durch die Nacht bewegt."
        es:
          x: "Si uno lanza un grito profundo, los demás acuden.\nPor eso se le llama también Invocador de la Noche."
          y: "Está activo por la noche y pulula arrastrando a\nnumerosos Murkrow."
        ko:
          x: "돈크로우가 낮은 목소리로 울면\n즉시 니로우가 모여들기에\n밤을 부르는 자라고도 전해진다."
          y: "밤이 되면 활동을 시작한다.\n많은 니로우들을 거느리고\n무리를 만든다고 알려져 있다."
glameow:
