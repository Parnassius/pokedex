          x: "おおうなばらを　ただよって　くらす。\nきずついた　ポケモンを　みつけると\nだきかかえて　きしまで　はこぶ。"
          y: "きずついたり　よわった　ポケモンを\nヒレで　やさしく　かかえながら\nとくしゅな　ねんまくで　なおすのだ。"
        jp_kanji:
          x: "大海原を　漂って　暮らす。\n傷ついた　ポケモンを　見つけると\n抱きかかえて　岸まで　運ぶ。"
          y: "傷ついたり　弱った　ポケモンを\nヒレで　優しく　抱えながら\n特殊な　粘膜で　治すのだ。"
        en:
          x: "Floating in the open sea is how they live.\nWhen they find a wounded Pokémon,\nthey embrace it and bring it to shore."
          y: "It gently holds injured and weak Pokémon in its\nfins. Its special membrane heals their wounds."
        fr:
          x: "Il vit en dérivant dans les grands océans. Quand il\ntrouve des Pokémon blessés, il les ramène jusqu’à\nla côte."
          y: "Il berce les Pokémon blessés dans ses nageoires et\nles guérit grâce à la membrane dont il est recouvert."
        it:
          x: "Vive in mare aperto trasportato dalle onde. Se si\nimbatte in un Pokémon ferito, lo riaccompagna a riva."
          y: "Abbraccia dolcemente con le sue pinne i Pokémon\ndeboli o feriti e li guarisce grazie a una speciale\nmembrana mucosa."
        de:
          x: "Es treibt durch den Ozean. Findet es ein verletztes\nPokémon, nimmt es dieses auf und trägt es zurück\nan Land."
          y: "Es umarmt verletzte und geschwächte Pokémon\nliebevoll mit seinen Flossen und heilt sie mit einem\nspeziellen Schleim."
        es:
          x: "Vive flotando a la deriva en mar abierto. Siempre que\nencuentra un Pokémon herido, lo abraza y lo lleva a la\ncosta."
          y: "Abraza gentilmente con sus aletas a Pokémon que\nestán lastimados y cura sus heridas con su membrana\nespecial."
        ko:
          x: "넓은 바다를 떠돌아다니며 산다.\n상처 입은 포켓몬을 발견하면\n안고서 물가까지 옮긴다."
          y: "상처 입거나 약해진 포켓몬을\n지느러미로 부드럽게 안으며\n특수한 점막으로 치료한다."
joltik:
