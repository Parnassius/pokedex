      descriptions:
        jp_kana:
          x: "くうかんを　ゆがめる　リングで\nあらゆる　ものを　はなれた　ばしょへ\nとばしてしまう　トラブルメーカー。"
          y: "きにいった　ものを　リングを　つかい\nひみつの　すみかへ　あつめている。\nリングを　くぐって　テレポートする。"
        jp_kanji:
          x: "空間を　ゆがめる　リングで\nあらゆる　ものを　離れた　場所へ\n飛ばしてしまう　トラブルメーカー。"
          y: "気に入った　ものを　リングを　使い\n秘密の　住処へ　集めている。\nリングを　潜って　テレポートする。"
        en:
          x: "This troublemaker sends anything\nand everything to faraway places\nusing its loop, which can warp space."
          y: "It gathers things it likes and passes them through\nits loop to teleport them to a secret place."
        fr:
          x: "Ce fauteur de troubles est doté d’anneaux qui\ndéforment l’espace et lui permettent d’expédier\nau loin n’importe quel objet."
          y: "Il a la faculté de téléporter les choses en les faisant\npasser au travers de ses anneaux. Il envoie les objets\nqui lui plaisent dans une cachette connue de lui seul."
        it:
          x: "È un gran combinaguai e spedisce lontano\ntutto ciò che gli capita a tiro grazie ai suoi anelli\nin grado di piegare lo spazio."
          y: "Usa i suoi anelli per intrappolare qualunque cosa\ngli piaccia e teletrasportarla in un luogo segreto."
        de:
          x: "Mittels seiner Ringe, die Raumkrümmungen\nverursachen, verfrachtet dieser Unruhestifter\nalles und jeden an die entlegensten Orte."
          y: "Mithilfe seiner Ringe hortet es Dinge, die ihm gefallen,\nan einem geheimen Ort. Es teleportiert diese, indem es\nsie durch seine Ringe bewegt."
        es:
          x: "Este problemático Pokémon envía cualquier objeto a\nlugares remotos mediante unos anillos que deforman\nel espacio."
          y: "Reúne los objetos que le atraen para esconderlos\nen una guarida secreta, teletransportándolos a\ntravés de sus anillos."
        ko:
          x: "공간을 뒤트는 링으로\n모든 것을 멀리 떨어진 곳으로\n날려버리고 마는 트러블메이커다."
          y: "마음에 든 것을 링을 사용해\n비밀의 거처에 모으고 있다.\n링을 통해 순간이동한다."
