          x: "いつもは　がけに　はりついている。\nえものをみつけると　はねをひろげ\nかぜにのり　おそいかかってくる。"
          y: "がんめん　めがけて　とんでくる。\nはりつかれた　えものが　おどろく\nあいだに　どくばりを　さしこむ。"
        jp_kanji:
          x: "いつもは　崖に　張りついている。\n獲物を見つけると　羽を広げ\n風に乗り　襲いかかってくる。"
          y: "顔面　めがけて　飛んでくる。\n張りつかれた　獲物が　驚く\nあいだに　毒針を　刺しこむ。"
        en:
          x: "It usually clings to cliffs. When it spots its prey,\nit spreads its wings and glides down to attack."
          y: "It flies straight at its target’s face, then clamps\ndown on the startled victim to inject poison."
        fr:
          x: "Il s’accroche souvent aux falaises. Sa proie repérée,\nil plane vers elle pour l’attaquer."
          y: "Il vole droit vers le visage de sa cible effrayée et s’y\naccroche pour lui injecter son poison."
        it:
          x: "Di solito sta attaccato agli scogli. Attacca la preda\nspalancando le ali e planando."
          y: "Vola in picchiata sulla testa del nemico, lo atterra e\ngli inietta il suo veleno."
        de:
          x: "Es hängt meist an Klippen. Erspäht es Beute,\nspreizt es seine Flügel und greift diese sofort an."
          y: "Es fliegt direkt auf das Gesicht seiner Feinde zu\nund injiziert ihnen eine Überdosis Gift."
        es:
          x: "A veces se sujeta a los precipicios. Cuando divisa una\npresa, despliega sus alas y planea para atacar."
          y: "Vuela directo a la cara del objetivo y acaba con su\naterrada víctima inyectándole veneno."
        ko:
          x: "보통은 벼랑에 붙어 있다.\n먹이를 발견하면 날개를 펼쳐\n바람을 타고 날아 덮친다."
          y: "얼굴을 겨냥하고 날아와\n들러붙어 먹이가 놀라는\n사이에 독침을 찌른다."
steelix:
