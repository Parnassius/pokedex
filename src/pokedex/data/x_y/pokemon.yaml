          y: "マグマの　ように　もえたぎる\nけつえきが　からだを　ながれている。\nかざんの　ほらあなに　せいそくする。"
        jp_kanji:
          x: "火山の　洞穴に　生息。\n十字の　ツメを　食いこませて\n壁や　天井を　はい回る。"
          y: "マグマのように　燃えたぎる\n血液が　体を　流れている。\n火山の　洞穴に　生息する。"
        en:
          x: "It dwells in volcanic caves. It digs in with its\ncross-shaped feet to crawl on ceilings and walls."
          y: "Boiling blood, like magma, circulates through its\nbody. It makes its dwelling place in volcanic caves."
        fr:
          x: "Il hante les grottes volcaniques. Il rampe au mur et\nau plafond grâce à ses pieds en forme de croix."
          y: "Le sang de ce Pokémon des cratères bouillonne dans\nson corps comme du magma."
        it:
          x: "Vive nelle cavità dei vulcani. Scava con i suoi piedi\na croce per scalare pareti e arrampicarsi sui soffitti."
          y: "Nel suo corpo scorre sangue che ribolle come magma.\nVive in antri all’interno di vulcani."
        de:
          x: "Es lebt in vulkanischen Höhlen. Mit seinen\nkreuzförmigen Klauen kann es sogar an der Decke\nlaufen."
          y: "Das Blut, das durch seinen Körper fließt, brodelt\nheiß wie Magma. Es lebt in vulkanischen Höhlen."
        es:
          x: "Habita cuevas volcánicas. Cava con sus pies en forma\nde cruz para trepar por techos y paredes."
          y: "Su sangre fluye ardiendo como si fuera magma.\nVive en cráteres de volcanes."
        ko:
          x: "화산의 동굴에서 서식한다.\n십자형의 발톱을 박아서\n벽이나 천장을 돌아다닌다."
          y: "마그마처럼 타오르는\n혈액이 몸에서 흐르고 있다.\n화산의 동굴에 서식한다."
