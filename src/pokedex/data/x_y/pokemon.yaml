          x: "They form packs to attack boats and rip out their\nhulls to sink them. They live in rivers in the jungle."
          y: "It lives in massive rivers that course through\njungles. It swarms prey that enter its territory."
        fr:
          x: "Il s’attaque en banc aux bateaux dont il dévore la\ncoque. Les rivières de la jungle forment son habitat."
          y: "Ce Pokémon vit dans les fleuves qui traversent les\nforêts tropicales. Il attaque en groupe ceux qui\ns’aventurent sur son territoire."
        it:
          x: "I Carvanha attaccano le navi in branco e ne strappano\ngli scafi a morsi. Abitano i fiumi della giungla."
          y: "Vive in grandi fiumi che attraversano la giungla,\nlanciandosi in branco contro gli intrusi."
        de:
          x: "Schwärme von Kanivanha haben in Dschungelflüssen\nschon so manches Boot zerbissen und versenkt."
          y: "Es lebt in reißenden Flüssen, die sich ihren Weg\ndurch den Dschungel bahnen. Es fängt Beute,\ndie sich in sein Gebiet wagt."
        es:
          x: "Atacan en grupo a los barcos y los hunden a base de\nbocados. Habitan en los ríos de la jungla."
          y: "Habita caudalosos ríos que atraviesan las junglas.\nSi alguien invade su territorio, acude con más de su\nespecie."
        ko:
          x: "집단으로 배를 공격해\n배의 밑바닥도 물어뜯어 가라앉힌다.\n정글의 강에 서식한다."
          y: "정글을 흐르는 큰 강에 서식한다.\n영역에 섞여 들어온\n먹이를 집단으로 덮친다."
