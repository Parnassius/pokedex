      descriptions:
        jp_kana:
          x: "やわらかい　いとで　できた　からだは\nじかんと　ともに　かたくなっていく。\nひびわれると　しんかは　まぢかだ。"
          y: "マユに　こもっている　あいだに\nうけた　こうげきは　しんかしても\nわすれずに　かならず　しかえしする。"
        jp_kanji:
          x: "やわらかい　糸で　できた　体は\n時間と　ともに　硬くなっていく。\nひび割れると　進化は　間近だ。"
          y: "マユに　こもっている　あいだに\n受けた　攻撃は　進化しても\n忘れずに　かならず　仕返しする。"
        en:
          x: "Its body, which is made of soft silk, hardens over\ntime. When cracks appear, evolution is near."
          y: "It never forgets any attack it endured while in the\ncocoon. After evolution, it seeks payback."
        fr:
          x: "Son corps, constitué de soie fine, durcit avec le\ntemps. Si vous voyez apparaître des fissures, c’est\nqu’il va très bientôt évoluer."
          y: "Rancunier, il n’oublie aucune des attaques subies\ndans le cocon et se venge une fois qu’il a évolué."
        it:
          x: "Il corpo di soffice seta si indurisce nel corso del\ntempo. Quando appaiono crepe, l’evoluzione è vicina."
          y: "Non dimentica mai gli attacchi subiti dentro il bozzolo.\nDopo l’evoluzione cerca di vendicarsi."
        de:
          x: "Sein aus weicher Seide bestehender Körper erhärtet\nmit der Zeit. Sobald Risse sichtbar sind, steht die\nEntwicklung kurz bevor."
          y: "Es vergisst keinen Angriff, den es im Kokon erdulden\nmusste. Nach der Entwicklung sinnt es auf Rache."
        es:
          x: "Está formado por seda que se endurece poco a\npoco. Si se resquebraja el capullo, está a punto\nde evolucionar."
          y: "Jamás olvida a quienes lo atacaron mientras estaba\nen su capullo. Cuando evoluciona, busca venganza."
        ko:
          x: "부드러운 실로 된 몸은\n시간이 지나면서 단단해진다.\n진화가 임박하면 갈라지기 시작한다."
          y: "고치에 들어가 있는 사이에\n받은 공격은 진화해도\n잊지 않고 반드시 앙갚음한다."
dustox:
