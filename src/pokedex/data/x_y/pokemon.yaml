        jp_kana:
          x: "からだの　ひょうめんには　でんきが\nながれている。あたりが　くらいと\nぜんしんが　あおじろく　ひかるのだ。"
          y: "つよい　でんきが　だいこうぶつで\nおおきな　はつでんしょ　などに\nしばしば　あらわれる。"
        jp_kanji:
          x: "体の　表面には　電気が\n流れている。あたりが　暗いと\n全身が　青白く　光るのだ。"
          y: "強い　電気が　大好物で\n大きな　発電所などに\nしばしば　現れる。"
        en:
          x: "Electricity runs across the surface of its body.\nIn darkness, its entire body glows a whitish blue."
          y: "It loves to feed on strong electricity. It occasionally\nappears around large power plants and so on."
        fr:
          x: "Des ondes électriques parcourent la surface de son\ncorps. Il brille d’un éclat bleuté dans le noir."
          y: "Il adore se nourrir d’électricité. Il apparaît\noccasionnellement près des grandes centrales\nélectriques."
        it:
          x: "La corrente elettrica attraversa la superficie del\nsuo corpo che al buio riluce di un blu perlato."
          y: "Ama nutrirsi di elettricità ad alta tensione. È possibile\ntrovarlo vicino a grandi centrali elettriche."
        de:
          x: "Elektrizität bedeckt seinen Körper. Im Dunkeln\nerstrahlt es in einem bläulichen Ton."
          y: "Es konsumiert am liebsten Elektrizität. Gelegentlich\nsieht man es in der Nähe von Kraftwerken."
        es:
          x: "Por la superficie de su piel corre la electricidad. En la\noscuridad, su cuerpo se torna blanquecino."
          y: "Le encanta alimentarse de alta tensión. A veces,\naparece cerca de centrales eléctricas y zonas\nsimilares."
        ko:
          x: "몸의 표면에는 전기가\n흐르고 있다. 주변이 어두우면\n전신이 푸르스름하게 빛난다."
          y: "강한 전기를 좋아하여\n커다란 발전소 같은 곳에\n종종 나타난다."
