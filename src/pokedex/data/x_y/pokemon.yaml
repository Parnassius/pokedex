      descriptions:
        jp_kana:
          x: "ハトーボーの　すむ　もりの　おくには\nあらそいのない　へいわな　くにが\nあると　しんじられている。"
          y: "せかいの　どこに　いても\nじぶんの　すの　ばしょは　わかるので\nトレーナーとも　はぐれたりしない。"
        jp_kanji:
          x: "ハトーボーの　住む　森の　奥には\n争いのない　平和な　国が　あると\n信じられている。"
          y: "世界の　どこに　いても\n自分の　巣の　場所は　わかるので\nトレーナーとも　はぐれたりしない。"
        en:
          x: "Many people believe that, deep in the forest where\nTranquill live, there is a peaceful place where there\nis no war."
          y: "No matter where in the world it goes, it knows\nwhere its nest is, so it never gets separated from\nits Trainer."
        fr:
          x: "On dit que tout au fond de la forêt où il vit, il y aurait\nun pays paisible qui n’a jamais connu la guerre."
          y: "Quel que soit le lieu où il se trouve, il arrive toujours\nà retrouver son Dresseur comme son propre nid."
        it:
          x: "Si dice che nel cuore della foresta in cui vive Tranquill\nsi trovi un paese che non conosce conflitti."
          y: "Dovunque si trovi, è sempre in grado di ritrovare il\nsuo nido. Allo stesso modo, non perde mai di vista\nil suo Allenatore."
        de:
          x: "Viele Leute glauben, dass es tief in seinem\nheimatlichen Wald ein Land der Harmonie gibt,\nwo man keine Kriege kennt."
          y: "Findet selbst von der anderen Seite des Globus\nzu seinem Nest zurück. Nichts kann es von seinem\nTrainer trennen."
        es:
          x: "Según los rumores, en lo más profundo del bosque\ndonde mora Tranquill, hay un mundo pacífico y exento\nde luchas."
          y: "Puede regresar sin problema alguno a su nido desde\ncualquier lugar del globo y jamás se separa de quien\nlo entrena."
        ko:
          x: "유토브가 사는 숲 속에는\n싸움이 없는 평화로운 나라가\n있다고 믿어진다."
          y: "세계 어디에 있어도\n자신의 둥지가 있는 곳을 알 수 있어\n트레이너를 잃어버리지 않는다."
unfezant:
