        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - field
        - fairy
      abilities:
        - run_away
        - pickup
      hidden_ability: volt_absorb
      descriptions:
        jp_kana:
          x: "せいでんきが　たまって　パチパチする\nけだまを　だいこうぶつの　きのみと\nいっしょに　みきの　あなに　かくす。"
          y: "たまった　でんきを　わけあたえようと\nほほぶくろを　こすりあわせる\nパチリスを　みかけることも　ある。"
        jp_kanji:
          x: "静電気が　たまって　パチパチする\n毛玉を　大好物の　木の実と　一緒に\n幹の　穴に　隠す。"
          y: "たまった　電気を　分け与えようと\nほほ袋を　こすり合わせる\nパチリスを　見かけることも　ある。"
        en:
          x: "It makes fur balls that crackle with static electricity.\nIt stores them with berries in tree holes."
          y: "A pair may be seen rubbing their cheek pouches\ntogether in an effort to share stored electricity."
        fr:
          x: "Il roule des boules de poils pleines d’électricité\nstatique et les range dans des souches avec des\nBaies."
          y: "Il arrive que deux Pachirisu se frottent les joues pour\npartager l’électricité qu’ils ont accumulée."
        it:
          x: "Forma delle palle di pelo cariche elettrostaticamente\ne le conserva negli alberi insieme alle bacche."
          y: "Talvolta due esemplari si sfregano le guance per\ncondividere l’elettricità immagazzinata."
        de:
          x: "Es bildet ein Fellknäuel, der vor statischer Energie\nknistert. Es speichert die Energie in Bäumen."
          y: "Um gespeicherte Elektrizität zu teilen, reiben zwei\nvon ihnen ihre Backentaschen aneinander."
        es:
          x: "Crea bolas de pelo que crepitan con electricidad\nestática. Las almacena en agujeros de árboles."
          y: "A veces se ve a dos frotándose las bolsas de las\nmejillas para compartir electricidad almacenada."
        ko:
          x: "정전기가 모여 톡톡 튀는 솜털을\n자신이 좋아하는 나무열매와 함께\n나무줄기의 구멍에 숨긴다."
          y: "모인 전기를 나눠주려고\n뺨의 주머니를 서로 비비는\n파치리스가 발견되기도 한다."
buizel:
  species_id: 418
  names:
