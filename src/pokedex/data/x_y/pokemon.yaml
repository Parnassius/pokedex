        jp_kana:
          x: "おでこから　でている　けむりの\nなかには　ひとや　ポケモンの　みた\nゆめが　たくさん　つまっているのだ。"
          y: "おでこから　でる　ゆめのけむりは\nたべた　ゆめの　ないようによって\nさまざまな　いろに　かわるのだ。"
        jp_kanji:
          x: "おでこから　出ている　煙の　中には\n人や　ポケモンの　見た　夢が\nたくさん　つまっているのだ。"
          y: "おでこから　でる　ゆめのけむりは\n食べた　夢の　内容によって\nさまざまな　色に　変わるのだ。"
        en:
          x: "The mist emanating from their foreheads is packed\nwith the dreams of people and Pokémon."
          y: "The dream mist coming from its forehead changes\ninto many different colors depending on the dream\nthat was eaten."
        fr:
          x: "La fumée qui sort de son front contient les rêves\nde nombreuses personnes et ceux de nombreux\nPokémon."
          y: "La fumée qui sort de son front change de couleur\nselon le contenu des rêves qu’il a mangés."
        it:
          x: "Nel fumo che gli esce dalla fronte sono racchiusi\nmolti sogni di esseri umani e di Pokémon."
          y: "Il fumo che esce dalla sua fronte cambia colore a\nseconda del contenuto del sogno che ha mangiato."
        de:
          x: "Der Dunst, der aus seiner Stirn tritt, enthält die\nTräume unzähliger Menschen und Pokémon."
          y: "Je nach Inhalt der Träume, die es frisst, nimmt der\nDunst, der aus seiner Stirn austritt, unterschiedliche\nFarben an."
        es:
          x: "Multitud de sueños de humanos y Pokémon se\nencuentran atrapados en el humo que despide por\nsu frente."
          y: "El color del humo que despide por su abultada frente\nvaría según el contenido de los sueños que haya\nengullido."
        ko:
          x: "이마에서 나오는 연기 속에는\n사람이나 포켓몬이 꾼\n꿈이 많이 모여 있다."
          y: "이마에서 나오는 꿈연기는\n먹은 꿈의 내용에 따라\n여러 가지 색으로 변한다."
pidove:
