          x: "Nel corpo conserva una tasca ardente. Prima di\nlottare, la sua temperatura si innalza a 900 °C."
          y: "Nel corpo ha una tasca infuocata. Dopo aver inspirato\nprofondamente, sputa fiamme alla temperatura di\n1700 °C."
        de:
          x: "In seinem Körper befindet sich eine Flamme.\nSeine Körpertemperatur liegt vor dem Kampf\nbei 900 °C."
