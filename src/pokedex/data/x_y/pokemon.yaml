          y: "おおきく　からだを　ふくらませてから\nうたう　こもりうたは　いつもより\nながくて　ぜったいに　ねむくなる。"
        jp_kanji:
          x: "まるくて　大きい　瞳で　誘いこみ\n心地よい　歌を　歌い\n相手を　眠らせる。"
          y: "大きく　体を　ふくらませてから\n歌う　子守歌は　いつもより\n長くて　ぜったいに　眠くなる。"
        en:
          x: "It captivates foes with its huge, round eyes,\nthen lulls them to sleep by singing a\nsoothing melody."
          y: "If it inflates to sing a lullaby, it can perform longer\nand cause sure drowsiness in its audience."
        fr:
          x: "Il hypnotise ses ennemis grâce à ses grands yeux\navant de les plonger dans un profond sommeil en\nchantant une douce mélopée."
          y: "En se gonflant, il peut chanter une longue berceuse\nqui endort inévitablement ses adversaires."
        it:
          x: "Cattura l’attenzione dei nemici grazie agli enormi\nocchi rotondi, per poi farli addormentare con una\ndolce ninnananna."
          y: "Se si gonfia e usa il suo Canto diventa più resistente\ne causa una forte sonnolenza in chi lo ascolta."
        de:
          x: "Es fesselt die Gegner mit seinen großen,\nrunden Augen und versetzt sie in Schlaf,\nindem es eine beruhigende Melodie singt."
          y: "Wenn es Gesang einsetzt, steigt seine Ausdauer\nund seine Zuhörer werden in Tiefschlaf versetzt."
        es:
          x: "Cautiva con la mirada a su enemigo y hace que se\nquede profundamente dormido mientras entona una\ndulce melodía."
          y: "Si se hincha para cantar una nana, cantará más tiempo\ny podría causar sopor en el público."
        ko:
          x: "동그랗고 커다란 눈동자로\n유인하고 기분 좋은 노래를\n불러 상대방을 잠들게 한다."
          y: "크게 몸을 부풀려\n노래하는 자장가는 평소보다\n길어서 반드시 잠이 온다."
