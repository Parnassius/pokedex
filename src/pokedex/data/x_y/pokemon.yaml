          y: "するどいツメを　ゆびの　なかに\nかくしている。いきなり　のばして\nおそってきた　あいてを　ひるませる。"
        jp_kanji:
          x: "住処から　タマゴを　かすめ取り\n食べてしまう。鋭い　カギヅメが\n相手の　急所を　切り裂く。"
          y: "鋭いツメを　指の　中に\n隠している。いきなり　伸ばして\n襲ってきた　相手を　ひるませる。"
        en:
          x: "It feeds on eggs stolen from nests. Its sharply\nhooked claws rip vulnerable spots on prey."
          y: "Its paws conceal sharp claws. If attacked,\nit suddenly extends the claws and startles\nits enemy."
        fr:
          x: "Il se nourrit d’œufs volés dans des nids. Ses griffes\ncrochues percent les défenses de l’ennemi."
          y: "Ses griffes sont cachées dans ses pattes. S’il est\nattaqué, il les sort pour frapper ses ennemis."
        it:
          x: "Mangia uova rubate dai nidi. Attacca i nemici nei\npunti deboli con i suoi artigli uncinati."
          y: "Le zampe nascondono artigli affilati. Se è attaccato,\nallunga gli artigli spaventando i nemici."
        de:
          x: "Es ernährt sich von Eiern, die es aus Nestern stiehlt.\nBeute greift es mit seinen scharfen Krallen an."
          y: "In seinen Pfoten stecken scharfe Krallen. Es fährt sie\nblitzschnell aus, um die Gegner zu überraschen."
        es:
          x: "Se alimenta de huevos robados en nidos. Clava sus\nafiladas garras en los puntos débiles de sus rivales."
          y: "Sus ocultas garras son muy afiladas. Si le atacan,\nextiende sus garras y asusta al enemigo."
        ko:
          x: "거처에서 알을 가로채어 먹어\n버린다. 날카로운 갈고리 손톱이\n상대의 급소를 베어 가른다."
          y: "예리한 손톱을 손가락 안에\n감추고 있다. 갑자기 뻗어서\n습격해온 상대를 풀죽게 만든다."
