          y: "レントラーの　とうし　のうりょくは\nきけんな　ものを　はっけんする　とき\nとても　やくに　たつのだ。"
        jp_kanji:
          x: "瞳が　金色に　光るとき\n壁の　向こうに　隠れている\n獲物を　見つけることが　できる。"
          y: "レントラーの　透視能力は\n危険な　ものを　発見するとき\nとても　役に立つのだ。"
        en:
          x: "When its eyes gleam gold, it can spot hiding\nprey--even those taking shelter behind a wall."
          y: "Luxray’s ability to see through objects comes in\nhandy when it’s scouting for danger."
        fr:
          x: "Quand ses yeux se dorent, il peut repérer une proie\ncachée, même si elle est derrière un mur."
          y: "Sa capacité à voir à travers tout est très utile pour\ndétecter les moindres dangers."
        it:
          x: "Se i suoi occhi sono dorati, può individuare le prede,\nanche quelle che si nascondono dietro i muri."
          y: "L’abilità radioscopica di Luxray si rivela utile\nquando gli fa scoprire oggetti pericolosi."
        de:
          x: "Leuchten seine Augen golden auf, kann es Beute,\ndie sich versteckt, sehen. Es kann durch Wände sehen."
          y: "Beim Aufspüren von Gefahren sind Luxtras\nhellseherische Fähigkeiten äußerst hilfreich."
        es:
          x: "Cuando sus ojos brillan como el oro, puede ver presas\nescondidas, incluso detrás de un muro."
          y: "La potente visión de Luxray resulta extremadamente\nvaliosa cuando acecha el peligro."
        ko:
          x: "눈동자가 금색으로 빛날 때\n벽의 저편에 숨어 있는\n먹이를 찾아낼 수 있다."
          y: "렌트라의 투시 능력은\n위험한 것을 발견할 때\n매우 도움이 된다."
