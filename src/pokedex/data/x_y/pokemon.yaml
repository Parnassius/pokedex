        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      hidden_ability: solar_power
      descriptions:
        jp_kana:
          x: "しっぽを　ふりまわして　あいてを\nなぎたおし　するどい　ツメで\nズタズタに　ひきさいてしまう。"
          y: "もえる　しっぽを　ふりまわすと\nまわりの　おんどが　どんどん\nあがって　あいてを　くるしめる。"
        jp_kanji:
          x: "尻尾を　振り回して\n相手を　なぎ倒し　鋭い　ツメで\nズタズタに　ひきさいてしまう。"
          y: "燃える　尻尾を　振り回すと\nまわりの　温度が　どんどん　上がって\n相手を　苦しめる。"
        en:
          x: "It lashes about with its tail to knock down its foe.\nIt then tears up the fallen opponent with\nsharp claws."
          y: "When it swings its burning tail, it elevates the air\ntemperature to unbearably high levels."
        fr:
          x: "Il se sert de sa queue pour faire tomber ses\nadversaires. Une fois qu’ils sont au sol, il les lacère\nde ses griffes acérées."
          y: "En agitant sa queue, il peut élever la température à\nun niveau incroyable."
        it:
          x: "Fa cadere a terra il nemico colpendolo con la coda,\nper poi finirlo con gli artigli affilati."
          y: "Quando agita la sua coda infuocata porta la\ntemperatura a livelli insostenibili."
        de:
          x: "Es schlägt im Kampf mit seinem Schwanz nach\nseinen Gegnern. Anschließend zerfetzt es\ndie Gegner mit seinen scharfen Klauen."
          y: "Wenn Glutexo mit seinem Schwanz schwingt,\nsteigt die Temperatur ins Unermessliche."
        es:
          x: "Suele usar la cola para derribar a su rival. Cuando lo\ntira, se vale de sus afiladas garras para acabar con él."
          y: "Cuando balancea la ardiente cola, eleva la temperatura\na niveles muy altos."
        ko:
          x: "꼬리를 휘둘러 상대를\n쓰러트리고 날카로운 발톱으로\n갈기갈기 찢어버린다."
          y: "불타는 꼬리를 휘두르면\n주위의 온도가 점점\n올라가 상대를 괴롭게 한다."
