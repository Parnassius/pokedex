        jp_kana:
          x: "あたたかい　ひざしを　あびると\nつぼみが　ひらき　かふんを　とばす。\nきれいな　みずの　ちかくが　すみか。"
          y: "ふゆの　あいだは　つぼみを　とざして\nさむさに　たえる。はるになると\nつぼみを　ひらき　かふんを　とばす。"
        jp_kanji:
          x: "暖かい　日差しを　浴びると\nつぼみが　開き　花粉を　飛ばす。\nきれいな　水の　近くが　住処。"
          y: "冬の　あいだは　つぼみを　閉ざして\n寒さに　耐える。春になると\nつぼみを　開き　花粉を　飛ばす。"
        en:
          x: "When it feels the sun’s warm touch, it opens its bud\nto release pollen. It lives alongside clear pools."
          y: "Over the winter, it closes its bud and endures the\ncold. In spring, the bud opens and releases pollen."
        fr:
          x: "Son bourgeon s’ouvre une fois gorgé de soleil et\nlibère du pollen. Il vit près des sources d’eau pure."
          y: "En hiver, son bourgeon se referme pour résister au\nfroid. Il s’ouvre au printemps et libère du pollen."
        it:
          x: "I raggi del sole gli fanno schiudere la gemma e\nrilasciare polline. Fa la tana vicino a bei corsi d’acqua."
          y: "D’inverno chiude la sua gemma e resiste al freddo.\nIn primavera la gemma si riapre e rilascia polline."
        de:
          x: "Bei Sonnenlicht öffnet es seine Knospe und gibt\nPollen ab. Es lebt in der Nähe von sauberem Wasser."
          y: "Im Winter schließt es die Knospe. Im Frühjahr\nöffnet es die Knospe und gibt Pollen ab."
        es:
          x: "Vive cerca de aguas cristalinas. Su cabello se abre y\nesparce polen cuando le bañan los rayos del sol."
          y: "En invierno cierra su capullo para protegerse del frío.\nEn primavera, el capullo se abre y esparce polen."
        ko:
          x: "따뜻한 햇볕을 쬐면\n봉오리를 펴서 꽃가루를 날린다.\n깨끗한 물 가까이에 거처가 있다."
          y: "겨울 동안 봉오리를 닫고\n추위를 견딘다. 봄이 되면\n봉오리를 펴서 꽃가루를 날린다."
