        jp_kanji:
          x: "鋼鉄のように　硬い　殻で\nやわらかい　中身を　守っている。\n進化するまで　じっと　耐えている。"
          y: "殻が　硬くなる前に\n強い　衝撃を　受けると\n中身が　出てしまうので　注意。"
