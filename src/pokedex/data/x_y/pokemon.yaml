          x: "りょうめは　とくしゅな　つくり。\nわずかな　ひかりを　あつめては\nくらやみでも　まわりを　みわける。"
          y: "ものごとを　かんがえだすと\nくびを　１８０ど　かいてん　させて\nあたまの　はたらきを　たかめる。"
        jp_kanji:
          x: "両目は　特殊な　つくり。\nわずかな　光を　集めては\n暗闇でも　まわりを　見分ける。"
          y: "物事を　考え出すと\n首を　１８０度　回転させて\n頭の　働きを　高める。"
        en:
          x: "Its eyes are specially adapted. They concentrate\neven faint light and enable it to see in the dark."
          y: "When it needs to think, it rotates its head\n180 degrees to sharpen its intellectual power."
        fr:
          x: "Ses yeux sont adaptés à la nuit. Ils peuvent\nconcentrer la faible lumière dans l’obscurité."
          y: "Quand il réfléchit, il tourne sa tête sur 180° pour\noptimiser son mode de pensée."
        it:
          x: "Ha degli occhi speciali con cui concentra anche la\nluce più fioca per poter vedere al buio."
          y: "Quando pensa ruota la testa di 180 gradi per\npotenziare le sue capacità intellettive."
        de:
          x: "Sein Sehvermögen ist hervorragend. Selbst bei\nschwachem Licht kann es jedes Detail erkennen."
          y: "Muss es nachdenken, dreht es seinen Kopf um\n180 Grad, um so seinen Intellekt zu schärfen."
        es:
          x: "Sus ojos están especialmente adaptados.\nConcentran la luz para poder ver en la oscuridad."
          y: "Cuando necesita pensar, gira su cabeza 180° para\nagudizar su capacidad intelectual."
        ko:
          x: "양쪽 눈이 특수한 구조다.\n적은 양의 빛이라도 잘 모아\n어둠 속에서도 주위를 분별한다."
          y: "뭔가를 생각해내면\n목을 180도 회전시켜\n두뇌 회전을 높인다."
ledyba:
