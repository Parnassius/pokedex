          x: "かんそうした　さばくに　せいそく。\nすりばちじょうの　すあなの　なかで\nえものを　じっと　まち　つづける。"
          y: "ぜったいに　だっしゅつ　ふかのうな\nすりばちじょうの　すあなを　つくって\nえものが　おちてくるのを　まつ。"
        jp_kanji:
          x: "乾燥した　砂漠に　生息。\nすり鉢状の　巣穴の　中で\n獲物を　じっと　待ち続ける。"
          y: "絶対に　脱出　不可能な\nすりばち状の　巣穴を　つくって\n獲物が　落ちてくるのを　待つ。"
        en:
          x: "It lives in arid deserts. It makes a sloping pit trap in\nsand where it patiently awaits prey."
          y: "It makes an inescapable conical pit and lies in wait\nat the bottom for prey to come tumbling down."
        fr:
          x: "Il vit dans les déserts arides. Pour attraper ses proies,\nil se place dans un trou et laisse sa gueule grande\nouverte en attendant qu’elles tombent dedans."
          y: "Il creuse puis attend ses proies dans son antre, un\ntrou conique dont il est impossible de s’échapper."
        it:
          x: "Vive nei deserti. Scava buche nel terreno e vi si\napposta, attendendo che le prede vi caschino dentro."
          y: "Costruisce un nido a forma di imbuto dal quale non si\npuò scappare, aspettando poi che le prede cadano in\ntrappola."
        de:
          x: "Es lebt in trockenen Wüstengebieten, wo es eine\nTrichterfalle baut und seelenruhig darauf wartet,\ndass Beute hinabrutscht."
          y: "Es baut sich ein trichterförmiges Loch, aus dem es\nkein Entrinnen gibt, und wartet, bis Beute hineinfällt."
        es:
          x: "Habita desiertos áridos. Cava fosas profundas, en las\nque espera que caiga su presa."
          y: "Excava fosas cóncavas de las cuales resulta imposible\nescapar y espera a que una presa caiga en su interior."
        ko:
          x: "건조한 사막에 서식한다.\n원뿔형의 보금자리 속에서\n조용히 먹잇감을 계속 기다린다."
          y: "절대 탈출 불가능한\n원뿔형의 둥지를 만들어\n먹이가 떨어지는 것을 기다린다."
