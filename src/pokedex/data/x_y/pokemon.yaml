          y: "うつくしい　ハネを　ひろげて\nあいてを　いかくする。\nマッハ２で　そらを　とびまわる。"
        jp_kanji:
          x: "エサを　探すとき　水面　すれすれを\n滑るように　飛んで\nコイキングなどを　わしづかみにする。"
          y: "美しい　羽を　広げて\n相手を　威嚇する。\nマッハ２で　空を　飛び回る。"
        en:
          x: "When hunting, it skims the surface of water\nat high speed to pick off unwary prey such\nas Magikarp."
          y: "It spreads its gorgeous wings widely to intimidate\nenemies. It races through the skies at\nMach-2 speed."
        fr:
          x: "Il survole la surface de l’eau pour repérer une proie\net plonge en piqué pour l’attraper."
          y: "Roucarnage déploie ses ailes majestueuses pour\neffrayer ses ennemis. Il peut voler à Mach 2."
        it:
          x: "Quando caccia, vola velocissimo sul pelo dell’acqua\ne cattura ignare prede come Magikarp."
          y: "Intimidisce i nemici spiegando le possenti ali.\nIn volo raggiunge la velocità di Mach 2."
        de:
          x: "Dieses Pokémon schnellt bei der Jagd blitzschnell\nunter Wasser, um seine ahnungslose Beute zu fangen."
          y: "Es breitet seine betörenden Schwingen aus,\num den Gegner einzuschüchtern.\nSeine Fluggeschwindigkeit liegt bei Mach 2."
        es:
          x: "Cuando caza, vuela muy deprisa a ras del agua y\nsorprende a inocentes presas como Magikarp."
          y: "Para intimidar a su enemigo, extiende las increíbles\nalas que tiene. Este Pokémon vuela a una velocidad\nincreíble."
        ko:
          x: "먹이를 찾을 때 수면을\n아슬아슬하게 미끄러지듯 날아\n잉어킹 등을 움켜잡는다."
          y: "아름다운 날개를 펼쳐\n상대를 위협한다.\n마하2로 하늘을 날아다닌다."
