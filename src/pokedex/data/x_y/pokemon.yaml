          y: "うまれてから　すうおくねんの　あいだ\nちていで　ねむっていた。どうくつを\nほると　たまに　でてくる。"
        jp_kanji:
          x: "地下深くの　高温　高圧な\n環境で　生まれた。\n頭の　石から　エネルギーを　放つ。"
          y: "生まれてから　数億年の間\n地底で　眠っていた。\n洞窟を　掘ると　たまに　出てくる。"
        en:
          x: "Born from the temperatures and pressures\ndeep underground, it fires beams from the\nstone in its head."
          y: "It has slept underground for hundreds of millions\nof years since its birth. It’s occasionally found\nduring the excavation of caves."
        fr:
          x: "Ce Pokémon vient des profondeurs de la terre,\noù la chaleur et la pression sont intenses.\nLa pierre qui orne sa tête émet de l’énergie."
          y: "Il sommeille sous terre depuis son apparition, il y a\nplusieurs centaines de millions d’années.\nOn le découvre parfois en creusant des cavernes."
        it:
          x: "Nato in ambienti sotterranei a elevati livelli di pressione\ne temperatura, emette energia dalla pietra che ha\nsulla testa."
          y: "Dopo la nascita, dorme nelle viscere della terra per\nmilioni di anni. A volte se ne trova qualche esemplare\nscavando nelle caverne."
        de:
          x: "Dieses Pokémon entstand aus Druck und Hitze\nin den tiefsten Erdschichten. Mithilfe des Steines\nin seinem Kopf feuert es Energiestrahlen ab."
          y: "Nach seiner Geburt brachte es hunderte Millionen von\nJahren tief unter der Erde schlafend zu. Es tritt\ngelegentlich bei Höhlengrabungen zutage."
        es:
          x: "Nace en las profundidades subterráneas, a altas\ntemperaturas y a gran presión. Irradia energía por\nla roca que tiene en la cabeza."
          y: "Lleva varios cientos de millones de años durmiendo en\nlas profundidades subterráneas, desde su nacimiento.\nAparece a veces al excavar en cuevas."
        ko:
          x: "지하 깊은 곳에 있는 고온, 고압의\n환경에서 태어났다. 머리의\n돌에서 에너지를 방출한다."
          y: "태어나서 수억 년 동안\n땅속에 잠들어 있었다. 동굴을\n파면 가끔 나오곤 한다."
goomy:
