charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    jp_kanji: ヒトカゲ
    en: Charmander
    fr: Salamèche
    it: Charmander
    de: Glumanda
    es: Charmander
    ko: 파이리
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      hidden_ability: solar_power
      descriptions:
        jp_kana:
          x: "しっぽの　ほのおは　ヒトカゲの\nせいめいりょくの　あかし。\nげんきだと　さかんに　もえさかる。"
          y: "うまれたときから　しっぽに　ほのおが\nともっている。ほのおが　きえたとき\nその　いのちは　おわって　しまう。"
        jp_kanji:
          x: "尻尾の　炎は\nヒトカゲの　生命力の　証。\n元気だと　さかんに　燃えさかる。"
          y: "生まれたときから　尻尾に　炎が\n点っている。炎が　消えたとき\nその　命は　終わってしまう。"
        en:
          x: "The flame on its tail indicates Charmander’s life\nforce. If it is healthy, the flame burns brightly."
          y: "From the time it is born, a flame burns at the tip of\nits tail. Its life would end if the flame were to\ngo out."
        fr:
          x: "La flamme sur sa queue représente l’énergie vitale\nde Salamèche. Quand il est vigoureux, elle brûle plus\nfort."
          y: "Depuis sa naissance, une petite flamme brûle au bout\nde sa queue. Si cette flamme s’éteint, la vie de ce\nPokémon s’éteindra elle aussi."
        it:
          x: "La fiamma che Charmander ha sulla coda indica la\nsua forza vitale. Se è in forma, la fiamma è vivace."
          y: "Dalla nascita una fiamma gli arde sulla punta della\ncoda. Se si spegnesse, per lui sarebbe la fine."
        de:
          x: "Die Flamme auf seiner Schweifspitze zeigt die\nLebensenergie an. Ist es gesund, leuchtet sie hell."
          y: "Von Geburt an brennt die Flamme auf seiner\nSchwanzspitze. Sobald sie erlischt, erlischt auch\nsein Lebenslicht."
        es:
          x: "La llama de su cola indica la fuerza vital de\nCharmander. Será brillante si está sano."
          y: "Este Pokémon nace con una llama en la punta de la\ncola. Si la llama se apagara, el Pokémon se debilitaría."
        ko:
          x: "꼬리의 불꽃은 파이리의\n생명력의 상징이다.\n건강할 때 왕성하게 불타오른다."
          y: "태어날 때부터 꼬리의 불꽃이\n타오르고 있다. 불꽃이 꺼지면\n그 생명이 다하고 만다."
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    jp_kanji: リザード
    en: Charmeleon
    fr: Reptincel
    it: Charmeleon
    de: Glutexo
