          y: "Recréé à partir d’un fossile, il utilise l’air dans sa\ncoquille pour s’enfoncer dans l’eau ou faire surface."
        it:
          x: "Pokémon preistorico, che viveva nel mare primordiale.\nNuota facendo oscillare i suoi dieci tentacoli."
          y: "Questo Pokémon, resuscitato da un antico fossile,\nusa l’aria del guscio per immergersi."
        de:
          x: "Ein prähistorisches Pokémon, das zur Urzeit im\nWasser lebte. Es schwimmt, indem es seine\nzehn Tentakel bewegt."
          y: "Es wurde aus einem Fossil reanimiert. Es nutzt\ndie Luftkammern in seiner Schale, um ab- und\naufzutauchen."
        es:
          x: "Pokémon prehistórico que vivió en el océano\nprimordial. Para nadar se valía de sus 10 tentáculos."
          y: "Resucitado de un fósil, este Pokémon usa el aire de\nsu concha para sumergirse y emerger."
        ko:
          x: "먼 옛날 바다에서 살고 있던\n고대 포켓몬. 10개의 다리를\n구불거리며 헤엄친다."
          y: "고대의 화석에서 부활했다.\n껍질 안에 모은 공기로\n수중에서 뜨고 가라앉기를 반복했다."
