        jp_kana:
          x: "みじかい　あしで　あるくより\nやわらかい　からだを　つかって\nとびはねながら　うごきまわる。"
          y: "とても　やわらかい　からだ。\nいちど　ころがると　はずみまくって\nぜんぜん　とまれなくなる。"
        jp_kanji:
          x: "短い　脚で　歩くより\nやわらかい　体を　使って\n飛び跳ねながら　動き回る。"
          y: "とても　やわらかい　体。\n1度　転がると　弾みまくって\nぜんぜん　止まれなくなる。"
        en:
          x: "Instead of walking with its short legs, it moves\naround by bouncing on its soft, tender body."
          y: "It has a very soft body. If it starts to roll, it will\nbounce all over and be impossible to stop."
        fr:
          x: "Plutôt que de se déplacer avec ses petites pattes,\nil rebondit avec son corps doux et moelleux."
          y: "Son corps est très doux. Quand il commence à\nrebondir, il est impossible de l’arrêter."
        it:
          x: "Anziché camminare sulle sue corte zampe, preferisce\nrimbalzare sul suo corpo soffice e delicato."
          y: "Il suo corpo è morbidissimo. Se inizia a rotolare,\nrimbalza così forte che è impossibile fermarlo."
        de:
          x: "Anstatt mit seinen kurzen Beinen zu laufen, hüpft es\nmit seinem weichen und kuscheligen Körper."
          y: "Sein Körper ist sehr weich. Kommt es ins Rollen,\nhüpft es herum und man kann es nicht aufhalten."
        es:
          x: "Para caminar, en lugar de usar los pies que tiene, opta\npor dar botes con su cuerpo redondo y blandito."
          y: "Su cuerpo es muy blando. Si se pone a rodar,\nrebotará contra todo y será imposible de parar."
        ko:
          x: "짧은 다리로 걷는 것보다는\n부드러운 몸으로\n튀어 오르며 돌아다닌다."
          y: "매우 부드러운 몸이다.\n한번 구르면 탄력이 붙어서\n전혀 멈출 수 없게 된다."
