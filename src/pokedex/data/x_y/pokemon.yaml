      descriptions:
        jp_kana:
          x: "ミロカロスの　うつくしい　すがたを\nみた　ものは　あらそいの　きもちを\nわすれてしまうと　いわれている。"
          y: "せかいいち　うつくしい　ポケモン。\nミロカロスを　モデルにした　かいがや\nちょうこくが　たくさん　ある。"
        jp_kanji:
          x: "ミロカロスの　美しい　姿を\n見た者は　争いの　気持ちを\n忘れてしまうと　言われている。"
          y: "世界一　美しい　ポケモン。\nミロカロスを　モデルにした\n絵画や　彫刻が　たくさん　ある。"
        en:
          x: "Milotic is breathtakingly beautiful. Those that see it\nare said to forget their combative spirits."
          y: "It is the world’s most beautiful Pokémon. There are\nmany works of art featuring Milotic."
        fr:
          x: "Milobellus est d’une beauté à couper le souffle.\nCeux qui en voient un perdent aussitôt l’envie de se\nbattre."
          y: "Le plus beau Pokémon du monde. De nombreuses\nœuvres d’art représentent Milobellus."
        it:
          x: "Pokémon di una bellezza vertiginosa. Chi lo vede\nperde ogni voglia di combattere."
          y: "È il Pokémon più bello del mondo. Ci sono parecchie\nopere d’arte ispirate a Milotic."
        de:
          x: "Milotic ist atemberaubend schön. Man sagt,\ndass diejenigen, die es sehen, vergessen zu kämpfen."
          y: "Dies ist das schönste Pokémon der Welt. Es gibt\nviele Kunstwerke, die Milotic darstellen."
        es:
          x: "Milotic es impresionantemente bello. Quienes lo ven,\ntemen perder las ganas de luchar contra él."
          y: "Es el Pokémon más hermoso del mundo. Milotic ha\ninspirado numerosas obras de arte."
        ko:
          x: "밀로틱의 아름다운 모습을\n본 이는 싸우려던 마음가짐을\n잊어버린다고 한다."
          y: "세계에서 제일 아름다운\n포켓몬이다. 밀로틱을 모델로 한\n회화나 조각이 많이 있다."
