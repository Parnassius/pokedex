          x: "ぜんしんの　どくばりを　とばすため\n１０リットルの　みずを　いっきに\nのみこみ　からだを　ふくらませる。"
          y: "ぜんしんの　ちいさな　ハリは\nうろこが　へんかしたもの。\nささると　どくで　きをうしなう。"
        jp_kanji:
          x: "全身の　毒針を　飛ばすため\n１０リットルの　水を　一気に\n飲みこみ　体を　ふくらませる。"
          y: "全身の　小さな　針は\nウロコが　変化したもの。\n刺さると　毒で　気を失う。"
        en:
          x: "To fire its poison spikes, it must inflate its body by\ndrinking over 2.6 gallons of water all at once."
          y: "The small spikes covering its body developed from\nscales. They inject a toxin that causes fainting."
        fr:
          x: "Pour tirer ses dards empoisonnés, il gonfle son corps\nen buvant 10 l d’eau subitement."
          y: "Son corps est recouvert de pics provenant de ses\nécailles. Ils sécrètent un poison étourdissant."
        it:
          x: "Per sparare le punte velenose, gonfia il corpo\nbevendo più di 10 l d’acqua in una volta."
          y: "I piccoli aculei che coprono il suo corpo si sono\nformati dalle squame. Contengono una tossina che\nfa svenire."
        de:
          x: "Um seine Giftstacheln abzufeuern, muss es\nseinen Körper aufpumpen, indem es 10 l trinkt."
          y: "Die kleinen Stacheln an seinem Körper sind aus\nSchuppen entstanden. Damit injiziert es Gift."
        es:
          x: "Para arrojar sus venenosas púas, infla su cuerpo\nbebiendo hasta diez litros de agua de una sola vez."
          y: "Las pequeñas púas que cubren su cuerpo eran\nescamas. Inyectan una toxina que debilita."
        ko:
          x: "전신의 독침을 날리기 위해\n10리터의 물을 단번에\n마시고 몸을 부풀린다."
          y: "전신의 작은 바늘은\n비늘이 변화한 것이다.\n찔리면 독 때문에 정신을 잃게 된다."
