          y: "１にちに　いくつか　たまごを　うむ。\nその　たまごは　えいよう　まんてんで\nものすごく　おいしい　らしい。"
        jp_kanji:
          x: "幸せを　運ぶと　いわれている。\n傷ついた　人に　タマゴを\n分けてあげる　優しい　ポケモン。"
          y: "１日に　いくつか　タマゴを　産む。\nその　タマゴは　栄養満点で\nものすごく　おいしいらしい。"
        en:
          x: "It is said to deliver happiness.\nBeing compassionate, it shares its eggs\nwith injured people."
          y: "It lays several eggs a day. The eggs are apparently\nrich in nutrients and extremely delicious."
        fr:
          x: "Il est censé apporter la joie. Ce Pokémon charitable\noffre ses œufs aux blessés."
          y: "Il peut pondre plusieurs œufs par jour. Ses œufs sont\ntrès riches en nutriments et vraiment délicieux."
        it:
          x: "Si dice che porti felicità. È molto altruista e condivide\nle uova con chi è ferito."
          y: "Ogni giorno depone diverse uova, che sembrano\nessere deliziose e molto nutrienti."
        de:
          x: "Man sagt, es bringe Glück. Es ist sehr mitfühlend\nund teilt seine Eier mit Verletzten."
          y: "Es legt mehrere Eier am Tag. Sie sind sehr nahrhaft\nund außerordentlich schmackhaft."
        es:
          x: "Se dice que reparte felicidad. Se caracteriza por su\ncompasión y reparte sus huevos entre la gente herida."
          y: "Pone varios huevos al día. Según parece son muy\nnutritivos y están riquísimos."
        ko:
          x: "행복을 가져다준다고 전해진다.\n상처 입은 사람에게 알을\n나눠주는 상냥한 포켓몬이다."
          y: "하루에 몇 개의 알을 낳는다.\n그 알은 영양 만점으로\n굉장히 맛있다고 한다."
tangela:
