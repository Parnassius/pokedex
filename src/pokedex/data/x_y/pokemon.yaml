          y: "尻尾で　飛び跳ねて　心臓を\n動かしている。パールルの　作った\n真珠を　頭に　乗せている。"
        en:
          x: "It bounces constantly, using its tail like a spring.\nThe shock of bouncing keeps its heart beating."
          y: "It bounces around on its tail to keep its\nheart pumping. It carries a pearl from\nClamperl on its head."
        fr:
          x: "Il utilise sa queue comme un ressort et bondit partout.\nChaque nouveau choc fait battre son cœur."
          y: "Il rebondit sur sa queue pour faire battre son cœur.\nLa perle sur sa tête vient d’un Coquiperl."
        it:
          x: "Rimbalza costantemente usando la coda come una\nmolla. Il movimento sollecita il cuore e lo fa battere."
          y: "Deve saltellare continuamente per far battere il suo\ncuore. Porta una perla di Clamperl sul capo."
        de:
          x: "Es hüpft beständig umher, wobei es seinen Schweif\nals Feder verwendet. Nur so bleibt sein Herz aktiv."
          y: "Seine Hüpfbewegungen bringen sein Herz zum\nSchlagen. Es trägt eine Perle von Perlu auf dem Kopf."
        es:
          x: "Bota continuamente usando su cola como muelle.\nSalta para mantener el latido de su corazón."
          y: "Bota usando su cola para mantener el latido de su\ncorazón. Lleva una perla de Clamperl en la cabeza."
        ko:
          x: "꼬리를 용수철 대용으로 써서 항상\n뛰어오르고 있다. 뛰는 반동으로\n심장을 고동시키고 있는 것이다."
          y: "꼬리로 뛰어올라 심장을\n움직이고 있다. 진주몽이 만든\n진주를 머리에 이고 있다."
