          y: "８まいの　しょくしゅで　えものを\nからめとり　つよい　しょうかえきで\nとかしてから　むしゃむしゃ　たべる。"
        jp_kanji:
          x: "暖かい　海の　浅瀬に　いる。\n潮が　引くと　砂浜に　潜った\n獲物を　掘り出して　食べる。"
          y: "８枚の　触手で　獲物を　絡め取り\n強い　消化液で　溶かしてから\nむしゃむしゃ　食べる。"
        en:
          x: "It lives in the shallows of warm seas. When the tide\ngoes out, it digs up prey from beaches."
          y: "It ensnares prey with its eight tentacles. It then\nmelts the prey with a strong acid before feeding."
        fr:
          x: "Vit dans les hauts-fonds des mers chaudes.\nIl déterre sa proie du sable quand la marée se retire."
          y: "Lorsqu’il chasse, Vacilys utilise ses huit tentacules.\nIl dissout sa proie à l’aide d’un puissant acide avant\nde l’avaler."
        it:
          x: "Vive in acque poco profonde nei mari caldi. Con la\nbassa marea, scava sulla riva in cerca di prede."
          y: "Irretisce la preda con gli otto tentacoli, poi la scioglie\nusando un forte acido e, infine, se ne ciba."
        de:
          x: "Es lebt in seichten Stellen warmer Meere.\nBei Ebbe sucht es im Sand nach Beute."
          y: "Es fängt Beute mit seinen acht Tentakeln. Ehe es sie\nverspeist, löst es sie mit einer starken Säure auf."
        es:
          x: "Vive en el fondo de los mares de aguas templadas.\nEmerge para cazar cuando baja la marea."
          y: "Atrapa a su presa con los ocho tentáculos que tiene y,\nantes de devorarla, la baña en ácido."
        ko:
          x: "따뜻한 바다의 얕은 곳에 있다.\n바닷물이 빠지면 모래 해변에\n숨어 있는 먹이를 파내어 먹는다."
          y: "8개의 촉수로 먹이를\n감싸 강한 소화액으로\n녹이고 나서 우걱우걱 먹는다."
