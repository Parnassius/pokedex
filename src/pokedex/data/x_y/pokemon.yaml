        jp_kana:
          x: "からだを　うごかすたびに　きんにくが\nのびちぢみして　でんきが　うまれる。\nピンチになると　からだが　かがやく。"
          y: "きけんを　かんじると　ぜんしんの\nたいもうが　ひかる。あいてが　めを\nくらませている　あいだに　にげる。"
        jp_kanji:
          x: "体を　動かすたびに　筋肉が\n伸び縮みして　電気が　生まれる。\nピンチになると　体が　輝く。"
          y: "危険を　感じると　全身の\n体毛が　光る。相手が　目を\nくらませている　あいだに　逃げる。"
        en:
          x: "The extension and contraction of its muscles\ngenerates electricity. It glows when in trouble."
          y: "All of its fur dazzles if danger is sensed. It flees\nwhile the foe is momentarily blinded."
        fr:
          x: "Ses muscles génèrent un courant électrique lorsqu’ils\ntravaillent. Il s’illumine en cas de danger."
          y: "Sa fourrure étincelle en cas de danger. Il profite du\nfait que l’ennemi est aveuglé pour s’enfuir."
        it:
          x: "Produce elettricità contraendo e rilassando i muscoli.\nQuando si sente minacciato si illumina."
          y: "In caso di pericolo, la sua pelliccia si illumina. Il\nnemico rimane accecato e lui ne approfitta per fuggire."
        de:
          x: "Es erzeugt Elektrizität durch das Strecken und\nZusammenziehen seiner Muskeln. Bei Bedrohung\nglüht es."
          y: "In Gefahr blendet es seinen Gegner mit seinem Fell\nund flieht, während der Gegner einen Moment\nblind ist."
        es:
          x: "La extensión y contracción de sus músculos genera\nelectricidad. Brilla cuando está en peligro."
          y: "Si siente peligro, todo su pelaje brilla. Aprovecha la\nceguera temporal de su rival para huir."
        ko:
          x: "몸을 움직일 때마다 근육이 늘어났다\n줄어들었다 하여 전기가 발생한다.\n궁지에 몰리면 몸이 빛난다."
          y: "위험을 느끼면 전신의 털이\n빛난다. 그로 인해 상대가 앞을\n보지 못하는 동안 도망친다."
