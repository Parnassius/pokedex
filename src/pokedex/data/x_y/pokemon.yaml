        jp_kana:
          x: "あいてに　まきつき　まるい\nはんてんから　でんきを　ながして\nしびれたところを　まるかじりする。"
          y: "しょくよく　おうせいな　ポケモン。\nえものを　みつけると　おそいかかり\nでんきで　しびれさせてから　たべる。"
        jp_kanji:
          x: "相手に　巻きつき　まるい\nはん点から　電気を　流して\nしびれたところを　まるかじりする。"
          y: "食欲　旺盛な　ポケモン。\n獲物を　見つけると　襲いかかり\n電気で　しびれさせてから　食べる。"
        en:
          x: "It wraps itself around its prey and paralyzes it with\nelectricity from the round spots on its sides.\nThen it chomps."
          y: "These Pokémon have a big appetite. When they\nspot their prey, they attack it and paralyze it\nwith electricity."
        fr:
          x: "Ses taches émettent de l’électricité quand il s’enroule\nautour de ses proies pour les paralyser avant de les\ndévorer."
          y: "Un Pokémon doté d’un gros appétit. Il paralyse\nses proies avec des décharges électriques avant\nde les manger."
        it:
          x: "Si avvinghia alla preda e la paralizza rilasciando\nelettricità dalle macchie tonde, poi la ingoia intera."
          y: "Pokémon dal grande appetito. Quando attacca,\nimmobilizza il nemico paralizzandolo con l’elettricità."
        de:
          x: "Schlingt sich um Gegner, lähmt sie über die rund\ngemaserten Flächen an seinem Körper mit Strom\nund beißt beherzt zu."
          y: "Hat es seine Beute erspäht, lähmt es sie mit Elektrizität\nund verspeist sie anschließend."
        es:
          x: "Se enrolla alrededor de su presa, la paraliza con la\nelectricidad de sus marcas circulares y le asesta\nmordiscos."
          y: "Pokémon de apetito voraz. En cuanto encuentra una\npresa, la paraliza con electricidad y la engulle."
        ko:
          x: "상대를 휘감고 동그란\n반점에서 전기를 흘려보내\n마비시킨 뒤 통째로 문다."
          y: "식욕이 왕성한 포켓몬이다.\n먹이를 발견하면 덮쳐서\n전기로 마비시킨 후 먹는다."
