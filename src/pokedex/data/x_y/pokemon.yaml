          x: "It is said to have made Pokémon that look like\nitself from a special ice mountain, rocks,\nand magma."
          y: "There is an enduring legend that states this\nPokémon towed continents with ropes."
        fr:
          x: "On dit qu’il a créé des Pokémon à son image à partir\nde glace, de roche et de magma."
          y: "Une légende tenace veut que ce Pokémon ait traîné\nles continents en les attachant à des cordes."
        it:
          x: "Si dice che abbia creato dei Pokémon simili a sé\nusando una montagna ghiacciata, rocce e magma."
          y: "Una leggenda narra che questo Pokémon abbia\ntrainato i continenti con delle funi."
        de:
          x: "Man sagt, es habe Pokémon aus einem Eisberg,\nFelsen und Magma nach seinem Abbild geschaffen."
          y: "Es gibt eine Legende, wonach dieses Pokémon\ndie Kontinente mit einem Seil gezogen hat."
        es:
          x: "Se dice que usó rocas, magma y un hielo especial de\nmontaña para crear Pokémon con su aspecto."
          y: "Una antigua leyenda afirma que este Pokémon\narrastraba continentes con cuerdas."
        ko:
          x: "특수한 빙산이나 암석,\n마그마에서 자신의 모습과 닮은\n포켓몬을 만들었다고 전해진다."
          y: "밧줄로 묶은 대륙을\n당겨서 움직였다고 하는\n전설이 남아 있다."
