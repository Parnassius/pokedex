          x: "It fights while spinning like a top. The centrifugal\nforce boosts its destructive power by 10."
          y: "If you are enchanted by its smooth, dance-like\nkicks, you may get a closer experience with one\nthan you’d like."
        fr:
          x: "Il combat en tournoyant comme une toupie.\nLa force centrifuge décuple sa puissance destructrice."
          y: "Si sa danse de coups de pied vous fascine, vous\nrisquez de le regretter."
        it:
          x: "Combatte mentre gira come una trottola. La forza\ncentrifuga decuplica il suo potere distruttivo."
          y: "Se ci si fa incantare dall’elegante danza dei suoi\ncalci, si rischia di ricevere una bella lezione."
        de:
          x: "Es kämpft, während es sich wie ein Kreisel dreht.\nDie Zentrifugalkraft verzehnfacht seine Kampfkraft."
          y: "Lässt du dich von seinen eleganten, anmutigen und\ntanzartigen Tritten betören, wirst du vermöbelt."
        es:
          x: "Gira a gran velocidad al luchar. La fuerza centrífuga\nmultiplica su poder de destrucción por diez."
          y: "Si te encantan sus suaves, elegantes y danzarinas\npatadas, acabarás taladrado."
        ko:
          x: "팽이처럼 회전하면서\n싸운다. 원심력의 파워로\n파괴력은 10배다."
          y: "춤추듯이 화려하고 부드러운\n킥 기술에 빠져 있으면\n제대로 일격을 선사한다."
