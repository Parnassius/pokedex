          y: "ふかふかの　たいもうは　くうきを\nたくさん　ふくんで　なつは　すずしく\nふゆは　あたたかいのが　とくちょう。"
        jp_kanji:
          x: "ふわふわの　体毛は　静電気が\nたまると　２倍に　ふくらむ。\n触ると　感電してしまう。"
          y: "ふかふかの　体毛は　空気を\nたくさん　含んで　夏は　涼しく\n冬は　温かいのが　特徴。"
        en:
          x: "Its fluffy coat swells to double when static\nelectricity builds up. Touching it can be shocking."
          y: "It stores lots of air in its soft fur, allowing it to stay\ncool in summer and warm in winter."
        fr:
          x: "Sa laine fournie enfle lorsqu’il accumule de\nl’électricité statique. Son contact peut choquer."
          y: "Il garde une grande quantité d’air dans sa toison pour\nne pas subir les variations de température."
        it:
          x: "Se il manto è carico d’elettricità, le sue dimensioni\nraddoppiano e può dare la scossa."
          y: "L’aria che raccoglie nella pelliccia gli permette di\nstare fresco d’estate e caldo d’inverno."
        de:
          x: "Sein weiches Fell wird doppelt so dick,\nwenn sich Elektrizität aufbaut."
          y: "Es speichert viel Luft in seinem weichen Pelz.\nDadurch ist es im Sommer kalt und im Winter warm."
        es:
          x: "Su pelaje lanudo dobla su volumen al acumular\nelectricidad estática. Tocarlo puede dar calambre."
          y: "Almacena aire en el lanudo pelaje que tiene. Así, se\nmantiene fresco en verano y caliente en invierno."
        ko:
          x: "푹신푹신한 털은 정전기가\n쌓이면 2배로 부풀어 오른다.\n만지면 감전되어 버린다."
          y: "푹신푹신한 털은 공기를\n가득 품고 있어 여름은 시원하고\n겨울은 따뜻한 것이 특징이다."
