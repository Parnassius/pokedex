        fr:
          x: "Les perles noires amplifient ses pouvoirs psychiques,\nlui permettant de contrôler ses ennemis avec sa danse\nétrange."
          y: "Les perles noires amplifient ses pouvoirs psy.\nSa danse étrange lui permet de contrôler ses ennemis."
        it:
          x: "Amplifica i suoi poteri psichici con le sue perle nere.\nSi esibisce anche in danze bizzarre per controllare\ni suoi nemici."
          y: "Usa perle nere per amplificare i suoi poteri psichici.\nCon una danza acquisisce controllo sul nemico."
        de:
          x: "Mit schwarzen Perlen verstärkt es seine Psycho-Kräfte.\nMit einem Tanz kontrolliert es seine Gegner."
          y: "Mit schwarzen Perlen verstärkt es seine Psycho-Kräfte.\nMit einem Tanz kontrolliert es seine Gegner."
        es:
