          y: "おおあめの　きせつが　おわると\nあたたかい　ひざしに　さそわれた\nキレイハナが　おどりはじめる。"
        jp_kanji:
          x: "ときおり　キレイハナが　集まって\n踊るような　仕草を　みせる。\n太陽を呼ぶ　儀式と　いわれる。"
          y: "大雨の　季節が　終わると\n暖かい　日差しに　誘われた\nキレイハナが　踊りはじめる。"
        en:
          x: "Bellossom gather at times and seem to dance.\nThey say that the dance is a ritual to summon\nthe sun."
          y: "When the heavy rainfall season ends, it is drawn\nout by warm sunlight to dance in the open."
        fr:
          x: "Les Joliflor se réunissent souvent pour danser.\nOn pense que c’est un rituel pour appeler le soleil."
          y: "À la fin de la saison des pluies, il sort danser en plein\nair, attiré par la chaleur du soleil."
        it:
          x: "A volte gruppi di Bellossom sembrano danzare.\nSi dice che sia un rito per invocare il sole."
          y: "Quando finisce la stagione delle piogge, lo si vede\ndanzare sotto i caldi raggi del sole."
        de:
          x: "Blubella kommen zusammen, um zu tanzen.\nMan sagt, dieser Tanz sei ein Ritual,\num der Sonne zu huldigen."
          y: "Sobald die Regenzeit vorbei ist, wird es von der\nwarmen Sonne nach draußen gezogen, wo es tanzt."
        es:
          x: "Los Bellossom suelen reunirse para bailar. Dicen que\nsus danzas son un ritual para invocar al sol."
          y: "Cuando acaba la estación de las lluvias, sale al sol e\ninicia una peculiar danza."
        ko:
          x: "가끔 아르코가 모여서\n춤을 추는 듯한 동작을 보인다.\n태양을 부르는 의식이라 전해진다."
          y: "장마의 계절이 끝나면\n따뜻한 햇살에 이끌려나온\n아르코가 춤추기 시작한다."
