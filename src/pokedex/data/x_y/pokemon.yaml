      descriptions:
        jp_kana:
          x: "ブリザードを　はっせいさせて　あたり\nいちめんを　まっしろに　してしまう。\nべつめい　アイスモンスター。"
          y: "まんねんゆきが　つもる　さんみゃくで\nしずかに　くらす。ブリザードを\nはっせいさせて　すがたを　かくす。"
        jp_kanji:
          x: "ブリザードを　発生させて　あたり\n一面を　真っ白に　してしまう。\n別名　アイスモンスター。"
          y: "万年雪が　積もる　山脈で\n静かに　暮らす。ブリザードを\n発生させて　姿を　隠す。"
        en:
          x: "It blankets wide areas in snow by whipping up\nblizzards. It is also known as “The Ice Monster.”"
          y: "It lives a quiet life on mountains that are perpetually\ncovered in snow. It hides itself by whipping\nup blizzards."
        fr:
          x: "De larges zones sont recouvertes par la neige de ses\nblizzards. On l’appelle « monstre des glaces »."
          y: "Il hante les sommets aux neiges éternelles, et se\ncache en déclenchant des blizzards."
        it:
          x: "Crea bufere che ricoprono di neve ampissime aree.\nÈ noto anche come “Mostro dei ghiacci”."
          y: "Vive nella pace delle cime montuose tra le nevi eterne:\nscatena bufere di neve e poi si nasconde."
        de:
          x: "Es bedeckt weite Gebiete mit Schnee, indem es\nBlizzards auslöst. Man nennt es „Das Eismonster“."
          y: "Es haust im Gebirge, wo ewiger Schnee liegt,\nund löst Blizzards aus, um sich zu verstecken."
        es:
          x: "Genera ventiscas con las que cubre de nieve grandes\náreas. Se le llama el Monstruo de Hielo."
          y: "Vive en paz en cordilleras de nieves eternas.\nGenera ventiscas para ocultarse."
        ko:
          x: "블리자드를 발생시켜 주변\n일대를 새하얗게 만든다.\n별명은 아이스 몬스터다."
          y: "만년설이 쌓인 산맥에서\n조용히 지낸다. 블리자드를\n발생시켜 모습을 감춘다."
