          y: "うごくものに　ツルを　からめる。\nツルは　びみょうに　ゆれているので\nからみつかれると　くすぐったい。"
        jp_kanji:
          x: "たくさんの　うごめく　ツルに\n覆われて　正体不明。\n青いツルは　一生　伸びる。"
          y: "動くものに　ツルを　絡める。\nツルは　微妙に　揺れているので\n絡みつかれると　くすぐったい。"
        en:
          x: "Many writhing vines cover it, so its true identity\nremains unknown. The blue vines grow its whole\nlife long."
          y: "It tangles any moving thing with its vines. Their\nsubtle shaking is ticklish if you get ensnared."
        fr:
          x: "Ses lianes s’allongent au fil du temps.\nElles recouvrent tout son corps, dont on ignore\nla véritable forme."
          y: "Il paralyse tout ce qui bouge avec ses lianes.\nElles vous chatouillent si vous êtes capturé."
        it:
          x: "Una moltitudine di liane brulicanti, in crescita perenne,\nne ricopre il corpo celandone la vera forma."
          y: "Intrappola nelle liane qualsiasi cosa si muova. Il lieve\nmovimento di queste può fare il solletico."
        de:
          x: "Aufgrund der Ranken, die seinen Körper bedecken,\nkennt keiner seine wahre Form. Die blauen Ranken\nwachsen immer weiter."
          y: "Es berührt alles, was sich bewegt, mit seinen Ranken.\nDiese Berührungen kitzeln sehr."
        es:
          x: "Se camufla con la multitud de lianas que envuelven su\ncuerpo y que no dejan de crecer a lo largo de toda su\nvida."
          y: "Enreda cualquier cosa que se mueva con sus lianas. Si\nte atrapa, te hará cosquillas con su delicado balanceo."
        ko:
          x: "수많은 움직이는 덩굴에\n둘러싸여 정체불명이다.\n파란 덩굴은 평생 자란다."
          y: "움직이는 것에 덩굴을 감는다.\n덩굴은 미묘하게 흔들리기 때문에\n휘감기면 간지럽다."
