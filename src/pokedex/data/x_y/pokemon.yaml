          y: "からだの　おおきな　ポケモンに\nとりついて　せいでんきを　すいとり\nちくでんぶくろに　でんきを　ためる。"
        jp_kanji:
          x: "自分では　電気を　つくれないので\n他の　大きな　ポケモンに\nとりつき　静電気を　吸いとる。"
          y: "体の　大きな　ポケモンに　とりついて\n静電気を　吸い取り\n蓄電袋に　電気を　ためる。"
        en:
          x: "Since it can’t generate its own electricity, it sticks\nonto large-bodied Pokémon and absorbs\nstatic electricity."
          y: "They attach themselves to large-bodied Pokémon\nand absorb static electricity, which they store in an\nelectric pouch."
        fr:
          x: "Ne produisant pas lui-même d’électricité, il s’accroche\naux Pokémon plus grands et aspire leur électricité\nstatique."
          y: "Il s’accroche aux Pokémon plus grands et aspire\nleur électricité statique. Il la stocke dans ses\npoches-accus."
        it:
          x: "Non può produrre elettricità da sé, per cui si attacca\na Pokémon più grandi per succhiarne l’energia\nelettrostatica."
          y: "Si aggrappa ai Pokémon più grossi e ne assorbe\nl’energia statica che conserva in una sacca\nd’accumulo."
        de:
          x: "Da es selbst keinen Strom erzeugen kann,\nklettert es auf andere Pokémon, um ihnen\nelektrostatische Energie abzusaugen."
          y: "Es pflanzt sich an großen Pokémon fest und zapft\nihnen elektrische Energie ab. Diese hortet es in\nseinen Ladetaschen."
        es:
          x: "No puede generar electricidad por sí mismo, así que se\nencarama a Pokémon grandes y absorbe su energía\nestática."
          y: "Se agarra a Pokémon de gran tamaño, absorbe su\nelectricidad estática y la guarda en una bolsa interna."
        ko:
          x: "스스로 전기를 만들 수 없어\n다른 큰 포켓몬에\n달라붙어 정전기를 흡수한다."
          y: "몸이 큰 포켓몬에게 매달려\n정전기를 빨아들인 후\n축전 주머니에 전기를 모은다."
