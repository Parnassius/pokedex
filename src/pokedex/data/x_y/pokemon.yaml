          y: "ミルクは　えいようまんてん。\nおとしよりや　びょうきの　ひとに\nとって　さいこうの　のみもの。"
        jp_kanji:
          x: "子供が　生まれたときに\nしぼられた　ミルクには　いつもより\n栄養が　たっぷり　つまっている。"
          y: "ミルクは　栄養満点。\nお年寄りや　病気の　人に　とって\n最高の　飲み物。"
        en:
          x: "If it is around babies, the milk it produces contains\nmuch more nutrition than usual."
          y: "Its milk is packed with nutrition, making it the\nultimate beverage for the sick or weary."
        fr:
          x: "Si elle vient d’avoir un petit, son lait est bien plus\nnutritif que d’habitude."
          y: "Son lait est très nutritif. C’est une boisson parfaite\npour les malades et les personnes âgées."
        it:
          x: "Se ha appena avuto un piccolo, il latte che produce\nè molto più nutriente del normale."
          y: "Il suo latte è ricco di sostanze nutrienti, che ne\nfanno il miglior rimedio per chi è stanco o malato."
        de:
          x: "Wenn es gerade ein Junges hat, dann enthält\nseine Milch mehr Nährstoffe als gewöhnlich."
          y: "Aufgrund der vielen Nährstoffe stellt seine Milch\ndas ideale Getränk für Kranke und Schwache dar."
        es:
          x: "Si tiene crías, la leche que produce contiene muchos\nmás nutrientes de lo normal."
          y: "Su leche, rica en nutrientes, es la mejor bebida contra\nel cansancio y la enfermedad."
        ko:
          x: "새끼가 태어났을 때에\n짜낸 우유는 평상시보다\n영양이 듬뿍 담겨 있다."
          y: "우유는 영양 만점이다.\n노인과 병든 사람에게\n최고의 음료수다."
