          x: "まっくらな　どうくつで　くらす。\n２０まんヘルツの　ちょうおんぱを\nおおきな　みみから　はっしゃする。"
          y: "２０まんヘルツの　ちょうおんぱを\nあびると　くっきょうな　レスラーも\nめが　まわり　たっていられないのだ。"
        jp_kanji:
          x: "真っ暗な　洞窟で　暮らす。\n２０万ヘルツの　超音波を\n大きな　耳から　発射する。"
          y: "２０万ヘルツの　超音波を　浴びると\n屈強な　レスラーも　目が　回り\n立っていられないのだ。"
        en:
          x: "They live in pitch-black caves. Their enormous ears\ncan emit ultrasonic waves of 200,000 hertz."
          y: "Even a robust wrestler will become\ndizzy and unable to stand when exposed\nto its 200,000-hertz ultrasonic waves."
        fr:
          x: "Il apprécie les grottes les plus sombres.\nSes grandes oreilles lui permettent de générer\ndes ultrasons d’une fréquence de 200 000 Hz."
          y: "Les ultrasons à 200 000 Hz qu’il émet suffiraient\nà rendre groggy le plus chevronné des lutteurs."
        it:
          x: "Vive in caverne completamente buie. Emette onde\nultrasoniche alla frequenza di 200.000 Hz dalle\ngrandi orecchie."
          y: "Questo Pokémon emette ultrasuoni a 200.000 Hz\nin grado di stordire e stendere anche un lottatore\nprofessionista."
        de:
          x: "Es lebt im Inneren pechschwarzer Höhlen.\nSeine riesigen Ohren setzen Ultraschallwellen\nvon 200 000 Hz frei."
          y: "Selbst ein gestandener Ringer geht bei den\n200 000 Hz hohen Ultraschallwellen dieses\nPokémon unweigerlich in die Knie."
        es:
          x: "Habita en cuevas donde reina la más absoluta\noscuridad y emite ondas ultrasónicas de\n200 000 Hz a través de sus enormes orejas."
          y: "Ni el más recio de los luchadores profesionales\nsería capaz de aguantar sus ondas ultrasónicas de\n200 000 Hz sin marearse e hincar la rodilla."
        ko:
          x: "캄캄한 동굴에서 산다.\n20만Hz의 초음파를\n커다란 귀에서 발사한다."
          y: "20만Hz의 초음파를 받으면\n막강한 레슬러도 현기증이 나\n서 있을 수 없다."
noivern:
