        it:
          x: "Sparge scaglie che paralizzano chiunque le tocchi,\nrendendolo incapace di stare in piedi."
          y: "Le ali sono ricoperte di polvere velenosa, che libera\nnell’aria a ogni batter d’ali."
        de:
          x: "Wer die von ihm verstreuten Schuppen berührt,\nwird gelähmt und muss sich setzen."
          y: "Seine Flügel sind mit staubähnlichen Schuppen\nüberzogen. Mit jedem Flügelschlag verliert es\nhochgiftigen Staub."
        es:
          x: "Lanza unas escamas que paralizan a cualquiera.\nQuien las toque, no podrá ni ponerse de pie."
          y: "Tiene las alas cubiertas de un polvillo de escamas que\nesparce cada vez que las bate."
        ko:
          x: "흩뿌려진 날개 가루에 닿으면\n몸의 감각이 이상해져서\n똑바로 서 있을 수 없게 된다."
          y: "날개에 가루가 묻어 있어\n팔락팔락 날개를 칠 때마다\n맹독 가루를 흩뿌린다."
