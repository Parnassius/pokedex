          x: "まんげつのよる　ピッピが　あつまって\nダンスを　おどるようすを　みると\nしあわせに　なれると　いわれている。"
          y: "せなかの　つばさに　つきのひかりを\nあつめることで　くうちゅうに\nうかぶことが　できるらしい。"
        jp_kanji:
          x: "満月の夜　ピッピが　集まって\nダンスを　踊る様子を　見ると\n幸せに　なれると　言われている。"
          y: "背中の　翼に　月の光を\n集めることで　空中に\n浮かぶことが　できるらしい。"
        en:
          x: "It is said that happiness will come to those who see\na gathering of Clefairy dancing under a full moon."
          y: "The moonlight that it stores in the wings on its back\napparently gives it the ability to float in midair."
        fr:
          x: "On dit que ceux qui voient danser un groupe de\nMélofée sous la pleine lune connaîtront un grand\nbonheur."
          y: "La lumière de la lune qu’il emmagasine dans ses ailes\ndorsales lui permet de flotter dans les airs."
        it:
          x: "Si dice che vedere un gruppo di Clefairy ballare\ncon la luna piena sia di ottimo auspicio."
          y: "Sembra che la luce lunare che raccoglie nelle ali\nsul dorso gli permetta di volare a mezz’aria."
        de:
          x: "Eine Ansammlung von Piepi bei Vollmond tanzen\nzu sehen, soll Freude verheißen."
          y: "Aufgrund des gespeicherten Mondlichts in seinen\nFlügeln auf dem Rücken kann es in der Luft schweben."
        es:
          x: "Se dice que la felicidad llegará a quien vea a un grupo\nde Clefairy bailando a la luz de la luna llena."
          y: "La luz de luna que guarda en las alas de su lomo\nparece darle la habilidad de flotar en el aire."
        ko:
          x: "보름달 밤에 삐삐가 모여\n춤을 추는 모습을 보면\n행복해진다고 전해진다."
          y: "등의 날개에 달빛을\n모으면 공중에\n떠오를 수 있다는 듯하다."
