        en:
          x: "Using their very hot, flame-covered tongues,\nthey burn through Durant’s steel bodies and\nconsume their insides."
          y: "It draws in air through its tail, transforms it into fire,\nand uses it like a tongue. It melts Durant and\neats them."
        fr:
          x: "Avec sa langue de feu à haute température, il fait\nfondre le corps d’acier des Fermite pour les dévorer."
          y: "Il aspire de l’air par la queue et le transforme en\nune langue de feu qui fait fondre les Fermite dont\nil se régale."
        it:
          x: "Con la sua lingua infuocata scioglie la corazza\nd’acciaio di Durant e ne consuma l’interno."
          y: "Converte l’aria che aspira dalla coda in una lingua\ndi fiamme che usa per sciogliere i Durant prima di\nconsumarli."
        de:
          x: "Mit seiner brandheißen Zunge bringt es Fermicula\nzum Schmelzen, um so an sein weiches Inneres\nzu gelangen."
          y: "Über den Schweif aufgesaugte Luft wird in eine\nFeuerzunge verwandelt, um damit Fermicula\nzu schmelzen und zu fressen."
        es:
          x: "Usa su lengua de fuego para derretir la armadura de\nacero de los Durant y llegar así hasta su interior."
          y: "Absorbe aire por el orificio de su cola para prender\nuna lengua de llamas con la que derrite a los Durant\npara comerlos."
        ko:
          x: "뜨겁게 타오르는 불꽃의 혀로\n아이앤트의 강철 몸을\n녹여서 알맹이를 먹어치운다."
          y: "꼬리에서 빨아들인 공기를\n불꽃으로 바꿔 혀처럼 사용해\n아이앤트를 녹여서 먹는다."
