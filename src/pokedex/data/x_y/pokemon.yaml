          y: "こうらに　きのみを　たくわえている。\nおそわれないように　いわの　したに\nこもって　じっとしている。"
        jp_kanji:
          x: "ツボのような　甲羅の　中に\nためこんだ　木の実は　いつの間にか\nドロドロの　ジュースに　変わる。"
          y: "甲羅に　木の実を　たくわえている。\n襲われないように　岩の　下に\nこもって　じっとしている。"
        en:
          x: "The berries stored in its jar-like shell eventually\nbecome a thick, pulpy juice."
          y: "It stores berries inside its shell. To avoid attacks,\nit hides beneath rocks and remains completely still."
        fr:
          x: "Sa carapace, creuse comme une jarre, lui sert à\nstocker des Baies jusqu’à ce qu’elles se transforment\nen un jus épais et parfumé."
          y: "Il garde des Baies dans sa coquille. Pour éviter les\nattaques, il s’immobilise sous un rocher."
        it:
          x: "Il suo guscio è come un vaso nel quale conserva\nle bacche, che a un certo punto si trasformano\nin un denso succo."
          y: "Nel guscio raccoglie delle bacche. Per evitare attacchi,\nsi nasconde sotto le rocce e non fa alcun rumore."
        de:
          x: "In seinem topfförmigen Panzer gelagerte Beeren\nverwandeln sich im Nu zu einem dickflüssigen Saft."
          y: "Es sammelt Beeren in seiner Schale. Um sich vor\nAttacken zu schützen, versteckt es sich unter Steinen."
        es:
          x: "Las bayas que almacena en su caparazón con forma\nde tarro se convierten al final en un espeso zumo."
          y: "Almacena bayas dentro de su concha. Para evitar\nataques, se esconde inmóvil bajo las rocas."
        ko:
          x: "항아리 같은 등껍질 속에\n모은 나무열매는 어느샌가\n걸쭉한 주스로 변한다."
          y: "껍질에 열매가 비축되어 있다.\n공격받지 않도록 바위 밑에\n틀어박혀 꼼짝하지 않고 있다."
