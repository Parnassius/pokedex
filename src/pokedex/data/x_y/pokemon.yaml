        jp_kana:
          x: "あまい　かおりで　えものを　さそい\nりょううでの　どくのムチを　つかって\nさしたり　しめたりして　しとめる。"
          y: "ダンサーのような　みのこなしで\nどくの　トゲが　びっしりと　ならんだ\nムチを　あやつり　こうげきする。"
        jp_kanji:
          x: "甘い　香りで　獲物を　誘い\n両腕の　毒のムチを　使って\n刺したり　締めたりして　しとめる。"
          y: "ダンサーのような　身のこなしで\n毒の　トゲが　びっしりと　並んだ\nムチを　操り　攻撃する。"
        en:
          x: "Luring prey with a sweet scent, it uses poison whips\non its arms to poison, bind, and finish off the prey."
          y: "With the movements of a dancer, it strikes with\nwhips that are densely lined with poison thorns."
        fr:
          x: "Il attire ses proies grâce à son parfum, puis les\nempoisonne ou les étouffe à l’aide de ses bras\nvénéneux."
          y: "Gracieux comme un danseur, il abat ses fouets ornés\nd’épines empoisonnées."
        it:
          x: "Attira la preda con il suo profumo soave per poi\nafferrarla e abbatterla con gli arti velenosi."
          y: "Con i movimenti di una ballerina, colpisce con le\nfruste, piene di spine velenose."
        de:
          x: "Es lockt seine Beute mit süßem Duft an, um sie\ndanach mit seinen dornigen Ranken zu peitschen\noder zu würgen."
          y: "Mit den Bewegungen eines Tänzers holt es aus und\nschlägt mit Ranken um sich, die giftige Dornen haben."
        es:
          x: "Atrae a sus presas con una dulce fragancia y usa sus\ncepas venenosas para atenazarlas y acabar con ellas."
          y: "Se mueve como un bailarín y golpea con látigos\nrepletos de púas venenosas."
        ko:
          x: "달콤한 향기로 먹이를 유인해\n양팔의 독 채찍을 사용하여\n찌르거나 조여서 꼼짝 못하게 한다."
          y: "댄서 같은 재빠른 몸놀림으로\n독가시가 빽빽이 늘어선\n채찍을 조종하여 공격한다."
cranidos:
  species_id: 408
  names:
    jp_kana: ズガイドス
    jp_kanji: ズガイドス
    en: Cranidos
    fr: Kranidos
    it: Cranidos
    de: Koknodon
    es: Cranidos
    ko: 두개도스
  forms:
    cranidos:
      form_id: 0
      base_stats:
        hp: 67
        attack: 125
        defense: 40
        special_attack: 30
        special_defense: 30
        speed: 58
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          x: "てっきゅうの　ような　かせきから\nふっかつした　こだいの　ポケモン。\nずつきで　えものを　しとめた。"
          y: "およそ　１おくねんまえの　ポケモン。\nジャングルで　うまれそだち　じゃまな\nじゅもくは　ずつきで　へしおった。"
        jp_kanji:
          x: "鉄球の　ような　化石から\n復活した　古代の　ポケモン。\n頭突きで　獲物を　しとめた。"
          y: "およそ　１億年前の　ポケモン。\nジャングルで　生まれ育ち　邪魔な\n樹木は　頭突きで　へしおった。"
        en:
          x: "It was resurrected from an iron ball-like fossil.\nIt downs prey with its headbutts."
          y: "A lifelong jungle dweller from 100 million years\nago, it would snap obstructing trees with headbutts."
        fr:
          x: "On l’a ressuscité à partir d’un fossile de fer en forme\nde balle. Il abat ses proies à coups de tête."
          y: "Il vivait dans la jungle il y a 100 millions d’années.\nIl peut abattre un arbre d’un coup de tête."
        it:
          x: "È stato fatto rivivere da un fossile di ferro simile a\nuna palla. Abbatte le prede con le punte sulla testa."
          y: "Abitava nella giungla già 100 milioni di anni fa.\nAbbatte gli alberi che lo ostacolano con delle testate."
        de:
          x: "Es wurde aus einem ballartigen, eisernen Fossil\ngeschaffen. Es schlägt Beute mit einem Kopfstoß."
          y: "Es lebt seit Urzeiten im Dschungel. Kann im Weg\nbefindliche Bäume mit Kopfstößen aus dem Weg\nräumen."
        es:
          x: "Fue recreado a partir de un fósil con forma esférica.\nDerriba a las presas a cabezazos."
          y: "Vivía en la jungla hace 100 millones de años.\nApartaba los árboles del camino a cabezazos."
        ko:
          x: "철구 같은 화석에서\n부활한 고대 포켓몬이다.\n박치기로 먹이를 꼼짝 못하게 한다."
          y: "대략 1억 년 전의 포켓몬이다.\n정글에서 태어나 자라 방해되는\n수목은 박치기로 꺾었다."
rampardos:
  species_id: 409
  names:
    jp_kana: ラムパルド
    jp_kanji: ラムパルド
    en: Rampardos
    fr: Charkos
    it: Rampardos
    de: Rameidon
    es: Rampardos
    ko: 램펄드
  forms:
    rampardos:
      form_id: 0
      base_stats:
        hp: 97
        attack: 165
        defense: 60
        special_attack: 65
        special_defense: 50
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          x: "どんな　しょうげきにも　たえられる\nぶあつい　ずがいこつに　おさえられて\nのうみそは　おおきく　ならなかった。"
          y: "てつのように　かたい　ずがいこつ。\nジャングルの　きぎを　なぎたおし\nえものを　とらえる　あばれんぼう。"
        jp_kanji:
          x: "どんな　衝撃にも　耐えられる\n分厚い　頭蓋骨に　押さえられて\n脳みそは　大きく　ならなかった。"
          y: "鉄のように　硬い　頭蓋骨。\nジャングルの　木々を　なぎ倒し\n獲物を　捕らえる　暴れん坊。"
        en:
          x: "Its skull withstands impacts of any magnitude. As a\nresult, its brain never gets the chance to grow."
          y: "Its skull is as hard as iron. It is a brute that tears\ndown jungle trees while catching prey."
        fr:
          x: "À force de cogner son crâne pourtant hyper résistant,\nCharkos a un cerveau atrophié."
          y: "Son crâne est dur comme du fer. Cette brute abat\ndes arbres quand elle chasse sa proie dans la jungle."
        it:
          x: "Il suo spesso cranio, che sopporta qualunque\nimpatto, è ridotto, e il cervello non si è sviluppato."
          y: "Il suo cranio è duro come il ferro. È violento e abbatte\ngli alberi della giungla mentre va a caccia di prede."
        de:
          x: "Sein dicker Schädelknochen trotzt jedem Angriff.\nGleichzeitig stoppt er jedoch sein Hirnwachstum."
          y: "Sein Schädel ist hart wie Eisen. Es reißt\nDschungelbäume nieder, während es seine Beute jagt."
        es:
          x: "Tiene sesos pequeños porque su duro cráneo, que\nsoporta cualquier golpe, les impide desarrollarse."
          y: "Su cráneo es duro como el hierro. Es tan bruto que\ndestroza la jungla cuando persigue presas."
        ko:
          x: "어떤 충격에도 견딜 수 있는\n두꺼운 두개골에 눌려\n뇌가 자라지 않았다."
          y: "철처럼 단단한 두개골이다.\n정글의 나무들을 넘어뜨려서\n먹이를 잡는 난동꾼이다."
