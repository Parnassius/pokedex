          y: "たいないガスの　ばくはつで　みずを\nピストルのように　はっしゃする。\nしきんきょりなら　いわを　くだく。"
        jp_kanji:
          x: "大きな　ハサミから　圧縮した　水を\nピストルのように　撃ち出し\n飛んでいる　獲物を　撃ち落とす。"
          y: "体内ガスの　爆発で\n水を　ピストルのように　発射する。\n至近距離なら　岩を　砕く。"
        en:
          x: "They knock down flying prey by firing\ncompressed water from their massive\nclaws like shooting a pistol."
          y: "Through controlled explosions of internal gas,\nit can expel water like a pistol shot.\nAt close distances, it can shatter rock."
        fr:
          x: "Sa pince projette un jet d’eau sous pression\nsuffisamment puissant pour abattre ses proies en plein\nvol."
          y: "Il est capable de transformer son corps en canon\nà eau, grâce à la combustion d’un gaz interne.\nÀ bout portant, il peut réduire un rocher en miettes."
        it:
          x: "Abbatte le prede volanti sparando un getto d’acqua\nad alta pressione dalla chela più grande, che usa come\nuna pistola."
          y: "Facendo esplodere i gas corporei, emette un getto\nd’acqua ad altissima pressione che, a breve distanza,\npuò persino frantumare le rocce."
        de:
          x: "Mit Salven komprimierten Wassers, die es wie\nPistolenkugeln aus seinen Scheren abfeuert,\nschießt es fliegende Beute ab."
          y: "Durch die Explosion körpereigener Gase feuert es wie\neine Pistole Wassersalven ab, die aus kurzer Distanz\nselbst Felsen zerschmettern."
        es:
          x: "Abate a enemigos voladores disparando agua a presión\ncon su enorme pinza como si de una pistola se tratara."
          y: "Al explotar el gas que se halla en su interior, expulsa\nun chorro de agua cual pistola, que a bocajarro es\nincluso capaz de pulverizar rocas."
        ko:
          x: "커다란 집게발로\n압축한 물을 권총처럼 쏘아\n날고 있는 사냥감을 떨어뜨린다."
          y: "체내 가스의 폭발로 물을\n총처럼 발사한다.\n가까운 거리에서라면 바위를 부순다."
