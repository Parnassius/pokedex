      descriptions:
        jp_kana:
          x: "わるい　ゆめに　うなされている\nポケモンや　ひとの　まえに　あらわれ\nそのゆめを　たべてしまう　ポケモン。"
          y: "ひとや　ポケモンが　みた　ゆめを\nたべる。たのしい　ゆめを　たべると\nピンクいろの　けむりを　はきだす。"
        jp_kanji:
          x: "悪い　夢に　うなされている\nポケモンや　人の　前に　現われ\nその夢を　食べてしまう　ポケモン。"
          y: "人や　ポケモンが　見た　夢を\n食べる。楽しい　夢を　食べると\nピンク色の　けむりを　吐き出す。"
        en:
          x: "This Pokémon appears before people and Pokémon\nwho are having nightmares and eats those dreams."
          y: "It eats the dreams of people and Pokémon. When it\neats a pleasant dream, it expels pink-colored mist."
        fr:
          x: "Il apparaît aux humains et aux Pokémon qui font\ndes mauvais rêves et mange leurs cauchemars pour\nles en libérer."
          y: "Il se nourrit des rêves des gens et des Pokémon.\nQuand le rêve est agréable, il crache une fumée rose."
        it:
          x: "Compare accanto a Pokémon e uomini tormentati\ndagli incubi per nutrirsi di tutti i loro brutti sogni."
          y: "Si nutre dei sogni di uomini e Pokémon. Se mangia\nsogni piacevoli, esala un fumo di colore rosa."
        de:
          x: "Es erscheint vor schlafenden Menschen\nund Pokémon und frisst ihre Alpträume."
          y: "Es verschlingt die Träume der Menschen.\nFrisst es einen fröhlichen Traum, stößt es\ndanach einen rosafarbenen Dunst aus."
        es:
          x: "Cuando un humano o un Pokémon sufre una pesadilla,\nMunna se aparece ante ellos y la engulle."
          y: "Se alimenta de los sueños de humanos y Pokémon.\nSi los sueños son felices, despide humo rosa."
        ko:
          x: "나쁜 꿈에 시달리고 있는\n포켓몬이나 사람 앞에 나타나\n그 꿈을 먹어버리는 포켓몬."
          y: "사람이나 포켓몬이 꾼 꿈을\n먹는다. 즐거운 꿈을 먹으면\n분홍색 연기를 뿜어낸다."
musharna:
