        jp_kana:
          x: "すこしの　しげきに　はんのうして\nばくはつする。バクダンボールという\nあだなで　こわがられて　いる。"
          y: "あふれるほどの　でんきエネルギーを\nたいないに　ためこんでいるので\nすこしの　しげきで　ばくはつする。"
        jp_kanji:
          x: "少しの　刺激に　反応して\n爆発する。バクダンボールという\nあだ名で　怖がられている。"
          y: "あふれるほどの　電気エネルギーを\n体内に　ためこんでいるので\n少しの　刺激で　爆発する。"
        en:
          x: "It explodes in response to even minor stimuli. It is\nfeared, with the nickname of “The Bomb Ball.”"
          y: "It stores an overflowing amount of electric energy\ninside its body. Even a small shock makes\nit explode."
        fr:
          x: "Il explose au moindre choc. Son seul surnom de\n« Bomb Ball » suffit à effrayer ses adversaires."
          y: "Il stocke tellement d’énergie dans son corps\nqu’une simple secousse peut le faire exploser."
        it:
          x: "Può esplodere anche alla minima provocazione.\nLo chiamano “Bomba Ball”."
          y: "Dato che accumula nel proprio corpo un’incredibile\nquantità di elettricità, esplode alla minima\nprovocazione."
        de:
          x: "Es explodiert schon bei kleinsten Reizen.\nSein Spitzname „Die Bombenkugel“ spiegelt\ndie Furcht der Menschen wider."
          y: "Es speichert eine riesige Menge Elektrizität in\nseinem Körper. Es explodiert beim kleinsten Ruck."
        es:
          x: "Explotan a la mínima. Por eso se les tiene mucho\nmiedo. Estos Pokémon reciben el mote de Bomba Ball."
          y: "Almacena una enorme cantidad de electricidad en su\ncuerpo. Una pequeña sacudida le hará explotar."
        ko:
          x: "작은 자극에도 반응해서\n폭발한다. 폭탄볼이라 불리며\n두려움의 대상이 되고 있다."
          y: "넘칠 정도의 전기 에너지를\n체내에 모으고 있기 때문에\n약간의 자극만으로도 폭발한다."
exeggcute:
  species_id: 102
  names:
    jp_kana: タマタマ
    jp_kanji: タマタマ
    en: Exeggcute
    fr: Noeunoeuf
    it: Exeggcute
    de: Owei
    es: Exeggcute
    ko: 아라리
  forms:
    exeggcute:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 80
        special_attack: 60
        special_defense: 45
