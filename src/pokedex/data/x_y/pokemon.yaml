      descriptions:
        jp_kana:
          x: "きのみを　キバで　くだいて　たべる。\nなんかいも　はえかわることで\nつよく　するどい　キバに　なる。"
          y: "キバで　じゅもくに　きずを　つけて\nなわばりの　めじるしにする。\nキバは　おれても　すぐに　はえる。"
        jp_kanji:
          x: "木の実を　キバで　砕いて　食べる。\n何回も　生え変わることで\n強く　鋭い　キバに　なる。"
          y: "キバで　樹木に　傷を　つけて\n縄張りの　目印にする。\nキバは　折れても　すぐに　生える。"
        en:
          x: "They use their tusks to crush the berries they eat.\nRepeated regrowth makes their tusks strong\nand sharp."
          y: "They mark their territory by leaving gashes in trees\nwith their tusks. If a tusk breaks, a new one grows\nin quickly."
        fr:
          x: "Il broie les Baies à grands coups de crocs.\nCeux-ci repoussent plusieurs fois, toujours plus forts\net aiguisés."
          y: "Il laisse la marque de ses crocs dans les arbres pour\nmarquer son territoire. Ses crocs repoussent dès\nqu’ils tombent."
        it:
          x: "Mangia le bacche sminuzzandole con i denti, che\nricrescono costantemente, diventando sempre più\nforti e affilati."
          y: "Incide gli alberi con le zanne per marcare il suo\nterritorio. Se le zanne gli si spezzano, ricrescono\nsubito."
        de:
          x: "Es knackt mit seinen Hauern Nüsse.\nBrechen seine Fangzähne ab, wächst\nan ihrer Stelle ein stärkeres Ersatzpaar."
          y: "Markiert sein Revier, indem es mit seinen Fängen\nKerben in Bäume schlägt. Brechen diese einmal ab,\nwachsen sie sofort nach."
        es:
          x: "Usa sus colmillos para romper las bayas que come.\nEstos se regeneran una y otra vez, por eso son tan\nfuertes y afilados."
          y: "Deja la huella de sus colmillos en los árboles para\nmarcar su territorio. Si se le rompen, se regeneran\nmuy rápido."
        ko:
          x: "나무열매를 이빨로 깨물어 먹는다.\n이빨이 몇 차례에 걸쳐 새로 나면\n강하고 날카로워진다"
          y: "이빨로 수목에 상처를 내서\n영역 표시를 한다.\n부러지면 바로 새 이빨이 난다."
fraxure:
  species_id: 611
  names:
