      descriptions:
        jp_kana:
          x: "ひふが　かたいので　すもうとりに\nふまれても　へいき。でんきを\nながすとき　わらいがおに　なる。"
          y: "うみべの　どろに　うまって　えものを\nまちかまえる。えものが　さわったとき\nでんきを　だして　しびれさせるのだ。"
        jp_kanji:
          x: "皮膚が　硬いので\n相撲取りに　踏まれても　平気。\n電気を　流すとき　笑い顔に　なる。"
          y: "海辺の　泥に　埋まって　獲物を\n待ち構える。獲物が　触ったとき\n電気を　出して　しびれさせるのだ。"
        en:
          x: "Its skin is very hard, so it is unhurt even if stepped\non by sumo wrestlers. It smiles when\ntransmitting electricity."
          y: "It conceals itself in the mud of the seashore.\nThen it waits. When prey touch it, it delivers a jolt\nof electricity."
        fr:
          x: "Sa peau est si dure qu’il peut se faire piétiner par\nun sumo sans rien sentir. Il sourit en émettant de\nl’électricité."
          y: "Tapi dans la boue ou les sédiments, il attend sa proie\npatiemment et la paralyse avec une décharge\nélectrique."
        it:
          x: "Ha la pelle così dura che un lottatore di sumo\npotrebbe calpestarlo senza fargli male. L’elettricità\ngli fa il solletico."
          y: "Attende al varco le prede, sepolto nel fango in riva\nal mare. Se lo sfiorano, le paralizza con una scarica\nelettrica."
        de:
          x: "Dank seiner dicken Haut hält es selbst das Gewicht\neines Sumoringers aus. Wenn es Stromschläge\nverteilt, grinst es."
          y: "Es vergräbt sich im Morast am Meeresboden. Wird es\nvon seiner Beute gestreift, lähmt es sie mit Strom."
        es:
          x: "Ni un pisotón de un luchador de sumo lo aplastaría\ngracias a su piel sólida. Sonríe al soltar descargas\neléctricas."
          y: "Acecha a sus presas oculto en la arena húmeda de\nla playa. Las paraliza con una descarga eléctrica\ncuando lo tocan."
        ko:
          x: "피부가 단단해서 씨름꾼에게\n밟혀도 아무렇지 않다. 전기를\n흘려보낼 때 웃는 얼굴이 된다."
          y: "바닷가 펄 속에 묻혀 먹이를\n기다린다. 먹이가 몸에 닿으면\n전기를 써서 마비시킨다."
mienfoo:
