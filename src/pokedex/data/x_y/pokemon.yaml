        fr:
          x: "Il déteste la saleté et passe son temps à entretenir\nsa fourrure, confortablement installé."
          y: "Les femmes Dresseurs raffolent de sa sublime\nfourrure. Il ne possède pas de nid."
        it:
          x: "Detesta gli ambienti sporchi. Se ne sta sempre\nad allisciarsi la pelliccia in luoghi accoglienti."
          y: "Ha successo fra gli Allenatori di sesso femminile per\nla sua bellissima pelliccia. Non ha una tana fissa."
        de:
          x: "Hasst schmutzige Orte. Behagt ihm ein Platz,\nfängt es sofort an, sein glänzendes Fell zu pflegen."
          y: "Dieses Pokémon ist bei weiblichen Trainern\naufgrund seines Fells beliebt."
        es:
          x: "No soporta los lugares sucios. Le encanta acicalarse\nel pelaje cuando está a gusto en un sitio."
          y: "Tiene mucho éxito entre las Entrenadoras por su suave\npelaje. No vive en un sitio fijo."
        ko:
          x: "더러운 곳을 아주 싫어한다.\n편안한 곳에서\n늘 털을 다듬고 있다."
          y: "아름다운 털을 가지고 있어서 여성\n트레이너들에게 매우 인기 있다.\n정해진 거처를 갖고 있지 않다."
