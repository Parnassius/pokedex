          x: "もりの　かみさまと　おそれられていた\nポケモン。あいての　かんがえを　よみ\nさきまわりする　のうりょくを　もつ。"
          y: "はっぱの　うちわを　あおぐと\nふうそく３０メートルの　とっぷうが\nまきおこり　みんかを　ふきとばす。"
        jp_kanji:
          x: "森の　神様と　恐れられていた\nポケモン。相手の　考えを　読み\n先回りする　能力を　持つ。"
          y: "葉っぱの　ウチワを　あおぐと\n風速３０メートルの　突風が\n巻き起こり　民家を　吹き飛ばす。"
        en:
          x: "A Pokémon that was feared as a forest guardian.\nIt can read the foe’s mind and take\npreemptive action."
          y: "By flapping its leafy fan, it can whip up gusts of\n100 feet per second that can level houses."
        fr:
          x: "Ce Pokémon est le gardien des forêts. Il peut lire\nles pensées de ses ennemis et agir en conséquence."
          y: "D’un coup de sa feuille éventail, il génère des\nbourrasques de 30 m/s capables de souffler une\nmaison."
        it:
          x: "Un tempo era un temuto guardiano della foresta.\nSa leggere nella mente del nemico, anticipandolo."
          y: "Con le sue foglie provoca raffiche di vento della\nvelocità di 30 m/s che spazzano via interi edifici."
        de:
          x: "Dieses Pokémon wurde als Wächter des Waldes\ngefürchtet. Es kann die Gedanken des Gegners\nlesen und präventiv handeln."
          y: "Seine großen Fächer erzeugen Böen, die eine\nGeschwindigkeit von 30 m/s erreichen können."
        es:
          x: "Habita los bosques y se le tiene miedo. Es capaz\nde leer los pensamientos del rival y actuar en\nconsecuencia."
          y: "Con sus abanicos puede provocar vientos de 30 m/s\ncapaces de levantar casas."
        ko:
          x: "숲의 신이라고 여겨져 두려움의\n대상이 되고 있던 포켓몬. 상대의\n생각을 읽고 앞지르는 능력을 지녔다."
          y: "잎사귀 부채를 부치면\n풍속 30m의 돌풍이 일어나\n민가를 날려버린다."
taillow:
