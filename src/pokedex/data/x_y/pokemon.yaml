          y: "かくとうセンスを　みがくため\nあらゆる　あいてに　たちむかう。\nまけんきが　ものすごく　つよい。"
        jp_kanji:
          x: "いつでも　元気いっぱい。\n強くなるため　負けても　負けても\n相手に　立ち向かっていく。"
          y: "格闘センスを　磨くため\nあらゆる　相手に　立ち向かう。\n負けん気が　ものすごく　強い。"
        en:
          x: "It is always bursting with energy. To make itself\nstronger, it keeps on fighting even if it loses."
          y: "To brush up on its fighting skills, it will challenge\nanyone. It has a very strong competitive spirit."
        fr:
          x: "Il est plein d’énergie. Il se bat tout le temps pour\nêtre plus fort, quitte à perdre un combat."
          y: "Pour augmenter ses capacités, il cherche à se battre\ncontre n’importe qui. Il est très courageux."
        it:
          x: "Sempre traboccante di energia. Per rinforzarsi\ncontinua a combattere anche dopo aver perso."
          y: "Sfida chiunque per mettere alla prova le sua abilità\nnella lotta. Ha un forte spirito agonistico."
        de:
          x: "Es strotzt vor Energie. Um noch stärker zu werden,\nkämpft es weiter, auch wenn es verloren hat."
          y: "Um seine Kampffähigkeiten zu verbessern, tritt es\ngegen jeden an. Es besitzt großen Kampfgeist."
        es:
          x: "Ataca siempre con mucha energía. Para fortalecerse a\nsí mismo, sigue luchando aunque pierda."
          y: "Para mejorar sus técnicas de lucha, desafiará a\ncualquiera. Tiene un espíritu muy competitivo."
        ko:
          x: "항상 기운이 넘친다.\n강해지기 위해 계속 져도\n상대에게 맞선다."
          y: "격투 감각을 닦기 위해\n모든 상대에게 맞선다.\n오기가 굉장히 세다."
