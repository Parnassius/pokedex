          y: "ほらあなの　てんじょうに　つきささり\nいわの　てつぶんを　すいとる。\nきけんがせまると　トゲを　うちだす。"
        jp_kanji:
          x: "危険を　察知すると　トゲを\nいっせいに　発射して　反撃。\nその　すきに　転がって　逃げる。"
          y: "洞穴の　天井に　突きささり\n岩の　鉄分を　吸いとる。\n危険がせまると　トゲを　撃ち出す。"
        en:
          x: "When threatened, it attacks by shooting a barrage\nof spikes, which gives it a chance to escape by\nrolling away."
          y: "It absorbs the iron it finds in the rock while clinging\nto the ceiling. It shoots spikes when in danger."
        fr:
          x: "Quand il sent un danger, il réagit en projetant toutes\nses épines d’un coup et s’enfuit en roulant sur\nlui-même."
          y: "Il s’accroche aux parois des grottes et en absorbe\nles minéraux. Il projette ses épines en cas de danger."
        it:
          x: "Quando avverte un pericolo, reagisce sparando\nsimultaneamente tutti i suoi aculei, per poi fuggire\nvia rotolando."
          y: "Si conficca nelle pareti delle grotte e assorbe i\nminerali delle rocce. Quando avverte un pericolo,\nspara i suoi aculei."
        de:
          x: "Fühlt es sich bedroht, wehrt es sich, indem es\neine großzügige Salve Dornen abfeuert."
          y: "Hakt sich an der Decke von Höhlen fest und saugt\ndie Mineralien aus dem Gestein. Bei Gefahr feuert es\nDornen ab."
        es:
          x: "Lanza numerosas púas al detectar peligro. En cuanto\ntiene ocasión, echa a rodar y se escapa."
          y: "Absorbe los componentes ferruginosos de las rocas al\ncolgarse del techo de las cuevas. Dispara púas si se\nve en peligro."
        ko:
          x: "위험을 감지하면 가시를\n일제히 발사하여 반격한다.\n그 틈에 몸을 굴려 도망간다."
          y: "동굴 천장에 박혀서\n바위의 철분을 흡수한다.\n위험이 닥치면 바늘을 쏜다."
