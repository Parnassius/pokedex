          y: "どくの　ほうしを　ばらまき\nすいこんで　くるしむ　あいてに\nきょうれつな　パンチを　くらわせる。"
        jp_kanji:
          x: "短い　腕は　パンチを　出すとき\nグーンと　伸びる。プロボクサー\n顔負けの　テクニックを　持つ。"
          y: "毒の　胞子を　ばらまき\n吸いこんで　苦しむ　相手に\n強烈な　パンチを　くらわせる。"
        en:
          x: "Its short arms stretch when it throws punches. Its\ntechnique is equal to that of pro boxers."
          y: "It scatters poisonous spores and throws powerful\npunches while its foe is hampered by\ninhaled spores."
        fr:
          x: "Ses petits bras s’étendent quand il donne un coup\nde poing. Son talent égale celui d’un boxeur pro."
          y: "Il frappe de toutes ses forces ses ennemis étourdis\npar ses spores empoisonnées."
        it:
          x: "Tirando pugni, i suoi cortissimi arti si allungano. Usa\nuna tecnica simile a quella dei pugili professionisti."
          y: "Sparge spore tossiche con orribili effetti sul nemico\nche le respira, e aggiunge una scarica di pugni."
        de:
          x: "Seine kurzen Arme dehnen sich aus, wenn es\nzuschlägt. Seine Technik ähnelt der von Profi-Boxern."
          y: "Erst lässt es den Gegner seine giftigen Sporen\neinatmen, dann traktiert es ihn mit Boxschlägen."
        es:
          x: "Sus cortos brazos se expanden cuando da puñetazos.\nTiene una técnica pugilística muy depurada."
          y: "Esparce esporas venenosas muy nocivas y asesta\npuñetazos de gran intensidad a sus enemigos."
        ko:
          x: "짧은 팔은 펀치를 날릴 때\n쑤-욱 늘어난다. 프로 복서를\n압도하는 기술을 가지고 있다."
          y: "독 포자를 뿌려\n들이마시고 괴로워하는 상대에게\n강렬한 펀치를 날린다."
