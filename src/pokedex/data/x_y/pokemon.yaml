          y: "からだの　ちゅうしんにある　あかい\nコアから　よぞらに　むかって\nなぞの　でんぱを　はっしんしている。"
        jp_kanji:
          x: "真ん中の　コアと呼ばれる　部分は\n七色に　輝く。これを\n宝石にする　人も　いるという。"
          y: "体の　中心にある　赤いコアから\n夜空に　向かって　ナゾの　電波を\n発信している。"
        en:
          x: "Its central core glows with the seven colors of the\nrainbow. Some people value the core as a gem."
          y: "At the center of its body is a red core, which sends\nmysterious radio signals into the night sky."
        fr:
          x: "Son cœur brille des couleurs de l’arc-en-ciel.\nOn raconte que c’est une pierre précieuse."
          y: "Un noyau rouge trône en son centre. Il envoie\ndes signaux radio mystérieux vers le ciel nocturne."
        it:
          x: "Nel suo nucleo brillano i sette colori dell’arcobaleno.\nQualcuno lo considera una pietra preziosa."
          y: "Al centro del corpo ha un nucleo rosso che diffonde\nmisteriosi segnali radio nel cielo notturno."
        de:
          x: "Der Kern dieses Pokémon leuchtet in den Farben\ndes Regenbogens. Sein Kern gilt als Edelstein."
          y: "In der Körpermitte befindet sich ein roter Kern,\nder mysteriöse Radiowellen in die Nacht sendet."
        es:
          x: "Su núcleo central brilla con los colores del arcoíris.\nPara algunos tiene el valor de una gema."
          y: "El centro de su cuerpo alberga un órgano que emite\nextrañas señales de radio en la noche."
        ko:
          x: "코어라고 불리는 중심 부분은\n일곱 빛깔로 빛난다. 이것을\n보석으로 삼는 사람도 있다고 한다."
          y: "몸의 중심에 있는 빨간\n핵에서 밤하늘을 향해\n알 수 없는 전파를 발신한다."
mr_mime:
  species_id: 122
  names:
    jp_kana: バリヤード
    jp_kanji: バリヤード
    en: Mr. Mime
    fr: M. Mime
    it: Mr. Mime
    de: Pantimos
    es: Mr. Mime
    ko: 마임맨
  forms:
    mr_mime:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 65
        special_attack: 100
        special_defense: 120
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
