          y: "うみべの　だんがいぜっぺきに\nすを　つくる。じょうしょうきりゅうを\nりようして　おおぞらに　まいあがる。"
        jp_kanji:
          x: "長い　翼で　海風を　受けて\nグライダーのように　滑空する。\n休むときは　翼を　折り畳む。"
          y: "海辺の　断崖絶壁に\n巣を　作る。上昇気流を　利用して\n大空に　舞い上がる。"
        en:
          x: "Catching sea winds with its long wings, it soars\nas if it were a glider. It folds its wings to rest."
          y: "It makes its nest on steep sea cliffs.\nRiding updrafts, it soars to great heights."
        fr:
          x: "Il plane sur les vents marins grâce à ses longues ailes.\nIl les replie pour se reposer."
          y: "Il niche sur les falaises escarpées face à la mer.\nIl vole en altitude grâce aux courants ascendants."
        it:
          x: "Segue i venti marini con le sue lunghe ali e si libra\nin volo come un aliante. Si riposa piegando le ali."
          y: "Nidifica su scogliere a picco sul mare. Si fa trasportare\nad alta quota dalle correnti ascensionali."
        de:
          x: "Es lässt sich vom Wind der Meere treiben,\nals wäre es ein Segelflugzeug."
          y: "Es baut sein Nest auf steilen Klippen. Es nutzt die\nAufwinde, um in größerer Höhe fliegen zu können."
        es:
          x: "Sus largas alas aprovechan los vientos marinos para\nplanear. Cuando descansa, las pliega."
          y: "Anida en acantilados y alcanza gran altura\naprovechando las corrientes ascendentes."
        ko:
          x: "긴 날개로 바닷바람을 받아서\n글라이더처럼 활공한다.\n쉴 때는 날개를 접는다."
          y: "해변의 낭떠러지 절벽에\n둥지를 튼다. 상승기류를\n이용하여 넓은 하늘로 날아오른다."
