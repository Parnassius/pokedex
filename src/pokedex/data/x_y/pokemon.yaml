        jp_kana:
          x: "うみの　そこで　くらしているが\nはるになると　からだの　ピンクいろが\nなぜか　あざやかに　いろづく。"
          y: "およぐ　すがたは　とても　ゆうが。\nほそい　くちで　いわばの　すきまに\nはえた　かいそうを　たべる。"
        jp_kanji:
          x: "海の　底で　暮らしているが\n春になると　体の　ピンク色が\nなぜか　鮮やかに　色づく。"
          y: "泳ぐ　姿は　とても　優雅。\n細い　口で　岩場の　すき間に\n生えた　海藻を　食べる。"
        en:
          x: "It lives at the bottom of the sea. In the springtime,\nits pink body turns more vivid for some reason."
          y: "Its swimming form is exquisitely elegant.\nWith its thin mouth, it feeds on seaweed\nthat grows between rocks."
        fr:
          x: "Au printemps, son corps rose se fait plus vif sans que\nl’on sache pourquoi. Il vit au fond de la mer."
          y: "Sa façon de se déplacer sous l’eau est d’une\nélégance incomparable. Du bout de sa fine bouche, il\nse nourrit des algues qui poussent entre les rochers."
        it:
          x: "Vive sui fondali marini. In primavera il suo corpo\nrosato diventa più vivido per chissà quale motivo."
          y: "Nuota con grande eleganza. Si nutre di alghe, che\ncattura tra le rocce con il muso appuntito."
        de:
          x: "Es lebt auf dem Grund des Meeres. Im Frühling\nwirkt die Farbe seines Körpers viel kräftiger."
          y: "Es schwimmt äußerst elegant. Mit seinem dünnen\nMaul ernährt es sich von Seetang, der zwischen\nFelsen wächst."
        es:
          x: "Vive en el fondo del mar. En primavera, su cuerpo\nrosado adquiere colores más vivos."
          y: "Tiene una forma de nadar de lo más elegante. Se\nalimenta de las algas marinas que crecen entre las\nrocas."
        ko:
          x: "바다의 밑바닥에 살고 있지만\n봄이 되면 몸의 분홍색이\n웬일인지 선명하게 물든다."
          y: "헤엄치는 모습이 굉장히 우아하다.\n가는 입으로 바위 틈새에 나 있는\n해초를 먹는다."
