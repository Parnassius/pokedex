          y: "かいめんの　ちかくを　およぐため\nふねの　うえから　せなかの　もようを\nかんさつする　ことが　できる。"
        jp_kanji:
          x: "背中の　模様は　地域によって\n異なっている。テッポウオの　群れに\n混ざって　泳ぐことが　多い。"
          y: "海面の　近くを　泳ぐため\n船の　上から　背中の　模様を\n観察する　ことが　できる。"
        en:
          x: "The pattern on its back varies by region.\nIt often swims in a school of Remoraid."
          y: "When it swims close to the surface of the ocean,\npeople aboard ships are able to observe the pattern\non its back."
        fr:
          x: "Les motifs sur son dos sont différents selon les\nrégions. On le voit souvent dans des bancs de\nRémoraid."
          y: "Il nage si proche de la surface que l’on peut voir\nles motifs sur son dos depuis un bateau."
        it:
          x: "Il disegno sul suo dorso cambia a seconda della\nregione. Nuota spesso assieme ai branchi di Remoraid."
          y: "Poiché Mantyke nuota in superficie, si possono\nammirare i disegni sulla sua schiena da\nun’imbarcazione."
        de:
          x: "Ihre Rücken sind je nach Region unterschiedlich\ngemustert. Oft mischen sie sich unter\nRemoraid-Schwärme."
          y: "Da es nah an der Meeresoberfläche schwimmt, kann\nman sein Rückenmuster von Schiffen aus erspähen."
        es:
          x: "Los símbolos de su espalda cambian según la región.\nA veces se mezcla con bancos de Remoraid y nada\njunto a ellos."
          y: "Cuando nada cerca de la superficie, pueden\nobservarse los dibujos de su lomo desde los barcos."
        ko:
          x: "등의 무늬는 지역에 따라\n달라진다. 총어 무리에\n섞여 헤엄치는 일이 많다."
          y: "해수면 근처에서 헤엄치므로\n배 위에서 등 모양을\n관찰할 수 있다."
snover:
  species_id: 459
  names:
    jp_kana: ユキカブリ
    jp_kanji: ユキカブリ
