          y: "すばやい　みのこなしで　あいてを\nほんろうして　ポケモンを　まもると\nでんせつで　つたえられている。"
        jp_kanji:
          x: "頭の　ツノは　鋭い　刃。\n旋風のような　動きで　敵を\n翻弄して　素早く　切りつける。"
          y: "素早い　身のこなしで　相手を\n翻弄して　ポケモンを　守ると\n伝説で　伝えられている。"
        en:
          x: "Its head sprouts horns as sharp as blades. Using\nwhirlwind-like movements, it confounds and swiftly\ncuts opponents."
          y: "Legends say this Pokémon confounded opponents\nwith its swift movements."
        fr:
          x: "Ses cornes sont des lames effilées. Il lacère ses\nennemis dans un mouvement tourbillonnant."
          y: "Il lacère ses ennemis avec une agilité sans égale.\nLa légende raconte qu’il protège les Pokémon."
        it:
          x: "Le corna della testa sono lame affilate. Muovendosi\ncome un turbine, scuote e falcia fulmineo i nemici."
          y: "Le leggende dicono di lui che protegge i Pokémon\ntenendo in scacco i nemici con i suoi movimenti\nfulminei."
        de:
          x: "Das Horn an seinem Kopf ist eine scharfe Klinge.\nNeckt seine Gegner mit quirligen Bewegungen\nund greift blitzartig an."
          y: "Legenden zufolge täuschte es seine Gegner mit flinken\nBewegungen und beschützte so die Pokémon."
        es:
          x: "Sus cuernos son hojas afiladas. Sacude a sus\nenemigos con sus relampagueantes movimientos y\nlos reduce."
          y: "Cuenta la leyenda que Virizion confunde a sus rivales\ncon rápidos movimientos para proteger a otros\nPokémon."
        ko:
          x: "머리의 뿔은 날카로운 칼날이다.\n회오리바람과 같은 움직임으로\n상대를 농락하여 재빠르게 벤다."
          y: "재빠른 몸놀림으로 상대를\n농락해 포켓몬을 지킨다고\n전설로 전해져 온다."
