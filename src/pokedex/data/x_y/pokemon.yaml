      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - sweet_veil
      hidden_ability: unburden
      descriptions:
        jp_kana:
          x: "わたあめのような　あまくて　ベタつく\nしろい　いとを　だして　あいてを\nからめとり　うごきを　ふうじる。"
          y: "あまいもの　ばかりを　たべているので\nたいもうが　わたあめのように\nあまく　ベタベタしている。"
        jp_kanji:
          x: "わたあめのような　甘くて　ベタつく\n白い　糸を　出して\n相手を　絡め取り　動きを　封じる。"
          y: "甘いもの　ばかりを　食べているので\n体毛が　わたあめのように\n甘く　ベタベタしている。"
        en:
          x: "To entangle its opponents in battle, it extrudes\nwhite threads as sweet and sticky as cotton candy."
          y: "Because it eats nothing but sweets,\nits fur is as sticky sweet as cotton candy."
        fr:
          x: "Il immobilise son adversaire à l’aide de filaments\nblancs, sucrés et collants qui ressemblent à de la\nbarbe à papa."
          y: "Il se gave de sucreries à longueur de journée, à tel\npoint que sa fourrure finit par ressembler à de la barbe\nà papa, sucrée et poisseuse."
        it:
          x: "Immobilizza il nemico avvolgendolo in filamenti\nbianchi, dolci e appiccicosi, simili a zucchero filato."
          y: "Poiché mangia solo cose dolci, il suo pelo ha\nla consistenza e il sapore dello zucchero filato."
        de:
          x: "Es stößt weiße Fäden aus, die so süß und klebrig wie\nZuckerwatte sind. Mit ihnen umwickelt es den Gegner\nund hindert ihn daran, sich zu bewegen."
          y: "Es frisst nur Süßigkeiten, weshalb sein Fell so süß\nund klebrig wie Zuckerwatte ist."
        es:
          x: "Escupe hebras pegajosas de color blanco y textura\nparecida a la del algodón de azúcar, con las que\nenvuelve al enemigo y le impide que se mueva."
          y: "Como se alimenta exclusivamente de dulces, su\npelaje es tan pegajoso y dulzón como el algodón\nde azúcar."
        ko:
          x: "솜사탕 같은 달고 끈적끈적한\n하얀 실을 내뿜어 상대를\n휘감고 움직이지 못하게 한다."
          y: "달콤한 것만 먹기 때문에\n몸의 털이 솜사탕처럼\n달고 끈적끈적하다."
