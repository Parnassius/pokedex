          y: "かたくて　はりのような　ウロコが\nからだを　おおっている。\nこうふんすると　はりが　さかだつ。"
        jp_kanji:
          x: "ウロコで　覆われた　頑丈な　体で\n巣穴の　入り口を　ふさぎ\n敵から　子供たちを　守る。"
          y: "硬くて　針のような　ウロコが\n体を　覆っている。\n興奮すると　針が　逆立つ。"
        en:
          x: "It uses its scaly, rugged body to seal the entrance\nof its nest and protect its young from predators."
          y: "The body is covered by stiff, needlelike scales.\nIf it becomes excited, the needles bristle outwards."
        fr:
          x: "Il se sert de son corps lourdement protégé pour\nempêcher les prédateurs d’accéder à son nid."
          y: "Son corps est recouvert d’écailles en forme de\npointes. Quand ce Pokémon s’énerve, ses pointes\nse dressent de façon menaçante."
        it:
          x: "Con il suo corpo robusto e squamoso sbarra\nl’accesso alla tana e protegge i piccoli dai predatori."
          y: "Il corpo è ricoperto di dure squame appuntite che\ngli si rizzano quando si inquieta."
        de:
          x: "Es benutzt seinen schuppigen Körper, um den\nHöhleneingang als Schutz für seine Jungen zu sperren."
          y: "Sein Körper ist mit massiven, nadelartigen\nSchuppen überzogen. Wenn es erregt ist,\nschießen die Nadeln hervor."
        es:
          x: "Usa su cuerpo duro y escamoso para sellar la entrada\na su madriguera y protegerse de los depredadores."
          y: "Tiene el cuerpo recubierto de escamas duras y\ncortantes. Cuando se inquieta, las usa para\ndefenderse."
        ko:
          x: "비늘로 뒤덮인 튼튼한\n몸으로 둥지의 입구를 막아\n상대로부터 새끼들을 지킨다."
          y: "단단하고 바늘 같은 비늘이\n몸을 뒤덮고 있다.\n흥분하면 바늘이 곤두선다."
