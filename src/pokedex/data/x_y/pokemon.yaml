          y: "ひろい　うみの　どこかに　すみかが\nあると　いわれている。なんぱした\nふねを　りくまで　みちびいてくれる。"
        jp_kanji:
          x: "大きな　体格で　空を　飛ぶ。\n地球を　約１６時間で\n１周してしまう。"
          y: "広い　海の　どこかに　住処が\nあると　言われている。難破した\n船を　陸まで　導いてくれる。"
        en:
          x: "It can fly in spite of its big and bulky physique.\nIt circles the globe in just 16 hours."
          y: "It is said to make its home somewhere in the sea.\nIt guides crews of shipwrecks to shore."
        fr:
          x: "Malgré son poids et son physique imposant,\nDracolosse est capable de voler. Il peut faire le tour\ndu monde en 16 heures."
          y: "On raconte qu’il vit quelque part en mer. Il guide\nles équipages naufragés jusqu’à la terre ferme."
        it:
          x: "Nonostante la stazza, è in grado di volare.\nPuò compiere il giro del mondo in 16 ore."
          y: "Si dice che faccia la sua tana da qualche parte nel\nmare. Porta a riva le vittime di naufragi."
        de:
          x: "Trotz seines wuchtigen und massiven Körpers kann\nes fliegen. Es umrundet den Erdball in nur 16 Stunden."
          y: "Man sagt, es lebe in den Meeren. Es bringt\nSchiffbrüchige sicher an Land."
        es:
          x: "A pesar del tamaño que tiene y de lo pesado que es,\npuede volar. Es capaz de dar la vuelta al mundo en\nsolo 16 horas."
          y: "Se dice que vive en algún lugar del mar. Guía a las\ntripulaciones de los barcos hundidos a la costa."
        ko:
          x: "커다란 몸집으로 하늘을 난다.\n지구를 약 16시간 만에\n일주한다."
          y: "넓은 바다의 어딘가에 거처가\n있다고 전해진다. 난파한\n배를 육지까지 이끌어 준다."
