          y: "あたまの　アンテナで　れいかいからの\nでんぱを　じゅしん。しじを　うけて\nひとを　れいかいへ　つれていくのだ。"
        jp_kanji:
          x: "弾力のある　体の　中に\n行き場のない　魂を　取りこんで\nあの世に　連れていくと　言われる。"
          y: "頭の　アンテナで　霊界からの\n電波を　受信。指示を　受けて\n人を　霊界へ　連れて行くのだ。"
        en:
          x: "It is said to take lost spirits into its pliant body and\nguide them home."
          y: "The antenna on its head captures radio waves from\nthe world of spirits that command it to take\npeople there."
        fr:
          x: "Son corps se replie sur lui-même pour emprisonner\nles esprits perdus et les ramener chez eux."
          y: "L’antenne sur sa tête capte les ondes radio du monde\ndes esprits lui ordonnant d’y porter des gens."
        it:
          x: "Si dice che accolga gli spiriti smarriti nel suo corpo\nflessibile per riportarli a casa."
          y: "Capta con l’antenna onde che arrivano dal mondo\ndegli spiriti, che gli ordinano di portare lì le persone."
        de:
          x: "Man sagt, dass es verlorene Seelen in seinem\nbiegsamen Körper nach Hause geleite."
          y: "Die Antenne auf seinem Kopf empfängt Radiowellen\naus einer anderen Dimension."
        es:
          x: "Se dice que recoge en su cuerpo flexible a los\nespíritus extraviados y los guía hasta casa."
          y: "La antena de la cabeza capta ondas de otra dimensión\nque le incitan a llevarse allí a la gente."
        ko:
          x: "탄력 있는 몸 안에\n갈 곳 없는 영혼을 가두어\n저승으로 데려간다고 전해진다."
          y: "머리의 안테나로 영계로부터의\n전파를 수신한다. 지시를 받아\n사람을 영계로 데리고 간다."
