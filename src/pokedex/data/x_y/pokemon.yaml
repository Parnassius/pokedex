      descriptions:
        jp_kana:
          x: "おおきな　ぬまを　なわばりにする。\nてきが　ちかづくと　おおあばれして\nおおきな　じしんを　おこすのだ。"
          y: "ぬまの　そこに　すみかを　つくる。\nいきものなら　すききらい　なく\nなんでも　たべてしまう　おおぐらい。"
        jp_kanji:
          x: "大きな　沼を　縄張りにする。\n敵が　近づくと　大暴れして\n大きな　地震を　起こすのだ。"
          y: "沼の　底に　住処を　作る。\n生き物なら　好き嫌いなく\nなんでも　食べてしまう　大食らい。"
        en:
          x: "It claims a large swamp to itself. If a foe comes\nnear it, it sets off tremors by thrashing around."
          y: "It makes its nest at the bottom of swamps.\nIt will eat anything--if it is alive, Whiscash will eat it."
        fr:
          x: "Il a besoin d’un étang entier pour vivre. Si un ennemi\ns’approche, il s’énerve et déclenche un séisme."
          y: "Il fait son nid au fond des marais. Il ne se pose pas\nde questions et avale toutes les créatures qui passent\nprès de lui."
        it:
          x: "Stabilisce il suo territorio nelle grandi paludi. Se\nil nemico gli si accosta, provoca un terremoto."
          y: "Nidifica nel letto delle paludi. È in grado di mangiare\nqualsiasi essere vivente."
        de:
          x: "Sein Revier hat es im Sumpfland. Nähert sich ein Feind,\nzappelt es wie wild und erzeugt so Erdbeben."
          y: "Sein Nest baut es am Grund von Sümpfen. Es frisst\nalles, wenn es nur lebendig ist. Welsar frisst einfach\nalles."
        es:
          x: "Habita en grandes pantanos. Si se acerca un enemigo,\nse alborota y causa temblores monumentales."
          y: "Construye su nido en el fondo de los pantanos.\nEs capaz de comerse cualquier cosa."
        ko:
          x: "큰 늪을 영역으로 한다.\n적이 가까이 오면 크게 난동 부려서\n큰 지진을 일으킨다."
          y: "늪 바닥에 거처를 만든다.\n살아 있는 것이라면 좋고 싫고 없이\n뭐든 먹어버리고 마는 대식가다."
