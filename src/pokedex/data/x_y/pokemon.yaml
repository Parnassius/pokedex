        fr:
          x: "Il attrape ses proies avec ses tentacules-pétales.\nIl a disparu il y a cent millions d’années."
          y: "Il vivait au fond de la mer il y a 100 millions d’années.\nLa science a permis de le ressusciter."
        it:
          x: "Cattura le prede che si avvicinano con i tentacoli a\nforma di corolla. Si è estinto 100 milioni di anni fa."
          y: "Viveva sul fondo marino 100 milioni di anni fa ed è\nstato rigenerato in laboratorio."
        de:
          x: "Vor 100 Millionen Jahren starb es aus. Es fängt\nseine Beute mit als Blüte getarnten Tentakeln."
          y: "Vor 100 Millionen Jahren lebte dieses Pokémon auf\ndem Meeresgrund. Die Wissenschaft belebte es neu."
        es:
          x: "Se extinguió hace 100 millones de años. Sus\ntentáculos parecen pétalos para atraer a sus presas."
          y: "Vivió en los fondos marinos hace unos 100 millones\nde años y fue recreado científicamente."
        ko:
          x: "촉수를 꽃잎으로 보이게 하여\n가까이 온 먹이를 잡는다.\n1억 년 전에 멸종했다."
          y: "약 1억 년 전의 해저에서\n살고 있던 고대의 포켓몬이다.\n과학의 힘으로 부활했다."
