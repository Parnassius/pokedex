        en:
          x: "It becomes uncontrollable if it is enraged. It\ndestroys everything with shredding claws and fire."
          y: "It’s uncontrollable if enraged. It flies around\nspouting flames and scorching fields\nand mountains."
        fr:
          x: "Une fois enragé, plus rien ne peut arrêter Drattak.\nIl détruit tout ce qu’il voit en utilisant ses griffes ou\nen crachant des flammes."
          y: "Ses colères sont dévastatrices. Il s’envole et brûle\ntout sur son passage."
        it:
          x: "Quando è adirato diventa una furia. Con i suoi artigli\nlaceranti e le fiammate che lancia può distruggere\nqualsiasi cosa."
          y: "Quando è adirato diventa una furia. Volteggia nel cielo\nsputando fiamme che bruciano le campagne intorno."
        de:
          x: "Wenn es wütend ist, gerät es außer Kontrolle.\nEs zerstört alles mit seinen Klauen und mit Feuer."
          y: "Ist es einmal wütend, flippt es aus. Es fliegt über\ndas Land und spuckt Feuer, das alles verbrennt."
        es:
          x: "Si se enfada, no hay forma de calmarlo; lo destruye\ntodo lanzando arañazos y llamas."
          y: "Si se enfada, no hay forma de que se calme. Echa a\nvolar e incendia campos y montañas desde el cielo."
        ko:
          x: "화나게 하면 어쩔 도리가 없다.\n모든 것을 발톱으로 갈기갈기 찢고\n불꽃으로 태워서 파괴한다."
          y: "한번 화내면 크게 난동을 부린다.\n하늘을 날며 지상의\n산과 들을 불꽃으로 모조리 태운다."
