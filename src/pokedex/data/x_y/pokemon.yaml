      descriptions:
        jp_kana:
          x: "からだの　よこがわにある　ラインは\nたいようのひかりを　ためておける。\nよるになると　あざやかに　かがやく。"
          y: "たいようを　いっぱいに　あびた\nおびれの　もようは　くらくなると\nあざやかな　いろで　ひかりだす。"
        jp_kanji:
          x: "体の　横側にある　ラインは\n太陽の光を　ためておける。\n夜になると　鮮やかに　輝く。"
          y: "太陽を　いっぱいに　浴びた\n尾びれの　模様は　暗くなると\n鮮やかな　色で　光り出す。"
        en:
          x: "The line running down its side can store sunlight.\nIt shines vividly at night."
          y: "After long exposure to sunlight, the patterns on its\ntail fins shine vividly when darkness arrives."
        fr:
          x: "La ligne qui fait le tour de son corps stocke l’énergie\nsolaire et brille dans la nuit."
          y: "Après une longue exposition au soleil, les motifs de\nses nageoires caudales luisent à la nuit tombée."
        it:
          x: "La linea che contorna il suo corpo immagazzina la\nluce solare. Di notte si illumina di una luce splendente."
          y: "Dopo una lunga esposizione al sole, i motivi sulle\nsue pinne brillano vividamente al calar dell’oscurità."
        de:
          x: "Die Linie an seiner Seite kann Sonnenlicht\nspeichern. Nachts leuchtet es sehr intensiv."
          y: "Wurden die Flossen lange dem Sonnenlicht\nausgesetzt, leuchten sie in der Dunkelheit."
        es:
          x: "La línea que le recorre el costado puede almacenar\nluz solar. Brilla con mucha fuerza por la noche."
          y: "Si se expone mucho al sol, los dibujos de sus aletas\nbrillan en la oscuridad."
        ko:
          x: "몸의 옆쪽에 있는 줄에\n태양의 빛을 모아둘 수 있다.\n밤이 되면 아름답게 빛난다."
          y: "햇볕을 잔뜩 쬔 꼬리지느러미의\n무늬는 어두워지면 선명한 색으로\n반짝이기 시작한다."
lumineon:
