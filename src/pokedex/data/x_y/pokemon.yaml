          y: "１おくねんまえの　せかいでは\nむてきを　ほこり　おうさまのように\nふるまっていた　ポケモンだ。"
        jp_kanji:
          x: "分厚い　鉄板を　紙のように\nかみちぎる　おおあごで　古代の\n世界では　無敵を　誇った。"
          y: "１億年前の　世界では\n無敵を　ほこり　王様のように\nふるまっていた　ポケモン。"
        en:
          x: "Thanks to its gargantuan jaws, which could shred\nthick metal plates as if they were paper, it was\ninvincible in the ancient world it once inhabited."
          y: "Nothing could stop this Pokémon\n100 million years ago,\nso it behaved like a king."
        fr:
          x: "Dans les temps anciens, aucun Pokémon ne pouvait\nrivaliser avec lui. Ses puissantes mâchoires peuvent\nréduire une épaisse plaque de métal en confettis."
          y: "Il y a 100 millions d’années, ce Pokémon régnait en\nmaître absolu. Personne ne pouvait se mesurer à lui."
        it:
          x: "Grazie alle enormi fauci, che gli permettevano di\nmasticare una lastra di metallo come se fosse carta,\nera il più forte dei Pokémon preistorici."
          y: "Nell’era preistorica era il fiero re incontrastato\ndi tutti i Pokémon."
        de:
          x: "Aufgrund der Zerstörungskraft seines Kiefers,\nder Stahl zerreißen kann, als wäre es Papier,\ngalt es in seiner Zeit als unbesiegbar."
          y: "Vor 100 Millionen Jahren gab es niemanden, der sich\nmit ihm hätte messen können, weshalb sich dieses\nPokémon wie ein König verhielt."
        es:
          x: "En el mundo antiguo en el que habitaba no tenía\nrivales gracias a sus mandíbulas, con las que podría\ndespedazar con facilidad gruesas placas de acero."
          y: "Hace 100 millones de años, este Pokémon se\ncomportaba como un rey, sin nadie que osase\nhacerle frente."
        ko:
          x: "두꺼운 철판을 종잇장처럼\n물어뜯는 커다란 턱 덕분에\n고대 세계에서는 무적이었다."
          y: "1억 년 전 세계에서는\n무적을 뽐내며 왕처럼\n행동하던 포켓몬이다."
