      descriptions:
        jp_kana:
          x: "すいじょうきを　ふきだして　じぶんの\nすがたを　のうむで　かくす。ひとの\nたちいらない　やまに　すむと　いう。"
          y: "せなかの　アームから　たいないの\nすいじょうきを　ふんしゃする。\nやま　ひとつ　ふきとばす　いりょく。"
        jp_kanji:
          x: "水蒸気を　噴き出して　自分の　姿を\n濃霧で　隠す。人の　立ち入らない\n山に　住むという。"
          y: "背中の　アームから\n体内の　水蒸気を　噴射する。\n山　ひとつ　吹き飛ばす　威力。"
        en:
          x: "It lets out billows of steam and disappears into\nthe dense fog. It’s said to live in mountains\nwhere humans do not tread."
          y: "It expels its internal steam from the\narms on its back. It has enough\npower to blow away a mountain."
        fr:
          x: "Il est capable de générer un nuage de vapeur pour\nse cacher. Il vit dans des montagnes inhabitées."
          y: "Il évacue la vapeur qui s’accumule à l’intérieur de son\ncorps par les bras situés sur son dos.\nCe jet est assez puissant pour raser des montagnes."
        it:
          x: "Si nasconde emettendo spesse nubi di vapore attorno\na sé. Si dice che viva su montagne non frequentate\ndall’uomo."
          y: "Emette il vapore generato nel suo corpo dalle braccia\ncongiunte ad anello sul dorso. La potenza del getto\npotrebbe spazzare via una montagna."
        de:
          x: "Es stößt Wasserdampf aus und versteckt sich\nim dadurch entstehenden dichten Nebel. Es lebt in\nBergen, die von Menschen gemieden werden."
          y: "Über die Arme auf seinem Rücken stößt es\nWasserdampf aus. Seine Kraft reicht aus,\num Berge zu versetzen."
        es:
          x: "Expulsa vapor y desaparece entre la densa niebla.\nDicen que habita en montañas solitarias."
          y: "Expulsa vapor de agua por los brazos que tiene en\nla espalda. Sale a tal potencia que sería capaz de\narrasar una montaña entera."
        ko:
          x: "수증기를 뿜어내어 자신의\n모습을 짙은 안개 속에 숨긴다. 사람이\n오지 않는 산에 산다고 한다."
          y: "등에 있는 팔로 체내의\n수증기를 분사한다.\n산 하나를 날려버릴 정도의 위력이다."
