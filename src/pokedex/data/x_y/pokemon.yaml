        jp_kana:
          x: "かわを　くびまで　ひきあげて\nぼうぎょの　しせい。ゴムのような\nだんりょくで　ダメージを　へらす。"
          y: "がんじょうな　ずがいこつが　じまん。\nいきなり　ずつきを　かましてくるが\nおもさで　じぶんも　フラフラしてる。"
        jp_kanji:
          x: "皮を　首まで　引き上げて\n防御の　姿勢。ゴムのような　弾力で\nダメージを　減らす。"
          y: "頑丈な　頭蓋骨が　自慢。\nいきなり　頭突きを　かましてくるが\n重さで　自分も　フラフラしてる。"
        en:
          x: "Its skin has a rubbery elasticity, so it can reduce\ndamage by defensively pulling its skin up to\nits neck."
          y: "Proud of its sturdy skull, it suddenly headbutts\neverything, but its weight makes it unstable, too."
        fr:
          x: "Il remonte sa peau jusqu’à son cou pour se protéger.\nElle a une constitution élastique qui absorbe les\ncoups."
          y: "Ses coups de tête sont sa fierté. Seul problème :\nsa tête est un peu trop lourde, et il perd souvent\nl’équilibre."
        it:
          x: "Assumono la posizione difensiva tirando su fino al\ncollo la pelle, che è elastica come la gomma e\npreviene i danni."
          y: "Va fiero del suo robustissimo cranio. Tira senza\npreavviso testate così forti da farlo barcollare."
        de:
          x: "Es zieht seine gummiartige Haut bis zum Hals hinauf\nund nimmt eine Abwehrhaltung ein, um sich vor\nSchaden zu schützen."
          y: "Verteilt gerne unvermittelt Kopfnüsse, deren Wucht\nauch seine Sinne vernebelt. Es ist stolz auf seinen\nrobusten Schädel."
        es:
          x: "Se sube la piel hasta el cuello para defenderse. Su\nelasticidad, similar a la de una goma, reduce el daño\nrecibido."
          y: "Está orgulloso de su sólido cráneo. Reparte cabezazos\na diestro y siniestro con tal vehemencia que él mismo\nse marea."
        ko:
          x: "가죽을 목까지 늘려서\n방어 자세를 취한다. 고무 같은\n탄력을 이용해 데미지를 줄인다."
          y: "튼튼한 두개골이 자랑이다.\n느닷없이 박치기를 하려고 하지만\n무게로 자신도 휘청거린다."
scrafty:
