      descriptions:
        jp_kana:
          x: "かざんちたいに　おおく　はっせい。\nあたたかい　ところを　さがして\nのろのろ　はいずりまわっている。"
          y: "ようがんで　できた　からだを　もつ。\nたえず　うごいていないと　からだが\nひえて　かたまってしまうのだ。"
        jp_kanji:
          x: "火山地帯に　多く　発生。\n暖かい　ところを　探して\nのろのろ　はいずり回っている。"
          y: "溶岩で　できた　体を　持つ。\n絶えず　動いていないと　体が\n冷えて　固まってしまうのだ。"
        en:
          x: "A common sight in volcanic areas, it slowly slithers\naround in a constant search for warm places."
          y: "Its body is made of magma. If it doesn’t keep\nmoving, its body will cool and harden."
        fr:
          x: "Commun dans les régions volcaniques, il se déplace\nsans cesse pour trouver des endroits chauds."
          y: "Son corps est fait de magma. S’il cesse de bouger,\nil refroidit et durcit."
        it:
          x: "Comune nelle aree vulcaniche, striscia in giro\nlentamente, sempre alla ricerca di luoghi caldi."
          y: "Nel suo corpo scorre magma. Se non si muove\ncontinuamente, il suo corpo si raffredda e s’indurisce."
        de:
          x: "Es hält sich ständig bei Vulkanen auf und ist\nstets kriechend auf der Suche nach warmen\nAufenthaltsorten."
          y: "Sein Körper besteht aus Magma. Bleibt es nicht\nständig in Bewegung, kühlt es aus und verhärtet sich."
        es:
          x: "Asiduo a las zonas volcánicas, se desliza lentamente\nen busca de lugares calientes."
          y: "Su cuerpo se compone de magma. Si deja de\nmoverse, se enfría y se endurece."
        ko:
          x: "화산 지대에 많이 나타난다.\n따뜻한 곳을 찾아서\n느릿느릿 기어 다니고 있다."
          y: "용암으로 된 몸을 가지고 있다.\n끊임없이 움직이지 않으면 몸이\n식어 굳어져 버린다."
magcargo:
  species_id: 219
  names:
    jp_kana: マグカルゴ
    jp_kanji: マグカルゴ
