        jp_kanji:
          x: "体よりも　大きな　キノコが\nパラセクトを　操っている。\n毒の　胞子を　ばらまく。"
          y: "背中の　キノコが　育つほど\nばらまかれる　キノコの　胞子の\n効果は　強力になる。"
        en:
          x: "A mushroom grown larger than the host’s body\ncontrols Parasect. It scatters poisonous spores."
          y: "The larger the mushroom on its back grows,\nthe stronger the mushroom spores it scatters."
        fr:
          x: "Un champignon parasite plus gros que Parasect\ncontrôle son corps. Il répand des spores\nempoisonnées."
          y: "Plus le champignon sur son dos grandit, plus celui-ci\német des spores puissantes dans l’air."
        it:
          x: "Parasect è controllato da un fungo ancora più\ngrosso del suo corpo. Diffonde spore velenose."
          y: "Più cresce il fungo che ha sul dorso, più forti\ndiventano le spore che sparge."
        de:
          x: "Parasek wird von einem Pilz, der größer als das\nPokémon ist, kontrolliert. Er gibt Giftsporen ab."
          y: "Je größer der Pilz auf seinem Rücken wird, desto\nstärker werden auch die Sporen, die es verteilt."
        es:
          x: "Parasect está dominado por una seta parásita mayor\nque él. Dispersa esporas venenosas."
          y: "Cuanto más grande sea la seta de su lomo, más\nresistentes serán las esporas que esta suelta."
        ko:
          x: "몸보다 큰 버섯이\n파라섹트를 조종하고 있다.\n독 포자를 여기저기 뿌린다."
          y: "등의 버섯이 자랄수록\n흩뿌려지는 버섯포자의\n효과는 강력해진다."
