          y: "こどもだが　６ほんの　しっぽが\nうつくしい。せいちょうすると\nさらに　しっぽが　ふえる。"
        jp_kanji:
          x: "生まれたとき　尻尾は　真っ白で\n１本しかない。育つと　やがて\n先が　分かれて　尻尾が　増える。"
          y: "子供だが　６本の　尻尾が\n美しい。成長すると　さらに\n尻尾が　増える。"
        en:
          x: "When it is born, it has just one snow-white tail.\nThe tail splits from its tip as it grows older."
          y: "While young, it has six gorgeous tails. When it\ngrows, several new tails are sprouted."
        fr:
          x: "Il n’a qu’une seule queue à la naissance. Sa queue\nse divise à la pointe au fil des ans."
          y: "Quand il est jeune, ce Pokémon a six queues\nmagnifiques. De nouvelles queues apparaissent tout\nau long de sa croissance."
        it:
          x: "Alla nascita ha solo una coda, che con il passare\ndel tempo sviluppa diverse diramazioni."
          y: "Quando è giovane ha sei meravigliose code, che si\nmoltiplicano durante la sua crescita."
        de:
          x: "Dieses Pokémon hat bei seiner Geburt nur einen\nSchweif, der sich mit zunehmendem Alter aufspaltet."
          y: "In seiner Jugend hat es sechs hinreißende Schweife.\nWährend es wächst, kommen noch weitere neue\nSchweife hinzu."
        es:
          x: "Cuando nace solo tiene una cola, pero a medida que\ncrece, esta se va dividiendo desde la punta."
          y: "De pequeño, tiene seis colas increíbles. A medida que\ncrece, le van saliendo más."
        ko:
          x: "태어났을 때는 꼬리가 새하얗고\n하나밖에 없다. 성장하면\n끝이 갈라지며 꼬리 수가 늘어난다."
          y: "어리지만 6개의 꼬리가\n아름답다. 성장하면\n한층 꼬리 수가 늘어난다."
ninetales:
