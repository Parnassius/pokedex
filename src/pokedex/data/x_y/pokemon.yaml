          x: "This very loyal Pokémon helps Trainers, and it also\ntakes care of other Pokémon."
          y: "It has black, cape-like fur that is very hard and\ndecreases the amount of damage it receives."
        fr:
          x: "Un Pokémon très loyal qui aide aussi bien les\nDresseurs que les autres Pokémon qu’il rencontre."
          y: "Les poils qui entourent son corps comme un manteau\nsont extrêmement durs et amortissent les coups."
        it:
          x: "È un Pokémon molto leale, che aiuta il suo Allenatore\ne al contempo si prende cura degli altri Pokémon\ndella squadra."
          y: "La pelliccia nera che lo ricopre come un manto è\nestremamente dura e ammortizza i colpi che gli\nvengono inferti."
        de:
          x: "Dieses äußerst treue Pokémon geht nicht nur\nseinem Trainer zur Hand, sondern hilft auch\nanderen Pokémon."
          y: "Das dunkle Fell, das es wie ein Mantel umgibt,\nist äußerst widerstandsfähig und mindert\nden Schaden durch Attacken."
        es:
          x: "Este Pokémon es muy leal. No solo ayuda a\nEntrenadores, sino que también se preocupa por\notros Pokémon."
          y: "Un robusto pelaje cubre su cuerpo a modo de capa\ny disminuye el daño que recibe en los ataques."
        ko:
