        jp_kanji:
          x: "近づいた　人間を　飲みこんで\nミイラに　してしまうという　ウワサ。\n金塊を　好んで　食べる。"
          y: "本物の　かんおけと　間違え\n近寄ってきた　墓ドロボウを\n体の　中に　閉じこめてしまう。"
        en:
          x: "It has been said that they swallow those who get\ntoo close and turn them into mummies. They like to\neat gold nuggets."
          y: "Grave robbers who mistake them for real coffins and\nget too close end up trapped inside their bodies."
        fr:
          x: "Il paraît qu’il avale les gens et les transforme en\nmomies. Il adore manger des lingots d’or."
          y: "Il prend l’apparence d’un beau cercueil. Les pilleurs\nde tombes imprudents finissent enfermés à l’intérieur."
        it:
          x: "Si dice che inghiottisca le prede che gli si avvicinano\ne le trasformi in mummie. Gli piace mangiare le pepite\nd’oro."
          y: "Imprigiona nel suo corpo i razziatori di tombe che gli\nvanno vicino pensando che si tratti di un sarcofago\nvero."
        de:
          x: "Angeblich verschlingt es jeden, der sich ihm auch\nnur nähert. Besonders gern frisst es Klumpen aus\nreinem Gold."
          y: "Grabräuber, die es mit einem echten Sarg verwechseln\nund ihm zu nahe kommen, hält es im Inneren seines\nKörpers gefangen."
        es:
          x: "Se comenta que engulle a todo humano que se le\nacerca y lo momifica. Su comida favorita son las\npepitas de oro."
          y: "Atrapan en su interior a los ladrones de tumbas que\nlos confunden con ataúdes de verdad."
        ko:
          x: "가까이 다가온 인간을 삼켜서\n미라로 만든다는 소문이 있다.\n금괴를 즐겨 먹는다."
          y: "진짜 관과 착각해서\n다가온 도굴꾼을\n몸속에 가둬버린다."
tirtouga:
