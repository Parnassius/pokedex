          x: "そうげんや　やまに　せいそくする。\nいしころに　にていて　きがつかずに\nふんだり　つまずいたり　してしまう。"
          y: "いしころと　みわけが　つかない。\nがんじょうな　からだを　なかまと\nぶつけあい　かたさを　きそいあう。"
        jp_kanji:
          x: "草原や　山に　生息する。\n石ころに　似ていて　気がつかず\n踏んだり　つまずいたりしてしまう。"
          y: "石ころと　見分けが　つかない。\n頑丈な　体を　仲間と　ぶつけ合い\n硬さを　競い合う。"
        en:
          x: "Found in fields and mountains. Mistaking them for\nboulders, people often step or trip on them."
          y: "It is impossible to distinguish from rocks. It slams\nagainst others in contests of hardness."
        fr:
          x: "Il vit dans les plaines ou les montagnes.\nOn le confond souvent avec un petit caillou."
          y: "Son corps se fond dans la roche. Les Pokémon\nde cette espèce se bousculent au cours d’épreuves\nde force."
        it:
          x: "Si trova nei campi e in montagna. Se confuso con\nuna roccia, può succedere di inciamparvi."
          y: "È impossibile distinguerlo dalle rocce. Si scaglia\ncontro gli altri per vedere chi è più duro."
        de:
          x: "Wanderer stolpern in den Bergen häufig über dieses\nPokémon, da es wie ein Stein aussieht."
          y: "Man kann es nicht von Felsbrocken unterscheiden.\nEs rempelt andere an, um sich zu beweisen."
        es:
          x: "Aparecen en llanos y montañas. Como parecen rocas,\nla gente se tropieza con ellos o los pisa."
          y: "Es imposible distinguirlos de las rocas. Para probar su\ndureza, chocan entre sí en duelo."
        ko:
          x: "초원이나 산에 서식한다.\n돌멩이와 닮은 탓에 알아채지 못하고\n밟거나 발이 걸려 넘어지기도 한다."
          y: "돌멩이와 구별되지 않는다.\n튼튼한 몸을 동료와\n서로 부딪쳐서 단단함을 겨룬다."
graveler:
