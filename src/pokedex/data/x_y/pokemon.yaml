        jp_kanji:
          x: "自分では　ほとんど　動けないが\n危ないときは　硬くなって\n身を守っているようだ。"
          y: "天敵に　見つからないように\n葉っぱの　裏や　枝の　すきまに　隠れて\n進化の　ときを　待つ。"
        en:
          x: "Almost incapable of moving, this Pokémon can only\nharden its shell to protect itself when it is\nin danger."
          y: "While awaiting evolution, it hides from predators\nunder leaves and in nooks of branches."
        fr:
          x: "Incapable de se déplacer de lui-même, il se défend en\ndurcissant sa carapace."
          y: "Il se cache sous les feuilles et les branches pour fuir\nles prédateurs en attendant d’évoluer."
        it:
          x: "Quasi incapace di muoversi, questo Pokémon può\nsolo indurire il proprio guscio per proteggersi."
          y: "Si nasconde dai predatori dietro le foglie e fra i rami,\nin attesa dell’evoluzione."
        de:
          x: "Dieses Pokémon kann sich kaum bewegen.\nBei drohender Gefahr verhärtet es seinen Panzer."
          y: "Während es auf seine Entwicklung wartet, versteckt es\nsich unter Blättern und zwischen Ästen."
        es:
          x: "Casi incapaz de moverse, este Pokémon solo puede\nendurecer su caparazón para protegerse."
          y: "Se esconde de sus atacantes entre las ramas de los\nárboles mientras espera a evolucionar."
        ko:
          x: "스스로는 거의 움직일 수 없지만\n위험할 때는 단단해져서\n몸을 보호하고 있는 것 같다."
          y: "천적에게 발견되지 않도록\n잎사귀 뒷면이나 가지의 틈새에\n숨어서 진화할 때를 기다린다."
