        en:
          x: "When tapped, this Pokémon will pull in its head,\nbut its tail will still stick out a little bit."
          y: "It is said to live 10,000 years. Its furry tail is\npopular as a symbol of longevity."
        fr:
          x: "Attaqué, il cache sa tête dans sa carapace, mais\nson corps trop gros ne peut y tenir en entier."
          y: "On prétend qu’il vit 10 000 ans. Sa queue duveteuse\nest un symbole de longévité populaire."
        it:
          x: "Quando si sente minacciato ritira la testa nella\ncorazza, mentre la coda sporge sempre un po’."
          y: "Pare che viva 10.000 anni. Ha la coda ricoperta da\nuna folta pelliccia, indice di longevità."
        de:
          x: "Bei Gefahr zieht dieses Pokémon seinen Kopf ein.\nDie Schwanzspitze ragt jedoch aus dem Panzer\nheraus."
          y: "Man sagt, es werde 10 000 Jahre alt. Sein buschiger\nSchweif ist ein Symbol für langes Leben."
        es:
          x: "Si es golpeado, esconderá su cabeza. Aun así, su cola\npuede seguir golpeando."
          y: "Se dice que vive 10 000 años. Su peluda cola es un\nsímbolo de longevidad."
        ko:
          x: "딱 하고 머리를 맞을 때\n등껍질로 숨어서 피한다. 하지만\n꼬리가 살짝 삐져나와 있다."
          y: "만 년의 수명을 가지고 있다고들\n말한다. 치렁치렁한 꼬리는\n장수의 상징으로서 인기가 있다."
