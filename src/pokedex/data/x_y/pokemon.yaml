          y: "たいおんを　さげることで　ぜんしんの\nたいもうを　こおらせて　するどく\nとがった　ハリのようにして　とばす。"
        jp_kanji:
          x: "体温を　コントロールすることで\n周囲の　空気を　凍らせて\nダイヤモンドダストを　降らせる。"
          y: "体温を　さげることで　全身の\n体毛を　凍らせて　鋭く\nとがった　針のようにして　飛ばす。"
