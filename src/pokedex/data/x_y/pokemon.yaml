        es:
          x: "Come de todo, por lo que puede vivir en aguas\ncontaminadas. Nadie le presta atención."
          y: "Es el Pokémon con peor aspecto. Vive en grupos en\nlechos de ríos con abundantes plantas acuáticas."
        ko:
          x: "무엇이든 먹기 때문에 더러운\n강이나 호수에서도 살 수 있다.\n누구도 주목하지 않는 포켓몬이다."
          y: "제일 볼품없는 포켓몬이다.\n수초가 많은 강바닥에\n한데 모여 살고 있다."
milotic:
