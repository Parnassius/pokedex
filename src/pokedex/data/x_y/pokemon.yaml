          y: "５００ねんまえに　わるさをしたため\nかなめいしの　ひびわれに\nからだを　つなぎとめられてしまった。"
        jp_kanji:
          x: "１０８個の　魂が　集まって\n生まれた　ポケモン。\n要石の　ひび割れに　つながれている。"
          y: "５００年前に　悪さをしたため\n要石の　ひび割れに\n体を　つなぎとめられてしまった。"
        en:
          x: "A Pokémon that was formed by 108 spirits. It is\nbound to a fissure in an odd keystone."
          y: "It was bound to a fissure in an odd keystone as\npunishment for misdeeds 500 years ago."
        fr:
          x: "Un Pokémon composé de 108 esprits. Il provient\nd’une fissure dans une clé de voûte étrange."
          y: "Il fut emprisonné dans la fissure d’une clé de voûte\nétrange en guise de punition il y a 500 ans."
        it:
          x: "Pokémon formato da 108 spiriti. È stato imprigionato\nnella fessura di una Roccianima."
          y: "500 anni fa fu imprigionato nella fessura di una\nRoccianima come punizione."
        de:
          x: "Ein Pokémon, das aus 108 Geistern besteht.\nEs ist an einen Spalt in einem mysteriösen Stein\ngebunden."
          y: "Es wurde in einen Spalt eines Steins gebannt,\nals Sühne für Untaten, die es vor 500 Jahren\nbegangen hatte."
        es:
          x: "Se formó a partir de 108 espíritus. Está unido a la\nfisura de una piedra angular mística."
          y: "Como castigo por una fechoría 500 años atrás, está\nunido a la fisura de una piedra angular mística."
        ko:
          x: "108개의 영혼이 모여서\n태어난 포켓몬이다. 쐐기돌의\n균열과 연결되어 있다."
          y: "500년 전에 나쁜 짓을 했기 때문에\n쐐기돌의 균열에\n몸이 연결되어 갇혀 버렸다."
