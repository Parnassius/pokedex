      hidden_ability: justified
      descriptions:
        jp_kana:
          x: "さいがいを　よかんする。\nきけんを　しらせる　ときだけ\nひとまえに　あらわれるという。"
          y: "さいがいの　よちょうを　かんじると\nすがたを　みせる　ために　わざわいを\nよぶ　ポケモンと　ごかいされていた。"
        jp_kanji:
          x: "災害を　予感する。\n危険を　知らせる　ときだけ\n人前に　現れるという。"
          y: "災害の　予兆を　感じると\n姿を　見せる　ために　災いを　呼ぶ\nポケモンと　誤解されていた。"
        en:
          x: "It senses coming disasters and appears before\npeople only to warn them of impending danger."
          y: "It appears when it senses an impending natural\ndisaster. As a result, it was mistaken as a\ndoom bringer."
        fr:
          x: "Il pressent les catastrophes et n’apparaît aux gens\nque pour les prévenir d’un danger imminent."
          y: "Absol apparaît dès qu’une catastrophe naturelle est\nsur le point de se produire. Pour cette raison,\nles gens ont longtemps pensé qu’il portait malheur."
        it:
          x: "Percepisce i disastri naturali imminenti e si mostra\nsolo per avvertire la gente del pericolo."
          y: "Appare quando avverte un imminente disastro\nnaturale. Ciò ha fatto credere che portasse sfortuna."
        de:
          x: "Es spürt drohende Katastrophen und erscheint nur\ndann, wenn es andere vor der Gefahr warnen will."
          y: "Es taucht auf, wenn es spürt, dass eine\nNaturkatastrophe kurz bevorsteht. Daher wurde es\nirrtümlicherweise für einen Unheilsboten gehalten."
        es:
          x: "Presiente desastres inminentes y se aparece a la gente\npara advertir del peligro."
          y: "Aparece cuando prevé una catástrofe natural\ninminente, por eso dicen que trae mala suerte."
        ko:
          x: "재해의 위험을 감지한다.\n위험을 알리는 때에만\n사람 앞에 나타난다고 한다."
          y: "재해의 징조를 느끼면 모습을\n보이기 때문에 재앙을 부르는\n포켓몬으로 오해받고 있었다."
