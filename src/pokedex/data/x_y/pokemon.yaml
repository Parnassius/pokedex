        jp_kana:
          x: "ポケモンで　いちばん　きょうりょくな\nさいみんじゅつを　つかう。あいてを\nいのままに　あやつってしまうのだ。"
          y: "さいみんじゅつで　おびきよせて\nあたまの　しょくしゅで　からめとり\nしょうかえきを　あびせて　しとめる。"
        jp_kanji:
          x: "ポケモンで　一番　強力な\n催眠術を　使う。相手を　意のままに\n操ってしまうのだ。"
          y: "催眠術で　おびき寄せて\n頭の　触手で　絡め取り\n消化液を　浴びせて　しとめる。"
        en:
          x: "It wields the most compelling hypnotic powers\nof any Pokémon, and it forces others to do\nwhatever it wants."
          y: "It lures its prey close with hypnotic motions,\nthen wraps its tentacles around it before\nfinishing it off with digestive fluids."
        fr:
          x: "Doté des pouvoirs hypnotiques les plus puissants\ndu règne des Pokémon, il manipule son adversaire\nà sa guise."
          y: "Il attire ses ennemis en les hypnotisant, avant de les\nenserrer de ses tentacules et de les neutraliser avec\nson suc gastrique."
        it:
          x: "È il Pokémon con il potere ipnotico più forte in\nassoluto. Può controllare a piacimento i suoi nemici."
          y: "Attira le prede con l’ipnosi, le cattura con i tentacoli\ne le finisce spruzzando loro addosso i suoi succhi\ngastrici."
        de:
          x: "Unter allen Pokémon verfügt es über die stärksten\nhypnotischen Kräfte, mit denen es Gegner nach\nBelieben kontrollieren kann."
          y: "Mit seinen hypnotischen Kräften lockt es Gegner an,\nhält sie mit den Tentakeln an seinem Kopf fest und\nzersetzt sie dann mit Verdauungssekret."
        es:
          x: "Tiene a su disposición los poderes hipnóticos más\npoderosos de entre todos los Pokémon. Controla al\nenemigo a su voluntad."
          y: "Hipnotiza a su objetivo para atraerlo y lo aprisiona\ncon los tentáculos de su cabeza, para asestarle el\ngolpe de gracia rociándolo con sus jugos gástricos."
        ko:
          x: "포켓몬 중에서 가장 강력한\n최면술을 쓴다. 상대를\n자기 마음대로 조종해버린다."
          y: "최면술로 끌어들여서\n머리의 촉수로 휘감아\n소화액을 끼얹어 꼼짝 못하게 한다."
binacle:
  species_id: 688
  names:
    jp_kana: カメテテ
    jp_kanji: カメテテ
    en: Binacle
    fr: Opermine
    it: Binacle
