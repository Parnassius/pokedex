          x: "しっぽで　きのえだに　ぶらさがり\nえものを　かんさつする。すきを\nみて　じょうくうから　おそいかかる。"
          y: "はおとを　たてずに　そらを　とぶ。\nながい　しっぽで　えものを　つかまえ\nキバで　きゅうしょを　ひとつき。"
        jp_kanji:
          x: "尻尾で　木の枝に　ぶら下がり\n獲物を　観察する。すきを　見て\n上空から　襲いかかる。"
          y: "羽音を　立てずに　空を　飛ぶ。\n長い　尻尾で　獲物を　捕まえ\nキバで　急所を　一突き。"
        en:
          x: "It observes prey while hanging inverted from\nbranches. When the chance presents itself,\nit swoops!"
          y: "Its flight is soundless. It uses its lengthy tail to\ncarry off its prey... Then its elongated fangs do\nthe rest."
        fr:
          x: "Il guette sa proie, pendu à une branche la tête en bas,\net s’en saisit à la première occasion."
          y: "Il vole sans un bruit, et capture ses proies avec sa\nqueue pour leur infliger une morsure critique."
        it:
          x: "Sta appeso ai rami con la testa in giù. Alla prima\noccasione, si butta a capofitto sulla preda."
          y: "Vola senza far rumore. Afferra le prede con la lunga\ncoda e perfora il loro punto vitale con i canini."
        de:
          x: "Es hängt kopfüber von einem Ast und beobachtet\nseine Beute. Bei Gelegenheit stürzt es sich auf sie."
          y: "Es fliegt völlig lautlos. Erst fängt es seine Beute mit\nseinem langen Schweif, dann saugt es sie aus."
        es:
          x: "Espera a sus presas colgado de una rama bocabajo.\nCuando llega su oportunidad, se lanza en picado."
          y: "Vuela sin hacer nada de ruido. Con su larga cola\ncaptura a sus presas y las muerde con sus colmillos."
        ko:
          x: "꼬리로 나뭇가지에 매달려\n먹이를 관찰한다. 틈을\n봐서 상공에서 덮친다."
          y: "날갯소리를 내지 않고 하늘을 난다.\n긴 꼬리로 먹이를 잡아\n송곳니로 급소를 공격한다."
