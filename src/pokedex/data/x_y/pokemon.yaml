        jp_kana:
          x: "おおむかしの　ひとびとは　だいちの\nしたには　きょだいな　ドダイトスが\nいると　くうそう　していた。"
          y: "ちいさな　ポケモンたちが　あつまり\nうごかない　ドダイトスの　せなかで\nすづくりを　はじめることがある。"
        jp_kanji:
          x: "大昔の　人々は　大地の　下には\n巨大な　ドダイトスが　いると\n空想していた。"
          y: "小さな　ポケモンたちが　集まり\n動かない　ドダイトスの　背中で\n巣作りを　はじめることがある。"
        en:
          x: "Ancient people imagined that beneath the ground,\na gigantic Torterra dwelled."
          y: "Small Pokémon occasionally gather on its unmoving\nback to begin building their nests."
        fr:
          x: "Autrefois, les gens pensaient qu’un gigantesque\nTorterra vivait sous la surface de la Terre."
          y: "Il arrive que de petits Pokémon se rassemblent sur\nson dos immobile pour y faire leur nid."
        it:
          x: "In tempi antichissimi la gente pensava che sottoterra\nci fossero dei giganteschi Torterra."
          y: "Piccoli Pokémon si radunano talvolta sul suo dorso\nimmobile per costruirvi la loro tana."
        de:
          x: "In alten Zeiten malten die Menschen sich aus,\ndie Erde ruhe auf dem Rücken eines riesigen\nChelterrar."
          y: "Kleine Pokémon fangen manchmal an, auf dem\nbewegungslosen Rücken Nester zu bauen."
        es:
          x: "Las gentes de antaño creían que el planeta se\nsustentaba en la espalda de un gran Torterra."
          y: "Algunos Pokémon pequeños se juntan en su espalda\npara hacer sus nidos."
        ko:
          x: "오랜 옛날 사람들은 대지\n밑에 거대한 토대부기가\n있다고 공상했었다."
          y: "작은 포켓몬들이 모여\n움직이지 않는 토대부기의 등에서\n둥지를 만들려고 하는 경우가 있다."
