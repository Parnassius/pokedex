          y: "きれいずきな　せいかくの　ポケモン。\nしっぽを　ほうきがわりに　いつも\nすみかの　ほこりを　はらっている。"
        jp_kanji:
          x: "お互いの　尻尾で　相手を\nとことん　きれいに　してあげるのが\nチラーミィ同士の　あいさつ。"
          y: "きれい好きな　性格の　ポケモン。\n尻尾を　ほうきがわりに　いつも\n住処の　ほこりを　払っている。"
        en:
          x: "Minccino greet each other by grooming one another\nthoroughly with their tails."
          y: "These Pokémon prefer a tidy habitat. They are\nalways sweeping and dusting, using their tails\nas brooms."
        fr:
          x: "Ils se saluent en s’époussetant les uns les autres avec\nleur queue qui leur sert de plumeau."
          y: "Un Pokémon qui aime la propreté. Chez lui, il enlève\nsans cesse la poussière en utilisant sa queue comme\nun plumeau."
        it:
          x: Si salutano pulendosi l’un l’altro con le loro code.
          y: "Di natura ama la pulizia. Spazza sempre la polvere\ndalla sua tana usando la coda come scopa."
        de:
          x: "Sie begrüßen einander, indem sie ihr Gegenüber\nmithilfe ihres Schweifs säubern."
          y: "Ein Pokémon mit Putzfimmel. Es benutzt seinen\nSchweif als Staubwedel und fegt seinen Bau,\nbis alles picobello ist."
        es:
          x: "Se saludan entre sí frotándose con la cola y\nlimpiándose a conciencia."
          y: "Le encanta la limpieza. Usa su cola a modo de escoba\ny se pasa el día barre que te barre."
        ko:
          x: "서로의 꼬리로 상대를\n철저히 깨끗하게 만드는 것이\n치라미끼리의 인사다."
          y: "깨끗함을 좋아하는 포켓몬이다.\n꼬리를 빗자루 대신 써서 항상\n거처의 먼지를 쓸어낸다."
