        - sniper
      hidden_ability: pickpocket
      descriptions:
        jp_kana:
          x: "２ひきの　カメテテが　ひとつの\nいわで　くらす。ケンカすると\nどちらかが　ほかの　いわに　うつる。"
          y: "からだを　のばす　はんどうで　いわを\nもちあげて　あるく。なみうちぎわで\nながされてきた　かいそうを　たべる。"
        jp_kanji:
          x: "２匹の　カメテテが　ひとつの　岩で\n暮らす。ケンカすると　どちらかが\n他の　岩に　移る。"
          y: "体を　伸ばす　反動で　岩を\n持ち上げて　歩く。波打ち際で\n流されてきた　海藻を　食べる。"
        en:
          x: "Two Binacle live together on one rock.\nWhen they fight, one of them will move\nto a different rock."
          y: "They stretch and then contract, yanking their\nrocks along with them in bold hops. They eat\nseaweed that washes up on the shoreline."
        fr:
          x: "Chaque rocher abrite deux Opermine.\nS’ils se disputent, l’un d’entre eux part à la recherche\nd’un nouveau logis."
          y: "Ils prennent de l’élan avec tout leur corps et\nsoulèvent ainsi leur pierre pour se déplacer.\nIls mangent les algues échouées sur le rivage."
        it:
          x: "I Binacle vivono su una roccia. Quando litigano, uno\ndei due finisce per spostarsi su una pietra diversa."
          y: "Si muovono allungando il corpo a turno, in modo da\nsollevare la pietra. Si nutrono di alghe portate a riva\ndalle onde."
        de:
          x: "Bithora bewohnen jeweils zu zweit einen Felsen.\nEntzweien sie sich im Streit, sucht sich eines\nder beiden einen neuen Felsen als Unterkunft."
          y: "Sie bewegen sich fort, indem sie durch Strecken beider\nExtremitäten ihren Felsen anheben. Sie ernähren\nsich von Seetang, der an die Küste gespült wurde."
        es:
          x: "Dos Binacle conviven en la misma roca, pero cuando\nse produce un altercado entre ambos, uno de ellos se\nmuda a otra."
          y: "El impulso que cogen al erguirse les permite levantar\nsu roca y caminar. Se alimentan de las algas que la\nmarea arrastra hasta la orilla."
        ko:
          x: "2마리의 거북손손이 하나의\n바위에서 산다. 서로 싸우면\n한쪽이 다른 바위로 옮겨 간다."
          y: "몸을 늘린 반동으로 바위를\n들어 올리며 걷는다. 물가로\n흘러들어온 해조를 먹는다."
barbaracle:
  species_id: 689
  names:
    jp_kana: ガメノデス
    jp_kanji: ガメノデス
