        - rivalry
        - mold_breaker
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          x: "おおいわを　くだく　キバを　もつ。\nなわばりを　めぐる　オノンドたちの\nあらそいは　ひじょうに　はげしい。"
          y: "キバは　にどと　はえかわらないので\nたたかいおわると　かわらの　いわを\nつかって　たんねんに　みがきあげる。"
        jp_kanji:
          x: "大岩を　砕く　キバを　持つ。\n縄張りを　巡る　オノンドたちの\n争いは　非常に　激しい。"
          y: "キバは　二度と　生え変わらないので\n戦い終わると　川原の　岩を\n使って　丹念に　磨きあげる。"
        en:
          x: "Their tusks can shatter rocks. Territory battles\nbetween Fraxure can be intensely violent."
          y: "A broken tusk will not grow back, so it diligently\nsharpens its tusks on river rocks after the end of\na battle."
        fr:
          x: "Leurs crocs peuvent découper des rochers.\nLeurs querelles de territoire sont extrêmement\nviolentes."
          y: "Comme ses crocs brisés ne repoussent pas, il les\naiguise avec soin après le combat sur les pierres\ndes rivières."
        it:
          x: "Ha zanne in grado di frantumare rocce. Le lotte per\nil territorio tra i Fraxure sono furibonde."
          y: "Le sue zanne non ricrescono più, per cui finita una\nlotta se ne prende cura e le affila diligentemente\ncon pietre di fiume."
        de:
          x: "Mit seinen Fängen kriegt es sogar Felsen klein.\nGegen Artgenossen, die sein Revier passieren,\ngeht es besonders hart vor."
          y: "Da seine Hauer nicht mehr nachwachsen, wetzt es sie\nnach einem Kampf behutsam an den Felsen eines\nFlussbettes."
        es:
          x: "Sus colmillos pueden hacer añicos rocas inmensas. Las\nluchas territoriales de los Fraxure son encarnizadas."
          y: "Sus colmillos no vuelven a crecer, por lo que, al\ntérmino de cada combate, los afila cuidadosamente\ncon cantos de río."
        ko:
          x: "큰 바위를 부수는 이빨을 가지고 있다.\n액슨도들의 영역 싸움은\n매우 격렬하다."
          y: "이빨은 다시는 나지 않기 때문에\n싸움이 끝나면 강가에 있는 바위를\n사용해서 정성껏 손질한다."
haxorus:
