      descriptions:
        jp_kana:
          x: "みずくさに　そっくりな　ポケモン。\nおよげない　ポケモンを　はっぱに\nのせて　むこうぎしまで　はこぶ。"
          y: "きれいな　みずを　さがして　あるく。\nながい　じかん　みずを　のまないと\nあたまの　はっぱが　かれてしまう。"
        jp_kanji:
          x: "水草に　そっくりな　ポケモン。\n泳げない　ポケモンを　葉っぱに\n乗せて　向こう岸まで　運ぶ。"
          y: "きれいな　水を　探して　歩く。\n長い　時間　水を　飲まないと\n頭の　葉っぱが　枯れてしまう。"
        en:
          x: "It looks like an aquatic plant and serves as a ferry\nto Pokémon that can’t swim."
          y: "It searches about for clean water. If it does not\ndrink water for too long, the leaf on its head wilts."
        fr:
          x: "Il ressemble à une plante aquatique et fait la navette\npour les Pokémon qui ne savent pas nager."
          y: "Nénupiot recherche toujours les coins où coule\nde l’eau pure. S’il reste longtemps sans boire,\nla feuille sur sa tête commence à faner."
        it:
          x: "Sembra una pianta acquatica e viene usato come\ntraghetto dai Pokémon che non sanno nuotare."
          y: "Vaga alla ricerca di acqua pulita. Se non beve per\nparecchio tempo, la foglia che ha sul capo appassisce."
        de:
          x: "Es sieht aus wie eine Wasserpflanze. Es dient den\nPokémon, die nicht schwimmen können, als Fähre."
          y: "Es sucht nach reinem Wasser. Wenn es für längere Zeit\nkein Wasser trinkt, verwelkt das Blatt auf seinem Kopf."
        es:
          x: "Parece una planta acuática. Hace de ferry para los\nPokémon que no saben nadar."
          y: "Va buscando agua potable para beber. Si no la\nencuentra pasado un tiempo, se le marchita la hoja\nde la cabeza."
        ko:
          x: "수초를 똑 닮은 포켓몬이다.\n헤엄을 못 치는 포켓몬을 잎사귀에\n태워 건너편 물가까지 운반한다."
          y: "깨끗한 물을 찾아 걷는다.\n오랫동안 물을 마시지 않으면\n머리의 잎이 시들어 버린다."
