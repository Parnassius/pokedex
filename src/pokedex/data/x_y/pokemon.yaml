          y: "からだの　おおきな　ポケモンたちと\nちからくらべをすることが　だいすき。\nはりてで　トラックを　ふっとばす。"
        jp_kanji:
          x: "両足で　地面を　踏み鳴らして\nパワーを　ためる。張り手　１発で\n１０トン　トラックを　吹っ飛ばす。"
          y: "体の　大きな　ポケモンたちと\n力比べをすることが　大好き。\n張り手で　トラックを　ぶっ飛ばす。"
        en:
          x: "It stomps on the ground to build power. It can send\na 10-ton truck flying with a straight-arm punch."
          y: "It loves to match power with big-bodied Pokémon.\nIt can knock a truck flying with its arm thrusts."
        fr:
          x: "Il piétine le sol violemment pour concentrer son\nénergie. Il peut envoyer en l’air un camion de 10 t\nd’un seul coup de poing."
          y: "Il aime mesurer sa force à celle des plus grands\nPokémon. Ses coups de paume peuvent projeter\nun camion."
        it:
          x: "Pesta i piedi sul terreno per accumulare energia.\nCon uno dei suoi schiaffi può far prendere il volo\na un camion di 10 t."
          y: "Ama confrontarsi con Pokémon grossi. Con uno dei\nsuoi schiaffi, può far prendere il volo a un camion."
        de:
          x: "Es stampft auf den Boden, um Energie zu\ngenerieren. Ein einziger Armschlag reicht aus, um\neinen 10 t schweren LKW durch die Luft zu wirbeln."
          y: "Es liebt das Kräftemessen mit großen Pokémon. Mit\nseinem Armwurf kann es LKW durch die Luft werfen."
        es:
          x: "Para aumentar su fuerza, da un pisotón en el suelo.\nPuede lanzar un camión de 10 toneladas por los aires\nde un puñetazo."
          y: "Le encanta enfrentarse a Pokémon grandes y probar\nsu fuerza. Sus brazos pueden derribar un camión."
        ko:
          x: "두 다리로 땅을 힘껏 밟아서\n파워를 모은다. 손바닥 치기 한 방으로\n10톤 트럭을 날려버린다."
          y: "몸집이 큰 포켓몬들과 힘 겨루는\n것을 매우 좋아한다. 손바닥 치기로\n트럭을 멀리 날려 버린다."
