          y: "たべものが　へる　ふゆのまえに\nあちこちに　たべものを　かくす\nしゅうせいを　もっている。"
        jp_kanji:
          x: "ミツを見つけると　三日月模様が\n輝く。甘いミツが　染みこんだ\n手のひらを　いつも　なめている。"
          y: "食べ物が　減る　冬の前に\nあちこちに　食べ物を　隠す\n習性を　持っている。"
