          y: "ジェットせんとうきに　まけない\nスピードで　そらを　とぶ。\nねらった　えものは　にがさない。"
        jp_kanji:
          x: "体を　折り畳み　翼を　伸ばすと\nまるで　ジェット機。\n音速で　飛ぶことが　できる。"
          y: "ジェット戦闘機に　負けない\nスピードで　空を　飛ぶ。\nねらった　獲物は　逃がさない。"
        en:
          x: "When it folds up its body and extends its wings,\nit looks like a jet plane. It flies at sonic speed."
          y: "It flies at speeds equal to a jet fighter plane.\nIt never allows its prey to escape."
        fr:
          x: "Quand il se recroqueville et étend ses ailes, on dirait\nun chasseur. Sa vitesse est supersonique."
          y: "Il vole à la vitesse d’un avion à réaction et ne lâche\njamais sa proie."
        it:
          x: "Quando si piega e distende le ali, sembra un jet.\nVola a una velocità supersonica."
          y: "Vola alla velocità di un aereo da combattimento a\nreazione. Non lascia mai fuggire la preda."
        de:
          x: "Spannt es seinen Körper und seine Flügel, sieht es\naus wie ein Jet. Es fliegt mit Schallgeschwindigkeit."
          y: "Es fliegt mit der Geschwindigkeit eines Kampfjets.\nEs lässt nicht zu, dass ihm seine Beute entkommt."
        es:
          x: "Cuando despliega su cuerpo y sus alas, parece un\navión a reacción. Vuela a velocidad sónica."
          y: "Vuela tan rápido como un avión a reacción. Nunca se\nle escapa una presa."
        ko:
          x: "몸을 접고 날개를\n펼치면 마치 제트기 같다.\n음속으로 날 수 있다."
          y: "제트기와 맞먹는\n스피드로 하늘을 난다.\n노린 먹이는 놓치지 않는다."
