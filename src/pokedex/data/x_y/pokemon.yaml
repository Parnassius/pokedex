          y: "It lowers its body heat to freeze its fur. The hairs\nthen become like needles it can fire."
        fr:
          x: "Il ajuste la température de son corps pour créer\nun vent de glace en gelant l’air qui l’entoure."
          y: "Il abaisse la température de son corps pour changer\nses poils en aiguilles de glace qu’il projette sur\nl’ennemi."
        it:
          x: "Modificando la temperatura del corpo, congela\nl’aria e crea folate di cristalli di ghiaccio."
          y: "Abbassa la temperatura del corpo per ghiacciare i\npropri peli e lanciarli come micidiali aghi sottilissimi."
        de:
          x: "Erzeugt ein Diamantstaubgestöber durch\ndas Einfrieren der Luft um sich herum."
          y: "Wenn es seine Körpertemperatur senkt,\nerstarren die Haare seines Fells zu Eis\nund dienen ihm als nadelartige Geschosse."
        es:
          x: "Controla su temperatura corporal para congelar el\nambiente y causar ráfagas de nieve en polvo."
          y: "Al reducir su temperatura corporal, su pelaje se\ncongela y se convierte en afilados pinchos que puede\ndisparar."
        ko:
          x: "체온을 컨트롤하는 것으로\n주위의 공기를 얼려서\n다이아몬드 더스트를 날린다."
          y: "체온을 내리는 것으로 전신의\n털을 얼려서 날카롭고\n뾰족한 바늘처럼 만들어 날린다."
gliscor:
