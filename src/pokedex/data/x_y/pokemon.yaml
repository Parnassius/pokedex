          x: "むかしから　おおくの　ひとを\nとりこにした　うつくしい　ポケモン。\nとぶように　かろやかに　はしる。"
          y: "どうどうとした　なきごえは\nいげんに　あふれ　きいたものは\nおもわず　ひれふしてしまう。"
        jp_kanji:
          x: "昔から　多くの　人を\n虜にした　美しい　ポケモン。\n飛ぶように　軽やかに　走る。"
          y: "堂々とした　鳴き声は\n威厳に　あふれ　聞いたものは\n思わず　ひれ伏してしまう。"
        en:
          x: "A Pokémon that has long been admired for its\nbeauty. It runs agilely as if on wings."
          y: "Its magnificent bark conveys a sense of majesty.\nAnyone hearing it can’t help but grovel before it."
        fr:
          x: "Un Pokémon très recherché pour sa grâce légendaire.\nIl court avec tellement d’agilité qu’on dirait qu’il vole."
          y: "Son aboiement est tout simplement majestueux.\nOn ne peut que ramper à ses pieds après l’avoir\nentendu."
        it:
          x: "Da sempre ammirato per la sua bellezza, corre\nveloce come se avesse le ali."
          y: "Il suo incredibile ruggito ispira un senso di maestosità.\nChiunque lo senta non può far a meno di prostrarsi."
        de:
          x: "Dieses Pokémon trägt ein wunderschönes Fell.\nEs ist obendrein schnell und sehr wendig."
          y: "Sein bezauberndes Bellen klingt majestätisch. Jeder,\nder es vernimmt, muss sich automatisch verbeugen."
        es:
          x: "Un Pokémon muy admirado desde la antigüedad por\nsu belleza. Corre ágilmente como si tuviera alas."
          y: "Su magnífico ladrido transmite majestuosidad. Todo\nel que lo escuche no podrá evitar adularlo."
        ko:
          x: "옛날부터 많은 사람의\n마음을 사로잡은 아름다운 포켓몬이다.\n날듯이 경쾌하게 달린다."
          y: "위풍당당한 울음소리는\n위엄이 넘쳐 소리를 들은 상대는\n무의식중에 몸을 움츠리게 된다."
