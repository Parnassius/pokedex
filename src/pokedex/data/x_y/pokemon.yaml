          y: "くうきちゅうの　すいぶんを\nいっしゅんで　こおらせる　ちからで\nえものを　れいとうして　しまう。"
        jp_kanji:
          x: "空気中の　水分を　凍らせ\n氷の　装甲で　体を　包みこみ\n身を　守っている。"
          y: "空気中の　水分を\n一瞬で　凍らせる　力で\n獲物を　冷凍して　しまう。"
        en:
          x: "To protect itself, it clad its body in an armor of ice,\nmade by freezing moisture in the air."
          y: "It can instantly freeze moisture in the atmosphere.\nIt uses this power to freeze its foes."
        fr:
          x: "Il gèle l’humidité de l’air pour former une armure\nde glace protectrice autour de son corps."
          y: "Il a le pouvoir de geler l’humidité ambiante en un\ninstant et peut ainsi pétrifier ses proies."
        it:
          x: "Per difendersi, riveste il suo corpo con un’armatura\ndi ghiaccio, fatta congelando l’umidità dell’aria."
          y: "Capace di congelare istantaneamente l’umidità\ndell’atmosfera, finisce per surgelare la preda."
        de:
          x: "Um sich zu schützen, umgibt es seinen Körper\nmit einer Rüstung aus Eis."
          y: "Es kann Feuchtigkeit in der Atmosphäre gefrieren.\nAuf diese Weise macht es auch seine Beute haltbar."
        es:
          x: "Se protege con una armadura de hielo creada por\ncongelación de la humedad del aire."
          y: "Congela a sus presas enfriando en un momento la\nhumedad contenida en el aire que lo rodea."
        ko:
          x: "공기 중의 수분을 얼려서\n얼음 갑옷으로 몸을\n둘러싸 몸을 보호한다."
          y: "공기 중의 수분을\n단숨에 얼게 하는 힘으로\n먹이를 냉동시켜 버린다."
spheal:
