          y: "わくせいかいはつようの　プログラムが\nインストールされている。しんくうの\nうちゅうでも　かつどうできるのだ。"
        jp_kanji:
          x: "さらに　研究が　進められ\n能力が　高まった。ときどき\nプログラムにない　仕草を　見せる。"
          y: "惑星開発用の　プログラムが\nインストールされている。\n真空の　宇宙でも　活動できるのだ。"
        en:
          x: "Further research enhanced its abilities. Sometimes,\nit may exhibit motions that were not programmed."
          y: "With planetary development software installed,\nit became capable of working in space."
        fr:
          x: "Des recherches poussées ont amélioré ses capacités.\nIl a appris de nouveaux mouvements."
          y: "On lui a installé un logiciel de terraformation pour\nlui permettre de travailler dans l’espace."
        it:
          x: "Ricerche avanzate hanno potenziato le sue capacità.\nOra può fare movimenti che non erano programmati."
          y: "Gli è stato installato un programma di sviluppo\nplanetario che lo rende capace di lavorare nello\nspazio."
        de:
          x: "Seine Fähigkeiten wurden verbessert. Es zeigt\nmanchmal sogar Handlungen, die nicht\neinprogrammiert sind."
          y: "Interstellare Software wurde installiert, sodass\ndieses Pokémon sich auch im All bewegen kann."
        es:
          x: "La investigación mejoró sus habilidades. A veces,\npuede actuar de forma no programada."
          y: "Tiene instalado un avanzado software astrofísico que\nle permite trabajar en el espacio."
        ko:
          x: "더욱 연구가 진행되어\n능력이 올라갔다. 가끔\n프로그램에 없는 행동을 보인다."
          y: "행성 개발용 프로그램이\n인스톨되어 있다. 우주와 같은\n진공 공간에서도 활동할 수 있다."
