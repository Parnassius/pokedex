      descriptions:
        jp_kana:
          x: "やさしい　せいかくだが　なわばりを\nあらす　ものには　ようしゃしない。\nてつを　きる　キバで　いどみかかる。"
          y: "てっこつを　きりつけても　はこぼれ\nしない　がんじょうな　キバを　もつ。\nかたい　よろいに　おおわれている。"
        jp_kanji:
          x: "優しい　性格だが　縄張りを　荒らす\n者には　容赦しない。\n鉄を　切る　キバで　挑みかかる。"
          y: "鉄骨を　切りつけても　刃こぼれ\nしない　頑丈な　キバを　持つ。\n硬い　よろいに　覆われている。"
        en:
          x: "They are kind but can be relentless when defending\nterritory. They challenge foes with tusks that can\ncut steel."
          y: "Their sturdy tusks will stay sharp even if used to cut\nsteel beams. These Pokémon are covered in\nhard armor."
        fr:
          x: "Il est doux, mais ne pardonne pas à ceux qui viennent\nsaccager son territoire. Ses crocs peuvent découper\nde l’acier."
          y: "Ses crocs sont tellement puissants qu’ils peuvent\ndécouper l’acier sans s’émousser. Son armure est\ntrès solide."
        it:
          x: "Ha un carattere gentile, ma non perdona chi devasta\nil suo territorio. Le sue zanne possono tagliare\nl’acciaio."
          y: "Ha forti zanne che non si spezzano neanche quando\ntrancia travi d’acciaio. È protetto da una resistente\narmatura."
        de:
          x: "Hat eine eher sanfte Natur, doch bei Eindringlingen\nkennt es keine Gnade. Seine Stoßzähne\ndurchbohren sogar Eisen."
          y: "Wenn es mit seinen robusten Hauern Stahl durchbohrt,\nbleiben diese unversehrt. Es ist von einem festen\nPanzer umgeben."
        es:
          x: "Es gentil, pero no perdona a todo el que ose invadir\nsu territorio. Su mayor baza son sus colmillos, que\ncortan el acero."
          y: "Sus colmillos no se quiebran ni aunque los hinque\nen un armazón de acero. Está protegido por una\nresistente armadura."
        ko:
          x: "상냥한 성격이지만 영역을\n어지럽히는 자는 용서하지 않는다.\n철을 자르는 이빨로 덤벼든다."
          y: "철골을 두 동강 내도 상처 하나\n안 나는 튼튼한 이빨을 가지고 있다.\n단단한 갑옷에 덮여 있다."
cubchoo:
