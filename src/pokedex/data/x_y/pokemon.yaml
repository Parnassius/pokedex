        jp_kanji:
          x: "メレシーの　突然変異。\nピンク色に　輝く　体は\n世界一　美しいと　言われる。"
          y: "両手の　すきまで　空気中の　炭素を\n圧縮して　たくさんの　ダイヤを\n一瞬で　生み出す。"
        en:
          x: "A sudden transformation of Carbink,\nits pink, glimmering body is said to be\nthe loveliest sight in the whole world."
          y: "It can instantly create many diamonds\nby compressing the carbon in the air\nbetween its hands."
        fr:
          x: "Ce Pokémon est une mutation spontanée de Strassie.\nSon corps rose et luisant est d’une beauté\nincomparable."
          y: "Il peut créer une multitude de diamants en un instant\nen serrant ses mains, simplement en compressant\nles molécules de carbone contenues dans l’air."
        it:
          x: "Questo Pokémon è una mutazione inaspettata di\nCarbink. Alcuni ritengono che il suo corpo rosa\nsplendente sia la cosa più bella del mondo."
          y: "È in grado di creare una grande quantità di diamanti\nin un istante comprimendo tra le mani il carbonio\npresente nell’aria."
        de:
          x: "Dieses Pokémon ist eine Mutation von Rocara.\nSein rosafarben schimmernder Körper gilt als\nschönster Anblick überhaupt."
          y: "Es kann im Nu viele Diamanten erzeugen, indem es\nluftgebundene Kohlenstoffpartikel mit seinen Händen\nkomprimiert."
        es:
          x: "Es una transformación súbita de Carbink. Se dice que\nsu cuerpo, que irradia destellos rosados, es lo más\nbonito de este mundo."
          y: "Puede crear una gran cantidad de diamantes en un\ninstante comprimiendo con las manos el carbono que\nflota en el aire."
        ko:
          x: "멜리시의 돌연변이다.\n분홍빛으로 빛나는 몸은\n세계에서 가장 아름답다고 일컬어진다."
          y: "양손의 틈으로 공기 중의\n탄소를 압축하여 많은\n다이아를 한순간에 만들어 낸다."
hoopa:
