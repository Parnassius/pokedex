        jp_kana:
          x: "なかまと　しっぽの　さきを　あわせて\nひばなを　とばす　あそびをする。\nどきょうだめしを　しているらしい。"
          y: "まだまだ　でんきを　ためるのがへた。\nおどろいたり　わらったりすると\nすぐに　ほうでん　してしまう。"
        jp_kanji:
          x: "仲間と　尻尾の　先を　あわせて\n火花を　飛ばす　遊びをする。\n度胸試しを　しているらしい。"
          y: "まだまだ　電気を　ためるのが下手。\n驚いたり　笑ったりすると\nすぐに　放電　してしまう。"
        en:
          x: "It plays with others by touching tails and setting off\nsparks. This appears to be a test of courage."
          y: "It is not yet skilled at storing electricity.\nIt may send out a jolt if amused or startled."
        fr:
          x: "Il prouve son courage en touchant la queue électrifiée\nde ses pairs."
          y: "Il ne sait pas encore stocker l’électricité. Il envoie\ndes décharges par jeu ou par peur."
        it:
          x: "Quando le code dei Pichu si toccano, fanno\nscintille. Pare che si tratti di una prova di coraggio."
          y: "Non è ancora bravo a immagazzinare elettricità. Se\nsi emoziona oppure è divertito ne perde un po’."
        de:
          x: "Sie spielen miteinander, indem sie ihre Schweifspitzen\naneinanderhalten und Funken fliegen lassen."
          y: "Es kann noch nicht mit Elektrizität umgehen.\nEs wirft Blitze, wenn es sich freut oder erstaunt ist."
        es:
          x: "Cuando juegan, se tocan las colas y emiten chispas.\nAl parecer, es una prueba de valor."
          y: "Todavía no domina el almacenamiento de electricidad\ny descargará un rayo si se divierte o asusta."
        ko:
          x: "동료와 꼬리의 끝을 맞추면서\n불티를 튀기는 놀이를 한다.\n담력 시험을 하고 있는 듯하다."
          y: "아직 전기를 모으는 게 서툴다.\n놀라거나 웃으면\n바로 방전돼 버린다."
cleffa:
