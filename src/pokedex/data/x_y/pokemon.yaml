          x: "コンクリートも　こわせるほどの\nつよい　ちょうおんぱを　だすとき\nしっぽが　はげしく　ふるえる。"
          y: "オスが　メスに　きゅうあいするとき\nはっする　ちょうおんぱを　あびると\nとても　たのしい　きぶんになる。"
        jp_kanji:
          x: "コンクリートも　壊せるほどの\n強い　超音波を　出すとき\n尻尾が　激しく　震える。"
          y: "オスが　メスに　求愛するとき\n発する　超音波を　浴びると\nとても　楽しい　気分になる。"
        en:
          x: "It shakes its tail vigorously when it emits ultrasonic\nwaves strong enough to reduce concrete to rubble."
          y: "Anyone who comes into contact with the ultrasonic\nwaves emitted by a courting male experiences a\npositive mood shift."
        fr:
          x: "Sa queue s’agite frénétiquement quand il émet ses\nultrasons assez puissants pour pulvériser du béton."
          y: "Le mâle courtise la femelle à l’aide d’ultrasons.\nLes écouter met de très bonne humeur."
        it:
          x: "Quando emette delle onde ultrasoniche così forti da\nrompere il cemento, la coda gli oscilla con forza."
          y: "È molto piacevole essere investiti dalle onde\nultrasoniche che il maschio emette quando corteggia\nla femmina."
        de:
          x: "Beim Abfeuern seiner Ultraschallwellen, mit denen\nes selbst Beton zertrümmern kann, wedelt es eifrig\nmit dem Schweif."
          y: "Wer den Ultraschallwellen eines Männchens in der Balz\nausgesetzt wird, verfällt in eine euphorische Stimmung."
        es:
          x: "Cuando emite ondas ultrasónicas, que incluso pueden\nreventar el cemento, agita su cola con vehemencia."
          y: "Todos rebosan de alborozo cuando perciben las ondas\nultrasónicas emitidas por el macho para cortejar a la\nhembra."
        ko:
          x: "콘크리트도 부술 정도로\n강한 초음파를 낼 때\n꼬리가 심하게 흔들린다."
          y: "수컷이 암컷에게 구애할 때\n발사하는 초음파에 노출되면\n기분이 매우 즐거워진다."
drilbur:
