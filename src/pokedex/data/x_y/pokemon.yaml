          x: "くらい　もりや　ほらあなで　くらす。\nはなの　あなから　ちょうおんぱを\nだして　あたりの　ようすを　さぐる。"
          y: "コロモリの　はなを　おしつけた\nところに　ハートがたの　あとがつくと\nいいことが　おこると　いわれている。"
        jp_kanji:
          x: "暗い　森や　洞穴で　暮らす。\n鼻の　穴から　超音波を　出して\nあたりの　様子を　探る。"
          y: "コロモリの　鼻を　押しつけた\nところに　ハート形の　跡がつくと\nいいことが　起こると　言われている。"
        en:
          x: "Its habitat is dark forests and caves. It emits\nultrasonic waves from its nose to learn about\nits surroundings."
          y: "The heart-shaped mark left on a body after a\nWoobat has been attached to it is said to bring\ngood fortune."
        fr:
          x: "Il vit dans les forêts sombres et les grottes. Il émet\ndes ultrasons par le nez pour se diriger."
          y: "Son nez est comme une ventouse. Il laisse une\nmarque en forme de cœur qui, paraît-il, porte bonheur."
        it:
          x: "Vive nelle foreste buie o nelle caverne. Sonda\nl’ambiente circostante emettendo degli ultrasuoni\ndalle narici."
          y: "Quando preme il naso contro il corpo di qualcuno\nlascia un segno a forma di cuore che, dicono, porta\nfortuna."
        de:
          x: "Wohnt in dunklen Wäldern und Höhlen. Es sendet\nUltraschallwellen mit seiner Nase aus, um die\nGegend abzutasten."
          y: "Es verheißt Glück, wenn sich ein Fleknoil an einem\nMenschen festsaugt und auf ihm einen herzförmigen\nFleck hinterlässt."
        es:
          x: "Vive en bosques oscuros y cavernas. Emite\nultrasonidos por la nariz para saber todo lo que\npasa a su alrededor."
          y: "Se dice que la marca con forma de corazón que deja\nun Woobat al incrustar su nariz trae buena suerte."
        ko:
          x: "어두운 숲이나 동굴에서 산다.\n콧구멍에서 초음파를 쏘아\n주변의 모습을 살핀다."
          y: "또르박쥐의 코가 닿은 곳에\n하트 모양의 자국이 나면\n좋은 일이 일어난다고 전해진다."
swoobat:
