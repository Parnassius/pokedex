          y: "せんとうちゅう　せなかを　むけたら\nようちゅうい。せなかの　ほのおで\nこうげきしてくる　まえぶれだ。"
        jp_kanji:
          x: "戦いの前　背中を　向けて\n自分の　炎が　どれくらい\nすごいかを　相手に　見せつける。"
          y: "戦闘中　背中を　向けたら　要注意。\n背中の　炎で\n攻撃してくる　前触れだ。"
        en:
          x: "Before battle, it turns its back on its opponent to\ndemonstrate how ferociously its fire blazes."
          y: "Be careful if it turns its back during battle. It means\nthat it will attack with the fire on its back."
        fr:
          x: "Avant chaque combat, il tourne le dos et montre\nla puissance de ses flammes."
          y: "Attention ! Quand il tourne le dos dans un combat,\nc’est qu’il va attaquer avec ses flammes dorsales."
        it:
          x: "Prima di lottare mostra il dorso al nemico per\nimpressionarlo con la potenza delle sue fiamme."
          y: "Nella lotta, se s’incurva vuol dire che sta per\nattaccare con le fiamme che ha sul dorso."
        de:
          x: "Vor dem Kampf dreht es dem Feind den Rücken zu,\num ihm zu zeigen, wie Furcht erregend sein Feuer\nlodert."
          y: "Dreht es dir im Kampf den Rücken zu, wird es dich\nmit den Flammen seines Rückens angreifen."
        es:
          x: "Antes de empezar a luchar, se gira ante su rival para\nalardear del alcance y la fuerza de sus llamas."
          y: "Ten cuidado si te da la espalda en combate.\nSignifica que te va a atacar con su lomo de fuego."
        ko:
          x: "싸우기 전에 등을 보이며\n자신의 불꽃이 얼마나\n대단한지 상대에게 일부러 보여준다."
          y: "배틀 중에 등을 보이면\n주의가 필요하다. 등의 불꽃으로\n공격해올 것이라는 뜻이다."
