          y: "ムクホークに　なると　むれから\nはなれて　１ぴきで　いきていく。\nきょうじんな　つばさを　もっている。"
        jp_kanji:
          x: "翼と　脚の　筋肉が　強く\n小さな　ポケモンを　つかんだまま\nらくらくと　飛ぶことが　できる。"
          y: "ムクホークに　なると　群れから\n離れて　１匹で　生きていく。\n強靭な　翼を　持っている。"
        en:
          x: "The muscles in its wings and legs are strong.\nIt can easily fly while gripping a small Pokémon."
          y: "When Staravia evolve into Staraptor, they leave the\nflock to live alone. They have sturdy wings."
        fr:
          x: "Ses ailes et ses pattes ont des muscles développés.\nIl peut voler en agrippant un petit Pokémon."
          y: "Lorsque Étourvol évolue en Étouraptor, il quitte\nson groupe pour vivre seul. Ses ailes sont très\ndéveloppées."
        it:
          x: "I muscoli di ali e zampe sono molto sviluppati. Vola\nsenza fatica anche portando un piccolo Pokémon."
          y: "Per diventare Staraptor, lascia il gruppo e affronta\nla vita da solo. Possiede ali robustissime."
        de:
          x: "Die Muskeln in seinen Flügeln und Beinen sind stark.\nEs kann im Flug sogar ein anderes Pokémon tragen."
          y: "Wird Staravia zu Staraptor, verlässt es die Gruppe\nund lebt allein. Seine Spannweite ist gigantisch."
        es:
          x: "Sus alas y sus patas son muy fuertes. Puede llevarse\nvolando Pokémon pequeños."
          y: "Al evolucionar a Staraptor deja su bandada y pasa a\nvivir en soledad. Sus alas son inmensas."
        ko:
          x: "날개와 발의 근육이 강해\n작은 포켓몬을 붙잡은 채로\n너끈히 날 수 있다."
          y: "찌르호크가 되면 무리에서\n떨어져 혼자서 살아간다.\n강인한 날개를 가지고 있다."
