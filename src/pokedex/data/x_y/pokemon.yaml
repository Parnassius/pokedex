          x: "よぞらに　ほしが　またたくとき\nかがやく　こなを　ふりまきながら\nひらひらと　とんでいく。"
          y: "せなかの　ほしもようは\nよぞらの　ほしのかずに　はんのうして\nおおきくなったり　ちいさくなる。"
        jp_kanji:
          x: "夜空に　星が　瞬くとき\n輝く　粉を　振りまきながら\nひらひらと　飛んでいく。"
          y: "背中の　星模様は\n夜空の　星の数に　反応して\n大きくなったり　小さくなる。"
        en:
          x: "When the stars flicker in the night sky, it flutters\nabout, scattering a glowing powder."
          y: "The spot patterns on its back grow larger or smaller\ndepending on the number of stars in the night sky."
        fr:
          x: "Quand les étoiles brillent dans le ciel, il volette\npartout en semant derrière lui une poudre brillante."
          y: "Les points sur son dos deviennent plus grands ou\nplus petits selon le nombre d’étoiles dans le ciel."
        it:
          x: "Si aggira nella notte stellata lasciando cadere una\nscia di polvere incandescente."
          y: "I puntini sulla schiena sono più grandi o più piccoli\nsecondo il numero di stelle nel cielo."
        de:
          x: "Leuchten die Sterne am Nachthimmel,\nschwirrt es umher und verstreut einen\nstrahlenden, leuchtenden Puder."
          y: "Die Größe des gepunkteten Musters hängt direkt mit\nder Anzahl der Sterne am Firmament zusammen."
        es:
          x: "Cuando parpadean las estrellas en el cielo nocturno,\nse mece desprendiendo un polvo brillante."
          y: "Los puntos de su caparazón crecen y decrecen\ndependiendo de las estrellas del cielo nocturno."
        ko:
          x: "밤하늘의 별이 깜빡일 때\n반짝이는 가루를 흩뿌리며\n훨훨 날아간다."
          y: "등의 별 모양은\n밤하늘의 별의 숫자에 반응하여\n커졌다가 작아졌다가 한다."
