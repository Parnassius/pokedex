chespin:
  species_id: 650
  names:
    jp_kana: ハリマロン
    jp_kanji: ハリマロン
    en: Chespin
    fr: Marisson
    it: Chespin
    de: Igamaro
    es: Chespin
    ko: 도치마론
  forms:
    chespin:
      form_id: 0
      base_stats:
        hp: 56
        attack: 61
        defense: 65
        special_attack: 48
        special_defense: 45
        speed: 38
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - overgrow
      hidden_ability: bulletproof
      descriptions:
        jp_kana:
          x: "ふだん　やわらかい　あたまの　トゲは\nちからを　こめると　するどく　とがり\nいわをも　つらぬくほど　かたくなる。"
          y: "あたまと　せなかを　かたい　カラで\nおおわれているため　トラックが\nぶつかってきても　へっちゃらだ。"
        jp_kanji:
          x: "普段　やわらかい　頭の　トゲは\n力を　こめると　鋭く　とがり\n岩をも　つらぬくほど　硬くなる。"
          y: "頭と　背中を　硬い　樹木の　殻で\n覆われているため　トラックが\nぶつかってきても　平気なのだ。"
        en:
          x: "The quills on its head are usually soft.\nWhen it flexes them, the points become\nso hard and sharp that they can pierce rock."
          y: "Such a thick shell of wood covers its head and back\nthat even a direct hit from a truck wouldn’t faze it."
        fr:
          x: "Lorsqu’il rassemble ses forces, les piquants souples\nqui recouvrent sa tête deviennent si durs et acérés\nqu’ils pourraient transpercer un rocher."
          y: "Sa tête et son dos sont recouverts d’une carapace\ntellement dure que même une collision avec\nun camion ne lui ferait rien."
        it:
          x: "Può indurire le punte che ha sulla testa, di solito\nmorbide, per farle diventare talmente affilate e\nappuntite da penetrare nella roccia."
          y: "Ha schiena e testa coperte da un guscio talmente\nresistente che non farebbe una piega nemmeno se\nci passasse sopra un tir."
        de:
          x: "Wenn es seine Kraft auf die sonst eher weichen\nStacheln auf seinem Kopf konzentriert, werden\ndiese robust genug, um damit Steine zu zertrümmern."
          y: "Sein Kopf und Rücken werden von einer harten Hülle\nbedeckt, die so robust ist, dass sie selbst einer\nKollision mit einem LKW standhalten würde."
        es:
          x: "Cuando acumula energía, las suaves púas de su\ncabeza se vuelven tan duras y afiladas que hasta\npueden atravesar rocas."
          y: "La robusta coraza que le recubre la cabeza y la\nespalda lo protege de tal manera que podría\nchocar contra un camión y permanecer impasible."
        ko:
          x: "머리의 가시는 평소에는 부드럽지만\n힘을 주면 뾰족하고 날카로워지며\n바위를 뚫어 버릴 정도로 단단해진다."
          y: "머리와 등이 단단한 껍데기로\n덮여 있기 때문에 트럭이\n부딪혀와도 아무렇지 않다."
quilladin:
  species_id: 651
  names:
    jp_kana: ハリボーグ
    jp_kanji: ハリボーグ
    en: Quilladin
    fr: Boguérisse
    it: Quilladin
    de: Igastarnish
    es: Quilladin
    ko: 도치보구
  forms:
    quilladin:
      form_id: 0
      base_stats:
        hp: 61
        attack: 78
        defense: 95
        special_attack: 56
        special_defense: 58
        speed: 57
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - overgrow
      hidden_ability: bulletproof
      descriptions:
        jp_kana:
          x: "からだを　おおう　がんじょうな　カラが\nてきの　こうげきを　はじきかえし\nするどい　トゲで　はんげきする。"
          y: "なかまどうしで　からだを　ぶつけあい\nあしこしを　きたえる。じぶんからは\nたたかわない　やさしい　せいかく。"
        jp_kanji:
          x: "体を　覆う　頑丈な　殻が\n敵の　攻撃を　弾き返し\n鋭い　トゲで　反撃する。"
          y: "仲間同士で　体を　ぶつけ合い\n足腰を　鍛える。\n自分からは　戦わない　優しい　性格。"
        en:
          x: "It relies on its sturdy shell to deflect predators’\nattacks. It counterattacks with its sharp quills."
          y: "They strengthen their lower bodies by\nrunning into one another. They are very\nkind and won’t start fights."
        fr:
          x: "La carapace qui recouvre son corps le protège\ndes attaques adverses, et ses piquants lui permettent\nde contre-attaquer."
          y: "Il renforce ses membres inférieurs en se ruant\nviolemment sur ses congénères. Naturellement\npaisible, il ne provoque jamais un combat."
        it:
          x: "Respinge gli attacchi dei nemici grazie al guscio che\ngli ricopre il corpo e contrattacca con gli aculei affilati."
          y: "Allena la parte inferiore del corpo scontrandosi con i\nsuoi simili. Ha una natura mite e non inizia mai\nuna lotta per primo."
        de:
          x: "Der Panzer, der seinen Körper umgibt, bietet ihm\nSchutz vor Angreifern und straft direkte Angriffe\npostwendend mit spitzen Stacheln ab."
          y: "Sie stärken ihre Beinmuskeln, indem sie sich\ngegenseitig anrempeln. Sie sind sehr freundlich\nund würden niemals einen Streit anfangen."
        es:
          x: "Desvía los ataques de los enemigos con la robusta\ncoraza que cubre su cuerpo y contraataca con sus\ndos afilados cuernos."
          y: "Chocan contra sus congéneres para fortalecer sus\npiernas. Debido a su carácter afable, nunca son los\nque provocan un combate."
        ko:
          x: "몸을 둘러싼 단단한 껍질이\n적의 공격을 튕겨내고\n날카로운 가시로 반격한다."
          y: "동료끼리 몸을 서로 부딪쳐\n하반신을 단련한다. 자신이 먼저\n싸움을 걸지 않는 온순한 성격이다."
chesnaught:
  species_id: 652
  names:
    jp_kana: ブリガロン
    jp_kanji: ブリガロン
    en: Chesnaught
    fr: Blindépique
    it: Chesnaught
    de: Brigaron
    es: Chesnaught
    ko: 브리가론
  forms:
    chesnaught:
      form_id: 0
      base_stats:
        hp: 88
        attack: 107
        defense: 122
        special_attack: 74
        special_defense: 75
        speed: 64
      evs_yield:
        hp: 0
        attack: 0
        defense: 3
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - fighting
      egg_groups:
        - field
      abilities:
        - overgrow
      hidden_ability: bulletproof
      descriptions:
        jp_kana:
          x: "たいあたりで　５０トンの　せんしゃを\nひっくりかえす　パワー。じぶんが\nたてと　なって　なかまを　まもる。"
          y: "かおの　まえで　こぶしを　あわせて\nぼうぎょの　ポーズを　とると\nばくだんの　ちょくげきも　たえる。"
        jp_kanji:
          x: "体当たりで　５０トンの　戦車を\nひっくり返す　パワー。\n自分が　盾となって　仲間を　守る。"
          y: "顔の　前で　こぶしを　合わせて\n防御の　ポーズを　とると\n爆弾の　直撃も　耐える。"
        en:
          x: "Its Tackle is forceful enough to flip a 50-ton tank.\nIt shields its allies from danger with its own body."
          y: "When it takes a defensive posture with its fists\nguarding its face, it could withstand a bomb blast."
        fr:
          x: "Il est si puissant qu’il pourrait renverser un char de\n50 t d’un seul assaut. Il se sert de son corps comme\nd’un bouclier pour protéger ses alliés."
          y: "Il se défend en joignant ses poings devant son visage.\nDans cette posture, il peut même résister à l’onde de\nchoc d’une explosion."
        it:
          x: "Attaccando può rovesciare un carro armato da 50 t.\nProtegge gli alleati facendo loro scudo con il proprio\ncorpo."
          y: "In posizione difensiva, con i pugni in guardia, è in\ngrado di resistere persino a un’esplosione diretta."
        de:
          x: "Es ist so stark, dass es selbst 50 t schwere Panzer\numkippen kann. Es schützt seine Artgenossen,\nindem es sich ihnen als Schild anbietet."
          y: "Wenn es seine Fäuste vors Gesicht hält und so eine\nVerteidigungshaltung einnimmt, kann es selbst eine\nExplosion überstehen."
        es:
          x: "Su fuerza es tal que, de un empellón, puede hacer\nvolcar un tanque de 50 toneladas. Protege a sus\naliados cuando hace de escudo."
          y: "Cuando adopta una postura defensiva juntando\nambos puños delante de la cara, es capaz de\nresistir incluso el impacto directo de una bomba."
        ko:
          x: "몸통박치기로 50톤 전차를\n뒤집는 파워를 지녔다. 자신이\n방패가 되어 동료를 지킨다."
          y: "얼굴 앞에 주먹을 맞대어\n방어 포즈를 취하면\n폭탄의 직격도 견뎌낸다."
fennekin:
  species_id: 653
  names:
    jp_kana: フォッコ
    jp_kanji: フォッコ
    en: Fennekin
    fr: Feunnec
    it: Fennekin
