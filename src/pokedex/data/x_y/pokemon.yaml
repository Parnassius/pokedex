        jp_kana:
          x: "うでの　たいもうを　ムチのように\nあつかう。りょううでの　こうげきは\nめにも　とまらぬ　はやさ。"
          y: "りょうての　たいもうを　ムチのように\nつかいこなし　れんぞくこうげきを\nはじめると　だれにも　とめられない。"
        jp_kanji:
          x: "腕の　体毛を　ムチのように\nあつかう。両腕の　攻撃は\n目にも　止まらぬ　速さ。"
          y: "両手の　体毛を　ムチのように\n使いこなし　連続攻撃を\nはじめると　だれにも　止められない。"
        en:
          x: "It wields the fur on its arms like a whip. Its arm\nattacks come with such rapidity that they cannot\neven be seen."
          y: "Using the long fur on its arms like whips, it\nlaunches into combo attacks that, once started,\nno one can stop."
        fr:
          x: "Il se sert des poils de ses pattes antérieures comme\nde fouets. Ses coups ultrarapides sont invisibles à\nl’œil nu."
          y: "Il combat à l’aide des longs poils de ses pattes\nantérieures. Une fois lancé dans ses enchaînements,\nrien ne l’arrête."
        it:
          x: "Usa i peli degli arti come fruste. I suoi attacchi sono\ntalmente rapidi da essere invisibili a occhio nudo."
          y: "Usa i peli degli arti anteriori a mo’ di frusta e se inizia\nun attacco a catena non c’è nessuno che lo possa\nfermare."
        de:
          x: "Es benutzt das Fell an seinen Armen als Peitsche.\nBeide Arme bewegen sich dabei\nmit atemberaubender Geschwindigkeit."
          y: "Niemand kann es aufhalten, wenn es eine Angriffsserie\nmit seinen peitschenartigen Armen startet."
        es:
          x: "Usa el pelaje de sus brazos a manera de látigos.\nSus ataques alcanzan velocidades de vértigo."
          y: "Usa el pelaje de sus brazos a modo de látigos para\nencadenar ataques que nadie puede parar una vez\niniciados."
        ko:
          x: "팔에 있는 털을 채찍처럼\n다룬다. 양팔로 펼치는 공격은\n눈에 보이지 않을 만큼 빠르다."
          y: "양손의 털을 채찍처럼\n능숙하게 다뤄 연속 공격을\n시작하면 아무도 멈출 수 없다."
druddigon:
  species_id: 621
  names:
    jp_kana: クリムガン
    jp_kanji: クリムガン
    en: Druddigon
    fr: Drakkarmin
    it: Druddigon
    de: Shardrago
    es: Druddigon
    ko: 크리만
  forms:
    druddigon:
      form_id: 0
      base_stats:
        hp: 77
        attack: 120
        defense: 90
        special_attack: 60
        special_defense: 90
