        jp_kana:
          x: "おおきく　くちを　あけて　じぶんの\nつよさを　アピール。たいりょうの\nすなを　まきあげて　こうげきする。"
          y: "たいないに　ためた　すなを　からだの\nあなから　ふきあげて　きょだいな\nたつまきを　つくり　こうげきする。"
        jp_kanji:
          x: "大きく　口を　開けて\n自分の　強さを　アピール。\n大量の　砂を　巻き上げて　攻撃する。"
          y: "体内に　ためた　砂を　体の　穴から\n噴き上げて　巨大な\n竜巻を　作り　攻撃する。"
        en:
          x: "It brandishes its gaping mouth in a display of\nfearsome strength. It raises vast quantities of sand\nwhile attacking."
          y: "It blasts internally stored sand from ports on its\nbody to create a towering twister for attack."
        fr:
          x: "Il exhibe sa force en ouvrant grand sa mâchoire,\net attaque en soulevant des tornades de sable."
          y: "Il emmagasine du sable qu’il expulse en tornades par\nles pores de sa peau pour attaquer."
        it:
          x: "Mostra la propria forza spalancando le fauci.\nAttacca sollevando immani quantità di sabbia."
          y: "Immagazzina sabbia all’interno del corpo e l’espelle\ncon violenza dai pori, formando enormi vortici."
        de:
          x: "Das weit aufgerissene Maul demonstriert seine\nStärke. Es attackiert mit gebündeltem Sand."
          y: "Es wirbelt im Körper gespeicherten Sand durch\nÖffnungen und generiert so einen Sandwirbelsturm."
        es:
          x: "Hace gala de su fuerza abriendo su enorme boca.\nPara atacar levanta gran cantidad de arena."
          y: "Cuando ataca, expulsa arena almacenada en su interior\npara crear un gran tornado."
        ko:
          x: "크게 입을 벌려 자신의\n강함을 어필한다. 대량의\n모래를 일으켜 공격한다."
          y: "체내에 모아둔 모래를 몸의\n구멍에서 뿜어 올려 거대한\n회오리를 만들어 공격한다."
skorupi:
