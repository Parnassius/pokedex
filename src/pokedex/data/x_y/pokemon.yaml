        jp_kana:
          x: "ぜんしんが　はものの　ポケモン。\nたたかいで　はこぼれすると　かわらの\nてごろな　いしで　はを　とぐ。"
          y: "じぶんが　きずついても　きにせず\nしゅうだんで　ぜんしんの　はものを\nくいこませ　あいてを　こうげきする。"
        jp_kanji:
          x: "全身が　刃物の　ポケモン。\n戦いで　刃こぼれすると\n河原の　石で　刃を　とぐ。"
          y: "自分が　傷ついても　気にせず\n集団で　全身の　刃物を\n食いこませ　相手を　攻撃する。"
        en:
          x: "Blades comprise this Pokémon’s entire body.\nIf battling dulls the blades, it sharpens them on\nstones by the river."
          y: "Ignoring their injuries, groups attack by sinking\nthe blades that cover their bodies into their prey."
        fr:
          x: "Tout son corps est fait de lames. Si une lame\ns’émousse, il va l’aiguiser contre une pierre au bord\nd’une rivière."
          y: "Ignorant leurs propres blessures, ils se jettent en\ngroupe sur l’ennemi pour le déchirer de leur corps\nfait de lames."
        it:
          x: "Il suo intero corpo è un’arma da taglio. Se le lame\nsi smussano lottando, le affila con pietre di fiume."
          y: "Incuranti di ferirsi, si lanciano in gruppo addosso alla\npreda infilzandola con le lame che hanno sul corpo."
        de:
          x: "Sein Körper ist mit Klingen übersät, die es an Felsen\neines Flussbettes schärft, wenn sie im Kampf\nschartig werden."
          y: "Selbst wenn sie verletzt sind, greifen sie ihren Gegner\nunbeirrt in der Gruppe an, indem sie ihre Klingen in ihn\nhineinrammen."
        es:
          x: "Su cuerpo está provisto de hojas afiladas. Cuando se\ndesgastan, las afila con cantos rodados a la orilla del\nrío."
          y: "Ataca en grupo ignorando sus heridas y hundiendo\nen su presa las cuchillas que recubren su cuerpo."
        ko:
          x: "전신이 칼날인 포켓몬이다.\n싸움에서 칼의 이가 빠지면\n강가의 돌로 칼을 간다."
          y: "자신이 상처 입어도 신경 쓰지 않고\n집단으로 전신의 칼날을\n박아서 상대를 공격한다."
bisharp:
