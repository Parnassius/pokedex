          y: "かくごを　きめることで　ぜんしんに\nちからが　みなぎって　すばやくなり\nとびはねると　ざんぞうが　みえる。"
        jp_kanji:
          x: "海や　川など　水面を　走り\n世界中を　駆け巡る。\n美しい　水辺に　現れる。"
          y: "覚悟を　決めることで　全身に\n力が　みなぎって　素早くなり\n飛び跳ねると　残像が　みえる。"
        en:
          x: "It crosses the world, running over the surfaces of\noceans and rivers. It appears at scenic waterfronts."
          y: "When it is resolute, its body fills with power and it\nbecomes swifter. Its jumps are then too fast\nto follow."
        fr:
          x: "Il parcourt le monde en courant à la surface des mers\net des cours d’eau. Il apparaît là où l’eau est très\npure."
          y: "Lorsqu’il est résolu, de l’énergie sature son corps\net le propulse à des vitesses qui dépassent la\nperception humaine."
        it:
          x: "Scorrazza per il mondo muovendosi sulla superficie\ndei mari o dei fiumi. Appare nei lidi più ameni."
          y: "Quando è pronto a passare all’azione, si carica\nd’energia e diventa così veloce che è impossibile\nseguirlo con gli occhi."
        de:
          x: "Es kann auf dem Wasser laufen und reist auf\nFlüssen und Meeren um die Welt. Zu sehen in\nmalerischen Küstengebieten."
          y: "Ist es sich seiner Sache sicher, strotzt es vor Kraft\nund seine Sprünge werden zu schnell für die\nmenschliche Wahrnehmung."
        es:
          x: "Corre por mares, ríos o cualquier superficie acuática de\ntodo el mundo. Aparece en aguas límpidas."
