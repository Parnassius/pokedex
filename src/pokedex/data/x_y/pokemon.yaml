skiddo:
  species_id: 672
  names:
    jp_kana: メェークル
    jp_kanji: メェークル
    en: Skiddo
    fr: Cabriolaine
    it: Skiddo
    de: Mähikel
    es: Skiddo
    ko: 메이클
  forms:
    skiddo:
      form_id: 0
      base_stats:
        hp: 66
        attack: 65
        defense: 48
        special_attack: 62
        special_defense: 57
        speed: 52
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - sap_sipper
      hidden_ability: grass_pelt
      descriptions:
        jp_kana:
          x: "ひとと　くらすようになった\nさいしょの　ポケモンと　いわれる。\nおだやかな　せいかくの　ポケモン。"
          y: "みずと　たいようが　あれば　せなかの\nはっぱで　エネルギーが　つくれるので\nエサを　たべなくても　へいきなのだ。"
        jp_kanji:
          x: "人と　暮らすようになった\n最初の　ポケモンと　言われる。\n穏やかな　性格の　ポケモン。"
          y: "水と　太陽が　あれば　背中の\n葉っぱで　エネルギーが　作れるので\nエサを　食べなくても　平気なのだ。"
        en:
          x: "Thought to be one of the first Pokémon to live in\nharmony with humans, it has a placid disposition."
          y: "If it has sunshine and water, it doesn’t\nneed to eat, because it can generate\nenergy from the leaves on its back."
        fr:
          x: "Ce Pokémon paisible serait le premier à avoir jamais\ncohabité avec les humains."
          y: "Tant qu’il a de l’eau et du soleil en abondance, ce\nPokémon n’a pas besoin de nourriture. Les feuilles sur\nson dos produisent son énergie par photosynthèse."
        it:
          x: "Ha un carattere pacifico ed è considerato il primo\nPokémon ad avere stretto amicizia con l’uomo."
          y: "Ricava energia dal sole e dall’acqua grazie alle foglie\nche ha sul dorso. In questo modo può sopravvivere\nanche senza mangiare."
        de:
          x: "Man sagt, es sei eines der ersten Pokémon,\ndie mit Menschen zusammengelebt haben.\nEs ist sehr ruhig und friedfertig."
          y: "Solange es Wasser und Sonnenlicht hat, kann es mit\nden Blättern auf seinem Rücken Energie erzeugen.\nDeswegen kommt es auch ohne Futter zurecht."
        es:
          x: "Se dice que fue la primera especie de Pokémon que se\nacostumbró a vivir con los seres humanos. Tiene una\nnaturaleza muy afable."
          y: "Puede generar energía con las hojas que tiene en la\nespalda disponiendo tan solo de agua y luz solar.\nGracias a ello puede sobrevivir sin comer."
        ko:
          x: "사람과 살기 시작한\n최초의 포켓몬이라고 한다.\n온화한 성격의 포켓몬이다."
          y: "물과 태양이 있으면 등에 있는\n잎으로 에너지를 만들 수 있어서\n먹이를 먹지 않아도 괜찮다."
gogoat:
  species_id: 673
  names:
    jp_kana: ゴーゴート
    jp_kanji: ゴーゴート
    en: Gogoat
    fr: Chevroum
    it: Gogoat
    de: Chevrumm
    es: Gogoat
    ko: 고고트
  forms:
    gogoat:
      form_id: 0
      base_stats:
        hp: 123
        attack: 100
        defense: 62
        special_attack: 97
        special_defense: 81
        speed: 68
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - sap_sipper
      hidden_ability: grass_pelt
      descriptions:
        jp_kana:
          x: "ツノを　にぎる　わずかな　ちがいから\nトレーナーの　きもちを　よみとるので\nいったいとなって　はしれるのだ。"
          y: "さんがくちたいで　せいかつする。\nツノを　ぶつけあう　ちからくらべの\nしょうしゃが　むれの　リーダーだ。"
        jp_kanji:
          x: "ツノを　握る　わずかな　違いから\nトレーナーの　気持ちを　読み取るので\n一体となって　走れるのだ。"
          y: "山岳地帯で　生活する。\nツノを　ぶつけ合う　力比べの　勝者が\n群れの　リーダーだ。"
        en:
          x: "It can tell how its Trainer is feeling by\nsubtle shifts in the grip on its horns.\nThis empathic sense lets them run as if one being."
          y: "They inhabit mountainous regions.\nThe leader of the herd is decided by\na battle of clashing horns."
        fr:
          x: "Quand son Dresseur le tient par une corne, il est\ncapable de deviner ses plus subtils changements\nd’humeur et de s’y adapter."
          y: "Ce Pokémon vit dans les régions montagneuses.\nLe chef du troupeau s’impose à l’issue d’un combat\nde cornes."
        it:
          x: "È in grado di intuire gli stati d’animo del suo Allenatore\ndal modo in cui questi gli afferra le corna. Questo\npermette a entrambi di correre in perfetta armonia."
          y: "Vive in regioni montuose. Questi Pokémon\nstabiliscono il leader del gruppo confrontandosi\na cornate."
        de:
          x: "Es kann die Stimmung seines Trainers an der kleinsten\nVeränderung dessen Griffes um seine Hörner ablesen\nund galoppiert sofort los, wenn dieser es wünscht."
          y: "Sie leben im Gebirge. Der Herdenanführer wird durch\nein Kräftemessen gewählt, bei dem die Anwärter ihre\nHörner gegeneinander rammen."
        es:
          x: "Percibe los sentimientos del Entrenador por la forma\nen la que agarra sus cuernos, aunque sean variaciones\nsutiles, y así avanzan como si fueran un solo ente."
          y: "Habita en regiones montañosas. El líder de la manada\nse decide en una demostración de fuerza en la que los\ncontendientes luchan con los cuernos."
        ko:
          x: "뿔을 잡을 때 느껴지는 작은 차이로\n트레이너의 마음을 읽어낼 수 있기에\n하나가 되어 달릴 수 있는 것이다."
          y: "산악 지대에서 생활한다.\n뿔을 서로 부딪쳐서 힘을 겨루어\n승자가 무리의 리더가 된다."
pancham:
  species_id: 674
  names:
    jp_kana: ヤンチャム
    jp_kanji: ヤンチャム
    en: Pancham
    fr: Pandespiègle
    it: Pancham
    de: Pam-Pam
    es: Pancham
    ko: 판짱
  forms:
    pancham:
      form_id: 0
      base_stats:
        hp: 67
        attack: 82
        defense: 62
        special_attack: 46
        special_defense: 48
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          x: "てきに　なめられないよう　がんばって\nにらみつけるが　こうかは　うすい。\nくわえた　はっぱが　トレードマーク。"
          y: "いっしょうけんめい　こわい　かおで\nあいてを　にらみつけるが　あたまを\nなでられると　つい　にやけてしまう。"
        jp_kanji:
          x: "敵に　なめられないよう　がんばって\nにらみつけるが　効果は　薄い。\nくわえた　葉っぱが　トレードマーク。"
          y: "一生懸命　怖い　顔で　相手を\nにらみつけるが　頭を　なでられると\nつい　にやけてしまう。"
        en:
          x: "It does its best to be taken seriously by its enemies,\nbut its glare is not sufficiently intimidating.\nChewing on a leaf is its trademark."
          y: "It does its level best to glare and pull a scary face,\nbut it can’t help grinning if anyone pats its head."
        fr:
          x: "Il fait son possible pour intimider ses adversaires\navec un regard menaçant, mais sans succès. Il a\nl’habitude de constamment mâcher une feuille."
          y: "Il fait de son mieux pour avoir un air patibulaire,\nmais il sourit béatement dès qu’on lui caresse la tête."
        it:
          x: "Fa di tutto per farsi prendere sul serio dai nemici,\nma il suo sguardo di sfida non è molto efficace.\nHa il vizio di masticare una foglia."
          y: "Ce la mette tutta per intimorire i nemici con uno\nsguardo truce, ma appena qualcuno gli accarezza\nla testa, diventa un tenerone."
        de:
          x: "Es starrt den Gegner finster an, um nicht unterschätzt\nzu werden, hat aber nur wenig Erfolg damit.\nDas Kauen auf einem Blatt ist sein Markenzeichen."
          y: "Es gibt alles, um ein finsteres Gesicht zu machen und\nsein Gegenüber böse anzustarren, aber wenn es am\nKopf gestreichelt wird, muss es unwillkürlich grinsen."
        es:
          x: "Se esfuerza mucho para que el enemigo no lo\nmenosprecie, pero su mirada no intimida demasiado.\nSe caracteriza por mascar siempre una hoja."
          y: "Se desvive tratando de fulminar a su rival con una\nmirada aterradora, pero en cuanto le acarician la\ncabeza, no puede evitar sonreír de oreja a oreja."
        ko:
          x: "적이 얕잡아 보지 못하도록 열심히\n노려보지만, 효과가 약하다.\n물고 있는 잎사귀가 트레이드마크다."
          y: "무서운 얼굴로 열심히\n상대를 노려보지만 머리를\n쓰다듬어주면 금방 해죽거린다."
pangoro:
  species_id: 675
  names:
    jp_kana: ゴロンダ
    jp_kanji: ゴロンダ
    en: Pangoro
    fr: Pandarbare
    it: Pangoro
    de: Pandagro
    es: Pangoro
