        jp_kana:
          x: "おもたい　いわを　せおって\nかんそうした　とちを　なんにちでも\nいどうできる　きゃくりょくを　もつ。"
          y: "なわばりを　とりあって　イワパレス\nどうしが　はげしく　たたかう。\nいわを　こわされた　ほうが　まけ。"
        jp_kanji:
          x: "重たい　岩を　背負って\n乾燥した　土地を　何日でも\n移動できる　脚力を　持つ。"
          y: "縄張りを　取り合って\nイワパレス　同士が　激しく　戦う。\n岩を　壊されたほうが　負け。"
        en:
          x: "It possesses legs of enormous strength, enabling it\nto carry heavy slabs for many days, even when\ncrossing arid land."
          y: "Competing for territory, Crustle fight viciously.\nThe one whose boulder is broken is the loser of\nthe battle."
        fr:
          x: "Il est assez endurant pour voyager des jours durant\ndans des zones desséchées avec son lourd rocher sur\nle dos."
          y: "Entre eux, les querelles de territoire sont fréquentes\net violentes. Celui qui se fait briser son rocher a\nperdu."
        it:
          x: "Ha una tale forza nelle gambe, che può spostarsi\nper giorni in zone aride con una pesante roccia\nsulle spalle."
          y: "I Crustle si disputano il territorio lottando ferocemente.\nVince chi distrugge la roccia del rivale."
        de:
          x: "Es ist hart genug im Nehmen, um mitsamt seines\nschweren Felsens mehrere Tage durch trockene\nGebiete zu wandern."
          y: "Revierkonflikte führen oft zu heftigen Kämpfen\nzwischen ihnen. Gewonnen hat, wer das\ngegnerische Haus zerstört."
        es:
          x: "Su inmensa capacidad motriz le permite desplazarse\ncargando a sus espaldas rocas enormes durante días."
          y: "Se disputa el territorio con sus congéneres. Pierde\naquel al que le rompan la roca que lleva a cuestas."
        ko:
          x: "무거운 바위를 등에 지고\n며칠이고 건조한 땅을\n이동할 수 있는 다릿심을 가지고 있다."
          y: "영역을 빼앗기 위해\n암팰리스끼리 격렬히 싸운다.\n바위가 부서진 쪽이 패배다."
scraggy:
