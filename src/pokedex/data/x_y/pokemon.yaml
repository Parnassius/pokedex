      descriptions:
        jp_kana:
          x: "エサを　さがすため　はなを\nこすりあわせ　じめんを　ほっている。\nたまに　おんせんを　ほりあてる。"
          y: "いい　においを　かぎつけると\nあとさき　かんがえず　においの\nほうこうへ　ダッシュしてしまう。"
        jp_kanji:
          x: "エサを　探すため　鼻を\nこすり合わせ　地面を　掘っている。\nたまに　温泉を　掘り当てる。"
          y: "いい　においを　かぎつけると\nあとさき　考えずに　においの\n方向へ　ダッシュしてしまう。"
        en:
          x: "It rubs its snout on the ground to find and dig up\nfood. It sometimes discovers hot springs."
          y: "If it smells something enticing, it dashes off\nheadlong to find the source of the aroma."
        fr:
          x: "Il renifle le sol avec sa truffe pour y dénicher de\nla nourriture. Il trouve parfois des sources thermales."
          y: "S’il sent une odeur attirante, il fonce tête baissée\npour en trouver l’origine."
        it:
          x: "Sfrega il muso sul terreno per scovare del cibo.\nTalvolta scopre sorgenti d’acqua calda."
          y: "Appena avverte un profumo invitante, cerca subito\ndi capire la provenienza di quell’odore."
        de:
          x: "Auf Nahrungssuche schnüffelt es am Boden entlang.\nEs entdeckt dabei manchmal auch heiße Quellen."
          y: "Wenn es etwas Vielversprechendes erschnuppert,\ndann stürzt es in Windeseile darauf zu."
        es:
          x: "Frota su hocico contra el suelo para desenterrar\ncomida. A veces descubre aguas termales."
          y: "Si percibe un aroma tentador, se tira de cabeza para\nencontrar el origen de dicho olor."
        ko:
          x: "먹이를 찾기 위해 코를\n바닥에 비벼 땅을 파고 있다.\n가끔 온천을 찾아낸다."
          y: "좋은 냄새를 맡으면\n뒷일을 생각하지 않고 냄새 나는\n방향으로 대시해버린다."
piloswine:
