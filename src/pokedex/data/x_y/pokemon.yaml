          x: "くちから　しゃくねつの　ほのおを\nはきだすとき　しっぽの　さきは\nより　あかく　はげしく　もえあがる。"
          y: "ちじょう　１４００メートル　まで\nハネを　つかって　とぶことができる。\nこうねつの　ほのおを　はく。"
        jp_kanji:
          x: "口から　灼熱の　炎を　吐き出すとき\n尻尾の　先は\nより　赤く　激しく　燃え上がる。"
          y: "地上　１４００メートルまで\n羽を　使って　飛ぶことができる。\n高熱の　炎を　吐く。"
        en:
          x: "When expelling a blast of superhot fire,\nthe red flame at the tip of its tail burns\nmore intensely."
          y: "Its wings can carry this Pokémon close to an\naltitude of 4,600 feet. It blows out fire at very\nhigh temperatures."
        fr:
          x: "Quand il crache son souffle brûlant, la flamme au bout\nde sa queue s’embrase."
          y: "Ses ailes peuvent le faire voler à plus de 1 400 m\nd’altitude. Ce Pokémon crache du feu à des\ntempératures très élevées."
        it:
          x: "Quando emette le sue lingue di fuoco, la fiamma\nrossa sulla punta della coda brucia più intensamente."
          y: "Grazie alle possenti ali può volare fino a 1400 m\nd’altezza. Sputa fuoco a una temperatura\nimpressionante."
        de:
          x: "Wenn dieses Pokémon einen Strahl glühenden\nFeuers speit, leuchtet seine Schwanzspitze auf."
          y: "Dieses Pokémon kann mit seinen Flügeln\neine Höhe von bis zu 1 400 m erreichen.\nEs spuckt sehr heißes Feuer."
        es:
          x: "Cuando lanza una descarga de fuego supercaliente, la\nroja llama de su cola brilla más intensamente."
          y: "Con las alas que tiene puede alcanzar una altura de\ncasi 1400 m. Suele escupir fuego por la boca."
        ko:
          x: "입에서 작렬하는 불꽃을\n토해낼 때 꼬리의 끝이\n더욱 붉고 격렬하게 타오른다."
          y: "지상 1400m까지\n날개를 사용해 날 수 있다.\n고열의 불꽃을 내뿜는다."
