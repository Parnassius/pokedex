          x: "きたえあげた　きんにくの　もちぬし。\nてっこつを　たくみに　あやつって\nいっけんやを　かいたい　してくれる。"
          y: "きたえあげた　きんにくの　からだは\nプロレスラーが　たばに　なって\nこうげきしても　びくとも　しない。"
        jp_kanji:
          x: "鍛えあげた　筋肉の　持ち主。\n鉄骨を　たくみに　操って\n一軒家を　解体してくれる。"
          y: "鍛え上げられた　筋肉の　体は\nプロレスラーが　束に　なって\n攻撃しても　びくとも　しない。"
        en:
          x: "With strengthened bodies, they skillfully wield steel\nbeams to take down buildings."
          y: "This Pokémon is so muscular and strongly built that\neven a group of wrestlers could not make it budge\nan inch."
        fr:
          x: "Ce Pokémon hyper musclé manipule avec habileté\nles poutres métalliques et peut démanteler un\nimmeuble en un clin d’œil."
          y: "Même une armée de catcheurs se jetant sur son\ncorps hyper musclé ne le ferait pas ciller."
        it:
          x: "Ha un corpo pieno di muscoli e manovra con abilità\nla sua trave d’acciaio, con cui può abbattere una\ncasa intera."
          y: "Il suo corpo muscolosissimo resisterebbe senza\nbattere ciglio all’assalto di un lottatore di wrestling."
        de:
          x: "Diese durchtrainierten Muskelprotze sind im\nUmgang mit Stahlträgern versiert und können\ndamit ganze Häuser abreißen."
          y: "Selbst wenn es mit voller Wucht von einem\nProfi-Ringer angegriffen wird, lässt es dies\ndank seines Muskeltrainings kalt."
        es:
          x: "Gracias a su entrenada musculatura, puede blandir\nvigas de acero sin problema para así derribar edificios\nenteros."
          y: "Sus músculos están tan desarrollados que no se\ninmuta aunque lo ataquen varios luchadores."
        ko:
          x: "단련된 근육의 소유자.\n철골을 능숙하게 조종하여\n집을 해체해준다."
          y: "단련을 거듭한 근육덩어리 몸은\n프로레슬러가 단체로 공격해도\n꿈쩍도 하지 않는다."
conkeldurr:
