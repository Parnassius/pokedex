          y: "ベールの　ような　手足を　巻きつけ\nしびれさせると　８０００メートルの\n深海に　連れこんで　殺すのだ。"
        en:
          x: "They paralyze prey with poison, then drag them\ndown to their lairs, five miles below the surface."
          y: "If its veil-like arms stun and wrap a foe, that foe will\nbe dragged miles below the surface, never\nto return."
        fr:
          x: "Il paralyse ses proies avec du poison et les entraîne\njusqu’à son antre, qu’on dit situé à 8 000 m de\nprofondeur."
          y: "Il enserre ses proies dans ses voiles et les entraîne\nsous la surface de la mer jusqu’à plus de 8 000 m\nde profondeur."
        it:
          x: "Paralizza la preda con il veleno e la porta nella sua\ndimora a 8000 m in fondo al mare."
          y: "Paralizza la preda con i suoi tentacoli a forma di velo\ne poi la trascina a 8000 m sotto il livello del mare."
        de:
          x: "Es lähmt seine Beute mit Gift und verschleppt sie\nin seinen Unterschlupf, 8 km unter dem Meeresspiegel."
          y: "Es schlingt seine schleierartigen Arme um seine\nBeute und entführt sie 8 000 m in die Tiefe,\nwo es sie schließlich tötet."
        es:
          x: "Paraliza a sus presas con veneno y las lleva a su\nmorada, que se encuentra a 8000 m en el fondo del\nmar."
          y: "Rodea a sus presas con sus tentáculos, las entumece\ny las arrastra a 8000 m de profundidad hasta que las\nahoga."
        ko:
          x: "먹이를 독으로 마비시켜\n8000m 심해에\n있다는 거처로 데려간다."
          y: "베일 같은 손발을 휘감아\n마비시켜서 8000m의\n심해에 데려가 끝장낸다."
