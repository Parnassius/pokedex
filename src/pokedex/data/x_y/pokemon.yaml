          y: "するどい　ツメの　さきには　つよい\nでんきが　ながれており　ほんのすこし\nかするだけで　あいてをきぜつさせる。"
        jp_kanji:
          x: "１発で　気絶させるほどの　電流を\nツメから　流す。\n数匹の　グループで　暮らす。"
          y: "鋭い　ツメの　先には　強い　電気が\n流れており　ほんの少し　かするだけで\n相手を気絶させる。"
        en:
          x: "Its claws loose electricity with enough amperage\nto cause fainting. They live in small groups."
          y: "Strong electricity courses through the tips of its\nsharp claws. A light scratch causes fainting in foes."
        fr:
          x: "L’électricité libérée par ses griffes peut assommer\nl’ennemi. Il vit en petits groupes."
          y: "Le courant qui circule à la pointe de ses griffes est\ncapable de faire perdre connaissance à ses proies."
        it:
          x: "Dagli artigli rilascia un’elettricità talmente intensa\nda mandare KO il nemico. Vive in piccoli gruppi."
          y: "I suoi artigli rilasciano una forte corrente elettrica e\ncon un solo graffio manda KO i nemici."
        de:
          x: "Seine Krallen geben Elektrizität ab, die stark\ngenug ist, jemanden bewusstlos zu machen."
          y: "Durch die Spitzen seiner scharfen Krallen strömt\nElektrizität. Selbst kleine Kratzer verursachen\nOhnmacht."
        es:
          x: "Sus garras emiten electricidad que puede debilitar a\nsus rivales. Viven en grupos pequeños."
          y: "Por las puntas de sus garras pasa una fuerte corriente\neléctrica. El mínimo roce debilita al enemigo."
        ko:
          x: "발톱에서는 한 방에 적을 기절시킬\n정도로 강한 전류가 흐른다.\n여러 마리가 그룹을 이루어 산다."
          y: "날카로운 발톱의 끝에는 강한\n전기가 흐르고 있어서 살짝 스치는\n것만으로 상대를 기절시킨다."
