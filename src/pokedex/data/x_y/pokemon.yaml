          y: "いちばん　おおきい　ポケモン。\nいきつぎせずに　３０００メートルの\nふかさまで　もぐることが　できる。"
        jp_kanji:
          x: "大きな　体を　波の上で\nジャンプさせ　衝撃を　生みだし\n相手を　気絶　させることがある。"
          y: "一番　大きい　ポケモン。\n息つぎせずに　３０００メートルの\n深さまで　潜ることが　できる。"
        en:
          x: "It can sometimes knock out opponents with the\nshock created by breaching and crashing its big\nbody onto the water."
          y: "The biggest of all Pokémon. It can dive to a depth\nof almost 10,000 feet on only one breath."
        fr:
          x: "L’énorme fracas résultant de ses sauts par-dessus\nles vagues peut faire perdre connaissance à ses\nadversaires."
          y: "Le plus grand des Pokémon. Il peut plonger à\nune profondeur de 3 000 m en retenant son souffle."
        it:
          x: "L’impatto creato dai suoi salti fuori e dentro l’acqua\npuò arrivare a mandare KO un avversario."
          y: "Il Pokémon più grande che esista. Dopo aver inalato\naria, si immerge a una profondità di 3000 m."
        de:
          x: "Springt es mit seinem gewaltigen Körper von einer\nWelle ab, kann es Gegner allein mit der Wucht des\nAufpralls besiegen."
          y: "Das größte Pokémon. Es kann mit nur einem Atemzug\nin Tiefen bis 3 000 m tauchen."
        es:
          x: "Puede dejar fuera de combate a sus oponentes con el\nimpacto de su enorme cuerpo al caer en el agua tras\nun salto."
          y: "Es el más grande de los Pokémon. Puede nadar a una\nprofundidad de 3000 m aguantando la respiración."
        ko:
          x: "커다란 몸을 파도 위에서\n점프시켜 충격을 만들어\n상대를 기절시킬 때가 있다."
          y: "제일 큰 포켓몬이다.\n숨을 들이쉬지 않고 3000m의\n깊이까지 잠수할 수 있다."
