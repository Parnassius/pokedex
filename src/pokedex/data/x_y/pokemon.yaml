          y: "ちか　１００メートルに　めいろの\nような　すあなを　つくる。ちかてつの\nトンネルに　あなを　あけてしまう。"
        jp_kanji:
          x: "鋼に　進化した　ドリルは\n鉄板を　つらぬく　破壊力。\nトンネル工事で　大活躍する。"
          y: "地下　１００メートルに　迷路の\nような　巣穴を　作る。地下鉄の\nトンネルに　穴を　開けてしまう。"
        en:
          x: "It can help in tunnel construction. Its drill has\nevolved into steel strong enough to bore through\niron plates."
          y: "More than 300 feet below the surface, they build\nmazelike nests. Their activity can be destructive to\nsubway tunnels."
        fr:
          x: "Ses vrilles en acier peuvent transpercer des poutres\nen fer. Il est très employé dans la construction de\ntunnels."
          y: "Il se creuse des terriers labyrinthiques à 100 m sous\nterre. Il lui arrive de percer les galeries du métro."
        it:
          x: "La trivella si è evoluta diventando d’acciaio e può\nperforare una lastra di ferro. È molto utile per\nscavare tunnel."
          y: "Costruisce una tana simile a un labirinto 100 m sotto\nterra. A volte apre buchi nei tunnel della metropolitana."
        de:
          x: "Seine zu Stahl weiterentwickelten Bohrer kriegen\nselbst Eisenplatten klein. Im Tunnelbau ist es ein\nabsolutes Ass."
          y: "Sein verworrener Bau liegt 100 m tief unter der Erde.\nGelegentlich gräbt es auch U-Bahn-Schächte an."
        es:
          x: "Su taladro ha evolucionado y es capaz de atravesar\nuna lámina de hierro. Es muy útil para construir\ntúneles."
          y: "Construye madrigueras laberínticas a 100 m bajo\ntierra. A veces abre agujeros en los túneles de metro."
        ko:
          x: "강철로 진화한 드릴은\n철판을 뚫는 파괴력을 가졌다.\n터널 공사에서 크게 활약한다."
          y: "땅 밑 100m에 미로 같은\n굴을 만든다. 지하철\n터널에 구멍을 뚫어 버린다."
audino:
