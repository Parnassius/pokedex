          y: "でんせつで　かたられる　ポケモン。\nポケモンを　まもるため　じまんの\nパワーで　しろを　こわした。"
        jp_kanji:
          x: "巨大な　城壁を\n一撃で　突破するほどの　突進力。\n伝説で　語られる　ポケモン。"
          y: "伝説で　語られる　ポケモン。\nポケモンを　守るため　自慢の\nパワーで　城を　壊した。"
        en:
          x: "Its charge is strong enough to break through a\ngiant castle wall in one blow. This Pokémon is\nspoken of in legends."
          y: "Spoken of in legend, this Pokémon used its\nphenomenal power to destroy a castle in its effort\nto protect Pokémon."
        fr:
          x: "Sa puissance d’impact lui permet d’enfoncer d’un\nseul coup le rempart d’un château. Un Pokémon de\nlégende."
          y: "Un Pokémon de légende. Grâce à sa puissance\nphénoménale, il aurait détruit un château pour sauver\ndes Pokémon."
        it:
          x: "Quando carica, ha una forza tale da sfondare\nun’enorme muraglia. Si racconta di lui nelle leggende."
          y: "Si racconta di lui nelle leggende. Per salvare i\nPokémon, ha distrutto un castello con il suo\nimmenso potere."
        de:
          x: "Seine Angriffskraft genügt, um selbst mächtige\nWälle niederzureißen. Ein Held zahlreicher Legenden."
          y: "Ein in Legenden besungenes Pokémon. Mit seinen\neinzigartigen Kräften zerstörte es zum Schutz der\nPokémon ein Schloss."
        es:
          x: "Su potencia al embestir es capaz de derribar las\nmurallas de un castillo. Las leyendas hablan de sus\nproezas."
          y: "Las leyendas hablan de este Pokémon, que derribó\nun castillo con su propia fuerza para proteger a otros\nPokémon."
        ko:
          x: "거대한 성벽을 일격에\n돌파할 만한 돌진력을 가졌다.\n전설로 전해지는 포켓몬이다."
          y: "전설로 전해지는 포켓몬.\n포켓몬을 지키기 위해 자랑스러운\n파워로 성을 부쉈다."
