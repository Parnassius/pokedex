      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - torrent
      hidden_ability: protean
      descriptions:
        jp_kana:
          x: "むねと　せなかから　あわを　だす。\nだんりょくのある　あわで　こうげきを\nうけとめて　ダメージを　へらす。"
          y: "せんさいな　あわで　からだを　つつみ\nはだを　まもる。のんきに　みせかけて\nぬけめなく　しゅういを　うかがう。"
        jp_kanji:
          x: "胸と　背中から　泡を　出す。\n弾力のある　泡で　攻撃を　受け止めて\nダメージを　減らす。"
          y: "繊細な　泡で　体を　包み\n肌を　守る。のんきに　見せかけて\n抜け目なく　周囲を　うかがう。"
        en:
          x: "It secretes flexible bubbles from its chest and back.\nThe bubbles reduce the damage it would otherwise\ntake when attacked."
          y: "It protects its skin by covering its body in\ndelicate bubbles. Beneath its happy-go-lucky air,\nit keeps a watchful eye on its surroundings."
        fr:
          x: "Sa poitrine et son dos sécrètent une mousse qui\nlui permet de subir moins de dégâts en amortissant\nle choc des attaques."
          y: "Il protège son corps en l’entourant d’une mousse\ndélicate. Malgré son apparence insouciante,\nce Pokémon est en fait constamment à l’affût."
        it:
          x: "Dal petto e dalla schiena secerne una schiuma\nche gli permette di attutire i danni causati dagli\nattacchi nemici."
          y: "Si protegge avvolgendo il corpo in una schiuma\ndelicata. Nonostante l’aria spensierata, scruta sempre\nl’ambiente circostante con molta attenzione."
        de:
          x: "Es stößt aus Brust und Rücken elastische Blasen aus,\nmit denen es gegnerische Angriffe abfängt und so\nden erlittenen Schaden verringert."
          y: "Es schützt seine Haut mit feinen Blasen, die seinen\nKörper umhüllen. Es mag unbekümmert aussehen,\nbehält die Umgebung aber immer aufmerksam im Auge."
        es:
          x: "Secreta burbujas tanto por la espalda como\npor el pecho. Gracias a la elasticidad de estas,\npuede parar ataques y reducir el daño recibido."
          y: "Protege su piel cubriendo el cuerpo con una fina capa\nde burbujas. Aunque parezca despreocupado, no deja\nde vigilar con astucia lo que le rodea."
        ko:
          x: "가슴과 등에서 거품을 내뿜는다.\n탄력 있는 거품으로 공격을\n막아내고 데미지를 줄인다."
          y: "섬세한 거품으로 몸을 감싸\n피부를 보호한다. 태평한 척하면서\n빈틈없이 주위를 살핀다."
frogadier:
  species_id: 657
  names:
    jp_kana: ゲコガシラ
    jp_kanji: ゲコガシラ
    en: Frogadier
    fr: Croâporal
