        it:
          x: "Ha appreso tramite un durissimo allenamento l’arte\ndi maneggiare le sue due conchiglie come fossero\nlame."
          y: "Le loro conchiglie sono tutte diverse nella forma e\nogni Dewott si allena duramente per imparare a usarle."
        de:
          x: "Es eignet sich durch strenges Training elegant\nineinander übergehende Attacken mit seinen\nzwei Muscheln an."
          y: "Jedes Zwottronin eignet sich über strenges Training\neinen völlig eigenen Muschelkampfstil an."
        es:
          x: "Gran espadachín. Utiliza sus dos vieiras con soltura al\nejecutar las técnicas que aprende con una disciplina\nespartana."
          y: "Tras un exhaustivo entrenamiento, Dewott puede\ndominar diversas técnicas para usar con sus vieiras."
        ko:
          x: "물 흐르는 듯한 칼솜씨로\n2개의 가리비칼을 사용하는 기술은\n엄격한 수련을 통해 익힌 것이다."
          y: "혹독한 수행 끝에\n쌍검자비마다 다른 형태의\n가리비칼 다루는 기술을 습득한다."
