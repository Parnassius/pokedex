      descriptions:
        jp_kana:
          x: "こえだを　たべると　げんきになって\nせっし２００どを　こえる　ねっきを\nおおきな　みみから　ふきだす。"
          y: "こえだを　もちあるき　おやつがわりに\nポリポリ　たべる。みみから　ねっきを\nふきだして　あいてを　いかくする。"
        jp_kanji:
          x: "小枝を　食べると　元気になって\n摂氏２００度を　超える　熱気を\n大きな　耳から　噴き出す。"
          y: "小枝を　持ち歩き　おやつがわりに\nポリポリ　食べる。耳から　熱気を\n噴き出して　相手を　威嚇する。"
        en:
          x: "Eating a twig fills it with energy,\nand its roomy ears give vent to air\nhotter than 390 degrees Fahrenheit."
          y: "As it walks, it munches on a twig in place\nof a snack. It intimidates opponents\nby puffing hot air out of its ears."
        fr:
          x: "En cas de coup de fatigue, il grignote des rameaux\npour recharger ses batteries. Ses oreilles dégagent\nune chaleur qui dépasse les 200 °C."
          y: "Il a toujours une brindille avec lui en cas de petit\ncreux. Il projette de l’air chaud par ses oreilles pour\nintimider ses ennemis."
        it:
          x: "Fa il pieno di energia mangiando ramoscelli ed emette\naria calda dalle grandi orecchie a una temperatura\ndi oltre 200 °C."
          y: "Se ne va in giro sgranocchiando un rametto.\nIntimidisce i nemici emettendo aria calda dalle\norecchie."
        de:
          x: "Wenn es Zweige frisst, fasst es neue Kraft und stößt\nüber seine Ohren über 200 °C heiße Luft aus."
          y: "Anstelle eines Snacks kaut es unterwegs auf einem\nZweig herum. Es schreckt Gegner ab, indem es über\nseine Ohren heiße Luft ausstößt."
        es:
          x: "Tras masticar e ingerir pequeñas ramas se siente\npletórico y expulsa aire caliente por sus grandes\norejas a temperaturas superiores a los 200 ºC."
          y: "Mordisquea una ramita mientras camina, como si de\nun aperitivo se tratase. Intimida a su enemigo\nexpulsando aire caliente por las orejas."
        ko:
          x: "잔가지를 먹으면 힘이 나서\n섭씨 200도가 넘는 열기를\n커다란 귀에서 내뿜는다."
          y: "작은 나뭇가지를 들고 다니며 간식 대신\n아작아작 먹는다. 귀에서 열기를\n뿜어내어 상대를 위협한다."
braixen:
  species_id: 654
  names:
    jp_kana: テールナー
    jp_kanji: テールナー
    en: Braixen
    fr: Roussil
    it: Braixen
    de: Rutena
    es: Braixen
    ko: 테르나
  forms:
    braixen:
      form_id: 0
