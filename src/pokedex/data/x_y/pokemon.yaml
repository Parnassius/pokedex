          y: "くちのなかに　ちいさなポケモンや\nタマゴをいれて　あんぜんな　ばしょに\nとどけてくれる　そらの　はこびや。"
        jp_kanji:
          x: "大きな　クチバシを　海に　入れて\nひとすくいすると　エサが　たくさん\n入っているという　寸法だ。"
          y: "口の中に　小さなポケモンや\nタマゴを入れて　安全な　場所に\n届けてくれる　空の　運び屋。"
        en:
          x: "It dips its large bill in the sea, then scoops up\nnumerous prey along with water."
          y: "It is a messenger of the skies, carrying small\nPokémon and eggs to safety in its bill."
        fr:
          x: "Il trempe son grand bec dans la mer pour charrier\nde l’eau et de nombreuses proies."
          y: "Ce messager du ciel transporte petits Pokémon et\nŒufs dans son bec en toute sécurité."
        it:
          x: "Immerge il suo enorme becco nel mare, raccogliendo\nacqua e numerose prede."
          y: "È un corriere dei cieli e porta uova e piccoli Pokémon\nnel suo enorme becco."
        de:
          x: "Es taucht seinen großen Schnabel ins Wasser\nund fängt so eine Menge Beute."
          y: "Ein Bote der Lüfte. Bringt Eier und kleine Pokémon\nin seinem Schnabel in Sicherheit."
        es:
          x: "Hunde su gran pico en el mar para sacar numerosas\npresas junto con mucha agua."
          y: "Transporta a pequeños Pokémon y Huevos en su pico\nhasta lugares seguros."
        ko:
          x: "큰 부리를 바다에 넣고 먹이를\n한 번에 많이 건져 올리려는\n속셈이다."
          y: "입속에 작은 포켓몬이나\n알을 넣고 안전한 장소로\n전해주는 하늘의 운반자."
