        jp_kana:
          x: "ひとまえには　めったに　すがたを\nみせない。かみなりの　おちた\nばしょに　すみかが　あると　いう。"
          y: "たてがみから　ほうでんしている。\nずじょうに　かみなりぐもを　つくり\nいなずまを　おとして　こうげきする。"
        jp_kanji:
          x: "人前には　めったに　姿を　見せない。\n雷の　落ちた　場所に\n住処が　あると　いう。"
          y: "たてがみから　放電している。\n頭上に　雷雲を　作り\n稲妻を　落として　攻撃する。"
        en:
          x: "It rarely appears before people. It is said to nest\nwhere lightning has fallen."
          y: "It discharges electricity from its mane. It creates a\nthundercloud overhead to drop lightning bolts."
        fr:
          x: "Ce Pokémon évite le contact des humains.\nOn raconte qu’il fait son nid là où la foudre est déjà\ntombée."
          y: "Il libère l’électricité par sa crinière. Il crée un nuage\nd’orage pour appeler la foudre."
        it:
          x: "Raramente si mostra agli umani. Si dice che nidifichi\nnelle zone dove è caduto un fulmine."
          y: "Scarica elettricità dalla criniera. Crea nubi\ntemporalesche in cielo che fanno cadere saette."
        de:
          x: "Es zeigt sich selten den Menschen. Man sagt, dass es\nsein Nest baut, wo der Blitz eingeschlagen hat."
          y: "Aus seiner Mähne entlädt es Elektrizität. Es generiert\neine Gewitterwolke, aus der es Blitze entlädt."
        es:
          x: "No suele aparecer ante la gente. Dicen que suele\ncolocar su nido donde caen los rayos."
          y: "Descarga electricidad desde su melena. Crea\nnubarrones desde los que lanza rayos."
        ko:
          x: "좀처럼 사람 앞에 모습을\n드러내지 않는다. 번개가 떨어진\n곳에 보금자리가 있다고 한다."
          y: "갈기에서 방전을 하고 있다.\n머리 위에 번개 구름을 만들고\n천둥번개를 떨어뜨려 공격한다."
