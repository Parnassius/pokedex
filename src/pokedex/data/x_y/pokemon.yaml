        jp_kanji:
          x: "首の　まわりから　発散する\nスパイスのような　香りには\n元気を　出させる　効果がある。"
          y: "首回りの　つぼみから　におう\nスパイシーな　香りは\nかいだ　人を　元気に　させる。"
