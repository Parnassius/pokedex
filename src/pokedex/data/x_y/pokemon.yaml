          y: "１にち　１こだけ　きのみを　たべる。\nくうふくに　たえることで\nこころが　とぎすまされていく。"
        jp_kanji:
          x: "いつもは　山奥で　修行。\nめいそうをして　精神力を　高めると\n体が　浮かび上がる。"
          y: "１日　１個だけ　木の実を　食べる。\n空腹に　耐えることで\n心が　研ぎ澄まされていく。"
        en:
          x: "It always trains deep in mountains. It levitates\nwhen it heightens its spiritual power\nthrough meditation."
          y: "It eats just one berry a day. By enduring hunger,\nits spirit is tempered and made sharper."
        fr:
          x: "Son entraînement d’ermite lui permet de léviter par\nle seul pouvoir de la méditation."
          y: "Il ne mange qu’une Baie par jour. La faim lui a forgé\nune volonté de fer."
        it:
          x: "Si allena in montagna per elevare il suo potere\nspirituale. Con la meditazione riesce a levitare."
          y: "Mangia solo una bacca al giorno. Resistendo alla\nfame, il suo spirito viene temprato e rinvigorito."
        de:
          x: "Trainiert tief in den Bergen. Erhöht es seine\nspirituelle Kraft durch Meditation, kann es schweben."
          y: "Es isst gerade mal eine Beere am Tag. Durch Hunger\nwird sein Geist ruhiger und schärfer."
        es:
          x: "Se entrena en la profundidad de las montañas. Cuando\naumenta su poder espiritual con meditación, levita."
          y: "Solo come una baya al día. El ayuno fortalece su\nespíritu y su capacidad de concentración."
        ko:
          x: "평상시는 깊은 산속에서 수행한다.\n명상을 하고 정신력을\n높이면 몸이 떠오른다."
          y: "하루에 하나만 나무열매를 먹는다.\n배고픔을 참는 것으로\n마음을 갈고 닦아간다."
