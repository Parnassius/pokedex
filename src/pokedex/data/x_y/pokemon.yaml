        it:
          x: "Le teste che ha sugli arti non hanno cervello.\nDistrugge e divora qualsiasi cosa usando tutte\ne tre le teste."
          y: "È davvero terrificante. Reagisce a ogni cosa che\nsi muove, attaccandola e sbranandola con le sue\ntre teste."
        de:
          x: "Die Köpfe an seinen beiden Armen haben kein\neigenes Gehirn. Seine drei Mäuler kauen alles\nradikal kurz und klein."
