        jp_kanji:
          x: "輝く　物を　拾っては\n秘密の　場所に　隠しておく。\nよく　ニャースと　奪い合いになる。"
          y: "夜　姿を　見かけると\n不吉なことが　起きると　信じられ\n忌み嫌われている　ポケモン。"
