          y: "大空を　飛び回りながら\nあちこちに　雷を　落として\n山火事を　起こすので　嫌われる。"
        en:
          x: "The spikes on its tail discharge immense bolts of\nlightning. It flies around the Unova region firing off\nlightning bolts."
          y: "As it flies around, it shoots lightning all over\nthe place and causes forest fires. It is\ntherefore disliked."
        fr:
          x: "Sa queue lance des décharges électriques. Il vole\ndans le ciel d’Unys et fait tomber des éclairs."
          y: "Il vole dans le ciel d’Unys et fait tomber des éclairs,\nprovoquant des incendies qui font sa mauvaise\nréputation."
        it:
          x: "Lancia scariche elettriche dagli aculei della coda.\nVola per i cieli di Unima scagliando fulmini."
          y: "Non è molto amato perché durante il suo peregrinare\nnei cieli fa cadere fulmini qua e là che causano incendi\nnei boschi."
        de:
          x: "Es greift mit elektrischer Ladung aus den Dornen\nseiner Rute an und bombardiert Einall aus der Luft\nmit Blitzen."
          y: "Es ist bei den Leuten verhasst, weil es auf seinen\nRundflügen immer wieder Blitze erzeugt,\ndie Waldbrände verursachen."
        es:
          x: "Lanza descargas eléctricas por las púas de su cola.\nSobrevuela Teselia dejando caer rayos."
          y: "Su gusto por surcar el cielo lanzando rayos y\nprovocando incendios forestales le ha granjeado\npocas simpatías."
        ko:
          x: "꼬리의 가시에서 전격을\n날린다. 하나지방의 하늘을\n날아다니며 번개를 내리친다."
          y: "넓은 하늘을 날아다니며\n여기저기 번개를 떨어뜨려\n산불을 내기 때문에 미움받는다."
