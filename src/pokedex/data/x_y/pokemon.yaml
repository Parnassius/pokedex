        jp_kanji:
          x: "頭の　先を　枝に　くっつけて\nぶら下がる。強風に　あおられ\n落ちてしまう　ことも　あるのだ。"
          y: "枝に　ぶらさがっていると\n木の実に　そっくり。ついばもうとした\nポケモンを　驚かせて　喜ぶ。"
        en:
          x: "It attaches itself to a tree branch using the top of\nits head. Strong winds can sometimes make it fall."
          y: "When it dangles from a tree branch, it looks just\nlike an acorn. It enjoys scaring other Pokémon."
        fr:
          x: "Il se suspend aux branches par l’extrémité de sa tête.\nIl arrive qu’il tombe s’il est pris de panique."
          y: "Il ressemble à un gland pendu à une branche.\nIl adore effrayer les autres Pokémon."
        it:
          x: "Si attacca ai rami degli alberi usando il picciolo che\nha sul capo. Talvolta il vento lo fa cadere."
          y: "Quando si attacca a un ramo, sembra una vera\nghianda. Si diverte a spaventare gli altri Pokémon."
        de:
          x: "Mit dem Stiel auf seinem Kopf hängt es sich an Äste.\nBei starkem Wind fällt es durchaus einmal herunter."
          y: "Es sieht aus wie eine Eichel, die am Baum hängt.\nEs liebt es, andere Pokémon zu erschrecken."
        es:
          x: "Se cuelga de las ramas con el extremo de su cabeza.\nA veces se cae cuando soplan vientos fuertes."
          y: "Cuando cuelga de las ramas, parece una bellota.\nLe encanta asustar a otros Pokémon."
        ko:
          x: "머리끝을 가지에 붙여\n매달린다. 강풍이 불어\n떨어지기도 한다."
          y: "가지에 매달려 있으면 나무열매와\n똑 닮았다. 쪼아 먹으려 한\n포켓몬을 놀래주며 좋아한다."
nuzleaf:
