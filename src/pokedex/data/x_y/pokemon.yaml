      types:
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
        - cheek_pouch
      hidden_ability: huge_power
      descriptions:
        jp_kana:
          x: "おおきな　みみで　じめんを　ほって\nすあなを　つくる。ひとばんじゅう\nやすまずに　ほりつづけられる。"
          y: "シャベルのような　みみを　もつ。\nあなほりで　きたえた　みみは　ふとい\nねっこを　たちきる　いりょくだ。"
        jp_kanji:
          x: "大きな　耳で　地面を　掘って\n巣穴を　作る。\n一晩中　休まずに　掘り続けられる。"
          y: "シャベルのような　耳を　持つ。\n穴掘りで　鍛えた　耳は\n太い　根っこを　断ち切る　威力だ。"
        en:
          x: "They use their large ears to dig burrows.\nThey will dig the whole night through."
          y: "It has ears like shovels. Digging holes\nstrengthens its ears so much that they\ncan sever thick roots effortlessly."
        fr:
          x: "Ses larges oreilles lui permettent de creuser\ndes terriers. Il est capable de forer sans s’arrêter\npendant toute une nuit."
          y: "Il est doté d’oreilles ressemblant à des pelles.\nÀ force de creuser des galeries, leur puissance est\ntelle qu’elles peuvent trancher de grosses racines."
        it:
          x: "Scava tane nel terreno grazie alle grandi orecchie.\nPuò andare avanti senza fermarsi per tutta la notte."
          y: "Usa le orecchie come pale per scavare buche\nnel terreno. Queste propaggini sono talmente potenti\nda permettergli di strappare via enormi radici."
        de:
          x: "Mit seinen großen Ohren schaufelt es sich einen Bau.\nEs kann die ganze Nacht ohne Pause durchschaufeln."
          y: "Es besitzt schaufelähnliche Ohren, die durch ständiges\nGraben so kräftig werden, dass sie auch dicke Wurzeln\ndurchtrennen können."
        es:
          x: "Usa sus grandes orejas para excavar en la tierra y así\ncrear madrigueras. Puede pasarse una noche entera\ncavando sin parar."
          y: "Tiene unas orejas tan grandes que parecen palas.\nLas ha fortalecido tanto usándolas para excavar que\nson capaces de arrancar raíces bien gruesas."
        ko:
          x: "커다란 귀로 땅을 파고\n보금자리를 만든다. 하룻밤 동안\n쉬지 않고 계속 팔 수 있다."
          y: "삽과 같은 귀를 가졌다.\n구멍을 파는 데 단련된 귀는 두꺼운\n뿌리를 자를 정도의 위력이다."
diggersby:
  species_id: 660
  names:
    jp_kana: ホルード
    jp_kanji: ホルード
    en: Diggersby
    fr: Excavarenne
    it: Diggersby
    de: Grebbit
    es: Diggersby
    ko: 파르토
  forms:
