      descriptions:
        jp_kana:
          x: "かたい　ハサミは　１まんばりきの\nパワーを　もっているが\nおおきすぎて　うごきが　にぶい。"
          y: "ぶかっこうに　おおきくなった\nハサミを　いきおいよく　もちあげると\nバランスがくずれ　よたついてしまう。"
        jp_kanji:
          x: "硬い　ハサミは　１万馬力の\nパワーを　持っているが\n大きすぎて　動きが　鈍い。"
          y: "不格好に　大きくなった\nハサミを　勢いよく　持ち上げると\nバランスが　崩れ　よたついてしまう。"
        en:
          x: "Its large and hard pincer has 10,000-horsepower\nstrength. However, being so big, it is unwieldy\nto move."
          y: "Its pincers grow peculiarly large. If it lifts the\npincers too fast, it loses its balance and staggers."
        fr:
          x: "Sa grosse pince développe une puissance de\n10 000 CV. Toutefois, sa taille imposante la rend\ndifficile à utiliser."
          y: "Sa pince devient énorme. S’il la soulève trop vite,\nil risque de perdre l’équilibre."
        it:
          x: "La chela più grande sprigiona una potenza di\n10.000 CV. Le dimensioni gli rendono difficili\ngli spostamenti."
          y: "Una delle sue chele è particolarmente grande. Se la\nalza troppo rapidamente può perdere l’equilibrio."
        de:
          x: "Die Kraft seiner großen und harten Schere\nentspricht 10 000 PS. Durch die Größe ist sie\naber auch äußerst unhandlich und sperrig."
          y: "Seine Scheren werden sehr groß. Hebt es sie\nzu schnell, verliert es die Balance und strauchelt."
        es:
          x: "La pinza tan grande que tiene posee una fuerza de\n10 000 caballos de potencia. Pero, por su gran\ntamaño, cuesta moverla."
          y: "Su pinza es muy grande. Si la levanta demasiado\nrápido, pierde el equilibrio y se tambalea."
        ko:
          x: "단단한 집게는 1만 마력의\n파워를 지녔지만\n너무 커서 움직임이 둔하다."
          y: "볼품없이 크게 자라난\n집게를 기세 좋게 들고 걷다 보면\n밸런스가 무너져 뒤뚱거리게 된다."
