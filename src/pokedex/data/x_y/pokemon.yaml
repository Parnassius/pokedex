      descriptions:
        jp_kana:
          x: "えものを　くびのツメで　はさみこみ\nみうごきを　とれなくしてから\nもうどくを　あたえ　とどめを　さす。"
          y: "すばやい　うごきで　てきを　おいつめ\nあたまの　ツノで　こうげきする。\nとどめを　さすまで　ようしゃしない。"
        jp_kanji:
          x: "獲物を　首のツメで　挟みこみ\n身動きを　とれなくしてから\n猛毒を　与え　とどめを　刺す。"
          y: "素早い　動きで　敵を　追いつめ\n頭の　ツノで　攻撃する。\nとどめを　刺すまで　容赦しない。"
        en:
          x: "It clasps its prey with the claws on its neck until it\nstops moving. Then it finishes it off with\ndeadly poison."
          y: "With quick movements, it chases down its foes,\nattacking relentlessly with its horns until it prevails."
        fr:
          x: "Il paralyse l’ennemi avec les griffes de son cou avant\nde mettre fin au combat grâce à son poison virulent."
          y: "Il accule l’ennemi par ses mouvements rapides et\nl’attaque avec ses cornes. Il ne s’arrête qu’au coup\nde grâce."
        it:
          x: "Trafigge la preda con gli aculei del collo e dopo\naverla immobilizzata la finisce con le sue tossine."
          y: "Incalza la preda con movimenti rapidi e la attacca\nripetutamente con le corna. Non si ferma fino al\ncolpo di grazia."
        de:
          x: "Lähmt seine Beute, indem es sie mit den Zacken an\nseinem Hals aufspießt. Mit einer Ladung Gift gibt es\nihr den Rest."
          y: "Holt Gegner flinken Fußes ein und greift sie mit\nden Hörnern an seinem Kopf an. Gnade ist ihm\nein Fremdwort."
        es:
          x: "Atenaza a sus presas con las garras que sobresalen de\nsu cuello hasta que no se pueden mover y las remata\ncon veneno."
          y: "Arrincona a sus rivales con rápidos movimientos y los\nensarta con sus cuernos. No se detiene hasta vencer."
        ko:
          x: "먹이를 목의 가시에 끼워 넣어\n움직이지 못하게 한 후\n맹독을 퍼뜨려 마무리한다."
          y: "빠른 움직임으로 적을 바싹 몰아넣어\n머리의 뿔로 공격한다.\n마무리 지을 때까지 봐주지 않는다."
cottonee:
  species_id: 546
  names:
    jp_kana: モンメン
    jp_kanji: モンメン
    en: Cottonee
    fr: Doudouvet
    it: Cottonee
    de: Waumboll
    es: Cottonee
    ko: 소미안
