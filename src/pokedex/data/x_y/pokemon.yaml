      types:
        - fire
      egg_groups:
        - field
      abilities:
        - run_away
        - flash_fire
      hidden_ability: flame_body
      descriptions:
        jp_kana:
          x: "うまれたばかりでは　たつのがやっと。\nだが　はしるほどに　あしこしは\nきたえられて　そくどが　ましていく。"
          y: "おやの　あとを　おいかけるうちに\nきょうじんな　あしこしに　なる。\n１にちじゅう　のやまを　かけまわる。"
        jp_kanji:
          x: "生まれたばかりでは　立つのがやっと。\nだが　走るほどに　足腰は\n鍛えられて　速度が　増していく。"
          y: "親の　あとを　追いかけるうちに\n強靭な　足腰になる。\n１日中　野山を　駆け回る。"
        en:
          x: "As a newborn, it can barely stand.\nHowever, through galloping, its\nlegs are made tougher and faster."
          y: "Its legs grow strong while it chases after its parent.\nIt runs in fields and mountains all day."
        fr:
          x: "Chancelantes à la naissance, ses pattes deviennent\ntrès vite sûres et solides à force de galoper."
          y: "Il muscle ses pattes en suivant ses parents. Il arpente\nles plaines et les montagnes toute la journée."
        it:
          x: "Alla nascita non riesce quasi a reggersi in piedi.\nGaloppando si rinforza e diventa più veloce."
          y: "Si rafforza le zampe rincorrendo i suoi genitori.\nCorre tutto il giorno per campi e monti."
        de:
          x: "Neugeboren kann es kaum stehen. Durch das\nGaloppieren werden seine Beine aber schneller\nund kräftiger."
          y: "Seine Beine werden kräftig, da es seinen Eltern\nhinterherläuft. Es rennt den ganzen Tag umher."
        es:
          x: "Cuando nace, apenas puede tenerse en pie. Pero va\nfortaleciendo las patas en cuanto empieza a galopar."
          y: "Fortalece las patas mientras sigue a sus padres. Corre\nen el campo y en la montaña todo el día."
        ko:
          x: "막 태어나서는 겨우 일어설 수 있을\n정도이지만 많이 달리면 하반신이\n단련되어 달리는 속도가 빨라진다."
          y: "부모의 뒤를 쫓아다니는 동안\n다리가 강인해진다.\n온종일 산과 들을 뛰어다닌다."
rapidash:
