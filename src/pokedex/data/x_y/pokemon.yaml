      descriptions:
        jp_kana:
          x: "つきあかりすら　ない　やみよを　とび\nゆだんしている　えものを　おそう。\nくらやみの　たたかいでは　むてきだ。"
          y: "みみから　はっする　ちょうおんぱで\nきょだいな　いわも　ふんさいする。\nくらやみに　まぎれて　おそいかかる。"
        jp_kanji:
          x: "月明かりすら　ない　闇夜を　飛び\n油断している　獲物を　襲う。\n暗闇の　戦いでは　無敵だ。"
          y: "耳から　発する　超音波で\n巨大な　岩も　粉砕する。\n暗闇に　紛れて　襲いかかる。"
        en:
          x: "They fly around on moonless nights\nand attack careless prey. Nothing can\nbeat them in a battle in the dark."
          y: "The ultrasonic waves it emits from its ears\ncan reduce a large boulder to pebbles.\nIt swoops out of the dark to attack."
        fr:
          x: "Les nuits sans lune, il quadrille le ciel à la recherche\nd’une proie. Dans l’obscurité, aucun Pokémon ne peut\nrivaliser avec lui."
          y: "Il peut littéralement pulvériser de gros rochers\ngrâce aux ultrasons émis par ses oreilles.\nIl surgit des ténèbres pour attaquer par surprise."
        it:
          x: "Vola nelle notti senza luna e attacca le prede\napprofittando di ogni loro minima distrazione.\nNell’oscurità è invincibile."
          y: "Grazie agli ultrasuoni che emette dalle orecchie, è in\ngrado di sbriciolare enormi massi. Attacca col favore\ndell’oscurità."
        de:
          x: "Es fliegt in finsterer, mondloser Nacht umher\nund macht Jagd auf achtlose Beute.\nIst bei Dunkelheit jedem Gegner überlegen."
          y: "Die Ultraschallwellen aus seinen Ohren zermalmen\nFelsen zu kleinen Kieseln. Greift stets im Schutz der\nDunkelheit an."
        es:
          x: "Surca el cielo nocturno cuando ni siquiera la luna brilla\ny ataca a presas incautas. Es imbatible en combates\nque tienen lugar a oscuras."
          y: "Las ondas ultrasónicas que emite por las orejas\npueden hacer añicos incluso rocas enormes.\nAprovecha la oscuridad para desplegar su ataque."
        ko:
          x: "달빛조차 없는 어둠 속을 날며\n방심하고 있는 사냥감을 덮친다.\n어둠 속의 싸움에서는 무적이다."
          y: "귀에서 발생하는 초음파로\n거대한 바위도 분쇄한다.\n어둠을 틈타 공격한다."
