          y: "あいての　うごきを　モノマネする\nしゅうせい。まねを　された　あいては\nめが　はなせなくなる　という。"
        jp_kanji:
          x: "相手の　動きを　そっくりに\n真似を　して　戸惑わせている\nあいだに　さっさと　逃げるのだ。"
          y: "相手の　動きを　モノマネする\n習性。真似を　された　相手は\n目が　離せなくなる　という。"
        en:
          x: "In an attempt to confuse its enemy, it mimics the\nenemy’s movements. Then it wastes no time in\nmaking itself scarce!"
          y: "It habitually mimics foes. Once mimicked, the foe\ncannot take its eyes off this Pokémon."
        fr:
          x: "Il déstabilise ses ennemis en imitant leurs mouvements\net profite de leur stupeur pour décamper."
          y: "Il imite ses ennemis. Une fois imités, ils ne peuvent\nplus quitter ce Pokémon des yeux."
        it:
          x: "Imita i movimenti del nemico, approfittando del suo\nmomento di confusione per fuggire."
          y: "Imita i movimenti dei nemici. Quando un nemico viene\nimitato, non riesce più a distogliere lo sguardo da lui."
        de:
          x: "Es ahmt seinen Gegner nach. Während dieser noch\nverblüfft dreinsieht, macht es sich aus dem Staub."
          y: "Es ahmt seinen Gegner nach. Der kann den Blick\ndanach nicht von ihm abwenden."
        es:
          x: "Desconcierta a sus rivales imitando sus movimientos a\nla perfección y aprovecha para darse a la fuga."
          y: "Suele imitar a sus enemigos. Cuando lo hace, su rival\nno puede apartar los ojos de él."
        ko:
          x: "상대의 움직임을 똑같이\n흉내 내어 당황한\n사이에 재빨리 도망친다."
          y: "상대의 움직임을 흉내 내는\n습성이 있다. 모방을 당한 상대는\n눈을 뗄 수 없게 된다고 한다."
