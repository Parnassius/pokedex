        jp_kana:
          x: "しっぽから　こうあつの　みずを\nはっしゃすると　コンクリートの\nかべも　はかいする　いりょく。"
          y: "みずが　きれいな　ばしょを　このむ。\nあたまに　ためこんだ　みずがへると\nしっぽから　すいあげて　ほきゅう。"
        jp_kanji:
          x: "尻尾から　高圧の　水を　発射すると\nコンクリートの　壁も\n破壊する　威力。"
          y: "水が　きれいな　場所を　好む。\n頭に　ためこんだ　水が減ると\n尻尾から　吸いあげて　補給。"
        en:
          x: "The high-pressure water expelled from its tail is so\npowerful, it can destroy a concrete wall."
          y: "It prefers places with clean water. When its tuft runs\nlow, it replenishes it by siphoning up water with\nits tail."
        fr:
          x: "Le jet d’eau à haute pression qu’il propulse par la\nqueue est assez puissant pour traverser un mur de\nbéton."
          y: "Il aime les endroits où l’eau est pure. Il se ravitaille\nen eau en l’aspirant avec sa queue."
        it:
          x: "Spruzza dalla coda un getto d’acqua ad alta\npressione, con una potenza tale da distruggere\nanche pareti di cemento."
          y: "Predilige i luoghi dove l’acqua è pura. Se l’acqua\nche ha sul capo diminuisce, ne aggiunge altra\naspirandola con la coda."
        de:
          x: "Es schießt mit so hohem Druck Wasser\naus seinem Schweif, dass selbst Betonwände\nden Kürzeren ziehen."
          y: "Hält sich bevorzugt in reinen Gewässern auf.\nGeht ihm das Wasser in seinem Kopf aus,\ntankt es mit seinem Schweif nach."
        es:
          x: "Cuando lanza agua a alta presión con su cola, puede\nincluso resquebrajar una pared de cemento."
          y: "Le encantan los lugares con agua limpia. Cuando\ndesciende el nivel de agua de su pelo, se abastece\na través de su cola."
        ko:
          x: "꼬리에서 발사하는 고압의 물은\n콘크리트 벽도 파괴할 수 있는\n위력을 지녔다."
          y: "물이 깨끗한 장소를 좋아한다.\n머리에 모아둔 물이 줄어들면\n꼬리에서 빨아올려 보급한다."
munna:
  species_id: 517
  names:
    jp_kana: ムンナ
    jp_kanji: ムンナ
    en: Munna
    fr: Munna
    it: Munna
    de: Somniam
