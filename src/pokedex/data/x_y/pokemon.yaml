      hidden_ability: huge_power
      descriptions:
        jp_kana:
          x: "おおきな　みみは　１トンを　こえる\nいわを　らくに　もちあげる　パワー。\nこうじげんばで　だいかつやくする。"
          y: "ショベルカーなみの　パワーの　みみで\nかたい　がんばんも　コナゴナ。あなを\nほりおえると　ダラダラと　すごす。"
        jp_kanji:
          x: "大きな　耳は　１トンを　超える 岩を\n楽に　持ち上げる　パワー。\n工事現場で　大活躍する。"
          y: "ショベルカー並みの　パワーの　耳で\n硬い　岩盤も　コナゴナ。穴を\n掘り終えると　ダラダラと　過ごす。"
        en:
          x: "With their powerful ears, they can heft\nboulders of a ton or more with ease.\nThey can be a big help at construction sites."
          y: "As powerful as an excavator, its ears\ncan reduce dense bedrock to rubble.\nWhen it’s finished digging, it lounges lazily."
        fr:
          x: "Ses grandes oreilles sont si musclées qu’il peut\nsoulever un rocher d’une tonne sans broncher.\nCe Pokémon est souvent utilisé sur les chantiers."
          y: "Ses oreilles sont de véritables excavateurs, venant à\nbout des blocs de pierre les plus durs.\nAprès l’effort, il se repose en paressant."
        it:
          x: "Con le sue grandi orecchie può sollevare facilmente\nmassi da più di una tonnellata. Può essere di grande\naiuto nei cantieri edili."
          y: "Le orecchie potenti quanto una scavatrice\ngli permettono di sbriciolare anche rocce durissime.\nQuando ha finito di scavare, si rilassa beatamente."
        de:
          x: "Seine großen Ohren besitzen die Kraft, selbst Felsen,\ndie 1 t schwer sind, mühelos hochzuheben.\nEs wird daher oft auf Baustellen eingesetzt."
          y: "Mit Ohren so mächtig wie ein Bagger kann es selbst\ndas härteste Gestein zertrümmern. Ist es fertig mit\nGraben, lümmelt es herum."
        es:
          x: "Sus grandes orejas tienen tal fuerza que con ellas\npuede levantar con facilidad rocas de más de una\ntonelada. Es de una ayuda inestimable en las obras."
          y: "Sus orejas, tan poderosas como una excavadora,\npueden hacer añicos hasta la roca más sólida.\nCuando termina de cavar, se toma un respiro."
        ko:
          x: "커다란 귀에는 무게가 1톤을 넘는 바위를\n가뿐히 들어 올릴 만한 파워가 있다.\n공사 현장에서 대활약한다."
          y: "굴착기에 버금가는 파워의 귀로\n단단한 암반도 산산조각 낸다.\n구멍을 다 파면 빈둥빈둥 지낸다."
fletchling:
  species_id: 661
  names:
    jp_kana: ヤヤコマ
    jp_kanji: ヤヤコマ
    en: Fletchling
    fr: Passerouge
