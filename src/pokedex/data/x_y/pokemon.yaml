          y: "あしの　さきは　どんなところにも\nすいつく　きゅうばん。ひっしに\nきのぼりをして　はっぱを　たべる。"
        jp_kanji:
          x: "頭の　触覚から\n強烈な　においを　出して\n敵を　追い払い　身を守る。"
          y: "足の　先は　どんなところにも\n吸いつく　吸盤。必死に\n木登りをして　葉っぱを　食べる。"
        en:
          x: "For protection, it releases a horrible stench from\nthe antennae on its head to drive away enemies."
          y: "Its feet have suction cups designed to stick to any\nsurface. It tenaciously climbs trees to forage."
        fr:
          x: "Pour se protéger, il émet un gaz puant par ses\nantennes, qui fait fuir ses ennemis audacieux."
          y: "Ses pattes ont des ventouses lui permettant de\ngrimper sur toute surface, notamment les arbres."
        it:
          x: "Per proteggersi emette un puzzo terribile\ndall’antenna sul capo, tenendo lontani i nemici."
          y: "Le sue zampe hanno ventose che possono aderire\na ogni superficie. Sale sugli alberi cercando cibo."
        de:
          x: "Als Schutz vor Feinden sondert es einen übel\nriechenden Gestank mit seinen Antennen ab."
          y: "Die Saugnäpfe an den Beinen haften auf jedem\nUntergrund. Es sucht hartnäckig in Bäumen\nnach Futter."
        es:
          x: "Para protegerse despide un hedor horrible de sus\nantenas, con el que repele a sus enemigos."
          y: "Sus patas tienen ventosas con las que se adhiere a\ncualquier sitio. Escala árboles buscando forraje."
        ko:
          x: "머리의 더듬이로부터\n강렬한 냄새를 내어\n적을 물리치고 몸을 보호한다."
          y: "발끝에는 어디든지\n달라붙는 빨판이 있다. 필사적으로\n나무 타기를 해서 나뭇잎을 먹는다."
