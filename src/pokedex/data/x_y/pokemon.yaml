          x: "It shelters itself in its shell, then strikes back\nwith spouts of water at every opportunity."
          y: "Shoots water at prey while in the water. Withdraws\ninto its shell when in danger."
        fr:
          x: "Il se réfugie dans sa carapace et réplique en\néclaboussant l’ennemi à la première occasion."
          y: "Caché sous l’eau, il crache un jet d’eau sur sa proie\net se cache à l’intérieur de sa carapace."
        it:
          x: "Si ritira nel suo guscio e, alla prima occasione,\ncontrattacca colpendo il nemico con spruzzi d’acqua."
          y: "Attacca i nemici con potenti getti d’acqua. Se si\nsente in pericolo si ritira dentro la sua corazza."
        de:
          x: "Es zieht sich in seinen Panzer zurück und greift\ndann mit Wasserstrahlen seine Gegner an."
          y: "Dieses Pokémon jagt mit einem Wasserstrahl.\nBei Gefahr zieht es sich in seinen Panzer zurück."
        es:
          x: "Se protege con su caparazón y luego contraataca\nlanzando agua a presión cuando tiene oportunidad."
          y: "Lanza agua a su presa desde el agua. Se esconde en\nsu concha cuando se siente en peligro."
        ko:
          x: "등껍질에 숨어 몸을 보호한다.\n상대의 빈틈을 놓치지 않고\n물을 뿜어내어 반격한다."
          y: "수면에서 물을 분사하여\n먹이를 잡는다. 위험해지면 등껍질에\n손발을 감추고 몸을 지킨다."
