          y: "じぶんより　つよくて　おおきな\nあいてにも　おそれずに　たちむかう\nゆうかんで　たのもしい　せいかく。"
        jp_kanji:
          x: "人懐こく　誠実な　性格。\n敵には　ほえて　かみつき\n追い払おうとする。"
          y: "自分より　強くて　大きな　相手にも\n恐れずに　立ち向かう\n勇敢で　頼もしい　性格。"
        en:
          x: "Very friendly and faithful to people. It will try to\nrepel enemies by barking and biting."
          y: "It has a brave and trustworthy nature. It fearlessly\nstands up to bigger and stronger foes."
        fr:
          x: "Ce Pokémon est particulièrement affectueux et loyal.\nIl aboie et il mord pour se débarrasser de ses\nadversaires."
          y: "Il est courageux et fier. Il se dresse vaillamment\ndevant ses ennemis même s’ils sont plus puissants."
        it:
          x: "Molto amichevole e fedele verso le persone.\nAllontana i nemici abbaiando e mordendoli."
          y: "Coraggioso e fedele, si oppone senza timore anche\na nemici più grandi e forti di lui."
        de:
          x: "Es ist sehr freundlich und bleibt den Menschen\ntreu. Durch Bellen und Beißen versucht es,\nGegner zu verscheuchen."
          y: "Es ist von Natur aus tapfer und vertrauenswürdig.\nEs scheut nicht vor starken Gegnern zurück."
        es:
          x: "Es muy agradable y leal. Para ahuyentar al enemigo,\nse pone a ladrar y a dar bocados."
          y: "De naturaleza valiente y honrada, se enfrenta sin\nmiedo a enemigos más grandes y fuertes."
        ko:
          x: "사람을 잘 따르는 충실한 성격이다.\n적에게는 짖거나 물며\n쫓아내려고 한다."
          y: "자신보다 강하고 큰\n상대라도 겁 없이 맞서는\n용감하고 믿음직한 성격이다."
arcanine:
  species_id: 59
