      descriptions:
        jp_kana:
          x: "きたの　つめたい　うみを　このむ。\nくちから　はきだした　いきをこおらせ\nうみのうえに　みちをつくり　あるく。"
          y: "はく　いきを　こおらせて　こおりの\nキバや　ツメを　つくり　たたかう。\nきたの　さむい　とちで　くらす。"
        jp_kanji:
          x: "北の　冷たい　海を　好む。\n口から　吐きだした　息を凍らせ\n海の上に　道をつくり　歩く。"
          y: "吐く　息を　凍らせて　氷の　キバや\nツメを　作り　戦う。\n北の　寒い　土地で　暮らす。"
        en:
          x: "They love the cold seas of the north. They create\npathways across the ocean waters by freezing their\nown breath."
          y: "It freezes its breath to create fangs and claws of ice\nto fight with. Cold northern areas are its habitat."
        fr:
          x: "Il aime les mers glaciales du nord. Il y trace son\nchemin en créant des îlots de glace pour éviter de\nnager."
          y: "Il gèle son haleine et en fait des crocs et des griffes\nde glace pour combattre. Il vit dans les terres gelées\ndu nord."
        it:
          x: "Predilige i freddi mari del nord. Crea strade di\nghiaccio soffiando con il suo alito gelido sulla\nsuperficie del mare."
          y: "Lotta usando zanne o artigli creati congelando il suo\nstesso respiro. Vive nelle fredde regioni del nord."
        de:
          x: "Es liebt die kalten Meere im Norden und überquert\nihre Flächen auf Stegen, die es mit seinem\ngefrorenen Atem baut."
          y: "Kämpft mit Reißzähnen aus Eis, die es aus gefrorenem\nAtem herstellt. Es lebt im Norden, wo es kalt ist."
        es:
          x: "Adoran los mares gélidos del norte. Congelan su\naliento para crear sendas por las que caminar sobre\nlas aguas."
          y: "Congela su aliento y crea colmillos y garras de hielo\npara combatir. Vive en las gélidas tierras del norte."
        ko:
          x: "북쪽의 차가운 바다를 좋아한다.\n입에서 내뿜는 숨을 얼려\n바다 위에 길을 만들어 걷는다."
          y: "내뱉는 숨을 얼려 얼음 이빨이나\n손톱을 만들어서 싸운다.\n추운 북쪽 땅에서 산다."
cryogonal:
  species_id: 615
  names:
    jp_kana: フリージオ
