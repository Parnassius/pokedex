        jp_kana:
          x: "ゴルーグを　つくった　こだいじんから\nひとや　ポケモンを　まもるように\nめいれいされていると　いわれている。"
          y: "マッハの　スピードで　そらを　とぶ。\nむねの　ふういんを　はがすと\nエネルギーが　ぼうそうしてしまう。"
        jp_kanji:
          x: "ゴルーグを　作った　古代人から\n人や　ポケモンを　守るように\n命令されていると　言われている。"
          y: "マッハの　スピードで　空を　飛ぶ。\n胸の　封印を　はがすと\nエネルギーが　暴走してしまう。"
        en:
          x: "It is said that Golurk were ordered to protect\npeople and Pokémon by the ancient people who\nmade them."
          y: "It flies across the sky at Mach speeds. Removing\nthe seal on its chest makes its internal energy go\nout of control."
        fr:
          x: "Ses créateurs d’une lointaine époque lui auraient\nordonné de protéger les humains et les Pokémon."
          y: "Il vole à la vitesse du son. Si le sceau sur sa poitrine\nest retiré, il perd tout contrôle de lui-même."
        it:
          x: "Si narra che gli antichi costruttori dei Golurk avessero\nordinato loro di proteggere gli uomini e i Pokémon."
          y: "Vola alla velocità del suono. Se rimuove il sigillo che\nha sul petto, sprigiona un’energia incontrollabile."
        de:
          x: "Man munkelt, sein Schöpfer habe ihm aufgetragen,\nschützend über Pokémon und Menschen zu wachen."
          y: "Es jagt mit Schallgeschwindigkeit durch die Lüfte.\nNimmt man das Siegel auf der Brust ab, gerät es\naußer Kontrolle."
        es:
          x: "Al parecer, aquel que antaño lo creó le ordenó\nproteger a los Pokémon y a los humanos."
          y: "Vuela a velocidad mach. Pierde el control de su\nenergía si se le retira el sello del pecho."
        ko:
          x: "골루그를 만든 고대인에게\n사람과 포켓몬을 지키도록\n명령받았다고 전해진다."
          y: "마하의 스피드로 하늘을 난다.\n가슴의 봉인을 떼어내면\n에너지가 폭주해 버린다."
pawniard:
  species_id: 624
