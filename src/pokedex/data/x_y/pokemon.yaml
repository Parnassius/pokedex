          y: "サイコパワーを　ほうしゅつして\nおそってきた　てきを　げきたい。\nテレパシーで　なかまと　かいわする。"
        jp_kanji:
          x: "体が　特殊な　液体に\n包まれているので　どんな　きびしい\n状況でも　平気なのだ。"
          y: "サイコパワーを　放出して\n襲ってきた　敵を　撃退。\nテレパシーで　仲間と　会話する。"
        en:
          x: "Because their bodies are enveloped in a special\nliquid, they are fine in any environment, no matter\nhow severe."
          y: "They drive away attackers by unleashing psychic\npower. They can use telepathy to talk with others."
        fr:
          x: "Son corps est enrobé dans un fluide spécial, ce qui lui\npermet de vivre dans n’importe quel environnement."
          y: "Ils repoussent leurs assaillants avec leurs pouvoirs\npsychiques et communiquent entre eux par télépathie."
        it:
          x: "Il liquido speciale in cui è avvolto il suo corpo gli\npermette di resistere alle condizioni più estreme."
          y: "Utilizza i suoi poteri psichici per respingere gli\naggressori. Comunica con i compagni usando la\ntelepatia."
        de:
          x: "Die spezielle Flüssigkeit, die es umgibt, bietet ihm\nin jeder noch so gefährlichen Situation Schutz."
          y: "Es wehrt Angreifer ab, indem es Psycho-Kräfte auf sie\nansetzt. Es kommuniziert telepathisch mit Artgenossen."
        es:
          x: "Gracias a la sustancia viscosa que envuelve su cuerpo,\npermanece tranquilo por dura o rigurosa que sea la\nsituación."
          y: "Desata su poder psíquico para ahuyentar al enemigo.\nSe comunica con sus compañeros por telepatía."
        ko:
          x: "몸이 특수한 액체로\n둘러싸여 있어 어떤 곤란한\n상황이라도 문제없다."
          y: "사이코 파워를 방출하여\n달려드는 상대를 물리친다.\n텔레파시로 동료와 대화한다."
