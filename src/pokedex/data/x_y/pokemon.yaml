      descriptions:
        jp_kana:
          x: "しつこい　せいかくの　ポケモン。\nめをつけた　えものが　ヘトヘトに\nつかれるまで　おいかけまわす。"
          y: "するどい　きゅうかくで　ねらった\nえものは　ぜったいに　にがさない。\nとっても　しつこい　せいかくだ。"
        jp_kanji:
          x: "しつこい　性格の　ポケモン。\n目をつけた　獲物が　ヘトヘトに\n疲れるまで　追いかけ回す。"
          y: "鋭い　きゅうかくで　ねらった　獲物は\n絶対に　逃がさない。\nとっても　しつこい　性格だ。"
        en:
          x: "A Pokémon with a persistent nature, it chases its\nchosen prey until the prey becomes exhausted."
          y: "It has a very tenacious nature. Its acute sense of\nsmell lets it chase a chosen prey without ever\nlosing track."
        fr:
          x: "Un Pokémon très obstiné qui poursuit sa proie jusqu’à\nce qu’elle soit épuisée."
          y: "Medhyèna est d’un tempérament tenace.\nSon odorat très développé lui permet de ne jamais\nperdre la trace de sa proie."
        it:
          x: "Pokémon di natura ostinata. Insegue la preda\nprescelta finché questa non è esausta."
          y: "Pokémon molto tenace. L’olfatto sviluppatissimo gli\npermette di seguire una preda senza mai perderne\nle tracce."
        de:
          x: "Ein beharrliches Pokémon, das seine Beute jagt,\nbis diese erschöpft ist."
          y: "Es hat ein hartnäckiges Wesen. Sein präziser\nGeruchssinn ermöglicht ihm, seiner Beute\nnachzujagen, ohne die Fährte zu verlieren."
        es:
          x: "Es muy persistente. Si se fija en una presa, no la\ndejará hasta que caiga agotada."
          y: "Es tenaz por naturaleza. Tiene un sentido del olfato\ntan agudo que nunca se le escapa la presa que quiere."
        ko:
          x: "집요한 성격의 포켓몬이다.\n점찍은 먹이가 기진맥진\n지칠 때까지 뒤쫓아간다."
          y: "날카로운 후각으로 노린\n먹이는 절대로 놓치지 않는다.\n매우 끈질긴 성격이다."
mightyena:
