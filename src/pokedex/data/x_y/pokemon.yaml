          y: "だいすきな　トレーナーの　うでに\nリボンのような　しょっかくを\nまきつけて　いっしょに　あるく。"
        jp_kanji:
          x: "リボンのような　触覚から\n気持ちを　和らげる　波動を　送りこみ\n戦いを　やめさせる。"
          y: "大好きな　トレーナーの　腕に\nリボンのような　触覚を　巻きつけて\n一緒に　歩く。"
        en:
          x: "It sends a soothing aura from its\nribbonlike feelers to calm fights."
          y: "It wraps its ribbonlike feelers around\nthe arm of its beloved Trainer\nand walks with him or her."
        fr:
          x: "Pour arrêter le combat, il émet des ondes apaisantes\navec ses rubans."
          y: "Il enroule ses rubans sensoriels autour du bras de\nson Dresseur adoré et chemine paisiblement à\nses côtés."
        it:
          x: "Le sue antenne simili a fiocchetti emettono onde dagli\neffetti rilassanti, grazie alle quali fa cessare le lotte."
          y: "Se si affeziona particolarmente al suo Allenatore, lo\naccompagna circondandogli amorevolmente il braccio\ncon le sue antenne a forma di fiocchetto."
        de:
          x: "Seinen bandförmigen Fühlern lässt\nes beruhigende Wellen entströmen,\ndie das Ende von Kämpfen herbeiführen."
          y: "Es umwickelt den Arm seines geliebten Trainers mit\nseinen bandförmigen Fühlern und geht so mit ihm\nspazieren."
        es:
          x: "A través de sus apéndices sensitivos con forma de\ncinta, emite unas ondas tranquilizadoras mediante las\ncuales detiene los combates."
          y: "Enrolla sus apéndices sensoriales con forma de cinta\nen los brazos de su querido Entrenador cuando\ncaminan juntos."
        ko:
          x: "리본 모양의 더듬이에서\n마음을 온화하게 하는 파동을\n보내 싸움을 그만두게 한다."
          y: "좋아하는 트레이너의 팔에\n리본 모양의 더듬이를\n감고 함께 걷는다."
hawlucha:
