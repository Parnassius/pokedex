mothim:
  species_id: 414
  names:
    jp_kana: ガーメイル
    jp_kanji: ガーメイル
    en: Mothim
    fr: Papilord
    it: Mothim
    de: Moterpel
    es: Mothim
    ko: 나메일
  forms:
    mothim:
      form_id: 0
      base_stats:
        hp: 70
        attack: 94
        defense: 50
        special_attack: 94
        special_defense: 50
        speed: 66
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - swarm
      hidden_ability: tinted_lens
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          x: "はなの　ミツが　だいすき。\nミツハニーの　あつめた　ミツを\nよこどりして　たべてしまう。"
          y: "よなか　かっぱつに　とびまわり\nねむっている　ミツハニーの　す　から\nミツを　うばって　にげる。"
        jp_kanji:
          x: "花の　ミツが　大好き。\nミツハニーの　集めた　ミツを\n横取りして　食べてしまう。"
          y: "夜中　活発に　飛び回り\n眠っている　ミツハニーの　巣から\nミツを　奪って　逃げる。"
        en:
          x: "It loves the honey of flowers and steals honey\ncollected by Combee."
          y: "It flutters around at night and steals honey from\nthe Combee hive."
        fr:
          x: "Il aime le nectar des fleurs et n’hésite pas à voler\ncelui que récupère Apitrini."
          y: "Ce Pokémon s’active à la nuit tombée pour voler\nle miel des Apitrini pendant leur sommeil."
        it:
          x: "Ama il nettare dei fiori. Ruba e mangia il nettare\nraccolto da Combee."
          y: "Vola qua e là di notte per derubare i Combee del\nloro nettare mentre dormono, e poi fuggire."
        de:
          x: "Es liebt Honig und stiehlt den Honig,\nder von Wadribie gesammelt wurde."
          y: "Nachts fliegt es emsig umher und stiehlt,\nwährend Wadribie schläft, Honig aus dessen Nest."
        es:
          x: "Le encanta la miel de las flores y roba la que recoge\nCombee."
          y: "Hace vida nocturna. Revolotea y roba la miel de las\ncolmenas de Combee cuando duermen."
        ko:
          x: "꽃의 꿀을 매우 좋아한다.\n세꿀버리가 모아둔 꿀을\n가로채어 먹어 버린다."
          y: "한밤중에 활발하게 날아다니며\n잠든 세꿀버리의 둥지에서\n꿀을 훔쳐 달아난다."
combee:
  species_id: 415
  names:
    jp_kana: ミツハニー
    jp_kanji: ミツハニー
    en: Combee
    fr: Apitrini
    it: Combee
    de: Wadribie
    es: Combee
    ko: 세꿀버리
