      hidden_ability: soundproof
      descriptions:
        jp_kana:
          x: "よこいちれつに　ならぶと　どんな\nポケモンでも　とっぱ　できない。\nそうやって　こどもを　まもっていた。"
          y: "しょうめんからの　こうげきは\nすべて　はねかえす。くさや　きのみを\nたべる　おとなしい　せいかく。"
        jp_kanji:
          x: "横一列に　並ぶと　どんな\nポケモンでも　突破　できない。\nそうやって　子供を　守っていた。"
          y: "正面からの　攻撃は\nすべて　跳ね返す。草や　木の実を\n食べる　おとなしい　性格。"
        en:
          x: "When they lined up side by side, no foe could\nbreak through. They shielded their young in\nthat way."
          y: "Any frontal attack is repulsed. It is a docile\nPokémon that feeds on grass and berries."
        fr:
          x: "En groupe, ils protègent leurs petits en formant autour\nd’eux une impénétrable muraille."
          y: "Il résiste à toute attaque frontale. C’est un Pokémon\ndocile qui se nourrit d’herbe et de Baies."
        it:
          x: "Se si mettono uno di fianco all’altro nessun nemico\nriesce a passare. Proteggono così i loro cuccioli."
          y: "Respinge qualsiasi attacco frontale. È un Pokémon\ndocile che si nutre di erba e di bacche."
        de:
          x: "Stellen sie sich Seite an Seite, kann kein Gegner\nhindurchbrechen. So schützen sie auch ihre Jungen."
          y: "Jeder Frontalangriff wird abgeschmettert. Dieses\nfriedliche Pokémon ernährt sich von Gras und Beeren."
        es:
          x: "Se alineaban y creaban una barrera que ningún\nenemigo podía cruzar. Así protegían a sus crías."
          y: "Repele cualquier ataque frontal. Es muy dócil y se\nalimenta de hierba y bayas."
        ko:
          x: "옆에 한 줄로 세우면 어떤\n포켓몬이라도 돌파하지 못한다.\n그렇게 하여 아기를 지켜냈다."
          y: "정면에서의 공격은 전부 튕겨낸다.\n풀이나 나무열매를 먹는\n얌전한 성격이다."
