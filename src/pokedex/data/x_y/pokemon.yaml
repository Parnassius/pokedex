          y: "ゴミを　すいとっては　たいないで\nあたらしい　しゅるいの　どくガスや\nどくの　えきたいを　うみだしている。"
        jp_kanji:
          x: "左腕で　相手を　絞めつけて\n口から　吐き出す　悪臭の　毒ガスで\nとどめを　刺すのだ。"
          y: "ゴミを　吸いとっては　体内で\n新しい　種類の　毒ガスや\n毒の　液体を　生みだしている。"
        en:
          x: "It clenches opponents with its left arm and finishes\nthem off with foul-smelling poison gas belched from\nits mouth."
          y: "Consuming garbage makes new kinds of poison\ngases and liquids inside their bodies."
        fr:
          x: "Il étrangle ses ennemis avec son bras gauche et les\nachève avec le gaz puant et empoisonné qu’il exhale\npar la bouche."
          y: "Il aspire les déchets et les intègre à son corps pour\nproduire des gaz et des fluides toxiques."
        it:
          x: "Serra l’avversario con l’arto sinistro e gli dà il colpo\ndi grazia esalando dalla bocca un fetido gas velenoso."
          y: "Assorbe la spazzatura nel suo corpo per creare dei\nliquidi velenosi e dei gas tossici sempre nuovi."
        de:
          x: "Es nimmt mit dem rechten Arm Gegner in\ndie Mangel und gibt ihnen mit dem giftigen Gas\naus seinem Maul den Rest."
          y: "Jedes Mal, wenn es frischen Müll in sich aufsaugt,\nerzeugt es völlig neue Formen von Giftgasen und\nToxinen."
        es:
          x: "Apresa a su rival con el brazo izquierdo y le da el\ngolpe de gracia exhalando por la boca un apestoso\ngas venenoso."
          y: "Absorbe y procesa en su interior basura para generar\nnuevos gases nocivos y líquidos venenosos de alta\nvirulencia."
        ko:
          x: "왼팔로 상대를 꼭 붙들고\n입에서 악취가 나는 독가스를\n토해내서 마무리한다."
          y: "쓰레기를 흡수해서 체내에서\n새로운 종류의 독가스나\n독의 액체를 만들어낸다."
