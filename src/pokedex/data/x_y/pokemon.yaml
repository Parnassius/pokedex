          y: "がんばんのような　かたい　カラに\nおおわれているが　ちからは　つよく\nあばれると　やまも　くずれてしまう。"
        jp_kanji:
          x: "岩盤のような　硬い　体。\n圧縮した　ガスを　噴射して\nまるで　ロケットのように　飛び出す。"
          y: "岩盤のような　硬い　殻に\n覆われているが　力は　強く\n暴れると　山も　崩れてしまう。"
        en:
          x: "Its body is as hard as bedrock. By venting\npressurized gas, it can launch itself like a rocket."
          y: "Its shell is as hard as sheet rock, and it is also very\nstrong. Its thrashing can topple a mountain."
        fr:
          x: "Son corps est dur comme la pierre souterraine.\nIl file comme une fusée en expulsant des gaz."
          y: "Sa carapace est aussi dure que la pierre et il est très\nfort. Ses coups peuvent raser une montagne."
        it:
          x: "Il suo corpo è duro come la roccia. Riesce a muoversi\ncome un razzo espellendo gas con tutta la sua forza."
          y: "Fortissimo e con un guscio duro come roccia.\nHa un Colpo capace di abbattere una montagna."
        de:
          x: "Sein Körper ist hart wie Fels. Es lässt mit\nHochdruck Gas ab, um wie eine Rakete nach\noben zu schießen."
          y: "Es ist sehr stark und sein Panzer ist steinhart. Setzt es\nFuchtler ein, kann es einen Berg umstürzen."
        es:
          x: "Su cuerpo es duro como la roca. Se autopropulsa\ncomo un cohete soltando los gases de su interior."
          y: "Su caparazón es duro como una piedra y muy\nresistente. Su Golpe puede derribar montañas."
        ko:
          x: "암반 같은 단단한 몸이다.\n압축한 가스를 분사해서\n마치 로켓같이 날아간다."
          y: "암반 같은 단단한 껍질로\n둘러싸여 있지만 힘이 강해서\n난동을 부리면 산도 무너져버린다."
