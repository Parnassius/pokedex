          y: "大昔は　丈夫な　殻で\n体を　守っていたらしい。\n海の　浅瀬に　生息する。"
        en:
          x: "When its natural enemy attacks, it oozes purple\nfluid and escapes."
          y: "It apparently had a huge shell for protection in\nancient times. It lives in shallow tidal pools."
        fr:
          x: "Attaqué par un prédateur, il fuit en libérant un liquide\nmauve."
          y: "Jadis, il semble qu’il portait une grande carapace\npour se protéger. Il hante les eaux peu profondes."
        it:
          x: "Se minacciato da un nemico naturale rilascia un\nliquido viola e se la dà a gambe, per così dire..."
          y: "Pare che in passato il suo corpo fosse protetto da\nun enorme carapace. Vive in bacini poco profondi."
        de:
          x: "Wird es von einem natürlichen Feind angegriffen,\nflieht es, indem es ein lila Sekret über die Haut\nausstößt."
          y: "In Urzeiten muss es einen großen Schutzpanzer\nbesessen haben. Es lebt in kleinen Wasserstellen."
        es:
          x: "Si se ve amenazado por sus enemigos naturales,\nsegrega un líquido morado y huye rápidamente."
          y: "Al parecer, hace mucho tiempo tenía una gran concha\nprotectora. Vive en aguas poco profundas."
        ko:
          x: "천적에게 습격당했을 때는\n보라색 액체를\n몸에서 내어 도망간다."
          y: "아주 옛날에는 튼튼한 껍질로\n몸을 보호하고 있었던 듯하다.\n바다의 얕은 곳에서 서식한다."
