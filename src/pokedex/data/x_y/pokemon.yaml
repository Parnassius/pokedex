          y: "エンテイが　ほえると\nせかいの　どこかの　かざんが\nふんかすると　いわれている。"
        jp_kanji:
          x: "新しい　火山が　できるたび\n生まれてくると　伝えられる\n大地を　駆け巡る　ポケモン。"
          y: "エンテイが　ほえると\n世界の　どこかの　火山が\n噴火すると　言われている。"
        en:
          x: "A Pokémon that races across the land. It is said\nthat one is born every time a new volcano appears."
          y: "It is said that when it roars, a volcano erupts\nsomewhere around the globe."
        fr:
          x: "Un Pokémon qui parcourt le monde. On dit qu’il en\nnaît un à chaque fois qu’un volcan apparaît."
          y: "On raconte qu’à chaque fois qu’il rugit, un volcan\nentre en éruption quelque part."
        it:
          x: "Un Pokémon che corre in lungo e in largo. Si dice\nche nasca ogni volta che si forma un nuovo vulcano."
          y: "Si dice che quando emette il suo verso, da qualche\nparte nel mondo un vulcano stia eruttando."
        de:
          x: "Dieses Pokémon jagt über das Land. Man sagt,\nin jedem neuen Vulkan wird ein Entei geboren."
          y: "Man sagt, wenn es brüllt, bricht irgendwo\nin der Welt ein Vulkan aus."
        es:
          x: "Un Pokémon que corre por la tierra. Dicen que siempre\nnace uno cuando aparece un nuevo volcán."
          y: "Se dice que, cuando ruge, un volcán entra en erupción\nen algún punto del globo."
        ko:
          x: "새로운 화산이 생길 때마다\n태어난다고 전해지는\n대지를 달리는 포켓몬이다."
          y: "앤테이가 울부짖으면\n세계 어딘가의 화산이\n분화한다고 전해진다."
