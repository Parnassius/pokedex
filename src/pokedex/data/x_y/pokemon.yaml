          y: "ほしあかりが　かがやく　よるに\nねている　こどもたちを　あやつって\nあそぶ　はなしが　おおく　のこる。"
        jp_kanji:
          x: "星明りが　パワーの　源。\n夜になると　サイコパワーで　石を\n浮かべて　星の　配置を　印す。"
          y: "星明かりが　輝く　夜に\n寝ている　子供たちを　操って\n遊ぶ　話が　多く　残る。"
        en:
          x: "Starlight is the source of their power. At night,\nthey mark star positions by using psychic power\nto float stones."
          y: "According to many old tales, it creates friends for\nitself by controlling sleeping children on\nstarry nights."
        fr:
          x: "Tire son énergie de la lumière des étoiles et marque\nleur position en faisant léviter des pierres la nuit."
          y: "On dit qu’ils apparaissent les nuits étoilées et\nmanipulent les enfants pour jouer avec eux."
        it:
          x: "Trae energia dalla luce delle stelle. Ne traccia la\nposizione facendo levitare le pietre con i poteri\npsichici."
          y: "Si racconta che nelle notti stellate, per giocare con\ni bambini addormentati, si diverta a muoverli come\npupazzi."
        de:
          x: "Zieht seine Energie aus dem Sternenlicht.\nBei Nacht bringt es Steine zum Schweben\nund bildet damit Sternzeichen nach."
          y: "Erzählungen zufolge machen sie sich einen Spaß\ndaraus, in sternklaren Nächten von schlafenden\nKindern Besitz zu ergreifen."
        es:
          x: "La luz de las estrellas origina su poder. De noche,\nmarca su posición haciendo levitar piedras con su\npoder psíquico."
          y: "Según muchas leyendas, durante las noches\nestrelladas controlan a los niños que duermen,\ntan solo como diversión."
        ko:
          x: "별빛이 힘의 원천이다.\n밤이 되면 사이코 파워로 돌을\n띄워 별의 배치를 표시한다."
          y: "별빛이 빛나는 밤에\n잠자는 아이들을 조종해서\n논다는 이야기가 많이 남아 있다."
gothitelle:
