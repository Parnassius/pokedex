      descriptions:
        jp_kana:
          x: "げんきの　ない　ポケモンに\nあたまの　はっぱを　わけあたえる。\nつかれを　とる　こうかが　あるのだ。"
          y: "きのみを　さがすのが　じょうずで\nあちこちで　あつめて　なかまに\nわけあたえる　やさしさを　もつ。"
        jp_kanji:
          x: "元気の　ない　ポケモンに\n頭の　葉っぱを　分け与える。\n疲れを　取る　効果が　あるのだ。"
          y: "木の実を　探すのが　上手で\nあちこちで　集めて　仲間に\n分け与える　優しさを　持つ。"
        en:
          x: "It shares the leaf on its head with weary-looking\nPokémon. These leaves are known to relieve stress."
          y: "It’s good at finding berries and gathers them from\nall over. It’s kind enough to share them\nwith friends."
        fr:
          x: "Les feuilles qui poussent sur sa tête soignent la\nfatigue. Il en donne aux Pokémon affaiblis."
          y: "Il est très doué pour trouver des Baies et aime les\npartager avec ses amis sans rien demander en\néchange."
        it:
          x: "Distribuisce le foglie sulla sua testa ai Pokémon\naffaticati, per alleviare la loro stanchezza."
          y: "È un Pokémon molto generoso. Abilissimo nello\nscovare le bacche, va in giro a raccoglierle per poi\ncondividerle."
        de:
          x: "Schwächelnden Pokémon gibt es ein paar der Kräuter\nauf seinem Kopf ab und hilft ihnen so wieder\nauf die Beine."
          y: "Ein nettes Kerlchen, das so talentiert darin ist,\nBeeren aufzuspüren, dass es sie mit all seinen\nKameraden teilt."
        es:
          x: "Comparte las hojas de su cabeza con Pokémon\nagotados. Posee la facultad de aliviar el cansancio."
          y: "Es todo un experto en la búsqueda de bayas y es tan\ngentil que las comparte con todos sus compañeros."
        ko:
          x: "기운이 없는 포켓몬에게\n머리의 잎사귀를 나눠준다.\n피로를 풀어주는 효과가 있다."
          y: "나무열매를 잘 찾아\n여기저기에서 모아 동료에게\n나누어 주는 상냥함을 가졌다."
