        jp_kana:
          x: "もうどくが　しみだしている\nするどい　きれあじの　しっぽで\nすばやい　ザングースに　たちむかう。"
          y: "しっぽの　かたなは　いつも　いわで\nといでいるので　きれあじ　ばつぐん。\nザングースとは　いんねんの　あいだ。"
        jp_kanji:
          x: "猛毒が　染み出している\n鋭い　切れ味の　尻尾で\n素早い　ザングースに　立ち向かう。"
          y: "尻尾の　刀は　いつも　岩で\n研いでいるので　切れ味　ばつぐん。\nザングースとは　因縁の　あいだ。"
        en:
          x: "In battle, it uses its bladed tail to counter any\nZangoose. It secretes a deadly venom in its tail."
          y: "Constant polishing makes the edge of the blade on\nits tail extremely sharp. It’s Zangoose’s archrival."
        fr:
          x: "Il rivalise avec Mangriff grâce à la lame affûtée de\nsa queue qui sécrète un puissant venin."
          y: "Il affûte la lame de sa queue sur des rochers pour\nla rendre bien tranchante. Le rival de longue date\nde Mangriff."
        it:
          x: "Respinge gli attacchi dell’agile Zangoose con la\ncoda affilatissima, che secerne un micidiale veleno."
          y: "Affila di continuo la lama della sua coda sulle rocce\nper renderla taglientissima. È un acerrimo nemico di\nZangoose."
        de:
          x: "Die flinken Angriffe von Sengo kontert es mit\nseinem messerscharfen Schweif, aus dem Gift austritt."
          y: "Es hält die Klinge an seinem Schweif scharf,\nindem es sie ständig an Steinen wetzt. Es ist\nder Erzfeind von Sengo."
        es:
          x: "Hace frente a Zangoose con su agilidad y su afilada\ncola, que está cargada con un veneno letal."
          y: "Le une una relación de enemistad con Zangoose.\nSe lima con las rocas su cola en forma de espada\npara tenerla afilada."
        ko:
          x: "맹독이 배어 나오는\n예리하고 잘 드는 꼬리로\n재빠른 쟝고에게 맞선다."
          y: "꼬리의 칼은 항상 바위로\n갈고 있어 날카로움이 뛰어나다.\n쟝고와는 사연이 깊은 사이다."
lunatone:
