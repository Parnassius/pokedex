          y: "せなかを　まるめると　トゲトゲの\nボールみたいだ。そのまま　ころがって\nぶつかってきたり　にげたりする。"
        jp_kanji:
          x: "すごい　勢いで　地面を掘ると\nトゲや　ツメが　折れてしまうが\n次の日には　生えそろっている。"
          y: "背中を　まるめると　トゲトゲの\nボールみたいだ。そのまま　転がって\nぶつかってきたり　逃げたりする。"
        en:
          x: "If it digs at an incredible pace, it may snap off\nits spikes and claws. They grow back in a day."
          y: "Curls up into a spiny ball when threatened. It can\nroll while curled up to attack or escape."
        fr:
          x: "Il creuse si vite qu’il peut briser ses épines et ses\ngriffes. Mais elles repoussent en une journée."
          y: "Il se roule en boule hérissée de piques s’il est\nmenacé. Il peut ainsi s’enfuir ou attaquer."
        it:
          x: "Se scava molto velocemente gli si consumano le\npunte e gli artigli, ma gli ricrescono in un giorno."
          y: "Se in pericolo si chiude a riccio. In questa forma\npuò rotolare, attaccare e scappare."
        de:
          x: "Wenn es schnell gräbt, können seine Stacheln und\nKrallen abbrechen. Sie wachsen binnen eines Tages\nnach."
          y: "Bei Gefahr igelt sich dieses Pokémon ein.\nZusammengerollt kann es angreifen oder fliehen."
        es:
          x: "Si cava a gran velocidad, puede que se le caigan las\ngarras y púas. Vuelven a crecerle en un día."
          y: "Ante el peligro, se acurruca en un espinoso ovillo.\nDe esta forma puede rodar para atacar o escapar."
        ko:
          x: "굉장한 기세로 지면을 파면\n가시와 발톱이 부러져 버리지만\n다음 날에는 바로 돋아나 있다."
          y: "등을 구부리면 뾰족뾰족한\n공 같다. 그대로 굴러서\n부딪쳐 오거나 도망간다."
