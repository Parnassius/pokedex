      descriptions:
        jp_kana:
          x: "２ほんの　しっぽを　スクリューの\nように　まわして　およぐ。もぐる\nときは　うきぶくろが　しぼむ。"
          y: "くびの　うきぶくろを　ふくらませ\nすいめんから　かおを　だして\nあたりの　ようすを　うかがっている。"
        jp_kanji:
          x: "２本の　尻尾を\nスクリューの　ように　回して　泳ぐ。\n潜る　ときは　浮き袋が　しぼむ。"
          y: "首の　浮き袋を　ふくらませ\n水面から　顔を　だして\n辺りの　様子を　うかがっている。"
        en:
          x: "It swims by rotating its two tails like a screw.\nWhen it dives, its flotation sac collapses."
          y: "It inflates the flotation sac around its neck and\npokes its head out of the water to see what is\ngoing on."
        fr:
          x: "Il nage en faisant tournoyer ses deux queues comme\nune hélice. Sa bouée s’affaisse quand il plonge."
          y: "Il utilise la bouée autour de son cou pour passer\nsa tête hors de l’eau et observer les alentours."
        it:
          x: "Nuota roteando le due code come fossero viti.\nQuando si immerge, il suo galleggiante si sgonfia."
          y: "Gonfia il salvagente che ha attorno al collo per\nmantenere la testa fuori dall’acqua mentre controlla\ni paraggi."
        de:
          x: "Es schwimmt, indem es seine beiden Schweife wie\neine Schiffsschraube rotieren lässt."
          y: "Es füllt den Schwimmreifen um seinen Hals mit Luft,\num den Kopf über dem Wasser zu halten und\ndie Umgebung zu überblicken."
        es:
          x: "Nada rotando sus dos colas a modo de tornillo.\nCuando bucea, el flotador se pliega."
          y: "Hincha el flotador de su cuello para flotar y saca la\ncabeza de la superficie del agua para explorar sus\nalrededores."
        ko:
          x: "2개의 꼬리를 스크루처럼\n돌려서 헤엄친다. 잠수할 때는\n공기주머니가 오그라든다."
          y: "목의 부낭을 부풀려\n수면에서 얼굴을 내밀어\n주변의 상황을 살피고 있다."
