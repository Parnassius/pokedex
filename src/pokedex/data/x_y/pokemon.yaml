          x: "こぶしの　コブを　しんどうさせると\nパンチの　いりょくが　ばいぞうする。\nいちげきで　おおいわを　ふんさい。"
          y: "あたまの　コブから　しんけいを\nマヒさせる　えきたいを　とばす。\nしんどうで　あいてを　くるしめる。"
        jp_kanji:
          x: "こぶしの　コブを　振動させると\nパンチの　威力が　倍増する。\n一撃で　大岩を　粉砕。"
          y: "頭の　コブから　神経を　マヒさせる\n液体を　飛ばす。\n振動で　相手を　苦しめる。"
        en:
          x: "It increases the power of its punches by vibrating\nthe bumps on its fists. It can turn a boulder to\nrubble with one punch."
          y: "They shoot paralyzing liquid from their head bumps.\nThey use vibration to hurt their opponents."
        fr:
          x: "Son coup de poing est plus fort quand il fait vibrer\nla pustule dessus. Il peut briser un gros rocher d’un\ncoup."
          y: "Il fait gicler un liquide paralysant des pustules sur\nsa tête, et attaque ses ennemis à coups de vibrations."
        it:
          x: "Facendo vibrare le protuberanze sui pugni, ne\nraddoppia la potenza. Frantuma enormi massi con\nun colpo."
          y: "Dalle escrescenze che ha sulla testa spara un liquido\nche paralizza i nervi. Usa le vibrazioni per attaccare il\nnemico."
        de:
          x: "Wenn es die Beulen an seinen Fäusten zum\nSchwingen bringt, kann es doppelt so fest\nzuschlagen und Felsen zertrümmern."
          y: "Es schießt eine lähmende Flüssigkeit aus den Beulen\nauf seinem Kopf. Es plagt seine Gegner mit\nSchallwellen."
        es:
          x: "Aumenta la potencia de sus puñetazos haciendo vibrar\nsus puños. Es capaz de quebrar una roca de un solo\ngolpe."
          y: "Despide un líquido paralizador por los bultos de su\ncabeza. Atormenta a sus oponentes con enormes\nvibraciones."
        ko:
          x: "주먹의 혹을 진동시켜\n펀치의 위력을 배가시킨다.\n일격에 큰 바위를 부스러뜨린다."
          y: "머리의 혹에서 신경을\n마비시키는 액체를 날린다.\n진동으로 상대를 괴롭힌다."
throh:
  species_id: 538
  names:
    jp_kana: ナゲキ
    jp_kanji: ナゲキ
