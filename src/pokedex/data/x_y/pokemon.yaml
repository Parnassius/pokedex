          y: "ヨガの　しゅぎょうで　きたえられた\nサイコパワーで　あいての　うごきを\nよそくする　ことが　できるのだ。"
        jp_kanji:
          x: "ダンスの　ような　優雅な　動きで\n攻撃を　交わして　強烈な　一撃を\n相手に　お見舞いする。"
          y: "ヨガの　修行で　鍛えられた\nサイコパワーで　相手の　動きを\n予測する　ことが　できるのだ。"
        en:
          x: "It elegantly avoids attacks with dance-like steps,\nthen launches a devastating blow in the\nsame motion."
          y: "Through yoga training, it gained the psychic power\nto predict its foe’s next move."
        fr:
          x: "Charmina évite les attaques en exécutant d’élégants\npas de danse avant de lancer une attaque dévastatrice\ndans son élan."
          y: "Ses pouvoirs psy, renforcés par la pratique du yoga,\nlui permettent de prédire les mouvements ennemis."
        it:
          x: "Evita elegantemente gli attacchi a passo di danza, per\npoi lanciare devastanti attacchi con la stessa grazia."
          y: "Conosce le mosse del nemico grazie ai poteri di\npreveggenza ottenuti con le pratiche yoga."
        de:
          x: "Es weicht Attacken elegant tänzerisch aus,\num anschließend eine verheerende Attacke aus\nderselben Bewegung heraus zu lancieren."
          y: "Mit Yoga-Training hat es seine Psycho-Kräfte geschärft\nund ahnt so die Attacken seiner Gegner voraus."
        es:
          x: "Evita los ataques moviéndose de forma elegante,\ncomo si bailara. Ataca dando un golpe devastador y\nmoviéndose igual."
          y: "Puede prever los movimientos de su rival usando sus\npoderes psíquicos, fortalecidos por el yoga."
