          y: "みらいを　よちする　ちからを　もつ。\nトレーナーを　まもる　ときに\nさいだい　パワーを　はっきする。"
        jp_kanji:
          x: "トレーナーを　守るためなら\nサイコパワーを　使いきり　小さな\nブラックホールを　作り出す。"
          y: "未来を　予知する　力を　持つ。\nトレーナーを　守る　ときに\n最大　パワーを　発揮する。"
        en:
          x: "To protect its Trainer, it will expend all its psychic\npower to create a small black hole."
          y: "It has the power to predict the future. Its power\npeaks when it is protecting its Trainer."
        fr:
          x: "Prêt à tout pour protéger son Dresseur, il peut créer\nun mini trou noir par sa seule force mentale."
          y: "Gardevoir est capable de prédire l’avenir.\nSa puissance augmente quand il protège son\nDresseur."
        it:
          x: "Quando il suo Allenatore è in pericolo usa tutto il suo\npotere psichico per creare un piccolo buco nero."
          y: "Ha la capacità di prevedere il futuro. Le sue\npotenzialità sono esaltate quando protegge\nil suo Allenatore."
        de:
          x: "Erzeugt ein kleines schwarzes Loch mithilfe all seiner\nPsycho-Kräfte, um seinen Trainer zu schützen."
          y: "Es kann die Zukunft vorhersagen. Beschützt es\nseinen Trainer, erreicht seine Kraft den Höhepunkt."
        es:
          x: "Para proteger a su Entrenador, emplea todo su poder\npsíquico en crear un pequeño agujero negro."
          y: "Tiene la capacidad de predecir el futuro. Cuando\nprotege a su Entrenador se vuelve más fuerte."
        ko:
          x: "트레이너를 지키기 위해서라면\n사이코 파워를 모두 써서 작은\n블랙홀을 만들어 낸다."
          y: "미래를 예지하는 힘을 가진다.\n트레이너를 지킬 때\n최대 파워를 발휘한다."
