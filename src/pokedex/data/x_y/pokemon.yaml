      descriptions:
        jp_kana:
          x: "たいないで　もえる　エネルギーに\nよって　かつどうしているが　どんな\nエネルギーなのかは　ふめいである。"
          y: "こだいの　かがくりょくに　よって\nねんどから　つくられた　ポケモン。\nすうせんねん　うごきつづける。"
        jp_kanji:
          x: "体内で　燃える　エネルギーに　よって\n活動しているが　どんな\nエネルギーなのかは　不明である。"
          y: "古代の　科学力に　よって\n粘土から　つくられた　ポケモン。\n数千年　動き続ける。"
        en:
          x: "The energy that burns inside it enables it to move,\nbut no one has yet been able to identify\nthis energy."
          y: "Ancient science fashioned this Pokémon from clay.\nIt’s been active for thousands of years."
        fr:
          x: "Il se meut grâce à l’énergie stockée dans son corps.\nPersonne ne sait d’où vient cette énergie mystérieuse."
          y: "Ce Pokémon fait de terre glaise, produit de la\ntechnologie d’une civilisation antique, vit depuis\ndes millénaires."
        it:
          x: "Si muove grazie all’energia che gli brucia dentro,\nma nessuno sa di che tipo di energia si tratti."
          y: "È stato creato dall’argilla usando antiche conoscenze\nscientifiche. È vivo da più di 1000 anni."
        de:
          x: "Es wird durch eine Energie angetrieben, die seinem\nKörper entspringt. Keiner weiß jedoch, woher diese\nEnergie stammt."
          y: "Es wurde von einer uralten Kultur aus Lehm erschaffen\nund kann mehrere Jahrtausende in Bewegung bleiben."
        es:
          x: "Se mueve gracias a la energía que quema dentro de su\ncuerpo, pero el origen de esta energía es incierto."
          y: "Un Pokémon creado a partir del barro gracias a la\nciencia de antaño. Lleva activo miles de años."
        ko:
          x: "체내에서 불타는 에너지로\n인해 활동하고 있지만 어떤\n에너지인지는 불명이다."
          y: "고대 과학의 힘으로\n점토에서 만들어진 포켓몬.\n수천 년 동안 계속 움직일 수 있다."
golurk:
