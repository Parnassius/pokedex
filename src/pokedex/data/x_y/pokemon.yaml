      descriptions:
        jp_kana:
          x: "ふりこのようなものを　もちあるく。\nこどもに　さいみんじゅつを　かけて\nどこかへ　つれさるじけんが　あった。"
          y: "ふりこを　めのまえで　ゆらされると\nたったいま　めざめたばかりの　ひとも\n３びょうごには　ねむってしまう。"
        jp_kanji:
          x: "振り子のようなものを　持ち歩く。\n子供に　催眠術を　かけて\nどこかへ　連れ去る　事件があった。"
          y: "振り子を　目の前で　ゆらされると\nたった今　目覚めたばかりの　人も\n３秒後には　眠ってしまう。"
        en:
          x: "It carries a pendulum-like device. There once\nwas an incident in which it took away a child\nit hypnotized."
          y: "Seeing its swinging pendulum can induce sleep in\nthree seconds, even in someone who just woke up."
        fr:
          x: "Il transporte toujours un petit pendule. On raconte\nqu’il aurait un jour enlevé un enfant après l’avoir\nhypnotisé."
          y: "La vue de son pendule oscillant endort en trois\nsecondes, même quand on vient de se réveiller."
        it:
          x: "Ha con sé una sorta di pendolo. Una volta, per errore,\nsi è portato via un bambino che aveva ipnotizzato."
          y: "Con il suo pendolo fa addormentare chiunque nel giro\ndi 3 secondi, anche chi si è appena svegliato."
        de:
          x: "Es trägt ein Pendel. Man berichtet von einem\nVorfall, bei dem es ein Kind mitnahm,\ndas es zuvor hypnotisiert hatte."
          y: "Ein Blick auf das Pendel versetzt einen in\ndrei Sekunden in Schlaf, selbst wenn man\ngar nicht müde ist."
        es:
          x: "Lleva un péndulo en la mano. Una vez, hizo\ndesaparecer a un niño al que había hipnotizado."
          y: "Mirar su péndulo puede inducir al sueño en tres\nsegundos, incluso si acabas de despertarte."
        ko:
          x: "추 같은 것을 들고 다닌다.\n어린아이에게 최면술을 걸어\n어딘가로 데려가 버린 사건이 있었다."
          y: "눈앞에서 추를 흔들면\n방금 깨어난 사람도\n3초 후에는 잠들어 버린다."
krabby:
