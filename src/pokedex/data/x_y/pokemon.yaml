          y: "たいもうに　ためた　でんきが\nまんたんになると　しっぽが　ひかる。\nふれると　しびれる　けを　とばす。"
        jp_kanji:
          x: "ふかふかの　体毛は　電気を\nためやすいが　ゴムのような　皮膚の\nおかげで　自分は　しびれない。"
          y: "体毛に　ためた　電気が\n満タンになると　尻尾が　光る。\n触れると　しびれる　毛を　飛ばす。"
        en:
          x: "Its fluffy fleece easily stores electricity. Its rubbery\nhide keeps it from being electrocuted."
          y: "If its coat becomes fully charged with electricity,\nits tail lights up. It fires hair that zaps on impact."
        fr:
          x: "Sa douce laine stocke facilement l’électricité.\nSa peau caoutchouteuse prévient l’électrocution."
          y: "Sa queue s’allume lorsque sa laine se charge\nd’électricité. Il projette des poils électrifiés."
        it:
          x: "La soffice pelliccia raccoglie elettricità. Non resta\nfulminato grazie a uno strato di pelle gommosa."
          y: "Se il suo manto è del tutto carico d’elettricità, la\ncoda s’illumina. Lancia peli che danno la scossa."
        de:
          x: "Sein flauschiges Fell speichert Elektrizität.\nSeine Gummihaut schützt es vor Stromstößen."
          y: "Hat es sich mit Elektrizität aufgeladen, leuchtet sein\nSchweif und es feuert Haare ab, die sich entladen."
        es:
          x: "Su esponjosa lana almacena electricidad. Su piel\ngomosa evita que sea electrocutado."
          y: "Cuando su pelaje se carga de electricidad, su cola se\nenciende. Lanza pelo que explota al impacto."
        ko:
          x: "푹신푹신한 털은 전기를\n모으기 쉽지만 고무 같은 피부\n덕분에 자신은 마비되지 않는다."
          y: "털에 모아둔 전기가\n다 채워지면 꼬리가 반짝인다.\n접촉하면 마비되는 털을 날린다."
