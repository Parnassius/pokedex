        jp_kana:
          x: "１にち　１８じかんは　ねている。\nねむってる　あいだでも　さまざまな\nちょうのうりょくを　つかう。"
          y: "こうげきの　けはいを　よみとって\nおそわれるまえに　さっさと\nテレポートで　そのばを　さっていく。"
        jp_kanji:
          x: "１日　１８時間は　寝ている。\n眠ってる　あいだでも\nさまざまな　超能力を　使う。"
          y: "攻撃の　気配を　読み取って\n襲われる前に　さっさと\nテレポートで　その場を　去っていく。"
        en:
          x: "It sleeps for 18 hours a day. It uses a variety of\nextrasensory powers even while asleep."
          y: "It senses impending attacks and teleports away to\nsafety before the actual attacks can strike."
        fr:
          x: "Il dort 18 h par jour. Il peut utiliser de nombreux\npouvoirs psy, même pendant son sommeil."
          y: "Il prévoit les attaques futures et se téléporte pour\nse mettre à l’abri et éviter le combat."
        it:
          x: "Dorme 18 ore al giorno. Anche da addormentato\nutilizza una serie di poteri extrasensoriali."
          y: "Avverte gli attacchi imminenti e si teletrasporta in\nsalvo prima che l’attacco lo possa colpire."
        de:
          x: "Es schläft 18 Stunden am Tag.\nWährenddessen setzt es eine Vielzahl\nzusätzlicher sensorischer Kräfte ein."
          y: "Es sieht die Attacken der Gegner voraus und setzt\nTeleport ein, um sich in Sicherheit zu bringen."
        es:
          x: "Duerme 18 horas al día y mientras lo hace es capaz de\nusar una serie de poderes extrasensoriales."
          y: "Siente los ataques inminentes y se teletransporta a un\nlugar seguro, antes de que estos puedan darle."
        ko:
          x: "하루에 18시간은 자고 있다.\n자는 동안에도 다양한\n초능력을 사용한다."
          y: "공격의 낌새를 읽고\n공격당하기 전에 얼른\n순간이동으로 그 장소를 떠난다."
