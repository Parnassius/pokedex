        jp_kana:
          x: "６かくけいの　みみを　もつ。\nちていで　あっしゅくされた　からだは\nてつに　まけないくらい　かたい。"
          y: "１００ねんまえの　だいじしんのとき\nじわれから　はっけんされた。\nたいないに　エネルギーコアを　もつ。"
        jp_kanji:
          x: "６角形の　耳を　持つ。\n地底で　圧縮された　体は\n鉄に　負けないくらい　硬い。"
          y: "１００年前の　大地震のときに\n地割れから　発見された。\n体内に　エネルギーコアを　持つ。"
        en:
          x: "Its ear is hexagonal in shape. Compressed\nunderground, its body is as hard as steel."
          y: "They were discovered a hundred years ago in an\nearthquake fissure. Inside each one is an\nenergy core."
        fr:
          x: "Il a une oreille hexagonale. Son corps, compressé\ndans des strates profondes, est dur comme de l’acier."
          y: "On l’a découvert dans une fissure après un grand\ntremblement de terre il y a 100 ans. Il possède\nun noyau d’énergie."
        it:
          x: "Ha un solo orecchio di forma esagonale. Essendo\nstato compresso sotto terra, il suo corpo è duro\nquasi come l’acciaio."
          y: "Scoperto nelle spaccature del terreno dopo il grande\nterremoto di 100 anni fa. Ha all’interno un nucleo di\nenergia."
        de:
          x: "Hat ein sechseckiges Ohr. Sein durch das Erdreich\ngepresster Körper steht Stahl in Sachen Härte\nin nichts nach."
          y: "Wurde vor 100 Jahren nach einem großen Erdbeben in\neiner Erdspalte entdeckt. Es trägt eine Energiesphäre\nin sich."
        es:
          x: "Su oreja tiene forma hexagonal. Su cuerpo fue\ncomprimido bajo tierra. Por eso, es duro como el\nacero."
          y: "Descubierto en unas grietas generadas por un\nterremoto hace 100 años. Tiene un núcleo energético\nen su cuerpo."
        ko:
          x: "육각형 귀를 가지고 있다.\n땅속 깊은 곳에서 압축된 몸은\n철 못지않게 단단하다."
          y: "100년 전 대지진 때\n갈라진 땅에서 발견되었다.\n체내에 에너지 코어를 가지고 있다."
boldore:
