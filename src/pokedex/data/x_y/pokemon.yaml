          x: "つぼみが　たいようの　ひかりを\nあびて　はなびらを　ひろげると\nかっぱつに　うごく　ように　なる。"
          y: "つよい　ひざしを　かんじとると\nとざしていた　はなびらを　ひろげ\nぜんしんで　にっこうを　あびる。"
        jp_kanji:
          x: "つぼみが　太陽の　光を　浴びて\n花びらを　広げると\n活発に　動くように　なる。"
          y: "強い　日差しを　感じとると\n閉ざしていた　花びらを　広げ\n全身で　日光を　浴びる。"
        en:
          x: "During times of strong sunlight, its bud blooms,\nits petals open fully, and it becomes very active."
          y: "If it senses strong sunlight, it opens its folded\npetals to absorb the sun’s rays with its whole body."
        fr:
          x: "Une fois gorgé de soleil, il déploie ses pétales et\nbouge avec vivacité."
          y: "Sous un grand soleil, il ouvre ses pétales pour en\nabsorber les rayons."
        it:
          x: "Sboccia quando si espone ai raggi solari,\nespandendo la corolla e diventando molto attivo."
          y: "Quando splende il sole, ama aprire i suoi petali per\nassorbire i raggi solari con tutto il corpo."
        de:
          x: "Bei Sonnenschein entfaltet seine Knospe ihre\nBlütenblätter und es springt lebhaft umher."
          y: "Spürt es Sonnenlicht, öffnet es seine Blütenblätter\nund nimmt die Energie der Sonnenstrahlen auf."
        es:
          x: "Cuando los rayos de sol inundan su capullo, abre de\npar en par sus pétalos y se vuelve muy dinámico."
          y: "Cuando detecta luz solar fuerte, despliega los pétalos\ny absorbe todos los rayos posibles."
        ko:
          x: "봉오리가 태양의 빛을\n쬐어 꽃잎이 피면\n활발하게 움직일 수 있게 된다."
          y: "강한 햇살을 느끼면\n움츠려 있던 꽃잎을 펼쳐\n전신으로 햇빛을 받는다."
