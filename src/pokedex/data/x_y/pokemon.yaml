          y: "からだから　もうどくの　たいえきが\nしみでている。その　えきに　ふれた\nくさきは　あっというまに　かれる。"
        jp_kanji:
          x: "ヘドロが　たまる　くさい　場所を\n好んで　集まってくるので\nあたりは　いっそう　くさくなる。"
          y: "体から　猛毒の　体液が\n染み出ている。その　液に　触れた\n草木は　あっというまに　枯れる。"
        en:
          x: "They love to gather in smelly areas where sludge\naccumulates, making the stench around\nthem worse."
          y: "A toxic fluid seeps from its body. The fluid instantly\nkills plants and trees on contact."
        fr:
          x: "Il recherche les endroits sales où il y a des ordures\npour y établir son habitat puant et infect."
          y: "Son corps exsude un fluide toxique qui tue\ninstantanément les plantes et les arbres au contact."
        it:
          x: "Amano riunirsi vicino a puzzolenti liquami di scolo,\nrendendo il fetore ancora più intenso."
          y: "Dal suo corpo filtra un fluido tossico che uccide\nall’istante piante e alberi con cui viene a contatto."
        de:
          x: "Sie treffen sich an stinkenden Orten, an denen der\nSchleim sich türmt. Dies merkt man am Gestank."
          y: "Sein Körper sondert eine giftige Substanz ab,\ndie bei Kontakt Pflanzen und Bäume vernichtet."
        es:
          x: "Les encanta reunirse en zonas apestosas donde se\nacumula el lodo, haciendo su olor más insoportable."
          y: "Su cuerpo segrega un fluido tóxico que elimina la vida\nvegetal cuando la toca."
        ko:
          x: "진흙이 쌓여 악취가 나는 장소를\n좋아해서 모여들기 때문에\n주변은 더욱 악취가 난다."
          y: "몸에서 맹독의 체액이\n배어 나오고 있다. 그 액에 스친\n초목은 순식간에 시든다."
