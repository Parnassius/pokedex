          y: "どんな　いきものも　おりられない\nふかい　うみのそこで　ねむりながら\nちからを　たくわえている　という。"
        jp_kanji:
          x: "普段は　海底洞窟に\n身を　潜めているらしい。\nあくびで　渦潮を　発生させる。"
