      descriptions:
        jp_kana:
          x: "つよすぎる　じりょくを　だして\nジバコイルどうし　ひきよせあって\nまったく　うごけなくなったりする。"
          y: "とくしゅな　じばの　えいきょうで\nレアコイルが　しんかした。３つの\nユニットから　じりょくを　だす。"
        jp_kanji:
          x: "強すぎる　磁力を　だして\nジバコイル同士　引き寄せあって\nまったく　動けなくなったりする。"
          y: "特殊な　磁場の　影響で\nレアコイルが　進化した。３つの\nユニットから　磁力を　出す。"
        en:
          x: "Sometimes the magnetism emitted by Magnezone is\ntoo strong, making them attract each other so they\ncannot move."
          y: "It evolved from exposure to a special magnetic\nfield. Three units generate magnetism."
        fr:
          x: "Le champ magnétique qu’ils émettent est tel qu’ils\nont tendance à s’attirer mutuellement et à s’empêcher\nde bouger."
          y: "Il a évolué suite à son exposition à un champ\nmagnétique spécial. Ses 3 unités génèrent du\nmagnétisme."
        it:
          x: "A volte si attraggono l’un l’altro con la loro\npotentissima carica magnetica e poi non riescono\npiù a muoversi."
          y: "Si è evoluto in seguito all’esposizione a uno speciale\ncampo magnetico. Tre unità generano magnetismo."
        de:
          x: "Gelegentlich erzeugen sie so starke Magnetfelder,\ndass sie sich gegenseitig anziehen und einander\nimmobilisieren."
          y: "Es entwickelte sich, als es einem besonderen\nMagnetfeld ausgesetzt wurde."
        es:
          x: "Emiten campos magnéticos tan potentes que se atraen\nentre sí e incluso pueden llegar a inmovilizarse."
          y: "Evolucionó por la exposición a un campo magnético\nespecial. Tres unidades generan magnetismo."
        ko:
          x: "너무 강한 자력을 내어\n자포코일끼리 끌어당겨\n전혀 못 움직이기도 한다."
          y: "특수한 자기장의 영향으로\n레어코일이 진화했다. 3개의\n유닛에서 자력을 발산한다."
