        jp_kanji:
          x: "暗闇で　だれもいないのに\n見られているような　気がしたら\nそこに　ゴーストが　いるのだ。"
          y: "ガス状の　舌で　なめられると\n魂を　取られてしまう。\n闇に　隠れて　獲物を　ねらう。"
        en:
          x: "If you get the feeling of being watched in darkness\nwhen nobody is around, Haunter is there."
          y: "It licks with its gaseous tongue to steal the victim’s\nlife force. It lurks in darkness for prey."
        fr:
          x: "Si vous avez l’impression qu’on vous surveille dans\nle noir, c’est sûrement qu’un Spectrum est dans\nle coin."
          y: "Il vole l’énergie vitale de l’ennemi d’un coup de\nlangue gazeuse. Il aime chasser dans l’ombre."
        it:
          x: "Se da soli, al buio, si ha l’impressione di essere\nosservati da qualcuno, si tratta di Haunter."
          y: "Lecca i nemici con la lingua tossica e sottrae la loro\nvitalità. Si cela nell’oscurità in attesa delle prede."
        de:
          x: "Falls du im Dunkeln das Gefühl hast,\nbeobachtet zu werden und niemand\nist zu sehen, ist es bestimmt Alpollo."
          y: "Es beleckt seine Opfer mit seiner Zunge und stiehlt\nihnen so Lebenskraft. Es lauert im Dunkeln auf sie."
        es:
          x: "Cuando tienes la sensación de que te están\nobservando, seguro que es porque Haunter está\ncerca."
          y: "Utiliza su lengua gaseosa para chupar la vida de la\nvíctima. Acecha a sus presas en la oscuridad."
        ko:
          x: "어둠 속에서 아무도 없는데도\n누군가가 보고 있다는 느낌이 들면\n그곳에 고우스트가 있는 것이다."
          y: "가스로 된 혓바닥으로 핥이게 되면\n영혼을 빼앗겨 버린다.\n어둠에 숨어 먹이를 노린다."
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
    jp_kanji: ゲンガー
    en: Gengar
    fr: Ectoplasma
    it: Gengar
    de: Gengar
    es: Gengar
    ko: 팬텀
  forms:
    gengar:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 75
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          x: "ものかげに　すがたを　かくす。\nゲンガーの　ひそんでいる　へやは\nおんどが　５ど　さがると　いわれる。"
          y: "よなか　ひとの　かげに　もぐりこみ\nすこしずつ　たいおんを　うばう。\nねらわれると　さむけが　とまらない。"
        jp_kanji:
          x: "物陰に　姿を　隠す。\nゲンガーの　潜んでいる　部屋は\n温度が　５度　下がるといわれる。"
          y: "夜中　人の　影に　潜りこみ\n少しずつ　体温を　奪う。\nねらわれると　寒気が　止まらない。"
        en:
          x: "It hides in shadows. It is said that if Gengar\nis hiding, it cools the area by nearly\n10 degrees Fahrenheit."
          y: "Hiding in people’s shadows at night, it absorbs their\nheat. The chill it causes makes the victims shake."
        fr:
          x: "On dit que lorsqu’Ectoplasma se cache dans l’ombre,\nla température alentour chute de 5 °C."
          y: "Il se cache dans l’ombre des passants et vole leur\nchaleur. Ses victimes ressentent alors un frisson."
        it:
          x: "Si nasconde nell’ombra. Pare che nei luoghi in cui\nGengar si cela, la temperatura si abbassi di 5 °C."
          y: "Di notte si cela nell’ombra delle vittime per assorbirne\nil calore, provocando loro un tremito."
        de:
          x: "Es versteckt sich im Schatten. Man sagt, wenn sich\nein Gengar versteckt, kühlt es sich um 5 °C ab."
          y: "Es versteckt sich im Schatten der Menschen und\nabsorbiert deren Wärme, sodass die Menschen frieren."
        es:
          x: "Se esconde entre las sombras. Se dice que donde\nGengar acecha, la temperatura baja 5 °C."
          y: "De noche, se oculta en las sombras y absorbe el calor\nde la gente. El frío que transmite es estremecedor."
        ko:
          x: "그림자에 모습을 숨긴다.\n팬텀이 숨어 있는 방은\n온도가 5도 내려간다고 전해진다."
          y: "한밤중 사람의 그림자에 숨어들어\n조금씩 체온을 뺏는다.\n숨어들면 한기가 멈추지 않는다."
