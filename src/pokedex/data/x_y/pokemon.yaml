          x: "うまれたときから　そなわっている\nふしぎな　ちからを　つかうと　どんな\nポケモンとも　こころが　かよいあう。"
          y: "どんな　ポケモンとでも　こころを\nかよいあわせる　ことが　できる\nふしぎな　のうりょくを　もっている。"
        jp_kanji:
          x: "生まれたときから　備わっている\n不思議な　力を　使うと　どんな\nポケモンとも　心が　通い合う。"
          y: "どんな　ポケモンとでも　心を\n通い合わせる　ことが　できる\n不思議な　能力を　持っている。"
        en:
          x: "It is born with a wondrous power that lets it bond\nwith any kind of Pokémon."
          y: "It starts its life with a wondrous power that permits\nit to bond with any kind of Pokémon."
        fr:
          x: "Il est né avec le pouvoir incroyable de créer des liens\navec n’importe quel Pokémon."
          y: "Il possède l’étrange pouvoir de s’entendre avec\nn’importe quel Pokémon."
        it:
          x: "Dispone di un potere innato che lo fa legare con\nqualsiasi specie di Pokémon."
          y: "Dispone di un potere innato che lo fa legare con\nqualsiasi specie di Pokémon."
        de:
          x: "Es wird mit einer wundersamen Kraft geboren,\ndie eine Bindung zu jedem anderen Pokémon\nmöglich macht."
          y: "Es besitzt die wundersame Fähigkeit, das Herz\neines jeden anderen Pokémon anzurühren."
        es:
          x: "Nace con un maravilloso poder que le permite\nestablecer vínculos con cualquier tipo de Pokémon."
          y: "Posee un poder singular que hace que entable\namistad con casi cualquier Pokémon."
        ko:
          x: "태어났을 때부터 가지고 있는\n이상한 힘을 쓰면 어떤 포켓몬과도\n마음이 서로 통하게 된다."
          y: "어떤 포켓몬과도 마음이\n통하고 맞출 수 있는\n이상한 능력을 가지고 있다."
darkrai:
  species_id: 491
  names:
