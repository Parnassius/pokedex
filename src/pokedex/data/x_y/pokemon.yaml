          y: "いちど　かみつくと　キバが\nぬけるまで　ぜったいに　はなさない。\nぬけた　キバは　すぐに　はえてくる。"
        jp_kanji:
          x: "キバは　抜けても　次から　次に\n生えてくる。いつも　口の中には\n４８本の　キバが　そろっている。"
          y: "一度　かみつくと　キバが\n抜けるまで　絶対に　離さない。\n抜けた　キバは　すぐに　生えてくる。"
        en:
          x: "If it loses a fang, a new one grows back in its\nplace. There are always 48 fangs lining its mouth."
          y: "Once it bites down, it won’t let go until it loses its\nfangs. New fangs quickly grow into place."
        fr:
          x: "Quand il perd un croc, il en repousse un autre.\nSa bouche est en permanence composée de 48\ndents."
          y: "Quand il mord, il ne lâche pas prise avant que\nses crocs se brisent. Ils repoussent par la suite."
        it:
          x: "Se perde un dente gliene ricresce un altro. La sua\nbocca contiene sempre 48 denti."
          y: "Quando azzanna il nemico, non molla la presa finché\nnon gli cadono le zanne, che però ricrescono subito."
        de:
          x: "Verliert es einen seiner Zähne, wächst ein neuer\nnach. Es hat immer 48 Zähne in seinem Kiefer."
          y: "Hat es einmal zugebissen, lässt es erst los, wenn es\nseine Zähne verliert, die schnell nachwachsen."
        es:
          x: "Si pierde un colmillo, le crecerá otro en su lugar.\nSiempre tiene 48 colmillos en su boca."
          y: "Cuando muerde algo, no lo suelta hasta que pierde\nsus colmillos. Estos se regeneran rápidamente."
        ko:
          x: "이빨이 빠져도 계속해서\n자란다. 항상 입안에는\n48개의 이빨이 나 있다."
          y: "한번 물면 이빨이\n빠질 때까지 절대 놓지 않는다.\n빠진 이빨은 바로 자라난다."
