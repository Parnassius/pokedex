        jp_kanji:
          x: "すごい　知性と　ひらめきを\n持っている。どんなときでも　あわてず\n騒がず　のんびりとしている。"
          y: "かまれたとき　頭に　染みこんだ\n毒素に　よって　ただならない\n能力に　目覚めた　ヤドン。"
        en:
          x: "It has incredible intellect and intuition. Whatever\nthe situation, it remains calm and collected."
          y: "When its head was bitten, toxins entered\nSlowpoke’s head and unlocked an\nextraordinary power."
        fr:
          x: "D’une grande intelligence, il sait rester calme, même\nen situation stressante."
          y: "Une fois sa tête mordue, des toxines ont envahi\nRamoloss et lui ont conféré des pouvoirs immenses."
        it:
          x: "Dotato di incredibile intelligenza e intuito, sa restare\ncalmo e padrone di sé in ogni situazione."
          y: "Quando la testa di Slowpoke fu morsa, vi penetrarono\ndelle tossine che produssero un enorme potere."
        de:
          x: "Sein feines Gespür und Intellekt zeichnen es aus.\nEs bleibt in jeder Situation gelassen und besonnen."
          y: "Als Flegmon in den Kopf gebissen wurde, floss Gift\nin seinen Kopf und setzte eine gewaltige Kraft frei."
        es:
          x: "Su intelecto e intuición son increíbles. No pierde la\ncompostura en ninguna situación."
          y: "Al ser mordido en la cabeza, Slowpoke absorbió unas\ntoxinas que liberaron su oculto poder."
        ko:
          x: "대단한 지성과 번뜩이는 재치를\n가지고 있다. 어떤 때라도 당황하거나\n소란 피우지 않고 느긋하게 있다."
          y: "물렸을 때 머리에 깊게 스며든\n독소에 의해 심상치 않은\n능력에 눈을 뜬 야돈이다."
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    jp_kanji: ムウマ
    en: Misdreavus
    fr: Feuforêve
    it: Misdreavus
    de: Traunfugil
    es: Misdreavus
    ko: 무우마
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          x: "こわがる　こころを　あかい　たまで\nきゅうしゅうして　えいようにする。\nひるまは　くらがりで　ねむっている。"
          y: "よなかに　ひとの　なきさけぶような\nなきごえを　だして　みんなを\nおどろかせる　いたずらずき。"
        jp_kanji:
          x: "怖がる　心を　赤い　玉で\n吸収して　栄養にする。\n昼間は　暗がりで　眠っている。"
          y: "夜中に　人の　泣き叫ぶような\n鳴き声を　出して\nみんなを　驚かせる　いたずら好き。"
        en:
          x: "It gets nourishment from fear that it absorbs into its\nred orbs. In daytime, it sleeps in darkness."
          y: "It likes playing mischievous tricks, such as\nscreaming and wailing to startle people at night."
        fr:
          x: "Il se nourrit de la peur absorbée par ses orbes rouges.\nIl somnole à l’ombre en journée."
          y: "Il pousse des hurlements la nuit pour effrayer\nles gens."
        it:
          x: "Si nutre delle preoccupazioni che assorbe con le\nsue sfere rosse. Di giorno dorme nell’oscurità."
          y: "Si diverte a fare brutti scherzi, come gridare e\nlamentarsi in piena notte spaventando la gente."
        de:
          x: "Es nährt sich von der Angst anderer Wesen und\nnimmt diese in roten Kugeln auf. Schläft am Tage."
          y: "Es liebt Streiche und erschreckt nachts Menschen,\nindem es heult oder ihnen im Dunkeln auflauert."
        es:
          x: "Se deleita con el miedo, que absorbe con sus esferas\nrojas. Por el día, duerme en la oscuridad."
          y: "Le gusta hacer travesuras, como gritar y aullar por la\nnoche, para asustar a la gente."
        ko:
          x: "무서워하는 마음을 빨간 구슬로\n흡수해 영양분으로 만든다. 낮에는\n어두운 곳에서 잠자고 있다."
          y: "밤중에 사람이 울부짖는\n울음소리를 내어 모두를\n놀라게 하는 장난꾸러기다."
unown:
  species_id: 201
  names:
    jp_kana: アンノーン
    jp_kanji: アンノーン
    en: Unown
    fr: Zarbi
    it: Unown
    de: Icognito
    es: Unown
    ko: 안농
  forms:
    unown_a:
      form_id: 0
      names:
        jp_kana: あるすがた
        jp_kanji: あるすがた
        en: One form
        fr: Forme Unique
        it: Forma Vaga
        de: Einform
        es: Una forma
        ko: 형태별 모습
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          x: "からだじたいは　うすっぺらく\nいつも　かべに　はりついている。\nかたちに　なにか　いみがあるらしい。"
          y: "こだいぶんめいの　もじに　にている。\nもじが　さきか　アンノーンが　さきか\nせかいの　７ふしぎの　ひとつ。"
        jp_kanji:
          x: "体自体は　薄っぺらく\nいつも　壁に　張りついている。\n形に　なにか　意味があるらしい。"
          y: "古代文明の　文字に　似ている。\n文字が　先か　アンノーンが　先か\n世界の　七不思議の　ひとつ。"
        en:
          x: "Its flat, thin body is always stuck on walls. Its shape\nappears to have some meaning."
          y: "Shaped like ancient writing, it is a huge mystery\nwhether language or Unown came first."
        fr:
          x: "Son corps plat et fin est toujours collé aux murs.\nOn pense que sa forme a une signification."
          y: "Il rappelle une écriture ancienne. Reste à savoir qui\ndu langage ou de Zarbi est apparu en premier."
        it:
          x: "Il corpo piatto e sottile sta sempre attaccato ai muri.\nPare che la forma abbia un preciso significato."
          y: "È a forma di lettera di un antico alfabeto. È un mistero\nchi sia apparso prima, l’alfabeto o Unown."
        de:
          x: "Sein flacher, dünner Körper hängt immer an Wänden.\nSeine Form scheint eine Bedeutung zu haben."
          y: "Seine Form sieht aus wie antike Schrift. Was war\nzuerst da? Die Sprache oder Icognito?"
        es:
          x: "Su cuerpo fino y plano aparece siempre en los muros.\nSu forma parece tener algún significado."
          y: "Tienen forma de letras antiguas. Se desconoce qué\nfue antes: si la escritura o los Unown."
        ko:
          x: "몸 자체는 굉장히 얇고\n항상 벽에 들러붙어 있다.\n모습에는 뭔가 의미가 있는 듯하다."
          y: "고대 문명의 문자와 닮았다.\n문자가 먼저인지 안농이 먼저인지\n세계 7대 불가사의의 하나다."
