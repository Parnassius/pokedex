          y: "じかんを　あやつる　ちからを　もつ。\nシンオウちほうでは　かみさまと\nよばれ　しんわに　とうじょうする。"
        jp_kanji:
          x: "ディアルガが　生まれたことで\n時間が　動き出したという\n伝説を　持つ　ポケモン。"
          y: "時間を　操る　力を　持つ。\nシンオウ地方では　神様と　呼ばれ\n神話に　登場する。"
        en:
          x: "A Pokémon spoken of in legend. It is said that time\nbegan moving when Dialga was born."
          y: "It has the power to control time. It appears in\nSinnoh-region myths as an ancient deity."
        fr:
          x: "Les mythes parlent de ce Pokémon. On dit que le\ntemps s’est mis en mouvement à sa naissance."
          y: "Il peut contrôler le temps. Les mythes de Sinnoh en\nparlent comme d’une divinité ancienne."
        it:
          x: "Pokémon menzionato nelle leggende. Pare che il\ntempo abbia avuto origine alla nascita di Dialga."
          y: "Ha il potere di controllare il tempo. Descritto nei miti\ndella regione di Sinnoh come un’antica divinità."
        de:
          x: "Ein Pokémon, das in Legenden zu finden ist.\nMan sagt, als Dialga geboren wurde,\nbegann der Lauf der Zeit."
          y: "Es besitzt die Macht, die Zeit zu kontrollieren.\nIn den Mythen von Sinnoh erscheint es als Gottheit."
        es:
          x: "Un Pokémon de leyenda. Se dice que el tiempo\ncomenzó a avanzar cuando Dialga nació."
          y: "Tiene el poder de controlar el tiempo. Aparece en los\nmitos de Sinnoh como una vieja deidad."
        ko:
          x: "디아루가가 태어남으로써\n시간이 움직이기 시작했다는\n전설이 내려오는 포켓몬이다."
          y: "시간을 조종하는 힘을 가지고 있다.\n신오지방에서는 신이라고\n불리며 신화에 등장한다."
