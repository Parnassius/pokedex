          x: "It quickly scales even vertical walls. It senses\nhumidity with its tail to predict the next\nday’s weather."
          y: "Small hooks on the bottom of its feet catch on\nwalls and ceilings. That is how it can hang\nfrom above."
        fr:
          x: "Arcko peut grimper aux murs à l’aide de ses pattes.\nGrâce à sa queue, il est capable de mesurer l’humidité\nde l’air et de prédire le temps du jour suivant."
          y: "Les épines de ses plantes de pieds lui permettent\nde marcher aux murs et au plafond sans tomber."
        it:
          x: "Riesce a scalare rapidamente anche pareti verticali.\nRileva l’umidità attraverso la coda per prevedere il\ntempo dell’indomani."
          y: "Le piante dei suoi piedi sono piene di uncini che gli\npermettono di camminare su muri e soffitti."
        de:
          x: "Es klettert blitzschnell Wände empor. Mit seinem\nSchwanz misst es die Luftfeuchtigkeit, um das\nWetter am nächsten Tag vorherzusagen."
          y: "Dank seiner mit winzigen Stacheln besetzten Sohlen\nhaftet es sogar kopfüber an Wänden und Decken."
        es:
          x: "Escala superficies verticales muy rápido. Con la cola\ndetecta la humedad y prevé el tiempo que va a hacer."
          y: "Tiene pequeñas púas en las plantas de los pies que\nle permiten andar por techos y paredes sin caerse."
        ko:
          x: "수직으로 된 벽도 쭉쭉\n타고 올라간다. 꼬리로 공기 중의 습도를\n감지해서 내일 날씨를 맞힌다."
          y: "발바닥의 작은 가시가\n벽이나 천장에 걸리므로\n거꾸로 매달려도 떨어지지 않는다."
grovyle:
