          y: "おおぞらを　とぶことを　ゆめみて\nまいにち　とぶ　れんしゅうのために\nがけから　とびおりている。"
        jp_kanji:
          x: "鍛えられた　首の　筋肉と\n鉄の　ように　硬い　頭で\n大岩を　コナゴナに　砕く。"
          y: "大空を　飛ぶことを　夢見て\n毎日　飛ぶ　練習のために\n崖から　飛び降りている。"
        en:
          x: "Its well-developed neck muscles and iron-like\nhead can smash boulders into pieces."
          y: "Dreaming of one day flying, it practices by leaping\noff cliffs every day."
        fr:
          x: "Il réduit en miettes les plus gros rochers grâce à\nson cou musculeux et à sa tête dure comme l’acier."
          y: "Il rêve de pouvoir voler un jour. Pour l’heure,\nil s’entraîne en sautant du haut des falaises."
        it:
          x: "Frantuma grandi massi con la testa dura come il\nferro e gli allenatissimi muscoli del collo."
          y: "Sogna di poter volare un giorno e, pertanto, si allena\nregolarmente gettandosi da alture."
        de:
          x: "Mit seinen robusten Nackenmuskeln und seinem\nstahlharten Kopf kann es sogar Felsen zertrümmern."
          y: "Es träumt davon, eines Tages fliegen zu können\nund springt daher jeden Tag von hohen Klippen."
        es:
          x: "Su desarrollado cuello y su cabeza dura como el acero\nle permiten reducir a añicos rocas enormes."
          y: "Sueña con volar algún día, por lo que siempre practica\nsaltando desde acantilados."
        ko:
          x: "단련된 목 근육과\n철과 같이 단단한 머리로\n커다란 바위를 조각조각으로 부순다."
          y: "넓은 하늘을 나는 것을 꿈꾸며\n매일 나는 연습을 하려고\n절벽에서 뛰어내린다."
