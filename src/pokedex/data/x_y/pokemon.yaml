          y: "がんじょうな　カラに　まもられて\nいっしょうの　うちに　１こだけ\nみごとな　しんじゅを　つくる。"
        jp_kanji:
          x: "一生に　１回　進化の　とき\nサイコパワーを　増幅する\n不思議な　真珠を　作るのだ。"
          y: "頑丈な　殻に　守られて\n一生の　うちに　１個だけ\n見事な　真珠を　作る。"
        en:
          x: "When it evolves, it makes a mysterious pearl that\namplifies psychic powers when it’s held."
          y: "It is protected by a sturdy shell. Once in a lifetime,\nit makes a magnificent pearl."
        fr:
          x: "Il ne produit qu’une perle durant son existence,\nquand il évolue. Elle amplifie les pouvoirs psychiques."
          y: "Ce Pokémon ferme sa coquille pour se protéger du\ndanger. Il ne crée qu’une seule perle de toute sa vie,\nmais celle-ci est magnifique."
        it:
          x: "Crea una sola perla in tutta la sua vita, quando si\nevolve. Questa perla amplifica i poteri psichici."
          y: "È protetto da un guscio coriaceo. Una sola volta in\ntutta la sua vita produce una magnifica perla."
        de:
          x: "Es entwickelt sich nur einmal im Leben, wobei es\neine wundersame Perle erzeugt, die Psycho-Kräfte\nverstärkt."
          y: "Es ist durch einen harten Panzer geschützt.\nEinmal im Leben stellt es eine bezaubernde Perle her."
        es:
          x: "Produce durante su vida una sola perla que aumenta\nlos poderes psíquicos al evolucionar."
          y: "Está protegido por una sólida concha. Puede llegar a\nformar una perla extraordinaria."
        ko:
          x: "일생에 한 번 진화할 때\n사이코 파워를 증폭시키는\n이상한 진주를 만든다."
          y: "단단한 껍데기로 감싸여\n평생 동안 단 1개의\n훌륭한 진주를 만든다."
