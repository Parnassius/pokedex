          x: "５ノットの　スピードで　およぐ。\nみの　きけんを　かんじると\nするどい　ツノで　はんげきする。"
          y: "せびれ　むなびれ　おびれが\nゆうがに　たなびくので\nみずのおどりこ　とよばれる。"
        jp_kanji:
          x: "５ノットの　スピードで　泳ぐ。\n身の　危険を　感じると\n鋭い　ツノで　反撃する。"
          y: "背びれ　胸びれ　尾びれが\n優雅に　たなびくので\n水の踊り子　と呼ばれる。"
        en:
          x: "It swims at a steady 5 knots. If it senses danger,\nit will strike back with its sharp horn."
          y: "Its dorsal, pectoral, and tail fins wave elegantly in\nwater. That is why it is known as the water dancer."
        fr:
          x: "Il nage à 5 nœuds. Quand on l’agresse, il réplique\nd’un bon coup de corne aiguisée."
          y: "Ses nageoires dorsales et pectorales bougent avec\nélégance. Il est surnommé le danseur des flots."
        it:
          x: "Nuota alla velocità di 5 nodi. Se avverte il pericolo,\ncontrattacca con il suo corno aguzzo."
          y: "Le pinne su dorso, petto e coda ondulano con grazia\nin acqua. Per questo lo chiamano “danzatore d’acqua”."
        de:
          x: "Es schwimmt mit fünf Knoten. Wird es angegriffen,\nwehrt es sich mit seinem scharfen Horn."
          y: "Seine Brust-, Rücken- und Schweifflossen sehen\nanmutig aus. Daher nennt man es den „Wassertänzer“."
        es:
          x: "Nada a una velocidad de cinco nudos. Si siente\npeligro, golpea con su afilado cuerno."
          y: "Sus aletas dorsal, trasera y pectoral ondean gráciles\nen el agua. Por eso es llamado el Bailarín Acuático."
        ko:
          x: "5노트의 스피드로 헤엄친다.\n몸에 위험을 느끼면\n날카로운 뿔로 반격한다."
          y: "등, 가슴, 꼬리지느러미가\n우아하게 나부끼기 때문에\n물의 무희라고 불린다."
