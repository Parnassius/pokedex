        jp_kana:
          x: "ひとの　あたまの　うえに\nちょこんと　のって　ぼうしのように\nふるまうのが　なぜか　だいすき。"
          y: "まわたの　ような　つばさの　ていれは\nぜったいに　かかさない。よごれると\nみずあびをして　きれいに　あらう。"
        jp_kanji:
          x: "人の　頭の　上に\nちょこんと　乗って　帽子のように\nふるまうのが　なぜか　大好き。"
          y: "真綿の　ような　翼の　手入れは\n絶対に　欠かさない。汚れると\n水浴びをして　きれいに　洗う。"
        en:
          x: "For some reason, it likes to land on people’s heads\nsoftly and act like it’s a hat."
          y: "It constantly grooms its cotton-like wings. It takes\na shower to clean itself if it becomes dirty."
        fr:
          x: "Son jeu préféré : se poser sur la tête des gens et\nse faire passer pour un joli chapeau."
          y: "Il toilette constamment ses ailes duveteuses. Il se\ndépêche de se laver à la moindre salissure pour que\nses ailes restent le plus blanc possible."
        it:
          x: "Per qualche motivo adora salire sulla testa delle\npersone e far finta di essere un cappello."
          y: "Si liscia in continuazione le ali simili al cotone.\nAppena si sporca corre a lavarsi."
        de:
          x: "Aus irgendeinem Grund setzt es sich gerne auf den\nKopf von Menschen und tut so, als sei es ein Hut."
          y: "Ständig pflegt es seine watteartigen Flügel. Falls es\nschmutzig wird, nimmt es eine Dusche, um sich zu\nputzen."
        es:
          x: "Se desconoce el porqué, pero le encanta posarse\nsobre la cabeza de los humanos y fingir que es un\ngorro."
          y: "Está continuamente acicalándose las alas de algodón\nque tiene. Si se ensucia, se da una ducha para\nlimpiarse enseguida."
        ko:
          x: "사람의 머리 위에\n살짝 앉아 모자처럼\n구는 것을 왠지 좋아한다."
          y: "솜 같은 날개를 손질하는 일은\n절대 거르지 않는다. 더러워지면\n물로 깨끗하게 씻는다."
