        jp_kana:
          x: "トレーナーの　あかるい　きもちが\nサイコパワーの　みなもと。たのしい\nきぶんに　なると　クルクル　おどる。"
          y: "サイコパワーを　あやつり　まわりの\nくうかんを　ねじまげる　ことで\nみらいを　みとおす　ことが　できる。"
        jp_kanji:
          x: "トレーナーの　明るい　気持ちが\nサイコパワーの　源。楽しい\n気分に　なると　クルクル　踊る。"
          y: "サイコパワーを　操り　まわりの　空間を\nねじ曲げる　ことで\n未来を　見通す　ことが　できる。"
        en:
          x: "The cheerful spirit of its Trainer gives it energy for\nits psychokinetic power. It spins and dances\nwhen happy."
          y: "It has a psychic power that enables it to distort the\nspace around it and see into the future."
        fr:
          x: "Ce Pokémon tire ses pouvoirs psy du soutien de son\nDresseur. Il danse et tourne sur lui-même quand il est\ncontent."
          y: "Il peut distordre l’espace-temps grâce à ses pouvoirs\npsy et ainsi voir l’avenir."
        it:
          x: "Lo spirito gioioso è alla base dei suoi poteri\npsicocinetici. Quando è felice si lancia in danze\ne piroette."
          y: "Usa i suoi poteri psichici per dare all’aria circostante\nun aspetto distorto e prevedere l’avvenire."
        de:
          x: "Die fröhliche Stimmung seines Trainers verleiht ihm\nEnergie für psychokinetische Kraft. Wenn es\nglücklich ist, tanzt und dreht es sich."
          y: "Seine Psycho-Kräfte erlauben es ihm, den Raum\num sich zu verformen und so in die Zukunft zu sehen."
        es:
          x: "Al percibir la alegría de su Entrenador refuerza sus\nataques psicoquinéticos. Cuando está contento, da\nvueltas y baila."
          y: "Con sus poderes psíquicos puede deformar el espacio\na su alrededor y predecir el futuro."
        ko:
          x: "트레이너의 밝은 마음이\n사이코 파워의 근원이다.\n즐거워지면 빙글빙글 춤춘다."
          y: "사이코 파워를 조작해 주변의\n공간을 비틀고 구부려\n미래를 내다볼 수 있다."
