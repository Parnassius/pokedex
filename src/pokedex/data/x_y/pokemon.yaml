          y: "おとなになると　なかまから\nせなかに　あしあとの　マークを\nつけられる　しゅうせいを　もつ。"
        jp_kanji:
          x: "尻尾を　筆のように　使って\n縄張りを　マークで　描く。\nその　種類は　５０００以上。"
          y: "大人になると　仲間から\n背中に　足跡の　マークを\nつけられる　習性を　持つ。"
        en:
          x: "It marks its territory by using its tail like a\npaintbrush. There are more than 5,000\ndifferent marks."
          y: "Once it becomes an adult, it has a tendency to let\nits comrades plant footprints on its back."
        fr:
          x: "Il marque son territoire en maniant sa queue comme\nun pinceau. On dénombre plus de 5 000 marques."
          y: "Arrivé à l’âge adulte, il laisse ses camarades poser\nleur empreinte de patte sur son dos."
        it:
          x: "Delimita il suo territorio usando la coda come se fosse\nun pennello. Ha lasciato oltre 5000 segni diversi."
          y: "Quando è adulto tende a farsi lasciare orme di zampe\nsul dorso dai propri compagni."
        de:
          x: "Sein Revier markiert es mit seinem pinselartigen\nSchweif. Es kennt mehr als 5 000 Markierungen."
          y: "Ist es erwachsen, lässt es sich gern von seinen\nKameraden Fußabdrücke auf den Rücken setzen."
        es:
          x: "Marca su territorio usando su cola a modo de pincel.\nHa hecho más de 5000 marcas diferentes."
          y: "Cuando llega a adulto, suele dejar que sus camaradas\ndejen sus huellas sobre su lomo."
        ko:
          x: "꼬리를 붓처럼 써서\n영역에 마크를 그린다.\n그 종류는 5000개 이상이다."
          y: "어른이 되면 동료로부터\n등에 발자국 마크를\n받는 습성을 가진다."
