          x: "２ほんの　おばねが　ピンと　たって\nいれば　けんこうな　しょうこ。\nゆうがに　おおぞらを　とびまわる。"
          y: "もりに　すむ　えものを　みつけると\nじょうくうから　きゅうこうか。\nするどい　ツメで　つかまえる。"
        jp_kanji:
          x: "２本の　尾羽が　ピンと　立って\nいれば　健康な　証拠。\n優雅に　大空を　飛び回る。"
          y: "森に　住む　獲物を　見つけると\n上空から　急降下。\n鋭い　ツメで　捕まえる。"
        en:
          x: "If its two tail feathers are standing at attention, it is\nproof of good health. It soars elegantly in the sky."
          y: "It dives at a steep angle as soon as it spots its\nprey. It catches its prey with sharp claws."
        fr:
          x: "Si les plumes de ses deux queues restent bien\ndroites, cela signifie qu’Hélédelle est en bonne santé.\nSon élégance est sans pareille."
          y: "Une fois sa proie repérée, il fond sur elle en un éclair\net la capture avec ses griffes acérées."
        it:
          x: "Se le due penne sulla coda sono ritte, significa che\nè in buona salute. Si libra elegantemente nel cielo."
          y: "Trova nella foresta le sue prede, vi si scaglia sopra\nin picchiata e le afferra con i suoi artigli affilati."
        de:
          x: "Wenn seine beiden Schwanzfedern aufrecht stehen,\nzeigt das, dass es bei bester Gesundheit ist.\nEs fliegt elegant in den Himmel empor."
          y: "Findet es Beute, stürzt es sich aus großer Höhe\ndarauf und packt sie mit seinen spitzen Krallen."
        es:
          x: "Cuando se encuentra bien, pone firmes las plumas de\nla cola doble que tiene. Remonta el vuelo de forma\nmuy elegante."
          y: "Vive en los bosques. Si encuentra una presa, se lanza\nen picado y la atrapa con sus afiladas garras."
        ko:
          x: "2개의 꼬리날개가 꼿꼿하게\n서 있으면 건강하다는 증거다.\n우아하게 넓은 하늘을 날아다닌다."
          y: "숲에 사는 먹이를 찾으면\n상공에서 급강하해서\n예리한 발톱으로 잡는다."
