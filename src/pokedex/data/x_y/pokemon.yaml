          x: "かたい　カラに　まもられている。\nタイヤのように　かいてんして\nてきに　はげしく　たいあたりする。"
          y: "ふだんは　うごかないが　おそわれると\nこうそく　かいてんして　はしりまわり\nたいあたりで　はんげきするのだ。"
        jp_kanji:
          x: "硬い　殻に　守られている。\nタイヤのように　回転して\n敵に　激しく　体当たりする。"
          y: "普段は　動かないが\n襲われると　高速　回転して　走り回り\n体当たりで　反撃するのだ。"
        en:
          x: "Protected by a hard shell, it spins its body like a\nwheel and crashes furiously into its enemies."
          y: "It is usually motionless, but when attacked,\nit rotates at high speed and then crashes into\nits opponent."
        fr:
          x: "Protégé par sa solide carapace, il fonce sur ses\nennemis en roulant comme un pneu."
          y: "En général, il reste immobile. Mais quand on l’attaque,\nil se met à tourbillonner à toute vitesse et fonce sur\nl’ennemi."
        it:
          x: "È protetto da un guscio resistente. Si scaglia contro\nil nemico rotolando come uno pneumatico."
          y: "Di solito non si muove, ma se viene attaccato,\ncomincia a turbinare su se stesso e si scaglia contro\nil nemico."
        de:
          x: "Von einem harten Schutzpanzer umgeben. Es greift\nseine Gegner an, indem es mit Karacho wie ein Rad\nin sie hineinrollt."
          y: "An sich ist es harmlos. Bringt man es jedoch\nin Bedrängnis, setzt es sich mit blitzschnellen\nRollattacken zur Wehr."
        es:
          x: "Lo protege un duro caparazón. Gira como una rueda y\nrealiza brutales placajes contra sus enemigos."
          y: "Normalmente no se mueve, pero se pone a rodar\nfrenéticamente y contraataca con placajes si lo atacan."
        ko:
          x: "단단한 껍질로 보호되고 있다.\n타이어처럼 회전하여 상대에게\n격렬히 몸통박치기를 날린다."
          y: "평소에는 움직이지 않지만 공격당하면\n고속 회전하여 뛰어다니다가\n몸통박치기로 반격한다."
scolipede:
  species_id: 545
  names:
    jp_kana: ペンドラー
    jp_kanji: ペンドラー
    en: Scolipede
    fr: Brutapode
    it: Scolipede
    de: Cerapendra
    es: Scolipede
    ko: 펜드라
