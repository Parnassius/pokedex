          y: "とりポケモンの　そせんと　いわれる。\nとぶことは　できず　えだから　えだへ\nとびうつり　せいかつしていたらしい。"
        jp_kanji:
          x: "化石から　復活した　ポケモン。\nあらゆる　とりポケモンの　祖先と\n考えられている。"
          y: "とりポケモンの　祖先と　言われる。\n飛ぶことは　できず　枝から　枝へ\n飛び移り　生活していたらしい。"
        en:
          x: "Revived from a fossil, this Pokémon is thought to\nbe the ancestor of all bird Pokémon."
          y: "Said to be an ancestor of bird Pokémon, they were\nunable to fly and moved about by hopping from one\nbranch to another."
        fr:
          x: "Un Pokémon recréé à partir d’un fossile. On pense\nqu’il est l’ancêtre de tous les Pokémon Oiseaux."
          y: "On dit qu’il serait l’ancêtre de tous les Pokémon\nOiseaux. Il ne sait pas voler et se déplace en sautant\nd’arbre en arbre."
        it:
          x: "Pokémon risvegliatosi da un fossile. Si ritiene che\nsia l’antenato di tutti i Pokémon uccello."
          y: "Si dice sia antenato dei Pokémon uccello. Siccome\nnon sa volare, si sposta di ramo in ramo saltando."
        de:
          x: "Es wurde aus einem Fossil reanimiert. Man geht davon\naus, dass es der Urahn aller Vogel-Pokémon ist."
          y: "Man nennt es den Urvater der Vogel-Pokémon.\nDa es nicht fliegen kann, bewegt es sich hüpfend\nvon Ast zu Ast."
        es:
          x: "Pokémon que renació de un fósil. Dicen que es el\nantepasado de todos los Pokémon pájaro."
          y: "Dicen que es el Pokémon pájaro primigenio. No puede\nvolar, así que solo salta de rama en rama."
        ko:
          x: "화석에서 부활한 포켓몬이다.\n모든 새포켓몬의 조상이라\n여겨지고 있다."
          y: "새포켓몬의 조상이라고 전해진다.\n날 수 없어서 가지에서 가지로\n뛰어다니며 생활했다고 한다."
