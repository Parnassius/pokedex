        it:
          x: "Ha un’enorme chela che spara proiettili d’acqua\nin grado di sfondare lo scafo di un transatlantico."
          y: "Espellendo acqua da un foro dietro la chela riesce\na muoversi alla velocità di 60 nodi."
        de:
          x: "Aus seinen gewaltigen Scheren feuert es\nmächtige Wassergeschosse ab, die selbst\nden Rumpf eines Tankschiffes durchdringen."
          y: "Indem es über die Düsen am hinteren Ende seiner\nScheren Wasser absondert, kann es sich mit einer\nGeschwindigkeit von 60 Knoten fortbewegen."
        es:
          x: "Posee una enorme pinza que dispara bolas de agua\nque podrían atravesar incluso el casco de un petrolero."
          y: "El chorro de agua que dispara la tobera situada en la\nparte trasera de su pinza le permite avanzar a una\nvelocidad de 60 nudos."
        ko:
          x: "물 포탄을 발사하는\n거대한 집게발을 지녔다.\n유조선의 선체를 뚫어 버린다."
          y: "집게 뒤의 노즐에서\n물을 뿜어내는 추진력으로\n60노트의 스피드로 나아간다."
