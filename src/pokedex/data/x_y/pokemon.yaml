          y: "こうらの　なかで　せきたんを　もやし\nエネルギーに　している。ピンチの\nときは　くろい　ススを　ふきだす。"
        jp_kanji:
          x: "使われなくなった　炭鉱には\nたくさんの　コータスが　住みついて\n石炭を　せっせと　掘っている。"
          y: "甲羅の　中で　石炭を　燃やし\nエネルギーに　している。ピンチの\nときは　黒い　ススを　噴き出す。"
        en:
          x: "You find abandoned coal mines full of them.\nThey dig tirelessly in search of coal."
          y: "It burns coal inside its shell for energy. It blows out\nblack soot if it is endangered."
        fr:
          x: "Les Chartor vivent dans les mines abandonnées,\noù ils extraient le charbon avec ardeur."
          y: "Il tire son énergie du charbon qu’il brûle dans sa\ncarapace et crache de la suie noire en cas de danger."
        it:
          x: "I Torkoal eleggono a propria dimora miniere di carbone\nabbandonate e vi scavano carbone con ardore."
          y: "Genera energia bruciando carbone all’interno della\ncorazza. Se è in pericolo, emette fuliggine scura."
        de:
          x: "Große Gruppen Qurtel siedeln sich in stillgelegten\nBergwerken an und graben dort emsig nach Kohle."
          y: "In seinem Panzer verbrennt es Kohle und gewinnt\ndaraus Energie. Bei Gefahr sondert es Ruß ab."
        es:
          x: "Trabaja sin descanso en minas en desuso localizando\ny extrayendo carbón."
          y: "Quema carbón en su caparazón para obtener energía.\nSi le atacan, echa un denso humo negro."
        ko:
          x: "사용할 수 없게 된 탄광에는\n많은 코터스가 살며\n석탄을 부지런히 캐고 있다."
          y: "등껍질 속에 석탄을 태워서\n에너지로 사용한다. 위급할\n때는 까만 그을음을 뿜어낸다."
