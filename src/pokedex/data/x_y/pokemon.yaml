        jp_kana:
          x: "ドーミラーの　せなかの　もようには\nしんぴてきな　ちからが　やどると\nむかしの　ひとたちは　しんじていた。"
          y: "ふるい　おはかから　ドーミラーに\nそっくりな　どうぐが　ほりだされたが\nかんけいは　わかっていない。"
        jp_kanji:
          x: "ドーミラーの　背中の　模様には\n神秘的な　力が　宿ると\n昔の　人たちは　信じていた。"
          y: "古い　お墓から　ドーミラーに\nそっくりな　道具が　掘り出されたが\n関係は　わかっていない。"
        en:
          x: "Ancient people believed that the pattern on\nBronzor’s back contained a mysterious power."
          y: "Implements shaped like it were discovered in\nancient tombs. It is unknown if they are related."
        fr:
          x: "Les gens croyaient autrefois que les motifs de\nson dos renfermaient une puissance mystique."
          y: "Il rappelle des objets trouvés dans des sépultures\nanciennes. Nul ne sait s’ils sont liés."
        it:
          x: "Nell’antichità si credeva che una forza misteriosa\ndimorasse nei disegni sul dorso di Bronzor."
          y: "Il suo aspetto ricorda alcuni oggetti ritrovati in\nantiche tombe, ma non si sa se ci sia una relazione."
        de:
          x: "Früher glaubten die Menschen, dem Muster auf\nseinem Rücken wohne eine mysteriöse Kraft inne."
          y: "Sein Körper sieht aus, als seien Teile davon\nin alten Gräbern gefunden worden."
        es:
          x: "Antaño se creía que en los dibujos de su parte\nposterior residía una fuerza misteriosa."
          y: "Se descubrieron herramientas con su forma en tumbas\nantiguas, pero se desconoce si tiene relación."
        ko:
          x: "동미러의 등 모양에는\n신비한 힘이 깃들어 있다고\n옛날 사람들은 믿고 있었다."
          y: "고대 무덤에서 동미러와\n똑 닮은 도구가 발굴되었지만\n관계는 알 수 없다."
