          y: "ひとや　ほかの　ポケモンに　ばける。\nじぶんの　しょうたいを　かくすことで\nきけんから　みを　まもっているのだ。"
        jp_kanji:
          x: "相手そっくりに　化けているように\nみせかけ　だましたり　驚かして\nそのすきに　逃げ出すことが　多い。"
          y: "人や　ほかの　ポケモンに　化ける。\n自分の　正体を　隠すことで\n危険から　身を　守っているのだ。"
        en:
          x: "It changes so it looks just like its foe, tricks it, and\nthen uses that opportunity to flee."
          y: "To protect themselves from danger, they hide their\ntrue identities by transforming into people\nand Pokémon."
        fr:
          x: "Il prend l’apparence de son adversaire pour le\ndésorienter et prendre la fuite grâce à la confusion\ncausée."
          y: "Il peut se transformer en humain ou en d’autres\nPokémon. Il se protège du danger en dissimulant\nsa vraie identité."
        it:
          x: "Inganna spesso il nemico assumendone la forma e\nlasciandolo esterrefatto, per poi darsi alla fuga."
          y: "Si protegge dai pericoli trasformandosi in essere\numano o in un altro Pokémon, nascondendo così la\nsua vera identità."
        de:
          x: "Nicht selten überrumpelt es Gegner, indem es ihre\nGestalt annimmt und den Überraschungseffekt zur\nFlucht nutzt."
          y: "Es tarnt sich als Mensch oder als andere Pokémon.\nEs schützt sich vor Gefahren, indem es seine wahre\nGestalt geheim hält."
        es:
          x: "Adopta la apariencia de su enemigo para engañarlo\nvilmente y aprovecha su estupor para poner tierra por\nmedio."
          y: "Se transforma en humanos o en otros Pokémon.\nSe defiende del peligro ocultando su verdadera\napariencia."
        ko:
          x: "상대와 똑 닮게 둔갑한 것처럼\n보이게 하여 속이거나 놀라게 해서\n그 틈에 도망가는 일이 많다."
          y: "사람이나 다른 포켓몬으로 둔갑한다.\n자신의 정체를 감추어\n위험으로부터 몸을 지키는 것이다."
