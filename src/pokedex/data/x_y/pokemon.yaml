honedge:
  species_id: 679
  names:
    jp_kana: ヒトツキ
    jp_kanji: ヒトツキ
    en: Honedge
    fr: Monorpale
    it: Honedge
    de: Gramokles
    es: Honedge
    ko: 단칼빙
  forms:
    honedge:
      form_id: 0
      base_stats:
        hp: 45
        attack: 80
        defense: 100
        special_attack: 35
        special_defense: 37
        speed: 28
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - ghost
      egg_groups:
        - mineral
      abilities:
        - no_guard
      descriptions:
        jp_kana:
          x: "ししゃの　たましいが　こだいの\nつるぎに　やどって　うまれたらしい。\nひとに　とりつき　いのちを　すう。"
          y: "つるぎの　つかを　にぎった　ひとの\nうでに　あおい　ぬのを　まきつけて\nたおれるまで　いのちを　すいとる。"
        jp_kanji:
          x: "死者の　魂が　古代の　剣に\n宿って　生まれたらしい。\n人に　とりつき　命を　吸う。"
          y: "剣の　柄を　握った　人の　腕に\n青い　布を　巻きつけて\n倒れるまで　命を　吸い取る。"
        en:
          x: "Apparently this Pokémon is born when a\ndeparted spirit inhabits a sword. It attaches itself\nto people and drinks their life force."
          y: "If anyone dares to grab its hilt, it wraps\na blue cloth around that person’s arm and\ndrains that person’s life energy completely."
        fr:
          x: "Ce Pokémon naît quand l’âme d’un défunt prend\npossession d’une épée ancienne. Il s’accroche aux\nhumains pour absorber leur énergie vitale."
          y: "Si quelqu’un s’aventure à l’empoigner, il enroule son\nétoffe bleue autour du bras de l’infortuné et aspire\nson énergie vitale jusqu’à ce que ce dernier s’écroule."
        it:
          x: "Sembra sia nato quando uno spirito si impossessò\ndi un’antica spada. Si lega agli esseri umani per\nassorbirne la forza vitale."
          y: "Avvolge il drappo blu attorno al braccio di chiunque\nsi azzardi a impugnarne l’elsa e assorbe la sua energia\nfino a fargli perdere i sensi."
        de:
          x: "Dieses Pokémon wird geboren, wenn die Seele eines\nVerstorbenen sich in einem Schwert festsetzt. Es heftet\nsich an Menschen und saugt deren Lebenskraft aus."
          y: "Es wickelt ein blaues Tuch um den Arm von Menschen,\ndie seinen Schwertgriff ergreifen, und absorbiert deren\nLebensenergie, bis sie zusammenbrechen."
        es:
          x: "Cuentan que este Pokémon nace cuando el espíritu de\nun difunto toma posesión de una espada antigua.\nSe aferra a las personas y absorbe su energía."
          y: "Si alguien osa empuñarlo, se enrolla en el brazo del\ndesafortunado con su paño azul y le absorbe toda la\nenergía hasta que pierde el sentido."
        ko:
          x: "죽은 자의 혼이 고대의\n검에 깃들어 태어났다고 한다.\n사람에게 씌어 생명을 빨아들인다."
          y: "검의 자루를 잡은 사람의\n팔에 파란 천을 감아서\n쓰러질 때까지 목숨을 빨아들인다."
doublade:
  species_id: 680
  names:
    jp_kana: ニダンギル
    jp_kanji: ニダンギル
    en: Doublade
    fr: Dimoclès
    it: Doublade
    de: Duokles
    es: Doublade
    ko: 쌍검킬
  forms:
