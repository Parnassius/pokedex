      descriptions:
        jp_kana:
          x: "さむくなると　あちこちから\nレディバが　たくさん　あつまって\nよりそいあい　あたためあう。"
          y: "おくびょうで　すぐに　むれをつくる。\nあしから　でる　えきたいの　においで\nじぶんの　いばしょを　しらせる。"
        jp_kanji:
          x: "寒くなると　あちこちから\nレディバが　たくさん　集まって\n寄り添いあい　温め合う。"
          y: "臆病で　すぐに　群れを作る。\n脚から　出る　液体の　においで\n自分の　居場所を　知らせる。"
        en:
          x: "When the weather turns cold, lots of Ledyba gather\nfrom everywhere to cluster and keep each\nother warm."
          y: "It is timid and clusters together with others.\nThe fluid secreted by its feet indicates its location."
        fr:
          x: "Quand le temps se rafraîchit, de nombreux Coxy se\nréunissent pour conserver un maximum de chaleur."
          y: "Il est timide et reste près de ses semblables. Il a\nun sens du toucher très développé."
        it:
          x: "Quando inizia a far freddo, i Ledyba si riuniscono\nda ogni luogo per scaldarsi tra loro."
          y: "Timidi, stanno sempre uniti. La traccia del liquido\nche esce dalle zampe mostra dove si trovano."
        de:
          x: "Wird es kalt, versammeln sich viele Ledyba von\nnah und fern, um sich gegenseitig Wärme zu schenken."
          y: "Es ist scheu und stets mit Artgenossen zusammen.\nDas Sekret an seinen Füßen führt zu seinem Standort."
        es:
          x: "Cuando llega el frío, se reúnen muchos Ledyba de\ntodas partes para darse calor."
          y: "Es muy tímido y se refugia con los de su especie.\nAl caminar, deja una estela que indica dónde está."
        ko:
          x: "추워지면 여기저기로부터\n레디바가 많이 모여들어\n바싹 붙어 서로 따뜻하게 해준다."
          y: "겁쟁이여서 금방 무리를 만든다.\n다리에서 나오는 액체의 냄새로\n자신이 있는 곳을 알린다."
ledian:
