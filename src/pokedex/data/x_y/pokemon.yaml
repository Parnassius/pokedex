        jp_kana:
          x: "さいきょうの　からてチョップを\nもとめて　やまおくに　こもって\nねむることなく　しゅぎょうする。"
          y: "おびを　しめると　きあいが　はいり\nパンチの　はかいりょくが　ます。\nしゅぎょうを　ジャマすると　おこる。"
        jp_kanji:
          x: "最強の　からてチョップを\n求めて　山奥に　こもって\n眠ることなく　修行する。"
          y: "帯を　締めると　気合いが　入り\nパンチの　破壊力が　増す。\n修行を　ジャマすると　怒る。"
        en:
          x: "Desiring the strongest karate chop, they seclude\nthemselves in mountains and train without sleeping."
          y: "Tying their belts gets them pumped and makes their\npunches more destructive. Disturbing their training\nangers them."
        fr:
          x: "Pour accéder à la maîtrise ultime du karaté, il se\nretire dans les montagnes et s’entraîne nuit et jour."
          y: "Quand il noue sa ceinture, il est plus concentré et\nses coups font plus mal. Il s’énerve si on gêne son\nentraînement."
        it:
          x: "Si allena senza posa, giorno e notte, sui monti per\npotenziare al massimo i suoi colpi di karate."
          y: "La cintura da karate gli dà la carica e aumenta la\nforza distruttiva dei pugni. Quando si allena, meglio\nnon disturbarlo."
        de:
          x: "Es lebt zurückgezogen in den Bergen und trainiert\nTag und Nacht, um seinen Karateschlag\nzu perfektionieren."
          y: "Zieht es den Gürtel fest, werden seine Hiebe stärker.\nKann es gar nicht leiden, wenn man es beim Training\nstört."
        es:
          x: "Para lograr dominar las técnicas de kárate más letales,\nse retiran a las montañas y entrenan día y noche."
          y: "La potencia de sus puñetazos aumenta si se aprieta el\ncinturón. Si le molestan cuando se entrena, se enfada."
        ko:
          x: "최강의 태권당수를\n목표로 산속에 틀어박혀\n잠도 없이 수행한다."
          y: "끈을 매면 기합이 들어가\n펀치의 파괴력이 강해진다.\n수련을 방해하면 화를 낸다."
sewaddle:
  species_id: 540
  names:
