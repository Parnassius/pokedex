          y: "つきの　はどうを　あびると\nぜんしんの　わっかもようが　ひかり\nふしぎな　ちからに　あふれるのだ。"
        jp_kanji:
          x: "月の　光が　イーブイの\n遺伝子を　変化させた。\n闇に　潜み　獲物を　待つ。"
          y: "月の　波動を　浴びると\n全身の　輪っか模様が　光り\n不思議な　力に　あふれるのだ。"
        en:
          x: "The light of the moon changed Eevee’s genetic\nstructure. It lurks in darkness for prey."
          y: "When exposed to the moon’s aura, the rings on its\nbody glow faintly and it’s filled with a\nmysterious power."
        fr:
          x: "La lumière de la lune a modifié le code génétique\nd’Évoli. Il hante les ombres en quête d’une proie."
          y: "Quand il s’expose à la lumière de la lune, ses anneaux\nbrillent et il développe de mystérieux pouvoirs."
        it:
          x: "La luce lunare ha mutato la struttura genetica di\nEevee. Si cela nel buio in attesa della preda."
          y: "Quando è esposto alla luce lunare i cerchi sul suo\ncorpo brillano e si carica di uno strano potere."
        de:
          x: "Mondlicht hat die genetische Struktur von Evoli\nverändert. Im Dunkeln wartet es auf Beute."
          y: "Wird es der Aura des Mondes ausgesetzt,\nglühen seine Ringe und es wird von einer\nmysteriösen Kraft durchströmt."
        es:
          x: "Creado cuando la luz lunar alteró la estructura\ngenética de Eevee. Busca presas en la oscuridad."
          y: "Cuando lo baña la luz de la luna, los círculos de su\npelaje brillan levemente y se ve revestido de un poder\nmisterioso."
        ko:
          x: "달빛이 이브이의\n유전자를 변화시켰다.\n어둠에 숨어 먹이를 기다린다."
          y: "달의 파동을 쬐면\n전신의 고리 모양이 빛나며\n이상한 힘이 넘친다."
