          y: "しっぽの　さきには　みずより　かるい\nあぶらが　つまっているので\nうきぶくろの　かわりに　なるのだ。"
        jp_kanji:
          x: "全身の　体毛は\n水を　弾く　性質を　持ち\n水浴び　しても　乾いている。"
          y: "尻尾の　先には　水より　軽い\n油が　つまっているので\n浮き袋の　かわりに　なるのだ。"
        en:
          x: "The fur on its body naturally repels water. It can\nstay dry, even when it plays in the water."
          y: "The tip of its tail is filled with oil that is lighter than\nwater, so it acts as a float."
        fr:
          x: "Sa fourrure est imperméable, si bien qu’il reste sec\nmême en jouant dans l’eau."
          y: "Le bout de sa queue renferme une huile plus légère\nque l’eau qui fait office de flotteur."
        it:
          x: "La pelliccia è idrorepellente. Così, rimane asciutto\nanche giocando nell’acqua."
          y: "La punta della coda contiene un olio più leggero\ndell’acqua, che gli permette di stare a galla."
        de:
          x: "Sein Fell ist von Natur aus wasserabweisend.\nEs bleibt trocken, auch wenn es im Wasser spielt."
          y: "Seine Schweifspitze ist mit Öl gefüllt, das leichter\nals Wasser ist, sodass es nicht untergeht."
        es:
          x: "Tiene una piel que repele el agua. De hecho, puede\npasarse horas jugando en el agua sin mojarse."
          y: "La punta de su cola está llena de un aceite que, al\nser más ligero que el agua, le permite flotar."
        ko:
          x: "전신의 털은\n물을 튕겨내는 성질을 지녀\n물을 끼얹어도 말라 있다."
          y: "꼬리의 끝에는 물보다 가벼운\n기름이 가득 차 있어서\n부낭 대신 쓸 수 있다."
