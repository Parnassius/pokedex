          x: "スベスベした　くろいひふは　うすく\nしめっている。ないぞうの　いちぶが\nすけて　うずまきじょうに　みえる。"
          y: "うずまきの　むきは　うまれた\nちほうに　よって　ちがうらしい。\nあるくより　およぐほうが　じょうず。"
        jp_kanji:
          x: "スベスベした　黒い皮膚は　薄く\n湿っている。内臓の　一部が\n透けて　渦巻状に　見える。"
          y: "渦巻の　向きは　生まれた\n地方によって　違うらしい。\n歩くより　泳ぐほうが　上手。"
        en:
          x: "Its slick black skin is thin and damp. A part of its\ninternal organs can be seen through the skin as a\nspiral pattern."
          y: "The direction of the spiral on the belly differs by\narea. It is more adept at swimming than walking."
        fr:
          x: "Sa peau est humide, lisse et surtout très fine. La\nforme en spirale sur son ventre est en fait une partie\nde ses organes internes que l’on peut apercevoir."
          y: "Le sens de la spirale sur son ventre diffère selon\nson origine. Il préfère la nage à la marche."
        it:
          x: "Dalla pelle nera, lucida, umida e sottile si intravedono\ngli organi interni, che formano una spirale."
          y: "La spirale che ha sulla pancia varia da zona a zona.\nÈ molto più bravo nel nuoto che nella corsa."
        de:
          x: "Seine glatte, schwarze Haut ist dünn und feucht.\nTeilweise sind seine Innereien als spiralförmige\nMuster sichtbar."
          y: "Dieses Pokémon kann sehr schlecht laufen.\nSein Bauchmuster ist unterschiedlich, je nach Region."
        es:
          x: "Tiene una piel extraordinaria, fina y húmeda, que deja\nentrever las vísceras que tiene dispuestas en espiral."
          y: "La dirección de la espiral en el vientre cambia según el\nárea. Prefiere nadar a correr."
        ko:
          x: "매끄럽고 검은 피부는 얇고\n축축하다. 내장 일부가\n비쳐서 소용돌이 모양으로 보인다."
          y: "배의 소용돌이 방향은 태어난\n지방에 따라 다른 듯하다.\n걷기보다 헤엄치기를 잘한다."
poliwhirl:
