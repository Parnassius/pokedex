          y: "ゆきやまで　そうなんした　じょせいの\nうまれかわりという　いいつたえが\nゆきの　おおい　とちに　のこる。"
        jp_kanji:
          x: "マイナス５０度の　冷気を　吐いて\n相手を　凍らせる。胴体に　見える\n部分は　じつは　空洞。"
          y: "雪山で　遭難した　女性の\n生まれ変わりという　言い伝えが\n雪の　多い　土地に　残る。"
        en:
          x: "It freezes foes with an icy breath nearly\n-60 degrees Fahrenheit. What seems to be its body\nis actually hollow."
          y: "Legends in snowy regions say that a woman who\nwas lost on an icy mountain was reborn as Froslass."
        fr:
          x: "Momartik gèle ses ennemis grâce à son souffle à\n-50 °C. Ça ne se voit pas, mais son corps est creux."
          y: "On dit dans les régions enneigées qu’il s’agit de\nla réincarnation d’une jeune fille disparue dans\nles neiges."
        it:
          x: "Congela i nemici con un alito glaciale a -50 °C.\nIl suo corpo è vuoto."
          y: "Qua e là corre ancora voce che Froslass fosse in\norigine una donna dispersa in montagna tra la neve."
        de:
          x: "Sein eisiger Atem mit -50 °C friert Gegner ein.\nWas aussieht wie sein Körper, ist tatsächlich hohl."
          y: "In schneereichen Gegenden erzählt man sich, es sei\ndie Wiedergeburt einer in den Bergen Verunglückten."
        es:
          x: "Congela a sus enemigos con un aliento gélido de\n-50 °C. Su cuerpo está hueco."
          y: "Cuenta la leyenda que es la reencarnación de mujeres\nque sufrieron accidentes en la nieve."
        ko:
          x: "마이너스 50도의 냉기를 뿜어\n상대를 얼려 버린다. 몸통 같은\n부분은 실제로는 빈 공간이다."
          y: "설산에서 조난당한 여성이\n다시 태어난 것이라고 하는 전설이\n눈이 많은 땅에 남아 있다."
