      descriptions:
        jp_kana:
          x: "あさがた　のぼる　たいようを\nじっと　みつめ　いのりを　ささげると\nほとんど　うごかず　１にちをおえる。"
          y: "ほとんど　うごかず　なきもせず\nじっとするのは　かこと　みらいを\nみているからだと　しんじられている。"
        jp_kanji:
          x: "朝方　昇る　太陽を\nじっと　見つめ　祈りを　ささげると\nほとんど　動かず　１日を終える。"
          y: "ほとんど　動かず　鳴きもせず\nじっとするのは　過去と　未来を\n見ているからだと　信じられている。"
        en:
          x: "Once it begins to meditate at sunrise, the entire day\nwill pass before it will move again."
          y: "They say that it stays still and quiet because it is\nseeing both the past and future at the same time."
        fr:
          x: "Il peut rester à méditer sans bouger, du lever du\nsoleil jusqu’à la tombée de la nuit."
          y: "On dit qu’il est calme et tranquille car il peut voir en\npermanence le passé et le futur."
        it:
          x: "Quando, all’alba, inizia a meditare, riesce a rimanere\nimmobile fino alla fine del giorno."
          y: "Si dice che sia così quieto perché sta osservando\npassato e futuro allo stesso tempo."
        de:
          x: "Wenn es bei Sonnenaufgang anfängt zu meditieren,\nvergeht der ganze Tag, ehe es sich wieder bewegt."
          y: "Man sagt, es sei so still und in sich gekehrt, weil es\ndie Zukunft und die Vergangenheit parallel sieht."
        es:
          x: "Cuando se pone a meditar al amanecer, pierde la\nnoción del tiempo. Puede pasarse así todo el día."
          y: "Dicen que se mantiene quieto y en silencio porque\nobserva el pasado y el futuro al mismo tiempo."
        ko:
          x: "선명하게 떠오르는 태양을\n조용히 바라보며 기도를 올리면\n거의 움직이지 않고 하루가 간다."
          y: "거의 움직이거나 울지 않고\n가만히 있는 것은 과거와 미래를\n보고 있기 때문이라고 여겨진다."
