      hidden_ability: water_veil
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          x: "ひかりの　とどかない　しんかいに\nせいそく。こざかなに　にた　しっぽを\nひからせて　えものを　さそいだす。"
          y: "しんかいに　せいそくする　ポケモン。\nこざかなの　かたちをした　しっぽで\nえものを　おびきよせ　つかまえる。"
        jp_kanji:
          x: "光の　届かない　深海に　生息。\n小魚に　似た　尻尾を　光らせて\n獲物を　誘い出す。"
          y: "深海に　生息する　ポケモン。\n小魚の　形をした　尻尾で\n獲物を　誘き寄せ　捕まえる。"
        en:
          x: "It lives deep in the sea where no light ever filters\ndown. It lights up its small fishlike tail to\nattract prey."
          y: "It lives deep in the sea. With a tail shaped like a\nsmall fish, it attracts unsuspecting prey."
        fr:
          x: "Il vit dans les abysses, là où la lumière ne va jamais.\nIl allume le bout de sa queue, qui ressemble à un\npoisson, pour attirer ses proies."
          y: "Il vit loin sous la mer. Il appâte les proies crédules\navec sa queue qui rappelle un petit poisson."
        it:
          x: "Vive in mare a grandi profondità, dove non filtra\nnessuna luce. Attira le prede illuminando la codina\na forma di pesce."
          y: "Vive nei mari profondi. Con la coda a forma di\npesciolino attrae prede ignare del pericolo."
        de:
          x: "Es lebt tief im Meer, wo Sonnenlicht nie vordringt.\nBeim Beutefang leuchtet sein fischartiger Schwanz,\num Beute anzulocken."
          y: "Es lebt tief im Meer. Sein Schweif ist wie ein kleiner\nFisch geformt. Mit ihm lockt es Beute an."
        es:
          x: "Vive en los abismos marinos, donde no se filtra la luz.\nTiene una cola en forma de pez, que enciende para\natraer a su presa."
          y: "Vive en los fondos marinos. Atrae a sus confiadas\npresas con la cola, que tiene forma de pez."
        ko:
          x: "빛이 닿지 않는 심해에 서식한다.\n작은 생선처럼 생긴 꼬리를\n빛내어 먹잇감을 유인한다."
          y: "심해에 서식하는 포켓몬이다.\n작은 물고기 형태를 한 꼬리로\n먹이를 끌어들여 붙잡는다."
gorebyss:
