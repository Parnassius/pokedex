      descriptions:
        jp_kana:
          x: "うつくしい　スタイルは　ぜんしんの\nはったつした　きんにくの　おかげ。\nおともたてずに　よるを　かけぬける。"
          y: "けはいを　ころして　せっきんする。\nあいてが　きづく　まえに　はいごから\nしのびより　しとめてしまうのだ。"
        jp_kanji:
          x: "美しい　スタイルは　全身の\n発達した　筋肉の　おかげ。\n音もたてずに　夜を　駆けぬける。"
          y: "気配を　殺して　接近する。\n相手が　気づく　前に　背後から\n忍び寄り　しとめてしまうのだ。"
        en:
          x: "Their beautiful form comes from the muscles they\nhave developed. They run silently in the night."
          y: "Stealthily, it sneaks up on its target, striking from\nbehind before its victim has a chance to react."
        fr:
          x: "Sa ligne élégante cache une musculature féline\nqui lui permet de surprendre lors de ses attaques\nnocturnes."
          y: "Il s’approche sans un bruit de sa proie et l’abat\nd’un coup par-derrière sans jamais être repéré."
        it:
          x: "I muscoli tonici del suo corpo gli donano una figura\ndavvero affascinante. Si aggira silenzioso nel buio\ndella notte."
          y: "Si avvicina di soppiatto alle spalle del nemico\ncolpendolo prima che se ne accorga."
        de:
          x: "Sein anmutiges Auftreten verdankt es den Muskeln,\ndie es entwickelt hat. Es prescht lautlos durch die\nNacht."
          y: "Verbirgt seine Aura und nähert sich seinem Gegner\nvöllig unbemerkt von hinten, um ihm den Garaus\nzu machen."
        es:
          x: "Su bella y grácil silueta le viene dada por su\ndesarrollada musculatura, que le permite andar de\nnoche sin hacer ruido."
          y: "Se aproxima evitando que lo detecten. Con sigilo, se\nacerca a su rival por la espalda y lo ataca."
        ko:
          x: "아름다운 스타일은 전신의\n발달한 근육 덕분이다.\n소리도 내지 않고 밤을 달린다."
          y: "기척을 지우고 접근한다.\n상대가 눈치채기 전에 뒤쪽으로\n살며시 다가가 꼼짝 못하게 한다."
pansage:
