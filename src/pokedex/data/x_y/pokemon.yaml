        jp_kana:
          x: "いわの　ように　かたい　うでを\nひとふり　するだけで　きょだいな\nいわを　コナゴナに　くだくぞ。"
          y: "おおがたせんを　ひっぱって　およぐ\nパワーの　もちぬし。ふとい　うでの\nひとふりで　あいてを　たたきのめす。"
        jp_kanji:
          x: "岩の　ように　硬い　腕を\n一振り　するだけで　巨大な　岩を\nコナゴナに　砕くぞ。"
          y: "大型船を　引っ張って　泳ぐ\nパワーの　持ち主。太い　腕の\n一振りで　相手を　たたきのめす。"
        en:
          x: "Its arms are hard as rock. With one swing, it can\nbreak a boulder into pieces."
          y: "It can swim while towing a large ship. It bashes\ndown foes with a swing of its thick arms."
        fr:
          x: "Un seul coup de ses puissants bras suffit pour\npulvériser même les plus gros rochers."
          y: "Il peut traîner un grand bateau en nageant.\nIl assomme l’ennemi d’un grand coup de ses bras\népais."
        it:
          x: "Ha braccia dure come roccia, capaci di frantumare\nin mille pezzi un masso con un colpo solo."
          y: "Nuotando riesce a trainare una grande nave. Con le\nbraccia vigorose abbatte i nemici in un sol colpo."
        de:
          x: "Schon ein Hieb seiner steinharten Arme schlägt\nselbst den stärksten Felsen zu Bruch."
          y: "Es kann im Schwimmen ein großes Schiff ziehen.\nSeine Gegner schlägt es mit Schlägen seiner Arme\nzurück."
        es:
          x: "Con sus brazos duros como el acero puede partir\nrocas gigantescas en mil pedazos de un solo golpe."
          y: "Puede nadar y arrastrar un barco grande. Golpea a sus\nenemigos con sus gruesos brazos."
        ko:
          x: "돌처럼 딱딱한 팔을\n한 번 휘두르는 것만으로 거대한\n돌을 조각조각으로 부순다."
          y: "큰 배를 끌며 헤엄치는\n파워의 소유자이다. 굵은 팔을\n한 번 휘둘러 상대를 때려눕힌다."
poochyena:
