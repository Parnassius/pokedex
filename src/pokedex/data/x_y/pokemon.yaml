          y: "したが　しんちょうの　２ばいもある。\nエサをとったり　こうげきをしたりと\nまるで　てのように　うごかせる。"
        jp_kanji:
          x: "長い　舌は　ねばねばした\nだえきで　べっとり。どんなものでも\nくっついて　とても　便利。"
          y: "舌が　身長の　２倍もある。\nエサを　取ったり　攻撃を　したりと\nまるで　手のように　動かせる。"
        en:
          x: "Its long tongue, slathered with a gooey saliva,\nsticks to anything, so it is very useful."
          y: "Its tongue is twice the length of its body. It can be\nmoved like an arm for grabbing food and attacking."
        fr:
          x: "Sa longue langue sécrète une salive gluante qui se\ncolle à n’importe quoi. Elle est très efficace !"
          y: "Sa langue fait deux fois la taille de son corps.\nIl l’utilise comme un bras pour saisir de la nourriture\nmais aussi pour attaquer."
        it:
          x: "La lunga lingua intrisa di saliva appiccicosa si\nattacca agli oggetti e può diventare molto utile."
          y: "La sua lingua è lunga il doppio del corpo. La usa\ncome un braccio per afferrare cibo e attaccare."
        de:
          x: "Seine Zunge ist mit klebrigem Speichel bedeckt,\nder überall haftet. Dies ist sehr nützlich."
          y: "Seine Zunge ist doppelt so lang wie sein Körper.\nEs kann sie wie einen Arm bewegen, um damit\nNahrung zu greifen oder zu attackieren."
        es:
          x: "Su larga lengua, recubierta de saliva pegajosa, se\npega a todo, por lo que es muy útil."
          y: "La lengua es tan larga que duplica su altura. Es útil\nporque puede moverla para agarrar comida y atacar."
        ko:
          x: "긴 혀는 끈적끈적한\n침으로 덮여 있다. 어떤 것이든\n달라붙어서 매우 편리하다."
          y: "혀가 키의 2배나 된다.\n먹이를 잡거나 공격을 할 때면\n마치 손처럼 움직인다."
