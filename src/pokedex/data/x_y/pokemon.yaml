          y: "ゆうぐれどき　すずしくなると\nみずから　あがってきた　ウパーたちは\nエサを　さがして　みずべを　あるく。"
        jp_kanji:
          x: "冷たい　水の中で　生活。\nあたりが　涼しくなると　エサを\n探しに　地上にも　現れる。"
          y: "夕暮れどき　涼しくなると\n水から　上がってきた　ウパーたちは\nエサを　探して　水辺を　歩く。"
        en:
          x: "This Pokémon lives in cold water. It will leave the\nwater to search for food when it gets cold outside."
          y: "When the temperature cools in the evening,\nthey emerge from water to seek food along\nthe shore."
        fr:
          x: "Ce Pokémon vit en eaux froides. Il ne les quitte que\npour se nourrir quand il fait froid à l’extérieur."
          y: "Il émerge de l’eau lorsque l’air se rafraîchit pour\npartir chasser sur les berges."
        it:
          x: "Vive nell’acqua fredda. Quando fa freddo fuori,\nesce dall’acqua per cercare cibo."
          y: "Attende la sera, quando scende la temperatura, per\navventurarsi sulla riva alla ricerca di cibo."
        de:
          x: "Dieses Pokémon lebt in Eiswasser. Wird es an Land\nkalt, verlässt es das Wasser und sucht nach Futter."
          y: "Wenn es am Abend kühler wird, kommen sie an Land,\num nach Nahrung zu suchen."
        es:
          x: "Este Pokémon vive en aguas frías. Sale del agua para\nbuscar comida cuando refresca el ambiente."
          y: "Cuando la temperatura baja por la tarde, emerge del\nagua y va a la orilla en busca de comida."
        ko:
          x: "차가운 물속에서 생활한다.\n근처가 선선해지면 먹이를\n찾으러 지상에도 나타난다."
          y: "해질녘 시원해지면\n물에서 올라온 우파들은\n먹이를 찾으러 물가를 걷는다."
