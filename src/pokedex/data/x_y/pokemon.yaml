          y: "１０００ねんかんで　７にちだけ\nめを　さまし　どんな　ねがいごとでも\nかなえる　ちからを　つかうという。"
        jp_kanji:
          x: "目覚めた　とき　頭の　短冊に\n書かれた　願い事を　かなえると\n大昔から　語り継がれてきた。"
          y: "１０００年間で　７日だけ\n目を　覚まし　どんな　願い事でも\nかなえる　力を　使うという。"
        en:
          x: "Generations have believed that any wish written on\na note on its head will come true when it awakens."
          y: "It is said to have the ability to grant any wish for\njust one week every thousand years."
        fr:
          x: "On raconte qu’à son réveil, il exauce les vœux écrits\nsur les rubans de papier de sa tête."
          y: "On raconte qu’une fois tous les 1 000 ans, il a la\ncapacité d’exaucer tous les vœux durant une semaine."
        it:
          x: "Da sempre si dice che al risveglio realizzi i desideri\nscritti sulle striscioline attaccate in testa."
          y: "Ha l’abilità di realizzare ogni desiderio, ma soltanto\nper una settimana ogni 1000 anni."
        de:
          x: "Wenn Jirachi erwacht, erfüllt es die Wünsche,\ndie man auf die Zettel an seinem Kopf geschrieben hat."
          y: "Man sagt, es kann alle 1 000 Jahre für eine Woche\njeden Wunsch erfüllen."
        es:
          x: "Desde antaño se dice que concederá los deseos\nescritos en las notas de su cabeza cuando se\ndespierte."
          y: "Se dice que puede otorgar cualquier deseo durante\nuna semana cada 1000 años."
        ko:
          x: "깨어났을 때 머리의 종이에\n쓴 소원을 이루어준다고\n먼 옛날부터 구전되었다."
          y: "1000년 중 7일 동안만 깨어나\n모든 소원을 이루어주는\n능력을 발휘한다고 한다."
