      descriptions:
        jp_kana:
          x: "４まいに　ふえた　つばさで\nくらやみを　しずかに　とんでいく。\nとなりを　とおられても　きづかない。"
          y: "４まいに　ふえた　はねを　つかい\nさらに　はやく　しずかに　とんで\nえものに　きづかれず　しのびよる。"
        jp_kanji:
          x: "４枚に　増えた　翼で\n暗闇を　静かに　飛んでいく。\nとなりを　通られても　気づかない。"
          y: "４枚に　増えた　羽を　使い\nさらに　速く　静かに　飛んで\n獲物に　気づかれず　忍びよる。"
        en:
          x: "It flies so silently through the dark on its four wings\nthat it may not be noticed even when nearby."
          y: "Having four wings allows it to fly more quickly and\nquietly so it can sneak up on prey without\nits noticing."
        fr:
          x: "Il vole en silence dans l’obscurité à l’aide de ses\nquatre ailes. On ne l’entend pas, même s’il est très\nproche."
          y: "Ses quatre ailes lui permettent de voler furtivement\npour approcher ses proies sans les effrayer."
        it:
          x: "Vola nel buio con le sue quattro ali in modo talmente\nsilenzioso che è difficile notarlo anche se è vicino."
          y: "Con il secondo paio d’ali ottenuto dall’evoluzione,\nvola verso le prede in modo ancora più veloce e\nsilenzioso."
        de:
          x: "Mit seinen vier Flügeln fliegt es so geräuschlos\ndurch die Nacht, dass man es nicht bemerkt."
          y: "Dank seiner vier Flügel kann es sich seiner Beute\nnoch schneller und leiser nähern, ohne dabei\nbemerkt zu werden."
        es:
          x: "Es tan silencioso cuando vuela en la oscuridad con sus\ncuatro alas, que cuesta percibirlo cuando se acerca."
          y: "Al contar con cuatro alas, puede acechar de manera\nmás rápida y sigilosa a sus presas sin que estas lo\nperciban."
        ko:
          x: "4장으로 수가 늘어난 날개로\n어둠 속을 조용히 날아간다.\n주위를 지나쳐도 눈치채지 못한다."
          y: "4장으로 늘어난 날개를 사용하여\n더욱 빠르고 조용하게 날아\n먹이가 눈치채지 않게 살며시 다가간다."
chinchou:
  species_id: 170
  names:
    jp_kana: チョンチー
    jp_kanji: チョンチー
    en: Chinchou
