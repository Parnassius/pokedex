          y: "２ひきの　ダンバルが　がったいした。\n２つの　のうみそが　れんけつしたので\nサイコパワーは　より　つよくなった。"
        jp_kanji:
          x: "２匹の　ダンバルが　合体した。\n鋼の　ボディは　ジェット機と\n衝突しても　傷つかない。"
          y: "２匹の　ダンバルが　合体した。\n２つの　脳みそが　連結したので\nサイコパワーは　より　強くなった。"
        en:
          x: "It is formed by two Beldum joining together.\nIts steel body won’t be scratched if it collides\nwith a jet."
          y: "It is formed by two Beldum joining together. Its two\nbrains are linked, amplifying its psychic power."
        fr:
          x: "Il est formé de deux Terhal soudés. Son corps de fer\nrésiste à un choc avec un avion à réaction."
          y: "Il est formé de deux Terhal soudés. Leurs deux\ncerveaux étant liés, ses pouvoirs psychiques sont\ntrès puissants."
        it:
          x: "È sorto dalla fusione di due Beldum. Il suo corpo\nd’acciaio non viene scalfito neanche se urta un jet."
          y: "È nato dalla fusione di due Beldum. L’unione di due\ncervelli rende ancora più forti i suoi poteri psichici."
        de:
          x: "Das Pokémon besteht aus zwei Tanhel. Es bekommt\nselbst dann keinen Kratzer, wenn ein Jet es streift."
          y: "Es besteht aus zwei Tanhel. Dank der Vereinigung\nihrer beiden Hirne verfügen sie über gesteigerte\nPsycho-Kräfte."
        es:
          x: "Lo forman dos Beldum unidos. Puede chocarse con un\navión sin que su cuerpo de acero sufra ni un rasguño."
          y: "Está formado por dos Beldum unidos. Tiene dos\ncerebros, así que cuenta con poderes psíquicos\namplificados."
        ko:
          x: "2마리의 메탕이 합체했다.\n강철의 몸은 제트기와\n충돌해도 상처 입지 않는다."
          y: "2마리의 메탕이 합체했다.\n2개의 뇌가 연결되었기 때문에\n사이코 파워는 보다 강해졌다."
