        it:
          x: "Non usa la conchiglia del suo ventre solo durante\nla lotta, ma anche per tagliare a metà le bacche."
          y: "Combatte con la conchiglia che ha sul ventre.\nContrattacca prontamente dopo aver parato\nl’attacco avversario."
        de:
          x: "Die Muschel an seinem Bauch dient ihm nicht nur\nals Waffe, sondern auch als Messer, mit dem es\nBeeren aufschneidet."
          y: "Kämpft mit der Muschel auf seinem Bauch.\nPariert es einen Angriff, schlägt es sofort\nmit einer Schnitt-Attacke zurück."
        es:
          x: "La vieira de su ombligo no solo sirve como arma, sino\ntambién como instrumento para cortar las bayas que\nestén duras."
          y: "Ataca con la vieira de su ombligo. En cuanto para un\nataque, pasa al contraataque sin dilación."
        ko:
          x: "배에 생기는 가리비칼은\n싸울 때뿐 아니라 딱딱한\n나무열매를 쪼갤 때도 사용한다."
          y: "배에 있는 가리비칼로 싸운다.\n공격을 막고 그 즉시\n베어 반격한다."
