          y: "Once wrapped around its prey, it never lets go.\nIt eats the prey by tearing at it with sharp fangs."
        fr:
          x: "Ses tentacules sont développés comme s’il s’agissait\nde bras ou de jambes. Dès qu’il attrape une proie,\nil la mord."
          y: "Une fois enroulé autour de sa proie, il ne la laisse\npas repartir et la dévore avec ses crocs."
        it:
          x: "Ha tentacoli molto sviluppati, paragonabili ad arti\numani. Appena irretisce la preda, la morde."
          y: "Dopo aver avvolto la preda non la molla più. La\nmangia facendola a brandelli con i denti affilati."
        de:
          x: "Seine Tentakel sind hoch entwickelt und es setzt\nsie ähnlich Händen und Füßen ein. Sobald es Beute\nergriffen hat, beißt es zu."
          y: "Hat es die Beute erst eingewickelt, lässt es nicht\nmehr los. Es verspeist sie, indem es sie zerreißt."
        es:
          x: "Tiene los tentáculos tan desarrollados que le sirven de\nmanos y pies. Con ellos atrapa a su presa y le da un\nbocado."
          y: "Cuando agarra a su presa, nunca la deja escapar.\nSe la come despedazándola con sus colmillos."
        ko:
          x: "촉수가 팔다리처럼\n발달해 있다.\n달라붙자마자 문다."
          y: "한번 휘감으면 절대\n놓지 않는다. 날카로운 이빨로\n먹이를 찢듯이 먹는다."
