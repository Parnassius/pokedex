uxie:
  species_id: 480
  names:
    jp_kana: ユクシー
    jp_kanji: ユクシー
    en: Uxie
    fr: Créhelf
    it: Uxie
    de: Selfe
    es: Uxie
    ko: 유크시
  forms:
    uxie:
      form_id: 0
      base_stats:
        hp: 75
        attack: 75
        defense: 130
        special_attack: 75
        special_defense: 130
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          x: "ちしきのかみ　と　よばれている。\nめを　あわせた　ものの　きおくを\nけしてしまう　ちからを　もつという。"
          y: "ユクシーの　たんじょうにより\nひとびとの　せいかつを　ゆたかにする\nちえが　うまれたと　いわれている。"
        jp_kanji:
          x: "知識の神と　呼ばれている。\n目を　合わせた　者の　記憶を\n消してしまう　力を　持つという。"
          y: "ユクシーの　誕生により\n人々の　生活を　豊かにする\n知恵が　生まれたと　言われている。"
        en:
          x: "Known as “The Being of Knowledge.” It is said that\nit can wipe out the memory of those who see\nits eyes."
          y: "It is said that its emergence gave humans the\nintelligence to improve their quality of life."
        fr:
          x: "On l’appelle « être du savoir ». On raconte que\nson regard a le pouvoir d’effacer la mémoire."
          y: "On dit que sa venue a fourni aux humains le bon sens\nnécessaire pour améliorer leur existence."
        it:
          x: "Noto come “Essere della conoscenza”. Pare che\nfaccia perdere la memoria a chiunque lo fissi."
          y: "Alla nascita di questo Pokémon l’uomo avrebbe\nricevuto la capacità di migliorare la propria esistenza."
        de:
          x: "„Das wissende Wesen“. Es soll die Erinnerungen\nderer löschen, die ihm in die Augen sehen."
          y: "Man sagt, dass durch sein Auftauchen Menschen\ndie Intelligenz erhielten, ihr Leben zu verbessern."
        es:
          x: "Se le conoce como el Ser de la Sabiduría. Se dice que\npuede borrar la memoria con una mirada."
          y: "Se dice que su aparición otorgó a los humanos la\ninteligencia para mejorar sus vidas."
        ko:
          x: "지식의 신이라 불리고 있다.\n눈을 마주친 사람의 기억을 지워\n버리는 힘을 가지고 있다고 한다."
          y: "유크시의 탄생에 의해\n사람들의 생활을 풍요롭게 하는\n지혜가 생겨났다고 전해진다."
mesprit:
  species_id: 481
  names:
    jp_kana: エムリット
    jp_kanji: エムリット
    en: Mesprit
    fr: Créfollet
    it: Mesprit
    de: Vesprit
    es: Mesprit
    ko: 엠라이트
  forms:
    mesprit:
      form_id: 0
      base_stats:
        hp: 80
        attack: 105
        defense: 105
        special_attack: 105
        special_defense: 105
        speed: 80
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          x: "かなしみの　くるしさと　よろこびの\nとうとさを　ひとびとに　おしえた。\nかんじょうのかみ　と　よばれている。"
          y: "みずうみの　そこで　ねむっているが\nたましいが　ぬけだして　すいめんを\nとびまわると　いわれている。"
        jp_kanji:
          x: "悲しみの　苦しさと　喜びの　尊さを\n人々に　教えた。\n感情の神と　呼ばれている。"
          y: "湖の　底で　眠っているが\n魂が　抜け出して　水面を\n飛び回ると　言われている。"
        en:
          x: "Known as “The Being of Emotion.” It taught\nhumans the nobility of sorrow, pain, and joy."
          y: "It sleeps at the bottom of a lake. Its spirit is said to\nleave its body to fly on the lake’s surface."
        fr:
          x: "On l’appelle « être de l’émotion ». Il enseigne aux\nhommes la beauté de la tristesse, la douleur et la\njoie."
          y: "Il dort au fond d’un lac. On dit que son esprit\nabandonne son corps pour voler à sa surface."
        it:
          x: "Detto “Essere delle emozioni”. Ha insegnato agli\nuomini la nobiltà di tristezza, gioia e dolore."
          y: "Dorme sul fondo di un lago. Si dice che il suo spirito\nabbandoni il corpo per volare in superficie."
        de:
          x: "„Das fühlende Wesen“. Es lehrt die Menschen\ndie Ideale von Trauer, Schmerz und Freude."
          y: "Es schläft auf dem Grund eines Sees. Man sagt, sein\nGeist verlasse den Körper und fliege über den See."
        es:
          x: "Se le conoce como el Ser de la Emoción. Enseñó a los\nhumanos la nobleza del dolor y la alegría."
          y: "Duerme en el fondo de un lago. Se dice que su\nespíritu deja el cuerpo para volar sobre el agua."
        ko:
          x: "슬픔의 괴로움과 즐거움의 소중함을\n사람들에게 가르쳐 주었다.\n감정의 신이라 불리고 있다."
          y: "호수의 밑바닥에서 잠자고 있지만\n영혼이 빠져나가서 수면을\n날아다닌다고 전해진다."
