      descriptions:
        jp_kana:
          x: "ひとなつっこい　せいかく。うつくしい\nさえずりと　おばねを　ふる　うごきで\nなかまに　あいずを　おくる。"
          y: "さえずる　こえは　うつくしいが\nなわばりに　はいった　あいては\nようしゃしない　あらあらしさだ。"
        jp_kanji:
          x: "人懐っこい　性格。美しい　さえずりと\n尾羽を　振る　動きで\n仲間に　合図を　送る。"
          y: "さえずる　声は　美しいが\n縄張りに　入った　相手は\n容赦しない　荒々しさだ。"
        en:
          x: "These friendly Pokémon send signals\nto one another with beautiful chirps\nand tail-feather movements."
          y: "Despite the beauty of its lilting voice, it’s\nmerciless to intruders that enter its territory."
        fr:
          x: "Peu farouche, il communique avec ses congénères\npar un doux gazouillis et par des signaux de la queue."
          y: "Son chant est harmonieux, mais trompeur !\nLes ennemis qui pénètrent sur son territoire se\nretrouvent confrontés à un déluge de violence."
        it:
          x: "Ha una natura amichevole. Comunica con i suoi simili\ntramite meravigliosi cinguettii e movimenti delle penne\ndella coda."
          y: "Cinguetta in modo meraviglioso, ma diventa\nestremamente aggressivo se un nemico invade\nil suo territorio."
        de:
          x: "Ein sehr zutrauliches Pokémon. Durch Zwitschern\nund Bewegen der Schwanzfedern sendet es Signale\nan seine Gefährten."
          y: "Sein Zwitschern ist wunderschön, aber wenn Gegner\nsein Revier betreten, kennt es keine Gnade."
        es:
          x: "Es muy amigable y se comunica con sus aliados\nmediante melodiosos gorjeos y el movimiento de su\ncola y sus gráciles alas."
          y: "Su melodioso gorjeo lo dota de una gran belleza,\npero adopta una actitud agresiva y despiadada hacia\ncualquiera que ose invadir su territorio."
        ko:
          x: "사람을 잘 따르는 성격이다. 아름다운\n지저귐과 꽁지를 흔드는 움직임으로\n동료에게 신호를 보낸다."
          y: "지저귀는 소리는 아름답지만\n영역에 들어온 상대를\n용서하지 않는 난폭한 성격이다."
fletchinder:
  species_id: 662
  names:
    jp_kana: ヒノヤコマ
    jp_kanji: ヒノヤコマ
    en: Fletchinder
    fr: Braisillon
    it: Fletchinder
    de: Dartignis
    es: Fletchinder
    ko: 불화살빈
