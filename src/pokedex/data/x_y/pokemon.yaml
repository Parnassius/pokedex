        - water
        - flying
      egg_groups:
        - water_1
      abilities:
        - swift_swim
        - water_absorb
      hidden_ability: water_veil
      descriptions:
        jp_kana:
          x: "およいで　スピードが　のってくると\nなみのうえに　とびだし　そのまま\n１００メートルも　かっくう　する。"
          y: "ゆうぜんと　うみを　およぐうちに\nたべのこしを　ねらった　テッポウオが\nヒレに　くっつくが　きにしていない。"
        jp_kanji:
          x: "泳いで　スピードが　のってくると\n波の上に　飛びだし　そのまま\n１００メートルも　滑空　する。"
          y: "悠然と　海を　泳ぐうちに\n食べ残しを　ねらった　テッポウオが\nヒレに　くっつくが　気にしていない。"
        en:
          x: "If it builds up enough speed swimming, it can fly\nover 300 feet out of the water from the surface of\nthe ocean."
          y: "While elegantly swimming in the sea, it ignores\nRemoraid that cling to its fins seeking food scraps."
        fr:
          x: "Il peut planer au-dessus des vagues sur plus de\n100 m en prenant son élan dans la mer."
          y: "Il ignore royalement les Rémoraid qui s’accrochent\nà ses nageoires pour manger les restes qu’il sème."
        it:
          x: "Prende velocità nuotando e, quando è pronto, usa\nle onde come trampolini per saltare a volte anche\nfino a 100 m."
          y: "Nuota in mare con eleganza e ignora i Remoraid che\ngli si attaccano alle pinne in cerca di avanzi di cibo."
        de:
          x: "Schwimmt es schnell genug, kann es über die Wellen\nspringen und bis zu 100 m durch die Lüfte gleiten."
          y: "Zieht elegant durch die Meere und ignoriert dabei\nRemoraid, die an seinen Flossen haften."
        es:
          x: "Acumula velocidad nadando y puede saltar fuera del\nagua, alcanzando 100 metros de altura, para\ndescender luego planeando."
          y: "Nada con gran elegancia e ignora a los Remoraid que\nse aferran a sus aletas buscando restos de comida."
        ko:
          x: "헤엄쳐서 스피드가 빨라지면\n파도 위에 뛰어올라 그대로\n100m나 활공한다."
          y: "유연하게 바다를 헤엄칠 때\n먹다 남은 음식을 노린 총어가\n지느러미에 달라붙지만 신경 안 쓴다."
