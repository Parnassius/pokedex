        jp_kana:
          x: "ほそくて　じょうぶな　いとを\nはりめぐらして　わなを　しかけると\nえものが　かかるのを　ひたすらまつ。"
          y: "えものが　ちかくを　とおりかかるまで\nじぶんの　すで　なんにちも　おなじ\nかっこうで　じっと　まちつづける。"
        jp_kanji:
          x: "細くて　丈夫な　糸を\n張り巡らして　わなを　仕掛けると\n獲物が　かかるのを　ひたすら待つ。"
          y: "獲物が　近くを　通りかかるまで\n自分の　巣で　何日も　同じ　格好で\nじっと　待ち続ける。"
        en:
          x: "It spins a web using fine--but durable--thread.\nIt then waits patiently for prey to be trapped."
          y: "It lies still in the same pose for days in its web,\nwaiting for its unsuspecting prey to wander close."
        fr:
          x: "Il tisse une toile en utilisant un fil fin mais solide,\npuis il attend tranquillement sa proie."
          y: "Il reste immobile dans sa toile pendant des jours.\nIl attend que sa proie se rapproche pour la capturer."
        it:
          x: "Tesse la tela con un filo sottile ma resistente. Poi\nattende paziente che una preda ci finisca dentro."
          y: "Può rimanere immobile nella tela per giorni,\nattendendo che s’avvicini una preda ignara."
        de:
          x: "Es spinnt ein Netz aus feinem, aber reißfestem\nFaden. Dann wartet es auf Beute, die im Netz zappelt."
          y: "Es sitzt tagelang regungslos in seinem Netz und lauert\nunvorsichtiger Beute auf, die ihm zu nahe kommt."
        es:
          x: "Teje su telaraña con hilo fino pero resistente. Espera\npacientemente a que caiga su presa."
          y: "Mantiene la misma postura en su telaraña durante días,\nesperando a que se acerque una presa inocente."
        ko:
          x: "가늘고 튼튼한 실을\n뿜어 엮어서 덫을 만들고\n먹이가 걸리기만을 기다린다."
          y: "먹이가 근처를 지나갈 때까지\n자신의 둥지에서 며칠이고 같은\n모습으로 가만히 기다린다."
ariados:
