          y: "ようせいの　なかまで　めったに\nひとまえに　でてこない。けはいを\nかんじて　すぐ　にげてしまうようだ。"
        jp_kanji:
          x: "１キロ先で　落ちた　針の　音も\n聞き分ける　優れた　耳を　持つ。\n静かな　山奥に　住んでいる。"
          y: "妖精の　仲間で　めったに\n人前に　出てこない。気配を\n感じて　すぐに　逃げてしまうようだ。"
        en:
          x: "Its hearing is so acute it can hear a pin drop over\nhalf a mile away. It lives on quiet mountains."
          y: "A timid fairy Pokémon that is rarely seen, it will run\nand hide the moment it senses people."
        fr:
          x: "Il aime le calme des montagnes. Son ouïe\nexceptionnelle entendrait une aiguille tomber à 1 km."
          y: "Ce Pokémon est une sorte de petite fée très rare.\nIl court vite se cacher s’il aperçoit un être humain."
        it:
          x: "Ha un udito tanto acuto da sentire la caduta di uno\nspillo a 1 km di distanza. Vive su monti quieti."
          y: "Timido Pokémon Fata, molto raro a vedersi. Scappa e\nsi nasconde non appena avverte la presenza umana."
        de:
          x: "Es kann eine Nadel hören, die in 1 km Entfernung\nzu Boden fällt. Es lebt in der Stille der Berge."
          y: "Ein feenhaftes und scheues Pokémon, das sofort\ndie Flucht ergreift, wenn es Menschen wittert."
        es:
          x: "Su oído es tan agudo que puede oír una aguja caer a\n1 km. Vive en montañas solitarias."
          y: "Un encantador y tímido Pokémon muy raro de ver.\nCorre y se oculta en cuanto siente que viene gente."
        ko:
          x: "1km 전방에 떨어진 바늘 소리도\n분간할 수 있는 우수한 귀를 가지고\n있다. 조용한 산속에 살고 있다."
          y: "요정의 동료로 좀처럼\n사람 앞에 나타나지 않는다. 기척을\n느끼면 바로 도망가는 듯하다."
vulpix:
