        jp_kana:
          x: "ようきな　おんがくを　きくと\nからだじゅうに　ちからが　みなぎり\nおどらずには　いられなくなるのだ。"
          y: "たのしい　おんがくの　リズムが\nルンパッパの　さいぼうを　かっせいか\nさせて　パワーを　はっきするのだ。"
        jp_kanji:
          x: "陽気な　音楽を　聴くと\n体中に　力が　みなぎり\n踊らずには　いられなくなるのだ。"
          y: "楽しい　音楽の　リズムが\nルンパッパの　細胞を　活性化させて\nパワーを　発揮するのだ。"
        en:
          x: "If it hears festive music, all its muscles fill with\nenergy. It can’t help breaking out into a dance."
          y: "The rhythm of bright, festive music activates\nLudicolo’s cells, making it more powerful."
        fr:
          x: "Ses muscles se tonifient au son d’une musique\nentraînante. Il ne peut pas s’empêcher de danser."
          y: "Les cellules de Ludicolo s’activent s’il entend\nune musique entraînante, le rendant encore plus\npuissant."
        it:
          x: "Se ascolta musica allegra, tutto il suo corpo si\nrivitalizza e non riesce a evitare di ballare."
          y: "Le sue cellule sono sollecitate dalla musica festosa,\nche lo rende più potente."
        de:
          x: "Hört es fröhliche Musik, füllen sich seine Muskeln\nmit Energie. Es muss dann einfach tanzen."
          y: "Der Rhythmus von Partymusik bringt das Blut von\nKappalores in Wallung und es wird dadurch stärker."
        es:
          x: "Cuando oye música alegre, sus músculos se llenan de\nenergía, y no puede evitar ponerse a bailar."
          y: "El ritmo de la música alegre y animada activa las\ncélulas de Ludicolo y estas le dan fuerza."
        ko:
          x: "경쾌한 음악을 들으면\n몸속의 힘이 넘쳐흘러\n춤추지 않고는 견딜 수 없게 된다."
          y: "즐거운 음악의 리듬이\n로파파의 세포를 활성화시켜\n파워를 발휘한다."
