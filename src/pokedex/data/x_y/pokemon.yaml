      held_items:
        rare: miracle_seed
      descriptions:
        jp_kana:
          x: "ひのひかりで　あかく　いろづく。\nえいようぶんが　すわれて　ちいさい\nたまが　しぼむと　しんかが　ちかい。"
          y: "ちいさな　たまに　つまった\nえいようぶんを　すいとって\nしんかの　エネルギーに　するのだ。"
        jp_kanji:
          x: "日の光で　赤く　色づく。\n栄養分が　吸われて　小さい　玉が\nしぼむと　進化が　近い。"
          y: "小さな　玉に　つまった\n栄養分を　吸い取って\n進化の　エネルギーに　するのだ。"
        en:
          x: "Sunlight colors it red. When the small ball is\ndrained of nutrients, it shrivels to herald evolution."
          y: "It evolves by sucking the energy out of the small\nball where it had been storing nutrients."
        fr:
          x: "Il rougit au soleil. Quand la petite boule est à court\nde nutriments, elle fane en signe d’évolution."
          y: "Il aspire les nutriments de sa petite boule pour pouvoir\névoluer."
        it:
          x: "La luce solare lo tinge di rosso. Se la pallina esaurisce\ni nutrimenti, si avvizzisce indicando l’evoluzione."
          y: "Ricava l’energia necessaria all’evoluzione dalla\npallina, ricca di sostanze nutritive."
        de:
          x: "Sonnenlicht färbt es rot. Verliert das kleine Bällchen\nNährstoffe, welkt es und die Entwicklung beginnt."
          y: "Es saugt Nährstoffe, die in seinem Bällchen enthalten\nsind, und nutzt die Energie für seine Entwicklung."
        es:
          x: "Bajo la luz solar es rojo. La esfera pequeña pierde sus\nnutrientes y se seca para anunciar la evolución."
          y: "Obtiene la energía necesaria para evolucionar de esa\npequeña esfera que está cargada de nutrientes."
        ko:
          x: "햇빛으로 빨갛게 물들었다.\n영양분이 흡수되어 작은 구슬이\n시들면 곧 진화한다는 뜻이다."
          y: "작은 구슬에 모인\n영양분을 흡수해\n진화의 에너지로 삼는다."
