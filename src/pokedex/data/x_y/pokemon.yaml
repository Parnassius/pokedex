        - chlorophyll
      hidden_ability: harvest
      descriptions:
        jp_kana:
          x: "３つの　あたまは　かんがえることは\nべつべつでも　なかよし　なので\nケンカしたり　しないらしい。"
          y: "あるく　ねったいうりんと　よばれる。\nおおきくなった　あたまの　ひとつが\nじめんに　おちると　タマタマになる。"
        jp_kanji:
          x: "３つの　頭は　考えることは\n別々でも　仲良しなので\nケンカしたり　しないらしい。"
          y: "歩く　熱帯雨林と　呼ばれる。\n大きくなった　頭の　ひとつが\n地面に　落ちると　タマタマになる。"
        en:
          x: "Its three heads think independently. However,\nthey are friendly and never appear to squabble."
          y: "It is called “The Walking Jungle.” If a head grows\ntoo big, it falls off and becomes an Exeggcute."
        fr:
          x: "Ses trois têtes sont autonomes. Elles semblent\ntoutefois en harmonie et ne se disputent jamais."
          y: "On l’appelle « jungle sur pattes ». Si une tête devient\ntrop grosse, elle tombe et produit un Noeunoeuf."
        it:
          x: "Ha tre teste che ragionano autonomamente.\nMa sono amichevoli e non litigano mai tra di loro."
          y: "Noto come “Giungla in moto”. Se una testa diventa\ntroppo grande, cade e si trasforma in Exeggcute."
        de:
          x: "Seine drei Köpfe denken unabhängig voneinander.\nDennoch sind sie nett zueinander und streiten nie."
          y: "Man nennt es den „Laufenden Dschungel“. Wird ein\nKopf zu groß, fällt er ab und wird zu einem Owei."
        es:
          x: "Sus tres cabezas piensan de forma independiente.\nSin embargo, son amigas y no suelen discutir nunca."
          y: "Se le llama la Selva Andante. Si una cabeza crece\ndemasiado, se cae y forma un Exeggcute."
        ko:
          x: "3개의 머리는 생각하는 것이\n각각 다르지만 사이가 좋아서\n싸우지 않는 것 같다."
          y: "걸어 다니는 열대 우림이라고\n불린다. 크게 자란 머리 중 하나가\n땅에 떨어지면 아라리가 된다."
cubone:
