          y: "なかまを　つくらずに　くらす。\nつばさの　きょうれつな　いちげきは\nたいぼくを　まっぷたつに　へしおる。"
        jp_kanji:
          x: "群れを　作らずに　１匹で　いる。\n自分が　一番　偉いと　どの\nポッタイシも　考えているようだ。"
          y: "仲間を　作らずに　暮らす。\n翼の　強烈な　一撃は\n大木を　真っ二つに　へし折る。"
        en:
          x: "It lives alone, away from others. Apparently, every\none of them believes it is the most important."
          y: "It lives a solitary life. Its wings deliver wicked blows\nthat can snap even the thickest of trees."
        fr:
          x: "Il vit seul, à l’écart de ses pairs. Chaque individu est\nconvaincu d’être meilleur que les autres."
          y: "C’est un Pokémon solitaire. Un seul coup de ses\npuissantes ailes peut briser un arbre en deux."
        it:
          x: "Vive da solo lontano dagli altri. Apparentemente\nogni esemplare crede di essere il più importante."
          y: "Vive senza riunirsi in gruppi. Con i suoi poderosi\ncolpi d’ala, può spaccare in due degli alberi enormi."
        de:
          x: "Es lebt allein, entfernt von anderen. Jedes von\nihnen denkt, es sei das Bedeutendste unter ihnen."
          y: "Pliprin sind Einzelgänger. Ein Schlag ihrer\nkräftigen Flügel haut selbst große Bäume entzwei."
        es:
          x: "Vive solo, alejado de los demás. Cada uno piensa que\nes el más importante."
          y: "No hace amigos. Puede partir en dos un árbol\ngigantesco de un fuerte aletazo."
        ko:
          x: "무리를 만들지 않고 혼자 생활한다.\n어떤 팽태자라도 자신이 제일\n훌륭하다고 생각하는 듯하다."
          y: "무리를 만들지 않고 생활한다.\n날개의 강렬한 일격은\n큰 나무를 두 동강으로 꺾는다."
empoleon:
