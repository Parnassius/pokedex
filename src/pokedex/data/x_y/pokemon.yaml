          x: "よるになると　おしりを　ひからせ\nなかまと　かいわする。イルミーゼの\nだす　あまい　かおりが　だいすき。"
          y: "みずの　きれいな　いけに　せいそく。\nよるに　なると　おしりが　ひかり\nてんめつさせて　なかまと　かいわ。"
        jp_kanji:
          x: "夜になると　お尻を　光らせ\n仲間と　会話する。イルミーゼの\n出す　甘い　香りが　大好き。"
          y: "水の　きれいな　池に　生息。\n夜に　なると　お尻が　光り\n点滅させて　仲間と　会話。"
        en:
          x: "It communicates with others by lighting up its rear\nat night. It loves Illumise’s sweet aroma."
          y: "It lives around clean ponds. At night, its rear lights\nup. It converses with others by flashing its light."
        fr:
          x: "Il communique avec ses pairs en allumant son\npostérieur la nuit. Il adore le doux parfum de\nLumivole."
          y: "Il vit aux abords des étangs. La nuit, son corps émet\nde la lumière pour communiquer avec d’autres\nMuciole."
        it:
          x: "Di notte comunica con gli altri illuminando la sua\ncoda. Ama il dolce aroma di Illumise."
          y: "Vive vicino a stagni puliti. Di notte, la sua coda\nlancia una luce intermittente per comunicare."
        de:
          x: "Es kommuniziert mit anderen, indem es sein\nHinterteil zum Leuchten bringt. Es liebt Illumises Duft."
          y: "Es lebt in der Nähe von reinen Teichen. Nachts\nleuchtet sein Hinterteil und es kommuniziert durch\ndessen Blinken mit Artgenossen."
        es:
          x: "Se comunica con otros iluminando su cola por la\nnoche. Le encanta el suave aroma de Illumise."
          y: "Vive cerca de estanques de agua clara. De noche,\nenciende la luz de la cola para comunicarse con\notros de su especie."
        ko:
          x: "밤이 되면 엉덩이를 빛나게 해\n동료와 대화한다. 네오비트가\n내는 달콤한 향기를 매우 좋아한다."
          y: "물이 깨끗한 연못에 서식한다.\n밤이 되면 엉덩이가 빛나며\n이를 깜박여서 동료와 대화한다."
