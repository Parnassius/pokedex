          y: "かんそうした　くうきを　このむ。\nすいぶんを　ちょうせつ　するときに\nだす　みずが　なみだに　みえる。"
        jp_kanji:
          x: "乾燥した　場所を　好む。\n目から　水を　出して\n体の　水分を　調節する。"
          y: "乾燥した　空気を　好む。\n水分を　調節　するときに\n出す　水が　涙に　見える。"
        en:
          x: "It prefers arid environments. It leaks water from its\neyes to adjust its body’s fluid levels."
          y: "It prefers an arid atmosphere. It leaks water that\nlooks like tears when adjusting its moisture level."
        fr:
          x: "Il préfère les sols arides. Il évacue l’eau par ses yeux\npour réguler ses fluides corporels."
          y: "Adepte des climats secs, il régule son humidité en\nlaissant couler ce qui ressemble à des larmes."
        it:
          x: "Preferisce le terre aride. Rilascia acqua dagli occhi\nper regolare il livello dei suoi fluidi corporei."
          y: "Ama i luoghi aridi. Quando regola l’umidità del\ncorpo sembra che pianga."
        de:
          x: "Es bevorzugt trockene Gebiete. Es gibt über die Augen\nWasser ab, um den Wasserhaushalt zu regulieren."
          y: "Mag es trocken. Gleicht es seinen Wasserhaushalt aus,\nentweicht ihm Wasser, das wie Tränen geformt ist."
        es:
          x: "Prefiere entornos áridos. Sus ojos expulsan agua para\najustar los niveles de fluido corporal."
          y: "Prefiere entornos áridos. Sus ojos expulsan agua\npara ajustar sus niveles de hidratación corporal."
        ko:
          x: "건조한 장소를 좋아한다.\n눈에서 물을 내어 몸의\n수분을 조절한다."
          y: "건조한 공기를 좋아한다.\n수분을 조절할 때에 내는 물이\n눈물처럼 보인다."
