        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - fairy
      abilities:
        - hydration
      descriptions:
        jp_kana:
          x: "うみの　おんどが　たかくなると\nあたまの　うきぶくろを　ふくらませて\nかいめんを　しゅうだんで　ただよう。"
          y: "あたたかい　うみを　ただよっている。\nどんな　とおくに　ながされても\nうまれた　ばしょに　かならずもどる。"
        jp_kanji:
          x: "海の　温度が　高くなると\n頭の　浮き袋を　ふくらませて\n海面を　集団で　漂う。"
          y: "暖かい　海を　漂っている。\nどんな　遠くに　流されても\n生まれた　場所に　かならず戻る。"
        en:
          x: "When the water warms, they inflate the flotation sac\non their heads and drift languidly on the sea\nin packs."
          y: "It drifts in warm seas. It always returns to where it\nwas born, no matter how far it may have drifted."
        fr:
          x: "Il gonfle la bouée de sa tête et se laisse flotter à\nla surface quand la mer se réchauffe."
          y: "Ce Pokémon des mers chaudes revient toujours à\nson lieu de naissance, peu importe la distance."
        it:
          x: "Quando la temperatura del mare si alza, gonfia il\ngalleggiante che ha in testa e fluttua in gruppo."
          y: "Si sposta nei mari caldi. Torna sempre dove è nato,\nanche se si trova molto lontano."
        de:
          x: "Steigt die Meerestemperatur, bläst es seinen\nSchwimmbeutel auf und treibt in Schwärmen\nauf dem Wasser."
          y: "Lässt sich in warmen Meeren treiben, kehrt aber\nimmer an den Platz seiner Geburt zurück."
        es:
          x: "Si sube la temperatura del mar, infla el flotador de su\ncabeza y flota en grupo en la superficie."
          y: "Va a la deriva por mares cálidos. Siempre vuelve a\ndonde nació, por mucho que se haya alejado."
        ko:
          x: "바다 온도가 높아지면\n머리의 부낭을 부풀려서\n해수면을 집단으로 떠돈다."
          y: "따뜻한 바다를 떠돌고 있다.\n아무리 먼 곳으로 흘러가도\n태어난 장소로 반드시 돌아온다."
manaphy:
