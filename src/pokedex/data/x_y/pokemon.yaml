          y: "ちいさな　ポケモンが　にげだすほどの\nこわいかおが　ぎゃくに　かわいいと\nじょせいに　にんきの　ポケモン。"
        jp_kanji:
          x: "活発で　遊び好きな　性格。\n懐いてくれるので　一緒に\n遊びたがる　女性も　多い。"
          y: "小さな　ポケモンが　逃げ出すほどの\n怖い顔が　逆に　かわいいと\n女性に　人気の　ポケモン。"
        en:
          x: "It has an active, playful nature. Many women like to\nfrolic with it because of its affectionate ways."
          y: "Small Pokémon flee from its scary face. It is,\nhowever, considered by women to be cute."
        fr:
          x: "Il est d’une nature joviale. De nombreuses femmes\nl’apprécient pour sa gentillesse."
          y: "Son visage horrible fait fuir les petits Pokémon.\nPar contre, les femmes le trouvent mignon."
        it:
          x: "Ha uno spirito attivo e giocoso. A molti piace\ngiocherellare con lui per i suoi modi affettuosi."
          y: "I Pokémon più piccoli fuggono alla vista della sua\nfaccia terrificante. Ma le donne lo trovano carino."
        de:
          x: "Es ist von Natur aus verspielt. Es tollt mit vielen\nFrauen herum, da es ihnen zugeneigt ist."
          y: "Kleine Pokémon fliehen beim Anblick seines Gesichts.\nFrauen aber finden es niedlich."
        es:
          x: "Muy travieso por naturaleza, a muchas mujeres les\ngusta jugar con él porque es muy cariñoso."
          y: "Los Pokémon pequeños huyen al ver su cara agresiva.\nNo obstante, para muchas féminas es mono."
        ko:
          x: "활발하고 노는 것을 좋아하는 성격.\n잘 따르기 때문에 함께\n놀고 싶어 하는 여성들이 많다."
          y: "작은 포켓몬이 도망칠 정도의\n무서운 얼굴이 반대로 귀엽다며\n여성에게 인기가 있는 포켓몬이다."
