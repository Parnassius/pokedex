        jp_kanji:
          x: "地面に　穴を　掘って　住む。\n自分に　危険が　迫ると\nまるくなって　身を　守る。"
          y: "水気を　嫌い　乾燥地に\n深い穴を　掘って　生活する。\n一瞬で　体を　まるめる。"
        en:
          x: "It burrows and lives underground. If threatened,\nit curls itself up into a ball for protection."
          y: "Disliking water, it lives in deep burrows in arid\nareas. It can roll itself instantly into a ball."
        fr:
          x: "Il s’enterre et vit dans les sous-sols. S’il se sent\nmenacé, il se met en boule pour se protéger."
          y: "Détestant l’eau, il vit dans de profondes tanières\ndes régions arides. Il aime se rouler en boule."
        it:
          x: "Vive sottoterra, scavando buche. Se minacciato,\nsi protegge raggomitolandosi."
          y: "Odia l’acqua e vive in tane profonde all’interno di\nzone aride. È capace di appallottolarsi in un istante."
        de:
          x: "Es gräbt und lebt im Erdboden. Bei Gefahr rollt es\nsich zum Schutz zu einem Ball zusammen."
          y: "Da es Wasser verabscheut, gräbt es sich\nin trockenes Erdreich ein. Es kann sich rasch\nzu einem Ball rollen."
        es:
          x: "Este Pokémon permanece bajo tierra. Si se siente\namenazado, se enrosca para defenderse."
          y: "Como odia el agua, vive en madrigueras muy\nprofundas en zonas áridas. Puede hacerse una bola\nal instante."
        ko:
          x: "지면에 구멍을 파고 산다.\n자신에게 위험이 닥쳐오면\n둥글게 말아서 몸을 보호한다."
          y: "습기를 싫어해서 건조한 땅에\n깊은 구멍을 파고 생활한다.\n눈 깜짝할 사이에 몸을 둥글게 만다."
