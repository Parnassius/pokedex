          x: "コノハナが　かなでる　くさぶえの\nねいろは　ひとを　ふあんにさせる。\nもりの　おくに　すんでいる。"
          y: "もりの　おくふかくに　せいそく。\nあたまの　はっぱで　ふえを　つくり\nふあんに　させる　ねいろを　だす。"
        jp_kanji:
          x: "コノハナが　奏でる　草笛の　音色は\n人を　不安にさせる。\n森の　奥に　住んでいる。"
          y: "森の　奥深くに　生息。\n頭の　葉っぱで　笛を　作り\n不安に　させる　音色を　出す。"
        en:
          x: "The sound of its grass flute makes its listeners\nuneasy. It lives deep in forests."
          y: "It lives deep in forests. With the leaf on its head,\nit makes a flute whose song makes\nlisteners uneasy."
        fr:
          x: "Le son de sa flûte d’herbe déstabilise l’auditeur.\nIl vit au plus profond des forêts."
          y: "Il vit au plus profond des forêts. Le son de sa flûte,\nfaite avec la feuille de sa tête, est inquiétant."
        it:
          x: "Il fischio del suo flauto di foglia mette a disagio chi\nlo sente. Vive nelle foreste più fitte."
          y: "Vive nelle foreste più fitte. Con la foglia che ha in\ntesta, crea un flauto dal suono inquietante."
        de:
          x: "Der Ton seiner Grasflöte beunruhigt die,\ndie ihn hören. Es lebt tief in den Wäldern."
          y: "Lebt tief im Wald. Es baut sich eine Flöte aus den\nBlättern seines Kopfes. Ihr Ton verbreitet Schrecken."
        es:
          x: "Cuando usa la hoja de su cabeza como flauta, asusta\na la gente. Vive en lo más profundo de los bosques."
          y: "Vive en lo más profundo del bosque. Utiliza la hoja de\nsu cabeza como flauta con un sonido perturbador."
        ko:
          x: "잎새코가 연주하는 풀피리의\n음색은 사람을 불안하게 만든다.\n숲 속에서 살고 있다."
          y: "깊은 숲 속에서 서식한다.\n머리의 잎날로 피리를 만들어\n불안하게 만드는 음색을 낸다."
shiftry:
