          y: "すごい　ちからの　もちぬしで\nどんなに　かたい　じめんでも\nちか１００キロまで　ほりすすむ。"
        jp_kanji:
          x: "地中を　掘りすすんで\n相手が　油断しているところを\n別の　場所から　攻撃する。"
          y: "すごい　力の　持ち主で\nどんなに　硬い　地面でも\n地下１００キロまで　掘りすすむ。"
        en:
          x: "In battle, it digs through the ground and strikes\nthe unsuspecting foe from an unexpected direction."
          y: "Extremely powerful, they can dig through even the\nhardest ground to a depth of over 60 miles."
        fr:
          x: "Au combat, il s’enfouit sous terre pour pouvoir frapper\nses adversaires depuis n’importe quelle direction."
          y: "Terriblement puissants, ils peuvent creuser un\ntunnel dans tout type de sol et jusqu’à 100 km\nde profondeur."
        it:
          x: "Nella lotta, scava tunnel nel terreno per sorprendere\nil nemico attaccandolo da una direzione imprevedibile."
          y: "Estremamente forte, può scavare una fossa anche\nnella terra più dura fino a 100 km di profondità."
        de:
          x: "Im Kampf gräbt es sich ein und attackiert den\nGegner aus einer unvorhersehbaren Richtung."
          y: "Es ist so stark, dass es sich mit Schaufler sogar durch\nsteinharten Boden bis in 100 km Tiefe gräbt."
        es:
          x: "En combate, cava la tierra, se esconde y sale de\nrepente para golpear a su rival. Nunca se sabe por\ndónde puede aparecer."
          y: "Muy poderosos, pueden excavar hasta los terrenos\nmás duros a una profundidad de más de 100 km."
        ko:
          x: "땅속을 파고들어 가\n상대가 방심하고 있을 때\n다른 곳에서 공격한다."
          y: "엄청난 힘의 소유자로\n그 어떤 단단한 땅이라도\n지하 100km까지 파고들어 간다."
meowth:
