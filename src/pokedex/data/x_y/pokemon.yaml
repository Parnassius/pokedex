          x: "とても　きょうぼうな　ポケモン。\nめのまえで　うごくものは　すべて\nおそいかかり　かみくだこうとする。"
          y: "であった　えものは　にがさない。\nじどうしゃの　ボディを　くいちぎる\nきょうりょくな　あごを　もつ。"
        jp_kanji:
          x: "とても　凶暴な　ポケモン。\n目の前で　動くものは　すべて\n襲いかかり　かみくだこうとする。"
          y: "出会った　獲物は　逃がさない。\n自動車の　ボディを　食いちぎる\n強力な　アゴを　持つ。"
        en:
          x: "Very violent Pokémon, they try to clamp down on\nanything that moves in front of their eyes."
          y: "They never allow prey to escape. Their jaws\nare so powerful, they can crush the body of\nan automobile."
        fr:
          x: "Un Pokémon extrêmement violent qui broie tout ce qui\nlui passe sous les yeux avec ses mâchoires."
          y: "Il ne laisse jamais échapper ses proies. Ses mâchoires\nsurpuissantes peuvent broyer une voiture."
        it:
          x: "È un Pokémon molto feroce. Attacca tutto ciò che\ngli si para davanti, prendendolo a morsi."
          y: "Una volta che l’ha presa, non si lascia più sfuggire\nla preda. Ha delle mandibole in grado di fare a pezzi\nun’automobile."
        de:
          x: "Ein äußerst grausames Pokémon. Es greift jeden,\nder ihm unter die Augen kommt, mit seinen\nscharfen Reißzähnen an."
          y: "Hat es seine Beute erblickt, gibt es kein Entrinnen\nmehr. Sein mächtiger Kiefer knackt selbst Karosserien."
        es:
          x: "Un Pokémon bastante violento. Ataca todo lo que se\nmueva delante de él con sus mortíferas mandíbulas."
          y: "Jamás deja escapar a su presa. Sus mandíbulas son\ncapaces de destrozar la carrocería de un coche."
        ko:
          x: "아주 난폭한 포켓몬.\n눈앞에서 움직이는 것은 모두\n덮쳐서 깨물어 부수려고 한다."
          y: "마주친 먹이는 놓치지 않는다.\n자동차 몸체를 물어뜯을 만큼\n강력한 턱을 가지고 있다."
darumaka:
