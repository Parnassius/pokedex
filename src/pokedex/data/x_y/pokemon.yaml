        jp_kanji:
          x: "突然変異で　見つかった\n２つの　頭を　持つ　ポケモン。\n時速１００キロで　走る。"
          y: "２つの　頭の　脳みそは\nテレパシーのような　力で\n気持ちを　通じ合わせているらしい。"
        en:
          x: "A two-headed Pokémon that was discovered as a\nsudden mutation. It runs at a pace of over 60 miles\nper hour."
          y: "The brains in its two heads appear to communicate\nemotions to each other with a telepathic power."
        fr:
          x: "Ce Pokémon à deux têtes est le résultat d’une\nsoudaine mutation. Il peut courir jusqu’à 100 km/h."
          y: "Ses deux cerveaux semblent communiquer leurs\némotions grâce à un lien télépathique."
        it:
          x: "Pokémon a due teste, scoperto a seguito di\nun’improvvisa mutazione. Può correre a 100 km/h."
          y: "I suoi due cervelli si comunicano le emozioni grazie\nai poteri telepatici."
        de:
          x: "Dieses zweiköpfige Pokémon gilt als plötzliche\nMutation. Es rennt bis zu 100 km/h schnell."
          y: "Die Gehirne der beiden Köpfe kommunizieren ihre\nGefühle über Telepathie."
        es:
          x: "Este Pokémon de dos cabezas es el resultado de una\nmutación. Cuando corre, puede alcanzar casi 100 km\npor hora."
          y: "Parece que los cerebros de sus dos cabezas se\ncomunican por telepatía."
        ko:
          x: "돌연변이로 발견된\n두 개의 머리를 지닌 포켓몬이다.\n시속 100km로 달린다."
          y: "두 머리에 각각 존재하는 뇌는\n텔레파시 같은 힘으로\n의사를 맞춰나가는 듯하다."
