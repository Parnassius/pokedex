        de:
          x: "Die Umgebung, in der es sich entwickelt, bestimmt\nsein Aussehen. Es formt seinen Körper mithilfe\nder umliegenden Materialien."
          y: "Als sich Burmy entwickelte, wurde sein Umhang\nTeil des Körpers. Es legt den Umhang niemals ab."
        es:
          x: "Su apariencia varía según dónde evolucione. Los\nmateriales que haya pasan a formar parte de su\ncuerpo."
          y: "Cuando Burmy evolucionó, su caparazón pasó a formar\nparte de este Pokémon."
        ko:
