          y: "ふえいせいな　ばしょを　このむ。\nゲップのように　はきだす　ガスを\nすいこむと　１しゅうかん　ねこむ。"
        jp_kanji:
          x: "ゴミ袋が　産業廃棄物と\n化学変化を　起こした　ことで\nポケモンとして　生まれ変わった。"
          y: "不衛生な　場所を　好む。\nゲップのように　吐き出す　ガスを\n吸いこむと　１週間　寝込む。"
        en:
          x: "The combination of garbage bags and industrial\nwaste caused the chemical reaction that created\nthis Pokémon."
          y: "Inhaling the gas they belch will make you sleep for\na week. They prefer unsanitary places."
        fr:
          x: "Il est né de la mutation d’un sac poubelle contenant\ndes déchets industriels."
          y: "Il aime les endroits mal tenus. Le gaz qu’il rote endort\npendant une semaine."
        it:
          x: "È nato da un sacchetto della spazzatura che ha\nsubito un cambiamento chimico a causa delle scorie\nindustriali."
          y: "Predilige luoghi insalubri. Esala gas dalle fauci in\ngrado di addormentare per una settimana."
        de:
          x: "Eine Mülltüte, der Industrieabfälle und chemische\nReaktionen neues Leben eingehaucht haben."
          y: "Hat ein Faible für schmutzige Orte. Wer das Gas\neinatmet, das es mit Rülpslauten ausstößt, schläft\neine Woche durch."
        es:
          x: "Pokémon nacido de la reacción química entre una\nbolsa de basura y residuos industriales."
          y: "Le gustan los lugares con suciedad. Quien inhala los\ngases que eructa duerme durante una semana."
        ko:
          x: "쓰레기 봉지가 산업 폐기물과\n화학적 변화를 일으켜서\n포켓몬으로 다시 태어났다."
          y: "비위생적인 장소를 좋아한다.\n트림하듯이 토해내는 가스를\n들이마시면 1주일 동안 잠에 빠진다."
