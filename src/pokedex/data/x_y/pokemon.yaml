      descriptions:
        jp_kana:
          x: "うでを　ねじりながら　くりだす\nパンチは　コンクリートも　ふんさい。\n３ぷん　たたかうと　ひとやすみする。"
          y: "プロボクサーの　たましいが\nのりうつっている。パンチのスピードは\nしんかんせんよりも　はやい。"
        jp_kanji:
          x: "腕を　ねじりながら　繰り出す\nパンチは　コンクリートも　粉砕。\n３分　戦うと　ひとやすみする。"
          y: "プロボクサーの　魂が\n乗り移っている。パンチの　スピードは\n新幹線よりも　速い。"
        en:
          x: "The arm-twisting punches it throws pulverize even\nconcrete. It rests after three minutes of fighting."
          y: "The spirit of a pro boxer has infused this Pokémon.\nIt throws punches that are faster than a bullet train."
        fr:
          x: "Même le béton cède sous ses poings dévastateurs.\nAu combat, il s’essouffle au bout de trois minutes."
          y: "Tygnon possède l’esprit combatif des plus grands\nchampions de boxe. Ses coups de poing partent plus\nvite qu’un boulet de canon."
        it:
          x: "Sferra pugni così potenti da polverizzare persino\nil cemento. Si riposa dopo 3 minuti di lotta."
          y: "Questo Pokémon ha lo spirito di un pugile\nprofessionista. I suoi pugni sono più rapidi di un\ntreno superveloce."
        de:
          x: "Die Schläge, die es austeilt, können Beton\npulverisieren. Es muss sich im Kampf alle\ndrei Minuten ausruhen."
          y: "Der Geist eines Profi-Boxers hat dieses Pokémon\ninspiriert. Seine Faustschläge sind schneller als\nein Hochgeschwindigkeitszug."
        es:
          x: "Los potentes golpes de sus brazos pueden pulverizar\nel hormigón. Descansa tras luchar tres minutos."
          y: "Dicen que tiene el alma de un boxeador profesional.\nDa puñetazos a la velocidad del rayo."
        ko:
          x: "팔을 비틀며 날리는 펀치는\n콘크리트도 부스러뜨린다.\n3분 싸우면 잠시 쉰다."
          y: "프로 복서의 혼에 씌었다.\n펀치의 스피드는\n고속열차보다도 빠르다."
