      descriptions:
        jp_kana:
          x: "あたまの　きゅうばんで　きの　えだや\nいえの　のきしたに　ぶらさがる。\n７しゅるい　ねいろを　つかいわける。"
          y: "ちょうおんぱの　なきごえを　もつ。\nふわふわと　うかび　かぜに　のって\nながい　きょりを　たびする。"
        jp_kanji:
          x: "頭の　吸盤で　木の　枝や\n家の　軒下に　ぶら下がる。\n７種類　音色を　使い分ける。"
          y: "超音波の　鳴き声を　持つ。\nふわふわと　浮かび　風に　乗って\n長い　距離を　旅する。"
        en:
          x: "It uses the sucker on its head to hang from a tree\nor from eaves. It can produce seven different tones."
          y: "Emitting ultrasonic cries, it floats on winds to travel\ngreat distances."
        fr:
          x: "Il se suspend sous une branche ou un auvent avec\nla ventouse de sa tête. Son langage comporte sept\ncris."
          y: "Il émet des cris à ultrasons et chevauche le vent pour\nparcourir de grandes distances."
        it:
          x: "Emette sette tipi di versi penzolando da rami\no cornicioni, a cui si attacca con la ventosa che ha\nsul capo."
          y: "Emette versi ultrasonici. Percorre grandi distanze\nfacendosi trascinare dai venti."
        de:
          x: "Mit seinem Saugnapf hängt es sich an Äste oder unter\nVordächer. Es kennt sieben verschiedene Schreie."
          y: "Es setzt Ultraschallwellen frei, während es sich\nvom Wind über große Distanzen tragen lässt."
        es:
          x: "Se cuelga de ramas y aleros con la ventosa de su\ncabeza. Tiene siete tipos de gritos diferentes."
          y: "Emite ondas ultrasónicas que le permiten flotar en el\nviento para viajar grandes distancias."
        ko:
          x: "머리의 빨판으로 나뭇가지나\n집의 처마 밑에 매달린다.\n7종류의 음색을 나누어 쓴다."
          y: "초음파 울음소리를 가지고 있다.\n둥둥 떠서 바람을 타고\n긴 거리를 여행한다."
