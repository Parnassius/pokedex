          y: "あたまの　ツノで　かわぞこにある\nいわを　くりぬいて　すを　つくる。\nタマゴを　いのちがけで　まもる。"
        jp_kanji:
          x: "秋が　くると　産卵のために\n流れに　逆らって　力強く\n川を　泳ぐ　姿が　みられる。"
          y: "頭の　ツノで　川底にある\n岩を　くり抜いて　巣を　作る。\nタマゴを　命がけで　守る。"
        en:
          x: "In the autumn spawning season, they can be seen\nswimming powerfully up rivers and creeks."
          y: "It makes its nest by hollowing out boulders in\nstreams with its horn. It defends its eggs with\nits life."
        fr:
          x: "Pendant la saison des amours, on peut le voir nager\ndans les rivières et les lacs."
          y: "Il niche dans des rochers du ruisseau qu’il évide\navec sa corne. Il donnerait sa vie pour ses Œufs."
        it:
          x: "In autunno, quando si riproduce, può essere visto\nrisalire impetuoso fiumi e torrenti."
          y: "Con il suo corno, perfora le rocce sul letto dei fiumi\nper farsi il nido. Difende le uova a costo della vita."
        de:
          x: "Im Herbst, zur Paarungszeit, sieht man diese\nPokémon kraftvoll Bäche und Flüsse hinaufschwimmen."
          y: "Es baut Nester, indem es Steine im Fluss mit seinem\nHorn aushöhlt. Es verteidigt seine Eier mit dem Leben."
        es:
          x: "En otoño, cuando se reproducen, se les puede ver\nnadando con energía por ríos y arroyos."
          y: "Hace su nido en los agujeros que cava con el cuerno.\nDefiende sus huevos con su vida."
        ko:
          x: "가을이 오면 산란을 위해\n힘차게 강물을 거슬러 올라가며\n헤엄치는 모습을 볼 수 있다."
          y: "머리의 뿔로 강바닥에 있는\n돌을 파내어 둥지를 만든다.\n알을 목숨 걸고 지킨다."
