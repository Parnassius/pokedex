          x: "Living wherever there is food available,\nit ceaselessly scavenges for edibles\nthe entire day."
          y: "Its fangs are long and very sharp. They grow\ncontinuously, so it gnaws on hard things to whittle\nthem down."
        fr:
          x: "Vivant là où se trouve la nourriture, ce charognard\npasse ses journées à la rechercher."
          y: "Les dents de Rattata sont longues et tranchantes.\nComme elles poussent sans arrêt, il doit ronger tout\nce qu’il trouve pour pouvoir les tailler."
        it:
          x: "Vive ovunque si trovi del cibo, cercando\nincessantemente qualsiasi cosa sia commestibile."
          y: "I denti affilati gli continuano a crescere, costringendolo\na limarseli mordicchiando oggetti molto duri."
        de:
          x: "Es baut sein Nest, wo es Futter findet. Es ist den\nganzen Tag auf der Suche nach etwas Essbarem."
          y: "Seine Reißzähne sind lang und scharf. Da sie\nständig wachsen, nagt es immerzu an etwas,\num sie abzuwetzen."
        es:
          x: "Vive allí donde haya comida disponible. Busca todo\nel día, sin descanso, algo comestible."
          y: "Tiene unos largos y afilados colmillos que no dejan de\ncrecer. Le resultan muy útiles para destruir cosas."
        ko:
          x: "먹을 것이 있는 곳이라면\n어디서든 서식한다.\n온종일 먹이를 찾아다닌다."
          y: "송곳니는 길고 날카롭다.\n평생 자라나기 때문에\n단단한 것을 갉아서 깎는다."
