      descriptions:
        jp_kana:
          x: "おおきな　おびれで　みずを　かけば\nぐんぐん　スピードが　あがる。\nちいさい　からだでも　ちからもち。"
          y: "あたまの　ひれで　みずの　ながれを\nかんじて　まわりの　ようすを　しる。\nいわを　もちあげる　ちからもち。"
        jp_kanji:
          x: "大きな　尾びれで　水を　かけば\nぐんぐん　スピードが　上がる。\n小さい　体でも　力持ち。"
          y: "頭の　ヒレで　水の　流れを\n感じて　まわりの　様子を　知る。\n岩を　持ち上げる　力持ち。"
        en:
          x: "Its large tail fin propels it through water with\npowerful acceleration. It is strong in spite of\nits size."
          y: "To alert it, the fin on its head senses the flow of\nwater. It has the strength to heft boulders."
        fr:
          x: "Sa grande queue en forme de nageoire lui donne\nune puissance d’accélération incroyable. Il est très\ncostaud malgré sa taille."
          y: "Il analyse le courant grâce à la nageoire sur sa tête.\nIl est assez fort pour soulever des rochers."
        it:
          x: "La grande pinna sulla coda gli conferisce una\nstraordinaria accelerazione in acqua. È minuto,\nma forte."
          y: "Con la pinna sulla testa percepisce i movimenti\ndell’acqua e sta in guardia. Riesce a sollevare rocce."
        de:
          x: "Durch den propellerartigen Einsatz seiner großen\nSchwanzflosse schwimmt es schnell durchs Wasser.\nTrotz seiner kleinen Größe ist es stark."
          y: "Die Flosse auf seinem Kopf prüft die Strömung des\nWassers. Dieses Pokémon kann Felsen heben."
        es:
          x: "Tiene una larga cola que le propulsa por el agua con\nmucha potencia. A pesar de ser pequeño, tiene mucha\nfuerza."
          y: "La aleta de su cabeza detecta las corrientes de agua\ny los peligros. Tiene fuerza para levantar rocas."
        ko:
          x: "커다란 꼬리지느러미로 물을 헤치면\n스피드가 쑥쑥 오른다.\n작은 몸이지만 힘이 장사다."
          y: "머리의 지느러미로 물의 흐름을\n느껴 주위의 상황을 파악한다.\n바위를 들어 올릴 정도로 힘이 세다."
marshtomp:
  species_id: 259
  names:
    jp_kana: ヌマクロー
    jp_kanji: ヌマクロー
    en: Marshtomp
    fr: Flobio
    it: Marshtomp
    de: Moorabbel
    es: Marshtomp
    ko: 늪짱이
