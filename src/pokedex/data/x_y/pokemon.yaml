      types:
        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          x: "２つの　あたまが　どうじに　おこると\nツノから　もうふぶきを　ふきだす。\nあたりを　おおゆきで　うめてしまう。"
          y: "たいりょうの　みずを　のみこんで\nからだのなかで　ゆきぐもに　かえる。\nおこると　もうふぶきを　まきおこす。"
        jp_kanji:
          x: "２つの　頭が　同時に　怒ると\nツノから　猛吹雪を　噴き出す。\nあたりを　大雪で　埋めてしまう。"
          y: "大量の　水を　飲みこんで\n体の中で　雪雲に　変える。\n怒ると　猛吹雪を　まきおこす。"
        en:
          x: "If both heads get angry simultaneously, this\nPokémon expels a blizzard, burying everything\nin snow."
          y: "Swallowing large amounts of water, they make\nsnow clouds inside their bodies and, when angry,\ncause violent blizzards."
        fr:
          x: "Quand ses deux têtes se fâchent en même temps,\nil émet un blizzard de ses cornes et enfouit les\nalentours sous la neige."
          y: "Il avale de grandes quantités d’eau et la transforme\nen nuages de neige. Il souffle du blizzard quand il se\nfâche."
        it:
          x: "Se le due teste si arrabbiano allo stesso tempo,\nscatena una bufera dalle corna, coprendo di neve\ni dintorni."
          y: "Ingoia enormi quantità d’acqua che trasforma in\nnuvole di neve. Quando si arrabbia scatena una\nterribile bufera."
        de:
          x: "Bringt man beide Köpfe in Rage, stößt sein Horn\nheftige Eisböen aus, und alles in seiner Umgebung\nversinkt in Schnee."
          y: "Es verschluckt Unmengen an Wasser und wandelt es\nintern in Schneewolken um. Ist es wütend, erzeugt es\nSchneestürme."
        es:
          x: "Si sus dos cabezas se irritan al mismo tiempo, genera\nuna ventisca desde su cuerno cubriendo su entorno\ncon nieve."
          y: "Absorben grandes cantidades de agua y la\ntransforman en ventisca en su cuerpo, expulsándola\ncuando se enojan."
        ko:
          x: "두 개의 머리가 동시에 화를 내면\n뿔에서 강한 눈보라가 뿜어져 나온다.\n주변을 많은 눈으로 묻어 버린다."
          y: "대량의 물을 들이마셔\n몸 안에서 눈구름으로 바꾼다.\n화나면 강한 눈보라를 일으킨다."
deerling:
  species_id: 585
  names:
    jp_kana: シキジカ
