          y: "A minigear and big gear comprise its body. If the\nminigear it launches at a foe doesn’t return, it\nwill die."
        fr:
          x: "Ils communiquent entre eux en changeant leur sens\nde rotation. Plus ils sont en colère, plus ils tournent\nvite."
          y: "Le plus grand des rouages projette le plus petit\npour attaquer. Ce dernier risque de dépérir s’il ne\nrevient pas."
        it:
          x: "Comunicano il loro stato d’animo cambiando senso di\nrotazione. Più si arrabbiano, più girano velocemente."
          y: "È formato da un ingranaggio grande e uno piccolo.\nAttacca con quello piccolo ma, se questo non torna\nindietro, è in seria difficoltà."
        de:
          x: "Teilt Artgenossen seine Gefühlslage mit, indem es\ndie Umlaufrichtung ändert. Wenn es wütend ist,\ndreht es sich schneller."
          y: "Besteht aus kleinen und großen Rädern. Kehrt ein\nkleines Rad, das es abgefeuert hat, nicht zurück,\nwird es brenzlig."
        es:
          x: "Muestra sus sentimientos cambiando la dirección de su\ngiro. Cuanto más se enfade, más rápido girará."
          y: "Se compone de una rueda dentada grande y otra\npequeña. Lanza la pequeña para atacar, pero se\ndebilita si no regresa."
        ko:
          x: "회전 방향을 바꿔서\n동료에게 감정을 전한다.\n화가 나면 회전이 빨라진다."
          y: "꼬마기어와 왕기어로 나뉘었다.\n공격을 위해 날린 꼬마기어가\n돌아오지 않으면 죽게 된다."
klinklang:
