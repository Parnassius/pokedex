      descriptions:
        jp_kana:
          x: "どうたいは　こどもたちの　すあな。\nいろんな　フェロモンを　だして\nこどもたちを　じゆうに　あやつる。"
          y: "どうたいが　こどもたちの　すあなに\nなっている。ミツハニーの　あつめた\nミツで　こどもたちを　そだてる。"
        jp_kanji:
          x: "胴体は　子供たちの　巣穴。\nいろんな　フェロモンを　だして\n子供たちを　自由に　操る。"
          y: "胴体が　子供たちの　巣穴に\nなっている。ミツハニーの　集めた\nミツで　子供たちを　育てる。"
        en:
          x: "It houses its colony in cells in its body and releases\nvarious pheromones to make those grubs do\nits bidding."
          y: "Its abdomen is a honeycomb for grubs. It raises its\ngrubs on honey collected by Combee."
        fr:
          x: "Son abdomen abrite ses petits. Ce Pokémon utilise\ndes phéromones pour leur donner des ordres."
          y: "Son abdomen est un rayon où vivent ses larves,\nélevées avec le nectar récolté par Apitrini."
        it:
          x: "Nell’addome ospita la sua progenie, sulla quale\nesercita un controllo assoluto tramite i feromoni\nche rilascia."
          y: "Il suo addome funge da rifugio per le larve, che\nnutre con il nettare raccolto da Combee."
        de:
          x: "Es beherbergt Jung-Pokémon in seinem Rumpf,\ndie es mithilfe von verschiedenen Pheromonen\nfrei herumkommandieren kann."
          y: "Sein Bauch ist die Wabe für die Larven. Es füttert\nseine Larven mit dem Honig, den Wadribie sammelt."
        es:
          x: "Cría larvas en los panales de su cuerpo. Segrega\ndiversas feromonas de su cuerpo con las cuales\ncontrola a sus crías."
          y: "Su abdomen es un panal de larvas que alimenta con\nla miel recogida por Combee."
        ko:
          x: "몸통은 아기들의 둥지다.\n여러 페로몬을 내어\n새끼들을 자유롭게 조종한다."
          y: "몸통이 새끼들의 둥지로\n되어 있다. 세꿀버리가 모은\n꿀로 새끼들을 키운다."
pachirisu:
  species_id: 417
  names:
    jp_kana: パチリス
    jp_kanji: パチリス
    en: Pachirisu
    fr: Pachirisu
    it: Pachirisu
    de: Pachirisu
    es: Pachirisu
    ko: 파치리스
