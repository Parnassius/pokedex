        jp_kana:
          x: "ナマケロの　なまけた　ようすは\nみている　ひとの　なまけごころを\nぞんぶんに　しげきするのだ。"
          y: "１にちに　はっぱを　３まいも\nたべれば　まんぞくで　それいがいは\n２０じかんも　ねむっている。"
        jp_kanji:
          x: "ナマケロの　怠けた　様子は\n見ている　人の　怠け心を\n存分に　刺激するのだ。"
          y: "１日に　葉っぱを　３枚も\n食べれば　満足で　それ以外は\n２０時間も　眠っている。"
        en:
          x: "The way Slakoth lolls around makes anyone who\nwatches it feel like doing the same."
          y: "If it eats just three leaves in a day, it is satisfied.\nOther than that, it sleeps for 20 hours a day."
        fr:
          x: "Rien qu’à voir un Parecool, on n’a plus envie de\nbouger et on s’endort."
          y: "Il dort 20 heures par jour et ne fait rien d’autre,\nsi ce n’est manger trois ou quatre feuilles dans\nla journée."
        it:
          x: "Coloro che osservano Slakoth, perdono la voglia di\nmuoversi e vengono colti da sonnolenza."
          y: "Tre foglie al giorno bastano a saziarlo e dorme fino\na 20 ore."
        de:
          x: "Allein bei Bummelz’ Anblick werden Gegner von\nTrägheit gepackt und schlummern alsbald ein."
          y: "Solange es täglich drei Blätter zu essen bekommt,\nist es zufrieden. Abgesehen davon schläft es\n20 Stunden am Tag."
        es:
          x: "Slakoth se pasa todo el día holgazaneando y solo con\nverlo a uno le entra mucha pereza."
          y: "Si se come tres hojas al día, ya se queda satisfecho.\nAparte de eso, se pasa durmiendo 20 horas al día."
        ko:
          x: "게을로의 게으른 모습은\n보고 있는 사람의 게으른 마음을\n충분히 자극한다."
          y: "하루에 잎을 3장만\n먹으면 만족하고 그 외에는\n20시간이나 자고 있다."
vigoroth:
  species_id: 288
  names:
    jp_kana: ヤルキモノ
    jp_kanji: ヤルキモノ
