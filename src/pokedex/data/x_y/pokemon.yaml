      descriptions:
        jp_kana:
          x: "かんそうした　とちで　くらす。\nあせの　かわりに　すなつぶを\nからだから　ぶんぴつする　ポケモン。"
          y: "ぜんしんに　すなを　まとうことで\nばいきんから　からだを　まもる。\nみずに　ぬれることが　にがて。"
        jp_kanji:
          x: "乾燥した　土地で　暮らす。\n汗の　かわりに　砂粒を\n体から　分泌する　ポケモン。"
          y: "全身に　砂を　まとうことで\nばい菌から　体を　守る。\n水に　ぬれることが　苦手。"
        en:
          x: "It lives in arid places. Instead of perspiration,\nit expels grainy sand from its body."
          y: "It enshrouds itself with sand to protect itself from\ngerms. It does not enjoy getting wet."
        fr:
          x: "Il vit dans des endroits arides. Il exsude du sable\ngranuleux au lieu de transpirer."
          y: "Il se recouvre de sable pour se protéger des\nmicrobes. Il n’aime pas l’eau."
        it:
          x: "Vive in territori aridi. Invece del sudore, espelle\ndal corpo sabbia granulosa."
          y: "Si ricopre di sabbia per proteggersi dai germi.\nNon ama bagnarsi."
        de:
          x: "Es lebt in ausgetrockneten Gebieten. Statt zu\nschwitzen, sondert sein Körper Sand ab."
          y: "Es bedeckt sich mit Sand, um sich vor Keimen\nzu schützen. Es mag es gar nicht, wenn es nass wird."
        es:
          x: "Vive en zonas áridas. En lugar de sudar, su cuerpo\nexpulsa granos de arena."
          y: "Se embadurna de arena para protegerse de los\ngérmenes. No le gusta mojarse."
        ko:
          x: "건조한 땅에서 산다.\n땀 대신 모래알을\n몸에서 분비하는 포켓몬이다."
          y: "전신에 모래를 둘러서\n세균으로부터 몸을 보호한다.\n물에 젖는 것을 싫어한다."
