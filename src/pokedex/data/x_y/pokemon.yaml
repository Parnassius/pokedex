      descriptions:
        jp_kana:
          x: "かざんの　かこうちかくで\nみつかった。くちから　ほのおをはく。\nたいおんは　１２００ど　もある。"
          y: "かざんの　かこうで　うまれそだった。\nたいようと　おなじような　ほのおの\nゆらめきが　ぜんしんを　おおう。"
        jp_kanji:
          x: "火山の　火口近くで　見つかった。\n口から　炎を　吐く。\n体温は　１２００度もある。"
          y: "火山の　火口で　生まれ育った。\n太陽と　同じような　炎の\nゆらめきが　全身を　覆う。"
        en:
          x: "Found near the mouth of a volcano.\nThis fire-breather’s body temperature is\nnearly 2,200 degrees Fahrenheit."
          y: "Born in the spout of a volcano, its body is covered\nby flames that shimmer like the sun."
        fr:
          x: "On trouve ce Pokémon près des bouches de volcans.\nSon corps incandescent atteint 1 200 °C."
          y: "Il est né au milieu d’un volcan. Son corps est couvert\nde flammes qui flambent comme un soleil."
        it:
          x: "È stato trovato presso il cratere di un vulcano.\nLa sua temperatura corporea si aggira sui 1200 °C."
          y: "È nato dallo zampillo di un vulcano. Ha il corpo\nricoperto da fiamme che brillano come i raggi solari."
        de:
          x: "Es wurde in der Nähe eines Vulkans gefunden.\nDie Körpertemperatur dieses Feuerspuckers\nliegt bei fast 1 200 °C."
          y: "Es wurde bei einem Vulkanausbruch geboren.\nSein Körper ist von hellen Flammen umgeben."
        es:
          x: "A este Pokémon se lo encontraron cerca de un volcán.\nEsta criatura ígnea tiene una temperatura corporal de\nunos 1200 °C."
          y: "Nació en el centro de un volcán. Su cuerpo está\ncubierto de llamas que brillan como el Sol."
        ko:
          x: "화산의 분화구 근처에서\n발견되었다. 입에서 불꽃을 뿜어낸다.\n체온은 1200도나 된다."
          y: "화산의 분화구에서 태어나 자랐다.\n태양과도 같은 불꽃의\n일렁임이 전신을 감싼다."
