          y: "しろくて　まるい　いしを　タマゴと\nおもいこんで　だいじに　もっている。\nまきげの　かたちを　きにしている。"
        jp_kanji:
          x: "タマゴに　似た　真んまるい　石を\nお腹の　袋に　入れている。\n好きな　相手に　石を　渡す。"
          y: "白くて　まるい　石を　タマゴと\n思いこんで　大事に　持っている。\n巻き毛の　形を　気にしている。"
        en:
          x: "It carries a round, egg-shaped rock in its belly\npouch and gives the rock to its friends."
          y: "It carefully carries a round, white rock that it thinks\nis an egg. It’s bothered by how curly its hair looks."
        fr:
          x: "Ptiravi transporte un caillou rond en forme d’œuf dans\nsa poche ventrale pour l’offrir à ses amis."
          y: "Il prend soin de ses bouclettes et couve son caillou\ncomme si c’était son Œuf."
        it:
          x: "Trasporta una roccia a forma di uovo nella sua\ntasca ventrale e poi la offre ai suoi amici."
          y: "Trasporta con cura un sasso bianco e tondo\ntrattandolo come un uovo.\nAdora il ricciolo che ha in testa."
        de:
          x: "In seinem Beutel trägt es einen runden,\neiförmigen Stein, den es Freunden gibt."
          y: "Es hält den runden, weißen Stein für ein Ei\nund kümmert sich um ihn. Es achtet sehr\nauf seine Haarlocke."
        es:
          x: "Les da a sus amigos una roca con forma de huevo que\ntransporta en la bolsa de su panza."
          y: "Cuida de una pequeña roca blanca y redonda\ncreyendo que es un huevo. Le gusta arreglarse\nel tirabuzón."
        ko:
          x: "알을 닮은 둥근 돌을\n배의 주머니에 넣고 있다.\n좋아하는 상대에게 돌을 준다."
          y: "하얗고 둥근 돌을 알이라고\n생각하고는 소중히 가지고 있다.\n말려 있는 머리 모양을 신경 쓰고 있다."
