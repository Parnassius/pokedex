          y: "すいぶんと　えいようの　ほうふな\nつちを　このむので　チュリネの　すむ\nとちは　さくもつの　そだちが　よい。"
        jp_kanji:
          x: "頭の　葉っぱを　かじると\nとても　苦いが　疲れた　体を\n元気にする　効果が　あるのだ。"
          y: "水分と　栄養の　豊富な\n土を　好むので　チュリネの　住む\n土地は　作物の　育ちが　良い。"
        en:
          x: "The leaves on its head are very bitter. Eating one\nof these leaves is known to refresh a tired body."
          y: "Since they prefer moist, nutrient-rich soil, the areas\nwhere Petilil live are known to be good for\ngrowing plants."
        fr:
          x: "Les feuilles sur sa tête sont très amères, mais elles\nremettent d’aplomb les corps les plus éreintés."
          y: "Il aime les zones bien irriguées et riches en\nnutriments. On sait que là où il vit, les cultures sont\nflorissantes."
        it:
          x: "Le foglie che ha sul capo sono molto amare ma, se\nmasticate, hanno l’effetto di rinvigorire il corpo stanco."
          y: "Dato che predilige i terreni ricchi di acqua e\nnutrimento, nelle zone in cui vive Petilil i raccolti\nsono rigogliosi."
        de:
          x: "Die Blätter auf seinem Kopf schmecken furchtbar\nbitter, doch sie helfen ausgezeichnet gegen\nErschöpfung."
          y: "Da es nährstoffreiche Erde bevorzugt, kann man in\nGebieten, in denen es lebt, für gewöhnlich reiche\nErnten erwarten."
        es:
          x: "Mordisquear las hojas de su cabeza permite recuperar\ntoda la vitalidad, a pesar de que están muy amargas."
          y: "Habita tierras húmedas ricas en nutrientes donde\nla cosecha es abundante."
        ko:
          x: "머리의 잎사귀를 갉아먹으면\n매우 쓰지만 지친 몸을\n회복시켜주는 효과가 있다."
          y: "치릴리는 수분과 영양이 풍부한\n땅을 좋아하기 때문에 치릴리가\n사는 토지는 작물이 잘 자란다."
lilligant:
