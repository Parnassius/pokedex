      descriptions:
        jp_kana:
          x: "おもい　カラを　ぬいだために\nみがるになった。まるで　にんじゃの\nような　みのこなしで　たたかう。"
          y: "からだが　かわくと　よわってしまう。\nうすい　まくを　なんじゅうも　まいて\nかんそうを　ふせいでいるのだ。"
        jp_kanji:
          x: "重い　殻を　脱いだために\n身軽になった。まるで　忍者のような\n身のこなしで　戦う。"
          y: "体が　乾くと　弱ってしまう。\n薄い　膜を　何重も　巻いて\n乾燥を　防いでいるのだ。"
        en:
          x: "Having removed its heavy shell, it becomes very\nlight and can fight with ninja-like movements."
          y: "When its body dries out, it weakens. So, to prevent\ndehydration, it wraps itself in many layers of\nthin membrane."
        fr:
          x: "Il s’est bien allégé en se débarrassant de sa lourde\ncarapace. Il se bat avec l’agilité d’un ninja."
          y: "Quand son corps s’assèche, il faiblit. Il s’en prémunit\nen s’enroulant dans plusieurs couches d’une fine\nmuqueuse."
        it:
          x: "Liberatosi della pesante conchiglia, è diventato\nleggero. Lotta con le movenze proprie di un ninja."
          y: "Si indebolisce quando il corpo si secca. Previene\nl’essiccazione avvolgendosi in molti strati di sottili\nmembrane."
        de:
          x: "Seit es die schwere Muschel abgestreift hat, ist es\nviel leichter. Nun gleichen seine Kampfbewegungen\ndenen eines Ninja."
          y: "Da es ohne Flüssigkeit an Kraft verliert, schützt es\nsich mit mehreren dünnen Hautschichten vor dem\nAustrocknen."
        es:
          x: "Se siente ligero una vez liberado de su caparazón.\nLucha y se mueve como un ninja."
          y: "Los ambientes secos lo debilitan. Evita la sequedad\nenvolviéndose en muchas membranas finas\nsuperpuestas."
        ko:
          x: "무거운 껍데기를 벗었기 때문에\n몸이 가벼워졌다. 마치 닌자 같은\n몸놀림으로 싸운다."
          y: "몸이 마르면 약해진다.\n얇은 막을 몇 겹이나 두르고\n건조해지는 것을 막고 있다."
stunfisk:
