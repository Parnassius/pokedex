          y: "A legendary bird Pokémon that is said to appear to\ndoomed people who are lost in icy mountains."
        fr:
          x: "Un Pokémon Oiseau légendaire. Il peut provoquer\ndes blizzards en gelant l’humidité de l’air."
          y: "Le légendaire oiseau des glaces. On dit qu’il apparaît\naux gens perdus dans les sommets."
        it:
          x: "Un Pokémon uccello leggendario. Riesce a creare\nbufere di neve congelando l’umidità dell’aria."
          y: "Uccello leggendario, si dice appaia per atterrire chi\nsi smarrisce sui ghiacciai."
        de:
          x: "Ein Legendäres Vogel-Pokémon. Es kann Blizzards\nverursachen, indem es Feuchtigkeit gefriert."
          y: "Ein Legendäres Vogel-Pokémon, das angeblich\nin Gletschern verirrten Wanderern den Weg weist."
        es:
          x: "Legendario Pokémon pájaro capaz de generar\nventiscas congelando la humedad del aire."
          y: "Es un legendario pájaro Pokémon. Se aparece a la\ngente que se ha perdido en las heladas montañas."
        ko:
          x: "전설의 새포켓몬이다.\n공기 중의 수분을 얼려\n눈보라를 만들어 낼 수 있다."
          y: "설산에서 추워 죽을 것 같을 때\n눈앞에 나타난다고 하는\n전설의 냉동포켓몬."
