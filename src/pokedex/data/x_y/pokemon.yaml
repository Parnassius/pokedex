          y: "Il se déplace en tournoyant sur son pied. Ce Pokémon\nrare fut découvert dans de vieilles ruines."
        it:
          x: "Si sposta piroettando sull’unica estremità inferiore\ndel proprio corpo. Molti fanno la verticale."
          y: "Pokémon raro che si muove roteando su se stesso.\nÈ stato scoperto nei pressi di antiche rovine."
        de:
          x: "Es bewegt sich, indem es auf seinem Fuß kreiselt.\nVereinzelt sieht man Puppance, die kopfüber kreiseln."
          y: "Es bewegt sich, indem es sich auf seinem Fuß dreht.\nEin seltenes Pokémon, das in alten Ruinen lebte."
        es:
          x: "Se mueve girando sobre su eje. También se le puede\nver girando cabeza abajo."
          y: "Se mueve girando sobre su eje. Es un extraño\nPokémon que fue encontrado en unas viejas ruinas."
        ko:
          x: "한 다리로 회전하면서\n이동한다. 거꾸로\n회전하는 오뚝군도 발견된다."
          y: "한 다리로 회전하면서\n이동한다. 고대 유적에서\n발견된 희귀한 포켓몬이다."
