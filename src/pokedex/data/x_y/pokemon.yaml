        jp_kana:
          x: "しょっかくを　ぶつけあって　ならす\nおとで　なかまと　かいわをする。\nねいろは　あきの　よの　ふうぶつし。"
          y: "しょっかく　どうしが　ぶつかると\nコロン　コロンと　もっきんに　にた\nねいろを　かなでる。"
        jp_kanji:
          x: "触覚を　ぶつけ合って　鳴らす　音で\n仲間と　会話をする。\n音色は　秋の　夜の　風物詩。"
          y: "触覚　同士が　ぶつかると\nコロン　コロンと　木琴に　似た\n音色を　奏でる。"
        en:
          x: "It chats with others using the sounds of its colliding\nantennae. These sounds are fall hallmarks."
          y: "When its antennae hit each other, it sounds like the\nmusic of a xylophone."
        fr:
          x: "Il communique au son de ses antennes qui\ns’entrechoquent. Ce son marque l’arrivée de\nl’automne."
          y: "Quand ses antennes s’entrechoquent, elles laissent\néchapper un bruit de xylophone."
        it:
          x: "Comunica con il suono prodotto dallo scontro delle\nsue antenne. Esso indica l’arrivo dell’autunno."
          y: "Le antenne, scontrandosi, producono un suono\nsimile allo xilofono: klon, klon!"
        de:
          x: "Diese Pokémon unterhalten sich, indem sie ihre\nAntennen aneinanderschlagen. Der Ton ist ihr\nKennzeichen."
          y: "Wenn seine zwei Antennen sich berühren,\nerklingt ein Ruf wie das Spiel eines Xylophons."
        es:
          x: "Hablan entre sí chocando las antenas. Los sonidos\nproducidos son muy característicos."
          y: "Si choca sus antenas, emite un sonido similar al de\nun xilófono."
        ko:
          x: "더듬이를 서로 부딪쳐 내는\n소리로 동료와 대화한다. 음색은\n가을밤의 정취를 잘 나타낸다."
          y: "더듬이가 서로 부딪히면\n딩동딩동 실로폰 같은\n음색을 연주한다."
kricketune:
