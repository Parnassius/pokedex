        es:
          x: "Ensarta a sus presas con sus gigantescas garras\nelásticas. Una fuerte coraza cubre su cuerpo."
          y: "Está protegido por una fuerte armadura y tiene un\ncuerpo robusto. Engancha a sus presas con las pinzas\ny las devora."
        ko:
