        jp_kanji:
          x: "発達した　４本の　腕は\n２秒間に　１０００発の　パンチを\n繰り出すことができる。"
          y: "４本の　腕で　相手の　手足を\n押さえこみ　自由を　奪うと\n地平線の　向こうまで　投げ飛ばす。"
        en:
          x: "Its four ruggedly developed arms can launch\na flurry of 1,000 punches in just two seconds."
          y: "It uses its four powerful arms to pin the limbs of its\nfoe, then throws the victim over the horizon."
        fr:
          x: "Ses deux paires de bras permettent à Mackogneur\nd’envoyer une série de 1 000 coups de poing en 2 s."
          y: "Il se sert de ses quatre bras pour enserrer les\nmembres de sa victime puis il la projette au loin."
        it:
          x: "Le braccia eccezionalmente sviluppate sono in\ngrado di assestare 1000 pugni in soli 2 secondi."
          y: "Con le sue quattro potenti braccia afferra gli arti del\nnemico per poi lanciarlo lontano."
        de:
          x: "Seine markigen Arme können innerhalb von nur\nzwei Sekunden 1 000 Schläge verteilen."
          y: "Es setzt seine vier Arme ein, um die Glieder seiner\nGegner festzuhalten. Dann wirft es sie hinfort."
        es:
          x: "Tiene cuatro brazos tan bien desarrollados que puede\ndar una serie de 1000 puñetazos en cuestión de dos\nsegundos."
          y: "Usa sus cuatro poderosos brazos para agarrar a su\nenemigo y lanzarlo lo más lejos posible."
        ko:
          x: "발달한 4개의 팔은\n2초 동안 1000번의\n펀치를 날릴 수 있다."
          y: "4개의 팔로 상대방의 손발을\n붙잡아 꼼짝 못하게 만들고\n지평선 멀리까지 던져버린다."
