          y: "しんかして　うしろあし　だけで\nたつようになった。ツノで　つかれると\nがんせきにも　あながあいてしまう。"
        jp_kanji:
          x: "全身を　よろいのような　皮膚で\n守っている。２０００度の\nマグマの　中でも　生きられる。"
          y: "進化して　後ろ足だけで\n立つようになった。ツノで　突かれると\n岩石にも　穴が　開いてしまう。"
        en:
          x: "Protected by an armor-like hide, it is capable of\nliving in molten lava of 3,600 degrees Fahrenheit."
          y: "It begins walking on its hind legs after evolution.\nIt can punch holes through boulders with its horn."
        fr:
          x: "Son épiderme très épais lui permet de survivre dans\nun environnement où il fait plus de 2 000 °C."
          y: "L’évolution a permis à ce Pokémon de marcher sur\nses pattes arrière. Il peut facilement faire des trous\ndans les rochers en utilisant sa corne."
        it:
          x: "Protetto da una pelle-armatura, può vivere nella\nlava liquida a 2000 °C."
          y: "Dopo l’evoluzione inizia a muoversi sulle zampe\nposteriori. Con il corno può perforare la roccia."
        de:
          x: "Durch seine panzerähnliche Körperhülle kann es\nin bis zu 2 000 °C heißer Lava leben."
          y: "Nach seiner Entwicklung geht es aufrecht auf\nseinen Hinterfüßen. Mit seinem Horn kann es\nLöcher in Felsen bohren."
        es:
          x: "La piel le sirve de escudo protector. Puede vivir en\nlava líquida a 2000 °C de temperatura."
          y: "Cuando evoluciona, comienza a andar con las patas\ntraseras. Es capaz de horadar rocas con el cuerno que\ntiene."
        ko:
          x: "전신을 갑옷 같은 피부로\n보호하고 있다. 2000도의\n마그마 속에서도 살 수 있다."
          y: "진화하여 뒷다리만으로\n서게 되었다. 뿔에 찔리면\n암석에도 구멍이 뚫리고 만다."
