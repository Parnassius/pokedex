      descriptions:
        jp_kana:
          x: "とても　らんぼうで　いつも　あかと\nあおの　バスラオは　あらそっている。\nたべると　いがいと　おいしいらしい。"
          y: "あかと　あおの　バスラオは　なかが\nわるいが　なぜか　いろの　ちがう\nこたいが　むれに　まぎれこんでいる。"
        jp_kanji:
          x: "とても　乱暴で　いつも　あかと\nあおの　バスラオは　争っている。\n食べると　意外と　おいしいらしい。"
          y: "赤と　青の　バスラオは　仲が　悪いが\nなぜか　色の　違う　個体が\n群れに　紛れこんでいる。"
        en:
          x: "Red- and blue-striped Basculin are very violent and\nalways fighting. They are also remarkably tasty."
          y: "Red and blue Basculin usually do not get along,\nbut sometimes members of one school mingle with\nthe other’s school."
        fr:
          x: "Les rouges et les bleus se détestent et se battent\ndès qu’ils s’aperçoivent. Un Pokémon violent mais\ndélicieux."
          y: "Les rouges et les bleus se détestent, mais il y en\na toujours un ou deux dans un groupe de l’autre\ncouleur."
        it:
          x: "I Basculin con la linea rossa e quelli con la linea\nblu sono molto violenti e litigano spesso."
          y: "I Basculin con la linea rossa e quelli con la linea blu\nnon vanno d’accordo ma, chissà perché, in gruppo\nsi mescolano."
        de:
          x: "Sie gelten als Delikatesse. Aufgrund ihrer brutalen\nNatur liegen rot und blau gestreifte Exemplare\nimmer im Clinch."
          y: "Rot gestreifte und blau gestreifte Exemplare sind\nsich feindlich gesonnen. Doch ist jeder Schwarm\nbunt gemischt."
        es:
          x: "Los de color azul y los de color rojo siempre se\npelean. Son muy violentos, pero su sabor es\nexcepcional."
          y: "Los Basculin con la raya roja y aquellos con la raya\nazul se llevan fatal, pero algunos tienden a agruparse."
        ko:
          x: "아주 난폭하고 항상 빨강과\n파랑의 배쓰나이는 다투고 있다.\n먹으면 의외로 맛있다고 한다."
          y: "빨강과 파랑 배쓰나이는 사이가\n나쁨에도 불구하고 같은 무리에\n다른 색 개체가 섞여 있다."
sandile:
  species_id: 551
  names:
    jp_kana: メグロコ
    jp_kanji: メグロコ
    en: Sandile
    fr: Mascaïman
    it: Sandile
    de: Ganovil
    es: Sandile
    ko: 깜눈크
