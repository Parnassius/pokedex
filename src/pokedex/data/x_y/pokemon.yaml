        jp_kanji:
          x: "尻尾を　立てて　まわりの　様子を\n探っていると　ときどき\n雷が　尻尾に　落ちてくる。"
          y: "ほっぺたの　両側に\n小さい　電気袋を　持つ。\nピンチのときに　放電する。"
