          y: "あさひの　エネルギーを　あびた\nつららが　ポケモンに　なった。\nゆきに　からだを　うめて　ねむる。"
        jp_kanji:
          x: "マイナス５０度の　息を　吐く。\n雪の　結晶を　作って\nあたりに　雪を　降らせる。"
          y: "朝日の　エネルギーを　浴びた\nつららが　ポケモンに　なった。\n雪に　体を　埋めて　眠る。"
        en:
          x: "The temperature of their breath is -58 degrees\nFahrenheit. They create snow crystals and make\nsnow fall in the areas around them."
          y: "This Pokémon formed from icicles bathed in energy\nfrom the morning sun. It sleeps buried in snow."
        fr:
          x: "Il exhale une haleine à -50 °C. Il fabrique des cristaux\nde neige et fait neiger autour de lui."
          y: "Ce Pokémon est né d’un glaçon qui a baigné dans\nla lumière du matin. Il se cache dans la neige pour\ndormir."
        it:
          x: "Il suo fiato è a -50 °C. Fa nevicare tutto intorno,\nformando dei cristalli di neve."
          y: "Pokémon nato da una stalattite che ha ricevuto\nl’energia del sole mattutino. Dorme sepolto sotto\nla neve."
        de:
          x: "Die Temperatur seines Odems liegt bei -50 °C.\nEs erzeugt Eiskristalle und lässt es in seiner\nUmgebung schneien."
          y: "Ein Eiszapfen, der durch die Energie der aufgehenden\nSonne zum Pokémon wurde. Nachts deckt es sich mit\nSchnee zu."
        es:
          x: "Lanza un aliento de -50 °C. Crea bloques de nieve y\nes capaz de lograr que nieve a su alrededor."
          y: "Nació de un carámbano que absorbió la energía del\nsol al alba. Duerme arropado por la nieve."
        ko:
          x: "마이너스 50도의 숨결을 내뱉는다.\n눈 결정을 만들어\n주변에 눈이 내리게 한다."
          y: "아침 해의 에너지를 받은\n고드름이 포켓몬이 되었다.\n눈에 몸을 묻고 잠든다."
vanillish:
