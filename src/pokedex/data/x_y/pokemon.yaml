          y: "ミノムッチから　しんかしたとき\nミノが　からだの　いちぶに　なった。\nいっしょう　ミノを　ぬぐことはない。"
        jp_kanji:
          x: "進化した　場所によって\n姿が　変わる。身近にある　材料が\n体の　一部に　なるのだ。"
          y: "ミノムッチから　進化したとき\nミノが　体の　一部に　なった。\n一生　ミノを　脱ぐことはない。"
        en:
          x: "Its appearance changes depending on where it\nevolved. The materials on hand become a part of\nits body."
          y: "When Burmy evolved, its cloak became a part of\nthis Pokémon’s body. The cloak is never shed."
        fr:
          x: "Son apparence varie selon le lieu d’évolution. Son\ncorps est façonné avec les matériaux à disposition."
