          y: "きに　くっついたまま　うごかない。\nかたいカラの　はへんを　ばらまいて\nちかづくものを　おいはらう。"
        jp_kanji:
          x: "鋼鉄の　殻で　守られている。\nすきまから　目玉が　のぞいているが\n中身の　正体は　ナゾのまま。"
          y: "木に　くっついたまま　動かない。\n硬い殻の　破片を　ばらまいて\n近づくものを　追い払う。"
        en:
          x: "It is encased in a steel shell. Its peering eyes are\nall that can be seen of its mysterious innards."
          y: "It remains immovably rooted to its tree. It scatters\npieces of its hard shell to drive its enemies away."
        fr:
          x: "Il est prisonnier d’une coquille d’acier. Ses yeux\nvigilants sont la seule partie visible de son corps."
          y: "Il est totalement fixé à son arbre. Il lance des\nmorceaux de sa carapace pour faire fuir son ennemi."
        it:
          x: "È incassato in una conchiglia d’acciaio. A parte gli\nocchi scrutatori, nessuno sa cosa ci sia all’interno."
          y: "Rimane saldamente attaccato al suo albero. Tiene\nlontani i nemici lanciando pezzi del duro guscio."
        de:
          x: "Dieses Pokémon ist von einer Stahlhülle umgeben.\nSeine stechenden Augen sind alles, was man von\nihm sieht."
          y: "Es bleibt stets bei seinem Baum. Es verstreut Teile\nseiner Schale, um so seine Feinde zu verjagen."
        es:
          x: "Se protege con su concha de acero de tal manera que\nsolo se pueden ver sus ojos."
          y: "Permanece inmóvil agarrado a su árbol. Dispara trozos\nde su dura coraza para alejar al enemigo."
        ko:
          x: "강철 껍질이 몸을 보호하고 있다.\n틈새에서 엿보고 있는 눈이 있지만\n내용물의 정체는 수수께끼다."
          y: "나무에 붙어 있는 채로 안 움직인다.\n단단한 껍질 파편을 흩뿌려서\n다가오는 자를 쫓아버린다."
dunsparce:
