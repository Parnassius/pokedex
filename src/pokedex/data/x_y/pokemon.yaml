          x: "しんかのとき　２ひきの　カメテテが\n７ひきに　ぶんれつした　ポケモン。\n７ひきぶんの　パワーで　たたかう。"
          y: "てあしにも　のうが　あり　かってに\nうごけるが　ふだんは　あたまの\nガメノデスの　めいれいに　したがう。"
        jp_kanji:
          x: "進化のとき　２匹の　カメテテが\n７匹に　分裂した　ポケモン。\n７匹分の　パワーで　戦う。"
          y: "手足にも　脳が　あり\n勝手に　動けるが　普段は\n頭の　ガメノデスの　命令に　従う。"
        en:
          x: "When they evolve, two Binacle multiply into seven.\nThey fight with the power of seven Binacle."
          y: "Barbaracle’s legs and hands have minds\nof their own, and they will move independently.\nBut they usually follow the head’s orders."
        fr:
          x: "Après évolution, les deux Opermine laissent place\nà sept créatures qui ont la puissance cumulée de\nsept Opermine."
          y: "Ses jambes et ses bras sont dotés d’une volonté\npropre. Cependant, ils suivent généralement\nles ordres donnés."
        it:
          x: "Con l’evoluzione, i due Binacle si moltiplicano e il\nPokémon lotta con la forza di sette Binacle."
          y: "I Binacle delle gambe e delle braccia hanno cervelli\nindipendenti, ma generalmente seguono le direttive\ndi quello della testa."
        de:
          x: "Es entsteht bei der entwicklungsbedingten Aufspaltung\nder beiden Bithora in sieben Vertreter ihrer Art.\nGemeinsam verfügen sie über die siebenfache Stärke."
          y: "Arme und Beine verfügen über eigene Gehirne, was\nihnen relative Bewegungsfreiheit gewährt. Sie ordnen\nsich jedoch zumeist den Befehlen des Kopfes unter."
        es:
          x: "Al evolucionar, los dos Binacle se dividen y dan lugar\na siete criaturas que se aglomeran formando un\nBarbaracle y suman su poder al combatir."
          y: "Si bien todas las extremidades de Barbaracle tienen\ncerebro propio y se mueven a su antojo, suelen\nseguir las órdenes que imparte la cabeza."
        ko:
          x: "진화할 때 2마리의 거북손손이\n7마리로 분열된 포켓몬이다.\n7마리분의 파워로 싸운다."
          y: "손과 발에도 뇌가 있어 멋대로\n움직일 수 있지만 보통은 머리인\n거북손데스의 명령에 따른다."
skrelp:
  species_id: 690
