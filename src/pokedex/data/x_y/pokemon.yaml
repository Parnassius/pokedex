          y: "ほほの　でんきぶくろで　つくった\nでんきを　まくの　うちがわに　ためて\nかっくうしながら　でんきを　はなつ。"
        jp_kanji:
          x: "森の　木の上で　暮らす。\nマントのような　膜の　内側を\n放電　させながら　滑空する。"
          y: "ほほの　電気袋で　作った　電気を\n膜の　内側に　ためて\n滑空しながら　電気を　放つ。"
        en:
          x: "They live on treetops and glide using the inside of\na cape-like membrane while discharging electricity."
          y: "The energy made in its cheeks’ electric pouches is\nstored inside its membrane and released while it\nis gliding."
        fr:
          x: "Il vit au sommet des arbres de la forêt. Il plane en\ndéchargeant l’électricité de ses membranes\nsemblables à une cape."
          y: "Il accumule dans ses membranes l’électricité qu’il\nproduit dans ses bajoues, et la relâche tout en\nplanant."
        it:
          x: "Vive nelle foreste sulle cime degli alberi. Plana\nusando una membrana simile a un mantello,\nelettrificata all’interno."
          y: "Accumula nelle membrane l’elettricità che produce\nall’interno delle guance, poi la rilascia planando."
        de:
          x: "Lebt in den Wipfeln der Waldbäume. Während es\ndurch die Lüfte gleitet, entlädt es Strom aus seinen\nFluglappen."
          y: "Im Flug entlädt es Strom, den es mit seinen\nBackentaschen erzeugt und in seinen Fluglappen\ngespeichert hat."
        es:
          x: "Vive en la copa de los árboles. Produce descargas\nmientras vuela con el interior de la membrana que hace\nde capa."
          y: "Almacena en una membrana la electricidad generada\npor sus mejillas y planea por los aires soltando\ndescargas."
        ko:
          x: "숲의 나무 위에 산다.\n망토 같은 막의 안쪽을\n방전시키며 활공한다."
          y: "볼의 전기 주머니에서 만든\n전기를 막 안쪽에 모아\n활공하며 전기를 발산한다."
