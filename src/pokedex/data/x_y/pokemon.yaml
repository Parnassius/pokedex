        jp_kana:
          x: "しんぞうや　のうみそは　ちいさく\nからだの　だいぶぶんが　いぶくろ。\nなんでも　とかす　いえきを　だす。"
          y: "なんでも　しょうかする　いぶくろ。\nしょうかする　ときに　はっせいする\nガスは　きょうれつな　あくしゅうだ。"
        jp_kanji:
          x: "心臓や　脳みそは　小さく\n体の　大部分が　胃袋。\nなんでも　溶かす　胃液を　出す。"
          y: "なんでも　消化する　胃袋。\n消化する　ときに　発生する　ガスは\n強烈な　悪臭だ。"
        en:
          x: "It has a small heart and brain. Its stomach\ncomprises most of its body, with enzymes to\ndissolve anything."
          y: "There is nothing its stomach can’t digest. While it is\ndigesting, vile, overpowering gases are expelled."
        fr:
          x: "Son corps est principalement constitué d’un estomac\ndont les sucs digestifs dissolvent tout."
          y: "Il n’y a rien que son estomac ne puisse digérer.\nPendant sa digestion, il laisse s’échapper des gaz très\nbruyants et nauséabonds."
        it:
          x: "Ha cuore e cervello mini: lo stomaco prende troppo\nspazio! Con i succhi gastrici scioglie qualunque cosa."
          y: "Non c’è nulla che il suo stomaco non possa digerire.\nDurante la digestione espelle gas insopportabilmente\nfetidi."
        de:
          x: "Sein Körper besteht fast nur aus Magen. Herz und\nHirn sind winzig. Sein Magensaft verdaut alles."
          y: "Es gibt nichts, das sein Magen nicht verdauen könnte.\nWährend des Verdauungsvorgangs werden eklige,\npenetrante Gase freigesetzt."
        es:
          x: "Sus sesos y corazón son diminutos; es casi todo\nestómago. Sus jugos gástricos disuelven lo que sea."
          y: "Es capaz de digerir cualquier cosa. Para hacer la\ndigestión, se ayuda de un fluido y un gas capaces\nde corroerlo todo."
        ko:
          x: "심장과 뇌가 작고\n몸 대부분이 위다.\n무엇이든 녹이는 위액을 낸다."
          y: "무엇이든 소화하는 위다.\n소화할 때 발생하는\n가스는 강렬한 악취가 난다."
