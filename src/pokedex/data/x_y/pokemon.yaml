          y: "長い　体毛に　包まれると\n冬山でも　一晩　平気なほど\n暖かく　とても　心地よい。"
        en:
          x: "It rescues people stranded by blizzards in the\nmountains. Its shaggy fur shields it from the cold."
          y: "Being wrapped in its long fur is so comfortable\nthat a person would be fine even overnight on a\nwintry mountain."
        fr:
          x: "Il sauve les gens bloqués dans les montagnes par\ndes tempêtes de neige. Ses longs poils le protègent\ndu froid."
          y: "Sa soyeuse fourrure à poils longs est assez chaude\npour supporter de longues nuits d’hiver en montagne."
        it:
          x: "Soccorre chi si trova in difficoltà sulle montagne\nspazzate da bufere di neve. I lunghi peli lo\nproteggono dal freddo."
          y: "Avvolti nel suo caldo manto si può dormire\nall’addiaccio su una montagna in inverno senza\ncorrere alcun pericolo."
        de:
          x: "Es rettet Menschen, die aufgrund eines\nSchneesturmes im Gebirge festsitzen.\nSein langes Fell schützt es vor Kälte."
          y: "Sein langes Fell ist sehr bequem und kann einen\nMenschen eine ganze Nacht lang auf einem\nschneebedeckten Berg warmhalten."
        es:
          x: "Socorre a humanos perdidos en montañas azotadas\npor ventiscas. Su largo pelaje le protege del frío."
          y: "Un humano podría pasar una noche gélida en las\nmontañas sin pasar frío si se tapara con su largo y\ntupido pelaje."
        ko:
          x: "눈보라로 길이 막힌 산에 들어가\n조난된 사람을 구해준다.\n긴 털이 추위를 막는다."
          y: "긴 털에 둘러싸이면 겨울 산에서\n하룻밤을 보내도 괜찮을 정도로\n따뜻하고 매우 기분이 좋다."
purrloin:
  species_id: 509
