          y: "ポケモンや　トレーナーを　じっと\nかんさつする。ゴチムにしか　みえない\nなにかを　みつめているらしい。"
        jp_kanji:
          x: "リボンのような　触角で\nサイコパワーを　増幅させる。\nなにかを　じっと　見つめている。"
          y: "ポケモンや　トレーナーを　じっと\n観察する。ゴチムにしか　見えない\nなにかを　見つめているらしい。"
        en:
          x: "Their ribbonlike feelers increase their psychic\npower. They are always staring at something."
          y: "They intently observe both Trainers and Pokémon.\nApparently, they are looking at something that only\nGothita can see."
        fr:
          x: "Concentre des pouvoirs psychiques dans ses\nantennes semblables à des rubans, et regarde\nfixement… mais quoi ?"
          y: "Fixe les Pokémon et les Dresseurs du regard comme\ns’il y avait quelque chose que personne d’autre ne\npouvait voir."
        it:
          x: "Amplifica i poteri psichici con le antenne a forma di\nfiocchetti. Il suo sguardo è sempre fisso."
          y: "Osserva con attenzione i Pokémon e gli Allenatori,\ncome se contemplasse qualcosa che solo lui può\nvedere."
        de:
          x: "Die schleifenförmigen Fühler erhöhen seine\nPsycho-Kräfte. Es scheint stets irgendetwas\nanzustarren."
          y: "Beobachtet andere Pokémon und Trainer mit\ndurchdringendem Blick, als könne es etwas\nerkennen, das keiner sonst sieht."
        es:
          x: "Amplifica su poder psíquico con sus antenitas en forma\nde lazo. Siempre está mirando algo fijamente."
          y: "Clava su mirada en Pokémon y Entrenadores como\nsi observara algo solo perceptible por él."
        ko:
          x: "리본 모양의 더듬이로\n사이코 파워를 증폭시킨다.\n무언가를 가만히 바라보고 있다."
          y: "포켓몬이나 트레이너를 가만히\n관찰한다. 고디탱만 볼 수 있는\n무언가를 바라보고 있는 것 같다."
