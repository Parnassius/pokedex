        fr:
          x: "Dans l’eau, il se recroqueville sur ses jambes et il\nagite sa coquille pour nager à très grande vitesse."
          y: "C’est un très bon nageur. Il lacère sa proie de ses\nlongues griffes et en absorbe les fluides corporels."
        it:
          x: "In acqua raccoglie gli arti per diventare più compatto,\nagitando il guscio per nuotare veloce."
          y: "È un perfetto nuotatore che taglia la preda con le\nsue falci e ne succhia il sangue."
        de:
          x: "Im Wasser zieht es seine Beine an und bewegt\nseinen Panzer, um so schneller schwimmen zu können."
