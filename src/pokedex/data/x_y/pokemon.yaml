          y: "からだを　おおきく　みせて　あいてを\nいあつするため　ふたまたの　しっぽで\nウエストを　ぎゅっと　しぼっている。"
        jp_kanji:
          x: "ほかの　ポケモンの　住処でも\n居心地が　良ければ　居座って\n自分の　住処に　してしまう。"
          y: "体を　大きく　見せて　相手を\n威圧するため　ふたまたの　尻尾で\nウエストを　ぎゅっと　絞っている。"
        en:
          x: "It would claim another Pokémon’s nest as its own\nif it finds a nest sufficiently comfortable."
          y: "To make itself appear intimidatingly beefy, it tightly\ncinches its waist with its twin tails."
        fr:
          x: "Il n’hésitera pas à voler le nid d’autres Pokémon et\nà s’y installer si celui-ci est confortable."
          y: "Il ceinture sa taille de sa queue bifide pour paraître\nplus imposant."
        it:
          x: "Si introduce sfacciatamente nelle tane degli altri\nPokémon rivendicandole poi come proprie."
          y: "Si stringe la vita con la coda biforcuta per apparire\npiù imponente e minaccioso."
        de:
          x: "Behagt ihm die Behausung eines anderen Pokémon,\nbleibt Shnurgarst einfach da und nistet sich dort ein."
          y: "Damit es bedrohlicher und größer aussieht, umschlingt\nes seine Taille fest mit seinem Schwanz."
        es:
          x: "Si se siente a gusto, no tiene ningún reparo en\napropiarse de las moradas de otros Pokémon."
          y: "Para intimidar y parecer más corpulento, se aprieta la\ncintura con su cola bífida."
        ko:
          x: "다른 포켓몬의 거처라 할지라도\n편안하면 눌러앉아\n자신의 거처로 삼아버린다."
          y: "몸을 크게 보여서 상대를\n위압하기 위해 두 갈래의 꼬리로\n허리를 꼭 쥐고 있다."
