          x: "No two Spinda have the same pattern of spots.\nIts tottering step fouls the aim of foes."
          y: "The chances of two Spinda having identical spot\npatterns is less than one in four billion."
        fr:
          x: "Les motifs sur leur fourrure sont propres à chaque\nSpinda. Son pas chancelant le rend difficile à viser."
          y: "La chance que deux Spinda avec les mêmes motifs se\nrencontrent est de moins d’une pour quatre milliards."
        it:
          x: "Non ci sono due Spinda con lo stesso motivo\nmaculato. Il suo passo barcollante confonde i nemici."
          y: "La probabilità che due Spinda con lo stesso disegno\nsi incontrino è praticamente nulla."
        de:
          x: "Das Muster eines Pandir ist wie ein Fingerabdruck.\nSein Taumeln senkt die gegnerische Zielsicherheit."
          y: "Die Wahrscheinlichkeit, dass sich zwei gleich\ngemusterte Pandir begegnen, ist vier Milliarden\nzu eins."
        es:
          x: "No hay dos Spinda que tengan idénticos pelajes.\nSu tambaleo al bailar confunde a los rivales."
          y: "La probabilidad de que dos Spinda con dibujos\nidénticos en su pelaje se encuentren es casi\ninexistente."
        ko:
          x: "똑같은 얼룩무늬의 얼루기는\n없다. 휘청휘청거리는 걸음걸이로\n상대의 노림수를 피한다."
          y: "똑같은 얼룩무늬의 얼루기를\n우연히 만날 확률은\n40억분의 1 이하다."
