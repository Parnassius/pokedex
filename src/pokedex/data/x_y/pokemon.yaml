        jp_kana:
          x: "やこうせいの　ポケモン。\nあかりに　さそわれた　ドクケイルが\nがいろじゅの　はを　くいちらかす。"
          y: "おそわれると　はげしく　はばたいて\nもうどくの　こなを　まきちらす。\nひがくれると　こうどうを　はじめる。"
        jp_kanji:
          x: "夜行性の　ポケモン。\n明かりに　誘われた　ドクケイルが\n街路樹の　葉を　食い散らかす。"
          y: "襲われると　激しく　羽ばたいて\n猛毒の　粉を　まき散らす。\n日が暮れると　行動を　はじめる。"
        en:
          x: "A nocturnal Pokémon. Drawn by streetlights, they\nmessily eat the leaves of trees lining boulevards."
          y: "It violently flutters its wings to scatter toxic dust\nwhen attacked. It becomes active after sunset."
        fr:
          x: "Ce Pokémon nocturne est attiré par les lueurs de\nla ville et aime les feuilles des arbres urbains."
          y: "Quand on l’attaque, il bat des ailes pour répandre sa\npoudre toxique. Il sort après le coucher du soleil."
        it:
          x: "Pokémon notturno. Attirato dalla luce dei lampioni,\ndivora le foglie degli alberi lungo i viali."
          y: "Se attaccato, sbatte con forza le ali e sparge una\npolvere tossica. Lo si vede in giro dopo il tramonto."
        de:
          x: "Nachtaktives Pokémon, das vom Licht der Stadt\nangezogen wird und dort die Blätter der Bäume frisst."
          y: "Wird es angegriffen, flattert es mit den Flügeln\nund verteilt giftigen Puder. Es ist nachtaktiv."
        es:
          x: "Pokémon nocturno. Atraído por las luces de la ciudad,\nse come las hojas y arbustos de las avenidas."
          y: "Cuando se le ataca, bate las alas con fuerza para\nesparcir polvo tóxico. Es un Pokémon nocturno."
        ko:
          x: "야행성 포켓몬이다. 불빛에\n이끌려나온 독케일이 가로수의\n잎을 헤적거리며 먹어댄다."
          y: "습격당하면 격하게 날개를 쳐서\n맹독 가루를 흩뿌린다.\n날이 저물면 행동을 시작한다."
