          y: "手入れの　行き届いた　花壇の\n花が　咲くと　姿を　現して\nかれんな　ダンスで　祝福する。"
        en:
          x: "It flutters around fields of flowers and cares for\nflowers that are starting to wilt. It draws\nout the hidden power of flowers to battle."
          y: "When the flowers of a well-tended flower bed bloom,\nit appears and celebrates with an elegant dance."
