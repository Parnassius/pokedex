          y: "Ce Pokémon est fait de programmes et d’algorithmes.\nIl peut survivre en milieu virtuel."
        it:
          x: "Questo Pokémon è il risultato di una ricerca umana.\nEsegue solo i movimenti più elementari."
          y: "Formato per intero da codici programmatici, può\nmuoversi liberamente nel ciberspazio."
        de:
          x: "Ein künstlich produziertes Pokémon, welches das\nErgebnis von Forschungen ist. Es ist simpel aufgebaut."
          y: "Porygon besteht komplett aus Computerdaten.\nEs kann sich frei in virtuellen Welten bewegen."
        es:
          x: "Pokémon creado por el hombre tras muchas\ninvestigaciones. Sus habilidades son básicas."
          y: "Un Pokémon formado por códigos de programación.\nSe mueve libre por el ciberespacio."
        ko:
