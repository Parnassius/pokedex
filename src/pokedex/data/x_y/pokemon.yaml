        jp_kana:
          x: "はげしい　たたかいで　きずつくと\nいわのように　かたまり　もっこうして\nこころを　とぎすませるのだ。"
          y: "たいないで　１４００どの　ほのおを\nもやすことで　ダンプカーを　パンチで\nはかいするほどの　パワーを　つくる。"
        jp_kanji:
          x: "激しい　戦いで　傷つくと\n岩のように　固まり　黙考して\n心を　研ぎ澄ませるのだ。"
          y: "体内で　１４００度の　炎を\n燃やすことで　ダンプカーを　パンチで\n破壊するほどの　パワーを　作る。"
        en:
          x: "When one is injured in a fierce battle, it hardens\ninto a stone-like form. Then it meditates and\nsharpens its mind."
          y: "Its internal fire burns at 2,500 degrees Fahrenheit,\nmaking enough power that it can destroy a dump\ntruck with one punch."
        fr:
          x: "S’il est blessé dans un combat, il se fige comme\nun rocher, fait le vide dans son esprit et aiguise\nses sens."
          y: "Il entretient des flammes à 1 400 °C dans son corps.\nDe quoi détruire un camion-benne d’un coup de\npoing !"
        it:
          x: "Se resta ferito durante una battaglia violenta, diventa\nduro come la pietra e medita per purificare la mente."
          y: "La sua fiamma interna, alla temperatura di 1400 °C,\nsviluppa una potenza tale da distruggere un autocarro."
        de:
          x: "Nimmt es in einem heißen Kampf Schaden, wird es\nhart wie Stein und fällt in eine Trance, um seinen\nVerstand zu schärfen."
          y: "Erhitzt das Innere seines Körpers auf 1 400 °C\nund erlangt so die Kraft, um mit der Faust\nLaster zu zerstören."
        es:
          x: "Cuando resulta gravemente herido, se endurece como\nuna piedra y medita para agudizar la mente."
          y: "Genera llamas que alcanzan los 1400 °C con las que\nes capaz de destrozar un camión."
        ko:
          x: "격렬한 싸움으로 상처 입으면\n바위처럼 굳어져 묵상하며\n마음을 연마한다."
          y: "체내에서 1400도의 불꽃을\n태워서 덤프트럭을 펀치로\n파괴할 정도의 파워를 만든다."
