          y: "はるか　じょうくうの　オゾンそうの\nなかを　とんでいるため　さいきんまで\nすがたを　みた　ものは　いなかった。"
        jp_kanji:
          x: "雲より　はるか上の　オゾン層に\n生息しているため　地上から\n姿を　見ることは　できない。"
          y: "はるか　上空の　オゾン層の　中を\n飛んでいるため　最近まで\n姿を　見た　者は　いなかった。"
        en:
          x: "It lives in the ozone layer far above the clouds and\ncannot be seen from the ground."
          y: "It flies in the ozone layer, way up high in the sky.\nUntil recently, no one had ever seen it."
        fr:
          x: "Il vit dans la couche d’ozone, au-dessus des nuages.\nIl est invisible depuis le sol."
          y: "On ne l’a vu pour la première fois que très récemment\ncar il vit dans la lointaine couche d’ozone."
        it:
          x: "Vive nello strato di ozono oltre le nuvole e non può\nessere avvistato da terra."
          y: "Vive in alto, nello strato di ozono, troppo lontano\nperché qualcuno l’abbia mai potuto avvistare."
        de:
          x: "Es lebt in der Ozonschicht hoch über den Wolken\nund kann vom Boden aus nicht gesehen werden."
          y: "Da es in der Ozonschicht hoch über den Wolken lebt,\nbekam es bis vor Kurzem noch niemand zu Gesicht."
        es:
          x: "Vive en la capa de ozono sobre las nubes y no puede\nser visto desde el suelo."
          y: "Como hasta hace poco volaba a la altura de la capa\nde ozono, nadie lo había visto nunca."
        ko:
          x: "구름보다 아득히 먼 위의 오존층에\n서식하고 있기 때문에 지상에서\n모습을 볼 수 없다."
          y: "아득한 상공의 오존층\n안을 날고 있기 때문에 최근까지\n모습을 본 사람은 없었다."
