          y: "あたたかい　ひざしが　エネルギー。\nたいようを　おいかけて　いどうする\nしゅうせいで　しられている。"
        jp_kanji:
          x: "暑い　季節が　近づくと\n顔の　花びらは　鮮やかになり\n活発に　動くようになる。"
          y: "暖かい　日差しが　エネルギー。\n太陽を　追いかけて　移動する\n習性で　知られている。"
        en:
          x: "As the hot season approaches, the petals on this\nPokémon’s face become more vivid and lively."
          y: "It gets energy from warm sunlight and is known for\nits habit of moving in pursuit of it."
        fr:
          x: "À l’approche des beaux jours, les pétales entourant\nsa tête deviennent plus chatoyants."
          y: "Les rayons du soleil lui donnent de l’énergie. Il est\nconnu pour migrer vers les régions ensoleillées."
        it:
          x: "Con l’avvicinarsi della bella stagione, i suoi petali si\nfanno più vivi e splendenti."
          y: "Trae energia dalla luce del sole e si muove di continuo\nper cercare di assorbirne sempre di più."
        de:
          x: "Steht der Sommer bevor, werden die Blätter um\ndas Gesicht dieses Pokémon aktiv und lebhaft."
          y: "Warmes Sonnenlicht gibt ihm Energie. Daher wandert\nes stets dem Sonnenlicht hinterher."
        es:
          x: "A medida que se acerca el verano, va adquiriendo un\ncolor más vivo e intenso en los pétalos de la cara."
          y: "Obtiene energía de la luz solar. Este Pokémon es\nfamoso por su heliotropismo."
        ko:
          x: "더운 계절이 다가오면\n얼굴의 꽃잎이 선명해지고\n활발하게 움직이게 된다."
          y: "따뜻한 햇살이 에너지다.\n태양을 쫓아 이동하는\n습성으로 알려져 있다."
