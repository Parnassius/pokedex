        jp_kana:
          x: "きの　かわを　かさねあわせて\nカラを　ぶあつくするのが　だいすき。\nおもくなっても　きにしない。"
          y: "きのみに　そっくり。まちがわれて\nとりポケモンに　つつかれてしまうが\nかたい　カラで　まもられている。"
        jp_kanji:
          x: "木の　皮を　重ね合わせて\n殻を　分厚くするのが　大好き。\n重くなっても　気にしない。"
          y: "木の実に　そっくり。間違われて\nとりポケモンに　つつかれてしまうが\n硬い　殻で　守られている。"
        en:
          x: "It likes to make its shell thicker by adding layers of\ntree bark. The additional weight doesn’t bother it."
          y: "It looks just like a pinecone. Its shell protects it\nfrom bird Pokémon that peck it by mistake."
        fr:
          x: "Il renforce sa carapace en y ajoutant des écorces\nd’arbre. Il devient alors plus lourd."
          y: "Il ressemble à une pomme de pin. Sa carapace le\nprotège des Pokémon Oiseaux qui le picorent par\nerreur."
        it:
          x: "Inspessisce il guscio aggiungendo strati di corteccia.\nNon lo impensierisce l’aumento di peso."
          y: "Ha l’aspetto di una pigna. Il suo guscio lo protegge\ndai Pokémon uccello che lo beccano per errore."
        de:
          x: "Es fügt seiner Schale schichtenweise Baumrinde\nhinzu. Die zusätzliche Belastung ist ihm gleich."
          y: "Es sieht aus wie ein Tannenzapfen. Seine Schale\nschützt es vor Vogel-Pokémon, die an ihm picken\nwollen."
        es:
          x: "Le gusta engrosar su coraza añadiendo cortezas de\nárbol. El aumento de peso no le molesta."
          y: "Es como una piña piñonera. Su coraza lo protege de\nlos pájaros que lo picotean por error."
        ko:
          x: "나무껍질을 짜 맞춰서\n껍질을 두껍게 하는 것을 좋아한다.\n무거워져도 신경 쓰지 않는다."
          y: "나무열매와 똑 닮았다. 실수로\n새포켓몬에게 쪼이기도 하지만\n단단한 껍질이 몸을 보호하고 있다."
forretress:
