        jp_kana:
          x: "あかい　コアの　ついた　ギアを\nこうそくかいてんさせて　エネルギーを\nきゅうそくチャージ　するのだ。"
          y: "あかい　コアは　エネルギータンクの\nやくわり。チャージした　エネルギーを\nトゲから　しゅういに　うちだす。"
        jp_kanji:
          x: "赤い　コアの　ついた　ギアを\n高速回転させて　エネルギーを\n急速チャージ　するのだ。"
          y: "赤い　コアは　エネルギータンクの\n役割。チャージした　エネルギーを\nトゲから　周囲に　撃ち出す。"
        en:
          x: "The gear with the red core is rotated at high speed\nfor a rapid energy charge."
          y: "Its red core functions as an energy tank. It fires the\ncharged energy through its spikes into an area."
        fr:
          x: "Il accumule rapidement de l’énergie en faisant tourner\ntrès vite le rouage qui contient son noyau rouge."
          y: "Son noyau rouge lui permet d’accumuler de l’énergie\nqu’il projette ensuite aux alentours grâce à ses pics."
        it:
          x: "Facendo girare velocemente l’ingranaggio dotato\ndel nucleo rosso, accumula una grande quantità di\nenergia."
          y: "Il nucleo rosso serve da serbatoio di energia, che\npoi spara intorno a sé attraverso gli spuntoni."
        de:
          x: "Indem es das Rad mit dem roten Zentrum mit\nhohem Tempo zum Rotieren bringt, kann es eine\nTurboladung durchführen."
          y: "Der rote Zentralbestandteil dient als Energiespeicher.\nDarin geladene Energie feuert es über seine Stacheln\nab."
        es:
          x: "Recarga su energía rápidamente haciendo girar con\ngran celeridad el engranaje equipado con un núcleo\nrojo."
          y: "El núcleo rojo sirve como depósito de la energía que\nexpulsa por las púas una vez que está cargado."
        ko:
          x: "빨간 코어가 달린 기어를\n고속 회전시켜서 에너지를\n급속 충전한다."
          y: "빨간 코어는 에너지 탱크\n역할을 한다. 가시를 이용해\n모아둔 에너지를 주변에 쏘아댄다."
tynamo:
  species_id: 602
  names:
    jp_kana: シビシラス
    jp_kanji: シビシラス
    en: Tynamo
    fr: Anchwatt
    it: Tynamo
    de: Zapplardin
    es: Tynamo
    ko: 저리어
