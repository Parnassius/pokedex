        jp_kana:
          x: "みみの　しょっかくで　あいての\nたいちょうや　タマゴから　ポケモンが\nいつ　でてくるのかも　わかるのだ。"
          y: "みみの　しょっかくで　あいてに\nふれると　しんぞうの　おとで\nたいちょうや　きもちが　わかるのだ。"
        jp_kanji:
          x: "耳の　触角で　相手の\n体調や　タマゴから　ポケモンが\nいつ　でてくるのかも　わかるのだ。"
          y: "耳の　触角で　相手に　触れると\n心臓の　音で\n体調や　気持ちが　わかるのだ。"
        en:
          x: "Using the feelers on its ears, it can tell how\nsomeone is feeling or when an egg might hatch."
          y: "It touches others with the feelers on its ears, using\nthe sound of their heartbeats to tell how they\nare feeling."
        fr:
          x: "Son ouïe est si développée qu’il arrive à juger de\nla santé des gens ou à savoir quand un Œuf va éclore."
          y: "Il ausculte les gens avec ses antennes auriculaires\npour juger de leurs émotions ou de leur santé."
        it:
          x: "Le sue orecchie sono antenne capaci di sondare\nlo stato di salute degli altri o capire quando un\nuovo si schiuderà."
          y: "Quando tocca qualcuno con le antenne delle\norecchie, ne percepisce lo stato fisico e psicologico\ndal battito cardiaco."
        de:
          x: "Über die Fühler an seinen Ohren kann es ertasten,\nwie es einer Person geht oder wann ein Pokémon\naus seinem Ei schlüpft."
          y: "Berührt es jemanden mit den Fühlern an seinen Ohren,\nerfährt es durch den Herzschlag der Person,\nwie es ihr geht."
        es:
          x: "Con las antenas de sus oídos, perciben el estado de\nun rival o predicen cuándo va a eclosionar un Huevo\nPokémon."
          y: "Al tocar a alguien con las antenas de sus orejas,\nconoce su estado de ánimo y de salud por los latidos\ndel corazón."
        ko:
          x: "귀의 더듬이로 상대의\n컨디션이나 알에서 포켓몬이\n언제 나올지도 알 수 있다."
          y: "귀의 더듬이가 상대에게\n닿으면 심장 소리를 듣고\n몸 상태나 기분을 알 수 있다."
timburr:
