florges:
  species_id: 671
  names:
    jp_kana: フラージェス
    jp_kanji: フラージェス
    en: Florges
    fr: Florges
    it: Florges
    de: Florges
    es: Florges
    ko: 플라제스
  forms:
    florges_red_flower:
      form_id: 0
      names:
        jp_kana: あかいはな
        jp_kanji: あかいはな
        en: Red Flower
        fr: Fleur Rouge
        it: Fiore Rosso
        de: Rotblütler
        es: Flor Roja
        ko: 빨간 꽃
      base_stats:
        hp: 78
        attack: 65
        defense: 68
        special_attack: 112
        special_defense: 154
        speed: 75
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          x: "テリトリーは　みごとな　はなぞの。\nくさばなが　はなつ　エネルギーを\nあびて　じぶんの　パワーにするのだ。"
          y: "むかしの　しろの　あるじたちは\nにわを　かざるため　フラージェスを\nまねきいれ　はなぞのを　つくらせた。"
        jp_kanji:
          x: "テリトリーは　見事な　花園。\n草花の　放つ　エネルギーを　浴びて\n自分の　パワーにするのだ。"
          y: "昔の　城の　主たちは　庭を　飾るため\nフラージェスを　招き入れ\n花園を　作らせた。"
        en:
          x: "It claims exquisite flower gardens as its territory,\nand it obtains power from basking in the energy\nemitted by flowering plants."
          y: "In times long past, governors of castles\nwould invite Florges to create flower gardens\nto embellish the castle domains."
        fr:
          x: "Les jardins fleuris sont son territoire.\nIl se baigne dans l’énergie dégagée par les plantes\nen fleurs pour l’absorber."
          y: "Les châtelains de jadis invitaient les Florges sur leurs\nterres et leur confiaient la réalisation de leurs jardins."
        it:
          x: "Il suo habitat preferito sono i meravigliosi giardini\nfioriti. Assorbe e utilizza l’energia di piante e fiori."
          y: "Anticamente, i padroni dei castelli ricorrevano al suo\naiuto per abbellire i loro giardini con tanti fiori diversi."
        de:
          x: "Wunderschöne Blumengärten sind sein Revier.\nEs badet in der von blühenden Blumen freigesetzten\nEnergie und zieht daraus seine Kraft."
          y: "Die Schlossherren vergangener Zeiten haben Florges\neingeladen, damit diese Blumengärten für sie anlegen,\num so ihre Anwesen zu verschönern."
        es:
          x: "Habita en preciosos jardines floridos. Absorbe la\nenergía que emiten las plantas y la convierte en su\nfuente de poder."
          y: "Los propietarios de los castillos de antaño solían\ninvitar a Florges para que creasen jardines floridos,\na fin de decorar sus terrenos."
        ko:
          x: "멋진 화원이 영역이다.\n화초가 내보내는 에너지를\n쬐어 자신의 파워로 삼는다."
          y: "옛 성의 주인은\n정원을 꾸미기 위해 플라제스를\n불러들여 화원을 만들게 했다."
