        jp_kanji:
          x: "小さな　目が　たくさん　集まって\n大きな　目に　なっている。\n夜になると　明かりに　集まる。"
          y: "大きな　木の下に　住んでいて\n虫などを　食べているらしい。\n夜は　明かりのそばに　やってくる。"
        en:
          x: "Its big eyes are actually clusters of tiny eyes.\nAt night, its kind is drawn by light."
          y: "Lives in the shadows of tall trees where it eats\nbugs. It is attracted by light at night."
        fr:
          x: "Ses grands yeux sont en fait des amas d’yeux\nminuscules. La nuit, il est attiré par la lumière."
          y: "Il vit à l’ombre des grands arbres où il se nourrit\nd’insectes. Il est attiré par la lumière."
        it:
          x: "I suoi grandi occhi sono in realtà un insieme di tanti\npiccoli occhi. Di notte, è attirato dalla luce."
          y: "Vive all’ombra di alberi alti, dove si nutre di insetti.\nDi notte è attirato dalla luce."
        de:
          x: "Seine großen Augen bestehen aus vielen kleinen\nAugen. Nachts wird es von Licht angezogen."
          y: "Dieses Pokémon lebt im Schatten großer Bäume.\nEs frisst Insekten und wird von Licht angezogen."
        es:
          x: "Sus grandes ojos son en realidad grupos de ojos\ndiminutos. Por la noche se siente atraído por la luz."
          y: "Vive entre las sombras de árboles altos, donde come\ninsectos. Por la noche, le atrae la luz."
        ko:
          x: "작은 눈이 많이 모여\n큰 눈을 이루고 있다.\n밤이 되면 불빛을 향해 모여든다."
          y: "커다란 나무 밑에서 살며\n벌레 따위를 먹고 지내는 듯하다.\n밤에는 빛 주위로 찾아온다."
