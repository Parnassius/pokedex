        it:
          x: "Con un dolce aroma dirige il volo dei Volbeat, che\ndisegnano più di 200 figure luminose nel cielo stellato."
          y: "Con il suo dolce aroma dirige il volo di Volbeat,\nche disegna figure luminose nel cielo stellato."
        de:
          x: "Sein süßer Duft leitet Volbeat an,\nüber 200 verschiedene Lichtmuster\nan den Nachthimmel zu malen."
          y: "Sein süßer Duft leitet Volbeat an, Zeichen aus Licht\nan den Nachthimmel zu malen."
        es:
