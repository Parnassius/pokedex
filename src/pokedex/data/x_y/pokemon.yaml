          y: "ふあんていな　いでんしの　おかげで\nさまざまな　しんかの　かのうせいを\nひめている　とくしゅな　ポケモン。"
        jp_kanji:
          x: "進化のとき　姿と　能力が\n変わることで　きびしい　環境に\n対応する　珍しい　ポケモン。"
          y: "不安定な　遺伝子の　おかげで\nさまざまな　進化の　可能性を\n秘めている　特殊な　ポケモン。"
        en:
          x: "A rare Pokémon that adapts to harsh environments\nby taking on different evolutionary forms."
          y: "Thanks to its unstable genetic makeup, this\nspecial Pokémon conceals many different\npossible evolutions."
        fr:
          x: "Un Pokémon rare qui s’adapte aux environnements\nhostiles en variant ses formes évolutives."
          y: "L’ADN de ce Pokémon très particulier recèle de\nnombreuses possibilités d’évolution."
        it:
          x: "Un Pokémon raro che si adatta agli ambienti più\ndifficili assumendo diverse forme nell’evoluzione."
          y: "È un Pokémon molto particolare. Dotato di un corredo\ngenetico instabile, serba in sé le più varie possibilità\nevolutive."
        de:
          x: "Ein seltenes Pokémon, das sich seiner Umgebung\nanpasst, indem es sich in unterschiedliche Formen\nentwickelt."
          y: "Aufgrund einer genetischen Anomalie kann seine\nEntwicklung viele verschiedene Formen annehmen."
        es:
          x: "Un extraño Pokémon que se adapta a los entornos\nmás hostiles gracias a sus diferentes evoluciones."
          y: "Su irregular estructura genética encierra el secreto de\nsu capacidad para adoptar evoluciones de lo más\ndiversas."
        ko:
          x: "진화할 때 모습과 능력이\n바뀜으로써 혹독한 환경에\n적응하는 희귀한 포켓몬이다."
          y: "불안정한 유전자 덕분에\n여러 가지 진화 가능성을\n간직하고 있는 특수한 포켓몬."
