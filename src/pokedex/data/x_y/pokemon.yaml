          y: "せっし　２０００どの　ひのたまを\nうでの　さきから　うちだす。\nくちから　はく　いきも　もえている。"
        jp_kanji:
          x: "腕の　先から　摂氏２０００度の\n火の玉を　発射する。\n火山の　火口を　住処にする。"
          y: "摂氏２０００度の　火の玉を\n腕の　先から　撃ち出す。\n口から　吐く　息も　燃えている。"
        en:
          x: "It blasts fireballs of over 3,600 degrees Fahrenheit\nfrom the ends of its arms. It lives in\nvolcanic craters."
          y: "It blasts fireballs of over 3,600 degrees Fahrenheit\nout of its arms. Its breath also sears and sizzles."
        fr:
          x: "Il projette des boules de feu à 2 000 °C à bout de\nbras. Il vit dans les cratères volcaniques."
          y: "Il projette des boules de feu à 2 000 °C du bout de\nses bras. Même son souffle est brûlant."
        it:
          x: "Spara palle di fuoco di oltre 2000 °C dagli arti\nsuperiori. Vive nei crateri dei vulcani."
          y: "Spara palle di fuoco di oltre 2000 °C dagli arti\nsuperiori. L’aria che espira è incandescente."
        de:
          x: "Aus den Enden seiner Arme schießen Feuerbälle\nmit 2 000 °C. Es lebt in Vulkankratern."
          y: "Es schießt 2 000 °C heiße Feuerbälle aus den Enden\nseiner Arme. Selbst sein Atem steht in Flammen."
        es:
          x: "Sus brazos disparan bolas de fuego de más de\n2000 °C. Vive en cráteres volcánicos."
          y: "Sus brazos disparan bolas de fuego de más de\n2000 °C. El aliento que desprende es abrasador."
        ko:
          x: "팔 끝에서 섭씨 2000도의\n불구슬을 발사한다.\n화산의 분화구를 거처로 삼는다."
          y: "섭씨 2000도의 불구슬을\n팔 끝에서 내보낸다.\n입에서 뿜는 숨도 타오르고 있다."
