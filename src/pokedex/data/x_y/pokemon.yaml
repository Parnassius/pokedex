      descriptions:
        jp_kana:
          x: "ひかりかがやく　ものが　だいすきで\nどうくつの　なかで　みつけた\nたからを　じぶんのすに　ためこむ。"
          y: "すあなを　ひろげるとき　ちちゅうから\nでてきた　ほうせきの　げんせきを\nすに　ためる　しゅうせいを　もつ。"
        jp_kanji:
          x: "光り輝く　ものが　大好きで\n洞窟の　中で　見つけた\n宝を　自分の巣に　ためこむ。"
          y: "巣穴を　広げるとき　地中から\n出てきた　宝石の　原石を\n巣に　ためる　習性を　持つ。"
        en:
          x: "It loves sparkly things. It seeks treasures in caves\nand hoards the loot in its nest."
          y: "As it digs to expand its nest, it habitually digs up\ngems that it then hoards in its nest."
        fr:
          x: "Toujours à la recherche d’objets brillants, il arpente\nles grottes pour constituer son butin."
          y: "Carmache accumule les pierres précieuses qu’il\ndéterre quand il entreprend d’agrandir son nid."
        it:
          x: "Adora gli oggetti luccicanti. Va a caccia di tesori\nnelle grotte e li trasporta nel suo nido."
          y: "Ha l’abitudine di collezionare gemme che trova\nmentre si scava la tana, appositamente ampliata."
        de:
          x: "Es liebt funkelnde Dinge und sucht nach Schätzen\nin Höhlen, die es dann in seinem Nest hortet."
          y: "Die Rohedelsteine, die beim Erweitern seiner Höhle\nzum Vorschein kommen, hortet es in seinem Nest."
        es:
          x: "Le gustan las cosas brillantes. Busca tesoros en\ncuevas y se lleva el botín a su nido."
          y: "Tiende a acumular las gemas en bruto que encuentra\ncuando agranda su guarida."
        ko:
          x: "반짝반짝 빛나는 것을\n아주 좋아하기에 동굴 안에서 발견한\n보물을 자신의 둥지에 모아둔다."
          y: "거처를 늘릴 때 땅속에서\n나온 보석의 원석을\n거처에 모아두는 습성을 가졌다."
