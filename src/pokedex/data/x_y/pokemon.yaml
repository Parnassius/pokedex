        en:
          x: "The magnetic force generated by its body repels\nthe ground’s natural magnetism, letting it float."
          y: "It converses with others by using magnetic pulses.\nIn a swarm, they move in perfect unison."
        fr:
          x: "Il dégage un champ magnétique opposé à celui\nde la terre, ce qui lui permet de léviter."
          y: "Il dialogue avec les siens par impulsions magnétiques.\nEn bande, ils se déplacent à l’unisson."
        it:
          x: "Riesce a fluttuare in aria grazie alla repulsione tra\nle proprie onde magnetiche e quelle della terra."
          y: "Comunica con i suoi simili mediante onde magnetiche.\nI gruppi di Beldum si muovono in perfetta sintonia."
        de:
          x: "Es fliegt, indem es eine magnetische Kraft erzeugt,\ndurch die es der natürlichen Anziehungskraft der\nErde trotzt."
          y: "Es kommuniziert mit anderen durch magnetische\nImpulse. Im Schwarm bilden sie eine perfekte Einheit."
        es:
          x: "Los pulsos magnéticos de su cuerpo repelen la\ngravedad, lo que le permite flotar en el aire."
          y: "Se comunican mediante pulsos magnéticos.\nCuando van en grupos, se mueven al unísono."
        ko:
          x: "몸에서 나오는 자력과\n지상의 자력을\n충돌시켜 하늘에 떠오른다."
          y: "자력의 파장으로 동료와\n대화한다. 무리가 된 메탕은\n한 치의 흐트러짐 없이 움직인다."
