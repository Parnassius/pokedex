          y: "りょうほうの　めが　そんざいしない。\nくちから　ちょうおんぱを　だして\nくらやみを　とびまわる。"
        jp_kanji:
          x: "口から　出す　超音波で\n両目が　なくても\nまわりの　障害物を　察知できる。"
          y: "両方の　目が　存在しない。\n口から　超音波を　出して\n暗闇を　飛び回る。"
        en:
          x: "Even though it has no eyes, it can sense obstacles\nusing ultrasonic waves it emits from its mouth."
          y: "It has no eyes. Instead, it relies on its ultrasonic\ncries for echolocation to flit about in darkness."
        fr:
          x: "Bien que dépourvu d’yeux, il repère les obstacles\ngrâce aux ultrasons émis par sa gueule."
          y: "Comme il ne possède pas d’yeux, il n’utilise que\nses ultrasons pour se déplacer dans les ténèbres."
        it:
          x: "Non ha occhi, ma avverte gli ostacoli con le onde\nultrasoniche che emette dalla bocca."
          y: "Non ha occhi, ma si sposta agilmente nella notte\nemettendo ultrasuoni la cui eco lo avverte degli\nostacoli."
        de:
          x: "Obwohl es keine Augen hat, kann es Hindernisse\nmithilfe von Ultraschallwellen wahrnehmen."
          y: "Es hat keine Augen. Zur Orientierung nutzt es seine\nUltraschallwellen-Schreie, um in der Dunkelheit\nzu fliegen."
        es:
          x: "Aunque carezca de ojos, puede detectar obstáculos\ncon las ondas ultrasónicas que emite su boca."
          y: "No tiene ojos. Se guía por las ondas ultrasónicas que\nemite. El eco le indica por dónde tiene que ir en la\noscuridad."
        ko:
          x: "입에서 내는 초음파로\n두 눈이 없어도 주위의\n장애물을 탐색할 수 있다."
          y: "양쪽 눈이 존재하지 않는다.\n입에서 초음파를 내어\n어둠 속을 날아다닌다."
