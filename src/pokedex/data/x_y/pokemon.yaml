        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: magician
      descriptions:
        jp_kana:
          x: "きのえだを　しっぽに　さしている。\nしっぽの　けの　まさつねつで\nえだに　ひをつけて　たたかう。"
          y: "きのえだを　しっぽから　ひきぬくとき\nまさつで　ちゃっか。えだの　ほのおを\nふって　なかまに　あいずを　おくる。"
        jp_kanji:
          x: "木の枝を　尻尾に　挿している。\n尻尾の　毛の　摩擦熱で\n枝に　火をつけて　戦う。"
          y: "木の枝を　尻尾から　引き抜くとき\n摩擦で　着火。枝の　炎を　振って\n仲間に　合図を　送る。"
        en:
          x: "It has a twig stuck in its tail. With\nfriction from its tail fur, it sets the\ntwig on fire and launches into battle."
          y: "When the twig is plucked from its tail,\nfriction sets the twig alight. The flame\nis used to send signals to its allies."
        fr:
          x: "Il allume la branche plantée dans sa queue en la\nfrottant contre son pelage et s’en sert au combat."
          y: "Quand il saisit la branche plantée dans sa queue,\nelle prend feu par friction. Il peut communiquer avec\nses congénères en agitant ce bâton enflammé."
        it:
          x: "Incendia il ramo che ha infilato nella coda grazie allo\nsfregamento del pelo per poi lanciarsi nella lotta."
          y: "Incendia il rametto che ha nella coda semplicemente\nestraendolo, grazie alla frizione del pelo. Lo usa anche\nper mandare segnali ai suoi compagni."
        de:
          x: "In seinem Schweif steckt ein Zweig, den es bei Bedarf\nmit der Reibungswärme seiner Schweifhaare anzündet\nund im Kampf einsetzt."
          y: "Sein Zweig entzündet sich durch die Reibung, die beim\nHerausziehen aus seinem Schweif entsteht. Mit der\nFlamme sendet es Signale an Kameraden."
        es:
          x: "Tiene una rama enredada en la cola. Cuando la saca,\nla rama prende fuego al hacer fricción con su pelaje\ny se lanza al ataque con ella."
          y: "Al extraer la rama que tiene en la cola, esta prende\ndebido a la fricción. Usa esa rama candente para\nenviar señales a sus compañeros."
        ko:
          x: "나뭇가지를 꼬리에 꽂고 있다.\n꼬리털의 마찰열로\n가지에 불을 붙여 싸운다."
          y: "나뭇가지를 꼬리에서 뽑을 때\n마찰로 불이 붙는다. 나뭇가지의 불꽃을\n흔들어 동료에게 신호를 보낸다."
delphox:
  species_id: 655
  names:
    jp_kana: マフォクシー
    jp_kanji: マフォクシー
    en: Delphox
    fr: Goupelin
    it: Delphox
    de: Fennexis
    es: Delphox
    ko: 마폭시
  forms:
    delphox:
      form_id: 0
      base_stats:
        hp: 75
        attack: 69
        defense: 72
        special_attack: 114
        special_defense: 100
        speed: 104
      evs_yield:
        hp: 0
