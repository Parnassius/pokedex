          x: "Its body is covered with a pure white fur.\nThe colder the weather, the more active\nit becomes."
          y: "Its streamlined body has little drag in water.\nThe colder the temperature, the friskier it gets."
        fr:
          x: "Son corps est recouvert d’une fourrure d’un blanc pur.\nPlus il fait froid, et plus ce Pokémon est actif."
          y: "Son corps hydrodynamique glisse dans l’eau.\nPlus l’eau est froide plus il se sent à l’aise."
        it:
          x: "Ha il corpo ricoperto da una candida pelliccia bianca.\nPiù fa freddo, più questo Pokémon è attivo."
          y: "Il suo corpo affusolato ha poco attrito nell’acqua.\nLe basse temperature lo rendono vivace."
        de:
          x: "Sein Körper ist mit reinem, weißem Fell überzogen.\nJe kälter es wird, desto aktiver wird dieses Pokémon."
          y: "Es verspürt kaum Widerstand im Wasser. Je niedriger\ndie Temperatur, desto verspielter verhält es sich."
        es:
          x: "Está recubierto de un luminoso pelaje blanco. Este\nPokémon aumenta su actividad cuando bajan las\ntemperaturas."
          y: "Su aerodinámico cuerpo avanza fácilmente por el agua.\nCuanto más fría, más diversión."
        ko:
          x: "전신이 새하얀 털로\n뒤덮여 있다. 추위에 강해서\n오히려 추울수록 힘이 넘쳐 난다."
          y: "몸은 물의 저항이\n적은 유선형이다.\n추워질수록 기운이 난다."
grimer:
