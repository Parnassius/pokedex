      descriptions:
        jp_kana:
          x: "ぬかるんだ　あしばでも　しっかり\nあるける　じょうぶな　あしこし。\nどろに　からだを　うめて　ねむる。"
          y: "ドロドロに　ぬかるんだ　あしばで\nせいかつする　うちに　きたえられ\nきょうじんな　あしこしに　なった。"
        jp_kanji:
          x: "ぬかるんだ　足場でも　しっかり\n歩ける　丈夫な　足腰。\n泥に　体を　埋めて　眠る。"
          y: "ドロドロに　ぬかるんだ　足場で\n生活する　うちに　鍛えられ\n強靭な　足腰に　なった。"
        en:
          x: "Its sturdy legs give it sure footing, even in mud.\nIt burrows into dirt to sleep."
          y: "Living on muddy ground that provides poor footing\nhas made its legs sturdy."
        fr:
          x: "Ses jambes robustes lui donnent un bon appui,\nmême dans la boue. Il dort enfoui dans la saleté."
          y: "À force de marcher et de vivre dans la boue,\nson arrière-train est devenu particulièrement robuste."
        it:
          x: "Grazie alle zampe vigorose, si muove con disinvoltura\nanche nel fango. Dorme immerso nella melma."
          y: "Dato che si allena sempre sguazzando nel fango, si\nritrova con due arti inferiori fortissimi."
        de:
          x: "Seine kräftigen Beine geben ihm sicheren Halt.\nEs gräbt sich in Dreck ein, wenn es schlafen will."
          y: "Der zähe Morast seiner Heimat hat seine Beine\ngestählt und ihnen gewaltige Kraft verliehen."
        es:
          x: "Sus piernas robustas impiden que pierda el equilibrio y\ncaiga, incluso en el barro. Duerme bajo la arena."
          y: "Vive en el lodo, lo que contribuye a que sus piernas\nsean extremadamente robustas."
        ko:
          x: "발밑이 질퍽거려도 잘 걸을 수\n있는 튼튼한 다리를 가졌다.\n진흙에 몸을 묻고 잠잔다."
          y: "걸쭉하게 질퍽거리는 땅을\n밟으며 생활하면서 단련되어\n팔다리가 강인해졌다."
swampert:
