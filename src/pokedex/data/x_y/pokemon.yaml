          y: "ブルンゲルの　すみかに　まよいこんだ\nふねは　しずめられて　のりくみいんの\nいのちは　すいとられて　しまうのだ。"
        jp_kanji:
          x: "体の　ほとんどが　海水。\n海底には　ブルンゲルが　沈めた\n船で　できた　城が　あるという。"
          y: "ブルンゲルの　住処に　迷いこんだ\n船は　沈められて　乗組員の　命は\n吸い取られて　しまうのだ。"
        en:
          x: "Its body is mostly seawater. It’s said there’s a\ncastle of ships Jellicent have sunk on the seafloor."
          y: "The fate of the ships and crew that wander into\nJellicent’s habitat: all sunken, all lost, all vanished."
        fr:
          x: "Il est presque entièrement fait d’eau de mer.\nOn dit qu’il vit dans un palais fait des épaves des\nbateaux qu’il a coulés."
          y: "Les bateaux qui s’aventurent sur son territoire\ncoulent, et Moyade aspire l’énergie vitale des marins."
        it:
          x: "È composto per lo più d’acqua marina. Dicono che\nsi sia costruito un castello con i relitti delle navi che\nha affondato."
          y: "Affonda le sfortunate navi che si avventurano nel\nsuo territorio e consuma l’energia dell’equipaggio."
        de:
          x: "Es heißt, am Meeresboden gebe es einen Palast\naus Schiffen, die es versenkt hat. Es besteht fast\nnur aus Meerwasser."
          y: "Dringt ein Schiff in sein Revier ein, bringt es dieses\nzum Kentern und saugt die Lebensenergie aus der\nBesatzung."
        es:
          x: "Su cuerpo se compone de agua salada. Dicen que ha\nconstruido un palacio en el fondo del mar con restos\nde barcos."
          y: "Jellicent hunde los barcos que acaban perdidos en su\nterritorio y absorbe la energía vital de su tripulación."
        ko:
          x: "몸 대부분이 해수다.\n해저에는 탱탱겔이 가라앉힌\n배로 만들어진 성이 있다고 한다."
          y: "탱탱겔의 거처로 길을 잃고\n들어간 배는 가라앉으며 승무원의\n생명이 흡수되어 버린다."
alomomola:
