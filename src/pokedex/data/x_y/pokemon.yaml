      descriptions:
        jp_kana:
          x: "じまんのツノを　あいての　おなかの\nしたに　ねじこみ　いっきに　もちあげ\nぶんなげてしまう　ちからもち。"
          y: "ものすごい　かいりきの　もちぬし。\nじぶんの　たいじゅうの　１００ばいの\nおもさでも　らくに　ぶんなげる。"
        jp_kanji:
          x: "自慢のツノを　相手の　お腹の\n下に　ねじこみ　一気に　持ち上げ\nぶん投げてしまう　力持ち。"
          y: "ものすごい　怪力の　持ち主。\n自分の　体重の　１００倍の\n重さでも　楽に　ぶん投げる。"
        en:
          x: "This powerful Pokémon thrusts its prized horn under\nits enemies’ bellies, then lifts and throws them."
          y: "With its Herculean powers, it can easily throw\naround an object that is 100 times its own weight."
        fr:
          x: "Ce Pokémon est si puissant qu’il peut projeter ses\nennemis en l’air grâce à ses cornes."
          y: "Sa force herculéenne lui permet de soulever et de\njeter plus de 100 fois son poids."
        it:
          x: "Questo potente Pokémon infilza con il corno la pancia\ndel nemico, sollevandolo e lanciandolo lontano."
          y: "La forza erculea gli permette di lanciare oggetti\n100 volte più pesanti di lui."
        de:
          x: "Dieses kräftige Pokémon rammt sein stolzes Horn\nunter den Rumpf des Gegners und wirft ihn um."
          y: "Mit seiner herkulischen Kraft kann es Objekte,\ndie hundertmal sein Körpergewicht haben,\nmühelos umwerfen."
        es:
          x: "Este fuerte Pokémon clava su preciado cuerno en la\ntripa del enemigo, lo eleva y luego lo arroja."
          y: "Tiene una fuerza descomunal. Puede, sin gran\nesfuerzo, arrojar objetos que superen su peso en\ncien veces."
        ko:
          x: "자랑스러운 뿔을 상대의 배\n밑에 틀어박고 단번에 들어 올려\n집어 던지는 천하장사다."
          y: "엄청난 괴력의 소유자.\n자신 체중의 100배나 되는\n무게도 가뿐히 내던진다."
