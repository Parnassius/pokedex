      descriptions:
        jp_kana:
          x: "かんじょうで　かたちが　かわる\nはどうを　だしあって　なかまどうし\nコミュニケーションを　とっている。"
          y: "からだから　はっする　はどうは\nこわいとき　かなしいときに　つよまり\nピンチを　なかまに　つたえる。"
        jp_kanji:
          x: "感情で　形が　変わる\n波動を　だしあって　仲間同士\nコミュニケーションを　とっている。"
          y: "体から　発する　波動は\n怖いとき　悲しいときに　強まり\nピンチを　仲間に　伝える。"
        en:
          x: "It uses the shapes of auras, which change\naccording to emotion, to communicate with others."
          y: "The aura that emanates from its body intensifies to\nalert others if it is afraid or sad."
        fr:
          x: "Il communique avec ses semblables grâce à des\nondes qui sont modulées en fonction de ses\némotions."
          y: "Son aura s’intensifie pour prévenir son entourage\nquand il a peur ou qu’il est triste."
        it:
          x: "Comunica con i suoi simili tramite delle onde che\ncambiano forma a seconda del sentimento che prova."
          y: "L’aura che emana si intensifica per comunicare agli\naltri se è triste o spaventato."
        de:
          x: "Es kommuniziert mit seinen Artgenossen über Wellen,\ndie je nach Gefühlslage eine andere Form annehmen."
          y: "Die Aura, die dieses Pokémon umgibt, verstärkt sich,\nwenn es zeigen will, dass es ängstlich oder traurig ist."
        es:
          x: "Se comunica con los suyos mediante la emisión de\nunas ondas que cambian de forma en función de los\nsentimientos."
          y: "Su aura se intensifica para alertar a otros cuando está\ntriste o tiene miedo."
        ko:
          x: "감정에 따라 모양이 변하는\n파동을 서로 내어 동료끼리\n커뮤니케이션을 취하고 있다."
          y: "몸에서 발산되는 파동은\n무서울 때나 슬플 때에 강해져\n동료에게 위기를 알린다."
lucario:
