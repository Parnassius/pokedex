          x: "If its rage peaks, it becomes so hot that anything\nthat touches it will instantly go up in flames."
          y: "It has a secret, devastating move. It rubs its blazing\nfur together to cause huge explosions."
        fr:
          x: "Quand il est furieux, il devient si chaud que tout\nce qu’il touche s’enflamme instantanément."
          y: "Il a un coup secret dévastateur. En frottant sa fourrure\nardente, il crée une forte explosion."
        it:
          x: "Quando è davvero arrabbiato diventa così caldo\nche qualsiasi cosa tocchi va subito a fuoco."
          y: "Ha una devastante mossa segreta. Può sfregare la\npelliccia infuocata e causare forti esplosioni."
        de:
          x: "Wenn sein Zorn den Zenit übersteigt, wird es so\nheiß, dass alles, was es berührt, in Flammen aufgeht."
          y: "Es verfügt über eine verheerende Geheimattacke.\nEs reibt sein Fell, um Explosionen zu erzeugen."
        es:
          x: "Si su furia crece, se calienta tanto que cualquier cosa\nque toque se prenderá al instante."
          y: "Tiene una habilidad secreta y devastadora. Causa\nexplosiones al frotar su pelaje."
        ko:
          x: "분노가 정점에 달했을 때\n건드린 자를 모두 순식간에\n불태워버릴 정도로 뜨겁다."
          y: "활활 타오르는 털을 문질러\n폭풍을 일으켜서 공격하는\n큰 기술을 감추어 놓고 있다."
