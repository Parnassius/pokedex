          y: "じかんを　こえる　ちからを　つかう。\nへいわな　じだいにだけ\nすがたを　みせると　いわれている。"
        jp_kanji:
          x: "時間を超えて　あちこち　さまよう。\nセレビィが　姿を　現した　森は\n草木が　生い茂るという。"
          y: "時間を　越える　力を　使う。\n平和な　時代にだけ\n姿を　見せると　言われている。"
        en:
          x: "This Pokémon wanders across time. Grass and trees\nflourish in the forests in which it has appeared."
          y: "It has the power to travel across time, but it is said\nto appear only in peaceful times."
        fr:
          x: "Ce Pokémon voyage dans le temps. Les forêts où\nil apparaît deviennent prodigieusement luxuriantes."
          y: "Il a le pouvoir de voyager dans le temps.\nCependant, on dit qu’il n’apparaît qu’en temps de\npaix."
        it:
          x: "Questo Pokémon viaggia attraverso il tempo. Le\nforeste in cui appare prosperano rigogliose."
          y: "Ha il potere di viaggiare attraverso il tempo, ma si\ndice che appaia solo in periodi di pace."
        de:
          x: "Dieses Pokémon reist durch Zeit und Raum.\nBäume und Wiesen wuchern, wenn es in der Nähe ist."
          y: "Es kann durch die Zeit reisen, aber es erscheint nur\nzu friedlichen Zeiten."
        es:
          x: "Este Pokémon vaga por el tiempo. La hierba y los\nárboles crecen por los campos por donde pasa."
          y: "Puede viajar en el tiempo, pero se dice que solo\naparece en tiempos de paz."
        ko:
          x: "시간을 넘어 여기저기를 방황한다.\n세레비가 모습을 나타낸\n숲은 초목이 무성해진다고 한다."
          y: "시간을 초월하는 힘을 사용한다.\n평화스러운 시대에만\n모습을 보인다고 한다."
