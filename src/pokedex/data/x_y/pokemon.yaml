        jp_kana:
          x: "ゆきの　おおい　ちほうに　せいそく。\nじゅもくに　ツメで　サインを　えがき\nなかまに　あいずを　おくる。"
          y: "さむい　ちいきで　くらす　ポケモン。\n４、５ひきの　グループは　みごとな\nれんけいで　えものを　おいつめる。"
        jp_kanji:
          x: "雪の　多い　地方に　生息。\n樹木に　ツメで　サインを　描き\n仲間に　合図を　送る。"
          y: "寒い　地域で　暮らす　ポケモン。\n４、５匹の　グループは　見事な\n連係で　獲物を　追いつめる。"
        en:
          x: "It lives in snowy regions. It carves patterns in trees\nwith its claws as a signal to others."
          y: "They live in cold regions, forming groups of four or\nfive that hunt prey with impressive coordination."
        fr:
          x: "Il vit dans les régions enneigées, et communique avec\nses pairs en gravant des motifs sur les arbres."
          y: "Ils vivent par groupe de 4 ou 5 en région froide et\nchassent de façon très organisée."
        it:
          x: "Il suo habitat sono le grandi aree innevate. Con gli\nartigli, incide sui tronchi segnali per i suoi simili."
          y: "Questi Pokémon vivono in zone fredde in gruppi di\nquattro o cinque. Insieme sono cacciatori abilissimi."
        de:
          x: "Es lebt in schneereichen Gebieten. Snibunna senden\neinander Signale, indem sie Zeichen in Rinde ritzen."
          y: "Es lebt in kalten Gebieten in Gruppen von\nvier oder fünf Pokémon, die bei der Jagd\ngroßes Geschick zeigen."
        es:
          x: "Vive en zonas nevadas. Deja marcas en los árboles\ncon sus garras para comunicarse con sus compañeros."
          y: "Viven en zonas frías y forman grupos de cuatro o\ncinco para cazar con gran coordinación."
        ko:
          x: "눈이 많은 지방에 서식한다.\n수목에 발톱으로 사인을 그려\n동료에게 신호를 보낸다."
          y: "추운 지역에서 사는 포켓몬이다.\n4, 5마리의 그룹은 훌륭한\n연계 작전으로 먹이를 몰아넣는다."
magnezone:
