          x: "とても　わすれっぽい　ポケモンで\nトレーナーに　めいれい　されたのに\nあたらしい　めいれいを　まっている。"
          y: "まちなかで　くらしている　ポケモン。\nひとなつっこいので　こうえんや\nひろばに　たくさん　あつまってくる。"
        jp_kanji:
          x: "とても　忘れっぽい　ポケモンで\nトレーナーに　命令　されたのに\n新しい　命令を　待っている。"
          y: "街中で　暮らしている　ポケモン。\n人懐っこいので　公園や　広場に\nたくさん　集まってくる。"
        en:
          x: "This very forgetful Pokémon will wait for a new\norder from its Trainer even though it already\nhas one."
          y: "These Pokémon live in cities. They are accustomed\nto people. Flocks often gather in parks and plazas."
        fr:
          x: "Un Pokémon très distrait qui oublie les ordres de son\nDresseur et reste planté à en attendre de nouveaux."
          y: "Ces Pokémon vivent en ville. Ils sont peu farouches\net se regroupent souvent dans les parcs ou sur\nles places."
        it:
          x: "È un Pokémon un po’ smemorato. A volte dimentica\nl’ordine appena ricevuto e allora aspetta di riceverne\nun altro."
          y: "Pokémon che vive in città. Si affeziona facilmente\nalle persone, perciò non è strano trovarlo in parchi\no piazze."
        de:
          x: "Wartet oft vergeblich auf Anweisungen,\nobwohl es bereits einen Befehl erhalten hat.\nEin sehr zerstreutes Pokémon."
          y: "Ein Pokémon, das in der Stadt zu Hause ist. Es ist\nsehr zutraulich und bevölkert in Scharen öffentliche\nPlätze und Parks."
        es:
          x: "Es un Pokémon muy despistado. Aunque reciba\nórdenes de su Entrenador, se le olvidan, y se queda\nesperando."
          y: "Vive en la ciudad, pues se lleva muy bien con la gente.\nLe encantan los parques y las plazas, donde se reúne\ncon otros."
        ko:
          x: "매우 건망증이 심한 포켓몬으로\n트레이너에게 명령을 받았어도\n새로운 명령을 기다리고 있다."
          y: "거리에 사는 포켓몬이다.\n사람을 잘 따라서 공원이나\n광장에 많이 모인다."
tranquill:
