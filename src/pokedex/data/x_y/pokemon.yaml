          y: "すむ　ばしょの　かんきょうに　よって\nからだの　かたちや　いろが\nへんか　しやすい　ポケモンだ。"
        jp_kanji:
          x: "やわらかい　体を　強く押すと\n紫色の　ナゾの　液体が\nにじみ出るので　要注意。"
          y: "住む　場所の　環境に　よって\n体の　形や　色が\n変化しやすい　ポケモンだ。"
        en:
          x: "Beware of pushing strongly on its squishy body,\nas it makes a mysterious purple fluid ooze out."
          y: "Its shape and coloration vary, depending on\nits habitat."
        fr:
          x: "Un étrange liquide mauve s’échappe de son corps,\nne lui appuyez pas dessus."
          y: "Il change facilement de couleur ou de forme en\nfonction de son environnement."
        it:
          x: "Se si esercita una forte pressione sul suo corpo,\nne fuoriesce un misterioso liquido viola."
          y: "Cambia facilmente aspetto e colore secondo il luogo\ndi provenienza."
        de:
          x: "Nicht seinen Körper zusammendrücken,\nsonst sickert eine seltsame lilafarbene Flüssigkeit aus!"
          y: "Form und Farbe dieses Pokémon ändern sich\nje nach der Umgebung, in der es lebt."
        es:
          x: "No hay que apretarle muy fuerte, ya que, si lo haces,\nsecreta un misterioso fluido morado."
          y: "Shellos adapta la forma y color de su cuerpo\ndependiendo del lugar en donde viva."
        ko:
          x: "부드러운 몸을 강하게 누르면\n보랏빛이 나는 정체불명의 액체가\n배어 나오므로 주의가 필요하다."
          y: "사는 장소의 환경에 따라\n몸의 모양과 색깔이\n변화하기 쉬운 포켓몬이다."
