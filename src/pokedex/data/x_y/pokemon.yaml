      descriptions:
        jp_kana:
          x: "ぜんしんが　ヌルヌルの　たいえきで\nおおわれているため　つかまっても\nぬるりと　ぬけだすことが　できる。"
          y: "ヒゲは　ゆうしゅうな　レーダー。\nにごった　みずの　なかでも　ヒゲを\nつかって　エサを　みつけだす。"
        jp_kanji:
          x: "全身が　ヌルヌルの　体液で\n覆われているため　捕まっても\nぬるりと　抜け出すことが　できる。"
          y: "ヒゲは　優秀な　レーダー。\n濁った　水の　中でも　ヒゲを　使って\nエサを　見つけ出す。"
        en:
          x: "It coats its entire body with a slimy fluid so it can\nsquirm and slip away if grabbed."
          y: "Its whiskers make a superb radar. They are used to\nlocate prey, even in the murkiest of water."
        fr:
          x: "Il enduit son corps d’une substance visqueuse pour\nglisser et se libérer quand on l’agrippe."
          y: "Ses barbillons font un excellent radar qui lui permet\nde repérer ses proies, même en eau trouble."
        it:
          x: "Il suo corpo è ricoperto da una pellicola viscida,\nche gli permette di sgusciare via, se afferrato."
          y: "I suoi baffi sono un eccellente radar. Possono\nlocalizzare le prede persino nelle acque più torbide."
        de:
          x: "Es bedeckt seinen Körper mit einer schleimigen\nSubstanz und kann sich so aus Umklammerungen\nwinden."
          y: "Seine Barthaare sind ein hervorragendes Radar.\nMit ihnen spürt es selbst in Dreckwasser Beute auf."
        es:
          x: "Recubre su cuerpo de una película viscosa que le\npermite escapar si alguien lo agarra."
          y: "Sus bigotes le sirven de radar para localizar a sus\npresas, incluso en las aguas más turbias."
        ko:
          x: "전신이 미끈미끈한 체액으로\n덮여있기 때문에 잡아도\n미끈하게 빠져나갈 수 있다."
          y: "수염은 우수한 레이더다.\n탁해진 물속에서도 수염을\n써서 먹이를 찾아낸다."
whiscash:
