          y: "いつも　たいぼくや　いしを　かじって\nじょうぶな　まえばを　けずっている。\nみずべに　すを　つくり　くらす。"
        jp_kanji:
          x: "なにごとにも　動じない\n図太い　神経の　持ち主。\n見かけの　割には　機敏に　活動する。"
          y: "いつも　大木や　石を　かじって\n丈夫な　前歯を　削っている。\n水辺に　巣を　作り　暮らす。"
        en:
          x: "With nerves of steel, nothing can perturb it. It is\nmore agile and active than it appears."
          y: "It constantly gnaws on logs and rocks to whittle\ndown its front teeth. It nests alongside water."
        fr:
          x: "Rien ne peut perturber ses nerfs d’acier. Il est plus\nagile et énergique qu’il n’y paraît."
          y: "Il ronge constamment des troncs et des pierres pour\nse faire les incisives. Il niche le long de l’eau."
        it:
          x: "Ha i nervi d’acciaio e niente può turbarlo. È più agile\ne attivo di quanto sembri."
          y: "Rosicchia continuamente legno e rocce per affilare\ni denti anteriori. Nidifica vicino all’acqua."
        de:
          x: "Es hat Nerven wie Drahtseile, nichts kann es\nerschüttern. Es ist agiler und aktiver, als es scheint."
          y: "Es knabbert ständig an Holz und Steinen, um seine\nVorderzähne zu kürzen. Es nistet am Wasser."
        es:
          x: "Tiene nervios de acero y nada puede perturbarlo.\nEs más ágil y activo de lo que aparenta."
          y: "Roe constantemente los troncos y las rocas para\nlimarse los dientes. Anida cerca del agua."
        ko:
          x: "어떤 것에도 동요하지 않는\n대담한 신경의 소유자다.\n보기보다는 기민하게 활동한다."
          y: "항상 큰 나무나 돌을 갉아서\n튼튼한 앞니를 갈아내고 있다.\n물가에 둥지를 만들어 산다."
bibarel:
