          y: "ひふが　とても　うすいので\nひかりに　てらされると　けつえきが\nあたためられて　よわってしまう。"
        jp_kanji:
          x: "地下１メートルくらいを　掘りすすみ\n木の根っこなどを　かじって　生きる。\nたまに　地上に　顔を出す。"
          y: "皮膚が　とても　薄いので\n光に　照らされると　血液が\n温められて　弱ってしまう。"
        en:
          x: "Lives about one yard underground where it feeds\non plant roots. It sometimes appears aboveground."
          y: "Its skin is very thin. If it is exposed to light,\nits blood heats up, causing it to grow weak."
        fr:
          x: "Il vit à 1 m sous la terre et se nourrit de racines.\nIl apparaît rarement à la surface."
          y: "Son épiderme est très fin. S’il est exposé au soleil,\nson sang se réchauffe, ce qui l’affaiblit."
        it:
          x: "Vive un metro sotto terra, dove si nutre di radici.\nTalvolta compare in superficie."
          y: "La sua pelle è sottilissima. Se si espone alla luce,\nil sangue si riscalda, indebolendolo."
        de:
          x: "Dieses Pokémon lebt 1 m unter der Erde.\nEs frisst Wurzeln und kommt selten an die Oberfläche."
          y: "Seine Haut ist sehr dünn. Wird es Sonnenlicht\nausgesetzt, erhitzt sich sein Blut und es wird schwach."
        es:
          x: "Vive un metro por debajo del suelo, donde se alimenta\nde raíces. También aparece en la superficie."
          y: "Su piel es muy fina. Si se expone a la luz, su sangre\nse calienta y su crecimiento se debilita."
        ko:
          x: "지하 1m 정도를 파고들어 가서\n나무뿌리 등을 씹어 먹고 산다.\n가끔 지상으로 얼굴을 내민다."
          y: "피부가 매우 얇아서\n빛을 쪼이게 되면 혈액이\n데워져 약해진다."
dugtrio:
