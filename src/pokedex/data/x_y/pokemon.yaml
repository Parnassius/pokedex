      descriptions:
        jp_kana:
          x: "オスは　あたまの　かざりを　ゆらして\nあいてを　いかくする。メスの　ひこう\nのうりょくは　オスを　うわまわる。"
          y: "オスは　あたまに　かざりを　もつ。\nトレーナー　いがいの　ひとには\nけっして　なつかない　せいしつ。"
        jp_kanji:
          x: "オスは　頭の　飾りを　揺らして\n相手を　威嚇する。\nメスの　飛行能力は　オスを　上回る。"
          y: "オスは　頭に　飾りを　持つ。\nトレーナー　以外の　人には\nけっして　懐かない　性質。"
        en:
          x: "Males swing their head plumage to threaten\nopponents. The females’ flying abilities surpass\nthose of the males."
          y: "Males have plumage on their heads. They will never\nlet themselves feel close to anyone other than\ntheir Trainers."
        fr:
          x: "Le mâle intimide ses ennemis avec ses caroncules.\nLa femelle vole mieux que le mâle."
          y: "Ils sont très farouches et ne s’attachent qu’à leur\nDresseur. Les mâles ont une parure sur la tête."
        it:
          x: "Il maschio minaccia il nemico facendo ondeggiare gli\nornamenti del capo. La femmina eccelle nel volo."
          y: "Il maschio ha una decorazione sulla fronte. Per indole,\nnon si affeziona a nessuno tranne l’Allenatore."
        de:
          x: "Männchen schrecken Gegner ab, indem sie ihren\nKopfschmuck schütteln. Weibchen verfügen über\nbessere Flugfertigkeiten."
          y: "Männliche Exemplare tragen eine Verzierung am Kopf.\nLässt sich von Natur aus nur auf seinen Trainer ein."
        es:
          x: "El macho amenaza al enemigo meciendo el adorno de\nsu cabeza. Al volar, la hembra es mucho más diestra\nque el macho."
          y: "El macho hace gala de ornamentación en la cabeza.\nNo es dado a hacerse amigo de alguien que no sea\nsu Entrenador."
        ko:
          x: "수컷은 머리의 장식을 흔들어서\n상대를 위협한다. 암컷의 비행\n능력은 수컷을 뛰어넘는다."
          y: "수컷은 머리에 장식이 있다.\n트레이너가 아닌 사람은\n절대 따르지 않는 성질을 가졌다."
blitzle:
