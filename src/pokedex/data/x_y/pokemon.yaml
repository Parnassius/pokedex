          y: "まぶしい　ひかりを　はなって\nあいての　めを　くらませ　うごけない\nあいだに　まるのみに　してしまう。"
        jp_kanji:
          x: "深海を　泳ぐ　ランターンの\n明かりは　水面まで　届く。\n深海の星　と　呼ばれている。"
          y: "まぶしい　光を　放って\n相手の　目を　くらませ　動けない\nあいだに　まるのみに　してしまう。"
        en:
          x: "Lanturn’s light can shine up from great depths.\nIt is nicknamed “The Deep-Sea Star.”"
          y: "It blinds prey with an intense burst of light.\nWith the prey incapacitated, the Pokémon\nswallows it in a single gulp."
        fr:
          x: "La lumière de Lanturn surgit des profondeurs.\nOn le surnomme « étoile des profondeurs »."
          y: "Il aveugle sa proie avec une lumière intense, puis\nl’avale d’un seul trait une fois immobilisée."
        it:
          x: "La sua luce è visibile anche quando si trova in\nprofondità. È soprannominato “Stella degli abissi”."
          y: "Acceca la preda con un’intensa ondata di luce,\nimmobilizzandola, per poi ingoiarla in un sol boccone."
        de:
          x: "Lanturns Licht kann aus großen Tiefen heraufscheinen.\nMan nennt es auch „Tiefseestern“."
          y: "Es blendet seine Beute mit einem starken Blitz und\nverschlingt die gelähmte Beute mit einem Schluck."
        es:
          x: "La luz de Lanturn se puede ver desde lo más\nprofundo. Se le llama la Estrella de Alta Mar."
          y: "Ciega a su presa con una luz intensa y luego se la\ntraga de un solo bocado."
        ko:
          x: "심해를 헤엄치는 랜턴의\n불빛은 수면까지 다다른다.\n심해의 별이라고 불리고 있다."
          y: "눈부신 빛을 발산하여 상대의 눈을\n안 보이게 만들어 움직이지 못하는\n동안에 통째로 삼켜버린다."
pichu:
