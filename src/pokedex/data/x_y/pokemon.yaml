        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - fire
        - psychic
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: magician
      descriptions:
        jp_kana:
          x: "つえの　せんたんで　もえる　ほのおを\nみつめて　せいしんとういつすると\nみらいの　できごとを　みとおせる。"
          y: "せっし３０００どの　ほのおの　うずを\nちょうのうりょくで　あやつる。\nてきを　うずで　つつみ　やきつくす。"
        jp_kanji:
          x: "杖の　先端で　燃える　炎を　見つめて\n精神統一すると\n未来の　出来事を　見通せる。"
          y: "摂氏３０００度の　炎の　渦を\n超能力で　操る。\n敵を　渦で　包み　焼きつくす。"
        en:
          x: "It gazes into the flame at the tip of\nits branch to achieve a focused state,\nwhich allows it to see into the future."
          y: "Using psychic power, it generates a\nfiery vortex of 5,400 degrees Fahrenheit,\nincinerating foes swept into this whirl of flame."
        fr:
          x: "Peut prédire l’avenir s’il se concentre en fixant\nla flamme qui danse au bout de sa canne."
          y: "Ses pouvoirs psychiques lui permettent de créer\ndes tourbillons de flammes à 3 000 °C qui\nenveloppent et consument ses ennemis."
        it:
          x: "Fissando la fiamma del ramo che ha in mano, aumenta\nal massimo la concentrazione e può predire il futuro."
          y: "Grazie ai suoi poteri psichici, può generare un vortice\ndi fiamme a 3000 °C con il quale avvolge i nemici\ne li incenerisce."
        de:
          x: "Es kann die Zukunft vorhersehen, indem es\nkonzentriert in die Flamme an der Spitze\nseines Zweiges blickt."
          y: "Mit seinen übernatürlichen Kräften kontrolliert es einen\n3 000 °C heißen Flammenwirbel, mit dem es seine\nGegner umhüllt und sie verbrennt."
        es:
          x: "Fija la mirada en la llama que arde en la punta de su\nbastón para concentrarse y prever sucesos que\ntienen lugar en el futuro."
          y: "Sus poderes psíquicos le permiten controlar vórtices\nde fuego a 3000 °C que envuelven y calcinan a sus\nenemigos."
        ko:
          x: "지팡이 끝의 타오르는 불꽃을\n바라보며 정신을 통일하면\n미래에 일어날 일을 내다볼 수 있다."
          y: "섭씨 3000도의 불꽃 소용돌이를\n초능력으로 조종한다.\n적을 소용돌이로 감싸 불태운다."
froakie:
  species_id: 656
  names:
    jp_kana: ケロマツ
    jp_kanji: ケロマツ
    en: Froakie
    fr: Grenousse
    it: Froakie
    de: Froxy
    es: Froakie
    ko: 개구마르
  forms:
    froakie:
      form_id: 0
      base_stats:
        hp: 41
        attack: 56
        defense: 40
        special_attack: 62
        special_defense: 44
