          y: "トルネロスの　しっぽから　ふきだした\nエネルギーが　おおあらしを　おこす。\nみんかを　ふきとばす　パワー。"
        jp_kanji:
          x: "雲のような　エネルギー体に\n下半身が　包まれている。\n時速３００キロで　空を　飛ぶ。"
          y: "トルネロスの　尻尾から　噴き出した\nエネルギーが　大嵐を　起こす。\n民家を　吹き飛ばす　パワー。"
        en:
          x: "The lower half of its body is wrapped in a cloud of\nenergy. It zooms through the sky at 200 mph."
          y: "Tornadus expels massive energy from its tail,\ncausing severe storms. Its power is great enough\nto blow houses away."
        fr:
          x: "Le bas de son corps est entouré d’une masse\nd’énergie semblable à un nuage. Il vole dans le ciel\nà 300 km/h."
          y: "L’énergie dégagée par sa queue provoque d’énormes\ntempêtes dont la force peut renverser des maisons."
        it:
          x: "Ha la parte inferiore del corpo avvolta in una nuvola\ndi energia. Sfreccia nei cieli a 300 km/h."
          y: "L’energia sprigionata dalla coda di Tornadus provoca\nuna violenta tempesta in grado di spazzare via le case."
        de:
          x: "Sein Unterkörper ist in eine wolkenartige\nEnergieschicht gehüllt. Es jagt mit\nbis zu 300 km/h durch die Lüfte."
          y: "Mit der Energie aus seiner Rute erzeugt es wilde\nStürme, die stark genug sind, um ganze Wohnhäuser\ndavonzuwehen."
        es:
          x: "La parte inferior de su cuerpo, similar a una nube, está\nrecubierta de un campo de energía. Vuela a 300 km/h."
          y: "La energía que desprende de su cola genera violentas\ntempestades capaces de echar abajo casas."
        ko:
          x: "구름처럼 생긴 에너지체에\n하반신이 둘러싸여 있다.\n시속 300km로 하늘을 난다."
          y: "토네로스의 꼬리에서 뿜어져 나온\n에너지가 큰 폭풍을 일으킨다.\n민가를 날려버릴 정도의 힘이다."
