          y: "モンスターボール　そっくりの\nもようで　ポケモンを　さそいこみ\nどくのほうしを　ふきかけてくる。"
        jp_kanji:
          x: "モンスターボールに　似た　模様で\n誘い　毒胞子を　吹きかける。\nなぜ　似ているかは　ナゾである。"
          y: "モンスターボール　そっくりの\n模様で　ポケモンを　誘いこみ\n毒の胞子を　吹きかけてくる。"
        en:
          x: "It lures people in with its Poké Ball pattern, then\nreleases poison spores. Why it resembles a\nPoké Ball is unknown."
          y: "It lures Pokémon with its pattern that looks just like\na Poké Ball, then releases poison spores."
        fr:
          x: "Grâce à sa ressemblance mystérieuse avec une\nPoké Ball, il attire ses ennemis et relâche des spores\nempoisonnées."
          y: "Son apparence de Poké Ball trompe ses ennemis,\nqu’il étourdit à l’aide de ses spores empoisonnées."
        it:
          x: "Simile a una Poké Ball, adesca i nemici e sparge\nspore velenose. Da dove venga questa somiglianza\nè un vero mistero."
          y: "Attira a sé altri Pokémon con la sua forma a\nPoké Ball e soffia su di loro le sue spore velenose."
        de:
          x: "Fällt ein Trainer auf sein Äußeres herein,\ndas komischerweise einem Pokéball ähnelt,\nbesprüht es ihn mit Giftsporen."
          y: "Es ist gemustert wie ein Pokéball. Es lockt damit\nandere Pokémon an, um sie dann mit Giftsporen\nzu besprühen."
        es:
          x: "Gracias a su misterioso parecido a una Poké Ball, atrae\na sus presas y lanza rápidamente esporas de veneno."
          y: "Atraen a otros Pokémon gracias a su similitud con una\nPoké Ball y los atacan expulsando esporas venenosas."
        ko:
          x: "몬스터볼을 닮은 무늬로\n유인한 후 독 포자를 뿌려댄다.\n왜 닮았는지는 불가사의다."
          y: "몬스터볼과 똑 닮은\n무늬로 포켓몬을 유인해\n독 포자를 뿌린다."
