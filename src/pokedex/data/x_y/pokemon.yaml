          y: "なかまたちと　おしくらまんじゅうを\nやることで　がまんづよく　そだつ。\nあまい　くだものが　だいこうぶつ。"
        jp_kanji:
          x: "群れで　行動する　習性。\n眠る　ときは　洞窟の　中で\n仲間たちと　体を　寄せ合う。"
          y: "仲間たちと　おしくらまんじゅうを\nやることで　我慢強く　育つ。\n甘い　果物が　大好物。"
        en:
          x: "It tends to move in a pack with others. They cluster\nin a tight group to sleep in a cave."
          y: "It grows strong by pushing up against others en\nmasse. It loves eating sweet fruit."
        fr:
          x: "Okéoké adore se déplacer en groupe.\nIls se réunissent souvent pour dormir la nuit dans les\ncavernes."
          y: "Il se muscle en bousculant ses semblables lors de\nmêlées. Il raffole des fruits sucrés."
        it:
          x: "Tendono a spostarsi in gruppo. Anche per dormire\nsi stringono fra loro, nelle grotte."
          y: "Questi Pokémon si allenano in gruppo caricandosi\nl’un l’altro per rafforzarsi. Amano i frutti dolci."
        de:
          x: "Es zieht normalerweise im Rudel umher.\nZum Schlafen drängen sie sich ganz eng\nin einer Höhle zusammen."
          y: "Es wird stärker, indem es andere ständig anrempelt.\nEs liebt Süßigkeiten."
        es:
          x: "Suelen ir en grupo y a la hora de dormir se resguardan\nen una cueva."
          y: "Se fortalecen empujándose unos a otros en grupos.\nLes encantan los dulces."
        ko:
          x: "무리를 지어 행동하는 습성이 있다.\n잠들 때는 동굴 안에서\n동료들과 서로 몸을 붙인다."
          y: "동료들과 밀어내기 놀이를 하면서\n인내심이 강한 성격으로 자란다.\n달콤한 과일을 매우 좋아한다."
snorunt:
