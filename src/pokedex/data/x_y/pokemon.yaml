      descriptions:
        jp_kana:
          x: "つめたい　こがらしを　ふせぐため\nこえだや　おちばを　ざいりょうに\nミノを　つくり　からだを　おおう。"
          y: "たたかいで　ミノが　こわれてしまうと\nちかくにある　ざいりょうで\nミノを　すぐに　つくりなおす。"
        jp_kanji:
          x: "冷たい　木枯らしを　防ぐため\n小枝や　落ち葉を　材料に\nミノを　作り　体を　覆う。"
          y: "戦いで　ミノが　壊れてしまうと\n近くにある　材料で\nミノを　すぐに　作り直す。"
        en:
          x: "To shelter itself from cold, wintry winds, it covers\nitself with a cloak made of twigs and leaves."
          y: "If its cloak is broken in battle, it quickly remakes\nthe cloak with materials nearby."
        fr:
          x: "Pour se protéger des vents glacés de l’hiver, il s’est\ntissé une cape de feuilles et de brindilles."
          y: "S’il perd sa cape au combat, il en tisse rapidement\nune nouvelle avec ce qui lui tombe sous la main."
        it:
          x: "Per ripararsi dal freddo e dai venti invernali si copre\ncon un manto fatto di rami e foglie."
          y: "Se il suo manto si rompe mentre lotta, lo rifà\nvelocemente con ciò che trova attorno a sé."
        de:
          x: "Um sich vor dem eisigen Winterwind zu schützen,\nlegt es sich unter einen Umhang aus Ästen und Laub."
          y: "Wird sein Umhang im Kampf zerstört, macht es sich\nschnell aus dem, was es findet, einen neuen."
        es:
          x: "Para protegerse de los vientos fríos invernales, se\ncubre con un caparazón de ramas y hojas."
          y: "Si su caparazón se rompe en combate, lo rehace\nrápidamente con lo que tenga a mano."
        ko:
          x: "차가운 초겨울 바람을 막으려고\n작은 가지나 낙엽을 재료로\n도롱이를 만들어 몸을 감싼다."
          y: "싸움으로 도롱이가 부서져 버리면\n가까이 있는 재료로\n도롱이를 바로 만들어 고친다."
