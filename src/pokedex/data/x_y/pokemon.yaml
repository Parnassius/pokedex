      descriptions:
        jp_kana:
          x: "ねらいは　せいかく。ふきだす　みずは\n１００メートルさきで　うごく\nえものに　かならず　めいちゅうする。"
          y: "きゅうばんの　ように　へんかした\nせびれで　マンタインに　くっつき\nたべのこしを　わけてもらっている。"
        jp_kanji:
          x: "ねらいは　正確。噴き出す　水は\n１００メートル先で　動く　獲物に\nかならず　命中する。"
          y: "吸盤の　ように　変化した\n背びれで　マンタインに　くっつき\n食べ残しを　分けてもらっている。"
        en:
          x: "It has superb accuracy. The water it shoots out can\nstrike moving prey from more than 300 feet away."
          y: "Using its dorsal fin as a suction pad, it clings to a\nMantine’s underside to scavenge for leftovers."
        fr:
          x: "Il est très précis quand il crache ses jets d’eau.\nIl peut toucher une cible mouvante à 100 m."
          y: "Se servant de sa nageoire dorsale, il s’accroche sous\nun Démanta pour récupérer ses restes."
        it:
          x: "La sua precisione è straordinaria. Può colpire una\npreda in movimento anche a più di 100 m."
          y: "Usando la pinna dorsale come una ventosa, s’attacca\nalla pancia di un Mantine cibandosi dei suoi avanzi."
        de:
          x: "Es ist äußerst präzise. Es kann mit seinem\nWasserschuss Beute erlegen, die 100 m entfernt ist."
          y: "Mit seiner Rückenflosse saugt es sich an der\nUnterseite eines Mantax fest und lebt von\nSpeiseresten."
        es:
          x: "Tiene muy buena puntería. Dispara agua a sus presas,\nhasta si se están moviendo, a más de 100 metros."
          y: "Usando su aleta dorsal para succionar, se une a un\nMantine para buscar restos de comida."
        ko:
          x: "조준이 정확하다. 뿜어낸 물은\n100m 앞에서 움직이는\n먹이를 반드시 명중시킨다."
          y: "빨판처럼 변화한\n등지느러미로 만타인에게 달라붙어\n먹다 남은 것을 얻어먹고 있다."
