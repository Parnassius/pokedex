          y: "こおりで　できた　りっぱな　キバ。\nひょうがきが　おわり　あたたかく\nなったため　かずが　へってしまった。"
        jp_kanji:
          x: "１万年前の　氷の　下から\n発見された　ことも　あるほど\n大昔から　いた　ポケモン。"
          y: "氷で　できた　立派な　キバ。\n氷河期が　終わり　暖かく\nなったため　数が　減ってしまった。"
        en:
          x: "A frozen Mamoswine was dug from ice dating back\n10,000 years. This Pokémon has been around a\nlong, long, long time."
          y: "Its impressive tusks are made of ice. The population\nthinned when it turned warm after the ice age."
        fr:
          x: "Un Pokémon si vieux qu’on l’a découvert sous\ndes glaces vieilles de 10 000 ans."
          y: "Ses défenses spectaculaires sont glacées. Il a failli\ndisparaître dans la canicule suivant l’ère glaciaire."
        it:
          x: "Un Pokémon antico al punto che ne sono stati ritrovati\ndegli esemplari tra i ghiacci di 10.000 anni fa."
          y: "Ha enormi zanne di ghiaccio. La popolazione di\nquesto Pokémon è diminuita alla fine dell’era glaciale."
        de:
          x: "Es existiert schon seit Urzeiten. Mamutel wurde\nsogar schon in 10 000 Jahre altem Eis gefunden."
          y: "Die beeindruckenden Stoßzähne dieser Pokémon sind\naus Eis. Nach der Eiszeit nahm ihre Population ab."
        es:
          x: "Ya existía en la antigüedad. Se encontró uno bajo\nhielo de hace más de 10 000 años."
          y: "Sus impresionantes colmillos están hechos de hielo.\nSu población se redujo tras la glaciación."
        ko:
          x: "1만 년 전의 얼음 밑에서\n발견된 적이 있을 정도로\n오랜 옛날부터 있었던 포켓몬이다."
          y: "얼음으로 만들어진 훌륭한 이빨이\n있다. 빙하기가 끝나고 따뜻해졌기\n때문에 수가 줄어들었다."
