          y: "くうきよりも　かるい　ガスを\nからだに　ためて　うかんでいる。\nガスは　くさいうえに　ばくはつする。"
        jp_kanji:
          x: "薄い　バルーン状の　体に\n猛毒の　ガスが　つまっている。\n近くに　来ると　くさい。"
          y: "空気よりも　軽い　ガスを\n体に　ためて　浮かんでいる。\nガスは　くさい上に　爆発する。"
        en:
          x: "Its thin, balloon-like body is inflated by horribly\ntoxic gases. It reeks when it is nearby."
          y: "Lighter-than-air gases in its body keep it aloft.\nThe gases not only smell, they are also explosive."
        fr:
          x: "Son corps très fin en forme de ballon est rempli\nd’un horrible gaz toxique. L’air est nauséabond à\nproximité de ce Pokémon."
          y: "Il flotte en retenant des gaz plus légers que l’air.\nCeux-ci sont explosifs, en plus d’être fétides."
        it:
          x: "Il suo corpo fatto a pallone è pieno di orribili sostanze\ngassose, che emanano un puzzo disgustoso."
          y: "Fluttua a mezz’aria grazie ai gas che ha in corpo.\nQuesti sono maleodoranti e altamente esplosivi."
        de:
          x: "Sein dünner, ballonartiger Körper ist mit\nschrecklichem Giftgas gefüllt. Es verbreitet einen\nheftigen Gestank, wenn es in der Nähe ist."
          y: "Gase, die leichter als Luft sind, lassen es schweben.\nDiese Gase stinken und sind explosiv."
        es:
          x: "Tiene forma de globo y es muy ligero. Está compuesto\npor gases tóxicos y apesta."
          y: "Los gases de su cuerpo le permiten flotar. Estos\ngases, además de oler mal, también son explosivos."
        ko:
          x: "얇고 풍선 같은 몸에\n맹독 가스가 차있다.\n가까이 오면 역겨운 냄새가 난다."
          y: "공기보다도 가벼운 가스를\n몸에 모아서 떠 있다. 가스는\n냄새나는 데다가 폭발도 한다."
weezing:
