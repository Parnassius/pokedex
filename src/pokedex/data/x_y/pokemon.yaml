      types:
        - ghost
        - grass
      egg_groups:
        - grass
        - amorphous
      abilities:
        - natural_cure
        - frisk
      hidden_ability: harvest
      descriptions:
        jp_kana:
          x: "くさった　きりかぶに　たましいが\nやどり　ポケモンに　なった。\nひとの　よりつかない　もりに　すむ。"
          y: "もりで　さまよい　しんだ　こどもの\nたましいが　きりかぶに　やどり\nポケモンになったと　いわれている。"
        jp_kanji:
          x: "腐った　切り株に　魂が　宿り\nポケモンに　なった。\n人の　寄りつかない　森に　住む。"
          y: "森で　さまよい　死んだ\n子供の　魂が　切り株に　宿り\nポケモンになったと　言われている。"
        en:
          x: "These Pokémon are created when\nspirits possess rotten tree stumps.\nThey prefer to live in abandoned forests."
          y: "According to old tales, these Pokémon are\nstumps possessed by the spirits of\nchildren who died while lost in the forest."
        fr:
          x: "Ce Pokémon apparaît lorsqu’un esprit possède\nun arbre en décomposition. Il vit dans les forêts où\nles humains n’osent pas s’aventurer."
          y: "D’après la légende, cette espèce de Pokémon aurait\nvu le jour quand des âmes d’enfants perdus dans\nla forêt auraient possédé des souches d’arbres."
        it:
          x: "Pokémon nato da un ceppo marcescente in cui\nalberga uno spirito. Vive in boschi non frequentati\ndagli esseri umani."
          y: "Secondo la leggenda, lo spirito di una persona\nsmarritasi in un bosco è entrato in un ceppo d’albero,\ndando vita a questo Pokémon."
        de:
          x: "Bei diesen Pokémon handelt es sich um verrottete\nund von Geistern besessene Baumstümpfe, die sich\nin von Menschen gemiedene Wälder zurückziehen."
          y: "Bei diesen Pokémon soll es sich um die Seelen von\nKindern handeln, die sich im Wald verliefen und ums\nLeben kamen und nun in Baumstümpfen hausen."
        es:
          x: "Pokémon que nace cuando un espíritu se adentra en\nun tocón podrido. Habita en bosques que son poco\nfrecuentados por humanos."
          y: "Según una leyenda, son en realidad almas de niños\nque pasaron a mejor vida tras perderse en el bosque\ny se convirtieron en Pokémon al habitar un tocón."
        ko:
          x: "썩은 그루터기에 혼이\n깃들어 포켓몬이 되었다.\n사람이 가까이 가지 않는 숲에 산다."
          y: "숲에서 헤매다 죽은 아이의\n영혼이 나무 그루터기에 씌어\n포켓몬이 되었다고 한다."
trevenant:
  species_id: 709
  names:
    jp_kana: オーロット
    jp_kanji: オーロット
    en: Trevenant
    fr: Desséliande
    it: Trevenant
