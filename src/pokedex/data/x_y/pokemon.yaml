        fr:
          x: "On le reconnaît facilement grâce à sa peau dure\ncomme de la pierre ainsi qu’à sa grosse corne pleine\nde poison."
          y: "Un coup de sa puissante queue peut briser un poteau\ntéléphonique comme une allumette."
        it:
          x: "Lo si riconosce dalla pelle durissima e dal corno\nparticolarmente allungato, che contiene sostanze\nvelenose."
          y: "Con un solo colpo della potente coda può abbattere\nun palo del telefono come se fosse un fiammifero."
        de:
          x: "Seine steinharte Haut und sein ausgeprägtes Horn\nsind seine Markenzeichen. Achte auf das Horn,\ndenn es enthält Gift."
          y: "Ein Schlag mit seinem gewaltigen Schweif kann\neinen Telegrafenmast knicken wie ein Streichholz."
        es:
          x: "Es fácil reconocerlo por tener una dura piel y un gran\ncuerno lleno de peligrosísimo veneno."
          y: "Un golpe de su poderosa cola puede partir un poste\nde teléfono como si fuese una cerilla."
        ko:
          x: "돌처럼 딱딱한 피부와\n길게 뻗은 뿔이 특징이다.\n뿔에는 독이 있으니 주의해야 한다."
          y: "꼬리의 일격은 전신주를\n마치 성냥개비 다루듯이\n두 동강으로 꺾어 버린다."
clefairy:
