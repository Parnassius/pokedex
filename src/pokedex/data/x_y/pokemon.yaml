        jp_kanji:
          x: "暗い　海底では　いつも\n点滅している　触手の\n明かり　だけが　通信手段。"
          y: "２つの　触手の　先から\nプラスと　マイナスの　電気を　流して\n相手を　しびれさせる。"
        en:
          x: "On the dark ocean floor, its only means of\ncommunication is its constantly flashing lights."
          y: "It shoots positive and negative electricity between\nthe tips of its two antennae and zaps its enemies."
        fr:
          x: "Au plus profond de l’océan, son seul moyen de\ncommunication est sa lumière qui clignote\nconstamment."
          y: "Il émet avec ses antennes des impulsions positives\net négatives qui peuvent électrocuter ses ennemis."
        it:
          x: "Negli oscuri fondali oceanici il suo unico mezzo di\ncomunicazione sono le luci sempre lampeggianti."
          y: "Spara elettricità positiva e negativa tra le punte delle\ndue antenne per colpire i nemici."
        de:
          x: "Am Meeresgrund kann es sich nur durch ständiges\nFlackern seiner Lichter der Umgebung kundtun."
          y: "Es verschießt negative und positive Elektronen\nzwischen seinen Antennen, um seine Feinde\nzu erlegen."
        es:
          x: "En el oscuro fondo del océano, su único modo de\ncomunicarse es emitiendo luces parpadeantes."
          y: "Descarga electricidad positiva y negativa entre las\npuntas de sus dos antenas y electrocuta al enemigo."
        ko:
          x: "어두운 해저에서는 항상\n깜빡거리고 있는 촉수의\n빛만이 통신수단이다."
          y: "2개의 촉수 끝에서\n플러스와 마이너스의 전기를\n흘려보내 상대를 마비시킨다."
