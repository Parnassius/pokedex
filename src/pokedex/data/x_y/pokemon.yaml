        jp_kana:
          x: "３びき　いじょう　ニョロトノが\nあつまると　かならず　どなるような\nなきごえで　がっしょうを　はじめる。"
          y: "なきごえが　ひびきわたると\nあちこちから　ニョロモや\nニョロゾたちが　あつまってくる。"
        jp_kanji:
          x: "３匹以上　ニョロトノが　集まると\nかならず　怒鳴るような　鳴き声で\n合唱を　はじめる。"
          y: "鳴き声が　響きわたると\nあちこちから　ニョロモや\nニョロゾたちが　集まってくる。"
        en:
          x: "Whenever three or more of these get together,\nthey sing in a loud voice that sounds like bellowing."
          y: "If Poliwag and Poliwhirl hear its echoing cry, they\nrespond by gathering from far and wide."
        fr:
          x: "Quand trois ou plus se réunissent, ils chantent d’une\nmême voix ressemblant à un beuglement."
          y: "Si Ptitard et Têtarte entendent son cri, ils se\nrassemblent pour venir le rencontrer."
        it:
          x: "Quando tre o più Politoed si trovano insieme, iniziano\na cantare ad alta voce producendo un gran frastuono."
          y: "Se i Poliwag o i Poliwhirl odono il suo verso\nrimbombante si radunano anche da enormi distanze."
        de:
          x: "Sind drei oder mehr von ihnen zusammen,\nlassen sie einen schallenden Ruf erklingen."
          y: "Hören Quapsel und Quaputzi seinen Ruf,\nantworten sie, indem sie sich von nah und fern\nversammeln."
        es:
          x: "Cuando tres o más de estos se juntan, emiten un\nsonido muy fuerte parecido a un bramido."
          y: "Si Poliwag y Poliwhirl oyen su llanto, acudirán de\ntodas partes para consolarlo."
        ko:
          x: "3마리 이상 왕구리가\n모이면 반드시 고함치는 듯한\n울음소리로 합창하기 시작한다."
          y: "울음소리가 울려 퍼지면\n여기저기에서 발챙이와\n슈륙챙이들이 모인다."
hoppip:
  species_id: 187
  names:
    jp_kana: ハネッコ
    jp_kanji: ハネッコ
    en: Hoppip
    fr: Granivol
    it: Hoppip
    de: Hoppspross
    es: Hoppip
    ko: 통통코
  forms:
    hoppip:
      form_id: 0
      base_stats:
        hp: 35
        attack: 35
        defense: 40
        special_attack: 35
        special_defense: 55
