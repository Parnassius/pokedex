          y: "とおくまで　みれるように　しっぽを\nつかってたつ。てきを　みつけると\nおおごえで　なかまに　しらせる。"
        jp_kanji:
          x: "見張り役は　鋭く　鳴いたり\n尻尾で　地面を　たたいたりして\n仲間に　危険を　知らせる。"
          y: "遠くまで　見れるように　尻尾を\n使って　立つ。敵を　見つけると\n大声で　仲間に　知らせる。"
        en:
          x: "When acting as a lookout, it warns others of danger\nby screeching and hitting the ground with its tail."
          y: "It stands on its tail so it can see a long way.\nIf it spots an enemy, it cries loudly to warn its kind."
        fr:
          x: "S’il fait le guet, il prévient les autres d’un danger\nen criant et en frappant le sol de sa queue."
          y: "Il se tient dressé sur sa queue pour voir les ennemis\narriver de loin. À ce moment, il avertit ses amis."
        it:
          x: "La vedetta avverte i suoi compagni del pericolo\ngridando e battendo la coda sul terreno."
          y: "Ritto sulla coda, guarda lontano. Se nota un nemico\nlancia forti richiami per avvertire quelli della sua specie."
        de:
          x: "Wenn es Wache hat, warnt es seine Artgenossen,\nindem es schreit und mit dem Schwanz auf den\nBoden schlägt."
          y: "Es stellt sich auf den Schweif, um weiter zu blicken.\nErspäht es einen Feind, schreit es laut auf."
        es:
          x: "Cuando hace de centinela, avisa del peligro a los\ndemás, chillando y dando golpes al suelo con la cola."
          y: "Se apoya sobre su cola para ver a mucha distancia.\nSi divisa a un enemigo, dará la alarma a gritos."
        ko:
          x: "망보기 역은 날카롭게 울거나\n꼬리로 땅을 쳐서\n동료에게 위험을 알린다."
          y: "먼 곳까지 볼 수 있도록 꼬리를\n사용해서 선다. 상대를 발견하면\n큰 소리로 동료에게 알린다."
