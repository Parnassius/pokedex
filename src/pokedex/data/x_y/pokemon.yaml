          y: "カラで　はさみこむのは\nやわらかい　なかみを　さらけだすので\nいちか　ばちかの　しゅだん　なのだ。"
        jp_kanji:
          x: "硬い　殻は　どんな　攻撃も\n跳ね返す。開いたときに\n中を　攻撃されると　弱い。"
          y: "殻で　挟みこむのは\nやわらかい　中身を　さらけ出すので\n一か八かの　手段なのだ。"
        en:
          x: "Its hard shell repels any kind of attack.\nIt is vulnerable only when its shell is open."
          y: "Clamping on to an opponent reveals its vulnerable\nparts, so it uses this move only as a last resort."
        fr:
          x: "Protégé par une carapace très résistante, il est\nvulnérable quand celle-ci s’ouvre."
          y: "Il se referme sur un ennemi pour attaquer, mais ceci\nle rend vulnérable et il ne le fait que rarement."
        it:
          x: "La sua conchiglia dura respinge ogni tipo di attacco.\nÈ vulnerabile solo quando apre il guscio."
          y: "Mentre attanaglia il nemico diviene vulnerabile,\nperciò usa questa tecnica come ultima risorsa."
        de:
          x: "Eine harte Schale schützt dieses Pokémon.\nNur wenn es diese öffnet, wird es verwundbar."
          y: "Da es seine verwundbarste Stelle beim Klammern\npreisgibt, tut es dies nur in wirklichen Notfällen."
        es:
          x: "La concha lo protege de cualquier tipo de ataque.\nSolo es vulnerable cuando se abre."
          y: "Cuando atenaza a sus enemigos, se vuelve vulnerable.\nPor eso solo utiliza esta técnica como último recurso."
        ko:
          x: "단단한 껍데기는 어떤 공격도\n튕겨낸다. 껍데기를 벌리고 있을 때\n안쪽을 공격당하는 것에는 약하다."
          y: "껍데기로 물어 공격하는 것은\n부드러운 안쪽이 드러나므로\n궁지에 몰렸을 때 쓰는 수단이다."
