          x: "ながい　みみは　すぐれた　センサー。\nかわぞこで　うごく　いきものの\nおとを　ききわける　ことが　できる。"
          y: "おなかの　あわのような　もようは\nみずの　なかで　じぶんの　すがたを\nカモフラージュ　してくれる。"
        jp_kanji:
          x: "長い　耳は　優れた　センサー。\n川底で　動く　生き物の　音を\n聞き分ける　ことが　できる。"
          y: "お腹の　泡のような　模様は\n水の　中で　自分の　姿を\nカモフラージュ　してくれる。"
        en:
          x: "Its long ears are superb sensors. It can distinguish\nthe movements of living things on riverbeds."
          y: "The bubble-like pattern on its stomach helps it\ncamouflage itself when it’s in the water."
        fr:
          x: "Ses longues oreilles font un radar efficace.\nElles décèlent les mouvements dans le lit des rivières."
          y: "Les motifs sur son ventre lui permettent de se\ncamoufler lorsqu’il est dans l’eau."
        it:
          x: "Le lunghe orecchie sono ottimi sensori. Distingue\ni movimenti di esseri viventi sui fondali fluviali."
          y: "Le bolle disegnate sulla pancia gli permettono di\nmimetizzarsi quando si trova in acqua."
        de:
          x: "Seine langen Ohren sind hervorragende Sensoren.\nMit ihnen kann es Bewegungen im Fluss wahrnehmen."
          y: "Das blasenähnliche Muster auf seinem Bauch hilft\nihm, sich perfekt zu tarnen, wenn es im Wasser ist."
        es:
          x: "Sus largas orejas son sensores que pueden percibir\nmovimientos de seres vivos en el lecho del río."
          y: "Gracias al dibujo que tiene en el estómago, le resulta\nbastante fácil camuflarse en el agua."
        ko:
          x: "긴 귀는 우수한 센서다.\n강바닥에서 움직이는 생명체의\n소리를 분간할 수 있다."
          y: "배의 거품 같은 무늬는\n물속에서 자신의 모습을\n위장하게 해준다."
sudowoodo:
  species_id: 185
