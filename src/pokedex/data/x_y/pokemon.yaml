          y: "ハネは　みずを　はじく　りんぷんに\nまもられている。あめの　ひでも\nそらを　とぶことが　できる。"
        jp_kanji:
          x: "花の　ミツが　大好物。\nわずかな　花粉で　花畑の\n場所を　探し出すことが　できる。"
          y: "羽は　水を　弾く　りんぷんに\n守られている。雨の　日でも\n空を　飛ぶことが　できる。"
        en:
          x: "It loves the honey of flowers and can locate\nflower patches that have even tiny amounts\nof pollen."
          y: "The wings are protected by rain-repellent dust.\nAs a result, this Pokémon can fly about even\nin rain."
        fr:
          x: "Il raffole du nectar des fleurs. Il est capable de\nrepérer la plus petite quantité de pollen."
          y: "Ses ailes sont recouvertes d’une poudre les\nprotégeant de la pluie. Ce Pokémon peut donc voler\npendant de grosses averses."
        it:
          x: "Adora il nettare dei fiori e riesce a localizzare i campi\nin cui si trova anche una minima quantità di polline."
          y: "Una polvere idrorepellente gli ricopre le ali,\npermettendogli di volare anche sotto la pioggia."
        de:
          x: "Es liebt Blütenhonig. Es findet selbst Blumen,\ndie sehr wenig Pollen haben."
          y: "Seine Flügel sind mit Wasser abweisendem Staub\nüberzogen. Daher kann dieses Pokémon auch bei\nRegen fliegen."
        es:
          x: "Adora el néctar de las flores. Puede localizar hasta las\nmás pequeñas cantidades de polen."
          y: "Tiene las alas protegidas con una capa impermeable,\nde ahí que pueda volar también cuando llueve."
        ko:
          x: "꽃의 꿀을 매우 좋아한다.\n약간의 꽃가루만으로 꽃밭이\n있는 장소를 찾아낼 수 있다."
          y: "물을 튕겨내는 가루가\n날개를 보호하고 있다. 비가 오는 날에도\n하늘을 날 수 있다."
