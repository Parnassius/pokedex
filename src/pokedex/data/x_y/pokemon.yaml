        jp_kana:
          x: "やさしいひとの　そばに　いないと\nげんきが　でなくなってしまう。\nはねをうごかさずに　そらにうかべる。"
          y: "こころやさしい　ひとの　まえに\nしあわせを　もたらすため\nすがたを　あらわすと　いわれている。"
        jp_kanji:
          x: "優しい人の　そばに　いないと\n元気が　出なくなってしまう。\n羽を動かさずに　空に浮かべる。"
          y: "心優しい　人の　前に\n幸せを　もたらすため\n姿を　現すと　言われている。"
        en:
          x: "It grows dispirited if it is not with kind people.\nIt can float in midair without moving its wings."
          y: "They say that it will appear before kindhearted,\ncaring people and shower them with happiness."
        fr:
          x: "Il se démoralise vite s’il n’est pas avec des gens\nsympathiques. Il peut léviter sans battre des ailes."
          y: "On dit qu’il n’apparaît qu’aux cœurs purs et\nqu’il leur apporte la joie et le bonheur."
        it:
          x: "S’intristisce se non si trova con persone gentili.\nPuò restare sospeso in aria senza bisogno di\nmuovere le ali."
          y: "Si dice che appaia alle persone buone e premurose,\ninondandole di felicità."
        de:
          x: "Es wird entmutigt, wenn es unter unfreundlichen\nMenschen ist. Es kann ohne Flügel niedrig schweben."
          y: "Man sagt, es zeigt sich nur gutherzigen und\neinfühlsamen Menschen. Es überschüttet sie\nmit Freude."
        es:
          x: "Si no está con gente amable, se entristece. Puede\nflotar en el aire sin mover las alas."
          y: "Dicen que aparece entre gentes cuidadosas y de\nbuen corazón, a quienes inunda de felicidad."
        ko:
          x: "상냥한 사람 곁에 있지 않으면\n기운이 나지 않게 되어버린다.\n날개를 움직이지 않고 뜰 수 있다."
          y: "마음 착한 사람 앞에\n행복을 가져다주기 위해\n모습을 나타낸다고 전해진다."
