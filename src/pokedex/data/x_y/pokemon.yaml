          y: "Il guette le sol depuis les airs et fond sur les proies\naffaiblies. Il aime s’apprêter avec des ossements."
        it:
          x: "Vola in cerchio nel cielo e quando scorge una preda\nle si lancia contro in picchiata per trasportarla al suo\nnido."
          y: "Osserva la terra dal cielo e si lancia sulle prede in\ndifficoltà. Ha l’abitudine di farsi delle decorazioni\ncon le ossa."
        de:
          x: "Es kreist am Himmel, bis es seine Beute findet.\nNach erfolgtem Angriff trägt es sie mühelos zu\nseinem Nest."
          y: "Es überblickt das Areal aus der Luft und stürzt sich auf\nein geschwächtes Opfer. Trägt gern Knochenschmuck."
        es:
          x: "Vuela en círculos. Cuando avista una presa, la ataca y\nla transporta a su nido con suma facilidad."
          y: "Otea la superficie desde el cielo y ataca a Pokémon\ndebilitados. Tiene por costumbre hacerse adornos\ncon huesos."
        ko:
          x: "넓은 하늘에서 원을 그리며 날고\n먹이를 발견하면 덮쳐서\n둥지까지 가뿐히 나른다."
          y: "하늘에서 지상을 관찰하다\n쇠약해진 먹이를 덮친다.\n뼈로 몸치장하는 습성이 있다."
