      descriptions:
        jp_kana:
          x: "おしりの　ほのおは　おなかで\nつくられた　ガスが　ねんりょう。\nあめに　ぬれても　きえない。"
          y: "おなかで　つくられた　ガスが\nおしりで　もえている。たいちょうが\nわるいと　ほのおが　よわくなる。"
        jp_kanji:
          x: "お尻の　炎は\nお腹で　作られた　ガスが　燃料。\n雨に　ぬれても　消えない。"
          y: "お腹で　作られた　ガスが\nお尻で　燃えている。体調が　悪いと\n炎が　弱くなる。"
        en:
          x: "Its fiery rear end is fueled by gas made in its belly.\nEven rain can’t extinguish the fire."
          y: "The gas made in its belly burns from its rear end.\nThe fire burns weakly when it feels sick."
        fr:
          x: "La flamme de sa queue est alimentée par un gaz de\nson estomac. Même la pluie ne saurait l’éteindre."
          y: "La flamme de son postérieur brûle grâce à un gaz\nde son estomac. Elle faiblit quand il ne va pas bien."
        it:
          x: "Le fiamme sulla coda, alimentate dai gas della\npancia, non si spengono neppure quando piove."
          y: "Le fiamme sulla coda sono alimentate dal gas della\npancia. Si affievoliscono quando sta male."
        de:
          x: "Das Feuer an seinem Hinterteil wird durch Gase\nim Bauch genährt. Selbst Regen löscht es nicht."
          y: "An seinem Rücken verbrennt es die Gase aus seinem\nBauch. Geht es ihm schlecht, leuchtet es weniger hell."
        es:
          x: "El gas de su panza alimenta el fuego de su parte\ntrasera, que ni la lluvia puede extinguir."
          y: "El fuego que arde en su cola lo generan los gases\nde su estómago y disminuye cuando está débil."
        ko:
          x: "엉덩이의 불꽃은 배에서\n만들어진 가스가 연료다.\n비에 젖어도 꺼지지 않는다."
          y: "배에서 만들어진 가스가\n엉덩이에서 타오르고 있다. 몸 상태가\n나쁘면 불꽃이 약해진다."
monferno:
