          x: "かおに　にあわず　おくびょう。\nしかし　ひとたび　おこりはじめると\nおおきな　キバで　はんげきする。"
          y: "おおきな　くちを　ひらいて\nふとい　キバを　みせつければ\nたいていの　ポケモンは　にげだす。"
        jp_kanji:
          x: "顔に　似合わず　臆病。\nしかし　ひとたび　怒りはじめると\n大きな　キバで　反撃する。"
          y: "大きな　口を　開いて\n太い　キバを　見せつければ\nたいていの　ポケモンは　逃げ出す。"
        en:
          x: "It is timid in spite of its looks. If it becomes\nenraged, however, it will strike with its huge fangs."
          y: "It can make most any Pokémon run away simply by\nopening its mouth wide to reveal its big fangs."
        fr:
          x: "En dépit des apparences, c’est un grand timide.\nQuand il s’énerve, il mord de ses énormes crocs."
          y: "Il peut faire fuir presque tous les Pokémon en ouvrant\ntrès largement sa mâchoire."
        it:
          x: "Malgrado il suo aspetto, è molto timido. Se si\narrabbia, tuttavia, colpisce con le sue enormi zanne."
          y: "Se spalanca la bocca mostrando i grandi denti,\nquasi tutti i Pokémon fuggono spaventati."
        de:
          x: "Es ist trotz seines Äußeren schüchtern. Wird es\nwütend, schnappt es mit seinen Fängen zu."
          y: "Es kann fast jedes Pokémon vertreiben, indem es sein\nMaul weit öffnet und seine scharfen Reißzähne zeigt."
        es:
          x: "A pesar de su aspecto, es muy tímido. Sin embargo,\ncuando se enfada, ataca con sus colmillos."
          y: "Con solo enseñar las fauces, conseguirá ahuyentar\nprácticamente a todos los Pokémon con los que se\ncruce."
        ko:
          x: "얼굴에 어울리지 않게 겁이 많다.\n그러나 한번 화내기 시작하면\n큰 이빨로 반격한다."
          y: "커다란 입을 벌리고\n두꺼운 송곳니를 드러내면\n대부분의 포켓몬이 도망친다."
