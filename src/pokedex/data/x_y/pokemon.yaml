bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    jp_kanji: フシギダネ
    en: Bulbasaur
    fr: Bulbizarre
    it: Bulbasaur
    de: Bisasam
    es: Bulbasaur
    ko: 이상해씨
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          x: "うまれたときから　せなかに\nふしぎな　タネが　うえてあって\nからだと　ともに　そだつという。"
          y: "うまれてから　しばらくの　あいだは\nせなかの　タネから　えいようを\nもらって　おおきく　そだつ。"
        jp_kanji:
          x: "生まれたときから　背中に\n不思議な　タネが　植えてあって\n体と　ともに　育つという。"
          y: "生まれてから　しばらくの　あいだは\n背中の　タネから　栄養を　もらって\n大きく　育つ。"
        en:
          x: "A strange seed was planted on its back at birth.\nThe plant sprouts and grows with this Pokémon."
          y: "For some time after its birth, it grows by gaining\nnourishment from the seed on its back."
        fr:
          x: "Il a une étrange graine plantée sur son dos.\nElle grandit avec lui depuis sa naissance."
          y: "Au matin de sa vie, la graine sur son dos lui fournit\nles éléments dont il a besoin pour grandir."
        it:
          x: "Alla nascita gli è stato piantato sulla schiena un seme\nraro. La pianta sboccia e cresce con lui."
          y: "Dopo la nascita, cresce traendo nutrimento dal seme\npiantato sul suo dorso."
        de:
          x: "Dieses Pokémon trägt von Geburt an einen Samen\nauf dem Rücken, der mit ihm keimt und wächst."
          y: "Nach der Geburt nimmt es für eine Weile Nährstoffe\nüber den Samen auf seinem Rücken auf."
        es:
          x: "Una rara semilla le fue plantada en el lomo al nacer.\nLa planta brota y crece con este Pokémon."
          y: "Después de nacer, crece alimentándose de las\nsemillas de su lomo."
        ko:
          x: "태어났을 때부터 등에\n이상한 씨앗이 심어져 있으며\n몸과 함께 자란다고 한다."
          y: "태어나서부터 얼마 동안은\n등의 씨앗으로부터 영양을\n공급받아 크게 성장한다."
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    jp_kanji: フシギソウ
    en: Ivysaur
    fr: Herbizarre
    it: Ivysaur
    de: Bisaknosp
    es: Ivysaur
    ko: 이상해풀
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          x: "つぼみが　せなかに　ついていて\nようぶんを　きゅうしゅうしていくと\nおおきな　はなが　さくという。"
          y: "せなかの　つぼみが　ふくらみだすと\nあまい　においが　ただよいはじめる。\nたいりんの　はなが　さく　まえぶれ。"
        jp_kanji:
          x: "つぼみが　背中に　ついていて\n養分を　吸収していくと\n大きな　花が　咲くという。"
          y: "背中の　つぼみが　ふくらみ出すと\n甘い　においが　漂いはじめる。\n大輪の　花が　咲く　前触れ。"
        en:
          x: "There is a plant bulb on its back.\nWhen it absorbs nutrients, the bulb is said to\nblossom into a large flower."
          y: "When the bud on its back starts swelling, a sweet\naroma wafts to indicate the flower’s coming bloom."
        fr:
          x: "Il y a un bulbe sur son dos. On dit que s’il absorbe\nassez de nutriments, ce bulbe se transforme en\nune jolie fleur."
          y: "Lorsque le bourgeon sur son dos éclot, il répand\nun doux parfum pour célébrer sa floraison."
        it:
          x: "Dopo aver assorbito sufficienti sostanze nutrienti,\nil bulbo sulla schiena sboccia in un magnifico fiore."
          y: "Quando il bocciolo che ha sul dorso si gonfia, emana\nun dolce profumo. È indice dell’imminente fioritura."
        de:
          x: "Es trägt eine Knospe auf seinem Rücken. Nimmt es\nNahrung zu sich, soll aus der Knospe eine große\nblühende Blume werden."
          y: "Sobald die Knospe auf seinem Rücken ein süßes\nAroma abgibt, steht die Blüte kurz bevor."
        es:
          x: "Este Pokémon tiene un bulbo en el lomo. Dicen que,\nal absorber nutrientes, el bulbo se transforma en una\nflor grande."
          y: "Cuando el bulbo de su lomo se hincha, desprende un\ndulce aroma para indicar el florecimiento."
        ko:
          x: "꽃봉오리가 등에 붙어 있으며\n양분을 흡수해가면\n커다란 꽃이 핀다고 한다."
          y: "등의 봉오리가 부풀어 오르면\n달콤한 냄새가 감돌기 시작한다.\n큰 꽃이 필 조짐이다."
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    jp_kanji: フシギバナ
    en: Venusaur
    fr: Florizarre
    it: Venusaur
    de: Bisaflor
    es: Venusaur
    ko: 이상해꽃
  forms:
    venusaur:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          x: "おおきな　はなびらを　ひろげ\nたいようの　ひかりを　あびていると\nからだに　げんきが　みなぎっていく。"
          y: "あめの　ふった　よくじつは　せなかの\nはなの　かおりが　つよまる。かおりに\nさそわれ　ポケモンが　あつまる。"
        jp_kanji:
          x: "大きな　花びらを　広げ\n太陽の　光を　浴びていると\n体に　元気が　みなぎっていく。"
          y: "雨の　降った　翌日は\n背中の　花の　香りが　強まる。\n香りに　誘われ　ポケモンが　集まる。"
        en:
          x: "By spreading the broad petals of its flower\nand catching the sun’s rays, it fills its body\nwith power."
          y: "After a rainy day, the flower on its back smells\nstronger. The scent attracts other Pokémon."
        fr:
          x: "Ses pétales lui servent à capter la lumière du soleil.\nIl peut ainsi en canaliser l’énergie."
          y: "Le parfum de sa fleur se fait plus pénétrant les\nlendemains de pluie. Cela appâte les autres Pokémon."
        it:
          x: "Si riempie di energia grazie ai grandi petali del fiore,\nche spalanca catturando i raggi solari."
          y: "Dopo la pioggia, il fiore sul suo dorso emana un\nprofumo più intenso e attira gli altri Pokémon."
        de:
          x: "Es spreizt die breiten Blätter seiner Blüte,\num seinen Körper mit Sonnenenergie\nzu durchfluten."
          y: "Nach einem Regentag riecht die Blume auf seinem\nRücken intensiver. Das Aroma zieht andere\nPokémon an."
        es:
          x: "Llena su cuerpo de energía con los rayos solares que\ncaptan los anchos pétalos de su flor."
          y: "Después de un día de lluvia, la flor de su lomo tiene\nun aroma más potente y atrae a otros Pokémon."
        ko:
          x: "큰 꽃잎을 펼쳐\n햇빛을 받고 있으면\n몸에 힘이 넘쳐흐른다."
          y: "비가 내린 다음 날은 등의\n꽃향기가 강해진다. 향기에\n이끌려 포켓몬이 모여든다."
