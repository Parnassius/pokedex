          y: "じぶんの　しっぽを　おいかけて\nあそんでいると　めを　まわすといった\nかわいらしい　いちめんを　みせる。"
        jp_kanji:
          x: "動くものを　つい　追ってしまう。\n自分の　尻尾を　追いかけて\n同じ　場所を　グルグル　回る。"
          y: "自分の　尻尾を　追いかけて\n遊んでいると　目を　回すといった\n可愛らしい　一面を　みせる。"
        en:
          x: "It can’t stop itself from chasing moving things,\nand it runs in a circle, chasing its own tail."
          y: "It shows its cute side by chasing its own tail\nuntil it gets dizzy."
        fr:
          x: "Il poursuit tout ce qui bouge. On le voit parfois courir\nen cercle, chassant sa propre queue."
          y: "Un Pokémon très mignon qui aime parfois courir\nen cercle en chassant sa propre queue."
        it:
          x: "Non riesce a evitare di inseguire tutto ciò che si\nmuove e corre in tondo a caccia della propria coda."
          y: "È davvero carino quando barcolla per i giramenti di\ntesta, dopo aver cercato di mordersi la coda."
        de:
          x: "Es muss Dinge, die sich bewegen, einfach jagen.\nEs rennt oft im Kreis und jagt seinen eigenen Schweif."
          y: "Es zeigt gerne seine niedliche Seite, indem es seinen\neigenen Schweif jagt, bis ihm schwindlig wird."
        es:
          x: "No puede evitar ir tras las cosas que se mueven.\nHasta corre en círculos persiguiéndose la cola."
          y: "Le gusta jugar persiguiéndose la cola hasta que se\nmarea, mostrando así su lado más mono."
        ko:
          x: "움직이는 것을 무심코 쫓아간다.\n자신의 꼬리를 쫓아서\n똑같은 장소를 빙글빙글 돈다."
          y: "자신의 꼬리를 쫓아서\n놀고 있으면 눈이 핑 돌고 마는\n귀여운 일면을 보인다."
