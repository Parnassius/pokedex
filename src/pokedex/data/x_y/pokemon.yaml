          x: "りょうての　ツメを　かさねあわせて\nからだを　こうそく　かいてんさせると\nもうスピードで　ちちゅうを　すすむ。"
          y: "からだを　スピンさせることで\nじそく５０キロの　スピードのまま\nまっすぐ　じめんを　ほりすすむ。"
        jp_kanji:
          x: "両手の　ツメを　重ね合わせて\n体を　高速　回転させると\n猛スピードで　地中を　進む。"
          y: "体を　スピンさせることで\n時速５０キロの　スピードのまま\nまっすぐ　地面を　掘り進む。"
        en:
          x: "It makes its way swiftly through the soil by putting\nboth claws together and rotating at high speed."
          y: "By spinning its body, it can dig straight through the\nground at a speed of 30 mph."
        fr:
          x: "Il se propulse à grande vitesse sous la terre en\njoignant ses griffes et en tourbillonnant sur lui-même."
          y: "Il tourbillonne sur lui-même pour se déplacer sous\nterre. Il peut atteindre les 50 km/h en ligne droite."
        it:
          x: "Sfreccia a gran velocità sotto terra, avvitandosi su\nse stesso, mentre si apre un passaggio scavando\ncon le unghie."
          y: "Quando gira su se stesso, scava la terra scendendo\nin verticale alla velocità di 50 km/h."
        de:
          x: "Es führt seine beiden Klauen zusammen, dreht sich\nrapide um die eigene Achse und gräbt sich ratzfatz\ndurch das Erdreich."
          y: "Es gräbt sich mit 50 km/h schnurstracks durch\ndas Erdreich, indem es sich rapide um die eigene\nAchse dreht."
        es:
          x: "Cuando junta las garras y comienza a dar vueltas\nfrenéticas, avanza bajo tierra a gran velocidad."
          y: "Puede girar su cuerpo a una velocidad de 50 km/h y,\nsi la mantiene, puede perforar el suelo y atravesarlo."
        ko:
          x: "양손의 손톱을 서로 겹치고\n몸을 고속 회전시키면서\n맹렬한 속도로 땅속을 헤쳐나간다."
          y: "몸을 스핀시켜서\n시속 50km의 스피드를 유지하며\n똑바로 땅을 파서 나아간다."
excadrill:
