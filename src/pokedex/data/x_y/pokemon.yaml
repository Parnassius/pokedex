        - levitate
      descriptions:
        jp_kana:
          x: "あまい　においの　だえきで　えものを\nおびきよせ　おおあごで　がぶり。\n１にち　かけて　えものを　たべる。"
          y: "しっちたいに　はえる　きにまきつき\nあまいかおりの　だえきで　えものを\nおびきよせては　ひとくちで　たべる。"
        jp_kanji:
          x: "甘い　においの　だえきで　獲物を\nおびき寄せ　おおあごで　がぶり。\n１日　かけて　獲物を　食べる。"
          y: "湿地帯に　生える　木に巻きつき\n甘い香りの　だえきで　獲物を\n誘き寄せては　ひとくちで　食べる。"
        en:
          x: "It attracts prey with its sweet-smelling saliva, then\nchomps down. It takes a whole day to eat prey."
          y: "It binds itself to trees in marshes. It attracts prey\nwith its sweet-smelling drool and gulps them down."
        fr:
          x: "Il attire sa proie avec sa salive odorante avant de\nla croquer. Il lui faut une journée pour l’avaler."
          y: "Il s’accroche aux arbres des marais et attire ses proies\navec sa salive à l’odeur enivrante."
        it:
          x: "Attira le prede con il dolce aroma della saliva e poi\nle ingoia. Impiega un giorno per mangiare una preda."
          y: "Si attacca agli alberi nelle paludi. Attrae le prede\ncon il dolce aroma della saliva e poi le ingoia."
        de:
          x: "Sein süßlich riechender Speichel zieht Beute an,\ndie es frisst. Es braucht einen Tag, sie zu fressen."
          y: "Klammert sich an Bäume in Sümpfen. Lockt Beute mit\nseinem süßlichen Speichel an und schluckt sie dann."
        es:
          x: "Atrae a sus presas con saliva de olor dulce y las\nmastica. Tarda todo un día en comérselas."
          y: "Se cuelga de los árboles en los pantanos. Atrae a sus\npresas con su dulce olor y las engulle."
        ko:
          x: "달콤한 냄새의 타액으로 먹이를\n끌어들여 큰 턱으로 꿀꺽한다.\n하루에 걸쳐 먹이를 먹는다."
          y: "늪지대에서 자라는 나무에 엉겨 붙어\n달콤한 냄새의 타액으로 먹이를\n끌어들여 한입에 먹는다."
finneon:
