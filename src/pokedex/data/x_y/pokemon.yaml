          x: "およそ　１おくねんまえの　うみを\nおよいでいた。りくちへ　あがって\nえものに　おそいかかる　こともある。"
          y: "こだいの　かせきから　ふっかつした。\nふかさ　１０００メートルまで\nせんすいすることが　できる。"
        jp_kanji:
          x: "およそ　１億年前の　海を\n泳いでいた。陸地へ　上がって\n獲物に　襲いかかる　こともある。"
          y: "古代の　化石から　復活した。\n深さ　１０００メートルまで\n潜水することが　できる。"
        en:
          x: "About 100 million years ago, these Pokémon swam\nin oceans. It is thought they also went on land to\nattack prey."
          y: "Restored from a fossil, this Pokémon can dive to\ndepths beyond half a mile."
        fr:
          x: "Il nageait dans les océans il y a 100 millions\nd’années. Il lui arrive de rallier la terre ferme pour\nattaquer ses proies."
          y: "Il a été recréé à partir d’un fossile préhistorique.\nIl peut plonger jusqu’à 1 000 mètres de profondeur."
        it:
          x: "Nuotava nei mari 100 milioni di anni fa. A volte sale\nin superficie per aggredire le prede."
          y: "Si è risvegliato da un antico fossile. Può immergersi\nfino a 1000 m di profondità."
        de:
          x: "Schwamm bereits vor 100 Millionen Jahren durch\ndie Meere. Ab und zu führt es die Jagd auch an Land."
          y: "Es wurde aus einem urzeitlichen Fossil reanimiert.\nEs kann in Tiefen von bis zu 1 000 m abtauchen."
        es:
          x: "Ya pululaba por las aguas hace 100 millones de años.\nTambién va a tierra a veces en busca de alimento."
          y: "Ha renacido de un fósil prehistórico. Puede sumergirse\nhasta 1000 m de profundidad."
        ko:
          x: "약 1억 년 전 바다를\n헤엄쳐 다녔다. 육지에 올라\n먹이를 덮치는 일도 있다."
          y: "고대 화석에서 부활했다.\n1000m 깊이까지\n잠수할 수 있다."
carracosta:
