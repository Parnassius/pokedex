        en:
          x: "The pattern on its belly appears to be a frightening\nface. Weak foes will flee just at the sight of\nthe pattern."
          y: "To intimidate foes, it spreads its chest wide and\nmakes eerie sounds by expelling air from its mouth."
        fr:
          x: "Les motifs sur son corps ressemblent à un visage\nmenaçant. Les adversaires les plus craintifs fuient à la\nseule vue de ce Pokémon."
          y: "Pour apeurer ses ennemis, il gonfle sa poitrine et\német d’étranges sons avec sa bouche."
        it:
          x: "Il disegno sulla pancia rappresenta una faccia\nspaventosa, capace di far fuggire i nemici più pavidi."
          y: "Per terrorizzare la preda dilata il petto ed emette un\nterribile verso liberando aria dalla bocca."
        de:
          x: "Das Muster auf seinem Bauch ähnelt einer Fratze.\nSchwache Gegner nehmen bereits beim Anblick\nReißaus."
          y: "Um Feinde einzuschüchtern, bläht es seine Brust\nauf und stößt unheimliche Laute durch sein Maul aus."
        es:
          x: "El dibujo que tiene en la panza aterroriza. Los rivales\nmás débiles salen huyendo al verlo."
          y: "Para intimidar a sus enemigos, hincha el pecho y echa\naire por la boca emitiendo sonidos."
        ko:
          x: "배의 무늬가 무서운 얼굴로\n보인다. 약한 적은 그 무늬만\n보고도 도망치고 만다."
          y: "가슴을 펴서 위협할 때\n입에서 새는 공기 소리는\n으스스해서 상대를 겁먹게 한다."
