        - anger_point
      hidden_ability: defiant
      descriptions:
        jp_kana:
          x: "まわりに　だれも　いないときだけは\nおこるのを　やめている。しかし\nそれをみるのは　むずかしい。"
          y: "いつも　もうれつに　おこっており\nにげても　にげても\nどこまでも　おいかけてくる。"
        jp_kanji:
          x: "まわりに　だれも　いないときだけは\n怒るのを　やめている。しかし\nそれを　見るのは　難しい。"
          y: "いつも　猛烈に　怒っており\n逃げても　逃げても\nどこまでも　追いかけてくる。"
        en:
          x: "It stops being angry only when nobody else is\naround. To view this moment is very difficult."
          y: "It is always outrageously furious. If it gives chase,\nit will tenaciously track the target no matter\nhow far."
        fr:
          x: "Sa fureur prend fin quand il n’a plus personne à\nfrapper. Il est difficile d’en être témoin."
          y: "Ce Pokémon est constamment en rogne.\nLorsqu’il traque une proie, il la pourchasse n’importe\noù, peu importe la distance."
        it:
          x: "Questo Pokémon è costantemente furioso e si\ncalma solo nella solitudine più assoluta."
          y: "Va facilmente su tutte le furie. Se insegue una preda,\nnon si dà per vinto finché non l’ha catturata."
        de:
          x: "In ganz seltenen Fällen beruhigt sich dieses sehr\njähzornige Pokémon und ist für einen Moment friedlich."
          y: "Es ist immer außerordentlich wütend. Nimmt es\ndie Verfolgung auf, bleibt es dem Opfer hartnäckig\nauf den Fersen, egal wie weit oder wie lange."
        es:
          x: "Solo se calma cuando nadie está cerca. Llegar a ver\nese momento es realmente difícil."
          y: "Siempre está tremendamente enfadado. Cuando se\nempeña en una presa, no hay distancia para él."
        ko:
          x: "주위에 아무도 없을 때만은\n화를 내지 않고 있다. 그러나\n그 모습을 보기가 어렵다."
          y: "항상 맹렬하게 화내고 있어\n도망치고 또 도망쳐도\n끝까지 쫓아온다."
growlithe:
  species_id: 58
  names:
