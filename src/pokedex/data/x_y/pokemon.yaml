          y: "おしりから　きょうれつに　くさい\nえきたいを　とばして　みを　まもる。\nにおいは　２４じかん　きえない。"
        jp_kanji:
          x: "お尻から飛ばす　くさい　汁の\nにおいは　半径２キロに　広がり\nまわりの　ポケモンは　いなくなる。"
          y: "お尻から　強烈に　くさい　液体を\n飛ばして　身を　守る。\nにおいは　２４時間　消えない。"
        en:
          x: "It sprays a foul fluid from its rear. Its stench\nspreads over a mile radius, driving Pokémon away."
          y: "It protects itself by spraying a noxious fluid from its\nrear. The stench lingers for 24 hours."
        fr:
          x: "Son derrière propulse un fluide nauséabond qui peut\nfaire fuir les Pokémon dans un rayon de 2 km."
          y: "Il se protège en expulsant un fluide nocif par son\nderrière. La puanteur dure 24 heures."
        it:
          x: "Emette un fluido puzzolente dal posteriore. Il tanfo\nsi sparge per 2 km e tiene lontani i Pokémon."
          y: "Si protegge spruzzando un fluido puzzolente dal\nposteriore. Il tanfo permane per 24 ore."
        de:
          x: "Versprüht eine Substanz aus seinem Hinterleib,\ndie in einem großen Radius andere Pokémon fernhält."
          y: "Um sich zu schützen, versprüht es eine Substanz\naus seinem Hinterleib, die 24 Stunden stinkt."
        es:
          x: "Expulsa un fluido maloliente por sus cuartos traseros.\nEl hedor repele Pokémon en un radio de 2 km."
          y: "Se protege expulsando un fluido nocivo por su parte\ntrasera. El hedor dura 24 horas."
        ko:
          x: "엉덩이에서 뿜어지는 역한 분비액의\n냄새는 범위 2km까지 멀리 퍼져\n주변의 포켓몬이 자리를 뜨게 한다."
          y: "엉덩이에서 강렬한 구린내의\n액체를 날려서 몸을 지킨다.\n냄새가 24시간 사라지지 않는다."
