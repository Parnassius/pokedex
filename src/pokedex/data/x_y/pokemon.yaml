          y: "とびはねると　くちのなかにある\nたまが　あちこちに　はんしゃして\nすずのような　ねいろと　なる。"
        jp_kanji:
          x: "跳ねるたびに　リリンと　音を　出す。\n高い　周波数の　鳴き声で\n相手の　耳を　聞こえなくする。"
          y: "飛び跳ねると　口の中にある\n玉が　あちこちに　反射して\n鈴のような　音色と　なる。"
        en:
          x: "Each time it hops, it makes a ringing sound.\nIt deafens foes by emitting high-frequency cries."
          y: "There is an orb inside its mouth. When it hops,\nthe orb bounces all over and makes a\nringing sound."
        fr:
          x: "Il produit un bruit de sonnerie à chaque bond.\nIl assourdit l’ennemi avec ses cris à haute fréquence."
          y: "Quand il sautille, l’orbe qu’il a dans la bouche s’agite\net tinte comme une cloche."
        it:
          x: "A ogni salto produce un suono che sembra uno\nsquillo. I suoi versi ad alta frequenza assordano\ni nemici."
          y: "Ha una sfera nella gola. Quando saltella, la sfera si\nmuove emettendo dei trilli."
        de:
          x: "Jedes Mal, wenn es hüpft, entsteht ein klingender\nLaut. Seine hohen Schreie machen die Gegner taub."
          y: "In seinem Maul befindet sich eine Kugel, die beim\nHopsen ein klingelndes Geräusch erzeugt."
        es:
          x: "Emite un tintineo cada vez que salta. Ensordece a sus\nrivales con sonidos de alta frecuencia."
          y: "Tiene una esfera en la boca. Cuando salta, la esfera\nrebota y emite un tintineo."
        ko:
          x: "뛸 때마다 딸랑딸랑 소리를 낸다.\n높은 주파수의 울음소리로\n상대의 귀를 들리지 않게 한다."
          y: "뛰어오르면 입안에 있는\n구슬이 사방에 반사되어\n방울 같은 음색을 만들어 낸다."
