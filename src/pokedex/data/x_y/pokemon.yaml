      descriptions:
        jp_kana:
          x: "やさしい　こころの　もちぬし。\nめったに　あらそわないため　たくさん\nつかまえられ　かずが　へった。"
          y: "ひとの　ことばを　りかいする　たかい\nちのうを　もつ。うみの　うえを\nひとを　のせて　すすむのが　すき。"
        jp_kanji:
          x: "優しい　心の　持ち主。\nめったに　争わないため　たくさん\n捕まえられ　数が　減った。"
          y: "人の　言葉を　理解する　高い\n知能を　持つ。海の　上を\n人を　乗せて　進むのが　好き。"
        en:
          x: "They have gentle hearts. Because they rarely\nfight, many have been caught. Their number\nhas dwindled."
          y: "Its high intelligence enables it to understand human\nspeech. It likes to ferry people on its back."
        fr:
          x: "Ils sont d’une nature gentille. Comme ils se défendent\nrarement, ils sont en voie d’extinction."
          y: "Son intelligence lui permet de comprendre le langage\ndes humains. Il adore promener les gens sur son dos."
        it:
          x: "Sono buoni d’animo e lottano di rado, così molti\ndi loro sono facili prede: sono stati decimati."
          y: "La sua intelligenza gli permette di comprendere il\nlinguaggio degli umani, che ama trasportare sul suo\ndorso."
        de:
          x: "Sie sind gutmütig. Da sie selten kämpfen,\nwurden sie oft gefangen. Ihre Anzahl ist\nstark reduziert."
          y: "Aufgrund seiner hohen Intelligenz kann es\ndie menschliche Sprache verstehen. Es mag es,\nMenschen auf seinem Rücken zu transportieren."
        es:
          x: "Son buenos de corazón. Muchos fueron capturados\npor ser tan pacíficos. Ahora hay muchos menos."
          y: "Tiene un coeficiente intelectual tan alto que puede\nentender el lenguaje humano. Le encanta llevar a\ngente sobre el lomo."
        ko:
          x: "부드러운 마음의 소유자다.\n좀처럼 다투지 않아 많이\n잡혔기 때문에 수가 줄었다."
          y: "사람의 말을 이해하는 높은 지능을\n가지고 있다. 사람을 태우고\n바다를 건너는 것을 좋아한다."
ditto:
