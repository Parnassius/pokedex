        jp_kanji:
          x: "体内の　発光物質で\n目玉や　体を　光らせ\n襲ってきた　敵を　ひるませる。"
          y: "ほほ袋に　ためた　木の実の　タネを\n飛ばして　攻撃。\n敵を　発見すると　尻尾を　立てる。"
        en:
          x: "Using luminescent matter, it makes its eyes and\nbody glow and stuns attacking opponents."
          y: "When they see an enemy, their tails stand high,\nand they spit the seeds of berries stored in their\ncheek pouches."
        fr:
          x: "Il intimide l’ennemi en faisant briller son pelage et\nses yeux grâce à une substance à l’intérieur de son\ncorps."
          y: "Il attaque en crachant les graines des Baies qu’il\naccumule dans ses bajoues. S’il voit un ennemi,\nil dresse la queue."
        it:
          x: "Fa tentennare il nemico facendo brillare occhi e\npelliccia grazie a una sostanza fluorescente\ncontenuta nel suo corpo."
          y: "Attacca sparando i semi delle bacche che ha\naccumulato nelle guance. Se avvista il nemico,\ndrizza la coda."
        de:
          x: "Es kann mit einer körpereigenen Substanz seine\nAugen und seinen Torso aufleuchten lassen,\num Gegner zu erschrecken."
          y: "Bespuckt Gegner mit Kernen von Beeren aus\nseinen Backentaschen. Erspäht es einen Feind,\nrichtet es den Schweif auf."
        es:
          x: "Los componentes luminiscentes de su interior hacen\nque sus ojos y su cuerpo brillen, y así intimida a sus\nrivales."
          y: "Ataca lanzando las semillas de las bayas que acumula\nen sus mofletes. Su cola se tensa al avistar a un\nenemigo."
        ko:
          x: "체내의 발광물질로\n눈이나 몸을 빛나게 하여\n습격해 온 상대를 풀이 죽게 만든다."
          y: "뺨의 주머니에 모아둔 나무열매의\n씨앗을 날려서 공격한다. 적을\n발견하면 꼬리를 세운다."
