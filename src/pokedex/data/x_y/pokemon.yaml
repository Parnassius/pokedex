      descriptions:
        jp_kana:
          x: "なきごえを　きき　つづけると\nずつうが　おさまらなくなる。\nみえない　ほどの　はやさで　うごく。"
          y: "あまりに　こうそくで　うごくため\nすがたが　みえなくなる　ことがある。\nじゅえきに　あつまってくる。"
        jp_kanji:
          x: "鳴き声を　聞き続けると\n頭痛が　治まらなくなる。\n見えない　ほどの　速さで　動く。"
          y: "あまりに　高速で　動くため\n姿が　見えなくなる　ことがある。\n樹液に　集まってくる。"
        en:
          x: "Its cry leaves a lasting headache if heard for too\nlong. It moves so quickly that it is almost invisible."
          y: "Because it moves so quickly, it sometimes becomes\nunseeable. It congregates around tree sap."
        fr:
          x: "C’est la migraine assurée quand il pousse son cri\nperçant. On le perd facilement de vue tant il est vif."
          y: "Il bouge si vite que l’œil a parfois du mal à le suivre.\nLes Pokémon de cette espèce se regroupent près\nde la sève des arbres."
        it:
          x: "I suoi continui lamenti provocano atroci emicranie.\nSi sposta così velocemente che... non si vede!"
          y: "Si muove così in fretta da risultare quasi invisibile.\nLo si vede in gruppo attorno agli alberi ricchi di linfa."
        de:
          x: "Sein Gesang erzeugt unausweichlich Kopfweh.\nEs bewegt sich so schnell, dass es beinah\nunsichtbar zu sein scheint."
          y: "Es bewegt sich so schnell, dass es manchmal\nunsichtbar zu sein scheint. Es liebt Baumsaft."
        es:
          x: "Escuchar su zumbido de forma continuada provoca\njaquecas. Casi no se le ve de lo rápido que es."
          y: "Se mueve tan rápido que a veces resulta invisible.\nLe atrae la savia de los árboles."
        ko:
          x: "울음소리를 계속 들으면\n두통이 낫지 않게 된다.\n안 보일 정도의 스피드로 움직인다."
          y: "매우 고속으로 움직이므로\n모습이 보이지 않게 될 때가 있다.\n수액에 모여든다."
