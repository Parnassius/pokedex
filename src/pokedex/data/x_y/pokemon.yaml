          y: "こうそくで　ハネを　はばたかせると\nしょうげきは　が　はっせいして\nまわりの　まどガラスが　われていく。"
        jp_kanji:
          x: "顔を　動かさずに　３６０度\nすべてを　見渡す　目を　持つので\n真後ろの　獲物も　見逃さない。"
          y: "高速で　羽を　羽ばたかせると\n衝撃波が　発生して\nまわりの　窓ガラスが　割れていく。"
        en:
          x: "Its eyes can see 360 degrees without moving its\nhead. It won’t miss prey--even those behind it."
          y: "If it flaps its wings really fast, it can generate shock\nwaves that will shatter windows in the area."
        fr:
          x: "Il voit à 360° sans avoir à tourner la tête. Il ne loupe\njamais une proie, même dans son dos."
          y: "En battant des ailes très vite, il peut générer une\nviolente onde de choc qui peut briser les fenêtres."
        it:
          x: "Ha un campo visivo a 360 gradi senza muovere la\ntesta. Riesce a vedere persino le prede alle sue spalle."
          y: "Se agita le ali ad altissima velocità può generare onde\nche distruggono i vetri delle finestre nella zona."
        de:
          x: "Mit seinen Augen hat es einen Blickwinkel von\n360 Grad. Es sieht sogar Beute, die sich hinter ihm\nbefindet."
          y: "Schlägt es schnell mit den Flügeln, erzeugt es\nSchockwellen, durch die sogar Fenster zerbersten."
        es:
          x: "Su campo visual es de 360° sin girar la cabeza.\nDetecta hasta las presas que están a su espalda."
          y: "Si aletea muy rápido, genera ondas expansivas\ncapaces de hacer añicos todas las ventanas próximas."
        ko:
          x: "얼굴을 움직이지 않고 360도 전부\n볼 수 있는 눈을 가지고 있어서\n바로 뒤의 먹이도 놓치지 않는다."
          y: "고속으로 날개를 치면\n충격파가 발생해서\n주변의 유리창이 깨진다."
