      descriptions:
        jp_kana:
          x: "じゅもんを　となえる　ポケモン。\nあいてを　くるしめるもの　だけでなく\nしあわせにする　じゅもんも　ある。"
          y: "じゅもんの　ような　あやしい\nなきごえで　あいてを　くるしめる。\nしんしゅつきぼつの　ポケモン。"
        jp_kanji:
          x: "じゅもんを　唱える　ポケモン。\n相手を　苦しめるもの　だけでなく\n幸せにする　じゅもんも　ある。"
          y: "じゅもんの　ような　怪しい　鳴き声で\n相手を　苦しめる。\n神出鬼没の　ポケモン。"
        en:
          x: "It chants incantations. While they usually torment\ntargets, some chants bring happiness."
          y: "Its cries sound like incantations to torment the foe.\nIt appears where you least expect it."
        fr:
          x: "Il psalmodie des incantations. Ce sont souvent\ndes malédictions, mais certaines apportent la joie."
          y: "Un Pokémon insaisissable qui tourmente ses ennemis\navec son cri semblable à une incantation."
        it:
          x: "Recita incantesimi che tormentano il nemico.\nTuttavia, alcune formule portano felicità."
          y: "Tormenta i malcapitati con un verso simile a formule\nmagiche. Appare dovunque in qualsiasi momento."
        de:
          x: "Es spricht Beschwörungen. Viele lösen Schmerzen\naus, manche aber bringen Glück."
          y: "Sein bizarrer, bannfluchartiger Ruf quält seine Gegner.\nEs verschwindet so plötzlich, wie es auftaucht."
        es:
          x: "Recita cánticos. Algunos de ellos atormentan a sus\nrivales, mientras que otros producen felicidad."
          y: "Atormenta a sus rivales con gritos que parecen\nconjuros. Aparece en ocasiones y lugares imprevistos."
        ko:
          x: "주문을 외는 포켓몬이다.\n상대를 고통스럽게 하는 것뿐만\n아니라 행복하게 하는 주문도 있다."
          y: "주문 같은 수상한\n울음소리로 상대를 괴롭힌다.\n신출귀몰하는 포켓몬이다."
honchkrow:
  species_id: 430
