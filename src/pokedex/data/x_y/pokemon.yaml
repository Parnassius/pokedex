          x: "ジャングルの　おくちに　ウツボット\nばかり　いる　ちたいが　あって\nいったら　２どと　かえってこれない。"
          y: "たいないに　とりこまれた　ものは\nどんなに　かたくても　ようかいえきで\nあとかたなく　とかされてしまう。"
        jp_kanji:
          x: "ジャングルの　奥地に　ウツボット\nばかり　いる　地帯が　あって\n行ったら　２度と　帰ってこれない。"
          y: "体内に　取りこまれた　ものは\nどんなに　硬くても　溶解液で\n跡形なく　溶かされてしまう。"
        en:
          x: "Said to live in huge colonies deep in jungles,\nalthough no one has ever returned from there."
          y: "Once ingested into this Pokémon’s body,\neven the hardest object will melt into nothing."
        fr:
          x: "On dit qu’il vit en colonie dans la jungle, mais\npersonne n’en est jamais revenu vivant pour\nle confirmer."
          y: "Tout corps ingéré par ce Pokémon est\nsystématiquement dissous en bouillie."
        it:
          x: "Pare che viva in grandi colonie nel cuore della giungla,\nma nessuno è mai tornato da lì per raccontarlo."
          y: "Anche l’oggetto più resistente si scioglie non appena\nviene ingerito da questo Pokémon."
        de:
          x: "Dieses Pokémon soll in großen Kolonien\ntief im Dschungel leben, doch niemand\nkann dies bestätigen."
          y: "Selbst die härtesten Objekte werden zersetzt,\nwenn der Körper sie erst aufgenommen hat."
        es:
          x: "Dicen que vive en grandes colonias en el interior de\nlas junglas, aunque nadie ha podido verificarlo."
          y: "Cuando este Pokémon ingiere algo, incluso el objeto\nmás duro se disolverá al instante."
        ko:
          x: "정글의 안쪽에 우츠보트만\n있는 지대가 있어서\n한 번 가면 두 번 다시 돌아올 수 없다."
          y: "체내로 거둬들인 것은\n아무리 단단할지라도 용해액으로\n흔적도 없이 녹여버린다."
tentacool:
  species_id: 72
  names:
    jp_kana: メノクラゲ
    jp_kanji: メノクラゲ
    en: Tentacool
    fr: Tentacool
    it: Tentacool
