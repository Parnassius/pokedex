          x: "ほほの　しんどうまくを　ふるわせ\nひとには　きこえない　おんぱを　だし\nなかまたちに　きけんを　つたえる。"
          y: "ほほを　しんどうさせて　ひとには\nきこえない　おんぱを　だす。\nおんぱの　リズムで　かいわする。"
        jp_kanji:
          x: "ほほの　振動膜を　震わせ\n人には　きこえない　音波を　だし\n仲間たちに　危険を　伝える。"
          y: "ほほを　振動させて\n人には　聞こえない　音波を　出す。\n音波の　リズムで　会話する。"
        en:
          x: "By vibrating its cheeks, it emits sound waves\nimperceptible to humans and warns others\nof danger."
          y: "By vibrating its cheeks, it emits sound waves\nimperceptible to humans. It uses the rhythm of\nthese sounds to talk."
        fr:
          x: "Il fait vibrer ses joues pour émettre des sons\ninaudibles pour les humains et alerter ses semblables\ndes dangers."
          y: "Il fait vibrer ses joues pour émettre des sons\nimperceptibles pour l’homme. Il communique grâce\nà leur rythme."
        it:
          x: "Fa vibrare le membrane sulle guance per emettere\nonde sonore impercettibili agli umani con cui\nsegnala un pericolo."
          y: "Facendo vibrare le guance, emette onde sonore\nche gli uomini non sentono. Conversa al ritmo di\nqueste onde."
        de:
          x: "Erzeugt mit seinen Wangen für Menschen\nunhörbare Schallwellen, um Artgenossen\nvor Gefahr zu warnen."
          y: "Erzeugt mit seinen Wangen für Menschen unhörbare\nSchallwellen. Es verständigt sich über den Rhythmus\ndieser Wellen."
        es:
          x: "Emite sonidos imperceptibles para los humanos con la\nvibración de sus mejillas y advierte de algún peligro a\nlos suyos."
          y: "Emite sonidos imperceptibles para los humanos\ncon la vibración de sus mejillas y se comunica\ncon el ritmo de los mismos."
        ko:
          x: "볼의 진동막을 떨어\n사람에게는 들리지 않는 음파를 내어\n동료에게 위험을 전달한다."
          y: "볼을 진동시켜서 사람에게는\n들리지 않는 음파를 낸다.\n음파의 리듬으로 대화를 나눈다."
