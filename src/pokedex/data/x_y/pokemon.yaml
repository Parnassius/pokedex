        jp_kana:
          x: "しんぞうの　こどうが　はやく\nぜんしんの　ちが　たぎっているため\n１びょうも　じっと　していられない。"
          y: "からだを　うごかして　いないと\nストレスが　たまり　すぎて\nぐあいが　わるくなって　しまうのだ。"
        jp_kanji:
          x: "心臓の　鼓動が　速く\n全身の　血が　たぎっているため\n１秒も　じっと　していられない。"
          y: "体を　動かしていないと\nストレスが　たまりすぎて\n具合が　悪くなって　しまうのだ。"
        en:
          x: "Its heartbeat is fast and its blood so agitated that\nit can’t sit still for one second."
          y: "Its stress level rises if it cannot keep moving\nconstantly. Too much stress makes it feel sick."
        fr:
          x: "Son cœur bat tellement vite que son sang bout dans\nses veines, l’empêchant de rester immobile même\nune seconde."
          y: "Quand il ne bouge pas, il accumule du stress et\ndevient très irritable."
        it:
          x: "I battiti del suo cuore sono rapidissimi e il suo\nsangue scorre con tale impeto che non riesce a\nstare fermo un istante."
          y: "Quando è costretto a stare fermo raggiunge un tale\nlivello di stress da farne una malattia."
        de:
          x: "Sein Puls ist konstant so hoch, dass sein Blut\nimmer in Wallung ist und es keine Sekunde\nstillhalten kann."
          y: "Würde es sich nicht bewegen, würde sein Stress\nunerträglich und es ginge ihm augenblicklich\nschlechter."
        es:
          x: "Su corazón palpita a un ritmo frenético, haciendo que\nsu sangre bulla, así que no puede estarse quieto ni un\nsegundo."
          y: "Si no puede estar en continuo movimiento, su nivel\nde estrés se dispara y puede llegar a enfermar."
        ko:
          x: "심장 박동이 빨라 전신의\n피가 끓어오르고 있기 때문에\n1초도 가만히 있지 못한다."
          y: "몸을 움직이지 않으면\n스트레스가 너무 쌓여서\n상태가 나빠져 버린다."
slaking:
