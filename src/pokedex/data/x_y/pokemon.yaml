        jp_kana:
          x: "どんどん　そだっては　はえかわる\nあたまの　さきは　きれいなので\nたからもの　として　にんきがたかい。"
          y: "みなみの　きれいな　うみをこのむ。\nよごれた　うみだと　サンゴの　えだは\nいろがくすみ　ボロボロになるのだ。"
        jp_kanji:
          x: "どんどん　育っては　生えかわる\n頭の　先は　きれいなので\n宝物として　人気が高い。"
          y: "南の　きれいな　海を好む。\n汚れた　海だと　サンゴの　枝は\n色がくすみ　ボロボロになるのだ。"
        en:
          x: "It continuously sheds and grows. The tip of its head\nis prized as a treasure because of its beauty."
          y: "They prefer unpolluted southern seas. Their coral\nbranches lose their color and deteriorate in\ndirty water."
        fr:
          x: "Il grandit en permanence. Les exquises excroissances\nde sa tête sont très recherchées."
          y: "On le trouve souvent dans les mers claires du sud.\nL’eau polluée décolore son corail et le fait dépérir."
        it:
          x: "Muta la pelle e cresce di continuo. La punta che\nha sul capo è un simbolo della sua bellezza."
          y: "Preferisce i limpidi mari del sud. In quelli inquinati,\ninvece, i suoi coralli si logorano e perdono il loro\ncolore."
        de:
          x: "Es häutet sich ständig und wächst. Seine Kopfspitze\nwurde als Schatz der Schönheit ausgezeichnet."
          y: "Hält sich lieber in den sauberen Seen im Süden auf.\nSeine Korallenarme verlieren in verschmutztem Wasser\nFarbe und Form."
        es:
          x: "Crece y muda continuamente. La parte superior de su\ncabeza es muy apreciada por su belleza."
          y: "Adoran las aguas cristalinas de los mares del sur, pues\nsu coral pierde color y se deteriora en aguas sucias."
        ko:
          x: "점점 자라면서 다시 돋아나는\n머리의 끝이 아름다워\n보물로서 인기가 많다."
          y: "남쪽의 깨끗한 바다를 좋아한다.\n더러운 바다면 산호 가지는\n색이 거무스레해지고 엉망이 된다."
remoraid:
