      descriptions:
        jp_kana:
          x: "はっぱを　かみきり　くちから　だす\nねんちゃくいとで　ぬいあわせて\nじぶんで　ふくを　つくる　ポケモン。"
          y: "はっぱから　ふくを　つくるので\nファッションデザイナーから\nマスコットとして　にんきがある。"
        jp_kanji:
          x: "葉っぱを　かみ切り　口から　出す\n粘着糸で　縫い合わせる。\n自分で　服を　作る　ポケモン。"
          y: "葉っぱから　服を　つくるので\nファッションデザイナーから\nマスコットとして　人気がある。"
        en:
          x: "This Pokémon makes clothes for itself. It chews up\nleaves and sews them with sticky thread extruded\nfrom its mouth."
          y: "Since this Pokémon makes its own clothes out of\nleaves, it is a popular mascot for fashion designers."
        fr:
          x: "Il fait des vêtements en découpant des feuilles et\nen les cousant avec le fil adhésif qu’il sécrète par\nla bouche."
          y: "La mascotte des créateurs de mode. Il découpe\nses vêtements dans les feuilles qu’il trouve."
        it:
          x: "Si prepara da sé i vestiti, tagliando le foglie e usando\ni fili viscosi che secerne dalla bocca per cucirli."
          y: "Taglia le foglie per farne vestiti. Per questo motivo\nè la mascotte preferita di molti stilisti."
        de:
          x: "Schneidert sich ein Kleid, indem es sich Blätter\nzurechtbeißt und sie mit Klebefäden aus seinem\nMund zusammennäht."
          y: "Unter Modeschöpfern gilt es als beliebtes\nMaskottchen, da es sich aus Blättern\nKleidchen schneidert."
        es:
          x: "Recorta hojas y las teje con el líquido viscoso que\nsegrega por la boca para hacerse su propia ropa."
          y: "Usa hojas como material para fabricar su propia ropa,\npor lo que los diseñadores más famosos los tienen\ncomo mascota."
        ko:
          x: "잎사귀를 물어뜯어\n입에서 뱉어낸 점착실로 꿰맨다.\n스스로 옷을 만드는 포켓몬이다."
          y: "잎사귀로 옷을 만들기 때문에\n패션 디자이너에게\n마스코트로 인기가 있다."
swadloon:
