      descriptions:
        jp_kana:
          x: "やまを　まるごと　なわばりに　する。\nキズが　おおい　ボスゴドラほど\nたたかっているので　あなどれない。"
          y: "はがねの　ツノで　かたい　がんばんを\nつきくずしながら　しょくりょうの\nてつを　さがして　トンネルを　ほる。"
        jp_kanji:
          x: "山を　まるごと　縄張りに　する。\n傷が　多い　ボスゴドラほど\n戦っているので　侮れない。"
          y: "鋼の　ツノで　硬い　岩盤を\n突き崩しながら　食料の\n鉄を　探して　トンネルを　掘る。"
        en:
          x: "It claims an entire mountain as its own.\nThe more wounds it has, the more it has battled,\nso don’t take it lightly."
          y: "While seeking iron for food, it digs tunnels by\nbreaking through bedrock with its steel horns."
        fr:
          x: "Il établit son territoire sur toute une montagne.\nSes cicatrices indiquent son expérience : plus il en a,\nplus il est fort !"
          y: "Il creuse des galeries à travers la pierre avec ses\ncornes d’acier pour trouver le fer qu’il apprécie."
        it:
          x: "Sceglie come territorio intere montagne. Se ha tante\ncicatrici sul suo corpo, è meglio non scherzare con lui."
          y: "Cerca ferro da mangiare scavando tunnel nella roccia\ncon le sue corna d’acciaio."
        de:
          x: "Ihre Reviere erstrecken sich über ganze Gebirge.\nStolloss, die mit Narben übersät sind, sollte man\nbesser meiden."
          y: "Auf der Suche nach Eisen, seiner Nahrung, gräbt es\nmit seinen Stahlhörnern sogar Tunnel durch Felsen."
        es:
          x: "Hacen de toda una montaña su territorio. Cuantas más\ncicatrices tienen, más curtidos en disputas. ¡Mucha\natención!"
          y: "Mientras busca hierro para comer, excava túneles en\nla roca con sus potentes cuernos de acero."
        ko:
          x: "산을 통째로 영역으로 한다.\n상처가 많은 보스로라일수록\n많이 싸웠다는 것이므로 얕볼 수 없다."
          y: "강철의 뿔로 단단한 암반을\n무너뜨리며 식량이 되는\n철을 찾아서 터널을 판다."
