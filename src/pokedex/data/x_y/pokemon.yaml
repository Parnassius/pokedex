          y: "After it has eaten up all the food in its territory,\nit moves to another area. Its two heads do not\nget along."
        fr:
          x: "Ses deux têtes s’entendent mal et sont en\ncompétition permanente pour savoir qui mangera le\nplus et qui sera le chef."
          y: "Quand il a mangé tout ce qui traînait sur son territoire,\nil migre vers d’autres horizons. Ses 2 têtes\ns’entendent mal."
        it:
          x: "Le due teste non vanno d’accordo e si contendono la\nposizione di comando in base a quale mangia di più."
          y: "Quando ha consumato tutto il cibo di un territorio, si\nsposta altrove. Le sue due teste non vanno d’accordo."
        de:
          x: "Seine zwei Köpfe sind sich spinnefeind.\nBeide versuchen, über Fresswettbewerbe\ndie Oberhand zu gewinnen."
          y: "Wenn es sein Revier leergejagt hat, sucht es sich ein\nneues. Seine beiden Köpfe liegen ständig im Streit."
        es:
          x: "Sus dos cabezas se llevan fatal, y la que consigue\ncomer más que la otra es la que lleva la voz cantante."
          y: "Cambia de morada siempre que termina con la comida\nde una zona. Sus dos cabezas se llevan fatal."
        ko:
          x: "2개의 머리는 사이가 나빠서\n상대보다 많이 먹는 것으로\n주도권을 잡으려고 한다."
          y: "영역 안의 먹이를 다 먹어치우면\n다른 지역으로 이동한다.\n두 머리는 사이가 나쁘다."
