          x: "If it finds honey, its crescent mark glows. It always\nlicks its paws because they’re soaked with honey."
          y: "Before food becomes scarce in wintertime, its habit\nis to hoard food in many hidden locations."
        fr:
          x: "Sa marque en forme de lune brille quand il trouve\ndu miel. Il lèche ses pattes qui en sont toujours\ncouvertes."
          y: "Il se fait des réserves de nourriture dans des\ncachettes avant l’arrivée de l’hiver."
        it:
          x: "Se trova del miele la sua mezzaluna diventa più\nluminosa. Si lecca le zampe intrise di miele."
          y: "Per prepararsi all’inverno, è sua abitudine accumulare\nil cibo in diversi nascondigli."
        de:
          x: "Findet es Honig, leuchtet die Sichel auf seinem\nKopf. Es leckt oft seine mit Honig bedeckten Pfoten."
          y: "Steht der Winter vor der Türe, hortet es Nahrung\nan vielen verschiedenen, nur ihm bekannten Orten."
        es:
          x: "Si encuentra miel, brillará la marca de su frente.\nSe lame las garras cuando están llenas de miel."
          y: "Antes de que la comida escasee en invierno, tiene\npor costumbre ocultar comida en lugares secretos."
        ko:
          x: "꿀을 발견하면 초승달 모양이\n빛난다. 달콤한꿀이 배어든\n손바닥을 항상 핥고 있다."
          y: "먹이가 줄어드는 겨울 전에\n이곳저곳에 먹을 것을 숨겨두는\n습성을 지니고 있다."
ursaring:
  species_id: 217
  names:
    jp_kana: リングマ
    jp_kanji: リングマ
    en: Ursaring
    fr: Ursaring
    it: Ursaring
