          y: "おくびょうな　せいかく。\nおどろくと　せなかの　ほのおが\nいちだんと　つよく　もえあがる。"
        jp_kanji:
          x: "臆病で　いつも　体を　まるめている。\n襲われると　背中の　炎を\n燃え上がらせて　身を守る。"
          y: "臆病な　性格。\n驚くと　背中の　炎が\n一段と　強く　燃え上がる。"
        en:
          x: "It is timid and always curls itself up in a ball.\nIf attacked, it flares up its back for protection."
          y: "It has a timid nature. If it is startled, the flames on\nits back burn more vigorously."
        fr:
          x: "Il est timide et se roule en boule pour se protéger.\nAttaqué, il s’enflamme le dos pour riposter."
          y: "Ce Pokémon est un grand timide. Les flammes sur\nson dos s’intensifient lorsqu’il prend peur."
        it:
          x: "Spesso se ne sta appallottolato giacché timido. Se\nè attaccato, si difende infuocando il dorso."
          y: "È riservato per natura. Se viene spaventato, le\nfiamme sul suo dorso bruciano ardentemente."
        de:
          x: "Es ist ruhig und kugelt sich stets zusammen.\nZum Schutz entflammt es seinen Rücken."
          y: "Erschrickt sich dieses scheue Pokémon,\nlodern die Flammen auf seinem Rücken kräftiger."
        es:
          x: "Es tímido y siempre se enrosca como una pelota.\nSi es atacado, enciende su lomo para protegerse."
          y: "Es un Pokémon muy tímido. Si se asusta, las llamas\nde su lomo arden con más fuerza."
        ko:
          x: "겁이 많아서 늘 몸을 웅크리고\n있다. 습격당하면 등의 불꽃을\n타오르게 해서 몸을 보호한다."
          y: "겁쟁이 같은 성격이다.\n놀라면 등의 불꽃이\n한층 더 강하게 타오른다."
quilava:
