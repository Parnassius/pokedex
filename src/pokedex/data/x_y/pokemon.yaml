          y: "さばくの　たびびとの　うしろを\nしゅうだんで　つきまとい　つかれて\nうごけなく　なるのを　まつのだ。"
        jp_kanji:
          x: "夜になると　活動を　はじめる。\n砂漠の　暑さに　疲れ果てた\n獲物を　見つけ出し　捕らえるのだ。"
          y: "砂漠の　旅人の　後ろを\n集団で　つきまとい　疲れて\n動けなく　なるのを　待つのだ。"
        en:
          x: "It becomes active at night, seeking prey that is\nexhausted from the day’s desert heat."
          y: "Packs of them follow travelers through the desert\nuntil the travelers can no longer move."
        fr:
          x: "Il sort la nuit pour chasser. Il traque les proies\népuisées après une journée dans le désert."
          y: "Les Cacturne traquent en groupe les voyageurs du\ndésert, guettant les signes de fatigue pour frapper."
        it:
          x: "Diventa attivo di notte, quando va a caccia di\nprede stremate dalla calura del deserto."
          y: "Gruppi di Cacturne nel deserto braccano i passanti\nfinché questi, spossati, non si muovono più."
        de:
          x: "Ein nachtaktives Pokémon, das Beute sucht, die durch\ndie Tageshitze der Wüste bereits erschöpft ist."
          y: "Gruppen von Noktuska folgen müden Wüstenreisenden\nund warten, bis diese bewegungsunfähig werden."
        es:
          x: "Es un Pokémon nocturno. Busca presas agotadas por\nel calor diurno del desierto."
          y: "Persiguen en grupo a los viajeros del desierto y los\nacechan hasta que el cansancio los agote."
        ko:
          x: "밤이 되면 활동을 시작한다.\n사막의 뜨거움에 몹시 지친\n먹이를 찾아내어 붙잡는다."
          y: "사막의 여행자 뒤를\n집단으로 뒤쫓아 가 지쳐\n움직이지 못하기를 기다린다."
