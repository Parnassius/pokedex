        jp_kana:
          x: "きょうりょくな　サイコパワーの\nえいきょうで　くうかんが　ねじれて\nしゅういに　ほしぞらが　うつるのだ。"
          y: "ほしの　ばしょや　うごきから\nみらいの　できごとを　よちする。\nトレーナーの　じゅみょうも　みえる。"
        jp_kanji:
          x: "強力な　サイコパワーの　影響で\nゴチルゼルの　周囲の　空間が　ねじれ\n何万光年も　遠くの　星空が　映る。"
          y: "星の　配置や　動きから　未来の\nできごとを　予知する　能力を　持つ。\nトレーナーの　寿命も　見える。"
        en:
          x: "Starry skies thousands of light-years away are\nvisible in the space distorted by their intense\npsychic power."
          y: "They can predict the future from the placement and\nmovement of the stars. They can see Trainers’\nlife spans."
        fr:
          x: "Ses pouvoirs psychiques plient l’espace aux\nalentours. On y voit des étoiles éloignées de millions\nd’années-lumière."
          y: "Prédit l’avenir à partir de la position et du mouvement\ndes étoiles. Perçoit aussi l’espérance de vie des\nDresseurs."
        it:
          x: "I suoi forti poteri psichici modificano lo spazio\ncircostante rendendo visibili galassie lontane\nmilioni di anni luce."
          y: "Prevede il futuro dalla posizione e dal movimento\ndelle stelle. Conosce anche la durata della vita\ndell’Allenatore."
        de:
          x: "Durch seine mächtigen Psycho-Kräfte krümmt sich\nder Raum und Bilder eines Lichtjahre entfernten\nOrtes erscheinen."
          y: "Kann anhand der Sternenkonstellationen die Zukunft\nvoraussagen. Es weiß sogar, wie alt sein Trainer\nwerden wird."
        es:
          x: "Su inmenso poder psíquico distorsiona el espacio y\nle permite reflejar incluso estrellas a años luz de\ndistancia."
          y: "Predice el futuro analizando la posición de los astros\ny su movimiento. Conoce la esperanza de vida de los\nEntrenadores."
        ko:
          x: "강력한 사이코 파워의 영향으로\n고디모아젤 주변 공간이 비틀어져\n몇만 광년이나 떨어진 하늘의 별이 비친다."
          y: "별의 배치나 움직임으로 미래의\n일을 예지하는 능력을 가지고 있다.\n트레이너의 수명도 알 수 있다."
solosis:
