          y: "もりや　くさむらに　せいそく。\nてきに　おそわれた　ときは　おしりの\nどくの　トゲで　たいこうする。"
        jp_kanji:
          x: "葉っぱが　大好物。\nムックルに　襲われたときは\nお尻の　トゲで　撃退する。"
          y: "森や　草むらに　生息。\n敵に　襲われた　ときは　お尻の\n毒の　トゲで　対抗する。"
        en:
          x: "It loves to eat leaves. If it is attacked by a Starly,\nit will defend itself with its spiked rear."
          y: "It lives among the tall grass and in forests. It repels\nattacks by raising up the spikes on its rear."
        fr:
          x: "Il adore manger des feuilles. Si un Étourmi l’attaque,\nil riposte avec les piquants de son postérieur."
          y: "Il habite les forêts et les hautes herbes. Attaqué,\nil riposte avec les piquants de son postérieur."
        it:
          x: "Ama mangiare le foglie. Se Starly lo attacca, si\ndifende con gli aculei che ha sulla parte posteriore."
          y: "Vive nelle foreste e tra l’erba alta. Se è attaccato,\nusa gli aculei velenosi che ha sulla parte posteriore."
        de:
          x: "Es isst am liebsten Blätter. Wird es von einem\nStaralili angegriffen, verteidigt es sich mit Stacheln."
          y: "Es haust in Wäldern und auf Wiesen. Bei Angriffen\nwehrt es sich mit den Giftstacheln auf seinem\nHinterteil."
        es:
          x: "Le encanta comer hojas. Si le ataca un Starly, se\ndefenderá con sus púas."
          y: "Vive en bosques y zonas de hierba alta. Si le atacan,\nse defiende con las púas venenosas de su cola."
        ko:
          x: "잎사귀를 매우 좋아한다.\n찌르꼬에게 습격당했을 때는\n엉덩이의 가시로 물리친다."
          y: "숲과 수풀에 서식한다.\n적에게 습격당했을 때는 엉덩이의\n독가시로 대항한다."
