        - bad_dreams
      descriptions:
        jp_kana:
          x: "ふかい　ねむりに　さそう　ちからで\nひとや　ポケモンに　あくむを　みせて\nじぶんの　なわばりから　おいだす。"
          y: "ひとびとを　ふかい　ねむりに　さそい\nゆめを　みせる　のうりょくを　もつ。\nしんげつの　よるに　かつどうする。"
        jp_kanji:
          x: "深い　眠りに　誘う　力で\n人や　ポケモンに　悪夢を　見せて\n自分の　縄張りから　追い出す。"
          y: "人々を　深い　眠りに　誘い\n夢を　見せる　能力を　持つ。\n新月の　夜に　活動する。"
        en:
          x: "It chases people and Pokémon from its territory by\ncausing them to experience deep,\nnightmarish slumbers."
          y: "It can lull people to sleep and make them dream.\nIt is active during nights of the new moon."
        fr:
          x: "Il endort humains et Pokémon, et leur fait avoir\ndes cauchemars pour les chasser de son territoire."
          y: "Il a la capacité de bercer les gens pour les faire rêver.\nIl se montre durant les nuits de nouvelle lune."
        it:
          x: "Respinge umani e Pokémon dal suo territorio\ninducendoli a un sonno profondo e provocando incubi."
          y: "Ha l’abilità di far addormentare la gente e farla\nsognare. È attivo nelle notti di luna nuova."
        de:
          x: "Es vertreibt Eindringlinge aus seinem Revier,\nindem es sie in Schlaf versetzt und mit\nAlpträumen quält."
          y: "Es kann andere in Schlaf versetzen und ihnen\nTräume geben. Es ist nur bei Neumond aktiv."
        es:
          x: "Defiende su territorio de personas y Pokémon\nhaciéndoles dormir y provocándoles pesadillas."
          y: "Puede adormecer a la gente y hacerles soñar. Está\nactivo en las noches de luna nueva."
        ko:
          x: "깊은 잠으로 끌어들이는 힘으로\n사람과 포켓몬에게 악몽을 꾸게 해\n자신의 영역에서 쫓아낸다."
          y: "사람들을 깊은 잠으로 끌어들여\n꿈을 꾸게 하는 능력을 가지고 있다.\n그믐달이 뜨는 밤에 활동한다."
