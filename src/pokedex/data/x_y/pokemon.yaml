          x: "The older it gets, the longer it grows.\nAt night, it wraps its long body around\ntree branches to rest."
          y: "Moving silently and stealthily, it eats the eggs of\nbirds, such as Pidgey and Spearow, whole."
        fr:
          x: "Plus il est âgé, plus son corps est long. Il se love\nautour des arbres pour se reposer."
          y: "Il se déplace en silence pour dévorer des œufs de\nRoucool ou de Piafabec."
        it:
          x: "Con il tempo si fa sempre più lungo. La notte avvolge\nil suo corpo attorno a qualche ramo per dormire."
          y: "Si muove in modo silenzioso e furtivo. Si nutre di uova\ndi uccelli come Pidgey e Spearow, che ingoia intere."
        de:
          x: "Mit dem Alter wird der Körper dieses Pokémon\nimmer länger. Es schläft um Äste gewickelt."
          y: "Dieses Pokémon kann sich lautlos bewegen.\nSeine Nahrung sind die Eier von Vogel-Pokémon."
        es:
          x: "Cuanto más viejo, más crece este Pokémon. Por la\nnoche, descansa en las ramas de los árboles."
          y: "Es muy silencioso y cauteloso. Come huevos de\npájaros como los de Pidgey y Spearow."
        ko:
          x: "성장할수록 점점 길어진다.\n밤에는 나뭇가지에\n몸을 돌돌 말고 쉰다."
          y: "전혀 기척을 느끼지 못하게\n이동한다. 구구와 깨비참의\n알을 통째로 삼켜버린다."
