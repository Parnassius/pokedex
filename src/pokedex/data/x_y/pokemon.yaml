        jp_kanji:
          x: "コマのように　回転しながら　戦う。\n遠心力の　パワーで\n破壊力は　１０倍だ。"
          y: "踊るように　華麗で　滑らかな\nキック技に　見とれていると\nきつい　一撃を　お見舞いされる。"
