        jp_kana:
          x: "ふだんは　いけに　すんでいるが\nゆうだちの　あとには　まちなかの\nみずたまりに　すがたを　あらわす。"
          y: "すいめんを　すべるように　あるく。\nあたまの　さきから　あまい　においを\nだして　えものを　さそう。"
        jp_kanji:
          x: "普段は　池に　住んでいるが\n夕立の　後には　街中の\n水たまりに　姿を　現す。"
          y: "水面を　滑るように　歩く。\n頭の　先から　甘い　においを\n出して　獲物を　誘う。"
        en:
          x: "They usually live on ponds, but after an evening\nshower, they may appear on puddles in towns."
          y: "It appears as if it is skating on water. It draws prey\nwith a sweet scent from the tip of its head."
        fr:
          x: "Ils vivent généralement dans les étangs mais, après\ndes averses passagères, on peut en trouver dans\ndes flaques au milieu des villes."
          y: "Il semble patiner sur l’eau. Le parfum diffusé par\nle sommet de sa tête sert à attirer ses proies."
        it:
          x: "Normalmente vivono negli stagni, ma dopo un\nacquazzone è possibile trovarli anche in città,\nnelle pozzanghere."
          y: "Cammina a pelo d’acqua. Dall’aculeo sulla testa\nemana un dolce aroma con cui attira le prede."
        de:
          x: "Normalerweise leben sie in Teichen, aber nach\neinem Schauer am Abend kann man sie auch in\nPfützen in den Städten finden."
          y: "Scheinbar reitet es auf dem Wasser. Es lockt seine\nBeute mit einem süßen Duft an."
        es:
          x: "Vive en estanques, pero cuando se desata una\ntormenta puede aparecer en los charcos que se\nforman en las ciudades."
          y: "Parece que patina sobre el agua. Atrae a las presas\ncon el suave aroma de su cabeza."
        ko:
          x: "보통은 연못에서 살고 있지만\n소나기가 온 뒤에는 마을 안의\n물웅덩이에 모습을 드러낸다."
          y: "수면을 미끄러지듯이 걷는다.\n머리끝에서 달콤한 냄새를\n내어 먹이를 끌어들인다."
masquerain:
