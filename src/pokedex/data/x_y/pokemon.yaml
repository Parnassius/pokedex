          y: "てのひらが　みずかきに　なっていて\nおよぐのが　とくい。みずうみなどで\nゆうがな　すがたが　みかけられる。"
        jp_kanji:
          x: "夕暮れ　水辺に　姿をみせる。\n額が　あやしく　光るとき\n神通力を　使いこなすという。"
          y: "手のひらが　水かきに　なっていて\n泳ぐのが　得意。湖などで\n優雅な　姿が　見かけられる。"
        en:
          x: "It appears by waterways at dusk.\nIt may use telekinetic powers\nif its forehead glows mysteriously."
          y: "The forelegs are webbed, helping to make it an\nadept swimmer. It can be seen swimming elegantly\nin lakes, etc."
        fr:
          x: "Il apparaît dans les étendues d’eau au crépuscule.\nSi son front brille, il se sert de sa télékinésie."
          y: "Ses pattes arrière palmées font de ce Pokémon\nun excellent nageur. On peut souvent le voir nager\nélégamment dans les lacs."
        it:
          x: "Appare presso i corsi d’acqua col buio. Acquisisce\npoteri telecinetici se la sua fronte diventa\nincandescente."
          y: "Le zampe anteriori palmate ne fanno un elegante\nnuotatore, che si può incontrare nei laghi e in altri\nspecchi d’acqua."
        de:
          x: "Es taucht bei Sonnenuntergang am Wasser auf.\nLeuchtet seine Stirn, setzt es telekinetische Kräfte ein."
          y: "Seine Vorderbeine besitzen Schwimmhäute, um es\nperfekt ans Wasser anzupassen. Daher schwimmt es\nelegant in Flüssen."
        es:
          x: "Aparece en ríos al anochecer. Puede usar poderes\ntelequinéticos si su frente brilla misteriosamente."
          y: "Las patas traseras palmípedas le permiten nadar. Es\ncomún verlo chapotear con estilo en lagos y otras\nzonas acuáticas."
        ko:
          x: "해 질 무렵 강가에 모습을 나타낸다.\n이마가 이상하게 빛날 때\n신통력을 발휘한다고 전해진다."
          y: "손바닥이 물갈퀴로 되어 있어\n헤엄을 잘 친다. 호수 등에서\n우아한 모습을 볼 수 있다."
mankey:
