          y: "ちてい　おくふかくで　うまれる。\nまわりの　つちを　たいらげると\nちじょうに　あらわれ　サナギになる。"
        jp_kanji:
          x: "土を　食べて　生きている。\n大きな　山ひとつ　食べ終わると\n成長のため　眠りはじめる。"
          y: "地底　奥深くで　生まれる。\nまわりの　土を　たいらげると\n地上に　現われ　サナギになる。"
        en:
          x: "It feeds on soil. After it has eaten a large mountain,\nit falls asleep so it can grow."
          y: "Born deep underground, it comes aboveground and\nbecomes a pupa once it has finished eating the\nsurrounding soil."
        fr:
          x: "Il se nourrit de terre. Une fois qu’il a absorbé une\nmontagne, il s’endort et commence à évoluer."
          y: "Il vit très profond sous terre. Il n’en sort pour évoluer\nqu’après avoir dévoré tout ce qui l’entourait."
        it:
          x: "Si nutre di terra. Dopo aver divorato una montagna\nintera, si addormenta per poter crescere."
          y: "Nasce nelle profondità del sottosuolo. Dopo aver\ndivorato la terra circostante emerge in superficie e\ndiventa crisalide."
        de:
          x: "Es ernährt sich von Erde. Nachdem es einen Berg\nverspeist hat, schläft es ein, um zu wachsen."
          y: "Sie schlüpfen tief unter der Erde und fressen sich\ndurch das Erdreich bis zur Oberfläche durch,\nwo sie sich verpuppen."
        es:
          x: "Se alimenta de tierra. Después de comer una gran\nmontaña, se duerme y empieza a crecer."
          y: "Nace muy profundo en el suelo y sube a la superficie,\ndonde se convierte en una larva comiéndose la tierra\nque lo rodea."
        ko:
          x: "흙을 먹으며 살고 있다.\n큰 산을 하나 다 먹으면\n성장을 위해 잠자기 시작한다."
          y: "땅속 깊은 곳에서 태어난다.\n주변의 흙을 다 먹으면\n지상으로 올라와 번데기가 된다."
