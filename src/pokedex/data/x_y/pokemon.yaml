        jp_kana:
          x: "ゆうがな　みかけに　よらず\nつばさで　ちからづよく　はばたき\nすうせんキロ　とびつづけられる。"
          y: "よあけと　ともに　スワンナたちは\nおどりはじめる。まんなかで　おどる\nスワンナが　むれの　リーダー。"
        jp_kanji:
          x: "優雅な　みかけに　よらず\n翼で　力強く　羽ばたき\n数千キロ　飛び続けられる。"
          y: "夜明けと　ともに　スワンナたちは\n踊りはじめる。真ん中で　踊る\nスワンナが　群れの　リーダー。"
        en:
          x: "Despite their elegant appearance, they can flap\ntheir wings strongly and fly for thousands of miles."
          y: "Swanna start to dance at dusk. The one dancing in\nthe middle is the leader of the flock."
        fr:
          x: "Un Pokémon gracieux, mais aussi robuste. Il peut\nvoler des milliers de kilomètres grâce à ses ailes\npuissantes."
          y: "Ils se mettent à danser à la tombée de la nuit.\nLe Lakmécygne qui danse au centre est le chef de\nla troupe."
        it:
          x: "Non è solo elegante. Con il poderoso battito d’ali\nriesce a volare per migliaia di chilometri senza fermarsi."
          y: "Gli Swanna iniziano a ballare quando sorge il sole.\nIl capo del gruppo balla sempre al centro."
        de:
          x: "Sie wirken zerbrechlich, aber ihre starken Schwingen\ntragen sie in einem Stück bis zu 1 000 km weit."
          y: "Wenn der Morgen dämmert, fangen sie an zu tanzen.\nDas Swaroness in der Mitte führt die Gruppe an."
        es:
          x: "Aunque no lo parezca por su grácil elegancia, puede\nbatir con fuerza las alas y volar durante miles de\nkilómetros."
          y: "Comienzan a danzar al amanecer. El líder de la\nbandada se sitúa en el centro."
        ko:
          x: "우아한 외모와 다르게\n날개로 힘차게 날개 치며\n수천 km를 계속 날 수 있다."
          y: "새벽이 오면 스완나들이\n춤추기 시작한다. 한가운데에서 춤추는\n스완나가 무리의 우두머리다."
vanillite:
