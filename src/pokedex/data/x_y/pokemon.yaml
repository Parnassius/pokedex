          y: "ひとたび　ちを　すいはじめると\nまんぷくに　なるまで　やめない。\nくらやみを　とび　えものを　さがす。"
        jp_kanji:
          x: "かみついたら　最後。死ぬほど\n血を　吸いまくるので　重たくなって\n自分で　飛べなくなることもある。"
          y: "ひとたび　血を　吸いはじめると\n満腹になるまで　やめない。\n暗闇を　飛び　獲物を　探す。"
        en:
          x: "Once it bites, it will not stop draining energy\nfrom the victim even if it gets too heavy to fly."
          y: "Once it starts sucking blood, it does not stop until\nit is full. It flies at night in search of prey."
        fr:
          x: "Il mord son adversaire et absorbe toute son énergie,\nmême s’il devient trop lourd pour voler."
          y: "Quand il se met à sucer du sang, il ne s’arrête\nqu’une fois rassasié. C’est un chasseur nocturne."
        it:
          x: "Quando attacca, non smette di succhiare l’energia\ndella vittima, fino a diventare troppo pesante\nper volare."
          y: "Quando inizia a succhiare sangue, non smette finché\nnon è sazio. Vola di notte in cerca di prede."
        de:
          x: "Dieses Pokémon saugt dem Gegner selbst dann noch\nEnergie ab, wenn es zu schwer zum Fliegen wird."
          y: "Hat es einmal angefangen Blut zu saugen, hört es\nerst wieder auf, wenn es satt ist. Es jagt nachts."
        es:
          x: "Cuando ataque, seguirá chupando energía de su\nvíctima, aunque pese tanto que ya no pueda volar."
          y: "Cuando chupa sangre, no para hasta hartarse.\nPor la noche sale volando a la caza de presas."
        ko:
          x: "물리면 끝이다. 죽을 정도로\n피를 빨아들이기 때문에 무거워져서\n날 수 없게 될 때도 있다."
          y: "한번 피를 빨기 시작하면\n배가 부를 때까지 그만두지 않는다.\n어둠 속을 날며 먹이를 찾는다."
oddish:
