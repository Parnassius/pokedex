          x: "あらそいの　おこった　むらを\nやきつくしたという　きろくが\nこもんじょに　のこされている。"
          y: "めったに　すがたを　あらわさないが\nひとたび　あばれだすと　おおきな\nとしが　かいめつする　ときもある。"
        jp_kanji:
          x: "争いの　起こった　村を\n焼きつくしたという　記録が\n古文書に　残されている。"
          y: "めったに　姿を　現さないが\nひとたび　暴れ出すと　大きな\n都市が　壊滅するときもある。"
        en:
          x: "In ancient literature, there is a record of a Gyarados\nthat razed a village when violence flared."
          y: "Rarely seen in the wild. Huge and vicious, it is\ncapable of destroying entire cities in a rage."
        fr:
          x: "La littérature ancienne fait état d’un Léviator qui\naurait rasé un village sous le coup de la colère."
          y: "Gigantesque et maléfique, il est capable de raser\nune ville entière dans un accès de rage."
        it:
          x: "Un antico documento riporta che Gyarados rase al\nsuolo un villaggio in cui dilagava la violenza."
          y: "Poco comune allo stato selvatico. Enorme e cattivo,\npuò distruggere intere città con un solo attacco."
        de:
          x: "In alten Schriften wird von einem Garados berichtet,\ndas in einem Wutanfall ein Dorf zerstörte."
          y: "Ein gigantisches, sehr kraftvolles Pokémon.\nEs ist fähig, ganze Städte zu zerstören."
        es:
          x: "En la literatura antigua se dice que un Gyarados\nrebosante de violencia arrasó un poblado."
          y: "No es frecuente verlo en su medio. Es enorme y\nmalvado, y capaz de destruir ciudades enteras de\nun ataque."
        ko:
          x: "분쟁이 일어난 마을을\n다 태워버렸다는 기록이\n고문서에 남아 있다."
          y: "거의 모습을 드러내지 않지만\n한번 날뛰면 커다란 도시가\n괴멸하는 경우도 있다."
