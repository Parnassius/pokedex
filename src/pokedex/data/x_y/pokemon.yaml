          y: "せかいいち　おおきな　はなびらは\nあるくたびに　ゆれて　たいりょうの\nどくかふんを　ばらまいてしまう。"
        jp_kanji:
          x: "花びらが　大きいほど\nたくさん　花粉を　出すが\n頭が　重たくて　疲れてしまうという。"
          y: "世界一　大きな　花びらは\n歩くたびに　揺れて　大量の\n毒花粉を　ばらまいている。"
        en:
          x: "The larger its petals, the more toxic pollen it\ncontains. Its big head is heavy and hard to hold up."
          y: "It has the world’s largest petals. With every step,\nthe petals shake out heavy clouds of toxic pollen."
        fr:
          x: "Plus ses pétales sont grands, plus ils contiennent de\npollen toxique."
          y: "Il possède des pétales énormes. À chaque pas,\nils sèment d’épais nuages de pollen toxique."
        it:
          x: "Più grandi sono i petali, maggiore è la quantità di\npolline tossico che contengono. La testa è\nmolto pesante."
          y: "Ha i petali più grandi del mondo. Ad ogni suo passo,\ni petali liberano fitte nubi di polline tossico."
        de:
          x: "Je größer die Blütenblätter, desto mehr giftige\nPollen sind in der Blüte enthalten."
          y: "Es besitzt die größten Blätter der Welt.\nBei jedem Schritt streut es Giftpollen zu Boden."
        es:
          x: "Cuanto mayores son sus pétalos, más tóxico es su\npolen. Le pesa la cabeza y le cuesta mantenerla\nerguida."
          y: "Tiene los pétalos más grandes del mundo. Estos\nexpulsan densas nubes de polen tóxico al caminar."
        ko:
          x: "꽃잎이 클수록 많은\n꽃가루를 만들어 내지만 머리가\n무거워서 지쳐버린다고 한다."
          y: "세계에서 제일 큰 꽃잎은\n걸을 때마다 흔들려 대량의\n독 꽃가루를 흩뿌린다."
