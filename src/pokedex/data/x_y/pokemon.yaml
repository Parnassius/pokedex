          y: "あたまがよくて　しゅうねんぶかい。\nふざけて　しっぽを　つかむと\n１０００ねん　たたられるという。"
        jp_kanji:
          x: "黄金に　輝く　体毛と\n９本の　長い　尻尾を　持つ。\n１０００年は　生きると　言われる。"
          y: "頭が良くて　執念深い。\nふざけて　尻尾を　つかむと\n１０００年　たたられるという。"
        en:
          x: "It has nine long tails and fur that gleams gold.\nIt is said to live for 1,000 years."
          y: "Very smart and very vengeful. Grabbing one of its\nmany tails could result in a 1,000-year curse."
        fr:
          x: "Il a neuf longues queues et une fourrure qui brille\ncomme de l’or. On dit qu’il peut vivre 1 000 ans."
          y: "Il est très intelligent et rancunier. Attrapez une de\nses queues et il vous maudira pour 1 000 ans."
        it:
          x: "Dotato di nove code e di una pelliccia dorata,\nsi dice che viva 1000 anni."
          y: "Molto elegante e vendicativo. Chi gli afferra una\ncoda rischia una maledizione millenaria."
        de:
          x: "Es hat neun lange Schweife und sein Fell glänzt\ngülden. Man sagt, es soll 1 000 Jahre alt werden."
          y: "Dieses Pokémon ist intelligent, aber rachsüchtig.\nSein Schweif kann einen schweren Fluch übertragen."
        es:
          x: "Tiene nueve colas y un pelaje de color dorado.\nDicen que este Pokémon llega a vivir 1000 años."
          y: "Muy inteligente y vengativo. Agarrar una de sus colas\npodría traer 1000 años de mala suerte."
        ko:
          x: "황금빛으로 빛나는 털과\n9개의 긴 꼬리를 지녔다.\n1000년을 산다고 한다."
          y: "머리가 좋고 집념이 강하다.\n장난으로 꼬리를 잡으면\n1000년 동안 화를 입는다고 한다."
