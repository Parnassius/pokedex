          y: "Il peut terrasser des ennemis bien plus imposants en\nlibérant une décharge de 100 000 V."
        it:
          x: "Se l’elettricità aumenta, i muscoli sono sollecitati\ne diventa più aggressivo del solito."
          y: "Può rilasciare scariche elettriche a 100.000 volt\ncon cui neutralizza nemici molto più grandi di lui."
        de:
          x: "Wenn es sich auflädt, zucken seine Muskeln\nund es wird aggressiver und kampflustiger."
          y: "Es kann 100 000 V mit einem Schlag freisetzen\nund so viel größere Gegner besiegen."
        es:
          x: "Cuando se carga de electricidad, sus músculos se\ntensan y se vuelve más agresivo de lo normal."
          y: "Puede emitir ráfagas de 100 000 voltios capaces de\nacabar con rivales enormes."
        ko:
