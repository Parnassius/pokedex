        jp_kana:
          x: "ひょうがの　なかで　すうせんねん\nねむっていたと　いわれている。\nマグマでも　からだは　とけない。"
          y: "ひょうがきに　できた　こおりで\nからだが　つくられている。マイナス\n２００どの　れいきを　あやつる。"
        jp_kanji:
          x: "氷河の　中で　数千年\n眠っていたと　言われている。\nマグマでも　体は　溶けない。"
          y: "氷河期に　できた　氷で\n体が　作られている。\nマイナス２００度の　冷気を　操る。"
        en:
          x: "It is said to have slept in a glacier for thousands of\nyears. Its body can’t be melted, even by magma."
          y: "Its body is made of ice from the ice age. It controls\nfrigid air of -328 degrees Fahrenheit."
        fr:
          x: "Il reposait dans un glacier depuis des milliers\nd’années. Même le magma ne peut pas le faire fondre."
          y: "Son corps est fait de glace datant de l’ère glaciaire.\nIl contrôle un air gelé de -200 °C."
        it:
          x: "Si dice che sia rimasto a dormire nei ghiacci per\nalcuni millenni. Nemmeno il magma riuscirebbe\na scioglierlo."
          y: "Il suo corpo è costituito da ghiaccio dell’era glaciale.\nMantiene l’aria a una temperatura di -200 °C."
        de:
          x: "Es heißt, es habe Jahrtausende lang im ewigen Eis\ngeschlummert. Selbst Magma schmilzt es nicht."
          y: "Sein Körper besteht aus Eis aus der Eiszeit.\nEs kontrolliert gefrorene Luft, die -200 °C kalt ist."
        es:
          x: "Dicen que ha yacido durmiendo en un glaciar durante\nmilenios. Ni el magma puede derretir su cuerpo."
          y: "Su cuerpo está hecho con hielo de la glaciación.\nControla aire gélido a -200 °C."
        ko:
          x: "빙하 안에서 몇천 년이나\n잠들어 있었다고 전해진다.\n마그마로도 몸이 녹지 않는다."
          y: "빙하기에 생겨난 얼음으로\n몸이 만들어져 있다. 마이너스\n200도의 냉기를 다룬다."
