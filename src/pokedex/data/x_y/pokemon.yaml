      descriptions:
        jp_kana:
          x: "ダルマッカの　フンは　あついので\nむかしの　ひとは　ふところに　いれて\nからだを　あたためていたのだ。"
          y: "ねるときは　てあしを　ひっこめ\nたいないで　もえている　６００どの\nほのおも　ちいさくなり　おちつくよ。"
        jp_kanji:
          x: "ダルマッカの　フンは　熱いので\n昔の　人は　懐に　入れて\n体を　温めていたのだ。"
          y: "寝るときは　手足を　ひっこめ\n体内で　燃えている　６００度の\n炎も　小さくなり　落ち着くよ。"
        en:
          x: "Darumaka’s droppings are hot, so people used to\nput them in their clothes to keep themselves warm."
          y: "When it sleeps, it pulls its limbs into its\nbody and its internal fire goes down to\n1,100 degrees Fahrenheit."
        fr:
          x: "Les gens d’autrefois avaient l’habitude de mettre\nses crottes brûlantes sous leurs vêtements pour se\nréchauffer."
          y: "Quand il dort, ses pattes se rétractent et les flammes\nqui brûlent à 600 °C dans son corps s’apaisent."
        it:
          x: "Poiché i suoi escrementi sono molto caldi,\nnell’antichità gli uomini solevano conservarli in\nbuste per riscaldarsi."
          y: "Quando dorme ritrae gli arti. Anche il fuoco che gli\nbrucia dentro a 600 °C si affievolisce."
        de:
          x: "Früher nutzte man die heißen Ausscheidungen\nvon Flampion, um sich den Körper zu wärmen."
          y: "Zum Schlafen zieht es Arme und Beine ein und\nsenkt seine innere Körpertemperatur auf 600 °C,\num sich zu entspannen."
        es:
          x: "Como sus excrementos están muy calientes, la gente\nde antaño se los metía en los bolsillos para calentarse."
          y: "Cuando se dispone a dormir, retrae sus piernas y sus\nbrazos, y reduce la llama de su interior a 600 °C para\nrelajarse."
        ko:
          x: "달막화의 배설물은 뜨거워서\n옛날 사람은 품에 넣고\n몸을 따뜻하게 하는 데 사용했다."
          y: "잠잘 때는 손발을 움츠리고\n체내에 타고 있는 600도의\n불꽃도 작아져서 차분해진다."
