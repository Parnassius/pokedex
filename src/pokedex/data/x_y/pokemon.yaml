      descriptions:
        jp_kana:
          x: "せかいいち　ぐうたらな　ポケモン。\nてが　とどく　はんいの　エサを\nたべつくすと　いばしょを　かえる。"
          y: "せかいいちの　ぐうたらだが　たまった\nエネルギーを　いっきに　だす　ことで\nおそろしい　パワーを　はっきする。"
        jp_kanji:
          x: "世界一　ぐうたらな　ポケモン。\n手が　届く　範囲の　エサを\n食べつくすと　居場所を　替える。"
          y: "世界一の　ぐうたらだが　たまった\nエネルギーを　一気に　出す　ことで\n恐ろしい　パワーを　発揮する。"
        en:
          x: "The world’s laziest Pokémon. It moves to another\nspot when there’s no food left within its reach."
          y: "It is the world’s most slothful Pokémon. However,\nit can exert horrifying power by releasing pent-up\nenergy all at once."
        fr:
          x: "Le Pokémon le plus fainéant du monde. Il bouge\nquand il a mangé tout ce qui était à portée de main."
          y: "C’est le Pokémon le plus paresseux du monde.\nIl est cependant capable de libérer une puissance\nphénoménale en une seule attaque."
        it:
          x: "Il più pigro Pokémon del mondo. Si sposta solo\nquando non ha più cibo a portata di mano."
          y: "È il Pokémon più pigro del mondo, ma può sprigionare\ndi colpo una quantità spaventosa di energia a lungo\nrepressa."
        de:
          x: "Das faulste Pokémon der Welt. Es bewegt sich nur,\nwenn alles Essbare in Reichweite verputzt ist."
          y: "Es ist das faulste Pokémon der Welt. Doch kann es\nüberaus kräftige Angriffe fahren, wenn es die\nkomplette angestaute Energie auf einmal einsetzt."
        es:
          x: "El Pokémon más perezoso del mundo. Cambia de lugar\npara coger la comida al alcance de su mano."
          y: "Es el Pokémon más vago que hay. Aun así, puede\nliberar de una vez una cantidad tremenda de energía\nacumulada."
        ko:
          x: "세계에서 제일 게으른 포켓몬이다.\n손이 닿는 범위의 먹이를\n다 먹으면 있는 거처를 바꾼다."
          y: "세계에서 제일 게으르지만\n쌓인 에너지를 한 번에 내면\n무서울 정도의 파워를 발휘한다."
nincada:
  species_id: 290
  names:
    jp_kana: ツチニン
    jp_kanji: ツチニン
