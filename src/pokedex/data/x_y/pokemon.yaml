      descriptions:
        jp_kana:
          x: "きゅうばんの　くちで　えものに\nすいつき　くいこませた　キバから\nでんきを　ながして　かんでんさせる。"
          y: "うでの　ちからで　うみから　はいだし\nみずべの　えものに　おそいかかる。\nいっしゅんで　うみへ　ひきずりこむ。"
        jp_kanji:
          x: "吸盤の　口で　獲物に　吸いつき\n食いこませた　キバから\n電気を　流して　感電させる。"
          y: "腕の　力で　海から　はい出し\n水辺の　獲物に　襲いかかる。\n一瞬で　海へ　引きずりこむ。"
        en:
          x: "With their sucker mouths, they suck in prey.\nThen they use their fangs to shock the prey\nwith electricity."
          y: "They crawl out of the ocean using their arms.\nThey will attack prey on shore and immediately drag\nit into the ocean."
        fr:
          x: "Il s’attache à ses proies avec sa bouche-ventouse et\nles électrocute avec ses crocs."
          y: "Il peut sortir de l’eau à la force de ses bras pour\nattraper des proies sur la rive. Il retourne à l’eau\nen un instant."
        it:
          x: "Si attacca alla preda con la bocca a ventosa e la\nfulmina attraverso i denti conficcati."
          y: "Striscia fuori dal mare con la sola forza dei propri\narti. Poi attacca la preda a riva e con un guizzo la\ntrascina con sé."
        de:
          x: "Mit dem Saugnapf an seinem Maul hakt es sich\nan seiner Beute fest und versetzt ihr über seine\nFangzähne Stromschläge."
          y: "Es schleppt sich mithilfe seiner Arme an Land,\nschnappt nach seiner Beute und zerrt sie\naugenblicklich ins Meer."
        es:
          x: "Pega la ventosa de su boca en su presa y la\nelectrocuta con sus colmillos."
          y: "Sale del mar con la fuerza de sus brazos y ataca a sus\npresas en la costa. Luego se las lleva de vuelta al mar."
        ko:
          x: "흡반 같은 입으로 먹이에\n달라붙은 후 박아 넣은 이빨을\n통해 전기를 흘려 감전시킨다."
          y: "팔 힘으로 바다에서 기어 나와\n물가에 있는 먹이를 덮친다.\n한순간에 바다로 끌고 들어간다."
