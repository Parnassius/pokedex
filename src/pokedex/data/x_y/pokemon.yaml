      descriptions:
        jp_kana:
          x: "どんな　においも　かぎわける。\nじめんふかくに　うまっている\nたべものも　のこらず　みつけだす。"
          y: "おおきな　からだの　もちぬしだが\nきのぼりが　じょうずで　きの　うえで\nエサを　たべたり　ねたりする。"
        jp_kanji:
          x: "どんな　においも　かぎわける。\n地面深くに　埋まっている\n食べ物も　残らず　見つけ出す。"
          y: "大きな　体の　持ち主だが\n木登りが　上手で　木の　上で\nエサを　食べたり　寝たりする。"
        en:
          x: "With its ability to distinguish any aroma, it\nunfailingly finds all food buried deep underground."
          y: "Although it has a large body, it is quite skilled at\nclimbing trees. It eats and sleeps in the treetops."
        fr:
          x: "Avec sa capacité à sentir toute odeur, il trouve sans\nfaillir de la nourriture enfouie dans le sol."
          y: "Bien que d’une large corpulence, il grimpe aux arbres\npour s’y nourrir et y dormir."
        it:
          x: "Con la sua capacità di distinguere qualsiasi odore,\ntrova cibo nel terreno anche a grandi profondità."
          y: "Nonostante la stazza, è abile ad arrampicarsi in cima\nagli alberi, dove mangia e dorme."
        de:
          x: "Da es alle Gerüche perfekt unterscheiden kann,\nfindet es sogar Nahrung, die tief im Erdreich ist."
          y: "Trotz seines riesigen Körpers ist es ein guter Kletterer.\nEs frisst und schläft in Baumkronen."
        es:
          x: "Capaz de percibir cualquier tipo de aroma, encuentra\nsin problemas todo alimento enterrado bajo tierra."
          y: "Aunque es muy grande, no se le da nada mal lo de\ntrepar árboles. Come y duerme en las copas."
        ko:
          x: "어떠한 냄새라도 구별할 수 있다.\n땅속 깊이 파묻혀 있는\n먹이도 남김없이 찾아낸다."
          y: "커다란 몸집을 가졌지만\n나무 타기를 잘하여 나무 위에서\n먹이를 먹거나 잔다."
slugma:
