          y: "カラが　ひじょうに　かたく\nナパームだんでも　こわせない。\nこうげきするときだけ　ひらく。"
        jp_kanji:
          x: "潮の　流れが　激しい　海に\n生息している　パルシェンの\n殻の　トゲは　大きく　鋭い。"
          y: "殻が　非常に　硬く\nナパーム弾でも　壊せない。\n攻撃するときだけ　開く。"
        en:
          x: "Cloyster that live in seas with harsh tidal currents\ngrow large, sharp spikes on their shells."
          y: "Its shell is extremely hard. It cannot be shattered,\neven with a bomb. The shell opens only when it\nis attacking."
        fr:
          x: "Les Crustabri vivant dans des mers aux courants forts\ndéveloppent des dards sur leur coquille."
          y: "Sa coquille est extrêmement résistante. Rien ne peut\nla détruire, pas même une bombe. Il ne l’ouvre que\nlorsqu’il attaque."
        it:
          x: "Ai Cloyster che vivono in mari con forti maree\ncrescono grandi aculei affilati sui gusci."
          y: "Neppure una bomba può scalfire il suo duro guscio,\nche apre soltanto quando sta attaccando."
        de:
          x: "Austos, die im Meer mit starker Strömung leben,\nwerden groß und entwickeln scharfe Stacheln."
          y: "Sein Panzer ist extrem hart. Es kann nicht\nzerschmettert werden, auch nicht durch eine Bombe.\nDer Panzer öffnet sich nur, wenn es angreift."
        es:
          x: "A los Cloyster que viven en las fuertes corrientes\nmarinas les crecen largas y afiladas púas en la concha."
          y: "La concha que lo cubre es extremadamente dura.\nNo es posible causarle rasguños y solo se abre si lo\natacan."
        ko:
          x: "조수의 흐름이 격한 바다에\n서식하고 있는 파르셀의\n껍질의 가시는 크고 날카롭다."
          y: "껍데기가 상당히 단단하여\n네이팜탄으로도 부술 수 없다.\n공격할 때만 연다."
