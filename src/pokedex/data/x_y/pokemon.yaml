        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - ghost
      egg_groups:
        - mineral
      abilities:
        - no_guard
      descriptions:
        jp_kana:
          x: "しんかして　２ほんに　ぶんれつした。\nテレパシーで　かいわして　れんけい\nこうげきで　てきを　きりきざむ。"
          y: "２ほんの　つるぎによる　ふくざつな\nれんぞく　こうげきを　ふせぐことは\nけんの　たつじんでも　ふかのうだ。"
        jp_kanji:
          x: "進化して　２本に　分裂した。\nテレパシーで　会話して\n連係攻撃で　敵を　切り刻む。"
          y: "２本の　剣による\n複雑な　連続攻撃を　防ぐことは\n剣の　達人でも　不可能だ。"
        en:
          x: "When Honedge evolves, it divides into two swords,\nwhich cooperate via telepathy to coordinate attacks\nand slash their enemies to ribbons."
          y: "The complex attack patterns of its two swords\nare unstoppable, even for an opponent\ngreatly accomplished at swordplay."
        fr:
          x: "En évoluant, Monorpale se divise en deux épées qui\ncommuniquent par télépathie pour mieux découper\nleur adversaire en morceaux."
          y: "Même les sabreurs chevronnés sont incapables\nde parer les assauts continus et complexes menés\nde concert par ces deux épées."
        it:
          x: "Sdoppiatesi con l’evoluzione, le due parti comunicano\ntelepaticamente per lanciarsi in un attacco coordinato."
          y: "I fendenti vorticosi e velocissimi delle due spade\npossono mettere in ginocchio anche gli spadaccini\npiù esperti."
        de:
          x: "Bei seiner Entwicklung hat es sich in zwei Schwerter\ngeteilt. Es begegnet seinen Gegnern mit Attacken,\ndie es mittels Telepathie koordiniert."
          y: "Nicht einmal ein Meister des Schwertkampfs kann\nden komplizierten aufeinanderfolgenden Angriffen\nder zwei Schwerter ausweichen."
        es:
          x: "Al evolucionar se divide en dos espadas.\nSe comunican entre sí mediante telepatía y\ncoordinan los ataques para rebanar al enemigo."
          y: "Ni siquiera el espadachín más ducho conseguiría\nesquivar los complejos ataques que encadenan\nambas espadas a la vez."
        ko:
          x: "진화하여 2자루로 분열되었다.\n텔레파시로 서로 대화하며\n연계 공격으로 적을 조각낸다."
          y: "2자루의 검에 의한 복잡한\n연속 공격을 막는 것은\n검의 달인일지라도 불가능하다."
aegislash:
  species_id: 681
  names:
