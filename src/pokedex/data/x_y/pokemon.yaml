      descriptions:
        jp_kana:
          x: "おびを　しめると　パワーアップする。\nやせいの　ナゲキは　つるくさを\nあんで　じぶんの　おびを　つくる。"
          y: "じぶんより　おおきな　あいてと\nであうと　むしょうに　なげたくなる。\nつよくなると　おびを　とりかえる。"
        jp_kanji:
          x: "帯を　締めると　パワーアップする。\n野生の　ナゲキは　つる草を　編んで\n自分の　帯を　作る。"
          y: "自分より　大きな　相手と\n出会うと　無性に　投げたくなる。\n強くなると　帯を　取り替える。"
        en:
          x: "When it tightens its belt, it becomes stronger. Wild\nThroh use vines to weave their own belts."
          y: "When it encounters a foe bigger than itself, it wants\nto throw it. It changes belts as it gets stronger."
        fr:
          x: "Quand il noue sa ceinture, il devient plus puissant.\nLes Judokrak sauvages tressent leur ceinture avec\ndes lianes."
          y: "Ils aiment projeter ceux qui sont plus grands qu’eux.\nIls changent de ceinture quand ils progressent."
        it:
          x: "La cintura da karate lo rende più forte. I Throh\nselvatici si costruiscono le cinture usando piante\nrampicanti."
          y: "Quando incontra un avversario più grande di lui, lo\nassale l’istinto di lanciarlo via. Cambia cintura quando\ndiventa più forte."
        de:
          x: "Zurrt es seinen Gürtel fest, gewinnt es an Kraft.\nWilde Exemplare flechten sich ihren Gürtel\nin Handarbeit aus Ranken."
          y: "Trifft es jemanden, der größer ist als es selbst,\nwill es ihn unbedingt werfen. Wird es stärker,\nwechselt es den Gürtel."
        es:
          x: "Aumenta su potencia si se aprieta el cinturón. Un\nThroh salvaje teje su propio cinturón usando lianas."
          y: "Si se topa con un rival más fuerte, ansía lanzarlo por\nlos aires. Al hacerse más fuerte, cambia su cinturón."
        ko:
          x: "끈을 매면 파워가 올라간다.\n야생 던지미는 덩굴풀을 엮어\n자신의 띠를 만든다."
          y: "자신보다 큰 상대와 만나면\n이유 없이 내던지고 싶어 한다.\n강해지면 띠를 바꾼다."
sawk:
  species_id: 539
