        jp_kana:
          x: "きせつふうに　ながされて\nせかいを　いっしゅうしてしまう。\nとちゅうで　わたほうしを　ばらまく。"
          y: "どんな　かぜに　あおられても\nわたげを　じざいに　あやつって\nせかいの　すきなところへ　いける。"
        jp_kanji:
          x: "季節風に　流されて\n世界を　１周してしまう。\n途中で　綿胞子を　ばらまく。"
          y: "どんな　風に　あおられても\n綿毛を　自在に　操って\n世界の　好きなところへ　行ける。"
        en:
          x: "Blown by seasonal winds, it circles the globe,\nscattering cotton spores as it goes."
          y: "Even in the fiercest wind, it can control its fluff to\nmake its way to any place in the world it wants."
        fr:
          x: "Poussé par les vents saisonniers, il fait le tour\ndu globe en semant des spores de coton."
          y: "Même sous un vent très violent, il contrôle sa\ndestination en bougeant ses appendices."
        it:
          x: "Sospinto dai venti stagionali, gira intorno al globo\nsparpagliando i suoi semi simili al cotone."
          y: "Anche nel vento forte controlla abilmente il suo\nbatuffolo per volare in ogni parte del mondo."
        de:
          x: "Es lässt sich von den Winden um den Globus tragen\nund verteilt auf seinem Flug Baumwollsamen."
          y: "Auch im stärksten Wind kann es kontrollieren,\nwo seine Saat auf dem Erdball niedergehen soll."
        es:
          x: "Los vientos estacionales lo llevan por todo el mundo,\ndonde va soltando sus esporas."
          y: "Aunque sople el viento más fuerte, es capaz de\ncontrolar los pompones y moverse por donde quiera."
        ko:
          x: "계절풍에 날려서\n세계 일주를 해 버린다.\n도중에 솜 포자를 흩뿌린다."
          y: "어떤 바람이 불더라도\n솜털을 자유자재로 조종하여\n세계의 좋아하는 곳으로 갈 수 있다."
aipom:
