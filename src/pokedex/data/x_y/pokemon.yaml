      descriptions:
        jp_kana:
          x: "タマゴから　すがたを　あらわして\nせかいの　すべてを　うみだしたと\nシンオウしんわに　かたられている。"
          y: "うちゅうが　まだ　ない　ころに\nさいしょに　うまれた　ポケモンと\nしんわの　なかで　かたられている。"
        jp_kanji:
          x: "タマゴから　姿を　現して\n世界の　すべてを　生み出したと\nシンオウ神話に　語られている。"
          y: "宇宙が　まだ　ない　ころに\n最初に　生まれた　ポケモンと\n神話の　中で　語られている。"
        en:
          x: "According to the legends of Sinnoh, this Pokémon\nemerged from an egg and shaped all there is in\nthis world."
          y: "It is told in mythology that this Pokémon was born\nbefore the universe even existed."
        fr:
          x: "La mythologie de Sinnoh veut qu’il soit apparu sous\nforme d’Œuf et ait créé le monde."
          y: "Dans la mythologie, ce Pokémon existait déjà avant\nla formation de l’univers."
        it:
          x: "Secondo la mitologia di Sinnoh, Arceus è nato da\nun uovo e poi ha creato il mondo."
          y: "Nei racconti mitologici si dice che questo Pokémon\nsia nato ancor prima dell’universo."
        de:
          x: "In den Legenden Sinnohs heißt es, es sei aus\neinem Ei geschlüpft und hätte die gesamte Welt\ngeschaffen."
          y: "Die Mythologie erzählt, dass dieses Pokémon geboren\nwurde, bevor das Universum überhaupt existierte."
        es:
          x: "Según la mitología de Sinnoh, Arceus surgió de un\nhuevo y después creó todo el mundo."
          y: "La mitología cuenta que este Pokémon nació antes\nde que el Universo existiera."
        ko:
          x: "알에서 모습을 나타내\n모든 세계를 창조했다고\n신오신화에서 묘사된다."
          y: "우주가 아직 생기지 않았을 무렵에\n처음으로 태어난 포켓몬이라고\n신화 속에서 묘사된다."
