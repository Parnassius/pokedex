          y: "勇猛な　ポケモンだが　相手の\n強さを　確かめて　戦いを\n避ける　賢さも　併せ持つ。"
        en:
          x: "The long hair around its face provides an amazing\nradar that lets it sense subtle changes in\nits surroundings."
          y: "Though it is a very brave Pokémon, it’s also smart\nenough to check its foe’s strength and avoid battle."
        fr:
          x: "Les longs poils de son museau font un excellent\nradar qui analyse les alentours avec une grande\nacuité."
          y: "Bien que vaillant, il a aussi l’intelligence d’analyser\ntoutes les situations et de fuir quand il anticipe une\ndéfaite."
        it:
          x: "I lunghi peli che gli coprono il volto sono un radar\nmolto sensibile alle variazioni dell’ambiente\ncircostante."
          y: "È un Pokémon molto intrepido, ma ha l’intelligenza\ndi valutare la forza del nemico prima di decidere se\nlottare o no."
        de:
          x: "Das lange Fell um sein Gesicht fungiert als\nHightech-Radar, mit dem es fein säuberlich\nseine Umgebung abtastet."
          y: "Ein tapferes Pokémon, das jedoch klug genug ist,\nseinen Gegner zu mustern, bevor es sich auf einen\nKampf einlässt."
        es:
          x: "Los mechones que cubren su cara actúan como un\nmagnífico radar para detectar con precisión lo que hay\na su alrededor."
          y: "Aunque se trata de un Pokémon valeroso, también es\nlo bastante inteligente como para escapar si el rival es\nmuy fuerte."
        ko:
          x: "얼굴을 둘러싼 긴 털은\n우수한 레이더다. 주위\n상황을 민감히 살핀다."
          y: "용맹한 포켓몬이지만 상대의\n강함을 확인하고 싸움을\n피하는 영리함도 함께 갖추고 있다."
