        jp_kana:
          x: "ヘルガーの　ぶきみな　とおぼえは\nじごくから　しにがみが　よぶ　こえと\nむかしの　ひとは　そうぞうしていた。"
          y: "おこったときに　くちから　ふきだす\nほのおには　どくそも　まじっていて\nやけどになると　いつまでも　うずく。"
        jp_kanji:
          x: "ヘルガーの　不気味な　遠ぼえは\n地獄から　死神が　呼ぶ　声と\n昔の　人は　想像していた。"
          y: "怒ったときに　口から　噴き出す\n炎には　毒素も　混じっていて\nやけどになると　いつまでも　うずく。"
        en:
          x: "Long ago, people imagined its eerie howls to be\nthe call of the grim reaper."
          y: "The flames it breathes when angry contain toxins.\nIf they cause a burn, it will hurt forever."
        fr:
          x: "Jadis, les gens prenaient son étrange hurlement pour\nl’appel de la Faucheuse."
          y: "En colère, il crache des flammes contenant une toxine\nqui peut causer des dégâts irréversibles."
        it:
          x: "Molto tempo fa, si riteneva che le sue urla sinistre\ncoincidessero con la chiamata della morte."
          y: "Se s’infuria, sputa fiamme contenenti una tossina.\nSe ci si brucia, il dolore permane a lungo."
        de:
          x: "In alten Zeiten glaubte man, das Heulen dieses\nPokémon sei der Ruf des Todes."
          y: "Ist es wütend, spuckt es giftige Flammen.\nDie Schmerzen der Verbrennungen dauern ewig an."
        es:
          x: "Hace mucho, la gente creía que sus horripilantes\naullidos eran de la muerte personificada."
          y: "Las llamas que respira cuando se enfada contienen\ntoxinas. Si causan una quemadura, dolerá toda la vida."
        ko:
          x: "헬가가 으스스하게 멀리서 짖으면\n지옥에서 사신이 부르는 소리라고\n옛날 사람들은 상상하고 있었다."
          y: "화가 났을 때 입에서 뿜어내는\n불꽃에는 독소도 섞여 있기에\n화상을 입으면 계속 욱신거린다."
