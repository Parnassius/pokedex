      types:
        - water
        - dark
      egg_groups:
        - water_1
      abilities:
        - torrent
      hidden_ability: protean
      descriptions:
        jp_kana:
          x: "みずを　あっしゅくして　しゅりけんを\nつくりだす。こうそくかいてんさせて\nとばすと　きんぞくも　まっぷたつ。"
          y: "にんじゃのように　しんしゅつきぼつ。\nすばやい　うごきで　ほんろうしつつ\nみずの　しゅりけんで　きりさく。"
        jp_kanji:
          x: "水を　圧縮して　手裏剣を　作り出す。\n高速回転させて　飛ばすと\n金属も　真っ二つ。"
          y: "忍者のように　神出鬼没。\n素早い　動きで　翻弄しつつ\n水の　手裏剣で　切り裂く。"
        en:
          x: "It creates throwing stars out of compressed water.\nWhen it spins them and throws them at high speed,\nthese stars can split metal in two."
          y: "It appears and vanishes with a ninja’s grace.\nIt toys with its enemies using swift movements, while\nslicing them with throwing stars of sharpest water."
        fr:
          x: "Il transforme des jets d’eau sous pression\nen redoutables shuriken. Une fois lancés, ils tournent\nsi vite qu’ils peuvent même couper le métal."
          y: "Aussi insaisissable qu’un ninja, il se joue de\nses ennemis grâce à sa célérité, et les tranche\nde ses Sheauriken."
        it:
          x: "Crea lame d’acqua micidiali che ruotano\nad alta velocità e, se lanciate, possono perforare\nil metallo."
          y: "Agile e sfuggente come un ninja, si fa beffe dei nemici\ngrazie alla sua velocità e li bersaglia di shuriken\nd’acqua."
        de:
          x: "Es stellt Wurfsterne aus komprimiertem Wasser\nher, die durch ihre hohe Drehgeschwindigkeit\nbeim Werfen sogar Metall durchtrennen."
          y: "Kaum hat man es erspäht, verschwindet es auch schon\nwieder. Mit der Agilität eines Ninjas verwirrt es seine\nGegner, um sie dann mit Wasser-Shuriken anzugreifen."
        es:
          x: "Comprime el agua y crea estrellas ninja con las que\nataca al enemigo. Cuando las hace girar a gran\nvelocidad cortan en dos hasta el metal."
          y: "Aparece y desaparece de improvisto, cual ninja. Marea\nal oponente con su soberbia agilidad y lo hace trizas\ncon sus Shuriken de Agua."
        ko:
          x: "물을 압축시켜 수리검을\n만들어 낸다. 고속으로 회전시키며\n던지면 금속도 두 동강이 난다."
          y: "닌자처럼 신출귀몰하다.\n재빠른 움직임으로 상대를 농락하면서\n물의 수리검으로 벤다."
bunnelby:
  species_id: 659
  names:
    jp_kana: ホルビー
    jp_kanji: ホルビー
    en: Bunnelby
    fr: Sapereau
    it: Bunnelby
    de: Scoppel
    es: Bunnelby
    ko: 파르빗
  forms:
    bunnelby:
      form_id: 0
      base_stats:
        hp: 38
        attack: 36
        defense: 38
        special_attack: 32
        special_defense: 36
