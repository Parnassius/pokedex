          y: "さばくなどの　かこくな　かんきょうを\nこのむ。からだの　なかに　たくわえた\nみずで　３０にちかん　いきられる。"
        jp_kanji:
          x: "雨が　少ない　乾燥した\n地域に　生息。１年に　１回\n黄色の　花を　咲かせる。"
          y: "砂漠などの　過酷な　環境を　好む。\n体の　中に　たくわえた　水で\n３０日間　生きられる。"
        en:
          x: "It lives in arid locations. Its yellow flowers bloom\nonce a year."
          y: "It prefers harsh environments such as deserts.\nIt can survive for 30 days on water stored in\nits body."
        fr:
          x: "Cacnea vit dans les zones arides. Une fois par an,\nune fleur jaune éclot sur sa tête."
          y: "Il se sent plus à l’aise dans des endroits hostiles\ncomme le désert. Il peut survivre 30 jours en utilisant\nseulement l’eau stockée dans son corps."
        it:
          x: "Cacnea vive in zone aride, dove non piove quasi mai.\nIl suo fiore giallo sboccia una volta all’anno."
          y: "Predilige ambienti ostili, come i deserti. Grazie\nall’acqua immagazzinata nel corpo, può resistere\n30 giorni senza bere."
        de:
          x: "Es wächst an trockenen Orten mit wenig Niederschlag.\nNur einmal im Jahr bildet es eine gelbe Blüte."
          y: "Es bevorzugt lebenswidrige Gebiete wie Wüsten.\nDer Wasserspeicher in seinem Körper reicht für\nbis zu 30 Tage."
        es:
          x: "Vive en regiones secas y con pocas lluvias. Una vez al\naño, le brota una flor amarilla."
          y: "Prefiere los medios hostiles como los desiertos.\nPuede sobrevivir 30 días sin beber, gracias al agua\nque almacena."
        ko:
          x: "비가 적은 건조한\n지역에 서식한다. 1년에 1번\n노랑 꽃을 피운다."
          y: "사막 같은 혹독한 환경을\n좋아한다. 몸속에 축적된\n물로 30일간 살 수 있다."
