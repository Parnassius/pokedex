        jp_kana:
          x: "おおぜいの　むれで　こうどうする。\nしっぽを　つなぎあわせて　わっかを\nつくる。ゆうじょうの　しるしらしい。"
          y: "２ほんの　しっぽで　きのみの　からを\nきように　むいて　たべる。ほんものの\nうでは　ほとんど　つかわなくなった。"
        jp_kanji:
          x: "大勢の　群れで　行動する。\n尻尾を　つなぎ合わせて　輪っかを\n作る。友情の　印らしい。"
          y: "２本の　尻尾で　木の実の　殻を\n器用に　むいて　食べる。本物の\n腕は　ほとんど　使わなくなった。"
        en:
          x: "They work in large colonies and make rings by\nlinking their tails, apparently in friendship."
          y: "To eat, it deftly shucks nuts with its two tails.\nIt rarely uses its arms now."
        fr:
          x: "Ils vivent en grandes colonies et relient leurs\nqueues pour former un anneau en signe d’amitié."
          y: "Il se nourrit de noix qu’il épluche avec ses deux\nqueues habiles. Il utilise de moins en moins ses bras."
        it:
          x: "Vivono in colonie numerose e formano anelli\nlegando le loro code in segno di amicizia."
          y: "Si nutre di nocciole che sbuccia con le due code.\nRaramente usa le sue vere braccia."
        de:
          x: "Sie leben in großen Kolonien und verbinden\nihre Schweife in Freundschaft."
          y: "Wenn es hungrig ist, knackt es Nüsse mit seinen\nbeiden Schweifen. Nur selten verwendet es die Arme."
        es:
          x: "Habitan en grandes colonias y forman anillos uniendo\nsus colas, aparentemente en signo de amistad."
          y: "Para comer, rompe nueces con sus dos colas.\nRaras veces utiliza sus brazos."
        ko:
          x: "많은 무리로 행동한다.\n꼬리를 맞잡아 원을 만든다.\n우정의 표시인 듯하다."
          y: "2개의 꼬리로 나무열매 껍질을\n솜씨 좋게 벗겨 먹는다. 진짜\n팔은 거의 쓰지 않게 되었다."
drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    jp_kanji: フワンテ
    en: Drifloon
    fr: Baudrive
    it: Drifloon
    de: Driftlon
    es: Drifloon
    ko: 흔들풍손
