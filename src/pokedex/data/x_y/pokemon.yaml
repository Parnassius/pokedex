          y: "のうりょくを　つかうたびに\nからだから　とくしゅな　アルファはを\nだして　きかいをくるわせる。"
        jp_kanji:
          x: "超能力を　発揮すると\n強い　アルファ波を　出して\n精密機械を　壊してしまう。"
          y: "能力を　使うたびに\n体から　特殊な　アルファ波を\n出して　機械を　狂わせる。"
        en:
          x: "When it uses its psychic power, it emits strong\nalpha waves that can ruin precision devices."
          y: "If it uses its abilities, it emits special alpha waves\nthat cause machines to malfunction."
        fr:
          x: "Son pouvoir psychique émet des ondes alpha qui\nbrouillent les appareils électroniques."
          y: "En utilisant ses pouvoirs, il émet des ondes alpha et\ncause des distorsions électroniques."
        it:
          x: "Quando usa i poteri psichici, emette forti onde alfa\nche possono rovinare strumenti di precisione."
          y: "Usando le sue abilità emette speciali onde alfa che\ncausano malfunzionamenti nei macchinari."
        de:
          x: "Setzt es seine Psycho-Kräfte ein, sondert es\nAlphawellen ab, die Präzisionsgeräten schaden\nkönnen."
          y: "Setzt es seine Kräfte ein, sendet es Alphawellen aus,\ndie einen Defekt bei Maschinen erzeugen können."
        es:
