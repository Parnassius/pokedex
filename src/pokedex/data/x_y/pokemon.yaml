          y: "じしゃくの　はなは　いつも　きたを\nむいている。たびびとは　ノズパスを\nみて　ほうがくを　たしかめる。"
        jp_kanji:
          x: "いつも　北を　向いている\n磁石の　鼻で　まわりの　鉄を\n引き寄せて　守りを　固めるのだ。"
          y: "磁石の　鼻は　いつも　北を\n向いている。旅人は　ノズパスを\n見て　方角を　確かめる。"
        en:
          x: "Its magnetic nose always faces north and draws\niron objects to its body to protect itself better."
          y: "Its magnetic nose consistently faces north.\nTravelers check Nosepass to get their bearings."
        fr:
          x: "Son nez polarisé lui permet de se défendre en\naugmentant son magnétisme et en attirant tout objet\nmétallique."
          y: "Son nez magnétique pointe constamment vers\nle nord. Les voyageurs l’observent pour connaître\nleur position."
        it:
          x: "Rafforza le sue difese attirando su di sé gli oggetti\ndi ferro circostanti con il suo naso magnetico che\nindica sempre il nord."
          y: "Ha un naso magnetico che punta sempre verso nord,\ne che i viaggiatori controllano per orientarsi."
        de:
          x: "Es schützt sich mit Objekten aus Eisen, die es\nmithilfe seiner immer nach Norden zeigenden\nmagnetischen Nase anzieht."
          y: "Seine magnetische Nase zeigt stets gen Norden.\nReisende überprüfen Nasgnet, um sich zu orientieren."
        es:
          x: "Siempre apunta al norte con su nariz imantada. Con\nella reviste su cuerpo de objetos metálicos para\nprotegerse."
          y: "Siempre está con el pico magnético orientado hacia\nel norte. Quienes viajan toman a Nosepass como\nreferencia."
        ko:
          x: "항상 북쪽을 향한다.\n자석의 코로 주변의 철을\n끌어당겨 방어를 굳힌다."
          y: "자석 코는 항상 북쪽을\n향하고 있다. 여행자는 코코파스를\n보고 방향을 확인한다."
