          y: "どんな　きんぞく　よりも　かたいと\nいわれる　からだ。ちょうさの　けっか\nからだの　なかは　くうどう　だった。"
        jp_kanji:
          x: "何万年も　地下の　圧力で\n鍛えられた　金属の　ボディは\n傷ひとつ　つかない。"
          y: "どんな　金属よりも　硬いと\n言われる　体。調査の　結果\n体の　中は　空洞だった。"
        en:
          x: "Tempered by pressure underground over tens of\nthousands of years, its body cannot be scratched."
          y: "Its body is said to be harder than any kind of metal.\nA study has revealed that its body is hollow."
        fr:
          x: "Son corps invulnérable fut forgé par la pression\nsouterraine durant des dizaines de milliers d’années."
          y: "Son corps, plus dur que n’importe quel métal, serait\ncreux selon les dernières analyses scientifiques."
        it:
          x: "La pressione subita sottoterra per decine di migliaia\ndi anni ha reso il suo corpo resistentissimo."
          y: "Ha un corpo più duro di qualunque metallo.\nUna ricerca ha stabilito che all’interno è cavo."
        de:
          x: "Im Laufe der Jahrtausende, die es unterirdisch lebte,\nwurde sein Körper durch Druck und Wärme hart."
          y: "Sein Körper ist härter als jedes andere Metall.\nUntersuchungen zufolge ist es innen hohl."
        es:
          x: "Su cuerpo ha estado sometido a la presión subterránea\ndurante miles de años y no puede arañarse."
          y: "Se dice que su cuerpo es más duro que cualquier\nmetal. Su interior es hueco, según ciertos estudios."
        ko:
          x: "몇만 년 동안 지하의 압력에 의해서\n단련된 금속의 몸은\n상처 하나 입지 않는다."
          y: "어떤 금속보다도 딱딱하다고\n전해지는 몸이다. 조사 결과\n몸 안은 비어 있었다."
