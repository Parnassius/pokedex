          x: "It bounces playfully like a ball. The more seawater\nit swallows, the higher it bounces."
          y: "It eats one ton of food every day. It plays by\nshooting stored seawater out its blowholes with\ngreat force."
        fr:
          x: "Il rebondit comme un ballon pour s’amuser.\nPlus il boit d’eau, plus il va haut."
          y: "Il mange près d’une tonne de nourriture par jour.\nJouer avec son jet d’eau est son passe-temps favori."
        it:
          x: "Si diverte a rimbalzare come una palla. Più acqua di\nmare ingolla, più in alto riesce a rimbalzare."
          y: "Mangia una tonnellata di cibo al giorno. Si diverte a\nspruzzare con forza l’acqua marina attraverso il suo\nsfiatatoio."
        de:
          x: "Es hüpft gerne wie ein Ball herum. Je mehr\nMeerwasser es trinkt, desto höher kann es springen."
          y: "Es nimmt täglich 1 t an Nahrung auf und lässt verspielt\nWasserfontänen aus seinem Atemloch aufschießen."
        es:
          x: "Le gusta botar como una pelota de playa. Cuanta más\nagua de mar traga, más alto puede llegar."
          y: "Engulle una tonelada de comida al día. Le gusta\njugar expulsando con energía el agua marina por\nsus espiráculos."
        ko:
          x: "공처럼 튀면서 논다.\n해수를 많이 마실수록\n높이 튀게 된다."
          y: "매일 1톤의 먹이를 먹는다.\n코에서 모은 해수를\n기세 좋게 내뿜으며 논다."
