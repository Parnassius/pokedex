        jp_kana:
          x: "うかつに　さわろうとすると\nからだじゅうに　はえる　トゲに\nさされて　きぜつすることも　ある。"
          y: "ハネと　しっぽを　すばやく　うごかし\nまえを　むいたまま　うしろへ\nおよぐことも　できる　ポケモン。"
        jp_kanji:
          x: "うかつに　触ろうとすると\n体中に　生える　トゲに　刺されて\n気絶することもある。"
          y: "羽と　尻尾を　素早く　動かし\n前を　向いたまま　後ろへ\n泳ぐこともできる　ポケモン。"
        en:
          x: "Its body bristles with sharp spikes. Carelessly trying\nto touch it could cause fainting from the spikes."
          y: "It is capable of swimming backwards by rapidly\nflapping its winglike pectoral fins and stout tail."
        fr:
          x: "Son corps est recouvert de pointes tranchantes.\nIl faut la plus grande attention pour le saisir, sous\npeine de se faire piquer."
          y: "Il peut nager à l’envers en agitant ses petites\nnageoires pectorales."
        it:
          x: "Ha il corpo ispido di aculei pungenti. Un contatto\nfortuito può causare uno svenimento."
          y: "È capace di nuotare all’indietro agitando rapidamente\nle pinne pettorali e la robusta coda."
        de:
          x: "Sein Körper ist mit scharfen Stacheln gespickt.\nWenn man sorglos ist und es berührt, kann man\ndurch die Stacheln bewusstlos werden."
          y: "Dieses Pokémon kann rückwärts schwimmen,\nindem es Flügel und Schwanz als Flossen einsetzt."
        es:
          x: "Las afiladas púas que le recubren el cuerpo se le\nerizan y pueden causar el debilitamiento con solo\ntocarlo."
          y: "Puede nadar hacia atrás moviendo rápidamente las\naletas pectorales y la robusta cola que tiene."
        ko:
          x: "섣불리 만지려고 하면\n몸 전체에서 돋아나는 가시에\n찔려 기절할 수도 있다."
          y: "날개와 꼬리를 재빠르게 움직여\n앞을 향한 채 뒤로\n헤엄칠 수 있는 포켓몬이다."
