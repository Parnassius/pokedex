      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      abilities:
        - chlorophyll
      hidden_ability: harvest
      descriptions:
        jp_kana:
          x: "テレパシーで　かいわをしているため\nタマタマを　ひきはなそうとしても\nすぐに　あつまって　６ぴきになる。"
          y: "なにかの　たまごの　ようだが\nじつは　しょくぶつの　タネにちかい\nいきもの　であることが　わかった。"
        jp_kanji:
          x: "テレパシーで　会話をしているため\nタマタマを　引き離そうとしても\nすぐに　集まって　６匹になる。"
          y: "なにかの　タマゴのようだが\nじつは　植物の　タネにちかい\n生き物であることが　わかった。"
        en:
          x: "Its six eggs converse using telepathy. They can\nquickly gather if they become separated."
          y: "Even though it appears to be eggs of some sort,\nit was discovered to be a life-form more like\nplant seeds."
        fr:
          x: "Ces six œufs communiquent par télépathie.\nIls peuvent se réunir rapidement si on les sépare."
          y: "Même s’il ressemble à des œufs, ce Pokémon\nappartient à la famille des végétaux."
        it:
          x: "Queste sei uova comunicano per telepatia.\nSi riuniscono subito anche se vengono divise."
          y: "Nonostante sia formato da uova, si è scoperto che\nla sua struttura è più simile a quella dei semi."
        de:
          x: "Die sechs Eier kommunizieren telepathisch.\nWerden sie getrennt, finden sie sich schnell wieder."
          y: "Auch wenn sein Erscheinungsbild eher Eiern ähnelt,\nwurde entdeckt, dass es mehr mit pflanzenähnlichen\nWurzeln in Zusammenhang steht."
        es:
          x: "Estos seis huevos se comunican por telepatía. Si se\nseparan, se pueden reunir rápidamente."
          y: "Aunque los huevos que lo constituyen parecen de\nverdad, se ha visto que son como semillas."
        ko:
          x: "텔레파시로 대화를 하기 때문에\n아라리를 갈라놓으려 해도\n바로 모여들어 6마리가 된다."
          y: "무언가의 알 같지만\n실은 식물의 씨앗에 가까운\n생물이라는 사실이 드러났다."
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
    jp_kanji: ナッシー
    en: Exeggutor
    fr: Noadkoko
    it: Exeggutor
    de: Kokowei
    es: Exeggutor
    ko: 나시
