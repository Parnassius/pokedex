        jp_kanji:
          x: "持っている　茎は　大切な\n武器でもあり　刀を　振るように\nいろんな　ものを　切ることができる。"
          y: "自分の　巣を　作るための\n植物の　茎を　１本\nいつも　持って　歩いている。"
        en:
          x: "The plant stalk it holds is its weapon. The stalk is\nused like a sword to cut all sorts of things."
          y: "It always walks about with a plant stalk clamped in\nits beak. The stalk is used for building its nest."
        fr:
          x: "Il utilise le légume qu’il tient comme s’il\ns’agissait d’une épée."
          y: "Ce Pokémon se promène toujours en tenant un\nlégume. Il l’utilise pour faire son nid."
        it:
          x: "Il verde gambo di porro che brandisce è la sua\narma, che usa come spada."
          y: "Si sposta sempre tenendo un gambo con il becco.\nGli serve per costruire il nido."
        de:
          x: "Dieses Pokémon nutzt eine Lauchstange als Waffe.\nEs setzt sie wie ein Schwert ein."
          y: "Es läuft stets mit einer Lauchstange umher.\nDamit baut es sein Nest."
        es:
          x: "El puerro que lleva es su mejor arma. Suele usarlo\ncomo espada para cortar cosas."
          y: "Siempre lleva un puerro consigo, con el que\nconstruye su nido."
        ko:
          x: "가지고 있는 파 줄기는 소중한\n무기이기도 하며 칼을 휘두르듯\n다양한 것을 자를 수 있다."
          y: "자신의 둥지를 만들기 위해서\n식물의 줄기 하나를\n항상 들고 걷는다."
