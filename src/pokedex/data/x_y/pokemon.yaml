          y: "１２００どの　マグマを　たいないに\nためこんでいる。ほのおの　わざを\nつかうと　コブは　ちいさく　しぼむ。"
        jp_kanji:
          x: "灼熱の　マグマを　背中の\nコブに　ためている。雨に　当たると\nマグマが　冷えて　動きが　鈍る。"
          y: "１２００度の　マグマを　体内に\nためこんでいる。炎の　技を\n使うと　コブは　小さく　しぼむ。"
        en:
          x: "Its humped back stores intensely hot magma.\nIn rain, the magma cools, slowing its movement."
          y: "The magma in its body reaches 2,200 degrees\nFahrenheit. Its hump gets smaller when it uses\nFire-type moves."
        fr:
          x: "Son dos bossu renferme une lave bouillonnante.\nElle refroidit par temps de pluie, ce qui le ralentit."
          y: "Son corps renferme une lave à plus de 1 200 °C.\nSa bosse se contracte lorsqu’il utilise des capacités\nde type Feu."
        it:
          x: "Nella gobba accumula magma. Quando piove, il\nmagma si indurisce e il Pokémon diventa più lento."
          y: "Nel suo corpo accumula magma che ribolle a 1200 °C.\nDopo aver usato una mossa di tipo Fuoco, la sua\ngobba si restringe."
        de:
          x: "In seinem Rücken speichert es sehr heißes Magma.\nRegnet es, kühlt das Magma ab und es wird\nlangsamer."
          y: "In seinem Körper fließt 1 200 °C heißes Magma. Nach\nEinsatz einer Feuer-Attacke schrumpft sein Höcker."
        es:
          x: "En su joroba almacena magma ardiente que se enfría\ncuando llueve y lo ralentiza."
          y: "Almacena en su cuerpo magma a 1200 °C. Su joroba\nmengua cuando utiliza movimientos de tipo Fuego."
        ko:
          x: "이글거리는 마그마를 등의\n혹에 모으고 있다. 비를 맞으면\n마그마가 식어 움직임이 둔해진다."
          y: "1200도의 마그마를 체내에\n모아두고 있다. 불꽃 기술을\n사용하면 혹은 작게 쪼그라든다."
