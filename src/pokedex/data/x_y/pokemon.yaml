          y: "こがらで　とても　おとなしい。\nおそわれると　ちいさな　どくばりを\nつかって　たたかい　みをまもる。"
        jp_kanji:
          x: "体は　小さくても　毒針を\n持つため　注意が　必要だ。\nメスのほうが　ツノが　小さい。"
          y: "小柄で　とても　おとなしい。\n襲われると　小さな　毒針を\n使って　戦い　身を　守る。"
        en:
          x: "Although small, its venomous barbs render\nthis Pokémon dangerous. The female has\nsmaller horns."
          y: "Small and very docile, it protects itself with its\nsmall, poisonous horn when attacked."
        fr:
          x: "Ce Pokémon est hérissé de dards empoisonnés.\nLes femelles ont une corne plus petite."
          y: "Petit et docile, il se protège avec sa minuscule corne\nempoisonnée lorsqu’il est attaqué."
        it:
          x: "Sebbene piccolo, i suoi baffi velenosi sono molto\npericolosi. La femmina ha un corno più minuto."
          y: "Molto docile e minuta, se viene attaccata si protegge\ncon il piccolo corno velenoso."
        de:
          x: "Dieses Pokémon ist sehr klein, verfügt aber über\nstarke Gifte. Das Weibchen hat ein kleineres Horn."
          y: "Es ist klein und scheu. Es verteidigt sich mit seinem\nkleinen, aber giftigen Horn."
        es:
          x: "Aunque pequeñas, sus venenosas púas son muy\npeligrosas. Tienen un cuerno más pequeño que\nlos machos."
          y: "De pequeño tamaño y dócil, cuando se le ataca, utiliza\nel cuerno venenoso que tiene encima de la cabeza."
        ko:
          x: "몸은 작지만 독침을\n지니고 있기 때문에 주의가 필요하다.\n암컷의 뿔이 더 작다."
          y: "몸이 작고 무척 얌전하다.\n습격당하면 작은 독침을\n사용해 싸워서 몸을 지킨다."
