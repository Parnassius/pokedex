          y: "ヒトモシの　ともす　あかりは\nひとや　ポケモンの　せいめいりょくを\nすいとって　もえているのだ。"
        jp_kanji:
          x: "明かりを　灯して　道案内を\nするように　見せかけながら\n生命力を　吸い取っている。"
          y: "ヒトモシの　灯す　明かりは\n人や　ポケモンの　生命力を\n吸い取って　燃えているのだ。"
        en:
          x: "While shining a light and pretending to be a guide,\nit leeches off the life force of any who follow it."
          y: "Litwick shines a light that absorbs the life energy of\npeople and Pokémon, which becomes the fuel that\nit burns."
        fr:
          x: "Il fait semblant de guider ses victimes à la lueur de\nsa flamme, mais c’est pour mieux aspirer leur énergie\nvitale."
          y: "Sa flamme brûle en consumant l’énergie vitale\ndes gens et des Pokémon."
        it:
          x: "Mentre fa luce col pretesto di fare loro da guida,\nassorbe energia vitale dalle sue prede."
          y: "La luce che emana brucia consumando l’energia di\nesseri umani e Pokémon."
        de:
          x: "Es entzündet ein Licht und gibt vor, dem Gegner\nden Weg zu weisen, doch eigentlich saugt es ihm\nseine Lebensenergie ab."
          y: "Es entfacht eine Flamme, die von der Lebensenergie\neines Menschen oder eines Pokémon zehrt."
        es:
          x: "Finge ser una luz guía en el camino, pero en realidad\nsolo quiere absorber la energía vital de quien lo sigue."
          y: "La luz que desprende absorbe la energía vital de\nhumanos y Pokémon."
        ko:
          x: "빛을 밝혀 길 안내를\n하는 것처럼 가장하여\n생명력을 빨아들이고 있다."
          y: "불켜미가 밝히는 빛은\n사람과 포켓몬의 생명력을\n빨아들여 불타고 있다."
lampent:
