      descriptions:
        jp_kana:
          x: "クルマユの　すむ　もりは　くさきが\nよく　そだつ。クルマユが　おちばを\nえいようぶんに　かえているのだ。"
          y: "はっぱで　からだを　つつみこんで\nさむさを　ふせぐ。てぢかな　おちばを\nたべながら　もりを　いどうする。"
        jp_kanji:
          x: "クルマユの　住む　森は　草木が\nよく　育つ。クルマユが　落ち葉を\n栄養分に　変えているのだ。"
          y: "葉っぱで　体を　包みこんで\n寒さを　防ぐ。手近な　落ち葉を\n食べながら　森を　移動する。"
        en:
          x: "Forests where Swadloon live have superb foliage\nbecause the nutrients they make from fallen leaves\nnourish the plant life."
          y: "It protects itself from the cold by wrapping up in\nleaves. It stays on the move, eating leaves\nin forests."
        fr:
          x: "Dans les forêts où il vit, la végétation pousse bien\ncar il transforme les feuilles mortes en engrais."
          y: "Il se protège du froid en s’emmitouflant dans une\nfeuille. Il se déplace en forêt et mange les feuilles\ntombées par terre."
        it:
          x: "Le foreste in cui vive Swadloon sono lussureggianti,\npoiché trasforma le foglie morte in sostanze nutritive."
          y: "Si protegge dal freddo avvolgendo il corpo nelle\nfoglie, che ha l’abitudine di mangiare in giro per la\nforesta."
        de:
          x: "Es wandelt herabgefallenes Laub in Nährstoffe um.\nIn Wäldern, wo es Folikon gibt, fühlen sich Pflanzen\npudelwohl."
          y: "Es schützt sich vor Kälte, indem es sich in Blätter\neinwickelt. Es durchstreift Wälder und frisst\nherabgefallenes Laub."
        es:
          x: "La vegetación abunda en los bosques que habita. Este\nPokémon transforma las hojas caídas en nutrientes."
          y: "Se guarece del frío envolviéndose en hojas. Se\ndesplaza por el bosque comiendo a su paso las\nhojas caídas."
        ko:
          x: "두르쿤이 사는 숲은 초목이\n잘 자란다. 두르쿤이 낙엽을\n영양분으로 바꾸기 때문이다."
          y: "잎사귀로 몸을 감싸\n추위를 막는다. 가까이 있는 낙엽을\n먹으며 숲을 이동한다."
