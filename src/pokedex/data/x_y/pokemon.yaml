          y: "もりや　そうげんに　せいそく。\nグループが　でくわすと　なわばりを\nかけた　あらそいが　はじまる。"
        jp_kanji:
          x: "大きな　グループを　作って\n行動する　習性。\nグループ同士の　争いは　激しい。"
          y: "森や　草原に　生息。\nグループが　出くわすと　なわばりを\nかけた　争いが　はじまる。"
        en:
          x: "They maintain huge flocks, although fierce scuffles\nbreak out between various flocks."
          y: "It lives in forests and fields. Squabbles over\nterritory occur when flocks collide."
        fr:
          x: "Il a coutume de se regrouper en larges volées.\nLes combats entre Étourvol sont très violents."
          y: "Il peuple les champs et les forêts. Lorsque deux\nvolées se croisent, elles luttent pour le territoire."
        it:
          x: "Ha l’abitudine di riunirsi in grandi gruppi. Le zuffe\ntra gruppi sono particolarmente vivaci."
          y: "Vive nelle foreste e nei campi muovendosi in grandi\ngruppi. Se due gruppi si incontrano, lottano\nper il territorio."
        de:
          x: "Es neigt dazu, sich in großen Gruppen zu bewegen.\nZwischen ihnen kommt es zu heftigen Kämpfen."
          y: "Es lebt in Wäldern und auf Wiesen. Treffen Schwärme\naufeinander, streiten sie sich um das Revier."
        es:
          x: "Vive siempre en grandes grupos y las disputas dentro\nde ellos son muy intensas."
          y: "Vive en bosques y campos. Si dos bandadas se\nencuentran, pelean por el territorio."
        ko:
          x: "큰 그룹을 만들어\n행동하는 습성이 있다.\n그룹 간의 분쟁이 격하다."
          y: "숲이나 초원에 서식한다.\n그룹이 마주치면 영역을 건\n분쟁이 시작된다."
