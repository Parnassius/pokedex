      descriptions:
        jp_kana:
          x: "あたまで　もえる　ほのおの　ように\nはげしい　せいかくの　ポケモン。\nすばやさでは　だれにも　まけない。"
          y: "すばやさで　あいてを　ほんろうする。\nりょうて　りょうあしを　つかった\nどくとくの　たたかい　かたを　する。"
        jp_kanji:
          x: "頭で　燃える　炎の　ように\n激しい　性格の　ポケモン。\n素早さでは　だれにも　負けない。"
          y: "素早さで　相手を　翻弄する。\n両手　両足を　使った\n独特の　戦い方を　する。"
        en:
          x: "Its crown of fire is indicative of its fiery nature.\nIt is beaten by none in terms of quickness."
          y: "It tosses its enemies around with agility. It uses all\nits limbs to fight in its own unique style."
        fr:
          x: "Sa couronne de feu trahit son tempérament bouillant.\nSa vitesse est inégalée."
          y: "Il fait voltiger ses ennemis grâce à sa vitesse et\nson style de combat spécial qui utilise ses quatre\nmembres."
        it:
          x: "La sua criniera di fuoco è indice della sua natura\nviolenta. Nessuno può batterlo in velocità."
          y: "Confonde il nemico con la velocità. Ha uno stile di\nlotta speciale, che prevede l’uso dei quattro arti."
        de:
          x: "Seine Krone aus Feuer ist Zeichen seines feurigen\nWesens. Niemand ist schneller im Kampf als dieses\nPokémon."
          y: "Es hält den Gegner mit flinken Bewegungen\nzum Narren. Im Kampf setzt es alle Gliedmaßen ein."
        es:
          x: "Su corona de fuego demuestra su naturaleza ígnea.\nNadie le gana en velocidad."
          y: "Maneja a sus rivales con tremenda agilidad. En su\nespecial forma de luchar usa todos sus miembros."
        ko:
          x: "머리에서 타오르는 불꽃처럼\n과격한 성격의 포켓몬이다.\n스피드는 누구에게도 지지 않는다."
          y: "스피드로 상대를 농락한다.\n양팔 양다리를 활용한\n독특한 방식으로 싸운다."
piplup:
