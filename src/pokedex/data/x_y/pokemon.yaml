      descriptions:
        jp_kana:
          x: "てごろな　いしに　あなを　あけて\nすみかにする。こわされると　かわりの\nいしが　みつかるまで　おちつかない。"
          y: "てごろな　サイズの　いしが　あると\nくちから　えきたいを　ぶんぴつして\nなかに　はいるための　あなをあける。"
        jp_kanji:
          x: "手ごろな　石に　穴を　開けて\n住処にする。壊されると　かわりの\n石が　見つかるまで　落ち着かない。"
          y: "てごろな　サイズの　石が　あると\n口から　液体を　分泌して\n中に　入るための　穴をあける。"
        en:
          x: "It makes a hole in a suitable rock. If that rock\nbreaks, the Pokémon remains agitated until it\nlocates a replacement."
          y: "When it finds a stone of a suitable size, it secretes\na liquid from its mouth to open up a hole to\ncrawl into."
        fr:
          x: "Il perce un caillou et s’en sert comme maison.\nQuand on lui casse, il est anxieux jusqu’à ce qu’il en\ntrouve un autre."
          y: "Lorsqu’il trouve un caillou à sa taille, il y creuse\nun trou avec le fluide qui sort de sa bouche et s’en\nsert comme maison."
        it:
          x: "Scava un buco in una pietra adatta per farne la sua\ndimora. Se si rompe, non si dà pace finché non ne\ntrova un’altra."
          y: "Quando trova una pietra della sua misura crea un\nbuco con il liquido che secerne dalla bocca e ci si\ninfila dentro."
        de:
          x: "Höhlt sich einen brauchbaren Stein aus, um darin\nzu wohnen. Geht er zu Bruch, ruht es nicht, bis es\neinen neuen findet."
          y: "Sobald es einen angemessen großen Stein findet,\nhöhlt es ihn mit einem ätzenden Sekret aus und\nkriecht hinein."
        es:
          x: "Abre un agujero en la roca y vive en él. Si la roca se\nresquebraja, no se queda tranquilo hasta que no\nencuentra otra."
          y: "Si encuentran una piedra de tamaño ideal, segregan\nun líquido por la boca para crear un agujero y\ndeslizarse dentro."
        ko:
          x: "적당한 돌을 찾아 구멍을 뚫어\n살 곳을 만든다. 부서지면 대신할\n돌을 찾을 때까지 불안해한다."
          y: "적당한 사이즈의 돌이 있으면\n입에서 액체를 분비해서\n안에 들어가기 위한 구멍을 판다."
crustle:
