        rare: star_piece
      descriptions:
        jp_kana:
          x: "メロエッタの　かなでる　せんりつは\nまわりの　ポケモンを　よろこばせたり\nかなしませるほどの　パワーがある。"
          y: "とくしゅな　はっせいほうで　うたう\nメロディは　きいた　ものの\nかんじょうを　じざいに　あやつる。"
        jp_kanji:
          x: "メロエッタの　奏でる　旋律は\nまわりの　ポケモンを　喜ばせたり\n悲しませるほどの　パワーがある。"
          y: "特殊な　発声法で　歌う　メロディは\n聞いた者の　感情を\n自在に　操る。"
        en:
          x: "The melodies sung by Meloetta have the power to\nmake Pokémon that hear them happy or sad."
          y: "Its melodies are sung with a special vocalization\nmethod that can control the feelings of those who\nhear it."
        fr:
          x: "Les mélodies enivrantes de Meloetta touchent les\nPokémon, pouvant les rendre heureux ou tristes."
          y: "Sa voix si particulière lui permet de chanter des\nmélodies qui ensorcellent les gens et modifient\nleurs émotions."
        it:
          x: "Canta una melodia che ha il potere di portare la\ngioia o la tristezza nel cuore dei Pokémon che\nl’ascoltano."
          y: "Controlla a suo piacimento le emozioni di coloro\nche ascoltano i suoi singolari vocalizzi."
        de:
          x: "Es besitzt die Macht, Pokémon, die sich in seiner\nNähe aufhalten, mit seinen Melodien froh oder\ntraurig zu stimmen."
          y: "Wer die Melodie hört, die es in einer speziellen\nStimmlage von sich gibt, steht voll in seinem Bann."
        es:
          x: "Las melodías que canta Meloetta tienen el poder de\nhacer sentir felicidad a los Pokémon que hay a su\nalrededor."
          y: "Controla los sentimientos de los que escuchan las\nmelodías que emite con su singular vocalización."
        ko:
          x: "메로엣타가 연주하는 선율에는\n주위 포켓몬을 기쁘게 하거나\n슬프게 할 정도의 힘이 있다."
          y: "특수한 발성법으로 노래하는\n멜로디는 노래를 들은 자의\n감정을 자유자재로 조종한다."
