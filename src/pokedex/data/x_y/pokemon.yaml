          y: "しんかいちょうさで　はっけんされた\nめずらしい　ポケモン。１おくねんの\nあいだ　すがたが　かわっていない。"
        jp_kanji:
          x: "１億年前から\n姿が　変わらない　ポケモン。\n深海を　調査中に　発見された。"
          y: "深海調査で　発見された\n珍しい　ポケモン。１億年の　あいだ\n姿が　変わっていない。"
        en:
          x: "It has remained unchanged for 100 million years.\nIt was discovered during a deep-sea exploration."
          y: "A rare Pokémon discovered during a deep-sea\nexploration. It has not changed in over\n100 million years."
        fr:
          x: "Relicanth n’a connu aucune évolution depuis 100\nmillions d’années. Il a été découvert pendant une\nexploration dans les profondeurs de la mer."
          y: "Un Pokémon rare aperçu lors d’une exploration\nsous-marine. Il n’a pas évolué depuis 100 millions\nd’années."
        it:
          x: "Immutato da 100 milioni di anni, è stato scoperto\ndurante un’esplorazione nelle profondità marine."
          y: "Un Pokémon raro scoperto durante un’esplorazione\ndel mare profondo. È immutato da 100 milioni di anni."
        de:
          x: "100 Millionen Jahre lang blieb es unverändert.\nEs wurde bei einer Tiefsee-Tauchexpedition entdeckt."
          y: "Tiefseeforscher fanden dieses seltene Pokémon,\ndas sich in 100 Millionen Jahren nicht verändert hat."
        es:
          x: "No ha sufrido ningún cambio desde hace 100 millones\nde años. Fue descubierto durante una expedición\nmarina."
          y: "Un Pokémon raro descubierto en una exploración\nmarina. No ha cambiado en más de 100 millones de\naños."
        ko:
          x: "1억 년 전부터 모습이\n바뀌지 않은 포켓몬이다. 심해를\n조사하던 중 발견되었다."
          y: "심해 조사에서 발견된\n희귀한 포켓몬이다. 1억 년\n동안 모습이 바뀌지 않았다."
luvdisc:
