          x: "あたまの　コブを　しんどうさせると\nすいちゅうが　なみだつ　だけでなく\nじめんも　じしんのように　ゆれる。"
          y: "すいちゅうと　りくちで　くらす。\nながく　ねばねばする　ベロをつかって\nあいての　うごきを　ふうじこめる。"
        jp_kanji:
          x: "頭の　コブを　振動させると\n水中が　波立つ　だけでなく\n地面も　地震のように　揺れる。"
          y: "水中と　陸地で　暮らす。\n長く　ねばねばする　ベロを使って\n相手の　動きを　封じこめる。"
        en:
          x: "When they vibrate the bumps on their heads, they\ncan make waves in water or earthquake-like\nvibrations on land."
          y: "It lives in the water and on land. It uses its long,\nsticky tongue to immobilize its opponents."
        fr:
          x: "Quand il fait vibrer la bosse sur sa tête, il provoque\ndes ondulations dans l’eau, mais aussi des\ntremblements de terre."
          y: "Il vit dans l’eau et sur la terre ferme. Il immobilise\nses proies avec sa langue longue et gluante."
        it:
          x: "Se fa vibrare il bernoccolo sulla testa può sollevare\nonde nell’acqua e anche provocare terremoti."
          y: "Vive in acqua e sulla terraferma. Immobilizza la preda\ncon la sua lunga lingua appiccicosa."
        de:
          x: "Wenn es die Beulen auf seinem Kopf zum\nSchwingen bringt, tobt je nach Umgebung\nentweder das Wasser oder die Erde bebt."
          y: "Es lebt zu Wasser und zu Lande. Mit seiner langen,\nklebrigen Zunge raubt es Gegnern die\nBewegungsfreiheit."
        es:
          x: "Cuando hace vibrar el bulto de su cabeza, no solo se\nembravece el mar, sino que la tierra también tiembla."
          y: "Vive tanto en tierra como en el fondo del mar. Con su\nlarga y viscosa lengua, inmoviliza a sus contrincantes."
        ko:
          x: "머리의 혹을 진동시키면\n물속에 파동이 일어나며\n땅마저 지진처럼 흔들린다."
          y: "수중과 육지에서 살며\n길고 끈적이는 혀를 사용하여\n상대의 움직임을 봉쇄한다."
