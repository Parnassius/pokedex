      descriptions:
        jp_kana:
          x: "かみなりぐもで　そらが　おおわれると\nあらわれる。たてがみで　カミナリを\nキャッチして　でんきを　ためる。"
          y: "ほうでんすると　たてがみが　ひかる。\nたてがみが　かがやく　かいすうや\nリズムで　なかまと　かいわしている。"
        jp_kanji:
          x: "雷雲で　空が　覆われると\n現れる。たてがみで　雷を\nキャッチして　電気を　ためる。"
          y: "放電すると　たてがみが　光る。\nたてがみが　輝く　回数や\nリズムで　仲間と　会話している。"
        en:
          x: "When thunderclouds cover the sky, it will appear.\nIt can catch lightning with its mane and store\nthe electricity."
          y: "Its mane shines when it discharges electricity.\nThey use the frequency and rhythm of these flashes\nto communicate."
        fr:
          x: "Il apparaît quand le ciel est à l’orage. Il capte les\néclairs avec sa crinière et accumule de l’électricité."
          y: "Sa crinière luit quand il lâche des décharges.\nIl module leur rythme et leur nombre pour\ncommuniquer avec ses pairs."
        it:
          x: "Appare quando il cielo si riempie di fulmini e saette.\nAccumula elettricità attirando i fulmini con la criniera."
          y: "Se emette scariche la sua criniera brilla. Comunica\ncon i suoi simili tramite il ritmo e la frequenza delle\npulsazioni luminose."
        de:
          x: "Es erscheint, wenn Gewitterwolken den Himmel\nverdunkeln. Es fängt mit seiner Mähne Blitze\nund hortet ihre Energie."
          y: "Um mit Artgenossen zu kommunizieren, nutzt es\ndas Aufblitzen seiner Mähne beim Entladen von\nStrom als Morsecode."
        es:
          x: "Aparece cuando nubes envueltas en rayos encapotan\nel cielo. Atrapa rayos con su crin y almacena\nelectricidad."
          y: "Su crin brilla cuando emite una descarga eléctrica.\nSe comunica con los suyos mediante el ritmo y el\nnúmero de brillos."
        ko:
          x: "번개 구름이 하늘을 뒤덮으면\n나타난다. 갈기로 번개를\n붙잡아 전기를 모은다."
          y: "방전하면 갈기가 빛난다.\n갈기가 빛나는 횟수나\n리듬으로 동료와 대화한다."
zebstrika:
