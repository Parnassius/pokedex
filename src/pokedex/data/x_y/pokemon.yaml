          y: "ボディーに　だんりょくせいが　あり\nおこらせると　いきを　すいこんで\nどんどん　おおきく　ふくらむ。"
        jp_kanji:
          x: "２匹　寄り添いあうと　お互いの\n毛皮が　気持ち良すぎて\n離れられなく　なってしまう。"
          y: "ボディーに　弾力性が　あり\n怒らせると　息を　吸いこんで\nどんどん　大きく　ふくらむ。"
        en:
          x: "Their fur feels so good that if two of them snuggle\ntogether, they won’t want to be separated."
          y: "The body is soft and rubbery. When angered,\nit will suck in air and inflate itself to an\nenormous size."
        fr:
          x: "Leur fourrure est si douce que s’ils se font des câlins,\nils ne voudront plus se séparer."
          y: "En cas de danger, il gonfle d’air son corps doux et\npotelé dans des proportions gigantesques."
        it:
          x: "Hanno un pelo così morbido che se due di loro\nsi abbracciano non vogliono più separarsi."
          y: "Il suo corpo è morbido e gommoso. Se si arrabbia,\naspira aria e si gonfia enormemente."
        de:
          x: "Sein Fell ist so flauschig, dass, wenn zwei\nzusammenstehen, sie nicht getrennt werden möchten."
          y: "Der Körper dieses Pokémon ist sehr elastisch.\nBei Gefahr bläht es sich zu enormer Körpergröße auf."
        es:
          x: "Su piel es tan suave que si dos de ellos se acurrucan\njuntos, no querrán separarse nunca."
          y: "Su cuerpo es blando y gomoso. Cuando se enfada,\ntraga aire y se hincha muchísimo."
        ko:
          x: "2마리가 바싹 붙어 있으면 서로의\n털이 너무 기분 좋아서\n떨어지지 않게 되어버린다."
          y: "몸에 탄력성이 있어\n화나게 하면 숨을 들이켜서\n점점 몸을 크게 부풀린다."
