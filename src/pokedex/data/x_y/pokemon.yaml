        fr:
          x: "Comme il ne voit rien, il perçoit son environnement\nen mordant et en fonçant à tout va. Il est couvert\nde plaies."
          y: "Comme il ne voit rien, il perçoit son environnement\nen mordant et en fonçant à tout va."
        it:
          x: "Dal momento che non ci vede, esamina ciò che lo\ncirconda mordendo o lanciandosi di peso. Ha\nammaccature su tutto il corpo."
          y: "Non vede bene ciò che lo circonda e sbatte qua e\nlà mordendo e mangiando tutto ciò che si muove."
        de:
          x: "Da es nichts sehen kann, sucht es seine Umgebung\nmit Rempel- und Bissattacken ab und ist immer\nmit Wunden übersät."
          y: "Da es nichts sehen kann, rammt und frisst es alles,\nwas ihm auf dem Weg in die Quere kommt."
        es:
          x: "No ve, por eso va haciendo placajes y dando\nmordiscos a diestro y siniestro. Su cuerpo está\nplagado de heridas."
          y: "No ve bien a su alrededor, por eso va chocándose a\ndiestro y siniestro, y mordiendo todo lo que se mueve."
        ko:
          x: "눈이 보이지 않아서 몸통박치기나\n물기로 주변을 살핀다.\n몸에 상처가 끊이지 않는다."
          y: "주변의 모습을 모르기 때문에\n닥치는 대로 부딪쳐서는\n움직이는 것을 물어 먹어치운다."
