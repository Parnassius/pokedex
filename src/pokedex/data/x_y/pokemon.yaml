        jp_kana:
          x: "カブルモと　いっしょに　いるときに\nでんきてきな　しげきを　うけると\nおたがいの　からだが　しんかする。"
          y: "カブルモと　ともに　でんきてきな\nエネルギーを　あびると　しんかする。\nりゆうは　かいめいされていない。"
        jp_kanji:
          x: "カブルモと　一緒に　いるときに\n電気的な　刺激を　受けると\nお互いの　体が　進化する。"
          y: "カブルモと　ともに　電気的な\nエネルギーを　浴びると　進化する。\n理由は　解明されていない。"
        en:
          x: "When it and Karrablast are together, and both\nreceive electrical stimulation, they both evolve."
          y: "It evolves when bathed in an electric-like energy\nalong with Karrablast. The reason is still unknown."
        fr:
          x: "S’il est à proximité d’un Carabing et que les deux\nreçoivent une décharge électrique, ils évoluent en\nmême temps."
          y: "Il évolue quand il baigne dans une énergie électrique\navec un Carabing. La cause en est inconnue."
        it:
          x: "Quando incontra Karrablast si crea della corrente\nelettrica che stimola entrambi i Pokémon causandone\nl’evoluzione."
          y: "Se riceve una scarica elettrica assieme a Karrablast,\nsi evolve. Il motivo non è chiaro."
        de:
          x: "Hält sich ein Laukaps in seiner Nähe auf\nund kommen beide mit Strom in Berührung,\nentwickeln sie sich."
          y: "Führt man ihm zusammen mit Laukaps elektrische\nEnergie zu, entwickelt es sich. Niemand kennt den\nGrund dafür."
        es:
          x: "Si está junto a Karrablast, y ambos reciben una\ndescarga eléctrica, evolucionan los dos a la vez."
          y: "Evoluciona si entra en contacto con energía eléctrica\njunto a Karrablast. Aún no se ha esclarecido el porqué."
        ko:
          x: "딱정곤과 함께 있을 때\n전기적인 자극을 받으면\n서로의 몸이 진화한다."
          y: "딱정곤과 함께 전기적인\n에너지를 받으면 진화한다.\n그 이유는 알려지지 않았다."
accelgor:
