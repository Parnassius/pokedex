          y: "おしりから　かいすいを　ふんしゃして\nじそく　１２０キロの　スピードで\nおよぎまわる　うみの　あばれんぼう。"
        jp_kanji:
          x: "鉄板も　かみちぎる　キバを　持ち\n泳ぐ　速度は　時速１２０キロ。\n別名は　海のギャング。"
          y: "お尻から　海水を　噴射して\n時速　１２０キロの　スピードで\n泳ぎ回る　海の　暴れん坊。"
        en:
          x: "Its fangs rip through sheet iron. It swims at 75 mph\nand is known as “The Bully of the Sea.”"
          y: "It can swim at speeds of 75 mph by jetting\nseawater through its body. It is the bandit of\nthe sea."
        fr:
          x: "Ses crocs lacèrent des feuilles d’acier. Il nage à\n120 km/h. On l’appelle « tyran des mers »."
          y: "Ce petit voyou fend les mers en se propulsant à\n120 km/h grâce à son postérieur."
        it:
          x: "Con le sue zanne può spezzare il ferro. Nuota\na 120 km/h. È noto come il “Tiranno del mare”."
          y: "Il “Tiranno del mare”! Nuota a 120 km/h espellendo\nacqua marina dal didietro a mo’ di propulsore."
        de:
          x: "Seine Zähne durchdringen sogar Eisen.\nEs schwimmt mit 120 km/h und wird\n„Tyrann des Meeres“ genannt."
          y: "Tohaido mag Radau und schwimmt bis zu\n120 km/h schnell, indem es Wasser aus\nseinem Hinterteil ausstößt."
        es:
          x: "Con sus colmillos puede atravesar el acero. Nada a\n120 km/h. Le llaman el Terror de los Mares."
          y: "Propulsándose con sus aletas, nada a 120 km/h.\nEs el terror de los mares."
        ko:
          x: "철판도 물어 찢는 이빨을 가지며\n헤엄치는 속도는 시속 120km다.\n별명은 바다의 건달이다."
          y: "엉덩이에서 해수를 분사해\n시속 120km의 스피드로\n헤엄치는 바다의 난동꾼이다."
