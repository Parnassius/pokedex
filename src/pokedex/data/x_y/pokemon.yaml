          y: "はがねの　からだを　もつ。\nめだまもようの　ついた　はさみを\nふりあげて　あいてを　いかくする。"
        jp_kanji:
          x: "鋼鉄を　含んでいる　ハサミで\n捕らえたものは　どんなに　硬くても\nコナゴナに　砕く。"
          y: "鋼の　体を　持つ。\n目玉模様の　ついた　ハサミを\n振り上げて　相手を　威嚇する。"
        en:
          x: "This Pokémon’s pincers, which contain steel, can\ncrush any hard object it gets ahold of into bits."
          y: "It has a steel-hard body. It intimidates foes by\nupraising its eye-patterned pincers."
        fr:
          x: "Les pinces de ce Pokémon contiennent de l’acier et\npeuvent réduire en miettes quasiment n’importe quoi."
          y: "Son corps est dur comme l’acier. Il intimide ses\nennemis en levant ses pinces pareilles à des yeux."
        it:
          x: "Le chele, che contengono acciaio, possono fare a\npezzi qualsiasi oggetto afferrino."
          y: "Ha un corpo duro come l’acciaio. Spaventa i nemici\ncon le chele, su cui sono disegnati degli occhi."
        de:
          x: "Dieses Pokémon kann mit seinen stählernen\nScheren jeden harten Gegenstand mühelos zermalmen."
          y: "Sein Körper ist stahlhart. Es bedroht seine Gegner,\nindem es die Augen auf seinen Scheren zeigt."
        es:
          x: "Las pinzas que posee tienen acero. Con ellas, no hay\nnada que se le resista. Rompen todo lo que pillan."
          y: "Su cuerpo es duro como el acero. Confunde a los\nrivales con los dibujos de ojos en sus pinzas."
        ko:
          x: "강철이 함유된\n집게로 잡은 것은 아무리\n딱딱해도 산산조각이 난다."
          y: "강철의 몸을 가지고 있다.\n눈알 무늬가 붙은 집게를\n치켜들어 상대를 위협한다."
