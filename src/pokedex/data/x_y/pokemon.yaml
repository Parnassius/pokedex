          y: "うつくしい　けなみを　もち\nじょせいトレーナーに　だいにんき。\nきまった　すみかを　もたない。"
        jp_kanji:
          x: "汚い　場所が　大嫌い。\n居心地の　良い　場所で\nいつも　毛並みを　手入れしている。"
