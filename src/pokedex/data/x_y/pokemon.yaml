      descriptions:
        jp_kana:
          x: "２ほんの　ツノで　えものを　はさんで\nちぎれるまで　はなさない。ちぎれない\nときは　かなたまで　なげとばすのだ。"
          y: "ながい　ツノを　ふりまわして\nこうげきしてくる。さむいときは\nもりの　おくに　すがたを　かくす。"
        jp_kanji:
          x: "２本の　ツノで　獲物を　挟んで\nちぎれるまで　放さない。ちぎれない\nときは　かなたまで　投げ飛ばすのだ。"
          y: "長い　ツノを　振り回して\n攻撃してくる。寒いときは\n森の　奥に　姿を　隠す。"
        en:
          x: "It grips prey with its pincers until the prey is torn\nin half. What it can’t tear, it tosses far."
          y: "It swings its long pincer horns wildly to attack.\nDuring cold periods, it hides deep in forests."
        fr:
          x: "Il serre les proies dans ses pinces pour les trancher\nen deux. S’il n’y arrive pas, il les jette au loin."
          y: "Il attaque sauvagement avec ses cornes. En hiver,\nil se cache au plus profond des forêts."
        it:
          x: "Afferra la preda con le pinze e non la molla finché\nnon l’ha tranciata. Se non ci riesce, la scaglia via."
          y: "Quando attacca agita le lunghe corna. Nei periodi\nfreddi sta nascosto nelle foreste."
        de:
          x: "Es hält seine Beute mit seiner Zange fest und\nteilt sie dann. Was es nicht teilen kann, wirft es fort."
          y: "Beim Angriff verdreht es sein Geweih.\nIn Kälteperioden versteckt es sich tief im Wald."
        es:
          x: "Atrapa presas con sus pinzas hasta que las parte en\ndos. Lanza lejos lo que no puede quebrar."
          y: "Arremete violentamente con su cornamenta. Cuando\nllega el frío, se adentra en los bosques."
        ko:
          x: "2개의 뿔 사이에 먹이를 끼우고\n조각날 때까지 놓지 않는다. 조각나지\n않으면 저편으로 세게 내던진다."
          y: "긴 뿔을 휘둘러서\n공격을 해온다. 추울 때는\n숲 깊은 곳에 몸을 숨긴다."
