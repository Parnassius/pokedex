      descriptions:
        jp_kana:
          x: "うでに　はえた　はっぱは　たいぼくも\nすっぱり　きりたおす　きれあじ。\nみつりんの　たたかいでは　むてき。"
          y: "ジャングルを　みがるに　はしりまわり\nうでに　はえた　きれあじ　するどい\nはっぱで　えものを　しとめるのだ。"
        jp_kanji:
          x: "腕に　生えた　葉っぱは　大木も\nスッパリ　切り倒す　切れ味。\n密林の　戦いでは　無敵。"
          y: "ジャングルを　身軽に　走り回り\n腕に　生えた　切れ味　鋭い　葉っぱで\n獲物を　しとめるのだ。"
        en:
          x: "The leaves that grow on its arms can slice down\nthick trees. It is without peer in jungle combat."
          y: "It agilely leaps about the jungle and uses the sharp\nleaves on its arms to strike its prey."
        fr:
          x: "Les feuilles sur ses bras peuvent trancher des troncs\népais. C’est le meilleur combattant des jungles."
          y: "Il parcourt la jungle avec agilité et attaque ses proies\ngrâce aux feuilles tranchantes sur ses bras."
        it:
          x: "Le foglie che crescono sulle sue braccia tagliano\nanche grandi alberi. Nel suo habitat, è imbattibile."
          y: "Percorre agile e veloce la giungla abbattendo le prede\ncon le affilate foglie che ha sugli arti anteriori."
        de:
          x: "Die Blätter an seinen Armen können dicke Bäume\nfällen. Im Dschungelkampf gibt es kein stärkeres\nPokémon."
          y: "Flink zischt es durch den Dschungel. Mit den\nBlattklingen an seinen Armen schlägt es seine Beute."
        es:
          x: "Las hojas de sus brazos pueden cortar gruesos\nárboles. Invencible en los combates en la jungla."
          y: "Corre con elegancia de un lugar a otro de la selva y\nusa las afiladas hojas de sus brazos para cazar."
        ko:
          x: "팔에 자란 잎사귀는 큰 나무도\n싹둑 베어 넘어뜨리는 정도다.\n밀림의 싸움에서는 무적이다."
          y: "정글을 가볍게 뛰어\n팔에 자란 예리하며 잘 드는\n잎날로 먹이를 꼼짝 못하게 한다."
