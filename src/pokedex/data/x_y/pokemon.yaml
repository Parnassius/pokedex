      descriptions:
        jp_kana:
          x: "せなかの　カラは　くずれやすいが\nときどき　たいないを　めぐっている\nこうねつの　ほのおが　ふきだす。"
          y: "からだは　いつも　なみうっていて\nようがんのように　あつい。\nときどき　カラから　ひのこがもれる。"
        jp_kanji:
          x: "背中の　殻は　崩れやすいが\nときどき　体内を　巡っている\n高熱の　炎が　噴き出す。"
          y: "体は　いつも　波打っていて\n溶岩のように　熱い。\nときどき　殻から　火の粉が漏れる。"
        en:
          x: "Its brittle shell occasionally spouts intense flames\nthat circulate throughout its body."
          y: "Its body is as hot as lava and is always billowing.\nFlames will occasionally burst from its shell."
        fr:
          x: "Sa coquille, très fragile, projette régulièrement\ndes flammes qui circulent dans son corps."
          y: "Son corps en ébullition est aussi chaud que de la\nlave. Des flammes sortent de sa coquille."
        it:
          x: "A volte intense fiamme partono dal fragile guscio e\navvolgono tutto il suo corpo."
          y: "Il corpo caldo come lava è sempre in ebollizione.\nA volte si vedono fiammate uscire dal guscio."
        de:
          x: "Aus seinem porösen Schneckengehäuse sprudeln\nFeuerfontänen, die seinen Körper durchfluten."
          y: "Sein Körper ist heißer als Lava und wogt stets.\nManchmal schießen Flammen aus seinem Haus."
        es:
          x: "En ocasiones, su resbaladiza concha lanza intensas\nllamaradas que recorren todo su cuerpo."
          y: "Tiene un cuerpo que no deja de hincharse y tan\ncaliente como la lava. La concha suelta llamas."
        ko:
          x: "등껍질은 깨어지기 쉬우며\n가끔 체내를 순환하고 있는\n고열의 불꽃을 뿜어낸다."
          y: "몸이 항상 일렁이고 있으며\n용암처럼 뜨겁다.\n때때로 껍데기에서 불티가 샌다."
swinub:
