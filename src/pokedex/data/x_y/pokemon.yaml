          y: "ボサボサの　たいもうの　なかに\nたべものを　かくして　もちあるく。\nたべる　ときは　ゴクリと　まるのみ。"
        jp_kanji:
          x: "長い　体の　毛の　下に\n食べ物を　隠す　習性。\n隠したことを　忘れてしまう。"
          y: "ボサボサの　体毛の　中に\n食べ物を　隠して　持ち歩く。\n食べる　ときは　ゴクリと　まる飲み。"
        en:
          x: "It hides food under its long body hair. However,\nit forgets it has hidden the food."
          y: "It conceals food under the long fur on its body.\nIt carts around this food stash and swallows it\nwithout chewing."
        fr:
          x: "Il cache de la nourriture sous les grands poils de son\ncorps, mais il finit souvent par l’oublier."
          y: "Goinfrex cache de la nourriture dans sa fourrure\nen pagaille. Il avale tout en une bouchée."
        it:
          x: "Nasconde il cibo sotto i lunghi peli del suo corpo.\nTuttavia, finisce spesso per dimenticarlo."
          y: "Nasconde il cibo sotto il pelo arruffato. Lo inghiotte\nsenza masticarlo: glop!"
        de:
          x: "Unter seinem langen Fell versteckt es Nahrung.\nAber es vergisst, dass es sie dort versteckt hat."
          y: "Unter seinem struppigen Fell trägt es Nahrung mit sich\nherum. Dann verschlingt es sie in einem Happs."
        es:
          x: "Esconde comida bajo el largo pelo de su cuerpo, pero\nmás tarde lo olvida."
          y: "En el interior de su pelaje revuelto esconde la comida\nque luego engullirá de una vez."
        ko:
          x: "몸의 긴 털 안쪽에\n먹이를 숨기는 습성이 있다.\n숨긴 것을 잊어버린다."
          y: "부스스한 털 안에\n먹이를 숨겨서 갖고 다닌다.\n먹을 때는 꿀꺽 통째로 삼킨다."
riolu:
