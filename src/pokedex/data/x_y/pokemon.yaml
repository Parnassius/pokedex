          y: "おたがいの　そんざいを　みとめあい\nむだに　あらそわない　ひとのために\nさまざまな　めぐみを　わけあたえる。"
        jp_kanji:
          x: "争いのない　平和な　土地に\nトゲキッスは　訪れ　さまざまな　恵みを\n分け与えると　言われる。"
          y: "お互いの　存在を　認め合い\n無駄に　争わない　人のために\nさまざまな　恵みを　分け与える。"
        en:
          x: "As everyone knows, it visits peaceful regions,\nbringing them gifts of kindness and\nsweet blessings."
          y: "It shares many blessings with people who respect\none another’s rights and avoid needless strife."
        fr:
          x: "On dit qu’il apparaît dans les contrées paisibles pour\ndispenser mille bienfaits."
          y: "Il apprécie particulièrement les gens qui respectent\nles autres et évitent les conflits inutiles."
        it:
          x: "Pare che Togekiss ami visitare le regioni pacifiche,\nsenza conflitti, donando bontà e dolcezza."
          y: "La sua natura lo rende affine alle persone che\nrispettano i diritti altrui ed evitano conflitti inutili."
        de:
          x: "Es heißt, Togekiss erscheine in friedlichen Zeiten\nund verteile alle möglichen Wohltaten."
          y: "Menschen, die unnötigen Streit vermeiden und\nsich gegenseitig respektieren, ist es wohlgesinnt."
        es:
          x: "Se dice que aparece en zonas pacíficas y las bendice\ncon sus dones."
          y: "Congenia muy bien con las personas que respetan los\nderechos de los demás y evitan riñas innecesarias."
        ko:
          x: "다툼이 없는 평화로운 땅에\n토게키스가 나타나 여러 가지\n은총을 나눠줬다고 전해진다."
          y: "서로 존재를 인정하고 쓸데없는\n분쟁을 하지 않는 사람을 위해\n다양한 은총을 나누어 준다."
