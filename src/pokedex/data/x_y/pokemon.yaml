      descriptions:
        jp_kana:
          x: "ひとや　ポケモンの　たましいが\nかたまって　うまれた　ポケモン。\nジメジメした　きせつが　だいすき。"
          y: "たましいの　みちしるべと　いわれる。\nフワンテを　もっていた　こどもは\nとつぜん　きえて　いなくなる。"
        jp_kanji:
          x: "人や　ポケモンの　魂が\n固まって　生まれた　ポケモン。\nジメジメした　季節が　大好き。"
          y: "魂の　道標と　いわれる。\nフワンテを　持っていた　子供は\n突然　消えて　いなくなる。"
        en:
          x: "A Pokémon formed by the spirits of people and\nPokémon. It loves damp, humid seasons."
          y: "These Pokémon are called the “Signpost for\nWandering Spirits.” Children holding them\nsometimes vanish."
        fr:
          x: "Un Pokémon né de l’esprit des gens et des Pokémon.\nIl aime les saisons chaudes et humides."
          y: "Les enfants qui attrapent des Baudrive disparaissent\nparfois. On lui donne le surnom de « bouée des esprits\négarés »."
        it:
          x: "Pokémon formato dalle anime di persone e Pokémon.\nAma le stagioni umide."
          y: "Anche detto “Guida degli spiriti vaganti”. A volte\ni bambini che ne hanno uno svaniscono\nimprovvisamente nel nulla."
        de:
          x: "Ein Pokémon, entstanden aus den Gefühlen von\nMenschen und Pokémon. Es mag feuchte Jahreszeiten."
          y: "Auch bekannt als „Wegweiser für umherstreifende\nGeister“. Kinder, die sie halten, verschwinden\nmanchmal."
        es:
          x: "Está formado por los espíritus de personas y Pokémon.\nLe encantan las estaciones húmedas."
          y: "Se dice que es como un hito que guía a las almas.\nLos niños que sostienen un Drifloon a veces\ndesaparecen sin más."
        ko:
          x: "사람이나 포켓몬의 영혼이\n한데 모여 태어난 포켓몬이다.\n습기 많은 계절을 매우 좋아한다."
          y: "영혼의 이정표라고 전해진다.\n흔들풍손을 가지고 있는 아이는\n갑자기 사라져버린다."
drifblim:
  species_id: 426
  names:
    jp_kana: フワライド
    jp_kanji: フワライド
    en: Drifblim
    fr: Grodrive
    it: Drifblim
