      descriptions:
        jp_kana:
          x: "ちのうが　たかく　きのみは\nやいてから　たべる　しゅうせい。\nひとの　てつだいを　このんでいる。"
          y: "かざんの　ほらあなで　くらす。\nあたまの　ふさの　なかが　もえていて\n３００どの　こうおんになる。"
        jp_kanji:
          x: "知能が　高く　木の実は\n焼いてから　食べる　習性。\n人の　手伝いを　好んでいる。"
          y: "火山の　洞穴で　暮らす。\n頭の　ふさの　中が　燃えていて\n３００度の　高温になる。"
        en:
          x: "Very intelligent, it roasts berries before eating them.\nIt likes to help people."
          y: "This Pokémon lives in caves in volcanoes.\nThe fire within the tuft on its head can reach\n600 degrees Fahrenheit."
        fr:
          x: "Un Pokémon très intelligent qui adore cuire ses Baies\navant de les manger. Il aime aussi aider les humains."
          y: "Il vit dans les cratères des volcans. L’intérieur de\nla mèche qu’il a sur la tête peut atteindre 300 °C."
        it:
          x: "È molto intelligente e ha l’abitudine di arrostire le\nbacche prima di mangiarle. Adora aiutare gli esseri\numani."
          y: "Vive nelle grotte vulcaniche. L’interno del ciuffo che\nha in testa brucia a una temperatura di 300 °C."
        de:
          x: "Ein kultiviertes Pokémon, das Beeren vor dem\nVerzehr stets anbrät. Es bietet den Menschen\ngerne seine Hilfe an."
          y: "Das Feuer in seinem Kopfbüschel erreicht\nTemperaturen von bis zu 300 °C. Es ist in\nVulkanhöhlen zu Hause."
        es:
          x: "Pokémon muy inteligente que tiene la costumbre de\ntostar las bayas antes de comérselas. Ayuda mucho\na los humanos."
          y: "Vive en cuevas volcánicas. El interior de su mata de\npelo arde, llegando a alcanzar hasta 300 °C."
        ko:
          x: "지능이 높고 나무열매는\n구운 뒤 먹는 습성이 있다.\n사람 도와주기를 좋아한다."
          y: "화산 동굴에서 산다.\n머리의 송아리 속이 불타고 있어\n300도나 되는 높은 온도가 된다."
