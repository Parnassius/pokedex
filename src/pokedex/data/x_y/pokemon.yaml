          y: "こうきしん　おうせいな　ポケモン。\nなににでも　きょうみを　もつので\nいつも　ジグザグに　あるいている。"
        jp_kanji:
          x: "ジグザグに　歩いて　草陰や\n地面に　埋まっている　宝物を\n見つけるのが　得意な　ポケモン。"
          y: "好奇心　旺盛な　ポケモン。\nなににでも　興味を　持つので\nいつも　ジグザグに　歩いている。"
        en:
          x: "It walks in zigzag fashion. It’s good at finding\nitems in the grass and even in the ground."
          y: "A Pokémon with abundant curiosity. It shows an\ninterest in everything, so it always zigzags."
        fr:
          x: "Il marche en zigzaguant et n’a pas son pareil pour\ntrouver des objets dans l’herbe ou sous terre."
          y: "Un Pokémon d’une curiosité insatiable. Il montre\nde l’intérêt pour tout ce qui l’entoure et passe d’un\nendroit à un autre en zigzaguant pour tout regarder."
        it:
          x: "Avanza a zigzag. È bravo a trovare strumenti\nnell’erba e sul terreno."
          y: "L’estrema curiosità lo porta a spostarsi di continuo\nin ogni direzione."
        de:
          x: "Es läuft im Zickzack. Es hat das Talent, Items\nim Gras, aber auch im Boden, zu finden."
          y: "Ein sehr neugieriges Pokémon. Es zeigt an allem\nInteresse, daher läuft es zickzack."
        es:
          x: "Se mueve en zigzag. Se le da bien encontrar\nobjetos ocultos en la hierba e incluso enterrados."
          y: "Es un Pokémon muy inquieto, se interesa por todo.\nSiempre está de aquí para allá."
        ko:
          x: "지그재그로 걸어서 풀숲이나\n땅에 묻혀 있는 보물을\n찾아내는 것이 특기인 포켓몬이다."
          y: "호기심이 왕성한 포켓몬.\n무엇이든지 흥미를 가지므로\n항상 지그재그로 걷고 있다."
