      descriptions:
        jp_kana:
          x: "いつも　はなみずを　たらしている。\nはなみずを　すすって　わざを　だす。\nはなみずが　わざの　もと　なのだ。"
          y: "はなみずは　けんこうの　バロメータ。\nちょうしが　いいと　ねばりづよくなり\nこおりの　わざの　いりょくも　ます。"
        jp_kanji:
          x: "いつも　鼻水を　垂らしている。\n鼻水を　すすって　技を　出す。\n鼻水が　技の　素　なのだ。"
          y: "鼻水は　健康の　バロメータ。\n調子が　いいと　粘り強くなり\n氷の　技の　威力も　増す。"
        en:
          x: "Its nose is always running. It sniffs the snot back up\nbecause the mucus provides the raw material for\nits moves."
          y: "Their snot is a barometer of health. When healthy,\ntheir snot is sticky and the power of their ice\nmoves increases."
        fr:
          x: "Il a toujours la goutte au nez. Il l’aspire pour\ndéclencher ses capacités. La morve en est la matière\npremière."
          y: "Sa roupie indique sa santé. S’il est en forme,\nelle sera épaisse et la puissance de ses attaques\nglacées augmentera."
        it:
          x: "Ha sempre il naso gocciolante e se ne serve per\nlanciare le sue mosse. Il muco è l’origine della sua\nforza."
          y: "La goccia del naso è il barometro della sua salute. Se\nsta bene è bella viscosa e potenzia le sue mosse\ndi tipo Ghiaccio."
        de:
          x: "Der Schleim, der stets aus seiner Nase hängt,\ntreibt seine Attacken an. Zieht es ihn hoch,\nsteht ein Angriff bevor."
          y: "Fühlt es sich wohl, wird der Schleim, der aus seiner\nNase trieft, klebrig und die Stärke seiner Eis-Attacken\nnimmt zu."
        es:
          x: "Siempre está con mucosidades colgando. Las aspira\npara hacer un movimiento, ya que son su materia prima\npara esto."
          y: "Sus mocos son su barómetro de salud. Si es buena,\nserán densos, y la fuerza de sus movimientos de tipo\nHielo aumentará."
        ko:
          x: "언제나 콧물을 달고 다닌다.\n콧물을 훌쩍거려 기술을 사용한다.\n콧물이 기술의 재료인 셈이다."
          y: "콧물은 건강의 척도다.\n상태가 좋으면 점성이 높아지고\n얼음 기술의 위력도 증가한다."
beartic:
  species_id: 614
  names:
    jp_kana: ツンベアー
    jp_kanji: ツンベアー
    en: Beartic
    fr: Polagriffe
    it: Beartic
