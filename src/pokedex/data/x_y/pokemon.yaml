        en:
          x: "They are intelligent and will cooperate to catch\nprey. From the ground, they use a running start to\ntake flight."
          y: "It runs better than it flies. It takes off into the sky\nby running at a speed of 25 mph."
        fr:
          x: "Il s’envole après avoir pris de l’élan. Il est assez\nintelligent pour chasser ses proies en groupe."
          y: "Il est plus doué pour courir que pour voler. Il doit\ns’élancer à 40 km/h avant de pouvoir s’envoler."
        it:
          x: "Spicca il volo prendendo la rincorsa da terra.\nCollabora con i suoi simili per catturare le prede."
          y: "È più versato nella corsa che nel volo. Si lancia in\naria a una velocità di 40 km/h sbattendo le ali."
        de:
          x: "Bevor es abhebt, nimmt es am Boden Anlauf.\nEs ist schlau genug, seine Beute zusammen\nmit Artgenossen zu jagen."
          y: "Zu Fuß ist es schneller als in der Luft. Es muss\nein Tempo von 40 km/h erreichen, bevor es sich\nin die Lüfte aufschwingt."
        es:
          x: "Levanta el vuelo tras coger carrerilla. Coopera con sus\ncompañeros de bandada para atrapar a sus presas."
          y: "Corre a mayor velocidad de la que puede volar.\nAlcanza una velocidad de 40 km/h antes de alzarse\nen vuelo hacia el cielo."
        ko:
          x: "지상에서 도움닫기를 하여\n날아오른다. 동료와 협력하여\n먹이를 잡는 지능을 가졌다."
          y: "나는 것보다 달리는 것이 특기로\n시속 40km로 달리던 기세로\n넓은 하늘로 날아오른다."
