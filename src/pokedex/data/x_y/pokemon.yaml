      descriptions:
        jp_kana:
          x: "すうひきで　むれを　つくる。\nがんきゅうを　カバーする　まくが\nすなあらしから　めを　まもる。"
          y: "めを　おおう　とくしゅな　まくが\nぶったいの　ねつを　かんちするため\nくらやみでも　まわりが　みえるのだ。"
        jp_kanji:
          x: "数匹で　群れを　作る。\n眼球を　カバーする　膜が\n砂嵐から　目を　守る。"
          y: "眼球を　覆う　特殊な　膜が\n物体の　熱を　感知するため\n暗闇でも　まわりが　見えるのだ。"
        en:
          x: "They live in groups of a few individuals. Protective\nmembranes shield their eyes from sandstorms."
          y: "The special membrane covering its eyes can sense\nthe heat of objects, so it can see its surroundings\neven in darkness."
        fr:
          x: "Ils vivent en petits groupes. La membrane qui couvre\nleurs yeux les protège du soleil."
          y: "La membrane spéciale qui recouvre ses yeux détecte\nla chaleur et lui permet de voir dans le noir."
        it:
          x: "Forma gruppi di pochi esemplari. La pellicola che\nricopre i suoi occhi lo protegge dalle tempeste di\nsabbia."
          y: "La membrana speciale che ha sugli occhi è in grado\ndi percepire il calore dei corpi, consentendogli così\ndi vedere al buio."
        de:
          x: "Bildet mit mehreren Artgenossen ein Rudel.\nEine Membran schützt seine Augen vor Sandstürmen."
          y: "Die spezielle Membran um seine Augen fungiert als\nWärmesensor, durch den es sich auch im Dunkeln\nzurechtfindet."
        es:
          x: "Viven en manadas. La membrana que cubre sus ojos\nlos protege de la arena."
          y: "Una membrana especial cubre sus ojos y le permite\ndetectar el calor de los cuerpos, por eso ve en la\noscuridad."
        ko:
          x: "여러 마리가 무리를 짓는다.\n안구를 감싼 막이\n모래 폭풍으로부터 눈을 지켜준다."
          y: "눈을 감싼 특수한 막이\n물체의 열을 감지해서\n어두워도 주변을 볼 수 있다."
krookodile:
