          y: "たいないで　うずまく　ちからを\nでんげきとして　だしながら　だいちを\nかけめぐる　あらあらしい　ポケモン。"
        jp_kanji:
          x: "雨雲を　背負っているので\nどんなときでも　雷を　出せる。\n雷とともに　落ちてきたという。"
          y: "体内で　渦巻く　力を\n電撃として　出しながら　大地を\n駆け巡る　荒々しい　ポケモン。"
        en:
          x: "The rain clouds it carries let it fire thunderbolts\nat will. They say that it descended with lightning."
          y: "This rough Pokémon stores energy inside its body,\nthen sweeps across the land, shooting\noff electricity."
        fr:
          x: "Le nuage de pluie qu’il porte peut relâcher la foudre\nà volonté. On dit de lui qu’il est venu avec l’orage."
          y: "Ce terrible Pokémon emmagasine de l’énergie puis\ncourt en lançant de puissants éclairs."
        it:
          x: "Grazie alle nubi di pioggia che ha con sé lancia\nfulmini a volontà. Pare che sia arrivato con un lampo."
          y: "Pokémon violento che accumula energia nel corpo\ne poi corre all’impazzata, scaricando elettricità."
        de:
          x: "Die Regenwolken, die es trägt, ermöglichen es ihm,\nGewitter zu erzeugen. Es strotzt vor Blitzen."
          y: "Dieses aggressive Pokémon speichert Energie\nin seinem Körper und entlädt sie, wenn es über\ndas Land streift."
        es:
          x: "Las nubes de lluvia que lleva le permiten lanzar rayos\na voluntad. Dicen que apareció con un rayo."
          y: "Este duro Pokémon almacena energía en su cuerpo.\nDespués, cuando se desplaza por tierra, la suelta."
        ko:
          x: "비구름을 짊어지고 있어서\n어떤 때라도 번개를 칠 수 있다.\n번개와 함께 떨어졌다고 한다."
          y: "체내에서 들끓는 힘을\n전격으로 내보내면서 대지를\n달리는 난폭한 포켓몬이다."
