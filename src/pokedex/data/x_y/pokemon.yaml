          x: "On dit que ce Pokémon serait né du soleil.\nIl évolue en enveloppant son corps des flammes qui\njaillissent de ses cornes."
          y: "Il vit au pied des volcans. Il repousse ceux qui\nl’attaquent avec les flammes qui jaillissent de ses cinq\ncornes."
        it:
          x: "Si dice che sia nato dal sole. Prima di evolversi,\navvolge tutto il suo corpo nelle fiamme emesse dai\ncorni."
          y: "Vive ai piedi dei vulcani. Se attaccato, mette in fuga\nil nemico lanciando fiamme dai suoi cinque corni."
        de:
          x: "Es heißt, es sei ein Produkt der Sonne.\nWenn es sich entwickelt, hüllt es sich in Flammen,\ndie es aus seinen Hörnern bläst."
          y: "Es lebt am Fuß von Vulkanen. Mit Gegnern räumt\nes auf, indem es aus seinen fünf Hörnern Flammen\nauf sie abfeuert."
        es:
          x: "Se dice que nació del sol. Al evolucionar, cubre su\ncuerpo con llamas que brotan de sus cuernos."
          y: "Vive en las laderas de los volcanes. Emite fuego por\nsus cinco cuernos para ahuyentar a sus enemigos."
        ko:
          x: "태양에서 태어났다고 전해진다.\n진화할 때 뿔에서 뿜어져 나온\n불꽃으로 전신을 감싼다."
          y: "화산 기슭에 서식한다.\n5개의 뿔에서 불꽃이 나와\n달려드는 상대를 격퇴한다."
volcarona:
  species_id: 637
  names:
