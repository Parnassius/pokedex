          x: "It eats anything, so it can even live in polluted\nstreams and lakes. No one pays any attention to it."
          y: "It is the shabbiest Pokémon of all. It forms in\nschools and lives at the bottom of rivers."
        fr:
          x: "Il peut vivre dans les fleuves et les lacs pollués car\nil mange de tout. Personne ne se soucie de lui."
          y: "Son apparence est pathétique. Il forme des bancs\ndans les rivières riches en plantes aquatiques."
        it:
          x: "Si nutre di qualsiasi cosa, pertanto vive anche in fiumi\ne laghi inquinati. È un Pokémon di scarso interesse."
          y: "Il Pokémon più sciatto. Vive in grandi gruppi nei\nletti dei fiumi ricchi di piante acquatiche."
        de:
