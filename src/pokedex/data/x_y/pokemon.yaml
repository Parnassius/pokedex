          y: "すいちゅうでの　せいかつに　てきした\nからだに　しんかした。\nみずに　とけると　みえなくなる。"
        jp_kanji:
          x: "きれいな　水辺を　好んでいる。\n細胞が　水の　分子に　似ており\n水に　溶けることもできる。"
          y: "水中での　生活に　適した\n体に　進化した。\n水に　溶けると　見えなくなる。"
        en:
          x: "It prefers beautiful shores. With cells similar to\nwater molecules, it could melt in water."
          y: "It has evolved to be suitable for an aquatic life.\nIt can invisibly melt away into water."
        fr:
          x: "Il préfère les belles plages. Il peut se dissoudre à\nvolonté grâce à ses cellules proches de l’eau."
          y: "Il a évolué pour s’adapter au milieu aquatique.\nIl peut se fondre et disparaître dans l’élément liquide."
        it:
          x: "Preferisce stare sulla costa. In acqua le sue cellule\nsimili a molecole acquee si possono scomporre."
          y: "Si è evoluto per adattarsi alla vita acquatica. Si può\nsciogliere nell’acqua diventando invisibile."
        de:
          x: "Es liebt schöne Ufer. Da seine Zellstruktur\nWassermolekülen ähnlich ist, kann es mit\nWasser verschmelzen."
          y: "Es hat sich so entwickelt, dass es im Wasser\nleben kann. Im Wasser selbst wird es unsichtbar."
        es:
          x: "Prefiere las bellas costas. Con células parecidas al\nagua, podría fundirse en la misma."
          y: "Ha evolucionado para adaptarse a la vida acuática.\nSe mimetiza a la perfección con el agua."
        ko:
          x: "아름다운 물가를 좋아한다.\n세포가 물의 분자구조와 닮아서\n물에 녹는 것도 가능하다."
          y: "수중에서의 생활에 적합한\n몸으로 진화했다.\n물에 녹으면 보이지 않게 된다."
jolteon:
  species_id: 135
  names:
    jp_kana: サンダース
