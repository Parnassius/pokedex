          y: "さばくのせいれい　と　よばれる。\nはばたくことで　まきおこした\nすなあらしの　なかに　かくれている。"
        jp_kanji:
          x: "羽の　羽ばたきで　砂漠の　砂を\n巻き上げて　姿を　隠す。\n赤い　カバーが　砂から　目を　守る。"
          y: "砂漠の精霊　と　呼ばれる。\nはばたくことで　巻き起こした\n砂嵐の　中に　隠れている。"
        en:
          x: "It hides itself by kicking up desert sand with its\nwings. Red covers shield its eyes from sand."
          y: "Known as “The Desert Spirit,” this Pokémon hides in\nthe sandstorms it causes by beating its wings."
        fr:
          x: "Il se cache du regard des autres en soulevant le sable\ndu désert avec ses ailes. Une fine peau rouge protège\nses yeux du sable."
          y: "On l’appelle « esprit du désert ». Son puissant\nbattement d’ailes provoque des tempêtes de sable\nqui le dissimulent."
        it:
          x: "Solleva sabbia con le ali per nascondersi. Un\nrivestimento rosso protegge gli occhi dalla sabbia\nstessa."
          y: "Viene chiamato “Spirito primordiale del deserto”.\nSi nasconde nelle tempeste di sabbia che genera\nbattendo le ali."
        de:
          x: "Es versteckt sich, indem es mit seinen Flügeln\nWüstensand aufwirbelt. Rote Augenlider schützen\nes vor dem Sand."
          y: "Auch bekannt als „Geist der Wüste“. Es versteckt sich\nin Sandstürmen, die es durch seinen Flügelschlag\nerzeugt."
        es:
          x: "Su medio es el desierto. Para esconderse, levanta\narena con las patas. Tiene los ojos protegidos con\nmallas rojas."
          y: "Se le conoce como el Alma del Desierto. Levanta\ntormentas de arena al batir sus alas y se refugia en\nsu interior."
        ko:
          x: "날갯짓으로 모래 폭풍을\n일으켜 모습을 감춘다. 빨간\n덮개가 모래로부터 눈을 보호한다."
          y: "사막의 정령이라고 불린다.\n날개를 쳐서 일으킨\n모래바람 속에 숨어 있다."
