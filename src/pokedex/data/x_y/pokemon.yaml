          y: "ひとや　ポケモンの　かんじょうを\nびんかんに　キャッチ。てきいを\nかんじると　ものかげに　かくれる。"
        jp_kanji:
          x: "赤いツノで　人や　ポケモンの\n温かな　気持ちを　キャッチすると\n全身が　ほのかに　熱くなる。"
          y: "人や　ポケモンの　感情を\n敏感に　キャッチ。敵意を　感じると\n物陰に　隠れる。"
        en:
          x: "If its horns capture the warm feelings of people or\nPokémon, its body warms up slightly."
          y: "It is highly attuned to the emotions of people and\nPokémon. It hides if it senses hostility."
        fr:
          x: "Quand ses cornes captent les ondes positives d’un\nPokémon ou d’un humain, son corps se réchauffe."
          y: "Il est très sensible aux émotions des gens et\ndes Pokémon. Il se cache au moindre signe\nd’hostilité."
        it:
          x: "Se con le corna avverte emozioni positive di persone\no Pokémon, il suo corpo si scalda leggermente."
          y: "È molto sensibile agli umori delle persone e degli altri\nPokémon. Se avverte ostilità, va a nascondersi."
        de:
          x: "Es erfasst warme Gefühle von Menschen\nund Pokémon mit seinen Hörnern und wärmt\nsich daran auf."
          y: "Es nimmt die Gefühle der Menschen und Pokémon\nmit großer Sorgfalt wahr. Spürt es Feindseligkeit,\nversteckt es sich."
        es:
          x: "Si sus cuernos perciben emociones positivas de\npersonas o Pokémon, su cuerpo se calienta un poco."
          y: "Capta muy bien lo que sienten las personas y los\nPokémon. Cuando nota cierta hostilidad, se esconde."
        ko:
          x: "빨간 뿔로 사람이나 포켓몬의\n따뜻한 마음을 캐치하면\n전신이 미약하게 뜨거워진다."
          y: "사람이나 포켓몬의 감정을\n민감하게 캐치한다. 적의를\n느끼면 그늘로 숨는다."
kirlia:
