          x: "てのひらの　あなから　イシツブテを\nはっしゃ。ぜんしんの　プロテクターは\nかざんの　ふんかにも　たえられる。"
          y: "いわを　てのひらの　あなに　つめて\nきんにくの　ちからで　はっしゃする。\nまれに　イシツブテを　とばす。"
        jp_kanji:
          x: "手のひらの　穴から　イシツブテを\n発射。全身の　プロテクターは\n火山の　噴火にも　耐えられる。"
          y: "岩を　手のひらの　穴に　つめて\n筋肉の　力で　発射する。\nまれに　イシツブテを　飛ばす。"
        en:
          x: "From holes in its palms, it fires out Geodude.\nIts carapace can withstand volcanic eruptions."
          y: "It puts rocks in holes in its palms and uses its\nmuscles to shoot them. Geodude are shot at\nrare times."
        fr:
          x: "Ses paumes projettent des Racaillou, et son corps\ncouvert de Protecteurs résiste même à une éruption\nvolcanique."
          y: "Il bande ses muscles pour projeter des pierres ou\ndes Racaillou depuis le creux de ses paumes."
        it:
          x: "Mette dei Geodude nelle cavità dei palmi e li lancia.\nUsa Copertura per resistere alle eruzioni vulcaniche."
          y: "Mette rocce nelle cavità dei suoi palmi e le getta\ncon tutta la sua forza. Talvolta lancia Geodude."
        de:
          x: "Es feuert Kleinstein aus seinen Handflächen.\nDurch seinen Schützer erträgt es sogar\nVulkanausbrüche."
          y: "Es legt Steine in die Löcher seiner Hände und wirft sie\nmit Muskelkraft. Sogar Georok werden verwendet."
        es:
          x: "Lanza Geodude por los agujeros de las manos.\nGracias a Protector resiste erupciones volcánicas."
          y: "Pone rocas en los agujeros de sus manos y las lanza\ncon los músculos. A veces lanza Geodude."
        ko:
          x: "손바닥의 구멍에서 꼬마돌을\n발사한다. 전신의 프로텍터는\n화산의 분화도 견뎌낸다."
          y: "바위를 손바닥의 구멍에 채워서\n근육의 힘으로 발사한다.\n드물게 꼬마돌을 날린다."
tangrowth:
  species_id: 465
