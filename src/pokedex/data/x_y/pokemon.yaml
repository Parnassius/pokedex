          y: "おおきく　ちからづよい　あごで\nかみつくと　そのまま　くびをふって\nあいてを　ずたずたに　ひきちぎる。"
        jp_kanji:
          x: "普段は　ゆっくりとした　動きだが\n獲物に　かみつくときは\n目にも　止まらない　スピードだ。"
          y: "大きく　力強い　アゴで\nかみつくと　そのまま　首を振って\n相手を　ずたずたに　引きちぎる。"
        en:
          x: "It usually moves slowly, but it goes at blinding\nspeed when it attacks and bites prey."
          y: "When it bites with its massive and powerful jaws,\nit shakes its head and savagely tears its victim up."
        fr:
          x: "Ce Pokémon à l’air pataud est capable d’attaquer\nà la vitesse de l’éclair pour mordre sa proie."
          y: "Quand il mord avec sa puissante mâchoire, il secoue\nsa tête pour déchiqueter sa pauvre victime."
        it:
          x: "Di solito si muove lentamente, ma quando attacca e\nmorde la preda si muove a una velocità incredibile."
          y: "Mordendo con le grandi e potenti mandibole, agita\nil capo riducendo la vittima in brandelli."
        de:
          x: "Eigentlich bewegt es sich langsam, doch seine\nBeute greift es blitzschnell an."
          y: "Wenn es mit seinem kräftigen Kiefer zubeißt, schüttelt\nes seinen Kopf und reißt seine Opfer in Stücke."
        es:
          x: "Se suele mover lento, pero alcanza velocidades de\nvértigo al atacar y morder a sus enemigos."
          y: "Al morder con sus feroces fauces, mueve su cabeza\ndespedazando salvajemente a su víctima."
        ko:
          x: "평소에는 느긋하게 움직이지만\n먹이를 물 때에는 눈에 보이지\n않는 엄청난 스피드를 낸다."
          y: "크고 힘센 턱으로\n한번 물면 그대로 목을 흔들어\n상대를 갈기갈기 찢는다."
