        en:
          x: "Very protective of its territory, it flaps its short\nwings busily to dart around at high speed."
          y: "Eats bugs in grassy areas. It has to flap its short\nwings at high speed to stay airborne."
        fr:
          x: "Très protecteur de son territoire, il bat vite des ailes\npour se déplacer à toute allure."
          y: "Il chasse les insectes dans les hautes herbes.\nSes petites ailes lui permettent de voler très vite."
        it:
          x: "Molto geloso del suo territorio, svolazza in giro\na gran velocità battendo le ali continuamente."
          y: "Mangia insetti nell’erba alta. Per restare in aria deve\nsbattere le corte ali molto velocemente."
        de:
          x: "Es beschützt sein Gebiet stets vor Eindringlingen.\nDaher fliegt es ständig wild umher."
          y: "Es ernährt sich von Insekten, die es im Gras findet.\nEin starker Flügelschlag hält es in der Luft."
        es:
          x: "Muy protector de su territorio, mueve sus cortas alas\nsin descanso para lanzarse a toda velocidad."
          y: "Come bichos en zonas de hierba. Agita sus cortas alas\nmuy rápido para mantenerse en el aire."
        ko:
          x: "자신의 영역을 지키기 위해\n작은 날개를 쳐서\n바쁘게 주위를 날아 맴돈다."
          y: "풀숲의 벌레 따위를 먹는다.\n날개가 짧기 때문에 항상\n쉴 새 없이 날개 치고 있다."
