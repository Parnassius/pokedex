        jp_kana:
          x: "たいないの　じかんの　かんかくは\nどんなときでも　せいかくで\nきまった　リズムで　くびをかしげる。"
          y: "いつも　いっぽんあしで　たっている。\nあしを　いれかえる　しゅんかんは\nすばやくて　なかなか　みられない。"
        jp_kanji:
          x: "体内の　時間の　間隔は\nどんなときでも　正確で\n決まった　リズムで　首をかしげる。"
          y: "いつも　一本足で　立っている。\n脚を　入れ替える　瞬間は\n素早くて　なかなか　見られない。"
        en:
          x: "It has a perfect sense of time. Whatever happens,\nit keeps rhythm by precisely tilting its head in time."
          y: "It always stands on one foot. It changes feet so\nfast, the movement can rarely be seen."
        fr:
          x: "Il a un sens du timing parfait. Il reste toujours en\nrythme en balançant sa tête."
          y: "Il se tient toujours sur un pied. Il change de pied\nsi vite qu’on peut à peine distinguer ce mouvement."
        it:
          x: "Ha un eccezionale senso del ritmo. Tiene il tempo\npiegando la testa a intervalli regolari."
          y: "Sta sempre su un piede solo. Cambia piede così\nrapidamente che è raro vederlo mentre lo fa."
        de:
          x: "Sein Zeitgefühl ist perfekt. Was auch immer passiert,\nes behält den Rhythmus, da sein Kopf wackelt."
          y: "Es steht immer auf einem Bein. Es wechselt sein\nStandbein so schnell, dass man es kaum sieht."
        es:
          x: "Su percepción del tiempo es exacta. Ocurra lo que\nocurra, lleva el ritmo moviendo la cabeza."
          y: "Camina con una sola pata. Cambia tan rápidamente\nde pata que apenas se le ve."
        ko:
          x: "체내의 시간 감각은\n어느 때든 정확해서\n규칙적인 리듬으로 목을 기울인다."
          y: "항상 한 발로 서 있다.\n발을 교체하는 순간이\n빨라서 좀처럼 볼 수 없다."
noctowl:
