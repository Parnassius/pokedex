          y: "きせつの　かわりめに　なると\nたいもうと　においが　へんかする。\nきせつを　つげる　ポケモン。"
        jp_kanji:
          x: "季節が　変わったとき　だけでなく\n気温や　湿度に　よっても\n体の色は　少し　変化する。"
