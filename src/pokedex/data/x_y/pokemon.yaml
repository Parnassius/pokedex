          x: "ジェットスキーに　まけない　そくどで\nおよぐ。つばさの　へりは　するどく\nりゅうひょうを　せつだんする。"
          y: "クチバシから　のびている　３ぼんの\nツノは　つよさの　しょうちょう。\nリーダーが　いちばん　おおきい。"
        jp_kanji:
          x: "ジェットスキーに　負けない　速度で\n泳ぐ。翼の　縁は　鋭く\n流氷を　切断する。"
          y: "クチバシから　伸びている　３本の\nツノは　強さの　象徴。\nリーダーが　一番　大きい。"
        en:
          x: "It swims as fast as a jet boat. The edges of its\nwings are sharp and can slice apart drifting ice."
          y: "The three horns that extend from its beak attest to\nits power. The leader has the biggest horns."
        fr:
          x: "Il nage aussi vite qu’un hors-bord. Le tranchant de\nses ailes peut fendre un bloc de glace à la dérive."
          y: "Les trois cornes de son bec sont le symbole de sa\nforce. Celles du chef sont plus grosses que les autres."
        it:
          x: "Nuota veloce come una moto d’acqua. Le estremità\ndelle ali sono aguzze e spaccano anche il ghiaccio."
          y: "Le tre corna che si allungano dal suo becco attestano\nla sua forza. Il capogruppo ha le corna più grosse."
        de:
          x: "Es schwimmt so schnell wie ein Rennboot. Seine Flügel\nhaben scharfe Seiten und können Packeis schneiden."
          y: "Die drei Hörner, die aus dem Schnabel wachsen,\nstehen für Kraft. Ein Anführer hat die größten Hörner."
        es:
          x: "Nada tan rápido como un fueraborda. Con los\nafilados bordes de sus alas puede cortar el hielo."
          y: "Los tres cuernos de su pico son muestra de su fuerza.\nEl líder tiene los cuernos más grandes."
        ko:
          x: "제트스키와 맞먹는 속도로\n헤엄친다. 날개 가장자리는\n날카롭게 유빙을 절단한다."
          y: "부리에서 늘어난 3개의 뿔은\n강하다는 것을 증명한다.\n리더의 뿔이 제일 크다."
starly:
