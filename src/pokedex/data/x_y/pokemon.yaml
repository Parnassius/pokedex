        fr:
          x: "Ils travaillent de concert pour protéger leur colonie\ndes terribles attaques de leur prédateur naturel,\nAflamanoir."
          y: "Ils portent une armure de fer et se regroupent pour\ncontrer les attaques de leurs prédateurs,\nles Aflamanoir."
        it:
          x: "Heatmor è il loro acerrimo nemico, e quando\nvogliono cacciarlo dalla tana si dividono i compiti\ne partono all’attacco!"
          y: "È protetto da un’armatura d’acciaio. Si riunisce in\ngruppi per respingere gli attacchi di Heatmor, il suo\npredatore."
        de:
          x: "Eine ausgeklügelte Rollenverteilung hilft ihnen dabei,\nihren natürlichen Feind Furnifraß\naus dem Nest zu verjagen."
          y: "Ein eiserner Panzer umgibt seinen Leib. Angriffe von\nFurnifraß, seinem Feind, schlägt es in der Gruppe\nzurück."
        es:
          x: "Actúan en grupo para expulsar de sus colonias a los\nHeatmor, sus depredadores naturales."
          y: "Llevan una armadura de acero. Se defienden en grupo\npara contrarrestar a sus depredadores, los Heatmor."
        ko:
          x: "천적인 앤티골에 대해서\n모두와 역할 분담을 하면서\n반격해 둥지에서 쫓아낸다."
          y: "강철의 갑옷을 몸에 걸친다.\n천적인 앤티골의 공격을\n집단으로 막아 반격한다."
