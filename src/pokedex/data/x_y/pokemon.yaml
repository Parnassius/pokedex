          y: "なんでも　くちびるで　ふれてみて\nたしかめる。すきな　ものも　きらいな\nものも　くちびるが　おぼえている。"
        jp_kanji:
          x: "唇が　一番　敏感。\nなんでも　まず　唇で　触れて\nどんなものか　確認する。"
          y: "なんでも　唇で　触れてみて\n確かめる。好きな　物も　嫌いな　物も\n唇が　覚えている。"
        en:
          x: "Its lips are the most sensitive part of its body.\nIt always uses its lips first to examine things."
          y: "It tests everything by touching with its lips,\nwhich remember what it likes and dislikes."
        fr:
          x: "Ses lèvres sont la partie la plus sensible de son corps.\nIl les utilise pour examiner les objets."
          y: "Il goûte à tout du bout des lèvres. Elles gardent\nen mémoire ses goûts et ses dégoûts."
        it:
          x: "Le labbra sono la parte più sensibile del corpo,\nil primo organo con cui analizza nuovi oggetti."
          y: "Analizza tutto con le labbra e con esse riesce a\nmemorizzare ciò che gli piace e ciò che non gli piace."
        de:
          x: "Die Lippen sind sein empfindlichster Körperteil.\nNeue Dinge untersucht es zuerst damit."
          y: "Dieses Pokémon berührt alles mit den Lippen.\nDiese merken sich, was es mag und nicht mag."
        es:
          x: "Sus labios son la parte más sensible de su cuerpo.\nSiempre los usa para examinar las cosas."
          y: "Analiza todo tocándolo con los labios. Así puede\nrecordar las cosas que le gustan y disgustan."
        ko:
          x: "입술이 제일 민감하다.\n뭐든지 먼저 입술로 건드려서\n어떤 것인지 확인한다."
          y: "무엇이든 입술로 건드려보고\n확인한다. 좋아하는 것도 싫어하는\n것도 입술이 기억하고 있다."
