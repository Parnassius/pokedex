          y: "からだは　ちいさいが　ちからもち。\nおとなの　ひとを　かるがると\nせなかに　のせて　あるいてしまう。"
        jp_kanji:
          x: "愛情表現で　鼻を　ぶつけてくるが\n力が　あるので\n気をつけないと　吹っ飛ばされる。"
          y: "体は　小さいが　力持ち。\n大人の　人を　軽々と\n背中に　乗せて　歩いてしまう。"
        en:
          x: "As a sign of affection, it bumps with its snout.\nHowever, it is so strong, it may send you flying."
          y: "It is strong despite its compact size. It can easily\npick up and carry an adult human on its back."
        fr:
          x: "Il se cogne sur celui ou celle qu’il apprécie. Il est\ncependant si fort qu’il fait souvent mal."
          y: "Il est fort malgré son aspect ramassé. Il n’a aucun mal\nà porter un humain adulte sur son dos."
        it:
          x: "Dà colpi con il muso in segno di affetto, ma è così\nforte che può far volare la gente in questo modo."
          y: "Non è molto grande, ma è forte. Può sollevare un\nadulto e trasportarlo sul dorso senza fatica."
        de:
          x: "Als Zeichen seiner Zuneigung stupst es dich mit\ndem Rüssel, was dich aber buchstäblich umwerfen\nkönnte."
          y: "Trotz seiner geringen Größe ist es stark. Es kann\neinen Erwachsenen mühelos auf dem Rücken tragen."
        es:
          x: "Como muestra de afecto, golpea con su trompa.\nAunque es tan fuerte que te mandará lejos."
          y: "A pesar de su tamaño reducido, es tan fuerte que\npuede llevar a un humano a su espalda con facilidad."
        ko:
          x: "애정 표현으로 코를\n부딪쳐 오지만 힘이 있기 때문에\n조심하지 않으면 날아가 버린다."
          y: "몸은 작지만 힘이 장사다.\n어른인 사람을 가볍게\n등에 태우고 걸어 다닌다."
donphan:
