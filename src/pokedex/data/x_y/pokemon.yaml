          y: "がんせきの　ような　かたい　からだは\nダイナマイトでも　きずつかない。\n１ねんに　１どだけ　だっぴする。"
        jp_kanji:
          x: "山頂から　ふもとまで　続く　溝は\nゴローニャが　転がり落ちる\n通り道なので　要注意。"
          y: "岩石の　ような　硬い　体は\nダイナマイトでも　傷つかない。\n１年に　１度だけ　脱皮する。"
        en:
          x: "It tumbles down mountains, leaving grooves\nfrom peak to base. Stay clear of these grooves."
          y: "Even dynamite can’t harm its hard, boulder-like\nbody. It sheds its hide just once a year."
        fr:
          x: "À force de dévaler les falaises, il a creusé de larges\nsillons. Mieux vaut ne pas s’en approcher."
          y: "Aucun explosif ne pourrait entamer sa carapace de\npierre. Il mue une fois par an."
        it:
          x: "A furia di rotolare giù dalla cima dei monti, ha\nformato dei solchi. Meglio evitarli."
          y: "Muta il guscio solo una volta all’anno. Neanche la\ndinamite può scalfire il suo corpo durissimo."
        de:
          x: "Sie rollen Berge hinunter und hinterlassen\nSpurrillen. Halte dich von diesen Rillen fern."
          y: "Selbst Sprengstoff kann seinem harten Körper\nnichts anhaben. Häutet sich nur einmal jährlich."
        es:
          x: "Se lanza montaña abajo y deja un surco desde la cima\nhasta el pie. Es mejor mantenerse alejado."
          y: "Ni siquiera la dinamita puede dañar su cuerpo rocoso.\nMuda la piel una vez al año."
        ko:
          x: "산 정상에서 산기슭까지 이어지는\n움푹 패인 홈은 딱구리가 굴러\n다니는 길이므로 주의가 필요하다."
          y: "암석 같은 단단한 몸은\n다이너마이트로도 상처를\n입힐 수 없다. 1년에 1번 탈피한다."
ponyta:
