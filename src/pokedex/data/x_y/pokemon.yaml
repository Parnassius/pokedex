        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          x: "もりの　なかの　みずべで　くらす。\nひるまは　もりの　そとに　でて\nこうらの　きに　ひかりを　あてる。"
          y: "きれいな　みずが　わきでる　ばしょを\nしっていて　なかまの　ポケモンを\nせなかに　のせて　そこまで　はこぶ。"
        jp_kanji:
          x: "森の　中の　水辺で　暮らす。\n昼間は　森の　外に　出て\n甲羅の　木に　光を　当てる。"
          y: "きれいな　水が　わき出る　場所を\n知っていて　仲間の　ポケモンを\n背中に　乗せて　そこまで　運ぶ。"
        en:
          x: "It lives along water in forests. In the daytime,\nit leaves the forest to sunbathe its treed shell."
          y: "It knows where pure water wells up. It carries fellow\nPokémon there on its back."
        fr:
          x: "Il vit en forêt près de l’eau. En journée, il la quitte\npour dorer sa carapace feuillue au soleil."
          y: "Il sait d’instinct où trouver une source d’eau pure.\nIl y transporte d’autres Pokémon sur son dos."
        it:
          x: "Vive nelle foreste vicino all’acqua, ma esce di giorno\nper far prendere sole alle piante sul guscio."
          y: "Sa come trovare sorgenti incontaminate, dove porta\ni Pokémon amici tenendoli sulla schiena."
        de:
          x: "Es lebt in der Nähe von Wasser in Wäldern.\nTagsüber verlässt es diese, um ein Sonnenbad\nzu nehmen."
          y: "Es weiß, wo es reinstes Quellwasser finden kann.\nTrägt andere Pokémon auf seinem Rücken dorthin."
        es:
          x: "Vive en los bosques cerca del agua. Por el día, sale a\nque les dé el sol a las plantas de su espalda."
          y: "Sabe dónde encontrar manantiales de agua pura y\nlleva a los Pokémon amigos hasta allí en su lomo."
        ko:
          x: "숲 속의 물가에서 산다.\n낮에는 숲 밖으로 나와서\n등껍질의 나무에 빛을 쬔다."
          y: "깨끗한 물이 솟아나는 장소를\n알고 있어서 동료 포켓몬을\n등에 태우고 그곳까지 데려다 준다."
torterra:
