      descriptions:
        jp_kana:
          x: "はっこうたいの　てんめつを　みつめた\nあいては　めが　くらみ　たたかう\nきもちが　なくなってしまうのだ。"
          y: "ひかりの　てんめつで　おそってきた\nてきの　せんいを　なくしてしまう。\nその　すきに　すがたを　かくすのだ。"
        jp_kanji:
          x: "発光体の　点滅を　見つめた　相手は\n目が　くらみ　戦う　気持ちが\nなくなってしまうのだ。"
          y: "光の　点滅で　襲ってきた　敵の\n戦意を　なくしてしまう。\nその　すきに　姿を　くらますのだ。"
        en:
          x: "Opponents who stare at the flashing of the\nlight-emitting spots on its body become\ndazed and lose their will to fight."
          y: "It flashes the light-emitting spots on its body,\nwhich drains its opponent’s will to fight.\nIt takes the opportunity to scuttle away and hide."
        fr:
          x: "Éblouis par les points lumineux qui clignotent sur son\ncorps, les ennemis perdent toute envie de se battre."
          y: "Il ébranle le moral des ennemis lui cherchant noise\ngrâce aux clignotements qu’il émet.\nIl profite de cette diversion pour se cacher."
        it:
          x: "I nemici che guardano la luce lampeggiante emessa\ndal suo corpo rimangono abbagliati e perdono il loro\nspirito combattivo."
          y: "Fa lampeggiare i motivi sul suo corpo in una sequenza\nipnotica per far perdere lo spirito combattivo ai nemici,\nriuscendo così a fuggire."
        de:
          x: "Gegner, die auf die blinkenden Punkte an seinem\nKörper blicken, werden geblendet und verlieren den\nWillen zu kämpfen."
          y: "Mit den blinkenden Punkten auf seinem Körper raubt\nes Gegnern den Kampfeswillen. Es nutzt diese\nGelegenheit, um sich zu verstecken."
        es:
          x: "Los enemigos que contemplan el titilante fulgor de su\nbrillante cuerpo terminan mareándose y pierden las\nganas de continuar combatiendo."
          y: "La luz intermitente que emite aplaca el ánimo de\nlucha del enemigo. Aprovecha la ocasión para\nesconderse."
        ko:
          x: "깜빡이는 발광체를 바라본\n상대는 눈앞이 어두컴컴해져\n전의를 상실해버리고 만다."
          y: "빛을 깜박여서 덮쳐온\n적의 전의를 잃게 한다.\n그 틈에 모습을 감춘다."
malamar:
  species_id: 687
