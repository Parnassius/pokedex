turtwig:
  species_id: 387
  names:
    jp_kana: ナエトル
    jp_kanji: ナエトル
    en: Turtwig
    fr: Tortipouss
    it: Turtwig
    de: Chelast
    es: Turtwig
    ko: 모부기
  forms:
    turtwig:
      form_id: 0
      base_stats:
        hp: 55
        attack: 68
        defense: 64
        special_attack: 45
        special_defense: 55
        speed: 31
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          x: "たいようの　ひかりを　あびて\nぜんしんで　こうごうせいを　する。\nこうらは　つちが　かたくなったもの。"
          y: "ぜんしんで　こうごうせいを　して\nさんそを　つくる。のどが　かわくと\nあたまの　はっぱが　しおれてしまう。"
        jp_kanji:
          x: "太陽の　光を　浴びて\n全身で　光合成を　する。\n甲羅は　土が　硬くなったもの。"
          y: "全身で　光合成を　して\n酸素を　作る。のどが　渇くと\n頭の　葉っぱが　しおれてしまう。"
        en:
          x: "Photosynthesis occurs across its body under the\nsun. The shell on its back is actually hardened soil."
          y: "It undertakes photosynthesis with its body, making\noxygen. The leaf on its head wilts if it is thirsty."
        fr:
          x: "Son corps assimile la lumière du soleil par\nphotosynthèse. Sa carapace est faite de terre durcie."
          y: "Son corps produit de l’oxygène par photosynthèse.\nLa feuille sur sa tête flétrit quand il a soif."
        it:
          x: "Fa la fotosintesi su tutto il corpo esponendosi ai\nraggi solari. La sua corazza è fatta di terra compatta."
          y: "È in grado di svolgere la fotosintesi e di produrre\nossigeno. La sua foglia appassisce se ha sete."
        de:
          x: "Im Sonnenlicht betreibt sein ganzer Körper\nPhotosynthese. Sein Panzer besteht aus hartem Lehm."
          y: "Sein Körper lebt von der Photosynthese,\ndie Sauerstoff freisetzt. Ist es durstig, welkt sein Blatt."
        es:
          x: "Realiza la fotosíntesis al bañarle los rayos de sol.\nSu concha está formada por tierra endurecida."
          y: "Realiza la fotosíntesis para obtener oxígeno. Si tiene\nsed, las hojas de la cabeza se marchitan."
        ko:
          x: "태양의 빛을 쬐어\n전신으로 광합성을 한다.\n등껍질은 흙이 딱딱해진 것이다."
          y: "전신으로 광합성을 하여\n산소를 만든다. 목이 마르면\n머리의 잎사귀가 시들어 버린다."
grotle:
  species_id: 388
  names:
    jp_kana: ハヤシガメ
    jp_kanji: ハヤシガメ
    en: Grotle
    fr: Boskara
    it: Grotle
    de: Chelcarain
    es: Grotle
    ko: 수풀부기
