      descriptions:
        jp_kana:
          x: "たたかいになると　６まいの　ハネから\nひのこの　りんぷんを　まきちらして\nあたり　いちめんを　ひのうみにする。"
          y: "かざんばいで　ちじょうが　まっくらに\nなったとき　ウルガモスの　ほのおが\nたいようの　かわりに　なったという。"
        jp_kanji:
          x: "戦いになると　６枚の　羽から\n火の粉の　りんぷんを　まき散らして\nあたり　一面を　火の海にする。"
          y: "火山灰で　地上が　真っ暗に\nなったとき　ウルガモスの　炎が\n太陽の　かわりに　なったという。"
        en:
          x: "A sea of fire engulfs the surroundings of their\nbattles, since they use their six wings to scatter\ntheir ember scales."
          y: "When volcanic ash darkened the atmosphere, it is\nsaid that Volcarona’s fire provided a replacement\nfor the sun."
        fr:
          x: "Quand il se bat, il fait pleuvoir des écailles\nenflammées de ses six ailes et transforme les\nalentours en mer de feu."
          y: "On dit que quand le ciel s’est obscurci à cause\ndes cendres d’un volcan, le feu d’un Pyrax aurait\nremplacé le soleil."
        it:
          x: "Quando lotta, sparge scaglie infuocate dalle sue\nsei ali, creando tutto intorno un mare di fuoco."
          y: "Si dice che quando il mondo fu oscurato da ceneri\nvulcaniche, le fiamme di Volcarona abbiano sostituito\nil sole."
        de:
          x: "Schüttelt sich glühenden Staub aus seinen\nsechs Flügeln und verwandelt das Umfeld in\nein einziges Meer aus Flammen."
          y: "Es heißt, als das Land einst unter einer düsteren\nWolke aus Vulkanasche lag, übernahm es die Rolle\nder Sonne."
        es:
          x: "Cuando combate, despide escamas ardientes de sus\nseis alas y genera un mar ígneo a su alrededor."
          y: "Antaño, las cenizas volcánicas cubrieron los cielos.\nEntonces, sus llamaradas sirvieron de sol."
        ko:
          x: "싸울 때는 6개의 날개에서\n불꽃 가루를 흩뿌려서\n주변 일대를 불바다로 만든다."
          y: "화산재로 지상이 캄캄하게\n되었을 때 불카모스의 불꽃이\n태양을 대신했다고 한다."
cobalion:
