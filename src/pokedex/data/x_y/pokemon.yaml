        en:
          x: "Wearing the shell covering they stole from Shelmet,\nthey defend themselves and attack with two lances."
          y: "These Pokémon evolve by wearing the shell\ncovering of a Shelmet. The steel armor protects\ntheir whole body."
        fr:
          x: "Ce Pokémon se protège avec la carapace dérobée\nà un Escargaume et attaque avec ses deux\nredoutables lances."
          y: "Un Pokémon qui a évolué en portant la carapace\nd’un Escargaume. Une armure de fer protège tout\nson corps."
        it:
          x: "Protegge il corpo con la conchiglia che ha rubato a\nShelmet mentre spunzona il nemico con due lance."
          y: "Pokémon che si è evoluto appropriandosi della\nconchiglia di Shelmet. Un’armatura d’acciaio\nprotegge tutto il suo corpo."
        de:
          x: "Eine von einem Schnuthelm gestohlene Muschel\ndient ihm als Helm. Es greift Gegner mit seinen\nbeiden Lanzen an."
          y: "Es ist bei der Entwicklung in die Muschel eines\nSchnuthelm geschlüpft. Die Eisenrüstung schützt\nseinen ganzen Körper."
        es:
          x: "Se defienden de los ataques con el caparazón que\nroban a los Shelmet. Atacan con sus dos mortíferas\nlanzas."
          y: "Pokémon que evolucionó poniéndose el caparazón de\nShelmet. Su armazón de acero le protege todo el\ncuerpo."
        ko:
          x: "쪼마리에게서 뺏은 껍질로\n몸을 에워싸 가드하면서\n2개의 창으로 찔러온다."
          y: "쪼마리의 껍질을 입고\n진화한 포켓몬이다. 강철의\n갑옷이 전신을 보호한다."
