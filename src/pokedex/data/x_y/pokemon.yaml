          y: "じそく１００キロで　えものに\nおそいかかるが　まっすぐにしか\nはしれないので　しっぱいも　おおい。"
        jp_kanji:
          x: "まっすぐ　走る　スピードは\n時速１００キロを　軽く　超える。\n曲がった　道は　とても　苦手。"
          y: "時速１００キロで　獲物に\n襲いかかるが　真っ直ぐにしか\n走れないので　失敗も　多い。"
        en:
          x: "When running in a straight line, it can easily top\n60 miles an hour. It has a tough time with\ncurved roads."
          y: "It charges prey at speeds over 60 mph. However,\nbecause it can only run straight, it often fails."
        fr:
          x: "Il peut courir en ligne droite à plus de 100 km/h.\nHélas, il n’est pas doué pour prendre les virages."
          y: "Il fonce sur sa proie à plus de 100 km/h. Mais il\nne peut pas dévier sa course et loupe souvent sa\ncible."
        it:
          x: "Quando corre in rettilineo può raggiungere\ni 100 km/h, ma le curve non sono il suo forte."
          y: "Carica la preda a una velocità di 100 km/h. Ma dal\nmomento che va solo dritto, sbaglia spesso."
        de:
          x: "Auf gerader Strecke erreicht es mühelos 100 km/h.\nNur die Kurven bereiten ihm große Schwierigkeiten."
          y: "Es stürzt sich mit 100 km/h auf Beute. Aber es kann\nnur geradeaus laufen und die Jagd misslingt oft."
        es:
          x: "En línea recta corre a algo más de 100 km/h, pero no\nes tan hábil si hay curvas de por medio."
          y: "Carga contra sus enemigos a más de 100 km/h.\nComo solo va en línea recta, falla a menudo."
        ko:
          x: "똑바로 달리는 스피드는\n시속 100km를 가볍게 넘는다.\n휘어진 길은 매우 서툴다."
          y: "시속 100km로 먹이를\n덮치지만 똑바로밖에 달릴 수\n없어서 실패할 때도 많다."
