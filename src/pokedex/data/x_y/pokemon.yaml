        jp_kana:
          x: "なんせだいにも　わたって\nハブネークと　たたかってきた。\nするどい　ツメが　さいだいの　ぶき。"
          y: "ハブネークの　においを　かぐ　だけで\nぜんしんの　たいもうが　さかだつ。\nするどい　ツメが　てきを　きりさく。"
        jp_kanji:
          x: "何世代にも　渡って\nハブネークと　戦ってきた。\n鋭い　ツメが　最大の　武器。"
          y: "ハブネークの　においを　かぐ　だけで\n全身の　体毛が　逆立つ。\n鋭い　ツメが　敵を　切り裂く。"
        en:
          x: "It has feuded with Seviper for many generations.\nIts sharp claws are its biggest weapons."
          y: "Its fur would all stand on end if it smelled a Seviper\nnearby. Its sharp claws tear up its foes."
        fr:
          x: "C’est le rival de Séviper depuis des générations.\nSes griffes aiguisées sont son meilleur atout."
          y: "Son poil se hérisse dès qu’il sent un Séviper.\nIl lacère ses ennemis avec ses griffes acérées."
        it:
          x: "Da generazioni, è acerrimo nemico di Seviper. Gli\nartigli aguzzi sono le sue armi più potenti."
          y: "Se sente anche solo l’odore di Seviper, gli si rizza\nla pelliccia. Lacera il nemico con artigli affilati."
        de:
          x: "Seit Generationen ist es mit Vipitis verfeindet.\nSeine scharfen Klauen sind seine stärksten Waffen."
          y: "Vipitis’ Geruch lässt ihm alle Haare zu Berge stehen.\nMit seinen scharfen Klauen kratzt es seine Feinde."
        es:
          x: "Hace muchos años que se enfrenta a Seviper. Su arma\nmás eficaz son sus zarpas afiladas."
          y: "Se le eriza todo el pelaje con solo oler un Seviper.\nCon sus afiladas zarpas puede rajar a sus enemigos."
        ko:
          x: "몇 대에 걸쳐서\n세비퍼와 싸워왔다.\n날카로운 발톱이 최대의 무기다."
          y: "세비퍼의 냄새를 맡는 것만으로도\n전신의 털이 곤두선다.\n예리한 손톱으로 적을 베어 가른다."
seviper:
