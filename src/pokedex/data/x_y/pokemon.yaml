        jp_kana:
          x: "じめんを　すべるように　はしる。\nすばやい　うごきで　てきを　まどわせ\nつるのムチで　しとめるのだ。"
          y: "からだが　よごれると　はっぱで\nこうごうせいが　できなくなるので\nいつも　せいけつに　している。"
        jp_kanji:
          x: "地面を　滑るように　走る。\n素早い　動きで　敵を　まどわせ\nつるのムチで　しとめるのだ。"
          y: "体が　汚れると　葉っぱで\n光合成が　できなくなるので\nいつも　清潔に　している。"
        en:
          x: "It moves along the ground as if sliding. Its swift\nmovements befuddle its foes, and it then attacks\nwith a vine whip."
          y: "When it gets dirty, its leaves can’t be used in\nphotosynthesis, so it always keeps itself clean."
        fr:
          x: "Il court comme s’il glissait sur le sol. Il déroute\nl’ennemi par ses mouvements et l’assomme d’un\ncoup de liane."
          y: "La saleté l’empêchant d’utiliser la photosynthèse,\nil prend grand soin d’être toujours propre."
        it:
          x: "Corre quasi scivolando sulle superfici. Confonde il\nnemico con i rapidi movimenti, per poi attaccarlo\ncon una frustata."
          y: "Se si sporca, le sue foglie non possono più effettuare\nla fotosintesi, perciò si tiene sempre molto pulito."
        de:
          x: "Huscht beinahe gleitend über den Boden\nund täuscht Gegner mit agilen Manövern,\nbis es mithilfe seiner Efeurute obsiegt."
          y: "Es achtet stets auf Reinlichkeit, da es mit schmutzigen\nBlättern keine Photosynthese betreiben kann."
        es:
          x: "Parece que se desliza al correr. Engaña a sus rivales\ncon su velocidad y los fustiga con su látigo."
          y: "Cuando su cuerpo está sucio, no puede realizar la\nfotosíntesis con sus hojas, así que cuida mucho su\nhigiene personal."
        ko:
          x: "땅을 미끄러지듯 달린다.\n빠른 움직임으로 상대를 혼란시키고\n덩굴채찍으로 꼼짝 못하게 한다."
          y: "몸이 더러워지면 잎으로\n광합성을 할 수 없기 때문에\n항상 청결하게 하고 있다."
