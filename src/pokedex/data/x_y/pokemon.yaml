        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - psychic
        - fairy
      egg_groups:
        - human_like
      abilities:
        - soundproof
        - filter
      hidden_ability: technician
      descriptions:
        jp_kana:
          x: "ゆびさきから　だす　はどうが\nくうきを　かためて　カベを　つくる。\nはげしい　こうげきも　はねかえす。"
          y: "ひとを　しんじこませるのが　うまい。\nパントマイムで　つくったカベが\nほんとうに　あらわれるという。"
        jp_kanji:
          x: "指先から　出す　波動が\n空気を　固めて　壁を　作る。\n激しい　攻撃も　跳ね返す。"
          y: "人を　信じこませるのが　うまい。\nパントマイムで　作った　壁が\n本当に　現れるという。"
        en:
          x: "Emanations from its fingertips solidify the air into\ninvisible walls that repel even harsh attacks."
          y: "It is adept at conning people. It is said to be able\nto create walls out of thin air by miming."
        fr:
          x: "Les murs invisibles qu’il matérialise du bout des doigts\nrepoussent les attaques les plus puissantes."
          y: "Il adore imiter les gens. On le dit capable de créer\nde véritables murs juste en les mimant."
        it:
          x: "Con le dita solidifica l’aria e crea pareti invisibili\nche respingono gli attacchi più violenti."
          y: "Si diletta a imbrogliare la gente. Si dice che sia in\ngrado di creare pareti d’aria servendosi della mimica."
        de:
          x: "Seine Fingerspitzen sondern etwas ab, das die Luft\nzu einer schützenden Wand werden lässt."
          y: "Es ist geschickt darin, Menschen zu beeinflussen.\nMan sagt, es könne dünne Wände aus Luft nur durch\nMimen entstehen lassen."
        es:
          x: "Para repeler ataques, solidifica el aire y crea muros\ninvisibles con emanaciones de sus dedos."
          y: "Dicen que puede hacer un muro a partir del aire\nmediante la pantomima. Es experto en crear ilusiones\nópticas."
        ko:
          x: "손가락 끝에서 내는 파동이\n공기를 굳혀서 벽을 만든다.\n격렬한 공격도 튕겨 낸다."
          y: "사람 속이기를 잘한다.\n팬터마임으로 만든 벽이\n정말로 나타난다고 한다."
scyther:
  species_id: 123
  names:
    jp_kana: ストライク
    jp_kanji: ストライク
    en: Scyther
    fr: Insécateur
    it: Scyther
