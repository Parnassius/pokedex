          x: "きけんがせまると　くちから　はきだす\nあわで　ぜんしんを　つつんで\nからだを　おおきく　みせようとする。"
          y: "うみの　ちかくで　みつかる。\nおおきな　ハサミは　もぎとっても\nあとから　また　はえてくる。"
        jp_kanji:
          x: "危険が　迫ると　口から　吐き出す\n泡で　全身を　包んで\n体を　大きく　みせようとする。"
          y: "海の　近くで　見つかる。\n大きな　ハサミは　もぎとっても\nあとから　また　生えてくる。"
        en:
          x: "If it senses danger approaching, it cloaks itself with\nbubbles from its mouth so it will look bigger."
          y: "It can be found near the sea. The large pincers\ngrow back if they are torn out of their sockets."
        fr:
          x: "S’il est menacé, il se cache derrière les bulles\némises par sa bouche pour paraître plus gros."
          y: "On trouve ce Pokémon près de la mer. Ses grosses\npinces peuvent repousser si elles se font arracher."
        it:
          x: "Se si sente in pericolo, si circonda di bolle che\nproduce con la bocca per sembrare più grande."
          y: "Si trova vicino al mare. Le grandi chele, se asportate,\nricrescono."
        de:
          x: "Wittert es Gefahr, hüllt es sich in Blasen\naus seinem Maul, um größer zu erscheinen."
          y: "Es kommt vor allem nahe des Meeres vor.\nDie großen Scheren wachsen nach, wenn sie\nvom Körper abgetrennt wurden."
        es:
          x: "Ante el peligro, se camufla con las burbujas que\ndesprende su boca, para parecer más grande."
          y: "Es fácil encontrarlo cerca del mar. Las largas pinzas\nque tiene vuelven a crecer si se las quitan de su sitio."
        ko:
          x: "위험이 닥치면 입에서 뿜어내는\n거품으로 전신을 감싸서\n몸을 크게 보이려고 한다."
          y: "바다 근처에서 발견된다.\n커다란 집게는 뜯겨도\n나중에 다시 자라난다."
