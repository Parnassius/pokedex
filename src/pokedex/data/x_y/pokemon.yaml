          y: "のびちぢみする　ひじの　かたなで\nたたかう。いあいの　めいしゅ。\nれいぎ　ただしい　ポケモン。"
        jp_kanji:
          x: "相手の　考えを　敏感に\nキャッチする　能力を　持つため\n先に　攻撃が　できるのだ。"
          y: "伸び縮みする　ヒジの　刀で　戦う。\n居合の　名手。\n礼儀正しい　ポケモン。"
        en:
          x: "Because it can sense what its foe is thinking,\nits attacks burst out first, fast, and fierce."
          y: "A master of courtesy and swordsmanship, it fights\nusing extending swords on its elbows."
        fr:
          x: "Comme il peut lire les pensées de ses adversaires,\nil frappe toujours en premier."
          y: "Il frappe avec les grandes lames à ses coudes.\nSon talent d’escrimeur n’a d’égal que sa courtoisie."
        it:
          x: "Il suo intuito gli consente di capire cosa pensa il\nnemico: può così attaccare per primo."
          y: "Pokémon elegante e ottimo spadaccino, combatte\nallungando le lame che ha sui gomiti."
        de:
          x: "Da es selbst die leisesten Gedanken seines\nGegners lesen kann, kann es immer zuerst angreifen."
          y: "Es kämpft, indem es die Schwerter an seinen Ellbogen\nverlängert. Es ist ein Meister des Kampfes."
        es:
          x: "Puede presentir los movimientos de sus rivales y por\neso ataca siempre antes que ellos."
          y: "Lucha con las espadas que salen de sus codos.\nEs un maestro de la cortesía y la esgrima."
        ko:
          x: "상대의 생각을 민감하게\n포착하는 능력을 가졌기 때문에\n먼저 공격할 수 있다."
          y: "늘었다 줄었다 하는 팔꿈치의\n칼날로 싸운다. 칼 뽑기의 명수\n이며 예의가 바른 포켓몬이다."
