        jp_kana:
          x: "のどもとに　どくぶくろを　もつ。\nのどを　ならすと　たまった　どくは\nねりこまれ　きょうりょくになる。"
          y: "こぶしの　トゲからは　かすりきずでも\nいのちを　おとすほどの　もうどくを\nぶんぴつしている。"
        jp_kanji:
          x: "のど元に　毒袋を　持つ。\nのどを　鳴らすと　たまった　毒は\n練りこまれ　強力になる。"
          y: "こぶしの　トゲからは\nかすり傷でも　命を　落とすほどの\n猛毒を　分泌する。"
        en:
          x: "It has a poison sac at its throat. When it croaks,\nthe stored poison is churned for greater potency."
          y: "Its knuckle claws secrete a toxin so vile that even a\nscratch could prove fatal."
        fr:
          x: "Quand il coasse, le poison stocké sous sa gorge est\nsecoué, le rendant ainsi plus efficace."
          y: "Les griffes de ses poings sécrètent une toxine si\natroce qu’une simple égratignure peut s’avérer fatale."
        it:
          x: "Ha una sacca di veleno sulla gola. Quando gracida\nil veleno si rimescola, diventando più efficace."
          y: "I suoi artigli secernono una tossina così velenosa\nche persino un graffio può essere letale."
        de:
          x: "Verfügt über einen Giftsack an seiner Kehle.\nQuakt es, schäumt das Gift und wird so noch stärker."
          y: "Die Gelenke an seinen Klauen geben ein so starkes\nGift ab, dass selbst ein kleiner Kratzer fatal ist."
        es:
          x: "Almacena veneno en una bolsa de la garganta. Cuando\ncroa, este se agita para lograr mayor potencia."
          y: "Sus garras segregan una toxina tan potente que un\nsimple arañazo puede ser mortal."
        ko:
          x: "목 주변에 독주머니를 지녔다.\n목을 울리면 모여진 독이\n잘 섞여져서 강력해진다."
          y: "주먹의 가시는 긁히기만 해도\n생명을 잃을 정도의 맹독을\n분비하고 있다."
carnivine:
  species_id: 455
