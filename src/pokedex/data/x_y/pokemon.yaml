          y: "ぜんしんが　きんにくに　なっており\nこどもほどの　おおきさしかないのに\nおとな　１００にんを　なげとばせる。"
        jp_kanji:
          x: "ゴローンを　何度も　上げ下ろしして\n全身の　筋肉を　鍛える。\nあらゆる　格闘技を　使う。"
          y: "全身が　筋肉になっており\n子供ほどの　大きさしかないのに\n大人　１００人を　投げ飛ばせる。"
        en:
          x: "It hefts a Graveler repeatedly to strengthen\nits entire body. It uses every type of martial arts."
          y: "Its whole body is composed of muscles.\nEven though it’s the size of a human child,\nit can hurl 100 grown-ups."
        fr:
          x: "Il muscle son corps en soulevant régulièrement un\nGravalanch. Il est rompu à tous les arts martiaux."
          y: "Son corps est essentiellement composé de muscles.\nMême s’il a la taille d’un petit enfant, il peut soulever\n100 adultes avec ses bras."
        it:
          x: "Solleva Graveler ripetutamente per mantenersi forte.\nConosce ogni tipo di arte marziale."
          y: "Il suo corpo è formato interamente da muscoli. Non è\npiù alto di un bambino, ma può sollevare e lanciare\n100 adulti."
        de:
          x: "Es hebt Georok hoch, um seinen Körper zu trainieren.\nAußerdem übt es sich in jeder Art von Kampfsport."
          y: "Sein ganzer Körper besteht aus Muskeln. Auch wenn\nes nur so groß wie ein Menschenkind ist, kann es\n100 Erwachsene jonglieren."
        es:
          x: "Levanta un Graveler para mantener sus músculos en\nforma. Domina todas las artes marciales."
          y: "Es una masa de músculos y, aunque es pequeño, tiene\nfuerza de sobra para tomar en brazos a 100 personas."
        ko:
          x: "데구리를 수없이 들었다 놨다 하며\n전신의 근육을 단련한다.\n모든 격투기를 사용한다."
          y: "몸집은 어린아이만 하지만\n온몸이 근육으로 되어 있어서\n어른 100명은 날려 버릴 수 있다."
