        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          x: "しげみの　かげに　かくれて　くらす。\nてきに　おそわれると　からだの　けを\nするどく　さかだてて　いかくする。"
          y: "かたい　からだは　とりポケモンの\nクチバシでも　キズひとつ　つかない。\nコナを　まきちらして　ぼうせんする。"
        jp_kanji:
          x: "しげみの　陰に　隠れて　暮らす。\n敵に　襲われると　体の　毛を\n鋭く　逆立てて　威嚇する。"
          y: "硬い　体は　とりポケモンの\nクチバシでも　傷ひとつ　つかない。\n粉を　まき散らして　防戦する。"
        en:
          x: "It lives hidden within thicket shadows.\nWhen predators attack, it quickly bristles the fur\ncovering its body in an effort to threaten them."
          y: "The beaks of bird Pokémon can’t begin\nto scratch its stalwart body.\nTo defend itself, it spews powder."
        fr:
          x: "Vit caché sous le couvert des buissons.\nPoursuivi par un ennemi, il tente de l’intimider\nen hérissant les poils qui lui couvrent le corps."
          y: "Même les becs acérés des Pokémon Oiseaux ne\nparviennent pas à meurtrir son corps très dur.\nIl se défend en crachant de la poudre."
        it:
          x: "Vive nascosto nella boscaglia. Se attaccato, minaccia\ni nemici rizzando il pelo."
          y: "Il becco dei Pokémon uccello non può neppure scalfire\nil suo durissimo corpo. Si difende spargendo scaglie."
        de:
          x: "Es lebt versteckt im schattigen Dickicht. Wird es\nvon einem Feind angegriffen, stellt es sein Fell\nzur Abschreckung zu scharfen Spitzen auf."
          y: "Der Schnabel eines Vogel-Pokémon kann seinem\nharten Körper keinen Kratzer zufügen. Es verteidigt\nsich, indem es Puder spuckt."
        es:
          x: "Habita en la sombra de la espesura. Si percibe alguna\namenaza, su pelaje se eriza y se vuelve muy afilado\npara así intimidar al enemigo."
          y: "Su cuerpo es tan duro que ni siquiera los Pokémon\npájaro pueden hacerle el menor rasguño con sus\npicos. Esparce polvo de escamas para defenderse."
        ko:
          x: "수풀의 그늘에 숨어 산다.\n적에게 공격당하면 몸의 털을\n뾰족하게 곤두세우며 위협한다."
          y: "단단한 몸은 새포켓몬의\n부리로도 상처 하나 입지 않는다.\n가루를 뿌려서 방어한다."
vivillon:
  species_id: 666
  names:
    jp_kana: ビビヨン
    jp_kanji: ビビヨン
    en: Vivillon
    fr: Prismillon
    it: Vivillon
    de: Vivillon
    es: Vivillon
    ko: 비비용
  forms:
    vivillon_icy_snow_pattern:
      form_id: 0
      names:
        jp_kana: ひょうせつのもよう
        jp_kanji: ひょうせつのもよう
        en: Icy Snow Pattern
        fr: Motif Blizzard
        it: Motivo Nevi Perenni
        de: Frostmuster
        es: Motivo Polar
        ko: 빙설의 모양
      base_stats:
        hp: 80
        attack: 52
        defense: 50
        special_attack: 90
        special_defense: 50
        speed: 89
      evs_yield:
