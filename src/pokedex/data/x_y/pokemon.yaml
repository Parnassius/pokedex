          y: "みつりんに　せいそくする。\nえだから　えだへ　とびうつりながら\nいどうして　えものに　せっきんする。"
        jp_kanji:
          x: "発達した　太ももの　筋肉が\n驚異的な　瞬発力と\n跳躍力を　生み出すぞ。"
          y: "密林に　生息する。\n枝から　枝へ　飛び移りながら\n移動して　獲物に　接近する。"
        en:
          x: "Its strongly developed thigh muscles give it\nastounding agility and jumping performance."
          y: "It lives in dense jungles. While closing in on its\nprey, it leaps from branch to branch."
        fr:
          x: "Les muscles surdéveloppés de ses cuisses permettent\nà Massko de sauter incroyablement haut."
          y: "Il vit dans les jungles denses. Il saute de branche\nen branche pour approcher de sa proie."
        it:
          x: "I muscoli delle zampe estremamente sviluppati gli\npermettono di saltare fino a grandi altezze."
          y: "Vive in giungle fitte. Si avvicina alle prede saltando\ndi ramo in ramo."
        de:
          x: "Seine stark entwickelten Oberschenkelmuskeln\nverleihen ihm außergewöhnliche Agilität und\nSprungkraft."
          y: "Es lebt im dichten Dschungel. Es springt von\nAst zu Ast, wenn es sich einer Beute nähert."
        es:
          x: "Los desarrollados músculos que tiene en las\nextremidades inferiores le hacen ser muy ágil y le\npermiten dar grandes saltos."
          y: "Vive en selvas frondosas. Salta de rama en rama para\nacercarse a sus presas."
        ko:
          x: "발달한 넓적다리의 근육이\n경이로운 순발력과\n도약력을 만들어 낸다."
          y: "밀림에 서식한다.\n가지에서 가지로 뛰어 옮겨가며\n이동해서 먹이에 접근한다."
sceptile:
