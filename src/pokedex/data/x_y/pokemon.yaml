      descriptions:
        jp_kana:
          x: "わざをくりだす　スピードが　じまん。\nたとえ　パワーは　ひくくても\nてかずの　おおさで　カバーする。"
          y: "ながれるような　れんぞく　こうげきを\nくりだして　てきを　あっとうする。\nするどい　ツメで　てきを　きりさく。"
        jp_kanji:
          x: "技を繰り出す　スピードが　自慢。\nたとえ　パワーは　低くても\n手数の　多さで　カバーする。"
          y: "流れるような　連続　攻撃を\n繰り出して　敵を　圧倒する。\n鋭い　ツメで　敵を　切り裂く。"
        en:
          x: "It takes pride in the speed at which it can use\nmoves. What it loses in power, it makes up for\nin quantity."
          y: "In fights, they dominate with onslaughts of flowing,\ncontinuous attacks. With their sharp claws, they\ncut enemies."
        fr:
          x: "Il se flatte d’être très rapide. Pour compenser la\nfaiblesse de ses coups, il en assène un très grand\nnombre."
          y: "Il découpe ses ennemis avec ses griffes acérées\net les terrasse avec ses enchaînements de coups\nhyper fluides."
        it:
          x: "Va fiero della rapidità delle sue mosse. Sopperisce\na un’eventuale mancanza di potenza con il numero\ndei colpi."
          y: "Soggioga il nemico concatenando una serie incessante\ndi attacchi e lo affetta con le unghie affilate."
        de:
          x: "Schnelle Angriffe sind seine Spezialität. Es gleicht\nseine Schwächen mit der Vielfalt seines\nAttackenrepertoires aus."
          y: "Es deckt seine Gegner mit filigranen Attacken in Serie\nein und schlitzt sie mit seinen spitzen Klauen auf."
        es:
          x: "La velocidad de sus ataques es su gran orgullo. Lo\nque le falta de fuerza bruta lo compensa en cantidad\nde golpes."
          y: "Abruma a su rival con oleadas de ataques veloces.\nCorta al enemigo con sus afiladas garras."
        ko:
          x: "기술을 내보내는 스피드가 자랑이다.\n설령 파워는 낮더라도\n많은 공격 횟수로 커버한다."
          y: "물 흐르는 듯한 연속 공격을\n펼쳐서 상대를 압도한다.\n날카로운 손톱으로 상대를 베어 가른다."
mienshao:
  species_id: 620
  names:
    jp_kana: コジョンド
    jp_kanji: コジョンド
    en: Mienshao
    fr: Shaofouine
    it: Mienshao
    de: Wie-Shu
    es: Mienshao
    ko: 비조도
