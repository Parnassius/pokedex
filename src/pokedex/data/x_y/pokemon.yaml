          y: "たいないで　ほのおが　もえているので\nだきしめると　とても　あたたかい。\n１０００どの　ひのたまを　とばす。"
        jp_kanji:
          x: "お腹に　炎袋を　持つ。\n抱きしめると　ぽかぽか　温かい。\n命ある　限り　燃え続ける。"
          y: "体内で　炎が　燃えているので\n抱きしめると　とても　温かい。\n１０００度の　火の玉を　飛ばす。"
        en:
          x: "It has a flame sac inside its belly that perpetually\nburns. It feels warm if it is hugged."
          y: "A fire burns inside, so it feels very warm to hug.\nIt launches fireballs of 1,800 degrees Fahrenheit."
        fr:
          x: "Poussifeu possède, dans son ventre, une poche\nde feu qui brûle sans arrêt. Il donne une impression\nde chaleur quand on lui fait des câlins."
          y: "Ses câlins réchauffent car il renferme une fournaise.\nIl envoie des boules de feu à 1 000 °C."
        it:
          x: "Nel ventre ha una sacca di fuoco che brucia in\ncontinuazione. Se lo si abbraccia, emana calore."
          y: "Nel suo corpo brucia una fiamma e abbracciandolo\nsi avverte calore. Lancia palle di fuoco a 1000 °C."
        de:
          x: "In seinem Bauch ist ein Flammensack, der stets\nbrennt. Umarmt man es, fühlt es sich warm an."
          y: "In seinem Inneren lodert ein Feuer. Es schleudert\n1 000 °C heiße Feuerbälle."
        es:
          x: "En su interior, guarda una llama que arde sin cesar.\nSi se le abraza, se nota que tiene una temperatura\nmuy alta."
          y: "En su interior arde una llama que mantiene su cuerpo\ncaliente. Tira bolas de fuego a 1000 °C."
        ko:
          x: "몸속에 불꽃 주머니를 지니고 있어서\n껴안으면 따끈따끈하다.\n살아 있는 한 계속 불타오른다."
          y: "체내에 불꽃이 타오르고 있어\n껴안으면 무척 따뜻하다.\n1000도의 불구슬을 날린다."
