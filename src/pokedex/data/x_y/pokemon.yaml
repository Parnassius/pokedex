          y: "しなやかな　きんにくの　おかげで\nあしおとひとつ　たてずに　あるける。\nえものを　かるときは　いっしゅん。"
        jp_kanji:
          x: "毛並みが　美しく\nペットにしたがる　人も　多いが　すぐ\nひっかいたり　するので　手強いぞ。"
          y: "しなやかな　筋肉の　おかげで\n足音ひとつ　立てずに　歩ける。\n獲物を　狩るときは　一瞬。"
        en:
          x: "Although its fur has many admirers, it is tough\nto raise as a pet because of its fickle meanness."
          y: "Its lithe muscles allow it to walk without making a\nsound. It attacks in an instant."
        fr:
          x: "Très apprécié pour sa fourrure, il est difficile à\napprivoiser en raison de son caractère rétif."
          y: "Ses muscles souples lui permettent de marcher sans\nun bruit et d’attaquer en l’espace d’un instant."
        it:
          x: "Sebbene molto amato per il suo pelo, è difficile\naddomesticarlo per la volubile crudeltà."
          y: "I muscoli flessibili gli consentono di camminare\nsenza fare alcun rumore. Attacca in un lampo."
        de:
          x: "Dieses Pokémon hat sehr schönes Fell.\nEs ist jedoch ein schwer erziehbares Haustier."
          y: "Aufgrund seiner geschmeidigen Muskeln kann es sich\nlautlos bewegen. Es greift ohne Vorwarnung an."
        es:
          x: "Aunque es muy admirado por el pelo, es difícil de\nentrenar como mascota, porque es un poco travieso."
          y: "Sus ágiles músculos le permiten moverse sin hacer\nruido. Ataca al instante."
        ko:
          x: "털의 결이 아름다워 애완용으로\n기르려는 사람이 많지만, 곧잘\n할퀴려 들기 때문에 쉽지 않다."
          y: "부드러운 근육 덕분에\n발소리를 내지 않고 걸을 수 있다.\n먹이를 사냥할 때는 순식간이다."
psyduck:
