      descriptions:
        jp_kana:
          x: "あたまのうえに　さいた　ハナは\nきおんに　よって　ひらいたり\nとじたりする　せいしつを　もつ。"
          y: "たいようの　ひかりを　あびるため\nはなびらを　ひろげるだけでなく\nちかづこうと　そらにうかんでしまう。"
        jp_kanji:
          x: "頭の上に　咲いた　花は\n気温に　よって　開いたり\n閉じたりする　性質を　持つ。"
          y: "太陽の　光を　浴びるため\n花びらを　広げるだけでなく\n近づこうと　空に　浮かんでしまう。"
        en:
          x: "The bloom on top of its head opens and closes\nas the temperature fluctuates up and down."
          y: "It spreads its petals to absorb sunlight. It also floats\nin the air to get closer to the sun."
        fr:
          x: "Le bourgeon sur sa tête s’ouvre et se ferme en\nfonction des fluctuations de la température ambiante."
          y: "Il étend ses pétales pour absorber la lumière du soleil.\nIl flotte pour se rapprocher du soleil."
        it:
          x: "Il fiore sul capo si apre e si chiude con il continuo\nmutare della temperatura corporea."
          y: "Spalanca i petali per assorbire la luce solare.\nFluttua nell’aria per essere più vicino al sole."
        de:
          x: "Temperaturschwankungen veranlassen es, die Blüte\nauf seinem Kopf immer zu öffnen oder zu schließen."
          y: "Es öffnet seine Blüte, um Sonnenlicht aufzunehmen.\nEs schwebt in der Luft, um der Sonne näher zu sein."
        es:
          x: "La flor de su cabeza se abre y cierra según suba o\nbaje la temperatura."
          y: "Abre sus pétalos para absorber la luz solar. También\nflota en el aire para estar más cerca del sol."
        ko:
          x: "머리 위에 핀 꽃은\n기온에 따라 펴지거나\n오므라드는 성질을 가졌다."
          y: "태양의 빛을 잘 받기 위해\n꽃잎을 펼칠 뿐만 아니라\n가까이 가려고 하늘로 떠올라버린다."
jumpluff:
  species_id: 189
