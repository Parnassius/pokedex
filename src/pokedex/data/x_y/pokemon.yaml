          x: "A spicy aroma emanates from around its neck.\nThe aroma acts as a stimulant to restore health."
          y: "The buds that ring its neck give off a spicy aroma\nthat perks people up."
        fr:
          x: "Un arôme épicé émane de son cou. Il agit comme\nun stimulant et lui fait récupérer son énergie."
          y: "Le collier de bourgeons à son cou répand un arôme\népicé qui vous donne du tonus."
        it:
          x: "Dal suo collo si propaga un profumo vivace. Esso\nstimola il recupero della salute."
          y: "Le foglie attorno al suo collo emanano un aroma\nspeziato dall’effetto energizzante."
        de:
          x: "Ein würziges Aroma geht von seinen Blättern aus.\nDas Aroma soll gesundheitsfördernd sein."
          y: "Die Knospen an seinem Hals geben ein\nwürziges Aroma ab, das andere aufheitert."
        es:
          x: "Emana un aroma picante de su cuello. El aroma actúa\ncomo estimulante para recuperar salud."
          y: "Su cuello desprende un dulce aroma que anima a\nquien lo huele."
        ko:
          x: "목 주변에서 발산하는\n향신료 같은 향기에는\n힘을 내도록 하는 효과가 있다."
          y: "목 주위의 봉오리로부터 풍기는\n향긋한 향기는 향기를\n맡은 사람을 힘이 나게 한다."
