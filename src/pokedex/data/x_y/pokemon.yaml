      descriptions:
        jp_kana:
          x: "たいかくは　こがらだが　カイリキーや\nハリテヤマなど　おおきな　ポケモンと\nごかくに　たたかう　テクニシャン。"
          y: "つばさを　つかい　くうちゅうで\nしせいを　コントロール。ふせぎにくい\nずじょうから　こうげきを　しかける。"
        jp_kanji:
          x: "体格は　小柄だが　カイリキーや\nハリテヤマなど　大きな　ポケモンと\n互角に　戦う　テクニシャン。"
          y: "翼を　使い　空中で　姿勢を\nコントロール。防ぎにくい　頭上から\n攻撃を　仕掛ける。"
        en:
          x: "Although its body is small, its proficient\nfighting skills enable it to keep up with\nbig bruisers like Machamp and Hariyama."
          y: "With its wings, it controls its position in the air.\nIt likes to attack from above, a maneuver that\nis difficult to defend against."
        fr:
          x: "Malgré sa petite taille, son intelligence lui permet\nd’affronter sans trembler de grands Pokémon tels que\nles Mackogneur ou les Hariyama."
          y: "Il utilise ses ailes pour contrôler avec précision sa\nposture en vol. Ses attaques aériennes sont difficiles\nà parer."
        it:
          x: "Nonostante le piccole dimensioni, è in grado di\ntenere testa a Pokémon ben più grandi come\nMachamp o Hariyama."
          y: "Grazie alle sue ali riesce a controllare con la massima\nprecisione i movimenti in aria e attacca dall’alto,\nin posizione di vantaggio rispetto ai nemici."
        de:
          x: "Ungeachtet seines kleinen Wuchses, erweist es sich,\ndank seiner Kampftechnik, gegenüber größeren\nGegnern wie Machomei oder Hariyama als ebenbürtig."
          y: "Es nutzt seine Flügel, um sich am Himmel in Position\nzu halten. Gegen seine Angriffe aus der Luft kann man\nsich nur schwer zur Wehr setzen."
        es:
          x: "A pesar de ser un Pokémon de pequeña estatura,\nsu pericia en el combate le permite plantar cara a\nPokémon como Machamp o Hariyama."
          y: "Controla su posición en el aire con las alas. Lanza\nataques desde gran altura que resultan difíciles de\nevitar."
        ko:
          x: "체격은 작지만 괴력몬이나\n하리뭉 등의 커다란 포켓몬과\n막상막하로 싸우는 테크니션이다."
          y: "날개를 사용해 공중에서\n자세를 컨트롤한다. 막기 어려운\n머리 위에서부터 공격해온다."
dedenne:
