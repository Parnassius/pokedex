          y: "なかまを　おうえんする　しゅうせい。\nまけそうになると　からだから　だす\nひばなの　かずが　どんどん　ふえる。"
        jp_kanji:
          x: "マイナンと　プラスルの　電気は\n血液の　流れを　良くして\nこりを　ほぐす　効果が　ある。"
          y: "仲間を　応援する　習性。\n負けそうになると　体から　出す\n火花の　数が　どんどん　増える。"
        en:
          x: "Exposure to electricity from Minun and Plusle\npromotes blood circulation and relaxes muscles."
          y: "It cheers on friends. If its friends are losing,\nits body lets off more and more sparks."
        fr:
          x: "L’électricité de Posipi et Négapi favorise la circulation\nsanguine et guérit les courbatures."
          y: "Il encourage ses amis. Son corps produit plus\nd’étincelles quand il est en mauvaise posture."
        it:
          x: "L’elettricità tra un Plusle e un Minun favorisce la\ncircolazione sanguigna e scioglie le tensioni."
          y: "Incoraggia gli amici e, se questi perdono, il suo\ncorpo emette una maggiore quantità di scintille."
        de:
          x: "Mit elektrischen Schlägen regen Plusle und Minun\nden Blutkreislauf an und lösen so Verspannungen."
          y: "Es feuert Freunde an. Sind diese im Begriff zu\nverlieren, gibt sein Körper immer mehr Funken ab."
        es:
          x: "La electricidad de Minun y Plusle es buena para la\ncirculación y para desentumecer músculos."
          y: "Le gusta animar a sus amigos. Si pierden, su cuerpo\nsuelta cada vez más chispas."
        ko:
          x: "마이농과 플러시의 전기는\n혈액의 흐름을 좋게 하여\n근육 결림을 푸는 효과가 있다."
          y: "동료를 응원하는 습성이 있다.\n질 것 같아지면 몸에서 내는\n스파크의 수가 점점 늘어난다."
