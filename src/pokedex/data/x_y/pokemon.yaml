          y: "When feeding its young, it first chews the food into\na paste, then spits it out for the offspring."
        fr:
          x: "La femelle a un tempérament doux. Elle émet des cris\nultrasoniques capables de déstabiliser ses ennemis."
          y: "Pour nourrir ses petits, il mâche les aliments pour les\nrendre tendres et il les recrache à ses bébés."
        it:
          x: "La femmina ha un temperamento mite. Lancia\nultrasuoni capaci di incantare i nemici."
          y: "Per nutrire i piccoli, prima intenerisce il cibo\nmasticandolo, poi lo sputa per i cuccioli."
        de:
          x: "Das Weibchen ist ausgeglichener. Es stößt Schreie\nim Ultraschallwellenbereich aus, die den Gegner\nverwirren können."
          y: "Ehe es seine Jungen füttert, zerkaut es das Futter\nund gibt es ihnen anschließend."
        es:
          x: "Tiene un carácter afable. Emite ondas ultrasónicas\npara confundir al enemigo."
          y: "Cuando alimenta a sus crías, primero mastica y ablanda\nla comida y luego la escupe para su prole."
        ko:
          x: "암컷으로 성격은 온화하다.\n입에서 내보내는 초음파는\n상대를 혼란시키는 힘이 있다."
          y: "새끼에게 먹이를 나눠줄 때\n어미가 깨물어 부드럽게 한\n먹이를 토해서 준다."
