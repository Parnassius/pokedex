      descriptions:
        jp_kana:
          x: "つばさと　おばねを　ひろげて　あかく\nかがやくとき　いきものの　いのちを\nすいとる　でんせつの　ポケモン。"
          y: "じゅみょうが　つきるとき　あらゆる\nいきものの　いのちを　すいつくし\nまゆの　すがたに　もどるという。"
        jp_kanji:
          x: "翼と　尾羽を　広げて　赤く　輝くとき\n生き物の　命を　吸い取る\n伝説の　ポケモン。"
          y: "寿命が　つきるとき　あらゆる\n生き物の　命を　吸いつくし\n繭の　姿に　戻るという。"
        en:
          x: "When this legendary Pokémon’s wings and\ntail feathers spread wide and glow red,\nit absorbs the life force of living creatures."
          y: "When its life comes to an end, it absorbs\nthe life energy of every living thing\nand turns into a cocoon once more."
        fr:
          x: "Lorsque les plumes de sa queue et de ses ailes sont\ndéployées et virent au rouge, ce Pokémon légendaire\nabsorbe l’énergie vitale de ce qui l’entoure."
          y: "Quand il sent que la fin de sa vie est proche, il aspire\nla force vitale des êtres vivants et retourne à l’état\nde cocon."
        it:
          x: "Quando le ali e le piume della coda di questo\nPokémon leggendario sono spiegate e di colore rosso\nacceso, può assorbire l’energia degli esseri viventi."
          y: "Secondo la leggenda, quando la sua lunga esistenza\ngiunge al termine, assorbe l’energia di tutti gli esseri\nviventi e si trasforma in un bozzolo."
        de:
          x: "Wenn Schwingen und Schwanzgefieder\ndieses Legendären Pokémon rot leuchten,\nentzieht es Lebewesen deren Energie."
          y: "Neigt sich seine Lebensspanne dem Ende zu,\nentzieht es anderen Lebewesen deren Energie\nund verwandelt sich zurück in einen Kokon."
        es:
          x: "Pokémon legendario que, al extender sus alas y las\nplumas de la cola, emite un brillo carmesí que absorbe\nla energía vital de su enemigo."
          y: "Cuando su vida se extingue, absorbe la vitalidad de\ntodos los seres vivos y regresa a su forma de crisálida."
        ko:
          x: "날개와 꼬리를 펼치고 빨갛게\n빛날 때 살아 있는 생명을\n빨아들이는 전설의 포켓몬."
          y: "수명이 다할 때 모든\n생명의 목숨을 빨아들이고\n고치의 모습으로 돌아간다고 한다."
zygarde:
