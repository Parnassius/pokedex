          y: "にらむだけで　あいての　うごきを\nとめてしまう。たいようエネルギーを\nたいないで　ぞうふくさせる。"
        jp_kanji:
          x: "ジャローダの　気高い　瞳で\n射すくめられても　平気な　強い\n相手にだけ　本気を　出す。"
          y: "にらむだけで　相手の　動きを\n止めてしまう。太陽エネルギーを\n体内で　増幅させる。"
        en:
          x: "It only gives its all against strong opponents who\nare not fazed by the glare from Serperior’s\nnoble eyes."
          y: "It can stop its opponents’ movements with just a\nglare. It takes in solar energy and boosts\nit internally."
        fr:
          x: "Il ne donnera tout son potentiel que contre un\nennemi puissant indifférent à son regard écrasant\nde noblesse."
          y: "Il peut paralyser l’ennemi d’un regard. Il amplifie\nl’énergie du soleil dans son corps."
        it:
          x: "Dà il meglio di sé solo contro chi non resta\nintimidito dal suo nobile sguardo."
          y: "Può bloccare i movimenti dell’avversario con il solo\nsguardo. Amplifica l’energia solare all’interno del\nsuo corpo."
        de:
          x: "Im Kampf zeigt es nur Gegnern, die seinem\nedlen Blick standhalten, seine wahre Kraft."
          y: "Bringt Gegner mit einem einzigen kühlen Blick\nzum Erstarren. In seinem Inneren verstärkt es\ndie Energie der Sonne."
        es:
          x: "Tan solo muestra su verdadero poder a quienes no se\namedrentan ante su noble pero inquisitoria mirada."
          y: "Detiene los movimientos del rival con una sola mirada.\nExpande la energía solar dentro de su cuerpo."
        ko:
          x: "샤로다의 고상한 눈동자로\n쏘아보아도 태연할 정도로 강한\n상대에게만 진정한 실력을 발휘한다."
          y: "째려보기만 해도 상대의 움직임을\n멈추게 한다. 태양에너지를\n체내에서 증폭시킨다."
