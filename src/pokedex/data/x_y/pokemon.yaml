        rare: lum_berry
      descriptions:
        jp_kana:
          x: "あらゆる　わざを　つかうため\nポケモンの　せんぞと　かんがえる\nがくしゃが　たくさん　いる。"
          y: "いでんしには　すべての　ポケモンの\nじょうほうが　ふくまれているので\nあらゆる　わざが　つかえるという。"
        jp_kanji:
          x: "あらゆる　技を　使うため\nポケモンの　先祖と　考える\n学者が　たくさん　いる。"
          y: "遺伝子には　すべての　ポケモンの\n情報が　含まれているので\nあらゆる　技が　使えるという。"
        en:
          x: "Because it can use all kinds of moves, many\nscientists believe Mew to be the ancestor\nof Pokémon."
          y: "Its DNA is said to contain the genetic codes of all\nPokémon, so it can use all kinds of techniques."
        fr:
          x: "Nombre de scientifiques voient en lui l’ancêtre\ndes Pokémon car il maîtrise toutes leurs capacités."
          y: "Son ADN contient les codes génétiques de tous\nles Pokémon. Il peut utiliser nombre de techniques."
        it:
          x: "Poiché sa usare qualsiasi mossa, molti scienziati\nritengono che Mew sia l’antenato di tutti i Pokémon."
          y: "Pare che il suo DNA contenga i codici genetici di tutti\ni Pokémon; per questo può usare qualsiasi tecnica."
        de:
          x: "Es beherrscht alle möglichen Attacken, daher sieht\nman in ihm den Vorfahren aller Pokémon."
          y: "Seine DNS soll den genetischen Code aller Pokémon\nbeinhalten. Dadurch kann es alle Attacken erlernen."
        es:
          x: "Varios científicos lo consideran el antecesor de los\nPokémon porque usa todo tipo de movimientos."
          y: "Dicen que su ADN contiene el código genético de\ntodos los Pokémon, por lo que conoce cualquier\ntécnica."
        ko:
          x: "모든 기술을 사용하기 때문에\n포켓몬의 조상이라고 생각하는\n학자가 많다."
          y: "유전자에는 모든 포켓몬의\n정보가 담겨 있기 때문에\n모든 기술을 쓸 수 있다고 전해진다."
