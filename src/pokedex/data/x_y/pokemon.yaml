      descriptions:
        jp_kana:
          x: "あるあさ　とつぜん　ふってくる。\nオニスズメに　おそわれると　はっぱを\nはげしく　ふって　おいはらう。"
          y: "はっぱの　うらがわに　たまった\nあさつゆ　だけを　のんで　くらす。\nほかには　なにも　たべないという。"
        jp_kanji:
          x: "ある朝　突然　降ってくる。\nオニスズメに　襲われると　葉っぱを\n激しく　振って　追い払う。"
          y: "葉っぱの　裏側に　たまった\n朝露だけを　飲んで　暮らす。\n他には　なにも　食べないという。"
        en:
          x: "It may plummet from the sky. If attacked by a\nSpearow, it will violently shake its leaves."
          y: "It lives by drinking only dewdrops from under the\nleaves of plants. It is said that it eats nothing else."
        fr:
          x: "Il tombe du ciel soudainement. S’il est attaqué par\nun Piafabec, il secoue violemment ses feuilles."
          y: "Il vit en buvant la rosée sur les feuilles. On dit qu’il ne\npeut rien avaler d’autre."
        it:
          x: "Piomba dall’alto improvvisamente. Se è attaccato\nda uno Spearow, agita violentemente le foglie."
          y: "Vive nutrendosi delle gocce di rugiada che cadono\ndalle foglie delle piante. Pare che non mangi altro."
        de:
          x: "Manchmal fällt es plötzlich vom Himmel. Wird es\nvon Habitak angegriffen, schüttelt es seine Blätter."
          y: "Es ernährt sich ausschließlich von den Tautropfen,\ndie von den Blättern über ihm hinabfallen."
        es:
          x: "Puede caer del cielo de repente. Si le ataca un\nSpearow, moverá violentamente sus hojas."
          y: "Se alimenta del rocío que hay sobre las hojas de las\nplantas. Dicen que no come nada más."
        ko:
          x: "어느 날 아침 갑자기 떨어진다.\n깨비참에게 습격당하면 잎사귀를\n세차게 흔들어서 쫓아 버린다."
          y: "나뭇잎의 뒷면에 모인\n이슬만을 먹고 산다. 그 밖에는\n아무것도 먹지 않는다고 한다."
