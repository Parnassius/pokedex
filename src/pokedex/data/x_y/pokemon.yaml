          y: "はんしょく　シーズンには　たくさんの\nラブカスが　さんごしょうに　あつまり\nかいめんが　ピンクいろに　そまる。"
        jp_kanji:
          x: "暖かい　海に　生息する。\nラブカスを　見つけた　カップルは\n永遠の　愛が　続くという。"
          y: "繁殖シーズンには　たくさんの\nラブカスが　サンゴ礁に　集まり\n海面が　ピンク色に　染まる。"
        en:
          x: "It lives in warm seas. It is said that a couple finding\nthis Pokémon will be blessed with eternal love."
          y: "During the spawning season, countless Luvdisc\ncongregate at coral reefs, turning the waters pink."
        fr:
          x: "Un habitant des mers chaudes. On dit que le couple\nqui tombe sur ce Pokémon connaîtra l’amour éternel."
          y: "Pendant la saison des amours, d’innombrables\nLovdisc se réunissent près des barrières de corail et\ndonnent l’impression que la mer est rose."
        it:
          x: "Vive nei mari caldi. Si dice che le coppie che trovano\nquesto Pokémon riceveranno in dono l’eterno amore."
          y: "Durante il periodo riproduttivo, numerosi Luvdisc si\nriuniscono intorno alla barriera corallina, colorando\nl’acqua di rosa."
        de:
          x: "Es lebt in warmen Meeren. Man sagt, dass Verliebte,\ndie es sehen, mit ewiger Liebe gesegnet sind."
          y: "Während der Laichzeit versammeln sich zahllose\nLiebiskus in den Korallenriffen. Daher erstrahlt\ndas Wasser rosa."
        es:
          x: "Vive en mares cálidos. Se dice que, si una pareja lo\nencuentra, será bendecida con amor eterno."
          y: "Durante el desove, multitud de Luvdisc se concentran\nen los arrecifes de coral coloreando de rosa el agua."
        ko:
          x: "따뜻한 바다에서 서식한다.\n사랑동이를 발견한 커플은\n영원한 사랑이 지속된다고 한다."
          y: "번식기에는 많은 사랑동이가\n산호초에 모여들어서\n해수면이 핑크색으로 물든다."
bagon:
