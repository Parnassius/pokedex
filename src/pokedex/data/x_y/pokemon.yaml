      descriptions:
        jp_kana:
          x: "たべるほどに　もやすものが　ふえて\nいぶくろないの　ほのおが　つよまり\nパワーも　どんどん　あふれだすのだ。"
          y: "たいないの　ほのおが　もえあがると\nうごきの　キレと　スピードが　ます。\nピンチになると　けむりを　ふきだす。"
        jp_kanji:
          x: "食べるほどに　燃やすものが　増えて\n胃袋内の　炎が　強まり\nパワーも　どんどん　あふれ出すのだ。"
          y: "体内の　炎が　燃え上がると\n動きの　キレと　スピードが　増す。\nピンチになると　煙を　噴き出す。"
        en:
          x: "The more it eats, the more fuel it has to make the\nfire in its stomach stronger. This fills it with even\nmore power."
          y: "When its internal fire flares up, its movements grow\nsharper and faster. When in trouble, it emits smoke."
        fr:
          x: "Plus il a mangé de Baies, plus il a de combustible,\net il peut donc dégager davantage de flammes et\nde puissance."
          y: "Quand le feu dans son corps s’embrase, sa vitesse et\nson agilité augmentent. En cas d’urgence, il crache de\nla fumée."
        it:
          x: "Più mangia e più le fiamme che bruciano nel suo\nstomaco si rinvigoriscono, aumentando così il suo\npotere."
          y: "Quando la fiamma interna arde intensa, diventa più\nrapido e scattante. Nei momenti critici esala fumo."
        de:
          x: "Je mehr es frisst, desto stärker werden\ndie Flammen in seinem Magen.\nDies führt zu rapiden Energieschüben."
          y: "Lodert das Feuer in ihm auf, bewegt es sich\ngeschmeidiger und schneller. Bei Gefahr\nlässt es ordentlich Dampf ab."
        es:
          x: "Cuanto más come, más combustible tiene en su interior\npara avivar sus llamas, con lo que también aumenta su\npoder."
          y: "Cuando las llamas de su interior se avivan, aumenta su\nvelocidad y agilidad. Emite humo si está en peligro."
        ko:
          x: "먹을수록 태울 것이 많아져\n위 속의 불꽃이 강해지고\n파워도 점점 넘치게 된다."
          y: "체내의 불꽃이 타오르면\n움직임이 더 빠르고 예리해진다.\n위급해지면 연기를 뿜어낸다."
emboar:
