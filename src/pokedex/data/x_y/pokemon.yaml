        en:
          x: "It can clear a 30-story building in a leap.\nIts fiery punches scorch its foes."
          y: "When facing a tough foe, it looses flames from\nits wrists. Its powerful legs let it jump clear\nover buildings."
        fr:
          x: "Il peut bondir par-dessus un bâtiment de 30 étages.\nSes poings enflammés brûlent ses adversaires."
          y: "Quand il est face à un ennemi, il laisse s’échapper\ndes gerbes de flammes par ses poignets. Ses jambes\nlui permettent de sauter par-dessus les immeubles."
        it:
          x: "Riesce a superare un edificio di 30 piani con un salto.\nI suoi pugni di fuoco inceneriscono il nemico."
          y: "Quando affronta un forte nemico lancia fiammate\ndai polsi. Le zampe poderose gli permettono di\nscavalcare interi palazzi."
        de:
          x: "Mühelos springt es selbst über 30-stöckige Häuser.\nSein Feuerschlag fügt dem Gegner Verbrennungen zu."
          y: "Trifft es auf einen hartnäckigen Gegner, schießen\nFlammen aus seinen Handgelenken. Seine starken\nBeine ermöglichen ihm, über Häuser zu springen."
        es:
          x: "Puede saltar edificios de 30 plantas. Con sus golpes\nde fuego quema a sus rivales."
          y: "Ante un rival difícil, expulsa llamas por las muñecas.\nTiene mucha fuerza en las patas; hasta puede saltar\nedificios."
        ko:
          x: "30층 빌딩을 점프로\n넘는 점프력을 가졌다.\n불꽃펀치가 상대를 태운다."
          y: "강적을 만나면 손목에서\n불꽃을 내뿜는다. 점프로\n빌딩을 뛰어넘는 다릿심을 가졌다."
