      descriptions:
        jp_kana:
          x: "おしりからだけでなく　くちからも\nいとを　だすので　みただけでは\nどっちが　あたまか　わからない。"
          y: "えものの　からだに　いとを　つけて\nわざと　にがす。いとを　たどれば\nなかまごと　つかまえられるからだ。"
        jp_kanji:
          x: "お尻からだけでなく　口からも\n糸を　出すので　見ただけでは\nどっちが　頭か　わからない。"
          y: "獲物の　体に　糸を　つけて\nわざと　逃がす。糸を　たどれば\n仲間ごと　捕まえられるからだ。"
        en:
          x: "It spins string not only from its rear but also from\nits mouth. It’s hard to tell which end is which."
          y: "It attaches silk to its prey and sets it free. Later,\nit tracks the silk to the prey and its friends."
        fr:
          x: "Il peut produire des fils de soie par l’arrière-train ou\npar la bouche. Il est difficile de différencier les deux."
          y: "Il attache un fil à sa proie avant de la libérer.\nIl s’en servira pour la retrouver, elle et ses amis."
        it:
          x: "Seguendo il filo che gli esce da dietro, si giunge\ndi certo fino al suo nido."
          y: "Aggancia la preda con un filo di seta e la lascia\nandare. Poi segue il filo e la trova quando è in gruppo."
        de:
          x: "Da es Fäden sowohl mit dem Hinterleib als auch mit\ndem Mund spinnt, verwechselt man die beiden leicht."
          y: "Es befestigt Seide an der Beute und lässt sie frei. Es\nfolgt dem Seidenfaden zur Beute und ihren Freunden."
        es:
          x: "Teje su telaraña desde atrás y desde su boca. Es muy\ndifícil saber dónde está cada cual."
          y: "Pega hilos de seda a sus presas y las libera para\nseguirlas más tarde y localizar también a sus amigos."
        ko:
          x: "엉덩이뿐 아니라 입에서도\n실을 내기 때문에 봐서는\n어느 쪽이 머리인지 모른다."
          y: "먹이의 몸에 실을 붙여\n일부러 풀어준다. 실을 더듬어 가면\n동료까지 잡을 수 있기 때문이다."
