          y: "ふしぎな　ちからを　ひめているが\nつかった　きおくが　ないので\nいつも　くびを　かしげている。"
        jp_kanji:
          x: "いつも　頭痛に　悩まされている。\nこの　頭痛が　激しくなると\n不思議な　力を　使いはじめる。"
          y: "不思議な　力を　秘めているが\n使った　記憶が　ないので\nいつも　首を　かしげている。"
        en:
          x: "It is constantly wracked by a headache.\nWhen the headache turns intense,\nit begins using mysterious powers."
          y: "It has mystical powers but doesn’t recall that it has\nused them. That is why it always looks puzzled."
        fr:
          x: "Ce Pokémon a tout le temps la migraine.\nQuand la douleur devient insupportable, il se met à\nutiliser ses pouvoirs psy."
          y: "Il ne se souvient pas qu’il a des pouvoirs psy.\nC’est pour cela qu’il a l’air si confus."
        it:
          x: "È costantemente tormentato dal mal di testa che,\nquando si fa particolarmente intenso, gli conferisce\nstrani poteri."
          y: "Ha poteri soprannaturali ma non ricorda di averli\nusati. Per questo sembra sempre perplesso."
        de:
          x: "Es wird permanent von Kopfschmerzen geplagt.\nWird der Schmerz stärker, setzt es geheimnisvolle\nKräfte ein."
          y: "Es besitzt mystische Kräfte, die es unbewusst einsetzt.\nDaher ist sein Blick immer verwirrt."
        es:
          x: "Padece continuamente dolores de cabeza. Cuando\nson muy fuertes, empieza a usar misteriosos poderes."
          y: "Tiene poderes místicos que no recuerda haber usado.\nPor eso, siempre parece desconcertado."
        ko:
          x: "항상 두통에 시달리고 있다.\n이 두통이 심해지면\n이상한 힘을 쓰기 시작한다."
          y: "이상한 힘을 간직하고 있지만\n사용했던 기억이 없으므로\n항상 고개를 갸웃거리고 있다."
golduck:
