        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - swarm
        - technician
      hidden_ability: steadfast
      descriptions:
        jp_kana:
          x: "するどいカマで　えものを　きりさき\nいきのねを　とめる。ごくまれに\nハネをつかって　とぶ。"
          y: "きれあじ　するどい　カマをつかって\nくさむらを　きりすすむ。あまりに\nはやい　うごきで　めがおいつかない。"
        jp_kanji:
          x: "鋭い　カマで　獲物を　切り裂き\n息の根を　止める。ごくまれに\n羽を　使って　飛ぶ。"
          y: "切れ味　鋭い　カマを　使って\n草むらを　切り進む。あまりに\n速い　動きで　目が　追いつかない。"
        en:
          x: "It tears and shreds prey with its wickedly sharp\nscythes. It very rarely spreads its wings to fly."
          y: "It slashes through grass with its sharp scythes,\nmoving too fast for the human eye to track."
        fr:
          x: "Il déchiquette ses proies à l’aide de ses bras\ntranchants comme des faux. Il n’utilise ses ailes pour\nvoler que très rarement."
          y: "Il fauche les herbes avec ses lames acérées.\nIl bouge si vite qu’on ne peut le voir à l’œil nu."
        it:
          x: "Fa a pezzi le prede con gli artigli spaventosamente\naffilati. Solo raramente spiega le ali per alzarsi in volo."
          y: "Si fa strada tra l’erba grazie alle lame affilate,\nmuovendosi troppo velocemente per l’occhio umano."
        de:
          x: "Es zerreißt und zerkleinert seine Beute mit seinen\nunglaublich scharfen Sicheln. Selten breitet es\nseine Flügel aus, um zu fliegen."
          y: "Es bewegt sich mit seinen Sensen so schnell durch\ndas Gras, dass es kein Mensch sehen kann."
        es:
          x: "Destroza a su presa con las guadañas que tiene.\nNo es común que use las alas para volar."
          y: "Avanza por la hierba con sus afiladas guadañas, más\nrápido de lo que el ojo humano pueda percibir."
        ko:
          x: "날카로운 낫으로 먹이를 베고\n숨통을 끊는다. 매우 드물게\n날개를 사용해서 난다."
          y: "잘 드는 예리한 낫을 써서\n풀숲을 베고 지나간다. 매우\n빠른 움직임에 눈이 따라가지 못한다."
jynx:
  species_id: 124
  names:
    jp_kana: ルージュラ
    jp_kanji: ルージュラ
