      descriptions:
        jp_kana:
          x: "てっこうせきが　だいこうぶつ。\nはがねの　からだを　ぶつけあって\nなわばり　あらそいを　する。"
          y: "はがねの　よろいを　いわに　ぶつけた\nときに　でる　ひばなの　おおきさで\nつよさを　アピールする　しゅうせい。"
        jp_kanji:
          x: "鉄鉱石が　大好物。\n鋼の　体を　ぶつけ合って\n縄張り　争いを　する。"
          y: "鋼の　よろいを　岩に　ぶつけた\nときに　出る　火花の　大きさで\n強さを　アピールする　習性。"
        en:
          x: "It loves iron ore. Groups of them fight for territory\nby bashing one another with their steel bodies."
          y: "It habitually shows off its strength with the size of\nsparks it creates by ramming its steel body\ninto boulders."
        fr:
          x: "Il raffole du minerai de fer. Il défend son territoire\nen chargeant avec son corps d’acier."
          y: "Pour montrer sa force à ses ennemis, Galegon frotte\nson corps d’acier contre les rochers pour produire\nde gigantesques étincelles."
        it:
          x: "Adora i minerali di ferro. Scaglia il suo corpo d’acciaio\ncontro gli altri nella lotta per il territorio."
          y: "Per sfoggiare la sua potenza, crea grandi scintille\nscontrandosi contro i massi con il suo corpo d’acciaio."
        de:
          x: "Ist verrückt nach Eisenerz. Bei Revierkämpfen\nstoßen Stollrak einander mit ihren Stahlkörpern."
          y: "Gelegentlich demonstriert es seine Kraft, indem es\nmit der Größe der Funken angibt, die entstehen,\nwenn es seinen stählernen Körper in Felsen rammt."
        es:
          x: "Le encanta comer hierro. Lucha por su territorio\nembistiendo a sus rivales con su cuerpo de acero."
          y: "Para alardear de su fuerza, hace saltar chispas\nfrotando contra grandes rocas el cuerpo de acero\nque tiene."
        ko:
          x: "철광석을 매우 좋아한다.\n강철의 몸을 서로 부딪치며\n영역 싸움을 한다."
          y: "강철의 갑옷을 바위에 부딪쳤을 때\n튀는 불꽃의 크기로\n강함을 어필하는 습성이 있다."
