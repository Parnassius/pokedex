          y: "えいよう　まんてんの　わきみずを\nのんだ　ロゼリアは　めずらしい\nいろの　はなを　さかせる　らしい。"
        jp_kanji:
          x: "右手と　左手で　２種類の\n毒を　使いわけて　攻撃する。\n香りが　強いほど　元気だ。"
          y: "栄養満点の　わき水を\n飲んだ　ロゼリアは　珍しい　色の\n花を　咲かせる　らしい。"
        en:
          x: "It uses the different poisons in each hand\nseparately when it attacks. The stronger its aroma,\nthe healthier it is."
          y: "Roselia that drink nutritionally rich springwater are\nsaid to reveal rare coloration when they bloom."
        fr:
          x: "Chacune de ses mains sécrète un poison différent.\nPlus un Rosélia est en bonne santé, plus ses parfums\nsont puissants."
          y: "Les Rosélia arrosés avec une eau de source riche\nen nutriments prendraient des couleurs uniques."
        it:
          x: "Attacca usando abilmente i due tipi di veleno delle\nestremità dei suoi arti. Più è forte la sua fragranza,\npiù è in salute."
          y: "Beve solo acqua di fonte, ricca di sostanze nutritive,\nche conferisce ai suoi fiori dei colori preziosi."
        de:
          x: "Aus seinen Händen verströmt es jeweils\nein anderes Gift. Je stärker Roselia duftet,\ndesto gesünder ist es."
          y: "Gibt man ihm besonders nahrhaftes Quellwasser\nzu trinken, entwickelt es Blüten in seltenen Farben."
        es:
          x: "Ataca con sus manos, en las que tiene un tipo de\nveneno diferente en cada una. Cuanto más aroma,\nmejor salud tiene."
          y: "Se dice que le brotan flores de colores poco usuales\nsi bebe agua de manantial rica en nutrientes."
        ko:
          x: "오른손과 왼손으로 2종류의\n독을 구별하여 공격한다.\n향기가 강할수록 기운이 넘친다."
          y: "영양 만점의 샘물을\n마신 로젤리아는 희귀한\n색의 꽃을 피우는 듯하다."
gulpin:
