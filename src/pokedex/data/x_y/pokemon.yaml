        - vital_spirit
        - hustle
      hidden_ability: insomnia
      descriptions:
        jp_kana:
          x: "しっぽで　エサを　つつんで　はこぶ。\nやまで　そうなんした　ひとに\nエサを　わけあたえる　しゅうせい。"
          y: "１にちじゅう　エサを　はこぶ。\nやまで　そうなんした　ひとがいると\nエサを　わけあたえ　たすけている。"
        jp_kanji:
          x: "尻尾で　エサを　包んで　運ぶ。\n山で　遭難した　人に\nエサを　分け与える　習性。"
          y: "１日中　エサを　運ぶ。\n山で　遭難した　人がいると\nエサを　分け与え　助けている。"
        en:
          x: "It carries food rolled up in its tail. It has the habit of\nsharing food with people lost in mountains."
          y: "It carries food all day long. When someone is lost\nin the mountains, it shares that food."
        fr:
          x: "Il dépose sa nourriture dans sa queue enroulée.\nIl l’offre souvent aux gens égarés en montagne."
          y: "Il passe ses journées à transporter de la nourriture.\nIl l’offre souvent aux gens égarés en montagne."
        it:
          x: "Trascina il cibo avvolgendolo nella coda e ha\nl’abitudine di condividerlo con chi si perde fra\nle montagne."
          y: "Porta sempre del cibo con sé e lo condivide volentieri\ncon gli sfortunati che si sono persi in montagna."
        de:
          x: "Im eingerollten Schweif transportiert es Futter,\ndas es mit denen teilt, die sich verlaufen haben."
          y: "Es trägt den ganzen Tag Essen mit sich herum, das es\nmit Menschen teilt, die in den Bergen feststecken."
        es:
          x: "Transporta alimentos en su cola enrollada. Le gusta\ncompartir su comida con los montañistas perdidos."
          y: "Lleva siempre comida consigo. Si se encuentra con\nmontañeros que vagan perdidos, la comparte."
        ko:
          x: "꼬리로 먹이를 싸서 운반한다.\n산에서 조난당한 사람에게\n먹이를 나눠주는 습성이 있다."
          y: "온종일 먹이를 나른다.\n산에서 조난당한 사람이 있으면\n먹이를 나눠 도와주고 있다."
mantine:
  species_id: 226
  names:
    jp_kana: マンタイン
    jp_kanji: マンタイン
    en: Mantine
    fr: Démanta
    it: Mantine
