          y: "Se il suo manto si rompe mentre lotta, lo rifà\nvelocemente con ciò che trova attorno a sé."
        de:
          x: "Um sich vor dem eisigen Winterwind zu schützen,\nlegt es sich unter einen Umhang aus Ästen und Laub."
          y: "Wird sein Umhang im Kampf zerstört, macht es sich\nschnell aus dem, was es findet, einen neuen."
        es:
          x: "Para protegerse de los vientos fríos invernales, se\ncubre con un caparazón de ramas y hojas."
          y: "Si su caparazón se rompe en combate, lo rehace\nrápidamente con lo que tenga a mano."
        ko:
          x: "차가운 초겨울 바람을 막으려고\n작은 가지나 낙엽을 재료로\n도롱이를 만들어 몸을 감싼다."
          y: "싸움으로 도롱이가 부서져 버리면\n가까이 있는 재료로\n도롱이를 바로 만들어 고친다."
