        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      abilities:
        - chlorophyll
        - leaf_guard
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          x: "とても　かるい　からだ。\nふきとばされないよう　しっかり\nじめんを　ふみしめている。"
          y: "かぜに　ながされて　ただよう。\nのやまに　ハネッコが　あつまりだすと\nはるが　おとずれると　いわれている。"
        jp_kanji:
          x: "とても　軽い　体。\n吹き飛ばされないよう　しっかり\n地面を　踏みしめている。"
          y: "風に　流されて　漂う。\n野山に　ハネッコが　集まり出すと\n春が　訪れると　言われている。"
        en:
          x: "Its body is so light, it must grip the ground firmly\nwith its feet to keep from being blown away."
          y: "It drifts on winds. It is said that when Hoppip gather\nin fields and mountains, spring is on the way."
        fr:
          x: "Son corps est si léger qu’il doit s’agripper au sol pour\néviter de s’envoler les jours de brise."
          y: "Il dérive avec le vent. Sa présence en nombre dans\nles champs et les montagnes annonce le printemps."
        it:
          x: "Ha un corpo così leggero che deve aggrapparsi\nsaldamente al suolo per non volare via."
          y: "Giunge sospinto dai venti. Si dice che quando\nHoppip appare su campi e monti, la primavera sia\nin arrivo."
        de:
          x: "Sein Körper ist so leicht, dass es seine Füße im\nBoden verankert, damit es nicht davongeweht wird."
          y: "Es reitet auf dem Wind. Man sagt, wenn sich\nHoppspross versammeln, kommt der Frühling bald."
        es:
          x: "Su cuerpo es tan ligero, que debe agarrarse bien al\nsuelo con las patas para no irse con el viento."
          y: "Flotan en el aire. Se dice que, cuando los Hoppip se\nreúnen, es que la primavera está al caer."
        ko:
          x: "매우 가벼운 몸을 가졌다.\n바람에 날아가지 않도록 단단히\n지면을 밟아 지탱하고 있다."
          y: "바람에 날려 떠다닌다.\n산과 들에 통통코가 모여들면\n봄이 찾아온다고 전해진다."
skiploom:
  species_id: 188
