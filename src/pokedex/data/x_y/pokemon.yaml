      descriptions:
        jp_kana:
          x: "じまんの　パワーで　あいてを\nばらばらに　できるのに　さらに\nもうどくで　とどめを　さすのだ。"
          y: "りょううでの　ツメは　じどうしゃを\nスクラップにする　はかいりょく。\nツメの　さきから　どくを　だす。"
        jp_kanji:
          x: "自慢の　パワーで　相手を\nばらばらに　できるのに　さらに\n猛毒で　とどめを　刺すのだ。"
          y: "両腕の　ツメは　自動車を\nスクラップにする　破壊力。\nツメの　先から　毒を　出す。"
        en:
          x: "It takes pride in its strength. Even though it can\ntear foes apart, it finishes them off with\npowerful poison."
          y: "It has the power in its clawed arms to make scrap\nof a car. The tips of its claws release poison."
        fr:
          x: "Il met ses adversaires en pièces grâce à sa\nprodigieuse force, puis donne le coup de grâce avec\nson violent poison."
          y: "Il peut réduire une voiture en pièces avec ses pinces.\nLe bout de ses pinces contient du poison."
        it:
          x: "Va fiero della sua forza con cui può fare a pezzi il\nnemico, ma in genere preferisce finirlo usando le\nsue tossine."
          y: "Con le zampe può accartocciare una macchina.\nLe punte degli artigli sono velenose."
        de:
          x: "Es bringt seine Gegner mit starkem Gift zur Strecke,\nobwohl es weiß, dass es stark genug ist, um sie\nzu zerfetzen."
          y: "In seinen Armen steckt so viel Kraft, dass es mit\nseinen giftigen Krallen Autos zerquetschen kann."
        es:
          x: "Aunque sabe que puede aplastar al rival con su gran\nfuerza, le gusta dar el golpe de gracia con su virulento\nveneno."
          y: "Sus brazos tienen fuerza para destrozar un coche.\nLa punta de sus zarpas segrega veneno."
        ko:
          x: "자랑거리인 파워로 상대를\n조각조각 낼 수 있으며 게다가\n맹독으로 마무리한다."
          y: "양팔의 발톱은 자동차를\n동강 내는 파괴력이 있다.\n발톱의 끝에서 독을 뿌린다."
croagunk:
  species_id: 453
