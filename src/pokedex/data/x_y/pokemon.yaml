          y: "あなをほり　きのねっこ　から\nえいようを　とるが　ほとんどは\nせなかの　キノコに　うばわれる。"
        jp_kanji:
          x: "虫の　背中に　生えているのは\n冬虫夏草　という　キノコ。\n育つと　キノコも　大きくなる。"
          y: "穴を　掘り　木の根っこから\n栄養を　取るが　ほとんどは\n背中の　キノコに　奪われる。"
        en:
          x: "Growing out of the bug’s back are mushrooms\ncalled tochukaso. The mushrooms grow\nwith the bug host."
          y: "Burrows under the ground to gnaw on tree roots.\nThe mushrooms on its back absorb most of\nthe nutrition."
        fr:
          x: "Sur le dos de ce Pokémon se trouvent des\nchampignons appelés tochukaso. Ils se développent\nau même rythme que leur hôte."
          y: "Il s’enfouit sous terre pour ronger des racines afin de\nnourrir les champignons sur son dos."
        it:
          x: "Sul dorso di questo Pokémon nascono funghi\nchiamati tochukaso, che crescono insieme a lui."
          y: "Si nasconde sottoterra dove si ciba di radici.\nI funghi che ha sulla schiena sono parassiti."
        de:
          x: "Auf seinem Rücken wachsen Pilze, die man\nTochukaso nennt. Die Pilze wachsen mit ihrem Wirt."
          y: "Dieses Pokémon gräbt sich in den Boden und frisst\nWurzeln. Die Pilze auf seinem Rücken sind Parasiten."
        es:
          x: "Lleva en el lomo dos setas parásitas llamadas\ntochukaso, que crecen con él."
          y: "Escarba bajo el suelo para roer las raíces de los\nárboles. Sus setas absorben los nutrientes."
        ko:
          x: "벌레의 등에 돋아나 있는 것은\n동충하초라는 버섯이다.\n성장하면 버섯도 커진다."
          y: "구멍을 파서 나무뿌리로부터\n영양을 섭취하지만 대부분은\n등에 있는 버섯에게 빼앗긴다."
