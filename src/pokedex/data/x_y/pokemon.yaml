        jp_kana:
          x: "つよい　あいてにも　ゆうかんに\nたちむかう　こんじょうの　もちぬし。\nあたたかい　とちを　めざして　とぶ。"
          y: "さむい　きせつは　にがて。あたたかい\nとちを　さがし　１にち　３００キロの\nきょりを　とんで　いどうする。"
        jp_kanji:
          x: "強い　相手にも　勇敢に\n立ち向かう　根性の　持ち主。\n暖かい　土地を　目指して　飛ぶ。"
          y: "寒い　季節は　苦手。暖かい　土地を\n探し　１日　３００キロの　距離を\n飛んで　移動する。"
        en:
          x: "It has a gutsy spirit that makes it bravely take on\ntough foes. It flies in search of warm climates."
          y: "It dislikes cold seasons. They migrate to other\nlands in search of warmth, flying over 180 miles\na day."
        fr:
          x: "Ce Pokémon téméraire n’a pas peur d’affronter\ndes ennemis puissants. Il vole en quête de climats\nchauds."
          y: "Nirondelle ne supporte pas les saisons froides.\nIl vole vers d’autres terres à la recherche de chaleur\net peut ainsi parcourir 300 km par jour."
        it:
          x: "È molto coraggioso e affronta spavaldo i nemici\npiù forti. Migra verso i paesi caldi."
          y: "Non ama il freddo. In inverno emigra verso regioni\ncalde, viaggiando a una velocità di 300 km al giorno."
        de:
          x: "Es ist sehr mutig und stellt sich auch starken\nGegnern. Es sucht ständig nach warmen Regionen."
          y: "Es mag die kalte Jahreszeit nicht. Daher legt es\nauf der Suche nach wärmeren Gefilden mehr als\n300 km am Tag zurück."
        es:
          x: "Es un Pokémon valiente que no teme a los rivales\nfuertes. Vuela en busca de climas templados."
          y: "No le gustan las bajas temperaturas. En las estaciones\nfrías se recorre casi 300 km al día en busca de zonas\ncálidas."
        ko:
          x: "강한 상대에게도 용감히\n맞서는 근성의 소유자다.\n따뜻한 땅을 찾아서 난다."
          y: "추운 계절에 약하다. 따뜻한\n지방을 찾아 하루에 300km의\n거리를 날아서 이동한다."
swellow:
