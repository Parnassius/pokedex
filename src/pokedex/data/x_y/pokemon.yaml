          y: "Su suave aroma guía a Volbeat para que haga señales\nluminosas en el cielo nocturno."
        ko:
          x: "달콤한 향기로 볼비트를\n유도해서 200개 이상의\n모양을 밤하늘에 그린다."
          y: "달콤한 향기로 볼비트를\n유도해서 밤하늘에\n빛의 사인을 그린다."
