          y: "よわった　ポケモンを　なおるまで\nかんびょうする　やさしい　ポケモン。\nかなしい　きもちを　キャッチする。"
        jp_kanji:
          x: "ハピナスの　産む　タマゴには\n幸せが　つまっていて　ひとくち\n食べると　だれでも　笑顔になれる。"
          y: "弱った　ポケモンを　治るまで\n看病する　優しい　ポケモン。\n悲しい　気持ちを　キャッチする。"
        en:
          x: "The eggs it lays are filled with happiness. Eating\neven one bite will bring a smile to anyone."
          y: "This kindhearted Pokémon nurses sick Pokémon to\nhealth. It senses feelings of sadness."
        fr:
          x: "Les œufs que pond Leuphorie sont un concentré\nde bonheur dont une bouchée suffit à apporter la joie."
          y: "Ce Pokémon au cœur d’or soigne les Pokémon\nmalades. Il ressent la tristesse d’autrui."
        it:
          x: "Le uova che depone sono piene di felicità. Un\nassaggio rende chiunque allegro."
          y: "Questo Pokémon buono cura i Pokémon malati e li\nfa guarire. Percepisce la tristezza altrui."
        de:
          x: "Eier, die es legt, stecken voller Fröhlichkeit.\nSchon ein Bissen erzeugt ein breites Lächeln."
          y: "Dieses gutherzige Pokémon pflegt kranke Pokémon\ngesund. Es spürt die Traurigkeit anderer Lebewesen."
        es:
          x: "Los huevos que pone están llenos de felicidad. Solo\ncon probar un poquito de uno, cualquiera sonríe."
          y: "Este amable Pokémon cuida de Pokémon enfermos y\nlos sana. Puede percibir la tristeza."
        ko:
          x: "해피너스가 낳은 알에는\n행복이 담겨 있어서 한 입 먹으면\n누구든지 웃음 띤 얼굴이 된다."
          y: "약해진 포켓몬을 나을 때까지\n간호하는 상냥한 포켓몬이다.\n슬퍼하는 기분을 알아챈다."
