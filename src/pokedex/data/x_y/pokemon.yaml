          y: "おおきな　つばさで　１にちじゅう\nとびまわる　たいりょくの　もちぬし。\nするどい　くちばしで　たたかう。"
        jp_kanji:
          x: "大きな　翼で　大空を\n飛び続けることが　できる。\n１回も　降りなくても　平気だ。"
          y: "大きな　翼で　１日中\n飛び回る　体力の　持ち主。\n鋭い　クチバシで　戦う。"
        en:
          x: "With its huge and magnificent wings, it can keep\naloft without ever having to land for rest."
          y: "It has the stamina to fly all day on its broad wings.\nIt fights by using its sharp beak."
        fr:
          x: "Ses ailes géantes lui permettent de voler sur de\nlongues distances sans qu’il ait besoin de se reposer."
          y: "Il a assez d’énergie pour voler toute la journée avec\nses grandes ailes. Il frappe de son bec acéré."
        it:
          x: "Con le sue enormi e magnifiche ali, è in grado di\nvolare senza mai atterrare per riposarsi."
          y: "Le sue ampie ali robuste gli permettono di volare\ntutto il giorno. Combatte usando il becco aguzzo."
        de:
          x: "Mit seinen riesigen Flügeln kann dieses Pokémon\nnahezu pausenlos in der Luft bleiben."
          y: "Es hat genügend Ausdauer, den ganzen Tag\nzu fliegen. Sein scharfer Schnabel dient als Waffe."
        es:
          x: "Con sus enormes y magníficas alas, puede seguir\nvolando sin tener que aterrizar para descansar."
          y: "Tiene energía para volar todo el día con sus grandes\nalas. Lucha con su afilado pico."
        ko:
          x: "커다란 날개로 넓은 하늘을\n계속 날 수 있다.\n한 번도 내려앉지 않아도 괜찮다."
          y: "큰 날개로 온종일\n날아다닐 수 있는 체력의 소유자다.\n날카로운 부리로 싸운다."
