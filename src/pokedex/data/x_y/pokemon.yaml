        jp_kana:
          x: "するどく　かたい　キバと\nさらに　がんじょうな　ひふでの\nたいあたりは　いえをも　こわすほど。"
          y: "キバが　ながくて　おおきいほど\nむれのなかでの　ランクが　たかい。\nキバがのびるには　じかんがかかる。"
        jp_kanji:
          x: "鋭く　硬い　キバと\nさらに　頑丈な　皮膚で\n体当たりは　家をも　壊すほど。"
          y: "キバが　長くて　大きいほど\n群れの中での　ランクが　高い。\nキバが　伸びるには　時間が　かかる。"
        en:
          x: "It has sharp, hard tusks and a rugged hide.\nIts Tackle is strong enough to knock down a house."
          y: "The longer and bigger its tusks, the higher its rank\nin its herd. The tusks take long to grow."
        fr:
          x: "Il a des défenses aiguisées et une peau épaisse.\nSes charges peuvent détruire une maison."
          y: "Plus grandes sont ses défenses, plus haut est son\nrang dans le troupeau. Elles poussent lentement."
        it:
          x: "Ha zanne dure e affilate e la pelle grinzosa. La sua\nAzione è così forte da abbattere una casa."
          y: "Più grandi sono le zanne, più alto è il suo rango nel\nbranco. Le zanne crescono lentamente."
        de:
          x: "Aufgrund seiner scharfen Stoßzähne und seiner\nrauen Haut könnte es mit Tackle ein Haus\nniederreißen."
          y: "Je größer und länger die Stoßzähne, desto höher\nist ihr Rang in der Herde, doch das dauert lange."
        es:
          x: "Tiene afilados y duros colmillos, y una gruesa piel.\nSu Placaje es tan fuerte que puede derribar una casa."
          y: "Cuanto más grandes son sus colmillos, mayor su\nestatus en la manada. Los colmillos tardan mucho en\ncrecer."
        ko:
          x: "예리하고 단단한 이빨과\n더욱 튼튼한 피부의\n몸통박치기는 집도 부술 정도다."
          y: "송곳니가 길고 클수록\n무리 중에서 서열이 높다.\n송곳니가 자라는 데는 시간이 걸린다."
