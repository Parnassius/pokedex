        jp_kana:
          x: "とりこんだ　たいようこうせんを\nエネルギーコアで　はんのう　させて\nひかりのたまとして　うちだしてくる。"
          y: "たいないの　コアで　エネルギーを\nあっしゅくして　うちだす　こうげきは\nやまを　ふきとばす　いりょく。"
        jp_kanji:
          x: "取りこんだ　太陽光線を\nエネルギーコアで　反応　させて\n光の玉として　撃ちだしてくる。"
          y: "体内の　コアで　エネルギーを\n圧縮して　撃ち出す　攻撃は\n山を　吹き飛ばす　威力。"
        en:
          x: "The solar rays it absorbs are processed in its\nenergy core and fired as a ball of light."
          y: "Compressing the energy from its internal core\nlets it fire off an attack capable of blowing away\na mountain."
        fr:
          x: "Il amplifie dans son noyau l’énergie du soleil absorbée\npar son corps et la projette en une boule de lumière."
          y: "Il comprime de l’énergie dans son corps, et ses\nattaques sont assez puissantes pour renverser des\nmontagnes."
        it:
          x: "Assorbe i raggi solari e, grazie al suo nucleo\nenergetico, li trasforma in palle di luce che poi spara."
          y: "Comprime l’energia nel suo nucleo interno per poi\nspararla con una potenza che può spazzare via anche\nle montagne."
        de:
          x: "Es verarbeitet Sonnenstrahlen in seinem\nEnergiekern zu Lichtkugeln weiter, um sie\nim Kampf auf seinen Gegner abzufeuern."
          y: "Es kann ganze Berge einebnen, indem es Energie\nentlädt, die es in seinem Kern gesammelt und\nverdichtet hat."
        es:
          x: "Absorbe los rayos solares, procesa esa energía en su\nnúcleo y lanza poderosas bolas de luz a sus enemigos."
          y: "El núcleo de su cuerpo comprime la energía para\nlanzar ataques capaces de destruir una montaña."
        ko:
          x: "거두어들인 태양광선을\n에너지 코어로 반응시켜\n빛의 구슬로 쏘아낸다."
          y: "체내의 코어에서 에너지를\n압축하여 쏘아대는 공격은\n산을 날려버릴 만한 위력이다."
woobat:
