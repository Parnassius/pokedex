      descriptions:
        jp_kana:
          x: "さむい　きせつは　やまの　ふもとまで\nおりてくるが　はるに　なると　ゆきが\nのこる　さんちょうに　もどっていく。"
          y: "はるになると　アイスキャンディーの\nような　しょっかんの　きのみが\nおなかの　まわりに　なる。"
        jp_kanji:
          x: "寒い　季節は　山の　ふもとまで\n降りてくるが　春に　なると\n雪が　残る　山頂に　戻っていく。"
          y: "春になると　アイスキャンディーの\nような　触感の　木の実が\nお腹の　まわりに　生る。"
        en:
          x: "During cold seasons, it migrates to the mountain’s\nlower reaches. It returns to the snow-covered\nsummit in the spring."
          y: "In the spring, it grows berries with the texture of\nfrozen treats around its belly."
        fr:
          x: "Il s’aventure jusqu’au pied des montagnes en hiver,\nmais se réfugie sur les pics neigeux au printemps."
          y: "Au printemps, il fait pousser des Baies pareilles à\ndes crèmes glacées autour de son ventre."
        it:
          x: "In inverno scende a valle, ma in primavera se ne\ntorna sulle cime montuose dove c’è ancora neve."
          y: "In primavera, attorno al ventre gli crescono delle\nbacche simili a dolci ghiaccioli."
        de:
          x: "Im Winter steigt es bis zum Fuß der Berge herab.\nIm Frühjahr kehrt es auf den Gipfel zurück."
          y: "Im Frühjahr wachsen Beeren, die wie gefrorene\nSüßigkeiten aussehen, um seinen Bauch herum."
        es:
          x: "En las estaciones frías baja al pie de la montaña, pero\nregresa a las cimas nevadas en primavera."
          y: "En primavera, le crecen bayas con apariencia de\nhelado alrededor de la panza."
        ko:
          x: "추운 계절에는 산기슭까지\n내려오지만 봄이 되면 눈이\n남아 있는 산 정상으로 돌아간다."
          y: "봄이 되면 아이스캔디와\n같은 촉감의 나무열매가\n배의 주위에 열린다."
