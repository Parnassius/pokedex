          x: "おおぞらを　ゆったりと　とぶ。\nチルタリスの　うつくしい　ハミングを\nきくと　うっとり　ゆめごこちだ。"
          y: "はれたひ　わたぐもに　まぎれながら\nおおぞらを　じゆうに　とびまわり\nうつくしい　ソプラノで　うたう。"
        jp_kanji:
          x: "大空を　ゆったりと　飛ぶ。\nチルタリスの　美しい　ハミングを\n聴くと　うっとり　夢心地だ。"
          y: "晴れた日　綿雲に　まぎれながら\n大空を　自由に　飛び回り\n美しい　ソプラノで　歌う。"
        en:
          x: "It flies gracefully through the sky. Its melodic\nhumming makes you feel like you’re in a dream."
          y: "On sunny days, it flies freely through the sky and\nblends into the clouds. It sings in a\nbeautiful soprano."
        fr:
          x: "Il vole doucement dans le ciel. Ceux qui l’entendent\nfredonner sont comme plongés dans un rêve."
          y: "Il vole librement en se cachant dans les nuages.\nSon chant est digne de celui de la plus douée des\nsopranos."
        it:
          x: "Volteggia elegante nel cielo. Canticchia soavemente,\nmandando in onirica estasi chi lo ascolta."
          y: "Nelle belle giornate, ama confondersi con le poche\nnuvole in cielo e cantare con una bellissima voce di\nsoprano."
        de:
          x: "Es schwebt gemächlich durch den Himmel.\nSein wunderschönes Summen gibt einem\ndas Gefühl zu träumen."
          y: "Bei gutem Wetter mischt es sich unter die Wolken\nund genießt die Freiheit. Es hat eine entzückende\nSopranstimme."
        es:
          x: "Vuela pausadamente por el cielo azul. Su hermoso\ntrino cautiva a todo aquel que lo escucha."
          y: "En días soleados, le gusta mezclarse con las nubes\ny disfrutar de la libertad del cielo mientras trina con\nvoz de soprano."
        ko:
          x: "넓은 하늘을 느긋하게 난다.\n파비코리의 아름다운 콧노래를\n들으면 황홀한 꿈을 꾸는 기분이다."
          y: "맑은 날 뭉게구름에 뒤섞이면서\n넓은 하늘을 자유롭게 날아다니며\n아름다운 소프라노로 노래한다."
zangoose:
