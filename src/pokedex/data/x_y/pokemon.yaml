          y: "なかまのため　きけんを　かえりみず\nたたかう。じどうしゃを　つかんだまま\nおおぞらを　まう　ことが　できる。"
        jp_kanji:
          x: "仲間の　ためなら　どれだけ\n傷つこうとも　戦いを　やめない\n勇敢な　大空の　戦士。"
          y: "仲間のため　危険を　かえりみず\n戦う。自動車を　つかんだまま\n大空を　舞う　ことが　できる。"
        en:
          x: "For the sake of its friends, this brave warrior of the\nsky will not stop battling, even if injured."
          y: "They fight for their friends without any thought\nabout danger to themselves. One can carry a car\nwhile flying."
        fr:
          x: "Un chevalier du ciel, brave et intrépide. Pour les\nsiens, il combat au mépris du danger, sans jamais\nfléchir."
          y: "Pour les siens, il combat au mépris du danger. Il est\ncapable de soulever une voiture haut dans le ciel."
        it:
          x: "È l’intrepido guerriero del cielo. Per difendere i suoi\nsimili, lotta fino all’ultimo senza badare alle ferite."
          y: "Incurante del pericolo, lotta per difendere i compagni.\nPuò sollevare in volo anche una pesante automobile."
        de:
          x: "Ein tapferer Krieger der Lüfte, der zum Schutz\nseiner Kameraden auch mit Verletzungen immer\nweiterkämpft."
          y: "Für Freunde stürzt es sich selbstlos in den Kampf. Es\nkann mit seinen Krallen Autos durch die Lüfte tragen."
        es:
          x: "Un valiente guerrero del cielo que no duda en luchar\npor sus compañeros por graves que sean sus heridas."
          y: "Lucha por sus compañeros sin reparar en el peligro.\nEs capaz de volar alto incluso con un coche en sus\ngarras."
        ko:
          x: "동료를 위해서라면 아무리\n상처를 입더라도 싸움을 관두지 않는\n용감한 넓은 하늘의 전사."
          y: "동료를 위해 위험을 무릅쓰고\n싸운다. 자동차를 붙잡은 채로\n넓은 하늘을 날 수 있다."
