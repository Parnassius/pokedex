      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - shield_dust
        - compound_eyes
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          x: "せかいには　さまざまな　はねもようの\nビビヨンがいる。すんでいる　とちの\nきこうが　えいきょうしているようだ。"
          y: "すんでいる　きこうや　ふうどによって\nはねの　もようが　ちがう　ポケモン。\nいろあざやかな　りんぷんを　まく。"
        jp_kanji:
          x: "世界には　さまざまな　羽模様の\nビビヨンがいる。住んでいる　土地の\n気候が　影響しているようだ。"
          y: "住んでいる　気候や　風土によって\n羽の　模様が　違う　ポケモン。\n色鮮やかな　りんぷんを　まく。"
        en:
          x: "Vivillon with many different patterns are\nfound all over the world. These patterns\nare affected by the climate of their habitat."
          y: "The patterns on this Pokémon’s wings\ndepend on the climate and topography\nof its habitat. It scatters colorful scales."
        fr:
          x: "Les ailes des Prismillon arborent différents motifs\nen fonction de leur aire d’origine. Il est possible que\nle climat y soit pour quelque chose."
          y: "Selon le climat de sa région d’origine, les motifs\nde ses ailes sont différents. Il sème des écailles\naux couleurs vives."
        it:
          x: "Nel mondo ne esistono diverse varietà che si\ndifferenziano per i motivi sulle ali. Sembra che\nquesti dipendano dal clima del loro habitat."
          y: "I motivi sulle sue ali cambiano a seconda della zona\ne del clima in cui vive. Dal suo corpo si staccano\nscaglie dai colori vivaci."
        de:
          x: "Vivillon kommen weltweit mit den unterschiedlichsten\nMusterungen vor. Das Klima ihres Habitats hat Einfluss\nauf ihre Flügelmusterung."
          y: "Je nach Klima und geographischer Beschaffenheit\nseines Habitats ändert sich die Musterung seiner\nFlügel. Es verstreut bunten Flügelstaub."
        es:
          x: "En el mundo existen Vivillon con diferentes motivos en\nsus alas. El clima de cada región influye en sus rasgos."
          y: "Las alas cambian de motivo según el clima y las\ncaracterísticas naturales del terreno que habite.\nEsparce escamas de lo más coloridas."
        ko:
          x: "세계에는 다양한 무늬의 날개를 가진\n비비용이 있다. 살고 있는 곳의\n기후에 영향을 받는 것 같다."
          y: "살고 있는 장소의 기후나 풍토에 따라\n날개의 모양이 다른 포켓몬이다.\n화려한 색의 날개 가루를 뿌린다."
