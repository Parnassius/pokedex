        jp_kana:
          x: "でんきを　いっぱいに　ためると\n２ほんの　ツノの　あいだで　はげしく\nあおじろい　ひばなを　ちらす。"
          y: "２ほんの　しっぽの　さきを　あいてに\nおしあてて　２まんボルトいじょうの\nでんりゅうを　ながして　こうげき。"
        jp_kanji:
          x: "電気を　いっぱいに　ためると\n２本の　ツノの　あいだで　激しく\n青白い　火花を　散らす。"
          y: "２本の　尻尾の　先を　相手に\n押し当てて　２万ボルト以上の\n電流を　流して　攻撃。"
        en:
          x: "As its electric charge amplifies, blue sparks begin\nto crackle between its horns."
          y: "It pushes the tips of its two tails against the foe,\nthen lets loose with over 20,000 volts of power."
        fr:
          x: "Des étincelles bleuâtres jaillissent entre ses 2 cornes\nquand il accumule beaucoup d’électricité."
          y: "Il place le bout de ses deux queues sur son ennemi\net libère une décharge de 20 000 V."
        it:
          x: "Quando accumula tanta elettricità sparge scintille\nazzurrine dallo spazio tra le due corna."
          y: "Tocca il nemico con le sue due code e rilascia una\nscarica elettrica di oltre 20.000 volt."
        de:
          x: "Bei voller Ladung zucken feurige, blassweiße\nFunken zwischen seinen zwei Hörnern hin und her."
          y: "Es berührt den Gegner mit seinen beiden\nSchweifspitzen und entlädt dann über 20 000 V."
        es:
          x: "Al almacenar mucha electricidad, desprende chispas de\nuna claridad increíble entre sus dos cuernos."
          y: "Toca a su enemigo con las puntas de sus dos colas\ny le suelta una descarga de más de 20 000 voltios."
        ko:
          x: "전기를 가득 모으면\n2개의 뿔 사이에서 세차게\n푸르스름한 불티를 뿌린다."
          y: "2개의 꼬리 끝을 상대에게\n바싹 대어 2만 볼트 이상의\n전류를 흘려 공격한다."
