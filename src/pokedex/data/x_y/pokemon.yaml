        jp_kana:
          x: "はっきした　サイコパワーを　つかい\nとくしゅな　えきたいで　つくられた\nうでを　あやつり　いわを　くだく。"
          y: "ランクルス　どうしが　あくしゅすると\nのうみそが　ネットワークで　つながり\nサイコパワーが　ぞうふくされるのだ。"
        jp_kanji:
          x: "発揮した　サイコパワーを　使い\n特殊な　液体で　つくられた\n腕を　操り　岩を　砕く。"
          y: "ランクルス　同士が　握手すると\n脳みそが　ネットワークで　つながり\nサイコパワーが　増幅されるのだ。"
        en:
          x: "They use psychic power to control their arms,\nwhich are made of a special liquid. They can crush\nboulders psychically."
          y: "When Reuniclus shake hands, a network forms\nbetween their brains, increasing their\npsychic power."
        fr:
          x: "Ses bras, faits d’une matière conduisant ses pouvoirs\npsychiques, sont assez puissants pour broyer des\nrochers."
          y: "Quand ils se tiennent par la main, leurs cerveaux\nforment un réseau qui démultiplie leurs pouvoirs\npsychiques."
        it:
          x: "Le sue braccia, piene di un liquido che convoglia\ni suoi poteri psichici, sono anche in grado di\nfrantumare le rocce."
          y: "Quando i Reuniclus si tengono per mano, i loro cervelli\nsi interconnettono e i poteri psichici si amplificano."
        de:
          x: "Seine Arme bestehen aus einer speziellen Flüssigkeit.\nDank seiner Psycho-Kräfte kann es mit ihnen\nFelsen zerschmettern."
          y: "Schütteln sich zwei von ihnen die Hände, bilden ihre\nDenkapparate ein Netzwerk und ihre Psycho-Kräfte\nwerden stärker."
        es:
          x: "Hacen gala de su poder psíquico y mueven sus brazos\ncompuestos de líquido para controlar rocas y hacerlas\nañicos."
          y: "Cuando los Reuniclus se dan la mano, sus cerebros se\nconectan y multiplican sus poderes psíquicos."
        ko:
          x: "발휘한 사이코 파워를 사용해\n특수한 액체로 만들어진\n팔을 조종해서 바위를 부순다."
          y: "란쿨루스끼리 악수를 하면\n뇌가 네트워크처럼 연결되어\n사이코 파워가 증폭된다."
ducklett:
