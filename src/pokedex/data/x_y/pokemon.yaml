      descriptions:
        jp_kana:
          x: "すぐれた　トレーナーの　めいれいには\nぜったい　ふくじゅう。おおむかしに\nむれで　こうどうしていた　なごり。"
          y: "１０ひき　ていどの　むれを　つくって\nいっしみだれぬ　チームワークで\nえものを　おいつめて　しとめるのだ。"
        jp_kanji:
          x: "優れた　トレーナーの　命令には\n絶対に　服従。大昔に\n群れで　行動していた　名残り。"
          y: "１０匹　程度の　群れを　作って\n一糸乱れぬ　チームワークで\n獲物を　追いつめて　しとめるのだ。"
        en:
          x: "It will always obey the commands of a skilled\nTrainer. Its behavior arises from its living in packs\nin ancient times."
          y: "It chases down prey in a pack of around ten.\nThey defeat foes with perfectly\ncoordinated teamwork."
        fr:
          x: "Il obéit toujours aux ordres de son Dresseur si celui-ci\nest très doué. Son comportement vient de l’époque\nreculée où il vivait en meute."
          y: "Les Grahyèna forment des meutes de dix qui\nexcellent au travail de groupe pour capturer leurs\nproies."
        it:
          x: "La sua eccezionale obbedienza verso gli Allenatori\nesperti deriva dall’antica abitudine di vivere in branchi."
          y: "Una decina di Mightyena per branco cacciano e\nsconfiggono il nemico con un perfetto lavoro di\ngruppo."
        de:
          x: "Es wird stets die Befehle eines begabten Trainers\nbefolgen. Dieses Verhalten geht darauf zurück,\ndass es früher im Rudel lebte."
          y: "Es jagt in Rudeln von ungefähr zehn Magnayen. Beim\nEinkreisen der Beute arbeiten sie perfekt zusammen."
        es:
          x: "Siempre obedece a los buenos Entrenadores. Está\nacostumbrado a vivir en jaurías en estado salvaje."
          y: "Forman manadas de diez individuos y cercan a sus\npresas valiéndose de un trabajo en equipo impecable."
        ko:
          x: "우수한 트레이너의 명령에는\n절대복종한다. 먼 옛날\n무리를 지어 행동했던 영향이다."
          y: "10마리 정도의 무리를 이루어\n한 치의 흐트러짐 없는 팀워크로\n먹이를 쫓아 꼼짝 못하게 한다."
zigzagoon:
