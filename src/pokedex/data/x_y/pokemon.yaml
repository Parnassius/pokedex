          y: "ユキワラシの　すみついた　いえは\nおかねもちになるという　いいつたえが\nゆきぐにには　のこっている。"
        jp_kanji:
          x: "大きな　葉っぱの　下に\n数匹の　ユキワラシが　集まり\n仲良く　暮らしているという。"
          y: "ユキワラシの　住み着いた　家は\nお金持ちになるという　言い伝えが\n雪国には　残っている。"
        en:
          x: "It is said that several Snorunt gather under giant\nleaves and live together in harmony."
          y: "In the snow country, certain folklore says a house\nwill prosper if a Snorunt lives there."
        fr:
          x: "On dit que des groupes entiers de Stalgamin vivent\nen harmonie sous des feuilles gigantesques."
          y: "Selon un vieux dicton des régions enneigées :\n« Stalgamin dans la maison, richesse à l’horizon »."
        it:
          x: "Si dice che gli Snorunt vivano in armonia riuniti\nsotto gigantesche foglie."
          y: "Secondo alcune leggende delle regioni fredde, uno\nSnorunt porta prosperità alla casa in cui vive."
        de:
          x: "Gerüchten zufolge sammeln sich Schneppke unter\nriesigen Blättern und leben dort friedlich zusammen."
          y: "Im Land des Schnees sagt eine Legende, dass in\nein Haus Wohlstand einzieht, wenn es darin lebt."
        es:
          x: "Se dice que se reúnen en grupos bajo hojas\ngigantescas y viven allí en total armonía."
          y: "En las zonas nevadas, las leyendas dicen que si un\nSnorunt vive en una casa, trae prosperidad."
        ko:
          x: "커다란 잎사귀 아래서\n여러 마리의 눈꼬마가 모여\n사이좋게 살고 있다고 한다."
          y: "눈꼬마가 자리 잡은 집은\n부자가 된다고 하는 전설이\n설국에는 남아 있다."
glalie:
