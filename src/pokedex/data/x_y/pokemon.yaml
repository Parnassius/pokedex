      descriptions:
        jp_kana:
          x: "たいようエネルギーが　パワーの\nみなもと　なので　ひるまは　つよい。\nかいてんすると　からだが　ひかる。"
          y: "ひるまに　たいよう　エネルギーを\nたくわえる。いつも　むひょうじょう。\nあいての　かんがえを　よみとる。"
        jp_kanji:
          x: "太陽エネルギーが　パワーの\n源　なので　昼間は　強い。\n回転すると　体が　光る。"
          y: "昼間に　太陽エネルギーを\nたくわえる。いつも　無表情。\n相手の　考えを　読み取る。"
        en:
          x: "Solar energy is the source of its power,\nso it is strong during the daytime.\nWhen it spins, its body shines."
          y: "It absorbs solar energy during the day. Always\nexpressionless, it can sense what its foe is thinking."
        fr:
          x: "Il tire sa force de l’énergie solaire.\nIl est donc particulièrement à l’aise en journée.\nIl s’illumine quand il tourne."
          y: "Solaroc absorbe l’énergie du soleil pendant la\njournée. Toujours impassible, il parvient à lire\nles pensées de ses ennemis."
        it:
          x: "L’energia solare è la fonte della sua potenza, per cui\nè più forte di giorno. Emana luce quando ruota su\nse stesso."
          y: "Durante il giorno assorbe la luce solare. Sempre\nperfettamente inespressivo, può leggere nel pensiero\ndel nemico."
        de:
          x: "Da es seine Energie aus Sonnenlicht gewinnt,\nist es tagsüber am stärksten. Wenn es sich dreht,\nleuchtet es."
          y: "Tagsüber absorbiert es Sonnenlicht. Ohne je seinen\nAusdruck zu verändern, kann es die Gedanken des\nGegners lesen."
        es:
          x: "Usa el sol como fuente de energía, por lo que es más\npoderoso de día. Brilla al rotar."
          y: "De día, absorbe energía solar. No es nada expresivo,\npero capta perfectamente lo que piensa su rival."
        ko:
          x: "태양 에너지가 파워의\n근원이라서 낮에는 강하다.\n회전하면 몸이 빛난다."
          y: "낮 동안 태양 에너지를\n비축한다. 항상 무표정으로\n상대의 생각을 읽어낸다."
barboach:
