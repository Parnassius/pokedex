          x: "きょうじんな　きんにくを　もつ。\nたいへいようを　やすむことなく\nおよぎつづけることが　できるのだ。"
          y: "クロールや　バタフライが　とくいで\nオリンピックの　せんしゅでも\nぐんぐんと　おいぬいていく。"
        jp_kanji:
          x: "強靭な　筋肉を　持つ。\n太平洋を　休むことなく\n泳ぎ続けることが　できるのだ。"
          y: "クロールや　バタフライが　得意で\nオリンピックの　選手でも\nぐんぐんと　追い抜いていく。"
        en:
          x: "With its extremely tough muscles, it can keep\nswimming in the Pacific Ocean without resting."
          y: "A swimmer adept at both the front crawl and\nbreaststroke. Easily overtakes the best\nhuman swimmers."
        fr:
          x: "Il possède de sacrés biscoteaux. Il peut parcourir\nsans relâche l’océan Pacifique."
          y: "Excellent nageur, il pratique le crawl ou la nage\npapillon mieux qu’un champion olympique."
        it:
          x: "Ha dei muscoli tanto sviluppati da riuscire ad\nattraversare a nuoto interi oceani senza fermarsi."
          y: "Esperto nuotatore di rana, crawl e altri stili, supera\nfacilmente i migliori nuotatori umani."
        de:
          x: "Es hat extrem starke Muskeln und kann durch den\nOzean schwimmen, ohne sich ausruhen zu müssen."
          y: "Dieses Pokémon ist ein meisterhafter Schwimmer.\nSeine Techniken schlagen selbst Olympiasieger."
        es:
          x: "Tiene músculos muy desarrollados. Es capaz de nadar\nen el océano sin descanso."
          y: "Experto nadador tanto a braza como a crol. Gana\nfácilmente a los nadadores profesionales."
        ko:
          x: "강인한 근육을 가지고 있다.\n태평양을 쉬지 않고\n계속 헤엄칠 수 있다."
          y: "자유형이나 접영을 잘하여\n올림픽 선수도 제치고\n쑥쑥 앞질러 나아간다."
