      descriptions:
        jp_kana:
          x: "ランドロスの　おとずれる　とちは\nさくもつが　たくさん　みのるため\nはたけのかみさま　と　いわれている。"
          y: "かぜや　かみなりを　とりこみ　かえた\nエネルギーが　つちに　えいようを\nあたえて　だいちを　ゆたかに　する。"
        jp_kanji:
          x: "ランドロスが　訪れる　土地は\n作物が　たくさん　実るため\n畑の神様　と　言われている。"
          y: "風や　雷を　取りこみ　変えた\nエネルギーが　土に　栄養を\n与えて　大地を　豊かに　する。"
        en:
          x: "Lands visited by Landorus grant such bountiful\ncrops that it has been hailed as “The Guardian of\nthe Fields.”"
          y: "From the forces of lightning and wind, it creates\nenergy to give nutrients to the soil and make the\nland abundant."
        fr:
          x: "Il fait fructifier les cultures partout où il passe, c’est\npourquoi on l’appelle « le dieu des moissons »."
          y: "Il utilise l’énergie qu’il tire du vent et de la foudre\npour enrichir les sols en nutriments pour les cultures."
        it:
          x: "Poiché le terre che visita producono abbondanti\nraccolti, è considerato una benedizione per i campi."
          y: "Rende fertile la terra trasformando l’energia del vento\ne dei fulmini in nutrimento per il suolo."
        de:
          x: "Da an Orten, wo es sich blicken lässt, mit reicher\nErnte zu rechnen ist, nennt man es auch den\n„Herrn des Ackerbaus“."
          y: "Seine aus Wind und Donner gewonnene Energie\nsorgt für reiche Ernten, da sie den Boden mit\nNährstoffen anreichert."
        es:
          x: "Lo consideran una deidad de las cosechas porque los\ncultivos crecen en abundancia en las tierras por las\nque pasa."
          y: "Utiliza energía que obtiene del viento y del relámpago\npara nutrir el suelo y generar abundantes cosechas."
        ko:
          x: "랜드로스가 찾아온 땅에는\n작물에 열매가 많이 열리기 때문에\n농지의 신이라고 전해진다."
          y: "바람이나 번개를 거둬들여 바꾼\n에너지가 흙에 영양을\n주어 대지를 풍족하게 한다."
