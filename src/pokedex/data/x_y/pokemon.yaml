      descriptions:
        jp_kana:
          x: "てきの　こうげきを　みがるに　よけて\nはなから　ひのたまを　うちだす。\nほのおで　きのみを　やいて　たべる。"
          y: "やいた　きのみを　たべるのが\nだいすきだが　こうふんしすぎて\nときどき　まっくろこげに　しちゃう。"
        jp_kanji:
          x: "敵の　攻撃を　身軽に　避けて\n鼻から　火の玉を　撃ち出す。\n炎で　木の実を　焼いて　食べる。"
          y: "焼いた　木の実を　食べるのが\n大好きだが　興奮しすぎて\nときどき　真っ黒焦げに　しちゃう。"
        en:
          x: "It can deftly dodge its foe’s attacks while shooting\nfireballs from its nose. It roasts berries before it\neats them."
          y: "It loves to eat roasted berries, but sometimes it\ngets too excited and burns them to a crisp."
        fr:
          x: "Il évite agilement les attaques ennemies et crache\ndes boules de feu par le groin. Il aime griller des\nBaies pour les manger."
          y: "Il adore se goinfrer de Baies grillées, mais il lui arrive\nde les réduire en cendres dans son excitation."
        it:
          x: "Lancia palle di fuoco dal naso mentre evita abilmente\ngli attacchi del nemico. Mangia bacche che arrostisce\nlui stesso."
          y: "Adora mangiare le bacche arrostite, ma a volte si fa\nprendere la mano per l’eccitazione e le riduce in\ncenere."
        de:
          x: "Weicht flink gegnerischen Angriffen aus und schießt\nFlammen aus dem Rüssel, mit denen es gern auch\nmal Nüsse röstet."
          y: "Floink liebt es, selbst geröstete Nüsse zu verspeisen.\nAb und zu verkohlt es sie jedoch ungewollt vor lauter\nVorfreude."
        es:
          x: "Evita con agilidad los ataques enemigos. Lanza bolas\nde fuego por su hocico y tuesta bayas del bosque para\ncomer."
          y: "Le encanta comer bayas tostadas, pero a veces se\nemociona demasiado y termina churruscándolas."
        ko:
          x: "적의 공격을 가볍게 피하고\n코로 불구슬을 쏘아댄다.\n불꽃으로 나무열매를 구워 먹는다."
          y: "구운 나무열매를 먹는 것을\n매우 좋아하지만 너무 흥분해서\n가끔 새까맣게 태워버린다."
pignite:
