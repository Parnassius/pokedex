        - ghost
      egg_groups:
        - amorphous
      abilities:
        - insomnia
        - frisk
      hidden_ability: cursed_body
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          x: "あたまの　ツノで　うらみや　ねたみの\nかんじょうを　たべると　いわれる。\nまよなか　かっぱつに　かつどうする。"
          y: "うらみの　かんじょうが　だいすき。\nうらみを　もつ　ひとが　すむ　いえの\nのきしたに　ずらりと　ぶらさがる。"
        jp_kanji:
          x: "頭の　ツノで　恨みや　ねたみの\n感情を　食べると　言われる。\n真夜中　活発に　活動する。"
          y: "恨みの　感情が　大好き。\n恨みを　持つ　人が　住む　家の\n軒下に　ずらりと　ぶらさがる。"
        en:
          x: "It uses its horn to feed on envy and malice--\nor so it’s said. It’s very active at night."
          y: "It loves vengeful emotions and hangs in rows under\nthe eaves of houses where vengeful people live."
        fr:
          x: "Ce Pokémon, très actif la nuit, utilise sa corne pour\nse repaître de rancune ou de jalousie."
          y: "Il aime le goût de la vengeance. Les Pokémon de\ncette espèce vivent en rangs sous les gouttières\ndes gens vindicatifs."
        it:
          x: "Si dice che si nutra di rancore e invidia con il corno\nche ha sulla testa. A mezzanotte si scatena."
          y: "Si annida sotto le grondaie di case dove vive gente\nche cova sentimenti di vendetta, che lui adora."
        de:
          x: "Man sagt, durch sein Horn ernähre es sich von\nRachsucht und Neid. Erst nachts wird es richtig aktiv."
          y: "Es liebt Rachegefühle. Diese Pokémon hängen sich\nan Dachrinnen von Häusern, in denen Rachsüchtige\nleben."
        es:
          x: "Dicen que con su cuerno se alimenta de sentimientos\nde celos y envidia. Es muy activo a medianoche."
          y: "Les atraen los sentimientos de rencor y celos.\nSuelen vivir cerca de las casas de gente vengativa."
        ko:
          x: "머리의 뿔로 원한과 질투의\n감정을 먹는다고 전해진다.\n한밤중에 활발하게 활동한다."
          y: "원망하는 감정을 매우 좋아한다.\n원한을 가지고 있는 사람이 사는 집\n처마 밑에 죽 매달려 있다."
