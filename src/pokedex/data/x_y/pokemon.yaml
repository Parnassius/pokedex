          y: "くうちゅうに　ういたまま　いどうして\nさゆうの　ユニットから\nでんじはなどを　ほうしゃする。"
        jp_kanji:
          x: "左右の　ユニットから\n重力を　さえぎる　力を\n出すので　空中に　浮かべる。"
          y: "空中に　浮いたまま　移動して\n左右の　ユニットから\n電磁波などを　放射する。"
        en:
          x: "The units at the sides of its body generate\nantigravity energy to keep it aloft in the air."
          y: "It moves while constantly hovering. It discharges\nThunder Wave and so on from the units at its sides."
        fr:
          x: "Les parties sur les côtés de son corps génèrent\nune énergie lui permettant de léviter."
          y: "Il reste constamment en sustentation pour se\ndéplacer. Ce Pokémon peut envoyer de l’électricité\npar les aimants situés sur ses côtés."
        it:
          x: "Le unità alle due estremità del corpo producono\nenergia antigravitazionale con cui si mantiene\na mezz’aria."
          y: "Si sposta restando sempre sollevato da terra. Si serve\ndei due elementi laterali per lanciare Tuononda\ne attacchi simili."
        de:
          x: "Die Magneten an seinem Körper erzeugen\nein Antigravitationsfeld, um es ständig\nin der Schwebe zu halten."
          y: "Es bewegt sich schwebend. Seine Magnete an den\nSeiten entladen eine Donnerwelle nach der nächsten."
        es:
          x: "Las unidades a los lados de su cuerpo generan\nenergía antigravitatoria para mantenerlo en el aire."
          y: "Está suspendido en el aire y no para de moverse. A\ntravés de las extremidades laterales dispara Onda\nTrueno."
        ko:
          x: "좌우의 유닛에서\n중력을 차단하는 힘을\n발휘하기에 공중에 뜰 수 있다."
          y: "공중에 뜬 채로 이동하여\n좌우의 유닛에서\n전기자석파를 방사한다."
