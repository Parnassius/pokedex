      descriptions:
        jp_kana:
          x: "うしなった　からだを　しんじつと\nりそうで　うめてくれる　えいゆうを\nまつ　こおりの　でんせつポケモン。"
          y: "きょうりょくな　れいとうエネルギーを\nたいないで　つくりだすが　もれだした\nれいきで　からだが　こおっている。"
        jp_kanji:
          x: "失った　体を　真実と\n理想で　埋めてくれる　英雄を\n待つ　氷の　伝説ポケモン。"
          y: "強力な　冷凍エネルギーを\n体内で　作り出すが　漏れ出した\n冷気で　体が　凍っている。"
        en:
          x: "This legendary ice Pokémon waits for a hero to fill\nin the missing parts of its body with truth or ideals."
          y: "It generates a powerful, freezing energy inside\nitself, but its body became frozen when the energy\nleaked out."
        fr:
          x: "Il attend le héros qui saura réanimer son corps de\nglace incomplet en partageant avec lui son Idéal et\nsa Réalité."
          y: "Son corps produit une énergie à très basse\ntempérature, mais le souffle glacé qu’il exhale l’a gelé\nlui-même."
        it:
          x: "Questo leggendario Pokémon dei ghiacci attende\nl’eroe che gli restituirà le sue vere sembianze con\ngli ideali o la verità."
          y: "Produce all’interno del suo corpo una potente e gelida\nenergia. Ma l’aria fredda che esala lo ha congelato."
        de:
          x: "Ein Legendäres Eis-Pokémon, das auf den Helden\nwartet, der seinen verstümmelten Körper mit\nWunsch und Wirklichkeit heilt."
          y: "Sein Körper erzeugt in seinem Inneren gewaltige\nMengen an Kälteenergie. Tritt diese jedoch aus,\ngefriert sein Körper."
        es:
          x: "Pokémon legendario que aguarda al héroe que\ncompense el vacío de su cuerpo de hielo con verdad\ne ideales."
          y: "Produce en su interior una intensa energía gélida, y\ncualquier fuga hace que su cuerpo se congele."
        ko:
          x: "잃어버린 몸을 진실과\n이상으로 채워줄 영웅을\n기다리는 얼음의 전설 포켓몬."
          y: "강력한 냉동 에너지를\n체내에서 만들어 내지만 새어 나온\n냉기에 몸이 얼어 있다."
