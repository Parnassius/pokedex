          x: "It raises its tail to check its surroundings.\nThe tail is sometimes struck by lightning\nin this pose."
          y: "It has small electric sacs on both its cheeks.\nIf threatened, it looses electric charges from\nthe sacs."
        fr:
          x: "Il élève sa queue pour surveiller les environs.\nElle attire souvent la foudre dans cette position."
          y: "Pikachu a de petites poches pleines d’électricité sur\nses joues. S’il se sent menacé, il laisse s’échapper\ndes décharges électriques."
        it:
          x: "Solleva la coda per esaminare l’ambiente circostante.\nA volte la coda è colpita da un fulmine quando è in\nquesta posizione."
          y: "Se spaventato, perde scariche elettriche dalle due\nsacche che ha sulle guance."
        de:
          x: "Es streckt seinen Schweif nach oben, um seine\nUmgebung zu prüfen. Häufig fährt ein Blitz hinein."
          y: "Es hat kleine Backentaschen, die mit Elektrizität\ngefüllt sind. Bei Gefahr entlädt es sie."
        es:
          x: "Levanta su cola para vigilar los alrededores. A veces,\npuede ser alcanzado por un rayo en esa pose."
          y: "Las bolsas de las mejillas están llenas de electricidad,\nque libera cuando se siente amenazado."
        ko:
          x: "꼬리를 세우고 주변의\n상황을 살피다 보면 가끔\n꼬리에 번개가 친다."
          y: "뺨의 양쪽에\n작은 전기 주머니가 있다.\n위기 상황일 때 방전한다."
