          y: "ひろい　なわばりを　もっており\nしんにゅうする　じゃまものは\nてっていてきに　つつかれてしまう。"
        jp_kanji:
          x: "足の　ツメが　発達している。\nエサの　タマタマを　つかんで\n１００キロ先の　巣まで　運ぶ。"
          y: "広い　縄張りを　持っており\n侵入する　邪魔者は\n徹底的に　つつかれてしまう。"
        en:
          x: "The claws on its feet are well developed.\nIt can carry prey such as an Exeggcute\nto its nest over 60 miles away."
          y: "Very protective of its sprawling territorial area,\nthis Pokémon will fiercely peck at any intruder."
        fr:
          x: "Grâce à ses griffes très puissantes, il est capable\nde transporter des Noeunoeuf vers un nid éloigné\nde plus de 100 km."
          y: "Il protège son territoire avec ardeur et repousse à\ncoups de bec tout intrus."
        it:
          x: "Grazie ai potenti artigli può trasportare una preda\ndelle dimensioni di un Exeggcute per oltre 100 km."
          y: "Strenuo difensore del suo ampio territorio, becca\nferocemente ogni intruso."
        de:
          x: "Die Krallen an seinen Füßen sind sehr ausgeprägt.\nEs kann sogar ein Owei zu seinem Nest\nin 100 km Entfernung tragen."
          y: "Dieses Pokémon verteidigt sein abgegrenztes Areal\nsorgsam gegen alle Eindringlinge."
        es:
          x: "Tiene unas garras desarrolladas. Puede atrapar un\nExeggcute y transportarlo desde una distancia de\ncasi 100 km."
          y: "Muy protector de su amplio territorio, este Pokémon\npicoteará ferozmente a los intrusos."
        ko:
          x: "발톱이 발달해 있다.\n먹이인 아라리를 잡아\n100km 떨어져 있는 둥지까지 나른다."
          y: "넓은 영역을 가지고 있어\n침입한 방해자는\n철저하게 쪼아버린다."
