          x: "あたまの　はなかざりの　かおりには\nリラックスさせる　こうかが　ある。\nていれを　なまけると　かれてしまう。"
          y: "うつくしい　はなを　さかせるのは\nベテラントレーナーでも　むずかしい。\nセレブに　にんきの　ポケモン。"
        jp_kanji:
          x: "頭の　花飾りの　香りには\nリラックスさせる　効果が　ある。\n手入れを　怠けると　枯れてしまう。"
          y: "美しい　花を　咲かせるのは\nベテラントレーナーでも　難しい。\nセレブに　人気の　ポケモン。"
        en:
          x: "The fragrance of the garland on its head has a\nrelaxing effect. It withers if a Trainer does not take\ngood care of it."
          y: "Even veteran Trainers face a challenge in getting its\nbeautiful flower to bloom. This Pokémon is popular\nwith celebrities."
        fr:
          x: "La fleur sur sa tête a des propriétés relaxantes.\nElle se fane si on ne s’en occupe pas avec attention."
          y: "Même les Dresseurs confirmés ont du mal à faire\néclore sa belle fleur. Un Pokémon apprécié des\ncélébrités."
        it:
          x: "I fiori che ha sulla testa spandono un profumo\nrilassante, ma necessitano di continue attenzioni\nper non appassire."
          y: "Neanche gli Allenatori più navigati riescono sempre a\nfare schiudere il suo fiore. Va di moda fra le celebrità."
        de:
          x: "Der Duft des Blumenschmucks auf seinem Kopf\nwirkt beruhigend. Damit der Schmuck nicht\nverwelkt, muss man es gut pflegen."
          y: "Bei Promis ist es sehr beliebt. Auch gestandene\nTrainer tun sich schwer damit, seine Blüte schön\naufblühen zu lassen."
        es:
          x: "El aroma de la flor de su tocado relaja a cualquiera a\nsu alrededor. Hay que cuidarle mucho para que no se\nmarchite."
          y: "Todos los famosos quieren uno de estos Pokémon.\nIncluso a los Entrenadores más curtidos les cuesta\nque florezca."
        ko:
          x: "머리에 있는 꽃 장식의 향기에는\n긴장을 풀어 주는 효과가 있다.\n자주 손질하지 않으면 시들어 버린다."
          y: "베테랑 트레이너일지라도\n아름다운 꽃을 피우기는 쉽지 않다.\n유명 인사에게 인기가 많은 포켓몬이다."
