      descriptions:
        jp_kana:
          x: "けいかいしんが　とても　つよい。\nきけんを　かんじると　かろやかに\nとびはねて　はしりさってしまう。"
          y: "みみは　とても　デリケートらしく\nやさしく　ていねいに　さわらないと\nしなやかな　あしで　けられてしまう。"
        jp_kanji:
          x: "警戒心が　とても　強い。\n危険を　感じると　軽やかに\n飛び跳ねて　走り去ってしまう。"
          y: "耳は　とても　デリケートらしく\n優しく　丁寧に　触らないと\nしなやかな　脚で　けられてしまう。"
        en:
          x: "Extremely cautious, it quickly bounds off\nwhen it senses danger."
          y: "The ears appear to be delicate. If they are touched\nroughly, it kicks with its graceful legs."
        fr:
          x: "Il détecte le moindre danger. Il file discrètement\npar petits bonds rapides quand il se sent menacé."
          y: "Il est capable de décocher de puissants coups de\npied si on touche à ses délicates oreilles."
        it:
          x: "È un Pokémon estremamente cauto. Se avverte\nun pericolo, si dà subito alla fuga saltellando."
          y: "Ha delle orecchie molto delicate. Se le si tocca con\nforza, scalcia con le sue graziose gambe."
        de:
          x: "Es ist extrem vorsichtig. Wenn es Gefahr wittert,\nmacht es sich mit flinken Sprüngen aus dem Staub."
          y: "Es hat sehr empfindliche Ohren. Fasst man sie zu\nrau an, wird es mit seinen grazilen Beinen zutreten."
        es:
          x: "Este Pokémon resulta muy precavido. Si siente peligro,\nescapa corriendo a grandes saltos."
          y: "Sus orejas son muy delicadas. Si alguien las toca con\nbrusquedad, recibirá una espléndida patada."
        ko:
          x: "경계심이 아주 강하다.\n위험을 감지하면 가뿐하게\n뛰어올라 달아난다."
          y: "귀가 아주 민감한 부위이므로\n상냥하고 정중하게 만지지 않으면\n그 매끈한 다리에 차이게 된다."
mismagius:
