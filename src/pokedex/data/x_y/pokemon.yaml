      descriptions:
        jp_kana:
          x: "あわで　つつんだ　こいしを　なげる\nわざを　つかう。３０メートル　さきの\nあきかんに　あてる　コントロール。"
          y: "みがるさは　だれにも　まけない。\n６００メートルを　こえる　タワーの\nてっぺんまで　１ぷんで　のぼりきる。"
        jp_kanji:
          x: "泡で　包んだ　小石を　投げる\n技を　使う。３０メートル　先の\n空き缶に　当てる　コントロール。"
          y: "身軽さは　だれにも　負けない。\n６００メートルを　超える　タワーの\n天辺まで　１分で　登りきる。"
        en:
          x: "It can throw bubble-covered pebbles with precise\ncontrol, hitting empty cans up to a hundred feet away."
          y: "Its swiftness is unparalleled.\nIt can scale a tower of more\nthan 2,000 feet in a minute’s time."
        fr:
          x: "Il est capable de lancer des pierres recouvertes\nde mousse avec une précision suffisante pour toucher\nune canette vide à 30 m."
          y: "Son agilité est incomparable.\nIl peut gravir une tour de 600 m de haut en moins\nd’une minute."
        it:
          x: "Lancia dei sassi racchiusi in bolle di schiuma.\nÈ talmente preciso da riuscire a colpire una lattina\nvuota a 30 m di distanza."
          y: "Grazie alla sua straordinaria agilità, è in grado di\nscalare una torre alta più di 600 m in meno\ndi un minuto."
        de:
          x: "Es kann kleine in Blasen gehüllte Steine mit solcher\nPräzision werfen, dass es selbst 30 m entfernte Dosen\nproblemlos trifft."
          y: "Seine Flinkheit sucht ihresgleichen. Es kann einen\n600 m hohen Turm in weniger als einer Minute\nerklimmen."
        es:
          x: "Puede lanzar piedras envueltas en burbujas con tal\npuntería, que acierta latas vacías a 30 metros de\ndistancia."
          y: "Su agilidad no tiene parangón. De hecho, es capaz\nde escalar una torre de más de 600 metros en tan\nsolo un minuto."
        ko:
          x: "거품으로 싸인 돌멩이를 던지는\n기술을 쓴다. 30m 앞에 있는\n빈 캔을 맞출 정도로 컨트롤이 좋다."
          y: "누구보다도 가벼운 몸을 갖고 있다.\n600m를 넘는 타워의\n꼭대기까지 1분이면 올라간다."
greninja:
  species_id: 658
  names:
    jp_kana: ゲッコウガ
    jp_kanji: ゲッコウガ
    en: Greninja
    fr: Amphinobi
    it: Greninja
    de: Quajutsu
    es: Greninja
    ko: 개굴닌자
  forms:
    greninja:
      form_id: 0
      base_stats:
        hp: 72
        attack: 95
        defense: 67
        special_attack: 103
        special_defense: 71
        speed: 122
      evs_yield:
        hp: 0
