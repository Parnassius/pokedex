          y: "えいようが　つまった　おおきな\nしっぽを　ふりまわして　じぶんより\nてごわい　あいてにも　たちむかう。"
        jp_kanji:
          x: "大きな　尻尾に　乗って　弾むと\n地上では　速く　移動できる。\n水辺で　暮らす　ポケモン。"
          y: "栄養が　つまった　大きな\n尻尾を　振り回して　自分より\n手強い　相手にも　たちむかう。"
        en:
          x: "A Pokémon that lives by water. It moves quickly on\nland by bouncing on its big tail."
          y: "It swings its large, nutrient-filled tail around to fight\nopponents bigger than itself."
        fr:
          x: "Un Pokémon qui vit près de l’eau. Au sol, il se\ndéplace rapidement en rebondissant sur sa grosse\nqueue."
          y: "Il fait tournoyer sa queue, connue pour ses qualités\nnutritives, pour l’abattre comme une puissante massue\nsur l’ennemi."
        it:
          x: "Pokémon che vive nell’acqua. Si muove rapidamente\nsulla terraferma saltellando sulla grossa coda."
          y: "Si scaglia contro avversari più forti di lui agitando la\ngrande coda in cui conserva le sostanze di cui si nutre."
        de:
          x: "Dieses Pokémon lebt am Wasser. An Land bewegt\nes sich schnell, indem es auf seinem großen\nSchweif hüpft."
          y: "Es legt sich mit starken Gegnern an, indem es seinen\ngroßen, mit Nährstoffen gefüllten Schweif\numherschwingt."
        es:
          x: "Vive cerca del agua. En la tierra se mueve muy rápido\nbotando sobre su gran cola."
          y: "Para hacer frente a oponentes más grandes que él,\nagita su gran cola, llena de nutrientes, de un lado a\notro."
        ko:
          x: "큰 꼬리에 타고 튀면\n지상에서 빨리 이동할 수 있다.\n물가에서 사는 포켓몬이다."
          y: "영양이 채워진 큰\n꼬리를 휘두르며 자신보다\n벅찬 상대에게도 맞선다."
nosepass:
