      held_items:
        common: lum_berry
        rare: lum_berry
      descriptions:
        jp_kana:
          x: "たいきの　どくそを　ぶんかいして\nあれた　だいちを　いっしゅんのうちに\nはなばたけにする　ちからを　もつ。"
          y: "グラシデアのはなが　さく　きせつ\nかんしゃの　こころを　とどけるために\nとびたつと　いわれている。"
        jp_kanji:
          x: "大気の　毒素を　分解して\n荒れた　大地を　一瞬のうちに\n花畑にする　力を　持つ。"
          y: "グラシデアの花が　咲く　季節\n感謝の　心を　届けるために\n飛び立つと　言われている。"
        en:
          x: "It can dissolve toxins in the air to instantly\ntransform ruined land into a lush field of flowers."
          y: "The blooming of Gracidea flowers confers the\npower of flight upon it. Feelings of gratitude are\nthe message it delivers."
        fr:
          x: "Il peut dissoudre les toxines dans l’air pour\ntransformer un désert en un champ de fleurs\nluxuriantes."
          y: "Il prend son essor pour répandre la gratitude lorsque\nles Gracidées fleurissent."
        it:
          x: "Può dissolvere le tossine nell’aria per mutare\nall’istante una terra arida in un rigoglioso campo\nfiorito."
          y: "Si narra che Shaymin si alzi in volo per esprimere\ncommossa gratitudine per la fioritura delle gracidee."
        de:
          x: "Es kann die Luft von Giften reinigen und Ödland\nin ein üppig blühendes Blumenfeld verwandeln."
          y: "Es heißt, wenn die Gracidea blühen, drückt es seine\nDankbarkeit aus, indem es hoch in die Lüfte fliegt."
        es:
          x: "Puede disolver las toxinas del aire para transformar\ntierra yerma en campos de flores."
          y: "Se dice que, cuando florecen las Gracídeas, Shaymin\nalza el vuelo para mostrar su gratitud."
        ko:
          x: "대기의 독소를 분해해서\n거칠어진 대지를 일순간에\n꽃밭으로 만드는 힘을 가지고 있다."
          y: "그라시데아꽃이 피는 계절에\n감사의 마음을 전하기 위해\n날아오른다고 전해진다."
