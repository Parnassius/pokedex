        it:
          x: "Detto “Pokémon miraggio” perché è stato avvistato\nda pochi. È facile trovare la sua pelle della muta."
          y: "Un Pokémon pieno di energia vitale. Cambia la pelle\nper diventare sempre più grande."
        de:
          x: "Man nennt es „Illusion-Pokémon“, denn nur wenige\nhaben es gesehen. Nur seine Haut wurde oft\ngefunden."
          y: "Dieses Pokémon strotzt vor Lebensenergie.\nEs häutet sich ständig und wird dadurch größer."
        es:
          x: "Se le llama el Pokémon Espejismo porque son muy\npocos los que lo han visto. Se encontró su muda."
          y: "Este Pokémon está lleno de vida. Muda su piel\ncontinuamente y crece cada vez más."
