          y: "てつのような　かたい　よろいに\nおおわれている。じそく３００キロの\nスピードで　おおぞらを　とびまわる。"
        jp_kanji:
          x: "いばらの　中に　巣を作る。\nトゲで　傷つきながら　育てられた\nヒナの　羽は　硬くなる。"
          y: "鉄のような　硬い　よろいに\n覆われている。時速３００キロの\nスピードで　大空を　飛び回る。"
        en:
          x: "After nesting in bramble bushes, the wings of its\nchicks grow hard from scratches by thorns."
          y: "Despite being clad entirely in iron-hard armor,\nit flies at speeds over 180 mph."
        fr:
          x: "Comme il fait son nid dans les ronces, ses petits\ns’endurcissent à force d’être sans cesse éraflés."
          y: "Son corps est prisonnier d’une armure dure comme\nl’acier, mais il vole à plus de 300 km/h."
        it:
          x: "Facendo il nido tra i rovi, le ali dei suoi piccoli si\nrinforzano per i graffi causati dalle spine."
          y: "È interamente rivestito da un’armatura dura come\nl’acciaio. Vola alla velocità di 300 km/h."
        de:
          x: "Die dornigen Zweige seines Nests bewirken,\ndass die Flügel seiner Jungen fest und hart werden."
          y: "Es wird komplett von einer eisenharten Rüstung\ngeschützt. Wenn es fliegt, erreicht es bis zu 300 km/h."
        es:
          x: "Después de anidar en zarzas, las alas de sus polluelos\ncrecen fortalecidas por los rasguños."
          y: "Una armadura de hierro cubre por completo su cuerpo.\nVuela a más de 300 km/h."
        ko:
          x: "가시나무 안에 둥지를 만든다.\n가시에 상처를 입어가며 자라난\n새끼들의 날개는 단단해진다."
          y: "철 같은 단단한 갑옷으로\n덮여 있다. 시속 300km의\n스피드로 넓은 하늘을 날아다닌다."
houndour:
