      descriptions:
        jp_kana:
          x: "かたうでを　うごかしただけで\nやまをくずし　じひびきを　おこす\nとてつもない　パワーを　ひめる。"
          y: "バンギラスが　あばれると\nやまが　くずれ　かわが　うまるため\nちずを　かきかえる　ことになる。"
        jp_kanji:
          x: "片腕を　動かしただけで\n山を崩し　地響きを　起こす\nとてつもない　パワーを　秘める。"
          y: "バンギラスが　暴れると\n山が　崩れ　川が　埋まるため\n地図を　書き換える　ことになる。"
        en:
          x: "In just one of its mighty hands, it has the power to\nmake the ground shake and mountains crumble."
          y: "If it rampages, it knocks down mountains and buries\nrivers. Maps must be redrawn afterward."
        fr:
          x: "D’une main seulement il a assez de force pour faire\ntrembler la terre et s’écrouler une montagne."
          y: "Lorsqu’il est en colère, il abat des montagnes et\nenterre des fleuves. On doit alors modifier les cartes."
        it:
          x: "Anche una sola delle sue mani può far tremare\nla terra e sbriciolare le montagne."
          y: "Se s’infuria, abbatte le montagne e seppellisce i\nfiumi. In seguito, le mappe devono essere riscritte."
        de:
          x: "Es besitzt so viel Kraft, dass es mit nur einer Hand\ndie Erde beben lassen und Berge zerbröckeln kann."
          y: "Bei einem Tobsuchtsanfall zerstört es ganze Gebirge\nund legt Flüsse trocken."
        es:
          x: "En una de sus poderosas garras tiene el poder de\nhacer temblar la tierra y las montañas."
          y: "Puede alterar el paisaje derribando montañas y\nenterrando ríos. Da mucho trabajo a los cartógrafos."
        ko:
          x: "한쪽 팔을 움직이는 것만으로도\n산을 무너뜨리고 땅을 울리게 하는\n엄청난 힘을 감추고 있다."
          y: "마기라스가 난동을 부리면\n산이 무너지고 강이 메워지므로\n지도를 다시 그려야 한다."
