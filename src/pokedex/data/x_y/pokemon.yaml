      descriptions:
        jp_kana:
          x: "ちちゅうを　ものすごい　いきおいで\nほりすすみ　エサを　さがす。とおった\nあとは　ディグダの　すみかになる。"
          y: "ふだんは　つちのなかに　すんでいる。\nちちゅうを　じそく　８０キロで\nほりながら　エサを　さがす。"
        jp_kanji:
          x: "地中を　ものすごい　勢いで\n掘りすすみ　エサを　探す。通った\n跡は　ディグダの　住処になる。"
          y: "普段は　土の中に　住んでいる。\n地中を　時速８０キロで\n掘りながら　エサを　探す。"
        en:
          x: "Burrows at high speed in search of food.\nThe tunnels it leaves are used as homes\nby Diglett."
          y: "It usually lives underground. It searches for food\nwhile boring its way through the ground at 50 miles\nper hour."
        fr:
          x: "Il creuse sous terre en quête de nourriture.\nSes tunnels servent de maison aux Taupiqueur."
          y: "Onix vit généralement sous terre. Il cherche de\nla nourriture en creusant à plus de 80 km/h."
        it:
          x: "Scava veloce nel terreno in cerca di cibo lasciando\nlunghi cunicoli usati poi come casa dai Diglett."
          y: "Di solito vive sottoterra. Cerca cibo scavando\ncunicoli nel terreno alla velocità di 80 km/h."
        de:
          x: "Dieses Pokémon gräbt auf seiner Suche nach Futter\nlange Tunnel, in denen sich später Digda einnisten."
          y: "Es lebt gewöhnlich unter der Erde. Während es sich\nmit 80 km/h durchs Erdreich bohrt, sucht es nach\nNahrung."
        es:
          x: "Cava a gran velocidad en busca de comida. Los\ntúneles que deja son usados por los Diglett."
          y: "Suele vivir bajo tierra. Va buscando comida a medida\nque se va abriendo camino a 80 km por hora."
        ko:
          x: "땅속을 엄청난 기세로\n뚫고 나아가며 먹이를 찾는다. 지나간\n곳은 디그다의 보금자리가 된다."
          y: "평상시에는 땅속에 살고 있다.\n땅속을 시속 80km로\n파면서 먹이를 찾는다."
drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
    jp_kanji: スリープ
    en: Drowzee
    fr: Soporifik
    it: Drowzee
    de: Traumato
    es: Drowzee
    ko: 슬리프
  forms:
    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
        defense: 45
        special_attack: 43
        special_defense: 90
        speed: 42
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - insomnia
        - forewarn
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          x: "ねむらせては　ユメを　たべるが\nわるい　ユメばかり　たべてると\nおなかを　こわすことが　あるらしい。"
          y: "たのしいユメを　みていたはずなのに\nどんなユメか　おもいだせないとき。\nきっと　スリープに　たべられたのだ。"
        jp_kanji:
          x: "眠らせては　夢を　食べるが\n悪い　夢ばかり　食べてると\nお腹を　壊すことが　あるらしい。"
          y: "楽しい　夢を　見ていたはずなのに\nどんな夢か　思い出せないとき。\nきっと　スリープに　食べられたのだ。"
        en:
          x: "Puts enemies to sleep, then eats their dreams.\nOccasionally gets sick from eating only bad dreams."
          y: "If you think that you had a good dream but you\ncan’t remember it, a Drowzee has probably eaten it."
        fr:
          x: "Il endort ses ennemis et dévore leurs songes.\nS’il mange trop de cauchemars, il fait une indigestion."
          y: "Si vous pensez avoir rêvé mais que vous ne vous en\nsouvenez pas, c’est que Soporifik a tout mangé."
        it:
          x: "Addormenta i suoi nemici e poi si nutre dei loro\nsogni. A volte fa indigestione di incubi."
          y: "Se si pensa di aver fatto un bel sogno, ma non lo\nsi ricorda, magari l’ha mangiato un Drowzee."
        de:
          x: "Traumato versetzt Gegner in den Schlaf und frisst\nderen Träume. Von Alpträumen wird ihm aber übel."
          y: "Hast du gut geträumt und kannst dich nicht erinnern,\nhat ein Traumato deinen Traum gefressen."
        es:
          x: "Adormece a sus enemigos y se come sus sueños.\nA veces se pone enfermo si come pesadillas."
          y: "Si crees haber tenido un buen sueño y no puedes\nacordarte, seguro que se lo ha comido un Drowzee."
        ko:
          x: "잠들게 한 뒤 꿈을 먹지만\n나쁜 꿈만 먹고 있으면\n배탈이 날 때도 있는 것 같다."
          y: "즐거운 꿈을 꾸고 있었는데\n어떤 꿈인지 생각나지 않을 때는\n분명히 슬리프가 꿈을 먹었을 것이다."
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
    jp_kanji: スリーパー
    en: Hypno
    fr: Hypnomade
    it: Hypno
