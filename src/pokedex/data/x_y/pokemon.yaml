bergmite:
  species_id: 712
  names:
    jp_kana: カチコール
    jp_kanji: カチコール
    en: Bergmite
    fr: Grelaçon
    it: Bergmite
    de: Arktip
    es: Bergmite
    ko: 꽁어름
  forms:
    bergmite:
      form_id: 0
      base_stats:
        hp: 55
        attack: 69
        defense: 85
        special_attack: 32
        special_defense: 35
        speed: 28
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - monster
      abilities:
        - own_tempo
        - ice_body
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          x: "からだを　おおう　こおりが　てきの\nこうげきを　ふせぐ。わられても\nれいきで　すぐに　こおりを　はる。"
          y: "マイナス１００どの　れいきで　てきを\nこおりづけにする。まんねんゆきに\nおおわれた　やまで　むれを　つくる。"
        jp_kanji:
          x: "体を　覆う　氷が\n敵の　攻撃を　防ぐ。割られても\n冷気で　すぐに　氷を　張る。"
          y: "マイナス１００度の　冷気で　敵を\n氷漬けにする。万年雪に　覆われた\n山で　群れを　作る。"
        en:
          x: "It blocks opponents’ attacks with the\nice that shields its body. It uses cold air\nto repair any cracks with new ice."
          y: "Using air of -150 degrees Fahrenheit, they\nfreeze opponents solid. They live in herds\nabove the snow line on mountains."
        fr:
          x: "La glace qui couvre son corps bloque les attaques\nennemies. Si elle se fissure, il la reconstitue\nimmédiatement en soufflant de l’air glacé."
          y: "Il gèle ses ennemis d’une bourrasque à -100 °C.\nIl vit en troupeau avec ses congénères, dans\nles neiges éternelles des hautes montagnes."
        it:
          x: "Si difende dagli attacchi nemici grazie al ghiaccio\nche ricopre il suo corpo. Se viene danneggiato,\nrigenera lo strato protettivo, riparandolo."
          y: "Congela i nemici soffiando aria a -100 °C. Vive in\ngruppo nelle montagne ricoperte da nevi perenni."
        de:
          x: "Es wehrt gegnerische Angriffe mit seinem in Eis\ngehüllten Körper ab. Bruchstellen bessert es mit\naus kalter Luft gewonnenem neuen Eis aus."
          y: "Es friert seine Gegner mittels eines -100 °C kalten\nLuftstromes ein. Mit seinen Artgenossen lebt es\nherdenweise auf Bergen inmitten des ewigen Eises."
        es:
          x: "Envuelve su cuerpo en una capa de hielo que le\npermite evitar los ataques del enemigo. Si se\nresquebraja, la recompone con aire gélido."
          y: "Congela a sus enemigos sometiéndolos a un aire\ngélido de -100 °C. Forman grupos para habitar\nmontañas cubiertas de una nieve sempiterna."
        ko:
          x: "몸을 둘러싼 얼음이 적의\n공격을 막는다. 깨져도\n냉기로 재빨리 얼음을 얼린다."
          y: "마이너스 100도의 냉기로 적을\n얼려버린다. 만년설로\n덮인 산에서 무리를 짓는다."
avalugg:
  species_id: 713
  names:
    jp_kana: クレベース
    jp_kanji: クレベース
    en: Avalugg
    fr: Séracrawl
    it: Avalugg
    de: Arktilas
    es: Avalugg
    ko: 크레베이스
  forms:
    avalugg:
      form_id: 0
      base_stats:
        hp: 95
        attack: 117
        defense: 184
        special_attack: 44
        special_defense: 46
        speed: 28
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - monster
      abilities:
        - own_tempo
        - ice_body
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          x: "こおりついた　からだは　こうてつの\nように　かたい。たちふさがる　ものを\nきょたいで　おしつぶし　いどうする。"
          y: "せなかに　すうひきの　カチコールを\nのせて　くらす　ようすは　まるで\nこおりの　こうくうぼかんのようだ。"
        jp_kanji:
          x: "凍りついた　体は　鋼鉄のように\n硬い。立ちふさがる　ものを\n巨体で　押しつぶし　移動する。"
          y: "背中に　数匹の　カチコールを\n乗せて　暮らす　様子は\nまるで　氷の　航空母艦のようだ。"
        en:
          x: "Its ice-covered body is as hard as steel.\nIts cumbersome frame crushes anything that\nstands in its way."
          y: "The way several Bergmite huddle\non its back makes it look like\nan aircraft carrier made of ice."
        fr:
          x: "Son immense corps recouvert de glace est aussi\nsolide que de l’acier. Quand il se déplace, il écrase\ntout qui se trouve sur son passage."
          y: "Quand on le voit transportant les petits Grelaçon\nqui vivent sur son dos, il y a une ressemblance\ncertaine avec les véhicules déplaçant les fusées."
        it:
          x: "Il suo enorme corpo di ghiaccio è duro come l’acciaio.\nAvanza distruggendo tutto ciò che gli si para davanti."
          y: "Ospita numerosi Bergmite sul suo dorso, come\nuna vera e propria portaerei di ghiaccio."
        de:
          x: "Sein eisbedeckter Körper ist so hart wie Stahl.\nEs nutzt diese stahlharte Hülle, um Hindernisse\nzu zerschmettern und sich so seinen Weg zu bahnen."
          y: "Mit den zahlreichen Arktip auf seinem Rücken sieht es\naus wie ein Flugzeugträger aus Eis."
        es:
          x: "Su cuerpo, cubierto de hielo, es tan duro como el\npropio acero. Su abultada figura le permite arramblar\ncon todo lo que se encuentra a su paso."
          y: "Parece un portaaviones de hielo, por el aspecto que\npresenta al llevar varios Bergmite en su espalda."
        ko:
          x: "얼어붙은 몸은 강철처럼\n단단하다. 앞을 가로막는 것을\n커다란 몸으로 파괴하며 이동한다."
          y: "등에 수 마리의 꽁어름을\n태우고 지내는 모습은 마치\n얼음으로 된 항공모함 같다."
