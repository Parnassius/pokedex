      descriptions:
        jp_kana:
          x: "あごの　ほのおで　こぶしを　もやして\nほのおの　パンチを　くりだす。\nとても　なかまおもいの　ポケモン。"
          y: "ほのおの　あごひげを　たくわえる。\nパワーと　スピードを　かねそなえた\nかくとうの　わざを　みにつけている。"
        jp_kanji:
          x: "アゴの　炎で　こぶしを　燃やして\n炎の　パンチを　繰り出す。\nとても　仲間思いの　ポケモン。"
          y: "炎の　あごひげを　たくわえている。\nパワーと　スピードを　兼ね備えた\n格闘の　技を　身につけている。"
        en:
          x: "It can throw a fire punch by setting its fists on fire\nwith its fiery chin. It cares deeply about its friends."
          y: "It has mastered fast and powerful fighting moves.\nIt grows a beard of fire."
        fr:
          x: "Il embrase ses poings avec les flammes sur son\nmenton et cogne l’ennemi avec. C’est un Pokémon\ntrès solidaire."
          y: "Il a une barbe enflammée. Il maîtrise des techniques\nde combat au corps à corps rapides et puissantes."
        it:
          x: "Infiamma i pugni sulla barba ardente, poi sferra\nattacchi di fuoco sui nemici. Ha molta considerazione\nper i suoi simili."
          y: "La sua barba è avvolta dalle fiamme. Padroneggia\nmosse di lotta che combinano potenza e rapidità."
        de:
          x: "Steckt mit dem Feuer um sein Kinn seine Fäuste\nin Brand und holt zu feurigen Fausthieben aus.\nZeigt großen Teamgeist."
          y: "Es trägt einen Backenbart aus Feuer und beherrscht\nKampftechniken, die ebenso wuchtig wie schnell sind."
        es:
          x: "Calienta sus puños con las llamas de su barbilla para\npropinar puñetazos ardientes. Es muy fiel a sus\ncompañeros."
          y: "Posee una tupida barba fogosa. Es tanto rápido como\npoderoso, y su principal baza es la lucha cuerpo a\ncuerpo."
        ko:
          x: "턱의 화염으로 주먹을 불태워\n불꽃펀치를 날린다.\n동료애가 깊은 포켓몬이다."
          y: "불꽃 턱수염을 기르고 있다.\n파워와 스피드를 겸비한\n격투 기술을 익히고 있다."
oshawott:
