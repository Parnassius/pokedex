          x: "あたまのはっぱから　ほのかに　あまい\nかおりが　ただよう。おとなしくて\nひざしを　あびるのが　だいすき。"
          y: "あたまの　はっぱで　まわりの\nおんどや　しつどを　さぐる。\nひざしを　あびることが　だいすき。"
        jp_kanji:
          x: "頭の　葉っぱから　ほのかに　甘い\n香りが　漂う。おとなしくて\n日差しを　浴びるのが　大好き。"
          y: "頭の　葉っぱで　まわりの\n温度や　湿度を　探る。\n日差しを　浴びることが　大好き。"
        en:
          x: "A sweet aroma gently wafts from the leaf on its\nhead. It is docile and loves to soak up sun rays."
          y: "It uses the leaf on its head to determine the\ntemperature and humidity. It loves to sunbathe."
        fr:
          x: "Un doux parfum émane de la feuille placée sur sa tête.\nIl est très gentil et aime dormir au soleil."
          y: "Il jauge la température et l’humidité grâce à la feuille\nsur sa tête. Il raffole des bains de soleil."
        it:
          x: "Un dolce profumo si diffonde dalla sua testa.\nÈ docile e ama scaldarsi al sole."
          y: "Usa la foglia sulla sua testa per misurare la\ntemperatura e l’umidità. Ama crogiolarsi al sole."
        de:
          x: "Ein süßer Duft geht von dem Blatt auf seinem Kopf\naus. Es ist ruhig und liegt gerne in der Sonne."
          y: "Mit dem Blatt auf seinem Kopf bestimmt es die\nTemperatur und Feuchtigkeit. Es liebt Sonnenbäder."
        es:
          x: "Un dulce aroma se desprende de la hoja de su\ncabeza. Es dócil y le encanta absorber los rayos\nde sol."
          y: "Con la hoja de su cabeza puede medir la temperatura\ny la humedad. Le encanta tomar el sol."
        ko:
          x: "머리의 잎사귀에서 살짝 달콤한\n향기가 감돈다. 얌전하며\n햇볕을 쬐는 것을 매우 좋아한다."
          y: "머리의 잎사귀로 주위의\n온도나 습도를 살핀다.\n햇볕을 쬐는 것을 매우 좋아한다."
