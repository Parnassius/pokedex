          y: "ハネを　はげしく　しんどうさせて\nちょうおんぱを　はっせい。きぜつした\nえものを　しょうかえきで　とかす。"
        jp_kanji:
          x: "２枚の　羽を　高速で\n振動させて　出す　超音波は\n激しい　頭痛を　ひきおこす。"
          y: "羽を　激しく　振動させて\n超音波を　発生。気絶した　獲物を\n消化液で　溶かす。"
        en:
          x: "The ultrasonic waves it generates by rubbing its two\nwings together cause severe headaches."
          y: "It generates ultrasonic waves by violently flapping\nits wings. After making its prey faint, it melts the\nprey with acid."
        fr:
          x: "Ses violents battements d’ailes génèrent des vagues\nd’ultrasons qui donnent d’intenses migraines."
          y: "Il génère des ondes ultrasoniques en battant\nviolemment des ailes. Dès que sa proie est\ninconsciente, il l’arrose d’acide pour pouvoir l’avaler."
        it:
          x: "Fa vibrare velocemente le ali generando onde\nultrasoniche che provocano dei forti mal di testa."
          y: "Sbattendo violentemente le ali genera onde\nultrasoniche per far svenire la preda che poi scioglie\ncol proprio acido."
        de:
          x: "Die Schallwellen, die es durch eine hohe\nFlügelschlagfrequenz erzeugt, verursachen\nheftige Kopfschmerzen."
          y: "Durch gewaltiges Schlagen seiner Flügel entstehen\nUltraschallwellen. Ist sein Gegner besiegt, löst es ihn\nmittels Säure auf."
        es:
          x: "Al agitar a gran velocidad ambas alas, emite ondas\nultrasónicas que provocan fuertes dolores de cabeza."
          y: "Genera ondas ultrasónicas batiendo las alas\nviolentamente. Cuando debilita a su presa, la\ndestruye con ácido."
        ko:
          x: "2장의 날개를 고속으로\n진동시켜서 내는 초음파는\n격렬한 두통을 불러일으킨다."
          y: "날개를 격렬하게 진동시켜서\n초음파를 발생시킨다. 기절한\n먹이를 소화액으로 녹인다."
flygon:
