        jp_kana:
          x: "はねが　そだちきって　おらず\nとびはねるようにして　いどうする。\nいつも　なにかを　みつめている。"
          y: "ふだんは　ちじょうで　エサをさがすが\nごくたまに　きのえだに　とびのって\nきのめを　ついばんだりする。"
        jp_kanji:
          x: "羽が　育ちきって　おらず\n飛び跳ねるようにして　移動する。\nいつも　なにかを　見つめている。"
          y: "普段は　地上で　エサを　探すが\nごくたまに　木の枝に　飛び乗って\n木の芽を　ついばんだりする。"
        en:
          x: "Because its wings aren’t yet fully grown, it has\nto hop to get around. It is always staring\nat something."
          y: "It usually forages for food on the ground but may,\non rare occasions, hop onto branches to peck\nat shoots."
        fr:
          x: "Ses ailes ne sont pas assez développées et il ne peut\nque planer péniblement. Il fixe toujours quelque\nchose."
          y: "Il cherche sa nourriture par terre, mais quelquefois\nil grimpe aux arbres pour manger."
        it:
          x: "Poiché le sue ali non sono ancora ben sviluppate,\ndeve saltellare. Sembra fissare sempre qualcosa."
          y: "Di solito cerca il cibo per terra, ma in rare occasioni\npuò saltare sui rami e beccare i germogli."
        de:
          x: "Da seine Flügel nicht voll ausgebildet sind,\nbewegt es sich hüpfend. Es starrt immer etwas an."
          y: "Gewöhnlich sucht es am Boden nach Futter,\naber manchmal springt es auch auf Äste,\num dort zu suchen."
        es:
          x: "Va dando saltitos porque sus alas no han crecido lo\nsuficiente. Siempre está pendiente de algo."
          y: "Normalmente busca comida por el suelo. En raras\nocasiones, salta a las ramas para picotear brotes."
        ko:
          x: "날개가 아직 잘 발달하지 못해서\n뛰어오르는 것처럼 이동한다.\n항상 뭔가를 바라보고 있다."
          y: "보통은 지상에서 먹이를 찾지만\n극히 드물게 나뭇가지에 날아 앉아\n나무의 순을 쪼아 먹기도 한다."
xatu:
  species_id: 178
  names:
