        fr:
          x: "Il peut mystifier instantanément des foules d’humains.\nIl protège son habitat en créant des illusions de\npaysages."
          y: "Ces Pokémon protègent les leurs en prenant\nl’apparence de leurs ennemis. Ils forment des groupes\ntrès soudés."
        it:
          x: "Ha la capacità di trarre in inganno una folla di persone.\nProtegge la tana creando dei miraggi."
          y: "Protegge la sicurezza del gruppo ammaliando gli\navversari. Dimostra forte solidarietà verso i compagni."
        de:
          x: "Kann auf einen Schlag große Massen von Menschen\ntäuschen. Es kreiert Illusionen, um sein Revier zu\nschützen."
          y: "Seit jeher beschützt es das Rudel, indem es\ndie Gestalt des Feindes annimmt. Es ist sehr\nloyal zu seinen Artgenossen."
        es:
          x: "Tiene la facultad de confundir a muchos humanos a la\nvez. Protege su guarida creando un paisaje ilusorio."
          y: "Siempre ha protegido a su manada embaucando a sus\nenemigos. Dentro de la manada están todos muy\nunidos."
        ko:
          x: "한 번에 많은 사람을\n속이는 힘을 가졌다. 환영의\n경치를 보여줘 거처를 지킨다."
          y: "상대를 속여 무리의\n안전을 유지해온 포켓몬이다.\n동료 간의 결속력이 강하다."
minccino:
