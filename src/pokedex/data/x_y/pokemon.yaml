          y: "きしょうが　はげしく　トゲの　ついた\nしっぽを　ふりまわして　たたかう。\nあたまの　はっぱは　とても　にがい。"
        jp_kanji:
          x: "トゲの　たくさん　ついた　尻尾を\n相手に　たたきつけて　攻撃。\n気性の　激しい　ポケモン。"
          y: "気性が　激しく　トゲの　ついた\n尻尾を　振り回して　戦う。\n頭の　葉っぱは　とても　苦い。"
        en:
          x: "It attacks enemies with strikes of its thorn-covered\ntail. This Pokémon is wild tempered."
          y: "Ill tempered, it fights by swinging its barbed tail\naround wildly. The leaf growing on its head is\nvery bitter."
        fr:
          x: "Il frappe ses ennemis avec sa queue couverte de\npointes. Un Pokémon au caractère agressif."
          y: "Il a un tempérament violent et se bat avec sa queue\npleine d’épines. La feuille sur sa tête est très amère."
        it:
          x: "Attacca il nemico colpendolo con la coda piena di\naculei. Pokémon dal carattere impetuoso."
          y: "Di carattere impetuoso, lotta roteando la coda\ndotata di aculei. Le foglie che ha sul capo sono\nmolto amare."
        de:
          x: "Wer sich mit diesem temperamentvollen Pokémon\nanlegt, bekommt seinen mit Dornen bestückten\nSchweif zu spüren."
          y: "Ein hitziger Geselle, der im Kampf seinen dornigen\nSchweif umherschwingt. Auf seinem Kopf wachsen\nbittere Kräuter."
        es:
          x: "Ataca estampando las espinas de su cola en el\nenemigo. Es un Pokémon con mucho temperamento."
          y: "Pokémon muy temperamental que lucha con su cola\nrevestida de púas. Las hojas de su cabeza están muy\namargas."
        ko:
          x: "가시가 잔뜩 박힌 꼬리를\n상대에게 힘껏 쳐서 공격한다.\n기질이 격한 포켓몬이다."
          y: "기질이 격하여 가시가 박힌\n꼬리를 휘두르며 싸운다.\n머리의 잎사귀는 매우 쓰다."
