        hp: 95
        attack: 124
        defense: 78
        special_attack: 69
        special_defense: 71
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - dark
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          x: "きしょうが　あらく　けんかっぱやいが\nよわいものいじめは　ゆるさない。\nはっぱで　てきの　うごきを　よむ。"
          y: "こうげきを　うけても　ひるまずに\nとっしんして　でんちゅうを　へしおる\nパワーの　わんりょくで　ぶちのめす。"
        jp_kanji:
          x: "気性が　荒く　ケンカっ早いが\n弱いものいじめは　許さない。\n葉っぱで　敵の　動きを　読む。"
          y: "攻撃を　受けても　ひるまずに　突進して\n電柱を　へし折る\nパワーの　腕力で　ぶちのめす。"
        en:
          x: "Although it possesses a violent temperament,\nit won’t put up with bullying. It uses the leaf in\nits mouth to sense the movements of its enemies."
          y: "It charges ahead and bashes its opponents like\na berserker, uncaring about any hits it might take.\nIts arms are mighty enough to snap a telephone pole."
        fr:
          x: "D’un tempérament fougueux, il ne supporte pas que\nl’on s’en prenne aux faibles. Sa feuille lui permet\nde deviner les actions de l’ennemi."
          y: "Il encaisse les attaques de plein fouet sans même\ntiquer et il poursuit sa route. Il étale ses ennemis d’un\ncoup de patte capable de briser un poteau électrique."
        it:
          x: "Ha un carattere focoso e attaccabrighe, ma non\nsopporta chi maltratta i più deboli. Usa la foglia che\ntiene in bocca per prevedere i movimenti dei nemici."
          y: "Quando lotta, avanza impetuosamente senza curarsi\ndei colpi nemici. Le sue braccia sono talmente forti\nche potrebbe spezzare in due un palo della luce."
        de:
          x: "Es ist sehr grob und streitlustig, lässt es aber nicht zu,\ndass Schwächere gemobbt werden. Mit seinem Blatt\nerspürt es die Bewegungen des Gegners."
          y: "Es greift mit mächtigen Armen an, die so stark sind,\ndass sie Strommasten wie Streichhölzer umknicken\nkönnen. Gegenangriffe steckt es unbeeindruckt ein."
        es:
          x: "Es muy temperamental, pero no permite que nadie se\nmeta con los débiles. Mediante su hoja, predice los\nmovimientos del enemigo."
          y: "No se arredra ante los ataques y embiste con una\nfuerza tan abrumadora que sería capaz de derribar\nun robusto poste telefónico de hormigón."
        ko:
          x: "성질이 거칠어 툭하면 싸우려 들지만\n약자를 괴롭히는 일은 용서하지 않는다.\n잎사귀로 적의 움직임을 읽는다."
          y: "공격을 받아도 풀죽지 않고\n돌진하며 전신주도 부러뜨리는\n파워의 완력으로 때려눕힌다."
furfrou:
  species_id: 676
  names:
    jp_kana: トリミアン
    jp_kanji: トリミアン
    en: Furfrou
    fr: Couafarel
    it: Furfrou
    de: Coiffwaff
    es: Furfrou
    ko: 트리미앙
  forms:
    furfrou_natural_form:
      form_id: 0
      names:
        jp_kana: やせいのすがた
        jp_kanji: やせいのすがた
        en: Natural Form
        fr: Forme Sauvage
        it: Forma Selvatica
        de: Zottelform
        es: Forma Salvaje
        ko: 야생의 모습
      base_stats:
        hp: 75
        attack: 80
        defense: 60
        special_attack: 65
        special_defense: 90
        speed: 102
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - fur_coat
      descriptions:
        jp_kana:
          x: "ボサボサの　たいもうを　かりこむと\nすがたが　うつくしくなる　だけでなく\nからだの　キレが　よくなるのだ。"
          y: "おおむかしの　カロスちほうでは\nおうさまを　ごえいする　やくめを\nあたえられた　ポケモン。"
        jp_kanji:
          x: "ボサボサの　体毛を　刈りこむと\n姿が　美しくなる　だけでなく\n身体の　キレが　良くなるのだ。"
          y: "大昔の　カロス地方では\n王様を　護衛する　役目を\n与えられた　ポケモン。"
        en:
          x: "Trimming its fluffy fur not only makes\nit more elegant but also increases the\nswiftness of its movements."
          y: "Historically, in the Kalos region, these Pokémon\nwere the designated guardians of the king."
        fr:
          x: "Si son abondante fourrure gagne à être toilettée,\nce n’est pas qu’une question de style. En effet, cela\nlui permet également de se mouvoir plus librement."
          y: "Il y a fort longtemps dans la région de Kalos,\nce Pokémon fut le gardien des rois et des reines."
        it:
          x: "La toelettatura del manto vaporoso non solo lo rende\npiù bello, ma gli consente anche di muoversi\npiù liberamente."
          y: "Nell’antica Kalos, questo Pokémon aveva il compito\ndi proteggere i re."
        de:
          x: "Schneidet man sein Fell zurecht, wird es\nnicht nur schöner, sondern auch beweglicher."
          y: "Vor langer Zeit wurde dieses Pokémon in der\nKalos-Region als Leibgarde des Königs eingesetzt."
        es:
          x: "Cuando le esquilan su mullido pelaje, no solo mejora\nsu apariencia, sino que aumenta su agilidad."
          y: "Antiguamente, estos Pokémon desempeñaban el\ncometido de guardián del rey en la región de Kalos."
        ko:
          x: "복슬복슬한 털을 깎고 다듬으면\n모습이 아름다워질 뿐만 아니라\n몸의 움직임도 좋아진다."
          y: "먼 옛날 칼로스지방에서\n왕을 호위하는 역할을\n맡았던 포켓몬이다."
