        jp_kana:
          x: "いつも　きのふりを　している。\nからだの　つくりは　しょくぶつより\nいしや　いわなどに　ちかいようだ。"
          y: "おそわれないように　きのまねをする。\nみずがにがてで　あめが　ふりだすと\nいつのまにか　すがたを　けす。"
        jp_kanji:
          x: "いつも　木のふりを　している。\n体の　つくりは　植物より\n石や　岩などに　近いようだ。"
          y: "襲われないように　木の真似をする。\n水が　苦手で　雨が　降り出すと\nいつの間にか　姿を　消す。"
        en:
          x: "Although it always pretends to be a tree, its\ncomposition appears more similar to rock than\nto vegetation."
          y: "It disguises itself as a tree to avoid attack. It hates\nwater, so it will disappear if it starts raining."
        fr:
          x: "Il fait semblant d’être un arbre. Sa composition est\nen fait plus proche de la pierre."
          y: "Il se déguise en arbre pour éviter les problèmes.\nIl déteste l’eau et se cache par temps de pluie."
        it:
          x: "Sebbene finga di essere un albero, la composizione\nsembra più simile a quella di una roccia."
          y: "Si traveste da albero per evitare gli attacchi. Odiando\nl’acqua, scompare appena inizia a piovere."
        de:
          x: "Obwohl es vorgibt, ein Baum zu sein, kommt seine\nZusammensetzung einem Stein näher als einer Pflanze."
          y: "Es tarnt sich als Baum, um nicht angegriffen\nzu werden. Es hasst Wasser, darum läuft es\nbei Regen weg."
        es:
          x: "Aunque pretende ser un árbol, en su composición se\nparece más a una roca que a una planta."
          y: "Se disfraza de árbol para no ser atacado. Odia el agua,\npor lo que desaparecerá si empieza a llover."
        ko:
          x: "항상 나무인 척하고 있다.\n몸의 구조는 식물보다\n돌이나 바위에 가까운 듯하다."
          y: "습격당하지 않도록 나무 흉내를 낸다.\n물에 약하기 때문에 비가 내리면\n어느 순간에 모습을 감춰버린다."
politoed:
  species_id: 186
  names:
    jp_kana: ニョロトノ
    jp_kanji: ニョロトノ
    en: Politoed
    fr: Tarpaud
