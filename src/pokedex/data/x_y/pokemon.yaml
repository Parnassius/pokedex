          y: "まるいものが　だいすき。よなよな\nでかけては　おちている　コインを\nひろい　あつめて　かえってくる。"
        jp_kanji:
          x: "夜中に　行動する　習性。\nキラキラ　光るものを　見つけると\n負けないくらい　瞳が　輝く。"
          y: "まるいものが　大好き。夜な夜な\n出かけては　落ちている　コインを\n拾い　集めて　帰ってくる。"
        en:
          x: "It is nocturnal in nature. If it spots something shiny,\nits eyes glitter brightly."
          y: "Adores round objects. It wanders the streets on a\nnightly basis to look for dropped loose change."
        fr:
          x: "Son regard s’anime à la vue d’un objet brillant.\nC’est un Pokémon nocturne."
          y: "Il adore les pièces de monnaie. Il hante les rues à\nla recherche de pièces oubliées par les passants."
        it:
          x: "È un Pokémon attivo di notte. Se nota qualcosa\ndi luccicante, i suoi occhi cominciano a brillare."
          y: "Ama gli oggetti rotondi. Di notte vaga per le vie\nin cerca di monetine perdute."
        de:
          x: "Ein nachtaktives Pokémon. Sieht es etwas\nSchimmerndes, fangen seine Augen an zu glänzen."
          y: "Dieses Pokémon bewundert runde Objekte. Es sucht\nnachts auf den Straßen nach verlorenen Münzen."
        es:
          x: "Es de naturaleza nocturna. Le atraen los objetos\nbrillantes."
          y: "Adora los objetos redondos. De noche, camina por las\ncalles en busca de monedas perdidas."
        ko:
          x: "한밤중에 움직이는 습성이 있다.\n반짝반짝 빛나는 것을 발견하면\n그에 못지않게 눈동자가 반짝인다."
          y: "둥근 물건을 정말 좋아한다.\n밤마다 나가서는 떨어진 동전을\n주워 모아서 돌아온다."
persian:
