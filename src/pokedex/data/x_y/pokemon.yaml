          y: "かんそうした　とちで　くらす。\nからだを　リズミカルに　うごかすと\nマラカスのような　おとを　かなでる。"
        jp_kanji:
          x: "アップテンポの　踊りと　音で\n花の　タネを　ねらう　天敵の\nとりポケモンを　追い払うのだ。"
          y: "乾燥した　土地で　暮らす。\n体を　リズミカルに　動かすと\nマラカスのような　音を　奏でる。"
        en:
          x: "It uses an up-tempo song and dance to drive away\nthe bird Pokémon that prey on its flower seeds."
          y: "Arid regions are their habitat. They move\nrhythmically, making a sound similar to maracas."
        fr:
          x: "Avec une danse et des sons saccadés, il fait fuir\nses prédateurs, les Pokémon Oiseaux dévoreurs\nde graines de fleur."
          y: "Il vit dans les endroits secs. Quand il bouge son corps\nen rythme, il fait un bruit de maracas."
        it:
          x: "Con danze e suoni a ritmo vivace scaccia i suoi\npredatori, i Pokémon uccello, che divorano i semi\ndei suoi fiori."
          y: "Vive nelle zone aride. Se muove il corpo a tempo\nproduce un suono di maracas."
        de:
          x: "Verjagt Vogel-Pokémon, die auf seine Blüten\naus sind, mit einem flotten Tänzchen und\nlauter Untermalung."
          y: "Erzeugt durch rhythmische Bewegungen Laute,\ndie dem Klang von Maracas ähneln. Lebt an\ntrockenen Orten."
        es:
          x: "Espanta a los Pokémon pájaro con un baile rápido y\nhaciendo ruido para evitar que picoteen las semillas de\nsus flores."
          y: "Vive en territorio árido. Emite un sonido parecido a\nunas maracas si se mueve de forma rítmica."
        ko:
          x: "템포가 빠른 춤과 소리로\n꽃씨를 노리는 천적인\n새포켓몬을 쫓아버린다."
          y: "건조한 땅에서 산다.\n몸을 리드미컬하게 움직이면\n마라카스 같은 소리를 낸다."
dwebble:
