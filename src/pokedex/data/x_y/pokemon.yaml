      descriptions:
        jp_kana:
          x: "ふかい　かいこうの　そこで　ねむる。\nルギアが　はばたくと　４０にち\nあらしが　つづくと　いわれている。"
          y: "うみのかみさま　と　つたえられる\nポケモン。あらしのよる　すがたを\nみたという　はなしが　つたえられる。"
        jp_kanji:
          x: "深い　海溝の　底で　眠る。\nルギアが　羽ばたくと　４０日\n嵐が　続くと　言われている。"
          y: "海の神様と　伝えられる　ポケモン。\n嵐の　夜　姿を　見たという　話が\n伝えられる。"
        en:
          x: "It sleeps in a deep-sea trench. If it flaps its wings,\nit is said to cause a 40-day storm."
          y: "It is said to be the guardian of the seas. It is\nrumored to have been seen on the night of a storm."
        fr:
          x: "Il dort dans une faille des grands fonds.\nSes battements d’ailes génèrent une tempête de 40\njours."
          y: "Il est supposé être le gardien des sept mers.\nOn raconte qu’il est apparu une nuit de forte tempête."
        it:
          x: "Dorme in una fossa negli abissi marini. Con un\nbattito d’ali provoca una tempesta di 40 giorni."
          y: "Viene definito il guardiano dei mari. Si dice che sia\nstato visto nelle notti di tempesta."
        de:
          x: "Es schläft in einem Tiefseegraben. Schwingt es\nseine Flügel, entsteht ein Sturm, der 40 Tage dauert."
          y: "Man berichtet, es sei der Wächter der Meere und man\nhabe es im Herzen eines tosenden Sturmes gesehen."
        es:
          x: "Duerme en una dorsal marina. Si bate sus alas, puede\ncausar tormentas de 40 días."
          y: "Dicen que es el guardián de los mares. Hay rumores\nde que fue visto en una noche de tormenta."
        ko:
          x: "깊은 해구의 밑바닥에서 잠잔다.\n루기아가 날개를 치면 40일 동안\n폭풍우가 계속된다고 전해진다."
          y: "바다의 신이라고 전해지는\n포켓몬이다. 폭풍 치는 밤에 모습을\n봤다는 이야기가 전해져온다."
ho_oh:
