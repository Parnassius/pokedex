      types:
        - grass
        - flying
      egg_groups:
        - monster
        - grass
      abilities:
        - chlorophyll
        - solar_power
      hidden_ability: harvest
      descriptions:
        jp_kana:
          x: "おおきな　はっぱで　そらをとんで\nこどもたちに　だいにんきの　くびに\nできる　あまい　くだものを　くばる。"
          y: "くびの　フサは　１ねんに　２かい\nみを　つける。あまくて　おいしい。\nなんごくの　こどもの　おやつだ。"
        jp_kanji:
          x: "大きな　葉っぱで　空を飛んで\n子供たちに　大人気の　首に\nできる　甘い　くだものを　配る。"
          y: "首の　房は　１年に　２回\n実を　つける。甘くて　おいしい。\n南国の　子供の　おやつだ。"
        en:
          x: "It flies by flapping its broad leaves and gives\nthe sweet, delicious fruit around its neck\nto children."
          y: "The bunch of fruit around its neck ripens twice a\nyear and is delicious. It’s a highly favored\ntropical snack."
        fr:
          x: "Ses grandes feuilles lui servent à voler.\nIl distribue les fruits qui pendent à son cou aux\nenfants, qui s’en régalent."
          y: "Les succulents fruits de son cou poussent deux fois\nl’an et font le régal des enfants des tropiques."
        it:
          x: "Vola sbattendo delle grandi ali a forma di foglia\ne distribuisce ai bambini i deliziosi frutti che gli\ncrescono sul collo."
          y: "Due volte l’anno il suo collare produce dei frutti dolci\ne squisiti, molto amati dai bambini dei tropici."
        de:
          x: "Es nutzt seine großen Blätter als Flügel und verteilt die\nsüßen Früchte, die an seinem Hals wachsen, an Kinder."
          y: "Sein Hals trägt zweimal im Jahr süße Früchte.\nKinder in den südlichen Tropen naschen oft davon."
        es:
          x: "Puede volar al agitar sus grandes hojas. Reparte entre\nlos niños la codiciada fruta dulce que crece de su\ncuello."
          y: "Los racimos de su cuello dan fruto cada seis meses. A\nlos niños de zonas tropicales les encanta su dulzor."
        ko:
          x: "커다란 잎으로 하늘을 날며\n아이들에게 인기가 많은 목에\n생기는 달콤한 과일을 나눠준다."
          y: "목의 송이는 1년에 2번\n열매를 맺는다. 달고 맛있다.\n남쪽에 사는 아이들의 간식이다."
