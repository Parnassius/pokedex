      descriptions:
        jp_kana:
          x: "からだは　なないろに　かがやき\nとんだあとに　にじが　できると\nしんわに　のこされている　ポケモン。"
          y: "こころただしき　トレーナーの　まえに\nなないろの　つばさを　ひからせながら\nすがたをあらわすと　つたえられる。"
        jp_kanji:
          x: "体は　七色に　輝き\n飛んだあとは　虹が　できると\n神話に　残されている　ポケモン。"
          y: "心正しき　トレーナーの　前に\n七色の　翼を　光らせながら\n姿を　現すと　伝えられる。"
        en:
          x: "A legend says that its body glows in seven colors.\nA rainbow is said to form behind it when it flies."
          y: "It will reveal itself before a pure-hearted Trainer by\nshining its bright, rainbow-colored wings."
        fr:
          x: "Son corps brille des sept couleurs de l’arc-en-ciel,\narc-en-ciel qui se constitue derrière lui quand il vole."
          y: "Il ne se montre qu’à un Dresseur au cœur pur en\ndévoilant ses magnifiques ailes colorées."
        it:
          x: "Narra la leggenda che il suo corpo brilli di sette\ncolori. Volando lascia un arcobaleno dietro di sé."
          y: "Può mostrarsi a un Allenatore puro di cuore spiegando\nle ali, che hanno i colori dell’arcobaleno."
        de:
          x: "Sein Körper soll in sieben Farben leuchten. Im Flug\nzieht es einen Regenbogen hinter sich her."
          y: "Es wird sich dem Trainer offenbaren, der reinen\nHerzens ist, und ihm seine bunten Schwingen zeigen."
        es:
          x: "Cuenta la leyenda que brilla en siete colores. Dicen\nque deja un arcoíris tras de sí al volar."
          y: "Se revelará ante Entrenadores de corazón puro\nmostrando sus brillantes alas arcoíris."
        ko:
          x: "몸은 일곱 빛으로 빛나고\n날아간 자리에는 무지개가 생긴다는\n신화 속에 남아 있는 포켓몬이다."
          y: "마음이 올바른 트레이너의 앞에\n무지개색의 날개를 빛내며\n모습을 드러낸다고 전해진다."
