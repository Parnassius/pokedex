          y: "６ほんの　あしで　おとなを　かかえて\nらくらくと　とぶ　ことが　できる。\nしっぽの　はねで　バランスを　とる。"
        jp_kanji:
          x: "高速で　飛んで　すれ違った\n相手の　首を　一瞬で\nかみちぎる　戦い方を　好む。"
          y: "６本の　脚で　大人を　抱えて\n楽々と　飛ぶ　ことが　できる。\n尻尾の　羽で　バランスを　とる。"
        en:
          x: "It prefers to battle by biting apart foes’ heads\ninstantly while flying by at high speed."
          y: "This six-legged Pokémon is easily capable of\ntransporting an adult in flight. The wings on its tail\nhelp it stay balanced."
        fr:
          x: "Il excelle dans l’art de mordre ses ennemis en plein\nvol, et à grande vitesse."
          y: "Il peut voler avec aise tout en portant un adulte dans\nses 6 pattes. Les ailes de sa queue lui servent de\nbalancier."
        it:
          x: "Preferisce piombare sui nemici a grande velocità\nper tagliuzzarli a dovere in un batter d’occhio."
          y: "Riesce a volare comodamente anche trasportando un\nadulto con le sue sei zampe. Si bilancia con la coda."
        de:
          x: "Seine bevorzugte Strategie besteht darin,\nseine Gegner aus dem Flug blitzartig\nzur Strecke zu bringen."
          y: "Es kann mühelos einen Erwachsenen umhertragen.\nDie Federn an seinem Hinterteil stabilisieren\nseinen Flug."
        es:
          x: "Su técnica favorita consiste en volar a gran velocidad\ny despedazar con su mandíbula a su oponente en un\ninstante."
          y: "Con sus seis patas puede llevar a un adulto y volar\ncon comodidad. Se equilibra con las alas de su cola."
        ko:
          x: "고속으로 날아서 스친\n상대의 목을 한순간에\n물어뜯는 싸움법을 선호한다."
          y: "6개의 다리로 어른을 껴안고도\n너끈히 날 수 있다.\n꼬리의 날개로 균형을 잡는다."
