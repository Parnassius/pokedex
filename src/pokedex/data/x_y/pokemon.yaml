        fr:
          x: "Sa houppette est chargée d’eau et de nutriments.\nIl nourrit les plantes et les arbres avec sa queue."
          y: "L’eau contenue dans la mèche sur sa tête est pleine\nde nutriments. Elle fait pousser les plantes avec\nvigueur."
        it:
          x: "L’acqua contenuta nel suo ciuffo è ricca di nutrienti\ne la usa per annaffiare le piante con la coda."
          y: "L’acqua accumulata nel ciuffo è ricca di nutrimento\ne fa crescere rigogliose le piante che ne vengono\nannaffiate."
        de:
          x: "Das Büschel auf seinem Kopf enthält eine sehr\nnahrhafte Flüssigkeit, mit der es über seinen\nSchweif Pflanzen wässert."
          y: "Das Wasser, das es im Büschel auf seinem Kopf\nsammelt, ist äußerst nahrhaft und verhilft Pflanzen\nzu großem Wachstum."
        es:
          x: "El agua acumulada en su mata de pelo es rica en\nnutrientes. Usa su cola para regar plantas con esa\nmisma agua."
          y: "La acuosidad que acumula en su mata de pelo es rica\nen nutrientes, ideal para regar plantas y que crezcan\nmucho."
        ko:
          x: "머리 송아리에 모은 물은\n영양 듬뿍. 꼬리를 사용해서\n그 물을 초목에 뿌린다."
          y: "머리의 송아리에 모은 물은\n영양이 가득하다. 식물에\n뿌려주면 크게 자란다."
simipour:
