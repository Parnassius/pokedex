          y: "メタングが　がったいして　うまれた。\n４つの　のうを　もつ　メタグロスは\nスーパーコンピュータなみの　ちのう。"
        jp_kanji:
          x: "４つの　脳みそが　連なり\nスーパーコンピュータより　すごい\n計算で　相手を　分析する。"
          y: "メタングが　合体して　生まれた。\n４つの　脳を　持つ　メタグロスは\nスーパーコンピュータ並みの　知能。"
        en:
          x: "With four linked brains, it’s more intelligent than a\nsupercomputer, and it uses calculations to\nanalyze foes."
          y: "Metang combined to form it. With four brains, it has\nthe intelligence of a supercomputer."
        fr:
          x: "Il est né de la fusion de plusieurs Terhal.\nSes quatre cerveaux en font l’égal d’un\nsuperordinateur."
          y: "Il est né de la fusion de plusieurs Métang.\nSes quatre cerveaux en font l’égal d’un\nsuperordinateur."
        it:
          x: "Con l’incredibile velocità di calcolo dei suoi quattro\ncervelli analizza il nemico più rapidamente di un\nsupercomputer."
          y: "È formato dalla fusione di due Metang. Ha quattro\ncervelli e l’intelligenza di un supercomputer."
        de:
          x: "Dank seiner vier vernetzten Hirne kann es Gegner\nbesser als ein Supercomputer mit komplizierten\nFormeln analysieren."
          y: "Mehrere Metang bilden dieses Pokémon. Mit seinen\nvier Gehirnen besitzt es die Intelligenz eines\nSupercomputers."
        es:
          x: "Gracias a sus cuatro cerebros, es más inteligente que\nun superordenador y analiza con precisión al enemigo."
          y: "Está formado por varios Metang. Con cuatro cerebros,\ntiene la inteligencia de un superordenador."
        ko:
          x: "4개의 뇌가 연결되어\n슈퍼컴퓨터보다 대단한\n계산으로 상대를 분석한다."
          y: "메탕구가 합체해서 생겨났다.\n4개의 뇌를 가진 메타그로스는\n슈퍼컴퓨터 수준의 지능이다."
