          y: "きのうえで　せいかつしている。\nむれの　１ぴきが　おこりはじめると\nぜんいんが　いみもなく　あばれだす。"
        jp_kanji:
          x: "意味もなく　怒って　暴れ出すと\n仲間の　区別も　つかなくなるので\n近寄るのは　非常に　危険だ。"
          y: "木の上で　生活している。\n群れの　１匹が　怒り出すと\n全員が　意味もなく　暴れ出す。"
        en:
          x: "It’s unsafe to approach if it gets violently enraged\nfor no reason and can’t distinguish friends\nfrom foes."
          y: "It lives in treetop colonies. If one becomes\nenraged, the whole colony rampages for no reason."
        fr:
          x: "Il ne peut dissocier ses amis de ses ennemis et a\ntendance à enrager lorsqu’on l’approche."
          y: "Ils vivent en colonies sylvestres. Quand un Férosinge\ns’énerve, toute la colonie suit son exemple."
        it:
          x: "Se è tanto arrabbiato da non riuscire più a distinguere\ngli amici dai nemici, è pericoloso avvicinarsi."
          y: "Vive in colonie sugli alberi. Se uno si adira, l’intera\ncolonia comincia ad agire violentemente senza motivo."
        de:
          x: "Da es grundlos angreift und nicht zwischen Freund\noder Feind unterscheidet, ist es sehr gefährlich."
          y: "Es lebt mit anderen in Baumkronen. Wird eines von\nihnen wütend, werden alle anderen auch wütend."
        es:
          x: "Es peligroso acercarse si se enfada sin razón aparente,\nya que no distingue entre amigos y enemigos."
          y: "Vive en colonias en los árboles. Si uno se enfada, el\nresto de la manada ataca sin motivo."
        ko:
          x: "이유 없이 화내고 날뛰기 시작하면\n동료도 구별하지 못하기 때문에\n가까이 가는 것은 매우 위험하다."
          y: "나무 위에서 생활하고 있다.\n무리 중 1마리가 화내기 시작하면\n모두 아무 의미도 없이 난동을 부린다."
