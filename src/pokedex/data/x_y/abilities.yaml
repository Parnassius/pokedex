adaptability:
  names:
    jp_kana: てきおうりょく
    jp_kanji: てきおうりょく
    en: Adaptability
    fr: Adaptabilité
    it: Adattabilità
    de: Anpassung
    es: Adaptable
    ko: 적응력
  descriptions:
    jp_kana: "タイプが　おなじ　わざの\nいりょくが　あがる。"
    jp_kanji: "タイプが　同じ　技の\n威力が　あがる。"
    en: "Powers up moves of the\nsame type as the Pokémon."
    fr: "Augmente la puissance des\ncapacités de même type."
    it: "Potenzia le mosse dello stesso\ntipo del Pokémon."
    de: "Erhöht die Stärke von Attacken\ndesselben Typs."
    es: "Potencia los movimientos del\nmismo tipo del Pokémon."
    ko: "타입이 같은 기술의\n위력이 올라간다."
aerilate:
  names:
    jp_kana: スカイスキン
    jp_kanji: スカイスキン
    en: Aerilate
    fr: Peau Céleste
    it: Pellecielo
    de: Zenithaut
    es: Piel Celeste
    ko: 스카이스킨
  descriptions:
    jp_kana: "ノーマルタイプの　わざが\nひこうタイプになる。"
    jp_kanji: "ノーマルタイプの　技が\nひこうタイプになる。"
    en: "Normal-type moves become\nFlying-type moves."
    fr: "Les capacités de type Normal\ndeviennent de type Vol."
    it: "Le mosse di tipo Normale\ndiventano di tipo Volante."
    de: "Attacken vom Typ Normal\nnehmen den Typ Flug an."
    es: "Convierte movimientos de tipo\nNormal en tipo Volador."
    ko: "노말타입의 기술이\n비행타입이 된다."
aftermath:
  names:
    jp_kana: ゆうばく
    jp_kanji: ゆうばく
    en: Aftermath
    fr: Boom Final
    it: Scoppio
    de: Finalschlag
    es: Resquicio
    ko: 유폭
  descriptions:
    jp_kana: "ひんしの　ときに　ふれた\nあいてに　ダメージ。"
    jp_kanji: "ひんしの　ときに　触れた\n相手に　ダメージ。"
    en: "Damages the attacker\nlanding the finishing hit."
    fr: "Blesse l’attaquant qui porte\nle coup de grâce."
    it: "Arreca danni al Pokémon che\nsferra il colpo finale."
    de: "Fügt einem Angreifer, der das\nPokémon besiegt, Schaden zu."
    es: "Daña al agresor que le ha dado el\ngolpe de gracia."
    ko: "기절할 때 스친\n상대에게 데미지를 준다."
air_lock:
  names:
    jp_kana: エアロック
    jp_kanji: エアロック
    en: Air Lock
    fr: Air Lock
    it: Riparo
    de: Klimaschutz
    es: Bucle Aire
    ko: 에어록
  descriptions:
    jp_kana: "てんきの　えいきょうが\nなくなる。"
    jp_kanji: "天気の　影響が\nなくなる。"
    en: "Eliminates the effects of\nweather."
    fr: Annule les effets du climat.
    it: "Neutralizza gli effetti delle\ncondizioni atmosferiche."
    de: Hebt Wetter-Effekte auf.
    es: "Anula los efectos del tiempo\natmosférico."
    ko: "날씨의 영향이\n없어진다."
analytic:
  names:
    jp_kana: アナライズ
    jp_kanji: アナライズ
    en: Analytic
    fr: Analyste
    it: Ponderazione
    de: Analyse
    es: Cálculo Final
    ko: 애널라이즈
  descriptions:
    jp_kana: "いちばん　さいごに\nわざをだすと　つよくなる。"
    jp_kanji: "一番　最後に\n技をだすと　強くなる。"
    en: "Boosts move power when the\nPokémon moves after the target."
    fr: "Booste les capacités s’il attaque\nen dernier."
    it: "Se agisce per ultimo, la potenza\ndella mossa sale."
    de: "Greift das Pokémon zuletzt an,\nist es stärker."
    es: "Potencia el movimiento si es el\núltimo en atacar."
    ko: "제일 마지막에\n기술을 쓰면 강해진다."
anger_point:
  names:
    jp_kana: いかりのつぼ
    jp_kanji: いかりのつぼ
    en: Anger Point
    fr: Colérique
    it: Grancollera
    de: Kurzschluss
    es: Irascible
    ko: 분노의경혈
  descriptions:
    jp_kana: "きゅうしょに　うけると\nこうげきが　あがる。"
    jp_kanji: "急所に　受けると\n攻撃が　あがる。"
    en: "Maxes the Attack stat after\nthe Pokémon takes a critical hit."
    fr: "Monte l’Attaque au max après\navoir reçu un coup critique."
    it: "Massimizza l’Attacco se si\nsubisce un brutto colpo."
    de: "Maximiert nach Einstecken eines\nVolltreffers den Angriffs-Wert."
    es: "Sube el Ataque al máximo tras un\ngolpe crítico."
    ko: "급소에 맞으면\n공격이 올라간다."
anticipation:
  names:
    jp_kana: きけんよち
    jp_kanji: きけんよち
    en: Anticipation
    fr: Anticipation
    it: Presagio
    de: Vorahnung
    es: Anticipación
    ko: 위험예지
  descriptions:
    jp_kana: "あいての　もつ　きけんな\nわざを　さっちする。"
    jp_kanji: "相手の　持つ　危険な\n技を　察知する。"
    en: "Senses an opposing Pokémon’s\ndangerous moves."
    fr: "Prévoit les capacités ennemies\ndangereuses."
    it: "Rivela se il nemico ha mosse\npericolose."
    de: "Ahnt gefährliche Attacken\ndes Gegners voraus."
    es: "Prevé los movimientos peligrosos\ndel rival."
    ko: "상대가 지닌 위험한\n기술을 감지한다."
arena_trap:
  names:
    jp_kana: ありじごく
    jp_kanji: ありじごく
    en: Arena Trap
    fr: Piège
    it: Trappoarena
    de: Ausweglos
    es: Trampa Arena
    ko: 개미지옥
  descriptions:
    jp_kana: "せんとうで　あいてを\nにげられなくする。"
    jp_kanji: "戦闘で　相手を\n逃げられなくする。"
    en: "Prevents opposing Pokémon\nfrom fleeing."
    fr: Empêche l’ennemi de s’enfuir.
    it: Impedisce la fuga al nemico.
    de: "Hindert den Gegner im Kampf\nan der Flucht."
    es: Evita que el rival huya.
    ko: "배틀에서 상대를\n도망칠 수 없게 한다."
aroma_veil:
  names:
    jp_kana: アロマベール
    jp_kanji: アロマベール
    en: Aroma Veil
    fr: Aroma-Voile
    it: Aromavelo
    de: Dufthülle
    es: Velo Aroma
    ko: 아로마베일
  descriptions:
    jp_kana: "みかたへの　メンタル\nこうげきを　ふせぐ。"
    jp_kanji: "味方への　メンタル\n攻撃を　防ぐ。"
    en: "Protects allies from attacks that\nlimit their move choices."
    fr: "Protège l’équipe des attaques\nlimitant le choix des capacités."
    it: "Protegge sé e gli alleati da mosse\nche limitano la scelta di attacchi."
    de: "Schützt alle Pokémon im Team\nvor manchen mentalen Angriffen."
    es: "Protege al equipo de ataques\nque impiden elegir movimientos."
    ko: "같은 편으로 향하는\n멘탈 공격을 막는다."
aura_break:
  names:
    jp_kana: オーラブレイク
    jp_kanji: オーラブレイク
    en: Aura Break
    fr: Aura Inversée
    it: Frangiaura
    de: Aura-Umkehr
    es: Rompeaura
    ko: 오라브레이크
  descriptions:
    jp_kana: "オーラの　こうかが\nぎゃくに　なる。"
    jp_kanji: "オーラの　効果が\n逆に　なる。"
    en: "The effects of “Aura” Abilities\nare reversed."
    fr: L’effet des auras est inversé.
    it: "Inverte gli effetti di tutte\nle aure."
    de: Kehrt die Wirkung von Auren um.
    es: "Invierte los efectos que causan\nlas auras."
    ko: "오라의 효과가\n반대가 된다."
bad_dreams:
  names:
    jp_kana: ナイトメア
    jp_kanji: ナイトメア
    en: Bad Dreams
    fr: Mauvais Rêve
    it: Sogniamari
    de: Alptraum
    es: Mal Sueño
    ko: 나이트메어
  descriptions:
    jp_kana: "ねむっている　あいての\nＨＰを　へらす。"
    jp_kanji: "ねむっている　相手の\nＨＰを　減らす。"
    en: "Reduces the HP of sleeping\nopposing Pokémon."
    fr: "Réduit les PV d’un ennemi\nendormi."
    it: "Riduce i PS dei nemici\naddormentati."
    de: "Senkt die KP eines\nschlafenden Gegners."
    es: "Reduce los PS de cualquier rival\nque esté dormido."
    ko: "잠들어 있는 상대의\nHP를 줄인다."
battle_armor:
  names:
    jp_kana: カブトアーマー
    jp_kanji: カブトアーマー
    en: Battle Armor
    fr: Armurbaston
    it: Lottascudo
    de: Kampfpanzer
    es: Armadura Batalla
    ko: 전투무장
  descriptions:
    jp_kana: "あいての　こうげきが\nきゅうしょに　あたらない。"
    jp_kanji: "相手の　攻撃が\n急所に　当たらない。"
    en: "Protects the Pokémon\nfrom critical hits."
    fr: "Le Pokémon est protégé des\ncoups critiques."
    it: "Evita che il Pokémon subisca\nbrutti colpi."
    de: Wehrt gegnerische Volltreffer ab.
    es: Bloquea golpes críticos.
    ko: "상대의 공격이\n급소에 맞지 않는다."
big_pecks:
  names:
    jp_kana: はとむね
    jp_kanji: はとむね
    en: Big Pecks
    fr: Cœur de Coq
    it: Pettinfuori
    de: Brustbieter
    es: Sacapecho
    ko: 부풀린가슴
  descriptions:
    jp_kana: "ぼうぎょを　さげる\nこうげきを　うけない。"
    jp_kanji: "防御を　さげる\n攻撃を　受けない。"
    en: "Protects the Pokémon from\nDefense-lowering attacks."
    fr: "Empêche les attaques adverses\nde baisser la Défense."
    it: Evita che la Difesa diminuisca.
    de: "Hindert Angreifer daran,\ndie Verteidigung zu senken."
    es: "Protege de los ataques que bajan\nla Defensa."
    ko: "방어를 떨어뜨리는\n공격을 받지 않는다."
blaze:
  names:
    jp_kana: もうか
    jp_kanji: もうか
    en: Blaze
    fr: Brasier
    it: Aiutofuoco
    de: Großbrand
    es: Mar Llamas
    ko: 맹화
  descriptions:
    jp_kana: "ピンチのとき　ほのおの\nいりょくが　あがる。"
    jp_kanji: "ピンチのとき　ほのおの\n威力が　あがる。"
    en: "Powers up Fire-type moves when\nthe Pokémon is in trouble."
    fr: "Booste les capacités Feu en\ncas de besoin."
    it: "Quando si è in difficoltà, potenzia\nle mosse di tipo Fuoco."
    de: "Erhöht in Notfällen die Stärke\nvon Feuer-Attacken."
    es: "Potencia los ataques de tipo\nFuego en un apuro."
    ko: "위급할 때 불꽃타입의\n위력이 올라간다."
bulletproof:
  names:
    jp_kana: ぼうだん
    jp_kanji: ぼうだん
    en: Bulletproof
    fr: Pare-Balles
    it: Antiproiettile
    de: Kugelsicher
    es: Antibalas
    ko: 방탄
  descriptions:
    jp_kana: "たまや　ばくだんに\nあたらない。"
    jp_kanji: "たまや　ばくだんに\n当たらない。"
    en: "Protects the Pokémon from\nsome ball and bomb moves."
    fr: "Protège de certaines capacités\nprojetant des bombes, balles…"
    it: "Protegge da alcune mosse\na base di proiettili e bombe."
    de: "Schützt das Pokémon vor\ngeworfenen Bomben und Kugeln."
    es: "No le afectan las bombas ni\nalgunos proyectiles."
    ko: "구슬이나 폭탄에\n맞지 않는다."
cheek_pouch:
  names:
    jp_kana: ほおぶくろ
    jp_kanji: ほおぶくろ
    en: Cheek Pouch
    fr: Bajoues
    it: Guancegonfie
    de: Backentaschen
    es: Carrillo
    ko: 볼주머니
  descriptions:
    jp_kana: "きのみを　たべると\nＨＰも　かいふくする。"
    jp_kanji: "きのみを　食べると\nＨＰも　回復する。"
    en: "Restores HP as well when\nthe Pokémon eats a Berry."
    fr: "Rend des PV lorsque le Pokémon\nconsomme une Baie."
    it: "Fa recuperare PS quando\nil Pokémon mangia una bacca."
    de: "Heilt beim Konsum\nvon Beeren KP."
    es: Recupera PS al comer bayas.
    ko: "나무열매를 먹으면\nHP도 회복한다."
chlorophyll:
  names:
    jp_kana: ようりょくそ
    jp_kanji: ようりょくそ
    en: Chlorophyll
    fr: Chlorophylle
    it: Clorofilla
    de: Chlorophyll
    es: Clorofila
    ko: 엽록소
  descriptions:
    jp_kana: "はれのとき　すばやさが\nあがる。"
    jp_kanji: "晴れのとき　素早さが\nあがる。"
    en: "Boosts the Pokémon’s\nSpeed stat in sunshine."
    fr: "Augmente la Vitesse du\nPokémon s’il y a du soleil."
    it: "Se c’è il sole, la statistica\nVelocità aumenta."
    de: "Steigert bei Sonnenschein\ndie Initiative."
    es: "Sube la Velocidad cuando hay\nsol."
    ko: "맑을 때 스피드가\n올라간다."
clear_body:
  names:
    jp_kana: クリアボディ
    jp_kanji: クリアボディ
    en: Clear Body
    fr: Corps Sain
    it: Corpochiaro
    de: Neutraltorso
    es: Cuerpo Puro
    ko: 클리어바디
  descriptions:
    jp_kana: "あいてに　のうりょくを\nさげられない。"
    jp_kanji: "相手に　能力を\nさげられない。"
    en: "Prevents other Pokémon\nfrom lowering its stats."
    fr: "Empêche les stats du Pokémon\nde baisser."
    it: "Le statistiche del Pokémon\nnon possono essere ridotte."
    de: "Hindert Angreifer daran,\nStatuswerte zu senken."
    es: "Evita que bajen las\ncaracterísticas."
    ko: "상대가 능력을\n떨어뜨릴 수 없다."
cloud_nine:
  names:
    jp_kana: ノーてんき
    jp_kanji: ノーてんき
    en: Cloud Nine
    fr: Ciel Gris
    it: Antimeteo
    de: Wolke Sieben
    es: Aclimatación
    ko: 날씨부정
  descriptions:
    jp_kana: "てんきの　えいきょうが\nなくなる。"
    jp_kanji: "天気の　影響が\nなくなる。"
    en: "Eliminates the effects of\nweather."
    fr: Annule les effets du climat.
    it: "Neutralizza gli effetti delle\ncondizioni atmosferiche."
    de: Hebt Wetter-Effekte auf.
    es: "Anula los efectos del tiempo\natmosférico."
    ko: "날씨의 영향이\n없어진다."
color_change:
  names:
    jp_kana: へんしょく
    jp_kanji: へんしょく
    en: Color Change
    fr: Déguisement
    it: Cambiacolore
    de: Farbwechsel
    es: Cambio Color
    ko: 변색
  descriptions:
    jp_kana: "うけた　わざの　タイプに\nへんかする。"
    jp_kanji: "受けた　技の　タイプに\n変化する。"
    en: "The Pokémon’s type becomes\nthe type of the move used on it."
    fr: "Le Pokémon adopte le type de\nla capacité ennemie."
    it: "Il Pokémon acquisisce il tipo\ndella mossa subita."
    de: "Ändert seinen Typ zu dem\nder Attacke des Angreifers."
    es: "Adopta el tipo del último\nmovimiento del que sea blanco."
    ko: "받은 기술의 타입으로\n변화한다."
competitive:
  names:
    jp_kana: かちき
    jp_kanji: かちき
    en: Competitive
    fr: Battant
    it: Tenacia
    de: Unbeugsamkeit
    es: Tenacidad
    ko: 승기
  descriptions:
    jp_kana: "のうりょくが　さがると\nとくこうが　あがる。"
    jp_kanji: "能力が　さがると\n特攻が　あがる。"
    en: "Boosts the Sp. Atk stat when\na stat is lowered."
    fr: "Monte l’Attaque quand une stat\nest baissée par l’adversaire."
    it: "L’Attacco aumenta quando un\nnemico fa calare le statistiche."
    de: "Erhöht den Spezial-Angriff, wenn\nein Statuswert gesenkt wurde."
    es: "Aumenta su At. Esp. cuando\ndisminuyen otras características."
    ko: "능력이 떨어지면\n특수공격이 올라간다."
compound_eyes:
  names:
    jp_kana: ふくがん
    jp_kanji: ふくがん
    en: Compound Eyes
    fr: Œil Composé
    it: Insettocchi
    de: Facettenauge
    es: Ojo Compuesto
    ko: 복안
  descriptions:
    jp_kana: "わざの　めいちゅうりつが\nあがる。"
    jp_kanji: "技の　命中率が\nあがる。"
    en: Boosts the Pokémon’s accuracy.
    fr: "Augmente la Précision du\nPokémon."
    it: "Aumenta la precisione\ndel Pokémon."
    de: "Steigert die Genauigkeit\nvon Attacken."
    es: "Aumenta la Precisión del\nPokémon."
    ko: "기술의 명중률이\n올라간다."
contrary:
  names:
    jp_kana: あまのじゃく
    jp_kanji: あまのじゃく
    en: Contrary
    fr: Contestation
    it: Inversione
    de: Umkehrung
    es: Respondón
    ko: 심술꾸러기
  descriptions:
    jp_kana: "のうりょくの　へんかが\nぎゃくてんする。"
    jp_kanji: "能力の　変化が\n逆転する。"
    en: "Makes stat changes have\nan opposite effect."
    fr: Inverse les variations de stats.
    it: "Le modifiche alle statistiche\nhanno effetto inverso."
    de: "Statusveränderungen werden\numgekehrt."
    es: "Invierte los cambios en las\ncaracterísticas."
    ko: "능력의 변화가\n역전된다."
cursed_body:
  names:
    jp_kana: のろわれボディ
    jp_kanji: のろわれボディ
    en: Cursed Body
    fr: Corps Maudit
    it: Corpofunesto
    de: Tastfluch
    es: Cuerpo Maldito
    ko: 저주받은바디
  descriptions:
    jp_kana: "こうげきされると　たまに\nかなしばりにする。"
    jp_kanji: "攻撃されると　たまに\nかなしばりにする。"
    en: "May disable a move used\non the Pokémon."
    fr: "Peut empêcher l’ennemi de\nréutiliser une attaque."
    it: "A volte inibisce l’ultima mossa\nusata dal nemico."
    de: Blockiert gelegentlich Attacken.
    es: "Puede anular el movimiento\nusado en su contra."
    ko: "공격받으면 가끔 상대를\n사슬묶기 상태로 만든다."
cute_charm:
  names:
    jp_kana: メロメロボディ
    jp_kanji: メロメロボディ
    en: Cute Charm
    fr: Joli Sourire
    it: Incantevole
    de: Charmebolzen
    es: Gran Encanto
    ko: 헤롱헤롱바디
  descriptions:
    jp_kana: "ふれると　メロメロに\nすることがある。"
    jp_kanji: "触れると　メロメロに\nすることがある。"
    en: "Contact with the Pokémon\nmay cause infatuation."
    fr: "Séduit parfois l’attaquant au\ncontact."
    it: "Al contatto subito, chi sferra\nl’attacco può infatuarsi."
    de: "Kann bei Kontakt betörend\nwirken."
    es: "Tocar al Pokémon puede causar\nenamoramiento."
    ko: "스치면 헤롱헤롱 상태가\n될 때가 있다."
damp:
  names:
    jp_kana: しめりけ
    jp_kanji: しめりけ
    en: Damp
    fr: Moiteur
    it: Umidità
    de: Feuchtigkeit
    es: Humedad
    ko: 습기
  descriptions:
    jp_kana: "だれも　ばくはつが\nできなくなる。"
    jp_kanji: "だれも　爆発が\nできなくなる。"
    en: "Prevents the use of\nself-destructing moves."
    fr: "Empêche les combattants de\ns’autodétruire."
    it: "Impedisce le mosse\nautodistruttive."
    de: "Hält alle Pokémon davon ab,\nzu explodieren."
    es: "Evita que un Pokémon pueda\nautodestruirse."
    ko: "누구도 폭발\n할 수 없게 된다."
dark_aura:
  names:
    jp_kana: ダークオーラ
    jp_kanji: ダークオーラ
    en: Dark Aura
    fr: Aura Ténébreuse
    it: Auratetra
    de: Dunkelaura
    es: Aura Oscura
    ko: 다크오라
  descriptions:
    jp_kana: "ぜんいんの　あくタイプの\nわざが　つよくなる。"
    jp_kanji: "全員の　あくタイプの\n技が　強くなる。"
    en: "Powers up each Pokémon’s\nDark-type moves."
    fr: "Renforce les attaques de type\nTénèbres de tous les Pokémon."
    it: "Potenzia le mosse di tipo Buio\ndi tutti i Pokémon."
    de: "Erhöht die Stärke von allen\nAttacken des Typs Unlicht."
    es: "Aumenta la potencia de todos los\nmovimientos de tipo Siniestro."
    ko: "전원의 악타입\n기술이 강해진다."
defeatist:
  names:
    jp_kana: よわき
    jp_kanji: よわき
    en: Defeatist
    fr: Défaitiste
    it: Sconforto
    de: Schwächling
    es: Flaqueza
    ko: 무기력
  descriptions:
    jp_kana: "ＨＰが　はんぶんになると\nのうりょくが　さがる。"
    jp_kanji: "ＨＰが　半分になると\n能力が　さがる。"
    en: "Lowers stats when HP\nbecomes half or less."
    fr: "Baisse les stats quand les PV\ntombent à la moitié."
    it: "Le statistiche scendono se i PS\ncalano a metà o meno."
    de: "Bei halbierter KP-Anzahl\nsinken die Statuswerte."
    es: "Baja las características al llegar a\nla mitad los PS."
    ko: "HP가 절반이 되면\n능력이 떨어진다."
defiant:
  names:
    jp_kana: まけんき
    jp_kanji: まけんき
    en: Defiant
    fr: Acharné
    it: Agonismo
    de: Siegeswille
    es: Competitivo
    ko: 오기
  descriptions:
    jp_kana: "のうりょくが　さがると\nこうげきが　あがる。"
    jp_kanji: "能力が　さがると\n攻撃が　あがる。"
    en: "Boosts the Pokémon’s Attack stat\nwhen its stats are lowered."
    fr: "Monte l’Attaque quand une stat\nest baissée par l’adversaire."
    it: "L’Attacco aumenta quando un\nnemico fa calare le statistiche."
    de: "Senkt der Gegner die Status-\nwerte, steigt der Angriffs-Wert."
    es: "Sube el Ataque cuando el rival le\nbaja las características."
    ko: "능력이 떨어지면\n공격이 올라간다."
download:
  names:
    jp_kana: ダウンロード
    jp_kanji: ダウンロード
    en: Download
    fr: Télécharge
    it: Download
    de: Download
    es: Descarga
    ko: 다운로드
  descriptions:
    jp_kana: "あいての　のうりょくを\nみて　つよさを　かえる。"
    jp_kanji: "相手の　能力を　みて\n強さを　変える。"
    en: "Adjusts power based on an\nopposing Pokémon’s stats."
    fr: "Ajuste la puissance selon\nl’ennemi."
    it: "Regola la potenza in base\nal nemico."
    de: "Passt Kraft entsprechend den\ngegnerischen Statuswerten an."
    es: Adapta su fuerza para cada rival.
    ko: "상대의 능력을 보고\n능력치를 바꾼다."
drizzle:
  names:
    jp_kana: あめふらし
    jp_kanji: あめふらし
    en: Drizzle
    fr: Crachin
    it: Piovischio
    de: Niesel
    es: Llovizna
    ko: 잔비
  descriptions:
    jp_kana: "せんとうに　でると\nあめを　ふらす。"
    jp_kanji: "戦闘に　でると\n雨を　降らす。"
    en: "The Pokémon makes it rain\nwhen it enters a battle."
    fr: "Le Pokémon invoque la pluie\nquand il entre au combat."
    it: "Quando scende in campo,\nil Pokémon attira la pioggia."
    de: Ruft im Kampf Regen herbei.
    es: "Hace que llueva cuando entra en\ncombate."
    ko: "배틀에 나가면\n비를 내린다."
drought:
  names:
    jp_kana: ひでり
    jp_kanji: ひでり
    en: Drought
    fr: Sécheresse
    it: Siccità
    de: Dürre
    es: Sequía
    ko: 가뭄
  descriptions:
    jp_kana: "せんとうに　でると\nひざしが　つよくなる。"
    jp_kanji: "戦闘に　でると\n日差しが　強くなる。"
    en: "Turns the sunlight harsh when\nthe Pokémon enters a battle."
    fr: "Le soleil se met à briller quand\nce Pokémon rejoint le combat."
    it: "Il sole brilla intensamente quando\nil Pokémon entra in campo."
    de: "Erzeugt im Kampf gleißendes\nSonnenlicht."
    es: "El sol sale si el Pokémon entra en\ncombate."
    ko: "배틀에 나가면\n햇살이 강해진다."
dry_skin:
  names:
    jp_kana: かんそうはだ
    jp_kanji: かんそうはだ
    en: Dry Skin
    fr: Peau Sèche
    it: Pellearsa
    de: Trockenheit
    es: Piel Seca
    ko: 건조피부
  descriptions:
    jp_kana: "あついと　ＨＰが　へる。\nみずで　ＨＰを　かいふく。"
    jp_kanji: "あついと　ＨＰが　減る。\nみずで　ＨＰを　回復。"
    en: "Reduces HP if it’s hot.\nWater restores HP."
    fr: "Perd des PV à la chaleur.\nL’eau les restaure."
    it: "Riduce i PS se fa caldo.\nIn presenza di acqua, ridà PS."
    de: "Bei heißem Wetter verliert das\nPokémon KP. Wasser heilt KP."
    es: "Pierde PS si hace calor. Los\nrecupera con agua."
    ko: "더우면 HP가 줄어든다.\n물로 HP를 회복한다."
early_bird:
  names:
    jp_kana: はやおき
    jp_kanji: はやおき
    en: Early Bird
    fr: Matinal
    it: Sveglialampo
    de: Frühwecker
    es: Madrugar
    ko: 일찍기상
  descriptions:
    jp_kana: おきるのが　はやくなる。
    jp_kanji: 起きるのが　早くなる。
    en: "The Pokémon awakens\nquickly from sleep."
    fr: "Le Pokémon se réveille plus\nrapidement."
    it: "Il Pokémon si risveglia\nrapidamente dal sonno."
    de: "Bewirkt, dass das Pokémon\nschneller wieder aufwacht."
    es: "El Pokémon se despierta\nrápidamente."
    ko: "잠듦 상태에서\n빨리 깨어난다."
effect_spore:
  names:
    jp_kana: ほうし
    jp_kanji: ほうし
    en: Effect Spore
    fr: Pose Spore
    it: Spargispora
    de: Sporenwirt
    es: Efecto Espora
    ko: 포자
  descriptions:
    jp_kana: "ふれると　どく　まひ\nねむりに　することがある。"
    jp_kanji: "触れると　どく　まひ\nねむりに　することがある。"
    en: "Contact may poison or\ncause paralysis or sleep."
    fr: "Peut paralyser, empoisonner,\nendormir au contact."
    it: "Al contatto può causare\navvelenamento, paralisi o sonno."
    de: "Kann bei Kontakt Paralyse,\nVergiftung oder Schlaf auslösen."
    es: "Puede dormir, envenenar o\nparalizar al contacto."
    ko: "스치면 독, 마비, 잠듦\n상태가 될 때가 있다."
fairy_aura:
  names:
    jp_kana: フェアリーオーラ
    jp_kanji: フェアリーオーラ
    en: Fairy Aura
    fr: Aura Féérique
    it: Aurafolletto
    de: Feenaura
    es: Aura Feérica
    ko: 페어리오라
  descriptions:
    jp_kana: "ぜんいんの　フェアリー\nわざが　つよくなる。"
    jp_kanji: "全員の　フェアリー\n技が　強くなる。"
    en: "Powers up each Pokémon’s\nFairy-type moves."
    fr: "Renforce les attaques de type\nFée de tous les Pokémon."
    it: "Potenzia le mosse di tipo Folletto\ndi tutti i Pokémon."
    de: "Erhöht die Stärke von allen\nAttacken des Typs Fee."
    es: "Aumenta la potencia de todos los\nmovimientos de tipo Hada."
    ko: "전원의 페어리타입\n기술이 강해진다."
filter:
  names:
    jp_kana: フィルター
    jp_kanji: フィルター
    en: Filter
    fr: Filtre
    it: Filtro
    de: Filter
    es: Filtro
    ko: 필터
  descriptions:
    jp_kana: "こうかばつぐん　のとき\nいりょくを　よわめる。"
    jp_kanji: "効果バツグン　のとき\n威力を　弱める。"
    en: "Reduces damage from\nsupereffective attacks."
    fr: "Réduit les dégâts des capacités\n« super efficaces » subies."
    it: "Riduce la potenza delle mosse\nsuperefficaci."
    de: "Senkt die Stärke sehr effektiver\nAttacken."
    es: "Mitiga los movimientos\nsupereficaces."
    ko: "효과가 굉장한 기술의\n위력을 약하게 한다."
flame_body:
  names:
    jp_kana: ほのおのからだ
    jp_kanji: ほのおのからだ
    en: Flame Body
    fr: Corps Ardent
    it: Corpodifuoco
    de: Flammkörper
    es: Cuerpo Llama
    ko: 불꽃몸
  descriptions:
    jp_kana: "ふれた　あいてを　やけど\nさせることがある。"
    jp_kanji: "触れた　相手を　やけど\nさせることがある。"
    en: "Contact with the Pokémon\nmay burn the attacker."
    fr: "Peut brûler l’attaquant s’il y a\ncontact."
    it: "Al contatto subito, chi sferra\nl’attacco può venire scottato."
    de: "Fügt dem Angreifer bei Berührung\neventuell Verbrennungen zu."
    es: "Puede quemar al mínimo\ncontacto."
    ko: "접촉한 상대에게\n화상을 입힐 때가 있다."
flare_boost:
  names:
    jp_kana: ねつぼうそう
    jp_kanji: ねつぼうそう
    en: Flare Boost
    fr: Rage Brûlure
    it: Bruciaimpeto
    de: Hitzewahn
    es: Ímpetu Ardiente
    ko: 열폭주
  descriptions:
    jp_kana: "やけどのとき　とくしゅの\nいりょくが　あがる。"
    jp_kanji: "やけどのとき　特殊の\n威力が　あがる。"
    en: "Powers up special attacks when\nthe Pokémon is burned."
    fr: "Booste les attaques spéciales si\nle statut est brûlure."
    it: "Aumenta l’Attacco Speciale se\nil Pokémon è scottato."
    de: "Verstärkt bei Verbrennungen\ndie Stärke von Spezial-Attacken."
    es: "Potencia los ataques especiales\ncuando el Pokémon se quema."
    ko: "화상 상태일 때 특수공격의\n위력이 올라간다."
flash_fire:
  names:
    jp_kana: もらいび
    jp_kanji: もらいび
    en: Flash Fire
    fr: Torche
    it: Fuocardore
    de: Feuerfänger
    es: Absorbe Fuego
    ko: 타오르는불꽃
  descriptions:
    jp_kana: "ほのおを　うけると\nほのおわざが　つよくなる。"
    jp_kanji: "ほのおを　受けると\nほのお技が　強くなる。"
    en: "Powers up the Pokémon’s Fire-\ntype moves if it’s hit by one."
    fr: "Booste les capacités Feu si\ntouché par attaque Feu."
    it: "Potenzia le proprie mosse Fuoco\nse se ne subisce una."
    de: "Verstärkt Feuer-Attacken, wenn\nvon Feuer-Attacken getroffen."
    es: "Potencia movimientos de tipo\nFuego si ha sufrido antes alguno."
    ko: "불꽃을 받으면\n불꽃 기술이 강해진다."
flower_gift:
  names:
    jp_kana: フラワーギフト
    jp_kanji: フラワーギフト
    en: Flower Gift
    fr: Don Floral
    it: Regalfiore
    de: Pflanzengabe
    es: Don Floral
    ko: 플라워기프트
  descriptions:
    jp_kana: "はれのとき　じぶんと\nみかたが　つよくなる。"
    jp_kanji: "晴れのとき　自分と\n味方が　強くなる。"
    en: "Powers up party Pokémon\nwhen it is sunny."
    fr: "Rend les Pokémon de l’équipe\nplus puissants au soleil."
    it: "Se c’è il sole, potenzia\ni Pokémon alleati."
    de: "Steigert bei Sonne die Effektivität\nvon allen Team-Pokémon."
    es: "Potencia los Pokémon del equipo\nsi está soleado."
    ko: "맑을 때 자신과\n같은 편이 강해진다."
flower_veil:
  names:
    jp_kana: フラワーベール
    jp_kanji: フラワーベール
    en: Flower Veil
    fr: Flora-Voile
    it: Fiorvelo
    de: Blütenhülle
    es: Velo Flor
    ko: 플라워베일
  descriptions:
    jp_kana: "みかたの　くさポケモンは\nのうりょくが　さがらない。"
    jp_kanji: "味方の　草ポケモンは\n能力が　さがらない。"
    en: "Prevents lowering of ally\nGrass-type Pokémon’s stats."
    fr: "Empêche les alliés de type Plante\nde subir des diminutions de stats."
    it: "Evita il calo delle statistiche\ndegli alleati di tipo Erba."
    de: "Schützt Pflanzen-Pokémon\nvor gesenkten Statuswerten."
    es: "Evita que bajen las características\nde Pokémon tipo Planta aliados."
    ko: "같은 편의 풀타입 포켓몬은\n능력이 떨어지지 않는다."
forecast:
  names:
    jp_kana: てんきや
    jp_kanji: てんきや
    en: Forecast
    fr: Météo
    it: Previsioni
    de: Prognose
    es: Predicción
    ko: 기분파
  descriptions:
    jp_kana: "てんきで　ポワルンが\nへんかする。"
    jp_kanji: "天気で　ポワルンが\n変化する。"
    en: "Castform transforms with\nthe weather."
    fr: "Morphéo change de forme selon\nle climat."
    it: "La forma di Castform cambia in\nbase alle condizioni atmosferiche."
    de: "Formeo verändert seine Form\nabhängig vom Wetter."
    es: "Se transforma según el tiempo\natmosférico."
    ko: "날씨에 따라\n캐스퐁이 변화한다."
forewarn:
  names:
    jp_kana: よちむ
    jp_kanji: よちむ
    en: Forewarn
    fr: Prédiction
    it: Premonizione
    de: Vorwarnung
    es: Alerta
    ko: 예지몽
  descriptions:
    jp_kana: "あいての　もつ　わざを\nよみとることが　できる。"
    jp_kanji: "相手の　持つ　技を\n読み取ることが　できる。"
    en: "Determines what moves\nan opposing Pokémon has."
    fr: "Découvre la capacité ennemie la\nplus puissante."
    it: "Scopre la mossa più potente\ndel nemico."
    de: "Gibt Auskunft über das Attacken-\nRepertoire des Gegners."
    es: "Determina el movimiento más\npotente del rival."
    ko: "상대가 지닌 기술을\n꿰뚫어볼 수 있다."
friend_guard:
  names:
    jp_kana: フレンドガード
    jp_kanji: フレンドガード
    en: Friend Guard
    fr: Garde Amie
    it: Amicoscudo
    de: Freundeshut
    es: Compiescolta
    ko: 프렌드가드
  descriptions:
    jp_kana: "みかたの　ダメージを\nへらすことができる。"
    jp_kanji: "味方の　ダメージを\n減らすことができる。"
    en: "Reduces damage done\nto allies."
    fr: "Diminue les dégâts subis par les\nalliés."
    it: "Riduce il danno subito dagli\nalleati."
    de: "Verringert den Schaden\nan Mitstreitern."
    es: "Reduce el daño que sufren los\naliados."
    ko: "같은 편의 데미지를\n줄일 수 있다."
frisk:
  names:
    jp_kana: おみとおし
    jp_kanji: おみとおし
    en: Frisk
    fr: Fouille
    it: Indagine
    de: Schnüffler
    es: Cacheo
    ko: 통찰
  descriptions:
    jp_kana: "あいての　もちものを\nしることが　できる。"
    jp_kanji: "相手の　持ち物を\n知ることが　できる。"
    en: "The Pokémon can check an\nopposing Pokémon’s held item."
    fr: "Permet de connaître l’objet tenu\npar l’ennemi."
    it: "Il Pokémon scopre che\nstrumento ha il nemico."
    de: "Gibt Auskunft über gegnerische\nItems."
    es: "El Pokémon puede ver el objeto\nque lleva el rival."
    ko: "상대가 지닌 물건을\n알 수 있다."
fur_coat:
  names:
    jp_kana: ファーコート
    jp_kanji: ファーコート
    en: Fur Coat
    fr: Toison Épaisse
    it: Foltopelo
    de: Fellkleid
    es: Pelaje Recio
    ko: 퍼코트
  descriptions:
    jp_kana: "ぶつりわざの　ダメージが\nはんぶんになる。"
    jp_kanji: "物理技の　ダメージが\n半分になる。"
    en: "Halves damage from\nphysical moves."
    fr: "Divise les dégâts des attaques\nphysiques par deux."
    it: "Dimezza il danno degli attacchi\nfisici subiti."
    de: "Halbiert den Schaden durch\nphysische Attacken."
    es: "Reduce a la mitad el daño\nrecibido por ataques físicos."
    ko: "물리 기술의 데미지가\n절반이 된다."
gale_wings:
  names:
    jp_kana: はやてのつばさ
    jp_kanji: はやてのつばさ
    en: Gale Wings
    fr: Ailes Bourrasque
    it: Aliraffica
    de: Orkanschwingen
    es: Alas Vendaval
    ko: 질풍날개
  descriptions:
    jp_kana: "ひこうタイプの　わざが\nせんせいで　だせる。"
    jp_kanji: "ひこうタイプの　技が\n先制で　だせる。"
    en: "Gives priority to Flying-type\nmoves."
    fr: "Les attaques de type Vol sont\nprioritaires."
    it: "Dà priorità alle mosse di tipo\nVolante."
    de: "Ermöglicht es dem Pokémon, mit\nFlug-Attacken zuerst anzugreifen."
    es: "Da prioridad a los movimientos de\ntipo Volador."
    ko: "비행타입의 기술이\n먼저 나오게 된다."
gluttony:
  names:
    jp_kana: くいしんぼう
    jp_kanji: くいしんぼう
    en: Gluttony
    fr: Gloutonnerie
    it: Voracità
    de: Völlerei
    es: Gula
    ko: 먹보
  descriptions:
    jp_kana: "きのみを　いつもより\nはやく　つかう。"
    jp_kanji: "きのみを　いつもより\n早く　使う。"
    en: "Makes the Pokémon use a held\nBerry earlier than usual."
    fr: "Permet d’utiliser plus rapidement\nune Baie tenue."
    it: "Favorisce l’uso anticipato di\nuna bacca tenuta dal Pokémon."
    de: "Ermutigt zum frühzeitigen Einsatz\nvon Beeren."
    es: "Fomenta el uso rápido de la baya\nque porte."
    ko: "나무열매를 여느 때보다\n빨리 사용한다."
gooey:
  names:
    jp_kana: ぬめぬめ
    jp_kanji: ぬめぬめ
    en: Gooey
    fr: Poisseux
    it: Viscosità
    de: Viskosität
    es: Baba
    ko: 미끈미끈
  descriptions:
    jp_kana: "ふれた　あいての\nすばやさを　さげる。"
    jp_kanji: "触れた　相手の\n素早さを　さげる。"
    en: "Contact with the Pokémon\nlowers the attacker’s Speed stat."
    fr: "Diminue la Vitesse de l’attaquant\nqui le touche."
    it: "Riduce la Velocità del Pokémon\ncon cui entra in contatto."
    de: "Die Initiative von Angreifern sinkt\ndurch bloßes Berühren."
    es: "Baja la Velocidad del Pokémon\ncon el que entra en contacto."
    ko: "접촉한 상대의\n스피드를 떨어뜨린다."
grass_pelt:
  names:
    jp_kana: くさのけがわ
    jp_kanji: くさのけがわ
    en: Grass Pelt
    fr: Toison Herbue
    it: Peloderba
    de: Pflanzenpelz
    es: Manto Frondoso
    ko: 풀모피
  descriptions:
    jp_kana: "グラスフィールドのとき\nぼうぎょが　あがる。"
    jp_kanji: "グラスフィールドの時\n防御が　あがる。"
    en: "Boosts the Defense stat\nin Grassy Terrain."
    fr: "Augmente la Défense si\nChamp Herbu est actif."
    it: "Aumenta la Difesa durante\nl’effetto di Campo Erboso."
    de: "Erhöht die Verteidigung,\nwenn Grasfeld aktiv ist."
    es: "Aumenta la Defensa mientras dura\nel efecto de Campo de Hierba."
    ko: "그래스필드일 때\n방어가 올라간다."
guts:
  names:
    jp_kana: こんじょう
    jp_kanji: こんじょう
    en: Guts
    fr: Cran
    it: Dentistretti
    de: Adrenalin
    es: Agallas
    ko: 근성
  descriptions:
    jp_kana: "じょうたい　いじょうで\nこうげきが　あがる。"
    jp_kanji: "状態異常で\n攻撃が　あがる。"
    en: "Boosts the Attack stat if the\nPokémon has a status condition."
    fr: "Augmente l’Attaque s’il y a un\nproblème de statut."
    it: "Aumenta l’Attacco in caso di\nproblemi di stato."
    de: "Steigert bei Statusproblemen\nden Angriffs-Wert."
    es: "Sube el Ataque si sufre un\nproblema de estado."
