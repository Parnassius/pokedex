charcoal:
  names:
    jp_kana: もくたん
    jp_kanji: もくたん
    en: Charcoal
    fr: Charbon
    it: Carbonella
    de: Holzkohle
    es: Carbón
    ko: 목탄
    zh_simp: 木炭
    zh_trad: 木炭
  descriptions:
    jp_kana: "ものを　もやす　ねんりょう。\nもたせると　ほのおタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "ものを　燃やす　燃料。\n持たせると　ほのおタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a combustible\nfuel that boosts the power of Fire-type moves."
    fr: "Objet à tenir. Un combustible qui augmente\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon.\nSostanza combustibile che potenzia le mosse\ndi tipo Fuoco."
    de: "Ein Item zum Tragen. Ein Brennstoff, der Attacken\nvom Typ Feuer verstärkt."
    es: "Actúa como combustible y potencia los movimientos\nde tipo Fuego. Debe llevarlo un Pokémon."
    ko: "물건을 태우는 연료.\n지니게 하면 불꽃타입\n기술의 위력이 올라간다."
    zh_simp: "焚烧用的燃料。\n携带后，火属性的\n招式威力就会提高。"
    zh_trad: "燒東西的燃料。\n攜帶後，火屬性的\n招式威力就會提高。"
charizardite_x:
  names:
    jp_kana: リザードナイトＸ
    jp_kanji: リザードナイトＸ
    en: Charizardite X
    fr: Dracaufite X
    it: Charizardite X
    de: Gluraknit X
    es: Charizardita X
    ko: 리자몽나이트X
    zh_simp: 喷火龙进化石Ｘ
    zh_trad: 噴火龍進化石Ｘ
  descriptions:
    jp_kana: "たたかいのとき　リザードンを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　リザードンを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Charizard to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Dracaufeu de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Charizard di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Glurak, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Charizard en combate."
    ko: "배틀할 때 리자몽을\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让喷火龙\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓噴火龍進行超級進化的\n一種神奇超級石。"
charizardite_y:
  names:
    jp_kana: リザードナイトＹ
    jp_kanji: リザードナイトＹ
    en: Charizardite Y
    fr: Dracaufite Y
    it: Charizardite Y
    de: Gluraknit Y
    es: Charizardita Y
    ko: 리자몽나이트Y
    zh_simp: 喷火龙进化石Ｙ
    zh_trad: 噴火龍進化石Ｙ
  descriptions:
