dawn_stone:
  names:
    jp_kana: めざめいし
    jp_kanji: めざめいし
    en: Dawn Stone
    fr: Pierre Aube
    it: Pietralbore
    de: Funkelstein
    es: Piedra Alba
    ko: 각성의돌
    zh_simp: 觉醒之石
    zh_trad: 覺醒之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひとみのように　まばゆい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひとみのように　まばゆい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It sparkles like a glittering eye."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle brille comme un œil."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È luccicante come gli occhi."
    de: "Dieser besondere, glitzernde Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Brilla como un lucero."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈동자처럼 아름답다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像眼眸一般光彩动人。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像眼眸一般光彩動人。"
decidium_z:bag:
  names:
    jp_kana: ジュナイパーＺ
    jp_kanji: ジュナイパーＺ
    en: Decidium Z
    fr: Archézélite
    it: Deciduenium Z
    de: Silvarronium Z
    es: Dueyestal Z
    ko: 모크나이퍼Z
    zh_simp: 狙射树枭Ｚ
    zh_trad: 狙射樹梟Ｚ
  descriptions:
    jp_kana: "ジュナイパーの　かげぬいを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ジュナイパーの　かげぬいを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDecidueye’s Spirit Shackle to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Archéduc qui le tient à transformer\nson Tisse Ombre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Decidueye di trasformare la mossa\nCucitura d’Ombra in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Silvarros Attacke\nSchattenfessel zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nDecidueye convertir su Puntada Sombría en un\nmovimiento Z."
    ko: "모크나이퍼의 그림자꿰매기를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将狙射树枭的缝影\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把狙射樹梟的縫影\n升級為特殊Ｚ招式的Ｚ力量結晶。"
decidium_z:held:
  names:
    jp_kana: ジュナイパーＺ
    jp_kanji: ジュナイパーＺ
    en: Decidium Z
    fr: Archézélite
    it: Deciduenium Z
    de: Silvarronium Z
    es: Dueyestal Z
    ko: 모크나이퍼Z
    zh_simp: 狙射树枭Ｚ
    zh_trad: 狙射樹梟Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nジュナイパーの　かげぬいを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nジュナイパーの　かげぬいを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Decidueye’s Spirit Shackle to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Tisse Ombre d’un Archéduc\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Cucitura d’Ombra\ndi Decidueye in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Silvarros Attacke Schattenfessel\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nPuntada Sombría de Decidueye."
    ko: "Z파워의 결정.\n모크나이퍼의 그림자꿰매기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将狙射树枭的缝影\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把狙射樹梟的縫影\n升級為Ｚ招式。"
deep_sea_scale:
  names:
    jp_kana: しんかいのウロコ
    jp_kanji: しんかいのウロコ
    en: Deep Sea Scale
    fr: Écaille Océan
    it: Squamabissi
    de: Abyssplatte
    es: Escama Marina
    ko: 심해의비늘
    zh_simp: 深海鳞片
    zh_trad: 深海鱗片
  descriptions:
    jp_kana: "パールルに　もたせると\nとくぼうが　あがる　ウロコ。\nうすい　ピンクいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特防が　あがる　ウロコ。\nうすい　ピンク色に　光る。"
    en: "An item to be held by Clamperl. This scale shines\nwith a faint pink and raises the holder’s\nSp. Def stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne écaille de couleur rose qui augmente\nsa Défense Spéciale."
    it: "Strumento da dare a Clamperl.\nSquama dai bagliori rosei che aumenta\nla Difesa Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert pink und hebt die\nSpezial-Verteidigung."
    es: "Tiene un débil brillo rosado y debe llevarla Clamperl.\nSube la Defensa Especial."
    ko: "진주몽에게 지니게 하면\n특수방어가 올라가는 비늘.\n연한 분홍색으로 빛난다."
    zh_simp: "让珍珠贝携带后，\n特防就会提高的鳞片。\n散发着淡淡的粉红色光芒。"
    zh_trad: "讓珍珠貝攜帶後，\n特防就會提高的鱗片。\n散發著淡淡的粉紅色光芒。"
deep_sea_tooth:
  names:
    jp_kana: しんかいのキバ
    jp_kanji: しんかいのキバ
    en: Deep Sea Tooth
    fr: Dent Océan
    it: Dente Abissi
    de: Abysszahn
    es: Diente Marino
    ko: 심해의이빨
    zh_simp: 深海之牙
    zh_trad: 深海之牙
  descriptions:
    jp_kana: "パールルに　もたせると\nとくこうが　あがる　キバ。\nするどく　ぎんいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特攻が　あがる　キバ。\n鋭く　銀色に　光る。"
    en: "An item to be held by Clamperl. This fang gleams a\nsharp silver and raises the holder’s Sp. Atk stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne dent de couleur argent qui augmente\nson Attaque Spéciale."
    it: "Strumento da dare a Clamperl.\nDente dai bagliori argentei che aumenta\nl’Attacco Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert silbern und hebt den Spezial-Angriff."
    es: "Tiene el brillo afilado de la plata y debe llevarlo\nClamperl. Sube el Ataque Especial."
    ko: "진주몽에게 지니게 하면\n특수공격이 올라가는 이빨.\n날카로운 은색으로 빛난다."
    zh_simp: "让珍珠贝携带后，\n特攻就会提高的牙齿。\n散发着闪亮的银光。"
    zh_trad: "讓珍珠貝攜帶後，\n特攻就會提高的牙齒。\n散發著銳利的銀色光芒。"
destiny_knot:
  names:
    jp_kana: あかいいと
    jp_kanji: あかいいと
    en: Destiny Knot
    fr: Nœud Destin
    it: Destincomune
    de: Fatumknoten
    es: Lazo Destino
    ko: 빨간실
    zh_simp: 红线
    zh_trad: 紅線
  descriptions:
    jp_kana: "ほそくて　ながい　まっかな　いと。\nもたせると　メロメロに　なったとき\nあいても　メロメロに　できる。"
    jp_kanji: "細くて　長い　真っ赤な　糸。\n持たせると　メロメロに　なったとき\n相手も　メロメロに　できる。"
    en: "An item to be held by a Pokémon. If the holder\nbecomes infatuated, the opposing Pokémon will\nbe, too."
    fr: "Un long fil rouge vif à faire tenir à un Pokémon.\nSi le porteur tombe amoureux, l’ennemi aussi."
    it: "Gomitolo di filo rosso sottile da dare a un Pokémon.\nSe il Pokémon rimane infatuato, contagia anche\nil nemico."
    de: "Ein Item zum Tragen. Wird der Träger betört,\ngilt dies auch für den Angreifer."
    es: "Un hilo largo y delgado de color rojo que transmite\nel enamoramiento del Pokémon que lo lleva a su\nobjetivo."
    ko: "가늘고 긴 새빨간 실.\n지니게 하면 자신이 헤롱헤롱해졌을 때\n상대도 헤롱헤롱해지게 된다."
    zh_simp: "长长的鲜红色细线。\n携带后，在自己着迷时\n能让对手也着迷。"
    zh_trad: "長長的大紅色細線。\n攜帶後，陷入著迷狀態時，\n也能使對手陷入著迷狀態。"
devon_parts:
  names:
    jp_kana: デボンのにもつ
    jp_kanji: デボンのにもつ
    en: Devon Parts
    fr: Pack Devon
    it: Merce Devon
    de: Devon-Waren
    es: Piezas Devon
    ko: 데봉화물
    zh_simp: 得文的物品
    zh_trad: 得文的物品
  descriptions:
    jp_kana: "デボンで　つくられた\nなにかの　パーツが\nはいっている　にもつ。"
    jp_kanji: "デボンで　つくられた\n何かの　パーツが\n入っている　にもつ。"
    en: "A case that contains mechanical parts of some sort\nmade by the Devon Corporation."
    fr: "Une valise qui contient des pièces mécaniques\nfabriquées par la société Devon."
    it: "Questa valigetta contiene pezzi meccanici\nprodotti dalla Devon."
    de: "Ein Metallkoffer mit irgendwelchen Bauteilen,\ndie von der Devon Corporation angefertigt wurden."
    es: Contiene piezas de algo fabricado por Devon S. A.
    ko: "데봉에서 만들어진\n무언가의 파츠가\n들어 있는 화물."
    zh_simp: "此物品里面放着的是\n得文制造的某种零件。"
    zh_trad: "裡面放有得文製造的\n某種零件的物品。"
devon_scope:
  names:
    jp_kana: デボンスコープ
    jp_kanji: デボンスコープ
    en: Devon Scope
    fr: Devon Scope
    it: Devonscopio
    de: Devon-Scope
    es: Detector Devon
    ko: 데봉스코프
    zh_simp: 得文侦测镜
    zh_trad: 得文偵測鏡
  descriptions:
    jp_kana: "みえない　ポケモンに\nはんのうして　おとをだす\nデボンの　とくせいひん。"
    jp_kanji: "見えない　ポケモンに\n反応して　音をだす\nデボンの　特製品。"
    en: "A special device made by Devon Corporation that\nsignals the presence of any unseen Pokémon."
    fr: "Ce produit en série limitée de Devon émet un signal\nsonore pour signaler la présence de Pokémon invisibles."
    it: "Congegno prodotto dalla Devon che rileva\nla presenza di Pokémon nascosti emettendo\nun segnale sonoro."
    de: "Ein von der Devon Corporation hergestelltes Gerät,\ndas mit einem Signalton auf unsichtbare Pokémon\nreagiert."
    es: "Artilugio creado por Devon S. A. que reacciona\na la presencia de Pokémon invisibles emitiendo\nsonidos."
    ko: "보이지 않는 포켓몬에\n반응하여 소리를 내는\n데봉의 특제품."
    zh_simp: "会对看不见的宝可梦起反应，\n并发出声音的得文特制产品。"
    zh_trad: "會對看不見的寶可夢起反應，\n並發出聲音的得文特製產品。"
devon_scuba_gear:
  names:
    jp_kana: デボンボンベ
    jp_kanji: デボンボンベ
    en: Devon Scuba Gear
    fr: Plongeur Devon
    it: Maschera Devon
    de: Devon-Atemgerät
    es: Bombona Devon
    ko: 데봉봄베
    zh_simp: 得文潜水装备
    zh_trad: 得文潛水裝備
  descriptions:
    jp_kana: "ダイビング　ちゅうに　みにつける\nさんそ　ほきゅうよう　マスク。\nデボンで　つくられた。"
    jp_kanji: "ダイビング中に　身につける\n酸素補給用の　マスク。\nデボンで　つくられた。"
    en: "A device made by Devon Corporation that provides\noxygen to users during the use of Dive."
    fr: "Un masque à oxygène fabriqué par la société Devon\net utilisé pour la plongée sous-marine."
    it: "Maschera di ossigeno prodotta dalla Devon,\nutile durante le immersioni."
    de: "Eine von der Devon Corporation hergestellte Maske,\ndie Taucher unter Wasser mit ausreichend\nSauerstoff versorgt."
    es: "Máscara que surte de oxígeno durante las inmersiones\nen el agua. Producto de Devon S. A."
    ko: "다이빙할 때 몸에 착용하는\n산소 호흡용 마스크.\n데봉에서 만들어졌다."
    zh_simp: "潜水时装备在身上\n用来呼吸氧气的面罩。\n得文制造。"
    zh_trad: "潛水時裝備在身上\n用來呼吸氧氣的面罩。\n得文製造。"
diancite:
  names:
    jp_kana: ディアンシナイト
    jp_kanji: ディアンシナイト
    en: Diancite
    fr: Diancite
    it: Diancite
    de: Diancienit
    es: Diancita
    ko: 디안시나이트
    zh_simp: 蒂安希进化石
    zh_trad: 蒂安希進化石
  descriptions:
    jp_kana: "ディアンシーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ディアンシーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Diancie hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Diancie, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Diancie, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Diancie getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Diancie en combate."
    ko: "디안시에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让蒂安希携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓蒂安希攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
diglett_candy:
  names:
    jp_kana: ディグダのアメ
    jp_kanji: ディグダのアメ
    en: Diglett Candy
    fr: Bonbon Taupiqueur
    it: Caramella Diglett
    de: Digda-Bonbon
    es: Caramelo Diglett
    ko: 디그다의사탕
    zh_simp: 地鼠的糖果
    zh_trad: 地鼠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dire_hit:
  names:
    jp_kana: クリティカット
    jp_kanji: クリティカット
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: Angriffplus
    es: Directo
    ko: 크리티컬커터
    zh_simp: 要害攻击
    zh_trad: 要害攻擊
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nいちどしか　つかうことが　できない。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n１度しか　使うことが　できない。\nひっこめると　元に　戻る。"
    en: "An item that greatly raises the critical-hit ratio of\na Pokémon during a battle. It can be used only once\nand wears off if the Pokémon is withdrawn."
    fr: "Augmente fortement le taux de critique.\nUtilisable une seule fois. L’effet disparaît si le Pokémon\nest retiré."
    it: "Aumenta la probabilità di sferrare brutti colpi.\nSi può usare una sola volta e l’effetto svanisce\nse il Pokémon è sostituito."
    de: "Hebt einmalig die Volltrefferquote des Pokémon\nim Kampf stark an. Die Wirkung endet mit dem\nAustausch des Pokémon."
    es: "Aumenta el índice de golpe crítico en combate.\nSolo se puede usar una vez y, al cambiar de\nPokémon, el efecto desaparece."
    ko: "급소 명중률이 크게 올라간다.\n한 번밖에 쓸 수 없다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会大幅提高。\n只能使用１次。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會大大提高。\n只能使用１次。\n離場後，效果便會消失。"
dire_hit_2:
  names:
    jp_kana: クリティカット２
    jp_kanji: クリティカット２
    en: Dire Hit 2
    fr: Muscle 2
    it: Supercolpo 2
    de: Angriffplus2
    es: Directo 2
    ko: 크리티컬커터2
    zh_simp: 要害攻击２
    zh_trad: 要害攻擊２
  descriptions:
    jp_kana: "きゅうしょりつが　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to raise the critical-hit\nratio of one Pokémon. It wears off if the Pokémon\nis withdrawn."
    fr: "Augmente le taux de critique.\nPlus efficace à chaque utilisation. L’effet s’estompe\nsi le Pokémon est retiré."
    it: "Aumenta la probabilità di sferrare brutti colpi.\nSe usato più volte, l’effetto si somma, ma svanisce\nse il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote. Effektiver bei\nmehrfacher Anwendung. Wirksam, bis das\nPokémon ausgewechselt wird."
    es: "Aumenta la probabilidad de asestar un golpe crítico.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "급소 명중률이 올라간다. 사용할 때마다\n효과가 올라간다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会提高。\n每次使用效果都会提升。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會提高。\n每次使用效果都會提升。\n離場後，效果便會復原。"
dire_hit_3:
  names:
    jp_kana: クリティカット３
    jp_kanji: クリティカット３
    en: Dire Hit 3
    fr: Muscle 3
    it: Supercolpo 3
    de: Angriffplus3
    es: Directo 3
    ko: 크리티컬커터3
    zh_simp: 要害攻击３
    zh_trad: 要害攻擊３
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to greatly raise a\nPokémon’s critical-hit ratio. It wears off if the\nPokémon is withdrawn."
    fr: "Augmente fortement le taux de critique.\nPlus efficace à chaque utilisation. L’effet s’estompe\nsi le Pokémon est retiré."
    it: "Aumenta moltissimo la probabilità di sferrare\nbrutti colpi. L’effetto si può sommare, ma\nsvanisce se il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote stark. Bei mehrfachem\nGebrauch effektiver. Wirkt, bis das Pokémon\nausgewechselt wird."
    es: "Aumenta mucho la probabilidad de asestar un golpe\ncrítico. Al cambiar de Pokémon, su efecto desaparece."
    ko: "급소 명중률이 크게 올라간다. 사용할\n때마다 효과가 올라간다. 포켓몬을\n볼에 넣어버리면 원래대로 되돌아간다."
    zh_simp: "击中要害的几率会大幅提高。\n每次使用效果都会提升。\n离场后，效果便会消失。"
    zh_trad: "擊中要害的機率會大大提高。\n每次使用效果都會提升。\n離場後，效果便會消失。"
discount_coupon:
  names:
    jp_kana: バーゲンチケット
    jp_kanji: バーゲンチケット
    en: Discount Coupon
    fr: Bon Réduction
    it: Buono sconto
    de: Rabattmarke
    es: Vale Descuento
    ko: 바겐세일티켓
    zh_simp: 折价券
    zh_trad: 折價券
  descriptions:
    jp_kana: "ブティックで　アイテムを　かうとき\nいつもより　やすくなる　チケット。"
    jp_kanji: "ブティックで　アイテムを　買うとき\nいつもより　安くなる　チケット。"
    en: "This special coupon allows you to buy items at a\ndiscount when you are shopping at a boutique."
    fr: "Un ticket donnant droit à une réduction dans\nles boutiques de vêtements."
    it: "Buono che permette di avere uno sconto sugli\nacquisti nei negozi di abbigliamento."
    de: "Ein Coupon, mit dem du in Boutiquen günstiger\neinkaufen kannst."
    es: "Con este vale te harán jugosos descuentos\ncuando vayas de compras a una Boutique."
    ko: "부티크에서 아이템을 살 때\n평소보다 저렴해지는 티켓."
    zh_simp: "在时装店买道具时，\n能以比平时更低的\n价格购买的券。"
    zh_trad: "在時裝店買物品時，\n能以比平時更低的\n價格購買的券。"
ditto_candy:
  names:
    jp_kana: メタモンのアメ
    jp_kanji: メタモンのアメ
    en: Ditto Candy
    fr: Bonbon Métamorph
    it: Caramella Ditto
    de: Ditto-Bonbon
    es: Caramelo Ditto
    ko: 메타몽의사탕
    zh_simp: 百变怪的糖果
    zh_trad: 百變怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dive_ball:
  names:
    jp_kana: ダイブボール
    jp_kanji: ダイブボール
    en: Dive Ball
    fr: Scuba Ball
    it: Sub Ball
    de: Tauchball
    es: Buceo Ball
    ko: 다이브볼
    zh_simp: 潜水球
    zh_trad: 潛水球
  descriptions:
    jp_kana: "みずの　せかいで　くらしている\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "水の　世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that works\nespecially well when catching Pokémon that\nlive underwater."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon sous-marins."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon che vivono in acqua."
    de: "Ein Ball, mit dem sich Pokémon, die im Wasser leben,\nbesser fangen lassen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon que viven\nbajo el agua."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n生活在水世界里的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n生活在水中世界的寶可夢。"
dna_splicers:fuse:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
    zh_simp: 基因之楔
    zh_trad: 基因之楔
  descriptions:
    jp_kana: "もとは　ひとつだったと　いわれる\nキュレムと　あるポケモンを\nがったいさせる　いっついの　くさび。"
    jp_kanji: "元は　ひとつだったと　いわれる\nキュレムと　あるポケモンを\n合体させる　一対の　くさび。"
    en: "A splicer that fuses Kyurem and a certain Pokémon.\nThey are said to have been one in the beginning."
    fr: "Un outil qui permet la fusiorption de Kyurem\net d’un autre Pokémon avec lequel il ne faisait\nqu’un à l’origine."
    it: "Cuneo che permette di fondere Kyurem con il\nPokémon al quale era unito in origine."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vermeintlich einst eins gewesen sind,\nvereinigt."
    es: "Punta que permite fusionar a Kyurem con cierto\nPokémon con el que, originariamente, formaba\nun solo ser."
    ko: "원래는 하나였다고 전해지는\n큐레무와 어떤 포켓몬을\n합체시키는 한 쌍의 쐐기."
    zh_simp: "据说是能让原本为一体的\n酋雷姆和某宝可梦\n合体的一对楔子。"
    zh_trad: "能讓據說原是一體的酋雷姆和\n某寶可夢合體的一對楔子。"
dna_splicers:separate:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
    zh_simp: 基因之楔
    zh_trad: 基因之楔
  descriptions:
    jp_kana: "がったいした　キュレムと\nあるポケモンを　もとどおりに\nぶんりさせる　いっついの　くさび。"
    jp_kanji: "合体した　キュレムと\nあるポケモンを　元通りに\n分離させる　一対の　くさび。"
    en: "A splicer that separates Kyurem and a certain\nPokémon when they have been fused."
    fr: "Un outil qui permet de séparer Kyurem et le Pokémon\navec lequel il a fusiorbé."
    it: "Cuneo che permette di separare Kyurem\ndal Pokémon con cui era fuso."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vereinigt wurden, voneinander trennt."
    es: "Punta que permite separar a Kyurem del Pokémon\ncon el que se ha fusionado."
    ko: "합체한 큐레무와\n어떤 포켓몬을 원래대로\n분리시키는 한 쌍의 쐐기."
    zh_simp: "能让合体后的\n酋雷姆和某宝可梦\n分离成原状的一对楔子。"
    zh_trad: "能讓合體後的\n酋雷姆和某寶可夢\n分離至原狀的一對楔子。"
doduo_candy:
  names:
    jp_kana: ドードーのアメ
    jp_kanji: ドードーのアメ
    en: Doduo Candy
    fr: Bonbon Doduo
    it: Caramella Doduo
    de: Dodu-Bonbon
    es: Caramelo Doduo
    ko: 두두의사탕
    zh_simp: 嘟嘟的糖果
    zh_trad: 嘟嘟的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dome_fossil:
  names:
    jp_kana: こうらのカセキ
    jp_kanji: こうらのカセキ
    en: Dome Fossil
    fr: Fossile Dôme
    it: Domofossile
    de: Domfossil
    es: Fósil Domo
    ko: 껍질화석
    zh_simp: 甲壳化石
    zh_trad: 甲殼化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nこうらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nこうらの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It could be a shell or carapace."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de carapace."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una corazza."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es sieht wie eine Muschelschale\noder ein Rückenschild aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de caparazón."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등껍질의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是甲壳的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是甲殼的一部分。"
douse_drive:
  names:
    jp_kana: アクアカセット
    jp_kanji: アクアカセット
    en: Douse Drive
    fr: Module Aqua
    it: Idromodulo
    de: Aquamodul
    es: HidroROM
    ko: 아쿠아카세트
    zh_simp: 水流卡带
    zh_trad: 水流卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nみずタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nみずタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nWater type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Eau."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo Acqua."
    de: "Gibt man es Genesect zum Tragen, wandelt es den\nTyp der Attacke Techblaster in Wasser um."
    es: "Cartucho que convierte Tecno Shock de Genesect\nen un movimiento de tipo Agua."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n물타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为水属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為水屬性。"
dowsing_machine:
  names:
    jp_kana: ダウジングマシン
    jp_kanji: ダウジングマシン
    en: Dowsing Machine
    fr: Cherch’Objet
    it: Ricerca strum.
    de: Itemradar
    es: Zahorí
    ko: 다우징머신
    zh_simp: 探宝器
    zh_trad: 探寶器
  descriptions:
    jp_kana: "みえない　どうぐに　はんのうして\nばしょを　おしえてくれる　さいしんの\nきかい。あたまに　つけて　つかう。"
    jp_kanji: "みえない　道具に　反応して\n場所を　教えてくれる　最新の　機械。\n頭に　つけて　使う。"
    en: "A high-tech machine that shows the location of\ninvisible items. It’s attached to the head when\nin use."
    fr: "Un appareil high-tech qui indique l’emplacement\ndes objets invisibles. Il se porte sur la tête."
    it: "Dispositivo ultramoderno che rileva la presenza\ndi strumenti non visibili a occhio nudo.\nSi indossa sulla testa."
    de: "Scannt die Umgebung nach unsichtbaren Items und\nzeigt an, wo diese sich befinden. Es wird auf dem\nKopf getragen."
    es: "Aparato de precisión que reacciona ante objetos\nque no se ven. Para usarlo, es necesario\ncolocárselo en la cabeza."
    ko: "보이지 않는 도구에 반응해서\n장소를 가르쳐주는 최신 기계.\n머리에 쓰고 사용한다."
    zh_simp: "会对看不见的道具起反应，\n并将它的位置告诉你的最尖端机器。\n戴在头上使用。"
    zh_trad: "會對看不見的道具起反應，\n並將它的位置告訴你的最尖端機器。\n戴在頭上使用。"
draco_plate:
  names:
    jp_kana: りゅうのプレート
    jp_kanji: りゅうのプレート
    en: Draco Plate
    fr: Plaque Draco
    it: Lastradrakon
    de: Dracotafel
    es: Tabla Draco
    ko: 용의플레이트
    zh_simp: 龙之石板
    zh_trad: 龍之石板
  descriptions:
    jp_kana: "ドラゴンの　タイプの　せきばん。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　石盤。\n持たせると　ドラゴンタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Dragon-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Drache."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Dragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 석판.\n지니게 하면 드래곤타입\n기술의 위력이 강해진다."
    zh_simp: "龙属性的石板。\n携带后，龙属性的\n招式威力就会增强。"
    zh_trad: "龍屬性的石板。\n攜帶後，龍屬性的\n招式威力就會增強。"
dragon_fang:
  names:
    jp_kana: りゅうのキバ
    jp_kanji: りゅうのキバ
    en: Dragon Fang
    fr: Croc Dragon
    it: Dentedidrago
    de: Drachenzahn
    es: Colmillo Dragón
    ko: 용의이빨
    zh_simp: 龙之牙
    zh_trad: 龍之牙
  descriptions:
    jp_kana: "かたくて　するどい　キバ。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "硬くて　鋭い　キバ。\n持たせると　ドラゴンタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This hard and\nsharp fang boosts the power of\nDragon-type moves."
    fr: "Objet à tenir. Un croc dur et pointu qui augmente\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nDente duro e affilato che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Ein harter und scharfer\nReißzahn, der Attacken vom Typ Drache verstärkt."
    es: "Colmillo de gran dureza que refuerza los movimientos\nde tipo Dragón. Debe llevarlo un Pokémon."
    ko: "단단하고 날카로운 이빨.\n지니게 하면 드래곤타입\n기술의 위력이 올라간다."
    zh_simp: "坚硬锐利的牙齿。\n携带后，龙属性的\n招式威力就会提高。"
    zh_trad: "堅硬銳利的牙齒。\n攜帶後，龍屬性的\n招式威力就會提高。"
dragon_gem:
  names:
    jp_kana: ドラゴンジュエル
    jp_kanji: ドラゴンジュエル
    en: Dragon Gem
    fr: Joyau Dragon
    it: Bijoudrago
    de: Drakojuwel
    es: Gema Dragón
    ko: 드래곤주얼
    zh_simp: 龙之宝石
    zh_trad: 龍之寶石
  descriptions:
    jp_kana: "ドラゴンの　タイプの　ジュエル。\nもたせると　いちどだけ　ドラゴンの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　ジュエル。\n持たせると　１度だけ　ドラゴンの\n技の　威力が　強まる。"
    en: "A gem with a draconic essence. When held, it\nstrengthens the power of a Dragon-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Drago."
    de: "Ein Juwel vom Typ Drache. Es erhöht einmalig die\nStärke einer Attacke vom Typ Drache."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Dragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 주얼.\n지니게 하면 한 번만 드래곤\n기술의 위력이 강해진다."
    zh_simp: "龙属性的宝石。\n携带后，龙属性的\n招式威力仅会增强１次。"
    zh_trad: "龍屬性的寶石。\n攜帶後，龍屬性招式的\n威力會僅增強１次。"
dragon_memory:
  names:
    jp_kana: ドラゴンメモリ
    jp_kanji: ドラゴンメモリ
    en: Dragon Memory
    fr: ROM Dragon
    it: ROM Drago
    de: Drachen-Disc
    es: Disco Dragón
    ko: 드래곤메모리
    zh_simp: 龙存储碟
    zh_trad: 龍記憶碟
  descriptions:
    jp_kana: "ドラゴンタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "ドラゴンタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Dragon-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Dragon. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Drago in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Drache.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nDragón. Permite cambiar de tipo a cierto Pokémon."
    ko: "드래곤타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有龙属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有龍屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
dragon_scale:
  names:
    jp_kana: りゅうのウロコ
    jp_kanji: りゅうのウロコ
    en: Dragon Scale
    fr: Écaille Draco
    it: Squama Drago
    de: Drachenhaut
    es: Escama Dragón
    ko: 용의비늘
    zh_simp: 龙之鳞片
    zh_trad: 龍之鱗片
  descriptions:
    jp_kana: "かたくて　じょうぶな　ウロコ。\nドラゴンタイプの　ポケモンが\nもっていることが　ある。"
    jp_kanji: "硬くて　丈夫な　ウロコ。\nドラゴンタイプの　ポケモンが\n持っていることが　ある。"
    en: "A very tough and inflexible scale. Dragon-type\nPokémon may be holding this item when caught."
    fr: "Une écaille épaisse et dure, parfois tenue par\nles Pokémon de type Dragon quand ils sont attrapés."
    it: "Squama spessa e dura.\nPuò averla un Pokémon di tipo Drago quando\nviene catturato."
    de: "Eine dicke und starke Haut. Drachen-Pokémon\ntragen dieses Item gern bei sich."
    es: "Una gruesa y resistente escama que pueden llevar los\nPokémon de tipo Dragón cuando son capturados."
    ko: "단단하고 튼튼한 비늘.\n드래곤타입의 포켓몬이\n지니고 있는 경우가 있다."
    zh_simp: "又硬又坚固的鳞片。\n龙属性宝可梦有时会携带它。"
    zh_trad: "又硬又結實的鱗片。\n有時龍屬性寶可夢\n會攜帶著它。"
dragon_skull:
  names:
    jp_kana: ドラゴンのホネ
    jp_kanji: ドラゴンのホネ
    en: Dragon Skull
    fr: Crâne Dragon
    it: Teschio
    de: Drakoschädel
    es: Cráneo Dragón
    ko: 드래곤의뼈
    zh_simp: 龙之骨
    zh_trad: 龍之骨
  descriptions:
    jp_kana: "あれくるう　うみを　ものともせず\nじゆうに　とびまわっていたと　される\nポケモンの　あたまの　ホネ。"
    jp_kanji: "荒れ狂う　海を　ものともせず\n自由に　とびまわっていたと　される\nポケモンの　頭の　ホネ。"
    en: "A skull of a Pokémon that was said to have braved\nthe angry waters to fly around the world."
    fr: "Le crâne d’un Pokémon qui aurait survolé librement\nla mer déchaînée."
    it: "Teschio di un Pokémon che sorvolava libero i mari\nsenza temere neanche le più forti tempeste."
    de: "Der Schädel eines Pokémon, das einst wütendem\nSeegang zum Trotz frei um die Welt flog."
    es: "Cráneo de un Pokémon. Se dice que este Pokémon\ncruzó mares embravecidos."
    ko: "성난 바다 위를 개의치 않고\n자유롭게 날아다녔다는\n포켓몬의 머리뼈."
    zh_simp: "据说是能在狂风暴雨的\n大海上随意翱翔的宝可梦的头骨。"
    zh_trad: "據說是能在狂風暴雨的\n大海上任意翱翔的\n寶可夢的頭骨。"
dragonium_z:bag:
  names:
    jp_kana: ドラゴンＺ
    jp_kanji: ドラゴンＺ
    en: Dragonium Z
    fr: Dracozélite
    it: Draconium Z
    de: Dracium Z
    es: Dracostal Z
    ko: 드래곤Z
    zh_simp: 龙Ｚ
    zh_trad: 龍Ｚ
  descriptions:
    jp_kana: "ドラゴンタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ドラゴンタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDragon-type moves to Dragon-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Dragon en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Drago in mosse Z."
    de: "Kristallisierte Z-Kraft, die Drachen-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nDragón en movimientos Z."
    ko: "드래곤타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将龙属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把龍屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
dragonium_z:held:
  names:
    jp_kana: ドラゴンＺ
    jp_kanji: ドラゴンＺ
    en: Dragonium Z
    fr: Dracozélite
    it: Draconium Z
    de: Dracium Z
    es: Dracostal Z
    ko: 드래곤Z
    zh_simp: 龙Ｚ
    zh_trad: 龍Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nドラゴンタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nドラゴンタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Dragon-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Dragon en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Drago\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Drachen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Dragón."
    ko: "Z파워의 결정.\n드래곤타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将龙属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把龍屬性的招式\n升級為Ｚ招式。"
dratini_candy:
  names:
    jp_kana: ミニリュウのアメ
    jp_kanji: ミニリュウのアメ
    en: Dratini Candy
    fr: Bonbon Minidraco
    it: Caramella Dratini
    de: Dratini-Bonbon
    es: Caramelo Dratini
    ko: 미뇽의사탕
    zh_simp: 迷你龙的糖果
    zh_trad: 迷你龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
dread_plate:
  names:
    jp_kana: こわもてプレート
    jp_kanji: こわもてプレート
    en: Dread Plate
    fr: Plaque Ombre
    it: Lastratimore
    de: Furchttafel
    es: Tabla Oscura
    ko: 공포플레이트
    zh_simp: 恶颜石板
    zh_trad: 惡顏石板
  descriptions:
    jp_kana: "あくの　タイプの　せきばん。\nもたせると　あくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　石盤。\n持たせると　あくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Dark-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Unlicht."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Siniestro. Debe llevarla un Pokémon."
    ko: "악타입의 석판.\n지니게 하면 악타입\n기술의 위력이 강해진다."
    zh_simp: "恶属性的石板。\n携带后，恶属性的\n招式威力就会增强。"
    zh_trad: "惡屬性的石板。\n攜帶後，惡屬性的\n招式威力就會增強。"
dream_ball:
  names:
    jp_kana: ドリームボール
    jp_kanji: ドリームボール
    en: Dream Ball
    fr: Rêve Ball
    it: Dream Ball
    de: Traumball
    es: Ensueño Ball
    ko: 드림볼
    zh_simp: 梦境球
    zh_trad: 夢境球
  descriptions:
    jp_kana: "ハイリンクのもりで　いつのまにか\nバッグに　あらわれる　ゆめのボール。\nどんな　ポケモンも　つかまえられる。"
    jp_kanji: "ハイリンクの森で　いつのまにか\nバッグに　現れる　夢のボール。\nどんな　ポケモンも　捕まえられる。"
    en: "A special Poké Ball that appears in your Bag out of\nnowhere in the Entree Forest. It can catch\nany Pokémon."
    fr: "Une Poké Ball du rêve.\nApparue dans le Sac à la Forêt du Heylink.\nPermet d’attraper n’importe quel Pokémon."
    it: "Poké Ball onirica. Appare all’improvviso nella\nBorsa quando si è nel Bosco Intramondo.\nPuò acchiappare qualsiasi Pokémon."
    de: "Ein Ball wie aus einem Traum, der im\nKontaktebenenhain plötzlich im Beutel auftaucht.\nFängt jedes Pokémon."
    es: "Bola especial que aparece de pronto en tu Bolsa\nen el Bosque Nexo y puede atrapar a cualquier\nPokémon."
    ko: "하일링크의 숲에서 어느 사이엔지\n가방 속에 나타나는 꿈의 볼.\n어떤 포켓몬이라도 잡을 수 있다."
    zh_simp: "在连入之森中，不知何时\n出现在包包里的梦中球。\n能捉到任何宝可梦。"
    zh_trad: "在連入之森中，不知何時\n出現在包包裡的夢中球。\n不管哪種寶可夢都能捉到。"
dropped_item:boy:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Oggetto perso
    de: Fundsache
    es: Objeto Perdido
    ko: 잊은물건
    zh_simp: 遗忘物
    zh_trad: 遺忘物
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おとこのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　男の子らしい。"
    en: "The Xtransceiver found at the Nimbasa City\namusement park. It seems it belongs to a boy."
    fr: "Un Vokit trouvé au parc d’attractions de Méanville.\nC’est un modèle pour garçons."
    it: "Interpoké rinvenuto nel parco giochi di Sciroccopoli.\nPare che appartenga a un ragazzo."
    de: "Ein Viso-Caster, der im Vergnügungspark von\nRayono City gefunden wurde. Er scheint einem\nJungen zu gehören."
    es: "Videomisor encontrado en el parque de atracciones\nde Ciudad Mayólica. Parece que pertenece a un chico."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 남자인 것 같다."
    zh_simp: "在雷文市的游乐园里\n捡到的即时通讯器。\n失主好像是个男孩子。"
    zh_trad: "在雷文市的遊樂園裡\n撿到的即時通訊器。\n失主好像是個男孩子。"
dropped_item:girl:
  names:
    jp_kana: わすれもの
