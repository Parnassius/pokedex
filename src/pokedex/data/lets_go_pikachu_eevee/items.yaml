    jp_kana: シャラサブレ
    jp_kanji: シャラサブレ
    en: Shalour Sable
    fr: Sablé Yantreizh
    it: Yantafrollino
    de: Yantara-Sablé
    es: Galleta Yantra
    ko: 사라사블레
    zh_simp: 娑罗沙布蕾
    zh_trad: 娑羅沙布蕾
