    jp_kana: "すきなものを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "好きなものを　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier to write about\nyour favorite things. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour parler de ce que\nl’on aime. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per parlare di ciò che\nsi ama.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem verraten kann,\nwas man gern mag. Gib es einem Pokémon zum\nTragen."
    es: "Carta para escribir sobre tus cosas favoritas. Haz que\nla entregue un Pokémon."
    ko: "좋아하는 것을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
