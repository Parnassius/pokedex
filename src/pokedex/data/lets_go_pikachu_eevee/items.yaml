    jp_kana: "ジュカインに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ジュカインに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sceptile hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Jungko, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sceptile, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Gewaldro getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sceptile en combate."
    ko: "나무킹에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让蜥蜴王携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓蜥蜴王攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
scizorite:
  names:
    jp_kana: ハッサムナイト
    jp_kanji: ハッサムナイト
    en: Scizorite
    fr: Cizayoxite
    it: Scizorite
    de: Scheroxnit
    es: Scizorita
    ko: 핫삼나이트
    zh_simp: 巨钳螳螂进化石
    zh_trad: 巨鉗螳螂進化石
  descriptions:
    jp_kana: "ハッサムに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ハッサムに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Scizor hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Cizayox, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Scizor, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Scherox getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Scizor en combate."
    ko: "핫삼에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨钳螳螂携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
