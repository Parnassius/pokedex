    fr: Bonbon Leveinard
    it: Caramella Chansey
    de: Chaneira-Bonbon
    es: Caramelo Chansey
    ko: 럭키의사탕
    zh_simp: 吉利蛋的糖果
    zh_trad: 吉利蛋的糖果
