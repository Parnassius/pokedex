caterpie_candy:
  names:
    jp_kana: キャタピーのアメ
    jp_kanji: キャタピーのアメ
    en: Caterpie Candy
    fr: Bonbon Chenipan
    it: Caramella Caterpie
    de: Raupy-Bonbon
    es: Caramelo Caterpie
    ko: 캐터피의사탕
    zh_simp: 绿毛虫的糖果
    zh_trad: 綠毛蟲的糖果
  descriptions:
