cell_battery:
  names:
    jp_kana: じゅうでんち
    jp_kanji: じゅうでんち
    en: Cell Battery
    fr: Pile
    it: Ricaripila
    de: Akku
    es: Pila
    ko: 충전지
    zh_simp: 充电电池
    zh_trad: 充電電池
  descriptions:
    jp_kana: "つかいすての　じゅうでんち。\nもたせて　でんきの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　じゅうでんち。\n持たせて　でんきの　技を　受けると\n攻撃が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Attack\nif the holder is hit with an Electric-type attack. It can\nonly be used once."
    fr: "Une pile jetable.\nTenue, elle augmente l’Attaque lorsque le Pokémon\nsubit une attaque de type Électrik."
    it: "Pila monouso. Se il Pokémon che ha questo\nstrumento subisce un attacco di tipo Elettro,\nil suo Attacco aumenta."
    de: "Ein einmalig aufladbarer Akku. Erhöht den Angriff\ndes Trägers, wenn ihn eine Elektro-Attacke trifft."
    es: "Batería de usar y tirar que sube el Ataque de quien\nla lleva cuando recibe un golpe de tipo Eléctrico."
    ko: "단 한 번 쓰면 없어지는 충전지.\n지니게 하고 전기 기술을 받으면\n공격이 올라간다."
    zh_simp: "一次性使用的充电电池。\n携带它的宝可梦如果受到电属性\n招式的攻击，攻击就会提高。"
    zh_trad: "只能使用一次的充電電池。\n攜帶它的寶可夢如果受到電屬性\n招式的攻擊，攻擊就會提高。"
chalky_stone:
  names:
    jp_kana: チョークいし
    jp_kanji: チョークいし
    en: Chalky Stone
    fr: Craie
    it: Gessetto
    de: Kreidestein
    es: Tiza
    ko: 초크돌
    zh_simp: 粉笔石
    zh_trad: 粉筆石
  descriptions:
    jp_kana: "みちの　はしっこで　ひろった\nしろっぽい　ちいさな　いし。"
    jp_kanji: "道の　はしっこで　拾った\n白っぽい　小さな　石。"
    en: A small whitish stone picked up at the edge of the road.
    fr: "Une petite pierre blanchâtre trouvée sur le bord\nde la route."
    it: Piccola pietra biancastra raccolta sul ciglio della strada.
    de: "Ein kleiner Stein mit weißlicher Färbung, der vom\nStraßenrand aufgehoben wurde."
    es: "Piedra de yeso pequeña y blanquecina encontrada en\nla linde de un camino."
    ko: "길가 구석에서 주운\n하얗고 작은 돌."
    zh_simp: "路边捡到的\n白白的小石头。"
    zh_trad: "在路邊撿到的\n白白的小石頭。"
chansey_candy:
  names:
    jp_kana: ラッキーのアメ
    jp_kanji: ラッキーのアメ
