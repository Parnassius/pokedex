charti_berry:
  names:
    jp_kana: ヨロギのみ
    jp_kanji: ヨロギのみ
    en: Charti Berry
    fr: Baie Charti
    it: Baccaciofo
    de: Chiaribeere
    es: Baya Alcho
    ko: 루미열매
    zh_simp: 草蚕果
    zh_trad: 草蠶果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　いわ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　いわ技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nRock-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Roche."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Roccia del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Gestein."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Roca de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 바위 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的岩石属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的岩石屬性招式\n攻擊時，能使其威力減弱。"
cheri_berry:
  names:
    jp_kana: クラボのみ
    jp_kanji: クラボのみ
    en: Cheri Berry
    fr: Baie Ceriz
    it: Baccaliegia
    de: Amrenabeere
    es: Baya Zreza
    ko: 버치열매
    zh_simp: 樱子果
    zh_trad: 櫻子果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nまひを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nまひを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from paralysis on its own\nin battle."
    fr: "Une Baie qui soigne la paralysie lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce dalla\nparalisi."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Paralyse."
    es: "Los Pokémon pueden llevarla o usarla para recuperarse\nde la parálisis."
    ko: "포켓몬에게 지니게 하면\n마비를 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈麻痹。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒麻痺。"
cherish_ball:
  names:
    jp_kana: プレシャスボール
    jp_kanji: プレシャスボール
    en: Cherish Ball
    fr: Mémoire Ball
    it: Pregio Ball
    de: Jubelball
    es: Gloria Ball
    ko: 프레셔스볼
    zh_simp: 贵重球
    zh_trad: 貴重球
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nかなり　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nかなり　珍しい　ボール。"
    en: "A quite rare Poké Ball that has been crafted in order\nto commemorate a special occasion of some sort."
    fr: "Une Poké Ball plutôt rare qui fut créée pour une\noccasion spéciale."
    it: "Poké Ball molto esclusiva creata per commemorare\nun evento speciale."
    de: "Ein seltener Ball, der als Reminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball bastante singular que se creó\npara conmemorar alguna ocasión especial."
    ko: "무언가의 기념품으로\n특별히 만들어진\n상당히 진귀한 볼."
    zh_simp: "相当珍贵的球。\n特制出来的某种纪念品。"
    zh_trad: "作為某種紀念品\n而特別製造的，\n頗稀奇的球。"
chesto_berry:
  names:
    jp_kana: カゴのみ
    jp_kanji: カゴのみ
    en: Chesto Berry
    fr: Baie Maron
    it: Baccastagna
    de: Maronbeere
    es: Baya Atania
    ko: 유루열매
    zh_simp: 零余果
    zh_trad: 零餘果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nねむりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n眠りを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from sleep on its own\nin battle."
    fr: "Une Baie qui soigne le sommeil lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, si risveglia\ndal sonno."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nerwacht es dadurch aus dem Schlaf."
    es: "Los Pokémon pueden llevarla o usarla para despertar\ndel sueño."
    ko: "포켓몬에게 지니게 하면\n잠듦을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈睡眠。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒睡眠。"
chilan_berry:
  names:
    jp_kana: ホズのみ
    jp_kanji: ホズのみ
    en: Chilan Berry
    fr: Baie Zalis
    it: Baccacinlan
    de: Latchibeere
    es: Baya Chilan
    ko: 카리열매
    zh_simp: 灯浆果
    zh_trad: 燈漿果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nノーマル　わざを　うけたとき\nいりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\nノーマル技を　受けたとき\n威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one Normal-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nde type Normal."
    it: "Se un Pokémon ha questa bacca, l’attacco\ndi tipo Normale del nemico viene indebolito."
    de: "Als getragenes Item schwächt diese Beere\ngegnerische Attacken vom Typ Normal."
    es: "Si la lleva un Pokémon, debilita un ataque de tipo\nNormal de un enemigo."
    ko: "포켓몬에게 지니게 하면\n노말 기술을 당했을 때\n위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到一般属性招式攻击时，\n能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到一般屬性招式攻擊時，\n能使其威力減弱。"
chill_drive:
  names:
    jp_kana: フリーズカセット
    jp_kanji: フリーズカセット
    en: Chill Drive
    fr: Module Cryo
    it: Gelomodulo
    de: Gefriermodul
    es: CrioROM
    ko: 프리즈카세트
    zh_simp: 冰冻卡带
    zh_trad: 冰凍卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nこおりタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nこおりタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nIce type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Glace."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo\nGhiaccio."
    de: "Gibt man es Genesect zum Tragen, wandelt es den\nTyp der Attacke Techblaster in Eis um."
    es: "Cartucho que convierte Tecno Shock de Genesect\nen un movimiento de tipo Hielo."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n얼음타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为冰属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為冰屬性。"
choice_band:
  names:
    jp_kana: こだわりハチマキ
    jp_kanji: こだわりハチマキ
    en: Choice Band
    fr: Bandeau Choix
    it: Bendascelta
    de: Wahlband
    es: Cinta Elegida
    ko: 구애머리띠
    zh_simp: 讲究头带
    zh_trad: 講究頭帶
  descriptions:
    jp_kana: "ちょっと　こだわった　ハチマキ。\nもたせると　こうげきは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　ハチマキ。\n持たせると　攻撃は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. This curious\nheadband boosts Attack but only allows the use of\none move."
    fr: "Objet à tenir. Ce bandeau augmente l’Attaque,\nmais ne permet d’utiliser qu’une seule capacité\npar combat."
    it: "Strumento da dare a un Pokémon.\nQuesta benda aumenta la potenza delle mosse,\nma permette l’uso di una sola mossa."
    de: "Ein Item, das von einem Pokémon getragen werden\nkann. Es stärkt den Angriffs-Wert, aber nur eine\nAttacke ist einsetzbar."
    es: "Aumenta la potencia de los ataques físicos del\nPokémon que la lleva, pero solo le permite usar\nun movimiento."
    ko: "기술을 구애받는 머리띠.\n지니게 하면 공격은 올라가지만\n똑같은 기술밖에 쓰지 못한다."
    zh_simp: "有点讲究的头带。\n虽然携带后攻击会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的頭帶。\n雖然攜帶後攻擊會提高，\n但只能使出相同的招式。"
choice_scarf:
  names:
    jp_kana: こだわりスカーフ
    jp_kanji: こだわりスカーフ
    en: Choice Scarf
    fr: Mouchoir Choix
    it: Stolascelta
    de: Wahlschal
    es: Pañuelo Elegido
    ko: 구애스카프
    zh_simp: 讲究围巾
    zh_trad: 講究圍巾
  descriptions:
    jp_kana: "ちょっと　こだわった　スカーフ。\nもたせると　すばやさは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　スカーフ。\n持たせると　素早さは　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. This curious\nscarf boosts Speed but only allows the use of\none move."
    fr: "Objet à tenir. Augmente la Vitesse, mais ne permet\nd’utiliser qu’une seule capacité par combat."
    it: "Strumento da dare a un Pokémon.\nStola che aumenta la Velocità, ma consente l’uso\ndi una sola mossa."
    de: "Ein Item zum Tragen. Der Schal erhöht den\nInitiative-Wert, aber nur eine Attacke ist einsetzbar."
    es: "Debe llevarlo un Pokémon. Potencia la Velocidad,\npero solo permite usar un movimiento."
    ko: "기술을 구애받는 스카프.\n지니게 하면 스피드는 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的围巾。\n虽然携带后速度会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的圍巾。\n雖然攜帶後速度會提高，\n但只能使出相同的招式。"
choice_specs:
  names:
    jp_kana: こだわりメガネ
    jp_kanji: こだわりメガネ
    en: Choice Specs
    fr: Lunettes Choix
    it: Lentiscelta
    de: Wahlglas
    es: Gafas Elegid
    ko: 구애안경
    zh_simp: 讲究眼镜
    zh_trad: 講究眼鏡
  descriptions:
    jp_kana: "ちょっと　こだわった　メガネ。\nもたせると　とくこうは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　メガネ。\n持たせると　特攻は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon. These curious\nglasses boost Sp. Atk but only allow the use of\none move."
    fr: "Objet à tenir. Augmente l’Attaque Spéciale, mais ne\npermet d’utiliser qu’une seule capacité par combat."
    it: "Strumento da dare a un Pokémon.\nQuesti occhiali aumentano la potenza delle mosse\nspeciali, ma permettono l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Die Brille erhöht den\nSpezial-Angriff, aber nur eine Attacke ist\neinsetzbar."
    es: "Aumentan la potencia de los ataques especiales\ndel Pokémon que las lleva, pero solo le permiten\nusar un movimiento."
    ko: "기술을 구애받는 안경.\n지니게 하면 특수공격이 올라가지만\n같은 기술밖에 쓸 수 없다."
    zh_simp: "有点讲究的眼镜。\n虽然携带后特攻会提高，\n但只能使出相同的招式。"
    zh_trad: "有點講究的眼鏡。\n雖然攜帶後特攻會提高，\n但只能使出相同的招式。"
chople_berry:
  names:
    jp_kana: ヨプのみ
    jp_kanji: ヨプのみ
    en: Chople Berry
    fr: Baie Pomroz
    it: Baccarosmel
    de: Rospelbeere
    es: Baya Pomaro
    ko: 로플열매
    zh_simp: 莲蒲果
    zh_trad: 蓮蒲果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　かくとう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　かくとう技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFighting-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Combat."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Lotta del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Kampf."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Lucha de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 격투 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的格斗属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的格鬥屬性招式\n攻擊時，能使其威力減弱。"
claw_fossil:
  names:
    jp_kana: ツメのカセキ
    jp_kanji: ツメのカセキ
    en: Claw Fossil
    fr: Fossile Griffe
    it: Fossilunghia
    de: Klauenfossil
    es: Fósil Garra
    ko: 발톱화석
    zh_simp: 爪子化石
    zh_trad: 爪子化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nツメの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nツメの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It appears to be a fragment of a claw."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de griffe."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di un artiglio."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es sieht wie eine Klaue aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser parte de una garra."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n발톱의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是爪子的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是爪子的一部分。"
cleanse_tag:
  names:
    jp_kana: きよめのおふだ
    jp_kanji: きよめのおふだ
    en: Cleanse Tag
    fr: Rune Purifiante
    it: Velopuro
    de: Schutzband
    es: Amuleto
    ko: 순결의부적
    zh_simp: 洁净之符
    zh_trad: 潔淨之符
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon. It helps keep\nwild Pokémon away if the holder is the head of\nthe party."
    fr: "Objet à tenir. Aide à repousser les Pokémon sauvages\nsi le porteur est le premier Pokémon de l’équipe."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha è il primo della squadra, aiuta\nad allontanare i Pokémon selvatici."
    de: "Ein Item zum Tragen. Reduziert Begegnungen mit\nwilden Pokémon, wenn der Träger an der Spitze\ndeines Teams steht."
    es: "Si lo lleva el primer Pokémon del equipo, se reduce la\nprobabilidad de que se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
    zh_simp: "让排在最前面的宝可梦携带后，\n野生宝可梦就会不容易出现。"
    zh_trad: "讓排在最前面的寶可夢\n攜帶後，野生寶可夢\n會變得不容易出現。"
clear_bell:
  names:
    jp_kana: とうめいなスズ
    jp_kanji: とうめいなスズ
    en: Clear Bell
    fr: Glas Transparent
    it: Campana Chiara
    de: Klarglocke
    es: Campana Clara
    ko: 크리스탈방울
    zh_simp: 透明铃铛
    zh_trad: 透明鈴鐺
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　音色が　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a gentle\nringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona\npace al cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten alle\nbesänftigt, die es hören."
    es: "Campana de aspecto antiguo que emite un sonido\nque calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
    zh_simp: "能发出静心宁神音色的，\n非常古旧的铃铛。"
    zh_trad: "能發出使人心情平靜音色的，\n非常古老的鈴鐺。"
clefairy_candy:
  names:
    jp_kana: ピッピのアメ
    jp_kanji: ピッピのアメ
    en: Clefairy Candy
    fr: Bonbon Mélofée
    it: Caramella Clefairy
    de: Piepi-Bonbon
    es: Caramelo Clefairy
    ko: 삐삐의사탕
    zh_simp: 皮皮的糖果
    zh_trad: 皮皮的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
clever_feather:
  names:
    jp_kana: せいしんのハネ
    jp_kanji: せいしんのハネ
    en: Clever Wing
    fr: Aile Mental
    it: Piumintuito
    de: Espritfeder
    es: Pluma Mente
    ko: 정신력날개
    zh_simp: 精神之羽
    zh_trad: 精神之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくぼうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特防の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe base Sp. Def stat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Défense Spéciale de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Difesa\nSpeciale."
    de: "Wendet man dieses Item auf ein Pokémon an,\nwird dessen Spezial-Verteidigungs-Basiswert\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco la Defensa Especial\nde base de un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수방어\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n特防的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n特防的基礎點數。"
clothing_trunk:
  names:
    jp_kana: おきがえトランク
    jp_kanji: おきがえトランク
    en: Clothing Trunk
    fr: Malle à Costumes
    it: Valigia vestiti
    de: Klamottenkoffer
    es: Maleta
    ko: 옷갈아입기트렁크
    zh_simp: 换装箱
    zh_trad: 換裝箱
  descriptions:
    jp_kana: "ポケモンや　トレーナーの\nきがえを　いれられる\nとても　かるい　トランク。"
    jp_kanji: "ポケモンや　トレーナーの\n着替えを　入れられる\nとても　軽い　トランク。"
    en: "A very light trunk that can carry clothing for you\nand your Pokémon."
    fr: "Une malle très légère qui contient vos costumes\net ceux de votre partenaire."
    it: "Una valigia leggerissima che può contenere tutti i capi\nd’abbigliamento di un Allenatore e del suo compagno\nd’avventura."
    de: "Ein überraschend leichter Koffer, in dem verschiedene\nKleidungsstücke und Accessoires für Trainer und\nPokémon verstaut werden können."
    es: "Una maleta muy ligera en la que puedes guardar ropa\no accesorios para ti o tu Pokémon."
    ko: "포켓몬이나 트레이너의\n의상을 넣을 수 있는\n매우 가벼운 트렁크."
    zh_simp: "非常轻的箱子。\n能塞入宝可梦或\n训练家的替换衣物。"
    zh_trad: "十分輕便的行李箱。\n裡面可以放寶可夢和\n訓練家的替換衣物。"
coba_berry:
  names:
    jp_kana: バコウのみ
    jp_kanji: バコウのみ
    en: Coba Berry
    fr: Baie Cobaba
    it: Baccababa
    de: Kobabeere
    es: Baya Kouba
    ko: 바코열매
    zh_simp: 棱瓜果
    zh_trad: 稜瓜果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ひこう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ひこう技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFlying-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Vol."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Volante del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Flug."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Volador de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 비행 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的飞行属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的飛行屬性招式\n攻擊時，能使其威力減弱。"
coin_case:
  names:
    jp_kana: コインケース
    jp_kanji: コインケース
    en: Coin Case
    fr: Boîte Jetons
    it: Salvadanaio
    de: Münzkorb
    es: Monedero
    ko: 동전케이스
    zh_simp: 代币盒
    zh_trad: 代幣盒
  descriptions:
    jp_kana: "ゲームコーナーで　てにいれた\nコインを　５００００まい　まで\nいれることが　できる　ケース。"
    jp_kanji: "ゲームコーナーで　てにいれた\nコインを　５００００枚まで\nいれることが　できる　ケース。"
    en: "A case for holding coins obtained at the\nGame Corner. It can hold up to 50,000 coins."
    fr: "Une boîte pour conserver les Jetons obtenus à\nla salle d’arcade. Peut contenir jusqu’à 50 000 Jetons."
    it: "Contenitore ottenuto al Casinò che può contenere\nfino a 50.000 Gettoni."
    de: "Im Korb finden bis zu 50 000 Münzen der\nSpielhalle Platz."
    es: "Puedes obtenerlo en la Sala de Juegos. Tiene capacidad\npara 50 000 fichas."
    ko: "게임코너에서 손에 넣은\n동전을 50000개 까지\n넣을 수 있는 케이스."
    zh_simp: "可以存放代币的盒子。\n最多能放入50000枚\n在游戏城获得的代币。"
    zh_trad: "最多可以放入50000枚\n在遊戲城獲得的代幣的盒子。"
colbur_berry:
  names:
    jp_kana: ナモのみ
    jp_kanji: ナモのみ
    en: Colbur Berry
    fr: Baie Lampou
    it: Baccaxan
    de: Burleobeere
    es: Baya Dillo
    ko: 마코열매
    zh_simp: 刺耳果
    zh_trad: 刺耳果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　あく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　あく技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nDark-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Ténèbres."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Buio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Unlicht."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Siniestro de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 악 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的恶属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的惡屬性招式\n攻擊時，能使其威力減弱。"
colress_machine:
  names:
    jp_kana: アクロママシーン
    jp_kanji: アクロママシーン
    en: Colress Machine
    fr: Nikodule
    it: Acrocongegno
    de: Achromat
    es: Acromáquina
    ko: 아크로마머신
    zh_simp: 阿克罗玛机器
    zh_trad: 阿克羅瑪機器
  descriptions:
    jp_kana: "ポケモンの　のうりょくを　むりやり\nめざめさせる　とくしゅな　そうち。\nだが　しさくひんのため　ふかんぜん。"
    jp_kanji: "ポケモンの　能力を　無理やり\n目覚めさせる　特殊な　装置。\nだが　試作品のため　不完全。"
    en: "A special device that wrings out the potential of\nPokémon. It’s an imperfect prototype."
    fr: "Un appareil spécial qui permet d’éveiller de force\nla puissance des Pokémon. Mais il ne s’agit que\nd’un prototype."
    it: "Prototipo imperfetto di un dispositivo speciale\nideato per risvegliare in modo forzato le capacità\ndei Pokémon."
    de: "Eine Vorrichtung, die verborgene Kräfte in den\nPokémon weckt. Es handelt sich dabei um einen\nunfertigen Prototyp."
    es: "Dispositivo que permite aumentar forzadamente\nlas características de los Pokémon. Es un prototipo\nimperfecto."
    ko: "포켓몬의 능력을 강제로\n눈뜨게 만드는 특수 장치.\n그러나 시작품이기에 불완전하다."
    zh_simp: "能强行让宝可梦的能力\n觉醒的特殊装置。\n但由于是试制品，功能尚未完善。"
    zh_trad: "能強行讓寶可夢的能力\n覺醒的特殊裝置。\n但由於是試作品，功能還不完全。"
comet_shard:
  names:
    jp_kana: すいせいのかけら
    jp_kanji: すいせいのかけら
    en: Comet Shard
    fr: Morceau Comète
    it: Pezzo Cometa
    de: Kometstück
    es: Fragmento Cometa
    ko: 혜성조각
    zh_simp: 彗星碎片
    zh_trad: 彗星碎片
  descriptions:
    jp_kana: "すいせいが　ちかづいたとき\nちひょうに　おちた　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "すい星が　近づいたとき\n地表に　落ちた　かけら。\nショップで　高く　売れる。"
    en: "A shard that fell to the ground when a comet\napproached. It can be sold at a high price\nto shops."
    fr: "Un fragment de comète, tombé au sol quand elle\ntraversait l’atmosphère. Peut être vendu à bon prix\naux magasins."
    it: "Scheggia di cometa caduta al suolo. Si può vendere\na un prezzo piuttosto alto nei negozi."
    de: "Ein Kometensplitter, der aus dem All herabgefallen\nist. Er ist von großem Wert."
    es: "Fragmento de un cometa caído al suelo al atravesar\nla atmósfera. Se puede vender a buen precio en las\ntiendas."
    ko: "혜성이 가까워졌을 때\n지표면에 떨어진 조각.\n상점에서 비싸게 팔린다."
    zh_simp: "彗星临近时，\n掉落到地表上的碎片。\n可以在商店高价出售。"
    zh_trad: "彗星接近時，\n掉落到地表上的碎片。\n可以在商店高價出售。"
common_stone:
  names:
    jp_kana: ありふれたいし
    jp_kanji: ありふれたいし
    en: Common Stone
    fr: Pierre Ordinaire
    it: Sasso qualsiasi
    de: Normaler Stein
    es: Piedra Común
    ko: 흔해빠진돌
    zh_simp: 常见石
    zh_trad: 常見石
  descriptions:
    jp_kana: "みる　ひとに　よっては\nきちょう　かもしれない\nでも　ふつうの　いし。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nでも　普通の　石。"
    en: "A perfectly normal stone that might appear to be\nvaluable to some. It’s all in the eye of the beholder."
    fr: "Une pierre assez banale qui pourrait avoir de la valeur\npour certains."
    it: "Un sasso qualsiasi che qualcuno potrebbe\nritenere di valore."
    de: "Ein Stein, der für manche vielleicht wertvoll\naussieht, tatsächlich aber nur ein gewöhnlicher\nStein ist."
    es: "Una piedra de aspecto normal que a algunos les\npuede parecer de gran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n평범한 돌."
    zh_simp: "在有些人看来\n可能会觉得它十分贵重。\n但其实是块普通的石头。"
    zh_trad: "在某些人眼裡\n可能會覺得它十分貴重。\n但其實是塊普通的石頭。"
contest_costume:female:
  names:
    jp_kana: ライブドレス
    jp_kanji: ライブドレス
    en: Contest Costume
    fr: Robe Live
    it: Vestito Live
    de: Live-Kleid
    es: Vestido de Gala
    ko: 라이브드레스
    zh_simp: 演出礼裙
    zh_trad: 演出禮裙
  descriptions:
    jp_kana: "コンテストライブで　きる\nとっても　かわいい　ドレス。"
    jp_kanji: "コンテストライブで　着る\nとっても　可愛い　ドレス。"
    en: "A very cute dress to be worn during the\nContest Spectacular."
    fr: "Une robe très mignonne portée pour le Concours\nPokémon Live !"
    it: "Grazioso vestito da indossare durante le\nGare Live."
    de: "Ein niedliches Kleidchen, das bei\nPokémon-Wettbewerb Live!\ngetragen werden kann."
    es: "Vestido de lo más espectacular para lucir en el\nGran Concurso."
    ko: "콘테스트 라이브에서 입는\n아주 귀여운 드레스다."
    zh_simp: "在华丽大赛上演出时穿的\n非常可爱的礼裙。"
    zh_trad: "在華麗大賽上演出時穿的\n非常可愛的禮裙。"
contest_costume:male:
  names:
    jp_kana: ライブスーツ
    jp_kanji: ライブスーツ
    en: Contest Costume
    fr: Costume Live
    it: Costume Live
    de: Live-Anzug
    es: Traje de Gala
    ko: 라이브슈트
    zh_simp: 演出礼服
    zh_trad: 演出禮服
  descriptions:
    jp_kana: "コンテストライブで　きる\nとっても　カッコいい　スーツ。"
    jp_kanji: "コンテストライブで　着る\nとっても　格好良い　スーツ。"
    en: "A very cool suit to be worn during the\nContest Spectacular."
    fr: "Un costume très rock porté pour le Concours\nPokémon Live !"
    it: "Elegante costume da indossare durante le\nGare Live."
    de: "Ein schicker Anzug, der bei\nPokémon-Wettbewerb Live!\ngetragen werden kann."
    es: "Traje de lo más espectacular para lucir en el\nGran Concurso."
    ko: "콘테스트 라이브에서 입는\n아주 멋있는 슈트다."
    zh_simp: "在华丽大赛上演出时穿的\n非常帅气的礼服。"
    zh_trad: "在華麗大賽上演出時穿的\n非常帥氣的禮服。"
contest_pass:
  names:
    jp_kana: コンテストパス
    jp_kanji: コンテストパス
    en: Contest Pass
    fr: Passe Concours
    it: Tessera Gare
    de: Wettbewerbskarte
    es: Pase Concurso
    ko: 콘테스트패스
    zh_simp: 华丽大赛参加证
    zh_trad: 華麗大賽參加證
  descriptions:
    jp_kana: "もっていれば　ポケモンコンテストに\nさんか　することが　できる。\nきねんリボンが　かかれている。"
    jp_kanji: "持っていれば　ポケモンコンテストに\n参加することが　できる。\n記念リボンが　描かれている。"
    en: "A pass required for entering Pokémon Contests.\nIt has a drawing of an award ribbon on its front."
    fr: "La carte requise pour participer aux Concours Pokémon.\nIl y a un ruban dessiné dessus."
    it: "Tessera necessaria per partecipare alle\nGare Pokémon. Riporta il disegno di un fiocco."
    de: "Ausweis zur Teilnahme an Pokémon-Wettbewerben.\nDie Zeichnung eines Bandes ist aufgedruckt."
    es: "Es necesario para participar en Concursos Pokémon.\nTiene una cinta de ganador dibujada."
    ko: "지니고 있으면 포켓몬 콘테스트에\n참가할 수 있다.\n기념리본이 그려져 있다."
    zh_simp: "拿着它就可以参加宝可梦华丽大赛。\n上面印有纪念奖章。"
    zh_trad: "拿著它就可以參加\n寶可夢華麗大賽。\n上面印有紀念獎章。"
cornn_berry:
  names:
    jp_kana: モコシのみ
    jp_kanji: モコシのみ
    en: Cornn Berry
    fr: Baie Siam
    it: Baccavena
    de: Saimbeere
    es: Baya Mais
    ko: 수숙열매
    zh_simp: 玉黍果
    zh_trad: 玉黍果
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nla Beauté d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es una baya muy rara en otras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
coupon_1:
  names:
    jp_kana: ひきかえけん１
    jp_kanji: ひきかえけん１
    en: Coupon 1
    fr: Bon 1
    it: Coupon 1
    de: Kupon 1
    es: Cupón 1
    ko: 교환권1
    zh_simp: 兑换券１
    zh_trad: 兌換券１
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a Pokémon Watch—\nPokétch for short. Three coupons are needed."
    fr: Un des trois bons à échanger contre une Pokémontre.
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener\nun Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
    zh_simp: "获取宝可梦手表，简称宝可表时\n所需的兑换券。需要３张。"
    zh_trad: "欲取得寶可夢手錶，簡稱寶可錶時\n所需的兌換券。需要３張。"
coupon_2:
  names:
    jp_kana: ひきかえけん２
    jp_kanji: ひきかえけん２
    en: Coupon 2
    fr: Bon 2
    it: Coupon 2
    de: Kupon 2
    es: Cupón 2
    ko: 교환권2
    zh_simp: 兑换券２
    zh_trad: 兌換券２
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a Pokémon Watch—\nPokétch for short. Three coupons are needed."
    fr: Un des trois bons à échanger contre une Pokémontre.
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener\nun Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
    zh_simp: "获取宝可梦手表，简称宝可表时\n所需的兑换券。需要３张。"
    zh_trad: "欲取得寶可夢手錶，簡稱寶可錶時\n所需的兌換券。需要３張。"
coupon_3:
  names:
    jp_kana: ひきかえけん３
    jp_kanji: ひきかえけん３
    en: Coupon 3
    fr: Bon 3
    it: Coupon 3
    de: Kupon 3
    es: Cupón 3
    ko: 교환권3
    zh_simp: 兑换券３
    zh_trad: 兌換券３
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a Pokémon Watch—\nPokétch for short. Three coupons are needed."
    fr: Un des trois bons à échanger contre une Pokémontre.
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener\nun Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
    zh_simp: "获取宝可梦手表，简称宝可表时\n所需的兑换券。需要３张。"
    zh_trad: "欲取得寶可夢手錶，簡稱寶可錶時\n所需的兌換券。需要３張。"
courage_candy:
  names:
    jp_kana: こころのアメ
    jp_kanji: こころのアメ
    en: Courage Candy
    fr: Bonbon Mental S
    it: Caramella intuito S
    de: Mentalbonbon
    es: Caramelo Mente
    ko: 마음의사탕
    zh_simp: 心灵糖果
    zh_trad: 心靈糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　とくぼうを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　とくぼうを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Sp. Def stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Spezial-Verteidigung eines\nPokémon."
    es: "Caramelo energético que aumenta la Defensa Especial\ndel Pokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 특수방어를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的特防。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的特防。"
courage_candy_l:
  names:
    jp_kana: こころのアメＬ
    jp_kanji: こころのアメＬ
    en: Courage Candy L
    fr: Bonbon Mental M
    it: Caramella intuito M
    de: Mentalbonbon+
    es: Caramelo Mente +
    ko: 마음의사탕L
    zh_simp: 心灵糖果L
    zh_trad: 心靈糖果L
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nとくぼうを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nとくぼうを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Sp. Def stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon\nde niveau 30 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon\ndi livello 30 o superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Spezial-Verteidigung eines\nPokémon ab Level 30."
    es: "Caramelo energético grande que aumenta la Defensa\nEspecial de un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n특수방어를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级30以上的\n宝可梦的特防上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在30以上的\n寶可夢的特防。"
courage_candy_xl:
  names:
    jp_kana: こころのアメＸＬ
    jp_kanji: こころのアメＸＬ
    en: Courage Candy XL
    fr: Bonbon Mental L
    it: Caramella intuito L
    de: Mentalbonbon++
    es: Caramelo Mente ++
    ko: 마음의사탕XL
    zh_simp: 心灵糖果XL
    zh_trad: 心靈糖果XL
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nとくぼうを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nとくぼうを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Sp. Def stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Défense Spéciale d’un Pokémon\nde niveau 60 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa Speciale di un Pokémon\ndi livello 60 o superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Spezial-Verteidigung eines\nPokémon ab Level 60."
    es: "Caramelo energético enorme que aumenta la Defensa\nEspecial de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n특수방어를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级60以上的\n宝可梦的特防上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在60以上的\n寶可夢的特防。"
cover_fossil:
  names:
    jp_kana: ふたのカセキ
    jp_kanji: ふたのカセキ
    en: Cover Fossil
    fr: Fossile Plaque
    it: Fossiltappo
    de: Schildfossil
    es: Fósil Tapa
    ko: 덮개화석
    zh_simp: 背盖化石
    zh_trad: 背蓋化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nせなかの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nせなかの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It appears as though it could be part of\nits back."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nIl semble que ce soit une partie de son dos."
    it: "Fossile di un Pokémon preistorico che viveva\nnel mare. Sembra essere parte del suo dorso."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Offenbar handelt es sich um einen\nTeil des Rückens."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de caparazón."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是后背的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是後背的一部分。"
cubone_candy:
  names:
    jp_kana: カラカラのアメ
    jp_kanji: カラカラのアメ
    en: Cubone Candy
    fr: Bonbon Osselait
    it: Caramella Cubone
    de: Tragosso-Bonbon
    es: Caramelo Cubone
    ko: 탕구리의사탕
    zh_simp: 卡拉卡拉的糖果
    zh_trad: 卡拉卡拉的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
custap_berry:
  names:
    jp_kana: イバンのみ
    jp_kanji: イバンのみ
    en: Custap Berry
    fr: Baie Chérim
    it: Baccacrela
    de: Eipfelbeere
    es: Baya Chiri
    ko: 애슈열매
    zh_simp: 释陀果
    zh_trad: 釋陀果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nこうどうが　はやくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n行動が　早くなる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it will be able to move first just once\nwhen it’s in a pinch."
    fr: "Tenue, cette Baie permet d’utiliser une capacité\nen priorité une fois en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, sferra la sua mossa per primo.\nFunziona una sola volta."
    de: "Als getragenes Item ermöglicht diese Beere dem\nTräger in einer Notlage den Erstschlag."
    es: "El Pokémon que la lleva puede actuar en primer lugar\nuna vez cuando se encuentra en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n행동이 빨라진다."
    zh_simp: "让宝可梦携带后，危机时，\n行动仅会变快１次。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，行動會僅\n變快１次。"
damp_mulch:
  names:
    jp_kana: じめじめこやし
    jp_kanji: じめじめこやし
    en: Damp Mulch
    fr: Fertihumide
    it: Fertilidro
    de: Feuchtmulch
    es: Abono Lento
    ko: 축축이비료
    zh_simp: 湿湿肥
    zh_trad: 濕濕肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
damp_rock:
  names:
    jp_kana: しめったいわ
    jp_kanji: しめったいわ
    en: Damp Rock
    fr: Roche Humide
    it: Rocciaumida
    de: Nassbrocken
    es: Roca Lluvia
    ko: 축축한바위
    zh_simp: 潮湿岩石
    zh_trad: 潮濕岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　あまごいを\nつかうと　いつもより　あめの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あまごいを\n使うと　いつもより　あめの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Rain Dance when used by\nthe holder."
    fr: "Objet à tenir. Augmente la durée de la capacité\nDanse Pluie utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Pioggiadanza."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nRegentanz, wenn der Träger diese Attacke\neinsetzt."
    es: "Prolonga la duración del movimiento Danza Lluvia\nque use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 비바라기를\n쓰면 여느 때보다 비 내리는\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出求雨的话，\n下雨的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出求雨的話，\n下雨的時間就會比平時更長。"
dark_gem:
  names:
    jp_kana: あくのジュエル
    jp_kanji: あくのジュエル
    en: Dark Gem
    fr: Joyau Ténèbres
    it: Bijoubuio
    de: Unlichtjuwel
    es: Gema Siniestra
    ko: 악주얼
    zh_simp: 恶之宝石
    zh_trad: 惡之寶石
  descriptions:
    jp_kana: "あくの　タイプの　ジュエル。\nもたせると　いちどだけ　あくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　ジュエル。\n持たせると　１度だけ　あくの\n技の　威力が　強まる。"
    en: "A gem with an essence of darkness. When held, it\nstrengthens the power of a Dark-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Buio."
    de: "Ein Juwel vom Typ Unlicht. Es erhöht einmalig die\nStärke einer Attacke vom Typ Unlicht."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Siniestro. Debe llevarla un Pokémon."
    ko: "악타입의 주얼.\n지니게 하면 한 번만 악\n기술의 위력이 강해진다."
    zh_simp: "恶属性的宝石。\n携带后，恶属性的\n招式威力仅会增强１次。"
    zh_trad: "惡屬性的寶石。\n攜帶後，惡屬性招式的\n威力會僅增強１次。"
dark_memory:
  names:
    jp_kana: ダークメモリ
    jp_kanji: ダークメモリ
    en: Dark Memory
    fr: ROM Ténèbres
    it: ROM Buio
    de: Unlicht-Disc
    es: Disco Siniestro
    ko: 다크메모리
    zh_simp: 黑暗存储碟
    zh_trad: 黑暗記憶碟
  descriptions:
    jp_kana: "あくタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "あくタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Dark-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Ténèbres. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Buio in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Unlicht.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nSiniestro. Permite cambiar de tipo a cierto Pokémon."
    ko: "악타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有恶属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有惡屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
dark_stone:
  names:
    jp_kana: ダークストーン
    jp_kanji: ダークストーン
    en: Dark Stone
    fr: Galet Noir
    it: Scurolite
    de: Dunkelstein
    es: Orbe Oscuro
    ko: 다크스톤
    zh_simp: 黑暗石
    zh_trad: 黑闇石
  descriptions:
    jp_kana: "ゼクロムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "ゼクロムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Zekrom’s body was destroyed and changed into\nthis stone. It is said to be waiting for the\nemergence of a hero."
    fr: "Ce sont les derniers restes du corps de Zekrom.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Zekrom quando\nha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Zekrom\ndiese Gestalt an. Man sagt, es warte auf die\nAnkunft eines Helden."
    es: "Forma que adoptó Zekrom al perder su cuerpo.\nEspera la llegada de un nuevo héroe."
    ko: "제크로무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
    zh_simp: "捷克罗姆的肉体\n毁灭后变成的样子。\n据说它在等待着英雄的到来。"
    zh_trad: "捷克羅姆的肉體\n毀滅後變成的樣子。\n據說它在等待著英雄的到來。"
darkinium_z:bag:
  names:
    jp_kana: アクＺ
    jp_kanji: アクＺ
    en: Darkinium Z
    fr: Ténébrozélite
    it: Obscurium Z
    de: Noctium Z
    es: Nictostal Z
    ko: 악Z
    zh_simp: 恶Ｚ
    zh_trad: 惡Ｚ
  descriptions:
    jp_kana: "あくタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "あくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nDark-type moves to Dark-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Ténèbres en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Buio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Unlicht-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nSiniestro en movimientos Z."
    ko: "악타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将恶属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把惡屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
darkinium_z:held:
  names:
    jp_kana: アクＺ
    jp_kanji: アクＺ
    en: Darkinium Z
    fr: Ténébrozélite
    it: Obscurium Z
    de: Noctium Z
    es: Nictostal Z
    ko: 악Z
    zh_simp: 恶Ｚ
    zh_trad: 惡Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nあくタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nあくタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Dark-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Ténèbres\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Buio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Unlicht-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Siniestro."
    ko: "Z파워의 결정.\n악타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将恶属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把惡屬性的招式\n升級為Ｚ招式。"
data_card_01:
  names:
    jp_kana: データカード０１
    jp_kanji: データカード０１
    en: Data Card 01
    fr: Carte Mémo01
    it: Scheda Dati 01
    de: Datenkarte01
    es: Tarjeta Datos 01
    ko: 데이터카드01
    zh_simp: 数据卡01
    zh_trad: 資料卡01
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nゆうしょう　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\n優勝　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many victories you have had in\nthe Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit votre nombre de victoires\nau Pokéathlon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero totale\ndi vittorie."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du ein Turnier gewonnen hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias."
    ko: "포켓슬론의 기록이 들어 있다.\n우승 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_02:
  names:
    jp_kana: データカード０２
    jp_kanji: データカード０２
    en: Data Card 02
    fr: Carte Mémo02
    it: Scheda Dati 02
    de: Datenkarte02
    es: Tarjeta Datos 02
    ko: 데이터카드02
    zh_simp: 数据卡02
    zh_trad: 資料卡02
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nビリになった　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nビリになった　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many losses you have had in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de fois où vous\navez fini en dernier."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nultimi posti."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du bei einem Turnier Letzter\ngeworden bist."
    es: "Contiene los datos del Pokéathlon con el número\nde veces que se ha quedado en último lugar."
    ko: "포켓슬론의 기록이 들어 있다.\n꼴찌가 된 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_03:
  names:
    jp_kana: データカード０３
    jp_kanji: データカード０３
    en: Data Card 03
    fr: Carte Mémo03
    it: Scheda Dati 03
    de: Datenkarte03
    es: Tarjeta Datos 03
    ko: 데이터카드03
    zh_simp: 数据卡03
    zh_trad: 資料卡03
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ダッシュした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ダッシュした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many times your Pokémon dashed in\nthe Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sprints\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di sprint\ndei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie viele Sprints du schon hinter dir hast."
    es: "Contiene los datos del Pokéathlon con el número\nde sprints de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 대시한 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_04:
  names:
    jp_kana: データカード０４
    jp_kanji: データカード０４
    en: Data Card 04
    fr: Carte Mémo04
    it: Scheda Dati 04
    de: Datenkarte04
    es: Tarjeta Datos 04
    ko: 데이터카드04
    zh_simp: 数据卡04
    zh_trad: 資料卡04
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ジャンプした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ジャンプした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a card that shows\nhow many times your Pokémon jumped in\nthe Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sauts\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di salti\ndei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du gesprungen bist."
    es: "Contiene los datos del Pokéathlon con el número\nde saltos de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 점프한 횟수가\n기록된 카드."
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
data_card_05:
  names:
    jp_kana: データカード０５
    jp_kanji: データカード０５
    en: Data Card 05
    fr: Carte Mémo05
    it: Scheda Dati 05
    de: Datenkarte05
    es: Tarjeta Datos 05
    ko: 데이터카드05
    zh_simp: 数据卡05
    zh_trad: 資料卡05
  descriptions:
