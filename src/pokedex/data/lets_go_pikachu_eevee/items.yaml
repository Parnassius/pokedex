metagrossite:
  names:
    jp_kana: メタグロスナイト
    jp_kanji: メタグロスナイト
    en: Metagrossite
    fr: Métalossite
    it: Metagrossite
    de: Metagrossnit
    es: Metagrossita
    ko: 메타그로스나이트
    zh_simp: 巨金怪进化石
    zh_trad: 巨金怪進化石
  descriptions:
    jp_kana: "メタグロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "メタグロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Metagross hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Métalosse, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Metagross, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Metagross getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Metagross en combate."
    ko: "메타그로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨金怪携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨金怪攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
metal_coat:
  names:
    jp_kana: メタルコート
    jp_kanji: メタルコート
    en: Metal Coat
    fr: Peau Métal
    it: Metalcoperta
    de: Metallmantel
    es: Revest. Metálico
    ko: 금속코트
    zh_simp: 金属膜
    zh_trad: 金屬膜
  descriptions:
    jp_kana: "とくしゅな　きんぞくの　まく。\nもたせると　はがねタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "特殊な　金属の　膜。\n持たせると　はがねタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a special\nmetallic film that can boost the power of\nSteel-type moves."
    fr: "Objet à tenir. Une pellicule métallique spéciale\nqui augmente la puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nSpeciale pellicola metallica che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es verstärkt Attacken vom Typ Stahl."
    es: "Película metálica que fortalece los ataques de tipo\nAcero. Debe llevarlo un Pokémon."
    ko: "특수한 금속 장막.\n지니게 하면 강철타입\n기술의 위력이 올라간다."
    zh_simp: "特殊的金属膜。\n携带后，钢属性的\n招式威力就会提高。"
    zh_trad: "特殊的金屬膜。\n攜帶後，鋼屬性的\n招式威力就會提高。"
metal_powder:
  names:
    jp_kana: メタルパウダー
    jp_kanji: メタルパウダー
    en: Metal Powder
    fr: Poudre Métal
    it: Metalpolvere
    de: Metallstaub
    es: Polvo Metálico
    ko: 금속파우더
    zh_simp: 金属粉
    zh_trad: 金屬粉
  descriptions:
    jp_kana: "メタモンに　もたせると　ぼうぎょが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　防御が\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto. Extremely fine yet\nhard, this odd powder boosts the Defense stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Défense."
    it: "Strumento da dare a Ditto.\nStrana polvere finissima e al tempo stesso dura\nche migliora la Difesa."
    de: "Ein Item, das Ditto zum Tragen gegeben werden\nkann. Fein und doch hart, erhöht es den\nVerteidigungs-Wert."
    es: "Debe llevarlo Ditto. Es un polvo muy fino, pero a\nla vez poderoso, que aumenta su Defensa."
    ko: "메타몽에게 지니게 하면\n방어가 올라가는 이상한 가루.\n매우 잘고 단단하다."
    zh_simp: "让百变怪携带后，\n防御就会提高的神奇粉末。\n非常细腻坚硬。"
    zh_trad: "讓百變怪攜帶後，\n防禦就會提高的神奇粉末。\n非常細緻堅硬。"
meteorite:hoenn:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "もともとは　りゅうせいのたきに\nおちていた　いんせき。\nえんとつやまで　てにいれた。"
    jp_kanji: "元々は　流星の滝に\n落ちていた　いんせき。\nえんとつ山で　手に入れた。"
    en: "A Meteorite originally found at Meteor Falls.\nYou got it at Mt. Chimney."
    fr: "Une météorite qui s’est écrasée sur le Site Météore,\ntrouvée au Mont Chimnée."
    it: "Meteorite proveniente dalle Cascate Meteora.\nPuoi ottenerlo sul Monte Camino."
    de: "Ein Meteorit, der ursprünglich bei den Meteorfällen\neingeschlagen ist. Du hast ihn beim Schlotberg\nerhalten."
    es: "Meteorito obtenido en el Monte Cenizo que antes\nse encontraba en la Cascada Meteoro."
    ko: "원래는 유성의 폭포에\n떨어져 있던 운석이다.\n굴뚝산에서 손에 넣었다."
    zh_simp: "原本是落入流星瀑布里的陨石。\n是在烟囱山获得的。"
    zh_trad: "原為墜落在\n流星瀑布裡的隕石。\n在煙囪山得到了它。"
meteorite:hoenn_2:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nほのかに　かがやきを　はなっている。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nほのかに　輝きを　放っている。"
    en: "A Meteorite that you got at Mt. Chimney. It gives off\na faint glow."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une légère lueur."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nVom ihm geht ein schwaches Leuchten aus."
    es: "Meteorito obtenido en el Monte Cenizo.\nDesprende un tenue brillo."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은하게 빛을 발하고 있다."
    zh_simp: "在烟囱山上获得的陨石。\n隐约散发着光辉。"
    zh_trad: "在煙囪山上獲得的隕石。\n隱約散發著光芒。"
meteorite:hoenn_3:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nほのかな　ひかりを　はなちつづけている。\nふれると　じんわり　あたたかい。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nほのかな　光を　放ち続けている。\n触れると　じんわり　暖かい。"
    en: "A Meteorite that you got at Mt. Chimney.\nIt continues to give off a faint glow and is slightly\nwarm to the touch."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une faible lueur de façon continue,\net est légèrement tiède au toucher."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza.\nToccandolo, si avverte un certo calore."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nVon ihm geht ein schwaches Licht aus. Wenn man\nihn berührt, wird er warm."
    es: "Meteorito obtenido en el Monte Cenizo. Sigue\ndesprendiendo un tenue brillo y es ligeramente\ncálido al tacto."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은한 빛을 계속해서 발하고 있다.\n만지면 은근히 따뜻하다."
    zh_simp: "在烟囱山上获得的陨石。\n持续散发着微光。\n摸上去隐约有点暖暖的。"
    zh_trad: "在煙囪山上獲得的隕石。\n持續散發著微微光芒。\n摸起來有點暖暖的。"
meteorite:hoenn_4:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
    zh_simp: 陨石
    zh_trad: 隕石
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nなにかの　もんようが　うかびあがり\nなないろの　ひかりが　あふれだす。"
    jp_kanji: "えんとつ山で　手に入れた　いんせき。\nなにかの　文様が　浮かび上がり\n七色の　光が　あふれだす。"
    en: "A Meteorite that you got at Mt. Chimney.\nSome sort of pattern has risen to the surface,\nand it’s shining with seven colors of light."
    fr: "Une météorite trouvée au Mont Chimnée.\nUn étrange symbole est gravé à sa surface,\net luit des sept couleurs de l’arc-en-ciel."
    it: "Meteorite ottenuto sul Monte Camino.\nSulla superficie è visibile un motivo in rilievo\nche brilla dei colori dell’arcobaleno."
    de: "Ein Meteorit, den du beim Schlotberg erhalten hast.\nEr ist seltsam gemustert und aus seinem Inneren\nstrahlt ein regenbogenfarbenes Licht."
    es: "Meteorito obtenido en el Monte Cenizo. Presenta\nunos peculiares grabados e irradia una luz con los\nsiete colores del arcoíris."
    ko: "굴뚝산에서 손에 넣은 운석.\n어떤 문양이 드러나며\n일곱 색깔의 빛이 넘쳐난다."
    zh_simp: "在烟囱山上获得的陨石。\n上面浮现着某些花纹，\n并散发着七色光芒。"
    zh_trad: "在煙囪山上獲得的隕石。\n上面浮現出某種花紋，\n並流瀉著七色光芒。"
meteorite_shard:
  names:
    jp_kana: いんせきのかけら
    jp_kanji: いんせきのかけら
    en: Meteorite Shard
    fr: Éclat Météorite
    it: Framm. meteorite
    de: Meteoritenstück
    es: Frag. Meteorito
    ko: 운석조각
    zh_simp: 陨石碎片
    zh_trad: 隕石碎片
  descriptions:
    jp_kana: "いしのどうくつに　おちていた\nいんせきのかけらの　ひとつ。\nふれると　ほのかに　あたたかい。"
    jp_kanji: "石の洞窟に　落ちていた\nいんせきのかけらの　ひとつ。\n触れると　ほのかに　暖かい。"
    en: "One of the fragments of a Meteorite from\nGranite Cave. It’s faintly warm to the touch."
    fr: "L’un des fragments de météorite tombés dans\nla Grotte Granite. Il est légèrement tiède au toucher."
    it: "Frammento di meteorite trovato nella Grotta\nPietrosa. Toccandolo, si avverte un certo calore."
    de: "Eines der Meteoritenstücke aus der Granithöhle.\nWenn man es berührt, wird es ein bisschen warm."
    es: "Trozo de meteorito encontrado en el suelo de la\nCueva Granito. Es ligeramente cálido al tacto."
    ko: "바위 동굴에 떨어진\n운석조각 중의 하나.\n만지면 은근히 따뜻하다."
    zh_simp: "掉落在石之洞窟里的\n陨石碎片之一。\n摸上去有一点点暖暖的。"
    zh_trad: "掉落在石之洞窟裡的\n隕石碎片之一。\n摸起來有點暖暖的。"
metronome:
  names:
    jp_kana: メトロノーム
    jp_kanji: メトロノーム
    en: Metronome
    fr: Métronome
    it: Plessimetro
    de: Metronom
    es: Metrónomo
    ko: 메트로놈
    zh_simp: 节拍器
    zh_trad: 節拍器
  descriptions:
    jp_kana: "もたせると　おなじわざを　れんぞくで\nつかったとき　いりょくが　あがる。\nやめると　いりょくは　もどる。"
    jp_kanji: "持たせると　同じ技を　連続で\n使ったとき　威力が　あがる。\nやめると　威力は　もどる。"
    en: "An item to be held by a Pokémon. It boosts moves\nused consecutively but only until a different move\nis used."
    fr: "Objet à tenir. Booste une capacité utilisée à répétition.\nL’effet s’annule si une autre capacité est utilisée."
    it: "Strumento da dare a un Pokémon.\nPotenzia una mossa usata più volte di seguito.\nIl potenziamento svanisce al cambio di mossa."
    de: "Ein Item zum Tragen. Verstärkt eine Attacke,\nje öfter sie in Folge ausgeführt wird."
    es: "Potencia un movimiento que se use de forma\nconsecutiva. Pero el efecto se pierde si se\nemplea otro movimiento."
    ko: "지니게 하면 똑같은 기술을 연속으로\n사용했을 때 위력이 올라간다.\n그만두면 위력이 되돌아간다."
    zh_simp: "携带后，连续使出相同招式时，\n威力就会提高。不再使出\n相同招式时，威力就会复原。"
    zh_trad: "攜帶後，連續使出相同招式時，\n威力就會提高。停止時，\n威力就會復原。"
mew_candy:
  names:
    jp_kana: ミュウのアメ
    jp_kanji: ミュウのアメ
    en: Mew Candy
    fr: Bonbon Mew
    it: Caramella Mew
    de: Mew-Bonbon
    es: Caramelo Mew
    ko: 뮤의사탕
    zh_simp: 梦幻的糖果
    zh_trad: 夢幻的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mewnium_z:bag:
  names:
    jp_kana: ミュウＺ
    jp_kanji: ミュウＺ
    en: Mewnium Z
    fr: Mewzélite
    it: Mewnium Z
    de: Mewnium Z
    es: Mewstal Z
    ko: 뮤Z
    zh_simp: 梦幻Ｚ
    zh_trad: 夢幻Ｚ
  descriptions:
    jp_kana: "ミュウの　サイコキネシスを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ミュウの　サイコキネシスを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nMew’s Psychic to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Mew qui le tient à transformer\nson Psyko en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Mew di trasformare la mossa\nPsichico in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Mews Attacke\nPsychokinese zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMew convertir su Psíquico en un movimiento Z."
    ko: "뮤의 사이코키네시스를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将梦幻的精神强念\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把夢幻的精神強念\n升級為特殊Ｚ招式的Ｚ力量結晶。"
mewnium_z:held:
  names:
    jp_kana: ミュウＺ
    jp_kanji: ミュウＺ
    en: Mewnium Z
    fr: Mewzélite
    it: Mewnium Z
    de: Mewnium Z
    es: Mewstal Z
    ko: 뮤Z
    zh_simp: 梦幻Ｚ
    zh_trad: 夢幻Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nミュウの　サイコキネシスを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nミュウの　サイコキネシスを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Mew’s Psychic to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Psyko de Mew en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Psichico\ndi Mew in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Mews Attacke Psychokinese\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nPsíquico de Mew."
    ko: "Z파워의 결정.\n뮤의 사이코키네시스를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将梦幻的精神强念\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把夢幻的精神強念\n升級為Ｚ招式。"
mewtwo_candy:
  names:
    jp_kana: ミュウツーのアメ
    jp_kanji: ミュウツーのアメ
    en: Mewtwo Candy
    fr: Bonbon Mewtwo
    it: Caramella Mewtwo
    de: Mewtu-Bonbon
    es: Caramelo Mewtwo
    ko: 뮤츠의사탕
    zh_simp: 超梦的糖果
    zh_trad: 超夢的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
mewtwonite_x:
  names:
    jp_kana: ミュウツナイトＸ
    jp_kanji: ミュウツナイトＸ
    en: Mewtwonite X
    fr: Mewtwoïte X
    it: Mewtwoite X
    de: Mewtunit X
    es: Mewtwoita X
    ko: 뮤츠나이트X
    zh_simp: 超梦进化石Ｘ
    zh_trad: 超夢進化石Ｘ
  descriptions:
    jp_kana: "たたかいのとき　ミュウツーを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　ミュウツーを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Mewtwo to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Mewtwo de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Mewtwo di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Mewtu, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mewtwo en combate."
    ko: "배틀할 때 뮤츠를\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让超梦\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓超夢進行超級進化的\n一種神奇超級石。"
mewtwonite_y:
  names:
    jp_kana: ミュウツナイトＹ
    jp_kanji: ミュウツナイトＹ
    en: Mewtwonite Y
    fr: Mewtwoïte Y
    it: Mewtwoite Y
    de: Mewtunit Y
    es: Mewtwoita Y
    ko: 뮤츠나이트Y
    zh_simp: 超梦进化石Ｙ
    zh_trad: 超夢進化石Ｙ
  descriptions:
    jp_kana: "たたかいのとき　ミュウツーを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　ミュウツーを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Mewtwo to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Mewtwo de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Mewtwo di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Mewtu, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mewtwo en combate."
    ko: "배틀할 때 뮤츠를\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让超梦\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓超夢進行超級進化的\n一種神奇超級石。"
micle_berry:
  names:
    jp_kana: ミクルのみ
    jp_kanji: ミクルのみ
    en: Micle Berry
    fr: Baie Micle
    it: Baccaracolo
    de: Wunfrubeere
    es: Baya Lagro
    ko: 미클열매
    zh_simp: 奇秘果
    zh_trad: 奇秘果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nわざの　めいちゅうりつが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n技の　命中率が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its accuracy will increase just once when\nit’s in a pinch."
    fr: "Tenue, cette Baie augmente une fois la Précision\nd’une capacité en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la precisione della sua\nmossa successiva aumenta."
    de: "Als getragenes Item erhöht diese Beere die\nGenauigkeit eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Cuando la lleva un Pokémon, le sube la Precisión\nde un movimiento en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n기술의 명중률이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n招式的命中率仅会提高１次。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，招式的命中率\n會僅提高１次。"
mighty_candy:
  names:
    jp_kana: ちからのアメ
    jp_kanji: ちからのアメ
    en: Mighty Candy
    fr: Bonbon Force S
    it: Caramella potenza S
    de: Stärkebonbon
    es: Caramelo Músculo
    ko: 힘의사탕
    zh_simp: 力量糖果
    zh_trad: 力量糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　こうげきを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　こうげきを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Attack stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente l’Attaque d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Angriff eines Pokémon."
    es: "Caramelo energético que aumenta el Ataque del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 공격을 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的攻击。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的攻擊。"
mighty_candy_l:
  names:
    jp_kana: ちからのアメＬ
    jp_kanji: ちからのアメＬ
    en: Mighty Candy L
    fr: Bonbon Force M
    it: Caramella potenza M
    de: Stärkebonbon+
    es: Caramelo Músculo +
    ko: 힘의사탕L
    zh_simp: 力量糖果L
    zh_trad: 力量糖果L
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nこうげきを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nこうげきを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Attack stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente l’Attaque d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Angriff eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta el Ataque de\nun Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n공격을 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级30以上的\n宝可梦的攻击上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在30以上的\n寶可夢的攻擊。"
mighty_candy_xl:
  names:
    jp_kana: ちからのアメＸＬ
    jp_kanji: ちからのアメＸＬ
    en: Mighty Candy XL
    fr: Bonbon Force L
    it: Caramella potenza L
    de: Stärkebonbon++
    es: Caramelo Músculo ++
    ko: 힘의사탕XL
    zh_simp: 力量糖果XL
    zh_trad: 力量糖果XL
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nこうげきを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nこうげきを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Attack stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente l’Attaque d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Angriff eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta el Ataque\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n공격을 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级60以上的\n宝可梦的攻击上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在60以上的\n寶可夢的攻擊。"
mimikium_z:bag:
  names:
    jp_kana: ミミッキュＺ
    jp_kanji: ミミッキュＺ
    en: Mimikium Z
    fr: Mimiquizélite
    it: Mimikyum Z
    de: Mimigmium Z
    es: Mimikyustal Z
    ko: 따라큐Z
    zh_simp: 谜拟ＱＺ
    zh_trad: 謎擬ＱＺ
  descriptions:
    jp_kana: "ミミッキュの　じゃれつくを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ミミッキュの　じゃれつくを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nMimikyu’s Play Rough to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Mimiqui qui le tient à transformer\nsa capacité Câlinerie en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Mimikyu di trasformare la mossa\nCarineria in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Mimigmas Attacke\nKnuddler zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nMimikyu convertir su Carantoña en un movimiento Z."
    ko: "따라큐의 치근거리기를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将谜拟Ｑ的嬉闹\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n謎擬Ｑ的嬉鬧\n升級為Ｚ招式的Ｚ力量結晶。"
mimikium_z:held:
  names:
    jp_kana: ミミッキュＺ
    jp_kanji: ミミッキュＺ
    en: Mimikium Z
    fr: Mimiquizélite
    it: Mimikyum Z
    de: Mimigmium Z
    es: Mimikyustal Z
    ko: 따라큐Z
    zh_simp: 谜拟ＱＺ
    zh_trad: 謎擬ＱＺ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nミミッキュの　じゃれつくを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nミミッキュの　じゃれつくを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Mimikyu’s Play Rough to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer la capacité Câlinerie d’un Mimiqui\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Carineria\ndi Mimikyu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Mimigmas Attacke Knuddler\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nCarantoña de Mimikyu."
    ko: "Z파워의 결정.\n따라큐의 치근거리기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将谜拟Ｑ的嬉闹\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將謎擬Ｑ的嬉鬧\n升級為Ｚ招式。"
mind_plate:
  names:
    jp_kana: ふしぎのプレート
    jp_kanji: ふしぎのプレート
    en: Mind Plate
    fr: Plaque Esprit
    it: Lastramente
    de: Hirntafel
    es: Tabla Mental
    ko: 이상한플레이트
    zh_simp: 神奇石板
    zh_trad: 神奇石板
  descriptions:
    jp_kana: "エスパーの　タイプの　せきばん。\nもたせると　エスパータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　石盤。\n持たせると　エスパータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Psychic-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Psico."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Psycho."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Psíquico. Debe llevarla un Pokémon."
    ko: "에스퍼타입의 석판.\n지니게 하면 에스퍼타입\n기술의 위력이 강해진다."
    zh_simp: "超能力属性的石板。\n携带后，超能力属性的\n招式威力就会增强。"
    zh_trad: "超能力屬性的石板。\n攜帶後，超能力屬性的\n招式威力就會增強。"
miracle_seed:
  names:
    jp_kana: きせきのタネ
    jp_kanji: きせきのタネ
    en: Miracle Seed
    fr: Graine Miracle
    it: Miracolseme
    de: Wundersaat
    es: Semilla Milagro
    ko: 기적의씨
    zh_simp: 奇迹种子
    zh_trad: 奇跡種子
  descriptions:
    jp_kana: "せいめいが　やどる　タネ。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "生命が　宿る　タネ。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a seed\nimbued with life-force that boosts the power of\nGrass-type moves."
    fr: "Objet à tenir. Une graine remplie de vie qui augmente\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon.\nSeme intriso di vita che potenzia le mosse\ndi tipo Erba."
    de: "Ein Item zum Tragen. Ein Samen voller Lebenskraft,\nder Attacken vom Typ Pflanze verstärkt."
    es: "Debe llevarla un Pokémon. La vitalidad de la semilla\nfortalece los movimientos de tipo Planta."
    ko: "생명이 깃든 씨앗.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
    zh_simp: "孕育生命的种子。\n携带后，草属性的\n招式威力就会提高。"
    zh_trad: "蘊藏生命的種子。\n攜帶後，草屬性的\n招式威力就會提高。"
misty_seed:
  names:
    jp_kana: ミストシード
    jp_kanji: ミストシード
    en: Misty Seed
    fr: Graine Brume
    it: Nebbiaseme
    de: Nebel-Samen
    es: Semilla Bruma
    ko: 미스트시드
    zh_simp: 薄雾种子
    zh_trad: 薄霧種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nミストフィールドのときに　つかって\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nミストフィールドのときに　使って\n特防が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Def\non Misty Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense lorsque le terrain\nest couvert d’un Champ Brumeux."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa Speciale quando il terreno\ndi lotta è nello stato di Campo Nebbioso."
    de: "Gibst du den Samen einem Pokémon zum Tragen,\nsetzt es ihn ein, wenn ein Nebelfeld aktiv ist, und\nerhöht dadurch seine Spezial-Verteidigung."
    es: "Aumenta la Defensa Especial del portador si se usa\ncuando el terreno está cubierto por un campo de\nniebla."
    ko: "포켓몬에게 지니게 하면\n미스트필드일 때 사용하여\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在薄雾场地上使用，\n特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在薄霧場地上使用，\n就會提高特防。"
moltres_candy:
  names:
    jp_kana: ファイヤーのアメ
    jp_kanji: ファイヤーのアメ
    en: Moltres Candy
    fr: Bonbon Sulfura
    it: Caramella Moltres
    de: Lavados-Bonbon
    es: Caramelo Moltres
    ko: 파이어의사탕
    zh_simp: 火焰鸟的糖果
    zh_trad: 火焰鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
moomoo_milk:
  names:
    jp_kana: モーモーミルク
    jp_kanji: モーモーミルク
    en: Moomoo Milk
    fr: Lait Meumeu
    it: Latte Mumu
    de: Kuhmuh-Milch
    es: Leche Mu-mu
    ko: 튼튼밀크
    zh_simp: 哞哞鲜奶
    zh_trad: 哞哞鮮奶
  descriptions:
    jp_kana: "えいよう　まんてんの　ミルク。\nポケモン　１ひきの　ＨＰを\n１００だけ　かいふくする。"
    jp_kanji: "栄養満点の　ミルク。\nポケモン　１匹の　ＨＰを\n１００だけ　回復する。"
    en: "A bottle of highly nutritious milk. When consumed,\nit restores up to 100 HP to an injured Pokémon."
    fr: "Un lait très nourrissant.\nRestaure 100 PV d’un Pokémon."
    it: "Latte ricco di sostanze nutrienti.\nRestituisce 100 PS a un Pokémon."
    de: "Eine äußerst nährstoffreiche Milch, die die KP eines\nPokémon um 100 Punkte auffüllt."
    es: "Leche de alto valor nutritivo que restaura 100 PS\nde un Pokémon."
    ko: "영양 만점의 우유.\n포켓몬 1마리의 HP를\n100만큼 회복한다."
    zh_simp: "营养百分百的牛奶。\n能让１只宝可梦\n回复100HP。"
    zh_trad: "營養滿分的鮮奶。\n能讓１隻寶可夢\n回復100HP。"
moon_ball:
  names:
    jp_kana: ムーンボール
    jp_kanji: ムーンボール
    en: Moon Ball
    fr: Lune Ball
    it: Luna Ball
    de: Mondball
    es: Luna Ball
    ko: 문볼
    zh_simp: 月亮球
    zh_trad: 月亮球
  descriptions:
    jp_kana: "つきのいしで　しんかする　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つきのいしで　進化する　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that will make it easier to catch\nPokémon that can evolve using a Moon Stone."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon évoluant\navec une Pierre Lune."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon\nche si evolvono con una Pietralunare."
    de: "Ein Ball, der sich besonders gut eignet, um Pokémon\nzu fangen, die sich durch einen Mondstein\nentwickeln."
    es: "Poké Ball algo distinta que atrapa con más facilidad\nlos Pokémon que evolucionan con la Piedra Lunar."
    ko: "달의돌로 진화하는 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n使用月之石进化的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n使用月之石進化的寶可夢。"
moon_flute:
  names:
    jp_kana: つきのふえ
    jp_kanji: つきのふえ
    en: Moon Flute
    fr: Flûte de la Lune
    it: Flauto lunare
    de: Mondflöte
    es: Flauta Lunar
    ko: 달의피리
    zh_simp: 月亮之笛
    zh_trad: 月亮之笛
  descriptions:
    jp_kana: "つきの　でんせつポケモンに\nかんしゃの　きもちを　あらわすため\nねいろを　ささげていた　という。"
    jp_kanji: "月の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    en: "It is said that the tones it produces were offered\nup as an expression of gratitude to the Legendary\nPokémon of the moon."
    fr: "Une flûte dont le timbre permettait d’exprimer\nsa reconnaissance au Pokémon légendaire de la lune."
    it: "Flauto il cui dolce suono esprime la riconoscenza\ndegli esseri umani verso il Pokémon leggendario\ndella luna."
    de: "Auf dieser Flöte soll eine Melodie gespielt worden\nsein, um dem Legendären Mond-Pokémon Dank zu\nsagen."
    es: "Flauta que se hace sonar como muestra de gratitud\nhacia el Pokémon legendario de la luna."
    ko: "달의 전설포켓몬에게\n감사의 마음을 표현하기 위해\n음색을 바쳤다고 한다."
    zh_simp: "为了对月亮的\n传说的宝可梦表达感激之情，\n据说会用它来献上美乐。"
    zh_trad: "為了對月亮的\n傳說的寶可夢表達感激之情，\n據說會用牠來獻上美樂。"
moon_stone:
  names:
    jp_kana: つきのいし
    jp_kanji: つきのいし
    en: Moon Stone
    fr: Pierre Lune
    it: Pietralunare
    de: Mondstein
    es: Piedra Lunar
    ko: 달의돌
    zh_simp: 月之石
    zh_trad: 月之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nよぞらのように　くろい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n夜空のように　黒い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It is as black as the night sky."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est sombre comme la nuit."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È nera come la notte."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist schwarz wie die Nacht."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n밤하늘처럼 까맣다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像夜空一样乌黑。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像夜空一樣深黑。"
mr_mime_candy:
  names:
    jp_kana: バリヤードのアメ
    jp_kanji: バリヤードのアメ
    en: Mr. Mime Candy
    fr: Bonbon M. Mime
    it: Caramella Mr. Mime
    de: Pantimos-Bonbon
    es: Caramelo Mr. Mime
    ko: 마임맨의사탕
    zh_simp: 魔墙人偶的糖果
    zh_trad: 魔牆人偶的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
muscle_band:
  names:
    jp_kana: ちからのハチマキ
    jp_kanji: ちからのハチマキ
    en: Muscle Band
    fr: Bandeau Muscle
    it: Muscolbanda
    de: Muskelband
    es: Cinta Fuerte
    ko: 힘의머리띠
    zh_simp: 力量头带
    zh_trad: 力量頭帶
  descriptions:
    jp_kana: "ちからが　わいてくる　ハチマキ。\nもたせると　ぶつりわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ちからが　わいてくる　ハチマキ。\n持たせると　物理技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. This headband\nexudes strength, slightly boosting the power of\nphysical moves."
    fr: "Objet à tenir. Un bandeau augmentant légèrement\nla puissance des capacités physiques."
    it: "Strumento da dare a un Pokémon.\nFascia che potenzia di poco le mosse fisiche."
    de: "Ein Item zum Tragen. Dieses Stirnband verstärkt\nphysische Attacken etwas."
    es: "Cinta del pelo que aumenta ligeramente la potencia\nde los ataques físicos. Debe llevarla un Pokémon."
    ko: "힘이 끓어오르는 머리띠.\n지니게 하면 물리 기술의\n위력이 조금 올라간다."
    zh_simp: "力如泉涌的头带。\n携带后，物理招式的\n威力就会少量提高。"
    zh_trad: "力如泉湧的頭帶。\n攜帶後，物理招式的\n威力就會少量提高。"
muscle_feather:
  names:
    jp_kana: きんりょくのハネ
    jp_kanji: きんりょくのハネ
    en: Muscle Wing
    fr: Aile Force
    it: Piumpotenza
    de: Kraftfeder
    es: Pluma Músculo
    ko: 근력날개
    zh_simp: 肌力之羽
    zh_trad: 肌力之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　こうげきの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　攻撃の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe base Attack stat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu son Attaque de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dell’Attacco."
    de: "Wendet man dieses Item auf ein Pokémon an,\nwird dessen Angriffs-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco el Ataque de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 공격\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n攻擊的基礎點數。"
mystery_egg:
  names:
    jp_kana: ふしぎなタマゴ
    jp_kanji: ふしぎなタマゴ
    en: Mystery Egg
    fr: Œuf Mystère
    it: Uovo Mistero
    de: Rätsel-Ei
    es: Huevo Misterioso
    ko: 이상한알
    zh_simp: 神奇蛋
    zh_trad: 神奇蛋
  descriptions:
    jp_kana: "ポケモンじいさんから　あずかった\nふしぎな　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    jp_kanji: "ポケモンじいさんから　あずかった\n不思議な　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    en: "A mysterious Egg obtained from Mr. Pokémon.\nWhat is in the Egg is unknown."
    fr: "Un Œuf étrange confié par M. Pokémon.\nPersonne ne sait ce qu’il contient."
    it: "Uovo dai disegni bizzarri che si riceve da\nMr. Pokémon. Non si sa che cosa contenga."
    de: "Ein seltsam gemustertes Ei, das du von\nMr. Pokémon erhalten hast. Sein Inhalt\nliegt im Dunkeln."
    es: "Misterioso Huevo con dibujos que obtienes del\nSr. Pokémon. Nadie sabe qué contiene."
    ko: "포켓몬 할아버지로부터 받은\n이상한 모양의 알.\n어떤 알인지 모른다."
    zh_simp: "从宝可梦爷爷那里得到的\n有着神奇花纹的蛋。\n不知道是什么的蛋。"
    zh_trad: "從寶可夢爺爺那裡得到的\n有著神奇花紋的蛋。\n不知道是什麼的蛋。"
mystic_water:
  names:
    jp_kana: しんぴのしずく
    jp_kanji: しんぴのしずく
    en: Mystic Water
    fr: Eau Mystique
    it: Acqua Magica
    de: Zauberwasser
    es: Agua Mística
    ko: 신비의물방울
    zh_simp: 神秘水滴
    zh_trad: 神秘水滴
  descriptions:
    jp_kana: "しずくの　かたちの　ほうせき。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "しずくの　形の　宝石。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This\nteardrop-shaped gem boosts the power of\nWater-type moves."
    fr: "Objet à tenir. Une gemme en forme de goutte d’eau\nqui augmente la puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nGemma a forma di goccia che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Ein tränenförmiger Edelstein,\nder Attacken vom Typ Wasser verstärkt."
    es: "Gema con forma de gota de agua que fortalece\nlos movimientos de tipo Agua. Debe llevarla un\nPokémon."
    ko: "물방울 모양의 보석.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "水滴形状的宝石。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "水滴形狀的寶石。\n攜帶後，水屬性的\n招式威力就會提高。"
n_lunarizer:fuse:
  names:
    jp_kana: ネクロプラスルナ
    jp_kanji: ネクロプラスルナ
    en: N-Lunarizer
    fr: Necroluna
    it: Necrolunix
    de: Necrolun
    es: Necroluna
    ko: 네크로플러스루나
    zh_simp: 奈克洛露奈合体器
    zh_trad: 奈克洛露奈合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　する\nネクロズマと　ルナアーラを\nがったい　させるための　マシン。"
    jp_kanji: "光を　必要と　する\nネクロズマと　ルナアーラを\n合体　させるための　マシン。"
    en: "A machine to fuse Necrozma, which needs light,\nand Lunala."
    fr: "Un appareil permettant à un Necrozma assoiffé\nde lumière de fusionner avec Lunala."
    it: "Dispositivo che permette a Necrozma di fondersi\ncon Lunala quando necessita di luce."
    de: "Necrozma, das Licht benötigt, kann mithilfe dieser\nMaschine mit Lunala fusioniert werden."
    es: "Artefacto que permite fusionar a Necrozma, ávido\nde luz, con Lunala."
    ko: "빛을 필요로 하는\n네크로즈마와 루나아라를\n합체시키기 위한 머신."
    zh_simp: "用来让需求光的奈克洛兹玛和\n露奈雅拉合体的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n露奈雅拉合體的機器。"
n_lunarizer:separate:
  names:
    jp_kana: ネクロプラスルナ
    jp_kanji: ネクロプラスルナ
    en: N-Lunarizer
    fr: Necroluna
    it: Necrolunix
    de: Necrolun
    es: Necroluna
    ko: 네크로플러스루나
    zh_simp: 奈克洛露奈合体器
    zh_trad: 奈克洛露奈合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　していた\nネクロズマと　ルナアーラを\nぶんり　させるための　マシン。"
    jp_kanji: "光を　必要と　していた\nネクロズマと　ルナアーラを\n分離　させるための　マシン。"
    en: "A machine to separate Necrozma, which needed\nlight, from Lunala."
    fr: "Un appareil permettant d’annuler la fusion d’un\nNecrozma assoiffé de lumière avec Lunala."
    it: "Dispositivo che permette a Necrozma di separarsi\nda Lunala quando non necessita più di luce."
    de: "Necrozma, das Licht benötigte, kann mithilfe dieser\nMaschine wieder von Lunala getrennt werden."
    es: "Artefacto que permite separar a Necrozma, ávido\nde luz, tras su fusión con Lunala."
    ko: "빛을 필요로 했던\n네크로즈마와 루나아라를\n분리시키기 위한 머신."
    zh_simp: "用来让曾需求过光的奈克洛兹玛和\n露奈雅拉分离的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n露奈雅拉分離的機器。"
n_solarizer:fuse:
  names:
    jp_kana: ネクロプラスソル
    jp_kanji: ネクロプラスソル
    en: N-Solarizer
    fr: Necrosol
    it: Necrosolix
    de: Necrosol
    es: Necrosol
    ko: 네크로플러스솔
    zh_simp: 奈克洛索尔合体器
    zh_trad: 奈克洛索爾合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　する\nネクロズマと　ソルガレオを\nがったい　させるための　マシン。"
    jp_kanji: "光を　必要と　する\nネクロズマと　ソルガレオを\n合体　させるための　マシン。"
    en: "A machine to fuse Necrozma, which needs light,\nand Solgaleo."
    fr: "Un appareil permettant à un Necrozma assoiffé\nde lumière de fusionner avec Solgaleo."
    it: "Dispositivo che permette a Necrozma di fondersi\ncon Solgaleo quando necessita di luce."
    de: "Necrozma, das Licht benötigt, kann mithilfe dieser\nMaschine mit Solgaleo fusioniert werden."
    es: "Artefacto que permite fusionar a Necrozma, ávido\nde luz, con Solgaleo."
    ko: "빛을 필요로 하는\n네크로즈마와 솔가레오를\n합체시키기 위한 머신."
    zh_simp: "用来让需求光的奈克洛兹玛和\n索尔迦雷欧合体的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n索爾迦雷歐合體的機器。"
n_solarizer:separate:
  names:
    jp_kana: ネクロプラスソル
    jp_kanji: ネクロプラスソル
    en: N-Solarizer
    fr: Necrosol
    it: Necrosolix
    de: Necrosol
    es: Necrosol
    ko: 네크로플러스솔
    zh_simp: 奈克洛索尔合体器
    zh_trad: 奈克洛索爾合體器
  descriptions:
    jp_kana: "ひかりを　ひつようと　していた\nネクロズマと　ソルガレオを\nぶんり　させるための　マシン。"
    jp_kanji: "光を　必要と　していた\nネクロズマと　ソルガレオを\n分離　させるための　マシン。"
    en: "A machine to separate Necrozma, which needed\nlight, from Solgaleo."
    fr: "Un appareil permettant d’annuler la fusion d’un\nNecrozma assoiffé de lumière avec Solgaleo."
    it: "Dispositivo che permette a Necrozma di separarsi\nda Solgaleo quando non necessita più di luce."
    de: "Necrozma, das Licht benötigte, kann mithilfe dieser\nMaschine wieder von Solgaleo getrennt werden."
    es: "Artefacto que permite separar a Necrozma, ávido\nde luz, tras su fusión con Solgaleo."
    ko: "빛을 필요로 했던\n네크로즈마와 솔가레오를\n분리시키기 위한 머신."
    zh_simp: "用来让曾需求过光的奈克洛兹玛和\n索尔迦雷欧分离的机器。"
    zh_trad: "用來讓需要光的奈克洛茲瑪和\n索爾迦雷歐分離的機器。"
nanab_berry:
  names:
    jp_kana: ナナのみ
    jp_kanji: ナナのみ
    en: Nanab Berry
    fr: Baie Nanab
    it: Baccabana
    de: Nanabbeere
    es: Baya Latano
    ko: 나나열매
    zh_simp: 蕉香果
    zh_trad: 蕉香果
  descriptions:
    jp_kana: "ポケモンを　つかまえる　ときに\nあたえると　すこし　おちつく　きのみ。"
    jp_kanji: "ポケモンを　捕まえる　ときに\nあたえると　少し　落ち着く　きのみ。"
    en: "A Berry that calms wild Pokémon you’re trying to catch\nslightly when given to them."
    fr: "Une Baie à donner à un Pokémon sauvage au moment\nde la capture pour le calmer un court instant."
    it: "Bacca che calma un po’ il Pokémon selvatico\na cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nwird es während des Fangversuchs etwas ruhiger."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara tranquilizarlo un poco."
    ko: "포켓몬을 잡을 때 주면\n조금 얌전해지는 나무열매."
    zh_simp: "捕捉宝可梦时，\n把这树果交给宝可梦就能\n稍微平复一下对方的情绪。"
    zh_trad: "在捕捉時把這個樹果餵給寶可夢，\n就能稍微讓牠們的情緒穩定下來。"
nest_ball:
  names:
    jp_kana: ネストボール
    jp_kanji: ネストボール
    en: Nest Ball
    fr: Faiblo Ball
    it: Minor Ball
    de: Nestball
    es: Nido Ball
    ko: 네스트볼
    zh_simp: 巢穴球
    zh_trad: 巢穴球
  descriptions:
    jp_kana: "つかまえる　やせいの　ポケモンが\nよわいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえる　野生の　ポケモンが\n弱いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes more\neffective the lower the level of the wild Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon les plus faibles."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon selvatici più deboli."
    de: "Ein Ball, dessen Erfolgsquote besonders bei\nPokémon mit niedrigem Level sehr hoch ist."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon salvajes\nde nivel bajo."
    ko: "잡으려는 야생 포켓몬이\n약할수록 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n捕捉的野生宝可梦越弱，\n就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n捕捉的野生寶可夢越弱，\n就越容易捉到。"
net_ball:
  names:
    jp_kana: ネットボール
    jp_kanji: ネットボール
    en: Net Ball
    fr: Filet Ball
    it: Rete Ball
    de: Netzball
    es: Malla Ball
    ko: 넷트볼
    zh_simp: 捕网球
    zh_trad: 捕網球
  descriptions:
    jp_kana: "みずタイプと　むしタイプの\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "みずタイプと　むしタイプの\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that is more\neffective when attempting to catch Water- or\nBug-type Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon Eau ou Insecte."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon di tipo Acqua e Coleottero."
    de: "Ein Ball, der sich besonders gut eignet, um Wasser-\nund Käfer-Pokémon zu fangen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon de tipo\nAgua y Bicho."
    ko: "물타입과 벌레타입의\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n水属性和虫属性的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n水屬性和蟲屬性寶可夢。"
never_melt_ice:
  names:
    jp_kana: とけないこおり
    jp_kanji: とけないこおり
    en: Never-Melt Ice
    fr: Glace Éternelle
    it: Gelomai
    de: Ewiges Eis
    es: Antiderretir
    ko: 녹지않는얼음
    zh_simp: 不融冰
    zh_trad: 不融冰
  descriptions:
    jp_kana: "ねつを　よせつけない　こおり。\nもたせると　こおりタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "熱を　よせつけない　氷。\n持たせると　こおりタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a heat-\nrepelling piece of ice that boosts the power of\nIce-type moves."
    fr: "Objet à tenir. Un morceau de glace qui réfléchit\nla chaleur et augmente la puissance des capacités\nde type Glace."
    it: "Strumento da dare a un Pokémon.\nPezzo di ghiaccio che respinge il calore e potenzia\nle mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Ein Stück Eis, das Hitze\nfernhält und Attacken vom Typ Eis verstärkt."
    es: "Fragmento de hielo que repele el calor y fortalece\nlos movimientos de tipo Hielo. Debe llevarlo un\nPokémon."
    ko: "열을 가까이하지 않게 하는 얼음.\n지니게 하면 얼음타입\n기술의 위력이 올라간다."
    zh_simp: "能隔绝热量的冰。\n携带后，冰属性的\n招式威力就会提高。"
    zh_trad: "隔絕熱的冰。\n攜帶後，冰屬性的\n招式威力就會提高。"
nidoran_f_candy:
  names:
    jp_kana: ニドラン♀のアメ
    jp_kanji: ニドラン♀のアメ
    en: Nidoran♀ Candy
    fr: Bonbon Nidoran♀
    it: Caramella Nidoran♀
    de: Nidoran♀-Bonbon
    es: Caramelo Nidoran♀
    ko: 니드런♀의사탕
    zh_simp: 尼多兰的糖果
    zh_trad: 尼多蘭的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
nidoran_m_candy:
  names:
    jp_kana: ニドラン♂のアメ
    jp_kanji: ニドラン♂のアメ
    en: Nidoran♂ Candy
    fr: Bonbon Nidoran♂
    it: Caramella Nidoran♂
    de: Nidoran♂-Bonbon
    es: Caramelo Nidoran♂
    ko: 니드런♂의사탕
    zh_simp: 尼多朗的糖果
    zh_trad: 尼多朗的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
nomel_berry:
  names:
    jp_kana: ノメルのみ
    jp_kanji: ノメルのみ
    en: Nomel Berry
    fr: Baie Tronci
    it: Baccalemon
    de: Tronzibeere
    es: Baya Monli
    ko: 노멜열매
    zh_simp: 檬柠果
    zh_trad: 檬檸果
  descriptions:
    jp_kana: "たくましさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "たくましさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nToughness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nla Robustesse d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Grinta del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Stärke erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dureza. Es una baya muy rara en otras regiones."
    ko: "강인함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨强壮。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進強壯的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
normal_gem:
  names:
    jp_kana: ノーマルジュエル
    jp_kanji: ノーマルジュエル
    en: Normal Gem
    fr: Joyau Normal
    it: Bijounormale
    de: Normaljuwel
    es: Gema Normal
    ko: 노말주얼
    zh_simp: 一般宝石
    zh_trad: 一般寶石
  descriptions:
    jp_kana: "ノーマルの　タイプの　ジュエル。\nもたせると　いちどだけ　ノーマルの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ノーマルの　タイプの　ジュエル。\n持たせると　１度だけ　ノーマルの\n技の　威力が　強まる。"
    en: "A gem with an ordinary essence. When held, it\nstrengthens the power of a Normal-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Normale."
    de: "Ein Juwel vom Typ Normal. Es erhöht einmalig die\nStärke einer Attacke vom Typ Normal."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Normal. Debe llevarla un Pokémon."
    ko: "노말타입의 주얼.\n지니게 하면 한 번만 노말\n기술의 위력이 강해진다."
    zh_simp: "一般属性的宝石。\n携带后，一般属性的\n招式威力仅会增强１次。"
    zh_trad: "一般屬性的寶石。\n攜帶後，一般屬性招式的\n威力會僅增強１次。"
normalium_z:bag:
  names:
    jp_kana: ノーマルＺ
    jp_kanji: ノーマルＺ
    en: Normalium Z
    fr: Normazélite
    it: Normium Z
    de: Normium Z
    es: Normastal Z
    ko: 노말Z
    zh_simp: 一般Ｚ
    zh_trad: 一般Ｚ
  descriptions:
    jp_kana: "ノーマルタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ノーマルタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nNormal-type moves to Normal-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Normal en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Normale in mosse Z."
    de: "Kristallisierte Z-Kraft, die Normal-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nNormal en movimientos Z."
    ko: "노말타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将一般属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把一般屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
normalium_z:held:
  names:
    jp_kana: ノーマルＺ
    jp_kanji: ノーマルＺ
    en: Normalium Z
    fr: Normazélite
    it: Normium Z
    de: Normium Z
    es: Normastal Z
    ko: 노말Z
    zh_simp: 一般Ｚ
    zh_trad: 一般Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nノーマルタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nノーマルタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Normal-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Normal en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Normale\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Normal-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Normal."
    ko: "Z파워의 결정.\n노말타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将一般属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把一般屬性的招式\n升級為Ｚ招式。"
nugget:
  names:
    jp_kana: きんのたま
    jp_kanji: きんのたま
    en: Nugget
    fr: Pépite
    it: Pepita
    de: Nugget
    es: Pepita
    ko: 금구슬
    zh_simp: 金珠
    zh_trad: 金珠
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきん　せいの　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　玉。\nショップで　高く　売れる。"
    en: "A nugget of the purest gold that gives off a lustrous\ngleam in direct light. It can be sold at a high price\nto shops."
    fr: "Une pépite d’or pur qui brille d’un éclat magnifique.\nPeut être vendue à bon prix aux magasins."
    it: "Pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein Nugget aus purem Gold, das einen\nschimmernden Glanz besitzt. Es ist von\ngroßem Wert."
    es: "Pepita de oro puro que desprende un brillo\nespectacular. Puede venderse a un precio muy\nalto en las tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 구슬.\n상점에서 비싸게 팔린다."
    zh_simp: "闪着金光，\n以纯金制成的珠子。\n可以在商店高价出售。"
    zh_trad: "閃著金光的\n純金製珠子。\n可以在商店高價出售。"
oaks_letter:
  names:
    jp_kana: オーキドのてがみ
    jp_kanji: オーキドのてがみ
    en: Oak’s Letter
    fr: Lettre Chen
    it: Lettera Oak
    de: Eichs Brief
    es: Carta Prof. Oak
    ko: 오박사의편지
    zh_simp: 大木的信
    zh_trad: 大木的信
  descriptions:
    jp_kana: "オーキドはかせ　からの　てがみ。\nなかには　２２４ばんどうろに\nきてほしいと　かかれている。"
    jp_kanji: "オーキド博士からの　手紙。\n中には　２２４番道路に\n来てほしいと　書かれている。"
    en: "A letter from Professor Oak. Written in it is a\nrequest for you to go to Route 224."
    fr: "Une lettre du Professeur Chen vous demandant\nde vous rendre sur la Route 224."
    it: "Lettera del Prof. Oak con la richiesta di dirigerti\nverso il Percorso 224."
    de: "Ein Brief von Prof. Eich. Er bittet dich,\nzur Route 224 zu gehen."
    es: "Carta del Profesor Oak en la que se te pide que vayas\na la Ruta 224."
    ko: "오박사의 편지다.\n안에는 224번도로로\n와달라고 적혀 있다."
    zh_simp: "大木博士的来信。\n上面写着请来224号道路。"
    zh_trad: "來自大木博士的信。\n上面寫著請來\n224號道路。"
occa_berry:
  names:
    jp_kana: オッカのみ
    jp_kanji: オッカのみ
    en: Occa Berry
    fr: Baie Chocco
    it: Baccacao
    de: Koakobeere
    es: Baya Caoca
    ko: 오카열매
    zh_simp: 巧可果
    zh_trad: 巧可果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ほのお　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ほのお技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFire-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Feu."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Fuoco del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Feuer."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Fuego de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 불꽃 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的火属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的火屬性招式\n攻擊時，能使其威力減弱。"
odd_incense:
  names:
    jp_kana: あやしいおこう
    jp_kanji: あやしいおこう
    en: Odd Incense
    fr: Encens Bizarre
    it: Bizzoaroma
    de: Schrägrauch
    es: Incienso Raro
    ko: 괴상한향로
    zh_simp: 奇异薰香
    zh_trad: 奇異薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This\nexotic-smelling incense boosts the power of\nPsychic-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Psycho."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Psíquico. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，超能力属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，超能力屬性的\n招式威力就會提高。"
odd_keystone:
  names:
    jp_kana: かなめいし
    jp_kanji: かなめいし
    en: Odd Keystone
    fr: Clé de Voûte
    it: Roccianima
    de: Spiritkern
    es: Piedra Espíritu
    ko: 쐐기돌
    zh_simp: 楔石
    zh_trad: 楔石
  descriptions:
    jp_kana: "これがないと　いしのとうが\nくずれてしまう　だいじないし。\nときどき　いしから　こえがきこえる。"
    jp_kanji: "これがないと　石の塔が\n崩れてしまう　大事な石。\nときどき　石から　声が聞こえる。"
    en: "A vital item that is needed to keep a stone tower\nfrom collapsing. Voices can be heard from\nit occasionally."
    fr: "Un objet très important qui empêche une tour en pierre\nde s’écrouler. Des voix en sortent parfois."
    it: "Strumento importante che impedisce il crollo\ndi un pozzo di pietra. A volte dal suo interno\nprovengono delle voci."
    de: "Ein wichtiges Item, mit dem ein Steinturm repariert\nwerden kann."
    es: "Vital para impedir que una torre de piedra se derrumbe.\nA veces se oyen voces en su interior."
    ko: "이것이 없으면 돌탑이\n무너져버리는 중요한 돌.\n가끔 돌에서 목소리가 들린다."
    zh_simp: "没有它，石之塔就会\n崩塌的重要石头。\n有时能从石头里听到声音。"
    zh_trad: "沒有它，石之塔就會\n崩塌的重要石頭。\n有時能從石頭裡聽到聲音。"
oddish_candy:
  names:
    jp_kana: ナゾノクサのアメ
    jp_kanji: ナゾノクサのアメ
    en: Oddish Candy
    fr: Bonbon Mystherbe
    it: Caramella Oddish
    de: Myrapla-Bonbon
    es: Caramelo Oddish
    ko: 뚜벅쵸의사탕
    zh_simp: 走路草的糖果
    zh_trad: 走路草的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
old_amber:
  names:
    jp_kana: ひみつのコハク
    jp_kanji: ひみつのコハク
    en: Old Amber
    fr: Vieil Ambre
    it: Ambra antica
    de: Altbernstein
    es: Ámbar Viejo
    ko: 비밀의호박
    zh_simp: 秘密琥珀
    zh_trad: 秘密琥珀
  descriptions:
    jp_kana: "こだい　ポケモンの　いでんしが\nとじこめられている　コハク。\nあかみを　おびて　すけている。"
    jp_kanji: "古代ポケモンの　遺伝子が\n閉じこめられている　コハク。\n赤みを　帯びて　透けている。"
    en: "A piece of amber that still contains the genetic\nmaterial of an ancient Pokémon. It’s clear with a\ntawny, reddish tint."
    fr: "Un morceau d’ambre contenant l’ADN d’un ancien\nPokémon. Il est de couleur jaune."
    it: "Pezzo di ambra che contiene il materiale genetico\ndi un Pokémon antico. È chiaro e di colore giallastro."
    de: "Ein Stück Bernstein, in dem die Gene eines uralten\nPokémon enthalten sind. Es ist durchsichtig."
    es: "Fragmento de ámbar que contiene información genética\nde un Pokémon prehistórico. Es de color amarillo."
    ko: "고대 포켓몬의 유전자가\n갇혀 있는 호박.\n붉은 기가 돌면서 약간 투명하다."
    zh_simp: "封存着古代宝可梦\n遗传基因的琥珀，\n透着点红色。"
    zh_trad: "封存著古代寶可夢\n遺傳基因的琥珀，\n透著點紅色。"
old_charm:
  names:
    jp_kana: こだいのおまもり
    jp_kanji: こだいのおまもり
    en: Old Charm
    fr: Vieux Grigri
    it: Arcamuleto
    de: Talisman
    es: Talismán
    ko: 고대의부적
    zh_simp: 古代护符
    zh_trad: 古代護符
  descriptions:
    jp_kana: "カンナギタウンの　ちょうろうに\nとどける　おおむかしの　おまもり。\nポケモンの　ホネで　つくられている。"
    jp_kanji: "カンナギタウンの　長老に\n届ける　大昔の　おまもり。\nポケモンの　ホネで　つくられている。"
    en: "An ancient good-luck charm made of Pokémon\nbones to be taken to the elder of Celestic Town."
    fr: "Un ancien porte-bonheur fait d’os de Pokémon\nà apporter à la doyenne de Célestia."
    it: "Antico portafortuna fatto di ossa di Pokémon\nda portare all’anziana di Memoride."
    de: "Ein antiker Glücksbringer. Soll der Ältesten in Elyses\nüberbracht werden."
    es: "Está hecho con huesos de Pokémon y trae buena suerte.\nHay que llevárselo a la anciana de Pueblo Caelestis."
    ko: "봉신마을의 장로에게\n전해줄 오랜 옛날의 부적.\n포켓몬의 뼈로 만들어졌다."
    zh_simp: "要交给神和镇上长老的远古护符。\n由宝可梦的骨头制成。"
    zh_trad: "要交給神和鎮上長老的遠古護符。\n由寶可夢的骨頭製成。"
old_gateau:
  names:
    jp_kana: もりのヨウカン
    jp_kanji: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce Gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
    zh_simp: 森之羊羹
    zh_trad: 森之羊羹
  descriptions:
    jp_kana: "ハクタイの　かくれた　めいぶつ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ハクタイの　隠れた　名物。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "The Old Chateau’s hidden specialty. It can be used\nonce to heal all the status conditions of a Pokémon."
    fr: "Une spécialité du Vieux Château.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Specialità segreta dell’Antico Château.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine gut versteckte Spezialität aus Ewigenau.\nSie behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de la Vieja Mansión. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "영원시티의 숨은 명물.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "百代不为人知的特产。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "百代不為人知的特產。\n能治癒１隻寶可夢的\n所有異常狀態。"
old_rod:
  names:
    jp_kana: ボロのつりざお
    jp_kanji: ボロのつりざお
    en: Old Rod
    fr: Canne
    it: Amo Vecchio
    de: Angel
    es: Caña Vieja
    ko: 낡은낚싯대
    zh_simp: 破旧钓竿
    zh_trad: 破舊釣竿
  descriptions:
    jp_kana: "ふるくて　ボロい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "ふるくて　ボロい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An old and beat-up fishing rod. Use it at any body\nof water to fish for wild aquatic Pokémon."
    fr: "Une vieille canne usée.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo vecchio e rovinato. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine alte, abgenutzte Angel. Damit kannst du in\njedem Gewässer nach Pokémon angeln."
    es: "Caña de pescar bastante usada y desgastada.\nPesca Pokémon salvajes en todo tipo de aguas."
    ko: "낡고 조잡한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "又破又旧的钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "又破又舊的釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
omanyte_candy:
  names:
    jp_kana: オムナイトのアメ
    jp_kanji: オムナイトのアメ
    en: Omanyte Candy
    fr: Bonbon Amonita
    it: Caramella Omanyte
    de: Amonitas-Bonbon
    es: Caramelo Omanyte
    ko: 암나이트의사탕
    zh_simp: 菊石兽的糖果
    zh_trad: 菊石獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
onix_candy:
  names:
    jp_kana: イワークのアメ
    jp_kanji: イワークのアメ
    en: Onix Candy
    fr: Bonbon Onix
    it: Caramella Onix
    de: Onix-Bonbon
    es: Caramelo Onix
    ko: 롱스톤의사탕
    zh_simp: 大岩蛇的糖果
    zh_trad: 大岩蛇的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
oran_berry:
  names:
    jp_kana: オレンのみ
    jp_kanji: オレンのみ
    en: Oran Berry
    fr: Baie Oran
    it: Baccarancia
    de: Sinelbeere
    es: Baya Aranja
    ko: 오랭열매
    zh_simp: 橙橙果
    zh_trad: 橙橙果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　１０だけ　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can restore its own HP by 10 points\nduring battle."
    fr: "Une Baie qui restaure 10 PV lorsqu’elle est tenue\npar un Pokémon."
    it: Se un Pokémon ha questa bacca, recupera 10 PS.
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt sie seine KP um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\n10 PS."
    ko: "포켓몬에게 지니게 하면\nHP를 10만큼 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复10HP。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復10HP。"
orange_petal:
  names:
    jp_kana: だいだいはなびら
    jp_kanji: だいだいはなびら
    en: Orange Petal
    fr: Pétale Orange
    it: Petalo arancione
    de: Oranges Blatt
    es: Pétalo Naranja
    ko: 주황꽃잎
    zh_simp: 橙色花瓣
    zh_trad: 橙色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　イリマから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　イリマから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Ilima\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé qu’Althéo vous a remis lors de\nl’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Liam durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Elima erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Liam durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 일리마에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从伊利马那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從伊利馬那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
oval_charm:
  names:
    jp_kana: まるいおまもり
    jp_kanji: まるいおまもり
    en: Oval Charm
    fr: Charme Ovale
    it: Ovamuleto
    de: Ovalpin
    es: Amuleto Oval
    ko: 둥근부적
    zh_simp: 圆形护符
    zh_trad: 圓形護符
  descriptions:
    jp_kana: "もっていると　あずかりやさんで\nタマゴが　みつかりやすくなる\nふしぎで　とてもまるい　おまもり。"
    jp_kanji: "持っていると　預かり屋さんで\nタマゴが　みつかりやすくなる\n不思議で　とてもまるい　おまもり。"
    en: "An oval charm said to increase the chance of\nPokémon Eggs being found at the Nursery."
    fr: "Un mystérieux charme rond qui permet de trouver\nplus facilement des Œufs à la Garderie Pokémon."
    it: "Misterioso amuleto di forma sferica che aumenta la\nprobabilità di trovare Uova nell’Ostello Pokémon."
    de: "Ein mysteriöser, ovaler Glücksbringer, der die\nWahrscheinlichkeit erhöht, im Hort Eier zu finden."
    es: "Misterioso amuleto ovalado que aumenta la\nposibilidad de encontrar Huevos en Cuidados\nPokémon."
    ko: "지니고 있으면 맡기미집에서\n알을 발견하기 쉬워지는\n이상하고 매우 둥근 부적."
    zh_simp: "拥有它之后，在寄放屋里\n会更容易找到蛋的\n神奇浑圆护符。"
    zh_trad: "只要擁有它，便會變得\n更容易在寄放屋裡發現蛋的\n神奇渾圓護符。"
oval_stone:
  names:
    jp_kana: まんまるいし
    jp_kanji: まんまるいし
    en: Oval Stone
    fr: Pierre Ovale
    it: Pietraovale
    de: Ovaler Stein
    es: Piedra Oval
    ko: 동글동글돌
    zh_simp: 浑圆之石
    zh_trad: 渾圓之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたまのように　まるい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nたまのように　まるい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It’s as round as a Pokémon Egg."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle a la forme d’un œuf."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È a forma di uovo."
    de: "Dieser besondere, eiförmige Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Tiene forma de huevo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n구슬처럼 둥글다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像珠子一般圆润。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像珠子一般圓潤。"
pair_of_tickets:
  names:
    jp_kana: ペアチケット
    jp_kanji: ペアチケット
    en: Pair of Tickets
    fr: Ticket Duo
    it: Biglietto doppio
    de: Zweierticket
    es: Entrada para dos
    ko: 페어티켓
    zh_simp: 双人票
    zh_trad: 雙人票
  descriptions:
    jp_kana: "トクサネうちゅうセンターで\nひらかれている　てんたいショーの\nふたりぐみ　チケット。"
    jp_kanji: "トクサネ宇宙センターで　開かれている\n天体ショーの　２人組チケット。"
    en: "Tickets for two to the astronomical show being\nheld at the Mossdeep Space Center."
    fr: "Un ticket pour deux personnes pour le spectacle\nd’astronomie se déroulant au Centre Spatial d’Algatia."
    it: "Biglietto per due persone per lo spettacolo\nastronomico del Centro Spaziale di Verdeazzupoli."
    de: "Eine Eintrittskarte, mit der zwei Personen Zutritt\nzur Astronomie-Show des Raumfahrtzentrums\nvon Moosbach City erhalten."
    es: "Pase de dos personas para asistir al espectáculo\nde astronomía que se celebra en el Centro Espacial\nde Algaria."
    ko: "이끼 우주센터에서\n열리고 있는 천체쇼의\n2인용 티켓이다."
    zh_simp: "在绿岭宇宙中心举办的\n天体展览的双人票。"
    zh_trad: "在綠嶺宇宙中心舉辦的\n天體展覽的雙人票。"
pal_pad:
  names:
    jp_kana: ともだちてちょう
    jp_kanji: ともだちてちょう
    en: Pal Pad
    fr: Registre Ami
    it: Blocco Amici
    de: Adressbuch
    es: Bloc amigos
    ko: 친구수첩
    zh_simp: 朋友手册
    zh_trad: 朋友手冊
  descriptions:
    jp_kana: "ともだちを　とうろくしたり\nあそんだ　ことを　きろくする\nべんりな　てちょう。"
    jp_kanji: "友達を　登録したり\n遊んだことを　記録する\n便利な　手帳。"
    en: "A convenient notepad that is used to register your\nfriends and friend codes and keep a record of\nyour gameplay."
    fr: "Un carnet bien pratique pour enregistrer vos amis,\nleurs codes ami et des données de jeu."
    it: "Blocco appunti utile per registrare gli amici e\nil loro codice amico e per tenere un resoconto\ndell’esperienza di gioco."
    de: "In diesem praktischen Buch kannst du die\nFreundescodes deiner Freunde aufbewahren."
    es: "Un cuaderno muy práctico en el que puedes registrar\namigos, claves de amigo, etc."
    ko: "친구를 등록하거나\n친구와 놀았던 기록을 관리하는\n편리한 수첩."
    zh_simp: "使用方便的手册。\n可以添加朋友或\n记录游戏的内容。"
    zh_trad: "好用的手冊。\n可以新增朋友或\n記錄遊戲的內容。"
pamtre_berry:
  names:
    jp_kana: シーヤのみ
    jp_kanji: シーヤのみ
    en: Pamtre Berry
    fr: Baie Palma
    it: Baccapalma
    de: Pallmbeere
    es: Baya Plama
    ko: 자야열매
    zh_simp: 椰木果
    zh_trad: 椰木果
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nla Beauté d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es una baya muy rara en otras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
paralyze_heal:
  names:
    jp_kana: まひなおし
    jp_kanji: まひなおし
    en: Paralyze Heal
    fr: Anti-Para
    it: Antiparalisi
    de: Para-Heiler
    es: Antiparalizador
    ko: 마비치료제
    zh_simp: 解麻药
    zh_trad: 解麻藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　まひの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　まひの\n状態を　回復する。"
    en: "A spray-type medicine for treating paralysis. It can be\nused to free a single Pokémon that has been paralyzed."
    fr: "Un médicament sous forme de spray.\nSoigne un Pokémon de la paralysie."
    it: "Rimedio spray.\nCura un Pokémon dalla paralisi."
    de: Ein Spray, das ein Pokémon von Paralyse heilt.
    es: Medicina en espray que cura a un Pokémon paralizado.
    ko: "스프레이식의 약.\n포켓몬 1마리의\n마비 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n麻痹状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n麻痺狀態。"
paras_candy:
  names:
    jp_kana: パラスのアメ
    jp_kanji: パラスのアメ
    en: Paras Candy
    fr: Bonbon Paras
    it: Caramella Paras
    de: Paras-Bonbon
    es: Caramelo Paras
    ko: 파라스의사탕
    zh_simp: 派拉斯的糖果
    zh_trad: 派拉斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
parcel:kanto:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
    zh_simp: 包裹
    zh_trad: 包裹
  descriptions:
    jp_kana: "トキワシティの　ショップ　から\nオーキドはかせに　とどけるよう\nたのまれた　にもつ。"
    jp_kanji: "トキワシティの　ショップ　から\nオーキド博士に　届けるよう\n頼まれた　荷物。"
    en: "A parcel to be delivered to Professor Oak from\nViridian City’s Poké Mart."
    fr: "Un paquet à livrer au Professeur Chen de la part\nde la Boutique Pokémon de Jadielle."
    it: "Un pacchetto per il Professor Oak dal Pokémon-Market\ndi Smeraldopoli."
    de: "Ein Paket für Professor Eich, das man dir\nim Pokémon-Supermarkt von Vertania City\nanvertraut hat."
    es: "Un paquete para el Profesor Oak que te entregaron\nen la Tienda Pokémon de Ciudad Verde."
    ko: "상록시티의 숍에서\n오박사님에게 전달하도록\n부탁받은 물건."
    zh_simp: "这是常青市的商店\n托付给你的包裹。\n需要将它交给大木博士。"
    zh_trad: "在常青市的商店\n被拜託送到大木博士\n手上的包裹。"
parcel:sinnoh:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
    zh_simp: 包裹
    zh_trad: 包裹
  descriptions:
    jp_kana: "フタバタウンから　たびだった\nおさななじみに　わたすように\nたのまれた　おとどけもの。"
    jp_kanji: "フタバタウンから　旅立った\n幼なじみに　渡すように\n頼まれた　おとどけもの。"
    en: "A parcel entrusted into your care. You’re supposed\nto deliver it to your childhood friend who left\nTwinleaf Town."
    fr: "Un paquet qu’on vous a confié.\nVous devez le remettre à votre ami d’enfance\nqui a quitté Bonaugure."
    it: "Pacchetto da consegnare al tuo amico d’infanzia\nche ha lasciato Duefoglie."
    de: "Ein Paket, das dir anvertraut wurde. Du sollst es\ndeinem besten Freund geben, der Zweiblattdorf\nverließ."
    es: "Paquete encomendado a tu cuidado que tienes\nque entregar a tu amigo de la infancia que dejó\nPueblo Hojaverde."
    ko: "떡잎마을에서 여행을 떠난\n소꿉친구에게 건네주도록\n부탁받은 물건."
    zh_simp: "这是别人托付给你的包裹。\n需要将它交给从双叶镇启程\n踏上旅途的青梅竹马。"
    zh_trad: "受人之託要交給從雙葉鎮\n啟程踏上旅途的\n青梅竹馬的包裹。"
park_ball:
  names:
    jp_kana: パークボール
    jp_kanji: パークボール
    en: Park Ball
    fr: Parc Ball
    it: Parco Ball
    de: Parkball
    es: Parque Ball
    ko: 파크볼
    zh_simp: 公园球
    zh_trad: 公園球
  descriptions:
    jp_kana: "パルパークの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "パルパークの　なかで\n使う　特別な　ボール。"
    en: A special Poké Ball for the Pal Park.
    fr: Une Poké Ball spéciale utilisée au Parc des Amis.
    it: "Poké Ball speciale utilizzata solo all’interno\ndel Parco Amici."
    de: "Ein Ball, der nur im Park der Freunde\neingesetzt wird."
    es: Poké Ball que se utiliza dentro del Parque Compi.
    ko: "팔파크 내에서\n사용하는 특별한 볼."
    zh_simp: "在伙伴公园里使用的\n特殊的球。"
    zh_trad: "在夥伴公園裡使用的\n特殊的球。"
pass:
  names:
    jp_kana: リニアパス
    jp_kanji: リニアパス
    en: Pass
    fr: Passe Train
    it: Superpass
    de: Fahrschein
    es: Magnetopase
    ko: 리니어패스
    zh_simp: 磁浮列车自由票
    zh_trad: 磁浮列車自由票
  descriptions:
    jp_kana: "リニアカーに　のるときに　ひつような\nチケット。　いつでも　のりほうだい。"
    jp_kanji: "リニアカーに　乗るときに　必要な\nチケット。　いつでも　乗り放題。"
    en: "A pass required for riding the Magnet Train.\nIt allows you to ride whenever and however much\nyou’d like."
    fr: "Un ticket nécessaire pour monter à bord du\nTrain Magnétique. Utilisable à volonté."
    it: "Biglietto necessario per viaggiare sul supertreno.\nUtilizzabile a volontà."
    de: "Eine Fahrkarte, die einem die Reise mit dem\nMagnetzug ermöglicht. Gilt für beliebig viele\nFahrten."
    es: "Billete necesario para poder montar todas las veces\nque se desee en el Magnetotrén."
    ko: "리니어 카를 탈 때 필요한\n티켓. 언제든지 무제한으로 이용 가능."
    zh_simp: "乘坐磁浮列车时所需的车票。\n可以随时自由乘坐。"
    zh_trad: "乘坐磁浮列車時所需的車票。\n可以隨時自由乘坐。"
pass_orb:
  names:
    jp_kana: デルダマ
    jp_kanji: デルダマ
    en: Pass Orb
    fr: Offrisphère
    it: Passabilia
    de: Transferorb
    es: Regalosfera
    ko: 딜구슬
    zh_simp: 释出之玉
    zh_trad: 釋出之玉
  descriptions:
    jp_kana: "デルパワーを　はっせいさせる\nときにつかう　イッシュの　パワーが\nとじこめられた　ふしぎな　たま。"
    jp_kanji: "デルパワーを　発生させる\nときに使う　イッシュの　パワーが\nとじこめられた　不思議な　玉。"
    en: "A mysterious orb containing the power of the\nUnova region, to be used when generating\nPass Power."
    fr: "Une sphère mystérieuse contenant l’Aura d’Unys\net permettant l’utilisation des Offri-Auras."
    it: "Bilia misteriosa che racchiude l’energia di Unima\ned è in grado di lanciare il Passapotere."
    de: "Ein mysteriöser Orb, der die Kraft der Einall-Region\nenthält und zur Erzeugung von Transferkraft dient."
    es: "Esfera misteriosa que contiene el poder de la región\nde Teselia y se utiliza para generar Poderes Regalo."
    ko: "딜파워를 발생시킬 때\n사용하는 하나지방의 파워가\n담긴 이상한 구슬."
    zh_simp: "在这块神奇的玉石里，\n封存着用于产生\n释出之力的合众之力。"
    zh_trad: "在這塊神奇的玉石裡，\n封存著用於產生\n釋出之力的合眾之力。"
passho_berry:
  names:
    jp_kana: イトケのみ
    jp_kanji: イトケのみ
    en: Passho Berry
    fr: Baie Pocpoc
    it: Baccapasflo
    de: Foepasbeere
    es: Baya Pasio
    ko: 꼬시개열매
    zh_simp: 千香果
    zh_trad: 千香果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　みず　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　みず技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nWater-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Eau."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Acqua del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Wasser."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Agua de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 물 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的水属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的水屬性招式\n攻擊時，能使其威力減弱。"
payapa_berry:
  names:
    jp_kana: ウタンのみ
    jp_kanji: ウタンのみ
    en: Payapa Berry
    fr: Baie Yapap
    it: Baccapayapa
    de: Pyapabeere
    es: Baya Payapa
    ko: 야파열매
    zh_simp: 福禄果
    zh_trad: 福祿果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　エスパー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　エスパー技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nPsychic-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Psy."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Psico del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Psycho."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Psíquico de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 에스퍼 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的超能力属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的超能力屬性招式\n攻擊時，能使其威力減弱。"
pearl:
  names:
    jp_kana: しんじゅ
    jp_kanji: しんじゅ
    en: Pearl
    fr: Perle
    it: Perla
    de: Perle
    es: Perla
    ko: 진주
    zh_simp: 珍珠
    zh_trad: 珍珠
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nすこし　ちいさめの　しんじゅ。\nショップで　やすく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\n少し　ちいさめの　真珠。\nショップで　安く　売れる。"
    en: "A rather small pearl that has a very nice silvery\nsheen to it. It can be sold at a low price to shops."
    fr: "Une petite perle qui brille d’une jolie couleur argent.\nPeut être vendue à bas prix aux magasins."
    it: "Perla piuttosto piccola dai graziosi riflessi\nargentei. Si può vendere a un prezzo piuttosto\nbasso nei negozi."
    de: "Eine relativ kleine Perle, die in schönem Silber\nfunkelt. Sie ist von geringem Wert."
    es: "Brillante perla pequeña y plateada que no alcanza\nun buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n자그마한 진주.\n상점에서 싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且有点小的珍珠。\n可以在商店低价出售。"
    zh_trad: "散發著美麗銀輝的\n有點小的珍珠。\n可以在商店低價出售。"
pearl_string:
  names:
    jp_kana: おだんごしんじゅ
    jp_kanji: おだんごしんじゅ
    en: Pearl String
    fr: Perle Triple
    it: Trittiperla
    de: Triperle
    es: Sarta Perlas
    ko: 경단진주
    zh_simp: 丸子珍珠
    zh_trad: 丸子珍珠
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nとても　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nとても　大粒の　真珠。\nショップで　高く　売れる。"
    en: "Very large pearls that sparkle in a pretty silver\ncolor. They can be sold at a high price to shops."
    fr: "Une grappe de perles brillant d’une jolie couleur\nargent. Peut être vendue à bon prix aux magasins."
    it: "Grosse perle dai riflessi argentei. Si possono\nvendere a un prezzo piuttosto alto nei negozi."
    de: "Große Perlen, die in schönem Silber funkeln. Sie sind\nvon großem Wert."
    es: "Brillantes perlas plateadas de gran tamaño que pueden\nvenderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且非常大颗的珍珠。\n可以在商店高价出售。"
    zh_trad: "散發著美麗銀輝的\n非常大顆的珍珠。\n可以在商店高價出售。"
pecha_berry:
  names:
    jp_kana: モモンのみ
    jp_kanji: モモンのみ
    en: Pecha Berry
    fr: Baie Pêcha
    it: Baccapesca
    de: Pirsifbeere
    es: Baya Meloc
    ko: 복슝열매
    zh_simp: 桃桃果
    zh_trad: 桃桃果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nどくを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n毒を　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from poisoning on its own\nin battle."
    fr: "Une Baie qui soigne l’empoisonnement lorsqu’elle\nest tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndall’avvelenamento."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Vergiftung."
    es: "Los Pokémon pueden llevarla o usarla para curarse del\nenvenenamiento."
    ko: "포켓몬에게 지니게 하면\n독을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈中毒。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒中毒。"
permit:
  names:
    jp_kana: きょかしょう
    jp_kanji: きょかしょう
    en: Permit
    fr: Permis
    it: Permesso
    de: Genehmigung
    es: Pase
    ko: 허가증
    zh_simp: 许可证
    zh_trad: 許可證
  descriptions:
    jp_kana: "わずかな　ひとしか　しらない\nしぜんほごくに　はいるために\nひつような　ライセンスカード。"
    jp_kanji: "わずかな　人しか　知らない\n自然保護区に　入るために\n必要な　ライセンスカード。"
    en: "A permit that is needed to enter the\nNature Preserve. Not many know about it."
    fr: "Un permis nécessaire pour pénétrer dans la Réserve\nNaturelle, lieu protégé des foules modernes."
    it: "Tessera che permette di accedere a una Riserva\nNaturale conosciuta da pochi."
    de: "Eine Genehmigung in Form einer Karte, die den\nZutritt ins Naturschutzgebiet ermöglicht.\nNur wenige kennen den Ort."
    es: "Permiso necesario para acceder a la Reserva Natural,\nlugar que solo unos pocos conocen."
    ko: "소수의 사람밖에 모르는\n자연보호구역에 들어가기 위해\n필요한 라이선스 카드."
    zh_simp: "只有极少数人才知道的，\n进入自然保护区所需的授权卡。"
    zh_trad: "進入只有極少數人\n才知道的自然保護區時，\n所需的授權卡。"
persim_berry:
  names:
    jp_kana: キーのみ
    jp_kanji: キーのみ
    en: Persim Berry
    fr: Baie Kika
    it: Baccaki
    de: Persimbeere
    es: Baya Caquic
    ko: 시몬열매
    zh_simp: 柿仔果
    zh_trad: 柿仔果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこんらんを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n混乱を　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from confusion on its own\nin battle."
    fr: "Une Baie qui soigne la confusion lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndalla confusione."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Verwirrung."
    es: "Los Pokémon pueden llevarla o usarla para librarse de\nla confusión."
    ko: "포켓몬에게 지니게 하면\n혼란을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈混乱。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒混亂。"
petaya_berry:
  names:
    jp_kana: ヤタピのみ
    jp_kanji: ヤタピのみ
    en: Petaya Berry
    fr: Baie Pitaye
    it: Baccapitaya
    de: Tahaybeere
    es: Baya Yapati
    ko: 야타비열매
    zh_simp: 龙火果
    zh_trad: 龍火果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくこうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特攻が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Sp. Atk stat will increase when it’s in\na pinch."
    fr: "Tenue, cette Baie augmente l’Attaque Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, il suo Attacco Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Angriffs-Wert eines Pokémon, sobald\nes in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube el Ataque Especial\nen un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수공격이 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的特攻就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n特攻就會提高。"
pewter_crunchies:
  names:
    jp_kana: ニビあられ
    jp_kanji: ニビあられ
    en: Pewter Crunchies
    fr: Crok’Argenta
    it: Plumbeosalatini
    de: Marmoria-Kräcker
    es: Rokikos
    ko: 회색강정
    zh_simp: 深灰米果
    zh_trad: 深灰米果
  descriptions:
    jp_kana: "ニビめいぶつの　あられ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ニビ名物の　あられ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Pewter City’s famous crunchy snack. They can be used\nto heal all status conditions of a single Pokémon."
    fr: "Une spécialité d’Argenta.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "I salatini tipici di Plumbeopoli. Curano tutti i problemi\ndi stato di un Pokémon."
    de: "Eine berühmte Knabberei aus Marmoria City.\nBehebt alle Statusprobleme eines Pokémon."
    es: "Tentempié típico de Ciudad Plateada. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "회색시티의 명물인 강정.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "深灰特产的糕点。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "深灰市特產的米果。\n能治癒１隻寶可夢的\n所有異常狀態。"
photo_album:
  names:
    jp_kana: フォトアルバム
    jp_kanji: フォトアルバム
    en: Photo Album
    fr: Album Photo
    it: Album
    de: Fotoalbum
    es: Álbum
    ko: 포토앨범
    zh_simp: 相册
    zh_trad: 相簿
  descriptions:
    jp_kana: "ぼうけんちゅうに　さつえいした\nきねんしゃしんを　かざる　アルバム。"
    jp_kanji: "冒険中に　撮影した\n記念写真を　飾る　アルバム。"
    en: "A nice photo album for storing all the photos taken\nalong your adventure."
    fr: "Un album décoré de photos souvenirs prises\npendant le voyage."
    it: "Album dove si possono sistemare le foto\nscattate durante quest’avventura."
    de: "Ein Album, in dem du Erinnerungsfotos aufbewahren\nkannst, die du auf deinen Reisen geschossen hast."
    es: "Álbum que recoge las fotos que se toman a lo largo\nde la aventura."
    ko: "모험 중에 촬영한\n기념사진을 보관하는 앨범."
    zh_simp: "用来摆放在冒险中拍摄的\n纪念相片的相册。"
    zh_trad: "用來擺放在冒險中拍攝的\n紀念照片的相簿。"
pidgeotite:
  names:
    jp_kana: ピジョットナイト
    jp_kanji: ピジョットナイト
    en: Pidgeotite
    fr: Roucarnagite
    it: Pidgeotite
    de: Taubossnit
    es: Pidgeotita
    ko: 피죤투나이트
    zh_simp: 大比鸟进化石
    zh_trad: 大比鳥進化石
  descriptions:
    jp_kana: "たたかいのとき　ピジョットを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　ピジョットを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Pidgeot to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Roucarnage de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Pidgeot di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Tauboss, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pidgeot en combate."
    ko: "배틀할 때 피죤투를\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让大比鸟\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓大比鳥進行超級進化的\n一種神奇超級石。"
pidgey_candy:
  names:
    jp_kana: ポッポのアメ
    jp_kanji: ポッポのアメ
    en: Pidgey Candy
    fr: Bonbon Roucool
    it: Caramella Pidgey
    de: Taubsi-Bonbon
    es: Caramelo Pidgey
    ko: 구구의사탕
    zh_simp: 波波的糖果
    zh_trad: 波波的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pikachu_candy:
  names:
    jp_kana: ピカチュウのアメ
    jp_kanji: ピカチュウのアメ
    en: Pikachu Candy
    fr: Bonbon Pikachu
    it: Caramella Pikachu
    de: Pikachu-Bonbon
    es: Caramelo Pikachu
    ko: 피카츄의사탕
    zh_simp: 皮卡丘的糖果
    zh_trad: 皮卡丘的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pikanium_z:bag:
  names:
    jp_kana: ピカチュウＺ
    jp_kanji: ピカチュウＺ
    en: Pikanium Z
    fr: Pikazélite
    it: Pikacium Z
    de: Pikachium Z
    es: Pikastal Z
    ko: 피카츄Z
    zh_simp: 皮卡丘Ｚ
    zh_trad: 皮卡丘Ｚ
  descriptions:
    jp_kana: "ピカチュウの　ボルテッカーを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ピカチュウの　ボルテッカーを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPikachu’s Volt Tackle to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pikachu qui le tient à transformer\nson Électacle en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Pikachu di trasformare la mossa\nLocomovolt in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Pikachus Attacke\nVolttackle zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nPikachu convertir su Placaje Eléc en un movimiento Z."
    ko: "피카츄의 볼트태클을\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将皮卡丘的伏特攻击\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把皮卡丘的伏特攻擊\n升級為特殊Ｚ招式的Ｚ力量結晶。"
pikanium_z:held:
  names:
    jp_kana: ピカチュウＺ
    jp_kanji: ピカチュウＺ
    en: Pikanium Z
    fr: Pikazélite
    it: Pikacium Z
    de: Pikachium Z
    es: Pikastal Z
    ko: 피카츄Z
    zh_simp: 皮卡丘Ｚ
    zh_trad: 皮卡丘Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nピカチュウの　ボルテッカーを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nピカチュウの　ボルテッカーを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Pikachu’s Volt Tackle to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer l’Électacle d’un Pikachu en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Locomovolt\ndi Pikachu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Pikachus Attacke Volttackle\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nPlacaje Eléc de Pikachu."
    ko: "Z파워의 결정.\n피카츄의 볼트태클을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将皮卡丘的伏特攻击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把皮卡丘的伏特攻擊\n升級為Ｚ招式。"
pikashunium_z:bag:
  names:
    jp_kana: サトピカＺ
    jp_kanji: サトピカＺ
    en: Pikashunium Z
    fr: Pikachazélite
    it: Ashpikacium Z
    de: Ash-Pikachium Z
    es: Ash-Pikastal Z
    ko: 지우피카Z
    zh_simp: 智皮卡Ｚ
    zh_trad: 智皮卡Ｚ
  descriptions:
    jp_kana: "キャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　かえる\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "キャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\na Thunderbolt by Pikachu in a cap to an\nexclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pikachu à casquette qui le tient\nà transformer son Tonnerre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Pikachu con il berretto di trasformare\nla mossa Fulmine in una mossa Z."
    de: "Kristallisierte Z-Kraft, die die Attacke Donnerblitz\ndes Pikachus mit Kappe zu einer Z-Attacke\naufstuft. Wird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos Pikachu que llevan gorra convertir su Rayo en\nun movimiento Z."
    ko: "모자를 쓴 피카츄의\n10만볼트를 Z기술로 바꾸는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将戴着帽子的皮卡丘的十万伏特\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把戴著帽子的皮卡丘的十萬伏特\n升級為特殊Ｚ招式的Ｚ力量結晶。"
pikashunium_z:held:
  names:
    jp_kana: サトピカＺ
    jp_kanji: サトピカＺ
    en: Pikashunium Z
    fr: Pikachazélite
    it: Ashpikacium Z
    de: Ash-Pikachium Z
    es: Ash-Pikastal Z
    ko: 지우피카Z
    zh_simp: 智皮卡Ｚ
    zh_trad: 智皮卡Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nキャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　かえる。"
    jp_kanji: "Ｚパワーの　結晶。\nキャップを　かぶった　ピカチュウの\n１０まんボルトを　Ｚワザに　変える。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades a Thunderbolt by Pikachu in a cap to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Tonnerre du Pikachu à casquette\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Fulmine\ndi Pikachu con il berretto in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft die Attacke Donnerblitz des Pikachus\nmit Kappe zu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo\nde los Pikachu que llevan gorra."
    ko: "Z파워의 결정.\n모자를 쓴 피카츄의\n10만볼트를 Z기술로 바꾼다."
    zh_simp: "Ｚ力量的结晶。\n会将戴着帽子的皮卡丘的\n十万伏特升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把戴著帽子的皮卡丘的\n十萬伏特升級為Ｚ招式。"
pinap_berry:
  names:
    jp_kana: パイルのみ
    jp_kanji: パイルのみ
    en: Pinap Berry
    fr: Baie Nanana
    it: Baccananas
    de: Sananabeere
    es: Baya Pinia
    ko: 파인열매
    zh_simp: 凰梨果
    zh_trad: 凰梨果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nつかまえた　ときに　どうぐが\nすこし　てにはいり　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえた　ときに　道具が\n少し　手にはいり　やすくなる　きのみ。"
    en: "A Berry that makes you slightly more likely\nto get an item when it’s given to Pokémon you’re\ntrying to catch."
    fr: "Une Baie à donner à un Pokémon sauvage pour avoir\nun peu plus de chances d’obtenir un objet après\nl’avoir capturé."
    it: "Bacca che rende un po’ più facile ottenere strumenti\nquando catturi il Pokémon a cui l’hai data."
    de: "Gibst du diese Beere einem Pokémon zu essen, wird die\nChance, bei einem erfolgreichen Fangversuch ein Item\nzu erhalten, leicht erhöht."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara aumentar un poco las probabilidades de conseguir\nun objeto tras capturarlo."
    ko: "포켓몬에게 주면\n잡았을 때 도구를 손에 넣기\n조금 쉬워지는 나무열매."
    zh_simp: "如果把这树果交给宝可梦，\n那么接下来捉住该宝可梦时，\n会稍微容易获得道具。"
    zh_trad: "把這個樹果餵給寶可夢，\n在捕捉成功後，\n會比較容易獲得道具。"
pink_apricorn:
  names:
    jp_kana: ももぼんぐり
    jp_kanji: ももぼんぐり
    en: Pink Apricorn
    fr: Noigrume Rose
    it: Ghicocca Rosa
    de: Aprikoko Pnk
    es: Bonguri Rosa
    ko: 담홍규토리
    zh_simp: 粉球果
    zh_trad: 粉球果
  descriptions:
    jp_kana: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    jp_kanji: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    en: A pink Apricorn. It has a nice, sweet scent.
    fr: "Un Noigrume de couleur rose.\nIl dégage un arôme sucré."
    it: "Una Ghicocca di colore rosa.\nEmana un profumo dolce."
    de: "Eine pinkfarbene Aprikoko. Sie duftet süß und\nappetitanregend."
    es: Bonguri de color rosa y aroma dulce.
    ko: "담홍색의 규토리.\n달콤한 듯한 좋은 향기가 난다."
    zh_simp: "粉红色的球果。\n有种甜甜的，好闻的香味。"
    zh_trad: "粉紅色的球果。\n有種甜甜的，好聞的香味。"
pink_nectar:
  names:
    jp_kana: うすもものミツ
    jp_kanji: うすもものミツ
    en: Pink Nectar
    fr: Nectar Rose
    it: Nettare rosa
    de: Rosa Nektar
    es: Néctar Rosa
    ko: 연분홍꿀
    zh_simp: 桃粉色花蜜
    zh_trad: 桃粉色花蜜
  descriptions:
    jp_kana: "ロイヤルアベニューの　かだんで\nてにいれた　はなのミツ。　とくていの\nポケモンの　すがたを　かえる。"
    jp_kanji: "ロイヤルアベニューの　花壇で\n手に入れた　花のミツ。　特定の\nポケモンの　姿を　変える。"
    en: "A flower nectar obtained from the flowering shrubs\non Royal Avenue.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu à partir des fleurs de la Rue\ndu Dôme Royal. Permet à un certain Pokémon\nde changer d’apparence."
    it: "Nettare ottenuto dai fiori delle aiuole di Viale\nRoyale. Fa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar von der Blumeninsel nahe der Avenue\nRoyale. Ein bestimmtes Pokémon kann damit seine\nForm ändern."
    es: "Néctar de ciertas flores de los parterres de la\nAvenida Royale, capaz de hacer cambiar de forma\na una determinada especie de Pokémon."
    ko: "로열 애버뉴 화단에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在皇家大道的花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在皇家大道的花壇裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
pink_petal:
  names:
    jp_kana: ももいろはなびら
    jp_kanji: ももいろはなびら
    en: Pink Petal
    fr: Pétale Rose
    it: Petalo rosa
    de: Rosa Blatt
    es: Pétalo Rosa
    ko: 담홍꽃잎
    zh_simp: 粉红花瓣
    zh_trad: 粉紅花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　マツリカから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　マツリカから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Mina\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé qu’Oléa vous a remis lors de\nson Épreuve. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Rika\ndurante la sua prova. L’obiettivo è ricevere\nsette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von ihr erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Rika durante\nsu prueba. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 말리화에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从茉莉那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從茉莉那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
pink_scarf:
  names:
    jp_kana: ピンクのバンダナ
    jp_kanji: ピンクのバンダナ
    en: Pink Scarf
    fr: Foulard Rose
    it: Fascia Rosa
    de: Rosa Schal
    es: Pañuelo Rosa
    ko: 분홍밴드
    zh_simp: 粉红头巾
    zh_trad: 粉紅頭巾
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    en: "An item to be held by a Pokémon. During a contest,\nit raises the Cute aspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente la Grâce d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Grazia” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Putzigkeit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la dulzura en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n귀엽게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加可爱。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加可愛。"
pinsir_candy:
  names:
    jp_kana: カイロスのアメ
    jp_kanji: カイロスのアメ
    en: Pinsir Candy
    fr: Bonbon Scarabrute
    it: Caramella Pinsir
    de: Pinsir-Bonbon
    es: Caramelo Pinsir
    ko: 쁘사이저의사탕
    zh_simp: 凯罗斯的糖果
    zh_trad: 凱羅斯的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pinsirite:
  names:
    jp_kana: カイロスナイト
    jp_kanji: カイロスナイト
    en: Pinsirite
    fr: Scarabruite
    it: Pinsirite
    de: Pinsirnit
    es: Pinsirita
    ko: 쁘사이저나이트
    zh_simp: 凯罗斯进化石
    zh_trad: 凱羅斯進化石
  descriptions:
    jp_kana: "たたかいのとき　カイロスを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　カイロスを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Pinsir to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Scarabrute de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Pinsir di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Pinsir, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pinsir en combate."
    ko: "배틀할 때 쁘사이저를\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让凯罗斯\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓凱羅斯進行超級進化的\n一種神奇超級石。"
pixie_plate:
  names:
    jp_kana: せいれいプレート
    jp_kanji: せいれいプレート
    en: Pixie Plate
    fr: Plaque Pixie
    it: Lastraspiritello
    de: Feentafel
    es: Tabla Duende
    ko: 정령플레이트
    zh_simp: 妖精石板
    zh_trad: 妖精石板
  descriptions:
    jp_kana: "フェアリーの　タイプの　せきばん。\nもたせると　フェアリータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "フェアリーの　タイプの　石盤。\n持たせると　フェアリータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Fairy-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Folletto."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Fee."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Hada. Debe llevarla un Pokémon."
    ko: "페어리타입의 석판.\n지니게 하면 페어리타입\n기술의 위력이 강해진다."
    zh_simp: "妖精属性的石板。\n携带后，妖精属性的\n招式威力就会增强。"
    zh_trad: "妖精屬性的石板。\n攜帶後，妖精屬性的\n招式威力就會增強。"
plasma_card:
  names:
    jp_kana: プラズマカード
    jp_kanji: プラズマカード
    en: Plasma Card
    fr: Carte Plasma
    it: Carta Plasma
    de: Plasmakarte
    es: Tarjeta Plasma
    ko: 플라스마카드
    zh_simp: 等离子卡
    zh_trad: 等離子卡
  descriptions:
    jp_kana: "プラズマフリゲートの　せんないで\nパスワードを　にゅうりょくするときに\nひつようとなる　カードキー。"
    jp_kanji: "プラズマフリゲートの　船内で\nパスワードを　入力するときに\n必要となる　カードキー。"
    en: "A card key needed to enter the password inside\nthe Plasma Frigate."
    fr: "Une clé magnétique indispensable pour entrer\nle mot de passe sur la Frégate Plasma."
    it: "Carta magnetica necessaria per inserire\nla password sulla Fregata Plasma."
    de: "Ein Kartenschlüssel, der bei der Eingabe des\nPassworts an Bord der Plasma-Fregatte benötigt\nwird."
    es: "Tarjeta necesaria para introducir la contraseña en\nla Fragata Plasma."
    ko: "플라스마 프리깃 배 안에서\n패스워드를 입력할 때\n필요한 카드키."
    zh_simp: "在等离子驱逐舰的\n船内输入密码时，\n需要用到的钥匙卡。"
    zh_trad: "在等離子驅逐艦的\n船內輸入密碼時，\n需要用到的鑰匙卡。"
plume_fossil:
  names:
    jp_kana: はねのカセキ
    jp_kanji: はねのカセキ
    en: Plume Fossil
    fr: Fossile Plume
    it: Fossilpiuma
    de: Federfossil
    es: Fósil Pluma
    ko: 날개화석
    zh_simp: 羽毛化石
    zh_trad: 羽毛化石
  descriptions:
    jp_kana: "とりポケモンの　そせんと　いわれる\nこだい　ポケモンの　カセキ。\nつばさの　いちぶ　らしい。"
    jp_kanji: "とりポケモンの　祖先と　いわれる\n古代ポケモンの　カセキ。\nつばさの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sky. It looks as if it could come from part of\nits wing."
    fr: "Le fossile d’un ancien Pokémon volant.\nIl semble que ce soit un morceau d’aile."
    it: "Fossile di un Pokémon preistorico che solcava\ni cieli. Sembra essere parte della sua ala."
    de: "Das Fossil eines uralten Pokémon, von dem man\nannimmt, dass es der Urahn der Vogel-Pokémon\nsei. Es handelt sich um einen Teil des Flügels."
    es: "Fósil de un Pokémon prehistórico que surcaba los cielos.\nParece ser parte de una de sus alas."
    ko: "새포켓몬의 조상이라 불리는\n고대 포켓몬의 화석.\n날개의 일부인 듯하다."
    zh_simp: "据说是鸟宝可梦的祖先，\n古代宝可梦的化石。\n好像是翅膀的一部分。"
    zh_trad: "據說是鳥寶可夢祖先的\n古代寶可夢的化石。\n好像是翅膀的一部分。"
poffin_case:
  names:
    jp_kana: ポフィンケース
    jp_kanji: ポフィンケース
    en: Poffin Case
    fr: Boîte Poffin
    it: Portapoffin
    de: Knurspbox
    es: Pokochera
    ko: 포핀케이스
    zh_simp: 宝芬盒
    zh_trad: 寶芬盒
  descriptions:
    jp_kana: "おりょうりで　つくった　ポフィンを\nほぞんする　いれもの。"
    jp_kanji: "お料理で　つくった　ポフィンを\n保存する　いれもの。"
    en: A case for storing Poffins cooked from Berries.
    fr: Une boîte pour ranger les Poffins faits à partir de Baies.
    it: "Contenitore per conservare i Poffin cucinati\ncon le bacche."
    de: Eine Box für leckere Knurspe.
    es: "Caja en la que se transportan los Pokochos elaborados\ncon bayas."
    ko: "요리로 만든 포핀을\n보존하는 용기."
    zh_simp: "用来保存烹饪好的\n宝芬的容器。"
    zh_trad: "用來存放做好的\n寶芬的容器。"
point_card:
  names:
    jp_kana: ポイントカード
    jp_kanji: ポイントカード
    en: Point Card
    fr: Carte Points
    it: Scheda Punti
    de: Punktekarte
    es: Tarjeta Puntos
    ko: 포인트카드
    zh_simp: 点数卡
    zh_trad: 點數卡
  descriptions:
    jp_kana: "かちとった　バトルポイントの　かずを\nみることが　できる　カード。"
    jp_kanji: "勝ち取った　バトルポイントの　数を\nみることが　できる　カード。"
    en: "A card that lists how many Battle Points you\nhave earned."
    fr: "Une carte indiquant le nombre de Points de Combat\nobtenus."
    it: Scheda che elenca i Punti Lotta che hai ottenuto.
    de: "Auf dieser Karte werden deine bisher gesammelten\nGewinnpunkte festgehalten."
    es: "Una tarjeta en la que se registran los Puntos de Batalla\nque has ganado."
    ko: "이겨서 받은 배틀포인트 수를\n볼 수 있는 카드."
    zh_simp: "可以查看赢得的\n对战点数的卡片。"
    zh_trad: "可以查看贏得的\n對戰點數的卡片。"
poison_barb:
  names:
    jp_kana: どくバリ
    jp_kanji: どくバリ
    en: Poison Barb
    fr: Pic Venin
    it: Velenaculeo
    de: Giftstich
    es: Flecha Venenosa
    ko: 독바늘
    zh_simp: 毒针
    zh_trad: 毒針
  descriptions:
    jp_kana: "どくのある　ちいさな　ハリ。\nもたせると　どくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "どくのある　ちいさな　ハリ。\n持たせると　どくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This small,\npoisonous barb boosts the power of\nPoison-type moves."
    fr: "Objet à tenir. Un petit pic empoisonné qui augmente\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nAculeo piccolo e tossico che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Ein schmaler und giftiger\nWiderhaken, der Attacken vom Typ Gift verstärkt."
    es: "Flecha venenosa que refuerza los movimientos de\ntipo Veneno. Debe llevarla un Pokémon."
    ko: "독이 있는 작은 침.\n지니게 하면 독타입\n기술의 위력이 올라간다."
    zh_simp: "有毒的小针。\n携带后，毒属性的\n招式威力就会提高。"
    zh_trad: "有毒的小針。\n攜帶後，毒屬性的\n招式威力就會提高。"
poison_gem:
  names:
    jp_kana: どくのジュエル
    jp_kanji: どくのジュエル
    en: Poison Gem
    fr: Joyau Poison
    it: Bijouveleno
    de: Giftjuwel
    es: Gema Veneno
    ko: 독주얼
    zh_simp: 毒之宝石
    zh_trad: 毒之寶石
  descriptions:
    jp_kana: "どくの　タイプの　ジュエル。\nもたせると　いちどだけ　どくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　ジュエル。\n持たせると　１度だけ　どくの\n技の　威力が　強まる。"
    en: "A gem with an essence of poison. When held, it\nstrengthens the power of a Poison-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Veleno."
    de: "Ein Juwel vom Typ Gift. Es erhöht einmalig die\nStärke einer Attacke vom Typ Gift."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Veneno. Debe llevarla un Pokémon."
    ko: "독타입의 주얼.\n지니게 하면 한 번만 독\n기술의 위력이 강해진다."
    zh_simp: "毒属性的宝石。\n携带后，毒属性的\n招式威力仅会增强１次。"
    zh_trad: "毒屬性的寶石。\n攜帶後，毒屬性招式的\n威力會僅增強１次。"
poison_memory:
  names:
    jp_kana: ポイズンメモリ
    jp_kanji: ポイズンメモリ
    en: Poison Memory
    fr: ROM Poison
    it: ROM Veleno
    de: Gift-Disc
    es: Disco Veneno
    ko: 포이즌메모리
    zh_simp: 毒存储碟
    zh_trad: 毒記憶碟
  descriptions:
    jp_kana: "どくタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "どくタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Poison-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Poison. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Veleno in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Gift.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nVeneno. Permite cambiar de tipo a cierto Pokémon."
    ko: "독타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有毒属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有毒屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
poisonium_z:bag:
  names:
    jp_kana: ドクＺ
    jp_kanji: ドクＺ
    en: Poisonium Z
    fr: Toxizélite
    it: Venenium Z
    de: Toxium Z
    es: Toxistal Z
    ko: 독Z
    zh_simp: 毒Ｚ
    zh_trad: 毒Ｚ
  descriptions:
    jp_kana: "どくタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "どくタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPoison-type moves to Poison-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Poison en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Veleno in mosse Z."
    de: "Kristallisierte Z-Kraft, die Gift-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nVeneno en movimientos Z."
    ko: "독타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将毒属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把毒屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
poisonium_z:held:
  names:
    jp_kana: ドクＺ
    jp_kanji: ドクＺ
    en: Poisonium Z
    fr: Toxizélite
    it: Venenium Z
    de: Toxium Z
    es: Toxistal Z
    ko: 독Z
    zh_simp: 毒Ｚ
    zh_trad: 毒Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nどくタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nどくタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Poison-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Poison en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Veleno\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Gift-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Veneno."
    ko: "Z파워의 결정.\n독타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将毒属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把毒屬性的招式\n升級為Ｚ招式。"
poke_ball:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
    zh_simp: 精灵球
    zh_trad: 精靈球
  descriptions:
    jp_kana: "やせいの　ポケモンに　なげて\nつかまえる　ための　ボール。\nカプセルしきに　なっている。"
    jp_kanji: "野生の　ポケモンに　投げて\n捕まえるための　ボール。\nカプセル式に　なっている。"
    en: "A device for catching wild Pokémon. It’s thrown like\na ball at a Pokémon, comfortably encapsulating\nits target."
    fr: "Un objet semblable à une capsule, qui capture\nles Pokémon sauvages. Il suffit pour cela de le lancer\ncomme une balle."
    it: "Strumento dotato di capsula usato per catturare\nPokémon selvatici. Si lancia contro il bersaglio\ncome una palla."
    de: "Damit fängst du wilde Pokémon. Du wirfst ihn wie\neinen normalen Ball. Das Design ähnelt dem einer\nKapsel."
    es: "Dispositivo con diseño capsular que atrapa\nPokémon salvajes. Se lanza como una bola\ncontra el blanco."
    ko: "야생 포켓몬에게 던져서\n잡기 위한 볼.\n캡슐식으로 되어 있다."
    zh_simp: "用于投向野生宝可梦\n并将其捕捉的球。\n它是胶囊样式的。"
    zh_trad: "用於投向野生寶可夢\n並將其捕捉的球。\n它是膠囊樣式的。"
poke_doll:
  names:
    jp_kana: ピッピにんぎょう
    jp_kanji: ピッピにんぎょう
    en: Poké Doll
    fr: Poké Poupée
    it: Poké Bambola
    de: Poképuppe
    es: Poké Muñeco
    ko: 삐삐인형
    zh_simp: 皮皮玩偶
    zh_trad: 皮皮玩偶
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
poke_flute:
  names:
    jp_kana: ポケモンのふえ
    jp_kanji: ポケモンのふえ
    en: Poké Flute
    fr: Poké Flûte
    it: Poké Flauto
    de: Pokéflöte
    es: Poké Flauta
    ko: 포켓몬피리
    zh_simp: 宝可梦之笛
    zh_trad: 寶可夢之笛
  descriptions:
    jp_kana: "ねむっている　ポケモンも\nおもわず　めざめるほど　すばらしい\nねいろを　かなでる　ふえ。"
    jp_kanji: "眠っている　ポケモンも\n思わず　めざめるほど　すばらしい\n音色を　奏でる　ふえ。"
    en: "A flute that can play with such a beautiful tone that\neven sleeping Pokémon find themselves woken up."
    fr: "Une flûte au son si particulier qu’elle permet de\nréveiller les Pokémon les plus profondément endormis."
    it: "Flauto dal suono meraviglioso che risveglia anche\ni Pokémon profondamente addormentati."
    de: "Eine Flöte, die so wundervolle Töne spielen kann,\ndass selbst schlafende Pokémon aufwachen."
    es: "Una flauta con un timbre tan dulce y hermoso que\ndespierta hasta al Pokémon más profundamente\ndormido."
    ko: "잠자고 있는 포켓몬도\n무심코 잠에서 깨어날 정도로\n멋진 음색을 내는 피리."
    zh_simp: "能吹出让睡着的宝可梦\n都会情不自禁醒来的\n美妙音色的笛子。"
    zh_trad: "能吹出讓睡著的寶可夢\n都會情不自禁醒來的\n美妙音色的笛子。"
poke_radar:
  names:
    jp_kana: ポケトレ
    jp_kanji: ポケトレ
    en: Poké Radar
    fr: Poké Radar
    it: Poké Radar
    de: Pokéradar
    es: Pokéradar
    ko: 포켓트레
    zh_simp: 宝可追踪
    zh_trad: 寶可追蹤
  descriptions:
    jp_kana: "くさむらに　かくれている　ポケモンを\nさがしだせる　どうぐ。\nあるくと　でんちが　たまる。"
    jp_kanji: "くさむらに　隠れている　ポケモンを\n探しだせる　道具。\n歩くと　電池が　たまる。"
    en: "A tool that can search out Pokémon that are hiding\nin the tall grass. Its battery is recharged as\nyou walk."
    fr: "Un objet permettant de trouver les Pokémon\nqui se cachent dans l’herbe. Se recharge quand\nvous marchez."
    it: "Strumento con cui individuare i Pokémon\nnascosti nell’erba. La batteria si ricarica\nmentre cammini."
    de: "Spürt Pokémon im hohen Gras auf. Die Batterie wird\nbeim Reisen aufgeladen."
    es: "Busca Pokémon que se esconden en la hierba.\nLa batería se recarga mientras caminas."
    ko: "풀밭에 숨어 있는 포켓몬을\n찾아내는 도구.\n걸으면 전지가 충전된다."
    zh_simp: "能够将藏在草丛里的\n宝可梦找出来的道具。\n走路就能给电池充电。"
    zh_trad: "能夠將藏在草叢裡的\n寶可夢找出來的道具。\n走路就能給電池充電。"
poke_toy:
  names:
    jp_kana: ポケじゃらし
    jp_kanji: ポケじゃらし
    en: Poké Toy
    fr: Poké Plumet
    it: Pokégingillo
    de: Pokéwedel
    es: Pokéseñuelo
    ko: 포켓풀
    zh_simp: 宝可尾草
    zh_trad: 寶可尾草
  descriptions:
    jp_kana: "ポケモンの　きをひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of a Pokémon.\nIt guarantees escape from any battle with\nwild Pokémon."
    fr: "Un objet qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile per\nfuggire dalla lotta con Pokémon selvatici."
    de: "Ein Item, das wilde Pokémon vom Kampfgeschehen\nablenkt und garantiert die Flucht ermöglicht."
    es: "Un objeto que atrae a los Pokémon. Es útil para huir\nde un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "能吸引宝可梦注意的道具。\n在和野生宝可梦的\n战斗中绝对可以逃走。"
    zh_trad: "能吸引寶可夢注意的道具。\n在和野生寶可夢的\n戰鬥中絕對可以逃走。"
pokeblock_kit:
  names:
    jp_kana: ポロックキット
    jp_kanji: ポロックキット
    en: Pokéblock Kit
    fr: Kit Pokébloc
    it: Kit Pokémelle
    de: Pokériegel-Set
    es: Kit de Pokécubos
    ko: 포켓몬스넥키트
    zh_simp: 宝可方块套装
    zh_trad: 寶可方塊組合
  descriptions:
    jp_kana: "きのみから　ポロックを　つくる\nきのみブレンダーと　できたポロックを\nほぞんする　ポロックケースの　セット。"
    jp_kanji: "きのみから　ポロックを　作る\nきのみブレンダーと　できたポロックを\n保存する　ポロックケースの　セット。"
    en: "A set containing a Berry Blender for making\nPokéblocks and a Pokéblock Case for\nstoring Pokéblocks."
    fr: Boîte pour ranger le Mixeur à Baies et les Pokéblocs.
    it: "Kit composto da un Mixer bacche, usato per\npreparare le Pokémelle, e da un Portapokémelle,\nusato per conservarle."
    de: "Ein Set, das aus einem Beerenmixer für die\nHerstellung von Pokériegeln und einer Pokériegelbox\nfür deren Lagerung besteht."
    es: "Kit consistente en una Licuabayas para preparar\nPokécubos a partir de bayas y un Tubo Pokécubos\npara guardarlos."
    ko: "나무열매로 포켓몬스넥을 만드는\n나무열매블렌더와 만들어진 포켓몬스넥을\n저장하는 포켓몬스넥케이스 세트."
    zh_simp: "这是树果混合器和宝可方块盒的套装。\n树果混合器可利用树果制作宝可方块，\n而做好的宝可方块可用宝可方块盒来保存。"
    zh_trad: "可由樹果製作寶可方塊的樹果混合器\n與存放用的寶可方塊盒之套裝。"
pokemon_box_link:lets_go:
  names:
    jp_kana: ポケモンボックス
    jp_kanji: ポケモンボックス
    en: Pokémon Box
    fr: Boîte Pokémon
    it: Box Pokémon
    de: Pokémon-Box
    es: Caja de Pokémon
    ko: 포켓몬 박스
    zh_simp: 宝可梦盒
    zh_trad: 寶可夢盒
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
polished_mud_ball:
  names:
    jp_kana: ピカピカだんご
    jp_kanji: ピカピカだんご
    en: Polished Mud Ball
    fr: Boulette de Boue
    it: Pallina di fango
    de: Glanzkugel
    es: Bola de Arcilla
    ko: 반짝반짝경단
    zh_simp: 光滑泥球
    zh_trad: 光滑泥球
  descriptions:
    jp_kana: "じかんを　かけて　みがきあげた\nひょうめんが　ツルツルに　ひかる\nどろで　できた　だんご。"
    jp_kanji: "時間を　かけて　磨きあげた\n表面が　ツルツルに　光る\n泥で　できた　団子。"
    en: "A ball made of mud. It had been polished for such\na long time that the surface is very shiny."
    fr: "Une boulette de boue si bien polie qu’elle brille\nde mille feux."
    it: "Una pallina di fango levigata con cura, tanto che\nla sua superficie è liscia e lucida."
    de: "Eine Kugel aus Schlamm, die so lange Zeit poliert\nwurde, dass ihre Oberfläche nun leuchtend glänzt."
    es: "Bola de barro que ha sido pulida durante tanto tiempo\nque su superficie ha quedado lisa y brillante."
    ko: "시간을 들여 빚어낸\n표면이 반질반질하게 빛나는\n진흙으로 만든 경단."
    zh_simp: "用泥土制作的丸子。\n花了大把时间打磨，\n表面油光水滑。"
    zh_trad: "花了不少時間\n把表面磨得\n非常光滑的泥球。"
poliwag_candy:
  names:
    jp_kana: ニョロモのアメ
    jp_kanji: ニョロモのアメ
    en: Poliwag Candy
    fr: Bonbon Ptitard
    it: Caramella Poliwag
    de: Quapsel-Bonbon
    es: Caramelo Poliwag
    ko: 발챙이의사탕
    zh_simp: 蚊香蝌蚪的糖果
    zh_trad: 蚊香蝌蚪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pomeg_berry:
  names:
    jp_kana: ザロクのみ
    jp_kanji: ザロクのみ
    en: Pomeg Berry
    fr: Baie Grena
    it: Baccagrana
    de: Granabeere
    es: Baya Grana
    ko: 유석열매
    zh_simp: 榴石果
    zh_trad: 榴石果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nＨＰの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\nＨＰの　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nbase HP."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leurs PV de base."
    it: "Usata su un Pokémon, lo rende più affezionato,\nma ne diminuisce i punti base dei PS."
    de: "Isst ein Pokémon diese Beere, stärkt dies eure\nFreundschaft, verringert aber seinen KP-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce sus PS de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\nHP의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但HP的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得親密，\n但HP的基礎點數會降低。"
ponyta_candy:
  names:
    jp_kana: ポニータのアメ
    jp_kanji: ポニータのアメ
    en: Ponyta Candy
    fr: Bonbon Ponyta
    it: Caramella Ponyta
    de: Ponita-Bonbon
    es: Caramelo Ponyta
    ko: 포니타의사탕
    zh_simp: 小火马的糖果
    zh_trad: 小火馬的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
porygon_candy:
  names:
    jp_kana: ポリゴンのアメ
    jp_kanji: ポリゴンのアメ
    en: Porygon Candy
    fr: Bonbon Porygon
    it: Caramella Porygon
    de: Porygon-Bonbon
    es: Caramelo Porygon
    ko: 폴리곤의사탕
    zh_simp: 多边兽的糖果
    zh_trad: 多邊獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
potion:
  names:
    jp_kana: キズぐすり
    jp_kanji: キズぐすり
    en: Potion
    fr: Potion
    it: Pozione
    de: Trank
    es: Poción
    ko: 상처약
    zh_simp: 伤药
    zh_trad: 傷藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 20 HP to a single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 20 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 20 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n20 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura\n20 PS a un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复20HP。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復20HP。"
power_anklet:
  names:
    jp_kana: パワーアンクル
    jp_kanji: パワーアンクル
    en: Power Anklet
    fr: Chaîne Pouvoir
    it: Vigorgliera
    de: Machtkette
    es: Franja Recia
    ko: 파워앵클릿
    zh_simp: 力量护踝
    zh_trad: 力量護踝
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　すばやさが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　素早さが\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Speed stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à la Vitesse de progresser plus vite,\nmais la réduit pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase della Velocità di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nInitiative-Wert, senkt aber die Initiative allgemein."
    es: "Potencia la Velocidad de base, pero reduce la\nVelocidad en combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 스피드를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的速度\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的速度\n會比平時培育得更高。"
power_band:
  names:
    jp_kana: パワーバンド
    jp_kanji: パワーバンド
    en: Power Band
    fr: Bandeau Pouvoir
    it: Vigorbanda
    de: Machtband
    es: Banda Recia
    ko: 파워밴드
    zh_simp: 力量束带
    zh_trad: 力量束帶
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくぼうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特防が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Sp. Def stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à la Défense Spéciale de\nprogresser plus vite, mais réduit la Vitesse pendant\nle combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base della Difesa\nSpeciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nSpezial-Verteidigungs-Wert, senkt aber die\nInitiative."
    es: "Potencia la Defensa Especial de base, pero reduce la\nVelocidad en combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수방어를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的特防\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的特防\n會比平時培育得更高。"
power_belt:
  names:
    jp_kana: パワーベルト
    jp_kanji: パワーベルト
    en: Power Belt
    fr: Ceinture Pouvoir
    it: Vigorfascia
    de: Machtgurt
    es: Cinto Recio
    ko: 파워벨트
    zh_simp: 力量腰带
    zh_trad: 力量腰帶
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ぼうぎょが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　防御が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Defense stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à la Défense de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase della Difesa di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nVerteidigungs-Wert, senkt aber die Initiative."
    es: "Potencia la Defensa de base, pero reduce la\nVelocidad en combate. Debe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 방어를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的防御\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的防禦\n會比平時培育得更高。"
power_bracer:
  names:
    jp_kana: パワーリスト
    jp_kanji: パワーリスト
    en: Power Bracer
    fr: Poignée Pouvoir
    it: Vigorcerchio
    de: Machtreif
    es: Brazal Recio
    ko: 파워리스트
    zh_simp: 力量护腕
    zh_trad: 力量護腕
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　こうげきが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　攻撃が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Attack stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à l’Attaque de progresser plus vite,\nmais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase dell’Attacco di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nAngriffs-Wert, senkt aber die Initiative."
    es: "Potencia el Ataque de base, pero reduce la Velocidad\nen combate. Debe llevarlo un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 공격을\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的攻击\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的攻擊\n會比平時培育得更高。"
power_herb:
  names:
    jp_kana: パワフルハーブ
    jp_kanji: パワフルハーブ
    en: Power Herb
    fr: Herbe Pouvoir
    it: Vigorerba
    de: Energiekraut
    es: Hierba Única
    ko: 파워풀허브
    zh_simp: 强力香草
    zh_trad: 強力香草
  descriptions:
    jp_kana: "もたせた　ポケモンは　いちどだけ\n１ターンめに　ちからを　ためるわざを\nすぐに　つかうことが　できる。"
    jp_kanji: "持たせた　ポケモンは　１度だけ\n１ターン目に　ちからを　ためる技を\nすぐに　使うことが　できる。"
    en: "A single-use item to be held by a Pokémon. It\nallows the holder to immediately use a move that\nnormally requires a turn to charge."
    fr: "Objet à tenir et à usage unique. Permet d’utiliser\nimmédiatement une capacité qui devrait se charger\nau premier tour."
    it: "Strumento monouso da dare a un Pokémon.\nPermette l’uso immediato di una mossa che in\ngenere richiede un turno prima di essere eseguita."
    de: "Ein Item zum einmaligen Tragen. Der Träger kann\ndadurch eine Attacke sofort einsetzen, die sonst\naufgeladen werden muss."
    es: "Permite el uso inmediato de cualquier movimiento\nen el primer turno. Es de un solo uso y debe\nllevarla un Pokémon."
    ko: "지니게 한 포켓몬은 한 번만\n1턴째에 힘을 모으는 기술을\n바로 사용할 수가 있다."
    zh_simp: "携带它的宝可梦仅有１次机会\n可以在第１回合使出\n需要蓄力的招式。"
    zh_trad: "攜帶它的寶可夢將有１次機會，\n可以在１回合內就發動\n需要蓄力的招式。"
power_lens:
  names:
    jp_kana: パワーレンズ
    jp_kanji: パワーレンズ
    en: Power Lens
    fr: Lentille Pouvoir
    it: Vigorlente
    de: Machtlinse
    es: Lente Recia
    ko: 파워렌즈
    zh_simp: 力量镜
    zh_trad: 力量鏡
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくこうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特攻が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s Sp. Atk stat to grow more\nafter battling."
    fr: "Objet à tenir. Permet à l’Attaque Spéciale de progresser\nplus vite, mais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon. Riduce la Velocità\nnella lotta ma permette ai punti base dell’Attacco\nSpeciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf den\nSpezial-Angriffs-Wert, senkt aber die Initiative."
    es: "Potencia el Ataque Especial de base, pero reduce la\nVelocidad en combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수공격을\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的特攻\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的特攻\n會比平時培育得更高。"
power_plant_pass:
  names:
    jp_kana: はつでんしょパス
    jp_kanji: はつでんしょパス
    en: Power Plant Pass
    fr: Passe Centrale
    it: Pass Centrale
    de: Kraftwerks-Pass
    es: Pase Central
    ko: 발전소패스
    zh_simp: 发电厂通行证
    zh_trad: 發電廠通行證
  descriptions:
    jp_kana: "１３ばんどうろに　ある\nはつでんしょに　はいるための\nみぶんしょうとなる　パス。"
    jp_kanji: "１３番道路に　ある\n発電所に　入るための\n身分証となる　パス。"
    en: "This pass serves as an ID card for gaining access\nto the Power Plant that lies along Route 13."
    fr: "Un passe de sécurité permettant d’accéder à la\nCentrale de Kalos, à proximité de la Route 13."
    it: "Tesserino di riconoscimento che consente\nl’accesso alla Centrale di Kalos che si trova\nnel Percorso 13."
    de: "Dieser Pass gewährt Zutritt zum Kraftwerk auf\nRoute 13."
    es: "Documento de identificación necesario para acceder\na la central eléctrica de la Ruta 13."
    ko: "13번도로에 있는\n발전소에 들어가기 위한\n신분증이 되는 패스."
    zh_simp: "该通行证可用作进入\n13号道路上的发电厂时\n所需的身份证明。"
    zh_trad: "該通行證可用作進入\n13號道路上的發電廠時\n所需的身份證明。"
power_up_pocket:
  names:
    jp_kana: きょうかポケット
    jp_kanji: きょうかポケット
    en: Power-Up Pocket
    fr: Poche à Renforts
    it: Tasca potenziam.
    de: Stärkungstasche
    es: Bolsillo Mejoras
    ko: 강화포켓
    zh_simp: 强化口袋
    zh_trad: 強化口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
power_weight:
  names:
    jp_kana: パワーウエイト
    jp_kanji: パワーウエイト
    en: Power Weight
    fr: Poids Pouvoir
    it: Vigorpeso
    de: Machtgewicht
    es: Pesa Recia
    ko: 파워웨이트
    zh_simp: 力量负重
    zh_trad: 力量負重
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ＨＰが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　ＨＰが\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon. It reduces Speed\nbut allows the holder’s maximum HP to grow more\nafter battling."
    fr: "Objet à tenir. Permet aux PV max de progresser plus vite,\nmais réduit la Vitesse pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase dei PS di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht nach dem Kampf die\nmaximalen KP, senkt aber die Initiative."
    es: "Mejora los PS de base, pero reduce la Velocidad\nen combate. Debe llevarla un Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 HP를\n올리면서 키우기가 쉽다."
    zh_simp: "虽然携带后速度会降低，\n但宝可梦的HP\n会比平时成长得更高。"
    zh_trad: "雖然攜帶後速度會降低，\n但寶可夢的HP\n會比平時培育得更高。"
pp_max:
  names:
    jp_kana: ポイントマックス
    jp_kanji: ポイントマックス
    en: PP Max
    fr: PP Max
    it: PP-Max
    de: AP-Top
    es: PP Máximos
    ko: 포인트맥스
    zh_simp: PP极限提升剂
    zh_trad: PP極限提升劑
  descriptions:
    jp_kana: "おぼえている　わざのうち\n１つの　ＰＰの　さいだいちを\nさいこうまで　あげる。"
    jp_kanji: "覚えている　技のうち\n１つの　ＰＰの　最大値を\n最高まで　あげる。"
    en: "A medicine that optimally raises the maximum PP\nof a single selected move that has been learned by\na Pokémon."
    fr: "Augmente sensiblement les PP max d’une capacité\nsélectionnée."
    it: "Porta al limite i PP massimi di una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Maximiert die Anzahl der AP einer Attacke eines\nPokémon."
    es: "Aumenta hasta el límite los PP máximos del\nmovimiento elegido de un Pokémon."
    ko: "기억하고 있는 기술 중\n1개의 PP 최대치를\n최고까지 올린다."
    zh_simp: "能将宝可梦学会的\n其中１个招式的\nPP最大值提至最高。"
    zh_trad: "能將寶可夢已學會的\n其中１個招式的\nPP最大值提至最高。"
pp_up:
  names:
    jp_kana: ポイントアップ
    jp_kanji: ポイントアップ
    en: PP Up
    fr: PP Plus
    it: PP-Su
    de: AP-Plus
    es: Más PP
    ko: 포인트업
    zh_simp: PP提升剂
    zh_trad: PP提升劑
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰの\nさいだいちを　すこし　あげる。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰの\n最大値を　少し　あげる。"
    en: "A medicine that slightly raises the maximum PP\nof a single selected move that has been learned by\na Pokémon."
    fr: "Augmente un peu les PP max d’une capacité\nsélectionnée."
    it: "Aumenta di poco i PP massimi di una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Erhöht die maximale Anzahl der AP einer Attacke\neines Pokémon."
    es: "Aumenta ligeramente los PP máximos del\nmovimiento elegido de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP\n최대치를 조금 올린다."
    zh_simp: "能让宝可梦学会的\n其中１个招式的\nPP最大值少量提高。"
    zh_trad: "能讓寶可夢已學會的\n其中１個招式的\nPP最大值少量提高。"
premier_ball:
  names:
    jp_kana: プレミアボール
    jp_kanji: プレミアボール
    en: Premier Ball
    fr: Honor Ball
    it: Premier Ball
    de: Premierball
    es: Honor Ball
    ko: 프레미어볼
    zh_simp: 纪念球
    zh_trad: 紀念球
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nちょっと　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nちょっと　珍しい　ボール。"
    en: "A somewhat rare Poké Ball that was made as a\ncommemorative item used to celebrate an event of\nsome sort."
    fr: "Une Poké Ball assez rare qui fut créée pour un\névènement particulier."
    it: "Poké Ball poco comune realizzata appositamente\nper commemorare un particolare evento."
    de: "Ein eher seltener Ball, der als Reminiszenz an\nirgendein Ereignis hergestellt wurde."
    es: "Es una Poké Ball algo singular que se creó para\nconmemorar algún acontecimiento."
    ko: "무언가의 기념품으로\n특별히 만들어진\n조금 희귀한 볼."
    zh_simp: "有点珍贵的球。\n特制出来的某种纪念品。"
    zh_trad: "作為某種紀念品\n而特別製造的，\n有點稀奇的球。"
pretty_feather:
  names:
    jp_kana: きれいなハネ
    jp_kanji: きれいなハネ
    en: Pretty Wing
    fr: Jolie Aile
    it: Piumabella
    de: Prachtfeder
    es: Pluma Bella
    ko: 고운날개
    zh_simp: 美丽之羽
    zh_trad: 美麗之羽
  descriptions:
    jp_kana: "きれいなだけで　なんの　こうかもない\nごくごく　ふつうの　ハネ。"
    jp_kanji: "きれいなだけで　なんの　効果もない\nごくごく　普通の　ハネ。"
    en: "Though this feather is beautiful, it’s just a regular\nfeather and has no effect."
    fr: "Une plume très jolie, mais ordinaire et sans effet\nparticulier."
    it: "Piuma molto bella ma priva di qualsiasi utilità:\nnon ha alcun effetto."
    de: "Eine ganz normale Feder, die rein gar nichts\nbewirkt."
    es: "Pluma normal y corriente. Muy bonita, pero no sirve\npara nada."
    ko: "아름답기만 할 뿐 아무 효과도 없는\n지극히 평범한 날개."
    zh_simp: "仅仅只是漂亮，\n没有任何效果，\n极其普通的羽毛。"
    zh_trad: "僅僅只是漂亮，\n沒有任何效果，\n極其普通的羽毛。"
primarium_z:bag:
  names:
    jp_kana: アシレーヌＺ
    jp_kanji: アシレーヌＺ
    en: Primarium Z
    fr: Oratozélite
    it: Primarinium Z
    de: Primarenium Z
    es: Primastal Z
    ko: 누리레느Z
    zh_simp: 西狮海壬Ｚ
    zh_trad: 西獅海壬Ｚ
  descriptions:
    jp_kana: "アシレーヌの　うたかたのアリアを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "アシレーヌの　うたかたのアリアを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPrimarina’s Sparkling Aria to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Oratoria qui le tient à transformer\nson Aria de l’Écume en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Primarina di trasformare la mossa\nCanto Effimero in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Primarenes Attacke\nSchaumserenade zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nPrimarina convertir su Aria Burbuja en un movimiento Z."
    ko: "누리레느의 물거품아리아를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将西狮海壬的泡影的咏叹调\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把西獅海壬的泡影的詠歎調\n升級為特殊Ｚ招式的Ｚ力量結晶。"
primarium_z:held:
  names:
    jp_kana: アシレーヌＺ
    jp_kanji: アシレーヌＺ
    en: Primarium Z
    fr: Oratozélite
    it: Primarinium Z
    de: Primarenium Z
    es: Primastal Z
    ko: 누리레느Z
    zh_simp: 西狮海壬Ｚ
    zh_trad: 西獅海壬Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nアシレーヌの　うたかたのアリアを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nアシレーヌの　うたかたのアリアを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Primarina’s Sparkling Aria to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer l’Aria de l’Écume d’un Oratoria\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Canto Effimero\ndi Primarina in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Primarenes Attacke Schaumserenade\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nAria Burbuja de Primarina."
    ko: "Z파워의 결정.\n누리레느의 물거품아리아를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将西狮海壬的泡影的咏叹调\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把西獅海壬的泡影的詠歎調\n升級為Ｚ招式。"
prism_scale:
  names:
    jp_kana: きれいなウロコ
    jp_kanji: きれいなウロコ
    en: Prism Scale
    fr: Bel’Écaille
    it: Squama Bella
    de: Schönschuppe
    es: Escama Bella
    ko: 고운비늘
    zh_simp: 美丽鳞片
    zh_trad: 美麗鱗片
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　ウロコ。\nにじいろに　かがやいている。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　ウロコ。\nにじ色に　輝いている。"
    en: "A mysterious scale that causes a certain Pokémon\nto evolve. It shines in rainbow colors."
    fr: "Une écaille étrange qui fait évoluer certaines espèces\nde Pokémon. Elle a une couleur arc-en-ciel."
    it: "Squama misteriosa che fa evolvere determinate\nspecie di Pokémon.\nRiflette i colori dell’arcobaleno."
    de: "Eine seltsame Schuppe, durch die sich ein\nbestimmtes Pokémon entwickelt. Sie funkelt\nin den Farben des Regenbogens."
    es: "Curiosa escama que hace evolucionar a determinadas\nespecies de Pokémon. Brilla con los colores del arcoíris."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 비늘.\n무지갯빛으로 빛나고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇鳞片。\n散发着虹色光辉。"
    zh_trad: "能讓特定寶可夢\n進化的神奇鱗片。\n散發著虹色光輝。"
prison_bottle:
  names:
    jp_kana: いましめのツボ
    jp_kanji: いましめのツボ
    en: Prison Bottle
    fr: Vase Scellé
    it: Vaso del vincolo
    de: Banngefäß
    es: Vasija Castigo
    ko: 굴레의항아리
    zh_simp: 惩戒之壶
    zh_trad: 懲戒之壺
  descriptions:
    jp_kana: "おおむかしに　とある　ポケモンの\nちからを　ふうじこめたと　される　ツボ。"
    jp_kanji: "大昔に　とある　ポケモンの　力を\n封じ込めたと　される　ツボ。"
    en: "A bottle believed to have been used to seal away\nthe power of a certain Pokémon long, long ago."
    fr: "Récipient utilisé il y a fort longtemps pour sceller\nle pouvoir d’un certain Pokémon."
    it: "Vaso in cui si dice sia sigillata da tempo\nimmemorabile la forza di un Pokémon."
    de: "Ein Gefäß, mit dem vor langer, langer Zeit die Macht\neines gewissen Pokémon versiegelt wurde."
    es: "Vasija en la que se halla confinado el poder de\ncierto Pokémon desde hace muchísimo tiempo."
    ko: "먼 옛날 어떤 포켓몬의 힘을\n봉인했다고 여겨지는 항아리."
    zh_simp: "据说在很久以前封印着\n某只宝可梦力量的壶。"
    zh_trad: "據說在很久以前封印著\n某隻寶可夢力量的壺。"
professors_mask:
  names:
    jp_kana: はかせのふくめん
    jp_kanji: はかせのふくめん
    en: Professor’s Mask
    fr: Masque du Prof
    it: Maschera Prof.
    de: Maske des Profs
    es: Máscara Profesor
    ko: 박사의복면
    zh_simp: 博士的面罩
    zh_trad: 博士的面罩
  descriptions:
    jp_kana: "ロイヤルマスクの　ふくめん。\nプロレスラー　みずから\nミシンで　ぬっているらしい。"
    jp_kanji: "ロイヤルマスクの　覆面。\nプロレスラー　自ら\nミシンで　縫っているらしい。"
    en: "The mask that belongs to The Masked Royal.\nThis pro wrestler apparently sews his mask on a\nmachine himself."
    fr: "Le masque de Royal Mask !\nOn raconte que ce catcheur professionnel aurait cousu\nson costume lui-même."
    it: "Maschera di Mister Royale.\nSembra che il famoso lottatore l’abbia realizzata\npersonalmente."
    de: "Die Maske von Mask Royale. Der Profi-Wrestler\nhat sie selbst mit der Nähmaschine genäht."
    es: "La máscara de luchador de Royale, el Enmascarado.\nMuy probablemente de factura propia."
    ko: "로열마스크의 복면.\n프로레슬러 스스로\n재봉틀로 누빈 듯하다."
    zh_simp: "皇家蒙面人的面罩。\n好像是职业摔角手\n自己用缝纫机缝制的。"
    zh_trad: "皇家蒙面人的面罩。\n好像是職業摔角手\n自己用縫紉機縫製的。"
profs_letter:
  names:
    jp_kana: はかせのてがみ
    jp_kanji: はかせのてがみ
    en: Prof’s Letter
    fr: Lettre du Prof
    it: Lettera del Prof
    de: Brief vom Prof
    es: Carta Profesor
    ko: 박사의편지
    zh_simp: 博士的信
    zh_trad: 博士的信
  descriptions:
    jp_kana: "プラターヌはかせから\nママあてに　かかれた　てがみ。\nほんのり　いい　かおりがする。"
    jp_kanji: "プラターヌ博士から\nママあてに　書かれた　手紙。\nほんのり　いい　香りがする。"
    en: "A letter that Professor Sycamore wrote to your\nmother. A faint but pleasant perfume seems to\ncling to the paper."
    fr: "Une lettre du Professeur Platane à Maman.\nElle dégage un parfum subtil."
    it: "Lettera del Professor Platan per la mamma.\nEmana un delicato profumo."
    de: "Ein an deine Mutter adressierter Brief von\nProfessor Platan. Ihm haftet ein schwacher\nParfümduft an."
    es: "Una carta sutilmente perfumada que el Profesor Ciprés\nle ha escrito a tu madre."
    ko: "플라타느박사가\n엄마에게 쓴 편지.\n은은하게 좋은 향기가 난다."
    zh_simp: "布拉塔诺博士写给妈妈的信。\n上面带有微微的香气。"
    zh_trad: "布拉塔諾博士\n寫給媽媽的信。\n信上帶有微微香氣。"
prop_case:
  names:
    jp_kana: グッズケース
    jp_kanji: グッズケース
    en: Prop Case
    fr: Boîte Parure
    it: Portagadget
    de: Deko-Box
    es: Neceser
    ko: 굿즈케이스
    zh_simp: 物品箱
    zh_trad: 物品箱
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\n収納する　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props for your\nPokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures pour\nhabiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget\nusati per agghindare i Pokémon durante\nil Pokémon Musical."
    de: "Eine ganz tolle Box, in der jede Menge bunte\nDeko-Artikel für Pokémon-Musicals Platz haben."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a tus Pokémon en\nel Teatro Musical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
    zh_simp: "漂亮精美的箱子。\n可以存放宝可梦出演音乐剧时\n用来装扮自己的多种小物件。"
    zh_trad: "漂亮精美的盒子。\n可以存放多種用來裝扮\n出演音樂劇的寶可夢的小飾品。"
protective_pads:
  names:
    jp_kana: ぼうごパット
    jp_kanji: ぼうごパット
    en: Protective Pads
    fr: Pare-Effet
    it: Smorzaurti
    de: Schutzpolster
    es: Paracontacto
    ko: 방호패드
    zh_simp: 部位护具
    zh_trad: 部位護具
  descriptions:
    jp_kana: "こうげき　する　あいてに\nさわって　うける　こうかを\nうけないように　する。"
    jp_kanji: "攻撃　する　相手に\nさわって　受ける　効果を\n受けないように　する。"
    en: "An item to be held by a Pokémon. These pads\nprotect the holder from effects caused by\nmaking direct contact with the target."
    fr: "Annule les effets subis par le porteur quand il utilise\nune attaque directe sur un autre Pokémon."
    it: "Protegge dagli effetti causati dal contatto diretto\ncon altri Pokémon."
    de: "Greift der Träger ein Ziel an, ist er vor Effekten,\ndie durch direkten Kontakt mit diesem ausgelöst\nwerden, geschützt."
    es: "Protege al Pokémon de los efectos que le produciría\nel contacto directo en combate."
    ko: "공격하는 상대와\n접촉해서 받게 되는\n효과를 받지 않게 한다."
    zh_simp: "不会受到触碰攻击对手时\n本应受到的效果。"
    zh_trad: "觸碰要攻擊的對手時，\n不會受到本應受到的效果。"
protector:
  names:
    jp_kana: プロテクター
    jp_kanji: プロテクター
    en: Protector
    fr: Protecteur
    it: Copertura
    de: Schützer
    es: Protector
    ko: 프로텍터
    zh_simp: 护具
    zh_trad: 護具
  descriptions:
    jp_kana: "なにかの　プロテクター。\nとても　かたくて　おもい。\nある　ポケモンが　このんでいる。"
    jp_kanji: "なにかの　プロテクター。\nとても　硬くて　重い。\nある　ポケモンが　好んでいる。"
    en: "A protective item of some sort. It is extremely stiff\nand heavy. It’s loved by a certain Pokémon."
    fr: "Un objet protecteur très dur et très lourd, apprécié\nd’un certain Pokémon."
    it: "Strumento protettivo, molto duro e pesante,\nprediletto da un Pokémon in particolare."
    de: "Ein schützendes Item. Steif und schwer.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Dispositivo de protección muy pesado. Cierto Pokémon\nlo adora."
    ko: "무언가의 프로텍터.\n매우 단단하고 무겁다.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "某种护具。\n非常坚硬而且沉重。\n某种宝可梦很喜欢它。"
    zh_trad: "某種護具。\n非常堅硬而且沉重。\n某種寶可夢很喜歡它。"
protein:
  names:
    jp_kana: タウリン
    jp_kanji: タウリン
    en: Protein
    fr: Protéine
    it: Proteina
    de: Protein
    es: Proteína
    ko: 타우린
    zh_simp: 攻击增强剂
    zh_trad: 攻擊增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　こうげきの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the base Attack stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente l’Attaque\nde base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dell’Attacco."
    de: "Ein gehaltvolles Getränk, das den\nAngriffs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia el Ataque de base\nde un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n攻击的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n攻擊的基礎點數。"
psychic_gem:
  names:
    jp_kana: エスパージュエル
    jp_kanji: エスパージュエル
    en: Psychic Gem
    fr: Joyau Psy
    it: Bijoupsico
    de: Psychojuwel
    es: Gema Psíquica
    ko: 에스퍼주얼
    zh_simp: 超能力宝石
    zh_trad: 超能力寶石
  descriptions:
    jp_kana: "エスパーの　タイプの　ジュエル。\nもたせると　いちどだけ　エスパーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　ジュエル。\n持たせると　１度だけ　エスパーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the mind. When held, it\nstrengthens the power of a Psychic-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Psico."
    de: "Ein Juwel vom Typ Psycho. Es erhöht einmalig die\nStärke einer Attacke vom Typ Psycho."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Psíquico. Debe llevarla un Pokémon."
    ko: "에스퍼타입의 주얼.\n지니게 하면 한 번만 에스퍼\n기술의 위력이 강해진다."
    zh_simp: "超能力属性的宝石。\n携带后，超能力属性的\n招式威力仅会增强１次。"
    zh_trad: "超能力屬性的寶石。\n攜帶後，超能力屬性招式的\n威力會僅增強１次。"
psychic_memory:
  names:
    jp_kana: サイキックメモリ
    jp_kanji: サイキックメモリ
    en: Psychic Memory
    fr: ROM Psy
    it: ROM Psico
    de: Psycho-Disc
    es: Disco Psíquico
    ko: 사이킥메모리
    zh_simp: 精神存储碟
    zh_trad: 精神記憶碟
  descriptions:
    jp_kana: "エスパータイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "エスパータイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Psychic-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Psy. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Psico in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Psycho.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nPsíquico. Permite cambiar de tipo a cierto Pokémon."
    ko: "에스퍼타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有超能力属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有超能力屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
psychic_seed:
  names:
    jp_kana: サイコシード
    jp_kanji: サイコシード
    en: Psychic Seed
    fr: Graine Psychique
    it: Psicoseme
    de: Psycho-Samen
    es: Semilla Psique
    ko: 사이코시드
    zh_simp: 精神种子
    zh_trad: 精神種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nサイコフィールドのときに　つかって\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nサイコフィールドのときに　使って\n特防が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Def\non Psychic Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense Spéciale lorsque\nle terrain est couvert d’un Champ Psychique."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa Speciale quando il terreno\ndi lotta è nello stato di Campo Psichico."
    de: "Gibst du den Samen einem Pokémon zum Tragen,\nsetzt es ihn ein, wenn ein Psychofeld aktiv ist,\nund erhöht dadurch seine Spezial-Verteidigung."
    es: "Aumenta la Defensa Especial del portador si se usa\ncuando el terreno está cubierto por un campo psíquico."
    ko: "포켓몬에게 지니게 하면\n사이코필드일 때 사용하여\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在精神场地上使用，\n特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在精神場地上使用，\n就會提高特防。"
psychium_z:bag:
  names:
    jp_kana: エスパーＺ
    jp_kanji: エスパーＺ
    en: Psychium Z
    fr: Psychézélite
    it: Psichium Z
    de: Psium Z
    es: Psicostal Z
    ko: 에스퍼Z
    zh_simp: 超能力Ｚ
    zh_trad: 超能力Ｚ
  descriptions:
    jp_kana: "エスパータイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "エスパータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nPsychic-type moves to Psychic-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Psy en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Psico in mosse Z."
    de: "Kristallisierte Z-Kraft, die Psycho-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nPsíquico en movimientos Z."
    ko: "에스퍼타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将超能力属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把超能力屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
psychium_z:held:
  names:
    jp_kana: エスパーＺ
    jp_kanji: エスパーＺ
    en: Psychium Z
    fr: Psychézélite
    it: Psichium Z
    de: Psium Z
    es: Psicostal Z
    ko: 에스퍼Z
    zh_simp: 超能力Ｚ
    zh_trad: 超能力Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nエスパータイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nエスパータイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Psychic-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Psy en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Psico\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Psycho-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Psíquico."
    ko: "Z파워의 결정.\n에스퍼타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将超能力属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把超能力屬性的招式\n升級為Ｚ招式。"
psyduck_candy:
  names:
    jp_kana: コダックのアメ
    jp_kanji: コダックのアメ
    en: Psyduck Candy
    fr: Bonbon Psykokwak
    it: Caramella Psyduck
    de: Enton-Bonbon
    es: Caramelo Psyduck
    ko: 고라파덕의사탕
    zh_simp: 可达鸭的糖果
    zh_trad: 可達鴨的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
pure_incense:
  names:
    jp_kana: きよめのおこう
    jp_kanji: きよめのおこう
    en: Pure Incense
    fr: Encens Pur
    it: Puroaroma
    de: Scheuchrauch
    es: Incienso Puro
    ko: 순결의향로
    zh_simp: 洁净薰香
    zh_trad: 潔淨薰香
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon. It helps keep\nwild Pokémon away if the holder is the head of\nthe party."
    fr: "Objet à tenir. Aide à repousser les Pokémon sauvages\nsi le porteur est le premier Pokémon de l’équipe."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha è il primo della squadra, aiuta\nad allontanare i Pokémon selvatici."
    de: "Ein Item zum Tragen. Reduziert Begegnungen mit\nwilden Pokémon, wenn der Träger an der Spitze\ndeines Teams steht."
    es: "Si lo lleva el primer Pokémon del equipo, se reduce\nla probabilidad de que se acerquen Pokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
    zh_simp: "让排在最前面的宝可梦携带后，\n野生宝可梦就会不容易出现。"
    zh_trad: "讓排在最前面的寶可夢\n攜帶後，野生寶可夢\n會變得不容易出現。"
purple_nectar:
  names:
    jp_kana: むらさきのミツ
    jp_kanji: むらさきのミツ
    en: Purple Nectar
    fr: Nectar Mauve
    it: Nettare viola
    de: Purpurner Nektar
    es: Néctar Violeta
    ko: 보라꿀
    zh_simp: 兰紫色花蜜
    zh_trad: 蘭紫色花蜜
  descriptions:
    jp_kana: "ポニのはなぞので　てにいれた\nはなのミツ。　とくていの　ポケモンの\nすがたを　かえる。"
    jp_kanji: "ポニの花園で　手に入れた\n花のミツ。　特定の　ポケモンの\n姿を　変える。"
    en: "A flower nectar obtained at Poni Meadow.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu au Jardin de Poni.\nPermet à un certain Pokémon de changer d’apparence."
    it: "Nettare ottenuto dai fiori del Prato Poni.\nFa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar vom Poni-Blumenmeer.\nEin bestimmtes Pokémon kann damit seine Form\nändern."
    es: "Néctar de ciertas flores de los Jardines de Poni, capaz\nde hacer cambiar de forma a una determinada especie\nde Pokémon."
    ko: "포니 화원에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在波尼花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在波尼花園裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
purple_petal:
  names:
    jp_kana: むらさきはなびら
    jp_kanji: むらさきはなびら
    en: Purple Petal
    fr: Pétale Violet
    it: Petalo violetto
    de: Violettes Blatt
    es: Pétalo Violeta
    ko: 보라꽃잎
    zh_simp: 紫色花瓣
    zh_trad: 紫色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　クチナシから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　クチナシから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Nanu\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Danh vous a remis lors de\nl’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Augusto\ndurante la prova di Rika. L’obiettivo è ricevere\nsette petali diversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Yasu erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Denio durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 나누에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从默丹那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從默丹那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
qualot_berry:
  names:
    jp_kana: タポルのみ
    jp_kanji: タポルのみ
    en: Qualot Berry
    fr: Baie Qualot
    it: Baccaloquat
    de: Qualotbeere
    es: Baya Ispero
    ko: 파비열매
    zh_simp: 比巴果
    zh_trad: 比巴果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nぼうぎょの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n防御の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nbase Defense."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense de base."
    it: "Usata su un Pokémon, lo rende più affezionato,\nma ne diminuisce i punti base della Difesa."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nVerteidigungs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Defensa de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n방어의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但防御的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得親密，\n但防禦的基礎點數會降低。"
quick_ball:
  names:
    jp_kana: クイックボール
    jp_kanji: クイックボール
    en: Quick Ball
    fr: Rapide Ball
    it: Velox Ball
    de: Flottball
    es: Veloz Ball
    ko: 퀵볼
    zh_simp: 先机球
    zh_trad: 先機球
  descriptions:
    jp_kana: "せんとうが　はじまって　すぐに\nつかうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "戦闘が　はじまって　すぐに\n使うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that has a more\nsuccessful catch rate if used at the start of a\nwild encounter."
    fr: "Une Poké Ball qui permet d’attraper un Pokémon\nsauvage plus facilement si on l’utilise au début\ndu combat."
    it: "Poké Ball un po’ diversa che facilita la cattura\ndi un Pokémon selvatico se usata all’inizio\ndella lotta."
    de: "Ein ungewöhnlicher Ball, der zu Beginn eines\nKampfes am wirkungsvollsten ist."
    es: "Una Poké Ball algo distinta que potencia el índice\nde captura si se usa al inicio de un encuentro con\nPokémon salvajes."
    ko: "배틀이 시작되자마자\n사용하면 잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n如果战斗开始后立刻使用，\n就能很容易地捉到宝可梦。"
    zh_trad: "有點與眾不同的球。\n在戰鬥開始後立刻使用，\n就會變得容易捉到寶可夢。"
quick_candy:
  names:
    jp_kana: はやさのアメ
    jp_kanji: はやさのアメ
    en: Quick Candy
    fr: Bonbon Sprint S
    it: Caramella rapidità S
    de: Flottbonbon
    es: Caramelo Ímpetu
    ko: 속도의사탕
    zh_simp: 敏捷糖果
    zh_trad: 敏捷糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　すばやさを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　すばやさを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Speed stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon."
    es: "Caramelo energético que aumenta la Velocidad del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 스피드를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的速度。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的速度。"
quick_candy_l:
  names:
    jp_kana: はやさのアメＬ
    jp_kanji: はやさのアメＬ
    en: Quick Candy L
    fr: Bonbon Sprint M
    it: Caramella rapidità M
    de: Flottbonbon+
    es: Caramelo Ímpetu +
    ko: 속도의사탕L
    zh_simp: 敏捷糖果L
    zh_trad: 敏捷糖果L
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nすばやさを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nすばやさを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Speed stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta la Velocidad\nde un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n스피드를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级30以上的\n宝可梦的速度上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在30以上的\n寶可夢的速度。"
quick_candy_xl:
  names:
    jp_kana: はやさのアメＸＬ
    jp_kanji: はやさのアメＸＬ
    en: Quick Candy XL
    fr: Bonbon Sprint L
    it: Caramella rapidità L
    de: Flottbonbon++
    es: Caramelo Ímpetu ++
    ko: 속도의사탕XL
    zh_simp: 敏捷糖果XL
    zh_trad: 敏捷糖果XL
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nすばやさを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nすばやさを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Speed stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Vitesse d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Velocità di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Initiative eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta la Velocidad\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n스피드를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级60以上的\n宝可梦的速度上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在60以上的\n寶可夢的速度。"
quick_claw:
  names:
    jp_kana: せんせいのツメ
    jp_kanji: せんせいのツメ
    en: Quick Claw
    fr: Vive Griffe
    it: Rapidartigli
    de: Flinkklaue
    es: Garra Rápida
    ko: 선제공격손톱
    zh_simp: 先制之爪
    zh_trad: 先制之爪
  descriptions:
    jp_kana: "かるくて　するどい　ツメ。\nもたせると　あいてより　さきに\nこうどう　できることが　ある。"
    jp_kanji: "軽くて　鋭い　ツメ。\n持たせると　相手より　先に\n行動できることが　ある。"
    en: "An item to be held by a Pokémon. This light, sharp\nclaw lets the bearer move first occasionally."
    fr: "Objet à tenir. Une griffe légère mais tranchante\nqui permet parfois de frapper en priorité."
    it: "Strumento da dare a un Pokémon.\nLeggero e affilato, ogni tanto permette di fare\nla prima mossa."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es hebt gelegentlich\ndie Erstschlagquote."
    es: "Garra ligera y afilada que permite que el Pokémon\nque la lleve ataque a veces el primero."
    ko: "가볍고 날카로운 손톱.\n지니게 하면 상대보다 먼저\n행동할 수도 있다."
    zh_simp: "又轻又尖锐的爪子。\n携带后，有时能比对手\n先一步行动。"
    zh_trad: "又輕又尖銳的爪子。\n攜帶後，有時能比對手\n先一步行動。"
quick_powder:
  names:
    jp_kana: スピードパウダー
    jp_kanji: スピードパウダー
    en: Quick Powder
    fr: Poudre Vite
    it: Velopolvere
    de: Flottstaub
    es: Polvo Veloz
    ko: 스피드파우더
    zh_simp: 速度粉
    zh_trad: 速度粉
  descriptions:
    jp_kana: "メタモンに　もたせると　すばやさが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　素早さが\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto. Extremely fine yet\nhard, this odd powder boosts the Speed stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Vitesse."
    it: "Strumento da dare a Ditto.\nQuesta strana polvere, fine e al contempo dura,\naumenta la Velocità."
    de: "Ein Item, das Ditto zum Tragen gegeben werden\nkann. Fein und doch hart, erhöht es den\nInitiative-Wert."
    es: "Debe llevarlo Ditto. Es un polvo muy fino, pero\na la vez poderoso, que aumenta su Velocidad."
    ko: "메타몽에게 지니게 하면 스피드가\n올라가는 이상한 가루.\n매우 잘고 단단하다."
    zh_simp: "让百变怪携带后，\n速度就会提高的神奇粉末。\n非常细腻坚硬。"
    zh_trad: "讓百變怪攜帶後，\n速度就會提高的神奇粉末。\n非常細緻堅硬。"
rabuta_berry:
  names:
    jp_kana: ラブタのみ
    jp_kanji: ラブタのみ
    en: Rabuta Berry
    fr: Baie Rabuta
    it: Baccambutan
    de: Rabutabeere
    es: Baya Rautan
    ko: 라부탐열매
    zh_simp: 茸丹果
    zh_trad: 茸丹果
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nl’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es una baya muy rara en otras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
rage_candy_bar:
  names:
    jp_kana: いかりまんじゅう
    jp_kanji: いかりまんじゅう
    en: Rage Candy Bar
    fr: Bonbon Rage
    it: Iramella
    de: Wutkeks
    es: Caramelo Furia
    ko: 분노의호두과자
    zh_simp: 愤怒馒头
    zh_trad: 憤怒饅頭
  descriptions:
    jp_kana: "チョウジめいぶつの　まんじゅう。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "チョウジタウン名物の　まんじゅう。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Mahogany Town’s famous candy. It can be used\nonce to heal all the status conditions of a Pokémon."
    fr: "Un bonbon, spécialité d’Acajou.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Caramella tipica di Mogania.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine Spezialität aus Mahagonia City, die alle\nStatusprobleme eines Pokémon heilt."
    es: "Caramelo típico de Pueblo Caoba. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "황토마을의 명물인 호두과자.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "卡吉镇特产的馒头。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "卡吉鎮特產的饅頭。\n能治癒１隻寶可夢的\n所有異常狀態。"
rainbow_flower:
  names:
    jp_kana: にじいろのはな
    jp_kanji: にじいろのはな
    en: Rainbow Flower
    fr: Fleur 7 Couleurs
    it: Fiore arcobaleno
    de: Regenbogenblüte
    es: Flor Irisada
    ko: 무지개꽃
    zh_simp: 虹色之花
    zh_trad: 虹色之花
  descriptions:
    jp_kana: "キャプテンたちから　もらった\nはなびらを　ひとつに　まとめたもの。\nせいちょうを　みとめられた　あかし。"
    jp_kanji: "キャプテンたちから　もらった\nはなびらを　ひとつに　まとめたもの。\n成長を　認められた　証。"
    en: "A flower made of the petals you received from\ncaptains. It’s proof that your growth has been\nrecognized by them."
    fr: "Une fleur formée à partir des pétales que vous ont\nremis les sept Capitaines. C’est le symbole de\nce que vous avez accompli jusqu’ici."
    it: "Fiore composto dai petali ottenuti dai Capitani.\nÈ la prova che i tuoi progressi sono stati\nriconosciuti."
    de: "Diese Blüte besteht aus den Blütenblättern, die du\nvon den Captains erhalten hast. Sie ist ein Symbol\nder Anerkennung deiner Stärke."
    es: "Flor resultante de la unión de los siete pétalos\nentregados por los Capitanes, símbolo de la\nexperiencia y madurez acumuladas en tu aventura."
    ko: "캡틴들에게 받은\n꽃잎을 하나로 만든 것.\n성장을 인정받은 증표."
    zh_simp: "将得自队长们那里的花瓣\n化零为整后形成的东西。\n是成长得到认可的证明。"
    zh_trad: "以從隊長們那裡得到的花瓣\n構成的一朵花。這朵花\n證明了他們認同你的成長。"
rainbow_wing:
  names:
    jp_kana: にじいろのはね
    jp_kanji: にじいろのはね
    en: Rainbow Wing
    fr: Arc-en-Ci’Aile
    it: Ala d’Iride
    de: Buntschwinge
    es: Ala Arcoíris
    ko: 무지갯빛날개
    zh_simp: 虹色之羽
    zh_trad: 虹色之羽
  descriptions:
    jp_kana: "にじいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "にじいろに　ひかり　かがやく\n不思議な　はね。"
    en: A mystical rainbow feather that sparkles.
    fr: Une étrange plume qui brille d’un éclat arc-en-ciel.
    it: Piuma magica dai mille colori.
    de: "Eine mystische Feder, die von einem\nregenbogenfarbenen Leuchten erfüllt ist."
    es: Misteriosa ala de un brillante color arcoíris.
    ko: "무지갯빛으로 빛나는\n이상한 날개."
    zh_simp: "散发着虹色光辉的\n神奇羽毛。"
    zh_trad: "散發著虹色光輝的\n神奇羽毛。"
rare_bone:
  names:
    jp_kana: きちょうなホネ
    jp_kanji: きちょうなホネ
    en: Rare Bone
    fr: Os Rare
    it: Osso Raro
    de: Steinknochen
    es: Hueso Raro
    ko: 귀중한뼈
    zh_simp: 贵重骨头
    zh_trad: 貴重骨頭
  descriptions:
    jp_kana: "ポケモンこうこがくの　うえで\nとても　きちょうな　ホネ。\nショップで　たかく　うれる。"
    jp_kanji: "ポケモン考古学の　うえで\nとても　貴重な　ホネ。\nショップで　高く　売れる。"
    en: "A rare bone that is extremely valuable for the\nstudy of Pokémon archeology. It can be sold for a\nhigh price to shops."
    fr: "Un os d’une grande valeur pour l’archéologie Pokémon.\nPeut être vendu à bon prix aux magasins."
    it: "Osso di grande valore per l’archeologia Pokémon.\nPuò essere venduto nei negozi a un prezzo\npiuttosto alto."
    de: "Dieser Knochen erfreut jeden Pokémon-\nArchäologen. Er ist von hohem Wert."
    es: "Un hueso de gran valor para la arqueología Pokémon.\nPuede alcanzar un alto precio en las tiendas."
    ko: "포켓몬 고고학에 있어\n매우 귀중한 뼈.\n상점에서 비싸게 팔린다."
    zh_simp: "在宝可梦考古学上\n非常贵重的骨头。\n可以在商店高价出售。"
    zh_trad: "在寶可夢考古學上\n非常貴重的骨頭。\n可以在商店高價出售。"
rare_candy:
  names:
    jp_kana: ふしぎなアメ
    jp_kanji: ふしぎなアメ
    en: Rare Candy
    fr: Super Bonbon
    it: Caramella rara
    de: Sonderbonbon
    es: Caramelo Raro
    ko: 이상한사탕
    zh_simp: 神奇糖果
    zh_trad: 神奇糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nレベルが　１だけ　あがる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１匹の\nレベルが　１だけ　あがる。"
    en: "A candy that is packed with energy. When consumed,\nit will instantly raise the level of a single Pokémon\nby one."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de monter d’un niveau."
    it: "Caramella altamente energetica.\nFa salire un Pokémon di un livello."
    de: "Ein energiereiches Bonbon, das den Level\neines Pokémon dauerhaft um 1 erhöht."
    es: "Caramelo energético que sube a un Pokémon de\nnivel."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n레벨이 1만큼 올라간다."
    zh_simp: "充满能量的糖果。\n将它交给宝可梦后，\n１只宝可梦的等级仅会提高１。"
    zh_trad: "充滿能量的糖果。\n餵給寶可夢後，\n能讓寶可夢的等級提高１級。"
rattata_candy:
  names:
    jp_kana: コラッタのアメ
    jp_kanji: コラッタのアメ
    en: Rattata Candy
    fr: Bonbon Rattata
    it: Caramella Rattata
    de: Rattfratz-Bonbon
    es: Caramelo Rattata
    ko: 꼬렛의사탕
    zh_simp: 小拉达的糖果
    zh_trad: 小拉達的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
rawst_berry:
  names:
    jp_kana: チーゴのみ
    jp_kanji: チーゴのみ
    en: Rawst Berry
    fr: Baie Fraive
    it: Baccafrago
    de: Fragiabeere
    es: Baya Safre
    ko: 복분열매
    zh_simp: 莓莓果
    zh_trad: 莓莓果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nやけどを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nやけどを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from a burn on its own\nin battle."
    fr: "Une Baie qui soigne une brûlure lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce dalle\nscottature."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Verbrennungen."
    es: "Los Pokémon pueden llevarla o usarla para curarse\nlas quemaduras."
    ko: "포켓몬에게 지니게 하면\n화상을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈灼伤。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒灼傷。"
razor_claw:
  names:
    jp_kana: するどいツメ
    jp_kanji: するどいツメ
    en: Razor Claw
    fr: Griffe Rasoir
    it: Affilartigli
    de: Scharfklaue
    es: Garra Afilada
    ko: 예리한손톱
    zh_simp: 锐利之爪
    zh_trad: 銳利之爪
  descriptions:
    jp_kana: "するどく　とがった　ツメ。\nもたせると　わざが　きゅうしょに\nあたりやすくなる。"
    jp_kanji: "鋭く　とがった　ツメ。\n持たせると　技が　急所に\n当たりやすくなる。"
    en: "An item to be held by a Pokémon. This sharply\nhooked claw increases the holder’s\ncritical-hit ratio."
    fr: "Objet à tenir. Une griffe crochue et pointue augmentant\nle taux de critique."
    it: "Strumento da dare a un Pokémon.\nArtiglio che aumenta la probabilità di sferrare\nbrutti colpi."
    de: "Ein Item zum Tragen. Die scharfe Klaue erhöht die\nVolltrefferquote des Trägers."
    es: "Aumenta la probabilidad de que el Pokémon que\nla lleve consiga un golpe crítico."
    ko: "날카롭고 뾰족한 손톱.\n지니게 하면 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "尖锐的爪子。\n携带后，招式会\n变得容易击中要害。"
    zh_trad: "尖銳的爪子。\n攜帶後，招式會\n變得容易擊中要害。"
razor_fang:
  names:
    jp_kana: するどいキバ
    jp_kanji: するどいキバ
    en: Razor Fang
    fr: Croc Rasoir
    it: Affilodente
    de: Scharfzahn
    es: Colmillo Agudo
    ko: 예리한이빨
    zh_simp: 锐利之牙
    zh_trad: 銳利之牙
  descriptions:
    jp_kana: "するどく　とがった　キバ。\nもたせると　ダメージを　あたえたとき\nひるませることが　ある。"
    jp_kanji: "鋭く　とがった　キバ。\n持たせると　ダメージを　与えたとき\nひるませることが　ある。"
    en: "An item to be held by a Pokémon. When the holder\nsuccessfully inflicts damage, the target may\nalso flinch."
    fr: "Objet à tenir. Peut apeurer l’ennemi quand le porteur\nlui inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha può far tentennare il nemico colpito."
    de: "Ein Item zum Tragen. Verursacht der Träger\nSchaden, schreckt das Ziel eventuell zurück."
    es: "Si lo lleva un Pokémon cuando inflige daño al objetivo,\npuede hacerle retroceder."
    ko: "날카롭고 뾰족한 이빨.\n지니게 하면 데미지를 줬을 때\n풀죽게 하기도 한다."
    zh_simp: "尖锐的牙齿。\n携带后，在给予伤害时，\n有时会让对手畏缩。"
    zh_trad: "尖銳的牙齒。\n攜帶後，在給予傷害時，\n有時會讓對手畏縮。"
razz_berry:
  names:
    jp_kana: ズリのみ
    jp_kanji: ズリのみ
    en: Razz Berry
    fr: Baie Framby
    it: Baccalampon
    de: Himmihbeere
    es: Baya Frambu
    ko: 라즈열매
    zh_simp: 蔓莓果
    zh_trad: 蔓莓果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nすこし　つかまえ　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n少し　捕まえ　やすくなる　きのみ。"
    en: "A Berry that makes it slightly easier to catch Pokémon\nwhen given to them."
    fr: "Une Baie à donner à un Pokémon sauvage pour pouvoir\nl’attraper un peu plus facilement."
    it: "Bacca che facilita un po’ la cattura del Pokémon\nselvatico a cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nlässt es sich ein bisschen leichter fangen."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara que resulte un poco más fácil capturarlo."
    ko: "포켓몬에게 주면\n조금 잡기 쉬워지는 나무열매."
    zh_simp: "把这树果交给宝可梦后，\n宝可梦就会变得\n稍微容易捕捉一点。"
    zh_trad: "把這個樹果餵給寶可夢，\n就能讓牠們變得比較容易捕捉。"
reaper_cloth:
  names:
    jp_kana: れいかいのぬの
    jp_kanji: れいかいのぬの
    en: Reaper Cloth
    fr: Tissu Fauche
    it: Terrorpanno
    de: Düsterumhang
    es: Tela Terrible
    ko: 영계의천
    zh_simp: 灵界之布
    zh_trad: 靈界之布
  descriptions:
    jp_kana: "おそろしく　つよい　れいりょくが\nこめられている　ぬの。\nある　ポケモンが　このんでいる。"
    jp_kanji: "おそろしく　強い　霊力が\nこめられている　布。\nある　ポケモンが　好んでいる。"
    en: "A cloth imbued with horrifyingly strong spiritual\nenergy. It’s loved by a certain Pokémon."
    fr: "Un tissu imprégné d’une énergie spirituelle horriblement\npuissante. Apprécié d’un certain Pokémon."
    it: "Panno intriso di un’energia spirituale terribilmente\nforte. Piace a un Pokémon in particolare."
    de: "Ein Stoffumhang mit geistiger Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Tela imbuida de una energía espiritual muy potente.\nCierto Pokémon la adora."
    ko: "무섭고 강한 영력이\n담겨 있는 천.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "蕴含着惊人强大灵力的布。\n某种宝可梦很喜欢它。"
    zh_trad: "蘊含著驚人的\n強大靈力的布。\n某種寶可夢很喜歡它。"
red_apricorn:
  names:
    jp_kana: あかぼんぐり
    jp_kanji: あかぼんぐり
    en: Red Apricorn
    fr: Noigrume Rouge
    it: Ghicocca Rossa
    de: Aprikoko Rot
    es: Bonguri Rojo
    ko: 빨간규토리
    zh_simp: 红球果
    zh_trad: 紅球果
  descriptions:
    jp_kana: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    jp_kanji: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    en: A red Apricorn. It assails your nostrils.
    fr: "Un Noigrume de couleur rouge.\nIl dégage un puissant arôme."
    it: "Una Ghicocca di colore rosso.\nEmana un odore molto forte."
    de: "Eine rote Aprikoko. Besitzt einen stechenden\nGeruch."
    es: Bonguri de color rojo y aroma muy penetrante.
    ko: "빨간색의 규토리.\n코를 톡 쏘는 향기가 난다."
    zh_simp: "红色的球果。\n有种刺鼻的气味。"
    zh_trad: "紅色的球果。\n有種刺鼻的氣味。"
red_card:
  names:
    jp_kana: レッドカード
    jp_kanji: レッドカード
    en: Red Card
    fr: Carton Rouge
    it: Cartelrosso
    de: Rote Karte
    es: Tarjeta Roja
    ko: 레드카드
    zh_simp: 红牌
    zh_trad: 紅牌
  descriptions:
    jp_kana: "ふしぎな　ちからのある　カード。\nもたせると　わざをつかってきた　あいてを\nたいじょう　させることが　できる。"
    jp_kanji: "不思議な　ちからのある　カード。\n持たせると　技を　使ってきた　相手を\n退場させることが　できる。"
    en: "An item to be held by a Pokémon. When the holder\nis hit by an attack, the attacker is removed\nfrom battle."
    fr: "Une carte au pouvoir mystérieux.\nSi son porteur est touché par l’attaquant, ce dernier\ndoit se retirer du combat."
    it: "Cartellino dal potere misterioso. Chi ce l’ha\nfa ritirare dalla lotta il Pokémon che lo ha colpito."
    de: "Eine Karte mit mysteriösen Kräften. Wird der Träger\ngetroffen, wird der Angreifer des Platzes\nverwiesen."
    es: "Misteriosa tarjeta que permite al Pokémon que la lleva\nexpulsar al oponente cuando este le cause daño."
    ko: "이상한 힘이 있는 카드.\n지니게 하면 기술을 사용한 상대를\n퇴장시킬 수 있다."
    zh_simp: "有着神奇力量的卡片。\n携带后，能让使用了\n招式的对手退场。"
    zh_trad: "有著神奇力量的卡片。\n攜帶後，能讓使用了\n招式的對手退場。"
red_chain:
  names:
    jp_kana: あかいくさり
    jp_kanji: あかいくさり
    en: Red Chain
    fr: Chaîne Rouge
    it: Rossocatena
    de: Rote Kette
    es: Cadena Roja
    ko: 빨강쇠사슬
    zh_simp: 红色锁链
    zh_trad: 紅色鎖鏈
  descriptions:
    jp_kana: "シンオウちほうを　うみだした\nでんせつの　ポケモンを　つなぐと\nいわれる　しんわの　どうぐ。"
    jp_kanji: "シンオウ地方を　うみだした\n伝説の　ポケモンを　つなぐと\nいわれる　神話の　道具。"
    en: "A mythical chain that is said to link the\nLegendary Pokémon that created the Sinnoh region."
    fr: "Une chaîne mystique qui serait reliée au Pokémon\nlégendaire ayant créé la région de Sinnoh."
    it: "Catena mitica che pare essere collegata\nal Pokémon leggendario che ha creato\nla regione di Sinnoh."
    de: "Diese mythische Kette ist angeblich die Verbindung\nzu einem Legendären Pokémon."
    es: "Se dice que esta cadena mística está relacionada con\nel Pokémon legendario que creó la región de Sinnoh."
    ko: "신오지방을 만들어낸\n전설의 포켓몬과 이어진다고\n전해지는 신화의 도구."
    zh_simp: "神话道具。\n据说连接着孕育出\n神奥地区的传说的宝可梦。"
    zh_trad: "神話道具。\n據說連結著孕育出\n神奧地區的傳說的寶可夢。"
red_flute:
  names:
    jp_kana: あかいビードロ
    jp_kanji: あかいビードロ
    en: Red Flute
    fr: Flûte Rouge
    it: Flauto Rosso
    de: Rote Flöte
    es: Flauta Roja
    ko: 빨강비드로
    zh_simp: 红色玻璃哨
    zh_trad: 紅色玻璃哨
  descriptions:
    jp_kana: "あかいガラスで　できた　ふえ。\nメロメロ　じょうたいを\nかいふくする。"
    jp_kanji: "赤いガラスで　できた　笛。\nメロメロ状態を　回復する。"
    en: "A flute made from red glass. It snaps Pokémon\nout of infatuation."
    fr: "Un jouet en forme de flûte en verre rouge.\nAnnule l’effet du statut attraction."
    it: "Flauto fatto di vetro rosso. Ha il potere di guarire\ndall’infatuazione."
    de: "Eine Spielzeugflöte aus rotem Glas.\nHeilt Anziehung."
    es: "Una flauta de cristal rojo cuyas notas vuelven en sí\na un Pokémon enamorado."
    ko: "빨간 유리로 만들어진 피리.\n헤롱헤롱 상태를\n회복한다."
    zh_simp: "以红色玻璃制成的哨子。\n可以治愈着迷状态。"
    zh_trad: "以紅色玻璃製成的笛子。\n可以治癒著迷狀態。"
red_nectar:
  names:
    jp_kana: くれないのミツ
    jp_kanji: くれないのミツ
    en: Red Nectar
    fr: Nectar Rouge
    it: Nettare rosso
    de: Roter Nektar
    es: Néctar Rojo
    ko: 다홍꿀
    zh_simp: 朱红色花蜜
    zh_trad: 朱紅色花蜜
  descriptions:
    jp_kana: "ウラウラのはなぞので　てにいれた\nはなのミツ。　とくていの　ポケモンの\nすがたを　かえる。"
    jp_kanji: "ウラウラの花園で　手に入れた\n花のミツ。　特定の　ポケモンの\n姿を　変える。"
    en: "A flower nectar obtained at Ula’ula Meadow.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu au Jardin d’Ula-Ula.\nPermet à un certain Pokémon de changer d’apparence."
    it: "Nettare ottenuto dai fiori del Prato Ula Ula.\nFa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar vom Ula-Ula-Blumenmeer.\nEin bestimmtes Pokémon kann damit seine Form\nändern."
    es: "Néctar de ciertas flores de los Jardines de Ula-Ula,\ncapaz de hacer cambiar de forma a una determinada\nespecie de Pokémon."
    ko: "울라울라 화원에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在乌拉乌拉花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在烏拉烏拉花園裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
red_orb:
  names:
    jp_kana: べにいろのたま
    jp_kanji: べにいろのたま
    en: Red Orb
    fr: Gemme Rouge
    it: Gemma rossa
    de: Roter Edelstein
    es: Prisma Rojo
    ko: 주홍구슬
    zh_simp: 朱红色宝珠
    zh_trad: 朱紅色寶珠
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあかく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあかく　かがやく　たま。"
    en: "A shiny red orb that is said to have a legend tied\nto it. It’s known to have a deep connection with the\nHoenn region."
    fr: "Une gemme incarnate dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi rossi, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Ein rot schimmernder Stein, von dem in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Piedra carmesí de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n빨갛게 빛나는 구슬."
    zh_simp: "散发着红色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "據說和豐緣地區的傳說\n有著很深淵源的，\n散發著紅色光輝的寶珠。"
red_petal:
  names:
    jp_kana: あかのはなびら
    jp_kanji: あかのはなびら
    en: Red Petal
    fr: Pétale Rouge
    it: Petalo rosso
    de: Rotes Blatt
    es: Pétalo Rojo
    ko: 빨강꽃잎
    zh_simp: 红色花瓣
    zh_trad: 紅色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　カキから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　カキから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Kiawe\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Kiawe vous a remis lors de\nl’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Kawe durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Kiawe erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Kiawe durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 키아웨에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从卡奇那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從卡奇那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
red_scale:
  names:
    jp_kana: あかいウロコ
    jp_kanji: あかいウロコ
    en: Red Scale
    fr: Écaillerouge
    it: Squama Rossa
    de: Rote Haut
    es: Escama Roja
    ko: 빨간비늘
    zh_simp: 红色鳞片
    zh_trad: 紅色鱗片
  descriptions:
    jp_kana: "いかりのみずうみに　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    jp_kanji: "怒りの湖に　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    en: "A scale from a red Gyarados. It glows red like\na flame."
    fr: "Une écaille du Léviator apparu au Lac Colère.\nElle rougeoie comme une flamme."
    it: "Una squama del Gyarados rosso apparso\nal Lago d’Ira. È rossa come il fuoco."
    de: "Eine Schuppe des roten Garados, das im See des\nZorns erschienen ist. Sie glänzt rot wie Feuer."
    es: "Escama del Gyarados aparecido en el Lago de la Furia.\nEs de un rojo tan intenso como las llamas."
    ko: "분노의 호수에 나타난\n빨간 갸라도스의 비늘.\n불꽃처럼 빨갛게 빛난다."
    zh_simp: "在愤怒之湖里出现的\n红色暴鲤龙的鳞片。\n散发着像火一样的红色光芒。"
    zh_trad: "在憤怒之湖裡出現的\n紅色暴鯉龍的鱗片。\n散發著像火一樣的紅色光芒。"
red_scarf:
  names:
    jp_kana: あかいバンダナ
    jp_kanji: あかいバンダナ
    en: Red Scarf
    fr: Foulard Rouge
    it: Fascia Rossa
    de: Roter Schal
    es: Pañuelo Rojo
    ko: 빨강밴드
    zh_simp: 红色头巾
    zh_trad: 紅色頭巾
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    en: "An item to be held by a Pokémon. During a contest,\nit raises the Cool aspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente le Sang-froid d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Classe” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Coolness ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta el carisma en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n근사하게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加帅气。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加帥氣。"
red_shard:
  names:
    jp_kana: あかいかけら
    jp_kanji: あかいかけら
    en: Red Shard
    fr: Tesson Rouge
    it: Coccio Rosso
    de: Purpurstück
    es: Parte Roja
    ko: 빨강조각
    zh_simp: 红色碎片
    zh_trad: 紅色碎片
  descriptions:
    jp_kana: "あかい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "赤い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small red shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson rouge.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio rosso che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine rote Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento rojo. Parece formar parte\nde algún tipo de herramienta antigua."
    ko: "빨간 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "红色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "紅色的小碎片。\n好像是以前製作的\n某道具的一部分。"
relic_band:
  names:
    jp_kana: こだいのうでわ
    jp_kanji: こだいのうでわ
    en: Relic Band
    fr: Vieux Bijou
    it: Bracciantico
    de: Alter Reif
    es: Brazal
    ko: 고대의팔찌
    zh_simp: 古代手镯
    zh_trad: 古代手鐲
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　うでわ。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　腕輪。"
    en: "A heavy bracelet made by an ancient civilization\nabout 3,000 years ago."
    fr: Un bijou d’une civilisation vieille de plus de 3 000 ans.
    it: "Braccialetto forgiato circa 3.000 anni fa\nda un’antica civiltà."
    de: "Ein Armreif, angefertigt von einer gut 3 000 Jahre\nalten Kultur."
    es: Brazalete de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 팔찌."
    zh_simp: "约3000年前的\n文明制造的手镯。"
    zh_trad: "距今約3000年前的\n文明裡製造的手鐲。"
relic_copper:
  names:
    jp_kana: こだいのどうか
    jp_kanji: こだいのどうか
    en: Relic Copper
    fr: Vieux Sou
    it: Soldantico
    de: Alter Heller
    es: Real Cobre
    ko: 고대의동화
    zh_simp: 古代铜币
    zh_trad: 古代銅幣
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　どうか。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　銅貨。"
    en: "A copper coin used by an ancient civilization about\n3,000 years ago."
    fr: "Une pièce de cuivre d’une civilisation vieille de plus\nde 3 000 ans."
    it: "Moneta di rame usata circa 3.000 anni fa\nda un’antica civiltà."
    de: "Eine alte Kupfermünze. Die Währung einer gut\n3 000 Jahre alten Kultur."
    es: Moneda de cobre de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 사용된 동화."
    zh_simp: "约3000年前的\n文明使用的铜币。"
    zh_trad: "距今約3000年前的\n文明裡使用的銅幣。"
relic_crown:
  names:
    jp_kana: こだいのおうかん
    jp_kanji: こだいのおうかん
    en: Relic Crown
    fr: Vieux Tortil
    it: Coronantica
    de: Alte Krone
    es: Corona Antigua
    ko: 고대의왕관
    zh_simp: 古代王冠
    zh_trad: 古代王冠
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　おうかん。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　王冠。"
    en: "A heavy crown made by an ancient civilization\nabout 3,000 years ago."
    fr: "Une couronne d’une civilisation vieille de plus\nde 3 000 ans."
    it: "Corona forgiata circa 3.000 anni fa da un’antica\nciviltà."
    de: "Die Krone eines Königs, angefertigt von einer gut\n3 000 Jahre alten Kultur."
    es: Corona de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 왕관."
    zh_simp: "约3000年前的\n文明制造的王冠。"
    zh_trad: "距今約3000年前的\n文明裡製造的王冠。"
relic_gold:
  names:
    jp_kana: こだいのきんか
    jp_kanji: こだいのきんか
    en: Relic Gold
    fr: Vieux Ducat
    it: Doblonantico
    de: Alter Dukat
    es: Real Oro
    ko: 고대의금화
    zh_simp: 古代金币
    zh_trad: 古代金幣
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　きんか。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　金貨。"
    en: "A gold coin used by an ancient civilization about\n3,000 years ago."
    fr: "Une pièce d’or d’une civilisation vieille de plus\nde 3 000 ans."
    it: "Moneta d’oro usata circa 3.000 anni fa\nda un’antica civiltà."
    de: "Eine alte Goldmünze. Die Währung einer gut\n3 000 Jahre alten Kultur."
    es: Moneda de oro de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 사용된 금화."
    zh_simp: "约3000年前的\n文明使用的金币。"
    zh_trad: "距今約3000年前的\n文明裡使用的金幣。"
relic_silver:
  names:
    jp_kana: こだいのぎんか
    jp_kanji: こだいのぎんか
    en: Relic Silver
    fr: Vieil Écu
    it: Ducatantico
    de: Alter Taler
    es: Real Plata
    ko: 고대의은화
    zh_simp: 古代银币
    zh_trad: 古代銀幣
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　ぎんか。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　銀貨。"
    en: "A silver coin used by an ancient civilization about\n3,000 years ago."
    fr: "Une pièce d’argent d’une civilisation vieille de plus\nde 3 000 ans."
    it: "Moneta d’argento usata circa 3.000 anni fa\nda un’antica civiltà."
    de: "Eine alte Silbermünze. Die Währung einer gut\n3 000 Jahre alten Kultur."
    es: Moneda de plata de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 사용된 은화."
    zh_simp: "约3000年前的\n文明使用的银币。"
    zh_trad: "距今約3000年前的\n文明裡使用的銀幣。"
relic_statue:
  names:
    jp_kana: こだいのせきぞう
    jp_kanji: こだいのせきぞう
    en: Relic Statue
    fr: Vieux Santon
    it: Statuantica
    de: Alte Statue
    es: Efigie Antigua
    ko: 고대의석상
    zh_simp: 古代石像
    zh_trad: 古代石像
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　せきぞう。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　石像。"
    en: "A stone figurine made by an ancient civilization\nabout 3,000 years ago."
    fr: "Une statuette d’une civilisation vieille de plus\nde 3 000 ans."
    it: "Statua scolpita circa 3.000 anni fa da un’antica\nciviltà."
    de: "Eine Statue, angefertigt von einer gut 3 000 Jahre\nalten Kultur."
    es: Efigie de piedra de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 석상."
    zh_simp: "约3000年前的\n文明制造的石像。"
    zh_trad: "距今約3000年前的\n文明裡製造的石像。"
relic_vase:
  names:
    jp_kana: こだいのツボ
    jp_kanji: こだいのツボ
    en: Relic Vase
    fr: Vieux Vase
    it: Vasantico
    de: Alte Vase
    es: Ánfora
    ko: 고대의항아리
    zh_simp: 古代之壶
    zh_trad: 古代之壺
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　ツボ。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　ツボ。"
    en: "A fragile vase made by an ancient civilization about\n3,000 years ago."
    fr: Un vase d’une civilisation vieille de plus de 3 000 ans.
    it: "Vaso prodotto circa 3.000 anni fa da un’antica\nciviltà."
    de: "Eine Vase, angefertigt von einer gut 3 000 Jahre\nalten Kultur."
    es: Jarrón de más de 3000 años de antigüedad.
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 항아리."
    zh_simp: "约3000年前的\n文明制造的壶。"
    zh_trad: "距今約3000年前的\n文明裡製造的壺。"
repeat_ball:
  names:
    jp_kana: リピートボール
    jp_kanji: リピートボール
    en: Repeat Ball
    fr: Bis Ball
    it: Bis Ball
    de: Wiederball
    es: Acopio Ball
    ko: 리피드볼
    zh_simp: 重复球
    zh_trad: 重複球
  descriptions:
    jp_kana: "つかまえたことの　ある\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえたことの　ある\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that works\nespecially well on a Pokémon species that has been\ncaught before."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les espèces de Pokémon\ndéjà capturées."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sulle specie di Pokémon già catturate\nin precedenza."
    de: "Ein Ball, der sich besonders dann sehr gut eignet,\nwenn man ein Pokémon fangen will, dessen Art\nbereits gefangen wurde."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con las especies de Pokémon\nque ya has capturado."
    ko: "잡은 적이 있는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n以前曾捉到过的宝可梦。"
    zh_trad: "有點與眾不同的球。\n曾經捉到過的寶可夢\n會變得容易捉到。"
repel:
  names:
    jp_kana: むしよけスプレー
    jp_kanji: むしよけスプレー
    en: Repel
    fr: Repousse
    it: Repellente
    de: Schutz
    es: Repelente
    ko: 벌레회피스프레이
    zh_simp: 除虫喷雾
    zh_trad: 除蟲噴霧
  descriptions:
    jp_kana: "つかうと　やせいの　ポケモンが\nにげていく。　すこしの　あいだ\nポケモンと　であわなく　なる。"
    jp_kanji: "使うと　野生の　ポケモンが\n逃げていく。　少しの　あいだ\nポケモンと　出会わなく　なる。"
    en: "An item that drives away wild Pokémon so you won’t\nencounter them for a short time."
    fr: "Repousse les Pokémon sauvages pendant un court\nmoment."
    it: "Strumento che mette in fuga i Pokémon selvatici per\nun po’ di tempo, permettendo a chi lo usa di evitarli."
    de: "Hält für kurze Zeit wilde Pokémon vom Anwender\nfern und bewirkt so, dass du keinen mehr begegnest."
    es: "Evita encuentros con Pokémon salvajes durante un corto\nperíodo de tiempo."
    ko: "사용하면 야생 포켓몬이\n도망간다. 잠시 동안\n포켓몬을 만나지 않게 된다."
    zh_simp: "使用后，野生宝可梦就会逃走。\n接下来在较短的一段时间内，\n将不会再遇到宝可梦。"
    zh_trad: "使用後，野生寶可夢會跑掉，\n在接下來一小段時間內，\n變得完全不會出現。"
reply_mail:
  names:
    jp_kana: おかえしメール
    jp_kanji: おかえしメール
    en: Reply Mail
    fr: Lettre Réponse
    it: Mess. Risp.
    de: Rückbrief
    es: Carta Respuesta
    ko: 답장메일
    zh_simp: 回复邮件
    zh_trad: 回覆郵件
  descriptions:
    jp_kana: "もらった　メールへの　おかえしが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "もらった　メールへの　お返しが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy to respond\nto a letter you received. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour répondre à un autre\ncourrier. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere una risposta\na un messaggio.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man einen anderen Brief\nbeantworten kann. Gib es einem Pokémon zum\nTragen."
    es: "Carta para responder a un mensaje. Haz que la entregue\nun Pokémon."
    ko: "받은 메일에 대한 답장을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写回复邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫回覆郵件的信紙。\n需讓寶可夢攜帶使用。"
reset_urge:
  names:
    jp_kana: フラットコール
    jp_kanji: フラットコール
    en: Reset Urge
    fr: Réamorçage
    it: Ripristino
    de: Umkehrappell
    es: Quitaestado
    ko: 플랫콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nのうりょく　へんかが　もとにもどる。"
    jp_kanji: "使うと　味方の　ポケモンの\n能力変化が　元に　戻る。"
    en: "When used, it restores any stat changes of an\nally Pokémon."
    fr: "Permet d’annuler les variations de stats d’un Pokémon\nde l’équipe."
    it: "Usandolo, tutte le modifiche alle statistiche di un\nPokémon della squadra saranno annullate."
    de: "Hebt bei Gebrauch Statusveränderungen deines\nMitstreiters auf."
    es: "Cuando se usa, se anulan los cambios en las\ncaracterísticas de un Pokémon de tu equipo."
    ko: "사용하면 같은 편 포켓몬의\n능력 변화가 원래대로 되돌아간다."
    zh_simp: "使用后，我方宝可梦的\n能力变化将消失。"
    zh_trad: "使用後，我方寶可夢的\n能力變化將復原。"
resist_feather:
  names:
    jp_kana: ていこうのハネ
    jp_kanji: ていこうのハネ
    en: Resist Wing
    fr: Aile Armure
    it: Piumtutela
    de: Abwehrfeder
    es: Pluma Aguante
    ko: 저항력날개
    zh_simp: 抵抗之羽
    zh_trad: 抵抗之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　防御の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe base Defense stat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Défense de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Difesa."
    de: "Wendet man dieses Item auf ein Pokémon an,\nwird dessen Verteidigungs-Basiswert dauerhaft\nerhöht."
    es: "Pluma que aumenta un poco la Defensa de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 방어\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n防禦的基礎點數。"
reveal_glass:
  names:
    jp_kana: うつしかがみ
    jp_kanji: うつしかがみ
    en: Reveal Glass
    fr: Miroir Sacré
    it: Verispecchio
    de: Wahrspiegel
    es: Espejo Veraz
    ko: 비추는거울
    zh_simp: 现形镜
    zh_trad: 現形鏡
  descriptions:
    jp_kana: "しんじつを　うつしだすことで\nポケモンを　ほんらいの　すがたに\nかえてしまう　ふしぎな　かがみ。"
    jp_kanji: "真実を　映しだすことで\nポケモンを　本来の　姿に\n変えてしまう　不思議な　鏡。"
    en: "A looking glass that reveals the truth. It’s a\nmysterious glass that returns a Pokémon to its\noriginal shape."
    fr: "Un mystérieux miroir qui, en reflétant la vérité, permet\nde redonner à un Pokémon sa forme originelle."
    it: "Specchio misterioso che, riflettendo la verità, fa\nriacquistare ai Pokémon la loro forma originaria."
    de: "Ein mysteriöser Spiegel, der Pokémon in ihre\neigentliche Form verwandelt, indem er die Wahrheit\nwiderspiegelt."
    es: "Espejo misterioso que refleja la verdad y devuelve\nlos Pokémon a su forma original."
    ko: "진실을 비춰줌으로\n포켓몬을 본래의 모습으로\n바꿔버리는 이상한 거울."
    zh_simp: "能够通过照出真实，\n让宝可梦变回原来\n样子的神奇镜子。"
    zh_trad: "能藉由照出真實，\n讓寶可夢變回原來\n樣子的神奇鏡子。"
revival_herb:
  names:
    jp_kana: ふっかつそう
    jp_kanji: ふっかつそう
    en: Revival Herb
    fr: Herbe Rappel
    it: Vitalerba
    de: Vitalkraut
    es: Hierba Revivir
    ko: 부활초
    zh_simp: 复活草
    zh_trad: 復活草
  descriptions:
    jp_kana: "とても　にがい　やくそう。\nひんしの　ポケモン　１ひきの\nＨＰを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　薬草。\nひんしの　ポケモン　１匹の\nＨＰを　すべて　回復する。"
    en: "A terribly bitter medicinal herb. It revives a fainted\nPokémon and fully restores its maximum HP."
    fr: "Une herbe médicinale très amère.\nRanime un Pokémon K.O. et restaure tous ses PV."
    it: "Erba medicinale amarissima.\nRianima un Pokémon esausto e gli restituisce\ntutti i PS."
    de: "Ein bitteres medizinisches Kraut, das\nkampfunfähige Pokémon belebt und die KP\nvollständig auffüllt."
    es: "Hierba muy amarga que reanima a un Pokémon\ndebilitado y restaura todos sus PS."
    ko: "매우 쓴 약초.\n기절한 포켓몬 1마리의\nHP를 모두 회복한다."
    zh_simp: "非常苦的药草。\n能让１只濒死的宝可梦\n回复所有HP。"
    zh_trad: "非常苦的藥草。\n能讓１隻瀕死的寶可夢\n回復所有HP。"
revive:
  names:
    jp_kana: げんきのかけら
    jp_kanji: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitalizzante
    de: Beleber
    es: Revivir
    ko: 기력의조각
    zh_simp: 活力碎片
    zh_trad: 活力碎片
  descriptions:
    jp_kana: "ひんしに　なった　ポケモン\n１ひきを　げんきに　したうえで\nＨＰを　はんぶんまで　かいふくする。"
    jp_kanji: "ひんしに　なった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　半分まで　回復する。"
    en: "A medicine that can be used to revive a single\nPokémon that has fainted. It also restores half of\nthe Pokémon’s max HP."
    fr: "Un médicament qui ranime un Pokémon K.O. et restaure\nla moitié de ses PV max."
    it: "Rimedio che rianima un Pokémon esausto\ne gli restituisce metà dei suoi PS massimi."
    de: "Eine Medizin, die ein kampfunfähiges Pokémon\nwiederbelebt. Die Hälfte der maximalen KP wird\nwiederhergestellt."
    es: "Medicina que revive a un Pokémon debilitado y le\ndevuelve la mitad de sus PS."
    ko: "기절해 버린 포켓몬\n1마리를 건강하게 하고\nHP를 절반까지 회복한다."
    zh_simp: "能让１只陷入濒死的\n宝可梦重获生机，\n并回复一半HP。"
    zh_trad: "能讓１隻陷入瀕死的\n寶可夢重獲生機，\n並回復一半HP。"
rhyhorn_candy:
  names:
    jp_kana: サイホーンのアメ
    jp_kanji: サイホーンのアメ
    en: Rhyhorn Candy
    fr: Bonbon Rhinocorne
    it: Caramella Rhyhorn
    de: Rihorn-Bonbon
    es: Caramelo Rhyhorn
    ko: 뿔카노의사탕
    zh_simp: 独角犀牛的糖果
    zh_trad: 獨角犀牛的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
rich_mulch:
  names:
    jp_kana: たわわこやし
    jp_kanji: たわわこやし
    en: Rich Mulch
    fr: Fertibondance
    it: Fertilflorido
    de: Sprießmulch
    es: Abono Fértil
    ko: 주렁주렁비료
    zh_simp: 硕果肥
    zh_trad: 碩果肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
ride_pager:
  names:
    jp_kana: ライドギア
    jp_kanji: ライドギア
    en: Ride Pager
    fr: Appel-Monture
    it: Chiamapassaggio
    de: PokéMobil-Funk
    es: Buscamontura
    ko: 라이드기어
    zh_simp: 骑行装置
    zh_trad: 騎行裝置
  descriptions:
    jp_kana: "ナンバーを　うちこむことで\nたいおうした　ライドポケモンを\nしゅんじに　よびだす　どうぐ。"
    jp_kanji: "ナンバーを　うちこむことで\n対応した　ライドポケモンを\n瞬時に　呼びだす　道具。"
    en: "By entering certain numbers on this pager,\nyou can summon Ride Pokémon in an instant."
    fr: "Un appareil permettant d’appeler une Poké Monture\ninstantanément en tapant le bon numéro."
    it: "Dispositivo che permette di chiamare i Pokémon\ndel Poképassaggio digitando il numero\ncorrispondente."
    de: "Ein Gerät, mit dem durch die Eingabe einer Nummer\ndas entsprechende Pokémon für PokéMobil gerufen\nwird."
    es: "Dispositivo dotado de un teclado numérico con\nel que llamar a diversas Pokémonturas."
    ko: "넘버를 입력하는 것으로\n대응하는 라이드포켓몬을\n순식간에 불러내는 도구."
    zh_simp: "通过输入编号，瞬间召唤\n与编号对应的坐骑宝可梦的道具。"
    zh_trad: "透過輸入編號，瞬間叫出\n與編號對應的坐騎寶可夢的道具。"
rindo_berry:
  names:
    jp_kana: リンドのみ
    jp_kanji: リンドのみ
    en: Rindo Berry
    fr: Baie Ratam
    it: Baccarindo
    de: Grindobeere
    es: Baya Tamar
    ko: 린드열매
    zh_simp: 罗子果
    zh_trad: 羅子果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　くさ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　くさ技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nGrass-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Plante."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Erba del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Pflanze."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Planta de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 풀 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的草属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的草屬性招式\n攻擊時，能使其威力減弱。"
ring_target:
  names:
    jp_kana: ねらいのまと
    jp_kanji: ねらいのまと
    en: Ring Target
    fr: Point de Mire
    it: Facilsaglio
    de: Zielscheibe
    es: Blanco
    ko: 겨냥표적
    zh_simp: 标靶
    zh_trad: 標靶
  descriptions:
    jp_kana: "ポケモンの　タイプの　あいしょうで\nむこう　だった　わざが\nあたるように　なってしまう。"
    jp_kanji: "ポケモンの　タイプの　相性で\n無効だった　技が\n当たるように　なってしまう。"
    en: "An item to be held by a Pokémon. Moves that\nnormally have no effect will land on a Pokémon\nholding it."
    fr: "Un Pokémon tenant cet objet devient sensible aux\ncapacités autrement inefficaces en raison de son type."
    it: "Se un Pokémon ha questo strumento, le mosse\nche di norma non hanno effetto contro il suo tipo\nvanno a segno."
    de: "Attacken, die aufgrund der Wechselwirkungen\nzwischen den Typen keine Wirkung haben, treffen\nden Träger."
    es: "El Pokémon que lo lleva es vulnerable frente a\nmovimientos que normalmente no afectan a su\ntipo."
    ko: "포켓몬 타입의 상성 때문에\n무효였던 기술이\n맞게 되어 버린다."
    zh_simp: "原本因宝可梦的属性相克关系\n而无效的招式现在会变得\n能够击中自己。"
    zh_trad: "原本因寶可夢的屬性相剋關係\n而無效的招式現在會變得\n能夠擊中自己。"
rock_gem:
  names:
    jp_kana: いわのジュエル
    jp_kanji: いわのジュエル
    en: Rock Gem
    fr: Joyau Roche
    it: Bijouroccia
    de: Gesteinsjuwel
    es: Gema Roca
    ko: 바위주얼
    zh_simp: 岩石宝石
    zh_trad: 岩石寶石
  descriptions:
    jp_kana: "いわの　タイプの　ジュエル。\nもたせると　いちどだけ　いわの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　ジュエル。\n持たせると　１度だけ　いわの\n技の　威力が　強まる。"
    en: "A gem with an essence of rock. When held, it\nstrengthens the power of a Rock-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Roccia."
    de: "Ein Juwel vom Typ Gestein. Es erhöht einmalig die\nStärke einer Attacke vom Typ Gestein."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Roca. Debe llevarla un Pokémon."
    ko: "바위타입의 주얼.\n지니게 하면 한 번만 바위\n기술의 위력이 강해진다."
    zh_simp: "岩石属性的宝石。\n携带后，岩石属性的\n招式威力仅会增强１次。"
    zh_trad: "岩石屬性的寶石。\n攜帶後，岩石屬性招式的\n威力會僅增強１次。"
rock_incense:
  names:
    jp_kana: がんせきおこう
    jp_kanji: がんせきおこう
    en: Rock Incense
    fr: Encens Roc
    it: Roccioaroma
    de: Steinrauch
    es: Incienso Roca
    ko: 암석향로
    zh_simp: 岩石薰香
    zh_trad: 岩石薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This\nexotic-smelling incense boosts the power of\nRock-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Gestein."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Roca. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，岩石属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，岩石屬性的\n招式威力就會提高。"
rock_memory:
  names:
    jp_kana: ロックメモリ
    jp_kanji: ロックメモリ
    en: Rock Memory
    fr: ROM Roche
    it: ROM Roccia
    de: Gesteins-Disc
    es: Disco Roca
    ko: 락메모리
    zh_simp: 岩石存储碟
    zh_trad: 岩石記憶碟
  descriptions:
    jp_kana: "いわタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "いわタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Rock-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Roche. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Roccia in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Gestein.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nRoca. Permite cambiar de tipo a cierto Pokémon."
    ko: "바위타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有岩石属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有岩石屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
rockium_z:bag:
  names:
    jp_kana: イワＺ
    jp_kanji: イワＺ
    en: Rockium Z
    fr: Rocazélite
    it: Petrium Z
    de: Petrium Z
    es: Litostal Z
    ko: 바위Z
    zh_simp: 岩石Ｚ
    zh_trad: 岩石Ｚ
  descriptions:
    jp_kana: "いわタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "いわタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nRock-type moves to Rock-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Roche en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Roccia in mosse Z."
    de: "Kristallisierte Z-Kraft, die Gesteins-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nRoca en movimientos Z."
    ko: "바위타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将岩石属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把岩石屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
rockium_z:held:
  names:
    jp_kana: イワＺ
    jp_kanji: イワＺ
    en: Rockium Z
    fr: Rocazélite
    it: Petrium Z
    de: Petrium Z
    es: Litostal Z
    ko: 바위Z
    zh_simp: 岩石Ｚ
    zh_trad: 岩石Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nいわタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nいわタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Rock-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Roche en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Roccia\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Gesteins-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Roca."
    ko: "Z파워의 결정.\n바위타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将岩石属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把岩石屬性的招式\n升級為Ｚ招式。"
rocky_helmet:
  names:
    jp_kana: ゴツゴツメット
    jp_kanji: ゴツゴツメット
    en: Rocky Helmet
    fr: Casque Brut
    it: Bitorzolelmo
    de: Beulenhelm
    es: Casco Dentado
    ko: 울퉁불퉁멧
    zh_simp: 凸凸头盔
    zh_trad: 凸凸頭盔
  descriptions:
    jp_kana: "ポケモンに　もたせると\nだげきわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n打撃技を　受けたとき\n相手にも　ダメージを　与える。"
    en: "An item to be held by a Pokémon. If the holder is\nhit, the attacker will also be damaged upon contact."
    fr: "Tenu, cet objet inflige des dégâts à l’attaquant\nsi ce dernier utilise une capacité physique qui\natteint sa cible."
    it: "Se il Pokémon che ha questo strumento è colpito\nda un attacco diretto, anche il nemico subisce\ndei danni."
    de: "Wird der Träger von einer physischen Attacke\ngetroffen, erleidet der Angreifer ebenfalls Schaden."
    es: "Si el portador es alcanzado por un movimiento de\ncontacto, el agresor también recibe daño."
    ko: "포켓몬에게 지니게 하면\n타격 기술을 당했을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到打击招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到打擊招式攻擊時，\n也能給予對手傷害。"
roller_skates:
  names:
    jp_kana: ローラースケート
    jp_kanji: ローラースケート
    en: Roller Skates
    fr: Rollers
    it: Pattini
    de: Rollerskates
    es: Patines
    ko: 롤러스케이트
    zh_simp: 轮滑鞋
    zh_trad: 溜冰鞋
  descriptions:
    jp_kana: "クツぞこに　ローラーが　ついている。\nじめんを　かっそう　したり\nトリックプレイを　きめたりできる。"
    jp_kanji: "クツ底に　ローラーが　ついている。\n地面を　滑走　したり\nトリックプレイを　決めたりできる。"
    en: "Attaches roller skates to the bottom of your shoes,\nallowing you to glide quickly around and\nperform tricks."
    fr: "Aussi connus sous le nom de patins à roulettes,\nils permettent de se déplacer rapidement\net éventuellement de réaliser des figures."
    it: "Pattini applicati alla suola delle scarpe.\nPermettono di pattinare e di eseguire figure."
    de: "Schuhe mit Rädern an der Sohle. Mit ihnen kannst\ndu über den Boden rollen und Tricks ausführen."
    es: "Ruedas que se acoplan a la suela del calzado\ny te permiten ir más rápido y realizar piruetas\nespectaculares."
    ko: "신발 바닥에 롤러가 달려 있다.\n지면을 활주하거나\n트릭플레이를 할 수 있다."
    zh_simp: "鞋底下装着滑轮。\n能在地面上滑行，\n或漂亮地表演特技。"
    zh_trad: "鞋底裝著滑輪。\n能在地面上滑行，\n或漂亮地表演特技。"
root_fossil:
  names:
    jp_kana: ねっこのカセキ
    jp_kanji: ねっこのカセキ
    en: Root Fossil
    fr: Fossile Racine
    it: Radifossile
    de: Wurzelfossil
    es: Fósil Raíz
    ko: 뿌리화석
    zh_simp: 根状化石
    zh_trad: 根狀化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nねっこの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nねっこの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It looks as if it could be part of a\nplant’s root."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de racine."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una radice."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es sieht wie eine Pflanzenwurzel aus."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser parte de una raíz."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n뿌리의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是根的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是根的一部分。"
rose_incense:
  names:
    jp_kana: おはなのおこう
    jp_kanji: おはなのおこう
    en: Rose Incense
    fr: Encens Fleur
    it: Rosaroma
    de: Rosenrauch
    es: Incienso Floral
    ko: 꽃향로
    zh_simp: 花朵薰香
    zh_trad: 花朵薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This\nexotic-smelling incense boosts the power of\nGrass-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Pflanze."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Planta. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，草属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，草屬性的\n招式威力就會提高。"
roseli_berry:
  names:
    jp_kana: ロゼルのみ
    jp_kanji: ロゼルのみ
    en: Roseli Berry
    fr: Baie Selro
    it: Baccarcadè
    de: Hibisbeere
    es: Baya Hibis
    ko: 로셀열매
    zh_simp: 洛玫果
    zh_trad: 洛玫果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　フェアリー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　フェアリー技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nFairy-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Fée."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Folletto del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Fee."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Hada de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 페어리 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的妖精属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的妖精屬性招式\n攻擊時，能使其威力減弱。"
roto_bargain:
  names:
    jp_kana: やすうりポン
    jp_kanji: やすうりポン
    en: Roto Bargain
    fr: Moti-Promo
    it: Sconto’n’roll
    de: Schnäppchenbon
    es: Cupón Rebaja
    ko: 할인캡슐토이
    zh_simp: 优惠碰碰
    zh_trad: 優惠碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nつかうと　フレンドリィショップの\nしょうひんが　はんがくに　なる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n使うと　フレンドリィショップの\n商品が　半額に　なる。"
    en: "One of the Rotom Powers.\nIt reduces the prices of products at Poké Marts\nby half."
    fr: "Une des Motism’Auras. Elle permet de réduire de moitié\nle coût des objets vendus dans les Boutiques Pokémon."
    it: "Potere Rotom che consente di acquistare\ni prodotti del Pokémon-Market a metà prezzo."
    de: "Diese Rotom-Kraft bewirkt, dass die Preise im\nPokémon-Supermarkt halbiert werden."
    es: "Poder Rotom que reduce a la mitad el coste de los\nartículos en las Tiendas Pokémon."
    ko: "로토무파워 중 하나.\n사용하면 프렌들리숍의\n상품이 반값이 된다."
    zh_simp: "洛托姆之力的一种。\n使用后，友好商店的\n商品就会变成半价。"
    zh_trad: "洛托姆之力的一種。\n使用後，友好商店的\n商品就會變成半價。"
roto_boost:
  names:
    jp_kana: おうえんポン
    jp_kanji: おうえんポン
    en: Roto Boost
    fr: Moti-Soutien
    it: Stat’n’roll
    de: Statuswertebon
    es: Cupón Refuerzo
    ko: 응원캡슐토이
    zh_simp: 加油碰碰
    zh_trad: 加油碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nたたかっている　じぶんの　ポケモンの\nのうりょくが　すべて　あがる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\n能力が　すべて　あがる。"
    en: "One of the Rotom Powers.\nIt raises all stats of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\ntoutes les stats de vos Pokémon en combat."
    it: "Potere Rotom che fa aumentare tutte le statistiche\ndei propri Pokémon impegnati in una lotta."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die\nStatuswerte der eigenen Pokémon auf der\nMitstreiterseite erhöht werden."
    es: "Poder Rotom que hace aumentar las características de\nlos Pokémon de tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\n능력이 모두 올라간다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\n所有能力都会提高。"
    zh_trad: "洛托姆之力的一種。\n可以提升戰鬥中的\n我方寶可夢的所有能力。"
roto_catch:
  names:
    jp_kana: つかまえポン
    jp_kanji: つかまえポン
    en: Roto Catch
    fr: Moti-Capture
    it: Acchiappa’n’roll
    de: Fangbon
    es: Cupón Captura
    ko: 잡기캡슐토이
    zh_simp: 捕捉碰碰
    zh_trad: 捕捉碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。　つかうと\nめのまえにいる　やせいポケモンが\nとても　つかまえやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。　使うと\n目の前にいる　野生ポケモンが\nとても　捕まえやすくなる。"
    en: "One of the Rotom Powers.\nIt increases the chance to catch Pokémon\na lot."
    fr: "Une des Motism’Auras. Elle permet d’attraper\nbeaucoup plus facilement le Pokémon sauvage\nque vous affrontez."
    it: "Potere Rotom che rende considerevolmente\npiù facile catturare i Pokémon selvatici."
    de: "Diese Rotom-Kraft bewirkt, dass wilde Pokémon\nmit höherer Wahrscheinlichkeit gefangen werden."
    es: "Poder Rotom que aumenta mucho la probabilidad\nde capturar al Pokémon salvaje al que te estés\nenfrentando."
    ko: "로토무파워 중 하나. 사용하면\n눈앞에 있는 야생 포켓몬을\n매우 잡기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n使用后，眼前的野生宝可梦\n会变得非常容易捕捉。"
    zh_trad: "洛托姆之力的一種。\n使用後，可以讓眼前的\n寶可夢變得非常容易捕捉。"
roto_encounter:
  names:
    jp_kana: みっけポン
    jp_kanji: みっけポン
    en: Roto Encounter
    fr: Moti-Appât
    it: Incontra’n’roll
    de: Lockbon
    es: Cupón Reclamo
    ko: 발견캡슐토이
    zh_simp: 相遇碰碰
    zh_trad: 相遇碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nいっていじかん　レベルの　たかい\nやせいポケモンと　であいやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n一定時間　レベルの　高い\n野生ポケモンと　出会いやすくなる。"
    en: "One of the Rotom Powers.\nIt increases the chance of encountering high-level\nwild Pokémon a lot for a certain period of time."
    fr: "Une des Motism’Auras. Elle permet de rencontrer\nplus de Pokémon sauvages de haut niveau durant\nune période déterminée."
    it: "Potere Rotom che aumenta le probabilità\ndi incontrare Pokémon selvatici di livello alto\nper un certo lasso di tempo."
    de: "Diese Rotom-Kraft bewirkt, dass wilde Pokémon\nmit hohem Level für eine bestimmte Zeit viel\nhäufiger erscheinen."
    es: "Poder Rotom que aumenta la probabilidad de\nencontrar Pokémon salvajes de nivel alto durante\nun tiempo determinado."
    ko: "로토무파워 중 하나.\n일정 시간 레벨이 높은\n야생 포켓몬과 만나기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n一定时间内，会变得容易\n遇到高等级的野生宝可梦。"
    zh_trad: "洛托姆之力的一種。\n在一定時間內可以變得\n容易遇見等級高的野生寶可夢。"
roto_exp_points:
  names:
    jp_kana: けいけんポン
    jp_kanji: けいけんポン
    en: Roto Exp. Points
    fr: Moti-Exp
    it: Esp’n’roll
    de: EP-Bon
    es: Cupón Exp
    ko: 경험캡슐토이
    zh_simp: 经验碰碰
    zh_trad: 經驗碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nしょうぶの　あとに　もらえる\nけいけんちが　すこし　ふえる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\n経験値が　少し　増える。"
    en: "One of the Rotom Powers.\nIt increases the Exp. Points your Pokémon receive\nafter battle a little."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\nlégèrement l’expérience gagnée par vos Pokémon\nen combat."
    it: "Potere Rotom che fa aumentare un po’\ni Punti Esperienza ottenuti dopo ogni lotta."
    de: "Diese Rotom-Kraft bewirkt, dass Pokémon im\nKampf mehr Erfahrungspunkte erhalten."
    es: "Poder Rotom que incrementa ligeramente los Puntos\nde Experiencia obtenidos en combate."
    ko: "로토무파워 중 하나.\n승부 후에 얻는\n경험치가 조금 늘어난다."
    zh_simp: "洛托姆之力的一种。\n对战后能得到的\n经验值会稍微增加。"
    zh_trad: "洛托姆之力的一種。\n對戰後可獲得的\n經驗值將會稍微增加。"
roto_friendship:
  names:
    jp_kana: なつきポン
    jp_kanji: なつきポン
    en: Roto Friendship
    fr: Moti-Cœur
    it: Affetto’n’roll
    de: Freundschaftsbon
    es: Cupón Amistad
    ko: 친밀도캡슐토이
    zh_simp: 亲密碰碰
    zh_trad: 親密碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nつれている　ポケモンが\nかなり　なつきやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n連れている　ポケモンが\nかなり　なつきやすくなる。"
    en: "One of the Rotom Powers.\nIt helps Pokémon in your party grow\nfriendly faster."
    fr: "Une des Motism’Auras. Elle permet d’augmenter\nplus rapidement l’Amitié que vous portent les Pokémon\nde votre équipe."
    it: "Potere Rotom che fa sì che i Pokémon in squadra\nti si affezionino molto più facilmente."
    de: "Diese Rotom-Kraft bewirkt, dass sich die im Team\nmitgeführten Pokémon viel schneller mit dir\nanfreunden."
    es: "Poder Rotom que hace que el grado de amistad de\nlos Pokémon de tu equipo aumente más rápido."
    ko: "로토무파워 중 하나.\n데리고 있는 포켓몬과\n상당히 친밀해지기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n带在身边的宝可梦\n会变得非常容易亲近。"
    zh_trad: "洛托姆之力的一種。\n帶在身邊的寶可夢\n會變得非常容易親近。"
roto_hatch:
  names:
    jp_kana: タマゴふかポン
    jp_kanji: タマゴふかポン
    en: Roto Hatch
    fr: Moti-Couveuse
    it: Cova’n’roll
    de: Brutbon
    es: Cupón Eclosión
    ko: 알부화캡슐토이
    zh_simp: 孵蛋碰碰
    zh_trad: 孵蛋碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nつかうと　タマゴが\nとても　かえりやすくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n使うと　タマゴが\nとても　かえりやすくなる。"
    en: "One of the Rotom Powers.\nIt helps Eggs hatch faster."
    fr: "Une des Motism’Auras. Elle permet de faire éclore\nles Œufs beaucoup plus rapidement."
    it: "Potere Rotom che aumenta considerevolmente\nla rapidità con cui si schiudono le Uova."
    de: "Diese Rotom-Kraft bewirkt, dass Pokémon\nschneller aus Eiern schlüpfen."
    es: "Poder Rotom que hace que los Huevos eclosionen\nmucho antes."
    ko: "로토무파워 중 하나.\n사용하면 알이\n매우 부화하기 쉬워진다."
    zh_simp: "洛托姆之力的一种。\n使用后，蛋就会变得\n非常容易孵化。"
    zh_trad: "洛托姆之力的一種。\n使用後，蛋就會變得\n非常容易孵化。"
roto_hp_restore:
  names:
    jp_kana: ＨＰかいふくポン
    jp_kanji: ＨＰかいふくポン
    en: Roto HP Restore
    fr: Moti-Récup’ PV
    it: PS’n’roll
    de: KP-Bon
    es: Cupón PS
    ko: HP회복캡슐토이
    zh_simp: HP回复碰碰
    zh_trad: HP回復碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nたたかっている　じぶんの　ポケモンの\nＨＰが　すべて　かいふくする。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＨＰが　すべて　回復する。"
    en: "One of the Rotom Powers.\nIt fully restores the HP of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet à vos Pokémon\nen combat de récupérer la totalité de leurs PV."
    it: "Potere Rotom che permette ai propri Pokémon\nimpegnati in una lotta di recuperare tutti i PS."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die KP\nder eigenen Pokémon auf der Mitstreiterseite\nvollständig wiederaufgefüllt werden."
    es: "Poder Rotom que restaura todos los PS de los\nPokémon de tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\nHP가 모두 회복한다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\nHP会全部回复。"
    zh_trad: "洛托姆之力的一種。\n可以回復戰鬥中的\n我方寶可夢所有的HP。"
roto_pp_restore:
  names:
    jp_kana: ＰＰかいふくポン
    jp_kanji: ＰＰかいふくポン
    en: Roto PP Restore
    fr: Moti-Récup’ PP
    it: PP’n’roll
    de: AP-Bon
    es: Cupón PP
    ko: PP회복캡슐토이
    zh_simp: PP回复碰碰
    zh_trad: PP回復碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nたたかっている　じぶんの　ポケモンの\nＰＰが　すべて　かいふくする。"
    jp_kanji: "ロトムパワーの　ひとつ。\n戦っている　自分の　ポケモンの\nＰＰが　すべて　回復する。"
    en: "One of the Rotom Powers.\nIt fully restores the PP of your battling Pokémon."
    fr: "Une des Motism’Auras. Elle permet à vos Pokémon\nen combat de récupérer la totalité de leurs PP."
    it: "Potere Rotom che permette ai propri Pokémon\nimpegnati in una lotta di recuperare tutti i PP."
    de: "Diese Rotom-Kraft bewirkt, dass im Kampf die AP\nder eigenen Pokémon auf der Mitstreiterseite\nvollständig wiederaufgefüllt werden."
    es: "Poder Rotom que restaura todos los PP de los\nPokémon de tu equipo que estén combatiendo."
    ko: "로토무파워 중 하나.\n싸우고 있는 자신의 포켓몬의\nPP가 모두 회복한다."
    zh_simp: "洛托姆之力的一种。\n正在战斗的我方宝可梦的\nPP会全部回复。"
    zh_trad: "洛托姆之力的一種。\n可以回復戰鬥中的\n我方寶可夢所有的PP。"
roto_prize_money:
  names:
    jp_kana: おこづかいポン
    jp_kanji: おこづかいポン
    en: Roto Prize Money
    fr: Moti-Magot
    it: Soldi’n’roll
    de: Preisgeldbon
    es: Cupón Botín
    ko: 용돈캡슐토이
    zh_simp: 零花钱碰碰
    zh_trad: 零用錢碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nしょうぶの　あとに　もらえる\nおこづかいが　３ばいに　なる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n勝負の　あとに　もらえる\nおこづかいが　３倍に　なる。"
    en: "One of the Rotom Powers.\nIt triples the prize money you receive after battle."
    fr: "Une des Motism’Auras. Elle permet de tripler les gains\nd’argent à la fin d’un combat."
    it: "Potere Rotom che triplica la quantità\ndi soldi ottenuti dopo ogni lotta."
    de: "Diese Rotom-Kraft bewirkt, dass sich das nach\neinem gewonnenen Kampf erhaltene Preisgeld\nverdreifacht."
    es: "Poder Rotom que triplica las ganancias obtenidas\nen combate."
    ko: "로토무파워 중 하나.\n승부 후에 받는\n용돈이 3배가 된다."
    zh_simp: "洛托姆之力的一种。\n对战后能得到的\n零花钱会变成３倍。"
    zh_trad: "洛托姆之力的一種。\n對戰後可獲得的\n零用錢將會變成３倍。"
roto_stealth:
  names:
    jp_kana: かくれポン
    jp_kanji: かくれポン
    en: Roto Stealth
    fr: Moti-Camouflage
    it: Repelle’n’roll
    de: Schutzbon
    es: Cupón Sigilo
    ko: 숨기캡슐토이
    zh_simp: 隐身碰碰
    zh_trad: 隱身碰碰
  descriptions:
    jp_kana: "ロトムパワーの　ひとつ。\nいっていじかん　やせいポケモンと\nぜんぜん　であわなくなる。"
    jp_kanji: "ロトムパワーの　ひとつ。\n一定時間　野生ポケモンと\nぜんぜん　出会わなくなる。"
    en: "One of the Rotom Powers.\nIt prevents you from encountering wild Pokémon for\na certain period of time."
    fr: "Une des Motism’Auras. Elle permet de ne plus\nrencontrer de Pokémon sauvages durant une\npériode déterminée."
    it: "Potere Rotom che permette di evitare\nl’incontro con i Pokémon selvatici\nper un certo lasso di tempo."
    de: "Diese Rotom-Kraft bewirkt, dass für eine\nbestimmte Zeit keine wilden Pokémon erscheinen."
    es: "Poder Rotom que permite evitar por completo los\nencuentros con Pokémon salvajes durante un\ntiempo determinado."
    ko: "로토무파워 중 하나.\n일정 시간 야생 포켓몬과\n전혀 만나지 않게 된다."
    zh_simp: "洛托姆之力的一种。\n一定时间内，会变得完全\n不会遇到野生宝可梦。"
    zh_trad: "洛托姆之力的一種。\n在一定時間內會變得\n完全無法遇見寶可夢。"
rowap_berry:
  names:
    jp_kana: レンブのみ
    jp_kanji: レンブのみ
    en: Rowap Berry
    fr: Baie Pommo
    it: Baccaroam
    de: Roselbeere
    es: Baya Magua
    ko: 애터열매
    zh_simp: 雾莲果
    zh_trad: 霧蓮果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nとくしゅわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "A Berry to be consumed by Pokémon. If a special\nattack hits the Pokémon holding it, the attacker will\nalso be hurt."
    fr: "Tenue, cette Baie inflige des dégâts à l’attaquant\ns’il utilise une capacité spéciale qui atteint sa cible."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa speciale va a segno."
    de: "Als getragenes Item bewirkt diese Beere Schaden\nbei jenen, die den Träger mit einer Spezial-Attacke\ntreffen."
    es: "Si la lleva un Pokémon cuando otro lanza un ataque\nespecial, este último también recibe daño."
    ko: "포켓몬에게 지니게 하면\n특수 기술을 당했을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到特殊招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到特殊招式攻擊時，\n也能給予對手傷害。"
rsvp_mail:
  names:
    jp_kana: おさそいメール
    jp_kanji: おさそいメール
    en: RSVP Mail
    fr: Lettre Invit
    it: Messaggio Invito
    de: Einladebrief
    es: Carta Invitar
    ko: 권유메일
    zh_simp: 邀请邮件
    zh_trad: 邀請郵件
  descriptions:
    jp_kana: "あいてを　おさそいする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手を　お誘いする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to extend an\ninvitation to the recipient. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour les invitations.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un invito.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man eine andere Person zu\netwas einladen kann. Gib es einem Pokémon zum\nTragen."
    es: "Carta para invitar a un compañero. Haz que la entregue\nun Pokémon."
    ko: "상대를 초대하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写邀请对方这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫邀請對方這類郵件的信紙。\n需讓寶可夢攜帶使用。"
rule_book:
  names:
    jp_kana: ルールブック
    jp_kanji: ルールブック
    en: Rule Book
    fr: Livre Règles
    it: Libro Regole
    de: Regelbuch
    es: Reglamento
    ko: 룰북
    zh_simp: 规则书
    zh_trad: 規則書
  descriptions:
    jp_kana: "たいせんの　ルールが　かかれている。\nつうしんたいせん　するとき\nルールを　えらぶことが　できる。"
    jp_kanji: "対戦の　ルールが　かかれている。\n通信対戦するとき\nルールを　選ぶことが　できる。"
    en: "It lists the rules for holding battles.\nFor Link Battles, you may choose which set of rules\nyou wish to use."
    fr: "La liste des règles de combat.\nVous pouvez choisir les règles des combats en Link."
    it: "Elenca le regole per le lotte. Nelle lotte in link\npuoi scegliere diversi set di regole da utilizzare."
    de: "Enthält die Kampfregeln. Bei Link-Kämpfen kannst\ndu daraus die gewünschten Regeln wählen."
    es: "Recoge las normas de los combates. En los combates\nen conexión puedes elegir el conjunto de reglas que\nquieres usar."
    ko: "대전에 대한 룰이 적혀 있다.\n통신대전을 할 때\n룰을 선택할 수 있다."
    zh_simp: "写着对战规则。\n在进行连接对战时，\n可以选择规则。"
    zh_trad: "寫著對戰規則。\n在進行連線對戰時，\n可以選擇規則。"
sablenite:
  names:
    jp_kana: ヤミラミナイト
    jp_kanji: ヤミラミナイト
    en: Sablenite
    fr: Ténéfixite
    it: Sableyite
    de: Zobirisnit
    es: Sableynita
    ko: 깜까미나이트
    zh_simp: 勾魂眼进化石
    zh_trad: 勾魂眼進化石
  descriptions:
    jp_kana: "ヤミラミに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヤミラミに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sableye hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ténéfix, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sableye, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Zobiris getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sableye en combate."
    ko: "깜까미에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让勾魂眼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓勾魂眼攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sachet:
  names:
    jp_kana: においぶくろ
    jp_kanji: においぶくろ
    en: Sachet
    fr: Sachet Senteur
    it: Bustina aromi
    de: Duftbeutel
    es: Saquito Fragante
    ko: 향기주머니
    zh_simp: 香袋
    zh_trad: 香袋
  descriptions:
    jp_kana: "ちょっと　きつめの　かおりをだす\nこうりょうを　つめた　ふくろ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "ちょっと　きつめの　香りをだす\n香料を　詰めた　袋。\nある　ポケモンが　好んでいる。"
    en: "A sachet filled with fragrant perfumes that are just\nslightly too overwhelming. Yet it’s loved by a\ncertain Pokémon."
    fr: "Un sachet d’herbes et d’épices, au parfum trop marqué\npour beaucoup, mais néanmoins apprécié d’un certain\nPokémon."
    it: "Una bustina che contiene aromi dal profumo\npiuttosto intenso.\nPiace a un Pokémon in particolare."
    de: "Ein mit Parfüm gefüllter Beutel, der einen\npenetranten Duft verströmt und bei einer\nbestimmten Pokémon-Art sehr beliebt ist."
    es: "Un saquito lleno de sustancias aromáticas cuyo\nperfume resulta abrumador, pero que a cierto\nPokémon le encanta."
    ko: "살짝 강렬한 향기가 나는\n향료를 채운 주머니.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "装着散发微浓香气的\n香料的袋子。\n某种宝可梦很喜欢它。"
    zh_trad: "裝著散發有點濃的香氣的\n香料的袋子。\n某種寶可夢很喜歡它。"
sacred_ash:
  names:
    jp_kana: せいなるはい
    jp_kanji: せいなるはい
    en: Sacred Ash
    fr: Cendre Sacrée
    it: Ceneremagica
    de: Zauberasche
    es: Ceniza Sagrada
    ko: 성스러운분말
    zh_simp: 圣灰
    zh_trad: 聖灰
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　ぜんいんの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　全員の　ＨＰを\nすべて　回復する。"
    en: "This rare ash can revive all fainted Pokémon in a\nparty. In doing so, it also fully restores their\nmaximum HP."
    fr: Ranime tous les Pokémon K.O. et restaure tous leurs PV.
    it: "Rimedio che rianima tutti i Pokémon esausti,\nrestituendo loro anche tutti i PS."
    de: "Belebt und erfrischt alle besiegten Pokémon und\nfüllt deren KP wieder vollständig auf."
    es: "Reanima completamente a todos los Pokémon\ndebilitados y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 전원의 HP를\n모두 회복한다."
    zh_simp: "能让陷入濒死的\n全部宝可梦\n回复所有HP。"
    zh_trad: "能讓所有\n陷入瀕死的寶可夢\n回復所有HP。"
safari_ball:
  names:
    jp_kana: サファリボール
    jp_kanji: サファリボール
    en: Safari Ball
    fr: Safari Ball
    it: Safari Ball
    de: Safariball
    es: Safari Ball
    ko: 사파리볼
    zh_simp: 狩猎球
    zh_trad: 狩獵球
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
safety_goggles:
  names:
    jp_kana: ぼうじんゴーグル
    jp_kanji: ぼうじんゴーグル
    en: Safety Goggles
    fr: Lunettes Filtre
    it: Visierantisabbia
    de: Schutzbrille
    es: Gafa Protectora
    ko: 방진고글
    zh_simp: 防尘护目镜
    zh_trad: 防塵護目鏡
  descriptions:
    jp_kana: "てんこうの　ダメージだけでなく\nこなを　だす　わざの\nこうかも　ふせげる　ゴーグル。"
    jp_kanji: "天候の　ダメージだけでなく\n粉を　だす　技の\n効果も　防げる　ゴーグル。"
    en: "An item to be held by a Pokémon. These goggles\nprotect the holder from both weather-related\ndamage and powder."
    fr: "Objet à tenir. Protège le Pokémon contre les dégâts\ndus à la météo et la plupart des capacités utilisant\nde la poudre."
    it: "Visiera che protegge dai danni legati alle condizioni\natmosferiche e dalla maggior parte delle mosse\nche rilasciano polvere."
    de: "Diese Brille schützt ihren Träger nicht nur vor\nwetterbedingtem Schaden, sondern auch vor vielen\nAttacken, bei denen Puder eingesetzt wird."
    es: "Gafa que protege de los efectos adversos del clima\ny del polvo lanzado por los rivales."
    ko: "날씨로 인한 데미지뿐만 아니라\n가루를 내보내는 기술의\n효과도 막을 수 있는 고글."
    zh_simp: "不单是天气造成的伤害，\n就连粉末类招式的效果\n也能防御的护目镜。"
    zh_trad: "不單是天氣造成的傷害，\n連放出粉末的招式效果\n也能防止的護目鏡。"
sail_fossil:
  names:
    jp_kana: ヒレのカセキ
    jp_kanji: ヒレのカセキ
    en: Sail Fossil
    fr: Fossile Nageoire
    it: Fossilpinna
    de: Flossenfossil
    es: Fósil Aleta
    ko: 지느러미화석
    zh_simp: 鳍之化石
    zh_trad: 鰭之化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nくびの　ヒレの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n首の　ヒレの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks like the impression from a\nskin sail."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de nageoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una pinna."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie eine Flosse aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece la impresión de una aleta."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n목지느러미의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是头鳍的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是頭鰭的一部分。"
salac_berry:
  names:
    jp_kana: カムラのみ
    jp_kanji: カムラのみ
    en: Salac Berry
    fr: Baie Sailak
    it: Baccasalak
    de: Salkabeere
    es: Baya Aslac
    ko: 캄라열매
    zh_simp: 沙鳞果
    zh_trad: 沙鱗果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nすばやさが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n素早さが　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Speed stat will increase when it’s in\na pinch."
    fr: Tenue, cette Baie augmente la Vitesse en cas de besoin.
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Velocità aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nInitiative-Wert eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, le sube la Velocidad en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n스피드가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的速度就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n速度就會提高。"
salamencite:
  names:
    jp_kana: ボーマンダナイト
    jp_kanji: ボーマンダナイト
    en: Salamencite
    fr: Drattakite
    it: Salamencite
    de: Brutalandanit
    es: Salamencita
    ko: 보만다나이트
    zh_simp: 暴飞龙进化石
    zh_trad: 暴飛龍進化石
  descriptions:
    jp_kana: "ボーマンダに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ボーマンダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Salamence hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Drattak, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Salamence, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Brutalanda getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Salamence en combate."
    ko: "보만다에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "暴飞龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "暴飛龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sandshrew_candy:
  names:
    jp_kana: サンドのアメ
    jp_kanji: サンドのアメ
    en: Sandshrew Candy
    fr: Bonbon Sabelette
    it: Caramella Sandshrew
    de: Sandan-Bonbon
    es: Caramelo Sandshrew
    ko: 모래두지의사탕
    zh_simp: 穿山鼠的糖果
    zh_trad: 穿山鼠的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
scanner:
  names:
    jp_kana: たんちき
    jp_kanji: たんちき
    en: Scanner
    fr: Scanner
    it: Scanner
    de: Scanner
    es: Escáner
    ko: 탐지기
    zh_simp: 探测器
    zh_trad: 探測器
  descriptions:
    jp_kana: "シーキンセツの　なかで\nみつけた　どうぐ。"
    jp_kanji: "シーキンセツの　中で\nみつけた　道具。"
    en: A device found inside Sea Mauville.
    fr: Un objet trouvé à Lavandia Sea.
    it: "Dispositivo trovato nella scogliera artificiale\nCiclamare."
    de: "Ein Gerät, das du in Seewoge Malvenfroh gefunden\nhast."
    es: Objeto hallado en el interior de Malvamar.
    ko: "씨보라 안에서\n발견한 도구."
    zh_simp: "在海紫堇中\n找到的道具。"
    zh_trad: "在海紫菫中\n找到的道具。"
sceptilite:
  names:
    jp_kana: ジュカインナイト
    jp_kanji: ジュカインナイト
    en: Sceptilite
    fr: Jungkite
    it: Sceptilite
    de: Gewaldronit
    es: Sceptilita
    ko: 나무킹나이트
