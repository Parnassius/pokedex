dubious_disc:
  names:
    jp_kana: あやしいパッチ
    jp_kanji: あやしいパッチ
    en: Dubious Disc
    fr: CD Douteux
    it: Dubbiodisco
    de: Dubiosdisc
    es: Disco Extraño
    ko: 괴상한패치
    zh_simp: 可疑补丁
    zh_trad: 可疑修正檔
  descriptions:
    jp_kana: "なかに　あやしい　じょうほうが\nつまった　とうめいな　きかい。\nせいさくしゃは　ふめい。"
    jp_kanji: "なかに　怪しい　情報が\nつまった　透明な　機械。\n製作者は　不明。"
    en: "A transparent device overflowing with dubious\ndata. Its producer is unknown."
    fr: "Un appareil transparent rempli de données douteuses.\nSon fabricant n’est pas connu."
    it: "Dispositivo trasparente strapieno di dati di dubbia\norigine. Non se ne conosce il produttore."
    de: "Eine Scheibe mit seltsamen Daten. Ihr Ursprung ist\nunbekannt."
    es: "Dispositivo transparente que contiene datos misteriosos.\nEs de fabricante desconocido."
    ko: "안에 괴상한 정보가\n가득한 투명한 기계다.\n제작자 불명."
    zh_simp: "内部储存了奇怪信息的透明机器。\n制造者不明。"
    zh_trad: "內部儲存了可疑\n資訊的透明機器。\n製造者不明。"
durin_berry:
  names:
    jp_kana: ドリのみ
    jp_kanji: ドリのみ
    en: Durin Berry
    fr: Baie Durin
    it: Baccadurian
    de: Durinbeere
    es: Baya Rudion
    ko: 두리열매
    zh_simp: 金枕果
    zh_trad: 金枕果
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nl’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es una baya muy rara en otras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
dusk_ball:
  names:
    jp_kana: ダークボール
    jp_kanji: ダークボール
    en: Dusk Ball
    fr: Sombre Ball
    it: Scuro Ball
    de: Finsterball
    es: Ocaso Ball
    ko: 다크볼
    zh_simp: 黑暗球
    zh_trad: 黑暗球
  descriptions:
    jp_kana: "よるや　どうくつなど　くらいところで\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "夜や　どうくつなど　暗いところで\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that makes it\neasier to catch wild Pokémon at night or in dark\nplaces such as caves."
    fr: "Une Poké Ball efficace de nuit ou dans les endroits\nsombres, tels que les grottes."
    it: "Poké Ball un po’ diversa che rende più facile\ncatturare Pokémon selvatici di notte o in luoghi\nbui come le grotte."
    de: "Ein mysteriöser Ball, geeignet für Einsätze in der\nNacht oder an dunklen Orten."
    es: "Es algo particular. Hace que sea más fácil capturar\na los Pokémon salvajes por la noche o en lugares\noscuros."
    ko: "밤이나 동굴 등 어두운 곳에서\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地在夜晚或洞窟等\n阴暗的地方捕捉宝可梦。"
    zh_trad: "有點與眾不同的球。\n容易在夜晚或洞窟等陰暗的地方\n捉到寶可夢。"
dusk_stone:
  names:
    jp_kana: やみのいし
    jp_kanji: やみのいし
    en: Dusk Stone
    fr: Pierre Nuit
    it: Neropietra
    de: Finsterstein
    es: Piedra Noche
    ko: 어둠의돌
    zh_simp: 暗之石
    zh_trad: 暗之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nやみのように　くらい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nやみのように　暗い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It holds shadows as dark as\ncan be."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est sombre comme une nuit sans lune."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È scura come le tenebre."
    de: "Dieser besondere, düstere Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Es oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n칠흑처럼 어둡다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像黑夜一般漆黑。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像黑暗一般漆黑。"
earth_plate:
  names:
