    ko: 배달물3
    zh_simp: 配送物品３
    zh_trad: 配送物品３
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: An important letter that Wingull delivers.
    fr: Un courrier important transporté par un Goélise.
    it: Un’importante lettera che Wingull deve consegnare.
    de: Eine wichtige Briefpost, überbracht von Wingull.
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
    zh_simp: "长翅鸥投递的\n重要信件。"
    zh_trad: "長翅鷗投遞的\n重要信件。"
grass_gem:
  names:
    jp_kana: くさのジュエル
    jp_kanji: くさのジュエル
    en: Grass Gem
    fr: Joyau Plante
    it: Bijouerba
    de: Pflanzenjuwel
    es: Gema Planta
    ko: 풀주얼
    zh_simp: 草之宝石
    zh_trad: 草之寶石
  descriptions:
    jp_kana: "くさの　タイプの　ジュエル。\nもたせると　いちどだけ　くさの\nわざの　いりょくが　つよまる。"
    jp_kanji: "くさの　タイプの　ジュエル。\n持たせると　１度だけ　くさの\n技の　威力が　強まる。"
    en: "A gem with an essence of nature. When held, it\nstrengthens the power of a Grass-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Erba."
    de: "Ein Juwel vom Typ Pflanze. Es erhöht einmalig die\nStärke einer Attacke vom Typ Pflanze."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Planta. Debe llevarla un Pokémon."
    ko: "풀타입의 주얼.\n지니게 하면 한 번만 풀\n기술의 위력이 강해진다."
    zh_simp: "草属性的宝石。\n携带后，草属性的\n招式威力仅会增强１次。"
    zh_trad: "草屬性的寶石。\n攜帶後，草屬性招式的\n威力會僅增強１次。"
grass_memory:
  names:
    jp_kana: グラスメモリ
    jp_kanji: グラスメモリ
    en: Grass Memory
    fr: ROM Plante
    it: ROM Erba
    de: Pflanzen-Disc
    es: Disco Planta
    ko: 그래스메모리
    zh_simp: 青草存储碟
    zh_trad: 青草記憶碟
  descriptions:
    jp_kana: "くさタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "くさタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Grass-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Plante. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Erba in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Pflanze.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nPlanta. Permite cambiar de tipo a cierto Pokémon."
    ko: "풀타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有草属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有草屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
grassium_z:bag:
  names:
    jp_kana: クサＺ
    jp_kanji: クサＺ
    en: Grassium Z
    fr: Florazélite
    it: Herbium Z
    de: Botanium Z
    es: Fitostal Z
    ko: 풀Z
    zh_simp: 草Ｚ
    zh_trad: 草Ｚ
  descriptions:
    jp_kana: "くさタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "くさタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nGrass-type moves to Grass-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Plante en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Erba in mosse Z."
    de: "Kristallisierte Z-Kraft, die Pflanzen-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nPlanta en movimientos Z."
    ko: "풀타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将草属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把草屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
grassium_z:held:
  names:
    jp_kana: クサＺ
    jp_kanji: クサＺ
    en: Grassium Z
    fr: Florazélite
    it: Herbium Z
    de: Botanium Z
    es: Fitostal Z
    ko: 풀Z
    zh_simp: 草Ｚ
    zh_trad: 草Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nくさタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nくさタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Grass-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Plante en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Erba\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Pflanzen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Planta."
    ko: "Z파워의 결정.\n풀타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将草属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把草屬性的招式\n升級為Ｚ招式。"
grassy_seed:
  names:
    jp_kana: グラスシード
    jp_kanji: グラスシード
    en: Grassy Seed
    fr: Graine Herbe
    it: Erbaseme
    de: Gras-Samen
    es: Semilla Hierba
    ko: 그래스시드
    zh_simp: 青草种子
    zh_trad: 青草種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nグラスフィールドのときに　つかって\nぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nグラスフィールドのときに　使って\n防御が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Defense\non Grassy Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense Spéciale lorsque\nle terrain est couvert d’un Champ Herbu."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa quando il terreno\ndi lotta è nello stato di Campo Erboso."
    de: "Gibst du den Samen einem Pokémon zum Tragen,\nsetzt es ihn ein, wenn ein Grasfeld aktiv ist, und\nerhöht dadurch seine Verteidigung."
    es: "Aumenta la Defensa del portador si se usa cuando\nel terreno está cubierto por un campo de hierba."
    ko: "포켓몬에게 지니게 하면\n그래스필드일 때 사용하여\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在青草场地上使用，\n防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在青草場地上使用，\n就會提高防禦。"
great_ball:
  names:
    jp_kana: スーパーボール
    jp_kanji: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Super Ball
    ko: 수퍼볼
    zh_simp: 超级球
    zh_trad: 超級球
  descriptions:
    jp_kana: "モンスターボールよりも　さらに\nポケモンを　つかまえやすくなった\nすこし　せいのうのいい　ボール。"
    jp_kanji: "モンスターボールよりも　さらに\nポケモンを　捕まえやすくなった\n少し　性能のいい　ボール。"
    en: "A good, high-performance Poké Ball that provides\na higher success rate for catching Pokémon than\na standard Poké Ball."
    fr: "Une Ball très performante dont le taux de réussite\nest supérieur à celui de la Poké Ball."
    it: "Poké Ball dalle ottime prestazioni: fornisce\nmaggiori probabilità di cattura rispetto alla\nnormale Poké Ball."
    de: "Ein Ball mit guter Erfolgsquote. Dem Pokéball in\nallen Punkten überlegen."
    es: "Poké Ball de alto rendimiento. Tiene un índice de\néxito superior al de la Poké Ball."
    ko: "몬스터볼보다도 더욱\n포켓몬을 잡기 쉬워진\n약간 성능이 좋은 볼."
    zh_simp: "比起精灵球来\n更容易捉到宝可梦的，\n性能还算不错的球。"
    zh_trad: "性能還算不錯的球。\n比起精靈球\n更容易捉到寶可夢。"
green_apricorn:
  names:
    jp_kana: みどぼんぐり
    jp_kanji: みどぼんぐり
    en: Green Apricorn
    fr: Noigrume Vert
    it: Ghicocca Verde
    de: Aprikoko Grn
    es: Bonguri Verde
    ko: 초록규토리
    zh_simp: 绿球果
    zh_trad: 綠球果
  descriptions:
    jp_kana: "みどりの　ぼんぐり。\nふしぎと　こうばしい　かおりがする。"
    jp_kanji: "みどりの　ぼんぐり。\n不思議と　こうばしい　かおりがする。"
    en: "A green Apricorn. It has a mysterious,\naromatic scent."
    fr: "Un Noigrume de couleur verte.\nIl dégage un arôme étonnamment riche."
    it: "Una Ghicocca di colore verde.\nEmana un profumo intenso."
    de: "Eine grüne Aprikoko. Sie verströmt einen seltsam\naromatischen Duft."
    es: "Bonguri de color verde y aroma peculiar que recuerda\nal café tostado."
    ko: "초록색의 규토리.\n이상하게도 고소한 향기가 난다."
    zh_simp: "绿色的球果。\n有种焦香的香味，非常神奇。"
    zh_trad: "綠色的球果。\n有種焦香的香味，非常神奇。"
green_petal:
  names:
    jp_kana: みどりのはなびら
    jp_kanji: みどりのはなびら
    en: Green Petal
    fr: Pétale Vert
    it: Petalo verde
    de: Grünes Blatt
    es: Pétalo Verde
    ko: 초록꽃잎
    zh_simp: 绿色花瓣
    zh_trad: 綠色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　マオから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　マオから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Mallow\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Barbara vous a remis lors de\nl’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Ibis durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Maho erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Lulú durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 마오에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从玛奥那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從瑪奧那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
green_scarf:
  names:
    jp_kana: みどりのバンダナ
    jp_kanji: みどりのバンダナ
    en: Green Scarf
    fr: Foulard Vert
    it: Fascia Verde
    de: Grüner Schal
    es: Pañuelo Verde
    ko: 초록밴드
    zh_simp: 绿色头巾
    zh_trad: 綠色頭巾
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    en: "An item to be held by a Pokémon. During a contest,\nit raises the Clever aspect of the Pokémon\nholding it."
    fr: "Objet à tenir. Augmente l’Intelligence d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta l’“Acume” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Klugheit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta el ingenio en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n슬기롭게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加聪明。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加聰明。"
green_shard:
  names:
    jp_kana: みどりのかけら
    jp_kanji: みどりのかけら
    en: Green Shard
    fr: Tesson Vert
    it: Coccio Verde
    de: Grünstück
    es: Parte Verde
    ko: 초록조각
    zh_simp: 绿色碎片
    zh_trad: 綠色碎片
  descriptions:
    jp_kana: "みどりの　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "緑の　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small green shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson vert.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio verde che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine grüne Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento verde. Parece formar parte\nde algún tipo de herramienta antigua."
    ko: "초록색 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "绿色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "綠色的小碎片。\n好像是以前製作的\n某道具的一部分。"
greet_mail:
  names:
    jp_kana: はじめてメール
    jp_kanji: はじめてメール
    en: Greet Mail
    fr: Lettre Salut
    it: Messaggio Inizio
    de: Grußbrief
    es: Carta Inicial
    ko: 첫메일
    zh_simp: 初次邮件
    zh_trad: 初次郵件
  descriptions:
    jp_kana: "はじめましての　あいさつが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "はじめましての　あいさつが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to be easy to use when writing\nsomeone for the first time. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour se présenter.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per presentarsi a qualcuno.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man sich bei jemandem\nvorstellen kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para presentarse a alguien. Haz que la entregue\nun Pokémon."
    ko: "첫인사를\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写初次见面这类寒暄语的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫初次見面這類招呼語的信紙。\n需讓寶可夢攜帶使用。"
grepa_berry:
  names:
    jp_kana: ウブのみ
    jp_kanji: ウブのみ
    en: Grepa Berry
    fr: Baie Résin
    it: Baccauva
    de: Labrusbeere
    es: Baya Uvav
    ko: 또뽀열매
    zh_simp: 萄葡果
    zh_trad: 萄葡果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nとくぼうの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n特防の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its base\nSp. Def."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense Spéciale de base."
    it: "Usata su un Pokémon, lo rende più affezionato,\nma ne diminuisce i punti base della Difesa\nSpeciale."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nSpezial-Verteidigungs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad, pero\ntambién reduce su Defensa Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수방어의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但特防的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得親密，\n但特防的基礎點數會降低。"
grimer_candy:
  names:
    jp_kana: ベトベターのアメ
    jp_kanji: ベトベターのアメ
    en: Grimer Candy
    fr: Bonbon Tadmorv
    it: Caramella Grimer
    de: Sleima-Bonbon
    es: Caramelo Grimer
    ko: 질퍽이의사탕
    zh_simp: 臭泥的糖果
    zh_trad: 臭泥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
grip_claw:
  names:
    jp_kana: ねばりのかぎづめ
    jp_kanji: ねばりのかぎづめ
    en: Grip Claw
    fr: Accro Griffe
    it: Presartigli
    de: Griffklaue
    es: Garra Garfio
    ko: 끈기갈고리손톱
    zh_simp: 紧缠钩爪
    zh_trad: 緊纏鉤爪
  descriptions:
    jp_kana: "もたせると　しめつける　まきつくなど\nダメージを　あたえつづける　わざの\nターンすうが　ふえる。"
    jp_kanji: "持たせると　しめつける　まきつくなど\nダメージを　あたえつづける　技の\nターン数が　増える。"
    en: "An item to be held by a Pokémon. It extends the\nduration of multi-turn attacks, such as Bind and Wrap."
    fr: "Objet à tenir. Augmente la durée des attaques\nà tours multiples telles que Ligotage et Étreinte."
    it: "Strumento da dare a un Pokémon.\nProlunga gli attacchi multiturno come Avvolgibotta\ne Legatutto."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nKlammergriff, Wickel etc."
    es: "Prolonga la duración de ataques multiturno como\nAtadura y Constricción si la lleva un Pokémon."
    ko: "지니게 하면 조이기나 김밥말이 등\n데미지를 계속 주는 기술의\n턴 수가 늘어난다."
    zh_simp: "携带后，绑紧以及紧束等\n会持续造成伤害的招式的\n回合数会增加。"
    zh_trad: "攜帶後，綁緊以及緊束等\n會持續造成傷害的招式的\n回合數會增加。"
griseous_orb:
  names:
    jp_kana: はっきんだま
    jp_kanji: はっきんだま
    en: Griseous Orb
    fr: Orbe Platiné
    it: Grigiosfera
    de: Platinum-Orb
    es: Griseosfera
    ko: 백금옥
    zh_simp: 白金宝珠
    zh_trad: 白金寶珠
  descriptions:
    jp_kana: "ギラティナに　もたせると　ドラゴンと\nゴーストタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ギラティナに　持たせると　ドラゴンと\nゴーストタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A glowing orb to be held by Giratina. It boosts the\npower of Dragon- and Ghost-type moves when it\nis held."
    fr: "Un mystérieux objet destiné à Giratina.\nAméliore les capacités de type Dragon et Spectre."
    it: "Poliedro splendente da dare a Giratina.\nAumenta la potenza delle mosse di tipo Drago\ne Spettro."
    de: "Ein glühender Orb. Verstärkt Attacken vom Typ\nDrache und Geist, wenn Giratina ihn trägt."
    es: "Una esfera brillante que potencia los movimientos\nde tipo Dragón y Fantasma. Debe llevarla Giratina."
    ko: "기라티나에게 지니게 하면 드래곤과\n고스트타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
    zh_simp: "让骑拉帝纳携带的话，\n龙和幽灵属性的招式威力就会提高。\n散发着光辉的宝珠。"
    zh_trad: "讓騎拉帝納攜帶的話，\n龍和幽靈屬性的招式威力就會提高。\n散發著光輝的寶珠。"
ground_gem:
  names:
    jp_kana: じめんのジュエル
    jp_kanji: じめんのジュエル
    en: Ground Gem
    fr: Joyau Sol
    it: Bijouterra
    de: Bodenjuwel
    es: Gema Tierra
    ko: 땅주얼
    zh_simp: 地面宝石
    zh_trad: 地面寶石
  descriptions:
    jp_kana: "じめんの　タイプの　ジュエル。\nもたせると　いちどだけ　じめんの\nわざの　いりょくが　つよまる。"
    jp_kanji: "じめんの　タイプの　ジュエル。\n持たせると　１度だけ　じめんの\n技の　威力が　強まる。"
    en: "A gem with an essence of land. When held, it\nstrengthens the power of a Ground-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Terra."
    de: "Ein Juwel vom Typ Boden. Es erhöht einmalig die\nStärke einer Attacke vom Typ Boden."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Tierra. Debe llevarla un Pokémon."
    ko: "땅타입의 주얼.\n지니게 하면 한 번만 땅\n기술의 위력이 강해진다."
    zh_simp: "地面属性的宝石。\n携带后，地面属性的\n招式威力仅会增强１次。"
    zh_trad: "地面屬性的寶石。\n攜帶後，地面屬性招式的\n威力會僅增強１次。"
ground_memory:
  names:
    jp_kana: グラウンドメモリ
    jp_kanji: グラウンドメモリ
    en: Ground Memory
    fr: ROM Sol
    it: ROM Terra
    de: Boden-Disc
    es: Disco Tierra
    ko: 그라운드메모리
    zh_simp: 大地存储碟
    zh_trad: 大地記憶碟
  descriptions:
    jp_kana: "じめんタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "じめんタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ground-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Sol. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Terra in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Boden.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nTierra. Permite cambiar de tipo a cierto Pokémon."
    ko: "땅타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有地面属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有地面屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
groundium_z:bag:
  names:
    jp_kana: ジメンＺ
    jp_kanji: ジメンＺ
    en: Groundium Z
    fr: Terrazélite
    it: Terrium Z
    de: Terrium Z
    es: Geostal Z
    ko: 땅Z
    zh_simp: 地面Ｚ
    zh_trad: 地面Ｚ
  descriptions:
    jp_kana: "じめんタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "じめんタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nGround-type moves to Ground-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Sol en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Terra in mosse Z."
    de: "Kristallisierte Z-Kraft, die Boden-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nTierra en movimientos Z."
    ko: "땅타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将地面属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把地面屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
groundium_z:held:
  names:
    jp_kana: ジメンＺ
    jp_kanji: ジメンＺ
    en: Groundium Z
    fr: Terrazélite
    it: Terrium Z
    de: Terrium Z
    es: Geostal Z
    ko: 땅Z
    zh_simp: 地面Ｚ
    zh_trad: 地面Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nじめんタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nじめんタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ground-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Sol en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Terra\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Boden-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Tierra."
    ko: "Z파워의 결정.\n땅타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将地面属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把地面屬性的招式\n升級為Ｚ招式。"
growlithe_candy:
  names:
    jp_kana: ガーディのアメ
    jp_kanji: ガーディのアメ
    en: Growlithe Candy
    fr: Bonbon Caninos
    it: Caramella Growlithe
    de: Fukano-Bonbon
    es: Caramelo Growlithe
    ko: 가디의사탕
    zh_simp: 卡蒂狗的糖果
    zh_trad: 卡蒂狗的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
growth_mulch:
  names:
    jp_kana: すくすくこやし
    jp_kanji: すくすくこやし
    en: Growth Mulch
    fr: Fertipousse
    it: Fertilrapido
    de: Wachsmulch
    es: Abono Rápido
    ko: 무럭무럭비료
    zh_simp: 速速肥
    zh_trad: 速速肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
grubby_hanky:
  names:
    jp_kana: よごれたハンカチ
    jp_kanji: よごれたハンカチ
    en: Grubby Hanky
    fr: Mouchoir Sale
    it: Pezza Sporca
    de: Schnäuztuch
    es: Pañuelo Sucio
    ko: 더러운손수건
    zh_simp: 脏手帕
    zh_trad: 髒手帕
  descriptions:
    jp_kana: "シッポウシティにある　カフェソーコの\nじょうれんが　おとした　ハンカチ。\nほのかに　ポケモンの　かおりがする。"
    jp_kanji: "シッポウシティにある　カフェソーコの\n常連が　落とした　ハンカチ。\nほのかに　ポケモンの　香りがする。"
    en: "A handkerchief dropped by a regular at\nCafé Warehouse. It smells faintly like a Pokémon."
    fr: "Un mouchoir égaré par un habitué du Café de\nla Grange. Il sent légèrement le Pokémon."
    it: "Pezzo di stoffa perso al Bar Magazzino\ndi Zefiropoli da un cliente abituale.\nOdora leggermente di Pokémon."
    de: "Ein Taschentuch, das ein Stammkunde im\nCafé Lagerhaus in Septerna City verloren hat.\nRiecht leicht nach Pokémon."
    es: "Pañuelo perdido por un cliente habitual del Café Alma\nen Ciudad Esmalte. Desprende el olor de un Pokémon."
    ko: "칠보시티에 있는 카페 갤러지의\n단골손님이 떨어뜨린 손수건.\n희미하게 포켓몬의 냄새가 난다."
    zh_simp: "七宝市仓库咖啡馆的\n熟客遗失的手帕。\n隐约有着宝可梦的香气。"
    zh_trad: "七寶市倉庫咖啡館的\n熟客遺失的手帕。\n隱約有著寶可夢的香氣。"
guard_spec:
  names:
    jp_kana: エフェクトガード
    jp_kanji: エフェクトガード
    en: Guard Spec.
    fr: Garde-Stats
    it: Superguardia
    de: Megablock
    es: Protec. Especial
    ko: 이펙트가드
    zh_simp: 能力防守
    zh_trad: 能力防守
  descriptions:
    jp_kana: "せんとうちゅう　５ターンの　あいだ\nみかたの　のうりょくを\nさげられなくする　どうぐ。"
    jp_kanji: "戦闘中　５ターンの　あいだ\n味方の　能力を\nさげられなくする　道具。"
    en: "An item that prevents stat reduction among the\nTrainer’s party Pokémon for five turns after it is\nused in battle."
    fr: "Empêche la baisse des stats de tous les Pokémon\nde l’équipe pendant cinq tours."
    it: "Per cinque turni dopo l’uso, evita che le statistiche\ndei Pokémon della squadra dell’Allenatore\ndiminuiscano."
    de: "Eine mögliche Statusveränderung der Pokémon im\nTeam wird für 5 Runden verhindert."
    es: "Evita que bajen las características del equipo\nPokémon durante cinco turnos."
    ko: "배틀 중 5턴 동안\n같은 편의 능력을\n떨어뜨리지 않게 하는 도구."
    zh_simp: "在战斗中，\n５回合内不让我方\n能力降低的道具。"
    zh_trad: "在戰鬥中，\n５回合內讓我方的\n能力不被降低的道具。"
guidebook:
  names:
    jp_kana: ぼうけんノート
    jp_kanji: ぼうけんノート
    en: Journal
    fr: Journal
    it: Agenda
    de: Tagebuch
    es: Diario
    ko: 모험노트
    zh_simp: 冒险笔记
    zh_trad: 冒險筆記
  descriptions:
    jp_kana: "これまでの　ぼうけんの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "これまでの　冒険の　様子が\n記録　されている　ノート。"
    en: "A notebook that keeps a day-to-day record of your\nadventure so far."
    fr: "Un journal de bord qui garde en mémoire vos\naventures quotidiennes."
    it: "Diario in cui viene annotata la tua avventura\ngiorno per giorno."
    de: "In diesem Tagebuch steht, was du in den letzten\nTagen erlebt hast."
    es: "Un cuaderno en el que se recogen, día a día, los\nprogresos de tu aventura."
    ko: "지금까지의 모험 상황이\n기록되어 있는 노트."
    zh_simp: "记录着到现在为止的\n冒险经历的笔记。"
    zh_trad: "記錄著到目前為止的\n冒險歷程的筆記。"
gyaradosite:
  names:
    jp_kana: ギャラドスナイト
    jp_kanji: ギャラドスナイト
    en: Gyaradosite
    fr: Léviatorite
    it: Gyaradosite
    de: Garadosnit
    es: Gyaradosita
    ko: 갸라도스나이트
    zh_simp: 暴鲤龙进化石
    zh_trad: 暴鯉龍進化石
  descriptions:
    jp_kana: "たたかいのとき　ギャラドスを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　ギャラドスを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Gyarados to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Léviator de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Gyarados di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Garados, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gyarados en combate."
    ko: "배틀할 때 갸라도스를\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让暴鲤龙\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓暴鯉龍進行超級進化的\n一種神奇超級石。"
haban_berry:
  names:
    jp_kana: ハバンのみ
    jp_kanji: ハバンのみ
    en: Haban Berry
    fr: Baie Fraigo
    it: Baccahaban
    de: Terirobeere
    es: Baya Anjiro
    ko: 하반열매
    zh_simp: 莓榴果
    zh_trad: 莓榴果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ドラゴン　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ドラゴン技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nDragon-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Dragon."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Drago del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Drache."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Dragón de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 드래곤 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的龙属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的龍屬性招式\n攻擊時，能使其威力減弱。"
hard_stone:
  names:
    jp_kana: かたいいし
    jp_kanji: かたいいし
    en: Hard Stone
    fr: Pierre Dure
    it: Pietradura
    de: Granitstein
    es: Piedra Dura
    ko: 딱딱한돌
    zh_simp: 硬石头
    zh_trad: 硬石頭
  descriptions:
    jp_kana: "ぜったいに　われない　いし。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "絶対に　割れない　石。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a durable\nstone that boosts the power of Rock-type moves."
    fr: "Objet à tenir. Une pierre incassable qui augmente\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nPietra indistruttibile che potenzia le mosse\ndi tipo Roccia."
    de: "Ein Item zum Tragen. Ein unzerbrechlicher Stein,\nder Attacken vom Typ Gestein verstärkt."
    es: "Debe llevarla un Pokémon. La robustez de la piedra\nfortalece los movimientos de tipo Roca."
    ko: "절대 깨지지 않는 돌.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
    zh_simp: "绝对不会裂开的石头。\n携带后，岩石属性的\n招式威力就会提高。"
    zh_trad: "絕對不會裂開的石頭。\n攜帶後，岩石屬性的\n招式威力就會提高。"
heal_ball:
  names:
    jp_kana: ヒールボール
    jp_kanji: ヒールボール
    en: Heal Ball
    fr: Soin Ball
    it: Cura Ball
    de: Heilball
    es: Sana Ball
    ko: 힐볼
    zh_simp: 治愈球
    zh_trad: 治癒球
  descriptions:
    jp_kana: "つかまえた　ポケモンの　ＨＰと\nじょうたい　いじょうを　かいふくする\nちょっと　やさしい　ボール。"
    jp_kanji: "捕まえた　ポケモンの　ＨＰと\n状態異常を　回復する\nちょっと　やさしい　ボール。"
    en: "A remedial Poké Ball that restores the HP of a\nPokémon caught with it and eliminates any\nstatus conditions."
    fr: "Une Poké Ball de soin qui rend tous ses PV au Pokémon\nattrapé et qui soigne toutes ses altérations de statut."
    it: "Poké Ball curativa che ridà PS al Pokémon\ncatturato e cura tutti i problemi di stato."
    de: "Ein wohltuender Ball. Er füllt alle KP des gefangenen\nPokémon auf und behebt alle Statusprobleme."
    es: "Poké Ball curativa que restaura los PS y cura todos\nlos problemas de estado de un Pokémon después\nde capturarlo."
    ko: "잡은 포켓몬의 HP와\n상태 이상을 회복시키는\n조금 다정한 볼."
    zh_simp: "有点温柔的球。\n能回复捉到的宝可梦的\nHP并治愈异常状态。"
    zh_trad: "有點溫柔的球。\n能回復捉到的寶可夢的\nHP並治癒異常狀態。"
heal_powder:
  names:
    jp_kana: ばんのうごな
    jp_kanji: ばんのうごな
    en: Heal Powder
    fr: Poudre Soin
    it: Polvocura
    de: Heilpuder
    es: Polvo Curación
    ko: 만능가루
    zh_simp: 万能粉
    zh_trad: 萬能粉
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A very bitter medicinal powder. It can be used once\nto heal all the status conditions of a Pokémon."
    fr: "Une poudre médicinale très amère.\nSoigne tous les problèmes de statut d’un Pokémon."
    it: "Rimedio amarissimo in polvere.\nCura tutti i problemi di stato di un Pokémon."
    de: "Ein bitteres medizinisches Pulver, das alle\nStatusprobleme eines Pokémon aufhebt."
    es: "Polvos medicinales muy amargos que curan todos\nlos problemas de estado de un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "非常苦的药粉。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "非常苦的藥粉。\n能治癒１隻寶可夢的\n所有異常狀態。"
health_candy:
  names:
    jp_kana: げんきのアメ
    jp_kanji: げんきのアメ
    en: Health Candy
    fr: Bonbon Santé S
    it: Caramella vitalità S
    de: Energiebonbon
    es: Caramelo Vigor
    ko: 기력의사탕
    zh_simp: 元气糖果
    zh_trad: 元氣糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　たいりょくを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　たいりょくを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s HP."
    fr: "Un bonbon plein d’énergie.\nIl augmente les PV d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta i PS di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft die KP eines Pokémon."
    es: "Caramelo energético que aumenta los PS máximos del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 HP를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的体力。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的體力。"
health_candy_l:
  names:
    jp_kana: げんきのアメＬ
    jp_kanji: げんきのアメＬ
    en: Health Candy L
    fr: Bonbon Santé M
    it: Caramella vitalità M
    de: Energiebonbon+
    es: Caramelo Vigor +
    ko: 기력의사탕L
    zh_simp: 元气糖果L
    zh_trad: 元氣糖果L
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nたいりょくを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nたいりょくを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase\nthat Pokémon’s HP."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente les PV d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta i PS di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die KP eines Pokémon ab Level 30."
    es: "Caramelo energético grande que aumenta los PS\nmáximos de un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\nHP를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级30以上的\n宝可梦的体力上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在30以上的\n寶可夢的體力。"
health_candy_xl:
  names:
    jp_kana: げんきのアメＸＬ
    jp_kanji: げんきのアメＸＬ
    en: Health Candy XL
    fr: Bonbon Santé L
    it: Caramella vitalità L
    de: Energiebonbon++
    es: Caramelo Vigor ++
    ko: 기력의사탕XL
    zh_simp: 元气糖果XL
    zh_trad: 元氣糖果XL
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nたいりょくを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nたいりょくを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase\nthat Pokémon’s HP."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente les PV d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta i PS di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die KP eines Pokémon ab Level 60."
    es: "Caramelo energético enorme que aumenta los PS\nmáximos de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\nHP를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级60以上的\n宝可梦的体力上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在60以上的\n寶可夢的體力。"
health_feather:
  names:
    jp_kana: たいりょくのハネ
    jp_kanji: たいりょくのハネ
    en: Health Wing
    fr: Aile Santé
    it: Piumsalute
    de: Heilfeder
    es: Pluma Vigor
    ko: 체력날개
    zh_simp: 体力之羽
    zh_trad: 體力之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ＨＰの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe base HP of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu ses PV de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dei PS."
    de: "Wendet man dieses Item auf ein Pokémon an,\nwird dessen KP-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco los PS de base de\nun Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 HP\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\nHP的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\nHP的基礎點數。"
heart_scale:
  names:
    jp_kana: ハートのウロコ
    jp_kanji: ハートのウロコ
    en: Heart Scale
    fr: Écaille Cœur
    it: Squama Cuore
    de: Herzschuppe
    es: Escama Corazón
    ko: 하트비늘
    zh_simp: 心之鳞片
    zh_trad: 心之鱗片
  descriptions:
    jp_kana: "きれいな　ハートの　かたちの\nとても　めずらしい　ウロコ。\nわたすと　よろこぶ　ひともいる。"
    jp_kanji: "きれいな　ハートの　形の\nとても　珍しい　ウロコ。\n渡すと　よろこぶ　人もいる。"
    en: "A pretty, heart-shaped scale that is extremely\nrare. Some people are happy to receive one."
    fr: "Une écaille très rare et jolie en forme de cœur.\nCertaines personnes sont ravies quand on leur\nen donne une."
    it: "Squama graziosa, a forma di cuore e molto rara.\nAlcune persone sono molto felici di riceverne una."
    de: "Eine hübsche, herzförmige und sehr seltene\nSchuppe. Damit könnte man so manchem eine\nFreude machen."
    es: "Una bella y rara escama con forma de corazón que\nmás de uno apreciará si se la entregas."
    ko: "예쁜 하트 모양의\n무척 진귀한 비늘.\n받으면 좋아하는 사람도 있다."
    zh_simp: "有着美丽心形外形\n且非常珍稀的鳞片。\n有些人收到会很高兴。"
    zh_trad: "有著美麗心形外形\n且非常稀奇的鱗片。\n有些人收到會很高興。"
heat_rock:
  names:
    jp_kana: あついいわ
    jp_kanji: あついいわ
    en: Heat Rock
    fr: Roche Chaude
    it: Rocciacalda
    de: Heißbrocken
    es: Roca Calor
    ko: 뜨거운바위
    zh_simp: 炽热岩石
    zh_trad: 熾熱岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　にほんばれを\nつかうと　いつもより　はれの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　にほんばれを\n使うと　いつもより　はれの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Sunny Day when used by\nthe holder."
    fr: "Objet à tenir. Augmente la durée de la capacité Zénith\nutilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Giornodisole."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nSonnentag, wenn der Träger diese Attacke\neinsetzt."
    es: "Prolonga la duración del movimiento Día Soleado\nque use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 쾌청을\n쓰면 여느 때보다 쾌청의\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出大晴天的话，\n晴天的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出大晴天的話，\n晴天的時間就會比平時更長。"
heavy_ball:
  names:
    jp_kana: ヘビーボール
    jp_kanji: ヘビーボール
    en: Heavy Ball
    fr: Masse Ball
    it: Peso Ball
    de: Schwerball
    es: Peso Ball
    ko: 헤비볼
    zh_simp: 沉重球
    zh_trad: 沉重球
  descriptions:
    jp_kana: "たいじゅうの　おもい　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "体重の　重い　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that is better than usual at catching\nvery heavy Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon lourds."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon pesanti."
    de: "Ein Ball, der sich besonders gut eignet, um Pokémon\nmit hohem Körpergewicht zu fangen."
    es: "Poké Ball algo distinta que funciona especialmente\nbien a la hora de atrapar Pokémon de mucho peso."
    ko: "체중이 무거운 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n能很容易地捕捉\n身体沉重的宝可梦。"
    zh_trad: "有點與眾不同的球。\n能更容易地捉到\n身體沉重的寶可夢。"
helix_fossil:
  names:
    jp_kana: かいのカセキ
    jp_kanji: かいのカセキ
    en: Helix Fossil
    fr: Nautile
    it: Helixfossile
    de: Helixfossil
    es: Fósil Hélix
    ko: 조개화석
    zh_simp: 贝壳化石
    zh_trad: 貝殼化石
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nかいがらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n貝殻の　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\nin the sea. It might be a piece of a seashell."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de coquillage."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una conchiglia."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es ähnelt einer Muschelschale."
    es: "Fósil de un Pokémon prehistórico que vivía en el fondo\ndel mar. Parece ser un fragmento de concha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n조개껍질의 일부인 듯하다."
    zh_simp: "很久以前栖息在海里的\n古代宝可梦的化石。\n好像是贝壳的一部分。"
    zh_trad: "很久以前棲息在海裡的\n古代寶可夢的化石。\n好像是貝殼的一部分。"
heracronite:
  names:
    jp_kana: ヘラクロスナイト
    jp_kanji: ヘラクロスナイト
    en: Heracronite
    fr: Scarhinoïte
    it: Heracrossite
    de: Skarabornit
    es: Heracrossita
    ko: 헤라크로스나이트
    zh_simp: 赫拉克罗斯进化石
    zh_trad: 赫拉克羅斯進化石
  descriptions:
    jp_kana: "ヘラクロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヘラクロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Heracross hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Scarhino, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Heracross, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Skaraborn getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Heracross en combate."
    ko: "헤라크로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让赫拉克罗斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓赫拉克羅斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
hitmonchan_candy:
  names:
    jp_kana: エビワラーのアメ
    jp_kanji: エビワラーのアメ
    en: Hitmonchan Candy
    fr: Bonbon Tygnon
    it: Caramella Hitmonchan
    de: Nockchan-Bonbon
    es: Caramelo Hitmonchan
    ko: 홍수몬의사탕
    zh_simp: 快拳郎的糖果
    zh_trad: 快拳郎的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
hitmonlee_candy:
  names:
    jp_kana: サワムラーのアメ
    jp_kanji: サワムラーのアメ
    en: Hitmonlee Candy
    fr: Bonbon Kicklee
    it: Caramella Hitmonlee
    de: Kicklee-Bonbon
    es: Caramelo Hitmonlee
    ko: 시라소몬의사탕
    zh_simp: 飞腿郎的糖果
    zh_trad: 飛腿郎的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
hm01:
  names:
    jp_kana: ひでんマシン０１
    jp_kanji: ひでんマシン０１
    en: HM01
    fr: CS01
    it: MN01
    de: VM01
    es: MO01
    ko: 비전머신01
    zh_simp: 秘传学习器01
    zh_trad: 秘傳學習器01
  descriptions:
    jp_kana: "カマや　ツメなどの　するどいもので\nきりつけて　こうげきする。\nほそいきを　きることも　できる。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。\n細い　樹木も　きることが　できる。"
    en: "The target is cut with a scythe or claw.\nThis can also be used to cut down thin trees."
    fr: "Coupe l’ennemi avec des lames ou des griffes.\nHors combat, permet de couper des arbres fins."
    it: "Attacca il nemico con artigli o falci affilate.\nFuori dalla lotta si usa per tagliare piccoli alberi."
    de: "Das Ziel wird mit scharfen Klingen attackiert.\nAußerhalb des Kampfes werden damit kleine\nBäume gefällt."
    es: "Corta al objetivo con una cuchilla o garra.\nTambién puede usarse para cortar árboles finos."
    ko: "낫이나 발톱 등 날카로운 것으로\n갈라서 공격한다.\n얇은 나무를 자를 수도 있다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。\n还可以切断细的树木。"
    zh_trad: "用鐮刀或爪子等\n切斬對手進行攻擊。\n也可以切斷細的樹木。"
hm02:
  names:
    jp_kana: ひでんマシン０２
    jp_kanji: ひでんマシン０２
    en: HM02
    fr: CS02
    it: MN02
    de: VM02
    es: MO02
    ko: 비전머신02
    zh_simp: 秘传学习器02
    zh_trad: 秘傳學習器02
  descriptions:
    jp_kana: "１ターンめで　そらへ　とびあがって\n２ターンめで　こうげきする。\nしっているまちに　いどうも　できる。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。\n知っている　街に　移動も　できる。"
    en: "The user soars and then strikes its target on the\nnext turn. This can also be used to fly to any\nfamiliar town."
    fr: "Le lanceur s’envole au premier tour et frappe au second.\nPermet aussi de voler jusqu’à une ville déjà visitée."
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente. Fuori dalla lotta permette di volare\nin città già visitate."
    de: "In Runde 1 fliegt der Angreifer empor und attackiert\nin Runde 2. Man kann damit zu jedem bekannten\nOrt fliegen."
    es: "Quien lo usa levanta el vuelo y ataca en el siguiente\nturno. También se puede usar para volar a algún sitio\nconocido."
    ko: "1턴째에 하늘을 날아올라\n2턴째에 공격한다.\n알고 있는 도시로 이동할 수 있다."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。\n还可以飞到去过的城镇。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。\n也可以飛到去過的城鎮。"
hm03:
  names:
    jp_kana: ひでんマシン０３
    jp_kanji: ひでんマシン０３
    en: HM03
    fr: CS03
    it: MN03
    de: VM03
    es: MO03
    ko: 비전머신03
    zh_simp: 秘传学习器03
    zh_trad: 秘傳學習器03
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの　まわりに\nいるものを　こうげきする。"
    jp_kanji: "大きな　波で　自分の　周りに\nいるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: Une énorme vague s’abat sur le champ de bataille.
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena."
    de: "Eine riesige Flutwelle ergießt sich über das nähere\nUmfeld des Anwenders."
    es: Inunda el terreno de combate con una ola gigante.
    ko: "큰 파도로 자신의 주위에\n있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。\n也可以在水面上游泳前進。"
hm04:
  names:
    jp_kana: ひでんマシン０４
    jp_kanji: ひでんマシン０４
    en: HM04
    fr: CS04
    it: MN04
    de: VM04
    es: MO04
    ko: 비전머신04
    zh_simp: 秘传学习器04
    zh_trad: 秘傳學習器04
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nおもいいわを　おすことも　できる。"
    jp_kanji: "ありったけの　力で\n相手を　なぐりつけて　攻撃する。\n重たい　岩を　押すことも　できる。"
    en: "The target is slugged with a punch thrown at\nmaximum power. This can also be used to move\nheavy boulders."
    fr: "Le lanceur cogne l’ennemi de toutes ses forces.\nPermet aussi de déplacer des rochers."
    it: "Colpisce il nemico con un’enorme energia.\nFuori dalla lotta si usa per spostare i massi."
    de: "Ein energiegeladener Kraftschlag trifft das Ziel.\nAußerdem lassen sich mit der Attacke schwere\nFelsen bewegen."
    es: "Genera mucha fuerza y ataca con gran energía\nal objetivo. También puede usarse para mover\npiedras grandes."
    ko: "혼신의 힘으로 공격한다.\n무거운 바위를 밀 수도 있다."
    zh_simp: "使出浑身力气\n殴打对手进行攻击。\n还可以推动沉重的岩石。"
    zh_trad: "使出渾身力量\n毆打對手進行攻擊。\n也可以推動沉重的岩石。"
hm05:
  names:
    jp_kana: ひでんマシン０５
    jp_kanji: ひでんマシン０５
    en: HM05
    fr: CS05
    it: MN05
    de: VM05
    es: MO05
    ko: 비전머신05
    zh_simp: 秘传学习器05
    zh_trad: 秘傳學習器05
  descriptions:
    jp_kana: "たきを　さかのぼるような　すさまじい\nいきおいで　とっしん　こうげきする。\nたきを　のぼることも　できる。"
    jp_kanji: "すごい　勢いで　相手に　つっこみ\n攻撃する。流れ落ちる　滝も\n泳いで　のぼれる。"
    en: "The user charges at the target and may make it\nflinch. This can also be used to climb a waterfall."
    fr: "Le lanceur charge l’ennemi à une vitesse remarquable.\nPeut aussi l’apeurer. Permet aussi de franchir\nune cascade."
    it: "Carica il nemico a grande velocità e può farlo\ntentennare.\nFuori dalla lotta fa risalire le cascate."
    de: "Eine mächtige Attacke, die das Ziel eventuell\nzurückschrecken lässt. Sie macht Wasserfälle\nbezwingbar."
    es: "Carga contra el objetivo a una velocidad increíble.\nTambién puede usarse para remontar una cascada."
    ko: "폭포를 거꾸로 오르는 듯한\n엄청난 기세로 돌진하여 공격한다.\n폭포를 오를 수도 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。\n还可以游泳登上瀑布。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會使對手畏縮。\n也可以游泳登上瀑布。"
hm06:
  names:
    jp_kana: ひでんマシン０６
    jp_kanji: ひでんマシン０６
    en: HM06
    fr: CS06
    it: MN06
    de: VM06
    es: MO06
    ko: 비전머신06
    zh_simp: 秘传学习器06
    zh_trad: 秘傳學習器06
  descriptions:
    jp_kana: "パンチで　こうげき。　あいての\nぼうぎょを　さげる　ことが　ある。\nいわを　くだくことも　できる。"
    jp_kanji: "パンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。\n岩を　砕くことも　できる。"
    en: "The user attacks with a punch. This may also lower\nthe target’s Defense stat. This move can also\nshatter rocks in the field."
    fr: "Porte un coup de poing à l’ennemi qui peut baisser\nsa Défense. Peut aussi briser des rochers fissurés."
    it: "Chi la usa colpisce il bersaglio con un pugno\nche può anche ridurne la Difesa. Fuori dalla lotta\npermette di frantumare le rocce."
    de: "Der Anwender greift mit einem Hieb an, der den\nVerteidigungs-Wert des Zieles senken kann.\nDamit können auch Steine zerschlagen werden."
    es: "Ataca con los puños. Puede bajar la Defensa del\nobjetivo y romper rocas fuera del combate."
    ko: "펀치로 공격한다.\n상대의 방어를 떨어뜨릴 때가 있으며\n바위를 깰 수도 있다."
    zh_simp: "用拳头进行攻击。\n有时会降低对手的防御。\n还可以击碎岩石。"
    zh_trad: "用拳頭進行攻擊。\n有時會降低對手的防禦。\n也可以擊碎岩石。"
hm07:
  names:
    jp_kana: ひでんマシン０７
    jp_kanji: ひでんマシン０７
    en: HM07
    fr: CS07
    it: MN07
    de: VM07
    es: MO07
    ko: 비전머신07
    zh_simp: 秘传学习器07
    zh_trad: 秘傳學習器07
  descriptions:
    jp_kana: "１ターンめで　もぐり　２ターンめに\nうきあがって　こうげきする。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    en: "Diving on the first turn, the user floats up and\nattacks on the next turn."
    fr: "Le lanceur plonge sous l’eau au premier tour\net frappe au second."
    it: "Chi la usa si tuffa in acqua per emergere\ne attaccare al turno successivo."
    de: "Anwender taucht in Runde 1 ab und greift in\nRunde 2 aus der Tiefe an."
    es: "Ataca sumergiéndose en el agua en el primer turno\ny emergiendo violentamente en el segundo."
    ko: "1턴째에 잠수했다가 2턴째에\n떠올라 공격한다."
    zh_simp: "第１回合潜入，\n第２回合浮上来进行攻击。"
    zh_trad: "使用後的第１回合潛入水中，\n並於第２回合浮上來進行攻擊。"
holo_caster:female:
  names:
    jp_kana: ホロキャスター
    jp_kanji: ホロキャスター
    en: Holo Caster
    fr: Holokit
    it: Holovox
    de: Holo-Log
    es: Holomisor
    ko: 홀로캐스터
    zh_simp: 全息影像通讯器
    zh_trad: 全像投影通訊器
  descriptions:
    jp_kana: "じゅしんした　ホログラムの\nえいぞうデータを　いつでも\nみることが　できる　そうち。"
    jp_kanji: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    en: "A device that allows users to receive and view\nhologram clips at any time. It’s also used to chat\nwith others."
    fr: "Un appareil portable permettant de recevoir et de\nvisualiser des hologrammes à volonté."
    it: "Dispositivo in grado di ricevere e riprodurre\nin qualsiasi momento comunicazioni olografiche."
    de: "Ein Gerät, das Hologramm-Nachrichten empfangen\nund jederzeit abspielen kann."
    es: "Este aparato permite recibir vídeos holográficos\ny visualizarlos en cualquier momento."
    ko: "수신한 홀로그램\n영상 데이터를 언제라도\n볼 수 있는 장치."
    zh_simp: "可以随时查看接收到的\n全息影像数据的装置。"
    zh_trad: "可以隨時查看接收到的\n全像投影資料的裝置。"
holo_caster:male:
  names:
    jp_kana: ホロキャスター
    jp_kanji: ホロキャスター
    en: Holo Caster
    fr: Holokit
    it: Holovox
    de: Holo-Log
    es: Holomisor
    ko: 홀로캐스터
    zh_simp: 全息影像通讯器
    zh_trad: 全像投影通訊器
  descriptions:
    jp_kana: "じゅしんした　ホログラムの\nえいぞうデータを　いつでも\nみることが　できる　そうち。"
    jp_kanji: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    en: "A device that allows users to receive and view\nhologram clips at any time. It’s also used to chat\nwith others."
    fr: "Un appareil portable permettant de recevoir et de\nvisualiser des hologrammes à volonté."
    it: "Dispositivo in grado di ricevere e riprodurre\nin qualsiasi momento comunicazioni olografiche."
    de: "Ein Gerät, das Hologramm-Nachrichten empfangen\nund jederzeit abspielen kann."
    es: "Este aparato permite recibir vídeos holográficos\ny visualizarlos en cualquier momento."
    ko: "수신한 홀로그램\n영상 데이터를 언제라도\n볼 수 있는 장치."
    zh_simp: "可以随时查看接收到的\n全息影像数据的装置。"
    zh_trad: "可以隨時查看接收到的\n全像投影資料的裝置。"
hondew_berry:
  names:
    jp_kana: ロメのみ
    jp_kanji: ロメのみ
    en: Hondew Berry
    fr: Baie Lonme
    it: Baccamelon
    de: Honmelbeere
    es: Baya Meluce
    ko: 로매열매
    zh_simp: 哈密果
    zh_trad: 哈密果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nとくこうの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n特攻の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its base\nSp. Atk."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Attaque Spéciale de base."
    it: "Usata su un Pokémon, lo rende più affezionato,\nma ne diminuisce i punti base dell’Attacco\nSpeciale."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nSpezial-Angriffs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Ataque Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수공격의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但特攻的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得親密，\n但特攻的基礎點數會降低。"
honey:
  names:
    jp_kana: あまいミツ
    jp_kanji: あまいミツ
    en: Honey
    fr: Miel
    it: Miele
    de: Honig
    es: Miel
    ko: 달콤한꿀
    zh_simp: 甜甜蜜
    zh_trad: 甜甜蜜
  descriptions:
    jp_kana: "くさむらや　どうくつ　などで\nつかうと　あまいにおいに　さそわれて\nやせいポケモンが　あらわれる。"
    jp_kanji: "草むらや　洞窟などで\n使うと　あまいにおいに　誘われて\n野生ポケモンが　あらわれる。"
    en: "A sweet honey with a lush aroma that attracts wild\nPokémon when it is used in tall grass, in caves,\nor elsewhere."
    fr: "Un miel au parfum riche qui, utilisé dans l’herbe,\nune grotte ou sur des arbres spéciaux, attire les\nPokémon sauvages."
    it: "Miele dolce dall’aroma intenso che attrae\ni Pokémon selvatici. Si può usare nelle grotte,\nnell’erba alta o su alberi speciali."
    de: "Der Duft dieses Honigs lockt wilde Pokémon an.\nVerwende ihn in hohem Gras, Höhlen oder an\nanderen Orten."
    es: "Su delicioso aroma atrae a Pokémon salvajes si se usa\nen ciertos lugares como, por ejemplo, en las zonas de\nhierba alta o en el interior de las cuevas."
    ko: "풀밭이나 동굴 등에서 사용하면\n달콤한 냄새에 이끌려서\n야생 포켓몬이 나타난다."
    zh_simp: "在草丛或洞窟等地方使用后，\n被甜甜香气吸引的\n野生宝可梦就会出现。"
    zh_trad: "在草叢或洞窟等地方使用後，\n被甜甜香氣引誘的\n野生寶可夢就會出現。"
honor_of_kalos:
  names:
    jp_kana: カロスエンブレム
    jp_kanji: カロスエンブレム
    en: Honor of Kalos
    fr: Insigne de Kalos
    it: Emblema di Kalos
    de: Kalos-Emblem
    es: Emblema Kalos
    ko: 칼로스엠블럼
    zh_simp: 卡洛斯勋章
    zh_trad: 卡洛斯勳章
  descriptions:
    jp_kana: "カロスちほうで　すばらしい\nかつやくを　した　じんぶつに\nおくられる　きちょうな　シンボル。"
    jp_kanji: "カロス地方で　すばらしい\n活躍を　した　人物に\n贈られる　貴重な　シンボル。"
    en: "A precious symbol that is awarded only to an\nindividual who has done great things for the\nKalos region."
    fr: "Une récompense symbolique offerte à ceux qui ont\ncontribué de manière exceptionnelle à la grandeur\nde Kalos."
    it: "Prezioso riconoscimento conferito a coloro che\nsi sono distinti per gesta eccezionali nella regione\ndi Kalos."
    de: "Ein wertvolles Emblem, das all jenen überreicht\nwird, die Großes für die Kalos-Region vollbracht\nhaben."
    es: "Símbolo otorgado en reconocimiento a quienes\nhan realizado gestas excepcionales en la región\nde Kalos."
    ko: "칼로스지방에서\n훌륭한 활약을 한 인물에게\n주어지는 귀중한 심볼."
    zh_simp: "颁发给为卡洛斯地区\n作出杰出贡献的人的宝贵勋章。"
    zh_trad: "頒發給為卡洛斯地區\n帶來傑出貢獻的人的\n寶貴勳章。"
horsea_candy:
  names:
    jp_kana: タッツーのアメ
    jp_kanji: タッツーのアメ
    en: Horsea Candy
    fr: Bonbon Hypotrempe
    it: Caramella Horsea
    de: Seeper-Bonbon
    es: Caramelo Horsea
    ko: 쏘드라의사탕
    zh_simp: 墨海马的糖果
    zh_trad: 墨海馬的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
houndoominite:
  names:
    jp_kana: ヘルガナイト
    jp_kanji: ヘルガナイト
    en: Houndoominite
    fr: Démolossite
    it: Houndoomite
    de: Hundemonit
    es: Houndoomita
    ko: 헬가나이트
    zh_simp: 黑鲁加进化石
    zh_trad: 黑魯加進化石
  descriptions:
    jp_kana: "ヘルガーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヘルガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Houndoom hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Démolosse, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Houndoom, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Hundemon getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Houndoom en combate."
    ko: "헬가에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让黑鲁加携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓黑魯加攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
hp_up:
  names:
    jp_kana: マックスアップ
    jp_kanji: マックスアップ
    en: HP Up
    fr: PV Plus
    it: PS-Su
    de: KP-Plus
    es: Más PS
    ko: 맥스업
    zh_simp: HP增强剂
    zh_trad: HP增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ＨＰの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the base HP of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente les PV de base\nd’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dei PS."
    de: "Ein gehaltvolles Getränk, das den KP-Basiswert\neines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que potencia los PS de base de\nun Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\nHP的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\nHP的基礎點數。"
hyper_potion:
  names:
    jp_kana: すごいキズぐすり
    jp_kanji: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
    zh_simp: 厉害伤药
    zh_trad: 厲害傷藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n１２０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 120 HP to a single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 120 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 120 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n120 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura\n120 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n120만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复120HP。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復120HP。"
iapapa_berry:
  names:
    jp_kana: イアのみ
    jp_kanji: イアのみ
    en: Iapapa Berry
    fr: Baie Papaya
    it: Baccapaia
    de: Yapabeere
    es: Baya Pabaya
    ko: 파야열매
    zh_simp: 芭亚果
    zh_trad: 芭亞果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复HP。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復HP。\n如果討厭這味道就會混亂。"
ice_gem:
  names:
    jp_kana: こおりのジュエル
    jp_kanji: こおりのジュエル
    en: Ice Gem
    fr: Joyau Glace
    it: Bijoughiaccio
    de: Eisjuwel
    es: Gema Hielo
    ko: 얼음주얼
    zh_simp: 冰之宝石
    zh_trad: 冰之寶石
  descriptions:
    jp_kana: "こおりの　タイプの　ジュエル。\nもたせると　いちどだけ　こおりの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　ジュエル。\n持たせると　１度だけ　こおりの\n技の　威力が　強まる。"
    en: "A gem with an essence of ice. When held, it\nstrengthens the power of an Ice-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Ghiaccio."
    de: "Ein Juwel vom Typ Eis. Es erhöht einmalig die\nStärke einer Attacke vom Typ Eis."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Hielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 주얼.\n지니게 하면 한 번만 얼음\n기술의 위력이 강해진다."
    zh_simp: "冰属性的宝石。\n携带后，冰属性的\n招式威力仅会增强１次。"
    zh_trad: "冰屬性的寶石。\n攜帶後，冰屬性招式的\n威力會僅增強１次。"
ice_heal:
  names:
    jp_kana: こおりなおし
    jp_kanji: こおりなおし
    en: Ice Heal
    fr: Antigel
    it: Antigelo
    de: Eisheiler
    es: Antihielo
    ko: 얼음상태치료제
    zh_simp: 解冻药
    zh_trad: 解凍藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　こおりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　こおりの\n状態を　回復する。"
    en: "A spray-type medicine for treating freezing. It can be\nused to thaw out a single Pokémon that has been\nfrozen solid."
    fr: "Un médicament sous forme de spray.\nRéchauffe un Pokémon gelé."
    it: "Rimedio spray.\nCura un Pokémon dal congelamento."
    de: Ein Spray, das ein eingefrorenes Pokémon auftaut.
    es: Medicina en espray que descongela a un Pokémon.
    ko: "스프레이식의 약.\n포켓몬 1마리의\n얼음 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n冰冻状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n冰凍狀態。"
ice_memory:
  names:
    jp_kana: アイスメモリ
    jp_kanji: アイスメモリ
    en: Ice Memory
    fr: ROM Glace
    it: ROM Ghiaccio
    de: Eis-Disc
    es: Disco Hielo
    ko: 아이스메모리
    zh_simp: 冰雪存储碟
    zh_trad: 冰雪記憶碟
  descriptions:
    jp_kana: "こおりタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "こおりタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Ice-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Glace. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Ghiaccio in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Eis.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nHielo. Permite cambiar de tipo a cierto Pokémon."
    ko: "얼음타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有冰属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有冰屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
ice_stone:
  names:
    jp_kana: こおりのいし
    jp_kanji: こおりのいし
    en: Ice Stone
    fr: Pierre Glace
    it: Pietragelo
    de: Eisstein
    es: Piedra Hielo
    ko: 얼음의돌
    zh_simp: 冰之石
    zh_trad: 冰之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nゆきの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n雪の　模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has an unmistakable\nsnowflake pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Un flocon de neige semble dessiné dessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Si intravede l’immagine di\nun fiocco di neve."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er hat ein\nSchneeflockenmuster."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Presenta motivos que recuerdan a los\ncristales de hielo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈송이 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着雪花般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n有著雪花般的花紋。"
icicle_plate:
  names:
    jp_kana: つららのプレート
    jp_kanji: つららのプレート
    en: Icicle Plate
    fr: Plaque Glace
    it: Lastragelo
    de: Frosttafel
    es: Tabla Helada
    ko: 고드름플레이트
    zh_simp: 冰柱石板
    zh_trad: 冰柱石板
  descriptions:
    jp_kana: "こおりの　タイプの　せきばん。\nもたせると　こおりタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　石盤。\n持たせると　こおりタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Ice-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Ghiaccio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Eis."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Hielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 석판.\n지니게 하면 얼음타입\n기술의 위력이 강해진다."
    zh_simp: "冰属性的石板。\n携带后，冰属性的\n招式威力就会增强。"
    zh_trad: "冰屬性的石板。\n攜帶後，冰屬性的\n招式威力就會增強。"
icium_z:bag:
  names:
    jp_kana: コオリＺ
    jp_kanji: コオリＺ
    en: Icium Z
    fr: Cryozélite
    it: Glacium Z
    de: Glacium Z
    es: Criostal Z
    ko: 얼음Z
    zh_simp: 冰Ｚ
    zh_trad: 冰Ｚ
  descriptions:
    jp_kana: "こおりタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "こおりタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nIce-type moves to Ice-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Glace en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Ghiaccio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Eis-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nHielo en movimientos Z."
    ko: "얼음타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将冰属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把冰屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
icium_z:held:
  names:
    jp_kana: コオリＺ
    jp_kanji: コオリＺ
    en: Icium Z
    fr: Cryozélite
    it: Glacium Z
    de: Glacium Z
    es: Criostal Z
    ko: 얼음Z
    zh_simp: 冰Ｚ
    zh_trad: 冰Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nこおりタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nこおりタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Ice-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Glace en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Ghiaccio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Eis-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Hielo."
    ko: "Z파워의 결정.\n얼음타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将冰属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把冰屬性的招式\n升級為Ｚ招式。"
icy_rock:
  names:
    jp_kana: つめたいいわ
    jp_kanji: つめたいいわ
    en: Icy Rock
    fr: Roche Glace
    it: Rocciafredda
    de: Eisbrocken
    es: Roca Helada
    ko: 차가운바위
    zh_simp: 冰冷岩石
    zh_trad: 冰冷岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　あられを\nつかうと　いつもより　あられの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あられを\n使うと　いつもより　あられの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Hail when used by\nthe holder."
    fr: "Objet à tenir. Augmente la durée de la capacité Grêle\nutilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Grandine."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nHagelsturm, wenn der Träger diese Attacke\neinsetzt."
    es: "Prolonga la duración del movimiento Granizo que use\nel Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 싸라기눈을\n쓰면 여느 때보다 싸라기눈의\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出冰雹的话，\n冰雹的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出冰雹的話，\n冰雹的時間就會比平時更長。"
ilimas_normalium_z:
  names:
    jp_kana: イリマノーマルＺ
    jp_kanji: イリマノーマルＺ
    en: Ilima Normalium Z
    fr: Cristal Z Althéo
    it: Normium Z Liam
    de: Elimas Normium Z
    es: Cristal Z (Liam)
    ko: 일리마의 노말Z
    zh_simp: 伊利马的一般Ｚ
    zh_trad: 伊利馬一般Ｚ
  descriptions:
    jp_kana: "イリマから　あずかった　ノーマルＺ。\nしげみのどうくつ　おくにある\nだいざに　おくよう　たのまれた。"
    jp_kanji: "イリマから　預かった　ノーマルＺ。\n茂みの洞窟　奥にある\n台座に　置くよう　頼まれた。"
    en: "The Normalium Z you were entrusted with by Ilima.\nYou were asked to place it on the pedestal at\nthe back of Verdant Cavern."
    fr: "Une Normazélite qu’Althéo vous a confiée. Il vous\na demandé de la déposer sur le piédestal qui se trouve\nau fond de la Grotte Verdoyante."
    it: "Normium Z ricevuto da Liam. Devi porlo\nsul piedistallo dentro la Grotta Sottobosco."
    de: "Das Normium Z, das Elima dir anvertraut hat.\nEr hat dich gebeten, es in den Sockel in der\nVegetationshöhle zu legen."
    es: "Normastal Z que te entrega Liam para que lo deposites\nsobre el altar situado al fondo de la Cueva Sotobosque."
    ko: "일리마에게 받은 노말Z.\n우거진 동굴 안쪽에 있는\n대좌에 두도록 부탁받았다."
    zh_simp: "伊利马交给你保管的一般Ｚ。\n受人嘱托要把它放到\n葱郁洞窟深处的台座上。"
    zh_trad: "伊利馬交給你的一般Ｚ。\n有人拜託你把它放到\n蔥鬱洞窟深處的台座上。"
incinium_z:bag:
  names:
    jp_kana: ガオガエンＺ
    jp_kanji: ガオガエンＺ
    en: Incinium Z
    fr: Félinozélite
    it: Incineronium Z
    de: Fuegronium Z
    es: Incinostal Z
    ko: 어흥염Z
    zh_simp: 炽焰咆哮虎Ｚ
    zh_trad: 熾焰咆哮虎Ｚ
  descriptions:
    jp_kana: "ガオガエンの　ＤＤラリアットを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ガオガエンの　ＤＤラリアットを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nIncineroar’s Darkest Lariat to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Félinferno qui le tient à transformer\nson Dark Lariat en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Incineroar di trasformare la mossa\nBraccioteso in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Fuegros Attacke\nDark Lariat zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nIncineroar convertir su Lariat Oscuro en un\nmovimiento Z."
    ko: "어흥염의 DD래리어트를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将炽焰咆哮虎的DD金勾臂\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把熾焰咆哮虎的DD金勾臂\n升級為特殊Ｚ招式的Ｚ力量結晶。"
incinium_z:held:
  names:
    jp_kana: ガオガエンＺ
    jp_kanji: ガオガエンＺ
    en: Incinium Z
    fr: Félinozélite
    it: Incineronium Z
    de: Fuegronium Z
    es: Incinostal Z
    ko: 어흥염Z
    zh_simp: 炽焰咆哮虎Ｚ
    zh_trad: 熾焰咆哮虎Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nガオガエンの　ＤＤラリアットを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nガオガエンの　ＤＤラリアットを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Incineroar’s Darkest Lariat to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Dark Lariat d’un Félinferno en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Braccioteso\ndi Incineroar in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Fuegros Attacke Dark Lariat\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nLariat Oscuro de Incineroar."
    ko: "Z파워의 결정.\n어흥염의 DD래리어트를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将炽焰咆哮虎的DD金勾臂\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把熾焰咆哮虎的DD金勾臂\n升級為Ｚ招式。"
inquiry_mail:
  names:
    jp_kana: しつもんメール
    jp_kanji: しつもんメール
    en: Inquiry Mail
    fr: Lettre Demande
    it: Messaggio Chiedi
    de: Fragebrief
    es: Carta Pregunta
    ko: 질문메일
    zh_simp: 询问邮件
    zh_trad: 詢問郵件
  descriptions:
    jp_kana: "あいてへの　しつもんの　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手への　質問の　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier to pose a\nquestion about something. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour poser des questions.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere una domanda.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem eine Frage\nstellen kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para preguntar a un compañero. Haz que la\nentregue un Pokémon."
    ko: "상대에게 질문하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写询问对方这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫詢問對方這類郵件的信紙。\n需讓寶可夢攜帶使用。"
insect_plate:
  names:
    jp_kana: たまむしプレート
    jp_kanji: たまむしプレート
    en: Insect Plate
    fr: Plaque Insecte
    it: Lastrabaco
    de: Käfertafel
    es: Tabla Bicho
    ko: 비단벌레플레이트
    zh_simp: 玉虫石板
    zh_trad: 玉蟲石板
  descriptions:
    jp_kana: "むしの　タイプの　せきばん。\nもたせると　むしタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　石盤。\n持たせると　むしタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Bug-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Coleottero."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Käfer."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Bicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 석판.\n지니게 하면 벌레타입\n기술의 위력이 강해진다."
    zh_simp: "虫属性的石板。\n携带后，虫属性的\n招式威力就会增强。"
    zh_trad: "蟲屬性的石板。\n攜帶後，蟲屬性的\n招式威力就會增強。"
intriguing_stone:
  names:
    jp_kana: すごそうないし
    jp_kanji: すごそうないし
    en: Intriguing Stone
    fr: Pierre Insolite
    it: Sasso suggestivo
    de: Kurioser Stein
    es: Piedra Insólita
    ko: 대단할듯한돌
    zh_simp: 似珍石
    zh_trad: 似珍石
  descriptions:
    jp_kana: "みる　ひとに　よっては\nきちょう　かもしれない\nかなり　かわった　いし。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nかなり　変わった　石。"
    en: "A rather curious stone that might appear valuable\nto some. It’s all in the eye of the beholder."
    fr: "Une pierre assez étrange qui pourrait avoir de la valeur\npour certains."
    it: "Un sasso piuttosto singolare che qualcuno\npotrebbe ritenere di valore."
    de: "Ein ungewöhnlicher Stein, dessen Wert je nach\nBetrachter unterschiedlich eingeschätzt wird."
    es: "Una curiosa piedra que a algunos les puede parecer\nde gran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n꽤 특이한 돌."
    zh_simp: "在有些人看来\n可能会觉得它十分贵重。\n非常与众不同的石头。"
    zh_trad: "在某些人眼裡\n可能會覺得它十分貴重。\n頗與眾不同的石頭。"
iron:
  names:
    jp_kana: ブロムヘキシン
    jp_kanji: ブロムヘキシン
    en: Iron
    fr: Fer
    it: Ferro
    de: Eisen
    es: Hierro
    ko: 사포닌
    zh_simp: 防御增强剂
    zh_trad: 防禦增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed, it\nraises the base Defense stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente la Défense\nde base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Difesa."
    de: "Ein gehaltvolles Getränk, das den\nVerteidigungs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia la Defensa de base\nde un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n防御的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n防禦的基礎點數。"
iron_ball:
  names:
    jp_kana: くろいてっきゅう
    jp_kanji: くろいてっきゅう
    en: Iron Ball
    fr: Balle Fer
    it: Ferropalla
    de: Eisenkugel
    es: Bola Férrea
    ko: 검은철구
    zh_simp: 黑色铁球
    zh_trad: 黑色鐵球
  descriptions:
    jp_kana: "もたせると　すばやさが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめんわざが　あたって　しまう。"
    jp_kanji: "持たせると　素早さが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめん技が　当たってしまう。"
    en: "An item to be held by a Pokémon. It lowers Speed\nand allows Ground-type moves to hit Flying types\nand holders that are levitating."
    fr: "Objet à tenir. Réduit la Vitesse. Rend les porteurs\nde type Vol, ainsi que ceux en lévitation, sensibles\naux capacités de type Sol."
    it: "Riduce la Velocità e rende vulnerabili alle mosse\ndi tipo Terra se chi ce l’ha è di tipo Volante\no ha l’abilità Levitazione."
    de: "Ein Item zum Tragen. Macht Pokémon des Typs\nFlug oder mit der Fähigkeit Schwebe anfällig für\nBoden-Attacken. Senkt den Initiative-Wert."
    es: "Reduce la Velocidad. Los Pokémon que levitan y los\nde tipo Volador se tornan sensibles a movimientos\nde tipo Tierra."
    ko: "지니게 하면 스피드가 떨어진다.\n비행타입이나 부유포켓몬은\n땅 기술에 맞아 버린다."
    zh_simp: "携带后，速度会降低。\n飞行属性以及飘浮宝可梦\n会被地面招式击中。"
    zh_trad: "攜帶後，速度會降低。\n飛行屬性以及飄浮寶可夢\n會被地面招式擊中。"
iron_plate:
  names:
    jp_kana: こうてつプレート
    jp_kanji: こうてつプレート
    en: Iron Plate
    fr: Plaque Fer
    it: Lastraferro
    de: Eisentafel
    es: Tabla Acero
    ko: 강철플레이트
    zh_simp: 钢铁石板
    zh_trad: 鋼鐵石板
  descriptions:
    jp_kana: "はがねの　タイプの　せきばん。\nもたせると　はがねタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　石盤。\n持たせると　はがねタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Steel-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Stahl."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Acero. Debe llevarla un Pokémon."
    ko: "강철타입의 석판.\n지니게 하면 강철타입\n기술의 위력이 강해진다."
    zh_simp: "钢属性的石板。\n携带后，钢属性的\n招式威力就会增强。"
    zh_trad: "鋼屬性的石板。\n攜帶後，鋼屬性的\n招式威力就會增強。"
item_drop:
  names:
    jp_kana: アイテムドロップ
    jp_kanji: アイテムドロップ
    en: Item Drop
    fr: Jette Objet
    it: Lascioggetto
    de: Itemabwurf
    es: Tiraobjeto
    ko: 아이템드롭
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　なくす。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　なくす。"
    en: "When used, it causes an ally Pokémon to drop a\nheld item."
    fr: Retire tout objet tenu par un Pokémon de l’équipe.
    it: "Usandolo, un Pokémon della squadra lascerà\nil proprio strumento."
    de: "Der Mitstreiter lässt bei Gebrauch das von ihm\ngetragene Item fallen."
    es: "Cuando se usa, un Pokémon de tu equipo pierde\nsu objeto."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 잃어버린다."
    zh_simp: "使用后，能立刻丢弃\n我方宝可梦携带的道具。"
    zh_trad: "使用後，我方寶可夢\n能立刻丟棄攜帶的道具。"
item_urge:
  names:
    jp_kana: アイテムコール
    jp_kanji: アイテムコール
    en: Item Urge
    fr: Appel Objet
    it: Chiamoggetto
    de: Itemappell
    es: Activaobjeto
    ko: 아이템콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　すぐつかう。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　すぐ使う。"
    en: "When used, it causes an ally Pokémon to use its\nheld item."
    fr: "Permet d’utiliser immédiatement l’objet tenu\npar un Pokémon de l’équipe."
    it: "Usandolo, un Pokémon della squadra userà\nimmediatamente il proprio strumento."
    de: "Der Mitstreiter setzt bei Gebrauch sofort das von\nihm getragene Item ein."
    es: "Cuando se usa, un Pokémon de tu equipo utiliza\nsu objeto inmediatamente."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 바로 쓴다."
    zh_simp: "使用后，能立刻使用\n我方宝可梦携带的道具。"
    zh_trad: "使用後，我方寶可夢\n能立刻使用攜帶的道具。"
jaboca_berry:
  names:
    jp_kana: ジャポのみ
    jp_kanji: ジャポのみ
    en: Jaboca Berry
    fr: Baie Jaboca
    it: Baccajaba
    de: Jabocabeere
    es: Baya Jaboca
    ko: 자보열매
    zh_simp: 嘉珍果
    zh_trad: 嘉珍果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nぶつりわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "A Berry to be consumed by Pokémon. If a physical\nattack hits the Pokémon holding it, the attacker will\nalso be hurt."
    fr: "Tenue, cette Baie inflige des dégâts à l’attaquant\ns’il utilise une capacité physique qui atteint sa cible."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa fisica va a segno."
    de: "Als getragenes Item bewirkt diese Beere Schaden\nbei jenen, die den Träger mit einer physischen\nAttacke treffen."
    es: "Si la lleva un Pokémon cuando otro lanza un ataque\nfísico, este último también recibe daño."
    ko: "포켓몬에게 지니게 하면\n물리 기술을 당했을 때\n상대에게도 데미지를 준다."
    zh_simp: "让宝可梦携带后，\n在受到物理招式攻击时，\n能给予对手伤害。"
    zh_trad: "讓寶可夢攜帶後，\n在受到物理招式攻擊時，\n也能給予對手傷害。"
jade_orb:
  names:
    jp_kana: もえぎいろのたま
    jp_kanji: もえぎいろのたま
    en: Jade Orb
    fr: Orbe Vert
    it: Sfera Verde
    de: Grüne Kugel
    es: Esfera Verde
    ko: 연둣빛구슬
    zh_simp: 草绿色宝珠
    zh_trad: 草綠色寶珠
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    en: "A shiny green orb that is said to have a legend tied\nto it. It’s known to have a deep connection with the\nHoenn region."
    fr: "Un orbe viride dont on dit qu’il a un lien très étroit\navec les légendes de Hoenn."
    it: "Sfera con riflessi verdi, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Eine grün schimmernde Kugel, von der in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Esfera glauca de la que se dice que guarda una estrecha\nrelación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n초록색으로 빛나는 구슬."
    zh_simp: "散发着绿色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "據說和豐緣地區的傳說\n有著很深淵源的，\n散發著綠色光輝的寶珠。"
jaw_fossil:
  names:
    jp_kana: アゴのカセキ
    jp_kanji: アゴのカセキ
    en: Jaw Fossil
    fr: Fossile Mâchoire
    it: Fossilmascella
    de: Kieferfossil
    es: Fósil Mandíbula
    ko: 턱화석
    zh_simp: 颚之化石
    zh_trad: 顎之化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nおおきな　アゴの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n大きな　アゴの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks as if it could be a piece of a\nlarge jaw."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de mâchoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una grossa\nmascella."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie ein Kieferknochen aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece ser parte de una mandíbula."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n커다란 턱의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是很大的颚的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是很大的顎的一部分。"
jigglypuff_candy:
  names:
    jp_kana: プリンのアメ
    jp_kanji: プリンのアメ
    en: Jigglypuff Candy
    fr: Bonbon Rondoudou
    it: Caramella Jigglypuff
    de: Pummeluff-Bonbon
    es: Caramelo Jigglypuff
    ko: 푸린의사탕
    zh_simp: 胖丁的糖果
    zh_trad: 胖丁的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
