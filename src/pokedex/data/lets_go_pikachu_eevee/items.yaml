    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
ss_ticket:ss_anne:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket del Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "サント・アンヌごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    jp_kanji: "サント・アンヌ号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "The ticket required to board the S.S. Anne.\nIt has a drawing of a ship on it."
    fr: "Un ticket nécessaire pour embarquer à bord\nde L’Océane. Il y a une image du navire dessus."
    it: "Biglietto per salire sulla Motonave Anna.\nC’è disegnata sopra una nave."
    de: "Ein Ticket, das benötigt wird, um an Bord der MS Anne\nzu gehen. Das Schiff ist darauf abgebildet."
    es: "Billete necesario para embarcar en el S. S. Anne. Tiene\ndibujado un barco."
    ko: "상트앙느호에 탈 때\n필요한 승선 티켓.\n배 그림이 그려져 있다."
    zh_simp: "乘坐圣特安努号时所需的船票。\n上面绘有船只的图案。"
    zh_trad: "乘搭聖特安努號時\n所需的船票。\n上面畫了一艘船。"
ss_ticket:ss_aqua:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "こうそくせん　アクアごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    jp_kanji: "高速船アクア号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "A ticket required for sailing on the ferry S.S. Aqua.\nIt has a drawing of a ship on its front."
    fr: "Un ticket nécessaire pour embarquer sur le ferry\nL’Aquaria. Un bateau est dessiné dessus."
    it: "Biglietto per imbarcarsi sulla Motonave Acqua.\nC’è disegnata una nave."
    de: "Ein Ticket, um auf der MS Aqua zu fahren. Eine\nZeichnung der Fähre ist auf dem Ticket zu sehen."
    es: "Es el billete válido para embarcar en el Ferry S.S. Aqua.\nTiene dibujado un barco."
    ko: "쾌속선 아쿠아호에 탈 때\n필요한 승선티켓.\n배 그림이 그려져 있다."
    zh_simp: "乘坐高速船水流号时所需的船票。\n上面绘有船的图案。"
    zh_trad: "乘坐高速船水流號時\n所需的船票。\n上面繪有船的圖案。"
ss_ticket:ss_tidal:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto nave
    de: Bootsticket
    es: Ticket Barco
    ko: 승선티켓
    zh_simp: 船票
    zh_trad: 船票
  descriptions:
    jp_kana: "れんらくせんに\nのるとき　ひつよう。"
    jp_kanji: "連絡船に\n乗るとき　必要。"
    en: Ticket required for sailing on a ferry.
    fr: Indispensable pour prendre le ferry.
    it: Biglietto necessario per imbarcarsi su un traghetto.
    de: Ein Ticket, mit dem man die Fähre benutzen kann.
    es: Necesario para montar en barcos de línea regular.
    ko: "연락선에\n탈 때 필요하다."
    zh_simp: 乘坐渡船时需要用到。
    zh_trad: "乘坐交通船時\n需要用到。"
stable_mulch:
  names:
    jp_kana: ながながこやし
    jp_kanji: ながながこやし
    en: Stable Mulch
    fr: Fertistable
    it: Fertilsaldo
    de: Stabilmulch
    es: Abono Fijador
    ko: 오래오래비료
    zh_simp: 久久肥
    zh_trad: 久久肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
star_piece:
  names:
    jp_kana: ほしのかけら
    jp_kanji: ほしのかけら
    en: Star Piece
    fr: Morceau d’Étoile
    it: Pezzo Stella
    de: Sternenstück
    es: Trozo Estrella
    ko: 별의조각
    zh_simp: 星星碎片
    zh_trad: 星星碎片
  descriptions:
    jp_kana: "キラキラと　あかく　ひかる\nきれいな　ほうせきの　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　赤く　光る\nきれいな　宝石の　かけら。\nショップで　高く　売れる。"
    en: "A small shard of a beautiful gem that gives off\na distinctly red sparkle. It can be sold at a high price\nto shops."
    fr: "Un fragment de gemme qui brille d’un éclat rouge.\nPeut être vendu à bon prix aux magasins."
    it: "Frammento rosso acceso di una gemma.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Teil eines hübschen Edelsteins, der in rötlicher\nFarbe schimmert. Erzielt einen hohen Preis,\nwenn man ihn verkauft."
    es: "Fragmento de una bonita gema roja que puede\nvenderse muy caro en las tiendas."
    ko: "반짝반짝 빨갛게 빛나는\n예쁜 보석 조각.\n상점에서 비싸게 팔린다."
    zh_simp: "闪着红光且十分\n美丽的宝石碎片。\n可以在商店高价出售。"
    zh_trad: "閃著紅光且十分\n美麗的寶石碎片。\n可以在商店高價出售。"
stardust:
  names:
    jp_kana: ほしのすな
    jp_kanji: ほしのすな
    en: Stardust
    fr: Poussière Étoile
    it: Polvostella
    de: Sternenstaub
    es: Polvo Estelar
    ko: 별의모래
    zh_simp: 星星沙子
    zh_trad: 星星沙子
  descriptions:
    jp_kana: "てざわりが　サラサラの\nあかくて　きれいな　すな。\nショップで　やすく　うれる。"
    jp_kanji: "てざわりが　サラサラの\n赤くて　きれいな　砂。\nショップで　安く　売れる。"
    en: "Lovely red sand that flows between the fingers\nwith a loose, silky feel. It can be sold at a low price\nto shops."
    fr: "Du sable rouge ravissant, aux grains très fins.\nPeut être vendu aux magasins pour un peu d’argent."
    it: "Bella sabbia rossa dalla consistenza leggera\ne farinosa. Si può vendere a un prezzo piuttosto\nbasso nei negozi."
    de: "Schöner, roter Sand, der sich seidenweich anfühlt.\nEr ist von geringem Wert."
    es: "Bonita arena roja de tacto sedoso que no alcanza\nun buen precio en las tiendas."
    ko: "감촉이 보슬보슬한\n빨갛고 예쁜 모래.\n상점에서 싸게 팔린다."
    zh_simp: "手感细腻且十分\n美丽的红色沙子。\n可以在商店低价出售。"
    zh_trad: "手感細緻且十分\n美麗的紅色沙子。\n可以在商店低價出售。"
starf_berry:
  names:
    jp_kana: スターのみ
    jp_kanji: スターのみ
    en: Starf Berry
    fr: Baie Frista
    it: Baccambola
    de: Krambobeere
    es: Baya Arabol
    ko: 스타열매
    zh_simp: 星桃果
    zh_trad: 星桃果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　どれか　１つの\nのうりょくが　ぐーんと　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　どれか　１つの\n能力が　ぐーんと　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, one of its stats will sharply increase\nwhen it’s in a pinch."
    fr: "Tenue, cette Baie augmente beaucoup une des stats\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, una delle sue statistiche aumenta\ndi molto."
    de: "Als getragenes Item erhöht diese Beere einen\nStatuswert des Pokémon stark, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, aumenta mucho una\ncaracterística en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 능력 중의 하나가\n크게 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n某一项能力就会大幅提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，某一項能力\n就會大幅提高。"
staryu_candy:
  names:
    jp_kana: ヒトデマンのアメ
    jp_kanji: ヒトデマンのアメ
    en: Staryu Candy
    fr: Bonbon Stari
    it: Caramella Staryu
    de: Sterndu-Bonbon
    es: Caramelo Staryu
    ko: 별가사리의사탕
    zh_simp: 海星星的糖果
    zh_trad: 海星星的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
steel_gem:
  names:
    jp_kana: はがねのジュエル
    jp_kanji: はがねのジュエル
    en: Steel Gem
    fr: Joyau Acier
    it: Bijouacciaio
    de: Stahljuwel
    es: Gema Acero
    ko: 강철주얼
    zh_simp: 钢之宝石
    zh_trad: 鋼之寶石
  descriptions:
    jp_kana: "はがねの　タイプの　ジュエル。\nもたせると　いちどだけ　はがねの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　ジュエル。\n持たせると　１度だけ　はがねの\n技の　威力が　強まる。"
    en: "A gem with an essence of steel. When held, it\nstrengthens the power of a Steel-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Acciaio."
    de: "Ein Juwel vom Typ Stahl. Es erhöht einmalig die\nStärke einer Attacke vom Typ Stahl."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Acero. Debe llevarla un Pokémon."
    ko: "강철타입의 주얼.\n지니게 하면 한 번만 강철\n기술의 위력이 강해진다."
    zh_simp: "钢属性的宝石。\n携带后，钢属性的\n招式威力仅会增强１次。"
    zh_trad: "鋼屬性的寶石。\n攜帶後，鋼屬性招式的\n威力會僅增強１次。"
steel_memory:
  names:
    jp_kana: スチールメモリ
    jp_kanji: スチールメモリ
    en: Steel Memory
    fr: ROM Acier
    it: ROM Acciaio
    de: Stahl-Disc
    es: Disco Acero
    ko: 스틸메모리
    zh_simp: 钢铁存储碟
    zh_trad: 鋼鐵記憶碟
  descriptions:
    jp_kana: "はがねタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "はがねタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Steel-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Acier. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Acciaio in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Stahl.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nAcero. Permite cambiar de tipo a cierto Pokémon."
    ko: "강철타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有钢属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有鋼屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
steelium_z:bag:
  names:
    jp_kana: ハガネＺ
    jp_kanji: ハガネＺ
    en: Steelium Z
    fr: Métallozélite
    it: Metallium Z
    de: Metallium Z
    es: Metalostal Z
    ko: 강철Z
    zh_simp: 钢Ｚ
    zh_trad: 鋼Ｚ
  descriptions:
    jp_kana: "はがねタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "はがねタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nSteel-type moves to Steel-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Acier en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Acciaio in mosse Z."
    de: "Kristallisierte Z-Kraft, die Stahl-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nAcero en movimientos Z."
    ko: "강철타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将钢属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把鋼屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
steelium_z:held:
  names:
    jp_kana: ハガネＺ
    jp_kanji: ハガネＺ
    en: Steelium Z
    fr: Métallozélite
    it: Metallium Z
    de: Metallium Z
    es: Metalostal Z
    ko: 강철Z
    zh_simp: 钢Ｚ
    zh_trad: 鋼Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nはがねタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nはがねタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Steel-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Acier en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Acciaio\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Stahl-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Acero."
    ko: "Z파워의 결정.\n강철타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将钢属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把鋼屬性的招式\n升級為Ｚ招式。"
steelixite:
  names:
    jp_kana: ハガネールナイト
    jp_kanji: ハガネールナイト
    en: Steelixite
    fr: Steelixite
    it: Steelixite
    de: Stahlosnit
    es: Steelixita
    ko: 강철톤나이트
    zh_simp: 大钢蛇进化石
    zh_trad: 大鋼蛇進化石
  descriptions:
    jp_kana: "ハガネールに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ハガネールに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Steelix hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Steelix, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Steelix, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stahlos getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Steelix en combate."
    ko: "강철톤에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让大钢蛇携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓大鋼蛇攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sticker_bag:
  names:
    jp_kana: シールぶくろ
    jp_kanji: シールぶくろ
    en: Seal Bag
    fr: Sac Sceaux
    it: Bollosacca
    de: Stickertüte
    es: Bolsa Sellos
    ko: 실주머니
    zh_simp: 贴纸袋
    zh_trad: 貼紙袋
  descriptions:
    jp_kana: "シールが　１０まい　いれられる\nちっちゃな　ふくろ。"
    jp_kanji: "シールが　１０枚　いれられる\nちっちゃな　ふくろ。"
    en: "A tiny bag that can hold 10 Seals for decorating\nPoké Balls."
    fr: "Un petit sac pouvant contenir dix Sceaux pour décorer\nles Poké Balls."
    it: "Sacchettino che può contenere dieci bolli per\ndecorare le Poké Ball."
    de: "Ein kleines Tütchen. Es bietet Platz für bis zu\n10 Sticker für die Pokébälle."
    es: "Bolsita con capacidad para diez sellos de los que\ndecoran las Poké Balls."
    ko: "실이 10장 들어가는\n작은 주머니."
    zh_simp: "可以放入10张\n贴纸的小袋子。"
    zh_trad: "可以放入10張\n貼紙的小袋子。"
sticker_case:
  names:
    jp_kana: シールいれ
    jp_kanji: シールいれ
    en: Seal Case
    fr: Boîte Sceaux
    it: Portabolli
    de: Stickerkoffer
    es: Caja Sellos
    ko: 실상자
    zh_simp: 贴纸盒
    zh_trad: 貼紙盒
  descriptions:
    jp_kana: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    jp_kanji: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    en: "A case for storing Seals that can be applied to the\nexteriors of Poké Balls."
    fr: "Une boîte pouvant contenir des Sceaux à placer\nsur les capsules des Poké Balls."
    it: "Contenitore per conservare i bolli che possono\nessere applicati sulle capsule delle Poké Ball."
    de: "In diesem Koffer kannst du die Sticker für die\nBallkapseln der Pokébälle aufbewahren."
    es: "Caja en la que se pueden guardar los sellos que\nse aplican a las cápsulas de las Poké Balls."
    ko: "볼캡슐에 붙일 수 있는\n실이 들어 있는 용기."
    zh_simp: "放有贴在球壳上的\n贴纸的容器。"
    zh_trad: "放有貼在球殼上的\n貼紙的容器。"
sticky_barb:
  names:
    jp_kana: くっつきバリ
    jp_kanji: くっつきバリ
    en: Sticky Barb
    fr: Piquants
    it: Vischiopunta
    de: Klettdorn
    es: Toxiestrella
    ko: 끈적끈적바늘
    zh_simp: 附着针
    zh_trad: 附著針
  descriptions:
    jp_kana: "もたせると　まいターン　ダメージを\nうける。　じぶんに　ふれてきた\nあいてに　くっつくことも　ある。"
    jp_kanji: "持たせると　毎ターン　ダメージを\n受ける。　自分に　ふれてきた\n相手に　くっつくことも　ある。"
    en: "An item to be held by a Pokémon. It damages the\nholder every turn and may latch on to Pokémon\nthat touch the holder."
    fr: "Objet à tenir. Blesse le porteur à chaque tour.\nPeut s’accrocher aux ennemis qui attaquent le porteur."
    it: "Strumento che danneggia chi ce l’ha a ogni turno.\nPuò attaccarsi a un Pokémon che entra in contatto\ncon chi ce l’ha a causa di un attacco."
    de: "Ein Item zum Tragen. Schadet dem Träger in jeder\nRunde, kann aber an Angreifern haften bleiben,\ndie ihn berühren."
    es: "Daña en cada turno al Pokémon que la lleva. Puede\nadherirse al Pokémon que alcance con su ataque\nal portador."
    ko: "지니게 하면 매 턴 데미지를 입는다.\n자신에게 접촉해온 상대에게\n들러붙기도 한다."
    zh_simp: "携带后，每回合都会受到伤害。\n有时也会附着到\n碰到自己的对手身上。"
    zh_trad: "攜帶後，每回合都會受到傷害。\n有時也會附著到\n碰到自己的對手身上。"
stone_plate:
  names:
    jp_kana: がんせきプレート
    jp_kanji: がんせきプレート
    en: Stone Plate
    fr: Plaque Roc
    it: Lastrapietra
    de: Steintafel
    es: Tabla Pétrea
    ko: 암석플레이트
    zh_simp: 岩石石板
    zh_trad: 岩石石板
  descriptions:
    jp_kana: "いわの　タイプの　せきばん。\nもたせると　いわタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　石盤。\n持たせると　いわタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Rock-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Roccia."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gestein."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Roca. Debe llevarla un Pokémon."
    ko: "바위타입의 석판.\n지니게 하면 바위타입\n기술의 위력이 강해진다."
    zh_simp: "岩石属性的石板。\n携带后，岩石属性的\n招式威力就会增强。"
    zh_trad: "岩石屬性的石板。\n攜帶後，岩石屬性的\n招式威力就會增強。"
storage_key:galactic_warehouse:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé Stockage
    it: Depochiave
    de: Lagerschlüssel
    es: Llave Almacén
    ko: 창고열쇠
    zh_simp: 仓库钥匙
    zh_trad: 倉庫鑰匙
  descriptions:
    jp_kana: "トバリシティの　はずれにある\nギンガだんの　あやしい\nそうこに　はいるための　カギ。"
    jp_kanji: "トバリシティの　はずれにある\nギンガ団の　怪しい\n倉庫に　はいるための　カギ。"
    en: "The key to Team Galactic’s sinister warehouse\nlocated at the edge of Veilstone City."
    fr: "La clé de l’entrepôt de la Team Galaxie situé à\nla périphérie de Voilaroc."
    it: "Chiave del misterioso deposito del Team Galassia\nsituato ai confini di Rupepoli."
    de: "Der Schlüssel zur Lagerhalle von Team Galaktik am\nRande von Schleiede."
    es: "Llave del siniestro almacén del Equipo Galaxia que\nestá ubicado en las afueras de Ciudad Rocavelo."
    ko: "장막시티 변두리에 있는\n갤럭시단의 수상한 창고에\n들어가기 위한 열쇠다."
    zh_simp: "用于进入银河队在帷幕市市郊的\n可疑仓库的钥匙。"
    zh_trad: "用於進入銀河隊在\n帷幕市市郊的\n可疑倉庫的鑰匙。"
storage_key:sea_mauville:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé Stockage
    it: Chiave magazzino
    de: Lagerschlüssel
    es: Llave Almacén
    ko: 창고열쇠
    zh_simp: 仓库钥匙
    zh_trad: 倉庫鑰匙
  descriptions:
    jp_kana: "シーキンセツの　そうこに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　倉庫に\n入るための　カギ。"
    en: "A key that opens the storage hold inside\nSea Mauville."
    fr: La clé de la réserve de Lavandia Sea.
    it: Chiave per accedere al magazzino di Ciclamare.
    de: "Ein Schlüssel, der in das Schloss des Lagerraums\nauf Seewoge Malvenfroh passt."
    es: Llave de acceso al almacén de Malvamar.
    ko: "씨보라의 창고로\n들어가기 위한 열쇠."
    zh_simp: "进入海紫堇的仓库时\n所需的钥匙。"
    zh_trad: "用於進入\n海紫菫的房間的鑰匙。"
strange_souvenir:
  names:
    jp_kana: ふしぎなおきもの
    jp_kanji: ふしぎなおきもの
    en: Strange Souvenir
    fr: Bibelot Bizarre
    it: Strano ninnolo
    de: Skurriloskulptur
    es: Estatuilla Rara
    ko: 이상한장식품
    zh_simp: 神秘摆设
    zh_trad: 神秘擺設
  descriptions:
    jp_kana: "アローラちほうで　ふるくから\nまもりがみ　とされる　ふしぎな\nポケモンを　かたどった　おきもの。"
    jp_kanji: "アローラ地方で　古くから\n守り神　とされる　不思議な\nポケモンを　かたどった　置物。"
    en: "An ornament depicting a mysterious Pokémon\nthat has been venerated as a guardian deity\nfor an extremely long time in the Alola region."
    fr: "Un ornement à l’image d’un Pokémon vénéré à Alola\net considéré comme divinité protectrice depuis\ndes temps immémoriaux."
    it: "Statuetta raffigurante un Pokémon misterioso\nche ad Alola viene considerato una divinità\nprotettrice sin dall’antichità."
    de: "Eine Skulptur in Form eines wundersamen Pokémon,\ndas in der Alola-Region seit jeher als Schutzpatron\nangesehen wird."
    es: "Ornamento que representa a un Pokémon misterioso\nvenerado desde la antigüedad en Alola como espíritu\nprotector."
    ko: "알로라지방에서 예로부터\n수호신으로 여겨지는 신비한\n포켓몬을 본떠 만든 장식품."
    zh_simp: "在阿罗拉地区，据说是模仿\n古时候被称为守护神的\n神奇宝可梦而制作的摆设。"
    zh_trad: "據說是模仿自古以來\n在阿羅拉地區被稱為守護神的\n神奇寶可夢而製作的擺設。"
stretchy_spring:
  names:
    jp_kana: のびたバネ
    jp_kanji: のびたバネ
    en: Stretchy Spring
    fr: Ressort Détendu
    it: Molla elastica
    de: Spiralfeder
    es: Muelle Estirado
    ko: 늘어난용수철
    zh_simp: 松掉的弹簧
    zh_trad: 鬆掉的彈簧
  descriptions:
    jp_kana: "ほそくて　ちいさい　バネ。\nすっかり　のびきって　つかいみちが\nみつからない。"
    jp_kanji: "細くて　小さい　バネ。\nすっかり　伸びきって　使い道が\nみつからない。"
    en: "A thin small spring. It’s totally stretched out, and\nwhat it’s used for is unknown."
    fr: "Un petit ressort fin et complètement distendu.\nNul ne sait à quoi il peut bien servir."
    it: "Una molla piccola e sottile.\nÈ deformata e ormai inutilizzabile."
    de: "Eine kleine, dünne Feder, die bis zum Äußersten\ngedehnt wurde. Man kann nicht mehr erkennen,\nwofür sie ursprünglich verwendet wurde."
    es: "Muelle fino y pequeño. Está algo elongado y se\ndesconoce cuál puede ser su uso."
    ko: "가늘고 작은 용수철.\n완전히 늘어나서 어디에\n써야 할지 모르겠다."
    zh_simp: "细小的弹簧。\n被拉得太长了，\n不知道能派上什么用。"
    zh_trad: "細小的彈簧。\n已經完全鬆掉，\n找不到任何用途。"
suite_key:
  names:
    jp_kana: ルームキー
    jp_kanji: ルームキー
    en: Suite Key
    fr: Clé Chambre
    it: Chiave Suite
    de: B-Schlüssel
    es: Llave Suite
    ko: 룸키
    zh_simp: 房间钥匙
    zh_trad: 房間鑰匙
  descriptions:
    jp_kana: "みずうみの　ほとりにある\nこうきゅうホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    jp_kanji: "湖の　ほとりにある\n高級ホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    en: "A key to one of the suites at a certain luxury hotel\nby a lake. For some odd reason, it often disappears."
    fr: "La clé de l’une des suites de l’hôtel de luxe se trouvant\nprès du lac. Bizarrement, elle disparaît souvent."
    it: "Chiave di una suite vicino a un lago.\nPer ragioni misteriose, scompare spesso."
    de: "Schlüssel zu einer Hotelsuite.\nVerschwindet seltsamerweise immer wieder mal."
    es: "Llave de una suite del hotel de lujo junto al lago.\nPor algún motivo, se pierde a menudo."
    ko: "호수 근처에 있는 고급 호텔의 룸 키.\n왜인지는 모르나 잘 없어진다."
    zh_simp: "湖畔高级宾馆的房间钥匙。\n不知为何，它经常会丢失。"
    zh_trad: "湖畔高級旅館的房間鑰匙。\n不知為何老是搞丟。"
sun_flute:
  names:
    jp_kana: たいようのふえ
    jp_kanji: たいようのふえ
    en: Sun Flute
    fr: Flûte du Soleil
    it: Flauto solare
    de: Sonnenflöte
    es: Flauta Solar
    ko: 태양의피리
    zh_simp: 太阳之笛
    zh_trad: 太陽之笛
  descriptions:
    jp_kana: "たいようの　でんせつポケモンに\nかんしゃの　きもちを　あらわすため\nねいろを　ささげていた　という。"
    jp_kanji: "太陽の　伝説ポケモンに\n感謝の　気持ちを　表すため\n音色を　捧げていた　という。"
    en: "It is said that the tones it produces were offered\nup as an expression of gratitude to the Legendary\nPokémon of the sun."
    fr: "Une flûte dont le timbre permettait d’exprimer\nsa reconnaissance au Pokémon légendaire du soleil."
    it: "Flauto il cui dolce suono esprime la riconoscenza\ndegli esseri umani verso il Pokémon leggendario\ndel sole."
    de: "Auf dieser Flöte soll eine Melodie gespielt worden\nsein, um dem Legendären Sonnen-Pokémon Dank\nzu sagen."
    es: "Flauta que se hace sonar como muestra de gratitud\nhacia el Pokémon legendario del sol."
    ko: "태양의 전설포켓몬에게\n감사의 마음을 표현하기 위해\n음색을 바쳤다고 한다."
    zh_simp: "为了对太阳的\n传说的宝可梦表达感激之情，\n据说会用它来献上美乐。"
    zh_trad: "為了對太陽的\n傳說的寶可夢表達感激之情，\n據說會用牠來獻上美樂。"
sun_stone:
  names:
    jp_kana: たいようのいし
    jp_kanji: たいようのいし
    en: Sun Stone
    fr: Pierre Soleil
    it: Pietrasolare
    de: Sonnenstein
    es: Piedra Solar
    ko: 태양의돌
    zh_simp: 日之石
    zh_trad: 日之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたいようのように　あかい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n太陽のように　赤い。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It burns as red as the evening sun."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est rouge comme le soleil couchant."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È rossa come il sole\nal tramonto."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist rot wie die Abendsonne."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es roja como el núcleo del sol."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n태양처럼 빨갛다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像太阳一样赤红。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像太陽一樣赤紅。"
super_lure:
  names:
    jp_kana: シルバーコロン
    jp_kanji: シルバーコロン
    en: Super Lure
    fr: Super Parfum
    it: Superprofumo
    de: Super-Lockparfüm
    es: Supercolonia
    ko: 실버코롱
    zh_simp: 白银香水
    zh_trad: 白銀香水
  descriptions:
    jp_kana: "つかうと　めずらしい　ポケモンが\nでて　きやすく　なる　こうすい。\nむしよせコロンより　ながく　もつ。"
    jp_kanji: "使うと　珍しい　ポケモンが\n出て　きやすく　なる　香水。\nむしよせコロンより　長く　もつ。"
    en: "A glass bottle of perfume that makes rare Pokémon\nmore likely to appear. It lasts longer than a Lure."
    fr: "Une substance qui fait apparaître les Pokémon rares\nplus facilement pendant une durée plus longue que\nle Parfum."
    it: "Profumo che attira Pokémon rari.\nIl suo effetto dura più a lungo di quello\ndel Profumo invito."
    de: "Ein Parfüm, das für kurze Zeit vermehrt\nseltene Pokémon erscheinen lässt.\nWirkt länger als das Item Lockparfüm."
    es: "Colonia que atrae a los Pokémon raros y cuyo efecto\nes algo más duradero que el de la Colonia."
    ko: "사용하면 희귀한 포켓몬이\n나오기 쉬워지는 향수.\n벌레유인코롱보다 효과가 오래간다."
    zh_simp: "使用该香水后，\n稀有宝可梦会更容易出现。\n效果比引虫香水更持久。"
    zh_trad: "使用後，讓稀有寶可夢\n變得容易出現的香水。\n效果比引蟲香水更持久。"
super_potion:
  names:
    jp_kana: いいキズぐすり
    jp_kanji: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
    zh_simp: 好伤药
    zh_trad: 好傷藥
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n６０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A spray-type medicine for treating wounds. It can\nbe used to restore 60 HP to a single Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 60 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 60 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon um\n60 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura\n60 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
    zh_simp: "喷雾式伤药。\n能让１只宝可梦\n回复60HP。"
    zh_trad: "噴霧式傷藥。\n能讓１隻寶可夢\n回復60HP。"
super_repel:
  names:
    jp_kana: シルバースプレー
    jp_kanji: シルバースプレー
    en: Super Repel
    fr: Super Repousse
    it: Superrepellente
    de: Superschutz
    es: Superrepelente
    ko: 실버스프레이
    zh_simp: 白银喷雾
    zh_trad: 白銀噴霧
  descriptions:
    jp_kana: "つかうと　やせいの　ポケモンが\nにげていき　であわなく　なる。\nむしよけスプレーより　ながく　もつ。"
    jp_kanji: "使うと　野生の　ポケモンが\n逃げていき　出会わなく　なる。\nむしよけスプレーより　長く　もつ。"
    en: "An item that drives away wild Pokémon so you won’t\nencounter them. It lasts longer than a Repel."
    fr: "Repousse les Pokémon sauvages pendant une durée\nplus longue que celle du Repousse."
    it: "Strumento che mette in fuga i Pokémon selvatici,\npermettendo a chi lo usa di evitarli. Il suo effetto\ndura più a lungo di quello del Repellente."
    de: "Hält wilde Pokémon vom Anwender fern und\nbewirkt so, dass du keinen mehr begegnest.\nWirkt länger als das Item Schutz."
    es: "Evita encuentros con Pokémon salvajes durante más\ntiempo que un Repelente normal."
    ko: "사용하면 야생 포켓몬이\n도망가서 만나지 않게 된다.\n벌레회피스프레이보다 효과가 오래간다."
    zh_simp: "使用后，野生宝可梦就会逃走，\n接下来不会再遇到它们。\n效果比除虫喷雾更持久。"
    zh_trad: "使用後，野生寶可夢會跑掉，\n變得完全不會出現。\n效果比除蟲噴霧更持久。"
super_rod:
  names:
    jp_kana: すごいつりざお
    jp_kanji: すごいつりざお
    en: Super Rod
    fr: Méga Canne
    it: Super Amo
    de: Superangel
    es: Supercaña
    ko: 대단한낚싯대
    zh_simp: 厉害钓竿
    zh_trad: 厲害釣竿
  descriptions:
    jp_kana: "さいしんの　すごい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "最新の　すごい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An awesome, high-tech fishing rod. Use it at any\nbody of water to fish for wild aquatic Pokémon."
    fr: "Une canne à pêche ultramoderne.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo supertecnologico. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine wundervoll gefertigte Angel. Die beste Angel,\num Pokémon an Land zu ziehen."
    es: "Increíble caña de pescar de alta tecnología.\nPesca Pokémon salvajes en todo tipo de aguas."
    ko: "최신식의 대단한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
    zh_simp: "最新的厉害钓竿。\n在有水的地方使用的话，\n可以钓到宝可梦。"
    zh_trad: "最新的厲害釣竿。\n在有水的地方使用的話，\n可以釣到寶可夢。"
surge_badge:
  names:
    jp_kana: だいだいバッジ
    jp_kanji: だいだいバッジ
    en: Surge Badge
    fr: Fulguro-Badge
    it: Medaglia Tonante
    de: Gewitterorden
    es: Medalla Fulgor
    ko: 주황배지
    zh_simp: 桔色徽章
    zh_trad: 橘色徽章
  descriptions:
    jp_kana: "ジムオブカントーで　もらえる\nノベルティの　バッジ。　どこかの\nジムバッジを　まねているらしい。"
    jp_kanji: "ジムオブカントーで　もらえる\nノベルティの　バッジ。　どこかの\nジムバッジを　まねているらしい。"
    en: "A novelty badge that you can receive at the\nKantonian Gym. Rumor has it that it imitates\nthe Badge of a Gym somewhere."
    fr: "Un badge promotionnel que vous avez obtenu\nà l’Arène de Kanto. Il paraît que c’est une imitation\ndu Badge d’une certaine Arène."
    it: "Medaglia souvenir ottenuta alla Palestra di Kanto.\nSembra ispirata alla Medaglia di un’altra Palestra."
    de: "Ein Werbegeschenk, das man in der Kanto-Arena\nerhält. Es scheint sich dabei um die Nachbildung\neines Ordens einer bestimmten Arena zu handeln."
    es: "Medalla conseguida en el Gimnasio de Kanto. Su\naspecto guarda un sospechoso parecido con la\nmedalla de otro gimnasio."
    ko: "체육관오브관동에서 받을 수 있는\n노벨티 배지. 어딘가의\n체육관 배지를 흉내 낸듯하다."
    zh_simp: "能从关都之道馆那里得到的徽章赠品。\n好像仿照了某个地区的道馆徽章。"
    zh_trad: "可在關都之道館獲得的徽章贈品。\n聽說這好像是在模仿\n某個地方的道館徽章。"
surprise_mulch:
  names:
    jp_kana: びっくりこやし
    jp_kanji: びっくりこやし
    en: Surprise Mulch
    fr: Fertistantané
    it: Fertilsorpresa
    de: Wundermulch
    es: Abono Sorpresa
    ko: 깜놀비료
    zh_simp: 吃惊肥
    zh_trad: 吃驚肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
swampertite:
  names:
    jp_kana: ラグラージナイト
    jp_kanji: ラグラージナイト
    en: Swampertite
    fr: Laggronite
    it: Swampertite
    de: Sumpexnit
    es: Swampertita
    ko: 대짱이나이트
    zh_simp: 巨沼怪进化石
    zh_trad: 巨沼怪進化石
  descriptions:
    jp_kana: "ラグラージに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラグラージに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Swampert hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Laggron, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Swampert, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Sumpex getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Swampert en combate."
    ko: "대짱이에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨沼怪携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨沼怪攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
sweet_heart:
  names:
    jp_kana: ハートスイーツ
    jp_kanji: ハートスイーツ
    en: Sweet Heart
    fr: Chococœur
    it: Dolcecuore
    de: Herzkonfekt
    es: Corazón Dulce
    ko: 하트스위트
    zh_simp: 心形甜点
    zh_trad: 心形甜點
  descriptions:
    jp_kana: "とても　あまったるい　チョコレート。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "とても　甘ったるい　チョコレート。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A piece of cloyingly sweet chocolate.\nWhen consumed, it restores 20 HP to an\ninjured Pokémon."
    fr: "Un chocolat extrêmement sucré.\nRestaure 20 PV d’un Pokémon."
    it: "Cioccolato molto dolce.\nRestituisce 20 PS a un Pokémon."
    de: "Ein süßer Schokosnack, der die KP eines Pokémon\num 20 Punkte auffüllt."
    es: "Chocolatina de sabor dulce. Restaura 20 PS de\nun Pokémon."
    ko: "지나칠 정도로 달콤한 초콜릿.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "非常甜腻的巧克力。\n能让１只宝可梦\n回复20HP。"
    zh_trad: "非常甜膩的巧克力。\n能讓１隻寶可夢\n回復20HP。"
swift_feather:
  names:
    jp_kana: しゅんぱつのハネ
    jp_kanji: しゅんぱつのハネ
    en: Swift Wing
    fr: Aile Sprint
    it: Piumreazione
    de: Flinkfeder
    es: Pluma Ímpetu
    ko: 순발력날개
    zh_simp: 瞬发之羽
    zh_trad: 瞬發之羽
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　すばやさの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　素早さの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon. It slightly increases\nthe base Speed stat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Vitesse de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Velocità."
    de: "Wendet man dieses Item auf ein Pokémon an,\nwird dessen Initiative-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco la Velocidad de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 스피드\n기초 포인트를 조금 올린다."
    zh_simp: "用于宝可梦的道具。\n能稍微提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "用於寶可夢的道具。\n能稍微提高１隻寶可夢的\n速度的基礎點數。"
tamato_berry:
  names:
    jp_kana: マトマのみ
    jp_kanji: マトマのみ
    en: Tamato Berry
    fr: Baie Tamato
    it: Baccamodoro
    de: Tamotbeere
    es: Baya Tamate
    ko: 토망열매
    zh_simp: 茄番果
    zh_trad: 茄番果
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nすばやさの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n素早さの　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon. Using it on a\nPokémon makes it more friendly but lowers its\nbase Speed."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Vitesse de base."
    it: "Usata su un Pokémon, lo rende più affezionato,\nma ne diminuisce i punti base della Velocità."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nInitiative-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Velocidad de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n스피드의 기초 포인트가 떨어진다."
    zh_simp: "如果把它交给宝可梦，\n宝可梦就会变得非常容易和训练家亲密，\n但速度的基础点数会降低。"
    zh_trad: "如果把它餵給寶可夢，\n寶可夢會非常容易和訓練家變得親密，\n但速度的基礎點數會降低。"
tanga_berry:
  names:
    jp_kana: タンガのみ
    jp_kanji: タンガのみ
    en: Tanga Berry
    fr: Baie Panga
    it: Baccaitan
    de: Tanigabeere
    es: Baya Yecana
    ko: 리체열매
    zh_simp: 扁樱果
    zh_trad: 扁櫻果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　むし　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　むし技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nBug-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Insecte."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Coleottero del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Käfer."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Bicho de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 벌레 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的虫属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的蟲屬性招式\n攻擊時，能使其威力減弱。"
tangela_candy:
  names:
    jp_kana: モンジャラのアメ
    jp_kanji: モンジャラのアメ
    en: Tangela Candy
    fr: Bonbon Saquedeneu
    it: Caramella Tangela
    de: Tangela-Bonbon
    es: Caramelo Tangela
    ko: 덩쿠리의사탕
    zh_simp: 蔓藤怪的糖果
    zh_trad: 蔓藤怪的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
tapunium_z:bag:
  names:
    jp_kana: カプＺ
    jp_kanji: カプＺ
    en: Tapunium Z
    fr: Tokozélite
    it: Tapium Z
    de: Kapium Z
    es: Tapistal Z
    ko: 카푸Z
    zh_simp: 卡璞Ｚ
    zh_trad: 卡璞Ｚ
  descriptions:
    jp_kana: "カプたちの　しぜんのいかりを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "カプたちの　しぜんのいかりを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade the\ntapu’s Nature’s Madness to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Pokémon Tutélaire qui le tient à\ntransformer son Ire de la Nature en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Tapu di trasformare la mossa\nIra della Natura in una mossa Z."
    de: "Kristallisierte Z-Kraft, die die Kapu-Attacke\nNaturzorn zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a los\nTapu convertir su Furia Natural en un movimiento Z."
    ko: "카푸들의 자연의분노를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将卡璞们的自然之怒\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把卡璞們的自然之怒\n升級為特殊Ｚ招式的Ｚ力量結晶。"
tapunium_z:held:
  names:
    jp_kana: カプＺ
    jp_kanji: カプＺ
    en: Tapunium Z
    fr: Tokozélite
    it: Tapium Z
    de: Kapium Z
    es: Tapistal Z
    ko: 카푸Z
    zh_simp: 卡璞Ｚ
    zh_trad: 卡璞Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nカプたちの　しぜんのいかりを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nカプたちの　しぜんのいかりを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power. It upgrades\nthe tapu’s Nature’s Madness to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer l’Ire de la Nature d’un Toko en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ira della Natura\ndei Tapu in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft die Kapu-Attacke Naturzorn\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nFuria Natural de los Tapu."
    ko: "Z파워의 결정.\n카푸들의 자연의분노를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将卡璞们的自然之怒\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把卡璞們的自然之怒\n升級為Ｚ招式。"
tauros_candy:
  names:
    jp_kana: ケンタロスのアメ
    jp_kanji: ケンタロスのアメ
    en: Tauros Candy
    fr: Bonbon Tauros
    it: Caramella Tauros
    de: Tauros-Bonbon
    es: Caramelo Tauros
    ko: 켄타로스의사탕
    zh_simp: 肯泰罗的糖果
    zh_trad: 肯泰羅的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
tea:
  names:
    jp_kana: おちゃ
    jp_kanji: おちゃ
    en: Tea
    fr: Thé
    it: Tè
    de: Tee
    es: Té
    ko: 차
    zh_simp: 茶
    zh_trad: 茶
  descriptions:
    jp_kana: "すこし　にがくて\nこうばしい　かおりの　おちゃ。\nかわいた　のどが　うるおう。"
    jp_kanji: "すこし　苦くて\n芳ばしい　香りの　お茶。\nかわいた　喉が　うるおう。"
    en: "Aromatic tea that has a slightly bitter taste.\nIt soothes a dry throat."
    fr: "Un thé aromatique légèrement amer.\nIl a des vertus désaltérantes."
    it: "Un tè fragrante dal sapore amarognolo.\nMolto dissetante."
    de: "Ein aromatischer Tee mit leicht bitterem Geschmack.\nGenau das Richtige, um den Durst zu stillen."
    es: "Un aromático té de sabor ligeramente amargo que\nresulta ideal para aplacar la sed."
    ko: "약간 씁쓸하고\n구수한 향기가 나는 차.\n말랐던 목이 촉촉해진다."
    zh_simp: "有一点点苦，\n却又芬芳宜人的香茶。\n抿一口，清咽润喉。"
    zh_trad: "散發著撲鼻芳香，\n喝起來有點苦澀的茶。\n能滋潤乾渴的喉嚨。"
tentacool_candy:
  names:
    jp_kana: メノクラゲのアメ
    jp_kanji: メノクラゲのアメ
    en: Tentacool Candy
    fr: Bonbon Tentacool
    it: Caramella Tentacool
    de: Tentacha-Bonbon
    es: Caramelo Tentacool
    ko: 왕눈해의사탕
    zh_simp: 玛瑙水母的糖果
    zh_trad: 瑪瑙水母的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
terrain_extender:
  names:
    jp_kana: グランドコート
    jp_kanji: グランドコート
    en: Terrain Extender
    fr: Champ’Duit
    it: Fissacampo
    de: Feldbeschichtung
    es: Cubresuelos
    ko: 그라운드코트
    zh_simp: 大地膜
    zh_trad: 大地膜
  descriptions:
    jp_kana: "もたせた　ポケモンが　わざや\nとくせいで　フィールドを　はったとき\nいつもよりも　ながく　のこる。"
    jp_kanji: "持たせた　ポケモンが　技や\n特性で　フィールドを　張ったとき\nいつもよりも　長く　残る。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the terrain caused by the holder’s move\nor Ability."
    fr: "Objet à tenir. Augmente la durée des champs\nque le Pokémon peut créer sur le terrain avec\nune capacité ou un talent."
    it: "Se un Pokémon ha questo strumento, l’effetto di\nuna sua mossa o abilità che modifica il campo\ndi lotta durerà più a lungo."
    de: "Ein Item zum Tragen. Hat der Träger durch eine\nAttacke oder eine Fähigkeit ein Feld erzeugt,\nverlängert sich dessen Dauer."
    es: "Al llevarlo, prolonga la duración de los campos creados\npor el Pokémon en el terreno de combate mediante\nmovimientos o su habilidad."
    ko: "지니게 한 포켓몬이 기술이나\n특성으로 필드를 사용했을 때\n여느 때보다 긴 시간 동안 지속된다."
    zh_simp: "当携带它的宝可梦\n利用招式或特性展开场地时，\n场地的持续时间会比平时更长。"
    zh_trad: "當攜帶它的寶可夢\n透過招式或特性展開場地時，\n場地的持續時間會比平時更長。"
thanks_mail:
  names:
    jp_kana: かんしゃメール
    jp_kanji: かんしゃメール
    en: Thanks Mail
    fr: Lettre Merci
    it: Messaggio Grazie
    de: Dankesbrief
    es: Carta Gracias
    ko: 감사메일
    zh_simp: 感谢邮件
    zh_trad: 感謝郵件
  descriptions:
    jp_kana: "かんしゃを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "感謝を　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy for you to\nexpress thanks. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres idéal pour les remerciements.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere dei\nringraziamenti.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man sich bei jemandem\nbedanken kann. Gib es einem Pokémon zum Tragen."
    es: "Carta de agradecimiento. Haz que la entregue\nun Pokémon."
    ko: "감사의 마음을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "方便写表达感谢这类邮件的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "方便寫表達感謝這類郵件的信紙。\n需讓寶可夢攜帶使用。"
thick_club:
  names:
    jp_kana: ふといホネ
    jp_kanji: ふといホネ
    en: Thick Club
    fr: Masse Os
    it: Ossospesso
    de: Kampfknochen
    es: Hueso Grueso
    ko: 굵은뼈
    zh_simp: 粗骨头
    zh_trad: 粗骨頭
  descriptions:
    jp_kana: "なにかの　かたい　ホネ。\nカラカラ　または　ガラガラに\nもたせると　こうげきが　あがる。"
    jp_kanji: "なにかの　硬い　ホネ。\nカラカラ　または　ガラガラに\n持たせると　攻撃が　あがる。"
    en: "An item to be held by Cubone or Marowak. It’s a\nhard bone of some sort that boosts the\nAttack stat."
    fr: "Objet à faire tenir à Osselait ou Ossatueur.\nUn os dur qui augmente leur Attaque."
    it: "Strumento da dare a Cubone o Marowak.\nOsso duro che migliora la potenza delle\nmosse fisiche."
    de: "Ein harter Knochen, der den Angriffs-Wert von\nTragosso oder Knogga erhöht, wenn sie ihn tragen."
    es: "Un extraño tipo de hueso que potencia los ataques\nfísicos de Cubone y Marowak cuando lo llevan."
    ko: "무언가의 단단한 뼈.\n탕구리 혹은 텅구리에게\n지니게 하면 공격이 올라간다."
    zh_simp: "某种坚硬的骨头。\n让卡拉卡拉或嘎啦嘎啦携带后，\n攻击就会提高。"
    zh_trad: "某種堅硬的骨頭。\n讓卡拉卡拉或嘎啦嘎啦攜帶後，\n攻擊就會提高。"
thunder_stone:
  names:
    jp_kana: かみなりのいし
    jp_kanji: かみなりのいし
    en: Thunder Stone
    fr: Pierre Foudre
    it: Pietratuono
    de: Donnerstein
    es: Piedra Trueno
    ko: 천둥의돌
    zh_simp: 雷之石
    zh_trad: 雷之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nいなずまの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n稲妻の　模様が　ある。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It has a distinct thunderbolt pattern."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Un éclair est dessiné dessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Riporta l’immagine di un fulmine."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er hat ein Blitzmuster."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Tiene grabado un rayo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n천둥번개 무늬가 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n有着闪电般的花纹。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n上面有著閃電花紋。"
tidal_bell:
  names:
    jp_kana: うみなりのスズ
    jp_kanji: うみなりのスズ
    en: Tidal Bell
    fr: Glas Tempête
    it: Campana Onda
    de: Gischtglocke
    es: Campana Oleaje
    ko: 해명의방울
    zh_simp: 海声铃铛
    zh_trad: 海聲鈴鐺
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that makes a gentle\nringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona\npace al cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten alle\nbesänftigt, die es hören."
    es: "Campana de aspecto antiguo que emite un sonido\nque calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
    zh_simp: "能发出静心宁神音色的，\n非常古旧的铃铛。"
    zh_trad: "能發出使人心情平靜音色的，\n非常古老的鈴鐺。"
timer_ball:
  names:
    jp_kana: タイマーボール
    jp_kanji: タイマーボール
    en: Timer Ball
    fr: Chrono Ball
    it: Timer Ball
    de: Timerball
    es: Turno Ball
    ko: 타이마볼
    zh_simp: 计时球
    zh_trad: 計時球
  descriptions:
    jp_kana: "ターンすうが　かかれば　かかるほど\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "ターン数が　かかれば　かかるほど\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that becomes\nprogressively more effective the more turns that\nare taken in battle."
    fr: "Une Poké Ball un peu spéciale qui fonctionne de mieux\nen mieux à mesure que le combat s’éternise."
    it: "Poké Ball un po’ diversa che diventa\nprogressivamente più efficace con il passare\ndei turni nella lotta."
    de: "Ein Ball, der mit zunehmender Kampfdauer\neffektiver wird."
    es: "Una Poké Ball algo distinta que va mejorando su\nrendimiento con cada turno de combate."
    ko: "턴 수가 길어지면 길어질수록\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
    zh_simp: "有点与众不同的球。\n回合数花费得越多，\n宝可梦就会越容易捕捉。"
    zh_trad: "有點與眾不同的球。\n回合數花費得越多，\n就越容易捉到寶可夢。"
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    jp_kanji: ちいさなキノコ
    en: Tiny Mushroom
    fr: Petit Champi
    it: Minifungo
    de: Minipilz
    es: Miniseta
    ko: 작은버섯
    zh_simp: 小蘑菇
    zh_trad: 小蘑菇
  descriptions:
    jp_kana: "ちいさな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nけっこう　にんきが　たかい。"
    jp_kanji: "ちいさな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nけっこう　人気が　高い。"
    en: "A very small and rare mushroom. It’s popular with\na certain class of collectors."
    fr: "Un petit champignon assez rare.\nIl est plutôt populaire parmi certains fans dévoués."
    it: "Fungo piccolo e raro.\nÈ discretamente apprezzato da alcuni intenditori."
    de: "Ein kleiner und seltener Pilz. Sammler sind ganz aus\ndem Häuschen, wenn sie einen finden."
    es: "Una pequeña seta que es poco común y bastante\npopular entre determinados grupos de gourmets."
    ko: "작고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
    zh_simp: "珍稀的小蘑菇。\n在一些爱好者中\n有着相当高的人气。"
    zh_trad: "稀奇的小蘑菇。\n在部分愛好者間\n頗受歡迎。"
tm001:
  names:
    jp_kana: わざマシン０１
    jp_kanji: わざマシン０１
    en: TM01
    fr: CT01
    it: MT01
    de: TM01
    es: MT01
    ko: 기술머신01
    zh_simp: 招式学习器01
    zh_trad: 招式學習器01
  descriptions:
    jp_kana: "あたまを　つきだして\nまっすぐ　つっこんで　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "頭を　突きだして\nまっすぐ　つっこんで　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user sticks out its head and attacks by charging\nstraight into the target. This may also make the\ntarget flinch."
    fr: "Le lanceur donne un coup de tête.\nPeut apeurer l’ennemi."
    it: "Chi la usa si lancia diritto di testa contro\nil bersaglio. Può anche farlo tentennare."
    de: "Rammt das Ziel mit einer Kopfnuss. Ziel schreckt\neventuell zurück."
    es: "Lanza un potente cabezazo que puede hacer \nretroceder al objetivo."
    ko: "머리를 내밀어\n곧장 돌진하여 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将头伸出，\n笔直地扑向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將頭伸出，\n直直衝向對手進行攻擊。\n有時會讓對手畏縮。"
tm002:
  names:
    jp_kana: わざマシン０２
    jp_kanji: わざマシン０２
    en: TM02
    fr: CT02
    it: MT02
    de: TM02
    es: MT02
    ko: 기술머신02
    zh_simp: 招式学习器02
    zh_trad: 招式學習器02
  descriptions:
    jp_kana: "あいてを　おこらせる。　３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなく　なる。"
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser que des\nattaques pendant trois tours."
    it: "Provoca il bersaglio inducendolo a usare\nsolo mosse d’attacco per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use movimientos\nde ataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手\n只能使出给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tm003:
  names:
    jp_kana: わざマシン０３
    jp_kanji: わざマシン０３
    en: TM03
    fr: CT03
    it: MT03
    de: TM03
    es: MT03
    ko: 기술머신03
    zh_simp: 招式学习器03
    zh_trad: 招式學習器03
  descriptions:
    jp_kana: "なかまを　たすける。\nてだすけ　された　ポケモンの　わざの\nいりょくは　いつもより　おおきく　なる。"
    jp_kanji: "仲間を　助ける。\nてだすけ　された　ポケモンの　技の\n威力は　いつもより　大きくなる。"
    en: "The user assists an ally by boosting the power of\nthat ally’s attack."
    fr: "Une capacité qui augmente la puissance d’attaque\nd’un allié."
    it: "Mossa che aumenta la potenza dell’attacco\ndi un alleato."
    de: "Anwender steigert die Kraft eines Angriffes eines\nMitstreiters."
    es: "El usuario ayuda a un aliado reforzando la potencia\nde su ataque."
    ko: "동료를 돕는다.\n도움받은 포켓몬이 쓰는 기술의\n위력은 여느 때보다 커진다."
    zh_simp: "帮助伙伴。\n被帮助的宝可梦，\n其招式威力变得比平时大。"
    zh_trad: "幫助夥伴。\n被幫助的寶可夢，\n招式的威力會比原來更大。"
tm004:
  names:
    jp_kana: わざマシン０４
    jp_kanji: わざマシン０４
    en: TM04
    fr: CT04
    it: MT04
    de: TM04
    es: MT04
    ko: 기술머신04
    zh_simp: 招式学习器04
    zh_trad: 招式學習器04
  descriptions:
    jp_kana: "ねんりきを　つかい　いっしゅんで\nひかえの　ポケモンと　いれかわる。"
    jp_kanji: "念力を　使い　一瞬で\n控えの　ポケモンと　入れかわる。"
    en: "The user switches places with a different Pokémon\ninstantly, using telekinetic power."
    fr: "Le lanceur utilise sa force psychique pour se téléporter\net échanger sa place avec un autre Pokémon de l’équipe."
    it: "Chi la usa sfrutta la psicocinesi per farsi sostituire\nda un Pokémon della squadra."
    de: "Anwender nutzt telekinetische Energie, um sich sofort\ngegen ein anderes Pokémon auszutauschen."
    es: "El usuario emplea sus poderes telequinéticos para\ncambiar al instante el puesto con otro miembro del\nequipo."
    ko: "염동력을 사용해서 순식간에\n교대 포켓몬과 교체한다."
    zh_simp: "使用念力，\n瞬间与后备宝可梦进行替换。"
    zh_trad: "使用念力，\n瞬間與後備寶可夢替換。"
tm005:
  names:
    jp_kana: わざマシン０５
    jp_kanji: わざマシン０５
    en: TM05
    fr: CT05
    it: MT05
    de: TM05
    es: MT05
    ko: 기술머신05
    zh_simp: 招式学习器05
    zh_trad: 招式學習器05
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむり　つづける。\nじぶんの　ＨＰと　じょうたいいじょうを\nすべて　かいふく　する。"
    jp_kanji: "２ターンの　間　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two turns. This fully restores\nthe user’s HP and heals any status conditions."
    fr: "Le lanceur regagne tous ses PV et soigne ses altérations\nde statut, puis il dort pendant deux tours."
    it: "Chi la usa recupera tutti i PS e guarisce da tutti\ni suoi problemi di stato, ma dorme per due turni."
    de: "Anwender wird vollkommen geheilt, von allen\nStatusproblemen befreit und schläft die folgenden\nzwei Runden."
    es: "Restaura todos los PS y cura todos los problemas de \nestado del usuario. Duerme los dos próximos turnos."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
    zh_simp: "连续睡上２回合。\n回复自己的全部HP\n以及治愈所有异常状态。"
    zh_trad: "連續睡２回合。\n回復自己的全部HP\n以及治癒所有異常狀態。"
tm006:
  names:
    jp_kana: わざマシン０６
    jp_kanji: わざマシン０６
    en: TM06
    fr: CT06
    it: MT06
    de: TM06
    es: MT06
    ko: 기술머신06
    zh_simp: 招式学习器06
    zh_trad: 招式學習器06
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅ　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom special attacks for five turns."
    fr: "Un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités spéciales durant cinq tours."
    it: "Innalza una barriera di luce fantastica che riduce\ni danni degli attacchi speciali per sé e gli alleati\nper cinque turni."
    de: "Erzeugt eine Lichtwand und senkt den Schaden\ndurch Spezial-Angriffe für fünf Runden."
    es: "Pared de luz que reduce durante cinco turnos el daño\nproducido por los ataques especiales."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 특수공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的特殊攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的特殊攻擊傷害。"
tm007:
  names:
    jp_kana: わざマシン０７
    jp_kanji: わざマシン０７
    en: TM07
    fr: CT07
    it: MT07
    de: TM07
    es: MT07
    ko: 기술머신07
    zh_simp: 招式学习器07
    zh_trad: 招式學習器07
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと　しっぱい　しやすい。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "Enables the user to protect itself from all attacks.\nIts chance of failing rises if it is used in succession."
    fr: "Le lanceur esquive toutes les attaques.\nLe risque d’échec augmente lorsque la capacité\nest utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender wehrt jede Attacke ab.\nScheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa \nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
tm008:
  names:
    jp_kana: わざマシン０８
    jp_kanji: わざマシン０８
    en: TM08
    fr: CT08
    it: MT08
    de: TM08
    es: MT08
    ko: 기술머신08
    zh_simp: 招式学习器08
    zh_trad: 招式學習器08
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの　みがわりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user makes a copy of itself using some of its HP.\nThe copy serves as the user’s decoy."
    fr: "Le lanceur fait une copie de lui-même en sacrifiant\nquelques PV. La copie sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando\nalcuni PS. La copia serve come esca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP ein, um\neinen Doppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un sustituto\nque actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的HP，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的HP，\n製造分身。\n分身將成為自己的替身。"
tm009:
  names:
    jp_kana: わざマシン０９
    jp_kanji: わざマシン０９
    en: TM09
    fr: CT09
    it: MT09
    de: TM09
    es: MT09
    ko: 기술머신09
    zh_simp: 招式学习器09
    zh_trad: 招式學習器09
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつり　こうげきの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom physical attacks for five turns."
    fr: "Un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités physiques durant cinq tours."
    it: "Innalza una barriera di luce fantastica che riduce\ni danni degli attacchi fisici per sé e gli alleati\nper cinque turni."
    de: "Eine mysteriöse Wand, die fünf Runden den Schaden\nvon physischen gegnerischen Treffern reduziert."
    es: "Pared de luz que reduce durante cinco turnos el daño\nproducido por los ataques físicos."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 물리공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的物理攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的物理攻擊傷害。"
tm010:
  names:
    jp_kana: わざマシン１０
    jp_kanji: わざマシン１０
    en: TM10
    fr: CT10
    it: MT10
    de: TM10
    es: MT10
    ko: 기술머신10
    zh_simp: 招式学习器10
    zh_trad: 招式學習器10
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nあいてを　こうげきする。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。"
    en: "The user burrows into the ground, then attacks on\nthe next turn."
    fr: Le lanceur creuse au premier tour et frappe au second.
    it: "Chi la usa scava al primo turno e attacca\nal successivo."
    de: "In Runde 1 gräbt sich der Anwender ein und in\nRunde 2 greift er an."
    es: "Primer turno: cava. Segundo turno: ataca."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다."
    zh_simp: "第１回合钻入，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合潛入地底，\n並於第２回合攻擊對手。"
tm011:
  names:
    jp_kana: わざマシン１１
    jp_kanji: わざマシン１１
    en: TM11
    fr: CT11
    it: MT11
    de: TM11
    es: MT11
    ko: 기술머신11
    zh_simp: 招式学习器11
    zh_trad: 招式學習器11
  descriptions:
    jp_kana: "ぶきみで　あやしい　ほのおを　はなって\nあいてを　やけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister flame at the target to inflict\na burn."
    fr: "Lance un bouquet de flammes maléfiques à l’ennemi\npour lui infliger une brûlure."
    it: "Fiamme intense di colore viola causano\nuna scottatura al bersaglio."
    de: "Angriff mit unheimlicher Flamme, die beim Ziel\nVerbrennungen verursacht."
    es: Siniestra llama morada que produce quemaduras.
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
tm012:
  names:
    jp_kana: わざマシン１２
    jp_kanji: わざマシン１２
    en: TM12
    fr: CT12
    it: MT12
    de: TM12
    es: MT12
    ko: 기술머신12
    zh_simp: 招式学习器12
    zh_trad: 招式學習器12
  descriptions:
    jp_kana: "じぶんが　どく　まひ　やけど\nじょうたいの　とき　あいてに　くりだすと\nわざの　いりょくが　２ばいに　なる。"
    jp_kanji: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "This attack move doubles its power if the user is\npoisoned, burned, or paralyzed."
    fr: "Une attaque dont la puissance double lorsque\nle lanceur est empoisonné, paralysé ou brûlé."
    it: "Mossa d’attacco che raddoppia la potenza\nse chi la usa è scottato, avvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert oder leidet er\nunter Verbrennungen, verdoppelt sich die Kraft der\nAttacke."
    es: "Ataca con el doble de potencia si el usuario está \nquemado, paralizado o envenenado."
    ko: "자신이 독, 마비, 화상\n상태일 때 날리면\n기술의 위력이 2배가 된다."
    zh_simp: "当自己处于中毒、麻痹、灼伤状态时，\n向对手使出此招式的话，\n威力会变成２倍。"
    zh_trad: "當自己陷入中毒、麻痺、灼傷等\n狀態時，向對手使用此招式，\n威力會變成２倍。"
tm013:
  names:
    jp_kana: わざマシン１３
    jp_kanji: わざマシン１３
    en: TM13
    fr: CT13
    it: MT13
    de: TM13
    es: MT13
    ko: 기술머신13
    zh_simp: 招式学习器13
    zh_trad: 招式學習器13
  descriptions:
    jp_kana: "しゅとうを　いきおいよく　ふりおろして\nあいてを　こうげきする。　ひかりのかべや\nリフレクター　なども　はかいできる。"
    jp_kanji: "手刀を　勢いよく　振りおろして\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user attacks with a swift chop. It can also break\nbarriers, such as Light Screen and Reflect."
    fr: "Une attaque avec le tranchant de la main.\nPermet aussi de briser les barrières comme Mur Lumière\net Protection."
    it: "Colpisce il bersaglio con una mano e rompe\nbarriere come Riflesso e Schermoluce."
    de: "Ein beherzter Handkantenschlag.\nDurchbricht Barrieren wie Lichtschild und Reflektor."
    es: "Potente ataque que también es capaz de destruir \nbarreras como Pantalla de Luz y Reflejo."
    ko: "수도로 기세 좋게 내려쳐서\n상대를 공격한다. 빛의장막이나\n리플렉터 등도 파괴할 수 있다."
    zh_simp: "将手刀猛烈地挥下攻击对手。\n还可以破坏光墙和反射壁等。"
    zh_trad: "猛烈地揮下手刀\n攻擊對手。還可以破壞\n光牆和反射壁等。"
tm014:
  names:
    jp_kana: わざマシン１４
    jp_kanji: わざマシン１４
    en: TM14
    fr: CT14
    it: MT14
    de: TM14
    es: MT14
    ko: 기술머신14
    zh_simp: 招式学习器14
    zh_trad: 招式學習器14
  descriptions:
    jp_kana: "１ターンめで　そらへ　とび\n２ターンめに　あいてを　こうげきする。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。"
    en: "The user flies up into the sky and then\nstrikes its target on the next turn."
    fr: Le lanceur s’envole au premier tour et frappe au second.
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente."
    de: "Steigt in Runde 1 empor und trifft das Ziel in\nRunde 2."
    es: Vuela en el primer turno y ataca en el segundo.
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。"
tm015:
  names:
    jp_kana: わざマシン１５
    jp_kanji: わざマシン１５
    en: TM15
    fr: CT15
    it: MT15
    de: TM15
    es: MT15
    ko: 기술머신15
    zh_simp: 招式学习器15
    zh_trad: 招式學習器15
  descriptions:
    jp_kana: "いんりょくを　つかい　なげとばす。\nじぶんの　レベルと　おなじ　ダメージを\nあいてに　あたえる。"
    jp_kanji: "引力を　使い　投げとばす。\n自分の　レベルと　同じ　ダメージを\n相手に　与える。"
    en: "The target is thrown using the power of gravity.\nIt inflicts damage equal to the user’s level."
    fr: "L’ennemi est projeté grâce au pouvoir de la gravité.\nInflige des dégâts équivalents au niveau du lanceur."
    it: "Colpisce il bersaglio con la forza di gravità.\nInfligge un danno pari al livello di chi la usa."
    de: "Ziel wird mit der Kraft der Gravitation umgeworfen.\nRichtet Schaden gemäß Level des Angreifers an."
    es: "La gravedad derriba al objetivo. Se restarán tantos\nPS como nivel tenga el agresor."
    ko: "인력을 사용해 내던진다.\n자신의 레벨과 똑같은 데미지를\n상대에게 준다."
    zh_simp: "利用引力将对手甩飞出去。\n给予对手和自己等级相同的伤害。"
    zh_trad: "利用引力將對手甩飛出去。\n給予對手和自己等級相同的傷害。"
tm016:
  names:
    jp_kana: わざマシン１６
    jp_kanji: わざマシン１６
    en: TM16
    fr: CT16
    it: MT16
    de: TM16
    es: MT16
    ko: 기술머신16
    zh_simp: 招式学习器16
    zh_trad: 招式學習器16
  descriptions:
    jp_kana: "よわい　でんげきを　あびせる　ことで\nあいてを　まひ　じょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "The user launches a weak jolt of electricity that\nparalyzes the target."
    fr: "Un faible choc électrique frappe l’ennemi.\nSi l’attaque le touche, celui-ci est paralysé."
    it: "Colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: Ein schwacher Stromstoß, der das Ziel paralysiert.
    es: "Una ligera descarga que paraliza al objetivo si lo \nalcanza."
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
    zh_simp: "向对手发出\n微弱的电击，\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
tm017:
  names:
    jp_kana: わざマシン１７
    jp_kanji: わざマシン１７
    en: TM17
    fr: CT17
    it: MT17
    de: TM17
    es: MT17
    ko: 기술머신17
    zh_simp: 招式学习器17
    zh_trad: 招式學習器17
  descriptions:
    jp_kana: "あいてを　はじきとばして\nひかえの　ポケモンを　ひきずりだす。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。"
    en: "The target is knocked away, and a different Pokémon\nis dragged out."
    fr: "Un coup puissant qui blesse la cible et l’envoie au loin\npour forcer un autre membre de l’équipe adverse\nà venir au combat."
    it: "Chi la usa fa volar via il bersaglio in modo che\nvenga sostituito."
    de: "Putzt das Ziel vom Feld und wechselt es mit einem\nanderen Pokémon aus."
    es: "Ataca al objetivo y lo obliga a cambiarse por otro \nPokémon."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다."
    zh_simp: "弹飞对手，\n强制拉后备宝可梦上场。"
    zh_trad: "彈飛對手，\n強制讓後備寶可夢上場。"
tm018:
  names:
    jp_kana: わざマシン１８
    jp_kanji: わざマシン１８
    en: TM18
    fr: CT18
    it: MT18
    de: TM18
    es: MT18
    ko: 기술머신18
    zh_simp: 招式学习器18
    zh_trad: 招式學習器18
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa fa marcia indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para dar paso a \notro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
tm019:
  names:
    jp_kana: わざマシン１９
    jp_kanji: わざマシン１９
    en: TM19
    fr: CT19
    it: MT19
    de: TM19
    es: MT19
    ko: 기술머신19
    zh_simp: 招式学习器19
    zh_trad: 招式學習器19
  descriptions:
    jp_kana: "かたい　しっぽで　あいてを　たたきつけて\nこうげきする。　あいての　ぼうぎょを\nさげることが　ある。"
    jp_kanji: "硬い　しっぽで\n相手を　たたきつけて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The target is slammed with a steel-hard tail.\nThis may also lower the target’s Defense stat."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser sa Défense."
    it: "Il bersaglio viene colpito da una robusta coda\nd’acciaio. Può anche ridurne la Difesa."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell\nden Verteidigungs-Wert des Zieles."
    es: "Ataca con una cola férrea y puede bajar la Defensa \ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時會降低對手的防禦。"
tm020:
  names:
    jp_kana: わざマシン２０
    jp_kanji: わざマシン２０
    en: TM20
    fr: CT20
    it: MT20
    de: TM20
    es: MT20
    ko: 기술머신20
    zh_simp: 招式学习器20
    zh_trad: 招式學習器20
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with dark\nthoughts. This may also make the target flinch."
    fr: "Le lanceur dégage une horrible aura chargée d’idées\nnoires. Peut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di oscuri\npensieri. Può anche far tentennare il Pokémon\ncolpito."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos \ny puede hacer retroceder al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
tm021:
  names:
    jp_kana: わざマシン２１
    jp_kanji: わざマシン２１
    en: TM21
    fr: CT21
    it: MT21
    de: TM21
    es: MT21
    ko: 기술머신21
    zh_simp: 招式学习器21
    zh_trad: 招式學習器21
  descriptions:
    jp_kana: "あいての　ちからを　りようする。\nたたかっている　あいての　こうげきが\nたかいほど　ダメージが　あがる。"
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s power against it.\nThe higher the target’s Attack stat, the greater\nthe damage it deals."
    fr: "Le lanceur utilise la force de l’ennemi. Plus l’Attaque de\nl’ennemi est élevée, plus le lanceur inflige de dégâts."
    it: "Chi la usa sfrutta la forza del bersaglio. Il danno\ninflitto è proporzionale all’Attacco del nemico."
    de: "Anwender macht sich die Kraft des Zieles zunutze.\nJe höher dessen Angriff, desto mehr Schaden richtet\ndie Attacke an."
    es: "El usuario emplea la fuerza del objetivo para atacarlo.\nCuanto mayor es el Ataque del objetivo, más daño\nprovoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
    zh_simp: "利用对手的力量进行攻击。\n正和自己战斗的对手，\n其攻击越高，伤害越大。"
    zh_trad: "利用對手的力量進行攻擊。\n對手的攻擊越高，\n給予對手的傷害越大。"
tm022:
  names:
    jp_kana: わざマシン２２
    jp_kanji: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
    ko: 기술머신22
    zh_simp: 招式学习器22
    zh_trad: 招式學習器22
  descriptions:
    jp_kana: "おおきな　いわを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at the opposing Pokémon\nto inflict damage. This may also make the opposing\nPokémon flinch."
    fr: "Envoie de gros rochers sur l’ennemi pour infliger\ndes dégâts. Peut aussi l’apeurer."
    it: "I nemici vengono colpiti con violenza da grandi\nmassi che possono anche farli tentennare."
    de: "Schleudert riesige Felsen auf Ziele in der Umgebung,\ndie eventuell zurückschrecken."
    es: "Lanza grandes pedruscos. Puede hacer retroceder a \nlos rivales."
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。\n有時會讓對手畏縮。"
tm023:
  names:
    jp_kana: わざマシン２３
    jp_kanji: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
    ko: 기술머신23
    zh_simp: 招式学习器23
    zh_trad: 招式學習器23
  descriptions:
    jp_kana: "でんげきを　こめた　パンチで\nあいてを　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "電撃を　こめた　パンチで\n相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is punched with an electrified fist.\nThis may also leave the target with paralysis."
    fr: "Un coup de poing électrique vient frapper l’ennemi.\nPeut le paralyser."
    it: "Colpisce il bersaglio con un pugno elettrico\nche può paralizzarlo."
    de: "Ein elektrischer Schlag, der das Ziel eventuell\nparalysiert."
    es: Puñetazo eléctrico. Puede paralizar.
    ko: "전격을 담은 펀치로\n상대를 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用充满电流的拳头攻击对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用帶有電流的拳頭\n攻擊對手。\n有時會讓對手陷入麻痺狀態。"
tm024:
  names:
    jp_kana: わざマシン２４
    jp_kanji: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
    ko: 기술머신24
    zh_simp: 招式学习器24
    zh_trad: 招式學習器24
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　あいてを　きりさく。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its\nscythes or claws as if they were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Chi la usa colpisce il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
tm025:
  names:
    jp_kana: わざマシン２５
    jp_kanji: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
    ko: 기술머신25
    zh_simp: 招式学习器25
    zh_trad: 招式學習器25
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに　つっこむ。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: "The user charges at the target and may make\nit flinch."
    fr: "Le lanceur charge l’ennemi à une vitesse remarquable,\nce qui peut l’apeurer."
    it: "Carica il bersaglio a grande velocità e può farlo\ntentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso que puede hacer\nretroceder."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
tm026:
  names:
    jp_kana: わざマシン２６
    jp_kanji: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
    ko: 기술머신26
    zh_simp: 招式学习器26
    zh_trad: 招式學習器26
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや　うでで\nあいてを　つきさす。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle, arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre plein de poison. Peut aussi\nl’empoisonner."
    it: "Il bersaglio è colpito da un tentacolo o da un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Pincha al objetivo con un tentáculo o brazo\nenvenenado. Puede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
tm027:
  names:
    jp_kana: わざマシン２７
    jp_kanji: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
    ko: 기술머신27
    zh_simp: 招式学习器27
    zh_trad: 招式學習器27
  descriptions:
    jp_kana: "あいてを　もうどくの\nじょうたいに　する。　ターンが　すすむほど\nどくの　ダメージが　ふえていく。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target badly poisoned.\nIts poison damage worsens every turn."
    fr: "Empoisonne gravement l’ennemi.\nLes dégâts dus au poison augmentent à chaque tour."
    it: "Iperavvelena il bersaglio con una potente tossina.\nIl danno peggiora a ogni turno."
    de: "Vergiftet das Ziel mit einem potenten Toxin schwer.\nDie Vergiftung wird von Runde zu Runde stärker."
    es: "Envenena gravemente al objetivo y causa un daño \nmayor en cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
    zh_simp: "让对手陷入剧毒状态。\n随着回合的推进，\n中毒伤害会增加。"
    zh_trad: "讓對手陷入劇毒狀態。\n中毒傷害會隨著\n回合的進行而增加。"
tm028:
  names:
    jp_kana: わざマシン２８
    jp_kanji: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
    ko: 기술머신28
    zh_simp: 招式学习器28
    zh_trad: 招式學習器28
  descriptions:
    jp_kana: "３つの　こうせんで　こうげきする。\nまひか　やけどか　こおりじょうたいの\nどれかに　することが　ある。"
    jp_kanji: "３つの　光線で　攻撃する。\nまひか　やけどか　こおり状態の\nどれかに　することが　ある。"
    en: "The user strikes with a simultaneous three-beam attack.\nThis may also burn, freeze, or paralyze the target."
    fr: "Le lanceur envoie trois boules d’énergie simultanément.\nPeut aussi paralyser, brûler ou geler l’ennemi."
    it: "Colpisce il bersaglio con tre sfere simultanee che\npossono paralizzarlo, scottarlo o congelarlo."
    de: "Feuert drei Strahlen ab. Verursacht eventuell\nParalyse, Verbrennung oder Einfrieren."
    es: "Ataque triple que puede paralizar, quemar o congelar\nal objetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 얼음 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冰冻的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或冰凍的狀態。"
tm029:
  names:
    jp_kana: わざマシン２９
    jp_kanji: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
    ko: 기술머신29
    zh_simp: 招式学习器29
    zh_trad: 招式學習器29
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at its target.\nThis may also leave the target with a burn."
    fr: "L’ennemi est attaqué par un jet d’eau bouillante.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo.\nPuede causar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tm030:
  names:
    jp_kana: わざマシン３０
    jp_kanji: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
    ko: 기술머신30
    zh_simp: 招式学习器30
    zh_trad: 招式學習器30
  descriptions:
    jp_kana: "からだに　ちからを　こめて　きんにくを\nぶあつく　することで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up its body,\nraising both its Attack and Defense stats."
    fr: "Le lanceur tend ses muscles pour se gonfler,\nce qui booste son Attaque et sa Défense."
    it: "Chi la usa tende i muscoli per gonfiare il corpo,\naumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an, um den\nAngriff und die Verteidigung zu erhöhen."
    es: Robustece el cuerpo para subir el Ataque y la Defensa.
    ko: "몸에 힘을 담아\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而提高自己的攻击和防御。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n提高自己的攻擊和防禦。"
tm031:
  names:
    jp_kana: わざマシン３１
    jp_kanji: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
    ko: 기술머신31
    zh_simp: 招式学习器31
    zh_trad: 招式學習器31
  descriptions:
    jp_kana: "ほのおを　こめた　パンチで\nあいてを　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "炎を　こめた　パンチで\n相手を　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is punched with a fiery fist. This may also\nleave the target with a burn."
    fr: "Un coup de poing enflammé vient frapper l’ennemi.\nPeut le brûler."
    it: "Colpisce il bersaglio con un pugno ardente\nche può scottarlo."
    de: "Feuriger Schlag, der dem Ziel eventuell\nVerbrennungen zufügt."
    es: Puñetazo ardiente. Puede quemar.
    ko: "불꽃을 담은 펀치로\n상대를 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用充满火焰的拳头攻击对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用帶有火焰的拳頭\n攻擊對手。\n有時會讓對手陷入灼傷狀態。"
tm032:
  names:
    jp_kana: わざマシン３２
    jp_kanji: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
    ko: 기술머신32
    zh_simp: 招式学习器32
    zh_trad: 招式學習器32
  descriptions:
    jp_kana: "きょうりょくな　ひかりを　はなち\nあいてに　ダメージを　あたえる。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Libère une puissante décharge lumineuse qui inflige\ndes dégâts à l’ennemi."
    it: "Chi la usa emette una luce potentissima che\ninfligge danni ai nemici intorno."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder dem Ziel Schaden zufügt."
    es: Inflige daño a los oponentes con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
tm033:
  names:
    jp_kana: わざマシン３３
    jp_kanji: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
    ko: 기술머신33
    zh_simp: 招式学习器33
    zh_trad: 招式學習器33
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつし\nこころを　しずめる　ことで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and calms its\nspirit to raise its Sp. Atk and Sp. Def stats."
    fr: "Le lanceur se concentre et fait le vide dans son\nesprit pour augmenter son Attaque Spéciale et\nsa Défense Spéciale."
    it: "Chi la usa placa il proprio spirito meditando per\naumentare l’Attacco Speciale e la Difesa Speciale."
    de: "Erhöht Spezial-Angriff und Spezial-Verteidigung\ndurch Konzentration."
    es: "Aumenta la concentración y calma el espíritu para \nsubir el Ataque Especial y la Defensa Especial."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서 자신의\n특수공격과 특수방어를 올린다."
    zh_simp: "静心凝神，\n从而提高自己的特攻和特防。"
    zh_trad: "屏氣凝神，\n提高自己的特攻和特防。"
tm034:
  names:
    jp_kana: わざマシン３４
    jp_kanji: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
    ko: 기술머신34
    zh_simp: 招式学习器34
    zh_trad: 招式學習器34
  descriptions:
    jp_kana: "おおきな　くちから　しょうげきはを\nまきおこして　あいてを　こうげきする。"
    jp_kanji: "大きな　口から　衝撃波を\nまきおこして　相手を　攻撃する。"
    en: "The target is attacked with a shock wave generated\nby the user’s gaping mouth."
    fr: "Le lanceur ouvre la bouche pour envoyer une onde\nde choc qui frappe l’ennemi."
    it: "Chi la usa spalanca la bocca e genera un’onda\nd’urto che colpisce il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt."
    es: "Abre mucho la boca y libera una onda de choque \nque ataca al objetivo."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。"
tm035:
  names:
    jp_kana: わざマシン３５
    jp_kanji: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
    ko: 기술머신35
    zh_simp: 招式学习器35
    zh_trad: 招式學習器35
  descriptions:
    jp_kana: "れいきを　こめた　パンチで\nあいてを　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "冷気を　こめた　パンチで\n相手を　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is punched with an icy fist. This may also\nleave the target frozen."
    fr: "Un coup de poing glacé vient frapper l’ennemi.\nPeut le geler."
    it: "Colpisce il bersaglio con un pugno di ghiaccio\nche può congelarlo."
    de: Ein eisiger Schlag, der das Ziel eventuell einfriert.
    es: Puñetazo helado. Puede congelar.
    ko: "냉기를 담은 펀치로\n상대를 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "用充满寒气的拳头攻击对手。\n有时会让对手陷入冰冻状态。"
    zh_trad: "用帶有寒氣的拳頭\n攻擊對手。\n有時會讓對手陷入冰凍狀態。"
tm036:
  names:
    jp_kana: わざマシン３６
    jp_kanji: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
    ko: 기술머신36
    zh_simp: 招式学习器36
    zh_trad: 招式學習器36
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast crashes down on the target.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur l’ennemi.\nPeut aussi le paralyser."
    it: "Il bersaglio viene colpito da una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al \nobjetivo."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出\n强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tm037:
  names:
    jp_kana: わざマシン３７
    jp_kanji: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
    ko: 기술머신37
    zh_simp: 招式学习器37
    zh_trad: 招式學習器37
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして　こうげきする。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il bersaglio viene colpito da intense fiammate\nche possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede causar\nquemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射\n強烈火焰進行攻擊。\n有時會讓對手陷入灼傷狀態。"
tm038:
  names:
    jp_kana: わざマシン３８
    jp_kanji: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
    ko: 기술머신38
    zh_simp: 招式学习器38
    zh_trad: 招式學習器38
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして　こうげきする。\nまひ　じょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on the target to\ninflict damage. This may also leave the target\nwith paralysis."
    fr: "La foudre tombe sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Il bersaglio è colpito da un lampo molto violento\nche può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel\neventuell paralysiert."
    es: "Un poderoso rayo que daña al objetivo y puede \nparalizarlo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手劈下暴雷進行攻擊。\n有時會讓對手陷入麻痺狀態。"
tm039:
  names:
    jp_kana: わざマシン３９
    jp_kanji: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
    ko: 기술머신39
    zh_simp: 招式学习器39
    zh_trad: 招式學習器39
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって　こうげきする。\nあばれた　あとは　こんらん　する。"
    jp_kanji: "２ー３ターンの　間\n暴れまくって　攻撃する。\n暴れたあとは　混乱する。"
    en: "The Pokémon rampages and attacks for two to\nthree turns. It then becomes confused."
    fr: "Le lanceur enrage et attaque pendant deux ou trois\ntours avant de devenir confus."
    it: "Chi la usa sfoga la sua ira e attacca il nemico\nper due o tre turni prima di essere lasciato\nin preda alla confusione."
    de: "Attacke über zwei bis drei Runden, die den\nAnwender verwirrt."
    es: "Ataca de dos a tres turnos y acaba confundiendo al \nagresor."
    ko: "2-3턴 동안\n마구 난동 부려서 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地进行攻击。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
tm040:
  names:
    jp_kana: わざマシン４０
    jp_kanji: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
    ko: 기술머신40
    zh_simp: 招式学习器40
    zh_trad: 招式學習器40
  descriptions:
    jp_kana: "つよい　ねんりきを　あいてに　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic force.\nThis may also lower the target’s Sp. Def stat."
    fr: "Une puissante force télékinétique frappe l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Il bersaglio viene colpito da una potente\nforza telecinetica che può anche ridurne\nla Difesa Speciale."
    de: "Starke Psycho-Attacke, die eventuell die\nSpezial-Verteidigung des Zieles senkt."
    es: "Fuerte ataque telequinético que puede bajar la \nDefensa Especial del objetivo."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "向对手发送\n强大的念力进行攻击。\n有时会降低对手的特防。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時會降低對手的特防。"
tm041:
  names:
    jp_kana: わざマシン４１
    jp_kanji: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
    ko: 기술머신41
    zh_simp: 招式学习器41
    zh_trad: 招式學習器41
  descriptions:
    jp_kana: "じしんの　しょうげきで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre touchant\ntous les Pokémon autour de lui."
    it: "Chi la usa provoca un potente sisma che colpisce\ni Pokémon che ha intorno."
    de: "Ein mächtiges Beben, das die anderen Pokémon in\nder Nähe des Anwenders trifft."
    es: "Un terremoto que afecta a los Pokémon de alrededor \nen combate."
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
tm042:
  names:
    jp_kana: わざマシン４２
    jp_kanji: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
    ko: 기술머신42
    zh_simp: 招式学习器42
    zh_trad: 招式學習器42
  descriptions:
    jp_kana: "ばくはつを　おこして　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "爆発を　おこして　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing an\nexplosion. The user faints upon using this move."
    fr: "Le lanceur explose en blessant tous les Pokémon\nautour de lui. Le lanceur tombe K.O."
    it: "Chi la usa esplode e infligge danni ai Pokémon\nche ha intorno, ma poi va KO."
    de: "Anwender verursacht eine Explosion, mit der er\nrundum Riesenschaden anrichtet und selbst\nkampfunfähig wird."
    es: "El atacante explota y hiere a todos a su alrededor. \nEl usuario se debilita de inmediato."
    ko: "폭발을 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서 기절하게 된다."
    zh_simp: "引发爆炸，\n攻击自己周围所有的宝可梦。\n使用后陷入濒死。"
    zh_trad: "引起爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
tm043:
  names:
    jp_kana: わざマシン４３
    jp_kanji: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
    ko: 기술머신43
    zh_simp: 招式学习器43
    zh_trad: 招式學習器43
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげつけて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the target.\nThis may also lower the target’s Sp. Def stat."
    fr: "Projette une grande ombre sur l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Lancia sul bersaglio una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Bewirft das Ziel mit gruseligem Ball und senkt\neventuell die Spezial-Verteidigung."
    es: "Lanza una bola oscura que puede bajar la Defensa \nEspecial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的特防。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時會降低對手的特防。"
tm044:
  names:
    jp_kana: わざマシン４４
    jp_kanji: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
    ko: 기술머신44
    zh_simp: 招式学习器44
    zh_trad: 招式學習器44
  descriptions:
    jp_kana: "あいてに　じゃれついて\nこうげきする。　あいての\nこうげきを　さげる　ことがある。"
    jp_kanji: "相手に　じゃれついて\n攻撃する。　相手の\n攻撃を　さげる　ことがある。"
    en: "The user plays rough with the target and attacks it.\nThis may also lower the target’s Attack stat."
    fr: "Attaque l’ennemi avec un câlin. Peut diminuer\nson Attaque."
    it: "Chi la usa attacca il bersaglio con delle carinerie.\nPuò anche ridurne l’Attacco."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nGelegentlich sinkt dabei auch dessen Angriffs-Wert."
    es: "El Pokémon que lo usa le hace cucamonas al objetivo\ny lo ataca. Puede disminuir el Ataque del objetivo."
    ko: "상대에게 치근거리며\n공격한다. 상대의\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "与对手嬉闹并攻击。\n有时会降低对手的攻击。"
    zh_trad: "在和對手嬉鬧的同時進行攻擊。\n有時會降低對手的攻擊。"
tm045:
  names:
    jp_kana: わざマシン４５
    jp_kanji: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
    ko: 기술머신45
    zh_simp: 招式学习器45
    zh_trad: 招式學習器45
  descriptions:
    jp_kana: "１ターンめに　ひかりを　いっぱいに\nあつめ　２ターンめに　ひかりの　たばを\nはっしゃして　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "In this two-turn attack, the user gathers light, then\nblasts a bundled beam on the next turn."
    fr: "Absorbe la lumière au premier tour et envoie un rayon\npuissant au tour suivant."
    it: "Chi la usa assorbe luce al primo turno per\nproiettare un raggio intenso al turno successivo."
    de: "Absorbiert Licht in Runde 1. In Runde 2 erfolgt der\nAngriff."
    es: "Primer turno: absorbe luz. Segundo turno: lanza un\npotente rayo de energía."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合发射光束进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合發射光束進行攻擊。"
tm046:
  names:
    jp_kana: わざマシン４６
    jp_kanji: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
    ko: 기술머신46
    zh_simp: 招式学习器46
    zh_trad: 招式學習器46
  descriptions:
    jp_kana: "だいのじの　ほのおで\nあいてを　やきつくす。\nやけど　じょうたいに　することが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense blast of\nall-consuming fire. This may also leave the target\nwith a burn."
    fr: "Un déluge de flammes ardentes submerge l’ennemi.\nPeut aussi le brûler."
    it: "Investe il bersaglio con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm\neventuell eine Verbrennung zufügt."
    es: "Llama intensa que chamusca y puede causar \nquemaduras."
    ko: "큰 대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧尽对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時會讓對手陷入灼傷狀態。"
tm047:
  names:
    jp_kana: わざマシン４７
    jp_kanji: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
    ko: 기술머신47
    zh_simp: 招式学习器47
    zh_trad: 招式學習器47
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena."
    de: "Anwender greift mit einer gewaltigen Welle\nalle Pokémon in seiner Umgebung an."
    es: Inunda el terreno de combate con una ola gigante.
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
tm048:
  names:
    jp_kana: わざマシン４８
    jp_kanji: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
    ko: 기술머신48
    zh_simp: 招式学习器48
    zh_trad: 招式學習器48
  descriptions:
    jp_kana: "つよい　こうせんを\nあいてに　はっしゃして　こうげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful beam.\nThe user can’t move on the next turn."
    fr: "Projette un puissant rayon sur l’ennemi.\nLe lanceur doit se reposer au tour suivant."
    it: "Colpisce il bersaglio con un potente raggio.\nChi la usa salta il turno successivo per recuperare\nenergia."
    de: "Starke Attacke, die den Anwender zwingt,\neine Runde auszusetzen."
    es: "Es eficaz, pero el atacante deberá descansar en el \nsiguiente turno."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手发射\n强烈的光线进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n強烈的光線進行攻擊。\n下一回合自己將無法動彈。"
tm049:
  names:
    jp_kana: わざマシン４９
    jp_kanji: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
    ko: 기술머신49
    zh_simp: 招式学习器49
    zh_trad: 招式學習器49
  descriptions:
    jp_kana: "すごい　ちからを　はっきして\nあいてを　こうげきする。じぶんの\nこうげきと　ぼうぎょが　さがる。"
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great power.\nHowever, this also lowers the user’s Attack and\nDefense stats."
    fr: "Une attaque puissante, mais qui baisse l’Attaque\net la Défense du lanceur."
    it: "Chi la usa attacca il bersaglio con grande forza,\nma il suo Attacco e la sua Difesa diminuiscono."
    de: "Starke Attacke, die jedoch auch den Angriff und die\nVerteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce el Ataque\ny la Defensa del agresor."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
    zh_simp: "发挥惊人的力量攻击对手。\n自己的攻击和防御会降低。"
    zh_trad: "發揮驚人的力量攻擊對手。\n自己的攻擊和防禦會降低。"
tm050:
  names:
    jp_kana: わざマシン５０
    jp_kanji: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
    ko: 기술머신50
    zh_simp: 招式学习器50
    zh_trad: 招式學習器50
  descriptions:
    jp_kana: "じめんに　おりて　からだを　やすめる。\nさいだい　ＨＰの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    en: "The user lands and rests its body. This move restores\nthe user’s HP by up to half of its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié de ses PV max."
    it: "Chi la usa sta fermo e riposa, recuperando\nmetà dei propri PS massimi."
    de: "Anwender landet und ruht sich aus. KP des\nAnwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: "Aterriza sobre la superficie para descansar.\nRecupera hasta la mitad del total de sus PS."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
    zh_simp: "降到地面，使身体休息。\n回复自己最大HP的一半。"
    zh_trad: "降落到地面，讓身體休息。\n回復自己最大HP的一半。"
tm051:
  names:
    jp_kana: わざマシン５１
    jp_kanji: わざマシン５１
    en: TM51
    fr: CT51
    it: MT51
    de: TM51
    es: MT51
    ko: 기술머신51
    zh_simp: 招式学习器51
    zh_trad: 招式學習器51
  descriptions:
    jp_kana: "はげしい　ふぶきを\nあいてに　ふきつけて　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike opposing\nPokémon. This may also leave the opposing\nPokémon frozen."
    fr: "Une violente tempête de neige s’abat sur l’ennemi.\nPeut aussi le geler."
    it: "Colpisce i nemici intorno con una tremenda\ntempesta di ghiaccio che può anche congelarli."
    de: Ein Schneesturm wütet, der das Ziel einfrieren kann.
    es: Tormenta de hielo que puede llegar a congelar.
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tm052:
  names:
    jp_kana: わざマシン５２
    jp_kanji: わざマシン５２
    en: TM52
    fr: CT52
    it: MT52
    de: TM52
    es: MT52
    ko: 기술머신52
    zh_simp: 招式学习器52
    zh_trad: 招式學習器52
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて　こうげきする。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
tm053:
  names:
    jp_kana: わざマシン５３
    jp_kanji: わざマシン５３
    en: TM53
    fr: CT53
    it: MT53
    de: TM53
    es: MT53
    ko: 기술머신53
    zh_simp: 招式学习器53
    zh_trad: 招式學習器53
  descriptions:
    jp_kana: "ようぶんを　すいとり　こうげきする。\nあいてに　あたえた　ダメージの\nはんぶんの　ＨＰを　かいふくできる。"
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: Attacke, die die Hälfte des Schadens absorbiert.
    es: "Absorbe la mitad del daño producido en el objetivo \npara restaurar los PS del usuario."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半HP。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半HP。"
tm054:
  names:
    jp_kana: わざマシン５４
    jp_kanji: わざマシン５４
    en: TM54
    fr: CT54
    it: MT54
    de: TM54
    es: MT54
    ko: 기술머신54
    zh_simp: 招式学习器54
    zh_trad: 招式學習器54
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに　あつめて\nちからを　はなつ。あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it\nall at once. This may also lower the target’s Sp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse et la fait\nexploser. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa attacca raccogliendo e rilasciando\nenergia luminosa. Può ridurre la Difesa Speciale\ndel bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede bajar la Defensa Especial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 쏜다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
tm055:
  names:
    jp_kana: わざマシン５５
    jp_kanji: わざマシン５５
    en: TM55
    fr: CT55
    it: MT55
    de: TM55
    es: MT55
    ko: 기술머신55
    zh_simp: 招式学习器55
    zh_trad: 招式學習器55
  descriptions:
    jp_kana: "こごえる　ビームを\nあいてに　はっしゃして　こうげきする。\nこおり　じょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target frozen."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il bersaglio è colpito da un raggio di energia gelida\nche può anche congelarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und friert\neventuell ein."
    es: Rayo de hielo que puede llegar a congelar.
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n冰冻光束进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時會讓對手陷入冰凍狀態。"
tm056:
  names:
    jp_kana: わざマシン５６
    jp_kanji: わざマシン５６
    en: TM56
    fr: CT56
    it: MT56
    de: TM56
    es: MT56
    ko: 기술머신56
    zh_simp: 招式学习器56
    zh_trad: 招式學習器56
  descriptions:
    jp_kana: "あいての　まわりに　むすうの　いわを\nうかべて　こうたいで　でてきた　あいての\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "相手の　周りに　無数の　岩を\n浮かべて　交代で　でてきた　相手の\nポケモンに　ダメージを　与える。"
    en: "The user lays a trap of levitating stones around the\nopposing team. The trap hurts opposing Pokémon\nthat switch into battle."
    fr: "Lance des pierres flottantes autour de l’ennemi,\nqui blessent tout adversaire entrant au combat."
    it: "Chi la usa piazza una trappola di rocce sospese\nche danneggia i nemici che entrano in campo."
    de: "Falle mit schwebenden Steinen. In den Kampf\neingewechselte Ziele nehmen Schaden."
    es: "Una trampa de rocas que flota en el aire y daña a \nlos objetivos que entran en combate."
    ko: "상대의 주위에 무수한 바위를\n띄워 교체해서 나온 상대\n포켓몬에게 데미지를 준다."
    zh_simp: "将无数岩石悬浮在对手的周围，\n从而对替换出场的对手的\n宝可梦给予伤害。"
    zh_trad: "在對手周圍撒下無數飄浮的岩石，\n讓對手替換出場的寶可夢受到傷害。"
tm057:
  names:
    jp_kana: わざマシン５７
    jp_kanji: わざマシン５７
    en: TM57
    fr: CT57
    it: MT57
    de: TM57
    es: MT57
    ko: 기술머신57
    zh_simp: 招式学习器57
    zh_trad: 招式學習器57
  descriptions:
    jp_kana: "あいての　からだに\nこばんを　なげつけて　こうげきする。\nせんとうの　あとで　おかねが　もらえる。"
    jp_kanji: "相手の　体に\n小判を　投げつけて　攻撃する。\n戦闘の　あとで　お金が　もらえる。"
    en: "Numerous coins are hurled at the target to inflict\ndamage. Money is earned after the battle."
    fr: "Des pièces sont lancées sur l’ennemi.\nPermet d’obtenir de l’argent à la fin du combat."
    it: "Colpisce il bersaglio con una gran quantità\ndi monete recuperabili dopo la lotta."
    de: "Das Ziel wird mit Münzen beworfen. Das Geld wird\nnach dem Kampf aufgesammelt."
    es: "Arroja monedas al objetivo.\nLas recupera al final del combate."
    ko: "상대의 몸에\n돈을 세게 던져서 공격한다.\n배틀 후에 돈을 받을 수 있다."
    zh_simp: "向对手的身体\n投掷小金币进行攻击。\n战斗后可以拿到钱。"
    zh_trad: "往對手身上\n投擲金幣進行攻擊。\n戰鬥後可以得到錢。"
tm058:
  names:
    jp_kana: わざマシン５８
    jp_kanji: わざマシン５８
    en: TM58
    fr: CT58
    it: MT58
    de: TM58
    es: MT58
    ko: 기술머신58
    zh_simp: 招式学习器58
    zh_trad: 招式學習器58
  descriptions:
    jp_kana: "ドリルのように　からだを　かいてん\nしながら　あいてに　たいあたりする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into its target while rotating its\nbody like a drill. Critical hits land more easily."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur l’ennemi. Taux de critique élevé."
    it: "Chi la usa si scaglia sul bersaglio ruotando su se\nstesso come un trapano perforante. Probabile\nbrutto colpo."
    de: "Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro. \nSuele ser crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，一边旋转身体\n一边撞击对手。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體，\n猛烈地撞擊對手。\n容易擊中要害。"
tm059:
  names:
    jp_kana: わざマシン５９
    jp_kanji: わざマシン５９
    en: TM59
    fr: CT59
    it: MT59
    de: TM59
    es: MT59
    ko: 기술머신59
    zh_simp: 招式学习器59
    zh_trad: 招式學習器59
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　ダメージの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping target. It\nabsorbs half the damage caused to heal its own HP."
    fr: "Le lanceur mange le rêve de l’ennemi endormi\net récupère en PV la moitié des dégâts infligés."
    it: "Attacco che funziona solo su un bersaglio\nche dorme. Chi lo usa riceve metà dei PS\npersi dal Pokémon colpito."
    de: "Frisst die Träume eines schlafenden Ziels. Anwender\nwird um die Hälfte des zugefügten Schadens geheilt."
    es: "Restaura al usuario la mitad del daño causado a un \nobjetivo dormido."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
    zh_simp: "吃掉正在睡觉的对手的梦\n进行攻击。回复对手\n所受到伤害的一半HP。"
    zh_trad: "吃掉熟睡中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一半HP。"
tm060:
  names:
    jp_kana: わざマシン６０
    jp_kanji: わざマシン６０
    en: TM60
    fr: CT60
    it: MT60
    de: TM60
    es: MT60
    ko: 기술머신60
    zh_simp: 招式学习器60
    zh_trad: 招式學習器60
  descriptions:
    jp_kana: "かたくて　りっぱな　つので　おもいっきり\nあいてを　つきさして　こうげきする。"
    jp_kanji: "硬くて　りっぱな　つので　おもいっきり\n相手を　突き刺して　攻撃する。"
    en: "Using its tough and impressive horn, the user rams\ninto the target with no letup."
    fr: "Le lanceur utilise ses gigantesques cornes pour\ncharger l’ennemi."
    it: "Chi la usa utilizza il suo robusto e imponente\ncorno per colpire il bersaglio con tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: Violenta embestida con cuernos imponentes.
    ko: "단단하고 훌륭한 뿔로 마음껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
tm061:
  names:
    jp_kana: わざマシン６１
    jp_kanji: わざマシン６１
    en: TM61
    fr: CT61
    it: MT61
    de: TM61
    es: MT61
    ko: 기술머신61
    zh_simp: 招式学习器61
    zh_trad: 招式學習器61
  descriptions:
    jp_kana: "ぶきみで　あやしい　ほのおを　はなって\nあいてを　やけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister flame at the target to inflict\na burn."
    fr: "Lance un bouquet de flammes maléfiques à l’ennemi\npour lui infliger une brûlure."
    it: "Fiamme intense di colore viola causano\nuna scottatura al bersaglio."
    de: "Feuert eine fiese, unheimliche Flamme auf das Ziel\nab, um Verbrennungen zu verursachen."
    es: "Lanza una siniestra llamarada morada que provoca\nquemaduras al objetivo."
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
tm062:
  names:
    jp_kana: わざマシン６２
    jp_kanji: わざマシン６２
    en: TM62
    fr: CT62
    it: MT62
    de: TM62
    es: MT62
    ko: 기술머신62
    zh_simp: 招式学习器62
    zh_trad: 招式學習器62
  descriptions:
    jp_kana: "かろやかに　あいてを　こうげきする。\nじぶんが　どうぐを　もっていない　とき\nおおきな　ダメージを　あたえる。"
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target.\nIf the user is not holding an item, this attack\ninflicts massive damage."
    fr: "Attaque agile. Si le lanceur ne tient pas d’objet,\nl’attaque inflige davantage de dégâts."
    it: "Attacca rapidamente il bersaglio.\nSe chi la usa non ha uno strumento, infligge\nal nemico grossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt der Anwender\nkein Item bei sich, richtet die Attacke großen\nSchaden an."
    es: "Golpea ágilmente. Si el usuario no porta ningún objeto,\nel objetivo resulta seriamente dañado."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
    zh_simp: "轻巧地攻击对手。\n自己没有携带道具时，\n会给予较大的伤害。"
    zh_trad: "輕巧地攻擊對手。\n自己沒有攜帶道具時，\n能給予對手較大的傷害。"
tm063:
  names:
    jp_kana: わざマシン６３
    jp_kanji: わざマシン６３
    en: TM63
    fr: CT63
    it: MT63
    de: TM63
    es: MT63
    ko: 기술머신63
    zh_simp: 招式学习器63
    zh_trad: 招式學習器63
  descriptions:
    jp_kana: "もたせた　どうぐを　５ターンの　あいだ\nつかえなくする。　トレーナーも　その\nポケモンには　どうぐを　つかえない。"
    jp_kanji: "持たせた　どうぐを　５ターンの　あいだ\n使えなくする。　トレーナーも　その\nポケモンには　道具を　使えない。"
    en: "This move prevents the target from using its held\nitem for five turns. Its Trainer is also prevented\nfrom using items on it."
    fr: "Empêche la cible d’utiliser un objet tenu et son\nDresseur d’utiliser un objet sur lui pendant cinq tours."
    it: "Impedisce al bersaglio di usare il suo strumento\ne al suo Allenatore di usarne altri sul Pokémon\nper cinque turni."
    de: "Das Ziel kann 5 Runden lang sein getragenes Item\nnicht einsetzen und es können auch keine Items\nauf es angewendet werden."
    es: "Impide durante cinco turnos que el objetivo utilice\nel objeto que lleve y que su Entrenador use objetos\ncon él."
    ko: "지니게 한 도구를 5턴 동안\n쓸 수 없게 한다. 트레이너도\n그 포켓몬에게는 도구를 쓸 수 없다."
    zh_simp: "让对手在５回合内不能使用\n宝可梦携带的道具。训练家也\n不能给那只宝可梦使用道具。"
    zh_trad: "讓對手在５回合內無法使用攜帶的道具。\n訓練家也不能對\n該寶可夢使用道具。"
tm064:
  names:
    jp_kana: わざマシン６４
    jp_kanji: わざマシン６４
    en: TM64
    fr: CT64
    it: MT64
    de: TM64
    es: MT64
    ko: 기술머신64
    zh_simp: 招式学习器64
    zh_trad: 招式學習器64
  descriptions:
    jp_kana: "おおきな　ばくはつで　じぶんの\nまわりに　いるものを　こうげきする。\nつかった　あとに　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の　周りに\nいるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing a\ntremendous explosion. The user faints upon using\nthis move."
    fr: "Le lanceur explose et inflige des dégâts à tous\nles Pokémon autour de lui. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni\nagli altri Pokémon attorno, ma va KO."
    de: "Anwender explodiert, richtet bei allen Pokémon in\nseiner Umgebung großen Schaden an und wird selbst\nkampfunfähig."
    es: "Quien lo usa explosiona en combate e inflige daño a\ntodos los Pokémon a su alrededor. El usuario se debilita."
    ko: "큰 폭발로 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서는 기절한다."
    zh_simp: "引发大爆炸，\n攻击自己周围所有的宝可梦。\n使用后自己会陷入濒死。"
    zh_trad: "引起大爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
tm065:
  names:
    jp_kana: わざマシン６５
    jp_kanji: わざマシン６５
    en: TM65
    fr: CT65
    it: MT65
    de: TM65
    es: MT65
    ko: 기술머신65
    zh_simp: 招式学习器65
    zh_trad: 招式學習器65
  descriptions:
    jp_kana: "かげから　つくった　するどい　ツメで\nあいてを　きりさく。\nきゅうしょに　あたりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user slashes with a sharp claw made from\nshadows. Critical hits land more easily."
    fr: "Attaque avec une griffe puissante faite d’ombres.\nTaux de critique élevé."
    it: "Chi la usa attacca con artigli d’ombra che\ncolpiscono con gran forza.\nProbabile brutto colpo."
    de: "Greift das Ziel mit einer scharfen Klaue aus Schatten an.\nHohe Volltrefferquote."
    es: "Quien lo usa ataca con una afilada garra de sombras.\nSu índice de golpe crítico es muy alto."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "以影子做成的锐爪，\n劈开对手。\n容易击中要害。"
    zh_trad: "用黑影化成的銳利爪子\n撕裂對手。\n容易擊中要害。"
tm066:
  names:
    jp_kana: わざマシン６６
    jp_kanji: わざマシン６６
    en: TM66
    fr: CT66
    it: MT66
    de: TM66
    es: MT66
    ko: 기술머신66
    zh_simp: 招式学习器66
    zh_trad: 招式學習器66
  descriptions:
    jp_kana: "ためこんで　こうげきする。\nあいてより　あとに　こうげき　できると\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　後に　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks. If the user\nmoves after the target, this attack’s power will\nbe doubled."
    fr: "Le lanceur charge son énergie, puis attaque.\nLa puissance est doublée si le lanceur agit\naprès l’ennemi."
    it: "Chi la usa accumula forza, poi attacca. La potenza\nraddoppia se il Pokémon agisce dopo il bersaglio."
    de: "Der Anwender lädt die Attacke auf. Handelt das\nZiel vor dem Anwender, verdoppelt sich die Stärke\nder Attacke."
    es: "Quien lo usa se carga de energía y luego ataca. Y,\nsi ataca después del objetivo, dobla la potencia\ndel ataque."
    ko: "모아서 공격한다.\n상대보다 뒤에 공격할 수 있으면\n기술의 위력은 2배가 된다."
    zh_simp: "蓄力攻击。\n如果能在对手之后攻击，\n招式的威力会变成２倍。"
    zh_trad: "累積力量進行攻擊。\n若在對手之後進行攻擊，\n招式的威力會變成２倍。"
tm067:
  names:
    jp_kana: わざマシン６７
    jp_kanji: わざマシン６７
    en: TM67
    fr: CT67
    it: MT67
    de: TM67
    es: MT67
    ko: 기술머신67
    zh_simp: 招式学习器67
    zh_trad: 招式學習器67
  descriptions:
    jp_kana: "とがった　つので　あいてを\nつきさして　こうげきする。\nこうげきは　かならず　あたる。"
    jp_kanji: "とがった　つので　相手を\n突き刺して　攻撃する。\n攻撃は　必ず　当たる。"
    en: "The user stabs the target with a sharp horn.\nThe attack never misses."
    fr: "Le lanceur transperce la cible avec sa corne effilée.\nTouche toujours l’ennemi."
    it: "Chi la usa colpisce il bersaglio con un corno\nappuntito. Questa mossa va sempre a segno."
    de: "Der Anwender durchbohrt das Ziel mit seinem\nspitzen Horn. Diese Attacke trifft immer."
    es: "Ensarta al adversario con su afilada cornamenta.\nEste movimiento acierta siempre."
    ko: "뾰족한 뿔로 상대를\n꿰찔러서 공격한다.\n공격은 반드시 맞는다."
    zh_simp: "用尖尖的角刺入对手进行攻击。\n攻击必定会命中。"
    zh_trad: "用尖尖的角刺進對手進行攻擊。\n攻擊必定會命中。"
tm068:
  names:
    jp_kana: わざマシン６８
    jp_kanji: わざマシン６８
    en: TM68
    fr: CT68
    it: MT68
    de: TM68
    es: MT68
    ko: 기술머신68
    zh_simp: 招式学习器68
    zh_trad: 招式學習器68
  descriptions:
    jp_kana: "もてる　ちからを　すべて　つかって\nあいてに　とつげきする。\nつぎの　ターンは　うごけなく　なる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using every bit of\nits power. The user can’t move on the next turn."
    fr: "Le lanceur charge l’ennemi de toute sa puissance\net doit ensuite se reposer au tour suivant."
    it: "Chi la usa carica il bersaglio usando tutta la sua\nforza, ma al turno successivo deve riposarsi."
    de: "Anwender rennt mit seiner ganzen Kraft gegen das\nZiel an und muss dann eine Runde ruhen."
    es: "Quien lo usa carga contra el objetivo usando toda su\nenergía y en el turno siguiente tiene que descansar."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "使出自己浑身力量突击对手。\n下一回合自己将无法动弹。"
    zh_trad: "使出全身上下所有力量突擊對手。\n下一回合自己將無法動彈。"
tm069:
  names:
    jp_kana: わざマシン６９
    jp_kanji: わざマシン６９
    en: TM69
    fr: CT69
    it: MT69
    de: TM69
    es: MT69
    ko: 기술머신69
    zh_simp: 招式学习器69
    zh_trad: 招式學習器69
  descriptions:
    jp_kana: "じぶんの　からだを　みがいて　くうきの\nていこうを　すくなくする。　すばやさを\nぐーんと　あげることが　できる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。　素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag.\nThis can sharply raise the Speed stat."
    fr: "Le lanceur polit son corps pour diminuer sa résistance\nau vent. Augmente beaucoup la Vitesse."
    it: "Chi la usa leviga il proprio corpo per ridurne\nl’attrito. Aumenta di molto la Velocità."
    de: "Der Anwender poliert seinen Körper.\nKann den Initiative-Wert stark erhöhen."
    es: "Quien lo usa reduce la resistencia que ofrece su cuerpo\ny puede ganar mucho en Velocidad."
    ko: "자신의 몸을 갈아 공기의\n저항을 적게 한다. 스피드를\n크게 올릴 수 있다."
    zh_simp: "打磨自己的身体，\n减少空气阻力。\n可以大幅提高自己的速度。"
    zh_trad: "打磨自己的身體，\n減少空氣阻力。\n可大幅提高自己的速度。"
tm070:
  names:
    jp_kana: わざマシン７０
    jp_kanji: わざマシン７０
    en: TM70
    fr: CT70
    it: MT70
    de: TM70
    es: MT70
    ko: 기술머신70
    zh_simp: 招式学习器70
    zh_trad: 招式學習器70
  descriptions:
    jp_kana: "５ターンの　あいだ　ぶつりと\nとくしゅの　ダメージを　よわめる。\nあられの　ときしか　だせない。"
    jp_kanji: "５ターンの　間　物理と\n特殊の　ダメージを　弱める。\nあられの　時しか　出せない。"
    en: "This move reduces damage from physical and\nspecial moves for five turns. This can be used only\nin a hailstorm."
    fr: "Réduit les dégâts causés par les capacités physiques\net spéciales durant cinq tours.\nNe peut être utilisé que lorsqu’il grêle."
    it: "Riduce i danni subiti dalle mosse fisiche e dalle\nmosse speciali per cinque turni.\nSi può usare solo quando grandina."
    de: "Schwächt fünf Runden lang den Schaden durch\nphysische sowie Spezial-Attacken ab. Diese\nAttacke kann nur bei Hagel eingesetzt werden."
    es: "Reduce el daño de los ataques físicos y especiales\ndurante 5 turnos. Solo puede usarse cuando está\ngranizando."
    ko: "5턴 동안 물리와 특수 기술의\n데미지를 약하게 한다.\n싸라기눈일 때만 쓸 수 있다."
    zh_simp: "在５回合内减弱\n物理和特殊的伤害。\n只有冰雹时才能使出。"
    zh_trad: "在５回合內減弱\n物理和特殊的傷害。\n在下冰雹時才有效果。"
tm071:
  names:
    jp_kana: わざマシン７１
    jp_kanji: わざマシン７１
    en: TM71
    fr: CT71
    it: MT71
    de: TM71
    es: MT71
    ko: 기술머신71
    zh_simp: 招式学习器71
    zh_trad: 招式學習器71
  descriptions:
    jp_kana: "とがった　いわを\nあいてに　つきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target from below with\nsharpened stones. Critical hits land more easily."
    fr: "Fait surgir des pierres aiguisées sous l’ennemi.\nTaux de critique élevé."
    it: "Chi la usa colpisce il bersaglio dal basso con\npietre affilate. Probabile brutto colpo."
    de: "Anwender sticht das Ziel mit spitzen Steinen.\nHohe Volltrefferquote."
    es: "Apuñala al objetivo desde abajo con piedras afiladas.\nSu índice de golpe crítico es muy alto."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
tm072:
  names:
    jp_kana: わざマシン７２
    jp_kanji: わざマシン７２
    en: TM72
    fr: CT72
    it: MT72
    de: TM72
    es: MT72
    ko: 기술머신72
    zh_simp: 招式学习器72
    zh_trad: 招式學習器72
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa si tira indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para dar paso a otro\nPokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
tm073:
  names:
    jp_kana: わざマシン７３
    jp_kanji: わざマシン７３
    en: TM73
    fr: CT73
    it: MT73
    de: TM73
    es: MT73
    ko: 기술머신73
    zh_simp: 招式学习器73
    zh_trad: 招式學習器73
  descriptions:
    jp_kana: "よわい　でんきを　あびせることで\nあいてを　まひじょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "The user launches a weak jolt of electricity that\nparalyzes the target."
    fr: "Un faible choc électrique frappe l’ennemi.\nSi l’attaque le touche, celui-ci est paralysé."
    it: "Colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: "Das Ziel wird mit einem schwachen elektrischen\nSchlag angegriffen. Wird es getroffen, wird es\nparalysiert."
    es: "Débil descarga eléctrica que se lanza contra el objetivo\ny causa parálisis si es certera."
    ko: "약한 전기를 날려\n상대를 마비 상태로 만든다."
    zh_simp: "向对手发出\n微弱的电击，\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
tm074:
  names:
    jp_kana: わざマシン７４
    jp_kanji: わざマシン７４
    en: TM74
    fr: CT74
    it: MT74
    de: TM74
    es: MT74
    ko: 기술머신74
    zh_simp: 招式学习器74
    zh_trad: 招式學習器74
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん　させて\nたいあたりする。あいてより　すばやさが\nひくいほど　つよい。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。　相手より　素早さが\n遅いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user compared to the target, the\ngreater the move’s power."
    fr: "Le lanceur effectue une rotation et frappe l’ennemi.\nPlus la Vitesse du lanceur est basse, plus il fait\nde dégâts."
    it: "Chi la usa colpisce il bersaglio con un vortice\nrapidissimo. Più lento è chi la usa, maggiore\nè il danno."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Quien lo usa ataca al objetivo como un remolino.\nCuanto más lento sea quien lo usa, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
tm075:
  names:
    jp_kana: わざマシン７５
    jp_kanji: わざマシン７５
    en: TM75
    fr: CT75
    it: MT75
    de: TM75
    es: MT75
    ko: 기술머신75
    zh_simp: 招式学习器75
    zh_trad: 招式學習器75
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどって\nきあいを　たかめる。\nじぶんの　こうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　踊って\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting spirit.\nThis sharply raises the user’s Attack stat."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito\ncombattivo. Chi la usa aumenta di molto\nil suo Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist wecken soll.\nDer Angriffs-Wert des Anwenders wird stark\nerhöht."
    es: "Danza frenética que eleva el espíritu combativo.\nAumenta mucho el Ataque de quien lo usa."
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n大幅提高自己的攻击。"
    zh_trad: "激烈地跳起戰舞提升氣勢。\n大幅提高自己的攻擊。"
tm076:
  names:
    jp_kana: わざマシン７６
    jp_kanji: わざマシン７６
    en: TM76
    fr: CT76
    it: MT76
    de: TM76
    es: MT76
    ko: 기술머신76
    zh_simp: 招式学习器76
    zh_trad: 招式學習器76
  descriptions:
    jp_kana: "１ターンめで　そらへ　とび\n２ターンめに　あいてを　こうげきする。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。"
    en: "The user flies up into the sky and then\nstrikes its target on the next turn."
    fr: Le lanceur s’envole au premier tour et frappe au second.
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente."
    de: "Steigt in Runde 1 empor und trifft das Ziel in\nRunde 2."
    es: Vuela en el primer turno y ataca en el segundo.
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。"
tm077:
  names:
    jp_kana: わざマシン７７
    jp_kanji: わざマシン７７
    en: TM77
    fr: CT77
    it: MT77
    de: TM77
    es: MT77
    ko: 기술머신77
    zh_simp: 招式学习器77
    zh_trad: 招式學習器77
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into copying any stat\nchange made by the target."
    fr: "Une autohypnose qui permet au lanceur de copier\nles changements de stats de la cible."
    it: "Chi la usa s’ipnotizza per copiare ogni modifica\nalle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um die\nStatusveränderungen des Zieles zu kopieren."
    es: "Quien lo usa se sume en un trance y copia cualquier\ncambio que haya en las características de su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
    zh_simp: "向自己施以自我暗示，\n将能力变化的状态\n变得和对手一样。"
    zh_trad: "向自己施加自我暗示，\n讓能力變化的狀態\n變得與對手相同。"
tm078:
  names:
    jp_kana: わざマシン７８
    jp_kanji: わざマシン７８
    en: TM78
    fr: CT78
    it: MT78
    de: TM78
    es: MT78
    ko: 기술머신78
    zh_simp: 招式学习器78
    zh_trad: 招式學習器78
  descriptions:
    jp_kana: "じめんを　ふみならして　じぶんの\nまわりに　いるものを　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "地面を　踏みならして　自分の\n周りに　いるものを　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user strikes everything around it by stomping\ndown on the ground. This lowers the Speed stat of\nthose hit."
    fr: "Le lanceur piétine le sol et inflige des dégâts à tous\nles Pokémon autour de lui. Baisse aussi leur Vitesse."
    it: "Chi la usa calpesta il terreno e scatena un\nterremoto che danneggia i Pokémon nei paraggi,\nriducendone la Velocità."
    de: "Anwender greift an, indem er den Boden um sich\nherum plattwalzt. Die Initiative aller Pokémon in der\nUmgebung sinkt."
    es: "Sacudida sísmica que afecta a los demás Pokémon\nadyacentes y también reduce su Velocidad."
    ko: "땅을 힘껏 밟아 자신의\n주위에 있는 포켓몬을 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用力踩踏地面并攻击\n自己周围所有的宝可梦。\n降低对方的速度。"
    zh_trad: "用力踩踏地面，\n攻擊自己周圍所有的寶可夢。\n可降低對手的速度。"
tm079:
  names:
    jp_kana: わざマシン７９
    jp_kanji: わざマシン７９
    en: TM79
    fr: CT79
    it: MT79
    de: TM79
    es: MT79
    ko: 기술머신79
    zh_simp: 招式学习器79
    zh_trad: 招式學習器79
  descriptions:
    jp_kana: "つめたい　いきを\nあいてに　ふきつけて　こうげきする。\nかならず　きゅうしょに　あたる。"
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user blows its cold breath on the target.\nThis attack always results in a critical hit."
    fr: "Un souffle froid blesse l’ennemi.\nL’effet est toujours critique."
    it: "Chi la usa attacca il bersaglio con un soffio\nd’aria gelida.\nBrutto colpo assicurato."
    de: "Anwender greift an, indem er dem Ziel eisigen Atem\nentgegenhaucht. Volltreffergarantie."
    es: "Quien lo usa ataca lanzando un aliento gélido.\nSiempre asesta un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
    zh_simp: "将冰冷的气息\n吹向对手进行攻击。\n必定会击中要害。"
    zh_trad: "將冰冷的氣息\n吹向對手進行攻擊。\n必定會擊中要害。"
tm080:
  names:
    jp_kana: わざマシン８０
    jp_kanji: わざマシン８０
    en: TM80
    fr: CT80
    it: MT80
    de: TM80
    es: MT80
    ko: 기술머신80
    zh_simp: 招式学习器80
    zh_trad: 招式學習器80
  descriptions:
    jp_kana: "おおきな　いわを\nはげしく　ぶつけて　こうげきする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at the opposing Pokémon\nto inflict damage. This may also make the opposing\nPokémon flinch."
    fr: "Envoie de gros rochers sur l’ennemi pour infliger\ndes dégâts. Peut aussi l’apeurer."
    it: "I nemici vengono colpiti con violenza da grandi\nmassi che possono anche farli tentennare."
    de: "Schleudert riesige Felsen auf Ziele in der Umgebung,\ndie eventuell zurückschrecken."
    es: "Arroja grandes rocas para infligir daño. También puede\nhacer retroceder al objetivo."
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。\n有時會讓對手畏縮。"
tm081:
  names:
    jp_kana: わざマシン８１
    jp_kanji: わざマシン８１
    en: TM81
    fr: CT81
    it: MT81
    de: TM81
    es: MT81
    ko: 기술머신81
    zh_simp: 招式学习器81
    zh_trad: 招式學習器81
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　あいてを　きりさく。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by crossing its\nscythes or claws as if they were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Chi la usa colpisce il bersaglio con un attacco\nche ricorda un colpo di forbici."
    de: "Der Anwender greift mit gekreuzten Scheren oder\nKlauen an, als wären diese eine normale Schere."
    es: "Ataca al objetivo con cuchillas o garras que se cruzan\na modo de tijera."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。"
tm082:
  names:
    jp_kana: わざマシン８２
    jp_kanji: わざマシン８２
    en: TM82
    fr: CT82
    it: MT82
    de: TM82
    es: MT82
    ko: 기술머신82
    zh_simp: 招式学习器82
    zh_trad: 招式學習器82
  descriptions:
    jp_kana: "あいてを　はじきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいの　ばあいは　せんとうが　おわる。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is knocked away, and a different\nPokémon is dragged out. In the wild, this ends\na battle against a single Pokémon."
    fr: "Un coup puissant qui blesse la cible et l’envoie au loin.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Chi la usa fa volar via il bersaglio in modo che\nvenga sostituito. Se il bersaglio è un singolo\nPokémon selvatico, la lotta finisce."
    de: "Fegt das Ziel vom Feld und wechselt es gegen ein\nanderes Pokémon aus. Beendet Kämpfe gegen wilde\nPokémon."
    es: "Se lleva al objetivo, que es cambiado por otro\nPokémon. Si es un Pokémon salvaje, acaba el\ncombate."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "弹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "彈飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
tm083:
  names:
    jp_kana: わざマシン８３
    jp_kanji: わざマシン８３
    en: TM83
    fr: CT83
    it: MT83
    de: TM83
    es: MT83
    ko: 기술머신83
    zh_simp: 招式学习器83
    zh_trad: 招式學習器83
  descriptions:
    jp_kana: "４ー５ターンの　あいだ　あいてに\nまとわりついて　こうげきする。\nそのあいだ　あいては　にげられない。"
    jp_kanji: "４ー５ターンの　間　相手に\nまとわりついて　攻撃する。\nその間　相手は　逃げられない。"
    en: "The target is infested and attacked for four to five\nturns. The target can’t flee during this time."
    fr: "Cette attaque perdure pendant quatre à cinq tours.\nL’ennemi ne peut pas fuir au cours de cette période."
    it: "Chi la usa lancia un attacco che tormenta\nil bersaglio per quattro o cinque turni, durante\ni quali gli impedisce di fuggire."
    de: "Der Anwender fällt vier bis fünf Runden lang wie eine\nPlage über das Ziel her und greift es an. In diesem\nZeitraum kann es nicht fliehen."
    es: "Oprime al enemigo de cuatro a cinco turnos,\ndurante los cuales no podrá huir."
    ko: "4-5턴 동안 상대에게\n엉겨 붙어서 공격한다.\n그동안 상대는 도망갈 수 없다."
    zh_simp: "在４～５回合内\n死缠烂打地进行攻击。\n在此期间对手将无法逃走。"
    zh_trad: "在４～５回合內\n死纏爛打地進行攻擊。\n在此期間對手將無法逃走。"
tm084:
  names:
    jp_kana: わざマシン８４
    jp_kanji: わざマシン８４
    en: TM84
    fr: CT84
    it: MT84
    de: TM84
    es: MT84
    ko: 기술머신84
    zh_simp: 招式学习器84
    zh_trad: 招式學習器84
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや　うでで\nあいてを　つきさす。\nどく　じょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle, arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre plein de poison.\nPeut aussi l’empoisonner."
    it: "Il bersaglio è colpito da un tentacolo o da un\narto intriso di una sostanza tossica che può\nanche avvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Ataca con un tentáculo o brazo impregnado de\nveneno que puede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時會讓對手陷入中毒狀態。"
tm085:
  names:
    jp_kana: わざマシン８５
    jp_kanji: わざマシン８５
    en: TM85
    fr: CT85
    it: MT85
    de: TM85
    es: MT85
    ko: 기술머신85
    zh_simp: 招式学习器85
    zh_trad: 招式學習器85
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　ダメージの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping target.\nIt absorbs half the damage caused to heal its\nown HP."
    fr: "Le lanceur mange le rêve de l’ennemi endormi\net récupère en PV la moitié des dégâts infligés."
    it: "Attacco che funziona solo su un bersaglio\nche dorme. Chi lo usa riceve metà dei PS\npersi dal Pokémon colpito."
    de: "Frisst die Träume eines schlafenden Ziels. Anwender\nwird um die Hälfte des zugefügten Schadens geheilt."
    es: "Solo funciona con objetivos dormidos. Absorbe la\nmitad del daño causado para restaurar los PS de\nquien lo usa."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
    zh_simp: "吃掉正在睡觉的对手的梦\n进行攻击。回复对手\n所受到伤害的一半HP。"
    zh_trad: "吃掉熟睡中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一半HP。"
tm086:
  names:
    jp_kana: わざマシン８６
    jp_kanji: わざマシン８６
    en: TM86
    fr: CT86
    it: MT86
    de: TM86
    es: MT86
    ko: 기술머신86
    zh_simp: 招式学习器86
    zh_trad: 招式學習器86
  descriptions:
    jp_kana: "くさを　からませて　あいてを\nころばせる。　あいてが　おもいほど\nいりょくが　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。　相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the\nmove’s power."
    fr: "L’ennemi est piégé dans de l’herbe qui le fait trébucher.\nPlus il est lourd, plus il reçoit de dégâts."
    it: "Chi la usa intrappola il bersaglio con l’erba\ne lo fa cadere. Danneggia maggiormente\ni Pokémon più pesanti."
    de: "Gras lässt das Ziel straucheln. Je schwerer das\nZiel, desto mehr Schaden wird verursacht."
    es: "Atrapa al objetivo con hierbas y lo derriba. Cuanto más\npesado sea el objetivo, más daño causa."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
tm087:
  names:
    jp_kana: わざマシン８７
    jp_kanji: わざマシン８７
    en: TM87
    fr: CT87
    it: MT87
    de: TM87
    es: MT87
    ko: 기술머신87
    zh_simp: 招式学习器87
    zh_trad: 招式學習器87
  descriptions:
    jp_kana: "あいてを　おこらせて　こんらんさせる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the target.\nHowever, this also sharply raises the target’s\nAttack stat."
    fr: "Fait enrager la cible et la rend confuse, mais augmente\nbeaucoup son Attaque."
    it: "Chi la usa provoca il bersaglio e lo confonde,\nfacendo aumentare però di molto il suo Attacco."
    de: "Reizt das Ziel und verursacht Verwirrung, allerdings\nwird auch dessen Angriffs-Wert stark erhöht."
    es: "Confunde al objetivo, pero también sube\nmarcadamente su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
    zh_simp: "激怒对手，使其混乱。\n因为愤怒，对手的攻击\n会大幅提高。"
    zh_trad: "讓對手火大並陷入混亂。\n但對手的攻擊會因憤怒\n而大幅提高。"
tm088:
  names:
    jp_kana: わざマシン８８
    jp_kanji: わざマシン８８
    en: TM88
    fr: CT88
    it: MT88
    de: TM88
    es: MT88
    ko: 기술머신88
    zh_simp: 招式学习器88
    zh_trad: 招式學習器88
  descriptions:
    jp_kana: "じぶんが　おぼえている　わざの　うち\nどれか　１つを　くりだす。\nじぶんが　ねている　ときだけ　つかえる。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses one of\nthe moves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard\npendant qu’il dort."
    it: "Chi la usa sfodera a caso una delle proprie mosse\nmentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm bekannte\nAttacke ein. Klappt nur, wenn der Anwender gerade\nschläft."
    es: "Mientras duerme, usa uno de sus movimientos elegido\nal azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
tm089:
  names:
    jp_kana: わざマシン８９
    jp_kanji: わざマシン８９
    en: TM89
    fr: CT89
    it: MT89
    de: TM89
    es: MT89
    ko: 기술머신89
    zh_simp: 招式学习器89
    zh_trad: 招式學習器89
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa fa marcia indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Después de atacar, quien lo usa cambia rápidamente\nsu puesto con un miembro del equipo que no esté\ncombatiendo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
tm090:
  names:
    jp_kana: わざマシン９０
    jp_kanji: わざマシン９０
    en: TM90
    fr: CT90
    it: MT90
    de: TM90
    es: MT90
    ko: 기술머신90
    zh_simp: 招式学习器90
    zh_trad: 招式學習器90
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの　みがわりに　なる。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user makes a copy of itself using some of its\nHP. The copy serves as the user’s decoy."
    fr: "Le lanceur fait une copie de lui-même en sacrifiant\nquelques PV. La copie sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando\nalcuni PS.\nLa copia serve come esca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP ein, um\neinen Doppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Quien lo usa utiliza parte de sus PS para hacer\nuna copia de sí mismo que sirve como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的HP，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的HP，\n製造分身。\n分身將成為自己的替身。"
tm091:
  names:
    jp_kana: わざマシン９１
    jp_kanji: わざマシン９１
    en: TM91
    fr: CT91
    it: MT91
    de: TM91
    es: MT91
    ko: 기술머신91
    zh_simp: 招式学习器91
    zh_trad: 招式學習器91
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに\nあつめて　ちからを　はなつ。　あいての\nとくぼうを　さげることが　ある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy and releases it\nall at once. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse et la fait\nexploser. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa attacca raccogliendo e rilasciando\nenergia luminosa. Può ridurre la Difesa Speciale\ndel bersaglio."
    de: "Entfesselt konzentrierte Lichtenergie.\nDie Spezial-Verteidigung des Zieles sinkt\neventuell."
    es: "Quien lo usa concentra toda su energía lumínica\ny la libera de golpe. Puede reducir la Defensa\nEspecial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 쏜다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时会降低对手的特防。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時會降低對手的特防。"
tm092:
  names:
    jp_kana: わざマシン９２
    jp_kanji: わざマシン９２
    en: TM92
    fr: CT92
    it: MT92
    de: TM92
    es: MT92
    ko: 기술머신92
    zh_simp: 招式学习器92
    zh_trad: 招式學習器92
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ　おそい\nポケモンから　こうげきできる。"
    jp_kanji: "まかふしぎな　空間を　つくる。\n５ターンの　あいだ\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in which slower\nPokémon get to move first for five turns."
    fr: "Le lanceur crée une zone étrange où les Pokémon\nles plus lents ont la priorité pendant cinq tours."
    it: "Chi la usa crea una dimensione in cui i Pokémon\npiù lenti agiscono per primi per cinque turni."
    de: "Verzerrt die Raumzeit für 5 Runden.\nLangsamere Pokémon greifen zuerst an."
    es: "Distorsiona el espacio de forma que los Pokémon\nmás lentos consiguen moverse en primer lugar\ndurante cinco turnos."
    ko: "아주 이상한 공간을 만든다.\n5턴 동안 움직임이 느린\n포켓몬부터 공격할 수 있다."
    zh_simp: "制造出离奇的空间。\n在５回合内\n速度慢的宝可梦可以先行动。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，\n速度慢的寶可夢可以先行動。"
tm093:
  names:
    jp_kana: わざマシン９３
    jp_kanji: わざマシン９３
    en: TM93
    fr: CT93
    it: MT93
    de: TM93
    es: MT93
    ko: 기술머신93
    zh_simp: 招式学习器93
    zh_trad: 招式學習器93
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　ぶつかって　こうげきする。\nじぶんも　すこし　ダメージを　うける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity and smashes\ninto its target. This also damages the user a little."
    fr: "Une charge électrique violente qui blesse aussi\nlégèrement le lanceur."
    it: "Chi la usa si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce dei danni per il\ncontraccolpo."
    de: "Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Er erleidet selbst leichten\nSchaden."
    es: Placaje de alto voltaje que hiere también al atacante.
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "让电流覆盖全身\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "讓電流圍繞全身，\n衝撞對手進行攻擊。\n自己也會受到少許傷害。"
tm094:
  names:
    jp_kana: わざマシン９４
    jp_kanji: わざマシン９４
    en: TM94
    fr: CT94
    it: MT94
    de: TM94
    es: MT94
    ko: 기술머신94
    zh_simp: 招式学习器94
    zh_trad: 招式學習器94
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの\nまわりに　いるものを　こうげきする。"
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena."
    de: "Anwender greift mit einer gewaltigen Welle\nalle Pokémon in seiner Umgebung an."
    es: Inunda el terreno de combate con una ola gigante.
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
tm095:
  names:
    jp_kana: わざマシン９５
    jp_kanji: わざマシン９５
    en: TM95
    fr: CT95
    it: MT95
    de: TM95
    es: MT95
    ko: 기술머신95
    zh_simp: 招式学习器95
    zh_trad: 招式學習器95
  descriptions:
    jp_kana: "まくしたてる　ように　どなりつけて\nあいての　とくこうを　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it’s ranting about something,\nwhich lowers the Sp. Atk stat of\nopposing Pokémon."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa si mette a urlare per un po’, riducendo\nl’Attacco Speciale dei nemici intorno."
    de: "Gibt Gegnern mit einer nicht enden wollenden\nStandpauke was auf die Ohren und senkt dabei\nderen Spezial-Angriff."
    es: "Ataca con un chillido desagradable que baja el\nAtaque Especial del rival."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "没完没了地大声斥责，\n从而降低对手的特攻。"
    zh_trad: "沒完沒了地向對手大聲咆哮，\n降低對手的特攻。"
tm096:
  names:
    jp_kana: わざマシン９６
    jp_kanji: わざマシン９６
    en: TM96
    fr: CT96
    it: MT96
    de: TM96
    es: MT96
    ko: 기술머신96
    zh_simp: 招式学习器96
    zh_trad: 招式學習器96
  descriptions:
    jp_kana: "しぜんの　ちからで　こうげきする。\nつかう　ばしょで\nでてくる　わざが　へんかする。"
    jp_kanji: "自然の　力で　攻撃する。\n使う　場所で\nでてくる　技が　変化する。"
    en: "This attack makes use of nature’s power. Its\neffects vary depending on the user’s environment."
    fr: "Une attaque qui tire sa force de la nature.\nSon type varie selon le terrain."
    it: "Mossa che fa uso della forza della natura.\nIl suo effetto varia in base all’ambiente."
    de: "Angriff mit der Kraft der Natur. Die Wirkung dieser\nAttacke ist ortsabhängig."
    es: "Usa el poder de la naturaleza para atacar.\nSu efecto varía según el entorno de combate."
    ko: "자연의 힘으로 공격한다.\n사용하는 장소에 따라\n나오는 기술이 변화한다."
    zh_simp: "用自然之力进行攻击。\n根据所使用场所的不同，\n使出的招式也会有所变化。"
    zh_trad: "用自然之力進行攻擊。\n隨著使用地點的不同，\n使出的招式也會改變。"
tm097:
  names:
    jp_kana: わざマシン９７
    jp_kanji: わざマシン９７
    en: TM97
    fr: CT97
    it: MT97
    de: TM97
    es: MT97
    ko: 기술머신97
    zh_simp: 招式学习器97
    zh_trad: 招式學習器97
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura imbued with dark\nthoughts. This may also make the target flinch."
    fr: "Le lanceur dégage une horrible aura chargée\nd’idées noires. Peut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di oscuri\npensieri. Può anche far tentennare il Pokémon\ncolpito."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos pensamientos\ny puede hacer retroceder al objetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n有时会使对手畏缩。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n有時會使對手畏縮。"
tm098:
  names:
    jp_kana: わざマシン９８
    jp_kanji: わざマシン９８
    en: TM98
    fr: CT98
    it: MT98
    de: TM98
    es: MT98
    ko: 기술머신98
    zh_simp: 招式学习器98
    zh_trad: 招式學習器98
  descriptions:
    jp_kana: "すごい　いきおいで　あいてに　つっこむ。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: "The user charges at the target and may make\nit flinch."
    fr: "Le lanceur charge l’ennemi à une vitesse\nremarquable, ce qui peut l’apeurer."
    it: "Carica il bersaglio a grande velocità e può farlo\ntentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso que puede hacer\nretroceder."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
tm099:
  names:
    jp_kana: わざマシン９９
    jp_kanji: わざマシン９９
    en: TM99
    fr: CT99
    it: MT99
    de: TM99
    es: MT99
    ko: 기술머신99
    zh_simp: 招式学习器99
    zh_trad: 招式學習器99
  descriptions:
    jp_kana: "きょうりょくな　ひかりを　はなち\nあいてに　ダメージを　あたえる。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon by emitting a\npowerful flash."
    fr: "Libère une puissante décharge lumineuse qui inflige\ndes dégâts à l’ennemi."
    it: "Chi la usa emette una luce potentissima che\ninfligge danni ai nemici intorno."
    de: "Angriff mit einem starken Lichtstrahl, der dem\nGegner Schaden zufügt."
    es: Inflige daño a los oponentes con una potente luz.
    ko: "강력한 빛을 쏴서\n상대에게 데미지를 준다."
    zh_simp: "向对手发出强光，\n并给予伤害。"
    zh_trad: "向對手發出強光，\n並給予傷害。"
tm100:
  names:
    jp_kana: わざマシン１００
    jp_kanji: わざマシン１００
    en: TM100
    fr: CT100
    it: MT100
    de: TM100
    es: MT100
    ko: 기술머신100
    zh_simp: 招式学习器100
    zh_trad: 招式學習器100
  descriptions:
    jp_kana: "ないしょばなしを　することで　あいての\nしゅうちゅうりょくを　うしなわせ\nあいての　とくこうを　さげる。"
    jp_kanji: "ないしょばなしを　することで　相手の\n集中力を　失わせ\n相手の　特攻を　さげる。"
    en: "The user tells the target a secret, and the target\nloses its ability to concentrate. This lowers the\ntarget’s Sp. Atk stat."
    fr: "Dévoile des secrets à l’ennemi, qui perd alors\nsa concentration et voit son Attaque Spéciale\ndiminuer."
    it: "Chi la usa svela dei segreti al bersaglio,\ndistraendolo e riducendone l’Attacco Speciale."
    de: "Der Anwender vertraut dem Ziel ein Geheimnis an\nund stört auf diese Weise dessen Konzentration.\nDer Spezial-Angriff des Zieles sinkt."
    es: "Hace que el objetivo pierda la concentración\ncontándole un secreto. Disminuye el Ataque\nEspecial del oponente."
    ko: "비밀 이야기를 해서\n상대의 집중력을 잃게 하여\n특수공격을 떨어뜨린다."
    zh_simp: "和对手进行密语，\n使其失去集中力，\n从而降低对手的特攻。"
    zh_trad: "向對手低聲密語，\n使對手失去集中力，\n降低對手的特攻。"
tm_case:
  names:
    jp_kana: わざマシンケース
    jp_kanji: わざマシンケース
    en: TM Case
    fr: Boîte CT
    it: Porta MT
    de: TM-Box
    es: Estuche de MT
    ko: 기술머신케이스
    zh_simp: 招式学习器盒
    zh_trad: 招式學習器盒
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
tmv_pass:
  names:
    jp_kana: ＴＭＶパス
    jp_kanji: ＴＭＶパス
    en: TMV Pass
    fr: Passe TMV
    it: Pass TMV
    de: TMV-Pass
    es: Abono del TMV
    ko: TMV패스
    zh_simp: TMV自由票
    zh_trad: TMV自由票
  descriptions:
    jp_kana: "ミアレシティと　キナンシティを\nむすぶ　ちょうこうそくてつどうに\nいつでも　のれる　チケット。"
    jp_kanji: "ミアレシティと　キナンシティを\n結ぶ　超高速鉄道に\nいつでも　乗れる　チケット。"
    en: "A commuter pass that allows the holder to ride the\nTMV between Lumiose City and Kiloude City at\nany time."
    fr: "Un abonnement à vie à la ligne de TMV qui relie\nIllumis à Batisques."
    it: "Biglietto che permette di salire liberamente\nsul treno a megavelocità che collega Luminopoli\ne Batikopoli."
    de: "Mit dieser Fahrkarte kannst du jederzeit den\nHochgeschwindigkeitszug nehmen, der zwischen\nIllumina City und Batika City verkehrt."
    es: "Pase que permite realizar viajes ilimitados en el TMV\nque une las ciudades de Luminalia y Batik."
    ko: "미르시티와 기남시티를 잇는\n초고속철도를 언제든지\n탈 수 있는 티켓."
    zh_simp: "可以随时乘坐连接着\n密阿雷市和奇楠市的\n超高速列车的车票。"
    zh_trad: "可以隨時乘坐連接著\n密阿雷市和奇楠市的\n超高速列車的車票。"
tough_candy:
  names:
    jp_kana: まもりのアメ
    jp_kanji: まもりのアメ
    en: Tough Candy
    fr: Bonbon Armure S
    it: Caramella protezione S
    de: Robustbonbon
    es: Caramelo Aguante
    ko: 수비의사탕
    zh_simp: 守护糖果
    zh_trad: 守護糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　ぼうぎょを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　ぼうぎょを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Defense stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon."
    es: "Caramelo energético que aumenta la Defensa del\nPokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 방어를 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的防御。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的防禦。"
tough_candy_l:
  names:
    jp_kana: まもりのアメＬ
    jp_kanji: まもりのアメＬ
    en: Tough Candy L
    fr: Bonbon Armure M
    it: Caramella protezione M
    de: Robustbonbon+
    es: Caramelo Aguante +
    ko: 수비의사탕L
    zh_simp: 守护糖果L
    zh_trad: 守護糖果L
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nぼうぎょを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nぼうぎょを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase\nthat Pokémon’s Defense stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon de niveau 30\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon di livello 30\no superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon ab\nLevel 30."
    es: "Caramelo energético grande que aumenta la Defensa\nde un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n방어를 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级30以上的\n宝可梦的防御上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在30以上的\n寶可夢的防禦。"
tough_candy_xl:
  names:
    jp_kana: まもりのアメＸＬ
    jp_kanji: まもりのアメＸＬ
    en: Tough Candy XL
    fr: Bonbon Armure L
    it: Caramella protezione L
    de: Robustbonbon++
    es: Caramelo Aguante ++
    ko: 수비의사탕XL
    zh_simp: 守护糖果XL
    zh_trad: 守護糖果XL
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nぼうぎょを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nぼうぎょを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase\nthat Pokémon’s Defense stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente la Défense d’un Pokémon de niveau 60\nou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta la Difesa di un Pokémon di livello 60\no superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft die Verteidigung eines Pokémon ab\nLevel 60."
    es: "Caramelo energético enorme que aumenta la Defensa\nde un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n방어를 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级60以上的\n宝可梦的防御上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在60以上的\n寶可夢的防禦。"
town_map:
  names:
    jp_kana: タウンマップ
    jp_kanji: タウンマップ
    en: Town Map
    fr: Carte
    it: Mappa città
    de: Karte
    es: Mapa
    ko: 타운맵
    zh_simp: 城镇地图
    zh_trad: 城鎮地圖
  descriptions:
    jp_kana: "いつでも　てがるに　みることが\nできる　べんりな　ちず。\nじぶんの　ばしょも　わかる。"
    jp_kanji: "いつでも　手軽に　みることが\nできる　便利な　地図。\n自分の　場所も　わかる。"
    en: "A very convenient map that can be viewed anytime.\nIt even shows you your present location in the region."
    fr: "Une carte très pratique pouvant être consultée\nn’importe quand. Elle indique votre position actuelle."
    it: "Utilissima mappa, consultabile in ogni situazione.\nMostra anche la propria posizione in tempo reale."
    de: "Eine praktische Karte, die jederzeit aufgerufen\nwerden kann. Dein aktueller Standort wird auch\nangezeigt."
    es: "Un mapa muy útil que puede consultarse en cualquier\nmomento y que, además, te indica dónde te encuentras."
    ko: "언제라도 간편하게 볼 수\n있는 편리한 지도.\n자신이 있는 곳도 알 수 있다."
    zh_simp: "可以随时轻松\n查看的便利地图。\n也能清楚自己的位置。"
    zh_trad: "可以隨時輕鬆\n查看的好用地圖。\n也能知道自己的位置。"
toxic_orb:
  names:
    jp_kana: どくどくだま
    jp_kanji: どくどくだま
    en: Toxic Orb
    fr: Orbe Toxique
    it: Tossicsfera
    de: Toxik-Orb
    es: Toxisfera
    ko: 맹독구슬
    zh_simp: 剧毒宝珠
    zh_trad: 劇毒寶珠
  descriptions:
    jp_kana: "さわると　どくをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nもうどくの　じょうたいに　なる。"
    jp_kanji: "触ると　毒をだす　不思議な玉。\n持たせると　戦闘中に\n猛毒の　状態に　なる。"
    en: "An item to be held by a Pokémon. It’s a bizarre orb\nthat will badly poison the holder during battle."
    fr: "Objet à tenir. Un orbe bizarre empoisonnant gravement\nson porteur durant le combat."
    it: "Strumento da dare a un Pokémon.\nSfera bizzarra che iperavvelena chi l’ha con sé\nin una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb vergiftet\nseinen Träger im Kampf schwer."
    es: "Extraña esfera que envenena gravemente al Pokémon\nque la lleva en combate."
    ko: "만지면 독을 발산하는 이상한 구슬.\n지니게 하면 배틀 중에\n맹독 상태가 된다."
    zh_simp: "触碰后会放出毒的神奇宝珠。\n携带后，在战斗时会变成剧毒状态。"
    zh_trad: "觸碰後會放出毒的神奇寶珠。\n攜帶後，在戰鬥時\n會變成劇毒狀態。"
toxic_plate:
  names:
    jp_kana: もうどくプレート
    jp_kanji: もうどくプレート
    en: Toxic Plate
    fr: Plaque Toxik
    it: Lastrafiele
    de: Gifttafel
    es: Tabla Tóxica
    ko: 맹독플레이트
    zh_simp: 剧毒石板
    zh_trad: 劇毒石板
  descriptions:
    jp_kana: "どくの　タイプの　せきばん。\nもたせると　どくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　石盤。\n持たせると　どくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Poison-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gift."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Veneno. Debe llevarla un Pokémon."
    ko: "독타입의 석판.\n지니게 하면 독타입\n기술의 위력이 강해진다."
    zh_simp: "毒属性的石板。\n携带后，毒属性的\n招式威力就会增强。"
    zh_trad: "毒屬性的石板。\n攜帶後，毒屬性的\n招式威力就會增強。"
travel_trunk:gold:
  names:
    jp_kana: いしょうトランク
    jp_kanji: いしょうトランク
    en: Travel Trunk
    fr: Malle Penderie
    it: Baule per abiti
    de: Kleiderkoffer
    es: Maleta
    ko: 의상트렁크
    zh_simp: 衣物箱
    zh_trad: 衣物箱
  descriptions:
    jp_kana: "どんな　ファッションアイテムでも\nつめこんでおける　しゅうのうりょく\nばつぐんの　かるい　トランク。"
    jp_kanji: "どんな　ファッションアイテムでも\n詰めこんでおける　収納力\n抜群の　軽い　トランク。"
    en: "A light and yet incredibly effective trunk, which can\ncontain every last piece of clothing that can\nbe bought."
    fr: "Une valise extrêmement légère, parfaite pour stocker un\ngrand nombre de vêtements et d’accessoires de mode."
    it: "Un baule leggero ma estremamente capiente che\npuò contenere qualsiasi capo d’abbigliamento."
    de: "Ein leichter und sehr hilfreicher Koffer mit so viel\nStauraum, dass jedes erdenkliche Kleidungsstück\nund Accessoire darin aufbewahrt werden kann."
    es: "Maleta ligera de increíble capacidad donde podrás\nguardar todas las prendas de ropa que quieras."
    ko: "어떤 패션 아이템이라도\n담아둘 수 있고 가벼우며\n수납력이 뛰어난 트렁크."
    zh_simp: "能塞入任意时尚物品，\n收纳能力极佳的轻箱子。"
    zh_trad: "能夠塞入各種時尚物品的\n收納能力極佳的輕箱子。"
tropical_shell:
  names:
    jp_kana: なんごくかいがら
    jp_kanji: なんごくかいがら
    en: Tropical Shell
    fr: Coquille du Sud
    it: Tropiconchiglia
    de: Tropenmuschel
    es: Concha Tropical
    ko: 트로피컬조개껍질
    zh_simp: 南国贝壳
    zh_trad: 南國貝殼
  descriptions:
    jp_kana: "あたたかい　ちほうの　うみから\nながれついた　かも　しれない\nしろくて　きれいな　かいがら。"
    jp_kanji: "あたたかい　地方の　海から\n流れついた　かも　しれない\n白くて　きれいな　貝がら。"
    en: "A beautiful white shell that may have drifted from\na sea in a warm region."
    fr: "Un joli coquillage blanc. Il a peut-être été porté\npar les vagues depuis une région tropicale."
    it: "Una bellissima conchiglia bianca, forse arrivata dalle\nregioni calde sulla scia delle correnti marine."
    de: "Eine wunderschöne weiße Muschelschale. Vermutlich\nstammt sie aus dem Meer einer wärmeren Region und\nwurde von der Strömung angespült."
    es: "Preciosa concha de color blanco que quizá haya sido\narrastrada por las corrientes marinas desde mares de\nregiones más cálidas."
    ko: "따뜻한 지방의 바다에서\n흘러들어 왔을지도 모르는\n하얗고 예쁜 조개껍질."
    zh_simp: "美丽的白色贝壳。\n或许是从温暖的海域那里\n漂流到这里的。"
    zh_trad: "美麗的白色貝殼。\n可能是從溫暖的海域\n漂流過來的。"
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    jp_kanji: まがったスプーン
    en: Twisted Spoon
    fr: Cuiller Tordue
    it: Cucchiaio Torto
    de: Krummlöffel
    es: Cuchara Torcida
    ko: 휘어진스푼
    zh_simp: 弯曲的汤匙
    zh_trad: 彎曲的湯匙
  descriptions:
    jp_kana: "ねんりきを　こめた　スプーン。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "念力を　こめた　スプーン。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This spoon is\nimbued with telekinetic power and boosts\nPsychic-type moves."
    fr: "Objet à tenir. Une cuiller contenant un pouvoir\ntélékinétique qui augmente la puissance des capacités\nde type Psy."
    it: "Strumento da dare a un Pokémon.\nCucchiaio dotato di potere telecinetico che\npotenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Ein Löffel voller telekinetischer\nEnergie, der Attacken vom Typ Psycho verstärkt."
    es: "Cuchara imbuida de energía telequinética que\npotencia los movimientos de tipo Psíquico.\nDebe llevarla un Pokémon."
    ko: "염동력을 담은 숟가락.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
    zh_simp: "注入了念力的汤匙。\n携带后，超能力属性的\n招式威力就会提高。"
    zh_trad: "注入了念力的湯匙。\n攜帶後，超能力屬性的\n招式威力就會提高。"
tyranitarite:
  names:
    jp_kana: バンギラスナイト
    jp_kanji: バンギラスナイト
    en: Tyranitarite
    fr: Tyranocivite
    it: Tyranitarite
    de: Despotarnit
    es: Tyranitarita
    ko: 마기라스나이트
    zh_simp: 班基拉斯进化石
    zh_trad: 班基拉斯進化石
  descriptions:
    jp_kana: "バンギラスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バンギラスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Tyranitar hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tyranocif, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Tyranitar, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Despotar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Tyranitar en combate."
    ko: "마기라스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让班基拉斯携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓班基拉斯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
ultra_ball:
  names:
    jp_kana: ハイパーボール
    jp_kanji: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultra Ball
    ko: 하이퍼볼
    zh_simp: 高级球
    zh_trad: 高級球
  descriptions:
    jp_kana: "スーパーボールよりも　さらに\nポケモンを　つかまえやすくなった\nすごく　せいのうのいい　ボール。"
    jp_kanji: "スーパーボールよりも　さらに\nポケモンを　捕まえやすくなった\nすごく　性能のいい　ボール。"
    en: "An ultra-high-performance Poké Ball that provides\na higher success rate for catching Pokémon than\na Great Ball."
    fr: "Une Ball très performante dont le taux de réussite\nest supérieur à celui de la Super Ball."
    it: "Poké Ball dalle prestazioni eccellenti: fornisce\nmaggiori probabilità di cattura rispetto alla\nMega Ball."
    de: "Ein Ball mit hoher Erfolgsquote. Dem Superball in\nallen Punkten überlegen."
    es: "Poké Ball de rendimiento superior. Tiene un índice\nde éxito mayor al de la Super Ball."
    ko: "수퍼볼보다도 더욱\n포켓몬을 잡기 쉬워진\n매우 성능이 좋은 볼."
    zh_simp: "比起超级球来\n更容易捉到宝可梦的，\n性能非常不错的球。"
    zh_trad: "性能非常不錯的球。\n比起超級球\n更容易捉到寶可夢。"
ultranecrozium_z:bag:
  names:
    jp_kana: ウルトラネクロＺ
    jp_kanji: ウルトラネクロＺ
    en: Ultranecrozium Z
    fr: Ultranécrozélite
    it: Ultranecrozium Z
    de: Ultranecronium Z
    es: Ultranecrostal Z
    ko: 울트라네크로Z
    zh_simp: 究极奈克洛Ｚ
    zh_trad: 究極奈克洛Ｚ
  descriptions:
    jp_kana: "ソルガレオか　ルナアーラと\nがったいした　ネクロズマを\nあらたな　すがたにする　けっしょう。"
    jp_kanji: "ソルガレオか　ルナアーラと\n合体した　ネクロズマを\n新たな　姿にする　結晶。"
    en: "It’s a crystal that turns Necrozma fused with\nSolgaleo or Lunala into a new form."
    fr: "Un cristal permettant de donner une nouvelle forme\nà Necrozma quand il a fusionné avec Solgaleo ou\nLunala."
    it: "Cristallo che permette a Necrozma di assumere una\nnuova forma quando è fuso con Lunala o Solgaleo."
    de: "Kristallisierte Z-Kraft, die bei Necrozma nach der\nFusion mit Solgaleo oder Lunala bewirkt, dass es\neine neue Form annimmt."
    es: "Cristal que permite a Necrozma, una vez fusionado\ncon Solgaleo o Lunala, adoptar una nueva forma."
    ko: "솔가레오나 루나아라와\n합체한 네크로즈마를\n새로운 모습으로 만드는 결정."
    zh_simp: "能让和索尔迦雷欧或\n露奈雅拉合体的奈克洛兹玛\n变成崭新样子的结晶。"
    zh_trad: "可讓和索爾迦雷歐或露奈雅拉\n合體後的奈克洛茲瑪\n展現出全新樣子的結晶。"
ultranecrozium_z:held:
  names:
    jp_kana: ウルトラネクロＺ
    jp_kanji: ウルトラネクロＺ
    en: Ultranecrozium Z
    fr: Ultranécrozélite
    it: Ultranecrozium Z
    de: Ultranecronium Z
    es: Ultranecrostal Z
    ko: 울트라네크로Z
    zh_simp: 究极奈克洛Ｚ
    zh_trad: 究極奈克洛Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nネクロズマの　フォトンゲイザーを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nネクロズマの　フォトンゲイザーを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Necrozma’s Photon Geyser to\na Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Photo-Geyser de Necrozma\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Geyser Fotonico\ndi Necrozma in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Necrozmas Attacke Photonen-Geysir\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nGéiser Fotónico de Necrozma."
    ko: "Z파워의 결정.\n네크로즈마의 포톤가이저를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将奈克洛兹玛的光子喷涌\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將奈克洛茲瑪的光子噴湧\n升級為Ｚ招式。"
unown_report:
  names:
    jp_kana: アンノーンノート
    jp_kanji: アンノーンノート
    en: Unown Report
    fr: Carnet Zarbi
    it: UnownBloc
    de: Icognitoheft
    es: Bloc Unown
    ko: 안농노트
    zh_simp: 未知图腾笔记
    zh_trad: 未知圖騰筆記
  descriptions:
    jp_kana: "みつけた　アンノーンの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "みつけた　アンノーンの　ようすが\n記録されている　ノート。"
    en: A report of all the discovered kinds of Unown.
    fr: "Un carnet permettant de noter toutes les formes\nde Zarbi capturées."
    it: "Quaderno dove si registrano tutte le forme\ndi Unown catturate."
    de: "Ein Heft, in dem automatisch Daten zu bereits\ngefangenen Icognito aufgezeichnet werden."
    es: "Bloc que almacena la información de los Unown\ncapturados hasta el momento."
    ko: "발견한 안농의 모습이\n기록되어 있는 노트."
    zh_simp: "记录着已找到的\n未知图腾样子的笔记本。"
    zh_trad: "記錄著已找到的\n未知圖騰樣子的筆記本。"
upgrade:
  names:
    jp_kana: アップグレード
    jp_kanji: アップグレード
    en: Up-Grade
    fr: Améliorator
    it: Upgrade
    de: Up-Grade
    es: Mejora
    ko: 업그레이드
    zh_simp: 升级数据
    zh_trad: 升級資料
  descriptions:
    jp_kana: "なかに　いろんな　じょうほうが\nつまった　とうめいな　きかい。\nシルフ　カンパニーせい。"
    jp_kanji: "中に　いろんな　情報が\nつまった　透明な　機械。\nシルフ　カンパニー製。"
    en: "A transparent device somehow filled with all sorts\nof data. It was produced by Silph Co."
    fr: "Un dispositif transparent rempli de données diverses\net variées. Fabriqué par la Sylphe SARL."
    it: "Apparecchio trasparente pieno zeppo di dati\ndi ogni tipo. È un prodotto della Silph S.p.A."
    de: "Ein durchsichtiges Gerät. Es enthält alle möglichen\nDaten. Hergestellt von Silph Co."
    es: "Peculiar dispositivo fabricado en Silph S. A. que\ncontiene todo tipo de datos."
    ko: "안에 여러 가지 정보가\n가득한 투명한 기계다.\n실프주식회사 제품."
    zh_simp: "内部储存了各种信息的透明机器。\n西尔佛公司制造。"
    zh_trad: "內部儲存了各種\n資訊的透明機器。\n西爾佛公司製造。"
venonat_candy:
  names:
    jp_kana: コンパンのアメ
    jp_kanji: コンパンのアメ
    en: Venonat Candy
    fr: Bonbon Mimitoss
    it: Caramella Venonat
    de: Bluzuk-Bonbon
    es: Caramelo Venonat
    ko: 콘팡의사탕
    zh_simp: 毛球的糖果
    zh_trad: 毛球的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
venusaurite:
  names:
    jp_kana: フシギバナイト
    jp_kanji: フシギバナイト
    en: Venusaurite
    fr: Florizarrite
    it: Venusaurite
    de: Bisaflornit
    es: Venusaurita
    ko: 이상해꽃나이트
    zh_simp: 妙蛙花进化石
    zh_trad: 妙蛙花進化石
  descriptions:
    jp_kana: "たたかいのとき　フシギバナを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　フシギバナを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Venusaur to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Florizarre de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Venusaur di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Bisaflor, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Venusaur en combate."
    ko: "배틀할 때 이상해꽃을\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让妙蛙花\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓妙蛙花進行超級進化的\n一種神奇超級石。"
voltorb_candy:
  names:
    jp_kana: ビリリダマのアメ
    jp_kanji: ビリリダマのアメ
    en: Voltorb Candy
    fr: Bonbon Voltorbe
    it: Caramella Voltorb
    de: Voltobal-Bonbon
    es: Caramelo Voltorb
    ko: 찌리리공의사탕
    zh_simp: 霹雳电球的糖果
    zh_trad: 霹靂電球的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
vs_recorder:
  names:
    jp_kana: バトルレコーダー
    jp_kanji: バトルレコーダー
    en: Vs. Recorder
    fr: Magnéto VS
    it: Registradati
    de: Kampfkamera
    es: Cámara Lucha
    ko: 배틀레코더
    zh_simp: 对战记录器
    zh_trad: 對戰記錄器
  descriptions:
    jp_kana: "ともだち　との　しょうぶや\nとくしゅな　しせつでの　しょうぶを\nきろくできる　かっこいい　きかい。"
    jp_kanji: "友達との　勝負や\n特殊な　施設での　勝負を\n記録できる　かっこいい　機械。"
    en: "An amazing device that can record a battle\nbetween friends or the battles at certain special\nbattle facilities."
    fr: "Un appareil utile permettant d’enregistrer les combats\nentre amis et ceux ayant lieu dans un bâtiment\nde combat."
    it: "Fantastico dispositivo che registra le lotte\ntra amici o quelle che hanno luogo in alcuni\nedifici dedicati alla lotta."
    de: "Ein tolles Gerät, um Kämpfe zwischen Freunden\noder Kämpfe in einer speziellen Kampfeinrichtung\naufzuzeichnen."
    es: "Un fantástico dispositivo que graba combates entre\namigos o celebrados en algún recinto especial."
    ko: "친구와의 승부나\n특수한 시설에서의 승부를\n기록할 수 있는 멋있는 기계."
    zh_simp: "很酷的机器。\n可以记录和朋友或\n在特殊设施里的对战过程。"
    zh_trad: "很酷的機器。\n可以記錄和朋友或\n在特殊設施裡的對戰過程。"
vs_seeker:
  names:
    jp_kana: バトルサーチャー
    jp_kanji: バトルサーチャー
    en: Vs. Seeker
    fr: Cherch’Combat
    it: Cercasfide
    de: Kampffahnder
    es: Buscapelea
    ko: 배틀서처
    zh_simp: 对战搜寻器
    zh_trad: 對戰搜尋器
  descriptions:
    jp_kana: "たたかいたい　トレーナーを\nおしえてくれる　きかい。\nあるくと　でんちが　たまる。"
    jp_kanji: "戦いたい　トレーナーを\n教えてくれる　機械。\n歩くと　電池が　たまる。"
    en: "A device that indicates Trainers who want to\nbattle. Its battery charges while you walk."
    fr: "Un appareil indiquant les Dresseurs prêts à se battre.\nLa batterie se recharge quand vous marchez."
    it: "Apparecchio per trovare gli Allenatori che vogliono\nlottare. La batteria si ricarica camminando."
    de: "Ein Gerät, das rückkampfwillige Trainer ausfindig\nmacht. Die Batterie lädt sich beim Reisen auf."
    es: "Dispositivo que busca Entrenadores listos para el\ncombate. La batería se carga mientras caminas."
    ko: "싸우고 싶어하는 트레이너를\n알려주는 기계.\n걸으면 전지가 충전된다."
    zh_simp: "会告诉你想对战的\n训练家在哪里的机器。\n走路就能给电池充电。"
    zh_trad: "會告訴你想對戰的\n訓練家在哪裡的機器。\n走路就能給電池充電。"
vulpix_candy:
  names:
    jp_kana: ロコンのアメ
    jp_kanji: ロコンのアメ
    en: Vulpix Candy
    fr: Bonbon Goupix
    it: Caramella Vulpix
    de: Vulpix-Bonbon
    es: Caramelo Vulpix
    ko: 식스테일의사탕
    zh_simp: 六尾的糖果
    zh_trad: 六尾的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
wacan_berry:
  names:
    jp_kana: ソクノのみ
    jp_kanji: ソクノのみ
    en: Wacan Berry
    fr: Baie Parma
    it: Baccaparmen
    de: Kerzalbeere
    es: Baya Gualot
    ko: 초나열매
    zh_simp: 烛木果
    zh_trad: 燭木果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　でんき　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　でんき技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nElectric-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Électrik."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Elettro del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Elektro."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Eléctrico de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 전기 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的电属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的電屬性招式\n攻擊時，能使其威力減弱。"
wailmer_pail:
  names:
    jp_kana: ホエルコじょうろ
    jp_kanji: ホエルコじょうろ
    en: Wailmer Pail
    fr: Wailmerrosoir
    it: Vaso Wailmer
    de: Wailmerkanne
    es: Wailmegadera
    ko: 고래왕자물뿌리개
    zh_simp: 吼吼鲸喷壶
    zh_trad: 吼吼鯨噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\n土に　うめた　きのみを\nすくすく　育てる。"
    en: "This is a tool for watering Berries you planted to\nmake them grow more quickly."
    fr: Sert à arroser les Baies plantées dans le sol.
    it: "Annaffiatoio a forma di Wailmer che aiuta a far\ncrescere rigogliose le piantine di bacche."
    de: "Eine Gießkanne. Gießt du mit ihr im Boden\nangepflanzte Beeren, wachsen sie schneller."
    es: "Regadera con forma de Wailmer. Muy útil para que\ncrezcan las bayas plantadas."
    ko: "물을 주는 도구.\n땅에 심은 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在土壤裡的\n樹果快快長大。"
water_gem:
  names:
    jp_kana: みずのジュエル
    jp_kanji: みずのジュエル
    en: Water Gem
    fr: Joyau Eau
    it: Bijouacqua
    de: Wasserjuwel
    es: Gema Agua
    ko: 물주얼
    zh_simp: 水之宝石
    zh_trad: 水之寶石
  descriptions:
    jp_kana: "みずの　タイプの　ジュエル。\nもたせると　いちどだけ　みずの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　ジュエル。\n持たせると　１度だけ　みずの\n技の　威力が　強まる。"
    en: "A gem with an essence of water. When held, it\nstrengthens the power of a Water-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Acqua."
    de: "Ein Juwel vom Typ Wasser. Es erhöht einmalig die\nStärke einer Attacke vom Typ Wasser."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Agua. Debe llevarla un Pokémon."
    ko: "물타입의 주얼.\n지니게 하면 한 번만 물\n기술의 위력이 강해진다."
    zh_simp: "水属性的宝石。\n携带后，水属性的\n招式威力仅会增强１次。"
    zh_trad: "水屬性的寶石。\n攜帶後，水屬性招式的\n威力會僅增強１次。"
water_memory:
  names:
    jp_kana: ウオーターメモリ
    jp_kanji: ウオーターメモリ
    en: Water Memory
    fr: ROM Eau
    it: ROM Acqua
    de: Wasser-Disc
    es: Disco Agua
    ko: 워터메모리
    zh_simp: 清水存储碟
    zh_trad: 清水記憶碟
  descriptions:
    jp_kana: "みずタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "みずタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Water-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Eau. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Acqua in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Wasser.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nAgua. Permite cambiar de tipo a cierto Pokémon."
    ko: "물타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有水属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有水屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
water_stone:
  names:
    jp_kana: みずのいし
    jp_kanji: みずのいし
    en: Water Stone
    fr: Pierre Eau
    it: Pietraidrica
    de: Wasserstein
    es: Piedra Agua
    ko: 물의돌
    zh_simp: 水之石
    zh_trad: 水之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nすんだ　みずいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n澄んだ　水色を　している。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It is the blue of a pool of clear water."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle est de couleur bleue."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Ha delle macchioline azzurre."
    de: "Dieser spezielle Stein löst bei bestimmten Pokémon\ndie Entwicklung aus. Er ist hellblau."
    es: "Curiosa piedra que hace evolucionar a determinadas\nespecies de Pokémon. Es de color azul."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n투명한 푸른색을 띠고 있다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n看上去是澄蓝色的。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n看起來是澄澈的藍色。"
waterium_z:bag:
  names:
    jp_kana: ミズＺ
    jp_kanji: ミズＺ
    en: Waterium Z
    fr: Aquazélite
    it: Idrium Z
    de: Aquium Z
    es: Hidrostal Z
    ko: 물Z
    zh_simp: 水Ｚ
    zh_trad: 水Ｚ
  descriptions:
    jp_kana: "みずタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "みずタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nWater-type moves to Water-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Eau en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Acqua in mosse Z."
    de: "Kristallisierte Z-Kraft, die Wasser-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nAgua en movimientos Z."
    ko: "물타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将水属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把水屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
waterium_z:held:
  names:
    jp_kana: ミズＺ
    jp_kanji: ミズＺ
    en: Waterium Z
    fr: Aquazélite
    it: Idrium Z
    de: Aquium Z
    es: Hidrostal Z
    ko: 물Z
    zh_simp: 水Ｚ
    zh_trad: 水Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nみずタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nみずタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Water-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Eau en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Acqua\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Wasser-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Agua."
    ko: "Z파워의 결정.\n물타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将水属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把水屬性的招式\n升級為Ｚ招式。"
watmel_berry:
  names:
    jp_kana: カイスのみ
    jp_kanji: カイスのみ
    en: Watmel Berry
    fr: Baie Stekpa
    it: Baccacomero
    de: Wasmelbeere
    es: Baya Sambia
    ko: 슈박열매
    zh_simp: 瓜西果
    zh_trad: 瓜西果
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nl’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es una baya muy rara en otras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
wave_incense:
  names:
    jp_kana: さざなみのおこう
    jp_kanji: さざなみのおこう
    en: Wave Incense
    fr: Encens Vague
    it: Ondaroma
    de: Wellenrauch
    es: Incienso Aqua
    ko: 잔물결향로
    zh_simp: 涟漪薰香
    zh_trad: 漣漪薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of\nWater-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia los movimientos\nde tipo Agua. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，水屬性的\n招式威力就會提高。"
weakness_policy:
  names:
    jp_kana: じゃくてんほけん
    jp_kanji: じゃくてんほけん
    en: Weakness Policy
    fr: Vulné-Assurance
    it: Vulneropolizza
    de: Schwächenschutz
    es: Seguro Debilidad
    ko: 약점보험
    zh_simp: 弱点保险
    zh_trad: 弱點保險
  descriptions:
    jp_kana: "じゃくてんを　つかれたとき\nこうげきと　とくこうが\nそれぞれ　ぐーんと　あがる。"
    jp_kanji: "弱点を　つかれたとき\n攻撃と　特攻が\nそれぞれ　ぐーんと　あがる。"
    en: "An item to be held by a Pokémon. Attack and\nSp. Atk sharply increase if the holder is hit with\na move it’s weak to."
    fr: "Objet à tenir. Augmente beaucoup l’Attaque et\nl’Attaque Spéciale du Pokémon lorsqu’il est touché\npar une capacité d’un type auquel il est vulnérable."
    it: "Se il Pokémon viene colpito da una mossa contro\ncui è debole, l’Attacco e l’Attacco Speciale\naumentano considerevolmente."
    de: "Erhöht den Angriff und den Spezial-Angriff des\nTrägers stark, wenn er von einer sehr effektiven\nAttacke getroffen wird."
    es: "Aumenta mucho el Ataque y el Ataque Especial\ncuando el Pokémon que lo lleva recibe un ataque\nfrente al cual es débil."
    ko: "약점을 공격당했을 때\n공격과 특수공격이\n각각 크게 올라간다."
    zh_simp: "被针对弱点时，\n攻击和特攻就会大幅提高。"
    zh_trad: "被攻擊到弱點時，\n攻擊和特攻就會\n分別大幅提高。"
weedle_candy:
  names:
    jp_kana: ビードルのアメ
    jp_kanji: ビードルのアメ
    en: Weedle Candy
    fr: Bonbon Aspicot
    it: Caramella Weedle
    de: Hornliu-Bonbon
    es: Caramelo Weedle
    ko: 뿔충이의사탕
    zh_simp: 独角虫的糖果
    zh_trad: 獨角蟲的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
wepear_berry:
  names:
    jp_kana: セシナのみ
    jp_kanji: セシナのみ
    en: Wepear Berry
    fr: Baie Repoi
    it: Baccapera
    de: Nirbebeere
    es: Baya Peragu
    ko: 서배열매
    zh_simp: 西梨果
    zh_trad: 西梨果
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nみどりいろの　みは　たべると　にがい。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n緑色の実は　食べると　苦い。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness. Its green flesh is bitter when eaten."
    fr: "Une Baie verte au goût amer, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter l’Intelligence\nd’un Pokémon."
    it: "Bacca verde dal sapore amaro usata per creare\nPokémelle che aumentano l’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIhr grünes Fruchtfleisch schmeckt bitter."
    es: "Se utiliza en la producción de Pokécubos que potencian\nel ingenio. Es de color verde y sabor amargo."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n초록색 열매는 먹으면 쓰다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨聪明。\n绿色的果实尝起来是苦的。"
    zh_trad: "製作用於增進聰明的\n寶可方塊時使用。\n綠色的果實嘗起來是苦的。"
whipped_dream:
  names:
    jp_kana: ホイップポップ
    jp_kanji: ホイップポップ
    en: Whipped Dream
    fr: Chantibonbon
    it: Dolcespuma
    de: Sahnehäubchen
    es: Dulce de Nata
    ko: 휘핑팝
    zh_simp: 泡沫奶油
    zh_trad: 泡沫奶油
  descriptions:
    jp_kana: "ふんわり　ふわふわに　あわだてた\nほんのり　あまい　クリーム。\nある　ポケモンが　このんでいる。"
    jp_kanji: "ふんわり　ふわふわに　泡立てた\nほんのり　甘い　クリーム。\nある　ポケモンが　好んでいる。"
    en: "A soft and sweet treat made of fluffy, puffy,\nwhipped, and whirled cream. It’s loved by a\ncertain Pokémon."
    fr: "Une crème sucrée qui fond dans la bouche,\nlégère comme un nuage. Elle est appréciée\nd’un certain Pokémon."
    it: "Una spuma soffice, delicata e leggermente dolce.\nPiace a un Pokémon in particolare."
    de: "Ein lockeres, leicht süßliches Häubchen aus\nSchlagsahne, das bei einer bestimmten\nPokémon-Art sehr beliebt ist."
    es: "Un dulce a base de suave y esponjosa nata montada.\nA cierto Pokémon le encanta."
    ko: "풍성하게 거품을 낸\n살짝 달콤한 크림.\n어떤 포켓몬이 좋아한다."
    zh_simp: "松松软软起着泡的，\n稍微有点甜的奶油。\n某种宝可梦很喜欢它。"
    zh_trad: "鬆鬆軟軟起著泡的，\n稍微有點甜的奶油。\n某種寶可夢很喜歡它。"
white_apricorn:
  names:
    jp_kana: しろぼんぐり
    jp_kanji: しろぼんぐり
    en: White Apricorn
    fr: Noigrume Blanc
    it: Ghicocca Bianca
    de: Aprikoko Wss
    es: Bonguri Blanco
    ko: 하얀규토리
    zh_simp: 白球果
    zh_trad: 白球果
  descriptions:
    jp_kana: "しろい　ぼんぐり。\nなんの　においも　しない。"
    jp_kanji: "しろい　ぼんぐり。\nなんの　においも　しない。"
    en: A white Apricorn. It doesn’t smell like anything.
    fr: "Un Noigrume de couleur blanche.\nIl ne dégage aucun arôme."
    it: "Una Ghicocca di colore bianco.\nNon emana alcun odore."
    de: Eine weiße Aprikoko. Riecht nach überhaupt nichts.
    es: "Bonguri de color blanco que no desprende aroma\nalguno."
    ko: "하얀색의 규토리.\n어떠한 향기도 나지 않는다."
    zh_simp: "白色的球果。\n没有任何气味。"
    zh_trad: "白色的球果。\n沒有任何氣味。"
white_flute:
  names:
    jp_kana: しろいビードロ
    jp_kanji: しろいビードロ
    en: White Flute
    fr: Flûte Blanche
    it: Flauto Bianco
    de: Weiße Flöte
    es: Flauta Blanca
    ko: 하양비드로
    zh_simp: 白色玻璃哨
    zh_trad: 白色玻璃哨
  descriptions:
    jp_kana: "しろいガラスで　できた　ふえ。\nつかった　ばしょで　よわいポケモンと\nそうぐう　しやすくなる。"
    jp_kanji: "白いガラスで　できた　笛。\n使った　場所で　弱いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from white glass. It makes it easier to\nencounter weak Pokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre blanc.\nAugmente les chances de rencontrer des Pokémon\nsauvages faibles là où l’on en joue."
    it: "Flauto fatto di vetro bianco. Aumenta le probabilità\ndi incontrare Pokémon deboli nell’area in cui viene\nusato."
    de: "Eine Spielzeugflöte aus weißem Glas. Erhöht am\nEinsatzort die Wahrscheinlichkeit, schwachen\nwilden Pokémon zu begegnen."
    es: "Una flauta de cristal blanco cuyas notas atraen a\nPokémon salvajes más débiles al lugar en el que\nse usa."
    ko: "하얀 유리로 만들어진 피리.\n사용한 장소에서 약한 포켓몬과\n만나기 쉬워진다."
    zh_simp: "以白色玻璃制成的哨子。\n在使用的地方更容易\n遇到弱小的宝可梦。"
    zh_trad: "以白色玻璃製成的笛子。\n在使用的地方更容易\n遇到弱小的寶可夢。"
white_herb:
  names:
    jp_kana: しろいハーブ
    jp_kanji: しろいハーブ
    en: White Herb
    fr: Herbe Blanche
    it: Erbachiara
    de: Schlohkraut
    es: Hierba Blanca
    ko: 하양허브
    zh_simp: 白色香草
    zh_trad: 白色香草
  descriptions:
    jp_kana: "もたせた　ポケモンの　のうりょくが\nさがったとき　いちどだけ　もとの\nじょうたいに　もどす。"
    jp_kanji: "持たせた　ポケモンの　能力が\nさがったとき　１度だけ　もとの\n状態に　戻す。"
    en: "An item to be held by a Pokémon. It will restore any\nlowered stat in battle. It can be used only once."
    fr: "Objet à tenir. Restaure les stats qui ont subi une baisse.\nNe peut être utilisé qu’une fois."
    it: "Strumento da dare a un Pokémon.\nRipristina le statistiche ridotte in lotta.\nSi può usare una sola volta."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es hebt einmalig jede negative\nStatusveränderung auf."
    es: "Restaura cualquier característica reducida en combate.\nSolo se puede usar una vez. Debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬의 능력이\n떨어졌을 때 한 번만 원래\n상태로 돌아온다."
    zh_simp: "当携带它的宝可梦能力降低时，\n仅能回到之前的状态１次。"
    zh_trad: "當攜帶它的寶可夢\n能力降低時，將能回到\n初始狀態１次。"
wide_lens:
  names:
    jp_kana: こうかくレンズ
    jp_kanji: こうかくレンズ
    en: Wide Lens
    fr: Loupe
    it: Grandelente
    de: Großlinse
    es: Lupa
    ko: 광각렌즈
    zh_simp: 广角镜
    zh_trad: 廣角鏡
  descriptions:
    jp_kana: "ものが　おおきく　みえる　レンズ。\nもたせると　わざの　めいちゅうりつが\nすこし　あがる。"
    jp_kanji: "ものが　大きく　みえる　レンズ。\n持たせると　技の　命中率が\n少し　あがる。"
    en: "An item to be held by a Pokémon. It’s a magnifying\nlens that slightly boosts the accuracy of moves."
    fr: "Objet à tenir. Une magnifique loupe augmentant\nun peu la Précision des capacités."
    it: "Strumento da dare a un Pokémon.\nLente d’ingrandimento che aumenta di poco\nla precisione delle mosse."
    de: "Ein Item zum Tragen. Dieses Vergrößerungsglas\nerhöht die Genauigkeit etwas."
    es: "Debe llevarla un Pokémon. Aumenta ligeramente\nla precisión de los movimientos."
    ko: "물건이 크게 보이는 렌즈.\n지니게 하면 기술의 명중률이\n조금 올라간다."
    zh_simp: "能放大观看物体的镜片。\n携带后，招式的命中率\n就会少量提高。"
    zh_trad: "物體看起來會變大的鏡片。\n攜帶後，招式的命中率\n就會少量提高。"
wiki_berry:
  names:
    jp_kana: ウイのみ
    jp_kanji: ウイのみ
    en: Wiki Berry
    fr: Baie Wiki
    it: Baccakiwi
    de: Wikibeere
    es: Baya Wiki
    ko: 위키열매
    zh_simp: 异奇果
    zh_trad: 異奇果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复HP。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復HP。\n如果討厭這味道就會混亂。"
wise_glasses:
  names:
    jp_kana: ものしりメガネ
    jp_kanji: ものしりメガネ
    en: Wise Glasses
    fr: Lunettes Sages
    it: Saviocchiali
    de: Schlauglas
    es: Gafas Especiales
    ko: 박식안경
    zh_simp: 博识眼镜
    zh_trad: 博識眼鏡
  descriptions:
    jp_kana: "ぶあつい　レンズの　ついた　メガネ。\nもたせると　とくしゅわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ぶあつい　レンズの　ついた　メガネ。\n持たせると　特殊技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. This thick pair of\nglasses slightly boosts the power of special moves."
    fr: "Objet à tenir. Une paire de lunettes épaisses\naugmentant un peu la puissance des capacités spéciales."
    it: "Strumento da dare a un Pokémon.\nPaio di occhiali dalle lenti spesse che potenzia\ndi poco le mosse speciali."
    de: "Ein Item zum Tragen. Diese dicke Brille verstärkt\nauf Spezial-Angriff basierende Attacken."
    es: "Potencian ligeramente los ataques especiales.\nDebe llevarlas un Pokémon."
    ko: "두꺼운 렌즈를 붙인 안경.\n지니게 하면 특수 기술의\n위력이 조금 올라간다."
    zh_simp: "装着很厚镜片的眼镜。\n携带后，特殊招式的\n威力就会少量提高。"
    zh_trad: "裝著很厚鏡片的眼鏡。\n攜帶後，特殊招式的\n威力就會少量提高。"
works_key:
  names:
    jp_kana: はつでんしょキー
    jp_kanji: はつでんしょキー
    en: Works Key
    fr: Clé Centrale
    it: Turbinchiave
    de: K-Schlüssel
    es: Llave Central
    ko: 발전소키
    zh_simp: 发电厂钥匙
    zh_trad: 發電廠鑰匙
  descriptions:
    jp_kana: "たにまのはつでんしょの　とびらを\nあけしめする　おおきな　カギ。\nなぜか　ギンガだんが　もっていた。"
    jp_kanji: "谷間の発電所の　扉を\nあけしめする　おおきな　カギ。\nなぜか　ギンガ団が　持っていた。"
    en: "A large key for operating the doors of the\nValley Windworks in the canyon. It was held by\na Team Galactic Grunt."
    fr: "Une grande clé servant à ouvrir la porte de la centrale\nLes Éoliennes du canyon. Un Sbire de la Team Galaxie\nla détenait."
    it: "Grande chiave usata per azionare la porta\ndell’Impianto Turbine. L’aveva con sé una\nRecluta del Team Galassia."
    de: "Ein großer Schlüssel, der zum Windkraftwerk gehört.\nEiner der Rüpel von Team Galaktik hatte ihn im\nBesitz."
    es: "Abre la puerta de la Central del Valle Eólico.\nLa llevaba un Recluta del Equipo Galaxia."
    ko: "골짜기발전소의 문을 여닫는 큰 열쇠.\n어찌된 영문인지\n갤럭시단이 지니고 있었다."
    zh_simp: "用来打开或关闭\n山谷发电厂大门的大钥匙。\n不知为何，它落入了银河队的手中。"
    zh_trad: "用來打開或關閉\n山谷發電廠大門的大鑰匙。\n不知為何它在銀河隊手中。"
x_accuracy:
  names:
    jp_kana: ヨクアタール
    jp_kanji: ヨクアタール
    en: X Accuracy
    fr: Précision +
    it: Precisione X
    de: X-Treffer
    es: Precisión X
    ko: 잘-맞히기
    zh_simp: 命中强化
    zh_trad: 命中強化
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　おおきく　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　大きく　あげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that sharply boosts the accuracy of a\nPokémon during a battle. It wears off once the\nPokémon is withdrawn."
    fr: "Augmente beaucoup la Précision pendant un combat.\nL’effet disparaît si le Pokémon est retiré."
    it: "Aumenta di molto la precisione di un Pokémon\nin una lotta. L’effetto svanisce se il Pokémon\nè sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf\nstark an. Die Wirkung wird mit dem Austausch\ndes Pokémon beendet."
    es: "Aumenta mucho la Precisión en combate. Al cambiar\nde Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을 크게 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
    zh_simp: "大幅提高战斗中\n宝可梦命中的道具。\n离场后，效果便会消失。"
    zh_trad: "大大提高戰鬥中\n寶可夢命中的道具。\n離場後，效果便會消失。"
