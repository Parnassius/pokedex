    jp_kana: "カロスちほう　めいぶつの　サブレ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "カロス地方　名物の　サブレ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "The Kalos region’s famous shortbread. It can be used\nto heal all the status conditions of a single Pokémon."
    fr: "Une spécialité de Kalos.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Il famoso Yantafrollino della regione di Kalos.\nCura tutti i problemi di stato di un Pokémon."
    de: "Dieser Butterkeks ist eine Spezialität aus der\nKalos-Region. Er behebt alle Statusprobleme\neines Pokémon."
    es: "Especialidad de la región de Kalos. Cura los problemas\nde estado de un Pokémon."
    ko: "칼로스지방의 명물 사블레.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "卡洛斯地区的特产沙布蕾。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "卡洛斯地區特產的沙布蕾。\n能治癒１隻寶可夢的\n所有異常狀態。"
sharp_beak:
  names:
    jp_kana: するどいくちばし
    jp_kanji: するどいくちばし
    en: Sharp Beak
    fr: Bec Pointu
    it: Beccaffilato
    de: Hackattack
    es: Pico Afilado
    ko: 예리한부리
    zh_simp: 锐利鸟嘴
    zh_trad: 銳利鳥嘴
  descriptions:
    jp_kana: "ながく　とがった　くちばし。\nもたせると　ひこうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "長く　とがった　くちばし。\n持たせると　ひこうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a long, sharp\nbeak that boosts the power of Flying-type moves."
    fr: "Objet à tenir. Un bec long et pointu qui augmente\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nBecco lungo e affilato che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Ein langer, scharfer Schnabel\nverstärkt Attacken vom Typ Flug."
    es: "Pico largo y afilado que aumenta la potencia de\nlos movimientos de tipo Volador. Debe llevarlo un\nPokémon."
    ko: "길고 뾰족한 부리.\n지니게 하면 비행타입\n기술의 위력이 올라간다."
    zh_simp: "又长又尖的鸟嘴。\n携带后，飞行属性的\n招式威力就会提高。"
    zh_trad: "又長又尖的鳥嘴。\n攜帶後，飛行屬性的\n招式威力就會提高。"
sharpedonite:
  names:
    jp_kana: サメハダナイト
    jp_kanji: サメハダナイト
    en: Sharpedonite
    fr: Sharpedite
    it: Sharpedite
    de: Tohaidonit
    es: Sharpedonita
    ko: 샤크니아나이트
    zh_simp: 巨牙鲨进化石
    zh_trad: 巨牙鯊進化石
  descriptions:
    jp_kana: "サメハダーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "サメハダーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sharpedo hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Sharpedo, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sharpedo, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tohaido getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sharpedo en combate."
    ko: "샤크니아에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让巨牙鲨携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓巨牙鯊攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
shed_shell:
  names:
    jp_kana: きれいなぬけがら
    jp_kanji: きれいなぬけがら
    en: Shed Shell
    fr: Carapace Mue
    it: Disfoguscio
    de: Wechselhülle
    es: Muda Concha
    ko: 아름다운허물
    zh_simp: 美丽空壳
    zh_trad: 美麗空殼
  descriptions:
    jp_kana: "じょうぶで　かたい　ぬけがら。\nもたせた　ポケモンは　ひかえの\nポケモンと　かならず　いれかわれる。"
    jp_kanji: "丈夫で　硬い　ぬけがら。\n持たせた　ポケモンは　控えの\nポケモンと　必ず　いれかわれる。"
    en: "An item to be held by a Pokémon. This discarded\ncarapace enables the holder to switch out of battle\nwithout fail."
    fr: "Objet à tenir. Une carapace dure qui permet au porteur\nde se retirer même s’il est affecté par une attaque\nimmobilisante."
    it: "Un Pokémon con questo robusto guscio può essere\nsempre sostituito, anche se sotto l’effetto di mosse\no abilità antifuga."
    de: "Ein Item zum Tragen. Dieser harte Panzer ermöglicht\nden Austausch des Trägers gegen ein wartendes\nPokémon."
    es: "En combate, esta concha desechada sirve para\nque un Pokémon se cambie por otro que no esté\ncombatiendo."
    ko: "튼튼하고 단단한 허물.\n지니게 한 포켓몬은 교대\n포켓몬과 반드시 교체할 수 있다."
    zh_simp: "结实坚硬的空壳。\n携带它的宝可梦必定可以\n和后备的宝可梦进行替换。"
    zh_trad: "結實堅硬的空殼。\n攜帶它的寶可夢必定可以\n和後備的寶可夢進行替換。"
shell_bell:
  names:
    jp_kana: かいがらのすず
    jp_kanji: かいがらのすず
    en: Shell Bell
    fr: Grelot Coque
    it: Conchinella
    de: Seegesang
    es: Campana Concha
    ko: 조개껍질방울
    zh_simp: 贝壳之铃
    zh_trad: 貝殼之鈴
  descriptions:
    jp_kana: "もたせた　ポケモンが　こうげきして\nあいてに　ダメージを　あたえたとき\nＨＰを　すこし　かいふく　できる。"
    jp_kanji: "持たせた　ポケモンが　攻撃して\n相手に　ダメージを　あたえたとき\nＨＰを　少し　回復できる。"
    en: "An item to be held by a Pokémon. The holder\nregains a little HP every time it inflicts damage\non others."
    fr: "Objet à tenir. Restaure un peu les PV du porteur\nchaque fois qu’il inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha recupera un po’ di PS ogni volta\nche infligge danni."
    de: "Ein Item zum Tragen. Es stellt einige KP des Trägers\nimmer dann wieder her, wenn dieser dem Ziel\nSchaden zufügt."
    es: "Debe llevarla un Pokémon. Cada vez que este inflige\ndaño, recupera algunos PS."
    ko: "지니게 한 포켓몬이 공격하여\n상대에게 데미지를 줬을 때\nHP를 조금 회복할 수 있다."
    zh_simp: "当携带它的宝可梦\n攻击对手并造成伤害时，\n能回复少量HP。"
    zh_trad: "當攜帶它的寶可夢\n攻擊並造成對手傷害時，\n能回復少量HP。"
shellder_candy:
  names:
    jp_kana: シェルダーのアメ
    jp_kanji: シェルダーのアメ
    en: Shellder Candy
    fr: Bonbon Kokiyas
    it: Caramella Shellder
    de: Muschas-Bonbon
    es: Caramelo Shellder
    ko: 셀러의사탕
    zh_simp: 大舌贝的糖果
    zh_trad: 大舌貝的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
shiny_charm:
  names:
    jp_kana: ひかるおまもり
    jp_kanji: ひかるおまもり
    en: Shiny Charm
    fr: Charme Chroma
    it: Cromamuleto
    de: Schillerpin
    es: Amuleto Iris
    ko: 빛나는부적
    zh_simp: 闪耀护符
    zh_trad: 閃耀護符
  descriptions:
    jp_kana: "もっていると　ひかる　ポケモンと\nであいやすくなる　といわれる\nふしぎで　ひかりかがやく　おまもり。"
    jp_kanji: "持っていると　ひかる　ポケモンと\n出会いやすくなる　といわれる\n不思議で　ひかりかがやく　おまもり。"
    en: "A shiny charm said to increase the chance of\nfinding a Shiny Pokémon in the wild."
    fr: "Un mystérieux charme scintillant qui facilite la rencontre\navec les Pokémon chromatiques."
    it: "Misterioso amuleto luminoso che aumenta\nla probabilità di incontrare Pokémon cromatici."
    de: "Ein mysteriöser, schillernder Glücksbringer, der die\nWahrscheinlichkeit erhöht, Schillernde Pokémon zu\nfinden."
    es: "Misterioso amuleto brillante que aumenta la\nprobabilidad de encontrar Pokémon variocolor."
    ko: "지니고 있으면 빛나는 포켓몬과\n만나기 쉬워진다고 전해지는\n이상하고 매우 반짝이는 부적."
    zh_simp: "拥有它之后，据说会\n更容易遇见发光宝可梦的\n神奇闪光护符。"
    zh_trad: "只要擁有它，據說會變得\n更容易遇見發光寶可夢的\n神奇閃光護符。"
shiny_stone:
  names:
    jp_kana: ひかりのいし
    jp_kanji: ひかりのいし
    en: Shiny Stone
    fr: Pierre Éclat
    it: Pietrabrillo
    de: Leuchtstein
    es: Piedra Día
    ko: 빛의돌
    zh_simp: 光之石
    zh_trad: 光之石
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひかりのように　まぶしい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひかりのように　まぶしい。"
    en: "A peculiar stone that can make certain species of\nPokémon evolve. It shines with a dazzling light."
    fr: "Une pierre étrange qui fait évoluer certaines espèces\nde Pokémon. Elle brille d’une lumière aveuglante."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Brilla di una luce abbagliante."
    de: "Dieser besondere, hell leuchtende Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a algunos\nPokémon. Tiene un brillo espectacular."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n빛처럼 눈부시다."
    zh_simp: "能让某些特定宝可梦\n进化的神奇石头。\n像光芒一样耀眼。"
    zh_trad: "能讓特定寶可夢\n進化的神奇石頭。\n像光芒一樣耀眼。"
shoal_salt:
  names:
    jp_kana: あさせのしお
    jp_kanji: あさせのしお
    en: Shoal Salt
    fr: Sel Tréfonds
    it: Sale Ondoso
    de: Küstensalz
    es: Sal Cardumen
    ko: 여울소금
    zh_simp: 浅滩海盐
    zh_trad: 淺灘海鹽
  descriptions:
    jp_kana: "あさせのほらあなで\nみつけた　しお。"
    jp_kanji: "浅瀬の洞穴で\nみつけた　塩。"
    en: Salt that you found inside Shoal Cave.
    fr: Du sel provenant de la Grotte Tréfonds.
    it: Sale rinvenuto nella Grotta Ondosa.
    de: "Reine Salzkristalle, die du in der Küstenhöhle\ngefunden hast."
    es: "Una sal muy fina que se encuentra en la Cueva\nCardumen."
    ko: "여울의 동굴에서\n발견한 소금."
    zh_simp: "在浅滩洞穴这地方\n找到的海盐。"
    zh_trad: "在名為淺灘洞穴的地方\n找到的海鹽。"
shoal_shell:
  names:
    jp_kana: あさせのかいがら
    jp_kanji: あさせのかいがら
    en: Shoal Shell
    fr: CoquilleTréfonds
    it: Gusciondoso
    de: Küstenschale
    es: Concha Cardumen
    ko: 여울조개껍질
    zh_simp: 浅滩贝壳
    zh_trad: 淺灘貝殼
  descriptions:
    jp_kana: "あさせのほらあなで\nみつけた　かいがら。"
    jp_kanji: "浅瀬の洞穴で\nみつけた　貝殻。"
    en: A seashell that you found inside Shoal Cave.
    fr: Un coquillage provenant de la Grotte Tréfonds.
    it: Guscio rinvenuto nella Grotta Ondosa.
    de: "Eine hübsche Muschelschale, die du in der\nKüstenhöhle gefunden hast."
    es: Concha que se encuentra en la Cueva Cardumen.
    ko: "여울의 동굴에서\n발견한 조개껍질."
    zh_simp: "在浅滩洞穴这地方\n找到的贝壳。"
    zh_trad: "在名為淺灘洞穴的地方\n找到的貝殼。"
shock_drive:
  names:
    jp_kana: イナズマカセット
    jp_kanji: イナズマカセット
    en: Shock Drive
    fr: Module Choc
    it: Voltmodulo
    de: Blitzmodul
    es: FulgoROM
    ko: 번개카세트
    zh_simp: 闪电卡带
    zh_trad: 閃電卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nでんきタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nでんきタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nElectric type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Électrik."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo Elettro."
    de: "Gibt man es Genesect zum Tragen, wandelt es den\nTyp der Attacke Techblaster in Elektro um."
    es: "Cartucho que convierte Tecno Shock de Genesect\nen un movimiento de tipo Eléctrico."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n전기타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为电属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為電屬性。"
shuca_berry:
  names:
    jp_kana: シュカのみ
    jp_kanji: シュカのみ
    en: Shuca Berry
    fr: Baie Jouca
    it: Baccanaca
    de: Schukebeere
    es: Baya Acardo
    ko: 슈캐열매
    zh_simp: 腰木果
    zh_trad: 腰木果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　じめん　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　じめん技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nGround-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Sol."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Terra del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Boden."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Tierra de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 땅 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的地面属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的地面屬性招式\n攻擊時，能使其威力減弱。"
silk_scarf:
  names:
    jp_kana: シルクのスカーフ
    jp_kanji: シルクのスカーフ
    en: Silk Scarf
    fr: Mouchoir Soie
    it: Sciarpa Seta
    de: Seidenschal
    es: Pañuelo Seda
    ko: 실크스카프
    zh_simp: 丝绸围巾
    zh_trad: 絲綢圍巾
  descriptions:
    jp_kana: "はだざわりの　よい　スカーフ。\nもたせると　ノーマルタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "はだざわりの　よい　スカーフ。\n持たせると　ノーマルタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a sumptuous\nscarf that boosts the power of Normal-type moves."
    fr: "Objet à tenir. Un mouchoir somptueux qui augmente\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon.\nSciarpa raffinata che potenzia le mosse\ndi tipo Normale."
    de: "Ein Item zum Tragen. Ein kostbarer Schal,\nder Attacken vom Typ Normal verstärkt."
    es: "La delicadeza del pañuelo fortalece los movimientos\nde tipo Normal. Debe llevarlo un Pokémon."
    ko: "감촉이 좋은 스카프.\n지니게 하면 노말타입\n기술의 위력이 올라간다."
    zh_simp: "手感不错的围巾。\n携带后，一般属性的\n招式威力就会提高。"
    zh_trad: "手感不錯的圍巾。\n攜帶後，一般屬性的\n招式威力就會提高。"
silph_scope:
  names:
    jp_kana: シルフスコープ
    jp_kanji: シルフスコープ
    en: Silph Scope
    fr: Scope Sylphe
    it: Spettrosonda
    de: Silph Scope
    es: Visor Silph
    ko: 실프스코프
    zh_simp: 西尔佛检视镜
    zh_trad: 西爾佛檢視鏡
  descriptions:
    jp_kana: "ひとの　めに　みえない　ものを\nみることが　できる　スコープ。\nシルフカンパニーせい。"
    jp_kanji: "人の　目に　見えない　ものを\n見ることが　できる　スコープ。\nシルフカンパニー製。"
    en: "A scope that lets you see what cannot usually be seen.\nIt is made by Silph Co."
    fr: "Un appareil permettant de voir les Pokémon invisibles.\nIl est fabriqué par la Sylphe SARL."
    it: "Sonda che rivela i Pokémon invisibili, prodotta\ndalla Silph S.p.A."
    de: "Dieses Gerät macht Dinge sichtbar, die dem\nmenschlichen Auge sonst verborgen bleiben.\nEs wurde von der Silph Company entwickelt."
    es: "Dispositivo que permite ver cosas que, de otra forma,\nresultarían invisibles para el ojo humano. Fabricado por\nSilph S. A."
    ko: "사람의 눈에 보이지 않는 것을\n볼 수 있게 해 주는 스코프.\n실프주식회사 제품."
    zh_simp: "西尔佛公司制造的透视镜。\n可以看见人眼无法看见的东西。"
    zh_trad: "西爾佛公司製造的檢視鏡。\n能看見人類肉眼\n看不到的東西。"
silver_leaf:
  names:
    jp_kana: ぎんのはっぱ
    jp_kanji: ぎんのはっぱ
    en: Silver Leaf
    fr: Feuille Argentée
    it: Fogliargento
    de: Silberblatt
    es: Hoja de Plata
    ko: 은빛잎사귀
    zh_simp: 银色叶子
    zh_trad: 銀色葉子
  descriptions:
    jp_kana: "ぎんいろの　ふしぎな　はっぱ。\nこの　はっぱを　つける　きは\nみつかって　いない。"
    jp_kanji: "銀色の　不思議な　はっぱ。\nこの　はっぱを　つける　木は\n見つかって　いない。"
    en: "A mysterious silver leaf. No trees with this leaf have\nbeen found yet."
    fr: "Une feuille argentée mystérieuse. Elle ne semble\nappartenir à aucun arbre connu."
    it: "Una strana foglia argentata. Nessuno sa da che albero\nprovenga."
    de: "Ein rätselhaftes Blatt mit silberner Färbung. Bisher hat\nman noch keinen Baum entdeckt, an dem solche Blätter\nwachsen."
    es: "Extraña hoja de color plateado. Se desconoce de qué\nárbol procede."
    ko: "은빛의 신비한 나뭇잎.\n이 나뭇잎이 자라는 나무는\n아직 발견되지 않았다."
    zh_simp: "神奇的银色叶子。\n至今仍未发现能长出\n这种叶子的树木。"
    zh_trad: "不可思議的銀色葉子。\n至今還未發現\n長有這種葉子的樹。"
silver_nanab_berry:
  names:
    jp_kana: ぎんのナナのみ
    jp_kanji: ぎんのナナのみ
    en: Silver Nanab Berry
    fr: Baie Nanab argentée
    it: Baccabana argentata
    de: Silberne Nanabbeere
    es: Baya Latano Plateada
    ko: 은 나나열매
    zh_simp: 银色蕉香果
    zh_trad: 銀色蕉香果
  descriptions:
    jp_kana: "ポケモンを　つかまえる　ときに\nあたえると　おちつく　きのみ。"
    jp_kanji: "ポケモンを　捕まえる　ときに\nあたえると　落ち着く　きのみ。"
    en: "A Berry that calms wild Pokémon you’re trying to catch\nwhen given to them."
    fr: "Une Baie à donner à un Pokémon sauvage au moment\nde la capture pour le calmer pendant un instant."
    it: "Bacca che calma il Pokémon selvatico\na cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nwird es während des Fangversuchs ruhiger."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara tranquilizarlo bastante."
    ko: "포켓몬을 잡을 때 주면\n얌전해지는 나무열매."
    zh_simp: "捕捉宝可梦时，\n把这树果交给宝可梦\n就能平复对方的情绪。"
    zh_trad: "在捕捉時把這個樹果餵給寶可夢，\n就能讓牠們的情緒穩定下來。"
silver_pinap_berry:
  names:
    jp_kana: ぎんのパイルのみ
    jp_kanji: ぎんのパイルのみ
    en: Silver Pinap Berry
    fr: Baie Nanana argentée
    it: Baccananas argentata
    de: Silberne Sananabeere
    es: Baya Pinia Plateada
    ko: 은 파인열매
    zh_simp: 银色凰梨果
    zh_trad: 銀色凰梨果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nつかまえた　ときに　どうぐが\nてにはいり　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえた　ときに　道具が\n手にはいり　やすくなる　きのみ。"
    en: "A Berry that makes you more likely to get an item when\ngiven to Pokémon you’re trying to catch."
    fr: "Une Baie à donner à un Pokémon sauvage pour avoir\nplus de chances d’obtenir un objet après l’avoir capturé."
    it: "Bacca che rende più facile ottenere strumenti\nquando catturi il Pokémon a cui l’hai data."
    de: "Gibst du diese Beere einem Pokémon zu essen, wird die\nChance, bei einem erfolgreichen Fangversuch ein Item\nzu erhalten, erhöht."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara aumentar bastante las probabilidades de conseguir\nun objeto tras capturarlo."
    ko: "포켓몬에게 주면\n잡았을 때 도구를 손에 넣기\n쉬워지는 나무열매."
    zh_simp: "如果把这树果交给宝可梦，\n那么接下来捉住该宝可梦时，\n会更容易获得道具。"
    zh_trad: "把這個樹果餵給寶可夢，\n在捕捉成功後，\n會更容易獲得道具。"
silver_powder:
  names:
    jp_kana: ぎんのこな
    jp_kanji: ぎんのこな
    en: Silver Powder
    fr: Poudre Argentée
    it: Argenpolvere
    de: Silberstaub
    es: Polvo Plata
    ko: 은빛가루
    zh_simp: 银粉
    zh_trad: 銀粉
  descriptions:
    jp_kana: "ぎんいろに　かがやく　こな。\nもたせると　むしタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "銀色に　輝く　粉。\n持たせると　むしタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a shiny\nsilver powder that will boost the power of\nBug-type moves."
    fr: "Objet à tenir. De la poudre d’argent brillante qui\naugmente la puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon.\nPolvere argentea e brillante che potenzia le mosse\ndi tipo Coleottero."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es verstärkt Attacken vom Typ Käfer."
    es: "Polvo de brillo argénteo que fortalece los ataques\nde tipo Bicho. Debe llevarlo un Pokémon."
    ko: "은색으로 반짝이는 가루.\n지니게 하면 벌레타입\n기술의 위력이 올라간다."
    zh_simp: "散发着银色光辉的粉末。\n携带后，虫属性的\n招式威力就会提高。"
    zh_trad: "散發著銀色光輝的粉末。\n攜帶後，蟲屬性的\n招式威力就會提高。"
silver_razz_berry:
  names:
    jp_kana: ぎんのズリのみ
    jp_kanji: ぎんのズリのみ
    en: Silver Razz Berry
    fr: Baie Framby argentée
    it: Baccalampon argentata
    de: Silberne Himmihbeere
    es: Baya Frambu Plateada
    ko: 은 라즈열매
    zh_simp: 银色蔓莓果
    zh_trad: 銀色蔓莓果
  descriptions:
    jp_kana: "ポケモンに　あたえると\nつかまえ　やすくなる　きのみ。"
    jp_kanji: "ポケモンに　あたえると\n捕まえ　やすくなる　きのみ。"
    en: "A Berry that makes it easier to catch Pokémon when\ngiven to them."
    fr: "Une Baie à donner à un Pokémon sauvage pour pouvoir\nl’attraper plus facilement."
    it: "Bacca che facilita la cattura del Pokémon\nselvatico a cui viene data."
    de: "Gibst du diese Beere einem Pokémon zu essen,\nlässt es sich leichter fangen."
    es: "Una baya que puedes lanzar a un Pokémon salvaje\npara que resulte bastante más fácil capturarlo."
    ko: "포켓몬에게 주면\n잡기 쉬워지는 나무열매."
    zh_simp: "把这树果交给宝可梦后，\n宝可梦就会变得容易捕捉。"
    zh_trad: "把這個樹果餵給寶可夢，\n就能讓牠們變得容易捕捉。"
silver_wing:
  names:
    jp_kana: ぎんいろのはね
    jp_kanji: ぎんいろのはね
    en: Silver Wing
    fr: Argent’Aile
    it: Aladargento
    de: Silberflügel
    es: Ala Plateada
    ko: 은빛날개
    zh_simp: 银色之羽
    zh_trad: 銀色之羽
  descriptions:
    jp_kana: "ぎんいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "ぎんいろに　ひかり　かがやく\n不思議な　はね。"
    en: A strange, silvery feather that sparkles.
    fr: Une étrange plume qui brille d’un éclat argenté.
    it: Misteriosa piuma che brilla di luce argentea.
    de: "Eine silberne Feder, die von einem seltsamen\nLeuchten erfüllt ist."
    es: Misteriosa ala de un brillante color plateado.
    ko: "은빛으로 빛나는\n신비한 날개."
    zh_simp: "散发着银色光辉的\n神奇羽毛。"
    zh_trad: "散發著銀色光輝的\n神奇羽毛。"
sitrus_berry:
  names:
    jp_kana: オボンのみ
    jp_kanji: オボンのみ
    en: Sitrus Berry
    fr: Baie Sitrus
    it: Baccacedro
    de: Tsitrubeere
    es: Baya Zidra
    ko: 자뭉열매
    zh_simp: 文柚果
    zh_trad: 文柚果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　すこしだけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　少しだけ　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can restore its own HP by a small\namount during battle."
    fr: "Une Baie qui restaure quelques PV lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, recupera\nun po’ di PS."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt diese seine KP ein wenig auf."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS."
    ko: "포켓몬에게 지니게 하면\nHP를 조금 회복한다."
    zh_simp: "让宝可梦携带后，\n可以回复少量HP。"
    zh_trad: "讓寶可夢攜帶後，\n可以回復少量HP。"
skull_fossil:
  names:
    jp_kana: ずがいのカセキ
    jp_kanji: ずがいのカセキ
    en: Skull Fossil
    fr: Fossile Crâne
    it: Fossilcranio
    de: Kopffossil
    es: Fósil Cráneo
    ko: 두개의화석
    zh_simp: 头盖化石
    zh_trad: 頭蓋化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nあたまの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n頭の　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It appears as though it’s part of\na head."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de crâne."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra essere parte di un teschio."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie ein Schädel aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece ser parte de una cabeza."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n머리의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是头部的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是頭部的一部分。"
sky_plate:
  names:
    jp_kana: あおぞらプレート
    jp_kanji: あおぞらプレート
    en: Sky Plate
    fr: Plaque Ciel
    it: Lastracielo
    de: Wolkentafel
    es: Tabla Cielo
    ko: 푸른하늘플레이트
    zh_simp: 蓝天石板
    zh_trad: 藍天石板
  descriptions:
    jp_kana: "ひこうの　タイプの　せきばん。\nもたせると　ひこうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　石盤。\n持たせると　ひこうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Flying-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Flug."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Volador. Debe llevarla un Pokémon."
    ko: "비행타입의 석판.\n지니게 하면 비행타입\n기술의 위력이 강해진다."
    zh_simp: "飞行属性的石板。\n携带后，飞行属性的\n招式威力就会增强。"
    zh_trad: "飛行屬性的石板。\n攜帶後，飛行屬性的\n招式威力就會增強。"
slowbronite:
  names:
    jp_kana: ヤドランナイト
    jp_kanji: ヤドランナイト
    en: Slowbronite
    fr: Flagadossite
    it: Slowbroite
    de: Lahmusnit
    es: Slowbronita
    ko: 야도란나이트
    zh_simp: 呆壳兽进化石
    zh_trad: 呆殼獸進化石
  descriptions:
    jp_kana: "たたかいのとき　ヤドランを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　ヤドランを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Slowbro to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Flagadoss de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Slowbro di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Lahmus, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Slowbro en combate."
    ko: "배틀할 때 야도란을\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让呆壳兽\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓呆殼獸進行超級進化的\n一種神奇超級石。"
slowpoke_candy:
  names:
    jp_kana: ヤドンのアメ
    jp_kanji: ヤドンのアメ
    en: Slowpoke Candy
    fr: Bonbon Ramoloss
    it: Caramella Slowpoke
    de: Flegmon-Bonbon
    es: Caramelo Slowpoke
    ko: 야돈의사탕
    zh_simp: 呆呆兽的糖果
    zh_trad: 呆呆獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
slowpoke_tail:
  names:
    jp_kana: おいしいシッポ
    jp_kanji: おいしいシッポ
    en: Slowpoke Tail
    fr: Queue Ramoloss
    it: Coda Slowpoke
    de: Flegmon-Rute
    es: Cola Slowpoke
    ko: 맛있는꼬리
    zh_simp: 美味尾巴
    zh_trad: 美味尾巴
  descriptions:
    jp_kana: "とても　おいしい　なにかの　しっぽ。\nショップで　たかく　うれる。"
    jp_kanji: "とても　おいしい　なにかの　しっぽ。\nショップで　高く　売れる。"
    en: "A very tasty tail of something. It can be sold at a\nhigh price to shops."
    fr: "Une queue d’origine inconnue tout à fait savoureuse,\nvendue très cher."
    it: "Coda di origine sconosciuta dal sapore delizioso.\nSi vende a un prezzo piuttosto alto."
    de: "Die Rute eines unbestimmten Wesens.\nExtrem schmackhaft. Lässt sich teuer verkaufen."
    es: "Sabrosa cola de origen desconocido. Se puede comprar\na un precio muy elevado."
    ko: "매우 맛있는 무언가의 꼬리.\n가게에서 비싸게 팔린다."
    zh_simp: "非常美味的某种尾巴。\n可以在商店高价出售。"
    zh_trad: "非常美味的某種尾巴。\n可以在商店高價出售。"
small_bouquet:
  names:
    jp_kana: ちいさなはなたば
    jp_kanji: ちいさなはなたば
    en: Small Bouquet
    fr: Petit Bouquet
    it: Bouquet
    de: Ministrauß
    es: Ramo Pequeño
    ko: 작은꽃다발
    zh_simp: 小小花束
    zh_trad: 小小花束
  descriptions:
    jp_kana: "ただ　ひとりの　トレーナーへの\nきもちを　こめて　いっしょうけんめい\nつくった　ささやかな　はなたば。"
    jp_kanji: "ただ　ひとりの　トレーナーへの\n気持ちを　こめて　一生懸命\n作った　ささやかな　花束。"
    en: "A small bouquet that was made with heart and soul\nfor a single Trainer."
    fr: "Un petit bouquet arrangé avec amour pour\nun[VAR 1100 (00FF0B090020)]Dresseure Dresseuse vraiment unique."
    it: "Un piccolo mazzo di fiori composto con cura\ne amore per un[VAR 1100 (00FF0B0A0020)]Allenator’Allenatrice unic[VAR 1100 (00FF0101006F)]a al mondo."
    de: "Ein Blumenstrauß, der sorgfältig und mit viel Mühe\nfür einen ganz besonderen Trainer gesteckt wurde."
    es: "Pequeño ramo de flores confeccionado con dedicación\ny esmero solo para ti."
    ko: "단 하나뿐인 트레이너를 향한\n마음을 담아 정성껏 만든\n작은 꽃다발."
    zh_simp: "竭尽心力制作的素雅花束。\n里面满满都是对训练家的心意。"
    zh_trad: "竭盡心力製作的花束。\n雖然不起眼，但裡頭\n充滿了對訓練家的心意。"
smart_candy:
  names:
    jp_kana: ちしきのアメ
    jp_kanji: ちしきのアメ
    en: Smart Candy
    fr: Bonbon Esprit S
    it: Caramella acume S
    de: Gripsbonbon
    es: Caramelo Intelecto
    ko: 지식의사탕
    zh_simp: 知识糖果
    zh_trad: 知識糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nポケモンの　とくこうを　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nポケモンの　とくこうを　上げる。"
    en: "A candy that is packed with energy. When given to\na Pokémon, it will increase that Pokémon’s Sp. Atk stat."
    fr: "Un bonbon plein d’énergie.\nIl augmente l’Attaque Spéciale d’un Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco Speciale di un Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Spezial-Angriff eines Pokémon."
    es: "Caramelo energético que aumenta el Ataque Especial\ndel Pokémon."
    ko: "에너지가 가득한 사탕.\n포켓몬의 특수공격을 올린다."
    zh_simp: "充满能量的糖果。\n能提高宝可梦的特攻。"
    zh_trad: "充滿能量的糖果。\n能提高寶可夢的特攻。"
smart_candy_l:
  names:
    jp_kana: ちしきのアメＬ
    jp_kanji: ちしきのアメＬ
    en: Smart Candy L
    fr: Bonbon Esprit M
    it: Caramella acume M
    de: Gripsbonbon+
    es: Caramelo Intelecto +
    ko: 지식의사탕L
    zh_simp: 知识糖果L
    zh_trad: 知識糖果L
  descriptions:
    jp_kana: "エネルギーの　つまった　おおきい　アメ。\nレベル３０　いじょうの　ポケモンの\nとくこうを　あげる。"
    jp_kanji: "エネルギーの　つまった　大きい　アメ。\nレベル３０　以上の　ポケモンの\nとくこうを　上げる。"
    en: "A big candy that is packed with energy. When given to\na Pokémon at Lv. 30 or higher, it will increase that\nPokémon’s Sp. Atk stat."
    fr: "Un gros bonbon plein d’énergie.\nIl augmente l’Attaque Spéciale d’un Pokémon\nde niveau 30 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco Speciale di un Pokémon\ndi livello 30 o superiore."
    de: "Ein großes Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Spezial-Angriff eines Pokémon\nab Level 30."
    es: "Caramelo energético grande que aumenta el Ataque\nEspecial de un Pokémon de Nv. 30 o superior."
    ko: "에너지가 가득한 큰 사탕.\n레벨 30 이상인 포켓몬의\n특수공격을 올린다."
    zh_simp: "充满能量的大糖果。\n能让等级30以上的\n宝可梦的特攻上升。"
    zh_trad: "充滿能量的大糖果。\n能提高等級在30以上的\n寶可夢的特攻。"
smart_candy_xl:
  names:
    jp_kana: ちしきのアメＸＬ
    jp_kanji: ちしきのアメＸＬ
    en: Smart Candy XL
    fr: Bonbon Esprit L
    it: Caramella acume L
    de: Gripsbonbon++
    es: Caramelo Intelecto ++
    ko: 지식의사탕XL
    zh_simp: 知识糖果XL
    zh_trad: 知識糖果XL
  descriptions:
    jp_kana: "エネルギーの　つまった　とくだいの　アメ。\nレベル６０　いじょうの　ポケモンの\nとくこうを　あげる。"
    jp_kanji: "エネルギーの　つまった　特大の　アメ。\nレベル６０　以上の　ポケモンの\nとくこうを　上げる。"
    en: "A huge candy that is packed with energy. When given\nto a Pokémon at Lv. 60 or higher, it will increase that\nPokémon’s Sp. Atk stat."
    fr: "Un énorme bonbon plein d’énergie.\nIl augmente l’Attaque Spéciale d’un Pokémon\nde niveau 60 ou supérieur."
    it: "Una caramella piena zeppa di energia.\nAumenta l’Attacco Speciale di un Pokémon\ndi livello 60 o superiore."
    de: "Ein riesiges Bonbon, das voller Energie steckt.\nErhöht dauerhaft den Spezial-Angriff eines Pokémon\nab Level 60."
    es: "Caramelo energético enorme que aumenta el Ataque\nEspecial de un Pokémon de Nv. 60 o superior."
    ko: "에너지가 가득한 매우 큰 사탕.\n레벨 60 이상인 포켓몬의\n특수공격을 올린다."
    zh_simp: "充满能量的超大糖果。\n能让等级60以上的\n宝可梦的特攻上升。"
    zh_trad: "充滿能量的特大糖果。\n能提高等級在60以上的\n寶可夢的特攻。"
smoke_ball:
  names:
    jp_kana: けむりだま
    jp_kanji: けむりだま
    en: Smoke Ball
    fr: Boule Fumée
    it: Palla Fumo
    de: Rauchball
    es: Bola Humo
    ko: 연막탄
    zh_simp: 烟雾球
    zh_trad: 煙霧球
  descriptions:
    jp_kana: "もたせた　ポケモンは　やせいの\nポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "持たせた　ポケモンは　野生の\nポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item to be held by a Pokémon. It enables the\nholder to flee from any wild Pokémon encounter\nwithout fail."
    fr: "Objet à tenir. Permet au porteur de s’enfuir à coup sûr\nface à un Pokémon sauvage."
    it: "Strumento da dare a un Pokémon.\nPermette di fuggire con successo da un\nPokémon selvatico."
    de: "Ein Pokémon kann dieses Item tragen. Es ermöglicht\ndie garantierte Flucht aus dem Kampf mit einem\nwilden Pokémon."
    es: "Debe llevarla un Pokémon. Permite huir siempre\nde combates contra Pokémon salvajes."
    ko: "지니게 한 포켓몬은\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
    zh_simp: "携带它的宝可梦在和\n野生宝可梦的战斗中\n绝对可以逃走。"
    zh_trad: "攜帶它的寶可夢在和\n野生寶可夢的戰鬥中\n絕對可以逃走。"
smooth_rock:
  names:
    jp_kana: さらさらいわ
    jp_kanji: さらさらいわ
    en: Smooth Rock
    fr: Roche Lisse
    it: Roccialiscia
    de: Glattbrocken
    es: Roca Suave
    ko: 보송보송바위
    zh_simp: 沙沙岩石
    zh_trad: 沙沙岩石
  descriptions:
    jp_kana: "もたせた　ポケモンが　すなあらしを\nつかうと　いつもより　すなあらしの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　すなあらしを\n使うと　いつもより　すなあらしの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon. It extends the\nduration of the move Sandstorm when used by\nthe holder."
    fr: "Objet à tenir. Augmente la durée de la capacité\nTempête de Sable utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Terrempesta."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nSandsturm, wenn der Träger diese Attacke\neinsetzt."
    es: "Prolonga la duración del movimiento Tormenta de\nArena que use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 모래바람을\n쓰면 여느 때보다 모래바람의\n시간이 길어진다."
    zh_simp: "携带它的宝可梦使出沙暴的话，\n沙暴的时间就会比平时更长。"
    zh_trad: "攜帶它的寶可夢\n使出沙暴的話，\n沙暴的時間就會比平時更長。"
snorlax_candy:
  names:
    jp_kana: カビゴンのアメ
    jp_kanji: カビゴンのアメ
    en: Snorlax Candy
    fr: Bonbon Ronflex
    it: Caramella Snorlax
    de: Relaxo-Bonbon
    es: Caramelo Snorlax
    ko: 잠만보의사탕
    zh_simp: 卡比兽的糖果
    zh_trad: 卡比獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
snorlium_z:bag:
  names:
    jp_kana: カビゴンＺ
    jp_kanji: カビゴンＺ
    en: Snorlium Z
    fr: Ronflézélite
    it: Snorlactium Z
    de: Relaxonium Z
    es: Snorlastal Z
    ko: 잠만보Z
    zh_simp: 卡比兽Ｚ
    zh_trad: 卡比獸Ｚ
  descriptions:
    jp_kana: "カビゴンの　ギガインパクトを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "カビゴンの　ギガインパクトを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nSnorlax’s Giga Impact to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Ronflex qui le tient à transformer\nson Giga Impact en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Snorlax di trasformare la mossa\nGigaimpatto in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Relaxos Attacke\nGigastoß zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nSnorlax convertir su Giga Impacto en un\nmovimiento Z."
    ko: "잠만보의 기가임팩트를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将卡比兽的终极冲击\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把卡比獸的終極衝擊\n升級為特殊Ｚ招式的Ｚ力量結晶。"
snorlium_z:held:
  names:
    jp_kana: カビゴンＺ
    jp_kanji: カビゴンＺ
    en: Snorlium Z
    fr: Ronflézélite
    it: Snorlactium Z
    de: Relaxonium Z
    es: Snorlastal Z
    ko: 잠만보Z
    zh_simp: 卡比兽Ｚ
    zh_trad: 卡比獸Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nカビゴンの　ギガインパクトを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nカビゴンの　ギガインパクトを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Snorlax’s Giga Impact to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Giga Impact d’un Ronflex en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Gigaimpatto\ndi Snorlax in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Relaxos Attacke Gigastoß\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nGiga Impacto de Snorlax."
    ko: "Z파워의 결정.\n잠만보의 기가임팩트를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将卡比兽的终极冲击\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把卡比獸的終極衝擊\n升級為Ｚ招式。"
snowball:
  names:
    jp_kana: ゆきだま
    jp_kanji: ゆきだま
    en: Snowball
    fr: Boule de Neige
    it: Palla di neve
    de: Schneeball
    es: Bola de Nieve
    ko: 눈덩이
    zh_simp: 雪球
    zh_trad: 雪球
  descriptions:
    jp_kana: "つかいすての　ゆきだま。\nもたせて　こおりの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　ゆきだま。\n持たせて　こおりの　技を　受けると\n攻撃が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Attack\nif the holder is hit with an Ice-type attack. It can only\nbe used once."
    fr: "Objet à usage unique. Tenue, elle augmente l’Attaque\ndu Pokémon lorsqu’il est touché par une capacité\nde type Glace."
    it: "Palla di neve monouso.\nSe il Pokémon che ce l’ha subisce una mossa\ndi tipo Ghiaccio, il suo Attacco aumenta."
    de: "Wird der Träger von einer Eis-Attacke getroffen,\nsteigt sein Angriff und das Item verschwindet."
    es: "Objeto de un solo uso. Aumenta el Ataque del\nPokémon que lo lleva si este recibe un ataque de\ntipo Hielo."
    ko: "단 한 번 쓰면 없어지는 눈덩이.\n지니게 하고 얼음 기술을 받으면\n공격이 올라간다."
    zh_simp: "一次性使用的雪球。\n携带它的宝可梦如果受到冰属性\n招式攻击，攻击就会提高。"
    zh_trad: "只能使用一次的雪球。\n攜帶它的寶可夢如果受到冰屬性\n招式攻擊，攻擊就會提高。"
soda_pop:
  names:
    jp_kana: サイコソーダ
    jp_kanji: サイコソーダ
    en: Soda Pop
    fr: Soda Cool
    it: Gassosa
    de: Sprudel
    es: Refresco
    ko: 미네랄사이다
    zh_simp: 劲爽汽水
    zh_trad: 勁爽汽水
  descriptions:
    jp_kana: "シュワっと　はじける　ソーダ。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "シュワっと　はじける　ソーダ。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "A highly carbonated soda drink. It can be used to\nrestore 50 HP to a single Pokémon."
    fr: "Une boisson pétillante.\nRestaure 50 PV d’un Pokémon."
    it: "Bevanda frizzante.\nRestituisce 50 PS a un Pokémon."
    de: "Ein sprudelndes Mineralwasser, das die KP eines\nPokémon um 50 Punkte auffüllt."
    es: "Chispeante bebida gaseosa que restaura 50 PS de\nun Pokémon."
    ko: "싸하고 톡 쏘는 사이다.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
    zh_simp: "翻腾着气泡的汽水。\n能让１只宝可梦\n回复50HP。"
    zh_trad: "冒著氣泡的汽水。\n能讓１隻寶可夢\n回復50HP。"
soft_sand:
  names:
    jp_kana: やわらかいすな
    jp_kanji: やわらかいすな
    en: Soft Sand
    fr: Sable Doux
    it: Sabbia Soffice
    de: Pudersand
    es: Arena Fina
    ko: 부드러운모래
    zh_simp: 柔软沙子
    zh_trad: 柔軟沙子
  descriptions:
    jp_kana: "さわると　サラサラする　すな。\nもたせると　じめんタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "さわると　サラサラする　砂。\n持たせると　じめんタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a loose, silky\nsand that boosts the power of Ground-type moves."
    fr: "Objet à tenir. Du sable fin et soyeux qui augmente\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon.\nSabbia leggera e farinosa che potenzia le mosse\ndi tipo Terra."
    de: "Ein Item zum Tragen. Samtiger Sand, der Attacken\nvom Typ Boden verstärkt."
    es: "Debe llevarla un Pokémon. La suavidad de la arena\nfortalece los movimientos de tipo Tierra."
    ko: "만지면 보슬보슬한 모래.\n지니게 하면 땅타입\n기술의 위력이 올라간다."
    zh_simp: "手感细腻的沙子。\n携带后，地面属性的\n招式威力就会提高。"
    zh_trad: "手感細緻的沙子。\n攜帶後，地面屬性的\n招式威力就會提高。"
solganium_z:bag:
  names:
    jp_kana: ソルガレオＺ
    jp_kanji: ソルガレオＺ
    en: Solganium Z
    fr: Solgazélite
    it: Solgaleium Z
    de: Solgalium Z
    es: Solgaleostal Z
    ko: 솔가레오Z
    zh_simp: 索尔迦雷欧Ｚ
    zh_trad: 索爾迦雷歐Ｚ
  descriptions:
    jp_kana: "ソルガレオの　メテオドライブを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "ソルガレオの　メテオドライブを\nＺワザに　グレードアップする\nＺパワーの　結晶を　つくりだす。"
    en: "It converts Z-Power into crystals that upgrade\nSolgaleo’s Sunsteel Strike to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal qui, tenu,\nautorise Solgaleo à transformer son Choc Météore\nen capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Solgaleo di trasformare la mossa\nAstrocarica in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Solgaleos Attacke\nStahlgestirn zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nSolgaleo convertir su Meteoimpacto en un\nmovimiento Z."
    ko: "솔가레오의 메테오드라이브를\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将索尔迦雷欧的流星闪冲\n升级成Ｚ招式的Ｚ力量结晶。"
    zh_trad: "可用來製造將\n索爾迦雷歐的流星閃衝\n升級為Ｚ招式的Ｚ力量結晶。"
solganium_z:held:
  names:
    jp_kana: ソルガレオＺ
    jp_kanji: ソルガレオＺ
    en: Solganium Z
    fr: Solgazélite
    it: Solgaleium Z
    de: Solgalium Z
    es: Solgaleostal Z
    ko: 솔가레오Z
    zh_simp: 索尔迦雷欧Ｚ
    zh_trad: 索爾迦雷歐Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nソルガレオの　メテオドライブを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nソルガレオの　メテオドライブを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Solgaleo’s Sunsteel Strike to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant\nde transformer le Choc Météore de Solgaleo\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Astrocarica\ndi Solgaleo in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Solgaleos Attacke Stahlgestirn\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nMeteoimpacto de Solgaleo."
    ko: "Z파워의 결정.\n솔가레오의 메테오드라이브를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将索尔迦雷欧的流星闪冲\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n可將索爾迦雷歐的流星閃衝\n升級為Ｚ招式。"
soot_sack:
  names:
    jp_kana: はいぶくろ
    jp_kanji: はいぶくろ
    en: Soot Sack
    fr: Sac à Suie
    it: Sacco cenere
    de: Aschetasche
    es: Saco Hollín
    ko: 재주머니
    zh_simp: 集灰袋
    zh_trad: 集灰袋
  descriptions:
    jp_kana: "つもった　かざんばいを\nあつめるための　ふくろ。"
    jp_kanji: "つもった　かざんばいを\n集めるための　ふくろ。"
    en: A sack used to gather and hold volcanic ash.
    fr: "Un sac utilisé pour ramasser les cendres volcaniques\naccumulées au sol."
    it: Sacco per raccogliere la cenere vulcanica.
    de: "Eine Tasche, mit der du herabgerieselte\nVulkanasche aufsammeln kannst."
    es: "Bolsa en la que recoger la ceniza de volcán\nsedimentada en el suelo."
    ko: "쌓인 화산재를\n모으기 위한 주머니."
    zh_simp: "将堆积起来的火山灰\n收集起来的袋子。"
    zh_trad: "用於收集堆積的\n火山灰的袋子。"
soothe_bell:
  names:
    jp_kana: やすらぎのすず
    jp_kanji: やすらぎのすず
    en: Soothe Bell
    fr: Grelot Zen
    it: Calmanella
    de: Sanftglocke
    es: Campana Alivio
    ko: 평온의방울
    zh_simp: 安抚之铃
    zh_trad: 安撫之鈴
  descriptions:
    jp_kana: "ここちよい　ねいろの　すず。\nもたせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    jp_kanji: "心地よい　音色の　鈴。\n持たせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    en: "An item to be held by a Pokémon. The comforting\nchime of this bell calms the holder, making\nit friendly."
    fr: "Objet à tenir. Un grelot dont le carillon calme le porteur\net favorise l’amitié."
    it: "Strumento da dare a un Pokémon.\nCampanella dal suono rassicurante che calma\nchi la usa rendendolo affezionato."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es besänftigt den Träger und macht\nihn zutraulicher."
    es: "Una campana con un tañido calmante que reconforta\nal Pokémon que la lleva y lo vuelve más amistoso."
    ko: "기분 좋은 소리의 방울.\n지니게 한 포켓몬은 마음이\n편안해져 친밀해지기 쉬워진다."
    zh_simp: "音色悦耳的铃铛。\n携带它的宝可梦会受到安抚，\n变得容易和训练家亲密。"
    zh_trad: "音色悅耳的鈴鐺。\n攜帶它的寶可夢的心情會平靜下來，\n變得容易和訓練家親密。"
soul_dew:
  names:
    jp_kana: こころのしずく
    jp_kanji: こころのしずく
    en: Soul Dew
    fr: Rosée Âme
    it: Cuorugiada
    de: Seelentau
    es: Rocío Bondad
    ko: 마음의물방울
    zh_simp: 心之水滴
    zh_trad: 心之水滴
  descriptions:
    jp_kana: "ラティオスや　ラティアスに　もたせると\nエスパーと　ドラゴンタイプの　わざの\nいりょくが　あがる　ふしぎな　たま。"
    jp_kanji: "ラティオスや　ラティアスに　持たせると\nエスパーと　ドラゴンタイプの　技の\n威力が　あがる　不思議な　珠。"
    en: "A wondrous orb to be held by either Latios or\nLatias. It raises the power of Psychic- and\nDragon-type moves."
    fr: "Objet à faire tenir à Latios ou Latias.\nUn orbe prodigieux qui augmente la puissance\nde leurs capacités de type Psy ou Dragon."
    it: "Sfera miracolosa da dare a Latios o Latias.\nAumenta la potenza delle mosse di tipo Psico\ne Drago."
    de: "Ein Item, das von Latios oder Latias getragen\nwerden kann. Es erhöht die Stärke von\nPsycho- und Drachen-Attacken."
    es: "Un orbe fantástico que debe llevar Latios o Latias.\nPotencia los movimientos de tipo Psíquico y Dragón."
    ko: "라티오스나 라티아스에게 지니게 하면\n에스퍼와 드래곤타입 기술의 위력이\n올라가는 이상한 구슬."
    zh_simp: "让拉帝欧斯或拉帝亚斯携带后，\n超能力和龙属性的招式威力\n就会提高的神奇珠子。"
    zh_trad: "讓拉帝歐斯或拉帝亞斯攜帶後，\n超能力和龍屬性的招式威力\n就會提高的神奇珠子。"
sparkling_stone:
  names:
    jp_kana: かがやくいし
    jp_kanji: かがやくいし
    en: Sparkling Stone
    fr: Gemme Lumière
    it: Pietra lucente
    de: Glitzerstein
    es: Piedra Brillante
    ko: 빛나는돌
    zh_simp: 光辉石
    zh_trad: 光輝石
  descriptions:
    jp_kana: "アローラの　まもりがみと　される\nポケモンから　もらった　いし。\nかがやきに　ひみつが　あるという。"
    jp_kanji: "アローラの　守り神と　される\nポケモンから　もらった　石。\nかがやきに　秘密が　あるという。"
    en: "A stone entrusted by a Pokémon that has been\nvenerated as a guardian deity in the Alola region.\nThere is said to be some secret in how it sparkles."
    fr: "Une pierre donnée par un Pokémon gardien d’Alola.\nSon éclat cache un secret."
    it: "Pietra ricevuta dal Pokémon protettore di Alola.\nDietro la sua lucentezza si nasconde un segreto."
    de: "Ein Stein, den du von einem der Schutzpatrone\nAlolas erhalten hast. Es heißt, dass sich hinter\ndem Glitzern ein Geheimnis verberge."
    es: "Piedra con un misterioso brillo entregada por un\nPokémon considerado como uno de los espíritus\nguardianes de Alola."
    ko: "알로라의 수호신으로 여겨지는\n포켓몬으로부터 받은 돌.\n빛에 비밀이 있다고 한다."
    zh_simp: "从被认为是阿罗拉守护神的\n宝可梦那里得到的石头。\n据说其光辉下有着某种秘密。"
    zh_trad: "從被認為是阿羅拉守護神的\n寶可夢處得到的石頭。\n據說其光輝包含著某種秘密。"
spearow_candy:
  names:
    jp_kana: オニスズメのアメ
    jp_kanji: オニスズメのアメ
    en: Spearow Candy
    fr: Bonbon Piafabec
    it: Caramella Spearow
    de: Habitak-Bonbon
    es: Caramelo Spearow
    ko: 깨비참의사탕
    zh_simp: 烈雀的糖果
    zh_trad: 烈雀的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
spell_tag:
  names:
    jp_kana: のろいのおふだ
    jp_kanji: のろいのおふだ
    en: Spell Tag
    fr: Rune Sort
    it: Spettrotarga
    de: Bannsticker
    es: Hechizo
    ko: 저주의부적
    zh_simp: 诅咒之符
    zh_trad: 詛咒之符
  descriptions:
    jp_kana: "あやしくて　ぶきみな　おふだ。\nもたせると　ゴーストタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しくて　不気味な　お札。\n持たせると　ゴーストタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. It’s a sinister,\neerie tag that boosts the power of\nGhost-type moves."
    fr: "Objet à tenir. Une plaque sinistre et étrange qui\naugmente la puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon.\nTarga sinistra e inquietante che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Ein fieser, unheimlicher Sticker,\nder Attacken vom Typ Geist verstärkt."
    es: "Misterioso y siniestro objeto que potencia los\nmovimientos de tipo Fantasma. Debe llevarlo un\nPokémon."
    ko: "괴상하고 으스스한 부적.\n지니게 하면 고스트타입\n기술의 위력이 올라간다."
    zh_simp: "古怪可怕的咒符。\n携带后，幽灵属性的\n招式威力就会提高。"
    zh_trad: "古怪可怕的咒符。\n攜帶後，幽靈屬性的\n招式威力就會提高。"
spelon_berry:
  names:
    jp_kana: ノワキのみ
    jp_kanji: ノワキのみ
    en: Spelon Berry
    fr: Baie Kiwan
    it: Baccamelos
    de: Kiwanbeere
    es: Baya Wikano
    ko: 메호키열매
    zh_simp: 刺角果
    zh_trad: 刺角果
  descriptions:
    jp_kana: "かわいさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かわいさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCuteness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nla Grâce d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla dulzura. Es una baya muy rara en otras regiones."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨可爱。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進可愛的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
splash_plate:
  names:
    jp_kana: しずくプレート
    jp_kanji: しずくプレート
    en: Splash Plate
    fr: Plaque Hydro
    it: Lastraidro
    de: Wassertafel
    es: Tabla Linfa
    ko: 물방울플레이트
    zh_simp: 水滴石板
    zh_trad: 水滴石板
  descriptions:
    jp_kana: "みずの　タイプの　せきばん。\nもたせると　みずタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　石盤。\n持たせると　みずタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Water-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Wasser."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Agua. Debe llevarla un Pokémon."
    ko: "물타입의 석판.\n지니게 하면 물타입\n기술의 위력이 강해진다."
    zh_simp: "水属性的石板。\n携带后，水属性的\n招式威力就会增强。"
    zh_trad: "水屬性的石板。\n攜帶後，水屬性的\n招式威力就會增強。"
spooky_plate:
  names:
    jp_kana: もののけプレート
    jp_kanji: もののけプレート
    en: Spooky Plate
    fr: Plaque Fantôme
    it: Lastratetra
    de: Spuktafel
    es: Tabla Terror
    ko: 원령플레이트
    zh_simp: 妖怪石板
    zh_trad: 妖怪石板
  descriptions:
    jp_kana: "ゴーストの　タイプの　せきばん。\nもたせると　ゴーストタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　石盤。\n持たせると　ゴーストタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Ghost-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Geist."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Fantasma. Debe llevarla un Pokémon."
    ko: "고스트타입의 석판.\n지니게 하면 고스트타입\n기술의 위력이 강해진다."
    zh_simp: "幽灵属性的石板。\n携带后，幽灵属性的\n招式威力就会增强。"
    zh_trad: "幽靈屬性的石板。\n攜帶後，幽靈屬性的\n招式威力就會增強。"
sport_ball:
  names:
    jp_kana: コンペボール
    jp_kanji: コンペボール
    en: Sport Ball
    fr: Compét’Ball
    it: Gara Ball
    de: Turnierball
    es: Competi Ball
    ko: 콤페볼
    zh_simp: 竞赛球
    zh_trad: 競賽球
  descriptions:
    jp_kana: "むしとりたいかいの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "虫捕り大会の　なかで\n使う　特別な　ボール。"
    en: "A special Poké Ball that is used during the\nBug-Catching Contest."
    fr: "Une Poké Ball spéciale utilisée au Concours de\nCapture d’insecte."
    it: "Poké Ball speciale utilizzata solo nella\nGara Pigliamosche."
    de: Ein Ball, der nur beim Käferturnier eingesetzt wird.
    es: "Poké Ball que se utiliza en el Concurso de\nCaptura de Bichos."
    ko: "곤충채집 대회 내에서\n사용하는 특별한 볼."
    zh_simp: "在捕虫大赛上使用的\n特殊的球。"
    zh_trad: "在捕蟲大賽上使用的\n特殊的球。"
sprayduck:
  names:
    jp_kana: コダックじょうろ
    jp_kanji: コダックじょうろ
    en: Sprayduck
    fr: Kwakarrosoir
    it: Sprayduck
    de: Entonkanne
    es: Psydugadera
    ko: 고라파덕물뿌리개
    zh_simp: 可达鸭喷壶
    zh_trad: 可達鴨噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた　きのみを\nすくすく　育てる。"
    en: "A watering can shaped like a Psyduck. It helps\npromote the healthy growth of any Berries planted\nin good, soft soil."
    fr: "Un arrosoir en forme de Psykokwak.\nAide à la croissance des Baies plantées dans\nles sols meubles."
    it: "Annaffiatoio fatto a forma di Psyduck.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Enton. Gieße gepflanzte\nBeeren, damit sie besser wachsen."
    es: "Una regadera con forma de Psyduck. Ayuda a que\nlas bayas plantadas en suelo fértil crezcan mejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在松软土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在鬆軟土壤裡的\n樹果快快長大。"
sprinklotad:
  names:
    jp_kana: ハスボーじょうろ
    jp_kanji: ハスボーじょうろ
    en: Sprinklotad
    fr: Nénurrosoir
    it: Irrigalotad
    de: Loturzelkanne
    es: Lotadgadera
    ko: 연꽃몬물뿌리개
    zh_simp: 莲叶童子喷壶
    zh_trad: 蓮葉童子噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた\nきのみを　すくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた\nきのみを　すくすく　育てる。"
    en: "A watering can shaped like a Lotad. It helps\npromote the healthy growth of any Berries planted\nin good, soft soil."
    fr: "Un arrosoir en forme de Nénupiot qui aide\nà la croissance des Baies plantées dans les sols meubles."
    it: "Strumento per annaffiare a forma di Lotad.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Loturzel. Gieße\ngepflanzte Beeren, damit sie besser wachsen."
    es: "Una regadera con forma de Lotad. Ayuda a que\nlas bayas plantadas en suelo blandito crezcan\nmejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은\n나무열매를 쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让埋在松软土壤里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓埋在鬆軟土壤裡的\n樹果快快長大。"
squirt_bottle:
  names:
    jp_kana: ゼニガメじょうろ
    jp_kanji: ゼニガメじょうろ
    en: Squirt Bottle
    fr: Carapuce à O
    it: Annaffiatoio
    de: Schiggykanne
    es: Regadera
    ko: 꼬부기물뿌리개
    zh_simp: 杰尼龟喷壶
    zh_trad: 傑尼龜噴壺
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nきのみプランターの　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\nきのみプランターの　きのみを\nすくすく　育てる。"
    en: A bottle used for watering plants in the Berry Pots.
    fr: "Un arrosoir qui permet de faire croître rapidement\nles Baies plantées dans le Plante-Baies."
    it: "Strumento che serve a innaffiare.\nPermette un’ottima crescita delle bacche\nseminate nel Piantabacche."
    de: "Eine Gießkanne, durch deren Wasser Beeren im\nPflanzset umso rascher wachsen."
    es: "Objeto que contiene agua y se usa para regar las bayas\ndel Plantabayas."
    ko: "물을 주는 도구.\n나무열매플랜터의 나무열매를\n쑥쑥 키운다."
    zh_simp: "浇水的道具。\n能让树果种植盆里的\n树果快快长大。"
    zh_trad: "澆水的器具。\n能讓樹果種植盆裡的\n樹果快快長大。"
squirtle_candy:
  names:
    jp_kana: ゼニガメのアメ
    jp_kanji: ゼニガメのアメ
    en: Squirtle Candy
    fr: Bonbon Carapuce
    it: Caramella Squirtle
    de: Schiggy-Bonbon
    es: Caramelo Squirtle
    ko: 꼬부기의사탕
    zh_simp: 杰尼龟的糖果
    zh_trad: 傑尼龜的糖果
  descriptions:
