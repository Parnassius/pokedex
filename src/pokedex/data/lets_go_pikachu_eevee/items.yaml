    fr: Nymphézélite
    it: Follectium Z
    de: Sylphium Z
    es: Feeristal Z
    ko: 페어리Z
    zh_simp: 妖精Ｚ
    zh_trad: 妖精Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nフェアリータイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nフェアリータイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Fairy-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Fée en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Folletto\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Feen-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Hada."
    ko: "Z파워의 결정.\n페어리타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将妖精属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把妖精屬性的招式\n升級為Ｚ招式。"
fairy_gem:
  names:
    jp_kana: ようせいジュエル
    jp_kanji: ようせいジュエル
    en: Fairy Gem
    fr: Joyau Fée
    it: Bijoufolletto
    de: Feenjuwel
    es: Gema Hada
    ko: 페어리주얼
    zh_simp: 妖精宝石
    zh_trad: 妖精寶石
  descriptions:
    jp_kana: "フェアリーの　タイプの　ジュエル。\nもたせると　いちどだけ　フェアリーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "フェアリーの　タイプの　ジュエル。\n持たせると　１度だけ　フェアリーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the fey. When held, it\nstrengthens the power of a Fairy-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Folletto."
    de: "Ein Juwel vom Typ Fee. Es erhöht einmalig die\nStärke einer Attacke vom Typ Fee."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Hada. Debe llevarla un Pokémon."
    ko: "페어리타입의 주얼.\n지니게 하면 한 번만 페어리\n기술의 위력이 강해진다."
    zh_simp: "妖精属性的宝石。\n携带后，妖精属性的\n招式威力会仅增强１次。"
    zh_trad: "妖精屬性的寶石。\n攜帶後，妖精屬性的\n招式威力會僅增強１次。"
fairy_memory:
  names:
    jp_kana: フェアリーメモリ
    jp_kanji: フェアリーメモリ
    en: Fairy Memory
    fr: ROM Fée
    it: ROM Folletto
    de: Feen-Disc
    es: Disco Hada
    ko: 페어리메모리
    zh_simp: 妖精存储碟
    zh_trad: 妖精記憶碟
