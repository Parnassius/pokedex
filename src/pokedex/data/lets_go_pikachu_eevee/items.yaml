    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　グローブ。"
    en: "This glove contains an untold power that somehow\nenables Pokémon carrying Mega Stones to\nMega Evolve in battle."
    fr: "Un gant aux pouvoirs mystérieux permettant à\nun Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Guanto dotato di un misterioso potere.\nConsente a un Pokémon che ha una Megapietra\ndi megaevolversi durante la lotta."
    de: "Ein Handschuh mit geheimnisvollen Kräften.\nEr ermöglicht Pokémon, die einen Mega-Stein\ntragen, eine Mega-Entwicklung durchzuführen."
    es: "Guante con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven la\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 글러브."
    zh_simp: "蕴藏着未知力量的手套。\n能让携带着超级石战斗的\n宝可梦进行超级进化。"
    zh_trad: "隱藏著未知力量的手套。\n能讓攜帶著超級石戰鬥的\n寶可夢進行超級進化。"
