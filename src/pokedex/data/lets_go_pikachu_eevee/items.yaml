eevium_z:bag:
  names:
    jp_kana: イーブイＺ
    jp_kanji: イーブイＺ
    en: Eevium Z
    fr: Évolizélite
    it: Eevium Z
    de: Evolium Z
    es: Eeveestal Z
    ko: 이브이Z
    zh_simp: 伊布Ｚ
    zh_trad: 伊布Ｚ
  descriptions:
    jp_kana: "イーブイの　とっておきを\nとくべつな　Ｚワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "イーブイの　とっておきを\n特別な　Ｚワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nEevee’s Last Resort to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise l’Évoli qui le tient à transformer\nson Dernier Recours en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono a Eevee di trasformare la mossa\nUltimascelta in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Evolis Attacke\nZuflucht zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nEevee convertir su Última Baza en un movimiento Z."
    ko: "이브이의 뒀다쓰기를\n특별한 Z기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将伊布的珍藏\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把伊布的珍藏\n升級為特殊Ｚ招式的Ｚ力量結晶。"
eevium_z:held:
  names:
    jp_kana: イーブイＺ
    jp_kanji: イーブイＺ
    en: Eevium Z
    fr: Évolizélite
    it: Eevium Z
    de: Evolium Z
    es: Eeveestal Z
    ko: 이브이Z
    zh_simp: 伊布Ｚ
    zh_trad: 伊布Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nイーブイの　とっておきを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nイーブイの　とっておきを\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Eevee’s Last Resort to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Dernier Recours d’un Évoli en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Ultimascelta\ndi Eevee in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Evolis Attacke Zuflucht\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento\nÚltima Baza de Eevee."
    ko: "Z파워의 결정.\n이브이의 뒀다쓰기를\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将伊布的珍藏\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把伊布的珍藏\n升級為Ｚ招式。"
eject_button:
  names:
    jp_kana: だっしゅつボタン
    jp_kanji: だっしゅつボタン
    en: Eject Button
    fr: Bouton Fuite
    it: Pulsantefuga
    de: Fluchtknopf
    es: Botón Escape
    ko: 탈출버튼
    zh_simp: 逃脱按键
    zh_trad: 逃脫按鍵
  descriptions:
    jp_kana: "もたせて　わざを　うけると\nせんとうから　だっしゅつして\nてもちと　いれかわる　ことができる。"
    jp_kanji: "持たせて　技を　受けると\n戦闘から　脱出して\n手持ちと　入れ替わる　ことができる。"
    en: "An item to be held by a Pokémon. If the holder is\nhit by an attack, it will be switched out of battle."
    fr: "Si le Pokémon qui le tient subit une attaque, il s’enfuit\npour être remplacé par un autre membre de l’équipe."
    it: "Se il Pokémon che ha questo strumento è colpito\nda un attacco, viene immediatamente sostituito\nda un altro membro della squadra."
    de: "Wird der Träger getroffen, flieht er aus dem Kampf\nund wird mit einem Team-Pokémon ausgetauscht."
    es: "Si el portador es alcanzado por un ataque, saldrá\ndel combate y será sustituido por otro Pokémon\ndel equipo."
    ko: "지니게 하고 기술을 받으면\n배틀에서 탈출하여\n지닌 포켓몬과 교체할 수 있다."
    zh_simp: "携带它的宝可梦如果受到招式攻击，\n就能逃脱战斗，并和同行的\n其他宝可梦进行替换。"
    zh_trad: "攜帶它的寶可夢如果受到招式攻擊，\n就能從戰鬥中逃脫，並和同行的\n其他寶可夢進行替換。"
ekans_candy:
  names:
    jp_kana: アーボのアメ
    jp_kanji: アーボのアメ
    en: Ekans Candy
    fr: Bonbon Abo
    it: Caramella Ekans
    de: Rettan-Bonbon
    es: Caramelo Ekans
    ko: 아보의사탕
    zh_simp: 阿柏蛇的糖果
    zh_trad: 阿柏蛇的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
electabuzz_candy:
  names:
    jp_kana: エレブーのアメ
    jp_kanji: エレブーのアメ
    en: Electabuzz Candy
    fr: Bonbon Élektek
    it: Caramella Electabuzz
    de: Elektek-Bonbon
    es: Caramelo Electabuzz
    ko: 에레브의사탕
    zh_simp: 电击兽的糖果
    zh_trad: 電擊獸的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
electirizer:
  names:
    jp_kana: エレキブースター
    jp_kanji: エレキブースター
    en: Electirizer
    fr: Électriseur
    it: Elettritore
    de: Stromisierer
    es: Electrizador
    ko: 에레키부스터
    zh_simp: 电力增幅器
    zh_trad: 電力增幅器
  descriptions:
    jp_kana: "とてつもない　でんきの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　電気の　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous amount of electric\nenergy. It’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité d’énergie\nélectrique. Appréciée d’un certain Pokémon."
    it: "Scatola strapiena di energia elettrica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit elektrischer Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Este dispositivo contiene una gran cantidad de energía\neléctrica. Cierto Pokémon lo adora."
    ko: "엄청난 전기의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
    zh_simp: "积蓄着庞大电气能量的箱子。\n某种宝可梦很喜欢它。"
    zh_trad: "蓄積著龐大\n電氣能量的箱子。\n某種寶可夢很喜歡它。"
electric_gem:
  names:
    jp_kana: でんきのジュエル
    jp_kanji: でんきのジュエル
    en: Electric Gem
    fr: Joyau Électrik
    it: Bijouelettro
    de: Elektrojuwel
    es: Gema Eléctrica
    ko: 전기주얼
    zh_simp: 电之宝石
    zh_trad: 電之寶石
  descriptions:
    jp_kana: "でんきの　タイプの　ジュエル。\nもたせると　いちどだけ　でんきの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　ジュエル。\n持たせると　１度だけ　でんきの\n技の　威力が　強まる。"
    en: "A gem with an essence of electricity. When held,\nit strengthens the power of an Electric-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Elettro."
    de: "Ein Juwel vom Typ Elektro. Es erhöht einmalig die\nStärke einer Attacke vom Typ Elektro."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Eléctrico. Debe llevarla un Pokémon."
    ko: "전기타입의 주얼.\n지니게 하면 한 번만 전기\n기술의 위력이 강해진다."
    zh_simp: "电属性的宝石。\n携带后，电属性的\n招式威力仅会增强１次。"
    zh_trad: "電屬性的寶石。\n攜帶後，電屬性招式的\n威力會僅增強１次。"
electric_memory:
  names:
    jp_kana: エレクトロメモリ
    jp_kanji: エレクトロメモリ
    en: Electric Memory
    fr: ROM Électrik
    it: ROM Elettro
    de: Elektro-Disc
    es: Disco Eléctrico
    ko: 일렉트릭메모리
    zh_simp: 电子存储碟
    zh_trad: 電子記憶碟
  descriptions:
    jp_kana: "でんきタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "でんきタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Electric-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Électrik. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Elettro in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Elektro.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nEléctrico. Permite cambiar de tipo a cierto Pokémon."
    ko: "전기타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有电属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有電屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
electric_seed:
  names:
    jp_kana: エレキシード
    jp_kanji: エレキシード
    en: Electric Seed
    fr: Graine Électrik
    it: Elettroseme
    de: Elektro-Samen
    es: Semilla Electro
    ko: 일렉트릭시드
    zh_simp: 电气种子
    zh_trad: 電氣種子
  descriptions:
    jp_kana: "ポケモンに　もたせると\nエレキフィールドのときに　つかって\nぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nエレキフィールドのときに　使って\n防御が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Defense\non Electric Terrain. It can only be used once."
    fr: "Objet à tenir. Augmente la Défense lorsque le terrain\nest couvert d’un Champ Électrifié."
    it: "Strumento da dare a un Pokémon.\nFa aumentare la Difesa quando il terreno\ndi lotta è nello stato di Campo Elettrico."
    de: "Gibst du den Samen einem Pokémon zum Tragen,\nsetzt es ihn ein, wenn ein Elektrofeld aktiv ist,\nund erhöht dadurch seine Verteidigung."
    es: "Aumenta la Defensa del portador si se usa cuando\nel terreno está cubierto por un campo eléctrico."
    ko: "포켓몬에게 지니게 하면\n일렉트릭필드일 때 사용하여\n방어가 올라간다."
    zh_simp: "让宝可梦携带后，\n在电气场地上使用，\n防御就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n在電氣場地上使用，\n就會提高防禦。"
electrium_z:bag:
  names:
    jp_kana: デンキＺ
    jp_kanji: デンキＺ
    en: Electrium Z
    fr: Voltazélite
    it: Electrium Z
    de: Voltium Z
    es: Electrostal Z
    ko: 전기Z
    zh_simp: 电Ｚ
    zh_trad: 電Ｚ
  descriptions:
    jp_kana: "でんきタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "でんきタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nElectric-type moves to Electric-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Électrik en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Elettro in mosse Z."
    de: "Kristallisierte Z-Kraft, die Elektro-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nEléctrico en movimientos Z."
    ko: "전기타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将电属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把電屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
electrium_z:held:
  names:
    jp_kana: デンキＺ
    jp_kanji: デンキＺ
    en: Electrium Z
    fr: Voltazélite
    it: Electrium Z
    de: Voltium Z
    es: Electrostal Z
    ko: 전기Z
    zh_simp: 电Ｚ
    zh_trad: 電Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nでんきタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nでんきタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Electric-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Électrik en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo Elettro\nin mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Elektro-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Eléctrico."
    ko: "Z파워의 결정.\n전기타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将电属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把電屬性的招式\n升級為Ｚ招式。"
elevator_key:
  names:
    jp_kana: エレベータのキー
    jp_kanji: エレベータのキー
    en: Elevator Key
    fr: Clé Ascenseur
    it: Chiave ascensore
    de: Liftschlüssel
    es: Llave Ascensor
    ko: 엘리베이터키
    zh_simp: 电梯钥匙
    zh_trad: 電梯鑰匙
  descriptions:
    jp_kana: "フラダリラボに　ある\nエレベータを　うごかす　カードキー。\nフレアだんの　マークいり。"
    jp_kanji: "フラダリラボに　ある\nエレベータを　動かす　カードキー。\nフレア団の　マークいり。"
    en: "A card key that activates the elevator in Lysandre\nLabs. It is emblazoned with Team Flare’s logo."
    fr: "Un passe de sécurité permettant d’accéder à\nl’ascenseur des Laboratoires Lysandre.\nIl est décoré du logo de la Team Flare."
    it: "Tessera magnetica con il simbolo del Team Flare\nche attiva l’ascensore dei Laboratori Elisio."
    de: "Eine Schlüsselkarte mit dem Logo von Team Flare.\nSie aktiviert den Fahrstuhl im Labor von Flordelis."
    es: "Tarjeta con el logotipo del Team Flare que activa\nel ascensor de los Laboratorios Lysson."
    ko: "플라드리 래버러토리에 있는\n엘리베이터를 작동시키는 카드키.\n플레어단의 마크가 새겨져 있다."
    zh_simp: "可以启动弗拉达利\n研究所里电梯的钥匙卡。\n上面有着闪焰队的标志。"
    zh_trad: "可以啟動弗拉達利\n研究所裡電梯的鑰匙卡。\n上面有著閃焰隊的標誌。"
elixir:
  names:
    jp_kana: ピーピーエイダー
    jp_kanji: ピーピーエイダー
    en: Elixir
    fr: Élixir
    it: Elisir
    de: Elixier
    es: Elixir
    ko: PP에이더
    zh_simp: PP多项小补剂
    zh_trad: PP多項小補劑
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\n１０ずつ　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n４つの　技の　ＰＰを\n１０ずつ　回復する。"
    en: "This medicine can be used to restore 10 PP to each of\nthe moves that have been learned by a Pokémon."
    fr: Restaure 10 PP de toutes les capacités d’un Pokémon.
    it: "Restituisce 10 PP a ciascuna delle mosse\nconosciute dal Pokémon."
    de: "Füllt die AP aller Attacken eines Pokémon um\n10 Punkte auf."
    es: "Restaura 10 PP de todos los movimientos\naprendidos por el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n10씩 회복한다."
    zh_simp: "能让宝可梦学会的\n４个招式各\n回复10PP。"
    zh_trad: "能讓寶可夢已學會的\n４個招式各\n回復10PP。"
energy_powder:
  names:
    jp_kana: ちからのこな
    jp_kanji: ちからのこな
    en: Energy Powder
    fr: Poudrénergie
    it: Polvenergia
    de: Energiestaub
    es: Polvo Energía
    ko: 힘의가루
    zh_simp: 元气粉
    zh_trad: 元氣粉
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　ＨＰを\n６０だけ　かいふくする。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A very bitter medicinal powder. When consumed,\nit restores up to 60 HP to an injured Pokémon."
    fr: "Une poudre médicinale très amère.\nRestaure 60 PV d’un Pokémon."
    it: "Rimedio amarissimo in polvere.\nRestituisce 60 PS a un Pokémon."
    de: "Ein bitteres medizinisches Pulver, das die KP eines\nPokémon um 60 Punkte auffüllt."
    es: "Polvo medicinal muy amargo que restaura 60 PS de\nun Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
    zh_simp: "非常苦的药粉。\n能让１只宝可梦\n回复60HP。"
    zh_trad: "非常苦的藥粉。\n能讓１隻寶可夢\n回復60HP。"
energy_root:
  names:
    jp_kana: ちからのねっこ
    jp_kanji: ちからのねっこ
    en: Energy Root
    fr: Racinénergie
    it: Radicenergia
    de: Kraftwurzel
    es: Raíz Energía
    ko: 힘의뿌리
    zh_simp: 元气根
    zh_trad: 元氣根
  descriptions:
    jp_kana: "とても　にがい　ねっこ。\nポケモン　１ひきの　ＨＰを\n１２０だけ　かいふくする。"
    jp_kanji: "とても　にがい　ねっこ。\nポケモン　１匹の　ＨＰを\n１２０だけ　回復する。"
    en: "An extremely bitter medicinal root. When consumed,\nit restores up to 120 HP to an injured Pokémon."
    fr: "Une racine très amère.\nRestaure 120 PV d’un Pokémon."
    it: "Radice amarissima.\nRestituisce 120 PS a un Pokémon."
    de: "Eine bittere Wurzel, die die KP eines Pokémon um\n120 Punkte auffüllt."
    es: "Raíz muy amarga que restaura 120 PS de un\nPokémon."
    ko: "매우 쓴 뿌리.\n포켓몬 1마리의 HP를\n120만큼 회복한다."
    zh_simp: "非常苦的根。\n能让１只宝可梦\n回复120HP。"
    zh_trad: "非常苦的根。\n能讓１隻寶可夢\n回復120HP。"
enigma_berry:
  names:
    jp_kana: ナゾのみ
    jp_kanji: ナゾのみ
    en: Enigma Berry
    fr: Baie Enigma
    it: Baccaenigma
    de: Enigmabeere
    es: Baya Enigma
    ko: 의문열매
    zh_simp: 谜芝果
    zh_trad: 謎芝果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　わざを\nうけたとき　ＨＰを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　技を\n受けたとき　ＨＰを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, being hit by a supereffective attack will\nrestore its HP."
    fr: "Tenue, cette Baie restaure les PV du Pokémon s’il subit\nune attaque super efficace."
    it: "Se il Pokémon che ha questa bacca è colpito da\nun attacco superefficace, i suoi PS vengono\nripristinati."
    de: "Als getragenes Item füllt diese Beere die KP eines\nPokémon auf, wenn es von sehr effektiven Attacken\ngetroffen wird."
    es: "Restaura los PS de un Pokémon si la lleva cuando\nle alcanza un ataque supereficaz."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 공격을\n받았을 때 HP를 회복한다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的招式攻击时，\n可以回复HP。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的招式\n攻擊時，可以回復HP。"
enigma_stone:
  names:
    jp_kana: なぞのすいしょう
    jp_kanji: なぞのすいしょう
    en: Enigma Stone
    fr: Mystécristal
    it: Misticristal
    de: Mytokristall
    es: Misticristal
    ko: 수수께끼의수정
    zh_simp: 谜之水晶
    zh_trad: 謎之水晶
  descriptions:
    jp_kana: "じめんから　ほりだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    jp_kanji: "地面から　掘りだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    en: "A crystal ball that was excavated from the ground.\nIt’s a very beautiful stone that is covered with bits\nof rock and earth."
    fr: "Un orbe cristallin fraîchement déterré.\nIl est encore pris dans une gangue de terre et de roche."
    it: "Cristallo appena estratto dal suolo.\nBellissimo malgrado sia ancora ricoperto di resti\ndi roccia e terra."
    de: "Eine kristallene Kugel, die aus der Erde geborgen\nwurde. Schmutz und Gestein konnten ihrer\nSchönheit nichts anhaben."
    es: "Esfera cristalina encontrada bajo tierra. A pesar\nde estar cubierta de roca y tierra, su belleza es\nincreíble."
    ko: "땅에서 파 올린\n수정구슬. 바위랑 흙으로\n뒤덮여 있지만 매우 아름답다."
    zh_simp: "从地下挖出的水晶球。\n虽然表面覆盖着岩石和尘土，\n但非常漂亮。"
    zh_trad: "從地下挖出的水晶球。\n雖然表面覆蓋著岩石和塵土，\n但非常漂亮。"
enigmatic_card:
  names:
    jp_kana: あやしいカード
    jp_kanji: あやしいカード
    en: Enigmatic Card
    fr: Message Mystère
    it: Lettera segreta
    de: Seltsame Karte
    es: Nota Intrigante
    ko: 괴상한카드
    zh_simp: 奇异卡片
    zh_trad: 奇異卡片
  descriptions:
    jp_kana: "「アーカラじま　８ばんどうろの\nモーテル　きゃくしつ　にて　まつ」と\nかかれた　なぞの　カード。"
    jp_kanji: "「アーカラ島　８番道路の\nモーテル　客室　にて　待つ」と\n書かれた　謎の　カード。"
    en: "A mysterious card.\nWritten on it is a request for you to go to a\nguest room in an Akala motel on Route 8."
    fr: "Une carte étrange sur laquelle quelqu’un a écrit :\n« Je t’attends dans une chambre du motel de la\nRoute 8 sur l’île d’Akala. »"
    it: "Biglietto misterioso. C’è scritto:\n“Ti aspetto in una stanza del motel di Akala,\nlungo il Percorso 8”."
    de: "Eine rätselhafte Karte, auf der Folgendes steht:\n„Ich warte im Motel am Rand von Route 8 auf\nAkala.“"
    es: "Misteriosa nota que reza: \"Te espero en una habitación\ndel motel de la Ruta 8 en Akala\"."
    ko: "“아칼라섬 8번도로의\n모텔 객실에서 기다리겠다”라고\n적혀 있는 의문의 카드."
    zh_simp: "上面写有“在阿卡拉岛８号道路的\n汽车旅馆客房里等”的谜之卡片。"
    zh_trad: "上面寫有「在阿卡拉島８號道路的\n汽車旅館客房裡等」的\n謎之卡片。"
eon_flute:
  names:
    jp_kana: むげんのふえ
    jp_kanji: むげんのふえ
    en: Eon Flute
    fr: Flûte Éon
    it: Flauto Eone
    de: Äon-Flöte
    es: Flauta Eón
    ko: 무한의피리
    zh_simp: 无限之笛
    zh_trad: 無限之笛
  descriptions:
    jp_kana: "どこに　いても\nラティオスや　ラティアスを\nよびよせることが　できる　ふえ。"
    jp_kanji: "どこに　いても\nラティオスや　ラティアスを\n呼び寄せることが　できる　笛。"
    en: "A flute that can be used to summon Latios or Latias\nno matter where you are."
    fr: "Une flûte capable d’appeler Latios ou Latias où que\nl’on soit."
    it: "Suonando questo flauto è possibile richiamare\nLatios o Latias ovunque ci si trovi."
    de: "Eine Flöte, mit der man Latios oder Latias\nherbeirufen kann, egal wo sie sich gerade befinden."
    es: "Flauta capaz de invocar a Latios o Latias en\ncualquier lugar."
    ko: "어디에 있든지\n라티오스나 라티아스를\n부를 수 있는 피리."
    zh_simp: "无论身在何处，\n都能召唤拉帝欧斯或\n拉帝亚斯的笛子。"
    zh_trad: "無論身在何處，\n都能召喚拉帝歐斯或\n拉帝亞斯的笛子。"
eon_ticket:
  names:
    jp_kana: むげんのチケット
    jp_kanji: むげんのチケット
    en: Eon Ticket
    fr: Passe Éon
    it: Biglietto Eone
    de: Äon-Ticket
    es: Ticket Eón
    ko: 무한티켓
    zh_simp: 无限船票
    zh_trad: 無限船票
  descriptions:
    jp_kana: "みなみのことうへ　いく　ふねの\nチケット。トウカジムの　ジムリーダー\nセンリが　ひみつを　しっている！？"
    jp_kanji: "南の孤島へ　行く　船の\nチケット。トウカジムの　ジムリーダー\nセンリが　秘密を　知っている！？"
    en: "The ticket required for sailing on a ferry to the\nSouthern Island. Does Norman, the Petalburg Gym\nLeader, know a secret?!"
    fr: "Un billet de ferry pour l’Île du Sud.\nNorman, le Champion de l’Arène de Clémenti-Ville,\nsemble savoir quelque chose à son sujet."
    it: "Biglietto per il traghetto che porta all’Isola Remota.\nNorman, il Capopalestra di Petalipoli, dovrebbe\nsapere come usarlo."
    de: "Ein Bootsticket, mit dem du zu einer fernen Insel im\nSüden schippern kannst. Kennt der Arenaleiter von\nBlütenburg, Norman, ein Geheimnis?!"
    es: "Billete de barco para viajar a Isla del Sur.\nEs posible que Norman, Líder de Gimnasio de\nCiudad Petalia, sepa algo al respecto."
    ko: "남쪽의 외딴섬으로 가는 배의\n승선티켓. 등화체육관 관장\n종길이 비밀을 알고 있다!?"
    zh_simp: "前往南方孤岛的船票。\n橙华道馆的馆主千里\n知道其中的秘密！？"
    zh_trad: "前往南方孤島的船票。\n橙華道館的館主千里\n知道其中的秘密！？"
escape_rope:
  names:
    jp_kana: あなぬけのヒモ
    jp_kanji: あなぬけのヒモ
    en: Escape Rope
    fr: Corde Sortie
    it: Fune di fuga
    de: Fluchtseil
    es: Cuerda Huida
    ko: 동굴탈출로프
    zh_simp: 离洞绳
    zh_trad: 離洞繩
  descriptions:
    jp_kana: "ながくて　じょうぶな　ヒモ。\nどうくつや　ダンジョンから\nぬけだすことが　できる。"
    jp_kanji: "長くて　丈夫な　ヒモ。\n洞窟や　ダンジョンから\n抜け出すことが　できる。"
    en: "A long and durable rope. Use it to escape instantly\nfrom locations like caves or dungeons."
    fr: "Une corde longue et solide permettant de sortir\nrapidement d’une grotte ou d’un donjon."
    it: "Corda lunga e resistente che si usa per fuggire\nin un batter d’occhio dalle grotte o da certi\nluoghi chiusi."
    de: "Ein langes, festes Seil, das die sofortige Flucht aus\nHöhlen oder Ähnlichem ermöglicht."
    es: "Cuerda larga y resistente que sirve para huir de cuevas\ny sitios cerrados en general."
    ko: "길고 튼튼한 끈.\n동굴이나 던전에서\n빠져나올 수 있다."
    zh_simp: "结实的长绳。\n可以从洞窟或迷宫中脱身。"
    zh_trad: "結實的長繩。\n可以從洞窟或迷宮中脫身。"
ether:
  names:
    jp_kana: ピーピーエイド
    jp_kanji: ピーピーエイド
    en: Ether
    fr: Huile
    it: Etere
    de: Äther
    es: Éter
    ko: PP에이드
    zh_simp: PP单项小补剂
    zh_trad: PP單項小補劑
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\n１０だけ　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰを\n１０だけ　回復する。"
    en: "This medicine can be used to restore 10 PP to a single\nselected move that has been learned by a Pokémon."
    fr: Restaure 10 PP d’une capacité sélectionnée.
    it: "Restituisce un massimo di 10 PP a una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke eines\nPokémon um 10 Punkte auf."
    es: "Restaura 10 PP del movimiento elegido de un\nPokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n10만큼 회복한다."
    zh_simp: "能让宝可梦学会的\n其中１个招式\n回复10PP。"
    zh_trad: "能讓寶可夢已學會的\n其中１個招式\n回復10PP。"
everstone:
  names:
    jp_kana: かわらずのいし
    jp_kanji: かわらずのいし
    en: Everstone
    fr: Pierre Stase
    it: Pietrastante
    de: Ewigstein
    es: Piedra Eterna
    ko: 변함없는돌
    zh_simp: 不变之石
    zh_trad: 不變之石
  descriptions:
    jp_kana: "ポケモンに　もたせると\nそのあいだ　しんか　しなくなる\nふしぎな　いし。"
    jp_kanji: "ポケモンに　持たせると\nそのあいだ　進化しなくなる\n不思議な　石。"
    en: "An item to be held by a Pokémon. A Pokémon\nholding this peculiar stone is prevented\nfrom evolving."
    fr: "Objet à tenir. Une pierre merveilleuse empêchant\nl’évolution."
    it: "Strumento da dare a un Pokémon.\nChi ha questa pietra particolare evita l’evoluzione."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es bewirkt einen Entwicklungsstopp."
    es: El Pokémon que lleva esta piedra mágica no evoluciona.
    ko: "포켓몬에게 지니게 하면\n지닌 동안에는 진화하지 않게 되는\n이상한 돌."
    zh_simp: "携带后，宝可梦在此期间\n不会进化的神奇石头。"
    zh_trad: "攜帶後，寶可夢在此期間\n不會進化的神奇石頭。"
eviolite:
  names:
    jp_kana: しんかのきせき
    jp_kanji: しんかのきせき
    en: Eviolite
    fr: Évoluroc
    it: Evolcondensa
    de: Evolith
    es: Mineral Evol
    ko: 진화의휘석
    zh_simp: 进化奇石
    zh_trad: 進化奇石
  descriptions:
    jp_kana: "しんかの　ふしぎな　かたまり。\nもたせると　しんかまえ　ポケモンの\nぼうぎょと　とくぼうが　あがる。"
    jp_kanji: "進化の　不思議な　かたまり。\n持たせると　進化前　ポケモンの\n防御と　特防が　あがる。"
    en: "A mysterious evolutionary lump. When held by a\nPokémon that can still evolve, it raises both\nDefense and Sp. Def."
    fr: "Un étrange concentré d’évolution qui augmente\nla Défense et la Défense Spéciale d’un Pokémon\npouvant évoluer."
    it: "Misterioso concentrato di materia evolutiva.\nAumenta la Difesa e la Difesa Speciale di un\nPokémon che può ancora evolversi."
    de: "Ein mysteriöser Klumpen, der die Verteidigung und\nSpezial-Verteidigung von Pokémon erhöht, die sich\nnoch entwickeln können."
    es: "Roca misteriosa. El Pokémon portador aumentará\nsu Defensa y su Defensa Especial si aún puede\nevolucionar."
    ko: "진화의 이상한 덩어리.\n지니게 하면 진화 전 포켓몬의\n방어와 특수방어가 올라간다."
    zh_simp: "进化的神奇石块。\n携带后，还能进化的宝可梦的\n防御和特防就会提高。"
    zh_trad: "進化的神奇石塊。\n攜帶後，還能進化的寶可夢的\n防禦和特防就會提高。"
exeggcute_candy:
  names:
    jp_kana: タマタマのアメ
    jp_kanji: タマタマのアメ
    en: Exeggcute Candy
    fr: Bonbon Noeunoeuf
    it: Caramella Exeggcute
    de: Owei-Bonbon
    es: Caramelo Exeggcute
    ko: 아라리의사탕
    zh_simp: 蛋蛋的糖果
    zh_trad: 蛋蛋的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
exp_share:
  names:
    jp_kana: がくしゅうそうち
    jp_kanji: がくしゅうそうち
    en: Exp. Share
    fr: Multi Exp
    it: Condividi esp.
    de: EP-Teiler
    es: Repartir Exp
    ko: 학습장치
    zh_simp: 学习装置
    zh_trad: 學習裝置
  descriptions:
    jp_kana: "スイッチを　いれると\nてもちの　ポケモン　すべてが\nけいけんちを　もらえる　そうち。"
    jp_kanji: "スイッチを　いれると\n手持ちの　ポケモン　すべてが\n経験値を　もらえる　装置。"
    en: "Turning on this special device will allow all the Pokémon\non your team to receive Exp. Points from battles."
    fr: "Objet à activer. Permet de faire gagner des Points\nd’Expérience à tous les Pokémon de l’équipe,\nmême à ceux qui n’ont pas participé au combat."
    it: "Se attivato, tutti i Pokémon della squadra ricevono\nPunti Esperienza dalla lotta anche se non vi hanno\npartecipato."
    de: "Solange der EP-Teiler angeschaltet ist, erhält jedes\nTeam-Pokémon nach einem Sieg Erfahrungspunkte."
    es: "Al activar el dispositivo, todos los Pokémon de\ntu equipo ganan Puntos de Experiencia tras los\ncombates, aunque no salgan a luchar."
    ko: "스위치를 켜면\n지닌 포켓몬 모두가\n경험치를 받을 수 있는 장치."
    zh_simp: "打开开关后，\n能让同行的所有宝可梦\n获得经验值的装置。"
    zh_trad: "打開開關後，\n同行的所有寶可夢\n都可獲得經驗值的裝置。"
expert_belt:
  names:
    jp_kana: たつじんのおび
    jp_kanji: たつじんのおび
    en: Expert Belt
    fr: Ceinture Pro
    it: Abilcintura
    de: Expertengurt
    es: Cinta Experto
    ko: 달인의띠
    zh_simp: 达人带
    zh_trad: 達人帶
  descriptions:
    jp_kana: "つかいこまれた　くろい　おび。\nもたせると　こうかばつぐんの　とき\nわざの　いりょくが　すこし　あがる。"
    jp_kanji: "使いこまれた　黒い　帯。\n持たせると　効果バツグンの　とき\n技の　威力が　少し　あがる。"
    en: "An item to be held by a Pokémon. It’s a well-worn\nbelt that slightly boosts the power of\nsupereffective moves."
    fr: "Objet à tenir. Une ceinture usée augmentant\nlégèrement la puissance des capacités super efficaces."
    it: "Strumento da dare a un Pokémon.\nCintura consumata che potenzia di poco\nle mosse superefficaci."
    de: "Ein Item zum Tragen. Dieser alte Gürtel verstärkt\nsehr effektive Attacken."
    es: "Potencia ligeramente los movimientos supereficaces.\nDebe llevarla un Pokémon."
    ko: "오래 사용한 까만 띠.\n지니게 하면 효과가 뛰어날 때\n기술의 위력이 조금 올라간다."
    zh_simp: "用惯了的黑色带子。\n携带后，效果绝佳时的\n招式威力就会少量提高。"
    zh_trad: "用慣了的黑色帶子。\n攜帶後，效果絕佳時的\n招式威力就會少量提高。"
explorer_kit:
  names:
    jp_kana: たんけんセット
    jp_kanji: たんけんセット
    en: Explorer Kit
    fr: Explorakit
    it: Esplorokit
    de: Forschersack
    es: Kit Explorador
    ko: 탐험세트
    zh_simp: 探险套装
    zh_trad: 探險組合
  descriptions:
    jp_kana: "たんけんに　やくだつ　べんりな\nどうぐが　はいった　ふくろ。\nちかつうろに　はいれる。"
    jp_kanji: "探検に　役立つ　便利な\n道具が　はいった　ふくろ。\n地下通路に　はいれる。"
    en: "A bag filled with convenient tools for exploring.\nIt provides access to the Underground in the\nSinnoh region."
    fr: "Un sac contenant des objets utiles à l’exploration.\nPermet d’entrer dans le Souterrain."
    it: "Utilissimo kit contenente strumenti per\nl’esplorazione. Permette di percorrere\ni tunnel sotterranei."
    de: "Ein Sack voller hilfreicher Items für\nErkundungsgänge. Öffnet den Untergrund."
    es: "Una saca donde guardar los objetos útiles para\nla exploración. Permite acceder al Subsuelo."
    ko: "탐험에 도움이 되는 편리한\n도구가 들어 있는 주머니.\n지하통로에 들어갈 수 있다."
    zh_simp: "装着有助于探险且\n方便使用的道具的袋子。\n有了它就可以进入地下通道。"
    zh_trad: "裝著探險時可派上用場的\n好用道具的袋子。\n可以進入地下通道。"
fairium_z:bag:
  names:
    jp_kana: フェアリーＺ
    jp_kanji: フェアリーＺ
    en: Fairium Z
    fr: Nymphézélite
    it: Follectium Z
    de: Sylphium Z
    es: Feeristal Z
    ko: 페어리Z
    zh_simp: 妖精Ｚ
    zh_trad: 妖精Ｚ
  descriptions:
    jp_kana: "フェアリータイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "フェアリータイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nFairy-type moves to Fairy-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Fée en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Folletto in mosse Z."
    de: "Kristallisierte Z-Kraft, die Feen-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nHada en movimientos Z."
    ko: "페어리타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将妖精属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把妖精屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
fairium_z:held:
  names:
    jp_kana: フェアリーＺ
    jp_kanji: フェアリーＺ
