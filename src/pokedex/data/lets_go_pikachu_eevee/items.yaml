scope_lens:
  names:
    jp_kana: ピントレンズ
    jp_kanji: ピントレンズ
    en: Scope Lens
    fr: Lentilscope
    it: Mirino
    de: Scope-Linse
    es: Periscopio
    ko: 초점렌즈
    zh_simp: 焦点镜
    zh_trad: 焦點鏡
  descriptions:
    jp_kana: "じゃくてんが　みえる　レンズ。\nもたせた　ポケモンの　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "弱点が　みえる　レンズ。\n持たせた　ポケモンの　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by a Pokémon. It’s a lens for\nscoping out weak points. It boosts the holder’s\ncritical-hit ratio."
    fr: "Objet à tenir. Une lentille qui augmente le taux\nde critique du porteur."
    it: "Strumento da dare a un Pokémon.\nLente che aumenta la probabilità di sferrare\nbrutti colpi."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es erhöht die Volltrefferquote."
    es: "Su lente aumenta la probabilidad que tiene el Pokémon\nque lo lleva de conseguir un golpe crítico."
    ko: "약점이 보이는 렌즈.\n지니게 한 포켓몬의 기술이\n급소에 맞기 쉬워진다."
    zh_simp: "能看见弱点的镜片。\n携带它的宝可梦的招式\n会变得容易击中要害。"
    zh_trad: "能看見弱點的鏡片。\n攜帶它的寶可夢的招式\n會變得容易擊中要害。"
scyther_candy:
  names:
    jp_kana: ストライクのアメ
    jp_kanji: ストライクのアメ
