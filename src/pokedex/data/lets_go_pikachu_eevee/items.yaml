    fr: Bonbon Salamèche
    it: Caramella Charmander
    de: Glumanda-Bonbon
    es: Caramelo Charmander
    ko: 파이리의사탕
    zh_simp: 小火龙的糖果
    zh_trad: 小火龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
