    de: "Hebt den Initiative-Wert eines Pokémon im Kampf\nstark an. Die Wirkung endet mit dem Austausch\ndes Pokémon."
    es: "Aumenta bastante la Velocidad en combate.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 스피드를\n상당히 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
    zh_simp: "能大量提高战斗中\n宝可梦的速度。\n离场后，效果便会消失。"
    zh_trad: "能大幅提高戰鬥中\n寶可夢的速度。\n離場後，效果便會復原。"
x_speed_6:
  names:
    jp_kana: スピーダー６
    jp_kanji: スピーダー６
    en: X Speed 6
    fr: Vitesse 6
    it: Velocità X-6
    de: X-Tempo6
    es: Velocidad X 6
    ko: 스피드업6
    zh_simp: 速度强化６
    zh_trad: 速度強化６
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nすばやさを　ものすごく　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n素早さを　ものすごく　あげる。\nひっこめると　元に　戻る。"
    en: "It raises the Speed stat of a Pokémon in battle\nimmensely. It wears off if the Pokémon\nis withdrawn."
    fr: "Augmente fortement la Vitesse pendant un combat.\nL’effet s’estompe si le Pokémon est retiré."
    it: "Aumenta incredibilmente la Velocità di un\nPokémon in una lotta. L’effetto svanisce\nse il Pokémon è sostituito."
    de: "Hebt den Initiative-Wert eines Pokémon im Kampf\nenorm an. Die Wirkung endet mit dem Austausch\ndes Pokémon."
    es: "Aumenta mucho la Velocidad en combate.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 스피드를\n엄청나게 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
    zh_simp: "能极大提高战斗中\n宝可梦的速度。\n离场后，效果便会消失。"
    zh_trad: "能極大幅提高戰鬥中\n寶可夢的速度。\n離場後，效果便會復原。"
xtransceiver:female:
  names:
    jp_kana: ライブキャスター
    jp_kanji: ライブキャスター
    en: Xtransceiver
    fr: Vokit
    it: Interpoké
    de: Viso-Caster
    es: Videomisor
    ko: 라이브캐스터
    zh_simp: 即时通讯器
    zh_trad: 即時通訊器
  descriptions:
    jp_kana: "さいだい　４にんで　つうわができる\nテレビカメラきのうつきの\nさいしんがた　トランシーバー。"
    jp_kanji: "最大４人で　通話ができる\nテレビカメラ機能つきの\n最新型トランシーバー。"
    en: "A high-tech transceiver with a camera function.\nIt allows up to four-way calls."
    fr: "Un transmetteur high-tech permettant à quatre\npersonnes de communiquer par le son et l’image."
    it: "Ricetrasmittente all’avanguardia che permette\ndi fare videochiamate con un gruppo massimo\ndi quattro persone."
    de: "Ein hochmodernes Gerät, mit dem bis zu vier\nPersonen miteinander kommunizieren können.\nEs ermöglicht sogar Video-Chat!"
    es: "Comunicador de alta tecnología con cámara que\npermite hablar a cuatro personas a la vez."
    ko: "영상 통화 기능이 내장된\n최신식 무전기.\n최대 4명이 동시에 통화할 수 있다."
    zh_simp: "带摄像头功能，\n最多能让４人进行通话的\n最新型对讲机。"
    zh_trad: "附影像鏡頭功能，\n最多能讓４人進行通話的\n最新型對講機。"
xtransceiver:male:
  names:
    jp_kana: ライブキャスター
    jp_kanji: ライブキャスター
    en: Xtransceiver
    fr: Vokit
    it: Interpoké
    de: Viso-Caster
    es: Videomisor
    ko: 라이브캐스터
    zh_simp: 即时通讯器
    zh_trad: 即時通訊器
  descriptions:
    jp_kana: "さいだい　４にんで　つうわができる\nテレビカメラきのうつきの\nさいしんがた　トランシーバー。"
    jp_kanji: "最大４人で　通話ができる\nテレビカメラ機能つきの\n最新型トランシーバー。"
    en: "A high-tech transceiver with a camera function.\nIt allows up to four-way calls."
    fr: "Un transmetteur high-tech permettant à quatre\npersonnes de communiquer par le son et l’image."
    it: "Ricetrasmittente all’avanguardia che permette\ndi fare videochiamate con un gruppo massimo\ndi quattro persone."
    de: "Ein hochmodernes Gerät, mit dem bis zu vier\nPersonen miteinander kommunizieren können.\nEs ermöglicht sogar Video-Chat!"
    es: "Comunicador de alta tecnología con cámara que\npermite hablar a cuatro personas a la vez."
    ko: "영상 통화 기능이 내장된\n최신식 무전기.\n최대 4명이 동시에 통화할 수 있다."
    zh_simp: "带摄像头功能，\n最多能让４人进行通话的\n最新型对讲机。"
    zh_trad: "附影像鏡頭功能，\n最多能讓４人進行通話的\n最新型對講機。"
yache_berry:
  names:
    jp_kana: ヤチェのみ
    jp_kanji: ヤチェのみ
    en: Yache Berry
    fr: Baie Nanone
    it: Baccamoya
    de: Kiroyabeere
    es: Baya Rimoya
    ko: 플카열매
    zh_simp: 番荔果
    zh_trad: 番荔果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　こおり　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　こおり技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nIce-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Glace."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Ghiaccio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Eis."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Hielo de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 얼음 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的冰属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的冰屬性招式\n攻擊時，能使其威力減弱。"
yellow_apricorn:
  names:
    jp_kana: きぼんぐり
    jp_kanji: きぼんぐり
    en: Yellow Apricorn
    fr: Noigrume Jaune
    it: Ghicocca Gialla
    de: Aprikoko Glb
    es: Bonguri Amarillo
    ko: 노랑규토리
    zh_simp: 黄球果
    zh_trad: 黃球果
  descriptions:
    jp_kana: "きいろの　ぼんぐり。\nさわやかな　かおりが　する。"
    jp_kanji: "きいろの　ぼんぐり。\nさわやかな　かおりが　する。"
    en: A yellow Apricorn. It has an invigorating scent.
    fr: "Un Noigrume de couleur jaune.\nIl dégage un arôme délicat."
    it: "Una Ghicocca di colore giallo.\nEmana un profumo delicato."
    de: Eine gelbe Aprikoko. Sie riecht ein wenig unreif.
    es: Bonguri de color amarillo y aroma refrescante.
    ko: "노란색의 규토리.\n산뜻한 향기가 난다."
    zh_simp: "黄色的球果。\n有种清爽的香味。"
    zh_trad: "黃色的球果。\n有種清爽的香味。"
yellow_flute:
  names:
    jp_kana: きいろビードロ
    jp_kanji: きいろビードロ
    en: Yellow Flute
    fr: Flûte Jaune
    it: Flauto Giallo
    de: Gelbe Flöte
    es: Flauta Amarilla
    ko: 노랑비드로
    zh_simp: 黄色玻璃哨
    zh_trad: 黃色玻璃哨
  descriptions:
    jp_kana: "きいろのガラスで　できた　ふえ。\nこんらん　じょうたいを\nかいふくする。"
    jp_kanji: "黄色のガラスで　できた　笛。\n混乱状態を　回復する。"
    en: "A flute made from yellow glass. It snaps Pokémon\nout of confusion."
    fr: "Un jouet en forme de flûte en verre jaune.\nSoigne la confusion."
    it: "Flauto fatto di vetro giallo. Ha il potere di guarire\ndalla confusione."
    de: "Eine Spielzeugflöte aus gelbem Glas.\nHeilt Verwirrung."
    es: "Una flauta de cristal amarillo cuyas notas sacan a\nun Pokémon de la confusión."
    ko: "노란 유리로 만들어진 피리.\n혼란 상태를\n회복한다."
    zh_simp: "以黄色玻璃制成的哨子。\n可以治愈混乱状态。"
    zh_trad: "以黃色玻璃製成的笛子。\n可以治癒混亂狀態。"
yellow_nectar:
  names:
    jp_kana: やまぶきのミツ
    jp_kanji: やまぶきのミツ
    en: Yellow Nectar
    fr: Nectar Jaune
    it: Nettare giallo
    de: Gelber Nektar
    es: Néctar Amarillo
    ko: 진노랑꿀
    zh_simp: 金黄色花蜜
    zh_trad: 金黃色花蜜
  descriptions:
    jp_kana: "メレメレのはなぞので　てにいれた\nはなのミツ。　とくていの　ポケモンの\nすがたを　かえる。"
    jp_kanji: "メレメレの花園で　手に入れた\n花のミツ。　特定の　ポケモンの\n姿を　変える。"
    en: "A flower nectar obtained at Melemele Meadow.\nIt changes the form of certain species of Pokémon."
    fr: "Un nectar obtenu au Jardin de Mele-Mele.\nPermet à un certain Pokémon de changer d’apparence."
    it: "Nettare ottenuto dai fiori del Prato Mele Mele.\nFa cambiare forma a una determinata\nspecie di Pokémon."
    de: "Blütennektar vom Mele-Mele-Blumenmeer.\nEin bestimmtes Pokémon kann damit seine Form\nändern."
    es: "Néctar de ciertas flores de los Jardines de Melemele,\ncapaz de hacer cambiar de forma a una determinada\nespecie de Pokémon."
    ko: "멜레멜레 화원에서 손에 넣은\n꽃의 꿀. 특정 포켓몬의\n모습을 바꾼다."
    zh_simp: "在美乐美乐花园里获得的花蜜。\n可以改变特定宝可梦的样子。"
    zh_trad: "在美樂美樂花園裡獲得的花蜜。\n可以改變特定寶可夢的樣子。"
yellow_petal:
  names:
    jp_kana: きいろのはなびら
    jp_kanji: きいろのはなびら
    en: Yellow Petal
    fr: Pétale Jaune
    it: Petalo giallo
    de: Gelbes Blatt
    es: Pétalo Amarillo
    ko: 노랑꽃잎
    zh_simp: 黄色花瓣
    zh_trad: 黃色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　マーマネから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　マーマネから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Sophocles\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Chrys vous a remis lors de\nl’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Chrys durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Chrys erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Chris durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 마마네에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从马玛内那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從馬瑪內那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
yellow_scarf:
  names:
    jp_kana: きいろのバンダナ
    jp_kanji: きいろのバンダナ
    en: Yellow Scarf
    fr: Foulard Jaune
    it: Fascia Gialla
    de: Gelber Schal
    es: Pañuelo Amarillo
    ko: 노랑밴드
    zh_simp: 黄色头巾
    zh_trad: 黃色頭巾
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    en: "An item to be held by a Pokémon. During a contest,\nit raises the Tough aspect of the Pokémon\nholding it."
    fr: "Objet à tenir. Augmente la Robustesse d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Grinta” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Stärke ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la dureza en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n강인하게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加强壮。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加強壯。"
yellow_shard:
  names:
    jp_kana: きいろいかけら
    jp_kanji: きいろいかけら
    en: Yellow Shard
    fr: Tesson Jaune
    it: Coccio Giallo
    de: Gelbstück
    es: Parte Amarilla
    ko: 노랑조각
    zh_simp: 黄色碎片
    zh_trad: 黃色碎片
  descriptions:
    jp_kana: "きいろい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "黄色い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small yellow shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson jaune.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio giallo che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine gelbe Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento amarillo. Parece formar\nparte de algún tipo de herramienta antigua."
    ko: "노란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "黄色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "黃色的小碎片。\n好像是以前製作的\n某道具的一部分。"
z_power_ring:
  names:
    jp_kana: Ｚパワーリング
    jp_kanji: Ｚパワーリング
    en: Z-Power Ring
    fr: Super Bracelet Z
    it: Supercerchio Z
    de: Z-Kraftring
    es: Superpulsera Z
    ko: Z파워링
    zh_simp: Ｚ强力手环
    zh_trad: Ｚ強力手環
  descriptions:
    jp_kana: "トレーナーの　きりょく　たいりょくを\nつかって　ポケモンが　Ｚパワーを\nはなてるようにする　ふしぎなうでわ。"
    jp_kanji: "トレーナーの　気力　体力を\n使って　ポケモンが　Ｚパワーを\n放てるようにする　不思議な腕輪。"
    en: "A mysterious ring that enables Pokémon to use\nZ-Power. It requires both the willpower and the\nphysical power of the Trainer wearing it."
    fr: "Un bracelet mystérieux utilisant la force vitale\ndu Dresseur pour permettre à ses Pokémon d’utiliser\nla Force Z."
    it: "Bracciale misterioso che trasmette le energie\nmentali e fisiche dell’Allenatore ai suoi Pokémon,\npermettendo loro di sfruttare il Potere Z."
    de: "Ein wundersames Armband, das die geistige und\nkörperliche Kraft eines Trainers nutzt, um bei\neinem Pokémon die Z-Kraft freizusetzen."
    es: "Misteriosa pulsera que transmite la fuerza física y\nmental del Entrenador a sus Pokémon, lo que les\npermite usar movimientos Z."
    ko: "트레이너의 기력과 체력을\n사용해서 포켓몬이 Z파워를\n발산할 수 있게 하는 신비한 팔찌."
    zh_simp: "通过使用训练家的\n气力和体力来让宝可梦\n释放出Ｚ力量的神奇手环。"
    zh_trad: "用訓練家的精力和體力\n來讓寶可夢釋放出\nＺ力量的神奇手環。"
z_ring:
  names:
    jp_kana: Ｚリング
    jp_kanji: Ｚリング
    en: Z-Ring
    fr: Bracelet Z
    it: Cerchio Z
    de: Z-Ring
    es: Pulsera Z
    ko: Z링
    zh_simp: Ｚ手环
    zh_trad: Ｚ手環
  descriptions:
    jp_kana: "トレーナーの　きりょく　たいりょくを\nつかって　ポケモンが　Ｚパワーを\nはなてるようにする　ふしぎなうでわ。"
    jp_kanji: "トレーナーの　気力　体力を\n使って　ポケモンが　Ｚパワーを\n放てるようにする　不思議な腕輪。"
    en: "A mysterious ring that enables Pokémon to use\nZ-Power. It requires both the willpower and\nthe physical power of the Trainer wearing it."
    fr: "Un bracelet mystérieux utilisant la force vitale\ndu Dresseur pour permettre à ses Pokémon d’utiliser\nla Force Z."
    it: "Bracciale misterioso che trasmette le energie\nmentali e fisiche dell’Allenatore ai suoi Pokémon,\npermettendo loro di sfruttare il Potere Z."
    de: "Ein wundersames Armband, das die geistige und\nkörperliche Kraft eines Trainers nutzt, um bei\neinem Pokémon die Z-Kraft freizusetzen."
    es: "Misteriosa pulsera que transmite la fuerza física y\nmental del Entrenador a sus Pokémon, lo que les\npermite usar movimientos Z."
    ko: "트레이너의 기력과 체력을\n사용해서 포켓몬이 Z파워를\n발산할 수 있게 하는 신비한 팔찌."
    zh_simp: "通过使用训练家的\n气力和体力来让宝可梦\n释放出Ｚ力量的神奇手环。"
    zh_trad: "用訓練家的精力和體力\n來讓寶可夢釋放出\nＺ力量的神奇手環。"
zap_plate:
  names:
    jp_kana: いかずちプレート
    jp_kanji: いかずちプレート
    en: Zap Plate
    fr: Plaque Volt
    it: Lastrasaetta
    de: Blitztafel
    es: Tabla Trueno
    ko: 우뢰플레이트
    zh_simp: 雷电石板
    zh_trad: 雷電石板
  descriptions:
    jp_kana: "でんきの　タイプの　せきばん。\nもたせると　でんきタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　石盤。\n持たせると　でんきタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon. It’s a stone tablet\nthat boosts the power of Electric-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Elettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Elektro."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Eléctrico. Debe llevarla un Pokémon."
    ko: "전기타입의 석판.\n지니게 하면 전기타입\n기술의 위력이 강해진다."
    zh_simp: "电属性的石板。\n携带后，电属性的\n招式威力就会增强。"
    zh_trad: "電屬性的石板。\n攜帶後，電屬性的\n招式威力就會增強。"
zapdos_candy:
  names:
    jp_kana: サンダーのアメ
    jp_kanji: サンダーのアメ
    en: Zapdos Candy
    fr: Bonbon Électhor
    it: Caramella Zapdos
    de: Zapdos-Bonbon
    es: Caramelo Zapdos
    ko: 썬더의사탕
    zh_simp: 闪电鸟的糖果
    zh_trad: 閃電鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
zinc:
  names:
    jp_kana: キトサン
    jp_kanji: キトサン
    en: Zinc
    fr: Zinc
    it: Zinco
    de: Zink
    es: Zinc
    ko: 키토산
    zh_simp: 特防增强剂
    zh_trad: 特防增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくぼうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the base Sp. Def stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente la Défense\nSpéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Difesa Speciale."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Verteidigungs-Basiswert eines\nPokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Defensa Especial\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수방어\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n特防的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n特防的基礎點數。"
zoom_lens:
  names:
    jp_kana: フォーカスレンズ
    jp_kanji: フォーカスレンズ
    en: Zoom Lens
    fr: Lentille Zoom
    it: Zoomlente
    de: Zoomlinse
    es: Telescopio
    ko: 포커스렌즈
    zh_simp: 对焦镜
    zh_trad: 對焦鏡
  descriptions:
    jp_kana: "もたせた　ポケモンが　あいてよりも\nこうどうするのが　おそいとき\nわざが　めいちゅう　しやすくなる。"
    jp_kanji: "持たせた　ポケモンが　相手よりも\n行動するのが　遅いとき\n技が　命中しやすくなる。"
    en: "An item to be held by a Pokémon. If the holder\nmoves after its target moves, its accuracy will\nbe boosted."
    fr: "Objet à tenir. Augmente la Précision du porteur\ns’il attaque après l’ennemi."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha attacca dopo il nemico, la sua\nprecisione aumenta."
    de: "Ein Item zum Tragen. Agiert das Ziel zuerst,\nerhöht sich die Genauigkeit des Trägers."
    es: "Debe llevarlo un Pokémon. Si se mueve después\ndel enemigo, aumenta la Precisión del Pokémon."
    ko: "지니게 한 포켓몬이 상대보다도\n행동하는 것이 늦을 때\n기술이 명중하기 쉬워진다."
    zh_simp: "当携带它的宝可梦比\n对手行动迟缓时，\n招式会变得容易命中。"
    zh_trad: "當攜帶它的寶可夢比\n對手行動緩慢時，\n招式會變得容易命中。"
zubat_candy:
  names:
