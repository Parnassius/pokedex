    jp_kana: "フェアリータイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "フェアリータイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Fairy-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Fée. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Folletto in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Fee.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nHada. Permite cambiar de tipo a cierto Pokémon."
    ko: "페어리타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有妖精属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有妖精屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
farfetchd_candy:
  names:
    jp_kana: カモネギのアメ
    jp_kanji: カモネギのアメ
