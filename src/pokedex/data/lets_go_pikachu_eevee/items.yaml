sea_incense:
  names:
    jp_kana: うしおのおこう
    jp_kanji: うしおのおこう
    en: Sea Incense
    fr: Encens Mer
    it: Marearoma
    de: Seerauch
    es: Incienso Marino
    ko: 바닷물향로
    zh_simp: 海潮薰香
    zh_trad: 海潮薰香
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This incense has\na curious aroma that boosts the power of\nWater-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Acqua."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia los movimientos\nde tipo Agua. Debe llevarlo un Pokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
    zh_simp: "有着神奇香气的薰香。\n携带后，水属性的\n招式威力就会提高。"
    zh_trad: "有著神奇香氣的薰香。\n攜帶後，水屬性的\n招式威力就會提高。"
secret_key:cinnabar_island_gym:
  names:
    jp_kana: ひみつのカギ
    jp_kanji: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave segreta
    de: Geheimschlüssel
    es: Llave Secreta
    ko: 비밀의열쇠
    zh_simp: 秘密钥匙
    zh_trad: 秘密鑰匙
  descriptions:
    jp_kana: "グレンじま　ポケモンジムの\nいりぐちを　あける　カギ。\nあかく　そうしょく　してある。"
    jp_kanji: "グレン島　ポケモンジムの\n入り口を　開ける　カギ。\n赤く　装飾　してある。"
    en: "The key that unlocks the front door of\nthe Pokémon Gym on Cinnabar Island.\nIt has a red decoration."
    fr: "La clé de la porte de l’Arène de Cramois’Île.\nElle est décorée en rouge."
    it: "Chiave della Palestra dell’Isola Cannella.\nÈ ornata da graziose decorazioni rosse."
    de: "Der Schlüssel zur Arena der Zinnoberinsel.\nEr ist mit einer roten Verzierung versehen."
    es: "Llave que abre las puertas del Gimnasio de Isla Canela.\nEn su diseño predomina el color rojo."
    ko: "홍련섬 포켓몬체육관의\n입구를 여는 열쇠.\n빨갛게 장식되어 있다."
    zh_simp: "能打开红莲岛上那座\n宝可梦道馆的钥匙。\n周身都以红色装饰。"
    zh_trad: "能打開紅蓮島上的\n寶可夢道館入口的鑰匙。\n上面有紅色的裝飾。"
secret_key:rotoms_room:
  names:
    jp_kana: ひみつのカギ
    jp_kanji: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave segreta
    de: Geheimschlüssel
    es: Llave Secreta
    ko: 비밀의열쇠
    zh_simp: 秘密钥匙
    zh_trad: 秘密鑰匙
  descriptions:
    jp_kana: "きまった　ばしょで　つかうことで\nとくしゅな　でんきしんごうを　だして\nとびらを　あける　ハイテクな　カギ。"
    jp_kanji: "決まった　場所で　使うことで\n特殊な　電気信号を　だして\n扉を　開ける　ハイテクな　カギ。"
    en: "A high-tech key that has to be used at a specific\nlocation. It emits a special electronic signal to open\na door."
    fr: "Une clé destinée à une serrure très complexe.\nOuvre une porte en transmettant un signal électrique."
    it: "Una sofisticata chiave da usare in un determinato\nluogo. Emette un impulso elettrico speciale che\napre una porta."
    de: "Ein besonderer Schlüssel, der an einem speziellen\nOrt Türen durch ein elektrisches Signal öffnet."
    es: "Una llave de alta tecnología que debe usarse en\nun lugar concreto. Emite una señal eléctrica que\nabre una puerta."
    ko: "정해진 장소에서 쓰는 것으로\n특수한 전기 신호를 내어\n문을 여는 첨단기술의 열쇠."
    zh_simp: "在特定的地方使用，\n就会发出特殊电信号\n来开门的高科技钥匙。"
    zh_trad: "在特定的地方使用，\n就會發出特殊電子訊號\n來開門的高科技鑰匙。"
secret_medicine:
  names:
    jp_kana: ひでんのくすり
    jp_kanji: ひでんのくすり
    en: Secret Potion
    fr: Potion Secrète
    it: Pozione Segreta
    de: Geheimtrank
    es: Poción Secreta
    ko: 비전신약
    zh_simp: 秘传之药
    zh_trad: 秘傳之藥
  descriptions:
    jp_kana: "タンバシティの　くすりやで　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    jp_kanji: "タンバシティの　薬屋で　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    en: "A fantastic medicine dispensed by the pharmacy in\nCianwood City. It fully heals a Pokémon of\nany ailment."
    fr: "Un médicament génial vendu à la pharmacie d’Irisia.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Rimedio fantastico distribuito dalla farmacia\na Fiorlisopoli. Cura i problemi di stato\ndi qualunque Pokémon."
    de: "Eine fantastische Medizin aus Anemonia City.\nHeilt und kuriert ein Pokémon vollständig."
    es: "Fantástico medicamento vendido en la farmacia\nde Ciudad Orquídea. Cura completamente a un\nPokémon."
    ko: "진청시티의 약국에서 받은\n어떤 포켓몬이라도 금방\n건강해지는 대단한 약."
    zh_simp: "在湛蓝市的药店里得到的，\n能让任何宝可梦立刻变得\n精力充沛的高效药。"
    zh_trad: "在湛藍市的藥店裡得到的，\n不管什麼寶可夢都能立刻\n變得精力充沛的高效藥。"
