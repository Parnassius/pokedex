ability_capsule:
  names:
    jp_kana: とくせいカプセル
    jp_kanji: とくせいカプセル
    en: Ability Capsule
    fr: Pilule Talent
    it: Capsula abilità
    de: Fähigk.-Kapsel
    es: Cáps. Habilidad
    ko: 특성캡슐
    zh_simp: 特性胶囊
    zh_trad: 特性膠囊
  descriptions:
    jp_kana: "２しゅるいの　とくせいを　もつ\nポケモンに　つかうと　いまとはちがう\nとくせいに　かえられる　カプセル。"
    jp_kanji: "２種類の　特性を　持つ\nポケモンに　使うと　今とは違う\n特性に　変えられる　カプセル。"
    en: "A capsule that allows a Pokémon with two Abilities\nto switch between these Abilities when it is used."
    fr: "Une capsule permettant à un Pokémon pouvant avoir\ndeux talents de passer de l’un à l’autre."
    it: "Se usata su un Pokémon che può avere due abilità,\nquesta capsula permette di cambiare quella attiva."
    de: "Bei Anwendung auf ein Pokémon, das zwei\nverschiedene Fähigkeiten haben kann, wird seine\naktuelle Fähigkeit mit der anderen ausgewechselt."
    es: "Cápsula que les permite cambiar de habilidad a\nlos Pokémon que poseen dos."
    ko: "2종류의 특성을 가진\n포켓몬에게 사용하면 지금과는 다른\n특성으로 바꿀 수 있는 캡슐."
    zh_simp: "如果用于有着２种特性的宝可梦，\n就能令其现有特性变为另一种的胶囊。"
    zh_trad: "如果用於有著２種特性的\n寶可夢，就能使其特性\n變為另外一種的膠囊。"
ability_urge:
  names:
    jp_kana: スキルコール
    jp_kanji: スキルコール
    en: Ability Urge
    fr: Appel Talent
    it: Chiamabilità
    de: Fähigk.-Appell
    es: Habilitador
    ko: 스킬콜
    zh_simp: ？？？
    zh_trad: ？？？
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nとくせいを　はつどう　させる。"
    jp_kanji: "使うと　味方の　ポケモンの\n特性を　発動させる。"
    en: "When used, it activates the Ability of an\nally Pokémon."
    fr: Déclenche le talent d’un Pokémon de l’équipe.
    it: "Se usato su un Pokémon della squadra, ne attiva\nl’abilità."
    de: "Aktiviert bei Gebrauch die Fähigkeit des\nMitstreiters."
    es: "Al usarlo, activa la habilidad de un Pokémon de\ntu equipo."
    ko: "사용하면 같은 편 포켓몬의\n특성을 발동시킨다."
    zh_simp: "使用后，能令我方\n宝可梦的特性启动。"
    zh_trad: "使用後，能使我方\n寶可夢的特性發動。"
abomasite:
  names:
    jp_kana: ユキノオナイト
    jp_kanji: ユキノオナイト
    en: Abomasite
    fr: Blizzarite
    it: Abomasnowite
    de: Rexblisarnit
    es: Abomasnowita
    ko: 눈설왕나이트
    zh_simp: 暴雪王进化石
    zh_trad: 暴雪王進化石
  descriptions:
    jp_kana: "ユキノオーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ユキノオーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Abomasnow hold it, and this stone will enable\nit to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Blizzaroi, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Abomasnow, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Rexblisar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Abomasnow en combate."
    ko: "눈설왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让暴雪王携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓暴雪王攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
abra_candy:
  names:
    jp_kana: ケーシィのアメ
    jp_kanji: ケーシィのアメ
    en: Abra Candy
    fr: Bonbon Abra
    it: Caramella Abra
    de: Abra-Bonbon
    es: Caramelo Abra
    ko: 캐이시의사탕
    zh_simp: 凯西的糖果
    zh_trad: 凱西的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
absolite:
  names:
    jp_kana: アブソルナイト
    jp_kanji: アブソルナイト
    en: Absolite
    fr: Absolite
    it: Absolite
    de: Absolnit
    es: Absolita
    ko: 앱솔나이트
    zh_simp: 阿勃梭鲁进化石
    zh_trad: 阿勃梭魯進化石
  descriptions:
    jp_kana: "アブソルに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "アブソルに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Absol hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Absol, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Absol, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Absol getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Absol en combate."
    ko: "앱솔에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让阿勃梭鲁携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓阿勃梭魯攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
absorb_bulb:
  names:
    jp_kana: きゅうこん
    jp_kanji: きゅうこん
    en: Absorb Bulb
    fr: Bulbe
    it: Bulbo
    de: Knolle
    es: Tubérculo
    ko: 구근
    zh_simp: 球根
    zh_trad: 球根
  descriptions:
    jp_kana: "つかいすての　きゅうこん。\nもたせて　みずの　わざを　うけると\nとくこうが　あがる。"
    jp_kanji: "使い捨ての　きゅうこん。\n持たせて　みずの　技を　受けると\n特攻が　あがる。"
    en: "An item to be held by a Pokémon. It boosts Sp. Atk\nif the holder is hit with a Water-type attack. It can only\nbe used once."
    fr: "Un bulbe jetable.\nTenu, il augmente l’Attaque Spéciale lorsque\nle Pokémon subit une attaque de type Eau."
    it: "Bulbo monouso. Se il Pokémon che ha questo\nstrumento subisce una mossa di tipo Acqua,\nil suo Attacco Speciale aumenta."
    de: "Eine einmalig einsetzbare Knolle. Erhöht den\nSpezial-Angriff des Trägers, wenn ihn eine\nWasser-Attacke trifft."
    es: "Raíz de usar y tirar que sube el Ataque Especial\ncuando se recibe un ataque de tipo Agua."
    ko: "단 한 번 쓰면 없어지는 구근.\n지니게 하고 물 기술을 받으면\n특수공격이 올라간다."
    zh_simp: "一次性使用的球根。\n携带它的宝可梦如果受到水属性\n招式的攻击，特攻就会提高。"
    zh_trad: "只能使用一次的球根。\n攜帶它的寶可夢如果受到水屬性\n招式的攻擊，特攻就會提高。"
acro_bike:
  names:
    jp_kana: ダートじてんしゃ
    jp_kanji: ダートじてんしゃ
    en: Acro Bike
    fr: Vélo Cross
    it: Bici da cross
    de: Kunstrad
    es: Bici Acrobática
    ko: 더트자전거
    zh_simp: 越野自行车
    zh_trad: 越野自行車
  descriptions:
    jp_kana: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　じてんしゃ。"
    jp_kanji: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　自転車。"
    en: "This folding Bike allows you to perform actions\nsuch as wheelies and bunny hops."
    fr: "Un vélo pliable qui permet de bondir et de rouler\nsur la roue arrière."
    it: "Bici pieghevole con cui si possono fare acrobazie\ncome salti o impennate."
    de: "Ein Klapprad, mit dem du Kunststücke wie Sprünge\noder Wheelies ausführen kannst."
    es: "Bicicleta plegable capaz de correr sobre una sola rueda,\nrealizar saltos y otras acrobacias."
    ko: "점프나 윌리 액션을\n할 수 있는\n접이식 자전거다."
    zh_simp: "能做出跳跃或抬前轮动作的\n折叠式自行车。"
    zh_trad: "能做出跳躍或抬前輪動作的\n折疊式自行車。"
adamant_orb:
  names:
    jp_kana: こんごうだま
    jp_kanji: こんごうだま
    en: Adamant Orb
    fr: Orbe Adamant
    it: Adamasfera
    de: Adamant-Orb
    es: Diamansfera
    ko: 금강옥
    zh_simp: 金刚宝珠
    zh_trad: 金剛寶珠
  descriptions:
    jp_kana: "ディアルガに　もたせると　ドラゴンと\nはがねタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ディアルガに　持たせると　ドラゴンと\nはがねタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A brightly gleaming orb to be held by Dialga.\nIt boosts the power of Dragon- and Steel-type\nmoves when it is held."
    fr: "Un orbe très brillant destiné à Dialga.\nAugmente la puissance des capacités de type Dragon\net Acier."
    it: "Sfera molto luminosa da dare a Dialga.\nPotenzia le mosse di tipo Drago e Acciaio."
    de: "Ein hell leuchtender Orb. Verstärkt Attacken vom\nTyp Drache und Stahl, wenn Dialga ihn trägt."
    es: "Una esfera brillante que potencia los movimientos\nde tipo Acero y Dragón. Debe llevarla Dialga."
    ko: "디아루가에게 지니게 하면 드래곤과\n강철타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
    zh_simp: "让帝牙卢卡携带的话，\n龙和钢属性的招式威力就会提高。\n散发着光辉的宝珠。"
    zh_trad: "讓帝牙盧卡攜帶的話，\n龍和鋼屬性的招式威力就會提高。\n散發著光輝的寶珠。"
adrenaline_orb:
  names:
    jp_kana: ビビリだま
    jp_kanji: ビビリだま
    en: Adrenaline Orb
    fr: Orbe Frousse
    it: Fifasfera
    de: Zitterorb
    es: Nerviosfera
    ko: 주눅구슬
    zh_simp: 胆怯球
    zh_trad: 膽怯球
  descriptions:
    jp_kana: "つかうと　なかまを　なんどでも　よぶ。\nもたせると　いかくを　うけたとき\nすばやさが　あがる。　つかうとなくなる。"
    jp_kanji: "使うと　仲間を　何度でも　呼ぶ。\n持たせると　いかくを　受けた時\nすばやさが　上がる。　使うとなくなる。"
    en: "Using it makes wild Pokémon call for help a number\nof times. If held by a Pokémon, it boosts Speed\nwhen intimidated. It can be used only once."
    fr: "Utilisé, force un Pokémon à appeler du renfort plusieurs\nfois, et disparaît. Équipé, augmente la Vitesse\ndu porteur s’il est affecté par Intimidation."
    it: "Data a un Pokémon, aumenta la Velocità se subisce\nPrepotenza. Se usata, fa sì che i Pokémon selvatici\nchiamino rinforzi a oltranza, quindi sparisce."
    de: "Einweg-Item, durch das Pokémon mehrfach um Hilfe\nrufen. Getragen erhöht es bei Pokémon, die unter\ndem Einfluss von Bedroher stehen, die Initiative."
    es: "Aumenta la Velocidad del portador al sufrir\nIntimidación. Si se utiliza, hará más probable que el\nPokémon rival pida ayuda. Desaparece tras usarla."
    ko: "사용하면 동료를 몇 번이고 부른다.\n지니게 하면 위협을 받았을 때\n스피드가 올라간다. 사용하면 없어진다."
    zh_simp: "使用后可以一直呼唤伙伴，\n但使用后会消失。\n携带后，在受到威吓时速度会提高。"
    zh_trad: "使用後對手將不斷呼喚夥伴，\n但使用後就會消失。\n攜帶後，受到威嚇時速度會提高。"
adventure_guide:
  names:
    jp_kana: たんけんこころえ
    jp_kanji: たんけんこころえ
    en: Adventure Rules
    fr: ABC Aventure
    it: Guida Avventura
    de: Abenteuerfibel
    es: Guía de Máximas
    ko: 탐험수칙
    zh_simp: 探险心得
    zh_trad: 探險心得
  descriptions:
    jp_kana: "トレーナーが　たびを　するときの\nポイントが　まとめられている\nともだち　てづくりの　ガイドブック。"
    jp_kanji: "トレーナーが　旅を　するときの\nポイントが　まとめられている\n友達　手作りの　ガイドブック。"
    en: "This book contains all the points a new Trainer\nneeds to know on a journey. It was handmade by\na kind friend."
    fr: "Un manuel détaillant le savoir indispensable\nà un Dresseur partant à l’aventure.\nÉcrit par une connaissance."
    it: "Guida che contiene consigli utili per gli Allenatori\nin viaggio.\nÈ stata scritta da qualcuno di tua conoscenza."
    de: "Dieses von einem deiner Freunde erstellte Buch\nenthält nützliche Informationen zu allen Themen,\ndie für einen Trainer auf Reisen von Belang sind."
    es: "Guía redactada por uno de tus amigos con los puntos\nesenciales que todo Entrenador debería tener en cuenta\ndurante su viaje por Kalos."
    ko: "트레이너가 여행할 때의\n포인트가 정리되어 있는\n친구가 직접 만든 가이드북."
    zh_simp: "朋友亲手制作的指南手册。\n里面汇总了训练家在旅行时\n所需注意的各种事项。"
    zh_trad: "朋友親手製作的指南手冊。\n裡面整合了訓練家旅行時的\n注意事項。"
aerodactyl_candy:
  names:
    jp_kana: プテラのアメ
    jp_kanji: プテラのアメ
    en: Aerodactyl Candy
    fr: Bonbon Ptéra
    it: Caramella Aerodactyl
    de: Aerodactyl-Bonbon
    es: Caramelo Aerodactyl
    ko: 프테라의사탕
    zh_simp: 化石翼龙的糖果
    zh_trad: 化石翼龍的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
aerodactylite:
  names:
    jp_kana: プテラナイト
    jp_kanji: プテラナイト
    en: Aerodactylite
    fr: Ptéraïte
    it: Aerodactylite
    de: Aerodactylonit
    es: Aerodactylita
    ko: 프테라나이트
    zh_simp: 化石翼龙进化石
    zh_trad: 化石翼龍進化石
  descriptions:
    jp_kana: "たたかいのとき　プテラを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　プテラを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Aerodactyl to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Ptéra de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette ad Aerodactyl di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Aerodactyl, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Aerodactyl en combate."
    ko: "배틀할 때 프테라를\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让化石翼龙\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓化石翼龍進行超級進化的\n一種神奇超級石。"
aggronite:
  names:
    jp_kana: ボスゴドラナイト
    jp_kanji: ボスゴドラナイト
    en: Aggronite
    fr: Galekingite
    it: Aggronite
    de: Stollossnit
    es: Aggronita
    ko: 보스로라나이트
    zh_simp: 波士可多拉进化石
    zh_trad: 波士可多拉進化石
  descriptions:
    jp_kana: "ボスゴドラに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ボスゴドラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Aggron hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Galeking, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Aggron, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stolloss getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Aggron en combate."
    ko: "보스로라에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让波士可多拉携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓波士可多拉攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
aguav_berry:
  names:
    jp_kana: バンジのみ
    jp_kanji: バンジのみ
    en: Aguav Berry
    fr: Baie Gowav
    it: Baccaguava
    de: Gauvebeere
    es: Baya Guaya
    ko: 아바열매
    zh_simp: 乐芭果
    zh_trad: 樂芭果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the user’s HP in a\npinch, but it will cause confusion if the user hates\nthe taste."
    fr: "Tenue, cette Baie restaure des PV en cas de besoin,\nmais rend le Pokémon confus si son goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere im Notfall die KP\neines Pokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para restaurar\nalgunos PS. Su sabor puede causar confusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
    zh_simp: "让宝可梦携带后，\n危机时可以回复HP。\n如果讨厌这味道就会混乱。"
    zh_trad: "讓寶可夢攜帶後，\n危機時可以回復HP。\n如果討厭這味道就會混亂。"
air_balloon:
  names:
    jp_kana: ふうせん
    jp_kanji: ふうせん
    en: Air Balloon
    fr: Ballon
    it: Palloncino
    de: Luftballon
    es: Globo Helio
    ko: 풍선
    zh_simp: 气球
    zh_trad: 氣球
  descriptions:
    jp_kana: "ポケモンに　もたせると\nポケモンが　ちゅうに　うく。\nこうげきを　うけると　われてしまう。"
    jp_kanji: "ポケモンに　持たせると\nポケモンが　宙に　浮く。\n攻撃を　受けると　割れてしまう。"
    en: "An item to be held by a Pokémon. The holder will\nfloat in the air until hit. Once the holder is hit, this item\nwill burst."
    fr: "Tenu par un Pokémon, cet objet lui permet de flotter\ndans les airs. Il éclate en cas d’attaque."
    it: "Permette al Pokémon che ha questo strumento\ndi fluttuare in aria. Scoppia se il Pokémon\nè colpito da un attacco."
    de: "Gibt man ihn einem Pokémon zum Tragen, fängt es\nan zu schweben. Wird es getroffen, platzt der\nLuftballon."
    es: "El Pokémon que lo lleve flotará en el aire.\nSi recibe un golpe, estallará."
    ko: "포켓몬에게 지니게 하면\n포켓몬이 허공에 뜬다.\n공격을 받으면 터져버린다."
    zh_simp: "让宝可梦携带后，\n宝可梦会浮在空中。\n受到攻击就会破裂。"
    zh_trad: "讓寶可夢攜帶後，\n寶可夢會浮在空中。\n受到攻擊就會破裂。"
alakazite:
  names:
    jp_kana: フーディナイト
    jp_kanji: フーディナイト
    en: Alakazite
    fr: Alakazamite
    it: Alakazamite
    de: Simsalanit
    es: Alakazamita
    ko: 후디나이트
    zh_simp: 胡地进化石
    zh_trad: 胡地進化石
  descriptions:
    jp_kana: "たたかいのとき　フーディンを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　フーディンを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Alakazam to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Alakazam de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette ad Alakazam di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Simsala, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Alakazam en combate."
    ko: "배틀할 때 후딘을\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让胡地\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓胡地進行超級進化的\n一種神奇超級石。"
aloraichium_z:bag:
  names:
    jp_kana: アロライＺ
    jp_kanji: アロライＺ
    en: Aloraichium Z
    fr: Aloraïzélite
    it: Aloraicium Z
    de: A-Raichunium Z
    es: Alo-Raistal Z
    ko: 알로라이Z
    zh_simp: 阿罗雷Ｚ
    zh_trad: 阿羅雷Ｚ
  descriptions:
    jp_kana: "アローラちほうに　いる　ライチュウの\n１０まんボルトを　Ｚワザに　かえる\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "アローラ地方に　いる　ライチュウの\n１０まんボルトを　Ｚワザに　変える\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nAlolan Raichu’s Thunderbolt to an exclusive Z-Move."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise le Raichu de la région d’Alola qui le tient\nà transformer son Tonnerre en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono al Raichu di Alola di trasformare la\nmossa Fulmine in una mossa Z."
    de: "Kristallisierte Z-Kraft, die Alola-Raichus Attacke\nDonnerblitz zu einer Z-Attacke aufstuft.\nWird bei Bedarf automatisch vervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos Raichu de Alola convertir su Rayo en un\nmovimiento Z."
    ko: "알로라지방에 있는 라이츄의\n10만볼트를 Z기술로 바꾸는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将阿罗拉地区雷丘的十万伏特\n升级成特殊Ｚ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把阿羅拉地區雷丘的十萬伏特\n升級為特殊Ｚ招式的Ｚ力量結晶。"
aloraichium_z:held:
  names:
    jp_kana: アロライＺ
    jp_kanji: アロライＺ
    en: Aloraichium Z
    fr: Aloraïzélite
    it: Aloraicium Z
    de: A-Raichunium Z
    es: Alo-Raistal Z
    ko: 알로라이Z
    zh_simp: 阿罗雷Ｚ
    zh_trad: 阿羅雷Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nアローラちほうの　ライチュウの\n１０まんボルトを　Ｚワザに　かえる。"
    jp_kanji: "Ｚパワーの　結晶。\nアローラ地方の　ライチュウの\n１０まんボルトを　Ｚワザに　変える。"
    en: "This is a crystallized form of Z-Power. It upgrades\nAlolan Raichu’s Thunderbolt to a Z-Move."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer le Tonnerre d’un Raichu de la région d’Alola\nen capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare la mossa Fulmine\ndel Raichu di Alola in una mossa Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Alola-Raichus Attacke Donnerblitz\nzu einer Z-Attacke auf."
    es: "Cristal que confiere el Poder Z al movimiento Rayo\nde los Raichu de Alola."
    ko: "Z파워의 결정.\n알로라지방의 라이츄의\n10만볼트를 Z기술로 바꾼다."
    zh_simp: "Ｚ力量的结晶。\n会将阿罗拉地区雷丘的\n十万伏特升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把阿羅拉地區雷丘的\n十萬伏特升級為Ｚ招式。"
altarianite:
  names:
    jp_kana: チルタリスナイト
    jp_kanji: チルタリスナイト
    en: Altarianite
    fr: Altarite
    it: Altarite
    de: Altarianit
    es: Altarianita
    ko: 파비코리나이트
    zh_simp: 七夕青鸟进化石
    zh_trad: 七夕青鳥進化石
  descriptions:
    jp_kana: "チルタリスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "チルタリスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Altaria hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Altaria, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Una delle misteriose Megapietre.\nData a Altaria, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Altaria getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Altaria en combate."
    ko: "파비코리에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让七夕青鸟携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓七夕青鳥攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
amaze_mulch:
  names:
    jp_kana: とんでもこやし
    jp_kanji: とんでもこやし
    en: Amaze Mulch
    fr: Fertiprodige
    it: Fertilprodigio
    de: Ultramulch
    es: Abono Insólito
    ko: 기절초풍비료
    zh_simp: 超效肥
    zh_trad: 超效肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
ampharosite:
  names:
    jp_kana: デンリュウナイト
    jp_kanji: デンリュウナイト
    en: Ampharosite
    fr: Pharampite
    it: Ampharosite
    de: Ampharosnit
    es: Ampharosita
    ko: 전룡나이트
    zh_simp: 电龙进化石
    zh_trad: 電龍進化石
  descriptions:
    jp_kana: "デンリュウに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "デンリュウに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Ampharos hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Pharamp, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Ampharos, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ampharos getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Ampharos en combate."
    ko: "전룡에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让电龙携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓電龍攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
amulet_coin:
  names:
    jp_kana: おまもりこばん
    jp_kanji: おまもりこばん
    en: Amulet Coin
    fr: Pièce Rune
    it: Monetamuleto
    de: Münzamulett
    es: Moneda Amuleto
    ko: 부적금화
    zh_simp: 护符金币
    zh_trad: 護符金幣
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon. It doubles any\nprize money received if the holding Pokémon joins\na battle."
    fr: "Objet à tenir. Double l’argent gagné si le porteur\nse joint au combat."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha partecipa alla lotta, i guadagni\nraddoppiano."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverdoppelt das Preisgeld, wenn der Träger am\nKampf teilnimmt."
    es: "Si el Pokémon que la lleva lucha en un combate,\nduplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
    zh_simp: "只要携带它的宝可梦\n在战斗时出场一次，\n就能获得２倍金钱。"
    zh_trad: "只要攜帶它的寶可夢\n在戰鬥時出場一次，\n就能獲得２倍金錢。"
antidote:
  names:
    jp_kana: どくけし
    jp_kanji: どくけし
    en: Antidote
    fr: Antidote
    it: Antidoto
    de: Gegengift
    es: Antídoto
    ko: 해독제
    zh_simp: 解毒药
    zh_trad: 解毒藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　どくの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　どくの\n状態を　回復する。"
    en: "A spray-type medicine for treating poisoning. It can be\nused to lift the effects of being poisoned from\na single Pokémon."
    fr: "Un médicament sous forme de spray.\nGuérit un Pokémon empoisonné."
    it: "Rimedio spray.\nCura un Pokémon dall’avvelenamento."
    de: Ein Spray, das Vergiftungen eines Pokémon heilt.
    es: "Medicina en espray que contrarresta los efectos\ndel veneno en un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n독 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n中毒状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n中毒狀態。"
apicot_berry:
  names:
    jp_kana: ズアのみ
    jp_kanji: ズアのみ
    en: Apicot Berry
    fr: Baie Abriko
    it: Baccacocca
    de: Apikobeere
    es: Baya Aricoc
    ko: 규살열매
    zh_simp: 杏仔果
    zh_trad: 杏仔果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特防が　あがる。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, its Sp. Def stat will increase when it’s in\na pinch."
    fr: "Tenue, cette Baie augmente la Défense Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Difesa Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Verteidigungs-Wert eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube la Defensa Especial\nen un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수방어가 올라간다."
    zh_simp: "让宝可梦携带后，危机时，\n自己的特防就会提高。"
    zh_trad: "讓寶可夢攜帶後，\n危機時，自己的\n特防就會提高。"
apricorn_box:
  names:
    jp_kana: ぼんぐりケース
    jp_kanji: ぼんぐりケース
    en: Apricorn Box
    fr: Boîte Noigrume
    it: Ghicobox
    de: Aprikokobox
    es: Caja Bonguri
    ko: 규토리케이스
    zh_simp: 球果盒
    zh_trad: 球果盒
  descriptions:
    jp_kana: "ぼんぐりを　９９こ　ほぞん　できる\nべんりな　いれもの。"
    jp_kanji: "ぼんぐりを　９９こ　保存できる\n便利な　いれもの。"
    en: "A handy box where you can store up to 99 of each\nkind of Apricorn."
    fr: "Une boîte bien pratique qui peut contenir jusqu’à\n99 Noigrumes."
    it: "Contenitore molto pratico dove conservare\nfino a 99 Ghicocche diverse."
    de: "Eine praktische Tragebox, in der du bis zu\n99 Aprikokos jeder Sorte transportieren kannst."
    es: "Práctico recipiente que puede almacenar hasta\n99 Bonguri de cada especie."
    ko: "규토리를 99개 보존할 수 있는\n편리한 용기."
    zh_simp: "使用方便，可以保存\n99个球果的容器。"
    zh_trad: "可以存放\n99個球果的好用容器。"
aqua_suit:
  names:
    jp_kana: アクアスーツ
    jp_kanji: アクアスーツ
    en: Aqua Suit
    fr: Scaphandre Aqua
    it: Tuta Idro
    de: Aqua-Anzug
    es: Traje Aqua
    ko: 아쿠아슈트
    zh_simp: 海洋装
    zh_trad: 海洋裝
  descriptions:
    jp_kana: "アクアだんの　かがくぎじゅつを\nけっしゅうして　つくられた　スーツ。\nどんな　しょうげき　にも　たえられる。"
    jp_kanji: "アクア団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective technological\nknow-how of Team Aqua. It can withstand\nany impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Aqua.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal\nTeam Idro in grado di resistere a qualunque\nshock."
    de: "Ein Anzug, der unter Einsatz des gesamten\ntechnischen Wissens von Team Aqua entstand.\nHält jeder Art von Erschütterung stand."
    es: "Este traje es el resultado de las arduas\ninvestigaciones científicas del Equipo Aqua.\nEs capaz de soportar cualquier impacto."
    ko: "아쿠아단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
    zh_simp: "集海洋队科学技术于一身的服装。\n能承受任何冲击。"
    zh_trad: "集結了海洋隊的\n科學技術製造的服裝。\n能承受任何衝擊。"
armor_fossil:
  names:
    jp_kana: たてのカセキ
    jp_kanji: たてのカセキ
    en: Armor Fossil
    fr: Fossile Armure
    it: Fossilscudo
    de: Panzerfossil
    es: Fósil Coraza
    ko: 방패의화석
    zh_simp: 盾甲化石
    zh_trad: 盾甲化石
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nえりかざりの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n襟飾りの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon that once lived\non the land. It looks to be from some kind of\nprotective collar."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un morceau de collier."
    it: "Fossile di un Pokémon preistorico che viveva sulla\nterraferma. Sembra essere parte di un collare."
    de: "Das Fossil eines uralten Pokémon, das an\nLand lebte. Es sieht wie ein Teil eines\nNackenschildes aus."
    es: "Fósil de un Pokémon prehistórico terrestre. Parece ser\nparte de una protección ósea del cuello."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n깃 장식의 일부인 듯하다."
    zh_simp: "很久以前生活在地上的\n古代宝可梦的化石。\n好像是领饰的一部分。"
    zh_trad: "很久以前生活在地上的\n古代寶可夢的化石。\n好像是領飾的一部分。"
articuno_candy:
  names:
    jp_kana: フリーザーのアメ
    jp_kanji: フリーザーのアメ
    en: Articuno Candy
    fr: Bonbon Artikodin
    it: Caramella Articuno
    de: Arktos-Bonbon
    es: Caramelo Articuno
    ko: 프리져의사탕
    zh_simp: 急冻鸟的糖果
    zh_trad: 急凍鳥的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de cierto Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
aspear_berry:
  names:
    jp_kana: ナナシのみ
    jp_kanji: ナナシのみ
    en: Aspear Berry
    fr: Baie Willia
    it: Baccaperina
    de: Wilbirbeere
    es: Baya Perasi
    ko: 배리열매
    zh_simp: 利木果
    zh_trad: 利木果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこおりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nこおりを　回復する。"
    en: "A Berry to be consumed by Pokémon. If a Pokémon\nholds one, it can recover from being frozen on its\nown in battle."
    fr: "Une Baie qui soigne le gel lorsqu’elle est tenue\npar un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndal congelamento."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\ntaut diese es auf, wenn es eingefroren wird."
    es: "Los Pokémon pueden llevarla o usarla para\ndescongelarse."
    ko: "포켓몬에게 지니게 하면\n얼음을 회복한다."
    zh_simp: "让宝可梦携带后，\n可以治愈冰冻。"
    zh_trad: "讓寶可夢攜帶後，\n可以治癒冰凍。"
assault_vest:
  names:
    jp_kana: とつげきチョッキ
    jp_kanji: とつげきチョッキ
    en: Assault Vest
    fr: Veste de Combat
    it: Corpetto assalto
    de: Offensivweste
    es: Chaleco Asalto
    ko: 돌격조끼
    zh_simp: 突击背心
    zh_trad: 突擊背心
  descriptions:
    jp_kana: "こうげきてきに　なる　チョッキ。\nもたせると　とくぼうが　あがるが\nへんかわざを　だせなくなる。"
    jp_kanji: "攻撃的に　なる　チョッキ。\n持たせると　特防が　あがるが\n変化技を　だせなくなる。"
    en: "An item to be held by a Pokémon. This offensive\nvest raises Sp. Def but prevents the use of\nstatus moves."
    fr: "Objet à tenir. Une veste augmentant la Défense\nSpéciale, mais empêchant d’utiliser des attaques\nde statut."
    it: "Strumento da dare a un Pokémon.\nQuesto corpetto aumenta la Difesa Speciale\nma impedisce l’uso di mosse di stato."
    de: "Trägt ein Pokémon diese Weste, erhöht sich\nseine Spezial-Verteidigung, aber es kann keine\nStatus-Attacken mehr einsetzen."
    es: "Chaleco que potencia la Defensa Especial del Pokémon\nque lo lleva, pero le impide lanzar ataques de estado."
    ko: "공격적으로 변하는 조끼.\n지니게 하면 특수방어가 올라가지만\n변화 기술을 쓸 수 없게 된다."
    zh_simp: "会变得富有攻击性的背心。\n虽然携带后特防会提高，\n但会无法使出变化招式。"
    zh_trad: "會變得富有攻擊性的背心。\n雖然攜帶後特防會提高，\n但會無法使出變化招式。"
audinite:
  names:
    jp_kana: タブンネナイト
    jp_kanji: タブンネナイト
    en: Audinite
    fr: Nanméouïte
    it: Audinite
    de: Ohrdochnit
    es: Audinita
    ko: 다부니나이트
    zh_simp: 差不多娃娃进化石
    zh_trad: 差不多娃娃進化石
  descriptions:
    jp_kana: "タブンネに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "タブンネに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Audino hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Nanméouïe, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Audino, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ohrdoch getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Audino en combate."
    ko: "다부니에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让差不多娃娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓差不多娃娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
autograph:
  names:
    jp_kana: マチスのサイン
    jp_kanji: マチスのサイン
    en: Autograph
    fr: Dédicace de Bob
    it: Autografo
    de: Autogramm
    es: Autógrafo
    ko: 마티스의사인
    zh_simp: 马志士的签名
    zh_trad: 馬志士的簽名
  descriptions:
    jp_kana: "クチバ　ジムリーダー　マチスから\nもらった　サインしきし。\nＧｏｏｄ　Ｌｕｃｋ！と　かかれている。"
    jp_kanji: "クチバ　ジムリーダー　マチスから\nもらった　サイン色紙。\nＧｏｏｄ　Ｌｕｃｋ！と　書かれている。"
    en: "The autograph you got from the Vermilion City Gym\nLeader, Lt. Surge. He wrote, “Good luck!”"
    fr: "C’est un autographe de Major Bob, le Champion\nde l’Arène de Carmin sur Mer ! Il y a écrit « Good luck ! »\ndessus."
    it: "È l’autografo di Lt. Surge, il Capopalestra\ndi Aranciopoli. C’è scritto “Good luck!”."
    de: "Das ist ein Autogramm von Major Bob,\ndem Arenaleiter von Orania City.\nDarauf steht: „Viel Glück, [VAR 1100 (00FF080600000052)]ekrutRekrutin!“"
    es: "El autógrafo del Teniente Surge, el Líder de Gimnasio\nde Ciudad Carmín. La dedicatoria reza: \"Good luck!\"."
    ko: "갈색체육관 관장 마티스에게\n받은 사인이 적힌 종이.\nGood Luck!이라고 써 있다."
    zh_simp: "枯叶市道馆馆主马志士\n给你的彩色签名纸。\n上面写着“Good Luck！”。"
    zh_trad: "從枯葉市道館館主馬志士\n手上拿到的簽名板。\n上面寫著「Good Luck！」。"
awakening:
  names:
    jp_kana: ねむけざまし
    jp_kanji: ねむけざまし
    en: Awakening
    fr: Réveil
    it: Sveglia
    de: Aufwecker
    es: Despertar
    ko: 잠깨는약
    zh_simp: 解眠药
    zh_trad: 解眠藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　ねむりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　ねむりの\n状態を　回復する。"
    en: "A spray-type medicine to wake the sleeping. It can\nbe used to rouse a single Pokémon from\nthe clutches of sleep."
    fr: "Un médicament sous forme de spray.\nRéveille un Pokémon endormi."
    it: "Rimedio spray.\nSveglia un Pokémon addormentato."
    de: Ein Spray, das ein schlafendes Pokémon aufweckt.
    es: "Medicina en espray que libera a un Pokémon de\nlas garras del sueño."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n睡眠状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n睡眠狀態。"
azure_flute:
  names:
    jp_kana: てんかいのふえ
    jp_kanji: てんかいのふえ
    en: Azure Flute
    fr: Flûte Azur
    it: Flauto Cielo
    de: Azurflöte
    es: Flauta Azur
    ko: 천계의피리
    zh_simp: 天界之笛
    zh_trad: 天界之笛
  descriptions:
    jp_kana: "このよの　ものとは　おもえない\nねいろが　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    jp_kanji: "この世の　ものとは　おもえない\n音色が　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    en: "A flute that puts out echoing sounds that do not\nseem to be of this world. No one knows who\nmade it."
    fr: "Une flûte produisant des sons qui semblent provenir\nd’un autre monde. On ne sait pas qui l’a fabriquée."
    it: "Flauto che emette una melodia che sembra\nappartenere a un altro mondo. Non si sa\nchi l’abbia creato."
    de: "Eine Flöte, deren Töne nicht von dieser Welt zu sein\nscheinen. Ihr Erschaffer ist nicht bekannt."
    es: "Emite sonidos que no parecen de este mundo.\nEs de fabricante desconocido."
    ko: "이 세상의 것이라고는 생각할 수 없는\n음색이 울려 퍼지는 피리. 언제\n누가 만들었는지 모른다."
    zh_simp: "能发出响彻云霄的天籁之音的笛子。\n不知道是谁在什么时候制造的它。"
    zh_trad: "能發出響徹雲霄的\n天籟之音的笛子。不知是什麼人\n在什麼時候製造了它。"
babiri_berry:
  names:
    jp_kana: リリバのみ
    jp_kanji: リリバのみ
    en: Babiri Berry
    fr: Baie Babiri
    it: Baccababiri
    de: Babiribeere
    es: Baya Baribá
    ko: 바리비열매
    zh_simp: 霹霹果
    zh_trad: 霹霹果
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　はがね　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　はがね技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will lessen the\ndamage taken from one supereffective\nSteel-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Acier."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Acciaio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere sehr\neffektive gegnerische Attacken vom Typ Stahl."
    es: "Si la lleva un Pokémon, debilita un ataque supereficaz\nde tipo Acero de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 강철 기술을\n당했을 때 위력이 약해진다."
    zh_simp: "让宝可梦携带后，\n在受到效果绝佳的钢属性招式\n攻击时，能令其威力减弱。"
    zh_trad: "讓寶可夢攜帶後，\n在受到效果絕佳的鋼屬性招式\n攻擊時，能使其威力減弱。"
balm_mushroom:
  names:
    jp_kana: かおるキノコ
    jp_kanji: かおるキノコ
    en: Balm Mushroom
    fr: Champi Suave
    it: Profumfungo
    de: Duftpilz
    es: Seta Aroma
    ko: 향기버섯
    zh_simp: 芳香蘑菇
    zh_trad: 芳香蘑菇
  descriptions:
    jp_kana: "あたりいったいに　いい　かおりが\nひろがる　めずらしい　キノコ。\nショップで　たかく　うれる。"
    jp_kanji: "あたりいったいに　いい　香りが\nひろがる　珍しい　キノコ。\nショップで　高く　売れる。"
    en: "A rare mushroom that gives off a nice fragrance.\nIt can be sold at a high price to shops."
    fr: "Un champignon rare qui répand un agréable parfum\nautour de lui. Peut être vendu à bon prix aux magasins."
    it: "Fungo raro che emana un profumo gradevolissimo.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein seltener Pilz, der ein angenehmes Aroma\nverbreitet. Er ist von großem Wert."
    es: "Extraña seta que desprende un agradable aroma.\nPuede alcanzar un alto precio en las tiendas."
    ko: "주변 일대에 좋은 향기가\n퍼지는 희귀한 버섯.\n상점에서 비싸게 팔린다."
    zh_simp: "能让附近一带\n芳香四溢的珍稀蘑菇。\n可以在商店高价出售。"
    zh_trad: "能讓附近一帶\n充滿馥郁香氣的稀奇蘑菇。\n可以在商店高價出售。"
banettite:
  names:
    jp_kana: ジュペッタナイト
    jp_kanji: ジュペッタナイト
    en: Banettite
    fr: Branettite
    it: Banettite
    de: Banetteonit
    es: Banettita
    ko: 다크펫나이트
    zh_simp: 诅咒娃娃进化石
    zh_trad: 詛咒娃娃進化石
  descriptions:
    jp_kana: "ジュペッタに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ジュペッタに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Banette hold it, and this stone will enable it to\nMega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Branette, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Banette, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Banette getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Banette en combate."
    ko: "다크펫에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让诅咒娃娃携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓詛咒娃娃攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
basement_key:goldenrod_tunnel:
  names:
    jp_kana: ちかのかぎ
    jp_kanji: ちかのかぎ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave Sótano
    ko: 지하의열쇠
    zh_simp: 地下钥匙
    zh_trad: 地下鑰匙
  descriptions:
    jp_kana: "コガネちかどうに　ある　とびらを\nあける　カギ。"
    jp_kanji: "コガネ地下道に　ある　扉を\n空ける　カギ。"
    en: "A key that opens a door in the\nGoldenrod Tunnel."
    fr: "Une clé qui permet d’ouvrir la porte au fond du\nDoublon-Tunnel."
    it: "Chiave che permette di aprire la porta all’interno\ndel Fiortunnel."
    de: "Ein Schlüssel, der eine Tür in der Dukatia-Passage\nvon Dukatia City öffnet."
    es: Llave que abre la puerta que hay en el Túnel Trigal.
    ko: "금빛지하도에 있는 문을\n여는 열쇠."
    zh_simp: "用来打开满金地道\n大门的钥匙。"
    zh_trad: "用來打開滿金地下道的\n門的鑰匙。"
basement_key:new_mauville:
  names:
    jp_kana: ちかのカギ
    jp_kanji: ちかのカギ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave del Sótano
    ko: 지하열쇠
    zh_simp: 地下钥匙
    zh_trad: 地下鑰匙
  descriptions:
    jp_kana: "キンセツの　ちかにある\nニューキンセツに\nはいる　ための　カギ。"
    jp_kanji: "キンセツの　地下にある\nニューキンセツに\n入るための　カギ。"
    en: "The key to New Mauville, which was constructed\nbeneath Mauville City."
    fr: "Une clé permettant d’accéder à New Lavandia,\ndans les sous-sols de Lavandia."
    it: "Chiave che permette di accedere a Ciclanova,\nla città sotterranea costruita sotto a Ciclamipoli."
    de: "Ein Schlüssel, der dir Zugang nach Neu Malvenfroh\nverschafft, welches unter Malvenfroh City liegt."
    es: "Llave que da acceso a Malvalanova, situada en\nlos subterráneos de Ciudad Malvalona."
    ko: "보라시티 근처에 있는\n뉴보라에 들어가기 위한\n열쇠다."
    zh_simp: "进入紫堇地下的新紫堇时，\n所使用的钥匙。"
    zh_trad: "用於進入紫菫地下的\n新紫菫的鑰匙。"
battle_pocket:
  names:
    jp_kana: バトルポケット
    jp_kanji: バトルポケット
    en: Battle Pocket
    fr: Poche de Combat
    it: Tasca lotta
    de: Kampftasche
    es: Bolsillo Combate
    ko: 배틀포켓
    zh_simp: 对战口袋
    zh_trad: 對戰口袋
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
beach_glass:
  names:
    jp_kana: うみべのガラス
    jp_kanji: うみべのガラス
    en: Beach Glass
    fr: Galet de Verre
    it: Vetro marino
    de: Strandscherbe
    es: Cristal Marino
    ko: 바닷가유리
    zh_simp: 海边的玻璃
    zh_trad: 海邊的玻璃
  descriptions:
    jp_kana: "なみに　もまれて　まるくなった\nいろの　ついた　ガラスへん。\nすこし　ざらざら　している。"
    jp_kanji: "波に　もまれて　丸くなった\n色のついた　ガラス片。\n少し　ざらざら　している。"
    en: "A piece of colored glass. Waves have rounded its edges.\nIt’s slightly rough to the touch."
    fr: "Un morceau de verre coloré arrondi par les vagues.\nSa texture est légèrement rugueuse."
    it: "Un piccolo pezzetto di vetro colorato che è stato\narrotondato dalle onde del mare. È un po’ ruvido\nal tatto."
    de: "Ein farbiges Stück Glas, das von den Wellen umspült\nund so abgeschliffen wurde. Es fühlt sich etwas rau an."
    es: "Cristal de colores pulido por la acción erosiva de las\nolas. Al tacto resulta algo áspero."
    ko: "파도에 깎여 둥글어진\n색이 있는 유리 파편.\n조금 거칠거칠하다."
    zh_simp: "受到波浪的洗刷从而\n变成圆形的彩色玻璃片。\n表面摸起来有点粗糙不平。"
    zh_trad: "受海浪沖刷而變圓的\n彩色玻璃碎片。\n表面有點粗糙。"
beast_ball:
  names:
    jp_kana: ウルトラボール
    jp_kanji: ウルトラボール
    en: Beast Ball
    fr: Ultra Ball
    it: UC Ball
    de: Ultraball
    es: Ente Ball
    ko: 울트라볼
    zh_simp: 究极球
    zh_trad: 究極球
  descriptions:
    jp_kana: "ウルトラビーストを　つかまえるために\nつくられた　とくべつな　ボール\nビースト　いがいは　つかまえにくい。"
    jp_kanji: "ウルトラビーストを　捕まえるために\n作られた　特別な　ボール\nビースト　以外は　捕まえにくい。"
    en: "A special Poké Ball designed to catch Ultra Beasts.\nIt has a low success rate for catching others."
    fr: "Une Poké Ball spéciale créée pour pouvoir capturer\ndes Ultra-Chimères. Elle n’est pas du tout efficace\nsur les autres créatures."
    it: "Poké Ball speciale creata appositamente per\ncatturare le Ultracreature. Non funziona bene\ncon altre forme di vita."
    de: "Ein besonderer Ball zum Fangen von Ultrabestien.\nAndere Lebewesen lassen sich damit nur schwer\nfangen."
    es: "Un tipo especial de Poké Ball diseñada para capturar\nde forma específica y exclusiva a los misteriosos seres\nconocidos como Ultraentes."
    ko: "울트라비스트를 잡기 위해\n만들어진 특별한 볼.\n비스트 이외는 잡기 어렵다."
    zh_simp: "为捕捉究极异兽而制作的特殊精灵球。\n很难捕捉究极异兽之外的宝可梦。"
    zh_trad: "為捕捉究極異獸而製作的特殊精靈球。\n很難捕捉究極異獸之外的寶可夢。"
beedrillite:
  names:
    jp_kana: スピアナイト
    jp_kanji: スピアナイト
    en: Beedrillite
    fr: Dardargnite
    it: Beedrillite
    de: Bibornit
    es: Beedrillita
    ko: 독침붕나이트
    zh_simp: 大针蜂进化石
    zh_trad: 大針蜂進化石
  descriptions:
    jp_kana: "たたかいのとき　スピアーを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　スピアーを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Beedrill to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Dardargnan de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Beedrill di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Bibor, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Beedrill en combate."
    ko: "배틀할 때 독침붕을\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让大针蜂\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓大針蜂進行超級進化的\n一種神奇超級石。"
bellsprout_candy:
  names:
    jp_kana: マダツボミのアメ
    jp_kanji: マダツボミのアメ
    en: Bellsprout Candy
    fr: Bonbon Chétiflor
    it: Caramella Bellsprout
    de: Knofensa-Bonbon
    es: Caramelo Bellsprout
    ko: 모다피의사탕
    zh_simp: 喇叭芽的糖果
    zh_trad: 喇叭芽的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
belue_berry:
  names:
    jp_kana: ベリブのみ
    jp_kanji: ベリブのみ
    en: Belue Berry
    fr: Baie Myrte
    it: Baccartillo
    de: Myrtilbeere
    es: Baya Andano
    ko: 루베열매
    zh_simp: 靛莓果
    zh_trad: 靛莓果
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région, utilisée\npour préparer des Pokéblocs permettant d’augmenter\nla Beauté d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es una baya muy rara en otras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n在其他地区很少见的树果。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n在其他地區很少見的樹果。"
berry_juice:
  names:
    jp_kana: きのみジュース
    jp_kanji: きのみジュース
    en: Berry Juice
    fr: Jus de Baie
    it: Succodibacca
    de: Beerensaft
    es: Zumo de Baya
    ko: 나무열매쥬스
    zh_simp: 树果汁
    zh_trad: 樹果汁
  descriptions:
    jp_kana: "きのみ　１００％の　ジュース。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "きのみ　１００％の　ジュース。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A 100 percent pure juice made of Berries.\nWhen consumed, it restores 20 HP to an\ninjured Pokémon."
    fr: "Une boisson 100 % pur Jus de Baie.\nRestaure 20 PV d’un Pokémon."
    it: "Bevanda di puro succo di bacche.\nRestituisce 20 PS a un Pokémon."
    de: "Hundertprozentiger Fruchtsaft, aus Beeren\ngekeltert. Füllt die KP eines Pokémon um\n20 Punkte auf."
    es: "Zumo de bayas 100% natural que restaura 20 PS\nde un Pokémon."
    ko: "나무열매 100% 쥬스.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
    zh_simp: "100％树果果汁。\n能让１只宝可梦\n回复20HP。"
    zh_trad: "100％樹果果汁。\n能讓１隻寶可夢\n回復20HP。"
berry_pots:
  names:
    jp_kana: きのみプランター
    jp_kanji: きのみプランター
    en: Berry Pots
    fr: Plante-Baies
    it: Piantabacche
    de: Pflanzset
    es: Plantabayas
    ko: 나무열매플랜터
    zh_simp: 树果种植盆
    zh_trad: 樹果種植盆
  descriptions:
    jp_kana: "いつでも　てがるに　きのみを\nそだてられる　けいたいしきの\nさいばい　ようき。"
    jp_kanji: "いつでも　手軽に　きのみを\n育てられる　携帯式の\n栽培容器。"
    en: "Handy containers for cultivating Berries wherever\nyou go."
    fr: "Un accessoire portatif qui permet de cultiver des Baies\nen tout lieu et à tout moment."
    it: "Accessorio tascabile che permette di coltivare\nbacche in qualunque luogo e momento."
    de: "Ein tragbares Utensil, das die Aufzucht von\nPflanzen aus Beeren ermöglicht, wo immer du\nauch gerade bist."
    es: "Dispositivo portátil de cultivo que permite plantar\nbayas en cualquier momento de forma sencilla."
    ko: "항상 손쉽게 나무열매를\n키울 수 있는 휴대형\n재배 용기."
    zh_simp: "可以随时轻松培育树果的\n便携式栽培容器。"
    zh_trad: "可以隨時輕鬆培育樹果的\n可攜式栽培容器。"
big_malasada:
  names:
    jp_kana: おおきいマラサダ
    jp_kanji: おおきいマラサダ
    en: Big Malasada
    fr: Malasada Maxi
    it: Malasada maxi
    de: Maxi-Malasada
    es: Malasada Maxi
    ko: 큰 말라사다
    zh_simp: 大马拉萨达
    zh_trad: 大馬拉薩達
  descriptions:
    jp_kana: "アローラめいぶつの　あげパン。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "アローラ名物の　あげパン。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "The Alola region’s local specialty—fried bread.\nIt can be used once to heal all the status conditions\nof a Pokémon."
    fr: "Une spécialité d’Alola.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Frittella tipica di Alola.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine Spezialität aus Alola, die alle Statusprobleme\neines Pokémon heilt."
    es: "Fritura típica de Alola que cura todos los problemas\nde estado de un Pokémon."
    ko: "알로라의 명물인 튀긴 빵.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
    zh_simp: "阿罗拉特产的油炸面包。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "阿羅拉特產的油炸麵包。\n能治癒１隻寶可夢的\n所有異常狀態。"
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    jp_kanji: おおきなキノコ
    en: Big Mushroom
    fr: Gros Champi
    it: Grande Fungo
    de: Riesenpilz
    es: Seta Grande
    ko: 큰버섯
    zh_simp: 大蘑菇
    zh_trad: 大蘑菇
  descriptions:
    jp_kana: "おおきな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nとても　にんきが　たかい。"
    jp_kanji: "おおきな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nとても　人気が　高い。"
    en: "A very large and rare mushroom. It’s popular with\na certain class of collectors."
    fr: "Un grand champignon assez rare.\nIl est très populaire parmi certains fans dévoués."
    it: "Fungo grande e raro.\nÈ molto apprezzato da alcuni intenditori."
    de: "Ein großer und seltener Pilz. Liebhaber dieses\nPilzes freuen sich ein Loch in den Bauch, wenn sie\neinen finden."
    es: "Una gran seta que es poco común y muy popular\nentre determinados grupos de gourmets."
    ko: "크고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
    zh_simp: "珍稀的大蘑菇。\n在一些爱好者中\n有着非常高的人气。"
    zh_trad: "稀奇的大蘑菇。\n在部分愛好者中\n非常受歡迎。"
big_nugget:
  names:
    jp_kana: でかいきんのたま
    jp_kanji: でかいきんのたま
    en: Big Nugget
    fr: Maxi Pépite
    it: Granpepita
    de: Riesennugget
    es: Maxipepita
    ko: 큰금구슬
    zh_simp: 巨大金珠
    zh_trad: 巨大金珠
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきんせいの　おおきな　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　おおきな　玉。\nショップで　高く　売れる。"
    en: "A big nugget of pure gold that gives off a lustrous\ngleam. It can be sold at a high price to shops."
    fr: "Une pépite d’or pur qui brille d’un éclat magnifique.\nPeut être vendue à bon prix aux magasins."
    it: "Grossa pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein großes Nugget aus purem Gold, das einen\nschimmernden Glanz besitzt. Es ist von großem\nWert."
    es: "Pepita grande de oro puro que desprende un brillo\nespectacular. Puede venderse a un precio muy alto\nen las tiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 큰 구슬.\n상점에서 비싸게 팔린다."
    zh_simp: "以纯金制成，\n闪着金光的大珠子。\n可以在商店高价出售。"
    zh_trad: "閃著金光的\n純金製大珠子。\n可以在商店高價出售。"
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    jp_kanji: おおきなしんじゅ
    en: Big Pearl
    fr: Grande Perle
    it: Grande Perla
    de: Riesenperle
    es: Perla Grande
    ko: 큰진주
    zh_simp: 大珍珠
    zh_trad: 大珍珠
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nかなり　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nかなり　大粒の　真珠。\nショップで　高く　売れる。"
    en: "A rather large pearl that has a very nice silvery sheen.\nIt can be sold at a high price to shops."
    fr: "Une grosse perle qui brille d’une jolie couleur argent.\nPeut être vendue à bon prix aux magasins."
    it: "Perla piuttosto grande dai graziosi riflessi\nargentei. Si può vendere a un prezzo piuttosto\nalto nei negozi."
    de: "Eine relativ große Perle, die in schönem Silber\nfunkelt. Sie ist von hohem Wert."
    es: "Brillante perla plateada de gran tamaño que puede\nvenderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
    zh_simp: "散发着美丽银辉\n且相当大颗的珍珠。\n可以在商店高价出售。"
    zh_trad: "散發著美麗銀輝的\n頗大顆的珍珠。\n可以在商店高價出售。"
big_root:
  names:
    jp_kana: おおきなねっこ
    jp_kanji: おおきなねっこ
    en: Big Root
    fr: Grosse Racine
    it: Granradice
    de: Großwurzel
    es: Raíz Grande
    ko: 큰뿌리
    zh_simp: 大根茎
    zh_trad: 大根莖
  descriptions:
    jp_kana: "もたせると　ＨＰを　すいとる　わざで\nいつもより　おおく　じぶんの　ＨＰを\nかいふくできる。"
    jp_kanji: "持たせると　ＨＰを　吸いとる　技で\nいつもより　おおく　自分の　ＨＰを\n回復できる。"
    en: "An item to be held by a Pokémon. It boosts the\namount of HP the holder recovers from\nHP-stealing moves."
    fr: "Objet à tenir. Augmente la puissance des capacités\nvolant des PV."
    it: "Strumento da dare a un Pokémon.\nPotenzia le mosse ruba-PS facendo recuperare\nun maggior numero di PS."
    de: "Ein Item zum Tragen. Verstärkt KP-stehlende\nAttacken."
    es: "El Pokémon que la lleva recupera más PS al usar\nmovimientos que drenan al objetivo."
    ko: "지니게 하면 HP 흡수 기술을 썼을 때\n여느 때보다 많은 HP를\n자신이 회복할 수 있다."
    zh_simp: "携带后，吸取HP的招式\n可以比平时更多地回复自己的HP。"
    zh_trad: "攜帶後，吸取HP的招式\n可以比平時回復更多\n自己的HP。"
bike:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
    zh_simp: 自行车
    zh_trad: 自行車
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding Bike that enables a rider to get around\nmuch faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi\npiù velocemente che con le Scarpe da Corsa."
    de: Ein Klapprad, mit dem man schneller ist als zu Fuß.
    es: "Bicicleta plegable con la que se va más rápido\nque corriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
    zh_simp: "能比跑步鞋跑得还快的\n折叠式自行车。"
    zh_trad: "能跑得比跑步鞋還快的\n折疊式自行車。"
bike:yellow:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
    zh_simp: 自行车
    zh_trad: 自行車
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding Bike that enables a rider to get around\nmuch faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi\npiù velocemente che con le Scarpe da Corsa."
    de: Ein Klapprad, mit dem man schneller ist als zu Fuß.
    es: "Bicicleta plegable con la que se va más rápido\nque corriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
    zh_simp: "能比跑步鞋跑得还快的\n折叠式自行车。"
    zh_trad: "能跑得比跑步鞋還快的\n折疊式自行車。"
binding_band:
  names:
    jp_kana: しめつけバンド
    jp_kanji: しめつけバンド
    en: Binding Band
    fr: Bande Étreinte
    it: Legafascia
    de: Klammerband
    es: Banda Atadura
    ko: 조임밴드
    zh_simp: 紧绑束带
    zh_trad: 緊綁束帶
  descriptions:
    jp_kana: "しめつけるわざを　ほじょする　バンド。\nもたせると　しめつけるわざの\nいりょくが　つよく　なる。"
    jp_kanji: "締めつける技を　補助する　バンド。\n持たせると　締めつける技の\n威力が　強くなる。"
    en: "An item to be held by a Pokémon. A band that\nincreases the power of binding moves used by\nthe holder."
    fr: "Objet à tenir. Augmente la puissance des attaques\nimmobilisantes telles que Ligotage ou Étreinte."
    it: "Strumento da dare a un Pokémon che aumenta\nla potenza di mosse come Avvolgibotta e\nLegatutto."
    de: "Ein Band, das die Stärke aller Klammerattacken des\nTrägers erhöht."
    es: "Banda que potencia los movimientos que estrujan\nal rival."
    ko: "조이기 기술을 보조하는 밴드.\n지니게 하면 조이기 기술의\n위력이 강해진다."
    zh_simp: "能增强绑紧招式的束带。\n携带后，绑紧招式的威力会变强。"
    zh_trad: "輔助綁緊類招式的束帶。\n攜帶後，綁緊類招式的\n威力會變強。"
black_apricorn:
  names:
    jp_kana: くろぼんぐり
    jp_kanji: くろぼんぐり
    en: Black Apricorn
    fr: Noigrume Noir
    it: Ghicocca Nera
    de: Aprikoko Swz
    es: Bonguri Negro
    ko: 검은규토리
    zh_simp: 黑球果
    zh_trad: 黑球果
  descriptions:
    jp_kana: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    jp_kanji: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    en: "A black Apricorn. It has a scent beyond\none’s experience."
    fr: "Un Noigrume de couleur noire.\nIl dégage un arôme indéfinissable."
    it: "Una Ghicocca di colore nero.\nEmana un odore indefinibile."
    de: "Eine schwarze Aprikoko. Sie riecht irgendwie\nunbeschreiblich."
    es: Bonguri de color negro y aroma indescriptible.
    ko: "검은색의 규토리.\n말로는 표현할 수 없는 향기가 난다."
    zh_simp: "黑色的球果。\n有种无法形容的气味。"
    zh_trad: "黑色的球果。\n有種無法形容的氣味。"
black_belt:
  names:
    jp_kana: くろおび
    jp_kanji: くろおび
    en: Black Belt
    fr: Ceinture Noire
    it: Cinturanera
    de: Schwarzgurt
    es: Cinturón Negro
    ko: 검은띠
    zh_simp: 黑带
    zh_trad: 黑帶
  descriptions:
    jp_kana: "きが　ひきしまる　おび。\nもたせると　かくとうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "気が　ひきしまる　帯。\n持たせると　かくとうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. This belt helps\nthe wearer to focus and boosts the power of\nFighting-type moves."
    fr: "Objet à tenir. Une ceinture qui augmente\nla détermination et la puissance des capacités\nde type Combat."
    it: "Strumento da dare a un Pokémon.\nCintura che potenzia la determinazione e le mosse\ndi tipo Lotta."
    de: "Ein Item zum Tragen. Ein Gürtel, der die\nEntschlossenheit sowie Attacken vom\nTyp Kampf verstärkt."
    es: "Debe llevarlo un Pokémon. Aumenta la concentración\ny fortalece los movimientos de tipo Lucha."
    ko: "마음을 긴장시키는 띠.\n지니게 하면 격투타입\n기술의 위력이 올라간다."
    zh_simp: "能振作精神的带子。\n携带后，格斗属性的\n招式威力就会提高。"
    zh_trad: "能振作精神的帶子。\n攜帶後，格鬥屬性的\n招式威力就會提高。"
black_flute:
  names:
    jp_kana: くろいビードロ
    jp_kanji: くろいビードロ
    en: Black Flute
    fr: Flûte Noire
    it: Flauto Nero
    de: Schwarze Flöte
    es: Flauta Negra
    ko: 검정비드로
    zh_simp: 黑色玻璃哨
    zh_trad: 黑色玻璃哨
  descriptions:
    jp_kana: "くろいガラスで　できた　ふえ。\nつかった　ばしょで　つよいポケモンと\nそうぐう　しやすくなる。"
    jp_kanji: "黒いガラスで　できた　笛。\n使った　場所で　強いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from black glass. It makes it easier to\nencounter strong Pokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre noir.\nAugmente les chances de rencontrer des Pokémon\nsauvages puissants là où l’on en joue."
    it: "Flauto fatto di vetro nero. Aumenta le probabilità\ndi incontrare Pokémon forti nell’area in cui viene\nusato."
    de: "Eine Spielzeugflöte aus schwarzem Glas.\nErhöht am Einsatzort die Wahrscheinlichkeit,\nstarken wilden Pokémon zu begegnen."
    es: "Una flauta de cristal negro cuyas notas atraen a\nPokémon salvajes más fuertes al lugar en el que\nse usa."
    ko: "검은 유리로 만들어진 피리.\n사용한 장소에서 강한 포켓몬과\n만나기 쉬워진다."
    zh_simp: "以黑色玻璃制成的哨子。\n在使用的地方更容易\n遇到强大的宝可梦。"
    zh_trad: "以黑色玻璃製成的笛子。\n在使用的地方更容易\n遇到強大的寶可夢。"
black_glasses:
  names:
    jp_kana: くろいメガネ
    jp_kanji: くろいメガネ
    en: Black Glasses
    fr: Lunettes Noires
    it: Occhialineri
    de: Schattenglas
    es: Gafas de Sol
    ko: 검은안경
    zh_simp: 黑色眼镜
    zh_trad: 黑色眼鏡
  descriptions:
    jp_kana: "あやしく　みえる　メガネ。\nもたせると　あくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しく　みえる　メガネ。\n持たせると　あくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon. A pair of\nshady-looking glasses that boost the power of\nDark-type moves."
    fr: "Objet à tenir. Une paire de lunettes à l’aspect\nlouche qui augmente la puissance des capacités\nde type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nInquietante paio di occhiali che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Eine dunkle Brille, die Attacken\nvom Typ Unlicht verstärkt."
    es: "Debe llevarlas un Pokémon. Fortalecen los movimientos\nde tipo Siniestro."
    ko: "괴상하게 보이는 안경.\n지니게 하면 악타입\n기술의 위력이 올라간다."
    zh_simp: "看上去很奇怪的眼镜。\n携带后，恶属性的\n招式威力就会提高。"
    zh_trad: "看起來很奇怪的眼鏡。\n攜帶後，惡屬性的\n招式威力就會提高。"
black_sludge:
  names:
    jp_kana: くろいヘドロ
    jp_kanji: くろいヘドロ
    en: Black Sludge
    fr: Boue Noire
    it: Fangopece
    de: Giftschleim
    es: Lodo Negro
    ko: 검은진흙
    zh_simp: 黑色污泥
    zh_trad: 黑色污泥
  descriptions:
    jp_kana: "もたせると　どくタイプの　ポケモンは\nすこしずつ　ＨＰを　かいふくする。\nそれいがいは　ＨＰが　へってしまう。"
    jp_kanji: "持たせると　どくタイプの　ポケモンは\n少しずつ　ＨＰを　回復する。\nそれ以外は　ＨＰが　減ってしまう。"
    en: "An item to be held by a Pokémon. It gradually\nrestores HP to Poison-type Pokémon. It damages\nany other type."
    fr: "Objet à tenir. Restaure peu à peu les PV des\nPokémon de type Poison.\nInflige des dégâts à tous les autres types."
    it: "Strumento da dare a un Pokémon.\nRestituisce gradualmente PS ai Pokémon di tipo\nVeleno, ma danneggia tutti gli altri."
    de: "Ein Item zum Tragen, das einem Gift-Pokémon KP\nzurückgibt, anderen Pokémon aber Schaden zufügt."
    es: "Restaura gradualmente los PS de los Pokémon de\ntipo Veneno y daña a todos los demás."
    ko: "지니게 하면 독타입의 포켓몬은\n조금씩 HP를 회복한다.\n그 이외의 타입은 HP가 줄어 버린다."
    zh_simp: "携带后，毒属性的宝可梦\n会缓缓回复HP。\n其他属性的话，HP则会减少。"
    zh_trad: "攜帶後，毒屬性的寶可夢\n會緩緩回復HP。\n其他屬性的話，HP則會減少。"
blastoisinite:
  names:
    jp_kana: カメックスナイト
    jp_kanji: カメックスナイト
    en: Blastoisinite
    fr: Tortankite
    it: Blastoisite
    de: Turtoknit
    es: Blastoisita
    ko: 거북왕나이트
    zh_simp: 水箭龟进化石
    zh_trad: 水箭龜進化石
  descriptions:
    jp_kana: "たたかいのとき　カメックスを\nメガシンカ　させることが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "戦いのとき　カメックスを\nメガシンカ　させることが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nThis stone will enable Blastoise to Mega Evolve\nduring battle."
    fr: "Une variété de Méga-Gemme.\nElle permet à un Tortank de méga-évoluer durant\nun combat."
    it: "Un esemplare delle misteriose Megapietre.\nPermette a Blastoise di megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Ermöglicht es\neinem Turtok, im Kampf die Mega-Entwicklung\ndurchzuführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blastoise en combate."
    ko: "배틀할 때 거북왕을\n메가진화시킬 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "能在战斗时让水箭龟\n进行超级进化的\n一种神奇超级石。"
    zh_trad: "能在戰鬥時\n讓水箭龜進行超級進化的\n一種神奇超級石。"
blazikenite:
  names:
    jp_kana: バシャーモナイト
    jp_kanji: バシャーモナイト
    en: Blazikenite
    fr: Braségalite
    it: Blazikenite
    de: Lohgocknit
    es: Blazikenita
    ko: 번치코나이트
    zh_simp: 火焰鸡进化石
    zh_trad: 火焰雞進化石
  descriptions:
    jp_kana: "バシャーモに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バシャーモに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blaziken hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Braségali, elle lui permet de méga-évoluer\ndurant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Blaziken, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lohgock getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blaziken en combate."
    ko: "번치코에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "让火焰鸡携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "讓火焰雞攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
blue_apricorn:
  names:
    jp_kana: あおぼんぐり
    jp_kanji: あおぼんぐり
    en: Blue Apricorn
    fr: Noigrume Bleu
    it: Ghicocca Blu
    de: Aprikoko Blu
    es: Bonguri Azul
    ko: 파란규토리
    zh_simp: 蓝球果
    zh_trad: 藍球果
  descriptions:
    jp_kana: "あおい　ぼんぐり。\nすこし　あおくさい　かおりがする。"
    jp_kanji: "あおい　ぼんぐり。\n少し　あおくさい　かおりがする。"
    en: A blue Apricorn. It smells a bit like grass.
    fr: "Un Noigrume de couleur bleue.\nIl dégage un arôme un peu aigre."
    it: "Una Ghicocca di colore blu.\nEmana un odore un po’ acre."
    de: "Eine blaue Aprikoko. Ein frischer Geruch geht von\nihr aus."
    es: Bonguri de color azul y aroma tierno.
    ko: "파란색의 규토리.\n약간 풋내가 난다."
    zh_simp: "蓝色的球果。\n略有一股青草的香味。"
    zh_trad: "藍色的球果。\n略有一股青草的香味。"
blue_card:
  names:
    jp_kana: ブルーカード
    jp_kanji: ブルーカード
    en: Blue Card
    fr: Carte Bleue
    it: Carta Blu
    de: Blaue Karte
    es: Tarjeta Azul
    ko: 블루카드
    zh_simp: 蓝卡
    zh_trad: 藍卡
  descriptions:
    jp_kana: "「アオイのあいことば」　ばんぐみの\nポイントを　ためる　カード。"
    jp_kanji: "「アオイのあいことば」　番組の\nポイントを　貯める　カード。"
    en: "A card to save points for the\nBuena’s Password show."
    fr: "Une carte pour accumuler les points de l’émission\n« Le Mot de Passe de Buena »."
    it: "Carta per accumulare i punti del programma\n“Password Show” di Buena."
    de: "Eine Karte, auf der die Punkte für\n„Passwort mit Buena“ festgehalten werden."
    es: "Tarjeta para conseguir puntos con el programa de radio\nLas contraseñas de Buena."
    ko: "“규화의 암호” 방송의\n포인트를 모으는 카드."
    zh_simp: "可以将《葵妍的密语》\n这节目的点数积攒起来的卡片。"
    zh_trad: "可以將《葵妍的密語》\n這節目的點數\n儲存起來的卡片。"
blue_flute:
  names:
    jp_kana: あおいビードロ
    jp_kanji: あおいビードロ
    en: Blue Flute
    fr: Flûte Bleue
    it: Flauto Blu
    de: Blaue Flöte
    es: Flauta Azul
    ko: 파랑비드로
    zh_simp: 蓝色玻璃哨
    zh_trad: 藍色玻璃哨
  descriptions:
    jp_kana: "あおいガラスで　できた　ふえ。\nねむり　じょうたいを\nかいふくする。"
    jp_kanji: "青いガラスで　できた　笛。\n眠り状態を　回復する。"
    en: "A flute made from blue glass. It awakens\nsleeping Pokémon."
    fr: "Un jouet en forme de flûte en verre bleu.\nRéveille un Pokémon endormi."
    it: "Flauto fatto di vetro blu. Ha il potere di risvegliare\ni Pokémon addormentati."
    de: "Eine Spielzeugflöte aus blauem Glas. Weckt ein\nschlafendes Pokémon auf."
    es: "Una flauta de cristal azul cuyas notas despiertan a\nun Pokémon del sueño."
    ko: "파란 유리로 만들어진 피리.\n잠듦 상태를\n회복한다."
    zh_simp: "以蓝色玻璃制成的哨子。\n可以治愈睡眠状态。"
    zh_trad: "以藍色玻璃製成的笛子。\n可以治癒睡眠狀態。"
blue_orb:
  names:
    jp_kana: あいいろのたま
    jp_kanji: あいいろのたま
    en: Blue Orb
    fr: Gemme Bleue
    it: Gemma blu
    de: Blauer Edelstein
    es: Prisma Azul
    ko: 쪽빛구슬
    zh_simp: 靛蓝色宝珠
    zh_trad: 靛藍色寶珠
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあおく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあおく　かがやく　たま。"
    en: "A shiny blue orb that is said to have a legend tied\nto it. It’s known to have a deep connection with the\nHoenn region."
    fr: "Une gemme céruléenne dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi blu, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Ein blau schimmernder Stein, von dem in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Piedra añil que, según dicen, guarda una estrecha\nrelación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n파랗게 빛나는 구슬."
    zh_simp: "散发着蓝色光辉的宝珠。\n据说和丰缘地区的传说渊源颇深。"
    zh_trad: "據說和豐緣地區的傳說\n有著很深淵源的，\n散發著藍色光輝的寶珠。"
blue_petal:
  names:
    jp_kana: あおのはなびら
    jp_kanji: あおのはなびら
    en: Blue Petal
    fr: Pétale Bleu
    it: Petalo azzurro
    de: Blaues Blatt
    es: Pétalo Azul
    ko: 파랑꽃잎
    zh_simp: 蓝色花瓣
    zh_trad: 藍色花瓣
  descriptions:
    jp_kana: "マツリカのしれんで　スイレンから\nもらえる　はなびらの　おしばな。\n７しゅるい　あつめるのが　もくてき。"
    jp_kanji: "マツリカの試練で　スイレンから\nもらえる　はなびらの　押し花。\n７種類　集めるのが　目的。"
    en: "A pressed flower petal you receive from Lana\nduring Mina’s trial. The goal is to collect seven\ndifferent kinds of petals."
    fr: "Un pétale pressé que Néphie vous a remis lors de\nl’Épreuve d’Oléa. Il y en a sept à collectionner."
    it: "Petalo di fiore pressato ottenuto da Suiren durante\nla prova di Rika. L’obiettivo è ricevere sette petali\ndiversi."
    de: "Ein gepresstes Blütenblatt, das man im Rahmen von\nMatsurikas Prüfung von Tracy erhält. Ziel ist es,\nsieben verschiedene Blütenblätter zu sammeln."
    es: "Pétalo prensado recibido de manos de Nereida durante\nla prueba de Rika. El objetivo es reunir siete distintos."
    ko: "말리화의 시련에서 수련에게\n받을 수 있는 꽃잎의 압화.\n7종류 모으는 것이 목적."
    zh_simp: "在茉莉的考验中，\n能从水莲那里得到的干花花瓣。\n目标是集齐７种。"
    zh_trad: "在茉莉的考驗中，\n從水蓮那裡得到的壓花花瓣。\n目標是集滿７種花瓣。"
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    jp_kanji: あおいバンダナ
    en: Blue Scarf
    fr: Foulard Bleu
    it: Fascia Blu
    de: Blauer Schal
    es: Pañuelo Azul
    ko: 파랑밴드
    zh_simp: 蓝色头巾
    zh_trad: 藍色頭巾
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    en: "An item to be held by a Pokémon. During a contest,\nit raises the Beauty aspect of the Pokémon\nholding it."
    fr: "Objet à tenir. Augmente la Beauté d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Bellezza” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Schönheit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la belleza en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n아름답게 보인다."
    zh_simp: "携带它去参加华丽大赛的\n宝可梦会比平时\n看上去更加美丽。"
    zh_trad: "攜帶它去參加華麗大賽的\n寶可夢會比平時\n看起來更加美麗。"
blue_shard:
  names:
    jp_kana: あおいかけら
    jp_kanji: あおいかけら
    en: Blue Shard
    fr: Tesson Bleu
    it: Coccio Blu
    de: Indigostück
    es: Parte Azul
    ko: 파랑조각
    zh_simp: 蓝色碎片
    zh_trad: 藍色碎片
  descriptions:
    jp_kana: "あおい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "青い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small blue shard. It appears to be a fragment of\nsome sort of implement made long ago."
    fr: "Un petit tesson bleu.\nIl semble provenir d’un objet très ancien."
    it: "Un piccolo coccio blu che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine blaue Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento azul. Parece formar parte\nde algún tipo de herramienta antigua."
    ko: "파란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
    zh_simp: "蓝色的小碎片。\n好像是以前制作的\n某道具的一部分。"
    zh_trad: "藍色的小碎片。\n好像是以前製作的\n某道具的一部分。"
bluk_berry:
  names:
    jp_kana: ブリーのみ
    jp_kanji: ブリーのみ
    en: Bluk Berry
    fr: Baie Remu
    it: Baccamora
    de: Morbbeere
    es: Baya Oram
    ko: 블리열매
    zh_simp: 墨莓果
    zh_trad: 墨莓果
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nあおいろの　みは　たべると　しぶい。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n青色の実は　食べると　渋い。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty. Its blue flesh is sour when eaten."
    fr: "Une Baie violette et sèche, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter la Beauté\nd’un Pokémon."
    it: "Bacca viola dal sapore aspro usata per creare\nPokémelle che aumentano la Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIhr bläuliches Fruchtfleisch schmeckt herb."
    es: "Se utiliza en la producción de Pokécubos que potencian\nla belleza. Es de color azulado y sabor seco."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n파란색 열매는 먹으면 떫다."
    zh_simp: "用于制作宝可方块，\n制作出来的宝可方块可用来打磨美丽。\n蓝色的果实尝起来是涩的。"
    zh_trad: "製作用於增進美麗的\n寶可方塊時使用。\n藍色的果實嘗起來是澀的。"
boost_mulch:
  names:
    jp_kana: ぐんぐんこやし
    jp_kanji: ぐんぐんこやし
    en: Boost Mulch
    fr: Fertibérance
    it: Fertilcopioso
    de: Wuchermulch
    es: Abono Fructífero
    ko: 부쩍부쩍비료
    zh_simp: 劲劲肥
    zh_trad: 勁勁肥
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries. However, it appears\nto be unsuitable for the soil in the Hoenn region and\nhas no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres de Hoenn\net n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern. Durch seine\nUnverträglichkeit mit den Böden in Hoenn bleibt\nsein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
    zh_simp: "培育树果时的肥料。\n但完全不适合丰缘地区的土壤，\n所以没什么效果。"
    zh_trad: "培育樹果時的肥料。\n但完全不適合豐緣地區的土壤，\n所以沒什麼效果。"
bottle_cap:
  names:
    jp_kana: ぎんのおうかん
    jp_kanji: ぎんのおうかん
    en: Bottle Cap
    fr: Capsule d’Argent
    it: Tappo d’argento
    de: Silberkronkorken
    es: Chapa Plateada
    ko: 은왕관
    zh_simp: 银色王冠
    zh_trad: 銀色王冠
  descriptions:
    jp_kana: "ぎんいろの　きれいな　おうかん。\nわたすと　よろこぶ　ひともいる。"
    jp_kanji: "銀色の　きれいな　王冠。\n渡すと　よろこぶ　人もいる。"
    en: "A beautiful bottle cap that gives off a silver gleam.\nSome people are happy to receive one."
    fr: "Une jolie capsule en argent.\nCertaines personnes adorent en recevoir."
    it: "Un bel tappo a corona color argento, molto\napprezzato da alcuni."
    de: "Ein hübscher silberner Kronkorken. Es gibt Leute,\ndie sich sehr darüber freuen würden!"
    es: "Una bonita chapa de color plata. Hay gente que las\naprecia mucho."
    ko: "은색의 아름다운 왕관.\n받으면 좋아하는 사람도 있다."
    zh_simp: "银色的美丽王冠。\n有些人收到它会很高兴。"
    zh_trad: "銀色的美麗王冠。\n有些人收到它會很高興。"
bridge_mail_d:
  names:
    jp_kana: ブリッジメールＨ
    jp_kanji: ブリッジメールＨ
    en: Bridge Mail D
    fr: Lettre Pont Y
    it: Mess. Libec.
    de: Brückbrief M
    es: Carta Puente F
    ko: 브리지메일M
    zh_simp: 桥梁邮件Ｈ
    zh_trad: 橋梁郵件Ｈ
  descriptions:
    jp_kana: "まっかな　はねばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "真っ赤な　跳ね橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bright-red\ndrawbridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont mobile rouge.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nmobile di colore rosso fuoco.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine knallrote Zugbrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente levadizo de color\nrojo. Haz que la entregue un Pokémon."
    ko: "새빨간 도개교의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有鲜红色活动桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有大紅色活動橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_m:
  names:
    jp_kana: ブリッジメールＷ
    jp_kanji: ブリッジメールＷ
    en: Bridge Mail M
    fr: Lettre Pont I
    it: Mess. Merav.
    de: Brückbrief W
    es: Carta Puente P
    ko: 브리지메일W
    zh_simp: 桥梁邮件Ｗ
    zh_trad: 橋梁郵件Ｗ
  descriptions:
    jp_kana: "アーチを　えがいた　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "アーチを　描いた　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a majestically\narched bridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont à voûtes.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nad arco.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine geschwungene Brücke\nals Hintergrundmotiv. Gib es einem Pokémon zu\nTragen."
    es: "Carta con la imagen de un puente con varios arcos.\nHaz que la entregue un Pokémon."
    ko: "아치가 그려진 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有拱桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有拱橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_s:
  names:
    jp_kana: ブリッジメールＳ
    jp_kanji: ブリッジメールＳ
    en: Bridge Mail S
    fr: Lettre Pont S
    it: Mess. Frec.
    de: Brückbrief H
    es: Carta Puente S
    ko: 브리지메일S
    zh_simp: 桥梁邮件Ｓ
    zh_trad: 橋梁郵件Ｓ
  descriptions:
    jp_kana: "そらを　つらぬく　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "空を　つらぬく　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bridge that\nseems to pierce the sky. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres avec un motif de pont traversant\nle ciel. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nsospeso nel cielo.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine weit in den Himmel\nragende Brücke als Hintergrund. Gib es einem\nPokémon zum Tragen."
    es: "Carta con la imagen de un puente que se alza hacia\nel cielo. Haz que la entregue un Pokémon."
    ko: "하늘을 관통하는 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有通天桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有通天橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_t:
  names:
    jp_kana: ブリッジメールＣ
    jp_kanji: ブリッジメールＣ
    en: Bridge Mail T
    fr: Lettre Pont F
    it: Mess. Prop.
    de: Brückbrief Z
    es: Carta Puente A
    ko: 브리지메일C
    zh_simp: 桥梁邮件Ｃ
    zh_trad: 橋梁郵件Ｃ
  descriptions:
    jp_kana: "こうてつの　つりばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "鋼鉄の　つり橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a high-tension\nsteel suspension bridge. Have a Pokémon hold it\nfor delivery."
    fr: "Un papier à lettres avec un motif de pont suspendu\nen acier. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\nd’acciaio sospeso.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine stählerne Hängebrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente colgante de acero.\nHaz que la entregue un Pokémon."
    ko: "강철의 현수교 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有钢铁悬索桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有鋼鐵懸索橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bridge_mail_v:
  names:
    jp_kana: ブリッジメールＶ
    jp_kanji: ブリッジメールＶ
    en: Bridge Mail V
    fr: Lettre Pont H
    it: Mess. Vill.
    de: Brückbrief D
    es: Carta Puente V
    ko: 브리지메일V
    zh_simp: 桥梁邮件Ｖ
    zh_trad: 橋梁郵件Ｖ
  descriptions:
    jp_kana: "レンガづくりの　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "レンガ造りの　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a\nvintage-looking brick bridge. Have a Pokémon hold\nit for delivery."
    fr: "Un papier à lettres avec un motif de pont en briques.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine di un ponte\ndi mattoni.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine Brücke aus Ziegelsteinen\nals Hintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente de ladrillos.\nHaz que la entregue un Pokémon."
    ko: "벽돌로 만든 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
    zh_simp: "印有砖桥图案的信纸。\n使用该道具时，\n需要让宝可梦携带着来用。"
    zh_trad: "印有磚橋圖案的信紙。\n需讓寶可夢攜帶使用。"
bright_powder:
  names:
    jp_kana: ひかりのこな
    jp_kanji: ひかりのこな
    en: Bright Powder
    fr: Poudre Claire
    it: Luminpolvere
    de: Blendpuder
    es: Polvo Brillo
    ko: 반짝가루
    zh_simp: 光粉
    zh_trad: 光粉
  descriptions:
    jp_kana: "キラキラ　ひかるこな。　もたせると\nひかりが　あいてを　まどわして\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "キラキラ　光る粉。　持たせると\n光が　相手を　惑わして\n技が　命中しにくくなる。"
    en: "An item to be held by a Pokémon. It casts a tricky\nglare that lowers the opposing\nPokémon’s accuracy."
    fr: Objet à tenir. Intimide l’ennemi et baisse sa Précision.
    it: "Strumento da dare a un Pokémon.\nEmette un bagliore insidioso che riduce\nla precisione del nemico."
    de: "Ein Item, das einem Pokémon zum Tragen gegeben\nwerden kann. Es senkt die Genauigkeit des\nGegners."
    es: "Lanza un destello que baja la Precisión del enemigo.\nDebe llevarlo un Pokémon."
    ko: "반짝반짝 빛나는 가루. 지니게 하면\n빛이 상대를 혼란시켜\n기술이 명중되기 어려워진다."
    zh_simp: "闪闪发光的粉末。\n携带后，光芒会迷惑对手，\n从而使其招式变得不容易命中。"
    zh_trad: "閃閃發光的粉末。\n攜帶後，光芒會迷惑對手，\n進而使其招式變得不容易命中。"
bug_gem:
  names:
    jp_kana: むしのジュエル
    jp_kanji: むしのジュエル
    en: Bug Gem
    fr: Joyau Insecte
    it: Bijoucoleottero
    de: Käferjuwel
    es: Gema Bicho
    ko: 벌레주얼
    zh_simp: 虫之宝石
    zh_trad: 蟲之寶石
  descriptions:
    jp_kana: "むしの　タイプの　ジュエル。\nもたせると　いちどだけ　むしの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　ジュエル。\n持たせると　１度だけ　むしの\n技の　威力が　強まる。"
    en: "A gem with an insect-like essence. When held, it\nstrengthens the power of a Bug-type move\none time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Coleottero."
    de: "Ein Juwel vom Typ Käfer. Es erhöht einmalig die\nStärke einer Attacke vom Typ Käfer."
    es: "Joya de un solo uso que potencia los movimientos\nde tipo Bicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 주얼.\n지니게 하면 한 번만 벌레\n기술의 위력이 강해진다."
    zh_simp: "虫属性的宝石。\n携带后，虫属性的\n招式威力仅会增强１次。"
    zh_trad: "蟲屬性的寶石。\n攜帶後，蟲屬性招式的\n威力會僅增強１次。"
bug_memory:
  names:
    jp_kana: バグメモリ
    jp_kanji: バグメモリ
    en: Bug Memory
    fr: ROM Insecte
    it: ROM Coleottero
    de: Käfer-Disc
    es: Disco Bicho
    ko: 버그메모리
    zh_simp: 虫子存储碟
    zh_trad: 蟲子記憶碟
  descriptions:
    jp_kana: "むしタイプの　データが　はいった\nメモリ。　とくていの　ポケモンが\nもつと　タイプが　かわる。"
    jp_kanji: "むしタイプの　データが　入った\nメモリ。　特定の　ポケモンが　持つと\nタイプが　変わる。"
    en: "A memory disc that contains Bug-type data.\nIt changes the type of the holder if held by\na certain species of Pokémon."
    fr: "Une carte mémoire contenant des données sur\nle type Insecte. Un certain Pokémon peut changer\nde type en l’équipant."
    it: "ROM contenente dati sul tipo Coleottero in formato\ndigitale. Permette a un certo Pokémon di cambiare\ntipo."
    de: "Eine Disc mit Daten zum Typ Käfer.\nSie löst bei einem bestimmten Pokémon\neinen Typenwechsel aus."
    es: "Disco de datos que contiene información relativa al tipo\nBicho. Permite cambiar de tipo a cierto Pokémon."
    ko: "벌레타입의 데이터가 들어 있는\n메모리. 특정 포켓몬이\n지니면 타입이 바뀐다."
    zh_simp: "装有虫属性数据的存储碟。\n特定宝可梦携带后，\n属性就会发生变化。"
    zh_trad: "裝有蟲屬性資料的記憶碟。\n特定寶可夢攜帶後，\n就會產生屬性的變化。"
buginium_z:bag:
  names:
    jp_kana: ムシＺ
    jp_kanji: ムシＺ
    en: Buginium Z
    fr: Insectozélite
    it: Insectium Z
    de: Insectium Z
    es: Insectostal Z
    ko: 벌레Z
    zh_simp: 虫Ｚ
    zh_trad: 蟲Ｚ
  descriptions:
    jp_kana: "むしタイプの　わざを\nＺワザに　グレードアップする\nＺパワーの　けっしょうを　つくりだす。"
    jp_kanji: "むしタイプの　技を\nＺワザに　グレードアップする\nＺパワーの　結晶を　作りだす。"
    en: "It converts Z-Power into crystals that upgrade\nBug-type moves to Bug-type Z-Moves."
    fr: "Permet de concentrer la Force Z en un cristal,\nqui autorise son porteur à transformer ses capacités\nde type Insecte en capacité Z."
    it: "Permette di creare cristalli carichi di Potere Z che\nconsentono ai Pokémon di trasformare le mosse\ndi tipo Coleottero in mosse Z."
    de: "Kristallisierte Z-Kraft, die Käfer-Attacken zu\nZ-Attacken aufstuft. Wird bei Bedarf automatisch\nvervielfacht."
    es: "Concentra el Poder Z en cristales que permiten a\nlos portadores convertir sus movimientos de tipo\nBicho en movimientos Z."
    ko: "벌레타입 기술을\nZ기술로 업그레이드하는\nZ파워의 결정을 만들어 낸다."
    zh_simp: "可用它来制造用于对战\n并能将虫属性招式升级成\nＺ招式的Ｚ力量结晶。"
    zh_trad: "會製造出把蟲屬性招式\n升級為Ｚ招式的Ｚ力量結晶。"
buginium_z:held:
  names:
    jp_kana: ムシＺ
    jp_kanji: ムシＺ
    en: Buginium Z
    fr: Insectozélite
    it: Insectium Z
    de: Insectium Z
    es: Insectostal Z
    ko: 벌레Z
    zh_simp: 虫Ｚ
    zh_trad: 蟲Ｚ
  descriptions:
    jp_kana: "Ｚパワーの　けっしょう。\nむしタイプの　わざを\nＺワザに　グレードアップする。"
    jp_kanji: "Ｚパワーの　結晶。\nむしタイプの　技を\nＺワザに　グレードアップする。"
    en: "This is a crystallized form of Z-Power.\nIt upgrades Bug-type moves to Z-Moves."
    fr: "Une cristallisation de la Force Z, permettant de\ntransformer les capacités de type Insecte en capacité Z."
    it: "Cristallo in cui è immagazzinato il Potere Z.\nConsente di trasformare le mosse di tipo\nColeottero in mosse Z."
    de: "Ein Kristall, dem Z-Kraft innewohnt.\nEr stuft Käfer-Attacken zu Z-Attacken auf."
    es: "Cristal que confiere el Poder Z a los movimientos\nde tipo Bicho."
    ko: "Z파워의 결정.\n벌레타입 기술을\nZ기술로 업그레이드한다."
    zh_simp: "Ｚ力量的结晶。\n会将虫属性的招式\n升级成Ｚ招式。"
    zh_trad: "Ｚ力量的結晶。\n會把蟲屬性的招式\n升級為Ｚ招式。"
bulbasaur_candy:
  names:
    jp_kana: フシギダネのアメ
    jp_kanji: フシギダネのアメ
    en: Bulbasaur Candy
    fr: Bonbon Bulbizarre
    it: Caramella Bulbasaur
    de: Bisasam-Bonbon
    es: Caramelo Bulbasaur
    ko: 이상해씨의사탕
    zh_simp: 妙蛙种子的糖果
    zh_trad: 妙蛙種子的糖果
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nとくていの　ポケモンの　のうりょくを\nすべて　あげる。"
    jp_kanji: "エネルギーの　つまった　アメ。\n特定の　ポケモンの　能力を\nすべて　上げる。"
    en: "A candy that is packed with energy. When given to\ncertain Pokémon, it will increase all their stats at once."
    fr: "Un bonbon plein d’énergie.\nIl augmente toutes les stats d’un certain Pokémon."
    it: "Una caramella piena zeppa di energia.\nAumenta tutte le statistiche di determinati Pokémon."
    de: "Ein Bonbon, das voller Energie steckt.\nErhöht dauerhaft sämtliche Statuswerte eines\nbestimmten Pokémon."
    es: "Caramelo energético que aumenta todas las\ncaracterísticas de ciertos Pokémon."
    ko: "에너지가 가득한 사탕.\n특정 포켓몬의\n모든 능력을 올린다."
    zh_simp: "充满能量的糖果。\n能让特定宝可梦的\n所有能力上升。"
    zh_trad: "充滿能量的糖果。\n能提高特定寶可夢的\n所有能力。"
burn_drive:
  names:
    jp_kana: ブレイズカセット
    jp_kanji: ブレイズカセット
    en: Burn Drive
    fr: Module Pyro
    it: Piromodulo
    de: Flammenmodul
    es: PiroROM
    ko: 블레이즈카세트
    zh_simp: 火焰卡带
    zh_trad: 火焰卡帶
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nほのおタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nほのおタイプになる　カセット。"
    en: "A cassette to be held by Genesect. It changes\nGenesect’s Techno Blast move so it becomes\nFire type."
    fr: "Tenu par Genesect, ce module change la capacité\nTechno-Buster en une capacité de type Feu."
    it: "Modulo da dare a Genesect.\nTrasforma Tecnobotto in una mossa di tipo Fuoco."
    de: "Gibt man es Genesect zum Tragen, wandelt es den\nTyp der Attacke Techblaster in Feuer um."
    es: "Cartucho que convierte Tecno Shock de Genesect\nen un movimiento de tipo Fuego."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n불꽃타입으로 바뀌는 카세트."
    zh_simp: "这是让盖诺赛克特携带的卡带。\n携带后，高科技光炮这招式\n就会变为火属性。"
    zh_trad: "讓蓋諾賽克特攜帶的卡帶。\n攜帶後，招式高科技光炮\n會變為火屬性。"
burn_heal:
  names:
    jp_kana: やけどなおし
    jp_kanji: やけどなおし
    en: Burn Heal
    fr: Anti-Brûle
    it: Antiscottatura
    de: Feuerheiler
    es: Antiquemar
    ko: 화상치료제
    zh_simp: 灼伤药
    zh_trad: 灼傷藥
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　やけどの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　やけどの\n状態を　回復する。"
    en: "A spray-type medicine for treating burns. It can be\nused to heal a single Pokémon suffering from a burn."
    fr: "Un médicament sous forme de spray.\nSoigne les brûlures d’un Pokémon."
    it: "Rimedio spray.\nCura un Pokémon dalla scottatura."
    de: Ein Spray, das Verbrennungen eines Pokémon heilt.
    es: "Medicina en espray que cura las quemaduras a\nun Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n화상 상태를 회복한다."
    zh_simp: "喷雾式药水。\n能治愈１只宝可梦的\n灼伤状态。"
    zh_trad: "噴霧式藥水。\n能治癒１隻寶可夢的\n灼傷狀態。"
calcium:
  names:
    jp_kana: リゾチウム
    jp_kanji: リゾチウム
    en: Calcium
    fr: Calcium
    it: Calcio
    de: Kalzium
    es: Calcio
    ko: 리보플라빈
    zh_simp: 特攻增强剂
    zh_trad: 特攻增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくこうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the base Sp. Atk stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente l’Attaque\nSpéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dell’Attacco Speciale."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Angriffs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia el Ataque Especial\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n特攻的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n特攻的基礎點數。"
cameruptite:
  names:
    jp_kana: バクーダナイト
    jp_kanji: バクーダナイト
    en: Cameruptite
    fr: Caméruptite
    it: Cameruptite
    de: Cameruptnit
    es: Cameruptita
    ko: 폭타나이트
    zh_simp: 喷火驼进化石
    zh_trad: 噴火駝進化石
  descriptions:
    jp_kana: "バクーダに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バクーダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Camerupt hold it, and this stone will enable it\nto Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Camérupt, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Camerupt, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Camerupt getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Camerupt en combate."
    ko: "폭타에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
    zh_simp: "喷火驼携带后，\n在战斗时就能进行超级进化的\n一种神奇超级石。"
    zh_trad: "噴火駝攜帶後，\n在戰鬥時就能進行超級進化的\n一種神奇超級石。"
candy_jar:
  names:
    jp_kana: アメボトル
    jp_kanji: アメボトル
    en: Candy Jar
    fr: Bonbonnière
    it: Portacaramelle
    de: Bonbonglas
    es: Tarro de Caramelos
    ko: 사탕보틀
    zh_simp: 糖果罐
    zh_trad: 糖果罐
  descriptions:
    jp_kana: "ー\nー\nー"
    jp_kanji: "ー\nー\nー"
    en: "-\n-\n-"
    fr: "-\n-\n-"
    it: "-\n-\n-"
    de: "-\n-\n-"
    ko: "-\n-\n-"
    zh_simp: "ー\nー\nー"
    zh_trad: "ー\nー\nー"
carbos:
  names:
    jp_kana: インドメタシン
    jp_kanji: インドメタシン
    en: Carbos
    fr: Carbone
    it: Carburante
    de: Carbon
    es: Carburante
    ko: 알칼로이드
    zh_simp: 速度增强剂
    zh_trad: 速度增強劑
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　すばやさの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon. When consumed,\nit raises the base Speed stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente la Vitesse\nde base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Velocità."
    de: "Ein gehaltvolles Getränk, das den\nInitiative-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia la Velocidad de\nbase de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
    zh_simp: "宝可梦的营养饮料。\n能提高１只宝可梦的\n速度的基础点数。"
    zh_trad: "寶可夢的營養飲料。\n能提高１隻寶可夢的\n速度的基礎點數。"
card_key:goldenrod_radio_tower:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Schlüsselkarte
    es: Llave Magnética
    ko: 카드키
    zh_simp: 钥匙卡
    zh_trad: 鑰匙卡
  descriptions:
    jp_kana: "ラジオきょくの　シャッターを　あける\nカードしきの　カギ。"
    jp_kanji: "ラジオ局の　シャッターを　開ける\nカード式の　カギ。"
    en: "A card key that opens a shutter in the\nRadio Tower."
    fr: "Une clé en forme de carte permettant d’ouvrir\nles cloisons de la Tour Radio."
    it: "Chiave a scheda che apre le porte automatizzate\ndella Torre Radio."
    de: "Eine Schlüsselkarte, die eine Tür im Radioturm\nöffnet."
    es: "Llave con forma de tarjeta que abre las puertas\nde la Torre Radio."
    ko: "라디오방송국의 셔터를 여는\n카드식 열쇠."
    zh_simp: "用来打开电台卷帘门的\n卡片式钥匙。"
    zh_trad: "用來打開電臺鐵捲門的\n卡片式鑰匙。"
card_key:silph_co:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Schlüsselkarte
    es: Llave Magnética
    ko: 카드키
    zh_simp: 钥匙卡
    zh_trad: 鑰匙卡
  descriptions:
    jp_kana: "ヤマブキの　シルフカンパニー\nほんしゃ　ビルの　ドアロックを\nはずす　カードタイプの　カギ。"
    jp_kanji: "ヤマブキの　シルフカンパニー\n本社　ビルの　ドアロックを\nはずす　カードタイプの　カギ。"
    en: "A card key that unlocks doors in Silph Co.’s head\noffice in Saffron City."
    fr: "Une carte magnétique pouvant ouvrir les portes\ndu siège de la Sylphe SARL à Safrania."
    it: "Chiave a scheda per sbloccare le porte nella sede\ndella Silph S.p.A. a Zafferanopoli."
    de: "Eine Schlüsselkarte, mit der die Türen im Hauptsitz\nder Silph Company in Saffronia City geöffnet werden\nkönnen."
    es: "Esta tarjeta permite abrir las puertas de la Oficina\nCentral de Silph S. A. en Ciudad Azafrán."
    ko: "노랑시티의 실프주식회사\n본사 빌딩의 도어록을\n해제하는 카드 타입의 열쇠."
    zh_simp: "用来打开位于金黄市的\n西尔佛公司总部大厦门锁的\n卡片式钥匙。"
    zh_trad: "卡片型的鑰匙。\n能打開位於金黃市的\n西爾佛公司總部的門鎖。"
casteliacone:
  names:
    jp_kana: ヒウンアイス
    jp_kanji: ヒウンアイス
    en: Casteliacone
    fr: Glace Volute
    it: Conostropoli
    de: Stratos-Eis
    es: Porcehelado
    ko: 구름아이스
    zh_simp: 飞云冰淇淋
    zh_trad: 飛雲冰淇淋
  descriptions:
    jp_kana: "ヒウンシティの　めいぶつアイス。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ヒウンシティの　名物アイス。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Castelia City’s specialty, soft-serve ice cream.\nIt can be used once to heal all the status conditions\nof a Pokémon."
    fr: "Une spécialité de Volucité.\nSoigne toutes les altérations de statut d’un Pokémon."
    it: "Il famoso gelato di Austropoli. Cura tutti i problemi\ndi stato di un Pokémon."
    de: "Dieses Eis ist eine Spezialität aus Stratos City.\nEs behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Porcelana. Cura los problemas\nde estado de un Pokémon."
    ko: "구름시티의 명물 아이스.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
    zh_simp: "飞云市特产的冰淇淋。\n能治愈１只宝可梦的\n所有异常状态。"
    zh_trad: "飛雲市特產的冰淇淋。\n能治癒１隻寶可夢的\n所有異常狀態。"
catching_pocket:
  names:
    jp_kana: ほかくポケット
    jp_kanji: ほかくポケット
    en: Catching Pocket
    fr: Poche de Capture
    it: Tasca cattura
    de: Fangtasche
    es: Bolsillo Captura
    ko: 포획포켓
    zh_simp: 捕捉口袋
    zh_trad: 捕捉口袋
