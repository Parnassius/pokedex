        jp_kanji:
          lets_go_pikachu: "鉄分　たっぷりの　大地で\n暮らすうちに　頭の　てっぺんから\n鋼の　ヒゲが　３本　生えた。"
          lets_go_eevee: "鉄分　たっぷりの　大地で\n暮らすうちに　頭の　てっぺんから\n鋼の　ヒゲが　３本　生えた。"
        en:
