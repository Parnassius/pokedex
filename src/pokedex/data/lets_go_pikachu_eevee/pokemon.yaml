          lets_go_eevee: "우연히 마주쳤을 때 다른 곳으로\n눈을 돌리지 않으면 위험하다.\n손에 든 추로 잠재워 버린다."
        zh_simp:
          lets_go_pikachu: "无意中遇到它的时候，如果\n不小心和它对上视线会很危险。\n它手里拿着的钟摆会让人睡着。"
