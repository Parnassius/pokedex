          lets_go_pikachu: "からだは　ちいさくなったが　パワーは\nケタはずれ。　かるく　ねんじるだけで\nこうそうビルも　こっぱみじん　だ。"
          lets_go_eevee: "からだは　ちいさくなったが　パワーは\nケタはずれ。　かるく　ねんじるだけで\nこうそうビルも　こっぱみじん　だ。"
        jp_kanji:
          lets_go_pikachu: "身体は　小さくなったが　パワーは\nケタはずれ。　軽く　念じるだけで\n高層ビルも　木っ端微塵　だ。"
          lets_go_eevee: "身体は　小さくなったが　パワーは\nケタはずれ。　軽く　念じるだけで\n高層ビルも　木っ端微塵　だ。"
        en:
          lets_go_pikachu: "Despite its diminished size, its mental power\nhas grown phenomenally. With a mere thought,\nit can smash a skyscraper to smithereens."
          lets_go_eevee: "Despite its diminished size, its mental power\nhas grown phenomenally. With a mere thought,\nit can smash a skyscraper to smithereens."
        fr:
          lets_go_pikachu: "Son corps a rétréci, mais sa puissance s’est\ndémultipliée. Il peut réduire un gratte-ciel\nen miettes d’une simple pensée."
          lets_go_eevee: "Son corps a rétréci, mais sa puissance s’est\ndémultipliée. Il peut réduire un gratte-ciel\nen miettes d’une simple pensée."
        it:
          lets_go_pikachu: "Il suo corpo si è rimpicciolito, ma la sua potenza\nè aumentata a dismisura. Gli basta concentrarsi\nappena per fare a pezzi un intero edificio."
          lets_go_eevee: "Il suo corpo si è rimpicciolito, ma la sua potenza\nè aumentata a dismisura. Gli basta concentrarsi\nappena per fare a pezzi un intero edificio."
        de:
          lets_go_pikachu: "Obwohl sein Körper geschrumpft ist, verfügt es\nüber gewaltige Stärke. Mit bloßer Willenskraft\nkann es ein ganzes Hochhaus zertrümmern."
          lets_go_eevee: "Obwohl sein Körper geschrumpft ist, verfügt es\nüber gewaltige Stärke. Mit bloßer Willenskraft\nkann es ein ganzes Hochhaus zertrümmern."
        es:
          lets_go_pikachu: "Aunque su cuerpo se ha encogido, el poder tan\nextraordinario que atesora le permite reducir\na escombros un rascacielos con solo pensarlo."
          lets_go_eevee: "Aunque su cuerpo se ha encogido, el poder tan\nextraordinario que atesora le permite reducir\na escombros un rascacielos con solo pensarlo."
        ko:
          lets_go_pikachu: "몸집은 작아졌지만 파워는 상상을\n초월한다. 가벼운 염력만으로\n고층빌딩도 산산이 조각난다."
          lets_go_eevee: "몸집은 작아졌지만 파워는 상상을\n초월한다. 가벼운 염력만으로\n고층빌딩도 산산이 조각난다."
        zh_simp:
          lets_go_pikachu: "虽然身体变小了，力量却大到无法\n计算。只要稍稍使用念力，哪怕\n是高楼大厦也会化为灰烬。"
          lets_go_eevee: "虽然身体变小了，力量却大到无法\n计算。只要稍稍使用念力，哪怕\n是高楼大厦也会化为灰烬。"
        zh_trad:
          lets_go_pikachu: "雖然身體變小，力量卻大到\n難以估計。只要稍微使出一些\n念力就能將高樓大廈化成灰燼。"
          lets_go_eevee: "雖然身體變小，力量卻大到\n難以估計。只要稍微使出一些\n念力就能將高樓大廈化成灰燼。"
