        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 38
        attack: 41
        defense: 40
        special_attack: 50
        special_defense: 65
        speed: 65
      types:
        - ice
      descriptions:
        jp_kana:
          lets_go_pikachu: "はく　いきは　マイナス　５０ど。\nまるで　ゆきの　うまれかわり。\nまたの　なを　ケオケオと　いう。"
          lets_go_eevee: "はく　いきは　マイナス　５０ど。\nまるで　ゆきの　うまれかわり。\nまたの　なを　ケオケオと　いう。"
        jp_kanji:
          lets_go_pikachu: "吐く　息は　マイナス　５０度。\nまるで　雪の　生まれ変わり。\nまたの　名を　ケオケオと　いう。"
          lets_go_eevee: "吐く　息は　マイナス　５０度。\nまるで　雪の　生まれ変わり。\nまたの　名を　ケオケオと　いう。"
        en:
          lets_go_pikachu: "It looks like snow come to life, and the breath\nit exhales is −58 degrees Fahrenheit. Another\nname for it is Keokeo."
          lets_go_eevee: "It looks like snow come to life, and the breath\nit exhales is −58 degrees Fahrenheit. Another\nname for it is Keokeo."
        fr:
          lets_go_pikachu: "Si la neige prenait vie, elle ressemblerait à ce\nPokémon. Doté d’un souffle à -50 ºC, il est aussi\nconnu sous le nom de « Ke’oke’o »."
          lets_go_eevee: "Si la neige prenait vie, elle ressemblerait à ce\nPokémon. Doté d’un souffle à -50 ºC, il est aussi\nconnu sous le nom de « Ke’oke’o »."
        it:
          lets_go_pikachu: "Se la neve fosse un Pokémon, avrebbe\nil suo aspetto. Il suo soffio gelido raggiunge\ni -50 ºC. Alcuni lo chiamano “Ke’oke’o”."
          lets_go_eevee: "Se la neve fosse un Pokémon, avrebbe\nil suo aspetto. Il suo soffio gelido raggiunge\ni -50 ºC. Alcuni lo chiamano “Ke’oke’o”."
        de:
          lets_go_pikachu: "Sein Atem ist -50 ºC kalt und es sieht aus wie\nlebendig gewordener Schnee. Man kennt es auch\nunter dem Namen „Ke’oke’o“."
          lets_go_eevee: "Sein Atem ist -50 ºC kalt und es sieht aus wie\nlebendig gewordener Schnee. Man kennt es auch\nunter dem Namen „Ke’oke’o“."
        es:
          lets_go_pikachu: "Expulsa aire gélido a -50 °C y se asemeja a un\nmontoncito de nieve que hubiera cobrado vida.\nTambién es conocido por el nombre de Keo-Keo."
          lets_go_eevee: "Expulsa aire gélido a -50 °C y se asemeja a un\nmontoncito de nieve que hubiera cobrado vida.\nTambién es conocido por el nombre de Keo-Keo."
        ko:
