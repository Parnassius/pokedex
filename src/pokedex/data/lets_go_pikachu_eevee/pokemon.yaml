          lets_go_eevee: "악취가 심하다! 기절할 정도로\n강렬하지만 질뻐기는 코가\n퇴화해서 냄새를 맡지 못한다."
        zh_simp:
          lets_go_pikachu: "非常难闻！气味臭到让人\n窒息，但由于鼻子的退化，\n它自己完全闻不到味道。"
