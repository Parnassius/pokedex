          lets_go_eevee: "온몸에 넘치는 엄청난 파워가\n몸을 검게 물들이고\n푸른 불꽃을 이글이글 태운다."
        zh_simp:
          lets_go_pikachu: "全身充斥着非比寻常的力量，\n这种力量染黑了它的身体，\n燃烧出炽热的蓝色火焰。"
          lets_go_eevee: "全身充斥着非比寻常的力量，\n这种力量染黑了它的身体，\n燃烧出炽热的蓝色火焰。"
        zh_trad:
