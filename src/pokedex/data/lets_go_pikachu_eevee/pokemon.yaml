          lets_go_eevee: "La planta de los pies se le vuelve tan dura como\nel diamante al dar patadas a su oponente, hasta\nel punto de aniquilarlo."
        ko:
          lets_go_pikachu: "킥이 명중하는 순간!\n발바닥이 다이아몬드처럼\n단단해져서 상대를 파괴한다."
          lets_go_eevee: "킥이 명중하는 순간!\n발바닥이 다이아몬드처럼\n단단해져서 상대를 파괴한다."
        zh_simp:
          lets_go_pikachu: "在踢中敌人的瞬间，\n脚底会变得像钻石般坚硬，\n将对手踢成碎片。"
          lets_go_eevee: "在踢中敌人的瞬间，\n脚底会变得像钻石般坚硬，\n将对手踢成碎片。"
