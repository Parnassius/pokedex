          lets_go_eevee: "とろりと　とけた　はがねの　からだ。\nちちゅうの　てつぶんや　きんぞくを\nとかして　きゅうしゅうする。"
        jp_kanji:
          lets_go_pikachu: "とろりと　溶けた　鋼の　体。\n地中の　鉄分や　金属を\n溶かして　吸収する。"
          lets_go_eevee: "とろりと　溶けた　鋼の　体。\n地中の　鉄分や　金属を\n溶かして　吸収する。"
        en:
          lets_go_pikachu: "It melts particles of iron and other metals found\nin the subsoil, so it can absorb them into its\nbody of molten steel."
          lets_go_eevee: "It melts particles of iron and other metals found\nin the subsoil, so it can absorb them into its\nbody of molten steel."
        fr:
