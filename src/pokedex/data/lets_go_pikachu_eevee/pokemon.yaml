          lets_go_eevee: "Autrefois vénéré pour son aptitude à produire\ndu fer, ce Pokémon a mystérieusement ressuscité\naprès 3 000 ans."
        it:
          lets_go_pikachu: "In passato era venerato perché lo si riteneva\ncapace di generare ferro. È misteriosamente\nricomparso dopo 3.000 anni di assenza."
          lets_go_eevee: "In passato era venerato perché lo si riteneva\ncapace di generare ferro. È misteriosamente\nricomparso dopo 3.000 anni di assenza."
        de:
