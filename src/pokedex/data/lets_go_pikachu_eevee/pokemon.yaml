          lets_go_eevee: "キックがあたる　しゅんかん！\nあしのウラが　ダイヤモンドのように\nかたくなって　あいてを　はかいする。"
        jp_kanji:
          lets_go_pikachu: "キックがあたる　瞬間！\n足のウラが　ダイヤモンドのように\n硬くなって　相手を　破壊する。"
          lets_go_eevee: "キックがあたる　瞬間！\n足のウラが　ダイヤモンドのように\n硬くなって　相手を　破壊する。"
        en:
          lets_go_pikachu: "When kicking, the sole of its foot turns as hard\nas a diamond on impact and destroys its enemy."
          lets_go_eevee: "When kicking, the sole of its foot turns as hard\nas a diamond on impact and destroys its enemy."
        fr:
          lets_go_pikachu: "Ses pieds deviennent durs comme le diamant\nquand il donne des coups, pulvérisant ainsi\nses adversaires."
          lets_go_eevee: "Ses pieds deviennent durs comme le diamant\nquand il donne des coups, pulvérisant ainsi\nses adversaires."
        it:
          lets_go_pikachu: "Nel momento in cui il suo calcio colpisce,\nla pianta del piede si fa dura come il diamante\nproducendo un impatto devastante."
          lets_go_eevee: "Nel momento in cui il suo calcio colpisce,\nla pianta del piede si fa dura come il diamante\nproducendo un impatto devastante."
        de:
          lets_go_pikachu: "Tritt ein Kicklee zu, wird die Unterseite seines\nFußes im Moment des Aufpralls hart wie ein\nDiamant. So zerschmettert es seinen Gegner."
          lets_go_eevee: "Tritt ein Kicklee zu, wird die Unterseite seines\nFußes im Moment des Aufpralls hart wie ein\nDiamant. So zerschmettert es seinen Gegner."
        es:
