      descriptions:
        jp_kana:
          lets_go_pikachu: "じぶんたちの　せかいを　だいじに\nしているらしく　めったに　ひとまえに\nでてこない　ようせいの　なかま。"
          lets_go_eevee: "じぶんたちの　せかいを　だいじに\nしているらしく　めったに　ひとまえに\nでてこない　ようせいの　なかま。"
        jp_kanji:
          lets_go_pikachu: "自分たちの　世界を　大事に\nしているらしく　めったに　人前に\n出てこない　妖精の　仲間。"
          lets_go_eevee: "自分たちの　世界を　大事に\nしているらしく　めったに　人前に\n出てこない　妖精の　仲間。"
        en:
          lets_go_pikachu: "They appear to be very protective of their own\nworld. It is a kind of fairy, rarely seen by people."
          lets_go_eevee: "They appear to be very protective of their own\nworld. It is a kind of fairy, rarely seen by people."
        fr:
          lets_go_pikachu: "Ce Pokémon à l’aspect féérique semble très\nattaché à son habitat et ne se montre que\nrarement."
          lets_go_eevee: "Ce Pokémon à l’aspect féérique semble très\nattaché à son habitat et ne se montre que\nrarement."
        it:
          lets_go_pikachu: "Sembra che queste creature simili alle fate siano\nmolto protettive verso il loro habitat.\nSi mostrano agli esseri umani solo di rado."
          lets_go_eevee: "Sembra che queste creature simili alle fate siano\nmolto protettive verso il loro habitat.\nSi mostrano agli esseri umani solo di rado."
        de:
          lets_go_pikachu: "Dieses feenhafte Pokémon scheint sein Reich\nmit großem Eifer zu schützen. Es zeigt sich den\nMenschen nur selten."
          lets_go_eevee: "Dieses feenhafte Pokémon scheint sein Reich\nmit großem Eifer zu schützen. Es zeigt sich den\nMenschen nur selten."
        es:
          lets_go_pikachu: "Un Pokémon de aspecto feérico que protege\ncon celo su entorno y muy rara vez se deja ver\npor los humanos."
          lets_go_eevee: "Un Pokémon de aspecto feérico que protege\ncon celo su entorno y muy rara vez se deja ver\npor los humanos."
        ko:
          lets_go_pikachu: "자신들의 세계를 소중히\n생각하고 있는 듯 좀처럼 사람 앞에\n나타나지 않는 요정의 일종."
          lets_go_eevee: "자신들의 세계를 소중히\n생각하고 있는 듯 좀처럼 사람 앞에\n나타나지 않는 요정의 일종."
        zh_simp:
          lets_go_pikachu: "妖精的一种。\n似乎非常珍惜自己的世界，\n很少在人类面前现身。"
          lets_go_eevee: "妖精的一种。\n似乎非常珍惜自己的世界，\n很少在人类面前现身。"
        zh_trad:
          lets_go_pikachu: "妖精的一種。\n似乎非常珍惜自己的世界，\n很少在人們面前現身。"
          lets_go_eevee: "妖精的一種。\n似乎非常珍惜自己的世界，\n很少在人們面前現身。"
