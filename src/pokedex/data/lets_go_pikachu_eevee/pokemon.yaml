bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    jp_kanji: フシギダネ
    en: Bulbasaur
    fr: Bulbizarre
    it: Bulbasaur
    de: Bisasam
    es: Bulbasaur
    ko: 이상해씨
    zh_simp: 妙蛙种子
    zh_trad: 妙蛙種子
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      types:
        - grass
        - poison
      descriptions:
        jp_kana:
          lets_go_pikachu: "なんにちだって　なにも　たべなくても\nげんき！　せなかのタネに　たくさん\nえいようが　あるから　へいきだ！"
          lets_go_eevee: "なんにちだって　なにも　たべなくても\nげんき！　せなかのタネに　たくさん\nえいようが　あるから　へいきだ！"
        jp_kanji:
          lets_go_pikachu: "何日だって　なにも　食べなくても\n元気！　背中のタネに　たくさん\n栄養が　あるから　平気だ！"
          lets_go_eevee: "何日だって　なにも　食べなくても\n元気！　背中のタネに　たくさん\n栄養が　あるから　平気だ！"
        en:
          lets_go_pikachu: "It can go for days without eating a single morsel.\nIn the bulb on its back, it stores energy."
          lets_go_eevee: "It can go for days without eating a single morsel.\nIn the bulb on its back, it stores energy."
        fr:
          lets_go_pikachu: "Il peut survivre plusieurs jours sans manger\ngrâce aux nutriments contenus dans le bulbe\nsur son dos."
          lets_go_eevee: "Il peut survivre plusieurs jours sans manger\ngrâce aux nutriments contenus dans le bulbe\nsur son dos."
        it:
          lets_go_pikachu: "Questo Pokémon può stare a lungo senza\nmangiare. Accumula energia nel bulbo che\nha sulla schiena."
          lets_go_eevee: "Questo Pokémon può stare a lungo senza\nmangiare. Accumula energia nel bulbo che\nha sulla schiena."
        de:
          lets_go_pikachu: "Es kommt tagelang ohne Nahrung aus, da es\nin den Samen auf seinem Rücken Nährstoffe\nspeichert."
          lets_go_eevee: "Es kommt tagelang ohne Nahrung aus, da es\nin den Samen auf seinem Rücken Nährstoffe\nspeichert."
        es:
          lets_go_pikachu: "Puede sobrevivir largo tiempo sin probar\nbocado gracias a los nutrientes que guarda\nen el bulbo del lomo."
          lets_go_eevee: "Puede sobrevivir largo tiempo sin probar\nbocado gracias a los nutrientes que guarda\nen el bulbo del lomo."
        ko:
          lets_go_pikachu: "며칠 동안 아무것도 먹지 않아도\n건강하다! 등에 있는 씨앗에는\n많은 영양분이 있어서 문제없다!"
          lets_go_eevee: "며칠 동안 아무것도 먹지 않아도\n건강하다! 등에 있는 씨앗에는\n많은 영양분이 있어서 문제없다!"
        zh_simp:
          lets_go_pikachu: "背上的种子里储存着营养，\n所以即使好几天不吃东西\n也可以活得好好的！"
          lets_go_eevee: "背上的种子里储存着营养，\n所以即使好几天不吃东西\n也可以活得好好的！"
        zh_trad:
          lets_go_pikachu: "背上的種子裡存著很多營養，\n所以就算好幾天不吃東西\n也能活得好好的！"
          lets_go_eevee: "背上的種子裡存著很多營養，\n所以就算好幾天不吃東西\n也能活得好好的！"
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    jp_kanji: フシギソウ
    en: Ivysaur
    fr: Herbizarre
    it: Ivysaur
    de: Bisaknosp
    es: Ivysaur
    ko: 이상해풀
    zh_simp: 妙蛙草
    zh_trad: 妙蛙草
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      types:
        - grass
        - poison
      descriptions:
        jp_kana:
          lets_go_pikachu: "ようぶんを　とって　おおきくなった\nつぼみから　かおりが　ただよいだすと\nもうすぐ　ハナがひらく　しょうこだ。"
          lets_go_eevee: "ようぶんを　とって　おおきくなった\nつぼみから　かおりが　ただよいだすと\nもうすぐ　ハナがひらく　しょうこだ。"
        jp_kanji:
          lets_go_pikachu: "養分を　摂って　大きくなった\nつぼみから　香りが　漂いだすと\nもうすぐ　ハナが開く　証拠だ。"
          lets_go_eevee: "養分を　摂って　大きくなった\nつぼみから　香りが　漂いだすと\nもうすぐ　ハナが開く　証拠だ。"
        en:
          lets_go_pikachu: "The bud on its back grows by drawing energy. It\ngives off an aroma when it is ready to bloom."
          lets_go_eevee: "The bud on its back grows by drawing energy. It\ngives off an aroma when it is ready to bloom."
        fr:
          lets_go_pikachu: "En emmagasinant de l’énergie, son bulbe grossit.\nUn arôme en émane quand il s’apprête à éclore."
          lets_go_eevee: "En emmagasinant de l’énergie, son bulbe grossit.\nUn arôme en émane quand il s’apprête à éclore."
        it:
          lets_go_pikachu: "Il suo bocciolo cresce assorbendo nutrimento e,\nquando è prossimo alla fioritura, emana un\nforte profumo."
          lets_go_eevee: "Il suo bocciolo cresce assorbendo nutrimento e,\nquando è prossimo alla fioritura, emana un\nforte profumo."
        de:
          lets_go_pikachu: "Die Knospe auf seinem Rücken wächst, indem\nsie Nährstoffe absorbiert. Kurz vor der Blüte\nsondert sie einen Duft ab."
          lets_go_eevee: "Die Knospe auf seinem Rücken wächst, indem\nsie Nährstoffe absorbiert. Kurz vor der Blüte\nsondert sie einen Duft ab."
        es:
          lets_go_pikachu: "Su bulbo crece a medida que absorbe nutrientes.\nDesprende un cierto aroma cuando está a punto\nde florecer."
          lets_go_eevee: "Su bulbo crece a medida que absorbe nutrientes.\nDesprende un cierto aroma cuando está a punto\nde florecer."
        ko:
          lets_go_pikachu: "양분을 흡수해서 커진 봉오리에서\n향기가 나기 시작하면\n곧 꽃이 핀다는 증거다."
          lets_go_eevee: "양분을 흡수해서 커진 봉오리에서\n향기가 나기 시작하면\n곧 꽃이 핀다는 증거다."
        zh_simp:
          lets_go_pikachu: "它的花苞会在吸收养分后\n长大。当花苞发出香味时，\n就预示着它快要开花了。"
          lets_go_eevee: "它的花苞会在吸收养分后\n长大。当花苞发出香味时，\n就预示着它快要开花了。"
        zh_trad:
          lets_go_pikachu: "在吸收了養分後，\n變大的花苞開始飄出香氣時，\n就表示快要開花了。"
          lets_go_eevee: "在吸收了養分後，\n變大的花苞開始飄出香氣時，\n就表示快要開花了。"
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    jp_kanji: フシギバナ
    en: Venusaur
    fr: Florizarre
    it: Venusaur
    de: Bisaflor
    es: Venusaur
    ko: 이상해꽃
    zh_simp: 妙蛙花
    zh_trad: 妙蛙花
  forms:
    venusaur:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      types:
        - grass
        - poison
      descriptions:
        jp_kana:
          lets_go_pikachu: "せなかに　はえた　おおきな　ハナは\nたいようの　ひかりを　きゅうしゅうし\nエネルギーに　へんかん　できる。"
          lets_go_eevee: "せなかに　はえた　おおきな　ハナは\nたいようの　ひかりを　きゅうしゅうし\nエネルギーに　へんかん　できる。"
        jp_kanji:
          lets_go_pikachu: "背中に　生えた　大きな　ハナは\n太陽の　光を　吸収し\nエネルギーに　変換　できる。"
          lets_go_eevee: "背中に　生えた　大きな　ハナは\n太陽の　光を　吸収し\nエネルギーに　変換　できる。"
        en:
          lets_go_pikachu: "The flower on its back catches the sun’s rays.\nThe sunlight is then absorbed and\nused for energy."
          lets_go_eevee: "The flower on its back catches the sun’s rays.\nThe sunlight is then absorbed and\nused for energy."
        fr:
          lets_go_pikachu: "Les pétales de sa fleur dorsale absorbent les\nrayons du soleil pour les convertir en énergie."
          lets_go_eevee: "Les pétales de sa fleur dorsale absorbent les\nrayons du soleil pour les convertir en énergie."
        it:
          lets_go_pikachu: "Il grande fiore che ha sulla schiena può assorbire\ni raggi solari e trasformarli in energia."
          lets_go_eevee: "Il grande fiore che ha sulla schiena può assorbire\ni raggi solari e trasformarli in energia."
        de:
          lets_go_pikachu: "Die große Blume auf seinem Rücken absorbiert\nSonnenlicht und kann dieses in Energie\numwandeln."
          lets_go_eevee: "Die große Blume auf seinem Rücken absorbiert\nSonnenlicht und kann dieses in Energie\numwandeln."
        es:
          lets_go_pikachu: "La flor que tiene en el lomo puede recoger los\nrayos solares para transformarlos en energía."
          lets_go_eevee: "La flor que tiene en el lomo puede recoger los\nrayos solares para transformarlos en energía."
        ko:
          lets_go_pikachu: "등 위에 활짝 핀 큰 꽃은\n태양 빛을 흡수해서\n에너지로 변환할 수 있다."
          lets_go_eevee: "등 위에 활짝 핀 큰 꽃은\n태양 빛을 흡수해서\n에너지로 변환할 수 있다."
        zh_simp:
          lets_go_pikachu: "它背上开出的大花\n能够吸收太阳光\n并将其转换为能量。"
          lets_go_eevee: "它背上开出的大花\n能够吸收太阳光\n并将其转换为能量。"
        zh_trad:
          lets_go_pikachu: "長在背上的大花\n能夠吸收太陽光，\n並轉換成能量。"
          lets_go_eevee: "長在背上的大花\n能夠吸收太陽光，\n並轉換成能量。"
    venusaur_mega:
      form_id: 1
      names:
        jp_kana: メガフシギバナ
        jp_kanji: メガフシギバナ
        en: Mega Venusaur
        fr: Méga-Florizarre
        it: MegaVenusaur
        de: Mega-Bisaflor
        es: Mega-Venusaur
        ko: 메가이상해꽃
        zh_simp: 超级妙蛙花
        zh_trad: 超級妙蛙花
      base_stats:
        hp: 80
        attack: 100
        defense: 123
        special_attack: 122
        special_defense: 120
        speed: 80
      types:
        - grass
        - poison
      descriptions:
        jp_kana:
          lets_go_pikachu: "メガシンカして　さらに　おおきく\nせいちょうした　ハナを　ささえるため\nあしこしも　たくましく　なったのだ。"
          lets_go_eevee: "メガシンカして　さらに　おおきく\nせいちょうした　ハナを　ささえるため\nあしこしも　たくましく　なったのだ。"
        jp_kanji:
          lets_go_pikachu: "メガシンカして　さらに　大きく\n成長した　花を　支えるため\n足腰も　たくましく　なったのだ。"
          lets_go_eevee: "メガシンカして　さらに　大きく\n成長した　花を　支えるため\n足腰も　たくましく　なったのだ。"
        en:
          lets_go_pikachu: "In order to support its flower, which has grown\nlarger due to Mega Evolution, its back and legs\nhave become stronger."
          lets_go_eevee: "In order to support its flower, which has grown\nlarger due to Mega Evolution, its back and legs\nhave become stronger."
        fr:
          lets_go_pikachu: "Ses pattes se sont renforcées pour supporter\nle poids de sa fleur dorsale, qui s’est épanouie\ndavantage grâce à la Méga-Évolution."
          lets_go_eevee: "Ses pattes se sont renforcées pour supporter\nle poids de sa fleur dorsale, qui s’est épanouie\ndavantage grâce à la Méga-Évolution."
        it:
          lets_go_pikachu: "Le zampe si sono irrobustite per sostenere\nil fiore sul dorso, diventato ancora più grande\nper via della megaevoluzione."
          lets_go_eevee: "Le zampe si sono irrobustite per sostenere\nil fiore sul dorso, diventato ancora più grande\nper via della megaevoluzione."
        de:
          lets_go_pikachu: "Die Mega-Entwicklung macht die Blume auf\nseinem Rücken noch größer. Um ihr Gewicht\nzu tragen, wurden Beine und Rumpf robuster."
          lets_go_eevee: "Die Mega-Entwicklung macht die Blume auf\nseinem Rücken noch größer. Um ihr Gewicht\nzu tragen, wurden Beine und Rumpf robuster."
        es:
          lets_go_pikachu: "Sus patas y lomo se han fortalecido para\nsoportar el peso de la flor, que ha crecido\nconsiderablemente tras la megaevolución."
          lets_go_eevee: "Sus patas y lomo se han fortalecido para\nsoportar el peso de la flor, que ha crecido\nconsiderablemente tras la megaevolución."
        ko:
          lets_go_pikachu: "메가진화하여 더욱 크게\n성장한 꽃을 지탱하기 위해\n등과 다리가 더욱 튼튼해졌다."
          lets_go_eevee: "메가진화하여 더욱 크게\n성장한 꽃을 지탱하기 위해\n등과 다리가 더욱 튼튼해졌다."
        zh_simp:
          lets_go_pikachu: "为了支撑在超级进化后\n成长得更大的花，它的\n腰腿也变得更加健壮了。"
          lets_go_eevee: "为了支撑在超级进化后\n成长得更大的花，它的\n腰腿也变得更加健壮了。"
        zh_trad:
          lets_go_pikachu: "為了支撐超級進化之後\n變得更大的花，下盤的\n筋骨變得更加強壯了。"
          lets_go_eevee: "為了支撐超級進化之後\n變得更大的花，下盤的\n筋骨變得更加強壯了。"
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    jp_kanji: ヒトカゲ
    en: Charmander
    fr: Salamèche
    it: Charmander
    de: Glumanda
    es: Charmander
    ko: 파이리
    zh_simp: 小火龙
    zh_trad: 小火龍
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      types:
        - fire
      descriptions:
        jp_kana:
          lets_go_pikachu: "しずかな　ところに　つれていくと\nシッポが　もえてる　ちいさな　おとが\nきこえてくるよ。"
          lets_go_eevee: "しずかな　ところに　つれていくと\nシッポが　もえてる　ちいさな　おとが\nきこえてくるよ。"
        jp_kanji:
          lets_go_pikachu: "静かな　ところに　連れていくと\nシッポが　燃えてる　小さな　音が\n聞こえてくるよ。"
          lets_go_eevee: "静かな　ところに　連れていくと\nシッポが　燃えてる　小さな　音が\n聞こえてくるよ。"
        en:
          lets_go_pikachu: "The flame at the tip of its tail makes a sound as\nit burns. You can only hear it in quiet places."
          lets_go_eevee: "The flame at the tip of its tail makes a sound as\nit burns. You can only hear it in quiet places."
        fr:
          lets_go_pikachu: "La flammèche au bout de sa queue émet\nun crépitement audible seulement dans\nles endroits calmes."
          lets_go_eevee: "La flammèche au bout de sa queue émet\nun crépitement audible seulement dans\nles endroits calmes."
        it:
          lets_go_pikachu: "Nel silenzio più assoluto si può udire la fiamma\nin cima alla sua coda scoppiettare bruciando."
          lets_go_eevee: "Nel silenzio più assoluto si può udire la fiamma\nin cima alla sua coda scoppiettare bruciando."
        de:
          lets_go_pikachu: "An sehr stillen Orten kann man seine brennende\nSchwanzspitze ganz leise lodern hören."
          lets_go_eevee: "An sehr stillen Orten kann man seine brennende\nSchwanzspitze ganz leise lodern hören."
        es:
          lets_go_pikachu: "En lugares silenciosos se puede oír el débil\nchisporroteo de la llama que le arde en la\npunta de la cola."
          lets_go_eevee: "En lugares silenciosos se puede oír el débil\nchisporroteo de la llama que le arde en la\npunta de la cola."
        ko:
          lets_go_pikachu: "조용한 곳에 데려가면\n꼬리가 타고 있는\n작은 소리가 들린다."
          lets_go_eevee: "조용한 곳에 데려가면\n꼬리가 타고 있는\n작은 소리가 들린다."
        zh_simp:
          lets_go_pikachu: "要是把它带到安静的地方，\n就能听到它的尾巴燃烧时\n发出的微小的声音。"
          lets_go_eevee: "要是把它带到安静的地方，\n就能听到它的尾巴燃烧时\n发出的微小的声音。"
        zh_trad:
          lets_go_pikachu: "要是把牠帶到安靜的地方，\n就能聽見牠的尾巴燃燒時\n發出的微小聲音。"
          lets_go_eevee: "要是把牠帶到安靜的地方，\n就能聽見牠的尾巴燃燒時\n發出的微小聲音。"
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    jp_kanji: リザード
    en: Charmeleon
    fr: Reptincel
    it: Charmeleon
    de: Glutexo
    es: Charmeleon
    ko: 리자드
    zh_simp: 火恐龙
    zh_trad: 火恐龍
  forms:
    charmeleon:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        special_attack: 80
        special_defense: 65
        speed: 80
      types:
        - fire
      descriptions:
        jp_kana:
          lets_go_pikachu: "きょうてきと　たたかいつづけ\nエキサイトすると　あおじろい\nほのおを　はきだすことがある。"
          lets_go_eevee: "きょうてきと　たたかいつづけ\nエキサイトすると　あおじろい\nほのおを　はきだすことがある。"
        jp_kanji:
          lets_go_pikachu: "強敵と　戦いつづけ\nエキサイトすると　青白い\n炎を　吐き出すことがある。"
          lets_go_eevee: "強敵と　戦いつづけ\nエキサイトすると　青白い\n炎を　吐き出すことがある。"
        en:
          lets_go_pikachu: "Tough fights could excite this Pokémon. When\nexcited, it may breathe out bluish-white flames."
          lets_go_eevee: "Tough fights could excite this Pokémon. When\nexcited, it may breathe out bluish-white flames."
        fr:
          lets_go_pikachu: "Exalté quand il affronte des adversaires\npuissants, ce Pokémon en vient parfois\nà cracher des flammes bleutées."
          lets_go_eevee: "Exalté quand il affronte des adversaires\npuissants, ce Pokémon en vient parfois\nà cracher des flammes bleutées."
        it:
          lets_go_pikachu: "Si infervora durante le lotte più dure e talvolta\nsputa fiamme bluastre."
          lets_go_eevee: "Si infervora durante le lotte più dure e talvolta\nsputa fiamme bluastre."
        de:
          lets_go_pikachu: "Kämpft es länger gegen starke Gegner, so gerät\nes in Aufregung und spuckt manchmal gleißend\nhelle, bläuliche Flammen."
          lets_go_eevee: "Kämpft es länger gegen starke Gegner, so gerät\nes in Aufregung und spuckt manchmal gleißend\nhelle, bläuliche Flammen."
        es:
          lets_go_pikachu: "Librar combates intensos lo entusiasma tanto\nque en ocasiones lanza llamas de tono blanco\nazulado."
          lets_go_eevee: "Librar combates intensos lo entusiasma tanto\nque en ocasiones lanza llamas de tono blanco\nazulado."
        ko:
          lets_go_pikachu: "강한 적과 싸움을 거듭하다\n흥분하면 푸르스름한\n불꽃을 뿜어낼 때가 있다."
          lets_go_eevee: "강한 적과 싸움을 거듭하다\n흥분하면 푸르스름한\n불꽃을 뿜어낼 때가 있다."
        zh_simp:
