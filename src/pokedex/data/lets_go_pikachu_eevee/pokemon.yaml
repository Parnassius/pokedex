          lets_go_eevee: "트레이너와의 유대가 힘의\n원천이다. 제트기를 능가하는\n비행 능력을 자랑한다."
        zh_simp:
          lets_go_pikachu: "与训练家的牵绊是它的力量\n之源。它引以为傲的飞行能力\n完全凌驾于喷气式飞机之上。"
          lets_go_eevee: "与训练家的牵绊是它的力量\n之源。它引以为傲的飞行能力\n完全凌驾于喷气式飞机之上。"
        zh_trad:
          lets_go_pikachu: "與訓練家的牽絆是牠力量的\n泉源。引以為傲的飛行能力\n甚至凌駕於噴射機之上。"
          lets_go_eevee: "與訓練家的牽絆是牠力量的\n泉源。引以為傲的飛行能力\n甚至凌駕於噴射機之上。"
