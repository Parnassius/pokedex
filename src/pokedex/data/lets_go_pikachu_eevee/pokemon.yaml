      descriptions:
        jp_kana:
          lets_go_pikachu: "けなみや　シッポが　うつくしい。\nおおきくなると　シッポの　さきが\nわかれて　ふえていく。"
          lets_go_eevee: "けなみや　シッポが　うつくしい。\nおおきくなると　シッポの　さきが\nわかれて　ふえていく。"
        jp_kanji:
          lets_go_pikachu: "毛並みや　シッポが　美しい。\n大きくなると　シッポの　先が\n分かれて　増えていく。"
          lets_go_eevee: "毛並みや　シッポが　美しい。\n大きくなると　シッポの　先が\n分かれて　増えていく。"
        en:
          lets_go_pikachu: "Both its fur and its tails are beautiful.\nAs it grows, the tails split and form more tails."
          lets_go_eevee: "Both its fur and its tails are beautiful.\nAs it grows, the tails split and form more tails."
        fr:
          lets_go_pikachu: "Sa fourrure et sa queue sont magnifiques.\nCette dernière se divise lors de la croissance."
          lets_go_eevee: "Sa fourrure et sa queue sont magnifiques.\nCette dernière se divise lors de la croissance."
        it:
          lets_go_pikachu: "Il suo manto e le sue code sono meravigliosi.\nCrescendo, la sua coda sviluppa diverse\ndiramazioni."
          lets_go_eevee: "Il suo manto e le sue code sono meravigliosi.\nCrescendo, la sua coda sviluppa diverse\ndiramazioni."
        de:
          lets_go_pikachu: "Sein Fell und sein Schweif sind wunderschön.\nBeim Heranwachsen spaltet sich sein Schweif\nin mehrere Teile auf."
          lets_go_eevee: "Sein Fell und sein Schweif sind wunderschön.\nBeim Heranwachsen spaltet sich sein Schweif\nin mehrere Teile auf."
        es:
          lets_go_pikachu: "Sus colas y pelaje son preciosos. A medida que\ncrece, las colas se dividen y forman otras\nnuevas."
          lets_go_eevee: "Sus colas y pelaje son preciosos. A medida que\ncrece, las colas se dividen y forman otras\nnuevas."
        ko:
          lets_go_pikachu: "털과 꼬리가 아름답다.\n성장하면 꼬리 끝이 갈라져서\n갈래가 많아진다."
          lets_go_eevee: "털과 꼬리가 아름답다.\n성장하면 꼬리 끝이 갈라져서\n갈래가 많아진다."
        zh_simp:
          lets_go_pikachu: "皮毛和尾巴都非常美丽。\n随着自身的成长，尾巴的末端\n会渐渐分开，数量也会增加。"
          lets_go_eevee: "皮毛和尾巴都非常美丽。\n随着自身的成长，尾巴的末端\n会渐渐分开，数量也会增加。"
        zh_trad:
          lets_go_pikachu: "有著美麗的毛皮和尾巴。\n尾巴會隨著年齡增長而分開，\n逐漸形成多條尾巴。"
          lets_go_eevee: "有著美麗的毛皮和尾巴。\n尾巴會隨著年齡增長而分開，\n逐漸形成多條尾巴。"
    vulpix_alolan_form:
      form_id: 1
      names:
