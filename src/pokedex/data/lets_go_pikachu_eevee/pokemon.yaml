raichu:
  species_id: 26
  names:
    jp_kana: ライチュウ
    jp_kanji: ライチュウ
    en: Raichu
    fr: Raichu
    it: Raichu
    de: Raichu
    es: Raichu
    ko: 라이츄
    zh_simp: 雷丘
    zh_trad: 雷丘
  forms:
    raichu:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 55
        special_attack: 90
        special_defense: 80
        speed: 110
      types:
        - electric
      descriptions:
        jp_kana:
          lets_go_pikachu: "からだに　でんきが　たまってくると\nこうげきてきな　せいかくにかわる。\nくらいところで　ひかってみえる。"
          lets_go_eevee: "からだに　でんきが　たまってくると\nこうげきてきな　せいかくにかわる。\nくらいところで　ひかってみえる。"
        jp_kanji:
          lets_go_pikachu: "体に　電気が　たまってくると\n攻撃的な　性格に　変わる。\n暗いところで　光って　見える。"
          lets_go_eevee: "体に　電気が　たまってくると\n攻撃的な　性格に　変わる。\n暗いところで　光って　見える。"
        en:
          lets_go_pikachu: "When electricity builds up inside its body, it\nbecomes feisty. It also glows in the dark."
          lets_go_eevee: "When electricity builds up inside its body, it\nbecomes feisty. It also glows in the dark."
        fr:
          lets_go_pikachu: "Il devient agressif quand il emmagasine\nde l’électricité. Il brille alors dans le noir."
          lets_go_eevee: "Il devient agressif quand il emmagasine\nde l’électricité. Il brille alors dans le noir."
        it:
          lets_go_pikachu: "Quando accumula elettricità nel suo corpo,\nsi fa aggressivo. Al buio brilla di luce propria."
          lets_go_eevee: "Quando accumula elettricità nel suo corpo,\nsi fa aggressivo. Al buio brilla di luce propria."
        de:
          lets_go_pikachu: "Wenn sich in seinem Körper Elektrizität anstaut,\nwird es aggressiv. Man kann es auch im Dunkeln\nleuchten sehen."
          lets_go_eevee: "Wenn sich in seinem Körper Elektrizität anstaut,\nwird es aggressiv. Man kann es auch im Dunkeln\nleuchten sehen."
        es:
          lets_go_pikachu: "Al acumular cierta cantidad de electricidad en\nel cuerpo, se vuelve agresivo. También brilla en\nla oscuridad."
          lets_go_eevee: "Al acumular cierta cantidad de electricidad en\nel cuerpo, se vuelve agresivo. También brilla en\nla oscuridad."
        ko:
          lets_go_pikachu: "몸에 전기가 모이면\n공격적인 성격으로 변한다.\n어두운 곳에서 빛나 보인다."
          lets_go_eevee: "몸에 전기가 모이면\n공격적인 성격으로 변한다.\n어두운 곳에서 빛나 보인다."
        zh_simp:
          lets_go_pikachu: "体内的电力累积到一定程度时，\n性格会变得带有攻击性。\n在昏暗处看起来就像是在发亮。"
          lets_go_eevee: "体内的电力累积到一定程度时，\n性格会变得带有攻击性。\n在昏暗处看起来就像是在发亮。"
        zh_trad:
          lets_go_pikachu: "體內的電力累積到一定程度時，\n性情會變得帶有攻擊性。\n在昏暗處看起來就像是在發亮。"
          lets_go_eevee: "體內的電力累積到一定程度時，\n性情會變得帶有攻擊性。\n在昏暗處看起來就像是在發亮。"
    raichu_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 60
        attack: 85
        defense: 50
        special_attack: 95
        special_defense: 85
        speed: 110
      types:
        - electric
        - psychic
      descriptions:
        jp_kana:
          lets_go_pikachu: "アローラ　ひでんの　パンケーキが\nだいすき。　しんかの　ひみつが\nそれに　あるとか　ないとか。"
          lets_go_eevee: "アローラ　ひでんの　パンケーキが\nだいすき。　しんかの　ひみつが\nそれに　あるとか　ないとか。"
        jp_kanji:
          lets_go_pikachu: "アローラ　秘伝の　パンケーキが\n大好き。　進化の　秘密が\nそれに　あるとか　ないとか。"
          lets_go_eevee: "アローラ　秘伝の　パンケーキが\n大好き。　進化の　秘密が\nそれに　あるとか　ないとか。"
        en:
          lets_go_pikachu: "It loves pancakes prepared with a secret Alolan\nrecipe. Some wonder whether that recipe holds\nthe key to this Pokémon’s evolution."
          lets_go_eevee: "It loves pancakes prepared with a secret Alolan\nrecipe. Some wonder whether that recipe holds\nthe key to this Pokémon’s evolution."
        fr:
          lets_go_pikachu: "Il adore les pancakes traditionnels d’Alola.\nPersonne ne sait si c’est là le secret de son\névolution différente."
          lets_go_eevee: "Il adore les pancakes traditionnels d’Alola.\nPersonne ne sait si c’est là le secret de son\névolution différente."
        it:
          lets_go_pikachu: "Va matto per le frittelle speciali che si fanno\nad Alola. Che siano queste a nascondere\nil segreto della sua evoluzione?"
          lets_go_eevee: "Va matto per le frittelle speciali che si fanno\nad Alola. Che siano queste a nascondere\nil segreto della sua evoluzione?"
        de:
          lets_go_pikachu: "Es liebt die in Alola nach einem Geheimrezept\nzubereiteten Pfannkuchen. Es ist unklar, ob darin\nder Schlüssel zu seiner Entwicklung liegt."
          lets_go_eevee: "Es liebt die in Alola nach einem Geheimrezept\nzubereiteten Pfannkuchen. Es ist unklar, ob darin\nder Schlüssel zu seiner Entwicklung liegt."
        es:
          lets_go_pikachu: "Le encantan las tortitas hechas con una receta\ntradicional de Alola. No se sabe con certeza si\neste factor ha sido la clave de su evolución."
          lets_go_eevee: "Le encantan las tortitas hechas con una receta\ntradicional de Alola. No se sabe con certeza si\neste factor ha sido la clave de su evolución."
        ko:
          lets_go_pikachu: "알로라 전통 방식의 팬케이크를\n매우 좋아한다. 진화의 비밀이\n그것에 있다는데 믿거나 말거나."
          lets_go_eevee: "알로라 전통 방식의 팬케이크를\n매우 좋아한다. 진화의 비밀이\n그것에 있다는데 믿거나 말거나."
        zh_simp:
          lets_go_pikachu: "最爱吃阿罗拉秘传的煎饼。\n有人怀疑这与它进化的\n秘密有着密不可分的关系。"
          lets_go_eevee: "最爱吃阿罗拉秘传的煎饼。\n有人怀疑这与它进化的\n秘密有着密不可分的关系。"
        zh_trad:
          lets_go_pikachu: "最愛吃阿羅拉秘傳的鬆餅。\n或許牠進化的秘密就在\n這裡也說不定。"
          lets_go_eevee: "最愛吃阿羅拉秘傳的鬆餅。\n或許牠進化的秘密就在\n這裡也說不定。"
