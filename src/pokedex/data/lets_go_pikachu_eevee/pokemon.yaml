          lets_go_eevee: "어두운 곳을 좋아한다.\n거의 땅속에서 지내지만 동굴에서는\n자주 얼굴을 내밀고 있다."
        zh_simp:
          lets_go_pikachu: "喜欢阴暗的地方。\n大部分时间都待在地下，\n只有在洞窟里会经常探头出来。"
          lets_go_eevee: "喜欢阴暗的地方。\n大部分时间都待在地下，\n只有在洞窟里会经常探头出来。"
