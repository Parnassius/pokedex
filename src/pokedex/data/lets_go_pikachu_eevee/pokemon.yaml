          lets_go_eevee: "全身に　みなぎる　並はずれた\nパワーが　体を　黒く　染め上げ\n青い　炎を　メラメラ　燃やす。"
        en:
          lets_go_pikachu: "The overwhelming power that fills its entire body\ncauses it to turn black and creates intense\nblue flames."
          lets_go_eevee: "The overwhelming power that fills its entire body\ncauses it to turn black and creates intense\nblue flames."
        fr:
