          lets_go_eevee: "Sein fürchterlicher Gestank kann zur Ohnmacht\nführen. Da seine Nase so verkümmert ist, kann\nes selbst nichts mehr riechen."
        es:
          lets_go_pikachu: "Huele tan mal que puede provocar desmayos.\nSu nariz se ha atrofiado de tal manera que\nha perdido por completo el sentido del olfato."
          lets_go_eevee: "Huele tan mal que puede provocar desmayos.\nSu nariz se ha atrofiado de tal manera que\nha perdido por completo el sentido del olfato."
        ko:
