          lets_go_eevee: "등껍질의 대포는 전차 수준의\n위력을 가졌다. 발사의 충격을\n강인한 하체로 견뎌낸다."
        zh_simp:
          lets_go_pikachu: "龟甲上的大炮拥有不逊于坦克的\n威力。结实的腰腿使它能在\n发射的冲击力之下用力站稳。"
          lets_go_eevee: "龟甲上的大炮拥有不逊于坦克的\n威力。结实的腰腿使它能在\n发射的冲击力之下用力站稳。"
