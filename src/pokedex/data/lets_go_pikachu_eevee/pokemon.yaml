        ko:
          lets_go_pikachu: "철을 만들어내는 힘을 가졌다고\n추앙받았었다. 모종의 이유로\n3000년의 세월이 흘러 되살아났다."
          lets_go_eevee: "철을 만들어내는 힘을 가졌다고\n추앙받았었다. 모종의 이유로\n3000년의 세월이 흘러 되살아났다."
        zh_simp:
