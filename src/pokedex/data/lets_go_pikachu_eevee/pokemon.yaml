        defense: 85
        special_attack: 20
        special_defense: 30
        speed: 40
      types:
        - ground
      descriptions:
        jp_kana:
          lets_go_pikachu: "からだは　かわいている。しかし\nよなか　きおんが　さがったときは\nひふに　しずくが　つくという。"
          lets_go_eevee: "からだは　かわいている。しかし\nよなか　きおんが　さがったときは\nひふに　しずくが　つくという。"
        jp_kanji:
          lets_go_pikachu: "体は　乾いている。しかし\n夜中　気温が　下がったときは\n皮膚に　滴が　つくという。"
          lets_go_eevee: "体は　乾いている。しかし\n夜中　気温が　下がったときは\n皮膚に　滴が　つくという。"
        en:
          lets_go_pikachu: "Its body is dry. When it gets cold at night, its\nhide is said to become coated with a fine dew."
          lets_go_eevee: "Its body is dry. When it gets cold at night, its\nhide is said to become coated with a fine dew."
        fr:
          lets_go_pikachu: "Son corps est sec. Quand la nuit déploie ses\nailes de fraîcheur, son épiderme se couvre\nde rosée."
          lets_go_eevee: "Son corps est sec. Quand la nuit déploie ses\nailes de fraîcheur, son épiderme se couvre\nde rosée."
        it:
          lets_go_pikachu: "Il suo corpo è molto asciutto, ma si dice che\nquando di notte la temperatura si abbassa\nsi ricopra di fine rugiada."
          lets_go_eevee: "Il suo corpo è molto asciutto, ma si dice che\nquando di notte la temperatura si abbassa\nsi ricopra di fine rugiada."
        de:
          lets_go_pikachu: "Der Körper dieses Pokémon ist sehr trocken.\nIn kalten Nächten wird sein Körper von Tau\nüberzogen."
          lets_go_eevee: "Der Körper dieses Pokémon ist sehr trocken.\nIn kalten Nächten wird sein Körper von Tau\nüberzogen."
        es:
          lets_go_pikachu: "Tiene la piel muy seca, aunque, si hace frío por\nla noche, aparece cubierta de un fino rocío."
          lets_go_eevee: "Tiene la piel muy seca, aunque, si hace frío por\nla noche, aparece cubierta de un fino rocío."
        ko:
          lets_go_pikachu: "몸이 건조하다. 하지만\n밤중에 기온이 내려가면\n피부에 물방울이 맺힌다고 한다."
          lets_go_eevee: "몸이 건조하다. 하지만\n밤중에 기온이 내려가면\n피부에 물방울이 맺힌다고 한다."
        zh_simp:
          lets_go_pikachu: "身体很干燥。但据说\n在夜里降温时，它的\n表皮上会有露水凝结。"
          lets_go_eevee: "身体很干燥。但据说\n在夜里降温时，它的\n表皮上会有露水凝结。"
        zh_trad:
          lets_go_pikachu: "牠的身體十分乾燥，\n但當夜裡溫度降低時，\n表皮上會有露水凝結。"
          lets_go_eevee: "牠的身體十分乾燥，\n但當夜裡溫度降低時，\n表皮上會有露水凝結。"
    sandshrew_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 50
        attack: 75
        defense: 90
        special_attack: 10
        special_defense: 35
        speed: 40
      types:
        - ice
        - steel
      descriptions:
        jp_kana:
          lets_go_pikachu: "こおりに　おおわれた　からだで\nじめんを　すべり　だんがんの　ような\nスピードで　てきを　はじきとばす。"
          lets_go_eevee: "こおりに　おおわれた　からだで\nじめんを　すべり　だんがんの　ような\nスピードで　てきを　はじきとばす。"
        jp_kanji:
          lets_go_pikachu: "氷に　覆われた　体で\n地面を　すべり　弾丸の　ような\nスピードで　敵を　弾き飛ばす。"
          lets_go_eevee: "氷に　覆われた　体で\n地面を　すべり　弾丸の　ような\nスピードで　敵を　弾き飛ばす。"
        en:
          lets_go_pikachu: "Its ice-covered body lets it slide across the\nground with bullet-like speed, sending its\nenemies flying when it hits them."
          lets_go_eevee: "Its ice-covered body lets it slide across the\nground with bullet-like speed, sending its\nenemies flying when it hits them."
        fr:
          lets_go_pikachu: "Son corps recouvert de glace lui permet de\nglisser sur le sol à la vitesse d’un boulet de\ncanon pour projeter ses ennemis dans les airs."
          lets_go_eevee: "Son corps recouvert de glace lui permet de\nglisser sur le sol à la vitesse d’un boulet de\ncanon pour projeter ses ennemis dans les airs."
        it:
          lets_go_pikachu: "Il suo corpo ricoperto di ghiaccio gli permette\ndi scivolare verso l’avversario come un proiettile\nper colpirlo e scaraventarlo via."
          lets_go_eevee: "Il suo corpo ricoperto di ghiaccio gli permette\ndi scivolare verso l’avversario come un proiettile\nper colpirlo e scaraventarlo via."
        de:
          lets_go_pikachu: "Mit seinem eisbedeckten Körper rutscht es über\nden Boden. Getroffene Gegner schleudert es mit\nder Geschwindigkeit eines Projektils in die Luft."
          lets_go_eevee: "Mit seinem eisbedeckten Körper rutscht es über\nden Boden. Getroffene Gegner schleudert es mit\nder Geschwindigkeit eines Projektils in die Luft."
        es:
          lets_go_pikachu: "El hielo que recubre su cuerpo le permite\ndeslizarse para embestir a sus enemigos y\nproyectarlos con la rapidez de una bala."
          lets_go_eevee: "El hielo que recubre su cuerpo le permite\ndeslizarse para embestir a sus enemigos y\nproyectarlos con la rapidez de una bala."
        ko:
          lets_go_pikachu: "얼음으로 뒤덮인 몸으로 땅을\n미끄러지듯 이동하여 총알 같은\n스피드로 적을 튕겨 버린다."
          lets_go_eevee: "얼음으로 뒤덮인 몸으로 땅을\n미끄러지듯 이동하여 총알 같은\n스피드로 적을 튕겨 버린다."
        zh_simp:
          lets_go_pikachu: "用其被冰雪包裹着的\n身体在地上滑行，以\n子弹般的速度将敌人撞飞。"
          lets_go_eevee: "用其被冰雪包裹着的\n身体在地上滑行，以\n子弹般的速度将敌人撞飞。"
        zh_trad:
          lets_go_pikachu: "會以被寒冰包裹的身體在\n地面上滑行，用子彈般的\n速度狠狠撞飛對手。"
          lets_go_eevee: "會以被寒冰包裹的身體在\n地面上滑行，用子彈般的\n速度狠狠撞飛對手。"
