          lets_go_eevee: "Il legame con il suo Allenatore è la fonte del suo\npotere. Vanta una velocità di volo superiore\na quella di un aereo a reazione."
        de:
          lets_go_pikachu: "Aus der Bindung zu seinem Trainer schöpft es\nseine Kraft. Seine Fluggeschwindigkeit übertrifft\nsogar die eines Düsenjets."
          lets_go_eevee: "Aus der Bindung zu seinem Trainer schöpft es\nseine Kraft. Seine Fluggeschwindigkeit übertrifft\nsogar die eines Düsenjets."
        es:
