  names:
    jp_kana: ニドリーノ
    jp_kanji: ニドリーノ
    en: Nidorino
    fr: Nidorino
    it: Nidorino
    de: Nidorino
    es: Nidorino
    ko: 니드리노
    zh_simp: 尼多力诺
    zh_trad: 尼多力諾
  forms:
    nidorino:
      form_id: 0
      base_stats:
        hp: 61
        attack: 72
        defense: 57
        special_attack: 55
        special_defense: 55
        speed: 65
      types:
        - poison
      descriptions:
        jp_kana:
          lets_go_pikachu: "あたまにある　ツノの　どくそは\nつきさしたときの　しょうげきで\nにじみでる　しくみだ。"
          lets_go_eevee: "あたまにある　ツノの　どくそは\nつきさしたときの　しょうげきで\nにじみでる　しくみだ。"
        jp_kanji:
          lets_go_pikachu: "頭にある　ツノの　毒素は\n突き刺したときの　衝撃で\nにじみ出る　仕組みだ。"
          lets_go_eevee: "頭にある　ツノの　毒素は\n突き刺したときの　衝撃で\nにじみ出る　仕組みだ。"
        en:
          lets_go_pikachu: "Its horn contains venom. If it stabs an\nenemy with the horn, the impact makes\nthe poison leak out."
          lets_go_eevee: "Its horn contains venom. If it stabs an\nenemy with the horn, the impact makes\nthe poison leak out."
        fr:
          lets_go_pikachu: "Sa corne est venimeuse. Si elle perce un ennemi,\nelle lui injecte un poison violent."
          lets_go_eevee: "Sa corne est venimeuse. Si elle perce un ennemi,\nelle lui injecte un poison violent."
        it:
          lets_go_pikachu: "Quando colpisce il nemico con il suo corno\ndurante la lotta, questo secerne un forte veleno."
          lets_go_eevee: "Quando colpisce il nemico con il suo corno\ndurante la lotta, questo secerne un forte veleno."
        de:
          lets_go_pikachu: "Das Horn dieses Pokémon sondert im Kampf ein\nsehr starkes Gift ab, wenn es den Gegner trifft."
          lets_go_eevee: "Das Horn dieses Pokémon sondert im Kampf ein\nsehr starkes Gift ab, wenn es den Gegner trifft."
        es:
          lets_go_pikachu: "El cuerno de su frente contiene toxinas que se\nliberan al punzar al rival."
          lets_go_eevee: "El cuerno de su frente contiene toxinas que se\nliberan al punzar al rival."
        ko:
          lets_go_pikachu: "머리에 있는 뿔의 독소는\n찌르는 순간의 충격으로\n흘러나오는 구조다."
          lets_go_eevee: "머리에 있는 뿔의 독소는\n찌르는 순간의 충격으로\n흘러나오는 구조다."
        zh_simp:
          lets_go_pikachu: "头上的犄角里含有毒素，\n当犄角撞穿了什么东西时，\n毒素就会随着冲击而流出。"
          lets_go_eevee: "头上的犄角里含有毒素，\n当犄角撞穿了什么东西时，\n毒素就会随着冲击而流出。"
        zh_trad:
          lets_go_pikachu: "頭上的角含有毒素，\n當角撞穿了什麼東西時，\n毒素就會隨著衝擊而流出。"
          lets_go_eevee: "頭上的角含有毒素，\n當角撞穿了什麼東西時，\n毒素就會隨著衝擊而流出。"
nidoking:
  species_id: 34
  names:
    jp_kana: ニドキング
    jp_kanji: ニドキング
    en: Nidoking
    fr: Nidoking
    it: Nidoking
    de: Nidoking
    es: Nidoking
    ko: 니드킹
    zh_simp: 尼多王
    zh_trad: 尼多王
  forms:
    nidoking:
      form_id: 0
      base_stats:
        hp: 81
        attack: 102
        defense: 77
        special_attack: 85
        special_defense: 75
        speed: 85
      types:
        - poison
        - ground
      descriptions:
        jp_kana:
          lets_go_pikachu: "はがねのような　ひふを　いかした\nたいあたりは　きょうりょく。\nツノは　ダイヤモンドも　つきさす。"
          lets_go_eevee: "はがねのような　ひふを　いかした\nたいあたりは　きょうりょく。\nツノは　ダイヤモンドも　つきさす。"
        jp_kanji:
          lets_go_pikachu: "鋼のような　皮膚を　活かした\nたいあたりは　強力。\nツノは　ダイヤモンドも　突き刺す。"
          lets_go_eevee: "鋼のような　皮膚を　活かした\nたいあたりは　強力。\nツノは　ダイヤモンドも　突き刺す。"
        en:
          lets_go_pikachu: "Its steel-like hide adds to its powerful tackle.\nIts horns are so hard, they can pierce a diamond."
          lets_go_eevee: "Its steel-like hide adds to its powerful tackle.\nIts horns are so hard, they can pierce a diamond."
        fr:
          lets_go_pikachu: "Ses charges sont dévastatrices grâce à sa peau\nd’acier. Sa corne perce même le diamant."
          lets_go_eevee: "Ses charges sont dévastatrices grâce à sa peau\nd’acier. Sa corne perce même le diamant."
        it:
          lets_go_pikachu: "La pelle dura come l’acciaio garantisce alle\nsue cariche una potenza devastante.\nIl suo corno può perforare anche il diamante."
          lets_go_eevee: "La pelle dura come l’acciaio garantisce alle\nsue cariche una potenza devastante.\nIl suo corno può perforare anche il diamante."
        de:
          lets_go_pikachu: "Dank seiner stahlharten Haut kann es Gegner\nbesonders effektiv rammen. Mit seinem Horn\nspaltet es sogar Diamanten."
          lets_go_eevee: "Dank seiner stahlharten Haut kann es Gegner\nbesonders effektiv rammen. Mit seinem Horn\nspaltet es sogar Diamanten."
        es:
          lets_go_pikachu: "Su piel dura como el acero refuerza el impacto\nal cargar contra sus enemigos. Su cuerno puede\natravesar hasta diamantes."
          lets_go_eevee: "Su piel dura como el acero refuerza el impacto\nal cargar contra sus enemigos. Su cuerno puede\natravesar hasta diamantes."
        ko:
          lets_go_pikachu: "강철같은 피부를 활용한\n몸통박치기는 강력하다.\n뿔은 다이아몬드도 꿰뚫는다."
          lets_go_eevee: "강철같은 피부를 활용한\n몸통박치기는 강력하다.\n뿔은 다이아몬드도 꿰뚫는다."
        zh_simp:
          lets_go_pikachu: "通过活用自己钢一般坚硬的\n皮肤来使出强力的撞击。它的\n犄角坚硬得能够刺穿钻石。"
          lets_go_eevee: "通过活用自己钢一般坚硬的\n皮肤来使出强力的撞击。它的\n犄角坚硬得能够刺穿钻石。"
        zh_trad:
          lets_go_pikachu: "會利用全身鋼鐵般的皮膚，\n使出威力強大的撞擊。\n頭上的角連鑽石也能穿透。"
          lets_go_eevee: "會利用全身鋼鐵般的皮膚，\n使出威力強大的撞擊。\n頭上的角連鑽石也能穿透。"
clefairy:
  species_id: 35
  names:
    jp_kana: ピッピ
    jp_kanji: ピッピ
    en: Clefairy
    fr: Mélofée
    it: Clefairy
    de: Piepi
    es: Clefairy
    ko: 삐삐
    zh_simp: 皮皮
    zh_trad: 皮皮
  forms:
    clefairy:
      form_id: 0
      base_stats:
        hp: 70
        attack: 45
        defense: 48
        special_attack: 60
        special_defense: 65
        speed: 35
      types:
        - fairy
      descriptions:
        jp_kana:
          lets_go_pikachu: "すがたや　しぐさが　あいくるしく\nにんきだが　かずが　すくないのか\nなかなか　はっけん　できない。"
          lets_go_eevee: "すがたや　しぐさが　あいくるしく\nにんきだが　かずが　すくないのか\nなかなか　はっけん　できない。"
        jp_kanji:
          lets_go_pikachu: "姿や　仕草が　愛くるしく\n人気だが　数が　少ないのか\nなかなか　発見　できない。"
          lets_go_eevee: "姿や　仕草が　愛くるしく\n人気だが　数が　少ないのか\nなかなか　発見　できない。"
        en:
          lets_go_pikachu: "Adored for their cute looks and playfulness.\nThey are thought to be rare, as they\ndo not appear often."
          lets_go_eevee: "Adored for their cute looks and playfulness.\nThey are thought to be rare, as they\ndo not appear often."
        fr:
          lets_go_pikachu: "Adoré pour son aspect mignon et joyeux,\non le suppose rare, car on en voit très peu\nde spécimens."
          lets_go_eevee: "Adoré pour son aspect mignon et joyeux,\non le suppose rare, car on en voit très peu\nde spécimens."
        it:
          lets_go_pikachu: "È molto amato per l’aspetto adorabile\ne le graziose movenze, ma non si vede\nspesso perché ne esistono pochi esemplari."
          lets_go_eevee: "È molto amato per l’aspetto adorabile\ne le graziose movenze, ma non si vede\nspesso perché ne esistono pochi esemplari."
        de:
          lets_go_pikachu: "Wegen seines reizenden Aussehens und Wesens\nist Piepi beliebt, aber man sieht es nur selten,\nda es anscheinend nicht viele Exemplare gibt."
          lets_go_eevee: "Wegen seines reizenden Aussehens und Wesens\nist Piepi beliebt, aber man sieht es nur selten,\nda es anscheinend nicht viele Exemplare gibt."
        es:
          lets_go_pikachu: "Su aspecto jovial y sus ademanes lo hacen\nadorable y muy popular, aunque no suelen verse\na menudo, tal vez porque su número sea escaso."
          lets_go_eevee: "Su aspecto jovial y sus ademanes lo hacen\nadorable y muy popular, aunque no suelen verse\na menudo, tal vez porque su número sea escaso."
        ko:
          lets_go_pikachu: "모습과 행동이 사랑스러워서\n인기가 높지만 수가 적어서인지\n좀처럼 발견되지 않는다."
          lets_go_eevee: "모습과 행동이 사랑스러워서\n인기가 높지만 수가 적어서인지\n좀처럼 발견되지 않는다."
        zh_simp:
          lets_go_pikachu: "因外形和动作可爱而深受\n大家的喜爱。但或许是由于\n数量稀少，它们很难被发现。"
          lets_go_eevee: "因外形和动作可爱而深受\n大家的喜爱。但或许是由于\n数量稀少，它们很难被发现。"
        zh_trad:
          lets_go_pikachu: "可愛的外型和動作使牠深受歡迎。\n但可能因為數量稀少的緣故，\n人們很難發現牠的蹤跡。"
          lets_go_eevee: "可愛的外型和動作使牠深受歡迎。\n但可能因為數量稀少的緣故，\n人們很難發現牠的蹤跡。"
