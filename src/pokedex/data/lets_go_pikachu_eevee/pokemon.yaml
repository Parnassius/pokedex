          lets_go_eevee: "철분이 가득한 대지에 살다 보니\n정수리에서 강철로 된\n수염 세 가닥이 자랐다."
        zh_simp:
          lets_go_pikachu: "由于生长在含铁量\n充足的土壤里，头顶\n长出了３根钢胡子。"
          lets_go_eevee: "由于生长在含铁量\n充足的土壤里，头顶\n长出了３根钢胡子。"
        zh_trad:
          lets_go_pikachu: "由於生長在鐵質豐富的\n土裡，牠的頭頂上長出了\n３根鋼鐵鬍鬚。"
