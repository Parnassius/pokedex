          lets_go_eevee: "À force de vivre dans des terres riches en\nmétaux, trois vibrisses d’acier ont poussé\nsur sa tête."
        it:
          lets_go_pikachu: "I tre peli metallici che gli sono cresciuti\nsul capo sono dovuti alla grande quantità\ndi ferro nel terreno in cui vive."
          lets_go_eevee: "I tre peli metallici che gli sono cresciuti\nsul capo sono dovuti alla grande quantità\ndi ferro nel terreno in cui vive."
        de:
