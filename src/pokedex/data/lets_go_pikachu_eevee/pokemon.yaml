          lets_go_eevee: "Its bond with its Trainer is the source of\nits power. It boasts speed and maneuverability\ngreater than that of a jet fighter."
        fr:
          lets_go_pikachu: "Il tire sa puissance du lien qui l’unit à son\nDresseur. Sa capacité à voler plus rapidement\nqu’un avion à réaction fait toute sa fierté."
          lets_go_eevee: "Il tire sa puissance du lien qui l’unit à son\nDresseur. Sa capacité à voler plus rapidement\nqu’un avion à réaction fait toute sa fierté."
