          lets_go_eevee: "걸쭉하게 녹은 강철의 몸을 가졌다.\n땅속의 철분이나 금속을\n녹여서 흡수한다."
        zh_simp:
          lets_go_pikachu: "身体是融化成液状的钢铁。\n它能够将土壤中的铁或\n其它金属溶解后吸收进体内。"
          lets_go_eevee: "身体是融化成液状的钢铁。\n它能够将土壤中的铁或\n其它金属溶解后吸收进体内。"
        zh_trad:
