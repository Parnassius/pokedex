    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sauts\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di salti\ndei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du gesprungen bist."
    es: "Contiene los datos del Pokéathlon con el número\nde saltos de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 점프한 횟수가\n기록된 카드."
data_card_05:
  names:
