  descriptions:
    jp_kana: "きいろのガラスで　できた　ふえ。\nこんらん　じょうたいを\nかいふくする。"
    jp_kanji: "黄色のガラスで　できた　笛。\n混乱状態を　回復する。"
    en: "A flute made from yellow glass\nthat snaps Pokémon out of confusion."
    fr: "Un jouet en forme de flûte en verre jaune.\nSoigne la confusion."
    it: "Flauto fatto di vetro giallo. Ha il potere\ndi guarire dalla confusione."
    de: "Eine Spielzeugflöte aus gelbem Glas.\nHeilt Verwirrung."
    es: "Una flauta de cristal amarillo cuyas notas sacan a\nun Pokémon de la confusión."
    ko: "노란 유리로 만들어진 피리.\n혼란 상태를\n회복한다."
yellow_scarf:
  names:
    jp_kana: きいろのバンダナ
    jp_kanji: きいろのバンダナ
    en: Yellow Scarf
    fr: Foulard Jaune
    it: Fascia Gialla
    de: Gelber Schal
    es: Pañuelo Amarillo
    ko: 노랑밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nたくましく　みられる。"
    en: "An item to be held by a Pokémon.\nDuring a contest, it raises the Tough\naspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente la Robustesse\nd’un Pokémon dans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Grinta” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Stärke ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la dureza en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n강인하게 보인다."
yellow_shard:
  names:
    jp_kana: きいろいかけら
    jp_kanji: きいろいかけら
    en: Yellow Shard
    fr: Tesson Jaune
    it: Coccio Giallo
    de: Gelbstück
    es: Parte Amarilla
    ko: 노랑조각
  descriptions:
    jp_kana: "きいろい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "黄色い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small yellow shard. It appears\nto be a fragment of some sort\nof implement made long ago."
    fr: "Un petit tesson jaune.\nIl semble provenir d’un outil très ancien."
    it: "Un piccolo coccio giallo che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine gelbe Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento amarillo. Parece formar\nparte de algún tipo de herramienta antigua."
    ko: "노란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
zap_plate:
  names:
    jp_kana: いかずちプレート
    jp_kanji: いかずちプレート
    en: Zap Plate
    fr: Plaque Volt
    it: Lastrasaetta
    de: Blitztafel
    es: Tabla Trueno
    ko: 우뢰플레이트
  descriptions:
    jp_kana: "でんきの　タイプの　せきばん。\nもたせると　でんきタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　石盤。\n持たせると　でんきタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Electric-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Elettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Elektro."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Eléctrico. Debe llevarla un Pokémon."
    ko: "전기타입의 석판.\n지니게 하면 전기타입\n기술의 위력이 강해진다."
zinc:
  names:
    jp_kana: キトサン
    jp_kanji: キトサン
    en: Zinc
    fr: Zinc
    it: Zinco
    de: Zink
    es: Zinc
    ko: 키토산
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくぼうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特防の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nWhen consumed, it raises the base\nSp. Def stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nla Défense Spéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Difesa Speciale."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Verteidigungs-Basiswert eines\nPokémon dauerhaft erhöht."
    es: "Nutritiva bebida que aumenta la Defensa Especial\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수방어\n기초 포인트를 올린다."
zoom_lens:
  names:
    jp_kana: フォーカスレンズ
    jp_kanji: フォーカスレンズ
    en: Zoom Lens
    fr: Lentille Zoom
    it: Zoomlente
    de: Zoomlinse
    es: Telescopio
    ko: 포커스렌즈
  descriptions:
    jp_kana: "もたせた　ポケモンが　あいてよりも\nこうどうするのが　おそいとき\nわざが　めいちゅう　しやすくなる。"
    jp_kanji: "持たせた　ポケモンが　相手よりも\n行動するのが　遅いとき\n技が　命中しやすくなる。"
    en: "An item to be held by a Pokémon.\nIf the holder moves after its target\nmoves, its accuracy will be boosted."
    fr: "Objet à tenir. Augmente la Précision du porteur\ns’il attaque après l’ennemi."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha attacca dopo il nemico,\nla sua precisione aumenta."
    de: "Ein Item zum Tragen. Agiert das Ziel zuerst,\nerhöht sich die Genauigkeit des Trägers."
    es: "Debe llevarlo un Pokémon. Si se mueve después\ndel enemigo, aumenta la Precisión del Pokémon."
    ko: "지니게 한 포켓몬이 상대보다도\n행동하는 것이 늦을 때\n기술이 명중하기 쉬워진다."
