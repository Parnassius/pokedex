    jp_kana: "ひんしに　なった　ポケモン\n１ひきを　げんきに　したうえで\nＨＰを　すべて　かいふくする。"
    jp_kanji: "ひんしに　なってしまった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　すべて　回復する。"
