ability_capsule:
  names:
    jp_kana: とくせいカプセル
    jp_kanji: とくせいカプセル
    en: Ability Capsule
    fr: Pilule Talent
    it: Capsula abilità
    de: Fähigk.-Kapsel
    es: Cáps. Habilidad
    ko: 특성캡슐
  descriptions:
    jp_kana: "２しゅるいの　とくせいを　もつ\nポケモンに　つかうと　いまとはちがう\nとくせいに　かえられる　カプセル。"
    jp_kanji: "２種類の　特性を　持つ\nポケモンに　使うと　今とは違う\n特性に　変えられる　カプセル。"
    en: "A capsule that allows a Pokémon with\ntwo Abilities to switch between these\nAbilities when it is used."
    fr: "Une capsule permettant à un Pokémon pouvant\navoir deux talents de changer de l’un à l’autre."
    it: "Se usata su un Pokémon che ha due abilità,\nquesta capsula permette di cambiare quella\nattiva."
    de: "Bei Anwendung auf ein Pokémon, das zwei\nverschiedene Fähigkeiten haben kann, wird seine\naktuelle Fähigkeit mit der anderen ausgewechselt."
    es: "Cápsula que les permite cambiar de habilidad a\nlos Pokémon que poseen dos."
    ko: "2종류의 특성을 가진\n포켓몬에게 사용하면 지금과는 다른\n특성으로 바꿀 수 있는 캡슐."
ability_urge:
  names:
    jp_kana: スキルコール
    jp_kanji: スキルコール
    en: Ability Urge
    fr: Appel Talent
    it: Chiamabilità
    de: Fäh.-Appell
    es: Habilitador
    ko: 스킬콜
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nとくせいを　はつどう　させる。"
    jp_kanji: "使うと　味方の　ポケモンの\n特性を　発動させる。"
    en: "When used, it activates the\nAbility of an ally Pokémon."
    fr: "Déclenche le talent d’un Pokémon\nde l’équipe."
    it: "Se usato su un Pokémon della squadra,\nne attiva l’abilità."
    de: "Aktiviert bei Gebrauch die Fähigkeit\ndes Mitstreiters."
    es: "Al usarlo, activa la habilidad de un Pokémon de\ntu equipo."
    ko: "사용하면 같은 편 포켓몬의\n특성을 발동시킨다."
abomasite:
  names:
    jp_kana: ユキノオナイト
    jp_kanji: ユキノオナイト
    en: Abomasite
    fr: Blizzarite
    it: Abomasnowite
    de: Rexblisarnit
    es: Abomasnowita
    ko: 눈설왕나이트
  descriptions:
    jp_kana: "ユキノオーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ユキノオーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Abomasnow hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Blizzaroi, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Abomasnow, gli permette\ndi megaevolversi durante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Rexblisar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Abomasnow en combate."
    ko: "눈설왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
absolite:
  names:
    jp_kana: アブソルナイト
    jp_kanji: アブソルナイト
    en: Absolite
    fr: Absolite
    it: Absolite
    de: Absolnit
    es: Absolita
    ko: 앱솔나이트
  descriptions:
    jp_kana: "アブソルに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "アブソルに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Absol hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Absol, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Absol, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Absol getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Absol en combate."
    ko: "앱솔에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
absorb_bulb:
  names:
    jp_kana: きゅうこん
    jp_kanji: きゅうこん
    en: Absorb Bulb
    fr: Bulbe
    it: Bulbo
    de: Knolle
    es: Tubérculo
    ko: 구근
  descriptions:
    jp_kana: "つかいすての　きゅうこん。\nもたせて　みずの　わざを　うけると\nとくこうが　あがる。"
    jp_kanji: "使い捨ての　きゅうこん。\n持たせて　みずの　技を　受けると\n特攻が　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts Sp. Atk if hit with a Water-\ntype attack. It can only be used once."
    fr: "Un bulbe jetable.\nTenu, il augmente l’Attaque Spéciale lorsque\nle Pokémon subit une attaque de type Eau."
    it: "Bulbo monouso. Se il Pokémon che ha questo\nstrumento subisce una mossa di tipo Acqua,\nil suo Attacco Speciale aumenta."
    de: "Eine einmalig einsetzbare Knolle. Erhöht den\nSpezial-Angriff des Trägers, wenn ihn eine\nWasser-Attacke trifft."
    es: "Raíz de usar y tirar que sube el Ataque Especial\ncuando se recibe un ataque de tipo Agua."
    ko: "단 한 번 쓰면 없어지는 구근.\n지니게 하고 물 기술을 받으면\n특수공격이 올라간다."
acro_bike:
  names:
    jp_kana: ダートじてんしゃ
    jp_kanji: ダートじてんしゃ
    en: Acro Bike
    fr: Vélo Cross
    it: Bici da cross
    de: Kunstrad
    es: Bici Acrobática
    ko: 더트자전거
  descriptions:
    jp_kana: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　じてんしゃ。"
    jp_kanji: "ジャンプや　ウィリーの\nアクションが　できる\nおりたたみの　自転車。"
    en: "This folding Bike allows you to perform\nactions such as wheelies and bunny hops."
    fr: "Un vélo pliable qui permet de bondir et de rouler\nsur la roue arrière."
    it: "Bici pieghevole con cui si possono fare acrobazie\ncome salti o impennate."
    de: "Ein Klapprad, mit dem du Kunststücke wie\nSprünge oder Wheelies ausführen kannst."
    es: "Bicicleta plegable capaz de correr sobre una sola\nrueda, realizar saltos y otras acrobacias."
    ko: "점프나 윌리 액션을\n할 수 있는\n접이식 자전거다."
adamant_orb:
  names:
    jp_kana: こんごうだま
    jp_kanji: こんごうだま
    en: Adamant Orb
    fr: Orbe Adamant
    it: Adamasfera
    de: Adamant-Orb
    es: Diamansfera
    ko: 금강옥
  descriptions:
    jp_kana: "ディアルガに　もたせると　ドラゴンと\nはがねタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ディアルガに　持たせると　ドラゴンと\nはがねタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A brightly gleaming orb to be held by\nDialga. It boosts the power of Dragon-\nand Steel-type moves when it is held."
    fr: "Un orbe très brillant destiné à Dialga.\nAugmente la puissance des capacités de type\nDragon et Acier."
    it: "Sfera molto luminosa da dare a Dialga.\nPotenzia le mosse di tipo Drago e Acciaio."
    de: "Ein hell leuchtender Orb. Verstärkt Attacken vom\nTyp Drache und Stahl, wenn Dialga ihn trägt."
    es: "Una esfera brillante que potencia los movimientos\nde tipo Acero y Dragón. Debe llevarla Dialga."
    ko: "디아루가에게 지니게 하면 드래곤과\n강철타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
adventure_guide:
  names:
    jp_kana: たんけんこころえ
    jp_kanji: たんけんこころえ
    en: Adventure Rules
    fr: ABC Aventure
    it: Guida Avventura
    de: Abenteuerfibel
    es: Guía de Máximas
    ko: 탐험수칙
  descriptions:
    jp_kana: "トレーナーが　たびを　するときの\nポイントが　まとめられている\nともだち　てづくりの　ガイドブック。"
    jp_kanji: "トレーナーが　旅を　するときの\nポイントが　まとめられている\n友達　手作りの　ガイドブック。"
    en: "This book contains all the points a new\nTrainer needs to know on a journey.\nIt was handmade by a kind friend."
    fr: "Un manuel détaillant le savoir indispensable\nà un Dresseur partant à l’aventure.\nÉcrit par une connaissance."
    it: "Guida che contiene consigli utili per\ngli Allenatori in viaggio.\nÈ stata scritta da qualcuno di tua conoscenza."
    de: "Dieses von einem deiner Freunde erstellte Buch\nenthält nützliche Informationen zu allen Themen,\ndie für einen Trainer auf Reisen von Belang sind."
    es: "Guía redactada por uno de tus amigos con los\npuntos esenciales que todo Entrenador debería\ntener en cuenta durante su viaje por Kalos."
    ko: "트레이너가 여행할 때의\n포인트가 정리되어 있는\n친구가 직접 만든 가이드북."
aerodactylite:
  names:
    jp_kana: プテラナイト
    jp_kanji: プテラナイト
    en: Aerodactylite
    fr: Ptéraïte
    it: Aerodactylite
    de: Aerodactylonit
    es: Aerodactylita
    ko: 프테라나이트
  descriptions:
    jp_kana: "プテラに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "プテラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Aerodactyl hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ptéra, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Aerodactyl, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Aerodactyl getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Aerodactyl en combate."
    ko: "프테라에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
aggronite:
  names:
    jp_kana: ボスゴドラナイト
    jp_kanji: ボスゴドラナイト
    en: Aggronite
    fr: Galekingite
    it: Aggronite
    de: Stollossnit
    es: Aggronita
    ko: 보스로라나이트
  descriptions:
    jp_kana: "ボスゴドラに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ボスゴドラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Aggron hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Galeking, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Aggron, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stolloss getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Aggron en combate."
    ko: "보스로라에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
aguav_berry:
  names:
    jp_kana: バンジのみ
    jp_kanji: バンジのみ
    en: Aguav Berry
    fr: Baie Gowav
    it: Baccaguava
    de: Gauvebeere
    es: Baya Guaya
    ko: 아바열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but it will cause\nconfusion if the user hates the taste."
    fr: "Tenue, cette Baie restaure des PV en cas\nde besoin, mais rend le Pokémon confus si\nson goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die KP eines\nPokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar algunos PS. Su sabor puede causar\nconfusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
air_balloon:
  names:
    jp_kana: ふうせん
    jp_kanji: ふうせん
    en: Air Balloon
    fr: Ballon
    it: Palloncino
    de: Luftballon
    es: Globo Helio
    ko: 풍선
  descriptions:
    jp_kana: "ポケモンに　もたせると\nポケモンが　ちゅうに　うく。\nこうげきを　うけると　われてしまう。"
    jp_kanji: "ポケモンに　持たせると\nポケモンが　宙に　浮く。\n攻撃を　受けると　割れてしまう。"
    en: "An item to be held by a Pokémon.\nThe holder will float in the air until hit.\nOnce hit, this item will burst."
    fr: "Tenu par un Pokémon, cet objet lui permet de\nflotter dans les airs. Il éclate en cas d’attaque."
    it: "Permette al Pokémon che ha questo strumento\ndi fluttuare in aria. Scoppia se il Pokémon\nè colpito da un attacco."
    de: "Gibt man ihn einem Pokémon zum Tragen,\nfängt es an zu schweben. Wird es getroffen,\nplatzt der Luftballon."
    es: "El Pokémon que lo lleve flotará en el aire.\nSi recibe un golpe, estallará."
    ko: "포켓몬에게 지니게 하면\n포켓몬이 허공에 뜬다.\n공격을 받으면 터져버린다."
alakazite:
  names:
    jp_kana: フーディナイト
    jp_kanji: フーディナイト
    en: Alakazite
    fr: Alakazamite
    it: Alakazamite
    de: Simsalanit
    es: Alakazamita
    ko: 후디나이트
  descriptions:
    jp_kana: "フーディンに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "フーディンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Alakazam hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Alakazam, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Alakazam, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Simsala getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Alakazam en combate."
    ko: "후딘에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
altarianite:
  names:
    jp_kana: チルタリスナイト
    jp_kanji: チルタリスナイト
    en: Altarianite
    fr: Altarite
    it: Altarite
    de: Altarianit
    es: Altarianita
    ko: 파비코리나이트
  descriptions:
    jp_kana: "チルタリスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "チルタリスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Altaria hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Altaria, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Altaria, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Altaria getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Altaria en combate."
    ko: "파비코리에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
amaze_mulch:
  names:
    jp_kana: とんでもこやし
    jp_kanji: とんでもこやし
    en: Amaze Mulch
    fr: Fertiprodige
    it: Fertilprodigio
    de: Ultramulch
    es: Abono Insólito
    ko: 기절초풍비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
ampharosite:
  names:
    jp_kana: デンリュウナイト
    jp_kanji: デンリュウナイト
    en: Ampharosite
    fr: Pharampite
    it: Ampharosite
    de: Ampharosnit
    es: Ampharosita
    ko: 전룡나이트
  descriptions:
    jp_kana: "デンリュウに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "デンリュウに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Ampharos hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Pharamp, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData ad Ampharos, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ampharos getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Ampharos en combate."
    ko: "전룡에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
amulet_coin:
  names:
    jp_kana: おまもりこばん
    jp_kanji: おまもりこばん
    en: Amulet Coin
    fr: Pièce Rune
    it: Monetamuleto
    de: Münzamulett
    es: Moneda Amuleto
    ko: 부적금화
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon.\nIt doubles any prize money received\nif the holding Pokémon joins a battle."
    fr: "Objet à tenir. Double l’argent gagné si le porteur\nse joint au combat."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha partecipa alla lotta, i guadagni\nraddoppiano."
    de: "Ein Item, das von einem Pokémon getragen wird\nund das doppeltes Preisgeld bringt, wenn der\nTräger am Kampf teilnimmt."
    es: "Si el Pokémon que la lleva lucha en un combate,\nduplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
antidote:
  names:
    jp_kana: どくけし
    jp_kanji: どくけし
    en: Antidote
    fr: Antidote
    it: Antidoto
    de: Gegengift
    es: Antídoto
    ko: 해독제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　どくの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　どくの\n状態を　回復する。"
    en: "A spray-type medicine for poisoning.\nIt can be used once to lift the effects\nof being poisoned from a Pokémon."
    fr: "Un médicament sous forme de spray.\nGuérit un Pokémon empoisonné."
    it: "Rimedio spray.\nCura un Pokémon dall’avvelenamento."
    de: Ein Spray, das Vergiftungen eines Pokémon heilt.
    es: "Medicina en espray que contrarresta los efectos\ndel veneno en un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n독 상태를 회복한다."
apicot_berry:
  names:
    jp_kana: ズアのみ
    jp_kanji: ズアのみ
    en: Apicot Berry
    fr: Baie Abriko
    it: Baccacocca
    de: Apikobeere
    es: Baya Aricoc
    ko: 규살열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特防が　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its Sp. Def\nstat will increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente la Défense Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Difesa Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Verteidigungs-Wert eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube la Defensa\nEspecial en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수방어가 올라간다."
apricorn_box:
  names:
    jp_kana: ぼんぐりケース
    jp_kanji: ぼんぐりケース
    en: Apricorn Box
    fr: Boîte Noigrume
    it: Ghicobox
    de: Aprikokobox
    es: Caja Bonguri
    ko: 규토리케이스
  descriptions:
    jp_kana: "ぼんぐりを　９９こ　ほぞん　できる\nべんりな　いれもの。"
    jp_kanji: "ぼんぐりを　９９こ　保存できる\n便利な　いれもの。"
    en: "A handy box where you can store\nup to 99 of each kind of Apricorn."
    fr: "Une boîte bien pratique qui peut contenir jusqu’à\n99 Noigrumes."
    it: "Contenitore molto pratico dove conservare\nfino a 99 Ghicocche diverse."
    de: "Eine praktische Tragebox, in der du bis zu\n99 Aprikokos jeder Sorte transportieren kannst."
    es: "Práctico recipiente que puede almacenar hasta\n99 Bonguri de cada especie."
    ko: "규토리를 99개 보존할 수 있는\n편리한 용기."
aqua_suit:
  names:
    jp_kana: アクアスーツ
    jp_kanji: アクアスーツ
    en: Aqua Suit
    fr: Scaphandre Aqua
    it: Tuta Idro
    de: Aqua-Anzug
    es: Traje Aqua
    ko: 아쿠아슈트
  descriptions:
    jp_kana: "アクアだんの　かがくぎじゅつを\nけっしゅうして　つくられた　スーツ。\nどんな　しょうげき　にも　たえられる。"
    jp_kanji: "アクア団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective\ntechnological know-how of Team Aqua.\nIt can withstand any impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Aqua.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal\nTeam Idro in grado di resistere a qualunque\nshock."
    de: "Ein Anzug, der unter Einsatz des gesamten\ntechnischen Wissens von Team Aqua entstand.\nHält jeder Art von Erschütterung stand."
    es: "Este traje es el resultado de las arduas\ninvestigaciones científicas del Equipo Aqua.\nEs capaz de soportar cualquier impacto."
    ko: "아쿠아단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
armor_fossil:
  names:
    jp_kana: たてのカセキ
    jp_kanji: たてのカセキ
    en: Armor Fossil
    fr: Fossile Armure
    it: Fossilscudo
    de: Panzerfossil
    es: Fósil Coraza
    ko: 방패의화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nえりかざりの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n襟飾りの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived on the land. It looks to\nbe from some kind of protective collar."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait une partie d’un collier."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di un collare."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie ein Schlüsselbein aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece ser parte de una protección ósea del\ncuello."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n깃 장식의 일부인 듯하다."
aspear_berry:
  names:
    jp_kana: ナナシのみ
    jp_kanji: ナナシのみ
    en: Aspear Berry
    fr: Baie Willia
    it: Baccaperina
    de: Wilbirbeere
    es: Baya Perasi
    ko: 배리열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこおりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nこおりを　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom being frozen on its own in battle."
    fr: "Une Baie qui soigne le gel lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndal congelamento."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\ntaut diese es auf, wenn es eingefroren wird."
    es: "Los Pokémon pueden llevarla o usarla para\ndescongelarse."
    ko: "포켓몬에게 지니게 하면\n얼음을 회복한다."
assault_vest:
  names:
    jp_kana: とつげきチョッキ
    jp_kanji: とつげきチョッキ
    en: Assault Vest
    fr: Veste de Combat
    it: Corpetto assalto
    de: Offensivweste
    es: Chaleco Asalto
    ko: 돌격조끼
  descriptions:
    jp_kana: "こうげきてきに　なる　チョッキ。\nもたせると　とくぼうが　あがるが\nへんかわざを　だせなくなる。"
    jp_kanji: "攻撃的に　なる　チョッキ。\n持たせると　特防が　あがるが\n変化技を　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis offensive vest raises Sp. Def\nbut prevents the use of status moves."
    fr: "Objet à tenir. Une veste augmentant la Défense\nSpéciale, mais empêchant d’utiliser des attaques\nde statut."
    it: "Strumento da dare a un Pokémon.\nQuesto corpetto aumenta la Difesa Speciale\nma impedisce l’uso di mosse di stato."
    de: "Trägt ein Pokémon diese Weste, erhöht sich\nseine Spezial-Verteidigung, aber es kann keine\nStatus-Attacken mehr einsetzen."
    es: "Chaleco que potencia la Defensa Especial del\nPokémon que lo lleva, pero le impide lanzar\nataques de estado."
    ko: "공격적으로 변하는 조끼.\n지니게 하면 특수방어가 올라가지만\n변화 기술을 쓸 수 없게 된다."
audinite:
  names:
    jp_kana: タブンネナイト
    jp_kanji: タブンネナイト
    en: Audinite
    fr: Nanméouïte
    it: Audinite
    de: Ohrdochnit
    es: Audinita
    ko: 다부니나이트
  descriptions:
    jp_kana: "タブンネに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "タブンネに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Audino hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Nanméouïe, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Audino, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Ohrdoch getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Audino en combate."
    ko: "다부니에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
awakening:
  names:
    jp_kana: ねむけざまし
    jp_kanji: ねむけざまし
    en: Awakening
    fr: Réveil
    it: Sveglia
    de: Aufwecker
    es: Despertar
    ko: 잠깨는약
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　ねむりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　ねむりの\n状態を　回復する。"
    en: "A spray-type medicine used against\nsleep. It can be used once to rouse a\nPokémon from the clutches of sleep."
    fr: "Un médicament sous forme de spray.\nRéveille un Pokémon endormi."
    it: "Rimedio spray.\nSveglia un Pokémon addormentato."
    de: "Ein Spray, das ein schlafendes Pokémon\naufweckt."
    es: "Medicina en espray que libera a un Pokémon de\nlas garras del sueño."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n잠듦 상태를 회복한다."
azure_flute:
  names:
    jp_kana: てんかいのふえ
    jp_kanji: てんかいのふえ
    en: Azure Flute
    fr: Flûte Azur
    it: Flauto Cielo
    de: Azurflöte
    es: Flauta Azur
    ko: 천계의피리
  descriptions:
    jp_kana: "このよの　ものとは　おもえない\nねいろが　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    jp_kanji: "この世の　ものとは　おもえない\n音色が　なりひびく　ふえ。　いつ\nだれが　つくったのか　わからない。"
    en: "A flute that puts out echoing sounds\nthat do not seem to be of this world.\nNo one knows who made it."
    fr: "Une flûte produisant des sons qui semblent\nprovenir d’un autre monde. On ne sait pas qui\nl’a fabriquée."
    it: "Flauto che emette una melodia che sembra\nappartenere a un altro mondo. Non si sa\nchi l’abbia creato."
    de: "Eine Flöte, deren Töne nicht von dieser Welt zu\nsein scheinen. Ihr Erschaffer ist nicht bekannt."
    es: "Emite sonidos que no parecen de este mundo.\nEs de fabricante desconocido."
    ko: "이 세상의 것이라고는 생각할 수 없는\n음색이 울려 퍼지는 피리. 언제\n누가 만들었는지 모른다."
babiri_berry:
  names:
    jp_kana: リリバのみ
    jp_kanji: リリバのみ
    en: Babiri Berry
    fr: Baie Babiri
    it: Baccababiri
    de: Babiribeere
    es: Baya Baribá
    ko: 바리비열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　はがね　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　はがね技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Steel-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Acier."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Acciaio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Stahl."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Acero de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 강철 기술을\n당했을 때 위력이 약해진다."
balm_mushroom:
  names:
    jp_kana: かおるキノコ
    jp_kanji: かおるキノコ
    en: Balm Mushroom
    fr: Champi Suave
    it: Profumfungo
    de: Duftpilz
    es: Seta Aroma
    ko: 향기버섯
  descriptions:
    jp_kana: "あたりいったいに　いい　かおりが\nひろがる　めずらしい　キノコ。\nショップで　たかく　うれる。"
    jp_kanji: "あたりいったいに　いい　香りが\nひろがる　珍しい　キノコ。\nショップで　高く　売れる。"
    en: "A rare mushroom that gives off a nice fragrance.\nIt can be sold at a high price to shops."
    fr: "Un champignon rare qui répand un agréable\nparfum autour de lui. Peut être vendu à bon prix\naux magasins."
    it: "Fungo raro che emana un profumo\ngradevolissimo. Si può vendere a un prezzo\npiuttosto alto nei negozi."
    de: "Ein seltener Pilz, der ein angenehmes Aroma\nverbreitet."
    es: "Extraña seta que desprende un agradable aroma.\nPuede alcanzar un alto precio en las tiendas."
    ko: "주변 일대에 좋은 향기가\n퍼지는 희귀한 버섯.\n상점에서 비싸게 팔린다."
banettite:
  names:
    jp_kana: ジュペッタナイト
    jp_kanji: ジュペッタナイト
    en: Banettite
    fr: Branettite
    it: Banettite
    de: Banetteonit
    es: Banettita
    ko: 다크펫나이트
  descriptions:
    jp_kana: "ジュペッタに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ジュペッタに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Banette hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Branette, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Banette, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Banette getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Banette en combate."
    ko: "다크펫에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
basement_key:goldenrod_tunnel:
  names:
    jp_kana: ちかのかぎ
    jp_kanji: ちかのかぎ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave Sótano
    ko: 지하의열쇠
  descriptions:
    jp_kana: "コガネちかどうに　ある　とびらを\nあける　カギ。"
    jp_kanji: "コガネ地下道に　ある　扉を\n空ける　カギ。"
    en: "A key that opens a door in the\nGoldenrod Tunnel."
    fr: "Une clé qui permet d’ouvrir la porte au fond du\nDoublon-Tunnel."
    it: "Chiave che permette di aprire la porta all’interno\ndel Fiortunnel."
    de: "Ein Schlüssel, der eine Tür in der Dukatia-\nPassage von Dukatia City öffnet."
    es: "Llave que abre la puerta que hay en el Túnel\nTrigal."
    ko: "금빛지하도에 있는 문을\n여는 열쇠."
basement_key:new_mauville:
  names:
    jp_kana: ちかのカギ
    jp_kanji: ちかのカギ
    en: Basement Key
    fr: Clé Sous-Sol
    it: Chiave sotterr.
    de: Kelleröffner
    es: Llave del Sótano
    ko: 지하열쇠
  descriptions:
    jp_kana: "キンセツの　ちかにある\nニューキンセツに\nはいる　ための　カギ。"
    jp_kanji: "キンセツの　地下にある\nニューキンセツに\n入るための　カギ。"
    en: "The key to New Mauville, which was\nconstructed beneath Mauville City."
    fr: "Une clé permettant d’accéder à New Lavandia,\ndans les sous-sols de Lavandia."
    it: "Chiave che permette di accedere a Ciclanova,\nla città sotterranea costruita sotto a Ciclamipoli."
    de: "Ein Schlüssel, der dir Zugang nach\nNeu Malvenfroh verschafft, welches unter\nMalvenfroh City liegt."
    es: "Llave que da acceso a Malvalanova, situada en\nlos subterráneos de Ciudad Malvalona."
    ko: "보라시티 근처에 있는\n뉴보라에 들어가기 위한\n열쇠다."
beedrillite:
  names:
    jp_kana: スピアナイト
    jp_kanji: スピアナイト
    en: Beedrillite
    fr: Dardargnite
    it: Beedrillite
    de: Bibornit
    es: Beedrillita
    ko: 독침붕나이트
  descriptions:
    jp_kana: "スピアーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "スピアーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Beedrill hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dardargnan, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Beedrill, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Bibor getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Beedrill en combate."
    ko: "독침붕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
belue_berry:
  names:
    jp_kana: ベリブのみ
    jp_kanji: ベリブのみ
    en: Belue Berry
    fr: Baie Myrte
    it: Baccartillo
    de: Myrtilbeere
    es: Baya Andano
    ko: 루베열매
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Beauté d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la belleza. Es una baya muy rara en\notras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
berry_juice:
  names:
    jp_kana: きのみジュース
    jp_kanji: きのみジュース
    en: Berry Juice
    fr: Jus de Baie
    it: Succodibacca
    de: Beerensaft
    es: Zumo de Baya
    ko: 나무열매쥬스
  descriptions:
    jp_kana: "きのみ　１００％の　ジュース。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "きのみ　１００％の　ジュース。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A 100 percent pure juice made of Berries.\nWhen consumed, it restores\n20 HP to an injured Pokémon."
    fr: "Une boisson 100 % pur Jus de Baie.\nRestaure 20 PV d’un Pokémon."
    it: "Bevanda di puro succo di bacche.\nRestituisce 20 PS a un Pokémon."
    de: "Hundertprozentiger Fruchtsaft, aus Beeren\ngekeltert. Füllt die KP eines Pokémon\num 20 KP auf."
    es: "Zumo de bayas 100% natural que restaura 20 PS\nde un Pokémon."
    ko: "나무열매 100% 쥬스.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
berry_pots:
  names:
    jp_kana: きのみプランター
    jp_kanji: きのみプランター
    en: Berry Pots
    fr: Plante-Baies
    it: Piantabacche
    de: Pflanzset
    es: Plantabayas
    ko: 나무열매플랜터
  descriptions:
    jp_kana: "いつでも　てがるに　きのみを\nそだてられる　けいたいしきの\nさいばい　ようき。"
    jp_kanji: "いつでも　手軽に　きのみを\n育てられる　携帯式の\n栽培容器。"
    en: "Handy containers for cultivating\nBerries wherever you go."
    fr: "Un accessoire portatif qui permet de cultiver des\nBaies en tout lieu et à tout moment."
    it: "Accessorio tascabile che permette di coltivare\nbacche in qualunque luogo e momento."
    de: "Ein tragbares Utensil, das die Aufzucht von\nPflanzen aus Beeren ermöglicht, wo immer\ndu auch gerade bist."
    es: "Dispositivo portátil de cultivo que permite plantar\nbayas en cualquier momento de forma sencilla."
    ko: "항상 손쉽게 나무열매를\n키울 수 있는 휴대형\n재배 용기."
big_mushroom:
  names:
    jp_kana: おおきなキノコ
    jp_kanji: おおきなキノコ
    en: Big Mushroom
    fr: Gros Champi
    it: Grande Fungo
    de: Riesenpilz
    es: Seta Grande
    ko: 큰버섯
  descriptions:
    jp_kana: "おおきな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nとても　にんきが　たかい。"
    jp_kanji: "おおきな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nとても　人気が　高い。"
    en: "A very large and rare mushroom.\nIt’s popular with a certain class of\ncollectors and sought out by them."
    fr: "Un grand champignon assez rare.\nIl est très populaire parmi certains fans\ndévoués."
    it: "Fungo grande e raro.\nÈ molto apprezzato da alcuni intenditori."
    de: "Ein großer und seltener Pilz. Liebhaber dieses\nPilzes freuen sich ein Loch in den Bauch,\nwenn sie einen finden."
    es: "Una gran seta que es poco común y muy popular\nentre determinados grupos de gourmets."
    ko: "크고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
big_nugget:
  names:
    jp_kana: でかいきんのたま
    jp_kanji: でかいきんのたま
    en: Big Nugget
    fr: Maxi Pépite
    it: Granpepita
    de: Riesennugget
    es: Maxipepita
    ko: 큰금구슬
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきんせいの　おおきな　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　おおきな　玉。\nショップで　高く　売れる。"
    en: "A big nugget of pure gold that gives off a lustrous\ngleam. It can be sold at a high price to shops."
    fr: "Une pépite d’or pur qui brille d’un éclat\nmagnifique. Peut être vendue à bon prix\naux magasins."
    it: "Grossa pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein großes Nugget aus purem Gold, das\neinen schimmernden Glanz besitzt. Es ist\nvon großem Wert."
    es: "Pepita de oro puro que desprende un brillo\nespectacular. Puede venderse muy cara en las\ntiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 큰 구슬.\n상점에서 비싸게 팔린다."
big_pearl:
  names:
    jp_kana: おおきなしんじゅ
    jp_kanji: おおきなしんじゅ
    en: Big Pearl
    fr: Grande Perle
    it: Grande Perla
    de: Riesenperle
    es: Perla Grande
    ko: 큰진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nかなり　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nかなり　大粒の　真珠。\nショップで　高く　売れる。"
    en: "A rather large pearl that has a very nice silvery\nsheen. It can be sold to shops for a high price."
    fr: "Une grosse perle qui brille d’une jolie couleur\nargent. Peut être vendue à bon prix aux magasins."
    it: "Perla piuttosto grande dai graziosi riflessi\nargentei. Si può vendere a un prezzo piuttosto\nalto nei negozi."
    de: "Eine relativ große Perle, die in schönem\nSilber funkelt. Sie ist von hohem Wert."
    es: "Brillante perla plateada de gran tamaño que\npuede venderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
big_root:
  names:
    jp_kana: おおきなねっこ
    jp_kanji: おおきなねっこ
    en: Big Root
    fr: Grosse Racine
    it: Granradice
    de: Großwurzel
    es: Raíz Grande
    ko: 큰뿌리
  descriptions:
    jp_kana: "もたせると　ＨＰを　すいとる　わざで\nいつもより　おおく　じぶんの　ＨＰを\nかいふくできる。"
    jp_kanji: "持たせると　ＨＰを　吸いとる　技で\nいつもより　おおく　自分の　ＨＰを\n回復できる。"
    en: "An item to be held by a Pokémon.\nIt boosts the power of HP-stealing\nmoves so the holder recovers more HP."
    fr: "Objet à tenir. Augmente la puissance\ndes attaques volant des PV."
    it: "Strumento da dare a un Pokémon.\nPotenzia le mosse ruba-PS facendo recuperare\nun maggior numero di PS."
    de: "Ein Item zum Tragen.\nVerstärkt KP-stehlende Attacken."
    es: "El Pokémon que la lleva recupera más PS al usar\nmovimientos que drenan al objetivo."
    ko: "지니게 하면 HP 흡수 기술을 썼을 때\n여느 때보다 많은 HP를\n자신이 회복할 수 있다."
bike:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding Bike that enables a rider to get\naround much faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi\npiù velocemente che con le Scarpe da Corsa."
    de: "Ein Klapprad, mit dem man schneller ist\nals zu Fuß."
    es: "Bicicleta plegable con la que se va más rápido\nque corriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
bike:yellow:
  names:
    jp_kana: じてんしゃ
    jp_kanji: じてんしゃ
    en: Bike
    fr: Bicyclette
    it: Bicicletta
    de: Fahrrad
    es: Bici
    ko: 자전거
  descriptions:
    jp_kana: "ランニングシューズ　よりも\nはやく　はしることが　できる\nおりたたみしきの　じてんしゃ。"
    jp_kanji: "ランニングシューズ　よりも\n速く　走ることが　できる\n折りたたみ式の　じてんしゃ。"
    en: "A folding Bike that enables a rider to get\naround much faster than with Running Shoes."
    fr: "Une Bicyclette pliable permettant de se déplacer\nbien plus rapidement qu’en marchant."
    it: "Bici pieghevole che permette di spostarsi\npiù velocemente che con le Scarpe da Corsa."
    de: "Ein Klapprad, mit dem man schneller ist\nals zu Fuß."
    es: "Bicicleta plegable con la que se va más rápido\nque corriendo."
    ko: "러닝슈즈보다도\n빨리 달릴 수 있는\n접이식 자전거다."
binding_band:
  names:
    jp_kana: しめつけバンド
    jp_kanji: しめつけバンド
    en: Binding Band
    fr: Bande Étreinte
    it: Legafascia
    de: Klammerband
    es: Banda Atadura
    ko: 조임밴드
  descriptions:
    jp_kana: "しめつけるわざを　ほじょする　バンド。\nもたせると　しめつけるわざの\nいりょくが　つよく　なる。"
    jp_kanji: "締めつける技を　補助する　バンド。\n持たせると　締めつける技の\n威力が　強くなる。"
    en: "An item to be held by a Pokémon.\nA band that increases the power of\nbinding moves used by the holder."
    fr: "Objet à tenir. Augmente la puissance des\nattaques immobilisantes telles que Ligotage\nou Étreinte."
    it: "Strumento da dare a un Pokémon che aumenta\nla potenza di mosse come Avvolgibotta e\nLegatutto."
    de: "Ein Band, das die Stärke aller Klammerattacken\ndes Trägers erhöht."
    es: "Banda que potencia los movimientos que estrujan\nal rival."
    ko: "조이기 기술을 보조하는 밴드.\n지니게 하면 조이기 기술의\n위력이 강해진다."
black_apricorn:
  names:
    jp_kana: くろぼんぐり
    jp_kanji: くろぼんぐり
    en: Black Apricorn
    fr: Noigrume Noi
    it: Ghicocca Nera
    de: Aprikoko Swz
    es: Bonguri Negro
    ko: 검은규토리
  descriptions:
    jp_kana: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    jp_kanji: "くろい　ぼんぐり。\nなんともいえない　においがする。"
    en: "A black Apricorn.\nIt has a scent beyond one’s experience."
    fr: "Un Noigrume de couleur noire.\nIl dégage un arôme indéfinissable."
    it: "Una Ghicocca di colore nero.\nEmana un odore indefinibile."
    de: "Eine schwarze Aprikoko.\nSie riecht irgendwie unbeschreiblich."
    es: Bonguri de color negro y aroma indescriptible.
    ko: "검은색의 규토리.\n말로는 표현할 수 없는 향기가 난다."
black_belt:
  names:
    jp_kana: くろおび
    jp_kanji: くろおび
    en: Black Belt
    fr: Ceinture Noire
    it: Cinturanera
    de: Schwarzgurt
    es: Cinturón Negro
    ko: 검은띠
  descriptions:
    jp_kana: "きが　ひきしまる　おび。\nもたせると　かくとうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "気が　ひきしまる　帯。\n持たせると　かくとうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis belt helps the wearer to focus and\nboosts the power of Fighting-type moves."
    fr: "Objet à tenir. Une ceinture qui augmente\nla détermination et la puissance des capacités\nde type Combat."
    it: "Strumento da dare a un Pokémon.\nCintura che potenzia la determinazione\ne le mosse di tipo Lotta."
    de: "Ein Item zum Tragen. Ein Gürtel, der die\nEntschlossenheit sowie Attacken vom\nTyp Kampf verstärkt."
    es: "Debe llevarlo un Pokémon. Aumenta la\nconcentración y fortalece los movimientos\nde tipo Lucha."
    ko: "마음을 긴장시키는 띠.\n지니게 하면 격투타입\n기술의 위력이 올라간다."
black_flute:
  names:
    jp_kana: くろいビードロ
    jp_kanji: くろいビードロ
    en: Black Flute
    fr: Flûte Noire
    it: Flauto Nero
    de: Schw. Flöte
    es: Flauta Negra
    ko: 검정비드로
  descriptions:
    jp_kana: "くろいガラスで　できた　ふえ。\nつかった　ばしょで　つよいポケモンと\nそうぐう　しやすくなる。"
    jp_kanji: "黒いガラスで　できた　笛。\n使った　場所で　強いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from black glass.\nIt makes it easier to encounter strong\nPokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre noir.\nAugmente les chances de rencontrer des\nPokémon sauvages forts où l’on en joue."
    it: "Flauto fatto di vetro nero. Aumenta le probabilità\ndi incontrare Pokémon forti nell’area in cui viene\nusato."
    de: "Eine Spielzeugflöte aus schwarzem Glas.\nErhöht am Einsatzort die Wahrscheinlichkeit,\nstarken wilden Pokémon zu begegnen."
    es: "Una flauta de cristal negro cuyas notas atraen a\nPokémon salvajes más fuertes al lugar en el que\nse usa."
    ko: "검은 유리로 만들어진 피리.\n사용한 장소에서 강한 포켓몬과\n만나기 쉬워진다."
black_glasses:
  names:
    jp_kana: くろいメガネ
    jp_kanji: くろいメガネ
    en: Black Glasses
    fr: Lunettes Noires
    it: Occhialineri
    de: Schattenglas
    es: Gafas de Sol
    ko: 검은안경
  descriptions:
    jp_kana: "あやしく　みえる　メガネ。\nもたせると　あくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しく　みえる　メガネ。\n持たせると　あくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nA pair of shady-looking glasses that\nboost the power of Dark-type moves."
    fr: "Objet à tenir. Une paire de lunettes à l’aspect\nlouche qui augmente la puissance des capacités\nde type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nInquietante paio di occhiali che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Eine dunkle Brille,\ndie Attacken vom Typ Unlicht verstärkt."
    es: "Debe llevarlas un Pokémon. Fortalecen los\nmovimientos de tipo Siniestro."
    ko: "괴상하게 보이는 안경.\n지니게 하면 악타입\n기술의 위력이 올라간다."
black_sludge:
  names:
    jp_kana: くろいヘドロ
    jp_kanji: くろいヘドロ
    en: Black Sludge
    fr: Boue Noire
    it: Fangopece
    de: Giftschleim
    es: Lodo Negro
    ko: 검은진흙
  descriptions:
    jp_kana: "もたせると　どくタイプの　ポケモンは\nすこしずつ　ＨＰを　かいふくする。\nそれいがいは　ＨＰが　へってしまう。"
    jp_kanji: "持たせると　どくタイプの　ポケモンは\n少しずつ　ＨＰを　回復する。\nそれ以外は　ＨＰが　減ってしまう。"
    en: "An item to be held by a Pokémon.\nIt gradually restores HP to Poison-type\nPokémon. It damages any other type."
    fr: "Objet à tenir. Restaure peu à peu les PV des\nPokémon de type Poison. Inflige des dégâts\nà tous les autres types."
    it: "Strumento da dare a un Pokémon.\nRestituisce gradualmente PS ai Pokémon di tipo\nVeleno, ma danneggia tutti gli altri."
    de: "Ein Item zum Tragen, das einem Gift-Pokémon\nKP zurückgibt, anderen Pokémon aber Schaden\nzufügt."
    es: "Restaura gradualmente los PS de los Pokémon\nde tipo Veneno y daña a todos los demás."
    ko: "지니게 하면 독타입의 포켓몬은\n조금씩 HP를 회복한다.\n그 이외의 타입은 HP가 줄어 버린다."
blastoisinite:
  names:
    jp_kana: カメックスナイト
    jp_kanji: カメックスナイト
    en: Blastoisinite
    fr: Tortankite
    it: Blastoisite
    de: Turtoknit
    es: Blastoisita
    ko: 거북왕나이트
  descriptions:
    jp_kana: "カメックスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "カメックスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blastoise hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tortank, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Blastoise, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Turtok getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blastoise en combate."
    ko: "거북왕에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
blazikenite:
  names:
    jp_kana: バシャーモナイト
    jp_kanji: バシャーモナイト
    en: Blazikenite
    fr: Braségalite
    it: Blazikenite
    de: Lohgocknit
    es: Blazikenita
    ko: 번치코나이트
  descriptions:
    jp_kana: "バシャーモに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バシャーモに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Blaziken hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Braségali, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Blaziken, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lohgock getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Blaziken en combate."
    ko: "번치코에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
blue_apricorn:
  names:
    jp_kana: あおぼんぐり
    jp_kanji: あおぼんぐり
    en: Blue Apricorn
    fr: Noigrume Blu
    it: Ghicocca Blu
    de: Aprikoko Blu
    es: Bonguri Azul
    ko: 파란규토리
  descriptions:
    jp_kana: "あおい　ぼんぐり。\nすこし　あおくさい　かおりがする。"
    jp_kanji: "あおい　ぼんぐり。\n少し　あおくさい　かおりがする。"
    en: "A blue Apricorn.\nIt smells a bit like grass."
    fr: "Un Noigrume de couleur bleue.\nIl dégage un arôme un peu aigre."
    it: "Una Ghicocca di colore blu.\nEmana un odore un po’ acre."
    de: "Eine blaue Aprikoko.\nEin frischer Geruch geht von ihr aus."
    es: Bonguri de color azul y aroma tierno.
    ko: "파란색의 규토리.\n약간 풋내가 난다."
blue_card:
  names:
    jp_kana: ブルーカード
    jp_kanji: ブルーカード
    en: Blue Card
    fr: Carte Bleue
    it: Carta Blu
    de: Blaue Karte
    es: Tarjeta Azul
    ko: 블루카드
  descriptions:
    jp_kana: "「アオイのあいことば」　ばんぐみの\nポイントを　ためる　カード。"
    jp_kanji: "「アオイのあいことば」　番組の\nポイントを　貯める　カード。"
    en: "A card to save points for the\nBuena’s Password show."
    fr: "Une carte pour accumuler les points de\nl’émission « Le Mot de Passe de Buena »."
    it: "Carta per accumulare i punti del programma\n“Password Show” di Buena."
    de: "Eine Karte, auf der die Punkte für\n„Passwort mit Buena“ festgehalten werden."
    es: "Tarjeta para conseguir puntos con el programa de\nradio Las contraseñas de Buena."
    ko: "“규화의 암호” 방송의\n포인트를 모으는 카드."
blue_flute:
  names:
    jp_kana: あおいビードロ
    jp_kanji: あおいビードロ
    en: Blue Flute
    fr: Flûte Bleue
    it: Flauto Blu
    de: Blaue Flöte
    es: Flauta Azul
    ko: 파랑비드로
  descriptions:
    jp_kana: "あおいガラスで　できた　ふえ。\nねむり　じょうたいを\nかいふくする。"
    jp_kanji: "青いガラスで　できた　笛。\n眠り状態を　回復する。"
    en: "A flute made from blue glass\nthat awakens sleeping Pokémon."
    fr: "Un jouet en forme de flûte en verre bleu.\nRéveille un Pokémon endormi."
    it: "Flauto fatto di vetro blu. Ha il potere\ndi risvegliare i Pokémon addormentati."
    de: "Eine Spielzeugflöte aus blauem Glas.\nWeckt ein schlafendes Pokémon auf."
    es: "Una flauta de cristal azul cuyas notas despiertan a\nun Pokémon del sueño."
    ko: "파란 유리로 만들어진 피리.\n잠듦 상태를\n회복한다."
blue_orb:
  names:
    jp_kana: あいいろのたま
    jp_kanji: あいいろのたま
    en: Blue Orb
    fr: Gemme Bleue
    it: Gemma blu
    de: Blauer Edelstein
    es: Prisma Azul
    ko: 쪽빛구슬
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあおく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあおく　かがやく　たま。"
    en: "A shiny blue orb that is said to have\na legend tied to it. It’s known to have a\ndeep connection with the Hoenn region."
    fr: "Une gemme céruléenne dont on dit qu’elle a un\nlien très étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi blu, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Ein blau schimmernder Stein, von dem in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Piedra añil que, según dicen, guarda una estrecha\nrelación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n파랗게 빛나는 구슬."
blue_scarf:
  names:
    jp_kana: あおいバンダナ
    jp_kanji: あおいバンダナ
    en: Blue Scarf
    fr: Foulard Bleu
    it: Fascia Blu
    de: Blauer Schal
    es: Pañuelo Azul
    ko: 파랑밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nうつくしく　みられる。"
    en: "An item to be held by a Pokémon.\nDuring a contest, it raises the Beauty\naspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente la Beauté d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Bellezza” di chi l’indossa\nin una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Schönheit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la belleza en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n아름답게 보인다."
blue_shard:
  names:
    jp_kana: あおいかけら
    jp_kanji: あおいかけら
    en: Blue Shard
    fr: Tesson Bleu
    it: Coccio Blu
    de: Indigostück
    es: Parte Azul
    ko: 파랑조각
  descriptions:
    jp_kana: "あおい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "青い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small blue shard. It appears\nto be a fragment of some sort\nof implement made long ago."
    fr: "Un petit tesson bleu.\nIl semble provenir d’un outil très ancien."
    it: "Un piccolo coccio blu che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine blaue Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento azul. Parece formar parte\nde algún tipo de herramienta antigua."
    ko: "파란 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
bluk_berry:
  names:
    jp_kana: ブリーのみ
    jp_kanji: ブリーのみ
    en: Bluk Berry
    fr: Baie Remu
    it: Baccamora
    de: Morbbeere
    es: Baya Oram
    ko: 블리열매
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nあおいろの　みは　たべると　しぶい。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n青色の実は　食べると　渋い。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty. Its blue flesh is sour when eaten."
    fr: "Une Baie violette et sèche, utilisée pour préparer\ndes Pokéblocs permettant d’augmenter la Beauté\nd’un Pokémon."
    it: "Bacca viola dal sapore aspro usata\nper creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIhr bläuliches Fruchtfleisch schmeckt herb."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la belleza. Es de color azulado y sabor\nseco."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n파란색 열매는 먹으면 떫다."
boost_mulch:
  names:
    jp_kana: ぐんぐんこやし
    jp_kanji: ぐんぐんこやし
    en: Boost Mulch
    fr: Fertibérance
    it: Fertilcopioso
    de: Wuchermulch
    es: Abono Fructífero
    ko: 부쩍부쩍비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
bridge_mail_d:
  names:
    jp_kana: ブリッジメールＨ
    jp_kanji: ブリッジメールＨ
    en: Bridge Mail D
    fr: Lettre PontY
    it: Mess. Libec.
    de: Brückbrief M
    es: Carta Puente F
    ko: 브리지메일M
  descriptions:
    jp_kana: "まっかな　はねばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "真っ赤な　跳ね橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a bright-red\ndrawbridge. Have a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont\nmobile rouge. Peut être tenu et livré par\nun Pokémon."
    it: "Carta da lettere che riporta l’immagine\ndi un ponte mobile di colore rosso fuoco.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine knallrote Zugbrücke als\nHintergrund. Gib es einem Pokémon zum Tragen."
    es: "Carta con la imagen de un puente levadizo de\ncolor rojo. Haz que la entregue un Pokémon."
    ko: "새빨간 도개교의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_m:
  names:
    jp_kana: ブリッジメールＷ
    jp_kanji: ブリッジメールＷ
    en: Bridge Mail M
    fr: Lettre PontI
    it: Mess. Merav.
    de: Brückbrief W
    es: Carta Puente P
    ko: 브리지메일W
  descriptions:
    jp_kana: "アーチを　えがいた　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "アーチを　描いた　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of\na majestically arched bridge.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont à\nvoûtes. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere che riporta l’immagine\ndi un ponte ad arco.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine geschwungene Brücke\nals Hintergrundmotiv. Gib es einem Pokémon zum\nTragen."
    es: "Carta con la imagen de un puente con varios\narcos. Haz que la entregue un Pokémon."
    ko: "아치가 그려진 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_s:
  names:
    jp_kana: ブリッジメールＳ
    jp_kanji: ブリッジメールＳ
    en: Bridge Mail S
    fr: Lettre PontS
    it: Mess. Frec.
    de: Brückbrief H
    es: Carta Puente S
    ko: 브리지메일S
  descriptions:
    jp_kana: "そらを　つらぬく　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "空を　つらぬく　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of\na bridge that seems to pierce the sky.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont\ntraversant le ciel. Peut être tenu et livré par\nun Pokémon."
    it: "Carta da lettere che riporta l’immagine\ndi un ponte sospeso nel cielo.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine weit in den Himmel\nragende Brücke als Hintergrund. Gib es einem\nPokémon zum Tragen."
    es: "Carta con la imagen de un puente que se alza\nhacia el cielo. Haz que la entregue un Pokémon."
    ko: "하늘을 관통하는 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_t:
  names:
    jp_kana: ブリッジメールＣ
    jp_kanji: ブリッジメールＣ
    en: Bridge Mail T
    fr: Lettre PontF
    it: Mess. Prop.
    de: Brückbrief Z
    es: Carta Puente A
    ko: 브리지메일C
  descriptions:
    jp_kana: "こうてつの　つりばしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "鋼鉄の　つり橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of a\nhigh-tension steel suspension bridge.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont\nsuspendu en acier. Peut être tenu et livré\npar un Pokémon."
    it: "Carta da lettere che riporta l’immagine\ndi un ponte d’acciaio sospeso.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine stählerne Hängebrücke\nals Hintergrund. Gib es einem Pokémon zum\nTragen."
    es: "Carta con la imagen de un puente colgante de\nacero. Haz que la entregue un Pokémon."
    ko: "강철의 현수교 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bridge_mail_v:
  names:
    jp_kana: ブリッジメールＶ
    jp_kanji: ブリッジメールＶ
    en: Bridge Mail V
    fr: Lettre PontH
    it: Mess. Vill.
    de: Brückbrief D
    es: Carta Puente V
    ko: 브리지메일V
  descriptions:
    jp_kana: "レンガづくりの　はしの　えがらが\nプリントされた　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "レンガ造りの　橋の　絵柄が\nプリントされた　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery featuring an illustration of\na vintage-looking brick bridge.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres avec un motif de pont\nen briques. Peut être tenu et livré par\nun Pokémon."
    it: "Carta da lettere che riporta l’immagine\ndi un ponte di mattoni.\nSi può dare a un Pokémon affinché la consegni."
    de: "Das Briefpapier hat eine Brücke aus Ziegelsteinen\nals Hintergrund. Gib es einem Pokémon zum\nTragen."
    es: "Carta con la imagen de un puente de ladrillos.\nHaz que la entregue un Pokémon."
    ko: "벽돌로 만든 다리의 무늬가\n프린트된 편지지.\n포켓몬에게 지니게 해서 쓴다."
bright_powder:
  names:
    jp_kana: ひかりのこな
    jp_kanji: ひかりのこな
    en: Bright Powder
    fr: Poudre Claire
    it: Luminpolvere
    de: Blendpuder
    es: Polvo Brillo
    ko: 반짝가루
  descriptions:
    jp_kana: "キラキラ　ひかるこな。　もたせると\nひかりが　あいてを　まどわして\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "キラキラ　光る粉。　持たせると\n光が　相手を　惑わして\n技が　命中しにくくなる。"
    en: "An item to be held by a Pokémon.\nIt casts a tricky glare that lowers\nthe opposing Pokémon’s accuracy."
    fr: "Objet à tenir. Intimide et baisse la Précision\nde l’ennemi."
    it: "Strumento da dare a un Pokémon.\nEmette un bagliore insidioso che riduce\nla precisione del nemico."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es senkt die Genauigkeit\ndes Gegners."
    es: "Lanza un destello que baja la Precisión del\nenemigo. Debe llevarlo un Pokémon."
    ko: "반짝반짝 빛나는 가루. 지니게 하면\n빛이 상대를 혼란시켜\n기술이 명중되기 어려워진다."
bug_gem:
  names:
    jp_kana: むしのジュエル
    jp_kanji: むしのジュエル
    en: Bug Gem
    fr: Joyau Insecte
    it: Bijoucoleottero
    de: Käferjuwel
    es: Gema Bicho
    ko: 벌레주얼
  descriptions:
    jp_kana: "むしの　タイプの　ジュエル。\nもたせると　いちどだけ　むしの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　ジュエル。\n持たせると　１度だけ　むしの\n技の　威力が　強まる。"
    en: "A gem with an insect-like essence.\nWhen held, it strengthens the power\nof a Bug-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Coleottero."
    de: "Ein Juwel vom Typ Käfer. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Käfer."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Bicho. Debe llevarla\nun Pokémon."
    ko: "벌레타입의 주얼.\n지니게 하면 한 번만 벌레\n기술의 위력이 강해진다."
burn_drive:
  names:
    jp_kana: ブレイズカセット
    jp_kanji: ブレイズカセット
    en: Burn Drive
    fr: Module Pyro
    it: Piromodulo
    de: Flammenmodul
    es: PiroROM
    ko: 블레이즈카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nほのおタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nほのおタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Genesect’s Techno Blast\nmove so it becomes Fire type."
    fr: "Tenu par Genesect, ce module change la\ncapacité TechnoBuster en une capacité de type\nFeu."
    it: "Modulo da dare a Genesect. Trasforma\nTecnobotto in una mossa di tipo Fuoco."
    de: "Gibt man es Genesect zum Tragen, wandelt es\nden Typ der Attacke Techblaster in Feuer um."
    es: "Cartucho que convierte Tecno Shock de\nGenesect en un movimiento de tipo Fuego."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n불꽃타입으로 바뀌는 카세트."
burn_heal:
  names:
    jp_kana: やけどなおし
    jp_kanji: やけどなおし
    en: Burn Heal
    fr: Anti-Brûle
    it: Antiscottatura
    de: Feuerheiler
    es: Antiquemar
    ko: 화상치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　やけどの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　やけどの\n状態を　回復する。"
    en: "A spray-type medicine for treating\nburns. It can be used once to heal\na Pokémon suffering from a burn."
    fr: "Un médicament sous forme de spray.\nSoigne les brûlures d’un Pokémon."
    it: "Rimedio spray.\nCura un Pokémon dalla scottatura."
    de: "Ein Spray, das Verbrennungen eines Pokémon\nheilt."
    es: "Medicina en espray que cura las quemaduras a\nun Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n화상 상태를 회복한다."
calcium:
  names:
    jp_kana: リゾチウム
    jp_kanji: リゾチウム
    en: Calcium
    fr: Calcium
    it: Calcio
    de: Kalzium
    es: Calcio
    ko: 리보플라빈
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　とくこうの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　特攻の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nWhen consumed, it raises the base\nSp. Atk stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nl’Attaque Spéciale de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dell’Attacco Speciale."
    de: "Ein gehaltvolles Getränk, das den\nSpezial-Angriffs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia el Ataque Especial\nde base de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 특수공격\n기초 포인트를 올린다."
cameruptite:
  names:
    jp_kana: バクーダナイト
    jp_kanji: バクーダナイト
    en: Cameruptite
    fr: Caméruptite
    it: Cameruptite
    de: Cameruptnit
    es: Cameruptita
    ko: 폭타나이트
  descriptions:
    jp_kana: "バクーダに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バクーダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Camerupt hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Camérupt, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Camerupt, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Camerupt getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Camerupt en combate."
    ko: "폭타에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
carbos:
  names:
    jp_kana: インドメタシン
    jp_kanji: インドメタシン
    en: Carbos
    fr: Carbone
    it: Carburante
    de: Carbon
    es: Carburante
    ko: 알칼로이드
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　すばやさの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　素早さの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nWhen consumed, it raises the base\nSpeed stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nla Vitesse de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Velocità."
    de: "Ein gehaltvolles Getränk, das den\nInitiative-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia la Velocidad de\nbase de un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 스피드\n기초 포인트를 올린다."
card_key:goldenrod_radio_tower:
  names:
    jp_kana: カードキー
    jp_kanji: カードキー
    en: Card Key
    fr: Carte Magnétique
    it: Apriporta
    de: Türöffner
    es: Llave Magnética
    ko: 카드키
  descriptions:
    jp_kana: "ラジオきょくの　シャッターを　あける\nカードしきの　カギ。"
    jp_kanji: "ラジオ局の　シャッターを　開ける\nカード式の　カギ。"
    en: "A card key that opens a shutter in the\nRadio Tower."
    fr: "Une clé en forme de carte permettant d’ouvrir\nles cloisons de la Tour Radio."
    it: "Chiave a scheda che apre le porte automatizzate\ndella Torre Radio."
    de: "Eine Schlüsselkarte, die eine\nTür im Radioturm öffnet."
    es: "Llave con forma de tarjeta que abre las puertas\nde la Torre Radio."
    ko: "라디오방송국의 셔터를 여는\n카드식 열쇠."
casteliacone:
  names:
    jp_kana: ヒウンアイス
    jp_kanji: ヒウンアイス
    en: Casteliacone
    fr: Glace Volute
    it: Conostropoli
    de: Stratos-Eis
    es: Porcehelado
    ko: 구름아이스
  descriptions:
    jp_kana: "ヒウンシティの　めいぶつアイス。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ヒウンシティの　名物アイス。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Castelia City’s specialty, soft-serve\nice cream. It heals all the status\nproblems of a single Pokémon."
    fr: "La spécialité de Volucité.\nElle soigne tous les problèmes de statut\nd’un Pokémon."
    it: "Il famoso gelato di Austropoli. Cura tutti i\nproblemi di stato di un Pokémon."
    de: "Dieses Eis ist eine Spezialität aus Stratos City.\nEs behebt alle Statusprobleme eines Pokémon."
    es: "Especialidad de Ciudad Porcelana. Cura los\nproblemas de estado de un Pokémon."
    ko: "구름시티의 명물 아이스.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
cell_battery:
  names:
    jp_kana: じゅうでんち
    jp_kanji: じゅうでんち
    en: Cell Battery
    fr: Pile
    it: Ricaripila
    de: Akku
    es: Pila
    ko: 충전지
  descriptions:
    jp_kana: "つかいすての　じゅうでんち。\nもたせて　でんきの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　じゅうでんち。\n持たせて　でんきの　技を　受けると\n攻撃が　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts Attack if hit with an Electric-\ntype attack. It can only be used once."
    fr: "Une pile jetable.\nTenue, elle augmente l’Attaque lorsque\nle Pokémon subit une attaque de type Électrik."
    it: "Pila monouso. Se il Pokémon che ha questo\nstrumento subisce un attacco di tipo Elettro,\nil suo Attacco aumenta."
    de: "Ein einmalig aufladbarer Akku. Erhöht den Angriff\ndes Trägers, wenn ihn eine Elektro-Attacke trifft."
    es: "Batería de usar y tirar que sube el Ataque de\nquien la lleva cuando recibe un golpe de tipo\nEléctrico."
    ko: "단 한 번 쓰면 없어지는 충전지.\n지니게 하고 전기 기술을 받으면\n공격이 올라간다."
charcoal:
  names:
    jp_kana: もくたん
    jp_kanji: もくたん
    en: Charcoal
    fr: Charbon
    it: Carbonella
    de: Holzkohle
    es: Carbón
    ko: 목탄
  descriptions:
    jp_kana: "ものを　もやす　ねんりょう。\nもたせると　ほのおタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "ものを　燃やす　燃料。\n持たせると　ほのおタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a combustible fuel that boosts\nthe power of Fire-type moves."
    fr: "Objet à tenir. Un combustible qui augmente\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon.\nSostanza combustibile che potenzia le mosse\ndi tipo Fuoco."
    de: "Ein Item zum Tragen. Ein Brennstoff, der Attacken\nvom Typ Feuer verstärkt."
    es: "Actúa como combustible y potencia los\nmovimientos de tipo Fuego. Debe llevarlo\nun Pokémon."
    ko: "물건을 태우는 연료.\n지니게 하면 불꽃타입\n기술의 위력이 올라간다."
charizardite_x:
  names:
    jp_kana: リザードナイトＸ
    jp_kanji: リザードナイトＸ
    en: Charizardite X
    fr: Dracaufite X
    it: Charizardite X
    de: Gluraknit X
    es: Charizardita X
    ko: 리자몽나이트X
  descriptions:
    jp_kana: "リザードンに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "リザードンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Charizard hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dracaufeu, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Charizard, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Glurak getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Charizard en combate."
    ko: "리자몽에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
charizardite_y:
  names:
    jp_kana: リザードナイトＹ
    jp_kanji: リザードナイトＹ
    en: Charizardite Y
    fr: Dracaufite Y
    it: Charizardite Y
    de: Gluraknit Y
    es: Charizardita Y
    ko: 리자몽나이트Y
  descriptions:
    jp_kana: "リザードンに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "リザードンに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Charizard hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Dracaufeu, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Charizard, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Glurak getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Charizard en combate."
    ko: "리자몽에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
charti_berry:
  names:
    jp_kana: ヨロギのみ
    jp_kanji: ヨロギのみ
    en: Charti Berry
    fr: Baie Charti
    it: Baccaciofo
    de: Chiaribeere
    es: Baya Alcho
    ko: 루미열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　いわ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　いわ技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Rock-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Roche."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Roccia del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Gestein."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Roca de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 바위 기술을\n당했을 때 위력이 약해진다."
cheri_berry:
  names:
    jp_kana: クラボのみ
    jp_kanji: クラボのみ
    en: Cheri Berry
    fr: Baie Ceriz
    it: Baccaliegia
    de: Amrenabeere
    es: Baya Zreza
    ko: 버치열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nまひを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nまひを　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom paralysis on its own in battle."
    fr: "Une Baie qui soigne la paralysie lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce dalla\nparalisi."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Paralyse."
    es: "Los Pokémon pueden llevarla o usarla para\nrecuperarse de la parálisis."
    ko: "포켓몬에게 지니게 하면\n마비를 회복한다."
cherish_ball:
  names:
    jp_kana: プレシャスボール
    jp_kanji: プレシャスボール
    en: Cherish Ball
    fr: Mémoire Ball
    it: Pregio Ball
    de: Jubelball
    es: Gloria Ball
    ko: 프레셔스볼
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nかなり　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nかなり　珍しい　ボール。"
    en: "A quite rare Poké Ball that has been\ncrafted in order to commemorate\na special occasion of some sort."
    fr: "Une Poké Ball plutôt rare qui fut créée pour\nune occasion spéciale."
    it: "Poké Ball molto esclusiva creata per\ncommemorare un evento speciale."
    de: "Ein seltener Ball, der als Reminiszenz an irgendein\nEreignis hergestellt wurde."
    es: "Es una Poké Ball bastante singular que se creó\npara conmemorar alguna ocasión especial."
    ko: "무언가의 기념품으로\n특별히 만들어진\n상당히 진귀한 볼."
chesto_berry:
  names:
    jp_kana: カゴのみ
    jp_kanji: カゴのみ
    en: Chesto Berry
    fr: Baie Maron
    it: Baccastagna
    de: Maronbeere
    es: Baya Atania
    ko: 유루열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nねむりを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n眠りを　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom sleep on its own in battle."
    fr: "Une Baie qui soigne le sommeil lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, si risveglia\ndal sonno."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nerwacht es dadurch aus dem Schlaf."
    es: "Los Pokémon pueden llevarla o usarla para\ndespertar del sueño."
    ko: "포켓몬에게 지니게 하면\n잠듦을 회복한다."
chilan_berry:
  names:
    jp_kana: ホズのみ
    jp_kanji: ホズのみ
    en: Chilan Berry
    fr: Baie Zalis
    it: Baccacinlan
    de: Latchibeere
    es: Baya Chilan
    ko: 카리열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nノーマル　わざを　うけたとき\nいりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\nノーマル技を　受けたとき\n威力が　弱まる。"
    en: "If held by a Pokémon, this Berry\nwill lessen the damage taken\nfrom one Normal-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nde type Normal."
    it: "Se un Pokémon ha questa bacca, l’attacco\ndi tipo Normale del nemico viene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nAttacken des Angreifers vom Typ Normal."
    es: "Si la lleva un Pokémon, debilita un ataque de tipo\nNormal de un enemigo."
    ko: "포켓몬에게 지니게 하면\n노말 기술을 당했을 때\n위력이 약해진다."
chill_drive:
  names:
    jp_kana: フリーズカセット
    jp_kanji: フリーズカセット
    en: Chill Drive
    fr: Module Cryo
    it: Gelomodulo
    de: Gefriermodul
    es: CrioROM
    ko: 프리즈카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nこおりタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nこおりタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Genesect’s Techno Blast\nmove so it becomes Ice type."
    fr: "Tenu par Genesect, ce module change la\ncapacité TechnoBuster en une capacité de type\nGlace."
    it: "Modulo da dare a Genesect. Trasforma\nTecnobotto in una mossa di tipo Ghiaccio."
    de: "Gibt man es Genesect zum Tragen, wandelt es\nden Typ der Attacke Techblaster in Eis um."
    es: "Cartucho que convierte Tecno Shock de\nGenesect en un movimiento de tipo Hielo."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n얼음타입으로 바뀌는 카세트."
choice_band:
  names:
    jp_kana: こだわりハチマキ
    jp_kanji: こだわりハチマキ
    en: Choice Band
    fr: Bandeau Choix
    it: Bendascelta
    de: Wahlband
    es: Cinta Elegida
    ko: 구애머리띠
  descriptions:
    jp_kana: "ちょっと　こだわった　ハチマキ。\nもたせると　こうげきは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　ハチマキ。\n持たせると　攻撃は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis curious headband boosts Attack\nbut only allows the use of one move."
    fr: "Objet à tenir. Ce bandeau augmente l’Attaque,\nmais ne permet d’utiliser qu’une seule capacité\npar combat."
    it: "Strumento da dare a un Pokémon.\nQuesta benda aumenta la potenza delle mosse,\nma permette l’uso di una sola mossa."
    de: "Ein Item, das von einem Pokémon getragen\nwerden kann. Es stärkt den Angriffs-Wert,\naber nur eine Attacke ist einsetzbar."
    es: "Aumenta la potencia de los ataques físicos del\nPokémon que la lleva, pero solo le permite usar\nun movimiento."
    ko: "기술을 구애받는 머리띠.\n지니게 하면 공격은 올라가지만\n똑같은 기술밖에 쓰지 못한다."
choice_scarf:
  names:
    jp_kana: こだわりスカーフ
    jp_kanji: こだわりスカーフ
    en: Choice Scarf
    fr: Mouchoir Choix
    it: Stolascelta
    de: Wahlschal
    es: Pañuelo Elegido
    ko: 구애스카프
  descriptions:
    jp_kana: "ちょっと　こだわった　スカーフ。\nもたせると　すばやさは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　スカーフ。\n持たせると　素早さは　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThis curious scarf boosts Speed\nbut only allows the use of one move."
    fr: "Objet à tenir. Augmente la Vitesse, mais ne\npermet d’utiliser qu’une seule capacité par\ncombat."
    it: "Strumento da dare a un Pokémon.\nStola che aumenta la Velocità, ma consente\nl’uso di una sola mossa."
    de: "Ein Item zum Tragen. Der Schal erhöht\nden Initiative-Wert, aber nur eine Attacke\nist einsetzbar."
    es: "Debe llevarlo un Pokémon. Potencia la Velocidad,\npero solo permite usar un movimiento."
    ko: "기술을 구애받는 스카프.\n지니게 하면 스피드는 올라가지만\n같은 기술밖에 쓸 수 없다."
choice_specs:
  names:
    jp_kana: こだわりメガネ
    jp_kanji: こだわりメガネ
    en: Choice Specs
    fr: Lunettes Choix
    it: Lentiscelta
    de: Wahlglas
    es: Gafas Elegid
    ko: 구애안경
  descriptions:
    jp_kana: "ちょっと　こだわった　メガネ。\nもたせると　とくこうは　あがるが\nおなじ　わざしか　だせなくなる。"
    jp_kanji: "ちょっと　こだわった　メガネ。\n持たせると　特攻は　あがるが\n同じ　技しか　だせなくなる。"
    en: "An item to be held by a Pokémon.\nThese curious glasses boost Sp. Atk\nbut only allow the use of one move."
    fr: "Objet à tenir. Augmente l’Attaque Spéciale,\nmais ne permet d’utiliser qu’une seule capacité\npar combat."
    it: "Strumento da dare a un Pokémon.\nQuesti occhiali aumentano la potenza delle mosse\nspeciali, ma permettono l’uso di una sola mossa."
    de: "Ein Item zum Tragen. Die Brille erhöht den\nSpezial-Angriff, aber nur eine Attacke\nist einsetzbar."
    es: "Aumentan la potencia de los ataques especiales\ndel Pokémon que las lleva, pero solo le permiten\nusar un movimiento."
    ko: "기술을 구애받는 안경.\n지니게 하면 특수공격이 올라가지만\n같은 기술밖에 쓸 수 없다."
chople_berry:
  names:
    jp_kana: ヨプのみ
    jp_kanji: ヨプのみ
    en: Chople Berry
    fr: Baie Pomroz
    it: Baccarosmel
    de: Rospelbeere
    es: Baya Pomaro
    ko: 로플열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　かくとう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　かくとう技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Fighting-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Combat."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Lotta del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Kampf."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Lucha de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 격투 기술을\n당했을 때 위력이 약해진다."
claw_fossil:
  names:
    jp_kana: ツメのカセキ
    jp_kanji: ツメのカセキ
    en: Claw Fossil
    fr: Fossile Griffe
    it: Fossilunghia
    de: Klauenfossil
    es: Fósil Garra
    ko: 발톱화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nツメの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nツメの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived in the sea. It appears\nto be a fragment of a claw."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de griffe."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di un artiglio."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es sieht wie eine Klaue aus."
    es: "Fósil de un Pokémon ancestral que vivió en el\nfondo del mar. Parece ser parte de una garra."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n발톱의 일부인 듯하다."
cleanse_tag:
  names:
    jp_kana: きよめのおふだ
    jp_kanji: きよめのおふだ
    en: Cleanse Tag
    fr: Rune Purifiante
    it: Velopuro
    de: Schutzband
    es: Amuleto
    ko: 순결의부적
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon.\nIt helps keep wild Pokémon away if\nthe holder is the head of the party."
    fr: "Objet à tenir. Aide à repousser les Pokémon\nsauvages si le porteur est le premier Pokémon\nde l’équipe."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha è il primo della squadra, aiuta\nad allontanare i Pokémon selvatici."
    de: "Ein Item zum Tragen. Reduziert Begegnungen mit\nwilden Pokémon, wenn der Träger an erster Stelle\nsteht."
    es: "Si lo lleva el primer Pokémon del equipo, se\nreduce la probabilidad de que se acerquen\nPokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
clear_bell:
  names:
    jp_kana: とうめいなスズ
    jp_kanji: とうめいなスズ
    en: Clear Bell
    fr: Glas Transparent
    it: Campana Chiara
    de: Klarglocke
    es: Campana Clara
    ko: 크리스탈방울
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　音色が　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that\nmakes a gentle ringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono che dona\npace al cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten\nalle besänftigt, die es hören."
    es: "Campana de aspecto antiguo que emite un sonido\nque calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
clever_feather:
  names:
    jp_kana: せいしんのハネ
    jp_kanji: せいしんのハネ
    en: Clever Wing
    fr: Aile Mental
    it: Piumintuito
    de: Espritfeder
    es: Pluma Mente
    ko: 정신력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくぼうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特防の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon.\nIt slightly increases the base Sp. Def\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Défense Spéciale de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Difesa\nSpeciale."
    de: "Schenkt man einem Pokémon dieses Item,\nwird dessen Spezial-Verteidigungs-Basiswert\ndauerhaft erhöht."
    es: "Pluma que aumenta un poco la Defensa Especial\nde base de un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수방어\n기초 포인트를 조금 올린다."
coba_berry:
  names:
    jp_kana: バコウのみ
    jp_kanji: バコウのみ
    en: Coba Berry
    fr: Baie Cobaba
    it: Baccababa
    de: Kobabeere
    es: Baya Kouba
    ko: 바코열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ひこう　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ひこう技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Flying-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Vol."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Volante del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Flug."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Volador de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 비행 기술을\n당했을 때 위력이 약해진다."
coin_case:
  names:
    jp_kana: コインケース
    jp_kanji: コインケース
    en: Coin Case
    fr: Boîte Jetons
    it: Salvadanaio
    de: Münzkorb
    es: Monedero
    ko: 동전케이스
  descriptions:
    jp_kana: "ゲームコーナーで　てにいれた\nコインを　５００００まい　まで\nいれることが　できる　ケース。"
    jp_kanji: "ゲームコーナーで　てにいれた\nコインを　５００００枚まで\nいれることが　できる　ケース。"
    en: "A case for holding coins obtained\nat the Game Corner. It can hold up\nto 50,000 coins."
    fr: "Une boîte pour conserver les Jetons\nobtenus au Casino.\nPeut contenir jusqu’à 50 000 Jetons."
    it: "Contenitore ottenuto al Casinò che può\ncontenere fino a 50.000 Gettoni."
    de: "Im Korb finden bis zu 50 000 Münzen\nder Spielhalle Platz."
    es: "Puedes obtenerlo en el Casino. Tiene capacidad\npara 50 000 Fichas."
    ko: "게임코너에서 손에 넣은\n동전을 50000개 까지\n넣을 수 있는 케이스."
colbur_berry:
  names:
    jp_kana: ナモのみ
    jp_kanji: ナモのみ
    en: Colbur Berry
    fr: Baie Lampou
    it: Baccaxan
    de: Burleobeere
    es: Baya Dillo
    ko: 마코열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　あく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　あく技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Dark-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Ténèbres."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Buio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Unlicht."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Siniestro de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 악 기술을\n당했을 때 위력이 약해진다."
colress_machine:
  names:
    jp_kana: アクロママシーン
    jp_kanji: アクロママシーン
    en: Colress Machine
    fr: Nikodule
    it: Acrocongegno
    de: Achromat
    es: Acromáquina
    ko: 아크로마머신
  descriptions:
    jp_kana: "ポケモンの　のうりょくを　むりやり\nめざめさせる　とくしゅな　そうち。\nだが　しさくひんのため　ふかんぜん。"
    jp_kanji: "ポケモンの　能力を　無理やり\n目覚めさせる　特殊な　装置。\nだが　試作品のため　不完全。"
    en: "A special device that wrings out\nthe potential of Pokémon.\nIt is an imperfect prototype."
    fr: "Un appareil spécial qui permet d’éveiller de force\nla puissance des Pokémon. Mais il ne s’agit que\nd’un prototype."
    it: "Prototipo imperfetto di un dispositivo speciale\nideato per risvegliare in modo forzato le capacità\ndei Pokémon."
    de: "Eine Vorrichtung, die verborgene Kräfte in den\nPokémon weckt. Es handelt sich dabei um einen\nunfertigen Prototyp."
    es: "Dispositivo que permite aumentar forzadamente\nlas características de los Pokémon.\nEs un prototipo imperfecto."
    ko: "포켓몬의 능력을 강제로\n눈뜨게 만드는 특수 장치.\n그러나 시작품이기에 불완전하다."
comet_shard:
  names:
    jp_kana: すいせいのかけら
    jp_kanji: すいせいのかけら
    en: Comet Shard
    fr: Morceau Comète
    it: Pezzo Cometa
    de: Kometstück
    es: Fragmento Cometa
    ko: 혜성조각
  descriptions:
    jp_kana: "すいせいが　ちかづいたとき\nちひょうに　おちた　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "すい星が　近づいたとき\n地表に　落ちた　かけら。\nショップで　高く　売れる。"
    en: "A shard that fell to the ground when a comet\napproached. It can be sold at a high price\nto shops."
    fr: "Un fragment de comète, tombé au sol quand elle\ntraversait l’atmosphère. Peut être vendu à bon\nprix aux magasins."
    it: "Scheggia di cometa caduta al suolo. Si può\nvendere a un prezzo piuttosto alto nei negozi."
    de: "Ein Kometensplitter, der aus dem All\nherabgefallen ist. Er ist von großem Wert."
    es: "Fragmento de un cometa caído al suelo al\natravesar la atmósfera. Muy valorado por los\ncoleccionistas."
    ko: "혜성이 가까워졌을 때\n지표면에 떨어진 조각.\n상점에서 비싸게 팔린다."
common_stone:
  names:
    jp_kana: ありふれたいし
    jp_kanji: ありふれたいし
    en: Common Stone
    fr: Pierre Ordinaire
    it: Sasso qualsiasi
    de: Normaler Stein
    es: Piedra Común
    ko: 흔해빠진돌
  descriptions:
    jp_kana: "みる　ひとに　よっては\nきちょう　かもしれない\nでも　ふつうの　いし。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nでも　普通の　石。"
    en: "A perfectly normal stone that might\nappear to be valuable to some.\nIt’s all in the eye of the beholder."
    fr: "Une pierre assez banale qui pourrait avoir de\nla valeur pour certains."
    it: "Un sasso qualsiasi che qualcuno potrebbe\nritenere di valore."
    de: "Ein Stein, der für manche vielleicht wertvoll\naussieht, tatsächlich aber nur ein gewöhnlicher\nStein ist."
    es: "Una piedra de aspecto normal que a algunos\nles puede parecer de gran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n평범한 돌."
contest_costume:female:
  names:
    jp_kana: ライブドレス
    jp_kanji: ライブドレス
    en: Contest Costume
    fr: Robe Live
    it: Vestito Live
    de: Live-Kleid
    es: Vestido de Gala
    ko: 라이브드레스
  descriptions:
    jp_kana: "コンテストライブで　きる\nとっても　かわいい　ドレス。"
    jp_kanji: "コンテストライブで　着る\nとっても　可愛い　ドレス。"
    en: "A very cute dress to be worn during\nthe Contest Spectacular."
    fr: "Une robe très mignonne portée pour le Concours\nPokémon Live !"
    it: "Grazioso vestito da indossare durante le\nGare Live."
    de: "Ein niedliches Kleidchen, das bei\nPokémon-Wettbewerb Live!\ngetragen werden kann."
    es: "Vestido de lo más espectacular para lucir en el\nGran Concurso."
    ko: "콘테스트 라이브에서 입는\n아주 귀여운 드레스다."
contest_costume:male:
  names:
    jp_kana: ライブスーツ
    jp_kanji: ライブスーツ
    en: Contest Costume
    fr: Costume Live
    it: Costume Live
    de: Live-Anzug
    es: Traje de Gala
    ko: 라이브슈트
  descriptions:
    jp_kana: "コンテストライブで　きる\nとっても　カッコいい　スーツ。"
    jp_kanji: "コンテストライブで　着る\nとっても　格好良い　スーツ。"
    en: "A very cool suit to be worn during\nthe Contest Spectacular."
    fr: "Un costume très rock porté pour le Concours\nPokémon Live !"
    it: "Elegante costume da indossare durante le\nGare Live."
    de: "Ein schicker Anzug, der bei\nPokémon-Wettbewerb Live!\ngetragen werden kann."
    es: "Traje de lo más espectacular para lucir en el\nGran Concurso."
    ko: "콘테스트 라이브에서 입는\n아주 멋있는 슈트다."
contest_pass:
  names:
    jp_kana: コンテストパス
    jp_kanji: コンテストパス
    en: Contest Pass
    fr: Passe Concours
    it: Tessera Gare
    de: Wettbewerbskarte
    es: Pase Concurso
    ko: 콘테스트패스
  descriptions:
    jp_kana: "もっていれば　ポケモンコンテストに\nさんか　することが　できる。\nきねんリボンが　かかれている。"
    jp_kanji: "持っていれば　ポケモンコンテストに\n参加することが　できる。\n記念リボンが　描かれている。"
    en: "A pass required for entering Pokémon\nContests. It has a drawing of an award\nribbon on its front."
    fr: "La carte requise pour participer aux Concours\nPokémon. Il y a un ruban dessiné dessus."
    it: "Tessera necessaria per partecipare alle\nGare Pokémon. Riporta il disegno di un fiocco."
    de: "Ausweis zur Teilnahme an Pokémon-\nWettbewerben. Die Zeichnung eines\nBandes ist aufgedruckt."
    es: "Es necesario para participar en Concursos\nPokémon. Tiene una cinta de ganador dibujada."
    ko: "지니고 있으면 포켓몬 콘테스트에\n참가할 수 있다.\n기념리본이 그려져 있다."
cornn_berry:
  names:
    jp_kana: モコシのみ
    jp_kanji: モコシのみ
    en: Cornn Berry
    fr: Baie Siam
    it: Baccavena
    de: Saimbeere
    es: Baya Mais
    ko: 수숙열매
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Beauté d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la belleza. Es una baya muy rara en\notras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
coupon_1:
  names:
    jp_kana: ひきかえけん１
    jp_kanji: ひきかえけん１
    en: Coupon 1
    fr: Bon 1
    it: Coupon 1
    de: Kupon 1
    es: Cupón 1
    ko: 교환권1
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a\nPokémon Watch—Pokétch for short.\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre une\nPokémontre."
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener\nun Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
coupon_2:
  names:
    jp_kana: ひきかえけん２
    jp_kanji: ひきかえけん２
    en: Coupon 2
    fr: Bon 2
    it: Coupon 2
    de: Kupon 2
    es: Cupón 2
    ko: 교환권2
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a\nPokémon Watch—Pokétch for short.\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre une\nPokémontre."
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener\nun Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
coupon_3:
  names:
    jp_kana: ひきかえけん３
    jp_kanji: ひきかえけん３
    en: Coupon 3
    fr: Bon 3
    it: Coupon 3
    de: Kupon 3
    es: Cupón 3
    ko: 교환권3
  descriptions:
    jp_kana: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　ひつような\nひきかえけん。　３まい　ひつよう。"
    jp_kanji: "ポケモンウォッチ　ちぢめて\nポケッチを　もらうために　必要な\nひきかえけん。　３枚必要。"
    en: "A coupon to be exchanged for a\nPokémon Watch—Pokétch for short.\nThree coupons are needed."
    fr: "Un des trois bons à échanger contre une\nPokémontre."
    it: "Coupon da scambiare con un PokéKron.\nNe servono tre."
    de: "Einer der drei Coupons, die du für den Pokétch\nbenötigst."
    es: "Uno de los tres cupones que sirve para obtener\nun Poké-reloj."
    ko: "포켓몬워치, 줄여서 포켓치를\n받는 데 필요한 교환권.\n3장이 필요하다."
cover_fossil:
  names:
    jp_kana: ふたのカセキ
    jp_kanji: ふたのカセキ
    en: Cover Fossil
    fr: Fossile Plaque
    it: Fossiltappo
    de: Schildfossil
    es: Fósil Tapa
    ko: 덮개화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nせなかの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nせなかの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived in the sea. It appears\nas though it could be part of its back."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nIl semble que ce soit une partie de son dos."
    it: "Fossile di un Pokémon preistorico che viveva\nnel mare. Sembra essere parte del suo dorso."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Offenbar handelt es sich um einen\nTeil des Rückens."
    es: "Fósil de un Pokémon ancestral que vivió en el\nfondo del mar. Parece ser un fragmento de\nconcha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등의 일부인 듯하다."
custap_berry:
  names:
    jp_kana: イバンのみ
    jp_kanji: イバンのみ
    en: Custap Berry
    fr: Baie Chérim
    it: Baccacrela
    de: Eipfelbeere
    es: Baya Chiri
    ko: 애슈열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nこうどうが　はやくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n行動が　早くなる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it will be able to\nmove first just once when it’s in a pinch."
    fr: "Tenue, cette Baie permet d’attaquer en premier\nune fois en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, sferra la sua mossa per primo.\nFunziona una sola volta."
    de: "Als getragenes Item ermöglicht diese Beere dem\nTräger in einer Notlage den Erstschlag."
    es: "El Pokémon que la lleva puede actuar en primer\nlugar una vez cuando se encuentra en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n행동이 빨라진다."
damp_mulch:
  names:
    jp_kana: じめじめこやし
    jp_kanji: じめじめこやし
    en: Damp Mulch
    fr: Fertihumide
    it: Fertilidro
    de: Feuchtmulch
    es: Abono Lento
    ko: 축축이비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
damp_rock:
  names:
    jp_kana: しめったいわ
    jp_kanji: しめったいわ
    en: Damp Rock
    fr: Roche Humide
    it: Rocciaumida
    de: Nassbrocken
    es: Roca Lluvia
    ko: 축축한바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　あまごいを\nつかうと　いつもより　あめの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あまごいを\n使うと　いつもより　あめの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon.\nIt extends the duration of the move\nRain Dance when used by the holder."
    fr: "Objet à tenir. Augmente la durée de la capacité\nDanse Pluie utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Pioggiadanza."
    de: "Ein Item zum Tragen. Verlängert die Dauer\nvon Regentanz, wenn der Träger es einsetzt."
    es: "Prolonga la duración del movimiento Danza Lluvia\nque use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 비바라기를\n쓰면 여느 때보다 비 내리는\n시간이 길어진다."
dark_gem:
  names:
    jp_kana: あくのジュエル
    jp_kanji: あくのジュエル
    en: Dark Gem
    fr: Joyau Ténèbres
    it: Bijoubuio
    de: Unlichtjuwel
    es: Gema Siniestra
    ko: 악주얼
  descriptions:
    jp_kana: "あくの　タイプの　ジュエル。\nもたせると　いちどだけ　あくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　ジュエル。\n持たせると　１度だけ　あくの\n技の　威力が　強まる。"
    en: "A gem with an essence of darkness.\nWhen held, it strengthens the power\nof a Dark-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Buio."
    de: "Ein Juwel vom Typ Unlicht. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Unlicht."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Siniestro. Debe llevarla\nun Pokémon."
    ko: "악타입의 주얼.\n지니게 하면 한 번만 악\n기술의 위력이 강해진다."
dark_stone:
  names:
    jp_kana: ダークストーン
    jp_kanji: ダークストーン
    en: Dark Stone
    fr: Galet Noir
    it: Scurolite
    de: Dunkelstein
    es: Orbe Oscuro
    ko: 다크스톤
  descriptions:
    jp_kana: "ゼクロムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "ゼクロムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Zekrom’s body was destroyed and\nchanged into this stone. It is said to\nbe waiting for the emergence of a hero."
    fr: "Ce sont les derniers restes du corps de Zekrom.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Zekrom quando\nha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Zekrom\ndiese Gestalt an. Man sagt, es warte auf die\nAnkunft eines Helden."
    es: "Forma que adoptó Zekrom al perder su cuerpo.\nEspera la llegada de un nuevo héroe."
    ko: "제크로무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
data_card_01:
  names:
    jp_kana: データカード０１
    jp_kanji: データカード０１
    en: Data Card 01
    fr: Carte Mémo01
    it: Scheda Dati 01
    de: Datenkarte01
    es: Tarjeta Datos 01
    ko: 데이터카드01
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nゆうしょう　かいすうが"
    jp_kanji: "ポケスロンの　記録が　はいっている。\n優勝　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how many victories\nyou have had in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit votre nombre de\nvictoires au Pokéathlon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero totale\ndi vittorie."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du ein Turnier gewonnen hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias."
    ko: "포켓슬론의 기록이 들어 있다.\n우승 횟수가\n기록된 카드."
data_card_02:
  names:
    jp_kana: データカード０２
    jp_kanji: データカード０２
    en: Data Card 02
    fr: Carte Mémo02
    it: Scheda Dati 02
    de: Datenkarte02
    es: Tarjeta Datos 02
    ko: 데이터카드02
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nビリになった　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nビリになった　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how many losses\nyou have had in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de fois\noù vous avez fini en dernier."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nultimi posti."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du bei einem Turnier Letzter\ngeworden bist."
    es: "Contiene los datos del Pokéathlon con el número\nde veces que se ha quedado en último lugar."
    ko: "포켓슬론의 기록이 들어 있다.\n꼴찌가 된 횟수가\n기록된 카드."
data_card_03:
  names:
    jp_kana: データカード０３
    jp_kanji: データカード０３
    en: Data Card 03
    fr: Carte Mémo03
    it: Scheda Dati 03
    de: Datenkarte03
    es: Tarjeta Datos 03
    ko: 데이터카드03
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケモンの　ダッシュした　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケモンの　ダッシュした　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how many times your\nPokémon dashed in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de sprints\nde vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di sprint\ndei tuoi Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie viele Sprints du schon hinter dir hast."
    es: "Contiene los datos del Pokéathlon con el número\nde sprints de los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬이 대시한 횟수가\n기록된 카드."
data_card_04:
  names:
    jp_kana: データカード０４
    jp_kanji: データカード０４
    en: Data Card 04
    fr: Carte Mémo04
    it: Scheda Dati 04
    de: Datenkarte04
    es: Tarjeta Datos 04
    ko: 데이터카드04
  descriptions:
