    fr: "Un gant aux pouvoirs mystérieux permettant à\nun Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Megaguanto che cela un misterioso potere.\nConsente a un Pokémon che ha una\nMegapietra di megaevolversi durante la lotta."
    de: "Ein Handschuh mit geheimnisvollen Kräften.\nEr erlaubt Pokémon, die einen Mega-Stein tragen,\neine Mega-Entwicklung durchzuführen."
    es: "Guante con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven una\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 글러브."
mega_pendant:
  names:
    jp_kana: メガペンダント
    jp_kanji: メガペンダント
    en: Mega Pendant
    fr: Méga-Pendentif
    it: Megapendente
    de: Mega-Anhänger
    es: Megacollar
    ko: 메가펜던트
  descriptions:
    jp_kana: "メガストーンを　もったまま　たたかう\nポケモンを　メガシンカさせる\nみちのパワーを　ひめた　ネックレス。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　ネックレス。"
    en: "This necklace contains an untold power\nthat somehow enables Pokémon carrying\na Mega Stone to Mega Evolve in battle."
    fr: "Un pendentif aux pouvoirs mystérieux permettant\nà un Pokémon de méga-évoluer au combat s’il\ntient la bonne Méga-Gemme."
    it: "Collana dotata di un misterioso potere.\nPermette a un Pokémon che ha una Megapietra\ndi megaevolversi durante la lotta."
    de: "Ein Anhänger mit geheimnisvollen Kräften.\nEr ermöglicht Pokémon, die einen Mega-Stein\ntragen, eine Mega-Entwicklung durchzuführen."
    es: "Collar con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven la\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 목걸이."
mega_ring:
  names:
    jp_kana: メガリング
    jp_kanji: メガリング
    en: Mega Ring
    fr: Méga-Anneau
    it: Megacerchio
    de: Mega-Ring
    es: Mega-Aro
    ko: 메가링
  descriptions:
    jp_kana: "メガストーンを　もったまま　たたかう\nポケモンを　メガシンカさせる\nみちのパワーを　ひめた　リング。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　リング。"
    en: "This ring contains an untold power that\nsomehow enables Pokémon carrying\nMega Stones to Mega Evolve in battle."
    fr: "Un anneau aux pouvoirs mystérieux permettant à\nun Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Cerchio che nasconde un misterioso potere.\nConsente a un Pokémon che ha una\nMegapietra di megaevolversi durante la lotta."
    de: "Ein Armband mit geheimnisvollen Kräften.\nEs erlaubt Pokémon, die einen Mega-Stein tragen,\neine Mega-Entwicklung durchzuführen."
    es: "Accesorio con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven una\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 링."
mega_stickpin:
  names:
    jp_kana: メガラペルピン
    jp_kanji: メガラペルピン
    en: Mega Stickpin
    fr: Méga-Pin’s
    it: Megaspilla
    de: Mega-Anstecker
    es: Megabroche
    ko: 메가라펠핀
  descriptions:
    jp_kana: "メガストーンを　もったまま　たたかう\nポケモンを　メガシンカさせる\nみちのパワーを　ひめた　ラペルピン。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　ラペルピン。"
    en: "This stickpin contains an untold power\nthat somehow enables Pokémon carrying\na Mega Stone to Mega Evolve in battle."
    fr: "Un pin’s aux pouvoirs mystérieux permettant à\nun Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Spilla dotata di un misterioso potere.\nPermette a un Pokémon che ha una Megapietra\ndi megaevolversi durante la lotta."
    de: "Ein Anstecker mit geheimnisvollen Kräften.\nEr ermöglicht Pokémon, die einen Mega-Stein\ntragen, eine Mega-Entwicklung durchzuführen."
    es: "Broche con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven la\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 라펠핀."
mega_tiara:
  names:
    jp_kana: メガティアラ
    jp_kanji: メガティアラ
    en: Mega Tiara
    fr: Méga-Tiare
    it: Megadiadema
    de: Mega-Diadem
    es: Megatiara
    ko: 메가티아러
  descriptions:
    jp_kana: "メガストーンを　もったまま　たたかう\nポケモンを　メガシンカさせる\nみちのパワーを　ひめた　ティアラ。"
    jp_kanji: "メガストーンを　持ったまま　戦う\nポケモンを　メガシンカさせる\n未知のパワーを　秘めた　ティアラ。"
    en: "This tiara contains an untold power that\nsomehow enables Pokémon carrying\na Mega Stone to Mega Evolve in battle."
    fr: "Une tiare aux pouvoirs mystérieux permettant à\nun Pokémon de méga-évoluer au combat s’il tient\nla bonne Méga-Gemme."
    it: "Diadema dotato di un misterioso potere.\nPermette a un Pokémon che ha una Megapietra\ndi megaevolversi durante la lotta."
    de: "Ein Diadem mit geheimnisvollen Kräften.\nEs ermöglicht Pokémon, die einen Mega-Stein\ntragen, eine Mega-Entwicklung durchzuführen."
    es: "Tiara con un poder misterioso que permite\nmegaevolucionar a Pokémon que lleven la\nMegapiedra adecuada."
    ko: "메가스톤을 지닌 채로 싸우는\n포켓몬을 메가진화시키는\n미지의 힘을 가진 티아러."
member_card:
  names:
    jp_kana: メンバーズカード
    jp_kanji: メンバーズカード
    en: Member Card
    fr: Carte Membre
    it: Scheda Soci
    de: Mitgl.Karte
    es: Carné Socio
    ko: 멤버스카드
  descriptions:
    jp_kana: "ミオシティの　やどやに　はいれる\nカード。　なぜか　５０ねんほどまえの\nひづけが　きざまれている。"
    jp_kanji: "ミオシティの　宿屋に　はいれる\nカード。　なぜか　５０年ほど前の\n日付が　刻まれている。"
    en: "A card needed for entering the inn in\nCanalave City. Oddly, the last date\nmarked on it was 50 years ago."
    fr: "Une carte nécessaire pour entrer à l’auberge\nde Joliberges. Le dernier tampon date d’il y a\n50 ans !"
    it: "Scheda che permette di entrare nella locanda\ndi Canalipoli. L’ultimo timbro risale a 50 anni fa."
    de: "Eine Eintrittskarte für den Gasthof in Fleetburg.\nSie ist über 50 Jahre alt..."
    es: "Necesario para entrar en la posada de Ciudad\nCanal. Es extraño, pero la última fecha registrada\nes de hace 50 años."
    ko: "운하시티의 여관에 들어갈 수 있는\n카드. 어찌된 일인지 50년 정도 전의\n날짜가 새겨져 있다."
mental_herb:
  names:
    jp_kana: メンタルハーブ
    jp_kanji: メンタルハーブ
    en: Mental Herb
    fr: Herbe Mental
    it: Mentalerba
    de: Mentalkraut
    es: Hierba Mental
    ko: 멘탈허브
  descriptions:
    jp_kana: "もたせた　ポケモンが　じゆうに\nわざを　だせなくなったときに\nいちどだけ　かいふくする。"
    jp_kanji: "持たせた　ポケモンが　自由に\n技を　だせなくなったときに\n１度だけ　回復する。"
    en: "An item to be held by a Pokémon.\nThe holder shakes off move-binding effects\nto move freely. It can be used only once."
    fr: "Objet à tenir. Guérit de certaines attaques\nlimitant le choix des capacités.\nNe peut être utilisé qu’une fois."
    it: "Strumento monouso che guarisce il Pokémon\ndalle condizioni che gli impediscono di usare\nle sue mosse."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Hilft einmalig bei\neingeschränktem Handlungsspielraum."
    es: "El Pokémon que la lleva se libera del efecto\nde movimientos que restringen sus acciones.\nSolo puede usarse una vez."
    ko: "지니게 한 포켓몬은\n헤롱헤롱 상태가 되었을 때\n한 번만 회복한다."
metagrossite:
  names:
    jp_kana: メタグロスナイト
    jp_kanji: メタグロスナイト
    en: Metagrossite
    fr: Métalossite
    it: Metagrossite
    de: Metagrossnit
    es: Metagrossita
    ko: 메타그로스나이트
  descriptions:
    jp_kana: "メタグロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "メタグロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Metagross hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Métalosse, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Metagross, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Metagross getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Metagross en combate."
    ko: "메타그로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
metal_coat:
  names:
    jp_kana: メタルコート
    jp_kanji: メタルコート
    en: Metal Coat
    fr: Peau Métal
    it: Metalcoperta
    de: Metallmantel
    es: Revest. Metálico
    ko: 금속코트
  descriptions:
    jp_kana: "とくしゅな　きんぞくの　まく。\nもたせると　はがねタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "特殊な　金属の　膜。\n持たせると　はがねタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a special metallic film that can\nboost the power of Steel-type moves."
    fr: "Objet à tenir. Une pellicule métallique spéciale\nqui augmente la puissance des capacités de type\nAcier."
    it: "Strumento da dare a un Pokémon.\nSpeciale pellicola metallica che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es verstärkt Attacken\nvom Typ Stahl."
    es: "Película metálica que fortalece los ataques de\ntipo Acero. Debe llevarlo un Pokémon."
    ko: "특수한 금속 장막.\n지니게 하면 강철타입\n기술의 위력이 올라간다."
metal_powder:
  names:
    jp_kana: メタルパウダー
    jp_kanji: メタルパウダー
    en: Metal Powder
    fr: Poudre Métal
    it: Metalpolvere
    de: Metallstaub
    es: Polvo Metálico
    ko: 금속파우더
  descriptions:
    jp_kana: "メタモンに　もたせると　ぼうぎょが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　防御が\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto.\nExtremely fine yet hard, this odd\npowder boosts the Defense stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Défense."
    it: "Strumento da dare a Ditto.\nStrana polvere finissima e al tempo stesso dura\nche migliora la Difesa."
    de: "Ein Item, das von Ditto getragen werden kann.\nEs erhöht seinen Verteidigungs-Wert."
    es: "Debe llevarlo Ditto. Es un polvo muy fino, pero a\nla vez resistente, que aumenta su Defensa."
    ko: "메타몽에게 지니게 하면\n방어가 올라가는 이상한 가루.\n매우 잘고 단단하다."
meteorite:hoenn:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
  descriptions:
    jp_kana: "もともとは　りゅうせいのたきに\nおちていた　いんせき。\nえんとつやまで　てにいれた。"
    jp_kanji: "元々は　流星の滝に\n落ちていた　いんせき。\nえんとつ山で　手に入れた。"
    en: "A Meteorite originally found at Meteor Falls.\nYou got it at Mt. Chimney."
    fr: "Une météorite qui s’est écrasée sur le Site\nMétéore, trouvée au Mont Chimnée."
    it: "Meteorite proveniente dalle Cascate Meteora.\nPuoi ottenerlo sul Monte Camino."
    de: "Ein Meteorit, der ursprünglich bei den\nMeteorfällen eingeschlagen ist.\nDu hast ihn beim Schlotberg erhalten."
    es: "Meteorito obtenido en el Monte Cenizo que antes\nse encontraba en la Cascada Meteoro."
    ko: "원래는 유성의 폭포에\n떨어져 있던 운석이다.\n굴뚝산에서 손에 넣었다."
meteorite:hoenn_2:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nほのかに　かがやきを　はなっている。"
    jp_kanji: "えんとつやまで　手に入れた　いんせき。\nほのかに　輝きを　放っている。"
    en: "A Meteorite that you got at Mt. Chimney.\nIt gives off a faint glow."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une légère lueur."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza."
    de: "Ein Meteorit, den du beim Schlotberg erhalten\nhast. Vom ihm geht ein schwaches Leuchten aus."
    es: "Meteorito obtenido en el Monte Cenizo.\nDesprende un tenue brillo."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은하게 빛을 발하고 있다."
meteorite:hoenn_3:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nほのかな　ひかりを　はなちつづけている。\nふれると　じんわり　あたたかい。"
    jp_kanji: "えんとつやまで　手に入れた　いんせき。\nほのかな　光を　放ち続けている。\n触れると　じんわり　暖かい。"
    en: "A Meteorite that you got at Mt. Chimney.\nIt continues to give off a faint glow\nand is slightly warm to the touch."
    fr: "Une météorite trouvée au Mont Chimnée.\nElle émet une faible lueur de façon continue,\net est légèrement tiède au toucher."
    it: "Meteorite ottenuto sul Monte Camino.\nEmette una debole luminescenza.\nToccandolo, si avverte un certo calore."
    de: "Ein Meteorit, den du beim Schlotberg erhalten\nhast. Von ihm geht ein schwaches Licht aus.\nWenn man ihn berührt, wird er warm."
    es: "Meteorito obtenido en el Monte Cenizo. Sigue\ndesprendiendo un tenue brillo y es ligeramente\ncálido al tacto."
    ko: "굴뚝산에서 손에 넣은 운석.\n은은한 빛을 계속해서 발하고 있다.\n만지면 은근히 따뜻하다."
meteorite:hoenn_4:
  names:
    jp_kana: いんせき
    jp_kanji: いんせき
    en: Meteorite
    fr: Météorite
    it: Meteorite
    de: Meteorit
    es: Meteorito
    ko: 운석
  descriptions:
    jp_kana: "えんとつやまで　てにいれた　いんせき。\nなにかの　もんようが　うかびあがり\nなないろの　ひかりが　あふれだす。"
    jp_kanji: "えんとつやまで　手に入れた　いんせき。\nなにかの　文様が　浮かび上がり\n七色の　光が　あふれだす。"
    en: "A Meteorite that you got at Mt. Chimney.\nSome sort of pattern has risen to the surface,\nand it’s shining with seven colors of light."
    fr: "Une météorite trouvée au Mont Chimnée.\nUn étrange symbole est gravé à sa surface,\net luit des sept couleurs de l’arc-en-ciel."
    it: "Meteorite ottenuto sul Monte Camino.\nSulla superficie è visibile un motivo in rilievo\nche brilla dei colori dell’arcobaleno."
    de: "Ein Meteorit, den du beim Schlotberg erhalten\nhast. Er ist seltsam gemustert und aus seinem\nInneren strahlt ein regenbogenfarbenes Licht."
    es: "Meteorito obtenido en el Monte Cenizo. Presenta\nunos peculiares grabados e irradia una luz con los\nsiete colores del arcoíris."
    ko: "굴뚝산에서 손에 넣은 운석.\n어떤 문양이 드러나며\n일곱 색깔의 빛이 넘쳐난다."
meteorite_shard:
  names:
    jp_kana: いんせきのかけら
    jp_kanji: いんせきのかけら
    en: Meteorite Shard
    fr: Éclat Météorite
    it: Framm. meteorite
    de: Meteoritenstück
    es: Frag. Meteorito
    ko: 운석조각
  descriptions:
    jp_kana: "いしのどうくつに　おちていた\nいんせきのかけらの　ひとつ。\nふれると　ほのかに　あたたかい。"
    jp_kanji: "石の洞窟に　落ちていた\nいんせきのかけらの　ひとつ。\n触れると　ほのかに　暖かい。"
    en: "One of the fragments of a Meteorite from\nGranite Cave. It’s faintly warm to the touch."
    fr: "L’un des fragments de météorite tombés dans\nla Grotte Granite. Il est légèrement tiède\nau toucher."
    it: "Frammento di meteorite trovato nella Grotta\nPietrosa. Toccandolo, si avverte un certo calore."
    de: "Eines der Meteoritenstücke aus der Granithöhle.\nWenn man es berührt, wird es ein bisschen warm."
    es: "Trozo de meteorito encontrado en el suelo de la\nCueva Granito. Es ligeramente cálido al tacto."
    ko: "바위 동굴에 떨어진\n운석조각 중의 하나.\n만지면 은근히 따뜻하다."
metronome:
  names:
    jp_kana: メトロノーム
    jp_kanji: メトロノーム
    en: Metronome
    fr: Métronome
    it: Plessimetro
    de: Metronom
    es: Metrónomo
    ko: 메트로놈
  descriptions:
    jp_kana: "もたせると　おなじわざを　れんぞくで\nつかったとき　いりょくが　あがる。\nやめると　いりょくは　もどる。"
    jp_kanji: "持たせると　同じ技を　連続で\n使ったとき　威力が　あがる。\nやめると　威力は　もどる。"
    en: "An item to be held by a Pokémon.\nIt boosts moves used consecutively,\nbut only until a different move is used."
    fr: "Objet à tenir. Booste une capacité utilisée\nà répétition. L’effet s’annule si une autre\ncapacité est utilisée."
    it: "Strumento da dare a un Pokémon.\nPotenzia una mossa usata più volte di seguito.\nIl potenziamento svanisce al cambio di mossa."
    de: "Ein Item zum Tragen. Verstärkt eine Attacke,\nje öfter sie in Folge ausgeführt wird."
    es: "Potencia un movimiento que se use de forma\nconsecutiva. Pero el efecto se pierde si se\nemplea otro movimiento."
    ko: "지니게 하면 똑같은 기술을 연속으로\n사용했을 때 위력이 올라간다.\n그만두면 위력이 되돌아간다."
mewtwonite_x:
  names:
    jp_kana: ミュウツナイトＸ
    jp_kanji: ミュウツナイトＸ
    en: Mewtwonite X
    fr: Mewtwoïte X
    it: Mewtwoite X
    de: Mewtunit X
    es: Mewtwoita X
    ko: 뮤츠나이트X
  descriptions:
    jp_kana: "ミュウツーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ミュウツーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Mewtwo hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Mewtwo, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Mewtwo, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Mewtu getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mewtwo en combate."
    ko: "뮤츠에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
mewtwonite_y:
  names:
    jp_kana: ミュウツナイトＹ
    jp_kanji: ミュウツナイトＹ
    en: Mewtwonite Y
    fr: Mewtwoïte Y
    it: Mewtwoite Y
    de: Mewtunit Y
    es: Mewtwoita Y
    ko: 뮤츠나이트Y
  descriptions:
    jp_kana: "ミュウツーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ミュウツーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Mewtwo hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Mewtwo, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Mewtwo, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Mewtu getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Mewtwo en combate."
    ko: "뮤츠에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
micle_berry:
  names:
    jp_kana: ミクルのみ
    jp_kanji: ミクルのみ
    en: Micle Berry
    fr: Baie Micle
    it: Baccaracolo
    de: Wunfrubeere
    es: Baya Lagro
    ko: 미클열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　いちどだけ\nわざの　めいちゅうりつが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　１度だけ\n技の　命中率が　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its accuracy will\nincrease just once when it’s in a pinch."
    fr: "Tenue, cette Baie augmente une fois la Précision\nd’une capacité en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la precisione della sua\nmossa successiva aumenta."
    de: "Als getragenes Item erhöht diese Beere die\nGenauigkeit eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Cuando la lleva un Pokémon, le sube la Precisión\nde un movimiento en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 한 번만\n기술의 명중률이 올라간다."
mind_plate:
  names:
    jp_kana: ふしぎのプレート
    jp_kanji: ふしぎのプレート
    en: Mind Plate
    fr: Plaque Esprit
    it: Lastramente
    de: Hirntafel
    es: Tabla Mental
    ko: 이상한플레이트
  descriptions:
    jp_kana: "エスパーの　タイプの　せきばん。\nもたせると　エスパータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　石盤。\n持たせると　エスパータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Psychic-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Psico."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Psycho."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Psíquico. Debe llevarla un Pokémon."
    ko: "에스퍼타입의 석판.\n지니게 하면 에스퍼타입\n기술의 위력이 강해진다."
miracle_seed:
  names:
    jp_kana: きせきのタネ
    jp_kanji: きせきのタネ
    en: Miracle Seed
    fr: Grain Miracle
    it: Miracolseme
    de: Wundersaat
    es: Semilla Milagro
    ko: 기적의씨
  descriptions:
    jp_kana: "せいめいが　やどる　タネ。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "生命が　宿る　タネ。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a seed imbued with life force that\nboosts the power of Grass-type moves."
    fr: "Objet à tenir. Une graine remplie de vie qui\naugmente la puissance des capacités de\ntype Plante."
    it: "Strumento da dare a un Pokémon.\nSeme intriso di vita che potenzia le mosse\ndi tipo Erba."
    de: "Ein Item zum Tragen. Ein Samen voller\nLebenskraft, der Attacken vom Typ Pflanze\nverstärkt."
    es: "Debe llevarla un Pokémon. La vitalidad de la\nsemilla fortalece los movimientos de tipo Planta."
    ko: "생명이 깃든 씨앗.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
moomoo_milk:
  names:
    jp_kana: モーモーミルク
    jp_kanji: モーモーミルク
    en: Moomoo Milk
    fr: Lait Meumeu
    it: Latte Mumu
    de: Kuhmuh-Milch
    es: Leche Mu-mu
    ko: 튼튼밀크
  descriptions:
    jp_kana: "えいよう　まんてんの　ミルク。\nポケモン　１ひきの　ＨＰを\n１００だけ　かいふくする。"
    jp_kanji: "栄養満点の　ミルク。\nポケモン　１匹の　ＨＰを\n１００だけ　回復する。"
    en: "A bottle of highly nutritious milk.\nWhen consumed, it restores\n100 HP to an injured Pokémon."
    fr: "Un lait très nourrissant.\nRestaure 100 PV d’un Pokémon."
    it: "Latte ricco di sostanze nutrienti.\nRestituisce 100 PS a un Pokémon."
    de: "Eine äußerst nährstoffreiche Milch, die die KP\neines Pokémon um 100 Punkte auffüllt."
    es: "Leche de alto valor nutritivo que restaura 100 PS\nde un Pokémon."
    ko: "영양 만점의 우유.\n포켓몬 1마리의 HP를\n100만큼 회복한다."
moon_ball:
  names:
    jp_kana: ムーンボール
    jp_kanji: ムーンボール
    en: Moon Ball
    fr: Lune Ball
    it: Luna Ball
    de: Mondball
    es: Luna Ball
    ko: 문볼
  descriptions:
    jp_kana: "つきのいしで　しんかする　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つきのいしで　進化する　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that will make it easier\nto catch Pokémon that can evolve\nusing a Moon Stone."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon évoluant\navec une Pierre Lune."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon\nche si evolvono con una Pietralunare."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon zu fangen, die sich durch\neinen Mondstein weiterentwickeln."
    es: "Poké Ball algo distinta que atrapa con más\nfacilidad los Pokémon que evolucionan con la\nPiedra Lunar."
    ko: "달의돌로 진화하는 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
moon_stone:
  names:
    jp_kana: つきのいし
    jp_kanji: つきのいし
    en: Moon Stone
    fr: Pierre Lune
    it: Pietralunare
    de: Mondstein
    es: Piedra Lunar
    ko: 달의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nよぞらのように　くろい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n夜空のように　黒い。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt is as black as the night sky."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle est sombre comme\nla nuit."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È nera come la notte."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er ist schwarz\nwie die Nacht."
    es: "Curiosa piedra que hace evolucionar a\ndeterminadas especies de Pokémon. Es oscura\ncomo la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n밤하늘처럼 까맣다."
muscle_band:
  names:
    jp_kana: ちからのハチマキ
    jp_kanji: ちからのハチマキ
    en: Muscle Band
    fr: Bandeau Muscle
    it: Muscolbanda
    de: Muskelband
    es: Cinta Fuerte
    ko: 힘의머리띠
  descriptions:
    jp_kana: "ちからが　わいてくる　ハチマキ。\nもたせると　ぶつりわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ちからが　わいてくる　ハチマキ。\n持たせると　物理技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon.\nThis headband exudes strength, slightly\nboosting the power of physical moves."
    fr: "Objet à tenir. Un bandeau augmentant\nlégèrement la puissance des attaques physiques."
    it: "Strumento da dare a un Pokémon.\nFascia che potenzia di poco le mosse fisiche."
    de: "Ein Item zum Tragen. Dieses Stirnband verstärkt\nphysische Attacken etwas."
    es: "Cinta de pelo que aumenta ligeramente la\npotencia de los movimientos físicos. Debe\nllevarla un Pokémon."
    ko: "힘이 끓어오르는 머리띠.\n지니게 하면 물리 기술의\n위력이 조금 올라간다."
muscle_feather:
  names:
    jp_kana: きんりょくのハネ
    jp_kanji: きんりょくのハネ
    en: Muscle Wing
    fr: Aile Force
    it: Piumpotenza
    de: Kraftfeder
    es: Pluma Músculo
    ko: 근력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　こうげきの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　攻撃の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon.\nIt slightly increases the base Attack\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu son Attaque de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dell’Attacco."
    de: "Schenkt man einem Pokémon dieses Item,\nwird dessen Angriffs-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco el Ataque de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 공격\n기초 포인트를 조금 올린다."
mystery_egg:
  names:
    jp_kana: ふしぎなタマゴ
    jp_kanji: ふしぎなタマゴ
    en: Mystery Egg
    fr: Œuf Mystère
    it: Uovo Mistero
    de: Rätsel-Ei
    es: Huevo Misterioso
    ko: 이상한알
  descriptions:
    jp_kana: "ポケモンじいさんから　あずかった\nふしぎな　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    jp_kanji: "ポケモンじいさんから　あずかった\n不思議な　もようの　タマゴ。\nなんの　タマゴか　わからない。"
    en: "A mysterious Egg obtained from Mr. Pokémon.\nWhat is in the Egg is unknown."
    fr: "Un Œuf étrange confié par M. Pokémon.\nPersonne ne sait ce qu’il contient."
    it: "Uovo dai disegni bizzarri che si riceve da\nMr. Pokémon. Non si sa che cosa contenga."
    de: "Ein seltsam gemustertes Ei, das du von\nMr. Pokémon erhalten hast. Sein Inhalt\nliegt im Dunkeln."
    es: "Misterioso Huevo con dibujos que obtienes del\nSr. Pokémon. Nadie sabe qué contiene."
    ko: "포켓몬 할아버지로부터 받은\n이상한 모양의 알.\n어떤 알인지 모른다."
mystic_water:
  names:
    jp_kana: しんぴのしずく
    jp_kanji: しんぴのしずく
    en: Mystic Water
    fr: Eau Mystique
    it: Acqua Magica
    de: Zauberwasser
    es: Agua Mística
    ko: 신비의물방울
  descriptions:
    jp_kana: "しずくの　かたちの　ほうせき。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "しずくの　形の　宝石。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis teardrop-shaped gem boosts\nthe power of Water-type moves."
    fr: "Objet à tenir. Une gemme en forme de goutte\nd’eau qui augmente la puissance des capacités\nde type Eau."
    it: "Strumento da dare a un Pokémon.\nGemma a forma di goccia che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Ein tränenförmiger\nEdelstein, der Attacken vom Typ Wasser verstärkt."
    es: "Gema con forma de gota de agua que fortalece\nlos movimientos de tipo Agua. Debe llevarla un\nPokémon."
    ko: "물방울 모양의 보석.\n지니게 하면 물타입\n기술의 위력이 올라간다."
nanab_berry:
  names:
    jp_kana: ナナのみ
    jp_kanji: ナナのみ
    en: Nanab Berry
    fr: Baie Nanab
    it: Baccabana
    de: Nanabbeere
    es: Baya Latano
    ko: 나나열매
  descriptions:
    jp_kana: "かわいさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nももいろの　みは　たべると　あまい。"
    jp_kanji: "かわいさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n桃色の実は　食べると　甘い。"
    en: "Used to make Pokéblocks that will enhance your\nCuteness. Its pink flesh is sweet when eaten."
    fr: "Une Baie rose au goût sucré, utilisée pour\npréparer des Pokéblocs permettant d’augmenter\nla Grâce d’un Pokémon."
    it: "Bacca rosa dal sapore dolce usata\nper creare Pokémelle che aumentano\nla Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIhr rosa Fruchtfleisch schmeckt süßlich."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la dulzura. Es de color rosa y sabor\ndulce."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n담홍색 열매는 먹으면 달다."
nest_ball:
  names:
    jp_kana: ネストボール
    jp_kanji: ネストボール
    en: Nest Ball
    fr: Faiblo Ball
    it: Minor Ball
    de: Nestball
    es: Nido Ball
    ko: 네스트볼
  descriptions:
    jp_kana: "つかまえる　やせいの　ポケモンが\nよわいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえる　野生の　ポケモンが\n弱いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nbecomes more effective the lower\nthe level of the wild Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon les plus\nfaibles."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon selvatici più deboli."
    de: "Ein Ball, dessen Erfolgsquote besonders bei\nPokémon mit niedrigem Level sehr hoch ist."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon salvajes\nde nivel bajo."
    ko: "잡으려는 야생 포켓몬이\n약할수록 잡기 쉬운\n조금 특이한 볼."
net_ball:
  names:
    jp_kana: ネットボール
    jp_kanji: ネットボール
    en: Net Ball
    fr: Filet Ball
    it: Rete Ball
    de: Netzball
    es: Malla Ball
    ko: 넷트볼
  descriptions:
    jp_kana: "みずタイプと　むしタイプの\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "みずタイプと　むしタイプの\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nis more effective when attempting\nto catch Water- or Bug-type Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon Eau ou\nInsecte."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon di tipo Acqua e Coleottero."
    de: "Ein Ball, der sich besonders gut eignet,\num Wasser- und Käfer-Pokémon zu fangen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon de tipo\nAgua y Bicho."
    ko: "물타입과 벌레타입의\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
never_melt_ice:
  names:
    jp_kana: とけないこおり
    jp_kanji: とけないこおり
    en: Never-Melt Ice
    fr: Glace Éternelle
    it: Gelomai
    de: Ewiges Eis
    es: Antiderretir
    ko: 녹지않는얼음
  descriptions:
    jp_kana: "ねつを　よせつけない　こおり。\nもたせると　こおりタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "熱を　よせつけない　氷。\n持たせると　こおりタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt’s a piece of ice that repels heat\neffects and boosts Ice-type moves."
    fr: "Objet à tenir. Un morceau de glace qui réfléchit\nla chaleur et augmente la puissance des\ncapacités de type Glace."
    it: "Strumento da dare a un Pokémon.\nPezzo di ghiaccio che respinge il calore\ne potenzia le mosse di tipo Ghiaccio."
    de: "Ein Item zum Tragen. Ein Stück Eis, das Hitze\nfernhält und Attacken vom Typ Eis verstärkt."
    es: "Fragmento de hielo que repele el calor y fortalece\nlos movimientos de tipo Hielo. Debe llevarlo un\nPokémon."
    ko: "열을 가까이하지 않게 하는 얼음.\n지니게 하면 얼음타입\n기술의 위력이 올라간다."
nomel_berry:
  names:
    jp_kana: ノメルのみ
    jp_kanji: ノメルのみ
    en: Nomel Berry
    fr: Baie Tronci
    it: Baccalemon
    de: Tronzibeere
    es: Baya Monli
    ko: 노멜열매
  descriptions:
    jp_kana: "たくましさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "たくましさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nToughness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Robustesse d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Grinta del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Stärke erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la dureza. Es una baya muy rara en\notras regiones."
    ko: "강인함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
normal_gem:
  names:
    jp_kana: ノーマルジュエル
    jp_kanji: ノーマルジュエル
    en: Normal Gem
    fr: Joyau Normal
    it: Bijounormale
    de: Normaljuwel
    es: Gema Normal
    ko: 노말주얼
  descriptions:
    jp_kana: "ノーマルの　タイプの　ジュエル。\nもたせると　いちどだけ　ノーマルの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ノーマルの　タイプの　ジュエル。\n持たせると　１度だけ　ノーマルの\n技の　威力が　強まる。"
    en: "A gem with an ordinary essence.\nWhen held, it strengthens the power\nof a Normal-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Normal."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Normale."
    de: "Ein Juwel vom Typ Normal. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Normal."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Normal. Debe llevarla\nun Pokémon."
    ko: "노말타입의 주얼.\n지니게 하면 한 번만 노말\n기술의 위력이 강해진다."
nugget:
  names:
    jp_kana: きんのたま
    jp_kanji: きんのたま
    en: Nugget
    fr: Pépite
    it: Pepita
    de: Nugget
    es: Pepita
    ko: 금구슬
  descriptions:
    jp_kana: "キラキラと　きんいろに　ひかる\nじゅんきん　せいの　たま。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　金色に　光る\n純金製の　玉。\nショップで　高く　売れる。"
    en: "A nugget of the purest gold that gives\noff a lustrous gleam in direct light.\nIt can be sold at a high price to shops."
    fr: "Une pépite d’or pur qui brille d’un éclat\nmagnifique. Peut être vendue à bon prix\naux magasins."
    it: "Pepita d’oro puro dal luccichio sfavillante.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Ein Nugget aus purem Gold, das einen\nschimmernden Glanz besitzt. Es ist\nvon großem Wert."
    es: "Pepita de oro puro que desprende un brillo\nespectacular. Puede venderse muy cara en las\ntiendas."
    ko: "금색으로 반짝반짝 빛나는\n순금으로 만들어진 구슬.\n상점에서 비싸게 팔린다."
oaks_letter:
  names:
    jp_kana: オーキドのてがみ
    jp_kanji: オーキドのてがみ
    en: Oak’s Letter
    fr: Lettre Chen
    it: Lettera Oak
    de: Eichs Brief
    es: Carta Prof. Oak
    ko: 오박사의편지
  descriptions:
    jp_kana: "オーキドはかせ　からの　てがみ。\nなかには　２２４ばんどうろに\nきてほしいと　かかれている。"
    jp_kanji: "オーキド博士からの　手紙。\n中には　２２４番道路に\n来てほしいと　書かれている。"
    en: "A letter from Professor Oak.\nWritten in it is a request for you\nto go to Route 224."
    fr: "Une lettre du Prof. Chen vous demandant de\nvous rendre sur la Route 224."
    it: "Lettera del Prof. Oak con la richiesta di dirigerti\nverso il Percorso 224."
    de: "Ein Brief von Prof. Eich. Er bittet dich,\nzur Route 224 zu gehen."
    es: "Carta del Profesor Oak en la que se te pide que\nvayas a la Ruta 224."
    ko: "오박사의 편지다.\n안에는 224번도로로\n와달라고 적혀 있다."
occa_berry:
  names:
    jp_kana: オッカのみ
    jp_kanji: オッカのみ
    en: Occa Berry
    fr: Baie Chocco
    it: Baccacao
    de: Koakobeere
    es: Baya Caoca
    ko: 오카열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ほのお　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ほのお技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Fire-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Feu."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Fuoco del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Feuer."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Fuego de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 불꽃 기술을\n당했을 때 위력이 약해진다."
odd_incense:
  names:
    jp_kana: あやしいおこう
    jp_kanji: あやしいおこう
    en: Odd Incense
    fr: Encens Bizarre
    it: Bizzoaroma
    de: Schrägrauch
    es: Incienso Raro
    ko: 괴상한향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts\nthe power of Psychic-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de\ntype Psy."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Psico."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Psycho."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Psíquico. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
odd_keystone:
  names:
    jp_kana: かなめいし
    jp_kanji: かなめいし
    en: Odd Keystone
    fr: Clé de Voûte
    it: Roccianima
    de: Spiritkern
    es: Piedra Espíritu
    ko: 쐐기돌
  descriptions:
    jp_kana: "これがないと　いしのとうが\nくずれてしまう　だいじないし。\nときどき　いしから　こえがきこえる。"
    jp_kanji: "これがないと　石の塔が\n崩れてしまう　大事な石。\nときどき　石から　声が聞こえる。"
    en: "A vital item that is needed to keep a\nstone tower from collapsing. Voices\ncan be heard from it occasionally."
    fr: "Un objet très important qui empêche une tour\nen pierre de s’écrouler. Des bruits de voix\nen sortent parfois."
    it: "Strumento importante che impedisce il crollo\ndi un pozzo di pietra. A volte dal suo interno\nprovengono delle voci."
    de: "Ein wichtiges Item, mit dem ein Steinturm\nrepariert werden kann."
    es: "Vital para impedir que una torre de piedra se\nderrumbe. A veces se oyen voces en su interior."
    ko: "이것이 없으면 돌탑이\n무너져버리는 중요한 돌.\n가끔 돌에서 목소리가 들린다."
old_amber:
  names:
    jp_kana: ひみつのコハク
    jp_kanji: ひみつのコハク
    en: Old Amber
    fr: Vieil Ambre
    it: Ambra Antica
    de: Altbernstein
    es: Ámbar Viejo
    ko: 비밀의호박
  descriptions:
    jp_kana: "こだい　ポケモンの　いでんしが\nとじこめられている　コハク。\nあかみを　おびて　すけている。"
    jp_kanji: "古代ポケモンの　遺伝子が\n閉じこめられている　コハク。\n赤みを　帯びて　透けている。"
    en: "A piece of amber that still contains the\ngenetic material of an ancient Pokémon.\nIt’s clear with a tawny, reddish tint."
    fr: "Un morceau d’ambre contenant l’ADN d’un\nancien Pokémon. Il est de couleur jaune."
    it: "Pezzo di ambra che contiene il materiale\ngenetico di un Pokémon antico. È chiaro\ne di colore giallastro."
    de: "Ein Stück Bernstein, in dem die Gene eines\nuralten Pokémon enthalten sind. Es ist\ndurchsichtig."
    es: "Fragmento de ámbar que contiene información\ngenética de un Pokémon ancestral. Es de color\namarillo."
    ko: "고대 포켓몬의 유전자가\n갇혀 있는 호박.\n붉은 기가 돌면서 약간 투명하다."
old_charm:
  names:
    jp_kana: こだいのおまもり
    jp_kanji: こだいのおまもり
    en: Old Charm
    fr: Vieux Grigri
    it: Arcamuleto
    de: Talisman
    es: Talismán
    ko: 고대의부적
  descriptions:
    jp_kana: "カンナギタウンの　ちょうろうに\nとどける　おおむかしの　おまもり。\nポケモンの　ホネで　つくられている。"
    jp_kanji: "カンナギタウンの　長老に\n届ける　大昔の　おまもり。\nポケモンの　ホネで　つくられている。"
    en: "An ancient good-luck charm made\nof Pokémon bones to be taken to\nthe elder of Celestic Town."
    fr: "Un ancien porte-bonheur fait d’os de Pokémon\nà porter à la doyenne de Célestia."
    it: "Antico portafortuna fatto di ossa di Pokémon\nda portare all’anziana di Memoride."
    de: "Ein antiker Glücksbringer. Soll der\nÄltesten in Elyses überbracht werden."
    es: "Está hecho con huesos de Pokémon y trae buena\nsuerte. Hay que llevarlo a la anciana de Pueblo\nCaelestis."
    ko: "봉신마을의 장로에게\n전해줄 오랜 옛날의 부적.\n포켓몬의 뼈로 만들어졌다."
old_gateau:
  names:
    jp_kana: もりのヨウカン
    jp_kanji: もりのヨウカン
    en: Old Gateau
    fr: Vieux Gâteau
    it: Dolce Gateau
    de: Spezialität
    es: Barrita Plus
    ko: 숲의양갱
  descriptions:
    jp_kana: "ハクタイの　かくれた　めいぶつ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ハクタイの　隠れた　名物。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "The Old Chateau’s hidden specialty.\nIt can be used once to heal all the\nstatus conditions of a Pokémon."
    fr: "Une spécialité du Vieux Château.\nElle soigne tous les problèmes de statut\nd’un Pokémon."
    it: "Specialità segreta dell’Antico Château.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine unbekannte Spezialität. Sie behebt\nalle Statusprobleme eines Pokémon."
    es: "Especialidad de la Vieja Mansión. Cura todos los\nproblemas de estado de un Pokémon."
    ko: "영원시티의 숨은 명물.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
old_rod:
  names:
    jp_kana: ボロのつりざお
    jp_kanji: ボロのつりざお
    en: Old Rod
    fr: Canne
    it: Amo Vecchio
    de: Angel
    es: Caña Vieja
    ko: 낡은낚싯대
  descriptions:
    jp_kana: "ふるくて　ボロい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "ふるくて　ボロい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An old and beat-up fishing rod.\nUse it at any body of water to\nfish for wild aquatic Pokémon."
    fr: "Une vieille canne usée.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo vecchio e rovinato. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine alte, abgenutzte Angel. Damit kannst du\nin jedem Gewässer nach Pokémon angeln."
    es: "Caña de pescar bastante usada y desgastada.\nPesca Pokémon salvajes en todo tipo de aguas."
    ko: "낡고 조잡한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
oran_berry:
  names:
    jp_kana: オレンのみ
    jp_kanji: オレンのみ
    en: Oran Berry
    fr: Baie Oran
    it: Baccarancia
    de: Sinelbeere
    es: Baya Aranja
    ko: 오랭열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　１０だけ　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can restore its\nown HP by 10 points during battle."
    fr: "Une Baie qui restaure 10 PV lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, recupera\n10 PS."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt sie seine KP um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar 10 PS."
    ko: "포켓몬에게 지니게 하면\nHP를 10만큼 회복한다."
oval_charm:
  names:
    jp_kana: まるいおまもり
    jp_kanji: まるいおまもり
    en: Oval Charm
    fr: Charme Ovale
    it: Ovamuleto
    de: Ovalpin
    es: Amuleto Oval
    ko: 둥근부적
  descriptions:
    jp_kana: "もっていると　そだてやさんで\nタマゴが　みつかりやすくなる\nふしぎで　とてもまるい　おまもり。"
    jp_kanji: "持っていると　育て屋さんで\nタマゴが　みつかりやすくなる\n不思議で　とてもまるい　おまもり。"
    en: "An oval charm said to increase\nthe chance of Pokémon Eggs\nbeing found at the Day Care."
    fr: "Un mystérieux charme rond qui permet de trouver\nplus facilement des Œufs à la Pension Pokémon."
    it: "Misterioso amuleto di forma sferica che\naumenta la probabilità di trovare Uova\nnella Pensione Pokémon."
    de: "Ein mysteriöser, ovaler Glücksbringer, der die\nWahrscheinlichkeit erhöht, in der Pension Eier\nzu finden."
    es: "Misterioso amuleto redondo que aumenta la\nposibilidad de encontrar Huevos en la Guardería\nPokémon."
    ko: "지니고 있으면 키우미집에서\n알을 발견하기 쉬워지는\n이상하고 매우 둥근 부적."
oval_stone:
  names:
    jp_kana: まんまるいし
    jp_kanji: まんまるいし
    en: Oval Stone
    fr: Pierre Ovale
    it: Pietraovale
    de: Ovaler Stein
    es: Piedra Oval
    ko: 동글동글돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたまのように　まるい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nたまのように　まるい。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt’s as round as a Pokémon Egg."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle a la forme d’un œuf."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È a forma di uovo."
    de: "Dieser besondere, eiförmige Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a\nalgunos Pokémon. Tiene forma de huevo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n구슬처럼 둥글다."
pair_of_tickets:
  names:
    jp_kana: ペアチケット
    jp_kanji: ペアチケット
    en: Pair of Tickets
    fr: Ticket Duo
    it: Biglietto doppio
    de: Zweierticket
    es: Entrada para dos
    ko: 페어티켓
  descriptions:
    jp_kana: "トクサネうちゅうセンターで\nひらかれている　てんたいショーの\nふたりぐみ　チケット。"
    jp_kanji: "トクサネ宇宙センターで　開かれている\n天体ショーの　２人組チケット。"
    en: "Tickets for two to the astronomical show\nbeing held at the Mossdeep Space Center."
    fr: "Un ticket pour deux personnes pour le spectacle\nd’astronomie se déroulant au Centre Spatial\nd’Algatia."
    it: "Biglietto per due persone per lo spettacolo\nastronomico del Centro Spaziale di Verdeazzupoli."
    de: "Eine Eintrittskarte, mit der zwei Personen Zutritt\nzur Astronomie-Show des Raumfahrtzentrums\nvon Moosbach City erhalten."
    es: "Pase de dos personas para asistir al espectáculo\nde astronomía que se celebra en el Centro\nEspacial de Algaria."
    ko: "이끼 우주센터에서\n열리고 있는 천체쇼의\n2인용 티켓이다."
pal_pad:
  names:
    jp_kana: ともだちてちょう
    jp_kanji: ともだちてちょう
    en: Pal Pad
    fr: Registre Ami
    it: Blocco Amici
    de: Adressbuch
    es: Bloc amigos
    ko: 친구수첩
  descriptions:
    jp_kana: "ともだちを　とうろくしたり\nあそんだ　ことを　きろくする\nべんりな　てちょう。"
    jp_kanji: "友達を　登録したり\n遊んだことを　記録する\n便利な　手帳。"
    en: "A convenient notepad that is used to\nregister your Friends and friend codes\nand keep a record of your gameplay."
    fr: "Un carnet bien pratique pour enregistrer vos amis,\nles codes ami et des données de jeu."
    it: "Blocco appunti utile per registrare gli amici e\nil loro codice amico e per tenere un resoconto\ndell’esperienza di gioco."
    de: "In diesem praktischen Buch kannst du die\nFreundescodes deiner Freunde aufbewahren."
    es: "Un cuaderno muy práctico en el que puedes\nregistrar amigos, claves de amigo, etc."
    ko: "친구를 등록하거나\n친구와 놀았던 기록을 관리하는\n편리한 수첩."
pamtre_berry:
  names:
    jp_kana: シーヤのみ
    jp_kanji: シーヤのみ
    en: Pamtre Berry
    fr: Baie Palma
    it: Baccapalma
    de: Pallmbeere
    es: Baya Plama
    ko: 자야열매
  descriptions:
    jp_kana: "うつくしさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "うつくしさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nBeauty, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Beauté d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Bellezza del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Schönheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la belleza. Es una baya muy rara en\notras regiones."
    ko: "아름다움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
paralyze_heal:
  names:
    jp_kana: まひなおし
    jp_kanji: まひなおし
    en: Paralyze Heal
    fr: Anti-Para
    it: Antiparalisi
    de: Para-Heiler
    es: Antiparalizador
    ko: 마비치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　まひの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　まひの\n状態を　回復する。"
    en: "A spray-type medicine for paralysis.\nIt can be used once to free a\nPokémon that has been paralyzed."
    fr: "Un médicament sous forme de spray.\nSoigne un Pokémon de la paralysie."
    it: "Rimedio spray.\nCura un Pokémon dalla paralisi."
    de: Ein Spray, das ein Pokémon von Paralyse heilt.
    es: "Medicina en espray que cura a un Pokémon\nparalizado."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n마비 상태를 회복한다."
parcel:sinnoh:
  names:
    jp_kana: おとどけもの
    jp_kanji: おとどけもの
    en: Parcel
    fr: Colis
    it: Pacco
    de: Paket
    es: Paquete
    ko: 전해줄물건
  descriptions:
    jp_kana: "フタバタウンから　たびだった\nおさななじみに　わたすように\nたのまれた　おとどけもの。"
    jp_kanji: "フタバタウンから　旅立った\n幼なじみに　渡すように\n頼まれた　おとどけもの。"
    en: "A parcel entrusted into your care.\nYou are supposed to deliver it to your\nchildhood friend who left Twinleaf Town."
    fr: "Un paquet qu’on vous a confié.\nVous devez le remettre à votre ami d’enfance qui\na quitté Bonaugure."
    it: "Pacchetto da consegnare al tuo amico d’infanzia\nche ha lasciato Duefoglie."
    de: "Ein Paket, das dir anvertraut wurde. Du sollst es\ndeinem besten Freund geben, der Zweiblattdorf\nverließ."
    es: "Paquete encomendado a tu cuidado que tienes\nque entregar a tu amigo de la infancia que dejó\nPueblo Hojaverde."
    ko: "떡잎마을에서 여행을 떠난\n소꿉친구에게 건네주도록\n부탁받은 물건."
park_ball:
  names:
    jp_kana: パークボール
    jp_kanji: パークボール
    en: Park Ball
    fr: Parc Ball
    it: Parco Ball
    de: Parkball
    es: Parque Ball
    ko: 파크볼
  descriptions:
    jp_kana: "パルパークの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "パルパークの　なかで\n使う　特別な　ボール。"
    en: A special Poké Ball for the Pal Park.
    fr: Une Poké Ball spéciale utilisée au Parc des Amis.
    it: "Poké Ball speciale utilizzata solo all’interno\ndel Parco Amici."
    de: "Ein Ball, der nur im Park der Freunde\neingesetzt wird."
    es: Poké Ball que se utiliza dentro del Parque Compi.
    ko: "팔파크 내에서\n사용하는 특별한 볼."
pass:
  names:
    jp_kana: リニアパス
    jp_kanji: リニアパス
    en: Pass
    fr: Passe Train
    it: Superpass
    de: Fahrschein
    es: Magnetopase
    ko: 리니어패스
  descriptions:
    jp_kana: "リニアカーに　のるときに　ひつような\nチケット。　いつでも　のりほうだい。"
    jp_kanji: "リニアカーに　乗るときに　必要な\nチケット。　いつでも　乗り放題。"
    en: "A pass required for riding the Magnet\nTrain. It allows you to ride whenever\nand however much you’d like."
    fr: "Un ticket nécessaire pour monter à bord du\nTrain Magnétique. Utilisable à volonté."
    it: "Biglietto necessario per viaggiare sul supertreno.\nUtilizzabile a volontà."
    de: "Eine Fahrkarte, die einem die Reise mit dem\nMagnetzug ermöglicht. Gilt für beliebig viele\nFahrten."
    es: "Billete necesario para poder montar todas las\nveces que se desee en el Magnetotrén."
    ko: "리니어 카를 탈 때 필요한\n티켓. 언제든지 무제한으로 이용 가능."
pass_orb:
  names:
    jp_kana: デルダマ
    jp_kanji: デルダマ
    en: Pass Orb
    fr: Offrisphère
    it: Passabilia
    de: Transferorb
    es: Regalosfera
    ko: 딜구슬
  descriptions:
    jp_kana: "デルパワーを　はっせいさせる\nときにつかう　イッシュの　パワーが\nとじこめられた　ふしぎな　たま。"
    jp_kanji: "デルパワーを　発生させる\nときに使う　イッシュの　パワーが\nとじこめられた　不思議な　玉。"
    en: "A mysterious orb containing the power\nof the Unova region, to be used when\ngenerating Pass Power."
    fr: "Une sphère mystérieuse contenant l’Aura d’Unys\net permettant l’utilisation des Offri-Auras."
    it: "Bilia misteriosa che racchiude l’energia di Unima\ned è in grado di lanciare il Passapotere."
    de: "Ein mysteriöser Orb, der die Kraft der\nEinall-Region enthält und zur Erzeugung\nvon Transferkraft dient."
    es: "Esfera misteriosa que contiene el poder de la\nregión de Teselia y se utiliza para generar\nPoderes Regalo."
    ko: "딜파워를 발생시킬 때\n사용하는 하나지방의 파워가\n담긴 이상한 구슬."
passho_berry:
  names:
    jp_kana: イトケのみ
    jp_kanji: イトケのみ
    en: Passho Berry
    fr: Baie Pocpoc
    it: Baccapasflo
    de: Foepasbeere
    es: Baya Pasio
    ko: 꼬시개열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　みず　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　みず技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Water-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Eau."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Acqua del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Wasser."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Agua de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 물 기술을\n당했을 때 위력이 약해진다."
payapa_berry:
  names:
    jp_kana: ウタンのみ
    jp_kanji: ウタンのみ
    en: Payapa Berry
    fr: Baie Yapap
    it: Baccapayapa
    de: Pyapabeere
    es: Baya Payapa
    ko: 야파열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　エスパー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　エスパー技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Psychic-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Psy."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Psico del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Psycho."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Psíquico de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 에스퍼 기술을\n당했을 때 위력이 약해진다."
pearl:
  names:
    jp_kana: しんじゅ
    jp_kanji: しんじゅ
    en: Pearl
    fr: Perle
    it: Perla
    de: Perle
    es: Perla
    ko: 진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nすこし　ちいさめの　しんじゅ。\nショップで　やすく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\n少し　ちいさめの　真珠。\nショップで　安く　売れる。"
    en: "A rather small pearl that has a\nvery nice silvery sheen to it.\nIt can be sold cheaply to shops."
    fr: "Une petite perle qui brille d’une jolie couleur\nargent. Peut être vendue à bas prix aux magasins."
    it: "Perla piuttosto piccola dai graziosi riflessi\nargentei. Si può vendere a un prezzo piuttosto\nbasso nei negozi."
    de: "Eine relativ kleine Perle, die in schönem\nSilber funkelt. Sie ist von geringem Wert."
    es: "Brillante perla pequeña y plateada que no alcanza\nun buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n자그마한 진주.\n상점에서 싸게 팔린다."
pearl_string:
  names:
    jp_kana: おだんごしんじゅ
    jp_kanji: おだんごしんじゅ
    en: Pearl String
    fr: Perle Triple
    it: Trittiperla
    de: Triperle
    es: Sarta Perlas
    ko: 경단진주
  descriptions:
    jp_kana: "きれいな　ぎんいろに　ひかる\nとても　おおつぶの　しんじゅ。\nショップで　たかく　うれる。"
    jp_kanji: "きれいな　銀色に　光る\nとても　大粒の　真珠。\nショップで　高く　売れる。"
    en: "Very large pearls that sparkle in a pretty silver\ncolor. They can be sold at a high price to shops."
    fr: "Une grappe de perles brillant d’une jolie\ncouleur argent. Peut être vendue à bon prix\naux magasins."
    it: "Grosse perle dai riflessi argentei. Si possono\nvendere a un prezzo piuttosto alto nei negozi."
    de: "Große Perlen, die in schönem Silber\nfunkeln. Sie sind von großem Wert."
    es: "Brillantes perlas plateadas de gran tamaño que\npueden venderse a buen precio en las tiendas."
    ko: "예쁜 은색으로 빛나는\n상당히 큰 낱알의 진주.\n상점에서 비싸게 팔린다."
pecha_berry:
  names:
    jp_kana: モモンのみ
    jp_kanji: モモンのみ
    en: Pecha Berry
    fr: Baie Pêcha
    it: Baccapesca
    de: Pirsifbeere
    es: Baya Meloc
    ko: 복슝열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nどくを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n毒を　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom poisoning on its own in battle."
    fr: "Une Baie qui soigne l’empoisonnement lorsqu’elle\nest tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndall’avvelenamento."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Vergiftung."
    es: "Los Pokémon pueden llevarla o usarla para\ncurarse del envenenamiento."
    ko: "포켓몬에게 지니게 하면\n독을 회복한다."
permit:
  names:
    jp_kana: きょかしょう
    jp_kanji: きょかしょう
    en: Permit
    fr: Permis
    it: Permesso
    de: Genehmigung
    es: Pase
    ko: 허가증
  descriptions:
    jp_kana: "わずかな　ひとしか　しらない\nしぜんほごくに　はいるために\nひつような　ライセンスカード。"
    jp_kanji: "わずかな　人しか　知らない\n自然保護区に　入るために\n必要な　ライセンスカード。"
    en: "A permit that is needed to\nenter the Nature Preserve.\nNot many know about it."
    fr: "Un permis nécessaire pour pénétrer dans\nla Réserve Naturelle, lieu protégé des foules\nmodernes."
    it: "Tessera che permette di accedere a una\nRiserva Naturale conosciuta da pochi."
    de: "Eine Genehmigung in Form einer Karte, die\nden Zutritt ins Naturschutzgebiet ermöglicht.\nNur wenige kennen den Ort."
    es: "Permiso necesario para acceder a la Reserva\nNatural, lugar que solo unos pocos conocen."
    ko: "소수의 사람밖에 모르는\n자연보호구역에 들어가기 위해\n필요한 라이선스 카드."
persim_berry:
  names:
    jp_kana: キーのみ
    jp_kanji: キーのみ
    en: Persim Berry
    fr: Baie Kika
    it: Baccaki
    de: Persimbeere
    es: Baya Caquic
    ko: 시몬열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこんらんを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n混乱を　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom confusion on its own in battle."
    fr: "Une Baie qui soigne la confusion lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\ndalla confusione."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Verwirrung."
    es: "Los Pokémon pueden llevarla o usarla para\nlibrarse de la confusión."
    ko: "포켓몬에게 지니게 하면\n혼란을 회복한다."
petaya_berry:
  names:
    jp_kana: ヤタピのみ
    jp_kanji: ヤタピのみ
    en: Petaya Berry
    fr: Baie Pitaye
    it: Baccapitaya
    de: Tahaybeere
    es: Baya Yapati
    ko: 야타비열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nとくこうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n特攻が　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its Sp. Atk\nstat will increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente l’Attaque Spéciale\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, il suo Attacco Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nSpezial-Angriffs-Wert eines Pokémon,\nsobald es in einer Notlage steckt."
    es: "Si la lleva un Pokémon, le sube el Ataque\nEspecial en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n특수공격이 올라간다."
photo_album:
  names:
    jp_kana: フォトアルバム
    jp_kanji: フォトアルバム
    en: Photo Album
    fr: Album Photo
    it: Album
    de: Fotoalbum
    es: Álbum
    ko: 포토앨범
  descriptions:
    jp_kana: "ぼうけんちゅうに　さつえいした\nきねんしゃしんを　かざる　アルバム。"
    jp_kanji: "冒険中に　撮影した\n記念写真を　飾る　アルバム。"
    en: "A nice photo album for storing all the\nphotos taken along your adventure."
    fr: "Un album décoré de photos souvenir prises\npendant le voyage."
    it: "Album dove si possono sistemare le foto\nscattate durante quest’avventura."
    de: "Ein Album, in dem du Erinnerungsfotos\naufbewahren kannst, die du auf deinen\nReisen geschossen hast."
    es: "Álbum que recoge las fotos que se toman a lo\nlargo de la aventura."
    ko: "모험 중에 촬영한\n기념사진을 보관하는 앨범."
pidgeotite:
  names:
    jp_kana: ピジョットナイト
    jp_kanji: ピジョットナイト
    en: Pidgeotite
    fr: Roucarnagite
    it: Pidgeotite
    de: Taubossnit
    es: Pidgeotita
    ko: 피죤투나이트
  descriptions:
    jp_kana: "ピジョットに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ピジョットに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Pidgeot hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Roucarnage, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Pidgeot, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tauboss getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pidgeot en combate."
    ko: "피죤투에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
pinap_berry:
  names:
    jp_kana: パイルのみ
    jp_kanji: パイルのみ
    en: Pinap Berry
    fr: Baie Nanana
    it: Baccananas
    de: Sananabeere
    es: Baya Pinia
    ko: 파인열매
  descriptions:
    jp_kana: "たくましさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nきいろの　みは　たべると　すっぱい。"
    jp_kanji: "たくましさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n黄色の実は　食べると　酸っぱい。"
    en: "Used to make Pokéblocks that will enhance your\nToughness. Its yellow flesh is sour when eaten."
    fr: "Une Baie jaune au goût acide, utilisée pour\npréparer des Pokéblocs permettant d’augmenter\nla Robustesse d’un Pokémon."
    it: "Bacca gialla dal sapore acido usata\nper creare Pokémelle che aumentano\nla Grinta del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Stärke erhöhen.\nIhr gelbes Fruchtfleisch schmeckt säuerlich."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la dureza. Es de color amarillo y sabor\nácido."
    ko: "강인함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n노란색 열매는 먹으면 시다."
pink_apricorn:
  names:
    jp_kana: ももぼんぐり
    jp_kanji: ももぼんぐり
    en: Pink Apricorn
    fr: Noigrume Ros
    it: Ghicocca Rosa
    de: Aprikoko Pnk
    es: Bonguri Rosa
    ko: 담홍규토리
  descriptions:
    jp_kana: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    jp_kanji: "ももいろの　ぼんぐり。\nあまそうな　いい　においがする。"
    en: "A pink Apricorn.\nIt has a nice, sweet scent."
    fr: "Un Noigrume de couleur rose.\nIl dégage un arôme sucré."
    it: "Una Ghicocca di colore rosa.\nEmana un profumo dolce."
    de: "Eine pinkfarbene Aprikoko.\nSie duftet süß und appetitanregend."
    es: Bonguri de color rosa y aroma dulce.
    ko: "담홍색의 규토리.\n달콤한 듯한 좋은 향기가 난다."
pink_scarf:
  names:
    jp_kana: ピンクのバンダナ
    jp_kanji: ピンクのバンダナ
    en: Pink Scarf
    fr: Foulard Rose
    it: Fascia Rosa
    de: Rosa Schal
    es: Pañuelo Rosa
    ko: 분홍밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかわいく　みられる。"
    en: "An item to be held by a Pokémon.\nDuring a contest, it raises the Cute\naspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente la Grâce d’un Pokémon\ndans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Grazia” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Putzigkeit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta la dulzura en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n귀엽게 보인다."
pinsirite:
  names:
    jp_kana: カイロスナイト
    jp_kanji: カイロスナイト
    en: Pinsirite
    fr: Scarabruite
    it: Pinsirite
    de: Pinsirnit
    es: Pinsirita
    ko: 쁘사이저나이트
  descriptions:
    jp_kana: "カイロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "カイロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Pinsir hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Scarabrute, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Pinsir, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Pinsir getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Pinsir en combate."
    ko: "쁘사이저에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
pixie_plate:
  names:
    jp_kana: せいれいプレート
    jp_kanji: せいれいプレート
    en: Pixie Plate
    fr: Plaque Pixie
    it: Lastraspiritello
    de: Feentafel
    es: Tabla Duende
    ko: 정령플레이트
  descriptions:
    jp_kana: "フェアリーの　タイプの　せきばん。\nもたせると　フェアリータイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "フェアリーの　タイプの　石盤。\n持たせると　フェアリータイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt is a stone tablet that boosts the\npower of Fairy-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Folletto."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Fee."
    es: "Tabla de piedra que potencia los movimientos\nde tipo Hada. Debe llevarla un Pokémon."
    ko: "페어리타입의 석판.\n지니게 하면 페어리타입\n기술의 위력이 강해진다."
plasma_card:
  names:
    jp_kana: プラズマカード
    jp_kanji: プラズマカード
    en: Plasma Card
    fr: Carte Plasma
    it: Carta Plasma
    de: Plasmakarte
    es: Tarjeta Plasma
    ko: 플라스마카드
  descriptions:
    jp_kana: "プラズマフリゲートの　せんないで\nパスワードを　にゅうりょくするときに\nひつようとなる　カードキー。"
    jp_kanji: "プラズマフリゲートの　船内で\nパスワードを　入力するときに\n必要となる　カードキー。"
    en: "A card key needed to enter the\npassword inside the Plasma Frigate."
    fr: "Une clé magnétique indispensable pour entrer\nle mot de passe sur la Frégate Plasma."
    it: "Carta magnetica necessaria per inserire\nla password sulla Fregata Plasma."
    de: "Ein Kartenschlüssel, der bei der Eingabe\ndes Passworts an Bord der Plasma-Fregatte\nbenötigt wird."
    es: "Tarjeta necesaria para introducir la contraseña en\nla Fragata Plasma."
    ko: "플라스마 프리깃 배 안에서\n패스워드를 입력할 때\n필요한 카드키."
plume_fossil:
  names:
    jp_kana: はねのカセキ
    jp_kanji: はねのカセキ
    en: Plume Fossil
    fr: Fossile Plume
    it: Fossilpiuma
    de: Federfossil
    es: Fósil Pluma
    ko: 날개화석
  descriptions:
    jp_kana: "とりポケモンの　そせんと　いわれる\nこだい　ポケモンの　カセキ。\nつばさの　いちぶ　らしい。"
    jp_kanji: "とりポケモンの　祖先と　いわれる\n古代ポケモンの　カセキ。\nつばさの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived in the sky. It looks as\nif it could come from part of its wing."
    fr: "Le fossile d’un ancien Pokémon volant.\nIl semble que ce soit un morceau d’aile."
    it: "Fossile di un Pokémon preistorico che solcava\ni cieli. Sembra essere parte della sua ala."
    de: "Das Fossil eines uralten Pokémon, von dem man\nannimmt, dass es der Urahn der Vogel-Pokémon\nsei. Es handelt sich um einen Teil des Flügels."
    es: "Fósil de un Pokémon ancestral que surcó los\ncielos. Parece ser parte de una de sus alas."
    ko: "새포켓몬의 조상이라 불리는\n고대 포켓몬의 화석.\n날개의 일부인 듯하다."
poffin_case:
  names:
    jp_kana: ポフィンケース
    jp_kanji: ポフィンケース
    en: Poffin Case
    fr: Boîte Poffin
    it: Portapoffin
    de: Knurspbox
    es: Pokochera
    ko: 포핀케이스
  descriptions:
    jp_kana: "おりょうりで　つくった　ポフィンを\nほぞんする　いれもの。"
    jp_kanji: "お料理で　つくった　ポフィンを\n保存する　いれもの。"
    en: A case for storing Poffins cooked from Berries.
    fr: "Boîte pour ranger les Poffins faits à partir\nde Baies."
    it: "Contenitore per conservare i Poffin cucinati\ncon le bacche."
    de: Eine Box für leckere Knurspe.
    es: "Caja en la que se transportan los Pokochos\nelaborados con bayas."
    ko: "요리로 만든 포핀을\n보존하는 용기."
point_card:
  names:
    jp_kana: ポイントカード
    jp_kanji: ポイントカード
    en: Point Card
    fr: Carte Points
    it: Scheda Punti
    de: Punktekarte
    es: Tarjeta Puntos
    ko: 포인트카드
  descriptions:
    jp_kana: "かちとった　バトルポイントの　かずを\nみることが　できる　カード。"
    jp_kanji: "勝ち取った　バトルポイントの　数を\nみることが　できる　カード。"
    en: "A card that lists how many\nBattle Points you have earned."
    fr: "Une carte indiquant le nombre de Points de\nCombat obtenus."
    it: Scheda che elenca i Punti Lotta che hai ottenuto.
    de: "Auf dieser Karte werden deine bisher\ngesammelten Gewinnpunkte festgehalten."
    es: "Una tarjeta en la que se registran los Puntos de\nBatalla que has ganado."
    ko: "이겨서 받은 배틀포인트 수를\n볼 수 있는 카드."
poison_barb:
  names:
    jp_kana: どくバリ
    jp_kanji: どくバリ
    en: Poison Barb
    fr: Pic Venin
    it: Velenaculeo
    de: Giftstich
    es: Flecha Venenosa
    ko: 독바늘
  descriptions:
    jp_kana: "どくのある　ちいさな　ハリ。\nもたせると　どくタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "どくのある　ちいさな　ハリ。\n持たせると　どくタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis small, poisonous barb boosts\nthe power of Poison-type moves."
    fr: "Objet à tenir. Un petit pic empoisonné qui\naugmente la puissance des capacités de\ntype Poison."
    it: "Strumento da dare a un Pokémon.\nAculeo piccolo e tossico che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Ein schmaler und giftiger\nWiderhaken, der Attacken vom Typ Gift verstärkt."
    es: "Flecha venenosa que refuerza los movimientos de\ntipo Veneno. Debe llevarla un Pokémon."
    ko: "독이 있는 작은 침.\n지니게 하면 독타입\n기술의 위력이 올라간다."
poison_gem:
  names:
    jp_kana: どくのジュエル
    jp_kanji: どくのジュエル
    en: Poison Gem
    fr: Joyau Poison
    it: Bijouveleno
    de: Giftjuwel
    es: Gema Veneno
    ko: 독주얼
  descriptions:
    jp_kana: "どくの　タイプの　ジュエル。\nもたせると　いちどだけ　どくの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　ジュエル。\n持たせると　１度だけ　どくの\n技の　威力が　強まる。"
    en: "A gem with an essence of poison.\nWhen held, it strengthens the power\nof a Poison-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Veleno."
    de: "Ein Juwel vom Typ Gift. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Gift."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Veneno. Debe llevarla\nun Pokémon."
    ko: "독타입의 주얼.\n지니게 하면 한 번만 독\n기술의 위력이 강해진다."
poke_ball:
  names:
    jp_kana: モンスターボール
    jp_kanji: モンスターボール
    en: Poké Ball
    fr: Poké Ball
    it: Poké Ball
    de: Pokéball
    es: Poké Ball
    ko: 몬스터볼
  descriptions:
    jp_kana: "やせいの　ポケモンに　なげて\nつかまえる　ための　ボール。\nカプセルしきに　なっている。"
    jp_kanji: "野生の　ポケモンに　投げて\n捕まえるための　ボール。\nカプセル式に　なっている。"
    en: "A device for catching wild Pokémon.\nIt’s thrown like a ball at a Pokémon,\ncomfortably encapsulating its target."
    fr: "Un objet semblable à une capsule, qui capture\nles Pokémon sauvages. Il suffit pour cela de le\njeter comme une balle."
    it: "Strumento dotato di capsula usato per catturare\nPokémon selvatici. Si lancia contro il bersaglio\ncome una palla."
    de: "Damit fängst du wilde Pokémon. Du wirfst ihn wie\neinen normalen Ball. Das Design ähnelt dem einer\nKapsel."
    es: "Dispositivo con diseño capsular que atrapa\nPokémon salvajes. Se lanza como una bola\ncontra el blanco."
    ko: "야생 포켓몬에게 던져서\n잡기 위한 볼.\n캡슐식으로 되어 있다."
poke_doll:
  names:
    jp_kana: ピッピにんぎょう
    jp_kanji: ピッピにんぎょう
    en: Poké Doll
    fr: Poképoupée
    it: Poké Bambola
    de: Poképuppe
    es: Poké Muñeco
    ko: 삐삐인형
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A doll that attracts the attention of a\nPokémon. It guarantees escape from\nany battle with wild Pokémon."
    fr: "Une poupée qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Bambola che attrae i Pokémon. È utile per fuggire\ndalla lotta con Pokémon selvatici."
    de: "Eine hübsche Puppe. Sie ermöglicht die Flucht\nim Kampf gegen wilde Pokémon."
    es: "Un muñeco que atrae a los Pokémon. Es útil para\nhuir de un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
poke_flute:
  names:
    jp_kana: ポケモンのふえ
    jp_kanji: ポケモンのふえ
    en: Poké Flute
    fr: Pokéflûte
    it: Poké Flauto
    de: Pokéflöte
    es: Poké Flauta
    ko: 포켓몬피리
  descriptions:
    jp_kana: "ねむっている　ポケモンも\nおもわず　めざめるほど　すばらしい\nねいろを　かなでる　ふえ。"
    jp_kanji: "眠っている　ポケモンも\n思わず　めざめるほど　すばらしい\n音色を　奏でる　ふえ。"
    en: "A flute which can play with such a\nbeautiful tone that even sleeping\nPokémon find themselves roused."
    fr: "Une flûte au son si particulier qu’elle permet de\nréveiller les Pokémon les plus profondément\nendormis."
    it: "Flauto dal suono meraviglioso che risveglia\nanche i Pokémon profondamente addormentati."
    de: "Eine Flöte, die so wundervolle Töne spielen kann,\ndass selbst schlafende Pokémon aufwachen."
    es: "Una flauta con un timbre tan dulce y hermoso que\ndespierta hasta el Pokémon más profundamente\ndormido."
    ko: "잠자고 있는 포켓몬도\n무심코 잠에서 깨어날 정도로\n멋진 음색을 내는 피리."
poke_radar:
  names:
    jp_kana: ポケトレ
    jp_kanji: ポケトレ
    en: Poké Radar
    fr: Poké Radar
    it: Poké Radar
    de: Pokéradar
    es: Pokéradar
    ko: 포켓트레
  descriptions:
    jp_kana: "くさむらに　かくれている　ポケモンを\nさがしだせる　どうぐ。\nあるくと　でんちが　たまる。"
    jp_kanji: "くさむらに　隠れている　ポケモンを\n探しだせる　道具。\n歩くと　電池が　たまる。"
    en: "A tool that can search out Pokémon\nthat are hiding in the tall grass. Its\nbattery is recharged as you walk."
    fr: "Un objet permettant de trouver les Pokémon qui\nse cachent dans l’herbe. Se recharge quand vous\nmarchez."
    it: "Strumento con cui individuare i Pokémon\nnascosti nell’erba. La batteria si ricarica\nmentre cammini."
    de: "Spürt Pokémon im hohen Gras auf.\nDie Batterie wird beim Reisen aufgeladen."
    es: "Busca Pokémon que se esconden en la hierba.\nLa batería se recarga mientras caminas."
    ko: "풀밭에 숨어 있는 포켓몬을\n찾아내는 도구.\n걸으면 전지가 충전된다."
poke_toy:
  names:
    jp_kana: ポケじゃらし
    jp_kanji: ポケじゃらし
    en: Poké Toy
    fr: Poképlumet
    it: Pokégingillo
    de: Pokéwedel
    es: Pokéseñuelo
    ko: 포켓풀
  descriptions:
    jp_kana: "ポケモンの　きをひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of a\nPokémon. It guarantees escape from\nany battle with wild Pokémon."
    fr: "Un objet qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile per\nfuggire dalla lotta con Pokémon selvatici."
    de: "Ein Item, das wilde Pokémon vom\nKampfgeschehen ablenkt und\ngarantiert die Flucht ermöglicht."
    es: "Un objeto que atrae a los Pokémon. Es útil para\nhuir de un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
pokeblock_kit:
  names:
    jp_kana: ポロックキット
    jp_kanji: ポロックキット
    en: Pokéblock Kit
    fr: Kit Pokébloc
    it: Kit Pokémelle
    de: Pokériegel-Set
    es: Kit de Pokécubos
    ko: 포켓몬스넥키트
  descriptions:
    jp_kana: "きのみから　ポロックを　つくる\nきのみブレンダーと　できたポロックを\nほぞんする　ポロックケースの　セット。"
    jp_kanji: "きのみから　ポロックを　作る\nきのみブレンダーと　できたポロックを\n保存する　ポロックケースの　セット。"
    en: "A set containing a Berry Blender for making\nPokéblocks and a Pokéblock Case for\nstoring Pokéblocks."
    fr: "Boîte pour ranger le Mixeur à Baies\net les Pokéblocs."
    it: "Kit composto da un Mixer bacche, usato per\npreparare le Pokémelle, e da un Portapokémelle,\nusato per conservarle."
    de: "Ein Set, das aus einem Beerenmixer für\ndie Herstellung von Pokériegeln und einer\nPokériegelbox für deren Lagerung besteht."
    es: "Kit consistente en una Licuabayas para preparar\nPokécubos a partir de bayas y un Tubo\nPokécubos para guardarlos."
    ko: "나무열매로 포켓몬스넥을 만드는\n나무열매블렌더와 만들어진 포켓몬스넥을\n저장하는 포켓몬스넥케이스 세트."
pomeg_berry:
  names:
    jp_kana: ザロクのみ
    jp_kanji: ザロクのみ
    en: Pomeg Berry
    fr: Baie Grena
    it: Baccagrana
    de: Granabeere
    es: Baya Grana
    ko: 유석열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nＨＰの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\nＨＰの　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon.\nUsing it on a Pokémon makes it more\nfriendly but lowers its base HP."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leurs PV de base."
    it: "Usata su un Pokémon, lo rende più amichevole,\nma ne riduce i punti base dei PS."
    de: "Isst ein Pokémon diese Beere, stärkt dies eure\nFreundschaft, verringert aber seinen KP-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce sus PS de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\nHP의 기초 포인트가 떨어진다."
potion:
  names:
    jp_kana: キズぐすり
    jp_kanji: キズぐすり
    en: Potion
    fr: Potion
    it: Pozione
    de: Trank
    es: Poción
    ko: 상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A spray-type medicine for treating\nwounds. It can be used to restore\n20 HP to an injured Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 20 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 20 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon\num 20 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura\n20 PS a un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
power_anklet:
  names:
    jp_kana: パワーアンクル
    jp_kanji: パワーアンクル
    en: Power Anklet
    fr: Chaîne Pouvoir
    it: Vigorgliera
    de: Machtkette
    es: Franja Recia
    ko: 파워앵클릿
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　すばやさが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　素早さが\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nIt reduces Speed but allows the holder’s\nSpeed stat to grow more after battling."
    fr: "Objet à tenir. Permet à la Vitesse de progresser\nplus vite, mais la réduit pendant le combat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase della Velocità di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht bei Levelaufstieg\nden Initiative-Wert, senkt aber die Initiative\nallgemein."
    es: "Potencia la Velocidad de base, pero reduce la\nVelocidad en combate. Debe llevarla un\nPokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 스피드를\n올리면서 키우기가 쉽다."
power_band:
  names:
    jp_kana: パワーバンド
    jp_kanji: パワーバンド
    en: Power Band
    fr: Bandeau Pouvoir
    it: Vigorbanda
    de: Machtband
    es: Banda Recia
    ko: 파워밴드
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくぼうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特防が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nIt reduces Speed but allows the holder’s\nSp. Def stat to grow more after battling."
    fr: "Objet à tenir. Permet à la Défense Spéciale de\nprogresser plus vite, mais réduit la Vitesse\npendant le combat."
    it: "Strumento da dare a un Pokémon. Riduce la\nVelocità nella lotta ma permette ai punti base\ndella Difesa Speciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht bei Levelaufstieg\nden Spezial-Verteidigungs-Wert, senkt aber\ndie Initiative."
    es: "Potencia la Defensa Especial de base, pero\nreduce la Velocidad en combate. Debe llevarla\nun Pokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수방어를\n올리면서 키우기가 쉽다."
power_belt:
  names:
    jp_kana: パワーベルト
    jp_kanji: パワーベルト
    en: Power Belt
    fr: Ceinture Pouvoir
    it: Vigorfascia
    de: Machtgurt
    es: Cinto Recio
    ko: 파워벨트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ぼうぎょが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　防御が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nIt reduces Speed but allows the holder’s\nDefense stat to grow more after battling."
    fr: "Objet à tenir. Permet à la Défense de progresser\nplus vite, mais réduit la Vitesse pendant le\ncombat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase della Difesa di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht bei Levelaufstieg\nden Verteidigungs-Wert, senkt aber die Initiative."
    es: "Potencia la Defensa de base, pero reduce la\nVelocidad en combate. Debe llevarlo un\nPokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 방어를\n올리면서 키우기가 쉽다."
power_bracer:
  names:
    jp_kana: パワーリスト
    jp_kanji: パワーリスト
    en: Power Bracer
    fr: Poignée Pouvoir
    it: Vigorcerchio
    de: Machtreif
    es: Brazal Recio
    ko: 파워리스트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　こうげきが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　攻撃が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nIt reduces Speed but allows the holder’s\nAttack stat to grow more after battling."
    fr: "Objet à tenir. Permet à l’Attaque de progresser\nplus vite, mais réduit la Vitesse pendant le\ncombat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase dell’Attacco di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht bei Levelaufstieg\nden Angriffs-Wert, senkt aber die Initiative."
    es: "Potencia el Ataque de base, pero reduce la\nVelocidad en combate. Debe llevarlo un\nPokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 공격을\n올리면서 키우기가 쉽다."
power_herb:
  names:
    jp_kana: パワフルハーブ
    jp_kanji: パワフルハーブ
    en: Power Herb
    fr: Herbe Pouvoir
    it: Vigorerba
    de: Energiekraut
    es: Hierba Única
    ko: 파워풀허브
  descriptions:
    jp_kana: "もたせた　ポケモンは　いちどだけ\n１ターンめに　ちからを　ためるわざを\nすぐに　つかうことが　できる。"
    jp_kanji: "持たせた　ポケモンは　１度だけ\n１ターン目に　ちからを　ためる技を\nすぐに　使うことが　できる。"
    en: "A single-use item to be held by a Pokémon.\nIt allows the holder to immediately use a\nmove that normally requires a turn to charge."
    fr: "Objet à tenir et à usage unique. Permet d’utiliser\nimmédiatement une capacité qui devrait se\ncharger au premier tour."
    it: "Strumento monouso da dare a un Pokémon.\nPermette l’uso immediato di una mossa che in\ngenere richiede un turno prima di essere eseguita."
    de: "Ein Item zum einmaligen Tragen. Der Träger kann\ndadurch eine Attacke sofort einsetzen, die sonst\naufgeladen werden muss."
    es: "Permite el uso inmediato de cualquier movimiento\nen el primer turno. Es de un solo uso y debe\nllevarla un Pokémon."
    ko: "지니게 한 포켓몬은 한 번만\n1턴째에 힘을 모으는 기술을\n바로 사용할 수가 있다."
power_lens:
  names:
    jp_kana: パワーレンズ
    jp_kanji: パワーレンズ
    en: Power Lens
    fr: Lentille Pouvoir
    it: Vigorlente
    de: Machtlinse
    es: Lente Recia
    ko: 파워렌즈
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　とくこうが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　特攻が\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nIt reduces Speed but allows the holder’s\nSp. Atk stat to grow more after battling."
    fr: "Objet à tenir. Permet à l’Attaque Spéciale de\nprogresser plus vite, mais réduit la Vitesse\npendant le combat."
    it: "Strumento da dare a un Pokémon. Riduce la\nVelocità nella lotta ma permette ai punti base\ndell’Attacco Speciale di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht bei Levelaufstieg\nden Spezial-Angriffs-Wert, senkt aber die\nInitiative."
    es: "Potencia el Ataque Especial de base, pero reduce\nla Velocidad en combate. Debe llevarla un\nPokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 특수공격을\n올리면서 키우기가 쉽다."
power_plant_pass:
  names:
    jp_kana: はつでんしょパス
    jp_kanji: はつでんしょパス
    en: Power Plant Pass
    fr: Passe Centrale
    it: Pass Centrale
    de: Kraftwerks-Pass
    es: Pase Central
    ko: 발전소패스
  descriptions:
    jp_kana: "１３ばんどうろに　ある\nはつでんしょに　はいるための\nみぶんしょうとなる　パス。"
    jp_kanji: "１３番道路に　ある\n発電所に　入るための\n身分証となる　パス。"
    en: "This pass serves as an ID card\nfor gaining access to the power\nplant that lies along Route 13."
    fr: "Un passe de sécurité permettant d’accéder à la\nCentrale de Kalos, à proximité de la Route 13."
    it: "Tesserino di riconoscimento che consente\nl’accesso alla Centrale di Kalos che si trova\nnel Percorso 13."
    de: "Dieser Pass gewährt Zutritt zum Kraftwerk\nauf Route 13."
    es: "Documento de identificación necesario para\nacceder a la central eléctrica de la Ruta 13."
    ko: "13번도로에 있는\n발전소에 들어가기 위한\n신분증이 되는 패스."
power_weight:
  names:
    jp_kana: パワーウエイト
    jp_kanji: パワーウエイト
    en: Power Weight
    fr: Poids Pouvoir
    it: Vigorpeso
    de: Machtgewicht
    es: Pesa Recia
    ko: 파워웨이트
  descriptions:
    jp_kana: "もたせると　すばやさが　さがるが\nふつうよりも　ポケモンの　ＨＰが\nたかく　そだちやすい。"
    jp_kanji: "持たせると　素早さが　さがるが\nふつうよりも　ポケモンの　ＨＰが\n高く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nIt reduces Speed but allows the holder’s\nmaximum HP to grow more after battling."
    fr: "Objet à tenir. Permet aux PV max de progresser\nplus vite, mais réduit la Vitesse pendant le\ncombat."
    it: "Strumento da dare a un Pokémon.\nRiduce la Velocità nella lotta ma permette ai punti\nbase dei PS di crescere più rapidamente."
    de: "Ein Item zum Tragen. Erhöht bei Levelaufstieg\ndie maximalen KP, senkt aber die Initiative."
    es: "Mejora los PS de base, pero reduce la\nVelocidad en combate. Debe llevarla un\nPokémon."
    ko: "지니게 하면 스피드는 떨어지지만\n여느 때보다 포켓몬의 HP를\n올리면서 키우기가 쉽다."
pp_max:
  names:
    jp_kana: ポイントマックス
    jp_kanji: ポイントマックス
    en: PP Max
    fr: PP Max
    it: PP-Max
    de: AP-Top
    es: PP Máximos
    ko: 포인트맥스
  descriptions:
    jp_kana: "おぼえている　わざのうち\n１つの　ＰＰの　さいだいちを\nさいこうまで　あげる。"
    jp_kanji: "覚えている　技のうち\n１つの　ＰＰの　最大値を\n最高まで　あげる。"
    en: "A medicine that can optimally raise the\nmaximum PP of a single move that has\nbeen learned by the target Pokémon."
    fr: "Augmente sensiblement les PP max d’une\ncapacité sélectionnée."
    it: "Porta al limite i PP massimi di una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Maximiert die Anzahl der AP einer Attacke\neines Pokémon."
    es: "Aumenta hasta el límite los PP máximos del\nmovimiento elegido de un Pokémon."
    ko: "기억하고 있는 기술 중\n1개의 PP 최대치를\n최고까지 올린다."
pp_up:
  names:
    jp_kana: ポイントアップ
    jp_kanji: ポイントアップ
    en: PP Up
    fr: PP Plus
    it: PP-Su
    de: AP-Plus
    es: Más PP
    ko: 포인트업
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰの\nさいだいちを　すこし　あげる。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰの\n最大値を　少し　あげる。"
    en: "A medicine that can slightly raise the\nmaximum PP of a single move that has\nbeen learned by the target Pokémon."
    fr: "Augmente un peu les PP max d’une capacité\nsélectionnée."
    it: "Aumenta di poco i PP massimi di una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Erhöht die maximale Anzahl der AP einer Attacke\neines Pokémon."
    es: "Aumenta ligeramente los PP máximos del\nmovimiento elegido de un Pokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP\n최대치를 조금 올린다."
premier_ball:
  names:
    jp_kana: プレミアボール
    jp_kanji: プレミアボール
    en: Premier Ball
    fr: Honor Ball
    it: Premier Ball
    de: Premierball
    es: Honor Ball
    ko: 프레미어볼
  descriptions:
    jp_kana: "なにかの　きねんの　しなとして\nとくべつに　つくられた\nちょっと　めずらしい　ボール。"
    jp_kanji: "なにかの　記念の　品として\n特別に　つくられた\nちょっと　珍しい　ボール。"
    en: "A somewhat rare Poké Ball that was\nmade as a commemorative item used\nto celebrate an event of some sort."
    fr: "Une Poké Ball assez rare qui fut créée pour\nun événement particulier."
    it: "Poké Ball poco comune realizzata appositamente\nper commemorare un particolare evento."
    de: "Ein eher seltener Ball, der als Reminiszenz\nan irgendein Ereignis hergestellt wurde."
    es: "Es una Poké Ball algo singular que se creó para\nconmemorar algún acontecimiento."
    ko: "무언가의 기념품으로\n특별히 만들어진\n조금 희귀한 볼."
pretty_feather:
  names:
    jp_kana: きれいなハネ
    jp_kanji: きれいなハネ
    en: Pretty Wing
    fr: Jolie Aile
    it: Piumabella
    de: Prachtfeder
    es: Pluma Bella
    ko: 고운날개
  descriptions:
    jp_kana: "きれいなだけで　なんの　こうかもない\nごくごく　ふつうの　ハネ。"
    jp_kanji: "きれいなだけで　なんの　効果もない\nごくごく　普通の　ハネ。"
    en: "Though this feather is beautiful,\nit’s just a regular feather and\nhas no effect on Pokémon."
    fr: "Une plume très jolie, mais ordinaire et sans effet\nparticulier."
    it: "Piuma molto bella ma priva di qualsiasi utilità:\nnon ha alcun effetto."
    de: "Eine ganz normale Feder, die rein gar nichts\nbewirkt."
    es: "Pluma normal y corriente. Muy bonita, pero no\nsirve para nada."
    ko: "아름답기만 할 뿐 아무 효과도 없는\n지극히 평범한 날개."
prism_scale:
  names:
    jp_kana: きれいなウロコ
    jp_kanji: きれいなウロコ
    en: Prism Scale
    fr: Bel’Écaille
    it: Squama Bella
    de: Schönschuppe
    es: Escama Bella
    ko: 고운비늘
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　ウロコ。\nにじいろに　かがやいている。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　ウロコ。\nにじ色に　輝いている。"
    en: "A mysterious scale that causes\na certain Pokémon to evolve.\nIt shines in rainbow colors."
    fr: "Une écaille étrange qui fait évoluer certaines\nespèces de Pokémon. Elle a une couleur\narc-en-ciel."
    it: "Squama misteriosa che fa evolvere determinate\nspecie di Pokémon.\nRiflette i colori dell’arcobaleno."
    de: "Eine seltsame Schuppe, durch die sich bestimmte\nPokémon entwickeln. Sie funkelt in den Farben\ndes Regenbogens."
    es: "Curiosa escama que hace evolucionar a\ndeterminadas especies de Pokémon.\nBrilla con los colores del arcoíris."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 비늘.\n무지갯빛으로 빛나고 있다."
prison_bottle:
  names:
    jp_kana: いましめのツボ
    jp_kanji: いましめのツボ
    en: Prison Bottle
    fr: Vase Scellé
    it: Vaso del vincolo
    de: Banngefäß
    es: Vasija Castigo
    ko: 굴레의항아리
  descriptions:
    jp_kana: "おおむかしに　とある　ポケモンの\nちからを　ふうじこめたと　される　ツボ。"
    jp_kanji: "大昔に　とある　ポケモンの　力を\n封じ込めたと　される　ツボ。"
    en: "A bottle believed to have been used to seal away\nthe power of a certain Pokémon long, long ago."
    fr: "Récipient utilisé il y a fort longtemps pour sceller\nle pouvoir d’un certain Pokémon."
    it: "Vaso in cui si dice sia sigillata da tempo\nimmemorabile la forza di un Pokémon."
    de: "Ein Gefäß, mit dem vor langer, langer Zeit die\nMacht eines gewissen Pokémon versiegelt wurde."
    es: "Vasija en la que se halla confinado el poder de\ncierto Pokémon desde hace muchísimo tiempo."
    ko: "먼 옛날 어떤 포켓몬의 힘을\n봉인했다고 여겨지는 항아리."
profs_letter:
  names:
    jp_kana: はかせのてがみ
    jp_kanji: はかせのてがみ
    en: Prof’s Letter
    fr: Lettre du Prof
    it: Lettera del Prof
    de: Brief vom Prof
    es: Carta Profesor
    ko: 박사의편지
  descriptions:
    jp_kana: "プラターヌはかせから\nママあてに　かかれた　てがみ。\nほんのり　いい　かおりがする。"
    jp_kanji: "プラターヌ博士から\nママあてに　書かれた　手紙。\nほんのり　いい　香りがする。"
    en: "A letter that Professor Sycamore wrote\nto your mother. A faint but pleasant\nperfume seems to cling to the paper."
    fr: "Une lettre du Professeur Platane à Maman.\nElle dégage un parfum subtil."
    it: "Lettera del Professor Platan per la mamma.\nEmana un delicato profumo."
    de: "Ein an deine Mutter adressierter Brief von\nProfessor Platan. Ihm haftet ein schwacher\nParfümduft an."
    es: "Una carta sutilmente perfumada que el Profesor\nCiprés le ha escrito a tu madre."
    ko: "플라타느박사가\n엄마에게 쓴 편지.\n은은하게 좋은 향기가 난다."
prop_case:
  names:
    jp_kana: グッズケース
    jp_kanji: グッズケース
    en: Prop Case
    fr: Boîte Parure
    it: Portagadget
    de: Deko-Box
    es: Neceser
    ko: 굿즈케이스
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\n収納する　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props\nfor your Pokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures pour\nhabiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget\nusati per agghindare i Pokémon durante\nil Pokémon Musical."
    de: "Eine ganz tolle Box, in der jede Menge bunte\nDeko-Artikel für Pokémon-Musicals Platz haben."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a tus Pokémon en\nel Teatro Musical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
protector:
  names:
    jp_kana: プロテクター
    jp_kanji: プロテクター
    en: Protector
    fr: Protecteur
    it: Copertura
    de: Schützer
    es: Protector
    ko: 프로텍터
  descriptions:
    jp_kana: "なにかの　プロテクター。\nとても　かたくて　おもい。\nある　ポケモンが　このんでいる。"
    jp_kanji: "なにかの　プロテクター。\nとても　硬くて　重い。\nある　ポケモンが　好んでいる。"
    en: "A protective item of some sort.\nIt is extremely stiff and heavy.\nIt’s loved by a certain Pokémon."
    fr: "Un objet protecteur très dur et très lourd,\napprécié d’un certain Pokémon."
    it: "Strumento protettivo, molto duro e pesante,\nprediletto da un Pokémon in particolare."
    de: "Ein schützendes Item. Steif und schwer.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Dispositivo de protección muy pesado. Cierto\nPokémon lo adora."
    ko: "무언가의 프로텍터.\n매우 단단하고 무겁다.\n어떤 포켓몬이 좋아하는 물건이다."
protein:
  names:
    jp_kana: タウリン
    jp_kanji: タウリン
    en: Protein
    fr: Protéine
    it: Proteina
    de: Protein
    es: Proteína
    ko: 타우린
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　こうげきの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　攻撃の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nWhen consumed, it raises the base\nAttack stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nl’Attaque de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dell’Attacco."
    de: "Ein gehaltvolles Getränk, das den\nAngriffs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia el Ataque de base\nde un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 공격\n기초 포인트를 올린다."
psychic_gem:
  names:
    jp_kana: エスパージュエル
    jp_kanji: エスパージュエル
    en: Psychic Gem
    fr: Joyau Psy
    it: Bijoupsico
    de: Psychojuwel
    es: Gema Psíquica
    ko: 에스퍼주얼
  descriptions:
    jp_kana: "エスパーの　タイプの　ジュエル。\nもたせると　いちどだけ　エスパーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "エスパーの　タイプの　ジュエル。\n持たせると　１度だけ　エスパーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the mind.\nWhen held, it strengthens the power\nof a Psychic-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Psico."
    de: "Ein Juwel vom Typ Psycho. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Psycho."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Psíquico. Debe llevarla\nun Pokémon."
    ko: "에스퍼타입의 주얼.\n지니게 하면 한 번만 에스퍼\n기술의 위력이 강해진다."
pure_incense:
  names:
    jp_kana: きよめのおこう
    jp_kanji: きよめのおこう
    en: Pure Incense
    fr: Encens Pur
    it: Puroaroma
    de: Scheuchrauch
    es: Incienso Puro
    ko: 순결의향로
  descriptions:
    jp_kana: "いちばん　まえの　ポケモンに\nもたせると　やせいポケモンが\nでて　きにくくなる。"
    jp_kanji: "１番　前の　ポケモンに\n持たせると　野生ポケモンが\nでて　きにくくなる。"
    en: "An item to be held by a Pokémon.\nIt helps keep wild Pokémon away if\nthe holder is the head of the party."
    fr: "Objet à tenir. Aide à repousser les Pokémon\nsauvages si le porteur est le premier Pokémon\nde l’équipe."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha è il primo della squadra, aiuta\nad allontanare i Pokémon selvatici."
    de: "Ein Item zum Tragen. Reduziert Begegnungen\nmit wilden Pokémon, wenn der Träger an\nerster Stelle steht."
    es: "Si lo lleva el primer Pokémon del equipo, se\nreduce la probabilidad de que se acerquen\nPokémon salvajes."
    ko: "맨 앞의 포켓몬에게\n지니게 하면 야생 포켓몬이\n나타날 확률이 낮아진다."
qualot_berry:
  names:
    jp_kana: タポルのみ
    jp_kanji: タポルのみ
    en: Qualot Berry
    fr: Baie Qualot
    it: Baccaloquat
    de: Qualotbeere
    es: Baya Ispero
    ko: 파비열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nぼうぎょの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n防御の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon.\nUsing it on a Pokémon makes it more\nfriendly but lowers its base Defense."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense de base."
    it: "Usata su un Pokémon, lo rende più amichevole,\nma ne diminuisce i punti base della Difesa."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nVerteidigungs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Defensa de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n방어의 기초 포인트가 떨어진다."
quick_ball:
  names:
    jp_kana: クイックボール
    jp_kanji: クイックボール
    en: Quick Ball
    fr: Rapide Ball
    it: Velox Ball
    de: Flottball
    es: Veloz Ball
    ko: 퀵볼
  descriptions:
    jp_kana: "せんとうが　はじまって　すぐに\nつかうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "戦闘が　はじまって　すぐに\n使うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nhas a more successful catch rate if\nused at the start of a wild encounter."
    fr: "Une Poké Ball qui permet d’attraper un Pokémon\nsauvage plus facilement si on l’utilise au début du\ncombat."
    it: "Poké Ball un po’ diversa che facilita la cattura\ndi un Pokémon selvatico se usata all’inizio\ndella lotta."
    de: "Ein ungewöhnlicher Ball, der zu Beginn eines\nKampfes am wirkungsvollsten ist."
    es: "Una Poké Ball algo distinta que potencia el índice\nde captura si se usa al inicio de un encuentro con\nPokémon salvajes."
    ko: "배틀이 시작되자마자\n사용하면 잡기 쉬워지는\n조금 특이한 볼."
quick_claw:
  names:
    jp_kana: せんせいのツメ
    jp_kanji: せんせいのツメ
    en: Quick Claw
    fr: Vive Griffe
    it: Rapidartigli
    de: Flinkklaue
    es: Garra Rápida
    ko: 선제공격손톱
  descriptions:
    jp_kana: "かるくて　するどい　ツメ。\nもたせると　あいてより　さきに\nこうどう　できることが　ある。"
    jp_kanji: "軽くて　鋭い　ツメ。\n持たせると　相手より　先に\n行動できることが　ある。"
    en: "An item to be held by a Pokémon.\nThis light, sharp claw lets the\nbearer move first occasionally."
    fr: "Objet à tenir. Une griffe légère mais tranchante\nqui permet parfois de frapper le premier."
    it: "Strumento da dare a un Pokémon.\nLeggero e affilato, ogni tanto permette di fare\nla prima mossa."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es hebt gelegentlich\ndie Erstschlagquote."
    es: "Garra ligera y afilada que permite que el Pokémon\nque la lleve ataque a veces el primero."
    ko: "가볍고 날카로운 손톱.\n지니게 하면 상대보다 먼저\n행동할 수도 있다."
quick_powder:
  names:
    jp_kana: スピードパウダー
    jp_kanji: スピードパウダー
    en: Quick Powder
    fr: Poudre Vite
    it: Velopolvere
    de: Flottstaub
    es: Polvo Veloz
    ko: 스피드파우더
  descriptions:
    jp_kana: "メタモンに　もたせると　すばやさが\nあがる　ふしぎなこな。\nとても　こまかくて　かたい。"
    jp_kanji: "メタモンに　持たせると　素早さが\nあがる　不思議な粉。\nとても　こまかくて　硬い。"
    en: "An item to be held by Ditto.\nExtremely fine yet hard, this odd\npowder boosts the Speed stat."
    fr: "Objet à faire tenir à Métamorph.\nCette poudre étrange, très fine mais résistante,\naugmente sa Vitesse."
    it: "Strumento da dare a Ditto.\nQuesta strana polvere, fine e al contempo dura,\naumenta la Velocità."
    de: "Ein Item, das Ditto zum Tragen gegeben\nwerden kann. Fein und doch hart, erhöht\nes den Initiative-Wert."
    es: "Debe llevarlo Ditto. Es un polvo muy fino, pero\na la vez resistente, que aumenta su Velocidad."
    ko: "메타몽에게 지니게 하면 스피드가\n올라가는 이상한 가루.\n매우 잘고 단단하다."
rabuta_berry:
  names:
    jp_kana: ラブタのみ
    jp_kanji: ラブタのみ
    en: Rabuta Berry
    fr: Baie Rabuta
    it: Baccambutan
    de: Rabutabeere
    es: Baya Rautan
    ko: 라부탐열매
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter l’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian el ingenio. Es una baya muy rara en\notras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
rage_candy_bar:
  names:
    jp_kana: いかりまんじゅう
    jp_kanji: いかりまんじゅう
    en: Rage Candy Bar
    fr: Bonbon Rage
    it: Iramella
    de: Wutkeks
    es: Caramelo Furia
    ko: 분노의호두과자
  descriptions:
    jp_kana: "チョウジめいぶつの　まんじゅう。\nおみやげひん　として　ゆうめい。"
    jp_kanji: "ジョウト地方　にある\nチョウジタウン名物の　まんじゅう。\nお土産品として　有名。"
    en: "Mahogany Town’s famous candy.\nWhen consumed, it restores\n20 HP to an injured Pokémon."
    fr: "Un bonbon, spécialité d’Acajou.\nIl constitue un cadeau très réputé."
    it: "Caramella tipica di Mogania.\nSouvenir dall’ottima reputazione."
    de: "Eine Spezialität aus Mahagonia City. Sie wird gern\nals Souvenir gekauft."
    es: "Caramelo típico de Pueblo Caoba, muy popular\ncomo souvenir."
    ko: "황토마을의 명물인 호두과자.\n선물로 아주 유명하다."
rainbow_wing:
  names:
    jp_kana: にじいろのはね
    jp_kanji: にじいろのはね
    en: Rainbow Wing
    fr: Arcenci’Aile
    it: Ala d’Iride
    de: Buntschwinge
    es: Ala Arcoíris
    ko: 무지갯빛날개
  descriptions:
    jp_kana: "にじいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "にじいろに　ひかり　かがやく\n不思議な　はね。"
    en: "A mystical rainbow feather\nthat sparkles."
    fr: "Une étrange plume qui brille d’un éclat\narc-en-ciel."
    it: Piuma magica dai mille colori.
    de: "Eine mystische Feder, die von einem\nregenbogenfarbenen Leuchten erfüllt ist."
    es: Misteriosa ala de un brillante color arcoíris.
    ko: "무지갯빛으로 빛나는\n이상한 날개."
rare_bone:
  names:
    jp_kana: きちょうなホネ
    jp_kanji: きちょうなホネ
    en: Rare Bone
    fr: Os Rare
    it: Osso Raro
    de: Steinknochen
    es: Hueso Raro
    ko: 귀중한뼈
  descriptions:
    jp_kana: "ポケモンこうこがくの　うえで\nとても　きちょうな　ホネ。\nショップで　たかく　うれる。"
    jp_kanji: "ポケモン考古学の　うえで\nとても　貴重な　ホネ。\nショップで　高く　売れる。"
    en: "A rare bone that is extremely valuable\nfor the study of Pokémon archeology.\nIt can be sold for a high price to shops."
    fr: "Un os d’une grande valeur pour l’archéologie\nPokémon. Peut être vendu à bon prix aux\nmagasins."
    it: "Osso di grande valore per l’archeologia\nPokémon. Può essere venduto nei negozi\na un prezzo piuttosto alto."
    de: "Dieser Knochen erfreut jeden Pokémon-\nArchäologen. Er ist von hohem Wert."
    es: "Un hueso de gran valor para la arqueología\nPokémon. Puede alcanzar un alto precio en las\ntiendas."
    ko: "포켓몬 고고학에 있어\n매우 귀중한 뼈.\n상점에서 비싸게 팔린다."
rare_candy:
  names:
    jp_kana: ふしぎなアメ
    jp_kanji: ふしぎなアメ
    en: Rare Candy
    fr: Super Bonbon
    it: Caramella Rara
    de: Sonderbonbon
    es: Caramelo Raro
    ko: 이상한사탕
  descriptions:
    jp_kana: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１ひきの\nレベルが　１だけ　あがる。"
    jp_kanji: "エネルギーの　つまった　アメ。\nあたえると　ポケモン　１匹の\nレベルが　１だけ　あがる。"
    en: "A candy that is packed with energy.\nWhen consumed, it will instantly raise\nthe level of a single Pokémon by one."
    fr: "Un bonbon plein d’énergie.\nIl permet à un Pokémon de gagner un niveau\nd’expérience."
    it: "Caramella altamente energetica.\nFa salire un Pokémon di un livello."
    de: "Ein energiereiches Bonbon, das den Level\neines Pokémon dauerhaft um 1 erhöht."
    es: "Caramelo energético que sube a un Pokémon de\nnivel."
    ko: "에너지가 가득한 사탕.\n먹이면 포켓몬 1마리의\n레벨이 1만큼 올라간다."
rawst_berry:
  names:
    jp_kana: チーゴのみ
    jp_kanji: チーゴのみ
    en: Rawst Berry
    fr: Baie Fraive
    it: Baccafrago
    de: Fragiabeere
    es: Baya Safre
    ko: 복분열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nやけどを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nやけどを　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom a burn on its own in battle."
    fr: "Une Baie qui soigne une brûlure lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce dalle\nscottature."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nheilt diese es von Verbrennungen."
    es: "Los Pokémon pueden llevarla o usarla para\ncurarse las quemaduras."
    ko: "포켓몬에게 지니게 하면\n화상을 회복한다."
razor_claw:
  names:
    jp_kana: するどいツメ
    jp_kanji: するどいツメ
    en: Razor Claw
    fr: Griffe Rasoir
    it: Affilartigli
    de: Scharfklaue
    es: Garra Afilada
    ko: 예리한손톱
  descriptions:
    jp_kana: "するどく　とがった　ツメ。\nもたせると　わざが　きゅうしょに\nあたりやすくなる。"
    jp_kanji: "鋭く　とがった　ツメ。\n持たせると　技が　急所に\n当たりやすくなる。"
    en: "An item to be held by a Pokémon.\nThis sharply hooked claw increases\nthe holder’s critical-hit ratio."
    fr: "Objet à tenir. Une griffe crochue et pointue\naugmentant le taux de critiques."
    it: "Strumento da dare a un Pokémon.\nArtiglio che aumenta la probabilità di sferrare\nbrutti colpi."
    de: "Ein Item zum Tragen. Die scharfe Klaue erhöht die\nVolltrefferquote des Trägers."
    es: "Aumenta la probabilidad de que el Pokémon que\nla lleve consiga un golpe crítico."
    ko: "날카롭고 뾰족한 손톱.\n지니게 하면 기술이\n급소에 맞기 쉬워진다."
razor_fang:
  names:
    jp_kana: するどいキバ
    jp_kanji: するどいキバ
    en: Razor Fang
    fr: Croc Rasoir
    it: Affilodente
    de: Scharfzahn
    es: Colmillo Agudo
    ko: 예리한이빨
  descriptions:
    jp_kana: "するどく　とがった　キバ。\nもたせると　ダメージを　あたえたとき\nひるませることが　ある。"
    jp_kanji: "鋭く　とがった　キバ。\n持たせると　ダメージを　与えたとき\nひるませることが　ある。"
    en: "An item to be held by a Pokémon.\nWhen the holder successfully inflicts\ndamage, the target may also flinch."
    fr: "Objet à tenir. Peut apeurer l’ennemi quand\nle porteur lui inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha può far tentennare il nemico colpito."
    de: "Ein Item zum Tragen. Verursacht der Träger\nSchaden, schreckt das Ziel eventuell zurück."
    es: "Si lo lleva un Pokémon cuando inflige daño a\notro, puede hacer retroceder a este último."
    ko: "날카롭고 뾰족한 이빨.\n지니게 하면 데미지를 줬을 때\n풀죽게 하기도 한다."
razz_berry:
  names:
    jp_kana: ズリのみ
    jp_kanji: ズリのみ
    en: Razz Berry
    fr: Baie Framby
    it: Baccalampon
    de: Himmihbeere
    es: Baya Frambu
    ko: 라즈열매
  descriptions:
    jp_kana: "かっこよさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nあかいろの　みは　たべると　からい。"
    jp_kanji: "かっこよさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n赤色の実は　食べると　辛い。"
    en: "Used to make Pokéblocks that will enhance your\nCoolness. Its red flesh is spicy when eaten."
    fr: "Une Baie orange au goût épicé, utilisée pour\npréparer des Pokéblocs permettant d’augmenter\nle Sang-froid d’un Pokémon."
    it: "Bacca arancione dal sapore piccante usata\nper creare Pokémelle che aumentano\nla Classe del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Coolness erhöhen.\nIhr rötliches Fruchtfleisch schmeckt scharf."
    es: "Se utiliza en la producción de Pokécubos que\npotencian el carisma. Es de color rojizo y sabor\npicante."
    ko: "근사함을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n빨간색 열매는 먹으면 맵다."
reaper_cloth:
  names:
    jp_kana: れいかいのぬの
    jp_kanji: れいかいのぬの
    en: Reaper Cloth
    fr: Tissu Fauche
    it: Terrorpanno
    de: Düsterumhang
    es: Tela Terrible
    ko: 영계의천
  descriptions:
    jp_kana: "おそろしく　つよい　れいりょくが\nこめられている　ぬの。\nある　ポケモンが　このんでいる。"
    jp_kanji: "おそろしく　強い　霊力が\nこめられている　布。\nある　ポケモンが　好んでいる。"
    en: "A cloth imbued with horrifyingly\nstrong spiritual energy.\nIt’s loved by a certain Pokémon."
    fr: "Un tissu imprégné d’une énergie spirituelle\nhorriblement puissante. Apprécié d’un certain\nPokémon."
    it: "Panno intriso di un’energia spirituale terribilmente\nforte. Piace a un Pokémon in particolare."
    de: "Ein Stoffumhang mit geistiger Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Tela imbuida de una energía espiritual muy\npotente. Cierto Pokémon la adora."
    ko: "무섭고 강한 영력이\n담겨 있는 천.\n어떤 포켓몬이 좋아하는 물건이다."
red_apricorn:
  names:
    jp_kana: あかぼんぐり
    jp_kanji: あかぼんぐり
    en: Red Apricorn
    fr: Noigrume Rge
    it: Ghicocca Rossa
    de: Aprikoko Rot
    es: Bonguri Rojo
    ko: 빨간규토리
  descriptions:
    jp_kana: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    jp_kanji: "あかい　ぼんぐり。\nつーんと　はなにくる　においがする。"
    en: "A red Apricorn.\nIt assails your nostrils."
    fr: "Un Noigrume de couleur rouge.\nIl dégage un puissant arôme."
    it: "Una Ghicocca di colore rosso.\nEmana un odore molto forte."
    de: "Eine rote Aprikoko.\nBesitzt einen stechenden Geruch."
    es: Bonguri de color rojo y aroma muy penetrante.
    ko: "빨간색의 규토리.\n코를 톡 쏘는 향기가 난다."
red_card:
  names:
    jp_kana: レッドカード
    jp_kanji: レッドカード
    en: Red Card
    fr: Carton Rouge
    it: Cartelrosso
    de: Rote Karte
    es: Tarjeta Roja
    ko: 레드카드
  descriptions:
    jp_kana: "ふしぎな　ちからのある　カード。\nもたせると　わざをつかってきた　あいてを\nたいじょう　させることが　できる。"
    jp_kanji: "不思議な　ちからのある　カード。\n持たせると　技を　使ってきた　相手を\n退場させることが　できる。"
    en: "An item to be held by a Pokémon.\nWhen the holder is hit by an attack,\nthe attacker is removed from battle."
    fr: "Une carte au pouvoir mystérieux.\nSi son porteur est touché par l’attaquant,\nce dernier doit se retirer du combat."
    it: "Cartellino dal potere misterioso. Chi ce l’ha\nfa ritirare dalla lotta il Pokémon che lo ha colpito."
    de: "Eine Karte mit mysteriösen Kräften. Wird der\nTräger getroffen, wird der Angreifer des\nPlatzes verwiesen."
    es: "Misteriosa tarjeta que permite al Pokémon que la\nlleva expulsar al oponente cuando este le cause\ndaño."
    ko: "이상한 힘이 있는 카드.\n지니게 하면 기술을 사용한 상대를\n퇴장시킬 수 있다."
red_chain:
  names:
    jp_kana: あかいくさり
    jp_kanji: あかいくさり
    en: Red Chain
    fr: Chaîne Rouge
    it: Rossocatena
    de: Rote Kette
    es: Cadena Roja
    ko: 빨강쇠사슬
  descriptions:
    jp_kana: "シンオウちほうを　うみだした\nでんせつの　ポケモンを　つなぐと\nいわれる　しんわの　どうぐ。"
    jp_kanji: "シンオウ地方を　うみだした\n伝説の　ポケモンを　つなぐと\nいわれる　神話の　道具。"
    en: "A mythical chain that is said to link\nthe Legendary Pokémon that created\nthe Sinnoh region."
    fr: "Une chaîne mystique qui serait reliée au\nPokémon légendaire ayant créé la région\nde Sinnoh."
    it: "Catena mitica che pare essere collegata\nal Pokémon leggendario che ha creato\nla regione di Sinnoh."
    de: "Diese mythische Kette ist angeblich die\nVerbindung zu einem Legendären Pokémon."
    es: "Se dice que esta cadena mítica está relacionada\ncon el Pokémon legendario que creó la región de\nSinnoh."
    ko: "신오지방을 만들어낸\n전설의 포켓몬과 이어진다고\n전해지는 신화의 도구."
red_flute:
  names:
    jp_kana: あかいビードロ
    jp_kanji: あかいビードロ
    en: Red Flute
    fr: Flûte Rouge
    it: Flauto Rosso
    de: Rote Flöte
    es: Flauta Roja
    ko: 빨강비드로
  descriptions:
    jp_kana: "あかいガラスで　できた　ふえ。\nメロメロ　じょうたいを\nかいふくする。"
    jp_kanji: "赤いガラスで　できた　笛。\nメロメロ状態を　回復する。"
    en: "A flute made from red glass\nthat snaps Pokémon out of infatuation."
    fr: "Un jouet en forme de flûte en verre rouge.\nAnnule l’effet de la capacité Attraction."
    it: "Flauto fatto di vetro rosso. Ha il potere\ndi guarire dall’innamoramento."
    de: "Eine Spielzeugflöte aus rotem Glas.\nHeilt Anziehung."
    es: "Una flauta de cristal rojo cuyas notas vuelven en\nsí a un Pokémon enamorado."
    ko: "빨간 유리로 만들어진 피리.\n헤롱헤롱 상태를\n회복한다."
red_orb:
  names:
    jp_kana: べにいろのたま
    jp_kanji: べにいろのたま
    en: Red Orb
    fr: Gemme Rouge
    it: Gemma rossa
    de: Roter Edelstein
    es: Prisma Rojo
    ko: 주홍구슬
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nあかく　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nあかく　かがやく　たま。"
    en: "A shiny red orb that is said to have\na legend tied to it. It’s known to have a\ndeep connection with the Hoenn region."
    fr: "Une gemme incarnat dont on dit qu’elle a un lien\ntrès étroit avec les légendes de Hoenn."
    it: "Gemma con riflessi rossi, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Ein rot schimmernder Stein, von dem in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Piedra carmesí de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n빨갛게 빛나는 구슬."
red_scale:
  names:
    jp_kana: あかいウロコ
    jp_kanji: あかいウロコ
    en: Red Scale
    fr: Écaillerouge
    it: Squama Rossa
    de: Rote Haut
    es: Escama Roja
    ko: 빨간비늘
  descriptions:
    jp_kana: "いかりのみずうみに　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    jp_kanji: "怒りの湖に　あらわれた\nあかい　ギャラドスの　ウロコ。\nほのおのように　あかく　かがやく。"
    en: "A scale from a red Gyarados.\nIt glows red like a flame."
    fr: "Une écaille du Léviator apparu au Lac Colère.\nElle rougeoie comme une flamme."
    it: "Una squama del Gyarados rosso apparso\nal Lago d’Ira. È rossa come il fuoco."
    de: "Eine Schuppe des roten Garados, das im See des\nZorns erschienen ist. Sie glänzt rot wie Feuer."
    es: "Escama del Gyarados aparecido en el Lago de la\nFuria. Es de un rojo tan intenso como las llamas."
    ko: "분노의 호수에 나타난\n빨간 갸라도스의 비늘.\n불꽃처럼 빨갛게 빛난다."
red_scarf:
  names:
    jp_kana: あかいバンダナ
    jp_kanji: あかいバンダナ
    en: Red Scarf
    fr: Foulard Rouge
    it: Fascia Rossa
    de: Roter Schal
    es: Pañuelo Rojo
    ko: 빨강밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかっこよく　みられる。"
    en: "An item to be held by a Pokémon.\nDuring a contest, it raises the Cool\naspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente le Sang-froid\nd’un Pokémon dans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta la “Classe” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Coolness ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta el carisma\nen los concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n근사하게 보인다."
red_shard:
  names:
    jp_kana: あかいかけら
    jp_kanji: あかいかけら
    en: Red Shard
    fr: Tesson Rouge
    it: Coccio Rosso
    de: Purpurstück
    es: Parte Roja
    ko: 빨강조각
  descriptions:
    jp_kana: "あかい　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "赤い　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small red shard. It appears\nto be a fragment of some sort\nof implement made long ago."
    fr: "Un petit tesson rouge.\nIl semble provenir d’un outil très ancien."
    it: "Un piccolo coccio rosso che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine rote Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento rojo. Parece formar parte\nde algún tipo de herramienta antigua."
    ko: "빨간 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
relic_band:
  names:
    jp_kana: こだいのうでわ
    jp_kanji: こだいのうでわ
    en: Relic Band
    fr: Vieux Bijou
    it: Bracciantico
    de: Alter Reif
    es: Brazal
    ko: 고대의팔찌
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　うでわ。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　腕輪。"
    en: "A heavy bracelet made by an ancient\ncivilization about 3,000 years ago."
    fr: "Un bijou d’une civilisation vieille de plus de\n3 000 ans."
    it: "Braccialetto forgiato circa 3000 anni fa\nda un’antica civiltà."
    de: "Ein Armreif, angefertigt von einer\ngut 3 000 Jahre alten Kultur."
    es: "Brazalete de más de 3000 años de antigüedad.\nMuy valorado por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 팔찌."
relic_copper:
  names:
    jp_kana: こだいのどうか
    jp_kanji: こだいのどうか
    en: Relic Copper
    fr: Vieux Sou
    it: Soldantico
    de: Alter Heller
    es: Real Cobre
    ko: 고대의동화
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　どうか。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　銅貨。"
    en: "A copper coin used by an ancient\ncivilization about 3,000 years ago."
    fr: "Une pièce de cuivre d’une civilisation vieille de\nplus de 3 000 ans."
    it: "Moneta di rame usata circa 3000 anni fa\nda un’antica civiltà."
    de: "Eine alte Kupfermünze. Die Währung\neiner gut 3 000 Jahre alten Kultur."
    es: "Moneda de cobre de más de 3000 años de\nantigüedad. Muy valorada por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 사용된 동화."
relic_crown:
  names:
    jp_kana: こだいのおうかん
    jp_kanji: こだいのおうかん
    en: Relic Crown
    fr: Vieux Tortil
    it: Coronantica
    de: Alte Krone
    es: Corona Antigua
    ko: 고대의왕관
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　おうかん。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　王冠。"
    en: "A heavy crown made by an ancient\ncivilization about 3,000 years ago."
    fr: "Une couronne d’une civilisation vieille de plus de\n3 000 ans."
    it: "Corona forgiata circa 3000 anni fa.\nda un’antica civiltà."
    de: "Die Krone eines Königs, angefertigt von\neiner gut 3 000 Jahre alten Kultur."
    es: "Corona de más de 3000 años de antigüedad.\nMuy valorada por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 왕관."
relic_gold:
  names:
    jp_kana: こだいのきんか
    jp_kanji: こだいのきんか
    en: Relic Gold
    fr: Vieux Ducat
    it: Doblonantico
    de: Alter Dukat
    es: Real Oro
    ko: 고대의금화
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　きんか。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　金貨。"
    en: "A gold coin used by an ancient\ncivilization about 3,000 years ago."
    fr: "Une pièce d’or d’une civilisation vieille de plus\nde 3 000 ans."
    it: "Moneta d’oro usata circa 3000 anni fa\nda un’antica civiltà."
    de: "Eine alte Goldmünze. Die Währung\neiner gut 3 000 Jahre alten Kultur."
    es: "Moneda de oro de más de 3000 años de\nantigüedad. Muy valorada por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 사용된 금화."
relic_silver:
  names:
    jp_kana: こだいのぎんか
    jp_kanji: こだいのぎんか
    en: Relic Silver
    fr: Vieil Écu
    it: Ducatantico
    de: Alter Taler
    es: Real Plata
    ko: 고대의은화
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つかわれた　ぎんか。"
    jp_kanji: "３０００年ほど　昔の\n文明で　使われた　銀貨。"
    en: "A silver coin used by an ancient\ncivilization about 3,000 years ago."
    fr: "Une pièce d’argent d’une civilisation vieille de\nplus de 3 000 ans."
    it: "Moneta d’argento usata circa 3000 anni fa\nda un’antica civiltà."
    de: "Eine alte Silbermünze. Die Währung\neiner gut 3 000 Jahre alten Kultur."
    es: "Moneda de plata de más de 3000 años de\nantigüedad. Muy valorada por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 사용된 은화."
relic_statue:
  names:
    jp_kana: こだいのせきぞう
    jp_kanji: こだいのせきぞう
    en: Relic Statue
    fr: Vieux Santon
    it: Statuantica
    de: Alte Statue
    es: Efigie Antigua
    ko: 고대의석상
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　せきぞう。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　石像。"
    en: "A stone figurine made by an ancient\ncivilization about 3,000 years ago."
    fr: "Une statuette d’une civilisation vieille de plus de\n3 000 ans."
    it: "Statua scolpita circa 3000 anni fa\nda un’antica civiltà."
    de: "Eine Statue, angefertigt von einer\ngut 3 000 Jahre alten Kultur."
    es: "Efigie de piedra de más de 3000 años de\nantigüedad. Muy valorada por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 석상."
relic_vase:
  names:
    jp_kana: こだいのツボ
    jp_kanji: こだいのツボ
    en: Relic Vase
    fr: Vieux Vase
    it: Vasantico
    de: Alte Vase
    es: Ánfora
    ko: 고대의항아리
  descriptions:
    jp_kana: "３０００ねんほど　むかしの\nぶんめいで　つくられた　ツボ。"
    jp_kanji: "３０００年ほど　昔の\n文明で　つくられた　ツボ。"
    en: "A fragile vase made by an ancient\ncivilization about 3,000 years ago."
    fr: "Un vase d’une civilisation vieille de plus de\n3 000 ans."
    it: "Vaso prodotto circa 3000 anni fa\nda un’antica civiltà."
    de: "Eine Vase, angefertigt von einer\ngut 3 000 Jahre alten Kultur."
    es: "Jarrón de más de 3000 años de antigüedad.\nMuy valorado por los coleccionistas."
    ko: "3000년 정도 된\n오랜 문명에서 만들어진 항아리."
repeat_ball:
  names:
    jp_kana: リピートボール
    jp_kanji: リピートボール
    en: Repeat Ball
    fr: Bis Ball
    it: Bis Ball
    de: Wiederball
    es: Acopio Ball
    ko: 리피드볼
  descriptions:
    jp_kana: "つかまえたことの　ある\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえたことの　ある\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well on a Pokémon\nspecies that has been caught before."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les espèces de\nPokémon déjà capturées."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sulle specie di Pokémon già catturate\nin precedenza."
    de: "Ein Ball, der sich besonders dann sehr gut eignet,\nwenn man ein Pokémon fangen will, dessen Art\nbereits gefangen wurde."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con las especies de Pokémon\nque ya has capturado."
    ko: "잡은 적이 있는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
repel:
  names:
    jp_kana: むしよけスプレー
    jp_kanji: むしよけスプレー
    en: Repel
    fr: Repousse
    it: Repellente
    de: Schutz
    es: Repelente
    ko: 벌레회피스프레이
  descriptions:
    jp_kana: "１００ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "１００歩　進む　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents any low-level\nwild Pokémon from jumping out at\nyou for 100 steps after its use."
    fr: "Repousse les Pokémon sauvages faibles pendant\n100 pas."
    it: "Strumento che evita l’incontro con i Pokémon\nselvatici deboli per 100 passi dopo l’utilizzo."
    de: "Hält 100 Schritte lang schwache, wilde\nPokémon ab."
    es: "Repele Pokémon salvajes débiles en un recorrido\nde 100 pasos."
    ko: "100보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
reply_mail:
  names:
    jp_kana: おかえしメール
    jp_kanji: おかえしメール
    en: Reply Mail
    fr: Lettre Réponse
    it: Mess. Risp.
    de: Rückbrief
    es: Carta Respuesta
    ko: 답장메일
  descriptions:
    jp_kana: "もらった　メールへの　おかえしが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "もらった　メールへの　お返しが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy\nto respond to a letter you received.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour répondre à\nun autre courrier. Peut être tenu et livré par\nun Pokémon."
    it: "Carta da lettere ideale per scrivere una risposta\na un messaggio.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man einen anderen Brief\nbeantworten kann. Gib es einem Pokémon zum\nTragen."
    es: "Carta para responder a un mensaje. Haz que la\nentregue un Pokémon."
    ko: "받은 메일에 대한 답장을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
reset_urge:
  names:
    jp_kana: フラットコール
    jp_kanji: フラットコール
    en: Reset Urge
    fr: Réamorçage
    it: Ripristino
    de: Umkehrappell
    es: Quitaestado
    ko: 플랫콜
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンの\nのうりょく　へんかが　もとにもどる。"
    jp_kanji: "使うと　味方の　ポケモンの\n能力変化が　元に　戻る。"
    en: "When used, it restores any stat\nchanges of an ally Pokémon."
    fr: "Permet d’annuler les variations de stats d’un\nPokémon de l’équipe."
    it: "Usandolo, tutte le modifiche alle statistiche\ndi un Pokémon della squadra saranno annullate."
    de: "Hebt bei Gebrauch Statusveränderungen\ndeines Mitstreiters auf."
    es: "Cuando se usa, se anulan los cambios en las\ncaracterísticas de un Pokémon de tu equipo."
    ko: "사용하면 같은 편 포켓몬의\n능력 변화가 원래대로 되돌아간다."
resist_feather:
  names:
    jp_kana: ていこうのハネ
    jp_kanji: ていこうのハネ
    en: Resist Wing
    fr: Aile Armure
    it: Piumtutela
    de: Abwehrfeder
    es: Pluma Aguante
    ko: 저항력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　防御の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon.\nIt slightly increases the base Defense\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Défense de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Difesa."
    de: "Schenkt man einem Pokémon dieses Item, wird\ndessen Verteidigungs-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco la Defensa de base\nde un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 방어\n기초 포인트를 조금 올린다."
reveal_glass:
  names:
    jp_kana: うつしかがみ
    jp_kanji: うつしかがみ
    en: Reveal Glass
    fr: Miroir Sacré
    it: Verispecchio
    de: Wahrspiegel
    es: Espejo Veraz
    ko: 비추는거울
  descriptions:
    jp_kana: "しんじつを　うつしだすことで\nポケモンを　ほんらいの　すがたに\nかえてしまう　ふしぎな　かがみ。"
    jp_kanji: "真実を　映しだすことで\nポケモンを　本来の　姿に\n変えてしまう　不思議な　鏡。"
    en: "A looking glass that reveals the truth.\nIt’s a mysterious glass that returns\na Pokémon to its original shape."
    fr: "Un mystérieux miroir qui, en reflétant la vérité,\npermet de redonner à un Pokémon sa forme\noriginelle."
    it: "Specchio misterioso che, riflettendo la verità,\nfa riacquistare ai Pokémon la loro forma originaria."
    de: "Ein mysteriöser Spiegel, der Pokémon in\nihre eigentliche Form verwandelt, indem er\ndie Wahrheit widerspiegelt."
    es: "Espejo misterioso que refleja la verdad y\ndevuelve los Pokémon a su forma original."
    ko: "진실을 비춰줌으로\n포켓몬을 본래의 모습으로\n바꿔버리는 이상한 거울."
revival_herb:
  names:
    jp_kana: ふっかつそう
    jp_kanji: ふっかつそう
    en: Revival Herb
    fr: Herbe Rappel
    it: Vitalerba
    de: Vitalkraut
    es: Hierba Revivir
    ko: 부활초
  descriptions:
    jp_kana: "とても　にがい　やくそう。\nひんしの　ポケモン　１ひきの\nＨＰを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　薬草。\nひんしの　ポケモン　１匹の\nＨＰを　すべて　回復する。"
    en: "A terribly bitter medicinal herb.\nIt revives a fainted Pokémon and\nfully restores its maximum HP."
    fr: "Une herbe médicinale très amère.\nRanime un Pokémon K.O. et restaure tous\nses PV."
    it: "Erba medicinale amarissima.\nRianima un Pokémon esausto e gli restituisce\ntutti i PS."
    de: "Ein bitteres medizinisches Kraut, das\nkampfunfähige Pokémon belebt und die KP\nvollständig auffüllt."
    es: "Hierba muy amarga que reanima a un Pokémon\ndebilitado y restaura todos sus PS."
    ko: "매우 쓴 약초.\n기절한 포켓몬 1마리의\nHP를 모두 회복한다."
revive:
  names:
    jp_kana: げんきのかけら
    jp_kanji: げんきのかけら
    en: Revive
    fr: Rappel
    it: Revitalizzante
    de: Beleber
    es: Revivir
    ko: 기력의조각
  descriptions:
    jp_kana: "ひんしに　なった　ポケモン\n１ひきを　げんきに　したうえで\nＨＰを　はんぶんまで　かいふくする。"
    jp_kanji: "ひんしに　なってしまった　ポケモン\n１匹を　元気に　したうえで\nＨＰを　半分まで　回復する。"
    en: "A medicine that can revive fainted\nPokémon. It also restores half of\na fainted Pokémon’s maximum HP."
    fr: "Un médicament qui ranime un Pokémon K.O.\net restaure la moitié de ses PV max."
    it: "Rimedio che rianima un Pokémon esausto\ne gli restituisce metà dei suoi PS massimi."
    de: "Eine Medizin, die ein kampfunfähiges Pokémon\nwiederbelebt. Die Hälfte der maximalen KP wird\nwiederhergestellt."
    es: "Medicina que revive a un Pokémon debilitado y le\ndevuelve la mitad de sus PS."
    ko: "기절해 버린 포켓몬\n1마리를 건강하게 하고\nHP를 절반까지 회복한다."
rich_mulch:
  names:
    jp_kana: たわわこやし
    jp_kanji: たわわこやし
    en: Rich Mulch
    fr: Fertibondance
    it: Fertilflorido
    de: Sprießmulch
    es: Abono Fértil
    ko: 주렁주렁비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
rindo_berry:
  names:
    jp_kana: リンドのみ
    jp_kanji: リンドのみ
    en: Rindo Berry
    fr: Baie Ratam
    it: Baccarindo
    de: Grindobeere
    es: Baya Tamar
    ko: 린드열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　くさ　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　くさ技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Grass-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Plante."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Erba del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Pflanze."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Planta de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 풀 기술을\n당했을 때 위력이 약해진다."
ring_target:
  names:
    jp_kana: ねらいのまと
    jp_kanji: ねらいのまと
    en: Ring Target
    fr: Point de Mire
    it: Facilsaglio
    de: Zielscheibe
    es: Blanco
    ko: 겨냥표적
  descriptions:
    jp_kana: "ポケモンの　タイプの　あいしょうで\nむこう　だった　わざが\nあたるように　なってしまう。"
    jp_kanji: "ポケモンの　タイプの　相性で\n無効だった　技が\n当たるように　なってしまう。"
    en: "An item to be held by a Pokémon.\nMoves that normally have no effect\nwill land on a Pokémon holding it."
    fr: "Un Pokémon tenant cet objet devient sensible\naux capacités autrement inefficaces en raison de\nson type."
    it: "Se un Pokémon ha questo strumento, le mosse\nche di norma non hanno effetto contro il suo tipo\nvanno a segno."
    de: "Attacken, die aufgrund der Wechselwirkungen\nzwischen den Typen keine Wirkung haben,\ntreffen den Träger."
    es: "El Pokémon que lo lleva es vulnerable frente a\nmovimientos que normalmente no afectan a su\ntipo."
    ko: "포켓몬 타입의 상성 때문에\n무효였던 기술이\n맞게 되어 버린다."
rock_gem:
  names:
    jp_kana: いわのジュエル
    jp_kanji: いわのジュエル
    en: Rock Gem
    fr: Joyau Roche
    it: Bijouroccia
    de: Gesteinjuwel
    es: Gema Roca
    ko: 바위주얼
  descriptions:
    jp_kana: "いわの　タイプの　ジュエル。\nもたせると　いちどだけ　いわの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　ジュエル。\n持たせると　１度だけ　いわの\n技の　威力が　強まる。"
    en: "A gem with an essence of rock.\nWhen held, it strengthens the power\nof a Rock-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Roccia."
    de: "Ein Juwel vom Typ Gestein. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Gestein."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Roca. Debe llevarla\nun Pokémon."
    ko: "바위타입의 주얼.\n지니게 하면 한 번만 바위\n기술의 위력이 강해진다."
rock_incense:
  names:
    jp_kana: がんせきおこう
    jp_kanji: がんせきおこう
    en: Rock Incense
    fr: Encens Roc
    it: Roccioaroma
    de: Steinrauch
    es: Incienso Roca
    ko: 암석향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts\nthe power of Rock-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de\ntype Roche."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Roccia."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Gestein."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Roca. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
rocky_helmet:
  names:
    jp_kana: ゴツゴツメット
    jp_kanji: ゴツゴツメット
    en: Rocky Helmet
    fr: Casque Brut
    it: Bitorzolelmo
    de: Beulenhelm
    es: Casco Dentado
    ko: 울퉁불퉁멧
  descriptions:
    jp_kana: "ポケモンに　もたせると\nだげきわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n打撃技を　受けたとき\n相手にも　ダメージを　与える。"
    en: "An item to be held by a Pokémon.\nIf the holder is hit, the attacker will\nalso be damaged upon contact."
    fr: "Tenu, cet objet inflige des dégâts à l’attaquant\nsi ce dernier utilise une attaque physique qui\natteint son but."
    it: "Se il Pokémon che ha questo strumento è colpito\nda una mossa fisica, anche il nemico subisce\ndei danni."
    de: "Wird der Träger von einer physischen\nAttacke getroffen, erleidet der Angreifer\nebenfalls Schaden."
    es: "Si el portador es alcanzado por un ataque físico,\nel agresor también recibe daño."
    ko: "포켓몬에게 지니게 하면\n타격 기술을 당했을 때\n상대에게도 데미지를 준다."
roller_skates:
  names:
    jp_kana: ローラースケート
    jp_kanji: ローラースケート
    en: Roller Skates
    fr: Rollers
    it: Pattini
    de: Rollerskates
    es: Patines
    ko: 롤러스케이트
  descriptions:
    jp_kana: "クツぞこに　ローラーが　ついている。\nじめんを　かっそう　したり\nトリックプレイを　きめたりできる。"
    jp_kanji: "クツ底に　ローラーが　ついている。\n地面を　滑走　したり\nトリックプレイを　決めたりできる。"
    en: "Attaches roller skates to the bottom\nof your shoes, allowing you to glide\nquickly around and perform tricks."
    fr: "Aussi connus sous le nom de patins à roulettes,\nils permettent de se déplacer rapidement\net éventuellement de réaliser des figures."
    it: "Pattini applicati alla suola delle scarpe.\nPermettono di pattinare e di eseguire figure."
    de: "Schuhe mit Rädern an der Sohle. Mit ihnen kannst\ndu über den Boden rollen und Tricks ausführen."
    es: "Ruedas que se acoplan a la suela del calzado\ny te permiten ir más rápido y realizar piruetas\nespectaculares."
    ko: "신발 바닥에 롤러가 달려 있다.\n지면을 활주하거나\n트릭플레이를 할 수 있다."
root_fossil:
  names:
    jp_kana: ねっこのカセキ
    jp_kanji: ねっこのカセキ
    en: Root Fossil
    fr: Fossile Racine
    it: Radifossile
    de: Wurzelfossil
    es: Fósil Raíz
    ko: 뿌리화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nねっこの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nねっこの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived in the sea. It looks as\nif it could be part of a plant’s root."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de racine."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una radice."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es sieht wie eine Pflanzenwurzel\naus."
    es: "Fósil de un Pokémon ancestral que vivió en el\nfondo del mar. Parece ser parte de una raíz."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n뿌리의 일부인 듯하다."
rose_incense:
  names:
    jp_kana: おはなのおこう
    jp_kanji: おはなのおこう
    en: Rose Incense
    fr: Encens Fleur
    it: Rosaroma
    de: Rosenrauch
    es: Incienso Floral
    ko: 꽃향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　くさタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　くさタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts\nthe power of Grass-type moves."
    fr: "Objet à tenir. Un encens au parfum exotique\naugmentant la puissance des capacités de\ntype Plante."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che potenzia\nle mosse di tipo Erba."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nverstärkt Attacken vom Typ Pflanze."
    es: "Incienso de exótico aroma que fortalece los\nmovimientos de tipo Planta. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 풀타입\n기술의 위력이 올라간다."
roseli_berry:
  names:
    jp_kana: ロゼルのみ
    jp_kanji: ロゼルのみ
    en: Roseli Berry
    fr: Baie Selro
    it: Baccarcadè
    de: Hibisbeere
    es: Baya Hibis
    ko: 로셀열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　フェアリー　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　フェアリー技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Fairy-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Fée."
    it: "Se data a un Pokémon, indebolisce l’attacco\nsuperefficace di tipo Folletto del nemico."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Feen-Attacken von Angreifern."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Hada de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 페어리 기술을\n당했을 때 위력이 약해진다."
rowap_berry:
  names:
    jp_kana: レンブのみ
    jp_kanji: レンブのみ
    en: Rowap Berry
    fr: Baie Pommo
    it: Baccaroam
    de: Roselbeere
    es: Baya Magua
    ko: 애터열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nとくしゅわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "A Berry to be consumed by Pokémon.\nIf a special attack hits the Pokémon\nholding it, the attacker will also be hurt."
    fr: "Tenue, cette Baie inflige des dégâts à\nl’attaquant s’il utilise une attaque spéciale\nqui atteint son but."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa speciale va a segno."
    de: "Als getragenes Item bewirkt diese Beere\nSchaden bei jenen, die den Träger mit einer\nSpezial-Attacke treffen."
    es: "Si la lleva un Pokémon cuando otro lanza un\nataque especial, este último también recibe daño."
    ko: "포켓몬에게 지니게 하면\n특수 기술을 당했을 때\n상대에게도 데미지를 준다."
rsvp_mail:
  names:
    jp_kana: おさそいメール
    jp_kanji: おさそいメール
    en: RSVP Mail
    fr: Lettre Invit
    it: Messaggio Invito
    de: Einladebrief
    es: Carta Invitar
    ko: 권유메일
  descriptions:
    jp_kana: "あいてを　おさそいする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手を　お誘いする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to\nextend an invitation to the recipient.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour les invitations.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un invito.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man eine andere Person zu\netwas einladen kann. Gib es einem Pokémon zum\nTragen."
    es: "Carta para invitar a un compañero. Haz que la\nentregue un Pokémon."
    ko: "상대를 초대하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
rule_book:
  names:
    jp_kana: ルールブック
    jp_kanji: ルールブック
    en: Rule Book
    fr: Livre Règles
    it: Libro Regole
    de: Regelbuch
    es: Reglamento
    ko: 룰북
  descriptions:
    jp_kana: "たいせんの　ルールが　かかれている。\nつうしんたいせん　するとき\nルールを　えらぶことが　できる。"
    jp_kanji: "対戦の　ルールが　かかれている。\n通信対戦するとき\nルールを　選ぶことが　できる。"
    en: "It lists the rules for holding battles.\nFor Link Battles, you may choose\nwhich set of rules you wish to use."
    fr: "La liste des règles de combat.\nVous pouvez choisir les règles des combats\nen Link."
    it: "Elenca le regole per le lotte. Nelle lotte in link\npuoi scegliere diversi set di regole da utilizzare."
    de: "Enthält die Kampfregeln. Bei Link-Kämpfen kannst\ndu daraus die gewünschten Regeln wählen."
    es: "Recoge las normas de los combates. En los\ncombates en conexión puedes elegir el conjunto\nde reglas que quieres usar."
    ko: "대전에 대한 룰이 적혀 있다.\n통신대전을 할 때\n룰을 선택할 수 있다."
sablenite:
  names:
    jp_kana: ヤミラミナイト
    jp_kanji: ヤミラミナイト
    en: Sablenite
    fr: Ténéfixite
    it: Sableyite
    de: Zobirisnit
    es: Sableynita
    ko: 깜까미나이트
  descriptions:
    jp_kana: "ヤミラミに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヤミラミに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sableye hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ténéfix, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sableye, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Zobiris getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sableye en combate."
    ko: "깜까미에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
sachet:
  names:
    jp_kana: においぶくろ
    jp_kanji: においぶくろ
    en: Sachet
    fr: Sachet Senteur
    it: Bustina aromi
    de: Duftbeutel
    es: Saquito Fragante
    ko: 향기주머니
  descriptions:
    jp_kana: "ちょっと　きつめの　かおりをだす\nこうりょうを　つめた　ふくろ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "ちょっと　きつめの　香りをだす\n香料を　詰めた　袋。\nある　ポケモンが　好んでいる。"
    en: "A sachet filled with fragrant perfumes\nthat are just slightly too overwhelming.\nYet it’s loved by a certain Pokémon."
    fr: "Un sachet d’herbes et d’épices, au parfum trop\nmarqué pour beaucoup, mais néanmoins apprécié\nd’un certain Pokémon."
    it: "Una bustina che contiene aromi dal profumo\npiuttosto intenso.\nPiace a un Pokémon in particolare."
    de: "Ein mit Parfüm gefüllter Beutel, der einen\npenetranten Duft verströmt und bei einer\nbestimmten Pokémon-Art sehr beliebt ist."
    es: "Un saquito lleno de sustancias aromáticas cuyo\nperfume resulta abrumador, pero que a ciertos\nPokémon les encanta."
    ko: "살짝 강렬한 향기가 나는\n향료를 채운 주머니.\n어떤 포켓몬이 좋아하는 물건이다."
sacred_ash:
  names:
    jp_kana: せいなるはい
    jp_kanji: せいなるはい
    en: Sacred Ash
    fr: Cendre Sacrée
    it: Ceneremagica
    de: Zauberasche
    es: Ceniza Sagrada
    ko: 성스러운분말
  descriptions:
    jp_kana: "ひんしに　なってしまった\nポケモン　ぜんいんの　ＨＰを\nすべて　かいふくする。"
    jp_kanji: "ひんしに　なってしまった\nポケモン　全員の　ＨＰを\nすべて　回復する。"
    en: "This rare ash can revive all fainted\nPokémon in a party. In doing so, it\nalso fully restores their maximum HP."
    fr: "Ranime tous les Pokémon K.O. et restaure tous\nleurs PV."
    it: "Rianima tutti i Pokémon esausti, restituendo loro\nanche tutti i PS."
    de: "Belebt und erfrischt alle besiegten Pokémon\nund füllt deren KP wieder vollständig auf."
    es: "Reanima completamente a todos los Pokémon\ndebilitados y restaura todos sus PS."
    ko: "기절해 버린\n포켓몬 전원의 HP를\n모두 회복한다."
safari_ball:
  names:
    jp_kana: サファリボール
    jp_kanji: サファリボール
    en: Safari Ball
    fr: Safari Ball
    it: Safari Ball
    de: Safariball
    es: Safari Ball
    ko: 사파리볼
  descriptions:
    jp_kana: "だいしつげんの　なか　だけで\nつかう　とくべつな　ボール。\nめいさいがらに　なっている。"
    jp_kanji: "大湿原の　中だけで\n使う　特別な　ボール。\n迷彩柄に　なっている。"
    en: "A special Poké Ball that is used only in\nthe Great Marsh. It is recognizable by\nthe camouflage pattern decorating it."
    fr: "Une Poké Ball spéciale dont l’usage est réservé\nau Parc Safari. Elle est décorée d’un motif\ncamouflage."
    it: "Poké Ball speciale, usata soltanto nella\nGran Palude. È decorata con un motivo mimetico."
    de: "Ein Ball, der nur in Safari-Zonen eingesetzt wird.\nEr besticht durch sein Tarnfarbenmuster."
    es: "Poké Ball con un diseño de camuflaje que se\nutiliza únicamente en el Gran Pantano."
    ko: "대습초원 안에서만\n쓰는 특별한 볼.\n얼룩무늬로 되어 있다."
safety_goggles:
  names:
    jp_kana: ぼうじんゴーグル
    jp_kanji: ぼうじんゴーグル
    en: Safety Goggles
    fr: Lunettes Filtre
    it: Visierantisabbia
    de: Schutzbrille
    es: Gafa Protectora
    ko: 방진고글
  descriptions:
    jp_kana: "てんこうの　ダメージだけでなく\nこなを　だす　わざの\nこうかも　ふせげる　ゴーグル。"
    jp_kanji: "天候の　ダメージだけでなく\n粉を　だす　技の\n効果も　防げる　ゴーグル。"
    en: "An item to be held by a Pokémon.\nThese goggles protect the holder from\nboth weather-related damage and powder."
    fr: "Objet à tenir. Protège le Pokémon contre les\ndégâts dus à la météo et la plupart des\ncapacités utilisant de la poudre."
    it: "Visiera che protegge dai danni legati alle\ncondizioni atmosferiche e dalla maggior parte\ndelle mosse che rilasciano polvere."
    de: "Diese Brille schützt ihren Träger nicht nur vor\nwetterbedingtem Schaden, sondern auch vor\nvielen Attacken, bei denen Puder eingesetzt wird."
    es: "Gafa que protege de los efectos adversos del\nclima y del polvo lanzado por los rivales."
    ko: "날씨로 인한 데미지뿐만 아니라\n가루를 내보내는 기술의\n효과도 막을 수 있는 고글."
sail_fossil:
  names:
    jp_kana: ヒレのカセキ
    jp_kanji: ヒレのカセキ
    en: Sail Fossil
    fr: Fossile Nageoire
    it: Fossilpinna
    de: Flossenfossil
    es: Fósil Aleta
    ko: 지느러미화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nくびの　ヒレの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n首の　ヒレの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived on the land. It looks\nlike the impression from a skin sail."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un fragment de nageoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una pinna."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie eine Flosse aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece la impresión de una aleta."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n목지느러미의 일부인 듯하다."
salac_berry:
  names:
    jp_kana: カムラのみ
    jp_kanji: カムラのみ
    en: Salac Berry
    fr: Baie Sailak
    it: Baccasalak
    de: Salkabeere
    es: Baya Aslac
    ko: 캄라열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nすばやさが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n素早さが　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its Speed\nstat will increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente la Vitesse en cas\nde besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Velocità aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nInitiative-Wert eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, le sube la Velocidad en\nun momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n스피드가 올라간다."
salamencite:
  names:
    jp_kana: ボーマンダナイト
    jp_kanji: ボーマンダナイト
    en: Salamencite
    fr: Drattakite
    it: Salamencite
    de: Brutalandanit
    es: Salamencita
    ko: 보만다나이트
  descriptions:
    jp_kana: "ボーマンダに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ボーマンダに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Salamence hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Drattak, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Salamence, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Brutalanda getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Salamence en combate."
    ko: "보만다에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
scanner:
  names:
    jp_kana: たんちき
    jp_kanji: たんちき
    en: Scanner
    fr: Scanner
    it: Scanner
    de: Scanner
    es: Escáner
    ko: 탐지기
  descriptions:
    jp_kana: "シーキンセツの　なかで\nみつけた　どうぐ。"
    jp_kanji: "シーキンセツの　中で\n見つけた　道具。"
    en: A device found inside Sea Mauville.
    fr: Un objet trouvé à Lavandia Sea.
    it: "Dispositivo trovato nella scogliera artificiale\nCiclamare."
    de: "Ein Gerät, das du in Seewoge Malvenfroh\ngefunden hast."
    es: Objeto hallado en el interior de Malvamar.
    ko: "씨보라 안에서\n발견한 도구."
sceptilite:
  names:
    jp_kana: ジュカインナイト
    jp_kanji: ジュカインナイト
    en: Sceptilite
    fr: Jungkite
    it: Sceptilite
    de: Gewaldronit
    es: Sceptilita
    ko: 나무킹나이트
  descriptions:
    jp_kana: "ジュカインに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ジュカインに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sceptile hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Jungko, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sceptile, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Gewaldro getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sceptile en combate."
    ko: "나무킹에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
scizorite:
  names:
    jp_kana: ハッサムナイト
    jp_kanji: ハッサムナイト
    en: Scizorite
    fr: Cizayoxite
    it: Scizorite
    de: Scheroxnit
    es: Scizorita
    ko: 핫삼나이트
  descriptions:
    jp_kana: "ハッサムに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ハッサムに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Scizor hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Cizayox, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Scizor, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Scherox getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Scizor en combate."
    ko: "핫삼에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
scope_lens:
  names:
    jp_kana: ピントレンズ
    jp_kanji: ピントレンズ
    en: Scope Lens
    fr: Lentilscope
    it: Mirino
    de: Scope-Linse
    es: Periscopio
    ko: 초점렌즈
  descriptions:
    jp_kana: "じゃくてんが　みえる　レンズ。\nもたせた　ポケモンの　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "弱点が　みえる　レンズ。\n持たせた　ポケモンの　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by a Pokémon.\nIt’s a lens for scoping out weak points.\nIt boosts the holder’s critical-hit ratio."
    fr: "Objet à tenir. Une lentille qui augmente le taux\nde critiques du porteur."
    it: "Strumento da dare a un Pokémon.\nLente che aumenta la probabilità di sferrare\nbrutti colpi."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es erhöht die\nVolltrefferquote."
    es: "Su lente aumenta la probabilidad que tiene el\nPokémon que lo lleva de conseguir un golpe\ncrítico."
    ko: "약점이 보이는 렌즈.\n지니게 한 포켓몬의 기술이\n급소에 맞기 쉬워진다."
sea_incense:
  names:
    jp_kana: うしおのおこう
    jp_kanji: うしおのおこう
    en: Sea Incense
    fr: Encens Mer
    it: Marearoma
    de: Seerauch
    es: Incienso Marino
    ko: 바닷물향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis incense has a curious aroma that\nboosts the power of Water-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux\naugmentant la puissance des capacités de\ntype Eau."
    it: "Strumento da dare a un Pokémon.\nIncenso dal curioso aroma che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Sein ausgefallenes Aroma\nverstärkt Attacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia los\nmovimientos de tipo Agua. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
secret_key:rotoms_room:
  names:
    jp_kana: ひみつのカギ
    jp_kanji: ひみつのカギ
    en: Secret Key
    fr: Clé Secrète
    it: Chiave Segreta
    de: ?-Öffner
    es: Llave Secreta
    ko: 비밀의열쇠
  descriptions:
    jp_kana: "きまった　ばしょで　つかうことで\nとくしゅな　でんきしんごうを　だして\nとびらを　あける　ハイテクな　カギ。"
    jp_kanji: "決まった　場所で　使うことで\n特殊な　電気信号を　だして\n扉を　開ける　ハイテクな　カギ。"
    en: "A high-tech key that has to be used at\na specific location. It emits a special\nelectronic signal to open a door."
    fr: "Une clé destinée à une serrure très complexe.\nOuvre une porte en transmettant un signal\nélectrique."
    it: "Una sofisticata chiave da usare in un determinato\nluogo. Emette un impulso elettrico speciale che\napre una porta."
    de: "Ein besonderer Schlüssel, der an einem speziellen\nOrt Türen durch ein elektrisches Signal öffnet."
    es: "Una llave de alta tecnología que debe usarse en\nun lugar concreto. Emite una señal eléctrica que\nabre una puerta."
    ko: "정해진 장소에서 쓰는 것으로\n특수한 전기 신호를 내어\n문을 여는 첨단기술의 열쇠."
secret_medicine:
  names:
    jp_kana: ひでんのくすり
    jp_kanji: ひでんのくすり
    en: Secret Potion
    fr: Potion Secrète
    it: Pozione Segreta
    de: Geheimtrank
    es: Poción Secreta
    ko: 비전신약
  descriptions:
    jp_kana: "タンバシティの　くすりやで　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    jp_kanji: "タンバシティの　薬屋で　もらった\nどんな　ポケモンでも　たちまち\nげんきになる　すごい　くすり。"
    en: "A fantastic medicine dispensed by the\npharmacy in Cianwood City. It fully\nheals a Pokémon of any ailment."
    fr: "Un médicament génial vendu à la pharmacie\nd’Irisia. Soigne totalement un Pokémon de tout\nproblème de statut."
    it: "Rimedio fantastico distribuito dalla farmacia\na Fiorlisopoli. Cura i problemi di stato\ndi qualunque Pokémon."
    de: "Eine fantastische Medizin aus Anemonia City.\nHeilt und kuriert ein Pokémon vollständig."
    es: "Fantástico medicamento vendido en la farmacia\nde Ciudad Orquídea. Cura completamente a un\nPokémon."
    ko: "진청시티의 약국에서 받은\n어떤 포켓몬이라도 금방\n건강해지는 대단한 약."
shalour_sable:
  names:
    jp_kana: シャラサブレ
    jp_kanji: シャラサブレ
    en: Shalour Sable
    fr: Sablé Yantreizh
    it: Yantafrollino
    de: Yantara-Sablé
    es: Galleta Yantra
    ko: 사라사블레
  descriptions:
    jp_kana: "シャラシティ　めいぶつの　サブレ。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "シャラシティ　名物の　サブレ。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Shalour City’s famous shortbread.\nIt can be used once to heal all the\nstatus conditions of a Pokémon."
    fr: "La spécialité de Yantreizh.\nElle soigne tous les problèmes de statut\nd’un Pokémon."
    it: "Il famoso Yantafrollino di Yantaropoli.\nCura tutti i problemi di stato di un Pokémon."
    de: "Dieser Butterkeks ist eine Spezialität aus\nYantara City. Er behebt alle Statusprobleme\neines Pokémon."
    es: "Especialidad de Ciudad Yantra. Cura los\nproblemas de estado de un Pokémon."
    ko: "사라시티의 명물 사블레.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
sharp_beak:
  names:
    jp_kana: するどいくちばし
    jp_kanji: するどいくちばし
    en: Sharp Beak
    fr: Bec Pointu
    it: Beccaffilato
    de: Hackattack
    es: Pico Afilado
    ko: 예리한부리
  descriptions:
    jp_kana: "ながく　とがった　くちばし。\nもたせると　ひこうタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "長く　とがった　くちばし。\n持たせると　ひこうタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt’s a long, sharp beak that boosts\nthe power of Flying-type moves."
    fr: "Objet à tenir. Un bec long et pointu qui augmente\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nBecco lungo e affilato che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Ein langer, scharfer\nSchnabel verstärkt Attacken vom Typ Flug."
    es: "Pico largo y afilado que aumenta la potencia de\nlos movimientos de tipo Volador. Debe llevarlo un\nPokémon."
    ko: "길고 뾰족한 부리.\n지니게 하면 비행타입\n기술의 위력이 올라간다."
sharpedonite:
  names:
    jp_kana: サメハダナイト
    jp_kanji: サメハダナイト
    en: Sharpedonite
    fr: Sharpedite
    it: Sharpedite
    de: Tohaidonit
    es: Sharpedonita
    ko: 샤크니아나이트
  descriptions:
    jp_kana: "サメハダーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "サメハダーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Sharpedo hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Sharpedo, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Sharpedo, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Tohaido getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Sharpedo en combate."
    ko: "샤크니아에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
shed_shell:
  names:
    jp_kana: きれいなぬけがら
    jp_kanji: きれいなぬけがら
    en: Shed Shell
    fr: Carapace Mue
    it: Disfoguscio
    de: Wechselhülle
    es: Muda Concha
    ko: 아름다운허물
  descriptions:
    jp_kana: "じょうぶで　かたい　ぬけがら。\nもたせた　ポケモンは　ひかえの\nポケモンと　かならず　いれかわれる。"
    jp_kanji: "丈夫で　硬い　ぬけがら。\n持たせた　ポケモンは　控えの\nポケモンと　必ず　いれかわれる。"
    en: "An item to be held by a Pokémon.\nThis discarded carapace enables the\nholder to switch out of battle without fail."
    fr: "Objet à tenir. Une carapace dure qui permet au\nporteur de se retirer même s’il est affecté par\nune attaque immobilisante."
    it: "Un Pokémon con questo robusto guscio può\nsfuggire al nemico anche se questi ha usato\nmosse o abilità intrappolanti."
    de: "Ein Item zum Tragen. Dieser harte Panzer\nermöglicht den Austausch des Trägers gegen\nein wartendes Pokémon."
    es: "En combate, esta concha desechada sirve para\nque un Pokémon se cambie por otro que no esté\ncombatiendo."
    ko: "튼튼하고 단단한 허물.\n지니게 한 포켓몬은 교대\n포켓몬과 반드시 교체할 수 있다."
shell_bell:
  names:
    jp_kana: かいがらのすず
    jp_kanji: かいがらのすず
    en: Shell Bell
    fr: Grelot Coque
    it: Conchinella
    de: Seegesang
    es: Campana Concha
    ko: 조개껍질방울
  descriptions:
    jp_kana: "もたせた　ポケモンが　こうげきして\nあいてに　ダメージを　あたえたとき\nＨＰを　すこし　かいふく　できる。"
    jp_kanji: "持たせた　ポケモンが　攻撃して\n相手に　ダメージを　あたえたとき\nＨＰを　少し　回復できる。"
    en: "An item to be held by a Pokémon.\nThe holder regains a little HP every\ntime it inflicts damage on others."
    fr: "Objet à tenir. Restaure un peu les PV du porteur\nà chaque fois qu’il inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha recupera un po’ di PS ogni volta\nche infligge danni."
    de: "Ein Item zum Tragen. Es stellt einige KP des\nTrägers immer dann wieder her, wenn dieser\ndem Ziel Schaden zufügt."
    es: "Debe llevarla un Pokémon. Cada vez que este\ninflige daño, recupera algunos PS."
    ko: "지니게 한 포켓몬이 공격하여\n상대에게 데미지를 줬을 때\nHP를 조금 회복할 수 있다."
shiny_charm:
  names:
    jp_kana: ひかるおまもり
    jp_kanji: ひかるおまもり
    en: Shiny Charm
    fr: Charme Chroma
    it: Cromamuleto
    de: Schillerpin
    es: Amuleto Iris
    ko: 빛나는부적
  descriptions:
    jp_kana: "もっていると　ひかる　ポケモンと\nであいやすくなる　といわれる\nふしぎで　ひかりかがやく　おまもり。"
    jp_kanji: "持っていると　ひかる　ポケモンと\n出会いやすくなる　といわれる\n不思議で　ひかりかがやく　おまもり。"
    en: "A shiny charm said to increase\nthe chance of finding a Shiny\nPokémon in the wild."
    fr: "Un mystérieux charme scintillant qui facilite\nla rencontre avec les Pokémon chromatiques."
    it: "Misterioso amuleto luminoso che aumenta\nla probabilità di incontrare Pokémon cromatici."
    de: "Ein mysteriöser, schillernder Glücksbringer,\nder die Wahrscheinlichkeit erhöht,\nSchillernde Pokémon zu finden."
    es: "Misterioso amuleto brillante que aumenta la\nprobabilidad de encontrar Pokémon variocolores."
    ko: "지니고 있으면 빛나는 포켓몬과\n만나기 쉬워진다고 전해지는\n이상하고 매우 반짝이는 부적."
shiny_stone:
  names:
    jp_kana: ひかりのいし
    jp_kanji: ひかりのいし
    en: Shiny Stone
    fr: Pierre Éclat
    it: Pietrabrillo
    de: Leuchtstein
    es: Piedra Día
    ko: 빛의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひかりのように　まぶしい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひかりのように　まぶしい。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt shines with a dazzling light."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle brille d’une lumière\naveuglante."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Brilla di una luce abbagliante."
    de: "Dieser besondere, hell leuchtende Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a\nalgunos Pokémon. Tiene un brillo espectacular."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n빛처럼 눈부시다."
shoal_salt:
  names:
    jp_kana: あさせのしお
    jp_kanji: あさせのしお
    en: Shoal Salt
    fr: Sel Tréfonds
    it: Sale Ondoso
    de: Küstensalz
    es: Sal Cardumen
    ko: 여울소금
  descriptions:
    jp_kana: "あさせのほらあなで\nみつけた　しお。"
    jp_kanji: "浅瀬の洞穴という　場所で\nみつけた　塩。"
    en: Salt that you found inside Shoal Cave.
    fr: Du sel provenant de la Grotte Tréfonds.
    it: Sale rinvenuto nella Grotta Ondosa.
    de: "Reine Salzkristalle, die du in\nder Küstenhöhle gefunden hast."
    es: "Una sal muy fina que se encuentra en la Cueva\nCardumen."
    ko: "여울의 동굴에서\n발견한 소금."
shoal_shell:
  names:
    jp_kana: あさせのかいがら
    jp_kanji: あさせのかいがら
    en: Shoal Shell
    fr: CoquilleTréfonds
    it: Gusciondoso
    de: Küstenschale
    es: Concha Cardumen
    ko: 여울조개껍질
  descriptions:
    jp_kana: "あさせのほらあなで\nみつけた　かいがら。"
    jp_kanji: "浅瀬の洞穴という　場所で\nみつけた　貝殻。"
    en: A seashell that you found inside Shoal Cave.
    fr: Un coquillage provenant de la Grotte Tréfonds.
    it: Guscio rinvenuto nella Grotta Ondosa.
    de: "Eine hübsche Muschelschale, die du in\nder Küstenhöhle gefunden hast."
    es: Concha que se encuentra en la Cueva Cardumen.
    ko: "여울의 동굴에서\n발견한 조개껍질."
shock_drive:
  names:
    jp_kana: イナズマカセット
    jp_kanji: イナズマカセット
    en: Shock Drive
    fr: Module Choc
    it: Voltmodulo
    de: Blitzmodul
    es: FulgoROM
    ko: 번개카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nでんきタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nでんきタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Genesect’s Techno Blast\nmove so it becomes Electric type."
    fr: "Tenu par Genesect, ce module change la\ncapacité TechnoBuster en une capacité de type\nÉlectrik."
    it: "Modulo da dare a Genesect. Trasforma\nTecnobotto in una mossa di tipo Elettro."
    de: "Gibt man es Genesect zum Tragen, wandelt es\nden Typ der Attacke Techblaster in Elektro um."
    es: "Cartucho que convierte Tecno Shock de\nGenesect en un movimiento de tipo Eléctrico."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n전기타입으로 바뀌는 카세트."
shuca_berry:
  names:
    jp_kana: シュカのみ
    jp_kanji: シュカのみ
    en: Shuca Berry
    fr: Baie Jouca
    it: Baccanaca
    de: Schukebeere
    es: Baya Acardo
    ko: 슈캐열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　じめん　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　じめん技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Ground-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Sol."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Terra del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Boden."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Tierra de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 땅 기술을\n당했을 때 위력이 약해진다."
silk_scarf:
  names:
    jp_kana: シルクのスカーフ
    jp_kanji: シルクのスカーフ
    en: Silk Scarf
    fr: Mouchoir Soie
    it: Sciarpa Seta
    de: Seidenschal
    es: Pañuelo Seda
    ko: 실크스카프
  descriptions:
    jp_kana: "はだざわりの　よい　スカーフ。\nもたせると　ノーマルタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "はだざわりの　よい　スカーフ。\n持たせると　ノーマルタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt’s a sumptuous scarf that boosts\nthe power of Normal-type moves."
    fr: "Objet à tenir. Un mouchoir somptueux qui\naugmente la puissance des capacités de\ntype Normal."
    it: "Strumento da dare a un Pokémon.\nSciarpa raffinata che potenzia le mosse\ndi tipo Normale."
    de: "Ein Item zum Tragen. Ein kostbarer Schal,\nder Attacken vom Typ Normal verstärkt."
    es: "La delicadeza del pañuelo fortalece los\nmovimientos de tipo Normal. Debe llevarlo\nun Pokémon."
    ko: "감촉이 좋은 스카프.\n지니게 하면 노말타입\n기술의 위력이 올라간다."
silver_powder:
  names:
    jp_kana: ぎんのこな
    jp_kanji: ぎんのこな
    en: Silver Powder
    fr: Poudre Argentée
    it: Argenpolvere
    de: Silberstaub
    es: Polvo Plata
    ko: 은빛가루
  descriptions:
    jp_kana: "ぎんいろに　かがやく　こな。\nもたせると　むしタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "銀色に　輝く　粉。\n持たせると　むしタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a shiny, silver powder that will\nboost the power of Bug-type moves."
    fr: "Objet à tenir. De la poudre d’argent brillante qui\naugmente la puissance des capacités de type\nInsecte."
    it: "Strumento da dare a un Pokémon.\nPolvere argentea e brillante che potenzia\nle mosse di tipo Coleottero."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es verstärkt Attacken\nvom Typ Käfer."
    es: "Polvo de brillo argénteo que fortalece los ataques\nde tipo Bicho. Debe llevarlo un Pokémon."
    ko: "은색으로 반짝이는 가루.\n지니게 하면 벌레타입\n기술의 위력이 올라간다."
silver_wing:
  names:
    jp_kana: ぎんいろのはね
    jp_kanji: ぎんいろのはね
    en: Silver Wing
    fr: Argent’Aile
    it: Aladargento
    de: Silberflügel
    es: Ala Plateada
    ko: 은빛날개
  descriptions:
    jp_kana: "ぎんいろに　ひかり　かがやく\nふしぎな　はね。"
    jp_kanji: "ぎんいろに　ひかり　かがやく\n不思議な　はね。"
    en: "A strange, silvery feather\nthat sparkles."
    fr: "Une étrange plume qui brille d’un éclat\nargenté."
    it: Misteriosa piuma che brilla di luce argentea.
    de: "Eine silberne Feder, die von einem\nseltsamen Leuchten erfüllt ist."
    es: Misteriosa ala de un brillante color plateado.
    ko: "은빛으로 빛나는\n신비한 날개."
sitrus_berry:
  names:
    jp_kana: オボンのみ
    jp_kanji: オボンのみ
    en: Sitrus Berry
    fr: Baie Sitrus
    it: Baccacedro
    de: Tsitrubeere
    es: Baya Zidra
    ko: 자뭉열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＨＰを　すこしだけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＨＰを　少しだけ　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can restore its\nown HP by a small amount during battle."
    fr: "Une Baie qui restaure quelques PV lorsqu’elle est\ntenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, recupera\nun po’ di PS."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt diese seine KP ein wenig auf."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar algunos PS."
    ko: "포켓몬에게 지니게 하면\nHP를 조금 회복한다."
skull_fossil:
  names:
    jp_kana: ずがいのカセキ
    jp_kanji: ずがいのカセキ
    en: Skull Fossil
    fr: Fossile Crâne
    it: Fossilcranio
    de: Kopffossil
    es: Fósil Cráneo
    ko: 두개의화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nあたまの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n頭の　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived on the land. It appears\nas though it’s part of a head."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait une partie d’un crâne."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di un teschio."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie ein Schädel aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece ser parte de una cabeza."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n머리의 일부인 듯하다."
sky_plate:
  names:
    jp_kana: あおぞらプレート
    jp_kanji: あおぞらプレート
    en: Sky Plate
    fr: Plaque Ciel
    it: Lastracielo
    de: Wolkentafel
    es: Tabla Cielo
    ko: 푸른하늘플레이트
  descriptions:
    jp_kana: "ひこうの　タイプの　せきばん。\nもたせると　ひこうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　石盤。\n持たせると　ひこうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Flying-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Volante."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Flug."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Volador. Debe llevarla un Pokémon."
    ko: "비행타입의 석판.\n지니게 하면 비행타입\n기술의 위력이 강해진다."
slowbronite:
  names:
    jp_kana: ヤドランナイト
    jp_kanji: ヤドランナイト
    en: Slowbronite
    fr: Flagadossite
    it: Slowbroite
    de: Lahmusnit
    es: Slowbronita
    ko: 야도란나이트
  descriptions:
    jp_kana: "ヤドランに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヤドランに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Slowbro hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Flagadoss, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Slowbro, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lahmus getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Slowbro en combate."
    ko: "야도란에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
slowpoke_tail:
  names:
    jp_kana: おいしいシッポ
    jp_kanji: おいしいシッポ
    en: Slowpoke Tail
    fr: Queueramolos
    it: Codaslowpoke
    de: Flegmon-Rute
    es: Colaslowpoke
    ko: 맛있는꼬리
  descriptions:
    jp_kana: "とても　おいしい　なにかの　しっぽ。\nショップで　たかく　うれる。"
    jp_kanji: "とても　おいしい　なにかの　しっぽ。\nショップで　高く　売れる。"
    en: "A very tasty tail of something.\nIt can be sold at a high price to shops."
    fr: "Une queue d’origine inconnue tout à fait\nsavoureuse, vendue très cher."
    it: "Coda di origine sconosciuta dal sapore delizioso.\nSi vende a un prezzo piuttosto alto."
    de: "Die Rute eines unbestimmten Wesens.\nExtrem schmackhaft. Lässt sich teuer verkaufen."
    es: "Sabrosa cola de origen desconocido. Se puede\ncomprar a un precio muy elevado."
    ko: "매우 맛있는 무언가의 꼬리.\n가게에서 비싸게 팔린다."
smoke_ball:
  names:
    jp_kana: けむりだま
    jp_kanji: けむりだま
    en: Smoke Ball
    fr: Boule Fumée
    it: Palla Fumo
    de: Rauchball
    es: Bola Humo
    ko: 연막탄
  descriptions:
    jp_kana: "もたせた　ポケモンは　やせいの\nポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "持たせた　ポケモンは　野生の\nポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "An item to be held by a Pokémon.\nIt enables the holder to flee from any\nwild Pokémon encounter without fail."
    fr: "Objet à tenir. Permet au porteur de s’enfuir à\ncoup sûr face à un Pokémon sauvage."
    it: "Strumento da dare a un Pokémon.\nPermette di fuggire con successo da un\nPokémon selvatico."
    de: "Ein Pokémon kann dieses Item tragen.\nEs ermöglicht die garantierte Flucht aus\ndem Kampf mit einem wilden Pokémon."
    es: "Debe llevarla un Pokémon. Permite huir siempre\nde combates contra Pokémon salvajes."
    ko: "지니게 한 포켓몬은\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
smooth_rock:
  names:
    jp_kana: さらさらいわ
    jp_kanji: さらさらいわ
    en: Smooth Rock
    fr: Roche Lisse
    it: Roccialiscia
    de: Glattbrocken
    es: Roca Suave
    ko: 보송보송바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　すなあらしを\nつかうと　いつもより　すなあらしの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　すなあらしを\n使うと　いつもより　すなあらしの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon.\nIt extends the duration of the move\nSandstorm when used by the holder."
    fr: "Objet à tenir. Augmente la durée de la capacité\nTempête de Sable utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Terrempesta."
    de: "Ein Item zum Tragen. Verlängert die Dauer\nvon Sandsturm, wenn der Träger es einsetzt."
    es: "Prolonga la duración del movimiento Tormenta\nde Arena que use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 모래바람을\n쓰면 여느 때보다 모래바람의\n시간이 길어진다."
snowball:
  names:
    jp_kana: ゆきだま
    jp_kanji: ゆきだま
    en: Snowball
    fr: Boule de Neige
    it: Palla di neve
    de: Schneeball
    es: Bola de Nieve
    ko: 눈덩이
  descriptions:
    jp_kana: "つかいすての　ゆきだま。\nもたせて　こおりの　わざを　うけると\nこうげきが　あがる。"
    jp_kanji: "使い捨ての　ゆきだま。\n持たせて　こおりの　技を　受けると\n攻撃が　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts Attack if hit with an Ice-type\nattack. It can only be used once."
    fr: "Objet à usage unique. Tenue, elle augmente\nl’Attaque du Pokémon lorsqu’il est touché par\nune capacité de type Glace."
    it: "Palla di neve monouso.\nSe il Pokémon che ce l’ha subisce una mossa\ndi tipo Ghiaccio, il suo Attacco aumenta."
    de: "Wird der Träger von einer Eis-Attacke getroffen,\nsteigt sein Angriff und das Item verschwindet."
    es: "Objeto de un solo uso. Aumenta el Ataque del\nPokémon que lo lleva si este recibe un ataque de\ntipo Hielo."
    ko: "단 한 번 쓰면 없어지는 눈덩이.\n지니게 하고 얼음 기술을 받으면\n공격이 올라간다."
soda_pop:
  names:
    jp_kana: サイコソーダ
    jp_kanji: サイコソーダ
    en: Soda Pop
    fr: Soda Cool
    it: Gassosa
    de: Sprudel
    es: Refresco
    ko: 미네랄사이다
  descriptions:
    jp_kana: "シュワっと　はじける　ソーダ。\nポケモン　１ひきの　ＨＰを\n６０だけ　かいふくする。"
    jp_kanji: "シュワっと　はじける　ソーダ。\nポケモン　１匹の　ＨＰを\n６０だけ　回復する。"
    en: "A highly carbonated soda drink.\nWhen consumed, it restores\n60 HP to an injured Pokémon."
    fr: "Une boisson pétillante.\nRestaure 60 PV d’un Pokémon."
    it: "Bevanda frizzante.\nRestituisce 60 PS a un Pokémon."
    de: "Ein sprudelndes Mineralwasser, das die KP\neines Pokémon um 60 Punkte auffüllt."
    es: "Chispeante bebida gaseosa que restaura 60 PS\nde un Pokémon."
    ko: "싸하고 톡 쏘는 사이다.\n포켓몬 1마리의 HP를\n60만큼 회복한다."
soft_sand:
  names:
    jp_kana: やわらかいすな
    jp_kanji: やわらかいすな
    en: Soft Sand
    fr: Sable Doux
    it: Sabbia Soffice
    de: Pudersand
    es: Arena Fina
    ko: 부드러운모래
  descriptions:
    jp_kana: "さわると　サラサラする　すな。\nもたせると　じめんタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "さわると　サラサラする　砂。\n持たせると　じめんタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a loose, silky sand that boosts\nthe power of Ground-type moves."
    fr: "Objet à tenir. Du sable fin et soyeux qui\naugmente la puissance des capacités de\ntype Sol."
    it: "Strumento da dare a un Pokémon.\nSabbia leggera e farinosa che potenzia le mosse\ndi tipo Terra."
    de: "Ein Item zum Tragen. Samtiger Sand,\nder Attacken vom Typ Boden verstärkt."
    es: "Debe llevarla un Pokémon. La suavidad de la\narena fortalece los movimientos de tipo Tierra."
    ko: "만지면 보슬보슬한 모래.\n지니게 하면 땅타입\n기술의 위력이 올라간다."
soot_sack:
  names:
    jp_kana: はいぶくろ
    jp_kanji: はいぶくろ
    en: Soot Sack
    fr: Sac à Suie
    it: Sacco cenere
    de: Aschetasche
    es: Saco Hollín
    ko: 재주머니
  descriptions:
    jp_kana: "つもった　かざんばいを\nあつめるための　ふくろ。"
    jp_kanji: "つもった　かざんばいを\n集めるための　ふくろ。"
    en: A sack used to gather and hold volcanic ash.
    fr: "Un sac utilisé pour ramasser les cendres\nvolcaniques accumulées au sol."
    it: Sacco per raccogliere la cenere vulcanica.
    de: "Eine Tasche, mit der du herabgerieselte\nVulkanasche aufsammeln kannst."
    es: "Bolsa en la que recoger la ceniza de volcán\nsedimentada en el suelo."
    ko: "쌓인 화산재를\n모으기 위한 주머니."
soothe_bell:
  names:
    jp_kana: やすらぎのすず
    jp_kanji: やすらぎのすず
    en: Soothe Bell
    fr: Grelot Zen
    it: Calmanella
    de: Sanftglocke
    es: Campana Alivio
    ko: 평온의방울
  descriptions:
    jp_kana: "ここちよい　ねいろの　すず。\nもたせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    jp_kanji: "心地よい　音色の　鈴。\n持たせた　ポケモンは　こころが\nやすらぎ　なつきやすくなる。"
    en: "An item to be held by a Pokémon.\nThe comforting chime of this bell\ncalms the holder, making it friendly."
    fr: "Objet à tenir. Un grelot dont le carillon calme\nle porteur et favorise l’amitié."
    it: "Strumento da dare a un Pokémon.\nCampanella dal suono rassicurante che\ncalma chi la usa rendendolo amichevole."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es besänftigt und\nfördert Sympathie."
    es: "Una campana con un tañido calmante que\nreconforta al Pokémon que la lleva y lo vuelve\nmás amistoso."
    ko: "기분 좋은 소리의 방울.\n지니게 한 포켓몬은 마음이\n편안해져 친밀해지기 쉬워진다."
soul_dew:
  names:
    jp_kana: こころのしずく
    jp_kanji: こころのしずく
    en: Soul Dew
    fr: Rosée Âme
    it: Cuorugiada
    de: Seelentau
    es: Rocío Bondad
    ko: 마음의물방울
  descriptions:
    jp_kana: "ラティオス　または　ラティアスに\nもたせると　とくこうと　とくぼうが\nあがる　ふしぎな　たま。"
    jp_kanji: "ラティオス　または　ラティアスに\n持たせると　特攻と　特防が\nあがる　不思議な　珠。"
    en: "A wondrous orb to be held by either\nLatios or Latias. It raises both the\nSp. Atk and Sp. Def stats."
    fr: "Objet à faire tenir à Latios ou Latias.\nUn orbe prodigieux qui augmente leur Attaque\nSpéciale et leur Défense Spéciale."
    it: "Sfera miracolosa da dare a Latios o Latias.\nAumenta l’Attacco Speciale e la Difesa Speciale."
    de: "Ein Item, das von Latios oder Latias getragen\nwerden kann. Es hebt Spezial-Angriff und\nSpezial-Verteidigung."
    es: "Un orbe fantástico que debe llevar Latios o Latias.\nSube su Ataque Especial y su Defensa Especial."
    ko: "라티오스 혹은 라티아스에게\n지니게 하면 특수공격과 특수방어가\n올라가는 이상한 구슬."
spell_tag:
  names:
    jp_kana: のろいのおふだ
    jp_kanji: のろいのおふだ
    en: Spell Tag
    fr: Rune Sort
    it: Spettrotarga
    de: Bannsticker
    es: Hechizo
    ko: 저주의부적
  descriptions:
    jp_kana: "あやしくて　ぶきみな　おふだ。\nもたせると　ゴーストタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "怪しくて　不気味な　お札。\n持たせると　ゴーストタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt’s a sinister, eerie tag that boosts\nthe power of Ghost-type moves."
    fr: "Objet à tenir. Une plaque sinistre et étrange\nqui augmente la puissance des capacités de\ntype Spectre."
    it: "Strumento da dare a un Pokémon.\nTarga sinistra e inquietante che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Ein fieser, unheimlicher\nSticker, der Attacken vom Typ Geist verstärkt."
    es: "Misterioso y siniestro objeto que potencia los\nmovimientos de tipo Fantasma. Debe llevarlo un\nPokémon."
    ko: "괴상하고 으스스한 부적.\n지니게 하면 고스트타입\n기술의 위력이 올라간다."
spelon_berry:
  names:
    jp_kana: ノワキのみ
    jp_kanji: ノワキのみ
    en: Spelon Berry
    fr: Baie Kiwan
    it: Baccamelos
    de: Kiwanbeere
    es: Baya Wikano
    ko: 메호키열매
  descriptions:
    jp_kana: "かわいさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かわいさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCuteness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Grâce d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la dulzura. Es una baya muy rara en\notras regiones."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
splash_plate:
  names:
    jp_kana: しずくプレート
    jp_kanji: しずくプレート
    en: Splash Plate
    fr: Plaque Hydro
    it: Lastraidro
    de: Wassertafel
    es: Tabla Linfa
    ko: 물방울플레이트
  descriptions:
    jp_kana: "みずの　タイプの　せきばん。\nもたせると　みずタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　石盤。\n持たせると　みずタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Water-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Wasser."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Agua. Debe llevarla un Pokémon."
    ko: "물타입의 석판.\n지니게 하면 물타입\n기술의 위력이 강해진다."
spooky_plate:
  names:
    jp_kana: もののけプレート
    jp_kanji: もののけプレート
    en: Spooky Plate
    fr: Plaque Fantô
    it: Lastratetra
    de: Spuktafel
    es: Tabla Terror
    ko: 원령플레이트
  descriptions:
    jp_kana: "ゴーストの　タイプの　せきばん。\nもたせると　ゴーストタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　石盤。\n持たせると　ゴーストタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Ghost-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Spettro."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Geist."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Fantasma. Debe llevarla un Pokémon."
    ko: "고스트타입의 석판.\n지니게 하면 고스트타입\n기술의 위력이 강해진다."
sport_ball:
  names:
    jp_kana: コンペボール
    jp_kanji: コンペボール
    en: Sport Ball
    fr: Compét’Ball
    it: Gara Ball
    de: Turnierball
    es: Competi Ball
    ko: 콤페볼
  descriptions:
    jp_kana: "むしとりたいかいの　なかで\nつかう　とくべつな　ボール。"
    jp_kanji: "虫捕り大会の　なかで\n使う　特別な　ボール。"
    en: "A special Poké Ball that is used\nduring the Bug-Catching Contest."
    fr: "Une Poké Ball spéciale utilisée au Concours de\nCapture d’insecte."
    it: "Poké Ball speciale utilizzata solo nella\nGara Pigliamosche."
    de: Ein Ball, der nur beim Käferturnier eingesetzt wird.
    es: "Poké Ball que se utiliza en el Concurso de\nCaptura de Bichos."
    ko: "곤충채집 대회 내에서\n사용하는 특별한 볼."
sprayduck:
  names:
    jp_kana: コダックじょうろ
    jp_kanji: コダックじょうろ
    en: Sprayduck
    fr: Kwakarrosoir
    it: Sprayduck
    de: Entonkanne
    es: Psydugadera
    ko: 고라파덕물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた　きのみを\nすくすく　育てる。"
    en: "A watering can shaped like a Psyduck.\nIt helps promote the healthy growth of\nany Berries planted in good, soft soil."
    fr: "Arrosoir en forme de Psykokwak.\nAide à la croissance des Baies plantées dans\nles sols meubles."
    it: "Annaffiatoio fatto a forma di Psyduck.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Enton. Gieße\ngepflanzte Beeren, damit sie besser wachsen."
    es: "Una regadera con forma de Psyduck. Ayuda a\nque las bayas plantadas en suelo fértil crezcan\nmejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은 나무열매를\n쑥쑥 키운다."
sprinklotad:
  names:
    jp_kana: ハスボーじょうろ
    jp_kanji: ハスボーじょうろ
    en: Sprinklotad
    fr: Nénurrosoir
    it: Irrigalotad
    de: Loturzelkanne
    es: Lotadgadera
    ko: 연꽃몬물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nふかふかのつちに　うめた\nきのみを　すくすく　そだてる。"
    jp_kanji: "水を　かける　道具。\nふかふかのつちに　埋めた\nきのみを　すくすく　育てる。"
    en: "A watering can shaped like a Lotad.\nIt helps promote the healthy growth of\nany Berries planted in good, soft soil."
    fr: "Un arrosoir en forme de Nénupiot\nqui aide à la croissance des Baies\nplantées dans les sols meubles."
    it: "Strumento per annaffiare a forma di Lotad.\nFavorisce la crescita delle bacche piantate\nnel terreno soffice."
    de: "Eine Gießkanne in Form von Loturzel. Gieße\ngepflanzte Beeren, damit sie besser wachsen."
    es: "Una regadera con forma de Lotad. Ayuda a que\nlas bayas plantadas en suelo blandito crezcan\nmejor."
    ko: "물을 주는 도구.\n푹신푹신한 흙에 심은\n나무열매를 쑥쑥 키운다."
squirt_bottle:
  names:
    jp_kana: ゼニガメじょうろ
    jp_kanji: ゼニガメじょうろ
    en: Squirt Bottle
    fr: Carapuce à O
    it: Annaffiatoio
    de: Schiggykanne
    es: Regadera
    ko: 꼬부기물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nきのみプランターの　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\nきのみプランターの　きのみを\nすくすく　育てる。"
    en: "A bottle used for watering plants in the\nBerry Pots."
    fr: "Un arrosoir qui permet de faire croître rapidement\nles Baies plantées dans le Plante-Baies."
    it: "Strumento che serve a innaffiare.\nPermette un’ottima crescita delle bacche\nseminate nel Piantabacche."
    de: "Eine Gießkanne, durch deren Wasser Beeren\nim Pflanzset umso rascher wachsen."
    es: "Objeto que contiene agua y se usa para regar las\nbayas del Plantabayas."
    ko: "물을 주는 도구.\n나무열매플랜터의 나무열매를\n쑥쑥 키운다."
ss_ticket:ss_aqua:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto Nave
    de: Bootsticket
    es: Ticket Barco
    ko: 승선티켓
  descriptions:
    jp_kana: "こうそくせん　アクアごうに　のるとき\nひつような　ふねの　チケット。\nふねの　えが　かかれている。"
    jp_kanji: "高速船アクア号に　乗るとき\n必要な　船の　チケット。\n船の　絵が　描かれている。"
    en: "A ticket required for sailing on the\nferry S.S. Aqua. It has a drawing\nof a ship on its front."
    fr: "Un ticket nécessaire pour embarquer sur le ferry\nL’Aquaria. Un bateau est dessiné dessus."
    it: "Biglietto per imbarcarsi sulla Motonave Acqua.\nC’è disegnata una nave."
    de: "Ein Ticket, um auf der MS Aqua zu fahren. Eine\nZeichnung der Fähre ist auf dem Ticket zu sehen."
    es: "Es el billete válido para embarcar en el\nFerry S.S. Aqua. Tiene dibujado un barco."
    ko: "쾌속선 아쿠아호에 탈 때\n필요한 승선티켓.\n배 그림이 그려져 있다."
ss_ticket:ss_tidal:
  names:
    jp_kana: ふねのチケット
    jp_kanji: ふねのチケット
    en: S.S. Ticket
    fr: Passe Bateau
    it: Biglietto Nave
    de: Bootsticket
    es: Ticket Barco
    ko: 승선티켓
  descriptions:
    jp_kana: "れんらくせんに\nのるとき　ひつよう。"
    jp_kanji: "連絡船に\n乗るとき　必要。"
    en: Ticket required for sailing on a ferry.
    fr: Indispensable pour prendre le ferry.
    it: "Biglietto necessario per imbarcarsi su un\ntraghetto."
    de: Ein Ticket, mit dem man die Fähre benutzen kann.
    es: Necesario para montar en barcos de línea regular.
    ko: "연락선에\n탈 때 필요하다."
stable_mulch:
  names:
    jp_kana: ながながこやし
    jp_kanji: ながながこやし
    en: Stable Mulch
    fr: Fertistable
    it: Fertilsaldo
    de: Stabilmulch
    es: Abono Fijador
    ko: 오래오래비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
star_piece:
  names:
    jp_kana: ほしのかけら
    jp_kanji: ほしのかけら
    en: Star Piece
    fr: Morceau d’Étoile
    it: Pezzo Stella
    de: Sternenstück
    es: Trozo Estrella
    ko: 별의조각
  descriptions:
    jp_kana: "キラキラと　あかく　ひかる\nきれいな　ほうせきの　かけら。\nショップで　たかく　うれる。"
    jp_kanji: "キラキラと　赤く　光る\nきれいな　宝石の　かけら。\nショップで　高く　売れる。"
    en: "A small shard of a beautiful gem that\ndemonstrates a distinctly red sparkle.\nIt can be sold at a high price to shops."
    fr: "Un fragment de gemme, qui brille d’un éclat\nrouge. Peut être vendu à bon prix aux magasins."
    it: "Frammento rosso acceso di una gemma.\nSi può vendere a un prezzo piuttosto alto\nnei negozi."
    de: "Teil eines hübschen Edelsteins, der in rötlicher\nFarbe schimmert. Erzielt einen hohen Preis,\nwenn man ihn verkauft."
    es: "Fragmento de una bonita gema roja que puede\nvenderse muy caro en las tiendas."
    ko: "반짝반짝 빨갛게 빛나는\n예쁜 보석 조각.\n상점에서 비싸게 팔린다."
stardust:
  names:
    jp_kana: ほしのすな
    jp_kanji: ほしのすな
    en: Stardust
    fr: Poussière Étoile
    it: Polvostella
    de: Sternenstaub
    es: Polvoestelar
    ko: 별의모래
  descriptions:
    jp_kana: "てざわりが　サラサラの\nあかくて　きれいな　すな。\nショップで　たかく　うれる。"
    jp_kanji: "てざわりが　サラサラの\n赤くて　きれいな　砂。\nショップで　高く　売れる。"
    en: "Lovely, red sand that flows between\nthe fingers with a loose, silky feel.\nIt can be sold at a high price to shops."
    fr: "Du sable rouge ravissant, aux grains très fins.\nPeut être vendu à bon prix aux magasins."
    it: "Bella sabbia rossa dalla consistenza leggera\ne farinosa. Si può vendere a un prezzo piuttosto\nalto nei negozi."
    de: "Schöner, roter Sand, der sich seidenweich\nanfühlt. Er ist von hohem Wert."
    es: "Bonita arena roja de tacto sedoso que alcanza un\nalto precio en las tiendas."
    ko: "감촉이 보슬보슬한\n빨갛고 예쁜 모래.\n상점에서 비싸게 팔린다."
starf_berry:
  names:
    jp_kana: スターのみ
    jp_kanji: スターのみ
    en: Starf Berry
    fr: Baie Frista
    it: Baccambola
    de: Krambobeere
    es: Baya Arabol
    ko: 스타열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　どれか　１つの\nのうりょくが　ぐーんと　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　どれか　１つの\n能力が　ぐーんと　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, one of its stats\nwill sharply increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente beaucoup une\ndes stats en cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, una delle sue statistiche aumenta\ndi molto."
    de: "Als getragenes Item erhöht diese Beere einen\nStatuswert des Pokémon stark, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, aumenta mucho una\ncaracterística en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 능력 중의 하나가\n크게 올라간다."
steel_gem:
  names:
    jp_kana: はがねのジュエル
    jp_kanji: はがねのジュエル
    en: Steel Gem
    fr: Joyau Acier
    it: Bijouacciaio
    de: Stahljuwel
    es: Gema Acero
    ko: 강철주얼
  descriptions:
    jp_kana: "はがねの　タイプの　ジュエル。\nもたせると　いちどだけ　はがねの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　ジュエル。\n持たせると　１度だけ　はがねの\n技の　威力が　強まる。"
    en: "A gem with an essence of steel.\nWhen held, it strengthens the power\nof a Steel-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Acciaio."
    de: "Ein Juwel vom Typ Stahl. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Stahl."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Acero. Debe llevarla\nun Pokémon."
    ko: "강철타입의 주얼.\n지니게 하면 한 번만 강철\n기술의 위력이 강해진다."
steelixite:
  names:
    jp_kana: ハガネールナイト
    jp_kanji: ハガネールナイト
    en: Steelixite
    fr: Steelixite
    it: Steelixite
    de: Stahlosnit
    es: Steelixita
    ko: 강철톤나이트
  descriptions:
    jp_kana: "ハガネールに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ハガネールに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Steelix hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Steelix, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Steelix, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Stahlos getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Steelix en combate."
    ko: "강철톤에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
sticker_bag:
  names:
    jp_kana: シールぶくろ
    jp_kanji: シールぶくろ
    en: Seal Bag
    fr: Sac Sceaux
    it: Bollosacca
    de: Stickertüte
    es: Bolsa Sellos
    ko: 실주머니
  descriptions:
    jp_kana: "シールが　１０まい　いれられる\nちっちゃな　ふくろ。"
    jp_kanji: "シールが　１０枚　いれられる\nちっちゃな　ふくろ。"
    en: "A tiny bag that can hold 10 Seals\nfor decorating Poké Balls."
    fr: "Un petit sac pouvant contenir dix Sceaux pour\ndécorer les Poké Balls."
    it: "Sacchettino che può contenere dieci bolli per\ndecorare le Poké Ball."
    de: "Ein kleines Tütchen. Es bietet Platz für bis zu\n10 Sticker für die Pokébälle."
    es: "Bolsita con capacidad para diez Sellos de los que\ndecoran las Poké Balls."
    ko: "실이 10장 들어가는\n작은 주머니."
sticker_case:
  names:
    jp_kana: シールいれ
    jp_kanji: シールいれ
    en: Seal Case
    fr: Boîte Sceaux
    it: Portabolli
    de: Stick.Koffer
    es: Caja Sellos
    ko: 실상자
  descriptions:
    jp_kana: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    jp_kanji: "ボールカプセルに　はりつけられる\nシールが　はいった　いれもの。"
    en: "A case for storing Seals that can be\napplied to the exteriors of Poké Balls."
    fr: "Une boîte contenant les Sceaux pouvant être\nplacés sur les capsules des Poké Balls."
    it: "Contenitore per conservare i bolli che possono\nessere applicati sulle capsule delle Poké Ball."
    de: "In diesem Koffer kannst du die Sticker für\ndie Ballkapseln der Pokébälle aufbewahren."
    es: "Caja en la que se pueden guardar los Sellos que\nse aplican a las Cápsulas de las Poké Balls."
    ko: "볼캡슐에 붙일 수 있는\n실이 들어 있는 용기."
sticky_barb:
  names:
    jp_kana: くっつきバリ
    jp_kanji: くっつきバリ
    en: Sticky Barb
    fr: Piquants
    it: Vischiopunta
    de: Klettdorn
    es: Toxiestrella
    ko: 끈적끈적바늘
  descriptions:
    jp_kana: "もたせると　まいターン　ダメージを\nうける。　じぶんに　ふれてきた\nあいてに　くっつくことも　ある。"
    jp_kanji: "持たせると　毎ターン　ダメージを\n受ける。　自分に　ふれてきた\n相手に　くっつくことも　ある。"
    en: "An item to be held by a Pokémon.\nIt damages the holder every turn and may\nlatch on to Pokémon that touch the holder."
    fr: "Objet à tenir. Blesse le porteur à chaque tour.\nPeut s’accrocher aux ennemis qui attaquent\nle porteur."
    it: "Strumento che danneggia chi ce l’ha a ogni\nturno. Può attaccarsi al nemico che lancia\nun attacco fisico."
    de: "Schadet dem Träger in jeder Runde, kann aber\nan Angreifern haften bleiben, die ihn berühren."
    es: "Daña en cada turno al Pokémon que la lleva.\nPuede adherirse al Pokémon que alcance con su\nataque al portador."
    ko: "지니게 하면 매 턴 데미지를 입는다.\n자신에게 접촉해온 상대에게\n들러붙기도 한다."
stone_plate:
  names:
    jp_kana: がんせきプレート
    jp_kanji: がんせきプレート
    en: Stone Plate
    fr: Plaque Roc
    it: Lastrapietra
    de: Steintafel
    es: Tabla Pétrea
    ko: 암석플레이트
  descriptions:
    jp_kana: "いわの　タイプの　せきばん。\nもたせると　いわタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "いわの　タイプの　石盤。\n持たせると　いわタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Rock-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Roccia."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gestein."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Roca. Debe llevarla un Pokémon."
    ko: "바위타입의 석판.\n지니게 하면 바위타입\n기술의 위력이 강해진다."
storage_key:galactic_warehouse:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé Stockage
    it: Depochiave
    de: Lagerschlüssel
    es: Llave Almacén
    ko: 창고열쇠
  descriptions:
    jp_kana: "トバリシティの　はずれにある\nギンガだんの　あやしい\nそうこに　はいるための　カギ。"
    jp_kanji: "トバリシティの　はずれにある\nギンガ団の　怪しい\n倉庫に　はいるための　カギ。"
    en: "The key to Team Galactic’s sinister\nwarehouse located at the edge of\nVeilstone City."
    fr: "La clé de l’entrepôt de la Team Galaxie situé à\nla périphérie de Voilaroc."
    it: "Chiave del misterioso deposito del Team Galassia\nsituato ai confini di Rupepoli."
    de: "Der Schlüssel zur Lagerhalle des Teams Galaktik\nam Rande von Schleiede."
    es: "Llave del siniestro almacén del Equipo Galaxia\nque está ubicado en las afueras de Ciudad\nRocavelo."
    ko: "장막시티 변두리에 있는\n갤럭시단의 수상한 창고에\n들어가기 위한 열쇠다."
storage_key:sea_mauville:
  names:
    jp_kana: そうこのカギ
    jp_kanji: そうこのカギ
    en: Storage Key
    fr: Clé Stockage
    it: Chiave magazzino
    de: Lagerschlüssel
    es: Llave Almacén
    ko: 창고열쇠
  descriptions:
    jp_kana: "シーキンセツの　そうこに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　倉庫に\n入るための　カギ。"
    en: "A key that opens the storage\nhold inside Sea Mauville."
    fr: La clé de la réserve de Lavandia Sea.
    it: Chiave per accedere al magazzino di Ciclamare.
    de: "Ein Schlüssel, der in das Schloss des Lagerraums\nauf Seewoge Malvenfroh passt."
    es: "Llave de acceso a una de las habitaciones de\nMalvamar."
    ko: "씨보라의 창고로\n들어가기 위한 열쇠."
strange_souvenir:
  names:
    jp_kana: ふしぎなおきもの
    jp_kanji: ふしぎなおきもの
    en: Strange Souvenir
    fr: Bibelot Bizarre
    it: Strano ninnolo
    de: Skurriloskulptur
    es: Estatuilla Rara
    ko: 이상한장식품
  descriptions:
    jp_kana: "カロスちほうから　とおく　はなれた\nばしょで　まもりがみ　とされる\nポケモンを　かたどった　おきもの。"
    jp_kanji: "カロス地方から　遠く　離れた\n場所で　守り神　とされる\nポケモンを　かたどった　置物。"
    en: "An ornament depicting a Pokémon\nthat is venerated as a protector\nin some region far from Kalos."
    fr: "Un ornement à l’image d’un Pokémon vénéré\ncomme protecteur dans une région éloignée\nde Kalos."
    it: "Statuetta raffigurante un Pokémon che viene\nconsiderato una divinità protettrice in alcuni\nluoghi molto lontani da Kalos."
    de: "Eine Skulptur in Form eines Pokémon,\ndas in einer weit von Kalos entfernten Region als\nSchutzpatron angesehen wird."
    es: "Ornamento que representa a un Pokémon\nvenerado como protector en cierta región lejos\nde Kalos."
    ko: "칼로스지방에서 멀리 떨어진 곳의\n수호신으로 여겨지는\n포켓몬을 본떠 만든 장식품."
suite_key:
  names:
    jp_kana: ルームキー
    jp_kanji: ルームキー
    en: Suite Key
    fr: Clé Chambre
    it: Chiave Suite
    de: B-Schlüssel
    es: Llave Suite
    ko: 룸키
  descriptions:
    jp_kana: "みずうみの　ほとりにある\nこうきゅうホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    jp_kanji: "湖の　ほとりにある\n高級ホテルの　ルームキー。\nなぜか　よく　なくなってしまう。"
    en: "A key to one of the suites at a certain\nluxury hotel by a lake. For some odd\nreason, it often disappears."
    fr: "La clé de l’une des suites de l’hôtel de luxe se\ntrouvant près du lac. Bizarrement, elle disparaît\nsouvent."
    it: "Chiave di una suite vicino a un lago.\nPer ragioni misteriose, scompare spesso."
    de: "Schlüssel zu einer Hotelsuite. Verschwindet\nseltsamerweise immer wieder mal."
    es: "Llave de una suite del hotel de lujo junto al lago.\nPor algún motivo, se pierde a menudo."
    ko: "호수 근처에 있는 고급 호텔의 룸 키.\n왜인지는 모르나 잘 없어진다."
sun_stone:
  names:
    jp_kana: たいようのいし
    jp_kanji: たいようのいし
    en: Sun Stone
    fr: Pierre Soleil
    it: Pietrasolare
    de: Sonnenstein
    es: Piedra Solar
    ko: 태양의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nたいようのように　あかい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n太陽のように　赤い。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt burns as red as the evening sun."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle est rouge comme\nle soleil couchant."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È rossa come il sole\nal tramonto."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er ist rot wie\ndie Abendsonne."
    es: "Curiosa piedra que hace evolucionar a\ndeterminadas especies de Pokémon. Es roja\ncomo el núcleo del sol."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n태양처럼 빨갛다."
super_potion:
  names:
    jp_kana: いいキズぐすり
    jp_kanji: いいキズぐすり
    en: Super Potion
    fr: Super Potion
    it: Superpozione
    de: Supertrank
    es: Superpoción
    ko: 좋은상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "A spray-type medicine for treating\nwounds. It can be used to restore\n50 HP to an injured Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 50 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 50 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon\num 50 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura\n50 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
super_repel:
  names:
    jp_kana: シルバースプレー
    jp_kanji: シルバースプレー
    en: Super Repel
    fr: Superepousse
    it: Superrepellente
    de: Superschutz
    es: Superrepelente
    ko: 실버스프레이
  descriptions:
    jp_kana: "２００ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "２００歩　進む　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents any low-level\nwild Pokémon from jumping out at\nyou for 200 steps after its use."
    fr: "Repousse les Pokémon sauvages faibles pendant\n200 pas."
    it: "Strumento che evita l’incontro con i Pokémon\nselvatici deboli per 200 passi dopo l’utilizzo."
    de: "Hält 200 Schritte lang schwache, wilde\nPokémon ab."
    es: "Repele Pokémon salvajes débiles en un recorrido\nde 200 pasos."
    ko: "200보 걸어가는 동안\n약한 야생 포켓몬이\n전혀 나오지 않게 된다."
super_rod:
  names:
    jp_kana: すごいつりざお
    jp_kanji: すごいつりざお
    en: Super Rod
    fr: Méga Canne
    it: Super Amo
    de: Superangel
    es: Supercaña
    ko: 대단한낚싯대
  descriptions:
    jp_kana: "さいしんの　すごい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "最新の　すごい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "An awesome, high-tech fishing rod.\nUse it at any body of water to\nfish for wild aquatic Pokémon."
    fr: "Une canne à pêche ultramoderne.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo supertecnologico. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine wundervoll gefertigte Angel. Die beste\nAngel, um Pokémon an Land zu ziehen."
    es: "Increíble caña de pescar de alta tecnología.\nPesca Pokémon salvajes en todo tipo de aguas."
    ko: "최신식의 대단한 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
surprise_mulch:
  names:
    jp_kana: びっくりこやし
    jp_kanji: びっくりこやし
    en: Surprise Mulch
    fr: Fertistantané
    it: Fertilsorpresa
    de: Wundermulch
    es: Abono Sorpresa
    ko: 깜놀비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
swampertite:
  names:
    jp_kana: ラグラージナイト
    jp_kanji: ラグラージナイト
    en: Swampertite
    fr: Laggronite
    it: Swampertite
    de: Sumpexnit
    es: Swampertita
    ko: 대짱이나이트
  descriptions:
    jp_kana: "ラグラージに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラグラージに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Swampert hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Laggron, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Swampert, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Sumpex getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Swampert en combate."
    ko: "대짱이에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
sweet_heart:
  names:
    jp_kana: ハートスイーツ
    jp_kanji: ハートスイーツ
    en: Sweet Heart
    fr: Chococœur
    it: Dolcecuore
    de: Herzkonfekt
    es: Corazón Dulce
    ko: 하트스위트
  descriptions:
    jp_kana: "とても　あまったるい　チョコレート。\nポケモン　１ひきの　ＨＰを\n２０だけ　かいふくする。"
    jp_kanji: "とても　甘ったるい　チョコレート。\nポケモン　１匹の　ＨＰを\n２０だけ　回復する。"
    en: "A piece of cloyingly sweet chocolate.\nWhen consumed, it restores\n20 HP to an injured Pokémon."
    fr: "Un chocolat extrêmement sucré.\nRestaure 20 PV d’un Pokémon."
    it: "Cioccolato molto dolce.\nRestituisce 20 PS a un Pokémon."
    de: "Ein süßer Schokosnack, der die KP\neines Pokémon um 20 Punkte auffüllt."
    es: "Chocolatina de sabor dulce. Restaura 20 PS de\nun Pokémon."
    ko: "지나칠 정도로 달콤한 초콜릿.\n포켓몬 1마리의 HP를\n20만큼 회복한다."
swift_feather:
  names:
    jp_kana: しゅんぱつのハネ
    jp_kanji: しゅんぱつのハネ
    en: Swift Wing
    fr: Aile Sprint
    it: Piumreazione
    de: Flinkfeder
    es: Pluma Ímpetu
    ko: 순발력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　すばやさの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　素早さの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon.\nIt slightly increases the base Speed\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu sa Vitesse de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base della Velocità."
    de: "Schenkt man einem Pokémon dieses Item,\nwird dessen Initiative-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco la Velocidad de\nbase de un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 스피드\n기초 포인트를 조금 올린다."
tamato_berry:
  names:
    jp_kana: マトマのみ
    jp_kanji: マトマのみ
    en: Tamato Berry
    fr: Baie Tamato
    it: Baccamodoro
    de: Tamotbeere
    es: Baya Tamate
    ko: 토망열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nすばやさの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n素早さの　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon.\nUsing it on a Pokémon makes it more\nfriendly but lowers its base Speed."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Vitesse de base."
    it: "Usata su un Pokémon, lo rende più amichevole,\nma ne diminuisce i punti base della Velocità."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nInitiative-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Velocidad de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n스피드의 기초 포인트가 떨어진다."
tanga_berry:
  names:
    jp_kana: タンガのみ
    jp_kanji: タンガのみ
    en: Tanga Berry
    fr: Baie Panga
    it: Baccaitan
    de: Tanigabeere
    es: Baya Yecana
    ko: 리체열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　むし　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　むし技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Bug-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Insecte."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Coleottero del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Käfer."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Bicho de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 벌레 기술을\n당했을 때 위력이 약해진다."
thanks_mail:
  names:
    jp_kana: かんしゃメール
    jp_kanji: かんしゃメール
    en: Thanks Mail
    fr: Lettre Merci
    it: Messaggio Grazie
    de: Dankesbrief
    es: Carta Gracias
    ko: 감사메일
  descriptions:
    jp_kana: "かんしゃを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "感謝を　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easy\nfor you to express thanks. Have a\nPokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour les remerciements.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere dei\nringraziamenti.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man sich bei jemandem\nbedanken kann. Gib es einem Pokémon zum\nTragen."
    es: "Carta de agradecimiento. Haz que la entregue\nun Pokémon."
    ko: "감사의 마음을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
thick_club:
  names:
    jp_kana: ふといホネ
    jp_kanji: ふといホネ
    en: Thick Club
    fr: Masse Os
    it: Ossospesso
    de: Kampfknochen
    es: Hueso Grueso
    ko: 굵은뼈
  descriptions:
    jp_kana: "なにかの　かたい　ホネ。\nカラカラ　または　ガラガラに\nもたせると　こうげきが　あがる。"
    jp_kanji: "なにかの　硬い　ホネ。\nカラカラ　または　ガラガラに\n持たせると　攻撃が　あがる。"
    en: "An item to be held by Cubone or\nMarowak. It is a hard bone of some\nsort that boosts the Attack stat."
    fr: "Objet à faire tenir à Osselait ou Ossatueur.\nUn os dur qui augmente leur Attaque."
    it: "Strumento da dare a Cubone o Marowak.\nOsso duro che migliora la potenza delle\nmosse fisiche."
    de: "Ein harter Knochen, der den Angriffs-Wert\nvon Tragosso oder Knogga erhöht, wenn sie\nihn tragen."
    es: "Un extraño tipo de hueso que potencia los\nataques físicos de Cubone y Marowak cuando\nlo llevan."
    ko: "무언가의 단단한 뼈.\n탕구리 혹은 텅구리에게\n지니게 하면 공격이 올라간다."
thunder_stone:
  names:
    jp_kana: かみなりのいし
    jp_kanji: かみなりのいし
    en: Thunder Stone
    fr: Pierre Foudre
    it: Pietratuono
    de: Donnerstein
    es: Piedra Trueno
    ko: 천둥의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nいなずまの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n稲妻の　模様が　ある。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt has a distinct thunderbolt pattern."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Un éclair est dessiné\ndessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Riporta l’immagine\ndi un fulmine."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er hat ein\nBlitzmuster."
    es: "Curiosa piedra que hace evolucionar a\ndeterminadas especies de Pokémon. Tiene\ngrabado un rayo."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n천둥번개 무늬가 있다."
tidal_bell:
  names:
    jp_kana: うみなりのスズ
    jp_kanji: うみなりのスズ
    en: Tidal Bell
    fr: Glas Tempête
    it: Campana Onda
    de: Gischtglocke
    es: Campana Oleaje
    ko: 해명의방울
  descriptions:
    jp_kana: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    jp_kanji: "こころ　やすまる　ねいろが　きける\nとても　ふるめかしい　スズ。"
    en: "A very old-fashioned bell that\nmakes a gentle ringing sound."
    fr: Une cloche antique au tintement apaisant.
    it: "Una campana antica. Produce un suono\nche dona pace al cuore."
    de: "Eine altehrwürdige Glocke, deren Läuten\nalle besänftigt, die es hören."
    es: "Campana de aspecto antiguo que emite un sonido\nque calma el espíritu."
    ko: "마음이 편안해지는 음색이 들리는\n아주 고풍스러운 방울."
timer_ball:
  names:
    jp_kana: タイマーボール
    jp_kanji: タイマーボール
    en: Timer Ball
    fr: Chrono Ball
    it: Timer Ball
    de: Timerball
    es: Turno Ball
    ko: 타이마볼
  descriptions:
    jp_kana: "ターンすうが　かかれば　かかるほど\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "ターン数が　かかれば　かかるほど\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nbecomes progressively more effective\nthe more turns that are taken in battle."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nde mieux en mieux à mesure que le combat\ns’éternise."
    it: "Poké Ball un po’ diversa che diventa\nprogressivamente più efficace con l’aumentare\ndei turni in lotta."
    de: "Ein Ball, der mit zunehmender Kampfdauer\neffektiver wird."
    es: "Una Poké Ball algo distinta que va mejorando\nsu rendimiento con cada turno de combate."
    ko: "턴 수가 길어지면 길어질수록\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
tiny_mushroom:
  names:
    jp_kana: ちいさなキノコ
    jp_kanji: ちいさなキノコ
    en: Tiny Mushroom
    fr: Petit Champi
    it: Minifungo
    de: Minipilz
    es: Mini Seta
    ko: 작은버섯
  descriptions:
    jp_kana: "ちいさな　めずらしい　キノコ。\nいちぶの　マニアの　あいだでは\nけっこう　にんきが　たかい。"
    jp_kanji: "ちいさな　珍しい　キノコ。\n一部の　マニアの　あいだでは\nけっこう　人気が　高い。"
    en: "A very small and rare mushroom.\nIt’s popular with a certain class of\ncollectors and sought out by them."
    fr: "Un petit champignon assez rare.\nIl est plutôt populaire parmi certains fans\ndévoués."
    it: "Fungo piccolo e raro.\nÈ discretamente apprezzato da alcuni intenditori."
    de: "Ein kleiner und seltener Pilz. Sammler sind ganz\naus dem Häuschen, wenn sie einen finden."
    es: "Una pequeña seta que es poco común y bastante\npopular entre determinados grupos de gourmets."
    ko: "작고 진귀한 버섯.\n일부 마니아 사이에서는\n매우 인기가 높다."
tm001:
  names:
    jp_kana: わざマシン０１
    jp_kanji: わざマシン０１
    en: TM01
    fr: CT01
    it: MT01
    de: TM01
    es: MT01
    ko: 기술머신01
  descriptions:
    jp_kana: "つめを　みがいて　するどく　する。\nじぶんの　こうげきと\nめいちゅうりつを　あげる。"
    jp_kanji: "つめを　磨いて　鋭く　する。\n自分の　攻撃と\n命中率を　あげる。"
    en: "The user sharpens its claws to\nboost its Attack stat and accuracy."
    fr: "Le lanceur s’aiguise les griffes.\nAugmente l’Attaque et la Précision."
    it: "Chi la usa affila i propri artigli, aumentando\nAttacco e precisione."
    de: "Der Anwender wetzt seine Klauen, um sie zu\nschärfen. Angriff und Genauigkeit werden erhöht."
    es: "Lima y afila las garras. Aumenta el Ataque y la\nPrecisión."
    ko: "손톱을 갈아 날카롭게 만든다.\n자신의 공격과\n명중률을 올린다."
tm002:
  names:
    jp_kana: わざマシン０２
    jp_kanji: わざマシン０２
    en: TM02
    fr: CT02
    it: MT02
    de: TM02
    es: MT02
    ko: 기술머신02
  descriptions:
    jp_kana: "するどく　とがった　きょだいな\nツメで　ひっかいて　こうげきする。"
    jp_kanji: "鋭く　とがった　巨大な　ツメで\n相手を　切り裂いて　攻撃する。"
    en: "The user slashes the target with huge,\nsharp claws."
    fr: "Le lanceur lacère l’ennemi de ses grandes\ngriffes aiguisées."
    it: "Chi la usa attacca con artigli affilati che graffiano\nil nemico rapidamente e con grande forza."
    de: "Das Ziel wird mit langen, scharfen Krallen\nbrutal attackiert."
    es: "Engancha y araña al objetivo con unas potentes\ny enormes garras afiladas."
    ko: "날카롭고 뾰족하며 거대한 발톱으로\n상대를 베어 갈라서 공격한다."
tm003:
  names:
    jp_kana: わざマシン０３
    jp_kanji: わざマシン０３
    en: TM03
    fr: CT03
    it: MT03
    de: TM03
    es: MT03
    ko: 기술머신03
  descriptions:
    jp_kana: "ふしぎな　ねんぱを　じったいかして\nあいてを　こうげきする。\nぶつりてきな　ダメージを　あたえる。"
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd\npsychic wave to attack the target.\nThis attack does physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur l’ennemi. Inflige des dégâts\nphysiques."
    it: "Chi la usa attacca il bersaglio facendo\nmaterializzare un misterioso raggio psichico\nche provoca danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle,\ndie dem Ziel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al\nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
tm004:
  names:
    jp_kana: わざマシン０４
    jp_kanji: わざマシン０４
    en: TM04
    fr: CT04
    it: MT04
    de: TM04
    es: MT04
    ko: 기술머신04
  descriptions:
    jp_kana: "しずかに　せいしんを　とういつして\nこころを　しずめることで　じぶんの\nとくこうと　とくぼうを　あげる。"
    jp_kanji: "静かに　精神を　統一し\n心を　鎮めることで　自分の\n特攻と　特防を　あげる。"
    en: "The user quietly focuses its mind and\ncalms its spirit to raise its Sp. Atk and\nSp. Def stats."
    fr: "Le lanceur se concentre et fait le vide dans son\nesprit pour augmenter son Attaque Spéciale et\nsa Défense Spéciale."
    it: "Chi la usa, meditando, placa il proprio spirito\nper aumentare l’Attacco Speciale e\nla Difesa Speciale."
    de: "Der Anwender konzentriert und beruhigt sich.\nSo werden Spezial-Angriff und\nSpezial-Verteidigung verstärkt."
    es: "Quien lo usa concentra su energía mental y calma\nsu espíritu para aumentar su Ataque Especial y su\nDefensa Especial."
    ko: "조용히 정신을 통일해서\n마음을 가라앉혀 자신의\n특수공격과 특수방어를 올린다."
tm005:
  names:
    jp_kana: わざマシン０５
    jp_kanji: わざマシン０５
    en: TM05
    fr: CT05
    it: MT05
    de: TM05
    es: MT05
    ko: 기술머신05
  descriptions:
    jp_kana: "あいてを　にがして　ひかえポケモンを\nひきずりだす。　やせいポケモンなら\nせんとうは　おわる。"
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off and a different\nPokémon is dragged out. In the wild,\nthis ends a battle against a single Pokémon."
    fr: "Effraie le Pokémon ennemi et le remplace par\nun autre. Dans la nature, met fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nMette fine alle lotte contro singoli Pokémon\nselvatici."
    de: "Der Brüller schlägt das Ziel in die Flucht. Ein\nKampf gegen ein wildes Pokémon wird beendet."
    es: "Asusta tanto al objetivo que tiene que cambiarse\npor otro de su grupo. Si es un Pokémon salvaje,\nel combate acaba."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
tm006:
  names:
    jp_kana: わざマシン０６
    jp_kanji: わざマシン０６
    en: TM06
    fr: CT06
    it: MT06
    de: TM06
    es: MT06
    ko: 기술머신06
  descriptions:
    jp_kana: "もうどくの　じょうたいに　する。\nターンすうが　すすむほど　どくの\nダメージりょうは　ふえる。"
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target\nbadly poisoned. Its poison\ndamage worsens every turn."
    fr: "Empoisonne gravement l’ennemi.\nLes dégâts dus au poison augmentent à\nchaque tour."
    it: "Iperavvelena il nemico con una potente tossina.\nIl danno peggiora a ogni turno."
    de: "Das Ziel wird schwer vergiftet. Der Schaden\ndurch das Gift wird in jeder Runde stärker."
    es: "Un movimiento altamente tóxico que envenena\ngravemente al objetivo y causa un daño mayor\nen cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
tm007:
  names:
    jp_kana: わざマシン０７
    jp_kanji: わざマシン０７
    en: TM07
    fr: CT07
    it: MT07
    de: TM07
    es: MT07
    ko: 기술머신07
  descriptions:
    jp_kana: "５ターンの　あいだ　あられを\nふらして　こおりタイプ　いがいの\nポケモンに　ダメージを　あたえる。"
    jp_kanji: "５ターンの　あいだ　あられを\n降らして　こおりタイプ　以外の\nポケモンに　ダメージを　与える。"
    en: "The user summons a hailstorm lasting five\nturns. It damages all Pokémon except the\nIce type."
    fr: "Invoque une tempête de grêle qui dure cinq\ntours. Ne blesse pas les Pokémon de type\nGlace."
    it: "Chi la usa causa una grandinata che dura\ncinque turni. Danneggia tutti i Pokémon\ntranne quelli di tipo Ghiaccio."
    de: "Der verursachte Hagelsturm hält 5 Runden an\nund schadet allen Pokémon, außer denen\nvom Typ Eis."
    es: "Invoca una tormenta de granizo que dura cinco\nturnos y daña a todos los Pokémon excepto a los\nde tipo Hielo."
    ko: "5턴 동안 싸라기눈을\n내리게 해서 얼음타입 이외의\n포켓몬에게 데미지를 준다."
tm008:
  names:
    jp_kana: わざマシン０８
    jp_kanji: わざマシン０８
    en: TM08
    fr: CT08
    it: MT08
    de: TM08
    es: MT08
    ko: 기술머신08
  descriptions:
    jp_kana: "ちからを　こめて　きんにくを\nぶあつくする　ことで　じぶんの\nこうげきと　ぼうぎょを　あげる。"
    jp_kanji: "体に　力を　こめて\n筋肉を　ぶあつく　することで\n自分の　攻撃と　防御を　あげる。"
    en: "The user tenses its muscles to bulk up\nits body, raising both its Attack and\nDefense stats."
    fr: "Le lanceur tend ses muscles pour se gonfler,\nce qui booste son Attaque et sa Défense."
    it: "Chi la usa tende i muscoli per gonfiare il corpo,\naumentando Difesa e Attacco."
    de: "Der Anwender spannt seine Muskeln an\nund steigert damit den Angriffs- und\nden Verteidigungs-Wert."
    es: "Tensa los músculos de quien lo usa y potencia\nsu Ataque y su Defensa."
    ko: "몸에 힘을 담아\n근육을 두껍게 해서\n자신의 공격과 방어를 올린다."
tm009:
  names:
    jp_kana: わざマシン０９
    jp_kanji: わざマシン０９
    en: TM09
    fr: CT09
    it: MT09
    de: TM09
    es: MT09
    ko: 기술머신09
  descriptions:
    jp_kana: "とくしゅな　どくえきを　あびせる。\nどく　じょうたいの　あいてには\nいりょくが　２ばいに　なる。"
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手には\n威力が　２倍に　なる。"
    en: "The user drenches the target in a special\npoisonous liquid. This move’s power is\ndoubled if the target is poisoned."
    fr: "Le lanceur inocule un poison spécial à l’ennemi.\nL’effet est doublé si l’ennemi est déjà\nempoisonné."
    it: "Lancia uno speciale liquido tossico sul bersaglio.\nSe questi è avvelenato, il danno provocato\nraddoppia."
    de: "Überschüttet das Ziel mit einer speziellen\ntoxischen Flüssigkeit. Doppelt so stark gegen\nbereits vergiftete Ziele."
    es: "Un líquido venenoso que cubre al objetivo y\nprovoca un daño doble si este ya estaba\nenvenenado."
    ko: "특수한 독액을 날린다.\n독 상태의 상대에게는\n위력이 2배가 된다."
tm010:
  names:
    jp_kana: わざマシン１０
    jp_kanji: わざマシン１０
    en: TM10
    fr: CT10
    it: MT10
    de: TM10
    es: MT10
    ko: 기술머신10
  descriptions:
    jp_kana: "わざを　つかった　ポケモンに　よって\nわざの　タイプが　かわる。"
    jp_kanji: "技を　使った　ポケモンに　よって\n技の　タイプが　変わる。"
    en: "A unique attack that varies in type\ndepending on the Pokémon using it."
    fr: "Attaque dont le type dépend du Pokémon\nqui l’utilise."
    it: "Mossa singolare che cambia tipo a seconda\ndel Pokémon che la usa."
    de: "Der Typ dieser Attacke hängt vom jeweiligen\nPokémon ab, das sie einsetzt."
    es: "Movimiento especial que cambia de tipo\ndependiendo del Pokémon que lo use."
    ko: "기술을 쓴 포켓몬에 따라\n기술의 타입이 달라진다."
tm011:
  names:
    jp_kana: わざマシン１１
    jp_kanji: わざマシン１１
    en: TM11
    fr: CT11
    it: MT11
    de: TM11
    es: MT11
    ko: 기술머신11
  descriptions:
    jp_kana: "５ターンの　あいだ　ひざしを\nつよくして　ほのおタイプの\nわざの　いりょくを　あげる。"
    jp_kanji: "５ターンの　あいだ　日差しを\nつよくして　ほのおタイプの\n技の　威力を　あげる。"
    en: "The user intensifies the sun\nfor five turns, powering up\nFire-type moves."
    fr: "Fait briller le soleil pendant cinq tours, augmentant\nla puissance des capacités de type Feu."
    it: "Chi la usa intensifica i raggi solari per cinque\nturni, potenziando le mosse di tipo Fuoco."
    de: "Die Sonne brennt unbarmherzig 5 Runden\nlang. Dadurch werden Attacken vom\nTyp Feuer verstärkt."
    es: "Quien lo usa intensifica el efecto del sol durante\ncinco turnos, lo que potencia los movimientos de\ntipo Fuego."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다."
tm012:
  names:
    jp_kana: わざマシン１２
    jp_kanji: わざマシン１２
    en: TM12
    fr: CT12
    it: MT12
    de: TM12
    es: MT12
    ko: 기술머신12
  descriptions:
    jp_kana: "あいてを　おこらせる。３ターンの\nあいだ　あいては　ダメージを\nあたえる　わざしか　だせなくなる。"
    jp_kanji: "相手を　怒らせる。３ターンの\nあいだ　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage\nthat allows it to use only attack\nmoves for three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser que des\nattaques pendant trois tours."
    it: "Provoca il nemico inducendolo a usare solo\nmosse d’attacco per tre turni."
    de: "Das Ziel wird so gereizt, dass es über 3 Runden\nhinweg nur Angriffsattacken einsetzt."
    es: "Provoca un ataque de ira en el objetivo que solo\nle permite usar movimientos de ataque durante\ntres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
tm013:
  names:
    jp_kana: わざマシン１３
    jp_kanji: わざマシン１３
    en: TM13
    fr: CT13
    it: MT13
    de: TM13
    es: MT13
    ko: 기술머신13
  descriptions:
    jp_kana: "れいきの　ビームを　はっしゃして\nこうげきする。　あいてを　こおりの\nじょうたいに　することが　ある。"
    jp_kanji: "凍える　ビームを\n相手に　発射して　攻撃する。\nこおり状態に　することが　ある。"
    en: "The target is struck with an icy-\ncold beam of energy. This may\nalso leave the target frozen."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il nemico è colpito da un raggio di energia gelida\nche può anche congelarlo."
    de: "Das Ziel wird von einem eiskalten Energiestrahl\ngetroffen. Dieser friert es eventuell ein."
    es: "Ataca al objetivo con un rayo de hielo que puede\nllegar a congelarlo."
    ko: "냉동빔을\n상대에게 발사하여 공격한다.\n얼음 상태로 만들 때가 있다."
tm014:
  names:
    jp_kana: わざマシン１４
    jp_kanji: わざマシン１４
    en: TM14
    fr: CT14
    it: MT14
    de: TM14
    es: MT14
    ko: 기술머신14
  descriptions:
    jp_kana: "はげしい　ふぶきを　ぶつけて\nこうげきする。　あいてを　こおりの\nじょうたいに　することが　ある。"
    jp_kanji: "激しい　吹雪を\n相手に　吹きつけて　攻撃する。\nこおり状態に　することが　ある。"
    en: "A howling blizzard is summoned to strike\nopposing Pokémon. This may also leave\nthe opposing Pokémon frozen."
    fr: "Une violente tempête de neige est déclenchée\nsur l’ennemi. Peut aussi le geler."
    it: "Colpisce i nemici con una tremenda tempesta\ndi ghiaccio che può anche congelarli."
    de: "Eine ungnädige Eis-und-Schnee-Attacke, die\nPokémon in der Nähe des Anwenders trifft\nund eventuell einfrieren kann."
    es: "Invoca una tormenta de viento y nieve que\nenvuelve al objetivo y puede llegar a congelarlo."
    ko: "세찬 눈보라를\n상대에게 내뿜어 공격한다.\n얼음 상태로 만들 때가 있다."
tm015:
  names:
    jp_kana: わざマシン１５
    jp_kanji: わざマシン１５
    en: TM15
    fr: CT15
    it: MT15
    de: TM15
    es: MT15
    ko: 기술머신15
  descriptions:
    jp_kana: "つよい　こうせんを　はっしゃする。\nつかった　つぎのターンは　はんどうで\nうごけなくなる。"
    jp_kanji: "強い　光線を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is attacked with a powerful beam.\nThe user can’t move on the next turn."
    fr: "Projette un puissant rayon sur l’ennemi.\nLe lanceur doit se reposer au tour suivant."
    it: "Colpisce il nemico con un potente raggio.\nChi la usa salta il turno successivo per\nrecuperare energia."
    de: "Eine äußerst starke Attacke, die viel Schaden\nanrichtet. Anwender muss sich in der\nnächsten Runde ausruhen."
    es: "Ataca al objetivo con un potente rayo, pero quien\nlo usa debe descansar en el siguiente turno para\nreponer energía."
    ko: "강한 광선을\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없다."
tm016:
  names:
    jp_kana: わざマシン１６
    jp_kanji: わざマシン１６
    en: TM16
    fr: CT16
    it: MT16
    de: TM16
    es: MT16
    ko: 기술머신16
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　とくしゅわざの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　あいだ　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to\nreduce damage from special attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit les dégâts\ncausés par les attaques spéciales durant cinq\ntours."
    it: "Innalza una barriera di luce fantastica che riduce\ni danni degli attacchi speciali per sé e gli alleati\nper cinque turni."
    de: "Eine Wand aus Licht wird über 5 Runden errichtet.\nSie senkt den durch Spezial-Angriffe\nherbeigeführten Schaden."
    es: "Impresionante pared de luz que reduce el daño\nde los ataques especiales durante cinco turnos."
    ko: "5턴 동안 이상한 장막으로\n상대로부터 받는 특수 기술의\n데미지를 약하게 만든다."
tm017:
  names:
    jp_kana: わざマシン１７
    jp_kanji: わざマシン１７
    en: TM17
    fr: CT17
    it: MT17
    de: TM17
    es: MT17
    ko: 기술머신17
  descriptions:
    jp_kana: "こうげきを　まったく　うけない。\nわざを　れんぞくで　だすと\nしっぱい　しやすくなる。"
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "Enables the user to evade all attacks.\nIts chance of failing rises if it is used\nin succession."
    fr: "Le lanceur esquive toutes les attaques.\nLe risque d’échec augmente lorsque la capacité\nest utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Garantierter Schutz in der Runde, in der\ndie Attacke eingesetzt wird. Könnte bei\nhäufigem Einsatz versagen."
    es: "Bloquea todos los ataques. Puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
tm018:
  names:
    jp_kana: わざマシン１８
    jp_kanji: わざマシン１８
    en: TM18
    fr: CT18
    it: MT18
    de: TM18
    es: MT18
    ko: 기술머신18
  descriptions:
    jp_kana: "５ターンの　あいだ　あめを　ふらして\nみずタイプの　わざの　いりょくを\nあげる。"
    jp_kanji: "５ターンの　あいだ　雨を　降らして\nみずタイプの\n技の　威力を　あげる。"
    en: "The user summons a heavy rain\nthat falls for five turns, powering\nup Water-type moves."
    fr: "Invoque de fortes pluies qui durent cinq tours\net augmentent la puissance des capacités de\ntype Eau."
    it: "Chi la usa provoca una forte pioggia per cinque\nturni, potenziando le mosse di tipo Acqua."
    de: "Schwerer Niederschlag setzt für 5 Runden ein.\nAttacken vom Typ Wasser werden verstärkt."
    es: "Quien lo usa invoca una fuerte lluvia que dura\ncinco turnos y fortalece los movimientos de tipo\nAgua."
    ko: "5턴 동안 비를 내려서\n물타입 기술의 위력을 올린다."
tm019:
  names:
    jp_kana: わざマシン１９
    jp_kanji: わざマシン１９
    en: TM19
    fr: CT19
    it: MT19
    de: TM19
    es: MT19
    ko: 기술머신19
  descriptions:
    jp_kana: "じめんに　おりて　からだを　やすめる。\nさいだい　ＨＰの　はんぶんの\nＨＰを　かいふく　する。"
    jp_kanji: "地面に　降りて　体を　やすめる。\n最大ＨＰの　半分の\nＨＰを　回復する。"
    en: "The user lands and rests its body.\nIt restores the user’s HP by up to\nhalf of its max HP."
    fr: "Le lanceur atterrit et se repose.\nRestaure jusqu’à la moitié de ses PV max."
    it: "Chi la usa sta fermo e riposa, recuperando\nmetà dei propri PS massimi."
    de: "Anwender landet und ruht sich aus. KP des\nAnwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: "Aterriza sobre la superficie para descansar.\nRecupera hasta la mitad del total de sus PS."
    ko: "땅에 내려와 몸을 쉬게 한다.\n최대 HP의 절반만큼\nHP를 회복한다."
tm020:
  names:
    jp_kana: わざマシン２０
    jp_kanji: わざマシン２０
    en: TM20
    fr: CT20
    it: MT20
    de: TM20
    es: MT20
    ko: 기술머신20
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　ちからに　まもられて\nじょうたい　いじょうに　ならなくなる。"
    jp_kanji: "５ターンの　あいだ\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field\nthat prevents status conditions\nfor five turns."
    fr: "Crée un champ protecteur qui empêche tous les\nproblèmes de statut pendant cinq tours."
    it: "Chi la usa crea un campo protettivo che\nevita problemi di stato per sé e gli alleati\nper cinque turni."
    de: "Ein Schild schützt das Team 5 Runden lang\nvor Statusproblemen jeglicher Art."
    es: "Un escudo que protege de problemas de estado,\ncomo el sueño o la parálisis, durante cinco\nturnos."
    ko: "5턴 동안\n이상한 힘으로 보호받아\n상태 이상이 되지 않는다."
tm021:
  names:
    jp_kana: わざマシン２１
    jp_kanji: わざマシン２１
    en: TM21
    fr: CT21
    it: MT21
    de: TM21
    es: MT21
    ko: 기술머신21
  descriptions:
    jp_kana: "ふまんを　はらすために　ぜんりょくで\nこうげきする。　なついて　いないほど\nいりょくは　あがる。"
    jp_kanji: "不満を　はらすため　全力で\n攻撃する。　なついて　いないほど\n威力は　あがる。"
    en: "A full-power attack that grows more\npowerful the less the user likes\nits Trainer."
    fr: "Moins le Pokémon aime son Dresseur, plus cette\nattaque est puissante."
    it: "Mossa che diventa tanto più potente quanto\nminore è il grado di affezione del Pokémon\nper il proprio Allenatore."
    de: "Je unbeliebter der Trainer bei seinem Pokémon ist,\ndesto größer ist die Wirkung."
    es: "Un ataque de gran potencia que resulta más\nfuerte cuanto menos le guste el Entrenador al\nPokémon que lo usa."
    ko: "불만을 풀기 위해서 전력으로\n공격한다. 친밀하지 않을수록\n위력이 올라간다."
tm022:
  names:
    jp_kana: わざマシン２２
    jp_kanji: わざマシン２２
    en: TM22
    fr: CT22
    it: MT22
    de: TM22
    es: MT22
    ko: 기술머신22
  descriptions:
    jp_kana: "１ターンめに　ひかりを　あつめて\n２ターンめに　ひかりの　こうせんを\nはっしゃして　こうげきする。"
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "A two-turn attack. The user gathers\nlight, then blasts a bundled beam on\nthe next turn."
    fr: "Absorbe la lumière au premier tour et envoie un\nrayon puissant au tour suivant."
    it: "Chi la usa assorbe luce al primo turno per\nproiettare un raggio intenso al turno successivo."
    de: "Eine Attacke über 2 Runden. Zunächst wird\nSonnenlicht absorbiert, anschließend erfolgt\nder Angriff."
    es: "Ataque de dos turnos. En el primer turno se\nconcentra luz, y en el segundo se canaliza en\nun rayo para atacar."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
tm023:
  names:
    jp_kana: わざマシン２３
    jp_kanji: わざマシン２３
    en: TM23
    fr: CT23
    it: MT23
    de: TM23
    es: MT23
    ko: 기술머신23
  descriptions:
    jp_kana: "いしや　たまを　なげて　とんでいる\nあいてを　こうげきする。あいては\nうちおとされて　じめんに　おちる。"
    jp_kanji: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。相手は\nうちおとされて　地面に　おちる。"
    en: "The user throws a stone or similar projectile\nto attack an opponent. A flying Pokémon\nwill fall to the ground when it’s hit."
    fr: "Le lanceur jette toutes sortes de projectiles à\nun ennemi. Si ce dernier vole, il tombe au sol."
    it: "Chi la usa lancia una pietra o un proiettile. Può\ncolpire anche un bersaglio in volo e farlo cadere."
    de: "Greift das Ziel mit Steinen und Wurfgeschossen\nan. Fliegende Ziele fallen vom Himmel\nund landen auf dem Boden."
    es: "El usuario ataca lanzando una piedra o un\nproyectil. Puede estrellar contra el suelo al\nobjetivo si vuela."
    ko: "돌이나 구슬을 던져서 날고 있는\n상대를 공격한다.\n맞은 상대는 땅에 떨어진다."
tm024:
  names:
    jp_kana: わざマシン２４
    jp_kanji: わざマシン２４
    en: TM24
    fr: CT24
    it: MT24
    de: TM24
    es: MT24
    ko: 기술머신24
  descriptions:
    jp_kana: "つよい　でんげきを　あびせて\nこうげきする。　あいてを　まひの\nじょうたいに　することが　ある。"
    jp_kanji: "強い　電撃を\n相手に　浴びせて　攻撃する。\nまひ状態に　することが　ある。"
    en: "A strong electric blast crashes down on\nthe target. This may also leave the target\nwith paralysis."
    fr: "Une grosse décharge électrique tombe sur\nl’ennemi. Peut aussi le paralyser."
    it: "Il bersaglio viene colpito da una potente scarica\nelettrica che può anche paralizzarlo."
    de: "Das Ziel wird von einem verheerenden\nStromschlag getroffen. Kann eventuell\nParalyse bewirken."
    es: "Ataca al objetivo con una fuerte descarga\neléctrica que puede llegar a paralizar."
    ko: "강한 전격을\n상대에게 날려서 공격한다.\n마비 상태로 만들 때가 있다."
tm025:
  names:
    jp_kana: わざマシン２５
    jp_kanji: わざマシン２５
    en: TM25
    fr: CT25
    it: MT25
    de: TM25
    es: MT25
    ko: 기술머신25
  descriptions:
    jp_kana: "はげしい　かみなりを　おとして\nこうげきする。　あいてを　まひの\nじょうたいに　することが　ある。"
    jp_kanji: "激しい　雷を\n相手に　落として　攻撃する。\nまひ状態に　することが　ある。"
    en: "A wicked thunderbolt is dropped on\nthe target to inflict damage. This may\nalso leave the target with paralysis."
    fr: "La foudre tombe sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Il nemico è colpito da un lampo molto violento\nche può anche paralizzarlo."
    de: "Das Ziel wird von einem mächtigen Donnerschlag,\nder Paralyse bewirken kann, heimgesucht."
    es: "Ataca con un terrible rayo que puede paralizar al\nobjetivo."
    ko: "강한 번개를\n상대에게 떨어뜨려 공격한다.\n마비 상태로 만들 때가 있다."
tm026:
  names:
    jp_kana: わざマシン２６
    jp_kanji: わざマシン２６
    en: TM26
    fr: CT26
    it: MT26
    de: TM26
    es: MT26
    ko: 기술머신26
  descriptions:
    jp_kana: "じぶんの　まわりの　ポケモンに\nじしんの　しょうげきを　あたえて\nこうげきする。"
    jp_kanji: "自分の　周りの　ポケモンに\n地震の　衝撃を　あたえて\n攻撃する。"
    en: "The user sets off an earthquake that\nstrikes every Pokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa provoca un potente sisma che colpisce\ngli altri Pokémon in campo."
    de: "Ein starkes Beben wird verursacht, das\nden anderen Pokémon in der Umgebung\ndes Angreifers Schaden zufügt."
    es: "Quien lo usa genera un terremoto que afecta a\nlos Pokémon de alrededor en combate."
    ko: "지진의 충격을 일으켜서\n자신의 주위에 있는 포켓몬을\n공격한다."
tm027:
  names:
    jp_kana: わざマシン２７
    jp_kanji: わざマシン２７
    en: TM27
    fr: CT27
    it: MT27
    de: TM27
    es: MT27
    ko: 기술머신27
  descriptions:
    jp_kana: "トレーナーのために　ぜんりょくで\nこうげきする。　なついて　いるほど\nいりょくは　あがる。"
    jp_kanji: "トレーナーの　ために　全力で\n攻撃する。　なついて　いるほど\n威力は　あがる。"
    en: "A full-power attack that grows more\npowerful the more the user likes\nits Trainer."
    fr: "Plus le Pokémon apprécie son Dresseur, plus\nla puissance de cette attaque furieuse augmente."
    it: "Mossa che diventa tanto più potente quanto\nmaggiore è il grado di affezione del Pokémon\nper il proprio Allenatore."
    de: "Je beliebter der Trainer bei seinem Pokémon ist,\ndesto größer ist die Wirkung."
    es: "Un ataque de gran potencia que resulta más\nfuerte cuanto más le guste el Entrenador al\nPokémon que lo usa."
    ko: "트레이너를 위해 전력으로 공격한다.\n친밀할수록 위력이 올라간다."
tm028:
  names:
    jp_kana: わざマシン２８
    jp_kanji: わざマシン２８
    en: TM28
    fr: CT28
    it: MT28
    de: TM28
    es: MT28
    ko: 기술머신28
  descriptions:
    jp_kana: "１ターンめに　もぐり　２ターンめで\nこうげきする。　どうくつで　つかうと\nそとに　だっしゅつ　できる。"
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。\nどうくつからの　脱出も　できる。"
    en: "The user burrows, then attacks\non the next turn. It can also\nbe used to exit dungeons."
    fr: "Le lanceur creuse au premier tour et frappe au\nsecond. Permet aussi de sortir des grottes."
    it: "Chi la usa scava al primo turno e attacca al\nsuccessivo. Fuori dalla lotta fa uscire da alcuni\nluoghi."
    de: "In Runde 1 gräbt sich der Anwender ein und\nin Runde 2 greift er an. Macht Flucht aus Höhlen\nmöglich."
    es: "Quien lo usa cava en el primer turno y ataca en\nel segundo. También se puede usar para escapar\nde lugares cerrados."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다.\n동굴에서 탈출할 수도 있다."
tm029:
  names:
    jp_kana: わざマシン２９
    jp_kanji: わざマシン２９
    en: TM29
    fr: CT29
    it: MT29
    de: TM29
    es: MT29
    ko: 기술머신29
  descriptions:
    jp_kana: "つよい　ねんりきを　おくって\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "強い　念力を　相手に　送って\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The target is hit by a strong telekinetic\nforce. This may also lower the target’s\nSp. Def stat."
    fr: "Une puissante force télékinétique frappe\nl’ennemi. Peut aussi faire baisser sa Défense\nSpéciale."
    it: "Il nemico viene colpito da una potente forza\ntelecinetica che può anche ridurne la Difesa\nSpeciale."
    de: "Ein mächtiger Strahl telekinetischer Energie trifft\ndas Ziel. Die Spezial-Verteidigung des Zieles\nsinkt eventuell."
    es: "Ataca al objetivo con un potente ataque\ntelequinético que le puede bajar la Defensa\nEspecial."
    ko: "강한 염동력을 상대에게 보내어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
tm030:
  names:
    jp_kana: わざマシン３０
    jp_kanji: わざマシン３０
    en: TM30
    fr: CT30
    it: MT30
    de: TM30
    es: MT30
    ko: 기술머신30
  descriptions:
    jp_kana: "くろいかげの　かたまりを　なげて\nこうげきする。　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "黒い影の　塊を　投げつけて\n攻撃する。相手の　特防を\nさげることが　ある。"
    en: "The user hurls a shadowy blob at the\ntarget. This may also lower the target’s\nSp. Def stat."
    fr: "Projette une grande ombre sur l’ennemi.\nPeut aussi faire baisser sa Défense Spéciale."
    it: "Lancia sul nemico una sfera nera.\nPuò anche ridurne la Difesa Speciale."
    de: "Das Ziel wird mit einem dunklen Klumpen\nattackiert, der eventuell die Spezial-Verteidigung\nsenkt."
    es: "Lanza una bola oscura que puede bajar la\nDefensa Especial del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
tm031:
  names:
    jp_kana: わざマシン３１
    jp_kanji: わざマシン３１
    en: TM31
    fr: CT31
    it: MT31
    de: TM31
    es: MT31
    ko: 기술머신31
  descriptions:
    jp_kana: "こぶしなどで　こうげきする。\nひかりのかべや　リフレクターも\nはかいできる。"
    jp_kanji: "硬い　こぶしなどで\n相手を　攻撃する。ひかりのかべや\nリフレクターも　破壊できる。"
    en: "The user attacks with a swift chop.\nIt can also break barriers, such as\nLight Screen and Reflect."
    fr: "Une attaque avec le tranchant de la main.\nPermet aussi de briser les barrières comme\nMur Lumière et Protection."
    it: "Colpisce il nemico con una mano e rompe\nbarriere come Riflesso e Schermoluce."
    de: "Das Ziel wird mit der Handkante angegriffen.\nBarrieren wie Lichtschild oder Reflektor\nwerden zerstört."
    es: "Ataca con contundentes puñetazos. Puede\ndestruir barreras como Pantalla de Luz y Reflejo."
    ko: "주먹 등으로 공격한다.\n빛의장막이나 리플렉터도\n파괴할 수 있다."
tm032:
  names:
    jp_kana: わざマシン３２
    jp_kanji: わざマシン３２
    en: TM32
    fr: CT32
    it: MT32
    de: TM32
    es: MT32
    ko: 기술머신32
  descriptions:
    jp_kana: "すばやい　うごきで　ぶんしんを\nつくる。　あいてを　まどわせることで\nかいひりつを　あげる。"
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes illusory\ncopies of itself to raise its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée des\ncopies illusoires de lui, augmentant son Esquive."
    it: "Chi la usa si muove in fretta e crea copie\nillusorie di se stesso che aumentano la capacità\ndi elusione."
    de: "Der Angreifer ist so schnell, dass virtuelle\nAbbilder generiert werden, die den Fluchtwert\nerhöhen."
    es: "Quien lo usa se mueve tan rápido que deja una\nestela de sí mismo que aumenta la Evasión."
    ko: "재빠른 움직임으로 분신을 만들어\n상대를 혼란시켜\n회피율을 올린다."
tm033:
  names:
    jp_kana: わざマシン３３
    jp_kanji: わざマシン３３
    en: TM33
    fr: CT33
    it: MT33
    de: TM33
    es: MT33
    ko: 기술머신33
  descriptions:
    jp_kana: "５ターンの　あいだ　ふしぎな　かべで\nあいてから　うける　ぶつりわざの\nダメージを　よわめる。"
    jp_kanji: "５ターンの　あいだ　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to\nreduce damage from physical attacks\nfor five turns."
    fr: "Un fabuleux mur de lumière qui réduit les dégâts\ncausés par les attaques physiques durant cinq\ntours."
    it: "Innalza una barriera di luce fantastica che riduce\ni danni degli attacchi fisici per sé e gli alleati\nper cinque turni."
    de: "Eine Wand aus Licht wird für 5 Runden errichtet.\nSie reduziert den Schaden physischer Attacken."
    es: "Impresionante pared de luz que reduce el daño\nde los ataques físicos durante cinco turnos."
    ko: "5턴 동안 이상한 장막으로\n상대에게 받은 물리 기술의\n데미지를 약하게 만든다."
tm034:
  names:
    jp_kana: わざマシン３４
    jp_kanji: わざマシン３４
    en: TM34
    fr: CT34
    it: MT34
    de: TM34
    es: MT34
    ko: 기술머신34
  descriptions:
    jp_kana: "ヘドロの　なみで　じぶんの　まわりに\nいるものを　こうげきする。\nどくに　することが　ある。"
    jp_kanji: "ヘドロの　波で　自分の　周りに\nいるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "The user strikes everything around it by\nswamping the area with a giant sludge wave.\nThis may also poison those hit."
    fr: "Une vague de détritus attaque tous les Pokémon\nautour du lanceur. Peut aussi empoisonner."
    it: "Lancia un’onda di fango che attacca tutti\ni Pokémon nelle vicinanze. Può anche avvelenarli."
    de: "Greift Pokémon in der Nähe des Anwenders mit\neiner Schlammwelle an. Diese werden eventuell\nvergiftet."
    es: "Onda de porquería que afecta a todos los\nPokémon de alrededor y puede causar\nenvenenamiento."
    ko: "오물의 파장으로 자신의 주위에\n있는 포켓몬을 공격한다.\n독 상태로 만들기도 한다."
tm035:
  names:
    jp_kana: わざマシン３５
    jp_kanji: わざマシン３５
    en: TM35
    fr: CT35
    it: MT35
    de: TM35
    es: MT35
    ko: 기술머신35
  descriptions:
    jp_kana: "はげしい　ほのおを　はっしゃして\nこうげきする。　あいてを　やけどの\nじょうたいに　することが　ある。"
    jp_kanji: "激しい　炎を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is scorched with an intense\nblast of fire. This may also leave the\ntarget with a burn."
    fr: "L’ennemi reçoit un torrent de flammes.\nPeut aussi le brûler."
    it: "Il nemico viene colpito da intense fiammate\nche possono anche scottarlo."
    de: "Das Ziel wird in ein Flammenmeer gehüllt.\nVerursacht eventuell Verbrennungen."
    es: "Abrasa al objetivo con una intensa llamarada que\npuede causarle quemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여 공격한다.\n화상 상태로 만들 때가 있다."
tm036:
  names:
    jp_kana: わざマシン３６
    jp_kanji: わざマシン３６
    en: TM36
    fr: CT36
    it: MT36
    de: TM36
    es: MT36
    ko: 기술머신36
  descriptions:
    jp_kana: "きたない　ヘドロを　なげつける。\nあいてを　どくの　じょうたいに\nすることが　ある。"
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target.\nThis may also poison the target."
    fr: "Le lanceur envoie des détritus sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa attacca lanciando fango\nsul bersaglio. Può anche avvelenarlo."
    de: "Das Ziel wird mit Giftschlamm beworfen.\nKann eventuell Vergiftungen hervorrufen."
    es: "Descarga de lodo tóxico que puede llegar a\nenvenenar al objetivo."
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
tm037:
  names:
    jp_kana: わざマシン３７
    jp_kanji: わざマシン３７
    en: TM37
    fr: CT37
    it: MT37
    de: TM37
    es: MT37
    ko: 기술머신37
  descriptions:
    jp_kana: "５ターンの　あいだ　すなあらしで\nじめん　いわ　はがね　タイプいがいに\nダメージを　あたえる。"
    jp_kanji: "５ターンの　あいだ　砂あらしで\nいわ　じめん　はがねタイプ　以外の\nポケモンに　ダメージを　与える。"
    en: "A five-turn sandstorm is summoned\nto hurt all combatants except for\nRock, Ground, and Steel types."
    fr: "Une tempête de sable qui blesse tous les\nPokémon durant cinq tours, sauf ceux de types\nRoche, Sol et Acier."
    it: "Causa una tempesta di sabbia per cinque turni\nche danneggia tutti i tipi in campo esclusi\nTerra, Roccia e Acciaio."
    de: "Ein Sandsturm trifft für 5 Runden alle Pokémon,\naußer die vom Typ Boden, Gestein und Stahl."
    es: "Tormenta de arena de cinco turnos que daña a\ntodos los Pokémon excepto a los de tipo Roca,\nTierra y Acero."
    ko: "5턴 동안 모래바람으로\n바위, 땅, 강철타입 이외의\n포켓몬에게 데미지를 준다."
tm038:
  names:
    jp_kana: わざマシン３８
    jp_kanji: わざマシン３８
    en: TM38
    fr: CT38
    it: MT38
    de: TM38
    es: MT38
    ko: 기술머신38
  descriptions:
    jp_kana: "だいのじの　ほのおで　あいてを\nやきつくす。　やけどの　じょうたいに\nすることが　ある。"
    jp_kanji: "大の字の　炎で\n相手を　焼きつくす。\nやけど状態に　することが　ある。"
    en: "The target is attacked with an intense\nblast of all-consuming fire. This may\nalso leave the target with a burn."
    fr: "Un déluge de flammes ardentes submerge\nl’ennemi. Peut aussi le brûler."
    it: "Investe il nemico con un’intensa fiammata\nche fa terra bruciata. Può anche scottarlo."
    de: "Dem Ziel wird ordentlich eingeheizt.\nKann eventuell Verbrennungen hervorrufen."
    es: "Ataca con una intensa ráfaga de fuego abrasador\nque puede causar quemaduras."
    ko: "큰 대자의 불꽃으로\n상대를 불태운다.\n화상 상태로 만들 때가 있다."
tm039:
  names:
    jp_kana: わざマシン３９
    jp_kanji: わざマシン３９
    en: TM39
    fr: CT39
    it: MT39
    de: TM39
    es: MT39
    ko: 기술머신39
  descriptions:
    jp_kana: "いわを　なげつけ　こうげきする。\nおちた　いわが　うごきを　ふうじて\nあいての　すばやさを　さげる。"
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "Boulders are hurled at the target.\nThis also lowers the target’s Speed\nstat by preventing its movement."
    fr: "Des rochers frappent l’ennemi.\nRéduit aussi sa Vitesse en l’empêchant de se\ndéplacer."
    it: "Colpisce il nemico con rocce. Inoltre, lo rallenta\nriducendone la Velocità."
    de: "Das Ziel wird mit Felsen beworfen.\nSenkt den Initiative-Wert des Zieles."
    es: "Tira rocas que detienen al objetivo y bajan su\nVelocidad."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
tm040:
  names:
    jp_kana: わざマシン４０
    jp_kanji: わざマシン４０
    en: TM40
    fr: CT40
    it: MT40
    de: TM40
    es: MT40
    ko: 기술머신40
  descriptions:
    jp_kana: "すばやい　うごきで　ほんろうする。\nこうげきは　かならず　あいてに\nめいちゅうする。"
    jp_kanji: "素早い　動きで\n相手を　ほんろうして　切りつける。\n攻撃は　必ず　命中する。"
    en: "The user confounds the target with\nspeed, then slashes.\nThis attack never misses."
    fr: "Le lanceur prend l’ennemi de vitesse et le lacère.\nN’échoue jamais."
    it: "Chi la usa attacca il nemico a grande velocità.\nQuesta mossa è infallibile."
    de: "Der Anwender irritiert das Ziel durch\nSchnelligkeit, bevor er angreift.\nDiese Attacke trifft ihr Ziel immer."
    es: "Ataque que desconcierta por su rapidez y que no\nfalla nunca."
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
tm041:
  names:
    jp_kana: わざマシン４１
    jp_kanji: わざマシン４１
    en: TM41
    fr: CT41
    it: MT41
    de: TM41
    es: MT41
    ko: 기술머신41
  descriptions:
    jp_kana: "いちゃもんを　つけて　おなじわざを\nれんぞくで　だせない　ようにする。"
    jp_kanji: "相手に　いちゃもんを　つけて\n同じ　技を　２回　連続で\nだせなくする。"
    en: "The user torments and enrages the\ntarget, making it incapable of using\nthe same move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour l’empêcher\nd’utiliser la même capacité deux fois de suite."
    it: "Chi la usa tormenta e fa infuriare il nemico,\nimpedendogli di usare la stessa mossa\ndue volte di seguito."
    de: "Der Anwender bringt das Ziel in Rage.\nDieses ist nicht mehr in der Lage, eine\nAttacke zweimal hintereinander anzuwenden."
    es: "Atormenta al objetivo y le provoca un ataque de\nira que le impide usar el mismo movimiento dos\nveces seguidas."
    ko: "트집을 잡아서 똑같은 기술을\n연속으로 쓸 수 없게 한다."
tm042:
  names:
    jp_kana: わざマシン４２
    jp_kanji: わざマシン４２
    en: TM42
    fr: CT42
    it: MT42
    de: TM42
    es: MT42
    ko: 기술머신42
  descriptions:
    jp_kana: "どく　まひ　やけど　のじょうたいで\nわざを　だすと　２ばいの　いりょくで\nこうげき　できる。"
    jp_kanji: "自分が　どく　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "An attack move that doubles its power if\nthe user is poisoned, is burned, or\nhas paralysis."
    fr: "Une attaque dont la puissance double lorsque\nle lanceur est empoisonné, paralysé ou brûlé."
    it: "Mossa d’attacco che raddoppia la potenza\nse chi la usa è scottato, avvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert oder leidet\ner unter Verbrennungen, verdoppelt sich die Kraft\nder Attacke."
    es: "Movimiento de ataque que dobla su potencia si\nquien lo utiliza está envenenado, quemado o\nparalizado."
    ko: "독, 마비, 화상 상태에서\n기술을 쓰면 2배의 위력으로\n공격할 수 있다."
tm043:
  names:
    jp_kana: わざマシン４３
    jp_kanji: わざマシン４３
    en: TM43
    fr: CT43
    it: MT43
    de: TM43
    es: MT43
    ko: 기술머신43
  descriptions:
    jp_kana: "ほのおを　まとい　あいてを\nこうげきする。　ちからを　ためて\nじぶんの　すばやさを　あげる。"
    jp_kanji: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    en: "Cloaking itself in flame, the user attacks.\nThen, building up more power,\nthe user raises its Speed stat."
    fr: "Le lanceur s’entoure de flammes pour attaquer\nl’ennemi. Il se concentre et sa Vitesse augmente."
    it: "Chi la usa si copre di fuoco e attacca il bersaglio.\nConcentrandosi aumenta, inoltre, la propria\nVelocità."
    de: "Anwender hüllt sich in Flammen und greift\ndas Ziel an. Er sammelt seine Kräfte und erhöht\nso die eigene Initiative."
    es: "Ataca al objetivo envuelto en llamas. Acumula\nfuerza y hace subir la Velocidad del usuario."
    ko: "불꽃을 둘러 상대를 공격한다.\n힘을 모아서 자신의\n스피드를 올린다."
tm044:
  names:
    jp_kana: わざマシン４４
    jp_kanji: わざマシン４４
    en: TM44
    fr: CT44
    it: MT44
    de: TM44
    es: MT44
    ko: 기술머신44
  descriptions:
    jp_kana: "２ターンの　あいだ　ねむりつづける。\nＨＰと　からだの　いじょうを\nすべて　かいふくする。"
    jp_kanji: "２ターンの　あいだ　眠り続ける。\n自分の　ＨＰと　状態異常を\nすべて　回復する。"
    en: "The user goes to sleep for two turns.\nThis fully restores the user’s HP and\nheals any status conditions."
    fr: "Le lanceur dort pendant deux tours.\nIl regagne tous ses PV et n’a plus de problèmes\nde statut."
    it: "Chi la usa dorme per due turni.\nRecupera però tutti i PS e guarisce da tutti i suoi\nproblemi di stato."
    de: "Anwender wird vollkommen geheilt und schläft\ndie folgenden 2 Runden."
    es: "Restaura todos los PS y cura todos los problemas\nde estado del usuario. Duerme los dos próximos\nturnos."
    ko: "2턴 동안 계속 잠잔다.\n자신의 HP와 상태 이상을\n모두 회복한다."
tm045:
  names:
    jp_kana: わざマシン４５
    jp_kanji: わざマシン４５
    en: TM45
    fr: CT45
    it: MT45
    de: TM45
    es: MT45
    ko: 기술머신45
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を　ゆうわくして\nメロメロにする。　メロメロに　なった\nあいては　わざが　だしにくくなる。"
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If it is the opposite gender of the user,\nthe target becomes infatuated and less\nlikely to attack."
    fr: "Si l’ennemi est du sexe opposé, il tombe\namoureux et rechigne alors à attaquer."
    it: "Se il nemico è del sesso opposto, s’infatua\ne diventa riluttante ad attaccare."
    de: "Gehört das Ziel dem anderen Geschlecht an,\nverliebt es sich und greift eventuell nicht an."
    es: "Si el objetivo es del sexo opuesto, el\nenamoramiento reducirá las probabilidades\nde que ataque."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
tm046:
  names:
    jp_kana: わざマシン４６
    jp_kanji: わざマシン４６
    en: TM46
    fr: CT46
    it: MT46
    de: TM46
    es: MT46
    ko: 기술머신46
  descriptions:
    jp_kana: "こうげきと　どうじに　もちものを\nぬすむ。　じぶんに　もちものが\nあると　しっぱいする。"
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the target’s\nheld item simultaneously. The user can’t\nsteal anything if it already holds an item."
    fr: "Le lanceur attaque la cible et vole son objet.\nLe lanceur ne peut rien voler s’il tient déjà\nun objet."
    it: "Chi la usa attacca il bersaglio e può rubargli\nlo strumento, se non ne ha già uno."
    de: "Der Anwender greift an und stiehlt dem Ziel\ngleichzeitig ein Item, sofern er selbst gerade\nkein Item trägt."
    es: "Quien lo usa ataca y roba el objeto que lleva su\nobjetivo simultáneamente. Si ya lleva un objeto,\nno podrá robar."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
tm047:
  names:
    jp_kana: わざマシン４７
    jp_kanji: わざマシン４７
    en: TM47
    fr: CT47
    it: MT47
    de: TM47
    es: MT47
    ko: 기술머신47
  descriptions:
    jp_kana: "すばやい　うごきで　あいての　あしを\nねらって　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user makes a swift attack on\nthe target’s legs, which lowers the\ntarget’s Speed stat."
    fr: "Un coup rapide qui vise les pieds de l’ennemi\net diminue sa Vitesse."
    it: "Chi la usa colpisce con un attacco fulmineo\nla parte inferiore del corpo del bersaglio,\nriducendone la Velocità."
    de: "Anwender greift mit blitzschnellen Bewegungen\ndie Beine des Zieles an und senkt dessen\nInitiative."
    es: "Ataque rápido dirigido a los pies del objetivo que\nle hace perder Velocidad."
    ko: "재빠른 움직임으로 상대의 다리를\n노려 공격한다.\n상대의 스피드를 떨어뜨린다."
tm048:
  names:
    jp_kana: わざマシン４８
    jp_kanji: わざマシン４８
    en: TM48
    fr: CT48
    it: MT48
    de: TM48
    es: MT48
    ko: 기술머신48
  descriptions:
    jp_kana: "うたで　あいてを　こうげきする。\nみんなで　つかうと　れんぞくで\nだせて　いりょくも　あがる。"
    jp_kanji: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    en: "The user attacks the target with a song.\nOthers can join in the Round and make\nthe attack do greater damage."
    fr: "Le lanceur attaque l’ennemi en chantant.\nSi plusieurs Pokémon déclenchent cette attaque\nà la suite, l’effet augmente."
    it: "Attacca il bersaglio con una melodia. Se usata\ndurante lo stesso turno da più Pokémon, i danni\ninflitti aumentano."
    de: "Angriff mit Gesang. Singt der Anwender mit allen\nim Kanon, kann er die Attacke mehrfach auslösen\nund die Stärke steigt."
    es: "Canto que sirve de ataque. Su fuerza aumenta\ncuantos más Pokémon lo usan en cadena."
    ko: "노래로 상대를 공격한다.\n함께 돌림노래를 하면 계속해서\n쓸 수 있고 위력도 올라간다."
tm049:
  names:
    jp_kana: わざマシン４９
    jp_kanji: わざマシン４９
    en: TM49
    fr: CT49
    it: MT49
    de: TM49
    es: MT49
    ko: 기술머신49
  descriptions:
    jp_kana: "こえで　あいてを　こうげきする。\nまいターン　だれかが　つかうと\nいりょくが　あがる。"
    jp_kanji: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　使い続けると\n威力が　あがる。"
    en: "The user attacks the target with an\nechoing voice. If this move is used\nevery turn, it does greater damage."
    fr: "Un cri retentissant blesse l’ennemi.\nSi le lanceur ou d’autres Pokémon l’utilisent\nà chaque tour, l’effet augmente."
    it: "Attacca il bersaglio con la propria voce\necheggiante. Se usata a ripetizione da uno\no più Pokémon il danno aumenta."
    de: "Angriff mit widerhallender Stimme. Wird dieser\nin jeder Runde von jemandem wiederholt, steigt\ndie Stärke."
    es: "Ataca al objetivo con un susurro. Su fuerza\naumenta si cualquiera de los Pokémon lo usa\nen cada turno."
    ko: "목소리로 상대를 공격한다.\n매 턴 누군가 이 기술을\n계속해서 쓰면 위력이 올라간다."
tm050:
  names:
    jp_kana: わざマシン５０
    jp_kanji: わざマシン５０
    en: TM50
    fr: CT50
    it: MT50
    de: TM50
    es: MT50
    ko: 기술머신50
  descriptions:
    jp_kana: "フルパワーで　ほのおの　こうげき。\nつかったあと　じぶんの　とくこうは\nがくっと　さがる。"
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power.\nThe attack’s recoil harshly lowers the\nuser’s Sp. Atk stat."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse fortement l’Attaque\nSpéciale du lanceur."
    it: "Chi la usa sferra un potente attacco, ma il\ncontraccolpo riduce di molto il suo Attacco\nSpeciale."
    de: "Angriff mit maximaler Kraft und feuriger Energie,\nder gleichzeitig den Spezial-Angriff des Angreifers\nstark senkt."
    es: "Quien lo usa ataca con toda su fuerza, pero ve\nmuy reducido su Ataque Especial."
    ko: "풀 파워로 불꽃 공격을 한다.\n사용한 뒤 자신의 특수공격이\n크게 떨어진다."
tm051:
  names:
    jp_kana: わざマシン５１
    jp_kanji: わざマシン５１
    en: TM51
    fr: CT51
    it: MT51
    de: TM51
    es: MT51
    ko: 기술머신51
  descriptions:
    jp_kana: "かたい　つばさを　あいてに　たたきつけて\nこうげきする。じぶんの　ぼうぎょが\nあがることが　ある。"
    jp_kanji: "硬い　翼を　相手に　たたきつけて\n攻撃する。自分の　防御が\nあがることが　ある。"
    en: "The target is hit with wings of steel.\nThis may also raise the user’s Defense stat."
    fr: "Le lanceur frappe l’ennemi avec des ailes d’acier.\nPeut aussi augmenter la Défense du lanceur."
    it: "Colpisce il bersaglio con ali d’acciaio.\nPuò anche aumentare la Difesa di chi la usa."
    de: "Trifft das Ziel mit Stahlflügeln. Verteidigungs-Wert\ndes Anwenders steigt eventuell."
    es: "Alas macizas que golpean al objetivo y pueden\nsubir la Defensa del usuario."
    ko: "단단한 날개를 상대에게 부딪쳐서\n공격한다. 자신의 방어가\n올라갈 때가 있다."
tm052:
  names:
    jp_kana: わざマシン５２
    jp_kanji: わざマシン５２
    en: TM52
    fr: CT52
    it: MT52
    de: TM52
    es: MT52
    ko: 기술머신52
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nあたった　あいての　とくぼうを\nさげることが　ある。"
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and\nunleashes its power.\nThis may also lower the target’s Sp. Def."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir. Peut aussi baisser la Défense\nSpéciale de l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del Pokémon\ncolpito."
    de: "Ein Angriff mit aller Macht. Die Spezial-\nVerteidigung des Zieles sinkt eventuell."
    es: "Quien lo usa ataca con toda su energía. También\npuede bajar la Defensa Especial del objetivo si lo\nalcanza."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
tm053:
  names:
    jp_kana: わざマシン５３
    jp_kanji: わざマシン５３
    en: TM53
    fr: CT53
    it: MT53
    de: TM53
    es: MT53
    ko: 기술머신53
  descriptions:
    jp_kana: "いのちの　ちからを　あつめて\nこうげきする。　あたった　あいての\nとくぼうを　さげることが　ある。"
    jp_kanji: "自然から　集めた\n命の力を　発射する。\n相手の　特防を　さげることが　ある。"
    en: "The user draws power from nature and\nfires it at the target. This may also\nlower the target’s Sp. Def."
    fr: "Utilise les pouvoirs de la nature pour attaquer\nl’ennemi. Peut aussi baisser sa Défense Spéciale."
    it: "Chi la usa attinge energia dalla natura e la scaglia\ncontro il nemico. Può anche ridurne la Difesa\nSpeciale."
    de: "Entfesselt die Kraft der Natur gegen das Ziel.\nDessen Spezial-Verteidigung sinkt eventuell."
    es: "Extrae energía de la naturaleza y la lanza contra\nel objetivo. También puede reducir su Defensa\nEspecial."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
tm054:
  names:
    jp_kana: わざマシン５４
    jp_kanji: わざマシン５４
    en: TM54
    fr: CT54
    it: MT54
    de: TM54
    es: MT54
    ko: 기술머신54
  descriptions:
    jp_kana: "てかげんして　こうげきする。\nこうげきした　あいての　ＨＰは\nかならず　１　のこる。"
    jp_kanji: "相手の　ＨＰが\n必ず　１だけ　残るように\n手加減して　攻撃する。"
    en: "A restrained attack that prevents the\ntarget from fainting. The target is left\nwith at least 1 HP."
    fr: "Le lanceur retient ses coups pour que l’ennemi\ngarde au moins 1 PV et ne tombe pas K.O."
    it: "Chi la usa trattiene il colpo per impedire al nemico\ndi andare KO, lasciandolo con almeno un PS."
    de: "Eine zurückhaltende Attacke, die eine\nKampfunfähigkeit des Zieles verhindert,\nda dem Ziel mindestens 1 KP bleibt."
    es: "Ataque controlado que impide que el objetivo se\ndebilite al dejarle con un mínimo de 1 PS."
    ko: "상대의 HP가\n반드시 1만큼 남도록\n조절하여 공격한다."
tm055:
  names:
    jp_kana: わざマシン５５
    jp_kanji: わざマシン５５
    en: TM55
    fr: CT55
    it: MT55
    de: TM55
    es: MT55
    ko: 기술머신55
  descriptions:
    jp_kana: "あつく　にえたぎる　みずを\nはっしゃして　こうげきする。\nやけどに　することが　ある。"
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at\nits target. This may also leave the\ntarget with a burn."
    fr: "L’ennemi est attaqué par un jet d’eau bouillante.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Dieses erleidet eventuell\nVerbrennungen."
    es: "Abrasa al objetivo con agua hirviendo y puede\ncausarle quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
tm056:
  names:
    jp_kana: わざマシン５６
    jp_kanji: わざマシン５６
    en: TM56
    fr: CT56
    it: MT56
    de: TM56
    es: MT56
    ko: 기술머신56
  descriptions:
    jp_kana: "どうぐを　なげつけて　こうげきする。\nなげる　もちものに　よって　わざの\nいりょくと　こうかは　かわる。"
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　かわる。"
    en: "The user flings its held item at the target\nto attack. This move’s power and effects\ndepend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient sur l’ennemi.\nLa puissance et les effets dépendent de l’objet."
    it: "Chi la usa lancia il suo strumento addosso\nal nemico. La forza e l’effetto dipendono\ndallo strumento."
    de: "Der Anwender wirft sein Item auf das Ziel.\nDie Kraft und die Wirkung hängen vom\njeweiligen Item ab."
    es: "El usuario ataca al objetivo arrojando el objeto\nque lleve. La potencia y los efectos dependen\ndel objeto arrojado."
    ko: "도구를 내던져서 공격한다.\n던질 물건에 따라 기술의\n위력과 효과가 바뀐다."
tm057:
  names:
    jp_kana: わざマシン５７
    jp_kanji: わざマシン５７
    en: TM57
    fr: CT57
    it: MT57
    de: TM57
    es: MT57
    ko: 기술머신57
  descriptions:
    jp_kana: "でんげきを　あびせて　こうげきする。\nのこった　でんきを　ためて　じぶんの\nとくこうを　あげることが　ある。"
    jp_kanji: "電撃の　束を　相手に\n発射する。電気を　ためて　自分の\n特攻を　あげることが　ある。"
    en: "The user attacks with an electric\ncharge. The user may use any remaining\nelectricity to raise its Sp. Atk stat."
    fr: "Le lanceur tire un rayon chargé d’électricité.\nPeut aussi augmenter son Attaque Spéciale."
    it: "Chi la usa lancia un fascio di elettricità molto\nintensa. Può anche aumentare il proprio Attacco\nSpeciale."
    de: "Greift mit einer elektrischen Entladung an.\nDer Spezial-Angriff des Angreifers steigt eventuell."
    es: "Quien lo usa ataca con una descarga eléctrica y\npuede utilizar la electricidad restante para subir\nsu Ataque Especial."
    ko: "전격의 다발을 상대에게\n발사한다. 전기를 모아서 자신의\n특수공격을 올릴 때가 있다."
tm058:
  names:
    jp_kana: わざマシン５８
    jp_kanji: わざマシン５８
    en: TM58
    fr: CT58
    it: MT58
    de: TM58
    es: MT58
    ko: 기술머신58
  descriptions:
    jp_kana: "つれさった　あいてを　２ターンめに\nそらから　おとして　こうげきする。\nつれさられた　あいては　うごけない。"
    jp_kanji: "連れさった　相手を　２ターン目に\n空から　落として　攻撃する。\n連れさられた　相手は　動けない。"
    en: "The user takes the target into the sky,\nthen drops it during the next turn.\nThe target cannot attack while in the sky."
    fr: "Le lanceur emmène l’ennemi dans les airs au\npremier tour et le lâche dans le vide au second.\nL’ennemi saisi ne peut pas attaquer."
    it: "Porta il bersaglio in cielo e lo scaglia a terra\nal turno successivo. Il bersaglio catturato\nnon può muoversi."
    de: "Das entführte Ziel wird in Runde 2 vom Himmel\nfallen gelassen. In der Luft kann das Ziel nicht\nattackieren."
    es: "Arroja al objetivo por los aires y lo estrella contra\nel suelo en el siguiente turno, impidiéndole\nmoverse en el aire."
    ko: "끌려온 상대를 2턴째에\n하늘에서 떨어뜨려 공격한다.\n끌려간 상대는 움직일 수 없다."
tm059:
  names:
    jp_kana: わざマシン５９
    jp_kanji: わざマシン５９
    en: TM59
    fr: CT59
    it: MT59
    de: TM59
    es: MT59
    ko: 기술머신59
  descriptions:
    jp_kana: "ほのおで　あいてを　こうげきする。\nあいてが　きのみを　もっている　とき\nもやして　つかえなく　する。"
    jp_kanji: "炎で　相手を　攻撃する。\n相手が　きのみを　持っているとき\n燃やして　使えなくする。"
    en: "The user attacks opposing Pokémon with fire.\nIf a Pokémon is holding a certain item, such as a\nBerry, the item becomes burned up and unusable."
    fr: "Des flammes calcinent l’ennemi.\nS’il tient un objet, une Baie par exemple, celui-ci\nest brûlé et devient inutilisable."
    it: "Attacca il nemico con una fiammata. Il fuoco\ndistruggerà le bacche o alcuni tipi di strumenti\nche il Pokémon ha con sé."
    de: "Eine Feuer-Attacke. Trägt das Ziel eine Beere\noder ein ähnliches Item bei sich, wird dieses\nvon den Flammen verzehrt und geht verloren."
    es: "Llamas que golpean a los objetivos adyacentes.\nSi llevan bayas u otros objetos, estos se\nquemarán y ya no se podrán usar."
    ko: "불꽃으로 상대를 공격한다.\n상대가 나무열매를 지니고 있을 때\n불태워서 쓸 수 없게 만든다."
tm060:
  names:
    jp_kana: わざマシン６０
    jp_kanji: わざマシン６０
    en: TM60
    fr: CT60
    it: MT60
    de: TM60
    es: MT60
    ko: 기술머신60
  descriptions:
    jp_kana: "あいてを　おさえつけて\nこうどうの　じゅんばんを\nさいごに　する。"
    jp_kanji: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    en: "The user suppresses the target and\nmakes its move go last."
    fr: "Retient la cible de force, l’obligeant à agir\nen dernier."
    it: "Chi la usa spinge via il bersaglio, costringendolo\nad agire per ultimo."
    de: "Anwender stemmt sich gegen das Ziel und\nbewirkt, dass dieses erst zuletzt angreift."
    es: "Consigue que el objetivo sea el último en\nmoverse."
    ko: "상대를 억눌러서\n행동의 순서를\n마지막으로 만든다."
tm061:
  names:
    jp_kana: わざマシン６１
    jp_kanji: わざマシン６１
    en: TM61
    fr: CT61
    it: MT61
    de: TM61
    es: MT61
    ko: 기술머신61
  descriptions:
    jp_kana: "あおじろく　もえる　あやしげな\nほのおを　はなつ。　あいてを\nやけどの　じょうたいに　する。"
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister, bluish-white\nflame at the target to inflict a burn."
    fr: "Lance une sinistre flamme violette à l’ennemi\npour lui infliger une brûlure."
    it: "Fiamme intense di colore viola causano\nuna scottatura al nemico."
    de: "Feuert eine fiese, blauweiße Flamme auf das Ziel\nab, um Verbrennungen zu verursachen."
    es: "Lanza una siniestra llamarada morada que\nprovoca quemaduras al objetivo."
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
tm062:
  names:
    jp_kana: わざマシン６２
    jp_kanji: わざマシン６２
    en: TM62
    fr: CT62
    it: MT62
    de: TM62
    es: MT62
    ko: 기술머신62
  descriptions:
    jp_kana: "かろやかに　あいてを　こうげきする。\nじぶんが　どうぐを　もっていないと\nおおきな　ダメージを　あたえる。"
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target.\nIf the user is not holding an item,\nthis attack inflicts massive damage."
    fr: "Attaque agile. Si le lanceur ne tient pas d’objet,\nl’attaque inflige davantage de dégâts."
    it: "Attacca rapidamente il bersaglio.\nSe chi la usa non ha uno strumento, infligge\nal nemico grossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt der\nAnwender kein Item bei sich, richtet die Attacke\ngroßen Schaden an."
    es: "Quien lo usa realiza un ataque rápido que\naumenta de potencia si el atacante no lleva\nningún objeto."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
tm063:
  names:
    jp_kana: わざマシン６３
    jp_kanji: わざマシン６３
    en: TM63
    fr: CT63
    it: MT63
    de: TM63
    es: MT63
    ko: 기술머신63
  descriptions:
    jp_kana: "もたせた　どうぐを　つかえなくする。\nトレーナーも　その　ポケモンには\nどうぐを　つかうことが　できない。"
    jp_kanji: "持たせた　道具を　使えなくする。\nトレーナーも　その　ポケモンには\n道具を　使えない。"
    en: "This move prevents the target from\nusing its held item. Its Trainer is\nalso prevented from using items on it."
    fr: "Empêche l’ennemi d’utiliser un objet tenu et\nson Dresseur d’utiliser un objet sur lui."
    it: "Impedisce al nemico di usare il suo strumento\ne al suo Allenatore di usarne altri sul Pokémon."
    de: "Verhindert, dass auf das Ziel Items verwendet\nwerden."
    es: "Impide que el objetivo utilice el objeto que lleve\ny que su Entrenador use objetos sobre él."
    ko: "지니게 한 도구를 쓸 수 없게 한다.\n트레이너도 그 포켓몬에게는\n도구를 쓸 수 없다."
tm064:
  names:
    jp_kana: わざマシン６４
    jp_kanji: わざマシン６４
    en: TM64
    fr: CT64
    it: MT64
    de: TM64
    es: MT64
    ko: 기술머신64
  descriptions:
    jp_kana: "おおきな　ばくはつで　じぶんの\nまわりに　いるものを　こうげきする。\nつかったあと　ひんしに　なる。"
    jp_kanji: "大きな　爆発で　自分の　周りに\nいるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it\nby causing a tremendous explosion.\nThe user faints upon using this move."
    fr: "Le lanceur explose et inflige des dégâts à tous\nles Pokémon autour de lui. Met K.O. le lanceur."
    it: "Chi la usa esplode e infligge danni agli altri\nPokémon in campo, ma poi va KO."
    de: "Diese besondere Attacke verletzt Pokémon\nin der Nähe des Anwenders, der dabei jedoch\nkampfunfähig wird."
    es: "Quien lo usa explosiona en combate e inflige\ndaño a todos los Pokémon a su alrededor.\nEl usuario se debilita."
    ko: "큰 폭발을 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n사용한 뒤 기절한다."
tm065:
  names:
    jp_kana: わざマシン６５
    jp_kanji: わざマシン６５
    en: TM65
    fr: CT65
    it: MT65
    de: TM65
    es: MT65
    ko: 기술머신65
  descriptions:
    jp_kana: "かげで　つくった　するどいツメで\nきりさいて　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "影から　つくった　鋭い　ツメで\n相手を　切り裂く。\n急所に　当たりやすい。"
    en: "The user slashes with a sharp claw\nmade from shadows.\nCritical hits land more easily."
    fr: "Attaque avec une griffe puissante faite d’ombres.\nTaux de critiques élevé."
    it: "Chi la usa attacca con artigli d’ombra che\ncolpiscono con gran forza.\nProbabile brutto colpo."
    de: "Eine Klaue aus Schatten greift das Ziel an.\nDie Volltrefferquote ist dabei sehr hoch."
    es: "Quien lo usa ataca con una afilada garra de\nsombras. Su índice de golpe crítico es muy alto."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
tm066:
  names:
    jp_kana: わざマシン６６
    jp_kanji: わざマシン６６
    en: TM66
    fr: CT66
    it: MT66
    de: TM66
    es: MT66
    ko: 기술머신66
  descriptions:
    jp_kana: "ちからを　ためこみ　こうげきする。\nあいてより　あとに　だせると\nわざの　いりょくは　２ばいに　なる。"
    jp_kanji: "ためこんで　攻撃する。\n相手より　後に　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks.\nIf the user moves after the target,\nthis attack’s power will be doubled."
    fr: "Le lanceur charge son énergie, puis attaque.\nLa puissance est doublée si le lanceur agit\naprès l’ennemi."
    it: "Chi la usa accumula forza, poi attacca.\nLa potenza raddoppia se agisce dopo il Pokémon\nnemico."
    de: "Der Anwender lädt die Attacke auf. Handelt das\nZiel vor dem Anwender, verdoppelt sich die Kraft\nder Attacke."
    es: "Quien lo usa se carga de energía y luego ataca.\nY, si ataca después del objetivo, dobla la\npotencia del ataque."
    ko: "힘을 모아 공격한다.\n상대보다 나중에 쓰면\n기술의 위력은 2배가 된다."
tm067:
  names:
    jp_kana: わざマシン６７
    jp_kanji: わざマシン６７
    en: TM67
    fr: CT67
    it: MT67
    de: TM67
    es: MT67
    ko: 기술머신67
  descriptions:
    jp_kana: "たおれた　みかたの　かたきを　うつ。\nまえの　ターンに　たおされて\nいると　いりょくが　あがる。"
    jp_kanji: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    en: "The user gets revenge for a fainted ally.\nIf an ally fainted in the previous turn,\nthis move becomes more powerful."
    fr: "Venge un Pokémon de l’équipe mis K.O.\nSi un Pokémon de l’équipe a été mis K.O.\nau tour d’avant, l’effet augmente."
    it: "Vendica un alleato messo KO. Se ciò è accaduto\nal turno precedente, il danno è maggiore."
    de: "Anwender rächt einen besiegten Mitstreiter.\nWurde in der vorherigen Runde ein Mitstreiter\nbesiegt, steigt die Kraft."
    es: "Quien lo usa puede vengar a sus amigos. El daño\ncausado será mayor si en el turno anterior han\ndebilitado a alguno."
    ko: "쓰러진 같은 편의 원수를 갚는다.\n앞 턴에서 같은 편이\n쓰러졌다면 위력이 올라간다."
tm068:
  names:
    jp_kana: わざマシン６８
    jp_kanji: わざマシン６８
    en: TM68
    fr: CT68
    it: MT68
    de: TM68
    es: MT68
    ko: 기술머신68
  descriptions:
    jp_kana: "もてる　ちからの　すべてを　あつめて\nとつげきする。　つぎの　ターン\nはんどうで　うごけなくなる。"
    jp_kanji: "持てる　力を　すべて　使って\n相手に　突撃する。\n次の　ターンは　動けなくなる。"
    en: "The user charges at the target using\nevery bit of its power.\nThe user can’t move on the next turn."
    fr: "Le lanceur charge l’ennemi de toute sa puissance\net doit ensuite se reposer au tour suivant."
    it: "Chi la usa carica il nemico usando tutta la sua\nforza, ma al turno successivo deve riposarsi."
    de: "Ein harter Angriff mit aller Energie. Danach muss\nder Anwender sich ausruhen und neue Energie\nsammeln."
    es: "Quien lo usa carga contra el objetivo usando toda\nsu energía y en el turno siguiente tiene que\ndescansar."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다.\n다음 턴은 움직일 수 없다."
tm069:
  names:
    jp_kana: わざマシン６９
    jp_kanji: わざマシン６９
    en: TM69
    fr: CT69
    it: MT69
    de: TM69
    es: MT69
    ko: 기술머신69
  descriptions:
    jp_kana: "からだを　みがきあげて　くうきの\nていこうを　すくなくする。\nすばやさを　ぐーんと　あげる。"
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag.\nThis can sharply raise the Speed stat."
    fr: "Le lanceur polit son corps pour diminuer sa\nrésistance au vent. Augmente fortement la\nVitesse."
    it: "Chi la usa leviga il proprio corpo per\nridurne l’attrito. Aumenta di molto\nla Velocità."
    de: "Der Anwender poliert seinen Körper. Erhöht den\nInitiative-Wert deutlich."
    es: "Quien lo usa reduce la resistencia que ofrece su\ncuerpo y gana mucho en Velocidad."
    ko: "자신의 몸을 닦아 공기의\n저항을 적게 한다. 스피드를\n크게 올릴 수 있다."
tm070:
  names:
    jp_kana: わざマシン７０
    jp_kanji: わざマシン７０
    en: TM70
    fr: CT70
    it: MT70
    de: TM70
    es: MT70
    ko: 기술머신70
  descriptions:
    jp_kana: "まぶしい　ひかりで　あいての\nめいちゅうりつを　さげる。"
    jp_kanji: "まぶしい　光で　相手の\n命中率を　さげる。"
    en: "The user flashes a bright light that cuts\nthe target’s accuracy."
    fr: "Explosion lumineuse qui fait baisser la Précision\nde l’ennemi."
    it: "Investe il nemico con una luce abbagliante\nche ne riduce la precisione."
    de: "Ein blendendes Licht reduziert die Genauigkeit\ndes Zieles."
    es: "Lanza una luz cegadora que reduce la Precisión\ndel objetivo."
    ko: "눈이 부신 빛으로\n상대의 명중률을 떨어뜨린다."
tm071:
  names:
    jp_kana: わざマシン７１
    jp_kanji: わざマシン７１
    en: TM71
    fr: CT71
    it: MT71
    de: TM71
    es: MT71
    ko: 기술머신71
  descriptions:
    jp_kana: "とがった　がんせきを　したから\nつきさして　こうげきする。\nきゅうしょに　あたりやすい。"
    jp_kanji: "とがった　岩を\n相手に　突き刺して　攻撃する。\n急所に　当たりやすい。"
    en: "The user stabs the target with\nsharpened stones from below.\nCritical hits land more easily."
    fr: "Fait surgir des pierres aiguisées sous l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa colpisce il nemico dal basso con\npietre affilate.\nProbabile brutto colpo."
    de: "Angriff mit spitzen Steinen.\nBesitzt eine hohe Volltrefferquote."
    es: "Apuñala al objetivo desde abajo con piedras\nafiladas. Su índice de golpe crítico es muy alto."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
tm072:
  names:
    jp_kana: わざマシン７２
    jp_kanji: わざマシン７２
    en: TM72
    fr: CT72
    it: MT72
    de: TM72
    es: MT72
    ko: 기술머신72
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで　もどってきて\nひかえ　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user\nrushes back to switch places with\na party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute\nvitesse et change de place avec un Pokémon\nde l’équipe prêt au combat."
    it: "Chi usa questa mossa si tira indietro\nper farsi sostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, vuelve a toda prisa para dar paso a\notro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
tm073:
  names:
    jp_kana: わざマシン７３
    jp_kanji: わざマシン７３
    en: TM73
    fr: CT73
    it: MT73
    de: TM73
    es: MT73
    ko: 기술머신73
  descriptions:
    jp_kana: "よわい　でんきを　あびせることで\nあいてを　まひじょうたいに　する。"
    jp_kanji: "弱い　電撃を　浴びせることで\n相手を　まひ状態に　する。"
    en: "The user launches a weak jolt of\nelectricity that paralyzes the target."
    fr: "Un faible choc électrique frappe l’ennemi.\nSi l’attaque le touche, celui-ci est paralysé."
    it: "Il nemico viene colpito da una debole scarica\nelettrica che, se va a segno, ne causa la paralisi."
    de: "Das Ziel wird mit einem schwachen elektrischen\nSchlag angegriffen. Wird es getroffen, wird es\nparalysiert."
    es: "Débil descarga eléctrica que se lanza contra el\nobjetivo y causa parálisis si es certera."
    ko: "약한 전기를 날려\n상대를 마비 상태로 만든다."
tm074:
  names:
    jp_kana: わざマシン７４
    jp_kanji: わざマシン７４
    en: TM74
    fr: CT74
    it: MT74
    de: TM74
    es: MT74
    ko: 기술머신74
  descriptions:
    jp_kana: "からだを　こうそくに　かいてん\nさせて　たいあたりする。　あいてより\nおそいほど　いりょくは　あがる。"
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n遅いほど　強い。"
    en: "The user tackles the target with a high-speed\nspin. The slower the user compared to the\ntarget, the greater the move’s power."
    fr: "Le lanceur effectue une rotation et frappe\nl’ennemi. Plus la Vitesse du lanceur est basse,\nplus il fait de dégâts."
    it: "Chi la usa colpisce il nemico con un vortice\nrapidissimo. Più lento è chi la usa, maggiore\nè il danno."
    de: "Eine verzerrte Drehattacke. Je langsamer der\nAnwender, desto mehr Schaden fügt er zu."
    es: "Quien lo usa ataca al objetivo como un remolino.\nCuanto más lento sea quien lo usa, más daño\ncausa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다\n스피드가 느릴수록 위력은 올라간다."
tm075:
  names:
    jp_kana: わざマシン７５
    jp_kanji: わざマシン７５
    en: TM75
    fr: CT75
    it: MT75
    de: TM75
    es: MT75
    ko: 기술머신75
  descriptions:
    jp_kana: "たたかいのまいを　はげしく　おどり\nきあいを　たかめる。　じぶんの\nこうげきを　ぐーんと　あげる。"
    jp_kanji: "戦いの舞を　激しく　踊って\n気合を　高める。\n自分の　攻撃を　ぐーんと　あげる。"
    en: "A frenetic dance to uplift the fighting\nspirit. This sharply raises the user’s\nAttack stat."
    fr: "Danse frénétique qui exalte l’esprit combatif.\nAugmente beaucoup l’Attaque du lanceur."
    it: "Danza frenetica che incrementa lo spirito\ncombattivo. Chi la usa aumenta di molto\nil proprio Attacco."
    de: "Ein wilder Tanz, der den Kampfgeist erhöhen soll.\nDer Angriffs-Wert des Anwenders steigt deutlich."
    es: "Danza frenética que eleva el espíritu combativo.\nAumenta mucho el Ataque de quien lo usa."
    ko: "싸움의 춤을 격렬하게 춰서\n기세를 높인다.\n자신의 공격을 크게 올린다."
tm076:
  names:
    jp_kana: わざマシン７６
    jp_kanji: わざマシン７６
    en: TM76
    fr: CT76
    it: MT76
    de: TM76
    es: MT76
    ko: 기술머신76
  descriptions:
    jp_kana: "ていこう　して\nあいてを　こうげきする。\nあいての　とくこうを　さげる。"
    jp_kanji: "抵抗して　相手を　攻撃する。\n相手の　特攻を　さげる。"
    en: "While resisting, the user attacks the\nopposing Pokémon. This lowers the\nSp. Atk stat of those hit."
    fr: "Le lanceur se débat de toutes ses forces, et\nbaisse l’Attaque Spéciale de l’ennemi."
    it: "Colpisce i nemici opponendo resistenza\ne riducendo il loro Attacco Speciale."
    de: "Anwender leistet Widerstand und greift an.\nDer Spezial-Angriff der Ziele sinkt."
    es: "El usuario opone resistencia y ataca a los\noponentes. También reduce su Ataque Especial."
    ko: "저항하여 상대를 공격한다.\n상대의 특수공격을 떨어뜨린다."
tm077:
  names:
    jp_kana: わざマシン７７
    jp_kanji: わざマシン７７
    en: TM77
    fr: CT77
    it: MT77
    de: TM77
    es: MT77
    ko: 기술머신77
  descriptions:
    jp_kana: "じぶんに　あんじを　かけることで\nのうりょく　へんかの　じょうたいを\nあいてと　おなじにする。"
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into\ncopying any stat change made\nby the target."
    fr: "Une autohypnose qui permet au lanceur de copier\nles changements de stats de la cible."
    it: "Chi la usa s’ipnotizza per copiare ogni modifica\nalle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um die\nStatusveränderungen des Zieles zu kopieren."
    es: "Quien lo usa se sume en un trance y copia\ncualquier cambio que haya en las características\nde su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
tm078:
  names:
    jp_kana: わざマシン７８
    jp_kanji: わざマシン７８
    en: TM78
    fr: CT78
    it: MT78
    de: TM78
    es: MT78
    ko: 기술머신78
  descriptions:
    jp_kana: "じめんを　ふみならして　じぶんの\nまわりに　いるものを　こうげきする。\nあいての　すばやさを　さげる。"
    jp_kanji: "地面を　踏みならして　自分の\n周りに　いるものを　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user strikes everything around it\nby stomping down on the ground.\nThis lowers the Speed stat of those hit."
    fr: "Le lanceur piétine le sol et inflige des dégâts à\ntous les Pokémon autour de lui. Baisse aussi leur\nVitesse."
    it: "Chi la usa calpesta il terreno e scatena un\nterremoto che danneggia i Pokémon nei paraggi,\nriducendone la Velocità."
    de: "Anwender greift an, indem er den Boden um sich\nherum plattwalzt. Die Initiative aller Pokémon in\nder Umgebung sinkt."
    es: "Sacudida sísmica que afecta a los demás\nPokémon adyacentes y también reduce su\nVelocidad."
    ko: "땅을 힘껏 밟아 자신의\n주위에 있는 포켓몬을 공격한다.\n상대의 스피드를 떨어뜨린다."
tm079:
  names:
    jp_kana: わざマシン７９
    jp_kanji: わざマシン７９
    en: TM79
    fr: CT79
    it: MT79
    de: TM79
    es: MT79
    ko: 기술머신79
  descriptions:
    jp_kana: "つめたい　いきを\nあいてに　ふきつけて　こうげきする。\nかならず　きゅうしょに　あたる。"
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user blows its cold breath on the\ntarget. This attack always results in\na critical hit."
    fr: "Un souffle froid blesse l’ennemi.\nL’effet est toujours critique."
    it: "Chi la usa attacca il bersaglio con un soffio\nd’aria gelida.\nBrutto colpo assicurato."
    de: "Anwender greift an, indem er dem Ziel eisigen\nAtem entgegenhaucht. Volltreffergarantie."
    es: "Quien lo usa ataca lanzando un aliento gélido.\nSiempre resulta en un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
tm080:
  names:
    jp_kana: わざマシン８０
    jp_kanji: わざマシン８０
    en: TM80
    fr: CT80
    it: MT80
    de: TM80
    es: MT80
    ko: 기술머신80
  descriptions:
    jp_kana: "おおきな　がんせきを　なげつけて\nこうげきする。\nあいてを　ひるませることが　ある。"
    jp_kanji: "大きな　岩を\n激しく　ぶつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "Large boulders are hurled at the opposing\nPokémon to inflict damage. This may also\nmake the opposing Pokémon flinch."
    fr: "Envoie de gros rochers sur l’ennemi pour infliger\ndes dégâts. Peut l’apeurer."
    it: "I nemici vengono colpiti da grandi massi\nche possono anche farli tentennare."
    de: "Der Anwender schleudert große Felsbrocken\nauf das Ziel. Dieses schreckt eventuell zurück."
    es: "Arroja grandes rocas para infligir daño. También\npuede hacer retroceder al objetivo."
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다.\n상대를 풀죽게 만들 때가 있다."
tm081:
  names:
    jp_kana: わざマシン８１
    jp_kanji: わざマシン８１
    en: TM81
    fr: CT81
    it: MT81
    de: TM81
    es: MT81
    ko: 기술머신81
  descriptions:
    jp_kana: "カマや　ツメを　ハサミのように\nこうさ　させながら　きりさいて\nこうげきする。"
    jp_kanji: "カマや　ツメを　ハサミのように\n交差させながら　相手を　切り裂く。"
    en: "The user slashes at the target by\ncrossing its scythes or claws as if\nthey were a pair of scissors."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux."
    it: "Chi la usa colpisce il nemico usando le sue falci\no i suoi artigli come se fossero delle forbici."
    de: "Der Anwender greift mit gekreuzten Scheren oder\nKlauen an, als wären diese eine normale Schere."
    es: "Ataca al objetivo con cuchillas o garras que se\ncruzan a modo de tijera."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다."
tm082:
  names:
    jp_kana: わざマシン８２
    jp_kanji: わざマシン８２
    en: TM82
    fr: CT82
    it: MT82
    de: TM82
    es: MT82
    ko: 기술머신82
  descriptions:
    jp_kana: "あいてを　はじきとばして\nひかえの　ポケモンを　ひきずりだす。\nやせいなら　せんとうが　おわる。"
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is knocked away, and a different\nPokémon is dragged out. In the wild, this\nends a battle against a single Pokémon."
    fr: "Un coup puissant qui blesse la cible et l’envoie\nau loin. Dans la nature, met fin au combat."
    it: "Chi la usa fa volar via il bersaglio in modo che\nvenga sostituito. Se il bersaglio è un singolo\nPokémon selvatico, la lotta finisce."
    de: "Fegt das Ziel vom Feld und wechselt es\ngegen ein anderes Pokémon aus.\nBeendet Kämpfe gegen wilde Pokémon."
    es: "Se lleva al objetivo, que es cambiado por otro\nPokémon. Si es un Pokémon salvaje, acaba el\ncombate."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
tm083:
  names:
    jp_kana: わざマシン８３
    jp_kanji: わざマシン８３
    en: TM83
    fr: CT83
    it: MT83
    de: TM83
    es: MT83
    ko: 기술머신83
  descriptions:
    jp_kana: "４ー５ターンの　あいだ　あいてに\nまとわりついて　こうげきする。\nそのあいだ　あいては　にげられない。"
    jp_kanji: "４ー５ターンの　間　相手に\nまとわりついて　攻撃する。\nその間　相手は　逃げられない。"
    en: "The target is infested and attacked\nfor four to five turns.\nThe target can’t flee during this time."
    fr: "Cette attaque perdure pendant quatre à cinq\ntours. L’ennemi ne peut pas fuir au cours de\ncette période."
    it: "Chi la usa lancia un attacco che tormenta\nil bersaglio per quattro o cinque turni, durante\ni quali gli impedisce di fuggire."
    de: "Der Anwender fällt 4 bis 5 Runden lang wie\neine Plage über das Ziel her und greift es an.\nIn diesem Zeitraum kann es nicht fliehen."
    es: "Oprime al enemigo de cuatro a cinco turnos,\ndurante los cuales no podrá huir."
    ko: "4-5턴 동안 상대에게\n엉겨붙어 공격한다.\n그동안 상대는 도망갈 수 없다."
tm084:
  names:
    jp_kana: わざマシン８４
    jp_kanji: わざマシン８４
    en: TM84
    fr: CT84
    it: MT84
    de: TM84
    es: MT84
    ko: 기술머신84
  descriptions:
    jp_kana: "どくに　そまった　しょくしゅや\nうでで　こうげきする。どくの\nじょうたいに　することが　ある。"
    jp_kanji: "毒に　そまった　触手や　腕で\n相手を　突き刺す。\n毒状態に　することが　ある。"
    en: "The target is stabbed with a tentacle\nor arm steeped in poison. This may also\npoison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre plein de poison. Peut aussi\nl’empoisonner."
    it: "Il nemico è colpito da un tentacolo o da un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Ataca con un tentáculo o brazo impregnado de\nveneno que puede llegar a envenenar al objetivo."
    ko: "독에 물든 촉수나 팔로\n상대를 꿰찌른다.\n독 상태로 만들 때가 있다."
tm085:
  names:
    jp_kana: わざマシン８５
    jp_kanji: わざマシン８５
    en: TM85
    fr: CT85
    it: MT85
    de: TM85
    es: MT85
    ko: 기술머신85
  descriptions:
    jp_kana: "ねている　あいての　ゆめを　たべて\nこうげきする。　あたえた　ダメージの\nはんぶん　ＨＰを　かいふくする。"
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping\ntarget. It absorbs half the damage\ncaused to heal its own HP."
    fr: "Le lanceur mange le rêve de l’ennemi endormi.\nLe lanceur récupère en PV la moitié des dégâts\ninfligés."
    it: "Attacco che funziona solo su un nemico\nche dorme. Chi lo usa riceve metà dei PS\npersi dal nemico."
    de: "Wirkt nur auf schlafende Ziele. Angreifer erhält\n50 % des Schadens als KP."
    es: "Solo funciona con objetivos dormidos. Absorbe la\nmitad del daño causado para restaurar los PS de\nquien lo usa."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
tm086:
  names:
    jp_kana: わざマシン８６
    jp_kanji: わざマシン８６
    en: TM86
    fr: CT86
    it: MT86
    de: TM86
    es: MT86
    ko: 기술머신86
  descriptions:
    jp_kana: "くさを　からませて　ころばせる。\nあいてが　おもいほど　わざの\nいりょくは　あがる。"
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and\ntrips it. The heavier the target, the greater\nthe move’s power."
    fr: "L’ennemi est piégé dans de l’herbe qui le fait\ntrébucher. Plus il est lourd, plus il reçoit de\ndégâts."
    it: "Chi la usa intrappola il nemico con l’erba e\nlo fa cadere. Danneggia maggiormente i nemici\npiù pesanti."
    de: "Gras lässt das Ziel straucheln. Je schwerer\ndas Ziel, desto mehr Schaden wird verursacht."
    es: "Atrapa al objetivo con hierbas y lo derriba.\nCuanto más pesado sea el objetivo, más daño\ncausa."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
tm087:
  names:
    jp_kana: わざマシン８７
    jp_kanji: わざマシン８７
    en: TM87
    fr: CT87
    it: MT87
    de: TM87
    es: MT87
    ko: 기술머신87
  descriptions:
    jp_kana: "おこらせて　こんらんさせる。\nいかりで　あいての　こうげきは\nぐーんと　あがってしまう。"
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the\ntarget. However, this also sharply raises\nthe target’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans la\nconfusion, mais augmente fortement son Attaque."
    it: "Chi la usa provoca il bersaglio e lo confonde,\nfacendo aumentare però di molto il suo Attacco."
    de: "Reizt das Ziel und verursacht Verwirrung,\nallerdings wird auch dessen Angriffs-Wert\nstark erhöht."
    es: "Envuelve al objetivo en confusión, pero también\nsube marcadamente su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
tm088:
  names:
    jp_kana: わざマシン８８
    jp_kanji: わざマシン８８
    en: TM88
    fr: CT88
    it: MT88
    de: TM88
    es: MT88
    ko: 기술머신88
  descriptions:
    jp_kana: "じぶんが　おぼえている　わざの　うち\nどれか　１つを　くりだす。\nじぶんが　ねている　ときだけ　つかえる。"
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses\none of the moves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard\npendant qu’il dort."
    it: "Chi la usa sfodera a caso una delle proprie mosse\nmentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm bekannte\nAttacke im Schlaf ein."
    es: "Mientras duerme, usa uno de sus movimientos\nelegido al azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
tm089:
  names:
    jp_kana: わざマシン８９
    jp_kanji: わざマシン８９
    en: TM89
    fr: CT89
    it: MT89
    de: TM89
    es: MT89
    ko: 기술머신89
  descriptions:
    jp_kana: "あいてを　こうげきした　あとに\nひかえの　ポケモンと　いれかわる。"
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user\nrushes back to switch places with a\nparty Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute\nvitesse et change de place avec un Pokémon\nde l’équipe prêt au combat."
    it: "Chi usa questa mossa fa marcia indietro\nper farsi sostituire dopo aver sferrato l’attacco."
    de: "Direkt nach der Attacke tauscht der Angreifer\nmit einem wartenden Pokémon den Platz."
    es: "Después de atacar, quien lo usa cambia\nrápidamente su puesto con un compañero\nque no esté combatiendo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
tm090:
  names:
    jp_kana: わざマシン９０
    jp_kanji: わざマシン９０
    en: TM90
    fr: CT90
    it: MT90
    de: TM90
    es: MT90
    ko: 기술머신90
  descriptions:
    jp_kana: "じぶんの　ＨＰを　すこし　けずって\nぶんしんを　だす。　じぶんの\nかわりに　こうげきを　うける。"
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user makes a copy of itself using\nsome of its HP. The copy serves as\nthe user’s decoy."
    fr: "Le lanceur fait une copie de lui-même en\nsacrifiant quelques PV. La copie sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando\nalcuni PS.\nLa copia serve come esca per il nemico."
    de: "Der Angreifer erschafft aus ein paar eigenen KP\neinen Klon, der als Ablenkung dient."
    es: "Quien lo usa utiliza parte de sus PS para hacer\nuna copia de sí mismo que sirve como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
tm091:
  names:
    jp_kana: わざマシン９１
    jp_kanji: わざマシン９１
    en: TM91
    fr: CT91
    it: MT91
    de: TM91
    es: MT91
    ko: 기술머신91
  descriptions:
    jp_kana: "からだの　ひかりを　いってんに\nあつめ　ひかりを　はなつ。　あいての\nとくぼうを　さげることがある。"
    jp_kanji: "体の　光を　一点に　集めて\n力を　放つ。\n相手の　特防を　さげることが　ある。"
    en: "The user gathers all its light energy\nand releases it at once. This may also\nlower the target’s Sp. Def stat."
    fr: "Le lanceur concentre son énergie lumineuse et\nla fait exploser. Peut aussi baisser la Défense\nSpéciale de l’ennemi."
    it: "Chi la usa attacca raccogliendo e rilasciando\nenergia luminosa. Può anche ridurre la Difesa\nSpeciale del nemico."
    de: "Entfesselt konzentrierte Lichtenergie.\nDie Spezial-Verteidigung des Zieles\nsinkt eventuell."
    es: "Quien lo usa concentra toda su energía lumínica\ny la libera de golpe. Puede reducir la Defensa\nEspecial del objetivo."
    ko: "몸의 빛을 한곳에 모아서\n힘을 쏜다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
tm092:
  names:
    jp_kana: わざマシン９２
    jp_kanji: わざマシン９２
    en: TM92
    fr: CT92
    it: MT92
    de: TM92
    es: MT92
    ko: 기술머신92
  descriptions:
    jp_kana: "まかふしぎな　くうかんを　つくる。\n５ターンの　あいだ　うごきの　おそい\nポケモンから　こうげきできる。"
    jp_kanji: "まかふしぎな　空間を　つくる。\n５ターンの　あいだ\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in\nwhich slower Pokémon get to move\nfirst for five turns."
    fr: "Le lanceur crée une zone étrange où les\nPokémon les plus lents frappent en premier\npendant cinq tours."
    it: "Chi la usa crea una dimensione in cui i Pokémon\npiù lenti agiscono per primi per cinque turni."
    de: "Verzerrt die Raumzeit für 5 Runden.\nLangsamere Pokémon greifen zuerst an."
    es: "Distorsiona el espacio de forma que los Pokémon\nmás lentos consiguen moverse en primer lugar\ndurante cinco turnos."
    ko: "아주 이상한 공간을 만든다.\n5턴 동안 움직임이 느린\n포켓몬부터 공격할 수 있다."
tm093:
  names:
    jp_kana: わざマシン９３
    jp_kanji: わざマシン９３
    en: TM93
    fr: CT93
    it: MT93
    de: TM93
    es: MT93
    ko: 기술머신93
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　ぶつかって　こうげきする。\nじぶんも　ダメージを　うける。"
    jp_kanji: "電気を　まとって\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user shrouds itself in electricity\nand smashes into its target.\nThis also damages the user a little."
    fr: "Une charge électrique violente qui blesse aussi\nlégèrement le lanceur."
    it: "Chi la usa si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce dei danni per il\ncontraccolpo."
    de: "Anwender erzeugt Spannung und greift an,\nindem er auf Kollisionskurs geht. Er erleidet\nselbst leichten Schaden."
    es: "Placaje de alto voltaje que hiere también al\natacante."
    ko: "전기를 두르고\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
tm094:
  names:
    jp_kana: わざマシン９４
    jp_kanji: わざマシン９４
    en: TM94
    fr: CT94
    it: MT94
    de: TM94
    es: MT94
    ko: 기술머신94
  descriptions:
    jp_kana: "つかう　ばしょで　ついかこうか　が\nへんかする　こうげき。ひみつきちを\nつくる　ことも　できる。"
    jp_kanji: "使う場所で　追加効果が\n変化する攻撃。\nひみつきちを　つくる　ことも　できる。"
    en: "An attack whose additional effects\ndepend upon where it was used.\nCan also be used to make a Secret Base."
    fr: "Les effets de cette attaque varient en fonction\nde l’environnement. Permet aussi de créer\nsa propre Base Secrète."
    it: "Questo attacco può avere un effetto aggiuntivo,\nche cambia a seconda del luogo in cui è usato.\nPermette anche di costruire Basi Segrete."
    de: "Angriff, der abhängig vom Anwendungsort\neinen unterschiedlichen Zusatz-Effekt hat.\nAuch zum Einrichten von Geheimbasen einsetzbar."
    es: "Ataque cuyos efectos secundarios varían según el\nentorno de combate. También puede utilizarse\npara construir una Base Secreta."
    ko: "사용하는 장소에 따라 추가 효과가\n변화하는 공격이다. 비밀기지를\n만들 수도 있다."
tm095:
  names:
    jp_kana: わざマシン９５
    jp_kanji: わざマシン９５
    en: TM95
    fr: CT95
    it: MT95
    de: TM95
    es: MT95
    ko: 기술머신95
  descriptions:
    jp_kana: "まくしたてる　ように　どなりつけて\nあいての　とくこうを　さげる。"
    jp_kanji: "まくしたてる　ように　怒鳴りつけて\n相手の　特攻を　さげる。"
    en: "The user yells as if it’s ranting about\nsomething, which lowers the Sp. Atk stat\nof opposing Pokémon."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa si mette a urlare per un po’, riducendo\nl’Attacco Speciale dei nemici intorno."
    de: "Gibt Gegnern mit einer nicht enden wollenden\nStandpauke was auf die Ohren und senkt dabei\nderen Spezial-Angriff."
    es: "Ataca con un chillido desagradable que baja el\nAtaque Especial del rival."
    ko: "호되게 호통을 쳐서\n상대의 특수공격을 떨어뜨린다."
tm096:
  names:
    jp_kana: わざマシン９６
    jp_kanji: わざマシン９６
    en: TM96
    fr: CT96
    it: MT96
    de: TM96
    es: MT96
    ko: 기술머신96
  descriptions:
    jp_kana: "しぜんの　ちからで　こうげきする。\nつかう　ばしょで\nでてくる　わざが　へんかする。"
    jp_kanji: "自然の　力で　攻撃する。\n使う　場所で\nでてくる　技が　変化する。"
    en: "An attack that makes use of nature’s\npower. Its effects vary depending on\nthe user’s environment."
    fr: "Une attaque qui tire sa force de la nature.\nSon type varie selon le terrain."
    it: "Mossa che fa uso della forza della natura.\nIl suo effetto varia in base all’ambiente."
    de: "Angriff mit der Kraft der Natur, dessen Typ vom\nOrt abhängt, an dem er durchgeführt wird."
    es: "Usa el poder de la naturaleza para atacar.\nSu efecto varía según el entorno de combate."
    ko: "자연의 힘으로 공격한다.\n사용하는 장소에 따라\n나오는 기술이 변화한다."
tm097:
  names:
    jp_kana: わざマシン９７
    jp_kanji: わざマシン９７
    en: TM97
    fr: CT97
    it: MT97
    de: TM97
    es: MT97
    ko: 기술머신97
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい　オーラを　はっする。\nあいてを　ひるませる　ことが　ある。"
    jp_kanji: "体から　悪意に　みちた\n恐ろしい　オーラを　発する。\n相手を　ひるませることが　ある。"
    en: "The user releases a horrible aura\nimbued with dark thoughts. This\nmay also make the target flinch."
    fr: "Le lanceur dégage une horrible aura chargée\nd’idées noires. Peut aussi apeurer l’ennemi."
    it: "Chi la usa emana un’aura impregnata di oscuri\npensieri. Può anche far tentennare il Pokémon\ncolpito."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Ziel schreckt eventuell zurück."
    es: "Libera una horrible aura llena de malos\npensamientos y puede hacer retroceder al\nobjetivo."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n상대를 풀죽게 만들 때가 있다."
tm098:
  names:
    jp_kana: わざマシン９８
    jp_kanji: わざマシン９８
    en: TM98
    fr: CT98
    it: MT98
    de: TM98
    es: MT98
    ko: 기술머신98
  descriptions:
    jp_kana: "くりかえし　うつことで\nだんだん　こぶしが　かたくなる。\nあいてに　あてると　こうげきが　あがる。"
    jp_kanji: "くり返し　打つことで\nだんだん　こぶしが　固くなる。\n相手に　あてると　攻撃が　あがる。"
    en: "Striking opponents over and over\nmakes the user’s fists harder.\nHitting a target raises the Attack stat."
    fr: "À force de frapper, les poings deviennent plus\ndurs. Augmente l’Attaque du lanceur si l’ennemi\nest touché."
    it: "Rende i pugni più duri a ogni colpo inferto.\nSe i pugni vanno a segno, l’Attacco di chi\nla usa aumenta."
    de: "Durch wiederholtes Zuschlagen werden die\nFäuste des Anwenders allmählich härter.\nTrifft er den Gegner, steigt sein Angriffs-Wert."
    es: "Cada vez que golpea a un oponente se\nendurecen sus puños. Si acierta al objetivo,\nel Ataque del usuario aumenta."
    ko: "반복해서 쓰면\n점점 주먹이 단단해진다.\n상대에게 맞히면 공격이 올라간다."
tm099:
  names:
    jp_kana: わざマシン９９
    jp_kanji: わざマシン９９
    en: TM99
    fr: CT99
    it: MT99
    de: TM99
    es: MT99
    ko: 기술머신99
  descriptions:
    jp_kana: "きょうりょくな　ひかりを　はなち\nあいてに　ダメージを　あたえる。"
    jp_kanji: "強力な　光を　放ち\n相手に　ダメージを　与える。"
    en: "The user damages opposing Pokémon\nby emitting a powerful flash."
    fr: "Libère une puissante décharge lumineuse qui\ninflige des dégâts à l’ennemi."
    it: "Emette una luce potentissima che infligge danni\nai nemici vicini a chi la usa."
    de: "Angriff mit einem starken Lichtstrahl, der dem\nGegner Schaden zufügt."
    es: Inflige daño a los oponentes con una potente luz.
    ko: "강력한 빛을 쏴서\n상대에게 데미지를 준다."
tm100:
  names:
    jp_kana: わざマシン１００
    jp_kanji: わざマシン１００
    en: TM100
    fr: CT100
    it: MT100
    de: TM100
    es: MT100
    ko: 기술머신100
  descriptions:
    jp_kana: "ないしょばなしを　することで　あいての\nしゅうちゅうりょくを　うしなわせ\nあいての　とくこうを　さげる。"
    jp_kanji: "ないしょばなしを　することで　相手の\n集中力を　失わせ\n相手の　特攻を　さげる。"
    en: "The user tells the target a secret, and\nthe target loses its ability to concentrate.\nThis lowers the target’s Sp. Atk stat."
    fr: "Dévoile des secrets à l’ennemi qui perd sa\nconcentration et voit son Attaque Spéciale\ndiminuer."
    it: "Chi la usa svela dei segreti al bersaglio,\ndistraendolo e riducendone l’Attacco Speciale."
    de: "Der Anwender vertraut dem Ziel ein Geheimnis an.\nDadurch stört er dessen Konzentration und senkt\ndessen Spezial-Angriff."
    es: "Hace que el objetivo pierda la concentración\ncontándole un secreto. Disminuye el Ataque\nEspecial del oponente."
    ko: "비밀 이야기를 함으로써\n상대의 집중력을 잃게 하여\n특수공격을 떨어뜨린다."
tmv_pass:
  names:
    jp_kana: ＴＭＶパス
    jp_kanji: ＴＭＶパス
    en: TMV Pass
    fr: Passe TMV
    it: Pass TMV
    de: TMV-Pass
    es: Abono del TMV
    ko: TMV패스
  descriptions:
    jp_kana: "ミアレシティと　キナンシティを\nむすぶ　ちょうこうそくてつどうに\nいつでも　のれる　チケット。"
    jp_kanji: "ミアレシティと　キナンシティを\n結ぶ　超高速鉄道に\nいつでも　乗れる　チケット。"
    en: "A commuter pass that allows the\nholder to ride the TMV between Lumiose\nCity and Kiloude City at any time."
    fr: "Un abonnement à vie à la ligne de TMV qui relie\nIllumis à Batisques."
    it: "Biglietto che permette di salire liberamente\nsul treno a megavelocità che collega\nLuminopoli e Batikopoli."
    de: "Mit dieser Fahrkarte kannst du jederzeit den\nHochgeschwindigkeitszug nehmen, der zwischen\nIllumina City und Batika City verkehrt."
    es: "Pase que permite realizar viajes ilimitados en el\nTMV que une las ciudades de Luminalia y Batik."
    ko: "미르시티와 기남시티를 잇는\n초고속철도를 언제든지\n탈 수 있는 티켓."
town_map:
  names:
    jp_kana: タウンマップ
    jp_kanji: タウンマップ
    en: Town Map
    fr: Carte
    it: Mappa Città
    de: Karte
    es: Mapa
    ko: 타운맵
  descriptions:
    jp_kana: "いつでも　てがるに　みることが\nできる　べんりな　ちず。\nじぶんの　ばしょも　わかる。"
    jp_kanji: "いつでも　手軽に　みることが\nできる　便利な　地図。\n自分の　場所も　わかる。"
    en: "A very convenient map that can be\nviewed anytime. It even shows you\nyour present location in the region."
    fr: "Une carte très pratique pouvant être consultée\nn’importe quand. Elle indique votre position\nactuelle."
    it: "Utilissima mappa, consultabile in ogni situazione.\nMostra anche la propria posizione in tempo reale."
    de: "Eine praktische Karte, die jederzeit aufgerufen\nwerden kann. Dein aktueller Standort wird auch\nangezeigt."
    es: "Un mapa muy útil que puede consultarse en\ncualquier momento y que, además, te indica\ndónde te encuentras."
    ko: "언제라도 간편하게 볼 수\n있는 편리한 지도.\n자신이 있는 곳도 알 수 있다."
toxic_orb:
  names:
    jp_kana: どくどくだま
    jp_kanji: どくどくだま
    en: Toxic Orb
    fr: Orbe Toxique
    it: Tossicsfera
    de: Toxik-Orb
    es: Toxisfera
    ko: 맹독구슬
  descriptions:
    jp_kana: "さわると　どくをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nもうどくの　じょうたいに　なる。"
    jp_kanji: "触ると　毒をだす　不思議な玉。\n持たせると　戦闘中に\n猛毒の　状態に　なる。"
    en: "An item to be held by a Pokémon.\nIt is a bizarre orb that will badly\npoison the holder during battle."
    fr: "Objet à tenir. Un orbe bizarre empoisonnant\ngravement son porteur durant le combat."
    it: "Strumento da dare a un Pokémon.\nSfera bizzarra che iperavvelena chi l’ha con sé\nin una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb vergiftet\nseinen Träger im Kampf schwer."
    es: "Extraña esfera que envenena gravemente al\nPokémon que la lleva en combate."
    ko: "만지면 독을 발산하는 이상한 구슬.\n지니게 하면 배틀 중에\n맹독 상태가 된다."
toxic_plate:
  names:
    jp_kana: もうどくプレート
    jp_kanji: もうどくプレート
    en: Toxic Plate
    fr: Plaque Toxik
    it: Lastrafiele
    de: Gifttafel
    es: Tabla Tóxica
    ko: 맹독플레이트
  descriptions:
    jp_kana: "どくの　タイプの　せきばん。\nもたせると　どくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "どくの　タイプの　石盤。\n持たせると　どくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Poison-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Poison."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Veleno."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Gift."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Veneno. Debe llevarla un Pokémon."
    ko: "독타입의 석판.\n지니게 하면 독타입\n기술의 위력이 강해진다."
travel_trunk:gold:
  names:
    jp_kana: いしょうトランク
    jp_kanji: いしょうトランク
    en: Travel Trunk
    fr: Malle Penderie
    it: Baule per abiti
    de: Kleiderkoffer
    es: Maleta
    ko: 의상트렁크
  descriptions:
    jp_kana: "どんな　ファッションアイテムでも\nつめこんでおける　しゅうのうりょく\nばつぐんの　かるい　トランク。"
    jp_kanji: "どんな　ファッションアイテムでも\n詰めこんでおける　収納力\n抜群の　軽い　トランク。"
    en: "A light and yet incredibly effective\ntrunk, which can contain every last\npiece of clothing that can be bought."
    fr: "Une valise extrêmement légère, parfaite pour\nstocker un grand nombre de vêtements et\nd’accessoires de mode."
    it: "Un baule leggero ma estremamente capiente\nche può contenere qualsiasi capo\nd’abbigliamento."
    de: "Ein leichter und sehr hilfreicher Koffer mit so viel\nStauraum, dass jedes erdenkliche Kleidungsstück\nund Accessoire darin aufbewahrt werden kann."
    es: "Baúl ligero de increíble capacidad donde pueden\nguardarse todas las prendas de ropa adquiridas."
    ko: "어떤 패션 아이템이라도\n담아둘 수 있고 가벼우며\n수납력이 뛰어난 트렁크."
travel_trunk:silver:
  names:
    jp_kana: いしょうトランク
    jp_kanji: いしょうトランク
    en: Travel Trunk
    fr: Malle Penderie
    it: Baule per abiti
    de: Kleiderkoffer
    es: Maleta
    ko: 의상트렁크
  descriptions:
    jp_kana: "どんな　ファッションアイテムでも\nつめこんでおける　しゅうのうりょく\nばつぐんの　かるい　トランク。"
    jp_kanji: "どんな　ファッションアイテムでも\n詰めこんでおける　収納力\n抜群の　軽い　トランク。"
    en: "A light and yet incredibly effective\ntrunk, which can contain every last\npiece of clothing that can be bought."
    fr: "Une valise extrêmement légère, parfaite pour\nstocker un grand nombre de vêtements et\nd’accessoires de mode."
    it: "Un baule leggero ma estremamente capiente\nche può contenere qualsiasi capo\nd’abbigliamento."
    de: "Ein leichter und sehr hilfreicher Koffer mit so viel\nStauraum, dass jeder Kleidungsartikel und jedes\nAccessoire darin aufbewahrt werden kann."
    es: "Baúl ligero de increíble capacidad donde pueden\nguardarse todas las prendas de ropa adquiridas."
    ko: "어떤 패션 아이템이라도\n담아둘 수 있고 가벼우며\n수납력이 뛰어난 트렁크."
twisted_spoon:
  names:
    jp_kana: まがったスプーン
    jp_kanji: まがったスプーン
    en: Twisted Spoon
    fr: Cuiller Tordue
    it: Cucchiaio Torto
    de: Krummlöffel
    es: Cuchara Torcida
    ko: 휘어진스푼
  descriptions:
    jp_kana: "ねんりきを　こめた　スプーン。\nもたせると　エスパータイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "念力を　こめた　スプーン。\n持たせると　エスパータイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis spoon is imbued with telekinetic\npower and boosts Psychic-type moves."
    fr: "Objet à tenir. Une cuiller contenant un pouvoir\ntélékinétique qui augmente la puissance des\ncapacités de type Psy."
    it: "Strumento da dare a un Pokémon.\nCucchiaio dotato di potere telecinetico che\npotenzia le mosse di tipo Psico."
    de: "Ein Item zum Tragen. Ein Löffel voller\ntelekinetischer Energie, der Attacken vom\nTyp Psycho verstärkt."
    es: "Cuchara imbuida de energía telequinética que\npotencia los movimientos de tipo Psíquico.\nDebe llevarla un Pokémon."
    ko: "염동력을 담은 숟가락.\n지니게 하면 에스퍼타입\n기술의 위력이 올라간다."
tyranitarite:
  names:
    jp_kana: バンギラスナイト
    jp_kanji: バンギラスナイト
    en: Tyranitarite
    fr: Tyranocivite
    it: Tyranitarite
    de: Despotarnit
    es: Tyranitarita
    ko: 마기라스나이트
  descriptions:
    jp_kana: "バンギラスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "バンギラスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Tyranitar hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Tyranocif, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Tyranitar, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Despotar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Tyranitar en combate."
    ko: "마기라스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
ultra_ball:
  names:
    jp_kana: ハイパーボール
    jp_kanji: ハイパーボール
    en: Ultra Ball
    fr: Hyper Ball
    it: Ultra Ball
    de: Hyperball
    es: Ultra Ball
    ko: 하이퍼볼
  descriptions:
    jp_kana: "スーパーボールよりも　さらに\nポケモンを　つかまえやすくなった\nすごく　せいのうのいい　ボール。"
    jp_kanji: "スーパーボールよりも　さらに\nポケモンを　捕まえやすくなった\nすごく　性能のいい　ボール。"
    en: "An ultra-high-performance Poké Ball\nthat provides a higher success rate for\ncatching Pokémon than a Great Ball."
    fr: "Une Ball ultraperformante dont le taux de\nréussite est supérieur à celui de la Super Ball."
    it: "Poké Ball dalle prestazioni eccellenti:\nfornisce maggiori probabilità di cattura rispetto\nalla Mega Ball."
    de: "Ein Ball mit hoher Erfolgsquote. Dem Superball in\nallen Punkten überlegen."
    es: "Poké Ball de rendimiento superior. Tiene un\níndice de éxito mayor al de la Super Ball."
    ko: "수퍼볼보다도 더욱\n포켓몬을 잡기 쉬워진\n매우 성능이 좋은 볼."
unown_report:
  names:
    jp_kana: アンノーンノート
    jp_kanji: アンノーンノート
    en: Unown Report
    fr: Carnet Zarbi
    it: UnownBloc
    de: Icognitoheft
    es: Bloc Unown
    ko: 안농노트
  descriptions:
    jp_kana: "みつけた　アンノーンの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "みつけた　アンノーンの　ようすが\n記録されている　ノート。"
    en: "A report of all the discovered kinds\nof Unown."
    fr: "Un carnet permettant de noter toutes les formes\nde Zarbi capturées."
    it: "Quaderno dove si registrano tutte le forme\ndi Unown catturate."
    de: "Ein Heft, in dem automatisch Daten zu bereits\ngefangenen Icognito aufgezeichnet werden."
    es: "Bloc que almacena la información de los Unown\ncapturados hasta el momento."
    ko: "발견한 안농의 모습이\n기록되어 있는 노트."
upgrade:
  names:
    jp_kana: アップグレード
    jp_kanji: アップグレード
    en: Up-Grade
    fr: Améliorator
    it: Upgrade
    de: Up-Grade
    es: Mejora
    ko: 업그레이드
  descriptions:
    jp_kana: "なかに　いろんな　じょうほうが\nつまった　とうめいな　きかい。\nシルフ　カンパニーせい。"
    jp_kanji: "中に　いろんな　情報が\nつまった　透明な　機械。\nシルフ　カンパニー製。"
    en: "A transparent device somehow\nfilled with all sorts of data.\nIt was produced by Silph Co."
    fr: "Un dispositif transparent rempli de données\ndiverses et variées. Fabriqué par la Sylphe SARL."
    it: "Apparecchio trasparente pieno zeppo di dati\ndi ogni tipo. È un prodotto della Silph SpA."
    de: "Ein durchsichtiges Gerät. Es enthält alle\nmöglichen Daten. Hergestellt von Silph Co."
    es: "Peculiar dispositivo fabricado en Silph S. A. que\ncontiene todo tipo de datos."
    ko: "안에 여러 가지 정보가\n가득한 투명한 기계다.\n실프주식회사 제품."
venusaurite:
  names:
    jp_kana: フシギバナイト
    jp_kanji: フシギバナイト
    en: Venusaurite
    fr: Florizarrite
    it: Venusaurite
    de: Bisaflornit
    es: Venusaurita
    ko: 이상해꽃나이트
  descriptions:
    jp_kana: "フシギバナに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "フシギバナに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Venusaur hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Florizarre, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Venusaur, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Bisaflor getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Venusaur en combate."
    ko: "이상해꽃에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
vs_recorder:
  names:
    jp_kana: バトルレコーダー
    jp_kanji: バトルレコーダー
    en: Vs. Recorder
    fr: Magnéto VS
    it: Registradati
    de: Kampfkamera
    es: Cámara Lucha
    ko: 배틀레코더
  descriptions:
    jp_kana: "ともだち　との　しょうぶや\nとくしゅな　しせつでの　しょうぶを\nきろくできる　かっこいい　きかい。"
    jp_kanji: "友達との　勝負や\n特殊な　施設での　勝負を\n記録できる　かっこいい　機械。"
    en: "An amazing device that can record a\nbattle between friends or the battles\nat certain special battle facilities."
    fr: "Un appareil utile permettant d’enregistrer les\ncombats entre amis et ceux ayant lieu dans\nun bâtiment de combat."
    it: "Fantastico dispositivo che registra le lotte\ntra amici o quelle che hanno luogo in alcuni\nedifici dedicati alla lotta."
    de: "Ein tolles Gerät, um Kämpfe zwischen Freunden\noder Kämpfe in einer speziellen Kampfeinrichtung\naufzuzeichnen."
    es: "Un fantástico dispositivo que graba combates\nentre amigos o celebrados en algún recinto\nespecial."
    ko: "친구와의 승부나\n특수한 시설에서의 승부를\n기록할 수 있는 멋있는 기계."
vs_seeker:
  names:
    jp_kana: バトルサーチャー
    jp_kanji: バトルサーチャー
    en: Vs. Seeker
    fr: Cherche VS
    it: Cercasfide
    de: Kampffahnder
    es: Buscapelea
    ko: 배틀서처
  descriptions:
    jp_kana: "たたかいたい　トレーナーを\nおしえてくれる　きかい。\nあるくと　でんちが　たまる。"
    jp_kanji: "戦いたい　トレーナーを\n教えてくれる　機械。\n歩くと　電池が　たまる。"
    en: "A device that indicates Trainers who\nwant to battle. Its battery charges\nwhile you walk."
    fr: "Un appareil indiquant les Dresseurs prêts à\nse battre. La batterie se recharge quand vous\nmarchez."
    it: "Apparecchio per trovare gli Allenatori che\nvogliono lottare. La batteria si ricarica\ncamminando."
    de: "Ein Gerät, das rückkampfwillige Trainer ausfindig\nmacht. Die Batterie lädt sich beim Reisen auf."
    es: "Dispositivo que busca Entrenadores listos para el\ncombate. La batería se carga mientras caminas."
    ko: "싸우고 싶어하는 트레이너를\n알려주는 기계.\n걸으면 전지가 충전된다."
wacan_berry:
  names:
    jp_kana: ソクノのみ
    jp_kanji: ソクノのみ
    en: Wacan Berry
    fr: Baie Parma
    it: Baccaparmen
    de: Kerzalbeere
    es: Baya Gualot
    ko: 초나열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　でんき　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　でんき技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Electric-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Électrik."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Elettro del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Elektro."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Eléctrico de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 전기 기술을\n당했을 때 위력이 약해진다."
wailmer_pail:
  names:
    jp_kana: ホエルコじょうろ
    jp_kanji: ホエルコじょうろ
    en: Wailmer Pail
    fr: Wailmerrosoir
    it: Vaso Wailmer
    de: Wailmerkanne
    es: Wailmegadera
    ko: 고래왕자물뿌리개
  descriptions:
    jp_kana: "みずを　かける　どうぐ。\nつちに　うめた　きのみを\nすくすく　そだてる。"
    jp_kanji: "みずを　かける　道具。\n土に　うめた　きのみを\nすくすく　育てる。"
    en: "This is a tool for watering Berries you planted\nto make them grow more quickly."
    fr: Sert à arroser les Baies plantées dans le sol.
    it: "Annaffiatoio a forma di Wailmer che aiuta\na far crescere rigogliose le piantine di bacche."
    de: "Eine Gießkanne. Gießt du mit ihr im Boden\nangepflanzte Beeren, wachsen sie schneller."
    es: "Regadera con forma de Wailmer. Muy útil para\nque crezcan las bayas plantadas."
    ko: "물을 주는 도구.\n땅에 심은 나무열매를\n쑥쑥 키운다."
water_gem:
  names:
    jp_kana: みずのジュエル
    jp_kanji: みずのジュエル
    en: Water Gem
    fr: Joyau Eau
    it: Bijouacqua
    de: Wasserjuwel
    es: Gema Agua
    ko: 물주얼
  descriptions:
    jp_kana: "みずの　タイプの　ジュエル。\nもたせると　いちどだけ　みずの\nわざの　いりょくが　つよまる。"
    jp_kanji: "みずの　タイプの　ジュエル。\n持たせると　１度だけ　みずの\n技の　威力が　強まる。"
    en: "A gem with an essence of water.\nWhen held, it strengthens the power\nof a Water-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Eau."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Acqua."
    de: "Ein Juwel vom Typ Wasser. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Wasser."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Agua. Debe llevarla\nun Pokémon."
    ko: "물타입의 주얼.\n지니게 하면 한 번만 물\n기술의 위력이 강해진다."
water_stone:
  names:
    jp_kana: みずのいし
    jp_kanji: みずのいし
    en: Water Stone
    fr: Pierre Eau
    it: Pietraidrica
    de: Wasserstein
    es: Piedra Agua
    ko: 물의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nすんだ　みずいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\n澄んだ　水色を　している。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt is the blue of a pool of clear water."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle est de couleur bleue."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Ha delle macchioline azzurre."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er ist hellblau."
    es: "Curiosa piedra que hace evolucionar a\ndeterminadas especies de Pokémon. Es de\ncolor azul."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n투명한 푸른색을 띠고 있다."
watmel_berry:
  names:
    jp_kana: カイスのみ
    jp_kanji: カイスのみ
    en: Watmel Berry
    fr: Baie Stekpa
    it: Baccacomero
    de: Wasmelbeere
    es: Baya Sambia
    ko: 슈박열매
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter l’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian el ingenio. Es una baya muy rara en\notras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
wave_incense:
  names:
    jp_kana: さざなみのおこう
    jp_kanji: さざなみのおこう
    en: Wave Incense
    fr: Encens Vague
    it: Ondaroma
    de: Wellenrauch
    es: Incienso Aqua
    ko: 잔물결향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせると　みずタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせると　みずタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense boosts\nthe power of Water-type moves."
    fr: "Objet à tenir. Un encens au parfum curieux\naugmentant la puissance des capacités de\ntype Eau."
    it: "Strumento da dare a un Pokémon.\nIncenso dal curioso aroma che potenzia le mosse\ndi tipo Acqua."
    de: "Ein Item zum Tragen. Sein ausgefallenes Aroma\nverstärkt Attacken vom Typ Wasser."
    es: "Tiene un curioso aroma que potencia los\nmovimientos de tipo Agua. Debe llevarlo un\nPokémon."
    ko: "이상한 향기의 향로.\n지니게 하면 물타입\n기술의 위력이 올라간다."
weakness_policy:
  names:
    jp_kana: じゃくてんほけん
    jp_kanji: じゃくてんほけん
    en: Weakness Policy
    fr: Vulné-Assurance
    it: Vulneropolizza
    de: Schwächenschutz
    es: Seguro Debilidad
    ko: 약점보험
  descriptions:
    jp_kana: "じゃくてんを　つかれたとき\nこうげきと　とくこうが\nそれぞれ　ぐーんと　あがる。"
    jp_kanji: "弱点を　つかれたとき\n攻撃と　特攻が\nそれぞれ　ぐーんと　あがる。"
    en: "An item to be held by a Pokémon.\nAttack and Sp. Atk sharply increase\nif the holder is hit with a move it’s weak to."
    fr: "Objet à tenir. Augmente beaucoup l’Attaque et\nl’Attaque Spéciale du Pokémon lorsqu’il reçoit\nun coup d’un type auquel il est vulnérable."
    it: "Se il Pokémon viene colpito da una mossa contro\ncui è debole, l’Attacco e l’Attacco Speciale\naumentano considerevolmente."
    de: "Erhöht den Angriff und den Spezial-Angriff des\nTrägers stark, wenn er von einer sehr effektiven\nAttacke getroffen wird."
    es: "Aumenta mucho el Ataque y el Ataque Especial\ncuando el Pokémon que lo lleva recibe un ataque\nfrente al cual es débil."
    ko: "약점을 공격당했을 때\n공격과 특수공격이\n각각 크게 올라간다."
wepear_berry:
  names:
    jp_kana: セシナのみ
    jp_kanji: セシナのみ
    en: Wepear Berry
    fr: Baie Repoi
    it: Baccapera
    de: Nirbebeere
    es: Baya Peragu
    ko: 서배열매
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nみどりいろの　みは　たべると　にがい。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\n緑色の実は　食べると　苦い。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness. Its green flesh is bitter when eaten."
    fr: "Une Baie verte au goût amer, utilisée pour\npréparer des Pokéblocs permettant d’augmenter\nl’Intelligence d’un Pokémon."
    it: "Bacca verde dal sapore amaro usata\nper creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIhr grünes Fruchtfleisch schmeckt bitter."
    es: "Se utiliza en la producción de Pokécubos que\npotencian el ingenio. Es de color verde y sabor\namargo."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n초록색 열매는 먹으면 쓰다."
whipped_dream:
  names:
    jp_kana: ホイップポップ
    jp_kanji: ホイップポップ
    en: Whipped Dream
    fr: Chantibonbon
    it: Dolcespuma
    de: Sahnehäubchen
    es: Dulce de Nata
    ko: 휘핑팝
  descriptions:
    jp_kana: "ふんわり　ふわふわに　あわだてた\nほんのり　あまい　クリーム。\nある　ポケモンが　このんでいる。"
    jp_kanji: "ふんわり　ふわふわに　泡立てた\nほんのり　甘い　クリーム。\nある　ポケモンが　好んでいる。"
    en: "A soft and sweet treat made of fluffy,\npuffy, whipped and whirled cream.\nIt’s loved by a certain Pokémon."
    fr: "Une crème sucrée qui fond dans la bouche,\nlégère comme un nuage. Elle est appréciée\nd’un certain Pokémon."
    it: "Una spuma soffice, delicata e leggermente dolce.\nPiace a un Pokémon in particolare."
    de: "Ein lockeres, leicht süßliches Häubchen\naus Schlagsahne, das bei einer bestimmten\nPokémon-Art sehr beliebt ist."
    es: "Un dulce a base de suave y esponjosa nata\nmontada. A algunos Pokémon les encanta."
    ko: "풍성하게 거품을 낸\n살짝 달콤한 크림.\n어떤 포켓몬이 좋아한다."
white_apricorn:
  names:
    jp_kana: しろぼんぐり
    jp_kanji: しろぼんぐり
    en: White Apricorn
    fr: Noigrume Blc
    it: Ghicocca Bianca
    de: Aprikoko Wss
    es: Bonguri Blanco
    ko: 하얀규토리
  descriptions:
    jp_kana: "しろい　ぼんぐり。\nなんの　においも　しない。"
    jp_kanji: "しろい　ぼんぐり。\nなんの　においも　しない。"
    en: "A white Apricorn.\nIt doesn’t smell like anything."
    fr: "Un Noigrume de couleur blanche.\nIl ne dégage aucun arôme."
    it: "Una Ghicocca di colore bianco.\nNon emana alcun odore."
    de: "Eine weiße Aprikoko.\nRiecht nach überhaupt nichts."
    es: "Bonguri de color blanco que no desprende aroma\nalguno."
    ko: "하얀색의 규토리.\n어떠한 향기도 나지 않는다."
white_flute:
  names:
    jp_kana: しろいビードロ
    jp_kanji: しろいビードロ
    en: White Flute
    fr: Flûte Blanche
    it: Flauto Bianco
    de: Weiße Flöte
    es: Flauta Blanca
    ko: 하양비드로
  descriptions:
    jp_kana: "しろいガラスで　できた　ふえ。\nつかった　ばしょで　よわいポケモンと\nそうぐう　しやすくなる。"
    jp_kanji: "白いガラスで　できた　笛。\n使った　場所で　弱いポケモンと\n遭遇　しやすくなる。"
    en: "A flute made from white glass.\nIt makes it easier to encounter weak\nPokémon in the place you use it."
    fr: "Un jouet en forme de flûte en verre blanc.\nAugmente les chances de rencontrer des\nPokémon sauvages faibles où l’on en joue."
    it: "Flauto fatto di vetro bianco. Aumenta\nle probabilità di incontrare Pokémon deboli\nnell’area in cui viene usato."
    de: "Eine Spielzeugflöte aus weißem Glas.\nErhöht am Einsatzort die Wahrscheinlichkeit,\nschwachen wilden Pokémon zu begegnen."
    es: "Una flauta de cristal blanco cuyas notas atraen a\nPokémon salvajes más débiles al lugar en el que\nse usa."
    ko: "하얀 유리로 만들어진 피리.\n사용한 장소에서 약한 포켓몬과\n만나기 쉬워진다."
white_herb:
  names:
    jp_kana: しろいハーブ
    jp_kanji: しろいハーブ
    en: White Herb
    fr: Herbe Blanche
    it: Erbachiara
    de: Schlohkraut
    es: Hierba Blanca
    ko: 하양허브
  descriptions:
    jp_kana: "もたせた　ポケモンの　のうりょくが\nさがったとき　いちどだけ　もとの\nじょうたいに　もどす。"
    jp_kanji: "持たせた　ポケモンの　能力が\nさがったとき　１度だけ　もとの\n状態に　戻す。"
    en: "An item to be held by a Pokémon.\nIt will restore any lowered stat in\nbattle. It can be used only once."
    fr: "Objet à tenir. Restaure les stats qui ont subi une\nbaisse. Ne peut être utilisé qu’une fois."
    it: "Strumento da dare a un Pokémon.\nRipristina le statistiche ridotte in lotta.\nSi può usare una sola volta."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es hebt einmalig jede\nnegative Statusveränderung auf."
    es: "Restaura cualquier característica reducida en\ncombate. Solo se puede usar una vez. Debe\nllevarla un Pokémon."
    ko: "지니게 한 포켓몬의 능력이\n떨어졌을 때 한 번만 원래\n상태로 돌아온다."
wide_lens:
  names:
    jp_kana: こうかくレンズ
    jp_kanji: こうかくレンズ
    en: Wide Lens
    fr: Loupe
    it: Grandelente
    de: Großlinse
    es: Lupa
    ko: 광각렌즈
  descriptions:
    jp_kana: "ものが　おおきく　みえる　レンズ。\nもたせると　わざの　めいちゅうりつが\nすこし　あがる。"
    jp_kanji: "ものが　大きく　みえる　レンズ。\n持たせると　技の　命中率が\n少し　あがる。"
    en: "An item to be held by a Pokémon.\nIt’s a magnifying lens that slightly\nboosts the accuracy of moves."
    fr: "Objet à tenir. Une magnifique loupe augmentant\nun peu la Précision des capacités."
    it: "Strumento da dare a un Pokémon.\nLente d’ingrandimento che aumenta di poco\nla precisione delle mosse."
    de: "Ein Item zum Tragen. Dieses Vergrößerungsglas\nerhöht die Genauigkeit etwas."
    es: "Debe llevarla un Pokémon. Aumenta ligeramente\nla Precisión de los movimientos."
    ko: "물건이 크게 보이는 렌즈.\n지니게 하면 기술의 명중률이\n조금 올라간다."
wiki_berry:
  names:
    jp_kana: ウイのみ
    jp_kanji: ウイのみ
    en: Wiki Berry
    fr: Baie Wiki
    it: Baccakiwi
    de: Wikibeere
    es: Baya Wiki
    ko: 위키열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but it will cause\nconfusion if the user hates the taste."
    fr: "Tenue, cette Baie restaure des PV en cas\nde besoin, mais rend le Pokémon confus si\nson goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die KP eines\nPokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar algunos PS. Su sabor puede causar\nconfusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
wise_glasses:
  names:
    jp_kana: ものしりメガネ
    jp_kanji: ものしりメガネ
    en: Wise Glasses
    fr: Lunettes Sages
    it: Saviocchiali
    de: Schlauglas
    es: Gafas Especiales
    ko: 박식안경
  descriptions:
    jp_kana: "ぶあつい　レンズの　ついた　メガネ。\nもたせると　とくしゅわざの\nいりょくが　すこし　あがる。"
    jp_kanji: "ぶあつい　レンズの　ついた　メガネ。\n持たせると　特殊技の\n威力が　少し　あがる。"
    en: "An item to be held by a Pokémon.\nThis thick pair of glasses slightly\nboosts the power of special moves."
    fr: "Objet à tenir. Une paire de lunettes épaisses\naugmentant un peu la puissance des attaques\nspéciales."
    it: "Strumento da dare a un Pokémon.\nPaio di occhiali dalle lenti spesse che potenzia\ndi poco le mosse speciali."
    de: "Ein Item zum Tragen. Diese dicke Brille verstärkt\nauf Spezial-Angriff basierende Attacken."
    es: "Potencian ligeramente los movimientos\nespeciales. Debe llevarlas un Pokémon."
    ko: "두꺼운 렌즈를 붙인 안경.\n지니게 하면 특수 기술의\n위력이 조금 올라간다."
works_key:
  names:
    jp_kana: はつでんしょキー
    jp_kanji: はつでんしょキー
    en: Works Key
    fr: Clé Centrale
    it: Turbinchiave
    de: K-Schlüssel
    es: Llave Central
    ko: 발전소키
  descriptions:
    jp_kana: "たにまのはつでんしょの　とびらを\nあけしめする　おおきな　カギ。\nなぜか　ギンガだんが　もっていた。"
    jp_kanji: "谷間の発電所の　扉を\nあけしめする　おおきな　カギ。\nなぜか　ギンガ団が　持っていた。"
    en: "A large key for operating the doors of\nthe Valley Windworks in the canyon.\nIt was held by a Team Galactic Grunt."
    fr: "Une grande clé servant à ouvrir la porte de la\ncentrale Les Éoliennes du canyon.\nUn Sbire de la Team Galaxie la détenait."
    it: "Grande chiave usata per azionare la porta\ndell’Impianto Turbine. L’aveva con sé una\nRecluta del Team Galassia."
    de: "Ein großer Schlüssel, der zum Windkraftwerk\ngehört. Einer der Rüpel von Team Galaktik\nhatte ihn im Besitz."
    es: "Abre la puerta de la Central del Valle Eólico.\nLa llevaba un Recluta del Equipo Galaxia."
    ko: "골짜기발전소의 문을 여닫는 큰 열쇠.\n어찌된 영문인지\n갤럭시단이 지니고 있었다."
x_accuracy:
  names:
    jp_kana: ヨクアタール
    jp_kanji: ヨクアタール
    en: X Accuracy
    fr: Précision +
    it: Precisione X
    de: X-Treffer
    es: Precisión X
    ko: 잘-맞히기
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　あげる　どうぐ。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　あげる　道具。\nひっこめると　元に　戻る。"
    en: "An item that boosts the accuracy of\na Pokémon during a battle. It wears\noff once the Pokémon is withdrawn."
    fr: "Augmente la Précision pendant un combat.\nL’effet disparaît si le Pokémon se retire."
    it: "Aumenta la precisione di un Pokémon in una\nlotta. L’effetto svanisce se il Pokémon\nè sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf.\nDie Wirkung wird mit dem Austausch des\nPokémon beendet."
    es: "Aumenta la Precisión de los ataques en combate.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을 올리는\n도구. 포켓몬을 볼에 넣어버리면\n원래대로 되돌아간다."
x_accuracy_2:
  names:
    jp_kana: ヨクアタール２
    jp_kanji: ヨクアタール２
    en: X Accuracy 2
    fr: Précision 2
    it: Precisione X-2
    de: X-Treffer2
    es: Precisión X 2
    ko: 잘-맞히기2
  descriptions:
    jp_kana: "せんとうちゅうの　ポケモンの\nめいちゅうを　それなりに　あげる。\nひっこめると　もとに　もどる。"
    jp_kanji: "戦闘中の　ポケモンの\n命中を　それなりに　あげる。\nひっこめると　元に　戻る。"
    en: "It sharply raises the accuracy of a\nPokémon in battle. It wears off if the\nPokémon is withdrawn."
    fr: "Augmente un peu la Précision pendant un combat.\nL’effet s’estompe si le Pokémon se retire."
    it: "Aumenta molto la precisione di un Pokémon in\nuna lotta. L’effetto svanisce se il Pokémon\nè sostituito."
    de: "Hebt die Genauigkeit eines Pokémon im Kampf\nleicht an. Die Wirkung endet mit dem Austausch\ndes Pokémon."
    es: "Aumenta ligeramente la Precisión en combate.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "배틀 중인 포켓몬의 명중률을\n그럭저럭 올린다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
