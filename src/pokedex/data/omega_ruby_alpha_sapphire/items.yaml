yache_berry:
  names:
    jp_kana: ヤチェのみ
    jp_kanji: ヤチェのみ
    en: Yache Berry
    fr: Baie Nanone
    it: Baccamoya
    de: Kiroyabeere
    es: Baya Rimoya
    ko: 플카열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　こおり　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　こおり技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Ice-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Glace."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Ghiaccio del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Eis."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Hielo de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 얼음 기술을\n당했을 때 위력이 약해진다."
