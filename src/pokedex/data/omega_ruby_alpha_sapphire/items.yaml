    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nà l’Attrap’Disques."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nvittorie a Piattello."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du beim Diskusfangen den 1. Platz\nbelegt hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias en Atrapadiscos."
    ko: "포켓슬론의 기록이 들어 있다.\n캐치소서 1위 횟수가\n기록된 카드."
data_card_10:
  names:
    jp_kana: データカード１０
    jp_kanji: データカード１０
    en: Data Card 10
    fr: Carte Mémo10
    it: Scheda Dati 10
    de: Datenkarte10
