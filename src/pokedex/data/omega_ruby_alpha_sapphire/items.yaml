    jp_kanji: "ポケスロンの　記録が　はいっている。\nダッシュハードル　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how many times you\nwon the Pokéathlon’s Hurdle Dash."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nà la Cours’Obstacles."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nvittorie a Corsostacoli."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du beim Hürdenlauf den 1. Platz\nbelegt hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias en Saltaobstáculos."
    ko: "포켓슬론의 기록이 들어 있다.\n대시허들 1위 횟수가\n기록된 카드."
data_card_06:
  names:
    jp_kana: データカード０６
    jp_kanji: データカード０６
    en: Data Card 06
    fr: Carte Mémo06
    it: Scheda Dati 06
    de: Datenkarte06
    es: Tarjeta Datos 06
    ko: 데이터카드06
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nチェンジリレー　１い　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nチェンジリレー　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how many times you\nwon the Pokéathlon’s Relay Run."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nà la Course de Relais."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nvittorie a Staffetta."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du beim Staffellauf den 1. Platz\nbelegt hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias en Carrera de Relevos."
    ko: "포켓슬론의 기록이 들어 있다.\n체인지릴레이 1위 횟수가\n기록된 카드."
data_card_07:
  names:
    jp_kana: データカード０７
    jp_kanji: データカード０７
    en: Data Card 07
    fr: Carte Mémo07
    it: Scheda Dati 07
    de: Datenkarte07
    es: Tarjeta Datos 07
    ko: 데이터카드07
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nスティールフラッグ　１い　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nスティールフラッグ　１位　回数が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how many times you\nwon the Pokéathlon’s Pennant Capture."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nau Capture Drapeau."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nvittorie a Bandierina."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du beim Flaggenschnappen den\n1. Platz belegt hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias en Atrapabanderas."
    ko: "포켓슬론의 기록이 들어 있다.\n스틸플래그 1위 횟수가\n기록된 카드."
data_card_08:
  names:
    jp_kana: データカード０８
    jp_kanji: データカード０８
    en: Data Card 08
    fr: Carte Mémo08
    it: Scheda Dati 08
    de: Datenkarte08
    es: Tarjeta Datos 08
    ko: 데이터카드08
  descriptions:
