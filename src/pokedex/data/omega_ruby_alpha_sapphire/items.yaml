    jp_kanji: はいたつぶつ３
    en: Gram 3
    fr: Courrier 3
    it: Missiva 3
    de: Briefpost 3
    es: Envío 3
    ko: 배달물3
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: "An important letter that\nWingull delivers."
    fr: Un courrier important transporté par un Goélise.
    it: "Un’importante lettera che Wingull deve\nconsegnare."
    de: Eine wichtige Briefpost, überbracht von Wingull.
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
grass_gem:
  names:
    jp_kana: くさのジュエル
    jp_kanji: くさのジュエル
    en: Grass Gem
    fr: Joyau Plante
    it: Bijouerba
    de: Pflanzjuwel
    es: Gema Planta
    ko: 풀주얼
  descriptions:
    jp_kana: "くさの　タイプの　ジュエル。\nもたせると　いちどだけ　くさの\nわざの　いりょくが　つよまる。"
    jp_kanji: "くさの　タイプの　ジュエル。\n持たせると　１度だけ　くさの\n技の　威力が　強まる。"
    en: "A gem with an essence of nature.\nWhen held, it strengthens the power\nof a Grass-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Plante."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Erba."
    de: "Ein Juwel vom Typ Pflanze. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Pflanze."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Planta. Debe llevarla\nun Pokémon."
    ko: "풀타입의 주얼.\n지니게 하면 한 번만 풀\n기술의 위력이 강해진다."
great_ball:
  names:
    jp_kana: スーパーボール
    jp_kanji: スーパーボール
    en: Great Ball
    fr: Super Ball
    it: Mega Ball
    de: Superball
    es: Super Ball
    ko: 수퍼볼
  descriptions:
    jp_kana: "モンスターボールよりも　さらに\nポケモンを　つかまえやすくなった\nすこし　せいのうのいい　ボール。"
    jp_kanji: "モンスターボールよりも　さらに\nポケモンを　捕まえやすくなった\n少し　性能のいい　ボール。"
    en: "A good, high-performance Poké Ball\nthat provides a higher Pokémon catch\nrate than a standard Poké Ball can."
    fr: "Une Ball très performante dont le taux de\nréussite est supérieur à celui de la Poké Ball."
    it: "Poké Ball dalle ottime prestazioni:\nfornisce maggiori probabilità di cattura rispetto\nalla normale Poké Ball."
    de: "Ein Ball mit guter Erfolgsquote. Dem Pokéball in\nallen Punkten überlegen."
    es: "Poké Ball de alto rendimiento. Tiene un índice de\néxito superior al de la Poké Ball."
    ko: "몬스터볼보다도 더욱\n포켓몬을 잡기 쉬워진\n약간 성능이 좋은 볼."
green_apricorn:
  names:
    jp_kana: みどぼんぐり
    jp_kanji: みどぼんぐり
    en: Green Apricorn
    fr: Noigrume Ver
    it: Ghicocca Verde
    de: Aprikoko Grn
    es: Bonguri Verde
    ko: 초록규토리
  descriptions:
    jp_kana: "みどりの　ぼんぐり。\nふしぎと　こうばしい　かおりがする。"
    jp_kanji: "みどりの　ぼんぐり。\n不思議と　こうばしい　かおりがする。"
    en: "A green Apricorn.\nIt has a mysterious, aromatic scent."
    fr: "Un Noigrume de couleur verte.\nIl dégage un arôme étonnamment riche."
    it: "Una Ghicocca di colore verde.\nEmana un profumo intenso."
    de: "Eine grüne Aprikoko.\nSie verströmt einen seltsam aromatischen Duft."
    es: "Bonguri de color verde y aroma peculiar que\nrecuerda al café tostado."
    ko: "초록색의 규토리.\n이상하게도 고소한 향기가 난다."
green_scarf:
  names:
    jp_kana: みどりのバンダナ
    jp_kanji: みどりのバンダナ
    en: Green Scarf
    fr: Foulard Vert
    it: Fascia Verde
    de: Grüner Schal
    es: Pañuelo Verde
    ko: 초록밴드
  descriptions:
    jp_kana: "もたせて　コンテストに　さんかすると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    jp_kanji: "持たせて　コンテストに　参加すると\nその　ポケモンは　いつもより\nかしこく　みられる。"
    en: "An item to be held by a Pokémon.\nDuring a contest, it raises the Clever\naspect of the Pokémon holding it."
    fr: "Objet à tenir. Augmente l’Intelligence\nd’un Pokémon dans les concours."
    it: "Strumento da dare a un Pokémon.\nAumenta l’“Acume” di chi l’indossa in una gara."
    de: "Ein Item zum Tragen. Trainer erhöhen damit in\nWettbewerben die Klugheit ihres Pokémon."
    es: "Debe llevarlo un Pokémon. Aumenta el ingenio en\nlos concursos."
    ko: "지니게 하여 콘테스트에 참가하면\n그 포켓몬은 여느 때보다\n슬기롭게 보인다."
green_shard:
  names:
    jp_kana: みどりのかけら
    jp_kanji: みどりのかけら
    en: Green Shard
    fr: Tesson Vert
    it: Coccio Verde
    de: Grünstück
    es: Parte Verde
    ko: 초록조각
  descriptions:
    jp_kana: "みどりの　ちいさな　かけら。\nむかしに　つくられた　なにかの\nどうぐの　いちぶ　らしい。"
    jp_kanji: "緑の　小さな　かけら。\n昔に　つくられた　なにかの\n道具の　一部らしい。"
    en: "A small green shard. It appears\nto be a fragment of some sort\nof implement made long ago."
    fr: "Un petit tesson vert.\nIl semble provenir d’un outil très ancien."
    it: "Un piccolo coccio verde che con ogni probabilità\nè un frammento di un antico strumento."
    de: "Eine grüne Scherbe eines antiken Werkzeugs,\ndas vor langer Zeit angefertigt wurde."
    es: "Un pequeño fragmento verde. Parece formar parte\nde algún tipo de herramienta antigua."
    ko: "초록색 작은 조각.\n옛날에 만들어진 어떤\n도구의 일부인 듯하다."
greet_mail:
  names:
    jp_kana: はじめてメール
    jp_kanji: はじめてメール
    en: Greet Mail
    fr: Lettre Salut
    it: Messaggio Inizio
    de: Grußbrief
    es: Carta Inicial
    ko: 첫메일
  descriptions:
    jp_kana: "はじめましての　あいさつが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "はじめましての　あいさつが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to be easy to use\nwhen writing someone for the first time.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour se présenter.\nPeut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per presentarsi a qualcuno.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man sich bei jemandem\nvorstellen kann. Gib es einem Pokémon zum\nTragen."
    es: "Carta para presentarse a alguien. Haz que la\nentregue un Pokémon."
    ko: "첫인사를\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
grepa_berry:
  names:
    jp_kana: ウブのみ
    jp_kanji: ウブのみ
    en: Grepa Berry
    fr: Baie Résin
    it: Baccauva
    de: Labrusbeere
    es: Baya Uvav
    ko: 또뽀열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nとくぼうの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n特防の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon.\nUsing it on a Pokémon makes it more\nfriendly but lowers its base Sp. Def."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Défense Spéciale de base."
    it: "Usata su un Pokémon, lo rende più amichevole,\nma ne diminuisce i punti base della Difesa\nSpeciale."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nSpezial-Verteidigungs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Defensa Especial de\nbase."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수방어의 기초 포인트가 떨어진다."
grip_claw:
  names:
    jp_kana: ねばりのかぎづめ
    jp_kanji: ねばりのかぎづめ
    en: Grip Claw
    fr: Accro Griffe
    it: Presartigli
    de: Griffklaue
    es: Garra Garfio
    ko: 끈기갈고리손톱
  descriptions:
    jp_kana: "もたせると　しめつける　まきつくなど\nダメージを　あたえつづける　わざの\nターンすうが　ふえる。"
    jp_kanji: "持たせると　しめつける　まきつくなど\nダメージを　あたえつづける　技の\nターン数が　増える。"
    en: "An item to be held by a Pokémon.\nIt extends the duration of multi-turn\nattacks like Bind and Wrap."
    fr: "Objet à tenir. Augmente la durée des attaques\nà tours multiples telles que Ligotage et Étreinte."
    it: "Strumento da dare a un Pokémon.\nProlunga gli attacchi multiturno come\nAvvolgibotta e Legatutto."
    de: "Ein Item zum Tragen. Verlängert die Dauer\nvon Klammergriff, Wickel etc."
    es: "Prolonga la duración de ataques multiturno como\nAtadura y Constricción si la lleva un Pokémon."
    ko: "지니게 하면 조이기나 김밥말이 등\n데미지를 계속 주는 기술의\n턴 수가 늘어난다."
griseous_orb:
  names:
    jp_kana: はっきんだま
    jp_kanji: はっきんだま
    en: Griseous Orb
    fr: Orbe Platiné
    it: Grigiosfera
    de: Platinum-Orb
    es: Griseosfera
    ko: 백금옥
  descriptions:
    jp_kana: "ギラティナに　もたせると　ドラゴンと\nゴーストタイプの　わざの　いりょくが\nあがる　ひかり　かがやく　たま。"
    jp_kanji: "ギラティナに　持たせると　ドラゴンと\nゴーストタイプの　技の　威力が\nあがる　光り　輝く　珠。"
    en: "A glowing orb to be held by Giratina.\nIt boosts the power of Dragon- and\nGhost-type moves when it is held."
    fr: "Un mystérieux objet destiné à Giratina.\nAméliore les capacités de type Dragon\net Spectre."
    it: "Poliedro splendente da dare a Giratina.\nAumenta la potenza delle mosse di tipo Drago\ne Spettro."
    de: "Ein glühender Orb. Verstärkt Attacken vom Typ\nDrache und Geist, wenn Giratina ihn trägt."
    es: "Una esfera brillante que potencia los movimientos\nde tipo Dragón y Fantasma. Debe llevarla Giratina."
    ko: "기라티나에게 지니게 하면 드래곤과\n고스트타입 기술의 위력이 올라가는\n반짝반짝 빛나는 구슬."
ground_gem:
  names:
    jp_kana: じめんのジュエル
    jp_kanji: じめんのジュエル
    en: Ground Gem
    fr: Joyau Sol
    it: Bijouterra
    de: Bodenjuwel
    es: Gema Tierra
    ko: 땅주얼
  descriptions:
    jp_kana: "じめんの　タイプの　ジュエル。\nもたせると　いちどだけ　じめんの\nわざの　いりょくが　つよまる。"
    jp_kanji: "じめんの　タイプの　ジュエル。\n持たせると　１度だけ　じめんの\n技の　威力が　強まる。"
    en: "A gem with an essence of land.\nWhen held, it strengthens the power\nof a Ground-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Terra."
    de: "Ein Juwel vom Typ Boden. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Boden."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Tierra. Debe llevarla\nun Pokémon."
    ko: "땅타입의 주얼.\n지니게 하면 한 번만 땅\n기술의 위력이 강해진다."
growth_mulch:
  names:
    jp_kana: すくすくこやし
    jp_kanji: すくすくこやし
    en: Growth Mulch
    fr: Fertipousse
    it: Fertilrapido
    de: Wachsmulch
    es: Abono Rápido
    ko: 무럭무럭비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
grubby_hanky:
  names:
    jp_kana: よごれたハンカチ
    jp_kanji: よごれたハンカチ
    en: Grubby Hanky
    fr: Mouchoir Sale
    it: Pezza Sporca
    de: Schnäuztuch
    es: Pañuelo Sucio
    ko: 더러운손수건
  descriptions:
    jp_kana: "シッポウシティにある　カフェソーコの\nじょうれんが　おとした　ハンカチ。\nほのかに　ポケモンの　かおりがする。"
    jp_kanji: "シッポウシティにある　カフェソーコの\n常連が　落とした　ハンカチ。\nほのかに　ポケモンの　香りがする。"
    en: "A handkerchief dropped by\na regular at Café Warehouse.\nIt smells faintly like a Pokémon."
    fr: "Un mouchoir égaré par un habitué du Café de\nla Grange. Il sent légèrement le Pokémon."
    it: "Pezzo di stoffa perso al Bar Magazzino\ndi Zefiropoli da un cliente abituale.\nOdora leggermente di Pokémon."
    de: "Ein Taschentuch, das ein Stammkunde im\nCafé Lagerhaus in Septerna City verloren hat.\nRiecht leicht nach Pokémon."
    es: "Pañuelo perdido por un cliente habitual del Café\nAlma en Ciudad Esmalte. Desprende el olor de\nun Pokémon."
    ko: "칠보시티에 있는 카페 갤러지의\n단골손님이 떨어뜨린 손수건.\n희미하게 포켓몬의 냄새가 난다."
guard_spec:
  names:
    jp_kana: エフェクトガード
    jp_kanji: エフェクトガード
    en: Guard Spec.
    fr: Défense Spéciale
    it: Superguardia
    de: Megablock
    es: Protec. Especial
    ko: 이펙트가드
  descriptions:
    jp_kana: "せんとうちゅう　５ターンの　あいだ\nみかたの　のうりょくを\nさげられなくする　どうぐ。"
    jp_kanji: "戦闘中　５ターンの　あいだ\n味方の　能力を\nさげられなくする　道具。"
    en: "An item that prevents stat reduction\namong the Trainer’s party Pokémon\nfor five turns after it is used in battle."
    fr: "Empêche la baisse des stats de tous\nles Pokémon de l’équipe pendant cinq tours."
    it: "Per cinque turni dopo l’uso, evita che le\nstatistiche dei Pokémon della squadra\ndell’Allenatore diminuiscano."
    de: "Eine mögliche Statusveränderung der Pokémon\nim Team wird für 5 Runden verhindert."
    es: "Evita que bajen las características del equipo\nPokémon durante cinco turnos."
    ko: "배틀 중 5턴 동안\n같은 편의 능력을\n떨어뜨리지 않게 하는 도구."
guidebook:
  names:
    jp_kana: ぼうけんノート
    jp_kanji: ぼうけんノート
    en: Journal
    fr: Journal
    it: Agenda
    de: Tagebuch
    es: Diario
    ko: 모험노트
  descriptions:
    jp_kana: "これまでの　ぼうけんの　ようすが\nきろく　されている　ノート。"
    jp_kanji: "これまでの　冒険の　様子が\n記録　されている　ノート。"
    en: "A notebook that keeps a day-to-day\nrecord of your adventure so far."
    fr: "Un journal de bord qui garde en mémoire vos\naventures quotidiennes."
    it: "Diario in cui viene annotata la tua avventura\ngiorno per giorno."
    de: "In diesem Tagebuch steht, was du\nin den letzten Tagen erlebt hast."
    es: "Un cuaderno en el que se recogen, día a día, los\nprogresos de tu aventura."
    ko: "지금까지의 모험 상황이\n기록되어 있는 노트."
gyaradosite:
  names:
    jp_kana: ギャラドスナイト
    jp_kanji: ギャラドスナイト
    en: Gyaradosite
    fr: Léviatorite
    it: Gyaradosite
    de: Garadosnit
    es: Gyaradosita
    ko: 갸라도스나이트
  descriptions:
    jp_kana: "ギャラドスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ギャラドスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gyarados hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Léviator, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Gyarados, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Garados getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gyarados en combate."
    ko: "갸라도스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
haban_berry:
  names:
    jp_kana: ハバンのみ
    jp_kanji: ハバンのみ
    en: Haban Berry
    fr: Baie Fraigo
    it: Baccahaban
    de: Terirobeere
    es: Baya Anjiro
    ko: 하반열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ドラゴン　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ドラゴン技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Dragon-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Dragon."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Drago del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Drache."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Dragón de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 드래곤 기술을\n당했을 때 위력이 약해진다."
hard_stone:
  names:
    jp_kana: かたいいし
    jp_kanji: かたいいし
    en: Hard Stone
    fr: Pierre Dure
    it: Pietradura
    de: Granitstein
    es: Piedra Dura
    ko: 딱딱한돌
  descriptions:
    jp_kana: "ぜったいに　われない　いし。\nもたせると　いわタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "絶対に　割れない　石。\n持たせると　いわタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a durable stone that boosts\nthe power of Rock-type moves."
    fr: "Objet à tenir. Une pierre incassable qui augmente\nla puissance des capacités de type Roche."
    it: "Strumento da dare a un Pokémon.\nPietra indistruttibile che potenzia le mosse\ndi tipo Roccia."
    de: "Ein Item zum Tragen. Ein unzerbrechlicher Stein,\nder Attacken vom Typ Gestein verstärkt."
    es: "Debe llevarla un Pokémon. La robustez de la\npiedra fortalece los movimientos de tipo Roca."
    ko: "절대 깨지지 않는 돌.\n지니게 하면 바위타입\n기술의 위력이 올라간다."
heal_ball:
  names:
    jp_kana: ヒールボール
    jp_kanji: ヒールボール
    en: Heal Ball
    fr: Soin Ball
    it: Cura Ball
    de: Heilball
    es: Sana Ball
    ko: 힐볼
  descriptions:
    jp_kana: "つかまえた　ポケモンの　ＨＰと\nじょうたい　いじょうを　かいふくする\nちょっと　やさしい　ボール。"
    jp_kanji: "捕まえた　ポケモンの　ＨＰと\n状態異常を　回復する\nちょっと　やさしい　ボール。"
    en: "A remedial Poké Ball that restores\nthe HP of a Pokémon caught with it\nand eliminates any status conditions."
    fr: "Une Poké Ball de soin qui rend tous les PV\ndu Pokémon attrapé et qui soigne tous les\nchangements de statut."
    it: "Poké Ball curativa che ridà PS al Pokémon\ncatturato e cura tutti i problemi di stato."
    de: "Ein wohltuender Ball. Er füllt alle KP des\ngefangenen Pokémon auf und behebt alle\nStatusprobleme."
    es: "Poké Ball curativa que restaura los PS y cura\ntodos los problemas de estado de un Pokémon\ndespués de capturarlo."
    ko: "잡은 포켓몬의 HP와\n상태 이상을 회복시키는\n조금 다정한 볼."
heal_powder:
  names:
    jp_kana: ばんのうごな
    jp_kanji: ばんのうごな
    en: Heal Powder
    fr: Poudre Soin
    it: Polvocura
    de: Heilpuder
    es: Polvo Curación
    ko: 만능가루
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A very bitter medicine powder.\nWhen consumed, it heals all of\na Pokémon’s status conditions."
    fr: "Une poudre médicinale très amère.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Rimedio amarissimo in polvere.\nCura tutti i problemi di stato di un Pokémon."
    de: "Ein bitteres medizinisches Pulver, das alle\nStatusprobleme eines Pokémon aufhebt."
    es: "Polvos medicinales muy amargos que curan todos\nlos problemas de estado de un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
health_feather:
  names:
    jp_kana: たいりょくのハネ
    jp_kanji: たいりょくのハネ
    en: Health Wing
    fr: Aile Santé
    it: Piumsalute
    de: Heilfeder
    es: Pluma Vigor
    ko: 체력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　ＨＰの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon.\nIt slightly increases the base\nHP of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu ses PV de base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dei PS."
    de: "Schenkt man einem Pokémon dieses Item,\nwird dessen KP-Basiswert dauerhaft erhöht."
    es: "Pluma que aumenta un poco los PS de base de\nun Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 HP\n기초 포인트를 조금 올린다."
heart_scale:
  names:
    jp_kana: ハートのウロコ
    jp_kanji: ハートのウロコ
    en: Heart Scale
    fr: Écaille Cœur
    it: Squama Cuore
    de: Herzschuppe
    es: Escama Corazón
    ko: 하트비늘
  descriptions:
    jp_kana: "きれいな　ハートの　かたちの\nとても　めずらしい　ウロコ。\nにじいろに　うすく　かがやく。"
    jp_kanji: "きれいな　ハートの　形の\nとても　珍しい　ウロコ。\nにじ色に　うすく　輝く。"
    en: "A pretty, heart-shaped scale that is\nextremely rare. It glows faintly with\nall of the colors of the rainbow."
    fr: "Une très rare et jolie écaille en forme de cœur.\nElle brille légèrement d’un éclat arc-en-ciel."
    it: "Squama graziosa, a forma di cuore e molto rara.\nRiflette tutti i colori dell’iride."
    de: "Eine hübsche, herzförmige und sehr seltene\nSchuppe. Sie erstrahlt in den Farben\ndes Regenbogens."
    es: "Bella escama con forma de corazón que brilla\nligeramente como los colores del arcoíris. Es muy\npoco común."
    ko: "예쁜 하트 모양의\n무척 진귀한 비늘.\n무지개색으로 연하게 반짝인다."
heat_rock:
  names:
    jp_kana: あついいわ
    jp_kanji: あついいわ
    en: Heat Rock
    fr: Roche Chaude
    it: Rocciacalda
    de: Heißbrocken
    es: Roca Calor
    ko: 뜨거운바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　にほんばれを\nつかうと　いつもより　はれの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　にほんばれを\n使うと　いつもより　はれの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon.\nIt extends the duration of the move\nSunny Day when used by the holder."
    fr: "Objet à tenir. Augmente la durée de la capacité\nZénith utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Giornodisole."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nSonnentag, wenn der Träger es einsetzt."
    es: "Prolonga la duración del movimiento Día Soleado\nque use el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 쾌청을\n쓰면 여느 때보다 쾌청의\n시간이 길어진다."
heavy_ball:
  names:
    jp_kana: ヘビーボール
    jp_kanji: ヘビーボール
    en: Heavy Ball
    fr: Masse Ball
    it: Peso Ball
    de: Schwerball
    es: Peso Ball
    ko: 헤비볼
  descriptions:
    jp_kana: "たいじゅうの　おもい　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "体重の　重い　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that is better than usual\nat catching very heavy Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon lourds."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon pesanti."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon mit hohem Körpergewicht\nzu fangen."
    es: "Poké Ball algo distinta que funciona\nespecialmente bien a la hora de atrapar\nPokémon de mucho peso."
    ko: "체중이 무거운 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
helix_fossil:
  names:
    jp_kana: かいのカセキ
    jp_kanji: かいのカセキ
    en: Helix Fossil
    fr: Nautile
    it: Helixfossile
    de: Helixfossil
    es: Fósil Hélix
    ko: 조개화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nかいがらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\n貝殻の　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived in the sea. It might be\na piece of a seashell."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de coquillage."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una conchiglia."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es ähnelt einer Muschelschale."
    es: "Fósil de un Pokémon ancestral que vivió en el\nfondo del mar. Parece ser un fragmento de\nconcha marina."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n조개껍질의 일부인 듯하다."
heracronite:
  names:
    jp_kana: ヘラクロスナイト
    jp_kanji: ヘラクロスナイト
    en: Heracronite
    fr: Scarhinoïte
    it: Heracrossite
    de: Skarabornit
    es: Heracrossita
    ko: 헤라크로스나이트
  descriptions:
    jp_kana: "ヘラクロスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヘラクロスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Heracross hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Scarhino, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Heracross, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Skaraborn getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Heracross en combate."
    ko: "헤라크로스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
hm01:
  names:
    jp_kana: ひでんマシン０１
    jp_kanji: ひでんマシン０１
    en: HM01
    fr: CS01
    it: MN01
    de: VM01
    es: MO01
    ko: 비전머신01
  descriptions:
    jp_kana: "カマや　ツメなどの　するどいもので\nきりつけて　こうげきする。\nほそいきを　きることも　できる。"
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。\n細い　樹木も　きることが　できる。"
    en: "The target is cut with a scythe or claw.\nThis can also be used to cut down thin trees."
    fr: "Coupe l’ennemi avec des lames ou des griffes.\nHors combat, permet de couper des arbres fins."
    it: "Attacca il nemico con artigli o falci affilate.\nFuori dalla lotta si usa per tagliare piccoli alberi."
    de: "Das Ziel wird mit scharfen Klingen attackiert.\nAußerhalb des Kampfes werden damit kleine\nBäume gefällt."
    es: "Corta al objetivo con una cuchilla o garra.\nTambién puede usarse para cortar árboles\ndelgados."
    ko: "낫이나 발톱 등 날카로운 것으로\n갈라서 공격한다.\n얇은 나무를 자를 수도 있다."
hm02:
  names:
    jp_kana: ひでんマシン０２
    jp_kanji: ひでんマシン０２
    en: HM02
    fr: CS02
    it: MN02
    de: VM02
    es: MO02
    ko: 비전머신02
  descriptions:
    jp_kana: "１ターンめで　そらへ　とびあがって\n２ターンめで　こうげきする。\nしっているまちに　いどうも　できる。"
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。\n知っている　街に　移動も　できる。"
    en: "The user soars and then strikes\nits target on the next turn. This can\nalso be used to fly to any familiar town."
    fr: "Le lanceur s’envole au premier tour et frappe au\nsecond. Permet aussi de voler jusqu’à une ville\ndéjà visitée."
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente. Fuori dalla lotta permette di volare\nin città già visitate."
    de: "In Runde 1 fliegt der Angreifer empor und\nattackiert in Runde 2. Man kann damit zu\njedem bekannten Ort fliegen."
    es: "Quien lo usa levanta el vuelo y ataca en el\nsiguiente turno. También se puede usar para\nvolar a algún sitio conocido."
    ko: "1턴째에 하늘을 날아올라\n2턴째에 공격한다.\n알고 있는 도시로 이동할 수 있다."
hm03:
  names:
    jp_kana: ひでんマシン０３
    jp_kanji: ひでんマシン０３
    en: HM03
    fr: CS03
    it: MN03
    de: VM03
    es: MO03
    ko: 비전머신03
  descriptions:
    jp_kana: "おおきな　なみで　じぶんの　まわりに\nいるものを　こうげきする。\nみずのうえを　すすむことも　できる。"
    jp_kanji: "大きな　波で　自分の　周りに\nいるものを　攻撃する。\n水上も　泳いで　進める。"
    en: "The user attacks everything around it by\nswamping its surroundings with a giant wave.\nThis can also be used for crossing water."
    fr: "Une énorme vague s’abat sur le champ de\nbataille. Permet aussi de voyager sur l’eau."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena.\nFuori dalla lotta si usa per spostarsi sull’acqua."
    de: "Eine riesige Flutwelle ergießt sich über das nähere\nUmfeld des Anwenders. Ermöglicht das Surfen auf\ndem Wasser."
    es: "Inunda el campo de batalla con una ola gigante.\nTambién se puede usar para desplazarse por el\nagua."
    ko: "큰 파도를 일으켜서 자신의\n주위에 있는 포켓몬을 공격한다.\n물 위를 나아갈 수도 있다."
hm04:
  names:
    jp_kana: ひでんマシン０４
    jp_kanji: ひでんマシン０４
    en: HM04
    fr: CS04
    it: MN04
    de: VM04
    es: MO04
    ko: 비전머신04
  descriptions:
    jp_kana: "こんしんの　ちからで　こうげきする。\nおもいいわを　おすことも　できる。"
    jp_kanji: "ありったけの　力で\n相手を　なぐりつけて　攻撃する。\n重たい　岩を　押すことも　できる。"
    en: "The target is slugged with a punch thrown\nat maximum power. This can also be used\nto move heavy boulders."
    fr: "Le lanceur cogne l’ennemi de toutes ses forces.\nPermet aussi de déplacer des rochers."
    it: "Colpisce il nemico con un’enorme energia.\nFuori dalla lotta si usa per spostare i massi."
    de: "Ein energiegeladener Kraftschlag trifft das Ziel.\nAußerdem lassen sich mit der Attacke schwere\nFelsen bewegen."
    es: "Genera mucha fuerza y ataca con gran energía\nal objetivo. También puede usarse para mover\npiedras grandes."
    ko: "혼신의 힘으로 공격한다.\n무거운 바위를 밀 수도 있다."
hm05:
  names:
    jp_kana: ひでんマシン０５
    jp_kanji: ひでんマシン０５
    en: HM05
    fr: CS05
    it: MN05
    de: VM05
    es: MO05
    ko: 비전머신05
  descriptions:
    jp_kana: "たきを　さかのぼるような　すさまじい\nいきおいで　とっしん　こうげきする。\nたきを　のぼることも　できる。"
    jp_kanji: "すごい　勢いで　相手に　つっこみ\n攻撃する。流れ落ちる　滝も\n泳いで　のぼれる。"
    en: "The user charges at the target and may make it\nflinch. This can also be used to climb a waterfall."
    fr: "Le lanceur charge l’ennemi à une vitesse\nremarquable. Peut aussi l’apeurer.\nPermet aussi de franchir une cascade."
    it: "Carica il nemico a grande velocità e può farlo\ntentennare.\nFuori dalla lotta fa risalire le cascate."
    de: "Eine mächtige Attacke, die das Ziel eventuell\nzurückschrecken lässt. Sie macht Wasserfälle\nbezwingbar."
    es: "Carga contra el objetivo a una velocidad increíble.\nTambién puede usarse para remontar una\ncascada."
    ko: "폭포를 거꾸로 오르는 듯한\n엄청난 기세로 돌진하여 공격한다.\n폭포를 오를 수도 있다."
hm06:
  names:
    jp_kana: ひでんマシン０６
    jp_kanji: ひでんマシン０６
    en: HM06
    fr: CS06
    it: MN06
    de: VM06
    es: MO06
    ko: 비전머신06
  descriptions:
    jp_kana: "パンチで　こうげき。　あいての\nぼうぎょを　さげる　ことが　ある。\nいわを　くだくことも　できる。"
    jp_kanji: "パンチで　攻撃する。相手の\n防御を　さげる　ことが　ある。\n岩を　砕くことも　できる。"
    en: "The user attacks with a punch. This may\nalso lower the target’s Defense stat.\nThis move can also shatter rocks in the field."
    fr: "Porte un coup de poing à l’ennemi qui peut\nbaisser sa Défense. Peut aussi briser des rochers\nfissurés."
    it: "Chi la usa colpisce il bersaglio con un pugno\nin grado di frantumare persino la roccia.\nPuò anche far diminuire la Difesa."
    de: "Der Anwender greift mit einem Hieb an, der den\nVerteidigungs-Wert des Zieles senken kann.\nDamit können auch Steine zerschlagen werden."
    es: "Ataca con los puños. Puede bajar la Defensa del\nobjetivo y romper rocas fuera del combate."
    ko: "펀치로 공격한다.\n상대의 방어를 떨어뜨릴 때가 있으며\n바위를 깰 수도 있다."
hm07:
  names:
    jp_kana: ひでんマシン０７
    jp_kanji: ひでんマシン０７
    en: HM07
    fr: CS07
    it: MN07
    de: VM07
    es: MO07
    ko: 비전머신07
  descriptions:
    jp_kana: "１ターンめで　もぐり　２ターンめに\nうきあがって　こうげきする。うみの\nなかに　もぐる　ことも　できる。"
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。\n海の　奥深くに　潜ることも　できる。"
    en: "Diving on the first turn, the user floats up and\nattacks on the second turn. It can be used to\ndive deep in the ocean."
    fr: "Le lanceur plonge sous l’eau au premier tour\net frappe au second. Permet aussi de plonger\ndans l’eau profonde."
    it: "Chi la usa si tuffa in acqua per emergere\ne attaccare al turno successivo. Fuori dalla lotta\npuò essere usata per immergersi in mare."
    de: "Taucht in Runde 1 ab und greift in Runde 2\naus der Tiefe an. Ermöglicht Tauchgänge zum\nMeeresgrund."
    es: "Ataca sumergiéndose en el agua en el primer\nturno y emergiendo violentamente en el segundo.\nSirve, además, para bucear en aguas profundas."
    ko: "1턴째에 잠수했다가 2턴째에\n떠올라 공격한다.\n바닷속 깊숙이 잠수할 수도 있다."
holo_caster:female:
  names:
    jp_kana: ホロキャスター
    jp_kanji: ホロキャスター
    en: Holo Caster
    fr: Holokit
    it: Holovox
    de: Holo-Log
    es: Holomisor
    ko: 홀로캐스터
  descriptions:
    jp_kana: "じゅしんした　ホログラムの\nえいぞうデータを　いつでも\nみることが　できる　そうち。"
    jp_kanji: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    en: "A device that allows users to receive\nand view hologram clips at any time.\nIt is also used to chat with others."
    fr: "Un appareil portable permettant de recevoir et\nde visualiser des hologrammes à volonté."
    it: "Dispositivo in grado di ricevere e riprodurre\nin qualsiasi momento comunicazioni olografiche."
    de: "Ein Gerät, das Hologramm-Nachrichten\nempfangen und jederzeit abspielen kann."
    es: "Este aparato permite recibir vídeos holográficos\ny visualizarlos en cualquier momento."
    ko: "수신한 홀로그램\n영상 데이터를 언제라도\n볼 수 있는 장치."
holo_caster:male:
  names:
    jp_kana: ホロキャスター
    jp_kanji: ホロキャスター
    en: Holo Caster
    fr: Holokit
    it: Holovox
    de: Holo-Log
    es: Holomisor
    ko: 홀로캐스터
  descriptions:
    jp_kana: "じゅしんした　ホログラムの\nえいぞうデータを　いつでも\nみることが　できる　そうち。"
    jp_kanji: "受信した　ホログラムの\n映像データを　いつでも\n観ることが　できる　装置。"
    en: "A device that allows users to receive\nand view hologram clips at any time.\nIt is also used to chat with others."
    fr: "Un appareil portable permettant de recevoir et\nde visualiser des hologrammes à volonté."
    it: "Dispositivo in grado di ricevere e riprodurre\nin qualsiasi momento comunicazioni olografiche."
    de: "Ein Gerät, das Hologramm-Nachrichten\nempfangen und jederzeit abspielen kann."
    es: "Este aparato permite recibir vídeos holográficos\ny visualizarlos en cualquier momento."
    ko: "수신한 홀로그램\n영상 데이터를 언제라도\n볼 수 있는 장치."
hondew_berry:
  names:
    jp_kana: ロメのみ
    jp_kanji: ロメのみ
    en: Hondew Berry
    fr: Baie Lonme
    it: Baccamelon
    de: Honmelbeere
    es: Baya Meluce
    ko: 로매열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nとくこうの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n特攻の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon.\nUsing it on a Pokémon makes it more\nfriendly but lowers its base Sp. Atk."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Attaque Spéciale de base."
    it: "Usata su un Pokémon, lo rende più amichevole,\nma ne diminuisce i punti base dell’Attacco\nSpeciale."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nSpezial-Angriffs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Ataque Especial de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n특수공격의 기초 포인트가 떨어진다."
honey:
  names:
    jp_kana: あまいミツ
    jp_kanji: あまいミツ
    en: Honey
    fr: Miel
    it: Miele
    de: Honig
    es: Miel
    ko: 달콤한꿀
  descriptions:
    jp_kana: "くさむらや　どうくつ　などで\nつかうと　あまいにおいに　さそわれて\nやせいポケモンが　あらわれる。"
    jp_kanji: "草むらや　洞窟などで\n使うと　あまいにおいに　誘われて\n野生ポケモンが　あらわれる。"
    en: "A sweet honey with a lush aroma that\nattracts wild Pokémon when it is used\nin tall grass, in caves, or on special trees."
    fr: "Un miel au parfum riche qui, utilisé dans l’herbe,\nune grotte ou sur des arbres spéciaux, attire les\nPokémon sauvages."
    it: "Miele dolce dall’aroma intenso che attrae\ni Pokémon selvatici. Si può usare nelle grotte,\nnell’erba o su alberi speciali."
    de: "Der Duft dieses Honigs lockt wilde Pokémon an.\nVerwende ihn in hohem Gras, Höhlen oder an\nbesonderen Bäumen."
    es: "Su delicioso aroma atrae a Pokémon salvajes si\nse usa en zonas de hierba alta, cuevas o árboles\nespeciales."
    ko: "풀밭이나 동굴 등에서 사용하면\n달콤한 냄새에 이끌려서\n야생 포켓몬이 나타난다."
honor_of_kalos:
  names:
    jp_kana: カロスエンブレム
    jp_kanji: カロスエンブレム
    en: Honor of Kalos
    fr: Insigne de Kalos
    it: Emblema di Kalos
    de: Kalos-Emblem
    es: Emblema Kalos
    ko: 칼로스엠블럼
  descriptions:
    jp_kana: "カロスちほうで　すばらしい\nかつやくを　した　じんぶつに\nおくられる　きちょうな　シンボル。"
    jp_kanji: "カロス地方で　すばらしい\n活躍を　した　人物に\n贈られる　貴重な　シンボル。"
    en: "A precious symbol that is awarded\nonly to an individual who has done\ngreat things for the Kalos region."
    fr: "Une récompense symbolique offerte à ceux qui\nont contribué de manière exceptionnelle à\nla grandeur de Kalos."
    it: "Prezioso riconoscimento conferito a coloro che\nsi sono distinti per gesta eccezionali nella\nregione di Kalos."
    de: "Ein wertvolles Emblem, das all jenen überreicht\nwird, die Großes für die Kalos-Region vollbracht\nhaben."
    es: "Símbolo otorgado en reconocimiento a quienes\nhan realizado gestas excepcionales en la región\nde Kalos."
    ko: "칼로스지방에서\n훌륭한 활약을 한 인물에게\n주어지는 귀중한 심볼."
houndoominite:
  names:
    jp_kana: ヘルガナイト
    jp_kanji: ヘルガナイト
    en: Houndoominite
    fr: Démolossite
    it: Houndoomite
    de: Hundemonit
    es: Houndoomita
    ko: 헬가나이트
  descriptions:
    jp_kana: "ヘルガーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ヘルガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Houndoom hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Démolosse, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Houndoom, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Hundemon getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Houndoom en combate."
    ko: "헬가에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
hp_up:
  names:
    jp_kana: マックスアップ
    jp_kanji: マックスアップ
    en: HP Up
    fr: PV Plus
    it: PS-Su
    de: KP-Plus
    es: Más PS
    ko: 맥스업
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ＨＰの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　ＨＰの\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nWhen consumed, it raises the\nbase HP of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nles PV de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base dei PS."
    de: "Ein gehaltvolles Getränk, das den KP-Basiswert\neines Pokémon dauerhaft erhöht."
    es: "Nutritiva bebida que potencia los PS de base de\nun Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 HP\n기초 포인트를 올린다."
hyper_potion:
  names:
    jp_kana: すごいキズぐすり
    jp_kanji: すごいキズぐすり
    en: Hyper Potion
    fr: Hyper Potion
    it: Iperpozione
    de: Hypertrank
    es: Hiperpoción
    ko: 고급상처약
  descriptions:
    jp_kana: "スプレーしきの　キズぐすり。\nポケモン　１ひきの　ＨＰを\n２００だけ　かいふくする。"
    jp_kanji: "スプレー式の　キズぐすり。\nポケモン　１匹の　ＨＰを\n２００だけ　回復する。"
    en: "A spray-type medicine for treating\nwounds. It can be used to restore\n200 HP to an injured Pokémon."
    fr: "Un spray qui soigne les blessures.\nRestaure 200 PV d’un Pokémon."
    it: "Rimedio spray per le ferite.\nRestituisce 200 PS a un Pokémon."
    de: "Hilft bei Wunden. Füllt die KP eines Pokémon\num 200 Punkte auf."
    es: "Medicina en espray que cura heridas y restaura\n200 PS de un Pokémon."
    ko: "스프레이식의 상처약.\n포켓몬 1마리의 HP를\n200만큼 회복한다."
iapapa_berry:
  names:
    jp_kana: イアのみ
    jp_kanji: イアのみ
    en: Iapapa Berry
    fr: Baie Papaya
    it: Baccapaia
    de: Yapabeere
    es: Baya Pabaya
    ko: 파야열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but it will cause\nconfusion if the user hates the taste."
    fr: "Tenue, cette Baie restaure des PV en cas\nde besoin, mais rend le Pokémon confus si\nson goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die KP eines\nPokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar algunos PS. Su sabor puede causar\nconfusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
ice_gem:
  names:
    jp_kana: こおりのジュエル
    jp_kanji: こおりのジュエル
    en: Ice Gem
    fr: Joyau Glace
    it: Bijoughiaccio
    de: Eisjuwel
    es: Gema Hielo
    ko: 얼음주얼
  descriptions:
    jp_kana: "こおりの　タイプの　ジュエル。\nもたせると　いちどだけ　こおりの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　ジュエル。\n持たせると　１度だけ　こおりの\n技の　威力が　強まる。"
    en: "A gem with an essence of ice.\nWhen held, it strengthens the power\nof an Ice-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Ghiaccio."
    de: "Ein Juwel vom Typ Eis. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Eis."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Hielo. Debe llevarla\nun Pokémon."
    ko: "얼음타입의 주얼.\n지니게 하면 한 번만 얼음\n기술의 위력이 강해진다."
ice_heal:
  names:
    jp_kana: こおりなおし
    jp_kanji: こおりなおし
    en: Ice Heal
    fr: Antigel
    it: Antigelo
    de: Eisheiler
    es: Antihielo
    ko: 얼음상태치료제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　こおりの\nじょうたいを　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　こおりの\n状態を　回復する。"
    en: "A spray-type medicine for freezing.\nIt can be used once to defrost a\nPokémon that has been frozen solid."
    fr: "Un médicament sous forme de spray.\nRéchauffe un Pokémon gelé."
    it: "Rimedio spray.\nCura un Pokémon dal congelamento."
    de: "Ein Spray, das ein eingefrorenes Pokémon\nauftaut."
    es: "Medicina en espray que descongela a un\nPokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n얼음 상태를 회복한다."
icicle_plate:
  names:
    jp_kana: つららのプレート
    jp_kanji: つららのプレート
    en: Icicle Plate
    fr: Plaque Glace
    it: Lastragelo
    de: Frosttafel
    es: Tabla Helada
    ko: 고드름플레이트
  descriptions:
    jp_kana: "こおりの　タイプの　せきばん。\nもたせると　こおりタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "こおりの　タイプの　石盤。\n持たせると　こおりタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Ice-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Glace."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Ghiaccio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Eis."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Hielo. Debe llevarla un Pokémon."
    ko: "얼음타입의 석판.\n지니게 하면 얼음타입\n기술의 위력이 강해진다."
icy_rock:
  names:
    jp_kana: つめたいいわ
    jp_kanji: つめたいいわ
    en: Icy Rock
    fr: Roche Glace
    it: Rocciafredda
    de: Eisbrocken
    es: Roca Helada
    ko: 차가운바위
  descriptions:
    jp_kana: "もたせた　ポケモンが　あられを\nつかうと　いつもより　あられの\nじかんが　ながくなる。"
    jp_kanji: "持たせた　ポケモンが　あられを\n使うと　いつもより　あられの\n時間が　長くなる。"
    en: "An item to be held by a Pokémon.\nIt extends the duration of the move\nHail when it’s used by the holder."
    fr: "Objet à tenir. Augmente la durée de la capacité\nGrêle utilisée par le porteur."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata della mossa Grandine."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nHagelsturm, wenn der Träger es einsetzt."
    es: "Prolonga la duración del movimiento Granizo que\nuse el Pokémon que la lleva."
    ko: "지니게 한 포켓몬이 싸라기눈을\n쓰면 여느 때보다 싸라기눈의\n시간이 길어진다."
inquiry_mail:
  names:
    jp_kana: しつもんメール
    jp_kanji: しつもんメール
    en: Inquiry Mail
    fr: Lettre Demande
    it: Messaggio Chiedi
    de: Fragebrief
    es: Carta Pregunta
    ko: 질문메일
  descriptions:
    jp_kana: "あいてへの　しつもんの　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "相手への　質問の　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier\nto pose a question about something.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour poser des\nquestions. Peut être tenu et livré par\nun Pokémon."
    it: "Carta da lettere ideale per scrivere una domanda.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem eine Frage\nstellen kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para preguntar a un compañero. Haz que la\nentregue un Pokémon."
    ko: "상대에게 질문하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
insect_plate:
  names:
    jp_kana: たまむしプレート
    jp_kanji: たまむしプレート
    en: Insect Plate
    fr: Plaque Insecte
    it: Lastrabaco
    de: Käfertafel
    es: Tabla Bicho
    ko: 비단벌레플레이트
  descriptions:
    jp_kana: "むしの　タイプの　せきばん。\nもたせると　むしタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "むしの　タイプの　石盤。\n持たせると　むしタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Bug-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Insecte."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Coleottero."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Käfer."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Bicho. Debe llevarla un Pokémon."
    ko: "벌레타입의 석판.\n지니게 하면 벌레타입\n기술의 위력이 강해진다."
intriguing_stone:
  names:
    jp_kana: すごそうないし
    jp_kanji: すごそうないし
    en: Intriguing Stone
    fr: Pierre Insolite
    it: Sasso suggestivo
    de: Kurioser Stein
    es: Piedra Insólita
    ko: 대단할듯한돌
  descriptions:
    jp_kana: "みる　ひとに　よっては\nきちょう　かもしれない\nかなり　かわった　いし。"
    jp_kanji: "みる　人に　よっては\n貴重　かもしれない\nかなり　変わった　石。"
    en: "A rather curious stone that might appear valuable\nto some. It’s all in the eye of the beholder."
    fr: "Une pierre assez étrange qui pourrait avoir de la\nvaleur pour certains."
    it: "Un sasso piuttosto singolare che qualcuno\npotrebbe ritenere di valore."
    de: "Ein ungewöhnlicher Stein, dessen Wert je nach\nBetrachter unterschiedlich eingeschätzt wird."
    es: "Una curiosa piedra que a algunos les puede\nparecer de gran valor."
    ko: "보는 사람에 따라서는\n귀중할지도 모르는\n꽤 특이한 돌."
iron:
  names:
    jp_kana: ブロムヘキシン
    jp_kanji: ブロムヘキシン
    en: Iron
    fr: Fer
    it: Ferro
    de: Eisen
    es: Hierro
    ko: 사포닌
  descriptions:
    jp_kana: "ポケモンの　えいようドリンク。\nポケモン　１ひきの　ぼうぎょの\nきそポイントを　あげる。"
    jp_kanji: "ポケモンの　栄養ドリンク。\nポケモン　１匹の　防御の\n基礎ポイントを　あげる。"
    en: "A nutritious drink for Pokémon.\nWhen consumed, it raises the base\nDefense stat of a single Pokémon."
    fr: "Une boisson très nutritive qui augmente\nla Défense de base d’un Pokémon."
    it: "Bevanda nutriente per Pokémon.\nAumenta i punti base della Difesa."
    de: "Ein gehaltvolles Getränk, das den\nVerteidigungs-Basiswert eines Pokémon\ndauerhaft erhöht."
    es: "Nutritiva bebida que potencia la Defensa de base\nde un Pokémon."
    ko: "포켓몬의 영양 드링크.\n포켓몬 1마리의 방어\n기초 포인트를 올린다."
iron_ball:
  names:
    jp_kana: くろいてっきゅう
    jp_kanji: くろいてっきゅう
    en: Iron Ball
    fr: Balle Fer
    it: Ferropalla
    de: Eisenkugel
    es: Bola Férrea
    ko: 검은철구
  descriptions:
    jp_kana: "もたせると　すばやさが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめんわざが　あたって　しまう。"
    jp_kanji: "持たせると　素早さが　さがる。\nひこうタイプや　ふゆう　ポケモンは\nじめん技が　当たってしまう。"
    en: "An item to be held by a Pokémon.\nIt lowers Speed and allows Ground-type\nmoves to hit Flying-type and levitating holders."
    fr: "Objet à tenir. Réduit la Vitesse. Rend les porteurs\nde type Vol, ainsi que ceux en lévitation,\nsensibles aux capacités de type Sol."
    it: "Riduce la Velocità e rende vulnerabili\nalle mosse di tipo Terra se chi ce l’ha è\ndi tipo Volante o ha l’abilità Levitazione."
    de: "Ein Item zum Tragen. Macht Pokémon des Typs\nFlug oder mit der Fähigkeit Schwebe anfällig für\nBoden-Attacken. Senkt den Initiative-Wert."
    es: "Reduce la Velocidad. Los Pokémon que levitan y\nlos de tipo Volador se tornan sensibles a\nmovimientos de tipo Tierra."
    ko: "지니게 하면 스피드가 떨어진다.\n비행타입이나 부유포켓몬은\n땅 기술에 맞아 버린다."
iron_plate:
  names:
    jp_kana: こうてつプレート
    jp_kanji: こうてつプレート
    en: Iron Plate
    fr: Plaque Fer
    it: Lastraferro
    de: Eisentafel
    es: Tabla Acero
    ko: 강철플레이트
  descriptions:
    jp_kana: "はがねの　タイプの　せきばん。\nもたせると　はがねタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "はがねの　タイプの　石盤。\n持たせると　はがねタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Steel-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Acier."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Acciaio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Stahl."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Acero. Debe llevarla un Pokémon."
    ko: "강철타입의 석판.\n지니게 하면 강철타입\n기술의 위력이 강해진다."
item_drop:
  names:
    jp_kana: アイテムドロップ
    jp_kanji: アイテムドロップ
    en: Item Drop
    fr: Jette Objet
    it: Lascioggetto
    de: Itemabwurf
    es: Tiraobjeto
    ko: 아이템드롭
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　なくす。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　なくす。"
    en: "When used, it causes an ally\nPokémon to drop a held item."
    fr: "Retire tout objet tenu par un Pokémon de\nl’équipe."
    it: "Usandolo, un Pokémon della squadra lascerà\nil proprio strumento."
    de: "Der Mitstreiter lässt bei Gebrauch das\nvon ihm getragene Item fallen."
    es: "Cuando se usa, un Pokémon de tu equipo pierde\nsu objeto."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 잃어버린다."
item_urge:
  names:
    jp_kana: アイテムコール
    jp_kanji: アイテムコール
    en: Item Urge
    fr: Appel Objet
    it: Chiamoggetto
    de: Itemappell
    es: Activaobjeto
    ko: 아이템콜
  descriptions:
    jp_kana: "つかうと　みかたの　ポケモンが\nもっている　どうぐを　すぐつかう。"
    jp_kanji: "使うと　味方の　ポケモンが\n持っている　道具を　すぐ使う。"
    en: "When used, it causes an ally\nPokémon to use its held item."
    fr: "Permet d’utiliser immédiatement l’objet tenu par\nun Pokémon de l’équipe."
    it: "Usandolo, un Pokémon della squadra userà\nimmediatamente il proprio strumento."
    de: "Der Mitstreiter setzt bei Gebrauch sofort das\nvon ihm getragene Item ein."
    es: "Cuando se usa, un Pokémon de tu equipo utiliza\nsu objeto inmediatamente."
    ko: "사용하면 같은 편 포켓몬이\n지니고 있는 도구를 바로 쓴다."
jaboca_berry:
  names:
    jp_kana: ジャポのみ
    jp_kanji: ジャポのみ
    en: Jaboca Berry
    fr: Baie Jaboca
    it: Baccajaba
    de: Jabocabeere
    es: Baya Jaboca
    ko: 자보열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nぶつりわざを　うけたとき\nあいてにも　ダメージを　あたえる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n相手にも　ダメージを　あたえる。"
    en: "A Berry to be consumed by Pokémon.\nIf a physical attack hits the Pokémon\nholding it, the attacker will also be hurt."
    fr: "Tenue, cette Baie inflige des dégâts à\nl’attaquant s’il utilise une attaque physique\nqui atteint son but."
    it: "Se un Pokémon ha questa bacca, chi attacca\nsubirà danni se la sua mossa fisica va a segno."
    de: "Als getragenes Item bewirkt diese Beere\nSchaden bei jenen, die den Träger mit einer\nphysischen Attacke treffen."
    es: "Si la lleva un Pokémon cuando otro lanza un\nataque físico, este último también recibe daño."
    ko: "포켓몬에게 지니게 하면\n물리 기술을 당했을 때\n상대에게도 데미지를 준다."
jade_orb:
  names:
    jp_kana: もえぎいろのたま
    jp_kanji: もえぎいろのたま
    en: Jade Orb
    fr: Orbe Vert
    it: Sfera Verde
    de: Grüne Kugel
    es: Esfera Verde
    ko: 연둣빛구슬
  descriptions:
    jp_kana: "ホウエンちほうの　でんせつと\nふかい　かかわりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    jp_kanji: "ホウエン地方の　伝説と\n深い　関わりが　あると　いわれる\nみどりいろに　かがやく　たま。"
    en: "A shiny green orb that is said to have\na legend tied to it. It’s known to have a\ndeep connection with the Hoenn region."
    fr: "Un orbe viride dont on dit qu’il a un lien très\nétroit avec les légendes de Hoenn."
    it: "Sfera con riflessi verdi, che pare essere\nstrettamente legata alle leggende della regione\ndi Hoenn."
    de: "Eine grün schimmernde Kugel, von der in den\nLegenden der Hoenn-Region berichtet wird."
    es: "Esfera glauca de la que se dice que guarda una\nestrecha relación con las leyendas de Hoenn."
    ko: "호연지방의 전설과\n깊은 연관이 있다고 전해지는\n초록색으로 빛나는 구슬."
jaw_fossil:
  names:
    jp_kana: アゴのカセキ
    jp_kanji: アゴのカセキ
    en: Jaw Fossil
    fr: Fossile Mâchoire
    it: Fossilmascella
    de: Kieferfossil
    es: Fósil Mandíbula
    ko: 턱화석
  descriptions:
    jp_kana: "おおむかし　ちじょうで　くらした\nこだい　ポケモンの　カセキ。\nおおきな　アゴの　いちぶ　らしい。"
    jp_kanji: "大昔　地上で　暮らした\n古代ポケモンの　カセキ。\n大きな　アゴの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived on the land. It looks as\nif it could be a piece of a large jaw."
    fr: "Le fossile d’un Pokémon préhistorique terrestre.\nOn dirait un fragment de mâchoire."
    it: "Fossile di un Pokémon preistorico che viveva\nsulla terraferma. Sembra far parte di una grossa\nmascella."
    de: "Das Fossil eines uralten Pokémon, das an Land\nlebte. Es sieht wie ein Kieferknochen aus."
    es: "Fósil de un Pokémon prehistórico terrestre.\nParece ser parte de una mandíbula."
    ko: "오랜 옛날 지상에서 살았던\n고대 포켓몬의 화석.\n커다란 턱의 일부인 듯하다."
kangaskhanite:
  names:
    jp_kana: ガルーラナイト
    jp_kanji: ガルーラナイト
    en: Kangaskhanite
    fr: Kangourexite
    it: Kangaskhanite
    de: Kangamanit
    es: Kangaskhanita
    ko: 캥카나이트
  descriptions:
    jp_kana: "ガルーラに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ガルーラに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Kangaskhan hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Kangourex, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Kangaskhan, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Kangama getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Kangaskhan en combate."
    ko: "캥카에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
kasib_berry:
  names:
    jp_kana: カシブのみ
    jp_kanji: カシブのみ
    en: Kasib Berry
    fr: Baie Sédra
    it: Baccacitrus
    de: Zitarzbeere
    es: Baya Drasi
    ko: 수불열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　ゴースト　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　ゴースト技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Ghost-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Spectre."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Spettro del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Geist."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Fantasma de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 고스트 기술을\n당했을 때 위력이 약해진다."
kebia_berry:
  names:
    jp_kana: ビアーのみ
    jp_kanji: ビアーのみ
    en: Kebia Berry
    fr: Baie Kébia
    it: Baccakebia
    de: Grarzbeere
    es: Baya Kebia
    ko: 으름열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　どく　わざを\nうけたとき　いりょくが　よわまる。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　どく技を\n受けたとき　威力が　弱まる。"
    en: "If held by a Pokémon, this Berry will\nlessen the damage taken from one\nsupereffective Poison-type attack."
    fr: "Tenue, cette Baie affaiblit une attaque ennemie\nsuper efficace de type Poison."
    it: "Se un Pokémon ha questa bacca, l’attacco\nsuperefficace di tipo Veleno del nemico\nviene indebolito."
    de: "Als getragenes Item schwächt diese Beere\nsehr effektive Attacken des Angreifers\nvom Typ Gift."
    es: "Si la lleva un Pokémon, debilita un ataque\nsupereficaz de tipo Veneno de un enemigo."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 독 기술을\n당했을 때 위력이 약해진다."
kee_berry:
  names:
    jp_kana: アッキのみ
    jp_kanji: アッキのみ
    en: Kee Berry
    fr: Baie Éka
    it: Baccalighia
    de: Akibeere
    es: Baya Biglia
    ko: 악키열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nぶつりわざを　うけたとき\nじぶんの　ぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\n物理技を　受けたとき\n自分の　防御が　あがる。"
    en: "If held by a Pokémon, this Berry\nwill increase the holder’s Defense\nif it’s hit with a physical move."
    fr: "Baie à tenir augmentant la Défense du Pokémon\nlorsqu’il est touché par une attaque physique."
    it: "Bacca da dare a un Pokémon.\nSe chi ce l’ha subisce una mossa fisica,\nla sua Difesa aumenta."
    de: "Als getragenes Item erhöht diese Beere die\nVerteidigung des Trägers, wenn dieser von\nphysischen Attacken getroffen wird."
    es: "Si la lleva un Pokémon, aumenta su Defensa\ntras recibir un ataque físico."
    ko: "포켓몬에게 지니게 하면\n물리 기술을 당했을 때\n자신의 방어가 올라간다."
kelpsy_berry:
  names:
    jp_kana: ネコブのみ
    jp_kanji: ネコブのみ
    en: Kelpsy Berry
    fr: Baie Alga
    it: Baccalga
    de: Setangbeere
    es: Baya Algama
    ko: 시마열매
  descriptions:
    jp_kana: "ポケモンに　あげると\nとても　なつき　やすくなるが\nこうげきの　きそポイントは　さがる。"
    jp_kanji: "ポケモンに　あげると\nとても　なつき　やすくなるが\n攻撃の　基礎ポイントは　さがる。"
    en: "A Berry to be consumed by Pokémon.\nUsing it on a Pokémon makes it more\nfriendly but lowers its base Attack."
    fr: "Une Baie qui rend les Pokémon plus amicaux,\nmais baisse leur Attaque de base."
    it: "Usata su un Pokémon, lo rende più amichevole,\nma ne diminuisce i punti base dell’Attacco."
    de: "Isst ein Pokémon diese Beere, stärkt dies\neure Freundschaft, verringert aber seinen\nAngriffs-Basiswert."
    es: "Al usarla con un Pokémon, se gana su amistad,\npero también reduce su Ataque de base."
    ko: "포켓몬에게 주면\n매우 친밀해지기 쉬워지지만\n공격의 기초 포인트가 떨어진다."
key_stone:
  names:
    jp_kana: キーストーン
    jp_kanji: キーストーン
    en: Key Stone
    fr: Gemme Sésame
    it: Pietrachiave
    de: Schlüssel-Stein
    es: Piedra Activadora
    ko: 키스톤
  descriptions:
    jp_kana: "ポケモンを　メガシンカさせる\nみちのパワーを　ひめた　いし。\nトレーナーが　みにつける。"
    jp_kanji: "ポケモンを　メガシンカさせる\nみちのパワーを　ひめた　いし。\nトレーナーが　みにつける。"
    en: "A stone of unexplained power\nthat makes Pokémon Mega Evolve."
    fr: "Une pierre aux pouvoirs mystérieux permettant à\nun Pokémon de méga-évoluer.\nCette pierre doit être tenue par le Dresseur."
    it: "Pietra dotata di un misterioso potere.\nSe tenuta da un Allenatore, può innescare\nla megaevoluzione di alcuni Pokémon."
    de: "Ein Stein mit unbekannten Kräften, der bei\nPokémon eine Mega-Entwicklung auslöst.\nTrainer tragen ihn am Körper."
    es: "Piedra portadora de singulares poderes que\npermite megaevolucionar a un Pokémon.\nPara ello, ha de llevarla consigo un Entrenador."
    ko: "포켓몬을 메가진화시키는\n미지의 힘을 가진 돌.\n트레이너가 몸에 착용한다."
key_to_room_1:
  names:
    jp_kana: １ごうしつのカギ
    jp_kanji: １ごうしつのカギ
    en: Key to Room 1
    fr: Clé Salle 1
    it: Chiave stanza 1
    de: R1-Schlüssel
    es: Ll. Habitación 1
    ko: 1호실열쇠
  descriptions:
    jp_kana: "シーキンセツの　へやに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　部屋に\n入るための　カギ。"
    en: "A key that opens a door\ninside Sea Mauville."
    fr: La clé d’une salle de Lavandia Sea.
    it: "Chiave per accedere a una delle stanze\ndi Ciclamare."
    de: "Ein Schlüssel, der in das Schloss eines Raumes\nauf Seewoge Malvenfroh passt."
    es: "Llave de acceso a una de las habitaciones de\nMalvamar."
    ko: "씨보라의 방으로\n들어가기 위한 열쇠."
key_to_room_2:
  names:
    jp_kana: ２ごうしつのカギ
    jp_kanji: ２ごうしつのカギ
    en: Key to Room 2
    fr: Clé Salle 2
    it: Chiave stanza 2
    de: R2-Schlüssel
    es: Ll. Habitación 2
    ko: 2호실열쇠
  descriptions:
    jp_kana: "シーキンセツの　へやに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　部屋に\n入るための　カギ。"
    en: "A key that opens a door\ninside Sea Mauville."
    fr: La clé d’une salle de Lavandia Sea.
    it: "Chiave per accedere a una delle stanze\ndi Ciclamare."
    de: "Ein Schlüssel, der in das Schloss eines Raumes\nauf Seewoge Malvenfroh passt."
    es: "Llave de acceso a una de las habitaciones de\nMalvamar."
    ko: "씨보라의 방으로\n들어가기 위한 열쇠."
key_to_room_4:
  names:
    jp_kana: ４ごうしつのカギ
    jp_kanji: ４ごうしつのカギ
    en: Key to Room 4
    fr: Clé Salle 4
    it: Chiave stanza 4
    de: R4-Schlüssel
    es: Ll. Habitación 4
    ko: 4호실열쇠
  descriptions:
    jp_kana: "シーキンセツの　へやに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　部屋に\n入るための　カギ。"
    en: "A key that opens a door\ninside Sea Mauville."
    fr: La clé d’une salle de Lavandia Sea.
    it: "Chiave per accedere a una delle stanze\ndi Ciclamare."
    de: "Ein Schlüssel, der in das Schloss eines Raumes\nauf Seewoge Malvenfroh passt."
    es: "Llave de acceso a una de las habitaciones de\nMalvamar."
    ko: "씨보라의 방으로\n들어가기 위한 열쇠."
key_to_room_6:
  names:
    jp_kana: ６ごうしつのカギ
    jp_kanji: ６ごうしつのカギ
    en: Key to Room 6
    fr: Clé Salle 6
    it: Chiave stanza 6
    de: R6-Schlüssel
    es: Ll. Habitación 6
    ko: 6호실열쇠
  descriptions:
    jp_kana: "シーキンセツの　へやに\nはいる　ための　カギ。"
    jp_kanji: "シーキンセツの　部屋に\n入るための　カギ。"
    en: "A key that opens a door\ninside Sea Mauville."
    fr: La clé d’une salle de Lavandia Sea.
    it: "Chiave per accedere a una delle stanze\ndi Ciclamare."
    de: "Ein Schlüssel, der in das Schloss eines Raumes\nauf Seewoge Malvenfroh passt."
    es: "Llave de acceso a una de las habitaciones de\nMalvamar."
    ko: "씨보라의 방으로\n들어가기 위한 열쇠."
kings_rock:
  names:
    jp_kana: おうじゃのしるし
    jp_kanji: おうじゃのしるし
    en: King’s Rock
    fr: Roche Royale
    it: Roccia di Re
    de: King-Stein
    es: Roca del Rey
    ko: 왕의징표석
  descriptions:
    jp_kana: "もたせると　こうげきして\nダメージを　あたえたときに\nあいてを　ひるませることが　ある。"
    jp_kanji: "持たせると　攻撃して\nダメージを　与えたときに\n相手を　ひるませることが　ある。"
    en: "An item to be held by a Pokémon.\nWhen the holder successfully inflicts\ndamage, the target may also flinch."
    fr: "Objet à tenir. Peut apeurer l’ennemi lorsque\nle porteur lui inflige des dégâts."
    it: "Strumento da dare a un Pokémon.\nSe chi lo usa arreca danni, può far tentennare\nil nemico."
    de: "Gibst du es einem Pokémon zum Tragen,\nlässt es mit seinem Angriff das Ziel gelegentlich\nzurückschrecken."
    es: "El Pokémon que la lleva puede hacer retroceder\nal Pokémon al que le inflige daño."
    ko: "지니게 하면\n공격해서 데미지를 줄 때\n상대를 풀죽이기도 한다."
lagging_tail:
  names:
    jp_kana: こうこうのしっぽ
    jp_kanji: こうこうのしっぽ
    en: Lagging Tail
    fr: Ralentiqueue
    it: Rallentocoda
    de: Schwerschwf.
    es: Cola Plúmbea
    ko: 느림보꼬리
  descriptions:
    jp_kana: "とても　おもたい　なにかの　しっぽ。\nもたせると　いつもより　こうどうが\nおそくなる。"
    jp_kanji: "とても　重たい　なにかの　しっぽ。\n持たせると　いつもより　行動が\n遅くなる。"
    en: "An item to be held by a Pokémon.\nIt is tremendously heavy and makes\nthe holder move slower than usual."
    fr: "Objet à tenir extrêmement lourd qui ralentit\nle porteur."
    it: "Strumento da dare a un Pokémon.\nÈ tremendamente pesante e rende più lenti\ndel normale."
    de: "Ein Item zum Tragen. Es ist immens schwer\nund senkt die Geschwindigkeit des Trägers."
    es: "Es muy pesada y hace que el Pokémon que la\nlleva se mueva más lento de lo normal."
    ko: "매우 무거운 무언가의 꼬리.\n지니게 하면 여느 때보다\n행동이 느려진다."
lansat_berry:
  names:
    jp_kana: サンのみ
    jp_kanji: サンのみ
    en: Lansat Berry
    fr: Baie Lansat
    it: Baccalangsa
    de: Lansatbeere
    es: Baya Zonlan
    ko: 랑사열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　こうげきが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　攻撃が\n急所に　当たりやすくなる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its critical-hit\nratio will increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente le taux de critiques\nen cas de besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la probabilità di sferrare brutti colpi\naumenta."
    de: "Als getragenes Item erhöht diese Beere die\nVolltrefferquote eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, aumenta la probabilidad\nde dar un golpe crítico en un momento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 공격이\n급소를 맞히기 쉬워진다."
latiasite:
  names:
    jp_kana: ラティアスナイト
    jp_kanji: ラティアスナイト
    en: Latiasite
    fr: Latiasite
    it: Latiasite
    de: Latiasnit
    es: Latiasita
    ko: 라티아스나이트
  descriptions:
    jp_kana: "ラティアスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラティアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Latias hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Latias, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Latias, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Latias getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Latias en combate."
    ko: "라티아스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
latiosite:
  names:
    jp_kana: ラティオスナイト
    jp_kanji: ラティオスナイト
    en: Latiosite
    fr: Latiosite
    it: Latiosite
    de: Latiosnit
    es: Latiosita
    ko: 라티오스나이트
  descriptions:
    jp_kana: "ラティオスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ラティオスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Latios hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par Latios, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Latios, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Latios getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Latios en combate."
    ko: "라티오스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
lava_cookie:
  names:
    jp_kana: フエンせんべい
    jp_kanji: フエンせんべい
    en: Lava Cookie
    fr: Lava Cookie
    it: Lavottino
    de: Lavakeks
    es: Galleta Lava
    ko: 용암전병
  descriptions:
    jp_kana: "フエンめいぶつの　せんべい。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "フエン名物の　せんべい。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "Lavaridge Town’s local specialty.\nIt can be used once to heal all the\nstatus conditions of a Pokémon."
    fr: "La spécialité de la ville de Vermilava.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Specialità tipica di Cuordilava.\nCura tutti i problemi di stato di un Pokémon."
    de: "Eine Spezialität aus Bad Lavastadt, die alle\nStatusprobleme eines Pokémon heilt."
    es: "Dulce típico de Pueblo Lavacalda que cura todos\nlos problemas de estado de un Pokémon."
    ko: "용암마을의 명물인 전병.\n포켓몬 1마리의\n상태 이상을 회복한다."
lax_incense:
  names:
    jp_kana: のんきのおこう
    jp_kanji: のんきのおこう
    en: Lax Incense
    fr: Encens Doux
    it: Distraroma
    de: Laxrauch
    es: Incienso Suave
    ko: 무사태평향로
  descriptions:
    jp_kana: "もたせると　おこうの　ふしぎな\nかおりが　あいてを　まどわせて\nわざが　めいちゅう　しにくくなる。"
    jp_kanji: "持たせると　御香の　不思議な\n香りが　相手を　まどわせて\n技が　命中　しにくくなる。"
    en: "An item to be held by a Pokémon.\nThe beguiling aroma of this incense\nmay cause attacks to miss its holder."
    fr: "Objet à tenir. Le parfum trompeur de cet encens\nbaisse la Précision de l’ennemi."
    it: "Strumento da dare a un Pokémon.\nIl suo aroma intenso riduce la precisione\ndel nemico."
    de: "Ein Item zum Tragen. Das verwirrende Aroma\nsenkt die Genauigkeit des Gegners."
    es: "Debe llevarlo un Pokémon. Su peculiar aroma\nreduce la Precisión del objetivo."
    ko: "지니게 하면 향로의 이상한\n향기가 상대를 혼란시켜\n기술이 명중하기 어려워진다."
leaf_stone:
  names:
    jp_kana: リーフのいし
    jp_kanji: リーフのいし
    en: Leaf Stone
    fr: Pierre Plante
    it: Pietrafoglia
    de: Blattstein
    es: Piedra Hoja
    ko: 리프의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nはっぱの　もようが　ある。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nはっぱの　模様が　ある。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt has an unmistakable leaf pattern."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Une feuille est dessinée\ndessus."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. Riporta l’immagine\ndi una foglia."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er hat ein\nBlattmuster."
    es: "Curiosa piedra que hace evolucionar a\ndeterminadas especies de Pokémon. Tiene\ngrabada una hoja."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n잎사귀 무늬가 있다."
leek:
  names:
    jp_kana: ながねぎ
    jp_kanji: ながねぎ
    en: Stick
    fr: Bâton
    it: Gambo
    de: Lauchstange
    es: Palo
    ko: 대파
  descriptions:
    jp_kana: "とても　ながくて　かたい　クキ。\nカモネギに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "とても　長くて　硬い　クキ。\nカモネギに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Farfetch’d.\nThis very long and stiff stalk of\nleek boosts its critical-hit ratio."
    fr: "Objet à faire tenir à Canarticho.\nUn poireau très long et solide qui augmente\nson taux de critiques."
    it: "Strumento da dare a Farfetch’d.\nLungo gambo di porro che aumenta molto\nla probabilità di sferrare brutti colpi."
    de: "Ein Item, das von Porenta getragen werden\nkann. Diese lange Lauchstange erhöht die\nVolltrefferquote stark."
    es: "Es un puerro muy largo que debe llevar\nFarfetch’d. Aumenta mucho la probabilidad\nde que logre un golpe crítico."
    ko: "매우 길고 단단한 줄기.\n파오리에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
leftovers:
  names:
    jp_kana: たべのこし
    jp_kanji: たべのこし
    en: Leftovers
    fr: Restes
    it: Avanzi
    de: Überreste
    es: Restos
    ko: 먹다남은음식
  descriptions:
    jp_kana: "もたせると　ポケモンの　ＨＰが\nせんとうの　あいだ　すこしずつ\nかいふくする。"
    jp_kanji: "持たせると　ポケモンの　ＨＰが\n戦闘の　あいだ　少しずつ\n回復する。"
    en: "An item to be held by a Pokémon.\nThe holder’s HP is slowly but steadily\nrestored throughout every battle."
    fr: "Objet à tenir. Permet de restaurer graduellement\nles PV du porteur durant le combat."
    it: "Strumento da dare a un Pokémon.\nFa recuperare gradualmente i PS durante la lotta."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es füllt im Kampf\nstetig KP auf."
    es: "Este objeto restaura gradualmente durante el\ncombate los PS del Pokémon que lo lleva."
    ko: "지니게 하면 포켓몬의 HP가\n배틀을 하는 동안 조금씩\n회복된다."
lemonade:
  names:
    jp_kana: ミックスオレ
    jp_kanji: ミックスオレ
    en: Lemonade
    fr: Limonade
    it: Lemonsucco
    de: Limonade
    es: Limonada
    ko: 후르츠밀크
  descriptions:
    jp_kana: "とても　あまい　ジュース。\nポケモン　１ひきの　ＨＰを\n８０だけ　かいふくする。"
    jp_kanji: "とても　あまい　ジュース。\nポケモン　１匹の　ＨＰを\n８０だけ　回復する。"
    en: "A very sweet and refreshing drink.\nWhen consumed, it restores\n80 HP to an injured Pokémon."
    fr: "Une boisson très sucrée.\nRestaure 80 PV d’un Pokémon."
    it: "Bevanda molto dolce.\nRestituisce 80 PS a un Pokémon."
    de: "Ein sehr süßes Getränk, das die KP\neines Pokémon um 80 Punkte auffüllt."
    es: "Bebida muy dulce que restaura 80 PS de un\nPokémon."
    ko: "매우 달콤한 쥬스.\n포켓몬 1마리의 HP를\n80만큼 회복한다."
lens_case:
  names:
    jp_kana: レンズケース
    jp_kanji: レンズケース
    en: Lens Case
    fr: Boîte Lentilles
    it: Portalenti
    de: Linsenetui
    es: Portalentillas
    ko: 렌즈케이스
  descriptions:
    jp_kana: "コンタクトレンズを　しまっておける\nちょっと　おしゃれな　ケース。"
    jp_kanji: "コンタクトレンズを　しまっておける\nちょっと　おしゃれな　ケース。"
    en: "A rather chic-looking case\nfor carrying contact lenses."
    fr: "Un étui plutôt chic destiné aux lentilles de\ncontact."
    it: Un’elegante custodia per lenti a contatto.
    de: "Ein sehr stilvolles Etui zur Aufbewahrung\nvon Kontaktlinsen."
    es: "Estuche de aspecto sofisticado para llevar las\nlentes de contacto."
    ko: "콘택트렌즈를 담아둘 수 있는\n살짝 멋진 케이스."
leppa_berry:
  names:
    jp_kana: ヒメリのみ
    jp_kanji: ヒメリのみ
    en: Leppa Berry
    fr: Baie Mepo
    it: Baccamela
    de: Jonagobeere
    es: Baya Zanama
    ko: 과사열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nＰＰを　１０だけ　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\nＰＰを　１０だけ　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can restore\n10 PP to a depleted move during battle."
    fr: "Une Baie qui restaure 10 PP lorsqu’elle\nest tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, può restituire\n10 PP a una mossa."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nfüllt sie die AP einer Attacke um 10 Punkte auf."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar 10 PP de un movimiento."
    ko: "포켓몬에게 지니게 하면\nPP를 10만큼 회복한다."
letter:
  names:
    jp_kana: ダイゴへのてがみ
    jp_kanji: ダイゴへのてがみ
    en: Letter
    fr: Lettre à Pierre
    it: Lettera
    de: Brief an Troy
    es: Carta a Máximo
    ko: 성호에게줄편지
  descriptions:
    jp_kana: "デボンしゃちょうから\nあずかった　てがみ。"
    jp_kanji: "デボン社長から\nあずかった　手紙。"
    en: "An extremely important letter to Steven\nfrom the President of Devon Corporation."
    fr: Une lettre confiée par le directeur de Devon.
    it: "Lettera che ti è stata affidata dal direttore\ndella Devon."
    de: "Ein Brief, den du im Namen des Präsidenten der\nDevon Corporation an Troy aushändigen sollst."
    es: "Carta que te ha confiado el presidente de\nDevon S. A."
    ko: "데봉사장이\n맡긴 편지."
level_ball:
  names:
    jp_kana: レベルボール
    jp_kanji: レベルボール
    en: Level Ball
    fr: Niveau Ball
    it: Level Ball
    de: Levelball
    es: Nivel Ball
    ko: 레벨볼
  descriptions:
    jp_kana: "じぶんの　ポケモンより　レベルが\nひくいほど　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "自分の　ポケモンより　レベルが\n低いほど　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that makes it easier to\ncatch Pokémon that are at a lower\nlevel than your own Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon de niveau\ninférieur au sien."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon di livello\ninferiore a quello del proprio."
    de: "Ein Ball, mit dem sich Pokémon umso leichter\nfangen lassen, je niedriger ihr Level im Vergleich\nzu deinem Team ist."
    es: "Poké Ball algo distinta que funciona\nespecialmente bien con Pokémon de nivel\ninferior a los que se posee."
    ko: "자신의 포켓몬보다 레벨이\n낮을수록 잡기 쉬워지는\n조금 특이한 볼."
liberty_pass:
  names:
    jp_kana: リバティチケット
    jp_kanji: リバティチケット
    en: Liberty Pass
    fr: Pass Liberté
    it: Liberticket
    de: Gartenpass
    es: Tarjeta Libertad
    ko: 리버티티켓
  descriptions:
    jp_kana: "リバティガーデンとうに　いくための\nとくべつな　チケット。\nヒウンシティから　ふねに　のれる。"
    jp_kanji: "リバティガーデン島に　行くための\n特別な　チケット。\nヒウンシティから　船に　乗れる。"
    en: "A special pass to go to Liberty Garden.\nBoard the ship in Castelia City."
    fr: "Un ticket spécial permettant de se rendre sur\nl’Île Liberté à bord du bateau de Volucité."
    it: "Biglietto speciale per l’Isola Libertà.\nLa nave parte da Austropoli."
    de: "Ein besonderes Ticket für die Überfahrt von\nStratos City zur Insel des Freiheitsgartens."
    es: "Ticket especial para ir en barco desde Ciudad\nPorcelana a Isla Libertad."
    ko: "리버티가든섬에 가기 위한\n특별한 티켓.\n구름시티에서 배를 탈 수 있다."
liechi_berry:
  names:
    jp_kana: チイラのみ
    jp_kanji: チイラのみ
    en: Liechi Berry
    fr: Baie Lichii
    it: Baccalici
    de: Lydzibeere
    es: Baya Lichi
    ko: 치리열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nこうげきが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n攻撃が　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its Attack\nstat will increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente l’Attaque en cas\nde besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, il suo Attacco aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nAngriffs-Wert eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, le sube el Ataque en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n공격이 올라간다."
life_orb:
  names:
    jp_kana: いのちのたま
    jp_kanji: いのちのたま
    en: Life Orb
    fr: Orbe Vie
    it: Assorbisfera
    de: Leben-Orb
    es: Vidasfera
    ko: 생명의구슬
  descriptions:
    jp_kana: "もたせると　こうげきする　たびに\nＨＰが　すこし　へってしまうが\nわざの　いりょくが　あがる。"
    jp_kanji: "持たせると　攻撃する　たびに\nＨＰが　少し　減ってしまうが\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts the power of moves, but\nat the cost of some HP on each hit."
    fr: "Objet à tenir. Augmente la puissance des\ncapacités, mais dépense des PV à chaque coup."
    it: "Strumento da dare a un Pokémon.\nPotenzia le mosse a scapito di alcuni PS\nper ogni colpo."
    de: "Ein Item zum Tragen. Verstärkt Attacken,\naber jede Attacke kostet den Träger KP."
    es: "Potencia los movimientos, pero consume PS con\ncada ataque. Debe llevarla un Pokémon."
    ko: "지니게 하면 공격할 때마다\nHP가 조금씩 줄지만\n기술의 위력이 올라간다."
light_ball:
  names:
    jp_kana: でんきだま
    jp_kanji: でんきだま
    en: Light Ball
    fr: Balle Lumière
    it: Elettropalla
    de: Kugelblitz
    es: Bolaluminosa
    ko: 전기구슬
  descriptions:
    jp_kana: "ピカチュウに　もたせると\nこうげきと　とくこうの　いりょくが\nあがる　ふしぎな　たま。"
    jp_kanji: "ピカチュウに　持たせると\n攻撃と　特攻の　威力が\nあがる　不思議な　玉。"
    en: "An item to be held by Pikachu.\nIt’s a puzzling orb that boosts\nits Attack and Sp. Atk stats."
    fr: "Objet à faire tenir à Pikachu.\nUn orbe énigmatique qui augmente son Attaque\net son Attaque Spéciale."
    it: "Strumento da dare a Pikachu.\nSfera insolita che aumenta l’Attacco e l’Attacco\nSpeciale."
    de: "Ein Item, das von Pikachu getragen werden\nkann. Es erhöht den Angriffs-Wert und\nSpezial-Angriffs-Wert."
    es: "Asombrosa esfera que debe llevar Pikachu y que\naumenta su Ataque y su Ataque Especial."
    ko: "피카츄에게 지니게 하면\n공격과 특수공격의 위력이\n올라가는 이상한 구슬."
light_clay:
  names:
    jp_kana: ひかりのねんど
    jp_kanji: ひかりのねんど
    en: Light Clay
    fr: Lumargile
    it: Creta Luce
    de: Lichtlehm
    es: Refleluz
    ko: 빛의점토
  descriptions:
    jp_kana: "もたせた　ポケモンが　ひかりのかべや\nリフレクターを　つかったとき\nいつもよりも　ながく　のこる。"
    jp_kanji: "持たせた　ポケモンが　ひかりのかべや\nリフレクターを　使ったとき\nいつもよりも　長く　残る。"
    en: "An item to be held by a Pokémon.\nProtective moves like Light Screen\nand Reflect will be effective longer."
    fr: "Objet à tenir. Augmente la durée des capacités\nbarrières telles que Mur Lumière et Protection."
    it: "Strumento da dare a un Pokémon.\nAllunga la durata delle mosse barriera come\nSchermoluce e Riflesso."
    de: "Ein Item zum Tragen. Verlängert die Dauer von\nLichtschild, Reflektor etc."
    es: "Prolonga la duración de barreras como Reflejo y\nPantalla de Luz. Debe llevarla un Pokémon."
    ko: "지니게 한 포켓몬이 빛의장막이나\n리플렉터를 사용했을 때\n여느 때보다 긴 시간 동안 지속된다."
light_stone:
  names:
    jp_kana: ライトストーン
    jp_kanji: ライトストーン
    en: Light Stone
    fr: Galet Blanc
    it: Chiarolite
    de: Lichtstein
    es: Orbe Claro
    ko: 라이트스톤
  descriptions:
    jp_kana: "レシラムの　にくたいが　ほろび\nへんかした　すがた。えいゆうの\nとうじょうを　まっていると　される。"
    jp_kanji: "レシラムの　肉体が　滅び\n変化した　姿。　英雄の\n登場を　待っていると　される。"
    en: "Reshiram’s body was destroyed and\nchanged into this stone. It is said to\nbe waiting for the emergence of a hero."
    fr: "Ce sont les derniers restes du corps de Reshiram.\nOn dit qu’ils attendent l’apparition d’un héros."
    it: "Pietra in cui si è tramutato Reshiram quando\nha perso la sua forma corporea.\nAttende la venuta di un eroe."
    de: "Nach dem Zerfall seines Körpers nahm Reshiram\ndiese Form an. Man sagt, es warte auf die Ankunft\neines Helden."
    es: "Forma que adoptó Reshiram al perder su cuerpo.\nEspera la llegada de un nuevo héroe."
    ko: "레시라무의 육체가 허물어져\n변화한 모습. 영웅의\n등장을 기다린다고 여겨진다."
like_mail:
  names:
    jp_kana: おすすめメール
    jp_kanji: おすすめメール
    en: Like Mail
    fr: Lettre Avis
    it: Mess. Sugg.
    de: Insiderbrief
    es: Carta Gustos
    ko: 추천메일
  descriptions:
    jp_kana: "なにかを　おすすめする　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "なにかを　おすすめする　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to allow you to\nrecommend something to the reader.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour donner des\nconseils. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per scrivere un consiglio.\nSi può dare a un Pokémon affinché la consegni."
    de: "Briefpapier, mit dem man jemandem einen Tipp\ngeben kann. Gib es einem Pokémon zum Tragen."
    es: "Carta para recomendar algo. Haz que la entregue\nun Pokémon."
    ko: "뭔가 추천하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
lock_capsule:
  names:
    jp_kana: ロックカプセル
    jp_kanji: ロックカプセル
    en: Lock Capsule
    fr: Poké Écrin
    it: Capsula Scrigno
    de: Tresorkapsel
    es: Cápsula Candado
    ko: 록캡슐
  descriptions:
    jp_kana: "とくしゅな　カギで　あけられる\nがんじょうな　カプセル。"
    jp_kanji: "特殊な　カギで　あけられる\n頑丈な　カプセル。"
    en: "A sturdy Capsule that can only\nbe opened with a special key."
    fr: "Un écrin résistant qui ne s’ouvre qu’avec une clé\nspéciale."
    it: "Scrigno blindato che si apre solo con una chiave\nspeciale."
    de: "Eine äußerst robuste Kapsel, die sich nur mit\neinem ganz speziellen Schlüssel öffnen lässt."
    es: "Una Cápsula resistente que solo puede abrirse\ncon una llave especial."
    ko: "특수한 열쇠로 열 수 있는\n튼튼한 캡슐."
looker_ticket:
  names:
    jp_kana: ハンサムチケット
    jp_kanji: ハンサムチケット
    en: Looker Ticket
    fr: Ticket Beladonis
    it: Carta Bellocchio
    de: LeBelle-Ticket
    es: Boleto Handsome
    ko: 핸섬티켓
  descriptions:
    jp_kana: "きらきら　かがやく\nとりょうが　ふきつけられた\nハンサム　てづくりの　チケット。"
    jp_kanji: "きらきら　かがやく\n塗料が　吹きつけられた\nハンサム　てづくりの　チケット。"
    en: "A ticket that was handmade by\nLooker. It’s decorated with a\nliberal amount of glittery paint."
    fr: "Un ticket brillant de mille feux, peint à la main\npar Beladonis."
    it: "Un biglietto realizzato a mano da Bellocchio,\ndipinto con colori brillanti."
    de: "Ein von LeBelle persönlich gebasteltes Ticket.\nEs ist mit einer leuchtenden Farbschicht\nüberzogen."
    es: "Boleto hecho a mano por Handsome, decorado\ncon una generosa cantidad de purpurina."
    ko: "번쩍번쩍 빛나는\n스프레이가 뿌려진\n핸섬이 직접 만든 티켓."
loot_sack:
  names:
    jp_kana: たからぶくろ
    jp_kanji: たからぶくろ
    en: Loot Sack
    fr: Sac Butin
    it: Bottinosacca
    de: Beutesack
    es: Saca Botín
    ko: 보물주머니
  descriptions:
    jp_kana: "たんこうで　てにいれた\nたからものを　しまっておける\nおおきくて　じょうぶな　ふくろ。"
    jp_kanji: "炭鉱で　てにいれた\n宝物を　しまっておける\nおおきくて　丈夫な　ふくろ。"
    en: "A sturdy, spacious bag that is\nused to carry any treasures or\nloot obtained in the coal mine."
    fr: "Un grand sac robuste utilisé pour transporter\nle butin obtenu dans la mine de charbon."
    it: "Una sacca spaziosa e resistente usata per\ntrasportare il bottino ottenuto nella miniera."
    de: "Ein fester Sack. Wird verwendet, um Beute\naus der Kohlemine zu transportieren."
    es: "Una saca grande y resistente utilizada para\ntransportar el botín reunido en la mina de carbón."
    ko: "탄갱에서 손에 넣은\n보물을 보관해둘 수 있는\n크고 튼튼한 주머니다."
lopunnite:
  names:
    jp_kana: ミミロップナイト
    jp_kanji: ミミロップナイト
    en: Lopunnite
    fr: Lockpinite
    it: Lopunnite
    de: Schlapornit
    es: Lopunnita
    ko: 이어롭나이트
  descriptions:
    jp_kana: "ミミロップに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ミミロップに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Lopunny hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Lockpin, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Lopunny, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Schlapor getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Lopunny en combate."
    ko: "이어롭에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
lost_item:
  names:
    jp_kana: おとしもの
    jp_kanji: おとしもの
    en: Lost Item
    fr: Objet perdu
    it: Strumento perso
    de: Fundsache
    es: Objeto Perdido
    ko: 분실물
  descriptions:
    jp_kana: "モノマネむすめが　なくした\nマネネの　にんぎょう。"
    jp_kanji: "モノマネ娘が　なくした\nマネネの　人形。"
    en: "The Mime Jr. doll that was lost by\nthe Copycat."
    fr: La Poupée Mime Jr. perdue par la Copieuse.
    it: "Pupazzo raffigurante Mime Jr. smarrito\nda Copiona."
    de: "Eine Pantimimi-Puppe, welche die Nachahmerin\nverloren hat."
    es: El muñeco Mime Jr. que perdió la Copiona.
    ko: "흉내내기 아가씨가 잃어버린\n흉내내인형."
love_ball:
  names:
    jp_kana: ラブラブボール
    jp_kanji: ラブラブボール
    en: Love Ball
    fr: Love Ball
    it: Love Ball
    de: Sympaball
    es: Amor Ball
    ko: 러브러브볼
  descriptions:
    jp_kana: "じぶんの　ポケモンと　せいべつが\nちがうと　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "自分の　ポケモンと　性別が\n違うと　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that works best when\ncatching a Pokémon that is of the\nopposite gender of your Pokémon."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nmieux sur un Pokémon de sexe opposé."
    it: "Poké Ball speciale che funziona meglio con i\nPokémon di sesso opposto a quello del proprio\ne della stessa specie."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon zu fangen, die ein anderes\nGeschlecht haben als dein Pokémon."
    es: "Poké Ball algo distinta que atrapa mejor Pokémon\nde la misma especie que los que se posee, pero\nde sexo diferente."
    ko: "자신의 포켓몬과 성별이\n다르면 잡기 쉬워지는\n조금 특이한 볼."
lucarionite:
  names:
    jp_kana: ルカリオナイト
    jp_kanji: ルカリオナイト
    en: Lucarionite
    fr: Lucarite
    it: Lucarite
    de: Lucarionit
    es: Lucarita
    ko: 루카리오나이트
  descriptions:
    jp_kana: "ルカリオに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ルカリオに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Lucario hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Lucario, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Lucario, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Lucario getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Lucario en combate."
    ko: "루카리오에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
luck_incense:
  names:
    jp_kana: こううんのおこう
    jp_kanji: こううんのおこう
    en: Luck Incense
    fr: Encens Veine
    it: Fortunaroma
    de: Glücksrauch
    es: Incienso Duplo
    ko: 행운의향로
  descriptions:
    jp_kana: "もたせた　ポケモンが　いちどでも\nせんとうに　かおを　だすと\nおかねが　２ばい　もらえる。"
    jp_kanji: "持たせた　ポケモンが　１度でも\n戦闘に　顔を　だすと\nお金が　２倍　もらえる。"
    en: "An item to be held by a Pokémon.\nIt doubles any prize money received\nif the holding Pokémon joins a battle."
    fr: "Objet à tenir. Double l’argent gagné si le porteur\nse joint au combat."
    it: "Strumento da dare a un Pokémon.\nSe chi ce l’ha partecipa alla lotta,\ni guadagni raddoppiano."
    de: "Ein Item, das ein Pokémon trägt und das\ndoppeltes Preisgeld bringt, wenn der Träger\nam Kampf teilnimmt."
    es: "Si el Pokémon que lo lleva lucha en un combate,\nduplica las ganancias."
    ko: "지니게 한 포켓몬이\n한 번이라도 배틀에 나가면\n돈을 2배로 받을 수 있다."
lucky_egg:
  names:
    jp_kana: しあわせタマゴ
    jp_kanji: しあわせタマゴ
    en: Lucky Egg
    fr: Œuf Chance
    it: Fortunuovo
    de: Glücks-Ei
    es: Huevo Suerte
    ko: 행복의알
  descriptions:
    jp_kana: "しあわせが　つまった　タマゴ。\nもたせた　ポケモンは　もらえる\nけいけんちが　すこし　ふえる。"
    jp_kanji: "しあわせが　つまった　タマゴ。\n持たせた　ポケモンは　もらえる\n経験値が　少し　増える。"
    en: "An item to be held by a Pokémon.\nIt’s an egg filled with happiness that\nearns extra Exp. Points in battle."
    fr: "Objet à tenir. Un œuf rempli de joie qui augmente\nle nombre de Points Exp. gagnés au combat."
    it: "Strumento da dare a un Pokémon.\nUovo pieno di felicità che aumenta\ni Punti Esperienza in lotta."
    de: "Ein Item zum Tragen, das mit Glück gefüllt ist und\nfür zusätzliche Erfahrungspunkte im Kampf sorgt."
    es: "Es un huevo lleno de felicidad que te hace ganar\nPuntos de Experiencia extra en combate. Debe\nllevarlo un Pokémon."
    ko: "행복이 가득한 알.\n지니게 한 포켓몬은 받을 수 있는\n경험치가 조금 늘어난다."
lucky_punch:
  names:
    jp_kana: ラッキーパンチ
    jp_kanji: ラッキーパンチ
    en: Lucky Punch
    fr: Poing Chance
    it: Fortunpugno
    de: Lucky Punch
    es: Puño Suerte
    ko: 럭키펀치
  descriptions:
    jp_kana: "こううんを　よぶ　グローブ。\nラッキーに　もたせると　わざが\nきゅうしょに　あたりやすくなる。"
    jp_kanji: "幸運を　よぶ　グローブ。\nラッキーに　持たせると　技が\n急所に　当たりやすくなる。"
    en: "An item to be held by Chansey.\nThis pair of lucky boxing gloves will\nboost Chansey’s critical-hit ratio."
    fr: "Objet à faire tenir à Leveinard.\nUne paire de gants qui augmente son taux\nde critiques."
    it: "Strumento da dare a Chansey.\nGuanti che aumentano molto la probabilità\ndi sferrare brutti colpi."
    de: "Ein Item, das von Chaneira getragen werden kann.\nDiese Handschuhe erhöhen die Volltrefferquote\ndes Trägers."
    es: "Un par de guantes que debe llevar Chansey.\nPotencian mucho su índice de golpe crítico."
    ko: "행운을 부르는 글러브다.\n럭키에게 지니게 하면 기술이\n급소에 맞기 쉬워진다."
lum_berry:
  names:
    jp_kana: ラムのみ
    jp_kanji: ラムのみ
    en: Lum Berry
    fr: Baie Prine
    it: Baccaprugna
    de: Prunusbeere
    es: Baya Ziuela
    ko: 리샘열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nすべての　じょうたい　いじょうを\nかいふくする。"
    jp_kanji: "ポケモンに　持たせると\nすべての　状態異常を\n回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, it can recover\nfrom any status condition during battle."
    fr: "Une Baie qui soigne tous les problèmes de statut\nlorsqu’elle est tenue par un Pokémon."
    it: "Se un Pokémon ha questa bacca, guarisce\nda qualsiasi problema di stato."
    de: "Gibst du die Beere einem Pokémon zum Tragen,\nhebt sie alle seine Statusprobleme auf."
    es: "Los Pokémon pueden llevarla o usarla para\nrecuperarse de problemas de estado."
    ko: "포켓몬에게 지니게 하면\n모든 상태 이상을\n회복한다."
luminous_moss:
  names:
    jp_kana: ひかりごけ
    jp_kanji: ひかりごけ
    en: Luminous Moss
    fr: Lichen Lumineux
    it: Muschioluce
    de: Leuchtmoos
    es: Musgo Brillante
    ko: 빛이끼
  descriptions:
    jp_kana: "つかいすての　ひかりごけ。\nもたせて　みずの　わざを　うけると\nとくぼうが　あがる。"
    jp_kanji: "使い捨ての　ひかりごけ。\n持たせて　みずの　技を　受けると\n特防が　あがる。"
    en: "An item to be held by a Pokémon.\nIt boosts Sp. Def if hit with a Water-\ntype attack. It can only be used once."
    fr: "Du lichen à usage unique.\nTenu, il augmente la Défense Spéciale lorsque\nle Pokémon subit une attaque de type Eau."
    it: "Muschio luminoso monouso. Se il Pokémon\nche ha questo strumento subisce una mossa\ndi tipo Acqua, la sua Difesa Speciale aumenta."
    de: "Wird der Träger von einer Wasser-Attacke\ngetroffen, steigt seine Spezial-Verteidigung\nund das Item verschwindet."
    es: "Objeto de un solo uso. Aumenta la Defensa\nEspecial del Pokémon que lo lleva si este recibe\nun ataque de tipo Agua."
    ko: "단 한 번 쓰면 없어지는 빛이끼.\n지니게 하고 물 기술을 받으면\n특수방어가 올라간다."
lumiose_galette:
  names:
    jp_kana: ミアレガレット
    jp_kanji: ミアレガレット
    en: Lumiose Galette
    fr: Galette Illumis
    it: Pan di Lumi
    de: Illumina-Galette
    es: Crêpe Luminalia
    ko: 미르갈레트
  descriptions:
    jp_kana: "ミアレシティで　にんきの　おかし。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "ミアレシティで　人気の　お菓子。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A popular treat in Lumiose City.\nIt can be used once to heal all the\nstatus conditions of a Pokémon."
    fr: "La spécialité d’Illumis.\nElle soigne tous les problèmes de statut\nd’un Pokémon."
    it: "Un famoso dolce di Luminopoli.\nPuò guarire un Pokémon da tutti i problemi\ndi stato."
    de: "Eine beliebte Süßigkeit in Illumina City, die alle\nStatusprobleme eines Pokémon behebt."
    es: "El dulce estrella de Ciudad Luminalia. Cura los\nproblemas de estado de un Pokémon."
    ko: "미르시티에서 인기 있는 과자.\n포켓몬 1마리의 상태 이상을\n모두 회복한다."
lunar_feather:
  names:
    jp_kana: みかづきのはね
    jp_kanji: みかづきのはね
    en: Lunar Wing
    fr: Lun’Aile
    it: Alalunare
    de: Lunarfeder
    es: Pluma Lunar
    ko: 초승달날개
  descriptions:
    jp_kana: "つきのような　かがやきを　はなつ\nはね。　あくむを　ふりはらう　ちからを\nひめていると　つたえられている。"
    jp_kanji: "つきのような　輝きを　はなつ\nはね。　悪夢を　ふりはらう　力を\n秘めていると　伝えられている。"
    en: "A feather that glows like the moon.\nIt’s said to possess the power to\ndispel nightmares."
    fr: "Une plume qui brille comme la lune.\nOn dit qu’elle a le pouvoir de chasser les\ncauchemars."
    it: "Piuma che brilla come la luna. Pare che abbia\nil potere di allontanare gli incubi."
    de: "Diese Feder leuchtet wie der Mond.\nKann angeblich Alpträume vertreiben."
    es: "Pluma que brilla como la luna. Se dice que tiene\nel poder de disipar pesadillas."
    ko: "달처럼 반짝임을 발산하는 날개.\n악몽을 뿌리치는 힘을\n간직하고 있다고 전해진다."
lure_ball:
  names:
    jp_kana: ルアーボール
    jp_kanji: ルアーボール
    en: Lure Ball
    fr: Appât Ball
    it: Esca Ball
    de: Köderball
    es: Cebo Ball
    ko: 루어볼
  descriptions:
    jp_kana: "つりざおで　つりあげた　ポケモンだと\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "つりざおで　つりあげた　ポケモンだと\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that is good for catching\nPokémon that you reel in with a Rod\nwhile out fishing."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon ferrés\navec une canne à pêche."
    it: "Poké Ball un po’ diversa che funziona\nparticolarmente bene con i Pokémon pescati\ncon un Amo."
    de: "Ein Ball, der sich besonders gut eignet,\num Pokémon zu fangen, die an deiner\nAngel hängen."
    es: "Poké Ball algo distinta, especialmente indicada\npara capturar los Pokémon que se han pescado\ncon una caña."
    ko: "낚싯대로 낚아 올린 포켓몬이라면\n잡기 쉬워지는\n조금 특이한 볼."
lustrous_orb:
  names:
    jp_kana: しらたま
    jp_kanji: しらたま
    en: Lustrous Orb
    fr: Orbe Perlé
    it: Splendisfera
    de: Weiß-Orb
    es: Lustresfera
    ko: 백옥
  descriptions:
    jp_kana: "パルキアに　もたせると　ドラゴンと\nみずタイプの　わざの　いりょくが\nあがる　うつくしく　かがやく　たま。"
    jp_kanji: "パルキアに　持たせると　ドラゴンと\nみずタイプの　技の　威力が\nあがる　美しく　輝く　珠。"
    en: "A beautifully glowing orb to be held by\nPalkia. It boosts the power of Dragon-\nand Water-type moves when it is held."
    fr: "Un bel orbe luisant destiné à Palkia.\nAugmente la puissance des capacités de type\nDragon et Eau."
    it: "Sfera splendente da dare a Palkia.\nPotenzia le mosse di tipo Drago e Acqua."
    de: "Ein hell leuchtender Orb. Verstärkt Attacken vom\nTyp Drache und Wasser, wenn Palkia ihn trägt."
    es: "Una bonita esfera que potencia los movimientos\nde tipo Dragón y Agua. Debe llevarla Palkia."
    ko: "펄기아에게 지니게 하면 드래곤과\n물타입 기술의 위력이 올라가는\n아름답게 반짝이는 구슬."
luxury_ball:
  names:
    jp_kana: ゴージャスボール
    jp_kanji: ゴージャスボール
    en: Luxury Ball
    fr: Luxe Ball
    it: Chic Ball
    de: Luxusball
    es: Lujo Ball
    ko: 럭셔리볼
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nとても　なつきやすくなる\nいごこちの　いい　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nとても　なつきやすくなる\nいごこちの　いい　ボール。"
    en: "A particularly comfortable Poké Ball\nthat makes a wild Pokémon quickly\ngrow friendlier after being caught."
    fr: "Une Poké Ball pratique qui permet de gagner\nrapidement l’amitié d’un Pokémon sauvage\nattrapé."
    it: "Poké Ball graziosa che rende più amichevoli\ni Pokémon selvatici catturati."
    de: "Ein behaglicher Ball, der Pokémon veranlasst,\nnach dem Fang schneller freundlicher zu werden."
    es: "Acogedora Poké Ball que hace más amistosos a\nlos Pokémon salvajes capturados."
    ko: "잡은 야생 포켓몬이\n매우 친밀해지기 쉬운\n편안한 볼."
mach_bike:
  names:
    jp_kana: マッハじてんしゃ
    jp_kanji: マッハじてんしゃ
    en: Mach Bike
    fr: Vélo de Course
    it: Bici da corsa
    de: Eilrad
    es: Bici de Carreras
    ko: 마하자전거
  descriptions:
    jp_kana: "２ばい　いじょうの\nはやさで　いどう　できる\nおりたたみの　じてんしゃ。"
    jp_kanji: "２倍　以上の\n速さで　移動できる\nおりたたみの　自転車。"
    en: "This folding Bike more than\ndoubles your movement speed."
    fr: "Un vélo pliable qui roule jusqu’à deux fois\nplus vite qu’une bicyclette ordinaire."
    it: "Bici pieghevole che permette di spostarsi\nal doppio della velocità normale."
    de: "Ein Klapprad, mit dem du dich doppelt so schnell\nfortbewegen kannst wie gewöhnlich."
    es: "Bicicleta plegable que va a más del doble de\nvelocidad que otras."
    ko: "2배 이상의\n스피드로 이동할 수 있는\n접이식 자전거다."
machine_part:
  names:
    jp_kana: きかいのぶひん
    jp_kanji: きかいのぶひん
    en: Machine Part
    fr: Partie Machine
    it: Pezzo macch.
    de: Spule
    es: Maquinaria
    ko: 기계부품
  descriptions:
    jp_kana: "はつでんしょから　ぬすまれた\nはつでんきの　たいせつな　ぶひん。"
    jp_kanji: "発電所から　ぬすまれた\n発電機の　たいせつな　部品。"
    en: "An important part of a machine that\nwas stolen from the Power Plant."
    fr: "Une pièce essentielle du générateur de\nla Centrale."
    it: "Pezzo rubato alla Centrale Elettrica, essenziale\nper il generatore."
    de: "Ein unentbehrliches Maschinenteil,\ndas aus dem Kraftwerk entwendet wurde."
    es: "Valiosa pieza robada de una máquina de la\nCentral Energía."
    ko: "발전소에서 도둑맞은\n발전기의 중요한 부품."
macho_brace:
  names:
    jp_kana: きょうせいギプス
    jp_kanji: きょうせいギプス
    en: Macho Brace
    fr: Bracelet Macho
    it: Crescicappa
    de: Machoband
    es: Brazal Firme
    ko: 교정깁스
  descriptions:
    jp_kana: "かたくて　おもい　ギプス。\nもたせると　すばやさは　さがるが\nふつうより　つよく　そだちやすい。"
    jp_kanji: "硬くて　重い　ギプス。\n持たせると　素早さは　さがるが\nふつうより　強く　育ちやすい。"
    en: "An item to be held by a Pokémon.\nThis stiff, heavy brace helps Pokémon\ngrow strong but cuts Speed in battle."
    fr: "Objet à tenir. Un bracelet dur et lourd qui rend\nle porteur plus fort, mais baisse sa Vitesse."
    it: "Strumento da dare a un Pokémon.\nAttrezzo pesante che riduce la Velocità ma aiuta\nla crescita delle statistiche."
    de: "Ein Item, das ein Pokémon tragen kann.\nDer Initiative-Wert sinkt zwar, aber es wird\ndafür umso stärker."
    es: "Sólido y pesado brazal. Sube más las\ncaracterísticas al subir de nivel, pero\nbaja la Velocidad de quien lo lleva."
    ko: "단단하고 무거운 깁스.\n지니게 하면 스피드는 떨어지지만\n여느 때보다 강하게 키우기 쉽다."
magma_stone:
  names:
    jp_kana: かざんのおきいし
    jp_kanji: かざんのおきいし
    en: Magma Stone
    fr: Pierre Magma
    it: Magmapietra
    de: Magmastein
    es: Piedra Magma
    ko: 화산의돌
  descriptions:
    jp_kana: "しゃくねつの　マグマの　ねつでとけた\nがんせきが　かたまって　できたもの。\nなかに　マグマが　のこっている。"
    jp_kanji: "しゃくねつの　マグマの　熱でとけた\n岩石が　固まって　できたもの。\n中に　マグマが　残っている。"
    en: "A stone formed by boulders melting in\nintensely hot magma, then hardening.\nMagma remains sealed inside it."
    fr: "Une pierre formée à partir de roche en fusion\nsolidifiée. Elle contient du magma."
    it: "Pietra che si è formata a seguito di un’intensa\ncolata lavica. Il magma è rimasto intrappolato\nal suo interno."
    de: "Ein Stein aus gehärtetem Magma.\nSein Kern ist noch flüssig und heiß."
    es: "Formada a partir de magma enfriado y endurecido.\nAún hay magma líquido en su interior."
    ko: "이글거리는 마그마의 열로 녹은\n암석이 굳어져 생긴 것.\n안에는 마그마가 남아 있다."
magma_suit:
  names:
    jp_kana: マグマスーツ
    jp_kanji: マグマスーツ
    en: Magma Suit
    fr: Scaph. Magma
    it: Tuta Magma
    de: Magma-Anzug
    es: Traje Magma
    ko: 마그마슈트
  descriptions:
    jp_kana: "マグマだんの　かがくぎじゅつを\nけっしゅうして　つくられた　スーツ。\nどんな　しょうげき　にも　たえられる。"
    jp_kanji: "マグマ団の　科学技術を\n結集して　つくられた　スーツ。\nどんな　衝撃にも　耐えられる。"
    en: "A suit made with the collective\ntechnological know-how of Team Magma.\nIt can withstand any impact."
    fr: "Une combinaison créée à partir des méthodes\nscientifiques de la Team Magma.\nElle résiste à tous les chocs."
    it: "Tuta altamente tecnologica costruita dal\nTeam Magma, in grado di resistere a qualunque\nshock."
    de: "Ein Anzug, der unter Einsatz des gesamten\ntechnischen Wissens von Team Magma entstand.\nHält jeder Art von Erschütterung stand."
    es: "Este traje es el resultado de las arduas\ninvestigaciones científicas del Equipo Magma.\nEs capaz de soportar cualquier impacto."
    ko: "마그마단이 과학기술을\n결집하여 만든 슈트다.\n어떠한 충격에도 견딜 수 있다."
magmarizer:
  names:
    jp_kana: マグマブースター
    jp_kanji: マグマブースター
    en: Magmarizer
    fr: Magmariseur
    it: Magmatore
    de: Magmaisierer
    es: Magmatizador
    ko: 마그마부스터
  descriptions:
    jp_kana: "とてつもない　マグマの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　マグマの　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous\namount of magma energy.\nIt’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité\nd’énergie magmatique. Appréciée d’un certain\nPokémon."
    it: "Scatola strapiena di energia lavica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit Magmaenergie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Esta caja contiene una enorme cantidad de\nenergía magmática. Cierto Pokémon lo adora."
    ko: "엄청난 마그마의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
magnet:
  names:
    jp_kana: じしゃく
    jp_kanji: じしゃく
    en: Magnet
    fr: Aimant
    it: Calamita
    de: Magnet
    es: Imán
    ko: 자석
  descriptions:
    jp_kana: "きょうりょくな　じしゃく。\nもたせると　でんきタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "強力な　磁石。\n持たせると　でんきタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nIt is a powerful magnet that boosts\nthe power of Electric-type moves."
    fr: "Objet à tenir. Un aimant puissant qui augmente\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nPotente magnete che potenzia le mosse\ndi tipo Elettro."
    de: "Ein Item zum Tragen, dessen magnetische\nKraft Attacken vom Typ Elektro verstärkt."
    es: "Debe llevarlo un Pokémon. Su potente\nmagnetismo fortalece los movimientos de tipo\nEléctrico."
    ko: "강력한 자석.\n지니게 하면 전기타입\n기술의 위력이 올라간다."
mago_berry:
  names:
    jp_kana: マゴのみ
    jp_kanji: マゴのみ
    en: Mago Berry
    fr: Baie Mago
    it: Baccamango
    de: Magobeere
    es: Baya Ango
    ko: 마고열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but it will cause\nconfusion if the user hates the taste."
    fr: "Tenue, cette Baie restaure des PV en cas\nde besoin, mais rend le Pokémon confus si\nson goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die KP eines\nPokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar algunos PS. Su sabor puede causar\nconfusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
magost_berry:
  names:
    jp_kana: ゴスのみ
    jp_kanji: ゴスのみ
    en: Magost Berry
    fr: Baie Mangou
    it: Baccagostan
    de: Magostbeere
    es: Baya Aostan
    ko: 고스티열매
  descriptions:
    jp_kana: "かわいさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かわいさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCuteness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter la Grâce d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nla Grazia del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Putzigkeit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian la dulzura. Es una baya muy rara en\notras regiones."
    ko: "귀여움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
manectite:
  names:
    jp_kana: ライボルトナイト
    jp_kanji: ライボルトナイト
    en: Manectite
    fr: Élecsprintite
    it: Manectricite
    de: Voltensonit
    es: Manectricita
    ko: 썬더볼트나이트
  descriptions:
    jp_kana: "ライボルトに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ライボルトに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Manectric hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Élecsprint, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Manectric, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Voltenso getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Manectric en combate."
    ko: "썬더볼트에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
maranga_berry:
  names:
    jp_kana: タラプのみ
    jp_kanji: タラプのみ
    en: Maranga Berry
    fr: Baie Rangma
    it: Baccapane
    de: Tarabeere
    es: Baya Maranga
    ko: 타라프열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nとくしゅわざを　うけたとき\nじぶんの　とくぼうが　あがる。"
    jp_kanji: "ポケモンに　持たせると\n特殊技を　受けたとき\n自分の　特防が　あがる。"
    en: "If held by a Pokémon, this Berry will increase the\nholder’s Sp. Def if it’s hit with a special move."
    fr: "Baie à tenir augmentant la Défense Spéciale\ndu Pokémon lorsqu’il est touché par une attaque\nspéciale."
    it: "Bacca da dare a un Pokémon.\nSe chi ce l’ha subisce una mossa speciale,\nla sua Difesa Speciale aumenta."
    de: "Als getragenes Item erhöht diese Beere die\nSpezial-Verteidigung des Trägers, wenn dieser\nvon Spezial-Attacken getroffen wird."
    es: "Si la lleva un Pokémon, aumenta su Defensa\nEspecial tras recibir un ataque especial."
    ko: "포켓몬에게 지니게 하면\n특수 기술을 당했을 때\n자신의 특수방어가 올라간다."
master_ball:
  names:
    jp_kana: マスターボール
    jp_kanji: マスターボール
    en: Master Ball
    fr: Master Ball
    it: Master Ball
    de: Meisterball
    es: Master Ball
    ko: 마스터볼
  descriptions:
    jp_kana: "やせいの　ポケモンを　かならず\nつかまえることが　できる\nさいこう　せいのうの　ボール。"
    jp_kanji: "野生の　ポケモンを　必ず\n捕まえることが　できる\n最高　性能の　ボール。"
    en: "The best Poké Ball with the ultimate\nlevel of performance. With it, you will\ncatch any wild Pokémon without fail."
    fr: "Assurément la Ball la plus performante.\nElle permet de capturer à coup sûr un Pokémon\nsauvage."
    it: "La Poké Ball dalle prestazioni migliori:\ncattura qualsiasi Pokémon selvatico senza\nmai fallire."
    de: "Der beste Ball! Damit fängst du garantiert jedes\nwilde Pokémon."
    es: "La Poké Ball definitiva. Atrapa cualquier Pokémon\nsalvaje y no falla nunca."
    ko: "야생 포켓몬을 반드시\n잡을 수 있는\n최고 성능의 볼."
mawilite:
  names:
    jp_kana: クチートナイト
    jp_kanji: クチートナイト
    en: Mawilite
    fr: Mysdibulite
