    jp_kana: "２５０ぽ　すすむ　あいだ\nよわい　やせいの　ポケモンが\nまったく　でて　こなくなる。"
    jp_kanji: "２５０歩　進む　あいだ\n弱い　野生の　ポケモンが\nまったく　でて　こなくなる。"
    en: "An item that prevents any low-level\nwild Pokémon from jumping out at\nyou for 250 steps after its use."
    fr: "Repousse les Pokémon sauvages faibles pendant\n250 pas."
    it: "Strumento che evita l’incontro con i Pokémon\nselvatici deboli per 250 passi dopo l’utilizzo."
