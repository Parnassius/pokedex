    fr: "Contient vos données du Pokéathlon.\nIl y est inscrit le nombre de fois où vous avez\ntouché vos Pokémon."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di volte\nin cui hai toccato i Pokémon."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du deine Pokémon mit dem\nTouchpen berührt hast."
    es: "Contiene los datos del Pokéathlon con el número\nde veces que se tocó con el lápiz a los Pokémon."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓몬을 터치한 횟수가\n기록된 카드."
data_card_27:
  names:
    jp_kana: データカード２７
    jp_kanji: データカード２７
    en: Data Card 27
    fr: Carte Mémo27
    it: Scheda Dati 27
    de: Datenkarte27
    es: Tarjeta Datos 27
    ko: 데이터카드27
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nポケスロンで　あそんだ　じかんが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nポケスロンで　遊んだ　時間が\n記録された　カード。"
    en: "It holds Pokéathlon records. It is a\ncard that shows how much time you\nspent participating in the Pokéathlon."
    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le temps que vous avez\npassé à y jouer."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda sono registrate le ore\nche hai passato a giocare."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie viel Zeit du beim Pokéathlon verbracht\nhast."
    es: "Contiene los datos del Pokéathlon con el tiempo\nque se ha pasado en esta competición."
    ko: "포켓슬론의 기록이 들어 있다.\n포켓슬론으로 즐긴 시간이\n기록된 카드."
dawn_stone:
  names:
    jp_kana: めざめいし
    jp_kanji: めざめいし
    en: Dawn Stone
    fr: Pierre Aube
    it: Pietralbore
    de: Funkelstein
    es: Piedra Alba
    ko: 각성의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nひとみのように　まばゆい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nひとみのように　まばゆい。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt sparkles like a glittering eye."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle brille comme un œil."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È luccicante come gli occhi."
    de: "Dieser besondere, glitzernde Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a\nalgunos Pokémon. Brilla como un lucero."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n눈동자처럼 아름답다."
deep_sea_scale:
  names:
    jp_kana: しんかいのウロコ
    jp_kanji: しんかいのウロコ
    en: Deep Sea Scale
    fr: Écaille Océan
    it: Squamabissi
    de: Abyssplatte
    es: Escama Marina
    ko: 심해의비늘
  descriptions:
    jp_kana: "パールルに　もたせると\nとくぼうが　あがる　ウロコ。\nうすい　ピンクいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特防が　あがる　ウロコ。\nうすい　ピンク色に　光る。"
    en: "An item to be held by Clamperl.\nThis scale shines with a faint pink and\nraises the holder’s Sp. Def stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne écaille de couleur rose qui augmente\nsa Défense Spéciale."
    it: "Strumento da dare a Clamperl.\nSquama dai bagliori rosei che aumenta\nla Difesa Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert pink und hebt die\nSpezial-Verteidigung."
    es: "Tiene un débil brillo rosado y debe llevarla\nClamperl. Sube la Defensa Especial."
    ko: "진주몽에게 지니게 하면\n특수방어가 올라가는 비늘.\n연한 분홍색으로 빛난다."
deep_sea_tooth:
  names:
    jp_kana: しんかいのキバ
    jp_kanji: しんかいのキバ
    en: Deep Sea Tooth
    fr: Dent Océan
    it: Dente Abissi
    de: Abysszahn
    es: Diente Marino
    ko: 심해의이빨
  descriptions:
    jp_kana: "パールルに　もたせると\nとくこうが　あがる　キバ。\nするどく　ぎんいろに　ひかる。"
    jp_kanji: "パールルに　持たせると\n特攻が　あがる　キバ。\n鋭く　銀色に　光る。"
    en: "An item to be held by Clamperl.\nThis fang gleams a sharp silver and\nraises the holder’s Sp. Atk stat."
    fr: "Objet à faire tenir à Coquiperl.\nUne dent de couleur argent qui augmente\nson Attaque Spéciale."
    it: "Strumento da dare a Clamperl.\nDente dai bagliori argentei che aumenta\nl’Attacco Speciale."
    de: "Ein Item, das von Perlu getragen werden kann.\nEs schimmert silbern und hebt den Spezial-Angriff."
    es: "Tiene el brillo afilado de la plata y debe llevarlo\nClamperl. Sube el Ataque Especial."
    ko: "진주몽에게 지니게 하면\n특수공격이 올라가는 이빨.\n날카로운 은색으로 빛난다."
destiny_knot:
  names:
    jp_kana: あかいいと
    jp_kanji: あかいいと
    en: Destiny Knot
    fr: Nœud Destin
    it: Destincomune
    de: Fatumknoten
    es: Lazo Destino
    ko: 빨간실
  descriptions:
    jp_kana: "ほそくて　ながい　まっかな　いと。\nもたせると　メロメロに　なったとき\nあいても　メロメロに　できる。"
    jp_kanji: "細くて　長い　真っ赤な　糸。\n持たせると　メロメロに　なったとき\n相手も　メロメロに　できる。"
    en: "An item to be held by a Pokémon.\nIf the holder becomes infatuated,\nthe opposing Pokémon will be, too."
    fr: "Un long fil rouge vif à faire tenir à un Pokémon.\nSi le porteur tombe amoureux, l’ennemi\naussi."
    it: "Gomitolo di filo rosso sottile da dare a un\nPokémon. Se il Pokémon rimane infatuato,\ncontagia anche il nemico."
    de: "Ein Item zum Tragen. Wird der Träger betört,\ngilt dies auch für den Angreifer."
    es: "Un hilo largo y delgado de color rojo que\ntransmite el enamoramiento del Pokémon que\nlo lleva a su objetivo."
    ko: "가늘고 긴 새빨간 실.\n지니게 하면 자신이 헤롱헤롱해졌을 때\n상대도 헤롱헤롱해지게 된다."
devon_parts:
  names:
    jp_kana: デボンのにもつ
    jp_kanji: デボンのにもつ
    en: Devon Parts
    fr: Pack Devon
    it: Merce Devon
    de: Devon-Waren
    es: Piezas Devon
    ko: 데봉화물
  descriptions:
    jp_kana: "デボンで　つくられた\nなにかの　パーツが\nはいっている　にもつ。"
    jp_kanji: "デボンで　つくられた\n何かの　パーツが\n入っている　にもつ。"
    en: "A case that contains mechanical parts of\nsome sort made by the Devon Corporation."
    fr: "Une valise qui contient des pièces mécaniques\nfabriquées par la société Devon."
    it: "Questa valigetta contiene pezzi meccanici\nprodotti dalla Devon."
    de: "Ein Metallkoffer mit irgendwelchen Bauteilen, die\nvon der Devon Corporation angefertigt wurden."
    es: "Contiene piezas de algo fabricado por\nDevon S. A."
    ko: "데봉에서 만들어진\n무언가의 파츠가\n들어 있는 화물."
devon_scope:
  names:
    jp_kana: デボンスコープ
    jp_kanji: デボンスコープ
    en: Devon Scope
    fr: Devon Scope
    it: Devonscopio
    de: Devon-Scope
    es: Detector Devon
    ko: 데봉스코프
  descriptions:
    jp_kana: "みえない　ポケモンに\nはんのうして　おとをだす\nデボンの　とくせいひん。"
    jp_kanji: "見えない　ポケモンに\n反応して　音を出す\nデボンの　特製品。"
    en: "A special device made by Devon Corporation that\nsignals the presence of any unseen Pokémon."
    fr: "Ce produit en série limitée de Devon émet\nun signal sonore pour signaler la présence\nde Pokémon invisibles."
    it: "Congegno prodotto dalla Devon che rileva\nla presenza di Pokémon nascosti emettendo\nun segnale sonoro."
    de: "Ein von der Devon Corporation hergestelltes\nGerät, das mit einem Signalton auf unsichtbare\nPokémon reagiert."
    es: "Artilugio creado por Devon S. A. que reacciona\na la presencia de Pokémon invisibles emitiendo\nsonidos."
    ko: "보이지 않는 포켓몬에\n반응하여 소리를 내는\n데봉의 특제품."
devon_scuba_gear:
  names:
    jp_kana: デボンボンベ
    jp_kanji: デボンボンベ
    en: Devon Scuba Gear
    fr: Plongeur Devon
    it: Maschera Devon
    de: Devon-Atemgerät
    es: Bombona Devon
    ko: 데봉봄베
  descriptions:
    jp_kana: "ダイビング　ちゅうに　みにつける\nさんそ　ほきゅう よう　マスク。\nデボンで　つくられた。"
    jp_kanji: "ダイビング中に　身につける\n酸素補給用の　マスク。\nデボンで　つくられた。"
    en: "A device made by Devon Corporation that\nprovides oxygen to users during the use of Dive."
    fr: "Un masque à oxygène fabriqué par la société\nDevon et utilisé pour la plongée sous-marine."
    it: "Maschera di ossigeno prodotta dalla Devon,\nutile quando si usa Sub fuori dalla lotta."
    de: "Eine von der Devon Corporation hergestellte\nMaske, die Taucher unter Wasser mit ausreichend\nSauerstoff versorgt."
    es: "Máscara que surte de oxígeno durante las\ninmersiones en el agua. Producto de Devon S. A."
    ko: "다이빙할 때 몸에 착용하는\n산소 호흡용 마스크.\n데봉에서 만들어졌다."
diancite:
  names:
    jp_kana: ディアンシナイト
    jp_kanji: ディアンシナイト
    en: Diancite
    fr: Diancite
    it: Diancite
    de: Diancienit
    es: Diancita
    ko: 디안시나이트
  descriptions:
    jp_kana: "ディアンシーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ディアンシーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Diancie hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Diancie, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Diancie, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Diancie getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Diancie en combate."
    ko: "디안시에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
dire_hit:
  names:
    jp_kana: クリティカット
    jp_kanji: クリティカット
    en: Dire Hit
    fr: Muscle +
    it: Supercolpo
    de: Angriffplus
    es: Directo
    ko: 크리티컬커터
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nいちどしか　つかうことが　できない。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n１度しか　使うことが　できない。\nひっこめると　元に　戻る。"
    en: "An item that raises the critical-hit ratio\ngreatly. It can be used only once and\nwears off if the Pokémon is withdrawn."
    fr: "Augmente fortement le taux de critiques.\nUtilisable une seule fois. L’effet disparaît si\nle Pokémon se retire."
    it: "Aumenta la probabilità di sferrare brutti colpi.\nSi può usare una sola volta e l’effetto svanisce\nse il Pokémon è sostituito."
    de: "Hebt einmalig die Volltrefferquote des Pokémon\nim Kampf stark an. Die Wirkung endet mit dem\nAustausch des Pokémon."
    es: "Aumenta el índice de golpe crítico en combate.\nAl cambiar de Pokémon, el efecto desaparece."
    ko: "급소 명중률이 크게 올라간다.\n한 번밖에 쓸 수 없다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
dire_hit_2:
  names:
    jp_kana: クリティカット２
    jp_kanji: クリティカット２
    en: Dire Hit 2
    fr: Muscle 2
    it: Supercolpo 2
    de: Angriffplus2
    es: Directo 2
    ko: 크리티컬커터2
  descriptions:
    jp_kana: "きゅうしょりつが　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to raise the\ncritical-hit ratio of one Pokémon. It\nwears off if the Pokémon is withdrawn."
    fr: "Augmente le taux de critiques.\nPlus efficace à chaque utilisation.\nL’effet s’estompe si le Pokémon se retire."
    it: "Aumenta la probabilità di sferrare brutti colpi.\nSe usato più volte, l’effetto si somma,\nma svanisce se il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote. Effektiver bei\nmehrfacher Anwendung. Wirksam, bis das\nPokémon ausgewechselt wird."
    es: "Aumenta la probabilidad de asestar un golpe\ncrítico. Al cambiar de Pokémon, el efecto\ndesaparece."
    ko: "급소 명중률이 올라간다. 사용할 때마다\n효과가 올라간다. 포켓몬을 볼에\n넣어버리면 원래대로 되돌아간다."
dire_hit_3:
  names:
    jp_kana: クリティカット３
    jp_kanji: クリティカット３
    en: Dire Hit 3
    fr: Muscle 3
    it: Supercolpo 3
    de: Angriffplus3
    es: Directo 3
    ko: 크리티컬커터3
  descriptions:
    jp_kana: "きゅうしょりつが　おおきく　あがる。\nつかうたびに　こうかが　アップする。\nひっこめると　もとに　もどる。"
    jp_kanji: "急所率が　大きく　あがる。\n使うたびに　効果が　アップする。\nひっこめると　元に　戻る。"
    en: "It can be used many times to greatly\nraise a Pokémon’s critical-hit ratio. It\nwears off if the Pokémon is withdrawn."
    fr: "Monte fortement le taux de critiques.\nPlus efficace à chaque utilisation.\nL’effet s’estompe si le Pokémon se retire."
    it: "Aumenta moltissimo la probabilità di sferrare\nbrutti colpi. L’effetto si può sommare, ma\nsvanisce se il Pokémon è sostituito."
    de: "Erhöht die Volltrefferquote stark. Bei mehrfachem\nGebrauch effektiver. Wirkt, bis das Pokémon\nausgewechselt wird."
    es: "Aumenta mucho la probabilidad de asestar un\ngolpe crítico. Al cambiar de Pokémon, su efecto\ndesaparece."
    ko: "급소 명중률이 크게 올라간다. 사용할\n때마다 효과가 올라간다. 포켓몬을\n볼에 넣어버리면 원래대로 되돌아간다."
discount_coupon:
  names:
    jp_kana: バーゲンチケット
    jp_kanji: バーゲンチケット
    en: Discount Coupon
    fr: Bon Réduction
    it: Buono sconto
    de: Rabattmarke
    es: Vale Descuento
    ko: 바겐세일티켓
  descriptions:
    jp_kana: "ブティックで　アイテムを　かうとき\nいつもより　やすくなる　チケット。"
    jp_kanji: "ブティックで　アイテムを　買うとき\nいつもより　安くなる　チケット。"
    en: "This special coupon allows you to\nbuy items at a discount when you\nare shopping at a boutique."
    fr: "Un ticket donnant droit à une réduction dans\nles boutiques de vêtements."
    it: "Buono che permette di avere uno sconto\nsugli acquisti nei negozi di abbigliamento."
    de: "Ein Coupon, mit dem du in Boutiquen günstiger\neinkaufen kannst."
    es: "Con este vale te harán jugosos descuentos\ncuando vayas de compras a una boutique."
    ko: "부티크에서 아이템을 살 때\n평소보다 저렴해지는 티켓."
dive_ball:
  names:
    jp_kana: ダイブボール
    jp_kanji: ダイブボール
    en: Dive Ball
    fr: Scuba Ball
    it: Sub Ball
    de: Tauchball
    es: Buceo Ball
    ko: 다이브볼
  descriptions:
    jp_kana: "みずの　せかいで　くらしている\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "水の　世界で　暮らしている\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nworks especially well when catching\nPokémon that live underwater."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon\nsous-marins."
    it: "Poké Ball un po’ diversa. Risulta particolarmente\nefficace sui Pokémon che vivono in acqua."
    de: "Ein Ball, mit dem sich Pokémon, die im Wasser\nleben, besser fangen lassen."
    es: "Es algo distinta a las demás. Funciona\nespecialmente bien con los Pokémon que viven\nbajo el agua."
    ko: "물의 세계에서 사는\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
dna_splicers:fuse:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
  descriptions:
    jp_kana: "もとは　ひとつだったと　いわれる\nキュレムと　あるポケモンを\nがったいさせる　いっついの　くさび。"
    jp_kanji: "元は　ひとつだったと　いわれる\nキュレムと　あるポケモンを\n合体させる　一対の　くさび。"
    en: "A splicer that fuses Kyurem and a\ncertain Pokémon. They are said to\nhave been one in the beginning."
    fr: "Un outil qui permet la fusiorption de Kyurem\net d’un autre Pokémon avec lequel il ne faisait\nqu’un à l’origine."
    it: "Cuneo che permette di fondere Kyurem\ncon il Pokémon al quale era unito in origine."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vermeintlich einst eins gewesen\nsind, vereinigt."
    es: "Punta que permite fusionar a Kyurem con cierto\nPokémon con el que, originariamente, formaba\nun solo ser."
    ko: "원래는 하나였다고 전해지는\n큐레무와 어떤 포켓몬을\n합체시키는 한 쌍의 쐐기."
dna_splicers:separate:
  names:
    jp_kana: いでんしのくさび
    jp_kanji: いでんしのくさび
    en: DNA Splicers
    fr: Pointeau ADN
    it: Cuneo DNA
    de: DNS-Keil
    es: Punta ADN
    ko: 유전자쐐기
  descriptions:
    jp_kana: "がったいした　キュレムと\nあるポケモンを　もとどおりに\nぶんりさせる　いっついの　くさび。"
    jp_kanji: "合体した　キュレムと\nあるポケモンを　元通りに\n分離させる　一対の　くさび。"
    en: "A splicer that separates Kyurem\nand a certain Pokémon when\nthey have been fused."
    fr: "Un outil qui permet de séparer Kyurem et\nle Pokémon avec lequel il a fusiorbé."
    it: "Cuneo che permette di separare Kyurem\ndal Pokémon con cui era fuso."
    de: "Ein Keil, der Kyurem und ein gewisses anderes\nPokémon, die vereinigt wurden, voneinander\ntrennt."
    es: "Punta que permite separar a Kyurem del Pokémon\ncon el que se ha fusionado."
    ko: "합체한 큐레무와\n어떤 포켓몬을 원래대로\n분리시키는 한 쌍의 쐐기."
dome_fossil:
  names:
    jp_kana: こうらのカセキ
    jp_kanji: こうらのカセキ
    en: Dome Fossil
    fr: Fossile Dôme
    it: Domofossile
    de: Domfossil
    es: Fósil Domo
    ko: 껍질화석
  descriptions:
    jp_kana: "おおむかし　うみに　すんでいた\nこだい　ポケモンの　カセキ。\nこうらの　いちぶ　らしい。"
    jp_kanji: "大昔　海に　すんでいた\n古代ポケモンの　カセキ。\nこうらの　一部らしい。"
    en: "A fossil from a prehistoric Pokémon\nthat once lived in the sea. It could\nbe a shell or carapace."
    fr: "Le fossile d’un ancien Pokémon aquatique.\nOn dirait un morceau de carapace."
    it: "Fossile di un Pokémon preistorico che viveva in\nmare. Sembra essere parte di una corazza."
    de: "Das Fossil eines uralten Pokémon, das in der\nTiefsee lebte. Es sieht wie eine Muschelschale\noder ein Rückenschild aus."
    es: "Fósil de un Pokémon ancestral que vivió en el\nfondo del mar. Parece ser un fragmento de\nconcha."
    ko: "오랜 옛날 바다에 살았던\n고대 포켓몬의 화석.\n등껍질의 일부인 듯하다."
douse_drive:
  names:
    jp_kana: アクアカセット
    jp_kanji: アクアカセット
    en: Douse Drive
    fr: Module Aqua
    it: Idromodulo
    de: Aquamodul
    es: HidroROM
    ko: 아쿠아카세트
  descriptions:
    jp_kana: "ゲノセクトに　もたせると\nテクノバスターという　わざが\nみずタイプになる　カセット。"
    jp_kanji: "ゲノセクトに　持たせると\nテクノバスターという　技が\nみずタイプになる　カセット。"
    en: "A cassette to be held by Genesect.\nIt changes Genesect’s Techno Blast\nmove so it becomes Water type."
    fr: "Tenu par Genesect, ce module change la\ncapacité TechnoBuster en une capacité de type\nEau."
    it: "Modulo da dare a Genesect. Trasforma\nTecnobotto in una mossa di tipo Acqua."
    de: "Gibt man es Genesect zum Tragen, wandelt es\nden Typ der Attacke Techblaster in Wasser um."
    es: "Cartucho que convierte Tecno Shock de\nGenesect en un movimiento de tipo Agua."
    ko: "게노세크트에게 지니게 하면\n테크노버스터라는 기술이\n물타입으로 바뀌는 카세트."
dowsing_machine:
  names:
    jp_kana: ダウジングマシン
    jp_kanji: ダウジングマシン
    en: Dowsing Machine
    fr: Cherch’Objet
    it: Ricerca Strum.
    de: Itemradar
    es: Zahorí
    ko: 다우징머신
  descriptions:
    jp_kana: "みえない　どうぐに　はんのうして\nばしょを　おしえてくれる　さいしんの\nきかい。あたまに　つけて　つかう。"
    jp_kanji: "みえない　道具に　反応して\n場所を　教えてくれる　最新の　機械。\n頭に　つけて　使う。"
    en: "This high-tech machine shows the location\nof invisible items. It’s attached to the head\nwhen in use."
    fr: "Un appareil high-tech qui indique l’emplacement\ndes objets invisibles. Il se porte sur la tête."
    it: "Dispositivo ultramoderno che rileva la presenza\ndi strumenti non visibili a occhio nudo.\nSi indossa sulla testa."
    de: "Scannt die Umgebung nach unsichtbaren\nItems und zeigt an, wo diese sich befinden.\nEs wird auf dem Kopf getragen."
    es: "Aparato de precisión que reacciona ante objetos\nque no se ven. Para usarlo, es necesario\ncolocárselo en la cabeza."
    ko: "보이지 않는 도구에 반응해서\n장소를 가르쳐주는 최신 기계.\n머리에 쓰고 사용한다."
draco_plate:
  names:
    jp_kana: りゅうのプレート
    jp_kanji: りゅうのプレート
    en: Draco Plate
    fr: Plaque Draco
    it: Lastradrakon
    de: Dracotafel
    es: Tabla Draco
    ko: 용의플레이트
  descriptions:
    jp_kana: "ドラゴンの　タイプの　せきばん。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　石盤。\n持たせると　ドラゴンタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Dragon-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Drache."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Dragón. Debe llevarla un Pokémon."
    ko: "드래곤타입의 석판.\n지니게 하면 드래곤타입\n기술의 위력이 강해진다."
dragon_fang:
  names:
    jp_kana: りゅうのキバ
    jp_kanji: りゅうのキバ
    en: Dragon Fang
    fr: Croc Dragon
    it: Dentedidrago
    de: Drachenzahn
    es: Colmillo Dragón
    ko: 용의이빨
  descriptions:
    jp_kana: "かたくて　するどい　キバ。\nもたせると　ドラゴンタイプの\nわざの　いりょくが　あがる。"
    jp_kanji: "硬くて　鋭い　キバ。\n持たせると　ドラゴンタイプの\n技の　威力が　あがる。"
    en: "An item to be held by a Pokémon.\nThis hard and sharp fang boosts\nthe power of Dragon-type moves."
    fr: "Objet à tenir. Un croc dur et pointu qui augmente\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nDente duro e affilato che potenzia le mosse\ndi tipo Drago."
    de: "Ein Item zum Tragen. Ein harter und scharfer\nReißzahn, der Attacken vom Typ Drache\nverstärkt."
    es: "Colmillo de gran dureza que refuerza los\nmovimientos de tipo Dragón. Debe llevarlo\nun Pokémon."
    ko: "단단하고 날카로운 이빨.\n지니게 하면 드래곤타입\n기술의 위력이 올라간다."
dragon_gem:
  names:
    jp_kana: ドラゴンジュエル
    jp_kanji: ドラゴンジュエル
    en: Dragon Gem
    fr: Joyau Dragon
    it: Bijoudrago
    de: Drakojuwel
    es: Gema Dragón
    ko: 드래곤주얼
  descriptions:
    jp_kana: "ドラゴンの　タイプの　ジュエル。\nもたせると　いちどだけ　ドラゴンの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ドラゴンの　タイプの　ジュエル。\n持たせると　１度だけ　ドラゴンの\n技の　威力が　強まる。"
    en: "A gem with a draconic essence.\nWhen held, it strengthens the power\nof a Dragon-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Dragon."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Drago."
    de: "Ein Juwel vom Typ Drache. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Drache."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Dragón. Debe llevarla\nun Pokémon."
    ko: "드래곤타입의 주얼.\n지니게 하면 한 번만 드래곤\n기술의 위력이 강해진다."
dragon_scale:
  names:
    jp_kana: りゅうのウロコ
    jp_kanji: りゅうのウロコ
    en: Dragon Scale
    fr: Écaille Draco
    it: Squama Drago
    de: Drachenhaut
    es: Escamadragón
    ko: 용의비늘
  descriptions:
    jp_kana: "かたくて　じょうぶな　ウロコ。\nドラゴンタイプの　ポケモンが\nもっていることが　ある。"
    jp_kanji: "硬くて　丈夫な　ウロコ。\nドラゴンタイプの　ポケモンが\n持っていることが　ある。"
    en: "A very tough and inflexible scale.\nDragon-type Pokémon may be\nholding this item when caught."
    fr: "Une écaille épaisse et dure, parfois tenue par\nles Pokémon de type Dragon quand ils sont\nattrapés."
    it: "Squama spessa e dura.\nPuò averla un Pokémon di tipo Drago quando\nviene catturato."
    de: "Eine dicke und starke Haut. Drachen-Pokémon\ntragen dieses Item gern bei sich."
    es: "Una gruesa y resistente escama que pueden\nllevar los Pokémon de tipo Dragón cuando son\ncapturados."
    ko: "단단하고 튼튼한 비늘.\n드래곤타입의 포켓몬이\n지니고 있는 경우가 있다."
dragon_skull:
  names:
    jp_kana: ドラゴンのホネ
    jp_kanji: ドラゴンのホネ
    en: Dragon Skull
    fr: Crâne Dragon
    it: Teschio
    de: Drakoschädel
    es: Cráneo Dragón
    ko: 드래곤의뼈
  descriptions:
    jp_kana: "あれくるう　うみを　ものともせず\nじゆうに　とびまわっていたと　される\nポケモンの　あたまの　ホネ。"
    jp_kanji: "荒れ狂う　海を　ものともせず\n自由に　とびまわっていたと　される\nポケモンの　頭の　ホネ。"
    en: "A skull of a Pokémon that was said to have\nbraved the angry waters to fly around the world."
    fr: "Le crâne d’un Pokémon qui aurait survolé\nlibrement la mer déchaînée."
    it: "Teschio di un Pokémon che sorvolava libero i mari\nsenza temere neanche le più forti tempeste."
    de: "Der Schädel eines Pokémon, das einst\nwütendem Seegang zum Trotz frei um\ndie Welt flog."
    es: "Cráneo de un Pokémon. Se dice que este\nPokémon cruzó mares embravecidos."
    ko: "성난 바다 위를 개의치 않고\n자유롭게 날아다녔다는\n포켓몬의 머리뼈."
dread_plate:
  names:
    jp_kana: こわもてプレート
    jp_kanji: こわもてプレート
    en: Dread Plate
    fr: Plaque Ombre
    it: Lastratimore
    de: Furchttafel
    es: Tabla Oscura
    ko: 공포플레이트
  descriptions:
    jp_kana: "あくの　タイプの　せきばん。\nもたせると　あくタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "あくの　タイプの　石盤。\n持たせると　あくタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Dark-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Ténèbres."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Buio."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Unlicht."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Siniestro. Debe llevarla un Pokémon."
    ko: "악타입의 석판.\n지니게 하면 악타입\n기술의 위력이 강해진다."
dream_ball:
  names:
    jp_kana: ドリームボール
    jp_kanji: ドリームボール
    en: Dream Ball
    fr: Rêve Ball
    it: Dream Ball
    de: Traumball
    es: Ensueño Ball
    ko: 드림볼
  descriptions:
    jp_kana: "ハイリンクのもりで　いつのまにか\nバッグに　あらわれる　ゆめのボール。\nどんな　ポケモンも　つかまえられる。"
    jp_kanji: "ハイリンクの森で　いつのまにか\nバッグに　現れる　夢のボール。\nどんな　ポケモンも　捕まえられる。"
    en: "A special Poké Ball that appears in your\nBag out of nowhere in the Entree Forest.\nIt can catch any Pokémon."
    fr: "Une Poké Ball du rêve.\nApparue dans le Sac à la Forêt du Heylink.\nPermet d’attraper n’importe quel Pokémon."
    it: "Poké Ball onirica. Appare all’improvviso nella\nBorsa quando si è nel Bosco Intramondo.\nPuò acchiappare qualsiasi Pokémon."
    de: "Ein Ball wie aus einem Traum, der im\nKontaktebenenhain plötzlich im Beutel\nauftaucht. Fängt jedes Pokémon."
    es: "Bola especial que aparece de pronto en tu Bolsa\nen el Bosque Nexo y puede atrapar a cualquier\nPokémon."
    ko: "하일링크의 숲에서 어느 사이엔지\n가방 속에 나타나는 꿈의 볼.\n어떤 포켓몬이라도 잡을 수 있다."
dropped_item:boy:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Oggetto perso
    de: Fundsache
    es: Objeto Perdido
    ko: 잊은물건
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おとこのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　男の子らしい。"
    en: "The Xtransceiver found at the\nNimbasa City amusement park.\nIt seems it belongs to a boy."
    fr: "Un Vokit trouvé au parc d’attractions de\nMéanville. C’est un modèle pour garçons."
    it: "Interpoké rinvenuto nel parco giochi\ndi Sciroccopoli.\nPare che appartenga a un ragazzo."
    de: "Ein Viso-Caster, der im Vergnügungspark von\nRayono City gefunden wurde. Er scheint einem\nJungen zu gehören."
    es: "Videomisor encontrado en el parque de\natracciones de Ciudad Mayólica.\nParece que pertenece a un chico."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 남자인 것 같다."
dropped_item:girl:
  names:
    jp_kana: わすれもの
    jp_kanji: わすれもの
    en: Dropped Item
    fr: Objet Trouvé
    it: Oggetto perso
    de: Fundsache
    es: Objeto Perdido
    ko: 잊은물건
  descriptions:
    jp_kana: "ライモンシティの　ゆうえんちで\nひろった　ライブキャスター。\nおとしぬしは　おんなのこ　らしい。"
    jp_kanji: "ライモンシティの　遊園地で\n拾った　ライブキャスター。\n落とし主は　女の子らしい。"
    en: "The Xtransceiver found at the\nNimbasa City amusement park.\nIt seems it belongs to a girl."
    fr: "Un Vokit trouvé au parc d’attractions de\nMéanville. C’est un modèle pour filles."
    it: "Interpoké rinvenuto nel parco giochi\ndi Sciroccopoli.\nPare che appartenga a una ragazza."
    de: "Ein Viso-Caster, der im Vergnügungspark von\nRayono City gefunden wurde. Er scheint einem\nMädchen zu gehören."
    es: "Videomisor encontrado en el parque de\natracciones de Ciudad Mayólica.\nParece que pertenece a una chica."
    ko: "뇌문시티의 유원지에서\n주운 라이브캐스터.\n잃어버린 사람은 여자인 것 같다."
dubious_disc:
  names:
    jp_kana: あやしいパッチ
    jp_kanji: あやしいパッチ
    en: Dubious Disc
    fr: CD Douteux
    it: Dubbiodisco
    de: Dubiosdisc
    es: Disco Extraño
    ko: 괴상한패치
  descriptions:
    jp_kana: "なかに　あやしい　じょうほうが\nつまった　とうめいな　きかい。\nせいさくしゃは　ふめい。"
    jp_kanji: "なかに　怪しい　情報が\nつまった　透明な　機械。\n製作者は　不明。"
    en: "A transparent device\noverflowing with dubious data.\nIts producer is unknown."
    fr: "Un appareil transparent rempli de données\ndouteuses. Son fabricant n’est pas connu."
    it: "Dispositivo trasparente strapieno di dati di dubbia\norigine. Non se ne conosce il produttore."
    de: "Eine Scheibe mit seltsamen Daten. Ihr Ursprung\nist unbekannt."
    es: "Dispositivo transparente que contiene datos\nmisteriosos. Es de fabricante desconocido."
    ko: "안에 괴상한 정보가\n가득한 투명한 기계다.\n제작자 불명."
durin_berry:
  names:
    jp_kana: ドリのみ
    jp_kanji: ドリのみ
    en: Durin Berry
    fr: Baie Durin
    it: Baccadurian
    de: Durinbeere
    es: Baya Rudion
    ko: 두리열매
  descriptions:
    jp_kana: "かしこさに　みがきを　かける　ための\nポロックを　つくるとき　つかわれる。\nほかの　ちほうでは　めずらしい　きのみ。"
    jp_kanji: "かしこさに　磨きを　かける　ための\nポロックを　つくるとき　使われる。\nほかの　地方では　めずらしい　きのみ。"
    en: "Used to make Pokéblocks that will enhance your\nCleverness, this Berry is rare in other regions."
    fr: "Une Baie très rare en dehors de cette région,\nutilisée pour préparer des Pokéblocs permettant\nd’augmenter l’Intelligence d’un Pokémon."
    it: "Bacca difficile da trovare al di fuori di Hoenn\nusata per creare Pokémelle che aumentano\nl’Acume del Pokémon."
    de: "Eine Beerensorte, die als Zutat für Pokériegel\nverwendet wird, welche die Klugheit erhöhen.\nIn anderen Regionen ist sie eher selten zu finden."
    es: "Se utiliza en la producción de Pokécubos que\npotencian el ingenio. Es una baya muy rara en\notras regiones."
    ko: "슬기로움을 연마하기 위한\n포켓몬스넥을 만들 때 사용된다.\n다른 지방에서는 희귀한 나무열매."
dusk_ball:
  names:
    jp_kana: ダークボール
    jp_kanji: ダークボール
    en: Dusk Ball
    fr: Sombre Ball
    it: Scuro Ball
    de: Finsterball
    es: Ocaso Ball
    ko: 다크볼
  descriptions:
    jp_kana: "よるや　どうくつなど　くらいところで\nポケモンが　つかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "夜や　どうくつなど　暗いところで\nポケモンが　捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A somewhat different Poké Ball that\nmakes it easier to catch wild Pokémon\nat night or in dark places like caves."
    fr: "Une Poké Ball efficace de nuit ou dans les\nendroits sombres, tels que les grottes."
    it: "Poké Ball un po’ diversa che rende più facile\ncatturare Pokémon selvatici di notte o in luoghi\nbui come le grotte."
    de: "Ein mysteriöser Ball, geeignet für Einsätze in der\nNacht oder an dunklen Orten."
    es: "Es algo particular. Hace que sea más fácil\ncapturar a los Pokémon salvajes por la noche\no en lugares oscuros."
    ko: "밤이나 동굴 등 어두운 곳에서\n포켓몬을 잡기 쉬운\n조금 특이한 볼."
dusk_stone:
  names:
    jp_kana: やみのいし
    jp_kanji: やみのいし
    en: Dusk Stone
    fr: Pierre Nuit
    it: Neropietra
    de: Finsterstein
    es: Piedra Noche
    ko: 어둠의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nやみのように　くらい。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nやみのように　暗い。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nIt holds shadows as dark as can be."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle est sombre comme\nune nuit sans lune."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È scura come le tenebre."
    de: "Dieser besondere, düstere Stein hilft\nmanchen Pokémon bei ihrer Entwicklung."
    es: "Una piedra peculiar que hace evolucionar a\nalgunos Pokémon. Es oscura como la noche."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n칠흑처럼 어둡다."
earth_plate:
  names:
    jp_kana: だいちのプレート
    jp_kanji: だいちのプレート
    en: Earth Plate
    fr: Plaque Terre
    it: Lastrageo
    de: Erdtafel
    es: Tabla Terrax
    ko: 대지플레이트
  descriptions:
    jp_kana: "じめんの　タイプの　せきばん。\nもたせると　じめんタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "じめんの　タイプの　石盤。\n持たせると　じめんタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Ground-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Sol."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Terra."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Boden."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Tierra. Debe llevarla un Pokémon."
    ko: "땅타입의 석판.\n지니게 하면 땅타입\n기술의 위력이 강해진다."
eject_button:
  names:
    jp_kana: だっしゅつボタン
    jp_kanji: だっしゅつボタン
    en: Eject Button
    fr: Bouton Fuite
    it: Pulsantefuga
    de: Fluchtknopf
    es: Botón Escape
    ko: 탈출버튼
  descriptions:
    jp_kana: "もたせて　わざを　うけると\nせんとうから　だっしゅつして\nてもちと　いれかわる　ことができる。"
    jp_kanji: "持たせて　技を　受けると\n戦闘から　脱出して\n手持ちと　入れ替わる　ことができる。"
    en: "An item to be held by a Pokémon.\nIf the holder is hit by an attack, it\nwill be switched out of battle."
    fr: "Si le Pokémon qui le tient subit une attaque,\nil s’enfuit pour être remplacé par un autre\nmembre de l’équipe."
    it: "Se il Pokémon che ha questo strumento è colpito\nda un attacco, viene immediatamente sostituito\nda un compagno."
    de: "Wird der Träger getroffen, flieht er aus dem Kampf\nund wird mit einem Team-Pokémon ausgetauscht."
    es: "Si el portador es alcanzado por un ataque, saldrá\ndel combate y será sustituido por otro Pokémon\ndel equipo."
    ko: "지니게 하고 기술을 받으면\n배틀에서 탈출하여\n지닌 포켓몬과 교체할 수 있다."
electirizer:
  names:
    jp_kana: エレキブースター
    jp_kanji: エレキブースター
    en: Electirizer
    fr: Électriseur
    it: Elettritore
    de: Stromisierer
    es: Electrizador
    ko: 에레키부스터
  descriptions:
    jp_kana: "とてつもない　でんきの　エネルギーが\nたくわえられている　はこ。\nある　ポケモンが　このんでいる。"
    jp_kanji: "とてつもない　電気の　エネルギーが\n蓄えられている　箱。\nある　ポケモンが　好んでいる。"
    en: "A box packed with a tremendous\namount of electric energy.\nIt’s loved by a certain Pokémon."
    fr: "Une boîte remplie d’une énorme quantité\nd’énergie électrique. Appréciée d’un certain\nPokémon."
    it: "Scatola strapiena di energia elettrica.\nPiace a un Pokémon in particolare."
    de: "Eine Schachtel mit elektrischer Energie.\nDas Lieblingsstück eines bestimmten Pokémon."
    es: "Este dispositivo contiene una gran cantidad de\nenergía eléctrica. Cierto Pokémon lo adora."
    ko: "엄청난 전기의 에너지가\n비축되어 있는 상자.\n어떤 포켓몬이 좋아하는 물건이다."
electric_gem:
  names:
    jp_kana: でんきのジュエル
    jp_kanji: でんきのジュエル
    en: Electric Gem
    fr: Joyau Électrik
    it: Bijouelettro
    de: Elektrojuwel
    es: Gema Eléctrica
    ko: 전기주얼
  descriptions:
    jp_kana: "でんきの　タイプの　ジュエル。\nもたせると　いちどだけ　でんきの\nわざの　いりょくが　つよまる。"
    jp_kanji: "でんきの　タイプの　ジュエル。\n持たせると　１度だけ　でんきの\n技の　威力が　強まる。"
    en: "A gem with an essence of electricity.\nWhen held, it strengthens the power of\nan Electric-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Électrik."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Elettro."
    de: "Ein Juwel vom Typ Elektro. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Elektro."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Eléctrico. Debe llevarla\nun Pokémon."
    ko: "전기타입의 주얼.\n지니게 하면 한 번만 전기\n기술의 위력이 강해진다."
elevator_key:
  names:
    jp_kana: エレベータのキー
    jp_kanji: エレベータのキー
    en: Elevator Key
    fr: Clé Ascenseur
    it: Chiave ascensore
    de: Liftschlüssel
    es: Llave Ascensor
    ko: 엘리베이터키
  descriptions:
    jp_kana: "フラダリラボに　ある\nエレベータを　うごかす　カードキー。\nフレアだんの マークいり。"
    jp_kanji: "フラダリラボに　ある\nエレベータを　動かす　カードキー。\nフレア団の マークいり。"
    en: "A card key that activates the elevator\nin Lysandre Labs.\nIt is emblazoned with Team Flare’s logo."
    fr: "Un passe de sécurité permettant d’accéder à\nl’ascenseur des Laboratoires Lysandre.\nIl est décoré du logo de la Team Flare."
    it: "Tessera magnetica con il simbolo del Team Flare\nche attiva l’ascensore dei Laboratori Elisio."
    de: "Eine Schlüsselkarte mit dem Logo von\nTeam Flare. Sie aktiviert den Fahrstuhl\nim Labor von Flordelis."
    es: "Tarjeta con el logotipo del Team Flare que activa\nel ascensor de los Laboratorios Lysson."
    ko: "플라드리 래버러토리에 있는\n엘리베이터를 작동시키는 카드키.\n플레어단의 마크가 새겨져 있다."
elixir:
  names:
    jp_kana: ピーピーエイダー
    jp_kanji: ピーピーエイダー
    en: Elixir
    fr: Élixir
    it: Elisir
    de: Elixier
    es: Elixir
    ko: PP에이더
  descriptions:
    jp_kana: "ポケモンが　おぼえている\n４つの　わざの　ＰＰを\n１０ずつ　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n４つの　技の　ＰＰを\n１０ずつ　回復する。"
    en: "This medicine can restore 10 PP\nto each of the moves that have\nbeen learned by a Pokémon."
    fr: "Restaure 10 PP de toutes les capacités\nd’un Pokémon."
    it: "Restituisce 10 PP a ciascuna delle mosse\nconosciute dal Pokémon."
    de: "Füllt die AP aller Attacken eines Pokémon\num 10 Punkte auf."
    es: "Restaura 10 PP de todos los movimientos\naprendidos por el Pokémon elegido."
    ko: "포켓몬이 기억하고 있는\n4개 기술의 PP를\n10씩 회복한다."
energy_powder:
  names:
    jp_kana: ちからのこな
    jp_kanji: ちからのこな
    en: Energy Powder
    fr: Poudrénergie
    it: Polvenergia
    de: Energiestaub
    es: Polvo Energía
    ko: 힘의가루
  descriptions:
    jp_kana: "とても　にがい　こなぐすり。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "とても　にがい　粉薬。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "A bitter medicine powder.\nWhen consumed, it restores\n50 HP to an injured Pokémon."
    fr: "Une poudre médicinale très amère.\nRestaure 50 PV d’un Pokémon."
    it: "Rimedio amarissimo in polvere.\nRestituisce 50 PS a un Pokémon."
    de: "Ein bitteres medizinisches Pulver, das die KP\neines Pokémon um 50 Punkte auffüllt."
    es: "Polvo medicinal muy amargo que restaura 50 PS\nde un Pokémon."
    ko: "매우 쓴 가루약.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
energy_root:
  names:
    jp_kana: ちからのねっこ
    jp_kanji: ちからのねっこ
    en: Energy Root
    fr: Racinénergie
    it: Radicenergia
    de: Kraftwurzel
    es: Raíz Energía
    ko: 힘의뿌리
  descriptions:
    jp_kana: "とても　にがい　ねっこ。\nポケモン　１ひきの　ＨＰを\n２００だけ　かいふくする。"
    jp_kanji: "とても　にがい　ねっこ。\nポケモン　１匹の　ＨＰを\n２００だけ　回復する。"
    en: "An extremely bitter medicinal root.\nWhen consumed, it restores\n200 HP to an injured Pokémon."
    fr: "Une racine très amère.\nRestaure 200 PV d’un Pokémon."
    it: "Radice amarissima.\nRestituisce 200 PS a un Pokémon."
    de: "Eine bittere Wurzel. Sie füllt die KP\neines Pokémon um 200 Punkte auf."
    es: "Raíz muy amarga que restaura 200 PS de un\nPokémon."
    ko: "매우 쓴 뿌리.\n포켓몬 1마리의 HP를\n200만큼 회복한다."
enigma_berry:
  names:
    jp_kana: ナゾのみ
    jp_kanji: ナゾのみ
    en: Enigma Berry
    fr: Baie Enigma
    it: Baccaenigma
    de: Enigmabeere
    es: Baya Enigma
    ko: 의문열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nこうかばつぐんの　わざを\nうけたとき　ＨＰを　かいふくする。"
    jp_kanji: "ポケモンに　持たせると\n効果バツグンの　技を\n受けたとき　ＨＰを　回復する。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, being hit by a\nsupereffective attack will restore its HP."
    fr: "Tenue, cette Baie restaure les PV du Pokémon\ns’il subit une attaque super efficace."
    it: "Se il Pokémon che ha questa bacca è colpito da\nun attacco superefficace, i suoi PS vengono\nripristinati."
    de: "Als getragenes Item füllt diese Beere die KP\neines Pokémon auf, wenn es von sehr effektiven\nAttacken getroffen wird."
    es: "Restaura los PS de un Pokémon si la lleva cuando\nle alcanza un ataque supereficaz."
    ko: "포켓몬에게 지니게 하면\n효과가 뛰어난 공격을\n받았을 때 HP를 회복한다."
enigma_stone:
  names:
    jp_kana: なぞのすいしょう
    jp_kanji: なぞのすいしょう
    en: Enigma Stone
    fr: Mystécristal
    it: Misticristal
    de: Mytokristall
    es: Misticristal
    ko: 수수께끼의수정
  descriptions:
    jp_kana: "じめんから　ほりだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    jp_kanji: "地面から　掘りだされた\nすいしょうだま。いわと　つちで\nおおわれているが　とても　きれい。"
    en: "A crystal ball that was excavated from\nthe ground. It’s a very beautiful stone that\nis covered with bits of rock and earth."
    fr: "Un orbe cristallin fraîchement déterré.\nIl est encore pris dans une gangue de terre\net de roche."
    it: "Cristallo appena estratto dal suolo.\nBellissimo malgrado sia ancora ricoperto di resti\ndi roccia e terra."
    de: "Eine kristallene Kugel, die aus der Erde\ngeborgen wurde. Schmutz und Gestein\nkonnten ihrer Schönheit nichts anhaben."
    es: "Esfera cristalina encontrada bajo tierra. A pesar\nde estar cubierta de roca y tierra, su belleza es\nincreíble."
    ko: "땅에서 파 올린\n수정구슬. 바위랑 흙으로\n뒤덮여 있지만 매우 아름답다."
eon_flute:
  names:
    jp_kana: むげんのふえ
    jp_kanji: むげんのふえ
    en: Eon Flute
    fr: Flûte Éon
    it: Flauto Eone
    de: Äon-Flöte
    es: Flauta Eón
    ko: 무한의피리
  descriptions:
    jp_kana: "どこに　いても\nラティオスや　ラティアスを\nよびよせることが　できる　ふえ。"
    jp_kanji: "どこに　いても\nラティオスや　ラティアスを\n呼び寄せることが　できる　笛。"
    en: "A flute that can be used to summon\nLatios or Latias no matter where you are."
    fr: "Une flûte capable d’appeler Latios ou Latias\noù que l’on soit."
    it: "Suonando questo flauto è possibile richiamare\nLatios o Latias ovunque ci si trovi."
    de: "Eine Flöte, mit der man Latios oder Latias\nherbeirufen kann, egal wo sie sich gerade\nbefinden."
    es: "Flauta capaz de invocar a Latios o Latias en\ncualquier lugar."
    ko: "어디에 있든지\n라티오스나 라티아스를\n부를 수 있는 피리."
eon_ticket:
  names:
    jp_kana: むげんのチケット
    jp_kanji: むげんのチケット
    en: Eon Ticket
    fr: Passe Éon
    it: Biglietto Eone
    de: Äon-Ticket
    es: Ticket Eón
    ko: 무한티켓
  descriptions:
    jp_kana: "みなみのことうへ　いく　ふねの\nチケット。トウカジムの　ジムリーダー\nセンリが　ひみつを　しっている！？"
    jp_kanji: "南の孤島へ　行く　船の\nチケット。トウカジムの　ジムリーダー\nセンリが　秘密を　知っている！？"
    en: "The ticket required for sailing on a\nferry to the Southern Island. Does Norman,\nthe Petalburg Gym Leader, know a secret?!"
    fr: "Un billet de ferry pour l’Île du Sud. Norman,\nle Champion de l’Arène de Clémenti-Ville,\nsemble savoir quelque chose à son sujet."
    it: "Biglietto per il traghetto che porta all’Isola\nRemota. Norman, il Capopalestra di Petalipoli,\ndovrebbe sapere come usarlo."
    de: "Ein Bootsticket, mit dem du zu einer fernen Insel\nim Süden schippern kannst. Kennt der Arenaleiter\nvon Blütenburg, Norman, ein Geheimnis?!"
    es: "Billete de barco para viajar a la Isla del Sur.\nEs posible que Norman, Líder del Gimnasio de\nCiudad Petalia, sepa algo al respecto."
    ko: "남쪽의 외딴섬으로 가는 배의\n승선티켓. 등화체육관 관장\n종길이 비밀을 알고있다!?"
escape_rope:
  names:
    jp_kana: あなぬけのヒモ
    jp_kanji: あなぬけのヒモ
    en: Escape Rope
    fr: Corde Sortie
    it: Fune di Fuga
    de: Fluchtseil
    es: Cuerda Huida
    ko: 동굴탈출로프
  descriptions:
    jp_kana: "ながくて　じょうぶな　ヒモ。\nどうくつや　ダンジョンから\nぬけだすことが　できる。"
    jp_kanji: "長くて　丈夫な　ヒモ。\n洞窟や　ダンジョンから\n抜け出すことが　できる。"
    en: "A long and durable rope.\nUse it to escape instantly\nfrom a cave or a dungeon."
    fr: "Une corde longue et solide permettant de sortir\nrapidement d’une grotte ou d’un donjon."
    it: "Corda lunga e resistente che si usa per fuggire\nin un batter d’occhio dalle grotte o da certi\nluoghi chiusi."
    de: "Ein langes, festes Seil, das die sofortige Flucht\naus Höhlen oder Ähnlichem ermöglicht."
    es: "Cuerda larga y resistente que sirve para huir de\ncuevas y sitios cerrados en general."
    ko: "길고 튼튼한 끈.\n동굴이나 던전에서\n빠져나올 수 있다."
ether:
  names:
    jp_kana: ピーピーエイド
    jp_kanji: ピーピーエイド
    en: Ether
    fr: Huile
    it: Etere
    de: Äther
    es: Éter
    ko: PP에이드
  descriptions:
    jp_kana: "ポケモンが　おぼえている\nわざのうち　１つの　ＰＰを\n１０だけ　かいふくする。"
    jp_kanji: "ポケモンが　覚えている\n技のうち　１つの　ＰＰを\n１０だけ　回復する。"
    en: "This medicine can restore 10 PP\nto a single selected move that\nhas been learned by a Pokémon."
    fr: Restaure 10 PP d’une capacité sélectionnée.
    it: "Restituisce un massimo di 10 PP a una mossa\na scelta tra quelle conosciute dal Pokémon."
    de: "Füllt die AP einer ausgewählten Attacke\neines Pokémon um 10 Punkte auf."
    es: "Restaura 10 PP del movimiento elegido de un\nPokémon."
    ko: "포켓몬이 기억하고 있는\n기술 중 1개의 PP를\n10만큼 회복한다."
everstone:
  names:
    jp_kana: かわらずのいし
    jp_kanji: かわらずのいし
    en: Everstone
    fr: Pierre Stase
    it: Pietrastante
    de: Ewigstein
    es: Piedra Eterna
    ko: 변함없는돌
  descriptions:
    jp_kana: "ポケモンに　もたせると\nそのあいだ　しんか　しなくなる\nふしぎな　いし。"
    jp_kanji: "ポケモンに　持たせると\nそのあいだ　進化しなくなる\n不思議な　石。"
    en: "An item to be held by a Pokémon.\nA Pokémon holding this peculiar\nstone is prevented from evolving."
    fr: "Objet à tenir. Une pierre merveilleuse empêchant\nl’évolution."
    it: "Strumento da dare a un Pokémon.\nChi ha questa pietra particolare evita l’evoluzione."
    de: "Ein Item, das einem Pokémon zum Tragen\ngegeben werden kann. Es bewirkt einen\nEntwicklungsstopp."
    es: "El Pokémon que lleva esta piedra mágica no\nevoluciona."
    ko: "포켓몬에게 지니게 하면\n지닌 동안에는 진화하지 않게 되는\n이상한 돌."
eviolite:
  names:
    jp_kana: しんかのきせき
    jp_kanji: しんかのきせき
    en: Eviolite
    fr: Évoluroc
    it: Evolcondensa
    de: Evolith
    es: Mineral Evol
    ko: 진화의휘석
  descriptions:
    jp_kana: "しんかの　ふしぎな　かたまり。\nもたせると　しんかまえ　ポケモンの\nぼうぎょと　とくぼうが　あがる。"
    jp_kanji: "進化の　不思議な　かたまり。\n持たせると　進化前　ポケモンの\n防御と　特防が　あがる。"
    en: "A mysterious Evolutionary lump. When\nheld by a Pokémon that can still evolve,\nit raises both Defense and Sp. Def."
    fr: "Un étrange concentré d’évolution qui augmente\nla Défense et la Défense Spéciale d’un Pokémon\npouvant évoluer."
    it: "Misteriosa sfera evolutiva. Aumenta la Difesa\ne la Difesa Speciale di un Pokémon che può\nancora evolversi."
    de: "Ein mysteriöser Klumpen, der die Verteidigung\nund Spezial-Verteidigung von Pokémon erhöht,\ndie sich noch entwickeln können."
    es: "Piedra evolutiva. El Pokémon portador aumentará\nsu Defensa y su Defensa Especial si aún puede\nevolucionar."
    ko: "진화의 이상한 덩어리.\n지니게 하면 진화 전 포켓몬의\n방어와 특수방어가 올라간다."
exp_share:
  names:
    jp_kana: がくしゅうそうち
    jp_kanji: がくしゅうそうち
    en: Exp. Share
    fr: Multi Exp
    it: Condividi Esp.
    de: EP-Teiler
    es: Repartir Exp
    ko: 학습장치
  descriptions:
    jp_kana: "スイッチを　いれると\nてもちの　ポケモン　すべてが\nけいけんちを　もらえる　そうち。"
    jp_kanji: "スイッチを　いれると\n手持ちの　ポケモン　すべてが\n経験値を　もらえる　装置。"
    en: "Turning on this special device will\nallow all the Pokémon on your team\nto receive Exp. Points from battles."
    fr: "Objet à activer. Permet de faire gagner des\nPoints Exp. à tous les Pokémon de l’équipe,\nmême à ceux qui n’ont pas participé au combat."
    it: "Se attivato, tutti i Pokémon della squadra\nricevono Punti Esperienza dalla lotta anche\nse non vi hanno partecipato."
    de: "Solange der EP-Teiler angeschaltet ist, erhält\njedes Team-Pokémon nach einem Sieg\nErfahrungspunkte."
    es: "Al activar el dispositivo, todos los Pokémon de\ntu equipo ganan Puntos de Experiencia tras los\ncombates, aunque no salgan a luchar."
    ko: "스위치를 켜면\n지닌 포켓몬 모두가\n경험치를 받을 수 있는 장치."
expert_belt:
  names:
    jp_kana: たつじんのおび
    jp_kanji: たつじんのおび
    en: Expert Belt
    fr: Ceinture Pro
    it: Abilcintura
    de: Expertengurt
    es: Cinta Experto
    ko: 달인의띠
  descriptions:
    jp_kana: "つかいこまれた　くろい　おび。\nもたせると　こうかばつぐんの　とき\nわざの　いりょくが　すこし　あがる。"
    jp_kanji: "使いこまれた　黒い　帯。\n持たせると　効果バツグンの　とき\n技の　威力が　少し　あがる。"
    en: "An item to be held by a Pokémon.\nIt’s a well-worn belt that slightly boosts\nthe power of supereffective moves."
    fr: "Objet à tenir. Une ceinture usée augmentant\nlégèrement la puissance des capacités super\nefficaces."
    it: "Strumento da dare a un Pokémon.\nCintura consumata che potenzia di poco\nle mosse superefficaci."
    de: "Ein Item zum Tragen. Dieser alte Gürtel verstärkt\nsehr effektive Attacken."
    es: "Potencia ligeramente los movimientos\nsupereficaces. Debe llevarla un Pokémon."
    ko: "오래 사용한 까만 띠.\n지니게 하면 효과가 뛰어날 때\n기술의 위력이 조금 올라간다."
explorer_kit:
  names:
    jp_kana: たんけんセット
    jp_kanji: たんけんセット
    en: Explorer Kit
    fr: Explorakit
    it: Esplorokit
    de: Forschersack
    es: Kit Explorador
    ko: 탐험세트
  descriptions:
    jp_kana: "たんけんに　やくだつ　べんりな\nどうぐが　はいった　ふくろ。\nちかつうろに　はいれる。"
    jp_kanji: "探検に　役立つ　便利な\n道具が　はいった　ふくろ。\n地下通路に　はいれる。"
    en: "A bag filled with convenient tools for\nexploring. It provides access to the\nUnderground in the Sinnoh region."
    fr: "Un sac contenant des objets utiles à l’exploration.\nPermet d’entrer dans le Souterrain."
    it: "Utilissimo kit contenente strumenti per\nl’esplorazione. Permette di percorrere\ni tunnel sotterranei."
    de: "Ein Sack voller hilfreicher Items für\nErkundungsgänge. Öffnet den Untergrund."
    es: "Una saca donde guardar los objetos útiles para\nla exploración. Permite acceder al Subsuelo."
    ko: "탐험에 도움이 되는 편리한\n도구가 들어 있는 주머니.\n지하통로에 들어갈 수 있다."
fairy_gem:
  names:
    jp_kana: ようせいジュエル
    jp_kanji: ようせいジュエル
    en: Fairy Gem
    fr: Joyau Fée
    it: Bijoufolletto
    de: Feenjuwel
    es: Gema Hada
    ko: 페어리주얼
  descriptions:
    jp_kana: "フェアリーの　タイプの　ジュエル。\nもたせると　いちどだけ　フェアリーの\nわざの　いりょくが　つよまる。"
    jp_kanji: "フェアリーの　タイプの　ジュエル。\n持たせると　１度だけ　フェアリーの\n技の　威力が　強まる。"
    en: "A gem with an essence of the fey.\nWhen held, it strengthens the power\nof a Fairy-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Fée."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Folletto."
    de: "Ein Juwel vom Typ Fee. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Fee."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Hada.\nDebe llevarla un Pokémon."
    ko: "페어리타입의 주얼.\n지니게 하면 한 번만 페어리\n기술의 위력이 강해진다."
fashion_case:
  names:
    jp_kana: アクセサリーいれ
    jp_kanji: アクセサリーいれ
    en: Fashion Case
    fr: Coffret Mode
    it: Scatola Chic
    de: Modekoffer
    es: Caja Corazón
    ko: 액세서리상자
  descriptions:
    jp_kana: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    jp_kanji: "ミュージカルで　ポケモンに　つける\nいろとりどりの　グッズを　たくさん\nしまえる　きれいで　すてきなケース。"
    en: "A lovely case to store colorful Props\nfor your Pokémon to wear in a musical."
    fr: "Une boîte permettant de ranger les Parures pour\nhabiller les Pokémon au Music-Hall."
    it: "Scatola bella ed elegante per conservare i gadget\nusati per agghindare i Pokémon durante\nil Pokémon Musical."
    de: "Ein schicker Koffer mit Platz für alle\nim Musical benötigten Deko-Artikel\ndeiner Pokémon. Da knittert nichts."
    es: "Una bonita cajita donde guardar todos los\nComplementos para vestir a tus Pokémon en\nel Teatro Musical."
    ko: "뮤지컬에서 포켓몬에게 다는\n각양각색의 굿즈를 많이\n넣을 수 있는 아름답고 멋진 케이스."
fast_ball:
  names:
    jp_kana: スピードボール
    jp_kanji: スピードボール
    en: Fast Ball
    fr: Speed Ball
    it: Rapid Ball
    de: Turboball
    es: Rapid Ball
    ko: 스피드볼
  descriptions:
    jp_kana: "にげあしの　はやい　ポケモンが\nつかまえやすくなる\nちょっと　かわった　ボール。"
    jp_kanji: "にげあしの　はやい　ポケモンが\n捕まえやすくなる\nちょっと　変わった　ボール。"
    en: "A Poké Ball that makes it easier to\ncatch Pokémon that are usually\nvery quick to run away."
    fr: "Une Poké Ball un peu spéciale qui fonctionne\nparticulièrement bien sur les Pokémon qui ont\ntendance à fuir."
    it: "Poké Ball un po’ diversa particolarmente efficiente\ncon i Pokémon bravi a scappare."
    de: "Ein Ball, der sich besonders gut eignet, um flinke\nPokémon zu fangen."
    es: "Poké Ball algo distinta, especialmente indicada\npara capturar Pokémon evasivos."
    ko: "도주가 빠른 포켓몬이\n잡기 쉬워지는\n조금 특이한 볼."
favored_mail:
  names:
    jp_kana: だいすきメール
    jp_kanji: だいすきメール
    en: Favored Mail
    fr: Lettre Fan
    it: Messaggio TVB
    de: Faiblebrief
    es: Carta Favoritos
    ko: 애호메일
  descriptions:
    jp_kana: "すきなものを　つたえる　メールが\nかきやすい　びんせん。\nポケモンに　もたせて　つかう。"
    jp_kanji: "好きなものを　伝える　メールが\n書きやすい　レターペーパー。\nポケモンに　持たせて　使う。"
    en: "Stationery designed to make it easier\nto write about your favorite things.\nHave a Pokémon hold it for delivery."
    fr: "Un papier à lettres idéal pour parler de ce que\nl’on aime. Peut être tenu et livré par un Pokémon."
    it: "Carta da lettere ideale per parlare di ciò che si\nama. Si può dare a un Pokémon affinché\nla consegni."
    de: "Briefpapier, mit dem man jemandem verraten\nkann, was man gern mag. Gib es einem Pokémon\nzum Tragen."
    es: "Carta para escribir sobre tus cosas favoritas.\nHaz que la entregue un Pokémon."
    ko: "좋아하는 것을 전하는 메일을\n쉽게 쓸 수 있는 편지지.\n포켓몬에게 지니게 해서 쓴다."
fighting_gem:
  names:
    jp_kana: かくとうジュエル
    jp_kanji: かくとうジュエル
    en: Fighting Gem
    fr: Joyau Combat
    it: Bijoulotta
    de: Kampfjuwel
    es: Gema Lucha
    ko: 격투주얼
  descriptions:
    jp_kana: "かくとうの　タイプの　ジュエル。\nもたせると　いちどだけ　かくとうの\nわざの　いりょくが　つよまる。"
    jp_kanji: "かくとうの　タイプの　ジュエル。\n持たせると　１度だけ　かくとうの\n技の　威力が　強まる。"
    en: "A gem with an essence of combat.\nWhen held, it strengthens the power\nof a Fighting-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Lotta."
    de: "Ein Juwel vom Typ Kampf. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Kampf."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Lucha. Debe llevarla\nun Pokémon."
    ko: "격투타입의 주얼.\n지니게 하면 한 번만 격투\n기술의 위력이 강해진다."
figy_berry:
  names:
    jp_kana: フィラのみ
    jp_kanji: フィラのみ
    en: Figy Berry
    fr: Baie Figuy
    it: Baccafico
    de: Giefebeere
    es: Baya Higog
    ko: 무화열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　ＨＰを　かいふくする。\nきらいな　あじだと　こんらん　する。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　ＨＰを　回復する。\nきらいな味だと　混乱する。"
    en: "If held by a Pokémon, it restores the\nuser’s HP in a pinch, but it will cause\nconfusion if the user hates the taste."
    fr: "Tenue, cette Baie restaure des PV en cas\nde besoin, mais rend le Pokémon confus si\nson goût lui déplaît."
    it: "Se un Pokémon in difficoltà ha questa bacca,\nrecupera dei PS. Se al Pokémon non piace\nil suo sapore, può causare confusione."
    de: "Als getragenes Item füllt die Beere die KP eines\nPokémon auf, doch ihr Aroma verwirrt jene,\ndie es nicht mögen."
    es: "Los Pokémon pueden llevarla o usarla para\nrestaurar algunos PS. Su sabor puede causar\nconfusión."
    ko: "포켓몬에게 지니게 하면\n위급할 때 HP를 회복한다.\n싫어하는 맛이면 혼란에 빠진다."
fire_gem:
  names:
    jp_kana: ほのおのジュエル
    jp_kanji: ほのおのジュエル
    en: Fire Gem
    fr: Joyau Feu
    it: Bijoufuoco
    de: Feuerjuwel
    es: Gema Fuego
    ko: 불꽃주얼
  descriptions:
    jp_kana: "ほのおの　タイプの　ジュエル。\nもたせると　いちどだけ　ほのおの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ほのおの　タイプの　ジュエル。\n持たせると　１度だけ　ほのおの\n技の　威力が　強まる。"
    en: "A gem with an essence of fire.\nWhen held, it strengthens the power\nof a Fire-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Fuoco."
    de: "Ein Juwel vom Typ Feuer. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Feuer."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Fuego. Debe llevarla\nun Pokémon."
    ko: "불꽃타입의 주얼.\n지니게 하면 한 번만 불꽃\n기술의 위력이 강해진다."
fire_stone:
  names:
    jp_kana: ほのおのいし
    jp_kanji: ほのおのいし
    en: Fire Stone
    fr: Pierre Feu
    it: Pietrafocaia
    de: Feuerstein
    es: Piedra Fuego
    ko: 불꽃의돌
  descriptions:
    jp_kana: "ある　とくていの　ポケモンを\nしんかさせる　ふしぎな　いし。\nだいだいいろを　している。"
    jp_kanji: "ある　特定の　ポケモンを\n進化させる　不思議な　石。\nだいだい色を　している。"
    en: "A peculiar stone that can make\ncertain species of Pokémon evolve.\nThe stone has a fiery orange heart."
    fr: "Une pierre étrange qui fait évoluer certaines\nespèces de Pokémon. Elle est jaune et orange."
    it: "Pietra particolare che fa evolvere determinate\nspecie di Pokémon. È gialla e arancione."
    de: "Dieser spezielle Stein löst bei bestimmten\nPokémon die Entwicklung aus. Er schimmert\nin den Farben Orange und Gelb."
    es: "Curiosa piedra que hace evolucionar a\ndeterminadas especies de Pokémon. Es amarilla\ncon una marca naranja."
    ko: "어느 특정 포켓몬을\n진화시키는 이상한 돌.\n주황색을 띠고 있다."
fist_plate:
  names:
    jp_kana: こぶしのプレート
    jp_kanji: こぶしのプレート
    en: Fist Plate
    fr: Plaque Poing
    it: Lastrapugno
    de: Fausttafel
    es: Tabla Fuerte
    ko: 주먹플레이트
  descriptions:
    jp_kana: "かくとうの　タイプの　せきばん。\nもたせると　かくとうタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "かくとうの　タイプの　石盤。\n持たせると　かくとうタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Fighting-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Combat."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Lotta."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Kampf."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Lucha. Debe llevarla un Pokémon."
    ko: "격투타입의 석판.\n지니게 하면 격투타입\n기술의 위력이 강해진다."
flame_orb:
  names:
    jp_kana: かえんだま
    jp_kanji: かえんだま
    en: Flame Orb
    fr: Orbe Flamme
    it: Fiammosfera
    de: Heiß-Orb
    es: Llamasfera
    ko: 화염구슬
  descriptions:
    jp_kana: "さわると　ねつをだす　ふしぎなたま。\nもたせると　せんとうちゅうに\nやけどの　じょうたいに　なる。"
    jp_kanji: "触ると　熱をだす　不思議な玉。\n持たせると　戦闘中に\nやけどの　状態に　なる。"
    en: "An item to be held by a Pokémon.\nIt is a bizarre orb that will afflict the\nholder with a burn during battle."
    fr: "Objet à tenir. Un orbe bizarre brûlant son porteur\ndurant le combat."
    it: "Strumento da dare a un Pokémon.\nSfera bizzarra che procura una scottatura\na chi l’ha con sé in una lotta."
    de: "Ein Item zum Tragen. Dieser bizarre Orb fügt\nseinem Träger Verbrennungen zu."
    es: "Extraña esfera que causa quemaduras al Pokémon\nque la lleva en combate."
    ko: "만지면 열을 내는 이상한 구슬.\n지니게 하면 배틀 중에\n화상 상태가 된다."
flame_plate:
  names:
    jp_kana: ひのたまプレート
    jp_kanji: ひのたまプレート
    en: Flame Plate
    fr: Plaque Flamme
    it: Lastrarogo
    de: Feuertafel
    es: Tabla Llama
    ko: 불구슬플레이트
  descriptions:
    jp_kana: "ほのおの　タイプの　せきばん。\nもたせると　ほのおタイプの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ほのおの　タイプの　石盤。\n持たせると　ほのおタイプの\n技の　威力が　強まる。"
    en: "An item to be held by a Pokémon.\nIt’s a stone tablet that boosts the\npower of Fire-type moves."
    fr: "Objet à tenir. Une tablette en pierre augmentant\nla puissance des capacités de type Feu."
    it: "Strumento da dare a un Pokémon.\nLastra di pietra che potenzia le mosse\ndi tipo Fuoco."
    de: "Ein Item zum Tragen. Diese Steintafel verstärkt\nAttacken vom Typ Feuer."
    es: "Tabla de piedra que potencia los movimientos de\ntipo Fuego. Debe llevarla un Pokémon."
    ko: "불꽃타입의 석판.\n지니게 하면 불꽃타입\n기술의 위력이 강해진다."
float_stone:
  names:
    jp_kana: かるいし
    jp_kanji: かるいし
    en: Float Stone
    fr: Pierrallégée
    it: Pietralieve
    de: Leichtstein
    es: Piedra Pómez
    ko: 가벼운돌
  descriptions:
    jp_kana: "とても　かるい　いし。\nもたせると　ポケモンの\nたいじゅうが　かるくなる。"
    jp_kanji: "とても　軽い　石。\n持たせると　ポケモンの\n体重が　軽くなる。"
    en: "An item to be held by a Pokémon.\nThis very light stone reduces the\nweight of a Pokémon when held."
    fr: "Une pierre très légère.\nElle réduit le poids du Pokémon qui la tient."
    it: "Pietra leggerissima che riduce il peso del\nPokémon che l’ha con sé."
    de: "Ein federleichter Stein, der das Gewicht\ndes Trägers verringert."
    es: "Piedra muy ligera que reduce el peso del\nPokémon que la lleve."
    ko: "매우 가벼운 돌.\n지니게 하면 포켓몬의\n체중이 가벼워진다."
fluffy_tail:
  names:
    jp_kana: エネコのシッポ
    jp_kanji: エネコのシッポ
    en: Fluffy Tail
    fr: Queue Skitty
    it: Coda Skitty
    de: Eneco-Rute
    es: Cola Skitty
    ko: 에나비꼬리
  descriptions:
    jp_kana: "ポケモンの　きを　ひかせる　どうぐ。\nやせいポケモンとの　せんとうから\nぜったいに　にげられる。"
    jp_kanji: "ポケモンの　気をひかせる　道具。\n野生ポケモンとの　戦闘から\n絶対に　逃げられる。"
    en: "A toy that attracts the attention of a\nPokémon. It guarantees escape from\nany battle with wild Pokémon."
    fr: "Un objet qui attire les Pokémon.\nPermet de s’enfuir d’un combat contre\nun Pokémon sauvage."
    it: "Strumento che attrae i Pokémon. È utile\nper fuggire dalla lotta con Pokémon selvatici."
    de: "Ein hübsches Item. Es ermöglicht die Flucht\nim Kampf gegen wilde Pokémon."
    es: "Un objeto que atrae a los Pokémon. Es útil para\nhuir de un combate contra un Pokémon salvaje."
    ko: "포켓몬의 관심을 끄는 도구.\n야생 포켓몬과의 배틀에서\n반드시 도망칠 수 있다."
flying_gem:
  names:
    jp_kana: ひこうのジュエル
    jp_kanji: ひこうのジュエル
    en: Flying Gem
    fr: Joyau Vol
    it: Bijouvolante
    de: Flugjuwel
    es: Gema Voladora
    ko: 비행주얼
  descriptions:
    jp_kana: "ひこうの　タイプの　ジュエル。\nもたせると　いちどだけ　ひこうの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ひこうの　タイプの　ジュエル。\n持たせると　１度だけ　ひこうの\n技の　威力が　強まる。"
    en: "A gem with an essence of air.\nWhen held, it strengthens the power\nof a Flying-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Vol."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Volante."
    de: "Ein Juwel vom Typ Flug. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Flug."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Volador. Debe llevarla\nun Pokémon."
    ko: "비행타입의 주얼.\n지니게 하면 한 번만 비행\n기술의 위력이 강해진다."
focus_band:
  names:
    jp_kana: きあいのハチマキ
    jp_kanji: きあいのハチマキ
    en: Focus Band
    fr: Bandeau
    it: Bandana
    de: Fokus-Band
    es: Cinta Focus
    ko: 기합의머리띠
  descriptions:
    jp_kana: "もたせると　ひんしに　なりそうな\nわざを　うけても　ＨＰを　１だけ\nのこして　たえることが　ある。"
    jp_kanji: "持たせると　ひんしに　なりそうな\n技を　受けても　ＨＰを　１だけ\n残して　耐えることが　ある。"
    en: "An item to be held by a Pokémon.\nThe holder may endure a potential\nKO attack, leaving it with just 1 HP."
    fr: "Objet à tenir pouvant parfois empêcher d’être\nmis K.O., ne laissant qu’un seul PV."
    it: "Strumento da dare a un Pokémon.\nChi ce l’ha può evitare un potenziale KO\ne rimanere con un solo PS."
    de: "Ein Item, das die Kampfunfähigkeit verhindern\nkann, da dem Träger 1 KP bleibt."
    es: "El Pokémon que la lleva puede resistir un golpe\nque potencialmente lo dejaría K.O. y se queda\ncon 1 PS."
    ko: "지니게 하면\n기절할 듯한 기술을 받아도\nHP를 1 남겨서 견디기도 한다."
focus_sash:
  names:
    jp_kana: きあいのタスキ
    jp_kanji: きあいのタスキ
    en: Focus Sash
    fr: Ceinture Force
    it: Focalnastro
    de: Fokusgurt
    es: Banda Focus
    ko: 기합의띠
  descriptions:
    jp_kana: "もたせると　ＨＰが　まんたんのとき\nひんしになりそうな　わざを　うけても\nＨＰ１で　いちどだけ　たえる。"
    jp_kanji: "持たせると　ＨＰが　満タンのとき\nひんしになりそうな　技を　受けても\nＨＰ１で　１度だけ　耐える。"
    en: "An item to be held by a Pokémon. If the holder\nhas full HP, it will endure a potential KO\nattack with 1 HP. The item then disappears."
    fr: "Objet à tenir. S’il a encore tous ses PV,\nle porteur pourra éviter d’être mis K.O. en\nun coup. Il ne conserve alors qu’un seul PV."
    it: "Strumento da dare a un Pokémon.\nSe il Pokémon ha tutti i PS, eviterà un\npotenziale KO, rimanendo con un PS."
    de: "Ein Item zum Tragen. Bei vollen KP bleibt\nder Träger nach einer K.O.-Attacke einmalig\nmit 1 KP im Kampf."
    es: "Si el Pokémon que la lleva tiene los PS al\nmáximo, puede resistir un golpe que lo dejaría\nK.O. y se queda con 1 PS."
    ko: "지니게 하면 HP가 꽉 찼을 때\n기절할 듯한 기술을 당해도\nHP 1로 한 번은 버틴다."
fresh_water:
  names:
    jp_kana: おいしいみず
    jp_kanji: おいしいみず
    en: Fresh Water
    fr: Eau Fraîche
    it: Acqua Fresca
    de: Tafelwasser
    es: Agua Fresca
    ko: 맛있는물
  descriptions:
    jp_kana: "ミネラル　たっぷりの　みず。\nポケモン　１ひきの　ＨＰを\n５０だけ　かいふくする。"
    jp_kanji: "ミネラル　たっぷりの　水。\nポケモン　１匹の　ＨＰを\n５０だけ　回復する。"
    en: "Water with a high mineral content.\nWhen consumed, it restores\n50 HP to an injured Pokémon."
    fr: "Une eau riche en minéraux.\nRestaure 50 PV d’un Pokémon."
    it: "Acqua ricca di sostanze minerali.\nRestituisce 50 PS a un Pokémon."
    de: "Ein stilles Wasser mit hohem Mineralienanteil,\ndas die KP eines Pokémon um 50 Punkte auffüllt."
    es: "Agua de alto contenido mineral que restaura\n50 PS de un Pokémon."
    ko: "미네랄이 가득한 물.\n포켓몬 1마리의 HP를\n50만큼 회복한다."
friend_ball:
  names:
    jp_kana: フレンドボール
    jp_kanji: フレンドボール
    en: Friend Ball
    fr: Copain Ball
    it: Friend Ball
    de: Freundesball
    es: Amigo Ball
    ko: 프렌드볼
  descriptions:
    jp_kana: "つかまえた　やせいポケモンが\nすぐに　なついて　くれる\nちょっと　かわった　ボール。"
    jp_kanji: "捕まえた　野生ポケモンが\nすぐに　なついて　くれる\nちょっと　変わった　ボール。"
    en: "A strange Poké Ball that will make\nthe wild Pokémon caught with it more\nfriendly toward you immediately."
    fr: "Une Poké Ball un peu spéciale qui permet de\nrendre rapidement amicaux les Pokémon\nsauvages attrapés avec celle-ci."
    it: "Poké Ball un po’ diversa che fa sì che i Pokémon\nselvatici con essa catturati si affezionino\npiù rapidamente."
    de: "Ein besonderer Ball, der die Sympathie von\ngefangenen Pokémon schneller ansteigen lässt."
    es: "Poké Ball algo distinta que hace más amistosos a\nlos Pokémon salvajes que se capturan con ella."
    ko: "잡은 야생 포켓몬이\n바로 친밀해지는\n조금 특이한 볼."
full_heal:
  names:
    jp_kana: なんでもなおし
    jp_kanji: なんでもなおし
    en: Full Heal
    fr: Total Soin
    it: Cura Totale
    de: Hyperheiler
    es: Cura Total
    ko: 만병통치제
  descriptions:
    jp_kana: "スプレーしきの　くすり。\nポケモン　１ひきの　じょうたいの\nいじょうを　すべて　かいふくする。"
    jp_kanji: "スプレー式の　薬。\nポケモン　１匹の　状態の\n異常を　すべて　回復する。"
    en: "A spray-type medicine that is broadly\neffective. It can be used once to heal\nall the status conditions of a Pokémon."
    fr: "Un médicament sous forme de spray.\nSoigne tous les problèmes de statut\nd’un Pokémon."
    it: "Rimedio spray.\nCura tutti i problemi di stato di un Pokémon."
    de: "Ein Spray, das alle Statusprobleme eines\nPokémon behebt."
    es: "Medicina en espray que cura todos los problemas\nde estado de un Pokémon."
    ko: "스프레이식의 약.\n포켓몬 1마리의\n상태 이상을 모두 회복한다."
full_incense:
  names:
    jp_kana: まんぷくおこう
    jp_kanji: まんぷくおこう
    en: Full Incense
    fr: Encens Plein
    it: Gonfioaroma
    de: Lahmrauch
    es: Incienso Lento
    ko: 만복향로
  descriptions:
    jp_kana: "ふしぎな　かおりの　おこう。\nもたせた　ポケモンは　いつもより\nこうどうが　おそくなる。"
    jp_kanji: "不思議な　香りの　御香。\n持たせた　ポケモンは　いつもより\n行動が　遅くなる。"
    en: "An item to be held by a Pokémon.\nThis exotic-smelling incense makes\nthe holder bloated and slow moving."
    fr: "Objet à tenir. Un encens au parfum exotique\nqui fait enfler son porteur et le fait se déplacer\nlentement."
    it: "Strumento da dare a un Pokémon.\nIncenso dal profumo esotico che rende gonfi\ne lenti."
    de: "Ein Item zum Tragen. Dieses exotische Duftkraut\nmacht den Träger benommen und langsam."
    es: "Incienso de exótico aroma que hace que el\nPokémon que lo lleve esté aturdido y se mueva\nmás despacio."
    ko: "이상한 향기의 향로.\n지니게 한 포켓몬은 여느 때보다\n행동이 느려진다."
full_restore:
  names:
    jp_kana: かいふくのくすり
    jp_kanji: かいふくのくすり
    en: Full Restore
    fr: Guérison
    it: Ricarica Totale
    de: Top-Genesung
    es: Restaurar Todo
    ko: 회복약
  descriptions:
    jp_kana: "ポケモン　１ひきの　ＨＰと\nじょうたい　いじょうを　すべて\nかいふくする。"
    jp_kanji: "ポケモン　１匹の　ＨＰと\n状態異常を　すべて\n回復する。"
    en: "A medicine that can be used to fully\nrestore the HP of a single Pokémon\nand heal any status conditions it has."
    fr: "Un médicament qui restaure tous les PV\nd’un Pokémon et soigne tous ses problèmes\nde statut."
    it: "Rimedio che restituisce tutti i PS a un Pokémon\ne cura i suoi problemi di stato."
    de: "Dieses Item stellt alle KP eines Pokémon\nwieder her und behebt alle Statusprobleme."
    es: "Medicina que restaura todos los PS y cura todos\nlos problemas de estado de un Pokémon."
    ko: "포켓몬 1마리의 HP와\n상태 이상을 모두\n회복한다."
galactic_key:
  names:
    jp_kana: ギンガだんのカギ
    jp_kanji: ギンガだんのカギ
    en: Galactic Key
    fr: Clé Galaxie
    it: Galachiave
    de: G-Schlüssel
    es: Llave Galaxia
    ko: 갤럭시단의열쇠
  descriptions:
    jp_kana: "ギンガだんアジトの　セキュリティを\nかいじょ　するための　カードキー。\nなくすと　おしおき　されるらしい。"
    jp_kanji: "ギンガ団アジトの　セキュリティを\n解除するための　カードキー。\nなくすと　おしおき　されるらしい。"
    en: "A card key for disengaging the security\nsystems in the Galactic HQ. Losing it\ncan result in punishment, apparently."
    fr: "Une clé magnétique servant à désactiver\nles systèmes de sécurité du QG Galaxie.\nLa perdre entraîne une punition."
    it: "Chiave a scheda per disattivare i sistemi\ndi sicurezza nella Sede Galassia. Se la si perde,\nsi viene puniti."
    de: "Dieser Türöffner deaktiviert die Sicherheits-\nsysteme im Hauptquartier von Team Galaktik."
    es: "Desactiva los sistemas de seguridad de la Base\nGalaxia. Por lo visto, perder esta tarjeta se\ncastiga severamente."
    ko: "갤럭시단아지트의 보안을\n해제하기 위한 카드키다.\n잃어버리면 벌을 받는 듯하다."
galladite:
  names:
    jp_kana: エルレイドナイト
    jp_kanji: エルレイドナイト
    en: Galladite
    fr: Gallamite
    it: Galladite
    de: Galagladinit
    es: Galladita
    ko: 엘레이드나이트
  descriptions:
    jp_kana: "エルレイドに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "エルレイドに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gallade hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Gallame, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Gallade, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Galagladi getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gallade en combate."
    ko: "엘레이드에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
ganlon_berry:
  names:
    jp_kana: リュガのみ
    jp_kanji: リュガのみ
    en: Ganlon Berry
    fr: Baie Lingan
    it: Baccalongan
    de: Linganbeere
    es: Baya Gonlan
    ko: 용아열매
  descriptions:
    jp_kana: "ポケモンに　もたせると\nピンチのとき　じぶんの\nぼうぎょが　あがる。"
    jp_kanji: "ポケモンに　持たせると\nピンチのとき　自分の\n防御が　あがる。"
    en: "A Berry to be consumed by Pokémon.\nIf a Pokémon holds one, its Defense\nstat will increase when it’s in a pinch."
    fr: "Tenue, cette Baie augmente la Défense en cas\nde besoin."
    it: "Se il Pokémon che ha questa bacca si trova\nin difficoltà, la sua Difesa aumenta."
    de: "Als getragenes Item erhöht diese Beere den\nVerteidigungs-Wert eines Pokémon, sobald es in\neiner Notlage steckt."
    es: "Si la lleva un Pokémon, le sube la Defensa en un\nmomento de apuro."
    ko: "포켓몬에게 지니게 하면\n위급할 때 자신의\n방어가 올라간다."
garchompite:
  names:
    jp_kana: ガブリアスナイト
    jp_kanji: ガブリアスナイト
    en: Garchompite
    fr: Carchacrokite
    it: Garchompite
    de: Knakracknit
    es: Garchompita
    ko: 한카리아스나이트
  descriptions:
    jp_kana: "ガブリアスに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ガブリアスに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Garchomp hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Carchacrok, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Garchomp, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Knakrack getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Garchomp en combate."
    ko: "한카리아스에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
gardevoirite:
  names:
    jp_kana: サーナイトナイト
    jp_kanji: サーナイトナイト
    en: Gardevoirite
    fr: Gardevoirite
    it: Gardevoirite
    de: Guardevoirnit
    es: Gardevoirita
    ko: 가디안나이트
  descriptions:
    jp_kana: "サーナイトに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "サーナイトに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gardevoir hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Gardevoir, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Gardevoir, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Guardevoir getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gardevoir en combate."
    ko: "가디안에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
gb_sounds:
  names:
    jp_kana: ＧＢプレイヤー
    jp_kanji: ＧＢプレイヤー
    en: GB Sounds
    fr: Lecteur GB
    it: Lettore GB
    de: GB-Player
    es: Lector GB
    ko: GB플레이어
  descriptions:
    jp_kana: "なつかしい　きょくが　きける\nおんがく　プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    jp_kanji: "なつかしい　曲が　きける\n音楽プレイヤー。\nスイッチ　ひとつで　きりかえられる。"
    en: "A music player that allows you to listen\nto nostalgic songs. It’s operated with\nthe flip of a single switch."
    fr: "Un lecteur de musique qui permet de se plonger\ndans une atmosphère rétro. Une pression suffit\npour changer de mode."
    it: "Lettore di musica che permette di immergersi\nin atmosfere rétro.\nHa un solo pulsante per cambiare canzone."
    de: "Ein Abspielgerät, das Musik aus einer längst\nvergangenen Zeit spielt. Lässt sich durch\nsimplen Knopfdruck bedienen."
    es: "Lector con el que se pueden escuchar aquellas\ncanciones tan nostálgicas. Se cambia con un solo\ninterruptor."
    ko: "그리운 곡을 들을 수 있는\n음악 플레이어.\n스위치 하나로 전환할 수 있다."
gengarite:
  names:
    jp_kana: ゲンガナイト
    jp_kanji: ゲンガナイト
    en: Gengarite
    fr: Ectoplasmite
    it: Gengarite
    de: Gengarnit
    es: Gengarita
    ko: 팬텀나이트
  descriptions:
    jp_kana: "ゲンガーに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "ゲンガーに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Gengar hold it, and this stone will\nenable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Ectoplasma, elle lui permet de\nméga-évoluer durant un combat."
    it: "Un esemplare delle misteriose Megapietre.\nData a Gengar, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Gengar getragen, kann es im Kampf eine\nMega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Gengar en combate."
    ko: "팬텀에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
genius_feather:
  names:
    jp_kana: ちりょくのハネ
    jp_kanji: ちりょくのハネ
    en: Genius Wing
    fr: Aile Esprit
    it: Piumingegno
    de: Geniefeder
    es: Pluma Intelecto
    ko: 지력날개
  descriptions:
    jp_kana: "ポケモンに　つかう　どうぐ。\nポケモン　１ひきの　とくこうの\nきそポイントを　ちょっと　あげる。"
    jp_kanji: "ポケモンに　使う　道具。\nポケモン　１匹の　特攻の\n基礎ポイントを　ちょっと　あげる。"
    en: "An item for use on a Pokémon.\nIt slightly increases the base Sp. Atk\nstat of a single Pokémon."
    fr: "Objet à utiliser sur un Pokémon.\nIl augmente un peu son Attaque Spéciale\nde base."
    it: "Strumento da usare su un Pokémon.\nNe aumenta di poco i punti base dell’Attacco\nSpeciale."
    de: "Schenkt man einem Pokémon dieses Item, wird\ndessen Spezial-Angriffs-Basiswert dauerhaft\nerhöht."
    es: "Pluma que aumenta un poco el Ataque Especial\nde base de un Pokémon."
    ko: "포켓몬에게 사용하는 도구.\n포켓몬 1마리의 특수공격\n기초 포인트를 조금 올린다."
ghost_gem:
  names:
    jp_kana: ゴーストジュエル
    jp_kanji: ゴーストジュエル
    en: Ghost Gem
    fr: Joyau Spectre
    it: Bijouspettro
    de: Geistjuwel
    es: Gema Fantasma
    ko: 고스트주얼
  descriptions:
    jp_kana: "ゴーストの　タイプの　ジュエル。\nもたせると　いちどだけ　ゴーストの\nわざの　いりょくが　つよまる。"
    jp_kanji: "ゴーストの　タイプの　ジュエル。\n持たせると　１度だけ　ゴーストの\n技の　威力が　強まる。"
    en: "A gem with a spectral essence.\nWhen held, it strengthens the power\nof a Ghost-type move one time."
    fr: "Objet à tenir. Un joyau augmentant une fois\nla puissance des capacités de type Spectre."
    it: "Strumento da dare a un Pokémon.\nGioiello che potenzia una sola volta le mosse\ndi tipo Spettro."
    de: "Ein Juwel vom Typ Geist. Es erhöht einmalig\ndie Stärke einer Attacke vom Typ Geist."
    es: "Joya de un solo uso que potencia los\nmovimientos de tipo Fantasma. Debe llevarla\nun Pokémon."
    ko: "고스트타입의 주얼.\n지니게 하면 한 번만 고스트\n기술의 위력이 강해진다."
glalitite:
  names:
    jp_kana: オニゴーリナイト
    jp_kanji: オニゴーリナイト
    en: Glalitite
    fr: Oniglalite
    it: Glalite
    de: Firnontornit
    es: Glalita
    ko: 얼음귀신나이트
  descriptions:
    jp_kana: "オニゴーリに　もたせておくと\nたたかいのとき　メガシンカが　できる\nふしぎな　メガストーンの　いっしゅ。"
    jp_kanji: "オニゴーリに　持たせておくと\n戦いのとき　メガシンカが　できる\n不思議な　メガストーンの　一種。"
    en: "One of a variety of mysterious Mega Stones.\nHave Glalie hold it, and this stone\nwill enable it to Mega Evolve during battle."
    fr: "Une variété de Méga-Gemme.\nTenue par un Oniglali, elle lui permet de\nméga-évoluer durant un combat."
    it: "Una delle misteriose Megapietre.\nData a Glalie, gli permette di megaevolversi\ndurante la lotta."
    de: "Einer der mysteriösen Mega-Steine. Wird er von\neinem Firnontor getragen, kann es im Kampf\neine Mega-Entwicklung durchführen."
    es: "Una de las misteriosas Megapiedras. Permite\nmegaevolucionar a Glalie en combate."
    ko: "얼음귀신에게 지니게 하면\n배틀할 때 메가진화할 수 있는\n신비한 메가스톤의 일종."
go_goggles:
  names:
    jp_kana: ゴーゴーゴーグル
    jp_kanji: ゴーゴーゴーグル
    en: Go-Goggles
    fr: Lunettes Sable
    it: Occhialoni
    de: Wüstenglas
    es: Gafas Aislantes
    ko: 고고고글
  descriptions:
    jp_kana: "さばくの　すなあらしから\nめを　まもって　くれる\nすてきな　ゴーグル。"
    jp_kanji: "砂漠の　すなあらしから\n目を　守ってくれる\nすてきな　ゴーグル。"
    en: "Nifty goggles to protect eyes\nfrom desert sandstorms."
    fr: "Une paire de lunettes bien pratique qui\nprotège les yeux en cas de tempête\nde sable dans le désert."
    it: "Occhiali indispensabili per proteggersi dalle\ntempeste di sabbia."
    de: "Eine schicke Brille, die deine Augen\nvor Sandstürmen schützt."
    es: "Gafas idóneas para protegerte los ojos de las\ntormentas de arena del desierto."
    ko: "사막의 모래바람으로부터\n눈을 보호해주는\n근사한 고글."
good_rod:
  names:
    jp_kana: いいつりざお
    jp_kanji: いいつりざお
    en: Good Rod
    fr: Super Canne
    it: Amo Buono
    de: Profiangel
    es: Caña Buena
    ko: 좋은낚싯대
  descriptions:
    jp_kana: "あたらしくて　いい　つりざお。\nみずの　ある　ばしょで　つかうと\nポケモンが　つれる。"
    jp_kanji: "あたらしくて　いい　つりざお。\n水の　ある　場所で　使うと\nポケモンが　つれる。"
    en: "A new, good-quality fishing rod.\nUse it at any body of water to\nfish for wild aquatic Pokémon."
    fr: "Une canne neuve et de bonne qualité.\nUtilisez-la pour pêcher des Pokémon sauvages\ndans les points d’eau."
    it: "Amo nuovo e di qualità. Si usa per pescare\nPokémon selvatici in qualsiasi specchio d’acqua."
    de: "Eine recht gute Angel. Damit kannst du\nin jedem Gewässer nach Pokémon angeln."
    es: "Caña de pescar nuevecita y de gran calidad.\nPesca Pokémon salvajes en todo tipo de aguas."
    ko: "새로 나온 좋은 낚싯대.\n물이 있는 장소에서 사용하면\n포켓몬을 낚을 수 있다."
gooey_mulch:
  names:
    jp_kana: ねばねばこやし
    jp_kanji: ねばねばこやし
    en: Gooey Mulch
    fr: Fertiglu
    it: Fertilcolla
    de: Neumulch
    es: Abono Brote
    ko: 끈적끈적비료
  descriptions:
    jp_kana: "きのみを　そだてるときの　ひりょう。\nしかし　ホウエンちほうの　つちには\nまるで　なじまないので　こうかが　ない。"
    jp_kanji: "きのみを　育てるときの　肥料。\nしかし　ホウエン地方の　土には\nまるで　なじまないので　効果が　ない。"
    en: "A fertilizer for growing Berries.\nHowever, it appears to be unsuitable for\nthe soil in the Hoenn region and has no effect."
    fr: "Un engrais à utiliser sur un sol meuble.\nIl n’est cependant pas adapté aux terres\nde Hoenn et n’y a aucun effet."
    it: "Fertilizzante usato per coltivare le bacche.\nTuttavia, non ha effetto a Hoenn, perché\nnon è adatto al terreno della regione."
    de: "Mulch zur Nutzung auf Beerenfeldern.\nDurch seine Unverträglichkeit mit den Böden\nin Hoenn bleibt sein Einsatz dort ohne Wirkung."
    es: "Un fertilizante usado para el cultivo de bayas.\nParece que no se asienta bien en el suelo de\nHoenn, por lo que no tiene efecto en esta región."
    ko: "나무열매를 키울 때 사용하는 비료.\n그러나 호연지방의 흙에는\n전혀 맞지 않기에 효과가 없다."
gracidea:
  names:
    jp_kana: グラシデアのはな
    jp_kanji: グラシデアのはな
    en: Gracidea
    fr: Gracidée
    it: Gracidea
    de: Gracidea
    es: Gracídea
    ko: 그라시데아꽃
  descriptions:
    jp_kana: "たんじょうびや　きねんび　などに\nかんしゃの　きもちを　つたえるため\nブーケにして　おくることが　ある。"
    jp_kanji: "誕生日や　記念日などに\n感謝の　気持ちを　伝えるため\nブーケにして　贈ることが　ある。"
    en: "A flower sometimes bundled in\nbouquets to convey gratitude on\nspecial occasions like birthdays."
    fr: "Une fleur que l’on offre en gage de\nreconnaissance, notamment à l’occasion\nd’un anniversaire."
    it: "Un fiore, a volte offerto in bouquet, che\nesprime gratitudine in occasioni particolari,\ncome i compleanni."
    de: "Mit dieser Blume, manchmal auch als Teil eines\nBouquets, kann man an speziellen Tagen seine\nDankbarkeit ausdrücken."
    es: "Una flor que se suele regalar en ramos para\nexpresar agradecimiento en ocasiones especiales,\ncomo cumpleaños."
    ko: "생일이나 기념일 등에\n감사의 마음을 전하기 위해\n부케로 만들어 보내는 일이 있다."
gram_1:
  names:
    jp_kana: はいたつぶつ１
    jp_kanji: はいたつぶつ１
    en: Gram 1
    fr: Courrier 1
    it: Missiva 1
    de: Briefpost 1
    es: Envío 1
    ko: 배달물1
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: "An important letter that\nWingull delivers."
    fr: Un courrier important transporté par un Goélise.
    it: "Un’importante lettera che Wingull deve\nconsegnare."
    de: Eine wichtige Briefpost, überbracht von Wingull.
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
gram_2:
  names:
    jp_kana: はいたつぶつ２
    jp_kanji: はいたつぶつ２
    en: Gram 2
    fr: Courrier 2
    it: Missiva 2
    de: Briefpost 2
    es: Envío 2
    ko: 배달물2
  descriptions:
    jp_kana: "キャモメが　はいたつ　している\nたいせつな　てがみ。"
    jp_kanji: "キャモメが　配達している\nたいせつな　手紙。"
    en: "An important letter that\nWingull delivers."
    fr: Un courrier important transporté par un Goélise.
    it: "Un’importante lettera che Wingull deve\nconsegnare."
    de: Eine wichtige Briefpost, überbracht von Wingull.
    es: Carta importante que entrega Wingull.
    ko: "갈모매가 배달하는\n소중한 편지."
