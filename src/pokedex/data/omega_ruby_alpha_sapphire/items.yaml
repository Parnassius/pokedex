    fr: "Contient vos données du Pokéathlon.\nSur cette carte est inscrit le nombre de victoires\nau Casse Roc."
    it: "Contiene i tuoi dati Pokéathlon.\nSu questa Scheda è registrato il numero di\nvittorie a Spaccalastra."
    de: "Speichert deine Pokéathlon-Rekorde. Die Karte\nzeigt, wie oft du beim Ziegelbrechen den 1. Platz\nbelegt hast."
    es: "Contiene los datos del Pokéathlon con el número\nde victorias en Rompelosas."
    ko: "포켓슬론의 기록이 들어 있다.\n브레이크블록 1위 횟수가\n기록된 카드."
data_card_09:
  names:
    jp_kana: データカード０９
    jp_kanji: データカード０９
    en: Data Card 09
    fr: Carte Mémo09
    it: Scheda Dati 09
    de: Datenkarte09
    es: Tarjeta Datos 09
    ko: 데이터카드09
  descriptions:
    jp_kana: "ポケスロンの　きろくが　はいっている。\nキャッチソーサー　１い　かいすうが\nきろくされた　カード。"
    jp_kanji: "ポケスロンの　記録が　はいっている。\nキャッチソーサー　１位　回数が\n記録された　カード。"
