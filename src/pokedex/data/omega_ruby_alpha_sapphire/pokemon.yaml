          omega_ruby: "戦いに　なると　体から　灼熱の\n炎を　噴き上げ　相手を　威嚇する。\nその　熱風で　周りの　草木も　燃やすぞ。"
          alpha_sapphire: "戦いに　なると　体から　灼熱の\n炎を　噴き上げ　相手を　威嚇する。\nその　熱風で　周りの　草木も　燃やすぞ。"
        en:
          omega_ruby: "In battle, Magmar blows out intensely hot flames from all\nover its body to intimidate its opponent. This Pokémon’s\nfiery bursts create heat waves that ignite grass and trees\nin its surroundings."
          alpha_sapphire: "In battle, Magmar blows out intensely hot flames from\nall over its body to intimidate its opponent. This Pokémon’s\nfiery bursts create heat waves that ignite grass and trees in\nits surroundings."
        fr:
          omega_ruby: "Lorsqu’il se bat, Magmar fait jaillir des flammes de son corps\npour intimider son adversaire. Les explosions enflammées de\nce Pokémon déclenchent des vagues de chaleur qui embrasent\nla végétation environnante."
          alpha_sapphire: "Lorsqu’il se bat, Magmar fait jaillir des flammes de son corps\npour intimider son adversaire. Les explosions enflammées de\nce Pokémon déclenchent des vagues de chaleur qui embrasent\nla végétation environnante."
        it:
          omega_ruby: "In lotta, Magmar sputa fiamme roventi da tutto il corpo per\nintimidire l’avversario. La sua furia irruente provoca ondate\ndi calore che bruciano tutta la vegetazione attorno a lui."
          alpha_sapphire: "In lotta, Magmar sputa fiamme roventi da tutto il corpo per\nintimidire l’avversario. La sua furia irruente provoca ondate\ndi calore che bruciano tutta la vegetazione attorno a lui."
        de:
          omega_ruby: "Im Kampf stößt Magmar glühend heiße Flammen aus,\num seinen Gegner einzuschüchtern. Diese Feuersalven\nerzeugen Hitzewellen, die das Gras und die Bäume der\nUmgebung in Brand setzen."
          alpha_sapphire: "Im Kampf stößt Magmar glühend heiße Flammen aus,\num seinen Gegner einzuschüchtern. Diese Feuersalven\nerzeugen Hitzewellen, die das Gras und die Bäume der\nUmgebung in Brand setzen."
        es:
          omega_ruby: "Al luchar, Magmar expulsa violentas llamas por todo el cuerpo\npara intimidar a su rival. Estos estallidos de fuego crean\nondas de calor que abrasan la hierba y los árboles que haya\nen las proximidades."
          alpha_sapphire: "Al luchar, Magmar expulsa violentas llamas por todo el cuerpo\npara intimidar a su rival. Estos estallidos de fuego crean\nondas de calor que abrasan la hierba y los árboles que haya\nen las proximidades."
        ko:
          omega_ruby: "싸우게 되면 몸에서 작열하는\n불꽃을 뿜어내 상대를 위협한다.\n그 열풍으로 주변의 초목도 불태운다."
          alpha_sapphire: "싸우게 되면 몸에서 작열하는\n불꽃을 뿜어내 상대를 위협한다.\n그 열풍으로 주변의 초목도 불태운다."
