        - swift_swim
        - rain_dish
      hidden_ability: own_tempo
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          omega_ruby: "ようきな　おんがくを　みみにすると　おどりだす。\nハイキングを　している　こどもの　がっしょうに\nさそわれて　すがたを　あらわすと　いわれている。"
          alpha_sapphire: "ようきな　リズムを　きくと　からだの　さいぼうが\nかっぱつに　かつどうを　はじめる　たいしつ。\nたたかいでも　すごい　パワーを　はっきするぞ。"
        jp_kanji:
          omega_ruby: "陽気な　音楽を　耳にすると　踊り出す。\nハイキングを　している　子どもの　合唱に\n誘われて　姿を　現すと　いわれている。"
          alpha_sapphire: "陽気な　リズムを　聞くと　体の　細胞が\n活発に　活動を　始める　体質。\n戦いでも　すごい　パワーを　発揮するぞ。"
        en:
          omega_ruby: "Ludicolo begins dancing as soon as it hears cheerful,\nfestive music. This Pokémon is said to appear when it\nhears the singing of children on hiking outings."
          alpha_sapphire: "Upon hearing an upbeat and cheerful rhythm, the cells in\nLudicolo’s body become very energetic and active. Even\nin battle, this Pokémon will exhibit an amazing amount\nof power."
        fr:
          omega_ruby: "Ludicolo ne peut pas s’empêcher de danser quand il entend\nune musique joyeuse et festive. On raconte que ce Pokémon\napparaît lorsqu’il entend les enfants chanter pendant leurs\nrandonnées."
          alpha_sapphire: "Lorsque Ludicolo entend un rythme entraînant et joyeux,\nles cellules de son corps s’activent énergiquement.\nMême pendant les combats, ce Pokémon montre énormément\nd’énergie."
        it:
          omega_ruby: "Ludicolo inizia a ballare appena sente una musica allegra\ne festosa. Pare che questo Pokémon appaia quando sente\nil canto gioioso dei bambini durante le escursioni."
          alpha_sapphire: "Quando sente un motivetto allegro e vivace, le cellule\ncorporee di Ludicolo diventano attive e piene di energia.\nAnche in lotta il Pokémon dimostra una potenza incredibile."
        de:
          omega_ruby: "Kappalores fängt sofort zu tanzen an, wenn es stimmungsvolle,\nfeierliche Musik vernimmt. Dieses Pokémon erscheint\nangeblich, wenn es Kinder auf Wanderausflügen singen hört."
          alpha_sapphire: "Wenn Kappalores einen fröhlichen Rhythmus hört, werden die\nZellen in seinem Körper aktiviert. Auch im Kampf zeigt dieses\nPokémon seine verblüffende Stärke."
        es:
          omega_ruby: "Ludicolo empieza a bailar en cuanto oye música alegre y de\nfiesta. Dicen que este Pokémon aparece cuando oye cantar a\nlos niños que van de excursión para hacer senderismo."
          alpha_sapphire: "Las células de Ludicolo se revolucionan y llenan de energía\ncuando oye sonidos rítmicos y alegres. En combate hace gala\ntambién de esta cantidad desmesurada de energía."
        ko:
          omega_ruby: "경쾌한 음악을 들으면 춤춘다.\n하이킹하는 아이들의 합창에\n이끌려 모습을 나타낸다고 전해진다."
          alpha_sapphire: "명랑한 리듬을 들으면 몸의 세포가\n활발하게 활동하기 시작하는 체질이다.\n싸움에서도 굉장한 파워를 발휘한다."
