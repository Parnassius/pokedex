        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - fighting
      egg_groups:
        - amorphous
      abilities:
        - steadfast
      hidden_ability: justified
      descriptions:
        jp_kana:
          omega_ruby: "あいての　かんがえを　びんかんに\nキャッチする　のうりょくを　もつため\nさきに　こうげきが　できるのだ。"
          alpha_sapphire: "のびちぢみする　ひじの　かたなで\nたたかう。いあいの　めいしゅ。\nれいぎ　ただしい　ポケモン。"
        jp_kanji:
          omega_ruby: "相手の　考えを　敏感に\nキャッチする　能力を　持つため\n先に　攻撃が　できるのだ。"
          alpha_sapphire: "伸び縮みする　ヒジの　刀で　戦う。\n居合の　名手。\n礼儀正しい　ポケモン。"
        en:
          omega_ruby: "Because it can sense what its foe is thinking,\nits attacks burst out first, fast, and fierce."
          alpha_sapphire: "A master of courtesy and swordsmanship, it fights\nusing extending swords on its elbows."
        fr:
          omega_ruby: "Comme il peut lire les pensées de ses adversaires, il frappe\ntoujours en premier."
          alpha_sapphire: "Il frappe avec les grandes lames à ses coudes. Son talent\nd’escrimeur n’a d’égal que sa courtoisie."
        it:
          omega_ruby: "Il suo intuito gli consente di capire cosa pensa il nemico:\npuò così attaccare per primo."
          alpha_sapphire: "Pokémon elegante e ottimo spadaccino, combatte allungando\nle lame che ha sui gomiti."
        de:
          omega_ruby: "Da es selbst die leisesten Gedanken seines Gegners lesen\nkann, kann es immer zuerst angreifen."
          alpha_sapphire: "Es kämpft, indem es die Schwerter an seinen Ellbogen\nverlängert. Es ist ein Meister des Kampfes."
        es:
          omega_ruby: "Puede presentir los movimientos de sus rivales y por eso\nataca siempre antes que ellos."
          alpha_sapphire: "Lucha con las espadas que salen de sus codos. Es un\nmaestro de la cortesía y la esgrima."
        ko:
          omega_ruby: "상대의 생각을 민감하게\n포착하는 능력을 가졌기 때문에\n먼저 공격할 수 있다."
          alpha_sapphire: "늘었다 줄었다 하는 팔꿈치의\n칼날로 싸운다. 칼 뽑기의 명수\n이며 예의가 바른 포켓몬이다."
