          alpha_sapphire: "おちばが　はっこうする　ねつで\nタマゴを　あたためる。クルミルに\nはっぱで　おくるみを　つくる。"
        jp_kanji:
          omega_ruby: "幼い　ポケモンを　みつけると\n口から　出す　粘着糸で\n葉っぱの　服を　縫ってあげる。"
          alpha_sapphire: "落ち葉が　発酵する　熱で\nタマゴを　温める。クルミルに\n葉っぱで　おくるみを　作る。"
        en:
          omega_ruby: "Upon finding a small Pokémon, it weaves clothing\nfor it from leaves by using the sticky silk secreted\nfrom its mouth."
          alpha_sapphire: "It keeps its eggs warm with heat from fermenting\nleaves. It also uses leaves to make warm wrappings\nfor Sewaddle."
        fr:
          omega_ruby: "Il fabrique des vêtements de feuilles pour les Pokémon\nencore jeunes grâce à son fil de soie adhésif."
          alpha_sapphire: "Il réchauffe les Œufs avec la chaleur de l’humus. Il fabrique\ndes langes pour les Larveyette avec des feuilles."
        it:
          omega_ruby: "Quando incontra un giovane Pokémon gli fa un vestito di foglie\nche cuce con il filo appiccicoso prodotto dalla bocca."
          alpha_sapphire: "Sfrutta il calore dell’humus per covare le sue uova e fabbrica\ncoperte di foglie per avvolgere Sewaddle."
        de:
          omega_ruby: "Begegnet es einem jungen Pokémon, näht es ihm mit den\nklebrigen Fäden aus seinem Mund ein Kleid aus Blättern."
          alpha_sapphire: "Nutzt die Hitze kompostierenden Laubes zum Ausbrüten\nvon Eiern. Es fertigt aus Blättern Kleidchen für Strawickl an."
        es:
          omega_ruby: "Si se encuentra con un Pokémon joven, segrega por la boca\nhilos pegadizos con los que le teje una prenda de ropa."
          alpha_sapphire: "Calienta sus huevos con el calor desprendido por el humus.\nHace mantillas con las hojas para Sewaddle."
        ko:
          omega_ruby: "어린 포켓몬을 보면\n입에서 내뿜는 점착실로\n잎사귀의 옷을 지어 준다."
          alpha_sapphire: "낙엽이 발효되는 열로\n알을 따뜻하게 한다. 잎사귀로\n두르보의 포대기를 만든다."
venipede:
  species_id: 543
  names:
    jp_kana: フシデ
    jp_kanji: フシデ
