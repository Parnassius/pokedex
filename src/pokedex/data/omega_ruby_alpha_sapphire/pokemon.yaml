          alpha_sapphire: "はばたくと　こまかい　こなが　まいあがる。\nすいこむと　プロレスラーも　ねこむ　もうどくだ。\nしょっかくの　レーダーで　エサを　さがす。"
        jp_kanji:
          omega_ruby: "灯りに　引き寄せられる　習性を　持つ。\n街灯りに　誘われた　ドクケイルの　群れが\n街路樹の　葉っぱを　食べ散らかしてしまう。"
          alpha_sapphire: "羽ばたくと　細かい　粉が　舞い上がる。\n吸いこむと　プロレスラーも　寝込む　猛毒だ。\n触角の　レーダーで　エサを　探す。"
        en:
          omega_ruby: "Dustox is instinctively drawn to light. Swarms of this Pokémon\nare attracted by the bright lights of cities, where they wreak\nhavoc by stripping the leaves off roadside trees for food."
          alpha_sapphire: "When Dustox flaps its wings, a fine dust is scattered all over.\nThis dust is actually a powerful poison that will even make a\npro wrestler sick. This Pokémon searches for food using its\nantennae like radar."
        fr:
          omega_ruby: "Papinox est instinctivement attiré par la lumière. Des nuées\nde ce Pokémon sont attirées par les réverbères des villes,\noù il sème la pagaille en grignotant les feuilles des arbres\nen bordure de route."
          alpha_sapphire: "Lorsque Papinox bat des ailes, une légère poussière\nse répand. Cette poussière est en fait un puissant poison\ncapable de mettre au tapis un boxeur professionnel.\nCe Pokémon cherche sa nourriture avec ses antennes,\ncomme un radar."
        it:
          omega_ruby: "Dustox è istintivamente attratto dalla luce. Nugoli di questi\nPokémon sono attirati dalla luce intensa delle città, dove\ncausano danni ingenti strappando le foglie delle piante\ndi cui si nutrono lungo le strade urbane."
          alpha_sapphire: "Quando agita le ali, Dustox sparge una polvere sottile\ntutt’intorno. In realtà si tratta di un potente veleno capace\ndi mettere al tappeto anche un campione di lotta libera.\nPer cercare il cibo usa le antenne come un radar."
        de:
          omega_ruby: "Pudox wird instinktiv vom Licht angezogen. In hell\nerleuchteten Städten kann man Scharen dieser Pokémon\ndabei beobachten, wie sie großen Schaden anrichten,\nindem sie die Blätter von Bäumen abfressen."
          alpha_sapphire: "Wenn Pudox mit den Flügeln schlägt, verteilt es einen\nfeinen Puder. Es handelt sich um ein starkes Gift,\ndas sogar einen Profiboxer umhauen würde. Bei der\nFuttersuche benutzt dieses Pokémon seine Antennen\nals Radar."
        es:
          omega_ruby: "Los Dustox se acercan a la luz de forma instintiva. De hecho,\nse agrupan en enjambres alrededor de las luces de las\nciudades y causan estragos en las hojas de los árboles que\nestán a pie de calle para alimentarse."
          alpha_sapphire: "Cuando Dustox bate las alas, libera un polvillo fino que en\nrealidad es un peligroso veneno que puede resultar dañino\nhasta al más fuerte de los fuertes. Las antenas le sirven de\nradar para buscar comida."
        ko:
          omega_ruby: "불빛에 이끌리는 습성을 지녔다.\n거리의 불빛에 유인된 독케일 무리가\n가로수의 잎을 어지르며 먹어버린다."
          alpha_sapphire: "날갯짓하면 미세한 가루가 날린다.\n들이마시면 프로레슬러도 잠드는 맹독이다.\n더듬이의 레이더로 먹이를 찾는다."
lotad:
  species_id: 270
  names:
    jp_kana: ハスボー
    jp_kanji: ハスボー
    en: Lotad
    fr: Nénupiot
    it: Lotad
    de: Loturzel
    es: Lotad
    ko: 연꽃몬
  forms:
    lotad:
      form_id: 0
      base_stats:
        hp: 40
        attack: 30
        defense: 30
        special_attack: 40
        special_defense: 50
