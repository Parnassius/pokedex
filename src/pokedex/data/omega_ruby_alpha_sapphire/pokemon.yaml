      descriptions:
        jp_kana:
          omega_ruby: "いつも　まるめている　みみを\nいきおいよく　のばすと　おおきな\nいわも　かんたんに　こわせる。"
          alpha_sapphire: "きけんを　かんじとると　りょうみみを\nたてて　けいかいする。さむい　よるは\nけがわに　かおを　うずめて　ねむる。"
        jp_kanji:
          omega_ruby: "いつも　まるめている　耳を\n勢いよく　伸ばすと　大きな\n岩も　簡単に　壊せる。"
          alpha_sapphire: "危険を　感じ取ると　両耳を　立てて\n警戒する。寒い　夜は\n毛皮に　顔を　埋めて　眠る。"
        en:
          omega_ruby: "Its ears are always rolled up. They can be forcefully\nextended to shatter even a large boulder."
          alpha_sapphire: "When it senses danger, it perks up its ears.\nOn cold nights, it sleeps with its head tucked into\nits fur."
        fr:
          omega_ruby: "Ses oreilles repliées se déroulent avec une force capable de\nbriser un gros rocher."
          alpha_sapphire: "Il dresse les oreilles quand il sent un danger. Il dort la tête\ndans sa fourrure pendant les nuits froides."
        it:
          omega_ruby: "Le sue orecchie sono sempre arrotolate. Può estenderle\ncon forza per distruggere qualsiasi cosa."
          alpha_sapphire: "Drizza le orecchie quando avverte un pericolo. Nelle notti\nfredde, dorme con la testa nella pelliccia."
        de:
          omega_ruby: "Seine Ohren sind immer aufgerollt. Mit ihnen kann es selbst\ngroße Felsbrocken zertrümmern."
          alpha_sapphire: "Nimmt es Gefahr wahr, richtet es seine Ohren auf.\nIn kalten Nächten vergräbt es den Kopf in seinem Fell."
        es:
          omega_ruby: "Lleva las orejas enrolladas. Cuando las extiende, golpea con\ntal fuerza que incluso puede romper rocas."
          alpha_sapphire: "Cuando siente peligro, levanta las orejas. En noches frías,\nduerme con la cabeza metida en el pelaje."
        ko:
          omega_ruby: "항상 말고 있는 귀를\n힘껏 늘리면 커다란\n바위도 간단히 부순다."
          alpha_sapphire: "위험을 느끼면 양쪽 귀를\n세워서 경계한다. 추운 밤에는\n털에 얼굴을 묻고 잠잔다."
