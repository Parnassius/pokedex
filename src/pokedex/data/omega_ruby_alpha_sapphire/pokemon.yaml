          alpha_sapphire: "늘었다 줄었다 하는 팔꿈치의\n칼날로 싸운다. 칼 뽑기의 명수\n이며 예의가 바른 포켓몬이다."
probopass:
  species_id: 476
  names:
    jp_kana: ダイノーズ
    jp_kanji: ダイノーズ
    en: Probopass
    fr: Tarinorme
    it: Probopass
    de: Voluminas
    es: Probopass
    ko: 대코파스
