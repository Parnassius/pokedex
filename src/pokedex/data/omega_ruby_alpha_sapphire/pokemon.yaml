          omega_ruby: "つまさきから　あぶらが　にじみでて　いるので\nみずの　うえを　すべる　ように　あるけるのだ。\nいけや　みずうみの　びせいぶつを　たべている。"
          alpha_sapphire: "きけんを　かんじると　あたまの　さきっぽから\nみずあめのような　あまい　えきたいを　だす。\nこれが　こうぶつの　ポケモンも　いるよ。"
        jp_kanji:
          omega_ruby: "つま先から　油が　にじみ出て　いるので\n水の　上を　滑る　ように　歩けるのだ。\n池や　湖の　微生物を　食べている。"
          alpha_sapphire: "危険を　感じると　頭の　先っぽから\n水あめのような　甘い　液体を　出す。\nこれが　好物の　ポケモンも　いるよ。"
        en:
          omega_ruby: "From the tips of its feet, Surskit secretes an oil that enables it\nto walk on water as if it were skating. This Pokémon feeds on\nmicroscopic organisms in ponds and lakes."
          alpha_sapphire: "If Surskit senses danger, it secretes a thick, sugary syrup from\nthe tip of its head. There are some Pokémon that love eating\nthis syrup."
        fr:
          omega_ruby: "Du bout de ses pattes, Arakdo sécrète une huile lui\npermettant de marcher sur l’eau, comme s’il glissait.\nCe Pokémon se nourrit des organismes microscopiques\nprésents dans les lacs et les étangs."
          alpha_sapphire: "Lorsque Arakdo se sent en danger, le haut de sa tête sécrète\nun sirop épais et sucré. Certains Pokémon adorent boire\nde ce sirop."
        it:
          omega_ruby: "Dalla punta delle zampe Surskit secerne un olio che gli\nconsente di camminare sul pelo dell’acqua come se\nstesse pattinando. Si ciba di organismi microscopici\nin stagni e laghi."
          alpha_sapphire: "In caso di pericolo Surskit secerne un fluido denso e\nzuccheroso dall’aculeo posto sulla sommità del capo.\nEsistono Pokémon che adorano cibarsi di questo fluido."
        de:
          omega_ruby: "Gehweiher scheidet aus seinen Zehen ein Öl aus, das es ihm\nermöglicht, über Wasser zu gleiten. Dieses Pokémon ernährt\nsich von Mikroorganismen aus Teichen und Seen."
          alpha_sapphire: "Wenn Gehweiher Gefahr wittert, scheidet es einen\ndickflüssigen Sirup aus seinem Kopf aus. Es gibt einige\nPokémon, die ganz wild auf diesen Sirup sind."
        es:
          omega_ruby: "Surskit segrega un aceite por la punta de las patas que le\npermite caminar sobre el agua como si fuera patinando. Este\nPokémon se alimenta de microorganismos en charcas y lagos."
          alpha_sapphire: "Cuando Surskit siente que hay peligro, segrega un néctar\nespeso y dulce por la cabeza. Hay Pokémon a los que les\nencanta bebérselo."
        ko:
          omega_ruby: "발끝에서 기름이 배어 나와\n물 위를 미끄러지듯 걸을 수 있다.\n연못이나 호수의 미생물을 먹고 있다."
          alpha_sapphire: "위험을 감지하면 머리끝에서\n물엿같이 달콤한 액체가 나온다.\n이것을 좋아하는 포켓몬도 있다."
