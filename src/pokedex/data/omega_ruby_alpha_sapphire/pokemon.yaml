          alpha_sapphire: "ヌメヌメの　ねんまくで　おおわれた\nからだは　てきの　パンチや　キックを\nヌルリと　すべらせてしまうのだ。"
        jp_kanji:
          omega_ruby: "一番　弱い　ドラゴンポケモン。\nヌメヌメの　体が　乾かないよう\nジメジメした　日陰で　暮らす。"
          alpha_sapphire: "ヌメヌメの　粘膜で　覆われた　体は\n敵の　パンチや　キックを\nヌルリと　滑らせてしまうのだ。"
        en:
          omega_ruby: "The weakest Dragon-type Pokémon,\nit lives in damp, shady places, so its\nbody doesn’t dry out."
          alpha_sapphire: "It’s covered in a slimy membrane that makes\nany punches or kicks slide off it harmlessly."
        fr:
          omega_ruby: "C’est le plus faible de tous les Pokémon Dragon. Pour éviter\nque son corps ne se dessèche, il recherche les lieux humides\net ombragés."
          alpha_sapphire: "Son corps est recouvert d’une membrane gluante,\naussi les coups des ennemis glissent sur lui sans\nlui faire le moindre mal."
        it:
          omega_ruby: "È il Pokémon Drago più debole di tutti. Vive in ambienti\numidi e in ombra per evitare che il suo corpo si secchi."
          alpha_sapphire: "Il suo corpo è coperto da una membrana viscida che fa\nscivolare e devia i colpi dei nemici."
        de:
          omega_ruby: "Dieses schwächste aller Drachen-Pokémon lebt an feuchten\nund schattigen Plätzen, um seinen glitschigen Körper vor dem\nAustrocknen zu bewahren."
          alpha_sapphire: "Sein Körper ist von einer schleimigen Schicht umhüllt, an der\ngegnerische Tritte und Schläge abgleiten, ohne Schaden\nanzurichten."
        es:
          omega_ruby: "Es el Pokémon de tipo Dragón más débil. Habita en zonas\noscuras y húmedas para evitar que su viscoso cuerpo se\nseque."
          alpha_sapphire: "La membrana mucosa que lo recubre hace resbalar tanto los\npuñetazos como las patadas de los enemigos que lo golpean,\ngracias a su viscosidad."
        ko:
          omega_ruby: "가장 약한 드래곤포켓몬이다.\n미끌미끌한 몸이 마르지 않도록\n축축한 그늘에서 산다."
          alpha_sapphire: "미끌미끌한 점막으로 덮여 있는\n몸은 적의 펀치나 킥을\n매끄럽게 미끄러뜨린다."
sliggoo:
