      descriptions:
        jp_kana:
          omega_ruby: "とても　きょうぼうな　ポケモン。\nめのまえで　うごくものは　すべて\nおそいかかり　かみくだこうとする。"
          alpha_sapphire: "であった　えものは　にがさない。\nじどうしゃの　ボディを　くいちぎる\nきょうりょくな　あごを　もつ。"
        jp_kanji:
          omega_ruby: "とても　凶暴な　ポケモン。\n目の前で　動くものは　すべて\n襲いかかり　かみくだこうとする。"
          alpha_sapphire: "出会った　獲物は　逃がさない。\n自動車の　ボディを　食いちぎる\n強力な　アゴを　持つ。"
        en:
          omega_ruby: "Very violent Pokémon, they try to clamp down on\nanything that moves in front of their eyes."
          alpha_sapphire: "They never allow prey to escape. Their jaws\nare so powerful, they can crush the body of\nan automobile."
        fr:
          omega_ruby: "Un Pokémon extrêmement violent qui broie tout ce qui\nlui passe sous les yeux avec ses mâchoires."
          alpha_sapphire: "Il ne laisse jamais échapper ses proies. Ses mâchoires\nsurpuissantes peuvent broyer une voiture."
        it:
          omega_ruby: "È un Pokémon molto feroce. Attacca tutto ciò che gli si para\ndavanti, prendendolo a morsi."
          alpha_sapphire: "Una volta che l’ha presa, non si lascia più sfuggire la preda.\nHa delle mandibole in grado di fare a pezzi un’automobile."
        de:
          omega_ruby: "Ein äußerst grausames Pokémon. Es greift jeden, der ihm\nunter die Augen kommt, mit seinen scharfen Reißzähnen an."
          alpha_sapphire: "Hat es seine Beute erblickt, gibt es kein Entrinnen mehr.\nSein mächtiger Kiefer knackt selbst Karosserien."
        es:
          omega_ruby: "Un Pokémon bastante violento. Ataca todo lo que se mueva\ndelante de él con sus mortíferas mandíbulas."
          alpha_sapphire: "Jamás deja escapar a su presa. Sus mandíbulas son capaces\nde destrozar la carrocería de un coche."
        ko:
          omega_ruby: "아주 난폭한 포켓몬.\n눈앞에서 움직이는 것은 모두\n덮쳐서 깨물어 부수려고 한다."
          alpha_sapphire: "마주친 먹이는 놓치지 않는다.\n자동차 몸체를 물어뜯을 만큼\n강력한 턱을 가지고 있다."
darumaka:
  species_id: 554
  names:
    jp_kana: ダルマッカ
    jp_kanji: ダルマッカ
    en: Darumaka
    fr: Darumarond
    it: Darumaka
    de: Flampion
    es: Darumaka
    ko: 달막화
