          alpha_sapphire: "てあしにも　のうが　あり　かってに\nうごけるが　ふだんは　あたまの\nガメノデスの　めいれいに　したがう。"
        jp_kanji:
          omega_ruby: "進化のとき　２匹の　カメテテが\n７匹に　分裂した　ポケモン。\n７匹分の　パワーで　戦う。"
          alpha_sapphire: "手足にも　脳が　あり\n勝手に　動けるが　普段は\n頭の　ガメノデスの　命令に　従う。"
        en:
          omega_ruby: "When they evolve, two Binacle multiply into seven.\nThey fight with the power of seven Binacle."
          alpha_sapphire: "Barbaracle’s legs and hands have minds\nof their own, and they will move independently.\nBut they usually follow the head’s orders."
        fr:
          omega_ruby: "Après évolution, les deux Opermine laissent place à sept\ncréatures qui ont la puissance cumulée de sept Opermine."
          alpha_sapphire: "Ses jambes et ses bras sont dotés d’une volonté propre.\nCependant, ils suivent généralement les ordres donnés."
        it:
          omega_ruby: "Con l’evoluzione, i due Binacle si moltiplicano e il Pokémon\nlotta con la forza di sette Binacle."
          alpha_sapphire: "I Binacle delle gambe e delle braccia hanno cervelli\nindipendenti, ma generalmente seguono le direttive\ndi quello della testa."
        de:
          omega_ruby: "Es entsteht bei der entwicklungsbedingten Aufspaltung der\nbeiden Bithora in sieben Vertreter ihrer Art. Gemeinsam\nverfügen sie über die siebenfache Stärke."
          alpha_sapphire: "Arme und Beine verfügen über eigene Gehirne, was ihnen\nrelative Bewegungsfreiheit gewährt. Sie ordnen sich jedoch\nzumeist den Befehlen des Kopfes unter."
        es:
          omega_ruby: "Al evolucionar, los dos Binacle se dividen y dan lugar a siete\ncriaturas que se aglomeran formando un Barbaracle y suman\nsu poder al combatir."
          alpha_sapphire: "Si bien todas las extremidades de Barbaracle tienen cerebro\npropio y se mueven a su antojo, suelen seguir las órdenes\nque imparte la cabeza."
        ko:
          omega_ruby: "진화할 때 2마리의 거북손손이\n7마리로 분열된 포켓몬이다.\n7마리분의 파워로 싸운다."
          alpha_sapphire: "손과 발에도 뇌가 있어 멋대로\n움직일 수 있지만 보통은 머리인\n거북손데스의 명령에 따른다."
skrelp:
  species_id: 690
