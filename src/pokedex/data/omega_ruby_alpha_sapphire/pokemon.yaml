      abilities:
        - swift_swim
        - rain_dish
      hidden_ability: own_tempo
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          omega_ruby: "ゆうぐれになると　かつどうする　やこうせい。\nつりびとを　みかけると　すいちゅうから　いとを\nひっぱり　ジャマをしては　よろこんでいる。"
          alpha_sapphire: "からだじゅう　ヌルヌルした　ねんえきで　おおわれ\nその　てで　さわられると　とても　きもちわるい。\nにんげんの　こどもと　よく　まちがえられる。"
        jp_kanji:
          omega_ruby: "夕暮れになると　活動する　夜行性。\n釣り人を　見かけると　水中から　糸を\n引っ張り　ジャマをしては　喜んでいる。"
          alpha_sapphire: "体中　ヌルヌルした　粘液で　覆われ\nその　手で　触られると　とても　気持ち悪い。\n人間の　子どもと　よく　間違えられる。"
        en:
          omega_ruby: "Lombre is nocturnal—it will get active after dusk.\nIt is also a mischief maker. When this Pokémon\nspots anglers, it tugs on their fishing lines from\nbeneath the surface and enjoys their consternation."
          alpha_sapphire: "Lombre’s entire body is covered by a slippery, slimy film.\nIt feels horribly unpleasant to be touched by this Pokémon’s\nhands. Lombre is often mistaken for a human child."
        fr:
          omega_ruby: "Lombre est nocturne, il commence ses activités malicieuses\net sournoises au crépuscule. Lorsque ce Pokémon repère\ndes pêcheurs, il s’approche de leur ligne, tire dessus\net se moque de leur regard perplexe."
          alpha_sapphire: "Le corps de Lombre tout entier est recouvert d’un voile\nvisqueux et glissant. Toucher ce Pokémon est extrêmement\ndéplaisant. On croit souvent à tort que Lombre est un enfant."
        it:
          omega_ruby: "Lombre è un Pokémon notturno, che si sveglia dopo\nil crepuscolo. È anche molto dispettoso: quando scopre\nun pescatore, inizia a tirare l’amo sott’acqua e si diverte\na spiare la costernazione del malcapitato."
          alpha_sapphire: "L’intero corpo di Lombre è ricoperto di una pellicola viscida\ne scivolosa. Il contatto con le sue zampe dà una sensazione\norribile. Spesso Lombre è confuso con un bambino piccolo."
        de:
          omega_ruby: "Lombrero liebt die Nacht und wird bei Einbruch der Dunkelheit\naktiv. Es spielt auch gerne Streiche. Wenn es Angler sieht,\nzieht es unter Wasser an ihren Angelschnüren und erfreut sich\nan ihrer Entrüstung."
          alpha_sapphire: "Lombreros Körper ist mit einem glitschigen Film bedeckt.\nEs fühlt sich widerlich an, wenn einen dieses Pokémon mit\nseinen Händen berührt. Lombrero wird häufig für ein Kind\ngehalten."
        es:
          omega_ruby: "Lombre es, además de travieso, nocturno; entra en acción de\nnoche. Cuando ve a gente pescando, se pone a tirar del sedal\npor debajo del agua y se divierte viendo la cara de enfado que\nse les queda."
          alpha_sapphire: "Lombre está completamente recubierto por una película\nviscosa y resbaladiza. La sensación que produce cuando\nroza a alguien con las manos es muy desagradable. A veces\nse confunde a este Pokémon con un niño pequeño."
        ko:
          omega_ruby: "해 질 무렵이 되면 활동하는 야행성이다.\n낚시꾼을 발견하면 물속에서 줄을\n당겨 방해하고선 기뻐한다."
          alpha_sapphire: "몸 전체가 미끈미끈한 점액으로 덮여 있어서\n그 손에 닿으면 매우 기분 나쁘다.\n곧잘 인간의 아이로 오인된다."
