          alpha_sapphire: "がんじょうな　ずがいこつが　じまん。\nいきなり　ずつきを　かましてくるが\nおもさで　じぶんも　フラフラしてる。"
        jp_kanji:
          omega_ruby: "皮を　首まで　引き上げて\n防御の　姿勢。ゴムのような　弾力で\nダメージを　減らす。"
          alpha_sapphire: "頑丈な　頭蓋骨が　自慢。\nいきなり　頭突きを　かましてくるが\n重さで　自分も　フラフラしてる。"
        en:
          omega_ruby: "Its skin has a rubbery elasticity, so it can reduce\ndamage by defensively pulling its skin up to\nits neck."
          alpha_sapphire: "Proud of its sturdy skull, it suddenly headbutts\neverything, but its weight makes it unstable, too."
        fr:
          omega_ruby: "Il remonte sa peau jusqu’à son cou pour se protéger.\nElle a une constitution élastique qui absorbe les coups."
          alpha_sapphire: "Ses coups de tête sont sa fierté. Seul problème : sa tête est\nun peu trop lourde, et il perd souvent l’équilibre."
        it:
          omega_ruby: "Assumono la posizione difensiva tirando su fino al collo\nla pelle, che è elastica come la gomma e previene i danni."
          alpha_sapphire: "Va fiero del suo robustissimo cranio. Tira senza preavviso\ntestate così forti da farlo barcollare."
        de:
          omega_ruby: "Es zieht seine gummiartige Haut bis zum Hals hinauf und nimmt\neine Abwehrhaltung ein, um sich vor Schaden zu schützen."
          alpha_sapphire: "Verteilt gerne unvermittelt Kopfnüsse, deren Wucht auch seine\nSinne vernebelt. Es ist stolz auf seinen robusten Schädel."
        es:
          omega_ruby: "Se sube la piel hasta el cuello para defenderse. Su\nelasticidad, similar a la de una goma, reduce el daño\nrecibido."
          alpha_sapphire: "Está orgulloso de su sólido cráneo. Reparte cabezazos a\ndiestro y siniestro con tal vehemencia que él mismo se\nmarea."
        ko:
          omega_ruby: "가죽을 목까지 늘려서\n방어 자세를 취한다. 고무 같은\n탄력을 이용해 데미지를 줄인다."
          alpha_sapphire: "튼튼한 두개골이 자랑이다.\n느닷없이 박치기를 하려고 하지만\n무게로 자신도 휘청거린다."
scrafty:
  species_id: 560
  names:
    jp_kana: ズルズキン
    jp_kanji: ズルズキン
