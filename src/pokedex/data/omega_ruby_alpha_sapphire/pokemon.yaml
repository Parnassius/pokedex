      descriptions:
        jp_kana:
          omega_ruby: "さいきょうの　からてチョップを\nもとめて　やまおくに　こもって\nねむることなく　しゅぎょうする。"
          alpha_sapphire: "おびを　しめると　きあいが　はいり\nパンチの　はかいりょくが　ます。\nしゅぎょうを　ジャマすると　おこる。"
        jp_kanji:
          omega_ruby: "最強の　からてチョップを\n求めて　山奥に　こもって\n眠ることなく　修行する。"
          alpha_sapphire: "帯を　締めると　気合いが　入り\nパンチの　破壊力が　増す。\n修行を　ジャマすると　怒る。"
        en:
          omega_ruby: "Desiring the strongest karate chop, they seclude\nthemselves in mountains and train without sleeping."
          alpha_sapphire: "Tying their belts gets them pumped and makes their\npunches more destructive. Disturbing their training\nangers them."
        fr:
          omega_ruby: "Pour accéder à la maîtrise ultime du karaté, il se retire\ndans les montagnes et s’entraîne nuit et jour."
          alpha_sapphire: "Quand il noue sa ceinture, il est plus concentré et ses coups\nfont plus mal. Il s’énerve si on gêne son entraînement."
        it:
          omega_ruby: "Si allena senza posa, giorno e notte, sui monti per potenziare\nal massimo i suoi colpi di karate."
          alpha_sapphire: "La cintura da karate gli dà la carica e aumenta la forza\ndistruttiva dei pugni. Quando si allena, meglio non disturbarlo."
        de:
          omega_ruby: "Es lebt zurückgezogen in den Bergen und trainiert Tag\nund Nacht, um seinen Karateschlag zu perfektionieren."
          alpha_sapphire: "Zieht es den Gürtel fest, werden seine Hiebe stärker. Kann es\ngar nicht leiden, wenn man es beim Training stört."
        es:
          omega_ruby: "Para lograr dominar las técnicas de kárate más letales, se\nretiran a las montañas y entrenan día y noche."
          alpha_sapphire: "La potencia de sus puñetazos aumenta si se aprieta el\ncinturón. Si le molestan cuando se entrena, se enfada."
        ko:
          omega_ruby: "최강의 태권당수를\n목표로 산속에 틀어박혀\n잠도 없이 수행한다."
          alpha_sapphire: "끈을 매면 기합이 들어가\n펀치의 파괴력이 강해진다.\n수련을 방해하면 화를 낸다."
sewaddle:
  species_id: 540
  names:
    jp_kana: クルミル
    jp_kanji: クルミル
    en: Sewaddle
    fr: Larveyette
    it: Sewaddle
    de: Strawickl
    es: Sewaddle
    ko: 두르보
