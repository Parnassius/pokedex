        fr:
          omega_ruby: "Otaria chasse ses proies dans l’eau gelée, sous la couche de\nglace. Lorsqu’il cherche à respirer, il perce un trou en frappant\nla glace avec la partie saillante de sa tête."
          alpha_sapphire: "Otaria chasse ses proies dans l’eau gelée, sous la couche de\nglace. Lorsqu’il cherche à respirer, il perce un trou en frappant\nla glace avec la partie saillante de sa tête."
        it:
          omega_ruby: "Seel caccia le prede nel mare gelido sotto le lastre\ndi ghiaccio. Per respirare apre un foro nel ghiaccio\nusando la protuberanza appuntita sulla sommità del capo."
          alpha_sapphire: "Seel caccia le prede nel mare gelido sotto le lastre\ndi ghiaccio. Per respirare apre un foro nel ghiaccio\nusando la protuberanza appuntita sulla sommità del capo."
        de:
          omega_ruby: "Jurob jagt unter der eisigen Oberfläche des Eismeeres nach\nBeute. Zum Luftholen schlägt es mit dem vorstehenden Teil\nseines Kopfes ein Loch ins Eis."
          alpha_sapphire: "Jurob jagt unter der frostigen Oberfläche des Eismeeres\nnach Beute. Zum Luftholen schlägt es mit dem vorstehenden\nTeil seines Kopfes ein Loch ins Eis."
        es:
          omega_ruby: "Seel busca a sus presas en aguas heladas, bajo las capas de\nhielo. Cuando necesita respirar, abre un agujerito en el hielo\ncon la afilada protuberancia que tiene encima de la cabeza."
          alpha_sapphire: "Seel busca a sus presas en aguas heladas, bajo las capas de\nhielo. Cuando necesita respirar, abre un agujerito en el hielo\ncon la afilada protuberancia que tiene encima de la cabeza."
        ko:
          omega_ruby: "얼음으로 뒤덮인 바다에서 먹이를 잡는다.\n숨을 쉴 때는 머리의 돌출된 부분으로\n얼음을 깨고 바다 밖으로 얼굴을 내민다."
          alpha_sapphire: "얼음으로 뒤덮인 바다에서 먹이를 잡는다.\n숨을 쉴 때는 머리의 돌출된 부분으로\n얼음을 깨고 바다 밖으로 얼굴을 내민다."
