        fr:
          omega_ruby: "Les lianes de Saquedeneu se brisent facilement lorsqu’on\nles attrape. Cela ne lui fait pas mal et lui permet simplement\nde s’échapper rapidement. Les lianes cassées repoussent\nle lendemain."
          alpha_sapphire: "Les lianes de Saquedeneu se brisent facilement lorsqu’on\nles attrape. Cela ne lui fait pas mal et lui permet simplement\nde s’échapper rapidement. Les lianes cassées repoussent\nle lendemain."
        it:
          omega_ruby: "Se afferrate, le liane di Tangela si staccano con facilità,\nma in modo indolore, consentendo così una pratica\nscappatoia. Le liane cadute vengono sostituite da quelle\nnuove il giorno dopo."
          alpha_sapphire: "Se afferrate, le liane di Tangela si staccano con facilità,\nma in modo indolore, consentendo così una pratica\nscappatoia. Le liane cadute vengono sostituite da quelle\nnuove il giorno dopo."
        de:
          omega_ruby: "Wenn man Tangelas Ranken berührt, fallen diese sofort ab.\nDas tut ihm aber nicht weh und es kann sich schnell in\nSicherheit bringen. Verliert es Ranken, werden diese am\nnächsten Tag durch neue ersetzt."
          alpha_sapphire: "Wenn man Tangelas Ranken berührt, fallen diese oft ab.\nDabei empfindet es keine Schmerzen und es kann sich schnell\nin Sicherheit bringen. Verliert es Ranken, werden diese am\nnächsten Tag durch neue ersetzt."
        es:
          omega_ruby: "A Tangela se le desprenden los tentáculos con facilidad en\ncuanto se los agarras. Y no solo no le duele, sino que le\nresulta muy útil para escapar rápido. Además, al día siguiente\nle crecen otros."
          alpha_sapphire: "A Tangela se le desprenden los tentáculos con facilidad en\ncuanto se los agarras. Y no solo no le duele, sino que le\nresulta muy útil para escapar rápido. Además, al día siguiente\nle crecen otros."
        ko:
          omega_ruby: "적에게 붙잡히면 덩굴이 뚝 하고 끊긴다.\n전혀 아프지 않기 때문에 그 틈에 도망간다.\n다음 날에는 새로운 덩굴이 자란다."
          alpha_sapphire: "적에게 붙잡히면 덩굴이 뚝 하고 끊긴다.\n전혀 아프지 않기 때문에 그 틈에 도망간다.\n다음 날에는 새로운 덩굴이 자란다."
