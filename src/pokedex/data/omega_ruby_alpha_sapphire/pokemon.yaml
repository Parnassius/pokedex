        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - undiscovered
      abilities:
        - aura_break
      descriptions:
        jp_kana:
          omega_ruby: "カロスちほうの　せいたいけいが\nくずれると　すがたを　あらわして\nひめた　ちからを　はっきするらしい。"
          alpha_sapphire: "どうくつの　おくふかくで　くらし\nせいたいけいを　はかいする　ものを\nかんししていると　いわれている。"
        jp_kanji:
          omega_ruby: "カロス地方の　生態系が　崩れると\n姿を　現して\n秘めた　力を　発揮するらしい。"
          alpha_sapphire: "洞窟の　奥深くで　暮らし\n生態系を　破壊する者を\n監視していると　言われている。"
        en:
          omega_ruby: "When the Kalos region’s ecosystem falls into\ndisarray, it appears and reveals its secret power."
          alpha_sapphire: "It’s hypothesized that it’s monitoring\nthose who destroy the ecosystem\nfrom deep in the cave where it lives."
        fr:
          omega_ruby: "Lorsque l’écosystème de Kalos est menacé, ce Pokémon\napparaît et utilise son mystérieux pouvoir."
          alpha_sapphire: "Il paraît qu’il vit au fond d’une grotte, d’où il surveillerait\nles personnes qui détruisent l’écosystème."
        it:
          omega_ruby: "Secondo le leggende, quando l’equilibrio dell’ecosistema\ndella regione di Kalos è in pericolo, appare e libera il suo\npotere misterioso."
          alpha_sapphire: "Si dice che viva nelle profondità di una caverna e protegga\nl’equilibrio dell’ecosistema da qualsiasi minaccia."
        de:
          omega_ruby: "Wenn das Ökosystem der Kalos-Region kippt, erscheint dieses\nPokémon und offenbart seine geheimen Kräfte."
          alpha_sapphire: "Es wird gemutmaßt, dass es von seiner Höhle aus all jene\nbeobachtet, die dem Ökosystem Schaden zufügen."
        es:
          omega_ruby: "Cuando el ecosistema de Kalos se encuentra en peligro,\naparece y revela su poder secreto."
          alpha_sapphire: "Vive en las profundidades de las cavernas, desde donde vigila\na todos aquellos que se dediquen a destruir el ecosistema."
        ko:
          omega_ruby: "칼로스지방의 생태계가\n무너지면 모습을 나타내어\n숨겨진 힘을 발휘한다고 한다."
          alpha_sapphire: "동굴 깊은 곳에서 지내면서\n생태계를 파괴하는 자를\n감시하고 있다고 전해진다."
