        special_defense: 0
        speed: 0
      types:
        - dragon
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - air_lock
      descriptions:
        jp_kana:
          omega_ruby: "なんおくねんも　いきつづけていると　いわれる。\nグラードンと　カイオーガの　あらそいを\nおさめたという　でんせつが　のこされている。"
          alpha_sapphire: "オゾンそうを　とびつづけ　エサとなる\nいんせきを　くらう。たいないに　たまった\nいんせきの　エネルギーで　メガシンカする。"
        jp_kanji:
          omega_ruby: "何億年も　生き続けていると　いわれる。\nグラードンと　カイオーガの　争いを\n治めたという　伝説が　残されている。"
          alpha_sapphire: "オゾン層を　飛び続け　エサとなる\n隕石を　くらう。体内に　たまった\n隕石の　エネルギーで　メガシンカする。"
        en:
          omega_ruby: "Rayquaza is said to have lived for hundreds of millions\nof years. Legends remain of how it put to rest\nthe clash between Kyogre and Groudon."
          alpha_sapphire: "It flies forever through the ozone layer, consuming\nmeteoroids for sustenance. The many meteoroids\nin its body provide the energy it needs to Mega Evolve."
        fr:
          omega_ruby: "On raconte qu’il aurait plus de 10 000 ans.\nSelon les légendes, c’est grâce à lui que Kyogre et Groudon\nont cessé de se battre."
          alpha_sapphire: "Un Pokémon qui vit dans la couche d’ozone et se nourrit\ndes météorites qu’il intercepte. Leur énergie s’accumule\ndans son corps, ce qui lui permet de méga-évoluer."
        it:
          omega_ruby: "Si dice che abbia centinaia di milioni di anni.\nSecondo la leggenda, mise fine alla lotta\ntra Groudon e Kyogre."
          alpha_sapphire: "Risiede nello strato di ozono, dove si nutre di meteoriti.\nGrazie alla loro energia che si accumula all’interno del\nsuo corpo, può megaevolversi."
        de:
          omega_ruby: "Es heißt, Rayquaza lebe bereits seit mehreren\nhundert Millionen Jahren. Legenden zufolge hat es den\neinstigen Konflikt zwischen Groudon und Kyogre beendet."
          alpha_sapphire: "Es fliegt durch die Ozonschicht und ernährt sich von Meteoren.\nMithilfe der Energie, die durch diese Meteore in seinen Körper\ngelangt, kann es eine Mega-Entwicklung durchführen."
        es:
          omega_ruby: "Dicen que Rayquaza ha vivido durante millones de años.\nLas leyendas cuentan que puso fin al continuo enfrentamiento\nentre Groudon y Kyogre."
          alpha_sapphire: "Rayquaza ha vivido en la capa de ozono durante millones de\naños, alimentándose de meteoritos. La energía de estos\nmeteoritos se acumula en su cuerpo y le permite\nmegaevolucionar."
        ko:
          omega_ruby: "몇억 년 동안 계속 살고 있다고 한다.\n그란돈과 가이오가의 사투를\n진정시켰다는 전설이 남아 있다."
          alpha_sapphire: "오존층을 날아다니며 먹이인\n운석을 먹는다. 체내에 모인\n운석의 에너지로 메가진화한다."
