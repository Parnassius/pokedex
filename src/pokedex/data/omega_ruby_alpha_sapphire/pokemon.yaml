torchic:
  species_id: 255
  names:
    jp_kana: アチャモ
    jp_kanji: アチャモ
    en: Torchic
    fr: Poussifeu
    it: Torchic
    de: Flemmli
    es: Torchic
    ko: 아차모
  forms:
    torchic:
      form_id: 0
      base_stats:
        hp: 45
        attack: 60
        defense: 40
        special_attack: 70
        special_defense: 50
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: speed_boost
      descriptions:
        jp_kana:
          omega_ruby: "トレーナーに　くっついて　ちょこちょこ　あるく。\nくちから　とばす　ほのおは　せっし　１０００ど。\nあいてを　くろコゲにする　しゃくねつの　たまだ。"
          alpha_sapphire: "たいないに　ほのおを　もやす　ばしょが　あるので\nだきしめると　ぽかぽか　とっても　あたたかい。\nぜんしん　ふかふかの　うもうに　おおわれている。"
        jp_kanji:
          omega_ruby: "トレーナーに　くっついて　ちょこちょこ　歩く。\n口から　飛ばす　炎は　摂氏　１０００度。\n相手を　黒コゲにする　灼熱の　玉だ。"
          alpha_sapphire: "体内に　炎を　燃やす　場所が　あるので\n抱きしめると　ぽかぽか　とっても　暖かい。\n全身　ふかふかの　羽毛に　覆われている。"
        en:
          omega_ruby: "Torchic sticks with its Trainer, following behind with\nunsteady steps. This Pokémon breathes fire of over\n1,800 degrees Fahrenheit, including fireballs that leave\nthe foe scorched black."
          alpha_sapphire: "Torchic has a place inside its body where it keeps its flame.\nGive it a hug—it will be glowing with warmth. This Pokémon is\ncovered all over by a fluffy coat of down."
        fr:
          omega_ruby: "Poussifeu ne lâche pas son Dresseur d’une semelle,\nmarchant maladroitement derrière lui. Ce Pokémon crache\ndes flammes pouvant atteindre 1 000 °C et des boules de feu\nqui carbonisent l’ennemi."
          alpha_sapphire: "Poussifeu dispose d’un endroit dans son corps pour stocker\nsa flamme. Si on lui fait un gros câlin, sa flamme s’illumine\nchaleureusement. Ce Pokémon est couvert d’un duvet\ntrès doux."
        it:
          omega_ruby: "Torchic segue il proprio Allenatore ovunque, saltellandogli\ndietro con passo incerto. Questo Pokémon sputa fiammate\nroventi a 1000 °C, con sfere infuocate capaci di carbonizzare\nil nemico."
          alpha_sapphire: "Nel corpo di Torchic è custodita la sua fiamma.\nAbbracciandolo si illumina emanando un incredibile calore.\nQuesto Pokémon è ricoperto da un piumaggio soffice e caldo."
        de:
          omega_ruby: "Flemmli hängt an seinem Trainer wie eine Klette. Es schlurft\nimmer hinter ihm her. Dieses Pokémon spuckt 1 000 °C\nheißes Feuer, das seinen Feinden ordentlich einheizt."
          alpha_sapphire: "In Flemmlis Körper brennt eine Flamme. Wenn man es\numarmt, beginnt es zu glühen. Dieses Pokémon trägt ein\nflauschiges Fell aus Daunen."
        es:
          omega_ruby: "Torchic no se separa de su Entrenador. Siempre va tras él con\nsus pasitos inseguros. Este Pokémon escupe bolas de fuego\nque pueden alcanzar los 1000 °C y carbonizar al enemigo."
          alpha_sapphire: "Torchic tiene un lugar en el interior de su organismo en el\nque guarda la llama que posee. Si le das un abrazo, arderá\nencantado. Este Pokémon está recubierto totalmente de\nsedoso plumón."
        ko:
          omega_ruby: "트레이너에게 바짝 붙어 아장아장 걷는다.\n입에서 날리는 불꽃은 섭씨 1000도다.\n상대를 새까맣게 태우는 작열하는 불덩이다."
          alpha_sapphire: "체내에 불꽃을 태우는 곳이 있어서\n껴안으면 따끈따끈 정말 따뜻하다.\n전신이 푹신푹신한 깃털로 덮여 있다."
combusken:
  species_id: 256
  names:
    jp_kana: ワカシャモ
    jp_kanji: ワカシャモ
    en: Combusken
    fr: Galifeu
    it: Combusken
    de: Jungglut
    es: Combusken
    ko: 영치코
  forms:
    combusken:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 60
        special_attack: 85
        special_defense: 60
        speed: 55
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fire
        - fighting
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: speed_boost
      descriptions:
        jp_kana:
          omega_ruby: "のやまを　はしりまわって　あしこしを　きたえる。\nスピードと　パワーを　かねそなえた　あしは\n１びょうかんに　１０ぱつの　キックを　くりだす。"
          alpha_sapphire: "クチバシから　はきだす　しゃくねつの　ほのおと\nはかいりょく　ばつぐんの　キックで　たたかう。\nなきごえが　おおきいので　とても　やかましい。"
        jp_kanji:
          omega_ruby: "野山を　走り回って　足腰を　鍛える。\nスピードと　パワーを　兼ね備えた　足は\n１秒間に　１０発の　キックを　繰り出す。"
          alpha_sapphire: "クチバシから　吐きだす　灼熱の　炎と\n破壊力　抜群の　キックで　戦う。\n鳴き声が　大きいので　とても　やかましい。"
        en:
          omega_ruby: "Combusken toughens up its legs and thighs by running\nthrough fields and mountains. This Pokémon’s legs possess\nboth speed and power, enabling it to dole out 10 kicks in\none second."
          alpha_sapphire: "Combusken battles with the intensely hot flames it spews from\nits beak and with outstandingly destructive kicks. This\nPokémon’s cry is very loud and distracting."
        fr:
          omega_ruby: "Galifeu muscle ses cuisses et ses mollets en courant dans les\nchamps ou dans les montagnes. Les jambes de ce Pokémon\nsont très puissantes et rapides, capables de donner 10 coups\nde pied en 1 seconde."
          alpha_sapphire: "Galifeu combat grâce aux flammes ardentes qu’il crache\nde son bec et à ses coups de pied destructeurs.\nLe cri de ce Pokémon est très puissant et très gênant\npour l’adversaire."
        it:
          omega_ruby: "Combusken si allena correndo in campagna e in montagna.\nLe zampe inferiori sono rapide e potenti e riescono a sferrare\ndieci calci al secondo."
          alpha_sapphire: "Combusken combatte sputando fiamme roventi dal becco\ne sferrando calci dall’enorme potenza distruttiva.\nIl verso di questo Pokémon è lacerante e distrae gli avversari."
        de:
          omega_ruby: "Jungglut trainiert seine Beine und Oberschenkel, indem es über\nFelder und Berge läuft. Die Beine dieses Pokémon sind sowohl\nschnell als auch kräftig, sodass es 10 Tritte pro Sekunde\nausführen kann."
          alpha_sapphire: "Jungglut stößt im Kampf glühend heiße Flammen aus seinem\nSchnabel aus und setzt extrem vernichtende Tritte ein.\nDas Geschrei dieses Pokémon ist sehr laut und verwirrend."
        es:
          omega_ruby: "Combusken fortalece las piernas corriendo por llanos y\nmontañas. Este Pokémon tiene en las extremidades inferiores\ntanto fuerza como velocidad. Puede dar hasta diez patadas\npor segundo."
          alpha_sapphire: "Combusken lucha haciendo uso de las abrasadoras llamas\nque expulsa por el pico y de unas patadas fulminantes.\nEste Pokémon emite un sonido muy fuerte y molesto."
        ko:
          omega_ruby: "산과 들을 뛰어다니며 하반신을 단련한다.\n스피드와 파워를 겸비한 다리는\n1초에 10번 킥을 날린다."
          alpha_sapphire: "부리에서 토해 내는 작열하는 불꽃과\n뛰어난 파괴력의 킥으로 싸운다.\n울음소리가 커서 무척 시끄럽다."
blaziken:
  species_id: 257
  names:
    jp_kana: バシャーモ
    jp_kanji: バシャーモ
    en: Blaziken
    fr: Braségali
    it: Blaziken
    de: Lohgock
    es: Blaziken
    ko: 번치코
  forms:
    blaziken:
      form_id: 0
      base_stats:
        hp: 80
        attack: 120
        defense: 70
        special_attack: 110
        special_defense: 70
        speed: 80
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - fighting
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: speed_boost
      descriptions:
        jp_kana:
          omega_ruby: "たたかいに　なると　てくびから　しゃくねつの\nほのおを　ふきあげ　ゆうかんに　いどみかかる。\nあいてが　てごわいほど　はげしく　もえあがる。"
          alpha_sapphire: "きょうじんな　あしこしを　もち　３０かい　だての\nビルも　らくらく　とびこす　ことが　できる。\nほのおの　パンチで　あいてを　くろこげに　する。"
        jp_kanji:
          omega_ruby: "戦いに　なると　手首から　灼熱の\n炎を　噴き上げ　勇敢に　挑みかかる、\n相手が　手強いほど　激しく　燃えあがる。"
          alpha_sapphire: "強靭な　足腰を　持ち　３０階　建ての\nビルも　楽々　飛び越す　ことが　できる。\n炎の　パンチで　相手を　黒焦げに　する。"
        en:
          omega_ruby: "In battle, Blaziken blows out intense flames from its wrists and\nattacks foes courageously. The stronger the foe, the more\nintensely this Pokémon’s wrists burn."
          alpha_sapphire: "Blaziken has incredibly strong legs—it can easily clear a\n30-story building in one leap. This Pokémon’s blazing punches\nleave its foes scorched and blackened."
        fr:
          omega_ruby: "Au combat, Braségali envoie des flammes ardentes de\nses poignets. Il fait preuve d’un courage exceptionnel.\nPlus l’ennemi est puissant, plus les poignets de ce Pokémon\nsont ardents."
          alpha_sapphire: "Braségali a des jambes incroyablement puissantes. Il peut\nsauter par-dessus un immeuble de trente étages. Les coups\nde poing enflammés de ce Pokémon peuvent carboniser\nses ennemis."
        it:
          omega_ruby: "In lotta Blaziken emette fiamme micidiali coi suoi pugni,\nattaccando coraggiosamente il nemico. Più forte è il nemico,\ntanto più intenso è il fuoco proveniente dai pugni."
          alpha_sapphire: "Blaziken è dotato di zampe molto potenti in grado di radere\nal suolo un edificio di 30 piani in un colpo solo. I suoi pugni\nfulminei lasciano il nemico ustionato e talvolta carbonizzato."
        de:
          omega_ruby: "Lohgock stößt heftige Flammen aus seinen Handgelenken\naus und greift seine Feinde mutig an. Je stärker ein Feind ist,\ndesto stärker lodern die Handgelenke dieses Pokémon."
          alpha_sapphire: "Lohgock besitzt unglaublich starke Beine, mit denen\nes ein 30 Stockwerke hohes Gebäude mit einem Sprung\nüberwinden kann. Die flammenden Schläge dieses\nPokémon lassen verkohlte Gegner zurück."
        es:
          omega_ruby: "En combate, Blaziken expulsa vivas llamas por las muñecas y\nataca al enemigo con fiereza. Cuanto más fuerte sea el\nenemigo, más intensas serán las llamas."
          alpha_sapphire: "Blaziken tiene unas piernas tan fuertes que puede saltar por\nencima de un edificio de 30 pisos con facilidad. Además, da\nunos puñetazos fulminantes que dejan al oponente\nchamuscado y lleno de tizne."
        ko:
          omega_ruby: "싸우게 되면 손목에서 작열하는\n불꽃을 뿜어 올려 용감히 덤벼든다.\n상대가 버거울수록 강렬히 불타오른다."
          alpha_sapphire: "강인한 하반신을 지녀 30층짜리\n빌딩도 가볍게 뛰어넘을 수 있다.\n불꽃의 펀치로 상대를 새까맣게 태운다."
