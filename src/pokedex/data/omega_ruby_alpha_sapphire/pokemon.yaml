          omega_ruby: "カギを　あつめる　しゅうせい。\nてきに　おそわれると　ジャラジャラと\nカギを　うちならして　いかくする。"
          alpha_sapphire: "きにいった　カギは　ぜったいに\nてばなさないので　ぼうはんのために\nきんこの　カギを　もたせるのだ。"
        jp_kanji:
          omega_ruby: "カギを　集める　習性。\n敵に　襲われると　ジャラジャラと\nカギを　打ち鳴らして　威嚇する。"
          alpha_sapphire: "気に入った　カギは　絶対に\n手放さないので　防犯のために\n金庫の　カギを　持たせるのだ。"
        en:
          omega_ruby: "These key collectors threaten any attackers\nby fiercely jingling their keys at them."
          alpha_sapphire: "It never lets go of a key that it likes,\nso people give it the keys to vaults and\nsafes as a way to prevent crime."
        fr:
          omega_ruby: "Ce Pokémon collectionne les clés qu’il agite devant\nses ennemis pour les intimider."
          alpha_sapphire: "Comme il ne se sépare jamais d’une clé qu’il trouve\nà son goût, les gens lui confient celle de leurs coffres,\nafin d’éviter de se faire voler."
        it:
          omega_ruby: "Ha l’abitudine di raccogliere chiavi. Quando viene attaccato,\nminaccia il nemico agitandole e facendo un gran chiasso."
          alpha_sapphire: "Spesso gli esseri umani affidano a questo Pokémon le chiavi\ndelle loro casseforti per prevenire i furti. Si sa infatti che\ncustodisce con cura le chiavi che ama."
        de:
          omega_ruby: "Dieses Pokémon sammelt eifrig Schlüssel, mit denen es wild\nherumfuchtelt, um Gegner abzuschrecken."
          alpha_sapphire: "Da es Schlüssel, die ihm gefallen, wie seinen Augapfel hütet,\nvertrauen Menschen ihm die Schlüssel ihrer Tresore an,\num Diebstahl vorzubeugen."
        es:
          omega_ruby: "Tiene el hábito de coleccionar llaves. Cuando un enemigo lo\nataca, las hace tintinear como método de intimidación."
          alpha_sapphire: "Como no se separa de las llaves que le gustan bajo ningún\nconcepto, la gente le encomienda las llaves de cajas fuertes\npara prevenir posibles robos."
        ko:
          omega_ruby: "열쇠를 모으는 습성이 있다.\n적에게 습격당하면 열쇠로\n짤랑짤랑 소리를 내어 위협한다."
          alpha_sapphire: "마음에 든 열쇠는 절대로\n손에서 놓지 않아서 방범을 위해\n금고 열쇠를 지니게 한다."
phantump:
  species_id: 708
  names:
