        - regenerator
      hidden_ability: klutz
      held_items:
        common: oran_berry
        rare: sitrus_berry
      descriptions:
        jp_kana:
          omega_ruby: "みみの　しょっかくで　あいての\nたいちょうや　タマゴから　ポケモンが\nいつ　でてくるのかも　わかるのだ。"
          alpha_sapphire: "みみの　しょっかくで　あいてに\nふれると　しんぞうの　おとで\nたいちょうや　きもちが　わかるのだ。"
        jp_kanji:
          omega_ruby: "耳の　触角で　相手の\n体調や　タマゴから　ポケモンが\nいつ　でてくるのかも　わかるのだ。"
          alpha_sapphire: "耳の　触角で　相手に　触れると\n心臓の　音で\n体調や　気持ちが　わかるのだ。"
        en:
          omega_ruby: "Using the feelers on its ears, it can tell how\nsomeone is feeling or when an egg might hatch."
          alpha_sapphire: "It touches others with the feelers on its ears, using\nthe sound of their heartbeats to tell how they\nare feeling."
        fr:
          omega_ruby: "Son ouïe est si développée qu’il arrive à juger de la santé\ndes gens ou à savoir quand un Œuf va éclore."
          alpha_sapphire: "Il ausculte les gens avec ses antennes auriculaires pour juger\nde leurs émotions ou de leur santé."
        it:
          omega_ruby: "Le sue orecchie sono antenne capaci di sondare lo stato\ndi salute degli altri o capire quando un uovo si schiuderà."
          alpha_sapphire: "Quando tocca qualcuno con le antenne delle orecchie, ne\npercepisce lo stato fisico e psicologico dal battito cardiaco."
        de:
          omega_ruby: "Über die Fühler an seinen Ohren kann es ertasten, wie es einer\nPerson geht oder wann ein Pokémon aus seinem Ei schlüpft."
          alpha_sapphire: "Berührt es jemanden mit den Fühlern an seinen Ohren,\nerfährt es durch den Herzschlag der Person, wie es ihr geht."
        es:
          omega_ruby: "Con las antenas de sus oídos, perciben el estado de un rival o\npredicen cuándo va a eclosionar un Huevo Pokémon."
          alpha_sapphire: "Al tocar a alguien con las antenas de sus orejas, conoce su\nestado de ánimo y de salud por los latidos del corazón."
        ko:
          omega_ruby: "귀의 더듬이로 상대의\n컨디션이나 알에서 포켓몬이\n언제 나올지도 알 수 있다."
          alpha_sapphire: "귀의 더듬이가 상대에게\n닿으면 심장 소리를 듣고\n몸 상태나 기분을 알 수 있다."
