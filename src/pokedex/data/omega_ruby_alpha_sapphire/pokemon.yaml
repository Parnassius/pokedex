        jp_kana:
          omega_ruby: "からだを　おりたたみ　つばさを\nのばすと　まるで　ジェットき。\nおんそくで　とぶことが　できる。"
          alpha_sapphire: "ジェットせんとうきに　まけない\nスピードで　そらを　とぶ。\nねらった　えものは　にがさない。"
        jp_kanji:
          omega_ruby: "体を　折り畳み　翼を　伸ばすと\nまるで　ジェット機。\n音速で　飛ぶことが　できる。"
          alpha_sapphire: "ジェット戦闘機に　負けない\nスピードで　空を　飛ぶ。\nねらった　獲物は　逃がさない。"
        en:
          omega_ruby: "When it folds up its body and extends its wings,\nit looks like a jet plane. It flies at sonic speed."
          alpha_sapphire: "It flies at speeds equal to a jet fighter plane.\nIt never allows its prey to escape."
        fr:
          omega_ruby: "Quand il se recroqueville et étend ses ailes, on dirait\nun chasseur. Sa vitesse est supersonique."
          alpha_sapphire: "Il vole à la vitesse d’un avion à réaction et ne lâche jamais\nsa proie."
        it:
          omega_ruby: "Quando si piega e distende le ali, sembra un jet. Vola a una\nvelocità supersonica."
          alpha_sapphire: "Vola alla velocità di un aereo da combattimento a reazione.\nNon lascia mai fuggire la preda."
        de:
          omega_ruby: "Spannt es seinen Körper und seine Flügel, sieht es aus wie\nein Jet. Es fliegt mit Schallgeschwindigkeit."
          alpha_sapphire: "Es fliegt mit der Geschwindigkeit eines Kampfjets. Es lässt\nnicht zu, dass ihm seine Beute entkommt."
        es:
          omega_ruby: "Cuando despliega su cuerpo y sus alas, parece un avión a\nreacción. Vuela a velocidad sónica."
          alpha_sapphire: "Vuela tan rápido como un avión a reacción. Nunca se le\nescapa una presa."
        ko:
          omega_ruby: "몸을 접고 날개를\n펼치면 마치 제트기 같다.\n음속으로 날 수 있다."
          alpha_sapphire: "제트기와 맞먹는\n스피드로 하늘을 난다.\n노린 먹이는 놓치지 않는다."
