          alpha_sapphire: "ごく　まれに　めずらしい　いろの　はなを\nさかせている　ロゼリアが　いると　いわれる。\nあたまの　トゲは　もうどくを　もっているぞ。"
        jp_kanji:
          omega_ruby: "両手の　花を　ねらう　相手には\n鋭い　トゲを　飛ばして　攻撃する。\n花の　香りは　気持ちを　和ませる。"
          alpha_sapphire: "ごく　まれに　珍しい　色の　花を\n咲かせている　ロゼリアが　いると　いわれる。\n頭の　トゲは　猛毒を　持っているぞ。"
        en:
          omega_ruby: "Roselia shoots sharp thorns as projectiles at any opponent that\ntries to steal the flowers on its arms. The aroma of this\nPokémon brings serenity to living things."
          alpha_sapphire: "On extremely rare occasions, a Roselia is said to appear with\nits flowers in unusual colors. The thorns on this Pokémon’s\nhead contain a vicious poison."
        fr:
          omega_ruby: "Rosélia utilise ses épines pointues comme projectiles\nsi on tente de cueillir les fleurs sur ses bras. Le parfum de ce\nPokémon apporte sérénité et plénitude à ceux qui le sentent."
          alpha_sapphire: "En de très rares occasions, on dit qu’un Rosélia peut\napparaître en arborant des fleurs aux couleurs inhabituelles.\nLes épines sur la tête de ce Pokémon contiennent un\ndangereux poison."
        it:
          omega_ruby: "Roselia spara spine molto affilate come fossero proiettili\na tutti coloro che tentano di rubargli i fiori dal braccio.\nIl profumo di questo Pokémon infonde serenità a tutti\ngli esseri viventi."
          alpha_sapphire: "In qualche rarissima occasione, Roselia è stato visto con fiori\ndai colori inconsueti. Le spine sulla testa di questo Pokémon\ncontengono un veleno micidiale."
        de:
          omega_ruby: "Roselia verschießt scharfe Stacheln auf jeden Feind,\nder versucht, die Blumen an seinen Armen zu stehlen.\nDer Duft dieses Pokémon beruhigt Lebewesen."
          alpha_sapphire: "Nur sehr selten bekommt man Roselia mit seinen\nungewöhnlich farbigen Blumen zu Gesicht. Die Dornen\nam Kopf dieses Pokémon enthalten ein grausames Gift."
        es:
          omega_ruby: "Roselia lanza finas espinas a todo el que se le acerca con\nintención de robarle las flores de los brazos. El aroma de este\nPokémon resulta relajante a los seres vivos."
          alpha_sapphire: "Dicen que, en muy raras ocasiones, aparece un ejemplar de\nRoselia con las flores de colores muy poco comunes. Las\nespinas que este Pokémon tiene en la cabeza contienen un\nveneno extremadamente peligroso."
        ko:
          omega_ruby: "양손의 꽃을 노리는 상대에게는\n날카로운 가시를 날려 공격한다.\n꽃의 향기는 기분을 누그러트린다."
          alpha_sapphire: "아주 드물게 희귀한 색의 꽃을\n피우는 로젤리아가 있다고 전해진다.\n머리의 가시는 맹독을 지니고 있다."
