      descriptions:
        jp_kana:
          omega_ruby: "せわを　やかれる　ことが　きらい。\nトレーナーの　しじを　きかないので\nなかよく　なるのが　むずかしい。"
          alpha_sapphire: "プライドが　たかく　ひとから\nたべものを　もらう　ことを　きらう。\nながい　うぶげが　さむさを　ふせぐ。"
        jp_kanji:
          omega_ruby: "世話を　焼かれる　ことが　大嫌い。\nトレーナーの　指示を　聞かないので\n仲良く　なるのが　難しい。"
          alpha_sapphire: "プライドが　高く　人から\n食べ物を　もらう　ことを　嫌う。\n長い　産毛が　寒さを　防ぐ。"
        en:
          omega_ruby: "It doesn’t like to be taken care of. It’s difficult to\nbond with since it won’t listen to its Trainer."
          alpha_sapphire: "Because it is very proud, it hates accepting food\nfrom people. Its thick down guards it from cold."
        fr:
          omega_ruby: "Ce Pokémon est difficile à entraîner car il est très désobéissant\net déteste qu’on lui rende service."
          alpha_sapphire: "Il est fier et déteste accepter la nourriture qu’on lui offre.\nSon pelage épais le protège du froid."
        it:
          omega_ruby: "Molto orgoglioso. Difficile farci amicizia perché non ascolta mai\ni consigli dell’Allenatore."
          alpha_sapphire: "È molto orgoglioso e odia accettare cibo dalla gente.\nLe fitte piume lo proteggono dal freddo."
        de:
          omega_ruby: "Einmischung kann es gar nicht leiden. Es ist bockig und fasst\nnur schwer Zutrauen zu seinem Trainer."
          alpha_sapphire: "Es ist sehr stolz und nimmt daher kein Futter von anderen an.\nSeine dicken Daunen schützen vor Kälte."
        es:
          omega_ruby: "No le gusta que lo cuiden. Como no aprecia el apoyo de su\nEntrenador, le cuesta coger confianza con él."
          alpha_sapphire: "Es muy orgulloso, por lo que odia aceptar comida de la\ngente. Su grueso plumón lo protege del frío."
        ko:
          omega_ruby: "신세를 지는 것을 싫어한다.\n트레이너의 지시를 듣지 않아\n친해지기 어렵다."
          alpha_sapphire: "자존심이 강해서 사람에게\n먹이를 얻는 것을 싫어한다.\n긴 솜털이 추위를 막는다."
prinplup:
  species_id: 394
