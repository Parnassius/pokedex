          alpha_sapphire: "ドラミドロが　すむ　かいいきに\nまよいこんだ　ふねは　２どと\nいきて　もどれないと　いわれている。"
        jp_kanji:
          omega_ruby: "タンカーの　船体を　腐らせる　猛毒を\n縄張りに　入りこんだ　ものに\n見境なく　吐きかける。"
          alpha_sapphire: "ドラミドロが　住む　海域に\n迷いこんだ　船は　２度と\n生きて　戻れないと　言われている。"
        en:
          omega_ruby: "Their poison is strong enough to eat through\nthe hull of a tanker, and they spit it indiscriminately\nat anything that enters their territory."
          alpha_sapphire: "Tales are told of ships that wander into\nseas where Dragalge live, never to return."
        fr:
          omega_ruby: "Il asperge tous ceux qui osent pénétrer sur son territoire\nd’un poison assez corrosif pour dissoudre la coque\nd’un pétrolier."
          alpha_sapphire: "Il paraît que les navires qui s’aventurent dans les eaux\npeuplées de Kravarech ne reviennent jamais de leur périple."
        it:
          omega_ruby: "Spruzza su chiunque invada il suo territorio un veleno\ntalmente potente da sciogliere lo scafo di una petroliera."
          alpha_sapphire: "Si dice che le navi che finiscono alla deriva nelle acque\nin cui vive questo Pokémon non tornino più indietro."
        de:
          omega_ruby: "Das Gift, mit dem es Eindringlinge in seinem Revier bespritzt,\nist ätzend genug, um sich durch den Stahl eines Tankschiffes\nzu fressen."
          alpha_sapphire: "Es heißt, dass die Besatzung von Schiffen, die sich in Tandraks\nHoheitsgebiet begeben, nicht mehr lebend zurückkehrt."
        es:
          omega_ruby: "Ataca de manera indiscriminada a quien ose adentrarse en\nsu territorio, escupiéndole un virulento veneno que puede\ncorroer hasta el casco de un petrolero."
          alpha_sapphire: "Según se dice, los barcos que se aventuran en aguas donde\nhabitan Dragalge desaparecen del mapa y no regresan a\npuerto."
        ko:
          omega_ruby: "유조선의 선체를 썩게 할 정도의\n맹독을 영역 안에 들어 온 것에\n무턱대고 끼얹는다."
          alpha_sapphire: "드래캄이 사는 해역에\n길을 잘못 든 배는 두 번 다시\n살아서 돌아가지 못한다고 전해진다."
clauncher:
  species_id: 692
  names:
    jp_kana: ウデッポウ
    jp_kanji: ウデッポウ
    en: Clauncher
    fr: Flingouste
