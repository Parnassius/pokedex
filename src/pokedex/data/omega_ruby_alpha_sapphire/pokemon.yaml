      descriptions:
        jp_kana:
          omega_ruby: "うみと　りくちで　せいかつする。\nはりてで　タンカーの　ふなぞこに\nあなを　あける　パワーの　もちぬし。"
          alpha_sapphire: "はったつした　まえあしで　あいてを\nひっぱたき　きぜつさせると　カラや\nホネまで　まるごと　かみくだいた。"
        jp_kanji:
          omega_ruby: "海と　陸地で　生活する。\n張り手で　タンカーの　船底に\n穴を　開ける　パワーの　持ち主。"
          alpha_sapphire: "発達した　前足で　相手を\nひっぱたき　気絶させると　殻や\nホネまで　まるごと　かみくだいた。"
        en:
          omega_ruby: "They can live both in the ocean and on land. A slap\nfrom one of them is enough to open a hole in the\nbottom of a tanker."
          alpha_sapphire: "It could knock out a foe with a slap from one of its\ndeveloped front appendages and chew it up, shell\nor bones and all."
        fr:
          omega_ruby: "Il vit sur terre et en mer. Ses bras surpuissants peuvent percer\ndes trous dans la coque des paquebots."
          alpha_sapphire: "Ses bras puissants serrent ses proies jusqu’à\nl’évanouissement. Il les dévore ensuite, carapace et\nos compris."
        it:
          omega_ruby: "Vive nel mare e sulla terraferma. Ha una forza tale da sfondare\ncon un solo colpo il fondo di una nave cisterna."
          alpha_sapphire: "Un singolo colpo dei suoi arti anteriori può bastare a far\nperdere i sensi alla preda e romperne ossa e corazza."
        de:
          omega_ruby: "Es lebt im Meer und an Land. Es ist so stark, dass es mit\neinem einzigen Hieb ein Loch in ein Schiff reißen kann."
          alpha_sapphire: "Ein Schlag mit seinen ausgeprägten Vorderflossen brachte\nGegner zu Fall und brach ihre Knochen oder Schale."
        es:
          omega_ruby: "Vive en el mar y en la superficie. Sus garras pueden abrir un\nagujero en el fondo de un petrolero."
          alpha_sapphire: "Un golpe con sus desarrolladas aletas delanteras puede hacer\nperder a un rival el conocimiento o romperle los huesos."
        ko:
          omega_ruby: "바다와 육지에서 생활한다.\n손바닥으로 쳐서 배 밑바닥에\n구멍을 내는 파워의 소유자다."
          alpha_sapphire: "발달한 앞다리로 상대를\n세게 쳐서 기절시켜 껍데기나\n뼈까지 통째로 깨물어 부쉈다."
archen:
