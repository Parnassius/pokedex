          alpha_sapphire: "おっとりした　せいかくの　ポケモン。\nガチゴラスなど　きょうぼうな　てきの\nいない　さむい　とちに　すんでいた。"
        jp_kanji:
          omega_ruby: "１億年前から　氷漬けに　なっていた\n体の　一部から　復活した\n古代の　ポケモン。"
          alpha_sapphire: "おっとりした　性格の　ポケモン。\nガチゴラスなど　凶暴な　敵の　いない\n寒い　土地に　住んでいた。"
        en:
          omega_ruby: "This ancient Pokémon was restored\nfrom part of its body that had been\nfrozen in ice for over 100 million years."
          alpha_sapphire: "This calm Pokémon lived in a cold land where\nthere were no violent predators like Tyrantrum."
        fr:
          omega_ruby: "Pokémon ancien, ramené à la vie après la découverte\nd’une partie de son corps conservée dans la glace\npendant 100 millions d’années."
          alpha_sapphire: "Ce Pokémon placide vivait dans des contrées au climat froid,\nloin de la menace d’un violent prédateur comme Rexillius."
        it:
          omega_ruby: "Pokémon preistorico riportato in vita dopo più di 100 milioni\ndi anni grazie a parti del suo corpo rinvenute nel ghiaccio."
          alpha_sapphire: "Pokémon dal carattere tranquillo. Abitava in terre fredde,\nin cui non doveva temere la presenza di terribili predatori\ncome i Tyrantrum."
        de:
          omega_ruby: "Dieses antike Pokémon wurde aus Teilen seines Körpers\nneu belebt, die 100 Millionen Jahre lang im ewigen Eis\ngeschlummert hatten."
          alpha_sapphire: "Dieses eher ruhige Pokémon lebte in einem kalten Land,\nin dem es keine brutalen Gegner wie Monargoras zu fürchten\nhatte."
        es:
          omega_ruby: "Pokémon que ha sido regenerado a partir de un trozo de\nsu antiguo cuerpo, que quedó congelado hace unos 100\nmillones de años."
          alpha_sapphire: "Un Pokémon de carácter sosegado. Habitaba en lugares fríos\ndonde no existían depredadores tan feroces como Tyrantrum."
        ko:
          omega_ruby: "1억 년 전부터 빙하로\n뒤덮여 있던 몸의 일부에서\n부활한 고대의 포켓몬이다."
          alpha_sapphire: "의젓한 성격의 포켓몬이다.\n견고라스 등 흉포한 적이\n없는 추운 땅에 살고 있었다."
