          alpha_sapphire: "Los propietarios de los castillos de antaño solían invitar a\nFlorges para que creasen jardines floridos, a fin de decorar\nsus terrenos."
        ko:
          omega_ruby: "멋진 화원이 영역이다.\n화초가 내보내는 에너지를\n쬐어 자신의 파워로 삼는다."
          alpha_sapphire: "옛 성의 주인은\n정원을 꾸미기 위해 플라제스를\n불러들여 화원을 만들게 했다."
