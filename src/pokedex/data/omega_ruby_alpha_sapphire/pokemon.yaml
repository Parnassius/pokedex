          alpha_sapphire: "ゴローンを　もちあげて　からだを　きたえる。\nすべての　かくとうぎを　マスターするために\nせかいじゅうを　たびする　ワンリキーも　いる。"
        jp_kanji:
          omega_ruby: "どんなに　運動を　しても　痛くならない\n特別な　筋肉を　持つ　ポケモン。\n大人　１００人を　投げ飛ばす　パワー。"
          alpha_sapphire: "ゴローンを　持ち上げて　体を　鍛える。\nすべての　格闘技を　マスターするために\n世界中を　旅する　ワンリキーも　いる。"
        en:
          omega_ruby: "Machop’s muscles are special—they never get sore no matter\nhow much they are used in exercise. This Pokémon has\nsufficient power to hurl a hundred adult humans."
          alpha_sapphire: "Machop exercises by hefting around a Graveler as if it were\na barbell. There are some Machop that travel the world in a\nquest to master all kinds of martial arts."
        fr:
          omega_ruby: "Les muscles de Machoc sont spéciaux. Quels que soient\nles efforts qu’il produit, il n’a jamais de courbature.\nCe Pokémon est assez puissant pour lancer une centaine\nd’hommes adultes."
          alpha_sapphire: "Machoc s’entraîne en soulevant un Gravalanch, comme\ns’il s’agissait d’haltères. Certains Machoc voyagent un peu\npartout dans le monde pour apprendre à maîtriser tous\nles types d’arts martiaux."
        it:
          omega_ruby: "I particolari muscoli di Machop non si infiammano mai,\nnemmeno in caso di esercizio eccessivo. Questo Pokémon ha\nforza sufficiente per scagliare lontano un centinaio di uomini."
          alpha_sapphire: "Machop si allena sollevando un Graveler come fosse un\nattrezzo ginnico. Esistono Machop che girano il mondo\nnel tentativo di imparare ogni tipo di arte marziale."
        de:
          omega_ruby: "Machollos Muskeln sind etwas Besonderes. Sie schmerzen nie,\negal, wie sehr sie beansprucht werden. Dieses Pokémon hat\ngenug Kraft, um 100 Erwachsene umherzuwerfen."
          alpha_sapphire: "Machollo trainiert, indem es ein Georok hochhebt, als wäre es\neine Hantel. Es gibt auch Machollo, die durch die Welt reisen,\num alle Arten der Kampfkunst zu erlernen."
        es:
          omega_ruby: "Gracias a su portentosa musculatura, Machop no se agota por\nmucho esfuerzo que haga. Este Pokémon es tan fuerte que\npuede derrotar a cien personas adultas de una sola vez."
          alpha_sapphire: "Machop se entrena levantando Graveler a modo de pesas.\nAlgunos de estos Pokémon viajan por todo el mundo para\naprender distintos tipos de artes marciales."
        ko:
          omega_ruby: "아무리 운동을 해도 아프지 않은\n특별한 근육을 가진 포켓몬이다.\n어른 100명을 내던지는 파워다."
          alpha_sapphire: "데구리를 들어 올려 몸을 단련한다.\n모든 격투기를 마스터하기 위해\n전 세계를 여행하는 알통몬도 있다."
machoke:
