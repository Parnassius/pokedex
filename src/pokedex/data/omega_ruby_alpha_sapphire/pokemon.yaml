          alpha_sapphire: "剣の　柄を　握った　人の　腕に\n青い　布を　巻きつけて\n倒れるまで　命を　吸い取る。"
        en:
          omega_ruby: "Apparently this Pokémon is born when a\ndeparted spirit inhabits a sword. It attaches itself\nto people and drinks their life force."
          alpha_sapphire: "If anyone dares to grab its hilt, it wraps\na blue cloth around that person’s arm and\ndrains that person’s life energy completely."
        fr:
          omega_ruby: "Ce Pokémon naît quand l’âme d’un défunt prend possession\nd’une épée ancienne. Il s’accroche aux humains pour absorber\nleur énergie vitale."
          alpha_sapphire: "Si quelqu’un s’aventure à l’empoigner, il enroule son étoffe\nbleue autour du bras de l’infortuné et aspire son énergie vitale\njusqu’à ce que ce dernier s’écroule."
        it:
          omega_ruby: "Sembra sia nato quando uno spirito si impossessò di un’antica\nspada. Si lega agli esseri umani per assorbirne la forza vitale."
          alpha_sapphire: "Avvolge il drappo blu attorno al braccio di chiunque si azzardi\na impugnarne l’elsa e assorbe la sua energia fino a fargli\nperdere i sensi."
        de:
          omega_ruby: "Dieses Pokémon wird geboren, wenn die Seele eines\nVerstorbenen sich in einem Schwert festsetzt. Es heftet\nsich an Menschen und saugt deren Lebenskraft aus."
          alpha_sapphire: "Es wickelt ein blaues Tuch um den Arm von Menschen,\ndie seinen Schwertgriff ergreifen, und absorbiert deren\nLebensenergie, bis sie zusammenbrechen."
        es:
          omega_ruby: "Cuentan que este Pokémon nace cuando el espíritu de un\ndifunto toma posesión de una espada antigua. Se aferra a las\npersonas y absorbe su energía."
          alpha_sapphire: "Si alguien osa empuñarlo, se enrolla en el brazo del\ndesafortunado con su paño azul y le absorbe toda la energía\nhasta que pierde el sentido."
        ko:
          omega_ruby: "죽은 자의 혼이 고대의\n검에 깃들어 태어났다고 한다.\n사람에게 씌어 생명을 빨아들인다."
          alpha_sapphire: "검의 자루를 잡은 사람의\n팔에 파란 천을 감아서\n쓰러질 때까지 목숨을 빨아들인다."
doublade:
  species_id: 680
  names:
    jp_kana: ニダンギル
    jp_kanji: ニダンギル
    en: Doublade
    fr: Dimoclès
    it: Doublade
    de: Duokles
    es: Doublade
    ko: 쌍검킬
  forms:
    doublade:
      form_id: 0
      base_stats:
        hp: 59
        attack: 110
        defense: 150
        special_attack: 45
        special_defense: 49
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - ghost
      egg_groups:
        - mineral
      abilities:
        - no_guard
      descriptions:
        jp_kana:
          omega_ruby: "しんかして　２ほんに　ぶんれつした。\nテレパシーで　かいわして　れんけい\nこうげきで　てきを　きりきざむ。"
          alpha_sapphire: "２ほんの　つるぎによる　ふくざつな\nれんぞく　こうげきを　ふせぐことは\nけんの　たつじんでも　ふかのうだ。"
        jp_kanji:
          omega_ruby: "進化して　２本に　分裂した。\nテレパシーで　会話して\n連係攻撃で　敵を　切り刻む。"
          alpha_sapphire: "２本の　剣による\n複雑な　連続攻撃を　防ぐことは\n剣の　達人でも　不可能だ。"
        en:
          omega_ruby: "When Honedge evolves, it divides into two swords,\nwhich cooperate via telepathy to coordinate attacks\nand slash their enemies to ribbons."
          alpha_sapphire: "The complex attack patterns of its two swords\nare unstoppable, even for an opponent\ngreatly accomplished at swordplay."
        fr:
          omega_ruby: "En évoluant, Monorpale se divise en deux épées qui\ncommuniquent par télépathie pour mieux découper\nleur adversaire en morceaux."
          alpha_sapphire: "Même les sabreurs chevronnés sont incapables de parer\nles assauts continus et complexes menés de concert\npar ces deux épées."
        it:
          omega_ruby: "Sdoppiatesi con l’evoluzione, le due parti comunicano\ntelepaticamente per lanciarsi in un attacco coordinato."
          alpha_sapphire: "I fendenti vorticosi e velocissimi delle due spade possono\nmettere in ginocchio anche gli spadaccini più esperti."
        de:
          omega_ruby: "Bei seiner Entwicklung hat es sich in zwei Schwerter geteilt.\nEs begegnet seinen Gegnern mit Attacken, die es mittels\nTelepathie koordiniert."
          alpha_sapphire: "Nicht einmal ein Meister des Schwertkampfs kann\nden komplizierten aufeinanderfolgenden Angriffen\nder zwei Schwerter ausweichen."
        es:
          omega_ruby: "Al evolucionar se divide en dos espadas. Se comunican entre\nsí mediante telepatía y coordinan los ataques para rebanar al\nenemigo."
          alpha_sapphire: "Ni siquiera el espadachín más ducho conseguiría esquivar los\ncomplejos ataques que encadenan ambas espadas a la vez."
        ko:
          omega_ruby: "진화하여 2자루로 분열되었다.\n텔레파시로 서로 대화하며\n연계 공격으로 적을 조각낸다."
          alpha_sapphire: "2자루의 검에 의한 복잡한\n연속 공격을 막는 것은\n검의 달인일지라도 불가능하다."
aegislash:
  species_id: 681
  names:
