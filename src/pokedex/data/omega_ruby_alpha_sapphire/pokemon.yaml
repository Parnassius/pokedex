        jp_kana:
          omega_ruby: "あたたかい　ひざしを　あびると\nつぼみが　ひらき　かふんを　とばす。\nきれいな　みずの　ちかくが　すみか。"
          alpha_sapphire: "ふゆの　あいだは　つぼみを　とざして\nさむさに　たえる。はるになると\nつぼみを　ひらき　かふんを　とばす。"
        jp_kanji:
          omega_ruby: "暖かい　日差しを　浴びると\nつぼみが　開き　花粉を　飛ばす。\nきれいな　水の　近くが　すみか。"
          alpha_sapphire: "冬の　間は　つぼみを　閉ざして\n寒さに　耐える。春になると\nつぼみを　開き　花粉を　飛ばす。"
        en:
          omega_ruby: "When it feels the sun’s warm touch, it opens its bud\nto release pollen. It lives alongside clear pools."
          alpha_sapphire: "Over the winter, it closes its bud and endures the\ncold. In spring, the bud opens and releases pollen."
        fr:
          omega_ruby: "Son bourgeon s’ouvre une fois gorgé de soleil et libère\ndu pollen. Il vit près des sources d’eau pure."
          alpha_sapphire: "En hiver, son bourgeon se referme pour résister au froid.\nIl s’ouvre au printemps et libère du pollen."
        it:
          omega_ruby: "I raggi del sole gli fanno schiudere la gemma e rilasciare\npolline. Fa la tana vicino a bei corsi d’acqua."
          alpha_sapphire: "D’inverno chiude la sua gemma e resiste al freddo.\nIn primavera la gemma si riapre e rilascia polline."
        de:
          omega_ruby: "Bei Sonnenlicht öffnet es seine Knospe und gibt Pollen ab.\nEs lebt in der Nähe von sauberem Wasser."
          alpha_sapphire: "Im Winter schließt es die Knospe. Im Frühjahr öffnet es\ndie Knospe und gibt Pollen ab."
        es:
          omega_ruby: "Vive cerca de aguas cristalinas. Su cabello se abre y esparce\npolen cuando le bañan los rayos del sol."
          alpha_sapphire: "En invierno cierra su capullo para protegerse del frío.\nEn primavera, el capullo se abre y esparce polen."
        ko:
          omega_ruby: "따뜻한 햇볕을 쬐면\n봉오리를 펴서 꽃가루를 날린다.\n깨끗한 물 가까이에 거처가 있다."
          alpha_sapphire: "겨울 동안 봉오리를 닫고\n추위를 견딘다. 봄이 되면\n봉오리를 펴서 꽃가루를 날린다."
roserade:
  species_id: 407
