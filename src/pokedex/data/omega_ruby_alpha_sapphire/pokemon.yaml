          alpha_sapphire: "はったつした　きょうじんな　きんにくは　どんなに\nうんどうしても　つかれる　ことは　ない。\nたいへいようも　かるく　おうだん　できるほどだ。"
        jp_kanji:
          omega_ruby: "発達した　強靭な　筋肉は　どんなに\n運動しても　疲れる　ことは　ない。\n太平洋も　軽く　横断　できるほどだ。"
          alpha_sapphire: "発達した　強靭な　筋肉は　どんなに\n運動しても　疲れる　ことは　ない。\n太平洋も　軽く　横断　できるほどだ。"
        en:
          omega_ruby: "Poliwrath’s highly developed, brawny muscles never grow\nfatigued, however much it exercises. It is so tirelessly strong,\nthis Pokémon can swim back and forth across the ocean\nwithout effort."
          alpha_sapphire: "Poliwrath’s highly developed, brawny muscles never grow\nfatigued, however much it exercises. It is so tirelessly strong,\nthis Pokémon can swim back and forth across the ocean\nwithout effort."
        fr:
          omega_ruby: "Les muscles solides et surdéveloppés de Tartard ne se\nfatiguent jamais, quels que soient les efforts qu’il produit.\nCe Pokémon est tellement endurant qu’il peut traverser\nun océan à la nage avec une étonnante facilité."
          alpha_sapphire: "Les muscles solides et surdéveloppés de Tartard ne se\nfatiguent jamais, quels que soient les efforts qu’il produit.\nCe Pokémon est tellement endurant qu’il peut traverser\nun océan à la nage avec une étonnante facilité."
        it:
          omega_ruby: "Poliwrath è dotato di muscoli molto sviluppati e robusti.\nPer quanto si alleni, non si stanca mai.\nQuesto Pokémon è così infaticabile e forte che riesce\nad attraversare a nuoto interi oceani."
          alpha_sapphire: "Poliwrath è dotato di muscoli molto sviluppati e robusti.\nPer quanto si alleni, non si stanca mai.\nQuesto Pokémon è così infaticabile e forte che riesce\nad attraversare a nuoto interi oceani."
        de:
          omega_ruby: "Quappo besitzt hochentwickelte, starke Muskeln, die niemals\nermüden, egal, wie sehr es sie auch beansprucht. Es ist so\nkräftig, dass es mühelos große Ozeane durchschwimmen kann."
          alpha_sapphire: "Quappo besitzt hochentwickelte, starke Muskeln,\ndie niemals ermüden. Es ist so kräftig, dass es\nmühelos große Ozeane durchschwimmen kann."
        es:
          omega_ruby: "Poliwrath tiene unos músculos fornidos y muy desarrollados,\npor lo que nunca se agota. Es tan fuerte e incansable que\ncruzar el océano a nado no le supone ningún esfuerzo."
          alpha_sapphire: "Poliwrath tiene unos músculos fornidos y muy desarrollados,\npor lo que nunca se agota. Es tan fuerte e incansable que\ncruzar el océano a nado no le supone ningún esfuerzo."
        ko:
          omega_ruby: "강인하게 발달한 근육은 아무리\n운동해도 지치는 일이 없다.\n태평양도 가볍게 횡단할 수 있을 정도다."
          alpha_sapphire: "강인하게 발달한 근육은 아무리\n운동해도 지치는 일이 없다.\n태평양도 가볍게 횡단할 수 있을 정도다."
abra:
  species_id: 63
  names:
    jp_kana: ケーシィ
    jp_kanji: ケーシィ
    en: Abra
    fr: Abra
    it: Abra
    de: Abra
    es: Abra
    ko: 캐이시
  forms:
    abra:
      form_id: 0
      base_stats:
        hp: 25
        attack: 20
        defense: 15
        special_attack: 105
        special_defense: 55
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - synchronize
        - inner_focus
      hidden_ability: magic_guard
      held_items:
        rare: twisted_spoon
      descriptions:
        jp_kana:
          omega_ruby: "１にち　１８じかん　ねむっている　ポケモン。\nねむったままでも　てきの　けはいを　さっちすると\nテレポートして　にげる　ことが　できるぞ。"
          alpha_sapphire: "まいにち　１８じかん　ねむらないと　ねぶそくで\nちょうのうりょくが　つかえなくなってしまう。\nおそわれると　ねたまま　テレポートで　にげる。"
        jp_kanji:
          omega_ruby: "１日　１８時間　眠っている　ポケモン。\n眠ったままでも　敵の　気配を　察知すると\nテレポートして　逃げる　ことが　できるぞ。"
          alpha_sapphire: "毎日　１８時間　眠らないと　寝不足で\n超能力が　使えなくなってしまう。\n襲われると　寝たまま　テレポートで　逃げる。"
        en:
          omega_ruby: "Abra sleeps for eighteen hours a day. However, it can sense\nthe presence of foes even while it is sleeping. In such a\nsituation, this Pokémon immediately teleports to safety."
          alpha_sapphire: "Abra needs to sleep for eighteen hours a day. If it doesn’t,\nthis Pokémon loses its ability to use telekinetic powers. If it is\nattacked, Abra escapes using Teleport while it is still sleeping."
        fr:
          omega_ruby: "Abra dort dix-huit heures par jour. Pourtant, il peut sentir\nla présence de ses ennemis, même endormi. Dans ce genre\nde situation, ce Pokémon se téléporte en lieu sûr."
          alpha_sapphire: "Abra doit dormir dix-huit heures par jour. S’il dort moins,\nce Pokémon ne peut plus utiliser ses pouvoirs télékinétiques.\nLorsqu’il est attaqué, Abra s’enfuit en utilisant Téléport,\nsans même se réveiller."
        it:
          omega_ruby: "Abra dorme per 18 ore al giorno, ma riesce a captare\nla presenza dei nemici anche durante il sonno. In questo\ncaso il Pokémon si teletrasporta immediatamente al sicuro."
          alpha_sapphire: "Abra ha bisogno di 18 ore di sonno al giorno. In caso\ncontrario perde le sue abilità telecinetiche. Se attaccato,\nAbra fugge usando Teletrasporto mentre dorme."
        de:
          omega_ruby: "Abra schläft 18 Stunden am Tag. Es nimmt die Gegenwart\nvon Feinden aber auch im Schlaf wahr. In einer solchen\nSituation bringt es sich umgehend mit Teleport in Sicherheit."
          alpha_sapphire: "Abra braucht 18 Stunden Schlaf pro Tag, sonst verliert\nes die Fähigkeit, seine telekinetischen Kräfte zu nutzen.\nAbra flüchtet mithilfe von Teleport, schläft dabei aber weiter."
        es:
          omega_ruby: "Abra duerme 18 horas al día, pero puede detectar a cualquier\nenemigo que se le acerque mientras duerme. En una situación\nasí, usa Teletransporte para protegerse."
          alpha_sapphire: "Abra necesita dormir 18 horas al día. Si no, pierde la habilidad\nque tiene de usar poderes de telequinesia. Si le atacan, Abra\npuede escapar usando Teletransporte mientras duerme."
        ko:
          omega_ruby: "하루에 18시간 잠들어 있는 포켓몬이다.\n잠든 상태에서도 적의 기척을 감지하면\n순간이동하여 도망갈 수 있다."
          alpha_sapphire: "매일 18시간을 자지 않으면 수면 부족으로\n초능력을 사용할 수 없게 된다.\n습격당하면 잠든 채로 순간이동하여 도망간다."
