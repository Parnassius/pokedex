          omega_ruby: "こえの　はちょうを　じざいに　かえる　せいたいを\nもっているので　あいてが　いちばん　ねむくなる\nはちょうで　うたを　うたう　ことが　できる。"
          alpha_sapphire: "うたう　ときは　いちども　いきつぎをしない。\nなかなか　ねむらない　てきを　あいてに　した\nときは　いきを　できない　プリンも　いのちがけ。"
        jp_kanji:
          omega_ruby: "声の　波長を　自在に　変える　声帯を\n持っているので　相手が　いちばん　眠くなる\n波長で　歌を　歌う　ことが　できる。"
          alpha_sapphire: "歌う　ときは　一度も　息継ぎをしない。\n中々　眠らない　敵を　相手に　した\nときは　息を　出来ない　プリンも　命懸け。"
        en:
          omega_ruby: "Jigglypuff’s vocal cords can freely adjust the wavelength of its\nvoice. This Pokémon uses this ability to sing at precisely the\nright wavelength to make its foes most drowsy."
          alpha_sapphire: "When this Pokémon sings, it never pauses to breathe.\nIf it is in a battle against an opponent that does not easily\nfall asleep, Jigglypuff cannot breathe, endangering its life."
        fr:
          omega_ruby: "Rondoudou utilise ses cordes vocales pour ajuster librement\nla longueur d’onde de sa voix. Cela permet à ce Pokémon\nde chanter en utilisant une longueur d’onde qui endort\nses ennemis."
          alpha_sapphire: "Lorsque ce Pokémon chante, il ne s’arrête pas pour respirer.\nQuand il se bat contre un adversaire qu’il ne peut pas\nfacilement endormir, Rondoudou reste donc sans respirer,\nmettant sa vie en danger."
        it:
          omega_ruby: "Le corde vocali di Jigglypuff gli consentono di cantare\nesattamente alla lunghezza d’onda richiesta per\naddormentare il suo avversario."
          alpha_sapphire: "Quando canta, Jigglypuff non si ferma a prendere fiato.\nSe lotta contro un nemico che non si addormenta facilmente,\nnon respira rischiando così di esaurire tutte le sue energie."
        de:
          omega_ruby: "Pummeluffs Stimmbänder können die Tonlage seiner Stimme\nbeliebig variieren. Dieses Pokémon benutzt diese Fähigkeit,\num seine Gegner mit monotonem Gesang in Tiefschlaf zu\nversetzen."
          alpha_sapphire: "Während dieses Pokémon singt, holt es niemals Luft.\nIm Kampf gegen einen Gegner, der nicht so leicht in Schlaf\nzu versetzen ist, kann Pummeluff nicht atmen. Leider gefährdet\nes sich dadurch selbst."
        es:
          omega_ruby: "Jigglypuff tiene unas cuerdas vocales que ajustan sin problema\nla longitud de onda de su voz. Este Pokémon usa la habilidad\nque tiene para cantar con la longitud de onda necesaria para\nadormecer a su rival."
          alpha_sapphire: "Cuando este Pokémon canta, no para nunca para respirar.\nSi en combate el enemigo no se queda dormido con facilidad,\nJigglypuff no podrá respirar y su vida correrá peligro."
        ko:
          omega_ruby: "목소리의 파장을 자유로이 바꿀 수 있는\n성대가 있어서 상대가 가장 졸리게 되는\n파장으로 노래를 부를 수 있다."
          alpha_sapphire: "노래할 때는 한 번도 숨을 쉬지 않는다.\n어지간히 잠들지 않는 상대와 맞설 때는\n숨을 쉴 수 없기에 푸린도 필사적이다."
