          omega_ruby: "じぶんでは　でんきを　つくれないので\nほかの　おおきな　ポケモンに\nとりつき　せいでんきを　すいとる。"
          alpha_sapphire: "からだの　おおきな　ポケモンに\nとりついて　せいでんきを　すいとり\nちくでんぶくろに　でんきを　ためる。"
        jp_kanji:
          omega_ruby: "自分では　電気を　つくれないので\n他の　大きな　ポケモンに\nとりつき　静電気を　吸いとる。"
          alpha_sapphire: "体の　大きな　ポケモンに　とりついて\n静電気を　吸い取り\n蓄電袋に　電気を　ためる。"
        en:
          omega_ruby: "Since it can’t generate its own electricity, it sticks\nonto large-bodied Pokémon and absorbs\nstatic electricity."
          alpha_sapphire: "They attach themselves to large-bodied Pokémon\nand absorb static electricity, which they store in an\nelectric pouch."
        fr:
          omega_ruby: "Ne produisant pas lui-même d’électricité, il s’accroche\naux Pokémon plus grands et aspire leur électricité statique."
          alpha_sapphire: "Il s’accroche aux Pokémon plus grands et aspire leur\nélectricité statique. Il la stocke dans ses poches-accus."
        it:
          omega_ruby: "Non può produrre elettricità da sé, per cui si attacca a\nPokémon più grandi per succhiarne l’energia elettrostatica."
          alpha_sapphire: "Si aggrappa ai Pokémon più grossi e ne assorbe l’energia\nstatica che conserva in una sacca d’accumulo."
        de:
          omega_ruby: "Da es selbst keinen Strom erzeugen kann, klettert es auf\nandere Pokémon, um ihnen elektrostatische Energie\nabzusaugen."
          alpha_sapphire: "Es pflanzt sich an großen Pokémon fest und zapft ihnen\nelektrische Energie ab. Diese hortet es in seinen Ladetaschen."
        es:
          omega_ruby: "No puede generar electricidad por sí mismo, así que se\nencarama a Pokémon grandes y absorbe su energía estática."
          alpha_sapphire: "Se agarra a Pokémon de gran tamaño, absorbe su electricidad\nestática y la guarda en una bolsa interna."
        ko:
          omega_ruby: "스스로 전기를 만들 수 없어\n다른 큰 포켓몬에\n달라붙어 정전기를 흡수한다."
          alpha_sapphire: "몸이 큰 포켓몬에게 매달려\n정전기를 빨아들인 후\n축전 주머니에 전기를 모은다."
galvantula:
