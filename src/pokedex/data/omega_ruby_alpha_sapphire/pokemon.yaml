      descriptions:
        jp_kana:
          omega_ruby: "おびを　しめると　パワーアップする。\nやせいの　ナゲキは　つるくさを\nあんで　じぶんの　おびを　つくる。"
          alpha_sapphire: "じぶんより　おおきな　あいてと\nであうと　むしょうに　なげたくなる。\nつよくなると　おびを　とりかえる。"
        jp_kanji:
          omega_ruby: "帯を　締めると　パワーアップする。\n野生の　ナゲキは　つる草を　編んで\n自分の　帯を　作る。"
          alpha_sapphire: "自分より　大きな　相手と\n出会うと　無性に　投げたくなる。\n強くなると　帯を　取り替える。"
        en:
          omega_ruby: "When it tightens its belt, it becomes stronger. Wild\nThroh use vines to weave their own belts."
          alpha_sapphire: "When it encounters a foe bigger than itself, it wants\nto throw it. It changes belts as it gets stronger."
        fr:
          omega_ruby: "Quand il noue sa ceinture, il devient plus puissant.\nLes Judokrak sauvages tressent leur ceinture avec des lianes."
          alpha_sapphire: "Ils aiment projeter ceux qui sont plus grands qu’eux.\nIls changent de ceinture quand ils progressent."
        it:
          omega_ruby: "La cintura da karate lo rende più forte. I Throh selvatici\nsi costruiscono le cinture usando piante rampicanti."
          alpha_sapphire: "Quando incontra un avversario più grande di lui, lo assale\nl’istinto di lanciarlo via. Cambia cintura quando diventa\npiù forte."
        de:
          omega_ruby: "Zurrt es seinen Gürtel fest, gewinnt es an Kraft. Wilde\nExemplare flechten sich ihren Gürtel in Handarbeit aus Ranken."
          alpha_sapphire: "Trifft es jemanden, der größer ist als es selbst, will es ihn\nunbedingt werfen. Wird es stärker, wechselt es den Gürtel."
        es:
          omega_ruby: "Aumenta su potencia si se aprieta el cinturón. Un Throh\nsalvaje teje su propio cinturón usando lianas."
          alpha_sapphire: "Si se topa con un rival más fuerte, ansía lanzarlo por los aires.\nAl hacerse más fuerte, cambia su cinturón."
        ko:
          omega_ruby: "띠를 매면 파워가 올라간다.\n야생 던지미는 덩굴풀을 엮어\n자신의 띠를 만든다."
          alpha_sapphire: "자신보다 큰 상대와 만나면\n이유 없이 내던지고 싶어 한다.\n강해지면 띠를 바꾼다."
sawk:
  species_id: 539
  names:
    jp_kana: ダゲキ
    jp_kanji: ダゲキ
    en: Sawk
    fr: Karaclée
    it: Sawk
