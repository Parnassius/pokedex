          omega_ruby: "ポケモンで　いちばん　きょうりょくな\nさいみんじゅつを　つかう。あいてを\nいのままに　あやつってしまうのだ。"
          alpha_sapphire: "さいみんじゅつで　おびきよせて\nあたまの　しょくしゅで　からめとり\nしょうかえきを　あびせて　しとめる。"
        jp_kanji:
          omega_ruby: "ポケモンで　一番　強力な\n催眠術を　使う。相手を　意のままに\n操ってしまうのだ。"
          alpha_sapphire: "催眠術で　おびき寄せて\n頭の　触手で　絡め取り\n消化液を　浴びせて　しとめる。"
        en:
          omega_ruby: "It wields the most compelling hypnotic powers\nof any Pokémon, and it forces others to do\nwhatever it wants."
          alpha_sapphire: "It lures its prey close with hypnotic motions,\nthen wraps its tentacles around it before\nfinishing it off with digestive fluids."
        fr:
          omega_ruby: "Doté des pouvoirs hypnotiques les plus puissants du règne\ndes Pokémon, il manipule son adversaire à sa guise."
          alpha_sapphire: "Il attire ses ennemis en les hypnotisant, avant de les enserrer\nde ses tentacules et de les neutraliser avec son suc gastrique."
        it:
          omega_ruby: "È il Pokémon con il potere ipnotico più forte in assoluto.\nPuò controllare a piacimento i suoi nemici."
          alpha_sapphire: "Attira le prede con l’ipnosi, le cattura con i tentacoli e le\nfinisce spruzzando loro addosso i suoi succhi gastrici."
        de:
          omega_ruby: "Unter allen Pokémon verfügt es über die stärksten\nhypnotischen Kräfte, mit denen es Gegner nach Belieben\nkontrollieren kann."
          alpha_sapphire: "Mit seinen hypnotischen Kräften lockt es Gegner an, hält sie\nmit den Tentakeln an seinem Kopf fest und zersetzt sie dann\nmit Verdauungssekret."
        es:
          omega_ruby: "Tiene a su disposición los poderes hipnóticos más poderosos\nde entre todos los Pokémon. Controla al enemigo a su\nvoluntad."
          alpha_sapphire: "Hipnotiza a su objetivo para atraerlo y lo aprisiona con los\ntentáculos de su cabeza, para asestarle el golpe de gracia\nrociándolo con sus jugos gástricos."
        ko:
          omega_ruby: "포켓몬 중에서 가장 강력한\n최면술을 쓴다. 상대를\n자기 마음대로 조종해버린다."
          alpha_sapphire: "최면술로 끌어들여서\n머리의 촉수로 휘감아\n소화액을 끼얹어 꼼짝 못하게 한다."
binacle:
  species_id: 688
  names:
    jp_kana: カメテテ
    jp_kanji: カメテテ
    en: Binacle
    fr: Opermine
    it: Binacle
    de: Bithora
    es: Binacle
    ko: 거북손손
