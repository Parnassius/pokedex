      hidden_ability: magician
      descriptions:
        jp_kana:
          omega_ruby: "つえの　せんたんで　もえる　ほのおを\nみつめて　せいしんとういつすると\nみらいの　できごとを　みとおせる。"
          alpha_sapphire: "せっし３０００どの　ほのおの　うずを\nちょうのうりょくで　あやつる。\nてきを　うずで　つつみ　やきつくす。"
        jp_kanji:
          omega_ruby: "杖の　先端で　燃える　炎を　見つめて\n精神統一すると\n未来の　出来事を　見通せる。"
          alpha_sapphire: "摂氏３０００度の　炎の　渦を\n超能力で　操る。\n敵を　渦で　包み　焼きつくす。"
        en:
          omega_ruby: "It gazes into the flame at the tip of\nits branch to achieve a focused state,\nwhich allows it to see into the future."
          alpha_sapphire: "Using psychic power, it generates a\nfiery vortex of 5,400 degrees Fahrenheit,\nincinerating foes swept into this whirl of flame."
        fr:
          omega_ruby: "Peut prédire l’avenir s’il se concentre en fixant la flamme\nqui danse au bout de sa canne."
          alpha_sapphire: "Ses pouvoirs psychiques lui permettent de créer\ndes tourbillons de flammes à 3 000 °C qui enveloppent\net consument ses ennemis."
        it:
          omega_ruby: "Fissando la fiamma del ramo che ha in mano, aumenta\nal massimo la concentrazione e può predire il futuro."
          alpha_sapphire: "Grazie ai suoi poteri psichici, può generare un vortice\ndi fiamme a 3000 °C con il quale avvolge i nemici\ne li incenerisce."
        de:
          omega_ruby: "Es kann die Zukunft vorhersehen, indem es konzentriert\nin die Flamme an der Spitze seines Zweiges blickt."
          alpha_sapphire: "Mit seinen übernatürlichen Kräften kontrolliert es einen\n3 000 °C heißen Flammenwirbel, mit dem es seine Gegner\numhüllt und sie verbrennt."
        es:
          omega_ruby: "Fija la mirada en la llama que arde en la punta de su bastón\npara concentrarse y prever sucesos que tienen lugar en el\nfuturo."
          alpha_sapphire: "Sus poderes psíquicos le permiten controlar vórtices de fuego\na 3000 °C que envuelven y calcinan a sus enemigos."
        ko:
          omega_ruby: "지팡이 끝의 타오르는 불꽃을\n바라보며 정신을 통일하면\n미래에 일어날 일을 내다볼 수 있다."
          alpha_sapphire: "섭씨 3000도의 불꽃 소용돌이를\n초능력으로 조종한다.\n적을 소용돌이로 감싸 불태운다."
froakie:
  species_id: 656
  names:
    jp_kana: ケロマツ
