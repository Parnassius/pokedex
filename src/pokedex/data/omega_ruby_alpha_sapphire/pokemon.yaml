      types:
        - ground
        - flying
      egg_groups:
        - bug
      abilities:
        - hyper_cutter
        - sand_veil
      hidden_ability: poison_heal
      descriptions:
        jp_kana:
          omega_ruby: "しっぽで　きのえだに　ぶらさがり\nえものを　かんさつする。すきを\nみて　じょうくうから　おそいかかる。"
          alpha_sapphire: "はおとを　たてずに　そらを　とぶ。\nながい　しっぽで　えものを　つかまえ\nキバで　きゅうしょを　ひとつき。"
        jp_kanji:
          omega_ruby: "尻尾で　木の枝に　ぶら下がり\n獲物を　観察する。すきを　見て\n上空から　襲いかかる。"
          alpha_sapphire: "羽音を　立てずに　空を　飛ぶ。\n長い　尻尾で　獲物を　捕まえ\nキバで　急所を　一突き。"
        en:
          omega_ruby: "It observes prey while hanging inverted from\nbranches. When the chance presents itself,\nit swoops!"
          alpha_sapphire: "Its flight is soundless. It uses its lengthy tail to\ncarry off its prey... Then its elongated fangs do\nthe rest."
        fr:
          omega_ruby: "Il guette sa proie, pendu à une branche la tête en bas,\net s’en saisit à la première occasion."
          alpha_sapphire: "Il vole sans un bruit, et capture ses proies avec sa queue\npour leur infliger une morsure critique."
        it:
          omega_ruby: "Sta appeso ai rami con la testa in giù. Alla prima occasione,\nsi butta a capofitto sulla preda."
          alpha_sapphire: "Vola senza far rumore. Afferra le prede con la lunga coda\ne perfora il loro punto vitale con i canini."
        de:
          omega_ruby: "Es hängt kopfüber von einem Ast und beobachtet seine Beute.\nBei Gelegenheit stürzt es sich auf sie."
          alpha_sapphire: "Es fliegt völlig lautlos. Erst fängt es seine Beute mit seinem\nlangen Schweif, dann saugt es sie aus."
        es:
          omega_ruby: "Espera a sus presas colgado de una rama bocabajo. Cuando\nllega su oportunidad, se lanza en picado."
          alpha_sapphire: "Vuela sin hacer nada de ruido. Con su larga cola captura a\nsus presas y las muerde con sus colmillos."
        ko:
          omega_ruby: "꼬리로 나뭇가지에 매달려\n먹이를 관찰한다. 틈을\n봐서 상공에서 덮친다."
          alpha_sapphire: "날갯소리를 내지 않고 하늘을 난다.\n긴 꼬리로 먹이를 잡아\n송곳니로 급소를 공격한다."
