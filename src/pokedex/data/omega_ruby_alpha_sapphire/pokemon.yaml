          alpha_sapphire: "より　くさい　クサイハナから　しんかした　ほうが\nきれいな　はなを　つけた　キレイハナに　なるよ。\nよるに　なると　はなびらを　つぼめて　ねむる。"
        jp_kanji:
          omega_ruby: "太陽の　光を　いっぱい　浴びると\n体の　葉っぱが　くるくる　回り　始める。\nキレイハナの　ダンスは　南国の　名物だ。"
          alpha_sapphire: "より　臭い　クサイハナから　進化した　ほうが\nきれいな　花を　つけた　キレイハナに　なるよ。\n夜に　なると　花びらを　つぼめて　眠る。"
        en:
          omega_ruby: "When Bellossom gets exposed to plenty of sunlight, the leaves\nringing its body begin to spin around. This Pokémon’s dancing\nis renowned in the southern lands."
          alpha_sapphire: "A Bellossom grows flowers more beautifully if it has evolved\nfrom a smelly Gloom—the more stinky the better. At night, this\nPokémon closes its petals and goes to sleep."
        fr:
          omega_ruby: "Lorsque Joliflor reste exposé à la lumière du soleil, les feuilles\nautour de son corps se mettent à tournoyer. La danse de ce\nPokémon est très célèbre dans les régions du sud."
          alpha_sapphire: "Les fleurs de Joliflor sont encore plus jolies s’il s’agit\nd’une évolution d’un Ortide qui sentait vraiment très mauvais.\nLa nuit, ce Pokémon ferme ses pétales pour dormir."
        it:
          omega_ruby: "Quando Bellossom si espone al sole, le foglie che circondano\nil suo corpo iniziano a girare vorticosamente.\nLa danza di questo Pokémon è nota nelle regioni meridionali."
          alpha_sapphire: "I fiori di Bellossom sono tanto più belli quanto più forte\nè il puzzo del Gloom da cui si evolve!\nQuando la sera chiude i petali significa che se ne va a dormire."
        de:
          omega_ruby: "Wenn Blubella starkem Sonnenlicht ausgesetzt ist, beginnen\nsich die Blätter an seinem Körper zu drehen. Der Tanz dieses\nPokémon ist in südlichen Ländern sehr bekannt."
          alpha_sapphire: "Blubella wachsen schönere Blumen, wenn es sich aus\neinem übel riechenden Duflor entwickelt hat – je stinkender,\ndesto besser. Nachts schließt dieses Pokémon seine Blätter\nund schläft."
        es:
          omega_ruby: "Cuando Bellossom se expone a gran cantidad de luz solar, le\nempiezan a girar las hojas que le rodean. La danza de este\nPokémon es famosa en las zonas del sur."
          alpha_sapphire: "La belleza de las flores que le crecen a Bellossom depende\nde lo mal que oliera el Gloom a partir del cual evolucionó.\nA mayor hedor, mayor belleza. Por la noche, este Pokémon\ncierra los pétalos y se echa a dormir."
        ko:
          omega_ruby: "태양의 빛을 잔뜩 받으면\n몸의 잎사귀가 빙글빙글 돌기 시작한다.\n아르코의 춤은 남쪽 나라의 명물이다."
          alpha_sapphire: "좀 더 악취를 풍기는 냄새꼬 쪽이\n진화하면 아름다운 꽃을 피운 아르코가 된다.\n밤이 되면 꽃잎을 오므리고 잔다."
