      descriptions:
        jp_kana:
          omega_ruby: "２ひきの　カメテテが　ひとつの\nいわで　くらす。ケンカすると\nどちらかが　ほかの　いわに　うつる。"
          alpha_sapphire: "からだを　のばす　はんどうで　いわを\nもちあげて　あるく。なみうちぎわで\nながされてきた　かいそうを　たべる。"
        jp_kanji:
          omega_ruby: "２匹の　カメテテが　ひとつの　岩で\n暮らす。ケンカすると　どちらかが\n他の　岩に　移る。"
          alpha_sapphire: "体を　伸ばす　反動で　岩を\n持ち上げて　歩く。波打ち際で\n流されてきた　海藻を　食べる。"
        en:
          omega_ruby: "Two Binacle live together on one rock.\nWhen they fight, one of them will move\nto a different rock."
          alpha_sapphire: "They stretch and then contract, yanking their\nrocks along with them in bold hops. They eat\nseaweed that washes up on the shoreline."
        fr:
          omega_ruby: "Chaque rocher abrite deux Opermine. S’ils se disputent,\nl’un d’entre eux part à la recherche d’un nouveau logis."
          alpha_sapphire: "Ils prennent de l’élan avec tout leur corps et soulèvent ainsi\nleur pierre pour se déplacer. Ils mangent les algues échouées\nsur le rivage."
        it:
          omega_ruby: "I Binacle vivono su una roccia. Quando litigano, uno dei due\nfinisce per spostarsi su una pietra diversa."
          alpha_sapphire: "Si muovono allungando il corpo a turno, in modo da sollevare\nla pietra. Si nutrono di alghe portate a riva dalle onde."
        de:
          omega_ruby: "Bithora bewohnen jeweils zu zweit einen Felsen. Entzweien sie\nsich im Streit, sucht sich eines der beiden einen neuen Felsen\nals Unterkunft."
          alpha_sapphire: "Sie bewegen sich fort, indem sie durch Strecken beider\nExtremitäten ihren Felsen anheben. Sie ernähren sich\nvon Seetang, der an die Küste gespült wurde."
        es:
          omega_ruby: "Dos Binacle conviven en la misma roca, pero cuando se\nproduce un altercado entre ambos, uno de ellos se muda\na otra."
          alpha_sapphire: "El impulso que cogen al erguirse les permite levantar su roca\ny caminar. Se alimentan de las algas que la marea arrastra\nhasta la orilla."
        ko:
          omega_ruby: "2마리의 거북손손이 하나의\n바위에서 산다. 서로 싸우면\n한쪽이 다른 바위로 옮겨 간다."
          alpha_sapphire: "몸을 늘린 반동으로 바위를\n들어 올리며 걷는다. 물가로\n흘러들어온 해조를 먹는다."
barbaracle:
  species_id: 689
  names:
    jp_kana: ガメノデス
    jp_kanji: ガメノデス
    en: Barbaracle
    fr: Golgopathe
