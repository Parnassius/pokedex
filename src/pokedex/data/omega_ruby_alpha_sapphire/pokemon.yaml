      descriptions:
        jp_kana:
          omega_ruby: "おそわれると　からだから　わたを\nとばす。てきが　わたを　モンメンと\nまちがえている　すきに　にげるのだ。"
          alpha_sapphire: "しゅうだんで　いると　おちつくのか\nなかまを　みつけると　くっついて\nいつのまにか　くものように　なる。"
        jp_kanji:
          omega_ruby: "襲われると　体から　綿を　飛ばす。\n敵が　綿を　モンメンと\n間違えている　すきに　逃げるのだ。"
          alpha_sapphire: "集団で　いると　落ち着くのか\n仲間を　みつけると　くっついて\nいつのまにか　雲のように　なる。"
        en:
          omega_ruby: "When attacked, it escapes by shooting cotton from\nits body. The cotton serves as a decoy to distract\nthe attacker."
          alpha_sapphire: "Perhaps because they feel more at ease in a group,\nthey stick to others they find. They end up looking\nlike a cloud."
        fr:
          omega_ruby: "Si on l’attaque, il projette un nuage de coton.\nL’ennemi le confond avec lui, ce qui permet à\nDoudouvet de s’enfuir."
          alpha_sapphire: "Pokémon à l’instinct grégaire, ils se collent les uns aux autres\net finissent par former un gros nuage."
        it:
          omega_ruby: "Se viene attaccato crea una nuvola di cotone per confondere\nil nemico, poi ne approfitta per fuggire."
          alpha_sapphire: "Si sentono più sicuri in gruppo, e quando incontrano i loro\nsimili non li lasciano più formando come una grande nuvola."
        de:
          omega_ruby: "Wird es angegriffen, verstreut es zur Täuschung Watte.\nEs flieht, während der Gegner nach dem wahren Waumboll\nsucht."
          alpha_sapphire: "Sind sie mit Freunden unterwegs, hängen sie eng aufeinander\nwie Wolken, wohl weil sie sich in der Gruppe sicherer fühlen."
        es:
          omega_ruby: "Despide motas de algodón cuando lo atacan para confundir a\nlos enemigos y poner pies en polvorosa."
          alpha_sapphire: "Quizá por el hecho de que se relajan al estar con los suyos,\nforman un grupo al encontrar amigos y parecen nubes."
        ko:
          omega_ruby: "공격당하면 몸에서 솜을\n날린다. 상대가 솜을 소미안으로\n착각하고 있는 동안 도망친다."
          alpha_sapphire: "집단으로 있으면 편안한지\n동료를 발견하면 달라붙어\n어느새 구름처럼 된다."
whimsicott:
