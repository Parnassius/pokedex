          alpha_sapphire: "からだが　ヌルヌルの　まくで　おおわれているので\nてきに　つかまれても　ヌルリと　にげだせるのだ。\nヌルヌルが　かわくと　からだが　よわってしまう。"
        jp_kanji:
          omega_ruby: "敏感な　ヒゲは　優れた　レーダーだ。\nドロの　中から　２本の　ヒゲだけを　出して\n獲物が　近寄ってくるのを　待ち構えている。"
          alpha_sapphire: "体が　ヌルヌルの　膜で　覆われているので\n敵に　捕まれても　ヌルリと　逃げ出せるのだ。\nヌルヌルが　乾くと　体が　弱ってしまう。"
        en:
          omega_ruby: "Barboach’s sensitive whiskers serve as a superb radar system.\nThis Pokémon hides in mud, leaving only its two whiskers\nexposed while it waits for prey to come along."
          alpha_sapphire: "Barboach’s body is covered with a slimy film. If a foe grabs it,\nthis Pokémon just slips out of the enemy’s grip. This Pokémon\ngrows weak if the slimy coating dries up."
        fr:
          omega_ruby: "Les vibrisses sensibles de Barloche agissent comme\nun système radar sophistiqué. Ce Pokémon se cache\ndans la boue, laissant dépasser ses vibrisses, et attend\nque sa proie passe à proximité."
          alpha_sapphire: "Le corps de Barloche est couvert d’un voile visqueux.\nLorsqu’un ennemi l’attrape, ce Pokémon peut se glisser\nhors de son étreinte. Il s’affaiblit quand la pellicule\nvisqueuse de son corps s’assèche."
        it:
          omega_ruby: "I sensibili baffi di Barboach fungono da sistema radar\nprecisissimo. Il Pokémon vive nel fango, lasciando\nesposti soltanto i due baffi mentre attende pazientemente\nche si avvicini la preda."
          alpha_sapphire: "Il corpo di Barboach è coperto da una pellicola viscida.\nSe un nemico cerca di afferrarlo, il Pokémon gli scivola\nvia dalle grinfie. Se la pellicola viscida si secca, Barboach\nsi indebolisce."
        de:
          omega_ruby: "Schmerbes empfindliche Barthaare dienen ihm als\nhervorragendes Radarsystem. Dieses Pokémon versteckt sich\nim Schlamm, sodass nur noch seine Barthaare herausgucken,\nund wartet auf Beute."
          alpha_sapphire: "Schmerbes Körper ist mit einem schleimigen Film bedeckt.\nWenn ein Gegner es packen will, entgeht es seinem Griff.\nDieses Pokémon wird geschwächt, wenn sein schleimiger\nÜberzug austrocknet."
        es:
          omega_ruby: "Barboach tiene unos bigotes sensibles que le sirven de\ninfalible radar. Este Pokémon se sumerge en lodo y solo deja\nlos bigotes por fuera de la superficie, al acecho, mientras\nespera a que llegue su presa."
          alpha_sapphire: "Barboach está completamente recubierto por una película\nviscosa. Si lo atrapan, puede escurrirse fácilmente. Si se le\nseca la capa viscosa, este Pokémon se debilitará."
        ko:
          omega_ruby: "민감한 수염은 우수한 레이더다.\n진흙 속에서 2개의 수염만을 내놓고\n먹이가 가까이 오는 것을 기다리고 있다."
          alpha_sapphire: "몸이 미끈미끈한 막으로 덮여 있어서\n적에게 붙잡혀도 매끄럽게 도망칠 수 있다.\n미끈미끈한 막이 마르면 몸이 약해진다."
whiscash:
  species_id: 340
  names:
    jp_kana: ナマズン
    jp_kanji: ナマズン
    en: Whiscash
    fr: Barbicha
    it: Whiscash
    de: Welsar
    es: Whiscash
    ko: 메깅
  forms:
    whiscash:
      form_id: 0
      base_stats:
        hp: 110
        attack: 78
        defense: 73
        special_attack: 76
        special_defense: 71
        speed: 60
      evs_yield:
        hp: 2
        attack: 0
