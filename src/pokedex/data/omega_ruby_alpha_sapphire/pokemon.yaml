        jp_kana:
          omega_ruby: "きたえあげた　きんにくは　はがねの　かたさ。\nすもうとりの　からだも　ゆび　１ぽんで　らくらく\nもちあげてしまう　かいりきの　ポケモンだ。"
          alpha_sapphire: "にんげんの　ちからしごとを　てつだいながら\nからだを　まいにち　きたえている　ポケモン。\nやすみの　ひには　のやまで　からだを　きたえる。"
        jp_kanji:
          omega_ruby: "鍛えあげた　筋肉は　鋼の　硬さ。\n相撲取りの　体も　指　１本で　楽々\n持ちあげてしまう　怪力の　ポケモンだ。"
          alpha_sapphire: "人間の　力仕事を　手伝いながら\n体を　毎日　鍛えている　ポケモン。\n休みの　日には　野山で　体を　鍛える。"
        en:
          omega_ruby: "Machoke’s thoroughly toned muscles possess the hardness\nof steel. This Pokémon has so much strength, it can easily\nhold aloft a sumo wrestler on just one finger."
          alpha_sapphire: "Machoke undertakes bodybuilding every day even as\nit helps people with tough, physically demanding labor.\nOn its days off, this Pokémon heads to the fields and\nmountains to exercise and train."
        fr:
          omega_ruby: "Les muscles toniques de Machopeur sont durs comme\nde l’acier. Ce Pokémon est si fort qu’il peut facilement\nsoulever un sumo avec un seul doigt."
          alpha_sapphire: "Machopeur pratique le body-building tous les jours,\nmême lorsqu’il aide les gens à réaliser de durs travaux.\nPendant ses congés, ce Pokémon va s’entraîner dans\nles champs et les montagnes."
        it:
          omega_ruby: "I muscoli perfettamente tonici di Machoke possiedono\nla durezza dell’acciaio. Questo Pokémon è così forte\nda riuscire a sollevare un lottatore di sumo con un dito."
          alpha_sapphire: "Machoke si allena ogni giorno con esercizi di body building,\naiutando l’uomo nei lavori fisicamente pesanti. Nei giorni\ndi riposo, si reca in campagna o in montagna per allenarsi\nancora."
        de:
          omega_ruby: "Maschocks starke Muskeln sind so hart wie Stahl.\nDieses Pokémon hat so viel Kraft, dass es mit nur\neinem Finger einen Sumo-Ringer in der Luft halten kann."
          alpha_sapphire: "Maschock stählt seinen Körper jeden Tag, zum Beispiel\nindem es Menschen bei einer harten körperlichen Arbeit hilft.\nAn seinen freien Tagen begibt es sich auf Felder und Berge,\num zu trainieren."
        es:
          omega_ruby: "Los entrenados músculos de Machoke son tan fuertes como el\nacero. Este Pokémon es tan fuerte que puede levantar con un\nsolo dedo a un luchador de sumo."
          alpha_sapphire: "Machoke realiza sesiones de culturismo todos los días.\nDe entrenamiento le sirven también las veces que ayuda a\nla gente en tareas de esfuerzo físico. En sus días libres, va\nal campo o a la montaña para hacer más ejercicio."
        ko:
          omega_ruby: "잘 단련된 근육은 강철처럼 단단하다.\n씨름 선수의 몸을 손가락 1개로 쉽게\n들어 올릴 수 있는 괴력의 포켓몬이다."
          alpha_sapphire: "힘이 많이 드는 인간의 일을 도와주며\n매일 몸을 단련하는 포켓몬이다.\n쉬는 날에는 산야에서 몸을 단련한다."
