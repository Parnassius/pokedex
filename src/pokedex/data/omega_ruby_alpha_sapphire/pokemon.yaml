      descriptions:
        jp_kana:
          omega_ruby: "くらい　もりや　ほらあなで　くらす。\nはなの　あなから　ちょうおんぱを\nだして　あたりの　ようすを　さぐる。"
          alpha_sapphire: "コロモリの　はなを　おしつけた\nところに　ハートがたの　あとがつくと\nいいことが　おこると　いわれている。"
        jp_kanji:
          omega_ruby: "暗い　森や　洞穴で　暮らす。\n鼻の　穴から　超音波を　出して\nあたりの　様子を　探る。"
          alpha_sapphire: "コロモリの　鼻を　押しつけた\nところに　ハート形の　跡がつくと\nいいことが　起こると　言われている。"
        en:
          omega_ruby: "Its habitat is dark forests and caves. It emits\nultrasonic waves from its nose to learn about\nits surroundings."
          alpha_sapphire: "The heart-shaped mark left on a body after a\nWoobat has been attached to it is said to bring\ngood fortune."
        fr:
          omega_ruby: "Il vit dans les forêts sombres et les grottes. Il émet\ndes ultrasons par le nez pour se diriger."
          alpha_sapphire: "Son nez est comme une ventouse. Il laisse une marque\nen forme de cœur qui, paraît-il, porte bonheur."
        it:
          omega_ruby: "Vive nelle foreste buie o nelle caverne. Sonda l’ambiente\ncircostante emettendo degli ultrasuoni dalle narici."
          alpha_sapphire: "Quando preme il naso contro il corpo di qualcuno lascia un\nsegno a forma di cuore che, dicono, porta fortuna."
        de:
          omega_ruby: "Wohnt in dunklen Wäldern und Höhlen. Es sendet\nUltraschallwellen mit seiner Nase aus, um die Gegend\nabzutasten."
          alpha_sapphire: "Es verheißt Glück, wenn sich ein Fleknoil an einem Menschen\nfestsaugt und auf ihm einen herzförmigen Fleck hinterlässt."
        es:
          omega_ruby: "Vive en bosques oscuros y cavernas. Emite ultrasonidos por\nla nariz para saber todo lo que pasa a su alrededor."
          alpha_sapphire: "Se dice que la marca con forma de corazón que deja un\nWoobat al incrustar su nariz trae buena suerte."
        ko:
          omega_ruby: "어두운 숲이나 동굴에서 산다.\n콧구멍에서 초음파를 쏘아\n주변의 모습을 살핀다."
          alpha_sapphire: "또르박쥐의 코가 닿은 곳에\n하트 모양의 자국이 나면\n좋은 일이 일어난다고 전해진다."
swoobat:
