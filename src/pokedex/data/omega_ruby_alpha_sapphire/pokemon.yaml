          alpha_sapphire: "だいすきな　トレーナーの　うでに\nリボンのような　しょっかくを\nまきつけて　いっしょに　あるく。"
        jp_kanji:
          omega_ruby: "リボンのような　触覚から\n気持ちを　和らげる　波動を　送りこみ\n戦いを　やめさせる。"
          alpha_sapphire: "大好きな　トレーナーの　腕に\nリボンのような　触覚を　巻きつけて\n一緒に　歩く。"
        en:
          omega_ruby: "It sends a soothing aura from its\nribbonlike feelers to calm fights."
          alpha_sapphire: "It wraps its ribbonlike feelers around\nthe arm of its beloved Trainer\nand walks with him or her."
        fr:
          omega_ruby: "Pour arrêter le combat, il émet des ondes apaisantes\navec ses rubans."
          alpha_sapphire: "Il enroule ses rubans sensoriels autour du bras de son\nDresseur adoré et chemine paisiblement à ses côtés."
        it:
          omega_ruby: "Le sue antenne simili a fiocchetti emettono onde dagli effetti\nrilassanti, grazie alle quali fa cessare le lotte."
          alpha_sapphire: "Se si affeziona particolarmente al suo Allenatore, lo\naccompagna circondandogli amorevolmente il braccio\ncon le sue antenne a forma di fiocchetto."
        de:
          omega_ruby: "Seinen bandförmigen Fühlern lässt es beruhigende Wellen\nentströmen, die das Ende von Kämpfen herbeiführen."
          alpha_sapphire: "Es umwickelt den Arm seines geliebten Trainers mit seinen\nbandförmigen Fühlern und geht so mit ihm spazieren."
        es:
          omega_ruby: "A través de sus apéndices sensitivos con forma de cinta,\nemite unas ondas tranquilizadoras mediante las cuales\ndetiene los combates."
          alpha_sapphire: "Enrolla sus apéndices sensoriales con forma de cinta en los\nbrazos de su querido Entrenador cuando caminan juntos."
        ko:
          omega_ruby: "리본 모양의 더듬이에서\n마음을 온화하게 하는 파동을\n보내 싸움을 그만두게 한다."
          alpha_sapphire: "좋아하는 트레이너의 팔에\n리본 모양의 더듬이를\n감고 함께 걷는다."
hawlucha:
