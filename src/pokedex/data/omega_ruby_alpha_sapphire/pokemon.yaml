      descriptions:
        jp_kana:
          omega_ruby: "ちかづいた　にんげんを　のみこんで\nミイラに　してしまうという　うわさ。\nきんかいを　このんで　たべる。"
          alpha_sapphire: "ほんものの　かんおけと　まちがえ\nちかよってきた　はかドロボウを\nからだの　なかに　とじこめてしまう。"
        jp_kanji:
          omega_ruby: "近づいた　人間を　飲みこんで\nミイラに　してしまうという　ウワサ。\n金塊を　好んで　食べる。"
          alpha_sapphire: "本物の　かんおけと　間違え\n近寄ってきた　墓ドロボウを\n体の　中に　閉じこめてしまう。"
        en:
          omega_ruby: "It has been said that they swallow those who get\ntoo close and turn them into mummies. They like to\neat gold nuggets."
          alpha_sapphire: "Grave robbers who mistake them for real coffins and\nget too close end up trapped inside their bodies."
        fr:
          omega_ruby: "Il paraît qu’il avale les gens et les transforme en momies.\nIl adore manger des lingots d’or."
          alpha_sapphire: "Il prend l’apparence d’un beau cercueil. Les pilleurs de tombes\nimprudents finissent enfermés à l’intérieur."
        it:
          omega_ruby: "Si dice che inghiottisca le prede che gli si avvicinano e le\ntrasformi in mummie. Gli piace mangiare le pepite d’oro."
          alpha_sapphire: "Imprigiona nel suo corpo i razziatori di tombe che gli vanno\nvicino pensando che si tratti di un sarcofago vero."
        de:
          omega_ruby: "Angeblich verschlingt es jeden, der sich ihm auch nur nähert.\nBesonders gern frisst es Klumpen aus reinem Gold."
          alpha_sapphire: "Grabräuber, die es mit einem echten Sarg verwechseln und ihm\nzu nahe kommen, hält es im Inneren seines Körpers gefangen."
        es:
          omega_ruby: "Se comenta que engulle a todo humano que se le acerca y lo\nmomifica. Su comida favorita son las pepitas de oro."
          alpha_sapphire: "Atrapan en su interior a los ladrones de tumbas que los\nconfunden con ataúdes de verdad."
        ko:
          omega_ruby: "가까이 다가온 인간을 삼켜서\n미라로 만든다는 소문이 있다.\n금괴를 즐겨 먹는다."
          alpha_sapphire: "진짜 관과 착각해서\n다가온 도굴꾼을\n몸속에 가둬버린다."
