          alpha_sapphire: "カブルモと　ともに　でんきてきな\nエネルギーを　あびると　しんかする。\nりゆうは　かいめいされていない。"
        jp_kanji:
          omega_ruby: "カブルモと　一緒に　いるときに\n電気的な　刺激を　受けると\nお互いの　体が　進化する。"
          alpha_sapphire: "カブルモと　ともに　電気的な\nエネルギーを　浴びると　進化する。\n理由は　解明されていない。"
        en:
          omega_ruby: "When it and Karrablast are together, and both\nreceive electrical stimulation, they both evolve."
          alpha_sapphire: "It evolves when bathed in an electric-like energy\nalong with Karrablast. The reason is still unknown."
        fr:
          omega_ruby: "S’il est à proximité d’un Carabing et que les deux reçoivent\nune décharge électrique, ils évoluent en même temps."
          alpha_sapphire: "Il évolue quand il baigne dans une énergie électrique\navec un Carabing. La cause en est inconnue."
        it:
          omega_ruby: "Quando incontra Karrablast si crea della corrente elettrica\nche stimola entrambi i Pokémon causandone l’evoluzione."
          alpha_sapphire: "Se riceve una scarica elettrica assieme a Karrablast, si evolve.\nIl motivo non è chiaro."
        de:
          omega_ruby: "Hält sich ein Laukaps in seiner Nähe auf und kommen beide\nmit Strom in Berührung, entwickeln sie sich."
          alpha_sapphire: "Führt man ihm zusammen mit Laukaps elektrische Energie zu,\nentwickelt es sich. Niemand kennt den Grund dafür."
        es:
          omega_ruby: "Si está junto a Karrablast, y ambos reciben una descarga\neléctrica, evolucionan los dos a la vez."
          alpha_sapphire: "Evoluciona si entra en contacto con energía eléctrica junto a\nKarrablast. Aún no se ha esclarecido el porqué."
        ko:
          omega_ruby: "딱정곤과 함께 있을 때\n전기적인 자극을 받으면\n서로의 몸이 진화한다."
          alpha_sapphire: "딱정곤과 함께 전기적인\n에너지를 받으면 진화한다.\n그 이유는 알려지지 않았다."
accelgor:
  species_id: 617
  names:
    jp_kana: アギルダー
    jp_kanji: アギルダー
    en: Accelgor
    fr: Limaspeed
    it: Accelgor
    de: Hydragil
    es: Accelgor
    ko: 어지리더
  forms:
    accelgor:
      form_id: 0
      base_stats:
        hp: 80
        attack: 70
        defense: 40
        special_attack: 100
        special_defense: 60
        speed: 145
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - hydration
        - sticky_hold
      hidden_ability: unburden
      descriptions:
        jp_kana:
          omega_ruby: "おもい　カラを　ぬいだために\nみがるになった。まるで　にんじゃの\nような　みのこなしで　たたかう。"
          alpha_sapphire: "からだが　かわくと　よわってしまう。\nうすい　まくを　なんじゅうも　まいて\nかんそうを　ふせいでいるのだ。"
        jp_kanji:
          omega_ruby: "重い　殻を　脱いだために\n身軽になった。まるで　忍者のような\n身のこなしで　戦う。"
          alpha_sapphire: "体が　乾くと　弱ってしまう。\n薄い　膜を　何重も　巻いて\n乾燥を　防いでいるのだ。"
        en:
          omega_ruby: "Having removed its heavy shell, it becomes very\nlight and can fight with ninja-like movements."
          alpha_sapphire: "When its body dries out, it weakens. So, to prevent\ndehydration, it wraps itself in many layers of\nthin membrane."
        fr:
          omega_ruby: "Il s’est bien allégé en se débarrassant de sa lourde carapace.\nIl se bat avec l’agilité d’un ninja."
          alpha_sapphire: "Quand son corps s’assèche, il faiblit. Il s’en prémunit\nen s’enroulant dans plusieurs couches d’une fine muqueuse."
        it:
          omega_ruby: "Liberatosi della pesante conchiglia, è diventato leggero.\nLotta con le movenze proprie di un ninja."
          alpha_sapphire: "Si indebolisce quando il corpo si secca. Previene\nl’essiccazione avvolgendosi in molti strati di sottili\nmembrane."
        de:
          omega_ruby: "Seit es die schwere Muschel abgestreift hat, ist es viel leichter.\nNun gleichen seine Kampfbewegungen denen eines Ninja."
          alpha_sapphire: "Da es ohne Flüssigkeit an Kraft verliert, schützt es sich mit\nmehreren dünnen Hautschichten vor dem Austrocknen."
        es:
          omega_ruby: "Se siente ligero una vez liberado de su caparazón. Lucha y se\nmueve como un ninja."
          alpha_sapphire: "Los ambientes secos lo debilitan. Evita la sequedad\nenvolviéndose en muchas membranas finas superpuestas."
        ko:
          omega_ruby: "무거운 껍데기를 벗었기 때문에\n몸이 가벼워졌다. 마치 닌자 같은\n몸놀림으로 싸운다."
          alpha_sapphire: "몸이 마르면 약해진다.\n얇은 막을 몇 겹이나 두르고\n건조해지는 것을 막고 있다."
stunfisk:
  species_id: 618
  names:
    jp_kana: マッギョ
    jp_kanji: マッギョ
    en: Stunfisk
    fr: Limonde
    it: Stunfisk
    de: Flunschlik
    es: Stunfisk
    ko: 메더
  forms:
    stunfisk:
      form_id: 0
      base_stats:
        hp: 109
        attack: 66
        defense: 84
        special_attack: 81
        special_defense: 99
        speed: 32
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - electric
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - static
        - limber
      hidden_ability: sand_veil
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          omega_ruby: "ひふが　かたいので　すもうとりに\nふまれても　へいき。でんきを\nながすとき　わらいがおに　なる。"
          alpha_sapphire: "うみべの　どろに　うまって　えものを\nまちかまえる。えものが　さわったとき\nでんきを　だして　しびれさせるのだ。"
        jp_kanji:
          omega_ruby: "皮膚が　硬いので\n相撲取りに　踏まれても　平気。\n電気を　流すとき　笑い顔に　なる。"
          alpha_sapphire: "海辺の　泥に　埋まって　獲物を\n待ち構える。獲物が　触ったとき\n電気を　出して　しびれさせるのだ。"
        en:
          omega_ruby: "Its skin is very hard, so it is unhurt even if stepped\non by sumo wrestlers. It smiles when\ntransmitting electricity."
          alpha_sapphire: "It conceals itself in the mud of the seashore.\nThen it waits. When prey touch it, it delivers a jolt\nof electricity."
        fr:
          omega_ruby: "Sa peau est si dure qu’il peut se faire piétiner par un sumo\nsans rien sentir. Il sourit en émettant de l’électricité."
          alpha_sapphire: "Tapi dans la boue ou les sédiments, il attend sa proie\npatiemment et la paralyse avec une décharge électrique."
        it:
          omega_ruby: "Ha la pelle così dura che un lottatore di sumo potrebbe\ncalpestarlo senza fargli male. L’elettricità gli fa il solletico."
          alpha_sapphire: "Attende al varco le prede, sepolto nel fango in riva al mare.\nSe lo sfiorano, le paralizza con una scarica elettrica."
        de:
          omega_ruby: "Dank seiner dicken Haut hält es selbst das Gewicht eines\nSumoringers aus. Wenn es Stromschläge verteilt, grinst es."
          alpha_sapphire: "Es vergräbt sich im Morast am Meeresboden. Wird es von\nseiner Beute gestreift, lähmt es sie mit Strom."
        es:
          omega_ruby: "Ni un pisotón de un luchador de sumo lo aplastaría gracias a\nsu piel sólida. Sonríe al soltar descargas eléctricas."
          alpha_sapphire: "Acecha a sus presas oculto en la arena húmeda de la playa.\nLas paraliza con una descarga eléctrica cuando lo tocan."
        ko:
          omega_ruby: "피부가 단단해서 씨름꾼에게\n밟혀도 아무렇지 않다. 전기를\n흘려보낼 때 웃는 얼굴이 된다."
          alpha_sapphire: "바닷가 펄 속에 묻혀 먹이를\n기다린다. 먹이가 몸에 닿으면\n전기를 써서 마비시킨다."
mienfoo:
