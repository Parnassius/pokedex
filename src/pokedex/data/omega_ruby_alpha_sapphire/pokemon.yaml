      descriptions:
        jp_kana:
          omega_ruby: "からだに　はえた　はっぱは　するどい　きれあじ。\nすばやい　みのこなしで　きの　えだを　とびまわり\nてきの　ずじょうや　はいごから　おそいかかるぞ。"
          alpha_sapphire: "せなかの　タネには　じゅもくを　げんきにする\nえいようが　たくさん　つまっていると　いわれる。\nもりの　きを　だいじに　そだてている　ポケモン。"
        jp_kanji:
          omega_ruby: "体に　生えた　葉っぱは　鋭い　切れ味。\n素早い　身のこなしで　木の　枝を　飛び回り\n敵の　頭上や　背後から　襲いかかるぞ。"
          alpha_sapphire: "背中の　タネには　樹木を　元気にする\n栄養が　沢山　詰まっていると　いわれる。\n森の　木を　大事に　育てている　ポケモン。"
        en:
          omega_ruby: "The leaves growing on Sceptile’s body are very sharp edged.\nThis Pokémon is very agile—it leaps all over the branches of\ntrees and jumps on its foe from above or behind."
          alpha_sapphire: "Sceptile has seeds growing on its back. They are said to be\nbursting with nutrients that revitalize trees. This Pokémon\nraises the trees in a forest with loving care."
        fr:
          omega_ruby: "Les feuilles qui poussent sur le corps de Jungko sont\nextrêmement tranchantes. Ce Pokémon est très agile.\nIl bondit de branche en branche avant de sauter sur\nson ennemi."
          alpha_sapphire: "Jungko a des graines qui lui poussent sur le dos. On dit\nqu’elles regorgent de nutriments qui revitalisent les arbres.\nCe Pokémon s’occupe des forêts avec amour."
        it:
          omega_ruby: "Le foglie che crescono sul corpo di Sceptile hanno margini\ntaglienti. Questo Pokémon è agilissimo, infatti salta da\nun ramo all’altro e piomba sui nemici sorprendendoli dall’alto."
          alpha_sapphire: "Sulla schiena di Sceptile crescono alcuni semi che si dice\nsiano ricchi di nutrienti per gli alberi. Questo Pokémon\ncoltiva amorevolmente le sue piante nella foresta."
        de:
          omega_ruby: "Die Blätter, die auf Gewaldros Körper wachsen, sind sehr\nscharfkantig. Dieses Pokémon ist sehr agil. Es hüpft von\nAst zu Ast und springt seine Feinde von oben oder hinten an."
          alpha_sapphire: "Auf Gewaldros Rücken wachsen Samen. Darin sind Nährstoffe,\ndie Bäume beleben können. Dieses Pokémon achtet mit viel\nFürsorge darauf, dass die Bäume seines Waldes prächtig\ngedeihen."
        es:
          omega_ruby: "Las hojas que le salen a Sceptile del cuerpo tienen unos\nbordes muy afilados. Este Pokémon es muy ágil, va saltando\nde rama en rama y se lanza sobre el enemigo por la espalda."
          alpha_sapphire: "A Sceptile le crecen en la espalda unas semillas llenas de\nnutrientes que sirven para revitalizar los árboles. De hecho,\nse dedica a cuidarlos con mimo para que crezcan bien."
        ko:
          omega_ruby: "몸에 난 잎사귀는 예리한 칼과 같다.\n빠른 몸놀림으로 나뭇가지를 뛰어다니며\n적의 머리 위나 배후에서 덮친다."
          alpha_sapphire: "등의 씨앗에는 나무를 건강하게 만드는\n영양이 많이 채워져 있다고 전해진다.\n숲의 나무를 소중히 키우고 있는 포켓몬이다."
