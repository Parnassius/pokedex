    jp_kanji: ヘラクロス
    en: Heracross
    fr: Scarhino
    it: Heracross
    de: Skaraborn
    es: Heracross
    ko: 헤라크로스
  forms:
    heracross:
      form_id: 0
      base_stats:
        hp: 80
        attack: 125
        defense: 75
        special_attack: 40
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - fighting
      egg_groups:
        - bug
      abilities:
        - swarm
        - guts
      hidden_ability: moxie
      descriptions:
        jp_kana:
          omega_ruby: "いっちょくせんに　てきの　ふところに　もぐりこみ\nたくましい　ツノで　すくいあげ　なげとばす。\nたいぼくも　ねこそぎ　たおす　ほどの　パワーだ。"
          alpha_sapphire: "てあしの　するどい　ツメが　じめんや　じゅもくに\nふかく　くいこむので　じまんの　ツノで　あいてを\nなげとばす　とき　おもいっきり　ふんばれるのだ。"
        jp_kanji:
          omega_ruby: "一直線に　敵の　懐に　潜り込み\nたくましい　ツノで　すくい上げ　投げ飛ばす。\n大木も　根こそぎ　倒す　ほどの　パワーだ。"
          alpha_sapphire: "手足の　鋭い　ツメが　地面や　樹木に\n深く　食い込むので　自慢の　ツノで　相手を\n投げ飛ばす　とき　思いっきり　踏ん張れるのだ。"
        en:
          omega_ruby: "Heracross charges in a straight line at its foe, slips beneath the\nfoe’s grasp, and then scoops up and hurls the opponent with\nits mighty horn. This Pokémon even has enough power to\ntopple a massive tree."
          alpha_sapphire: "Heracross has sharp claws on its feet. These are planted\nfirmly into the ground or the bark of a tree, giving the\nPokémon a secure and solid footing to forcefully fling away\nfoes with its proud horn."
        fr:
          omega_ruby: "Scarhino charge ses ennemis en ligne droite, se glisse\ndessous, les attrape et les projette violemment d’un coup\nde sa puissante corne. Ce Pokémon est tellement fort\nqu’il pourrait déraciner un arbre."
          alpha_sapphire: "Scarhino est doté de griffes acérées sur ses pieds. Elles se\nplantent fermement dans le sol ou dans l’écorce d’un arbre,\nce qui permet à ce Pokémon d’être bien stable lorsqu’il veut\nprojeter ses ennemis d’un coup de corne."
        it:
          omega_ruby: "Heracross si lancia all’attacco dritto contro il nemico,\nlo afferra con forza, lo solleva in aria e poi lo incorna\nviolentemente scagliandolo lontano.\nRiesce ad abbattere un grosso albero."
          alpha_sapphire: "Heracross è dotato di artigli affilati sulle zampe inferiori,\nche conficca nel terreno o nella corteccia degli alberi per\nguadagnare stabilità mentre incorna violentemente i nemici\ne li scaglia lontano."
        de:
          omega_ruby: "Skaraborn geht direkt auf seinen Gegner los, rutscht auf\nihn zu, um ihn auszuhebeln und mit seinem mächtigen Horn\nwegzuschleudern. Dieses Pokémon hat genug Kraft, um einen\nmassigen Baum umzustoßen."
          alpha_sapphire: "Skaraborn hat scharfe Krallen an den Füßen. Diese bohren sich\nfest in den Boden oder in die Rinde eines Baumes und geben\ndiesem Pokémon einen sicheren Halt. So kann es seine Gegner\nmit seinem imposanten Horn wegschleudern."
        es:
          omega_ruby: "Heracross carga en línea recta contra el enemigo, se le queda\nencajado por debajo, lo agarra y lo lanza con ayuda del fuerte\ncuerno que tiene. Este Pokémon tiene fuerza hasta para echar\nabajo un árbol descomunal."
          alpha_sapphire: "Heracross tiene unas afiladas garras en los pies que se\nclavan con firmeza en la tierra o la corteza de los árboles,\ndando al Pokémon gran estabilidad y seguridad a la hora de\nembestir y herir a su rival con el cuerno que tiene."
        ko:
          omega_ruby: "똑바로 적에게 돌격하여\n강인한 뿔로 들어 올려 내던진다.\n큰 나무도 뿌리째 뽑아 쓰러트릴 만한 파워다."
          alpha_sapphire: "손발의 날카로운 손발톱이 땅이나 나무에\n깊숙이 박히기 때문에 자랑스런 뿔로 상대를\n내던질 때 단단히 버틸 수 있다."
