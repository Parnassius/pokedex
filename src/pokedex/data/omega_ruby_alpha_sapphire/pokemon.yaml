          omega_ruby: "３つの　頭が　別々の　方向を\n向いている　ときは　警戒している　証拠。\nうかつに　近寄ると　くちばしで　突かれるぞ。"
          alpha_sapphire: "３つあるのは　頭だけでは　ないらしい。\n心臓と　肺も　３つなので　息切れしないで\n長い　距離を　走る　ことが　できるのだ。"
        en:
          omega_ruby: "Watch out if Dodrio’s three heads are looking in three separate\ndirections. It’s a sure sign that it is on its guard. Don’t go near\nthis Pokémon if it’s being wary—it may decide to peck you."
          alpha_sapphire: "Apparently, the heads aren’t the only parts of the body that\nDodrio has three of. It has three sets of hearts and lungs as\nwell, so it is capable of running long distances without rest."
        fr:
          omega_ruby: "Il faut se méfier lorsque les trois têtes de Dodrio regardent\ndans des directions différentes. Cela signifie qu’il est sur ses\ngardes. Si c’est le cas, il vaut mieux ne pas s’approcher de ce\nPokémon, il pourrait décider d’attaquer."
          alpha_sapphire: "Apparemment, Dodrio ne se contente pas d’avoir trois têtes.\nIl semble également avoir trois cœurs et six poumons,\nce qui lui permet de courir très longtemps sans s’épuiser."
        it:
          omega_ruby: "Se le tre teste di Dodrio guardano in tre direzioni diverse,\nsignifica che il Pokémon è vigile. In questo stato il Pokémon\nnon va avvicinato, poiché potrebbe decidere di attaccare."
          alpha_sapphire: "Pare che Dodrio non abbia soltanto tre teste, ma anche altri\norgani triplici: ha infatti anche tre cuori e sei polmoni che\ngli consentono di percorrere grandi distanze senza sosta."
        de:
          omega_ruby: "Dodris drei Köpfe blicken in drei verschiedene Richtungen.\nEs ist immer auf der Hut. Du solltest dich diesem Pokémon\nnicht nähern, wenn es bereits misstrauisch ist. Es könnte\nnach dir hacken."
          alpha_sapphire: "Dodri hat nicht nur drei Köpfe, auch andere Körperteile sind\ndreifach vorhanden. Es besitzt drei Herzen und drei Lungen,\nsodass es lange Strecken ohne Pause rennen kann."
        es:
          omega_ruby: "Según parece, las cabezas no son las únicas partes del\ncuerpo que tiene triplicadas. Dodrio también tiene tres\ncorazones y tres pares de pulmones. Con esta constitución,\npuede correr largas distancias sin cansarse."
          alpha_sapphire: "Según parece, las cabezas no son las únicas partes del\ncuerpo que tiene triplicadas. Dodrio también tiene tres\ncorazones y tres pares de pulmones. Con esta constitución,\npuede correr largas distancias sin cansarse."
        ko:
          omega_ruby: "3개의 머리가 서로 다른 방향을\n향하고 있을 때는 경계 중인 증거다.\n섣불리 가까이 가면 부리에 쪼인다."
          alpha_sapphire: "3개 있는 것은 머리뿐이 아닌 것 같다.\n심장과 폐도 3개라서 숨이 가빠지지\n않으며 먼 거리를 달릴 수 있다."
