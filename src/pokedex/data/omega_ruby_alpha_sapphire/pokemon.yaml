        jp_kana:
          omega_ruby: "てきに　おそわれると　ぜんしんの\nうもうから　みずしぶきを　だす。\nみずけむりに　まぎれて　にげるのだ。"
          alpha_sapphire: "とぶよりも　およぐのが　とくいで\nすいちゅうに　もぐっては　だいすきな\nみずゴケを　うれしそうに　たべる。"
        jp_kanji:
          omega_ruby: "敵に　襲われると　全身の　羽毛から\n水しぶきを　出す。\n水煙に　紛れて　逃げるのだ。"
          alpha_sapphire: "飛ぶよりも　泳ぐのが　得意で\n水中に　潜っては　大好きな\n水ゴケを　うれしそうに　食べる。"
        en:
          omega_ruby: "When attacked, it uses its feathers to splash water,\nescaping under cover of the spray."
          alpha_sapphire: "They are better at swimming than flying, and they\nhappily eat their favorite food, peat moss, as they\ndive underwater."
        fr:
          omega_ruby: "Quand on l’attaque, il s’ébroue et fait jaillir de la vapeur d’eau\nde tout son corps. Il se cache dedans pour s’enfuir."
          alpha_sapphire: "Un Pokémon doué pour la plongée qui passe son temps\nsous l’eau à chercher des sphaignes, son plat préféré."
        it:
          omega_ruby: "Quando viene attaccato schizza acqua da tutte le piume\ndel corpo. Fugge dileguandosi in una nuvola di spruzzi."
          alpha_sapphire: "È più ferrato nel nuoto che nel volo. Si immerge nell’acqua\nper mangiare i licheni marini di cui va matto."
        de:
          omega_ruby: "Gerät es in Gefahr, versprüht es Wasser aus seinem Federkleid\nund nutzt den Sprühregen, um Reißaus zu nehmen."
          alpha_sapphire: "Es schwimmt besser, als es fliegen kann. Am liebsten taucht es\nins kühle Nass ab, um Torfmoos, seine Leibspeise, zu essen."
        es:
          omega_ruby: "Cuando se ve atacado, las plumas que lo recubren despiden\nráfagas de agua que lo ayudan a escapar."
          alpha_sapphire: "Nada a mayor velocidad de la que puede volar. Se sumerge\nen el agua para buscar musgo acuático, su comida favorita."
        ko:
          omega_ruby: "상대에게 공격당하면 전신의\n깃털에서 물보라를 내뿜는다.\n물안개에 숨어들어 도망친다."
          alpha_sapphire: "나는 것보다 헤엄치는 것이 특기로\n수중에 잠수해서는 제일 좋아하는\n물이끼를 기쁘게 먹는다."
swanna:
  species_id: 581
  names:
    jp_kana: スワンナ
    jp_kanji: スワンナ
    en: Swanna
    fr: Lakmécygne
    it: Swanna
    de: Swaroness
    es: Swanna
    ko: 스완나
  forms:
    swanna:
      form_id: 0
      base_stats:
        hp: 75
        attack: 87
        defense: 63
        special_attack: 87
        special_defense: 63
        speed: 98
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
