      descriptions:
        jp_kana:
          omega_ruby: "じまんの　パワーで　あいてを\nばらばらに　できるのに　さらに\nもうどくで　とどめを　さすのだ。"
          alpha_sapphire: "りょううでの　ツメは　じどうしゃを\nスクラップにする　はかいりょく。\nツメの　さきから　どくを　だす。"
        jp_kanji:
          omega_ruby: "自慢の　パワーで　相手を\nばらばらに　できるのに　さらに\n猛毒で　とどめを　刺すのだ。"
          alpha_sapphire: "両腕の　ツメは　自動車を\nスクラップにする　破壊力。\nツメの　先から　毒を　出す。"
        en:
          omega_ruby: "It takes pride in its strength. Even though it can\ntear foes apart, it finishes them off with\npowerful poison."
          alpha_sapphire: "It has the power in its clawed arms to make scrap\nof a car. The tips of its claws release poison."
        fr:
          omega_ruby: "Il met ses adversaires en pièces grâce à sa prodigieuse force,\npuis donne le coup de grâce avec son violent poison."
          alpha_sapphire: "Il peut réduire une voiture en pièces avec ses pinces.\nLe bout de ses pinces contient du poison."
        it:
          omega_ruby: "Va fiero della sua forza con cui può fare a pezzi il nemico,\nma in genere preferisce finirlo usando le sue tossine."
          alpha_sapphire: "Con le zampe può accartocciare una macchina.\nLe punte degli artigli sono velenose."
        de:
          omega_ruby: "Es bringt seine Gegner mit starkem Gift zur Strecke, obwohl es\nweiß, dass es stark genug ist, um sie zu zerfetzen."
          alpha_sapphire: "In seinen Armen steckt so viel Kraft, dass es mit seinen\ngiftigen Krallen Autos zerquetschen kann."
        es:
          omega_ruby: "Aunque sabe que puede aplastar al rival con su gran fuerza,\nle gusta dar el golpe de gracia con su virulento veneno."
          alpha_sapphire: "Sus brazos tienen fuerza para destrozar un coche. La punta\nde sus zarpas segrega veneno."
        ko:
          omega_ruby: "자랑거리인 파워로 상대를\n조각조각 낼 수 있으며 게다가\n맹독으로 마무리한다."
          alpha_sapphire: "양팔의 발톱은 자동차를\n동강 내는 파괴력이 있다.\n발톱의 끝에서 독을 뿌린다."
croagunk:
  species_id: 453
  names:
    jp_kana: グレッグル
    jp_kanji: グレッグル
    en: Croagunk
    fr: Cradopaud
    it: Croagunk
    de: Glibunkel
    es: Croagunk
    ko: 삐딱구리
