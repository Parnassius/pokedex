        - grass
        - ice
      egg_groups:
        - monster
        - grass
      abilities:
        - snow_warning
      hidden_ability: soundproof
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          omega_ruby: "さむい　きせつは　やまの　ふもとまで\nおりてくるが　はるに　なると　ゆきが\nのこる　さんちょうに　もどっていく。"
          alpha_sapphire: "はるになると　アイスキャンディーの\nような　しょっかんの　きのみが\nおなかの　まわりに　なる。"
        jp_kanji:
          omega_ruby: "寒い　季節は　山の　ふもとまで\n降りてくるが　春に　なると\n雪が　残る　山頂に　戻っていく。"
          alpha_sapphire: "春になると　アイスキャンディーの\nような　食感の　木の実が\nお腹の　まわりに　生る。"
        en:
          omega_ruby: "During cold seasons, it migrates to the mountain’s\nlower reaches. It returns to the snow-covered\nsummit in the spring."
          alpha_sapphire: "In the spring, it grows berries with the texture of\nfrozen treats around its belly."
        fr:
          omega_ruby: "Il s’aventure jusqu’au pied des montagnes en hiver,\nmais se réfugie sur les pics neigeux au printemps."
          alpha_sapphire: "Au printemps, il fait pousser des Baies pareilles à des crèmes\nglacées autour de son ventre."
        it:
          omega_ruby: "In inverno scende a valle, ma in primavera se ne torna sulle\ncime montuose dove c’è ancora neve."
          alpha_sapphire: "In primavera, attorno al ventre gli crescono delle bacche\nsimili a dolci ghiaccioli."
        de:
          omega_ruby: "Im Winter steigt es bis zum Fuß der Berge herab.\nIm Frühjahr kehrt es auf den Gipfel zurück."
          alpha_sapphire: "Im Frühjahr wachsen Beeren, die wie gefrorene Süßigkeiten\naussehen, um seinen Bauch herum."
        es:
          omega_ruby: "En las estaciones frías baja al pie de la montaña, pero regresa\na las cimas nevadas en primavera."
          alpha_sapphire: "En primavera, le crecen bayas con apariencia de helado\nalrededor de la panza."
        ko:
          omega_ruby: "추운 계절에는 산기슭까지\n내려오지만 봄이 되면 눈이\n남아 있는 산 정상으로 돌아간다."
          alpha_sapphire: "봄이 되면 아이스캔디와\n같은 촉감의 나무열매가\n배의 주위에 열린다."
