      descriptions:
        jp_kana:
          omega_ruby: "かたい　カラに　まもられている。\nタイヤのように　かいてんして\nてきに　はげしく　たいあたりする。"
          alpha_sapphire: "ふだんは　うごかないが　おそわれると\nこうそく　かいてんして　はしりまわり\nたいあたりで　はんげきするのだ。"
        jp_kanji:
          omega_ruby: "硬い　殻に　守られている。\nタイヤのように　回転して\n敵に　激しく　体当たりする。"
          alpha_sapphire: "普段は　動かないが\n襲われると　高速　回転して　走り回り\n体当たりで　反撃するのだ。"
        en:
          omega_ruby: "Protected by a hard shell, it spins its body like a\nwheel and crashes furiously into its enemies."
          alpha_sapphire: "It is usually motionless, but when attacked,\nit rotates at high speed and then crashes into\nits opponent."
        fr:
          omega_ruby: "Protégé par sa solide carapace, il fonce sur ses ennemis\nen roulant comme un pneu."
          alpha_sapphire: "En général, il reste immobile. Mais quand on l’attaque,\nil se met à tourbillonner à toute vitesse et fonce sur l’ennemi."
        it:
          omega_ruby: "È protetto da un guscio resistente. Si scaglia contro il nemico\nrotolando come uno pneumatico."
          alpha_sapphire: "Di solito non si muove, ma se viene attaccato, comincia a\nturbinare su se stesso e si scaglia contro il nemico."
        de:
          omega_ruby: "Von einem harten Schutzpanzer umgeben. Es greift seine\nGegner an, indem es mit Karacho wie ein Rad in sie hineinrollt."
          alpha_sapphire: "An sich ist es harmlos. Bringt man es jedoch in Bedrängnis,\nsetzt es sich mit blitzschnellen Rollattacken zur Wehr."
        es:
          omega_ruby: "Lo protege un duro caparazón. Gira como una rueda y realiza\nbrutales placajes contra sus enemigos."
          alpha_sapphire: "Normalmente no se mueve, pero se pone a rodar\nfrenéticamente y contraataca con placajes si lo atacan."
        ko:
          omega_ruby: "단단한 껍질로 보호되고 있다.\n타이어처럼 회전하여 상대에게\n격렬히 몸통박치기를 날린다."
          alpha_sapphire: "평소에는 움직이지 않지만 공격당하면\n고속 회전하여 뛰어다니다가\n몸통박치기로 반격한다."
scolipede:
