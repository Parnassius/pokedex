mismagius:
  species_id: 429
  names:
    jp_kana: ムウマージ
    jp_kanji: ムウマージ
    en: Mismagius
    fr: Magirêve
    it: Mismagius
    de: Traunmagil
    es: Mismagius
    ko: 무우마직
