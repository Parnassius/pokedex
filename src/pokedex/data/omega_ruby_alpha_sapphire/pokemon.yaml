          omega_ruby: "こだいとしの　まもりがみだった。\nなわばりに　しんにゅうした　てきを\nサイコパワーで　こうげきする。"
          alpha_sapphire: "こだいとしの　まもりがみ。\nいつも　おなじルートを　じゅんかいし\nしんにゅうしゃを　みはっていた。"
        jp_kanji:
          omega_ruby: "古代都市の　守り神だった。\n縄張りに　侵入した　敵を\nサイコパワーで　攻撃する。"
          alpha_sapphire: "古代都市の　守り神。\nいつも　同じルートを　巡回し\n侵入者を　見張っていた。"
        en:
          omega_ruby: "The guardians of an ancient city, they use their\npsychic power to attack enemies that invade\ntheir territory."
          alpha_sapphire: "The guardians of an ancient city, they always fly\nthe same route while keeping watch for invaders."
        fr:
          omega_ruby: "Il était le dieu protecteur d’une ville antique. Il repoussait\nles envahisseurs à coups de pouvoir psychique."
          alpha_sapphire: "Dieu protecteur d’une ville antique, il suivait toujours\nle même itinéraire afin de prévenir tout risque d’invasion."
        it:
          omega_ruby: "Era lo spirito custode di un’antica città. Attaccava con poteri\npsichici i nemici che invadevano il suo territorio."
          alpha_sapphire: "Era lo spirito custode di un’antica città. Percorreva sempre lo\nstesso percorso per assicurarsi che non ci fossero intrusi."
        de:
          omega_ruby: "Einst war es der Wächter einer Stadt aus uralten Zeiten. Wer\nsich in sein Revier wagt, lernt seine Psycho-Kräfte kennen."
          alpha_sapphire: "Vor langer Zeit war es der Wächter einer Stadt. Es fliegt auf\nder Suche nach Eindringlingen immer dieselbe Route ab."
        es:
          omega_ruby: "Fue la deidad protectora de una ciudad milenaria. Ataca con\nsu poder psíquico a los enemigos que invaden su territorio."
          alpha_sapphire: "Deidad protectora de una antigua ciudad. Siempre merodea\npor la misma ruta y permanece alerta en busca de intrusos."
        ko:
          omega_ruby: "고대 도시의 수호신이었다.\n자기 영역을 침범한 상대를\n사이코 파워로 공격한다."
          alpha_sapphire: "고대 도시의 수호신.\n항상 같은 루트를 순회하며\n침입자를 감시하고 있었다."
yamask:
