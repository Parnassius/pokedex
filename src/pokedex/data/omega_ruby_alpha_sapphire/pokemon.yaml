      descriptions:
        jp_kana:
          omega_ruby: "より　すぐれた　ポケモンに　するため\nプログラムを　ついかしたが　なぜか\nおかしな　こうどうを　はじめた。"
          alpha_sapphire: "いじげん　くうかんを　じゆうに\nいどうできるように　プログラムを\nしゅうせいしたが　ミスした　らしい。"
        jp_kanji:
          omega_ruby: "より　優れた　ポケモンに　するため\nプログラムを　追加したが　なぜか\nおかしな　行動を　はじめた。"
          alpha_sapphire: "異次元空間を　自由に\n移動できるように　プログラムを\n修正したが　ミスした　らしい。"
        en:
          omega_ruby: "Additional software was installed to make it a better\nPokémon. It began acting oddly, however."
          alpha_sapphire: "Its programming was modified to enable it to travel\nthrough alien dimensions. Seems there might have\nbeen an error..."
        fr:
          omega_ruby: "Un logiciel supplémentaire fut installé pour l’améliorer.\nMais depuis, il se comporte bizarrement."
          alpha_sapphire: "On a modifié son programme pour qu’il puisse parcourir\nles dimensions, mais ce fut un échec."
        it:
          omega_ruby: "È stato aggiunto un software per migliorare le prestazioni\ndi questo Pokémon. Agisce in modo strano."
          alpha_sapphire: "Non sembra funzionare correttamente dopo essere stato\nriprogrammato per muoversi in dimensioni sconosciute."
        de:
          omega_ruby: "Zusätzliche Software wurde installiert, um das Pokémon zu\nverbessern. Seitdem benimmt es sich seltsam."
          alpha_sapphire: "Eine neue Software sollte es zu interdimensionalen Reisen\nbefähigen, doch anscheinend ging etwas schief."
        es:
          omega_ruby: "Se le instaló un software para mejorarlo. Sin embargo,\ncomenzó a comportarse de manera extraña."
          alpha_sapphire: "Aunque le instalaron un software para desplazarse por otras\ndimensiones, algo no funcionó bien."
        ko:
          omega_ruby: "더욱 우수한 포켓몬으로 만들고자\n프로그램을 추가했지만 어쩐지\n괴상하게 행동하기 시작했다."
          alpha_sapphire: "다른 차원의 공간을 자유롭게\n이동할 수 있도록 프로그램을\n수정했지만 실수한 것 같다."
gallade:
  species_id: 475
  names:
    jp_kana: エルレイド
    jp_kanji: エルレイド
    en: Gallade
    fr: Gallame
    it: Gallade
    de: Galagladi
    es: Gallade
    ko: 엘레이드
