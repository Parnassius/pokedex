      descriptions:
        jp_kana:
          omega_ruby: "おおうなばらを　ただよって　くらす。\nきずついた　ポケモンを　みつけると\nだきかかえて　きしまで　はこぶ。"
          alpha_sapphire: "きずついたり　よわった　ポケモンを\nヒレで　やさしく　かかえながら\nとくしゅな　ねんまくで　なおすのだ。"
        jp_kanji:
          omega_ruby: "大海原を　漂って　暮らす。\n傷ついた　ポケモンを　見つけると\n抱きかかえて　岸まで　運ぶ。"
          alpha_sapphire: "傷ついたり　弱った　ポケモンを\nヒレで　優しく　抱えながら\n特殊な　粘膜で　治すのだ。"
        en:
          omega_ruby: "Floating in the open sea is how they live.\nWhen they find a wounded Pokémon,\nthey embrace it and bring it to shore."
          alpha_sapphire: "It gently holds injured and weak Pokémon in its\nfins. Its special membrane heals their wounds."
        fr:
          omega_ruby: "Il vit en dérivant dans les grands océans. Quand il trouve\ndes Pokémon blessés, il les ramène jusqu’à la côte."
          alpha_sapphire: "Il berce les Pokémon blessés dans ses nageoires et les guérit\ngrâce à la membrane dont il est recouvert."
        it:
          omega_ruby: "Vive in mare aperto trasportato dalle onde. Se si imbatte\nin un Pokémon ferito, lo riaccompagna a riva."
          alpha_sapphire: "Abbraccia dolcemente con le sue pinne i Pokémon deboli\no feriti e li guarisce grazie a una speciale membrana mucosa."
        de:
          omega_ruby: "Es treibt durch den Ozean. Findet es ein verletztes Pokémon,\nnimmt es dieses auf und trägt es zurück an Land."
          alpha_sapphire: "Es umarmt verletzte und geschwächte Pokémon liebevoll mit\nseinen Flossen und heilt sie mit einem speziellen Schleim."
        es:
          omega_ruby: "Vive flotando a la deriva en mar abierto. Siempre que\nencuentra un Pokémon herido, lo abraza y lo lleva a la\ncosta."
          alpha_sapphire: "Abraza gentilmente con sus aletas a Pokémon que están\nlastimados y cura sus heridas con su membrana especial."
        ko:
          omega_ruby: "넓은 바다를 떠돌아다니며 산다.\n상처 입은 포켓몬을 발견하면\n안고서 물가까지 옮긴다."
          alpha_sapphire: "상처 입거나 약해진 포켓몬을\n지느러미로 부드럽게 안으며\n특수한 점막으로 치료한다."
joltik:
