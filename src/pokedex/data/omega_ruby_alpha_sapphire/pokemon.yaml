    jp_kanji: メタグロス
    en: Metagross
    fr: Métalosse
    it: Metagross
    de: Metagross
    es: Metagross
    ko: 메타그로스
  forms:
    metagross:
      form_id: 0
      base_stats:
        hp: 80
        attack: 135
