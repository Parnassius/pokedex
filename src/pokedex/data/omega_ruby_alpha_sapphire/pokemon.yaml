        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - inner_focus
        - regenerator
      hidden_ability: reckless
      descriptions:
        jp_kana:
          omega_ruby: "わざをくりだす　スピードが　じまん。\nたとえ　パワーは　ひくくても\nてかずの　おおさで　カバーする。"
          alpha_sapphire: "ながれるような　れんぞく　こうげきを\nくりだして　てきを　あっとうする。\nするどい　ツメで　てきを　きりさく。"
        jp_kanji:
          omega_ruby: "技を繰り出す　スピードが　自慢。\nたとえ　パワーは　低くても\n手数の　多さで　カバーする。"
          alpha_sapphire: "流れるような　連続　攻撃を\n繰り出して　敵を　圧倒する。\n鋭い　ツメで　敵を　切り裂く。"
        en:
          omega_ruby: "It takes pride in the speed at which it can use\nmoves. What it loses in power, it makes up for\nin quantity."
          alpha_sapphire: "In fights, they dominate with onslaughts of flowing,\ncontinuous attacks. With their sharp claws, they\ncut enemies."
        fr:
          omega_ruby: "Il se flatte d’être très rapide. Pour compenser la faiblesse\nde ses coups, il en assène un très grand nombre."
          alpha_sapphire: "Il découpe ses ennemis avec ses griffes acérées et les terrasse\navec ses enchaînements de coups hyper fluides."
        it:
          omega_ruby: "Va fiero della rapidità delle sue mosse. Sopperisce\na un’eventuale mancanza di potenza con il numero\ndei colpi."
          alpha_sapphire: "Soggioga il nemico concatenando una serie incessante di\nattacchi e lo affetta con le unghie affilate."
        de:
          omega_ruby: "Schnelle Angriffe sind seine Spezialität. Es gleicht seine\nSchwächen mit der Vielfalt seines Attackenrepertoires aus."
          alpha_sapphire: "Es deckt seine Gegner mit filigranen Attacken in Serie ein\nund schlitzt sie mit seinen spitzen Klauen auf."
        es:
          omega_ruby: "La velocidad de sus ataques es su gran orgullo. Lo que le\nfalta de fuerza bruta lo compensa en cantidad de golpes."
          alpha_sapphire: "Abruma a su rival con oleadas de ataques veloces. Corta al\nenemigo con sus afiladas garras."
        ko:
          omega_ruby: "기술을 내보내는 스피드가 자랑이다.\n설령 파워는 낮더라도\n많은 공격 횟수로 커버한다."
          alpha_sapphire: "물 흐르는 듯한 연속 공격을\n펼쳐서 상대를 압도한다.\n날카로운 손톱으로 상대를 베어 가른다."
mienshao:
