      descriptions:
        jp_kana:
          omega_ruby: "なんでも　とかしてしまう　ねんえきを\nぶんぴつして　てきを　げきたいする。\nめだまは　たいかして　みえていない。"
          alpha_sapphire: "４ほんの　ツノは　こうせいのうの\nレーダー。みみや　はなの　かわりに\nおとや　においを　かんじとる。"
        jp_kanji:
          omega_ruby: "なんでも　溶かしてしまう　粘液を\n分泌して　敵を　撃退する。\n目玉は　退化して　見えていない。"
          alpha_sapphire: "４本の　ツノは　高性能の　レーダー。\n耳や　鼻の　かわりに\n音や　においを　感じ取る。"
        en:
          omega_ruby: "It drives away opponents by excreting a\nsticky liquid that can dissolve anything.\nIts eyes devolved, so it can’t see anything."
          alpha_sapphire: "Its four horns are a high-performance radar system.\nIt uses them to sense sounds and smells,\nrather than using ears or a nose."
        fr:
          omega_ruby: "Il repousse ses ennemis en sécrétant un fluide qui dissout\ntout ce qu’il touche. Suite à une dégénérescence de ses yeux,\nil est aveugle."
          alpha_sapphire: "Ses quatre cornes constituant un radar extrêmement puissant,\nil n’a besoin ni de nez ni d’oreilles pour percevoir les sons et\nles odeurs."
        it:
          omega_ruby: "Respinge i nemici secernendo un liquido vischioso in grado\ndi sciogliere qualunque cosa. I suoi occhi hanno subito una\ndegenerazione che lo ha reso cieco."
          alpha_sapphire: "I quattro corni di questo Pokémon sono simili a un potente\nradar e fungono da organi sensoriali al posto di orecchie\ne naso."
        de:
          omega_ruby: "Es verjagt Gegner durch Absonderung eines alles\nzersetzenden Schleims. Die zurückgebildeten Augäpfel\ndes Pokémon gewähren ihm keine Sicht."
          alpha_sapphire: "Seine vier Fühler fungieren als hochleistungsfähiges\nRadarsystem. Es setzt sie anstelle von Nase und Ohren\nzur Wahrnehmung von Gerüchen und Geräuschen ein."
        es:
          omega_ruby: "Segrega una mucosidad que corroe todo lo que toca y\nconsigue así ahuyentar al enemigo. Sus ojos han\ninvolucionado, por lo que no puede ver."
          alpha_sapphire: "Sus cuatro antenas constituyen un radar de gran potencia.\nHacen las veces de nariz y oídos para percibir tanto ruidos\ncomo olores."
        ko:
          omega_ruby: "무엇이든 녹여버리는 점액을\n분비해 적을 격퇴한다.\n눈은 퇴화하여 보이지 않는다."
          alpha_sapphire: "4개의 뿔은 고성능의\n레이더이다. 귀나 코를 대신해서\n소리나 냄새를 느낀다."
goodra:
