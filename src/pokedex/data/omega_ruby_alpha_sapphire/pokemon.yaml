          alpha_sapphire: "せっし　２０００どの　ひのたまを\nうでの　さきから　うちだす。\nくちから　はく　いきも　もえている。"
        jp_kanji:
          omega_ruby: "腕の　先から　摂氏２０００度の\n火の玉を　発射する。\n火山の　火口を　住処にする。"
          alpha_sapphire: "摂氏２０００度の　火の玉を\n腕の　先から　撃ち出す。\n口から　吐く　息も　燃えている。"
        en:
          omega_ruby: "It blasts fireballs of over 3,600 degrees Fahrenheit\nfrom the ends of its arms. It lives in\nvolcanic craters."
          alpha_sapphire: "It blasts fireballs of over 3,600 degrees Fahrenheit\nout of its arms. Its breath also sears and sizzles."
        fr:
          omega_ruby: "Il projette des boules de feu à 2 000 °C à bout de bras.\nIl vit dans les cratères volcaniques."
          alpha_sapphire: "Il projette des boules de feu à 2 000 °C du bout de ses bras.\nMême son souffle est brûlant."
        it:
          omega_ruby: "Spara palle di fuoco di oltre 2000 °C dagli arti superiori.\nVive nei crateri dei vulcani."
          alpha_sapphire: "Spara palle di fuoco di oltre 2000 °C dagli arti superiori.\nL’aria che espira è incandescente."
        de:
          omega_ruby: "Aus den Enden seiner Arme schießen Feuerbälle mit 2 000 °C.\nEs lebt in Vulkankratern."
          alpha_sapphire: "Es schießt 2 000 °C heiße Feuerbälle aus den Enden\nseiner Arme. Selbst sein Atem steht in Flammen."
        es:
          omega_ruby: "Sus brazos disparan bolas de fuego de más de 2000 °C. Vive\nen cráteres volcánicos."
          alpha_sapphire: "Sus brazos disparan bolas de fuego de más de 2000 °C.\nEl aliento que desprende es abrasador."
        ko:
          omega_ruby: "팔 끝에서 섭씨 2000도의\n불구슬을 발사한다.\n화산의 분화구를 거처로 삼는다."
          alpha_sapphire: "섭씨 2000도의 불구슬을\n팔 끝에서 내보낸다.\n입에서 뿜는 숨도 타오르고 있다."
togekiss:
