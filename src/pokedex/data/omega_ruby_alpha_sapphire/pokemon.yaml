          omega_ruby: "一日中　ネイティオが　じっとしているのは\n未来予知で　わかった　恐ろしい　出来事に\nおびえているからだと　信じられている。"
          alpha_sapphire: "1日中　太陽を　見つめて　動かない。\n未来を　見通す　力を　持つと　信じられ\n聖なる　ポケモンとして　祭る　人も　いる。"
        en:
          omega_ruby: "Xatu stands rooted and still in one spot all day long.\nPeople believe that this Pokémon does so out of fear of the\nterrible things it has foreseen in the future."
          alpha_sapphire: "Xatu is known to stand motionless while staring at the sun all\nday long. Some people revere it as a mystical Pokémon out of\ntheir belief that Xatu is in possession of the power to see into\nthe future."
        fr:
          omega_ruby: "Xatu se tient debout et immobile toute la journée.\nCertains pensent que ce Pokémon a adopté cette\nposition à cause de la terreur qu’il a ressentie en\nprévoyant l’avenir."
          alpha_sapphire: "On sait que Xatu se tient toute la journée debout,\nles yeux perdus vers l’horizon. Certaines personnes\nle vénèrent comme un Pokémon mystique, persuadées\nque Xatu a le pouvoir de prédire l’avenir."
        it:
          omega_ruby: "Xatu rimane in piedi immobile nello stesso punto\ntutto il giorno. Qualcuno crede che si comporti così\nper gli eventi terribili che ha previsto per il futuro."
          alpha_sapphire: "Xatu è noto per la sua immobilità mentre guarda il sole stando\nin piedi tutto il giorno. Alcuni lo considerano un Pokémon\nmistico, convinti che Xatu possegga il potere di prevedere\nil futuro."
        de:
          omega_ruby: "Xatu bleibt den ganzen Tag an ein und demselben Ort\nwie angewurzelt stehen. Die Menschen glauben, dass es\ndies aus Angst vor den Dingen tut, die es für die Zukunft\nvorausgesehen hat."
          alpha_sapphire: "Xatu steht den ganzen Tag bewegungslos herum und starrt\ndie Sonne an. Einige Menschen verehren es als ein mystisches\nPokémon. Sie glauben, dass Xatu in die Zukunft sehen könne."
        es:
          omega_ruby: "Xatu permanece de pie inmóvil y tranquilo en el mismo sitio\ndurante todo el día. Se cree que no se mueve por temor a lo\nque ha visto que ocurrirá en el futuro."
          alpha_sapphire: "Xatu es conocido por el hábito que tiene de quedarse todo\nel día contemplando el sol. Hay mucha gente que lo venera\ncomo Pokémon místico, pues piensan que Xatu tiene el poder\nde ver el futuro."
        ko:
          omega_ruby: "온종일 네이티오가 꼼짝하지 않는 것은\n미래예지로 알게 된 무서운 사건에\n겁을 먹고 있기 때문이라고 믿어지고 있다."
          alpha_sapphire: "온종일 태양을 바라보며 움직이지 않는다.\n미래를 내다보는 힘을 지녔다고 여겨져\n성스러운 포켓몬으로 모시는 사람도 있다."
