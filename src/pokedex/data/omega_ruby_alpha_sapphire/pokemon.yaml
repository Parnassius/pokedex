        jp_kana:
          omega_ruby: "２ほんの　しょくしゅから　プラスと　マイナスの\nでんきを　ながして　えものを　きぜつ　させる。\nでんきの　あかりは　なかまとの　サインだ。"
          alpha_sapphire: "つよい　でんきを　はっせいさせる　さいぼうが\n２ほんの　しょくしゅの　なかに　つまっている。\nじぶんも　ちょっと　ピリピリ　しびれるらしい。"
        jp_kanji:
          omega_ruby: "２本の　触手から　プラスと　マイナスの\n電気を　流して　獲物を　気絶　させる。\n電気の　灯りは　仲間との　サインだ。"
          alpha_sapphire: "強い　電気を　発生させる　細胞が\n２本の　触手の　中に　詰まっている。\n自分も　ちょっと　ピリピリ　しびれるらしい。"
        en:
          omega_ruby: "Chinchou lets loose positive and negative electrical charges\nfrom its two antennas to make its prey faint. This Pokémon\nflashes its electric lights to exchange signals with others."
          alpha_sapphire: "Chinchou’s two antennas are filled with cells that generate\nstrong electricity. This Pokémon’s cells create so much\nelectrical power, it even makes itself tingle slightly."
        fr:
          omega_ruby: "Loupio relâche des charges électriques positives et négatives\nde ses deux antennes pour mettre sa proie K.O. Ce Pokémon\nillumine ses ampoules électriques pour communiquer avec\nses congénères."
          alpha_sapphire: "Les deux antennes de Loupio sont chargées de cellules\nqui génèrent un courant de forte intensité. Ces cellules\nlibèrent tellement d’électricité qu’elles vibrent légèrement."
        it:
          omega_ruby: "Chinchou libera una carica elettrica positiva e negativa\ndalle due antenne per intontire la preda. Il Pokémon usa\nle sue luci elettriche per scambiare segnali coi suoi simili."
          alpha_sapphire: "Le due antenne di Chinchou contengono cellule che generano\nun’elettricità incredibile, tanto forte da farlo vibrare tutto."
        de:
          omega_ruby: "Lampi gibt positive und negative elektrische Ladungen\ndurch seine Antennen ab, um seine Beute zu lähmen.\nDieses Pokémon lässt seine Lichter aufflackern und\ntauscht Signale mit seinen Artgenossen aus."
          alpha_sapphire: "Lampis zwei Antennen sind mit Zellen gefüllt, die Elektrizität\nerzeugen. Die elektrische Ladung ist so stark, dass es sogar\nein leichtes Kribbeln verspürt."
        es:
          omega_ruby: "Chinchou libera cargas eléctricas positivas y negativas a través\nde las dos antenas que tiene para que su rival pierda el\nconocimiento. Asimismo, usa los destellos de electricidad para\ncomunicarse con otros."
          alpha_sapphire: "Las dos antenas de Chinchou están llenas de células que\ngeneran potente electricidad. Crean tal cantidad que hasta\nel propio Pokémon siente cierto hormigueo."
        ko:
          omega_ruby: "2개의 촉수로 플러스와 마이너스\n전기를 흘려 먹이를 기절시킨다.\n전기의 빛은 동료와의 신호다."
          alpha_sapphire: "강한 전기를 발생시키는 세포가\n2개의 촉수 안에 채워져 있다.\n자신도 조금은 찌릿하고 마비된다고 한다."
