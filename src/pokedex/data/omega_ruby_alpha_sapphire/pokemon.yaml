        jp_kana:
          omega_ruby: "アップテンポの　おどりと　おとで\nはなの　タネを　ねらう　てんてきの\nとりポケモンを　おいはらうのだ。"
          alpha_sapphire: "かんそうした　とちで　くらす。\nからだを　リズミカルに　うごかすと\nマラカスのような　おとを　かなでる。"
        jp_kanji:
          omega_ruby: "アップテンポの　踊りと　音で\n花の　タネを　ねらう　天敵の\nとりポケモンを　追い払うのだ。"
          alpha_sapphire: "乾燥した　土地で　暮らす。\n体を　リズミカルに　動かすと\nマラカスのような　音を　奏でる。"
        en:
          omega_ruby: "It uses an up-tempo song and dance to drive away\nthe bird Pokémon that prey on its flower seeds."
          alpha_sapphire: "Arid regions are their habitat. They move\nrhythmically, making a sound similar to maracas."
        fr:
          omega_ruby: "Avec une danse et des sons saccadés, il fait fuir\nses prédateurs, les Pokémon Oiseaux dévoreurs\nde graines de fleur."
          alpha_sapphire: "Il vit dans les endroits secs. Quand il bouge son corps\nen rythme, il fait un bruit de maracas."
        it:
          omega_ruby: "Con danze e suoni a ritmo vivace scaccia i suoi predatori,\ni Pokémon uccello, che divorano i semi dei suoi fiori."
          alpha_sapphire: "Vive nelle zone aride. Se muove il corpo a tempo produce\nun suono di maracas."
        de:
          omega_ruby: "Verjagt Vogel-Pokémon, die auf seine Blüten aus sind,\nmit einem flotten Tänzchen und lauter Untermalung."
          alpha_sapphire: "Erzeugt durch rhythmische Bewegungen Laute, die dem Klang\nvon Maracas ähneln. Lebt an trockenen Orten."
        es:
          omega_ruby: "Espanta a los Pokémon pájaro con un baile rápido y haciendo\nruido para evitar que picoteen las semillas de sus flores."
          alpha_sapphire: "Vive en territorio árido. Emite un sonido parecido a unas\nmaracas si se mueve de forma rítmica."
        ko:
          omega_ruby: "템포가 빠른 춤과 소리로\n꽃씨를 노리는 천적인\n새포켓몬을 쫓아버린다."
          alpha_sapphire: "건조한 땅에서 산다.\n몸을 리드미컬하게 움직이면\n마라카스 같은 소리를 낸다."
dwebble:
