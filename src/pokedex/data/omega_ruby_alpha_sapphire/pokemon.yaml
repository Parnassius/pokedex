      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 70
        special_attack: 75
        special_defense: 85
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - frisk
        - competitive
