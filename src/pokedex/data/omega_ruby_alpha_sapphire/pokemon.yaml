          omega_ruby: "１まんねんまえの　こおりの　したから\nはっけんされた　ことも　あるほど\nおおむかしから　いた　ポケモン。"
          alpha_sapphire: "こおりで　できた　りっぱな　キバ。\nひょうがきが　おわり　あたたかく\nなったため　かずが　へってしまった。"
        jp_kanji:
          omega_ruby: "１万年前の　氷の　下から\n発見された　ことも　あるほど\n大昔から　いた　ポケモン。"
          alpha_sapphire: "氷で　できた　立派な　キバ。\n氷河期が　終わり　暖かく\nなったため　数が　減ってしまった。"
        en:
          omega_ruby: "A frozen Mamoswine was dug from ice dating back\n10,000 years. This Pokémon has been around a\nlong, long, long time."
          alpha_sapphire: "Its impressive tusks are made of ice. The population\nthinned when it turned warm after the ice age."
        fr:
          omega_ruby: "Un Pokémon si vieux qu’on l’a découvert sous des glaces\nvieilles de 10 000 ans."
          alpha_sapphire: "Ses défenses spectaculaires sont glacées. Il a failli disparaître\ndans la canicule suivant l’ère glaciaire."
        it:
          omega_ruby: "Un Pokémon antico al punto che ne sono stati ritrovati\ndegli esemplari tra i ghiacci di 10.000 anni fa."
          alpha_sapphire: "Ha enormi zanne di ghiaccio. La popolazione di questo\nPokémon è diminuita alla fine dell’era glaciale."
        de:
          omega_ruby: "Es existiert schon seit Urzeiten. Mamutel wurde sogar schon in\n10 000 Jahre altem Eis gefunden."
          alpha_sapphire: "Die beeindruckenden Stoßzähne dieser Pokémon sind aus Eis.\nNach der Eiszeit nahm ihre Population ab."
        es:
          omega_ruby: "Ya existía en la antigüedad. Se encontró uno bajo hielo de\nhace más de 10 000 años."
          alpha_sapphire: "Sus impresionantes colmillos están hechos de hielo.\nSu población se redujo tras la glaciación."
        ko:
          omega_ruby: "1만 년 전의 얼음 밑에서\n발견된 적이 있을 정도로\n오랜 옛날부터 있었던 포켓몬이다."
          alpha_sapphire: "얼음으로 만들어진 훌륭한 이빨이\n있다. 빙하기가 끝나고 따뜻해졌기\n때문에 수가 줄어들었다."
porygon_z:
  species_id: 474
  names:
    jp_kana: ポリゴンＺ
    jp_kanji: ポリゴンＺ
    en: Porygon-Z
    fr: Porygon-Z
    it: Porygon-Z
