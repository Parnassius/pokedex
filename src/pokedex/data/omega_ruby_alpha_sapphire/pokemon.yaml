        jp_kana:
          omega_ruby: "あまぐもを　よべる　ポケモンとして\nおおむかしから　まつられていた。\nときどき　じめんに　うめられている。"
          alpha_sapphire: "ドータクンに　いのりを　ささげると\nあめが　ふり　さくもつを　そだてると\nこだいの　ひとびとは　しんじていた。"
        jp_kanji:
          omega_ruby: "雨雲を　呼べる　ポケモンとして\n大昔から　まつられていた。\nときどき　地面に　埋められている。"
          alpha_sapphire: "ドータクンに　祈りを　ささげると\n雨が　降り　作物を　育てると\n古代の　人々は　信じていた。"
        en:
          omega_ruby: "In ages past, this Pokémon was revered as a\nbringer of rain. It was found buried in the ground."
          alpha_sapphire: "Ancient people believed that petitioning Bronzong\nfor rain was the way to make crops grow."
        fr:
          omega_ruby: "Il a longtemps été célébré pour avoir apporté la pluie.\nOn le trouve parfois enterré dans le sol."
          alpha_sapphire: "On croyait autrefois que lui adresser des prières faisait pleuvoir\net assurait les récoltes."
        it:
          omega_ruby: "È stato venerato per secoli come Pokémon che porta\nla pioggia. A volte lo si trova sepolto nel terreno."
          alpha_sapphire: "Anticamente si credeva Bronzong potesse essere invocato\nper ottenere pioggia e buoni raccolti."
        de:
          omega_ruby: "Man verehrt sie schon seit Urzeiten als Regenmacher.\nManchmal findet man eines von ihnen im Boden vergraben."
          alpha_sapphire: "Früher verehrten die Menschen die Bronzong, weil sie sich\ndavon Regen oder gute Ernten erhofften."
        es:
          omega_ruby: "Desde antaño se adora a este Pokémon para que propicie\nlluvias abundantes. A veces se esconde bajo tierra."
          alpha_sapphire: "Antaño se creía que rezándole se conjuraba la lluvia y se\npropiciaban las buenas cosechas."
        ko:
          omega_ruby: "비구름을 부르는 포켓몬으로\n아주 옛날부터 떠받들어졌다.\n가끔 땅에 묻혀 있다."
          alpha_sapphire: "동탁군에게 소원을 빌면\n비가 내려 농작물을 자라게 한다고\n고대의 사람들은 믿고 있었다."
