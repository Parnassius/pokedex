        jp_kana:
          omega_ruby: "モンスターボールに　にた　もようで\nさそい　どくほうしを　ふきかける。\nなぜ　にているかは　なぞである。"
          alpha_sapphire: "モンスターボール　そっくりの\nもようで　ポケモンを　さそいこみ\nどくのほうしを　ふきかけてくる。"
        jp_kanji:
          omega_ruby: "モンスターボールに　似た　模様で\n誘い　毒胞子を　吹きかける。\nなぜ　似ているかは　ナゾである。"
          alpha_sapphire: "モンスターボール　そっくりの\n模様で　ポケモンを　誘いこみ\n毒の胞子を　吹きかけてくる。"
        en:
          omega_ruby: "It lures people in with its Poké Ball pattern, then\nreleases poison spores. Why it resembles a\nPoké Ball is unknown."
          alpha_sapphire: "It lures Pokémon with its pattern that looks just like\na Poké Ball, then releases poison spores."
        fr:
          omega_ruby: "Grâce à sa ressemblance mystérieuse avec une Poké Ball,\nil attire ses ennemis et relâche des spores empoisonnées."
          alpha_sapphire: "Son apparence de Poké Ball trompe ses ennemis, qu’il étourdit\nà l’aide de ses spores empoisonnées."
        it:
          omega_ruby: "Simile a una Poké Ball, adesca i nemici e sparge\nspore velenose. Da dove venga questa somiglianza\nè un vero mistero."
          alpha_sapphire: "Attira a sé altri Pokémon con la sua forma a Poké Ball e soffia\nsu di loro le sue spore velenose."
        de:
          omega_ruby: "Fällt ein Trainer auf sein Äußeres herein, das komischerweise\neinem Pokéball ähnelt, besprüht es ihn mit Giftsporen."
          alpha_sapphire: "Es ist gemustert wie ein Pokéball. Es lockt damit andere\nPokémon an, um sie dann mit Giftsporen zu besprühen."
        es:
          omega_ruby: "Gracias a su misterioso parecido a una Poké Ball, atrae a sus\npresas y lanza rápidamente esporas de veneno."
          alpha_sapphire: "Atraen a otros Pokémon gracias a su similitud con una\nPoké Ball y los atacan expulsando esporas venenosas."
        ko:
          omega_ruby: "몬스터볼을 닮은 무늬로\n유인한 후 독 포자를 뿌려댄다.\n왜 닮았는지는 불가사의다."
          alpha_sapphire: "몬스터볼과 똑 닮은\n무늬로 포켓몬을 유인해\n독 포자를 뿌린다."
