          omega_ruby: "みらいを　よちする　のうりょくで　トレーナーの\nきけんを　さっちしたとき　さいだい　パワーの\nサイコエネルギーを　つかうと　いわれている。"
          alpha_sapphire: "サイコパワーで　くうかんを　ねじまげ　ちいさな\nブラックホールを　つくりだす　ちからを　もつ。\nいのちがけで　トレーナーを　まもる　ポケモン。"
        jp_kanji:
          omega_ruby: "未来を　予知する　能力で　トレーナーの\n危険を　察知したとき　最大　パワーの\nサイコエネルギーを　使うと　いわれている。"
          alpha_sapphire: "サイコパワーで　空間を　ねじ曲げ　小さな\nブラックホールを　つくりだす　力を　持つ。\n命懸けで　トレーナーを　守る　ポケモン。"
        en:
          omega_ruby: "Gardevoir has the ability to read the future. If it senses\nimpending danger to its Trainer, this Pokémon is said\nto unleash its psychokinetic energy at full power."
          alpha_sapphire: "Gardevoir has the psychokinetic power to distort the\ndimensions and create a small black hole. This Pokémon\nwill try to protect its Trainer even at the risk of its own life."
        fr:
          omega_ruby: "Gardevoir a le pouvoir de prédire l’avenir. On raconte que\nlorsqu’il sent que son Dresseur est en danger, il libère\nune puissante décharge d’énergie télékinétique."
          alpha_sapphire: "Gardevoir est doté d’un pouvoir télékinétique lui permettant\nde déformer les dimensions et de créer un petit trou noir.\nCe Pokémon est prêt à risquer sa vie pour protéger\nson Dresseur."
        it:
          omega_ruby: "Gardevoir ha l’abilità di prevedere il futuro. Se percepisce\nun pericolo imminente per il proprio Allenatore, pare che\nscateni tutta l’energia psicocinetica di cui è capace."
          alpha_sapphire: "Gardevoir ha il potere psicocinetico di distorcere le dimensioni\ncreando un piccolo buco nero. Questo Pokémon cerca di\nproteggere il proprio Allenatore anche a rischio della sua\nstessa vita."
        de:
          omega_ruby: "Guardevoir kann in die Zukunft schauen. Wenn es eine\nGefahr für seinen Trainer voraussieht, entlädt es seine\npsychokinetische Energie mit voller Kraft."
          alpha_sapphire: "Guardevoir kann mit seiner psychokinetischen Energie\ndie Dimensionen verzerren und ein kleines Schwarzes Loch\nerzeugen. Es schützt seinen Trainer selbst unter Einsatz\nseines eigenen Lebens."
        es:
          omega_ruby: "Gardevoir es capaz de leer el futuro. Si siente que su\nEntrenador está en peligro inminente, dicen que libera\nautomáticamente toda su energía psicoquinética."
          alpha_sapphire: "Gardevoir tiene el poder psicoquinético de alterar las\ndimensiones y crear un agujero negro pequeño. Este\nPokémon intenta proteger siempre a su Entrenador aunque\ntenga que arriesgar su propia vida."
        ko:
          omega_ruby: "미래를 예지하는 능력으로 트레이너의\n위험을 감지했을 때 최대 파워의\n사이코 에너지를 사용한다고 전해진다."
          alpha_sapphire: "사이코 파워로 공간을 비틀어 작은\n블랙홀을 만들어내는 힘을 지녔다.\n목숨을 걸고 트레이너를 지키는 포켓몬이다."
