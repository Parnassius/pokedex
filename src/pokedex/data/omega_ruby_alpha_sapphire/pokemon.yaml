      descriptions:
        jp_kana:
          omega_ruby: "アブソルが　ひとまえに　あらわれると　かならず\nじしんや　つなみなどの　さいがいが　おこったので\nわざわいポケモン　という　べつめいで　よばれた。"
          alpha_sapphire: "しぜんさいがいを　キャッチする　ちからを　もつ。\nけわしい　さんがくちたいに　せいそくし\nめったに　やまの　ふもとには　おりてこない。"
        jp_kanji:
          omega_ruby: "アブソルが　人前に　現れると　必ず\n地震や　津波などの　災害が　起こったので\n災いポケモン　という　別名で　呼ばれた。"
          alpha_sapphire: "自然災害を　キャッチする　力を　持つ。\n険しい　山岳地帯に　生息し\n滅多に　山の　ふもとには　降りてこない。"
        en:
          omega_ruby: "Every time Absol appears before people, it is followed by a\ndisaster such as an earthquake or a tidal wave. As a result,\nit came to be known as the disaster Pokémon."
          alpha_sapphire: "Absol has the ability to foretell the coming of natural disasters.\nIt lives in a harsh, rugged mountain environment. This\nPokémon very rarely ventures down from the mountains."
        fr:
          omega_ruby: "Chaque fois qu’Absol apparaît devant des gens,\nune catastrophe comme un tremblement de terre\nou un raz-de-marée survient peu de temps après.\nIl est devenu tristement célèbre sous l’appellation\nde Pokémon désastreux."
          alpha_sapphire: "Absol a le pouvoir de prédire les catastrophes naturelles.\nIl vit dans un milieu montagneux aride et accidenté.\nCe Pokémon s’éloigne très rarement des montagnes."
        it:
          omega_ruby: "Ogni volta che compare Absol, segue un disastro come\nun terremoto o un maremoto. Per questo motivo è noto\ncome il Pokémon dei disastri."
          alpha_sapphire: "Absol ha l’abilità di predire le catastrofi naturali. Vive negli\nambienti montani più aspri e inospitali. Soltanto raramente\nsi allontana dalle montagne per avventurarsi a valle."
        de:
          omega_ruby: "Jedes Mal, wenn Absol sich den Menschen zeigt, endet dies\nin einer Katastrophe wie Erdbeben oder Sturmflut. Deswegen\nist es auch als das Desaster-Pokémon bekannt."
          alpha_sapphire: "Absol kann bevorstehende Naturkatastrophen voraussagen.\nEs lebt auf einem kargen, zerklüfteten Berg. Dieses Pokémon\nwagt sich nur sehr selten ins Tal herunter."
        es:
          omega_ruby: "Cada vez que Absol aparece ante la gente, ocurre una\ncatástrofe natural como un terremoto o un maremoto. Por esta\nrazón se le conoce como el Pokémon de las catástrofes."
          alpha_sapphire: "Absol tiene la habilidad de predecir las catástrofes naturales.\nEste Pokémon vive en hábitats montañosos, hostiles y\naccidentados de los que rara vez se aleja."
        ko:
          omega_ruby: "앱솔이 사람들 앞에 나타나면 반드시\n지진이나 해일 등의 재해가 일어나서\n재난포켓몬이라는 별명으로 불렸다."
          alpha_sapphire: "자연재해를 감지하는 힘을 지녔다.\n험한 산악 지대에 서식하며\n좀처럼 산기슭에는 내려오지 않는다."
