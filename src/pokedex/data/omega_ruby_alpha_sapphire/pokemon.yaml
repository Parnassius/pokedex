          omega_ruby: "ちかふかくの　こうおん　こうあつな\nかんきょうで　うまれた。あたまの\nいしから　エネルギーを　はなつ。"
          alpha_sapphire: "うまれてから　すうおくねんの　あいだ\nちていで　ねむっていた。どうくつを\nほると　たまに　でてくる。"
        jp_kanji:
          omega_ruby: "地下深くの　高温　高圧な\n環境で　生まれた。\n頭の　石から　エネルギーを　放つ。"
          alpha_sapphire: "生まれてから　数億年の間\n地底で　眠っていた。\n洞窟を　掘ると　たまに　出てくる。"
        en:
          omega_ruby: "Born from the temperatures and pressures\ndeep underground, it fires beams from the\nstone in its head."
          alpha_sapphire: "It has slept underground for hundreds of millions\nof years since its birth. It’s occasionally found\nduring the excavation of caves."
        fr:
          omega_ruby: "Ce Pokémon vient des profondeurs de la terre, où la chaleur\net la pression sont intenses. La pierre qui orne sa tête émet\nde l’énergie."
          alpha_sapphire: "Il sommeille sous terre depuis son apparition, il y a\nplusieurs centaines de millions d’années. On le découvre\nparfois en creusant des cavernes."
        it:
          omega_ruby: "Nato in ambienti sotterranei a elevati livelli di pressione e\ntemperatura, emette energia dalla pietra che ha sulla testa."
          alpha_sapphire: "Dopo la nascita, dorme nelle viscere della terra per milioni\ndi anni. A volte se ne trova qualche esemplare scavando\nnelle caverne."
        de:
          omega_ruby: "Dieses Pokémon entstand aus Druck und Hitze in den tiefsten\nErdschichten. Mithilfe des Steines in seinem Kopf feuert es\nEnergiestrahlen ab."
          alpha_sapphire: "Nach seiner Geburt brachte es hunderte Millionen von\nJahren tief unter der Erde schlafend zu. Es tritt gelegentlich\nbei Höhlengrabungen zutage."
        es:
          omega_ruby: "Nace en las profundidades subterráneas, a altas temperaturas\ny a gran presión. Irradia energía por la roca que tiene en la\ncabeza."
          alpha_sapphire: "Lleva varios cientos de millones de años durmiendo en las\nprofundidades subterráneas, desde su nacimiento. Aparece\na veces al excavar en cuevas."
        ko:
          omega_ruby: "지하 깊은 곳에 있는 고온, 고압의\n환경에서 태어났다. 머리의\n돌에서 에너지를 방출한다."
          alpha_sapphire: "태어나서 수억 년 동안\n땅속에 잠들어 있었다. 동굴을\n파면 가끔 나오곤 한다."
