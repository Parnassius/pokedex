          omega_ruby: "するどい　まえばで　けずりとった\nきのえだや　ねっこを　つみあげて\nみずべに　せっせと　すを　つくる。"
          alpha_sapphire: "かわを　きのみきや　どろの　ダムで\nせきとめて　すみかを　つくる。\nはたらきものとして　しられている。"
        jp_kanji:
          omega_ruby: "鋭い　前歯で　削り取った\n木の枝や　根っこを　積み上げて\n水辺に　せっせと　巣を　作る。"
          alpha_sapphire: "川を　木の幹や　泥の　ダムで\nせき止めて　住処を　作る。\n働き者として　知られている。"
        en:
          omega_ruby: "It busily makes its nest with stacks of branches and\nroots it has cut up with its sharp incisors."
          alpha_sapphire: "It makes its nest by damming streams with bark and\nmud. It is known as an industrious worker."
        fr:
          omega_ruby: "Il tranche les branches et les racines de ses incisives aiguisées\npour construire des barrages."
          alpha_sapphire: "Il construit des barrages de boue et d’écorce le long\ndes fleuves. C’est un ouvrier de renom."
        it:
          omega_ruby: "Costruisce con zelo la tana in riva ai corsi d’acqua, levigando\nradici e rami con gli affilati incisivi."
          alpha_sapphire: "Sbarra il corso dei fiumi con corteccia e fango per farsi la tana.\nÈ noto come lavoratore instancabile."
        de:
          omega_ruby: "Emsig durchbeißt es mit seinen scharfen Vorderzähnen\nWurzeln und Äste und baut daraus sein Nest."
          alpha_sapphire: "Es baut sein Nest, indem es in Flüssen Dämme aus Schlamm\nund Ästen baut. Ein fleißiger Arbeiter."
        es:
          omega_ruby: "Con sus incisivos roe ramas y raíces y las apila para construir\nsus madrigueras junto al río."
          alpha_sapphire: "Para anidar, crea presas en los ríos con maderas y barro.\nTiene fama de trabajador."
        ko:
          omega_ruby: "예리한 앞니로 갉아 얻은\n나뭇가지나 뿌리를 쌓아\n물가에 부지런히 보금자리를 만든다."
          alpha_sapphire: "강을 나무줄기나 진흙의 댐으로\n막아서 거처를 만든다.\n부지런한 일꾼으로 알려져 있다."
kricketot:
