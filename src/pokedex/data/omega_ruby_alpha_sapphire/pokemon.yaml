          alpha_sapphire: "かざんの　ふもとに　せいそくする。\n５ほんの　ツノから　ほのおを　だして\nおそってきた　てきを　げきたいする。"
        jp_kanji:
          omega_ruby: "太陽から　生まれたと　いわれる。\n進化するとき　ツノから　噴き出した\n炎で　全身を　包みこむ。"
          alpha_sapphire: "火山の　ふもとに　生息する。\n５本の　ツノから　炎を　出して\n襲ってきた　敵を　撃退する。"
        en:
          omega_ruby: "Said to have been born from the sun, it spews fire\nfrom its horns and encases itself in a cocoon of fire\nwhen it evolves."
          alpha_sapphire: "The base of volcanoes is where they make their\nhomes. They shoot fire from their five horns to repel\nattacking enemies."
        fr:
          omega_ruby: "On dit que ce Pokémon serait né du soleil. Il évolue\nen enveloppant son corps des flammes qui jaillissent\nde ses cornes."
          alpha_sapphire: "Il vit au pied des volcans. Il repousse ceux qui l’attaquent\navec les flammes qui jaillissent de ses cinq cornes."
        it:
          omega_ruby: "Si dice che sia nato dal sole. Prima di evolversi, avvolge\ntutto il suo corpo nelle fiamme emesse dai corni."
          alpha_sapphire: "Vive ai piedi dei vulcani. Se attaccato, mette in fuga il nemico\nlanciando fiamme dai suoi cinque corni."
        de:
          omega_ruby: "Es heißt, es sei ein Produkt der Sonne. Wenn es sich\nentwickelt, hüllt es sich in Flammen, die es aus seinen\nHörnern bläst."
          alpha_sapphire: "Es lebt am Fuß von Vulkanen. Mit Gegnern räumt es auf,\nindem es aus seinen fünf Hörnern Flammen auf sie abfeuert."
        es:
          omega_ruby: "Se dice que nació del sol. Al evolucionar, cubre su cuerpo\ncon llamas que brotan de sus cuernos."
          alpha_sapphire: "Vive en las laderas de los volcanes. Emite fuego por sus cinco\ncuernos para ahuyentar a sus enemigos."
        ko:
          omega_ruby: "태양에서 태어났다고 전해진다.\n진화할 때 뿔에서 뿜어져 나온\n불꽃으로 전신을 감싼다."
          alpha_sapphire: "화산 기슭에 서식한다.\n5개의 뿔에서 불꽃이 나와\n달려드는 상대를 격퇴한다."
