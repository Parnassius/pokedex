          alpha_sapphire: "プラズマで　できた　からだを　もつ。\nでんかせいひんに　もぐりこみ\nわるさを　することで　しられている。"
        jp_kanji:
          omega_ruby: "特殊な　モーターを　動かす\n動力源として　長い　あいだ\n研究されていた　ポケモン。"
          alpha_sapphire: "プラズマで　できた　体を　持つ。\n電化製品に　潜りこみ\n悪さを　することで　知られている。"
        en:
          omega_ruby: "Research continues on this Pokémon, which could\nbe the power source of a unique motor."
          alpha_sapphire: "Its body is composed of plasma. It is known to\ninfiltrate electronic devices and wreak havoc."
        fr:
          omega_ruby: "Un Pokémon longtemps étudié comme source d’énergie\npour un moteur très spécial."
          alpha_sapphire: "Son corps est fait de plasma. Il cause de gros dégâts\nen infiltrant des appareils électroniques."
        it:
          omega_ruby: "Questo Pokémon è stato usato a lungo per ricerche come\nforza motrice su motori speciali."
          alpha_sapphire: "Il suo corpo è composto di plasma. È solito infiltrarsi negli\nstrumenti elettronici per provocare caos."
        de:
          omega_ruby: "Dieses Pokémon wurde lange Zeit erforscht, um als\nEnergiequelle für einen besonderen Motor zu dienen."
          alpha_sapphire: "Sein Körper besteht aus Plasma. Mit ihm kann es in elektrische\nGeräte eindringen und für Chaos sorgen."
        es:
          omega_ruby: "Desde hace mucho tiempo se estudia su singular motor como\nfuente de energía motriz."
          alpha_sapphire: "Su cuerpo está hecho de plasma. Puede infiltrarse en\ndispositivos electrónicos e inutilizarlos."
        ko:
          omega_ruby: "특수한 모터를 움직이는\n동력원으로서 긴 시간 동안\n연구되었던 포켓몬이다."
