          omega_ruby: "まっかな　ひとみは　あやしい　ひかりを　はなち\nあいての　こころを　じざいに　あやつる。\n１０００ねんかん　いきると　いわれている。"
          alpha_sapphire: "９にんの　せいなる　ちからを　もった　せんにんが\nがったいして　うまれたという　でんせつが　ある。\nちのうが　たかく　ひとの　ことばを　りかいする。"
        jp_kanji:
          omega_ruby: "真っ赤な　瞳は　怪しい　光を　放ち\n相手の　心を　自在に　操る。\n１０００年間　生きると　いわれている。"
          alpha_sapphire: "９人の　聖なる　力を　持った　仙人が\n合体して　生まれたという　伝説が　ある。\n知能が　高く　人の　言葉を　理解する。"
        en:
          omega_ruby: "Ninetales casts a sinister light from its bright red eyes to gain\ntotal control over its foe’s mind. This Pokémon is said to live\nfor a thousand years."
          alpha_sapphire: "Legend has it that Ninetales came into being when\nnine wizards possessing sacred powers merged into one.\nThis Pokémon is highly intelligent—it can understand\nhuman speech."
        fr:
          omega_ruby: "Feunard peut envoyer un inquiétant rayon avec ses yeux\nrouge vif pour prendre le contrôle de l’esprit de son ennemi.\nOn raconte que ce Pokémon peut vivre 1 000 ans."
          alpha_sapphire: "La légende raconte que Feunard est apparu lorsque\nneuf sorciers aux pouvoirs sacrés décidèrent de fusionner.\nCe Pokémon est très intelligent. Il comprend la langue\ndes hommes."
        it:
          omega_ruby: "Ninetales emana sinistri bagliori dai luminosi occhi rossi\nper acquisire il controllo totale della mente del suo nemico.\nSi dice che possa vivere anche per mille anni."
          alpha_sapphire: "Narra la leggenda che Ninetales sia nato dalla fusione di\nnove maghi dai sacri poteri in un’unica creatura. Questo\nPokémon estremamente intelligente riesce a capire\nil linguaggio umano."
        de:
          omega_ruby: "Vulnona sendet einen unheimlichen Lichtstrahl aus seinen\nhellroten Augen aus, um totale Kontrolle über die Gedanken\nseines Gegners zu erlangen. Man sagt, dieses Pokémon\nkönne 1 000 Jahre leben."
          alpha_sapphire: "Eine Legende besagt, dass Vulnona zu existieren begann,\nals neun Zauberer mit heiligen Kräften zu einem verschmolzen.\nDieses Pokémon ist hochintelligent und versteht die\nmenschliche Sprache."
        es:
          omega_ruby: "Ninetales emite una siniestra luz a través de los brillantes ojos\nrojos que tiene, para conseguir controlar del todo la mente de\nsu rival. Dicen que este Pokémon llega a vivir mil años."
          alpha_sapphire: "Cuenta la leyenda que Ninetales nació de la fusión de nueve\nhechiceros que tenían poderes sagrados. Este Pokémon es\nrealmente inteligente. Entiende el lenguaje humano."
        ko:
          omega_ruby: "새빨간 눈은 괴상한 빛을 발산하여\n상대의 마음을 자유로이 조종한다.\n1000년을 산다고 전해진다."
          alpha_sapphire: "성스러운 힘을 지닌 9명의 신선이\n합체하여 태어났다는 전설이 있다.\n지능이 높아서 사람의 말을 이해한다."
