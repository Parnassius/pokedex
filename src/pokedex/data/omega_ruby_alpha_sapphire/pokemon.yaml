        - rock
        - steel
      egg_groups:
        - monster
      abilities:
        - sturdy
      hidden_ability: soundproof
      descriptions:
        jp_kana:
          omega_ruby: "たいぼくの　みきに　こすりつけて\nかたい　かおを　みがく　しゅうせい。\nうしろからの　こうげきに　よわい。"
          alpha_sapphire: "１おくねんまえの　ちそう　から\nほりだされた　かせきから　うまれた。\nとても　がんじょうな　かおを　もつ。"
        jp_kanji:
          omega_ruby: "大木の　幹に　こすりつけて\n硬い　顔を　磨く　習性。\n後ろからの　攻撃に　弱い。"
          alpha_sapphire: "１億年前の　地層から\n掘り出された　化石から　生まれた。\nとても　頑丈な　顔を　持つ。"
        en:
          omega_ruby: "It habitually polishes its face by rubbing it against\ntree trunks. It is weak to attacks from behind."
          alpha_sapphire: "It was generated from a fossil dug out of a layer of\nclay that was older than anyone knows. It has a\nsturdy face."
        fr:
          omega_ruby: "Il a l’habitude de polir son visage en le frottant contre\nun tronc. Il craint les attaques dans le dos."
          alpha_sapphire: "Il est né d’un fossile datant de 100 millions d’années.\nSon visage est très dur."
        it:
          omega_ruby: "Si pulisce il muso strofinandolo contro i tronchi degli alberi.\nÈ vulnerabile agli attacchi alle spalle."
          alpha_sapphire: "Nato da un fossile portato alla luce da uno strato di\n100 milioni di anni fa. Ha un muso resistente."
        de:
          omega_ruby: "Es reibt sein Gesicht an Baumstämmen, um es zu polieren.\nEs ist leicht, es von hinten anzugreifen."
          alpha_sapphire: "Das Fossil, aus dem es entstand, wurde aus einer\n100 Millionen Jahre alten Gesteinsschicht geborgen."
        es:
          omega_ruby: "Se abrillanta la cara frotándola contra los árboles. Es\nvulnerable a los ataques por la espalda."
          alpha_sapphire: "Surgió de un fósil de hace 100 millones de años.\nSu protección facial es tremendamente dura."
        ko:
          omega_ruby: "큰 나무의 줄기에 비벼서\n단단한 얼굴을 닦는 습성이 있다.\n뒤로부터의 공격에 약하다."
          alpha_sapphire: "1억 년 전의 지층에서\n발굴된 화석에서 태어났다.\n매우 튼튼한 얼굴을 가졌다."
