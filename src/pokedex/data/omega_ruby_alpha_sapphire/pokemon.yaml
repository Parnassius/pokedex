        jp_kana:
          omega_ruby: "やわらかい　からだを　つよくおすと\nむらさきいろの　なぞの　えきたいが\nにじみでるので　ようちゅうい。"
          alpha_sapphire: "すむ　ばしょの　かんきょうに　よって\nからだの　かたちや　いろが\nへんか　しやすい　ポケモンだ。"
        jp_kanji:
          omega_ruby: "やわらかい　体を　強く押すと\n紫色の　ナゾの　液体が\nにじみ出るので　要注意。"
          alpha_sapphire: "住む　場所の　環境に　よって\n体の　形や　色が\n変化しやすい　ポケモンだ。"
        en:
          omega_ruby: "Beware of pushing strongly on its squishy body,\nas it makes a mysterious purple fluid ooze out."
          alpha_sapphire: "Its shape and coloration vary, depending on\nits habitat."
        fr:
          omega_ruby: "Un étrange liquide mauve s’échappe de son corps,\nne lui appuyez pas dessus."
          alpha_sapphire: "Il change facilement de couleur ou de forme en fonction\nde son environnement."
        it:
          omega_ruby: "Se si esercita una forte pressione sul suo corpo, ne fuoriesce\nun misterioso liquido viola."
          alpha_sapphire: "Cambia facilmente aspetto e colore secondo il luogo\ndi provenienza."
        de:
          omega_ruby: "Nicht seinen Körper zusammendrücken, sonst sickert eine\nseltsame lilafarbene Flüssigkeit aus!"
          alpha_sapphire: "Form und Farbe dieses Pokémon ändern sich je nach\nder Umgebung, in der es lebt."
        es:
          omega_ruby: "No hay que apretarle muy fuerte, ya que, si lo haces, secreta\nun misterioso fluido morado."
          alpha_sapphire: "Shellos adapta la forma y color de su cuerpo dependiendo\ndel lugar en donde viva."
        ko:
          omega_ruby: "부드러운 몸을 강하게 누르면\n보랏빛이 나는 정체불명의 액체가\n배어 나오므로 주의가 필요하다."
          alpha_sapphire: "사는 장소의 환경에 따라\n몸의 모양과 색깔이\n변화하기 쉬운 포켓몬이다."
