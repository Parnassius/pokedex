          omega_ruby: "たいこの　かせきから　よみがえった　ポケモン。\nあたたかい　うみに　せいそくし　はったつした\n２ほんの　ツメで　えものを　がっちり　つかむ。"
          alpha_sapphire: "ポケモンの　せんぞの　いっしゅと　いわれている。\nからだの　よこに　ついた　８まいの　はねを\nくねらせて　たいこの　うみを　およいでいた。"
        jp_kanji:
          omega_ruby: "太古の　化石から　蘇った　ポケモン。\n暖かい　海に　生息し　発達した\n２本の　ツメで　獲物を　がっちり　つかむ。"
          alpha_sapphire: "ポケモンの　先祖の　一種と　いわれている。\n体の　横に　ついた　８枚の　羽を\nくねらせて　太古の　海を　泳いでいた。"
        en:
          omega_ruby: "Anorith was regenerated from a prehistoric fossil. This primitive\nPokémon once lived in warm seas. It grips its prey firmly\nbetween its two large claws."
          alpha_sapphire: "Anorith is said to be a type of Pokémon predecessor, with\neight wings at the sides of its body. This Pokémon swam in the\nprimordial sea by undulating these eight wings."
        fr:
          omega_ruby: "Anorith fut ressuscité à partir d’un fossile préhistorique.\nCe Pokémon primitif vivait à l’époque dans les eaux tropicales.\nIl attrape fermement sa proie avec ses deux grandes pinces."
          alpha_sapphire: "On raconte qu’Anorith est l’un des ancêtres des Pokémon.\nIl nageait dans la mer originelle en faisant onduler les huit\nailes placées sur les côtés de son corps."
        it:
          omega_ruby: "Anorith è stato rigenerato da un fossile preistorico. Un tempo\nviveva nei mari caldi. Questo Pokémon afferra saldamente\nla preda con i suoi due artigli."
          alpha_sapphire: "Si dice che Anorith sia un Pokémon antenato, con otto ali\nsui fianchi. Il Pokémon nuotava nei mari primordiali remando\ncon le otto ali."
        de:
          omega_ruby: "Anorith wurde aus einem prähistorischen Fossil erzeugt. Dieses\nprimitive Pokémon lebte einst in warmen Gewässern. Es klemmt\nseine Beute fest zwischen seine beiden riesigen Klauen ein."
          alpha_sapphire: "Anorith soll ein Pokémon-Vorgänger sein, es hat acht Flügel\nan seinem Körper. Dieses Pokémon schwamm im Urmeer,\nindem es seine acht Flügel schwang."
        es:
          omega_ruby: "Anorith se regeneró a partir de un fósil prehistórico. Este\nPokémon primitivo vivía en mares cálidos. Gracias a sus\nenormes pinzas puede agarrar a su presa con firmeza."
          alpha_sapphire: "De Anorith dicen que es una especie de Pokémon predecesor.\nTiene ocho alas a ambos lados del cuerpo. Gracias a ellas,\npudo nadar por las primeras aguas que hubo."
        ko:
          omega_ruby: "태고의 화석에서 되살아난 포켓몬이다.\n따뜻한 바다에 서식하며 발달한\n2개의 발톱으로 먹이를 꽉 잡는다."
          alpha_sapphire: "포켓몬의 조상 중 하나라고 전해지고 있다.\n몸의 측면에 붙어 있는 8개의 날개를\n구부려 태고의 바다를 헤엄쳤다."
