      descriptions:
        jp_kana:
          omega_ruby: "ほっぺたに　どくぶくろを　もつ。\nあいての　すきを　ついて　もうどくを\nにじませている　ゆびを　つきさす。"
          alpha_sapphire: "どくぶくろを　ふくらませて　ならし\nあたりに　ぶきみな　おとを　ひびかせ\nあいてが　ひるむと　どくづきをする。"
        jp_kanji:
          omega_ruby: "ほっぺたに　毒袋を　持つ。\n相手の　すきを　ついて　猛毒を\nにじませている　指を　突き刺す。"
          alpha_sapphire: "毒袋を　ふくらませて　鳴らし\n辺りに　不気味な　音を　響かせ\n相手が　ひるむと　どくづきをする。"
        en:
          omega_ruby: "Its cheeks hold poison sacs. It tries to catch foes\noff guard to jab them with toxic fingers."
          alpha_sapphire: "Inflating its poison sacs, it fills the area with an odd\nsound and hits flinching opponents with a\npoison jab."
        fr:
          omega_ruby: "Ses joues contiennent des glandes toxiques. Il attaque\npar surprise et utilise son toucher empoisonné."
          alpha_sapphire: "Ses glandes se gonflent de venin tout en émettant un son\neffrayant, le laissant ainsi empoisonner ses proies pétrifiées."
        it:
          omega_ruby: "Le sacche delle guance contengono veleno. Infilza i nemici\ncon le sue unghie avvelenate."
          alpha_sapphire: "Gonfia le sue sacche di veleno emettendo un verso sinistro\nche può far tentennare l’avversario, poi lo avvelena."
        de:
          omega_ruby: "In seinen Backen sammelt sich Gift. Es versucht, Beute zu\nüberraschen und mit Giftfingern zu schnappen."
          alpha_sapphire: "Bläst es seine Giftbeutel auf, ertönt ein unheimliches\nGeräusch, das Gegner zurückschrecken lässt und vergiftet."
        es:
          omega_ruby: "Tiene bolsas venenosas en las mejillas. Pilla desprevenidos a\nsus rivales para pincharles."
          alpha_sapphire: "Infla sus bolsas venenosas para emitir un sonido macabro\nmientras asesta golpes que hacen retroceder a los rivales."
        ko:
          omega_ruby: "볼에 독주머니를 가지고 있다.\n상대의 틈을 노려 맹독이\n밴 손가락을 꿰찌른다."
          alpha_sapphire: "독주머니를 부풀려서 울어\n주변에 으스스한 소리를 퍼트려\n상대가 풀죽으면 독찌르기를 한다."
toxicroak:
  species_id: 454
  names:
    jp_kana: ドクロッグ
    jp_kanji: ドクロッグ
    en: Toxicroak
    fr: Coatox
    it: Toxicroak
    de: Toxiquak
    es: Toxicroak
    ko: 독개굴
