      base_stats:
        hp: 100
        attack: 100
        defense: 100
        special_attack: 100
        special_defense: 100
        speed: 100
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - serene_grace
      held_items:
        common: star_piece
        rare: star_piece
      descriptions:
        jp_kana:
          omega_ruby: "めざめた　とき　あたまの　たんざくに　かかれた\nねがいを　かなえると　いう　でんせつを　もつ。\nきけんを　かんじると　ねむったまま　たたかう。"
          alpha_sapphire: "きよらかな　こえで　うたを　きかせて　あげると\n１０００ねんの　ねむりから　めを　さます。\nひとの　ねがいを　なんでも　かなえると　いう。"
        jp_kanji:
          omega_ruby: "目覚めた　とき　頭の　短冊に　書かれた\n願いを　かなえると　いう　伝説を　もつ。\n危険を　感じると　眠ったまま　戦う。"
          alpha_sapphire: "清らかな　声で　歌を　聞かせて　あげると\n１０００年の　眠りから　目を　覚ます。\n人の　願いを　なんでも　かなえると　いう。"
        en:
          omega_ruby: "A legend states that Jirachi will make true any wish that is\nwritten on notes attached to its head when it awakens. If this\nPokémon senses danger, it will fight without awakening."
          alpha_sapphire: "Jirachi will awaken from its sleep of a thousand years if you\nsing to it in a voice of purity. It is said to make true any wish\nthat people desire."
        fr:
          omega_ruby: "Une légende raconte qu’à son réveil, Jirachi réalise n’importe\nquel souhait inscrit sur les papiers collés sur sa tête.\nSi ce Pokémon se sent en danger, il se défend sans même\nse réveiller."
          alpha_sapphire: "Jirachi dort depuis mille ans, mais il se réveillera si on lui\nchante quelque chose avec une voix d’une grande pureté.\nOn raconte qu’il peut exaucer les vœux des gens."
        it:
          omega_ruby: "La leggenda racconta che Jirachi realizza ogni desiderio\nscritto su bigliettini che trova attaccati alla propria testa,\nquando si sveglia. In caso di pericolo, lotta senza mai\nsvegliarsi."
          alpha_sapphire: "Jirachi può essere destato dal suo sonno millenario cantando\ncon una voce pura e cristallina. Riesce a realizzare ogni\ndesiderio espresso dalle persone."
        de:
          omega_ruby: "Einer Legende nach erfüllt Jirachi jeden Wunsch, der auf einen\nNotizzettel an seinem Kopf geschrieben wird. Wenn dieses\nPokémon Gefahr wittert, kämpft es bereits, bevor es überhaupt\naufgewacht ist."
          alpha_sapphire: "Jirachi wird aus seinem tausendjährigen Schlaf erwachen,\nwenn du ihm mit klarer Stimme etwas vorsingst. Es soll\nangeblich alle Wünsche der Menschen erfüllen."
        es:
          omega_ruby: "Cuenta la leyenda que Jirachi hará realidad cualquier deseo\nque se le escriba en las notas que lleva en la cabeza cuando\nlas lea tras salir de su letargo. Si este Pokémon siente peligro,\nluchará sin haber llegado a despertarse."
          alpha_sapphire: "Jirachi despertará de su letargo de miles de años si se le\ncanta con una voz pura. Dicen que este Pokémon hace\nrealidad cualquier deseo que se tenga."
        ko:
          omega_ruby: "깨어났을 때 머리에 있는 종이에 적힌\n소원을 이루어준다는 전설을 가졌다.\n위험을 느끼면 잠든 채로 싸운다."
          alpha_sapphire: "밝고 맑은 목소리로 노래를 들려주면\n1000년의 잠에서 깨어난다.\n사람의 소원을 무엇이든 들어준다고 한다."
