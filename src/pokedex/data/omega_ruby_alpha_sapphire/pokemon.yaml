          alpha_sapphire: "おおむかし　ぜつめつした　ポケモンの　いっしゅ。\nちじょうで　くらすとき　べんりな　ように\n２ほんの　あしで　あるくように　なったと　いう。"
        jp_kanji:
          omega_ruby: "甲羅は　あらゆる　攻撃を　はね返す。\n伸び　縮みする　巨大な　２本の　ツメは\n鉄板を　くし刺しにする　ほどの　威力だ。"
          alpha_sapphire: "大昔　絶滅した　ポケモンの　一種。\n地上で　暮らすとき　便利な　ように\n２本の　足で　歩くように　なったと　いう。"
        en:
          omega_ruby: "Armaldo’s tough armor makes all attacks bounce off. This\nPokémon’s two enormous claws can be freely extended or\ncontracted. They have the power to punch right through a\nsteel slab."
          alpha_sapphire: "Armaldo is a Pokémon species that became extinct in\nprehistoric times. This Pokémon is said to have walked\non its hind legs, which would have been more convenient\nfor life on land."
        fr:
          omega_ruby: "Le puissant blindage d’Armaldo peut repousser toute attaque.\nLes énormes pinces de ce Pokémon peuvent s’allonger ou\nse rétracter. Elles peuvent transpercer une plaque d’acier."
          alpha_sapphire: "Armaldo fait partie d’une espèce de Pokémon qui s’est\néteinte à l’époque préhistorique. On raconte que ce Pokémon\nmarchait sur ses pattes arrière, ce qui facilitait sa vie sur\nla terre ferme."
        it:
          omega_ruby: "La dura corazza di Armaldo protegge da ogni tipo di attacco.\nI suoi due enormi artigli sono in grado di estendersi\ne contrarsi. Inoltre sono dotati di una potenza tale\nda spaccare una lastra d’acciaio."
          alpha_sapphire: "Armaldo è una specie di Pokémon estinta già in tempi antichi.\nSi dice che camminasse sugli arti inferiori per affrontare meglio\nil tipo di vita che conduceva sulla terraferma."
        de:
          omega_ruby: "Von Armaldos hartem Panzer prallen alle Angriffe ab. Dieses\nPokémon hat zwei mächtige Klauen, die es ausfahren oder\neinziehen kann. Es hat so viel Kraft, dass es damit eine\nStahlplatte pulverisieren kann."
          alpha_sapphire: "Armaldo ist eine Pokémon-Art, die vor vielen Jahren\nausgestorben ist. Dieses Pokémon soll sich auf seinen\nHinterbeinen fortbewegt haben, da dies für das Leben\nan Land bequemer war."
        es:
          omega_ruby: "Armaldo tiene una sólida armadura que repele cualquier\nataque. Este Pokémon puede estirar o encoger todo lo que\nquiera las pinzas que tiene. Con ellas, puede atravesar una\nplancha de acero."
          alpha_sapphire: "Armaldo es una de las especies de Pokémon que se\nextinguieron en la era prehistórica. Se cree que caminaban\nsobre las patas traseras; lo más apropiado para la vida en\ntierra firme."
        ko:
          omega_ruby: "등껍질은 어떠한 공격이라도 튕겨낸다.\n늘었다 줄었다 하는 거대한 2개의 발톱은\n철판을 찔러 뚫을 정도의 위력을 지녔다."
          alpha_sapphire: "오랜 옛날 멸종된 포켓몬의 한 종류다.\n땅 위에서 살 때 편리하도록\n2개의 다리로 걸을 수 있게 됐다고 한다."
