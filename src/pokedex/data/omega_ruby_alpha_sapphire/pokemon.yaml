      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - hyper_cutter
        - mold_breaker
      hidden_ability: moxie
      descriptions:
        jp_kana:
          omega_ruby: "じぶんの　たいじゅうの　２ばいも　ある　あいてを\nツノで　はさみ　かるがる　もちあげる　かいりき。\nさむい　ばしょでは　からだの　うごきが　にぶる。"
          alpha_sapphire: "たくましい　２ほんの　ツノの　ひょうめんに　ある\nトゲが　あいての　からだに　ふかく　くいこむので\nはさまれると　かんたんに　はずせないのだ。"
        jp_kanji:
          omega_ruby: "自分の　体重の　２倍も　ある　相手を\nツノで　挟み　軽々　持ち上げる　怪力。\n寒い　場所では　体の　動きが　鈍る。"
          alpha_sapphire: "たくましい　２本の　ツノの　表面に　ある\nトゲが　相手の　体に　深く　食い込むので\n挟まれると　簡単に　外せないのだ。"
        en:
          omega_ruby: "Pinsir is astoundingly strong. It can grip a foe weighing twice\nits weight in its horns and easily lift it. This Pokémon’s\nmovements turn sluggish in cold places."
          alpha_sapphire: "Pinsir has a pair of massive horns. Protruding from the surface\nof these horns are thorns. These thorns are driven deeply into\nthe foe’s body when the pincer closes, making it tough for the\nfoe to escape."
        fr:
          omega_ruby: "Scarabrute est incroyablement fort. Il peut attraper un ennemi\nqui pèse deux fois son poids dans ses mandibules et le\nsoulever sans le moindre problème. Lorsqu’il fait froid,\nles mouvements de ce Pokémon sont un peu ralentis."
          alpha_sapphire: "Scarabrute est doté de cornes imposantes. Des pointes\njaillissent de la surface de ses cornes. Ces pointes s’enfoncent\nprofondément dans le corps de l’ennemi, l’empêchant ainsi\nde s’échapper."
        it:
          omega_ruby: "Pinsir è incredibilmente forte. Può afferrare e sollevare tra\nle chele sul capo un nemico dal peso doppio rispetto al suo.\nI suoi movimenti sono impacciati in luoghi freddi."
          alpha_sapphire: "Pinsir è dotato di due chele enormi sul capo, dalla cui\nsuperficie sporgono aculei. Questi vengono conficcati\nnel corpo del nemico quando le chele si chiudono,\nper impedirne la fuga."
        de:
          omega_ruby: "Pinsir ist erstaunlich stark. Es kann einen Feind, der\ndoppelt so viel wiegt wie es selbst, mit seinen Hörnern\npacken und hochheben. Bei niedrigen Temperaturen\nwerden die Bewegungen dieses Pokémon schwerfällig."
          alpha_sapphire: "Pinsir hat ein Paar massive Hörner. Aus diesen ragen Dornen\nhervor, die sich in den Körper seines Gegners hineinbohren,\nwenn sich die Zange schließt, und ihm das Entkommen\nschwer machen."
        es:
          omega_ruby: "Pinsir es sorprendentemente fuerte. Puede agarrar con los\ncuernos a un rival que pese el doble que él y levantarlo por\nlos aires. En zonas frías, los movimientos de este Pokémon\nse vuelven lentos."
          alpha_sapphire: "Pinsir tiene un par de cuernos imponentes recubiertos de\npinchos, que se clavan en el cuerpo del rival. Una vez que\nlos ha clavado, no hay quien escape de su abrazo."
        ko:
          omega_ruby: "자신의 몸무게 두 배나 되는 상대를 뿔로\n집어 가볍게 들어 올리는 괴력을 지녔다.\n추운 곳에서는 몸의 움직임이 둔해진다."
          alpha_sapphire: "늠름한 2개의 뿔 표면에 있는\n가시가 상대의 몸에 깊숙이 파고들어서\n집히면 쉽게 벗어날 수 없다."
