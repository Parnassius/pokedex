        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          omega_ruby: "おちない　ように　いとを　えだに　まきつけて\nからだを　ささえながら　しんかを　まっている。\nちいさな　あなから　そとの　ようすを　うかがう。"
          alpha_sapphire: "しんかするまで　なにも　たべずに　たえていると\nかんがえられていたが　どうやら　いとに　ついた\nあまみずで　かわきを　いやしているらしい。"
        jp_kanji:
          omega_ruby: "落ちない　ように　糸を　枝に　巻きつけて\n体を　支えながら　進化を　待っている。\n小さな　穴から　外の　様子を　伺う。"
          alpha_sapphire: "進化するまで　なにも　食べずに　耐えていると\n考えられていたが　どうやら　糸に　ついた\n雨水で　乾きを　癒しているらしい。"
        en:
          omega_ruby: "Silcoon tethers itself to a tree branch using silk to keep from\nfalling. There, this Pokémon hangs quietly while it awaits\nevolution. It peers out of the silk cocoon through a small hole."
          alpha_sapphire: "Silcoon was thought to endure hunger and not consume\nanything before its evolution. However, it is now thought\nthat this Pokémon slakes its thirst by drinking rainwater\nthat collects on its silk."
        fr:
          omega_ruby: "Armulys s’accroche à une branche d’arbre avec de la soie\npour éviter de tomber. Ce Pokémon y reste tranquillement\nen attendant son évolution. Il regarde l’extérieur à travers\ndeux petits trous dans son cocon de soie."
          alpha_sapphire: "On pensait qu’Armulys pouvait résister à la faim et ne\nconsommait rien avant son évolution. On sait maintenant\nque ce Pokémon étanche sa soif en récupérant l’eau\nde pluie déposée sur sa soie."
        it:
          omega_ruby: "Silcoon si lega ai rami degli alberi grazie ad alcuni fili di seta\nche gli impediscono di cadere. In tale posizione aspetta\npazientemente l’evoluzione. Sbircia fuori dal proprio bozzolo\ndi seta attraverso piccoli fori."
          alpha_sapphire: "In passato si pensava che Silcoon resistesse alla fame senza\ningerire nulla fino all’evoluzione. Tuttavia, ora si presume che\nil Pokémon plachi la sua sete bevendo l’acqua piovana che\nsi posa sul suo bozzolo."
        de:
          omega_ruby: "Schaloko bindet sich mit einem Seidenfaden an einen Ast.\nEs baumelt dort und wartet auf seine Entwicklung. Durch zwei\nkleine Löcher in seinem Seidenkokon lugt es heraus."
          alpha_sapphire: "Bisher nahm man an, dass Schaloko vor seiner Entwicklung\nhungert und überhaupt nichts zu sich nimmt. Nun aber wird\nbehauptet, dass es seinen Durst mit Regenwasser löscht,\ndas sich auf seiner seidigen Hülle sammelt."
        es:
          omega_ruby: "Silcoon usa la seda que produce para aferrarse a la rama de un\nárbol y sujetarse bien. Se queda ahí colgado a la espera de su\nevolución, mientras lo observa todo a través de dos pequeños\nagujeros en su capullo de seda."
          alpha_sapphire: "Se pensaba que Silcoon podía aguantar el hambre y no\nconsumir nada antes de evolucionar. Sin embargo, ahora se\ncree que sacia su sed bebiendo el agua de la lluvia que se le\nqueda sobre la seda del capullo."
        ko:
          omega_ruby: "떨어지지 않도록 실을 가지에 휘감아서\n몸을 지탱하며 진화를 기다리고 있다.\n작은 구멍을 통해 밖의 상황을 살핀다."
          alpha_sapphire: "진화할 때까지 아무것도 먹지 않고 참는 것으로\n여겨져 왔으나 아무래도 실에 맺힌\n빗방울로 갈증을 푸는 것 같다."
