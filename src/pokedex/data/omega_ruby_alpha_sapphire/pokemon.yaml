          alpha_sapphire: "もりや　そうげんに　せいそく。\nグループが　でくわすと　なわばりを\nかけた　あらそいが　はじまる。"
        jp_kanji:
          omega_ruby: "大きな　グループを　作って\n行動する　習性。\nグループ同士の　争いは　激しい。"
          alpha_sapphire: "森や　草原に　生息。\nグループが　出くわすと　なわばりを\nかけた　争いが　はじまる。"
        en:
          omega_ruby: "They maintain huge flocks, although fierce scuffles\nbreak out between various flocks."
          alpha_sapphire: "It lives in forests and fields. Squabbles over\nterritory occur when flocks collide."
        fr:
          omega_ruby: "Il a coutume de se regrouper en larges volées.\nLes combats entre Étourvol sont très violents."
          alpha_sapphire: "Il peuple les champs et les forêts. Lorsque deux volées\nse croisent, elles luttent pour le territoire."
        it:
          omega_ruby: "Ha l’abitudine di riunirsi in grandi gruppi. Le zuffe tra gruppi\nsono particolarmente vivaci."
          alpha_sapphire: "Vive nelle foreste e nei campi muovendosi in grandi gruppi.\nSe due gruppi si incontrano, lottano per il territorio."
        de:
          omega_ruby: "Es neigt dazu, sich in großen Gruppen zu bewegen.\nZwischen ihnen kommt es zu heftigen Kämpfen."
          alpha_sapphire: "Es lebt in Wäldern und auf Wiesen. Treffen Schwärme\naufeinander, streiten sie sich um das Revier."
        es:
          omega_ruby: "Vive siempre en grandes grupos y las disputas dentro de ellos\nson muy intensas."
          alpha_sapphire: "Vive en bosques y campos. Si dos bandadas se encuentran,\npelean por el territorio."
        ko:
          omega_ruby: "큰 그룹을 만들어\n행동하는 습성이 있다.\n그룹 간의 분쟁이 격하다."
          alpha_sapphire: "숲이나 초원에 서식한다.\n그룹이 마주치면 영역을 건\n분쟁이 시작된다."
