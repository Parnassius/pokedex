      descriptions:
        jp_kana:
          omega_ruby: "えいえんの　いのちを　わけあたえると\nいわれている。じゅもくの　すがたで\n１０００ねん　ねむり　ふっかつする。"
          alpha_sapphire: "あたまの　ツノが　なないろに\nかがやくとき　えいえんの　いのちを\nわけあたえると　いわれている。"
        jp_kanji:
          omega_ruby: "永遠の　命を　分け与えると\n言われている。樹木の　姿で\n１０００年　眠り　復活する。"
          alpha_sapphire: "頭の　ツノが　七色に　輝くとき\n永遠の　命を\n分け与えると　言われている。"
        en:
          omega_ruby: "Legends say it can share eternal life.\nIt slept for a thousand years in the form\nof a tree before its revival."
          alpha_sapphire: "When the horns on its head shine\nin seven colors, it is said to be\nsharing everlasting life."
        fr:
          omega_ruby: "On dit que ce Pokémon immortel peut offrir ses forces\nvitales. Il a été ranimé après avoir passé 1 000 ans\nendormi sous la forme d’un arbre."
          alpha_sapphire: "D’après la légende, quand ses bois brillent de sept couleurs,\ncela signifie qu’il prodigue la vie éternelle."
        it:
          omega_ruby: "Si dice che possieda l’immortalità e possa farne dono agli altri.\nTorna in vita dopo aver dormito per 1000 anni sotto forma\ndi albero."
          alpha_sapphire: "Si dice che possieda l’immortalità e che possa farne dono agli\naltri quando le sue corna brillano dei colori dell’arcobaleno."
        de:
          omega_ruby: "Legenden nach kann dieses Pokémon ewiges Leben spenden.\nIn Gestalt eines Baumes ist es aus seinem tausendjährigen\nSchlaf erwacht."
          alpha_sapphire: "Es heißt, dieses Pokémon spende ewiges Leben, sobald das\nGeweih auf seinem Haupt in sieben verschiedenen Farben\nleuchtet."
        es:
          omega_ruby: "Según las leyendas, puede compartir el secreto de la vida\neterna. Ha despertado tras dormir durante mil años bajo la\napariencia de un árbol."
          alpha_sapphire: "Cuando los cuernos de su cabeza brillan en siete colores, se\ndice que comparte el don de la vida eterna."
        ko:
          omega_ruby: "영원한 생명을 나누어 준다고 한다.\n수목의 모습으로 1000년 동안\n잠들고 부활한다."
          alpha_sapphire: "머리의 뿔이 일곱 빛깔로\n빛날 때 영원한 생명을\n나눠준다고 전해진다."
