        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "ひこうするときは　ベールのような\nはねから　ひかる　りゅうしを　だす。\nみかづきのけしんと　よばれている。"
          alpha_sapphire: "クレセリアの　はねを　もって　ねると\nたのしい　ゆめが　みられると　いう。\nみかづきのけしん　と　よばれている。"
        jp_kanji:
          omega_ruby: "飛行するときは　ベールのような\n羽から　光る　粒子を　出す。\n三日月の化身と　呼ばれている。"
          alpha_sapphire: "クレセリアの　羽を　持って　寝ると\n楽しい　夢が　見られると　いう。\n三日月の化身　と　呼ばれている。"
        en:
          omega_ruby: "Shiny particles are released from its wings like a\nveil. It is said to represent the crescent moon."
          alpha_sapphire: "Those who sleep holding Cresselia’s feather are\nassured of joyful dreams. It is said to represent\nthe crescent moon."
        fr:
          omega_ruby: "Ses ailes libèrent un rideau de particules brillantes.\nCe Pokémon symboliserait le croissant de lune."
          alpha_sapphire: "Dormir avec une de ses plumes à la main permet de faire\nde beaux rêves. On le surnomme « avatar du croissant\nde lune »."
        it:
          omega_ruby: "Volando rilascia un velo di particelle brillanti. Si dice che\nrappresenti la luna crescente."
          alpha_sapphire: "Se si dorme con piume di Cresselia, si faranno bei sogni.\nÈ l’incarnazione di uno spicchio di luna."
        de:
          omega_ruby: "Seine Flügel geben schimmernde Partikel ab, die wie ein\nSchleier herabrieseln. Man sagt, es verkörpere die Mondsichel."
          alpha_sapphire: "Hält man eine seiner Federn, träumt man süß. Manche glauben,\nes sei die Verkörperung der Mondsichel."
        es:
          omega_ruby: "Sus alas emiten un velo de partículas brillantes. Se dice que\nrepresenta un cuarto lunar."
          alpha_sapphire: "Si alguien se duerme con una pluma suya, tendrá sueños\nmaravillosos. Encarna el creciente lunar."
        ko:
          omega_ruby: "비행할 때는 베일 같은\n날개에서 빛나는 입자를 낸다.\n초승달의 화신으로 불리고 있다."
          alpha_sapphire: "크레세리아의 날개를 가지고 자면\n즐거운 꿈을 꿀 수 있다고 한다.\n초승달의 화신으로 불리고 있다."
phione:
