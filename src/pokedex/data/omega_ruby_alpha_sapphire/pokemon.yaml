      descriptions:
        jp_kana:
          omega_ruby: "しっぽの　ほのおの　いきおいを\nうまく　コントロールして　じぶんの\nとくいな　まあいで　たたかうのだ。"
          alpha_sapphire: "てんじょうや　かべを　りようして\nくうちゅうさっぽうを　くりだす。\nしっぽの　ほのおも　ぶきの　ひとつ。"
        jp_kanji:
          omega_ruby: "尻尾の　炎の　勢いを\nうまく　コントロールして\n自分の　得意な　間合いで　戦うのだ。"
          alpha_sapphire: "天井や　壁を　利用して\n空中殺法を　繰り出す。\n尻尾の　炎も　武器の　ひとつ。"
        en:
          omega_ruby: "It skillfully controls the intensity of the fire on its\ntail to keep its foes at an ideal distance."
          alpha_sapphire: "It uses ceilings and walls to launch aerial attacks.\nIts fiery tail is but one weapon."
        fr:
          omega_ruby: "Il contrôle habilement l’intensité de la flamme de sa queue\npour tenir ses adversaires à distance."
          alpha_sapphire: "Il attaque en prenant appui sur les murs et les plafonds.\nSa queue ardente n’est pas son seul atout."
        it:
          omega_ruby: "Controlla abilmente l’intensità delle fiamme sulla sua coda\nper tenere i nemici alla distanza ideale."
          alpha_sapphire: "Attacca la preda lanciandosi da soffitti e pareti. Le fiamme\nsulla coda sono solo una delle sue armi."
        de:
          omega_ruby: "Es kontrolliert die Stärke des Feuers auf seinem Schweif\ngeschickt, um Gegner auf Distanz zu halten."
          alpha_sapphire: "Es stürzt sich von Decken und Wänden auf Beute.\nSein feuriger Schweif ist nur eine seiner Waffen."
        es:
          omega_ruby: "Controla hábilmente la intensidad del fuego de su cola para\nmantener al enemigo a una distancia ideal."
          alpha_sapphire: "Utiliza techos y paredes para lanzar ataques aéreos.\nTambién emplea su cola ígnea como arma."
        ko:
          omega_ruby: "꼬리의 불꽃 세기를\n잘 컨트롤하여 자신에게\n맞는 거리를 두고 싸운다."
          alpha_sapphire: "천장이나 벽을 이용하여\n공중 내리찍기를 날린다.\n꼬리의 불꽃도 무기의 하나이다."
infernape:
  species_id: 392
