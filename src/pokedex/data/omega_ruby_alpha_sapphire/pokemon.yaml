        - overcoat
        - magic_guard
      hidden_ability: regenerator
      descriptions:
        jp_kana:
          omega_ruby: "はっきした　サイコパワーを　つかい\nとくしゅな　えきたいで　つくられた\nうでを　あやつり　いわを　くだく。"
          alpha_sapphire: "ランクルス　どうしが　あくしゅすると\nのうみそが　ネットワークで　つながり\nサイコパワーが　ぞうふくされるのだ。"
        jp_kanji:
          omega_ruby: "発揮した　サイコパワーを　使い\n特殊な　液体で　つくられた\n腕を　操り　岩を　砕く。"
          alpha_sapphire: "ランクルス　同士が　握手すると\n脳みそが　ネットワークで　つながり\nサイコパワーが　増幅されるのだ。"
        en:
          omega_ruby: "They use psychic power to control their arms,\nwhich are made of a special liquid. They can crush\nboulders psychically."
          alpha_sapphire: "When Reuniclus shake hands, a network forms\nbetween their brains, increasing their\npsychic power."
        fr:
          omega_ruby: "Ses bras, faits d’une matière conduisant ses pouvoirs\npsychiques, sont assez puissants pour broyer des rochers."
          alpha_sapphire: "Quand ils se tiennent par la main, leurs cerveaux forment\nun réseau qui démultiplie leurs pouvoirs psychiques."
        it:
          omega_ruby: "Le sue braccia, piene di un liquido che convoglia i suoi poteri\npsichici, sono anche in grado di frantumare le rocce."
          alpha_sapphire: "Quando i Reuniclus si tengono per mano, i loro cervelli\nsi interconnettono e i poteri psichici si amplificano."
        de:
          omega_ruby: "Seine Arme bestehen aus einer speziellen Flüssigkeit. Dank\nseiner Psycho-Kräfte kann es mit ihnen Felsen zerschmettern."
          alpha_sapphire: "Schütteln sich zwei von ihnen die Hände, bilden ihre\nDenkapparate ein Netzwerk und ihre Psycho-Kräfte\nwerden stärker."
        es:
          omega_ruby: "Hacen gala de su poder psíquico y mueven sus brazos\ncompuestos de líquido para controlar rocas y hacerlas\nañicos."
          alpha_sapphire: "Cuando los Reuniclus se dan la mano, sus cerebros se\nconectan y multiplican sus poderes psíquicos."
        ko:
          omega_ruby: "발휘한 사이코 파워를 사용해\n특수한 액체로 만들어진\n팔을 조종해서 바위를 부순다."
          alpha_sapphire: "란쿨루스끼리 악수를 하면\n뇌가 네트워크처럼 연결되어\n사이코 파워가 증폭된다."
ducklett:
