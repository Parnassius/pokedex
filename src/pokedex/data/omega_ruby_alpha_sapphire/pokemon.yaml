      descriptions:
        jp_kana:
          omega_ruby: "プラズマだんによって　かいぞうされた\nこだいの　むしポケモン。せなかの\nたいほうが　パワーアップした。"
          alpha_sapphire: "３おくねんまえに　いた　ポケモン。\nプラズマだんに　かいぞう　され\nせなかに　ほうだいを　つけられた。"
        jp_kanji:
          omega_ruby: "プラズマ団によって　改造された\n古代の　むしポケモン。\n背中の　大砲が　パワーアップした。"
          alpha_sapphire: "３億年前に　いた　ポケモン。\nプラズマ団に　改造　され\n背中に　砲台を　つけられた。"
        en:
          omega_ruby: "This ancient bug Pokémon was altered by Team\nPlasma. They upgraded the cannon on its back."
          alpha_sapphire: "This Pokémon existed 300 million years ago. Team\nPlasma altered it and attached a cannon to its back."
        fr:
          omega_ruby: "Un Pokémon Insecte des temps anciens modifié par\nla Team Plasma. Le canon dans son dos a été grandement\namélioré."
          alpha_sapphire: "Un Pokémon existant depuis 300 millions d’années, et modifié\npar la Team Plasma. Il a maintenant un canon dans le dos."
        it:
          omega_ruby: "Antico Pokémon Coleottero modificato dal Team Plasma,\nche ne ha notevolmente potenziato il cannone sulla schiena."
          alpha_sapphire: "Esiste da più di 300 milioni di anni. Il Team Plasma ne ha\nmodificato il corpo montandogli un cannone sul dorso."
        de:
          omega_ruby: "Ein von Team Plasma modifiziertes Käfer-Pokémon aus dem\nAltertum. Die Kanone auf seinem Rücken ist nun noch stärker."
          alpha_sapphire: "Es lebte vor 300 Millionen Jahren. Team Plasma modifizierte\nes und pflanzte ihm am Rücken eine Kanone ein."
        es:
          omega_ruby: "Pokémon de tipo Bicho de la antigüedad, modificado por\nel Equipo Plasma. El cañón de su lomo ha sido mejorado."
          alpha_sapphire: "Un Pokémon de hace 300 millones de años y alterado por el\nEquipo Plasma, quienes le han equipado con un cañón en el\nlomo."
        ko:
          omega_ruby: "플라스마단에게 개조당한\n고대의 벌레포켓몬이다.\n등에 있는 대포의 파워가 올라갔다."
          alpha_sapphire: "3억 년 전에 있었던 포켓몬.\n플라스마단에게 개조당해\n등에 대포가 붙여졌다."
chespin:
  species_id: 650
  names:
