        jp_kana:
          omega_ruby: "ゆびさきを　てんめつ　させて\nかいわするらしいが　その　パターンは\nまだ　かいどく　できていない。"
          alpha_sapphire: "サイコパワーで　あいての　のうみそを\nあやつり　きおくする　えいぞうを\nちがう　ものに　かきかえてしまう。"
        jp_kanji:
          omega_ruby: "指先を　点滅　させて\n会話するらしいが　その　パターンは\nまだ　解読　できていない。"
          alpha_sapphire: "サイコパワーで　相手の　脳みそを\n操り　記憶する　映像を\n違う　ものに　書き換えてしまう。"
        en:
          omega_ruby: "Apparently, it communicates by flashing its three\nfingers, but those patterns haven’t been decoded."
          alpha_sapphire: "It uses psychic power to control an opponent’s\nbrain and tamper with its memories."
        fr:
          omega_ruby: "Il fait clignoter ses doigts tricolores pour communiquer\navec ses semblables. Son langage reste un mystère."
          alpha_sapphire: "Il manipule l’esprit avec ses pouvoirs psychiques et peut\nmodifier les images conservées dans les souvenirs."
        it:
          omega_ruby: "Dialoga con i suoi simili tramite le luci sui suoi arti, ma il suo\nlinguaggio è ancora un mistero."
          alpha_sapphire: "Controlla il cervello dell’avversario con poteri psichici e ne\nsostituisce i ricordi."
        de:
          omega_ruby: "Es spricht, indem es seine Fingerspitzen leuchten lässt,\ndoch noch konnte der Code dahinter nicht entziffert werden."
          alpha_sapphire: "Es manipuliert die Gehirne seiner Gegner mit Psycho-Kräften,\nindem es die Bilder ihrer Erinnerungen umgestaltet."
        es:
          omega_ruby: "Parece que se comunica haciendo brillar sus dedos tricolores,\npero nadie ha conseguido descifrar aún su patrón."
          alpha_sapphire: "Controla el cerebro del rival con su poder psíquico y manipula\nsus recuerdos."
        ko:
          omega_ruby: "손끝을 점멸시켜서\n대화하는 듯하나 그 패턴은\n아직 해독하지 못했다."
          alpha_sapphire: "사이코 파워로 상대의 뇌를\n조종하여 기억된 영상을\n다른 것으로 바꿔 버린다."
litwick:
  species_id: 607
  names:
    jp_kana: ヒトモシ
    jp_kanji: ヒトモシ
    en: Litwick
    fr: Funécire
    it: Litwick
