          alpha_sapphire: "ジャンプ力の　発達した　ポケモン。\n大人の　背丈　以上ある　高さの　枝に\nひらりと　飛び乗り　木の芽を　ついばむ。"
        en:
          omega_ruby: "Natu cannot fly because its wings are not yet fully grown.\nIf your eyes meet with this Pokémon’s eyes, it will stare back\nintently at you. But if you move even slightly, it will hop away\nto safety."
          alpha_sapphire: "Natu has a highly developed jumping ability. The Pokémon\nflaps and leaps onto tree branches that are taller than\ngrown-up people to pick at the tree’s new shoots."
        fr:
          omega_ruby: "Natu ne peut pas voler, car ses ailes n’ont pas encore fini de\ngrandir. Si ses yeux croisent le regard de quelqu’un d’autre,\nil reste immobile et concentré. Mais si la personne en question\ndétourne son regard, il s’enfuit en lieu sûr."
          alpha_sapphire: "Natu est capable de sauter très haut. Ce Pokémon bat\ndes ailes et saute sur les branches élevées des arbres\npour en récupérer les bourgeons."
        it:
          omega_ruby: "Natu non riesce a volare a causa delle ali non ancora\ntotalmente sviluppate. Se lo si guarda negli occhi,\nricambia lo sguardo, ma al primo movimento scappa via\nper mettersi al sicuro."
          alpha_sapphire: "Natu ha una spiccata attitudine al salto. È in grado di\nraggiungere con un balzo rami più alti di un adulto,\ne si ciba dei germogli di cui va ghiotto."
        de:
          omega_ruby: "Natu kann nicht fliegen, da seine Flügel noch nicht\nausgewachsen sind. Wenn du diesem Pokémon in die Augen\nschaust, starrt es dich konzentriert an. Wenn du dich aber\nbewegst, hüpft es weg, um sich in Sicherheit zu bringen."
          alpha_sapphire: "Natu kann hervorragend springen. Dieses Pokémon schlägt\nmit den Flügeln und springt auf Äste, die höher liegen,\nals ein Erwachsener groß ist, um an die neuen Triebe eines\nBaumes zu kommen."
        es:
          omega_ruby: "Natu no puede volar porque las alas no le han crecido lo\nsuficiente. Si alguien cruza la mirada con él, se la devolverá\nfijamente, aunque, si hace el mínimo movimiento, huirá dando\nsaltitos para ponerse a salvo."
          alpha_sapphire: "Natu ha desarrollado tremendamente la habilidad de saltar.\nEste Pokémon aletea y da brinquitos por las ramas altas a las\nque no alcanza nadie para hacerse con los nuevos brotes\nde los árboles."
        ko:
          omega_ruby: "날개가 아직 자라지 않아 날 수 없다.\n눈을 마주치면 가만히 쳐다보지만 상대가\n조금이라도 움직이면 뛰어올라 도망간다."
          alpha_sapphire: "점프력이 발달한 포켓몬이다.\n어른 키 이상의 높이인 가지에\n훌쩍 날아 앉아 나무순을 쪼아 먹는다."
