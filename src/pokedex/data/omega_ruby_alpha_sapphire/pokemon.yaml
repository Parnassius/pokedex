      descriptions:
        jp_kana:
          omega_ruby: "ぜんしんから　つよい　じりょくを\nだしている。３この　チビノーズと\nよばれる　ユニットを　あやつる。"
          alpha_sapphire: "チビノーズと　よばれる　ちいさな\n３つの　ユニットを　じりょくで\nじゆうじざいに　あやつっている。"
        jp_kanji:
          omega_ruby: "全身から　強い　磁力を　出している。\n３個の　チビノーズと　呼ばれる\nユニットを　操る。"
          alpha_sapphire: "チビノーズと　呼ばれる　小さな\n３つの　ユニットを　磁力で\n自由自在に　操っている。"
        en:
          omega_ruby: "It exudes strong magnetism from all over.\nIt controls three small units called Mini-Noses."
          alpha_sapphire: "It freely controls three small units called Mini-Noses\nusing magnetic force."
        fr:
          omega_ruby: "Son corps libère une puissante force magnétique.\nIl dirige trois petites unités appelées Mini-nez."
          alpha_sapphire: "Il utilise sa force magnétique pour diriger trois petites unités\nappelées Mini-nez."
        it:
          omega_ruby: "Emana un forte magnetismo da tutto il corpo. Controlla\ntre piccole unità, dette Mininasi."
          alpha_sapphire: "Controlla tre piccole unità, dette Mininasi, usando la forza\nmagnetica."
        de:
          omega_ruby: "Es gibt starken Magnetismus ab. Es steuert drei kleine\nEinheiten, die sich Mininasen nennen."
          alpha_sapphire: "Es steuert drei kleine Einheiten mithilfe von\nstarkem Magnetismus. Man nennt sie Mininasen."
        es:
          omega_ruby: "Emana un fuerte magnetismo. Controla tres pequeñas\nunidades llamadas mininarices."
          alpha_sapphire: "Con el magnetismo que emana, controla tres pequeñas\nunidades llamadas mininarices."
        ko:
          omega_ruby: "전신에서 강한 자력을 발산하고\n있다. 꼬마코파스라고 불리는\n3개의 유닛을 조종한다."
          alpha_sapphire: "꼬마코파스라고 불리는 작은\n3개의 유닛을 자력으로\n자유자재로 조종한다."
dusknoir:
  species_id: 477
  names:
    jp_kana: ヨノワール
    jp_kanji: ヨノワール
    en: Dusknoir
    fr: Noctunoir
    it: Dusknoir
    de: Zwirrfinst
    es: Dusknoir
    ko: 야느와르몽
  forms:
    dusknoir:
      form_id: 0
      base_stats:
        hp: 45
        attack: 100
        defense: 135
        special_attack: 65
        special_defense: 135
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - pressure
      hidden_ability: frisk
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          omega_ruby: "だんりょくのある　からだの　なかに\nいきばのない　たましいを　とりこんで\nあのよに　つれていくと　いわれる。"
          alpha_sapphire: "あたまの　アンテナで　れいかいからの\nでんぱを　じゅしん。しじを　うけて\nひとを　れいかいへ　つれていくのだ。"
        jp_kanji:
          omega_ruby: "弾力のある　体の　中に\n行き場のない　魂を　取りこんで\nあの世に　連れていくと　言われる。"
          alpha_sapphire: "頭の　アンテナで　霊界からの\n電波を　受信。指示を　受けて\n人を　霊界へ　連れて行くのだ。"
        en:
          omega_ruby: "It is said to take lost spirits into its pliant body and\nguide them home."
          alpha_sapphire: "The antenna on its head captures radio waves from\nthe world of spirits that command it to take\npeople there."
        fr:
          omega_ruby: "Son corps se replie sur lui-même pour emprisonner les esprits\nperdus et les ramener chez eux."
          alpha_sapphire: "L’antenne sur sa tête capte les ondes radio du monde\ndes esprits lui ordonnant d’y porter des gens."
        it:
          omega_ruby: "Si dice che accolga gli spiriti smarriti nel suo corpo flessibile\nper riportarli a casa."
          alpha_sapphire: "Capta con l’antenna onde che arrivano dal mondo degli spiriti,\nche gli ordinano di portare lì le persone."
        de:
          omega_ruby: "Man sagt, dass es verlorene Seelen in seinem biegsamen\nKörper nach Hause geleite."
          alpha_sapphire: "Die Antenne auf seinem Kopf empfängt Radiowellen aus einer\nanderen Dimension."
        es:
          omega_ruby: "Se dice que recoge en su cuerpo flexible a los\nespíritus extraviados y los guía hasta casa."
          alpha_sapphire: "La antena de la cabeza capta ondas de otra dimensión que\nle incitan a llevarse allí a la gente."
        ko:
          omega_ruby: "탄력 있는 몸 안에\n갈 곳 없는 영혼을 가두어\n저승으로 데려간다고 전해진다."
          alpha_sapphire: "머리의 안테나로 영계로부터의\n전파를 수신한다. 지시를 받아\n사람을 영계로 데리고 간다."
froslass:
  species_id: 478
  names:
    jp_kana: ユキメノコ
    jp_kanji: ユキメノコ
    en: Froslass
    fr: Momartik
    it: Froslass
    de: Frosdedje
