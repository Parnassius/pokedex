      descriptions:
        jp_kana:
          omega_ruby: "たいないに　おさまりきらずに\nもれだした　エネルギーが　かたまり\nオレンジいろの　けっしょうになった。"
          alpha_sapphire: "げんきだと　コアが　とびだしてくる。\nからだの　むきを　かえることなく\nぜんごさゆうに　すばやく　うごける。"
        jp_kanji:
          omega_ruby: "体内に　収まりきらず　漏れ出した\nエネルギーが　固まり\nオレンジ色の　結晶になった。"
          alpha_sapphire: "元気だと　コアが　飛びだしてくる。\n体の　向きを　変えることなく\n前後左右に　素早く　動ける。"
        en:
          omega_ruby: "Because its energy was too great to be contained,\nthe energy leaked and formed orange crystals."
          alpha_sapphire: "When it is healthy, its core sticks out. Always facing\nthe same way, it swiftly moves front to back and left\nto right."
        fr:
          omega_ruby: "L’énergie de son corps qu’il ne parvient pas à retenir s’écoule\nà l’extérieur et forme des cristaux orangés."
          alpha_sapphire: "Quand il est en forme, son noyau devient visible. Il peut\nse déplacer dans toutes les directions sans se tourner."
        it:
          omega_ruby: "L’energia sovrabbondante cerca sfogo all’esterno del corpo\ne si solidifica formando cristalli di colore arancione."
          alpha_sapphire: "Se è in forma, il suo nucleo è visibile. Si sposta rapidamente\nnelle quattro direzioni senza cambiare orientamento."
        de:
          omega_ruby: "Energie, die ungehindert aus seinem Körper austrat, hat sich\nan ihm zu orangefarbenen Kristallen verfestigt."
          alpha_sapphire: "Ist es guter Dinge, kommt sein Kern zum Vorschein.\nKann blitzschnell die Richtung ändern, ohne sich\numdrehen zu müssen."
        es:
          omega_ruby: "La energía que no puede contener en el interior de su cuerpo\nse escapa formando cristales naranjas."
          alpha_sapphire: "Si se encuentra bien, deja entrever su núcleo. Puede cambiar\nrápidamente la dirección en la que avanza sin girarse."
        ko:
          omega_ruby: "체내에서 처리되지 못하고\n빠져나온 에너지가 덩어리져서\n주황색 결정이 되었다."
          alpha_sapphire: "기운이 넘치면 핵이 튀어나온다.\n몸의 방향을 바꾸지 않고\n전후좌우로 재빠르게 움직일 수 있다."
gigalith:
