        - steadfast
        - inner_focus
      hidden_ability: prankster
      descriptions:
        jp_kana:
          omega_ruby: "かんじょうで　かたちが　かわる\nはどうを　だしあって　なかまどうし\nコミュニケーションを　とっている。"
          alpha_sapphire: "からだから　はっする　はどうは\nこわいとき　かなしいときに　つよまり\nピンチを　なかまに　つたえる。"
        jp_kanji:
          omega_ruby: "感情で　形が　変わる\n波動を　だしあって　仲間同士\nコミュニケーションを　とっている。"
          alpha_sapphire: "体から　発する　波動は\n怖いとき　悲しいときに　強まり\nピンチを　仲間に　伝える。"
        en:
          omega_ruby: "It uses the shapes of auras, which change\naccording to emotion, to communicate with others."
          alpha_sapphire: "The aura that emanates from its body intensifies to\nalert others if it is afraid or sad."
        fr:
          omega_ruby: "Il communique avec ses semblables grâce à des ondes\nqui sont modulées en fonction de ses émotions."
          alpha_sapphire: "Son aura s’intensifie pour prévenir son entourage quand\nil a peur ou qu’il est triste."
        it:
          omega_ruby: "Comunica con i suoi simili tramite delle onde che cambiano\nforma a seconda del sentimento che prova."
          alpha_sapphire: "L’aura che emana si intensifica per comunicare agli altri\nse è triste o spaventato."
        de:
          omega_ruby: "Es kommuniziert mit seinen Artgenossen über Wellen,\ndie je nach Gefühlslage eine andere Form annehmen."
          alpha_sapphire: "Die Aura, die dieses Pokémon umgibt, verstärkt sich,\nwenn es zeigen will, dass es ängstlich oder traurig ist."
        es:
          omega_ruby: "Se comunica con los suyos mediante la emisión de unas\nondas que cambian de forma en función de los sentimientos."
          alpha_sapphire: "Su aura se intensifica para alertar a otros cuando está triste\no tiene miedo."
        ko:
          omega_ruby: "감정에 따라 모양이 변하는\n파동을 서로 내어 동료끼리\n커뮤니케이션을 취하고 있다."
          alpha_sapphire: "몸에서 발산되는 파동은\n무서울 때나 슬플 때에 강해져\n동료에게 위기를 알린다."
lucario:
