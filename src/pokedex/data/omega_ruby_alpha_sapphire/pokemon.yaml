        jp_kana:
          omega_ruby: "おおむかしの　ひとびとは　だいちの\nしたには　きょだいな　ドダイトスが\nいると　くうそう　していた。"
          alpha_sapphire: "ちいさな　ポケモンたちが　あつまり\nうごかない　ドダイトスの　せなかで\nすづくりを　はじめることがある。"
        jp_kanji:
          omega_ruby: "大昔の　人々は　大地の　下には\n巨大な　ドダイトスが　いると\n空想していた。"
          alpha_sapphire: "小さな　ポケモンたちが　集まり\n動かない　ドダイトスの　背中で\n巣作りを　はじめることがある。"
        en:
          omega_ruby: "Ancient people imagined that beneath the ground,\na gigantic Torterra dwelled."
          alpha_sapphire: "Small Pokémon occasionally gather on its unmoving\nback to begin building their nests."
        fr:
          omega_ruby: "Autrefois, les gens pensaient qu’un gigantesque Torterra vivait\nsous la surface de la Terre."
          alpha_sapphire: "Il arrive que de petits Pokémon se rassemblent sur son dos\nimmobile pour y faire leur nid."
        it:
          omega_ruby: "In tempi antichissimi la gente pensava che sottoterra ci fossero\ndei giganteschi Torterra."
          alpha_sapphire: "Piccoli Pokémon si radunano talvolta sul suo dorso immobile\nper costruirvi la loro tana."
        de:
          omega_ruby: "In alten Zeiten malten die Menschen sich aus, die Erde ruhe\nauf dem Rücken eines riesigen Chelterrar."
          alpha_sapphire: "Kleine Pokémon fangen manchmal an, auf dem\nbewegungslosen Rücken Nester zu bauen."
        es:
          omega_ruby: "Las gentes de antaño creían que el planeta se sustentaba en\nla espalda de un gran Torterra."
          alpha_sapphire: "Algunos Pokémon pequeños se juntan en su espalda para\nhacer sus nidos."
        ko:
          omega_ruby: "오랜 옛날 사람들은 대지\n밑에 거대한 토대부기가\n있다고 공상했었다."
          alpha_sapphire: "작은 포켓몬들이 모여\n움직이지 않는 토대부기의 등에서\n둥지를 만들려고 하는 경우가 있다."
chimchar:
  species_id: 390
  names:
    jp_kana: ヒコザル
