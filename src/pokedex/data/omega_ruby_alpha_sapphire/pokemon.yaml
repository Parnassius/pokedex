          alpha_sapphire: "からだを　スピンさせることで\nじそく５０キロの　スピードのまま\nまっすぐ　じめんを　ほりすすむ。"
        jp_kanji:
          omega_ruby: "両手の　ツメを　重ね合わせて\n体を　高速　回転させると\n猛スピードで　地中を　進む。"
          alpha_sapphire: "体を　スピンさせることで\n時速５０キロの　スピードのまま\nまっすぐ　地面を　掘り進む。"
        en:
          omega_ruby: "It makes its way swiftly through the soil by putting\nboth claws together and rotating at high speed."
          alpha_sapphire: "By spinning its body, it can dig straight through the\nground at a speed of 30 mph."
        fr:
          omega_ruby: "Il se propulse à grande vitesse sous la terre en joignant\nses griffes et en tourbillonnant sur lui-même."
          alpha_sapphire: "Il tourbillonne sur lui-même pour se déplacer sous terre.\nIl peut atteindre les 50 km/h en ligne droite."
        it:
          omega_ruby: "Sfreccia a gran velocità sotto terra, avvitandosi su se stesso,\nmentre si apre un passaggio scavando con le unghie."
          alpha_sapphire: "Quando gira su se stesso, scava la terra scendendo in verticale\nalla velocità di 50 km/h."
        de:
          omega_ruby: "Es führt seine beiden Klauen zusammen, dreht sich rapide um\ndie eigene Achse und gräbt sich ratzfatz durch das Erdreich."
          alpha_sapphire: "Es gräbt sich mit 50 km/h schnurstracks durch das Erdreich,\nindem es sich rapide um die eigene Achse dreht."
        es:
          omega_ruby: "Cuando junta las garras y comienza a dar vueltas frenéticas,\navanza bajo tierra a gran velocidad."
          alpha_sapphire: "Puede girar su cuerpo a una velocidad de 50 km/h y, si la\nmantiene, puede perforar el suelo y atravesarlo."
        ko:
          omega_ruby: "양손의 손톱을 서로 겹치고\n몸을 고속 회전시키면서\n맹렬한 속도로 땅속을 헤쳐나간다."
          alpha_sapphire: "몸을 스핀시켜서\n시속 50km의 스피드를 유지하며\n똑바로 땅을 파서 나아간다."
excadrill:
  species_id: 530
  names:
    jp_kana: ドリュウズ
    jp_kanji: ドリュウズ
    en: Excadrill
    fr: Minotaupe
    it: Excadrill
    de: Stalobor
    es: Excadrill
    ko: 몰드류
  forms:
    excadrill:
      form_id: 0
      base_stats:
        hp: 110
        attack: 135
        defense: 60
        special_attack: 50
        special_defense: 65
        speed: 88
      evs_yield:
        hp: 0
        attack: 2
