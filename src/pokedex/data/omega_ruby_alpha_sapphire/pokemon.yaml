          alpha_sapphire: "なわばりを　とりあって　イワパレス\nどうしが　はげしく　たたかう。\nいわを　こわされた　ほうが　まけ。"
        jp_kanji:
          omega_ruby: "重たい　岩を　背負って\n乾燥した　土地を　何日でも\n移動できる　脚力を　持つ。"
          alpha_sapphire: "縄張りを　取り合って\nイワパレス　同士が　激しく　戦う。\n岩を　壊されたほうが　負け。"
        en:
          omega_ruby: "It possesses legs of enormous strength, enabling it\nto carry heavy slabs for many days, even when\ncrossing arid land."
          alpha_sapphire: "Competing for territory, Crustle fight viciously.\nThe one whose boulder is broken is the loser of\nthe battle."
        fr:
          omega_ruby: "Il est assez endurant pour voyager des jours durant\ndans des zones desséchées avec son lourd rocher sur\nle dos."
          alpha_sapphire: "Entre eux, les querelles de territoire sont fréquentes\net violentes. Celui qui se fait briser son rocher a perdu."
        it:
          omega_ruby: "Ha una tale forza nelle gambe, che può spostarsi per giorni\nin zone aride con una pesante roccia sulle spalle."
          alpha_sapphire: "I Crustle si disputano il territorio lottando ferocemente.\nVince chi distrugge la roccia del rivale."
        de:
          omega_ruby: "Es ist hart genug im Nehmen, um mitsamt seines schweren\nFelsens mehrere Tage durch trockene Gebiete zu wandern."
          alpha_sapphire: "Revierkonflikte führen oft zu heftigen Kämpfen zwischen ihnen.\nGewonnen hat, wer das gegnerische Haus zerstört."
        es:
          omega_ruby: "Su inmensa capacidad motriz le permite desplazarse cargando\na sus espaldas rocas enormes durante días."
          alpha_sapphire: "Se disputa el territorio con sus congéneres. Pierde aquel al\nque le rompan la roca que lleva a cuestas."
        ko:
          omega_ruby: "무거운 바위를 등에 지고\n며칠이고 건조한 땅을\n이동할 수 있는 다릿심을 가지고 있다."
          alpha_sapphire: "영역을 빼앗기 위해\n암팰리스끼리 격렬히 싸운다.\n바위가 부서진 쪽이 패배다."
scraggy:
