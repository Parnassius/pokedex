        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      descriptions:
        jp_kana:
          omega_ruby: "すなの　なかに　もぐり　めと　はなを\nそとに　だして　いどうする。\nくろい　まくが　めを　まもる。"
          alpha_sapphire: "さばくの　すなの　なかで　せいかつ。\nたいように　あたためられた　すなが\nたいおんの　ていかを　ふせぐのだ。"
        jp_kanji:
          omega_ruby: "砂の　中に　潜り　目と　鼻を\n外に　出して　移動する。\n黒い　膜が　目を　守る。"
          alpha_sapphire: "砂漠の　砂の　中で　生活。\n太陽に　暖められた　砂が\n体温の　低下を　防ぐのだ。"
        en:
          omega_ruby: "It moves along below the sand’s surface, except\nfor its nose and eyes. A dark membrane shields its\neyes from the sun."
          alpha_sapphire: "They live buried in the sands of the desert.\nThe sun-warmed sands prevent their body\ntemperature from dropping."
        fr:
          omega_ruby: "Il se déplace dans le sable en gardant le nez et les yeux\nà découvert. La membrane noire protège ses yeux."
          alpha_sapphire: "Il vit dans le sable des déserts. Le sable chauffé par le soleil\nempêche son corps de refroidir."
        it:
          omega_ruby: "Si nasconde sotto la sabbia e si sposta cacciando fuori gli\nocchi e il naso. Una membrana nera gli protegge gli occhi."
          alpha_sapphire: "Vive nella sabbia del deserto che, scaldata dal sole, impedisce\nalla sua temperatura corporea di scendere."
        de:
          omega_ruby: "Wenn es sich durch den Sand gräbt, ragen nur noch Nase\nund Augen hervor. Die schwarze Haut dient als Augenschutz."
          alpha_sapphire: "Es lebt im Wüstensand. Der durch die Sonne erhitzte Sand\ngewährleistet, dass es immer schön warm eingepackt ist."
        es:
          omega_ruby: "Se desplaza hundido en la arena, dejando al descubierto solo\nlos ojos y la nariz. Una membrana negra le protege los ojos."
          alpha_sapphire: "Vive en las arenas desérticas, donde las altas temperaturas\nde las mismas evitan que su cuerpo se enfríe."
        ko:
          omega_ruby: "모래 속에 파고들어 눈과 코를\n밖에 내놓고 이동한다.\n검은 막이 눈을 보호한다."
          alpha_sapphire: "사막의 모래 속에서 생활한다.\n태양 때문에 따뜻해진 모래가\n체온 저하를 막아준다."
krokorok:
  species_id: 552
  names:
