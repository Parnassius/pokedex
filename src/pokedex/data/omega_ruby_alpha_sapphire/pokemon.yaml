        fr:
          omega_ruby: "Les cordes vocales de Toudoudou ne sont pas assez\ndéveloppées. S’il devait chanter trop longtemps, il se ferait\nmal à la gorge. Ce Pokémon se gargarise souvent avec\nde l’eau fraîche puisée dans un ruisseau clair."
          alpha_sapphire: "Toudoudou a un corps mou et pelucheux, semblable à\nde la guimauve. Un parfum doux et sucré s’échappe de son\ncorps, ce qui lui permet d’apaiser et de calmer ses ennemis."
        it:
          omega_ruby: "Le corde vocali di Igglybuff non sono sufficientemente\nsviluppate. Se eccede nel canto, gli viene il mal di gola.\nÈ solito fare i gargarismi con l’acqua corrente dei torrenti puri."
          alpha_sapphire: "Igglybuff, così morbido e soffice, sembra fatto di gommapiuma\nrosa. Il suo corpo emana un lieve aroma che placa le emozioni\ne l’aggressività del nemico."
        de:
          omega_ruby: "Fluffeluffs Stimmbänder sind noch nicht voll entwickelt. Wenn\nes zu viel singt, schmerzt ihm die Kehle. Dieses Pokémon\ngurgelt mit Süßwasser aus einem sauberen Fluss."
          alpha_sapphire: "Fluffeluff hat einen weichen Körper, der sich anfühlt wie\nein Marshmallow. Es verströmt einen süßlichen Duft,\nder die Emotionen seiner Gegner beruhigt."
        es:
          omega_ruby: "Las cuerdas vocales de Igglybuff no están suficientemente\ndesarrolladas. Si tuviera que cantar mucho, se haría daño en\nla garganta. Este Pokémon suele hacer gárgaras con agua\npura de manantial."
          alpha_sapphire: "Igglybuff es suave y tierno, parece un merengue. Emana un\naroma dulce y agradable que le sirve para calmar los ánimos\nde sus oponentes en combate."
        ko:
          omega_ruby: "성대가 아직 충분히 발달하지\n않아 계속 노래 부르면 목이 아프다.\n깨끗한 시냇물로 양치질한다."
