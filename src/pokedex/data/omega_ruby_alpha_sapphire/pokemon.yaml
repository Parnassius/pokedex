          omega_ruby: "からだの　よこがわにある　ラインは\nたいようのひかりを　ためておける。\nよるになると　あざやかに　かがやく。"
          alpha_sapphire: "たいようを　いっぱいに　あびた\nおびれの　もようは　くらくなると\nあざやかな　いろで　ひかりだす。"
        jp_kanji:
          omega_ruby: "体の　横側にある　ラインは\n太陽の光を　ためておける。\n夜になると　鮮やかに　輝く。"
          alpha_sapphire: "太陽を　いっぱいに　浴びた\n尾びれの　模様は　暗くなると\n鮮やかな　色で　光り出す。"
        en:
          omega_ruby: "The line running down its side can store sunlight.\nIt shines vividly at night."
          alpha_sapphire: "After long exposure to sunlight, the patterns on its\ntail fins shine vividly when darkness arrives."
        fr:
          omega_ruby: "La ligne qui fait le tour de son corps stocke l’énergie solaire\net brille dans la nuit."
          alpha_sapphire: "Après une longue exposition au soleil, les motifs de\nses nageoires caudales luisent à la nuit tombée."
        it:
          omega_ruby: "La linea che contorna il suo corpo immagazzina la luce solare.\nDi notte si illumina di una luce splendente."
          alpha_sapphire: "Dopo una lunga esposizione al sole, i motivi sulle sue pinne\nbrillano vividamente al calar dell’oscurità."
        de:
          omega_ruby: "Die Linie an seiner Seite kann Sonnenlicht speichern.\nNachts leuchtet es sehr intensiv."
          alpha_sapphire: "Wurden die Flossen lange dem Sonnenlicht ausgesetzt,\nleuchten sie in der Dunkelheit."
        es:
          omega_ruby: "La línea que le recorre el costado puede almacenar luz solar.\nBrilla con mucha fuerza por la noche."
          alpha_sapphire: "Si se expone mucho al sol, los dibujos de sus aletas brillan\nen la oscuridad."
        ko:
          omega_ruby: "몸의 옆쪽에 있는 줄에\n태양의 빛을 모아둘 수 있다.\n밤이 되면 아름답게 빛난다."
          alpha_sapphire: "햇볕을 잔뜩 쬔 꼬리지느러미의\n무늬는 어두워지면 선명한 색으로\n반짝이기 시작한다."
lumineon:
  species_id: 457
  names:
    jp_kana: ネオラント
    jp_kanji: ネオラント
    en: Lumineon
    fr: Luminéon
    it: Lumineon
    de: Lumineon
    es: Lumineon
    ko: 네오라이트
