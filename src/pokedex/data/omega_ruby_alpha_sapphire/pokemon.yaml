      descriptions:
        jp_kana:
          omega_ruby: "ぜんしんが　はものの　ポケモン。\nたたかいで　はこぼれすると　かわらの\nてごろな　いしで　はを　とぐ。"
          alpha_sapphire: "じぶんが　きずついても　きにせず\nしゅうだんで　ぜんしんの　はものを\nくいこませ　あいてを　こうげきする。"
        jp_kanji:
          omega_ruby: "全身が　刃物の　ポケモン。\n戦いで　刃こぼれすると\n河原の　石で　刃を　とぐ。"
          alpha_sapphire: "自分が　傷ついても　気にせず\n集団で　全身の　刃物を\n食いこませ　相手を　攻撃する。"
        en:
          omega_ruby: "Blades comprise this Pokémon’s entire body.\nIf battling dulls the blades, it sharpens them on\nstones by the river."
          alpha_sapphire: "Ignoring their injuries, groups attack by sinking\nthe blades that cover their bodies into their prey."
        fr:
          omega_ruby: "Tout son corps est fait de lames. Si une lame s’émousse,\nil va l’aiguiser contre une pierre au bord d’une rivière."
          alpha_sapphire: "Ignorant leurs propres blessures, ils se jettent en groupe\nsur l’ennemi pour le déchirer de leur corps fait de lames."
        it:
          omega_ruby: "Il suo intero corpo è un’arma da taglio. Se le lame\nsi smussano lottando, le affila con pietre di fiume."
          alpha_sapphire: "Incuranti di ferirsi, si lanciano in gruppo addosso alla preda\ninfilzandola con le lame che hanno sul corpo."
        de:
          omega_ruby: "Sein Körper ist mit Klingen übersät, die es an Felsen eines\nFlussbettes schärft, wenn sie im Kampf schartig werden."
          alpha_sapphire: "Selbst wenn sie verletzt sind, greifen sie ihren Gegner unbeirrt\nin der Gruppe an, indem sie ihre Klingen in ihn hineinrammen."
        es:
          omega_ruby: "Su cuerpo está provisto de hojas afiladas. Cuando se\ndesgastan, las afila con cantos rodados a la orilla del río."
          alpha_sapphire: "Ataca en grupo ignorando sus heridas y hundiendo en su\npresa las cuchillas que recubren su cuerpo."
        ko:
          omega_ruby: "전신이 칼날인 포켓몬이다.\n싸움에서 칼의 이가 빠지면\n강가의 돌로 칼을 간다."
          alpha_sapphire: "자신이 상처 입어도 신경 쓰지 않고\n집단으로 전신의 칼날을\n박아서 상대를 공격한다."
bisharp:
  species_id: 625
  names:
    jp_kana: キリキザン
    jp_kanji: キリキザン
    en: Bisharp
    fr: Scalproie
    it: Bisharp
    de: Caesurio
    es: Bisharp
    ko: 절각참
  forms:
    bisharp:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 100
        special_attack: 60
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 0
