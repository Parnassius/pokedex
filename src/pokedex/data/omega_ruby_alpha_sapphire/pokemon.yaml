        jp_kana:
          omega_ruby: "およそ　１おくねんまえの　うみを\nおよいでいた。りくちへ　あがって\nえものに　おそいかかる　こともある。"
          alpha_sapphire: "こだいの　かせきから　ふっかつした。\nふかさ　１０００メートルまで\nせんすいすることが　できる。"
        jp_kanji:
          omega_ruby: "およそ　１億年前の　海を\n泳いでいた。陸地へ　上がって\n獲物に　襲いかかる　こともある。"
          alpha_sapphire: "古代の　化石から　復活した。\n深さ　１０００メートルまで\n潜水することが　できる。"
        en:
          omega_ruby: "About 100 million years ago, these Pokémon swam\nin oceans. It is thought they also went on land to\nattack prey."
          alpha_sapphire: "Restored from a fossil, this Pokémon can dive to\ndepths beyond half a mile."
        fr:
          omega_ruby: "Il nageait dans les océans il y a 100 millions d’années.\nIl lui arrive de rallier la terre ferme pour attaquer ses proies."
          alpha_sapphire: "Il a été recréé à partir d’un fossile préhistorique. Il peut\nplonger jusqu’à 1 000 mètres de profondeur."
        it:
          omega_ruby: "Nuotava nei mari 100 milioni di anni fa. A volte sale in\nsuperficie per aggredire le prede."
          alpha_sapphire: "Si è risvegliato da un antico fossile. Può immergersi fino\na 1000 m di profondità."
        de:
          omega_ruby: "Schwamm bereits vor 100 Millionen Jahren durch die Meere.\nAb und zu führt es die Jagd auch an Land."
          alpha_sapphire: "Es wurde aus einem urzeitlichen Fossil reanimiert. Es kann in\nTiefen von bis zu 1 000 m abtauchen."
        es:
          omega_ruby: "Ya pululaba por las aguas hace 100 millones de años.\nTambién va a tierra a veces en busca de alimento."
          alpha_sapphire: "Ha renacido de un fósil prehistórico. Puede sumergirse hasta\n1000 m de profundidad."
        ko:
          omega_ruby: "약 1억 년 전 바다를\n헤엄쳐 다녔다. 육지에 올라\n먹이를 덮치는 일도 있다."
          alpha_sapphire: "고대 화석에서 부활했다.\n1000m 깊이까지\n잠수할 수 있다."
carracosta:
