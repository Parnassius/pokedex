      descriptions:
        jp_kana:
          omega_ruby: "かわいらしい　しぐさで　ゆだんさせて\nその　すきに　もちものを　うばう。\nおこると　ツメを　たてて　はんげき。"
          alpha_sapphire: "ひとの　ものを　あそびで　ぬすむ。\nぬすまれた　ひとも　あいくるしい\nしぐさに　つい　ゆるしてしまうのだ。"
        jp_kanji:
          omega_ruby: "かわいらしい　仕草で　油断させて\nその　すきに　持ち物を　奪う。\n怒ると　ツメを　立てて　反撃。"
          alpha_sapphire: "人の　物を　遊びで　盗む。\n盗まれた　人も　愛くるしい　仕草に\nつい　許してしまうのだ。"
        en:
          omega_ruby: "Its cute act is a ruse. When victims let down their\nguard, they find their items taken. It attacks with\nsharp claws."
          alpha_sapphire: "They steal from people for fun, but their victims\ncan’t help but forgive them. Their deceptively cute\nact is perfect."
        fr:
          omega_ruby: "Il détourne l’attention de ses victimes avec ses gestes\nmignons pour mieux les détrousser. En colère, il griffe."
          alpha_sapphire: "Il vole les gens pour le plaisir, mais il est tellement mignon\nque ses victimes finissent toujours par lui pardonner."
        it:
          omega_ruby: "Distrae con pose ammalianti i nemici incauti e ne approfitta\nper depredarli. Se si arrabbia, sguaina le unghie."
          alpha_sapphire: "Ruba per gioco le cose alle persone, ma è talmente tenero\nche finiscono tutti per perdonarlo."
        de:
          omega_ruby: "Es lenkt die Menschen durch sein süßes Verhalten ab,\num sie zu bestehlen. Ist es wütend, kratzt es gern mal."
          alpha_sapphire: "Es stibitzt den Leuten spaßeshalber ihr Hab und Gut, doch\ndank seiner reizenden Natur kann ihm niemand lang böse sein."
        es:
          omega_ruby: "Distrae a su oponente con movimientos gráciles y sustrae sus\npertenencias. Cuando se enfada, ataca con las garras."
          alpha_sapphire: "Hurta a los humanos por mera diversión, pero las víctimas lo\nperdonan al ver a este Pokémon tan encantador."
        ko:
          omega_ruby: "귀여운 행동으로 방심하게 한 후\n그 틈에 지닌 물건을 빼앗아 간다.\n화가 나면 손톱을 세워서 반격한다."
          alpha_sapphire: "다른 사람의 물건을 장난삼아 훔친다.\n물건을 도둑맞은 사람도 애교 넘치는\n행동에 빠져 용서하고 만다."
liepard:
