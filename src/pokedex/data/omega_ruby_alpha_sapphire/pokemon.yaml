        special_defense: 3
        speed: 0
      types:
        - grass
        - fighting
      egg_groups:
        - undiscovered
      abilities:
        - justified
      descriptions:
        jp_kana:
          omega_ruby: "あたまの　ツノは　するどい　やいば。\nつむじかぜのような　うごきで　てきを\nほんろうして　すばやく　きりつける。"
          alpha_sapphire: "すばやい　みのこなしで　あいてを\nほんろうして　ポケモンを　まもると\nでんせつで　つたえられている。"
        jp_kanji:
          omega_ruby: "頭の　ツノは　鋭い　刃。\n旋風のような　動きで　敵を\n翻弄して　素早く　切りつける。"
          alpha_sapphire: "素早い　身のこなしで　相手を\n翻弄して　ポケモンを　守ると\n伝説で　伝えられている。"
        en:
          omega_ruby: "Its head sprouts horns as sharp as blades. Using\nwhirlwind-like movements, it confounds and swiftly\ncuts opponents."
          alpha_sapphire: "Legends say this Pokémon confounded opponents\nwith its swift movements."
        fr:
          omega_ruby: "Ses cornes sont des lames effilées. Il lacère ses ennemis\ndans un mouvement tourbillonnant."
          alpha_sapphire: "Il lacère ses ennemis avec une agilité sans égale.\nLa légende raconte qu’il protège les Pokémon."
        it:
          omega_ruby: "Le corna della testa sono lame affilate. Muovendosi come\nun turbine, scuote e falcia fulmineo i nemici."
          alpha_sapphire: "Le leggende dicono di lui che protegge i Pokémon tenendo\nin scacco i nemici con i suoi movimenti fulminei."
        de:
          omega_ruby: "Das Horn an seinem Kopf ist eine scharfe Klinge. Neckt seine\nGegner mit quirligen Bewegungen und greift blitzartig an."
          alpha_sapphire: "Legenden zufolge täuschte es seine Gegner mit flinken\nBewegungen und beschützte so die Pokémon."
        es:
          omega_ruby: "Sus cuernos son hojas afiladas. Sacude a sus enemigos con\nsus relampagueantes movimientos y los reduce."
          alpha_sapphire: "Cuenta la leyenda que Virizion confunde a sus rivales con\nrápidos movimientos para proteger a otros Pokémon."
        ko:
          omega_ruby: "머리의 뿔은 날카로운 칼날이다.\n회오리바람과 같은 움직임으로\n상대를 농락하여 재빠르게 벤다."
          alpha_sapphire: "재빠른 몸놀림으로 상대를\n농락해 포켓몬을 지킨다고\n전설로 전해져 온다."
