      descriptions:
        jp_kana:
          omega_ruby: "よこいちれつに　ならぶと　どんな\nポケモンでも　とっぱ　できない。\nそうやって　こどもを　まもっていた。"
          alpha_sapphire: "しょうめんからの　こうげきは\nすべて　はねかえす。くさや　きのみを\nたべる　おとなしい　せいかく。"
        jp_kanji:
          omega_ruby: "横一列に　並ぶと　どんな\nポケモンでも　突破　できない。\nそうやって　子供を　守っていた。"
          alpha_sapphire: "正面からの　攻撃は\nすべて　跳ね返す。草や　木の実を\n食べる　おとなしい　性格。"
        en:
          omega_ruby: "When they lined up side by side, no foe could\nbreak through. They shielded their young in\nthat way."
          alpha_sapphire: "Any frontal attack is repulsed. It is a docile\nPokémon that feeds on grass and berries."
        fr:
          omega_ruby: "En groupe, ils protègent leurs petits en formant autour d’eux\nune impénétrable muraille."
          alpha_sapphire: "Il résiste à toute attaque frontale. C’est un Pokémon docile\nqui se nourrit d’herbe et de Baies."
        it:
          omega_ruby: "Se si mettono uno di fianco all’altro nessun nemico riesce\na passare. Proteggono così i loro cuccioli."
          alpha_sapphire: "Respinge qualsiasi attacco frontale. È un Pokémon docile che\nsi nutre di erba e di bacche."
        de:
          omega_ruby: "Stellen sie sich Seite an Seite, kann kein Gegner\nhindurchbrechen. So schützen sie auch ihre Jungen."
          alpha_sapphire: "Jeder Frontalangriff wird abgeschmettert. Dieses friedliche\nPokémon ernährt sich von Gras und Beeren."
        es:
          omega_ruby: "Se alineaban y creaban una barrera que ningún enemigo podía\ncruzar. Así protegían a sus crías."
          alpha_sapphire: "Repele cualquier ataque frontal. Es muy dócil y se alimenta\nde hierba y bayas."
        ko:
          omega_ruby: "일렬횡대로 죽 늘어서면 어떤\n포켓몬이라도 돌파하지 못한다.\n그렇게 하여 아기를 지켜냈다."
          alpha_sapphire: "정면에서의 공격은 전부 튕겨낸다.\n풀이나 나무열매를 먹는\n얌전한 성격이다."
