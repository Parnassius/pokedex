          alpha_sapphire: "マグマの　ように　もえたぎる\nけつえきが　からだを　ながれている。\nかざんの　ほらあなに　せいそくする。"
        jp_kanji:
          omega_ruby: "火山の　洞穴に　生息。\n十字の　ツメを　食いこませて\n壁や　天井を　はい回る。"
          alpha_sapphire: "マグマのように　燃えたぎる\n血液が　体を　流れている。\n火山の　洞穴に　生息する。"
        en:
          omega_ruby: "It dwells in volcanic caves. It digs in with its\ncross-shaped feet to crawl on ceilings and walls."
          alpha_sapphire: "Boiling blood, like magma, circulates through its\nbody. It makes its dwelling place in volcanic caves."
        fr:
          omega_ruby: "Il hante les grottes volcaniques. Il rampe au mur et au plafond\ngrâce à ses pieds en forme de croix."
          alpha_sapphire: "Le sang de ce Pokémon des cratères bouillonne dans\nson corps comme du magma."
        it:
          omega_ruby: "Vive nelle cavità dei vulcani. Scava con i suoi piedi a croce\nper scalare pareti e arrampicarsi sui soffitti."
          alpha_sapphire: "Nel suo corpo scorre sangue che ribolle come magma.\nVive in antri all’interno di vulcani."
        de:
          omega_ruby: "Es lebt in vulkanischen Höhlen. Mit seinen kreuzförmigen\nKlauen kann es sogar an der Decke laufen."
          alpha_sapphire: "Das Blut, das durch seinen Körper fließt, brodelt heiß\nwie Magma. Es lebt in vulkanischen Höhlen."
        es:
          omega_ruby: "Habita cuevas volcánicas. Cava con sus pies en forma de cruz\npara trepar por techos y paredes."
          alpha_sapphire: "Su sangre fluye ardiendo como si fuera magma. Vive en\ncráteres de volcanes."
        ko:
          omega_ruby: "화산의 동굴에서 서식한다.\n십자형의 발톱을 박아서\n벽이나 천장을 돌아다닌다."
          alpha_sapphire: "마그마처럼 타오르는\n혈액이 몸에서 흐르고 있다.\n화산의 동굴에 서식한다."
