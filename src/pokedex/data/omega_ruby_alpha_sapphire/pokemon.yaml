          alpha_sapphire: "じゅみょうが　つきるとき　あらゆる\nいきものの　いのちを　すいつくし\nまゆの　すがたに　もどるという。"
        jp_kanji:
          omega_ruby: "翼と　尾羽を　広げて　赤く　輝くとき\n生き物の　命を　吸い取る\n伝説の　ポケモン。"
          alpha_sapphire: "寿命が　つきるとき　あらゆる\n生き物の　命を　吸いつくし\n繭の　姿に　戻るという。"
        en:
          omega_ruby: "When this legendary Pokémon’s wings and\ntail feathers spread wide and glow red,\nit absorbs the life force of living creatures."
          alpha_sapphire: "When its life comes to an end, it absorbs\nthe life energy of every living thing\nand turns into a cocoon once more."
        fr:
          omega_ruby: "Lorsque les plumes de sa queue et de ses ailes sont\ndéployées et virent au rouge, ce Pokémon légendaire\nabsorbe l’énergie vitale de ce qui l’entoure."
          alpha_sapphire: "Quand il sent que la fin de sa vie est proche, il aspire la force\nvitale des êtres vivants et retourne à l’état de cocon."
        it:
          omega_ruby: "Quando le ali e le piume della coda di questo Pokémon\nleggendario sono spiegate e di colore rosso acceso,\npuò assorbire l’energia degli esseri viventi."
          alpha_sapphire: "Secondo la leggenda, quando la sua lunga esistenza giunge\nal termine, assorbe l’energia di tutti gli esseri viventi e si\ntrasforma in un bozzolo."
        de:
          omega_ruby: "Wenn Schwingen und Schwanzgefieder dieses Legendären\nPokémon rot leuchten, entzieht es Lebewesen deren Energie."
          alpha_sapphire: "Neigt sich seine Lebensspanne dem Ende zu, entzieht es\nanderen Lebewesen deren Energie und verwandelt sich zurück\nin einen Kokon."
        es:
          omega_ruby: "Pokémon legendario que, al extender sus alas y las plumas de\nla cola, emite un brillo carmesí que absorbe la energía vital de\nsu enemigo."
          alpha_sapphire: "Cuando su vida se extingue, absorbe la vitalidad de todos los\nseres vivos y regresa a su forma de crisálida."
        ko:
          omega_ruby: "날개와 꼬리를 펼치고 빨갛게\n빛날 때 살아 있는 생명을\n빨아들이는 전설의 포켓몬."
          alpha_sapphire: "수명이 다할 때 모든\n생명의 목숨을 빨아들이고\n고치의 모습으로 돌아간다고 한다."
zygarde:
  species_id: 718
  names:
    jp_kana: ジガルデ
    jp_kanji: ジガルデ
    en: Zygarde
    fr: Zygarde
    it: Zygarde
