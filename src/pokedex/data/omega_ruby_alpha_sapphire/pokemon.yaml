        - field
        - grass
      abilities:
        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          omega_ruby: "じめんを　すべるように　はしる。\nすばやい　うごきで　てきを　まどわせ\nつるのムチで　しとめるのだ。"
          alpha_sapphire: "からだが　よごれると　はっぱで\nこうごうせいが　できなくなるので\nいつも　せいけつに　している。"
        jp_kanji:
          omega_ruby: "地面を　滑るように　走る。\n素早い　動きで　敵を　まどわせ\nつるのムチで　しとめるのだ。"
          alpha_sapphire: "体が　汚れると　葉っぱで\n光合成が　できなくなるので\nいつも　清潔に　している。"
        en:
          omega_ruby: "It moves along the ground as if sliding. Its swift\nmovements befuddle its foes, and it then attacks\nwith a vine whip."
          alpha_sapphire: "When it gets dirty, its leaves can’t be used in\nphotosynthesis, so it always keeps itself clean."
        fr:
          omega_ruby: "Il court comme s’il glissait sur le sol. Il déroute l’ennemi\npar ses mouvements et l’assomme d’un coup de liane."
          alpha_sapphire: "La saleté l’empêchant d’utiliser la photosynthèse, il prend\ngrand soin d’être toujours propre."
        it:
          omega_ruby: "Corre quasi scivolando sulle superfici. Confonde il nemico\ncon i rapidi movimenti, per poi attaccarlo con una frustata."
          alpha_sapphire: "Se si sporca, le sue foglie non possono più effettuare la\nfotosintesi, perciò si tiene sempre molto pulito."
        de:
          omega_ruby: "Huscht beinahe gleitend über den Boden und täuscht Gegner\nmit agilen Manövern, bis es mithilfe seiner Efeurute obsiegt."
          alpha_sapphire: "Es achtet stets auf Reinlichkeit, da es mit schmutzigen Blättern\nkeine Photosynthese betreiben kann."
        es:
          omega_ruby: "Parece que se desliza al correr. Engaña a sus rivales con su\nvelocidad y los fustiga con su látigo."
          alpha_sapphire: "Cuando su cuerpo está sucio, no puede realizar la fotosíntesis\ncon sus hojas, así que cuida mucho su higiene personal."
        ko:
          omega_ruby: "땅을 미끄러지듯 달린다.\n빠른 움직임으로 상대를 혼란시키고\n덩굴채찍으로 꼼짝 못하게 한다."
          alpha_sapphire: "몸이 더러워지면 잎으로\n광합성을 할 수 없기 때문에\n항상 청결하게 하고 있다."
serperior:
  species_id: 497
  names:
    jp_kana: ジャローダ
    jp_kanji: ジャローダ
