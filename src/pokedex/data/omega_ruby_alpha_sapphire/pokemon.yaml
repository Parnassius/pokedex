        jp_kana:
          omega_ruby: "からだの　ほとんどが　いぶくろで　できているので\nじぶんと　おなじ　おおきさの　ものも　のみこむ。\nとくしゅな　いえきで　なんでも　しょうかするぞ。"
          alpha_sapphire: "からだの　だいぶぶんが　いぶくろで　できていて\nしんぞうや　のうみそは　とても　ちいさい。\nなんでも　とかす　とくしゅな　いえきを　もつ。"
        jp_kanji:
          omega_ruby: "体の　ほとんどが　胃袋で　できているので\n自分と　同じ　大きさの　ものも　のみ込む。\n特殊な　胃液で　なんでも　消化するぞ。"
          alpha_sapphire: "体の　大部分が　胃袋で　できていて\n心臓や　脳みそは　とても　小さい。\nなんでも　溶かす　特殊な　胃液を　持つ。"
        en:
          omega_ruby: "Virtually all of Gulpin’s body is its stomach. As a result, it can\nswallow something its own size. This Pokémon’s stomach\ncontains a special fluid that digests anything."
          alpha_sapphire: "Most of Gulpin’s body is made up of its stomach—its heart and\nbrain are very small in comparison. This Pokémon’s stomach\ncontains special enzymes that dissolve anything."
        fr:
          omega_ruby: "Virtuellement, le corps de Gloupti n’est qu’un estomac.\nIl est capable d’avaler des objets aussi gros que lui.\nL’estomac de ce Pokémon contient un fluide spécial\nqui lui permet de digérer n’importe quoi."
          alpha_sapphire: "Le corps de Gloupti n’est pratiquement qu’un gros estomac.\nEn comparaison, son cœur et son cerveau sont tout petits.\nL’estomac de ce Pokémon contient des enzymes spéciales\ncapables de tout dissoudre."
        it:
          omega_ruby: "Praticamente l’intero corpo di Gulpin è costituito\ndallo stomaco, che gli consente di ingoiare oggetti delle\nsue stesse dimensioni. Inoltre, il suo stomaco contiene\nun fluido speciale in grado di fargli digerire ogni cosa."
          alpha_sapphire: "La maggior parte del corpo di Gulpin è formato dallo stomaco\ndi dimensioni enormi rispetto al cuore e al cervello.\nLo stomaco di questo Pokémon contiene enzimi speciali che\nsciolgono qualsiasi cosa."
        de:
          omega_ruby: "Eigentlich besteht Schluppucks Körper nur aus einem Magen.\nDaher kann es etwas verschlingen, das beinahe seine Größe\nhat. Sein Magen enthält eine spezielle Flüssigkeit, die wirklich\nalles verdauen kann."
          alpha_sapphire: "Schluppucks Körper besteht zum größten Teil aus seinem\nMagen. Sein Herz und sein Gehirn sind im Vergleich dazu\nsehr klein. Der Magen dieses Pokémon enthält Enzyme,\ndie alles zersetzen können."
        es:
          omega_ruby: "Casi la totalidad del cuerpo de Gulpin está compuesto por el\nestómago. Por eso, puede tragarse todo lo que tenga su\ntamaño. En el interior del estómago tiene un fluido capaz de\ncorroerlo todo."
          alpha_sapphire: "La mayor parte del cuerpo de Gulpin está ocupado por su\nestómago. En comparación, el corazón y el cerebro son muy\npequeños. Este Pokémon tiene enzimas especiales en el\nestómago capaces de corroerlo todo."
        ko:
          omega_ruby: "몸 대부분이 위로 되어 있어\n자신과 크기가 같은 것도 삼킨다.\n특수한 위액으로 무엇이든 소화한다."
          alpha_sapphire: "몸 대부분이 위로 되어 있어\n심장이나 뇌는 매우 작다.\n무엇이든 녹이는 특수한 위액을 지녔다."
swalot:
  species_id: 317
  names:
    jp_kana: マルノーム
    jp_kanji: マルノーム
    en: Swalot
    fr: Avaltout
    it: Swalot
    de: Schlukwech
    es: Swalot
    ko: 꿀꺽몬
  forms:
    swalot:
      form_id: 0
      base_stats:
        hp: 100
        attack: 73
        defense: 83
        special_attack: 73
        special_defense: 83
        speed: 55
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - amorphous
      abilities:
        - liquid_ooze
        - sticky_hold
      hidden_ability: gluttony
      held_items:
        common: oran_berry
        rare: sitrus_berry
      descriptions:
        jp_kana:
          omega_ruby: "えものを　みつけると　けあなから　もうどくの\nたいえきを　ふきだして　あびせかけるぞ。\nよわった　ところを　おおきな　くちで　ペロリ。"
          alpha_sapphire: "はが　１ぽんも　ないので　なんでも　まるのみ。\nいっぱいに　あけた　くちは　とても　おおきく\nじどうしゃの　タイヤだって　すっぽり　はいるぞ。"
        jp_kanji:
          omega_ruby: "獲物を　見つけると　毛穴から　猛毒の\n体液を　吹き出して　浴びせかけるぞ。\n弱った　ところを　大きな　口で　ペロリ。"
          alpha_sapphire: "歯が　１本も　ないので　なんでも　丸のみ。\nいっぱいに　開けた　口は　とても　大きく\n自動車の　タイヤだって　すっぽり　入るぞ。"
        en:
          omega_ruby: "When Swalot spots prey, it spurts out a hideously toxic fluid\nfrom its pores and sprays the target. Once the prey has\nweakened, this Pokémon gulps it down whole with its\ncavernous mouth."
          alpha_sapphire: "Swalot has no teeth, so what it eats, it swallows whole, no\nmatter what. Its cavernous mouth yawns widely. An automobile\ntire could easily fit inside this Pokémon’s mouth."
        fr:
          omega_ruby: "Lorsqu’Avaltout repère une proie, il libère une substance\nterriblement toxique de ses pores et en enduit son ennemi\npour l’affaiblir. Ce Pokémon peut ensuite l’avaler d’un coup\ndans sa gigantesque bouche."
          alpha_sapphire: "Avaltout n’a pas de dents, ce qui le force à tout avaler en\nune bouchée. Quand il bâille, sa bouche prend une taille\nimpressionnante, et on pourrait y placer une roue de voiture."
        it:
          omega_ruby: "Quando individua la preda, Swalot spruzza sul bersaglio\nun ripugnante fluido tossico dai propri pori. Una volta\nindebolito l’avversario, Swalot lo ingoia intero con la bocca\nsimile a una voragine."
          alpha_sapphire: "Swalot non ha denti, così quando mangia ingoia ogni cosa\nintera, senza masticare. Quando sbadiglia, la sua bocca\nenorme si apre a mo’ di voragine. È così grande che potrebbe\ncontenere persino uno pneumatico."
        de:
          omega_ruby: "Wenn Schlukwech Beute sichtet, verspritzt es eine höchst\ngiftige Substanz aus seinen Poren und besprüht damit sein\nZiel. Wenn die Beute geschwächt ist, schluckt es sie mit\nseinem riesigen Maul im Ganzen herunter."
          alpha_sapphire: "Schlukwech hat keine Zähne. Alles was es isst, schluckt es im\nGanzen herunter. Sein Maul ist so riesig, dass mit Leichtigkeit\nein Autoreifen hineinpassen würde."
        es:
          omega_ruby: "Cuando Swalot detecta una presa, echa por los poros, y a\nborbotones, un fluido tóxico espantoso con el que rocía a su\nvíctima. Una vez que la debilita, se la traga entera gracias a\nla gigantesca boca que tiene."
          alpha_sapphire: "Swalot no tiene dientes, así que lo que come se lo traga de\nuna vez; da igual lo que sea. A este Pokémon le cabría un\nneumático en la boca sin problema."
        ko:
          omega_ruby: "먹이를 발견하면 모공에서 맹독의\n체액을 뿜어내어 끼얹는다.\n약해지면 커다란 입으로 한입에 먹는다."
          alpha_sapphire: "이빨이 하나도 없어서 무엇이든 통째로 삼킨다.\n최대한 벌린 입은 정말 커서\n자동차 타이어마저도 쑥 들어간다."
