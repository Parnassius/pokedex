        fr:
          omega_ruby: "Électrode mange l’électricité qui se trouve dans l’atmosphère.\nLes jours d’orage, on peut voir ce Pokémon exploser\nsans arrêt parce qu’il a avalé trop d’électricité."
          alpha_sapphire: "L’une des caractéristiques d’Électrode est son attirance\npour l’électricité. Ces Pokémon posent problème lorsqu’ils\nse rassemblent dans les centrales électriques pour se nourrir\nde courant fraîchement généré."
        it:
          omega_ruby: "Electrode si nutre dell’elettricità presente nell’atmosfera.\nQuando i fulmini solcano il cielo, è possibile scorgere molti\ndi questi Pokémon esplodere per aver ingerito un’eccessiva\ndose di elettricità."
          alpha_sapphire: "Una delle caratteristiche di Electrode è la sua affinità con\nl’elettricità. Si tratta di un Pokémon problematico che spesso\nsi raduna attorno alle centrali elettriche per trarre nutrimento\ndall’elettricità appena generata."
        de:
          omega_ruby: "Lektrobal ernährt sich von Elektrizität aus der Atmosphäre.\nAn Tagen, an denen es blitzt, explodiert dieses Pokémon\ndauernd, da es zu viel Elektrizität zu sich nimmt."
          alpha_sapphire: "Typisch für Lektrobal ist seine große Faszination für Elektrizität.\nEs ist ein problematisches Pokémon, das sich meistens in\nKraftwerken niederlässt, wo es sich von frisch erzeugtem Strom\nernähren kann."
        es:
          omega_ruby: "Los Electrode se alimentan de la electricidad de la atmósfera.\nEn días de tormenta con rayos, es fácil verlos explotando por\ntodos lados tras haber consumido demasiada electricidad."
          alpha_sapphire: "Una de las características de Electrode es la atracción que\nsiente hacia la electricidad. Son Pokémon problemáticos que\nsuelen agruparse cerca de centrales eléctricas para nutrirse\nde la energía recién generada."
        ko:
          omega_ruby: "공기 중의 전기 에너지를 먹는다.\n번개가 치는 날에는 전기를 너무 먹은\n붐볼이 이곳저곳에서 대폭발한다."
          alpha_sapphire: "전기에 끌리는 성질을 지녔다.\n주로 발전소에 모여서 막 만들어진\n전기를 먹어버리는 말썽꾼이다."
