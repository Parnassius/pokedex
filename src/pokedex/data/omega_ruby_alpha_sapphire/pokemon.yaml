      descriptions:
        jp_kana:
          omega_ruby: "ぶあつい　てっぱんを　かみのように\nかみちぎる　おおあごで　こだいの\nせかいでは　むてきを　ほこった。"
          alpha_sapphire: "１おくねんまえの　せかいでは\nむてきを　ほこり　おうさまのように\nふるまっていた　ポケモンだ。"
        jp_kanji:
          omega_ruby: "分厚い　鉄板を　紙のように\nかみちぎる　おおあごで　古代の\n世界では　無敵を　誇った。"
          alpha_sapphire: "１億年前の　世界では\n無敵を　ほこり　王様のように\nふるまっていた　ポケモン。"
        en:
          omega_ruby: "Thanks to its gargantuan jaws, which could shred\nthick metal plates as if they were paper, it was\ninvincible in the ancient world it once inhabited."
          alpha_sapphire: "Nothing could stop this Pokémon\n100 million years ago,\nso it behaved like a king."
        fr:
          omega_ruby: "Dans les temps anciens, aucun Pokémon ne pouvait\nrivaliser avec lui. Ses puissantes mâchoires peuvent\nréduire une épaisse plaque de métal en confettis."
          alpha_sapphire: "Il y a 100 millions d’années, ce Pokémon régnait en\nmaître absolu. Personne ne pouvait se mesurer à lui."
        it:
          omega_ruby: "Grazie alle enormi fauci, che gli permettevano di masticare\nuna lastra di metallo come se fosse carta, era il più forte\ndei Pokémon preistorici."
          alpha_sapphire: "Nell’era preistorica era il fiero re incontrastato di tutti\ni Pokémon."
        de:
          omega_ruby: "Aufgrund der Zerstörungskraft seines Kiefers, der Stahl\nzerreißen kann, als wäre es Papier, galt es in seiner Zeit\nals unbesiegbar."
          alpha_sapphire: "Vor 100 Millionen Jahren gab es niemanden, der sich mit ihm\nhätte messen können, weshalb sich dieses Pokémon wie ein\nKönig verhielt."
        es:
          omega_ruby: "En el mundo antiguo en el que habitaba no tenía rivales\ngracias a sus mandíbulas, con las que podría despedazar\ncon facilidad gruesas placas de acero."
          alpha_sapphire: "Hace 100 millones de años, este Pokémon se comportaba\ncomo un rey, sin nadie que osase hacerle frente."
        ko:
          omega_ruby: "두꺼운 철판을 종잇장처럼\n물어뜯는 커다란 턱 덕분에\n고대 세계에서는 무적이었다."
          alpha_sapphire: "1억 년 전 세계에서는\n무적을 뽐내며 왕처럼\n행동하던 포켓몬이다."
amaura:
  species_id: 698
  names:
    jp_kana: アマルス
    jp_kanji: アマルス
    en: Amaura
    fr: Amagara
    it: Amaura
    de: Amarino
