          alpha_sapphire: "はげしい　ずつきを　くらわせても\nふさふさの　たいもうが　ダメージを\nきゅうしゅうして　くれるのだ。"
        jp_kanji:
          omega_ruby: "見境なく　突進して　頭突きを\n食らわせる。走っている　列車を\n脱線させる　破壊力。"
          alpha_sapphire: "激しい　頭突きを　食らわせても\nふさふさの　体毛が\nダメージを　吸収して　くれるのだ。"
        en:
          omega_ruby: "They charge wildly and headbutt everything.\nTheir headbutts have enough destructive force to\nderail a train."
          alpha_sapphire: "Their fluffy fur absorbs damage, even if they strike\nfoes with a fierce headbutt."
        fr:
          omega_ruby: "Il charge tout ce qui bouge sans réfléchir. Il peut faire dérailler\nun train en marche."
          alpha_sapphire: "Son pelage fourni absorbe les chocs et lui permet d’asséner\nsans broncher le plus violent des coups de tête."
        it:
          omega_ruby: "Sferra testate contro tutto e tutti. Ha una forza distruttiva tale\nda far deragliare un treno in corsa."
          alpha_sapphire: "Anche se riceve una violenta testata, la folta pelliccia\nminimizza l’impatto."
        de:
          omega_ruby: "Rammt seine Gegner ohne Rücksicht auf Verluste mit dem Kopf\nund vermag damit sogar Züge zum Entgleisen zu bringen."
          alpha_sapphire: "Sein zotteliges Fell fängt selbst nach einer seiner wuchtigen\nRempelattacken einiges an Schaden ab."
        es:
          omega_ruby: "Embiste con la cabeza sin distinción. Su potencia es capaz de\nhacer descarrilar un tren en marcha."
          alpha_sapphire: "Aunque encaje un cabezazo violento, su pelaje absorbe el\ndaño."
        ko:
          omega_ruby: "무작정 돌진하여 박치기를\n한다. 달리고 있는 열차를\n탈선시킬 정도의 파괴력이다."
          alpha_sapphire: "세차게 박치기를 해도\n탐스러운 털이 데미지를\n흡수해 준다."
rufflet:
