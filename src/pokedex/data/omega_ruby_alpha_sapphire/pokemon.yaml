mudkip:
  species_id: 258
  names:
    jp_kana: ミズゴロウ
    jp_kanji: ミズゴロウ
    en: Mudkip
    fr: Gobou
    it: Mudkip
    de: Hydropi
    es: Mudkip
    ko: 물짱이
  forms:
    mudkip:
      form_id: 0
      base_stats:
        hp: 50
        attack: 70
        defense: 50
        special_attack: 50
        special_defense: 50
        speed: 40
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - monster
        - water_1
      abilities:
        - torrent
      hidden_ability: damp
      descriptions:
        jp_kana:
          omega_ruby: "あたまの　ひれは　とても　びんかんな　レーダー。\nみずや　くうきの　うごきから　めを　つかわずに\nまわりの　ようすを　キャッチすることが　できる。"
          alpha_sapphire: "すいちゅうでは　ほっぺの　エラで　こきゅうする。\nピンチに　なると　からだより　おおきな　いわを\nこなごなに　くだく　パワーを　はっきする。"
        jp_kanji:
          omega_ruby: "頭の　ひれは　とても　敏感な　レーダー。\n水や　空気の　動きから　目を　使わずに\n周りの　様子を　キャッチすることが　できる。"
          alpha_sapphire: "水中では　ほっぺの　エラで　呼吸する。\nピンチに　なると　体より　大きな　岩を\n粉々に　砕く　パワーを　発揮する。"
        en:
          omega_ruby: "The fin on Mudkip’s head acts as highly sensitive radar.\nUsing this fin to sense movements of water and air, this\nPokémon can determine what is taking place around it\nwithout using its eyes."
          alpha_sapphire: "In water, Mudkip breathes using the gills on its cheeks. If it is\nfaced with a tight situation in battle, this Pokémon will unleash\nits amazing power—it can crush rocks bigger than itself."
        fr:
          omega_ruby: "La nageoire sur la tête de Gobou lui sert de radar\nhypersensible. Il l’utilise pour sentir les mouvements\nde l’eau et de l’air. Ainsi, ce Pokémon peut savoir ce qui\nse passe autour de lui sans avoir à se servir de ses yeux."
          alpha_sapphire: "Sous l’eau, Gobou peut respirer grâce aux branchies sur\nses joues. S’il se retrouve en difficulté pendant un combat,\nce Pokémon déchaîne ses pouvoirs incroyables. Il peut\ndétruire des rochers plus gros que lui."
        it:
          omega_ruby: "La pinna sulla testa di Mudkip agisce come un radar\nsensibilissimo. Usando questa pinna come sensore\nin acqua e in aria, riesce a determinare cosa succede\nattorno a lui senza bisogno di guardare."
          alpha_sapphire: "In acqua Mudkip respira usando le branchie sulle mascelle.\nIn caso di situazioni critiche nella lotta scatena la sua forza\nstrabiliante, riuscendo a frantumare rocce più grandi di lui."
        de:
          omega_ruby: "Die Flosse an Hydropis Kopf dient als hochempfindliches\nRadar. Damit kann es Bewegungen im Wasser und in der\nLuft wahrnehmen. So weiß es jederzeit, was in seiner\nUmgebung passiert, ohne dabei seine Augen zu benutzen."
          alpha_sapphire: "Im Wasser atmet Hydropi durch die Kiemen\nan seinen Wangen. Wenn es im Kampf in eine\nbrenzlige Situation gerät, setzt es seine\nverblüffende Kraft ein, mit der es Felsbrocken\nzerquetschen kann, die größer sind als es selbst."
        es:
          omega_ruby: "La aleta que tiene Mudkip en la cabeza actúa de radar y es\nmuy sensible. Puede captar movimientos que se produzcan en\nel agua y en el aire, y todo lo que ocurra a su alrededor, sin\nnecesidad de abrir los ojos."
          alpha_sapphire: "En el agua, Mudkip usa las branquias que tiene en los\nmofletes para respirar. Cuando tiene que enfrentarse a una\nsituación delicada en combate, desata una fuerza asombrosa\ncon la que puede destruir rocas incluso mayores que él."
        ko:
          omega_ruby: "머리의 지느러미는 매우 민감한 레이더다.\n물이나 공기의 움직임을 통해 눈을 쓰지 않고\n주변의 상황을 알아낼 수 있다."
          alpha_sapphire: "물속에서는 뺨의 아가미로 호흡한다.\n위급해지면 몸보다 큰 바위를\n산산이 부숴버리는 파워를 발휘한다."
marshtomp:
  species_id: 259
  names:
    jp_kana: ヌマクロー
    jp_kanji: ヌマクロー
    en: Marshtomp
    fr: Flobio
    it: Marshtomp
    de: Moorabbel
    es: Marshtomp
    ko: 늪짱이
  forms:
    marshtomp:
      form_id: 0
      base_stats:
        hp: 70
        attack: 85
        defense: 70
        special_attack: 60
        special_defense: 70
        speed: 50
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - monster
        - water_1
      abilities:
        - torrent
      hidden_ability: damp
      descriptions:
        jp_kana:
          omega_ruby: "ちじょうでも　せいかつできる　ように　からだの\nひょうめんを　うすい　ねんまくが　つつんでいる。\nしおの　ひいた　かいがんで　どろあそびを　する。"
          alpha_sapphire: "すいちゅうを　およぐより　どろの　なかを\nすすむ　ほうが　だんぜん　はやく　いどうできる。\nあしこしが　はったつして　２ほんあしで　あるく。"
        jp_kanji:
          omega_ruby: "地上でも　生活できる　ように　体の\n表面を　薄い　粘膜が　包んでいる。\n潮の　引いた　海岸で　泥遊びを　する。"
          alpha_sapphire: "水中を　泳ぐより　泥の　中を\n進む　ほうが　断然　速く　移動できる。\n足腰が　発達して　２本足で　歩く。"
        en:
          omega_ruby: "The surface of Marshtomp’s body is enveloped by a thin, sticky\nfilm that enables it to live on land. This Pokémon plays in mud\non beaches when the ocean tide is low."
          alpha_sapphire: "Marshtomp is much faster at traveling through mud than it is at\nswimming. This Pokémon’s hindquarters exhibit obvious\ndevelopment, giving it the ability to walk on just its hind legs."
        fr:
          omega_ruby: "Le corps de Flobio est enveloppé par un film fin et collant\nqui lui permet de vivre hors de l’eau. Ce Pokémon joue\ndans la vase sur les plages lorsque la marée est basse."
          alpha_sapphire: "Flobio est bien plus rapide dans la boue que dans l’eau.\nL’arrière-train de ce Pokémon est particulièrement développé,\nce qui lui donne la capacité de marcher sur ses pattes arrière."
        it:
          omega_ruby: "La superficie corporea di Marshtomp è avvolta da una\nspessa pellicola appiccicosa che gli consente di vivere\nsulla terraferma. Questo Pokémon gioca con la fanghiglia\nsul fondo del mare nei momenti di bassa marea."
          alpha_sapphire: "Marshtomp è molto più a suo agio nel fango che non in acqua\ne sa muoversi con estrema rapidità. La parte inferiore del suo\ncorpo mostra un chiaro sviluppo, consentendogli di camminare\nsolo sugli arti inferiori."
        de:
          omega_ruby: "Moorabbels Körper ist mit einem klebrigen Film überzogen,\ndurch den es an Land überleben kann. Dieses Pokémon spielt\nbei Ebbe in den Schlammpfützen am Strand."
          alpha_sapphire: "Moorabbel kommt im Schlamm besser voran als im Wasser.\nDas Hinterteil dieses Pokémon ist gut entwickelt, sodass es\nauf seinen Hinterbeinen laufen kann."
        es:
          omega_ruby: "El cuerpo de Marshtomp está cubierto por una fina película\npegajosa gracias a la cual puede vivir en tierra. Cuando la\nmarea está baja, a este Pokémon le encanta jugar en el fango."
          alpha_sapphire: "Marshtomp se desplaza más rápido por el lodo que por el\nagua. Los cuartos traseros de este Pokémon muestran un\ndesarrollo más que evidente, lo que le permite andar solo\nsobre las patas traseras."
        ko:
          omega_ruby: "지상에서도 생활할 수 있도록 몸의\n표면을 얇은 점막이 둘러싸고 있다.\n썰물이 된 해안에서 흙놀이를 한다."
          alpha_sapphire: "물속을 헤엄치는 것보다 진흙 속에서\n이동하는 편이 훨씬 빠르게 이동할 수 있다. \n하반신이 발달하여 두 다리로 걷는다."
