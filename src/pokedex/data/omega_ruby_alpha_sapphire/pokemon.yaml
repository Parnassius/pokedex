      abilities:
        - immunity
      hidden_ability: toxic_boost
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          omega_ruby: "しゅくてき　ハブネークとの　たたかいの　きおくが\nからだじゅうの　さいぼうに　きざみこまれている。\nびんしょうな　みのこなしで　こうげきを　かわす。"
          alpha_sapphire: "ふだんは　４ほんあしで　こうどうするが　おこると\nうしろあしで　たち　まえあしの　ツメが　とびだす。\nハブネークとは　せんぞから　つづく　ライバルだ。"
        jp_kanji:
          omega_ruby: "宿敵　ハブネークとの　戦いの　記憶が\n体中の　細胞に　刻み込まれている。\n敏しょうな　身のこなしで　攻撃を　かわす。"
          alpha_sapphire: "普段は　４本足で　行動するが　怒ると\n後足で　立ち　前足の　ツメが　飛び出す。\nハブネークとは　先祖から　続く　ライバルだ。"
        en:
          omega_ruby: "Memories of battling its archrival Seviper are etched into every\ncell of Zangoose’s body. This Pokémon adroitly dodges\nattacks with incredible agility."
          alpha_sapphire: "Zangoose usually stays on all fours, but when angered, it gets\nup on its hind legs and extends its claws. This Pokémon shares\na bitter rivalry with Seviper that dates back over generations."
        fr:
          omega_ruby: "Chaque cellule du corps de Mangriff porte les stigmates\nde sa rivalité avec Séviper. Ce Pokémon est capable\nd’esquiver les attaques avec une agilité incroyable."
          alpha_sapphire: "Mangriff est généralement à quatre pattes, mais lorsqu’il\nest en colère, il se lève sur ses pattes arrière et montre\nses griffes. Ce Pokémon est l’ennemi juré de Séviper depuis\nplusieurs générations."
        it:
          omega_ruby: "I ricordi delle lotte contro il suo acerrimo nemico Seviper sono\ninsiti in ogni cellula del corpo di Zangoose. Questo Pokémon\nriesce a schivare gli attacchi con incredibile maestria."
          alpha_sapphire: "Di solito Zangoose cammina a quattro zampe, ma quando\nsi infuria si alza sulle zampe posteriori ed estrae gli artigli.\nQuesto Pokémon è acerrimo nemico di Seviper, infatti la loro\ninimicizia è ormai leggendaria."
        de:
          omega_ruby: "Die Erinnerungen an den Kampf mit seinem Erzrivalen Vipitis\nhaben sich in jede Zelle von Sengos Körper eingebrannt.\nDieses Pokémon weicht feindlichen Angriffen unheimlich\nraffiniert und geschickt aus."
          alpha_sapphire: "Sengo bewegt sich normalerweise auf allen Vieren. Wenn es\naber wütend wird, stellt es sich auf seine Hinterbeine und\nfährt die Klauen an seinen Vorderbeinen aus. Dieses Pokémon\nist seit Generationen ein erbitterter Rivale von Vipitis."
        es:
          omega_ruby: "Los ecos del combate mantenido con su rival más feroz,\nSeviper, resuenan aún en cada célula de Zangoose. Este\nPokémon esquiva los ataques con auténtica destreza."
          alpha_sapphire: "Zangoose suele caminar a cuatro patas, pero cuando se\nenfada se pone de pie sobre las traseras y saca las zarpas.\nEste Pokémon tiene desde hace varias generaciones una\náspera rivalidad con Seviper."
        ko:
          omega_ruby: "숙적 세비퍼와 대결했던 기억이\n전신의 세포에 새겨져 있다.\n민첩한 몸동작으로 공격을 피한다."
          alpha_sapphire: "평소에는 4개의 다리로 행동하지만 화나면\n뒷다리로 서서 앞발의 발톱을 내보인다.\n세비퍼와는 선조 대대로 라이벌이다."
