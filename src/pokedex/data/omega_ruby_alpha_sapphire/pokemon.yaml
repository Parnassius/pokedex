          omega_ruby: "鋭い　ツメで　ようしゃなく　たたきのめす。\n強敵と　向かい合うと　気分が　たかぶり\n尻尾の　炎が　青白く　燃えあがる。"
          alpha_sapphire: "鋭い　ツメで　ようしゃなく　たたきのめす。\n強敵と　向かい合うと　気分が　たかぶり\n尻尾の　炎が　青白く　燃えあがる。"
        en:
          omega_ruby: "Charmeleon mercilessly destroys its foes using its sharp claws.\nIf it encounters a strong foe, it turns aggressive.\nIn this excited state, the flame at the tip of its tail flares with a\nbluish white color."
          alpha_sapphire: "Charmeleon mercilessly destroys its foes using its sharp\nclaws. If it encounters a strong foe, it turns aggressive.\nIn this excited state, the flame at the tip of its tail flares with\na bluish white color."
        fr:
          omega_ruby: "Reptincel lacère ses ennemis sans pitié grâce à ses griffes\nacérées. S’il rencontre un ennemi puissant, il devient agressif\net la flamme au bout de sa queue s’embrase et prend\nune couleur bleu clair."
          alpha_sapphire: "Reptincel lacère ses ennemis sans pitié grâce à ses griffes\nacérées. S’il rencontre un ennemi puissant, il devient agressif\net la flamme au bout de sa queue s’embrase et prend\nune couleur bleu clair."
        it:
          omega_ruby: "Charmeleon distrugge il nemico senza pietà con i suoi\nartigli affilati. Quando incontra un avversario molto forte\ndiventa aggressivo. In questo stato di grande agitazione\nla fiamma della coda diventa di colore bianco bluastro."
          alpha_sapphire: "Charmeleon distrugge il nemico senza pietà con i suoi\nartigli affilati. Quando incontra un avversario molto forte\ndiventa aggressivo. In questo stato di grande agitazione\nla fiamma della coda diventa di colore bianco bluastro."
        de:
          omega_ruby: "Gnadenlos besiegt Glutexo seine Gegner mit seinen\nscharfen Klauen. Wenn es auf starke Gegner trifft,\nwird es wütend und die Flamme auf seiner Schweifspitze\nflackert in einem bläulichen Ton."
          alpha_sapphire: "Glutexo attackiert seine Feinde mit aller Gewalt und unter\nEinsatz seiner scharfen Krallen. Trifft es auf starke Gegner,\nwird es wütend und die Flamme auf seiner Schweifspitze\nflackert in einem bläulichen Ton."
        es:
          omega_ruby: "Charmeleon no tiene reparo en acabar con su rival usando\nlas afiladas garras que tiene. Si su enemigo es fuerte, se\nvuelve agresivo, y la llama que tiene en el extremo de la cola\nempieza a arder con mayor intensidad tornándose azulada."
          alpha_sapphire: "Charmeleon no tiene reparo en acabar con su rival usando\nlas afiladas garras que tiene. Si su enemigo es fuerte, se\nvuelve agresivo, y la llama que tiene en el extremo de la cola\nempieza a arder con mayor intensidad tornándose azulada."
        ko:
          omega_ruby: "날카로운 발톱으로 봐주지 않고 때려눕힌다.\n강한 적을 만나면 기분이 고양되며\n꼬리의 불꽃이 푸르스름하게 불타오른다."
          alpha_sapphire: "날카로운 발톱으로 봐주지 않고 때려눕힌다.\n강한 적을 만나면 기분이 고양되며\n꼬리의 불꽃이 푸르스름하게 불타오른다."
