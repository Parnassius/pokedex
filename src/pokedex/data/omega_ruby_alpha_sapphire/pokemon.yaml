        jp_kana:
          omega_ruby: "からだが　とくしゅな　えきたいに\nつつまれているので　どんな　きびしい\nじょうきょうでも　へいきなのだ。"
          alpha_sapphire: "サイコパワーを　ほうしゅつして\nおそってきた　てきを　げきたい。\nテレパシーで　なかまと　かいわする。"
        jp_kanji:
          omega_ruby: "体が　特殊な　液体に\n包まれているので　どんな　きびしい\n状況でも　平気なのだ。"
          alpha_sapphire: "サイコパワーを　放出して\n襲ってきた　敵を　撃退。\nテレパシーで　仲間と　会話する。"
        en:
          omega_ruby: "Because their bodies are enveloped in a special\nliquid, they are fine in any environment, no matter\nhow severe."
          alpha_sapphire: "They drive away attackers by unleashing psychic\npower. They can use telepathy to talk with others."
        fr:
          omega_ruby: "Son corps est enrobé dans un fluide spécial, ce qui lui permet\nde vivre dans n’importe quel environnement."
          alpha_sapphire: "Ils repoussent leurs assaillants avec leurs pouvoirs psychiques\net communiquent entre eux par télépathie."
        it:
          omega_ruby: "Il liquido speciale in cui è avvolto il suo corpo gli permette\ndi resistere alle condizioni più estreme."
          alpha_sapphire: "Utilizza i suoi poteri psichici per respingere gli aggressori.\nComunica con i compagni usando la telepatia."
        de:
          omega_ruby: "Die spezielle Flüssigkeit, die es umgibt, bietet ihm in jeder\nnoch so gefährlichen Situation Schutz."
          alpha_sapphire: "Es wehrt Angreifer ab, indem es Psycho-Kräfte auf sie ansetzt.\nEs kommuniziert telepathisch mit Artgenossen."
        es:
          omega_ruby: "Gracias a la sustancia viscosa que envuelve su cuerpo,\npermanece tranquilo por dura o rigurosa que sea la situación."
          alpha_sapphire: "Desata su poder psíquico para ahuyentar al enemigo.\nSe comunica con sus compañeros por telepatía."
        ko:
          omega_ruby: "몸이 특수한 액체로\n둘러싸여 있어 어떤 곤란한\n상황이라도 문제없다."
          alpha_sapphire: "사이코 파워를 방출하여\n달려드는 상대를 물리친다.\n텔레파시로 동료와 대화한다."
duosion:
  species_id: 578
  names:
    jp_kana: ダブラン
    jp_kanji: ダブラン
