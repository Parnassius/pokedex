          omega_ruby: "３ぼんの　しょくしゅを　たたきつけ\nさらに　トゲを　とばして　あいてを\nあとかたのこらず　ふんさいする。"
          alpha_sapphire: "ほらあなの　てんじょうに　はりつき\nしたを　とおる　えものに　むかって\nてつの　トゲを　うちこみ　おそう。"
        jp_kanji:
          omega_ruby: "３本の　触手を　たたきつけ\nさらに　トゲを　飛ばして　相手を\n跡形残らず　粉砕する。"
          alpha_sapphire: "洞穴の　天井に　はりつき\n下を　通る　獲物に　向かって\n鉄の　トゲを　打ちこみ　襲う。"
        en:
          omega_ruby: "By swinging around its three spiky feelers and\nshooting spikes, it can obliterate an opponent."
          alpha_sapphire: "They attach themselves to cave ceilings, firing steel\nspikes at targets passing beneath them."
        fr:
          omega_ruby: "Il attaque grâce à ses trois tentacules épineux et lance\ndes épines d’acier pour réduire ses ennemis en poussière."
          alpha_sapphire: "Il s’accroche aux plafonds des grottes et attaque les proies\nqui passent en dessous avec ses épines d’acier."
        it:
          omega_ruby: "Fa a pezzi il nemico colpendolo prima con le sue tre antenne\ne poi sparandogli addosso i suoi aculei."
          alpha_sapphire: "Si appende al soffitto delle grotte e attacca le prede che\npassano al di sotto lanciando i suoi aculei di ferro."
        de:
          omega_ruby: "Es macht mit Gegnern kurzen Prozess, indem es mit seinen\ndrei Schlingen auf sie eindrischt und Dornen auf sie abfeuert."
          alpha_sapphire: "Es setzt sich an der Decke von Höhlen fest und wirft seine\ndornengespickten Schlingen auf vorbeigehende Beute ab."
        es:
          omega_ruby: "Azota al enemigo con sus tres tentáculos y después dispara\npúas hasta que no deja ni rastro del rival."
          alpha_sapphire: "Se pega al techo de cuevas y lanza púas de metal a todo el\nque pase por debajo de donde se encuentre."
        ko:
          omega_ruby: "3개의 촉수를 세게 내리치고\n거기에 가시를 날려 상대를\n흔적도 없이 분쇄한다."
          alpha_sapphire: "동굴 천장에 달라붙어\n아래를 지나가는 먹이를 향해\n철 가시를 쏘며 덮친다."
klink:
