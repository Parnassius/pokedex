        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      hidden_ability: overcoat
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          omega_ruby: "かたい　カラの　ないぶは　さいぼうが　へんかして\nあたらしい　からだを　つくっている　さいちゅう。\nカラが　とても　おもいので　うごきは　にぶいぞ。"
          alpha_sapphire: "からだを　おおっているのは　ホネのような　もの。\nとても　かたく　てきの　こうげきを　はねかえす。\nほらあなで　みを　ひそめ　しんかを　まっている。"
        jp_kanji:
          omega_ruby: "硬い　カラの　内部は　細胞が　変化して\n新しい　体を　つくっている　最中。\nカラが　とても　重いので　動きは　鈍いぞ。"
          alpha_sapphire: "体を　覆っているのは　ホネのような　もの。\nとても　硬く　敵の　攻撃を　跳ね返す。\n洞穴で　身を　潜め　進化を　待っている。"
        en:
          omega_ruby: "Inside Shelgon’s armor-like shell, cells are in the midst of\ntransformation to create an entirely new body. This Pokémon’s\nshell is extremely heavy, making its movements sluggish."
          alpha_sapphire: "Covering Shelgon’s body are outgrowths much like bones.\nThe shell is very hard and bounces off enemy attacks.\nWhen awaiting evolution, this Pokémon hides away in a cavern."
        fr:
          omega_ruby: "À l’intérieur de la carapace blindée de Drackhaus,\nses cellules sont en pleine transformation pour créer\nun nouveau corps. La carapace de ce Pokémon est\ntrès lourde, ce qui rend ses mouvements très lents."
          alpha_sapphire: "Des excroissances osseuses recouvrent le corps de\nDrackhaus. Cette carapace est extrêmement dure et le\nprotège des attaques ennemies. En attendant son évolution,\nce Pokémon reste caché dans une caverne."
        it:
          omega_ruby: "All’interno della corazza-armatura di Shelgon, le cellule\nsono in continua trasformazione per creare un corpo\ncompletamente nuovo. La corazza pesantissima rende\ndifficili i movimenti."
          alpha_sapphire: "Il corpo di Shelgon è ricoperto da escrescenze simili a ossa.\nQuesta corazza è così dura da proteggere completamente\ndagli attacchi nemici. Si rintana nelle grotte in attesa\ndell’evoluzione."
        de:
          omega_ruby: "In Draschels panzerartiger Schale vollziehen seine Zellen\neine Transformation, um einen völlig neuen Körper zu bilden.\nDie Schale dieses Pokémon ist ausgesprochen schwer,\nsodass seine Bewegungen träge wirken."
          alpha_sapphire: "Auf Draschels Körper befinden sich knochenähnliche\nAuswüchse. Sein Panzer ist sehr hart und wehrt jeden\nAngriff eines Gegners ab. Während es auf seine Entwicklung\nwartet, versteckt es sich in einer Höhle."
        es:
          omega_ruby: "Dentro de la capa acorazada de Shelgon, las células están en\npleno proceso de creación de un cuerpo nuevo. El peso de la\ncoraza le hace tener unos movimientos lentos."
          alpha_sapphire: "Shelgon está recubierto por una especie de capa ósea: una\ncoraza muy dura que hace rebotar los ataques enemigos. Este\nPokémon se esconde en las cavernas para evolucionar."
        ko:
          omega_ruby: "단단한 껍질 내부는 세포가 변화되어\n새로운 몸을 만드는 중이다.\n껍질이 매우 무거워서 움직임이 둔하다."
          alpha_sapphire: "몸을 감싸고 있는 것은 뼈와 같은 것이다.\n매우 단단해서 적의 공격을 튕겨낸다.\n동굴에서 몸을 숨기고 진화를 기다리고 있다."
