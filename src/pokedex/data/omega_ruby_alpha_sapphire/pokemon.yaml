        - defeatist
      descriptions:
        jp_kana:
          omega_ruby: "ちじょうで　じょそうを　つけてから\nとびたつ。なかまと　きょうりょくして\nえものを　しとめる　ちのうを　もつ。"
          alpha_sapphire: "とぶよりも　はしるほうが　とくいで\nじそく４０キロで　かけぬけた\nいきおいで　おおぞらに　はばたく。"
        jp_kanji:
          omega_ruby: "地上で　助走を　つけてから\n飛び立つ。仲間と　協力して\n獲物を　しとめる　知能を　持つ。"
          alpha_sapphire: "飛ぶよりも　走るほうが　得意で\n時速４０キロで　駆けぬけた\n勢いで　大空に　羽ばたく。"
        en:
          omega_ruby: "They are intelligent and will cooperate to catch\nprey. From the ground, they use a running start to\ntake flight."
          alpha_sapphire: "It runs better than it flies. It takes off into the sky\nby running at a speed of 25 mph."
        fr:
          omega_ruby: "Il s’envole après avoir pris de l’élan. Il est assez intelligent\npour chasser ses proies en groupe."
          alpha_sapphire: "Il est plus doué pour courir que pour voler. Il doit s’élancer\nà 40 km/h avant de pouvoir s’envoler."
        it:
          omega_ruby: "Spicca il volo prendendo la rincorsa da terra. Collabora\ncon i suoi simili per catturare le prede."
          alpha_sapphire: "È più versato nella corsa che nel volo. Si lancia in aria a una\nvelocità di 40 km/h sbattendo le ali."
        de:
          omega_ruby: "Bevor es abhebt, nimmt es am Boden Anlauf. Es ist schlau\ngenug, seine Beute zusammen mit Artgenossen zu jagen."
          alpha_sapphire: "Zu Fuß ist es schneller als in der Luft. Es muss ein Tempo\nvon 40 km/h erreichen, bevor es sich in die Lüfte aufschwingt."
        es:
          omega_ruby: "Levanta el vuelo tras coger carrerilla. Coopera con sus\ncompañeros de bandada para atrapar a sus presas."
          alpha_sapphire: "Corre a mayor velocidad de la que puede volar. Alcanza una\nvelocidad de 40 km/h antes de alzarse en vuelo hacia el cielo."
        ko:
          omega_ruby: "지상에서 도움닫기를 하여\n날아오른다. 동료와 협력하여\n먹이를 잡는 지능을 가졌다."
          alpha_sapphire: "나는 것보다 달리는 것이 특기로\n시속 40km로 달리던 기세로\n넓은 하늘로 날아오른다."
trubbish:
