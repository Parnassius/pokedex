      descriptions:
        jp_kana:
          omega_ruby: "せんぞだいだい　ザングースと　たたかってきた。\nからだの　キズは　はげしい　たたかいの　しるし。\nするどい　きれあじの　しっぽで　こうげきするぞ。"
          alpha_sapphire: "かたなの　ような　しっぽは　てきを　きりさくのと\nどうじに　しみだした　もうどくを　あびせるぞ。\nしゅくてき　ザングースと　たたかい　つづける。"
        jp_kanji:
          omega_ruby: "先祖代々　ザングースと　戦ってきた。\n体の　キズは　激しい　戦いの　印。\n鋭い　切れ味の　尻尾で　攻撃するぞ。"
          alpha_sapphire: "刀の　ような　尻尾は　敵を　切り裂くのと\n同時に　染み出した　猛毒を　浴びせるぞ。\n宿敵　ザングースと　戦い　続ける。"
        en:
          omega_ruby: "Seviper shares a generations-long feud with Zangoose.\nThe scars on its body are evidence of vicious battles.\nThis Pokémon attacks using its sword-edged tail."
          alpha_sapphire: "Seviper’s swordlike tail serves two purposes—it slashes foes\nand douses them with secreted poison. This Pokémon will not\ngive up its long-running blood feud with Zangoose."
        fr:
          omega_ruby: "Séviper se querelle avec Mangriff depuis plusieurs générations.\nSes cicatrices sont les preuves de ses nombreux combats.\nCe Pokémon attaque à l’aide de sa queue, aiguisée comme\nune épée."
          alpha_sapphire: "La queue tranchante comme un sabre de Séviper a\ndeux fonctions : elle peut frapper l’ennemi et lui injecter\nun poison qu’il sécrète. Ce Pokémon n’oublie jamais\nsa vieille rancune envers Mangriff."
        it:
          omega_ruby: "Da generazioni Seviper è in lotta contro Zangoose,\nsuo nemico dichiarato. Le cicatrici sul suo corpo sono prove\ndi scontri efferati. Questo Pokémon attacca usando la coda\na forma di spada."
          alpha_sapphire: "La coda a forma di spada di Seviper ha una duplice funzione:\nlacera il nemico e gli inietta un potente veleno.\nIl Pokémon non dimentica mai le lotte con il suo secolare\nnemico, Zangoose."
        de:
          omega_ruby: "Vipitis lebt seit Generationen in Fehde mit Sengo.\nDie Narben auf seinem Körper sind Zeugen grausamer\nKämpfe. Dieses Pokémon greift seine Gegner mit seinem\nscharfkantigen Schweif an."
          alpha_sapphire: "Vipitis kann mit seinem Schweif Feinden einen Hieb versetzen\nund sie mit einem abgesonderten Gift bespritzen. Dieses\nPokémon wird in der langwährenden Blutfehde mit Sengo\nnicht nachgeben."
        es:
          omega_ruby: "Seviper lleva años de gran enemistad con Zangoose. Las\ncicatrices que tiene por todo el cuerpo dan buena muestra de\nlos encarnizados combates en los que se han enfrentado.\nSeviper ataca usando su cola con forma de espada."
          alpha_sapphire: "Seviper tiene una cola que parece una espada y le sirve para\ndar un sablazo al enemigo y para envenenarlo. Este Pokémon\nse mantiene firme en la enemistad que siente hacia Zangoose."
        ko:
          omega_ruby: "조상 대대로 쟝고와 싸워왔다.\n몸의 상처는 격렬한 싸움의 증거다.\n날카롭고 예리한 꼬리로 공격한다."
          alpha_sapphire: "칼과 같은 꼬리는 적을 베어 가르는\n동시에 스며 나온 맹독을 끼얹는다.\n숙적인 쟝고와 계속하여 싸운다."
