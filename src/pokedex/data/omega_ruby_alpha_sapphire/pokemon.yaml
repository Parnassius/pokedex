      descriptions:
        jp_kana:
          omega_ruby: "２つの　からだが　かみあい\nかいてんすることで　いきるための\nエネルギーを　つくりだしている。"
          alpha_sapphire: "２つの　からだは　くみあわせが\nきまっている。べつの　からだとは\nかみあわずに　はなれてしまう。"
        jp_kanji:
          omega_ruby: "２つの　体が　かみ合い\n回転することで　生きるための\nエネルギーを　作り出している。"
          alpha_sapphire: "２つの　体は　組み合わせが\n決まっている。別の　体とは\nかみ合わずに　離れてしまう。"
        en:
          omega_ruby: "Interlocking two bodies and spinning around\ngenerates the energy they need to live."
          alpha_sapphire: "The two minigears that mesh together are\npredetermined. Each will rebound from other\nminigears without meshing."
        fr:
          omega_ruby: "Le mouvement de ses deux corps enchâssés produit l’énergie\nqui lui est nécessaire pour vivre."
          alpha_sapphire: "La compatibilité entre ses deux rouages est prédéterminée.\nCeux-ci ne se fixeront à aucun autre."
        it:
          omega_ruby: "Produce l’energia che gli serve per vivere incastrando\ne facendo ruotare le due parti che lo compongono."
          alpha_sapphire: "I due ingranaggi che lo compongono combaciano unicamente\nl’uno con l’altro. Qualsiasi altro incastro è impossibile."
        de:
          omega_ruby: "Es gewinnt lebenswichtige Energie, indem es seine zwei\nEinzelteile ineinander verzahnt und rotieren lässt."
          alpha_sapphire: "Seine zwei Teile greifen ineinander wie ein Uhrwerk.\nJedes andere Objekt, das man mit ihm kombinieren will,\nwird abgestoßen."
        es:
          omega_ruby: "Genera la energía vital que necesita haciendo girar sus dos\ncuerpos."
          alpha_sapphire: "La combinación de sus dos cuerpos es predeterminada. Si no\nse corresponde con su homólogo, se separa."
        ko:
          omega_ruby: "두 개의 몸을 맞물려\n회전시켜서 살아가기 위한\n에너지를 만들고 있다."
          alpha_sapphire: "두 개의 몸은 그 조합 방법이\n정해져 있다. 다른 몸과는\n맞물리지 않고 떨어져 버린다."
