        - chlorophyll
      held_items:
        rare: miracle_seed
      descriptions:
        jp_kana:
          omega_ruby: "ひのひかりで　あかく　いろづく。\nえいようぶんが　すわれて　ちいさい\nたまが　しぼむと　しんかが　ちかい。"
          alpha_sapphire: "ちいさな　たまに　つまった\nえいようぶんを　すいとって\nしんかの　エネルギーに　するのだ。"
        jp_kanji:
          omega_ruby: "日の光で　赤く　色づく。\n栄養分が　吸われて　小さい　玉が\nしぼむと　進化が　近い。"
          alpha_sapphire: "小さな　玉に　つまった\n栄養分を　吸い取って\n進化の　エネルギーに　するのだ。"
        en:
          omega_ruby: "Sunlight colors it red. When the small ball is\ndrained of nutrients, it shrivels to herald evolution."
          alpha_sapphire: "It evolves by sucking the energy out of the small\nball where it had been storing nutrients."
        fr:
          omega_ruby: "Il rougit au soleil. Quand la petite boule est à court\nde nutriments, elle fane en signe d’évolution."
          alpha_sapphire: "Il aspire les nutriments de sa petite boule pour pouvoir\névoluer."
        it:
          omega_ruby: "La luce solare lo tinge di rosso. Se la pallina esaurisce\ni nutrimenti, si avvizzisce indicando l’evoluzione."
          alpha_sapphire: "Ricava l’energia necessaria all’evoluzione dalla pallina, ricca\ndi sostanze nutritive."
        de:
          omega_ruby: "Sonnenlicht färbt es rot. Verliert das kleine Bällchen\nNährstoffe, welkt es und die Entwicklung beginnt."
          alpha_sapphire: "Es saugt Nährstoffe, die in seinem Bällchen enthalten sind,\nund nutzt die Energie für seine Entwicklung."
        es:
          omega_ruby: "Bajo la luz solar es rojo. La esfera pequeña pierde sus\nnutrientes y se seca para anunciar la evolución."
          alpha_sapphire: "Obtiene la energía necesaria para evolucionar de esa pequeña\nesfera que está cargada de nutrientes."
        ko:
          omega_ruby: "햇빛으로 빨갛게 물들었다.\n영양분이 흡수되어 작은 구슬이\n시들면 곧 진화한다는 뜻이다."
          alpha_sapphire: "작은 구슬에 모인\n영양분을 흡수해\n진화의 에너지로 삼는다."
