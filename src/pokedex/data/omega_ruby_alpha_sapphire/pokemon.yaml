        jp_kana:
          omega_ruby: "あいてそっくりに　ばけているように\nみせかけ　だましたり　おどろかして\nそのすきに　にげだすことが　おおい。"
          alpha_sapphire: "ひとや　ほかの　ポケモンに　ばける。\nじぶんの　しょうたいを　かくすことで\nきけんから　みを　まもっているのだ。"
        jp_kanji:
          omega_ruby: "相手そっくりに　化けているように\nみせかけ　だましたり　驚かして\nそのすきに　逃げ出すことが　多い。"
          alpha_sapphire: "人や　ほかの　ポケモンに　化ける。\n自分の　正体を　隠すことで\n危険から　身を　守っているのだ。"
        en:
          omega_ruby: "It changes so it looks just like its foe, tricks it, and\nthen uses that opportunity to flee."
          alpha_sapphire: "To protect themselves from danger, they hide their\ntrue identities by transforming into people\nand Pokémon."
        fr:
          omega_ruby: "Il prend l’apparence de son adversaire pour le désorienter\net prendre la fuite grâce à la confusion causée."
          alpha_sapphire: "Il peut se transformer en humain ou en d’autres Pokémon.\nIl se protège du danger en dissimulant sa vraie identité."
        it:
          omega_ruby: "Inganna spesso il nemico assumendone la forma e lasciandolo\nesterrefatto, per poi darsi alla fuga."
          alpha_sapphire: "Si protegge dai pericoli trasformandosi in essere umano o in\nun altro Pokémon, nascondendo così la sua vera identità."
        de:
          omega_ruby: "Nicht selten überrumpelt es Gegner, indem es ihre Gestalt\nannimmt und den Überraschungseffekt zur Flucht nutzt."
          alpha_sapphire: "Es tarnt sich als Mensch oder als andere Pokémon. Es schützt\nsich vor Gefahren, indem es seine wahre Gestalt geheim hält."
        es:
          omega_ruby: "Adopta la apariencia de su enemigo para engañarlo vilmente y\naprovecha su estupor para poner tierra por medio."
          alpha_sapphire: "Se transforma en humanos o en otros Pokémon. Se defiende\ndel peligro ocultando su verdadera apariencia."
        ko:
          omega_ruby: "상대와 똑 닮게 둔갑한 것처럼\n보이게 하여 속이거나 놀라게 해서\n그 틈에 도망가는 일이 많다."
          alpha_sapphire: "사람이나 다른 포켓몬으로 둔갑한다.\n자신의 정체를 감추어\n위험으로부터 몸을 지키는 것이다."
zoroark:
