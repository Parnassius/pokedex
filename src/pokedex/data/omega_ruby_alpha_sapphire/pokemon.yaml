      descriptions:
        jp_kana:
          omega_ruby: "じぶんの　からだを　はりで　キズつける　とき\nつよい　のろいの　エネルギーが　はっせいする。\nもとは　すてられた　かわいそうな　ぬいぐるみ。"
          alpha_sapphire: "すてられた　ぬいぐるみの　わたに　のろいの\nエネルギーが　しみこんで　ポケモンに　なった。\nくちを　あけると　エネルギーが　にげてしまう。"
        jp_kanji:
          omega_ruby: "自分の　体を　針で　キズつける　とき\n強い　のろいの　エネルギーが　発生する。\n元は　捨てられた　可哀想な　ぬいぐるみ。"
          alpha_sapphire: "捨てられた　ぬいぐるみの　綿に　のろいの\nエネルギーが　染み込んで　ポケモンに　なった。\n口を　開けると　エネルギーが　逃げてしまう。"
        en:
          omega_ruby: "Banette generates energy for laying strong curses by sticking\npins into its own body. This Pokémon was originally a pitiful\nplush doll that was thrown away."
          alpha_sapphire: "A cursed energy permeated the stuffing of a discarded and\nforgotten plush doll, giving it new life as Banette.\nThe Pokémon’s energy would escape if it were to ever open\nits mouth."
        fr:
          omega_ruby: "En plantant des aiguilles dans son propre corps,\nBranette génère de l’énergie permettant de lancer\nde puissantes malédictions. Au départ, ce Pokémon\nn’était qu’une malheureuse peluche jetée à la poubelle."
          alpha_sapphire: "Une énergie maudite a pénétré le rembourrage d’une vieille\npeluche abandonnée, donnant ainsi vie à Branette. L’énergie\nde ce Pokémon s’échappe s’il ouvre la bouche."
        it:
          omega_ruby: "Banette genera energia per lanciare terribili maledizioni,\nconficcandosi alcuni spilli nel corpo. Originariamente questo\nPokémon era un dolce peluche, successivamente gettato via."
          alpha_sapphire: "Un’energia maledetta ha permeato l’imbottitura di un peluche\nvecchio e dimenticato, dando vita a Banette.\nQuesto Pokémon deve tenere sempre la bocca chiusa per\nevitare che l’energia accumulata scappi fuori."
        de:
          omega_ruby: "Banette belegt andere mit Flüchen, indem es Nadeln in seinen\neigenen Körper sticht. Dieses Pokémon war ursprünglich eine\nmitleiderregende Plüschpuppe, die weggeworfen wurde."
          alpha_sapphire: "Die Energie eines Fluchs durchdrang die Füllung einer\nweggeworfenen und vergessenen Plüschpuppe und erweckte\nBanette zum Leben. Die Energie dieses Pokémon würde\nentweichen, wenn es seinen Mund öffnen sollte."
        es:
          omega_ruby: "Banette genera energía para echar un infalible hechizo\nclavándose púas a sí mismo. Los orígenes de este Pokémon\nson algo tristes: era un muñeco de felpa al que tiraron a la\nbasura."
          alpha_sapphire: "Fue un hechizo el que hizo que el relleno de este muñeco de\nfelpa olvidado y abandonado pasara a ser Banette. Si este\nPokémon abriera la boca, se quedaría sin energía."
        ko:
          omega_ruby: "자신의 몸을 바늘로 상처 낼 때\n강한 저주 에너지가 발생한다.\n원래는 버려진 불쌍한 인형이다."
          alpha_sapphire: "버려진 인형의 솜에 저주\n에너지가 스며들어 포켓몬이 되었다.\n입을 열면 에너지가 빠져나간다."
