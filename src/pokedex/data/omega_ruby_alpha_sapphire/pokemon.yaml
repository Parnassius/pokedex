      descriptions:
        jp_kana:
          omega_ruby: "ちいさな　ムシや　いわばの　コケを　たべる。\nかいりゅうが　はやく　なると　しっぽを　いわばや\nサンゴに　まきつけ　ながされない　ように　する。"
          alpha_sapphire: "きけんを　かんじると　はんしゃてきに　くちから\nまっくろい　スミを　はきだして　にげるぞ。\nせびれを　きように　うごかして　およぐ。"
        jp_kanji:
          omega_ruby: "小さな　ムシや　岩場の　コケを　食べる。\n海流が　速く　なると　尻尾を　岩場や\nサンゴに　巻きつけ　流されない　ように　する。"
          alpha_sapphire: "危険を　感じると　反射的に　口から\n真っ黒い　スミを　吐き出して　逃げるぞ。\n背びれを　器用に　動かして　泳ぐ。"
        en:
          omega_ruby: "Horsea eats small insects and moss off of rocks. If the ocean\ncurrent turns fast, this Pokémon anchors itself by wrapping its\ntail around rocks or coral to prevent being washed away."
          alpha_sapphire: "If Horsea senses danger, it will reflexively spray a dense\nblack ink from its mouth and try to escape. This Pokémon\nswims by cleverly flapping the fin on its back."
        fr:
          omega_ruby: "Hypotrempe mange des petits insectes et de la mousse\ntrouvée sur les cailloux. Lorsque les courants océaniques\nsont trop forts, ce Pokémon peut s’ancrer en accrochant\nsa queue aux rochers ou aux coraux."
          alpha_sapphire: "Lorsque Hypotrempe sent un danger, il libère instinctivement\nune épaisse encre noire pour pouvoir s’échapper.\nCe Pokémon nage en agitant sa nageoire dorsale."
        it:
          omega_ruby: "Horsea si nutre di piccoli insetti e del muschio trovato\nsugli scogli. Se la corrente oceanica si fa rapida, avvolge\nla coda attorno agli spuntoni di roccia o ai coralli per evitare\ndi essere spazzato via."
          alpha_sapphire: "Avvertendo il pericolo, Horsea spruzza istintivamente una nube\nd’inchiostro nero dalla bocca, tentando poi la fuga. Questo\nPokémon nuota agitando abilmente la pinna sulla schiena."
        de:
          omega_ruby: "Seeper ernährt sich von kleinen Insekten und dem Moos auf\nSteinen. Bei unruhiger See verankert sich dieses Pokémon\nmit seinem Schweif an Steinen oder Korallen, damit es nicht\nweggespült wird."
          alpha_sapphire: "Wenn Seeper Gefahr wittert, versprüht es reflexartig eine\ntiefschwarze Tinte aus seinem Mund und ergreift die Flucht.\nDieses Pokémon kann schwimmen, indem es geschickt mit\nder Flosse auf seinem Rücken schlägt."
        es:
          omega_ruby: "Horsea come insectos pequeños y el musgo de las rocas. Si\nlas corrientes del océano cobran fuerza, este Pokémon se\nanclará con la cola a rocas o corales para evitar que las aguas\nlo arrastren."
          alpha_sapphire: "Si Horsea siente peligro, echará por la boca una densa tinta\nnegra inconscientemente e intentará huir. Este Pokémon nada\nmuy bien batiendo la aleta que tiene en el lomo."
        ko:
          omega_ruby: "작은 벌레나 바위의 이끼를 먹는다.\n해류가 빨라지면 꼬리로 바위나\n산호를 휘감아 떠내려가지 않게 한다."
          alpha_sapphire: "위험을 감지하면 반사적으로 입에서\n새까만 먹물을 뿜어내고 도망간다.\n등지느러미를 능숙히 움직여 헤엄친다."
seadra:
  species_id: 117
