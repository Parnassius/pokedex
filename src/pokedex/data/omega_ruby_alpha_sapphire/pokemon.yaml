        jp_kana:
          omega_ruby: "ふしぎな　ちからを　はっきしている　コダックから\nねむっている　ときにだけ　でるはずの　のうはが\nかんそくされて　がっかいの　わだいに　なった。"
          alpha_sapphire: "ふしぎな　ちからを　つかった　きおくが　ないのは\nちからを　はっきした　ときは　じゅくすいしている\nときと　おなじ　じょうたいだから　らしい。"
        jp_kanji:
          omega_ruby: "不思議な　力を　発揮している　コダックから\n眠っている　ときだけ　出るはずの　脳波が\n観測されて　学会の　話題に　なった。"
          alpha_sapphire: "不思議な　力を　使った　記憶が　ないのは\n力を　発揮した　ときは　熟睡している\nときと　同じ　状態だから　らしい。"
        en:
          omega_ruby: "Psyduck uses a mysterious power. When it does so, this\nPokémon generates brain waves that are supposedly only seen\nin sleepers. This discovery spurred controversy\namong scholars."
          alpha_sapphire: "If it uses its mysterious power, Psyduck can’t remember\nhaving done so. It apparently can’t form a memory of such\nan event because it goes into an altered state that is much\nlike deep sleep."
        fr:
          omega_ruby: "Psykokwak utilise un mystérieux pouvoir. Ce Pokémon\npeut générer des ondes cérébrales normalement observées\nchez les dormeurs. Cette découverte a lancé une polémique\ndans le milieu universitaire."
          alpha_sapphire: "Lorsqu’il utilise son mystérieux pouvoir, Psykokwak\nne s’en souvient pas. Apparemment, il ne peut pas garder\nce genre d’événement en mémoire, car il pratique ce pouvoir\ndans un état proche du sommeil profond."
        it:
          omega_ruby: "Psyduck usa poteri misteriosi, che scatenano onde cerebrali\nrilevabili apparentemente soltanto su persone addormentate.\nQuesta scoperta ha causato reazioni contrastanti tra gli\nstudiosi."
          alpha_sapphire: "Quando usa i suoi misteriosi poteri, Psyduck se ne dimentica\nsubito. Apparentemente non riesce a ricordarsene perché entra\nin uno stato innaturale molto simile a un sonno profondo."
        de:
          omega_ruby: "Enton verwendet eine geheimnisvolle Kraft. Dabei erzeugt\nes Gehirnströme, die man sonst nur von Schlafenden kennt.\nDiese Entdeckung führte zu einer kontroversen Diskussion\nunter Wissenschaftlern."
          alpha_sapphire: "Enton besitzt mystische Kräfte. Wenn es sie einsetzt,\nerinnert es sich nicht mehr daran. Es kann ein solches\nEreignis offensichtlich nicht im Gedächtnis behalten,\nda es sich in einen tiefschlafähnlichen Zustand versetzt."
        es:
          omega_ruby: "Psyduck tiene un extraño poder, que consiste en generar\nondas cerebrales iguales a las que se generan cuando se está\ndormido. Este descubrimiento levantó una gran polémica entre\neruditos."
          alpha_sapphire: "Psyduck no se acuerda nunca de haber usado su misterioso\npoder. Parece ser que no puede registrar en la memoria haber\nusado el ataque porque se queda inmerso en un estado\nparecido a un sueño profundo."
        ko:
          omega_ruby: "이상한 힘을 발휘하는 고라파덕에게서\n잠들어 있을 때만 발산되는 뇌파가\n관측되어 학회에서 화제가 되었다."
          alpha_sapphire: "이상한 힘을 썼던 기억이 없는 것은\n힘을 발휘할 때가 숙면 중일 때와\n같은 상태이기 때문인 것 같다."
