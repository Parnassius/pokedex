      form_id: 0
      base_stats:
        hp: 45
        attack: 22
        defense: 60
        special_attack: 27
        special_defense: 30
        speed: 29
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          omega_ruby: "しげみの　かげに　かくれて　くらす。\nてきに　おそわれると　からだの　けを\nするどく　さかだてて　いかくする。"
          alpha_sapphire: "かたい　からだは　とりポケモンの\nクチバシでも　キズひとつ　つかない。\nコナを　まきちらして　ぼうせんする。"
        jp_kanji:
          omega_ruby: "しげみの　陰に　隠れて　暮らす。\n敵に　襲われると　体の　毛を\n鋭く　逆立てて　威嚇する。"
          alpha_sapphire: "硬い　体は　とりポケモンの\nクチバシでも　傷ひとつ　つかない。\n粉を　まき散らして　防戦する。"
        en:
          omega_ruby: "It lives hidden within thicket shadows.\nWhen predators attack, it quickly bristles the fur\ncovering its body in an effort to threaten them."
          alpha_sapphire: "The beaks of bird Pokémon can’t begin\nto scratch its stalwart body.\nTo defend itself, it spews powder."
        fr:
          omega_ruby: "Vit caché sous le couvert des buissons. Poursuivi par\nun ennemi, il tente de l’intimider en hérissant les poils\nqui lui couvrent le corps."
          alpha_sapphire: "Même les becs acérés des Pokémon Oiseaux ne parviennent\npas à meurtrir son corps très dur. Il se défend en crachant\nde la poudre."
        it:
          omega_ruby: "Vive nascosto nella boscaglia. Se attaccato, minaccia i nemici\nrizzando il pelo."
          alpha_sapphire: "Il becco dei Pokémon uccello non può neppure scalfire il suo\ndurissimo corpo. Si difende spargendo scaglie."
        de:
          omega_ruby: "Es lebt versteckt im schattigen Dickicht. Wird es von einem\nFeind angegriffen, stellt es sein Fell zur Abschreckung zu\nscharfen Spitzen auf."
          alpha_sapphire: "Der Schnabel eines Vogel-Pokémon kann seinem harten\nKörper keinen Kratzer zufügen. Es verteidigt sich, indem es\nPuder spuckt."
        es:
          omega_ruby: "Habita en la sombra de la espesura. Si percibe alguna\namenaza, su pelaje se eriza y se vuelve muy afilado para\nasí intimidar al enemigo."
          alpha_sapphire: "Su cuerpo es tan duro que ni siquiera los Pokémon pájaro\npueden hacerle el menor rasguño con sus picos. Esparce\npolvo de escamas para defenderse."
        ko:
          omega_ruby: "수풀의 그늘에 숨어 산다.\n적에게 공격당하면 몸의 털을\n뾰족하게 곤두세우며 위협한다."
          alpha_sapphire: "단단한 몸은 새포켓몬의\n부리로도 상처 하나 입지 않는다.\n가루를 뿌려서 방어한다."
vivillon:
  species_id: 666
  names:
    jp_kana: ビビヨン
    jp_kanji: ビビヨン
    en: Vivillon
    fr: Prismillon
    it: Vivillon
    de: Vivillon
    es: Vivillon
    ko: 비비용
  forms:
    vivillon_icy_snow_pattern:
      form_id: 0
      names:
        jp_kana: ひょうせつのもよう
        jp_kanji: ひょうせつのもよう
        en: Icy Snow Pattern
        fr: Motif Blizzard
        it: Motivo Nevi Perenni
        de: Frostmuster
        es: Motivo Polar
        ko: 빙설의 모양
      base_stats:
        hp: 80
        attack: 52
        defense: 50
        special_attack: 90
        special_defense: 50
        speed: 89
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - shield_dust
        - compound_eyes
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          omega_ruby: "せかいには　さまざまな　はねもようの\nビビヨンがいる。すんでいる　とちの\nきこうが　えいきょうしているようだ。"
          alpha_sapphire: "すんでいる　きこうや　ふうどによって\nはねの　もようが　ちがう　ポケモン。\nいろあざやかな　りんぷんを　まく。"
        jp_kanji:
          omega_ruby: "世界には　さまざまな　羽模様の\nビビヨンがいる。住んでいる　土地の\n気候が　影響しているようだ。"
          alpha_sapphire: "住んでいる　気候や　風土によって\n羽の　模様が　違う　ポケモン。\n色鮮やかな　りんぷんを　まく。"
        en:
          omega_ruby: "Vivillon with many different patterns are\nfound all over the world. These patterns\nare affected by the climate of their habitat."
          alpha_sapphire: "The patterns on this Pokémon’s wings\ndepend on the climate and topography\nof its habitat. It scatters colorful scales."
        fr:
          omega_ruby: "Les ailes des Prismillon arborent différents motifs en fonction\nde leur aire d’origine. Il est possible que le climat y soit\npour quelque chose."
          alpha_sapphire: "Selon le climat de sa région d’origine, les motifs de ses ailes\nsont différents. Il sème des écailles aux couleurs vives."
        it:
          omega_ruby: "Nel mondo ne esistono diverse varietà che si differenziano\nper i motivi sulle ali. Sembra che questi dipendano dal clima\ndel loro habitat."
          alpha_sapphire: "I motivi sulle sue ali cambiano a seconda della zona e del\nclima in cui vive. Dal suo corpo si staccano scaglie dai\ncolori vivaci."
        de:
          omega_ruby: "Vivillon kommen weltweit mit den unterschiedlichsten\nMusterungen vor. Das Klima ihres Habitats hat Einfluss\nauf ihre Flügelmusterung."
          alpha_sapphire: "Je nach Klima und geographischer Beschaffenheit seines\nHabitats ändert sich die Musterung seiner Flügel. Es verstreut\nbunten Flügelstaub."
        es:
          omega_ruby: "En el mundo existen Vivillon con diferentes motivos en sus\nalas. El clima de cada región influye en sus rasgos."
          alpha_sapphire: "Las alas cambian de motivo según el clima y las características\nnaturales del terreno que habite. Esparce escamas de lo más\ncoloridas."
        ko:
          omega_ruby: "세계에는 다양한 무늬의 날개를 가진\n비비용이 있다. 살고 있는 곳의\n기후에 영향을 받는 것 같다."
          alpha_sapphire: "살고 있는 장소의 기후나 풍토에 따라\n날개의 모양이 다른 포켓몬이다.\n화려한 색의 날개 가루를 뿌린다."
