      descriptions:
        jp_kana:
          omega_ruby: "からだを　うごかすたびに　きんにくが\nのびちぢみして　でんきが　うまれる。\nピンチになると　からだが　かがやく。"
          alpha_sapphire: "きけんを　かんじると　ぜんしんの\nたいもうが　ひかる。あいてが　めを\nくらませている　あいだに　にげる。"
        jp_kanji:
          omega_ruby: "体を　動かすたびに　筋肉が\n伸び縮みして　電気が　生まれる。\nピンチになると　体が　輝く。"
          alpha_sapphire: "危険を　感じると　全身の\n体毛が　光る。相手が　目を\nくらませている　あいだに　逃げる。"
        en:
          omega_ruby: "The extension and contraction of its muscles\ngenerates electricity. It glows when in trouble."
          alpha_sapphire: "All of its fur dazzles if danger is sensed. It flees\nwhile the foe is momentarily blinded."
        fr:
          omega_ruby: "Ses muscles génèrent un courant électrique lorsqu’ils\ntravaillent. Il s’illumine en cas de danger."
          alpha_sapphire: "Sa fourrure étincelle en cas de danger. Il profite du fait que\nl’ennemi est aveuglé pour s’enfuir."
        it:
          omega_ruby: "Produce elettricità contraendo e rilassando i muscoli.\nQuando si sente minacciato si illumina."
          alpha_sapphire: "In caso di pericolo, la sua pelliccia si illumina. Il nemico rimane\naccecato e lui ne approfitta per fuggire."
        de:
          omega_ruby: "Es erzeugt Elektrizität durch das Strecken und\nZusammenziehen seiner Muskeln. Bei Bedrohung glüht es."
          alpha_sapphire: "In Gefahr blendet es seinen Gegner mit seinem Fell und flieht,\nwährend der Gegner einen Moment blind ist."
        es:
          omega_ruby: "La extensión y contracción de sus músculos genera\nelectricidad. Brilla cuando está en peligro."
          alpha_sapphire: "Si siente peligro, todo su pelaje brilla. Aprovecha la ceguera\ntemporal de su rival para huir."
        ko:
          omega_ruby: "몸을 움직일 때마다 근육이 늘어났다\n줄어들었다 하여 전기가 발생한다.\n궁지에 몰리면 몸이 빛난다."
          alpha_sapphire: "위험을 느끼면 전신의 털이\n빛난다. 그로 인해 상대가 앞을\n보지 못하는 동안 도망친다."
luxio:
