          alpha_sapphire: "おこった　ひょうじょうの　めだま　もようが\nかなしそうに　たれさがっている　ときは\nゆうだちの　ふりだす　ぜんちょうと　いわれる。"
        jp_kanji:
          omega_ruby: "触角の　目玉　模様　で　敵を　威嚇。\n４枚の　羽を　使い　ヘリコプターの　ように\n空中で　前後左右　自由に　進める。"
          alpha_sapphire: "怒った　表情の　目玉　模様が\n悲しそうに　垂れ下がっている　ときは\n夕立ちの　降り出す　前兆と　いわれる。"
        en:
          omega_ruby: "Masquerain intimidates enemies with the eyelike patterns\non its antennas. This Pokémon flaps its four wings to freely fly\nin any direction—even sideways and backwards—as if it were\na helicopter."
          alpha_sapphire: "Masquerain’s antennas have eyelike patterns that usually\ngive it an angry look. If the “eyes” are droopy and appear sad,\nit is said to be a sign that a heavy rainfall is on its way."
        fr:
          omega_ruby: "Maskadra intimide ses ennemis grâce aux motifs en forme\nde regard sur ses antennes. En battant des ailes,\nce Pokémon peut voler librement dans toutes les directions,\nmême latéralement ou à reculons."
          alpha_sapphire: "Les antennes de Maskadra ont la forme de grands yeux\nqui lancent un regard malfaisant. Si ces « yeux » sont tristes,\ncela signifie qu’un déluge se prépare."
        it:
          omega_ruby: "Masquerain intimorisce i nemici con il motivo a forma\nd’occhio sulle antenne. Agita le quattro ali per volare libero\nin ogni direzione, anche lateralmente e posteriormente,\ncome fosse un elicottero."
          alpha_sapphire: "Le antenne di Masquerain presentano un motivo\na forma d’occhio che gli conferisce un aspetto aggressivo.\nQuando questi motivi simili a occhi hanno un aspetto triste\ne depresso significa che si sta avvicinando un acquazzone."
        de:
          omega_ruby: "Maskeregen schüchtert seine Feinde mit den augenähnlichen\nMustern auf seinen Antennen ein. Dieses Pokémon kann mit\nseinen vier Flügeln wie ein Hubschrauber in jede Richtung\nfliegen, sogar seitwärts und rückwärts."
          alpha_sapphire: "Maskeregens Antennen haben ein augenähnliches Muster,\ndas ihm ein furchterregendes Äußeres verleiht. Wenn seine\n„Augen“ traurig aussehen, ist ein heftiger Regenguss im Anzug."
        es:
          omega_ruby: "Masquerain intimida a sus enemigos con los ojos que tiene\ndibujados en las antenas. Este Pokémon bate las cuatro alas\nque tiene para volar libremente en cualquier dirección, hasta\nde lado y hacia atrás, como un helicóptero."
          alpha_sapphire: "Masquerain tiene unas antenas con ojos dibujados que le dan\naspecto de estar enfadado. Si tiene los “ojos” medio cerrados\ny con aspecto triste, es probable que esté a punto de caer\nun buen aguacero."
        ko:
          omega_ruby: "더듬이의 눈알 무늬로 적을 위협한다.\n4개의 날개를 사용하여 헬리콥터처럼\n공중에서 전후좌우로 자유롭게 나아간다."
          alpha_sapphire: "화난 표정의 눈알 무늬가\n슬픈 듯이 처져 있을 때는\n소나기가 내릴 전조라고 전해진다."
shroomish:
  species_id: 285
  names:
    jp_kana: キノココ
    jp_kanji: キノココ
    en: Shroomish
    fr: Balignon
    it: Shroomish
    de: Knilz
    es: Shroomish
    ko: 버섯꼬
  forms:
    shroomish:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 60
        special_attack: 40
        special_defense: 60
