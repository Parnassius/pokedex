      descriptions:
        jp_kana:
          omega_ruby: "２つに　ぶんれつした　のうみそを\nもっているため　いきなり　ちがう\nこうどうを　とることが　あるのだ。"
          alpha_sapphire: "ぶんれつした　２つの　のうみそで\nおなじことを　かんがえると　だせる\nサイコパワーは　さいこうと　なる。"
        jp_kanji:
          omega_ruby: "２つに　分裂した　脳みそを\n持っているため　いきなり　違う\n行動を　とることが　あるのだ。"
          alpha_sapphire: "分裂した　２つの　脳みそで\n同じことを　考えると　だせる\nサイコパワーは　最高と　なる。"
        en:
          omega_ruby: "Since they have two divided brains, at times they\nsuddenly try to take two different actions at once."
          alpha_sapphire: "When their two divided brains think the same\nthoughts, their psychic power is maximized."
        fr:
          omega_ruby: "Il possède deux cerveaux séparés qui le font parfois agir\nde façon totalement incohérente."
          alpha_sapphire: "Il dégage le maximum de sa puissance psychique quand\nses deux cerveaux réfléchissent à la même chose."
        it:
          omega_ruby: "Poiché ha due cervelli separati e indipendenti, può capitare\nche si comporti in modo del tutto incoerente."
          alpha_sapphire: "I suoi poteri psichici sono al massimo quando le due parti\nin cui è diviso il suo cervello pensano la stessa cosa."
        de:
          omega_ruby: "Wegen seines gespaltenen Denkapparates kann es\nvorkommen, dass es sich abrupt einer anderen Tätigkeit\nzuwendet."
          alpha_sapphire: "Wenn beide Hälften seines gespaltenen Denkapparates an\ndasselbe denken, sind seine Psycho-Kräfte am stärksten."
        es:
          omega_ruby: "Dado que su cerebro está dividido en dos, a veces tiene\nconflictos a la hora de decidir qué hacer."
          alpha_sapphire: "Cuando las dos partes de su cerebro piensan lo mismo, saca\ntodo su poder a relucir."
        ko:
          omega_ruby: "둘로 분열된 뇌를\n가지고 있어서 갑자기 다른\n행동을 취할 때가 있다."
          alpha_sapphire: "분열한 2개의 뇌로\n같은 생각을 하면 낼 수 있는\n사이코 파워는 최고가 된다."
reuniclus:
  species_id: 579
  names:
    jp_kana: ランクルス
    jp_kanji: ランクルス
    en: Reuniclus
    fr: Symbios
