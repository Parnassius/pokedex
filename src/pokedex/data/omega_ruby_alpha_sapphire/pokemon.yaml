          omega_ruby: "あたまの　はなかざりの　かおりには\nリラックスさせる　こうかが　ある。\nていれを　なまけると　かれてしまう。"
          alpha_sapphire: "うつくしい　はなを　さかせるのは\nベテラントレーナーでも　むずかしい。\nセレブに　にんきの　ポケモン。"
        jp_kanji:
          omega_ruby: "頭の　花飾りの　香りには\nリラックスさせる　効果が　ある。\n手入れを　怠けると　枯れてしまう。"
          alpha_sapphire: "美しい　花を　咲かせるのは\nベテラントレーナーでも　難しい。\nセレブに　人気の　ポケモン。"
        en:
          omega_ruby: "The fragrance of the garland on its head has a\nrelaxing effect. It withers if a Trainer does not take\ngood care of it."
          alpha_sapphire: "Even veteran Trainers face a challenge in getting its\nbeautiful flower to bloom. This Pokémon is popular\nwith celebrities."
        fr:
          omega_ruby: "La fleur sur sa tête a des propriétés relaxantes. Elle se fane\nsi on ne s’en occupe pas avec attention."
          alpha_sapphire: "Même les Dresseurs confirmés ont du mal à faire éclore\nsa belle fleur. Un Pokémon apprécié des célébrités."
        it:
          omega_ruby: "I fiori che ha sulla testa spandono un profumo rilassante,\nma necessitano di continue attenzioni per non appassire."
          alpha_sapphire: "Neanche gli Allenatori più navigati riescono sempre a fare\nschiudere il suo fiore. Va di moda fra le celebrità."
        de:
          omega_ruby: "Der Duft des Blumenschmucks auf seinem Kopf wirkt\nberuhigend. Damit der Schmuck nicht verwelkt, muss man\nes gut pflegen."
          alpha_sapphire: "Bei Promis ist es sehr beliebt. Auch gestandene Trainer tun\nsich schwer damit, seine Blüte schön aufblühen zu lassen."
        es:
          omega_ruby: "El aroma de la flor de su tocado relaja a cualquiera a su\nalrededor. Hay que cuidarle mucho para que no se marchite."
          alpha_sapphire: "Todos los famosos quieren uno de estos Pokémon. Incluso\na los Entrenadores más curtidos les cuesta que florezca."
        ko:
          omega_ruby: "머리에 있는 꽃 장식의 향기에는\n긴장을 풀어 주는 효과가 있다.\n자주 손질하지 않으면 시들어 버린다."
          alpha_sapphire: "베테랑 트레이너일지라도\n아름다운 꽃을 피우기는 쉽지 않다.\n유명 인사에게 인기가 많은 포켓몬이다."
