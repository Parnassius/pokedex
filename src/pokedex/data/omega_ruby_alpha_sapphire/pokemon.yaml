        jp_kanji:
          omega_ruby: "花畑を　飛び回り　枯れかけた　花を\n世話する。花の　秘められた　力を\n引き出して　戦う。"
          alpha_sapphire: "手入れの　行き届いた　花壇の\n花が　咲くと　姿を　現して\nかれんな　ダンスで　祝福する。"
        en:
          omega_ruby: "It flutters around fields of flowers and cares for\nflowers that are starting to wilt. It draws\nout the hidden power of flowers to battle."
          alpha_sapphire: "When the flowers of a well-tended flower bed bloom,\nit appears and celebrates with an elegant dance."
        fr:
          omega_ruby: "Il survole les champs de fleurs, et prend soin de celles\nqui sont sur le point de faner. Au combat, il fait appel\nà leur force cachée."
          alpha_sapphire: "Quand les fleurs d’une plate-bande bien soignée éclosent,\nil apparaît et célèbre la floraison en dansant avec une très\ngrande élégance."
        it:
          omega_ruby: "Vola sui campi in fiore e si prende cura delle piante che si\nstanno seccando. Lotta sfruttando i poteri nascosti dei fiori."
          alpha_sapphire: "Quando i fiori di un’aiuola ben curata sbocciano, appare\ne celebra l’evento con una danza graziosa."
        de:
          omega_ruby: "Es fliegt auf Wiesen umher und kümmert sich um welkende\nBlumen. Es setzt deren geheime Kräfte frei und nutzt diese\nzum Kämpfen."
          alpha_sapphire: "Wenn die Blumen auf einem liebevoll gepflegten\nBlumenbeet blühen, erscheint es und feiert den\nAnblick mit einem eleganten Tanz."
        es:
          omega_ruby: "Revolotea alrededor de campos de flores y cuida de aquellas\nque empiezan a marchitarse. Usa en combate el poder oculto\nde las flores."
          alpha_sapphire: "Cuando las plantas bien cuidadas de un parterre florecen,\nhace acto de presencia e interpreta un baile primoroso para\ncelebrarlo."
        ko:
          omega_ruby: "꽃밭을 날아다니며 말라가는\n꽃을 보살핀다. 꽃의 숨겨진\n힘을 끌어내어 싸운다."
          alpha_sapphire: "빈틈없이 손질한 화단의\n꽃이 피면 모습을 드러내어\n아름다운 댄스로 축복한다."
