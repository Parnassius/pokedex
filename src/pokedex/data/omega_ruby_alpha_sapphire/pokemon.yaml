          alpha_sapphire: "Auf Nahrungssuche schnüffelt Quiekel am Boden entlang.\nSeine Lieblingsspeise ist ein Pilz, der unter abgestorbenem\nGras wächst. Manchmal spürt dieses Pokémon heiße Quellen\nauf."
