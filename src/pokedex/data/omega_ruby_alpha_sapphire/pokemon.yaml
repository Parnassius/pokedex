        jp_kana:
          omega_ruby: "ぐんぐん　のびる　ベロを　なんにでも\nまきつける。うかつに　ちかよると\nだえきで　べとべとに　されてしまう。"
          alpha_sapphire: "だえきには　どんな　ものも　とかす\nせいぶんが　たっぷり　ふくまれており\nなめられると　いつまでも　しびれる。"
        jp_kanji:
          omega_ruby: "ぐんぐん　伸びる　ベロを　なんにでも\n巻きつける。うかつに　近寄ると\nだえきで　べとべとに　されてしまう。"
          alpha_sapphire: "だえきには　どんな　物も　溶かす\n成分が　たっぷり　含まれており\nなめられると　いつまでも　しびれる。"
        en:
          omega_ruby: "It wraps things with its extensible tongue. Getting\ntoo close to it will leave you soaked with drool."
          alpha_sapphire: "Their saliva contains lots of components that can\ndissolve anything. The numbness caused by their\nlick does not dissipate."
        fr:
          omega_ruby: "Il enroule tout dans sa langue extensible. Ceux qui\nl’approchent finissent couverts de bave."
          alpha_sapphire: "Sa bave anesthésiante est chargée d’une substance\ncapable de faire fondre n’importe quelle matière."
        it:
          omega_ruby: "Avvolge ogni cosa con la sua lingua allungabile. Chi si avvicina\ntroppo, si ritroverà tutto bagnato di bava."
          alpha_sapphire: "La sua saliva contiene una sostanza che scioglie qualsiasi cosa\ne causa la paralisi se si viene leccati."
        de:
          omega_ruby: "Es umklammert Dinge mit seiner dehnbaren Zunge.\nKommt man ihm zu nahe, wird man eingespeichelt."
          alpha_sapphire: "Ihr Speichel enthält eine ätzende Substanz, die bei Kontakt\nmit der Haut anhaltende Taubheit erzeugt."
        es:
          omega_ruby: "Agarra cosas con su lengua extensible. Si te acercas mucho,\nte deja lleno de babas."
          alpha_sapphire: "La alta concentración de sustancias en su saliva lo disuelve\ntodo. Un lametón provoca un entumecimiento permanente."
        ko:
          omega_ruby: "쭉쭉 늘어나는 혓바닥으로 무엇이든\n휘감는다. 함부로 다가가면\n타액으로 끈적끈적거리게 된다."
          alpha_sapphire: "타액에는 어떤 것도 녹이는\n성분이 충분히 포함되어 있어\n핥으면 언제까지나 마비된다."
rhyperior:
