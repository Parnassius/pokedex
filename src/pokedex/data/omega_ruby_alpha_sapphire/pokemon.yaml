        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - honey_gather
      hidden_ability: hustle
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          omega_ruby: "うまれたときから　３びき　いっしょ。\nビークインに　よろこんでもらうため\nいつも　はなのミツを　あつめている。"
          alpha_sapphire: "あつめた　ミツを　すみかに　はこぶ。\nよるには　たくさんの　ミツハニーが\nかさなって　はちのすになり　ねむる。"
        jp_kanji:
          omega_ruby: "生まれたときから　３匹　一緒。\nビークインに　喜んでもらうため\nいつも　花のミツを　集めている。"
          alpha_sapphire: "集めた　ミツを　住処に　運ぶ。\n夜には　たくさんの　ミツハニーが\n重なって　ハチの巣になり　眠る。"
        en:
          omega_ruby: "The trio is together from birth. It constantly gathers\nhoney from flowers to please Vespiquen."
          alpha_sapphire: "It collects and delivers honey to its colony.\nAt night, they cluster to form a beehive and sleep."
        fr:
          omega_ruby: "Ce trio inséparable depuis la naissance récolte du miel\npour satisfaire Apireine."
          alpha_sapphire: "Il récolte le nectar et l’amène à la colonie. La nuit,\nles Pokémon de cette espèce s’assemblent pour bâtir\nune ruche et s’endormir."
        it:
          omega_ruby: "Il trio è insieme dalla nascita. È sempre impegnato a portare\nil nettare dei fiori a Vespiquen."
          alpha_sapphire: "Porta il nettare raccolto dai suoi simili. Di notte si riuniscono\nper formare un alveare e dormire."
        de:
          omega_ruby: "Dieses Trio ist von Geburt an zusammen. Fleißig bringt es\nBlütenhonig zu Honweisel."
          alpha_sapphire: "Es sammelt Honig und bringt ihn in seine Kolonie.\nNachts bilden sie einen Bienenstock und schlafen."
        es:
          omega_ruby: "El trío se forma al nacer y se pasa la vida recogiendo miel de\nlas flores para satisfacer a Vespiquen."
          alpha_sapphire: "Almacenan miel en su colonia. Por la noche, se apiñan para\nformar una colmena y dormir."
        ko:
          omega_ruby: "태어났을 때부터 3마리가 함께한다.\n비퀸을 기쁘게 하기 위해\n항상 꽃의 꿀을 모으고 있다."
          alpha_sapphire: "모은 꿀을 거처로 운반한다.\n밤에는 많은 세꿀버리가\n겹쳐져 벌집이 되어 잠잔다."
