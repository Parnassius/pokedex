      descriptions:
        jp_kana:
          omega_ruby: "おおごえの　しんどうで　じしんを　おこす。\nからだの　あなから　くうきを　はげしく　すいこみ\nはじめたら　おおごえを　だす　まえぶれだ。"
          alpha_sapphire: "からだの　あなから　ふえの　ような　おとを\nだして　なかまに　きもちを　つたえている。\nおおごえは　たたかう　ときしか　ださないのだ。"
        jp_kanji:
          omega_ruby: "大声の　振動で　地震を　起こす。\n体の　穴から　空気を　激しく　吸い込み\n始めたら　大声を　出す　前触れだ。"
          alpha_sapphire: "体の　穴から　笛の　ような　音を\n出して　仲間に　気持ちを　伝えている。\n大声は　戦う　ときしか　出さないのだ。"
        en:
          omega_ruby: "Exploud triggers earthquakes with the tremors it creates\nby bellowing. If this Pokémon violently inhales from the\nports on its body, it’s a sign that it is preparing to let loose\na huge bellow."
          alpha_sapphire: "Exploud communicates its feelings to the others by emitting\nwhistle-like sounds from the tubes on its body. This Pokémon\nonly raises its voice when it is in battle."
        fr:
          omega_ruby: "Brouhabam peut déclencher des tremblements de terre\ngrâce aux vibrations de son hurlement. Lorsque ce Pokémon\ninspire fortement, cela signifie qu’il se prépare à pousser\nun gigantesque rugissement."
          alpha_sapphire: "Brouhabam communique avec les autres en émettant\nun sifflement qui provient des tubes de son corps.\nCe Pokémon n’élève la voix que pendant les combats."
        it:
          omega_ruby: "Exploud è in grado di generare terremoti con le vibrazioni\nvocali. Quando inala grandi quantità d’aria dalle numerose\naperture del corpo, significa che si sta preparando a emettere\nun grido lancinante."
          alpha_sapphire: "Exploud comunica le sue sensazioni emettendo\ndei fischi dai canali tubolari del suo corpo.\nQuesto Pokémon alza la voce soltanto nella lotta."
        de:
          omega_ruby: "Krawumms kann durch sein Brüllen Erdbeben auslösen.\nWenn dieses Pokémon durch seine Körperöffnungen kräftig\neinatmet, ist es kurz davor, ein mächtiges Brüllen von sich\nzu geben."
          alpha_sapphire: "Krawumms vermittelt seinen Artgenossen seine Gefühle,\nindem es eine Art Pfeifen durch die Röhren an seinem Körper\nvon sich gibt. Dieses Pokémon erhebt nur im Kampf seine\nStimme."
        es:
          omega_ruby: "Exploud provoca terremotos con el temblor que causa al\nlevantar la voz. Cuando inhala aire por los tubos, hay que\nprestar atención, ya que está a punto de soltar un buen\nbramido."
          alpha_sapphire: "Exploud expresa sus sentimientos a los otros emitiendo una\nespecie de silbidos a través de los tubos que tiene. Este\nPokémon solo levanta la voz cuando está en combate."
        ko:
          omega_ruby: "큰 소리의 진동으로 지진을 일으킨다.\n몸에 난 구멍으로 공기를 세차게 빨아들이기\n시작하면 큰 소리를 낼 조짐이다."
          alpha_sapphire: "몸의 구멍에서 피리 같은 소리를\n내서 동료에게 기분을 전달하고 있다.\n큰 소리는 싸울 때만 낸다."
makuhita:
  species_id: 296
  names:
    jp_kana: マクノシタ
    jp_kanji: マクノシタ
    en: Makuhita
    fr: Makuhita
    it: Makuhita
    de: Makuhita
    es: Makuhita
    ko: 마크탕
  forms:
