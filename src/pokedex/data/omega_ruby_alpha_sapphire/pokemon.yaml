spritzee:
  species_id: 682
  names:
    jp_kana: シュシュプ
    jp_kanji: シュシュプ
    en: Spritzee
    fr: Fluvetin
    it: Spritzee
    de: Parfi
    es: Spritzee
    ko: 슈쁘
  forms:
    spritzee:
      form_id: 0
      base_stats:
        hp: 78
        attack: 52
        defense: 60
        special_attack: 63
        special_defense: 65
        speed: 23
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - healer
      hidden_ability: aroma_veil
      descriptions:
        jp_kana:
          omega_ruby: "かいだ　ものを　うっとりさせる\nかおりを　からだから　ただよわせる。\nたべた　もので　かおりが　かわる。"
          alpha_sapphire: "むかしの　きふじんたちは　こうすいの\nかわりに　このみの　かおりを　だす\nシュシュプを　つれていた。"
        jp_kanji:
          omega_ruby: "かいだ　者を　うっとりさせる\n香りを　体から　漂わせる。\n食べた　もので　香りが　変わる。"
          alpha_sapphire: "昔の　貴婦人たちは　香水の　かわりに\n好みの　香りを　出す\nシュシュプを　連れていたという。"
        en:
          omega_ruby: "It emits a scent that enraptures those\nwho smell it. This fragrance changes\ndepending on what it has eaten."
          alpha_sapphire: "In the past, rather than using perfume,\nroyal ladies carried a Spritzee\nthat would waft a fragrance they liked."
        fr:
          omega_ruby: "Son corps dégage un parfum qui envoûte ceux qui le respirent\net change en fonction de son alimentation."
          alpha_sapphire: "Par le passé, les femmes de la noblesse ne se parfumaient\npas, mais étaient accompagnées d’un Fluvetin exhalant\nleur parfum favori."
        it:
          omega_ruby: "Il suo corpo emette un profumo che inebria chi lo annusa.\nLa fragranza cambia in base a ciò che mangia."
          alpha_sapphire: "Si dice che nell’antichità, al posto del profumo, le nobildonne\nportassero sempre con loro questo Pokémon, che diffondeva\nla loro fragranza preferita."
        de:
          omega_ruby: "Der von ihm verströmte Duft verzückt jeden, der ihn riecht.\nJe nachdem, was es frisst, ändert sich sein Duft."
          alpha_sapphire: "In der Vergangenheit hatten vornehme Damen, anstatt Parfüm\nzu benutzen, immer ein Parfi dabei, das ihren Lieblingsduft\nverströmte."
        es:
          omega_ruby: "Su cuerpo emana una fragancia que embelesa a quien la\nhuele. La fragancia es diferente según los alimentos que\ningiere."
          alpha_sapphire: "Antaño, las damas de la nobleza llevaban un Spritzee consigo\nque desprendía su aroma preferido, en vez de utilizar un\nperfume convencional."
        ko:
          omega_ruby: "냄새를 맡은 자를 황홀하게 만드는\n향기를 몸에서 풍긴다.\n먹은 먹이에 따라 향기가 달라진다."
          alpha_sapphire: "옛 귀부인들은 향수 대신에\n좋아하는 향을 내는\n슈쁘를 데리고 다녔다."
aromatisse:
  species_id: 683
  names:
    jp_kana: フレフワン
    jp_kanji: フレフワン
    en: Aromatisse
    fr: Cocotine
    it: Aromatisse
    de: Parfinesse
    es: Aromatisse
    ko: 프레프티르
  forms:
    aromatisse:
      form_id: 0
      base_stats:
        hp: 101
        attack: 72
        defense: 72
        special_attack: 99
        special_defense: 89
        speed: 29
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - healer
      hidden_ability: aroma_veil
      descriptions:
        jp_kana:
          omega_ruby: "さまざまな　においを　つくりだす。\nあいての　いやがる　においを　だして\nたたかいを　ゆうりに　すすめるのだ。"
          alpha_sapphire: "においが　つよすぎるため\nよほど　すきな　トレーナーでなければ\nつれて　あるくのは　キツイのだ。"
        jp_kanji:
          omega_ruby: "さまざまな　においを　作り出す。\n相手の　嫌がる　においを　出して\n戦いを　有利に　進めるのだ。"
          alpha_sapphire: "においが　強すぎるため\nよほど　好きな　トレーナーでなければ\n連れて　歩くのは　キツイのだ。"
        en:
          omega_ruby: "It devises various scents, pleasant and unpleasant,\nand emits scents that its enemies dislike in order\nto gain an edge in battle."
          alpha_sapphire: "Its scent is so overpowering that, unless a Trainer\nhappens to really enjoy the smell, he or she will\nhave a hard time walking alongside it."
        fr:
          omega_ruby: "Ce Pokémon est capable d’émettre toutes sortes d’odeurs\npour incommoder son adversaire et augmenter ses chances\nde gagner."
          alpha_sapphire: "Son parfum est tellement capiteux qu’un Dresseur n’appréciant\npas pleinement son odeur aura toutes les difficultés du monde\nà cheminer à ses côtés."
        it:
          omega_ruby: "È in grado di emanare profumi di diversi tipi. Durante la lotta,\nmette in difficoltà i nemici emettendo odori sgradevoli."
          alpha_sapphire: "Emette un profumo intensissimo. Se un Allenatore non è un\nassoluto estimatore di quel particolare aroma, avrà grosse\ndifficoltà anche solo a stargli vicino."
        de:
          omega_ruby: "Es produziert verschiedene Düfte. Im Kampf verschafft es sich\neinen Vorteil, indem es einen Duft verströmt, der dem Gegner\nzuwider ist."
          alpha_sapphire: "Sein Duft ist so stark, dass es für einen Trainer, der seinen\nDuft nicht mag, schwer ist, es an seiner Seite zu haben."
        es:
          omega_ruby: "Puede producir multitud de olores diferentes y, en combate,\nsecreta los que le resultan molestos al enemigo para así\ncontar con cierta ventaja."
          alpha_sapphire: "La fragancia que despide es tan potente que solo podría\ncaminar a su lado un Entrenador que tenga especial\npredilección por ese aroma."
        ko:
          omega_ruby: "여러 가지 향기를 만들어 낸다.\n상대가 싫어하는 냄새를 내보내\n싸움을 유리하게 이끌어 나간다."
          alpha_sapphire: "향기가 지나치게 강하기 때문에\n어지간히 좋아하는 트레이너가 아니면\n데리고 다니기 힘들다."
swirlix:
  species_id: 684
  names:
    jp_kana: ペロッパフ
    jp_kanji: ペロッパフ
    en: Swirlix
    fr: Sucroquin
    it: Swirlix
    de: Flauschling
    es: Swirlix
    ko: 나룸퍼프
  forms:
    swirlix:
      form_id: 0
      base_stats:
        hp: 62
        attack: 48
        defense: 66
        special_attack: 59
        special_defense: 57
        speed: 49
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - sweet_veil
      hidden_ability: unburden
      descriptions:
        jp_kana:
          omega_ruby: "わたあめのような　あまくて　ベタつく\nしろい　いとを　だして　あいてを\nからめとり　うごきを　ふうじる。"
          alpha_sapphire: "あまいもの　ばかりを　たべているので\nたいもうが　わたあめのように\nあまく　ベタベタしている。"
        jp_kanji:
          omega_ruby: "わたあめのような　甘くて　ベタつく\n白い　糸を　出して\n相手を　絡め取り　動きを　封じる。"
          alpha_sapphire: "甘いもの　ばかりを　食べているので\n体毛が　わたあめのように\n甘く　ベタベタしている。"
        en:
          omega_ruby: "To entangle its opponents in battle, it extrudes\nwhite threads as sweet and sticky as cotton candy."
          alpha_sapphire: "Because it eats nothing but sweets,\nits fur is as sticky sweet as cotton candy."
        fr:
          omega_ruby: "Il immobilise son adversaire à l’aide de filaments blancs,\nsucrés et collants qui ressemblent à de la barbe à papa."
          alpha_sapphire: "Il se gave de sucreries à longueur de journée, à tel point\nque sa fourrure finit par ressembler à de la barbe à papa,\nsucrée et poisseuse."
        it:
          omega_ruby: "Immobilizza il nemico avvolgendolo in filamenti bianchi, dolci\ne appiccicosi, simili a zucchero filato."
          alpha_sapphire: "Poiché mangia solo cose dolci, il suo pelo ha la consistenza\ne il sapore dello zucchero filato."
        de:
          omega_ruby: "Es stößt weiße Fäden aus, die so süß und klebrig wie\nZuckerwatte sind. Mit ihnen umwickelt es den Gegner\nund hindert ihn daran, sich zu bewegen."
          alpha_sapphire: "Es frisst nur Süßigkeiten, weshalb sein Fell so süß und klebrig\nwie Zuckerwatte ist."
        es:
          omega_ruby: "Escupe hebras pegajosas de color blanco y textura parecida a\nla del algodón de azúcar, con las que envuelve al enemigo y\nle impide que se mueva."
          alpha_sapphire: "Como se alimenta exclusivamente de dulces, su pelaje es tan\npegajoso y dulzón como el algodón de azúcar."
        ko:
          omega_ruby: "솜사탕 같은 달고 끈적끈적한\n하얀 실을 내뿜어 상대를\n휘감고 움직이지 못하게 한다."
          alpha_sapphire: "달콤한 것만 먹기 때문에\n몸의 털이 솜사탕처럼\n달고 끈적끈적하다."
slurpuff:
  species_id: 685
  names:
    jp_kana: ペロリーム
    jp_kanji: ペロリーム
    en: Slurpuff
