    fraxure:
      form_id: 0
      base_stats:
        hp: 66
        attack: 117
        defense: 70
        special_attack: 40
        special_defense: 50
        speed: 67
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - monster
        - dragon
