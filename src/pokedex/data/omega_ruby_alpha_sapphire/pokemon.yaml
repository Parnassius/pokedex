      abilities:
        - shed_skin
      hidden_ability: overcoat
      descriptions:
        jp_kana:
          omega_ruby: "つめたい　こがらしを　ふせぐため\nこえだや　おちばを　ざいりょうに\nミノを　つくり　からだを　おおう。"
          alpha_sapphire: "たたかいで　ミノが　こわれてしまうと\nちかくにある　ざいりょうで\nミノを　すぐに　つくりなおす。"
        jp_kanji:
          omega_ruby: "冷たい　木枯らしを　防ぐため\n小枝や　落ち葉を　材料に\nミノを　作り　体を　覆う。"
          alpha_sapphire: "戦いで　ミノが　壊れてしまうと\n近くにある　材料で\nミノを　すぐに　作り直す。"
        en:
          omega_ruby: "To shelter itself from cold, wintry winds, it covers\nitself with a cloak made of twigs and leaves."
          alpha_sapphire: "If its cloak is broken in battle, it quickly remakes\nthe cloak with materials nearby."
        fr:
          omega_ruby: "Pour se protéger des vents glacés de l’hiver, il s’est tissé\nune cape de feuilles et de brindilles."
          alpha_sapphire: "S’il perd sa cape au combat, il en tisse rapidement\nune nouvelle avec ce qui lui tombe sous la main."
        it:
          omega_ruby: "Per ripararsi dal freddo e dai venti invernali si copre con un\nmanto fatto di rami e foglie."
          alpha_sapphire: "Se il suo manto si rompe mentre lotta, lo rifà velocemente con\nciò che trova attorno a sé."
        de:
          omega_ruby: "Um sich vor dem eisigen Winterwind zu schützen, legt es sich\nunter einen Umhang aus Ästen und Laub."
          alpha_sapphire: "Wird sein Umhang im Kampf zerstört, macht es sich schnell\naus dem, was es findet, einen neuen."
        es:
          omega_ruby: "Para protegerse de los vientos fríos invernales, se cubre con\nun caparazón de ramas y hojas."
          alpha_sapphire: "Si su caparazón se rompe en combate, lo rehace rápidamente\ncon lo que tenga a mano."
        ko:
          omega_ruby: "차가운 초겨울 바람을 막으려고\n작은 가지나 낙엽을 재료로\n도롱이를 만들어 몸을 감싼다."
          alpha_sapphire: "싸움으로 도롱이가 부서져 버리면\n가까이 있는 재료로\n도롱이를 바로 만들어 고친다."
