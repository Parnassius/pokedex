weavile:
  species_id: 461
  names:
    jp_kana: マニューラ
    jp_kanji: マニューラ
    en: Weavile
    fr: Dimoret
    it: Weavile
    de: Snibunna
    es: Weavile
    ko: 포푸니라
  forms:
    weavile:
      form_id: 0
      base_stats:
        hp: 70
        attack: 120
        defense: 65
        special_attack: 45
        special_defense: 85
        speed: 125
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - ice
      egg_groups:
        - field
      abilities:
        - pressure
      hidden_ability: pickpocket
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          omega_ruby: "ゆきの　おおい　ちほうに　せいそく。\nじゅもくに　ツメで　サインを　えがき\nなかまに　あいずを　おくる。"
          alpha_sapphire: "さむい　ちいきで　くらす　ポケモン。\n４、５ひきの　グループは　みごとな\nれんけいで　えものを　おいつめる。"
        jp_kanji:
          omega_ruby: "雪の　多い　地方に　生息。\n樹木に　ツメで　サインを　描き\n仲間に　合図を　送る。"
          alpha_sapphire: "寒い　地域で　暮らす　ポケモン。\n４、５匹の　グループは　見事な\n連係で　獲物を　追いつめる。"
        en:
          omega_ruby: "It lives in snowy regions. It carves patterns in trees\nwith its claws as a signal to others."
          alpha_sapphire: "They live in cold regions, forming groups of four or\nfive that hunt prey with impressive coordination."
        fr:
          omega_ruby: "Il vit dans les régions enneigées, et communique avec\nses pairs en gravant des motifs sur les arbres."
          alpha_sapphire: "Ils vivent par groupe de quatre ou cinq en région froide et\nchassent de façon très organisée."
        it:
          omega_ruby: "Il suo habitat sono le grandi aree innevate. Con gli artigli,\nincide sui tronchi segnali per i suoi simili."
          alpha_sapphire: "Questi Pokémon vivono in zone fredde in gruppi di quattro\no cinque. Insieme sono cacciatori abilissimi."
        de:
          omega_ruby: "Es lebt in schneereichen Gebieten. Snibunna senden einander\nSignale, indem sie Zeichen in Rinde ritzen."
          alpha_sapphire: "Es lebt in kalten Gebieten in Gruppen von vier oder\nfünf Pokémon, die bei der Jagd großes Geschick zeigen."
        es:
          omega_ruby: "Vive en zonas nevadas. Deja marcas en los árboles con sus\ngarras para comunicarse con sus compañeros."
          alpha_sapphire: "Viven en zonas frías y forman grupos de cuatro o cinco para\ncazar con gran coordinación."
        ko:
          omega_ruby: "눈이 많은 지방에 서식한다.\n수목에 발톱으로 사인을 그려\n동료에게 신호를 보낸다."
          alpha_sapphire: "추운 지역에서 사는 포켓몬이다.\n4, 5마리의 그룹은 훌륭한\n연계 작전으로 먹이를 몰아넣는다."
magnezone:
  species_id: 462
  names:
    jp_kana: ジバコイル
    jp_kanji: ジバコイル
    en: Magnezone
    fr: Magnézone
    it: Magnezone
    de: Magnezone
    es: Magnezone
    ko: 자포코일
  forms:
    magnezone:
      form_id: 0
      base_stats:
        hp: 70
        attack: 70
        defense: 115
        special_attack: 130
        special_defense: 90
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - electric
        - steel
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: analytic
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          omega_ruby: "つよすぎる　じりょくを　だして\nジバコイルどうし　ひきよせあって\nまったく　うごけなくなったりする。"
          alpha_sapphire: "とくしゅな　じばの　えいきょうで\nレアコイルが　しんかした。３つの\nユニットから　じりょくを　だす。"
        jp_kanji:
          omega_ruby: "強すぎる　磁力を　だして\nジバコイル同士　引き寄せあって\nまったく　動けなくなったりする。"
          alpha_sapphire: "特殊な　磁場の　影響で\nレアコイルが　進化した。３つの\nユニットから　磁力を　出す。"
        en:
          omega_ruby: "Sometimes the magnetism emitted by Magnezone is\ntoo strong, making them attract each other so they\ncannot move."
          alpha_sapphire: "It evolved from exposure to a special magnetic\nfield. Three units generate magnetism."
        fr:
          omega_ruby: "Le champ magnétique qu’ils émettent est tel qu’ils ont\ntendance à s’attirer mutuellement et à s’empêcher de bouger."
          alpha_sapphire: "Il a évolué suite à son exposition à un champ magnétique\nspécial. Ses trois unités génèrent du magnétisme."
        it:
          omega_ruby: "A volte si attraggono l’un l’altro con la loro potentissima\ncarica magnetica e poi non riescono più a muoversi."
          alpha_sapphire: "Si è evoluto in seguito all’esposizione a uno speciale campo\nmagnetico. Tre unità generano magnetismo."
        de:
          omega_ruby: "Gelegentlich erzeugen sie so starke Magnetfelder, dass sie\nsich gegenseitig anziehen und einander immobilisieren."
          alpha_sapphire: "Es entwickelte sich, als es einem besonderen Magnetfeld\nausgesetzt wurde."
        es:
          omega_ruby: "Emiten campos magnéticos tan potentes que se atraen entre\nsí e incluso pueden llegar a inmovilizarse."
          alpha_sapphire: "Evolucionó por la exposición a un campo magnético especial.\nTres unidades generan magnetismo."
        ko:
          omega_ruby: "너무 강한 자력을 내어\n자포코일끼리 끌어당겨\n전혀 못 움직이기도 한다."
          alpha_sapphire: "특수한 자기장의 영향으로\n레어코일이 진화했다. 3개의\n유닛에서 자력을 발산한다."
lickilicky:
