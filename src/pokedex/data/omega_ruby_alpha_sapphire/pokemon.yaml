      descriptions:
        jp_kana:
          omega_ruby: "チョボマキから　うばった　カラで\nからだを　おおい　ガードしながら\n２ほんの　ヤリで　つついてくる。"
          alpha_sapphire: "チョボマキの　カラを　みにつけて\nしんかした　ポケモン。こうてつの\nよろいが　ぜんしんを　ガードする。"
        jp_kanji:
          omega_ruby: "チョボマキから　奪った　殻で\n体を　覆い　ガードしながら\n２本の　ヤリで　突いてくる。"
          alpha_sapphire: "チョボマキの　殻を　身につけて\n進化した　ポケモン。鋼鉄の　よろいが\n全身を　ガードする。"
        en:
          omega_ruby: "Wearing the shell covering they stole from Shelmet,\nthey defend themselves and attack with two lances."
          alpha_sapphire: "These Pokémon evolve by wearing the shell\ncovering of a Shelmet. The steel armor protects\ntheir whole body."
        fr:
          omega_ruby: "Ce Pokémon se protège avec la carapace dérobée à un\nEscargaume et attaque avec ses deux redoutables lances."
          alpha_sapphire: "Un Pokémon qui a évolué en portant la carapace\nd’un Escargaume. Une armure de fer protège tout\nson corps."
        it:
          omega_ruby: "Protegge il corpo con la conchiglia che ha rubato a Shelmet\nmentre spunzona il nemico con due lance."
          alpha_sapphire: "Pokémon che si è evoluto appropriandosi della conchiglia\ndi Shelmet. Un’armatura d’acciaio protegge tutto il suo corpo."
        de:
          omega_ruby: "Eine von einem Schnuthelm gestohlene Muschel dient ihm\nals Helm. Es greift Gegner mit seinen beiden Lanzen an."
          alpha_sapphire: "Es ist bei der Entwicklung in die Muschel eines Schnuthelm\ngeschlüpft. Die Eisenrüstung schützt seinen ganzen Körper."
        es:
          omega_ruby: "Se defienden de los ataques con el caparazón que roban a\nlos Shelmet. Atacan con sus dos mortíferas lanzas."
          alpha_sapphire: "Pokémon que evolucionó poniéndose el caparazón de\nShelmet. Su armazón de acero le protege todo el cuerpo."
        ko:
          omega_ruby: "쪼마리에게서 뺏은 껍질로\n몸을 에워싸 가드하면서\n2개의 창으로 찔러온다."
          alpha_sapphire: "쪼마리의 껍질을 입고\n진화한 포켓몬이다. 강철의\n갑옷이 전신을 보호한다."
foongus:
  species_id: 590
  names:
    jp_kana: タマゲタケ
    jp_kanji: タマゲタケ
