          omega_ruby: "いつも　あっち　こっちへ　ジグザグ　あるくのは\nこうきしんが　とても　つよくて　めに　うつる\nいろんな　ものに　きょうみを　もつからだ。"
          alpha_sapphire: "せなかの　かたい　けを　じゅもくに　こすりつけ\nじぶんの　なわばりで　ある　しるしを　つける。\nしんだ　ふりを　して　てきの　めを　ごまかすぞ。"
        jp_kanji:
          omega_ruby: "いつも　あっち　こっちへ　ジグザグ　歩くのは\n好奇心が　とても　強くて　目に　映る\n色んな　ものに　興味を　持つからだ。"
          alpha_sapphire: "背中の　硬い　毛を　樹木に　こすりつけ\n自分の　縄張りで　ある　印を　つける。\n死んだ　ふりを　して　敵の　目を　誤魔化すぞ。"
        en:
          omega_ruby: "Zigzagoon restlessly wanders everywhere at all times.\nThis Pokémon does so because it is very curious. It becomes\ninterested in anything that it happens to see."
          alpha_sapphire: "The hair on Zigzagoon’s back is bristly. It rubs the hard back\nhair against trees to leave its territorial markings. This Pokémon\nmay play dead to fool foes in battle."
        fr:
          omega_ruby: "Zigzaton se promène nerveusement un peu partout. En effet,\nce Pokémon est très curieux. Tout ce qu’il voit l’intéresse."
          alpha_sapphire: "Les poils sur le dos de Zigzaton sont durs. Il frotte son dos\ncontre les arbres pour marquer son territoire. Ce Pokémon\nfait parfois le mort pour tromper ses ennemis au combat."
        it:
          omega_ruby: "Zigzagoon scorrazza a destra e a manca senza sosta,\na causa della sua indole molto curiosa. Qualunque cosa\nveda riesce ad attirare la sua attenzione."
          alpha_sapphire: "La schiena di Zigzagoon è caratterizzata da una folta pelliccia\nrizzata. Per delimitare il suo territorio strofina il suo pelo irsuto\ncontro i tronchi degli alberi. Per confondere i nemici, in lotta\nsi finge morto."
        de:
          omega_ruby: "Zigzachs ist ein rastloser Wanderer. Dieses Pokémon\nist nämlich sehr neugierig und es inspiziert alles, was ihm\nzufällig begegnet."
          alpha_sapphire: "Das Haar auf Zigzachs’ Rücken ist struppig. Es reibt seine\nRückenborsten an Bäumen, um sein Revier zu markieren.\nDieses Pokémon stellt sich im Kampf schon einmal tot,\num seine Feinde reinzulegen."
        es:
          omega_ruby: "Zigzagoon está todo el día dando vueltas de aquí para allá.\nEs un Pokémon muy inquieto. Se interesa por todo lo que se\nencuentra en su camino."
          alpha_sapphire: "Zigzagoon tiene erizado el pelo del lomo, y suele frotárselo\ncontra los árboles para marcar su territorio. Este Pokémon\nhace como si estuviera debilitado para engañar a sus\nenemigos en combate."
        ko:
          omega_ruby: "항상 이쪽저쪽 지그재그로 걷는 것은\n호기심이 매우 강해서 눈에 비친\n여러 가지 것들에 흥미를 느끼기 때문이다."
          alpha_sapphire: "등의 뻣뻣한 털을 나무에 문질러서\n자신의 영역이란 표시를 해둔다.\n죽은 척하며 적의 눈을 속인다."
