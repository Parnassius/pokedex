      descriptions:
        jp_kana:
          omega_ruby: "みずの　ほうだんを　はっしゃする\nきょだいな　ハサミを　もつ。\nタンカーの　せんたいを　うちぬくぞ。"
          alpha_sapphire: "ハサミの　うしろの　ノズルから\nみずを　ふきだす　すいしんりょくで\n６０ノットの　スピードで　すすむ。"
        jp_kanji:
          omega_ruby: "水の　砲弾を　発射する\n巨大な　腕を　持つ。\nタンカーの　船体を　撃ち抜くぞ。"
          alpha_sapphire: "ハサミの　後ろの　ノズルから\n水を　噴き出す　推進力で\n６０ノットの　スピードで　進む。"
        en:
          omega_ruby: "Their enormous claws launch cannonballs of\nwater powerful enough to pierce tanker hulls."
          alpha_sapphire: "By expelling water from the nozzle in the back\nof its claw, it can move at a speed of 60 knots."
        fr:
          omega_ruby: "Son énorme pince projette de véritables obus d’eau capables\nde transpercer la coque d’un pétrolier."
          alpha_sapphire: "La force de propulsion générée par l’expulsion de l’eau\nvia la tuyère située à l’arrière de sa pince peut lui conférer\nune vitesse de 60 nœuds."
        it:
          omega_ruby: "Ha un’enorme chela che spara proiettili d’acqua in grado\ndi sfondare lo scafo di un transatlantico."
          alpha_sapphire: "Espellendo acqua da un foro dietro la chela riesce a muoversi\nalla velocità di 60 nodi."
        de:
          omega_ruby: "Aus seinen gewaltigen Scheren feuert es mächtige\nWassergeschosse ab, die selbst den Rumpf eines\nTankschiffes durchdringen."
          alpha_sapphire: "Indem es über die Düsen am hinteren Ende seiner Scheren\nWasser absondert, kann es sich mit einer Geschwindigkeit\nvon 60 Knoten fortbewegen."
        es:
          omega_ruby: "Posee una enorme pinza que dispara bolas de agua que\npodrían atravesar incluso el casco de un petrolero."
          alpha_sapphire: "El chorro de agua que dispara la tobera situada en la parte\ntrasera de su pinza le permite avanzar a una velocidad de\n60 nudos."
        ko:
          omega_ruby: "물 포탄을 발사하는\n거대한 집게발을 지녔다.\n유조선의 선체를 뚫어 버린다."
          alpha_sapphire: "집게 뒤의 노즐에서\n물을 뿜어내는 추진력으로\n60노트의 스피드로 나아간다."
helioptile:
  species_id: 694
  names:
    jp_kana: エリキテル
    jp_kanji: エリキテル
    en: Helioptile
    fr: Galvaran
