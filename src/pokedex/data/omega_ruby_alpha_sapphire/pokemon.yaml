        - thick_fat
        - ice_body
      hidden_ability: oblivious
      descriptions:
        jp_kana:
          omega_ruby: "はじめて　めにした　ものは　かならず　はなで\nクルクル　まわしてみる　しゅうせいを　もつ。\nタマザラシを　まわして　あそぶ　ことが　ある。"
          alpha_sapphire: "しょっちゅう　はなで　なにかを　まわしている。\nまわしながら　においや　かんしょくを　たしかめて\nすきな　ものと　きらいな　ものを　わけるのだ。"
        jp_kanji:
          omega_ruby: "初めて　目にした　ものは　必ず　鼻で\nクルクル　回してみる　習性を　持つ。\nタマザラシを　回して　遊ぶ　ことが　ある。"
          alpha_sapphire: "しょっちゅう　鼻で　なにかを　回している。\n回しながら　臭いや　感触を　確かめて\n好きな　ものと　嫌いな　ものを　分けるのだ。"
        en:
          omega_ruby: "Sealeo has the habit of always juggling on the tip of its nose\nanything it sees for the first time. This Pokémon occasionally\nentertains itself by balancing and rolling a Spheal on its nose."
          alpha_sapphire: "Sealeo often balances and rolls things on the tip of its\nnose. While the Pokémon is rolling something, it checks\nthe object’s aroma and texture to determine whether it likes\nthe object or not."
        fr:
          omega_ruby: "Phogleur a pris l’habitude de jongler avec tout ce qu’il\ndécouvre pour la première fois. Ce Pokémon se divertit\nparfois en faisant tourner un Obalie sur le bout de son museau."
          alpha_sapphire: "Phogleur tient souvent quelque chose en équilibre sur son\nmuseau et le fait rouler. Pendant ce temps, ce Pokémon peut\nsentir l’odeur et la texture de l’objet pour savoir s’il lui plaît\nou pas."
        it:
          omega_ruby: "Sealeo è solito giocare con qualsiasi cosa veda per la prima\nvolta, tenendola in equilibrio sulla punta del naso.\nTalvolta, si diverte a far rotolare sul proprio naso\nanche Spheal."
          alpha_sapphire: "Sealeo gioca spesso tenendo in equilibrio oggetti sulla punta\ndel naso e facendoli rotolare. Riesce così anche ad annusarli\ne provarne la consistenza per capire se sono di suo\ngradimento o meno."
        de:
          omega_ruby: "Seejong hat die Angewohnheit, alles, was es zum ersten Mal\nsieht, auf seiner Nasenspitze zu jonglieren. Dieses Pokémon\nhält sich bei Laune, indem es manchmal ein Seemops auf\nseiner Nase balanciert und hin- und herrollt."
          alpha_sapphire: "Seejong balanciert häufig Dinge auf seiner Nasenspitze\nund rollt sie hin und her. Während es das tut, überprüft es\nden Duft und die Beschaffenheit des Gegenstandes und\nstellt fest, ob es das Objekt mag oder nicht."
        es:
          omega_ruby: "Cada vez que Sealeo ve algo nuevo, se lo pone en el morro y\nempieza a darle vueltas. A veces, para entretenerse, hace lo\nmismo con un Spheal."
          alpha_sapphire: "Sealeo suele balancear y hacer rodar cosas en la punta del\nmorro. Al mismo tiempo, aprovecha para olerlas y detectar la\ntextura que tienen para ver si le gustan o no."
        ko:
          omega_ruby: "처음 본 것은 반드시 코로\n빙글빙글 돌려보는 습성을 지녔다.\n대굴레오를 돌리며 놀기도 한다."
          alpha_sapphire: "늘 코로 무언가를 돌리고 있다.\n돌리면서 냄새나 감촉을 확인하여\n좋아하는 것과 싫어하는 것을 구별한다."
