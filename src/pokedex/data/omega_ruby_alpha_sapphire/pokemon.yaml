        jp_kana:
          omega_ruby: "くさった　きりかぶに　たましいが\nやどり　ポケモンに　なった。\nひとの　よりつかない　もりに　すむ。"
          alpha_sapphire: "もりで　さまよい　しんだ　こどもの\nたましいが　きりかぶに　やどり\nポケモンになったと　いわれている。"
        jp_kanji:
          omega_ruby: "腐った　切り株に　魂が　宿り\nポケモンに　なった。\n人の　寄りつかない　森に　住む。"
          alpha_sapphire: "森で　さまよい　死んだ\n子供の　魂が　切り株に　宿り\nポケモンになったと　言われている。"
        en:
          omega_ruby: "These Pokémon are created when\nspirits possess rotten tree stumps.\nThey prefer to live in abandoned forests."
          alpha_sapphire: "According to old tales, these Pokémon are\nstumps possessed by the spirits of\nchildren who died while lost in the forest."
        fr:
          omega_ruby: "Ce Pokémon apparaît lorsqu’un esprit possède un arbre\nen décomposition. Il vit dans les forêts où les humains\nn’osent pas s’aventurer."
          alpha_sapphire: "D’après la légende, cette espèce de Pokémon aurait vu\nle jour quand des âmes d’enfants perdus dans la forêt\nauraient possédé des souches d’arbres."
        it:
          omega_ruby: "Pokémon nato da un ceppo marcescente in cui alberga\nuno spirito. Vive in boschi non frequentati dagli esseri umani."
          alpha_sapphire: "Secondo la leggenda, lo spirito di una persona smarritasi\nin un bosco è entrato in un ceppo d’albero, dando vita\na questo Pokémon."
        de:
          omega_ruby: "Bei diesen Pokémon handelt es sich um verrottete und von\nGeistern besessene Baumstümpfe, die sich in von Menschen\ngemiedene Wälder zurückziehen."
          alpha_sapphire: "Bei diesen Pokémon soll es sich um die Seelen von Kindern\nhandeln, die sich im Wald verliefen und ums Leben kamen\nund nun in Baumstümpfen hausen."
        es:
          omega_ruby: "Pokémon que nace cuando un espíritu se adentra en un tocón\npodrido. Habita en bosques que son poco frecuentados por\nhumanos."
          alpha_sapphire: "Según una leyenda, son en realidad almas de niños que\npasaron a mejor vida tras perderse en el bosque y se\nconvirtieron en Pokémon al habitar un tocón."
        ko:
          omega_ruby: "썩은 그루터기에 혼이\n깃들어 포켓몬이 되었다.\n사람이 가까이 가지 않는 숲에 산다."
          alpha_sapphire: "숲에서 헤매다 죽은 아이의\n영혼이 나무 그루터기에 씌어\n포켓몬이 되었다고 한다."
trevenant:
  species_id: 709
  names:
    jp_kana: オーロット
