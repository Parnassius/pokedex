      descriptions:
        jp_kana:
          omega_ruby: "てんてきの　クイタランに　たいして\nみんなで　やくわりぶんたん　しながら\nはんげきして　すから　おいはらう。"
          alpha_sapphire: "はがねの　よろいを　みにまとう。\nてんてきの　クイタランの　こうげきを\nしゅうだんで　ふせぎ　はんげきする。"
        jp_kanji:
          omega_ruby: "天敵の　クイタランに　対して\nみんなで　役割分担　しながら\n反撃して　巣から　追い払う。"
          alpha_sapphire: "鋼の　よろいを　身にまとう。\n天敵の　クイタランの　攻撃を\n集団で　防ぎ　反撃する。"
        en:
          omega_ruby: "Individuals each play different roles in driving\nHeatmor, their natural predator, away from\ntheir colony."
          alpha_sapphire: "They attack in groups, covering themselves in steel\narmor to protect themselves from Heatmor."
        fr:
          omega_ruby: "Ils travaillent de concert pour protéger leur colonie\ndes terribles attaques de leur prédateur naturel, Aflamanoir."
          alpha_sapphire: "Ils portent une armure de fer et se regroupent pour contrer\nles attaques de leurs prédateurs, les Aflamanoir."
        it:
          omega_ruby: "Heatmor è il loro acerrimo nemico, e quando vogliono\ncacciarlo dalla tana si dividono i compiti e partono all’attacco!"
          alpha_sapphire: "È protetto da un’armatura d’acciaio. Si riunisce in gruppi per\nrespingere gli attacchi di Heatmor, il suo predatore."
        de:
          omega_ruby: "Eine ausgeklügelte Rollenverteilung hilft ihnen dabei,\nihren natürlichen Feind Furnifraß aus dem Nest zu verjagen."
          alpha_sapphire: "Ein eiserner Panzer umgibt seinen Leib. Angriffe von Furnifraß,\nseinem Feind, schlägt es in der Gruppe zurück."
        es:
          omega_ruby: "Actúan en grupo para expulsar de sus colonias a los Heatmor,\nsus depredadores naturales."
          alpha_sapphire: "Llevan una armadura de acero. Se defienden en grupo para\ncontrarrestar a sus depredadores, los Heatmor."
        ko:
          omega_ruby: "천적인 앤티골에 대해서\n모두와 역할 분담을 하면서\n반격해 둥지에서 쫓아낸다."
          alpha_sapphire: "강철의 갑옷을 몸에 걸친다.\n천적인 앤티골의 공격을\n집단으로 막아 반격한다."
deino:
  species_id: 633
  names:
    jp_kana: モノズ
    jp_kanji: モノズ
    en: Deino
