      descriptions:
        jp_kana:
          omega_ruby: "あたまの　てっぺんを　きの　えだに　くっつけて\nぶらさがり　ながら　すいぶんを　すいとっている。\nみずを　のむほど　からだが　ツヤツヤ　ひかる。"
          alpha_sapphire: "えだに　ぶらさがる　すがたは　きのみ　そっくり。\nいきなり　うごいて　ポケモンを　ビックリさせる。\n１にち　１かい　はっぱで　からだを　みがくよ。"
        jp_kanji:
          omega_ruby: "頭の　てっぺんを　木の　枝に　くっつけて\nぶら下がり　ながら　水分を　吸い取っている。\n水を　飲むほど　体が　ツヤツヤ　光る。"
          alpha_sapphire: "枝に　ぶら下がる　姿は　きのみ　そっくり。\nいきなり　動いて　ポケモンを　ビックリさせる。\n１日　１回　葉っぱで　体を　磨くよ。"
        en:
          omega_ruby: "Seedot attaches itself to a tree branch using the top of its\nhead. It sucks moisture from the tree while hanging off the\nbranch. The more water it drinks, the glossier this Pokémon’s\nbody becomes."
          alpha_sapphire: "Seedot looks exactly like an acorn when it is dangling from a\ntree branch. It startles other Pokémon by suddenly moving.\nThis Pokémon polishes its body once a day using leaves."
        fr:
          omega_ruby: "Grainipiot s’accroche par la tête aux branches d’arbre.\nIl en profite alors pour absorber l’humidité de l’arbre.\nPlus ce Pokémon boit d’eau, plus son corps devient brillant."
          alpha_sapphire: "Grainipiot ressemble à s’y méprendre à un gland quand\nil s’accroche à une branche. Il effraie les autres Pokémon\nquand il se met à bouger. Ce Pokémon se lustre le corps\nune fois par jour avec des feuilles."
        it:
          omega_ruby: "Seedot si attacca ai rami degli alberi usando il picciolo che ha\nsul capo. In questa posizione succhia l’umidità dell’albero\nper nutrirsi. Più acqua assume, più lucido appare il suo corpo."
          alpha_sapphire: "Seedot è molto simile a una ghianda penzolante da\nun ramo. È solito spaventare gli altri Pokémon con\nmovimenti improvvisi. Lucida il proprio corpo una volta\nal giorno usando delle foglie."
        de:
          omega_ruby: "Samurzel hängt sich mit dem Kopf an einen Ast. Dabei entzieht\nes dem Baum Feuchtigkeit. Je mehr Wasser es trinkt, desto\nglänzender wird der Körper dieses Pokémon."
          alpha_sapphire: "Samurzel sieht aus wie eine Eichel, wenn es an einem\nAst hängt. Es erschreckt andere Pokémon, indem es sich\ndann plötzlich bewegt. Dieses Pokémon poliert seinen\nKörper einmal am Tag mit Blättern."
        es:
          omega_ruby: "Seedot se queda enganchado a las ramas de los árboles por el\nextremo que tiene en la cabeza. Mientras está ahí colgado,\naprovecha para tomar la humedad del árbol. Cuanta más agua\nbebe, más lustroso se le ve."
          alpha_sapphire: "Seedot es igualito a una bellota colgada de la rama de un\nárbol. A veces asusta a más de un Pokémon con movimientos\nrepentinos. Seedot suele acicalarse con hojas una vez al día."
        ko:
          omega_ruby: "머리의 정수리를 나뭇가지에 붙이고\n매달려 수분을 빨아들이고 있다.\n물을 마실수록 몸이 반들반들 빛난다."
          alpha_sapphire: "가지에 매달린 모습이 나무열매와 똑 닮았다.\n갑자기 움직여서 포켓몬을 놀라게 한다.\n하루에 한 번 잎사귀로 몸을 닦는다."
