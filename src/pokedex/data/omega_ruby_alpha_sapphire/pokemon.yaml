          alpha_sapphire: "かせきから　さいせいした　こだいの　ポケモン。\nいわに　くっつき　あるく　ことが　できない。\n２つの　めで　じっと　えものを　さがしている。"
        jp_kanji:
          omega_ruby: "約　１億年前に　絶滅した　ポケモン。\n海底の　岩に　くっつき　花びらの　ような\n触手で　寄ってきた　獲物を　捕まえる。"
          alpha_sapphire: "化石から　再生した　古代の　ポケモン。\n岩に　くっつき　歩く　ことが　できない。\n２つの　目で　じっと　獲物を　探している。"
        en:
          omega_ruby: "Lileep became extinct approximately a hundred million years\nago. This ancient Pokémon attaches itself to a rock on the\nseafloor and catches approaching prey using tentacles shaped\nlike flower petals."
          alpha_sapphire: "Lileep is an ancient Pokémon that was regenerated from a\nfossil. It remains permanently anchored to a rock. From its\nimmobile perch, this Pokémon intently scans for prey with its\ntwo eyes."
        fr:
          omega_ruby: "L’espèce des Lilia s’est éteinte il y a environ 100 millions\nd’années. Cet ancien Pokémon s’accroche à un rocher,\nsous l’eau, et attrape ses proies à l’aide de ses tentacules\nen forme de pétales de fleur."
          alpha_sapphire: "Lilia est un Pokémon très ancien ressuscité à partir d’un\nfossile. Il reste en permanence fixé à un rocher.\nCe Pokémon balaie l’horizon depuis son perchoir, immobile,\nen quête de proies."
        it:
          omega_ruby: "Lileep si è estinto circa 100 milioni di anni or sono.\nQuesto Pokémon antico si aggrappa alle rocce sui fondali\nmarini e cattura le prede che si avvicinano con i propri\ntentacoli a forma di petali di fiori."
          alpha_sapphire: "Lileep è un Pokémon antico rigenerato da un fossile. Rimane\nsempre attaccato alla roccia. Dalla sua postazione fissa,\nquesto Pokémon scandaglia attentamente i fondali con i suoi\ndue occhi."
        de:
          omega_ruby: "Von Liliep nahm man an, es sei seit etwa 100 Millionen\nJahren ausgestorben. Mit seinen wie Blütenblätter geformten\nTentakeln heftet es sich an einen Felsen auf dem Meeresboden\nund fängt Beute."
          alpha_sapphire: "Liliep ist ein urzeitliches Pokémon, das aus einem Fossil\nerzeugt wurde. Es bleibt ständig an einem Felsen verankert.\nMit seinen beiden Augen hält es ständig Ausschau nach Beute."
        es:
          omega_ruby: "Los Lileep se extinguieron hace unos cien millones de años\naproximadamente. Este Pokémon se ancla a una roca en el\nfondo del mar y atrapa a las presas que se le acercan con los\ntentáculos que tiene en forma de pétalos de flor."
          alpha_sapphire: "Lileep es un Pokémon antiguo que se regeneró a partir de un\nfósil. Siempre está anclado a una roca. Desde su percha\ninmóvil está al acecho y pendiente de que no se le escape su\npresa."
        ko:
          omega_ruby: "약 1억 년 전에 멸종한 포켓몬이다.\n해저의 바위에 붙어서 꽃잎 같은\n촉수로 가까이 온 먹이를 잡는다."
          alpha_sapphire: "화석에서 재생된 고대의 포켓몬이다.\n바위에 딱 붙어 있어서 걸을 수 없다.\n두 개의 눈으로 가만히 먹이를 찾고 있다."
