        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_stream
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          omega_ruby: "おおきく　くちを　あけて　じぶんの\nつよさを　アピール。たいりょうの\nすなを　まきあげて　こうげきする。"
          alpha_sapphire: "たいないに　ためた　すなを　からだの\nあなから　ふきあげて　きょだいな\nたつまきを　つくり　こうげきする。"
        jp_kanji:
          omega_ruby: "大きく　口を　開けて\n自分の　強さを　アピール。\n大量の　砂を　巻き上げて　攻撃する。"
          alpha_sapphire: "体内に　ためた　砂を　体の　穴から\n噴き上げて　巨大な\n竜巻を　作り　攻撃する。"
        en:
          omega_ruby: "It brandishes its gaping mouth in a display of\nfearsome strength. It raises vast quantities of sand\nwhile attacking."
          alpha_sapphire: "It blasts internally stored sand from ports on its\nbody to create a towering twister for attack."
        fr:
          omega_ruby: "Il exhibe sa force en ouvrant grand sa mâchoire, et attaque\nen soulevant des tornades de sable."
          alpha_sapphire: "Il emmagasine du sable qu’il expulse en tornades par les pores\nde sa peau pour attaquer."
        it:
          omega_ruby: "Mostra la propria forza spalancando le fauci.\nAttacca sollevando immani quantità di sabbia."
          alpha_sapphire: "Immagazzina sabbia all’interno del corpo e l’espelle\ncon violenza dai pori, formando enormi vortici."
        de:
          omega_ruby: "Das weit aufgerissene Maul demonstriert seine Stärke.\nEs attackiert mit gebündeltem Sand."
          alpha_sapphire: "Es wirbelt im Körper gespeicherten Sand durch Öffnungen\nund generiert so einen Sandwirbelsturm."
        es:
          omega_ruby: "Hace gala de su fuerza abriendo su enorme boca. Para atacar\nlevanta gran cantidad de arena."
          alpha_sapphire: "Cuando ataca, expulsa arena almacenada en su interior para\ncrear un gran tornado."
        ko:
          omega_ruby: "크게 입을 벌려 자신의\n강함을 어필한다. 대량의\n모래를 일으켜 공격한다."
          alpha_sapphire: "체내에 모아둔 모래를 몸의\n구멍에서 뿜어 올려 거대한\n회오리를 만들어 공격한다."
skorupi:
