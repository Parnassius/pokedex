        jp_kana:
          omega_ruby: "エリマキを　ひろげて　はつでんする。\nエレザード　１ぴきで　こうそうビルで\nひつような　でんきを　つくれるのだ。"
          alpha_sapphire: "でんきで　きんにくを　しげきすると\n１００メートルを　５びょうで　はしる\nきゃくりょくに　パワーアップする。"
        jp_kanji:
          omega_ruby: "エリマキを　広げて　発電する。\nエレザード　１匹で　高層ビルで\n必要な　電気を　作れるのだ。"
          alpha_sapphire: "電気で　筋肉を　刺激すると\n１００メートルを　５秒で　走る\n脚力に　パワーアップする。"
        en:
          omega_ruby: "They flare their frills and generate energy.\nA single Heliolisk can generate sufficient\nelectricity to power a skyscraper."
          alpha_sapphire: "It stimulates its muscles with electricity,\nboosting the strength in its legs and enabling\nit to run 100 yards in five seconds."
        fr:
          omega_ruby: "L’électricité que produit un seul Iguolta en agitant\nsa collerette suffit à alimenter un immeuble entier."
          alpha_sapphire: "Il augmente sa puissance motrice en stimulant les muscles\nde ses pattes avec des décharges électriques. Il peut ainsi\nparcourir 100 m en 5 s."
        it:
          omega_ruby: "Può produrre energia elettrica aprendo il collare. Un solo\nPokémon di questa specie sarebbe in grado di illuminare\nun intero grattacielo."
          alpha_sapphire: "Stimolando i suoi muscoli con l’elettricità riesce a percorrere\n100 m in 5 secondi."
        de:
          omega_ruby: "Die Strommenge, die ein Elezard mit ausgebreiteten\nHautlappen durch Umwandlung von Sonnenstrahlen erzeugt,\ngenügt zur Versorgung eines Wolkenkratzers."
          alpha_sapphire: "Es stimuliert seine Beinmuskulatur mit Strom, wodurch es ihm\ngelingt, 100 m in fünf Sekunden zurückzulegen."
        es:
          omega_ruby: "Extiende su gorguera y genera energía eléctrica suficiente\npara cubrir el consumo de electricidad de un rascacielos\nentero."
          alpha_sapphire: "Si estimula sus músculos a base de electricidad, sus piernas\nalcanzan una potencia tal que puede recorrer 100 metros en\napenas cinco segundos."
        ko:
          omega_ruby: "목의 깃을 펼쳐 발전한다.\n일레도리자드 1마리로 고층 빌딩에\n필요한 전기를 만들어 낼 수 있다."
          alpha_sapphire: "전기로 근육을 자극하면\n100m를 5초 만에 달리는\n다릿심으로 파워가 올라간다."
tyrunt:
  species_id: 696
  names:
