      descriptions:
        jp_kana:
          omega_ruby: "からだの　ほとんどが　みずで　できているので\nうみから　でると　からからに　ひからびてしまう。\nひからびた　ときは　うみに　もどしてあげよう。"
          alpha_sapphire: "たいようこうせんを　からだの　なかの　すいぶんで\nくっせつさせて　ビームの　エネルギーに　かえる。\nすいしょうの　ような　めだまから　はっしゃする。"
        jp_kanji:
          omega_ruby: "体の　ほとんどが　水で　できているので\n海から　出ると　からからに　干からびてしまう。\n干からびた　ときは　海に　戻してあげよう。"
          alpha_sapphire: "太陽光線を　体の　中の　水分で\n屈折させて　ビームの　エネルギーに　変える。\n水晶の　ような　目玉から　発射する。"
        en:
          omega_ruby: "Tentacool’s body is largely composed of water. If it is removed\nfrom the sea, it dries up like parchment. If this Pokémon\nhappens to become dehydrated, put it back into the sea."
          alpha_sapphire: "Tentacool absorbs sunlight and refracts it using water inside\nits body to convert it into beam energy. This Pokémon shoots\nbeams from the small round organ above its eyes."
        fr:
          omega_ruby: "Le corps de Tentacool est principalement aqueux. Si on le\nretire de l’eau, il se déshydrate complètement. Si cela arrive,\nil suffit de le replonger dans un liquide pour qu’il reprenne\nsa forme normale."
          alpha_sapphire: "Grâce à l’eau de son corps, Tentacool convertit la lumière\ndu soleil absorbée et la renvoie sous forme de rayon\nd’énergie. Ce Pokémon lance ces rayons par le petit\norgane rond situé au-dessus de ses yeux."
        it:
          omega_ruby: "Il corpo di Tentacool è costituito quasi solo d’acqua.\nSe pescato ed esposto all’aria, si secca totalmente.\nIn caso di disidratazione, dunque, si consiglia di rimetterlo\nin mare."
          alpha_sapphire: "Tentacool assorbe la luce solare e la rifrange usando l’acqua\nche ha nel corpo per convertirla in raggi energetici.\nSuccessivamente emette questi raggi dalla piccola sfera rossa\nche ha sulla testa."
        de:
          omega_ruby: "Tentachas Körper setzt sich zum größten Teil aus Wasser\nzusammen. Wenn es das Meer verlässt, vertrocknet es.\nWenn dieses Pokémon auszutrocknen beginnt, sollte man\nes schnell wieder ins Wasser zurückbringen."
          alpha_sapphire: "Tentacha nimmt Sonnenlicht auf und bricht es in seinem Körper\nmithilfe von Wasser, um es in Strahlenenergie umzuwandeln.\nDieses Pokémon verschießt Strahlen aus dem kleinen, runden\nOrgan über seinen Augen."
        es:
          omega_ruby: "Tentacool está compuesto en su mayor parte por agua. Si se\nle saca del mar, se secará y se quedará acartonado. Si este\nPokémon se deshidrata, hay que echarlo inmediatamente de\nvuelta al mar."
          alpha_sapphire: "Tentacool absorbe luz solar, la refracta a través del agua que\ntiene en su interior y la convierte en un rayo de energía. Este\nPokémon tiene un órgano que parece de cristal sobre los ojos\npor el cual dispara los rayos."
        ko:
          omega_ruby: "몸 대부분이 물로 되어 있어\n바다에서 나오면 바싹 말라버린다.\n말라버렸을 때는 바다로 돌려보내 주자."
          alpha_sapphire: "태양 광선을 몸 안의 수분으로\n굴절시켜서 빔 에너지로 바꾼다.\n수정 같은 눈알에서 발사된다."
