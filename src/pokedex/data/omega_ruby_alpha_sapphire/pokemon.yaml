        fr:
          omega_ruby: Attaqué par un prédateur, il fuit en libérant un liquide mauve.
          alpha_sapphire: "Jadis, il semble qu’il portait une grande carapace pour\nse protéger. Il hante les eaux peu profondes."
        it:
          omega_ruby: "Se minacciato da un nemico naturale rilascia un liquido viola\ne se la dà a gambe, per così dire..."
          alpha_sapphire: "Pare che in passato il suo corpo fosse protetto da un enorme\ncarapace. Vive in bacini poco profondi."
        de:
          omega_ruby: "Wird es von einem natürlichen Feind angegriffen, flieht es,\nindem es ein lila Sekret über die Haut ausstößt."
          alpha_sapphire: "In Urzeiten muss es einen großen Schutzpanzer\nbesessen haben. Es lebt in kleinen Wasserstellen."
        es:
          omega_ruby: "Si se ve amenazado por sus enemigos naturales, segrega un\nlíquido morado y huye rápidamente."
          alpha_sapphire: "Al parecer, hace mucho tiempo tenía una gran concha\nprotectora. Vive en aguas poco profundas."
        ko:
          omega_ruby: "천적에게 습격당했을 때는\n보라색 액체를\n몸에서 내어 도망간다."
          alpha_sapphire: "아주 옛날에는 튼튼한 껍질로\n몸을 보호하고 있었던 듯하다.\n바다의 얕은 곳에서 서식한다."
ambipom:
  species_id: 424
  names:
    jp_kana: エテボース
    jp_kanji: エテボース
    en: Ambipom
    fr: Capidextre
    it: Ambipom
    de: Ambidiffel
    es: Ambipom
    ko: 겟핸보숭
  forms:
    ambipom:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 66
        special_attack: 60
        special_defense: 66
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
