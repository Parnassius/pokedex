          omega_ruby: "からだから　はえた　はっぱは　もりの　なかで\nてきから　すがたを　かくす　ときに　べんり。\nみつりんに　くらす　きのぼりの　めいしゅ。"
          alpha_sapphire: "えだから　えだへ　みがるに　とびまわる。\nどんなに　すばやい　ポケモンも　もりの　なかで\nジュプトルを　つかまえる　ことは　ふかのうだ。"
        jp_kanji:
          omega_ruby: "体から　生えた　葉っぱは　森の　中で\n敵から　姿を　隠す　ときに　便利。\n密林に　暮らす　木登りの　名手。"
          alpha_sapphire: "枝から　枝へ　身軽に　飛び回る。\nどんなに　素早い　ポケモンも　森の　中で\nジュプトルを　捕まえる　ことは　不可能だ。"
        en:
          omega_ruby: "The leaves growing out of Grovyle’s body are convenient for\ncamouflaging it from enemies in the forest. This Pokémon is a\nmaster at climbing trees in jungles."
          alpha_sapphire: "This Pokémon adeptly flies from branch to branch in trees.\nIn a forest, no Pokémon can ever hope to catch a fleeing\nGrovyle however fast they may be."
        fr:
          omega_ruby: "Les feuilles qui poussent sur le corps de Massko sont\nbien pratiques lorsqu’il veut se camoufler dans la forêt.\nCe Pokémon est passé maître dans l’art de grimper\naux arbres."
          alpha_sapphire: "Ce Pokémon vole de branche en branche avec brio.\nEn forêt, aucun Pokémon, même le plus rapide, ne peut\nespérer attraper un Massko qui s’enfuit."
        it:
          omega_ruby: "Le foglie che crescono sul corpo di Grovyle sono utili per\nmimetizzarsi contro i nemici nella foresta.\nQuesto Pokémon sa arrampicarsi sugli alberi della giungla\ncon una maestria senza pari."
          alpha_sapphire: "Grovyle vola di ramo in ramo e di albero in albero. Non c’è\nnessun Pokémon nella foresta in grado di catturarlo in volo:\nla sua velocità è impressionante!"
        de:
          omega_ruby: "Reptain kann sich mit den Blättern, die aus seinem\nKörper herauswachsen, im Wald hervorragend tarnen.\nDieses Pokémon ist ein wahrer Meister darin, auf die\nBäume des Dschungels zu klettern."
          alpha_sapphire: "Dieses Pokémon fliegt geschickt von Ast zu Ast. Keinem\nPokémon wird es jemals gelingen, ein Reptain zu erwischen.\nDa kann es noch so schnell sein."
        es:
          omega_ruby: "Las hojas que Grovyle tiene por el cuerpo le resultan muy\nútiles para camuflarse en el bosque y esconderse de los\nenemigos. A este Pokémon no hay quien lo supere subiendo\na los árboles del bosque."
          alpha_sapphire: "Este Pokémon revolotea de rama en rama con maestría.\nCuando Grovyle va volando por el bosque, no hay quien lo\nalcance por muy rápido que sea."
        ko:
          omega_ruby: "몸에서 난 잎사귀는 숲 속에서\n적으로부터 몸을 숨길 때 편리하다.\n밀림에 사는 나무 타기의 명수다."
          alpha_sapphire: "가지에서 가지로 가볍게 뛰어다닌다.\n아무리 빠른 포켓몬도 숲 속에서\n나무돌이를 잡기란 불가능하다."
