        jp_kana:
          omega_ruby: "あかりを　ともして　みちあんないを\nするように　みせかけながら\nせいめいりょくを　すいとっている。"
          alpha_sapphire: "ヒトモシの　ともす　あかりは\nひとや　ポケモンの　せいめいりょくを\nすいとって　もえているのだ。"
        jp_kanji:
          omega_ruby: "明かりを　灯して　道案内を\nするように　見せかけながら\n生命力を　吸い取っている。"
          alpha_sapphire: "ヒトモシの　灯す　明かりは\n人や　ポケモンの　生命力を\n吸い取って　燃えているのだ。"
        en:
          omega_ruby: "While shining a light and pretending to be a guide,\nit leeches off the life force of any who follow it."
          alpha_sapphire: "Litwick shines a light that absorbs the life energy of\npeople and Pokémon, which becomes the fuel that\nit burns."
        fr:
          omega_ruby: "Il fait semblant de guider ses victimes à la lueur de sa flamme,\nmais c’est pour mieux aspirer leur énergie vitale."
          alpha_sapphire: "Sa flamme brûle en consumant l’énergie vitale des gens\net des Pokémon."
        it:
          omega_ruby: "Mentre fa luce col pretesto di fare loro da guida, assorbe\nenergia vitale dalle sue prede."
          alpha_sapphire: "La luce che emana brucia consumando l’energia di esseri\numani e Pokémon."
        de:
          omega_ruby: "Es entzündet ein Licht und gibt vor, dem Gegner den Weg zu\nweisen, doch eigentlich saugt es ihm seine Lebensenergie ab."
          alpha_sapphire: "Es entfacht eine Flamme, die von der Lebensenergie eines\nMenschen oder eines Pokémon zehrt."
        es:
          omega_ruby: "Finge ser una luz guía en el camino, pero en realidad solo\nquiere absorber la energía vital de quien lo sigue."
          alpha_sapphire: "La luz que desprende absorbe la energía vital de humanos y\nPokémon."
        ko:
          omega_ruby: "빛을 밝혀 길 안내를\n하는 것처럼 가장하여\n생명력을 빨아들이고 있다."
          alpha_sapphire: "불켜미가 밝히는 빛은\n사람과 포켓몬의 생명력을\n빨아들여 불타고 있다."
lampent:
  species_id: 608
  names:
