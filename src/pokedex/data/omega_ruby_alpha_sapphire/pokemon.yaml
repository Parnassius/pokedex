      descriptions:
        jp_kana:
          omega_ruby: "からだを　おおう　がんじょうな　カラが\nてきの　こうげきを　はじきかえし\nするどい　トゲで　はんげきする。"
          alpha_sapphire: "なかまどうしで　からだを　ぶつけあい\nあしこしを　きたえる。じぶんからは\nたたかわない　やさしい　せいかく。"
        jp_kanji:
          omega_ruby: "体を　覆う　頑丈な　殻が\n敵の　攻撃を　弾き返し\n鋭い　トゲで　反撃する。"
          alpha_sapphire: "仲間同士で　体を　ぶつけ合い\n足腰を　鍛える。\n自分からは　戦わない　優しい　性格。"
        en:
          omega_ruby: "It relies on its sturdy shell to deflect predators’\nattacks. It counterattacks with its sharp quills."
          alpha_sapphire: "They strengthen their lower bodies by\nrunning into one another. They are very\nkind and won’t start fights."
        fr:
          omega_ruby: "La carapace qui recouvre son corps le protège des attaques\nadverses, et ses piquants lui permettent de contre-attaquer."
          alpha_sapphire: "Il renforce ses membres inférieurs en se ruant violemment\nsur ses congénères. Naturellement paisible, il ne provoque\njamais un combat."
        it:
          omega_ruby: "Respinge gli attacchi dei nemici grazie al guscio che gli ricopre\nil corpo e contrattacca con gli aculei affilati."
          alpha_sapphire: "Allena la parte inferiore del corpo scontrandosi con i suoi\nsimili. Ha una natura mite e non inizia mai una lotta per primo."
        de:
          omega_ruby: "Der Panzer, der seinen Körper umgibt, bietet ihm Schutz vor\nAngreifern und straft direkte Angriffe postwendend mit spitzen\nStacheln ab."
          alpha_sapphire: "Sie stärken ihre Beinmuskeln, indem sie sich gegenseitig\nanrempeln. Sie sind sehr freundlich und würden niemals\neinen Streit anfangen."
        es:
          omega_ruby: "Desvía los ataques de los enemigos con la robusta coraza que\ncubre su cuerpo y contraataca con sus dos afilados cuernos."
          alpha_sapphire: "Chocan contra sus congéneres para fortalecer sus piernas.\nDebido a su carácter afable, nunca son los que provocan un\ncombate."
        ko:
          omega_ruby: "몸을 둘러싼 단단한 껍질이\n적의 공격을 튕겨내고\n날카로운 가시로 반격한다."
          alpha_sapphire: "동료끼리 몸을 서로 부딪쳐\n하반신을 단련한다. 자신이 먼저\n싸움을 걸지 않는 온순한 성격이다."
chesnaught:
  species_id: 652
  names:
