      descriptions:
        jp_kana:
          omega_ruby: "ダルマッカの　フンは　あついので\nむかしの　ひとは　ふところに　いれて\nからだを　あたためていたのだ。"
          alpha_sapphire: "ねるときは　てあしを　ひっこめ\nたいないで　もえている　６００どの\nほのおも　ちいさくなり　おちつくよ。"
        jp_kanji:
          omega_ruby: "ダルマッカの　フンは　熱いので\n昔の　人は　懐に　入れて\n体を　温めていたのだ。"
          alpha_sapphire: "寝るときは　手足を　ひっこめ\n体内で　燃えている　６００度の\n炎も　小さくなり　落ち着くよ。"
        en:
          omega_ruby: "Darumaka’s droppings are hot, so people used to\nput them in their clothes to keep themselves warm."
          alpha_sapphire: "When it sleeps, it pulls its limbs into its\nbody and its internal fire goes down to\n1,100 degrees Fahrenheit."
        fr:
          omega_ruby: "Les gens d’autrefois avaient l’habitude de mettre ses crottes\nbrûlantes sous leurs vêtements pour se réchauffer."
          alpha_sapphire: "Quand il dort, ses pattes se rétractent et les flammes\nqui brûlent à 600 °C dans son corps s’apaisent."
        it:
          omega_ruby: "Poiché i suoi escrementi sono molto caldi, nell’antichità\ngli uomini solevano conservarli in buste per riscaldarsi."
          alpha_sapphire: "Quando dorme ritrae gli arti. Anche il fuoco che gli brucia\ndentro a 600 °C si affievolisce."
        de:
          omega_ruby: "Früher nutzte man die heißen Ausscheidungen von Flampion,\num sich den Körper zu wärmen."
          alpha_sapphire: "Zum Schlafen zieht es Arme und Beine ein und senkt seine\ninnere Körpertemperatur auf 600 °C, um sich zu entspannen."
        es:
          omega_ruby: "Como sus excrementos están muy calientes, la gente de\nantaño se los metía en los bolsillos para calentarse."
          alpha_sapphire: "Cuando se dispone a dormir, retrae sus piernas y sus brazos,\ny reduce la llama de su interior a 600 °C para relajarse."
        ko:
          omega_ruby: "달막화의 배설물은 뜨거워서\n옛날 사람은 품에 넣고\n몸을 따뜻하게 하는 데 사용했다."
          alpha_sapphire: "잠잘 때는 손발을 움츠리고\n체내에서 타고 있는 600도의\n불꽃도 작아져서 차분해진다."
