      descriptions:
        jp_kana:
          omega_ruby: "こえだを　たべると　げんきになって\nせっし２００どを　こえる　ねっきを\nおおきな　みみから　ふきだす。"
          alpha_sapphire: "こえだを　もちあるき　おやつがわりに\nポリポリ　たべる。みみから　ねっきを\nふきだして　あいてを　いかくする。"
        jp_kanji:
          omega_ruby: "小枝を　食べると　元気になって\n摂氏２００度を　超える　熱気を\n大きな　耳から　噴き出す。"
          alpha_sapphire: "小枝を　持ち歩き　おやつがわりに\nポリポリ　食べる。耳から　熱気を\n噴き出して　相手を　威嚇する。"
        en:
          omega_ruby: "Eating a twig fills it with energy,\nand its roomy ears give vent to air\nhotter than 390 degrees Fahrenheit."
          alpha_sapphire: "As it walks, it munches on a twig in place\nof a snack. It intimidates opponents\nby puffing hot air out of its ears."
        fr:
          omega_ruby: "En cas de coup de fatigue, il grignote des rameaux\npour recharger ses batteries. Ses oreilles dégagent\nune chaleur qui dépasse les 200 °C."
          alpha_sapphire: "Il a toujours une brindille avec lui en cas de petit creux.\nIl projette de l’air chaud par ses oreilles pour intimider\nses ennemis."
        it:
          omega_ruby: "Fa il pieno di energia mangiando ramoscelli ed emette aria\ncalda dalle grandi orecchie a una temperatura di oltre 200 °C."
          alpha_sapphire: "Se ne va in giro sgranocchiando un rametto. Intimidisce\ni nemici emettendo aria calda dalle orecchie."
        de:
          omega_ruby: "Wenn es Zweige frisst, fasst es neue Kraft und stößt über\nseine Ohren über 200 °C heiße Luft aus."
          alpha_sapphire: "Anstelle eines Snacks kaut es unterwegs auf einem Zweig\nherum. Es schreckt Gegner ab, indem es über seine Ohren\nheiße Luft ausstößt."
        es:
          omega_ruby: "Tras masticar e ingerir pequeñas ramas se siente pletórico y\nexpulsa aire caliente por sus grandes orejas a temperaturas\nsuperiores a los 200 °C."
          alpha_sapphire: "Mordisquea una ramita mientras camina, como si de un\naperitivo se tratase. Intimida a su enemigo expulsando aire\ncaliente por las orejas."
        ko:
          omega_ruby: "잔가지를 먹으면 힘이 나서\n섭씨 200도가 넘는 열기를\n커다란 귀에서 내뿜는다."
          alpha_sapphire: "작은 나뭇가지를 들고 다니며 간식 대신\n아작아작 먹는다. 귀에서 열기를\n뿜어내어 상대를 위협한다."
braixen:
  species_id: 654
  names:
    jp_kana: テールナー
    jp_kanji: テールナー
    en: Braixen
    fr: Roussil
    it: Braixen
    de: Rutena
    es: Braixen
    ko: 테르나
  forms:
    braixen:
      form_id: 0
      base_stats:
        hp: 59
        attack: 59
        defense: 58
        special_attack: 90
        special_defense: 70
        speed: 73
      evs_yield:
