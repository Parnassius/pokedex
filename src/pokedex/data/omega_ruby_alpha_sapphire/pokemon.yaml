      hidden_ability: protean
      descriptions:
        jp_kana:
          omega_ruby: "みずを　あっしゅくして　しゅりけんを\nつくりだす。こうそくかいてんさせて\nとばすと　きんぞくも　まっぷたつ。"
          alpha_sapphire: "にんじゃのように　しんしゅつきぼつ。\nすばやい　うごきで　ほんろうしつつ\nみずの　しゅりけんで　きりさく。"
        jp_kanji:
          omega_ruby: "水を　圧縮して　手裏剣を　作り出す。\n高速回転させて　飛ばすと\n金属も　真っ二つ。"
          alpha_sapphire: "忍者のように　神出鬼没。\n素早い　動きで　翻弄しつつ\n水の　手裏剣で　切り裂く。"
        en:
          omega_ruby: "It creates throwing stars out of compressed water.\nWhen it spins them and throws them at high speed,\nthese stars can split metal in two."
          alpha_sapphire: "It appears and vanishes with a ninja’s grace.\nIt toys with its enemies using swift movements, while\nslicing them with throwing stars of sharpest water."
        fr:
          omega_ruby: "Il transforme des jets d’eau sous pression en redoutables\nshuriken. Une fois lancés, ils tournent si vite qu’ils peuvent\nmême couper le métal."
          alpha_sapphire: "Aussi insaisissable qu’un ninja, il se joue de ses ennemis\ngrâce à sa célérité, et les tranche de ses Sheauriken."
        it:
          omega_ruby: "Crea lame d’acqua micidiali che ruotano ad alta velocità e,\nse lanciate, possono perforare il metallo."
          alpha_sapphire: "Agile e sfuggente come un ninja, si fa beffe dei nemici grazie\nalla sua velocità e li bersaglia di shuriken d’acqua."
        de:
          omega_ruby: "Es stellt Wurfsterne aus komprimiertem Wasser her, die durch\nihre hohe Drehgeschwindigkeit beim Werfen sogar Metall\ndurchtrennen."
          alpha_sapphire: "Kaum hat man es erspäht, verschwindet es auch schon wieder.\nMit der Agilität eines Ninjas verwirrt es seine Gegner, um sie\ndann mit Wasser-Shuriken anzugreifen."
        es:
          omega_ruby: "Comprime el agua y crea estrellas ninja con las que ataca al\nenemigo. Cuando las hace girar a gran velocidad cortan en\ndos hasta el metal."
          alpha_sapphire: "Aparece y desaparece de improvisto, cual ninja. Marea al\noponente con su soberbia agilidad y lo hace trizas con sus\nShuriken de Agua."
        ko:
          omega_ruby: "물을 압축시켜 수리검을\n만들어 낸다. 고속으로 회전시키며\n던지면 금속도 두 동강이 난다."
          alpha_sapphire: "닌자처럼 신출귀몰하다.\n재빠른 움직임으로 상대를 농락하면서\n물의 수리검으로 벤다."
bunnelby:
  species_id: 659
  names:
