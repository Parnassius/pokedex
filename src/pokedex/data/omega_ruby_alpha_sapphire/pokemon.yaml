      descriptions:
        jp_kana:
          omega_ruby: "どんな　つよい　あいてでも　ゆうかんに　いどむ。\nまけても　へこたれない　こんじょうの　もちぬし。\nおなかが　すくと　おおごえで　ないて　しまう。"
          alpha_sapphire: "すだちを　おえたばかり　なので　よるに　なると\nさみしく　なって　ないてしまう　ことも　ある。\nもりに　すむ　ケムッソを　つかまえて　たべる。"
        jp_kanji:
          omega_ruby: "どんな　強い　相手でも　勇敢に　挑む。\n負けても　へこたれない　根性の　持ち主。\nお腹が　空くと　大声で　泣いて　しまう。"
          alpha_sapphire: "巣立ちを　終えたばかり　なので　夜に　なると\n寂しく　なって　泣いてしまう　ことも　ある。\n森に　すむ　ケムッソを　捕まえて　食べる。"
        en:
          omega_ruby: "Taillow courageously stands its ground against foes, however\nstrong they may be. This gutsy Pokémon will remain defiant\neven after a loss. On the other hand, it cries loudly if it\nbecomes hungry."
          alpha_sapphire: "Taillow is young—it has only just left its nest. As a result,\nit sometimes becomes lonesome and cries at night.\nThis Pokémon feeds on Wurmple that live in forests."
        fr:
          omega_ruby: "Nirondelle défend courageusement son territoire contre\nses ennemis, même les plus puissants. Ce vaillant Pokémon\nest toujours prêt à relever un défi, mais s’il a faim, il se met\nà pleurer à chaudes larmes."
          alpha_sapphire: "Nirondelle est jeune. Il vient de quitter son nid. Du coup,\nil se sent parfois un peu seul et pleure la nuit. Ce Pokémon\nse nourrit des Chenipotte qu’il trouve dans les forêts."
        it:
          omega_ruby: "Taillow affronta coraggiosamente persino i nemici più forti.\nAnche in caso di sconfitta rimane fiero e spavaldo.\nMa quando ha fame, si lamenta rumorosamente."
          alpha_sapphire: "Taillow è molto piccolo, infatti ha appena lasciato il nido.\nTalvolta di notte si sente solo e piange.\nSi nutre dei Wurmple che vivono nella foresta."
        de:
          omega_ruby: "Mutig behauptet Schwalbini sein Territorium gegen\nEindringlinge, so stark diese auch sein mögen. Dieses\nunerschrockene Pokémon bleibt trotz einer Niederlage\nangriffslustig, heult aber laut, wenn es Hunger hat."
          alpha_sapphire: "Schwalbini ist noch klein, es hat gerade erst sein Nest\nverlassen. Daher fühlt es sich manchmal einsam und weint\nnachts. Dieses Pokémon ernährt sich von Waumpel."
        es:
          omega_ruby: "Taillow se mantiene firme ante sus rivales, sean lo fuertes que\nsean. Este valiente Pokémon seguirá mostrándose desafiante,\naunque pierda en combate. Además, si se enfada, se pondrá a\ngritar con energía."
          alpha_sapphire: "Taillow es pequeño, está recién salido del nido. Por eso, se\nsiente solo con frecuencia y se pone a piar. Este Pokémon\nse alimenta de los Wurmple que hay por el bosque."
        ko:
          omega_ruby: "아무리 강한 상대라도 용감히 맞선다.\n져도 주저앉지 않는 근성의 소유자다.\n배가 고프면 큰 소리로 운다."
          alpha_sapphire: "둥지를 떠난 지 얼마 안 돼서 밤이 되면\n쓸쓸함에 우는 일도 있다.\n숲에 사는 개무소를 잡아먹는다."
