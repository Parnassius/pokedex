          alpha_sapphire: "てっこつを　きりつけても　はこぼれ\nしない　がんじょうな　キバを　もつ。\nかたい　よろいに　おおわれている。"
        jp_kanji:
          omega_ruby: "優しい　性格だが　縄張りを　荒らす\n者には　容赦しない。\n鉄を　切る　キバで　挑みかかる。"
          alpha_sapphire: "鉄骨を　切りつけても　刃こぼれ\nしない　頑丈な　キバを　持つ。\n硬い　よろいに　覆われている。"
        en:
          omega_ruby: "They are kind but can be relentless when defending\nterritory. They challenge foes with tusks that can\ncut steel."
          alpha_sapphire: "Their sturdy tusks will stay sharp even if used to cut\nsteel beams. These Pokémon are covered in\nhard armor."
        fr:
          omega_ruby: "Il est doux, mais ne pardonne pas à ceux qui viennent\nsaccager son territoire. Ses crocs peuvent découper de l’acier."
          alpha_sapphire: "Ses crocs sont tellement puissants qu’ils peuvent découper\nl’acier sans s’émousser. Son armure est très solide."
        it:
          omega_ruby: "Ha un carattere gentile, ma non perdona chi devasta il suo\nterritorio. Le sue zanne possono tagliare l’acciaio."
          alpha_sapphire: "Ha forti zanne che non si spezzano neanche quando trancia\ntravi d’acciaio. È protetto da una resistente armatura."
        de:
          omega_ruby: "Hat eine eher sanfte Natur, doch bei Eindringlingen kennt es\nkeine Gnade. Seine Stoßzähne durchbohren sogar Eisen."
          alpha_sapphire: "Wenn es mit seinen robusten Hauern Stahl durchbohrt, bleiben\ndiese unversehrt. Es ist von einem festen Panzer umgeben."
        es:
          omega_ruby: "Es gentil, pero no perdona a todo el que ose invadir su\nterritorio. Su mayor baza son sus colmillos, que cortan\nel acero."
          alpha_sapphire: "Sus colmillos no se quiebran ni aunque los hinque en un\narmazón de acero. Está protegido por una resistente\narmadura."
        ko:
          omega_ruby: "상냥한 성격이지만 영역을\n어지럽히는 자는 용서하지 않는다.\n철을 자르는 이빨로 덤벼든다."
          alpha_sapphire: "철골을 두 동강 내도 상처 하나\n안 나는 튼튼한 이빨을 가지고 있다.\n단단한 갑옷에 덮여 있다."
cubchoo:
  species_id: 613
