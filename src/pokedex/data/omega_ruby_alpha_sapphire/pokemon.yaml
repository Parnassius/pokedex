        jp_kana:
          omega_ruby: "ほほの　しんどうまくを　ふるわせ\nひとには　きこえない　おんぱを　だし\nなかまたちに　きけんを　つたえる。"
          alpha_sapphire: "ほほを　しんどうさせて　ひとには\nきこえない　おんぱを　だす。\nおんぱの　リズムで　かいわする。"
        jp_kanji:
          omega_ruby: "ほほの　振動膜を　震わせ\n人には　きこえない　音波を　だし\n仲間たちに　危険を　伝える。"
          alpha_sapphire: "ほほを　振動させて\n人には　聞こえない　音波を　出す。\n音波の　リズムで　会話する。"
        en:
          omega_ruby: "By vibrating its cheeks, it emits sound waves\nimperceptible to humans and warns others\nof danger."
          alpha_sapphire: "By vibrating its cheeks, it emits sound waves\nimperceptible to humans. It uses the rhythm of\nthese sounds to talk."
        fr:
          omega_ruby: "Il fait vibrer ses joues pour émettre des sons inaudibles\npour les humains et alerter ses semblables des dangers."
          alpha_sapphire: "Il fait vibrer ses joues pour émettre des sons imperceptibles\npour l’homme. Il communique grâce à leur rythme."
        it:
          omega_ruby: "Fa vibrare le membrane sulle guance per emettere onde\nsonore impercettibili agli umani con cui segnala un pericolo."
          alpha_sapphire: "Facendo vibrare le guance, emette onde sonore che gli uomini\nnon sentono. Conversa al ritmo di queste onde."
        de:
          omega_ruby: "Erzeugt mit seinen Wangen für Menschen unhörbare\nSchallwellen, um Artgenossen vor Gefahr zu warnen."
          alpha_sapphire: "Erzeugt mit seinen Wangen für Menschen unhörbare\nSchallwellen. Es verständigt sich über den Rhythmus\ndieser Wellen."
        es:
          omega_ruby: "Emite sonidos imperceptibles para los humanos con la\nvibración de sus mejillas y advierte de algún peligro a\nlos suyos."
          alpha_sapphire: "Emite sonidos imperceptibles para los humanos con la\nvibración de sus mejillas y se comunica con el ritmo de los\nmismos."
        ko:
          omega_ruby: "볼의 진동막을 떨어\n사람에게는 들리지 않는 음파를 내어\n동료에게 위험을 전달한다."
          alpha_sapphire: "볼을 진동시켜서 사람에게는\n들리지 않는 음파를 낸다.\n음파의 리듬으로 대화를 나눈다."
palpitoad:
  species_id: 536
  names:
    jp_kana: ガマガル
    jp_kanji: ガマガル
    en: Palpitoad
    fr: Batracné
    it: Palpitoad
    de: Mebrana
    es: Palpitoad
    ko: 두까비
  forms:
    palpitoad:
      form_id: 0
      base_stats:
        hp: 75
        attack: 65
        defense: 55
        special_attack: 65
        special_defense: 55
        speed: 69
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_1
      abilities:
        - swift_swim
        - hydration
      hidden_ability: water_absorb
      descriptions:
        jp_kana:
          omega_ruby: "あたまの　コブを　しんどうさせると\nすいちゅうが　なみだつ　だけでなく\nじめんも　じしんのように　ゆれる。"
          alpha_sapphire: "すいちゅうと　りくちで　くらす。\nながく　ねばねばする　ベロをつかって\nあいての　うごきを　ふうじこめる。"
        jp_kanji:
          omega_ruby: "頭の　コブを　振動させると\n水中が　波立つ　だけでなく\n地面も　地震のように　揺れる。"
          alpha_sapphire: "水中と　陸地で　暮らす。\n長く　ねばねばする　ベロを使って\n相手の　動きを　封じこめる。"
        en:
          omega_ruby: "When they vibrate the bumps on their heads, they\ncan make waves in water or earthquake-like\nvibrations on land."
          alpha_sapphire: "It lives in the water and on land. It uses its long,\nsticky tongue to immobilize its opponents."
        fr:
          omega_ruby: "Quand il fait vibrer la bosse sur sa tête, il provoque\ndes ondulations dans l’eau, mais aussi des tremblements\nde terre."
          alpha_sapphire: "Il vit dans l’eau et sur la terre ferme. Il immobilise ses proies\navec sa langue longue et gluante."
        it:
          omega_ruby: "Se fa vibrare il bernoccolo sulla testa può sollevare onde\nnell’acqua e anche provocare terremoti."
          alpha_sapphire: "Vive in acqua e sulla terraferma. Immobilizza la preda con la\nsua lunga lingua appiccicosa."
        de:
          omega_ruby: "Wenn es die Beulen auf seinem Kopf zum Schwingen bringt,\ntobt je nach Umgebung entweder das Wasser oder die Erde\nbebt."
          alpha_sapphire: "Es lebt zu Wasser und zu Lande. Mit seiner langen,\nklebrigen Zunge raubt es Gegnern die Bewegungsfreiheit."
        es:
          omega_ruby: "Cuando hace vibrar el bulto de su cabeza, no solo se\nembravece el mar, sino que la tierra también tiembla."
          alpha_sapphire: "Vive tanto en tierra como en el fondo del mar. Con su larga\ny viscosa lengua, inmoviliza a sus contrincantes."
        ko:
          omega_ruby: "머리의 혹을 진동시키면\n물속에 파동이 일어나며\n땅마저 지진처럼 흔들린다."
          alpha_sapphire: "수중과 육지에서 살며\n길고 끈적이는 혀를 사용하여\n상대의 움직임을 봉쇄한다."
