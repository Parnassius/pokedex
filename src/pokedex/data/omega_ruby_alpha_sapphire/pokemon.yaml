        jp_kana:
          omega_ruby: "たたかれても　きが　つかない　にぶさ　だが\nくうふくは　１びょうでも　がまん　できない。\nからだの　なかでは　マグマが　にえたぎっている。"
          alpha_sapphire: "１２００どの　マグマを　からだに　ためている。\nみずに　ぬれると　マグマが　ひえて　かたまり\nおもたくなるので　うごきが　にぶって　しまう。"
        jp_kanji:
          omega_ruby: "たたかれても　気が　つかない　鈍さ　だが\n空腹は　１秒でも　我慢　できない。\n体の　中では　マグマが　煮えたぎっている。"
          alpha_sapphire: "１２００度の　マグマを　体に　ためている。\n水に　ぬれると　マグマが　冷えて　固まり\n重たくなるので　動きが　鈍って　しまう。"
        en:
          omega_ruby: "Numel is extremely dull witted—it doesn’t notice being hit.\nHowever, it can’t stand hunger for even a second.\nThis Pokémon’s body is a seething cauldron of boiling magma."
          alpha_sapphire: "Numel stores magma of almost 2,200 degrees Fahrenheit\nwithin its body. If it gets wet, the magma cools and hardens.\nIn that event, the Pokémon’s body grows heavy and its\nmovements become sluggish."
        fr:
          omega_ruby: "Chamallot est terriblement lent d’esprit. Il ne remarque même\npas quand il est touché. Il ne supporte pas d’avoir faim,\nmême une seconde. Le corps de ce Pokémon est comparable\nà un chaudron de magma bouillonnant."
          alpha_sapphire: "Chamallot stocke du magma à 1 200 °C dans son corps.\nLorsqu’il est mouillé, le magma se refroidit et durcit. Le corps\ndu Pokémon devient alors très lourd et ses mouvements\ntrès lents."
        it:
          omega_ruby: "Numel è estremamente tardo, tanto da non notare di essere\nattaccato. Tuttavia, non sa resistere alla fame per più di\nun secondo. Il suo corpo è un calderone bollente di\nmagma liquido."
          alpha_sapphire: "Numel accumula magma a una temperatura di 1200 °C\nall’interno del proprio corpo. Se si bagna, il magma si\nraffredda e si solidifica. Se si appesantisce diventa goffo\nnei movimenti."
        de:
          omega_ruby: "Camaub ist nicht besonders helle. Es nimmt nicht einmal wahr,\nwenn es getroffen wurde. Ein Hungergefühl allerdings kann es\nnicht einmal eine Sekunde lang aushalten. In seinem Körper\nbrodelt glühend heißes Magma."
          alpha_sapphire: "Camaub speichert fast 1 200 °C heißes Magma in seinem\nKörper. Wenn es nass wird, kühlt das Magma ab und wird hart.\nDadurch wird der Körper dieses Pokémon schwer und seine\nBewegungen träge."
        es:
          omega_ruby: "Numel tarda en percibir las cosas, no se entera ni cuando lo\ngolpean, pero se da cuenta enseguida de si tiene hambre. El\ncuerpo de este Pokémon es un caldero de magma hirviendo."
          alpha_sapphire: "Numel acumula en su interior un magma de 1200 °C. Si se\nmoja, el magma se enfría y se solidifica. Cuando esto ocurre,\naumenta su tamaño y se vuelve pesado y lento en sus\nmovimientos."
        ko:
          omega_ruby: "맞아도 알아채지 못할 정도로 둔하지만\n배고픔은 단 1초도 참지 못한다.\n몸 안에는 마그마가 끓어오르고 있다."
          alpha_sapphire: "1200도의 마그마를 몸에 저장하고 있다.\n물에 젖으면 마그마가 식어서 덩어리져\n무거워지므로 움직임이 둔해진다."
