      descriptions:
        jp_kana:
          omega_ruby: "おおきな　みみで　じめんを　ほって\nすあなを　つくる。ひとばんじゅう\nやすまずに　ほりつづけられる。"
          alpha_sapphire: "シャベルのような　みみを　もつ。\nあなほりで　きたえた　みみは　ふとい\nねっこを　たちきる　いりょくだ。"
        jp_kanji:
          omega_ruby: "大きな　耳で　地面を　掘って\n巣穴を　作る。\n一晩中　休まずに　掘り続けられる。"
          alpha_sapphire: "シャベルのような　耳を　持つ。\n穴掘りで　鍛えた　耳は\n太い　根っこを　断ち切る　威力だ。"
        en:
          omega_ruby: "They use their large ears to dig burrows.\nThey will dig the whole night through."
          alpha_sapphire: "It has ears like shovels. Digging holes\nstrengthens its ears so much that they\ncan sever thick roots effortlessly."
        fr:
          omega_ruby: "Ses larges oreilles lui permettent de creuser des terriers.\nIl est capable de forer sans s’arrêter pendant toute une nuit."
          alpha_sapphire: "Il est doté d’oreilles ressemblant à des pelles. À force de\ncreuser des galeries, leur puissance est telle qu’elles peuvent\ntrancher de grosses racines."
        it:
          omega_ruby: "Scava tane nel terreno grazie alle grandi orecchie.\nPuò andare avanti senza fermarsi per tutta la notte."
          alpha_sapphire: "Usa le orecchie come pale per scavare buche nel terreno.\nQueste propaggini sono talmente potenti da permettergli di\nstrappare via enormi radici."
        de:
          omega_ruby: "Mit seinen großen Ohren schaufelt es sich einen Bau.\nEs kann die ganze Nacht ohne Pause durchschaufeln."
          alpha_sapphire: "Es besitzt schaufelähnliche Ohren, die durch ständiges Graben\nso kräftig werden, dass sie auch dicke Wurzeln durchtrennen\nkönnen."
        es:
          omega_ruby: "Usa sus grandes orejas para excavar en la tierra y así crear\nmadrigueras. Puede pasarse una noche entera cavando sin\nparar."
          alpha_sapphire: "Tiene unas orejas tan grandes que parecen palas.\nLas ha fortalecido tanto usándolas para excavar que son\ncapaces de arrancar raíces bien gruesas."
        ko:
          omega_ruby: "커다란 귀로 땅을 파고\n보금자리를 만든다. 하룻밤 동안\n쉬지 않고 계속 팔 수 있다."
          alpha_sapphire: "삽과 같은 귀를 가졌다.\n구멍을 파는 데 단련된 귀는 두꺼운\n뿌리를 자를 정도의 위력이다."
diggersby:
  species_id: 660
  names:
    jp_kana: ホルード
    jp_kanji: ホルード
    en: Diggersby
    fr: Excavarenne
    it: Diggersby
    de: Grebbit
    es: Diggersby
    ko: 파르토
