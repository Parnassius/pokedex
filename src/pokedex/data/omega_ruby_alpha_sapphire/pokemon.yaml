          alpha_sapphire: "Auf Paras’ Rücken wachsen parasitäre Pilze,\ndie Tochukaso genannt werden. Sie wachsen,\nindem sie dem Käfer-Pokémon Nährstoffe entziehen.\nSie sind sehr wertvoll als lebensverlängernde Medizin."
