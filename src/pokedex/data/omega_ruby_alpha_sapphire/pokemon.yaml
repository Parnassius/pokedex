      descriptions:
        jp_kana:
          omega_ruby: "からだの　なかの　ほのおを　もやして\nあたまや　しっぽから　ひのこを\nまきちらせて　てきを　こがす。"
          alpha_sapphire: "こうふんすると　あたまや　しっぽから\nひのこが　まいあがって　あつくなる。\nなぜか　あまいものが　だいこうぶつ。"
        jp_kanji:
          omega_ruby: "体の　中の　炎を　燃やして\n頭や　尻尾から　火の粉を\nまき散らせて　敵を　焦がす。"
          alpha_sapphire: "興奮すると　頭や　尻尾から\n火の粉が　舞いあがって　熱くなる。\nなぜか　甘いものが　大好物。"
        en:
          omega_ruby: "A flame burns inside its body. It scatters embers\nfrom its head and tail to sear its opponents."
          alpha_sapphire: "When it gets excited, embers rise from its head\nand tail and it gets hot. For some reason, it\nloves sweets."
        fr:
          omega_ruby: "Son corps est en combustion. Il projette des flammèches\npar la tête et la queue pour carboniser ses ennemis."
          alpha_sapphire: "Quand il est excité, des flammèches brûlantes dansent\nsur sa tête et sa queue. Il raffole des choses sucrées."
        it:
          omega_ruby: "Alimentando la fiamma all’interno del suo corpo, sparge dalla\ntesta o dalla coda una pioggia di fuoco che scotta i nemici."
          alpha_sapphire: "Quando è concitato si scalda e iniziano a levarsi scintille dalla\ntesta e dalla coda. Per qualche motivo adora i dolci."
        de:
          omega_ruby: "Es entfacht in seinem Körper ein Feuer und verkohlt Gegner\nmit Funken aus seinem Kopf und Schweif."
          alpha_sapphire: "Freut es sich, erhitzt sich sein Körper und aus seinem Kopf\nund Schweif sprühen Funken. Es liebt Süßigkeiten."
        es:
          omega_ruby: "Achicharra a sus enemigos desprendiendo llamas por la cola y\nla cabeza, fruto de su desmesurado calor interno."
          alpha_sapphire: "Cuando se emociona, echa chispas por la cola y la cabeza, y\ncalienta su cuerpo. Por alguna razón le encantan los dulces."
        ko:
          omega_ruby: "몸속에서 태운 불꽃을\n머리나 꼬리로 흩뿌려서\n상대를 태운다."
          alpha_sapphire: "흥분하면 머리나 꼬리에서\n불티가 날아올라 뜨거워진다.\n왜인지 달콤한 것을 매우 좋아한다."
