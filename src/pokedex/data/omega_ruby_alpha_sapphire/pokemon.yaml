      descriptions:
        jp_kana:
          omega_ruby: "あごの　ほのおで　こぶしを　もやして\nほのおの　パンチを　くりだす。\nとても　なかまおもいの　ポケモン。"
          alpha_sapphire: "ほのおの　あごひげを　たくわえる。\nパワーと　スピードを　かねそなえた\nかくとうの　わざを　みにつけている。"
        jp_kanji:
          omega_ruby: "アゴの　炎で　こぶしを　燃やして\n炎の　パンチを　繰り出す。\nとても　仲間思いの　ポケモン。"
          alpha_sapphire: "炎の　あごひげを　たくわえている。\nパワーと　スピードを　兼ね備えた\n格闘の　技を　身につけている。"
        en:
          omega_ruby: "It can throw a fire punch by setting its fists on fire\nwith its fiery chin. It cares deeply about its friends."
          alpha_sapphire: "It has mastered fast and powerful fighting moves.\nIt grows a beard of fire."
        fr:
          omega_ruby: "Il embrase ses poings avec les flammes sur son menton\net cogne l’ennemi avec. C’est un Pokémon très solidaire."
          alpha_sapphire: "Il a une barbe enflammée. Il maîtrise des techniques\nde combat au corps à corps rapides et puissantes."
        it:
          omega_ruby: "Infiamma i pugni sulla barba ardente, poi sferra attacchi\ndi fuoco sui nemici. Ha molta considerazione per i suoi simili."
          alpha_sapphire: "La sua barba è avvolta dalle fiamme. Padroneggia mosse\ndi lotta che combinano potenza e rapidità."
        de:
          omega_ruby: "Steckt mit dem Feuer um sein Kinn seine Fäuste in Brand und\nholt zu feurigen Fausthieben aus. Zeigt großen Teamgeist."
          alpha_sapphire: "Es trägt einen Backenbart aus Feuer und beherrscht\nKampftechniken, die ebenso wuchtig wie schnell sind."
        es:
          omega_ruby: "Calienta sus puños con las llamas de su barbilla para propinar\npuñetazos ardientes. Es muy fiel a sus compañeros."
          alpha_sapphire: "Posee una tupida barba fogosa. Es tanto rápido como\npoderoso, y su principal baza es la lucha cuerpo a cuerpo."
        ko:
          omega_ruby: "턱의 화염으로 주먹을 불태워\n불꽃펀치를 날린다.\n동료애가 깊은 포켓몬이다."
          alpha_sapphire: "불꽃 턱수염을 기르고 있다.\n파워와 스피드를 겸비한\n격투 기술을 익히고 있다."
oshawott:
  species_id: 501
  names:
    jp_kana: ミジュマル
    jp_kanji: ミジュマル
