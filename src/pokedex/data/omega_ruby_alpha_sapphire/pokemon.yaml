      descriptions:
        jp_kana:
          omega_ruby: "なんかい　たおされても　あきらめず　たちあがる。\nたちあがるたび　しんかするための　エネルギーが\nからだの　なかに　どんどん　たくわえられていく。"
          alpha_sapphire: "ぜったいに　あきらめない　こんじょうを　もつ。\nたくさん　たべ　よく　ねて　うんどうする　ことで\nからだの　なかに　エネルギーが　じゅうまんする。"
        jp_kanji:
          omega_ruby: "何回　倒されても　あきらめず　立ちあがる。\n立ちあがる度　進化するための　エネルギーが\n体の　中に　どんどん　蓄えられていく。"
          alpha_sapphire: "絶対に　あきらめない　根性を　持つ。\n沢山　食べ　よく　寝て　運動する　ことで\n体の　中に　エネルギーが　充満する。"
        en:
          omega_ruby: "Makuhita is tenacious—it will keep getting up and attacking\nits foe however many times it is knocked down. Every time it\ngets back up, this Pokémon stores more energy in its body\nfor evolving."
          alpha_sapphire: "Makuhita has a tireless spirit—it will never give up hope.\nIt eats a lot of food, gets plenty of sleep, and it trains very\nrigorously. By living that way, this Pokémon packs its body\nwith energy."
        fr:
          omega_ruby: "Makuhita est tenace. Même s’il est presque battu,\nil continue à se relever et à attaquer son ennemi.\nChaque fois qu’il se relève, ce Pokémon stocke plus\nd’énergie en vue de sa future évolution."
          alpha_sapphire: "Makuhita a un moral d’acier. Il ne désespère jamais.\nIl mange beaucoup, dort beaucoup et s’entraîne avec rigueur.\nSon hygiène de vie permet à ce Pokémon d’accumuler\nun maximum d’énergie."
        it:
          omega_ruby: "Makuhita è estremamente tenace: anche se messo al tappeto\npiù volte si rialza sempre e contrattacca. Ogni volta che\nsi rialza, questo Pokémon accumula ulteriore energia per\nla futura evoluzione."
          alpha_sapphire: "Makuhita è infaticabile, perseverante e non perde mai\nla speranza. Mangia molto, dorme molto e si allena con rigore.\nQuesto tenore di vita gli consente di essere sempre carico\ndi energia."
        de:
          omega_ruby: "Makuhita ist sehr zäh. Selbst wenn es im Kampf mehrfach\nniedergeschlagen wurde, steht es immer wieder auf und greift\nseinen Gegner an. Bei jedem Mal speichert es mehr Energie in\nseinem Körper für seine Entwicklung."
          alpha_sapphire: "Makuhitas Geist ist unbezwingbar. Es gibt die Hoffnung\nniemals auf. Es frisst eine Menge, bekommt viel Schlaf\nund trainiert unermüdlich. Dadurch füllt es seinen Körper\nmit Energie auf."
        es:
          omega_ruby: "Makuhita es tenaz. Da igual las veces que le venzan; volverá a\nponerse en pie y a atacar. De hecho, cada vez que se\nrecupera, acumula más energía para poder evolucionar."
          alpha_sapphire: "Makuhita tiene un ánimo inagotable. Nunca pierde la\nesperanza. Come mucho, duerme bastante y se entrena de\nforma metódica. Siguiendo estos hábitos de vida, este\nPokémon tiene siempre mucha energía."
        ko:
          omega_ruby: "몇 번을 쓰러져도 포기하지 않고 일어선다.\n일어설 때마다 진화를 위한 에너지가\n몸 안에 점점 비축되어간다."
          alpha_sapphire: "절대 포기하지 않는 근성을 지녔다.\n많이 먹고 잘 자고 운동하여\n몸 안에 에너지가 충만하다."
