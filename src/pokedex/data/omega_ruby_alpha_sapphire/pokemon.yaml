          alpha_sapphire: "しっぽから　くさい　しるを　とばす。\nおなかで　じゅくせいさせる　じかんが\nながいほど　においが　ひどくなる。"
        jp_kanji:
          omega_ruby: "尻尾の　先から　ひどい　においの\n液体を　飛ばして　攻撃する。\n飛距離は　５０メートル以上。"
          alpha_sapphire: "尻尾から　くさい　汁を　飛ばす。\nお腹で　熟成させる　時間が\n長いほど　においが　ひどくなる。"
        en:
          omega_ruby: "It sprays a vile-smelling fluid from the tip of its tail\nto attack. Its range is over 160 feet."
          alpha_sapphire: "It sprays a stinky fluid from its tail. The fluid smells\nworse the longer it is allowed to fester."
        fr:
          omega_ruby: "Il attaque en projetant un liquide fétide du bout de sa queue.\nIl peut tirer à 50 m."
          alpha_sapphire: "Sa queue projette un fluide puant. Plus on le laisse s’écouler\net plus son odeur est insoutenable."
        it:
          omega_ruby: "Attacca spruzzando un fluido puzzolente dalla coda. Ha un\nraggio d’azione di oltre 50 m."
          alpha_sapphire: "Spruzza un fluido puzzolente dalla coda. Quest’odore diventa\ninsopportabile se fatto suppurare."
        de:
          omega_ruby: "Über seine Schweifspitze versprüht es eine übelriechende\nSubstanz. Die Reichweite liegt bei über 50 m."
          alpha_sapphire: "Es spritzt eine stinkende Substanz aus seinem Schweif.\nHat sie lange gegärt, stinkt sie stärker."
        es:
          omega_ruby: "Para atacar, emite un fluido maloliente por la punta de su cola\nque puede llegar a más de 50 m."
          alpha_sapphire: "Emite un fluido apestoso por la cola. Cuanto más tiempo lo\ntiene fermentando en las tripas, peor huele."
        ko:
          omega_ruby: "꼬리 끝에서 심한 냄새가 나는\n액체를 뿌려 공격한다.\n사정거리는 50m 이상이다."
          alpha_sapphire: "꼬리에서 역한 분비액을 날린다.\n배에서 숙성된 시간이\n길수록 냄새가 심해진다."
bronzor:
  species_id: 436
  names:
    jp_kana: ドーミラー
    jp_kanji: ドーミラー
    en: Bronzor
    fr: Archéomire
    it: Bronzor
    de: Bronzel
    es: Bronzor
    ko: 동미러
  forms:
    bronzor:
      form_id: 0
      base_stats:
        hp: 57
        attack: 24
        defense: 86
        special_attack: 24
        special_defense: 86
        speed: 23
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - psychic
      egg_groups:
        - mineral
      abilities:
        - levitate
        - heatproof
