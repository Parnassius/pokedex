        jp_kana:
          omega_ruby: "なつの　おわりごろ　よるに　すなはまへ　いくと\nコアと　よばれる　きかんを　あかく　ひからせた\nヒトデマンが　ほしの　ように　みえるよ。"
          alpha_sapphire: "ちゅうしんの　あかい　コアを　てんめつさせて\nよぞらの　ほしと　こうしん　している　らしい。\nからだは　ちぎれても　じこさいせい　するぞ。"
        jp_kanji:
          omega_ruby: "夏の　終わりごろ　夜に　砂浜に　いくと\nコアと　呼ばれる　器官を　赤く　光らせた\nヒトデマンが　星の　ように　見えるよ。"
          alpha_sapphire: "中心の　赤い　コアを　点滅させて\n夜空の　星と　交信　している　らしい。\n体は　千切れても　自己再生　するぞ。"
        en:
          omega_ruby: "Staryu’s center section has an organ called the core that\nshines bright red. If you go to a beach toward the end of\nsummer, the glowing cores of these Pokémon look like the\nstars in the sky."
          alpha_sapphire: "Staryu apparently communicates with the stars in the night sky\nby flashing the red core at the center of its body. If parts of its\nbody are torn, this Pokémon simply regenerates the missing\npieces and limbs."
        fr:
          omega_ruby: "Au centre de Stari se trouve un organe rouge et brillant appelé\nle cœur. À la fin de l’été, sur les plages, les cœurs de ces\nPokémon brillent comme les étoiles dans le ciel."
          alpha_sapphire: "Stari communique apparemment avec les étoiles dans\nle ciel en faisant clignoter son cœur rouge. Si des parties\nde son corps sont cassées, ce Pokémon les régénère."
        it:
          omega_ruby: "Al centro del corpo di Staryu è presente un nucleo che brilla\ndi un rosso intenso. In spiaggia, a fine estate, il nucleo\ndi questi Pokémon ha l’aspetto delle stelle nel firmamento."
          alpha_sapphire: "Pare che la notte Staryu comunichi con le stelle facendo\nbrillare il suo nucleo rosso al centro del corpo. In caso di\nperdita di qualche appendice questo Pokémon riesce a\nrigenerarla senza problemi."
        de:
          omega_ruby: "In Sterndus Körpermitte befindet sich ein hellrot leuchtendes\nOrgan – sein Kern. Wenn du im Spätsommer an einen Strand\ngehst, sehen die leuchtenden Kerne dieser Pokémon aus wie\nSterne."
          alpha_sapphire: "Sterndu kommuniziert mit den Sternen am Nachthimmel,\nindem es den roten Kern in seiner Körpermitte blinken lässt.\nWenn Teile seines Körpers beschädigt wurden, stellt es die\nfehlenden Teile selbst wieder her."
        es:
          omega_ruby: "Staryu posee un órgano central, conocido como su núcleo,\nque brilla con una luz roja. A finales de verano, pueden verse\nen la playa los núcleos de estos Pokémon brillando como las\nestrellas del cielo."
          alpha_sapphire: "Staryu parece comunicarse por la noche con las estrellas\nhaciendo brillar el núcleo rojo de su cuerpo. Si este Pokémon\nsufre algún daño en alguna zona de su cuerpo, la regenerará\nsin problema."
        ko:
          omega_ruby: "여름이 끝날 무렵 밤에 모래 해변에 가면\n핵이라고 불리는 기관을 붉게 빛내는\n별가사리가 별처럼 보인다."
          alpha_sapphire: "가운데에 있는 빨간 코어를 점멸시켜\n밤하늘의 별과 교신하는 것 같다.\n몸은 찢겨 나가더라도 스스로 재생한다."
