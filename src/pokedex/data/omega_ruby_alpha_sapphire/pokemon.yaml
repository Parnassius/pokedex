        - blaze
      hidden_ability: thick_fat
      descriptions:
        jp_kana:
          omega_ruby: "てきの　こうげきを　みがるに　よけて\nはなから　ひのたまを　うちだす。\nほのおで　きのみを　やいて　たべる。"
          alpha_sapphire: "やいた　きのみを　たべるのが\nだいすきだが　こうふんしすぎて\nときどき　まっくろこげに　しちゃう。"
        jp_kanji:
          omega_ruby: "敵の　攻撃を　身軽に　避けて\n鼻から　火の玉を　撃ち出す。\n炎で　木の実を　焼いて　食べる。"
          alpha_sapphire: "焼いた　木の実を　食べるのが\n大好きだが　興奮しすぎて\nときどき　真っ黒焦げに　しちゃう。"
        en:
          omega_ruby: "It can deftly dodge its foe’s attacks while shooting\nfireballs from its nose. It roasts berries before it\neats them."
          alpha_sapphire: "It loves to eat roasted berries, but sometimes it\ngets too excited and burns them to a crisp."
        fr:
          omega_ruby: "Il évite agilement les attaques ennemies et crache des boules\nde feu par le groin. Il aime griller des Baies pour les manger."
          alpha_sapphire: "Il adore se goinfrer de Baies grillées, mais il lui arrive\nde les réduire en cendres dans son excitation."
        it:
          omega_ruby: "Lancia palle di fuoco dal naso mentre evita abilmente\ngli attacchi del nemico. Mangia bacche che arrostisce\nlui stesso."
          alpha_sapphire: "Adora mangiare le bacche arrostite, ma a volte si fa prendere\nla mano per l’eccitazione e le riduce in cenere."
        de:
          omega_ruby: "Weicht flink gegnerischen Angriffen aus und schießt Flammen\naus dem Rüssel, mit denen es gern auch mal Nüsse röstet."
          alpha_sapphire: "Floink liebt es, selbst geröstete Nüsse zu verspeisen.\nAb und zu verkohlt es sie jedoch ungewollt vor lauter\nVorfreude."
        es:
          omega_ruby: "Evita con agilidad los ataques enemigos. Lanza bolas de\nfuego por su hocico y tuesta bayas del bosque para comer."
          alpha_sapphire: "Le encanta comer bayas tostadas, pero a veces se emociona\ndemasiado y termina churruscándolas."
        ko:
          omega_ruby: "적의 공격을 가볍게 피하고\n코로 불구슬을 쏘아댄다.\n불꽃으로 나무열매를 구워 먹는다."
          alpha_sapphire: "구운 나무열매를 먹는 것을\n매우 좋아하지만 너무 흥분해서\n가끔 새까맣게 태워버린다."
pignite:
  species_id: 499
  names:
    jp_kana: チャオブー
    jp_kanji: チャオブー
    en: Pignite
    fr: Grotichon
    it: Pignite
    de: Ferkokel
    es: Pignite
    ko: 차오꿀
