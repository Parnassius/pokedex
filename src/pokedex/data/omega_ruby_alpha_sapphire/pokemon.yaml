          alpha_sapphire: "ぜんしんに　すなを　まとうことで\nばいきんから　からだを　まもる。\nみずに　ぬれることが　にがて。"
        jp_kanji:
          omega_ruby: "乾燥した　土地で　暮らす。\n汗の　かわりに　砂粒を\n体から　分泌する　ポケモン。"
          alpha_sapphire: "全身に　砂を　まとうことで\nばい菌から　体を　守る。\n水に　ぬれることが　苦手。"
        en:
          omega_ruby: "It lives in arid places. Instead of perspiration,\nit expels grainy sand from its body."
          alpha_sapphire: "It enshrouds itself with sand to protect itself from\ngerms. It does not enjoy getting wet."
        fr:
          omega_ruby: "Il vit dans des endroits arides. Il exsude du sable granuleux\nau lieu de transpirer."
          alpha_sapphire: "Il se recouvre de sable pour se protéger des microbes.\nIl n’aime pas l’eau."
        it:
          omega_ruby: "Vive in territori aridi. Invece del sudore, espelle dal corpo\nsabbia granulosa."
          alpha_sapphire: "Si ricopre di sabbia per proteggersi dai germi.\nNon ama bagnarsi."
        de:
          omega_ruby: "Es lebt in ausgetrockneten Gebieten. Statt zu schwitzen,\nsondert sein Körper Sand ab."
          alpha_sapphire: "Es bedeckt sich mit Sand, um sich vor Keimen zu schützen.\nEs mag es gar nicht, wenn es nass wird."
        es:
          omega_ruby: "Vive en zonas áridas. En lugar de sudar, su cuerpo expulsa\ngranos de arena."
          alpha_sapphire: "Se embadurna de arena para protegerse de los gérmenes.\nNo le gusta mojarse."
        ko:
          omega_ruby: "건조한 땅에서 산다.\n땀 대신 모래알을\n몸에서 분비하는 포켓몬이다."
          alpha_sapphire: "전신에 모래를 둘러서\n세균으로부터 몸을 보호한다.\n물에 젖는 것을 싫어한다."
hippowdon:
  species_id: 450
  names:
    jp_kana: カバルドン
    jp_kanji: カバルドン
    en: Hippowdon
    fr: Hippodocus
    it: Hippowdon
    de: Hippoterus
    es: Hippowdon
    ko: 하마돈
  forms:
    hippowdon:
      form_id: 0
      base_stats:
        hp: 108
        attack: 112
        defense: 118
        special_attack: 68
        special_defense: 72
        speed: 47
      evs_yield:
        hp: 0
        attack: 0
