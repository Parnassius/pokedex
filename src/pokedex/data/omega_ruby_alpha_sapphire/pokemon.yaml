      descriptions:
        jp_kana:
          omega_ruby: "きにいらないと　ツメを　たてるが\nたまに　のどを　ならして　あまえる\nせいかくが　いちぶに　だいにんきだ。"
          alpha_sapphire: "ごきげんな　ニャルマーは　しっぽで\nしんたいそうの　リボンの　ような\nうつくしい　うごきを　みせる。"
        jp_kanji:
          omega_ruby: "気に入らないと　ツメを　立てるが\nたまに　のどを　鳴らして\n甘える　性格が　一部に　大人気だ。"
          alpha_sapphire: "ご機嫌な　ニャルマーは　尻尾で\n新体操の　リボンのような\n美しい　動きを　見せる。"
        en:
          omega_ruby: "It claws if displeased and purrs when affectionate.\nIts fickleness is very popular among some."
          alpha_sapphire: "When it’s happy, Glameow demonstrates beautiful\nmovements of its tail, like a dancing ribbon."
        fr:
          omega_ruby: "Il griffe quand il est en colère et ronronne quand\nil est heureux. Certains aiment ce côté lunatique."
          alpha_sapphire: "Lorsqu’il est heureux, sa queue décrit des arabesques\ncomme un ruban de gymnastique rythmique."
        it:
          omega_ruby: "Se disturbato, tira fuori gli artigli; se soddisfatto, fa le fusa.\nLa sua incostanza piace a molti."
          alpha_sapphire: "Il lunatico Glameow fa sinuosi movimenti di coda che ricordano\ni nastri della ginnastica artistica."
        de:
          omega_ruby: "Es schlägt mit Krallen zu oder schnurrt, je nachdem,\nob es gerade wütend oder zutraulich ist."
          alpha_sapphire: "Je nach Laune lässt es seinen Schweif anmutig wirbeln,\nganz wie das Band eines Sportgymnasten."
        es:
          omega_ruby: "Araña cuando está enfadado y ronronea cuando está cariñoso.\nSu imprevisibilidad es famosa."
          alpha_sapphire: "Dependiendo de su humor, mueve grácilmente su cola, que\nse asemeja a un lazo de gimnasia rítmica."
        ko:
          omega_ruby: "마음에 안 들면 발톱을 세우지만\n가끔 울음소리로 응석을 부리는\n성격이 일부에게 매우 인기가 있다."
          alpha_sapphire: "기분이 좋은 나옹마는 꼬리로\n리듬 체조의 리본처럼\n아름다운 움직임을 보인다."
purugly:
  species_id: 432
  names:
    jp_kana: ブニャット
    jp_kanji: ブニャット
    en: Purugly
    fr: Chaffreux
    it: Purugly
    de: Shnurgarst
    es: Purugly
    ko: 몬냥이
  forms:
    purugly:
      form_id: 0
      base_stats:
        hp: 71
        attack: 82
        defense: 64
        special_attack: 64
        special_defense: 59
