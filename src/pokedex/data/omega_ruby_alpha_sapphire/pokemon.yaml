  species_id: 262
  names:
    jp_kana: グラエナ
    jp_kanji: グラエナ
    en: Mightyena
    fr: Grahyèna
    it: Mightyena
    de: Magnayen
    es: Mightyena
    ko: 그라에나
  forms:
    mightyena:
      form_id: 0
      base_stats:
        hp: 70
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 60
        speed: 70
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - quick_feet
      hidden_ability: moxie
      descriptions:
        jp_kana:
          omega_ruby: "どうもうな　うなりごえを　あげながら　しせいを\nひくく　している　ときは　こうげきの　まえぶれ。\nするどく　とがった　キバで　がぶりと　かみつく。"
          alpha_sapphire: "グループで　こうどうしていた　やせいの　ちが\nのこっているので　すぐれた　トレーナー　だけを\nリーダーと　みとめて　めいれいに　したがう。"
        jp_kanji:
          omega_ruby: "どう猛な　うなり声を　あげながら　姿勢を\n低く　している　ときは　攻撃の　前触れ。\n鋭く　とがった　キバで　がぶりと　かみつく。"
          alpha_sapphire: "グループで　行動していた　野生の　血が\n残っているので　優れた　トレーナー　だけを\nリーダーと　認めて　命令に　従う。"
        en:
          omega_ruby: "Mightyena gives obvious signals when it is preparing to attack.\nIt starts to growl deeply and then flattens its body.\nThis Pokémon will bite savagely with its sharply pointed fangs."
          alpha_sapphire: "Mightyena travel and act as a pack in the wild. The memory\nof its life in the wild compels the Pokémon to obey only\nthose Trainers that it recognizes to possess superior skill."
        fr:
          omega_ruby: "On peut facilement deviner quand Grahyèna se prépare à\nattaquer. Il grogne et se met à plat ventre. Ce Pokémon mord\nsauvagement ses ennemis avec ses crocs acérés."
          alpha_sapphire: "Les Grahyèna vivent et se déplacent en meute.\nLeurs réminiscences de la vie sauvage les poussent à n’obéir\nqu’aux Dresseurs qu’ils considèrent comme réellement\ntalentueux."
        it:
          omega_ruby: "Mightyena invia chiari segnali quando sta preparando\nun attacco. Inizia a ringhiare cupo e si appiattisce.\nMorde selvaggiamente con le zanne appuntite e affilate."
          alpha_sapphire: "Allo stato brado Mightyena si sposta e agisce soltanto\nassieme al suo branco. A causa della sua natura selvatica\nobbedisce solo a quegli Allenatori che considera possedere\nabilità superiori."
        de:
          omega_ruby: "Magnayen sendet deutliche Signale aus, wenn es sich auf\neinen Angriff vorbereitet. Es knurrt heftig und macht sich flach.\nDieses Pokémon kann mit seinen spitzen Zähnen brutal\nzubeißen."
          alpha_sapphire: "Magnayen zieht in Gruppen durch die Wildnis.\nDurch seine Erfahrungen in der Wildnis hört es nur\nauf Trainer, die außergewöhnliche Fähigkeiten haben."
        es:
          omega_ruby: "Es muy fácil prever cuándo va a atacar Mightyena; se pone\na gruñir con fuerza y se estira. Este Pokémon da unos\nmordiscos tremendos con los afilados colmillos que tiene."
          alpha_sapphire: "Mightyena se desplaza y vive con su jauría en estado salvaje.\nPor eso, acostumbrado a esta libertad, obedece al Entrenador\nal que considere realmente dotado de habilidades superiores\nal resto."
        ko:
          omega_ruby: "사납게 으르렁거리는 소리를 내며 자세를\n낮추고 있는 것은 공격의 전조이다.\n날카롭고 뾰족한 이빨로 덥석 문다."
          alpha_sapphire: "그룹으로 행동하던 야생의 피가\n남아 있어서 우수한 트레이너만을\n리더로서 인정하고 명령을 따른다."
