          alpha_sapphire: "生まれて　すぐは　立ちあがるのも　やっとだが\n転びながら　親の　後を　追いかけている\nうちに　丈夫な　足腰に　育つのだ。"
        en:
          omega_ruby: "Ponyta is very weak at birth. It can barely stand up.\nThis Pokémon becomes stronger by stumbling and falling to\nkeep up with its parent."
          alpha_sapphire: "Ponyta is very weak at birth. It can barely stand up.\nThis Pokémon becomes stronger by stumbling and\nfalling to keep up with its parent."
        fr:
          omega_ruby: "À sa naissance, Ponyta est très faible. Il peut à peine tenir\ndebout. Ce Pokémon se muscle en trébuchant et en tombant,\nlorsqu’il essaie de suivre ses parents."
          alpha_sapphire: "À sa naissance, Ponyta est très faible. Il peut à peine tenir\ndebout. Ce Pokémon se muscle en trébuchant et en tombant,\nlorsqu’il essaie de suivre ses parents."
        it:
          omega_ruby: "Ponyta è molto debole alla nascita e riesce a malapena\na reggersi in piedi. Poi si rinforza a furia di inciampare\ne cadere, cercando di tenere il passo dei suoi genitori."
          alpha_sapphire: "Ponyta è molto debole alla nascita e riesce a malapena\na reggersi in piedi. Poi si rinforza a furia di inciampare\ne cadere, cercando di tenere il passo dei suoi genitori."
        de:
          omega_ruby: "Nach seiner Geburt ist Ponita so schwach, dass es kaum von\nalleine aufstehen kann. Dieses Pokémon wird dadurch schnell\nstärker, dass es sich beim Versuch, mit seinen Eltern Schritt\nzu halten, immer wieder aufrappeln muss."
          alpha_sapphire: "Nach seiner Geburt ist Ponita sehr schwach. Es braucht sehr\nlange, bis es auf allen Vieren steht. Dieses Pokémon wird\nstärker, da es bei dem Versuch, mit seinen Eltern Schritt zu\nhalten, immer wieder stolpert und hinfällt."
        es:
          omega_ruby: "Al nacer, Ponyta es muy débil y apenas puede ponerse en pie.\nCon todo, se va haciendo más fuerte al tropezarse y caerse\nen su intento por seguir a sus progenitores."
          alpha_sapphire: "Al nacer, Ponyta es muy débil y apenas puede ponerse en pie.\nCon todo, se va haciendo más fuerte al tropezarse y caerse\nen su intento por seguir a sus progenitores."
        ko:
          omega_ruby: "막 태어나서는 겨우 설 수 있는 정도지만\n넘어지면서 부모의 뒤를 쫓아다니는\n동안 하반신이 튼튼하게 자라난다."
          alpha_sapphire: "막 태어나서는 겨우 설 수 있는 정도지만\n넘어지면서 부모의 뒤를 쫓아다니는\n동안 하반신이 튼튼하게 자라난다."
