          omega_ruby: "あたりの　くうきを　ひやして\nこおりの　つぶを　はっせい　させて\nてきの　からだを　こおりつかせる。"
          alpha_sapphire: "ゆきやまに　せいそくする　ポケモン。\nおおむかし　ひょうがきの　ときに\nみなみの　とちへ　いどうしてきた。"
        jp_kanji:
          omega_ruby: "辺りの　空気を　冷やして\n氷の　粒を　発生　させて\n敵の　体を　凍りつかせる。"
          alpha_sapphire: "雪山に　生息する　ポケモン。\n大昔　氷河期の　ときに\n南の　土地に　移動してきた。"
        en:
          omega_ruby: "They cool down the surrounding air and create ice\nparticles, which they use to freeze their foes."
          alpha_sapphire: "Snowy mountains are this Pokémon’s habitat.\nDuring an ancient ice age, they moved to\nsouthern areas."
        fr:
          omega_ruby: "Il pétrifie ses ennemis en refroidissant l’air ambiant et en le\nchangeant en une myriade de petites particules de glace."
          alpha_sapphire: "Un Pokémon qui vit dans les montagnes enneigées.\nIl a émigré au sud durant l’ère glaciaire, il y a bien\nlongtemps."
        it:
          omega_ruby: "Congela il corpo del nemico con granelli di ghiaccio che\ngenera raffreddando l’aria circostante."
          alpha_sapphire: "Vive sulle montagne innevate. Durante le antiche glaciazioni\nsi è spostato nelle regioni del sud."
        de:
          omega_ruby: "Es produziert Eiskörner, indem es die Luft um sich herum\nabkühlt, und zieht mit ihnen eine Eisschicht um seinen Gegner."
          alpha_sapphire: "Es lebt auf schneebedeckten Bergen. Vor vielen Jahren fand\nes während einer Eiszeit seinen Weg in den Süden."
        es:
          omega_ruby: "Enfrían el aire a su alrededor y crean partículas de hielo\nmediante las cuales congelan a sus oponentes."
          alpha_sapphire: "Vive en las cumbres nevadas. Migró hacia el sur durante la era\nglaciar hace muchísimos años."
        ko:
          omega_ruby: "주변 공기를 차갑게 해서\n얼음 알갱이를 발생시켜서\n상대의 몸을 얼려버린다."
          alpha_sapphire: "설산에 서식하는 포켓몬이다.\n먼 옛날 빙하기 때\n남쪽 땅으로 이동해 왔다."
vanilluxe:
  species_id: 584
  names:
    jp_kana: バイバニラ
    jp_kanji: バイバニラ
    en: Vanilluxe
    fr: Sorbouboul
    it: Vanilluxe
    de: Gelatwino
    es: Vanilluxe
    ko: 배바닐라
  forms:
    vanilluxe:
      form_id: 0
      base_stats:
        hp: 71
        attack: 95
        defense: 85
        special_attack: 110
        special_defense: 95
        speed: 79
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          omega_ruby: "２つの　あたまが　どうじに　おこると\nツノから　もうふぶきを　ふきだす。\nあたりを　おおゆきで　うめてしまう。"
          alpha_sapphire: "たいりょうの　みずを　のみこんで\nからだのなかで　ゆきぐもに　かえる。\nおこると　もうふぶきを　まきおこす。"
        jp_kanji:
          omega_ruby: "２つの　頭が　同時に　怒ると\nツノから　猛吹雪を　噴き出す。\nあたりを　大雪で　埋めてしまう。"
          alpha_sapphire: "大量の　水を　飲みこんで\n体の中で　雪雲に　変える。\n怒ると　猛吹雪を　まきおこす。"
        en:
          omega_ruby: "If both heads get angry simultaneously, this\nPokémon expels a blizzard, burying everything\nin snow."
          alpha_sapphire: "Swallowing large amounts of water, they make\nsnow clouds inside their bodies and, when angry,\ncause violent blizzards."
        fr:
          omega_ruby: "Quand ses deux têtes se fâchent en même temps,\nil émet un blizzard de ses cornes et enfouit les alentours\nsous la neige."
          alpha_sapphire: "Il avale de grandes quantités d’eau et la transforme en nuages\nde neige. Il souffle du blizzard quand il se fâche."
        it:
          omega_ruby: "Se le due teste si arrabbiano allo stesso tempo, scatena\nuna bufera dalle corna, coprendo di neve i dintorni."
          alpha_sapphire: "Ingoia enormi quantità d’acqua che trasforma in nuvole\ndi neve. Quando si arrabbia scatena una terribile bufera."
        de:
          omega_ruby: "Bringt man beide Köpfe in Rage, stößt sein Horn heftige\nEisböen aus, und alles in seiner Umgebung versinkt in Schnee."
          alpha_sapphire: "Es verschluckt Unmengen an Wasser und wandelt es intern in\nSchneewolken um. Ist es wütend, erzeugt es Schneestürme."
        es:
          omega_ruby: "Si sus dos cabezas se irritan al mismo tiempo, genera una\nventisca desde su cuerno cubriendo su entorno con nieve."
          alpha_sapphire: "Absorben grandes cantidades de agua y la transforman en\nventisca en su cuerpo, expulsándola cuando se enojan."
        ko:
          omega_ruby: "두 개의 머리가 동시에 화를 내면\n뿔에서 강한 눈보라가 뿜어져 나온다.\n주변을 많은 눈으로 묻어 버린다."
          alpha_sapphire: "대량의 물을 들이마셔\n몸 안에서 눈구름으로 바꾼다.\n화나면 강한 눈보라를 일으킨다."
deerling:
  species_id: 585
  names:
    jp_kana: シキジカ
    jp_kanji: シキジカ
    en: Deerling
    fr: Vivaldaim
    it: Deerling
    de: Sesokitz
    es: Deerling
    ko: 사철록
  forms:
    deerling_spring_form:
      form_id: 0
      names:
        jp_kana: はるのすがた
        jp_kanji: はるのすがた
        en: Spring Form
        fr: Forme Printemps
        it: Forma Primavera
        de: Frühlingsform
        es: Forma Primavera
        ko: 봄의 모습
      base_stats:
        hp: 60
        attack: 60
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 75
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
        - grass
      egg_groups:
        - field
      abilities:
        - chlorophyll
        - sap_sipper
      hidden_ability: serene_grace
      descriptions:
        jp_kana:
          omega_ruby: "きせつが　かわったとき　だけでなく\nきおんや　しつどに　よっても\nからだのいろは　すこし　へんかする。"
          alpha_sapphire: "きせつの　かわりめに　なると\nたいもうと　においが　へんかする。\nきせつを　つげる　ポケモン。"
        jp_kanji:
          omega_ruby: "季節が　変わったとき　だけでなく\n気温や　湿度に　よっても\n体の色は　少し　変化する。"
          alpha_sapphire: "季節の　変わり目に　なると\n体毛と　においが　変化する。\n季節を　告げる　ポケモン。"
        en:
          omega_ruby: "Their coloring changes according to the seasons\nand can be slightly affected by the temperature and\nhumidity as well."
          alpha_sapphire: "The turning of the seasons changes the color and\nscent of this Pokémon’s fur. People use it to mark\nthe seasons."
        fr:
          omega_ruby: "Son pelage change selon la saison, et dans une moindre\nmesure en fonction de l’humidité et de la température."
          alpha_sapphire: "Quand la saison change, il change de pelage et d’odeur.\nUn Pokémon qui annonce le passage des saisons."
        it:
          omega_ruby: "Il suo corpo muta non solo a seconda della stagione ma in\nmisura minore anche al cambiare di temperatura e umidità."
          alpha_sapphire: "Al cambio di stagione, muta la pelliccia e l’odore. È un\nPokémon che annuncia il passaggio delle stagioni."
        de:
          omega_ruby: "Unabhängig von der Jahreszeit ändert sich seine Farbe auch\nbei wechselnder Temperatur oder Luftfeuchtigkeit leicht."
          alpha_sapphire: "Sein Fell und sein Geruch ändern sich mit dem Wechsel\nder Jahreszeiten. Es ist der Bote des Saisonwechsels."
        es:
          omega_ruby: "El color de su cuerpo cambia no solo con las estaciones, sino\ntambién con los cambios de humedad y temperatura."
          alpha_sapphire: "Durante los cambios de estación, su pelaje y olor cambian.\nEsto anuncia el comienzo de una estación."
        ko:
          omega_ruby: "계절이 바뀌었을 때뿐 아니라\n기온이나 습도에 따라서도\n몸의 색깔은 조금 변한다."
          alpha_sapphire: "계절이 바뀌는 시기가 되면\n털과 냄새가 변화한다.\n계절을 알리는 포켓몬이다."
