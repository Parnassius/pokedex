      descriptions:
        jp_kana:
          omega_ruby: "わたぐもに　まぎれて　おおぞらを　まう。\nすきとおった　こえで　メロディを　さえずれば\nみみにした　ものは　うっとり　ゆめごこち。"
          alpha_sapphire: "うつくしい　ソプラノで　うたう　ポケモン。\nわたぐもの　ような　つばさで　じょうしょう\nきりゅうを　うけて　おおぞらへ　まいあがる。"
        jp_kanji:
          omega_ruby: "綿雲に　紛れて　大空を　舞う。\n透き通った　声で　メロディを　さえずれば\n耳にした　ものは　うっとり　夢心地。"
          alpha_sapphire: "美しい　ソプラノで　歌う　ポケモン。\n綿雲の　ような　翼で　上昇\n気流を　受けて　大空へ　舞い上がる。"
        en:
          omega_ruby: "Altaria dances and wheels through the sky among billowing,\ncotton-like clouds. By singing melodies in its crystal-clear\nvoice, this Pokémon makes its listeners experience dreamy\nwonderment."
          alpha_sapphire: "Altaria sings in a gorgeous soprano. Its wings are like cotton\nclouds. This Pokémon catches updrafts with its buoyant wings\nand soars way up into the wild blue yonder."
        fr:
          omega_ruby: "Altaria danse et tournoie dans les cieux, au milieu\ndes nuages gonflés et cotonneux. Ce Pokémon chante\ndes mélodies de sa voix cristalline pour offrir aux auditeurs\nune expérience merveilleuse et inoubliable."
          alpha_sapphire: "Altaria chante avec une magnifique voix de soprano. Ses ailes\nressemblent à des nuages cotonneux. Ce Pokémon se laisse\nporter par les courants d’air ascendants et disparaît dans\nle bleu du ciel."
        it:
          omega_ruby: "Altaria danza e volteggia nel cielo tra le nubi soffici come\nbatuffoli di cotone. Cantando con la sua voce cristallina,\nriesce a mandare in onirica estasi chi lo ascolta."
          alpha_sapphire: "Altaria canta con una sublime voce di soprano. Le sue ali\nspumeggianti, che sembrano nubi di cotone, gli consentono\ndi sfruttare le correnti ascensionali e di risalire verso l’infinito\ncielo blu."
        de:
          omega_ruby: "Altaria tanzt und dreht sich in der Luft durch viele\nSchäfchenwolken. Indem es mit seiner kristallklaren\nStimme Melodien singt, versetzt es seine Zuhörer in\nverträumtes Erstaunen."
          alpha_sapphire: "Altaria hat eine tolle Sopran-Stimme. Seine Flügel sehen aus\nwie Schäfchenwolken. Dieses Pokémon stürzt sich in einen\nAufwind und steigt in den Himmel empor."
        es:
          omega_ruby: "Altaria baila y revolotea por el cielo entre ondeantes nubes\nque parecen de algodón. Al entonar melodías con su voz\ncristalina, este Pokémon deja a sus oyentes embobados y\nadmirados."
          alpha_sapphire: "Altaria canta de maravilla, como una soprano. Tiene unas alas\nque parecen nubes de algodón. Este Pokémon aprovecha las\ncorrientes ascendentes y remonta el vuelo con sus flamantes\nalas hacia la inmensidad del cielo azul."
        ko:
          omega_ruby: "뭉게구름에 뒤섞여 넓은 하늘을 떠돈다.\n맑은 목소리로 멜로디를 지저귀면\n그 소리를 들은 자들은 꿈꾸는 듯한 기분이 된다."
          alpha_sapphire: "아름다운 소프라노 음색으로 노래하는 포켓몬이다.\n솜구름 같은 날개로 상승기류를\n타고 넓은 하늘로 날아오른다."
zangoose:
  species_id: 335
  names:
    jp_kana: ザングース
    jp_kanji: ザングース
    en: Zangoose
    fr: Mangriff
    it: Zangoose
    de: Sengo
    es: Zangoose
    ko: 쟝고
  forms:
    zangoose:
      form_id: 0
      base_stats:
        hp: 73
        attack: 115
        defense: 60
        special_attack: 60
        special_defense: 60
