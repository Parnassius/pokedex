        - torrent
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          omega_ruby: "ながれるような　たちさばきで\n２まいの　ホタチを　あつかう　わざは\nきびしい　しゅぎょうで　みにつける。"
          alpha_sapphire: "きびしい　しゅぎょうの　すえ\nフタチマルごとに　ことなる　かたの\nホタチさばきを　しゅうとく　する。"
        jp_kanji:
          omega_ruby: "流れるような　太刀さばきで\n２枚の　ホタチを　あつかう　技は\nきびしい　修業によって　身につける。"
          alpha_sapphire: "きびしい　修業の　すえ\nフタチマルごとに　異なる　型の\nホタチさばきを　習得する。"
        en:
          omega_ruby: "Strict training is how it learns its flowing\ndouble-scalchop technique."
          alpha_sapphire: "As a result of strict training, each Dewott learns\ndifferent forms for using the scalchops."
        fr:
          omega_ruby: "L’apprentissage de sa technique de combat, qui utilise\nélégamment ses deux coupillages, est extrêmement rigoureux."
          alpha_sapphire: "Chaque Mateloutre a sa propre technique d’escrime\nau coupillage, acquise grâce à un entraînement drastique."
        it:
          omega_ruby: "Ha appreso tramite un durissimo allenamento l’arte di\nmaneggiare le sue due conchiglie come fossero lame."
          alpha_sapphire: "Le loro conchiglie sono tutte diverse nella forma e ogni\nDewott si allena duramente per imparare a usarle."
        de:
          omega_ruby: "Es eignet sich durch strenges Training elegant ineinander\nübergehende Attacken mit seinen zwei Muscheln an."
          alpha_sapphire: "Jedes Zwottronin eignet sich über strenges Training einen\nvöllig eigenen Muschelkampfstil an."
        es:
          omega_ruby: "Gran espadachín. Utiliza sus dos vieiras con soltura al ejecutar\nlas técnicas que aprende con una disciplina espartana."
          alpha_sapphire: "Tras un exhaustivo entrenamiento, Dewott puede dominar\ndiversas técnicas para usar con sus vieiras."
        ko:
          omega_ruby: "물 흐르는 듯한 칼 솜씨로\n2개의 가리비칼을 사용하는 기술은\n엄격한 수련을 통해 익힌 것이다."
          alpha_sapphire: "혹독한 수행 끝에\n쌍검자비마다 다른 형태의\n가리비칼 다루는 기술을 습득한다."
