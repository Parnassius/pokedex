          omega_ruby: "いつも　あばれて　いないと　きが　すまない。\nたたかう　あいてが　いない　ときは　たいぼくに\nぶちあたり　なぎたおす　ことで　きを　しずめる。"
          alpha_sapphire: "いつも　あばれて　いないと　きが　すまない。\nたたかう　あいてが　いない　ときは　たいぼくに\nぶちあたり　なぎたおす　ことで　きを　しずめる。"
        jp_kanji:
          omega_ruby: "いつも　暴れて　いないと　気が　すまない。\n戦う　相手が　いない　ときは　大木に\nぶち当たり　なぎ倒す　ことで　気を　静める。"
          alpha_sapphire: "いつも　暴れて　いないと　気が　すまない。\n戦う　相手が　いない　ときは　大木に\nぶち当たり　なぎ倒す　ことで　気を　静める。"
        en:
          omega_ruby: "This Pokémon is not satisfied unless it is rampaging at all\ntimes. If there is no opponent for Tauros to battle, it will\ncharge at thick trees and knock them down to calm itself."
          alpha_sapphire: "This Pokémon is not satisfied unless it is rampaging at all\ntimes. If there is no opponent for Tauros to battle, it will\ncharge at thick trees and knock them down to calm itself."
        fr:
          omega_ruby: "Ce Pokémon n’est pas satisfait s’il ne détruit pas tout sur\nson passage. Lorsque Tauros ne trouve pas d’adversaire,\nil se rue sur de gros arbres et les déracine pour passer\nses nerfs."
          alpha_sapphire: "Ce Pokémon n’est pas satisfait s’il ne détruit pas tout sur\nson passage. Lorsque Tauros ne trouve pas d’adversaire,\nil se rue sur de gros arbres et les déracine pour passer\nses nerfs."
        it:
          omega_ruby: "Questo Pokémon è molto insofferente e sempre alla ricerca\ndella rissa. Se non trova un avversario con cui lottare,\nTauros si lancia contro grossi tronchi per abbatterli e calmarsi."
          alpha_sapphire: "Questo Pokémon è molto insofferente e sempre alla ricerca\ndella rissa. Se non trova un avversario con cui lottare,\nTauros si lancia contro grossi tronchi per abbatterli e calmarsi."
        de:
          omega_ruby: "Dieses Pokémon ist nur zufrieden, wenn es kämpfen kann.\nWenn Tauros keinen Gegner findet, sucht es sich robuste\nBäume und haut sie um, um sich abzureagieren."
          alpha_sapphire: "Dieses Pokémon ist nur zufrieden, wenn es kämpfen kann.\nWenn Tauros keinen Gegner findet, sucht es sich robuste\nBäume und haut sie um, um sich abzureagieren."
        es:
          omega_ruby: "Este Pokémon no está contento a menos que esté\ncontinuamente de aquí para allá. Si no hay rival que luche\ncontra Tauros, se estampa contra árboles grandes para\ncalmarse y los embiste para echarlos abajo."
          alpha_sapphire: "Este Pokémon no está contento a menos que esté\ncontinuamente de aquí para allá. Si no hay rival que luche\ncontra Tauros, se estampa contra árboles grandes para\ncalmarse y los embiste para echarlos abajo."
        ko:
          omega_ruby: "항상 날뛰지 않으면 성에 차지 않는다.\n싸울 상대가 없을 때는 큰 나무를\n들이받아 쓰러트리고 맘을 가라앉힌다."
          alpha_sapphire: "항상 날뛰지 않으면 성에 차지 않는다.\n싸울 상대가 없을 때는 큰 나무를\n들이받아 쓰러트리고 맘을 가라앉힌다."
magikarp:
  species_id: 129
  names:
    jp_kana: コイキング
    jp_kanji: コイキング
    en: Magikarp
    fr: Magicarpe
    it: Magikarp
    de: Karpador
    es: Magikarp
    ko: 잉어킹
  forms:
    magikarp:
      form_id: 0
      base_stats:
        hp: 20
        attack: 10
        defense: 55
        special_attack: 15
        special_defense: 20
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_2
        - dragon
      abilities:
        - swift_swim
      hidden_ability: rattled
      descriptions:
        jp_kana:
          omega_ruby: "はねる　ことしか　しない　なさけない　ポケモン。\nなぜ　はねるのか　しらべた　けんきゅうしゃが\nいるほど　とにかく　はねて　はねて　はねまくる。"
          alpha_sapphire: "はねている　だけで　まんぞくに　たたかえないため\nよわいと　おもわれているが　どんなに　よごれた\nみずでも　くらせる　しぶとい　ポケモンなのだ。"
        jp_kanji:
          omega_ruby: "跳ねる　ことしか　しない　情けない　ポケモン。\nなぜ　跳ねるのか　調べた　研究者が\nいるほど　とにかく　跳ねて　跳ねて　跳ねまくる。"
          alpha_sapphire: "跳ねている　だけで　満足に　戦えないため\n弱いと　思われているが　どんなに　汚れた\n水でも　暮らせる　しぶとい　ポケモンなのだ。"
        en:
          omega_ruby: "Magikarp is a pathetic excuse for a Pokémon that is only\ncapable of flopping and splashing. This behavior prompted\nscientists to undertake research into it."
          alpha_sapphire: "Magikarp is virtually useless in battle as it can only splash\naround. As a result, it is considered to be weak. However,\nit is actually a very hardy Pokémon that can survive in any\nbody of water no matter how polluted it is."
        fr:
          omega_ruby: "Magicarpe est un Pokémon ridicule qui ne sait faire que\ndes ronds dans l’eau ou se laisser porter par les courants.\nSon comportement a donné envie aux savants d’étudier\nson cas."
          alpha_sapphire: "Magicarpe est virtuellement inutile en combat. Il se contente\nde faire des ronds dans l’eau. On le considère plutôt faible.\nPourtant, ce Pokémon est très robuste et peut survivre\ndans n’importe quel environnement, même très pollué."
        it:
          omega_ruby: "Magikarp è un patetico esempio di Pokémon capace soltanto\ndi dimenarsi e sguazzare. La natura di questo comportamento\ninutile è oggetto di studi da parte del mondo scientifico."
          alpha_sapphire: "Nella lotta Magikarp è inutile, poiché può solo sguazzare.\nInfatti è considerato debole. In realtà si tratta di un Pokémon\nmolto robusto che sopravvive in tutte le acque, anche le più\ninquinate."
        de:
          omega_ruby: "Karpador ist ein armseliges Pokémon, das nur platschen kann.\nSein merkwürdiges Verhalten hat so manchen Wissenschaftler\nzum Forschen angeregt."
          alpha_sapphire: "Karpador ist im Kampf praktisch nutzlos, da es nur\nplatschen kann. Daher wird es als schwach eingeschätzt.\nEs ist aber tatsächlich sehr robust und kann in jedem\nGewässer überleben, egal, wie verseucht dieses ist."
        es:
          omega_ruby: "Magikarp es el triste ejemplo de un Pokémon capaz\núnicamente de saltar y salpicar. Esta conducta llevó a\ncientíficos a estudiarlo en profundidad."
          alpha_sapphire: "Magikarp es prácticamente inútil en combate; solo sirve para\nsalpicar, y se le considera muy débil. Con todo, en realidad\nes un Pokémon muy resistente. Sobrevive en cualquier medio\nacuático, aunque esté contaminado."
        ko:
          omega_ruby: "튀어 오르기만 하는 한심한 포켓몬이다.\n왜 튀어 오르는지 조사한 연구자가\n있을 정도로 무조건 튀고 튀고 튀어 오르기만 한다."
          alpha_sapphire: "튀어오르기만으로는 만족스럽게 싸울 수 없어서\n약하다고 여겨지고 있지만 아무리 더러워진\n물에서라도 살 수 있는 끈질긴 포켓몬이다."
