        - ice
        - ghost
      egg_groups:
        - fairy
        - mineral
      abilities:
        - snow_cloak
      hidden_ability: cursed_body
      descriptions:
        jp_kana:
          omega_ruby: "マイナス５０どの　れいきを　はいて\nあいてを　こおらせる。どうたいに\nみえる　ぶぶんは　じつは　くうどう。"
          alpha_sapphire: "ゆきやまで　そうなんした　じょせいの\nうまれかわりという　いいつたえが\nゆきの　おおい　とちに　のこる。"
        jp_kanji:
          omega_ruby: "マイナス５０度の　冷気を　吐いて\n相手を　凍らせる。胴体に　見える\n部分は　じつは　空洞。"
          alpha_sapphire: "雪山で　遭難した　女性の\n生まれ変わりという　言い伝えが\n雪の　多い　土地に　残る。"
        en:
          omega_ruby: "It freezes foes with an icy breath nearly\n-60 degrees Fahrenheit. What seems to be its body\nis actually hollow."
          alpha_sapphire: "Legends in snowy regions say that a woman who\nwas lost on an icy mountain was reborn as Froslass."
        fr:
          omega_ruby: "Momartik gèle ses ennemis grâce à son souffle à -50 °C.\nÇa ne se voit pas, mais son corps est creux."
          alpha_sapphire: "On dit dans les régions enneigées qu’il s’agit de\nla réincarnation d’une jeune fille disparue dans les neiges."
        it:
          omega_ruby: "Congela i nemici con un alito glaciale a -50 °C.\nIl suo corpo è vuoto."
          alpha_sapphire: "Qua e là corre ancora voce che Froslass fosse in origine una\ndonna dispersa in montagna tra la neve."
        de:
          omega_ruby: "Sein eisiger Atem mit -50 °C friert Gegner ein. Was aussieht\nwie sein Körper, ist tatsächlich hohl."
          alpha_sapphire: "In schneereichen Gegenden erzählt man sich, es sei\ndie Wiedergeburt einer in den Bergen Verunglückten."
        es:
          omega_ruby: "Congela a sus enemigos con un aliento gélido de -50 °C. Su\ncuerpo está hueco."
          alpha_sapphire: "Cuenta la leyenda que es la reencarnación de mujeres que\nsufrieron accidentes en la nieve."
        ko:
          omega_ruby: "마이너스 50도의 냉기를 뿜어\n상대를 얼려 버린다. 몸통 같은\n부분은 실제로는 빈 공간이다."
          alpha_sapphire: "설산에서 조난당한 여성이\n다시 태어난 것이라고 하는 전설이\n눈이 많은 땅에 남아 있다."
