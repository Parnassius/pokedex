          alpha_sapphire: "Ramoloss trempe sa queue dans l’eau au bord des rivières\npour attraper ses proies. Cependant, ce Pokémon oublie\nsouvent ce qu’il fait là et passe des jours entiers à traîner\nau bord de l’eau."
        it:
          omega_ruby: "Slowpoke usa la coda per pescare la preda, immergendola\nin acqua dalle rive dei fiumi.\nTuttavia, spesso dimentica cosa stava facendo e trascorre\ngiorni interi a ciondolare vicino ai corsi d’acqua."
          alpha_sapphire: "Slowpoke usa la coda per pescare la preda, immergendola\nin acqua dalle rive dei fiumi.\nTuttavia, spesso dimentica cosa stava facendo e trascorre\ngiorni interi a ciondolare vicino ai corsi d’acqua."
        de:
          omega_ruby: "Flegmon benutzt seinen Schweif, um Beute zu fangen, indem\nes ihn an einem Flussufer ins Wasser taucht. Dieses Pokémon\nvergisst häufig, was es gerade tun wollte, und verbringt ganze\nTage damit, am Ufer herumzutrödeln."
          alpha_sapphire: "Flegmon benutzt seinen Schweif, um Beute zu fangen, indem\nes ihn an einem Flussufer ins Wasser taucht. Dieses Pokémon\nvergisst häufig, was es gerade tun wollte, und verbringt ganze\nTage damit, am Ufer herumzutrödeln."
        es:
