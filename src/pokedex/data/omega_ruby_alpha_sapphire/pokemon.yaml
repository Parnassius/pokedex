          alpha_sapphire: "チラチーノの　からだは　とくべつな\nあぶらで　おおわれており　パンチなど\nあいての　こうげきを　うけながす。"
        jp_kanji:
          omega_ruby: "白い　体毛は　肌触りが　抜群。\nほこりや　静電気を\nまったく　寄せつけないのだ。"
          alpha_sapphire: "チラチーノの　体は　特別な\n油で　覆われており　パンチなど\n相手の　攻撃を　受け流す。"
        en:
          omega_ruby: "Their white fur feels amazing to touch. Their fur\nrepels dust and prevents static electricity from\nbuilding up."
          alpha_sapphire: "Cinccino’s body is coated in a special oil that helps\nit deflect attacks, such as punches."
        fr:
          omega_ruby: "La texture de ses poils blancs est incomparable.\nElle n’attire ni la poussière, ni l’électricité statique."
          alpha_sapphire: "Son corps est recouvert d’une sorte de lubrifiant qui fait\nglisser les coups sur lui comme si de rien n’était."
        it:
          omega_ruby: "La sua pelliccia bianca è morbidissima al tatto. Non accumula\nné polvere né elettricità statica."
          alpha_sapphire: "Il suo corpo è ricoperto di un grasso speciale sul quale\nscivolano via i colpi e i pugni dell’avversario."
        de:
          omega_ruby: "Sein weißer Flaum fühlt sich wunderbar flauschig an und zieht\nweder Staub noch statische Elektrizität an."
          alpha_sapphire: "Sein Körper ist mit einem speziellen Öl überzogen, an dem\ngegnerische Hiebe und ähnliche Angriffe einfach abgleiten."
        es:
          omega_ruby: "El pelo que cubre su cuerpo proporciona una agradable\nsensación al tocarlo. No acumula ni polvo ni electricidad\nestática."
          alpha_sapphire: "El cuerpo de Cinccino está recubierto por una grasa especial\nque hace que los golpes y ataques enemigos no acierten."
        ko:
          omega_ruby: "하얀 털은 감촉이 정말 좋다.\n먼지나 정전기가\n전혀 생기지 않는다."
          alpha_sapphire: "치라치노의 몸은 특별한\n기름으로 뒤덮여 있어 펀치 등\n상대의 공격을 받아넘긴다."
gothita:
