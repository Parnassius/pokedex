        jp_kana:
          omega_ruby: "あまい　かおりで　えものを　さそい\nりょううでの　どくのムチを　つかって\nさしたり　しめたりして　しとめる。"
          alpha_sapphire: "ダンサーのような　みのこなしで\nどくの　トゲが　びっしりと　ならんだ\nムチを　あやつり　こうげきする。"
        jp_kanji:
          omega_ruby: "甘い　香りで　獲物を　誘い\n両腕の　毒のムチを　使って\n刺したり　締めたりして　しとめる。"
          alpha_sapphire: "ダンサーのような　身のこなしで\n毒の　トゲが　びっしりと　並んだ\nムチを　操り　攻撃する。"
        en:
          omega_ruby: "Luring prey with a sweet scent, it uses poison whips\non its arms to poison, bind, and finish off the prey."
          alpha_sapphire: "With the movements of a dancer, it strikes with\nwhips that are densely lined with poison thorns."
        fr:
          omega_ruby: "Il attire ses proies grâce à son parfum, puis les empoisonne\nou les étouffe à l’aide de ses bras vénéneux."
          alpha_sapphire: "Gracieux comme un danseur, il abat ses fouets ornés\nd’épines empoisonnées."
        it:
          omega_ruby: "Attira la preda con il suo profumo soave per poi afferrarla\ne abbatterla con gli arti velenosi."
          alpha_sapphire: "Con i movimenti di una ballerina, colpisce con le fruste, piene\ndi spine velenose."
        de:
          omega_ruby: "Es lockt seine Beute mit süßem Duft an, um sie danach mit\nseinen dornigen Ranken zu peitschen oder zu würgen."
          alpha_sapphire: "Mit den Bewegungen eines Tänzers holt es aus und\nschlägt mit Ranken um sich, die giftige Dornen haben."
        es:
          omega_ruby: "Atrae a sus presas con una dulce fragancia y usa sus cepas\nvenenosas para atenazarlas y acabar con ellas."
          alpha_sapphire: "Se mueve como un bailarín y golpea con látigos repletos de\npúas venenosas."
        ko:
          omega_ruby: "달콤한 향기로 먹이를 유인해\n양팔의 독 채찍을 사용하여\n찌르거나 조여서 꼼짝 못하게 한다."
          alpha_sapphire: "댄서 같은 재빠른 몸놀림으로\n독가시가 빽빽이 늘어선\n채찍을 조종하여 공격한다."
cranidos:
  species_id: 408
