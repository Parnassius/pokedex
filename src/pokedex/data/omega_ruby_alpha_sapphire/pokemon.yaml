      descriptions:
        jp_kana:
          omega_ruby: "しっぽの　トゲから　でんげきを\nうちだす。イッシュちほうの　そらを\nとびまわり　カミナリを　おとす。"
          alpha_sapphire: "おおぞらを　とびまわりながら\nあちこちに　カミナリを　おとして\nやまかじを　おこすので　きらわれる。"
        jp_kanji:
          omega_ruby: "尻尾の　トゲから　電撃を\n撃ち出す。イッシュ地方の　空を\n飛び回り　雷を　落とす。"
          alpha_sapphire: "大空を　飛び回りながら\nあちこちに　雷を　落として\n山火事を　起こすので　嫌われる。"
        en:
          omega_ruby: "The spikes on its tail discharge immense bolts of\nlightning. It flies around the Unova region firing off\nlightning bolts."
          alpha_sapphire: "As it flies around, it shoots lightning all over\nthe place and causes forest fires. It is\ntherefore disliked."
        fr:
          omega_ruby: "Sa queue lance des décharges électriques. Il vole dans le ciel\nd’Unys et fait tomber des éclairs."
          alpha_sapphire: "Il vole dans le ciel d’Unys et fait tomber des éclairs,\nprovoquant des incendies qui font sa mauvaise réputation."
        it:
          omega_ruby: "Lancia scariche elettriche dagli aculei della coda.\nVola per i cieli di Unima scagliando fulmini."
          alpha_sapphire: "Non è molto amato perché durante il suo peregrinare nei cieli\nfa cadere fulmini qua e là che causano incendi nei boschi."
        de:
          omega_ruby: "Es greift mit elektrischer Ladung aus den Dornen seiner Rute\nan und bombardiert Einall aus der Luft mit Blitzen."
          alpha_sapphire: "Es ist bei den Leuten verhasst, weil es auf seinen Rundflügen\nimmer wieder Blitze erzeugt, die Waldbrände verursachen."
        es:
          omega_ruby: "Lanza descargas eléctricas por las púas de su cola.\nSobrevuela Teselia dejando caer rayos."
          alpha_sapphire: "Su gusto por surcar el cielo lanzando rayos y provocando\nincendios forestales le ha granjeado pocas simpatías."
        ko:
          omega_ruby: "꼬리의 가시에서 전격을\n날린다. 하나지방의 하늘을\n날아다니며 번개를 내리친다."
          alpha_sapphire: "넓은 하늘을 날아다니며\n여기저기 번개를 떨어뜨려\n산불을 내기 때문에 미움받는다."
