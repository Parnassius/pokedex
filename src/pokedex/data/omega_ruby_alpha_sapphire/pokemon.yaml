          omega_ruby: "きしょうが　あらく　けんかっぱやいが\nよわいものいじめは　ゆるさない。\nはっぱで　てきの　うごきを　よむ。"
          alpha_sapphire: "こうげきを　うけても　ひるまずに\nとっしんして　でんちゅうを　へしおる\nパワーの　わんりょくで　ぶちのめす。"
        jp_kanji:
          omega_ruby: "気性が　荒く　ケンカっ早いが\n弱いものいじめは　許さない。\n葉っぱで　敵の　動きを　読む。"
          alpha_sapphire: "攻撃を　受けても　ひるまずに　突進して\n電柱を　へし折る\nパワーの　腕力で　ぶちのめす。"
        en:
          omega_ruby: "Although it possesses a violent temperament,\nit won’t put up with bullying. It uses the leaf in\nits mouth to sense the movements of its enemies."
          alpha_sapphire: "It charges ahead and bashes its opponents like\na berserker, uncaring about any hits it might take.\nIts arms are mighty enough to snap a telephone pole."
        fr:
          omega_ruby: "D’un tempérament fougueux, il ne supporte pas que\nl’on s’en prenne aux faibles. Sa feuille lui permet\nde deviner les actions de l’ennemi."
          alpha_sapphire: "Il encaisse les attaques de plein fouet sans même tiquer\net il poursuit sa route. Il étale ses ennemis d’un coup de patte\ncapable de briser un poteau électrique."
        it:
          omega_ruby: "Ha un carattere focoso e attaccabrighe, ma non sopporta\nchi maltratta i più deboli. Usa la foglia che tiene in bocca\nper prevedere i movimenti dei nemici."
          alpha_sapphire: "Quando lotta, avanza impetuosamente senza curarsi dei colpi\nnemici. Le sue braccia sono talmente forti che potrebbe\nspezzare in due un palo della luce."
        de:
          omega_ruby: "Es ist sehr grob und streitlustig, lässt es aber nicht zu, dass\nSchwächere gemobbt werden. Mit seinem Blatt erspürt es die\nBewegungen des Gegners."
          alpha_sapphire: "Es greift mit mächtigen Armen an, die so stark sind,\ndass sie Strommasten wie Streichhölzer umknicken\nkönnen. Gegenangriffe steckt es unbeeindruckt ein."
        es:
          omega_ruby: "Es muy temperamental, pero no permite que nadie se meta\ncon los débiles. Mediante su hoja, predice los movimientos\ndel enemigo."
          alpha_sapphire: "No se arredra ante los ataques y embiste con una fuerza tan\nabrumadora que sería capaz de derribar un robusto poste\ntelefónico de hormigón."
        ko:
          omega_ruby: "성질이 거칠어 툭하면 싸우려 들지만\n약자를 괴롭히는 일은 용서하지 않는다.\n잎사귀로 적의 움직임을 읽는다."
          alpha_sapphire: "공격을 받아도 풀죽지 않고\n돌진하며 전신주도 부러뜨리는\n파워의 완력으로 때려눕힌다."
furfrou:
  species_id: 676
  names:
    jp_kana: トリミアン
    jp_kanji: トリミアン
    en: Furfrou
    fr: Couafarel
    it: Furfrou
    de: Coiffwaff
    es: Furfrou
    ko: 트리미앙
  forms:
    furfrou_natural_form:
      form_id: 0
      names:
        jp_kana: やせいのすがた
        jp_kanji: やせいのすがた
        en: Natural Form
        fr: Forme Sauvage
        it: Forma Selvatica
        de: Zottelform
        es: Forma Salvaje
        ko: 야생의 모습
      base_stats:
        hp: 75
        attack: 80
        defense: 60
        special_attack: 65
        special_defense: 90
        speed: 102
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - fur_coat
      descriptions:
        jp_kana:
          omega_ruby: "ボサボサの　たいもうを　かりこむと\nすがたが　うつくしくなる　だけでなく\nからだの　キレが　よくなるのだ。"
          alpha_sapphire: "おおむかしの　カロスちほうでは\nおうさまを　ごえいする　やくめを\nあたえられた　ポケモン。"
        jp_kanji:
          omega_ruby: "ボサボサの　体毛を　刈りこむと\n姿が　美しくなる　だけでなく\n身体の　キレが　良くなるのだ。"
          alpha_sapphire: "大昔の　カロス地方では\n王様を　護衛する　役目を\n与えられた　ポケモン。"
        en:
          omega_ruby: "Trimming its fluffy fur not only makes\nit more elegant but also increases the\nswiftness of its movements."
          alpha_sapphire: "Historically, in the Kalos region, these Pokémon\nwere the designated guardians of the king."
        fr:
          omega_ruby: "Si son abondante fourrure gagne à être toilettée, ce n’est pas\nqu’une question de style. En effet, cela lui permet également\nde se mouvoir plus librement."
          alpha_sapphire: "Il y a fort longtemps dans la région de Kalos, ce Pokémon fut\nle gardien des rois et des reines."
        it:
          omega_ruby: "La toelettatura del manto vaporoso non solo lo rende più\nbello, ma gli consente anche di muoversi più liberamente."
          alpha_sapphire: "Nell’antica Kalos, questo Pokémon aveva il compito di\nproteggere i re."
        de:
          omega_ruby: "Schneidet man sein Fell zurecht, wird es nicht nur schöner,\nsondern auch beweglicher."
          alpha_sapphire: "Vor langer Zeit wurde dieses Pokémon in der Kalos-Region\nals Leibgarde des Königs eingesetzt."
        es:
          omega_ruby: "Cuando le esquilan su mullido pelaje, no solo mejora su\napariencia, sino que aumenta su agilidad."
          alpha_sapphire: "Antiguamente, estos Pokémon desempeñaban el cometido de\nguardián del rey en la región de Kalos."
        ko:
          omega_ruby: "복슬복슬한 털을 깎고 다듬으면\n모습이 아름다워질 뿐만 아니라\n몸의 움직임도 좋아진다."
          alpha_sapphire: "먼 옛날 칼로스지방에서\n왕을 호위하는 역할을\n맡았던 포켓몬이다."
