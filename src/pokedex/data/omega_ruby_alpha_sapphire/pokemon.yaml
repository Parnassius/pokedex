      descriptions:
        jp_kana:
          omega_ruby: "ねたみ　うらみの　かんじょうに　ひきよせられる。\nだれかを　うらむ　こころが　つよく　なると\nカゲボウズが　のきしたに　ずらりと　ならぶぞ。"
          alpha_sapphire: "ひとの　こころに　ある　うらみや　ねたみ　などの\nかんじょうを　たべて　せいちょうする　ポケモン。\nうらむ　こころを　さがして　まちを　さまよう。"
        jp_kanji:
          omega_ruby: "ねたみ　恨みの　感情に　引き寄せられる。\n誰かを　恨む　心が　強く　なると\nカゲボウズが　軒下に　ずらりと　並ぶぞ。"
          alpha_sapphire: "人の　心に　ある　うらみや　ねたみ　などの\n感情を　食べて　成長する　ポケモン。\n恨む　心を　探して　街を　さまよう。"
        en:
          omega_ruby: "Shuppet is attracted by feelings of jealousy and vindictiveness.\nIf someone develops strong feelings of vengeance, this\nPokémon will appear in a swarm and line up beneath the eaves\nof that person’s home."
          alpha_sapphire: "Shuppet grows by feeding on dark emotions, such as\nvengefulness and envy, in the hearts of people. It roams\nthrough cities in search of grudges that taint people."
        fr:
          omega_ruby: "Les Polichombr sont attirés par les sentiments de jalousie\net les esprits revanchards. Si quelqu’un veut se venger,\nces Pokémon apparaissent en nuée et s’alignent devant\nla porte des gens concernés."
          alpha_sapphire: "Polichombr grandit en se nourrissant des émotions négatives\ndes gens, comme le désir de vengeance ou la jalousie. Il erre\ndans les villes à la recherche des gens qui n’ont pas le moral."
        it:
          omega_ruby: "Shuppet è attratto dai sentimenti turpi di gelosia e vendetta.\nSe qualcuno serba un forte rancore, questi Pokémon arrivano\na frotte per annidarsi sotto i cornicioni di casa sua."
          alpha_sapphire: "Shuppet cresce alimentandosi di sentimenti turpi, come la\nvendetta e l’invidia, insiti nel cuore delle persone. Si aggira\nper le città in cerca del rancore che insudicia gli animi."
        de:
          omega_ruby: "Shuppet wird durch Gefühle wie Neid und Rachsucht\nangezogen. Wenn jemand starke Rachegelüste entwickelt,\nerscheinen diese Pokémon in Scharen und reihen sich unter\nder Dachrinne des Hauses dieser Person auf."
          alpha_sapphire: "Shuppet wächst, indem es sich von düsteren Gefühlen\nwie Rachsucht und Neid ernährt. Es streift durch Städte\nund sucht nach Empfindungen, die als Ursache für den\nVerderb der Menschen gelten."
        es:
          omega_ruby: "A Shuppet le atraen los sentimientos de celos y rencor.\nSi alguien desarrolla fuertes sentimientos de venganza,\naparecerá una multitud de Shuppet que se quedará bajo\nlos aleros de su casa."
          alpha_sapphire: "Shuppet crece alimentándose de sentimientos negativos,\ncomo el rencor y la envidia, que nacen en el corazón de las\npersonas. Se dedica a vagar por las ciudades en busca del\nrencor que contamina a la gente."
        ko:
          omega_ruby: "질투와 원한의 감정에 이끌린다.\n누군가를 원망하는 마음이 강해지면\n어둠대신이 처마 밑에 죽 줄을 선다."
          alpha_sapphire: "사람의 마음속에 있는 원한과 질투 같은\n감정을 먹고 성장하는 포켓몬이다.\n원망하는 마음을 찾아 마을을 헤맨다."
