      descriptions:
        jp_kana:
          omega_ruby: "かたい　からだは　ぴくりとも　うごかない。\nせなかから　からだの　くうどうを　のぞくと\nたましいを　すいとられると　しんじられている。"
          alpha_sapphire: "ツチニンが　しんかしたとき　なぜか　かってに\nモンスターボールに　はいっている　ポケモンだ。\nからだは　まったく　うごかず　いきも　しない。"
        jp_kanji:
          omega_ruby: "硬い　体は　ぴくりとも　動かない。\n背中から　体の　空洞を　のぞくと\n魂を　吸い取られると　信じられている。"
          alpha_sapphire: "ツチニンが　進化したとき　なぜか　勝手に\nモンスターボールに　入っている　ポケモンだ。\n体は　まったく　動かず　息も　しない。"
        en:
          omega_ruby: "Shedinja’s hard body doesn’t move—not even a twitch. In fact,\nits body appears to be merely a hollow shell. It is believed that\nthis Pokémon will steal the spirit of anyone peering into its\nhollow body from its back."
          alpha_sapphire: "Shedinja is a peculiar Pokémon. It seems to appear unsought\nin a Poké Ball after a Nincada evolves. This bizarre Pokémon\nis entirely immobile—it doesn’t even breathe."
        fr:
          omega_ruby: "Le corps robuste de Munja ne bouge pas d’un pouce. En fait,\nson corps semble être une coquille vide. Certains croient que\nce Pokémon peut voler l’âme de quiconque regarderait\nà l’intérieur de son corps creux."
          alpha_sapphire: "Munja est un étrange Pokémon. Il semble apparaître sans\nraison dans une Poké Ball après l’évolution d’un Ningale.\nCe Pokémon bizarre est totalement immobile. Il ne respire\nmême pas."
        it:
          omega_ruby: "Il corpo coriaceo di Shedinja non si muove neanche\ndi un millimetro. In realtà sembra quasi un guscio vuoto.\nSi dice che questo Pokémon rubi lo spirito di chiunque\nosi spiare dentro il suo guscio."
          alpha_sapphire: "Shedinja è molto particolare. Pare comparire all’improvviso\nin una Poké Ball dopo l’evoluzione di Nincada. Questo strano\nPokémon è completamente immobile. Non è nemmeno\nin grado di respirare."
        de:
          omega_ruby: "Ninjatoms harter Körper bewegt sich überhaupt nicht.\nEr scheint bloß eine hohle Schale zu sein. Dieses Pokémon\nsoll angeblich die Seele eines jeden stehlen, der hinterrücks\neinen Blick in seinen hohlen Körper riskiert."
          alpha_sapphire: "Ninjatom ist ein ganz besonderes Pokémon. Es taucht plötzlich\nin einem Pokéball auf, nachdem sich ein Nincada entwickelt\nhat. Dieses Pokémon ist absolut bewegungsunfähig und atmet\nnicht einmal."
        es:
          omega_ruby: "Shedinja tiene un cuerpo robusto que no mueve en absoluto.\nDe hecho, parece una especie de caparazón hueco. Se cree\nque, si alguien se atreviera a mirarle por la espalda lo que\ntiene en su interior, Shedinja le robaría el alma."
          alpha_sapphire: "Shedinja es un Pokémon peculiar. Según parece, surge por\nlas buenas en una Poké Ball cuando Nincada evoluciona. Este\nraro Pokémon no se mueve nada; ni siquiera respira."
        ko:
          omega_ruby: "단단한 몸은 꿈쩍도 하지 않는다.\n등을 통해 몸의 구멍을 들여다보면\n혼이 빨려 들어간다고 믿어지고 있다."
          alpha_sapphire: "토중몬이 진화했을 때 어찌 된 영문인지 제멋대로\n몬스터볼에 들어 있는 포켓몬이다.\n몸을 전혀 움직이지 않으며 숨도 쉬지 않는다."
