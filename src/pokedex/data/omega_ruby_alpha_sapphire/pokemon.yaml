      descriptions:
        jp_kana:
          omega_ruby: "ふだん　やわらかい　あたまの　トゲは\nちからを　こめると　するどく　とがり\nいわをも　つらぬくほど　かたくなる。"
          alpha_sapphire: "あたまと　せなかを　かたい　カラで\nおおわれているため　トラックが\nぶつかってきても　へっちゃらだ。"
        jp_kanji:
          omega_ruby: "普段　やわらかい　頭の　トゲは\n力を　こめると　鋭く　とがり\n岩をも　つらぬくほど　硬くなる。"
          alpha_sapphire: "頭と　背中を　硬い　樹木の　殻で\n覆われているため　トラックが\nぶつかってきても　平気なのだ。"
        en:
          omega_ruby: "The quills on its head are usually soft.\nWhen it flexes them, the points become\nso hard and sharp that they can pierce rock."
          alpha_sapphire: "Such a thick shell of wood covers its head and back\nthat even a direct hit from a truck wouldn’t faze it."
        fr:
          omega_ruby: "Lorsqu’il rassemble ses forces, les piquants souples\nqui recouvrent sa tête deviennent si durs et acérés\nqu’ils pourraient transpercer un rocher."
          alpha_sapphire: "Sa tête et son dos sont recouverts d’une carapace tellement\ndure que même une collision avec un camion ne lui ferait rien."
        it:
          omega_ruby: "Può indurire le punte che ha sulla testa, di solito morbide,\nper farle diventare talmente affilate e appuntite da penetrare\nnella roccia."
          alpha_sapphire: "Ha schiena e testa coperte da un guscio talmente resistente\nche non farebbe una piega nemmeno se ci passasse sopra\nun tir."
        de:
          omega_ruby: "Wenn es seine Kraft auf die sonst eher weichen Stacheln\nauf seinem Kopf konzentriert, werden diese robust genug,\num damit Steine zu zertrümmern."
          alpha_sapphire: "Sein Kopf und Rücken werden von einer harten Hülle bedeckt,\ndie so robust ist, dass sie selbst einer Kollision mit einem LKW\nstandhalten würde."
        es:
          omega_ruby: "Cuando acumula energía, las suaves púas de su cabeza se\nvuelven tan duras y afiladas que hasta pueden atravesar\nrocas."
          alpha_sapphire: "La robusta coraza que le recubre la cabeza y la espalda lo\nprotege de tal manera que podría chocar contra un camión y\npermanecer impasible."
        ko:
          omega_ruby: "머리의 가시는 평소에는 부드럽지만\n힘을 주면 뾰족하고 날카로워지며\n바위를 뚫어 버릴 정도로 단단해진다."
          alpha_sapphire: "머리와 등이 단단한 껍데기로\n덮여 있기 때문에 트럭이\n부딪혀와도 아무렇지 않다."
quilladin:
  species_id: 651
