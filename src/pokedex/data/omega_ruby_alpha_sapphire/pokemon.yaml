        jp_kana:
          omega_ruby: "はるか　じょうくうを　えんを　えがく　ように\nとびまわり　えものを　みつけると　きゅうこうか。\nあしの　ツメで　がっしり　つかんで　にがさない。"
          alpha_sapphire: "ツヤの　ある　はねの　ていれは　おこたらない。\nオオスバメが　２ひき　あつまると　かならず\nおたがいの　はねを　きれいに　ていれするぞ。"
        jp_kanji:
          omega_ruby: "はるか　上空を　円を　描く　ように\n飛び回り　獲物を　見つけると　急降下。\n足の　ツメで　がっしり　つかんで　逃がさない。"
          alpha_sapphire: "ツヤの　ある　羽の　手入れは　怠らない。\nオオスバメが　２匹　集まると　必ず\nお互いの　羽を　きれいに　手入れするぞ。"
        en:
          omega_ruby: "Swellow flies high above our heads, making graceful arcs\nin the sky. This Pokémon dives at a steep angle as soon as\nit spots its prey. The hapless prey is tightly grasped by\nSwellow’s clawed feet, preventing escape."
          alpha_sapphire: "Swellow is very conscientious about the upkeep of its glossy\nwings. Once two Swellow are gathered, they diligently take\ncare of cleaning each other’s wings."
        fr:
          omega_ruby: "Hélédelle vole dans les cieux en dessinant de grands arcs.\nCe Pokémon plonge en piqué dès qu’il repère sa proie.\nIl attrape fermement la malheureuse cible dans ses serres,\nempêchant toute fuite."
          alpha_sapphire: "Hélédelle fait attention à bien entretenir ses ailes brillantes.\nLorsque deux Hélédelle se rencontrent, ils se nettoient\nmutuellement les ailes avec attention."
        it:
          omega_ruby: "Swellow vola alto sopra le nostre teste disegnando armoniosi\narchi in cielo. Appena scova una preda si lancia su di essa\nin picchiata. Swellow cattura poi la sventurata preda con le sue\nzampe artigliate impedendole la fuga."
          alpha_sapphire: "Swellow è molto attento a mantenere le proprie ali sempre\nlucide e splendenti. Spesso si incontra coi propri simili\ne questi Pokémon in gruppo si lisciano vicendevolmente\nle piume."
        de:
          omega_ruby: "Dieses Pokémon taucht in einem steilen Winkel ab, sobald es\nBeute wahrgenommen hat. Es packt seine Beute mit seinen\nKrallen und lässt sie nicht mehr entkommen."
          alpha_sapphire: "Schwalboss ist sehr gewissenhaft bei der Pflege seiner\nglänzenden Flügel. Wenn zwei Schwalboss zusammen sind,\nputzen sie sich ihre Flügel gegenseitig."
        es:
          omega_ruby: "Swellow vuela muy alto dibujando elegantes arcos en el cielo.\nEste Pokémon se sumerge en el agua con rapidez y eficacia\nen cuanto detecta una presa. Con las garras, atrapa a la\ndesdichada víctima y no la deja huir."
          alpha_sapphire: "Swellow se preocupa a conciencia del mantenimiento de sus\nlustrosas alas. Cuando hay dos juntos, el uno se ocupa de\nlimpiarle las alas al otro."
        ko:
          omega_ruby: "높은 상공을 원을 그리듯 날아다니다\n먹이를 발견하면 급강하한다.\n발톱으로 단단히 잡고 놓치지 않는다."
          alpha_sapphire: "윤이 나는 깃털의 손질을 게을리하지 않는다.\n스왈로 두 마리가 모이면 반드시\n서로의 깃털을 깨끗이 손질한다."
