        jp_kana:
          omega_ruby: "どくかふんは　ひどい　アレルギーを　おこす。\nジャングルで　うつくしい　はなを　みつけても\nうかつに　ちかよらない　ほうが　いいよ。"
          alpha_sapphire: "せかいいち　おおきな　はなびらで　えものを\nおびきよせ　どくの　かふんを　あびせかける。\nうごけなくなった　えものを　つかまえて　たべる。"
        jp_kanji:
          omega_ruby: "毒花粉は　酷い　アレルギーを　起こす。\nジャングルで　美しい　花を　みつけても\nうかつに　近寄らない　ほうが　いいよ。"
          alpha_sapphire: "世界一　大きな　花びらで　獲物を\nおびき寄せ　毒の　花粉を　浴びせかける。\n動けなくなった　獲物を　捕まえて　食べる。"
        en:
          omega_ruby: "Vileplume’s toxic pollen triggers atrocious allergy attacks.\nThat’s why it is advisable never to approach any attractive\nflowers in a jungle, however pretty they may be."
          alpha_sapphire: "Vileplume has the world’s largest petals. They are used to\nattract prey that are then doused with toxic spores. Once the\nprey are immobilized, this Pokémon catches and devours them."
        fr:
          omega_ruby: "Le pollen toxique de Rafflesia déclenche d’affreuses réactions\nallergiques. C’est pourquoi il est conseillé de ne jamais\ns’approcher des jolies fleurs trouvées dans la jungle,\nmême lorsqu’elles sont magnifiques."
          alpha_sapphire: "Rafflesia dispose des plus grands pétales du monde.\nIl s’en sert pour attirer ses proies avant de les endormir\navec ses spores toxiques. Ce Pokémon n’a plus alors\nqu’à attraper sa proie et à la manger."
        it:
          omega_ruby: "Il polline velenoso di Vileplume scatena paurose reazioni\nallergiche. Per questo motivo si consiglia di non avvicinarsi\nmai a nessun fiore di bosco, per quanto bello possa essere."
          alpha_sapphire: "Vileplume ha i petali più grandi al mondo. Li usa per attirare\nla preda per poi ricoprirla di spore velenose. Una volta\nimmobilizzata la preda, il Pokémon la cattura e la divora."
        de:
          omega_ruby: "Giflors giftige Pollen rufen böse allergische Anfälle hervor.\nDeshalb ist es ratsam, sich keiner schönen Blume im\nDschungel zu nähern, so anziehend sie auch sein mag."
          alpha_sapphire: "Giflor hat die größten Blätter der Welt. Sie ziehen Beute an\nund bestäuben sie mit giftigen Sporen. Wenn die Beute sich\nnicht mehr rührt, fängt dieses Pokémon sie und frisst sie auf."
        es:
          omega_ruby: "El polen que contienen las esporas tóxicas de Vileplume causa\nunos ataques de alergia muy agudos. Por eso, no es\naconsejable acercarse a ninguna flor selvática, por muy bonita\nque sea."
          alpha_sapphire: "Vileplume tiene los mayores pétalos del mundo. Los usa para\natraer a sus presas y llenarlas de esporas tóxicas. Una vez\nque ha inmovilizado a las víctimas, las atrapa y las devora."
        ko:
          omega_ruby: "독 꽃가루는 심한 알레르기를 일으킨다.\n정글에서 아름다운 꽃을 발견해도\n섣불리 다가가지 않는 것이 좋다."
          alpha_sapphire: "세계에서 제일 큰 꽃잎으로 먹이를\n유인하여 독 꽃가루를 끼얹는다.\n움직이지 못하게 된 먹이를 잡아먹는다."
