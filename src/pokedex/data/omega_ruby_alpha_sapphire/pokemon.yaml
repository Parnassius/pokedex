          omega_ruby: "En las noches de luna nueva deambula por las calles de las\nciudades y emite espeluznantes alaridos que maldicen a\nquienes los oyen."
          alpha_sapphire: "Atrapa a su presa con los brazos, que parecen formar sendas\nmatas de pelo, y entona una alegre canción mientras se\nregodea con su sufrimiento."
        ko:
          omega_ruby: "초승달이 뜬 밤에 기분 나쁜 목소리로\n노래를 부르며 마을 안을 헤맨다.\n그 노래를 들으면 저주를 받는다."
          alpha_sapphire: "머리카락 같은 팔로 사냥감을\n조른다. 괴로워하는 모습을\n지켜보며 즐거운 듯 노래한다."
bergmite:
  species_id: 712
  names:
    jp_kana: カチコール
    jp_kanji: カチコール
    en: Bergmite
    fr: Grelaçon
    it: Bergmite
    de: Arktip
    es: Bergmite
    ko: 꽁어름
  forms:
    bergmite:
      form_id: 0
      base_stats:
        hp: 55
        attack: 69
        defense: 85
        special_attack: 32
        special_defense: 35
        speed: 28
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - monster
      abilities:
        - own_tempo
        - ice_body
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          omega_ruby: "からだを　おおう　こおりが　てきの\nこうげきを　ふせぐ。わられても\nれいきで　すぐに　こおりを　はる。"
          alpha_sapphire: "マイナス１００どの　れいきで　てきを\nこおりづけにする。まんねんゆきに\nおおわれた　やまで　むれを　つくる。"
        jp_kanji:
          omega_ruby: "体を　覆う　氷が\n敵の　攻撃を　防ぐ。割られても\n冷気で　すぐに　氷を　張る。"
          alpha_sapphire: "マイナス１００度の　冷気で　敵を\n氷漬けにする。万年雪に　覆われた\n山で　群れを　作る。"
        en:
          omega_ruby: "It blocks opponents’ attacks with the\nice that shields its body. It uses cold air\nto repair any cracks with new ice."
          alpha_sapphire: "Using air of -150 degrees Fahrenheit, they\nfreeze opponents solid. They live in herds\nabove the snow line on mountains."
        fr:
          omega_ruby: "La glace qui couvre son corps bloque les attaques ennemies.\nSi elle se fissure, il la reconstitue immédiatement en soufflant\nde l’air glacé."
          alpha_sapphire: "Il gèle ses ennemis d’une bourrasque à -100 °C.\nIl vit en troupeau avec ses congénères, dans les neiges\néternelles des hautes montagnes."
        it:
          omega_ruby: "Si difende dagli attacchi nemici grazie al ghiaccio che ricopre\nil suo corpo. Se viene danneggiato, rigenera lo strato\nprotettivo, riparandolo."
          alpha_sapphire: "Congela i nemici soffiando aria a -100 °C. Vive in gruppo\nnelle montagne ricoperte da nevi perenni."
        de:
          omega_ruby: "Es wehrt gegnerische Angriffe mit seinem in Eis gehüllten\nKörper ab. Bruchstellen bessert es mit aus kalter Luft\ngewonnenem neuen Eis aus."
          alpha_sapphire: "Es friert seine Gegner mittels eines -100 °C kalten Luftstromes\nein. Mit seinen Artgenossen lebt es herdenweise auf Bergen\ninmitten des ewigen Eises."
        es:
          omega_ruby: "Envuelve su cuerpo en una capa de hielo que le permite evitar\nlos ataques del enemigo. Si se resquebraja, la recompone con\naire gélido."
          alpha_sapphire: "Congela a sus enemigos sometiéndolos a un aire gélido de\n-100 °C. Forman grupos para habitar montañas cubiertas de\nuna nieve sempiterna."
        ko:
          omega_ruby: "몸을 둘러싼 얼음이 적의\n공격을 막는다. 깨져도\n냉기로 재빨리 얼음을 얼린다."
          alpha_sapphire: "마이너스 100도의 냉기로 적을\n얼려버린다. 만년설로\n덮인 산에서 무리를 짓는다."
avalugg:
  species_id: 713
  names:
    jp_kana: クレベース
    jp_kanji: クレベース
    en: Avalugg
    fr: Séracrawl
    it: Avalugg
    de: Arktilas
    es: Avalugg
    ko: 크레베이스
