          alpha_sapphire: "てきに　おそわれると　でんきを\nおびた　いとを　たくさん　はきだして\nでんきの　バリアを　つくる。"
        jp_kanji:
          omega_ruby: "電気を　帯びた　糸で　ワナを\n仕掛ける。感電して　動けない　獲物を\nゆっくりと　いただくのだ。"
          alpha_sapphire: "敵に　襲われると　電気を　帯びた\n糸を　たくさん　吐き出して\n電気の　バリアを　作る。"
        en:
          omega_ruby: "They employ an electrically charged web to trap\ntheir prey. While it is immobilized by shock,\nthey leisurely consume it."
          alpha_sapphire: "When attacked, they create an electric barrier by\nspitting out many electrically charged threads."
        fr:
          omega_ruby: "Il tend des pièges avec ses fils électriques. Il déguste\ntranquillement ses proies une fois électrocutées."
          alpha_sapphire: "Quand on l’attaque, il projette une multitude de fils électrifiés\npour créer une barrière électrique."
        it:
          omega_ruby: "Tende trappole con fili elettrificati. Consuma poi con comodo\nle prede immobilizzate dalla scarica elettrica."
          alpha_sapphire: "Quando viene attaccato, espelle una rete di fili elettrificati\nper formare una barriera elettrica."
        de:
          omega_ruby: "Lässt seine Beute in elektrisch geladene Fäden tappen. Solang\ndiese durch den Schock gelähmt ist, labt es sich an ihr."
          alpha_sapphire: "Wird es angegriffen, spuckt es mit vielen elektrisch geladenen\nFäden um sich und baut sich eine Elektrobarriere."
        es:
          omega_ruby: "Pone trampas con hilos electrificados. De este modo,\nelectrocuta a sus enemigos y los inmoviliza por completo."
          alpha_sapphire: "Cuando un enemigo lo ataca, expulsa por la boca hilos\nelectrificados para crear una barrera."
        ko:
          omega_ruby: "전기를 띤 실로 함정을 설치한다.\n감전돼서 움직이지 못하는\n먹이를 천천히 먹어치운다."
          alpha_sapphire: "상대에게 공격당하면 전기를\n띤 실을 무수히 뿜어내서\n전기 배리어를 만든다."
ferroseed:
  species_id: 597
  names:
    jp_kana: テッシード
    jp_kanji: テッシード
    en: Ferroseed
    fr: Grindur
    it: Ferroseed
    de: Kastadur
    es: Ferroseed
    ko: 철시드
  forms:
    ferroseed:
      form_id: 0
      base_stats:
        hp: 44
        attack: 50
        defense: 91
        special_attack: 24
        special_defense: 86
        speed: 10
      evs_yield:
        hp: 0
        attack: 0
