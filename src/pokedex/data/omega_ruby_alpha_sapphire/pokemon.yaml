          alpha_sapphire: "Caratroc se cache tranquillement sous les rochers, abritant\nson corps dans sa carapace solide, pendant qu’il mange\nles Baies qu’il a mises de côté. Les Baies se mélangent à\nses fluides corporels pour produire du jus."
        it:
          omega_ruby: "Shuckle si nasconde tranquillo sotto le rocce mentre mangia\nle bacche che ha raccolto precedentemente all’interno della\nsua corazza. Queste si trasformano in succo col fluido\ndel corpo."
          alpha_sapphire: "Shuckle si nasconde tranquillo sotto le rocce mentre mangia\nle bacche che ha raccolto precedentemente all’interno della\nsua corazza. Queste si trasformano in succo col fluido\ndel corpo."
        de:
          omega_ruby: "Pottrott versteckt sich leise unter Steinen und verbirgt seinen\nKörper in seiner harten Schale, wenn es gesammelte Beeren\nzu sich nimmt. Die Beeren vermischen sich mit seinen\nKörperflüssigkeiten zu einem Saft."
          alpha_sapphire: "Pottrott versteckt sich leise unter Steinen und verbirgt seinen\nKörper in seiner harten Schale, wenn es Beeren zu sich nimmt.\nDie Beeren vermischen sich mit seinen Körperflüssigkeiten zu\neinem Saft."
        es:
          omega_ruby: "Shuckle permanece escondido bajo las rocas en silencio y,\ncuando se pone a comer las bayas que almacena, se encierra\nen el caparazón. Las bayas se mezclan con sus fluidos\ncorporales y originan zumo."
          alpha_sapphire: "Shuckle permanece escondido bajo las rocas en silencio y,\ncuando se pone a comer las bayas que almacena, se encierra\nen el caparazón. Las bayas se mezclan con sus fluidos\ncorporales y originan zumo."
        ko:
          omega_ruby: "바위 밑에서 껍질 안에 비축해둔\n나무열매를 먹으면서 몸을 숨기고 있다.\n나무열매는 체액과 섞여 주스가 된다."
