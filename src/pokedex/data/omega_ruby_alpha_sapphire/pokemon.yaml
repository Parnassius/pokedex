        jp_kana:
          omega_ruby: "オスは　あたまの　かざりを　ゆらして\nあいてを　いかくする。メスの　ひこう\nのうりょくは　オスを　うわまわる。"
          alpha_sapphire: "オスは　あたまに　かざりを　もつ。\nトレーナー　いがいの　ひとには\nけっして　なつかない　せいしつ。"
        jp_kanji:
          omega_ruby: "オスは　頭の　飾りを　揺らして\n相手を　威嚇する。\nメスの　飛行能力は　オスを　上回る。"
          alpha_sapphire: "オスは　頭に　飾りを　持つ。\nトレーナー　以外の　人には\nけっして　懐かない　性質。"
        en:
          omega_ruby: "Males swing their head plumage to threaten\nopponents. The females’ flying abilities surpass\nthose of the males."
          alpha_sapphire: "Males have plumage on their heads. They will never\nlet themselves feel close to anyone other than\ntheir Trainers."
        fr:
          omega_ruby: "Le mâle intimide ses ennemis avec ses caroncules.\nLa femelle vole mieux que le mâle."
          alpha_sapphire: "Ils sont très farouches et ne s’attachent qu’à leur Dresseur.\nLes mâles ont une parure sur la tête."
        it:
          omega_ruby: "Il maschio minaccia il nemico facendo ondeggiare gli\nornamenti del capo. La femmina eccelle nel volo."
          alpha_sapphire: "Il maschio ha una decorazione sulla fronte. Per indole, non si\naffeziona a nessuno tranne l’Allenatore."
        de:
          omega_ruby: "Männchen schrecken Gegner ab, indem sie ihren Kopfschmuck\nschütteln. Weibchen verfügen über bessere Flugfertigkeiten."
          alpha_sapphire: "Männliche Exemplare tragen eine Verzierung am Kopf.\nLässt sich von Natur aus nur auf seinen Trainer ein."
        es:
          omega_ruby: "El macho amenaza al enemigo meciendo el adorno de su\ncabeza. Al volar, la hembra es mucho más diestra que el\nmacho."
          alpha_sapphire: "El macho hace gala de ornamentación en la cabeza. No es\ndado a hacerse amigo de alguien que no sea su Entrenador."
        ko:
          omega_ruby: "수컷은 머리의 장식을 흔들어서\n상대를 위협한다. 암컷의 비행\n능력은 수컷을 뛰어넘는다."
          alpha_sapphire: "수컷은 머리에 장식이 있다.\n트레이너가 아닌 사람은\n절대 따르지 않는 성질을 가졌다."
blitzle:
