    keldeo_ordinary_form:
      form_id: 0
      names:
        jp_kana: いつものすがた
        jp_kanji: いつものすがた
        en: Ordinary Form
        fr: Aspect Normal
        it: Forma Normale
        de: Standardform
        es: Forma Habitual
        ko: 평상시 모습
      base_stats:
        hp: 91
        attack: 72
        defense: 90
        special_attack: 129
        special_defense: 90
