      descriptions:
        jp_kana:
          omega_ruby: "マイナス５０どの　いきを　はく。\nゆきの　けっしょうを　つくって\nあたりに　ゆきを　ふらせる。"
          alpha_sapphire: "あさひの　エネルギーを　あびた\nつららが　ポケモンに　なった。\nゆきに　からだを　うめて　ねむる。"
        jp_kanji:
          omega_ruby: "マイナス５０度の　息を　吐く。\n雪の　結晶を　作って\nあたりに　雪を　降らせる。"
          alpha_sapphire: "朝日の　エネルギーを　浴びた\nつららが　ポケモンに　なった。\n雪に　体を　埋めて　眠る。"
        en:
          omega_ruby: "The temperature of their breath is -58 degrees\nFahrenheit. They create snow crystals and make\nsnow fall in the areas around them."
          alpha_sapphire: "This Pokémon formed from icicles bathed in energy\nfrom the morning sun. It sleeps buried in snow."
        fr:
          omega_ruby: "Il exhale une haleine à -50 °C. Il fabrique des cristaux de neige\net fait neiger autour de lui."
          alpha_sapphire: "Ce Pokémon est né d’un glaçon qui a baigné dans la lumière\ndu matin. Il se cache dans la neige pour dormir."
        it:
          omega_ruby: "Il suo fiato è a -50 °C. Fa nevicare tutto intorno, formando\ndei cristalli di neve."
          alpha_sapphire: "Pokémon nato da una stalattite che ha ricevuto l’energia del\nsole mattutino. Dorme sepolto sotto la neve."
        de:
          omega_ruby: "Die Temperatur seines Odems liegt bei -50 °C. Es erzeugt\nEiskristalle und lässt es in seiner Umgebung schneien."
          alpha_sapphire: "Ein Eiszapfen, der durch die Energie der aufgehenden Sonne\nzum Pokémon wurde. Nachts deckt es sich mit Schnee zu."
        es:
          omega_ruby: "Lanza un aliento de -50 °C. Crea bloques de nieve y es capaz\nde lograr que nieve a su alrededor."
          alpha_sapphire: "Nació de un carámbano que absorbió la energía del sol al\nalba. Duerme arropado por la nieve."
        ko:
          omega_ruby: "마이너스 50도의 숨결을 내뱉는다.\n눈 결정을 만들어\n주변에 눈이 내리게 한다."
          alpha_sapphire: "아침 해의 에너지를 받은\n고드름이 포켓몬이 되었다.\n눈에 몸을 묻고 잠든다."
vanillish:
  species_id: 583
  names:
    jp_kana: バニリッチ
