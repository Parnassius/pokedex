      types:
        - water
        - ground
      egg_groups:
        - water_2
      abilities:
        - oblivious
        - anticipation
      hidden_ability: hydration
      descriptions:
        jp_kana:
          omega_ruby: "なわばり　いしきが　とても　つよい　ポケモン。\nおおきな　ぬま　ぜんぶを　なわばりに　している。\nてきが　ちかづくと　あばれて　じしんを　おこす。"
          alpha_sapphire: "おおあばれ　すると　ぬまの　しゅうい　５キロの\nはんいで　じしんの　ような　ゆれが　おこる。\nほんとうの　じしんを　よちする　ちからも　もつ。"
        jp_kanji:
          omega_ruby: "縄張り　意識が　とても　強い　ポケモン。\n大きな　沼　全部を　縄張りに　している。\n敵が　近づくと　暴れて　地震を　起こす。"
          alpha_sapphire: "大暴れ　すると　沼の　周囲　５キロの\n範囲で　地震の　ような　揺れが　起こる。\n本当の　地震を　予知する　力も　持つ。"
        en:
          omega_ruby: "Whiscash is extremely territorial. Just one of these Pokémon\nwill claim a large pond as its exclusive territory. If a foe\napproaches it, it thrashes about and triggers a massive\nearthquake."
          alpha_sapphire: "If Whiscash goes on a wild rampage, it sets off a quake-like\ntremor with a radius of over three miles. This Pokémon has\nthe ability to predict real earthquakes."
        fr:
          omega_ruby: "Quand il s’agit de territoire, Barbicha est très possessif.\nUn seul de ces Pokémon réclame parfois un étang entier.\nSi un ennemi s’approche, il fonce sur lui et déclenche\nun violent tremblement de terre."
          alpha_sapphire: "Lorsque Barbicha se déchaîne, il déclenche des secousses\nsismiques dans un rayon de plus de 5 km autour de lui.\nCe Pokémon a le pouvoir de prédire les véritables\ntremblements de terre."
        it:
          omega_ruby: "Whiscash è estremamente legato all’area in cui vive e\ndelimita laghi enormi come proprio territorio. All’avvicinarsi\ndi un nemico, s’infuria scatenando terribili terremoti."
          alpha_sapphire: "Se Whiscash si infuria, è in grado di scatenare una specie\ndi terremoto del raggio di 5 km. Inoltre ha la capacità di\nprevedere i terremoti reali."
        de:
          omega_ruby: "Welsar legt viel Wert auf sein Territorium. Ein einzelnes\nPokémon dieser Art nennt einen Teich sein Eigen. Wenn\nsich ein Feind nähert, schlägt es um sich und verursacht\nein gewaltiges Erdbeben."
          alpha_sapphire: "Wenn Welsar auf einen wilden Beutezug geht, erzeugt\nes ein Beben mit einem Radius von 5 km. Dieses Pokémon\nkann wirkliche Erdbeben voraussehen."
        es:
          omega_ruby: "Whiscash defiende su territorio a toda costa. Es capaz de\napoderarse de un estanque entero para sí solo. Si alguien se\nle acerca, se revolverá y provocará un terremoto devastador."
          alpha_sapphire: "Si Whiscash entra en estado de cólera salvaje, provoca un\ntemblor sísmico de un radio de 5 km. Este Pokémon tiene\nla habilidad de predecir terremotos de verdad."
        ko:
          omega_ruby: "영역에 대한 집착이 매우 강한 포켓몬이다.\n큰 늪 전부를 영역으로 삼는다.\n적이 다가오면 날뛰어 지진을 일으킨다."
          alpha_sapphire: "크게 난동 부리면 늪 주변 5km\n범위에 지진처럼 흔들림이 일어난다.\n진짜 지진을 예지하는 힘도 지녔다."
