          alpha_sapphire: "갈기에서 강한 전기를 발산하고 있다.\n공기 중의 전기를 갈기에 모아\n머리 위에 번개 구름을 만들어낸다."
plusle:
  species_id: 311
  names:
    jp_kana: プラスル
    jp_kanji: プラスル
    en: Plusle
    fr: Posipi
    it: Plusle
