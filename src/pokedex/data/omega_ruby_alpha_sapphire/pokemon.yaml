          omega_ruby: "ほかの　きぎを　じざいに　あやつる。\nもりを　あらす　にんげんは　しぬまで\nもりから　でられないようにするのだ。"
          alpha_sapphire: "ねっこを　しんけいの　かわりにして\nもりの　きを　あやつる。からだに\nすみついた　ポケモンには　しんせつ。"
        jp_kanji:
          omega_ruby: "ほかの　木々を　自在に　操る。\n森を　荒らす　人間は　死ぬまで\n森から　出られないようにするのだ。"
          alpha_sapphire: "根っこを　神経の　かわりにして\n森の　木を　操る。体に　住みついた\nポケモンには　親切。"
        en:
          omega_ruby: "It can control trees at will. It will trap people\nwho harm the forest, so they can never leave."
          alpha_sapphire: "Using its roots as a nervous system,\nit controls the trees in the forest.\nIt’s kind to the Pokémon that reside in its body."
        fr:
          omega_ruby: "Commande aux autres arbres. Il emprisonne jusqu’à la fin\nde leurs jours les humains qui abîment la forêt."
          alpha_sapphire: "Ses racines sont un véritable système nerveux qui lui permet\nde contrôler les arbres de la forêt. Il se montre très gentil\nenvers les Pokémon vivant dans son écorce."
        it:
          omega_ruby: "In grado di manovrare gli alberi a piacimento, intrappola\nper sempre nei boschi gli umani che danneggiano la natura."
          alpha_sapphire: "Usa le radici come un sistema nervoso per controllare gli\nalberi dei boschi. Tratta con gentilezza i Pokémon che fanno\nil nido nel suo corpo."
        de:
          omega_ruby: "Die Bäume des Waldes folgen ihm blind. Menschen, die dem\nWald Schaden zufügen, hält es bis an ihr Lebensende darin\ngefangen."
          alpha_sapphire: "Es nutzt seine Wurzeln als Nervensystem und kontrolliert so\nandere Bäume. Es ist nett zu den Pokémon, die in ihm leben."
        es:
          omega_ruby: "Puede controlar los árboles a su voluntad. Retiene hasta el fin\nde sus días a los humanos que se adentran en el bosque y lo\nmancillan."
          alpha_sapphire: "Sus raíces le permiten controlar los árboles del bosque, al\nfuncionar como un sistema nervioso. Es amable con los\nPokémon que habitan su cuerpo."
        ko:
          omega_ruby: "다른 나무들을 자유자재로 조종한다.\n숲을 어지럽히는 인간은 죽을 때까지\n숲에서 벗어나지 못하게 한다."
          alpha_sapphire: "뿌리를 신경 대신으로 삼아\n숲의 나무를 조종한다. 몸에 자리 잡은\n포켓몬에게는 친절하다."
