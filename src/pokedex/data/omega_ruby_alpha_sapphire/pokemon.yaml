        jp_kana:
          omega_ruby: "せなかの　もようは　ちいきによって\nことなっている。テッポウオの　むれに\nまざって　およぐことが　おおい。"
          alpha_sapphire: "かいめんの　ちかくを　およぐため\nふねの　うえから　せなかの　もようを\nかんさつする　ことが　できる。"
        jp_kanji:
          omega_ruby: "背中の　模様は　地域によって\n異なっている。テッポウオの　群れに\n混ざって　泳ぐことが　多い。"
          alpha_sapphire: "海面の　近くを　泳ぐため\n船の　上から　背中の　模様を\n観察する　ことが　できる。"
        en:
          omega_ruby: "The pattern on its back varies by region.\nIt often swims in a school of Remoraid."
          alpha_sapphire: "When it swims close to the surface of the ocean,\npeople aboard ships are able to observe the pattern\non its back."
        fr:
          omega_ruby: "Les motifs sur son dos sont différents selon les régions.\nOn le voit souvent dans des bancs de Rémoraid."
          alpha_sapphire: "Il nage si proche de la surface que l’on peut voir les motifs\nsur son dos depuis un bateau."
        it:
          omega_ruby: "Il disegno sul suo dorso cambia a seconda della regione.\nNuota spesso assieme ai branchi di Remoraid."
          alpha_sapphire: "Poiché Mantyke nuota in superficie, si possono ammirare\ni disegni sulla sua schiena da un’imbarcazione."
        de:
          omega_ruby: "Ihre Rücken sind je nach Region unterschiedlich gemustert.\nOft mischen sie sich unter Remoraid-Schwärme."
          alpha_sapphire: "Da es nah an der Meeresoberfläche schwimmt, kann man\nsein Rückenmuster von Schiffen aus erspähen."
        es:
          omega_ruby: "Los símbolos de su espalda cambian según la región. A veces\nse mezcla con bancos de Remoraid y nada junto a ellos."
          alpha_sapphire: "Cuando nada cerca de la superficie, pueden observarse los\ndibujos de su lomo desde los barcos."
        ko:
          omega_ruby: "등의 무늬는 지역에 따라\n달라진다. 총어 무리에\n섞여 헤엄치는 일이 많다."
          alpha_sapphire: "해수면 근처에서 헤엄치므로\n배 위에서 등 모양을\n관찰할 수 있다."
snover:
  species_id: 459
  names:
    jp_kana: ユキカブリ
    jp_kanji: ユキカブリ
    en: Snover
    fr: Blizzi
    it: Snover
    de: Shnebedeck
    es: Snover
    ko: 눈쓰개
  forms:
    snover:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 50
        special_attack: 62
        special_defense: 60
        speed: 40
      evs_yield:
        hp: 0
        attack: 1
