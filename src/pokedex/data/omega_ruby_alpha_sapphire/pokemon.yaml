          omega_ruby: "うちゅうから　おちてきたと　いわれる　しんしゅ。\nくうちゅうに　うかび　おともなく　いどうする。\nたたかいに　なると　つよい　ひかりを　はなつ。"
          alpha_sapphire: "たいよう　こうせんが　パワーの　みなもと。\nあいての　こころを　よみとると　いわれている。\nからだを　かいてんさせて　こうねつを　はなつ。"
        jp_kanji:
          omega_ruby: "宇宙から　落ちてきたと　いわれる　新種。\n空中に　浮かび　音もなく　移動する。\n戦いに　なると　強い　光を　放つ。"
          alpha_sapphire: "太陽　光線が　パワーの　源。\n相手の　心を　読み取ると　いわれている。\n体を　回転させて　高熱を　放つ。"
        en:
          omega_ruby: "Solrock is a new species of Pokémon that is said to have fallen\nfrom space. It floats in air and moves silently. In battle, this\nPokémon releases intensely bright light."
          alpha_sapphire: "Sunlight is the source of Solrock’s power. It is said to possess\nthe ability to read the emotions of others. This Pokémon gives\noff intense heat while rotating its body."
        fr:
          omega_ruby: "Solaroc est une nouvelle espèce de Pokémon. On raconte\nqu’il serait tombé de l’espace. Il flotte dans les airs et\nse déplace silencieusement. Au combat, ce Pokémon\nlibère une lumière intense."
          alpha_sapphire: "La lumière du soleil est à l’origine du pouvoir de Solaroc.\nOn raconte qu’il peut lire les pensées d’autrui. Ce Pokémon\npeut libérer une chaleur insoutenable en faisant tournoyer\nson corps."
        it:
          omega_ruby: "Solrock è una nuova specie di Pokémon che pare sia\nprecipitata dallo spazio. Fluttua a mezz’aria spostandosi\nsilenziosamente. In lotta emana una luce estremamente\nintensa."
          alpha_sapphire: "La luce solare è la fonte primaria dell’energia di Solrock.\nPare che riesca a carpire i pensieri degli altri. Il Pokémon\nemana un calore intenso roteando vorticosamente."
        de:
          omega_ruby: "Sonnfel ist eine neue Pokémon-Art, die angeblich aus dem\nWeltall kam. Es gleitet durch die Luft und bewegt sich leise.\nIm Kampf setzt dieses Pokémon sehr helles Licht ein."
          alpha_sapphire: "Aus Sonnenlicht zieht Sonnfel seine Energie.\nEs kann angeblich die Emotionen anderer sehen.\nDieses Pokémon gibt eine starke Hitze ab,\nwenn es sich um die eigene Achse dreht."
        es:
          omega_ruby: "Solrock pertenece a una nueva especie de Pokémon a la que\nse le atribuye una procedencia extraterrestre. Este Pokémon\npermanece flotando en el aire y se mueve muy despacio. Al\nluchar, desprende una luz viva e intensa."
          alpha_sapphire: "La fuente de energía de Solrock es la luz del sol. Dicen que\ntiene la habilidad de leer la mente de los demás. Al rotar,\nlibera mucho calor."
        ko:
          omega_ruby: "우주에서 떨어졌다고 전해지는 새로운 종이다.\n공중에 떠서 소리 없이 이동한다.\n싸울 때는 강한 빛을 발산한다."
          alpha_sapphire: "태양 광선이 파워의 원천이다.\n상대의 마음을 읽어낸다고 전해지고 있다.\n몸을 회전시켜 고열을 발산한다."
