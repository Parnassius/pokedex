        jp_kana:
          omega_ruby: "２ほんの　しっぽを　スクリューの\nように　まわして　およぐ。もぐる\nときは　うきぶくろが　しぼむ。"
          alpha_sapphire: "くびの　うきぶくろを　ふくらませ\nすいめんから　かおを　だして\nあたりの　ようすを　うかがっている。"
        jp_kanji:
          omega_ruby: "２本の　尻尾を\nスクリューの　ように　回して　泳ぐ。\n潜る　ときは　浮き袋が　しぼむ。"
          alpha_sapphire: "首の　浮き袋を　ふくらませ\n水面から　顔を　だして\n辺りの　様子を　うかがっている。"
        en:
          omega_ruby: "It swims by rotating its two tails like a screw.\nWhen it dives, its flotation sac collapses."
          alpha_sapphire: "It inflates the flotation sac around its neck and\npokes its head out of the water to see what is\ngoing on."
        fr:
          omega_ruby: "Il nage en faisant tournoyer ses deux queues comme\nune hélice. Sa bouée s’affaisse quand il plonge."
          alpha_sapphire: "Il utilise la bouée autour de son cou pour passer sa tête hors\nde l’eau et observer les alentours."
        it:
          omega_ruby: "Nuota roteando le due code come fossero viti. Quando si\nimmerge, il suo galleggiante si sgonfia."
          alpha_sapphire: "Gonfia il salvagente che ha attorno al collo per mantenere\nla testa fuori dall’acqua mentre controlla i paraggi."
        de:
          omega_ruby: "Es schwimmt, indem es seine beiden Schweife wie eine\nSchiffsschraube rotieren lässt."
          alpha_sapphire: "Es füllt den Schwimmreifen um seinen Hals mit Luft,\num den Kopf über dem Wasser zu halten und die Umgebung\nzu überblicken."
        es:
          omega_ruby: "Nada rotando sus dos colas a modo de tornillo. Cuando\nbucea, el flotador se pliega."
          alpha_sapphire: "Hincha el flotador de su cuello para flotar y saca la cabeza\nde la superficie del agua para explorar sus alrededores."
        ko:
          omega_ruby: "2개의 꼬리를 스크루처럼\n돌려서 헤엄친다. 잠수할 때는\n부낭이 오그라든다."
          alpha_sapphire: "목의 부낭을 부풀려\n수면에서 얼굴을 내밀어\n주변의 상황을 살피고 있다."
