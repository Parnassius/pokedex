        jp_kana:
          omega_ruby: "あいてに　まきつき　まるい\nはんてんから　でんきを　ながして\nしびれたところを　まるかじりする。"
          alpha_sapphire: "しょくよく　おうせいな　ポケモン。\nえものを　みつけると　おそいかかり\nでんきで　しびれさせてから　たべる。"
        jp_kanji:
          omega_ruby: "相手に　巻きつき　まるい\nはん点から　電気を　流して\nしびれたところを　まるかじりする。"
          alpha_sapphire: "食欲　旺盛な　ポケモン。\n獲物を　見つけると　襲いかかり\n電気で　しびれさせてから　食べる。"
        en:
          omega_ruby: "It wraps itself around its prey and paralyzes it with\nelectricity from the round spots on its sides.\nThen it chomps."
          alpha_sapphire: "These Pokémon have a big appetite. When they\nspot their prey, they attack it and paralyze it\nwith electricity."
        fr:
          omega_ruby: "Ses taches émettent de l’électricité quand il s’enroule autour\nde ses proies pour les paralyser avant de les dévorer."
          alpha_sapphire: "Un Pokémon doté d’un gros appétit. Il paralyse ses proies\navec des décharges électriques avant de les manger."
        it:
          omega_ruby: "Si avvinghia alla preda e la paralizza rilasciando elettricità\ndalle macchie tonde, poi la ingoia intera."
          alpha_sapphire: "Pokémon dal grande appetito. Quando attacca, immobilizza\nil nemico paralizzandolo con l’elettricità."
        de:
          omega_ruby: "Schlingt sich um Gegner, lähmt sie über die rund gemaserten\nFlächen an seinem Körper mit Strom und beißt beherzt zu."
          alpha_sapphire: "Hat es seine Beute erspäht, lähmt es sie mit Elektrizität und\nverspeist sie anschließend."
        es:
          omega_ruby: "Se enrolla alrededor de su presa, la paraliza con la\nelectricidad de sus marcas circulares y le asesta mordiscos."
          alpha_sapphire: "Pokémon de apetito voraz. En cuanto encuentra una presa, la\nparaliza con electricidad y la engulle."
        ko:
          omega_ruby: "상대를 휘감고 동그란\n반점에서 전기를 흘려보내\n마비시킨 뒤 통째로 문다."
          alpha_sapphire: "식욕이 왕성한 포켓몬이다.\n먹이를 발견하면 덮쳐서\n전기로 마비시킨 후 먹는다."
eelektross:
  species_id: 604
  names:
    jp_kana: シビルドン
    jp_kanji: シビルドン
    en: Eelektross
