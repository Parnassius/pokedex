        fr:
          omega_ruby: "On reconnaît un Rapasdepic à son long cou et à son bec\nallongé. Ces attributs lui permettent d’attraper facilement\nses proies dans la terre ou dans l’eau. Il bouge son bec\nlong et fin avec une grande agilité."
          alpha_sapphire: "On reconnaît un Rapasdepic à son long cou et à son bec\nallongé. Ces attributs lui permettent d’attraper facilement\nses proies dans la terre ou dans l’eau. Il bouge son bec\nlong et fin avec une grande agilité."
        it:
          omega_ruby: "Fearow è caratterizzato da un collo e un becco molto lunghi,\ndalla forma ottimale per la cattura della preda a terra o\nin acqua. Muove agilmente il becco lungo e affusolato\nper stanare la preda."
          alpha_sapphire: "Fearow è caratterizzato da un collo e un becco molto lunghi,\ndalla forma ottimale per la cattura della preda a terra o\nin acqua. Muove agilmente il becco lungo e affusolato\nper stanare la preda."
        de:
          omega_ruby: "Ibitak erkennt man an seinem langen Hals und Schnabel.\nEr ist hervorragend dafür geeignet, im Erdreich oder im\nWasser Beute zu jagen. Es setzt seinen langen, dünnen\nSchnabel dabei sehr geschickt ein."
          alpha_sapphire: "Ibitak erkennt man an seinem langen Schnabel. Er ist\nhervorragend dafür geeignet, im Erdreich oder im Wasser\nBeute zu jagen. Es setzt seinen langen, dünnen Schnabel\ndabei sehr geschickt ein."
        es:
          omega_ruby: "A Fearow se le reconoce por tener un pescuezo y un pico\nlargos que le permiten cazar en tierra y agua. Tiene una\ngran habilidad moviendo el fino pico para atrapar a sus presas."
          alpha_sapphire: "A Fearow se le reconoce por tener un pescuezo y un pico\nlargos que le permiten cazar en tierra y agua. Tiene una\ngran habilidad moviendo el fino pico para atrapar a sus presas."
        ko:
          omega_ruby: "긴 목과 부리는 땅이나 물 안에\n있는 먹이를 잡기 편리하다.\n가늘고 긴 부리로 능숙히 집는다."
