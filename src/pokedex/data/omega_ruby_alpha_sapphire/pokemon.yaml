      descriptions:
        jp_kana:
          omega_ruby: "あたまで　もえる　ほのおの　ように\nはげしい　せいかくの　ポケモン。\nすばやさでは　だれにも　まけない。"
          alpha_sapphire: "すばやさで　あいてを　ほんろうする。\nりょうて　りょうあしを　つかった\nどくとくの　たたかい　かたを　する。"
        jp_kanji:
          omega_ruby: "頭で　燃える　炎の　ように\n激しい　性格の　ポケモン。\n素早さでは　だれにも　負けない。"
          alpha_sapphire: "素早さで　相手を　翻弄する。\n両手　両足を　使った\n独特の　戦い方を　する。"
        en:
          omega_ruby: "Its crown of fire is indicative of its fiery nature.\nIt is beaten by none in terms of quickness."
          alpha_sapphire: "It tosses its enemies around with agility. It uses all\nits limbs to fight in its own unique style."
        fr:
          omega_ruby: "Sa couronne de feu trahit son tempérament bouillant.\nSa vitesse est inégalée."
          alpha_sapphire: "Il fait voltiger ses ennemis grâce à sa vitesse et son style\nde combat spécial qui utilise ses quatre membres."
        it:
          omega_ruby: "La sua criniera di fuoco è indice della sua natura violenta.\nNessuno può batterlo in velocità."
          alpha_sapphire: "Confonde il nemico con la velocità. Ha uno stile di lotta\nspeciale, che prevede l’uso dei quattro arti."
        de:
          omega_ruby: "Seine Krone aus Feuer ist Zeichen seines feurigen Wesens.\nNiemand ist schneller im Kampf als dieses Pokémon."
          alpha_sapphire: "Es hält den Gegner mit flinken Bewegungen zum Narren.\nIm Kampf setzt es alle Gliedmaßen ein."
        es:
          omega_ruby: "Su corona de fuego demuestra su naturaleza ígnea. Nadie le\ngana en velocidad."
          alpha_sapphire: "Maneja a sus rivales con tremenda agilidad. En su especial\nforma de luchar usa todos sus miembros."
        ko:
          omega_ruby: "머리에서 타오르는 불꽃처럼\n과격한 성격의 포켓몬이다.\n스피드는 누구에게도 지지 않는다."
          alpha_sapphire: "스피드로 상대를 농락한다.\n양팔 양다리를 활용한\n독특한 방식으로 싸운다."
piplup:
  species_id: 393
  names:
    jp_kana: ポッチャマ
