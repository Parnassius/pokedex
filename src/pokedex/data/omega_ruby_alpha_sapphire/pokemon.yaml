      descriptions:
        jp_kana:
          omega_ruby: "えものを　くびのツメで　はさみこみ\nみうごきを　とれなくしてから\nもうどくを　あたえ　とどめを　さす。"
          alpha_sapphire: "すばやい　うごきで　てきを　おいつめ\nあたまの　ツノで　こうげきする。\nとどめを　さすまで　ようしゃしない。"
        jp_kanji:
          omega_ruby: "獲物を　首のツメで　挟みこみ\n身動きを　とれなくしてから\n猛毒を　与え　とどめを　刺す。"
          alpha_sapphire: "素早い　動きで　敵を　追いつめ\n頭の　ツノで　攻撃する。\nとどめを　刺すまで　容赦しない。"
        en:
          omega_ruby: "It clasps its prey with the claws on its neck until it\nstops moving. Then it finishes it off with\ndeadly poison."
          alpha_sapphire: "With quick movements, it chases down its foes,\nattacking relentlessly with its horns until it prevails."
        fr:
          omega_ruby: "Il paralyse l’ennemi avec les griffes de son cou avant\nde mettre fin au combat grâce à son poison virulent."
          alpha_sapphire: "Il accule l’ennemi par ses mouvements rapides et l’attaque\navec ses cornes. Il ne s’arrête qu’au coup de grâce."
        it:
          omega_ruby: "Trafigge la preda con gli aculei del collo e dopo averla\nimmobilizzata la finisce con le sue tossine."
          alpha_sapphire: "Incalza la preda con movimenti rapidi e la attacca\nripetutamente con le corna. Non si ferma fino al colpo\ndi grazia."
        de:
          omega_ruby: "Lähmt seine Beute, indem es sie mit den Zacken an seinem\nHals aufspießt. Mit einer Ladung Gift gibt es ihr den Rest."
          alpha_sapphire: "Holt Gegner flinken Fußes ein und greift sie mit den Hörnern\nan seinem Kopf an. Gnade ist ihm ein Fremdwort."
        es:
          omega_ruby: "Atenaza a sus presas con las garras que sobresalen de su\ncuello hasta que no se pueden mover y las remata con\nveneno."
          alpha_sapphire: "Arrincona a sus rivales con rápidos movimientos y los ensarta\ncon sus cuernos. No se detiene hasta vencer."
        ko:
          omega_ruby: "먹이를 목의 가시에 끼워 넣어\n움직이지 못하게 한 후\n맹독을 퍼뜨려 마무리한다."
          alpha_sapphire: "빠른 움직임으로 적을 바싹 몰아넣어\n머리의 뿔로 공격한다.\n마무리 지을 때까지 봐주지 않는다."
cottonee:
  species_id: 546
