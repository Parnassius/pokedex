      descriptions:
        jp_kana:
          omega_ruby: "ブリザードを　はっせいさせて　あたり\nいちめんを　まっしろに　してしまう。\nべつめい　アイスモンスター。"
          alpha_sapphire: "まんねんゆきが　つもる　さんみゃくで\nしずかに　くらす。ブリザードを\nはっせいさせて　すがたを　かくす。"
        jp_kanji:
          omega_ruby: "ブリザードを　発生させて　あたり\n一面を　真っ白に　してしまう。\n別名　アイスモンスター。"
          alpha_sapphire: "万年雪が　積もる　山脈で\n静かに　暮らす。ブリザードを\n発生させて　姿を　隠す。"
        en:
          omega_ruby: "It blankets wide areas in snow by whipping up\nblizzards. It is also known as “The Ice Monster.”"
          alpha_sapphire: "It lives a quiet life on mountains that are perpetually\ncovered in snow. It hides itself by whipping\nup blizzards."
        fr:
          omega_ruby: "De larges zones sont recouvertes par la neige de\nses blizzards. On l’appelle « monstre des glaces »."
          alpha_sapphire: "Il hante les sommets aux neiges éternelles, et se cache en\ndéclenchant des blizzards."
        it:
          omega_ruby: "Crea bufere che ricoprono di neve ampissime aree.\nÈ noto anche come “Mostro dei ghiacci”."
          alpha_sapphire: "Vive nella pace delle cime montuose tra le nevi eterne:\nscatena bufere di neve e poi si nasconde."
        de:
          omega_ruby: "Es bedeckt weite Gebiete mit Schnee, indem es Blizzards\nauslöst. Man nennt es „Das Eismonster“."
          alpha_sapphire: "Es haust im Gebirge, wo ewiger Schnee liegt, und löst\nBlizzards aus, um sich zu verstecken."
        es:
          omega_ruby: "Genera ventiscas con las que cubre de nieve grandes áreas.\nSe le llama el Monstruo de Hielo."
          alpha_sapphire: "Vive en paz en cordilleras de nieves eternas. Genera ventiscas\npara ocultarse."
        ko:
          omega_ruby: "블리자드를 발생시켜 주변\n일대를 새하얗게 만든다.\n별명은 아이스 몬스터다."
          alpha_sapphire: "만년설이 쌓인 산맥에서\n조용히 지낸다. 블리자드를\n발생시켜 모습을 감춘다."
