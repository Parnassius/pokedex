        - dragon
        - ice
      egg_groups:
        - undiscovered
      abilities:
        - pressure
      descriptions:
        jp_kana:
          omega_ruby: "うしなった　からだを　しんじつと\nりそうで　うめてくれる　えいゆうを\nまつ　こおりの　でんせつポケモン。"
          alpha_sapphire: "きょうりょくな　れいとうエネルギーを\nたいないで　つくりだすが　もれだした\nれいきで　からだが　こおっている。"
        jp_kanji:
          omega_ruby: "失った　体を　真実と\n理想で　埋めてくれる　英雄を\n待つ　氷の　伝説ポケモン。"
          alpha_sapphire: "強力な　冷凍エネルギーを\n体内で　作り出すが　漏れ出した\n冷気で　体が　凍っている。"
        en:
          omega_ruby: "This legendary ice Pokémon waits for a hero to fill\nin the missing parts of its body with truth or ideals."
          alpha_sapphire: "It generates a powerful, freezing energy inside\nitself, but its body became frozen when the energy\nleaked out."
        fr:
          omega_ruby: "Il attend le héros qui saura réanimer son corps de glace\nincomplet en partageant avec lui son Idéal et sa Réalité."
          alpha_sapphire: "Son corps produit une énergie à très basse température,\nmais le souffle glacé qu’il exhale l’a gelé lui-même."
        it:
          omega_ruby: "Questo leggendario Pokémon dei ghiacci attende l’eroe che\ngli restituirà le sue vere sembianze con gli ideali o la verità."
          alpha_sapphire: "Produce all’interno del suo corpo una potente e gelida\nenergia. Ma l’aria fredda che esala lo ha congelato."
        de:
          omega_ruby: "Ein Legendäres Eis-Pokémon, das auf den Helden wartet, der\nseinen verstümmelten Körper mit Wunsch und Wirklichkeit heilt."
          alpha_sapphire: "Sein Körper erzeugt in seinem Inneren gewaltige Mengen an\nKälteenergie. Tritt diese jedoch aus, gefriert sein Körper."
        es:
          omega_ruby: "Pokémon legendario que aguarda al héroe que compense el\nvacío de su cuerpo de hielo con verdad e ideales."
          alpha_sapphire: "Produce en su interior una intensa energía gélida, y cualquier\nfuga hace que su cuerpo se congele."
        ko:
          omega_ruby: "잃어버린 몸을 진실과\n이상으로 채워줄 영웅을\n기다리는 얼음의 전설 포켓몬."
          alpha_sapphire: "강력한 냉동 에너지를\n체내에서 만들어 내지만 새어 나온\n냉기에 몸이 얼어 있다."
