          omega_ruby: "ふさふさの　毛で　覆われた　大きな　尻尾は\n長生き　するほど　深い　色合いに　変わる。\n甲羅の　キズは　強者の　証。"
          alpha_sapphire: "ふさふさの　毛で　覆われた　大きな　尻尾は\n長生き　するほど　深い　色合いに　変わる。\n甲羅の　キズは　強者の　証。"
        en:
