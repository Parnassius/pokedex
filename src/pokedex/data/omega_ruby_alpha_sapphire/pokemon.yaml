      descriptions:
        jp_kana:
          omega_ruby: "おおいわを　くだく　キバを　もつ。\nなわばりを　めぐる　オノンドたちの\nあらそいは　ひじょうに　はげしい。"
          alpha_sapphire: "キバは　にどと　はえかわらないので\nたたかいおわると　かわらの　いわを\nつかって　たんねんに　みがきあげる。"
        jp_kanji:
          omega_ruby: "大岩を　砕く　キバを　持つ。\n縄張りを　巡る　オノンドたちの\n争いは　非常に　激しい。"
          alpha_sapphire: "キバは　二度と　生え変わらないので\n戦い終わると　川原の　岩を\n使って　丹念に　磨きあげる。"
        en:
          omega_ruby: "Their tusks can shatter rocks. Territory battles\nbetween Fraxure can be intensely violent."
          alpha_sapphire: "A broken tusk will not grow back, so it diligently\nsharpens its tusks on river rocks after the end of\na battle."
        fr:
          omega_ruby: "Leurs crocs peuvent découper des rochers.\nLeurs querelles de territoire sont extrêmement violentes."
          alpha_sapphire: "Comme ses crocs brisés ne repoussent pas, il les aiguise\navec soin après le combat sur les pierres des rivières."
        it:
          omega_ruby: "Ha zanne in grado di frantumare rocce. Le lotte per il territorio\ntra i Fraxure sono furibonde."
          alpha_sapphire: "Le sue zanne non ricrescono più, per cui finita una lotta se ne\nprende cura e le affila diligentemente con pietre di fiume."
        de:
          omega_ruby: "Mit seinen Fängen kriegt es sogar Felsen klein. Gegen\nArtgenossen, die sein Revier passieren, geht es besonders\nhart vor."
          alpha_sapphire: "Da seine Hauer nicht mehr nachwachsen, wetzt es sie nach\neinem Kampf behutsam an den Felsen eines Flussbettes."
        es:
          omega_ruby: "Sus colmillos pueden hacer añicos rocas inmensas. Las luchas\nterritoriales de los Fraxure son encarnizadas."
          alpha_sapphire: "Sus colmillos no vuelven a crecer, por lo que, al término de\ncada combate, los afila cuidadosamente con cantos de río."
        ko:
          omega_ruby: "큰 바위를 부수는 이빨을 가지고 있다.\n액슨도들의 영역 싸움은\n매우 격렬하다."
          alpha_sapphire: "이빨은 다시는 나지 않기 때문에\n싸움이 끝나면 강가에 있는 바위를\n사용해서 정성껏 손질한다."
haxorus:
  species_id: 612
  names:
    jp_kana: オノノクス
    jp_kanji: オノノクス
    en: Haxorus
    fr: Tranchodon
