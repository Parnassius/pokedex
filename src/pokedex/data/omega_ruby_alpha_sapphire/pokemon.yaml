          alpha_sapphire: "Piloswine è ricoperto da una fitta chioma di pelo lungo\nche lo aiuta a contrastare il freddo pungente. Usa le proprie\nzanne per scavare in cerca del cibo sepolto sotto i ghiacci."
        de:
