          omega_ruby: "캥카의 새끼가 혼자서 놀고 있어도\n절대로 잡으려 하면 안 된다.\n가까이 있는 부모가 격렬히 화낸다."
          alpha_sapphire: "캥카의 새끼가 혼자서 놀고 있어도\n절대로 잡으려 하면 안 된다.\n가까이 있는 부모가 격렬히 화낸다."
