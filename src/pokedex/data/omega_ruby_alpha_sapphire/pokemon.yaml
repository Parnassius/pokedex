        de:
          omega_ruby: "Rossana bewegt sich rhythmisch fort. Es wiegt und schwingt\nseine Hüften, als würde es tanzen. Seine Bewegungen wirken\nso anziehend auf Menschen, dass diese beginnen, mit den\nHüften zu schwingen, ohne darüber nachzudenken."
          alpha_sapphire: "Rossana bewegt sich rhythmisch fort. Es wiegt und schwingt\nseine Hüften, als würde es tanzen. Seine Bewegungen wirken\nso anziehend auf Menschen, dass diese beginnen, mit den\nHüften zu schwingen, ohne darüber nachzudenken."
        es:
          omega_ruby: "Jynx camina con ritmo, balanceándose y moviendo las caderas\ncomo si estuviera bailando. Realiza unos movimientos tan\nvistosos y atractivos que no hay quien pueda resistirse a\nmover las caderas."
          alpha_sapphire: "Jynx camina con ritmo, balanceándose y moviendo las caderas\ncomo si estuviera bailando. Realiza unos movimientos tan\nvistosos y atractivos que no hay quien pueda resistirse a\nmover las caderas."
