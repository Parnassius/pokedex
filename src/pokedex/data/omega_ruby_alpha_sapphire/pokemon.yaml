          alpha_sapphire: "とさかの　おおきさで　グループの\nリーダーを　きめる。キックこうげきで\nコンクリートブロックを　はかいする。"
        jp_kanji:
          omega_ruby: "脱皮した　皮を　ずりあげて\nダメージを　減らしつつ　キック！\nとさかが　大きいほど　偉そうだ。"
          alpha_sapphire: "トサカの　大きさで　グループの\nリーダーを　決める。キック攻撃で\nコンクリートブロックを　破壊する。"
        en:
          omega_ruby: "It pulls up its shed skin to protect itself while\nit kicks. The bigger the crest, the more respected\nit is."
          alpha_sapphire: "It can smash concrete blocks with its kicking\nattacks. The one with the biggest crest is the\ngroup leader."
        fr:
          omega_ruby: "Son baggy de peau le protège quand il donne des coups\nde pied. Les meneurs sont ceux qui ont la plus grande crête."
          alpha_sapphire: "La plus grande crête détermine le meneur du groupe.\nIl détruit des blocs de béton à coups de pied."
        it:
          omega_ruby: "Quando tira calci, si protegge dai danni con la pelle\ndella muta. Più grande è la cresta e più arie si dà."
          alpha_sapphire: "Il capo del gruppo viene scelto in base alla grandezza della\ncresta. Spacca blocchi di cemento con dei calci."
        de:
          omega_ruby: "Es wehrt Angriffe mit seiner alten Haut ab und kontert mit\nTritten. Sein Ego entspricht der Größe seines Kamms."
          alpha_sapphire: "Wählt seinen Anführer über die Größe des Kamms auf dem\nKopf. Ein Tritt von ihm reicht, um Betonblöcke zu zertrümmern."
        es:
          omega_ruby: "Se protege de los ataques con la muda de su piel mientras\nreparte patadas. Cuanto mayor es su cresta, más se le\nrespeta."
          alpha_sapphire: "El líder del grupo es aquel cuya cresta es mayor. Es capaz\nde romper bloques de cemento con sus potentes patadas."
        ko:
          omega_ruby: "탈피한 가죽을 끌어 올려\n데미지를 줄이면서 킥!\n볏이 클수록 거만하다."
          alpha_sapphire: "볏의 크기로 그룹의\n리더를 정한다. 발차기로\n콘크리트 블록을 파괴한다."
sigilyph:
  species_id: 561
  names:
    jp_kana: シンボラー
    jp_kanji: シンボラー
    en: Sigilyph
    fr: Cryptéro
    it: Sigilyph
    de: Symvolara
    es: Sigilyph
    ko: 심보러
