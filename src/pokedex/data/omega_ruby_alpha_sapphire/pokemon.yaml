          omega_ruby: "Lorsqu’on rencontre un petit Kangourex qui joue tout seul,\nil ne faut jamais le déranger ou essayer de l’attraper.\nLes parents du bébé Pokémon sont sûrement dans le coin\net ils risquent d’entrer dans une colère noire."
