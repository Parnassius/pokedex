          alpha_sapphire: "おたがいの　そんざいを　みとめあい\nむだに　あらそわない　ひとのために\nさまざまな　めぐみを　わけあたえる。"
        jp_kanji:
          omega_ruby: "争いのない　平和な　土地に\nトゲキッスは　訪れ　さまざまな　恵みを\n分け与えると　言われる。"
          alpha_sapphire: "お互いの　存在を　認め合い\n無駄に　争わない　人のために\nさまざまな　恵みを　分け与える。"
        en:
          omega_ruby: "As everyone knows, it visits peaceful regions,\nbringing them gifts of kindness and\nsweet blessings."
          alpha_sapphire: "It shares many blessings with people who respect\none another’s rights and avoid needless strife."
        fr:
          omega_ruby: "On dit qu’il apparaît dans les contrées paisibles pour dispenser\nmille bienfaits."
          alpha_sapphire: "Il apprécie particulièrement les gens qui respectent les autres\net évitent les conflits inutiles."
        it:
          omega_ruby: "Pare che Togekiss ami visitare le regioni pacifiche, senza\nconflitti, donando bontà e dolcezza."
          alpha_sapphire: "La sua natura lo rende affine alle persone che rispettano\ni diritti altrui ed evitano conflitti inutili."
        de:
          omega_ruby: "Es heißt, Togekiss erscheine in friedlichen Zeiten und verteile\nalle möglichen Wohltaten."
          alpha_sapphire: "Menschen, die unnötigen Streit vermeiden und sich\ngegenseitig respektieren, ist es wohlgesinnt."
        es:
          omega_ruby: "Se dice que aparece en zonas pacíficas y las bendice con sus\ndones."
          alpha_sapphire: "Congenia muy bien con las personas que respetan los\nderechos de los demás y evitan riñas innecesarias."
        ko:
          omega_ruby: "다툼이 없는 평화로운 땅에\n토게키스가 나타나 여러 가지\n은총을 나눠줬다고 전해진다."
          alpha_sapphire: "서로 존재를 인정하고 쓸데없는\n분쟁을 하지 않는 사람을 위해\n다양한 은총을 나누어 준다."
