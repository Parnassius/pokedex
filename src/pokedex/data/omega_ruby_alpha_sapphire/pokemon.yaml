        jp_kana:
          omega_ruby: "えものを　どくで　しびれさせて\n８０００メートルの　しんかいに\nあるという　すみかに　つれていく。"
          alpha_sapphire: "ベールの　ような　てあしを　まきつけ\nしびれさせると　８０００メートルの\nしんかいに　つれこんで　ころすのだ。"
        jp_kanji:
          omega_ruby: "獲物を　毒で　しびれさせて\n８０００メートルの　深海に\nあるという　住処に　連れていく。"
          alpha_sapphire: "ベールの　ような　手足を　巻きつけ\nしびれさせると　８０００メートルの\n深海に　連れこんで　殺すのだ。"
        en:
          omega_ruby: "They paralyze prey with poison, then drag them\ndown to their lairs, five miles below the surface."
          alpha_sapphire: "If its veil-like arms stun and wrap a foe, that foe will\nbe dragged miles below the surface, never\nto return."
        fr:
          omega_ruby: "Il paralyse ses proies avec du poison et les entraîne jusqu’à\nson antre, qu’on dit situé à 8 000 m de profondeur."
          alpha_sapphire: "Il enserre ses proies dans ses voiles et les entraîne\nsous la surface de la mer jusqu’à plus de 8 000 m\nde profondeur."
        it:
          omega_ruby: "Paralizza la preda con il veleno e la porta nella sua dimora\na 8000 m in fondo al mare."
          alpha_sapphire: "Paralizza la preda con i suoi tentacoli a forma di velo e poi\nla trascina a 8000 m sotto il livello del mare."
        de:
          omega_ruby: "Es lähmt seine Beute mit Gift und verschleppt sie in seinen\nUnterschlupf, 8 km unter dem Meeresspiegel."
          alpha_sapphire: "Es schlingt seine schleierartigen Arme um seine Beute und\nentführt sie 8 000 m in die Tiefe, wo es sie schließlich tötet."
        es:
          omega_ruby: "Paraliza a sus presas con veneno y las lleva a su morada, que\nse encuentra a 8000 m en el fondo del mar."
          alpha_sapphire: "Rodea a sus presas con sus tentáculos, las entumece y las\narrastra a 8000 m de profundidad hasta que las ahoga."
        ko:
          omega_ruby: "먹이를 독으로 마비시켜\n8000m 심해에\n있다는 거처로 데려간다."
          alpha_sapphire: "베일 같은 손발을 휘감아\n마비시켜서 8000m의\n심해에 데려가 끝장낸다."
jellicent:
