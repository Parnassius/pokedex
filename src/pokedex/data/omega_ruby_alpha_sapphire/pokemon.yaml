spheal:
  species_id: 363
  names:
    jp_kana: タマザラシ
    jp_kanji: タマザラシ
    en: Spheal
    fr: Obalie
    it: Spheal
    de: Seemops
    es: Spheal
    ko: 대굴레오
  forms:
    spheal:
      form_id: 0
      base_stats:
        hp: 70
        attack: 40
        defense: 50
        special_attack: 55
        special_defense: 50
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - thick_fat
        - ice_body
      hidden_ability: oblivious
      descriptions:
        jp_kana:
          omega_ruby: "あるくより　ころがる　ほうが　だんぜん　はやい。\nしょくじの　じかんは　みんなが　いっせいに　てを\nたたいて　よろこぶので　けっこう　うるさいのだ。"
          alpha_sapphire: "いつも　ころがって　いどうする　ポケモンだ。\nりゅうひょうの　きせつに　こおりの　うえを\nころがり　うみを　わたる　すがたを　みかける。"
        jp_kanji:
          omega_ruby: "歩くより　転がる　ほうが　断然　速い。\n食事の　時間は　みんなが　一斉に　手を\nたたいて　喜ぶので　結構　うるさいのだ。"
          alpha_sapphire: "いつも　転がって　移動する　ポケモンだ。\n流氷の　季節に　氷の　上を\n転がり　海を　渡る　姿を　見かける。"
        en:
          omega_ruby: "Spheal is much faster rolling than walking to get around.\nWhen groups of this Pokémon eat, they all clap at once to\nshow their pleasure. Because of this, their mealtimes are noisy."
          alpha_sapphire: "Spheal always travels by rolling around on its ball-like body.\nWhen the season for ice floes arrives, this Pokémon can be\nseen rolling about on ice and crossing the sea."
        fr:
          omega_ruby: "Obalie est bien plus rapide quand il roule que quand\nil marche. Lorsque des groupes de ce Pokémon mangent,\nils applaudissent tous en même temps pour montrer\nqu’ils sont contents. Leurs repas sont très bruyants."
          alpha_sapphire: "Obalie voyage toujours en faisant rouler son corps tout rond.\nLorsque la saison des neiges arrive, on peut voir ce Pokémon\nrouler sur la glace et traverser la mer."
        it:
          omega_ruby: "Spheal si muove molto più velocemente rotolando che non\ncamminando. Quando si raggruppano per mangiare, questi\nPokémon sbattono le zampette per dimostrare la loro gioia.\nI loro pasti sono molto rumorosi."
          alpha_sapphire: "Spheal si muove sempre rotolando sul corpo a pallone.\nNella stagione del disgelo lo si vede rotolare da una lastra\ndi ghiaccio all’altra per attraversare il mare."
        de:
          omega_ruby: "Seemops kann schneller rollen als laufen. Wenn Gruppen\ndieses Pokémon zusammen essen, klatschen sie gleichzeitig,\num ihre Freude zu zeigen. Deswegen sind ihre Mahlzeiten\nsehr laut."
          alpha_sapphire: "Seemops bewegt sich fort, indem es seinen ballartigen Körper\nherumrollt. Wenn Eisschollen auftauchen, kann man dieses\nPokémon dabei beobachten, wie es über das Eis rollt und\ndas Meer überquert."
        es:
          omega_ruby: "Spheal se desplaza por el suelo más rápido rodando que\ncaminando. Cuando come con otros de su especie, todos se\nponen a aplaudir para expresar su alegría. Por eso, a veces\nson algo escandalosos."
          alpha_sapphire: "Spheal se desplaza siempre rodando gracias al cuerpo\nesférico que tiene. Al comenzar la época glacial, es fácil verle\nrodando por superficies heladas y atravesando el mar."
        ko:
          omega_ruby: "걷는 것보다 구르는 편이 단연 빠르다.\n식사 시간에는 모두가 일제히 손뼉을\n치며 기뻐하기 때문에 꽤 시끄럽다."
          alpha_sapphire: "항상 굴러서 이동하는 포켓몬이다.\n얼음이 떠다니는 계절에는 얼음 위를\n굴러 바다를 건너는 모습을 볼 수 있다."
