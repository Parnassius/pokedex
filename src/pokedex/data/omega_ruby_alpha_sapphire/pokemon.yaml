        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - shadow_tag
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          omega_ruby: "いつも　ニコニコ　えがおの　ソーナノ。\nおこっているときは　しっぽに　ちゅうもく。\nじめんを　パタパタ　たたいているぞ。"
          alpha_sapphire: "つきのよる　なかまたちと　おしくらまんじゅう。\nぎゅうぎゅう　おされて　がまんづよくなる。\nきょうれつな　カウンターを　くりだす　くんれん。"
        jp_kanji:
          omega_ruby: "いつも　ニコニコ　笑顔の　ソーナノ。\n怒っているときは　尻尾に　注目。\n地面を　パタパタ　たたいているぞ。"
          alpha_sapphire: "月の夜　仲間たちと　おしくらまんじゅう。\nぎゅうぎゅう　押されて　我慢強くなる。\n強烈な　カウンターを　繰り出す　訓練。"
        en:
          omega_ruby: "Wynaut can always be seen with a big, happy smile on its face.\nLook at its tail to determine if it is angry. When angered, this\nPokémon will be slapping the ground with its tail."
          alpha_sapphire: "Wynaut gather on moonlit nights to play by squeezing up\nagainst each other. By being squeezed, this Pokémon gains\nendurance and is trained to dole out powerful counterattacks."
        fr:
          omega_ruby: "Okéoké a toujours un grand sourire qui illumine son visage.\nOn peut savoir s’il est en colère en regardant sa queue.\nLorsqu’il est furieux, sa queue remue en frappant le sol."
          alpha_sapphire: "Les Okéoké se rassemblent quand la nuit est claire pour jouer\nà se presser les uns contre les autres. En se poussant,\nces Pokémon améliorent leur endurance et s’entraînent à\nrenvoyer de puissantes contre-attaques."
        it:
          omega_ruby: "Wynaut ha sempre un sorriso grande e genuino stampato\nsul volto. La coda è indice del suo vero stato d’animo.\nSe la sbatte violentemente a terra, significa che è infuriato."
          alpha_sapphire: "Gli Wynaut si riuniscono di notte al chiaro di luna per giocare\nstringendosi fra loro. In tal modo il Pokémon acquisisce\nresistenza per poter sferrare potenti contrattacchi."
        de:
          omega_ruby: "Isso hat immer ein breites, fröhliches Lächeln auf seinem\nGesicht. Um festzustellen, ob es wütend ist, muss man seinen\nSchweif betrachten. Wenn es wütend ist, schlägt es damit auf\nden Boden."
          alpha_sapphire: "Isso sammeln sich in Mondnächten, um sich gegenseitig\nanzurempeln. Dadurch gewinnt dieses Pokémon an Ausdauer\nund kann wirkungsvolle Gegenangriffe trainieren."
        es:
          omega_ruby: "Wynaut está siempre con una gran sonrisa puesta. Para ver si\nestá enfadado, basta con mirarle la cola. Cuando se le\nmolesta, se pone a dar golpetazos en el suelo."
          alpha_sapphire: "Los Wynaut se agrupan cuando hay luna para jugar\nachuchándose unos a otros. Cuanto más se achuchan, más\nganan en resistencia y lanzan fuertes contraataques con más\nfacilidad."
        ko:
          omega_ruby: "언제나 싱글벙글 미소 짓는 마자.\n화났을 때는 꼬리에 주목하자.\n땅을 탁탁 치고 있다."
          alpha_sapphire: "달밤에 동료들과 밀어내기 놀이를 한다.\n이리저리 밀리면 인내심이 강해진다.\n강렬한 카운터를 쓰는 훈련이다."
snorunt:
  species_id: 361
  names:
    jp_kana: ユキワラシ
    jp_kanji: ユキワラシ
    en: Snorunt
