        jp_kana:
          omega_ruby: "いっぺんに　おおぜいの　ひとを\nばかす　ちからを　もつ。まぼろしの\nけしきを　みせて　すみかを　まもる。"
          alpha_sapphire: "あいてを　ばかす　ことで　むれの\nあんぜんを　まもってきた　ポケモン。\nなかまの　けっそくが　かたい。"
        jp_kanji:
          omega_ruby: "いっぺんに　大勢の　人を\n化かす　力を　持つ。\n幻の　景色を　見せて　住処を　守る。"
          alpha_sapphire: "相手を　化かす　ことで　群れの\n安全を　守ってきた　ポケモン。\n仲間同士の　結束が　固い。"
        en:
          omega_ruby: "Each has the ability to fool a large group of people\nsimultaneously. They protect their lair with\nillusory scenery."
          alpha_sapphire: "Bonds between these Pokémon are very strong.\nIt protects the safety of its pack by tricking\nits opponents."
        fr:
          omega_ruby: "Il peut mystifier instantanément des foules d’humains.\nIl protège son habitat en créant des illusions de paysages."
          alpha_sapphire: "Ces Pokémon protègent les leurs en prenant l’apparence\nde leurs ennemis. Ils forment des groupes très soudés."
        it:
          omega_ruby: "Ha la capacità di trarre in inganno una folla di persone.\nProtegge la tana creando dei miraggi."
          alpha_sapphire: "Protegge la sicurezza del gruppo ammaliando gli avversari.\nDimostra forte solidarietà verso i compagni."
        de:
          omega_ruby: "Kann auf einen Schlag große Massen von Menschen täuschen.\nEs kreiert Illusionen, um sein Revier zu schützen."
          alpha_sapphire: "Seit jeher beschützt es das Rudel, indem es die Gestalt des\nFeindes annimmt. Es ist sehr loyal zu seinen Artgenossen."
        es:
          omega_ruby: "Tiene la facultad de confundir a muchos humanos a la vez.\nProtege su guarida creando un paisaje ilusorio."
          alpha_sapphire: "Siempre ha protegido a su manada embaucando a sus\nenemigos. Dentro de la manada están todos muy unidos."
        ko:
          omega_ruby: "한 번에 많은 사람을\n속이는 힘을 가졌다. 환영의\n경치를 보여줘 거처를 지킨다."
          alpha_sapphire: "상대를 속여 무리의\n안전을 유지해온 포켓몬이다.\n동료 간의 결속력이 강하다."
minccino:
