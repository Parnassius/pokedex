          omega_ruby: "しんかした　ばしょによって　すがたが\nかわる。みぢかにある　ざいりょうが\nからだの　いちぶに　なるのだ。"
          alpha_sapphire: "ミノムッチから　しんかしたとき\nミノが　からだの　いちぶに　なった。\nいっしょう　ミノを　ぬぐことはない。"
        jp_kanji:
          omega_ruby: "進化した　場所によって\n姿が　変わる。身近にある　材料が\n体の　一部に　なるのだ。"
          alpha_sapphire: "ミノムッチから　進化したとき\nミノが　体の　一部に　なった。\n一生　ミノを　脱ぐことはない。"
        en:
          omega_ruby: "Its appearance changes depending on where it\nevolved. The materials on hand become a part of\nits body."
          alpha_sapphire: "When Burmy evolved, its cloak became a part of\nthis Pokémon’s body. The cloak is never shed."
        fr:
          omega_ruby: "Son apparence varie selon le lieu d’évolution. Son corps est\nfaçonné avec les matériaux à disposition."
          alpha_sapphire: "Quand Cheniti a évolué, sa cape a fusionné avec son corps.\nCheniselle ne s’en sépare jamais."
        it:
          omega_ruby: "Il suo aspetto dipende dal luogo in cui si evolve. Tutto ciò\nche ha intorno va a costituire il suo corpo."
          alpha_sapphire: "Con l’evoluzione, il manto di Burmy diventa parte del corpo\ndi questo Pokémon. Non se ne separa mai."
        de:
          omega_ruby: "Die Umgebung, in der es sich entwickelt, bestimmt sein\nAussehen. Es formt seinen Körper mithilfe der umliegenden\nMaterialien."
          alpha_sapphire: "Als sich Burmy entwickelte, wurde sein Umhang Teil\ndes Körpers. Es legt den Umhang niemals ab."
        es:
          omega_ruby: "Su apariencia varía según dónde evolucione. Los materiales\nque haya pasan a formar parte de su cuerpo."
          alpha_sapphire: "Cuando Burmy evolucionó, su caparazón pasó a formar parte\nde este Pokémon."
        ko:
          omega_ruby: "진화한 장소에 따라 모습이\n바뀐다. 가까이 있는 재료가\n몸의 일부가 된다."
          alpha_sapphire: "도롱충이로부터 진화할 때\n도롱이가 몸의 일부가 되었다.\n일생 도롱이를 벗는 일은 없다."
