reshiram:
  species_id: 643
  names:
    jp_kana: レシラム
    jp_kanji: レシラム
    en: Reshiram
    fr: Reshiram
    it: Reshiram
    de: Reshiram
    es: Reshiram
    ko: 레시라무
  forms:
    reshiram:
      form_id: 0
      base_stats:
        hp: 100
        attack: 120
        defense: 100
        special_attack: 150
        special_defense: 120
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - dragon
        - fire
      egg_groups:
        - undiscovered
      abilities:
        - turboblaze
      descriptions:
        jp_kana:
          omega_ruby: "ほのおで　せかいを　もやしつくせる\nでんせつの　ポケモン。しんじつの\nせかいを　きずく　ひとを　たすける。"
          alpha_sapphire: "レシラムの　しっぽが　もえると\nねつエネルギーで　たいきが　うごいて\nせかいの　てんきが　へんかする。"
        jp_kanji:
          omega_ruby: "炎で　世界を　燃やしつくせる\n伝説の　ポケモン。真実の\n世界を　築く　人を　助ける。"
          alpha_sapphire: "レシラムの　尻尾が　燃えると\n熱エネルギーで　大気が　動いて\n世界の　天気が　変化する。"
        en:
          omega_ruby: "This legendary Pokémon can scorch the world with\nfire. It helps those who want to build a world\nof truth."
          alpha_sapphire: "When Reshiram’s tail flares, the heat energy moves\nthe atmosphere and changes the world’s weather."
        fr:
          omega_ruby: "Un Pokémon légendaire assez puissant pour embraser\nle monde entier. Il soutient les défenseurs de la Réalité."
          alpha_sapphire: "Quand sa queue s’embrase, l’énergie thermique dégagée\nmodifie l’atmosphère et bouleverse la météo du monde entier."
        it:
          omega_ruby: "Questo Pokémon leggendario può rendere il mondo un inferno\ndi fiamme. Aiuta chi vuole costruire un mondo di verità."
          alpha_sapphire: "Quando la sua coda brucia, il calore prodotto smuove l’aria\nprovocando cambiamenti climatici in tutto il globo."
        de:
          omega_ruby: "Ein Legendäres Pokémon mit der Macht, die Welt mit seinen\nFlammen einzuäschern. Hilft allen, die nach Wirklichkeit\nstreben."
          alpha_sapphire: "Lodert das Feuer in seinem Schweif auf, gerät die\nErdatmosphäre durch die Hitze in Wallung und das\nWeltklima ändert sich."
        es:
          omega_ruby: "Pokémon legendario capaz de abrasar el mundo con sus\nllamas. Ayuda a quienes persiguen un mundo veraz."
          alpha_sapphire: "Cuando la cola de Reshiram arde, su energía calorífica altera\nla atmósfera, y el tiempo meteorológico cambia."
        ko:
          omega_ruby: "불꽃으로 세상을 태워버릴 수 있는\n전설의 포켓몬. 진실의 세계를\n구축하는 사람을 도와준다."
          alpha_sapphire: "레시라무의 꼬리가 불타면\n열에너지로 대기가 움직여서\n세계의 날씨가 변화된다."
