          omega_ruby: "ドンカラスが　ひくいこえで　なくと\nすぐさま　ヤミカラスが　あつまるため\nよるをまねくもの　とも　いわれる。"
          alpha_sapphire: "よるになると　かつどうを　はじめる。\nたくさんの　ヤミカラスを　ひきつれ\nむれを　つくることで　しられる。"
        jp_kanji:
          omega_ruby: "ドンカラスが　低い声で　鳴くと\nすぐさま　ヤミカラスが　集まるため\n夜を招くもの　とも　言われる。"
          alpha_sapphire: "夜になると　活動を　はじめる。\nたくさんの　ヤミカラスを　引き連れ\n群れを　作ることで　知られる。"
        en:
          omega_ruby: "If one utters a deep cry, many Murkrow gather\nquickly. For this, it is called “Summoner of Night.”"
          alpha_sapphire: "Becoming active at night, it is known to swarm with\nnumerous Murkrow in tow."
        fr:
          omega_ruby: "Son cri profond peut invoquer une meute de Cornèbre.\nOn l’appelle « le crieur de mauvais augure »."
          alpha_sapphire: "Ce Pokémon nocturne évolue en grandes volées escortées\npar des Cornèbre."
        it:
          omega_ruby: "Se emette un verso profondo, molti Murkrow accorrono\nall’istante. È detto “Evocatore della notte”."
          alpha_sapphire: "Diventa attivo di notte e lo si vede spesso in compagnia\ndi numerosi Murkrow."
        de:
          omega_ruby: "Sein tiefer Ruf lockt andere Kramurx herbei. Man nennt es\ndaher „Beschwörer der Nacht“."
          alpha_sapphire: "Ein nachtaktives Pokémon, das sich in Schwärmen mit Kramurx\ndurch die Nacht bewegt."
        es:
          omega_ruby: "Si uno lanza un grito profundo, los demás acuden. Por eso se\nle llama también Invocador de la Noche."
          alpha_sapphire: "Está activo por la noche y pulula arrastrando a numerosos\nMurkrow."
        ko:
          omega_ruby: "돈크로우가 낮은 목소리로 울면\n즉시 니로우가 모여들기에\n밤을 부르는 자라고도 전해진다."
          alpha_sapphire: "밤이 되면 활동을 시작한다.\n많은 니로우들을 거느리고\n무리를 만든다고 알려져 있다."
glameow:
  species_id: 431
