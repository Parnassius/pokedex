        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - serene_grace
      held_items:
        common: star_piece
        rare: star_piece
      descriptions:
        jp_kana:
          omega_ruby: "メロエッタの　かなでる　せんりつは\nまわりの　ポケモンを　よろこばせたり\nかなしませるほどの　パワーがある。"
          alpha_sapphire: "とくしゅな　はっせいほうで　うたう\nメロディは　きいた　ものの\nかんじょうを　じざいに　あやつる。"
        jp_kanji:
          omega_ruby: "メロエッタの　奏でる　旋律は\nまわりの　ポケモンを　喜ばせたり\n悲しませるほどの　パワーがある。"
          alpha_sapphire: "特殊な　発声法で　歌う　メロディは\n聞いた者の　感情を\n自在に　操る。"
        en:
          omega_ruby: "The melodies sung by Meloetta have the power to\nmake Pokémon that hear them happy or sad."
          alpha_sapphire: "Its melodies are sung with a special vocalization\nmethod that can control the feelings of those who\nhear it."
        fr:
          omega_ruby: "Les mélodies enivrantes de Meloetta touchent les Pokémon,\npouvant les rendre heureux ou tristes."
          alpha_sapphire: "Sa voix si particulière lui permet de chanter des mélodies\nqui ensorcellent les gens et modifient leurs émotions."
        it:
          omega_ruby: "Canta una melodia che ha il potere di portare la gioia o\nla tristezza nel cuore dei Pokémon che l’ascoltano."
          alpha_sapphire: "Controlla a suo piacimento le emozioni di coloro che ascoltano\ni suoi singolari vocalizzi."
        de:
          omega_ruby: "Es besitzt die Macht, Pokémon, die sich in seiner Nähe\naufhalten, mit seinen Melodien froh oder traurig zu stimmen."
          alpha_sapphire: "Wer die Melodie hört, die es in einer speziellen Stimmlage\nvon sich gibt, steht voll in seinem Bann."
        es:
          omega_ruby: "Las melodías que canta Meloetta tienen el poder de hacer\nsentir felicidad a los Pokémon que hay a su alrededor."
          alpha_sapphire: "Controla los sentimientos de los que escuchan las melodías\nque emite con su singular vocalización."
        ko:
          omega_ruby: "메로엣타가 연주하는 선율에는\n주위 포켓몬을 기쁘게 하거나\n슬프게 할 정도의 힘이 있다."
          alpha_sapphire: "특수한 발성법으로 노래하는\n멜로디는 노래를 들은 자의\n감정을 자유자재로 조종한다."
