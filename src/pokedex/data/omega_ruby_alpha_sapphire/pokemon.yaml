      descriptions:
        jp_kana:
          omega_ruby: "きゅうばんの　くちで　えものに\nすいつき　くいこませた　キバから\nでんきを　ながして　かんでんさせる。"
          alpha_sapphire: "うでの　ちからで　うみから　はいだし\nみずべの　えものに　おそいかかる。\nいっしゅんで　うみへ　ひきずりこむ。"
        jp_kanji:
          omega_ruby: "吸盤の　口で　獲物に　吸いつき\n食いこませた　キバから\n電気を　流して　感電させる。"
          alpha_sapphire: "腕の　力で　海から　はい出し\n水辺の　獲物に　襲いかかる。\n一瞬で　海へ　引きずりこむ。"
        en:
          omega_ruby: "With their sucker mouths, they suck in prey.\nThen they use their fangs to shock the prey\nwith electricity."
          alpha_sapphire: "They crawl out of the ocean using their arms.\nThey will attack prey on shore and immediately drag\nit into the ocean."
        fr:
          omega_ruby: "Il s’attache à ses proies avec sa bouche-ventouse et\nles électrocute avec ses crocs."
          alpha_sapphire: "Il peut sortir de l’eau à la force de ses bras pour attraper\ndes proies sur la rive. Il retourne à l’eau en un instant."
        it:
          omega_ruby: "Si attacca alla preda con la bocca a ventosa e la fulmina\nattraverso i denti conficcati."
          alpha_sapphire: "Striscia fuori dal mare con la sola forza dei propri arti. Poi\nattacca la preda a riva e con un guizzo la trascina con sé."
        de:
          omega_ruby: "Mit dem Saugnapf an seinem Maul hakt es sich an seiner Beute\nfest und versetzt ihr über seine Fangzähne Stromschläge."
          alpha_sapphire: "Es schleppt sich mithilfe seiner Arme an Land, schnappt nach\nseiner Beute und zerrt sie augenblicklich ins Meer."
        es:
          omega_ruby: "Pega la ventosa de su boca en su presa y la electrocuta con\nsus colmillos."
          alpha_sapphire: "Sale del mar con la fuerza de sus brazos y ataca a sus presas\nen la costa. Luego se las lleva de vuelta al mar."
        ko:
          omega_ruby: "흡반 같은 입으로 먹이에\n달라붙은 후 박아 넣은 이빨을\n통해 전기를 흘려 감전시킨다."
          alpha_sapphire: "팔 힘으로 바다에서 기어 나와\n물가에 있는 먹이를 덮친다.\n한순간에 바다로 끌고 들어간다."
