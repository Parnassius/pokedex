        jp_kana:
          omega_ruby: "いんせきの　おちた　ばしょから　みつかったため\nうちゅうから　やってきた　ポケモンという　せつも\nあるが　まだ　しょうめいされていない。"
          alpha_sapphire: "まんげつの　じき　かっぱつになる　しゅうせい。\nくうちゅうに　ういて　いどうし　あかい　ひとみは\nみたものの　からだを　すくませる　はくりょく。"
        jp_kanji:
          omega_ruby: "隕石の　落ちた　場所から　見つかったため\n宇宙から　やってきた　ポケモンという　説も\nあるが　まだ　証明されていない。"
          alpha_sapphire: "満月の　時期　活発になる　習性。\n空中に　浮いて　移動し　赤い　瞳は\n見たものの　体を　すくませる　迫力。"
        en:
          omega_ruby: "Lunatone was discovered at a location where a meteoroid fell.\nAs a result, some people theorize that this Pokémon came\nfrom space. However, no one has been able to prove this\ntheory so far."
          alpha_sapphire: "Lunatone becomes active around the time of the full moon.\nInstead of walking, it moves by floating in midair.\nThe Pokémon’s intimidating red eyes cause all those who\nsee it to become transfixed with fear."
        fr:
          omega_ruby: "Séléroc fut découvert à côté d’un cratère de météorite.\nDu coup, certaines personnes pensent que ce Pokémon\nvient de l’espace. Cependant, rien ne peut prouver\ncette théorie pour le moment."
          alpha_sapphire: "Séléroc ne s’active que pendant la période de pleine lune.\nIl ne marche pas, mais se déplace en lévitant. Les yeux\nrouges et intimidants de ce Pokémon pétrifient ses ennemis\nde terreur."
        it:
          omega_ruby: "Lunatone è stato scoperto nel luogo dove una volta cadde\nun meteorite. Si è pertanto dedotto che questo Pokémon\nvenga dallo spazio. Tuttavia, questa teoria non è ancora\nstata confermata."
          alpha_sapphire: "Lunatone si desta quando domina la luna piena.\nInvece di camminare, fluttua a mezz’aria. I suoi occhi rossi\ncosì minacciosi terrorizzano chiunque li guardi."
        de:
          omega_ruby: "Lunastein wurde in der Nähe eines Meteoritenkraters entdeckt.\nDaher nehmen einige Menschen an, dass dieses Pokémon\naus dem Weltall stammt. Diese Theorie konnte allerdings\nbisher noch nicht belegt werden."
          alpha_sapphire: "Lunastein wird bei Vollmond aktiv. Es läuft nicht, sondern\nschwebt durch die Luft. Die bedrohlichen roten Augen dieses\nPokémon lassen alle, die es sehen, vor Angst erstarren."
        es:
          omega_ruby: "Lunatone fue descubierto en el lugar de impacto de un\nmeteorito. Por eso, hay quien especula con la idea de que\nprocede del espacio. Con todo, hasta el día de hoy nadie ha\npodido probar esta teoría."
          alpha_sapphire: "Lunatone entra en actividad en épocas de luna llena más o\nmenos. No camina, se desplaza flotando por el aire. Tiene\nunos ojos rojos sobrecogedores que cortan la respiración a\ntodo aquel que los ve."
        ko:
          omega_ruby: "운석이 떨어진 장소에서 발견되어\n우주에서 온 포켓몬이라는 설도\n있지만 아직 증명되지 않았다."
          alpha_sapphire: "보름달일 때 활발해지는 습성이 있다.\n공중에 떠서 이동하며 빨간 눈동자는\n그것을 본 자를 움츠러들게 하는 박력을 지녔다."
