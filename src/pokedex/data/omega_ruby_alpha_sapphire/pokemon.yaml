        fr:
          omega_ruby: "Ce Pokémon doté d’une force extraordinaire peut étrangler\nses proies avec son corps. Il peut même écraser des tonneaux\nmétalliques. Une fois sous l’étreinte d’Arbok, il est impossible\nde lui échapper."
