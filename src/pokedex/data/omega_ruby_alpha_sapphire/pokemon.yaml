espurr:
  species_id: 677
  names:
    jp_kana: ニャスパー
    jp_kanji: ニャスパー
    en: Espurr
    fr: Psystigri
    it: Espurr
    de: Psiau
    es: Espurr
    ko: 냐스퍼
  forms:
    espurr:
      form_id: 0
      base_stats:
        hp: 62
        attack: 48
        defense: 54
        special_attack: 63
        special_defense: 60
        speed: 68
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - keen_eye
        - infiltrator
      hidden_ability: own_tempo
      descriptions:
        jp_kana:
          omega_ruby: "きょうりょくな　サイコパワーが\nもれださないように　ほうしゅつする\nきかんを　みみで　ふさいでいるのだ。"
          alpha_sapphire: "１００メートルいないの　ものを\nふきとばす　ほどの　サイコパワーを\nうまく　コントロール　できないのだ。"
        jp_kanji:
          omega_ruby: "強力な　サイコパワーが\n漏れ出さないように　放出する　器官を\n耳で　ふさいでいるのだ。"
          alpha_sapphire: "１００メートル以内の　ものを\n吹き飛ばす　ほどの　サイコパワーを\nうまく　コントロール　できないのだ。"
        en:
          omega_ruby: "The organ that emits its intense psychic power is\nsheltered by its ears to keep power from leaking out."
          alpha_sapphire: "It has enough psychic energy to blast\neverything within 300 feet of itself,\nbut it has no control over its power."
        fr:
          omega_ruby: "Il couvre la source de ses pouvoirs psychiques hors\ndu commun avec ses oreilles afin d’éviter les accidents."
          alpha_sapphire: "Il a quelques difficultés à contrôler son pouvoir psychique.\nGrâce à celui-ci, il peut projeter en l’air tous les objets\ndans un rayon de 100 m."
        it:
          omega_ruby: "Copre con le orecchie gli organi che presiedono ai suoi\ngrandi poteri psichici per non perderne il controllo."
          alpha_sapphire: "Controlla a fatica un potere psichico enorme, in grado di\nscaraventare in aria oggetti nel raggio di 100 m."
        de:
          omega_ruby: "Damit die starken Psycho-Kräfte dieses Pokémon nicht\nunkontrolliert nach außen dringen, ist das Organ, das diese\nfreisetzt, von seinen Ohren bedeckt."
          alpha_sapphire: "Es verfügt zwar über genug Psycho-Kräfte, um Objekte in\neinem Umkreis von 100 m wegzublasen, aber es kann sie\nnoch nicht gut kontrollieren."
        es:
          omega_ruby: "Protege con las orejas el órgano con el que irradia su intenso\npoder psíquico para evitar que este se escape al exterior."
          alpha_sapphire: "Posee poderes psíquicos suficientes para lanzar por los aires\nobjetos situados en un radio de 100 metros, pero carece de\npericia para controlarlos."
        ko:
          omega_ruby: "강력한 사이코 파워가\n새어 나가지 않도록\n방출되는 기관을 귀로 막고 있다."
          alpha_sapphire: "100m 이내에 있는 것을\n날려버릴 정도의 사이코 파워를\n잘 컨트롤하지 못한다."
meowstic:
  species_id: 678
  names:
    jp_kana: ニャオニクス
    jp_kanji: ニャオニクス
    en: Meowstic
    fr: Mistigrix
    it: Meowstic
    de: Psiaugon
    es: Meowstic
    ko: 냐오닉스
  forms:
    meowstic_male:
      form_id: 0
      names:
        jp_kana: オスのすがた
        jp_kanji: オスのすがた
        en: Male
        fr: Mâle
        it: Maschio
        de: Männlich
        es: Macho
        ko: 수컷의 모습
      base_stats:
        hp: 74
        attack: 48
        defense: 76
        special_attack: 83
        special_defense: 81
        speed: 104
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - keen_eye
        - infiltrator
      hidden_ability: prankster
      descriptions:
        jp_kana:
          omega_ruby: "きけんが　せまると　みみを　もちあげ\n１０トン　トラックを　ひねりつぶす\nサイコパワーを　かいほうする。"
          alpha_sapphire: "みみの　うちがわの　めだまもようから\nサイコパワーを　だすが　あまりにも\nきょうりょくなので　ふさいでいる。"
        jp_kanji:
          omega_ruby: "危険が　迫ると　耳を　持ち上げ\n１０トン　トラックを　ひねりつぶす\nサイコパワーを　解放する。"
          alpha_sapphire: "耳の　内側の　目玉模様から\nサイコパワーを　出すが\nあまりにも　強力なので　ふさいでいる。"
        en:
          omega_ruby: "When in danger, it raises its ears and\nreleases enough psychic power to\ngrind a 10-ton truck into dust."
          alpha_sapphire: "The eyeball patterns on the interior of its ears\nemit psychic energy. It keeps the patterns tightly\ncovered because that power is too immense."
        fr:
          omega_ruby: "S’il se sent menacé, il lève les oreilles et déchaîne un pouvoir\npsychique capable de réduire en miettes un camion de 10 t."
          alpha_sapphire: "Les motifs en forme d’yeux à l’intérieur de ses oreilles\némettent une force psychique tellement puissante qu’il est\ncontraint de les garder couverts."
        it:
          omega_ruby: "Se si sente minacciato, drizza le orecchie e libera un potere\npsichico devastante, in grado di accartocciare un camion da\n10 t come se fosse una lattina."
          alpha_sapphire: "I motivi a forma di occhio all’interno delle orecchie sono la\nfonte del suo potere psichico. Li tiene coperti per controllarne\nl’immensa potenza."
        de:
          omega_ruby: "In Gefahrensituationen hebt es seine Ohren an und setzt\nPsycho-Kräfte frei, die einen 10 t schweren LKW zu Schrott\nverarbeiten können."
          alpha_sapphire: "Über das Augenmuster auf der Innenseite seiner Ohren setzt\nes seine Psycho-Kräfte frei. Da diese aber viel zu stark sind,\nhält es das Muster bedeckt."
        es:
          omega_ruby: "Cuando percibe peligro, yergue sus orejas y desata un poder\npsíquico capaz de levantar un camión de unas 10 toneladas."
          alpha_sapphire: "Las marcas en forma de ojos que tiene en las orejas emiten\npoderes psíquicos, pero su potencia es tan avasalladora que\nlas mantiene tapadas."
        ko:
          omega_ruby: "위험이 다가오면 귀를 들어 올리고\n10톤 트럭을 눌러 부술 정도의\n사이코 파워를 방출한다."
          alpha_sapphire: "귀 안쪽의 눈알 모양에서\n사이코 파워를 내지만\n너무나도 강력하여 귀를 막고 있다."
