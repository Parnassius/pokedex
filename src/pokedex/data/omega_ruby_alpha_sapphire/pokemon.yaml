sawsbuck:
  species_id: 586
  names:
    jp_kana: メブキジカ
    jp_kanji: メブキジカ
    en: Sawsbuck
    fr: Haydaim
    it: Sawsbuck
    de: Kronjuwild
    es: Sawsbuck
    ko: 바라철록
  forms:
    sawsbuck_spring_form:
      form_id: 0
      names:
        jp_kana: はるのすがた
        jp_kanji: はるのすがた
        en: Spring Form
        fr: Forme Printemps
        it: Forma Primavera
        de: Frühlingsform
        es: Forma Primavera
        ko: 봄의 모습
      base_stats:
