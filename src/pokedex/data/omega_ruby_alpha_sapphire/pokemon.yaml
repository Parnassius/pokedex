      hidden_ability: unburden
      descriptions:
        jp_kana:
          omega_ruby: "わずかな　においでも　かぎわける\nびんかんな　きゅうかくを　いかして\nパティシエの　てつだいを　している。"
          alpha_sapphire: "きゅうかくは　ひとの　１おくばい。\nくうきちゅうの　わずかな　においで\nまわりの　ようすが　すべて　わかる。"
        jp_kanji:
          omega_ruby: "わずかな　においでも　かぎわける\n敏感な　きゅうかくを　活かして\nパティシエの　手伝いを　している。"
          alpha_sapphire: "きゅうかくは　人の　１億倍以上。\n空気中に　漂う　わずかな　においで\nまわりの　様子が　すべて　わかる。"
        en:
          omega_ruby: "It can distinguish the faintest of scents.\nIt puts its sensitive sense of smell to use\nby helping pastry chefs in their work."
          alpha_sapphire: "Its sense of smell is 100 million times better than\na human’s, so even the faintest scent tells it about\neverything in the area. It’s like it can see with its nose!"
        fr:
          omega_ruby: "La finesse de son odorat lui permet de distinguer les nuances\nde parfums les plus subtiles, ce qui en fait un compagnon idéal\npour les pâtissiers."
          alpha_sapphire: "Son odorat est des millions de fois plus développé que celui\nd’un humain. Il se repère dans l’espace grâce aux odeurs\nqui flottent autour de lui."
        it:
          omega_ruby: "È dotato di un olfatto sensibilissimo che gli permette di\ndistinguere anche gli odori più sottili. Si serve di questo\ntalento per aiutare i pasticcieri."
          alpha_sapphire: "Il suo olfatto è milioni di volte più sviluppato di quello degli\nesseri umani. Grazie ad esso, riesce a percepire l’ambiente\ncircostante attraverso gli odori più sottili."
        de:
          omega_ruby: "Es verfügt über einen feinen Geruchssinn, mit dem es selbst\ndie schwächsten Gerüche erkennen kann. Es hilft deshalb oft\nin Konditoreien aus."
          alpha_sapphire: "Sein Geruchssinn ist mehrere Millionen Mal stärker als der\ndes Menschen. Durch die schwächsten Gerüche in der Luft\nweiß es, was in seiner Umgebung vorgeht."
        es:
          omega_ruby: "Puede rastrear hasta el más débil de los olores. Hace uso de\nsu fino olfato para ayudar a los pasteleros más exquisitos."
          alpha_sapphire: "Su sentido del olfato es varios millones de veces más agudo\nque el de un humano. Con él percibe lo que sucede a su\nalrededor, por sutil que sea el olor."
        ko:
          omega_ruby: "아주 약간의 냄새도 구별할 수 있는\n민감한 후각을 살려\n파티시에를 돕고 있다."
          alpha_sapphire: "후각이 사람의 1억 배이다.\n공기 중의 미세한 냄새로\n주위의 상황을 전부 파악할 수 있다."
inkay:
  species_id: 686
  names:
