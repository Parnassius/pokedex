      descriptions:
        jp_kana:
          omega_ruby: "はっこうたいの　てんめつを　みつめた\nあいては　めが　くらみ　たたかう\nきもちが　なくなってしまうのだ。"
          alpha_sapphire: "ひかりの　てんめつで　おそってきた\nてきの　せんいを　なくしてしまう。\nその　すきに　すがたを　かくすのだ。"
        jp_kanji:
          omega_ruby: "発光体の　点滅を　見つめた　相手は\n目が　くらみ　戦う　気持ちが\nなくなってしまうのだ。"
          alpha_sapphire: "光の　点滅で　襲ってきた　敵の\n戦意を　なくしてしまう。\nその　すきに　姿を　くらますのだ。"
        en:
          omega_ruby: "Opponents who stare at the flashing of the\nlight-emitting spots on its body become\ndazed and lose their will to fight."
          alpha_sapphire: "It flashes the light-emitting spots on its body,\nwhich drains its opponent’s will to fight.\nIt takes the opportunity to scuttle away and hide."
        fr:
          omega_ruby: "Éblouis par les points lumineux qui clignotent sur son corps,\nles ennemis perdent toute envie de se battre."
          alpha_sapphire: "Il ébranle le moral des ennemis lui cherchant noise grâce\naux clignotements qu’il émet. Il profite de cette diversion\npour se cacher."
        it:
          omega_ruby: "I nemici che guardano la luce lampeggiante emessa dal suo\ncorpo rimangono abbagliati e perdono il loro spirito\ncombattivo."
          alpha_sapphire: "Fa lampeggiare i motivi sul suo corpo in una sequenza ipnotica\nper far perdere lo spirito combattivo ai nemici, riuscendo così\na fuggire."
        de:
          omega_ruby: "Gegner, die auf die blinkenden Punkte an seinem Körper\nblicken, werden geblendet und verlieren den Willen zu\nkämpfen."
          alpha_sapphire: "Mit den blinkenden Punkten auf seinem Körper raubt es\nGegnern den Kampfeswillen. Es nutzt diese Gelegenheit,\num sich zu verstecken."
        es:
          omega_ruby: "Los enemigos que contemplan el titilante fulgor de su brillante\ncuerpo terminan mareándose y pierden las ganas de continuar\ncombatiendo."
          alpha_sapphire: "La luz intermitente que emite aplaca el ánimo de lucha del\nenemigo. Aprovecha la ocasión para esconderse."
        ko:
          omega_ruby: "깜빡이는 발광체를 바라본\n상대는 눈앞이 어두컴컴해져\n전의를 상실해버리고 만다."
          alpha_sapphire: "빛을 깜박여서 덮쳐온\n적의 전의를 잃게 한다.\n그 틈에 모습을 감춘다."
malamar:
  species_id: 687
  names:
