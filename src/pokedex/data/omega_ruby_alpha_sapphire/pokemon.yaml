          omega_ruby: "Ce Pokémon est venu du futur en voyageant dans le temps.\nOn raconte que quand Celebi apparaît, cela signifie que\nle futur sera bon et agréable."
          alpha_sapphire: "Ce Pokémon est venu du futur en voyageant dans le temps.\nOn raconte que quand Celebi apparaît, cela signifie que\nle futur sera bon et agréable."
        it:
          omega_ruby: "Celebi è giunto a noi dal futuro, viaggiando attraverso\nil tempo. Si dice che ogni sua apparizione preannunci\nun futuro roseo e splendente."
          alpha_sapphire: "Celebi è giunto a noi dal futuro, viaggiando attraverso\nil tempo. Si dice che ogni sua apparizione preannunci\nun futuro roseo e splendente."
        de:
          omega_ruby: "Dieses Pokémon kommt aus der Zukunft und ist durch die\nZeit gereist. Solange Celebi auftaucht, ist der Menschheit\nangeblich eine rosige Zukunft beschieden."
          alpha_sapphire: "Dieses Pokémon kommt aus der Zukunft und ist durch die\nZeit gereist. Solange Celebi auftaucht, ist der Menschheit\nangeblich eine rosige Zukunft beschieden."
        es:
          omega_ruby: "Este Pokémon vino del futuro haciendo un viaje en el tiempo.\nHay quien piensa que, mientras Celebi siga apareciendo, hay\nun futuro brillante y esperanzador."
          alpha_sapphire: "Este Pokémon vino del futuro haciendo un viaje en el tiempo.\nHay quien piensa que, mientras Celebi siga apareciendo, hay\nun futuro brillante y esperanzador."
        ko:
          omega_ruby: "시간을 넘어 미래에서 찾아온 포켓몬이다.\n세레비가 모습을 나타내는 한 밝은\n미래가 기다린다고 여겨지고 있다."
          alpha_sapphire: "시간을 넘어 미래에서 찾아온 포켓몬이다.\n세레비가 모습을 나타내는 한 밝은\n미래가 기다린다고 여겨지고 있다."
treecko:
  species_id: 252
  names:
    jp_kana: キモリ
    jp_kanji: キモリ
    en: Treecko
    fr: Arcko
    it: Treecko
    de: Geckarbor
    es: Treecko
    ko: 나무지기
