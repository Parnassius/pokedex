        en:
          omega_ruby: "Sneasel scales trees by punching its hooked claws into the\nbark. This Pokémon seeks out unguarded nests and steals\neggs for food while the parents are away."
          alpha_sapphire: "Sneasel scales trees by punching its hooked claws into the\nbark. This Pokémon seeks out unguarded nests and steals\neggs for food while the parents are away."
        fr:
          omega_ruby: "Farfuret grimpe aux arbres en enfonçant ses griffes crochues\ndans l’écorce. Ce Pokémon cherche les nids qui ne sont pas\nsurveillés et vole les œufs pour les manger pendant que\nles parents sont partis."
          alpha_sapphire: "Farfuret grimpe aux arbres en enfonçant ses griffes crochues\ndans l’écorce. Ce Pokémon cherche les nids qui ne sont pas\nsurveillés et vole les œufs pour les manger pendant que\nles parents sont partis."
        it:
          omega_ruby: "Sneasel si arrampica sugli alberi conficcando i suoi artigli\nuncinati nella corteccia. È sempre alla ricerca di nidi incustoditi\nper rubare le uova e cibarsene mentre i genitori sono assenti."
          alpha_sapphire: "Sneasel si arrampica sugli alberi conficcando i suoi artigli\nuncinati nella corteccia. È sempre alla ricerca di nidi incustoditi\nper rubare le uova e cibarsene mentre i genitori sono assenti."
        de:
          omega_ruby: "Sniebel klettert an Bäumen hoch, indem es seine\nhakenförmigen Krallen in die Rinde schlägt. Dieses\nPokémon sucht nach unbewachten Nestern und\nstiehlt die Eier. Davon ernährt es sich."
          alpha_sapphire: "Sniebel klettert an Bäumen hoch, indem es seine\nhakenförmigen Krallen in die Rinde schlägt. Dieses\nPokémon sucht nach unbewachten Nestern und\nstiehlt die Eier. Davon ernährt es sich."
        es:
