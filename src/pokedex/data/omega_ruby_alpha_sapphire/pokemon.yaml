          omega_ruby: "いっぱつで　きぜつさせるほどの\nでんりゅうを　ツメから　ながす。\nすうひきの　グループで　くらす。"
          alpha_sapphire: "するどい　ツメの　さきには　つよい\nでんきが　ながれており　ほんのすこし\nかするだけで　あいてをきぜつさせる。"
        jp_kanji:
          omega_ruby: "１発で　気絶させるほどの　電流を\nツメから　流す。\n数匹の　グループで　暮らす。"
          alpha_sapphire: "鋭い　ツメの　先には　強い　電気が\n流れており　ほんの少し　かするだけで\n相手を気絶させる。"
        en:
          omega_ruby: "Its claws loose electricity with enough amperage\nto cause fainting. They live in small groups."
          alpha_sapphire: "Strong electricity courses through the tips of its\nsharp claws. A light scratch causes fainting in foes."
        fr:
          omega_ruby: "L’électricité libérée par ses griffes peut assommer l’ennemi.\nIl vit en petits groupes."
          alpha_sapphire: "Le courant qui circule à la pointe de ses griffes est capable\nde faire perdre connaissance à ses proies."
        it:
          omega_ruby: "Dagli artigli rilascia un’elettricità talmente intensa da mandare\nKO il nemico. Vive in piccoli gruppi."
          alpha_sapphire: "I suoi artigli rilasciano una forte corrente elettrica e con\nun solo graffio manda KO i nemici."
        de:
          omega_ruby: "Seine Krallen geben Elektrizität ab, die stark genug ist,\njemanden bewusstlos zu machen."
          alpha_sapphire: "Durch die Spitzen seiner scharfen Krallen strömt Elektrizität.\nSelbst kleine Kratzer verursachen Ohnmacht."
        es:
          omega_ruby: "Sus garras emiten electricidad que puede debilitar a sus\nrivales. Viven en grupos pequeños."
          alpha_sapphire: "Por las puntas de sus garras pasa una fuerte corriente\neléctrica. El mínimo roce debilita al enemigo."
        ko:
          omega_ruby: "발톱에서는 한 방에 적을 기절시킬\n정도로 강한 전류가 흐른다.\n여러 마리가 그룹을 이루어 산다."
          alpha_sapphire: "날카로운 발톱의 끝에는 강한\n전기가 흐르고 있어서 살짝 스치는\n것만으로 상대를 기절시킨다."
