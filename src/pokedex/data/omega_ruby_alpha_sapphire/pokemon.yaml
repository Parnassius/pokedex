        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          omega_ruby: "ジャローダの　けだかい　ひとみで\nいすくめられても　へいきな　つよい\nあいてにだけ　ほんきを　だす。"
          alpha_sapphire: "にらむだけで　あいての　うごきを\nとめてしまう。たいようエネルギーを\nたいないで　ぞうふくさせる。"
        jp_kanji:
          omega_ruby: "ジャローダの　気高い　瞳で\n射すくめられても　平気な　強い\n相手にだけ　本気を　出す。"
          alpha_sapphire: "にらむだけで　相手の　動きを\n止めてしまう。太陽エネルギーを\n体内で　増幅させる。"
        en:
          omega_ruby: "It only gives its all against strong opponents who\nare not fazed by the glare from Serperior’s\nnoble eyes."
          alpha_sapphire: "It can stop its opponents’ movements with just a\nglare. It takes in solar energy and boosts\nit internally."
        fr:
          omega_ruby: "Il ne donnera tout son potentiel que contre un ennemi puissant\nindifférent à son regard écrasant de noblesse."
          alpha_sapphire: "Il peut paralyser l’ennemi d’un regard. Il amplifie l’énergie\ndu soleil dans son corps."
        it:
          omega_ruby: "Dà il meglio di sé solo contro chi non resta intimidito dal suo\nnobile sguardo."
          alpha_sapphire: "Può bloccare i movimenti dell’avversario con il solo sguardo.\nAmplifica l’energia solare all’interno del suo corpo."
        de:
          omega_ruby: "Im Kampf zeigt es nur Gegnern, die seinem edlen Blick\nstandhalten, seine wahre Kraft."
          alpha_sapphire: "Bringt Gegner mit einem einzigen kühlen Blick zum Erstarren.\nIn seinem Inneren verstärkt es die Energie der Sonne."
        es:
          omega_ruby: "Tan solo muestra su verdadero poder a quienes no se\namedrentan ante su noble pero inquisitoria mirada."
          alpha_sapphire: "Detiene los movimientos del rival con una sola mirada.\nExpande la energía solar dentro de su cuerpo."
        ko:
          omega_ruby: "샤로다의 고상한 눈동자로\n쏘아보아도 태연할 정도로 강한\n상대에게만 진정한 실력을 발휘한다."
          alpha_sapphire: "째려보기만 해도 상대의 움직임을\n멈추게 한다. 태양에너지를\n체내에서 증폭시킨다."
tepig:
  species_id: 498
  names:
    jp_kana: ポカブ
