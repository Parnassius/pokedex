litleo:
  species_id: 667
  names:
    jp_kana: シシコ
    jp_kanji: シシコ
    en: Litleo
    fr: Hélionceau
    it: Litleo
    de: Leufeo
    es: Litleo
    ko: 레오꼬
  forms:
    litleo:
      form_id: 0
      base_stats:
        hp: 62
        attack: 50
        defense: 58
        special_attack: 73
        special_defense: 54
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fire
        - normal
      egg_groups:
        - field
      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          omega_ruby: "つよい　あいてに　たちむかうときほど\nたてがみが　こうおんになり\nぜんしんに　ちからが　みなぎるのだ。"
          alpha_sapphire: "つよくなるため　むれを　はなれて\n１ぴきで　せいかつするようになる。\nけっきさかんで　けんかっぱやい。"
        jp_kanji:
          omega_ruby: "強い　相手に　立ち向かうときほど\nたてがみが　高温になり\n全身に　力が　みなぎるのだ。"
          alpha_sapphire: "強くなるため　群れを　離れて\n１匹で　生活するようになる。\n血気盛んで　ケンカっ早い。"
        en:
          omega_ruby: "The stronger the opponent it faces,\nthe more heat surges from its mane\nand the more power flows through its body."
          alpha_sapphire: "They set off on their own from their pride\nand live by themselves to become stronger.\nThese hot-blooded Pokémon are quick to fight."
        fr:
          omega_ruby: "Plus l’adversaire auquel il est confronté est fort,\nplus la température de sa crinière augmente, l’énergie\ngénérée se diffusant alors dans tout son corps."
          alpha_sapphire: "Il n’hésite pas à quitter la horde et à mener une existence\nsolitaire pour mieux pouvoir s’entraîner. Il a le sang chaud\net ne rechigne pas au combat."
        it:
          omega_ruby: "Più l’avversario che affronta è temibile, più la sua criniera\nsi scalda, aumentandone la forza."
          alpha_sapphire: "Si allontana dal gruppo e inizia una vita solitaria per diventare\npiù forte. Ha un carattere impetuoso ed è sempre pronto a\ngettarsi nella mischia."
        de:
          omega_ruby: "Je stärker sein Gegner ist, desto heißer wird seine Mähne\nund umso kraftvoller wird es."
          alpha_sapphire: "Sie verlassen ihr Rudel schon sehr früh, um stärker\nzu werden und auf eigenen Pfoten zu stehen.\nSie sind sehr hitzköpfig und streitlustig."
        es:
          omega_ruby: "Cuanto más poderoso es el enemigo al que se enfrenta, más\ncalor desprende su mechón y más energía recorre todo su\ncuerpo."
          alpha_sapphire: "Se separa de su manada para hacerse más fuerte y aprender\na valerse por sí mismo. Su excesiva fogosidad le hace saltar\na la mínima."
        ko:
          omega_ruby: "강한 상대에게 맞설 때일수록\n갈기의 온도가 높아지고\n전신에 힘이 넘쳐난다."
          alpha_sapphire: "강해지기 위해 무리를 벗어나\n홀로 생활하게 된다.\n혈기 왕성하여 쉽게 싸우려 든다."
pyroar:
  species_id: 668
  names:
    jp_kana: カエンジシ
    jp_kanji: カエンジシ
    en: Pyroar
    fr: Némélios
    it: Pyroar
    de: Pyroleo
    es: Pyroar
    ko: 화염레오
  forms:
    pyroar:
      form_id: 0
      base_stats:
        hp: 86
        attack: 68
        defense: 72
        special_attack: 109
        special_defense: 66
        speed: 106
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
        - normal
      egg_groups:
        - field
      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          omega_ruby: "むれの　なかで　いちばん　おおきな\nほのおの　たてがみを　もつ　オスが\nリーダーとして　なかまを　ひきいる。"
          alpha_sapphire: "せっし６０００どの　いきを　はきだし\nはげしく　あいてを　いかくする。\nメスが　むれの　こどもを　まもる。"
        jp_kanji:
          omega_ruby: "群れの　中で　一番　大きな　炎の\nたてがみを　持つ　オスが\nリーダーとして　仲間を　率いる。"
          alpha_sapphire: "摂氏６０００度の　息を　吐き出し\n激しく　相手を　威嚇する。\nメスが　群れの　子供を　守る。"
        en:
          omega_ruby: "The male with the largest mane of fire\nis the leader of the pride."
          alpha_sapphire: "With fiery breath of more than 10,000 degrees\nFahrenheit, they viciously threaten any challenger.\nThe females protect the pride’s cubs."
        fr:
          omega_ruby: "Le mâle qui possède la crinière de feu la plus imposante\ndevient le chef de la horde."
          alpha_sapphire: "Son souffle peut atteindre les 6 000 °C et il s’en sert pour\nintimider l’ennemi. Dans la horde, les femelles protègent\nles petits."
        it:
          omega_ruby: "Di solito, il maschio con la criniera fiammeggiante più ampia\nguida i compagni del gruppo."
          alpha_sapphire: "Minaccia furiosamente i nemici soffiando aria a una temperatura\nche raggiunge i 6000 °C. Le femmine proteggono i piccoli\ndel gruppo."
        de:
          omega_ruby: "Das Männchen mit der prächtigsten Feuermähne führt\ndas Rudel an."
          alpha_sapphire: "Sie bedrohen ihre Gegner, indem sie 6 000 °C heiße Atemluft\nausstoßen. Die Weibchen beschützen die Jungen des Rudels."
        es:
          omega_ruby: "El macho con la melena de fuego más grande de toda la\nmanada es el líder de sus compañeros."
          alpha_sapphire: "Intimida con ferocidad al enemigo exhalando su aliento\nabrasador a 6000 °C de temperatura. Las hembras protegen\na los cachorros de la manada."
        ko:
          omega_ruby: "무리 중에서 가장 커다란\n불꽃 갈기를 지닌 수컷이\n리더로서 동료들을 이끈다."
          alpha_sapphire: "섭씨 6000도의 숨을 내뿜어\n격렬하게 상대를 위협한다.\n암컷이 무리의 새끼를 지킨다."
flabebe:
  species_id: 669
  names:
