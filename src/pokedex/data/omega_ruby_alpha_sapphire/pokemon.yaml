      descriptions:
        jp_kana:
          omega_ruby: "ひのこを　クチバシから　とばして\nくさむらを　こがし　おどろいて\nとびだした　えものを　つかまえる。"
          alpha_sapphire: "おなかの　ほのおぶくろの　かりょくが\nつよまるほど　はやく　とべるが\nてんかするまで　じかんが　かかる。"
        jp_kanji:
          omega_ruby: "火の粉を　クチバシから　飛ばして\n草むらを　焦がし　驚いて\n飛び出した　獲物を　捕まえる。"
          alpha_sapphire: "お腹の　炎袋の　火力が\n強まるほど　速く　飛べるが\n点火するまで　時間が　かかる。"
        en:
          omega_ruby: "From its beak, it expels embers that set\nthe tall grass on fire. Then it pounces on\nthe bewildered prey that pop out of the grass."
          alpha_sapphire: "The hotter the flame sac on its belly,\nthe faster it can fly, but it takes some\ntime to get the fire going."
        fr:
          omega_ruby: "Il crache des étincelles pour brûler les hautes herbes\net attraper les proies surprises qui tentent d’échapper\nà l’incendie."
          alpha_sapphire: "Il possède une poche remplie de feu sur son ventre.\nPlus elle émet de chaleur, plus il vole vite. Cependant,\nelle met quelque temps à chauffer."
        it:
          omega_ruby: "Incendia i cespugli producendo scintille con il becco e cattura\nle prede che ne escono spaventate."
          alpha_sapphire: "Nel ventre ha una sacca ardente che gli permette di volare più\nvelocemente in base all’intensità del fuoco, ma per riscaldarla\nal punto giusto occorre del tempo."
        de:
          omega_ruby: "Es speit Funken aus seinem Schnabel und fängt die Beute,\ndie überrascht aus dem angesengten Gras hervorspringt."
          alpha_sapphire: "Je heißer die Flammen im Feuersack seines Bauches lodern,\ndesto schneller kann es fliegen. Es dauert jedoch eine Weile,\nbis es zur Zündung kommt."
        es:
          omega_ruby: "Lanza chispas por su pico y prende fuego a la hierba alta para\nasí sorprender a sus presas y atraparlas cuando intentan\nescapar."
          alpha_sapphire: "Cuanto más intenso sea el calor que se genera en la saca\nde fuego de su vientre, más rápido es capaz de volar. Sin\nembargo, la llama tarda en prender."
        ko:
          omega_ruby: "부리에서 불꽃을 뿜어\n풀숲을 태우고 놀라서\n뛰쳐나온 사냥감을 잡는다."
          alpha_sapphire: "배에 있는 불꽃 주머니의 화력이\n강해질수록 빨리 날 수 있지만\n점화할 때까지 시간이 걸린다."
talonflame:
  species_id: 663
  names:
    jp_kana: ファイアロー
    jp_kanji: ファイアロー
    en: Talonflame
    fr: Flambusard
    it: Talonflame
    de: Fiaro
    es: Talonflame
    ko: 파이어로
  forms:
    talonflame:
      form_id: 0
      base_stats:
        hp: 78
        attack: 81
        defense: 71
        special_attack: 74
        special_defense: 69
        speed: 126
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - fire
        - flying
      egg_groups:
        - flying
      abilities:
        - flame_body
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          omega_ruby: "はげしい　たたかいで　こうふんすると\nぜんしんの　うもうの　すきまから\nひのこを　ふきだして　ひこうする。"
          alpha_sapphire: "えものに　おそいかかるときの\nスピードは　じそく５００キロ。\nきょうれつな　キックで　しとめる。"
        jp_kanji:
          omega_ruby: "激しい　戦いで　興奮すると\n全身の　羽毛の　すきまから\n火の粉を　噴き出して　飛行する。"
          alpha_sapphire: "獲物に　襲いかかるときの\nスピードは　時速５００キロ。\n強烈な　キックで　しとめる。"
        en:
          omega_ruby: "In the fever of an exciting battle, it\nshowers embers from the gaps between\nits feathers and takes to the air."
          alpha_sapphire: "When attacking prey, it can reach speeds\nof up to 310 mph. It finishes its prey off\nwith a colossal kick."
        fr:
          omega_ruby: "Exalté par un combat sans merci, il s’envole en semant\ndans son sillage les escarbilles du feu qui couve dans\nson plumage."
          alpha_sapphire: "Quand il s’abat sur ses proies, sa vitesse dépasse\nles 500 km/h. Il les achève d’un puissant coup de serre."
        it:
          omega_ruby: "Durante lotte senza esclusione di colpi, spicca il volo\nsprizzando scintille dalle fessure che ha tra le piume."
          alpha_sapphire: "Piomba sulle prede a 500 km/h e le attacca con artigli\npotentissimi."
        de:
          omega_ruby: "Die Aufregung eines harten Kampfes veranlasst es dazu,\nim Flug Funken aus den Zwischenräumen seines Gefieders\nzu sprühen."
          alpha_sapphire: "Bei der Jagd erreicht es Geschwindigkeiten von bis zu\n500 km/h. Es erledigt seine Beute mit einem kräftigen Tritt."
        es:
          omega_ruby: "Si se exalta durante un combate reñido, arroja chispas y\nascuas de los intersticios entre su plumaje mientras vuela."
          alpha_sapphire: "Llega a alcanzar los 500 km/h al perseguir a su presa, a\nquien le asesta el golpe de gracia con una patada muy\npotente."
        ko:
          omega_ruby: "격렬한 싸움으로 흥분하게 되면\n온몸의 깃털 사이에서\n불꽃을 뿜어내며 비행한다."
          alpha_sapphire: "사냥감을 덮칠 때의\n스피드는 시속 500km이다.\n강렬한 킥으로 꼼짝 못하게 한다."
scatterbug:
  species_id: 664
  names:
    jp_kana: コフキムシ
    jp_kanji: コフキムシ
    en: Scatterbug
    fr: Lépidonille
    it: Scatterbug
    de: Purmel
    es: Scatterbug
    ko: 분이벌레
  forms:
    scatterbug:
      form_id: 0
      base_stats:
        hp: 38
        attack: 35
        defense: 40
        special_attack: 27
        special_defense: 25
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shield_dust
        - compound_eyes
      hidden_ability: friend_guard
      descriptions:
        jp_kana:
          omega_ruby: "とりポケモンに　おそわれると\nくろい　こなを　まきちらす。\nふれると　マヒする　どくのこなだ。"
          alpha_sapphire: "からだを　おおう　こなが　たいおんを\nちょうせつするので　どんな　きこうや\nふうどの　ちいきでも　くらせる。"
        jp_kanji:
          omega_ruby: "とりポケモンに　襲われると\n黒い　粉を　まき散らす。\n触れると　マヒする　毒の粉だ。"
          alpha_sapphire: "体を　覆う　粉が　体温を\n調節するので　どんな　気候や　風土の\n地域でも　暮らせる。"
        en:
          omega_ruby: "When under attack from bird Pokémon,\nit spews a poisonous black powder\nthat causes paralysis on contact."
          alpha_sapphire: "The powder that covers its body\nregulates its temperature, so it\ncan live in any region or climate."
        fr:
          omega_ruby: "Lorsqu’il est poursuivi par un Pokémon Oiseau, il projette\nune poudre noire qui paralyse tous ceux qu’elle touche."
          alpha_sapphire: "La poudre qui recouvre son corps l’aide à réguler\nsa température. Il peut s’adapter à tous les climats."
        it:
          omega_ruby: "Se assalito da Pokémon uccello, si difende emettendo\nvelenose scaglie nere che paralizzano al minimo contatto."
          alpha_sapphire: "La sua temperatura corporea è regolata dalle scaglie che ne\nricoprono il corpo. Grazie ad esse può adattarsi e sopravvivere\nin qualsiasi condizione climatica."
        de:
          omega_ruby: "Wird es von einem fliegenden Pokémon angegriffen, verstreut\nes schwarzen Puder. Der giftige Puder löst bei Berührung\nParalyse aus."
          alpha_sapphire: "Es reguliert seine Körpertemperatur mit dem Puder,\ndas seinen Körper bedeckt, und kommt deswegen in\njedem Klima und jeder Region zurecht."
        es:
          omega_ruby: "Cuando recibe el ataque de un Pokémon pájaro, expulsa unas\nescamas negras que provocan parálisis si se entra en contacto\ncon ellas."
          alpha_sapphire: "Gracias al polvo de escamas que lo recubre y regula su\ntemperatura, puede vivir en cualquier región, sin importar\nlas características del terreno o el clima."
        ko:
          omega_ruby: "새포켓몬에게 습격당하면\n검은 가루를 흩뿌린다.\n만지면 마비되는 독가루다."
          alpha_sapphire: "몸을 덮은 가루가 체온을\n조절하고 있어 어떤 기후나\n풍토의 지역에서도 살 수 있다."
spewpa:
  species_id: 665
  names:
    jp_kana: コフーライ
    jp_kanji: コフーライ
    en: Spewpa
    fr: Pérégrain
    it: Spewpa
    de: Puponcho
    es: Spewpa
    ko: 분떠도리
  forms:
