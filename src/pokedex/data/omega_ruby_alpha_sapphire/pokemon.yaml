      descriptions:
        jp_kana:
          omega_ruby: "きのみを　キバで　くだいて　たべる。\nなんかいも　はえかわることで\nつよく　するどい　キバに　なる。"
          alpha_sapphire: "キバで　じゅもくに　きずを　つけて\nなわばりの　めじるしにする。\nキバは　おれても　すぐに　はえる。"
        jp_kanji:
          omega_ruby: "木の実を　キバで　砕いて　食べる。\n何回も　生え変わることで\n強く　鋭い　キバに　なる。"
          alpha_sapphire: "キバで　樹木に　傷を　つけて\n縄張りの　目印にする。\nキバは　折れても　すぐに　生える。"
        en:
          omega_ruby: "They use their tusks to crush the berries they eat.\nRepeated regrowth makes their tusks strong\nand sharp."
          alpha_sapphire: "They mark their territory by leaving gashes in trees\nwith their tusks. If a tusk breaks, a new one grows\nin quickly."
        fr:
          omega_ruby: "Il broie les Baies à grands coups de crocs. Ceux-ci repoussent\nplusieurs fois, toujours plus forts et aiguisés."
          alpha_sapphire: "Il laisse la marque de ses crocs dans les arbres pour marquer\nson territoire. Ses crocs repoussent dès qu’ils tombent."
        it:
          omega_ruby: "Mangia le bacche sminuzzandole con i denti, che ricrescono\ncostantemente, diventando sempre più forti e affilati."
          alpha_sapphire: "Incide gli alberi con le zanne per marcare il suo territorio.\nSe le zanne gli si spezzano, ricrescono subito."
        de:
          omega_ruby: "Es knackt mit seinen Hauern Nüsse. Brechen seine Fangzähne\nab, wächst an ihrer Stelle ein stärkeres Ersatzpaar."
          alpha_sapphire: "Markiert sein Revier, indem es mit seinen Fängen Kerben\nin Bäume schlägt. Brechen diese einmal ab, wachsen sie\nsofort nach."
        es:
          omega_ruby: "Usa sus colmillos para romper las bayas que come. Estos se\nregeneran una y otra vez, por eso son tan fuertes y afilados."
          alpha_sapphire: "Deja la huella de sus colmillos en los árboles para marcar su\nterritorio. Si se le rompen, se regeneran muy rápido."
        ko:
          omega_ruby: "나무열매를 이빨로 깨물어 먹는다.\n이빨이 몇 차례에 걸쳐 새로 나면\n강하고 날카로워진다."
          alpha_sapphire: "이빨로 수목에 상처를 내서\n영역 표시를 한다.\n부러지면 바로 새 이빨이 난다."
fraxure:
  species_id: 611
  names:
    jp_kana: オノンド
    jp_kanji: オノンド
    en: Fraxure
    fr: Incisache
    it: Fraxure
    de: Sharfax
    es: Fraxure
    ko: 액슨도
