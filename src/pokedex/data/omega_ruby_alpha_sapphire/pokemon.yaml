          alpha_sapphire: "だんりょくせいに　すぐれた　からだは　おおきく\nいきを　すいこむと　どこまでも　ふくれていく。\nふくらんだ　プクリンは　ふんわり　はねるよ。"
        jp_kanji:
          omega_ruby: "大きな　丸い　瞳の　表面には\n涙の　薄い　膜が　いつも　張っている。\nほこりが　ついても　すぐ　洗い　流される。"
          alpha_sapphire: "弾力性に　優れた　体は　大きく\n息を　吸い込むと　どこまでも　膨れていく。\n膨らんだ　プクリンは　ふんわり　跳ねるよ。"
        en:
          omega_ruby: "Wigglytuff has large, saucerlike eyes. The surfaces of its eyes\nare always covered with a thin layer of tears. If any dust gets in\nthis Pokémon’s eyes, it is quickly washed away."
          alpha_sapphire: "Wigglytuff’s body is very flexible. By inhaling deeply,\nthis Pokémon can inflate itself seemingly without end.\nOnce inflated, Wigglytuff bounces along lightly like a balloon."
        fr:
          omega_ruby: "Grodoudou a des yeux immenses et écarquillés. La surface\nde ses yeux est couverte d’une fine couche de larmes.\nSi de la poussière est projetée dans les yeux de ce Pokémon,\nelle est rapidement évacuée."
          alpha_sapphire: "Le corps de Grodoudou est très élastique. S’il inspire\nprofondément, ce Pokémon peut se gonfler à volonté.\nUne fois gonflé, Grodoudou peut rebondir comme un ballon."
        it:
          omega_ruby: "Wigglytuff è dotato di occhi grandi come dischi, resi lucidi\nda un sottile strato lacrimale in superficie. Se gli va della\npolvere negli occhi, questa è lavata via subito."
          alpha_sapphire: "Wigglytuff è molto elastico. Se respira profondamente, questo\nPokémon riesce a gonfiarsi praticamente all’infinito. Una volta\ngonfio, Wigglytuff rimbalza leggero come un pallone."
        de:
          omega_ruby: "Knuddeluff hat handtellergroße Augen, die immer mit\nTränenflüssigkeit bedeckt sind. Gerät Staub in die Augen\ndieses Pokémon, so wird dieser sofort ausgespült."
          alpha_sapphire: "Knuddeluffs Körper ist sehr dehnbar. Indem es tief einatmet,\nkann sich dieses Pokémon selbst aufblasen. Wenn es\naufgepumpt ist, hüpft es wie ein Luftballon umher."
        es:
          omega_ruby: "Wigglytuff tiene unos ojos enormes con forma de platillo, que\nsiempre están cubiertos de lágrimas. Si se le metiera algo en\nel ojo, enseguida se le saldría solo."
          alpha_sapphire: "El cuerpo de Wigglytuff es muy flexible. Dicen que, al aspirar\naire, puede hincharse sin límites. Y, una vez hinchado, se\npone a botar como si fuera una pelota."
        ko:
          omega_ruby: "크고 동그란 눈동자 표면에는\n항상 얇은 눈물 막이 쳐져 있다.\n먼지가 들어가도 바로 씻겨 나간다."
          alpha_sapphire: "탄력이 뛰어난 몸은 크게\n숨을 들이마시면 한없이 부푼다.\n부푼 푸크린은 두둥실 떠오른다."
