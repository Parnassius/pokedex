        jp_kana:
          omega_ruby: "きけんを　さっちすると　トゲを\nいっせいに　はっしゃして　はんげき。\nその　すきに　ころがって　にげる。"
          alpha_sapphire: "ほらあなの　てんじょうに　つきささり\nいわの　てつぶんを　すいとる。\nきけんがせまると　トゲを　うちだす。"
        jp_kanji:
          omega_ruby: "危険を　察知すると　トゲを\nいっせいに　発射して　反撃。\nその　すきに　転がって　逃げる。"
          alpha_sapphire: "洞穴の　天井に　突きささり\n岩の　鉄分を　吸いとる。\n危険がせまると　トゲを　撃ち出す。"
        en:
          omega_ruby: "When threatened, it attacks by shooting a barrage\nof spikes, which gives it a chance to escape by\nrolling away."
          alpha_sapphire: "It absorbs the iron it finds in the rock while clinging\nto the ceiling. It shoots spikes when in danger."
        fr:
          omega_ruby: "Quand il sent un danger, il réagit en projetant toutes\nses épines d’un coup et s’enfuit en roulant sur lui-même."
          alpha_sapphire: "Il s’accroche aux parois des grottes et en absorbe\nles minéraux. Il projette ses épines en cas de danger."
        it:
          omega_ruby: "Quando avverte un pericolo, reagisce sparando\nsimultaneamente tutti i suoi aculei, per poi fuggire\nvia rotolando."
          alpha_sapphire: "Si conficca nelle pareti delle grotte e assorbe i minerali\ndelle rocce. Quando avverte un pericolo, spara i suoi aculei."
        de:
          omega_ruby: "Fühlt es sich bedroht, wehrt es sich, indem es eine großzügige\nSalve Dornen abfeuert."
          alpha_sapphire: "Hakt sich an der Decke von Höhlen fest und saugt die\nMineralien aus dem Gestein. Bei Gefahr feuert es Dornen ab."
        es:
          omega_ruby: "Lanza numerosas púas al detectar peligro. En cuanto tiene\nocasión, echa a rodar y se escapa."
          alpha_sapphire: "Absorbe los componentes ferruginosos de las rocas al\ncolgarse del techo de las cuevas. Dispara púas si se ve\nen peligro."
        ko:
          omega_ruby: "위험을 감지하면 가시를\n일제히 발사하여 반격한다.\n그 틈에 몸을 굴려 도망간다."
          alpha_sapphire: "동굴 천장에 박혀서\n바위의 철분을 흡수한다.\n위험이 닥치면 바늘을 쏜다."
ferrothorn:
