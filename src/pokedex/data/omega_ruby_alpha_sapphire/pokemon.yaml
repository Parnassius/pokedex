      descriptions:
        jp_kana:
          omega_ruby: "おおぜいの　むれで　こうどうする。\nしっぽを　つなぎあわせて　わっかを\nつくる。ゆうじょうの　しるしらしい。"
          alpha_sapphire: "２ほんの　しっぽで　きのみの　からを\nきように　むいて　たべる。ほんものの\nうでは　ほとんど　つかわなくなった。"
        jp_kanji:
          omega_ruby: "大勢の　群れで　行動する。\n尻尾を　つなぎ合わせて　輪っかを\n作る。友情の　印らしい。"
          alpha_sapphire: "２本の　尻尾で　木の実の　殻を\n器用に　むいて　食べる。本物の\n腕は　ほとんど　使わなくなった。"
        en:
          omega_ruby: "They work in large colonies and make rings by\nlinking their tails, apparently in friendship."
          alpha_sapphire: "To eat, it deftly shucks nuts with its two tails.\nIt rarely uses its arms now."
        fr:
          omega_ruby: "Ils vivent en grandes colonies et relient leurs queues\npour former un anneau en signe d’amitié."
          alpha_sapphire: "Il se nourrit de noix qu’il épluche avec ses deux queues\nhabiles. Il utilise de moins en moins ses bras."
        it:
          omega_ruby: "Vivono in colonie numerose e formano anelli legando le loro\ncode in segno di amicizia."
          alpha_sapphire: "Si nutre di nocciole che sbuccia con le due code.\nRaramente usa le sue vere braccia."
        de:
          omega_ruby: "Sie leben in großen Kolonien und verbinden ihre Schweife\nin Freundschaft."
          alpha_sapphire: "Wenn es hungrig ist, knackt es Nüsse mit seinen\nbeiden Schweifen. Nur selten verwendet es die Arme."
        es:
          omega_ruby: "Habitan en grandes colonias y forman anillos uniendo sus\ncolas, aparentemente en signo de amistad."
          alpha_sapphire: "Para comer, rompe nueces con sus dos colas. Raras veces\nutiliza sus brazos."
        ko:
          omega_ruby: "많은 무리로 행동한다.\n꼬리를 맞잡아 원을 만든다.\n우정의 표시인 듯하다."
          alpha_sapphire: "2개의 꼬리로 나무열매 껍질을\n솜씨 좋게 벗겨 먹는다. 진짜\n팔은 거의 쓰지 않게 되었다."
drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    jp_kanji: フワンテ
    en: Drifloon
    fr: Baudrive
    it: Drifloon
    de: Driftlon
    es: Drifloon
    ko: 흔들풍손
  forms:
    drifloon:
      form_id: 0
      base_stats:
        hp: 90
        attack: 50
        defense: 34
        special_attack: 60
        special_defense: 44
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      hidden_ability: flare_boost
      descriptions:
        jp_kana:
          omega_ruby: "ひとや　ポケモンの　たましいが\nかたまって　うまれた　ポケモン。\nジメジメした　きせつが　だいすき。"
          alpha_sapphire: "たましいの　みちしるべと　いわれる。\nフワンテを　もっていた　こどもは\nとつぜん　きえて　いなくなる。"
        jp_kanji:
          omega_ruby: "人や　ポケモンの　魂が\n固まって　生まれた　ポケモン。\nジメジメした　季節が　大好き。"
          alpha_sapphire: "魂の　道標と　いわれる。\nフワンテを　持っていた　子供は\n突然　消えて　いなくなる。"
        en:
          omega_ruby: "A Pokémon formed by the spirits of people and Pokémon.\nIt loves damp, humid seasons."
          alpha_sapphire: "These Pokémon are called the “Signpost for\nWandering Spirits.” Children holding them\nsometimes vanish."
        fr:
          omega_ruby: "Un Pokémon né de l’esprit des gens et des Pokémon.\nIl aime les saisons chaudes et humides."
          alpha_sapphire: "Les enfants qui attrapent des Baudrive disparaissent parfois.\nOn lui donne le surnom de « bouée des esprits égarés »."
        it:
          omega_ruby: "Pokémon formato dalle anime di persone e Pokémon.\nAma le stagioni umide."
          alpha_sapphire: "Anche detto “Guida degli spiriti vaganti”. A volte i bambini\nche ne hanno uno svaniscono improvvisamente nel nulla."
        de:
          omega_ruby: "Ein Pokémon, entstanden aus den Gefühlen von Menschen\nund Pokémon. Es mag feuchte Jahreszeiten."
          alpha_sapphire: "Auch bekannt als „Wegweiser für umherstreifende Geister“.\nKinder, die sie halten, verschwinden manchmal."
        es:
          omega_ruby: "Está formado por los espíritus de personas y Pokémon. Le\nencantan las estaciones húmedas."
          alpha_sapphire: "Se dice que es como un hito que guía a las almas. Los niños\nque sostienen un Drifloon a veces desaparecen sin más."
        ko:
          omega_ruby: "사람이나 포켓몬의 영혼이\n한데 모여 태어난 포켓몬이다.\n습기 많은 계절을 매우 좋아한다."
          alpha_sapphire: "영혼의 이정표라고 전해진다.\n흔들풍손을 가지고 있는 아이는\n갑자기 사라져버린다."
