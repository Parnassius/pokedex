          alpha_sapphire: "ながい　はなを　つかって　みずあびを　する。\nなかまが　あつまってくると　みずを　かけあう。\nずぶぬれの　からだを　みずべで　かわかすよ。"
        jp_kanji:
          omega_ruby: "川の　畔に　縦穴を　掘って　暮らす。\nすみかの　近くに　鼻の　印を　つけて\n自分の　場所だと　仲間に　教えているよ。"
          alpha_sapphire: "長い　鼻を　使って　水浴びを　する。\n仲間が　集まってくると　水を　掛け合う。\nずぶぬれの　体を　水辺で　乾かすよ。"
        en:
          omega_ruby: "For its nest, Phanpy digs a vertical pit in the ground at the\nedge of a river. It marks the area around its nest with its trunk\nto let the others know that the area has been claimed."
          alpha_sapphire: "Phanpy uses its long nose to shower itself. When others\ngather around, they thoroughly douse each other with water.\nThese Pokémon can be seen drying their soaking-wet\nbodies at the edge of water."
        fr:
          omega_ruby: "Pour faire son nid, Phanpy creuse un trou au bord d’une\nrivière. Il délimite la zone autour de son nid avec sa trompe\npour prévenir les autres que ce territoire est le sien."
          alpha_sapphire: "Phanpy utilise sa petite trompe pour se doucher.\nQuand plusieurs d’entre eux se réunissent, ils s’arrosent\njoyeusement. On peut souvent voir ces Pokémon se sécher\nau bord de l’eau."
        it:
          omega_ruby: "Phanpy crea il suo nido scavando delle fosse profonde\nnel terreno in riva al fiume. Delimita l’area attorno al nido\nusando la proboscide per indicare la sua proprietà."
          alpha_sapphire: "Phanpy usa la proboscide per farsi la doccia. Questi Pokémon\nsono soliti raggrupparsi per spruzzarsi d’acqua a vicenda.\nPoi, è frequente vederli mentre si asciugano il corpo fradicio\na riva."
        de:
          omega_ruby: "Um sich ein Nest zu bauen, gräbt Phanpy am Flussufer ein\nLoch ins Erdreich. Es markiert die Umgebung seines Nests\nmithilfe seines Rüssels, damit seine Artgenossen wissen,\ndass dieses Gebiet vergeben ist."
          alpha_sapphire: "Phanpy kann sich mit seiner Nase selbst duschen. Wenn\nandere dabei sind, begießen sie sich gegenseitig mit Wasser.\nDanach trocknet es seinen durchnässten Körper am Ufer."
        es:
          omega_ruby: "Phanpy cava un agujero profundo para hacer su nido en el\nsuelo, en la ribera de los ríos, y marca con la trompa la zona\npara que el resto vea que ese terreno ya está ocupado."
          alpha_sapphire: "Phanpy se vale de la trompa para ducharse. Cuando varios se\nagrupan, se dedican a echarse agua unos a otros. Es muy fácil\nver a estos Pokémon secándose cerca del agua."
        ko:
          omega_ruby: "강 근처에 수직으로 구멍을 파고 산다.\n사는 곳 가까이에 코의 표시를 남겨\n자신의 장소라고 동료에게 알리고 있다."
          alpha_sapphire: "긴 코를 써서 물을 끼얹는다.\n동료가 모여들면 서로 물을 끼얹는다.\n흠뻑 젖은 몸을 물가에서 말린다."
