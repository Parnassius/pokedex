        jp_kana:
          omega_ruby: "シッポで　びょんびょん　とびはねる　ポケモン。\nとびはねる　しんどうで　しんぞうを　うごかして\nいるので　とびはねる　ことは　やめられないのだ。"
          alpha_sapphire: "あたまに　のせた　しんじゅが　バネブーの\nサイコパワーを　たかめる　はたらきをする。\nおおきな　しんじゅを　いつも　さがしている。"
        jp_kanji:
          omega_ruby: "シッポで　びょんびょん　飛び跳ねる　ポケモン。\n飛び跳ねる　振動で　心臓を　動かして\nいるので　飛び跳ねる　ことは　止められないのだ。"
          alpha_sapphire: "頭に　乗せた　真珠が　バネブーの\nサイコパワーを　高める　働きをする。\n大きな　真珠を　いつも　探している。"
        en:
          omega_ruby: "Spoink bounces around on its tail. The shock of its bouncing\nmakes its heart pump. As a result, this Pokémon cannot afford\nto stop bouncing—if it stops, its heart will stop."
          alpha_sapphire: "Spoink keeps a pearl on top of its head. The pearl functions to\namplify this Pokémon’s psychokinetic powers. It is therefore on\na constant search for a bigger pearl."
        fr:
          omega_ruby: "Spoink rebondit sur sa queue. Le choc du rebond fait battre\nson cœur. Du coup, ce Pokémon ne peut pas s’arrêter\nde rebondir, sinon, son cœur s’arrête."
          alpha_sapphire: "Spoink garde une perle sur sa tête. Elle lui sert à amplifier\nses pouvoirs télékinétiques. Il est constamment en quête\nd’une perle plus grosse."
        it:
          omega_ruby: "Spoink rimbalza come una molla sulla coda. Il colpo ricevuto\ndal rimbalzo gli fa battere il cuore. Di conseguenza, non può\nmai smettere di saltellare, altrimenti il suo cuore smette\ndi battere."
          alpha_sapphire: "Sulla sommità del capo Spoink porta una perla che serve per\namplificare i suoi poteri psicocinetici. Per questo motivo è\nsempre in cerca di una perla più grande."
        de:
          omega_ruby: "Spoink hüpft auf seinem Schweif durch die Gegend.\nDie Erschütterung des Hüpfens bringt sein Herz zum Schlagen.\nDeshalb kann dieses Pokémon das Hüpfen nicht sein lassen,\nansonsten würde sein Herz aufhören zu schlagen."
          alpha_sapphire: "Spoink trägt eine Perle auf seinem Kopf, die seine\npsychokinetische Energie verstärkt. Deshalb ist es\ndauernd auf der Suche nach einer größeren Perle."
        es:
          omega_ruby: "Spoink se pasa todo el día saltando sobre la cola. Cada salto\nhace que le lata el corazón. Por eso, no puede permitirse\ndejar de saltar. Si lo hiciera, se le pararía."
          alpha_sapphire: "Spoink lleva una perla en la cabeza, que sirve para amplificar\nlos poderes psicoquinéticos que tiene. Por eso, está\ncontinuamente buscando una perla mayor."
        ko:
          omega_ruby: "꼬리로 뿅뿅 뛰어오르는 포켓몬이다.\n뛰어오르는 진동으로 심장을 움직이기\n때문에 뛰어오르는 것을 멈출 수 없다."
          alpha_sapphire: "머리에 얹은 진주가 피그점프의\n사이코 파워를 높여주는 역할을 한다.\n항상 큰 진주를 찾고 있다."
grumpig:
  species_id: 326
  names:
    jp_kana: ブーピッグ
    jp_kanji: ブーピッグ
    en: Grumpig
    fr: Groret
    it: Grumpig
    de: Groink
    es: Grumpig
    ko: 피그킹
