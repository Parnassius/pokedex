      descriptions:
        jp_kana:
          omega_ruby: "ランドロスの　おとずれる　とちは\nさくもつが　たくさん　みのるため\nはたけのかみさま　と　いわれている。"
          alpha_sapphire: "かぜや　かみなりを　とりこみ　かえた\nエネルギーが　つちに　えいようを\nあたえて　だいちを　ゆたかに　する。"
        jp_kanji:
          omega_ruby: "ランドロスが　訪れる　土地は\n作物が　たくさん　実るため\n畑の神様　と　言われている。"
          alpha_sapphire: "風や　雷を　取りこみ　変えた\nエネルギーが　土に　栄養を\n与えて　大地を　豊かに　する。"
        en:
          omega_ruby: "Lands visited by Landorus grant such bountiful\ncrops that it has been hailed as “The Guardian of\nthe Fields.”"
          alpha_sapphire: "From the forces of lightning and wind, it creates\nenergy to give nutrients to the soil and make the\nland abundant."
        fr:
          omega_ruby: "Il fait fructifier les cultures partout où il passe, c’est pourquoi\non l’appelle « le dieu des moissons »."
          alpha_sapphire: "Il utilise l’énergie qu’il tire du vent et de la foudre pour enrichir\nles sols en nutriments pour les cultures."
        it:
          omega_ruby: "Poiché le terre che visita producono abbondanti raccolti,\nè considerato una benedizione per i campi."
          alpha_sapphire: "Rende fertile la terra trasformando l’energia del vento e dei\nfulmini in nutrimento per il suolo."
        de:
          omega_ruby: "Da an Orten, wo es sich blicken lässt, mit reicher Ernte zu\nrechnen ist, nennt man es auch den „Herrn des Ackerbaus“."
          alpha_sapphire: "Seine aus Wind und Donner gewonnene Energie sorgt für\nreiche Ernten, da sie den Boden mit Nährstoffen anreichert."
        es:
          omega_ruby: "Lo consideran una deidad de las cosechas porque los cultivos\ncrecen en abundancia en las tierras por las que pasa."
          alpha_sapphire: "Utiliza energía que obtiene del viento y del relámpago para\nnutrir el suelo y generar abundantes cosechas."
        ko:
          omega_ruby: "랜드로스가 찾아온 땅에는\n작물에 열매가 많이 열리기 때문에\n농지의 신이라고 전해진다."
          alpha_sapphire: "바람이나 번개를 거둬들여 바꾼\n에너지가 흙에 영양을\n주어 대지를 풍족하게 한다."
