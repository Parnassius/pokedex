        special_defense: 1
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          omega_ruby: "はなの　ひめた　ちからを　ひきだして\nじざいに　あやつる。フラベベが　もつ\nはなは　もはや　からだの　いちぶだ。"
          alpha_sapphire: "きにいった　はなを　みつけると\nいっしょう　その　はなと　くらす。\nかぜに　のって　きままに　ただよう。"
        jp_kanji:
          omega_ruby: "花の　秘めた　力を　引き出して\n自在に　操る。フラベベが　持つ　花は\nもはや　体の　一部だ。"
          alpha_sapphire: "気に入った　花を　見つけると\n一生　その花と　暮らす。\n風に　乗って　気ままに　漂う。"
        en:
          omega_ruby: "It draws out and controls the hidden power\nof flowers. The flower Flabébé holds\nis most likely part of its body."
          alpha_sapphire: "When it finds a flower it likes, it dwells on\nthat flower its whole life long. It floats in the\nwind’s embrace with an untroubled heart."
        fr:
          omega_ruby: "Capable de libérer et de contrôler la force cachée des plantes.\nLa fleur qu’il tient fait partie de lui."
          alpha_sapphire: "Après avoir trouvé une fleur à son goût, il ne la quitte plus\nde toute sa vie. Il se laisse porter au gré du vent."
        it:
          omega_ruby: "È in grado di controllare a piacimento la forza nascosta dei\nfiori. Il fiore a cui si aggrappa fa parte del suo stesso corpo."
          alpha_sapphire: "Una volta trovato un fiore di suo gradimento, rimane in\nsimbiosi con esso per tutta la vita. Va in giro lasciandosi\ntrasportare dal vento."
        de:
          omega_ruby: "Es entlockt Blumen ihre geheimen Kräfte und kontrolliert diese\nnach Belieben. Die Blume, die es trägt, ist wie ein Teil seines\nKörpers."
          alpha_sapphire: "Hat es eine Blume gefunden, die ihm gefällt, lebt es sein\nLeben lang in Symbiose mit ihr. Es lässt sich unbekümmert\nvom Wind treiben."
        es:
          omega_ruby: "Puede controlar el poder oculto de las flores. La flor que\nlleva consigo es como si formara parte de su cuerpo."
          alpha_sapphire: "En cuanto encuentra una flor de su agrado, la convierte en\nsu hogar para toda la vida. Flota en el aire a su antojo\ncabalgando el viento."
        ko:
          omega_ruby: "꽃의 숨겨진 힘을 끌어내어\n자유자재로 조종한다. 플라베베가 지닌\n꽃은 이미 몸의 일부다."
          alpha_sapphire: "마음에 든 꽃을 발견하면\n평생을 그 꽃과 지낸다.\n바람을 타고 내키는 대로 떠다닌다."
