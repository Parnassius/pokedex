          alpha_sapphire: "ひとの　ことばを　おぼえて　なく。\nなかまが　いっかしょに　あつまると\nみんな　おなじ　ことばを　おぼえる。"
        jp_kanji:
          omega_ruby: "相手と　同じ　鳴き声を　出す　ことで\n仲間と　思いこませて\n襲われないように　しているのだ。"
          alpha_sapphire: "人の　言葉を　覚えて　鳴く。\n仲間が　一か所に　集まると\nみんな　同じ　言葉を　覚える。"
        en:
          omega_ruby: "It mimics the cries of other Pokémon to trick them\ninto thinking it’s one of them. This way they won’t\nattack it."
          alpha_sapphire: "It can learn and speak human words. If they gather,\nthey all learn the same saying."
        fr:
          omega_ruby: "Il reproduit le cri de ses ennemis pour faire croire qu’il est\ndes leurs et éviter d’être attaqué."
          alpha_sapphire: "On peut lui enseigner quelques mots. S’il s’agit d’un groupe,\nils retiendront les mêmes phrases."
        it:
          omega_ruby: "Imita la voce dei nemici per far credere che è dei loro,\nevitando così di essere assalito."
          alpha_sapphire: "Può imparare il linguaggio umano. Se un gruppo si raduna,\ntutti imparano le stesse parole."
        de:
          omega_ruby: "Es versucht Attacken zu entgehen, indem es den Ruf des\nGegners nachahmt und einen Artgenossen mimt."
          alpha_sapphire: "Es kann die menschliche Sprache nachahmen.\nVersammeln sie sich, bringen sich alle dasselbe bei."
        es:
          omega_ruby: "Imita los sonidos de sus rivales, haciéndoles creer que son\namigos e impidiendo que le ataquen."
          alpha_sapphire: "Puede imitar el lenguaje humano. Si se juntan varios, todos\naprenden las mismas palabras."
        ko:
          omega_ruby: "상대와 같은 울음소리를 내서\n동료라고 굳게 믿게 하여\n습격당하지 않도록 하고 있다."
          alpha_sapphire: "사람의 말을 기억해서 운다.\n동료가 한 장소에 모이면\n모두 똑같은 말을 기억한다."
