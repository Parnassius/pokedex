        rare: big_mushroom
      descriptions:
        jp_kana:
          omega_ruby: "モンスターボールの　カサを　みせつけ\nえものを　おびきよせようとするが\nだまされる　ポケモンは　すくない。"
          alpha_sapphire: "りょううでの　モンスターボールに\nにた　カサを　ゆらゆらと　うごかして\nえものを　さそう　ダンスを　おどる。"
        jp_kanji:
          omega_ruby: "モンスターボールの　カサを　見せつけ\n獲物を　誘き寄せようとするが\nだまされる　ポケモンは　少ない。"
          alpha_sapphire: "両腕の　モンスターボールに　似た\nカサを　ゆらゆらと　動かして\n獲物を　誘う　ダンスを　踊る。"
        en:
          omega_ruby: "They show off their Poké Ball caps to lure prey,\nbut very few Pokémon are fooled by this."
          alpha_sapphire: "It lures prey close by dancing and waving its\narm caps, which resemble Poké Balls, in a\nswaying motion."
        fr:
          omega_ruby: "Il se sert de ses coupoles en forme de Poké Ball pour attirer\nses proies, mais peu de Pokémon se laissent avoir."
          alpha_sapphire: "Il danse en faisant tournoyer les coupoles en forme\nde Poké Ball de ses bras pour attirer ses proies."
        it:
          omega_ruby: "Cerca di attirare le prede esibendo un cappello a forma\ndi Poké Ball, ma sono pochi i Pokémon che si fanno\ningannare."
          alpha_sapphire: "Attira le sue prede con danze, durante le quali fa roteare\ni dischi simili a Poké Ball che porta sugli arti."
        de:
          omega_ruby: "Um Beute anzulocken, bietet es seinen Hut feil, der einem\nPokéball ähnelt. Doch kaum ein Pokémon fällt darauf herein."
          alpha_sapphire: "Es lockt seine Beute an, indem es die Hüte in Form von\nPokébällen an seinen Armen rüttelt und einen Tanz aufführt."
        es:
          omega_ruby: "Aunque intenta pasar por parte superior de una Poké Ball para\natraer a sus presas, consigue engañar a pocos."
          alpha_sapphire: "Baila meciendo rítmicamente los dos brazos a modo de\nPoké Ball para hacer que sus presas se acerquen."
        ko:
          omega_ruby: "몬스터볼 무늬의 삿갓을 보여주며\n먹이를 유인하려 하지만\n속아 넘어가는 포켓몬은 드물다."
          alpha_sapphire: "양팔의 몬스터볼을 닮은\n삿갓을 한들한들 흔들어\n먹이를 유인하는 춤을 춘다."
frillish:
