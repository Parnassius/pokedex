        jp_kana:
          omega_ruby: "シャンデラの　ほのおに　つつまれると\nたましいが　すいとられ　もやされる。\nぬけがらの　からだ　だけが　のこる。"
          alpha_sapphire: "あやしげな　ほのおで　もやされた\nたましいは　いきばを　なくし\nこの　よを　えいえんに　さまよう。"
        jp_kanji:
          omega_ruby: "シャンデラの　炎に　包まれると\n魂が　吸い取られ　燃やされる。\n抜け殻の　体　だけが　残る。"
          alpha_sapphire: "怪しげな　炎で　燃やされた\n魂は　行き場を　なくし\nこの　世を　永遠に　さまよう。"
        en:
          omega_ruby: "Being consumed in Chandelure’s flame burns up\nthe spirit, leaving the body behind."
          alpha_sapphire: "The spirits burned up in its ominous flame lose their\nway and wander this world forever."
        fr:
          omega_ruby: "Les victimes des flammes de Lugulabre voient leur âme aspirée\njusqu’à ce que leur corps ne soit plus que coquille vide."
          alpha_sapphire: "Les âmes consumées par ses flammes étranges sont\ncondamnées à l’errance pour l’éternité."
        it:
          omega_ruby: "Le fiamme di Chandelure risucchiano lo spirito e lasciano\nil corpo come un guscio vuoto."
          alpha_sapphire: "Le anime bruciate dalle sue fiamme cupe perdono la strada\ne rimangono a vagare in questo mondo per l’eternità."
        de:
          omega_ruby: "Es saugt die Seele eines jeden auf, der in seinen Feuerkranz\ngerät, bis nur noch eine leere Hülle von ihm übrig ist."
          alpha_sapphire: "Seelen, die das Feuer seiner schaurigen Flammen gekostet\nhaben, irren bis ans Ende der Tage ziellos durch diese Welt."
        es:
          omega_ruby: "Sus llamas absorben el alma del enemigo y la abrasan,\ndejando solo su cuerpo inerte."
          alpha_sapphire: "Las almas que han ardido bajo sus oscuras llamas vagan sin\nrumbo y eternamente por este mundo."
        ko:
          omega_ruby: "샹델라의 불꽃에 둘러싸이면\n영혼이 빨려가 불타버린다.\n빈 껍데기인 몸만 남는다."
          alpha_sapphire: "괴상한 불꽃으로 태워진\n영혼은 갈 곳을 잃고\n이승을 영원히 헤맨다."
axew:
