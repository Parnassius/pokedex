      descriptions:
        jp_kana:
          omega_ruby: "クルマユの　すむ　もりは　くさきが\nよく　そだつ。クルマユが　おちばを\nえいようぶんに　かえているのだ。"
          alpha_sapphire: "はっぱで　からだを　つつみこんで\nさむさを　ふせぐ。てぢかな　おちばを\nたべながら　もりを　いどうする。"
        jp_kanji:
          omega_ruby: "クルマユの　住む　森は　草木が\nよく　育つ。クルマユが　落ち葉を\n栄養分に　変えているのだ。"
          alpha_sapphire: "葉っぱで　体を　包みこんで\n寒さを　防ぐ。手近な　落ち葉を\n食べながら　森を　移動する。"
        en:
          omega_ruby: "Forests where Swadloon live have superb foliage\nbecause the nutrients they make from fallen leaves\nnourish the plant life."
          alpha_sapphire: "It protects itself from the cold by wrapping up in\nleaves. It stays on the move, eating leaves\nin forests."
        fr:
          omega_ruby: "Dans les forêts où il vit, la végétation pousse bien\ncar il transforme les feuilles mortes en engrais."
          alpha_sapphire: "Il se protège du froid en s’emmitouflant dans une feuille.\nIl se déplace en forêt et mange les feuilles tombées par terre."
        it:
          omega_ruby: "Le foreste in cui vive Swadloon sono lussureggianti, poiché\ntrasforma le foglie morte in sostanze nutritive."
          alpha_sapphire: "Si protegge dal freddo avvolgendo il corpo nelle foglie, che ha\nl’abitudine di mangiare in giro per la foresta."
        de:
          omega_ruby: "Es wandelt herabgefallenes Laub in Nährstoffe um. In Wäldern,\nwo es Folikon gibt, fühlen sich Pflanzen pudelwohl."
          alpha_sapphire: "Es schützt sich vor Kälte, indem es sich in Blätter einwickelt.\nEs durchstreift Wälder und frisst herabgefallenes Laub."
        es:
          omega_ruby: "La vegetación abunda en los bosques que habita. Este\nPokémon transforma las hojas caídas en nutrientes."
          alpha_sapphire: "Se guarece del frío envolviéndose en hojas. Se desplaza por\nel bosque comiendo a su paso las hojas caídas."
        ko:
          omega_ruby: "두르쿤이 사는 숲은 초목이\n잘 자란다. 두르쿤이 낙엽을\n영양분으로 바꾸기 때문이다."
          alpha_sapphire: "잎사귀로 몸을 감싸\n추위를 막는다. 가까이 있는 낙엽을\n먹으며 숲을 이동한다."
leavanny:
  species_id: 542
  names:
    jp_kana: ハハコモリ
    jp_kanji: ハハコモリ
    en: Leavanny
    fr: Manternel
    it: Leavanny
