      descriptions:
        jp_kana:
          omega_ruby: "かいてんほうこうを　かえる　ことで\nなかまに　きもちを　つたえている。\nおこるほど　かいてんが　はやくなる。"
          alpha_sapphire: "ちびギアと　でかギアに　わかれた。\nこうげきのため　とばした　ちびギアが\nもどってこないと　しんでしまう。"
        jp_kanji:
          omega_ruby: "回転方向を　変える　ことで\n仲間に　気持ちを　伝えている。\n怒るほど　回転が　速くなる。"
          alpha_sapphire: "ちびギアと　でかギアに　わかれた。\n攻撃のため　飛ばした　ちびギアが\n戻ってこないと　死んでしまう。"
        en:
          omega_ruby: "By changing the direction in which it rotates,\nit communicates its feelings to others. When angry,\nit rotates faster."
          alpha_sapphire: "A minigear and big gear comprise its body. If the\nminigear it launches at a foe doesn’t return, it\nwill die."
        fr:
          omega_ruby: "Ils communiquent entre eux en changeant leur sens\nde rotation. Plus ils sont en colère, plus ils tournent vite."
          alpha_sapphire: "Le plus grand des rouages projette le plus petit pour attaquer.\nCe dernier risque de dépérir s’il ne revient pas."
        it:
          omega_ruby: "Comunicano il loro stato d’animo cambiando senso di\nrotazione. Più si arrabbiano, più girano velocemente."
          alpha_sapphire: "È formato da un ingranaggio grande e uno piccolo. Attacca\ncon quello piccolo ma, se questo non torna indietro, è in\nseria difficoltà."
        de:
          omega_ruby: "Teilt Artgenossen seine Gefühlslage mit, indem es die\nUmlaufrichtung ändert. Wenn es wütend ist, dreht es sich\nschneller."
          alpha_sapphire: "Besteht aus kleinen und großen Rädern. Kehrt ein kleines Rad,\ndas es abgefeuert hat, nicht zurück, wird es brenzlig."
        es:
          omega_ruby: "Muestra sus sentimientos cambiando la dirección de su giro.\nCuanto más se enfade, más rápido girará."
          alpha_sapphire: "Se compone de una rueda dentada grande y otra pequeña.\nLanza la pequeña para atacar, pero se debilita si no regresa."
        ko:
          omega_ruby: "회전 방향을 바꿔서\n동료에게 감정을 전한다.\n화가 나면 회전이 빨라진다."
          alpha_sapphire: "꼬마기어와 왕기어로 나뉘었다.\n공격을 위해 날린 꼬마기어가\n돌아오지 않으면 죽게 된다."
