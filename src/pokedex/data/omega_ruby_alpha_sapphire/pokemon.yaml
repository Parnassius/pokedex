      descriptions:
        jp_kana:
          omega_ruby: "はったつした　アゴと　するどく　とがった　キバは\nふなぞこを　かみちぎる　ほどの　はかいりょく。\nキバニアに　おそわれ　しずんだ　ふねは　おおい。"
          alpha_sapphire: "テリトリーを　あらす　ものには　しゅうだんで\nおそいかかり　とがった　キバで　やつざきにする。\n１ぴきに　なると　とたんに　よわごしに　なるぞ。"
        jp_kanji:
          omega_ruby: "発達した　アゴと　鋭く　とがった　キバは\n船底を　かみ千切る　ほどの　破壊力。\nキバニアに　襲われ　沈んだ　船は　多い。"
          alpha_sapphire: "テリトリーを　荒らす　ものには　集団で\n襲いかかり　とがった　キバで　八つ裂きにする。\n１匹に　なると　途端に　弱腰に　なるぞ。"
        en:
          omega_ruby: "Carvanha’s strongly developed jaws and its sharply pointed\nfangs pack the destructive power to rip out boat hulls.\nMany boats have been attacked and sunk by this Pokémon."
          alpha_sapphire: "If anything invades Carvanha’s territory, it will swarm and tear\nat the intruder with its pointed fangs. On its own, however, this\nPokémon turns suddenly timid."
        fr:
          omega_ruby: "Les mâchoires surdéveloppées de Carvanha et ses crocs\nacérés sont si puissants qu’ils peuvent déchirer la coque\ndes bateaux. De nombreux navires ont été attaqués\net coulés par ce Pokémon."
          alpha_sapphire: "Si un intrus s’aventure sur le territoire des Carvanha, ils se\nruent sur lui et le mordent à l’aide de leurs crocs acérés.\nEn revanche, lorsqu’il est seul, ce Pokémon devient tout\nà coup très timide."
        it:
          omega_ruby: "Le sviluppate mascelle di Carvanha e i denti estremamente\nappuntiti e affilati hanno una potenza distruttiva tale da\nsventrare la carena di una nave. Già molte navi sono state\nattaccate e affondate da questo Pokémon."
          alpha_sapphire: "In caso di invasione del proprio territorio, i Carvanha si\nlanciano in branco contro gli intrusi annientandoli senza\npietà. Preso singolarmente, invece, questo Pokémon diventa\nestremamente timido."
        de:
          omega_ruby: "Kanivanhas starke Kiefer und seine spitzen Zähne verfügen\nüber die zerstörerische Kraft, Bootsrümpfe verschlingen zu\nkönnen. Dieses Pokémon hat schon viele Boote versenkt."
          alpha_sapphire: "Wenn jemand Kanivanhas Revier betritt, schwärmt es aus und\nschnappt mit seinen spitzen Zähnen nach dem Eindringling.\nWenn es allein ist, ist dieses Pokémon sehr scheu."
        es:
          omega_ruby: "Carvanha, gracias a las descomunales fauces de afilados\ncolmillos que tiene, es capaz de hacer trizas un barco. Son\nmuchas las naves que han sufrido el ataque de este Pokémon\ny han acabado naufragando."
          alpha_sapphire: "Si algo o alguien invade el territorio de los Carvanha, se\nacercarán en masa y harán trizas al intruso con los afilados\ncolmillos. Sin embargo, cuando están en solitario, estos\nPokémon se vuelven tímidos de repente."
        ko:
          omega_ruby: "발달한 턱과 날카롭고 뾰족한 이빨은\n배 밑바닥을 물어뜯을 정도의 파괴력을 지녔다.\n샤프니아에게 습격당해 가라앉은 배가 많다."
          alpha_sapphire: "영역을 침범하는 자는 집단으로\n덤벼들어 뾰족한 이빨로 갈가리 찢는다.\n혼자가 되면 바로 소극적인 모습을 보인다."
