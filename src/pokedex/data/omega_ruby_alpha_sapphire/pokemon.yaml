          alpha_sapphire: "ちいさな　からだでも　アゴの　ちからは　つよい。\nワニノコじしんは　あまがみ　している　つもりでも\nおおけがを　してしまう　ほどの　ちからが　ある。"
        jp_kanji:
          omega_ruby: "小さな　体でも　アゴの　力は　強い。\nワニノコ自身は　甘がみ　している　つもりでも\n大怪我を　してしまう　ほどの　力が　ある。"
          alpha_sapphire: "小さな　体でも　アゴの　力は　強い。\nワニノコ自身は　甘がみ　している　つもりでも\n大怪我を　してしまう　ほどの　力が　ある。"
        en:
          omega_ruby: "Despite the smallness of its body, Totodile’s jaws are very\npowerful. While the Pokémon may think it is just playfully\nnipping, its bite has enough power to cause serious injury."
          alpha_sapphire: "Despite the smallness of its body, Totodile’s jaws are very\npowerful. While the Pokémon may think it is just playfully\nnipping, its bite has enough power to cause serious injury."
        fr:
          omega_ruby: "Malgré son tout petit corps, la mâchoire de Kaiminus est\ntrès puissante. Parfois, ce Pokémon mordille les gens pour\njouer, sans se rendre compte que sa morsure peut gravement\nblesser quelqu’un."
          alpha_sapphire: "Malgré son tout petit corps, la mâchoire de Kaiminus est\ntrès puissante. Parfois, ce Pokémon mordille les gens pour\njouer, sans se rendre compte que sa morsure peut gravement\nblesser quelqu’un."
        it:
          omega_ruby: "Nonostante il suo corpicino minuto, le mascelle di Totodile\nsono molto potenti. Sebbene creda solo di giocare, il suo\nmorso è così forte e pericoloso da causare serie ferite."
          alpha_sapphire: "Nonostante il suo corpicino minuto, le mascelle di Totodile\nsono molto potenti. Sebbene creda solo di giocare, il suo\nmorso è così forte e pericoloso da causare serie ferite."
        de:
          omega_ruby: "Karnimani ist zwar sehr klein, aber seine Kiefer sind sehr stark.\nWenn die Pokémon denken, dass es nur spielerisch an ihnen\nknabbert, sollten sie vorsichtig sein, denn sein Biss kann zu\nschweren Verletzungen führen."
          alpha_sapphire: "Karnimani ist zwar sehr klein, aber seine Kiefer sind sehr stark.\nWenn die Pokémon denken, dass es nur spielerisch an ihnen\nknabbert, sollten sie vorsichtig sein, denn sein Biss kann zu\nschweren Verletzungen führen."
