        jp_kana:
          omega_ruby: "あいての　はっする　はどうを\nキャッチすることで　かんがえや\nうごきを　よみとることが　できる。"
          alpha_sapphire: "あらゆる　ものが　だす　はどうを\nよみとることで　１キロさきに　いる\nあいての　きもちも　りかいできる。"
        jp_kanji:
          omega_ruby: "相手の　発する　波動を\nキャッチすることで　考えや　動きを\n読み取ることが　できる。"
          alpha_sapphire: "あらゆる　ものが　出す　波動を\n読みとることで　１キロ先に　いる\n相手の　気持ちも　理解できる。"
        en:
          omega_ruby: "By catching the aura emanating from others, it can\nread their thoughts and movements."
          alpha_sapphire: "By reading the auras of all things, it can tell how\nothers are feeling from over half a mile away."
        fr:
          omega_ruby: "Il peut deviner les pensées et les mouvements des autres\nen analysant leur aura."
          alpha_sapphire: "Il peut sentir et identifier les émotions de quelqu’un à plus\nd’un kilomètre."
        it:
          omega_ruby: "Riesce a leggere i pensieri e i movimenti del nemico decifrando\nl’aura che questo emette."
          alpha_sapphire: "Sa decifrare le onde emesse da ogni cosa. Questo gli permette\ndi capire le emozioni di creature lontane anche 1 km."
        de:
          omega_ruby: "Es nimmt die Aura seines Gegners wahr. So kann es dessen\nGedanken und Bewegungen erkennen."
          alpha_sapphire: "Kann aus 1 km Entfernung die Gefühle anderer Wesen\nerfassen, indem es die Wellen liest, die sie aussenden."
        es:
          omega_ruby: "Puede leer los pensamientos y movimientos de su adversario\na través de su aura."
          alpha_sapphire: "Emite unas ondas que le permiten percibir todo lo que se\nencuentre a 1 km, incluso los sentimientos de otras personas."
        ko:
          omega_ruby: "상대가 발하는 파동을\n감지하여 생각이나\n움직임을 간파할 수 있다."
          alpha_sapphire: "모든 물건이 내는 파동을\n읽어내어 1km 앞에 있는\n상대의 마음도 이해할 수 있다."
