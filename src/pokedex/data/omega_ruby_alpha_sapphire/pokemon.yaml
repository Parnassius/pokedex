        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - ice
      egg_groups:
        - undiscovered
      abilities:
        - clear_body
      hidden_ability: ice_body
      descriptions:
        jp_kana:
          omega_ruby: "ひょうがじだいに　つくられた　こおりの　からだは\nほのおでも　とかす　ことが　できない。\nマイナス　２００どの　れいきを　あやつる。"
          alpha_sapphire: "マイナス２００どの　れいきが　からだを　つつむ。\nちかづいた　だけでも　こおりついて　しまうぞ。\nマグマでも　とけない　こおりの　からだを　もつ。"
        jp_kanji:
          omega_ruby: "氷河時代に　つくられた　氷の　体は\n炎でも　溶かす　ことが　できない。\nマイナス　２００度の　冷気を　操る。"
          alpha_sapphire: "マイナス２００度の　冷気が　体を　包む。\n近づいた　だけでも　凍りついて　しまうぞ。\nマグマでも　溶けない　氷の　体を　持つ。"
        en:
          omega_ruby: "Regice’s body was made during an ice age. The deep-frozen\nbody can’t be melted, even by fire. This Pokémon controls\nfrigid air of -328 degrees Fahrenheit."
          alpha_sapphire: "Regice cloaks itself with frigid air of -328 degrees Fahrenheit.\nThings will freeze solid just by going near this Pokémon.\nIts icy body is so cold, it will not melt even if it is immersed\nin magma."
        fr:
          omega_ruby: "Le corps de Regice fut créé pendant l’ère glaciaire.\nSon corps est tellement gelé qu’il ne peut pas fondre,\nmême en le brûlant. Ce Pokémon peut contrôler l’air glacé\njusqu’à une température de -200 °C."
          alpha_sapphire: "Regice se recouvre d’air glacé à -200 °C. Tout ce qui passe\nà proximité de ce Pokémon gèle sur place. Son corps est si\nfroid qu’il ne fond jamais, même s’il plonge dans du magma."
        it:
          omega_ruby: "Il corpo di Regice è stato creato durante l’era glaciale.\nIl corpo congelato non può essere fuso neanche col fuoco.\nQuesto Pokémon riesce a gestire perfettamente l’aria gelida\na -200 °C."
          alpha_sapphire: "Regice si avvolge in un manto d’aria alla temperatura\ndi -200 °C. Ogni cosa che si avvicina a questo Pokémon\nsi congela all’istante. Il suo corpo gelido non si fonde\nnemmeno se immerso nel magma."
        de:
          omega_ruby: "Regices tiefgefrorener Körper entstand während der Eiszeit.\nEs kann nicht einmal durch Feuer geschmolzen werden.\nDieses Pokémon kontrolliert eisige Luft von -200 °C."
          alpha_sapphire: "Regice umhüllt sich selbst mit kalter Luft von -200 °C.\nAlles und jeder, der sich diesem Pokémon nähert, friert\nsofort ein. Sein eisiger Körper ist so kalt, dass nicht einmal\nMagma es schmelzen könnte."
        es:
          omega_ruby: "Regice surgió durante la edad de hielo. El cuerpo de este\nPokémon está totalmente congelado, ni siquiera el fuego\npuede derretirlo. Regice libera y regula un aire gélido de\n-200 °C."
          alpha_sapphire: "Regice se rodea de un aire gélido que llega a -200 °C y deja\ncongelado a todo lo que se le acerca. Es imposible derretir a\neste Pokémon; tiene una temperatura demasiado baja."
        ko:
          omega_ruby: "빙하시대에 만들어진 얼음으로 된 몸은\n불꽃으로도 녹일 수가 없다.\n영하 200도의 냉기를 다룬다."
          alpha_sapphire: "영하 200도의 냉기가 몸을 감쌌다.\n가까이 다가가기만 해도 얼어붙는다.\n마그마에도 녹지 않는 얼음으로 된 몸을 지녔다."
registeel:
