      descriptions:
        jp_kana:
          omega_ruby: "うごく　ものを　みつけると　むちゅうに　なって\nおいかけまわす　しゅうせいを　もつ　ポケモン。\nじぶんの　シッポを　おいかけて　めを　まわす。"
          alpha_sapphire: "じぶんの　シッポを　おいかけまわす　ポケモン。\nやせいは　もりの　じゅもくの　あなで　くらす。\nあいくるしい　かおで　ペットとして　だいにんき。"
        jp_kanji:
          omega_ruby: "動く　ものを　見つけると　夢中に　なって\n追いかけ回す　習性を　持つ　ポケモン。\n自分の　シッポを　追いかけて　目を　回す。"
          alpha_sapphire: "自分の　シッポを　追いかけ回す　ポケモン。\n野生は　森の　樹木の　穴で　暮らす。\n愛くるしい　顔で　ペットとして　大人気。"
        en:
          omega_ruby: "Skitty has the habit of becoming fascinated by moving objects\nand chasing them around. This Pokémon is known to chase\nafter its own tail and become dizzy."
          alpha_sapphire: "Skitty is known to chase around playfully after its own tail.\nIn the wild, this Pokémon lives in holes in the trees of forests.\nIt is very popular as a pet because of its adorable looks."
        fr:
          omega_ruby: "Skitty a pris l’habitude de pourchasser les objets mobiles\nqui le fascinent. On sait que ce Pokémon court souvent\naprès sa queue, jusqu’à ce qu’il ait la tête qui tourne."
          alpha_sapphire: "On sait que Skitty court souvent après sa queue.\nÀ l’état sauvage, ce Pokémon vit dans les cavités des arbres\nde la forêt. Il est tellement adorable qu’il a un grand succès\ncomme animal de compagnie."
        it:
          omega_ruby: "Skitty ha l’abitudine di lasciarsi ammaliare dagli oggetti\nin movimento e seguirli dando loro la caccia. Questo\nPokémon è noto anche per rincorrere la sua stessa\ncoda fino a rimanere stordito."
          alpha_sapphire: "Skitty è noto per il suo movimento rotatorio inteso a mordere\nla propria coda. Allo stato brado, vive all’interno di tronchi\ncavi nella foresta. È molto amato come animale domestico\ngrazie all’aspetto estremamente dolce."
        de:
          omega_ruby: "Eneco ist fasziniert von Dingen, die sich bewegen, und jagt\nihnen hinterher. Dieses Pokémon jagt häufig seinen eigenen\nSchweif, sodass ihm schwindlig wird."
          alpha_sapphire: "Eneco jagt spielerisch seinen eigenen Schweif. In der Wildnis\nlebt dieses Pokémon in den Löchern von Bäumen. Es ist als\nHaustier sehr beliebt, da es bezaubernd aussieht."
        es:
          omega_ruby: "A Skitty le encanta mover cosas e ir detrás de ellas. Es de\ntodos sabido que se dedica a ir detrás de su propia cola y\nque, al final, acaba mareándose."
          alpha_sapphire: "Skitty es conocido por la costumbre que tiene de juguetear y\nde intentar pillarse la cola. En estado salvaje, habita en las\ncavidades de los troncos de los árboles del bosque. Es la\nmascota de muchos por lo dulce que parece."
        ko:
          omega_ruby: "움직이는 것을 발견하면 푹 빠져서\n뒤쫓아 가는 습성을 지닌 포켓몬이다.\n자기 꼬리를 쫓다 현기증을 일으킨다."
          alpha_sapphire: "자신의 꼬리를 쫓아다니는 포켓몬이다.\n야생에서는 숲의 나무 구멍에서 산다.\n귀염성 있는 얼굴 때문에 애완동물로 인기가 높다."
delcatty:
  species_id: 301
  names:
    jp_kana: エネコロロ
    jp_kanji: エネコロロ
    en: Delcatty
    fr: Delcatty
    it: Delcatty
    de: Enekoro
    es: Delcatty
    ko: 델케티
  forms:
    delcatty:
      form_id: 0
      base_stats:
        hp: 70
        attack: 65
        defense: 65
        special_attack: 55
        special_defense: 55
        speed: 70
      evs_yield:
        hp: 1
