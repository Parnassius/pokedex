          omega_ruby: "おたがいの　しっぽで　あいてを\nとことん　きれいに　してあげるのが\nチラーミィどうしの　あいさつ。"
          alpha_sapphire: "きれいずきな　せいかくの　ポケモン。\nしっぽを　ほうきがわりに　いつも\nすみかの　ほこりを　はらっている。"
        jp_kanji:
          omega_ruby: "お互いの　尻尾で　相手を\nとことん　きれいに　してあげるのが\nチラーミィ同士の　あいさつ。"
          alpha_sapphire: "きれい好きな　性格の　ポケモン。\n尻尾を　ほうきがわりに　いつも\n住処の　ほこりを　払っている。"
        en:
          omega_ruby: "Minccino greet each other by grooming one another\nthoroughly with their tails."
          alpha_sapphire: "These Pokémon prefer a tidy habitat. They are\nalways sweeping and dusting, using their tails\nas brooms."
        fr:
          omega_ruby: "Ils se saluent en s’époussetant les uns les autres avec\nleur queue qui leur sert de plumeau."
          alpha_sapphire: "Un Pokémon qui aime la propreté. Chez lui, il enlève\nsans cesse la poussière en utilisant sa queue comme\nun plumeau."
        it:
          omega_ruby: Si salutano pulendosi l’un l’altro con le loro code.
          alpha_sapphire: "Di natura ama la pulizia. Spazza sempre la polvere dalla sua\ntana usando la coda come scopa."
        de:
          omega_ruby: "Sie begrüßen einander, indem sie ihr Gegenüber mithilfe ihres\nSchweifs säubern."
          alpha_sapphire: "Ein Pokémon mit Putzfimmel. Es benutzt seinen Schweif als\nStaubwedel und fegt seinen Bau, bis alles picobello ist."
        es:
          omega_ruby: "Se saludan entre sí frotándose con la cola y limpiándose a\nconciencia."
          alpha_sapphire: "Le encanta la limpieza. Usa su cola a modo de escoba y se\npasa el día barre que te barre."
        ko:
          omega_ruby: "서로의 꼬리로 상대를\n철저히 깨끗하게 만드는 것이\n치라미끼리의 인사다."
          alpha_sapphire: "깨끗함을 좋아하는 포켓몬이다.\n꼬리를 빗자루 대신 써서 항상\n거처의 먼지를 쓸어낸다."
