      descriptions:
        jp_kana:
          omega_ruby: "テリトリーは　みごとな　はなぞの。\nくさばなが　はなつ　エネルギーを\nあびて　じぶんの　パワーにするのだ。"
          alpha_sapphire: "むかしの　しろの　あるじたちは\nにわを　かざるため　フラージェスを\nまねきいれ　はなぞのを　つくらせた。"
        jp_kanji:
          omega_ruby: "テリトリーは　見事な　花園。\n草花の　放つ　エネルギーを　浴びて\n自分の　パワーにするのだ。"
          alpha_sapphire: "昔の　城の　主たちは　庭を　飾るため\nフラージェスを　招き入れ\n花園を　作らせた。"
        en:
          omega_ruby: "It claims exquisite flower gardens as its territory,\nand it obtains power from basking in the energy\nemitted by flowering plants."
          alpha_sapphire: "In times long past, governors of castles\nwould invite Florges to create flower gardens\nto embellish the castle domains."
        fr:
          omega_ruby: "Les jardins fleuris sont son territoire. Il se baigne dans\nl’énergie dégagée par les plantes en fleurs pour l’absorber."
          alpha_sapphire: "Les châtelains de jadis invitaient les Florges sur leurs terres\net leur confiaient la réalisation de leurs jardins."
        it:
          omega_ruby: "Il suo habitat preferito sono i meravigliosi giardini fioriti.\nAssorbe e utilizza l’energia di piante e fiori."
          alpha_sapphire: "Anticamente, i padroni dei castelli ricorrevano al suo aiuto per\nabbellire i loro giardini con tanti fiori diversi."
        de:
          omega_ruby: "Wunderschöne Blumengärten sind sein Revier. Es badet in der\nvon blühenden Blumen freigesetzten Energie und zieht daraus\nseine Kraft."
          alpha_sapphire: "Die Schlossherren vergangener Zeiten haben Florges\neingeladen, damit diese Blumengärten für sie anlegen,\num so ihre Anwesen zu verschönern."
        es:
