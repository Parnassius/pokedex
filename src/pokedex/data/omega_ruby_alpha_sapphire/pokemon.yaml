        - shed_skin
      descriptions:
        jp_kana:
          omega_ruby: "マユルドの　からだは　くちから　だした　ほそい\nいとが　からだを　つつみ　かたくなった　もの。\nマユの　なかで　しんかの　じゅんびを　している。"
          alpha_sapphire: "うごくと　つよい　からだに　しんか　できないので\nどんなに　いためつけられても　じっと　している。\nそのとき　うけた　いたみは　ずっと　わすれない。"
        jp_kanji:
          omega_ruby: "マユルドの　体は　口から　出した　細い\n糸が　体を　包み　硬くなった　もの。\nマユの　中で　進化の　準備を　している。"
          alpha_sapphire: "動くと　強い　体に　進化　できないので\nどんなに　痛めつけられても　じっと　している。\nそのとき　受けた　痛みは　ずっと　忘れない。"
        en:
          omega_ruby: "Cascoon makes its protective cocoon by wrapping its body\nentirely with a fine silk from its mouth. Once the silk goes\naround its body, it hardens. This Pokémon prepares for its\nevolution inside the cocoon."
          alpha_sapphire: "If it is attacked, Cascoon remains motionless however badly it\nmay be hurt. It does so because if it were to move, its body\nwould be weak upon evolution. This Pokémon will also not\nforget the pain it endured."
        fr:
          omega_ruby: "Blindalys fabrique son cocon protecteur en s’enveloppant\ndans la soie qui sort de sa bouche. Une fois la soie autour\nde son corps, elle se met à durcir. Ce Pokémon prépare\nson évolution à l’intérieur du cocon."
          alpha_sapphire: "Lorsqu’il est attaqué, Blindalys reste immobile, même s’il a\ntrès mal. En effet, s’il bougeait, son corps serait affaibli lors\nde son évolution. En revanche, ce Pokémon n’oubliera pas\nla douleur endurée."
        it:
          omega_ruby: "Cascoon crea il bozzolo protettivo avvolgendo interamente\nil proprio corpo con finissima seta secreta dalla bocca.\nSuccessivamente la seta si indurisce. A questo punto Cascoon\nsi prepara all’evoluzione."
          alpha_sapphire: "In caso di aggressione Cascoon rimane immobile\nindipendentemente dalla violenza dell’attacco subito.\nQuesto lo aiuta a evitare di indebolire il suo corpo in vista\ndell’evoluzione. Non dimentica mai il dolore provato."
        de:
          omega_ruby: "Panekon baut seinen schützenden Kokon, indem es seinen\nKörper mit feiner Seide einwickelt, die aus seinem Mund\naustritt. Wenn sein Körper mit Seide bedeckt ist, wird diese\nhart. Im Kokon wartet es auf seine Entwicklung."
          alpha_sapphire: "Wenn es angegriffen wird, bewegt sich Panekon in\nkeiner Weise, egal, wie schwer es dabei verletzt wird.\nWenn es sich bewegen würde, wäre sein Körper zu\nschwach für seine Entwicklung. Die Schmerzen allerdings\nvergisst es nie."
        es:
          omega_ruby: "Cascoon forma el capullo que lo protege enrollándose por\ncompleto en la seda que libera por la boca. Cuando está\ntotalmente recubierto, se prepara para evolucionar en el\ninterior del capullo."
          alpha_sapphire: "Si atacan a Cascoon, se queda inmóvil aunque le hayan hecho\nmucho daño, puesto que, si se moviera, perdería fuerzas para\nevolucionar. Nunca olvida el daño que le han hecho."
        ko:
          omega_ruby: "카스쿤의 몸은 입에서 나온 가는\n실이 몸을 둘러싸 딱딱해진 것이다.\n고치 안에서 진화의 준비를 하고 있다."
          alpha_sapphire: "움직이면 튼튼한 몸으로 진화할 수 없어서\n아무리 괴롭혀도 가만히 있는다.\n그때 느낀 아픔을 계속 잊지 않는다."
