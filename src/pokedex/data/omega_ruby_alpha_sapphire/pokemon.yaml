          alpha_sapphire: "えもの　めがけて　いっちょくせんに　つっぱしる。\nじそく　１００キロを　こえる　スピードを　だすが\nいちど　きゅうていし　しないと　まがれないのだ。"
        jp_kanji:
          omega_ruby: "真っ直ぐに　突っ走り　障害物が　ある\nときは　直角に　折れ曲がって　避ける。\n緩やかに　カーブした　道が　とても　苦手。"
          alpha_sapphire: "獲物　目掛けて　一直線に　突っ走る。\n時速　１００キロを　超える　スピードを　出すが\n一度　急停止　しないと　曲がれないのだ。"
        en:
          omega_ruby: "Linoone always runs full speed and only in straight lines.\nIf facing an obstacle, it makes a right-angle turn to evade it.\nThis Pokémon is very challenged by gently curving roads."
          alpha_sapphire: "When hunting, Linoone will make a beeline straight for the\nprey at a full run. While this Pokémon is capable of topping\n60 mph, it has to come to a screeching halt before it can turn."
        fr:
          omega_ruby: "Linéon court très vite et toujours en ligne droite.\nSi un obstacle survient, il l’évite en prenant un angle droit.\nCe Pokémon a beaucoup de mal à suivre les routes\nlégèrement courbées."
          alpha_sapphire: "Lorsqu’il chasse, Linéon fonce toujours tout droit sur sa proie\nà pleine vitesse. Bien que ce Pokémon puisse atteindre\n100 km/h, il doit s’arrêter en catastrophe avant de pouvoir\ntourner."
        it:
          omega_ruby: "Linoone è solito correre a tutta velocità e sempre in linea\nretta. Davanti a un ostacolo fa una curva ad angolo retto\nper evitarlo. Questo Pokémon si trova in difficoltà su percorsi\ncon curve poco accentuate."
          alpha_sapphire: "Quando caccia, Linoone si lancia rapido sulla preda. Infatti\nriesce a raggiungere la velocità di 100 km/h ma prima di\ngirare è costretto a fermarsi in modo brusco e repentino."
        de:
          omega_ruby: "Geradaks rennt immer mit vollem Tempo und nie im Zickzack,\nsondern nur gerade. Wenn ihm ein Hindernis im Weg ist, läuft\nes rechtwinklig daran vorbei. Für dieses Pokémon stellen\nleichte Kurven eine große Herausforderung dar."
          alpha_sapphire: "Auf der Jagd rennt Geradaks so schnell es kann schnurstracks\nhinter seiner Beute her. Es erreicht zwar über 100 km/h, muss\naber erst aus vollem Lauf zum Stehen kommen, bevor es die\nRichtung wechseln kann."
        es:
          omega_ruby: "Linoone siempre corre todo lo rápido que puede y solo en\nlínea recta. Si encuentra un obstáculo en el camino, girará\nen ángulo recto para esquivarlo. Correr bien por caminos\ntortuosos es todo un reto para él."
          alpha_sapphire: "Cuando Linoone caza, va directo hacia su presa a toda\nvelocidad. Si por un lado puede alcanzar 100 km/h, por\notro tiene que frenar en seco para poder cambiar de sentido."
        ko:
          omega_ruby: "똑바로 힘껏 달리며 장애물이 있을\n때는 직각으로 꺾어서 피한다.\n완만하게 굽은 길은 달리는 데 매우 서툴다."
          alpha_sapphire: "먹이를 쫓아 일직선으로 질주한다.\n시속 100km를 넘는 스피드를 내지만\n한 번 급정지하지 않으면 꺾을 수 없다."
wurmple:
  species_id: 265
  names:
    jp_kana: ケムッソ
    jp_kanji: ケムッソ
    en: Wurmple
    fr: Chenipotte
    it: Wurmple
    de: Waumpel
    es: Wurmple
    ko: 개무소
  forms:
    wurmple:
      form_id: 0
      base_stats:
        hp: 45
