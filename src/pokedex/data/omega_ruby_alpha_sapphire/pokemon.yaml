          alpha_sapphire: "La qualità della lana di Flaaffy varia in modo da generare\nun’alta carica elettrostatica con un ridotto quantitativo di lana.\nLe parti scoperte e vulnerabili del suo corpo sono schermate\ncontro le scosse."
