      descriptions:
        jp_kana:
          omega_ruby: "しんかいのほし　と　よばれる　ポケモンだ。\nしょくしゅの　なかの　バクテリアと　たいえきを\nかがくはんのうさせる　ことで　ひかりを　つくる。"
          alpha_sapphire: "よなかに　ふねから　くらい　うみを　のぞきこむと\nしんかいを　およぐ　ランターンの　ひかりが\nほしぞらの　ように　みえる　ことが　あるよ。"
        jp_kanji:
          omega_ruby: "深海の星　と　呼ばれる　ポケモンだ。\n触手の　中の　バクテリアと　体液を\n科学反応させる　ことで　光を　つくる。"
          alpha_sapphire: "夜中に　船から　暗い　海を　のぞき込むと\n深海を　泳ぐ　ランターンの　光が\n星空の　ように　見える　ことが　あるよ。"
        en:
          omega_ruby: "Lanturn is nicknamed “the deep-sea star” for its illuminated\nantenna. This Pokémon produces light by causing a chemical\nreaction between bacteria and its bodily fluids inside\nthe antenna."
          alpha_sapphire: "Lanturn is known to emit light. If you peer down into the dark\nsea from a ship at night, you can sometimes see this\nPokémon’s light rising from the depths where it swims. It gives\nthe sea an appearance of a starlit night."
        fr:
          omega_ruby: "On surnomme Lanturn « l’étoile des profondeurs » à cause de\nson antenne lumineuse. Ce Pokémon produit de la lumière\nen provoquant une réaction chimique entre des bactéries\net les fluides corporels de son antenne."
          alpha_sapphire: "On sait que Lanturn émet de la lumière. Si on regarde\nattentivement la mer de nuit à partir d’un bateau, on peut voir\nla lumière générée par ce Pokémon éclairer les profondeurs.\nCela donne à la mer l’apparence d’un ciel étoilé."
        it:
          omega_ruby: "Lanturn è detto anche “Stella degli abissi” per la sua\nantenna-lanterna. Genera la luce grazie a una reazione\nchimica tra i batteri e i fluidi corporei all’interno\ndell’antenna stessa."
          alpha_sapphire: "Lanturn emette una luce intensa. Osservando il mare da\nun’imbarcazione, di notte, è possibile scorgere la sua luce\nrisalire dagli abissi dov’è solito nuotare. Il mare assume\nl’aspetto d’un cielo stellato."
        de:
          omega_ruby: "Lanturn wird auch „Tiefseestern“ genannt, da es eine\nleuchtende Antenne besitzt. Dieses Pokémon erzeugt Licht,\nindem es in der Antenne eine chemische Reaktion zwischen\nBakterien und seinen Körperflüssigkeiten erzeugt."
          alpha_sapphire: "Lanturn strahlt Licht ab. Wenn du nachts aufs dunkle Meer\nhinausblickst, kannst du vielleicht das Licht dieses Pokémon\naus der Tiefe, in der es schwimmt, heraufschimmern sehen.\nEs lässt das Meer wie eine sternklare Nacht wirken."
        es:
          omega_ruby: "A Lanturn lo llaman la Estrella del Fondo del Mar por la antena\niluminada que tiene. Este Pokémon produce luz creando una\nreacción química entre una bacteria y los fluidos corporales de\nla antena."
          alpha_sapphire: "Todos saben que Lanturn emite luz. Si echas un ojo al mar\ndesde un barco en una noche cerrada, quizás veas su luz a\ntravés de las aguas, brillando desde lo más profundo, por\ndonde suele nadar. Con él, el mar parece un cielo estrellado."
        ko:
          omega_ruby: "심해의 별이라 불리는 포켓몬이다.\n촉수 안의 박테리아와 체액을\n화학 반응시켜서 빛을 만든다."
          alpha_sapphire: "밤중에 배에서 어두운 바다를 들여다보면\n심해를 헤엄치는 랜턴의 빛이\n별이 총총한 하늘처럼 보이는 일이 있다."
