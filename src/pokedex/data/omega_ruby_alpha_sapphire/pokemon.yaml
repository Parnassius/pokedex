      descriptions:
        jp_kana:
          omega_ruby: "いつも　なかまを　おうえんしている　ポケモン。\nなかまが　がんばると　からだを　ショートさせて\nパチパチと　ひばなの　おとを　たてて　よろこぶ。"
          alpha_sapphire: "なかまを　おうえんする　ときは　ぜんしんから\nでんきの　ひばなを　だして　パチパチ　ひかる。\nなかまが　まけると　おおごえで　ないてしまう。"
        jp_kanji:
          omega_ruby: "いつも　仲間を　応援している　ポケモン。\n仲間が　頑張ると　体を　ショートさせて\nパチパチと　火花の　音を　立てて　喜ぶ。"
          alpha_sapphire: "仲間を　応援する　ときは　全身から\n電気の　火花を　出して　パチパチ　光る。\n仲間が　負けると　大声で　泣いてしまう。"
        en:
          omega_ruby: "Plusle always acts as a cheerleader for its partners.\nWhenever a teammate puts out a good effort in battle, this\nPokémon shorts out its body to create the crackling noises of\nsparks to show its joy."
          alpha_sapphire: "When Plusle is cheering on its partner, it flashes with electric\nsparks from all over its body. If its partner loses, this Pokémon\ncries loudly."
        fr:
          omega_ruby: "Posipi sert de supporter à ses partenaires. Chaque fois qu’un\nmembre de son équipe fait une belle action dans un combat,\nce Pokémon court-circuite son corps et libère des étincelles\npour montrer sa joie."
          alpha_sapphire: "Quand Posipi veut encourager son partenaire, des étincelles\njaillissent un peu partout de son corps. Si son partenaire perd,\nce Pokémon pleure à chaudes larmes."
        it:
          omega_ruby: "Plusle agisce sempre da mascotte del gruppo. Ogni volta\nche un suo compagno ottiene buoni risultati nella lotta,\nPlusle crea un cortocircuito per provocare l’allegro\nscoppiettio delle scintille e dimostrare la sua gioia."
          alpha_sapphire: "Quando Plusle si esibisce per rallegrare i suoi compagni,\nemana vivaci scintille elettriche da tutto il corpo.\nSe la sua squadra perde, piange rumorosamente."
        de:
          omega_ruby: "Plusle dient seinen Artgenossen als Cheerleader. Wenn ein\nTeamkamerad im Kampf erfolgreich ist, erzeugt es das\nprasselnde Geräusch von Funken, um so seine Freude zu\nzeigen."
          alpha_sapphire: "Wenn Plusle seinen Partner anfeuert, sprüht es Funken\naus seinem Körper. Wenn sein Partner verliert, brüllt dieses\nPokémon laut."
        es:
          omega_ruby: "Plusle siempre anima a sus compañeros. Cuando algún\nmiembro de su grupo hace un gran esfuerzo en combate,\ncausa un cortocircuito en su interior para mostrar con el\nchisporroteo su alegría."
          alpha_sapphire: "Cuando Plusle está animando a su compañero, resplandece y\nprovoca un chisporroteo que le rodea todo el cuerpo. Si su\ncompañero pierde, se pone a chillar a voz en grito."
        ko:
          omega_ruby: "항상 동료를 응원하고 있는 포켓몬이다.\n동료가 힘을 내면 몸을 합선시켜\n타다닥 불꽃 소리를 내며 기뻐한다."
          alpha_sapphire: "동료를 응원할 때는 온몸에서\n전기 불꽃을 내 타다닥 빛난다.\n동료가 지면 큰 소리로 운다."
