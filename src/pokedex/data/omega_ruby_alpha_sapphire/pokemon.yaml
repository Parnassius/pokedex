          alpha_sapphire: "かんそうした　くうきを　このむ。\nすいぶんを　ちょうせつ　するときに\nだす　みずが　なみだに　みえる。"
        jp_kanji:
          omega_ruby: "乾燥した　場所を　好む。\n目から　水を　出して\n体の　水分を　調節する。"
          alpha_sapphire: "乾燥した　空気を　好む。\n水分を　調節　するときに\n出す　水が　涙に　見える。"
        en:
          omega_ruby: "It prefers arid environments. It leaks water from its\neyes to adjust its body’s fluid levels."
          alpha_sapphire: "It prefers an arid atmosphere. It leaks water that\nlooks like tears when adjusting its moisture level."
        fr:
          omega_ruby: "Il préfère les sols arides. Il évacue l’eau par ses yeux\npour réguler ses fluides corporels."
          alpha_sapphire: "Adepte des climats secs, il régule son humidité en laissant\ncouler ce qui ressemble à des larmes."
        it:
          omega_ruby: "Preferisce le terre aride. Rilascia acqua dagli occhi per\nregolare il livello dei suoi fluidi corporei."
          alpha_sapphire: "Ama i luoghi aridi. Quando regola l’umidità del corpo sembra\nche pianga."
        de:
          omega_ruby: "Es bevorzugt trockene Gebiete. Es gibt über die Augen\nWasser ab, um den Wasserhaushalt zu regulieren."
          alpha_sapphire: "Mag es trocken. Gleicht es seinen Wasserhaushalt aus,\nentweicht ihm Wasser, das wie Tränen geformt ist."
        es:
          omega_ruby: "Prefiere entornos áridos. Sus ojos expulsan agua para ajustar\nlos niveles de fluido corporal."
          alpha_sapphire: "Prefiere entornos áridos. Sus ojos expulsan agua para ajustar\nsus niveles de hidratación corporal."
        ko:
          omega_ruby: "건조한 장소를 좋아한다.\n눈에서 물을 내어 몸의\n수분을 조절한다."
          alpha_sapphire: "건조한 공기를 좋아한다.\n수분을 조절할 때에 내는 물이\n눈물처럼 보인다."
