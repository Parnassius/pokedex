        - ghost
      egg_groups:
        - mineral
      abilities:
        - stance_change
      descriptions:
        jp_kana:
          omega_ruby: "れきだいの　おうが　つれていた。\nれいりょくで　ひとや　ポケモンの\nこころを　あやつり　したがわせる。"
          alpha_sapphire: "おうの　そしつを　もつ　にんげんを\nみぬくらしい。みとめられた　ひとは\nやがて　おうになると　いわれている。"
        jp_kanji:
          omega_ruby: "歴代の　王が　連れていた。\n霊力で　人や　ポケモンの\n心を　操り　従わせる。"
          alpha_sapphire: "王の　素質を　持つ　人間を\n見抜くらしい。認められた　人は\nやがて　王になると　言われている。"
        en:
          omega_ruby: "Generations of kings were attended by these\nPokémon, which used their spectral power to\nmanipulate and control people and Pokémon."
          alpha_sapphire: "Apparently, it can detect the innate qualities\nof leadership. According to legend, whoever it\nrecognizes is destined to become king."
        fr:
          omega_ruby: "Ils ont fait le bonheur de générations de rois. Leurs pouvoirs\npsychiques leur permettent de contrôler hommes et Pokémon."
          alpha_sapphire: "Il peut déceler les qualités régaliennes dans les âmes\nhumaines. On raconte que celui ou celle qui obtient\nsa faveur deviendra à coup sûr roi ou reine."
        it:
          omega_ruby: "Ha accompagnato generazioni di re. È in grado di controllare\ne manipolare esseri umani e Pokémon col suo potere spettrale."
          alpha_sapphire: "Si dice che sia in grado di riconoscere chi possiede le\nqualità per diventare re e che le persone da lui indicate\nsiano effettivamente destinate al trono."
        de:
          omega_ruby: "Generationen von Königen hatten dieses Pokémon an ihrer\nSeite. Mit seiner mysteriösen Kraft kann es Menschen und\nPokémon gleichermaßen kontrollieren."
          alpha_sapphire: "Angeblich erkennt es jene Menschen, die Potenzial zum\nHerrscher haben. Es heißt, von ihm anerkannte Personen\nseien bald darauf Könige geworden."
        es:
          omega_ruby: "Han permanecido junto a estirpes de reyes durante\ngeneraciones. Mediante su poder espectral pueden controlar\na humanos y a Pokémon."
          alpha_sapphire: "Al parecer, puede intuir si un humano tiene madera de rey.\nSegún se dice, las personas que obtuvieron su reconocimiento\nacabaron siendo reyes."
        ko:
          omega_ruby: "역대 왕들이 데리고 있었다.\n영험한 힘으로 사람이나 포켓몬의\n마음을 조종하여 복종하게 한다."
          alpha_sapphire: "왕의 기질을 가진 인간을\n간파하는 듯하다. 인정받은 자는\n이윽고 왕이 된다고 한다."
