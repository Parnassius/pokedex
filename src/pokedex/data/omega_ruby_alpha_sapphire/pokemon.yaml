          alpha_sapphire: "なわで　しばった　たいりくを\nひっぱって　うごかしたという\nでんせつが　のこされている。"
        jp_kanji:
          omega_ruby: "特殊な　氷山や　岩石　マグマから\n自分の　姿に　似た　ポケモンを\nつくったと　言われる。"
          alpha_sapphire: "縄で　縛った　大陸を\n引っ張って　動かしたという\n伝説が　残されている。"
        en:
          omega_ruby: "It is said to have made Pokémon that look like\nitself from a special ice mountain, rocks,\nand magma."
          alpha_sapphire: "There is an enduring legend that states this\nPokémon towed continents with ropes."
        fr:
          omega_ruby: "On dit qu’il a créé des Pokémon à son image à partir de glace,\nde roche et de magma."
          alpha_sapphire: "Une légende tenace veut que ce Pokémon ait traîné\nles continents en les attachant à des cordes."
        it:
          omega_ruby: "Si dice che abbia creato dei Pokémon simili a sé usando\nuna montagna ghiacciata, rocce e magma."
          alpha_sapphire: "Una leggenda narra che questo Pokémon abbia trainato\ni continenti con delle funi."
        de:
          omega_ruby: "Man sagt, es habe Pokémon aus einem Eisberg, Felsen und\nMagma nach seinem Abbild geschaffen."
          alpha_sapphire: "Es gibt eine Legende, wonach dieses Pokémon die Kontinente\nmit einem Seil gezogen hat."
        es:
          omega_ruby: "Se dice que usó rocas, magma y un hielo especial de montaña\npara crear Pokémon con su aspecto."
          alpha_sapphire: "Una antigua leyenda afirma que este Pokémon arrastraba\ncontinentes con cuerdas."
        ko:
          omega_ruby: "특수한 빙산이나 암석,\n마그마에서 자신의 모습과 닮은\n포켓몬을 만들었다고 전해진다."
          alpha_sapphire: "밧줄로 묶은 대륙을\n당겨서 움직였다고 하는\n전설이 남아 있다."
