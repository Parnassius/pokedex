        jp_kana:
          omega_ruby: "ひとなつっこい　せいかく。うつくしい\nさえずりと　おばねを　ふる　うごきで\nなかまに　あいずを　おくる。"
          alpha_sapphire: "さえずる　こえは　うつくしいが\nなわばりに　はいった　あいては\nようしゃしない　あらあらしさだ。"
        jp_kanji:
          omega_ruby: "人懐っこい　性格。美しい　さえずりと\n尾羽を　振る　動きで\n仲間に　合図を　送る。"
          alpha_sapphire: "さえずる　声は　美しいが\n縄張りに　入った　相手は\n容赦しない　荒々しさだ。"
        en:
          omega_ruby: "These friendly Pokémon send signals\nto one another with beautiful chirps\nand tail-feather movements."
          alpha_sapphire: "Despite the beauty of its lilting voice, it’s\nmerciless to intruders that enter its territory."
        fr:
          omega_ruby: "Peu farouche, il communique avec ses congénères\npar un doux gazouillis et par des signaux de la queue."
          alpha_sapphire: "Son chant est harmonieux, mais trompeur !\nLes ennemis qui pénètrent sur son territoire se\nretrouvent confrontés à un déluge de violence."
        it:
          omega_ruby: "Ha una natura amichevole. Comunica con i suoi simili tramite\nmeravigliosi cinguettii e movimenti delle penne della coda."
          alpha_sapphire: "Cinguetta in modo meraviglioso, ma diventa estremamente\naggressivo se un nemico invade il suo territorio."
        de:
          omega_ruby: "Ein sehr zutrauliches Pokémon. Durch Zwitschern und\nBewegen der Schwanzfedern sendet es Signale an seine\nGefährten."
          alpha_sapphire: "Sein Zwitschern ist wunderschön, aber wenn Gegner sein\nRevier betreten, kennt es keine Gnade."
        es:
          omega_ruby: "Es muy amigable y se comunica con sus aliados mediante\nmelodiosos gorjeos y el movimiento de su cola y sus gráciles\nalas."
          alpha_sapphire: "Su melodioso gorjeo lo dota de una gran belleza, pero\nadopta una actitud agresiva y despiadada hacia cualquiera\nque ose invadir su territorio."
        ko:
          omega_ruby: "사람을 잘 따르는 성격이다. 아름다운\n지저귐과 꽁지를 흔드는 움직임으로\n동료에게 신호를 보낸다."
          alpha_sapphire: "지저귀는 소리는 아름답지만\n영역에 들어온 상대를\n용서하지 않는 난폭한 성격이다."
