      descriptions:
        jp_kana:
          omega_ruby: "さばくで　せいかつする。たいようの\nひかりを　あびて　はつでんすれば\nエサを　たべなくても　へいきなのだ。"
          alpha_sapphire: "あたまの　りょうわきの　ひだには\nたいようの　ひかりを　あびると\nはつでんする　さいぼうが　あるのだ。"
        jp_kanji:
          omega_ruby: "砂漠で　生活する。\n太陽の　光を　浴びて　発電すれば\nエサを　食べなくても　平気なのだ。"
          alpha_sapphire: "頭の　両わきの　ひだには\n太陽の　光を　浴びると\n発電する　細胞が　あるのだ。"
        en:
          omega_ruby: "They make their home in deserts. They can\ngenerate their energy from basking in the sun,\nso eating food is not a requirement."
          alpha_sapphire: "The frills on either side of its head have cells\nthat generate electricity when exposed to sunlight."
        fr:
          omega_ruby: "Ce Pokémon vit dans le désert. Il n’a pas besoin de se nourrir,\ncar il est capable d’absorber l’énergie du soleil."
          alpha_sapphire: "Les plis de peau de chaque côté de sa tête sont dotés\nde cellules produisant de l’électricité quand elles sont\nexposées à la lumière du soleil."
        it:
          omega_ruby: "Vive nei deserti. Può produrre energia elettrica sfruttando\nla luce solare e, grazie a essa, può sopravvivere anche\nsenza mangiare."
          alpha_sapphire: "Le pieghe ai due lati della testa contengono cellule in grado\ndi convertire la luce solare in energia elettrica."
        de:
          omega_ruby: "Es ist in der Wüste zu Hause und wandelt die Energie der\nSonne in Körperkraft um, wodurch es auch ohne Nahrung\nauskommt."
          alpha_sapphire: "Die Zellen der Hautlappen, die sich beidseitig an seinem Kopf\nbefinden, erzeugen Strom, wenn sie von Sonnenstrahlen\nbeschienen werden."
        es:
          omega_ruby: "Habita en los desiertos y, cuando toma el sol, acumula\nenergía, lo que le permite vivir sin la necesidad de ingerir\nalimentos."
          alpha_sapphire: "Bajo los pliegues situados a ambos lados de la cabeza\nresiden células que, al exponerse a la luz del sol, son\ncapaces de generar electricidad."
        ko:
          omega_ruby: "사막에서 생활한다. 태양의\n빛을 쬐고 발전하면\n먹이를 먹지 않아도 괜찮다."
          alpha_sapphire: "머리의 양측 주름에는\n태양의 빛을 쐬면\n발전하는 세포가 있다."
heliolisk:
  species_id: 695
  names:
    jp_kana: エレザード
    jp_kanji: エレザード
