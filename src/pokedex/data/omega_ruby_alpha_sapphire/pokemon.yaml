      descriptions:
        jp_kana:
          omega_ruby: "はっぱを　かみきり　くちから　だす\nねんちゃくいとで　ぬいあわせて\nじぶんで　ふくを　つくる　ポケモン。"
          alpha_sapphire: "はっぱから　ふくを　つくるので\nファッションデザイナーから\nマスコットとして　にんきがある。"
        jp_kanji:
          omega_ruby: "葉っぱを　かみ切り　口から　出す\n粘着糸で　縫い合わせる。\n自分で　服を　作る　ポケモン。"
          alpha_sapphire: "葉っぱから　服を　つくるので\nファッションデザイナーから\nマスコットとして　人気がある。"
        en:
          omega_ruby: "This Pokémon makes clothes for itself. It chews up\nleaves and sews them with sticky thread extruded\nfrom its mouth."
          alpha_sapphire: "Since this Pokémon makes its own clothes out of\nleaves, it is a popular mascot for fashion designers."
        fr:
          omega_ruby: "Il fait des vêtements en découpant des feuilles et en les\ncousant avec le fil adhésif qu’il sécrète par la bouche."
          alpha_sapphire: "La mascotte des créateurs de mode. Il découpe ses vêtements\ndans les feuilles qu’il trouve."
        it:
          omega_ruby: "Si prepara da sé i vestiti, tagliando le foglie e usando i fili\nviscosi che secerne dalla bocca per cucirli."
          alpha_sapphire: "Taglia le foglie per farne vestiti. Per questo motivo è la\nmascotte preferita di molti stilisti."
        de:
          omega_ruby: "Schneidert sich ein Kleid, indem es sich Blätter zurechtbeißt\nund sie mit Klebefäden aus seinem Mund zusammennäht."
          alpha_sapphire: "Unter Modeschöpfern gilt es als beliebtes Maskottchen,\nda es sich aus Blättern Kleidchen schneidert."
        es:
          omega_ruby: "Recorta hojas y las teje con el líquido viscoso que segrega\npor la boca para hacerse su propia ropa."
          alpha_sapphire: "Usa hojas como material para fabricar su propia ropa, por lo\nque los diseñadores más famosos los tienen como mascota."
        ko:
          omega_ruby: "잎사귀를 물어뜯어\n입에서 뱉어낸 점착실로 꿰맨다.\n스스로 옷을 만드는 포켓몬이다."
          alpha_sapphire: "잎사귀로 옷을 만들기 때문에\n패션 디자이너에게\n마스코트로 인기가 있다."
swadloon:
  species_id: 541
  names:
    jp_kana: クルマユ
    jp_kanji: クルマユ
    en: Swadloon
    fr: Couverdure
    it: Swadloon
    de: Folikon
    es: Swadloon
    ko: 두르쿤
  forms:
    swadloon:
      form_id: 0
      base_stats:
        hp: 55
        attack: 63
        defense: 90
        special_attack: 50
        special_defense: 80
        speed: 42
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
