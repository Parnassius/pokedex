          omega_ruby: "Ariados tiene unas patas con forma de garfio que le permiten\ncorrer por techos y superficies verticales. Este Pokémon\noprime al rival con una tela de araña fina y resistente."
          alpha_sapphire: "Ariados tiene unas patas con forma de garfio que le permiten\ncorrer por techos y superficies verticales. Este Pokémon\noprime al rival con una tela de araña fina y resistente."
        ko:
          omega_ruby: "발끝에는 작은 갈고리발톱이 있어서\n천장이나 수직인 벽도 걸을 수 있다.\n가늘고 튼튼한 실로 적을 조른다."
          alpha_sapphire: "발끝에는 작은 갈고리발톱이 있어서\n천장이나 수직인 벽도 걸을 수 있다.\n가늘고 튼튼한 실로 적을 조른다."
