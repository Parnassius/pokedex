        jp_kana:
          omega_ruby: "じょうしきの　つうようしない\nこのよの　うらがわにあると　いわれる\nやぶれたせかいに　せいそくする。"
          alpha_sapphire: "あばれもの　ゆえ　おいだされたが\nやぶれたせかいと　いわれる　ばしょで\nしずかに　もとのせかいを　みていた。"
        jp_kanji:
          omega_ruby: "常識の　通用しない\nこの世の　裏側にあると　言われる\n破れた世界に　生息する。"
          alpha_sapphire: "暴れ者　ゆえ　追い出されたが\n破れた世界と　言われる　場所で\n静かに　元の世界を　見ていた。"
        en:
          omega_ruby: "This Pokémon is said to live in a world on the\nreverse side of ours, where common knowledge is\ndistorted and strange."
          alpha_sapphire: "It was banished for its violence. It silently gazed\nupon the old world from the Distortion World."
        fr:
          omega_ruby: "Il vit dans le Monde Distorsion, un monde à l’opposé du nôtre\nqui échappe au sens commun."
          alpha_sapphire: "Sa grande violence lui a valu d’être banni. Il observe\nles hommes en silence depuis le Monde Distorsion."
        it:
          omega_ruby: "Vive nel Mondo Distorto che, sfidando l’ordine cosmico,\nsi trova sul lato opposto al nostro."
          alpha_sapphire: "È stato bandito per la sua violenza. Osserva il vecchio mondo\nin silenzio dal Mondo Distorto."
        de:
          omega_ruby: "Es lebt in einer Zerrwelt, die auf der Kehrseite der unseren\nliegt und die sich aller Logik entzieht."
          alpha_sapphire: "Es wurde aufgrund seines Verhaltens verbannt.\nAus der Zerrwelt schaut es auf die alte Welt."
        es:
          omega_ruby: "Vive en el Mundo Distorsión, un mundo opuesto al nuestro y\ncuyas leyes desafían el sentido común."
          alpha_sapphire: "Fue desterrado por su violencia. Observa el mundo en silencio\ndesde el Mundo Distorsión."
        ko:
          omega_ruby: "상식이 통하지 않는\n이 세상의 이면에 있다고 전해지는\n깨어진 세계에 서식한다."
          alpha_sapphire: "난폭하다는 이유로 쫓겨났지만\n깨어진 세계라고 전해지는 장소에서\n조용히 원래 세계를 보고 있었다."
