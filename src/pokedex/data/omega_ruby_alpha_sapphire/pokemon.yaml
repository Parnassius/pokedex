        - run_away
        - keen_eye
      hidden_ability: analytic
      descriptions:
        jp_kana:
          omega_ruby: "ほほの　ふくろに　エサを　ためこみ\nなんにちも　みはりを　つづける。\nしっぽで　なかまに　あいずする。"
          alpha_sapphire: "けいかいしんが　つよく　かならず\nいっぴきは　みはりを　しているのだが\nうしろからの　てきには　きづかない。"
        jp_kanji:
          omega_ruby: "ほほの　袋に　エサを　ためこみ\n何日も　見張りを　続ける。\n尻尾で　仲間に　合図する。"
          alpha_sapphire: "警戒心が　強く　かならず\n１匹は　見張りを　しているのだが\n後ろからの　敵には　気づかない。"
        en:
          omega_ruby: "Using food stored in cheek pouches, they can keep\nwatch for days. They use their tails to communicate\nwith others."
          alpha_sapphire: "Extremely cautious, one of them will always be on\nthe lookout, but it won’t notice a foe coming\nfrom behind."
        fr:
          omega_ruby: "Ils stockent à manger dans leurs bajoues et font le guet\nindéfiniment. Ils se font des signes en remuant la queue."
          alpha_sapphire: "Très prudent, il surveille attentivement son territoire,\nmais oublie souvent de regarder derrière lui."
        it:
          omega_ruby: "Immagazzina cibo nelle guance e monta la guardia per molti\ngiorni di seguito. Usa la coda per fare segnali ai compagni."
          alpha_sapphire: "Sono molto guardinghi e almeno uno del branco è sempre\ndi guardia. Non vedono però il nemico se li attacca da dietro."
        de:
          omega_ruby: "Hortet in seinen Backentaschen Futter, um tagelang Wache\nstehen zu können, und gibt Kameraden über seine Rute\nSignale."
          alpha_sapphire: "Eines dieser vorsichtigen Pokémon steht immer vor ihrem Bau\nWache. Nähert sich jedoch ein Feind von hinten, ist es aus."
        es:
          omega_ruby: "Almacena víveres en unas bolsas en sus mofletes y vigila\ndurante días. Hace señales con la cola a sus compañeros."
          alpha_sapphire: "Aunque es un Pokémon muy precavido y siempre hay uno\nmontando guardia, si se acercan por detrás, no se dará\ncuenta."
        ko:
          omega_ruby: "볼의 주머니에 먹이를 모아두고\n며칠이고 망보기를 계속한다.\n꼬리로 동료에게 신호한다."
          alpha_sapphire: "경계심이 강해서 반드시\n한 마리는 망을 보고 있으나\n뒤에서 오는 상대는 알아차리지 못한다."
watchog:
