          alpha_sapphire: "くさった　かいそうに　そっくり。\nてきの　めを　ごまかしながら\nしんかする　ちからを　たくわえる。"
        jp_kanji:
          omega_ruby: "腐った　海藻に　擬態する。\n気づかずに　近寄ってきた　獲物に\n毒液を　浴びせて　しとめる。"
          alpha_sapphire: "腐った　海藻に　そっくり。\n敵の　目を　ごまかしながら\n進化する　力を　蓄える。"
        en:
          omega_ruby: "Camouflaged as rotten kelp, they spray\nliquid poison on prey that approaches\nunawares and then finish it off."
          alpha_sapphire: "It looks just like rotten kelp. It hides from foes\nwhile storing up power for its evolution."
        fr:
          omega_ruby: "Il se cache parmi les algues en décomposition pour mieux\napprocher ses proies, qu’il achève en les aspergeant\nde poison."
          alpha_sapphire: "Sa ressemblance avec le varech pourri est confondante.\nIl se soustrait à l’attention de ses ennemis en attendant\nde pouvoir évoluer."
        it:
          omega_ruby: "Si mimetizza assumendo l’aspetto della vegetazione marina\nin decomposizione. Spruzza sulle prede ignare un liquido\nvelenoso per poi finirle."
          alpha_sapphire: "Il suo aspetto ricorda la vegetazione marina in\ndecomposizione. Sfugge ai nemici mimetizzandosi e resta\nnascosto accumulando energie per l’evoluzione."
        de:
          omega_ruby: "Als verfaulter Seetang getarnt, lauert es auf Beute und\nbespritzt alles und jeden, der sich ahnungslos nähert,\nmit flüssigem Gift, bevor es ihm den Rest gibt."
          alpha_sapphire: "Mit seinem an verfaulten Seetang erinnernden Aussehen\nführt es den Gegner in die Irre, während es selbst Energie\nzur Weiterentwicklung speichert."
        es:
          omega_ruby: "Adopta la apariencia de algas podridas y lanza un líquido\nvenenoso a las presas desprevenidas que pasan cerca."
          alpha_sapphire: "Es idéntico a un alga podrida. Mientras burla al enemigo,\nacumula energía para evolucionar."
        ko:
          omega_ruby: "썩은 해조로 위장한다.\n눈치채지 못하고 가까이 다가온\n사냥감에 독액을 끼얹어 잡는다."
          alpha_sapphire: "썩은 해조와 똑같이 생겼다.\n적의 눈을 속이며\n진화할 힘을 비축한다."
dragalge:
