        de:
          omega_ruby: "Aus Sarzenias Kopf ragt eine lange Ranke hervor, die es\nbewegt, als wäre sie ein kleines Lebewesen. Nähert sich\nahnungslose Beute dieser Falle, verschlingt Sarzenia\nsie im Ganzen."
          alpha_sapphire: "Aus Sarzenias Kopf ragt eine lange Ranke hervor, die es\nbewegt, als wäre sie ein kleines Lebewesen. Nähert sich\nahnungslose Beute dieser Falle, verschlingt Sarzenia\nsie im Ganzen."
        es:
          omega_ruby: "Victreebel tiene una enredadera que le sale de la cabeza y\nque agita a modo de señuelo para atraer a sus presas y así\nengullirlas por sorpresa cuando estas se aproximan incautas."
          alpha_sapphire: "Victreebel tiene una enredadera que le sale de la cabeza y\nque agita a modo de señuelo para atraer a sus presas y así\nengullirlas por sorpresa cuando estas se aproximan incautas."
        ko:
          omega_ruby: "머리에 달린 긴 덩굴을 작은\n생물처럼 움직여서 먹이를 유인한다.\n가까이 왔을 때 덥석 한 번에 삼킨다."
          alpha_sapphire: "머리에 달린 긴 덩굴을 작은\n생물처럼 움직여서 먹이를 유인한다.\n가까이 왔을 때 덥석 한 번에 삼킨다."
tentacool:
  species_id: 72
  names:
    jp_kana: メノクラゲ
    jp_kanji: メノクラゲ
    en: Tentacool
    fr: Tentacool
    it: Tentacool
    de: Tentacha
    es: Tentacool
    ko: 왕눈해
  forms:
    tentacool:
