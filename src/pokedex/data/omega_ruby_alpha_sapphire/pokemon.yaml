          alpha_sapphire: "おおきな　キバで　ひょうざんを　くだきながら\nひょうてんかの　うみを　およぎまわる。\nぶあつい　しぼうが　こうげきを　はねかえす。"
        jp_kanji:
          omega_ruby: "発達した　２本の　キバは　１０トンも　ある\n氷山を　一撃で　粉砕する。\n脂肪が　ぶ厚く　氷点下でも　平気。"
          alpha_sapphire: "大きな　キバで　氷山を　砕きながら\n氷点下の　海を　泳ぎ回る。\nぶ厚い　脂肪が　攻撃を　跳ね返す。"
        en:
          omega_ruby: "Walrein’s two massively developed tusks can totally shatter\nblocks of ice weighing 10 tons with one blow. This Pokémon’s\nthick coat of blubber insulates it from subzero temperatures."
          alpha_sapphire: "Walrein swims all over in frigid seawater while crushing\nicebergs with its grand, imposing tusks. Its thick layer of\nblubber makes enemy attacks bounce off harmlessly."
        fr:
          omega_ruby: "Les deux énormes défenses de Kaimorse peuvent détruire\nen un seul coup des blocs de glace de plus de 10 t.\nL’épaisse couche de graisse de ce Pokémon l’isole\nlorsque la température est en dessous de zéro."
          alpha_sapphire: "Kaimorse nage dans l’eau glacée et détruit les icebergs\nsur son passage à l’aide de ses grandes et impressionnantes\ndéfenses. Son épaisse couche de graisse lui permet de faire\nrebondir les attaques ennemies."
        it:
          omega_ruby: "Le due zanne molto sviluppate di Walrein sono in grado\ndi ridurre in polvere blocchi di ghiaccio del peso di\n100 quintali. Lo spesso strato di grasso attorno al corpo\nlo isola dalle rigide temperature polari."
          alpha_sapphire: "Walrein nuota in tutti i mari glaciali e frantuma gli iceberg con\nle sue enormi e potenti zanne. Lo spesso strato di grasso che\navvolge il suo corpo fa rimbalzare senza danno gli attacchi\nnemici."
        de:
          omega_ruby: "Walraisa hat zwei massive Stoßzähne, die mit einem Hieb\nEisblöcke zertrümmern können, die bis zu 10 t wiegen.\nEs besitzt eine dicke Speckschicht, die es vor eisigen\nTemperaturen schützt."
          alpha_sapphire: "Walraisa schwimmt in eiskaltem Meerwasser und zertrümmert\nEisberge mit seinen beeindruckenden Stoßzähnen. Eine dicke\nSchicht aus Walfischspeck lässt gegnerische Attacken von ihm\nabprallen."
        es:
          omega_ruby: "Walrein tiene unos exagerados colmillos con los que puede\nhacer añicos bloques de hielo de hasta 10 toneladas de una\nsola dentellada. La gruesa capa de grasa que lo recubre le\nprotege de temperaturas inferiores a 0 °C."
          alpha_sapphire: "Walrein va nadando por mares glaciales y destrozando\nicebergs con los enormes e imponentes colmillos que tiene.\nLa gruesa capa de grasa que tiene en el cuerpo hace que los\nataques enemigos reboten y no le hagan ningún daño."
        ko:
          omega_ruby: "발달한 2개의 이빨은 10톤이나 되는\n빙산을 일격에 분쇄한다.\n지방이 두꺼워서 영하의 기온에서도 끄떡없다."
          alpha_sapphire: "큰 이빨로 빙산을 깨트리며\n영하의 바다를 헤엄쳐 다닌다.\n두꺼운 지방이 공격을 튕겨낸다."
clamperl:
  species_id: 366
  names:
    jp_kana: パールル
    jp_kanji: パールル
    en: Clamperl
    fr: Coquiperl
    it: Clamperl
    de: Perlu
    es: Clamperl
    ko: 진주몽
  forms:
