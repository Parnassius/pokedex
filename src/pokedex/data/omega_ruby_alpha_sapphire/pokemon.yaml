        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - flying
        - dragon
      egg_groups:
        - flying
      abilities:
        - frisk
        - infiltrator
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          omega_ruby: "つきあかりすら　ない　やみよを　とび\nゆだんしている　えものを　おそう。\nくらやみの　たたかいでは　むてきだ。"
          alpha_sapphire: "みみから　はっする　ちょうおんぱで\nきょだいな　いわも　ふんさいする。\nくらやみに　まぎれて　おそいかかる。"
        jp_kanji:
          omega_ruby: "月明かりすら　ない　闇夜を　飛び\n油断している　獲物を　襲う。\n暗闇の　戦いでは　無敵だ。"
          alpha_sapphire: "耳から　発する　超音波で\n巨大な　岩も　粉砕する。\n暗闇に　紛れて　襲いかかる。"
        en:
          omega_ruby: "They fly around on moonless nights\nand attack careless prey. Nothing can\nbeat them in a battle in the dark."
          alpha_sapphire: "The ultrasonic waves it emits from its ears\ncan reduce a large boulder to pebbles.\nIt swoops out of the dark to attack."
        fr:
          omega_ruby: "Les nuits sans lune, il quadrille le ciel à la recherche\nd’une proie. Dans l’obscurité, aucun Pokémon ne peut\nrivaliser avec lui."
          alpha_sapphire: "Il peut littéralement pulvériser de gros rochers grâce\naux ultrasons émis par ses oreilles. Il surgit des ténèbres\npour attaquer par surprise."
        it:
          omega_ruby: "Vola nelle notti senza luna e attacca le prede approfittando\ndi ogni loro minima distrazione. Nell’oscurità è invincibile."
          alpha_sapphire: "Grazie agli ultrasuoni che emette dalle orecchie, è in grado\ndi sbriciolare enormi massi. Attacca col favore dell’oscurità."
        de:
          omega_ruby: "Es fliegt in finsterer, mondloser Nacht umher und macht\nJagd auf achtlose Beute. Ist bei Dunkelheit jedem Gegner\nüberlegen."
          alpha_sapphire: "Die Ultraschallwellen aus seinen Ohren zermalmen Felsen zu\nkleinen Kieseln. Greift stets im Schutz der Dunkelheit an."
        es:
          omega_ruby: "Surca el cielo nocturno cuando ni siquiera la luna brilla y ataca\na presas incautas. Es imbatible en combates que tienen lugar a\noscuras."
          alpha_sapphire: "Las ondas ultrasónicas que emite por las orejas pueden hacer\nañicos incluso rocas enormes. Aprovecha la oscuridad para\ndesplegar su ataque."
        ko:
          omega_ruby: "달빛조차 없는 어둠 속을 날며\n방심하고 있는 사냥감을 덮친다.\n어둠 속의 싸움에서는 무적이다."
          alpha_sapphire: "귀에서 발생하는 초음파로\n거대한 바위도 분쇄한다.\n어둠을 틈타 공격한다."
