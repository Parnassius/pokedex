          alpha_sapphire: "はがねの　こころと　からだを　もつ。\nひとが　ポケモンを　きずつけたとき\nなかまとともに　ひとを　こらしめた。"
        jp_kanji:
          omega_ruby: "鋼の　体と　心を　持つ。\nにらみつけるだけで　凶暴な\nポケモンも　従わせてしまう。"
          alpha_sapphire: "鋼の　心と　体を　持つ。\n人が　ポケモンを　傷つけたとき\n仲間とともに　人を　こらしめた。"
        en:
          omega_ruby: "It has a body and heart of steel. Its glare is\nsufficient to make even an unruly Pokémon obey it."
          alpha_sapphire: "It has a body and heart of steel. It worked with its\nallies to punish people when they hurt Pokémon."
        fr:
          omega_ruby: "Il possède un corps et un cœur de fer. Il peut mater\nles Pokémon les plus agressifs d’un simple regard."
          alpha_sapphire: "Un corps et un cœur en acier trempé, jadis au service\nde la défense des Pokémon blessés par les humains."
        it:
          omega_ruby: "Ha un corpo e uno spirito d’acciaio. Gli basta lo sguardo\nper farsi ubbidire anche dai Pokémon più feroci."
          alpha_sapphire: "Ha un corpo e uno spirito d’acciaio. È comparso con i suoi\ncompagni per punire coloro che un tempo ferirono i Pokémon."
        de:
          omega_ruby: "Sein Körper und sein Herz sind aus Stahl. Ein böser Blick\ngenügt und selbst die wildesten Pokémon unterwerfen sich\nihm."
          alpha_sapphire: "Sein Körper und Herz sind aus Stahl. Gemeinsam mit seinen\nGefährten bestrafte es alle Menschen, die Pokémon verletzen."
        es:
          omega_ruby: "Posee un cuerpo y un corazón de acero. Basta una mirada\nsuya para que Pokémon violentos le obedezcan."
          alpha_sapphire: "Posee cuerpo y alma de acero. Junto con sus compañeros,\ncastiga a aquellas personas que hacen daño a Pokémon."
        ko:
          omega_ruby: "강철의 몸과 마음을 지녔다.\n째려보기만 해도 난폭한\n포켓몬마저도 따르게 된다."
          alpha_sapphire: "강철의 마음과 몸을 지녔다.\n사람이 포켓몬을 상처 입혔을 때\n동료와 함께 사람을 벌했다."
terrakion:
  species_id: 639
  names:
