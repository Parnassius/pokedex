      types:
        - steel
        - rock
      egg_groups:
        - monster
      abilities:
        - sturdy
        - rock_head
      hidden_ability: heavy_metal
      held_items:
        rare: hard_stone
      descriptions:
        jp_kana:
          omega_ruby: "はがねの　からだを　つくるため　てっこうせきを\nやまから　ほりだして　たべているが　たまに\nはしや　レールを　たべてしまう　こまりものだ。"
          alpha_sapphire: "こうてつの　からだで　おもいっきり　ぶつかれば\nおおきな　ダンプカーも　いちげきで　バラバラだ。\nこわれた　ダンプカーを　むしゃむしゃ　たべるぞ。"
        jp_kanji:
          omega_ruby: "鋼の　体を　つくるため　鉄鉱石を\n山から　掘り出して　食べているが　たまに\n橋や　レールまで　食べてしまう　困りものだ。"
          alpha_sapphire: "鋼鉄の　体で　思いっきり　ぶつかれば\n大きな　ダンプカーも　一撃で　バラバラだ。\n壊れた　ダンプカーを　むしゃむしゃ　食べるぞ。"
        en:
          omega_ruby: "This Pokémon has a body of steel. To make its body, Aron\nfeeds on iron ore that it digs from mountains. Occasionally,\nit causes major trouble by eating bridges and rails."
          alpha_sapphire: "Aron has a body of steel. With one all-out charge, this\nPokémon can demolish even a heavy dump truck.\nThe destroyed dump truck then becomes a handy meal\nfor the Pokémon."
        fr:
          omega_ruby: "Ce Pokémon a un corps en acier. Pour constituer son corps,\nGalekid se nourrit de minerai de fer extrait des montagnes.\nDe temps en temps, il cause de nombreux dégâts en mangeant\ndes ponts ou des rails."
          alpha_sapphire: "Galekid a un corps d’acier. En une seule charge, ce Pokémon\npeut démolir un camion poids lourd. Le camion détruit devient\nensuite le repas de ce Pokémon."
        it:
          omega_ruby: "Il corpo di Aron è costituito d’acciaio. Per mantenerne\nla consistenza Aron si ciba di pepite di ferro rinvenute\nscavando in montagna. Talvolta crea enorme scompiglio\npoiché si nutre anche di ponti e ferrovie."
          alpha_sapphire: "Aron è dotato di un corpo d’acciaio. Con una sola potente\ncarica riesce a demolire anche un camion a rimorchio. Questo\ncostituisce poi un sano e ricco pasto per il Pokémon."
        de:
          omega_ruby: "Dieses Pokémon hat einen Körper aus Stahl. Stollunior ernährt\nsich von Eisenerz aus den Bergen. Zuweilen richtet es großen\nSchaden an, weil es Brücken und Bahngleise auffrisst."
          alpha_sapphire: "Stolluniors Körper besteht aus Stahl. Mit einem Schlag kann\ndieses Pokémon einen Schwerlasttransporter demolieren.\nDer Lastwagen stellt danach eine handliche Mahlzeit für\ndieses Pokémon dar."
        es:
          omega_ruby: "Este Pokémon tiene el cuerpo de acero. Para mantenerlo, se\nalimenta del hierro que saca de las montañas. A veces, causa\nverdaderos problemas, pues se come puentes y vías de tren."
          alpha_sapphire: "Aron tiene el cuerpo de acero. Con una carga hecha con toda\nla fuerza es capaz de demoler hasta un camión de basura y,\na continuación, comérselo."
        ko:
          omega_ruby: "강철 몸을 만들기 위해 철광석을\n산에서 채광해 먹지만 가끔\n다리나 레일을 먹어버리는 말썽꾸러기다."
          alpha_sapphire: "강철의 몸으로 힘껏 부딪치면\n큰 덤프트럭도 한 방에 엉망이 된다.\n부서진 덤프트럭을 우적우적 먹는다."
