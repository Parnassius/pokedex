          alpha_sapphire: "おなかの　ホタチで　たたかう。\nこうげきを　うけとめてから　すかさず\nきりつけて　はんげきするのだ。"
        jp_kanji:
          omega_ruby: "お腹に　できる　ホタチは\n戦うとき　だけでなく　硬い\n木の実を　割るときにも　使う。"
          alpha_sapphire: "お腹の　ホタチで　戦う。\n攻撃を　受け止めてから　すかさず\n切りつけて　反撃するのだ。"
        en:
          omega_ruby: "The scalchop on its stomach isn’t just used for\nbattle—it can be used to break open hard berries\nas well."
          alpha_sapphire: "It fights using the scalchop on its stomach.\nIn response to an attack, it retaliates immediately\nby slashing."
        fr:
          omega_ruby: "Le coupillage sur son ventre lui sert non seulement à\ncombattre, mais aussi à trancher les Baies très dures."
          alpha_sapphire: "Il combat avec le coupillage de son ventre. Il peut parer\nun assaut et immédiatement contre-attaquer."
        it:
          omega_ruby: "Non usa la conchiglia del suo ventre solo durante la lotta,\nma anche per tagliare a metà le bacche."
          alpha_sapphire: "Combatte con la conchiglia che ha sul ventre. Contrattacca\nprontamente dopo aver parato l’attacco avversario."
        de:
          omega_ruby: "Die Muschel an seinem Bauch dient ihm nicht nur als Waffe,\nsondern auch als Messer, mit dem es Beeren aufschneidet."
          alpha_sapphire: "Kämpft mit der Muschel auf seinem Bauch. Pariert es einen\nAngriff, schlägt es sofort mit einer Schnitt-Attacke zurück."
        es:
          omega_ruby: "La vieira de su ombligo no solo sirve como arma, sino también\ncomo instrumento para cortar las bayas que estén duras."
          alpha_sapphire: "Ataca con la vieira de su ombligo. En cuanto para un ataque,\npasa al contraataque sin dilación."
        ko:
          omega_ruby: "배에 생기는 가리비칼은\n싸울 때뿐 아니라 딱딱한\n나무열매를 쪼갤 때도 사용한다."
          alpha_sapphire: "배에 있는 가리비칼로 싸운다.\n공격을 막고 그 즉시\n베어 반격한다."
dewott:
  species_id: 502
  names:
    jp_kana: フタチマル
    jp_kanji: フタチマル
    en: Dewott
    fr: Mateloutre
    it: Dewott
    de: Zwottronin
    es: Dewott
    ko: 쌍검자비
  forms:
    dewott:
      form_id: 0
      base_stats:
        hp: 75
        attack: 75
        defense: 60
        special_attack: 83
        special_defense: 60
        speed: 60
      evs_yield:
