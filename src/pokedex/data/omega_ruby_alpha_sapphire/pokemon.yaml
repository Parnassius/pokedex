          alpha_sapphire: "いつもは　のんびり　野原を　駆けまわっているが\n一度　本気を　出すと　たてがみの　炎が\n燃えあがり　時速２４０キロで　走りだす。"
        en:
          omega_ruby: "Rapidash usually can be seen casually cantering in the\nfields and plains. However, when this Pokémon turns serious,\nits fiery manes flare and blaze as it gallops its way up to\n150 mph."
          alpha_sapphire: "Rapidash usually can be seen casually cantering in the fields\nand plains. However, when this Pokémon turns serious, its\nfiery manes flare and blaze as it gallops its way up to 150 mph."
        fr:
          omega_ruby: "On voit souvent Galopa trotter dans les champs et les plaines.\nCependant, lorsque ce Pokémon s’en donne la peine, il peut\ngaloper à plus de 240 km/h et sa crinière flamboyante\ns’embrase."
          alpha_sapphire: "On voit souvent Galopa trotter dans les champs et les plaines.\nCependant, lorsque ce Pokémon s’en donne la peine, il peut\ngaloper à plus de 240 km/h et sa crinière flamboyante\ns’embrase."
        it:
          omega_ruby: "Rapidash si vede comunemente galoppare in campagne\ne pianure. Quando si lancia a tutta velocità la sua criniera\ninfuocata brilla e arde mentre galoppa fino a 240 km/h."
          alpha_sapphire: "Rapidash si vede comunemente galoppare in campagne\ne pianure. Quando si lancia a tutta velocità la sua criniera\ninfuocata brilla e arde mentre galoppa fino a 240 km/h."
        de:
          omega_ruby: "Man kann Gallopa dabei beobachten, wie es lässig über Felder\nund Wiesen galoppiert. Wenn dieses Pokémon jedoch Ernst\nmacht, erreicht es bis zu 240 km/h. Dann beginnt seine Mähne\nzu lodern."
          alpha_sapphire: "Man kann Gallopa dabei beobachten, wie es fröhlich über\nFelder und Wiesen galoppiert. Wenn dieses Pokémon jedoch\nErnst macht, erreicht es bis zu 240 km/h. Dann beginnt seine\nMähne zu lodern."
        es:
          omega_ruby: "A Rapidash se le suele ver trotando sin rumbo fijo por los\ncampos y llanos. Cuando tiene que ir a algún sitio en concreto,\nse le aviva el fuego de las melenas y emprende el galope\nllameante llegando a los 240 km/h."
          alpha_sapphire: "A Rapidash se le suele ver trotando sin rumbo fijo por los\ncampos y llanos. Cuando tiene que ir a algún sitio en\nconcreto, se le aviva el fuego de las melenas y emprende\nel galope llameante llegando a los 240 km/h."
        ko:
          omega_ruby: "평상시는 느긋하게 들판을 뛰어다니지만\n한 번 마음먹으면 갈기의 불꽃을\n불태우며 시속 240km로 달린다."
