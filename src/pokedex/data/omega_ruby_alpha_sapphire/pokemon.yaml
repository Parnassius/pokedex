      descriptions:
        jp_kana:
          omega_ruby: "うみのギャングと　よばれ　おそれられている。\nおれても　すぐに　はえかわる　キバを　もち\nおおがたタンカーも　１ぴきで　バラバラに　する。"
          alpha_sapphire: "かいすいを　おしりの　あなから　ふきだして\nじそく１２０キロで　およぐことが　できる。\nながい　きょりを　およげないのが　じゃくてんだ。"
        jp_kanji:
          omega_ruby: "海のギャングと　呼ばれ　恐れられている。\n折れても　すぐに　生え変わる　キバを　持ち\n大型タンカーも　１匹で　バラバラに　する。"
          alpha_sapphire: "海水を　お尻の　穴から　吹き出して\n時速１２０キロで　泳ぐことが　できる。\n長い　距離を　泳げないのが　弱点だ。"
        en:
          omega_ruby: "Nicknamed “the bully of the sea,” Sharpedo is widely feared.\nIts cruel fangs grow back immediately if they snap off. Just one\nof these Pokémon can thoroughly tear apart a supertanker."
          alpha_sapphire: "Sharpedo can swim at speeds of up to 75 mph by jetting\nseawater out of its backside. This Pokémon’s drawback is its\ninability to swim long distances."
        fr:
          omega_ruby: "Surnommé le « tyran des mers », Sharpedo est craint\nde par le monde. Ses crocs menaçants repoussent\nlorsqu’ils se brisent. Un seul de ces Pokémon peut\ndétruire un pétrolier gros porteur."
          alpha_sapphire: "Sharpedo peut nager à plus de 120 km/h en propulsant de\nl’eau de mer par l’arrière de son corps. Ce Pokémon a un\npoint faible : il ne peut pas parcourir de longues distances."
        it:
          omega_ruby: "Soprannominato “Tiranno del mare”, Sharpedo è molto\ntemuto. Se perde qualcuno dei suoi temibili denti, questo\nricresce all’istante. Uno di questi Pokémon da solo\nriesce ad affondare una superpetroliera."
          alpha_sapphire: "Sharpedo riesce a nuotare fino alla velocità di 120 km/h,\nespellendo acqua di mare dalla parte posteriore del corpo\ncome un propulsore. La sua unica debolezza è la mancanza\ndi resistenza sulle lunghe distanze."
        de:
          omega_ruby: "Tohaido trägt den Spitznamen „Tyrann des Meeres“ und ist\nsehr gefürchtet. Seine grausamen Zähne wachsen sofort nach,\nwenn sie ausgebrochen sind. Es kann sogar einen Öltanker\nzerreißen."
          alpha_sapphire: "Tohaido kann bis zu 120 km/h schnell schwimmen, indem\nes Meerwasser aus seinem Hinterteil herausschießt. Dieses\nPokémon kann jedoch keine weiten Strecken zurücklegen."
        es:
          omega_ruby: "Conocido como el Terror de los Mares, Sharpedo es temido\npor todos. Si este Pokémon pierde los escalofriantes\ncolmillos que tiene, los recupera en breve. Basta con un\nSharpedo para destrozar un buque-cisterna."
          alpha_sapphire: "Sharpedo puede alcanzar nadando los 120 km/h agitando\nla aleta trasera y propulsándose por el agua. El punto flaco\nde este Pokémon es la imposibilidad que tiene de nadar\nlargas distancias."
        ko:
          omega_ruby: "바다의 건달이라 불리는 두려움의 대상이다.\n부러져도 바로 다시 나는 이빨이 있어서\n한 마리가 대형 유조선을 엉망으로 만든다."
          alpha_sapphire: "바닷물을 엉덩이의 구멍으로 뿜어내서\n시속 120km로 헤엄칠 수 있다.\n장거리를 헤엄칠 수 없는 것이 약점이다."
