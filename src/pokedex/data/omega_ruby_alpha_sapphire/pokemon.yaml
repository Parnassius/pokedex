      descriptions:
        jp_kana:
          omega_ruby: "あたまの　あかい　たまが　ひかるとき　はげしい\nちょうおんぱが　あたりに　はっしゃ　される。\nそのとき　かいめんが　はげしく　なみうつという。"
          alpha_sapphire: "じゆうに　のびちぢみする　しょくしゅで　えものを\nからめとり　もうどくを　あたえて　よわらせる。\nいっぺんに　８０ぴきの　えものを　つかまえるぞ。"
        jp_kanji:
          omega_ruby: "頭の　赤い　玉が　光るとき　激しい\n超音波が　あたりに　発射　される。\nそのとき　海面が　激しく　波打つという。"
          alpha_sapphire: "自由に　伸び縮みする　触手で　獲物を\n絡め取り　猛毒を　与えて　弱らせる。\nいっぺんに　８０匹の　獲物を　捕まえるぞ。"
        en:
          omega_ruby: "Tentacruel has large red orbs on its head. The orbs glow\nbefore lashing the vicinity with a harsh ultrasonic blast.\nThis Pokémon’s outburst creates rough waves around it."
          alpha_sapphire: "Tentacruel has tentacles that can be freely elongated\nand shortened at will. It ensnares prey with its tentacles\nand weakens the prey by dosing it with a harsh toxin.\nIt can catch up to 80 prey at the same time."
        fr:
          omega_ruby: "Tentacruel a deux gros globes sur la tête. Les globes\ns’illuminent lorsqu’il va envoyer un violent rayon d’ultrasons.\nLorsque ce Pokémon se déchaîne, il crée d’énormes vagues\nautour de lui."
          alpha_sapphire: "Les tentacules de Tentacruel peuvent s’allonger et se rétracter\nà volonté. Il serre sa proie dans ses tentacules et l’affaiblit\nen lui injectant une toxine. Il peut attraper jusqu’à 80 proies\nen même temps."
        it:
          omega_ruby: "Tentacruel ha due grandi sfere rosse sulla testa.\nLe sfere brillano prima di emettere potenti ultrasuoni.\nGli attacchi di questo Pokémon creano onde impetuose\nnei dintorni."
          alpha_sapphire: "Tentacruel è dotato di tentacoli che si allungano e accorciano\nin base alle sue esigenze. Intrappola la preda con i tentacoli\ne la indebolisce con un potente veleno. Riesce a catturare\nfino a 80 prede contemporaneamente."
        de:
          omega_ruby: "Tentoxa hat große, rote Kugeln auf seinem Kopf.\nSie glühen auf, bevor sie seine Gegner mit Ultraschall\nerschüttern. Ein Ausbruch dieses Pokémon erzeugt\nstarke Wellen in seiner Umgebung."
          alpha_sapphire: "Tentoxa besitzt Tentakel, die es jederzeit ausfahren und\neinziehen kann. Es fängt damit Beute und schwächt diese,\nindem es ihr ein starkes Gift verabreicht. Es kann bis zu\n80 Opfer gleichzeitig fangen."
        es:
          omega_ruby: "Tentacruel tiene unas enormes esferas rojas en la cabeza, que\nbrillan antes de lanzar una descarga ultrasónica a lo que le\nrodea. Este estallido crea unas olas tremendas a su alrededor."
          alpha_sapphire: "Tentacruel tiene unos tentáculos que puede alargar o acortar.\nLos usa para atrapar a su presa y debilitarla mediante una\nsustancia muy tóxica. Puede llegar a atrapar hasta a 80 presas\na la vez."
        ko:
          omega_ruby: "머리의 붉은 구슬이 반짝일 때 격렬한\n초음파가 주변에 발사된다.\n그때 바다가 격렬히 파도친다고 한다."
          alpha_sapphire: "자유롭게 늘었다 줄었다 하는 촉수로 먹이를\n휘감아 맹독을 주입해 약하게 만든다.\n한 번에 80마리의 먹이를 잡는다."
