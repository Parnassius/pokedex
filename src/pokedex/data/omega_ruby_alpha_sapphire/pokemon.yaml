        jp_kana:
          omega_ruby: "はげしい　きしょうの　もちぬし。\nあらぶると　たてがみから　かみなりを\nしほうはっぽうに　ほうでんする。"
          alpha_sapphire: "いなずまのような　しゅんぱつりょく。\nゼブライカが　ぜんそくりょくで\nはしると　らいめいが　ひびきわたる。"
        jp_kanji:
          omega_ruby: "激しい　気性の　持ち主。\n荒ぶると　たてがみから　雷を\n四方八方に　放電する。"
          alpha_sapphire: "稲妻のような　瞬発力。\nゼブライカが　全速力で　走ると\n雷鳴が　響きわたる。"
        en:
          omega_ruby: "When this ill-tempered Pokémon runs wild, it\nshoots lightning from its mane in all directions."
          alpha_sapphire: "They have lightning-like movements.\nWhen Zebstrika run at full speed, the sound of\nthunder reverberates."
        fr:
          omega_ruby: "De caractère violent, il envoie avec sa crinière des arcs\nélectriques de tous les côtés lorsqu’il se sent provoqué."
          alpha_sapphire: "Il réagit à la vitesse de l’éclair. Lorsqu’il est en plein galop,\non peut entendre le grondement du tonnerre."
        it:
          omega_ruby: "Ha un temperamento sanguigno. Quando si arrabbia dalla\ncriniera lancia saette in ogni direzione."
          alpha_sapphire: "È scattante come una saetta. Se corre alla massima velocità,\nsi sente un rimbombo di tuoni."
        de:
          omega_ruby: "Ein stürmischer Geselle. Wenn es wütend ist, feuert es über\nseine Mähne in alle Richtungen Stromsalven ab."
          alpha_sapphire: "Es ist explosiv wie ein Blitz. Galoppiert es mit voller\nGeschwindigkeit drauflos, kann man Donnerhall vernehmen."
        es:
          omega_ruby: "Es un Pokémon con mucho temperamento. Cuando se enoja,\nlanza rayos desde su crin en todas direcciones."
          alpha_sapphire: "Su velocidad se asemeja a la de un rayo. Si corre al máximo,\nse dejan oír truenos por doquier."
        ko:
          omega_ruby: "격렬한 기질의 소유자.\n날뛰면 갈기에서 번개를\n사방팔방으로 방전한다."
          alpha_sapphire: "천둥번개 같은 순발력을 가지고 있다.\n제브라이카가 전속력으로 달리면\n천둥소리가 울려 퍼진다."
roggenrola:
