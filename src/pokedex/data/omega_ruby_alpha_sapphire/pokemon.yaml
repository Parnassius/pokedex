        fr:
          omega_ruby: "Feuforêve effraie les gens en poussant un cri à faire froid\ndans le dos, une sorte de lamentation. Ce Pokémon utilise\nses sphères rouges pour absorber les sentiments de terreur\nde ses ennemis et s’en nourrir."
          alpha_sapphire: "Feuforêve effraie les gens en poussant un cri à faire froid\ndans le dos, une sorte de lamentation. Ce Pokémon utilise\nses sphères rouges pour absorber les sentiments de terreur\nde ses ennemis et s’en nourrir."
        it:
          omega_ruby: "Misdreavus terrorizza le persone con un singhiozzo\nraccapricciante. Pare usi le sue sfere rosse per assorbire\nla paura dei nemici e cibarsene."
          alpha_sapphire: "Misdreavus terrorizza le persone con un singhiozzo\nraccapricciante. Pare usi le sue sfere rosse per assorbire\nla paura dei nemici e cibarsene."
        de:
          omega_ruby: "Traunfugil erschreckt Menschen mit einem markerschütternden\nSchrei. Dieses Pokémon verwendet seine roten Kraftfelder\ndazu, die Ängste seiner Feinde aufzunehmen und sie in\nNahrung umzuwandeln."
          alpha_sapphire: "Traunfugil erschreckt Menschen mit einem markerschütternden\nSchrei. Dieses Pokémon verwendet seine roten Kraftfelder\ndazu, die Ängste seiner Feinde aufzunehmen und sie in\nNahrung umzuwandeln."
        es:
          omega_ruby: "Misdreavus asusta a la gente con un chillido escalofriante y\nsollozante. Y, al parecer, usa las esferas rojas para absorber\nlos sentimientos de miedo de los enemigos y usarlos como\nalimento."
