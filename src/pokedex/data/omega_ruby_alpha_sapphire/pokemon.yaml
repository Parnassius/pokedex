          alpha_sapphire: "どうたいが　こどもたちの　すあなに\nなっている。ミツハニーの　あつめた\nミツで　こどもたちを　そだてる。"
        jp_kanji:
          omega_ruby: "胴体は　子供たちの　巣穴。\nいろんな　フェロモンを　だして\n子供たちを　自由に　操る。"
          alpha_sapphire: "胴体が　子供たちの　巣穴に\nなっている。ミツハニーの　集めた\nミツで　子供たちを　育てる。"
        en:
          omega_ruby: "It houses its colony in cells in its body and releases\nvarious pheromones to make those grubs do its bidding."
          alpha_sapphire: "Its abdomen is a honeycomb for grubs. It raises its\ngrubs on honey collected by Combee."
        fr:
          omega_ruby: "Son abdomen abrite ses petits. Ce Pokémon utilise\ndes phéromones pour leur donner des ordres."
          alpha_sapphire: "Son abdomen est un rayon où vivent ses larves, élevées avec\nle nectar récolté par Apitrini."
        it:
          omega_ruby: "Nell’addome ospita la sua progenie, sulla quale esercita\nun controllo assoluto tramite i feromoni che rilascia."
          alpha_sapphire: "Il suo addome funge da rifugio per le larve, che nutre con il\nnettare raccolto da Combee."
        de:
          omega_ruby: "Es beherbergt Jung-Pokémon in seinem Rumpf, die es mithilfe\nvon verschiedenen Pheromonen frei herumkommandieren kann."
          alpha_sapphire: "Sein Bauch ist die Wabe für die Larven. Es füttert\nseine Larven mit dem Honig, den Wadribie sammelt."
        es:
          omega_ruby: "Cría larvas en los panales de su cuerpo. Segrega diversas\nferomonas de su cuerpo con las cuales controla a sus crías."
          alpha_sapphire: "Su abdomen es un panal de larvas que alimenta con la miel\nrecogida por Combee."
        ko:
          omega_ruby: "몸통은 새끼들의 둥지다.\n여러 페로몬을 내어\n새끼들을 자유롭게 조종한다."
          alpha_sapphire: "몸통이 새끼들의 둥지로\n되어 있다. 세꿀버리가 모은\n꿀로 새끼들을 키운다."
