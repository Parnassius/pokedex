          omega_ruby: "うっそうと　しげった　もりに　すむ　ポケモン。\nたまに　もりを　でては　ひとを　おどろかせる。\nながい　はなを　つかまれるのは　だいきらい。"
          alpha_sapphire: "あたまの　はっぱを　ぬいて　くさぶえを　つくる。\nコノハナが　かなでる　くさぶえの　ねいろは\nもりで　まよった　ひとを　ふあんにさせる。"
        jp_kanji:
          omega_ruby: "うっそうと　茂った　森に　すむ　ポケモン。\nたまに　森を　出ては　人を　驚かせる。\n長い　鼻を　つかまれるのは　大嫌い。"
          alpha_sapphire: "頭の　葉っぱを　抜いて　草笛を　つくる。\nコノハナが　奏でる　草笛の　音色は\n森で　迷った　人を　不安にさせる。"
        en:
          omega_ruby: "Nuzleaf live in densely overgrown forests. They occasionally\nventure out of the forest to startle people. This Pokémon\ndislikes having its long nose pinched."
          alpha_sapphire: "This Pokémon pulls out the leaf on its head and makes a flute\nwith it. The sound of Nuzleaf’s flute strikes fear and uncertainty\nin the hearts of people lost in a forest."
        fr:
          omega_ruby: "Les Pifeuil vivent dans des forêts très densément boisées.\nIl leur arrive de sortir de la forêt pour faire peur aux gens.\nCe Pokémon déteste qu’on lui pince son grand nez."
          alpha_sapphire: "Ce Pokémon se sert de la feuille sur sa tête pour jouer\nde la flûte. Le son de la flûte de Pifeuil effraie et\ndécontenance les gens perdus en forêt."
        it:
          omega_ruby: "Nuzleaf vive in foreste molto fitte. A volte si avventura fuori\ndalla foresta per spaventare le persone. Questo Pokémon\nsi irrita molto se qualcuno tenta di pizzicargli il lungo naso."
          alpha_sapphire: "Nuzleaf crea una sorta di flauto con la foglia che ha sul capo.\nIl suono di questo flauto fa crescere la paura e l’incertezza\nnel cuore di coloro che si sono persi nella foresta."
        de:
          omega_ruby: "Blanas lebt in dichten Wäldern. Manchmal wagt es sich aus\ndem Wald heraus, um Menschen zu erschrecken. Dieses\nPokémon mag es überhaupt nicht, wenn man seine lange\nNase zwickt."
          alpha_sapphire: "Dieses Pokémon reißt das Blatt auf seinem Kopf heraus und\nbenutzt es als Flöte. Diese Geräusche jagen den Menschen,\ndie sich im Wald verirrt haben, Angst ein."
        es:
          omega_ruby: "Nuzleaf habita bosques muy poblados y, en ocasiones, se\natreve a salir para asustar a la gente. A este Pokémon no le\ngusta nada que le pellizquen la nariz."
          alpha_sapphire: "Nuzleaf saca la hoja que tiene en la cabeza y la usa como\nflauta. El sonido que emite infunde miedo e incertidumbre a\nquien se encuentre perdido por el bosque."
        ko:
          omega_ruby: "울창하게 우거진 숲에 사는 포켓몬이다.\n가끔 숲을 나와 사람들을 놀라게 한다.\n긴 코가 잡히는 걸 매우 싫어한다."
          alpha_sapphire: "머리의 잎사귀를 뽑아 풀피리를 만든다.\n잎새코가 연주하는 풀피리의 음색은\n숲에서 길을 잃은 사람을 불안하게 한다."
shiftry:
  species_id: 275
  names:
