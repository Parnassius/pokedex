        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: magician
      descriptions:
        jp_kana:
          omega_ruby: "きのえだを　しっぽに　さしている。\nしっぽの　けの　まさつねつで\nえだに　ひをつけて　たたかう。"
          alpha_sapphire: "きのえだを　しっぽから　ひきぬくとき\nまさつで　ちゃっか。えだの　ほのおを\nふって　なかまに　あいずを　おくる。"
        jp_kanji:
          omega_ruby: "木の枝を　尻尾に　挿している。\n尻尾の　毛の　摩擦熱で\n枝に　火をつけて　戦う。"
          alpha_sapphire: "木の枝を　尻尾から　引き抜くとき\n摩擦で　着火。枝の　炎を　振って\n仲間に　合図を　送る。"
        en:
          omega_ruby: "It has a twig stuck in its tail. With\nfriction from its tail fur, it sets the\ntwig on fire and launches into battle."
          alpha_sapphire: "When the twig is plucked from its tail,\nfriction sets the twig alight. The flame\nis used to send signals to its allies."
        fr:
          omega_ruby: "Il allume la branche plantée dans sa queue en la frottant\ncontre son pelage et s’en sert au combat."
          alpha_sapphire: "Quand il saisit la branche plantée dans sa queue, elle prend\nfeu par friction. Il peut communiquer avec ses congénères\nen agitant ce bâton enflammé."
        it:
          omega_ruby: "Incendia il ramo che ha infilato nella coda grazie allo\nsfregamento del pelo per poi lanciarsi nella lotta."
          alpha_sapphire: "Incendia il rametto che ha nella coda semplicemente\nestraendolo, grazie alla frizione del pelo. Lo usa anche\nper mandare segnali ai suoi compagni."
        de:
          omega_ruby: "In seinem Schweif steckt ein Zweig, den es bei Bedarf mit der\nReibungswärme seiner Schweifhaare anzündet und im Kampf\neinsetzt."
          alpha_sapphire: "Sein Zweig entzündet sich durch die Reibung, die beim\nHerausziehen aus seinem Schweif entsteht. Mit der Flamme\nsendet es Signale an Kameraden."
        es:
          omega_ruby: "Tiene una rama enredada en la cola. Cuando la saca, la rama\nprende fuego al hacer fricción con su pelaje y se lanza al\nataque con ella."
          alpha_sapphire: "Al extraer la rama que tiene en la cola, esta prende debido a\nla fricción. Usa esa rama candente para enviar señales a sus\ncompañeros."
        ko:
          omega_ruby: "나뭇가지를 꼬리에 꽂고 있다.\n꼬리털의 마찰열로\n가지에 불을 붙여 싸운다."
          alpha_sapphire: "나뭇가지를 꼬리에서 뽑을 때\n마찰로 불이 붙는다. 나뭇가지의 불꽃을\n흔들어 동료에게 신호를 보낸다."
delphox:
  species_id: 655
  names:
    jp_kana: マフォクシー
    jp_kanji: マフォクシー
    en: Delphox
    fr: Goupelin
    it: Delphox
    de: Fennexis
    es: Delphox
    ko: 마폭시
  forms:
