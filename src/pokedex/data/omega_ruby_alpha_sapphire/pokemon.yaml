          alpha_sapphire: "ながれの　はやい　かわで　エサを　とる　ときは\nしっぽを　かわべりの　きの　みきに　まきつける。\nしっぽは　だんりょくがあって　のびる　しくみ。"
        jp_kanji:
          omega_ruby: "油の　つまった　尻尾は　浮き輪の　代り。\n水面に　尻尾だけが　浮いている　ときは\n潜って　水草を　食べている　目印だ。"
          alpha_sapphire: "流れの　速い　川で　エサを　取る　ときは\n尻尾を　川べりの　木の　幹に　巻きつける。\n尻尾は　弾力があって　伸びる　仕組み。"
        en:
          omega_ruby: "Marill’s oil-filled tail acts much like a life preserver. If you see\njust its tail bobbing on the water’s surface, it’s a sure\nindication that this Pokémon is diving beneath the water to\nfeed on aquatic plants."
          alpha_sapphire: "When fishing for food at the edge of a fast-running stream,\nMarill wraps its tail around the trunk of a tree. This Pokémon’s\ntail is flexible and configured to stretch."
        fr:
          omega_ruby: "La queue remplie d’huile de Marill lui sert de gilet de\nsauvetage. Parfois, on peut voir sa queue flotter à la surface.\nOn peut en déduire que ce Pokémon a plongé sous l’eau\npour se nourrir de plantes aquatiques."
          alpha_sapphire: "Lorsqu’il pêche pour se nourrir sur les rives d’un fleuve rapide,\nMarill accroche sa queue autour d’un tronc d’arbre pour\nne pas être emporté. La queue de ce Pokémon est flexible\net résiste à l’étirement."
        it:
          omega_ruby: "La coda di Marill contiene dell’olio e agisce da salvagente.\nSe si scorge soltanto la sua coda a pelo d’acqua, significa\nche questo Pokémon si sta immergendo in profondità\nper cibarsi di piante acquatiche."
          alpha_sapphire: "Per nutrirsi Marill pesca il cibo in riva a torrenti impetuosi,\navvinghiando la coda attorno ai tronchi degli alberi. La coda\ndi questo Pokémon è flessibile e dalla costituzione elastica."
        de:
          omega_ruby: "Marills Schweif ist mit Öl gefüllt und dient ihm als eine Art\nRettungsring. Wenn nur sein Schweif an der Wasseroberfläche\nzu sehen ist, taucht dieses Pokémon gerade, um sich von\nWasserpflanzen zu ernähren."
          alpha_sapphire: "Wenn es am Ufer eines reißenden Flusses fischt,\nwickelt Marill seinen Schweif um einen Baumstamm.\nDer Schweif dieses Pokémon ist flexibel und elastisch,\nsodass es ihn ausdehnen kann."
        es:
          omega_ruby: "La cola de Marill contiene un aceite que hace las veces de\nchaleco salvavidas. Si ves una moviéndose en el agua, seguro\nque debajo hay un Marill medio sumergido buscando plantas\nacuáticas para comer."
          alpha_sapphire: "Este Pokémon tiene la cola muy flexible y elástica. A la hora\nde pescar a su presa en una rápida corriente, Marill enrosca\nla cola en un árbol."
        ko:
          omega_ruby: "기름이 가득한 꼬리는 튜브 대용이다.\n수면에 꼬리만 떠 있을 때는\n잠수하여 물풀을 먹고 있다는 표시다."
          alpha_sapphire: "흐름이 빠른 강에서 먹이를 잡을 때는\n꼬리를 강가의 나무줄기에 휘감는다.\n꼬리는 탄력이 있어서 늘어나는 구조다."
