        it:
          omega_ruby: "Di notte Shellder usa la sua lingua larga per scavare una buca\nsul fondo del mare e infilarcisi per dormire.\nQuando dorme chiude la conchiglia ma lascia la lingua fuori\na penzoloni."
          alpha_sapphire: "Di notte Shellder usa la sua lingua larga per scavare una buca\nsul fondo del mare e infilarcisi per dormire.\nQuando dorme chiude la conchiglia ma lascia la lingua fuori\na penzoloni."
        de:
          omega_ruby: "Nachts benutzt dieses Pokémon seine breite Zunge, um ein\nLoch in den Meeresboden zu graben. Darin schläft es.\nDabei schließt es seine Schale, aber die Zunge hängt heraus."
          alpha_sapphire: "Nachts verwendet dieses Pokémon seine breite Zunge, um ein\nLoch in den Meeresboden zu graben. Darin schläft es. Dabei\nschließt es seine Schale, lässt aber seine Zunge heraushängen."
        es:
          omega_ruby: "Por la noche, este Pokémon usa la ancha lengua que tiene\npara hacer un agujero en el fondo del mar y echarse a dormir.\nMientras duerme, Shellder cierra la concha, pero deja la\nlengua por fuera."
          alpha_sapphire: "Por la noche, este Pokémon usa la ancha lengua que tiene\npara hacer un agujero en el fondo del mar y echarse a dormir.\nMientras duerme, Shellder cierra la concha, pero deja la\nlengua por fuera."
        ko:
