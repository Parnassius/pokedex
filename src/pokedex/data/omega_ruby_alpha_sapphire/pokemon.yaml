          alpha_sapphire: "みがるさは　だれにも　まけない。\n６００メートルを　こえる　タワーの\nてっぺんまで　１ぷんで　のぼりきる。"
        jp_kanji:
          omega_ruby: "泡で　包んだ　小石を　投げる\n技を　使う。３０メートル　先の\n空き缶に　当てる　コントロール。"
          alpha_sapphire: "身軽さは　だれにも　負けない。\n６００メートルを　超える　タワーの\n天辺まで　１分で　登りきる。"
        en:
          omega_ruby: "It can throw bubble-covered pebbles with precise\ncontrol, hitting empty cans up to a hundred feet away."
          alpha_sapphire: "Its swiftness is unparalleled.\nIt can scale a tower of more\nthan 2,000 feet in a minute’s time."
        fr:
          omega_ruby: "Il est capable de lancer des pierres recouvertes de mousse\navec une précision suffisante pour toucher une canette vide\nà 30 m."
          alpha_sapphire: "Son agilité est incomparable. Il peut gravir une tour de 600 m\nde haut en moins d’une minute."
        it:
          omega_ruby: "Lancia dei sassi racchiusi in bolle di schiuma. È talmente\npreciso da riuscire a colpire una lattina vuota a 30 m\ndi distanza."
          alpha_sapphire: "Grazie alla sua straordinaria agilità, è in grado di scalare una\ntorre alta più di 600 m in meno di un minuto."
        de:
          omega_ruby: "Es kann kleine in Blasen gehüllte Steine mit solcher Präzision\nwerfen, dass es selbst 30 m entfernte Dosen problemlos trifft."
          alpha_sapphire: "Seine Flinkheit sucht ihresgleichen. Es kann einen 600 m\nhohen Turm in weniger als einer Minute erklimmen."
        es:
          omega_ruby: "Puede lanzar piedras envueltas en burbujas con tal puntería\nque acierta latas vacías a 30 metros de distancia."
          alpha_sapphire: "Su agilidad no tiene parangón. De hecho, es capaz de escalar\nuna torre de más de 600 metros en tan solo un minuto."
        ko:
          omega_ruby: "거품으로 싸인 돌멩이를 던지는\n기술을 쓴다. 30m 앞에 있는\n빈 캔을 맞힐 정도로 컨트롤이 좋다."
          alpha_sapphire: "누구보다도 가벼운 몸을 갖고 있다.\n600m를 넘는 타워의\n꼭대기까지 1분이면 올라간다."
greninja:
  species_id: 658
  names:
    jp_kana: ゲッコウガ
    jp_kanji: ゲッコウガ
    en: Greninja
    fr: Amphinobi
    it: Greninja
    de: Quajutsu
    es: Greninja
    ko: 개굴닌자
  forms:
