          omega_ruby: "いろんな　ばしょで　はりての　けいこに　はげむ。\nきょうれつな　はりて　こうげきを　くらうと\nでんしんばしらも　いちげきで　まっぷたつだ。"
          alpha_sapphire: "ふとった　からだは　きんにくの　かたまり。\nぐぐっと　ぜんしんに　ちからを　こめると\nきんにくは　いわと　おなじ　かたさになるぞ。"
        jp_kanji:
          omega_ruby: "色んな　場所で　張り手の　けいこに　励む。\n強烈な　張り手　攻撃を　くらうと\n電信柱も　一撃で　真っ二つだ。"
          alpha_sapphire: "肥った　体は　筋肉の　塊。\nぐぐっと　全身に　力を　込めると\n筋肉は　岩と　同じ　硬さになるぞ。"
        en:
          omega_ruby: "Hariyama practices its straight-arm slaps in any number of\nlocations. One hit of this Pokémon’s powerful, openhanded,\nstraight-arm punches could snap a telephone pole in two."
          alpha_sapphire: "Hariyama’s thick body may appear fat, but it is actually a hunk\nof solid muscle. If this Pokémon bears down and tightens all its\nmuscles, its body becomes as hard as a rock."
        fr:
          omega_ruby: "Hariyama s’entraîne à donner ses coups directs avec sa paume\nle plus souvent possible. Un seul de ces puissants coups\nde paume peut plier un poteau téléphonique en deux."
          alpha_sapphire: "Hariyama a l’air un peu enrobé, mais c’est en fait\nune montagne de muscles. Si ce Pokémon se raidit\net contracte ses muscles, son corps devient dur\ncomme de la pierre."
        it:
          omega_ruby: "Hariyama sferra potenti schiaffi a braccia tese in ogni\noccasione. Un colpo delle sue violente mani aperte\nè in grado di spaccare in due un palo della luce."
          alpha_sapphire: "Il robusto corpo di Hariyama può apparire grasso, ma in realtà\nè formato da una muscolatura tonica. Se contrae e tende ogni\nsingolo muscolo, il suo corpo diventa duro come la roccia."
        de:
          omega_ruby: "Hariyama führt seinen berüchtigten Streckarm-Schlag\nüberall aus. Ein Schlag von diesem Pokémon reicht aus,\num einen Strommast zu zerlegen."
          alpha_sapphire: "Hariyamas Körper mag vielleicht fett aussehen, er besteht aber\naus festen Muskeln. Wenn dieses Pokémon all seine Muskeln\nanspannt, wird sein Körper steinhart."
        es:
          omega_ruby: "Hariyama practica los empujones que da estirando los brazos\nallá por donde va. Este Pokémon puede partir por la mitad un\nposte de teléfono de un enérgico golpe con los brazos\nestirados y las manos abiertas."
          alpha_sapphire: "Puede que parezca que Hariyama está grueso, pero en\nrealidad es una mole de puro músculo. Si este Pokémon hace\nfuerza y tensa la musculatura, se pone sólido como una roca."
        ko:
          omega_ruby: "다양한 장소에서 손바닥 치기 연습에 힘쓴다.\n강렬한 손바닥 치기 공격을 맞으면\n전봇대도 한 방에 두 동강 난다."
          alpha_sapphire: "살이 찐 몸은 근육 덩어리다.\n힘껏 전신에 힘을 집중하면\n근육은 바위만큼 단단해진다."
