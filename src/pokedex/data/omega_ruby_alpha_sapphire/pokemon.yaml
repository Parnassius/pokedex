          alpha_sapphire: "りょうての　たいもうを　ムチのように\nつかいこなし　れんぞくこうげきを\nはじめると　だれにも　とめられない。"
        jp_kanji:
          omega_ruby: "腕の　体毛を　ムチのように\nあつかう。両腕の　攻撃は\n目にも　止まらぬ　速さ。"
          alpha_sapphire: "両手の　体毛を　ムチのように\n使いこなし　連続攻撃を\nはじめると　だれにも　止められない。"
        en:
          omega_ruby: "It wields the fur on its arms like a whip. Its arm\nattacks come with such rapidity that they cannot\neven be seen."
          alpha_sapphire: "Using the long fur on its arms like whips, it\nlaunches into combo attacks that, once started,\nno one can stop."
        fr:
          omega_ruby: "Il se sert des poils de ses pattes antérieures comme de fouets.\nSes coups ultrarapides sont invisibles à l’œil nu."
          alpha_sapphire: "Il combat à l’aide des longs poils de ses pattes antérieures.\nUne fois lancé dans ses enchaînements, rien ne l’arrête."
        it:
          omega_ruby: "Usa i peli degli arti come fruste. I suoi attacchi sono\ntalmente rapidi da essere invisibili a occhio nudo."
          alpha_sapphire: "Usa i peli degli arti anteriori a mo’ di frusta e se inizia un\nattacco a catena non c’è nessuno che lo possa fermare."
        de:
          omega_ruby: "Es benutzt das Fell an seinen Armen als Peitsche. Beide Arme\nbewegen sich dabei mit atemberaubender Geschwindigkeit."
          alpha_sapphire: "Niemand kann es aufhalten, wenn es eine Angriffsserie mit\nseinen peitschenartigen Armen startet."
        es:
          omega_ruby: "Usa el pelaje de sus brazos a manera de látigos. Sus ataques\nalcanzan velocidades de vértigo."
          alpha_sapphire: "Usa el pelaje de sus brazos a modo de látigos para encadenar\nataques que nadie puede parar una vez iniciados."
        ko:
          omega_ruby: "팔에 있는 털을 채찍처럼\n다룬다. 양팔로 펼치는 공격은\n눈에 보이지 않을 만큼 빠르다."
          alpha_sapphire: "양손의 털을 채찍처럼\n능숙하게 다뤄 연속 공격을\n시작하면 아무도 멈출 수 없다."
druddigon:
