        it:
          omega_ruby: "Ogni giorno Chansey depone uova molto nutrienti.\nQueste uova sono così buone da far tornare l’appetito\na chi lo ha perso."
          alpha_sapphire: "Ogni giorno Chansey depone uova molto nutrienti.\nQueste uova sono così buone da far tornare l’appetito\na chi lo ha perso."
        de:
