          alpha_sapphire: "Siempre que hay luna llena, salen en grupo para jugar.\nAl amanecer, los Clefairy, agotados, regresan a sus refugios\nde montaña para dormir acurrucados unos con otros."
        ko:
          omega_ruby: "보름달 밤에는 기운차게 논다.\n동틀 녘에 지친 삐삐들은 조용한\n산속에서 동료와 바짝 붙어 잠잔다."
          alpha_sapphire: "보름달 밤에는 기운차게 논다.\n동틀 녘에 지친 삐삐들은 조용한\n산속에서 동료와 바짝 붙어 잠잔다."
