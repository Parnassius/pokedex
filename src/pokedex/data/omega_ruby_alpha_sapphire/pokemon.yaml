        de:
          omega_ruby: "Dieses Pokémon ist unheimlich stark. Es kann seine Beute\nmit seinem Körper umwickeln und sogar Ölfässer zerdrücken.\nWenn Arbok einen Gegner umwickelt, ist es unmöglich,\nseinem Würgegriff zu entkommen."
          alpha_sapphire: "Dieses Pokémon ist unheimlich stark. Es kann seine Beute\nmit seinem Körper umwickeln und sogar Ölfässer zerdrücken.\nWenn Arbok einen Gegner umwickelt, ist es unmöglich,\nseinem Würgegriff zu entkommen."
        es:
