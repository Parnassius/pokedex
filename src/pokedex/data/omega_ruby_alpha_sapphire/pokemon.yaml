      descriptions:
        jp_kana:
          omega_ruby: "かせきから　ふっかつした　ポケモン。\nきにいらない　ことが　あると\nかんしゃくを　おこして　おおあばれ。"
          alpha_sapphire: "じどうしゃを　バリバリと　かじって\nこわす　おおあごの　はかいりょく。\n１おくねんまえに　せいそくしていた。"
        jp_kanji:
          omega_ruby: "化石から　復活した　ポケモン。\n気に入らない　ことが　あると\nかんしゃくを　起こして　大暴れ。"
          alpha_sapphire: "自動車を　バリバリと　かじって\n壊す　おおあごの　破壊力。\n１億年前に　生息していた。"
        en:
          omega_ruby: "This Pokémon was restored from a fossil.\nIf something happens that it doesn’t like,\nit throws a tantrum and runs wild."
          alpha_sapphire: "Its immense jaws have enough destructive\nforce that it can chew up an automobile.\nIt lived 100 million years ago."
        fr:
          omega_ruby: "Ramené à la vie à partir d’un fossile, ce Pokémon très\ncapricieux devient violent à la moindre contrariété."
          alpha_sapphire: "Ses énormes mâchoires ont tant de puissance qu’elles peuvent\ncompresser une voiture sans problème. Ce Pokémon vivait\nil y a 100 millions d’années."
        it:
          omega_ruby: "Pokémon risvegliatosi da un fossile. Se viene disturbato,\nsi infuria e provoca disastri."
          alpha_sapphire: "Questo Pokémon visse 100 milioni di anni fa. Grazie alle fauci\ntremendamente forti, potrebbe masticare un’automobile\nsenza sforzo."
        de:
          omega_ruby: "Dieses Pokémon wurde aus einem Fossil neu belebt.\nMissfällt ihm etwas, rastet es vollkommen aus."
          alpha_sapphire: "Mit seinem gewaltigen Kiefer kann dieses Pokémon, das vor\n100 Millionen Jahren lebte, ein Auto so leicht zermalmen,\nals wäre es ein reifer Apfel."
        es:
          omega_ruby: "Pokémon recreado a partir de fósiles. Cuando sucede algo\nque no es de su agrado, se enfurece y se vuelve violento."
          alpha_sapphire: "Su gran mandíbula posee una potencia tan atroz que sería\ncapaz de destruir a bocados un coche. Ya vivía hace la friolera\nde 100 millones de años."
        ko:
          omega_ruby: "화석에서 부활한 포켓몬이다.\n마음에 들지 않는 일이 있으면\n짜증을 내며 난동을 부린다."
          alpha_sapphire: "큰 턱은 자동차를 아드득아드득 갉아서\n부서뜨리는 파괴력을 가졌다.\n1억 년 전에 서식하고 있었다."
tyrantrum:
  species_id: 697
  names:
    jp_kana: ガチゴラス
    jp_kanji: ガチゴラス
    en: Tyrantrum
    fr: Rexillius
    it: Tyrantrum
    de: Monargoras
    es: Tyrantrum
    ko: 견고라스
