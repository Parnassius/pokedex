electrike:
  species_id: 309
  names:
    jp_kana: ラクライ
    jp_kanji: ラクライ
    en: Electrike
    fr: Dynavolt
    it: Electrike
    de: Frizelbliz
    es: Electrike
    ko: 썬더라이
  forms:
    electrike:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 40
        special_attack: 65
        special_defense: 40
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - static
        - lightning_rod
      hidden_ability: minus
      descriptions:
        jp_kana:
          omega_ruby: "ながい　たいもうに　でんきを　ためている。\nでんりゅうで　あしの　きんにくを　しげきして\nばくはつてきな　しゅんぱつりょくを　うみだす。"
          alpha_sapphire: "めにも　とまらぬ　スピードで　はしる　ポケモン。\nくうきの　まさつで　でんきを　はっせいさせて\nぜんしんの　たいもうに　たくわえている。"
        jp_kanji:
          omega_ruby: "長い　体毛に　電気を　ためている。\n電流で　足の　筋肉を　刺激して\n爆発的　瞬発力を　生み出す。"
          alpha_sapphire: "目にも　止まらぬ　スピードで　走る　ポケモン。\n空気の　摩擦で　電気を　発生させて\n全身の　体毛に　蓄えている。"
        en:
          omega_ruby: "Electrike stores electricity in its long body hair. This Pokémon\nstimulates its leg muscles with electric charges. These jolts of\npower give its legs explosive acceleration performance."
          alpha_sapphire: "Electrike runs faster than the human eye can follow.\nThe friction from running is converted into electricity,\nwhich is then stored in this Pokémon’s fur."
        fr:
          omega_ruby: "Dynavolt stocke de l’électricité dans les poils de son corps\nallongé. Ce Pokémon stimule les muscles de ses jambes\navec des charges électriques, ce qui le rend capable\nd’accélérations fulgurantes."
          alpha_sapphire: "Dynavolt court tellement vite que l’œil humain ne peut pas\nle suivre. La friction générée par sa course est convertie en\nélectricité, puis stockée dans la fourrure de ce Pokémon."
        it:
          omega_ruby: "Electrike accumula l’elettricità nella sua folta pelliccia.\nStimola i muscoli degli arti inferiori con cariche elettriche,\ngrazie alle quali ottiene prestazioni e accelerazioni esplosive."
          alpha_sapphire: "Electrike corre più velocemente di quanto l’occhio umano\npossa percepire. L’attrito dovuto alla corsa viene trasformato\nin elettricità, accumulata poi nella pelliccia del Pokémon."
        de:
          omega_ruby: "Frizelbliz speichert Elektrizität in seiner langen\nKörperbehaarung. Dieses Pokémon stimuliert seine\nBeinmuskulatur durch Stromstöße. Dadurch ist es\nin der Lage, explosiv zu beschleunigen."
          alpha_sapphire: "Frizelbliz rennt so schnell, dass das menschliche Auge es nicht\nwahrnehmen kann. Die Reibung, die dabei entsteht, wandelt es\nin Elektrizität um, die es in seinem Fell speichert."
        es:
          omega_ruby: "Electrike acumula electricidad en el largo pelaje que tiene.\nEste Pokémon estimula los músculos de las patas mediante\ndescargas eléctricas. Estas explosiones de energía le permiten\nacelerar de forma increíble."
          alpha_sapphire: "Electrike corre tan rápido que escapa hasta al ojo humano.\nLa fricción que se origina en la carrera se transforma en\nelectricidad que almacena en el pelaje."
        ko:
          omega_ruby: "긴 털에 전기를 모으고 있다.\n전류로 다리 근육을 자극하여\n폭발적인 순발력을 낸다."
          alpha_sapphire: "눈에 안 보이는 스피드로 달리는 포켓몬이다.\n공기의 마찰로 전기를 발생시켜\n전신의 털에 비축하고 있다."
manectric:
  species_id: 310
  names:
    jp_kana: ライボルト
    jp_kanji: ライボルト
    en: Manectric
    fr: Élecsprint
    it: Manectric
    de: Voltenso
    es: Manectric
    ko: 썬더볼트
  forms:
    manectric:
      form_id: 0
      base_stats:
        hp: 70
        attack: 75
        defense: 60
        special_attack: 105
        special_defense: 60
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - static
        - lightning_rod
      hidden_ability: minus
      descriptions:
        jp_kana:
          omega_ruby: "たてがみから　いつも　ほうでんしているため\nひばなで　やまかじを　おこしてしまう　ことも。\nたたかいに　なると　かみなりぐもを　つくりだす。"
          alpha_sapphire: "たてがみから　つよい　でんきを　はっしている。\nくうきちゅうの　でんきを　たてがみに　あつめ\nあたまの　うえに　かみなりぐもを　つくりだす。"
        jp_kanji:
          omega_ruby: "たてがみから　いつも　放電しているため\n火花で　山火事を　起してしまう　ことも。\n戦いに　なると　雷雲を　つくりだす。"
          alpha_sapphire: "たてがみから　強い　電気を　発している。\n空気中の　電気を　たてがみに　集め\n頭の　上に　雷雲を　つくりだす。"
        en:
          omega_ruby: "Manectric is constantly discharging electricity from its mane.\nThe sparks sometimes ignite forest fires. When it enters a\nbattle, this Pokémon creates thunderclouds."
          alpha_sapphire: "Manectric discharges strong electricity from its mane.\nThe mane is used for collecting electricity in the atmosphere.\nThis Pokémon creates thunderclouds above its head."
        fr:
          omega_ruby: "La crinière d’Élecsprint libère constamment de l’électricité.\nLes étincelles déclenchent parfois des feux de forêt.\nAu début de ses combats, ce Pokémon crée des nuages\norageux."
          alpha_sapphire: "Élecsprint peut libérer un courant intense de sa crinière.\nCette crinière lui permet de récupérer l’électricité de\nl’atmosphère. Ce Pokémon peut créer des nuages orageux\nau-dessus de sa tête."
        it:
          omega_ruby: "Manectric scarica costantemente l’elettricità dalla propria\ncriniera. Spesso le scintille scatenano incendi nei boschi.\nIn lotta questo Pokémon crea nubi temporalesche."
          alpha_sapphire: "Manectric scarica forti scosse elettriche dalla propria criniera,\nusata come collettore dell’elettricità presente nell’atmosfera.\nCrea inoltre nubi temporalesche sopra la sua testa."
        de:
          omega_ruby: "Voltenso entlädt ständig Elektrizität aus seiner Mähne.\nEs fliegen dabei Funken, die zuweilen zu Waldbränden führen.\nIn einem Kampf erzeugt dieses Pokémon Gewitterwolken."
          alpha_sapphire: "Voltenso sammelt Elektrizität aus der Atmosphäre\nin seiner Mähne und entlädt diese. Dieses Pokémon\nerzeugt Gewitterwolken über seinem Kopf."
        es:
          omega_ruby: "Manectric está continuamente descargando electricidad por\nlas melenas, y a veces causa incendios en el bosque con las\nchispas que suelta. Cuando entra en combate, este Pokémon\ncrea nubarrones."
          alpha_sapphire: "Manectric acumula en las melenas la electricidad que hay en\nel ambiente, y la descarga a través de ellas en grandes dosis.\nEste Pokémon crea nubarrones que se le quedan por encima\nde la cabeza."
        ko:
          omega_ruby: "갈기를 통해 항상 방전 중이기 때문에\n불꽃이 튀어 산불이 일어나기도 한다.\n싸우게 되면 번개 구름을 만들어낸다."
          alpha_sapphire: "갈기에서 강한 전기를 발산하고 있다.\n공기 중의 전기를 갈기에 모아\n머리 위에 번개 구름을 만들어낸다."
