          alpha_sapphire: "ながい　たいもうに　つつまれると\nふゆやまでも　ひとばん　へいきなほど\nあたたかく　とても　ここちよい。"
        jp_kanji:
          omega_ruby: "吹雪で　閉ざされた　山に　入り\n遭難した　人を　助ける。\n長い　毛が　寒さを　防ぐ。"
          alpha_sapphire: "長い　体毛に　包まれると\n冬山でも　一晩　平気なほど\n暖かく　とても　心地よい。"
        en:
          omega_ruby: "It rescues people stranded by blizzards in the\nmountains. Its shaggy fur shields it from the cold."
          alpha_sapphire: "Being wrapped in its long fur is so comfortable\nthat a person would be fine even overnight on a\nwintry mountain."
        fr:
          omega_ruby: "Il sauve les gens bloqués dans les montagnes par\ndes tempêtes de neige. Ses longs poils le protègent\ndu froid."
          alpha_sapphire: "Sa soyeuse fourrure à poils longs est assez chaude\npour supporter de longues nuits d’hiver en montagne."
        it:
          omega_ruby: "Soccorre chi si trova in difficoltà sulle montagne spazzate\nda bufere di neve. I lunghi peli lo proteggono dal freddo."
          alpha_sapphire: "Avvolti nel suo caldo manto si può dormire all’addiaccio su una\nmontagna in inverno senza correre alcun pericolo."
        de:
          omega_ruby: "Es rettet Menschen, die aufgrund eines Schneesturmes im\nGebirge festsitzen. Sein langes Fell schützt es vor Kälte."
          alpha_sapphire: "Sein langes Fell ist sehr bequem und kann einen Menschen\neine ganze Nacht lang auf einem schneebedeckten Berg\nwarmhalten."
        es:
          omega_ruby: "Socorre a humanos perdidos en montañas azotadas por\nventiscas. Su largo pelaje le protege del frío."
          alpha_sapphire: "Un humano podría pasar una noche gélida en las montañas\nsin pasar frío si se tapara con su largo y tupido pelaje."
        ko:
          omega_ruby: "눈보라로 길이 막힌 산에 들어가\n조난된 사람을 구해준다.\n긴 털이 추위를 막는다."
          alpha_sapphire: "긴 털에 둘러싸이면 겨울 산에서\n하룻밤을 보내도 괜찮을 정도로\n따뜻하고 매우 기분이 좋다."
purrloin:
  species_id: 509
  names:
    jp_kana: チョロネコ
    jp_kanji: チョロネコ
    en: Purrloin
    fr: Chacripan
    it: Purrloin
