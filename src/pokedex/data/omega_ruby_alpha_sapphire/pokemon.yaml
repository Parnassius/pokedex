      descriptions:
        jp_kana:
          omega_ruby: "おでこから　でている　けむりの\nなかには　ひとや　ポケモンの　みた\nゆめが　たくさん　つまっているのだ。"
          alpha_sapphire: "おでこから　でる　ゆめのけむりは\nたべた　ゆめの　ないようによって\nさまざまな　いろに　かわるのだ。"
        jp_kanji:
          omega_ruby: "おでこから　出ている　煙の　中には\n人や　ポケモンの　見た　夢が\nたくさん　つまっているのだ。"
          alpha_sapphire: "おでこから　でる　ゆめのけむりは\n食べた　夢の　内容によって\nさまざまな　色に　変わるのだ。"
        en:
          omega_ruby: "The mist emanating from their foreheads is packed\nwith the dreams of people and Pokémon."
          alpha_sapphire: "The dream mist coming from its forehead changes\ninto many different colors depending on the dream\nthat was eaten."
        fr:
          omega_ruby: "La fumée qui sort de son front contient les rêves de\nnombreuses personnes et ceux de nombreux Pokémon."
          alpha_sapphire: "La fumée qui sort de son front change de couleur\nselon le contenu des rêves qu’il a mangés."
        it:
          omega_ruby: "Nel fumo che gli esce dalla fronte sono racchiusi molti sogni\ndi esseri umani e di Pokémon."
          alpha_sapphire: "Il fumo che esce dalla sua fronte cambia colore a seconda del\ncontenuto del sogno che ha mangiato."
        de:
          omega_ruby: "Der Dunst, der aus seiner Stirn tritt, enthält die Träume\nunzähliger Menschen und Pokémon."
          alpha_sapphire: "Je nach Inhalt der Träume, die es frisst, nimmt der Dunst,\nder aus seiner Stirn austritt, unterschiedliche Farben an."
        es:
          omega_ruby: "Multitud de sueños de humanos y Pokémon se encuentran\natrapados en el humo que despide por su frente."
          alpha_sapphire: "El color del humo que despide por su abultada frente varía\nsegún el contenido de los sueños que haya engullido."
        ko:
          omega_ruby: "이마에서 나오는 연기 속에는\n사람이나 포켓몬이 꾼\n꿈이 많이 모여 있다."
          alpha_sapphire: "이마에서 나오는 꿈연기는\n먹은 꿈의 내용에 따라\n여러 가지 색으로 변한다."
pidove:
