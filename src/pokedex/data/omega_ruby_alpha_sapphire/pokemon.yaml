          alpha_sapphire: "どんな　ポケモンとでも　こころを\nかよいあわせる　ことが　できる\nふしぎな　のうりょくを　もっている。"
        jp_kanji:
          omega_ruby: "生まれたときから　備わっている\n不思議な　力を　使うと　どんな\nポケモンとも　心が　通い合う。"
          alpha_sapphire: "どんな　ポケモンとでも　心を\n通い合わせる　ことが　できる\n不思議な　能力を　持っている。"
        en:
          omega_ruby: "It is born with a wondrous power that lets it bond\nwith any kind of Pokémon."
          alpha_sapphire: "It starts its life with a wondrous power that permits\nit to bond with any kind of Pokémon."
        fr:
          omega_ruby: "Il est né avec le pouvoir incroyable de créer des liens\navec n’importe quel Pokémon."
          alpha_sapphire: "Il possède l’étrange pouvoir de s’entendre avec n’importe\nquel Pokémon."
        it:
          omega_ruby: "Dispone di un potere innato che lo fa legare con qualsiasi\nspecie di Pokémon."
          alpha_sapphire: "Dispone di un potere innato che lo fa legare con qualsiasi\nspecie di Pokémon."
        de:
          omega_ruby: "Es wird mit einer wundersamen Kraft geboren, die eine\nBindung zu jedem anderen Pokémon möglich macht."
          alpha_sapphire: "Es besitzt die wundersame Fähigkeit, das Herz eines jeden\nanderen Pokémon anzurühren."
        es:
          omega_ruby: "Nace con un maravilloso poder que le permite establecer\nvínculos con cualquier tipo de Pokémon."
          alpha_sapphire: "Posee un poder singular que hace que entable amistad con\ncasi cualquier Pokémon."
        ko:
          omega_ruby: "태어났을 때부터 가지고 있는\n이상한 힘을 쓰면 어떤 포켓몬과도\n마음이 서로 통하게 된다."
          alpha_sapphire: "어떤 포켓몬과도 마음이\n통하고 맞출 수 있는\n이상한 능력을 가지고 있다."
