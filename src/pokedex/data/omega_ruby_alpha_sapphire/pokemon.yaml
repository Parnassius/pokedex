        jp_kana:
          omega_ruby: "あいての　うごきを　そっくりに\nまねを　して　とまどわせている\nあいだに　さっさと　にげるのだ。"
          alpha_sapphire: "あいての　うごきを　モノマネする\nしゅうせい。まねを　された　あいては\nめが　はなせなくなる　という。"
        jp_kanji:
          omega_ruby: "相手の　動きを　そっくりに\n真似を　して　戸惑わせている\nあいだに　さっさと　逃げるのだ。"
          alpha_sapphire: "相手の　動きを　モノマネする\n習性。真似を　された　相手は\n目が　離せなくなる　という。"
        en:
          omega_ruby: "In an attempt to confuse its enemy, it mimics the\nenemy’s movements. Then it wastes no time in\nmaking itself scarce!"
          alpha_sapphire: "It habitually mimics foes. Once mimicked, the foe\ncannot take its eyes off this Pokémon."
        fr:
          omega_ruby: "Il déstabilise ses ennemis en imitant leurs mouvements\net profite de leur stupeur pour décamper."
          alpha_sapphire: "Il imite ses ennemis. Une fois imités, ils ne peuvent plus\nquitter ce Pokémon des yeux."
        it:
          omega_ruby: "Imita i movimenti del nemico, approfittando del suo momento\ndi confusione per fuggire."
          alpha_sapphire: "Imita i movimenti dei nemici. Quando un nemico viene imitato,\nnon riesce più a distogliere lo sguardo da lui."
        de:
          omega_ruby: "Es ahmt seinen Gegner nach. Während dieser noch verblüfft\ndreinsieht, macht es sich aus dem Staub."
          alpha_sapphire: "Es ahmt seinen Gegner nach. Der kann den Blick danach nicht\nvon ihm abwenden."
        es:
          omega_ruby: "Desconcierta a sus rivales imitando sus movimientos a la\nperfección y aprovecha para darse a la fuga."
          alpha_sapphire: "Suele imitar a sus enemigos. Cuando lo hace, su rival no\npuede apartar los ojos de él."
        ko:
          omega_ruby: "상대의 움직임을 똑같이\n흉내 내어 당황한\n사이에 재빨리 도망친다."
          alpha_sapphire: "상대의 움직임을 흉내 내는\n습성이 있다. 모방을 당한 상대는\n눈을 뗄 수 없게 된다고 한다."
