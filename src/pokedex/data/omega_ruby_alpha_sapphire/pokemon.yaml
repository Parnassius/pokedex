      descriptions:
        jp_kana:
          omega_ruby: "てっきゅうの　ような　かせきから\nふっかつした　こだいの　ポケモン。\nずつきで　えものを　しとめた。"
          alpha_sapphire: "およそ　１おくねんまえの　ポケモン。\nジャングルで　うまれそだち　じゃまな\nじゅもくは　ずつきで　へしおった。"
        jp_kanji:
          omega_ruby: "鉄球の　ような　化石から\n復活した　古代の　ポケモン。\n頭突きで　獲物を　しとめた。"
          alpha_sapphire: "およそ　１億年前の　ポケモン。\nジャングルで　生まれ育ち　邪魔な\n樹木は　頭突きで　へしおった。"
        en:
          omega_ruby: "It was resurrected from an iron ball-like fossil.\nIt downs prey with its headbutts."
          alpha_sapphire: "A lifelong jungle dweller from 100 million years\nago, it would snap obstructing trees with headbutts."
        fr:
          omega_ruby: "On l’a ressuscité à partir d’un fossile de fer en forme de balle.\nIl abat ses proies à coups de tête."
          alpha_sapphire: "Il vivait dans la jungle il y a 100 millions d’années.\nIl peut abattre un arbre d’un coup de tête."
        it:
          omega_ruby: "È stato fatto rivivere da un fossile di ferro simile a una palla.\nAbbatte le prede con le punte sulla testa."
          alpha_sapphire: "Abitava nella giungla già 100 milioni di anni fa. Abbatte\ngli alberi che lo ostacolano con delle testate."
        de:
          omega_ruby: "Es wurde aus einem ballartigen, eisernen Fossil geschaffen.\nEs schlägt Beute mit einem Kopfstoß."
          alpha_sapphire: "Es lebt seit Urzeiten im Dschungel. Kann im Weg befindliche\nBäume mit Kopfstößen aus dem Weg räumen."
        es:
          omega_ruby: "Fue recreado a partir de un fósil con forma esférica. Derriba a\nlas presas a cabezazos."
          alpha_sapphire: "Vivía en la jungla hace 100 millones de años. Apartaba los\nárboles del camino a cabezazos."
        ko:
          omega_ruby: "철구 같은 화석에서\n부활한 고대 포켓몬이다.\n박치기로 먹이를 꼼짝 못하게 한다."
          alpha_sapphire: "대략 1억 년 전의 포켓몬이다.\n정글에서 태어나고 자라며 방해되는\n수목은 박치기로 꺾었다."
