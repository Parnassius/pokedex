        jp_kana:
          omega_ruby: "うでか　あしの　どちらかだけで　はばたいている\nときは　ながい　きょりを　とんでいる　しょうこ。\nつかれると　はばたく　ハネを　かえるのだ。"
          alpha_sapphire: "みみを　すまさないと　きこえないほど　ちいさな\nはおとで　ねらった　えものに　しのびよるぞ。\nうしろあしの　ハネで　えだに　つかまり　やすむ。"
        jp_kanji:
          omega_ruby: "腕か　足の　どちらかだけで　羽ばたいている\nときは　長い　距離を　飛んでいる　証拠。\n疲れると　羽ばたく　ハネを　変えるのだ。"
          alpha_sapphire: "耳を　すまさないと　聞こえないほど　小さな\n羽音で　ねらった　獲物に　忍び寄るぞ。\n後ろ足の　ハネで　枝に　つかまり　休む。"
        en:
          omega_ruby: "If this Pokémon is flying by fluttering only a pair of wings on\neither the forelegs or hind legs, it’s proof that Crobat has been\nflying a long distance. It switches the wings it uses if it is tired."
          alpha_sapphire: "Crobat sneaks up on its intended prey using wings that barely\nmake a sound. This Pokémon rests by hanging on a tree\nbranch with its rear legs that serve as wings."
        fr:
          omega_ruby: "Lorsque Nostenfer vole depuis longtemps, il utilise ses ailes\nantérieures ou postérieures en alternance. Il peut aisément\nchanger de paire d’ailes lorsqu’il est fatigué."
          alpha_sapphire: "Nostenfer s’approche discrètement de sa proie grâce à\nses ailes silencieuses. Ce Pokémon se repose en s’accrochant\nà une branche avec ses pattes arrière, qui peuvent aussi lui\nservir d’ailes."
        it:
          omega_ruby: "Quando Crobat vola agitando soltanto un paio d’ali, quelle\nanteriori o quelle posteriori, significa che ha affrontato\nun volo molto lungo. Infatti, se è stanco cambia le ali\nche sta usando."
          alpha_sapphire: "Crobat si avvicina furtivo alla preda con le sue ali\nsilenziosissime. Questo Pokémon si riposa aggrappato ai rami\ndegli alberi con le zampe posteriori, che servono anche da ali."
        de:
          omega_ruby: "Wenn Iksbat fliegt, indem es entweder das vordere oder\ndas hintere Paar Flügel bewegt, ist dies ein Anzeichen dafür,\ndass dieses Pokémon bereits eine lange Strecke hinter sich\nhat. Dann wechselt es die Flügel häufig."
          alpha_sapphire: "Iksbats Flügelschlag ist so leise, dass die Beute lautlos\nüberrascht wird. Dieses Pokémon ruht sich aus, indem es\nsich mit seinen Hinterbeinen an einen Ast hängt."
        es:
          omega_ruby: "Cuando este Pokémon vuela batiendo solo las alas delanteras\no traseras, es porque lleva volando bastante tiempo. Cuando\nse cansa, Crobat alterna las alas."
          alpha_sapphire: "Crobat se acerca hasta su posible presa usando las alas casi\nsin hacer ruido. La forma de descansar que tiene es colgarse\nde la rama de un árbol por las patas traseras."
        ko:
          omega_ruby: "팔이나 다리 어느 한쪽만으로 날갯짓할\n때는 긴 거리를 날고 있다는 증거다.\n지치면 날갯짓하는 날개를 바꾼다."
          alpha_sapphire: "귀를 기울이지 않으면 들리지 않을 정도로 작은\n날갯소리로 노린 먹이에게 살며시 다가간다.\n뒷다리의 날개로 가지를 붙잡고 쉰다."
