          alpha_sapphire: "Lamantine adore piquer un roupillon à même la glace. Il y a\ntrès longtemps, un marin ayant aperçu ce Pokémon dormant\nsur un glacier a cru voir une sirène."
        it:
          omega_ruby: "Dewgong adora riposare su una gelida lastra di ghiaccio.\nIn passato i marinai confondevano il profilo di questo\nPokémon addormentato sulla superficie gelata con una sirena."
          alpha_sapphire: "Dewgong adora riposare su una gelida lastra di ghiaccio.\nIn passato i marinai confondevano il profilo di questo\nPokémon addormentato sulla superficie gelata con una sirena."
        de:
          omega_ruby: "Jugong liebt es, auf bitterkalten Eisschollen ein Nickerchen\nzu machen. Ein Seemann, der einmal ein solches Pokémon\nschlafend auf einem Eisberg sah, hielt es irrtümlicherweise\nfür eine Meerjungfrau."
          alpha_sapphire: "Jugong liebt es, auf bitterkalten Eisschollen ein Nickerchen zu\nmachen. Ein Seemann, der ein solches Pokémon eines Tages\nauf einem Eisberg schlafen sah, hielt es für eine Meerjungfrau."
        es:
          omega_ruby: "A Dewgong le encanta dormitar sobre la frialdad del hielo.\nAntiguamente, algún que otro marino lo confundió con una\nsirena al verlo dormido sobre un glaciar."
          alpha_sapphire: "A Dewgong le encanta dormitar sobre la frialdad del hielo.\nAntiguamente, algún que otro marino lo confundió con una\nsirena al verlo dormido sobre un glaciar."
        ko:
          omega_ruby: "차가운 얼음 위에서 자는 것을 매우 좋아한다.\n옛날에 빙산에서 자는 모습을 본\n뱃사람이 인어로 착각했다."
          alpha_sapphire: "차가운 얼음 위에서 자는 것을 매우 좋아한다.\n옛날에 빙산에서 자는 모습을 본\n뱃사람이 인어로 착각했다."
