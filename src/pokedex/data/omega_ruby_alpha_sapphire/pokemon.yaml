          alpha_sapphire: "いつも　たいぼくや　いしを　かじって\nじょうぶな　まえばを　けずっている。\nみずべに　すを　つくり　くらす。"
        jp_kanji:
          omega_ruby: "なにごとにも　動じない\n図太い　神経の　持ち主。\n見かけの　割には　機敏に　活動する。"
          alpha_sapphire: "いつも　大木や　石を　かじって\n丈夫な　前歯を　削っている。\n水辺に　巣を　作り　暮らす。"
        en:
          omega_ruby: "With nerves of steel, nothing can perturb it. It is\nmore agile and active than it appears."
          alpha_sapphire: "It constantly gnaws on logs and rocks to whittle\ndown its front teeth. It nests alongside water."
        fr:
          omega_ruby: "Rien ne peut perturber ses nerfs d’acier. Il est plus agile et\nénergique qu’il n’y paraît."
          alpha_sapphire: "Il ronge constamment des troncs et des pierres pour se faire\nles incisives. Il niche le long de l’eau."
        it:
          omega_ruby: "Ha i nervi d’acciaio e niente può turbarlo. È più agile e attivo\ndi quanto sembri."
          alpha_sapphire: "Rosicchia continuamente legno e rocce per affilare i denti\nanteriori. Nidifica vicino all’acqua."
        de:
          omega_ruby: "Es hat Nerven wie Drahtseile, nichts kann es erschüttern.\nEs ist agiler und aktiver, als es scheint."
          alpha_sapphire: "Es knabbert ständig an Holz und Steinen, um seine\nVorderzähne zu kürzen. Es nistet am Wasser."
        es:
          omega_ruby: "Tiene nervios de acero y nada puede perturbarlo. Es más ágil\ny activo de lo que aparenta."
          alpha_sapphire: "Roe constantemente los troncos y las rocas para limarse los\ndientes. Anida cerca del agua."
        ko:
          omega_ruby: "어떤 것에도 동요하지 않는\n대담한 신경의 소유자다.\n보기보다는 기민하게 활동한다."
          alpha_sapphire: "항상 큰 나무나 돌을 갉아서\n튼튼한 앞니를 갈아내고 있다.\n물가에 둥지를 만들어 산다."
