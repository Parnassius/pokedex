        jp_kana:
          omega_ruby: "てごろな　いしに　あなを　あけて\nすみかにする。こわされると　かわりの\nいしが　みつかるまで　おちつかない。"
          alpha_sapphire: "てごろな　サイズの　いしが　あると\nくちから　えきたいを　ぶんぴつして\nなかに　はいるための　あなをあける。"
        jp_kanji:
          omega_ruby: "手ごろな　石に　穴を　開けて\n住処にする。壊されると　かわりの\n石が　見つかるまで　落ち着かない。"
          alpha_sapphire: "てごろな　サイズの　石が　あると\n口から　液体を　分泌して\n中に　入るための　穴をあける。"
        en:
          omega_ruby: "It makes a hole in a suitable rock. If that rock\nbreaks, the Pokémon remains agitated until it\nlocates a replacement."
          alpha_sapphire: "When it finds a stone of a suitable size, it secretes\na liquid from its mouth to open up a hole to\ncrawl into."
        fr:
          omega_ruby: "Il perce un caillou et s’en sert comme maison. Quand on lui\ncasse, il est anxieux jusqu’à ce qu’il en trouve un autre."
          alpha_sapphire: "Lorsqu’il trouve un caillou à sa taille, il y creuse un trou avec\nle fluide qui sort de sa bouche et s’en sert comme maison."
        it:
          omega_ruby: "Scava un buco in una pietra adatta per farne la sua dimora.\nSe si rompe, non si dà pace finché non ne trova un’altra."
          alpha_sapphire: "Quando trova una pietra della sua misura crea un buco con il\nliquido che secerne dalla bocca e ci si infila dentro."
        de:
          omega_ruby: "Höhlt sich einen brauchbaren Stein aus, um darin zu wohnen.\nGeht er zu Bruch, ruht es nicht, bis es einen neuen findet."
          alpha_sapphire: "Sobald es einen angemessen großen Stein findet, höhlt es ihn\nmit einem ätzenden Sekret aus und kriecht hinein."
        es:
          omega_ruby: "Abre un agujero en la roca y vive en él. Si la roca se\nresquebraja, no se queda tranquilo hasta que no encuentra\notra."
          alpha_sapphire: "Si encuentran una piedra de tamaño ideal, segregan un líquido\npor la boca para crear un agujero y deslizarse dentro."
        ko:
          omega_ruby: "적당한 돌을 찾아 구멍을 뚫어\n살 곳을 만든다. 부서지면 대신할\n돌을 찾을 때까지 불안해한다."
          alpha_sapphire: "적당한 사이즈의 돌이 있으면\n입에서 액체를 분비해서\n안에 들어가기 위한 구멍을 판다."
crustle:
  species_id: 558
  names:
