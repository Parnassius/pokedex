          omega_ruby: "おしりからとばす　くさい　しるの\nにおいは　はんけい２キロに　ひろがり\nまわりの　ポケモンは　いなくなる。"
          alpha_sapphire: "おしりから　きょうれつに　くさい\nえきたいを　とばして　みを　まもる。\nにおいは　２４じかん　きえない。"
        jp_kanji:
          omega_ruby: "お尻から飛ばす　くさい　汁の\nにおいは　半径２キロに　広がり\nまわりの　ポケモンは　いなくなる。"
          alpha_sapphire: "お尻から　強烈に　くさい　液体を\n飛ばして　身を　守る。\nにおいは　２４時間　消えない。"
        en:
          omega_ruby: "It sprays a foul fluid from its rear. Its stench\nspreads over a mile radius, driving Pokémon away."
          alpha_sapphire: "It protects itself by spraying a noxious fluid from its\nrear. The stench lingers for 24 hours."
        fr:
          omega_ruby: "Son derrière propulse un fluide nauséabond qui peut faire fuir\nles Pokémon dans un rayon de 2 km."
          alpha_sapphire: "Il se protège en expulsant un fluide nocif par son derrière.\nLa puanteur dure 24 heures."
        it:
          omega_ruby: "Emette un fluido puzzolente dal posteriore. Il tanfo si sparge\nper 2 km e tiene lontani i Pokémon."
          alpha_sapphire: "Si protegge spruzzando un fluido puzzolente dal posteriore.\nIl tanfo permane per 24 ore."
        de:
          omega_ruby: "Versprüht eine Substanz aus seinem Hinterleib, die in einem\ngroßen Radius andere Pokémon fernhält."
          alpha_sapphire: "Um sich zu schützen, versprüht es eine Substanz aus seinem\nHinterleib, die 24 Stunden stinkt."
        es:
          omega_ruby: "Expulsa un fluido maloliente por sus cuartos traseros. El hedor\nrepele Pokémon en un radio de 2 km."
          alpha_sapphire: "Se protege expulsando un fluido nocivo por su parte trasera.\nEl hedor dura 24 horas."
        ko:
          omega_ruby: "엉덩이에서 뿜어지는 역한 분비액의\n냄새는 반경 2km까지 멀리 퍼져\n주변의 포켓몬이 자리를 뜨게 한다."
          alpha_sapphire: "엉덩이에서 강렬한 구린내의\n액체를 날려서 몸을 지킨다.\n냄새가 24시간 사라지지 않는다."
