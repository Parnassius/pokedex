          omega_ruby: "てのひらの　あなから　イシツブテを\nはっしゃ。ぜんしんの　プロテクターは\nかざんの　ふんかにも　たえられる。"
          alpha_sapphire: "いわを　てのひらの　あなに　つめて\nきんにくの　ちからで　はっしゃする。\nまれに　イシツブテを　とばす。"
        jp_kanji:
          omega_ruby: "手のひらの　穴から　イシツブテを\n発射。全身の　プロテクターは\n火山の　噴火にも　耐えられる。"
          alpha_sapphire: "岩を　手のひらの　穴に　つめて\n筋肉の　力で　発射する。\nまれに　イシツブテを　飛ばす。"
        en:
          omega_ruby: "From holes in its palms, it fires out Geodude.\nIts carapace can withstand volcanic eruptions."
          alpha_sapphire: "It puts rocks in holes in its palms and uses its\nmuscles to shoot them. Geodude are shot at\nrare times."
        fr:
          omega_ruby: "Ses paumes projettent des Racaillou, et son corps couvert\nde Protecteurs résiste même à une éruption volcanique."
          alpha_sapphire: "Il bande ses muscles pour projeter des pierres ou\ndes Racaillou depuis le creux de ses paumes."
        it:
          omega_ruby: "Mette dei Geodude nelle cavità dei palmi e li lancia.\nUsa Copertura per resistere alle eruzioni vulcaniche."
          alpha_sapphire: "Mette rocce nelle cavità dei suoi palmi e le getta con tutta\nla sua forza. Talvolta lancia Geodude."
        de:
          omega_ruby: "Es feuert Kleinstein aus seinen Handflächen. Durch seinen\nSchützer erträgt es sogar Vulkanausbrüche."
          alpha_sapphire: "Es legt Steine in die Löcher seiner Hände und wirft sie\nmit Muskelkraft. Sogar Georok werden verwendet."
        es:
          omega_ruby: "Lanza Geodude por los agujeros de las manos. Gracias a\nProtector resiste erupciones volcánicas."
          alpha_sapphire: "Pone rocas en los agujeros de sus manos y las lanza con los\nmúsculos. A veces lanza Geodude."
        ko:
          omega_ruby: "손바닥의 구멍에서 꼬마돌을\n발사한다. 전신의 프로텍터는\n화산의 분화도 견뎌낸다."
          alpha_sapphire: "바위를 손바닥의 구멍에 채워서\n근육의 힘으로 발사한다.\n드물게 꼬마돌을 날린다."
tangrowth:
  species_id: 465
