          alpha_sapphire: "かくごを　きめることで　ぜんしんに\nちからが　みなぎって　すばやくなり\nとびはねると　ざんぞうが　みえる。"
        jp_kanji:
          omega_ruby: "海や　川など　水面を　走り\n世界中を　駆け巡る。\n美しい　水辺に　現れる。"
          alpha_sapphire: "覚悟を　決めることで　全身に\n力が　みなぎって　素早くなり\n飛び跳ねると　残像が　みえる。"
        en:
          omega_ruby: "It crosses the world, running over the surfaces of\noceans and rivers. It appears at scenic waterfronts."
          alpha_sapphire: "When it is resolute, its body fills with power and it\nbecomes swifter. Its jumps are then too fast\nto follow."
        fr:
          omega_ruby: "Il parcourt le monde en courant à la surface des mers\net des cours d’eau. Il apparaît là où l’eau est très pure."
          alpha_sapphire: "Lorsqu’il est résolu, de l’énergie sature son corps et\nle propulse à des vitesses qui dépassent la perception\nhumaine."
        it:
          omega_ruby: "Scorrazza per il mondo muovendosi sulla superficie dei mari\no dei fiumi. Appare nei lidi più ameni."
          alpha_sapphire: "Quando è pronto a passare all’azione, si carica d’energia\ne diventa così veloce che è impossibile seguirlo con gli occhi."
        de:
          omega_ruby: "Es kann auf dem Wasser laufen und reist auf Flüssen und\nMeeren um die Welt. Zu sehen in malerischen Küstengebieten."
          alpha_sapphire: "Ist es sich seiner Sache sicher, strotzt es vor Kraft und seine\nSprünge werden zu schnell für die menschliche Wahrnehmung."
        es:
          omega_ruby: "Corre por mares, ríos o cualquier superficie acuática de todo\nel mundo. Aparece en aguas límpidas."
          alpha_sapphire: "Cuando está decidido, su cuerpo rebosa brío, y es capaz de\nsaltar más alto y correr más de lo que la vista alcanza."
        ko:
          omega_ruby: "바다나 강 등의 수면을 달려\n세계 곳곳을 뛰어다닌다.\n아름다운 물가에 나타난다."
          alpha_sapphire: "각오를 굳히는 것으로 전신에\n힘이 넘쳐흘러 재빨라지며\n뛰어오르면 잔상이 보인다."
