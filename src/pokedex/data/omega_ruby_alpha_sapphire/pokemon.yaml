      descriptions:
        jp_kana:
          omega_ruby: "えいよう　まんてんの　わきみずを　おなかいっぱい\nのむ　ことで　はがねの　からだが　きたえられる。\nおいしい　わきみずの　ちかくに　すを　つくる。"
          alpha_sapphire: "いしや　みずに　ふくまれる　てつぶんを　たべる。\nてっこうせきの　うもれた　やまに　すを　つくるが\nてつを　とりにくる　にんげんと　あらそいになる。"
        jp_kanji:
          omega_ruby: "栄養　満点の　わき水を　お腹いっぱい\n飲む　ことで　鋼の　体が　鍛えられる。\n美味しい　わき水の　近くに　巣を　つくる。"
          alpha_sapphire: "石や　水に　含まれている　鉄分を　食べる。\n鉄鉱石の　埋もれた　山に　巣を　つくるが\n鉄を　取りに来る　人間と　争いになる。"
        en:
          omega_ruby: "Lairon tempers its steel body by drinking highly nutritious\nmineral springwater until it is bloated. This Pokémon makes its\nnest close to springs of delicious water."
          alpha_sapphire: "Lairon feeds on iron contained in rocks and water. It makes\nits nest on mountains where iron ore is buried. As a result,\nthe Pokémon often clashes with humans mining the iron ore."
        fr:
          omega_ruby: "Galegon adoucit son corps d’acier en buvant une eau minérale\njusqu’à ce qu’il soit tout boursouflé. Ce Pokémon fait son nid\nprès des sources d’eau minérale riches en nutriments."
          alpha_sapphire: "Galegon se nourrit du fer contenu dans les rochers et\ndans l’eau. Il fait son nid sur les montagnes renfermant\ndu minerai de fer. Du coup, il se confronte souvent\naux humains travaillant dans les mines."
        it:
          omega_ruby: "Lairon tempra la sua fibra d’acciaio ingerendo dosi enormi\ndi minerali altamente nutritivi presenti nell’acqua di sorgente.\nQuesto Pokémon crea la propria dimora nei pressi di sorgenti\nd’acqua purissima."
          alpha_sapphire: "Lairon si nutre del ferro contenuto nelle rocce e nell’acqua.\nCrea la propria dimora in montagna vicino a giacimenti ferrosi.\nPer questo motivo il Pokémon si scontra spesso con minatori\nalla ricerca di pepite di ferro."
        de:
          omega_ruby: "Stollrak temperiert seinen Körper, indem es ausgesprochen\nnahrhaftes Quellwasser trinkt, bis es völlig aufgebläht ist.\nDieses Pokémon baut sein Nest in der Nähe von Quellen,\naus denen köstliches Wasser sprudelt."
          alpha_sapphire: "Stollrak ernährt sich von Eisen, das in Steinen und Wasser\nenthalten ist. Es baut sein Nest in Bergen, in denen Eisenerz\nabgebaut wird. Es gerät dabei häufig mit Bergarbeitern\nin Konflikt."
        es:
          omega_ruby: "Lairon templa su cuerpo de acero bebiendo agua mineral muy\nrica en nutrientes hasta que no puede más. Este Pokémon\nsuele crear su nido cerca de manantiales de rica agua."
          alpha_sapphire: "Lairon se alimenta del hierro que hay en las rocas y el agua.\nHace su nido en las montañas, de donde se saca el hierro.\nPor eso, se encuentra muchas veces con las personas que\nestán trabajando en las minas extrayéndolo."
        ko:
          omega_ruby: "영양 만점인 샘물을 배 속 가득\n마셔서 강철 몸을 단련시킨다.\n맛있는 샘물 가까이에 거처를 만든다."
          alpha_sapphire: "돌이나 물에 포함된 철 성분을 먹는다.\n철광석이 묻힌 산에 둥지를 만들지만\n철을 캐러 오는 인간과 다투게 된다."
