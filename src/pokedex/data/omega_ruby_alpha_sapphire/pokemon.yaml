      descriptions:
        jp_kana:
          omega_ruby: "ゆきの　おおい　とちで　くらす　ポケモン。\nはるや　なつの　ゆきの　ふらない　きせつには\nしょうにゅうどうの　おくで　しずかに　くらす。"
          alpha_sapphire: "ゆきや　こおりだけを　たべて　くらしている。\nユキワラシの　おとずれた　いえは　だいだい\nさかえるという　いいつたえが　のこっている。"
        jp_kanji:
          omega_ruby: "雪の　多い　土地で　暮らす　ポケモン。\n春や　夏の　雪の　降らない　季節には\nしょう乳洞の　奥で　静かに　暮らす。"
          alpha_sapphire: "雪や　氷だけを　食べて　暮らしている。\nユキワラシの　訪れた　家は　代々\n栄えるという　言い伝えが　残っている。"
        en:
          omega_ruby: "Snorunt live in regions with heavy snowfall. In seasons\nwithout snow, such as spring and summer, this Pokémon\nsteals away to live quietly among stalactites and stalagmites\ndeep in caverns."
          alpha_sapphire: "Snorunt survives by eating only snow and ice. Old folklore\nclaims that a house visited by this Pokémon is sure to prosper\nfor many generations to come."
        fr:
          omega_ruby: "Les Stalgamin vivent dans les régions enneigées.\nPendant les saisons sans neige, comme le printemps\net l’été, ces Pokémon se retirent pour vivre dans\nles cavernes, au milieu des stalactites et des stalagmites."
          alpha_sapphire: "Stalgamin survit en se nourrissant uniquement de neige\net d’eau. De vieilles légendes racontent que les maisons\nvisitées par ce Pokémon sont assurées d’être prospères\npendant plusieurs générations."
        it:
          omega_ruby: "Snorunt vive in regioni molto nevose. Nelle stagioni più calde,\ncome l’estate e la primavera, questo Pokémon si ritira a vivere\nin tranquillità nel cuore delle caverne tra stalattiti e stalagmiti."
          alpha_sapphire: "Snorunt si nutre soltanto di neve e ghiaccio.\nGli antichi detti popolari affermano che questo Pokémon porta\nfortuna e prosperità per molte generazioni alle case che visita."
        de:
          omega_ruby: "Schneppke lebt in Gebieten mit heftigem Schneefall.\nIn Jahreszeiten, in denen es nicht schneit, wie im Frühling\noder im Sommer, nimmt das Pokémon Reißaus, um in einer\nHöhle ein ruhiges Leben zwischen Stalaktiten und Stalagmiten\nzu führen."
          alpha_sapphire: "Schneppke kann überleben, indem es nur Schnee und Eis\nzu sich nimmt. Alte Überlieferungen besagen, dass ein Haus,\nwelches von diesem Pokémon besucht wird, vielen kommenden\nGenerationen Glück und Erfolg beschert."
        es:
          omega_ruby: "Snorunt vive en zonas de grandes nevadas. En primavera y\nverano, cuando no nieva, se retira a las cavernas para vivir\ntranquilamente entre estalactitas y estalagmitas."
          alpha_sapphire: "Snorunt sobrevive alimentándose solo de nieve y hielo. Se\ndice que la casa por la que pase este Pokémon estará llena\nde prosperidad durante generaciones."
        ko:
          omega_ruby: "눈이 많은 땅에서 사는 포켓몬이다.\n봄이나 여름처럼 눈이 내리지 않는 계절에는\n석회암 동굴 깊은 곳에서 조용히 산다."
          alpha_sapphire: "눈이나 얼음만 먹고 생활하고 있다.\n눈꼬마가 찾아간 집은 대대로\n번창한다는 전설이 남아 있다."
