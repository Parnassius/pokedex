          alpha_sapphire: "Una volta azzannato il nemico, Croconaw non molla la presa\nfacilmente. Le zanne a punta ricurva all’indietro, a mo’ di\namo da pesca, rendono impossibile estrarle quando sono\nconficcate in profondità."
