        - swift_swim
        - poison_touch
      hidden_ability: water_absorb
      descriptions:
        jp_kana:
          omega_ruby: "こぶしの　コブを　しんどうさせると\nパンチの　いりょくが　ばいぞうする。\nいちげきで　おおいわを　ふんさい。"
          alpha_sapphire: "あたまの　コブから　しんけいを\nマヒさせる　えきたいを　とばす。\nしんどうで　あいてを　くるしめる。"
        jp_kanji:
          omega_ruby: "こぶしの　コブを　振動させると\nパンチの　威力が　倍増する。\n一撃で　大岩を　粉砕。"
          alpha_sapphire: "頭の　コブから　神経を　マヒさせる\n液体を　飛ばす。\n振動で　相手を　苦しめる。"
        en:
          omega_ruby: "It increases the power of its punches by vibrating\nthe bumps on its fists. It can turn a boulder to\nrubble with one punch."
          alpha_sapphire: "They shoot paralyzing liquid from their head bumps.\nThey use vibration to hurt their opponents."
        fr:
          omega_ruby: "Son coup de poing est plus fort quand il fait vibrer la pustule\ndessus. Il peut briser un gros rocher d’un coup."
          alpha_sapphire: "Il fait gicler un liquide paralysant des pustules sur sa tête,\net attaque ses ennemis à coups de vibrations."
        it:
          omega_ruby: "Facendo vibrare le protuberanze sui pugni, ne raddoppia\nla potenza. Frantuma enormi massi con un colpo."
          alpha_sapphire: "Dalle escrescenze che ha sulla testa spara un liquido che\nparalizza i nervi. Usa le vibrazioni per attaccare il nemico."
        de:
          omega_ruby: "Wenn es die Beulen an seinen Fäusten zum Schwingen bringt,\nkann es doppelt so fest zuschlagen und Felsen zertrümmern."
          alpha_sapphire: "Es schießt eine lähmende Flüssigkeit aus den Beulen\nauf seinem Kopf. Es plagt seine Gegner mit Schallwellen."
        es:
          omega_ruby: "Aumenta la potencia de sus puñetazos haciendo vibrar sus\npuños. Es capaz de quebrar una roca de un solo golpe."
          alpha_sapphire: "Despide un líquido paralizador por los bultos de su cabeza.\nAtormenta a sus oponentes con enormes vibraciones."
        ko:
          omega_ruby: "주먹의 혹을 진동시켜\n펀치의 위력을 배가시킨다.\n일격에 큰 바위를 부스러뜨린다."
          alpha_sapphire: "머리의 혹에서 신경을\n마비시키는 액체를 날린다.\n진동으로 상대를 괴롭힌다."
throh:
  species_id: 538
  names:
    jp_kana: ナゲキ
    jp_kanji: ナゲキ
    en: Throh
    fr: Judokrak
    it: Throh
    de: Jiutesto
    es: Throh
    ko: 던지미
