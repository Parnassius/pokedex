        jp_kana:
          omega_ruby: "ふだんは　ちゅういしないと　ききとれない　くらい\nちいさな　こえだが　きけんを　さっち　すると\nずつうを　おこす　ほどの　おおごえで　なきだす。"
          alpha_sapphire: "ひとたび　おおごえで　なきだすと　じぶんの\nこえに　びっくりして　さらに　はげしく　なく。\nなきやむと　つかれて　ねむってしまう。"
        jp_kanji:
          omega_ruby: "普段は　注意しないと　聞き取れない　くらい\n小さな　声だが　危険を　察知　すると\n頭痛を　起こす　ほどの　大声で　鳴き出す。"
          alpha_sapphire: "一度　大声で　鳴き出すと　自分の\n声に　びっくりして　さらに　激しく　鳴く。\n鳴き止むと　疲れて　眠ってしまう。"
        en:
          omega_ruby: "Normally, Whismur’s voice is very quiet—it is barely audible\neven if one is paying close attention. However, if this Pokémon\nsenses danger, it starts crying at an earsplitting volume."
          alpha_sapphire: "Whismur is very timid. If it starts to cry loudly, it becomes\nstartled by its own crying and cries even harder. When it finally\nstops crying, the Pokémon goes to sleep, all tired out."
        fr:
          omega_ruby: "Généralement, la voix de Chuchmur est très douce, à peine\naudible, même si on tend l’oreille. Pourtant, lorsque\nce Pokémon sent l’approche du danger, il se met à crier\nsi fort qu’il peut déchirer des tympans."
          alpha_sapphire: "Chuchmur est très timide. S’il commence à pleurer, il s’effraie\ntout seul et pleure de plus belle. Quand ce Pokémon finit\nenfin de pleurer, il s’endort, épuisé."
        it:
          omega_ruby: "Normalmente la voce di Whismur è molto tenue, quasi\nimpercettibile, anche se ci si concentra. Tuttavia,\nse questo Pokémon percepisce un pericolo, inizia\na emettere suoni assordanti."
          alpha_sapphire: "Whismur è estremamente timido. Se gli capita di emettere\nsuoni forti, è atterrito nell’udire la sua stessa voce, quindi\nurla ancora più fragorosamente. Quando finalmente si placa,\nva a dormire, spossato."
        de:
          omega_ruby: "Normalerweise ist Flurmels Stimme sehr leise,\nselbst mit größter Anstrengung ist sie kaum hörbar.\nWenn dieses Pokémon jedoch eine Gefahr wittert,\nstößt es ohrenbetäubende Schreie aus."
          alpha_sapphire: "Flurmel ist sehr scheu. Wenn es laut brüllt, erschrickt es und\nbrüllt dadurch noch lauter. Wenn es schließlich damit aufhört,\nist es völlig ausgepumpt und legt sich schlafen."
        es:
          omega_ruby: "Normalmente, Whismur tiene una voz tenue, casi inaudible,\naunque se preste atención. No obstante, si este Pokémon\nsiente que el peligro acecha, puede ponerse a chillar con un\nvolumen ensordecedor."
          alpha_sapphire: "Whismur es muy tímido. Si empieza a gritar fuerte, se asusta a\nsí mismo y chilla más alto todavía. Cuando para por fin, se va\na dormir completamente agotado."
        ko:
          omega_ruby: "평소에는 주의를 기울여야 들릴 만큼\n작은 목소리지만 위험을 감지하면\n두통을 일으킬 만큼 큰 소리로 울어댄다."
          alpha_sapphire: "한 번 큰 소리로 울기 시작하면 자신의\n목소리에 놀라 한층 더 심하게 운다.\n울음을 그치면 지쳐서 잠들어버린다."
