      descriptions:
        jp_kana:
          omega_ruby: "おおきな　じしんが　おこると　やまに　すんでいる\nゴローニャが　なんびきも　ふもとまで　ごろごろ\nころがり　おちてくる　ことが　あるよ。"
          alpha_sapphire: "やまの　しゃめんに　ほってある　みぞは　ころがり\nおちてきた　ゴローニャが　みんかに　ぶつからない\nように　するための　とおりみちに　なっているぞ。"
        jp_kanji:
          omega_ruby: "大きな　地震が　起こると　山に　すんでいる\nゴローニャが　何匹も　ふもとまで　ごろごろ\n転がり　落ちてくる　ことが　あるよ。"
          alpha_sapphire: "山の　斜面に　掘ってある　溝は　転がり\n落ちてきた　ゴローニャが　民家に　ぶつからない\nように　するための　通り道に　なっているぞ。"
        en:
          omega_ruby: "Golem live up on mountains. If there is a large earthquake,\nthese Pokémon will come rolling down off the mountains\nen masse to the foothills below."
          alpha_sapphire: "Golem is known for rolling down from mountains. To prevent\nthem from rolling into the homes of people downhill, grooves\nhave been dug into the sides of mountains to serve as\nguideways for diverting this Pokémon’s course."
        fr:
          omega_ruby: "Grolem vit à la montagne. Lorsqu’il y a un tremblement de\nterre, ces Pokémon roulent en groupe vers les contreforts\nmontagneux."
          alpha_sapphire: "On sait que les Grolem se laissent rouler en bas\ndes montagnes. Afin d’éviter qu’ils roulent sur les maisons\ndes gens, des tranchées ont été creusées le long des\nmontagnes pour les guider dans leurs descentes infernales."
        it:
          omega_ruby: "I Golem vivono in alta montagna. In caso di terremoto,\nquesti Pokémon rotolano giù per i monti in massa\ne si fermano a valle."
          alpha_sapphire: "Golem è noto per rotolare in discesa lungo il pendio dei monti.\nPer evitare che finisca dentro le case a valle, sono stati creati\ndei canaloni sui pendii dei monti per guidarne il percorso\ndurante la discesa."
        de:
          omega_ruby: "Geowaz lebt hoch in den Bergen. Gibt es ein starkes\nErdbeben, rollt dieses Pokémon so lange den Berg\nhinunter, bis es schließlich unten angekommen ist."
          alpha_sapphire: "Geowaz ist dafür bekannt, dass es Berghänge herunterrollt.\nDamit es nicht in die Häuser der Menschen hineinrollt, wurden\nGräben so an den Bergen angelegt, dass der Weg dieses\nPokémon umgeleitet wird."
        es:
          omega_ruby: "Golem vive en las montañas. Si se produce un gran terremoto,\nestos Pokémon descienden rodando en masa por las laderas."
          alpha_sapphire: "Golem es conocido por su afición a bajar de las montañas\nrodando. La gente que vive en la falda de las mismas ha\ncavado surcos para conducirlo en su descenso por las laderas\ny evitar que se cuele en sus casas."
        ko:
          omega_ruby: "큰 지진이 일어나면 산에 사는 딱구리\n여러 마리가 산기슭까지 데굴데굴\n굴러 내려오는 일이 있다."
          alpha_sapphire: "산의 경사면에 파놓은 홈은 굴러\n내려오는 딱구리가 민가에 부딪히지\n않게 하기 위한 코스로 되어 있다."
