          omega_ruby: "ミツの　染み込んだ　手の平を　なめている。\nヒメグマの　ミツは　果物と　スピアーの\n集めた　花粉が　ブレンドされて　つくられる。"
          alpha_sapphire: "ハチミツの　染み込んだ　手の平を　なめている。\nヒメグマの　ハチミツは　果物と　スピアーの\n集めた　花粉が　ブレンドされて　つくられる。"
        en:
          omega_ruby: "This Pokémon likes to lick its palms that are sweetened by\nbeing soaked in honey. Teddiursa concocts its own honey\nby blending fruits and pollen collected by Beedrill."
          alpha_sapphire: "This Pokémon likes to lick its palms that are sweetened by\nbeing soaked in honey. Teddiursa concocts its own honey\nby blending fruits and pollen collected by Beedrill."
        fr:
          omega_ruby: "Ce Pokémon aime se lécher les paumes quand elles sont\nencore pleines de miel. Teddiursa concocte son propre miel\nen mélangeant les fruits et le pollen ramassés par Dardargnan."
          alpha_sapphire: "Ce Pokémon aime se lécher les paumes quand elles sont\nencore pleines de miel. Teddiursa concocte son propre miel\nen mélangeant les fruits et le pollen récolté par Dardargnan."
        it:
          omega_ruby: "È solito inzuppare nel miele le zampe anteriori per poi\nsucchiarle avidamente. Teddiursa produce il proprio miele\ndai frutti e dal polline raccolto da Beedrill."
          alpha_sapphire: "È solito inzuppare nel miele le zampe anteriori per poi\nsucchiarle avidamente. Teddiursa produce il proprio miele\ndai frutti e dal polline raccolto da Beedrill."
        de:
          omega_ruby: "Teddiursa leckt gern seine mit Honig bedeckten Pranken ab.\nDieses Pokémon bereitet seinen eigenen Honig zu, indem es\ndie von Bibor gesammelten Früchte und Pollen miteinander\nvermengt."
          alpha_sapphire: "Teddiursa leckt gern seine mit Honig bedeckten Pfoten ab.\nDieses Pokémon bereitet seinen eigenen Honig zu, indem es\ndie von Bibor gesammelten Früchte und Pollen vermengt."
        es:
          omega_ruby: "A Teddiursa le encanta chuparse las palmas impregnadas de\ndulce miel. Este Pokémon fabrica su propia miel mezclando\nfrutos y el polen que recoge Beedrill."
          alpha_sapphire: "A Teddiursa le encanta chuparse las palmas impregnadas de\ndulce miel. Este Pokémon fabrica su propia miel mezclando\nfrutos y el polen que recoge Beedrill."
        ko:
          omega_ruby: "꿀이 밴 손바닥을 핥고 있다.\n깜지곰의 꿀은 과일과 독침붕이\n모은 꽃가루가 혼합되어 만들어진다."
          alpha_sapphire: "꿀이 밴 손바닥을 핥고 있다.\n깜지곰의 꿀은 과일과 독침붕이\n모은 꽃가루가 혼합되어 만들어진다."
