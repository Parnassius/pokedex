          alpha_sapphire: "からだに　かいすいを　ためると　ボールの　ように\nじめんで　とびはねることが　できるように　なる。\nたくさん　ためると　たかく　ジャンプできる。"
        jp_kanji:
          omega_ruby: "目の　上に　ついている　鼻の　穴から\n体に　ためた　海水を　吹き出し\n人を　驚かすのが　大好きな　ポケモンだ。"
          alpha_sapphire: "体に　海水を　ためると　ボールの　ように\n地面で　飛び跳ねることが　できるように　なる。\n沢山　ためると　高く　ジャンプできる。"
        en:
          omega_ruby: "Wailmer’s nostrils are located above its eyes. This playful\nPokémon loves to startle people by forcefully snorting out\nseawater it stores inside its body out of its nostrils."
          alpha_sapphire: "Wailmer can store water inside its body to transform itself\ninto a ball for bouncing around on the ground. By filling itself\nup with more water, this Pokémon can elevate the height of\nits bounces."
        fr:
          omega_ruby: "Les narines de Wailmer sont situées au-dessus de ses yeux.\nCe joyeux Pokémon adore effrayer les gens en expulsant\nde l’eau de mer par les narines."
          alpha_sapphire: "Wailmer peut stocker de l’eau dans son corps pour se\ntransformer en balle et rebondir sur le sol. Plus ce Pokémon\nse remplit d’eau, plus il peut rebondir haut."
        it:
          omega_ruby: "Le narici di Wailmer sono posizionate sopra gli occhi.\nÈ un giocherellone e ama spaventare le persone sparando\ndalle narici l’acqua del mare, che accumula all’interno\ndel proprio corpo."
          alpha_sapphire: "Wailmer accumula acqua all’interno del proprio corpo per\ntrasformarsi in un pallone e rimbalzare al suolo. Questo\nPokémon aumenta l’altezza del balzo incrementando\nla quantità d’acqua con cui si gonfia."
        de:
          omega_ruby: "Wailmers Nasenlöcher liegen über seinen Augen. Dieses\nverspielte Pokémon erschreckt gern Menschen, indem\nes das Meerwasser, das es in seinem Körper speichert,\nmit aller Kraft herausprustet."
          alpha_sapphire: "Wailmer kann Wasser in seinem Körper speichern,\num sich in einen Ball zu verwandeln und herumzuhüpfen.\nWenn es die Wassermenge steigert, kann dieses Pokémon\nnoch höher hüpfen."
        es:
          omega_ruby: "Wailmer tiene los espiráculos encima de la cabeza. A este\njuguetón Pokémon le encanta asustar a la gente expulsando\nel agua que acumula a través de estos orificios."
          alpha_sapphire: "Wailmer puede almacenar agua dentro de su organismo para\nconvertirse en una pelota y botar por tierra firme. Cuanta más\nagua trague, mayor altura alcanzará al saltar."
        ko:
          omega_ruby: "눈 위에 있는 콧구멍을 통해\n몸에 모아둔 바닷물을 뿜어내서\n사람을 놀라게 하는 것을 좋아하는 포켓몬이다."
          alpha_sapphire: "몸에 바닷물을 저장하면 공처럼\n땅에서 튀어 오를 수 있게 된다.\n많이 저장하면 더 높이 점프할 수 있다."
wailord:
  species_id: 321
  names:
    jp_kana: ホエルオー
    jp_kanji: ホエルオー
    en: Wailord
    fr: Wailord
    it: Wailord
    de: Wailord
    es: Wailord
    ko: 고래왕
  forms:
    wailord:
      form_id: 0
      base_stats:
        hp: 170
        attack: 90
        defense: 45
        special_attack: 90
        special_defense: 45
        speed: 60
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - field
        - water_2
      abilities:
        - water_veil
        - oblivious
      hidden_ability: pressure
      descriptions:
        jp_kana:
          omega_ruby: "みつかった　なかでは　さいだいの　ポケモン。\nおおうなばらを　ゆったりと　およぎ　おおきな\nくちで　いっきに　たいりょうの　エサを　たべる。"
          alpha_sapphire: "えものを　おいたてる　ために　すいちゅうから\nジャンプして　おおきな　みずしぶきを　あげる。\nむれで　ジャンプする　すがたは　だいはくりょく。"
        jp_kanji:
          omega_ruby: "見つかった　中では　最大の　ポケモン。\n大海原を　ゆったりと　泳ぎ　大きな\n口で　一気に　大量の　エサを　食べる。"
          alpha_sapphire: "獲物を　追い立てる　ために　水中から\nジャンプして　大きな　水しぶきを　あげる。\n群れで　ジャンプする　姿は　大迫力。"
        en:
          omega_ruby: "Wailord is the largest of all identified Pokémon up to now.\nThis giant Pokémon swims languorously in the vast open sea,\neating massive amounts of food at once with its enormous\nmouth."
          alpha_sapphire: "When chasing prey, Wailord herds them by leaping out of the\nwater and making a humongous splash. It is breathtaking to\nsee this Pokémon leaping out of the sea with others in its pod."
        fr:
          omega_ruby: "Wailord est le plus grand Pokémon découvert à ce jour.\nCe Pokémon géant nage lascivement dans les grandes\nétendues maritimes, avalant d’énormes quantités\nde nourriture en une seule de ses monstrueuses bouchées."
          alpha_sapphire: "Lorsqu’il chasse ses proies, Wailord les rassemble en sautant\nhors de l’eau et en créant une énorme vague. La vue de\nplusieurs de ces Pokémon bondissant hors de l’eau laisse\ngénéralement sans voix."
        it:
          omega_ruby: "Wailord è il più grande tra tutti i Pokémon finora identificati.\nCon la sua gigante mole nuota dolcemente nella vastità\ndel mare aperto, ingoiando enormi quantità di cibo con\nla bocca enorme."
          alpha_sapphire: "Cacciando le prede, i Wailord eseguono balzi e tuffi\nspettacolari in acqua. È davvero uno spettacolo mozzafiato\nvedere questi Pokémon esibirsi in branco."
        de:
          omega_ruby: "Wailord ist bisher das größte aller identifizierten Pokémon.\nEs schwimmt reglos auf dem offenen Meer und nimmt mit\nseinem enormen Maul riesige Mengen an Nahrung auf."
          alpha_sapphire: "Wailord jagt seine Beute, indem es aus dem Meer\nherausspringt und ein gewaltiges Platschen erzeugt.\nEs ist atemberaubend, eine Gruppe dieser Pokémon\naus dem Wasser springen zu sehen."
        es:
          omega_ruby: "Wailord es el mayor Pokémon registrado hasta la fecha. Este\ncoloso va nadando lánguidamente por el ancho mar con la\nboca abierta para que penetre la mayor cantidad posible de\nalimento."
          alpha_sapphire: "Wailord caza con otros miembros de su especie. Es\nespectacular ver cómo saltan y chapotean en el agua para\nagrupar a sus presas. Realmente impresiona ver cómo\nimpactan contra el agua."
        ko:
          omega_ruby: "발견된 것 중 가장 큰 포켓몬이다.\n크고 넓은 바다를 느긋이 헤엄치며\n큰 입으로 한 번에 대량의 먹이를 먹는다."
          alpha_sapphire: "먹이를 몰아가기 위해서 물속부터\n점프하여 큰 물보라를 일으킨다.\n무리로 점프하는 모습은 박력이 넘친다."
