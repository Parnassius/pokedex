          omega_ruby: "すうひきの　コマタナを　たたかわせ\nきずつき　うごけなくなった　えものを\nまっぷたつにする　こわい　ポケモン。"
          alpha_sapphire: "おおぜいの　コマタナを　したがえて\nえものを　むれで　おいつめる。\nとどめは　キリキザンが　さす。"
        jp_kanji:
          omega_ruby: "数匹の　コマタナを　戦わせ\n傷つき　動けなくなった　獲物を\n真っ二つにする　怖い　ポケモン。"
          alpha_sapphire: "大勢の　コマタナを　従えて\n獲物を　群れで　追いつめる。\nとどめは　キリキザンが　刺す。"
        en:
          omega_ruby: "This pitiless Pokémon commands a group of\nPawniard to hound prey into immobility. It then\nmoves in to finish the prey off."
          alpha_sapphire: "Bisharp pursues prey in the company of a large\ngroup of Pawniard. Then Bisharp finishes off\nthe prey."
        fr:
          omega_ruby: "Un Pokémon sans pitié qui tranche en deux ses proies\nimmobilisées par les cohortes de Scalpion qu’il commande."
          alpha_sapphire: "Il chasse avec un groupe de Scalpion sous ses ordres,\nmais c’est lui qui donne le coup de grâce."
        it:
          omega_ruby: "È molto crudele. Lascia che un gruppo di Pawniard attacchi\nla preda e, quando è ferita e non può più muoversi, la finisce."
          alpha_sapphire: "Accompagnato da molti Pawniard, blocca le prede grazie alla\nforza del gruppo. È Bisharp a dare il colpo di grazia."
        de:
          omega_ruby: "Ein kaltblütiges Pokémon, das Gegner zunächst mit einer\nSchar von Gladiantri lähmt und dann zweiteilt."
          alpha_sapphire: "Es rückt seinen Opfern mit einer Schar von Gladiantri im\nGefolge auf den Pelz. Den letzten Hieb übernimmt es selbst."
        es:
          omega_ruby: "Un Pokémon temible que remata a su presa una vez que su\nséquito de Pawniard la ha debilitado e inmovilizado."
          alpha_sapphire: "Su séquito son los Pawniard. Acorralan a su presa con todo\nel grupo y Bisharp propina el golpe de gracia."
        ko:
          omega_ruby: "몇 마리의 자망칼과 싸우게 해서\n상처 입고 움직일 수 없게 된 먹이를\n두 동강 내버리는 무서운 포켓몬."
          alpha_sapphire: "많은 자망칼을 거느리며\n무리를 지어 먹이를 바싹 몰아넣는다.\n마무리는 절각참이 한다."
bouffalant:
  species_id: 626
  names:
