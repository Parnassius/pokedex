          alpha_sapphire: "ひしがたの　けっしょうで　こおりの\nかべを　しゅんかんてきに　つくり\nてきの　こうげきを　ふせぐのだ。"
        jp_kanji:
          omega_ruby: "マイナス１５０度の　冷気を\nひし形の　結晶から　出して\n敵を　包み　氷漬けにする。"
          alpha_sapphire: "ひし形の　結晶で\n氷の　壁を　瞬間的に　作り\n敵の　攻撃を　防ぐのだ。"
        en:
          omega_ruby: "The diamond-shaped crystals on its body\nexpel air as cold as -240 degrees Fahrenheit,\nsurrounding its enemies and encasing them in ice."
          alpha_sapphire: "Using its diamond-shaped crystals,\nit can instantly create a wall of\nice to block an opponent’s attack."
        fr:
          omega_ruby: "Les cristaux qui parsèment son corps lui permettent de piéger\nses ennemis dans la glace en émettant de l’air refroidi\nà -150 °C."
          alpha_sapphire: "En utilisant ses cristaux, il peut créer en un instant un mur\nde glace pour se protéger des attaques ennemies."
        it:
          omega_ruby: "Emette aria gelida a -150 °C dai cristalli romboidali che ha\nsul corpo congelando i nemici."
          alpha_sapphire: "Si difende dagli attacchi dei nemici creando in pochi istanti\nun muro di ghiaccio grazie ai cristalli romboidali del suo corpo."
        de:
          omega_ruby: "Mit der -150 °C kalten Luft, die den diamantförmigen Kristallen\nauf seinem Körper entströmt, friert es Gegner ein."
          alpha_sapphire: "Es nutzt seine diamantförmigen Kristalle, um im Nu eine Wand\naus Eis zur Abwehr gegnerischer Angriffe zu erschaffen."
        es:
          omega_ruby: "Expulsa un gas gélido a temperaturas inferiores a los -150 °C\na través de sus cristales romboides y congela así a su\nenemigo."
          alpha_sapphire: "Gracias a sus cristales con forma de rombo, puede crear al\nmomento una barrera de hielo para bloquear el ataque de su\nenemigo."
        ko:
          omega_ruby: "마이너스 150도의 냉기를\n마름모꼴의 결정에서 내뿜어\n적을 감싸 얼어붙게 한다."
          alpha_sapphire: "마름모꼴의 결정으로\n얼음벽을 순간적으로 만들어\n적의 공격을 막는다."
sylveon:
