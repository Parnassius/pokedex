        jp_kana:
          omega_ruby: "からだの　ほとんどが　かいすい。\nかいていには　ブルンゲルが　しずめた\nふねで　できた　しろが　あるという。"
          alpha_sapphire: "ブルンゲルの　すみかに　まよいこんだ\nふねは　しずめられて　のりくみいんの\nいのちは　すいとられて　しまうのだ。"
        jp_kanji:
          omega_ruby: "体の　ほとんどが　海水。\n海底には　ブルンゲルが　沈めた\n船で　できた　城が　あるという。"
          alpha_sapphire: "ブルンゲルの　住処に　迷いこんだ\n船は　沈められて　乗組員の　命は\n吸い取られて　しまうのだ。"
        en:
          omega_ruby: "Its body is mostly seawater. It’s said there’s a\ncastle of ships Jellicent have sunk on the seafloor."
          alpha_sapphire: "The fate of the ships and crew that wander into\nJellicent’s habitat: all sunken, all lost, all vanished."
        fr:
          omega_ruby: "Il est presque entièrement fait d’eau de mer. On dit qu’il vit\ndans un palais fait des épaves des bateaux qu’il a coulés."
          alpha_sapphire: "Les bateaux qui s’aventurent sur son territoire coulent,\net Moyade aspire l’énergie vitale des marins."
        it:
          omega_ruby: "È composto per lo più d’acqua marina. Dicono che si sia\ncostruito un castello con i relitti delle navi che ha affondato."
          alpha_sapphire: "Affonda le sfortunate navi che si avventurano nel suo territorio\ne consuma l’energia dell’equipaggio."
        de:
          omega_ruby: "Es heißt, am Meeresboden gebe es einen Palast aus Schiffen,\ndie es versenkt hat. Es besteht fast nur aus Meerwasser."
          alpha_sapphire: "Dringt ein Schiff in sein Revier ein, bringt es dieses zum\nKentern und saugt die Lebensenergie aus der Besatzung."
        es:
          omega_ruby: "Su cuerpo se compone de agua salada. Dicen que ha\nconstruido un palacio en el fondo del mar con restos de\nbarcos."
          alpha_sapphire: "Jellicent hunde los barcos que acaban perdidos en su\nterritorio y absorbe la energía vital de su tripulación."
        ko:
          omega_ruby: "몸 대부분이 해수다.\n해저에는 탱탱겔이 가라앉힌\n배로 만들어진 성이 있다고 한다."
          alpha_sapphire: "탱탱겔의 거처로 길을 잃고\n들어간 배는 가라앉으며 승무원의\n생명이 흡수되어 버린다."
alomomola:
  species_id: 594
  names:
