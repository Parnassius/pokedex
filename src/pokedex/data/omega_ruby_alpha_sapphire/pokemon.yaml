        en:
          omega_ruby: "Rattata is cautious in the extreme. Even while it is asleep,\nit constantly listens by moving its ears around. It is not picky\nabout where it lives—it will make its nest anywhere."
          alpha_sapphire: "Rattata is cautious in the extreme. Even while it is asleep,\nit constantly listens by moving its ears around. It is not\npicky about where it lives—it will make its nest anywhere."
        fr:
          omega_ruby: "Rattata est extrêmement prudent. Même lorsqu’il est endormi,\nil fait pivoter ses oreilles pour écouter autour de lui.\nEn ce qui concerne son habitat, il n’est vraiment pas difficile.\nIl peut faire son nid n’importe où."
          alpha_sapphire: "Rattata est extrêmement prudent. Même lorsqu’il est endormi,\nil fait pivoter ses oreilles pour écouter autour de lui.\nEn ce qui concerne son habitat, il n’est vraiment pas difficile.\nIl peut faire son nid n’importe où."
        it:
          omega_ruby: "Rattata è estremamente cauto. Anche quando dorme tiene\nsempre le orecchie tese, muovendole come sonde. Non ha\nparticolari esigenze di habitat: costruisce la propria tana\novunque."
          alpha_sapphire: "Rattata è estremamente cauto. Anche quando dorme tiene\nsempre le orecchie tese, muovendole come sonde. Non ha\nparticolari esigenze di habitat: costruisce la propria tana\novunque."
        de:
          omega_ruby: "Rattfratz ist extrem vorsichtig. Sogar im Schlaf nimmt es\nalles wahr, indem es seine Ohren bewegt. Es stellt keine\ngroßen Ansprüche an seinen Lebensraum und richtet sein\nNest überall ein."
          alpha_sapphire: "Rattfratz ist extrem vorsichtig. Sogar im Schlaf nimmt es\nalles wahr, indem es seine Ohren bewegt. Es stellt keine\ngroßen Ansprüche an seinen Lebensraum und richtet sein\nNest überall ein."
        es:
          omega_ruby: "Rattata es cauto como él solo. Hasta cuando duerme mueve\nlas orejas para oír todos los ruidos. No es nada delicado a\nla hora de elegir su hábitat. Cualquier sitio es bueno para\ncavar su madriguera."
          alpha_sapphire: "Rattata es cauto como él solo. Hasta cuando duerme mueve\nlas orejas para oír todos los ruidos. No es nada delicado a\nla hora de elegir su hábitat. Cualquier sitio es bueno para\ncavar su madriguera."
        ko:
          omega_ruby: "경계심이 매우 강해서 자고 있을 때도\n귀를 움직여 주변의 소리를 듣고 있다.\n어디에든 자리를 잡고 둥지를 만든다."
