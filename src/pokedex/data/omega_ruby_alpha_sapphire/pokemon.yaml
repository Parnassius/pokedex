        en:
          omega_ruby: "Dewgong loves to snooze on bitterly cold ice. The sight of this\nPokémon sleeping on a glacier was mistakenly thought to be a\nmermaid by a mariner long ago."
          alpha_sapphire: "Dewgong loves to snooze on bitterly cold ice. The sight of\nthis Pokémon sleeping on a glacier was mistakenly thought\nto be a mermaid by a mariner long ago."
        fr:
