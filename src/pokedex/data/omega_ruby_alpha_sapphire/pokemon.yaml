          alpha_sapphire: "めいそうで　せいしんエネルギーを　たかめている。\n１にちに　きのみを　１こだけしか　たべない。\nあまり　たべない　ことも　しゅぎょうの　ひとつ。"
        jp_kanji:
          omega_ruby: "山奥で　ヨガの　修行を　している。\nめいそうを　していても　集中力が\n途切れてしまうため　修行は　終わらない。"
          alpha_sapphire: "めいそうで　精神エネルギーを　高めている。\n１日に　きのみを　１個だけしか　食べない。\nあまり　食べない　ことも　修行の　一つ。"
        en:
          omega_ruby: "Meditite undertakes rigorous mental training deep in the\nmountains. However, whenever it meditates, this Pokémon\nalways loses its concentration and focus. As a result,\nits training never ends."
          alpha_sapphire: "Meditite heightens its inner energy through meditation.\nIt survives on just one berry a day. Minimal eating is another\naspect of this Pokémon’s training."
        fr:
          omega_ruby: "Méditikka poursuit un difficile entraînement mental dans\nles montagnes. Cependant, à chaque fois qu’il médite,\nce Pokémon perd sa concentration. Du coup, son\nentraînement ne s’arrête jamais."
          alpha_sapphire: "Méditikka intensifie son énergie intérieure grâce à la\nméditation. Il lui suffit d’une Baie par jour pour survivre.\nLa diète fait partie de l’entraînement de ce Pokémon."
        it:
          omega_ruby: "Meditite esegue rigorosi esercizi mentali in montagna.\nTuttavia, quando è immerso in meditazione, perde sempre\nla concentrazione, dovendo così ricominciare da capo.\nIl suo esercizio dunque non finisce mai."
          alpha_sapphire: "Meditite incrementa la sua energia interiore grazie alla\nmeditazione. La sua alimentazione minima - si nutre di\nuna bacca al giorno - è un’altra peculiarità dell’esercizio\ndi questo Pokémon."
        de:
          omega_ruby: "Meditie unterzieht sich einem strikten mentalen Training\ntief in den Bergen. Wenn es meditiert, verliert es jedoch\nimmer seine Konzentration. Deshalb wird sein Training\nniemals ein Ende haben."
          alpha_sapphire: "Meditie erhöht seine Energie durch Meditation. Es lebt von\nnur einer Beere am Tag. Diese absolut reduzierte Ernährung\nist Bestandteil seines Trainings."
        es:
          omega_ruby: "Meditite lleva a cabo un entrenamiento mental exhaustivo en lo\nmás profundo de las montañas. Aunque, cuando medita, pierde\ntoda la concentración y se descentra. Por eso, no deja nunca\nde entrenarse."
          alpha_sapphire: "Meditite aumenta su energía interior mediante meditación.\nPara subsistir le basta con una baya al día. El comer poco\nentra dentro de su entrenamiento."
        ko:
          omega_ruby: "산속에서 요가 수행을 한다.\n명상을 하고 있어도 집중력이\n떨어지기 때문에 수행이 끝나지 않는다."
          alpha_sapphire: "명상으로 정신 에너지를 높이고 있다.\n하루에 나무열매를 한 개만 먹는다.\n별로 먹지 않는 것도 수행의 하나다."
medicham:
  species_id: 308
  names:
    jp_kana: チャーレム
    jp_kanji: チャーレム
    en: Medicham
    fr: Charmina
    it: Medicham
    de: Meditalis
    es: Medicham
    ko: 요가램
  forms:
    medicham:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 75
        special_attack: 60
        special_defense: 75
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - fighting
        - psychic
      egg_groups:
        - human_like
      abilities:
        - pure_power
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          omega_ruby: "めいそうする　ことで　からだの　エネルギーが\nたかまり　だい６かんが　するどくなる　という。\nのやまと　いったいになって　けはいを　けす。"
          alpha_sapphire: "ヨガの　ちからで　だい６かんが　はったつして\nサイコパワーを　あやつれる　ように　なった。\n１かげつかん　なにも　たべずに　めいそうする。"
        jp_kanji:
          omega_ruby: "めいそうする　ことで　体の　エネルギーが\n高まり　第６感が　鋭くなる　という。\n野山と　一体になって　気配を　消す。"
          alpha_sapphire: "ヨガの　力で　第６感が　発達して\nサイコパワーを　操れる　ように　なった。\n１ヶ月間　なにも　食べずに　めいそうする。"
        en:
          omega_ruby: "It is said that through meditation, Medicham heightens energy\ninside its body and sharpens its sixth sense. This Pokémon\nhides its presence by merging itself with fields and mountains."
          alpha_sapphire: "Through the power of meditation, Medicham developed its\nsixth sense. It gained the ability to use psychokinetic powers.\nThis Pokémon is known to meditate for a whole month\nwithout eating."
        fr:
          omega_ruby: "On dit que grâce à la méditation, Charmina stocke\nde l’énergie dans son corps et affine son sixième sens.\nCe Pokémon se cache des autres en se fondant dans\nles champs et les montagnes."
          alpha_sapphire: "Grâce au pouvoir de la méditation, Charmina a développé\nson sixième sens. Il peut utiliser des pouvoirs télékinétiques.\nOn sait que ce Pokémon peut méditer pendant un mois sans\nmanger."
        it:
          omega_ruby: "Si dice che, grazie alla meditazione, Medicham incrementi\nla propria energia fisica e affini il sesto senso. Si nasconde\nefficacemente mimetizzandosi nei campi e in montagna."
          alpha_sapphire: "Grazie alla propria abilità meditativa Medicham ha sviluppato\nil sesto senso. Ha acquisito anche la capacità di usare i poteri\npsicocinetici. È noto per rimanere fermo in meditazione\nun mese intero senza mangiare."
        de:
          omega_ruby: "Mittels Meditation erhöht Meditalis seine Körperenergie und\nschärft seinen sechsten Sinn. Dieses Pokémon verbirgt sich,\nindem es eins mit den Feldern und Bergen wird."
          alpha_sapphire: "Mittels Meditation hat Meditalis seinen sechsten Sinn\nentwickelt. So kann es seine psychokinetischen Kräfte\nnutzen. Dieses Pokémon meditiert einen ganzen Monat,\nohne etwas zu essen."
        es:
          omega_ruby: "Dicen que, a través de la meditación, Medicham aumenta su\nenergía interior y agudiza su sexto sentido. Este Pokémon\nsuele pasar desapercibido mimetizándose con el campo y las\nmontañas."
          alpha_sapphire: "A través de la meditación, Medicham desarrolló su sexto\nsentido y aprendió a usar poderes psicoquinéticos. Se sabe\nque este Pokémon puede pasarse un mes meditando y sin\ncomer."
        ko:
          omega_ruby: "명상을 하면 몸의 에너지가 높아지고\n여섯 번째 감각이 예리해진다고 한다.\n산야와 일체화되어 기척을 지운다."
          alpha_sapphire: "요가의 힘으로 제6의 감각이 발달하여\n사이코 파워를 다룰 수 있게 되었다.\n1개월간 아무것도 먹지 않고 명상한다."
