      descriptions:
        jp_kana:
          omega_ruby: "メレシーの　とつぜんへんい。\nピンクいろに　かがやく　からだは\nせかいいち　うつくしいと　いわれる。"
          alpha_sapphire: "りょうての　すきまで　くうきちゅうの\nたんそを　あっしゅくして　たくさんの\nダイヤを　いっしゅんで　うみだす。"
        jp_kanji:
          omega_ruby: "メレシーの　突然変異。\nピンク色に　輝く　体は\n世界一　美しいと　言われる。"
          alpha_sapphire: "両手の　すきまで　空気中の　炭素を\n圧縮して　たくさんの　ダイヤを\n一瞬で　生み出す。"
        en:
          omega_ruby: "A sudden transformation of Carbink,\nits pink, glimmering body is said to be\nthe loveliest sight in the whole world."
          alpha_sapphire: "It can instantly create many diamonds\nby compressing the carbon in the air\nbetween its hands."
        fr:
          omega_ruby: "Ce Pokémon est une mutation spontanée de Strassie.\nSon corps rose et luisant est d’une beauté incomparable."
          alpha_sapphire: "Il peut créer une multitude de diamants en un instant\nen serrant ses mains, simplement en compressant\nles molécules de carbone contenues dans l’air."
        it:
          omega_ruby: "Questo Pokémon è una mutazione inaspettata di Carbink.\nAlcuni ritengono che il suo corpo rosa splendente sia\nla cosa più bella del mondo."
          alpha_sapphire: "È in grado di creare una grande quantità di diamanti in un\nistante comprimendo tra le mani il carbonio presente nell’aria."
        de:
          omega_ruby: "Dieses Pokémon ist eine Mutation von Rocara. Sein rosafarben\nschimmernder Körper gilt als schönster Anblick überhaupt."
          alpha_sapphire: "Es kann im Nu viele Diamanten erzeugen, indem es\nluftgebundene Kohlenstoffpartikel mit seinen Händen\nkomprimiert."
        es:
          omega_ruby: "Es una transformación súbita de Carbink. Se dice que su\ncuerpo, que irradia destellos rosados, es lo más bonito de\neste mundo."
          alpha_sapphire: "Puede crear una gran cantidad de diamantes en un instante\ncomprimiendo con las manos el carbono que flota en el aire."
        ko:
          omega_ruby: "멜리시의 돌연변이다.\n분홍빛으로 빛나는 몸은\n세계에서 가장 아름답다고 일컬어진다."
          alpha_sapphire: "양손의 틈으로 공기 중의\n탄소를 압축하여 많은\n다이아를 한순간에 만들어 낸다."
