          omega_ruby: "Slowking dedica cada día tiempo a investigar, en un intento\npor resolver los misterios del mundo. Aunque, según parece,\na este Pokémon se le olvida todo lo que ha aprendido si se\nsepara del Shellder que lleva en la cabeza."
          alpha_sapphire: "Slowking dedica cada día tiempo a investigar, en un intento\npor resolver los misterios del mundo. Aunque, según parece,\na este Pokémon se le olvida todo lo que ha aprendido si se\nsepara del Shellder que lleva en la cabeza."
        ko:
          omega_ruby: "세계의 불가사의를 밝혀내기 위해 매일\n연구하고 있지만 머리에 있는 셀러가\n벗겨지면 전부 잊어버리는 것 같다."
          alpha_sapphire: "세계의 불가사의를 밝혀내기 위해 매일\n연구하고 있지만 머리에 있는 셀러가\n벗겨지면 전부 잊어버리는 것 같다."
