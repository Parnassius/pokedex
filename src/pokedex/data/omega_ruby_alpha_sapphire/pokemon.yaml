      descriptions:
        jp_kana:
          omega_ruby: "たいないの　はっこうぶっしつで\nめだまや　からだを　ひからせ\nおそってきた　てきを　ひるませる。"
          alpha_sapphire: "ほっぺの　ふくろに　ためた　きのみの\nタネを　とばして　こうげき。てきを\nはっけんすると　しっぽを　たてる。"
        jp_kanji:
          omega_ruby: "体内の　発光物質で\n目玉や　体を　光らせ\n襲ってきた　敵を　ひるませる。"
          alpha_sapphire: "ほほ袋に　ためた　木の実の　タネを\n飛ばして　攻撃。\n敵を　発見すると　尻尾を　立てる。"
        en:
          omega_ruby: "Using luminescent matter, it makes its eyes and\nbody glow and stuns attacking opponents."
          alpha_sapphire: "When they see an enemy, their tails stand high,\nand they spit the seeds of berries stored in their\ncheek pouches."
        fr:
          omega_ruby: "Il intimide l’ennemi en faisant briller son pelage et ses yeux\ngrâce à une substance à l’intérieur de son corps."
          alpha_sapphire: "Il attaque en crachant les graines des Baies qu’il accumule\ndans ses bajoues. S’il voit un ennemi, il dresse la queue."
        it:
          omega_ruby: "Fa tentennare il nemico facendo brillare occhi e pelliccia grazie\na una sostanza fluorescente contenuta nel suo corpo."
          alpha_sapphire: "Attacca sparando i semi delle bacche che ha accumulato nelle\nguance. Se avvista il nemico, drizza la coda."
        de:
          omega_ruby: "Es kann mit einer körpereigenen Substanz seine Augen und\nseinen Torso aufleuchten lassen, um Gegner zu erschrecken."
          alpha_sapphire: "Bespuckt Gegner mit Kernen von Beeren aus seinen\nBackentaschen. Erspäht es einen Feind, richtet es\nden Schweif auf."
        es:
          omega_ruby: "Los componentes luminiscentes de su interior hacen que sus\nojos y su cuerpo brillen, y así intimida a sus rivales."
          alpha_sapphire: "Ataca lanzando las semillas de las bayas que acumula en\nsus mofletes. Su cola se tensa al avistar a un enemigo."
        ko:
          omega_ruby: "체내의 발광 물질로\n눈이나 몸을 빛나게 하여\n습격해 온 상대를 풀이 죽게 만든다."
          alpha_sapphire: "뺨의 주머니에 모아둔 나무열매의\n씨앗을 날려서 공격한다. 적을\n발견하면 꼬리를 세운다."
lillipup:
