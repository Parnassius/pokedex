        fr:
          omega_ruby: "La première fois qu’on a vu Voltorbe, c’était dans une usine\nqui fabrique des Poké Balls. Personne n’a jamais pu expliquer\nle lien entre cet événement et la ressemblance frappante\nde ce Pokémon avec une Poké Ball."
          alpha_sapphire: "Voltorbe est extrêmement sensible. Il explose au moindre\nchoc. On raconte qu’il fut créé par l’exposition d’une\nPoké Ball à une puissante dose d’énergie."
        it:
          omega_ruby: "Voltorb è stato avvistato per la prima volta in un’azienda\nproduttrice di Poké Ball. Il nesso tra la sua presenza in\nquesta fabbrica e l’estrema somiglianza a una Poké Ball\nrimane un mistero."
          alpha_sapphire: "Voltorb è estremamente sensibile, esplode alla minima\nsollecitazione. Si dice che sia stato creato esponendo\nuna Poké Ball a una forte carica energetica."
        de:
          omega_ruby: "Voltobal wurde zuerst bei einer Firma beobachtet,\ndie Pokébälle herstellt. Der Zusammenhang zwischen\ndieser Beobachtung und der Tatsache, dass dieses\nPokémon wie ein Pokéball aussieht, ist noch ungeklärt."
          alpha_sapphire: "Voltobal ist äußerst empfindlich, es explodiert schon bei der\nleichtesten Erschütterung. Man munkelt, es sei entstanden, als\nein Pokéball einen starken elektrischen Schlag bekommen hat."
        es:
          omega_ruby: "Voltorb fue visto por primera vez en una empresa encargada\nde comercializar Poké Balls. La conexión que existe entre\naquella primera vez que se le vio y el hecho de que se parece\nmucho a una Poké Ball sigue siendo un misterio."
          alpha_sapphire: "Voltorb es tremendamente sensible y a la más mínima\nsacudida explota. Cuentan que se creó cuando alguien\nexpuso una Poké Ball a una gran descarga eléctrica."
        ko:
          omega_ruby: "몬스터볼을 만드는 회사에서\n처음 발견됐다는 점과 생김새가 비슷한\n점의 관련성은 아직도 수수께끼다."
