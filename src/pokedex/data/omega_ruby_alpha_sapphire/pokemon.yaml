        jp_kana:
          omega_ruby: "きゃくりょくで　きのみを　くだく。\nどんなに　つよい　あいてでも\nゆうかんに　たちむかう　しゅうせい。"
          alpha_sapphire: "つよい　あいてにも　みさかいなく\nたたかいを　いどむ。たたかいを\nくりかえす　ことで　つよくなるのだ。"
        jp_kanji:
          omega_ruby: "脚力で　木の実を　砕く。\nどんなに　強い　相手でも\n勇敢に　立ち向かう　習性。"
          alpha_sapphire: "強い　相手にも　見境なく　戦いを\n挑む。戦いを　繰り返す　ことで\n強くなるのだ。"
        en:
          omega_ruby: "They crush berries with their talons. They bravely\nstand up to any opponent, no matter how strong\nit is."
          alpha_sapphire: "They will challenge anything, even strong\nopponents, without fear. Their frequent fights help\nthem become stronger."
        fr:
          omega_ruby: "Il casse les Baies avec ses serres. Il combat courageusement,\nquelle que soit la force de l’adversaire."
          alpha_sapphire: "Il défie sans discernement même les ennemis puissants.\nIl devient plus fort en multipliant les combats."
        it:
          omega_ruby: "Si serve degli arti come schiaccianoci per rompere le bacche.\nAffronta con valore anche i nemici più forti."
          alpha_sapphire: "Sfida indiscriminatamente avversari anche più forti di lui.\nSi irrobustisce a forza di lottare."
        de:
          omega_ruby: "Kann mit seinen Füßen Nüsse zermalmen. Es stellt sich jedem\nnoch so starken Gegner tapfer zum Kampf."
          alpha_sapphire: "Es zettelt willkürlich Kämpfe an, egal wie stark der Gegner\nauch ist. Es gewinnt an Stärke, indem es seine Fehler\nanalysiert."
        es:
          omega_ruby: "Quiebra bayas con sus extremidades. Se enfrenta con valentía\na todo enemigo por fuerte que este sea."
          alpha_sapphire: "Desafía indiscriminadamente a rivales poderosos. Librar\nnumerosas batallas lo hace fuerte."
        ko:
          omega_ruby: "다리 힘으로 나무열매를 으깬다.\n아무리 강한 상대라도\n용감히 맞서는 습성이 있다."
          alpha_sapphire: "강한 상대에게도 무작정\n싸움을 건다. 싸움을 계속\n반복하며 강해진다."
braviary:
