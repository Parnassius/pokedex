        en:
          omega_ruby: "In battle, Chikorita waves its leaf around to keep the foe at\nbay. However, a sweet fragrance also wafts from the leaf,\nbecalming the battling Pokémon and creating a cozy, friendly\natmosphere all around."
          alpha_sapphire: "In battle, Chikorita waves its leaf around to keep the foe at\nbay. However, a sweet fragrance also wafts from the leaf,\nbecalming the battling Pokémon and creating a cozy,\nfriendly atmosphere all around."
        fr:
          omega_ruby: "Lorsqu’il se bat, Germignon secoue sa feuille pour tenir son\nennemi à distance. Un doux parfum s’en dégage également,\napaisant les Pokémon qui se battent et créant une atmosphère\nagréable et amicale."
          alpha_sapphire: "Lorsqu’il se bat, Germignon secoue sa feuille pour tenir son\nennemi à distance. Un doux parfum s’en dégage également,\napaisant les Pokémon qui se battent et créant une atmosphère\nagréable et amicale."
        it:
          omega_ruby: "Nella lotta, Chikorita sventola la sua foglia in modo da tenere\na bada il nemico. Tuttavia, la foglia emana anche un aroma\ndolce, che calma il Pokémon avversario, creando un’atmosfera\ngradevole e rilassata tutt’attorno."
          alpha_sapphire: "Nella lotta, Chikorita sventola la sua foglia in modo da tenere\na bada il nemico. Tuttavia, la foglia emana anche un aroma\ndolce, che calma il Pokémon avversario, creando un’atmosfera\ngradevole e rilassata tutt’attorno."
        de:
          omega_ruby: "Im Kampf wedelt Endivie mit seinem Blatt, um den Feind\nfernzuhalten. Von dem Blatt geht auch ein süßlicher Duft aus,\nder die kämpfenden Pokémon beruhigt und eine gemütliche,\nfreundliche Atmosphäre schafft."
          alpha_sapphire: "Im Kampf wedelt Endivie mit seinem Blatt, um den Feind\nfernzuhalten. Von dem Blatt geht auch ein süßlicher Duft aus,\nder das gegnerische Pokémon im Kampf beruhigt und eine\ngemütliche, freundliche Atmosphäre schafft."
        es:
          omega_ruby: "Al luchar, Chikorita agita la hoja que tiene para mantener a\nraya al rival. Pero, al mismo tiempo, libera una suave fragancia\nque apacigua el encuentro y crea un ambiente agradable y de\namistad."
          alpha_sapphire: "Al luchar, Chikorita agita la hoja que tiene para mantener a\nraya al rival. Pero, al mismo tiempo, libera una suave fragancia\nque apacigua el encuentro y crea un ambiente agradable y de\namistad."
