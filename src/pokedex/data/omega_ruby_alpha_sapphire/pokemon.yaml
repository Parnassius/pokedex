arceus:
  species_id: 493
  names:
    jp_kana: アルセウス
    jp_kanji: アルセウス
    en: Arceus
    fr: Arceus
    it: Arceus
    de: Arceus
    es: Arceus
    ko: 아르세우스
  forms:
    arceus_normal_type:
      form_id: 0
      names:
        jp_kana: アルセウスのすがた
        jp_kanji: アルセウスのすがた
        en: Arceus
        fr: Forme de Arceus
        it: Forma di Arceus
        de: Arceus
        es: Forma de Arceus
        ko: 아르세우스의 모습
      base_stats:
        hp: 120
        attack: 120
        defense: 120
        special_attack: 120
        special_defense: 120
        speed: 120
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - multitype
      descriptions:
        jp_kana:
          omega_ruby: "タマゴから　すがたを　あらわして\nせかいの　すべてを　うみだしたと\nシンオウしんわに　かたられている。"
          alpha_sapphire: "うちゅうが　まだ　ない　ころに\nさいしょに　うまれた　ポケモンと\nしんわの　なかで　かたられている。"
        jp_kanji:
          omega_ruby: "タマゴから　姿を　現して\n世界の　すべてを　生み出したと\nシンオウ神話に　語られている。"
          alpha_sapphire: "宇宙が　まだ　ない　ころに\n最初に　生まれた　ポケモンと\n神話の　中で　語られている。"
        en:
          omega_ruby: "According to the legends of Sinnoh, this Pokémon\nemerged from an egg and shaped all there is in\nthis world."
          alpha_sapphire: "It is told in mythology that this Pokémon was born\nbefore the universe even existed."
        fr:
          omega_ruby: "La mythologie de Sinnoh veut qu’il soit apparu sous forme\nd’Œuf et ait créé le monde."
          alpha_sapphire: "Dans la mythologie, ce Pokémon existait déjà avant\nla formation de l’univers."
        it:
          omega_ruby: "Secondo la mitologia di Sinnoh, Arceus è nato da un uovo\ne poi ha creato il mondo."
          alpha_sapphire: "Nei racconti mitologici si dice che questo Pokémon sia nato\nancor prima dell’universo."
        de:
          omega_ruby: "In den Legenden Sinnohs heißt es, es sei aus einem Ei\ngeschlüpft und hätte die gesamte Welt geschaffen."
          alpha_sapphire: "Die Mythologie erzählt, dass dieses Pokémon geboren wurde,\nbevor das Universum überhaupt existierte."
        es:
          omega_ruby: "Según la mitología de Sinnoh, Arceus surgió de un huevo y\ndespués creó todo el mundo."
          alpha_sapphire: "La mitología cuenta que este Pokémon nació antes de que el\nUniverso existiera."
        ko:
          omega_ruby: "알에서 모습을 나타내\n모든 세계를 창조했다고\n신오신화에서 묘사된다."
          alpha_sapphire: "우주가 아직 생기지 않았을 무렵에\n처음으로 태어난 포켓몬이라고\n신화 속에서 묘사된다."
