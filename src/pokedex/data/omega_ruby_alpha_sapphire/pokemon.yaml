      descriptions:
        jp_kana:
          omega_ruby: "どんな　きんぞくよりも　かたい　からだを　もつ。\nからだの　なかは　くうどうに　なっているらしく\nたべている　ものも　わからない　ポケモンだ。"
          alpha_sapphire: "むかし　ひとによって　ふういんされた　ポケモン。\nからだを　つくる　きんぞくは　ちきゅうじょうに\nそんざいしない　ぶっしつと　かんがえられている。"
        jp_kanji:
          omega_ruby: "どんな　金属よりも　硬い　体を　持つ。\n体の　中は　空洞に　なっているらしく\n食べている　ものも　分からない　ポケモンだ。"
          alpha_sapphire: "昔　人によって　封印された　ポケモン。\n体を　つくる　金属は　地球上に\n存在しない　物質と　考えられている。"
        en:
          omega_ruby: "Registeel has a body that is harder than any kind of metal.\nIts body is apparently hollow. No one has any idea what this\nPokémon eats."
          alpha_sapphire: "Registeel was imprisoned by people in ancient times.\nThe metal composing its body is thought to be a curious\nsubstance that is not of this earth."
        fr:
          omega_ruby: "Le corps de Registeel est plus dur que n’importe quel métal\nexistant. Il est apparemment creux. Personne ne sait ce que\nce Pokémon mange."
          alpha_sapphire: "Il y a très longtemps, Registeel fut emprisonné par les\nhommes. On pense que l’étrange métal qui compose\nson corps provient d’une autre planète."
        it:
          omega_ruby: "Registeel ha un corpo più duro di ogni tipo di metallo.\nPare inoltre che all’interno sia totalmente vuoto.\nNessuno sa cosa mangi questo Pokémon."
          alpha_sapphire: "Registeel è stato imprigionato dagli esseri umani\nnell’antichità. Pare che il metallo di cui è composto\nprovenga dallo spazio."
        de:
          omega_ruby: "Registeel hat einen Körper, der härter ist als jede Art von\nMetall. Sein Körper scheint hohl zu sein. Niemand hat eine\nAhnung, was dieses Pokémon wohl frisst."
          alpha_sapphire: "Registeel wurde vor langer Zeit von den Menschen\neingesperrt. Das Metall, aus dem sein Körper besteht,\nist eine seltsame Substanz, die nicht von dieser Welt sein soll."
        es:
          omega_ruby: "No hay metal que supere en dureza el cuerpo de Registeel,\nque tiene aspecto de estar hueco. Nadie sabe de qué se\nalimenta este Pokémon."
          alpha_sapphire: "Hace mucho tiempo Registeel estuvo preso. La gente piensa\nque el metal del que está hecho es una curiosa sustancia\nextraterrestre."
        ko:
          omega_ruby: "어떤 금속보다도 단단한 몸을 지녔다.\n몸 안은 비어 있는 듯하며\n먹는 것도 알려지지 않은 포켓몬이다."
          alpha_sapphire: "오래전 사람에게 봉인된 포켓몬이다.\n몸을 이루고 있는 금속은 지구 상에\n존재하지 않는 물질이라고 여겨진다."
latias:
  species_id: 380
  names:
    jp_kana: ラティアス
    jp_kanji: ラティアス
    en: Latias
    fr: Latias
    it: Latias
    de: Latias
    es: Latias
    ko: 라티아스
  forms:
    latias:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 90
        special_attack: 110
        special_defense: 130
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - dragon
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "にんげんの　こころを　びんかんに　かんじとる。\nてきいを　キャッチすると　ぜんしんの　はねを\nさかだてて　はげしく　なきごえで　いかくする。"
          alpha_sapphire: "ちのうが　たかく　ひとの　ことばを　りかいする。\nガラスの　ような　うもうで　からだを　つつみこみ\nひかりを　くっせつさせて　すがたを　かえる。"
        jp_kanji:
          omega_ruby: "人間の　心を　敏感に　感じとる。\n敵意を　キャッチすると　全身の　羽を\n逆立てて　激しく　鳴き声で　威嚇する。"
          alpha_sapphire: "知能が　高く　人の　言葉を　理解する。\nガラスの　ような　羽毛で　体を　包み込み\n光を　屈折させて　姿を　変える。"
        en:
          omega_ruby: "Latias is highly sensitive to the emotions of people. If it senses\nany hostility, this Pokémon ruffles the feathers all over its body\nand cries shrilly to intimidate the foe."
          alpha_sapphire: "Latias is highly intelligent and capable of understanding\nhuman speech. It is covered with a glass-like down.\nThe Pokémon enfolds its body with its down and refracts\nlight to alter its appearance."
        fr:
          omega_ruby: "Latias est extrêmement sensible aux émotions des gens.\nS’il ressent une hostilité, ce Pokémon ébouriffe ses plumes\net pousse un cri strident pour intimider son ennemi."
          alpha_sapphire: "Latias est très intelligent et comprend le langage des hommes.\nIl est recouvert d’une espèce de duvet ressemblant à du verre.\nCe Pokémon s’enveloppe dans ce duvet et reflète la lumière\npour changer son apparence."
        it:
          omega_ruby: "Latias è sensibilissimo alle emozioni delle persone.\nSe percepisce una certa ostilità, questo Pokémon arruffa\nle piume su tutto il corpo ed emette un grido lancinante\nper intimidire il nemico."
          alpha_sapphire: "Estremamente intelligente, Latias è in grado di capire\nil linguaggio umano. Il suo corpo è ricoperto di piumino\nvetroso che usa per rifrangere la luce e mutare il proprio\naspetto."
        de:
          omega_ruby: "Latias ist in höchstem Maße empfindlich gegenüber den\nEmotionen der Menschen. Wenn es einen Anflug von\nFeindseligkeit wahrnimmt, werden seine Federn zerzaust\nund es stößt schrille Schreie aus, um seinen Gegner\neinzuschüchtern."
          alpha_sapphire: "Latias ist sehr intelligent und kann die menschliche\nSprache verstehen. Es ist mit gläsernen Daunen bedeckt.\nDieses Pokémon umhüllt seinen Körper mit den Daunen\nund kann Licht brechen, um seine Gestalt zu verändern."
        es:
          omega_ruby: "Latias es muy sensible a los sentimientos de la gente. Si\ndetecta algún ápice de hostilidad, desplegará las plumas que\ntiene por todo el cuerpo y se pondrá a chillar para intimidar al\nenemigo."
          alpha_sapphire: "Latias tiene un nivel de inteligencia tan alto que es capaz de\nentender el lenguaje humano. Este Pokémon usa el plumón\ncristalizado del que está cubierto como peto para refractar la\nluz y cambiar de aspecto."
        ko:
          omega_ruby: "인간의 마음을 민감히 감지해낸다.\n적의를 느끼면 전신의 깃털을\n곤두세우고 격렬한 울음소리로 위협한다."
          alpha_sapphire: "지능이 높아 사람의 말을 이해한다.\n몸을 감싼 유리 같은 깃털로\n빛을 굴절시켜 모습을 바꾼다."
