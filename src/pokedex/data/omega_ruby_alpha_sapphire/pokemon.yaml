      types:
        - dark
      egg_groups:
        - field
      abilities:
        - limber
        - unburden
      hidden_ability: prankster
      descriptions:
        jp_kana:
          omega_ruby: "うつくしい　スタイルは　ぜんしんの\nはったつした　きんにくの　おかげ。\nおともたてずに　よるを　かけぬける。"
          alpha_sapphire: "けはいを　ころして　せっきんする。\nあいてが　きづく　まえに　はいごから\nしのびより　しとめてしまうのだ。"
        jp_kanji:
          omega_ruby: "美しい　スタイルは　全身の\n発達した　筋肉の　おかげ。\n音もたてずに　夜を　駆けぬける。"
          alpha_sapphire: "気配を　殺して　接近する。\n相手が　気づく　前に　背後から\n忍び寄り　しとめてしまうのだ。"
        en:
          omega_ruby: "Their beautiful form comes from the muscles they\nhave developed. They run silently in the night."
          alpha_sapphire: "Stealthily, it sneaks up on its target, striking from\nbehind before its victim has a chance to react."
        fr:
          omega_ruby: "Sa ligne élégante cache une musculature féline qui lui permet\nde surprendre lors de ses attaques nocturnes."
          alpha_sapphire: "Il s’approche sans un bruit de sa proie et l’abat d’un coup\npar-derrière sans jamais être repéré."
        it:
          omega_ruby: "I muscoli tonici del suo corpo gli donano una figura davvero\naffascinante. Si aggira silenzioso nel buio della notte."
          alpha_sapphire: "Si avvicina di soppiatto alle spalle del nemico colpendolo\nprima che se ne accorga."
        de:
          omega_ruby: "Sein anmutiges Auftreten verdankt es den Muskeln, die es\nentwickelt hat. Es prescht lautlos durch die Nacht."
          alpha_sapphire: "Verbirgt seine Aura und nähert sich seinem Gegner völlig\nunbemerkt von hinten, um ihm den Garaus zu machen."
        es:
          omega_ruby: "Su bella y grácil silueta le viene dada por su desarrollada\nmusculatura, que le permite andar de noche sin hacer ruido."
          alpha_sapphire: "Se aproxima evitando que lo detecten. Con sigilo, se acerca\na su rival por la espalda y lo ataca."
        ko:
          omega_ruby: "아름다운 스타일은 전신의\n발달한 근육 덕분이다.\n소리도 내지 않고 밤을 달린다."
          alpha_sapphire: "기척을 지우고 접근한다.\n상대가 눈치채기 전에 뒤쪽으로\n살며시 다가가 꼼짝 못하게 한다."
