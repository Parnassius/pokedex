      descriptions:
        jp_kana:
          omega_ruby: "１ぴきの　でんりょくは　ちいさいが\nたくさんの　シビシラスが　つながると\nカミナリと　おなじ　いりょくになる。"
          alpha_sapphire: "よわい　でんきしか　だせないので\nたくさんの　シビシラスで　あつまり\nきょうりょくな　でんきを　はなつ。"
        jp_kanji:
          omega_ruby: "１匹の　電力は　小さいが\nたくさんの　シビシラスが　つながると\n雷と　同じ　威力になる。"
          alpha_sapphire: "弱い　電気しか　だせないので\nたくさんの　シビシラスで　集まり\n強力な　電気を　放つ。"
        en:
          omega_ruby: "While one alone doesn’t have much power, a chain\nof many Tynamo can be as powerful as lightning."
          alpha_sapphire: "One alone can emit only a trickle of electricity,\nso a group of them gathers to unleash a powerful\nelectric shock."
        fr:
          omega_ruby: "Tout seuls, ils ne dégagent pas beaucoup d’électricité,\nmais un banc d’Anchwatt produit la même puissance\nqu’un éclair."
          alpha_sapphire: "Tout seul, il ne dégage pas beaucoup d’électricité.\nMais un banc d’Anchwatt produit des décharges surpuissantes."
        it:
          omega_ruby: "La carica elettrica di un Tynamo è debole, ma se più esemplari\nsi uniscono raggiungono la potenza di un fulmine."
          alpha_sapphire: "Da soli producono poca elettricità, per cui formano dei grossi\nbranchi se vogliono lanciare una scossa più potente."
        de:
          omega_ruby: "Allein erzeugt es nur wenig Strom, doch tritt es geschlossen\nim Schwarm auf, gleicht seine Kraft der eines Blitzes."
          alpha_sapphire: "Alleine erzeugen sie nur geringe Mengen an Elektrizität,\naber im Schwarm können sie mächtige Stromsalven abfeuern."
        es:
          omega_ruby: "La electricidad de uno solo es diminuta, pero, si multitud de\nTynamo se conectan, consiguen la potencia de un rayo."
          alpha_sapphire: "Apenas puede generar energía por sí mismo, pero un banco\nde Tynamo puede crear violentas descargas eléctricas."
        ko:
          omega_ruby: "한 마리의 전력은 적지만\n많은 저리어가 연결되면\n번개와 같은 위력이 된다."
          alpha_sapphire: "약한 전기밖에 낼 수 없어\n많은 저리어가 모여서\n강력한 전기를 발산한다."
eelektrik:
