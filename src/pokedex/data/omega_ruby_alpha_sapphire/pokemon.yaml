          alpha_sapphire: "しろくて　まるい　いしを　タマゴと\nおもいこんで　だいじに　もっている。\nまきげの　かたちを　きにしている。"
        jp_kanji:
          omega_ruby: "タマゴに　似た　真んまるい　石を\nお腹の　袋に　入れている。\n好きな　相手に　石を　渡す。"
          alpha_sapphire: "白くて　まるい　石を　タマゴと\n思いこんで　大事に　持っている。\n巻き毛の　形を　気にしている。"
        en:
          omega_ruby: "It carries a round, egg-shaped rock in its belly\npouch and gives the rock to its friends."
          alpha_sapphire: "It carefully carries a round, white rock that it thinks\nis an egg. It’s bothered by how curly its hair looks."
        fr:
          omega_ruby: "Ptiravi transporte un caillou rond en forme d’œuf dans\nsa poche ventrale pour l’offrir à ses amis."
          alpha_sapphire: "Il prend soin de ses bouclettes et couve son caillou comme\nsi c’était son Œuf."
        it:
          omega_ruby: "Trasporta una roccia a forma di uovo nella sua tasca ventrale\ne poi la offre ai suoi amici."
          alpha_sapphire: "Trasporta con cura un sasso bianco e tondo trattandolo\ncome un uovo. Adora il ricciolo che ha in testa."
        de:
          omega_ruby: "In seinem Beutel trägt es einen runden, eiförmigen Stein,\nden es Freunden gibt."
          alpha_sapphire: "Es hält den runden, weißen Stein für ein Ei und kümmert sich\num ihn. Es achtet sehr auf seine Haarlocke."
        es:
          omega_ruby: "Les da a sus amigos una roca con forma de huevo que\ntransporta en la bolsa de su panza."
          alpha_sapphire: "Cuida de una pequeña roca blanca y redonda creyendo que\nes un huevo. Le gusta arreglarse el tirabuzón."
        ko:
          omega_ruby: "알을 닮은 둥근 돌을\n배의 주머니에 넣고 있다.\n좋아하는 상대에게 돌을 준다."
          alpha_sapphire: "하얗고 둥근 돌을 알이라고\n생각하고는 소중히 가지고 있다.\n말려 있는 머리 모양을 신경 쓰고 있다."
