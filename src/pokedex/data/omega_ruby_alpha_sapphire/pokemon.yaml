        - forewarn
        - synchronize
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          omega_ruby: "わるい　ゆめに　うなされている\nポケモンや　ひとの　まえに　あらわれ\nそのゆめを　たべてしまう　ポケモン。"
          alpha_sapphire: "ひとや　ポケモンが　みた　ゆめを\nたべる。たのしい　ゆめを　たべると\nピンクいろの　けむりを　はきだす。"
        jp_kanji:
          omega_ruby: "悪い　夢に　うなされている\nポケモンや　人の　前に　現われ\nその夢を　食べてしまう　ポケモン。"
          alpha_sapphire: "人や　ポケモンが　見た　夢を\n食べる。楽しい　夢を　食べると\nピンク色の　けむりを　吐き出す。"
        en:
          omega_ruby: "This Pokémon appears before people and Pokémon\nwho are having nightmares and eats those dreams."
          alpha_sapphire: "It eats the dreams of people and Pokémon. When it\neats a pleasant dream, it expels pink-colored mist."
        fr:
          omega_ruby: "Il apparaît aux humains et aux Pokémon qui font des mauvais\nrêves et mange leurs cauchemars pour les en libérer."
          alpha_sapphire: "Il se nourrit des rêves des gens et des Pokémon.\nQuand le rêve est agréable, il crache une fumée rose."
        it:
          omega_ruby: "Compare accanto a Pokémon e uomini tormentati dagli incubi\nper nutrirsi di tutti i loro brutti sogni."
          alpha_sapphire: "Si nutre dei sogni di uomini e Pokémon. Se mangia sogni\npiacevoli, esala un fumo di colore rosa."
        de:
          omega_ruby: "Es erscheint vor schlafenden Menschen und Pokémon und\nfrisst ihre Alpträume."
          alpha_sapphire: "Es verschlingt die Träume der Menschen. Frisst es einen\nfröhlichen Traum, stößt es danach einen rosafarbenen Dunst\naus."
        es:
          omega_ruby: "Cuando un humano o un Pokémon sufre una pesadilla, Munna\nse aparece ante ellos y la engulle."
          alpha_sapphire: "Se alimenta de los sueños de humanos y Pokémon. Si los\nsueños son felices, despide humo rosa."
        ko:
          omega_ruby: "나쁜 꿈에 시달리고 있는\n포켓몬이나 사람 앞에 나타나\n그 꿈을 먹어버리는 포켓몬."
          alpha_sapphire: "사람이나 포켓몬이 꾼 꿈을\n먹는다. 즐거운 꿈을 먹으면\n분홍색 연기를 뿜어낸다."
musharna:
  species_id: 518
  names:
    jp_kana: ムシャーナ
    jp_kanji: ムシャーナ
    en: Musharna
    fr: Mushana
    it: Musharna
