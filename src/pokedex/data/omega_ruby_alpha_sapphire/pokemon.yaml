victini:
  species_id: 494
  names:
    jp_kana: ビクティニ
    jp_kanji: ビクティニ
    en: Victini
    fr: Victini
    it: Victini
    de: Victini
    es: Victini
    ko: 비크티니
  forms:
    victini:
      form_id: 0
      base_stats:
        hp: 100
        attack: 100
        defense: 100
        special_attack: 100
        special_defense: 100
        speed: 100
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - fire
      egg_groups:
        - undiscovered
      abilities:
        - victory_star
      descriptions:
        jp_kana:
          omega_ruby: "しょうりを　もたらす　ポケモン。\nビクティニを　つれた　トレーナーは\nどんな　しょうぶにも　かてるという。"
          alpha_sapphire: "ビクティニが　むげんに　うみだす\nエネルギーを　わけあたえてもらうと\nぜんしんに　パワーが　あふれだす。"
        jp_kanji:
          omega_ruby: "勝利を　もたらす　ポケモン。\nビクティニを　連れた　トレーナーは\nどんな　勝負にも　勝てるという。"
          alpha_sapphire: "ビクティニが　無限に　生み出す\nエネルギーを　分け与えてもらうと\n全身に　パワーが　あふれ出す。"
        en:
          omega_ruby: "This Pokémon brings victory. It is said that Trainers\nwith Victini always win, regardless of the type\nof encounter."
          alpha_sapphire: "When it shares the infinite energy it creates,\nthat being’s entire body will be overflowing\nwith power."
        fr:
          omega_ruby: "Un Pokémon qui amène la victoire. On dit que les Dresseurs\nqui le possèdent peuvent gagner n’importe quel combat."
          alpha_sapphire: "L’énergie sans limites qu’il produit donne une force incroyable\nà ceux qui entrent en contact avec elle."
        it:
          omega_ruby: "Pokémon che porta la vittoria. Si dice che l’Allenatore che\nha con sé Victini possa vincere qualsiasi lotta."
          alpha_sapphire: "Può condividere l’energia infinita che emana, donando un\npotere immenso a chi la riceve."
        de:
          omega_ruby: "Ein siegverheißendes Pokémon. Man sagt, Trainer, die ein\nVictini in ihrem Team haben, seien unschlagbar."
          alpha_sapphire: "Jeder, dem Victini seine grenzenlose Energie zuteilwerden\nlässt, strotzt nur so vor Kraft."
        es:
          omega_ruby: "Pokémon que atrae la victoria. Dicen que el Entrenador que lo\nlleve saldrá vencedor de cualquier batalla."
          alpha_sapphire: "Cuando Victini comparte su energía ilimitada, esa persona o\nPokémon irradia abundante poder."
        ko:
          omega_ruby: "승리를 부르는 포켓몬이다.\n비크티니와 함께하는 트레이너는\n그 어떤 승부에서도 승리한다고 한다."
          alpha_sapphire: "비크티니가 무한히 만들어내는\n에너지를 나누어 받으면\n전신에 파워가 넘친다."
snivy:
  species_id: 495
  names:
    jp_kana: ツタージャ
    jp_kanji: ツタージャ
    en: Snivy
    fr: Vipélierre
    it: Snivy
    de: Serpifeu
    es: Snivy
    ko: 주리비얀
  forms:
    snivy:
      form_id: 0
      base_stats:
        hp: 45
        attack: 45
        defense: 55
        special_attack: 45
        special_defense: 55
        speed: 63
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
      egg_groups:
        - field
        - grass
      abilities:
        - overgrow
      hidden_ability: contrary
      descriptions:
        jp_kana:
          omega_ruby: "たいようの　ひかりを　あびると\nいつもよりも　すばやく　うごける。\nてよりも　ツルを　うまくつかう。"
          alpha_sapphire: "しっぽで　たいようを　あびて\nこうごうせいを　する。げんきを\nなくすと　しっぽが　たれさがる。"
        jp_kanji:
          omega_ruby: "太陽の　光を　浴びると\nいつもよりも　素早く　動ける。\n手よりも　ツルを　うまく使う。"
          alpha_sapphire: "尻尾で　太陽の光を　浴びて\n光合成を　する。元気を　なくすと\n尻尾が　たれさがる。"
        en:
          omega_ruby: "Being exposed to sunlight makes its movements\nswifter. It uses vines more adeptly than its hands."
          alpha_sapphire: "They photosynthesize by bathing their tails in\nsunlight. When they are not feeling well, their\ntails droop."
        fr:
          omega_ruby: "La lumière du soleil augmente fortement son agilité.\nSes lianes sont plus habiles que ses mains."
          alpha_sapphire: "Il laisse sa queue prendre le soleil pour sa photosynthèse.\nQuand il est malade, sa queue pend tristement."
        it:
          omega_ruby: "Quando è esposto alla luce solare può muoversi più\nvelocemente. Usa le sue liane meglio dei suoi stessi arti."
          alpha_sapphire: "Assorbe i raggi solari dalla coda per operare la fotosintesi.\nQuando non sta bene, la sua coda si affloscia."
        de:
          omega_ruby: "Im Sonnenlicht erhöht sich das Tempo seiner Bewegungen.\nEs ist mit seinen Schlingen geschickter als mit den Händen."
          alpha_sapphire: "Fängt mit dem Schweif Sonnenlicht auf, um Photosynthese\nzu betreiben. Fehlt ihm die Kraft, hängt sein Schweif schlaff\nherab."
        es:
          omega_ruby: "Cuando recibe los rayos de sol, se mueve mucho más rápido\nque de costumbre. Usa mejor sus lianas que sus manos."
          alpha_sapphire: "Sintetiza la luz del sol que recoge con su cola. Esta se le\nqueda abatida cuando le fallan las energías."
        ko:
          omega_ruby: "태양의 빛을 받으면\n평소보다 빨리 움직일 수 있다.\n손보다 덩굴을 잘 사용한다."
          alpha_sapphire: "꼬리로 태양의 빛을 받아\n광합성한다. 기운이\n빠지면 꼬리가 축 늘어진다."
