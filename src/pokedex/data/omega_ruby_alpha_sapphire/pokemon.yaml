        - psychic
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - synchronize
        - trace
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          omega_ruby: "あたまの　ツノで　ひとの　きもちを　かんじとる。\nひとまえには　めったに　すがたを　あらわさないが\nまえむきな　きもちを　キャッチすると　ちかよる。"
          alpha_sapphire: "ひとの　かんじょうを　さっちする　ちからを　もち\nトレーナーが　あかるい　きぶんの　ときには\nいっしょに　なって　よろこぶ　ポケモンだ。"
        jp_kanji:
          omega_ruby: "頭の　ツノで　人の　気持ちを　感じ取る。\n人前には　めったに　姿を　現さないが\n前向きな　気持ちを　キャッチすると　近寄る。"
          alpha_sapphire: "人の　感情を　察知する　力を　持ち\nトレーナーが　明るい　気分の　ときには\n一緒に　なって　喜ぶ　ポケモンだ。"
        en:
          omega_ruby: "Ralts senses the emotions of people using the horns on\nits head. This Pokémon rarely appears before people.\nBut when it does, it draws closer if it senses that the person\nhas a positive disposition."
          alpha_sapphire: "Ralts has the ability to sense the emotions of people. If its\nTrainer is in a cheerful mood, this Pokémon grows cheerful\nand joyous in the same way."
        fr:
          omega_ruby: "Tarsal ressent les émotions des gens grâce à ses cornes.\nCe Pokémon se montre rarement, mais il arrive qu’il s’approche\nd’une personne s’il la sent dans un état d’esprit positif."
          alpha_sapphire: "Tarsal a le pouvoir de ressentir les émotions des gens.\nSi son Dresseur est d’humeur joyeuse, ce Pokémon devient\nlui aussi gai et enjoué."
        it:
          omega_ruby: "Ralts percepisce le emozioni delle persone usando le corna\nposte sul capo. Raramente si fa vedere dagli esseri umani,\nma se percepisce un’energia positiva provenire da qualcuno\nè possibile che si avvicini."
          alpha_sapphire: "Ralts ha la capacità di percepire le emozioni delle persone.\nSe il suo Allenatore è di buon umore, questo influisce\npositivamente sul carattere di Ralts, che crescerà così\nallegro e gioioso."
        de:
          omega_ruby: "Trasla nimmt mit den Hörnern an seinem Kopf die Gefühle\nvon Menschen wahr. Menschen bekommen dieses Pokémon\nnur selten zu Gesicht. Wenn es bemerkt, dass eine Person\ngut gelaunt ist, traut es sich näher an sie heran."
          alpha_sapphire: "Trasla hat die Fähigkeit, die Emotionen von Menschen\nwahrzunehmen. Wenn sein Trainer gute Laune hat,\nist dieses Pokémon ebenfalls fröhlich."
        es:
          omega_ruby: "Ralts percibe las sensaciones de la gente por los cuernos que\ntiene encima y detrás de la cabeza. No es común que este\nPokémon aparezca en público, pero cuando lo hace, se acerca\nsi ve buena disposición en la gente."
          alpha_sapphire: "Ralts tiene la habilidad de percibir las sensaciones que tiene\nla gente. Si su Entrenador está alegre, este Pokémon se\npondrá igualmente contento."
        ko:
          omega_ruby: "머리의 뿔로 사람의 기분을 감지한다.\n사람 앞에는 좀처럼 모습을 나타내지 않지만\n긍정적인 기분을 캐치하면 다가온다."
          alpha_sapphire: "사람의 감정을 감지하는 힘을 지녀서\n트레이너가 밝은 감정일 때는\n함께하며 기뻐하는 포켓몬이다."
