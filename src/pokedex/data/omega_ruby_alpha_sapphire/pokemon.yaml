          omega_ruby: "つばさが　ちいさいため　とべない。\nしんかの　ときが　ちかづくと\nじぶんから　ガイコツを　ぬぎすてる。"
          alpha_sapphire: "つばさは　ちいさく　まだ　とべない。\nバルジーナが　あつめてきた\nガイコツで　おしりを　まもっている。"
        jp_kanji:
          omega_ruby: "翼が　小さいため　飛べない。\n進化の　ときが　近づくと\n自分から　ガイコツを　脱ぎ捨てる。"
          alpha_sapphire: "翼は　小さく　まだ　飛べない。\nバルジーナが　集めてきた\nガイコツで　お尻を　守っている。"
        en:
          omega_ruby: "Its wings are too tiny to allow it to fly. As the time\napproaches for it to evolve, it discards the bones\nit was wearing."
          alpha_sapphire: "Their wings are too tiny to allow them to fly.\nThey guard their posteriors with bones that were\ngathered by Mandibuzz."
        fr:
          omega_ruby: "Ses ailes sont trop petites pour lui permettre de voler.\nQuand l’évolution approche, il sort lui-même du crâne\nqui le protège."
          alpha_sapphire: "Ses ailes sont trop petites pour voler. Il protège son croupion\navec un crâne apporté par un Vaututrice."
        it:
          omega_ruby: "Le piccole ali non gli consentono di volare. Quando si\navvicina il momento di evolversi, si libera del teschio."
          alpha_sapphire: "Le sue ali sono ancora piccole e non può volare. Usa delle\nossa ricevute da Mandibuzz per riparare il suo bacino."
        de:
          omega_ruby: "Seine Flügel sind noch zu klein zum Fliegen. Kurz bevor es\nsich entwickelt, wirft es seine Schädelwindel ab."
          alpha_sapphire: "Seine Flügel sind noch zu klein zum Fliegen. Ein von\nGrypheldis beschaffter Schädel schützt seinen Bürzel."
        es:
          omega_ruby: "No puede volar porque sus alas son muy pequeñas. Cuando\nva a evolucionar, se deshace de su calavera."
          alpha_sapphire: "Sus pequeñas alas no le permiten volar. Usa una calavera que\nle dio Mandibuzz para proteger sus posaderas."
        ko:
          omega_ruby: "날개가 작아서 날지 못한다.\n진화가 가까워지면\n자기 스스로 해골을 벗어버린다."
          alpha_sapphire: "날개는 작아서 아직 날 수 없다.\n버랜지나가 모아온\n해골로 엉덩이를 지키고 있다."
mandibuzz:
