        jp_kana:
          omega_ruby: "しょくぶつの　ツルで　できた　うでを\nのばして　えものを　からめとる。\nうでを　たべられても　へっちゃら。"
          alpha_sapphire: "あたたかい　きせつに　なると\nめだまも　かくれて　しまうほど\nしょくぶつの　ツルが　のびつづける。"
        jp_kanji:
          omega_ruby: "植物の　ツルで　できた　腕を\n伸ばして　獲物を　絡め取る。\n腕を　食べられても　へっちゃら。"
          alpha_sapphire: "暖かい　季節に　なると\n目玉も　隠れてしまうほど\n植物の　ツルが　伸び続ける。"
        en:
          omega_ruby: "It ensnares prey by extending arms made of vines.\nLosing arms to predators does not trouble it."
          alpha_sapphire: "Its vines grow so profusely that, in the warm\nseason, you can’t even see its eyes."
        fr:
          omega_ruby: "Il ligote sa proie en étirant ses bras en lianes. Il ne craint pas\nde perdre un bras face à un ennemi."
          alpha_sapphire: "Lorsque vient la belle saison, ses lianes sont si luxuriantes\nqu’elles cachent ses yeux."
        it:
          omega_ruby: "Intrappola le prede con gli arti, che sono costituiti da liane.\nSe ne perde uno, non si turba affatto."
          alpha_sapphire: "Nella stagione calda, le sue liane crescono al punto da\ncoprirgli gli occhi."
        de:
          omega_ruby: "Es umwickelt Beute, indem es seine Arme, die aus Ranken\nbestehen, verlängert."
          alpha_sapphire: "In warmen Jahreszeiten wuchern seine Ranken so dicht,\ndass man nicht einmal mehr seine Augen erkennt."
        es:
          omega_ruby: "Atrapa a su presa desplegando las ramas de sus brazos, que\nno le importa perder ante depredadores."
          alpha_sapphire: "Cuando llega el calor, se cubre por completo con sus lianas\ny no se le pueden ver ni los ojos."
        ko:
          omega_ruby: "식물의 덩굴로 이루어진 팔을\n늘여서 먹이를 포박한다.\n팔을 먹혀도 아무렇지도 않다."
          alpha_sapphire: "따뜻한 계절이 오면\n눈이 보이지 않을 정도로\n식물의 덩굴이 계속 자란다."
