          alpha_sapphire: "みずが　きれいな　ばしょを　このむ。\nあたまに　ためこんだ　みずがへると\nしっぽから　すいあげて　ほきゅう。"
        jp_kanji:
          omega_ruby: "尻尾から　高圧の　水を　発射すると\nコンクリートの　壁も\n破壊する　威力。"
          alpha_sapphire: "水が　きれいな　場所を　好む。\n頭に　ためこんだ　水が減ると\n尻尾から　吸いあげて　補給。"
        en:
          omega_ruby: "The high-pressure water expelled from its tail is so\npowerful, it can destroy a concrete wall."
          alpha_sapphire: "It prefers places with clean water. When its tuft runs\nlow, it replenishes it by siphoning up water with\nits tail."
        fr:
          omega_ruby: "Le jet d’eau à haute pression qu’il propulse par la queue\nest assez puissant pour traverser un mur de béton."
          alpha_sapphire: "Il aime les endroits où l’eau est pure. Il se ravitaille en eau\nen l’aspirant avec sa queue."
        it:
          omega_ruby: "Spruzza dalla coda un getto d’acqua ad alta pressione, con\nuna potenza tale da distruggere anche pareti di cemento."
          alpha_sapphire: "Predilige i luoghi dove l’acqua è pura. Se l’acqua che ha sul\ncapo diminuisce, ne aggiunge altra aspirandola con la coda."
        de:
          omega_ruby: "Es schießt mit so hohem Druck Wasser aus seinem Schweif,\ndass selbst Betonwände den Kürzeren ziehen."
          alpha_sapphire: "Hält sich bevorzugt in reinen Gewässern auf. Geht ihm das\nWasser in seinem Kopf aus, tankt es mit seinem Schweif nach."
        es:
          omega_ruby: "Cuando lanza agua a alta presión con su cola, puede incluso\nresquebrajar una pared de cemento."
          alpha_sapphire: "Le encantan los lugares con agua limpia. Cuando desciende\nel nivel de agua de su pelo, se abastece a través de su cola."
        ko:
          omega_ruby: "꼬리에서 발사하는 고압의 물은\n콘크리트 벽도 파괴할 수 있는\n위력을 지녔다."
          alpha_sapphire: "물이 깨끗한 장소를 좋아한다.\n머리에 모아둔 물이 줄어들면\n꼬리에서 빨아올려 보급한다."
