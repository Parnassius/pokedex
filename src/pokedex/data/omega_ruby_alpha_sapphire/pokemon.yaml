      descriptions:
        jp_kana:
          omega_ruby: "むねと　せなかから　あわを　だす。\nだんりょくのある　あわで　こうげきを\nうけとめて　ダメージを　へらす。"
          alpha_sapphire: "せんさいな　あわで　からだを　つつみ\nはだを　まもる。のんきに　みせかけて\nぬけめなく　しゅういを　うかがう。"
        jp_kanji:
          omega_ruby: "胸と　背中から　泡を　出す。\n弾力のある　泡で　攻撃を　受け止めて\nダメージを　減らす。"
          alpha_sapphire: "繊細な　泡で　体を　包み\n肌を　守る。のんきに　見せかけて\n抜け目なく　周囲を　うかがう。"
        en:
          omega_ruby: "It secretes flexible bubbles from its chest and back.\nThe bubbles reduce the damage it would otherwise\ntake when attacked."
          alpha_sapphire: "It protects its skin by covering its body in\ndelicate bubbles. Beneath its happy-go-lucky air,\nit keeps a watchful eye on its surroundings."
        fr:
          omega_ruby: "Sa poitrine et son dos sécrètent une mousse qui lui permet\nde subir moins de dégâts en amortissant le choc des attaques."
          alpha_sapphire: "Il protège son corps en l’entourant d’une mousse délicate.\nMalgré son apparence insouciante, ce Pokémon est en fait\nconstamment à l’affût."
        it:
          omega_ruby: "Dal petto e dalla schiena secerne una schiuma che gli\npermette di attutire i danni causati dagli attacchi nemici."
          alpha_sapphire: "Si protegge avvolgendo il corpo in una schiuma delicata.\nNonostante l’aria spensierata, scruta sempre l’ambiente\ncircostante con molta attenzione."
        de:
          omega_ruby: "Es stößt aus Brust und Rücken elastische Blasen aus,\nmit denen es gegnerische Angriffe abfängt und so den\nerlittenen Schaden verringert."
          alpha_sapphire: "Es schützt seine Haut mit feinen Blasen, die seinen\nKörper umhüllen. Es mag unbekümmert aussehen,\nbehält die Umgebung aber immer aufmerksam im Auge."
        es:
          omega_ruby: "Secreta burbujas tanto por la espalda como por el pecho.\nGracias a la elasticidad de estas, puede parar ataques y\nreducir el daño recibido."
          alpha_sapphire: "Protege su piel cubriendo el cuerpo con una fina capa de\nburbujas. Aunque parezca despreocupado, no deja de vigilar\ncon astucia lo que le rodea."
        ko:
          omega_ruby: "가슴과 등에서 거품을 내뿜는다.\n탄력 있는 거품으로 공격을\n막아내고 데미지를 줄인다."
          alpha_sapphire: "섬세한 거품으로 몸을 감싸\n피부를 보호한다. 태평한 척하면서\n빈틈없이 주위를 살핀다."
frogadier:
  species_id: 657
  names:
    jp_kana: ゲコガシラ
    jp_kanji: ゲコガシラ
    en: Frogadier
    fr: Croâporal
