      descriptions:
        jp_kana:
          omega_ruby: "ドーミラーの　せなかの　もようには\nしんぴてきな　ちからが　やどると\nむかしの　ひとたちは　しんじていた。"
          alpha_sapphire: "ふるい　おはかから　ドーミラーに\nそっくりな　どうぐが　ほりだされたが\nかんけいは　わかっていない。"
        jp_kanji:
          omega_ruby: "ドーミラーの　背中の　模様には\n神秘的な　力が　宿ると\n昔の　人たちは　信じていた。"
          alpha_sapphire: "古い　お墓から　ドーミラーに\nそっくりな　道具が　掘り出されたが\n関係は　わかっていない。"
        en:
          omega_ruby: "Ancient people believed that the pattern on\nBronzor’s back contained a mysterious power."
          alpha_sapphire: "Implements shaped like it were discovered in\nancient tombs. It is unknown if they are related."
        fr:
          omega_ruby: "Les gens croyaient autrefois que les motifs de son dos\nrenfermaient une puissance mystique."
          alpha_sapphire: "Il rappelle des objets trouvés dans des sépultures anciennes.\nNul ne sait s’ils sont liés."
        it:
          omega_ruby: "Nell’antichità si credeva che una forza misteriosa dimorasse\nnei disegni sul dorso di Bronzor."
          alpha_sapphire: "Il suo aspetto ricorda alcuni oggetti ritrovati in antiche tombe,\nma non si sa se ci sia una relazione."
        de:
          omega_ruby: "Früher glaubten die Menschen, dem Muster auf seinem Rücken\nwohne eine mysteriöse Kraft inne."
          alpha_sapphire: "Sein Körper sieht aus, als seien Teile davon in alten Gräbern\ngefunden worden."
        es:
          omega_ruby: "Antaño se creía que en los dibujos de su parte posterior\nresidía una fuerza misteriosa."
          alpha_sapphire: "Se descubrieron herramientas con su forma en tumbas\nantiguas, pero se desconoce si tiene relación."
        ko:
          omega_ruby: "동미러의 등 모양에는\n신비한 힘이 깃들어 있다고\n옛날 사람들은 믿고 있었다."
          alpha_sapphire: "고대 무덤에서 동미러와\n똑 닮은 도구가 발굴되었지만\n관계는 알 수 없다."
bronzong:
