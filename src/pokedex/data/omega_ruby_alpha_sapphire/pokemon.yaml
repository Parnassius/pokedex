          omega_ruby: "たいかくは　こがらだが　カイリキーや\nハリテヤマなど　おおきな　ポケモンと\nごかくに　たたかう　テクニシャン。"
          alpha_sapphire: "つばさを　つかい　くうちゅうで\nしせいを　コントロール。ふせぎにくい\nずじょうから　こうげきを　しかける。"
        jp_kanji:
          omega_ruby: "体格は　小柄だが　カイリキーや\nハリテヤマなど　大きな　ポケモンと\n互角に　戦う　テクニシャン。"
          alpha_sapphire: "翼を　使い　空中で　姿勢を\nコントロール。防ぎにくい　頭上から\n攻撃を　仕掛ける。"
        en:
          omega_ruby: "Although its body is small, its proficient\nfighting skills enable it to keep up with\nbig bruisers like Machamp and Hariyama."
          alpha_sapphire: "With its wings, it controls its position in the air.\nIt likes to attack from above, a maneuver that\nis difficult to defend against."
        fr:
          omega_ruby: "Malgré sa petite taille, son intelligence lui permet d’affronter\nsans trembler de grands Pokémon tels que les Mackogneur\nou les Hariyama."
          alpha_sapphire: "Il utilise ses ailes pour contrôler avec précision sa posture\nen vol. Ses attaques aériennes sont difficiles à parer."
        it:
          omega_ruby: "Nonostante le piccole dimensioni, è in grado di tenere testa\na Pokémon ben più grandi come Machamp o Hariyama."
          alpha_sapphire: "Grazie alle sue ali riesce a controllare con la massima\nprecisione i movimenti in aria e attacca dall’alto, in posizione\ndi vantaggio rispetto ai nemici."
        de:
          omega_ruby: "Ungeachtet seines kleinen Wuchses, erweist es sich, dank\nseiner Kampftechnik, gegenüber größeren Gegnern wie\nMachomei oder Hariyama als ebenbürtig."
          alpha_sapphire: "Es nutzt seine Flügel, um sich am Himmel in Position zu halten.\nGegen seine Angriffe aus der Luft kann man sich nur schwer\nzur Wehr setzen."
        es:
          omega_ruby: "A pesar de ser un Pokémon de pequeña estatura, su pericia\nen el combate le permite plantar cara a Pokémon como\nMachamp o Hariyama."
          alpha_sapphire: "Controla su posición en el aire con las alas. Lanza ataques\ndesde gran altura que resultan difíciles de evitar."
        ko:
          omega_ruby: "체격은 작지만 괴력몬이나\n하리뭉 등의 커다란 포켓몬과\n막상막하로 싸우는 테크니션이다."
          alpha_sapphire: "날개를 사용해 공중에서\n자세를 컨트롤한다. 막기 어려운\n머리 위에서부터 공격해온다."
