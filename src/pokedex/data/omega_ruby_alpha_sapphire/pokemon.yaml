        jp_kana:
          omega_ruby: "エサや　だいじな　ものを　くちばしに　はさみ\nいろんな　ばしょに　かくす　しゅうせいを　もつ。\nかぜに　のって　すべる　ように　そらを　とぶ。"
          alpha_sapphire: "うみから　ふく　じょうしょう　きりゅうに　のり\nほそながい　つばさを　のばして　かっくうする。\nながい　くちばしは　エサを　とるときに　べんり。"
        jp_kanji:
          omega_ruby: "エサや　大事な　ものを　くちばしに　挟み\n色んな　場所に　隠す　習性を　持つ。\n風に　乗って　滑る　ように　空を　飛ぶ。"
          alpha_sapphire: "海から　吹く　上昇　気流に　乗り\n細長い　翼を　伸ばして　滑空する。\n長い　くちばしは　エサを　取るときに　便利。"
        en:
          omega_ruby: "Wingull has the habit of carrying prey and valuables in its beak\nand hiding them in all sorts of locations. This Pokémon rides\nthe winds and flies as if it were skating across the sky."
          alpha_sapphire: "Wingull rides updrafts rising from the sea by extending its long\nand narrow wings to glide. This Pokémon’s long beak is useful\nfor catching prey."
        fr:
          omega_ruby: "Goélise a l’habitude de transporter ses proies et ses objets\nde valeur dans son bec avant de les cacher. Ce Pokémon\nse laisse porter par le vent et vole comme s’il surfait\ndans les cieux."
          alpha_sapphire: "Grâce à ses ailes longues et étroites, Goélise se laisse porter\npar les courants d’air ascendants venant de la mer. Le long\nbec de ce Pokémon est bien pratique pour attraper ses proies."
        it:
          omega_ruby: "Wingull ha l’abitudine di trasportare prede e oggetti preziosi\nnel becco per poi nasconderli dappertutto. Questo Pokémon\nvola a cavallo dei venti planando in cielo."
          alpha_sapphire: "Wingull segue le correnti ascensionali presenti sul mare\nallargando le sue ali lunghe e strette per planare.\nIl lungo becco del Pokémon è utile per catturare la preda."
        de:
          omega_ruby: "Man sieht Wingull oft mit seiner Beute oder seinen\nBesitztümern im Schnabel herumfliegen auf der Suche\nnach geeigneten Verstecken. Dieses Pokémon fliegt\ndurch die Lüfte, als würde es gleiten."
          alpha_sapphire: "Wingull breitet seine langen, schmalen Flügel aus und segelt\nim Seewind. Der lange Schnabel dieses Pokémon ist ihm beim\nJagen nach Beute sehr hilfreich."
        es:
          omega_ruby: "Wingull tiene la costumbre de llevar a su presa y objetos de\nvalor en el pico, y esconderlos en distintos sitios. Este\nPokémon vuela dejándose llevar por las corrientes de aire\ncomo si fuera patinando por el cielo."
          alpha_sapphire: "Wingull emerge del mar y asciende desplegando las largas y\nestrechas alas que posee. Este Pokémon tiene un pico largo\nque le resulta muy útil para pescar."
        ko:
          omega_ruby: "먹이나 소중한 것을 부리에 끼우고\n여러 장소에 숨기는 습성을 지녔다.\n바람을 타고 미끄러지듯 하늘을 난다."
          alpha_sapphire: "바다에서 불어오는 상승기류를 타고\n가늘고 긴 날개를 펼쳐 활공한다.\n긴 부리는 먹이를 잡을 때 편리하다."
