          alpha_sapphire: "Ekans curls itself up in a spiral while it rests. Assuming this\nposition allows it to quickly respond to a threat from any\ndirection with a glare from its upraised head."
        fr:
          omega_ruby: "Abo s’enroule en spirale pour dormir. Sa tête reste relevée\nde telle sorte que cette position lui permette de réagir\nrapidement si une menace survenait."
          alpha_sapphire: "Abo s’enroule en spirale pour dormir. Sa tête reste relevée\nde telle sorte que cette position lui permette de réagir\nrapidement si une menace survenait."
        it:
          omega_ruby: "Ekans si attorciglia a spirale per riposarsi. In questa posizione\nriesce a reagire alle insidie provenienti da ogni parte grazie\nalla testa sollevata e allo sguardo fulminante."
          alpha_sapphire: "Ekans si attorciglia a spirale per riposarsi. In questa posizione\nriesce a reagire alle insidie provenienti da ogni parte grazie\nalla testa sollevata e allo sguardo fulminante."
