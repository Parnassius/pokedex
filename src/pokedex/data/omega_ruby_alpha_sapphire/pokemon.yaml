          omega_ruby: "はがねに　しんかした　ドリルは\nてっぱんを　つらぬく　はかいりょく。\nトンネルこうじで　だいかつやくする。"
          alpha_sapphire: "ちか　１００メートルに　めいろの\nような　すあなを　つくる。ちかてつの\nトンネルに　あなを　あけてしまう。"
        jp_kanji:
          omega_ruby: "鋼に　進化した　ドリルは\n鉄板を　つらぬく　破壊力。\nトンネル工事で　大活躍する。"
          alpha_sapphire: "地下　１００メートルに　迷路の\nような　巣穴を　作る。地下鉄の\nトンネルに　穴を　開けてしまう。"
        en:
          omega_ruby: "It can help in tunnel construction. Its drill has\nevolved into steel strong enough to bore through\niron plates."
          alpha_sapphire: "More than 300 feet below the surface, they build\nmazelike nests. Their activity can be destructive to\nsubway tunnels."
        fr:
          omega_ruby: "Ses vrilles en acier peuvent transpercer des poutres en fer.\nIl est très employé dans la construction de tunnels."
          alpha_sapphire: "Il se creuse des terriers labyrinthiques à 100 m sous terre.\nIl lui arrive de percer les galeries du métro."
        it:
          omega_ruby: "La trivella si è evoluta diventando d’acciaio e può perforare\nuna lastra di ferro. È molto utile per scavare tunnel."
          alpha_sapphire: "Costruisce una tana simile a un labirinto 100 m sotto terra.\nA volte apre buchi nei tunnel della metropolitana."
        de:
          omega_ruby: "Seine zu Stahl weiterentwickelten Bohrer kriegen selbst\nEisenplatten klein. Im Tunnelbau ist es ein absolutes Ass."
          alpha_sapphire: "Sein verworrener Bau liegt 100 m tief unter der Erde.\nGelegentlich gräbt es auch U-Bahn-Schächte an."
        es:
          omega_ruby: "Su taladro ha evolucionado y es capaz de atravesar una\nlámina de hierro. Es muy útil para construir túneles."
          alpha_sapphire: "Construye madrigueras laberínticas a 100 m bajo tierra.\nA veces abre agujeros en los túneles de metro."
        ko:
          omega_ruby: "강철로 진화한 드릴은\n철판을 뚫는 파괴력을 가졌다.\n터널 공사에서 크게 활약한다."
          alpha_sapphire: "땅 밑 100m에 미로 같은\n굴을 만든다. 지하철\n터널에 구멍을 뚫어 버린다."
