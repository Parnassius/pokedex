          alpha_sapphire: "むしポケモンを　ねらって　のやまを\nおおぜいの　むれで　とびまわる。\nなきごえが　とても　やかましい。"
        jp_kanji:
          omega_ruby: "たくさんの　群れで　行動する。\n体は　小さいが\n羽ばたく　力は　非常に　強い。"
          alpha_sapphire: "むしポケモンを　ねらって　野山を\n大勢の　群れで　飛び回る。\n鳴き声が　とても　やかましい。"
        en:
          omega_ruby: "They flock in great numbers. Though small, they\nflap their wings with great power."
          alpha_sapphire: "They flock around mountains and fields, chasing\nafter bug Pokémon. Their singing is noisy\nand annoying."
        fr:
          omega_ruby: "Ils volent en nombre. Bien que minuscule, il bat des ailes\navec une vigueur impressionnante."
          alpha_sapphire: "Ce Pokémon très bruyant parcourt champs et forêts en nuées\npour chasser les Pokémon Insecte."
        it:
          omega_ruby: "Si muove in grandi gruppi. Anche se piccolo, batte le ali\nin maniera molto energica."
          alpha_sapphire: "Saltella per i campi in grandi stormi a caccia di Pokémon\nColeottero. Emette versi davvero acuti."
        de:
          omega_ruby: "Ihr Schwarm ist stets groß. Obwohl es kleine Pokémon sind,\nschwingen sie ihre Flügel mit enormer Kraft."
          alpha_sapphire: "Auf der Suche nach Käfer-Pokémon fliegen Schwärme\nvon ihnen durchs Land. Ihr Ruf erzeugt großen Lärm."
        es:
          omega_ruby: "Viaja en grandes bandadas. Aunque es pequeño, agita las\nalas con gran fuerza."
          alpha_sapphire: "Sobrevuela los campos buscando Pokémon de tipo Bicho.\nChilla de forma muy estridente."
        ko:
          omega_ruby: "많은 수가 무리를 이루어\n행동한다. 몸은 작지만\n날개 치는 힘은 매우 강하다."
          alpha_sapphire: "벌레 포켓몬을 노리고 산과 들을\n많은 무리로 날아다닌다.\n울음소리가 무척 시끄럽다."
