          omega_ruby: "They cannot see, so they tackle and bite to learn\nabout their surroundings. Their bodies are covered\nin wounds."
          alpha_sapphire: "Lacking sight, it’s unaware of its surroundings,\nso it bumps into things and eats anything\nthat moves."
        fr:
          omega_ruby: "Comme il ne voit rien, il perçoit son environnement en mordant\net en fonçant à tout va. Il est couvert de plaies."
          alpha_sapphire: "Comme il ne voit rien, il perçoit son environnement en mordant\net en fonçant à tout va."
        it:
          omega_ruby: "Dal momento che non ci vede, esamina ciò che lo circonda\nmordendo o lanciandosi di peso. Ha ammaccature su tutto\nil corpo."
          alpha_sapphire: "Non vede bene ciò che lo circonda e sbatte qua e là\nmordendo e mangiando tutto ciò che si muove."
        de:
          omega_ruby: "Da es nichts sehen kann, sucht es seine Umgebung mit\nRempel- und Bissattacken ab und ist immer mit Wunden\nübersät."
          alpha_sapphire: "Da es nichts sehen kann, rammt und frisst es alles, was ihm\nauf dem Weg in die Quere kommt."
        es:
          omega_ruby: "No ve, por eso va haciendo placajes y dando mordiscos a\ndiestro y siniestro. Su cuerpo está plagado de heridas."
          alpha_sapphire: "No ve bien a su alrededor, por eso va chocándose a diestro y\nsiniestro, y mordiendo todo lo que se mueve."
        ko:
          omega_ruby: "눈이 보이지 않아서 몸통박치기나\n물기로 주변을 살핀다.\n몸에 상처가 끊이지 않는다."
          alpha_sapphire: "주변의 모습을 모르기 때문에\n닥치는 대로 부딪쳐서는\n움직이는 것을 물어 먹어치운다."
