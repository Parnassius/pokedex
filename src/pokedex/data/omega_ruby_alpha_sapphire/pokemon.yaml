    lumineon:
      form_id: 0
      base_stats:
        hp: 69
        attack: 69
        defense: 76
        special_attack: 69
        special_defense: 86
        speed: 91
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
