        jp_kana:
          omega_ruby: "あたまの　はっぱを　かじると\nとても　にがいが　つかれた　からだを\nげんきにする　こうかが　あるのだ。"
          alpha_sapphire: "すいぶんと　えいようの　ほうふな\nつちを　このむので　チュリネの　すむ\nとちは　さくもつの　そだちが　よい。"
        jp_kanji:
          omega_ruby: "頭の　葉っぱを　かじると\nとても　苦いが　疲れた　体を\n元気にする　効果が　あるのだ。"
          alpha_sapphire: "水分と　栄養の　豊富な\n土を　好むので　チュリネの　住む\n土地は　作物の　育ちが　良い。"
        en:
          omega_ruby: "The leaves on its head are very bitter. Eating one\nof these leaves is known to refresh a tired body."
          alpha_sapphire: "Since they prefer moist, nutrient-rich soil, the areas\nwhere Petilil live are known to be good for\ngrowing plants."
        fr:
          omega_ruby: "Les feuilles sur sa tête sont très amères, mais elles remettent\nd’aplomb les corps les plus éreintés."
          alpha_sapphire: "Il aime les zones bien irriguées et riches en nutriments.\nOn sait que là où il vit, les cultures sont florissantes."
        it:
          omega_ruby: "Le foglie che ha sul capo sono molto amare ma, se masticate,\nhanno l’effetto di rinvigorire il corpo stanco."
          alpha_sapphire: "Dato che predilige i terreni ricchi di acqua e nutrimento, nelle\nzone in cui vive Petilil i raccolti sono rigogliosi."
        de:
          omega_ruby: "Die Blätter auf seinem Kopf schmecken furchtbar bitter,\ndoch sie helfen ausgezeichnet gegen Erschöpfung."
          alpha_sapphire: "Da es nährstoffreiche Erde bevorzugt, kann man in Gebieten,\nin denen es lebt, für gewöhnlich reiche Ernten erwarten."
        es:
          omega_ruby: "Mordisquear las hojas de su cabeza permite recuperar toda la\nvitalidad, a pesar de que están muy amargas."
          alpha_sapphire: "Habita tierras húmedas ricas en nutrientes donde la cosecha\nes abundante."
        ko:
          omega_ruby: "머리의 잎사귀를 갉아먹으면\n매우 쓰지만 지친 몸을\n회복시켜주는 효과가 있다."
          alpha_sapphire: "치릴리는 수분과 영양이 풍부한\n땅을 좋아하기 때문에 치릴리가\n사는 토지는 작물이 잘 자란다."
lilligant:
  species_id: 549
  names:
    jp_kana: ドレディア
    jp_kanji: ドレディア
