          alpha_sapphire: "どうくつの　ちいさな　よこあなを\nねぐらにする。えものが　ちかづくと\nすばやく　とびだして　つかまえる。"
        jp_kanji:
          omega_ruby: "地熱で　温められた　横穴で　暮らす。\n敵が　近づくと　穴から　飛び出して\n大口で　かみつく。"
          alpha_sapphire: "洞窟の　小さな　横穴を\nねぐらにする。獲物が　近づくと\n素早く　飛び出して　捕まえる。"
        en:
          omega_ruby: "It nests in horizontal holes warmed by geothermal\nheat. Foes who get too close can expect to be\npounced on and bitten."
          alpha_sapphire: "It nests in small, horizontal holes in cave walls.\nIt pounces to catch prey that stray too close."
        fr:
          omega_ruby: "Il niche dans des cavités chauffées par géothermie,\ndont il bondit pour déchiqueter tout intrus."
          alpha_sapphire: "Il niche dans les petits trous horizontaux des murs des grottes.\nIl bondit pour saisir sa proie."
        it:
          omega_ruby: "Vive in gallerie scaldate dal calore geotermico. Se sente un\nnemico arrivare, salta fuori e lo addenta."
          alpha_sapphire: "Nidifica in piccole cavità orizzontali nelle pareti delle grotte.\nSi avventa sulle prede che si avvicinano."
        de:
          omega_ruby: "Es lebt in Höhlen, die Erdwärme ausgesetzt sind. Es springt\nheraus und beißt, wenn Feinde sich nähern."
          alpha_sapphire: "Es nistet in kleinen Löchern in Höhlenwänden.\nEs springt Beute, die sich zu nah heranwagt, an."
        es:
          omega_ruby: "Vive en agujeros en las cuevas, al amparo del calor\ngeotérmico. Si se acerca un enemigo, le muerde."
          alpha_sapphire: "Anida en pequeños agujeros en las paredes de cuevas.\nCuando una presa pasa cerca, salta hacia ella."
        ko:
          omega_ruby: "지열로 데워진 구멍에서\n지낸다. 적이 가까이 오면 구멍에서\n뛰쳐나와 커다란 입으로 물어버린다."
          alpha_sapphire: "동굴의 조그만 구멍을\n보금자리로 쓴다. 먹이가 다가오면\n재빠르게 뛰쳐나가 붙잡는다."
gabite:
