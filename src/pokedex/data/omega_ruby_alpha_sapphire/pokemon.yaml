      descriptions:
        jp_kana:
          omega_ruby: "ほかの　ポケモンの　すみかでも\nいごこちが　よければ　いすわって\nじぶんの　すみかに　してしまう。"
          alpha_sapphire: "からだを　おおきく　みせて　あいてを\nいあつするため　ふたまたの　しっぽで\nウエストを　ぎゅっと　しぼっている。"
        jp_kanji:
          omega_ruby: "ほかの　ポケモンの　住処でも\n居心地が　良ければ　居座って\n自分の　住処に　してしまう。"
          alpha_sapphire: "体を　大きく　見せて　相手を\n威圧するため　ふたまたの　尻尾で\nウエストを　ぎゅっと　絞っている。"
        en:
          omega_ruby: "It would claim another Pokémon’s nest as its own\nif it finds a nest sufficiently comfortable."
          alpha_sapphire: "To make itself appear intimidatingly beefy, it tightly\ncinches its waist with its twin tails."
        fr:
          omega_ruby: "Il n’hésitera pas à voler le nid d’autres Pokémon et\nà s’y installer si celui-ci est confortable."
          alpha_sapphire: "Il ceinture sa taille de sa queue bifide pour paraître\nplus imposant."
        it:
          omega_ruby: "Si introduce sfacciatamente nelle tane degli altri Pokémon\nrivendicandole poi come proprie."
          alpha_sapphire: "Si stringe la vita con la coda biforcuta per apparire più\nimponente e minaccioso."
        de:
          omega_ruby: "Behagt ihm die Behausung eines anderen Pokémon,\nbleibt Shnurgarst einfach da und nistet sich dort ein."
          alpha_sapphire: "Damit es bedrohlicher und größer aussieht, umschlingt es\nseine Taille fest mit seinem Schwanz."
        es:
          omega_ruby: "Si se siente a gusto, no tiene ningún reparo en apropiarse de\nlas moradas de otros Pokémon."
          alpha_sapphire: "Para intimidar y parecer más corpulento, se aprieta la cintura\ncon su cola bífida."
        ko:
          omega_ruby: "다른 포켓몬의 거처라 할지라도\n편안하면 눌러앉아\n자신의 거처로 삼아버린다."
          alpha_sapphire: "몸을 크게 보여서 상대를\n위압하기 위해 두 갈래의 꼬리로\n허리를 꼭 쥐고 있다."
chingling:
