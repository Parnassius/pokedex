      descriptions:
        jp_kana:
          omega_ruby: "すうひきで　むれを　つくる。\nがんきゅうを　カバーする　まくが\nすなあらしから　めを　まもる。"
          alpha_sapphire: "めを　おおう　とくしゅな　まくが\nぶったいの　ねつを　かんちするため\nくらやみでも　まわりが　みえるのだ。"
        jp_kanji:
          omega_ruby: "数匹で　群れを　作る。\n眼球を　カバーする　膜が\n砂嵐から　目を　守る。"
          alpha_sapphire: "眼球を　覆う　特殊な　膜が\n物体の　熱を　感知するため\n暗闇でも　まわりが　見えるのだ。"
        en:
          omega_ruby: "They live in groups of a few individuals. Protective\nmembranes shield their eyes from sandstorms."
          alpha_sapphire: "The special membrane covering its eyes can sense\nthe heat of objects, so it can see its surroundings\neven in darkness."
        fr:
          omega_ruby: "Ils vivent en petits groupes. La membrane qui couvre\nleurs yeux les protège du soleil."
          alpha_sapphire: "La membrane spéciale qui recouvre ses yeux détecte\nla chaleur et lui permet de voir dans le noir."
        it:
          omega_ruby: "Forma gruppi di pochi esemplari. La pellicola che ricopre\ni suoi occhi lo protegge dalle tempeste di sabbia."
          alpha_sapphire: "La membrana speciale che ha sugli occhi è in grado di\npercepire il calore dei corpi, consentendogli così di vedere\nal buio."
        de:
          omega_ruby: "Bildet mit mehreren Artgenossen ein Rudel. Eine Membran\nschützt seine Augen vor Sandstürmen."
          alpha_sapphire: "Die spezielle Membran um seine Augen fungiert als\nWärmesensor, durch den es sich auch im Dunkeln\nzurechtfindet."
        es:
          omega_ruby: "Viven en manadas. La membrana que cubre sus ojos los\nprotege de la arena."
          alpha_sapphire: "Una membrana especial cubre sus ojos y le permite detectar\nel calor de los cuerpos, por eso ve en la oscuridad."
        ko:
          omega_ruby: "여러 마리가 무리를 짓는다.\n안구를 감싼 막이\n모래 폭풍으로부터 눈을 지켜준다."
          alpha_sapphire: "눈을 감싼 특수한 막이\n물체의 열을 감지해서\n어두워도 주변을 볼 수 있다."
krookodile:
