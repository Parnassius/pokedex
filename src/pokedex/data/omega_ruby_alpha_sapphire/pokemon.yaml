      descriptions:
        jp_kana:
          omega_ruby: "もくぞうの　いえを　コナゴナに　ふきとばすほどの\nおおごえを　だして　あいてを　いためつける。\nまるい　みみが　スピーカーの　はたらきを　する。"
          alpha_sapphire: "あしを　ふみならしながら　おおごえを　だす。\nおおごえを　だしたあとは　しばらくの　あいだ\nなにも　きこえなくなってしまうのが　じゃくてん。"
        jp_kanji:
          omega_ruby: "木造の　家を　コナゴナに　吹き飛ばすほどの\n大声を　出して　相手を　痛めつける。\n丸い　耳が　スピーカーの　働きを　する。"
          alpha_sapphire: "足を　踏み鳴らしながら　大声を　出す。\n大声を　出した後は　しばらくの　間\nなにも　聞こえなくなってしまうのが　弱点。"
        en:
          omega_ruby: "Loudred’s bellowing can completely decimate a wood-frame\nhouse. It uses its voice to punish its foes. This Pokémon’s\nround ears serve as loudspeakers."
          alpha_sapphire: "Loudred shouts while stamping its feet. After it finishes\nshouting, this Pokémon becomes incapable of hearing\nanything for a while. This is considered to be a weak point."
        fr:
          omega_ruby: "Le hurlement de Ramboum est si fort qu’il peut faire\ns’effondrer une petite maison en bois. Il se sert de sa voix\npour punir ses ennemis. Les oreilles rondes de ce Pokémon\nservent de haut-parleurs."
          alpha_sapphire: "Ramboum hurle en trépignant. Quand il a fini de hurler,\nce Pokémon reste incapable d’entendre le moindre son\npendant un long moment. Il semble que ce soit son point\nfaible."
        it:
          omega_ruby: "I suoni assordanti emessi da Loudred sono in grado\ndi abbattere anche una casa in legno. La sua voce è\ncosì potente da poter essere usata come attacco contro\ni nemici. Le sue orecchie tonde fungono da altoparlanti."
          alpha_sapphire: "Loudred urla pestando i piedi. Alla fine dei suoi strepiti è\ntemporaneamente incapace di udire qualsiasi rumore.\nQuesto è considerato il suo punto debole."
        de:
          omega_ruby: "Krakeelos Brüllen kann ein Holzhaus zum Einsturz bringen.\nEs setzt seine Stimme ein, um seine Gegner anzugreifen.\nDie runden Ohren dieses Pokémon dienen als Lautsprecher."
          alpha_sapphire: "Krakeelo schreit und stampft mit seinen Füßen auf den Boden.\nDanach kann es für eine Weile nichts hören. Dies scheint die\nSchwachstelle dieses Pokémon zu sein."
        es:
          omega_ruby: "Los bramidos de Loudred pueden echar abajo una casa\nreforzada con vigas de madera. Este Pokémon usa el vozarrón\nque tiene para castigar a sus rivales. Las orejas redondas le\nsirven de altavoces."
          alpha_sapphire: "Loudred grita a la vez que da pisotones. Una vez que deja de\nchillar, se queda ensordecido durante un buen rato; lo que se\nconsidera su punto débil."
        ko:
          omega_ruby: "나무로 만든 집을 산산조각 내 날려버릴 만큼\n큰 소리를 내어 상대를 혼내준다.\n둥근 귀가 스피커 역할을 한다."
          alpha_sapphire: "발을 동동 구르면서 큰 소리를 낸다.\n큰 소리를 낸 후에는 잠시 동안\n아무것도 듣지 못하게 되는 것이 약점이다."
