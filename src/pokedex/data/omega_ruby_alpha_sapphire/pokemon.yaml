      descriptions:
        jp_kana:
          omega_ruby: "ちのうが　たかく　きのみは\nやいてから　たべる　しゅうせい。\nひとの　てつだいを　このんでいる。"
          alpha_sapphire: "かざんの　ほらあなで　くらす。\nあたまの　ふさの　なかが　もえていて\n３００どの　こうおんになる。"
        jp_kanji:
          omega_ruby: "知能が　高く　木の実は\n焼いてから　食べる　習性。\n人の　手伝いを　好んでいる。"
          alpha_sapphire: "火山の　洞穴で　暮らす。\n頭の　ふさの　中が　燃えていて\n３００度の　高温になる。"
        en:
          omega_ruby: "Very intelligent, it roasts berries before eating them.\nIt likes to help people."
          alpha_sapphire: "This Pokémon lives in caves in volcanoes.\nThe fire within the tuft on its head can reach\n600 degrees Fahrenheit."
        fr:
          omega_ruby: "Un Pokémon très intelligent qui adore cuire ses Baies\navant de les manger. Il aime aussi aider les humains."
          alpha_sapphire: "Il vit dans les cratères des volcans. L’intérieur de la mèche\nqu’il a sur la tête peut atteindre 300 °C."
        it:
          omega_ruby: "È molto intelligente e ha l’abitudine di arrostire le bacche\nprima di mangiarle. Adora aiutare gli esseri umani."
          alpha_sapphire: "Vive nelle grotte vulcaniche. L’interno del ciuffo che ha\nin testa brucia a una temperatura di 300 °C."
        de:
          omega_ruby: "Ein kultiviertes Pokémon, das Beeren vor dem Verzehr stets\nanbrät. Es bietet den Menschen gerne seine Hilfe an."
          alpha_sapphire: "Das Feuer in seinem Kopfbüschel erreicht Temperaturen\nvon bis zu 300 °C. Es ist in Vulkanhöhlen zu Hause."
        es:
          omega_ruby: "Pokémon muy inteligente que tiene la costumbre de tostar las\nbayas antes de comérselas. Ayuda mucho a los humanos."
          alpha_sapphire: "Vive en cuevas volcánicas. El interior de su mata de pelo\narde, llegando a alcanzar hasta 300 °C."
        ko:
          omega_ruby: "지능이 높고 나무열매는\n구운 뒤 먹는 습성이 있다.\n사람 도와주기를 좋아한다."
          alpha_sapphire: "화산 동굴에서 산다.\n머리의 송아리 속이 불타고 있어\n300도나 되는 높은 온도가 된다."
