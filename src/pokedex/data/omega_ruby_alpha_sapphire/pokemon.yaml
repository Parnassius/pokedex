        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - pressure
      descriptions:
        jp_kana:
          omega_ruby: "レーザーを　あびた　うちゅうウィルスの　ＤＮＡが\nとつぜんへんいを　おこして　うまれた　ポケモン。\nむねの　すいしょうたいが　のうみそ　らしい。"
          alpha_sapphire: "うちゅうウィルスから　たんじょうした　ポケモン。\nちのうが　たかく　ちょうのうりょくを　あやつる。\nむねの　すいしょうたいから　レーザーを　だす。"
        jp_kanji:
          omega_ruby: "レーザーを　浴びた　宇宙ウィルスの　ＤＮＡが\n突然変異を　起こして　生まれた　ポケモン。\n胸の　水晶体が　脳みそ　らしい。"
          alpha_sapphire: "宇宙ウィルスから　誕生した　ポケモン。\n知能が　高く　超能力を　操る。\n胸の　水晶体から　レーザーを　出す。"
        en:
          omega_ruby: "The DNA of a space virus underwent a sudden mutation upon\nexposure to a laser beam and resulted in Deoxys.\nThe crystalline organ on this Pokémon’s chest appears to be\nits brain."
          alpha_sapphire: "Deoxys emerged from a virus that came from space. It is highly\nintelligent and wields psychokinetic powers. This Pokémon\nshoots lasers from the crystalline organ on its chest."
        fr:
          omega_ruby: "L’ADN d’un virus extraterrestre entama une mutation\nnon attendue suite à une exposition à un rayon laser,\nce qui créa Deoxys. L’organe cristallin se trouvant\nsur la poitrine de ce Pokémon semble être son cerveau."
          alpha_sapphire: "Deoxys était à l’origine un virus provenant de l’espace. Il est\nextrêmement intelligent et dispose de pouvoirs télékinétiques.\nCe Pokémon envoie des lasers avec l’organe cristallin situé\nsur sa poitrine."
        it:
          omega_ruby: "Il DNA di un virus spaziale ha subito un’improvvisa mutazione,\nin seguito all’esposizione a un raggio laser. Questo ha\ndato vita a Deoxys. Pare che l’organo cristallino sul suo petto\ncostituisca il cervello."
          alpha_sapphire: "Deoxys è nato da un virus proveniente dallo spazio. È dotato\ndi estrema intelligenza e di poteri psicocinetici. Spara raggi\nlaser dall’organo cristallino del proprio corpo."
        de:
          omega_ruby: "Die DNS eines Weltraumvirus hat eine spontane Mutation\nerfahren, da sie einem Laserstrahl ausgesetzt wurde.\nDaraus entstand Deoxys. Das kristallartige Organ auf\nder Brust dieses Pokémon ist sein Gehirn."
          alpha_sapphire: "Deoxys ging aus einem Virus aus dem Weltraum hervor.\nEs ist sehr intelligent und nutzt psychokinetische Energie.\nDieses Pokémon verschießt Laserstrahlen aus einem\nkristallartigen Organ auf seinem Brustkorb."
        es:
          omega_ruby: "Tras estar expuesto a un rayo láser, el ADN de un virus\nespacial sufrió una mutación y dio origen a Deoxys. Según\nparece, el órgano cristalino que este Pokémon tiene en el\ntorso es el cerebro."
          alpha_sapphire: "Deoxys surgió a partir de un virus espacial. Tiene un alto nivel\nintelectual y poderes psicoquinéticos. Este Pokémon dispara\nrayos láser por el órgano cristalino que tiene en el torso."
        ko:
          omega_ruby: "레이저를 쬔 우주 바이러스의 DNA가\n돌연변이를 일으켜 태어난 포켓몬이다.\n가슴의 수정체가 뇌인 것 같다."
          alpha_sapphire: "우주 바이러스에서 태어난 포켓몬이다.\n지능이 높고 초능력을 쓸 수 있다.\n가슴의 수정체에서 레이저를 쏜다."
