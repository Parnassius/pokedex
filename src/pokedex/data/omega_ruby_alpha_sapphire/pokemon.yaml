        jp_kana:
          omega_ruby: "はねるたび　リリンと　おとを　だす。\nたかい　しゅうはすうの　なきごえで\nあいての　みみを　きこえなくする。"
          alpha_sapphire: "とびはねると　くちのなかにある\nたまが　あちこちに　はんしゃして\nすずのような　ねいろと　なる。"
        jp_kanji:
          omega_ruby: "跳ねるたびに　リリンと　音を　出す。\n高い　周波数の　鳴き声で\n相手の　耳を　聞こえなくする。"
          alpha_sapphire: "飛び跳ねると　口の中にある\n玉が　あちこちに　反射して\n鈴のような　音色と　なる。"
        en:
          omega_ruby: "Each time it hops, it makes a ringing sound.\nIt deafens foes by emitting high-frequency cries."
          alpha_sapphire: "There is an orb inside its mouth. When it hops,\nthe orb bounces all over and makes a\nringing sound."
        fr:
          omega_ruby: "Il produit un bruit de sonnerie à chaque bond. Il assourdit\nl’ennemi avec ses cris à haute fréquence."
          alpha_sapphire: "Quand il sautille, l’orbe qu’il a dans la bouche s’agite et tinte\ncomme une cloche."
        it:
          omega_ruby: "A ogni salto produce un suono che sembra uno squillo.\nI suoi versi ad alta frequenza assordano i nemici."
          alpha_sapphire: "Ha una sfera nella gola. Quando saltella, la sfera si muove\nemettendo dei trilli."
        de:
          omega_ruby: "Jedes Mal, wenn es hüpft, entsteht ein klingender Laut.\nSeine hohen Schreie machen die Gegner taub."
          alpha_sapphire: "In seinem Maul befindet sich eine Kugel, die beim Hopsen\nein klingelndes Geräusch erzeugt."
        es:
          omega_ruby: "Emite un tintineo cada vez que salta. Ensordece a sus rivales\ncon sonidos de alta frecuencia."
          alpha_sapphire: "Tiene una esfera en la boca. Cuando salta, la esfera rebota y\nemite un tintineo."
        ko:
          omega_ruby: "뛸 때마다 딸랑딸랑 소리를 낸다.\n높은 주파수의 울음소리로\n상대의 귀를 들리지 않게 한다."
          alpha_sapphire: "뛰어오르면 입안에 있는\n구슬이 사방에 반사되어\n방울 같은 음색을 만들어 낸다."
