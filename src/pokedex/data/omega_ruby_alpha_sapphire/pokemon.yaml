          alpha_sapphire: "６ほんの　あしで　おとなを　かかえて\nらくらくと　とぶ　ことが　できる。\nしっぽの　はねで　バランスを　とる。"
        jp_kanji:
          omega_ruby: "高速で　飛んで　すれ違った\n相手の　首を　一瞬で\nかみちぎる　戦い方を　好む。"
          alpha_sapphire: "６本の　脚で　大人を　抱えて\n楽々と　飛ぶ　ことが　できる。\n尻尾の　羽で　バランスを　とる。"
        en:
          omega_ruby: "It prefers to battle by biting apart foes’ heads\ninstantly while flying by at high speed."
          alpha_sapphire: "This six-legged Pokémon is easily capable of\ntransporting an adult in flight. The wings on its tail\nhelp it stay balanced."
        fr:
          omega_ruby: "Il excelle dans l’art de mordre ses ennemis en plein vol,\net à grande vitesse."
          alpha_sapphire: "Il peut voler avec aise tout en portant un adulte dans ses six\npattes. Les ailes de sa queue lui servent de balancier."
        it:
          omega_ruby: "Preferisce piombare sui nemici a grande velocità per\ntagliuzzarli a dovere in un batter d’occhio."
          alpha_sapphire: "Riesce a volare comodamente anche trasportando un adulto\ncon le sue sei zampe. Si bilancia con la coda."
        de:
          omega_ruby: "Seine bevorzugte Strategie besteht darin, seine Gegner aus\ndem Flug blitzartig zur Strecke zu bringen."
          alpha_sapphire: "Es kann mühelos einen Erwachsenen umhertragen. Die Federn\nan seinem Hinterteil stabilisieren seinen Flug."
        es:
          omega_ruby: "Su técnica favorita consiste en volar a gran velocidad y\ndespedazar con su mandíbula a su oponente en un instante."
          alpha_sapphire: "Con sus seis patas puede llevar a un adulto y volar con\ncomodidad. Se equilibra con las alas de su cola."
        ko:
          omega_ruby: "고속으로 날아서 스친\n상대의 목을 한순간에\n물어뜯는 싸움법을 선호한다."
          alpha_sapphire: "6개의 다리로 어른을 껴안고도\n너끈히 날 수 있다.\n꼬리의 날개로 균형을 잡는다."
leafeon:
  species_id: 470
  names:
    jp_kana: リーフィア
    jp_kanji: リーフィア
    en: Leafeon
    fr: Phyllali
    it: Leafeon
    de: Folipurba
    es: Leafeon
    ko: 리피아
  forms:
    leafeon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 110
        defense: 130
        special_attack: 60
        special_defense: 65
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
