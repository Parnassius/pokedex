        en:
          omega_ruby: "If you come across a young Kangaskhan playing by itself, you\nmust never disturb it or attempt to catch it. The baby\nPokémon’s parent is sure to be in the area, and it will become\nviolently enraged at you."
          alpha_sapphire: "If you come across a young Kangaskhan playing by itself,\nyou must never disturb it or attempt to catch it. The baby\nPokémon’s parent is sure to be in the area, and it will\nbecome violently enraged at you."
