          alpha_sapphire: "あたたかい　みなみかぜに　のって　うみを　こえ\nがいこくまで　とんでいってしまう　ポケモン。\nつめたい　くうきに　ふれると　じめんに　おりる。"
        jp_kanji:
          omega_ruby: "暖かい　南風に　乗って　海を　越え\n外国まで　飛んでいってしまう　ポケモン。\n冷たい　空気に　触れると　地面に　降りる。"
          alpha_sapphire: "暖かい　南風に　乗って　海を　越え\n外国まで　飛んでいってしまう　ポケモン。\n冷たい　空気に　触れると　地面に　降りる。"
        en:
          omega_ruby: "Jumpluff rides warm southern winds to cross the sea and fly to\nforeign lands. The Pokémon descends to the ground when it\nencounters cold air while it is floating."
          alpha_sapphire: "Jumpluff rides warm southern winds to cross the sea and fly to\nforeign lands. The Pokémon descends to the ground when it\nencounters cold air while it is floating."
        fr:
          omega_ruby: "Cotovol traverse la mer, porté par les vents, pour découvrir\nde nouveaux territoires. Ce Pokémon se rapproche du sol\nquand le vent est trop froid."
          alpha_sapphire: "Cotovol traverse la mer, porté par les vents, pour découvrir\nde nouveaux territoires. Ce Pokémon se rapproche du sol\nquand le vent est trop froid."
        it:
          omega_ruby: "Jumpluff si affida alle correnti d’aria calda per attraversare\nil mare e volare verso terre lontane. Questo Pokémon\nridiscende a terra quando incontra una corrente fredda\nmentre fluttua."
          alpha_sapphire: "Jumpluff si affida alle correnti d’aria calda per attraversare\nil mare e volare verso terre lontane. Questo Pokémon\nridiscende a terra quando incontra una corrente fredda\nmentre fluttua."
        de:
