          alpha_sapphire: "La sua fiamma interna, alla temperatura di 1400 °C, sviluppa\nuna potenza tale da distruggere un autocarro."
        de:
          omega_ruby: "Nimmt es in einem heißen Kampf Schaden, wird es hart wie\nStein und fällt in eine Trance, um seinen Verstand zu schärfen."
          alpha_sapphire: "Erhitzt das Innere seines Körpers auf 1 400 °C und erlangt so\ndie Kraft, um mit der Faust Laster zu zerstören."
        es:
          omega_ruby: "Cuando resulta gravemente herido, se endurece como una\npiedra y medita para agudizar la mente."
          alpha_sapphire: "Genera llamas que alcanzan los 1400 °C con las que es capaz\nde destrozar un camión."
        ko:
          omega_ruby: "격렬한 싸움으로 상처 입으면\n바위처럼 굳어져 묵상하며\n마음을 연마한다."
          alpha_sapphire: "체내에서 1400도의 불꽃을\n태워서 덤프트럭을 펀치로\n파괴할 정도의 파워를 만든다."
maractus:
