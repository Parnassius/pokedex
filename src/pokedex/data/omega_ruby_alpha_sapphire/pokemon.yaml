          omega_ruby: "トレーナーの　あかるい　かんじょうに　ふれている\nキルリアは　うつくしく　せいちょうすると　いう。\nはったつした　のうで　サイコパワーを　あやつる。"
          alpha_sapphire: "あたまの　ツノで　ぞうふくされた　サイコパワーが\nつかわれるとき　まわりの　くうかんが　ねじまがり\nげんじつには　ない　けしきが　みえると　いう。"
        jp_kanji:
          omega_ruby: "トレーナーの　明るい　感情に　触れている\nキルリアは　美しく　成長すると　いう。\n発達した　脳で　サイコパワーを　操る。"
          alpha_sapphire: "頭の　ツノで　増幅された　サイコパワーが\n使われるとき　周りの　空間が　ねじ曲がり\n現実には　ない　景色が　見えると　いう。"
        en:
          omega_ruby: "It is said that a Kirlia that is exposed to the positive emotions\nof its Trainer grows beautiful. This Pokémon controls\npsychokinetic powers with its highly developed brain."
          alpha_sapphire: "Kirlia uses the horns on its head to amplify its psychokinetic\npower. When the Pokémon uses its power, the air around it\nbecomes distorted, creating mirages of nonexistent scenery."
        fr:
          omega_ruby: "On dit qu’un Kirlia exposé aux émotions positives de\nson Dresseur devient très beau. Le cerveau surdéveloppé\nde ce Pokémon lui permet de contrôler les forces\ntélékinétiques."
          alpha_sapphire: "Kirlia utilise ses cornes pour amplifier ses pouvoirs\ntélékinétiques. Lorsque ce Pokémon utilise son pouvoir,\nl’air ambiant se déforme et crée des mirages de paysages\nqui n’existent pas."
        it:
          omega_ruby: "Si dice che Kirlia cresca molto bene se viene esposto alle\nemozioni positive del suo Allenatore. Questo Pokémon\nè dotato di poteri psicocinetici grazie al suo cervello\naltamente sviluppato."
          alpha_sapphire: "Kirlia usa le corna sul capo per amplificare i suoi poteri\npsicocinetici. Quando il Pokémon usa tali poteri, l’aria\ncircostante assume un aspetto distorto, creando miraggi\ndi scenari inesistenti."
        de:
          omega_ruby: "Man sagt, dass ein Kirlia, das häufig positive Emotionen\nseines Trainers wahrnimmt, sehr schön wird. Dieses\nPokémon kontrolliert psychokinetische Energie mit\nseinem hochentwickelten Gehirn."
          alpha_sapphire: "Kirlia benutzt die Hörner an seinem Kopf dazu, seine\npsychokinetische Energie zu verstärken. Wenn dieses\nPokémon seine spezielle Kraft einsetzt, wird die Luft\nverformt und ein Trugbild einer Landschaft erzeugt."
        es:
          omega_ruby: "Dicen que, al recibir los sentimientos positivos de su\nEntrenador, Kirlia crece con gran belleza. Este Pokémon\ncontrola poderes psicoquinéticos gracias al desarrollado\ncerebro que tiene."
          alpha_sapphire: "Kirlia usa los cuernos para amplificar los poderes de\npsicoquinesia que tiene. Cuando los usa, altera el ambiente,\nlo transforma y crea espejismos."
        ko:
          omega_ruby: "트레이너의 긍정적인 감정에 닿은\n킬리아는 아름답게 성장한다고 한다.\n발달한 뇌로 사이코 파워를 다룬다."
          alpha_sapphire: "머리의 뿔로 증폭된 사이코 파워를\n사용할 때 주변의 공간이 비틀어져\n현실에는 없는 풍경이 보인다고 한다."
