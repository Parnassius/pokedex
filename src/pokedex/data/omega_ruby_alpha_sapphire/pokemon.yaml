      abilities:
        - swift_swim
        - rain_dish
      hidden_ability: own_tempo
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          omega_ruby: "いけや　みずうみの　すいめんに　ういて　くらす。\nはっぱが　かれると　よわってしまうが　きれいな\nみずを　もとめて　たまに　りくちを　いどうする。"
          alpha_sapphire: "もともとは　ちじょうで　せいかつしていたが\nあたまの　はっぱが　おもくなったので　みずに\nうかんで　くらすようになったと　いわれている。"
        jp_kanji:
          omega_ruby: "池や　湖の　水面に　浮いて　暮らす。\n葉っぱが　枯れると　弱ってしまうが　きれいな\n水を　求めて　たまに　陸地を　移動する。"
          alpha_sapphire: "元々は　地上で　生活していたが\n頭の　葉っぱが　重くなったので　水に\n浮かんで　暮らすようになったと　いわれている。"
        en:
          omega_ruby: "Lotad live in ponds and lakes, where they float on the surface.\nIt grows weak if its broad leaf dies. On rare occasions, this\nPokémon travels on land in search of clean water."
          alpha_sapphire: "Lotad is said to have dwelled on land before. However, this\nPokémon is thought to have returned to water because the\nleaf on its head grew large and heavy. It now lives by floating\natop the water."
        fr:
          omega_ruby: "Nénupiot vit dans les étangs et les lacs, sur lesquels\nil flotte à la surface. Si sa feuille tombe, il est affaibli.\nDe temps en temps, ce Pokémon sort sur la terre ferme\nà la recherche d’eau propre."
          alpha_sapphire: "On raconte que jadis, Nénupiot vivait sur terre. Mais on pense\nque ce Pokémon est retourné dans l’eau car la feuille sur\nsa tête était devenue trop grande et trop lourde. Maintenant,\nil vit en flottant à la surface de l’eau."
        it:
          omega_ruby: "Lotad vive in stagni e laghi, galleggiando a pelo d’acqua.\nS’indebolisce se muoiono le larghe foglie in superficie.\nIn rare occasioni si avventura sulla terraferma in cerca\ndi acqua pulita."
          alpha_sapphire: "Si dice che prima Lotad vivesse sulla terraferma. Tuttavia,\nsi dice che sia tornato all’acqua perché le foglie che ha\nsulla testa erano diventate troppo grandi e pesanti.\nOra vive galleggiando a pelo d’acqua."
        de:
          omega_ruby: "Loturzel lebt auf der Wasseroberfläche von Teichen oder Seen.\nEs wird schwächer, wenn sein breites Blatt abstirbt. Nur selten\ngeht dieses Pokémon an Land, um nach sauberem Wasser\nAusschau zu halten."
          alpha_sapphire: "Loturzel soll einige Zeit an Land verbracht haben, aber ins\nWasser zurückgekehrt sein, weil das Blatt auf seinem Kopf\nzu groß und zu schwer geworden ist. Nun lässt es sich auf\ndem Wasser treiben."
        es:
          omega_ruby: "Lotad vive en estanques y lagos, donde permanece flotando.\nSi se le marchita la ancha hoja que tiene en la cabeza, se\ndebilitará. De vez en cuando, se desplaza en busca de agua\nlimpia."
          alpha_sapphire: "A Lotad se le atribuye el haber vivido antes en tierra. En\ncualquier caso, se cree que volvió al agua porque la hoja de\nla cabeza le creció mucho y le empezó a pesar. Ahora vive\nflotando en el agua."
        ko:
          omega_ruby: "연못이나 호수의 수면에 떠서 산다.\n잎사귀가 마르면 약해지지만 깨끗한\n물을 찾아 가끔 육지로 이동한다."
          alpha_sapphire: "원래는 지상에서 생활했으나\n머리의 잎사귀가 무거워져서 물에\n떠서 생활하게 됐다고 전해진다."
lombre:
  species_id: 271
  names:
