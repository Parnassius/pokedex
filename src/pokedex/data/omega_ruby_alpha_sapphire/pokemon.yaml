          omega_ruby: "あかい　コアの　ついた　ギアを\nこうそくかいてんさせて　エネルギーを\nきゅうそくチャージ　するのだ。"
          alpha_sapphire: "あかい　コアは　エネルギータンクの\nやくわり。チャージした　エネルギーを\nトゲから　しゅういに　うちだす。"
        jp_kanji:
          omega_ruby: "赤い　コアの　ついた　ギアを\n高速回転させて　エネルギーを\n急速チャージ　するのだ。"
          alpha_sapphire: "赤い　コアは　エネルギータンクの\n役割。チャージした　エネルギーを\nトゲから　周囲に　撃ち出す。"
        en:
          omega_ruby: "The gear with the red core is rotated at high speed\nfor a rapid energy charge."
          alpha_sapphire: "Its red core functions as an energy tank. It fires the\ncharged energy through its spikes into an area."
        fr:
          omega_ruby: "Il accumule rapidement de l’énergie en faisant tourner très vite\nle rouage qui contient son noyau rouge."
          alpha_sapphire: "Son noyau rouge lui permet d’accumuler de l’énergie\nqu’il projette ensuite aux alentours grâce à ses pics."
        it:
          omega_ruby: "Facendo girare velocemente l’ingranaggio dotato del nucleo\nrosso, accumula una grande quantità di energia."
          alpha_sapphire: "Il nucleo rosso serve da serbatoio di energia, che poi spara\nintorno a sé attraverso gli spuntoni."
        de:
          omega_ruby: "Indem es das Rad mit dem roten Zentrum mit hohem Tempo\nzum Rotieren bringt, kann es eine Turboladung durchführen."
          alpha_sapphire: "Der rote Zentralbestandteil dient als Energiespeicher.\nDarin geladene Energie feuert es über seine Stacheln ab."
        es:
          omega_ruby: "Recarga su energía rápidamente haciendo girar con gran\nceleridad el engranaje equipado con un núcleo rojo."
          alpha_sapphire: "El núcleo rojo sirve como depósito de la energía que expulsa\npor las púas una vez que está cargado."
        ko:
          omega_ruby: "빨간 코어가 달린 기어를\n고속 회전시켜서 에너지를\n급속 충전한다."
          alpha_sapphire: "빨간 코어는 에너지 탱크\n역할을 한다. 가시를 이용해\n모아둔 에너지를 주변에 쏘아댄다."
tynamo:
  species_id: 602
  names:
    jp_kana: シビシラス
    jp_kanji: シビシラス
    en: Tynamo
    fr: Anchwatt
    it: Tynamo
    de: Zapplardin
    es: Tynamo
