          alpha_sapphire: "マッハの　スピードで　そらを　とぶ。\nむねの　ふういんを　はがすと\nエネルギーが　ぼうそうしてしまう。"
        jp_kanji:
          omega_ruby: "ゴルーグを　作った　古代人から\n人や　ポケモンを　守るように\n命令されていると　言われている。"
          alpha_sapphire: "マッハの　スピードで　空を　飛ぶ。\n胸の　封印を　はがすと\nエネルギーが　暴走してしまう。"
        en:
          omega_ruby: "It is said that Golurk were ordered to protect\npeople and Pokémon by the ancient people who\nmade them."
          alpha_sapphire: "It flies across the sky at Mach speeds. Removing\nthe seal on its chest makes its internal energy go\nout of control."
        fr:
          omega_ruby: "Ses créateurs d’une lointaine époque lui auraient ordonné\nde protéger les humains et les Pokémon."
          alpha_sapphire: "Il vole à la vitesse du son. Si le sceau sur sa poitrine est retiré,\nil perd tout contrôle de lui-même."
        it:
          omega_ruby: "Si narra che gli antichi costruttori dei Golurk avessero\nordinato loro di proteggere gli uomini e i Pokémon."
          alpha_sapphire: "Vola alla velocità del suono. Se rimuove il sigillo che ha sul\npetto, sprigiona un’energia incontrollabile."
        de:
          omega_ruby: "Man munkelt, sein Schöpfer habe ihm aufgetragen,\nschützend über Pokémon und Menschen zu wachen."
          alpha_sapphire: "Es jagt mit Schallgeschwindigkeit durch die Lüfte. Nimmt man\ndas Siegel auf der Brust ab, gerät es außer Kontrolle."
        es:
          omega_ruby: "Al parecer, aquel que antaño lo creó le ordenó proteger a los\nPokémon y a los humanos."
          alpha_sapphire: "Vuela a velocidad mach. Pierde el control de su energía si se\nle retira el sello del pecho."
        ko:
          omega_ruby: "골루그를 만든 고대인에게\n사람과 포켓몬을 지키도록\n명령받았다고 전해진다."
          alpha_sapphire: "마하의 스피드로 하늘을 난다.\n가슴의 봉인을 떼어내면\n에너지가 폭주해 버린다."
pawniard:
  species_id: 624
  names:
    jp_kana: コマタナ
    jp_kanji: コマタナ
    en: Pawniard
    fr: Scalpion
    it: Pawniard
    de: Gladiantri
    es: Pawniard
    ko: 자망칼
  forms:
    pawniard:
      form_id: 0
      base_stats:
        hp: 45
        attack: 85
        defense: 70
        special_attack: 40
        special_defense: 40
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - steel
      egg_groups:
        - human_like
      abilities:
