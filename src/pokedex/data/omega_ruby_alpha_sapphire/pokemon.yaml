          omega_ruby: "おおぞらで　えんをえがきつつ　とび\nえものを　みつけると　おそいかかって\nすまで　かるがると　はこんでいく。"
          alpha_sapphire: "そらから　ちじょうを　かんさつして\nよわった　えものに　おそいかかる。\nほねで　きかざる　しゅうせい。"
        jp_kanji:
          omega_ruby: "大空で　円を描きつつ　飛び\n獲物を　みつけると　襲いかかって\n巣まで　軽々と　運んでいく。"
          alpha_sapphire: "空から　地上を　観察して\n弱った　獲物に　襲いかかる。\n骨で　着飾る　習性。"
        en:
          omega_ruby: "They fly in circles around the sky. When they spot\nprey, they attack and carry it back to their nest\nwith ease."
          alpha_sapphire: "Watching from the sky, they swoop to strike\nweakened Pokémon on the ground. They decorate\nthemselves with bones."
        fr:
          omega_ruby: "Il tournoie dans les airs en quête d’une proie sur laquelle\nil fondra avant de l’emporter avec aisance à son nid."
          alpha_sapphire: "Il guette le sol depuis les airs et fond sur les proies affaiblies.\nIl aime s’apprêter avec des ossements."
        it:
          omega_ruby: "Vola in cerchio nel cielo e quando scorge una preda le si\nlancia contro in picchiata per trasportarla al suo nido."
          alpha_sapphire: "Osserva la terra dal cielo e si lancia sulle prede in difficoltà.\nHa l’abitudine di farsi delle decorazioni con le ossa."
        de:
          omega_ruby: "Es kreist am Himmel, bis es seine Beute findet. Nach erfolgtem\nAngriff trägt es sie mühelos zu seinem Nest."
          alpha_sapphire: "Es überblickt das Areal aus der Luft und stürzt sich auf ein\ngeschwächtes Opfer. Trägt gern Knochenschmuck."
        es:
          omega_ruby: "Vuela en círculos. Cuando avista una presa, la ataca y la\ntransporta a su nido con suma facilidad."
          alpha_sapphire: "Otea la superficie desde el cielo y ataca a Pokémon\ndebilitados. Tiene por costumbre hacerse adornos con\nhuesos."
        ko:
          omega_ruby: "넓은 하늘에서 원을 그리며 날고\n먹이를 발견하면 덮쳐서\n둥지까지 가뿐히 나른다."
          alpha_sapphire: "하늘에서 지상을 관찰하다\n쇠약해진 먹이를 덮친다.\n뼈로 몸치장하는 습성이 있다."
heatmor:
  species_id: 631
  names:
    jp_kana: クイタラン
    jp_kanji: クイタラン
    en: Heatmor
    fr: Aflamanoir
    it: Heatmor
    de: Furnifraß
    es: Heatmor
    ko: 앤티골
  forms:
    heatmor:
      form_id: 0
      base_stats:
        hp: 85
        attack: 97
        defense: 66
        special_attack: 105
        special_defense: 66
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - gluttony
        - flash_fire
      hidden_ability: white_smoke
      descriptions:
        jp_kana:
          omega_ruby: "こうおんで　もえる　ほのおの　したで\nアイアントの　はがねの　からだを\nとかして　なかみを　いただくのだ。"
          alpha_sapphire: "しっぽから　とりこんだ　くうきを\nほのおにかえて　ベロのように　つかい\nアイアントを　とかして　たべるぞ。"
        jp_kanji:
          omega_ruby: "高温で　燃える　炎の　舌で\nアイアントの　鋼の　体を　溶かして\n中身を　いただくのだ。"
          alpha_sapphire: "尻尾から　取りこんだ　空気を\n炎に変えて　ベロのように　使い\nアイアントを　溶かして　食べるぞ。"
        en:
          omega_ruby: "Using their very hot, flame-covered tongues,\nthey burn through Durant’s steel bodies and\nconsume their insides."
          alpha_sapphire: "It draws in air through its tail, transforms it into fire,\nand uses it like a tongue. It melts Durant and\neats them."
        fr:
          omega_ruby: "Avec sa langue de feu à haute température, il fait fondre\nle corps d’acier des Fermite pour les dévorer."
          alpha_sapphire: "Il aspire de l’air par la queue et le transforme en une langue\nde feu qui fait fondre les Fermite dont il se régale."
        it:
          omega_ruby: "Con la sua lingua infuocata scioglie la corazza d’acciaio\ndi Durant e ne consuma l’interno."
          alpha_sapphire: "Converte l’aria che aspira dalla coda in una lingua di fiamme\nche usa per sciogliere i Durant prima di consumarli."
        de:
          omega_ruby: "Mit seiner brandheißen Zunge bringt es Fermicula zum\nSchmelzen, um so an sein weiches Inneres zu gelangen."
          alpha_sapphire: "Über den Schweif aufgesaugte Luft wird in eine Feuerzunge\nverwandelt, um damit Fermicula zu schmelzen und zu fressen."
        es:
          omega_ruby: "Usa su lengua de fuego para derretir la armadura de acero de\nlos Durant y llegar así hasta su interior."
          alpha_sapphire: "Absorbe aire por el orificio de su cola para prender una lengua\nde llamas con la que derrite a los Durant para comerlos."
        ko:
          omega_ruby: "뜨겁게 타오르는 불꽃의 혀로\n아이앤트의 강철 몸을\n녹여서 알맹이를 먹어치운다."
          alpha_sapphire: "꼬리에서 빨아들인 공기를\n불꽃으로 바꿔 혀처럼 사용해\n아이앤트를 녹여서 먹는다."
durant:
  species_id: 632
  names:
    jp_kana: アイアント
    jp_kanji: アイアント
    en: Durant
    fr: Fermite
    it: Durant
    de: Fermicula
    es: Durant
    ko: 아이앤트
  forms:
    durant:
      form_id: 0
      base_stats:
        hp: 58
        attack: 109
        defense: 112
        special_attack: 48
        special_defense: 48
