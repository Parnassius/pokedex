        jp_kana:
          omega_ruby: "ふかい　ねむりに　さそう　ちからで\nひとや　ポケモンに　あくむを　みせて\nじぶんの　なわばりから　おいだす。"
          alpha_sapphire: "ひとびとを　ふかい　ねむりに　さそい\nゆめを　みせる　のうりょくを　もつ。\nしんげつの　よるに　かつどうする。"
        jp_kanji:
          omega_ruby: "深い　眠りに　誘う　力で\n人や　ポケモンに　悪夢を　見せて\n自分の　縄張りから　追い出す。"
          alpha_sapphire: "人々を　深い　眠りに　誘い\n夢を　見せる　能力を　持つ。\n新月の　夜に　活動する。"
        en:
          omega_ruby: "It chases people and Pokémon from its territory by\ncausing them to experience deep,\nnightmarish slumbers."
          alpha_sapphire: "It can lull people to sleep and make them dream.\nIt is active during nights of the new moon."
        fr:
          omega_ruby: "Il endort humains et Pokémon, et leur fait avoir\ndes cauchemars pour les chasser de son territoire."
          alpha_sapphire: "Il a la capacité de bercer les gens pour les faire rêver.\nIl se montre durant les nuits de nouvelle lune."
        it:
          omega_ruby: "Respinge umani e Pokémon dal suo territorio inducendoli\na un sonno profondo e provocando incubi."
          alpha_sapphire: "Ha l’abilità di far addormentare la gente e farla sognare.\nÈ attivo nelle notti di luna nuova."
        de:
          omega_ruby: "Es vertreibt Eindringlinge aus seinem Revier, indem es sie\nin Schlaf versetzt und mit Alpträumen quält."
          alpha_sapphire: "Es kann andere in Schlaf versetzen und ihnen Träume geben.\nEs ist nur bei Neumond aktiv."
        es:
          omega_ruby: "Defiende su territorio de personas y Pokémon haciéndoles\ndormir y provocándoles pesadillas."
          alpha_sapphire: "Puede adormecer a la gente y hacerles soñar. Está activo en\nlas noches de luna nueva."
        ko:
          omega_ruby: "깊은 잠으로 끌어들이는 힘으로\n사람과 포켓몬에게 악몽을 꾸게 해\n자신의 영역에서 쫓아낸다."
          alpha_sapphire: "사람들을 깊은 잠으로 끌어들여\n꿈을 꾸게 하는 능력을 가지고 있다.\n그믐달이 뜨는 밤에 활동한다."
shaymin:
  species_id: 492
  names:
    jp_kana: シェイミ
    jp_kanji: シェイミ
    en: Shaymin
    fr: Shaymin
    it: Shaymin
    de: Shaymin
    es: Shaymin
    ko: 쉐이미
  forms:
    shaymin_land_forme:
      form_id: 0
      names:
        jp_kana: ランドフォルム
        jp_kanji: ランドフォルム
        en: Land Forme
        fr: Forme Terrestre
        it: Forma Terra
        de: Landform
        es: Forma Tierra
        ko: 랜드폼
      base_stats:
        hp: 100
        attack: 100
        defense: 100
        special_attack: 100
        special_defense: 100
        speed: 100
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - undiscovered
      abilities:
        - natural_cure
      held_items:
        common: lum_berry
        rare: lum_berry
      descriptions:
        jp_kana:
          omega_ruby: "たいきの　どくそを　ぶんかいして\nあれた　だいちを　いっしゅんのうちに\nはなばたけにする　ちからを　もつ。"
          alpha_sapphire: "グラシデアのはなが　さく　きせつ\nかんしゃの　こころを　とどけるために\nとびたつと　いわれている。"
        jp_kanji:
          omega_ruby: "大気の　毒素を　分解して\n荒れた　大地を　一瞬のうちに\n花畑にする　力を　持つ。"
          alpha_sapphire: "グラシデアの花が　咲く　季節\n感謝の　心を　届けるために\n飛び立つと　言われている。"
        en:
          omega_ruby: "It can dissolve toxins in the air to instantly\ntransform ruined land into a lush field of flowers."
          alpha_sapphire: "The blooming of Gracidea flowers confers the\npower of flight upon it. Feelings of gratitude are\nthe message it delivers."
        fr:
          omega_ruby: "Il peut dissoudre les toxines dans l’air pour transformer\nun désert en un champ de fleurs luxuriantes."
          alpha_sapphire: "Il prend son essor pour répandre la gratitude lorsque\nles Gracidées fleurissent."
        it:
          omega_ruby: "Può dissolvere le tossine nell’aria per mutare all’istante\nuna terra arida in un rigoglioso campo fiorito."
          alpha_sapphire: "Si narra che Shaymin si alzi in volo per esprimere commossa\ngratitudine per la fioritura delle gracidee."
        de:
          omega_ruby: "Es kann die Luft von Giften reinigen und Ödland in ein üppig\nblühendes Blumenfeld verwandeln."
          alpha_sapphire: "Es heißt, wenn die Gracidea blühen, drückt es seine\nDankbarkeit aus, indem es hoch in die Lüfte fliegt."
        es:
          omega_ruby: "Puede disolver las toxinas del aire para transformar tierra\nyerma en campos de flores."
          alpha_sapphire: "Se dice que, cuando florecen las Gracídeas, Shaymin alza el\nvuelo para mostrar su gratitud."
        ko:
          omega_ruby: "대기의 독소를 분해해서\n거칠어진 대지를 일순간에\n꽃밭으로 만드는 힘을 가지고 있다."
          alpha_sapphire: "그라시데아꽃이 피는 계절에\n감사의 마음을 전하기 위해\n날아오른다고 전해진다."
