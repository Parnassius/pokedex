      descriptions:
        jp_kana:
          omega_ruby: "ふかい　うみの　そこで　くらす。\n４まいの　ひれの　もようを　ひからせ\nえものを　おびきよせる。"
          alpha_sapphire: "てんてきに　みつからないように\nむねの　２まいの　ひれを　つかい\nかいていを　はって　いどうする。"
        jp_kanji:
          omega_ruby: "深い　海の　底で　暮らす。\n４枚の　ヒレの　模様を　光らせて\n獲物を　おびき寄せる。"
          alpha_sapphire: "天敵に　見つからないように\n胸の　２枚の　ヒレを　使い\n海底を　這って　移動する。"
        en:
          omega_ruby: "It lives on the deep-sea floor. It attracts prey by\nflashing the patterns on its four tail fins."
          alpha_sapphire: "To avoid detection by predators, it crawls along the\nseafloor using the two fins on its chest."
        fr:
          omega_ruby: "Il vit au plus profond de l’océan. Il attire sa proie en illuminant\nles motifs de ses quatre nageoires."
          alpha_sapphire: "Pour éviter de se faire voir par ses ennemis, il rampe au fond\nde l’eau grâce aux nageoires sur son torse."
        it:
          omega_ruby: "Vive negli abissi marini. Attira le prede illuminando i motivi\ndelle sue quattro pinne."
          alpha_sapphire: "Per non farsi scoprire dai nemici, si muove lentamente sui\nfondali marini con le due pinne pettorali."
        de:
          omega_ruby: "Es lebt tief auf dem Meeresboden. Das blinkende Muster auf\nseinen vier Rückenflossen zieht Beute an."
          alpha_sapphire: "Um nicht von Fressfeinden entdeckt zu werden, krabbelt es\nauf zwei Brustflossen am Meeresboden."
        es:
          omega_ruby: "Vive en las profundidades marinas. Atrae a sus presas con\nparpadeos del dibujo de sus cuatro aletas."
          alpha_sapphire: "Para que los depredadores no lo detecten, se arrastra por el\nfondo marino con las aletas del pecho."
        ko:
          omega_ruby: "깊은 바다의 밑바닥에서 산다.\n4개의 지느러미 무늬를 반짝거려\n먹이를 끌어들인다."
          alpha_sapphire: "천적에게 발견되지 않도록\n가슴에 있는 2개의 지느러미로\n해저에 붙어서 이동한다."
mantyke:
