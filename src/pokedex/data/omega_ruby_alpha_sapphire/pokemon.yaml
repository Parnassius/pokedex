        jp_kana:
          omega_ruby: "はげしい　たたかいで　きずつくと\nいわのように　かたまり　もっこうして\nこころを　とぎすませるのだ。"
          alpha_sapphire: "たいないで　１４００どの　ほのおを\nもやすことで　ダンプカーを　パンチで\nはかいするほどの　パワーを　つくる。"
        jp_kanji:
          omega_ruby: "激しい　戦いで　傷つくと\n岩のように　固まり　黙考して\n心を　研ぎ澄ませるのだ。"
          alpha_sapphire: "体内で　１４００度の　炎を\n燃やすことで　ダンプカーを　パンチで\n破壊するほどの　パワーを　作る。"
        en:
          omega_ruby: "When one is injured in a fierce battle, it hardens\ninto a stone-like form. Then it meditates and\nsharpens its mind."
          alpha_sapphire: "Its internal fire burns at 2,500 degrees Fahrenheit,\nmaking enough power that it can destroy a dump\ntruck with one punch."
        fr:
          omega_ruby: "S’il est blessé dans un combat, il se fige comme un rocher,\nfait le vide dans son esprit et aiguise ses sens."
          alpha_sapphire: "Il entretient des flammes à 1 400 °C dans son corps.\nDe quoi détruire un camion-benne d’un coup de poing !"
        it:
          omega_ruby: "Se resta ferito durante una battaglia violenta, diventa duro\ncome la pietra e medita per purificare la mente."
          alpha_sapphire: "La sua fiamma interna, alla temperatura di 1400 °C, sviluppa\nuna potenza tale da distruggere un autocarro."
        de:
          omega_ruby: "Nimmt es in einem heißen Kampf Schaden, wird es hart wie\nStein und fällt in eine Trance, um seinen Verstand zu schärfen."
          alpha_sapphire: "Erhitzt das Innere seines Körpers auf 1 400 °C und erlangt so\ndie Kraft, um mit der Faust Laster zu zerstören."
        es:
          omega_ruby: "Cuando resulta gravemente herido, se endurece como una\npiedra y medita para agudizar la mente."
          alpha_sapphire: "Genera llamas que alcanzan los 1400 °C con las que es capaz\nde destrozar un camión."
        ko:
          omega_ruby: "격렬한 싸움으로 상처 입으면\n바위처럼 굳어져 묵상하며\n마음을 연마한다."
          alpha_sapphire: "체내에서 1400도의 불꽃을\n태워서 덤프트럭을 펀치로\n파괴할 정도의 파워를 만든다."
