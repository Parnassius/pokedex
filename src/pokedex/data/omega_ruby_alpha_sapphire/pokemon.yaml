          alpha_sapphire: "すいちゅうの　えものを　おいかける\nうちに　うきぶくろが　はったつした。\nゴムボートのように　ひとを　のせる。"
        jp_kanji:
          omega_ruby: "発達した　浮き袋で　浮かぶ。\nおぼれた　人を　救助する\n手伝いを　している　ポケモンだ。"
          alpha_sapphire: "水中の　獲物を　追いかける　うちに\n浮き袋が　発達した。\nゴムボートのように　人を　乗せる。"
        en:
          omega_ruby: "It floats using its well-developed flotation sac.\nIt assists in the rescues of drowning people."
          alpha_sapphire: "Its flotation sac developed as a result of pursuing\naquatic prey. It can double as a rubber raft."
        fr:
          omega_ruby: "Il flotte grâce à sa bouée très développée. Il vole au secours\ndes gens sur le point de se noyer."
          alpha_sapphire: "Il a développé une bouée pour poursuivre ses proies\naquatiques. Elle fait office de canot gonflable."
        it:
          omega_ruby: "Nuota con il suo grosso galleggiante e aiuta a soccorrere\nchi sta per annegare."
          alpha_sapphire: "Il suo galleggiante, che funge da gommone, si è sviluppato\nperché caccia le prede nell’acqua."
        de:
          omega_ruby: "Es treibt mithilfe einer Art Rettungsring auf dem Wasser und\nhilft dem, der zu ertrinken droht."
          alpha_sapphire: "Da es seit jeher Beute im Wasser jagt, entwickelte es\neinen Rettungsring."
        es:
          omega_ruby: "Nada gracias a su flotador. Ayuda en los rescates de gente\nque se está ahogando."
          alpha_sapphire: "Su flotador se desarrolló a raíz de perseguir presas acuáticas.\nTambién sirve como balsa."
        ko:
          omega_ruby: "발달한 부낭으로 뜬다.\n물에 빠진 사람을 구조하는 것을\n돕는 포켓몬이다."
          alpha_sapphire: "수중의 먹이를 쫓아가는\n사이에 부낭이 발달했다.\n고무보트처럼 사람을 태운다."
cherubi:
  species_id: 420
  names:
    jp_kana: チェリンボ
    jp_kanji: チェリンボ
    en: Cherubi
    fr: Ceribou
    it: Cherubi
    de: Kikugi
    es: Cherubi
    ko: 체리버
