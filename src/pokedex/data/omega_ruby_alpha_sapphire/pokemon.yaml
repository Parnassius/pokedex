          omega_ruby: "あたまと　しっぽの　しょっかくで\nまわりの　ようすを　さぐる。\nひじょうに　きょうぼうな　せいかく。"
          alpha_sapphire: "かみついて　もうどくを　あたえる。\nてんてきの　おおきな　とりポケモンも\nからだが　しびれて　うごけなくなる。"
        jp_kanji:
          omega_ruby: "頭と　尻尾の　触角で\nまわりの　様子を　探る。\n非常に　凶暴な　性格。"
          alpha_sapphire: "かみついて　猛毒を　与える。\n天敵の　大きな　とりポケモンも\n体が　しびれて　動けなくなる。"
        en:
          omega_ruby: "It discovers what is going on around it by using the\nfeelers on its head and tail. It is brutally aggressive."
          alpha_sapphire: "Its bite injects a potent poison, enough to paralyze\nlarge bird Pokémon that try to prey on it."
        fr:
          omega_ruby: "Il sonde les alentours avec les antennes sur sa tête\net sa queue. Il est extrêmement brutal."
          alpha_sapphire: "Sa morsure est très venimeuse. Elle paralyse même les grands\nPokémon Oiseaux, ses prédateurs."
        it:
          omega_ruby: "Sonda l’ambiente circostante con le antenne del capo e\ndella coda. Ha un carattere estremamente collerico."
          alpha_sapphire: "Mordendo, inietta un veleno potente. Anche i grandi Pokémon\nuccello, suoi predatori, ne rimangono paralizzati."
        de:
          omega_ruby: "Mit seinen Ruten und den Fühlern an seinem Kopf tastet es\ndie Umgebung ab. Ein überaus aggressiver Geselle."
          alpha_sapphire: "Es beißt Angreifer und injiziert ihnen Gift, das selbst große\nVogel-Pokémon, seine natürlichen Feinde, lähmt."
        es:
          omega_ruby: "Percibe su entorno con su sentido del tacto, residente en su\ncabeza y cola. Su carácter es violento por naturaleza."
          alpha_sapphire: "Inocula un poderoso veneno al morder. Hasta sus enemigos\nacérrimos, los Pokémon pájaro, se quedan inmóviles."
        ko:
          omega_ruby: "머리와 꼬리의 더듬이로\n주변 상황을 살핀다.\n성격이 매우 난폭하다."
          alpha_sapphire: "물어서 맹독을 퍼뜨린다.\n천적인 커다란 새포켓몬도\n몸이 마비돼서 움직일 수 없다."
whirlipede:
  species_id: 544
  names:
    jp_kana: ホイーガ
    jp_kanji: ホイーガ
    en: Whirlipede
    fr: Scobolide
    it: Whirlipede
    de: Rollum
    es: Whirlipede
    ko: 휠구
