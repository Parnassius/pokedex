        jp_kana:
          omega_ruby: "からだの　なかでは　しゃくねつの　ようがんが\nうずまいているが　ひえると　かたまって　しまい\nくずれて　からだが　ちいさく　なっていく。"
          alpha_sapphire: "からだの　なかでは　けつえきの　かわりに\nひつような　えいようと　さんそを　はこぶために\nしゃくねつの　マグマが　じゅんかんしている。"
        jp_kanji:
          omega_ruby: "体の　中では　灼熱の　溶岩が\n渦巻いているが　冷えると　固まって　しまい\n崩れて　体が　小さく　なっていく。"
          alpha_sapphire: "体の　中では　血液の　かわりに\n必要な　栄養と　酸素を　運ぶために\n灼熱の　マグマが　循環している。"
        en:
          omega_ruby: "Molten magma courses throughout Slugma’s circulatory\nsystem. If this Pokémon is chilled, the magma cools and\nhardens. Its body turns brittle and chunks fall off, reducing\nits size."
          alpha_sapphire: "Slugma does not have any blood in its body. Instead, intensely\nhot magma circulates throughout this Pokémon’s body,\ncarrying essential nutrients and oxygen to its organs."
        fr:
          omega_ruby: "Du magma en fusion coule dans les veines de Limagma.\nSi ce Pokémon est refroidi, le magma se solidifie. Son corps\ndevient alors cassant et des morceaux s’en détachent,\ndiminuant ainsi sa taille."
          alpha_sapphire: "Les veines de Limagma ne contiennent pas de sang.\nAu lieu de ça, du magma en fusion circule dans le corps\nde ce Pokémon, apportant les nutriments et l’oxygène\nnécessaires à ses organes."
        it:
          omega_ruby: "Nel corpo di Slugma scorre magma liquido. In caso di\ncongelamento, il magma si raffredda e si solidifica. Il corpo\ndiventa fragile e cade a pezzi consumandosi progressivamente."
          alpha_sapphire: "Nel corpo di Slugma non scorre nemmeno una goccia di\nsangue, bensì magma rovente, che garantisce l’apporto di\nossigeno e sostanze nutritive fondamentali per i suoi organi."
        de:
          omega_ruby: "Durch Schneckmags Kreislaufsystem fließt Magma.\nWenn dieses Pokémon erkältet ist, kühlt das Magma\naus und erhärtet. Sein Körper wird spröde und es\nbrechen Stücke heraus, sodass es kleiner wird."
          alpha_sapphire: "Schneckmag hat kein Blut in seinem Körper. Stattdessen fließt\nglühend heißes Magma in diesem Pokémon, das seine Organe\nmit lebenswichtigen Nährstoffen und Sauerstoff versorgt."
        es:
          omega_ruby: "Por el sistema circulatorio de Slugma corre magma líquido. Si\neste Pokémon se enfriara, el magma perdería el calor y se\nsolidificaría, por lo que se resquebrajaría por completo,\nperdería algunos trozos y reduciría su tamaño."
          alpha_sapphire: "Slugma no tiene sangre en su organismo, sino ardiente\nmagma que hace circular por todo el cuerpo los nutrientes\ny el oxígeno que necesitan sus órganos."
        ko:
          omega_ruby: "몸 안에는 작열하는 용암이\n소용돌이치지만 식으면 굳어지고\n부서져서 몸이 작아진다."
          alpha_sapphire: "몸 안에는 혈액 대신\n필요한 영양과 산소를 운반하기 위해\n작열하는 마그마가 순환되고 있다."
