        en:
          omega_ruby: "Photosynthesis occurs across its body under the\nsun. The shell on its back is actually hardened soil."
          alpha_sapphire: "It undertakes photosynthesis with its body, making\noxygen. The leaf on its head wilts if it is thirsty."
        fr:
          omega_ruby: "Son corps assimile la lumière du soleil par photosynthèse.\nSa carapace est faite de terre durcie."
          alpha_sapphire: "Son corps produit de l’oxygène par photosynthèse.\nLa feuille sur sa tête flétrit quand il a soif."
        it:
          omega_ruby: "Fa la fotosintesi su tutto il corpo esponendosi ai raggi solari.\nLa sua corazza è fatta di terra compatta."
          alpha_sapphire: "È in grado di svolgere la fotosintesi e di produrre ossigeno.\nLa sua foglia appassisce se ha sete."
        de:
          omega_ruby: "Im Sonnenlicht betreibt sein ganzer Körper Photosynthese.\nSein Panzer besteht aus hartem Lehm."
          alpha_sapphire: "Sein Körper lebt von der Photosynthese, die Sauerstoff\nfreisetzt. Ist es durstig, welkt sein Blatt."
        es:
          omega_ruby: "Realiza la fotosíntesis al bañarle los rayos de sol. Su concha\nestá formada por tierra endurecida."
          alpha_sapphire: "Realiza la fotosíntesis para obtener oxígeno. Si tiene sed,\nlas hojas de la cabeza se marchitan."
        ko:
          omega_ruby: "태양의 빛을 쬐어\n전신으로 광합성을 한다.\n등껍질은 흙이 딱딱해진 것이다."
          alpha_sapphire: "전신으로 광합성을 하여\n산소를 만든다. 목이 마르면\n머리의 잎사귀가 시들어 버린다."
grotle:
  species_id: 388
