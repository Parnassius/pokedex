          alpha_sapphire: "じかんを　あやつる　ちからを　もつ。\nシンオウちほうでは　かみさまと\nよばれ　しんわに　とうじょうする。"
        jp_kanji:
          omega_ruby: "ディアルガが　生まれたことで\n時間が　動き出したという\n伝説を　持つ　ポケモン。"
          alpha_sapphire: "時間を　操る　力を　持つ。\nシンオウ地方では　神様と　呼ばれ\n神話に　登場する。"
        en:
          omega_ruby: "A Pokémon spoken of in legend. It is said that time\nbegan moving when Dialga was born."
          alpha_sapphire: "It has the power to control time. It appears in\nSinnoh-region myths as an ancient deity."
        fr:
          omega_ruby: "Les mythes parlent de ce Pokémon. On dit que le temps\ns’est mis en mouvement à sa naissance."
          alpha_sapphire: "Il peut contrôler le temps. Les mythes de Sinnoh en parlent\ncomme d’une divinité ancienne."
        it:
          omega_ruby: "Pokémon menzionato nelle leggende. Pare che il tempo abbia\navuto origine alla nascita di Dialga."
          alpha_sapphire: "Ha il potere di controllare il tempo. Descritto nei miti della\nregione di Sinnoh come un’antica divinità."
        de:
          omega_ruby: "Ein Pokémon, das in Legenden zu finden ist. Man sagt,\nals Dialga geboren wurde, begann der Lauf der Zeit."
          alpha_sapphire: "Es besitzt die Macht, die Zeit zu kontrollieren. In den Mythen\nvon Sinnoh erscheint es als Gottheit."
        es:
          omega_ruby: "Un Pokémon de leyenda. Se dice que el tiempo comenzó a\navanzar cuando Dialga nació."
          alpha_sapphire: "Tiene el poder de controlar el tiempo. Aparece en los mitos\nde Sinnoh como una vieja deidad."
        ko:
          omega_ruby: "디아루가가 태어남으로써\n시간이 움직이기 시작했다는\n전설이 내려오는 포켓몬이다."
          alpha_sapphire: "시간을 조종하는 힘을 가지고 있다.\n신오지방에서는 신이라고\n불리며 신화에 등장한다."
