        jp_kana:
          omega_ruby: "ひとや　ポケモンを　のせて　とぶが\nかぜに　ながされているだけなので\nどこへ　とんでいくか　わからない。"
          alpha_sapphire: "ひるまは　ねぼけて　うかんでいるが\nゆうがた　たいぐんで　とんでいく。\nいきさきは　だれも　しらない。"
        jp_kanji:
          omega_ruby: "人や　ポケモンを　乗せて　飛ぶが\n風に　流されているだけなので\nどこへ　飛んでいくか　わからない。"
          alpha_sapphire: "昼間は　寝ぼけて　浮かんでいるが\n夕方　大群で　飛んでいく。\n行先は　だれも　知らない。"
        en:
          omega_ruby: "It carries people and Pokémon when it flies.\nBut since it only drifts, it can end up anywhere."
          alpha_sapphire: "It’s drowsy in daytime, but flies off in the evening in\nbig groups. No one knows where they go."
        fr:
          omega_ruby: "Il peut embarquer des gens et des Pokémon, mais nul ne sait\noù il va atterrir car il ne fait que flotter."
          alpha_sapphire: "Il somnole la journée et s’envole en grands groupes\nle soir venu. Nul ne sait où ils vont."
        it:
          omega_ruby: "Vola trascinando persone e Pokémon. Poiché si fa portare\ndal vento, non si sa dove vada a finire."
          alpha_sapphire: "Di giorno fluttua con aria sonnolenta, ma di notte vola via\nin gruppo. Nessuno sa dove vada."
        de:
          omega_ruby: "Es trägt Menschen und Pokémon im Flug. Da es sich aber nur\nvom Wind tragen lässt, weiß man nie, wo es hingeht."
          alpha_sapphire: "Tagsüber treibt es faul vor sich hin, nachts fliegt es\nmit anderen umher. Niemand weiß wohin."
        es:
          omega_ruby: "Transporta a gente y a Pokémon volando, pero, como se deja\nllevar, puede acabar en cualquier sitio."
          alpha_sapphire: "Durante el día está somnoliento, pero por la noche sale\nvolando en grupo, aunque nadie sabe adónde."
        ko:
          omega_ruby: "사람이나 포켓몬을 태우고 날지만\n바람에 떠밀려 다닐 뿐이므로\n어디로 날아갈지 모른다."
          alpha_sapphire: "낮에는 잠이 덜 깨어 떠 있지만\n저녁 무렵에는 큰 무리를 지어\n날아간다. 목적지는 아무도 모른다."
buneary:
  species_id: 427
  names:
    jp_kana: ミミロル
    jp_kanji: ミミロル
    en: Buneary
    fr: Laporeille
    it: Buneary
    de: Haspiror
    es: Buneary
    ko: 이어롤
