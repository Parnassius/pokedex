          omega_ruby: "２ひきの　ダンバルが　がったいした　すがた。\n２つの　のうを　じりょくの　しんけいが　むすぶ\nことで　つよい　サイコエネルギーを　うみだす。"
          alpha_sapphire: "２ひきの　ダンバルが　がったいしたとき　２つの\nのうが　じりょくの　しんけいで　むすばれる。\nうでを　うしろへ　まわし　こうそくで　いどう。"
        jp_kanji:
          omega_ruby: "２匹の　ダンバルが　合体した　姿。\n２つの　脳を　磁力の　神経が　結ぶ\nことで　強い　サイコエネルギーを　生み出す。"
          alpha_sapphire: "２匹の　ダンバルが　合体したとき　２つの\n脳が　磁力の　神経で　結ばれる。\n腕を　後ろへ　まわし　高速で　移動。"
        en:
          omega_ruby: "When two Beldum fuse together, Metang is formed. The brains\nof the Beldum are joined by a magnetic nervous system.\nBy linking its brains magnetically, this Pokémon generates\nstrong psychokinetic power."
          alpha_sapphire: "When two Beldum fuse together, Metang is formed.\nThe brains of the Beldum are joined by a magnetic\nnervous system. This Pokémon turns its arms to the\nrear for traveling at high speed."
        fr:
          omega_ruby: "Lorsque deux Terhal fusionnent, un Métang apparaît.\nLes cerveaux des Terhal sont reliés par un système nerveux\nmagnétique, ce qui permet à ce Pokémon de générer\nun puissant pouvoir télékinétique."
          alpha_sapphire: "Lorsque deux Terhal fusionnent, un Métang se forme.\nLes cerveaux des Terhal sont reliés par un système nerveux\nmagnétique. Ce Pokémon dirige ses bras vers l’arrière\npour voyager à grande vitesse."
        it:
          omega_ruby: "Fondendo insieme due Beldum, si crea Metang. I cervelli\ndei Beldum sono uniti da un sistema nervoso magnetico.\nQuesto particolare sistema di unione genera forti poteri\npsicocinetici."
          alpha_sapphire: "Fondendosi, due Beldum formano Metang. I cervelli\ndei Beldum sono uniti da un sistema nervoso magnetico.\nQuesto Pokémon ruota le zampe all’indietro per muoversi\nad elevata velocità."
        de:
          omega_ruby: "Wenn zwei Tanhel miteinander verschmelzen, entsteht\ndaraus Metang. Die Gehirne der Tanhel werden mit einem\nmagnetischen Nervensystem verbunden. Dadurch erzeugt\nes starke psychokinetische Energie."
          alpha_sapphire: "Wenn zwei Tanhel miteinander verschmelzen, entsteht\ndaraus Metang. Die Gehirne der Tanhel werden mit einem\nmagnetischen Nervensystem verbunden. Es schlägt seine\nArme nach hinten, um sich schnell bewegen zu können."
        es:
          omega_ruby: "Cuando dos Beldum se fusionan, forman un Metang. Los\ncerebros de los Beldum se unen mediante un sistema nervioso\nmagnético y generan potente energía psicoquinética."
          alpha_sapphire: "Cuando se funden dos Beldum, uniendo los cerebros por un\nsistema nervioso magnético, se forma un Metang. Para\ndesplazarse a mayor velocidad, este Pokémon echa los brazos\nhacia atrás."
        ko:
          omega_ruby: "두 마리의 메탕이 합체한 모습이다.\n두 개의 뇌를 자력 신경이 묶고 있어서\n강한 사이코 에너지를 만들어 낸다."
          alpha_sapphire: "두 마리의 메탕이 합체했을 때 두 개의\n뇌가 자력 신경에 의해 이어진다.\n팔을 뒤로 돌리고 고속으로 이동한다."
