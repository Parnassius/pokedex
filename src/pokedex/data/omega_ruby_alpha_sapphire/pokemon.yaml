          alpha_sapphire: "２ほんの　しっぽの　さきを　あいてに\nおしあてて　２まんボルトいじょうの\nでんりゅうを　ながして　こうげき。"
        jp_kanji:
          omega_ruby: "電気を　いっぱいに　ためると\n２本の　ツノの　あいだで　激しく\n青白い　火花を　散らす。"
          alpha_sapphire: "２本の　尻尾の　先を　相手に\n押し当てて　２万ボルト以上の\n電流を　流して　攻撃。"
        en:
          omega_ruby: "As its electric charge amplifies, blue sparks begin\nto crackle between its horns."
          alpha_sapphire: "It pushes the tips of its two tails against the foe,\nthen lets loose with over 20,000 volts of power."
        fr:
          omega_ruby: "Des étincelles bleuâtres jaillissent entre ses 2 cornes\nquand il accumule beaucoup d’électricité."
          alpha_sapphire: "Il place le bout de ses deux queues sur son ennemi et libère\nune décharge de 20 000 V."
        it:
          omega_ruby: "Quando accumula tanta elettricità sparge scintille azzurrine\ndallo spazio tra le due corna."
          alpha_sapphire: "Tocca il nemico con le sue due code e rilascia una scarica\nelettrica di oltre 20.000 volt."
        de:
          omega_ruby: "Bei voller Ladung zucken feurige, blassweiße Funken zwischen\nseinen zwei Hörnern hin und her."
          alpha_sapphire: "Es berührt den Gegner mit seinen beiden Schweifspitzen\nund entlädt dann über 20 000 V."
        es:
          omega_ruby: "Al almacenar mucha electricidad, desprende chispas de una\nclaridad increíble entre sus dos cuernos."
          alpha_sapphire: "Toca a su enemigo con las puntas de sus dos colas y le\nsuelta una descarga de más de 20 000 voltios."
        ko:
          omega_ruby: "전기를 가득 모으면\n2개의 뿔 사이에서 세차게\n푸르스름한 불티를 뿌린다."
          alpha_sapphire: "2개의 꼬리 끝을 상대에게\n바싹 대어 2만 볼트 이상의\n전류를 흘려 공격한다."
