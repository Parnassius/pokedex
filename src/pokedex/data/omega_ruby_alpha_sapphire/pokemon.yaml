timburr:
  species_id: 532
  names:
    jp_kana: ドッコラー
    jp_kanji: ドッコラー
    en: Timburr
    fr: Charpenti
    it: Timburr
    de: Praktibalk
    es: Timburr
    ko: 으랏차
  forms:
    timburr:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 55
        special_attack: 25
        special_defense: 35
        speed: 35
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - sheer_force
      hidden_ability: iron_fist
      descriptions:
        jp_kana:
          omega_ruby: "いつも　かくざいを　かかえている。\nけんちく　げんばに　あらわれて\nこうじを　てつだう　ポケモン。"
          alpha_sapphire: "つねに　かくざいを　もちあるき\nどぼくこうじを　てつだう。そだつと\nおおきな　かくざいに　もちかえる。"
        jp_kanji:
          omega_ruby: "いつも　角材を　抱えている。\n建築　現場に　現れて\n工事を　手伝う　ポケモン。"
          alpha_sapphire: "常に　角材を　持ち歩き\n土木工事を　手伝う。育つと\n大きな　角材に　持ち替える。"
        en:
          omega_ruby: "These Pokémon appear at building sites and help\nout with construction. They always carry\nsquared logs."
          alpha_sapphire: "Always carrying squared logs, they help out with\nconstruction. As they grow, they carry bigger logs."
        fr:
          omega_ruby: "Il porte toujours une poutre. Il apparaît sur les chantiers\npour aider aux travaux."
          alpha_sapphire: "Il porte toujours une poutre en bois et aime aider aux travaux.\nIl passe à un lourd madrier quand il grandit."
        it:
          omega_ruby: "Porta sempre con sé una tavola di legno. Appare nei cantieri\ndove aiuta nei lavori."
          alpha_sapphire: "Porta sempre con sé una tavola di legno e aiuta nei lavori\nedilizi. Quando cresce si sceglie una tavola più grande."
        de:
          omega_ruby: "Trägt stets einen Holzbalken bei sich. Es taucht hier und da\nauf Baustellen auf und hilft dort den Arbeitern aus."
          alpha_sapphire: "Trägt stets einen Holzbalken bei sich und hilft auf Baustellen\naus. Nach einer Weile sucht es sich einen größeren Balken."
        es:
          omega_ruby: "Siempre lleva vigas de madera. Normalmente ayuda en obras\nde construcción."
          alpha_sapphire: "Siempre lleva una viga de madera y ayuda en las\nconstrucciones. Se busca una viga más grande cuando\nse hace más fuerte."
        ko:
          omega_ruby: "항상 각목을 끼고 있다.\n건설 현장에 나타나\n공사를 도와주는 포켓몬이다."
          alpha_sapphire: "항상 각재를 들고 다니며\n토목공사를 도와준다. 자라면\n큰 각재로 바꿔 든다."
gurdurr:
  species_id: 533
  names:
    jp_kana: ドテッコツ
    jp_kanji: ドテッコツ
    en: Gurdurr
    fr: Ouvrifier
    it: Gurdurr
    de: Strepoli
    es: Gurdurr
    ko: 토쇠골
  forms:
    gurdurr:
      form_id: 0
      base_stats:
        hp: 85
        attack: 105
        defense: 85
        special_attack: 40
        special_defense: 50
        speed: 40
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - sheer_force
      hidden_ability: iron_fist
      descriptions:
        jp_kana:
          omega_ruby: "きたえあげた　きんにくの　もちぬし。\nてっこつを　たくみに　あやつって\nいっけんやを　かいたい　してくれる。"
          alpha_sapphire: "きたえあげた　きんにくの　からだは\nプロレスラーが　たばに　なって\nこうげきしても　びくとも　しない。"
        jp_kanji:
          omega_ruby: "鍛えあげた　筋肉の　持ち主。\n鉄骨を　たくみに　操って\n一軒家を　解体してくれる。"
          alpha_sapphire: "鍛え上げられた　筋肉の　体は\nプロレスラーが　束に　なって\n攻撃しても　びくとも　しない。"
        en:
          omega_ruby: "With strengthened bodies, they skillfully wield steel\nbeams to take down buildings."
          alpha_sapphire: "This Pokémon is so muscular and strongly built that\neven a group of wrestlers could not make it budge\nan inch."
        fr:
          omega_ruby: "Ce Pokémon hyper musclé manipule avec habileté les poutres\nmétalliques et peut démanteler un immeuble en un clin d’œil."
          alpha_sapphire: "Même une armée de catcheurs se jetant sur son corps\nhyper musclé ne le ferait pas ciller."
        it:
          omega_ruby: "Ha un corpo pieno di muscoli e manovra con abilità la sua\ntrave d’acciaio, con cui può abbattere una casa intera."
          alpha_sapphire: "Il suo corpo muscolosissimo resisterebbe senza battere\nciglio all’assalto di un lottatore di wrestling."
        de:
          omega_ruby: "Diese durchtrainierten Muskelprotze sind im Umgang mit\nStahlträgern versiert und können damit ganze Häuser abreißen."
          alpha_sapphire: "Selbst wenn es mit voller Wucht von einem Profi-Ringer\nangegriffen wird, lässt es dies dank seines Muskeltrainings kalt."
        es:
          omega_ruby: "Gracias a su entrenada musculatura, puede blandir vigas de\nacero sin problema para así derribar edificios enteros."
          alpha_sapphire: "Sus músculos están tan desarrollados que no se inmuta\naunque lo ataquen varios luchadores."
        ko:
          omega_ruby: "단련된 근육의 소유자.\n철골을 능숙하게 조종하여\n집을 해체해준다."
          alpha_sapphire: "단련을 거듭한 근육덩어리 몸은\n프로레슬러가 단체로 공격해도\n꿈쩍도 하지 않는다."
conkeldurr:
  species_id: 534
  names:
    jp_kana: ローブシン
    jp_kanji: ローブシン
    en: Conkeldurr
    fr: Bétochef
    it: Conkeldurr
    de: Meistagrif
    es: Conkeldurr
    ko: 노보청
  forms:
    conkeldurr:
      form_id: 0
      base_stats:
        hp: 105
        attack: 140
        defense: 95
        special_attack: 55
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - sheer_force
      hidden_ability: iron_fist
      descriptions:
        jp_kana:
          omega_ruby: "コンクリートを　つくる　ぎじゅつは\n２０００ねんまえに　ローブシンから\nおそわったと　かんがえられている。"
          alpha_sapphire: "ちからに　たよらず　えんしんりょくを\nうまく　いかして　コンクリートを\nふりまわす　わざを　つかいこなせる。"
        jp_kanji:
          omega_ruby: "コンクリートを　作る　技術は\n２０００年前に　ローブシンから\n教わったと　考えられている。"
          alpha_sapphire: "力に　頼らず　遠心力を\nうまく　活かして　コンクリートを\n振り回す　技を　使いこなせる。"
        en:
          omega_ruby: "It is thought that Conkeldurr taught humans how to\nmake concrete more than 2,000 years ago."
          alpha_sapphire: "Rather than rely on force, they master moves that\nutilize the centrifugal force of spinning concrete."
        fr:
          omega_ruby: "On pense que la recette du ciment a été enseignée\naux humains par un Bétochef il y a 2 000 ans."
          alpha_sapphire: "Il utilise l’effet centrifuge pour manier sans trop d’effort\nses piliers de béton et déclencher des attaques puissantes."
        it:
          omega_ruby: "Si pensa che la tecnica per fare il cemento sia stata diffusa\nproprio da Conkeldurr, 2000 anni fa."
          alpha_sapphire: "Non si affida solo ai muscoli, ma sfrutta la forza centrifuga\nper far roteare con maestria i suoi pilastri di cemento."
        de:
          omega_ruby: "Man nimmt an, dass es der Menschheit vor ca. 2 000 Jahren\ndas Betonmischen beigebracht hat."
          alpha_sapphire: "Es setzt Attacken ein, die sich die Zentrifugalkraft zunutze\nmachen, indem es seine Betonpfeiler umherschwingt."
        es:
          omega_ruby: "Se cree que Conkeldurr enseñó a los humanos la técnica para\nelaborar cemento hace más de 2000 años."
          alpha_sapphire: "En vez de hacer uso de la fuerza bruta, blande columnas de\nhormigón con la energía centrífuga de sus movimientos."
        ko:
          omega_ruby: "콘크리트를 만드는 기술은\n2000년 전에 노보청에게\n배운 것이라고 여겨지고 있다."
          alpha_sapphire: "힘에 의지하지 않고 원심력을\n잘 활용하여 콘크리트를\n휘두르는 기술을 잘 다룬다."
tympole:
