      names:
        jp_kana: ポワルンのすがた
        jp_kanji: ポワルンのすがた
        en: Normal
        fr: Forme de Morphéo
        it: Forma Castform
        de: Formeo
        es: Forma de Castform
        ko: 캐스퐁의 모습
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          omega_ruby: "てんきに　よって　すがたが　かわる　ポケモン。\nちいさい　からだを　まもる　ために　だいしぜんの\nおおきな　パワーを　つかえる　ように　なった。"
          alpha_sapphire: "しぜんの　ちからを　うけて　たいよう　あまみず\nゆきぐもに　すがたを　かえる　ポケモン。\nきしょうが　かわると　きしょうも　かわるぞ。"
        jp_kanji:
          omega_ruby: "天気に　よって　姿が　変わる　ポケモン。\n小さい　体を　守る　ために　大自然の\n大きな　パワーを　使える　ように　なった。"
          alpha_sapphire: "自然の　力を　受けて　太陽　雨水\n雪雲に　姿を　変える　ポケモン。\n気象が　変わると　気性も　変わるぞ。"
        en:
          omega_ruby: "Castform’s appearance changes with the weather.\nThis Pokémon gained the ability to use the vast power of\nnature to protect its tiny body."
          alpha_sapphire: "Castform borrows the power of nature to transform itself\ninto the guises of the sun, rain, and snow-clouds.\nThis Pokémon’s feelings change with the weather."
        fr:
          omega_ruby: "L’apparence de Morphéo change en fonction du temps.\nCe Pokémon a appris à utiliser l’immense pouvoir de la nature\npour protéger son corps minuscule."
          alpha_sapphire: "Morphéo emprunte le pouvoir de la nature pour prendre\nl’apparence du soleil, de la pluie ou de la neige. Le type\nde ce Pokémon change en fonction du temps."
        it:
          omega_ruby: "L’aspetto di Castform cambia con le condizioni atmosferiche.\nQuesto Pokémon ha imparato a usare la potente forza\ndella natura per proteggere il suo corpicino indifeso."
          alpha_sapphire: "Castform usa il potere della natura per trasformarsi in sole,\ngocce di pioggia e nubi nevose. Il tipo di questo Pokémon\nvaria con i mutamenti meteorologici."
        de:
          omega_ruby: "Formeos Erscheinung ändert sich mit dem Wetter. Dieses\nPokémon hat die Fähigkeit erworben, die mächtige Kraft der\nNatur zu nutzen, um seinen winzigen Körper zu schützen."
          alpha_sapphire: "Formeo bedient sich der Kraft der Natur, um die Gestalt\nder Sonne, des Regens oder von Schneewolken anzunehmen.\nDie Gefühlslage dieses Pokémon verändert sich mit dem\nWetter."
        es:
          omega_ruby: "La forma de Castform cambia con las variaciones del tiempo.\nEste Pokémon consiguió aprender a usar el gran poder de la\nnaturaleza para proteger el pequeño cuerpo que tiene."
          alpha_sapphire: "Castform se vale del poder de la naturaleza para tomar el\naspecto del sol, la lluvia o nubarrones de nieve. El estado de\nánimo de este Pokémon varía según el clima."
        ko:
          omega_ruby: "날씨에 따라 모습이 바뀌는 포켓몬이다.\n작은 몸을 지키기 위해 대자연의\n거대한 힘을 사용할 수 있게 됐다."
          alpha_sapphire: "자연의 힘을 받아 태양과 빗방울\n그리고 설운으로 모습을 바꾸는 포켓몬이다.\n날씨가 바뀌면 기질도 바뀐다."
