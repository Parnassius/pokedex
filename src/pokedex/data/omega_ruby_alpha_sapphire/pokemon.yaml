        jp_kana:
          omega_ruby: "ぜんしんが　かたい　ヨロイに　おおわれている。\nじそく　３００キロの　スピードで　そらを　とび\nかたなの　きれあじを　もつ　ハネで　きりさく。"
          alpha_sapphire: "たたかいを　くりかえして　ボロボロに　なった\nはがねの　ハネは　１ねんに　１かい　はえかわり\nもとどおりの　きれあじを　とりもどすのだ。"
        jp_kanji:
          omega_ruby: "全身が　硬い　ヨロイに　覆われている。\n時速　３００キロの　スピードで　空を　飛び\n刀の　切れ味を　持つ　ハネで　切り裂く。"
          alpha_sapphire: "戦いを　繰り返して　ボロボロに　なった\n鋼の　ハネは　１年に　１回　生えかわり\n元通りの　切れ味を　取り戻すのだ。"
        en:
          omega_ruby: "Skarmory is entirely encased in hard, protective armor.\nThis Pokémon flies at close to 190 mph. It slashes foes with\nits wings that possess swordlike cutting edges."
          alpha_sapphire: "Skarmory’s steel wings become tattered and bashed in from\nrepeated battles. Once a year, the battered wings grow back\ncompletely, restoring the cutting edges to their pristine state."
        fr:
          omega_ruby: "Airmure est entièrement recouvert d’une armure très dure.\nCe Pokémon peut voler à plus de 300 km/h. Il peut mettre\nses ennemis en pièces grâce à ses ailes tranchantes comme\ndes sabres."
          alpha_sapphire: "Les ailes d’acier d’Airmure s’abîment et se cabossent à force\nde se battre. Une fois par an, les ailes endommagées\nrepoussent complètement, rendant à leurs bords tranchants\nleur état d’origine."
        it:
          omega_ruby: "Skarmory è interamente corazzato all’interno di una dura\narmatura di protezione. Vola alla velocità di 300 km/h.\nLacera il nemico con le sue ali taglienti come la lama\ndi una spada."
          alpha_sapphire: "Le ali d’acciaio di Skarmory portano i segni e le ammaccature\ndelle lotte. Una volta l’anno le ali ricrescono completamente,\nripristinando il filo tagliente delle lame."
        de:
          omega_ruby: "Panzaeron ist komplett in einen harten, schützenden Panzer\neingehüllt. Dieses Pokémon fliegt bis zu 300 km/h schnell.\nEs greift seine Feinde mit seinen messerscharfen Flügeln an."
          alpha_sapphire: "Panzaerons Stahlflügel bekommen in den vielen Kämpfen,\ndie es austrägt, Risse und Beulen. Einmal im Jahr wachsen\nseine Flügel komplett nach und werden wiederhergestellt."
        es:
          omega_ruby: "Skarmory está totalmente encerrado en el interior de una\nfuerte coraza protectora. En vuelo, puede llegar a alcanzar los\n300 km/h y usa las afiladas alas que tiene para azotar al rival."
          alpha_sapphire: "A Skarmory se le quedan las alas abolladas y desgarradas\ntras varios combates. Una vez al año, le vuelven a crecer\ncompletamente con los bordes cortantes que tenían en un\nprincipio restaurados."
        ko:
          omega_ruby: "전신이 단단한 갑옷으로 둘러싸여 있다.\n시속 300km의 스피드로 하늘을 날아\n칼날 같은 날카로운 날개로 베어낸다."
          alpha_sapphire: "싸움을 반복하여 너덜너덜해진\n강철의 날개는 1년에 1회 다시 돋아나\n원래의 날카로움을 되찾는다."
