          omega_ruby: "かみなりぐもで　そらが　おおわれると\nあらわれる。たてがみで　カミナリを\nキャッチして　でんきを　ためる。"
          alpha_sapphire: "ほうでんすると　たてがみが　ひかる。\nたてがみが　かがやく　かいすうや\nリズムで　なかまと　かいわしている。"
        jp_kanji:
          omega_ruby: "雷雲で　空が　覆われると\n現れる。たてがみで　雷を\nキャッチして　電気を　ためる。"
          alpha_sapphire: "放電すると　たてがみが　光る。\nたてがみが　輝く　回数や\nリズムで　仲間と　会話している。"
        en:
          omega_ruby: "When thunderclouds cover the sky, it will appear.\nIt can catch lightning with its mane and store\nthe electricity."
          alpha_sapphire: "Its mane shines when it discharges electricity.\nThey use the frequency and rhythm of these flashes\nto communicate."
        fr:
          omega_ruby: "Il apparaît quand le ciel est à l’orage. Il capte les éclairs\navec sa crinière et accumule de l’électricité."
          alpha_sapphire: "Sa crinière luit quand il lâche des décharges. Il module\nleur rythme et leur nombre pour communiquer avec ses pairs."
        it:
          omega_ruby: "Appare quando il cielo si riempie di fulmini e saette.\nAccumula elettricità attirando i fulmini con la criniera."
          alpha_sapphire: "Se emette scariche la sua criniera brilla. Comunica con i suoi\nsimili tramite il ritmo e la frequenza delle pulsazioni luminose."
        de:
          omega_ruby: "Es erscheint, wenn Gewitterwolken den Himmel verdunkeln.\nEs fängt mit seiner Mähne Blitze und hortet ihre Energie."
          alpha_sapphire: "Um mit Artgenossen zu kommunizieren, nutzt es das Aufblitzen\nseiner Mähne beim Entladen von Strom als Morsecode."
        es:
          omega_ruby: "Aparece cuando nubes envueltas en rayos encapotan el cielo.\nAtrapa rayos con su crin y almacena electricidad."
          alpha_sapphire: "Su crin brilla cuando emite una descarga eléctrica. Se\ncomunica con los suyos mediante el ritmo y el número de\nbrillos."
        ko:
          omega_ruby: "번개 구름이 하늘을 뒤덮으면\n나타난다. 갈기로 번개를\n붙잡아 전기를 모은다."
          alpha_sapphire: "방전하면 갈기가 빛난다.\n갈기가 빛나는 횟수나\n리듬으로 동료와 대화한다."
zebstrika:
  species_id: 523
  names:
    jp_kana: ゼブライカ
    jp_kanji: ゼブライカ
    en: Zebstrika
    fr: Zéblitz
    it: Zebstrika
    de: Zebritz
    es: Zebstrika
    ko: 제브라이카
