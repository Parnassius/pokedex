        - leaf_guard
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          omega_ruby: "はれた　ひに　ねている　リーフィアは\nこうごうせいを　して　きれいな\nくうきを　つくりだしているのだ。"
          alpha_sapphire: "しょくぶつのように　こうごうせいを\nするため　リーフィアの　まわりは\nすんだ　くうきに　つつまれている。"
        jp_kanji:
          omega_ruby: "晴れた　日に　寝ている　リーフィアは\n光合成を　して　きれいな　空気を\n作り出しているのだ。"
          alpha_sapphire: "植物のように　光合成を　するため\nリーフィアの　まわりは\n澄んだ　空気に　包まれている。"
        en:
          omega_ruby: "When you see Leafeon asleep in a patch of\nsunshine, you’ll know it is using photosynthesis\nto produce clean air."
          alpha_sapphire: "Just like a plant, it uses photosynthesis. As a result,\nit is always enveloped in clear air."
        fr:
          omega_ruby: "Un Phyllali qui dort par beau temps produit un air frais et pur\npar photosynthèse."
          alpha_sapphire: "Il utilise la photosynthèse comme une plante. C’est pourquoi\nil est toujours entouré d’air pur."
        it:
          omega_ruby: "Nelle belle giornate si sdraia al sole e usa la fotosintesi,\nproducendo aria pulita."
          alpha_sapphire: "Usa la fotosintesi, proprio come una pianta.\nPertanto è sempre circondato da aria pulita."
        de:
          omega_ruby: "An klaren Tagen erzeugt Folipurba saubere Luft, indem es\nPhotosynthese betreibt."
          alpha_sapphire: "Genau wie eine Pflanze führt es die Photosynthese aus.\nDeshalb ist es ständig von reiner Luft umgeben."
        es:
          omega_ruby: "En días soleados duerme y hace la fotosíntesis, emitiendo aire\npuro a su alrededor."
          alpha_sapphire: "Al igual que una planta, hace la fotosíntesis. Como\nconsecuencia, siempre está rodeado de aire puro."
        ko:
          omega_ruby: "맑은 날에 잠든 리피아는\n광합성을 해서 깨끗한\n공기를 만들고 있다."
          alpha_sapphire: "식물처럼 광합성을 하기\n때문에 리피아의 주위는\n맑은 공기로 둘러싸여 있다."
glaceon:
  species_id: 471
  names:
    jp_kana: グレイシア
