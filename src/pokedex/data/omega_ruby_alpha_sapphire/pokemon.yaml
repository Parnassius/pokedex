      descriptions:
        jp_kana:
          omega_ruby: "とても　らんぼうで　いつも　あかと\nあおの　バスラオは　あらそっている。\nたべると　いがいと　おいしいらしい。"
          alpha_sapphire: "あかと　あおの　バスラオは　なかが\nわるいが　なぜか　いろの　ちがう\nこたいが　むれに　まぎれこんでいる。"
        jp_kanji:
          omega_ruby: "とても　乱暴で　いつも　あかと\nあおの　バスラオは　争っている。\n食べると　意外と　おいしいらしい。"
          alpha_sapphire: "赤と　青の　バスラオは　仲が　悪いが\nなぜか　色の　違う　個体が\n群れに　紛れこんでいる。"
        en:
          omega_ruby: "Red- and blue-striped Basculin are very violent and\nalways fighting. They are also remarkably tasty."
          alpha_sapphire: "Red and blue Basculin usually do not get along,\nbut sometimes members of one school mingle with\nthe other’s school."
        fr:
          omega_ruby: "Les rouges et les bleus se détestent et se battent dès qu’ils\ns’aperçoivent. Un Pokémon violent mais délicieux."
          alpha_sapphire: "Les rouges et les bleus se détestent, mais il y en a toujours\nun ou deux dans un groupe de l’autre couleur."
        it:
          omega_ruby: "I Basculin con la linea rossa e quelli con la linea blu sono\nmolto violenti e litigano spesso."
          alpha_sapphire: "I Basculin con la linea rossa e quelli con la linea blu non vanno\nd’accordo ma, chissà perché, in gruppo si mescolano."
        de:
          omega_ruby: "Sie gelten als Delikatesse. Aufgrund ihrer brutalen Natur\nliegen rot und blau gestreifte Exemplare immer im Clinch."
          alpha_sapphire: "Rot gestreifte und blau gestreifte Exemplare sind sich feindlich\ngesonnen. Doch ist jeder Schwarm bunt gemischt."
        es:
          omega_ruby: "Los de color azul y los de color rojo siempre se pelean. Son\nmuy violentos, pero su sabor es excepcional."
          alpha_sapphire: "Los Basculin con la raya roja y aquellos con la raya azul se\nllevan fatal, pero algunos tienden a agruparse."
        ko:
          omega_ruby: "아주 난폭하고 항상 빨강과\n파랑의 배쓰나이는 다투고 있다.\n먹으면 의외로 맛있다고 한다."
          alpha_sapphire: "빨강과 파랑 배쓰나이는 사이가\n나쁨에도 불구하고 같은 무리에\n다른 색 개체가 섞여 있다."
sandile:
  species_id: 551
