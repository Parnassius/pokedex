          alpha_sapphire: "マントのように　からだを　おおう\nくろい　たいもうは　とても　かたい。\nうけた　ダメージを　へらしてくれる。"
        jp_kanji:
          omega_ruby: "トレーナーを　助けながら\n他の　ポケモンの　世話もする\nとても　忠実な　ポケモン。"
          alpha_sapphire: "マントのように　体を　覆う\n黒い　体毛は　とても　硬い。\n受けた　ダメージを　減らしてくれる。"
        en:
          omega_ruby: "This very loyal Pokémon helps Trainers, and it also\ntakes care of other Pokémon."
          alpha_sapphire: "It has black, cape-like fur that is very hard and\ndecreases the amount of damage it receives."
        fr:
          omega_ruby: "Un Pokémon très loyal qui aide aussi bien les Dresseurs\nque les autres Pokémon qu’il rencontre."
          alpha_sapphire: "Les poils qui entourent son corps comme un manteau sont\nextrêmement durs et amortissent les coups."
        it:
          omega_ruby: "È un Pokémon molto leale, che aiuta il suo Allenatore e al\ncontempo si prende cura degli altri Pokémon della squadra."
          alpha_sapphire: "La pelliccia nera che lo ricopre come un manto è estremamente\ndura e ammortizza i colpi che gli vengono inferti."
        de:
          omega_ruby: "Dieses äußerst treue Pokémon geht nicht nur seinem Trainer\nzur Hand, sondern hilft auch anderen Pokémon."
          alpha_sapphire: "Das dunkle Fell, das es wie ein Mantel umgibt, ist äußerst\nwiderstandsfähig und mindert den Schaden durch Attacken."
        es:
          omega_ruby: "Este Pokémon es muy leal. No solo ayuda a Entrenadores,\nsino que también se preocupa por otros Pokémon."
          alpha_sapphire: "Un robusto pelaje cubre su cuerpo a modo de capa y\ndisminuye el daño que recibe en los ataques."
        ko:
          omega_ruby: "트레이너를 도와주면서\n다른 포켓몬을 돌보기도 하는\n매우 충실한 포켓몬."
          alpha_sapphire: "매우 단단한 검은 털이\n망토처럼 몸을 둘러싸고 있다.\n입은 데미지를 줄여준다."
stoutland:
