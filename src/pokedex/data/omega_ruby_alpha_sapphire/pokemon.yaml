        jp_kana:
          omega_ruby: "はなの　ミツが　だいすき。\nミツハニーの　あつめた　ミツを\nよこどりして　たべてしまう。"
          alpha_sapphire: "よなか　かっぱつに　とびまわり\nねむっている　ミツハニーの　す　から\nミツを　うばって　にげる。"
        jp_kanji:
          omega_ruby: "花の　ミツが　大好き。\nミツハニーの　集めた　ミツを\n横取りして　食べてしまう。"
          alpha_sapphire: "夜中　活発に　飛び回り\n眠っている　ミツハニーの　巣から\nミツを　奪って　逃げる。"
        en:
          omega_ruby: "It loves the honey of flowers and steals honey\ncollected by Combee."
          alpha_sapphire: "It flutters around at night and steals honey from\nthe Combee hive."
        fr:
          omega_ruby: "Il aime le nectar des fleurs et n’hésite pas à voler\ncelui que récupère Apitrini."
          alpha_sapphire: "Ce Pokémon s’active à la nuit tombée pour voler le miel\ndes Apitrini pendant leur sommeil."
        it:
          omega_ruby: "Ama il nettare dei fiori. Ruba e mangia il nettare raccolto\nda Combee."
          alpha_sapphire: "Vola qua e là di notte per derubare i Combee del loro nettare\nmentre dormono, e poi fuggire."
        de:
          omega_ruby: "Es liebt Honig und stiehlt den Honig, der von Wadribie\ngesammelt wurde."
          alpha_sapphire: "Nachts fliegt es emsig umher und stiehlt, während Wadribie\nschläft, Honig aus dessen Nest."
        es:
          omega_ruby: Le encanta la miel de las flores y roba la que recoge Combee.
          alpha_sapphire: "Hace vida nocturna. Revolotea y roba la miel de las colmenas\nde Combee cuando duermen."
        ko:
          omega_ruby: "꽃의 꿀을 매우 좋아한다.\n세꿀버리가 모아둔 꿀을\n가로채어 먹어 버린다."
          alpha_sapphire: "한밤중에 활발하게 날아다니며\n잠든 세꿀버리의 둥지에서\n꿀을 훔쳐 달아난다."
combee:
  species_id: 415
