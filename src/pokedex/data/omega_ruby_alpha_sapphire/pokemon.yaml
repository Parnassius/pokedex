      base_stats:
        hp: 64
        attack: 66
        defense: 68
        special_attack: 81
        special_defense: 76
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - torrent
      hidden_ability: defiant
      descriptions:
        jp_kana:
          omega_ruby: "むれを　つくらずに　１ぴきで　いる。\nじぶんが　いちばん　えらいと　どの\nポッタイシも　かんがえているようだ。"
          alpha_sapphire: "なかまを　つくらずに　くらす。\nつばさの　きょうれつな　いちげきは\nたいぼくを　まっぷたつに　へしおる。"
        jp_kanji:
          omega_ruby: "群れを　作らずに　１匹で　いる。\n自分が　一番　偉いと　どの\nポッタイシも　考えているようだ。"
          alpha_sapphire: "仲間を　作らずに　暮らす。\n翼の　強烈な　一撃は\n大木を　真っ二つに　へし折る。"
        en:
          omega_ruby: "It lives alone, away from others. Apparently, every\none of them believes it is the most important."
          alpha_sapphire: "It lives a solitary life. Its wings deliver wicked blows\nthat can snap even the thickest of trees."
        fr:
          omega_ruby: "Il vit seul, à l’écart de ses pairs. Chaque individu est convaincu\nd’être meilleur que les autres."
          alpha_sapphire: "C’est un Pokémon solitaire. Un seul coup de ses puissantes\nailes peut briser un arbre en deux."
        it:
          omega_ruby: "Vive da solo lontano dagli altri. Apparentemente ogni\nesemplare crede di essere il più importante."
          alpha_sapphire: "Vive senza riunirsi in gruppi. Con i suoi poderosi colpi d’ala,\npuò spaccare in due degli alberi enormi."
        de:
          omega_ruby: "Es lebt allein, entfernt von anderen. Jedes von ihnen denkt,\nes sei das Bedeutendste unter ihnen."
          alpha_sapphire: "Pliprin sind Einzelgänger. Ein Schlag ihrer kräftigen Flügel haut\nselbst große Bäume entzwei."
        es:
          omega_ruby: "Vive solo, alejado de los demás. Cada uno piensa que es el\nmás importante."
          alpha_sapphire: "No hace amigos. Puede partir en dos un árbol gigantesco\nde un fuerte aletazo."
        ko:
          omega_ruby: "무리를 만들지 않고 혼자 생활한다.\n어떤 팽태자라도 자신이 제일\n훌륭하다고 생각하는 듯하다."
          alpha_sapphire: "무리를 만들지 않고 생활한다.\n날개의 강렬한 일격은\n큰 나무를 두 동강으로 꺾는다."
empoleon:
