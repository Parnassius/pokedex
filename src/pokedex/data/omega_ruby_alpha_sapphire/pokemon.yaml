          alpha_sapphire: "Dicen que Hitmonchan tiene el mismo ímpetu que un boxeador\nentrenándose para un campeonato mundial. Este Pokémon\ntiene un espíritu indomable que nunca se doblega ante la\nadversidad."
        ko:
