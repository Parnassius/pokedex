          omega_ruby: "パラスから　養分を　吸い取って　大きくなる\nキノコは　冬虫夏草　と　呼ばれている。\n長寿の　薬になる　貴重な　キノコ。"
          alpha_sapphire: "パラスから　養分を　吸い取って　大きくなる\nキノコは　冬虫夏草　と　呼ばれている。\n長寿の　薬になる　貴重な　キノコ。"
        en:
          omega_ruby: "Paras has parasitic mushrooms growing on its back called\ntochukaso. They grow large by drawing nutrients from this\nBug Pokémon host. They are highly valued as a medicine\nfor extending life."
          alpha_sapphire: "Paras has parasitic mushrooms growing on its back called\ntochukaso. They grow large by drawing nutrients from this\nBug Pokémon host. They are highly valued as a medicine\nfor extending life."
        fr:
          omega_ruby: "Paras accueille des champignons parasites appelés tochukaso\nqui poussent sur son dos. Ils grandissent grâce aux nutriments\ntrouvés sur le dos de ce Pokémon Insecte.\nIls peuvent rallonger l’espérance de vie."
          alpha_sapphire: "Paras accueille des champignons parasites appelés tochukaso\nqui poussent sur son dos. Ils grandissent grâce aux nutriments\ntrouvés sur le dos de ce Pokémon Insecte.\nIls peuvent rallonger l’espérance de vie."
        it:
