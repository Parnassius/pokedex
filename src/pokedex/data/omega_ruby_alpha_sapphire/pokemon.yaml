      types:
        - fire
        - fighting
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: thick_fat
      descriptions:
        jp_kana:
          omega_ruby: "たべるほどに　もやすものが　ふえて\nいぶくろないの　ほのおが　つよまり\nパワーも　どんどん　あふれだすのだ。"
          alpha_sapphire: "たいないの　ほのおが　もえあがると\nうごきの　キレと　スピードが　ます。\nピンチになると　けむりを　ふきだす。"
        jp_kanji:
          omega_ruby: "食べるほどに　燃やすものが　増えて\n胃袋内の　炎が　強まり\nパワーも　どんどん　あふれ出すのだ。"
          alpha_sapphire: "体内の　炎が　燃え上がると\n動きの　キレと　スピードが　増す。\nピンチになると　煙を　噴き出す。"
        en:
          omega_ruby: "The more it eats, the more fuel it has to make the\nfire in its stomach stronger. This fills it with even\nmore power."
          alpha_sapphire: "When its internal fire flares up, its movements grow\nsharper and faster. When in trouble, it emits smoke."
        fr:
          omega_ruby: "Plus il a mangé de Baies, plus il a de combustible, et il peut\ndonc dégager davantage de flammes et de puissance."
          alpha_sapphire: "Quand le feu dans son corps s’embrase, sa vitesse et\nson agilité augmentent. En cas d’urgence, il crache de\nla fumée."
        it:
          omega_ruby: "Più mangia e più le fiamme che bruciano nel suo stomaco\nsi rinvigoriscono, aumentando così il suo potere."
          alpha_sapphire: "Quando la fiamma interna arde intensa, diventa più rapido\ne scattante. Nei momenti critici esala fumo."
        de:
          omega_ruby: "Je mehr es frisst, desto stärker werden die Flammen in\nseinem Magen. Dies führt zu rapiden Energieschüben."
          alpha_sapphire: "Lodert das Feuer in ihm auf, bewegt es sich geschmeidiger\nund schneller. Bei Gefahr lässt es ordentlich Dampf ab."
        es:
          omega_ruby: "Cuanto más come, más combustible tiene en su interior para\navivar sus llamas, con lo que también aumenta su poder."
          alpha_sapphire: "Cuando las llamas de su interior se avivan, aumenta su\nvelocidad y agilidad. Emite humo si está en peligro."
        ko:
          omega_ruby: "먹을수록 태울 것이 많아져\n위 속의 불꽃이 강해지고\n파워도 점점 넘치게 된다."
          alpha_sapphire: "체내의 불꽃이 타오르면\n움직임이 더 빠르고 예리해진다.\n위급해지면 연기를 뿜어낸다."
emboar:
  species_id: 500
