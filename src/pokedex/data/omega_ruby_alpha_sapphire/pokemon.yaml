poochyena:
  species_id: 261
  names:
    jp_kana: ポチエナ
    jp_kanji: ポチエナ
    en: Poochyena
    fr: Medhyèna
    it: Poochyena
    de: Fiffyen
    es: Poochyena
    ko: 포챠나
  forms:
    poochyena:
      form_id: 0
      base_stats:
        hp: 35
        attack: 55
        defense: 35
        special_attack: 30
        special_defense: 30
        speed: 35
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - run_away
        - quick_feet
      hidden_ability: rattled
      descriptions:
        jp_kana:
          omega_ruby: "うごく　ものを　みつけると　すぐに　かみつく。\nえものが　ヘトヘトに　なるまで　おいかけまわすが\nはんげきされると　しりごみする　ことも　あるよ。"
          alpha_sapphire: "なんでも　たべる　ざっしょくせいの　ポケモン。\nからだに　くらべ　おおきな　キバが　とくちょう。\nしっぽの　けを　さかだてて　てきを　いかくする。"
        jp_kanji:
          omega_ruby: "動く　ものを　見つけると　すぐに　かみつく。\n獲物が　ヘトヘトに　なるまで　追いかけ回すが\n反撃されると　尻ごみする　ことも　あるよ。"
          alpha_sapphire: "なんでも　食べる　雑食性の　ポケモン。\n体に　比べ　大きな　キバが　特徴。\n尻尾の　毛を　逆立てて　敵を　威嚇する。"
        en:
          omega_ruby: "At first sight, Poochyena takes a bite at anything that moves.\nThis Pokémon chases after prey until the victim becomes\nexhausted. However, it may turn tail if the prey strikes back."
          alpha_sapphire: "Poochyena is an omnivore—it will eat anything. A distinguishing\nfeature is how large its fangs are compared to its body. This\nPokémon tries to intimidate its foes by making the hair on its\ntail bristle out."
        fr:
          omega_ruby: "Sans se poser de questions, Medhyèna essaie de mordre\ntout ce qui bouge. Ce Pokémon pourchasse sa proie jusqu’à\nce qu’elle s’épuise. Cependant, il se peut qu’il prenne peur\net s’enfuie si la proie riposte."
          alpha_sapphire: "Medhyèna est omnivore. Il mange de tout. Ses crocs sont\ntrès gros, comparés à son corps. Ce Pokémon essaie\nd’intimider ses ennemis en hérissant les poils de sa queue."
        it:
          omega_ruby: "Poochyena azzanna al minimo movimento senza riflettere.\nCaccia la sua preda finché questa non è tanto stanca\nda cedere. Tuttavia, se il nemico contrattacca, Poochyena\ntalvolta scappa."
          alpha_sapphire: "Poochyena è onnivoro: mangia di tutto. Una caratteristica\ndistintiva è la dimensione delle zanne rispetto al corpo.\nCerca di intimidire i nemici rizzando il pelo della coda."
        de:
          omega_ruby: "Sobald Fiffyen eine Bewegung wahrnimmt, schnappt es zu.\nEs jagt seine Beute so lange, bis sie vollkommen erschöpft ist.\nWenn sich die Beute allerdings wehrt, kann es passieren,\ndass Fiffyen klein beigibt und flieht."
          alpha_sapphire: "Fiffyen ist ein Allesfresser. Auffällig an diesem Pokémon\nist das Verhältnis seiner Körpergröße zur Länge seiner Zähne.\nEs versucht Feinde einzuschüchtern, indem es die Haare\nan seinem Schweif abstehen lässt."
        es:
          omega_ruby: "La primera reacción que Poochyena tiene al ver algo moverse\nes darle un mordisco. Este Pokémon persigue a su presa hasta\nque cae agotada. Aunque, a veces, sale huyendo si su presa\nle responde con un ataque."
          alpha_sapphire: "Poochyena es un Pokémon omnívoro. Se come lo que sea.\nLe caracteriza el gran tamaño de sus colmillos respecto al\nresto del cuerpo. Este Pokémon hace que se le erice la cola\npara intentar intimidar a su rival."
        ko:
          omega_ruby: "움직이는 것을 발견하면 바로 문다.\n먹이가 기진맥진해질 때까지 쫓아다니지만\n반격당하면 뒷걸음치기도 한다."
          alpha_sapphire: "무엇이든 먹는 잡식성인 포켓몬이다.\n몸에 비해 큰 이빨이 특징이다.\n꼬리의 털을 세우고 적을 위협한다."
