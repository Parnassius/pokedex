      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: rattled
      descriptions:
        jp_kana:
          omega_ruby: "いつも　はなみずを　たらしている。\nはなみずを　すすって　わざを　だす。\nはなみずが　わざの　もと　なのだ。"
          alpha_sapphire: "はなみずは　けんこうの　バロメータ。\nちょうしが　いいと　ねばりづよくなり\nこおりの　わざの　いりょくも　ます。"
        jp_kanji:
          omega_ruby: "いつも　鼻水を　垂らしている。\n鼻水を　すすって　技を　出す。\n鼻水が　技の　素　なのだ。"
          alpha_sapphire: "鼻水は　健康の　バロメータ。\n調子が　いいと　粘り強くなり\n氷の　技の　威力も　増す。"
        en:
          omega_ruby: "Its nose is always running. It sniffs the snot back up\nbecause the mucus provides the raw material for\nits moves."
          alpha_sapphire: "Their snot is a barometer of health. When healthy,\ntheir snot is sticky and the power of their ice\nmoves increases."
        fr:
          omega_ruby: "Il a toujours la goutte au nez. Il l’aspire pour déclencher\nses capacités. La morve en est la matière première."
          alpha_sapphire: "Sa roupie indique sa santé. S’il est en forme, elle sera épaisse\net la puissance de ses attaques glacées augmentera."
        it:
          omega_ruby: "Ha sempre il naso gocciolante e se ne serve per lanciare\nle sue mosse. Il muco è l’origine della sua forza."
          alpha_sapphire: "La goccia del naso è il barometro della sua salute. Se sta bene\nè bella viscosa e potenzia le sue mosse di tipo Ghiaccio."
        de:
          omega_ruby: "Der Schleim, der stets aus seiner Nase hängt, treibt seine\nAttacken an. Zieht es ihn hoch, steht ein Angriff bevor."
          alpha_sapphire: "Fühlt es sich wohl, wird der Schleim, der aus seiner Nase\ntrieft, klebrig und die Stärke seiner Eis-Attacken nimmt zu."
        es:
          omega_ruby: "Siempre está con mucosidades colgando. Las aspira para\nhacer un movimiento, ya que son su materia prima para esto."
          alpha_sapphire: "Sus mocos son su barómetro de salud. Si es buena, serán\ndensos, y la fuerza de sus movimientos de tipo Hielo\naumentará."
        ko:
          omega_ruby: "언제나 콧물을 달고 다닌다.\n콧물을 훌쩍거려 기술을 사용한다.\n콧물이 기술의 재료인 셈이다."
          alpha_sapphire: "콧물은 건강의 척도다.\n상태가 좋으면 점성이 높아지고\n얼음 기술의 위력도 증가한다."
beartic:
  species_id: 614
  names:
    jp_kana: ツンベアー
    jp_kanji: ツンベアー
    en: Beartic
    fr: Polagriffe
    it: Beartic
    de: Siberio
    es: Beartic
    ko: 툰베어
  forms:
    beartic:
      form_id: 0
      base_stats:
        hp: 95
        attack: 110
        defense: 80
        special_attack: 70
        special_defense: 80
        speed: 50
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          omega_ruby: "きたの　つめたい　うみを　このむ。\nくちから　はきだした　いきをこおらせ\nうみのうえに　みちをつくり　あるく。"
          alpha_sapphire: "はく　いきを　こおらせて　こおりの\nキバや　ツメを　つくり　たたかう。\nきたの　さむい　とちで　くらす。"
        jp_kanji:
          omega_ruby: "北の　冷たい　海を　好む。\n口から　吐きだした　息を凍らせ\n海の上に　道をつくり　歩く。"
          alpha_sapphire: "吐く　息を　凍らせて　氷の　キバや\nツメを　作り　戦う。\n北の　寒い　土地で　暮らす。"
        en:
          omega_ruby: "They love the cold seas of the north. They create\npathways across the ocean waters by freezing their\nown breath."
          alpha_sapphire: "It freezes its breath to create fangs and claws of ice\nto fight with. Cold northern areas are its habitat."
        fr:
          omega_ruby: "Il aime les mers glaciales du nord. Il y trace son chemin\nen créant des îlots de glace pour éviter de nager."
          alpha_sapphire: "Il gèle son haleine et en fait des crocs et des griffes de glace\npour combattre. Il vit dans les terres gelées du nord."
        it:
          omega_ruby: "Predilige i freddi mari del nord. Crea strade di ghiaccio\nsoffiando con il suo alito gelido sulla superficie del mare."
          alpha_sapphire: "Lotta usando zanne o artigli creati congelando il suo stesso\nrespiro. Vive nelle fredde regioni del nord."
        de:
          omega_ruby: "Es liebt die kalten Meere im Norden und überquert ihre\nFlächen auf Stegen, die es mit seinem gefrorenen Atem baut."
          alpha_sapphire: "Kämpft mit Reißzähnen aus Eis, die es aus gefrorenem Atem\nherstellt. Es lebt im Norden, wo es kalt ist."
        es:
          omega_ruby: "Adoran los mares gélidos del norte. Congelan su aliento para\ncrear sendas por las que caminar sobre las aguas."
          alpha_sapphire: "Congela su aliento y crea colmillos y garras de hielo para\ncombatir. Vive en las gélidas tierras del norte."
        ko:
          omega_ruby: "북쪽의 차가운 바다를 좋아한다.\n입에서 내뿜는 숨을 얼려\n바다 위에 길을 만들어 걷는다."
          alpha_sapphire: "내뱉는 숨을 얼려 얼음 이빨이나\n손톱을 만들어서 싸운다.\n추운 북쪽 땅에서 산다."
cryogonal:
  species_id: 615
  names:
    jp_kana: フリージオ
    jp_kanji: フリージオ
    en: Cryogonal
    fr: Hexagel
    it: Cryogonal
    de: Frigometri
    es: Cryogonal
    ko: 프리지오
  forms:
    cryogonal:
      form_id: 0
      base_stats:
        hp: 70
        attack: 50
        defense: 30
        special_attack: 95
        special_defense: 135
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ice
      egg_groups:
        - mineral
      abilities:
        - levitate
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          omega_ruby: "ゆきぐもの　なかで　うまれた。\nこおりの　けっしょうで　できた\nくさりで　えものを　つかまえる。"
          alpha_sapphire: "こおりの　けっしょうで　できた\nくさりをつかい　えものを　からめとり\nマイナス１００どに　こおらせる。"
        jp_kanji:
          omega_ruby: "雪雲の　中で　生まれた。\n氷の　結晶で　できた　鎖で\n獲物を　捕まえる。"
          alpha_sapphire: "氷の　結晶で　できた\n鎖を使い　獲物を　絡め取り\nマイナス１００度に　凍らせる。"
        en:
          omega_ruby: "They are born in snow clouds. They use chains\nmade of ice crystals to capture prey."
          alpha_sapphire: "They are composed of ice crystals. They capture\nprey with chains of ice, freezing the prey at\n-148 degrees Fahrenheit."
        fr:
          omega_ruby: "Né d’un nuage neigeux, il attrape ses proies à l’aide\nde sa chaîne faite de cristaux de givre."
          alpha_sapphire: "Il attrape ses proies à l’aide de sa chaîne faite de cristaux\nde givre et les gèle à près de -100 °C."
        it:
          omega_ruby: "È nato nelle nuvole cariche di neve. Cattura le prede\ncon una catena fatta di cristalli di ghiaccio."
          alpha_sapphire: "Cattura le sue prede con catene fatte di cristalli di ghiaccio,\npoi le congela a una temperatura di -100 °C."
        de:
          omega_ruby: "Es fängt seine Beute mit Ketten, die sich aus Eiskristallen\nzusammensetzen. Entstanden ist es aus einer Schneewolke."
          alpha_sapphire: "Es fängt seine Beute mit Ketten aus Eiskristallen und kühlt sie\nauf eine Temperatur von -100 °C ab."
        es:
          omega_ruby: "Nació entre nubes de nieve. Atrapa a sus presas con una\ncadena hecha de hielo cristalizado."
          alpha_sapphire: "Usa cadenas de cristales de hielo para atrapar a sus presas y\ncongelarlas a temperaturas de hasta -100 °C."
        ko:
          omega_ruby: "눈구름 속에서 태어났다.\n얼음 결정으로 만들어진\n사슬로 먹이를 잡는다."
          alpha_sapphire: "얼음 결정으로 만들어진\n사슬로 먹이를 휘감아 잡고\n마이너스 100도로 얼린다."
shelmet:
  species_id: 616
  names:
    jp_kana: チョボマキ
    jp_kanji: チョボマキ
