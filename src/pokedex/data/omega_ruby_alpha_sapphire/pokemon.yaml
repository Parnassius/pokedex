      descriptions:
        jp_kana:
          omega_ruby: "たいないで　もえる　エネルギーに\nよって　かつどうしているが　どんな\nエネルギーなのかは　ふめいである。"
          alpha_sapphire: "こだいの　かがくりょくに　よって\nねんどから　つくられた　ポケモン。\nすうせんねん　うごきつづける。"
        jp_kanji:
          omega_ruby: "体内で　燃える　エネルギーに　よって\n活動しているが　どんな\nエネルギーなのかは　不明である。"
          alpha_sapphire: "古代の　科学力に　よって\n粘土から　つくられた　ポケモン。\n数千年　動き続ける。"
        en:
          omega_ruby: "The energy that burns inside it enables it to move,\nbut no one has yet been able to identify\nthis energy."
          alpha_sapphire: "Ancient science fashioned this Pokémon from clay.\nIt’s been active for thousands of years."
        fr:
          omega_ruby: "Il se meut grâce à l’énergie stockée dans son corps.\nPersonne ne sait d’où vient cette énergie mystérieuse."
          alpha_sapphire: "Ce Pokémon fait de terre glaise, produit de la technologie\nd’une civilisation antique, vit depuis des millénaires."
        it:
          omega_ruby: "Si muove grazie all’energia che gli brucia dentro, ma nessuno\nsa di che tipo di energia si tratti."
          alpha_sapphire: "È stato creato dall’argilla usando antiche conoscenze\nscientifiche. È vivo da più di 1000 anni."
        de:
          omega_ruby: "Es wird durch eine Energie angetrieben, die seinem Körper\nentspringt. Keiner weiß jedoch, woher diese Energie stammt."
          alpha_sapphire: "Es wurde von einer uralten Kultur aus Lehm erschaffen\nund kann mehrere Jahrtausende in Bewegung bleiben."
        es:
          omega_ruby: "Se mueve gracias a la energía que quema dentro de su\ncuerpo, pero el origen de esta energía es incierto."
          alpha_sapphire: "Un Pokémon creado a partir del barro gracias a la ciencia de\nantaño. Lleva activo miles de años."
        ko:
          omega_ruby: "체내에서 불타는 에너지로\n인해 활동하고 있지만 어떤\n에너지인지는 불명이다."
          alpha_sapphire: "고대 과학의 힘으로\n점토에서 만들어진 포켓몬.\n수천 년 동안 계속 움직일 수 있다."
golurk:
  species_id: 623
  names:
    jp_kana: ゴルーグ
    jp_kanji: ゴルーグ
