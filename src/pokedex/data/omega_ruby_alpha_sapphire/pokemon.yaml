          alpha_sapphire: "かいめん　すれすれを　とび　エサを　さがす。\nおおきな　クチバシを　うみの　なかへ　いれて\nエサを　すくいとり　ひとのみで　たべるぞ。"
        jp_kanji:
          omega_ruby: "小さな　ポケモンや　タマゴを　クチバシに\n入れて　運ぶ　空の　運び屋だ。\n海辺の　険しい　崖に　巣を　つくる。"
          alpha_sapphire: "海面　すれすれを　飛び　エサを　探す。\n大きな　クチバシを　海の　中へ　入れて\nエサを　すくい取り　一飲みで　食べるぞ。"
        en:
          omega_ruby: "Pelipper is a flying transporter that carries small Pokémon and\neggs inside its massive bill. This Pokémon builds its nest on\nsteep cliffs facing the sea."
          alpha_sapphire: "Pelipper searches for food while in flight by skimming the wave\ntops. This Pokémon dips its large bill in the sea to scoop up\nfood, then swallows everything in one big gulp."
        fr:
          omega_ruby: "Bekipan est un transporteur volant chargeant des petits\nPokémon et des œufs dans son énorme bec. Ce Pokémon\nconstruit son nid sur les falaises, face à la mer."
          alpha_sapphire: "Bekipan récupère sa nourriture en vol, en rasant l’écume\ndes vagues. Ce Pokémon trempe son énorme bec dans l’eau,\npuis avale tout en une bouchée."
        it:
          omega_ruby: "Pelipper fa le veci di un aereo cargo poiché trasporta piccoli\nPokémon e uova all’interno del suo becco enorme.\nQuesto Pokémon crea il proprio nido sulle scogliere a picco\nsul mare."
          alpha_sapphire: "Pelipper si avventura in cerca di cibo volando radente\nsulla cresta delle onde. Immerge il suo becco enorme\nnell’acqua del mare per catturare la preda e poi inghiotte\ntutto in un sol boccone."
        de:
          omega_ruby: "Pelipper transportiert kleine Pokémon und Eier in seinem\nriesigen Schnabel durch die Lüfte. Dieses Pokémon baut\nsein Nest auf steilen Klippen am Meer."
          alpha_sapphire: "Pelipper sucht nach Nahrung, während es über die Wellen\nfliegt. Dieses Pokémon taucht seinen großen Schnabel ins\nMeer, um seine Beute abzuschöpfen. Dann schluckt es alles\nauf einmal herunter."
        es:
          omega_ruby: "Pelipper vuela transportando pequeños huevos y Pokémon\ndentro del descomunal pico que tiene. Este Pokémon\nconstruye su nido en escarpados acantilados frente al mar."
          alpha_sapphire: "Pelipper busca su comida mientras vuela y esquiva las crestas\nde las olas. Cuando localiza una presa, sumerge el largo pico\nen el agua para pescarla y se la traga de una vez."
        ko:
          omega_ruby: "작은 포켓몬이나 알을 부리에\n넣고 나르는 하늘의 운반자다.\n바닷가의 험한 절벽에 둥지를 만든다."
          alpha_sapphire: "해수면을 스칠 듯이 날며 먹이를 찾는다.\n큰 부리를 바닷속에 넣고\n먹이를 퍼 올려 한입에 먹는다."
