      descriptions:
        jp_kana:
          omega_ruby: "すいちゅうで　ゆうがに　たなびく　ひれが　とても\nうつくしい　ポケモンだが　ゆだんを　していると\nきょうれつな　ツノの　ひとつきを　くらうぞ。"
          alpha_sapphire: "かわや　いけを　およぐ　ことが　だいすきなので\nすいそう　なんかに　いれていたら　ぶあつい\nガラスも　ツノの　ひとつきで　わって　にげるぞ。"
        jp_kanji:
          omega_ruby: "水中で　優雅に　棚引く　ひれが　とても\n美しい　ポケモンだが　油断を　していると\n強烈な　ツノの　一突きを　くらうぞ。"
          alpha_sapphire: "川や　池を　泳ぐ　ことが　大好きなので\n水槽　なんかに　入れていたら　ぶ厚い\nガラスも　ツノの　一突きで　割って　逃げるぞ。"
        en:
          omega_ruby: "Goldeen is a very beautiful Pokémon with fins that billow\nelegantly in water. However, don’t let your guard down around\nthis Pokémon—it could ram you powerfully with its horn."
          alpha_sapphire: "Goldeen loves swimming wild and free in rivers and ponds.\nIf one of these Pokémon is placed in an aquarium, it will\nshatter even the thickest glass with one ram of its horn\nand make its escape."
        fr:
          omega_ruby: "Poissirène est un Pokémon magnifique doté de nageoires\nqui ondulent élégamment dans les profondeurs. Il ne faut\npourtant pas baisser sa garde face à ce Pokémon, car il peut\ncharger avec sa puissante corne."
          alpha_sapphire: "Poissirène adore nager librement dans les rivières et\nles étangs. Si l’un de ces Pokémon est mis dans un aquarium,\nil n’hésitera pas à casser la vitre avec sa puissante corne pour\ns’enfuir."
        it:
          omega_ruby: "Goldeen è un Pokémon molto elegante dai movimenti\naggraziati. Tuttavia, è necessario stare attenti poiché\npotrebbe attaccare violentemente con il suo corno."
          alpha_sapphire: "Goldeen ama nuotare libero in fiumi e laghetti. Se messo\nin acquario, questo Pokémon riesce a fuggire spaccando\nanche il vetro più spesso con un colpo secco del suo corno."
        de:
          omega_ruby: "Goldini ist ein wunderschönes Pokémon, dessen Flossen\nsich elegant im Wasser wiegen. Aber man muss auf dieses\nPokémon achtgeben. Es könnte einen sonst heftig mit\nseinem Horn rammen."
          alpha_sapphire: "Goldini liebt es, in Teichen und Flüssen zu schwimmen.\nWenn ein solches Pokémon in ein Aquarium gebracht wird,\nwird es selbst das dickste Glas mit einem Stoß seines Horns\nzum Zerbersten bringen und die Flucht ergreifen."
        es:
          omega_ruby: "Goldeen es un bello Pokémon que mueve con elegancia las\naletas en el agua. Con todo, no hay que bajar la guardia, en\ncualquier momento puede embestir con el cuerno."
          alpha_sapphire: "A Goldeen le encanta nadar libremente y a su aire en ríos y\nestanques. Si pones a uno de estos Pokémon en un acuario,\nusará el cuerno que tiene para romper las paredes,\nindependientemente del grosor del cristal, y escapar."
        ko:
          omega_ruby: "물속에서 우아하게 나부끼는 지느러미가 매우\n아름다운 포켓몬이지만 방심하고 있으면\n강렬한 뿔의 일격을 당한다."
          alpha_sapphire: "강이나 연못을 헤엄치는 것을 매우 좋아해서\n수조 같은 곳에 넣어 두면 두꺼운\n유리도 뿔의 일격으로 깨고 도망간다."
