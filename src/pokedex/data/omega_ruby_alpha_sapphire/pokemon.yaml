          alpha_sapphire: "かざんばいで　ちじょうが　まっくらに\nなったとき　ウルガモスの　ほのおが\nたいようの　かわりに　なったという。"
        jp_kanji:
          omega_ruby: "戦いになると　６枚の　羽から\n火の粉の　りんぷんを　まき散らして\nあたり　一面を　火の海にする。"
          alpha_sapphire: "火山灰で　地上が　真っ暗に\nなったとき　ウルガモスの　炎が\n太陽の　かわりに　なったという。"
        en:
          omega_ruby: "A sea of fire engulfs the surroundings of their\nbattles, since they use their six wings to scatter\ntheir ember scales."
          alpha_sapphire: "When volcanic ash darkened the atmosphere, it is\nsaid that Volcarona’s fire provided a replacement\nfor the sun."
        fr:
          omega_ruby: "Quand il se bat, il fait pleuvoir des écailles enflammées\nde ses six ailes et transforme les alentours en mer de feu."
          alpha_sapphire: "On dit que quand le ciel s’est obscurci à cause des cendres\nd’un volcan, le feu d’un Pyrax aurait remplacé le soleil."
        it:
          omega_ruby: "Quando lotta, sparge scaglie infuocate dalle sue sei ali,\ncreando tutto intorno un mare di fuoco."
          alpha_sapphire: "Si dice che quando il mondo fu oscurato da ceneri vulcaniche,\nle fiamme di Volcarona abbiano sostituito il sole."
        de:
          omega_ruby: "Schüttelt sich glühenden Staub aus seinen sechs Flügeln und\nverwandelt das Umfeld in ein einziges Meer aus Flammen."
          alpha_sapphire: "Es heißt, als das Land einst unter einer düsteren Wolke aus\nVulkanasche lag, übernahm es die Rolle der Sonne."
        es:
          omega_ruby: "Cuando combate, despide escamas ardientes de sus seis alas\ny genera un mar ígneo a su alrededor."
          alpha_sapphire: "Antaño, las cenizas volcánicas cubrieron los cielos. Entonces,\nsus llamaradas sirvieron de sol."
        ko:
          omega_ruby: "싸울 때는 6개의 날개에서\n불꽃 가루를 흩뿌려서\n주변 일대를 불바다로 만든다."
          alpha_sapphire: "화산재로 지상이 캄캄하게\n되었을 때 불카모스의 불꽃이\n태양을 대신했다고 한다."
cobalion:
