          omega_ruby: "ねったいの　あさい　うみで　くらしている。\nカップルを　みつけると　うしろに　くっついて\nおよぐ　ことから　この　なまえが　つけられた。"
          alpha_sapphire: "ハートがたの　からだは　あいじょうの　シンボル。\nラブカスに　であった　カップルは　えいえんの\nあいが　やくそくされると　いわれているよ。"
        jp_kanji:
          omega_ruby: "熱帯の　浅い　海で　暮らしている。\nカップルを　見つけると　後ろに　くっついて\n泳ぐ　ことから　この　名前が　つけられた。"
          alpha_sapphire: "ハート型の　体は　愛情の　シンボル。\nラブカスに　出会った　カップルは　永遠の\n愛が　約束されると　いわれているよ。"
        en:
          omega_ruby: "Luvdisc live in shallow seas in the tropics. This heart-shaped\nPokémon earned its name by swimming after loving couples it\nspotted in the ocean’s waves."
          alpha_sapphire: "Luvdisc’s heart-shaped body is a symbol of love and romance.\nIt is said that any couple meeting this Pokémon is promised a\nloving relationship that never ends."
        fr:
          omega_ruby: "Lovdisc vit dans les mers peu profondes des tropiques.\nCe Pokémon en forme de cœur a gagné son nom en nageant\nderrière les couples d’amoureux qu’il repérait dans les eaux\nclaires de l’océan."
          alpha_sapphire: "Le corps en forme de cœur de Lovdisc représente l’amour\net les sentiments. On raconte qu’un couple qui rencontre\nce Pokémon s’aimera jusqu’à la fin des temps."
        it:
          omega_ruby: "Luvdisc vive nei mari tropicali poco profondi.\nQuesto Pokémon a forma di cuore ha preso\nquesto nome perché segue le coppie innamorate\nche scorge tra le onde oceaniche."
          alpha_sapphire: "Il corpo a forma di cuore di Luvdisc è il simbolo delle storie\nd’amore. Si dice che le coppie a cui capita di vederlo siano\ndestinate a vivere un’intensa passione che non avrà mai fine."
        de:
          omega_ruby: "Liebiskus lebt in den seichten Gewässern der Tropen. Dieses\nherzförmige Pokémon verdankt seinen Namen der Tatsache,\ndass es hinter Liebespaaren herschwamm, die es in den Wellen\ndes Ozeans beobachtet hatte."
          alpha_sapphire: "Liebiskus’ herzförmiger Körper ist ein Symbol der Liebe\nund der Romantik. Man sagt, jedem Paar, dem es begegnet,\nstünde eine unendliche Liebesbeziehung bevor."
        es:
          omega_ruby: "Luvdisc vive en aguas tropicales poco profundas. Este\nPokémon con forma de corazón se ha ganado la reputación\nque tiene por ir nadando detrás de las parejas de enamorados\nque veía entre las olas del océano."
          alpha_sapphire: "Luvdisc tiene forma de corazón y simboliza el amor y el\nromanticismo. Dicen que la pareja que se encuentre con él\nmantendrá una relación de amor de por vida."
        ko:
          omega_ruby: "열대의 얕은 바다에서 살고 있다.\n커플을 발견하면 뒤에 붙어서\n헤엄치기 때문에 이런 이름이 붙었다."
          alpha_sapphire: "하트 모양의 몸은 애정의 상징이다.\n사랑동이를 만난 커플에게는 영원한\n사랑이 약속된다고 전해진다."
bagon:
  species_id: 371
  names:
    jp_kana: タツベイ
    jp_kanji: タツベイ
    en: Bagon
    fr: Draby
    it: Bagon
    de: Kindwurm
    es: Bagon
    ko: 아공이
  forms:
    bagon:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 60
        special_attack: 40
        special_defense: 30
        speed: 50
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      hidden_ability: sheer_force
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          omega_ruby: "おおぞらを　とぶことを　ゆめみて　くりかえし\nだんがいから　とびおりている　うちに　あたまが\nきたえられ　こうてつの　ように　かたく　なった。"
          alpha_sapphire: "おおぞらを　とぶことを　ゆめみている　ポケモン。\nとべない　くやしさを　はらす　ように　おおいわに\nいしあたまを　うちつけては　コナゴナに　くだく。"
        jp_kanji:
          omega_ruby: "大空を　飛ぶことを　夢見て　繰り返し\n断崖から　飛び降りている　うちに　頭が\n鍛えられ　鋼鉄の　ように　硬く　なった。"
          alpha_sapphire: "大空を　飛ぶことを　夢見ている　ポケモン。\n飛べない　悔しさを　晴らす　ように　大岩に\n石頭を　打ちつけては　コナゴナに　砕く。"
        en:
          omega_ruby: "Bagon has a dream of one day soaring in the sky.\nIn doomed efforts to fly, this Pokémon hurls itself off cliffs.\nAs a result of its dives, its head has grown tough and as hard\nas tempered steel."
          alpha_sapphire: "Bagon harbors a never-ending dream of one day soaring high\namong the clouds. As if trying to dispel its frustration over its\ninability to fly, this Pokémon slams its hard head against huge\nrocks and shatters them into pebbles."
        fr:
          omega_ruby: "Draby rêve de pouvoir un jour s’élancer dans les cieux.\nBien que voué à l’échec, ce Pokémon se jette des falaises\npour essayer de voler. À force, sa tête est devenue\naussi dure que de l’acier."
          alpha_sapphire: "Draby rêve depuis toujours de voler au milieu des nuages.\nCe Pokémon éclate d’énormes rochers avec sa tête, comme\npour exorciser le fait qu’il ne puisse pas voler."
        it:
          omega_ruby: "Bagon serba in sé il sogno di volare alto in cielo. Nei suoi vani\ntentativi di spiccare il volo, si lancia a picco dalle alture.\nA causa di queste rovinose cadute, la testa gli è diventata\ndura come l’acciaio temprato."
          alpha_sapphire: "Da sempre Bagon serba in sé il sogno di volare alto tra le\nnuvole. Sfoga la sua frustrazione per l’incapacità di volare\nsbattendo la testa dura contro rocce enormi, che frantuma\nin mille pezzi."
        de:
          omega_ruby: "Kindwurm hat den Traum, fliegen zu können. In zahlreichen\nvergeblichen Versuchen stürzte es sich die Klippen herunter.\nDaher ist sein Kopf sehr robust und so hart wie Stahl\ngeworden."
          alpha_sapphire: "Kindwurm hegt einen unerfüllten Traum. Es möchte einmal\nhoch über den Wolken fliegen. Um seinen Frust über seine\nFlugunfähigkeit zu vertreiben, rammt es seinen harten Kopf\ngegen riesige Felsen und macht Kiesel aus ihnen."
        es:
          omega_ruby: "Bagon sueña con poder pasar un día volando por el cielo. En\nvanos intentos por volar, ha llegado a tirarse desde riscos.\nComo resultado de estas caídas en picado, se le ha puesto la\ncabeza dura como las piedras."
          alpha_sapphire: "Bagon sueña siempre con lo mismo: pasar todo un día\nvolando entre las nubes. Frustrado ante la imposibilidad de\nvolar, parece que se desahoga dándose cabezazos contra\nrocas enormes hasta hacerlas añicos."
        ko:
          omega_ruby: "넓은 하늘을 나는 것을 꿈꾸며 연거푸\n낭떠러지에서 뛰어내리다 보니 머리가\n단련되어 강철처럼 단단해졌다."
          alpha_sapphire: "넓은 하늘을 나는 것을 꿈꾸는 포켓몬이다.\n날지 못하는 분함을 떨치기 위한 것인 양 큰 바위에\n돌머리를 부딪쳐서 산산조각으로 부순다."
shelgon:
