        jp_kana:
          omega_ruby: "しょっかくを　ぶつけあって　ならす\nおとで　なかまと　かいわをする。\nねいろは　あきの　よの　ふうぶつし。"
          alpha_sapphire: "しょっかく　どうしが　ぶつかると\nコロン　コロンと　もっきんに　にた\nねいろを　かなでる。"
        jp_kanji:
          omega_ruby: "触覚を　ぶつけ合って　鳴らす　音で\n仲間と　会話をする。\n音色は　秋の　夜の　風物詩。"
          alpha_sapphire: "触覚　同士が　ぶつかると\nコロン　コロンと　木琴に　似た\n音色を　奏でる。"
        en:
          omega_ruby: "It chats with others using the sounds of its colliding\nantennae. These sounds are fall hallmarks."
          alpha_sapphire: "When its antennae hit each other, it sounds like the\nmusic of a xylophone."
        fr:
          omega_ruby: "Il communique au son de ses antennes qui s’entrechoquent.\nCe son marque l’arrivée de l’automne."
          alpha_sapphire: "Quand ses antennes s’entrechoquent, elles laissent échapper\nun bruit de xylophone."
        it:
          omega_ruby: "Comunica con il suono prodotto dallo scontro delle sue\nantenne. Esso indica l’arrivo dell’autunno."
          alpha_sapphire: "Le antenne, scontrandosi, producono un suono simile allo\nxilofono: klon, klon!"
        de:
          omega_ruby: "Diese Pokémon unterhalten sich, indem sie ihre Antennen\naneinanderschlagen. Der Ton ist ihr Kennzeichen."
          alpha_sapphire: "Wenn seine zwei Antennen sich berühren, erklingt ein Ruf\nwie das Spiel eines Xylophons."
        es:
          omega_ruby: "Hablan entre sí chocando las antenas. Los sonidos producidos\nson muy característicos."
          alpha_sapphire: "Si choca sus antenas, emite un sonido similar al de un\nxilófono."
        ko:
          omega_ruby: "더듬이를 서로 부딪쳐 내는\n소리로 동료와 대화한다. 음색은\n가을밤의 정취를 잘 나타낸다."
          alpha_sapphire: "더듬이가 서로 부딪히면\n딩동딩동 실로폰 같은\n음색을 연주한다."
kricketune:
  species_id: 402
  names:
