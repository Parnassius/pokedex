          alpha_sapphire: "かんじょうを　メロディで　あらわす。\nメロディの　ほうそくせいを\nがくしゃたちが　けんきゅうしている。"
        jp_kanji:
          omega_ruby: "鳴くときは　ナイフのような　腕を\n胸の　前で　交差させる。\n即興で　メロディを　作る。"
          alpha_sapphire: "感情を　メロディで　表す。\nメロディの　法則性を\n学者たちが　研究している。"
        en:
          omega_ruby: "It crosses its knifelike arms in front of its chest\nwhen it cries. It can compose melodies ad lib."
          alpha_sapphire: "It signals its emotions with its melodies. Scientists\nare studying these melodic patterns."
        fr:
          omega_ruby: "Il croise ses bras affûtés devant son torse pour crier.\nIl compose tout un tas de mélodies."
          alpha_sapphire: "Il exprime ses émotions par des mélodies. Les scientifiques\nétudient actuellement leur structure."
        it:
          omega_ruby: "Quando canta tiene le zampe incrociate al petto.\nSa improvvisare melodie."
          alpha_sapphire: "Esprime le proprie emozioni con melodie, che sono oggetto\ndi studio di molti scienziati."
        de:
          omega_ruby: "Wenn es ruft, verschränkt es seine messerartigen Arme vor\nder Brust. Es komponiert aus dem Stegreif."
          alpha_sapphire: "Über seine Melodien teilt es seine Gefühle mit.\nWissenschaftler untersuchen das Muster der Melodien."
        es:
          omega_ruby: "Cuando llora, cruza sus brazos con forma de cuchillo. Puede\nimprovisar melodías."
          alpha_sapphire: "Los científicos tratan de estudiar sus melodías, que son\nreflejo de sus emociones."
        ko:
          omega_ruby: "울 때는 나이프 같은 팔을\n가슴 앞에서 교차시킨다.\n즉흥으로 멜로디를 만든다."
          alpha_sapphire: "감정을 멜로디로 나타낸다.\n멜로디의 법칙성을\n학자들이 연구하고 있다."
shinx:
