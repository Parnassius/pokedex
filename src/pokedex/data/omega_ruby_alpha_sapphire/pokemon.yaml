      types:
        - water
      egg_groups:
        - water_1
        - water_3
      abilities:
        - mega_launcher
      descriptions:
        jp_kana:
          omega_ruby: "おおきな　ハサミから　あっしゅくした\nみずを　ピストルのように　うちだし\nとんでいる　えものを　うちおとす。"
          alpha_sapphire: "たいないガスの　ばくはつで　みずを\nピストルのように　はっしゃする。\nしきんきょりなら　いわを　くだく。"
        jp_kanji:
          omega_ruby: "大きな　ハサミから　圧縮した　水を\nピストルのように　撃ち出し\n飛んでいる　獲物を　撃ち落とす。"
          alpha_sapphire: "体内ガスの　爆発で\n水を　ピストルのように　発射する。\n至近距離なら　岩を　砕く。"
        en:
          omega_ruby: "They knock down flying prey by firing\ncompressed water from their massive\nclaws like shooting a pistol."
          alpha_sapphire: "Through controlled explosions of internal gas,\nit can expel water like a pistol shot.\nAt close distances, it can shatter rock."
        fr:
          omega_ruby: "Sa pince projette un jet d’eau sous pression suffisamment\npuissant pour abattre ses proies en plein vol."
          alpha_sapphire: "Il est capable de transformer son corps en canon à eau,\ngrâce à la combustion d’un gaz interne. À bout portant,\nil peut réduire un rocher en miettes."
        it:
          omega_ruby: "Abbatte le prede volanti sparando un getto d’acqua ad alta\npressione dalla chela più grande, che usa come una pistola."
          alpha_sapphire: "Facendo esplodere i gas corporei, emette un getto d’acqua\nad altissima pressione che, a breve distanza, può persino\nfrantumare le rocce."
        de:
          omega_ruby: "Mit Salven komprimierten Wassers, die es wie Pistolenkugeln\naus seinen Scheren abfeuert, schießt es fliegende Beute ab."
          alpha_sapphire: "Durch die Explosion körpereigener Gase feuert es wie eine\nPistole Wassersalven ab, die aus kurzer Distanz selbst Felsen\nzerschmettern."
        es:
          omega_ruby: "Abate a enemigos voladores disparando agua a presión con\nsu enorme pinza como si de una pistola se tratara."
          alpha_sapphire: "Al explotar el gas que se halla en su interior, expulsa un\nchorro de agua cual pistola, que a bocajarro es incluso capaz\nde pulverizar rocas."
        ko:
          omega_ruby: "커다란 집게발로\n압축한 물을 권총처럼 쏘아\n날고 있는 사냥감을 떨어뜨린다."
          alpha_sapphire: "체내 가스의 폭발로 물을\n총처럼 발사한다.\n가까운 거리에서라면 바위를 부순다."
clawitzer:
  species_id: 693
  names:
    jp_kana: ブロスター
    jp_kanji: ブロスター
    en: Clawitzer
    fr: Gamblast
    it: Clawitzer
