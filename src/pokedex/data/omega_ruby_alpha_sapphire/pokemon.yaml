          alpha_sapphire: "なわばりの　エサを　たべつくすと\nほかの　とちへ　いどうする。\n２つの　あたまは　なかが　わるい。"
        jp_kanji:
          omega_ruby: "２つの　頭は　仲が　悪く\n相手より　多く　食べることで\n主導権を　握ろうと　する。"
          alpha_sapphire: "縄張りの　エサを　食べつくすと\nほかの　土地へ　移動する。\n２つの　頭は　仲が　悪い。"
        en:
          omega_ruby: "The two heads do not get along. Whichever head\neats more than the other gets to be the leader."
          alpha_sapphire: "After it has eaten up all the food in its territory,\nit moves to another area. Its two heads do not\nget along."
        fr:
          omega_ruby: "Ses deux têtes s’entendent mal et sont en compétition\npermanente pour savoir qui mangera le plus et qui sera\nle chef."
          alpha_sapphire: "Quand il a mangé tout ce qui traînait sur son territoire, il migre\nvers d’autres horizons. Ses 2 têtes s’entendent mal."
        it:
          omega_ruby: "Le due teste non vanno d’accordo e si contendono la\nposizione di comando in base a quale mangia di più."
          alpha_sapphire: "Quando ha consumato tutto il cibo di un territorio, si sposta\naltrove. Le sue due teste non vanno d’accordo."
        de:
          omega_ruby: "Seine zwei Köpfe sind sich spinnefeind. Beide versuchen,\nüber Fresswettbewerbe die Oberhand zu gewinnen."
          alpha_sapphire: "Wenn es sein Revier leergejagt hat, sucht es sich ein neues.\nSeine beiden Köpfe liegen ständig im Streit."
        es:
          omega_ruby: "Sus dos cabezas se llevan fatal, y la que consigue comer más\nque la otra es la que lleva la voz cantante."
          alpha_sapphire: "Cambia de morada siempre que termina con la comida de una\nzona. Sus dos cabezas se llevan fatal."
        ko:
          omega_ruby: "2개의 머리는 사이가 나빠서\n상대보다 많이 먹는 것으로\n주도권을 잡으려고 한다."
          alpha_sapphire: "영역 안의 먹이를 다 먹어치우면\n다른 지역으로 이동한다.\n두 머리는 사이가 나쁘다."
