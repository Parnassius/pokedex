        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "ちしきのかみ　と　よばれている。\nめを　あわせた　ものの　きおくを\nけしてしまう　ちからを　もつという。"
          alpha_sapphire: "ユクシーの　たんじょうにより\nひとびとの　せいかつを　ゆたかにする\nちえが　うまれたと　いわれている。"
        jp_kanji:
          omega_ruby: "知識の神と　呼ばれている。\n目を　合わせた　者の　記憶を\n消してしまう　力を　持つという。"
          alpha_sapphire: "ユクシーの　誕生により\n人々の　生活を　豊かにする\n知恵が　生まれたと　言われている。"
        en:
          omega_ruby: "Known as “The Being of Knowledge.” It is said that\nit can wipe out the memory of those who see\nits eyes."
          alpha_sapphire: "It is said that its emergence gave humans the\nintelligence to improve their quality of life."
        fr:
          omega_ruby: "On l’appelle « être du savoir ». On raconte que son regard\na le pouvoir d’effacer la mémoire."
          alpha_sapphire: "On dit que sa venue a fourni aux humains le bon sens\nnécessaire pour améliorer leur existence."
        it:
          omega_ruby: "Noto come “Essere della conoscenza”. Pare che faccia\nperdere la memoria a chiunque lo fissi."
          alpha_sapphire: "Alla nascita di questo Pokémon l’uomo avrebbe ricevuto la\ncapacità di migliorare la propria esistenza."
        de:
          omega_ruby: "„Das wissende Wesen“. Es soll die Erinnerungen derer löschen,\ndie ihm in die Augen sehen."
          alpha_sapphire: "Man sagt, dass durch sein Auftauchen Menschen\ndie Intelligenz erhielten, ihr Leben zu verbessern."
        es:
          omega_ruby: "Se le conoce como el Ser de la Sabiduría. Se dice que puede\nborrar la memoria con una mirada."
          alpha_sapphire: "Se dice que su aparición otorgó a los humanos la inteligencia\npara mejorar sus vidas."
        ko:
          omega_ruby: "지식의 신이라 불리고 있다.\n눈을 마주친 사람의 기억을 지워\n버리는 힘을 가지고 있다고 한다."
          alpha_sapphire: "유크시의 탄생에 의해\n사람들의 생활을 풍요롭게 하는\n지혜가 생겨났다고 전해진다."
mesprit:
