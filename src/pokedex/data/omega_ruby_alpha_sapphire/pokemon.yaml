        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - monster
      abilities:
        - own_tempo
        - ice_body
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          omega_ruby: "こおりついた　からだは　こうてつの\nように　かたい。たちふさがる　ものを\nきょたいで　おしつぶし　いどうする。"
          alpha_sapphire: "せなかに　すうひきの　カチコールを\nのせて　くらす　ようすは　まるで\nこおりの　こうくうぼかんのようだ。"
        jp_kanji:
          omega_ruby: "凍りついた　体は　鋼鉄のように\n硬い。立ちふさがる　ものを\n巨体で　押しつぶし　移動する。"
          alpha_sapphire: "背中に　数匹の　カチコールを\n乗せて　暮らす　様子は\nまるで　氷の　航空母艦のようだ。"
        en:
          omega_ruby: "Its ice-covered body is as hard as steel.\nIts cumbersome frame crushes anything that\nstands in its way."
          alpha_sapphire: "The way several Bergmite huddle\non its back makes it look like\nan aircraft carrier made of ice."
        fr:
          omega_ruby: "Son immense corps recouvert de glace est aussi solide\nque de l’acier. Quand il se déplace, il écrase tout ce qui\nse trouve sur son passage."
          alpha_sapphire: "Quand on le voit transportant les petits Grelaçon\nqui vivent sur son dos, il y a une ressemblance certaine\navec les véhicules déplaçant les fusées."
        it:
          omega_ruby: "Il suo enorme corpo di ghiaccio è duro come l’acciaio.\nAvanza distruggendo tutto ciò che gli si para davanti."
          alpha_sapphire: "Ospita numerosi Bergmite sul suo dorso, come una vera\ne propria portaerei di ghiaccio."
        de:
          omega_ruby: "Sein eisbedeckter Körper ist so hart wie Stahl. Es nutzt diese\nstahlharte Hülle, um Hindernisse zu zerschmettern und sich so\nseinen Weg zu bahnen."
          alpha_sapphire: "Mit den zahlreichen Arktip auf seinem Rücken sieht es aus wie\nein Flugzeugträger aus Eis."
        es:
          omega_ruby: "Su cuerpo, cubierto de hielo, es tan duro como el propio\nacero. Su abultada figura le permite arramblar con todo lo que\nse encuentra a su paso."
          alpha_sapphire: "Parece un portaaviones de hielo, por el aspecto que presenta\nal llevar varios Bergmite en su espalda."
        ko:
          omega_ruby: "얼어붙은 몸은 강철처럼\n단단하다. 앞을 가로막는 것을\n커다란 몸으로 파괴하며 이동한다."
          alpha_sapphire: "등에 수 마리의 꽁어름을\n태우고 지내는 모습은 마치\n얼음으로 된 항공모함 같다."
noibat:
  species_id: 714
  names:
    jp_kana: オンバット
