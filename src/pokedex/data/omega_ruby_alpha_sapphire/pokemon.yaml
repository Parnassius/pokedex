      descriptions:
        jp_kana:
          omega_ruby: "ほしあかりが　パワーの　みなもと。\nよるになると　サイコパワーで　いしを\nうかべて　ほしの　はいちを　しるす。"
          alpha_sapphire: "ほしあかりが　かがやく　よるに\nねている　こどもたちを　あやつって\nあそぶ　はなしが　おおく　のこる。"
        jp_kanji:
          omega_ruby: "星明りが　パワーの　源。\n夜になると　サイコパワーで　石を\n浮かべて　星の　配置を　印す。"
          alpha_sapphire: "星明かりが　輝く　夜に\n寝ている　子供たちを　操って\n遊ぶ　話が　多く　残る。"
        en:
          omega_ruby: "Starlight is the source of their power. At night,\nthey mark star positions by using psychic power\nto float stones."
          alpha_sapphire: "According to many old tales, it creates friends for\nitself by controlling sleeping children on\nstarry nights."
        fr:
          omega_ruby: "Tire son énergie de la lumière des étoiles et marque\nleur position en faisant léviter des pierres la nuit."
          alpha_sapphire: "On dit qu’ils apparaissent les nuits étoilées et manipulent\nles enfants pour jouer avec eux."
        it:
          omega_ruby: "Trae energia dalla luce delle stelle. Ne traccia la posizione\nfacendo levitare le pietre con i poteri psichici."
          alpha_sapphire: "Si racconta che nelle notti stellate, per giocare con i bambini\naddormentati, si diverta a muoverli come pupazzi."
        de:
          omega_ruby: "Zieht seine Energie aus dem Sternenlicht. Bei Nacht bringt es\nSteine zum Schweben und bildet damit Sternzeichen nach."
          alpha_sapphire: "Erzählungen zufolge machen sie sich einen Spaß daraus,\nin sternklaren Nächten von schlafenden Kindern Besitz\nzu ergreifen."
        es:
          omega_ruby: "La luz de las estrellas origina su poder. De noche, marca su\nposición haciendo levitar piedras con su poder psíquico."
          alpha_sapphire: "Según muchas leyendas, durante las noches estrelladas\ncontrolan a los niños que duermen, tan solo como diversión."
        ko:
          omega_ruby: "별빛이 힘의 원천이다.\n밤이 되면 사이코 파워로 돌을\n띄워 별의 배치를 표시한다."
          alpha_sapphire: "별빛이 빛나는 밤에\n잠자는 아이들을 조종해서\n논다는 이야기가 많이 남아 있다."
gothitelle:
  species_id: 576
  names:
    jp_kana: ゴチルゼル
    jp_kanji: ゴチルゼル
    en: Gothitelle
    fr: Sidérella
