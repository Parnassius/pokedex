          alpha_sapphire: "はがねの　かたさを　もつ　からだは　ちょっとや\nそっとの　こうげきでは　びくとも　しないぞ。\nハネを　はばたかせ　たいおんを　ちょうせつする。"
        jp_kanji:
          omega_ruby: "鋼の　硬さを　持つ　体は　ちょっとや\nそっとの　攻撃では　びくとも　しないぞ。\nハネを　羽ばたかせ　体温を　調節する。"
          alpha_sapphire: "鋼の　硬さを　持つ　体は　ちょっとや\nそっとの　攻撃では　びくとも　しないぞ。\nハネを　羽ばたかせ　体温を　調節する。"
        en:
          omega_ruby: "Scizor has a body with the hardness of steel. It is not easily\nfazed by ordinary sorts of attacks. This Pokémon flaps its\nwings to regulate its body temperature."
          alpha_sapphire: "Scizor has a body with the hardness of steel. It is not easily\nfazed by ordinary sorts of attacks. This Pokémon flaps its\nwings to regulate its body temperature."
        fr:
          omega_ruby: "Le corps de Cizayox est dur comme de l’acier. Les attaques\nordinaires ne le déstabilisent pas. Ce Pokémon bat des ailes\npour réguler sa température interne."
          alpha_sapphire: "Le corps de Cizayox est dur comme de l’acier. Les attaques\nordinaires ne le déstabilisent pas. Ce Pokémon bat des ailes\npour réguler sa température interne."
        it:
          omega_ruby: "Il corpo di Scizor è duro come l’acciaio. Gli attacchi\npiù comuni non riescono neanche a scalfirlo. Sbatte le ali\nper regolare la propria temperatura corporea."
          alpha_sapphire: "Il corpo di Scizor è duro come l’acciaio. Gli attacchi\npiù comuni non riescono neanche a scalfirlo. Sbatte le ali\nper regolare la propria temperatura corporea."
