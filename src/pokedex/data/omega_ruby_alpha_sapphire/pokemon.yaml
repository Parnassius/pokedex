          alpha_sapphire: "すあなを　ひろげるとき　ちちゅうから\nでてきた　ほうせきの　げんせきを\nすに　ためる　しゅうせいを　もつ。"
        jp_kanji:
          omega_ruby: "光り輝く　ものが　大好きで\n洞窟の　中で　見つけた\n宝を　自分の巣に　ためこむ。"
          alpha_sapphire: "巣穴を　広げるとき　地中から\n出てきた　宝石の　原石を\n巣に　ためる　習性を　持つ。"
        en:
          omega_ruby: "It loves sparkly things. It seeks treasures in caves\nand hoards the loot in its nest."
          alpha_sapphire: "As it digs to expand its nest, it habitually digs up\ngems that it then hoards in its nest."
        fr:
          omega_ruby: "Toujours à la recherche d’objets brillants, il arpente\nles grottes pour constituer son butin."
          alpha_sapphire: "Carmache accumule les pierres précieuses qu’il déterre quand\nil entreprend d’agrandir son nid."
        it:
          omega_ruby: "Adora gli oggetti luccicanti. Va a caccia di tesori nelle grotte\ne li trasporta nel suo nido."
          alpha_sapphire: "Ha l’abitudine di collezionare gemme che trova mentre si scava\nla tana, appositamente ampliata."
        de:
          omega_ruby: "Es liebt funkelnde Dinge und sucht nach Schätzen in Höhlen,\ndie es dann in seinem Nest hortet."
          alpha_sapphire: "Die Rohedelsteine, die beim Erweitern seiner Höhle\nzum Vorschein kommen, hortet es in seinem Nest."
        es:
          omega_ruby: "Le gustan las cosas brillantes. Busca tesoros en cuevas y se\nlleva el botín a su nido."
          alpha_sapphire: "Tiende a acumular las gemas en bruto que encuentra cuando\nagranda su guarida."
        ko:
          omega_ruby: "반짝반짝 빛나는 것을\n아주 좋아하기에 동굴 안에서 발견한\n보물을 자신의 둥지에 모아둔다."
          alpha_sapphire: "거처를 늘릴 때 땅속에서\n나온 보석의 원석을\n거처에 모아두는 습성을 가졌다."
garchomp:
  species_id: 445
  names:
    jp_kana: ガブリアス
    jp_kanji: ガブリアス
    en: Garchomp
    fr: Carchacrok
    it: Garchomp
    de: Knakrack
    es: Garchomp
    ko: 한카리아스
