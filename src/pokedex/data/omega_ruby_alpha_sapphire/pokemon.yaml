        jp_kana:
          omega_ruby: "つよい　サイコパワーを　あやつる。\nサイコパワーで　あいての　のうみそを\nしめつけて　ずつうを　おこさせる。"
          alpha_sapphire: "５０ねんまえ　ＵＦＯが\nついらくしたと　うわさされる\nさばくから　やってきたと　いわれる。"
        jp_kanji:
          omega_ruby: "強力な　サイコパワーを　操る。\nサイコパワーで　相手の　脳みそを\n絞めつけて　頭痛を　起こさせる。"
          alpha_sapphire: "５０年前　ＵＦＯが\n墜落したと　うわさされる\n砂漠から　やってきたと　いわれる。"
        en:
          omega_ruby: "It uses its strong psychic power to squeeze its\nopponent’s brain, causing unendurable headaches."
          alpha_sapphire: "Rumors of its origin are linked to a UFO crash site\nin the desert 50 years ago."
        fr:
          omega_ruby: "Avec son puissant pouvoir psychique, il peut compresser\nle cerveau de ses ennemis et déclencher des migraines."
          alpha_sapphire: "On dit qu’il est apparu soudainement il y a 50 ans des confins\nd’un désert où un OVNI se serait écrasé."
        it:
          omega_ruby: "Con i suoi incredibili poteri psichici comprime il cervello\ndei suoi nemici provocando loro fortissime emicranie."
          alpha_sapphire: "Si dice che sia arrivato 50 anni fa da un deserto in cui sembra\nsi sia schiantato un UFO."
        de:
          omega_ruby: "Es verfügt über mächtige Psycho-Kräfte, mit denen es die\nHirne seiner Gegner verwirrt, um ihnen Kopfweh zu bereiten."
          alpha_sapphire: "Man sagt, es sei vor 50 Jahren aus den Tiefen einer Wüste\nerschienen, in der zuvor angeblich ein UFO abgestürzt war."
        es:
          omega_ruby: "Posee un gran poder psíquico. Lo usa para comprimir el\ncerebro del enemigo y ocasionarle dolores de cabeza."
          alpha_sapphire: "Según cuentan los rumores, procede de un desierto donde\nhace 50 años se estrelló un ovni."
        ko:
          omega_ruby: "강력한 사이코 파워를 다룬다.\n사이코 파워로 상대의 뇌를\n조여서 두통을 일으킨다."
          alpha_sapphire: "50년 전 UFO가\n추락했다는 소문이 도는\n사막에서 왔다고 전해진다."
beheeyem:
  species_id: 606
