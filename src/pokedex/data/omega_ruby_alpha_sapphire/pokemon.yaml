          alpha_sapphire: "Jynx walks rhythmically, swaying and shaking its hips\nas if it were dancing. Its motions are so bouncingly alluring,\npeople seeing it are compelled to shake their hips without\ngiving any thought to what they are doing."
        fr:
          omega_ruby: "Lippoutou marche en rythme, ondule de tout son corps et\nse déhanche comme s’il dansait. Ses mouvements sont si\ncommunicatifs que les gens qui le voient sont soudain pris\nd’une terrible envie de bouger les hanches, sans réfléchir."
          alpha_sapphire: "Lippoutou marche en rythme, ondule de tout son corps et\nse déhanche comme s’il dansait. Ses mouvements sont si\ncommunicatifs que les gens qui le voient sont soudain pris\nd’une terrible envie de bouger les hanches, sans réfléchir."
        it:
          omega_ruby: "Jynx avanza oscillando e ancheggiando ritmicamente come\nin una specie di danza tesa ad ammaliare il nemico.\nChi vede questo Pokémon è costretto a iniziare la stessa\ndanza senza pensare a cosa sta facendo."
