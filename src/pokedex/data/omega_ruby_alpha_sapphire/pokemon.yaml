        jp_kana:
          omega_ruby: "かせきから　ふっかつした　ポケモン。\nあらゆる　とりポケモンの　そせんと\nかんがえられている。"
          alpha_sapphire: "とりポケモンの　そせんと　いわれる。\nとぶことは　できず　えだから　えだへ\nとびうつり　せいかつしていたらしい。"
        jp_kanji:
          omega_ruby: "化石から　復活した　ポケモン。\nあらゆる　とりポケモンの　祖先と\n考えられている。"
          alpha_sapphire: "とりポケモンの　祖先と　言われる。\n飛ぶことは　できず　枝から　枝へ\n飛び移り　生活していたらしい。"
        en:
          omega_ruby: "Revived from a fossil, this Pokémon is thought to\nbe the ancestor of all bird Pokémon."
          alpha_sapphire: "Said to be an ancestor of bird Pokémon, they were\nunable to fly and moved about by hopping from one\nbranch to another."
        fr:
          omega_ruby: "Un Pokémon recréé à partir d’un fossile. On pense qu’il est\nl’ancêtre de tous les Pokémon Oiseaux."
          alpha_sapphire: "On dit qu’il serait l’ancêtre de tous les Pokémon Oiseaux.\nIl ne sait pas voler et se déplace en sautant d’arbre en arbre."
        it:
          omega_ruby: "Pokémon risvegliatosi da un fossile. Si ritiene che sia\nl’antenato di tutti i Pokémon uccello."
          alpha_sapphire: "Si dice sia antenato dei Pokémon uccello. Siccome non sa\nvolare, si sposta di ramo in ramo saltando."
        de:
          omega_ruby: "Es wurde aus einem Fossil reanimiert. Man geht davon aus,\ndass es der Urahn aller Vogel-Pokémon ist."
          alpha_sapphire: "Man nennt es den Urvater der Vogel-Pokémon. Da es nicht\nfliegen kann, bewegt es sich hüpfend von Ast zu Ast."
        es:
          omega_ruby: "Pokémon que renació de un fósil. Dicen que es el antepasado\nde todos los Pokémon pájaro."
          alpha_sapphire: "Dicen que es el Pokémon pájaro primigenio. No puede volar,\nasí que solo salta de rama en rama."
        ko:
          omega_ruby: "화석에서 부활한 포켓몬이다.\n모든 새포켓몬의 조상이라\n여겨지고 있다."
          alpha_sapphire: "새포켓몬의 조상이라고 전해진다.\n날 수 없어서 가지에서 가지로\n뛰어다니며 생활했다고 한다."
archeops:
