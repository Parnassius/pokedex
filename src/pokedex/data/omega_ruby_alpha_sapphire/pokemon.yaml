          alpha_sapphire: "ポケモンや　トレーナーを　じっと\nかんさつする。ゴチムにしか　みえない\nなにかを　みつめているらしい。"
        jp_kanji:
          omega_ruby: "リボンのような　触角で\nサイコパワーを　増幅させる。\nなにかを　じっと　見つめている。"
          alpha_sapphire: "ポケモンや　トレーナーを　じっと\n観察する。ゴチムにしか　見えない\nなにかを　見つめているらしい。"
        en:
          omega_ruby: "Their ribbonlike feelers increase their psychic\npower. They are always staring at something."
          alpha_sapphire: "They intently observe both Trainers and Pokémon.\nApparently, they are looking at something that only\nGothita can see."
        fr:
          omega_ruby: "Concentre des pouvoirs psychiques dans ses antennes\nsemblables à des rubans, et regarde fixement… mais quoi ?"
          alpha_sapphire: "Fixe les Pokémon et les Dresseurs du regard comme\ns’il y avait quelque chose que personne d’autre ne\npouvait voir."
        it:
          omega_ruby: "Amplifica i poteri psichici con le antenne a forma di fiocchetti.\nIl suo sguardo è sempre fisso."
          alpha_sapphire: "Osserva con attenzione i Pokémon e gli Allenatori, come se\ncontemplasse qualcosa che solo lui può vedere."
        de:
          omega_ruby: "Die schleifenförmigen Fühler erhöhen seine Psycho-Kräfte.\nEs scheint stets irgendetwas anzustarren."
          alpha_sapphire: "Beobachtet andere Pokémon und Trainer mit durchdringendem\nBlick, als könne es etwas erkennen, das keiner sonst sieht."
        es:
          omega_ruby: "Amplifica su poder psíquico con sus antenitas en forma de\nlazo. Siempre está mirando algo fijamente."
          alpha_sapphire: "Clava su mirada en Pokémon y Entrenadores como si\nobservara algo solo perceptible por él."
        ko:
          omega_ruby: "리본 모양의 더듬이로\n사이코 파워를 증폭시킨다.\n무언가를 가만히 바라보고 있다."
          alpha_sapphire: "포켓몬이나 트레이너를 가만히\n관찰한다. 고디탱만 볼 수 있는\n무언가를 바라보고 있는 것 같다."
gothorita:
  species_id: 575
  names:
    jp_kana: ゴチミル
    jp_kanji: ゴチミル
    en: Gothorita
    fr: Mesmérella
    it: Gothorita
    de: Hypnomorba
    es: Gothorita
    ko: 고디보미
