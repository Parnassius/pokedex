        - cheek_pouch
      hidden_ability: huge_power
      descriptions:
        jp_kana:
          omega_ruby: "おおきな　みみは　１トンを　こえる\nいわを　らくに　もちあげる　パワー。\nこうじげんばで　だいかつやくする。"
          alpha_sapphire: "ショベルカーなみの　パワーの　みみで\nかたい　がんばんも　コナゴナ。あなを\nほりおえると　ダラダラと　すごす。"
        jp_kanji:
          omega_ruby: "大きな　耳は　１トンを　超える 岩を\n楽に　持ち上げる　パワー。\n工事現場で　大活躍する。"
          alpha_sapphire: "ショベルカー並みの　パワーの　耳で\n硬い　岩盤も　コナゴナ。穴を\n掘り終えると　ダラダラと　過ごす。"
        en:
          omega_ruby: "With their powerful ears, they can heft\nboulders of a ton or more with ease.\nThey can be a big help at construction sites."
          alpha_sapphire: "As powerful as an excavator, its ears\ncan reduce dense bedrock to rubble.\nWhen it’s finished digging, it lounges lazily."
        fr:
          omega_ruby: "Ses grandes oreilles sont si musclées qu’il peut soulever\nun rocher d’une tonne sans broncher. Ce Pokémon est\nsouvent utilisé sur les chantiers."
          alpha_sapphire: "Ses oreilles sont de véritables excavateurs, venant à bout\ndes blocs de pierre les plus durs. Après l’effort, il se repose\nen paressant."
        it:
          omega_ruby: "Con le sue grandi orecchie può sollevare facilmente massi\nda più di una tonnellata. Può essere di grande aiuto nei\ncantieri edili."
          alpha_sapphire: "Le orecchie potenti quanto una scavatrice gli permettono di\nsbriciolare anche rocce durissime. Quando ha finito di scavare,\nsi rilassa beatamente."
        de:
          omega_ruby: "Seine großen Ohren besitzen die Kraft, selbst Felsen,\ndie 1 t schwer sind, mühelos hochzuheben. Es wird daher\noft auf Baustellen eingesetzt."
          alpha_sapphire: "Mit Ohren so mächtig wie ein Bagger kann es selbst das\nhärteste Gestein zertrümmern. Ist es fertig mit Graben,\nlümmelt es herum."
        es:
          omega_ruby: "Sus grandes orejas tienen tal fuerza que con ellas puede\nlevantar con facilidad rocas de más de una tonelada. Es de\nuna ayuda inestimable en las obras."
          alpha_sapphire: "Sus orejas, tan poderosas como una excavadora, pueden\nhacer añicos hasta la roca más sólida. Cuando termina de\ncavar, se toma un respiro."
        ko:
          omega_ruby: "커다란 귀에는 무게가 1톤을 넘는 바위를\n가뿐히 들어 올릴 만한 파워가 있다.\n공사 현장에서 대활약한다."
          alpha_sapphire: "굴착기에 버금가는 파워의 귀로\n단단한 암반도 산산조각 낸다.\n구멍을 다 파면 빈둥빈둥 지낸다."
fletchling:
  species_id: 661
  names:
