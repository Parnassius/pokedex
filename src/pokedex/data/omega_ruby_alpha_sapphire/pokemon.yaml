          omega_ruby: "じょうぶつできない　たましいを\nかぼちゃの　からだに　いれている。\nひぐれと　ともに　うごきはじめる。"
          alpha_sapphire: "さまよう　たましいを　じょうぶつ\nさせるため　ししゃの　すむ　せかいへ\nはこんでいると　いわれている。"
        jp_kanji:
          omega_ruby: "成仏できない　魂を\nカボチャの　体に　入れている。\n日暮れと　ともに　動きはじめる。"
          alpha_sapphire: "さまよう　魂を　成仏させるため\n死者の　住む　世界へ\n運んでいると　言われている。"
        en:
          omega_ruby: "The pumpkin body is inhabited by a spirit\ntrapped in this world. As the sun sets,\nit becomes restless and active."
          alpha_sapphire: "It is said to carry wandering spirits\nto the place where they belong\nso they can move on."
        fr:
          omega_ruby: "Ce Pokémon est né du mariage d’un esprit piégé\ndans le monde des vivants et d’une citrouille.\nIl commence à s’animer au coucher du soleil."
          alpha_sapphire: "Il paraît qu’il accompagne les âmes des défunts jusque dans\nl’au-delà, pour qu’elles puissent goûter au repos éternel."
        it:
          omega_ruby: "Pokémon nato quando uno spirito inquieto è entrato in\nuna zucca. Si attiva dopo il calar del sole."
          alpha_sapphire: Si dice che aiuti le anime smarrite a ritrovare il cammino.
        de:
          omega_ruby: "Es entsteht aus der Vereinigung einer in der Welt der\nLebenden gefangenen Seele mit einem Kürbis. Es wird erst\nnach Sonnenuntergang aktiv."
          alpha_sapphire: "Man sagt, es führe verlorene Seelen dem Ende ihres\nrastlosen irdischen Wandelns entgegen und geleite sie\nsicher ins Jenseits."
        es:
          omega_ruby: "En el interior de la calabaza reside un espíritu que ha\npermanecido atrapado en este mundo. Entra en acción\nal caer la noche."
          alpha_sapphire: "Se dice que este Pokémon se dedica a guiar las almas\nerrantes al otro mundo para que así puedan descansar en\npaz durante toda la eternidad."
        ko:
          omega_ruby: "성불하지 못한 혼을\n호박으로 된 몸속에 담고 있다.\n해가 지면 활동하기 시작한다."
          alpha_sapphire: "떠도는 영혼을 성불시키기 위해\n죽은 자들이 사는 세계로\n옮기고 있다고 전해진다."
