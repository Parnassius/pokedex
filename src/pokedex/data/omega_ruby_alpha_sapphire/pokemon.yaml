        - snow_cloak
      hidden_ability: ice_body
      descriptions:
        jp_kana:
          omega_ruby: "たいおんを　コントロールすることで\nしゅういの　くうきを　こおらせて\nダイヤモンドダストを　ふらせる。"
          alpha_sapphire: "たいおんを　さげることで　ぜんしんの\nたいもうを　こおらせて　するどく\nとがった　ハリのようにして　とばす。"
        jp_kanji:
          omega_ruby: "体温を　コントロールすることで\n周囲の　空気を　凍らせて\nダイヤモンドダストを　降らせる。"
          alpha_sapphire: "体温を　さげることで　全身の\n体毛を　凍らせて　鋭く\nとがった　針のようにして　飛ばす。"
        en:
          omega_ruby: "By controlling its body heat, it can freeze the\natmosphere around it to make a\ndiamond-dust flurry."
          alpha_sapphire: "It lowers its body heat to freeze its fur. The hairs\nthen become like needles it can fire."
        fr:
          omega_ruby: "Il ajuste la température de son corps pour créer un vent\nde glace en gelant l’air qui l’entoure."
          alpha_sapphire: "Il abaisse la température de son corps pour changer ses poils\nen aiguilles de glace qu’il projette sur l’ennemi."
        it:
          omega_ruby: "Modificando la temperatura del corpo, congela l’aria e crea\nfolate di cristalli di ghiaccio."
          alpha_sapphire: "Abbassa la temperatura del corpo per ghiacciare i propri peli\ne lanciarli come micidiali aghi sottilissimi."
        de:
          omega_ruby: "Erzeugt ein Diamantstaubgestöber durch das Einfrieren der\nLuft um sich herum."
          alpha_sapphire: "Wenn es seine Körpertemperatur senkt, erstarren die Haare\nseines Fells zu Eis und dienen ihm als nadelartige Geschosse."
        es:
          omega_ruby: "Controla su temperatura corporal para congelar el ambiente y\ncausar ráfagas de nieve en polvo."
          alpha_sapphire: "Al reducir su temperatura corporal, su pelaje se congela y\nse convierte en afilados pinchos que puede disparar."
        ko:
          omega_ruby: "체온을 컨트롤하는 것으로\n주위의 공기를 얼려서\n다이아몬드더스트를 날린다."
          alpha_sapphire: "체온을 내리는 것으로 전신의\n털을 얼려서 날카롭고\n뾰족한 바늘처럼 만들어 날린다."
gliscor:
  species_id: 472
  names:
    jp_kana: グライオン
    jp_kanji: グライオン
    en: Gliscor
    fr: Scorvol
    it: Gliscor
    de: Skorgro
    es: Gliscor
    ko: 글라이온
  forms:
    gliscor:
      form_id: 0
      base_stats:
        hp: 75
        attack: 95
        defense: 125
        special_attack: 45
        special_defense: 75
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
