      descriptions:
        jp_kana:
          omega_ruby: "２まいの　ハネを　はげしく　しんどうさせて\nちょうおんぱを　だし　えものを　きぜつさせる。\nにんげんも　ずつうを　おこす　ほどの　いりょく。"
          alpha_sapphire: "ビブラーバの　ハネは　まだ　せいちょうとちゅう。\nながい　きょりを　とぶ　よりも　しんどうさせて\nちょうおんぱを　だす　ほうが　とくいなのだ。"
        jp_kanji:
          omega_ruby: "２枚の　ハネを　激しく　振動させて\n超音波を　出し　獲物を　気絶させる。\n人間も　頭痛を　起こす　ほどの　威力。"
          alpha_sapphire: "ビブラーバの　ハネは　まだ　成長途中。\n長い　距離を　飛ぶ　よりも　振動させて\n超音波を　出す　ほうが　得意なのだ。"
        en:
          omega_ruby: "To make prey faint, Vibrava generates ultrasonic waves by\nvigorously making its two wings vibrate. This Pokémon’s\nultrasonic waves are so powerful, they can bring on headaches\nin people."
          alpha_sapphire: "Vibrava’s wings have not yet completed the process of\ngrowing. Rather than flying long distances, they are more\nuseful for generating ultrasonic waves by vibrating."
        fr:
          omega_ruby: "Pour mettre ses proies K.O., Vibraninf envoie des ultrasons\nen faisant vibrer ses deux ailes. Les ondes sonores de ce\nPokémon sont si puissantes qu’elles peuvent déclencher\ndes maux de tête chez les gens."
          alpha_sapphire: "Les ailes de Vibraninf n’ont pas complètement fini de pousser.\nElles ne lui servent pas à voler sur de longues distances,\nmais plutôt à générer des ultrasons en vibrant."
        it:
          omega_ruby: "Vibrava attacca la preda generando onde a ultrasuoni con\nle vigorose vibrazioni delle due ali. Tali onde sono così potenti\nda causare il mal di testa a chi le sente."
          alpha_sapphire: "Le ali di Vibrava non hanno ancora completato il loro sviluppo.\nPiù che per affrontare lunghe distanze, le utilizza per generare\nonde ultrasoniche facendole vibrare."
        de:
          omega_ruby: "Um seine Beute zu schwächen, erzeugt Vibrava\nUltraschallwellen, indem es seine Flügel vibrieren lässt.\nDie Ultraschallwellen dieses Pokémon sind so stark, dass\nsie bei Menschen Kopfschmerzen verursachen können."
          alpha_sapphire: "Vibravas Flügel sind noch nicht ganz ausgewachsen. Für lange\nStrecken sind seine Flügel weniger geeignet. Aber es kann mit\nihnen Ultraschallwellen erzeugen, wenn es sie vibrieren lässt."
        es:
          omega_ruby: "Para debilitar a su víctima, Vibrava genera ondas ultrasónicas\nhaciendo vibrar con fuerza las alas. Las ondas que crea son\ntan fuertes que pueden dar dolor de cabeza a la gente."
          alpha_sapphire: "Vibrava no ha desarrollado las alas del todo. Más que para\nvolar y recorrer largas distancias, le resultan útiles para\ngenerar ondas ultrasónicas al hacer que vibren."
        ko:
          omega_ruby: "두 장의 날개를 세차게 진동시켜서\n초음파를 내 먹이를 기절시킨다.\n인간도 두통이 일어날 정도의 위력이다."
          alpha_sapphire: "비브라바의 날개는 아직 성장 중이다.\n장거리를 나는 것보다 진동시켜\n초음파를 내는 것이 특기다."
flygon:
  species_id: 330
  names:
    jp_kana: フライゴン
    jp_kanji: フライゴン
    en: Flygon
    fr: Libégon
    it: Flygon
    de: Libelldra
    es: Flygon
    ko: 플라이곤
  forms:
    flygon:
      form_id: 0
      base_stats:
        hp: 80
        attack: 100
        defense: 80
        special_attack: 80
        special_defense: 80
        speed: 100
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - ground
        - dragon
      egg_groups:
        - bug
      abilities:
        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "さばくの　せいれいと　よばれる　ポケモン。\nハネの　はばたきで　すなを　まいあげるため\nとんでいる　ときは　いつも　すなあらしの　なか。"
          alpha_sapphire: "はばたきで　おこす　すなあらしの　なかから\nうたごえの　ような　はおと　だけが　きこえるため\nフライゴンは　さばくの　せいれいと　いわれた。"
        jp_kanji:
          omega_ruby: "砂漠の　精霊と　呼ばれる　ポケモン。\nハネの　羽ばたきで　砂を　舞い上げるため\n飛んでいる　ときは　いつも　砂嵐の　中。"
          alpha_sapphire: "羽ばたきで　起こす　砂嵐の　中から\n歌声の　ような　羽音　だけが　聞こえるため\nフライゴンは　砂漠の　精霊と　いわれた。"
        en:
          omega_ruby: "Flygon is nicknamed “the elemental spirit of the desert.”\nBecause its flapping wings whip up a cloud of sand, this\nPokémon is always enveloped in a sandstorm while flying."
          alpha_sapphire: "Flygon whips up a sandstorm by flapping its wings. The wings\ncreate a series of notes that sound like singing. Because the\n“singing” is the only thing that can be heard in a sandstorm,\nthis Pokémon is said to be the desert spirit."
        fr:
          omega_ruby: "Libégon est surnommé « l’esprit élémentaire du désert ».\nLe battement de ses ailes soulève des nuages de sable.\nC’est pourquoi ce Pokémon est toujours entouré\nd’une tempête de sable quand il vole."
          alpha_sapphire: "Libégon peut déclencher une tempête de sable en battant\ndes ailes. Les ailes créent une suite de notes ressemblant\nà une mélodie. Comme cette « mélodie » est le seul son\naudible, on appelle ce Pokémon l’esprit du désert."
        it:
          omega_ruby: "Flygon è detto anche “Spirito primordiale del deserto”.\nPoiché le sue ali sollevano nubi di sabbia, è sempre\naccompagnato da una tempesta di sabbia quando vola."
          alpha_sapphire: "Flygon crea tempeste di sabbia agitando le ali, che emettono\nnote musicali creando una sorta di canto. Poiché questo\n“canto” è l’unica cosa udibile durante la tempesta, Flygon\nè considerato lo spirito del deserto."
        de:
          omega_ruby: "Libelldra wird auch „Geist der Wüste“ genannt. Da seine\nflatternden Flügel eine Sandwolke aufwirbeln, ist dieses\nPokémon beim Fliegen immer von einem Sandsturm umgeben."
          alpha_sapphire: "Libelldra wirbelt einen Sandsturm auf, wenn es mit den\nFlügeln schlägt. Seine Flügel erzeugen dabei Töne, die wie\nGesang klingen. Da dieser „Gesang“ das Einzige ist, was man\nin einem Sandsturm hört, wird es auch Wüstengeist genannt."
        es:
          omega_ruby: "A Flygon se le conoce como el Espíritu del Desierto. Al volar,\ncomo levanta una nube de arena al batir las alas, está siempre\nenvuelto en una tormenta de arena."
          alpha_sapphire: "Flygon puede provocar una tormenta de arena batiendo las\nalas. Estas, al ser agitadas, crean una melodía. Y, como las\n“melodías” pueden oírse cuando hay tormenta, dicen que es\nel espíritu del desierto."
        ko:
          omega_ruby: "사막의 정령이라 불리는 포켓몬이다.\n날갯짓이 모래를 흩날리기 때문에\n언제나 모래바람 속에서 날고 있다."
          alpha_sapphire: "날갯짓으로 일으키는 모래바람 속에서\n노랫소리 같은 날갯소리만이 들리기 때문에\n플라이곤은 사막의 정령이라고 전해졌다."
cacnea:
  species_id: 331
  names:
    jp_kana: サボネア
    jp_kanji: サボネア
    en: Cacnea
    fr: Cacnea
    it: Cacnea
    de: Tuska
    es: Cacnea
    ko: 선인왕
  forms:
    cacnea:
      form_id: 0
      base_stats:
        hp: 50
        attack: 85
        defense: 40
        special_attack: 85
        special_defense: 40
