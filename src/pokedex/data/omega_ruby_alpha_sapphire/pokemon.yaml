          alpha_sapphire: "一度　暴れ始めると　すべてを　燃やさないと\n凶暴な　血が　収まらなく　なってしまう。\nひと月　暴れ続けた　記録が　残る。"
        en:
          omega_ruby: "When Magikarp evolves into Gyarados, its brain cells undergo a\nstructural transformation. It is said that this transformation is to\nblame for this Pokémon’s wildly violent nature."
          alpha_sapphire: "Once Gyarados goes on a rampage, its ferociously violent\nblood doesn’t calm until it has burned everything down.\nThere are records of this Pokémon’s rampages lasting a\nwhole month."
        fr:
