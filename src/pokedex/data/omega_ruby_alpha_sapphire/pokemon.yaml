        speed: 0
      types:
        - dragon
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "みた　ものや　かんがえた　イメージを　あいてに\nえいぞうとして　みせる　のうりょくを　もつ。\nにんげんの　ことばを　りかいすることが　できる。"
          alpha_sapphire: "やさしい　こころの　もちぬしにしか　なつかない。\nうでを　おりたたむと　くうきていこうが　へって\nジェットき　よりも　はやく　そらを　とべるぞ。"
        jp_kanji:
          omega_ruby: "見た　ものや　考えた　イメージを　相手に\n映像として　見せる　能力を　持つ。\n人間の　言葉を　理解することが　できる。"
          alpha_sapphire: "優しい　心の　持ち主にしか　なつかない。\n腕を　折り畳むと　空気抵抗が　減って\nジェット機　よりも　速く　空を　飛べるぞ。"
        en:
          omega_ruby: "Latios has the ability to make others see an image of what it\nhas seen or imagines in its head. This Pokémon is intelligent\nand understands human speech."
          alpha_sapphire: "Latios will only open its heart to a Trainer with a\ncompassionate spirit. This Pokémon can fly faster than a\njet plane by folding its forelegs to minimize air resistance."
        fr:
          omega_ruby: "Latios a le pouvoir de faire voir à une personne une image\nprovenant de son subconscient. Ce Pokémon est intelligent\net comprend le langage humain."
          alpha_sapphire: "Latios n’ouvrira son cœur qu’à un Dresseur doté d’un esprit\ncompatissant. Ce Pokémon peut voler plus vite qu’un avion\nà réaction en repliant ses pattes avant pour améliorer\nson aérodynamisme."
        it:
          omega_ruby: "Latios ha l’abilità di far vedere agli altri l’immagine di ciò che\nha visto o immaginato nella propria testa. Questo Pokémon\nè intelligente e capisce il linguaggio umano."
          alpha_sapphire: "Latios apre il proprio cuore ad Allenatori d’animo buono\ne generoso. Il Pokémon riesce a volare più veloce di un\naereo a reazione, piegando le zampe anteriori per minimizzare\nl’attrito dell’aria."
        de:
          omega_ruby: "Latios kann seinem Gegenüber ein Bild von etwas, das es\neinmal gesehen hat, in den Kopf projizieren. Dieses Pokémon\nist intelligent und es versteht die menschliche Sprache."
          alpha_sapphire: "Latios schüttet nur seinem Trainer gegenüber sein Herz aus.\nDieses Pokémon fliegt schneller als ein Flugzeug, indem es\nseine Vorderbeine einklappt, um den Luftwiderstand zu\nverringern."
        es:
          omega_ruby: "Latios tiene la habilidad de hacer que los demás vean algo que\nél ha visto o imaginado. Este Pokémon es muy inteligente. Es\ncapaz de entender el lenguaje humano."
          alpha_sapphire: "Latios solo le abre el corazón a los Entrenadores compasivos.\nA la hora de volar, este Pokémon pliega las patas delanteras\npara minimizar la resistencia al aire y supera en velocidad a un\navión a reacción."
        ko:
          omega_ruby: "본 것이나 생각한 이미지를 상대에게\n영상으로 보여주는 능력을 지녔다.\n인간의 말을 이해할 수 있다."
          alpha_sapphire: "상냥한 마음씨를 가진 자만을 따른다.\n팔을 접으면 공기저항이 줄어\n제트기보다 빠르게 하늘을 난다."
