          alpha_sapphire: "ほしの　ばしょや　うごきから\nみらいの　できごとを　よちする。\nトレーナーの　じゅみょうも　みえる。"
        jp_kanji:
          omega_ruby: "強力な　サイコパワーの　影響で\nゴチルゼルの　周囲の　空間が　ねじれ\n何万光年も　遠くの　星空が　映る。"
          alpha_sapphire: "星の　配置や　動きから　未来の\nできごとを　予知する　能力を　持つ。\nトレーナーの　寿命も　見える。"
        en:
          omega_ruby: "Starry skies thousands of light-years away are\nvisible in the space distorted by their intense\npsychic power."
          alpha_sapphire: "They can predict the future from the placement and\nmovement of the stars. They can see Trainers’\nlife spans."
        fr:
          omega_ruby: "Ses pouvoirs psychiques plient l’espace aux alentours.\nOn y voit des étoiles éloignées de millions d’années-lumière."
          alpha_sapphire: "Prédit l’avenir à partir de la position et du mouvement\ndes étoiles. Perçoit aussi l’espérance de vie des Dresseurs."
        it:
          omega_ruby: "I suoi forti poteri psichici modificano lo spazio circostante\nrendendo visibili galassie lontane milioni di anni luce."
          alpha_sapphire: "Prevede il futuro dalla posizione e dal movimento delle stelle.\nConosce anche la durata della vita dell’Allenatore."
        de:
          omega_ruby: "Durch seine mächtigen Psycho-Kräfte krümmt sich der Raum\nund Bilder eines Lichtjahre entfernten Ortes erscheinen."
          alpha_sapphire: "Kann anhand der Sternenkonstellationen die Zukunft\nvoraussagen. Es weiß sogar, wie alt sein Trainer werden wird."
        es:
          omega_ruby: "Su inmenso poder psíquico distorsiona el espacio y le permite\nreflejar incluso estrellas a años luz de distancia."
          alpha_sapphire: "Predice el futuro analizando la posición de los astros y\nsu movimiento. Conoce la esperanza de vida de los\nEntrenadores."
        ko:
          omega_ruby: "강력한 사이코 파워의 영향으로\n고디모아젤 주변 공간이 비틀어져\n몇만 광년이나 떨어진 하늘의 별이 비친다."
          alpha_sapphire: "별의 배치나 움직임으로 미래의\n일을 예지하는 능력을 가지고 있다.\n트레이너의 수명도 알 수 있다."
solosis:
  species_id: 577
