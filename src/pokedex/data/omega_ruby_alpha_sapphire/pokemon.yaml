      descriptions:
        jp_kana:
          omega_ruby: "うみの　おんどが　たかくなると\nあたまの　うきぶくろを　ふくらませて\nかいめんを　しゅうだんで　ただよう。"
          alpha_sapphire: "あたたかい　うみを　ただよっている。\nどんな　とおくに　ながされても\nうまれた　ばしょに　かならずもどる。"
        jp_kanji:
          omega_ruby: "海の　温度が　高くなると\n頭の　浮き袋を　ふくらませて\n海面を　集団で　漂う。"
          alpha_sapphire: "暖かい　海を　漂っている。\nどんな　遠くに　流されても\n生まれた　場所に　かならず戻る。"
        en:
          omega_ruby: "When the water warms, they inflate the flotation sac\non their heads and drift languidly on the sea\nin packs."
          alpha_sapphire: "It drifts in warm seas. It always returns to where it\nwas born, no matter how far it may have drifted."
        fr:
          omega_ruby: "Il gonfle la bouée de sa tête et se laisse flotter à la surface\nquand la mer se réchauffe."
          alpha_sapphire: "Ce Pokémon des mers chaudes revient toujours à son lieu\nde naissance, peu importe la distance."
        it:
          omega_ruby: "Quando la temperatura del mare si alza, gonfia il galleggiante\nche ha in testa e fluttua in gruppo."
          alpha_sapphire: "Si sposta nei mari caldi. Torna sempre dove è nato, anche se\nsi trova molto lontano."
        de:
          omega_ruby: "Steigt die Meerestemperatur, bläst es seinen Schwimmbeutel\nauf und treibt in Schwärmen auf dem Wasser."
          alpha_sapphire: "Lässt sich in warmen Meeren treiben, kehrt aber immer\nan den Platz seiner Geburt zurück."
        es:
          omega_ruby: "Si sube la temperatura del mar, infla el flotador de su cabeza\ny flota en grupo en la superficie."
          alpha_sapphire: "Va a la deriva por mares cálidos. Siempre vuelve a donde\nnació, por mucho que se haya alejado."
        ko:
          omega_ruby: "바다 온도가 높아지면\n머리의 부낭을 부풀려서\n해수면을 집단으로 떠돈다."
          alpha_sapphire: "따뜻한 바다를 떠돌고 있다.\n아무리 먼 곳으로 흘러가도\n태어난 장소로 반드시 돌아온다."
