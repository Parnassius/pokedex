      descriptions:
        jp_kana:
          omega_ruby: "とても　わすれっぽい　ポケモンで\nトレーナーに　めいれい　されたのに\nあたらしい　めいれいを　まっている。"
          alpha_sapphire: "まちなかで　くらしている　ポケモン。\nひとなつっこいので　こうえんや\nひろばに　たくさん　あつまってくる。"
        jp_kanji:
          omega_ruby: "とても　忘れっぽい　ポケモンで\nトレーナーに　命令　されたのに\n新しい　命令を　待っている。"
          alpha_sapphire: "街中で　暮らしている　ポケモン。\n人懐っこいので　公園や　広場に\nたくさん　集まってくる。"
        en:
          omega_ruby: "This very forgetful Pokémon will wait for a new\norder from its Trainer even though it already\nhas one."
          alpha_sapphire: "These Pokémon live in cities. They are accustomed\nto people. Flocks often gather in parks and plazas."
        fr:
          omega_ruby: "Un Pokémon très distrait qui oublie les ordres de son Dresseur\net reste planté à en attendre de nouveaux."
          alpha_sapphire: "Ces Pokémon vivent en ville. Ils sont peu farouches\net se regroupent souvent dans les parcs ou sur les places."
        it:
          omega_ruby: "È un Pokémon un po’ smemorato. A volte dimentica l’ordine\nappena ricevuto e allora aspetta di riceverne un altro."
          alpha_sapphire: "Pokémon che vive in città. Si affeziona facilmente alle persone,\nperciò non è strano trovarlo in parchi o piazze."
        de:
          omega_ruby: "Wartet oft vergeblich auf Anweisungen, obwohl es bereits\neinen Befehl erhalten hat. Ein sehr zerstreutes Pokémon."
          alpha_sapphire: "Ein Pokémon, das in der Stadt zu Hause ist. Es ist sehr\nzutraulich und bevölkert in Scharen öffentliche Plätze\nund Parks."
        es:
          omega_ruby: "Es un Pokémon muy despistado. Aunque reciba órdenes de\nsu Entrenador, se le olvidan, y se queda esperando."
          alpha_sapphire: "Vive en la ciudad, pues se lleva muy bien con la gente. Le\nencantan los parques y las plazas, donde se reúne con otros."
        ko:
          omega_ruby: "매우 건망증이 심한 포켓몬으로\n트레이너에게 명령을 받았어도\n새로운 명령을 기다리고 있다."
          alpha_sapphire: "거리에 사는 포켓몬이다.\n사람을 잘 따라서 공원이나\n광장에 많이 모인다."
tranquill:
  species_id: 520
