emolga:
  species_id: 587
  names:
    jp_kana: エモンガ
    jp_kanji: エモンガ
    en: Emolga
    fr: Emolga
    it: Emolga
    de: Emolga
    es: Emolga
    ko: 에몽가
  forms:
    emolga:
      form_id: 0
      base_stats:
        hp: 55
        attack: 75
        defense: 60
        special_attack: 75
        special_defense: 60
        speed: 103
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
        - flying
      egg_groups:
        - field
      abilities:
        - static
      hidden_ability: motor_drive
      descriptions:
        jp_kana:
          omega_ruby: "もりの　きのうえで　くらす。\nマントのような　まくの　うちがわを\nほうでん　させながら　かっくうする。"
          alpha_sapphire: "ほほの　でんきぶくろで　つくった\nでんきを　まくの　うちがわに　ためて\nかっくうしながら　でんきを　はなつ。"
        jp_kanji:
          omega_ruby: "森の　木の上で　暮らす。\nマントのような　膜の　内側を\n放電　させながら　滑空する。"
          alpha_sapphire: "ほほの　電気袋で　作った　電気を\n膜の　内側に　ためて\n滑空しながら　電気を　放つ。"
        en:
          omega_ruby: "They live on treetops and glide using the inside of\na cape-like membrane while discharging electricity."
          alpha_sapphire: "The energy made in its cheeks’ electric pouches is\nstored inside its membrane and released while it\nis gliding."
        fr:
          omega_ruby: "Il vit au sommet des arbres de la forêt. Il plane en déchargeant\nl’électricité de ses membranes semblables à une cape."
          alpha_sapphire: "Il accumule dans ses membranes l’électricité qu’il produit\ndans ses bajoues, et la relâche tout en planant."
        it:
          omega_ruby: "Vive nelle foreste sulle cime degli alberi. Plana usando\nuna membrana simile a un mantello, elettrificata all’interno."
          alpha_sapphire: "Accumula nelle membrane l’elettricità che produce all’interno\ndelle guance, poi la rilascia planando."
        de:
          omega_ruby: "Lebt in den Wipfeln der Waldbäume. Während es durch die\nLüfte gleitet, entlädt es Strom aus seinen Fluglappen."
          alpha_sapphire: "Im Flug entlädt es Strom, den es mit seinen Backentaschen\nerzeugt und in seinen Fluglappen gespeichert hat."
        es:
          omega_ruby: "Vive en la copa de los árboles. Produce descargas mientras\nvuela con el interior de la membrana que hace de capa."
          alpha_sapphire: "Almacena en una membrana la electricidad generada por sus\nmejillas y planea por los aires soltando descargas."
        ko:
          omega_ruby: "숲의 나무 위에 산다.\n망토 같은 막의 안쪽을\n방전시키며 활공한다."
          alpha_sapphire: "볼의 전기 주머니에서 만든\n전기를 막 안쪽에 모아\n활공하며 전기를 발산한다."
karrablast:
  species_id: 588
  names:
    jp_kana: カブルモ
    jp_kanji: カブルモ
    en: Karrablast
    fr: Carabing
    it: Karrablast
    de: Laukaps
    es: Karrablast
    ko: 딱정곤
