          alpha_sapphire: "Scyther is blindingly fast. Its blazing speed enhances the\neffectiveness of the twin scythes on its forearms. This\nPokémon’s scythes are so effective, they can slice through\nthick logs in one wicked stroke."
        fr:
          omega_ruby: "Insécateur est incroyablement rapide. Sa vitesse fulgurante\naméliore l’efficacité des deux lames situées sur ses avant-bras.\nElles sont si coupantes qu’elles peuvent trancher un énorme\ntronc d’arbre en un coup."
          alpha_sapphire: "Insécateur est incroyablement rapide. Sa vitesse fulgurante\naméliore l’efficacité des deux lames situées sur ses avant-bras.\nElles sont si coupantes qu’elles peuvent trancher un énorme\ntronc d’arbre en un coup."
        it:
          omega_ruby: "Scyther è veloce come una saetta. La sua rapidità migliora\nl’efficacia delle due falci sulle zampe anteriori.\nInfatti riesce a tranciare con un colpo secco persino\nun tronco secolare."
          alpha_sapphire: "Scyther è veloce come una saetta. La sua rapidità migliora\nl’efficacia delle due falci sulle zampe anteriori.\nInfatti riesce a tranciare con un colpo secco persino\nun tronco secolare."
        de:
          omega_ruby: "Sichlor ist unheimlich schnell. Dadurch werden die beiden\nSensen an seinen Unterarmen noch effektiver. Dieses\nPokémon kann mit seinen Sensen in Sekundenschnelle\nBaumstämme zerteilen."
          alpha_sapphire: "Sichlor ist unheimlich schnell. Dadurch werden die beiden\nSensen an seinen Unterarmen noch effektiver. Dieses\nPokémon kann mit seinen Sensen in Sekundenschnelle\nBaumstämme zerteilen."
        es:
          omega_ruby: "Es espectacular ver lo rápido que es Scyther. Su increíble\nvelocidad refuerza el efecto del par de guadañas que tiene\nen los brazos, que ya son de por sí contundentes; rebanan\ngruesos troncos de un tajo."
          alpha_sapphire: "Es espectacular ver lo rápido que es Scyther. Su increíble\nvelocidad refuerza el efecto del par de guadañas que tiene\nen los brazos, que ya son de por sí contundentes; rebanan\ngruesos troncos de un tajo."
