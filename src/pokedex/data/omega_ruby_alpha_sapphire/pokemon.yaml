          alpha_sapphire: "ゴミを　すいとっては　たいないで\nあたらしい　しゅるいの　どくガスや\nどくの　えきたいを　うみだしている。"
        jp_kanji:
          omega_ruby: "左腕で　相手を　絞めつけて\n口から　吐き出す　悪臭の　毒ガスで\nとどめを　刺すのだ。"
          alpha_sapphire: "ゴミを　吸いとっては　体内で\n新しい　種類の　毒ガスや\n毒の　液体を　生みだしている。"
        en:
          omega_ruby: "It clenches opponents with its left arm and finishes\nthem off with foul-smelling poison gas belched from\nits mouth."
          alpha_sapphire: "Consuming garbage makes new kinds of poison\ngases and liquids inside their bodies."
        fr:
          omega_ruby: "Il étrangle ses ennemis avec son bras gauche et les achève\navec le gaz puant et empoisonné qu’il exhale par la bouche."
          alpha_sapphire: "Il aspire les déchets et les intègre à son corps pour produire\ndes gaz et des fluides toxiques."
        it:
          omega_ruby: "Serra l’avversario con l’arto sinistro e gli dà il colpo di grazia\nesalando dalla bocca un fetido gas velenoso."
          alpha_sapphire: "Assorbe la spazzatura nel suo corpo per creare dei liquidi\nvelenosi e dei gas tossici sempre nuovi."
        de:
          omega_ruby: "Es nimmt mit dem rechten Arm Gegner in die Mangel und\ngibt ihnen mit dem giftigen Gas aus seinem Maul den Rest."
          alpha_sapphire: "Jedes Mal, wenn es frischen Müll in sich aufsaugt, erzeugt es\nvöllig neue Formen von Giftgasen und Toxinen."
        es:
          omega_ruby: "Apresa a su rival con el brazo izquierdo y le da el golpe de\ngracia exhalando por la boca un apestoso gas venenoso."
          alpha_sapphire: "Absorbe y procesa en su interior basura para generar nuevos\ngases nocivos y líquidos venenosos de alta virulencia."
        ko:
          omega_ruby: "왼팔로 상대를 꼭 붙들고\n입에서 악취가 나는 독가스를\n토해내서 마무리한다."
          alpha_sapphire: "쓰레기를 흡수해서 체내에서\n새로운 종류의 독가스나\n독의 액체를 만들어낸다."
zorua:
