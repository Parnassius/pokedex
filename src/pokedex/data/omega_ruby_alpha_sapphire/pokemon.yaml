          alpha_sapphire: "あたまの　ふさに　ためた　みずは\nえいよう　たっぷり。しょくぶつに\nかけると　おおきく　そだつのだ。"
        jp_kanji:
          omega_ruby: "頭の房に　ためこんだ　水は\n栄養　たっぷり。尻尾を使って\nその　水を　草木に　かけている。"
          alpha_sapphire: "頭の　ふさに　ためた　水は\n栄養　たっぷり。\n植物に　かけると　大きく　育つのだ。"
        en:
          omega_ruby: "The water stored inside the tuft on its head is full\nof nutrients. It waters plants with it using its tail."
          alpha_sapphire: "The water stored inside the tuft on its head is full of\nnutrients. Plants that receive its water grow large."
        fr:
          omega_ruby: "Sa houppette est chargée d’eau et de nutriments.\nIl nourrit les plantes et les arbres avec sa queue."
          alpha_sapphire: "L’eau contenue dans la mèche sur sa tête est pleine\nde nutriments. Elle fait pousser les plantes avec vigueur."
        it:
          omega_ruby: "L’acqua contenuta nel suo ciuffo è ricca di nutrienti e la usa\nper annaffiare le piante con la coda."
          alpha_sapphire: "L’acqua accumulata nel ciuffo è ricca di nutrimento e fa\ncrescere rigogliose le piante che ne vengono annaffiate."
        de:
          omega_ruby: "Das Büschel auf seinem Kopf enthält eine sehr nahrhafte\nFlüssigkeit, mit der es über seinen Schweif Pflanzen wässert."
          alpha_sapphire: "Das Wasser, das es im Büschel auf seinem Kopf sammelt,\nist äußerst nahrhaft und verhilft Pflanzen zu großem Wachstum."
        es:
          omega_ruby: "El agua acumulada en su mata de pelo es rica en nutrientes.\nUsa su cola para regar plantas con esa misma agua."
          alpha_sapphire: "La acuosidad que acumula en su mata de pelo es rica en\nnutrientes, ideal para regar plantas y que crezcan mucho."
        ko:
          omega_ruby: "머리 송아리에 모은 물은\n영양 듬뿍. 꼬리를 사용해서\n그 물을 초목에 뿌린다."
          alpha_sapphire: "머리의 송아리에 모은 물은\n영양이 가득하다. 식물에\n뿌려주면 크게 자란다."
