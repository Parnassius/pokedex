duskull:
  species_id: 355
  names:
    jp_kana: ヨマワル
    jp_kanji: ヨマワル
    en: Duskull
    fr: Skelénox
    it: Duskull
    de: Zwirrlicht
    es: Duskull
    ko: 해골몽
  forms:
    duskull:
      form_id: 0
      base_stats:
        hp: 20
        attack: 40
        defense: 90
        special_attack: 30
        special_defense: 90
        speed: 25
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      hidden_ability: frisk
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          omega_ruby: "どんなに　あつい　カベも　とおりぬける。\nねらわれたら　さいご　あさひが　のぼるまで\nずっと　おいかけられる　ことに　なるぞ。"
          alpha_sapphire: "まよなか　やみに　まぎれて　さまよっている。\nママに　しかられるような　わるいこは　ヨマワルに\nさらわれるという　いいつたえが　のこっている。"
        jp_kanji:
          omega_ruby: "どんなに　厚い　カベも　通り抜ける。\nねらわれたら　最後　朝日が　登るまで\nずっと　追いかけられる　ことに　なるぞ。"
          alpha_sapphire: "真夜中　闇に　紛れて　さまよっている。\nママに　しかられるような　悪い子は　ヨマワルに\nさらわれるという　言い伝えが　残っている。"
        en:
          omega_ruby: "Duskull can pass through any wall no matter how thick it may\nbe. Once this Pokémon chooses a target, it will doggedly\npursue the intended victim until the break of dawn."
          alpha_sapphire: "Duskull wanders lost among the deep darkness of midnight.\nThere is an oft-told admonishment given to misbehaving\nchildren that this Pokémon will spirit away bad children who\nearn scoldings from their mothers."
        fr:
          omega_ruby: "Skelénox peut traverser n’importe quel mur, même le plus\népais. Une fois que ce Pokémon a choisi une cible,\nil la pourchasse sans relâche jusqu’à l’aube."
          alpha_sapphire: "Skelénox erre seul dans l’obscurité de la nuit. On fait souvent\npeur aux enfants en leur disant que ce Pokémon viendra\nles chercher s’ils n’obéissent pas à leur maman."
        it:
          omega_ruby: "Duskull riesce a passare attraverso i muri indipendentemente\ndal loro spessore. Una volta scelto un bersaglio perseguita\nla vittima designata fino all’alba."
          alpha_sapphire: "Duskull vaga come un’anima persa nella tetra oscurità\nnotturna. Spesso ai bimbi capricciosi si dice che questo\nPokémon si porta via i bambini che fanno arrabbiare la mamma."
        de:
          omega_ruby: "Zwirrlicht kann durch jede Wand gehen, egal, wie dick diese\nist. Wenn dieses Pokémon sich ein Ziel gesucht hat, verfolgt\nes seinen Feind unnachgiebig bis zum Sonnenaufgang."
          alpha_sapphire: "Zwirrlicht wandert verloren durch die tiefe Dunkelheit\nder Nacht. Kinder werden oft ermahnt, dass dieses\nPokémon böse Kinder wegzaubert, die von ihren\nMüttern ausgeschimpft worden sind."
        es:
          omega_ruby: "Duskull puede atravesar los muros, sea cual sea el grosor que\ntengan. Cuando este Pokémon elige su objetivo, lo persigue\nhábilmente hasta el amanecer."
          alpha_sapphire: "Duskull vaga perdido por la oscuridad de la noche. Cuando\nlos niños se portan mal y desobedecen a sus padres, se les\ndice que este Pokémon aparecerá y se los llevará con él."
        ko:
          omega_ruby: "아무리 두꺼운 벽이라도 통과한다.\n한 번 노려지면 아침 해가 뜰 때까지\n계속 쫓겨 다니게 된다."
          alpha_sapphire: "한밤중 어둠에 섞여 떠돌고 있다.\n엄마에게 꾸중을 듣는 나쁜 아이는\n해골몽이 잡아간다는 전설이 남아 있다."
dusclops:
  species_id: 356
  names:
    jp_kana: サマヨール
    jp_kanji: サマヨール
    en: Dusclops
    fr: Téraclope
    it: Dusclops
    de: Zwirrklop
    es: Dusclops
    ko: 미라몽
  forms:
    dusclops:
      form_id: 0
      base_stats:
        hp: 40
        attack: 70
        defense: 130
        special_attack: 60
        special_defense: 130
        speed: 25
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - pressure
      hidden_ability: frisk
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          omega_ruby: "からだの　なかみは　くうどうで　なにも　ない。\nブラックホールの　ように　なんでも　すいこみ\nすいこまれると　もどって　これないと　いわれる。"
          alpha_sapphire: "どんな　おおきさの　ものも　すいこんで　しまう。\nあやしげな　ての　うごきと　ひとつめの　ちからで\nあいてを　さいみん　じょうたいにして　あやつる。"
        jp_kanji:
          omega_ruby: "体の　中身は　空洞で　なにも　ない。\nブラックホールの　ように　なんでも　吸い込み\n吸い込まれると　戻って　これないと　いわれる。"
          alpha_sapphire: "どんな　大きさの　ものも　吸いこんで　しまう。\n怪しげな　手の　動きと　一つ目の　力で\n相手を　催眠　状態にして　操る。"
        en:
          omega_ruby: "Dusclops’s body is completely hollow—there is nothing at all\ninside. It is said that its body is like a black hole. This\nPokémon will absorb anything into its body, but nothing will\never come back out."
          alpha_sapphire: "Dusclops absorbs anything, however large the object may be.\nThis Pokémon hypnotizes its foe by waving its hands in a\nmacabre manner and by bringing its single eye to bear.\nThe hypnotized foe is made to do Dusclops’s bidding."
        fr:
          omega_ruby: "Le corps de Téraclope est totalement creux. Il n’y a rien\ndu tout à l’intérieur. On raconte que son corps est comme\nun trou noir. Ce Pokémon peut absorber n’importe quoi,\nmais rien n’en ressort jamais."
          alpha_sapphire: "Téraclope peut absorber des objets de toute taille.\nCe Pokémon hypnotise son ennemi en faisant des gestes\nmacabres et en attirant l’attention sur son unique œil.\nL’ennemi hypnotisé obéit ensuite aux ordres de Téraclope."
        it:
          omega_ruby: "Il corpo di Dusclops è completamente vuoto. Non contiene\nassolutamente nulla. Infatti si dice che sia una sorta di\nbuco nero. Il Pokémon assorbe ogni cosa all’interno del\nproprio corpo, ma non rilascia mai nulla."
          alpha_sapphire: "Dusclops assorbe qualsiasi cosa indipendentemente dalle sue\ndimensioni. Questo Pokémon ipnotizza il nemico con un\nmacabro movimento delle mani e con il suo unico occhio,\ncostringendolo a eseguire i suoi ordini."
        de:
          omega_ruby: "Zwirrklops Körper ist komplett hohl. Es wird auch mit einem\nSchwarzen Loch verglichen. Dieses Pokémon nimmt alles\nin seinem Körper auf, es kommt jedoch nichts wieder heraus."
          alpha_sapphire: "Zwirrklop absorbiert alles, egal, wie groß es auch sein mag.\nDieses Pokémon hypnotisiert seinen Gegner, indem es auf\nmakabre Weise winkt und sein einziges Auge zeigt.\nDer hypnotisierte Gegner führt dann seine Befehle aus."
        es:
          omega_ruby: "Dusclops está completamente hueco por dentro. Dicen que su\ncuerpo es como un agujero negro. Este Pokémon es capaz de\nabsorber cualquier cosa, pero cosa que absorba, cosa que no\ndejará salir nunca más."
          alpha_sapphire: "Dusclops absorbe todo lo que pilla, al margen del tamaño que\ntenga. Este Pokémon hipnotiza a su rival moviendo las manos\nde forma macabra y usando el ojo de manera implacable.\nUna vez hipnotizado, el enemigo obedecerá."
        ko:
          omega_ruby: "몸 안에는 텅 비어서 아무것도 없다.\n블랙홀처럼 무엇이든 빨아들이며\n빨려 들어가면 되돌아 올 수 없다고 전해진다."
          alpha_sapphire: "아무리 큰 것도 빨아들인다.\n괴상한 손의 움직임과 외눈의 힘으로\n상대를 최면 상태로 만들어 조종한다."
tropius:
  species_id: 357
  names:
    jp_kana: トロピウス
    jp_kanji: トロピウス
    en: Tropius
    fr: Tropius
    it: Tropius
    de: Tropius
    es: Tropius
    ko: 트로피우스
  forms:
    tropius:
      form_id: 0
      base_stats:
        hp: 99
        attack: 68
        defense: 83
        special_attack: 72
        special_defense: 87
        speed: 51
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - flying
      egg_groups:
        - monster
        - grass
      abilities:
        - chlorophyll
        - solar_power
      hidden_ability: harvest
      descriptions:
        jp_kana:
          omega_ruby: "くびの　フサは　あまくて　こどもに　だいにんき。\nくだものが　だいこうぶつで　たべつづけて　いたら\nくびに　くだものが　できるように　なったらしい。"
          alpha_sapphire: "なんごくの　こどもたちは　トロピウスの　くびに\nなった　くだものの　フサを　おやつに　たべるよ。\nせなかの　はっぱを　はばたかせて　そらを　とぶ。"
        jp_kanji:
          omega_ruby: "首の　フサは　甘くて　子どもに　大人気。\n果物が　大好物で　食べ続けて　いたら\n首に　果物が　できるように　なったらしい。"
          alpha_sapphire: "南国の　子どもたちは　トロピウスの　首に\nなった　果物の　フサを　おやつに　食べるよ。\n背中の　葉っぱを　羽ばたかせて　空を　飛ぶ。"
        en:
          omega_ruby: "The bunches of fruit around Tropius’s neck are very popular\nwith children. This Pokémon loves fruit, and eats it\ncontinuously. Apparently, its love for fruit resulted in its own\noutgrowth of fruit."
          alpha_sapphire: "Children of the southern tropics eat as snacks the fruit that\ngrows in bunches around the neck of Tropius. This Pokémon\nflies by flapping the leaves on its back as if they were wings."
        fr:
          omega_ruby: "Les enfants adorent les fruits autour du cou de Tropius.\nApparemment, son penchant pour les fruits l’a conduit\nà en faire pousser sur son propre corps. Il les aime tant\nqu’il en mange sans arrêt."
          alpha_sapphire: "Les enfants des tropiques mangent les fruits qui poussent\nautour du cou de Tropius pour leur goûter. Ce Pokémon\npeut voler en agitant les feuilles situées sur son dos,\ncomme s’il s’agissait d’ailes."
        it:
          omega_ruby: "Tutti i bambini conoscono i grappoli di frutti penzolanti attorno\nal collo di Tropius. Anche il Pokémon stesso ne mangia\nin continuazione. Pare che il suo amore per la frutta sia\nall’origine del fatto che egli stesso la produca."
          alpha_sapphire: "I bambini dei tropici meridionali fanno merenda coi frutti che\ncrescono a grappoli attorno al collo di Tropius. Questo\nPokémon vola agitando le foglie sulla schiena come\nse fossero ali."
        de:
          omega_ruby: "Die Früchte am Hals von Tropius sind bei Kindern sehr\nbeliebt. Dieses Pokémon liebt Früchte und isst sie ständig.\nOffensichtlich sind ihm wegen dieser Vorliebe selbst Früchte\ngewachsen."
          alpha_sapphire: "Kinder aus den südlichen Tropen essen die Früchte,\ndie am Hals von Tropius hängen, als Zwischenmahlzeit.\nDieses Pokémon kann fliegen, indem es mit den Blättern\nauf seinem Rücken schlägt, als ob es Flügel wären."
        es:
          omega_ruby: "A los niños les encantan los racimos de fruta que Tropius tiene\nen el cuello. Este Pokémon siempre come fruta; le encanta.\nDe hecho, ese parece ser el motivo por el que él mismo da\nfruta."
          alpha_sapphire: "Los niños de la zona sur de los trópicos se comen los racimos\nde fruta que le crecen a Tropius alrededor del cuello. Este\nPokémon vuela batiendo las hojas que tiene en el lomo como\nsi fueran alas."
        ko:
          omega_ruby: "목에 난 송이는 달콤해서 아이들에게 인기가 많다.\n과일을 매우 좋아하여 계속 먹다 보니\n목에 과일이 열리게 됐다고 한다."
          alpha_sapphire: "남쪽 나라의 아이들은 트로피우스의 목에\n난 과일 송이를 간식으로 먹는다.\n등의 잎사귀를 펄럭거려 하늘을 난다."
