          alpha_sapphire: "ユクシー　エムリット　アグノムは\nおなじ　タマゴから　うまれた\nポケモンと　かんがえられている。"
        jp_kanji:
          omega_ruby: "意思の神と　呼ばれている。\n湖の　底で　眠り続け\n世界の　バランスを　とっている。"
          alpha_sapphire: "ユクシー　エムリット　アグノムは\n同じ　タマゴから　生まれた\nポケモンと　考えられている。"
        en:
          omega_ruby: "Known as “The Being of Willpower.” It sleeps at the\nbottom of a lake to keep the world in balance."
          alpha_sapphire: "It is thought that Uxie, Mesprit, and Azelf all came\nfrom the same egg."
        fr:
          omega_ruby: "On l’appelle « être de la volonté ». Il dort au fond d’un lac\npour maintenir l’équilibre du monde."
          alpha_sapphire: "On raconte que Créhelf, Créfollet et Créfadet proviennent\ndu même Œuf."
        it:
          omega_ruby: "Detto “Essere della volontà”. Dorme sul fondo di un lago per\nmantenere il mondo in equilibrio."
          alpha_sapphire: "Pare che Uxie, Mesprit e Azelf abbiano avuto origine dallo\nstesso uovo."
        de:
          omega_ruby: "„Das starke Wesen“. Es schläft auf dem Grund eines Sees und\nhält so die Welt in Balance."
          alpha_sapphire: "Man glaubt, dass Selfe, Vesprit und Tobutz alle aus demselben\nEi kamen."
        es:
          omega_ruby: "Se le conoce como el Ser de la Voluntad. Duerme en el fondo\nde un lago para equilibrar el mundo."
          alpha_sapphire: Se cree que Uxie, Mesprit y Azelf provienen del mismo huevo.
        ko:
          omega_ruby: "의지의 신이라 불리고 있다.\n호수의 밑바닥에서 계속 잠을 자며\n세계의 균형을 지키고 있다."
          alpha_sapphire: "유크시, 엠라이트, 아그놈은\n같은 알에서 태어난\n포켓몬이라 여겨지고 있다."
