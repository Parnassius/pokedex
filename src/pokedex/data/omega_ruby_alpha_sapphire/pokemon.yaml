      descriptions:
        jp_kana:
          omega_ruby: "おしりの　ほのおは　おなかで\nつくられた　ガスが　ねんりょう。\nあめに　ぬれても　きえない。"
          alpha_sapphire: "おなかで　つくられた　ガスが\nおしりで　もえている。たいちょうが\nわるいと　ほのおが　よわくなる。"
        jp_kanji:
          omega_ruby: "お尻の　炎は\nお腹で　作られた　ガスが　燃料。\n雨に　ぬれても　消えない。"
          alpha_sapphire: "お腹で　作られた　ガスが\nお尻で　燃えている。体調が　悪いと\n炎が　弱くなる。"
        en:
          omega_ruby: "Its fiery rear end is fueled by gas made in its belly.\nEven rain can’t extinguish the fire."
          alpha_sapphire: "The gas made in its belly burns from its rear end.\nThe fire burns weakly when it feels sick."
        fr:
          omega_ruby: "La flamme de sa queue est alimentée par un gaz de\nson estomac. Même la pluie ne saurait l’éteindre."
          alpha_sapphire: "La flamme de son postérieur brûle grâce à un gaz de son\nestomac. Elle faiblit quand il ne va pas bien."
        it:
          omega_ruby: "Le fiamme sulla coda, alimentate dai gas della pancia,\nnon si spengono neppure quando piove."
          alpha_sapphire: "Le fiamme sulla coda sono alimentate dal gas della pancia.\nSi affievoliscono quando sta male."
        de:
          omega_ruby: "Das Feuer an seinem Hinterteil wird durch Gase im Bauch\ngenährt. Selbst Regen löscht es nicht."
          alpha_sapphire: "An seinem Rücken verbrennt es die Gase aus seinem\nBauch. Geht es ihm schlecht, leuchtet es weniger hell."
        es:
          omega_ruby: "El gas de su panza alimenta el fuego de su parte trasera, que\nni la lluvia puede extinguir."
          alpha_sapphire: "El fuego que arde en su cola lo generan los gases de su\nestómago y disminuye cuando está débil."
        ko:
          omega_ruby: "엉덩이의 불꽃은 배에서\n만들어진 가스가 연료다.\n비에 젖어도 꺼지지 않는다."
          alpha_sapphire: "배에서 만들어진 가스가\n엉덩이에서 타오르고 있다. 몸 상태가\n나쁘면 불꽃이 약해진다."
monferno:
  species_id: 391
  names:
