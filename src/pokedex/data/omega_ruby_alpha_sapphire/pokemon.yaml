          alpha_sapphire: "しっぽで　でんきを　つくりだす。\nぜんしんを　かみなりぐもに　かくして\nイッシュちほうの　そらを　とぶ。"
        jp_kanji:
          omega_ruby: "稲妻で　世界を　焼きつくせる\n伝説の　ポケモン。理想の\n世界を　つくる　人を　補佐する。"
          alpha_sapphire: "尻尾で　電気を　作り出す。\n全身を　雷雲に　隠して\nイッシュ地方の　空を　飛ぶ。"
        en:
          omega_ruby: "This legendary Pokémon can scorch the world with\nlightning. It assists those who want to build an\nideal world."
          alpha_sapphire: "Concealing itself in lightning clouds, it flies\nthroughout the Unova region. It creates electricity\nin its tail."
        fr:
          omega_ruby: "Un Pokémon légendaire assez puissant pour foudroyer\nle monde entier. Il soutient ceux qui suivent leur Idéal."
          alpha_sapphire: "Sa queue produit de l’électricité. Il dissimule son corps\ndans un nuage électrique et plane dans le ciel d’Unys."
        it:
          omega_ruby: "Questo Pokémon leggendario può riempire il mondo di fulmini\ne saette. Aiuta chi vuole costruire un mondo ideale."
          alpha_sapphire: "Produce elettricità con la coda. Vola nei cieli di Unima\nnascosto fra lampi e saette."
        de:
          omega_ruby: "Ein Legendäres Pokémon mit der Macht, die Welt durch\nDonner einzuäschern. Hilft allen, die einer Welt der Wünsche\nharren."
          alpha_sapphire: "Sein Schweif erzeugt Strom. Es verbirgt sich hinter dichten\nGewitterwolken und fliegt durch den Luftraum über Einall."
        es:
          omega_ruby: "Pokémon legendario capaz de chamuscar el mundo con sus\nrayos. Ayuda a quienes persiguen un mundo de ideales."
          alpha_sapphire: "Genera electricidad con su cola y, para ocultarse, sobrevuela\nTeselia envuelto en nubes de rayos."
        ko:
          omega_ruby: "번개로 세상을 태워버릴 수 있는\n전설의 포켓몬. 이상의 세계를\n구축하는 사람을 보좌한다."
          alpha_sapphire: "꼬리로 전기를 만들어 낸다.\n전신을 번개 구름에 숨기고\n하나지방의 하늘을 난다."
