          omega_ruby: "こだいじんの　どろにんぎょうが　かいこうせんを\nあびて　せいめいを　やどしたと　いわれている。\nくうちゅうに　ういて　いどうしている。"
          alpha_sapphire: "２まんねんまえに　さかえた　こだい　ぶんめいの\nどろにんぎょうから　うまれた　ナゾの　ポケモン。\nりょうてから　ビームを　はっしゃするぞ。"
        jp_kanji:
          omega_ruby: "古代人の　泥人形が　怪光線を\n浴びて　生命を　宿したと　いわれている。\n空中に　浮いて　移動している。"
          alpha_sapphire: "２万年前に　栄えた　古代　文明の\n泥人形から　生まれた　ナゾの　ポケモン。\n両手から　ビームを　発射するぞ。"
        en:
          omega_ruby: "Claydol are said to be dolls of mud made by primitive humans\nand brought to life by exposure to a mysterious ray.\nThis Pokémon moves about while levitating."
          alpha_sapphire: "Claydol is an enigma that appeared from a clay statue made by\nan ancient civilization dating back 20,000 years. This Pokémon\nshoots beams from both its hands."
        fr:
          omega_ruby: "On raconte que les Kaorine sont des poupées de boue créées\npar les premiers hommes et qu’elles furent amenées à la vie\naprès une exposition à un mystérieux rayon.\nCe Pokémon se déplace en lévitant."
          alpha_sapphire: "Kaorine est un mystérieux Pokémon apparu sous la forme\nd’une statue en argile fabriquée par une civilisation vieille\nde plus de 20 000 ans. Ce Pokémon envoie des rayons\navec ses mains."
        it:
          omega_ruby: "Pare che Claydol sia una bambola d’argilla creata dall’uomo\nprimitivo e portata in vita grazie all’esposizione a misteriose\nradiazioni. Questo Pokémon si muove per levitazione."
          alpha_sapphire: "Claydol rimane ancora un mistero: comparve da una statua\nd’argilla creata da un popolo antico 20.000 anni fa. Questo\nPokémon emette radiazioni dai propri arti superiori."
        de:
          omega_ruby: "Lepumentas sind aus Schlamm gefertigte Puppen, die von\nprimitiven Menschen hergestellt und durch mysteriöse Strahlen\nzum Leben erweckt wurden. Diese Pokémon bewegen sich\nschwebend fort."
          alpha_sapphire: "Lepumentas ist auf mysteriöse Weise aus einer Tonstatue\nentstanden, die vor 20 000 Jahren von einer antiken\nZivilisation geschaffen wurde. Dieses Pokémon verschießt\nStrahlen aus beiden Händen."
        es:
          omega_ruby: "Se cree que los Claydol son figuras de barro hechas por\nhumanos primitivos y que un misterioso rayo les hizo cobrar\nvida. Este Pokémon se desplaza levitando."
          alpha_sapphire: "Claydol es un enigma, una figura de barro procedente de una\ncivilización antigua de hace más de 20 000 años. Este\nPokémon dispara rayos por las manos."
        ko:
          omega_ruby: "괴이한 광선을 쬔 고대인의 진흙인형에\n생명이 깃들었다고 전해진다.\n공중에 떠서 이동하고 있다."
          alpha_sapphire: "2만 년 전에 번창한 고대 문명의\n진흙 인형에서 태어난 수수께끼의 포켓몬이다.\n양손에서 빔을 발사한다."
