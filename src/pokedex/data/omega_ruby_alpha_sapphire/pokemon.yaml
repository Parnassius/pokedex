        fr:
          omega_ruby: "On dit que les Ursaring trouvent leur nourriture dans les cours\nd’eau et les grands arbres des forêts où ils habitent.\nCe Pokémon erre dans la forêt toute la journée pour chercher\nde la nourriture."
          alpha_sapphire: "On dit que les Ursaring trouvent leur nourriture dans les cours\nd’eau et les grands arbres des forêts où ils habitent.\nCe Pokémon erre dans la forêt toute la journée pour chercher\nde la nourriture."
        it:
          omega_ruby: "Si dice che nelle foreste in cui vive Ursaring ci siano molti\ncorsi d’acqua e alberi giganti dove questo Pokémon\nnasconde le proprie scorte di cibo. Ogni giorno si aggira\nnella foresta alla ricerca di alimenti."
          alpha_sapphire: "Si dice che nelle foreste in cui vive Ursaring ci siano molti\ncorsi d’acqua e alberi giganti dove questo Pokémon\nnasconde le proprie scorte di cibo. Ogni giorno si aggira\nnella foresta alla ricerca di alimenti."
        de:
          omega_ruby: "In den von Ursaring bewohnten Wäldern gibt es viele Flüsse\nund hohe Bäume, in denen es Nahrung findet. Dieses Pokémon\nläuft täglich durch den Wald, um nach Essbarem zu suchen."
          alpha_sapphire: "In den von Ursaring bewohnten Wäldern gibt es viele Flüsse\nund hohe Bäume, in denen es Nahrung findet. Dieses Pokémon\nläuft täglich durch den Wald, um nach Essbarem zu suchen."
        es:
          omega_ruby: "En los bosques habitados por Ursaring, dicen que abundan\nlos arroyos y árboles gigantes en los que guardan su\nalimento. Este Pokémon se dedica todos los días a pasear\npor el bosque para buscar comida y guardarla."
          alpha_sapphire: "En los bosques habitados por Ursaring, dicen que abundan\nlos arroyos y árboles gigantes en los que guardan su\nalimento. Este Pokémon se dedica todos los días a pasear\npor el bosque para buscar comida y guardarla."
        ko:
          omega_ruby: "숲 속에는 링곰이 먹이를 수집하는\n큰 나무나 시냇가가 여기저기에 있다고 한다.\n매일 먹이를 모으며 숲을 걷는다."
          alpha_sapphire: "숲 속에는 링곰이 먹이를 수집하는\n큰 나무나 시냇가가 여기저기에 있다고 한다.\n매일 먹이를 모으며 숲을 걷는다."
