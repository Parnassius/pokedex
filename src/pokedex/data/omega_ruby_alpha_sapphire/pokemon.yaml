      descriptions:
        jp_kana:
          omega_ruby: "かおを　おおう　ながい　けは\nすぐれた　レーダー。しゅういの\nようすを　びんかんに　さっちする。"
          alpha_sapphire: "ゆうもうな　ポケモンだが　あいての\nつよさを　たしかめて　たたかいを\nさける　かしこさも　あわせもつ。"
        jp_kanji:
          omega_ruby: "顔を　覆う　長い　毛は\n優れた　レーダー。周囲の　様子を\n敏感に　察知する。"
          alpha_sapphire: "勇猛な　ポケモンだが　相手の\n強さを　確かめて　戦いを\n避ける　賢さも　併せ持つ。"
        en:
          omega_ruby: "The long hair around its face provides an amazing\nradar that lets it sense subtle changes in\nits surroundings."
          alpha_sapphire: "Though it is a very brave Pokémon, it’s also smart\nenough to check its foe’s strength and avoid battle."
        fr:
          omega_ruby: "Les longs poils de son museau font un excellent radar\nqui analyse les alentours avec une grande acuité."
          alpha_sapphire: "Bien que vaillant, il a aussi l’intelligence d’analyser toutes\nles situations et de fuir quand il anticipe une défaite."
        it:
          omega_ruby: "I lunghi peli che gli coprono il volto sono un radar molto\nsensibile alle variazioni dell’ambiente circostante."
          alpha_sapphire: "È un Pokémon molto intrepido, ma ha l’intelligenza di valutare\nla forza del nemico prima di decidere se lottare o no."
        de:
          omega_ruby: "Das lange Fell um sein Gesicht fungiert als Hightech-Radar,\nmit dem es fein säuberlich seine Umgebung abtastet."
          alpha_sapphire: "Ein tapferes Pokémon, das jedoch klug genug ist, seinen\nGegner zu mustern, bevor es sich auf einen Kampf einlässt."
        es:
          omega_ruby: "Los mechones que cubren su cara actúan como un magnífico\nradar para detectar con precisión lo que hay a su alrededor."
          alpha_sapphire: "Aunque se trata de un Pokémon valeroso, también es lo\nbastante inteligente como para escapar si el rival es muy\nfuerte."
        ko:
          omega_ruby: "얼굴을 둘러싼 긴 털은\n우수한 레이더다. 주위\n상황을 민감히 살핀다."
          alpha_sapphire: "용맹한 포켓몬이지만 상대의\n강함을 확인하고 싸움을\n피하는 영리함도 함께 갖추고 있다."
herdier:
