        en:
          omega_ruby: "Azumarill’s long ears are indispensable sensors. By focusing its\nhearing, this Pokémon can identify what kinds of prey are\naround, even in rough and fast-running rivers."
          alpha_sapphire: "Azumarill can make balloons out of air. It makes these air\nballoons if it spots a drowning Pokémon. The air balloons\nenable the Pokémon in trouble to breathe."
        fr:
          omega_ruby: "Les longues oreilles d’Azumarill sont des capteurs\nindispensables. Lorsqu’il se concentre pour écouter,\nce Pokémon peut identifier les proies aux alentours,\nmême dans les cours d’eau à fort courant ou les rapides."
          alpha_sapphire: "Azumarill peut faire des bulles d’air. Il fabrique ces bulles\nlorsqu’il voit un Pokémon en train de se noyer. Les bulles\nd’air permettent au Pokémon en difficulté de respirer."
        it:
          omega_ruby: "Le lunghe orecchie di Azumarill sono sensori indispensabili.\nConcentrandosi sull’udito, è in grado di identificare che tipo\ndi prede ci siano nelle vicinanze, anche in torrenti rapidi\ne impetuosi."
          alpha_sapphire: "Azumarill riesce a creare bolle d’aria in grado di aiutare\nun Pokémon che sta per affogare. Quando ne vede uno,\nAzumarill gli manda una bolla per aiutarlo a respirare."
        de:
          omega_ruby: "Azumarills lange Ohren dienen ihm als unentbehrliche\nSensoren. Wenn es sein Gehör fokussiert, kann dieses\nPokémon auch in reißenden Flüssen identifizieren,\nwelche Art von Beute sich in seiner Nähe befindet."
          alpha_sapphire: "Azumarill kann aus Luft Ballons machen. Diese Luft-Ballons\nerzeugt es, wenn es ein ertrinkendes Pokémon erspäht.\nDurch die Ballons kann das Pokémon, das in Schwierigkeiten\ngeraten ist, atmen."
        es:
          omega_ruby: "Azumarill puede hacer burbujas de aire si ve a algún Pokémon\nque esté a punto de ahogarse. Estas burbujas de aire son\nbásicas para que los Pokémon puedan seguir respirando."
          alpha_sapphire: "Azumarill puede hacer burbujas de aire si ve a algún Pokémon\nque esté a punto de ahogarse. Estas burbujas de aire son\nbásicas para que los Pokémon puedan seguir respirando."
        ko:
          omega_ruby: "긴 귀는 마릴리의 중요한 센서다.\n귀를 기울이면 물살이 격한 강에서도\n그곳에 있는 먹이의 종류를 안다."
          alpha_sapphire: "공기로 풍선을 만들 수 있다.\n포켓몬이 물에 빠져 있으면 공기 방울을\n만들어내 호흡을 할 수 있게 해준다."
