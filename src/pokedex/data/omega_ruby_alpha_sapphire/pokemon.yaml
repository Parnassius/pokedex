      descriptions:
        jp_kana:
          omega_ruby: "げんきの　ない　ポケモンに\nあたまの　はっぱを　わけあたえる。\nつかれを　とる　こうかが　あるのだ。"
          alpha_sapphire: "きのみを　さがすのが　じょうずで\nあちこちで　あつめて　なかまに\nわけあたえる　やさしさを　もつ。"
        jp_kanji:
          omega_ruby: "元気の　ない　ポケモンに\n頭の　葉っぱを　分け与える。\n疲れを　取る　効果が　あるのだ。"
          alpha_sapphire: "木の実を　探すのが　上手で\nあちこちで　集めて　仲間に\n分け与える　優しさを　持つ。"
        en:
          omega_ruby: "It shares the leaf on its head with weary-looking\nPokémon. These leaves are known to relieve stress."
          alpha_sapphire: "It’s good at finding berries and gathers them from\nall over. It’s kind enough to share them\nwith friends."
        fr:
          omega_ruby: "Les feuilles qui poussent sur sa tête soignent la fatigue.\nIl en donne aux Pokémon affaiblis."
          alpha_sapphire: "Il est très doué pour trouver des Baies et aime les partager\navec ses amis sans rien demander en échange."
        it:
          omega_ruby: "Distribuisce le foglie sulla sua testa ai Pokémon affaticati,\nper alleviare la loro stanchezza."
          alpha_sapphire: "È un Pokémon molto generoso. Abilissimo nello scovare le\nbacche, va in giro a raccoglierle per poi condividerle."
        de:
          omega_ruby: "Schwächelnden Pokémon gibt es ein paar der Kräuter auf\nseinem Kopf ab und hilft ihnen so wieder auf die Beine."
          alpha_sapphire: "Ein nettes Kerlchen, das so talentiert darin ist, Beeren\naufzuspüren, dass es sie mit all seinen Kameraden teilt."
        es:
          omega_ruby: "Comparte las hojas de su cabeza con Pokémon agotados.\nPosee la facultad de aliviar el cansancio."
          alpha_sapphire: "Es todo un experto en la búsqueda de bayas y es tan gentil\nque las comparte con todos sus compañeros."
        ko:
          omega_ruby: "기운이 없는 포켓몬에게\n머리의 잎사귀를 나눠준다.\n피로를 풀어주는 효과가 있다."
          alpha_sapphire: "나무열매를 잘 찾아\n여기저기에서 모아 동료에게\n나누어 주는 상냥함을 가졌다."
