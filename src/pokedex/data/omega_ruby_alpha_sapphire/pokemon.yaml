        - swarm
        - shed_skin
      hidden_ability: no_guard
      descriptions:
        jp_kana:
          omega_ruby: "チョボマキと　いっしょに　いるときに\nでんきてきな　しげきを　うけると\nしんかする　ふしぎな　ポケモンだ。"
          alpha_sapphire: "チョボマキを　おそっているときに\nでんきエネルギーを　あびると\nなぜだか　しんか　してしまうのだ。"
        jp_kanji:
          omega_ruby: "チョボマキと　一緒に　いるときに\n電気的な　刺激を　受けると\n進化する　不思議な　ポケモンだ。"
          alpha_sapphire: "チョボマキを　襲っているときに\n電気エネルギーを　浴びると\nなぜだか　進化　してしまうのだ。"
        en:
          omega_ruby: "These mysterious Pokémon evolve when they\nreceive electrical stimulation while they are in the\nsame place as Shelmet."
          alpha_sapphire: "For some reason they evolve when they receive\nelectrical energy while they are attacking Shelmet."
        fr:
          omega_ruby: "Un Pokémon mystérieux qui évolue quand il reçoit un stimulus\nélectrique en étant proche d’un Escargaume."
          alpha_sapphire: "Pour une raison inconnue, ce Pokémon évolue s’il subit\nune décharge électrique pendant qu’il attaque un Escargaume."
        it:
          omega_ruby: "Pokémon misterioso che si evolve ricevendo uno stimolo\nelettrico se si trova in presenza di Shelmet."
          alpha_sapphire: "Per qualche motivo, si evolve a contatto dell’energia elettrica\nche si crea quando attacca Shelmet."
        de:
          omega_ruby: "Ein mysteriöses Pokémon, das sich entwickelt, wenn es\nzusammen mit Schnuthelm einen Stromschlag abbekommt."
          alpha_sapphire: "Bekommt es im Kampf gegen Schnuthelm Strom ab, löst dies\naus unerklärlichen Gründen seine Entwicklung aus."
        es:
          omega_ruby: "Si recibe un estímulo eléctrico al estar en contacto con un\nShelmet, evoluciona."
          alpha_sapphire: "Si recibe una descarga eléctrica durante un combate contra\nun Shelmet, puede evolucionar. Se desconoce el porqué."
        ko:
          omega_ruby: "쪼마리와 함께 있을 때\n전기적인 자극을 받으면\n진화하는 이상한 포켓몬이다."
          alpha_sapphire: "쪼마리를 덮쳤을 때\n전기 에너지를 받으면\n왜인지 진화해 버린다."
escavalier:
  species_id: 589
  names:
    jp_kana: シュバルゴ
