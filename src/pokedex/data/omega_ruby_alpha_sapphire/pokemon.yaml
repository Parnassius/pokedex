      descriptions:
        jp_kana:
          omega_ruby: "６かくけいの　みみを　もつ。\nちていで　あっしゅくされた　からだは\nてつに　まけないくらい　かたい。"
          alpha_sapphire: "１００ねんまえの　だいじしんのとき\nじわれから　はっけんされた。\nたいないに　エネルギーコアを　もつ。"
        jp_kanji:
          omega_ruby: "６角形の　耳を　持つ。\n地底で　圧縮された　体は\n鉄に　負けないくらい　硬い。"
          alpha_sapphire: "１００年前の　大地震のときに\n地割れから　発見された。\n体内に　エネルギーコアを　持つ。"
        en:
          omega_ruby: "Its ear is hexagonal in shape. Compressed\nunderground, its body is as hard as steel."
          alpha_sapphire: "They were discovered a hundred years ago in an\nearthquake fissure. Inside each one is an\nenergy core."
        fr:
          omega_ruby: "Il a une oreille hexagonale. Son corps, compressé\ndans des strates profondes, est dur comme de l’acier."
          alpha_sapphire: "On l’a découvert dans une fissure après un grand tremblement\nde terre il y a 100 ans. Il possède un noyau d’énergie."
        it:
          omega_ruby: "Ha un solo orecchio di forma esagonale. Essendo stato\ncompresso sotto terra, il suo corpo è duro quasi come\nl’acciaio."
          alpha_sapphire: "Scoperto nelle spaccature del terreno dopo il grande\nterremoto di 100 anni fa. Ha all’interno un nucleo di energia."
        de:
          omega_ruby: "Hat ein sechseckiges Ohr. Sein durch das Erdreich gepresster\nKörper steht Stahl in Sachen Härte in nichts nach."
          alpha_sapphire: "Wurde vor 100 Jahren nach einem großen Erdbeben in einer\nErdspalte entdeckt. Es trägt eine Energiesphäre in sich."
        es:
          omega_ruby: "Su oreja tiene forma hexagonal. Su cuerpo fue comprimido\nbajo tierra. Por eso, es duro como el acero."
          alpha_sapphire: "Descubierto en unas grietas generadas por un terremoto hace\n100 años. Tiene un núcleo energético en su cuerpo."
        ko:
          omega_ruby: "육각형 귀를 가지고 있다.\n땅속 깊은 곳에서 압축된 몸은\n철 못지않게 단단하다."
          alpha_sapphire: "100년 전 대지진 때\n갈라진 땅에서 발견되었다.\n체내에 에너지 코어를 가지고 있다."
boldore:
  species_id: 525
