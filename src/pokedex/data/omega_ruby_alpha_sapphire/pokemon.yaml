          omega_ruby: "ヒゲが　アンテナの　やくわり。\nでんぱを　そうじゅしんして　とおくの\nなかまと　れんらくを　とりあうのだ。"
          alpha_sapphire: "しっぽで　はつでんしょや　みんかの\nコンセントから　でんきを　すいとり\nヒゲから　でんげきを　うちだす。"
        jp_kanji:
          omega_ruby: "ヒゲが　アンテナの　役割。\n電波を　送受信して　遠くの　仲間と\n連絡を　取り合うのだ。"
          alpha_sapphire: "尻尾で　発電所や　民家の\nコンセントから　電気を　吸い取り\nヒゲから　電撃を　撃ち出す。"
        en:
          omega_ruby: "Its whiskers serve as antennas. By sending and\nreceiving electrical waves, it can communicate\nwith others over vast distances."
          alpha_sapphire: "It uses its tail to absorb electricity from\npower plants or from outlets in houses,\nand then it fires the electricity from its whiskers."
        fr:
          omega_ruby: "Ses moustaches lui servent d’antennes, et lui permettent\nd’envoyer et de recevoir des signaux pour communiquer\nà distance avec ses congénères."
          alpha_sapphire: "Il utilise sa queue pour pomper l’énergie des centrales\nélectriques ou pour se brancher sur les prises des maisons.\nSes moustaches envoient des décharges."
        it:
          omega_ruby: "I suoi baffi fungono da antenne che trasmettono e ricevono\nonde radio. Se ne serve per comunicare con i suoi simili."
          alpha_sapphire: "Con la coda può assorbire energia dalle prese di corrente\ndi centrali elettriche e abitazioni per poi scaricarla dai baffi."
        de:
          omega_ruby: "Seine Schnurrhaare dienen ihm als Antennen. Durch das\nSenden und Empfangen von elektrischen Wellen kann es\nmit weit entfernten Freunden kommunizieren."
          alpha_sapphire: "Mit seinem Schwanz zapft es Kraftwerke sowie Steckdosen\nin Häusern an, um Strom zu tanken, den es über seine\nSchnurrhaare wieder entlädt."
        es:
          omega_ruby: "Sus bigotes hacen la función de antenas, por lo que puede\nenviar y recibir ondas eléctricas para comunicarse a grandes\ndistancias."
          alpha_sapphire: "Con su cola absorbe la electricidad procedente de las\ncentrales de energía o los enchufes de las casas, para\nliberarla en forma de ataque por los bigotes."
        ko:
          omega_ruby: "수염이 안테나의 역할을 한다.\n전파를 송수신해서 멀리 떨어진\n동료와 서로 연락하는 것이다."
          alpha_sapphire: "꼬리로 발전소나 민가의\n콘센트에서 전기를 흡수하여\n수염에서 전격을 날린다."
carbink:
