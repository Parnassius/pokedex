          alpha_sapphire: "汚い　ものが　大好物なので　ゴミを\n道端に　捨てる　ような　人が　住んでいる\n街には　ベトベトンが　集まってくるぞ。"
        en:
          omega_ruby: "From Muk’s body seeps a foul fluid that gives off a\nnose-bendingly horrible stench. Just one drop of this\nPokémon’s body fluid can turn a pool stagnant and rancid."
          alpha_sapphire: "This Pokémon’s favorite food is anything that is repugnantly\nfilthy. In dirty towns where people think nothing of throwing\naway litter on the streets, Muk are certain to gather."
        fr:
          omega_ruby: "Un fluide nauséabond suinte du corps de Grotadmorv,\nagressant les narines de ses ennemis. Une seule goutte\nde ce fluide suffit à faire croupir un bassin d’eau propre."
          alpha_sapphire: "Ce Pokémon ne mange que ce qui est répugnant et abject.\nLes Grotadmorv se rassemblent dans les villes où les gens\njettent tout par terre, dans la rue."
        it:
          omega_ruby: "Il corpo di questo Pokémon emana un liquido marcio\ndall’odore nauseabondo. Una sola goccia di questo liquido\nè in grado di rendere l’acqua di una piscina putrida\ne stagnante."
          alpha_sapphire: "Questo Pokémon si ciba di qualunque cosa sia sudicia\ne ripugnante. Le città più inquinate, dove la popolazione\ngetta i rifiuti in strada, sono un luogo di ritrovo frequente\nper i Muk."
        de:
          omega_ruby: "Sleimok scheidet eine widerlich stinkende Substanz aus.\nEin einziger Tropfen dieser Substanz reicht aus, um ein\nGewässer zu verseuchen."
          alpha_sapphire: "Sleimoks Lieblingsspeise ist alles, was widerlich\nverschmutzt ist. In dreckigen Städten, in denen\nsich Menschen nichts dabei denken, wenn sie Müll\nauf die Straße werfen, lassen sich diese Pokémon\nmit Vorliebe in Scharen nieder."
        es:
          omega_ruby: "Muk emana por todo el cuerpo un fluido maloliente que obliga\na taparse la nariz. Con solo una gota de la sustancia que\nexuda este Pokémon, se podría contaminar un estanque."
          alpha_sapphire: "A este Pokémon le encanta comer cosas repulsivas. En\nciudades sucias en las que la gente tira la basura por la calle,\nlos Muk tienen, sin duda, su punto de encuentro."
        ko:
          omega_ruby: "몸에서 배어 나오는 체액은 코를\n찌를 정도로 강렬한 냄새를 뿜는다.\n한 방울로 수영장의 물이 탁해지고 냄새가 난다."
          alpha_sapphire: "더러운 것을 매우 좋아해서 쓰레기를\n길가에 버릴 것 같은 사람이 사는\n마을에는 질뻐기가 모여든다."
