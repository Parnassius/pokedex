      hidden_ability: light_metal
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          omega_ruby: "４つの　のうみそは　スーパーコンピュータよりも\nはやく　むずかしい　けいさんの　こたえを　だす。\n４ほんあしを　おりたたみ　くうちゅうに　うかぶ。"
          alpha_sapphire: "２ひきの　メタングが　がったいした　すがた。\nきょたいで　えものを　おさえつけながら\nおなかに　ある　おおきな　くちで　たべるのだ。"
        jp_kanji:
          omega_ruby: "４つの　脳みそは　スーパーコンピュータよりも\n速く　難しい　計算の　答えを　出す。\n４本脚を　折りたたみ　空中に　浮かぶ。"
          alpha_sapphire: "２匹の　メタングが　合体した　姿。\n巨体で　獲物を　抑えつけながら\nお腹に　ある　大きな　口で　食べるのだ。"
        en:
          omega_ruby: "Metagross has four brains in total. Combined, the four brains\ncan breeze through difficult calculations faster than a\nsupercomputer. This Pokémon can float in the air by tucking in\nits four legs."
          alpha_sapphire: "Metagross is the result of two Metang achieving fusion.\nWhen hunting, this Pokémon pins the prey to the ground under\nits massive body. It then eats the helpless victim using the\nlarge mouth on its stomach."
        fr:
          omega_ruby: "Métalosse dispose de quatre cerveaux. Combinés,\nces cerveaux peuvent effectuer des calculs très complexes\nplus vite qu’un ordinateur. Ce Pokémon peut flotter\ndans l’air en repliant ses jambes."
          alpha_sapphire: "Métalosse est le résultat de la fusion de deux Métang.\nLorsqu’il chasse, ce Pokémon bloque sa proie au sol, sous\nson corps massif. Il mange ensuite la victime impuissante\navec son énorme bouche, ouverte sur son estomac."
        it:
          omega_ruby: "Metagross è dotato in tutto di quattro cervelli, che combinati\nassieme riescono a risolvere difficili calcoli più rapidamente\ndi un supercomputer. Riesce a fluttuare nell’aria facendo\nrientrare le quattro zampe."
          alpha_sapphire: "Metagross è il risultato della fusione di due Metang.\nNella caccia questo Pokémon blocca la preda al suolo con\nil proprio corpo massiccio. Poi divora la vittima indifesa con\nla grande bocca posta sullo stomaco."
        de:
          omega_ruby: "Metagross hat insgesamt vier Gehirne. Diese können\nschwierige Berechnungen schneller durchführen als ein\nSupercomputer. Dieses Pokémon kann durch die\nLüfte schweben, indem es seine vier Beine einklappt."
          alpha_sapphire: "Metagross ist aus der Verschmelzung zweier Metang\nhervorgegangen. Auf der Jagd drückt es seine Beute\nmit seinem massigen Körper zu Boden. Dann frisst es\nsein hilfloses Opfer mit seinem großen Maul auf."
        es:
          omega_ruby: "Metagross tiene cuatro cerebros en total que, combinados,\nson capaces de resolver cálculos complicados más rápido que\nel mejor ordenador que haya. Metagross puede flotar en el\naire si mete las patas hacia adentro."
          alpha_sapphire: "Metagross es el resultado de la fusión de dos Metang.\nCuando caza, acorrala a su presa, sujetándola contra el suelo\ncon el cuerpo. Después, devora a la víctima indefensa con la\ngran boca del estómago."
        ko:
          omega_ruby: "네 개의 뇌는 슈퍼컴퓨터보다\n빨리 어려운 계산 문제를 푼다.\n네 개의 다리를 접고 공중에 떠오른다."
          alpha_sapphire: "두 마리의 메탕구가 합체한 모습이다.\n거대한 체구로 먹이를 억누르며\n배에 있는 큰 입으로 먹는다."
