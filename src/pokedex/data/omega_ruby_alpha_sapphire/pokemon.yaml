          alpha_sapphire: "ムクホークに　なると　むれから\nはなれて　１ぴきで　いきていく。\nきょうじんな　つばさを　もっている。"
        jp_kanji:
          omega_ruby: "翼と　脚の　筋肉が　強く\n小さな　ポケモンを　つかんだまま\nらくらくと　飛ぶことが　できる。"
          alpha_sapphire: "ムクホークに　なると　群れから\n離れて　１匹で　生きていく。\n強靭な　翼を　持っている。"
        en:
          omega_ruby: "The muscles in its wings and legs are strong.\nIt can easily fly while gripping a small Pokémon."
          alpha_sapphire: "When Staravia evolve into Staraptor, they leave the\nflock to live alone. They have sturdy wings."
        fr:
          omega_ruby: "Ses ailes et ses pattes ont des muscles développés.\nIl peut voler en agrippant un petit Pokémon."
          alpha_sapphire: "Lorsque Étourvol évolue en Étouraptor, il quitte son groupe\npour vivre seul. Ses ailes sont très développées."
        it:
          omega_ruby: "I muscoli di ali e zampe sono molto sviluppati. Vola senza\nfatica anche portando un piccolo Pokémon."
          alpha_sapphire: "Per diventare Staraptor, lascia il gruppo e affronta la vita\nda solo. Possiede ali robustissime."
        de:
          omega_ruby: "Die Muskeln in seinen Flügeln und Beinen sind stark.\nEs kann im Flug sogar ein anderes Pokémon tragen."
          alpha_sapphire: "Wird Staravia zu Staraptor, verlässt es die Gruppe\nund lebt allein. Seine Spannweite ist gigantisch."
        es:
          omega_ruby: "Sus alas y sus patas son muy fuertes. Puede llevarse volando\nPokémon pequeños."
          alpha_sapphire: "Al evolucionar a Staraptor deja su bandada y pasa a vivir en\nsoledad. Sus alas son inmensas."
        ko:
          omega_ruby: "날개와 발의 근육이 강해\n작은 포켓몬을 붙잡은 채로\n너끈히 날 수 있다."
          alpha_sapphire: "찌르호크가 되면 무리에서\n떨어져 혼자서 살아간다.\n강인한 날개를 가지고 있다."
