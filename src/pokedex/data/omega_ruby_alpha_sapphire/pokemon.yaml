      descriptions:
        jp_kana:
          omega_ruby: "すいぶんを　むだなく　きゅうしゅうする　からだの\nつくりなので　かんそうした　すなちでも　へいき。\nからだを　まるめて　てきの　こうげきを　ふせぐ。"
          alpha_sapphire: "からからに　かわいた　ひふは　とても　かたく\nまるくなると　どんな　こうげきでも　はねかえす。\nよなかは　さばくの　すなに　もぐって　ねむる。"
        jp_kanji:
          omega_ruby: "水分を　無駄なく　吸収する　体の\nつくりなので　乾燥した　砂地でも　平気。\n体を　丸めて　敵の　攻撃を　防ぐ。"
          alpha_sapphire: "からからに　乾いた　皮膚は　とても　硬く\n丸くなると　どんな　攻撃でも　はね返す。\n夜中は　砂漠の　砂に　潜って　眠る。"
        en:
          omega_ruby: "Sandshrew’s body is configured to absorb water without waste,\nenabling it to survive in an arid desert. This Pokémon curls up\nto protect itself from its enemies."
          alpha_sapphire: "Sandshrew has a very dry hide that is extremely tough.\nThe Pokémon can roll into a ball that repels any attack.\nAt night, it burrows into the desert sand to sleep."
        fr:
          omega_ruby: "Le corps de Sabelette lui permet d’économiser l’eau\nqu’il absorbe, afin de survivre longtemps dans le désert.\nCe Pokémon s’enroule sur lui-même pour se protéger\nde ses ennemis."
          alpha_sapphire: "Sabelette a une peau très sèche et extrêmement dure.\nCe Pokémon peut s’enrouler sur lui-même pour repousser\nles attaques. La nuit, il s’enterre dans le sable du désert\npour dormir."
        it:
          omega_ruby: "Il corpo di Sandshrew ha una conformazione che gli consente\ndi assorbire l’acqua senza perdite e di sopravvivere nell’aridità\ndel deserto. Questo Pokémon si avvolge su se stesso per\nproteggersi dai nemici."
          alpha_sapphire: "Sandshrew ha una corazza estremamente secca e dura.\nPuò chiudersi a sfera e rotolare per difendersi dagli attacchi.\nQuando cala la notte, si nasconde nella sabbia del deserto\nper dormire."
        de:
          omega_ruby: "Sandans Körper kann sehr viel Wasser aufnehmen, sodass es\nauch in der Wüste überleben kann. Dieses Pokémon rollt sich\nzusammen, um sich vor Feinden zu schützen."
          alpha_sapphire: "Sandan hat eine sehr trockene und extrem robuste Haut.\nDieses Pokémon kann sich zu einem Ball zusammenrollen,\nvon dem jegliche Angriffe abprallen. Nachts gräbt es sich\nim Wüstensand ein und schläft dort."
        es:
          omega_ruby: "Sandshrew es capaz de absorber agua y no perder ni una\ngota, algo que le permite sobrevivir en el desierto. Este\nPokémon se enrosca para defenderse de los enemigos."
          alpha_sapphire: "Sandshrew tiene una piel muy seca y tremendamente dura.\nTiene la habilidad de hacerse una bola y evitar cualquier\nataque. Por las noches, escarba en la arena del desierto y\nse echa a dormir."
        ko:
          omega_ruby: "몸이 수분을 효율적으로 흡수하기 때문에\n건조한 모래땅에서도 문제없다.\n몸을 둥글게 만들어 적의 공격을 막는다."
          alpha_sapphire: "바싹바싹 마른 피부는 매우 단단해서\n몸을 둥글게 말면 어떤 공격도 튕겨낸다.\n밤에는 사막의 모래에 들어가 잠잔다."
