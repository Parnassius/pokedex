          omega_ruby: "すべての　ポケモンの　いでんしを　もつと　いう。\nじゆうじざいに　すがたを　けすことが　できるので\nひとに　ちかづいても　まったく　きづかれない。"
          alpha_sapphire: "すべての　ポケモンの　いでんしを　もつと　いう。\nじゆうじざいに　すがたを　けすことが　できるので\nひとに　ちかづいても　まったく　きづかれない。"
        jp_kanji:
          omega_ruby: "すべての　ポケモンの　遺伝子を　もつと　いう。\n自由自在に　姿を　消すことが　できるので\n人に　近づいても　まったく　気づかれない。"
          alpha_sapphire: "すべての　ポケモンの　遺伝子を　もつと　いう。\n自由自在に　姿を　消すことが　できるので\n人に　近づいても　まったく　気づかれない。"
        en:
          omega_ruby: "Mew is said to possess the genetic composition of all\nPokémon. It is capable of making itself invisible at will,\nso it entirely avoids notice even if it approaches people."
          alpha_sapphire: "Mew is said to possess the genetic composition of all\nPokémon. It is capable of making itself invisible at will,\nso it entirely avoids notice even if it approaches people."
        fr:
          omega_ruby: "On dit que Mew possède le code génétique de tous les autres\nPokémon. Il peut se rendre invisible à sa guise, ce qui lui\npermet de ne pas se faire remarquer quand il s’approche\ndes gens."
          alpha_sapphire: "On dit que Mew possède le code génétique de tous les autres\nPokémon. Il peut se rendre invisible à sa guise, ce qui lui\npermet de ne pas se faire remarquer quand il s’approche\ndes gens."
        it:
          omega_ruby: "Si dice che Mew possegga il patrimonio genetico di tutti\ni Pokémon. È in grado di rendersi invisibile, quando vuole,\nin modo da non farsi notare nemmeno da vicino."
          alpha_sapphire: "Si dice che Mew possegga il patrimonio genetico di tutti\ni Pokémon. È in grado di rendersi invisibile, quando vuole,\nin modo da non farsi notare nemmeno da vicino."
        de:
          omega_ruby: "Mew soll die genetische Zusammensetzung aller Pokémon\nbesitzen. Es kann sich unsichtbar machen, sodass es sich\nauch Menschen nähern kann, ohne bemerkt zu werden."
          alpha_sapphire: "Mew soll die genetische Zusammensetzung aller Pokémon\nbesitzen. Es kann sich unsichtbar machen, sodass es sich\nauch Menschen nähern kann, ohne bemerkt zu werden."
        es:
          omega_ruby: "Dicen que Mew posee el mapa genético de todos los\nPokémon. Puede hacerse invisible cuando quiere, así que\npasa desapercibido cada vez que se le acerca alguien."
          alpha_sapphire: "Dicen que Mew posee el mapa genético de todos los\nPokémon. Puede hacerse invisible cuando quiere, así que\npasa desapercibido cada vez que se le acerca alguien."
        ko:
          omega_ruby: "모든 포켓몬의 유전자를 가졌다고 한다.\n자유자재로 모습을 숨길 수 있어서\n사람에게 가까이 다가가도 절대 들키지 않는다."
          alpha_sapphire: "모든 포켓몬의 유전자를 가졌다고 한다.\n자유자재로 모습을 숨길 수 있어서\n사람에게 가까이 다가가도 절대 들키지 않는다."
