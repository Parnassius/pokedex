wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    jp_kanji: ソーナンス
    en: Wobbuffet
    fr: Qulbutoké
    it: Wobbuffet
    de: Woingenau
    es: Wobbuffet
    ko: 마자용
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          omega_ruby: "２ひき　いじょう　あつまると　がまん　くらべを\nはじめるが　くうふくを　がまんして　しまうので\nソーナンス　トレーナーは　ちゅういが　ひつよう。"
          alpha_sapphire: "ひたすら　がまんする　ポケモンだが　しっぽを\nこうげきされる　ことだけは　がまん　できない。\nあいてを　みちづれにする　チャンスを　うかがう。"
        jp_kanji:
          omega_ruby: "２匹　以上　集まると　我慢　比べを\n始めるが　空腹を　我慢して　しまうので\nソーナンス　トレーナーは　注意が　必要。"
          alpha_sapphire: "ひたすら　我慢する　ポケモンだが　尻尾を\n攻撃される　ことだけは　我慢　出来ない。\n相手を　道連れにする　チャンスを　伺う。"
        en:
          omega_ruby: "If two or more Wobbuffet meet, they will turn competitive\nand try to outdo each other’s endurance. However, they may\ntry to see which one can endure the longest without food.\nTrainers need to beware of this habit."
          alpha_sapphire: "Wobbuffet does nothing but endure attacks—it won’t attack on\nits own. However, it won’t endure an attack on its tail. When\nthat happens, the Pokémon will try to take the foe with it using\nDestiny Bond."
        fr:
          omega_ruby: "Si un ou plusieurs Qulbutoké se rencontrent, ils se mesurent\nles uns aux autres et font des concours d’endurance. Parfois,\nils tentent de voir qui peut rester le plus longtemps sans\nmanger. Mieux vaut être prévenu."
          alpha_sapphire: "Qulbutoké ne fait rien, à part encaisser des coups.\nIl n’attaque jamais de lui-même. Cependant, il ne supporte\npas qu’on attaque sa queue. Lorsque ça arrive, ce Pokémon\nessaie d’entraîner son ennemi grâce à Prélèvem. Destin."
        it:
          omega_ruby: "Quando due o più Wobbuffet si incontrano, diventano\ncompetitivi tentando di vanificare la reciproca resistenza.\nTalvolta fanno anche a gara per vedere chi resiste di più\nsenza cibo. Gli Allenatori devono fare attenzione."
          alpha_sapphire: "Wobbuffet non fa altro che subire le azioni nemiche:\nnon agisce mai per primo. Tuttavia, non sopporta di essere\nattaccato alla coda. In questo caso cerca di trascinare\ncon sé il nemico usando Destinobbligato."
        de:
          omega_ruby: "Wenn zwei oder mehr Woingenau aufeinandertreffen,\nversuchen sie, gegenseitig ihre Geduld zu übertreffen.\nSie möchten herausfinden, welches Pokémon es am längsten\nohne Nahrung aushält. Darauf müssen Trainer achten."
          alpha_sapphire: "Woingenau tut nichts anderes als Angriffe auszuhalten.\nVon sich aus würde es nie angreifen. Eine Attacke auf\nseinen Schweif würde es allerdings niemals dulden.\nWenn das passiert, setzt es Abgangsbund ein."
        es:
          omega_ruby: "Si dos o más Wobbuffet se encuentran, se volverán\ncompetitivos e intentarán superarse en resistencia. Pero\ntambién puede que intenten aguantar sin comer; algo que\nlos Entrenadores deben tener muy en cuenta."
          alpha_sapphire: "Wobbuffet no hace otra cosa que aguantar los golpes que\nrecibe: nunca usa movimientos ofensivos. Pero, si le atacan\na la cola, intentará llevarse con él al enemigo usando\nMismo Destino."
        ko:
          omega_ruby: "두 마리 이상 모이면 참기 겨루기를\n시작하는데 배고픔도 참아버리기 때문에\n마자용 트레이너는 주의가 필요하다."
          alpha_sapphire: "한결같이 참는 포켓몬이지만 꼬리를\n공격당하는 것만은 참지 못한다.\n상대를 길동무로 만들 기회를 살핀다."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    jp_kanji: キリンリキ
    en: Girafarig
    fr: Girafarig
    it: Girafarig
    de: Girafarig
    es: Girafarig
    ko: 키링키
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      hidden_ability: sap_sipper
      descriptions:
        jp_kana:
          omega_ruby: "シッポの　あたまにも　ちいさな　のうが　ある。\nにおいや　おとに　はんのうして　こうげきするので\nうしろから　ちかよると　いきなり　かみつかれる。"
          alpha_sapphire: "しっぽの　のうは　かんがえごとが　できないほど\nちいさいけど　ねむらなくても　へいき　なので\n２４じかん　あたりを　みはりつづけて　いるぞ。"
        jp_kanji:
          omega_ruby: "シッポの　頭にも　小さな　脳が　ある。\n臭いや　音に　反応して　攻撃するので\n後ろから　近寄ると　いきなり　かみつかれる。"
          alpha_sapphire: "尻尾の　脳は　考えごとが　出来ないほど\n小さいけど　眠らなくても　平気　なので\n２４時間　あたりを　見張り続けて　いるぞ。"
        en:
          omega_ruby: "Girafarig’s rear head also has a brain, but it is small. The rear\nhead attacks in response to smells and sounds. Approaching\nthis Pokémon from behind can cause the rear head to suddenly\nlash out and bite."
          alpha_sapphire: "Girafarig’s rear head contains a tiny brain that is too small for\nthinking. However, the rear head doesn’t need to sleep, so it\ncan keep watch over its surroundings 24 hours a day."
        fr:
          omega_ruby: "La tête à l’arrière de Girafarig a aussi un cerveau, mais il est\nplus petit. Elle attaque en réponse aux sons et aux odeurs.\nSi on approche de ce Pokémon par derrière, cette petite tête\npeut tout à coup jaillir et mordre."
          alpha_sapphire: "La tête à l’arrière de Girafarig abrite un cerveau trop petit\npour penser. En revanche, cette tête arrière n’a pas besoin\nde dormir, ce qui lui permet de monter la garde tout le temps."
        it:
          omega_ruby: "La testa posteriore di Girafarig è dotata di un cervello\npiccolissimo. Attacca soltanto in risposta agli odori\ne ai suoni. Avvicinando questo Pokémon da dietro\nsussiste il pericolo di essere morsi dalla testa posteriore."
          alpha_sapphire: "La testa posteriore di Girafarig contiene un cervello minuto,\ntroppo piccolo per pensare. Tuttavia, questa testolina non\ndorme mai, così può rimanere di sorveglianza 24 ore su 24."
        de:
          omega_ruby: "Der Kopf an Girafarigs Hinterteil hat ein eigenes Gehirn.\nEr reagiert mit Angriffen auf Gerüche und Geräusche.\nWenn man sich diesem Pokémon von hinten nähert,\nkönnte der hintere Kopf plötzlich vorschnellen und zubeißen."
          alpha_sapphire: "Der Kopf an Girafarigs Hinterteil verfügt nur über\nein kleines Gehirn, mit dem es nicht denken kann.\nDieses Gehirn benötigt jedoch keinen Schlaf und\nist somit in der Lage, die Umgebung rund um die\nUhr im Auge zu behalten."
        es:
          omega_ruby: "Girafarig tiene un cerebro también en la cabeza de la cola que\nreacciona atacando ante olores y sonidos. Cuando alguien se\nacerca a este Pokémon por la espalda, puede provocar que la\ncabeza trasera se abalance y lo muerda."
          alpha_sapphire: "La cabeza trasera de Girafarig tiene un cerebro muy pequeño\npara pensar, pero, como no le hace falta dormir, al menos\npuede hacer de centinela las 24 horas del día."
        ko:
          omega_ruby: "꼬리의 머리에도 작은 뇌가 있다.\n냄새나 소리에 반응하여 공격하기 때문에\n뒤에서 접근하면 느닷없이 물린다."
          alpha_sapphire: "꼬리의 뇌는 생각을 할 수 없을 정도로\n작지만 자지 않아도 괜찮아서\n24시간 주변을 계속 망보고 있다."
