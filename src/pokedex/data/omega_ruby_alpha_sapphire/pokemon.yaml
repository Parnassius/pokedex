          alpha_sapphire: "５００ねんまえに　わるさをしたため\nかなめいしの　ひびわれに\nからだを　つなぎとめられてしまった。"
        jp_kanji:
          omega_ruby: "１０８個の　魂が　集まって\n生まれた　ポケモン。\n要石の　ひび割れに　つながれている。"
          alpha_sapphire: "５００年前に　悪さをしたため\n要石の　ひび割れに\n体を　つなぎとめられてしまった。"
        en:
          omega_ruby: "A Pokémon that was formed by 108 spirits. It is\nbound to a fissure in an odd keystone."
          alpha_sapphire: "It was bound to a fissure in an odd keystone as\npunishment for misdeeds 500 years ago."
        fr:
          omega_ruby: "Un Pokémon composé de 108 esprits. Il provient d’une fissure\ndans une clé de voûte étrange."
          alpha_sapphire: "Il fut emprisonné dans la fissure d’une clé de voûte étrange\nen guise de punition il y a 500 ans."
        it:
          omega_ruby: "Pokémon formato da 108 spiriti. È stato imprigionato nella\nfessura di una Roccianima."
          alpha_sapphire: "500 anni fa fu imprigionato nella fessura di una Roccianima\ncome punizione."
        de:
          omega_ruby: "Ein Pokémon, das aus 108 Geistern besteht. Es ist an einen\nSpalt in einem mysteriösen Stein gebunden."
          alpha_sapphire: "Es wurde in einen Spalt eines Steins gebannt, als Sühne\nfür Untaten, die es vor 500 Jahren begangen hatte."
        es:
          omega_ruby: "Se formó a partir de 108 espíritus. Está unido a la fisura de\nuna piedra angular mística."
          alpha_sapphire: "Como castigo por una fechoría 500 años atrás, está unido a\nla fisura de una piedra angular mística."
        ko:
          omega_ruby: "108개의 영혼이 모여서\n태어난 포켓몬이다. 쐐기돌의\n균열과 연결되어 있다."
          alpha_sapphire: "500년 전에 나쁜 짓을 했기 때문에\n쐐기돌의 균열에\n몸이 연결되어 갇혀 버렸다."
