      abilities:
        - torrent
      hidden_ability: shell_armor
      descriptions:
        jp_kana:
          omega_ruby: "てきが　まばたきする　あいだに\nまえあしに　ついた　アシガタナで\nあいてを　きりつけ　もとにもどせる。"
          alpha_sapphire: "よろいに　しこまれた　つるぎの\nひとふりで　あいてを　たおす。\nひとにらみで　てきを　だまらせる。"
        jp_kanji:
          omega_ruby: "敵が　瞬きする　あいだに\n前足に　ついた　アシガタナで\n相手を　切りつけ　元に戻せる。"
          alpha_sapphire: "よろいに　仕込まれた　剣の　一振りで\n相手を　倒す。\nひとにらみで　敵を　黙らせる。"
        en:
          omega_ruby: "In the time it takes a foe to blink, it can draw and\nsheathe the seamitars attached to its front legs."
          alpha_sapphire: "One swing of the sword incorporated in its armor\ncan fell an opponent. A simple glare from one of\nthem quiets everybody."
        fr:
          omega_ruby: "Il dissimule de grandes lames qu’il dégaine en un éclair\ndes fourreaux de ses pattes antérieures."
          alpha_sapphire: "Il peut terrasser ses ennemis d’un coup de la lame enchâssée\ndans son armure, et les faire taire d’un seul regard."
        it:
          omega_ruby: "Riesce a estrarre le sue spade, colpire il nemico e riporle\nal loro posto nelle zampe anteriori in un batter d’occhio."
          alpha_sapphire: "Atterra l’avversario con un solo colpo della spada inserita\nnell’armatura. Una sua occhiata ammutolisce il nemico."
        de:
          omega_ruby: "Ehe man sichs versieht, hat es schon das Langschwert aus\nseinen Vorderbeinen gezogen und seinen Gegner besiegt."
          alpha_sapphire: "Besiegt Gegner durch einen einzigen Hieb mit der Klinge an\nseinem Panzer. Ein böser Blick und seine Feinde verstummen."
        es:
          omega_ruby: "En un abrir y cerrar de ojos, puede desenvainar y envainar los\nsables que hay en sus patas delanteras."
          alpha_sapphire: "Derriba a su rival con un solo tajo del sable que lleva en su\ncoraza. Acalla al enemigo con una simple mirada."
        ko:
          omega_ruby: "상대가 눈을 깜빡이는 동안에\n앞다리에 붙어 있는 각검으로\n상대를 베고 원래대로 되돌린다."
          alpha_sapphire: "갑옷에 내장된 검으로 한칼에\n상대를 제압한다.\n눈빛만으로 상대를 침묵시킨다."
patrat:
  species_id: 504
