          omega_ruby: "なげなわの　ようりょうで　しっぽを　ふりまわし\nなげた　ときの　ちからで　とんでいく。\nさいこう　１０メートル　とんだ　きろくが　ある。"
          alpha_sapphire: "しっぽには　せいちょうする　ために　ひつような\nえいようが　たっぷり　つまっているぞ。\nだんりょくの　ある　しっぽに　のって　あそぶ。"
        jp_kanji:
          omega_ruby: "投げ縄の　要領で　尻尾を　振り回し\n投げた　ときの　力で　飛んでいく。\n最高　１０メートル　飛んだ　記録が　ある。"
          alpha_sapphire: "尻尾には　成長する　ために　必要な\n栄養が　たっぷり　詰まっているぞ。\n弾力の　ある　尻尾に　乗って　遊ぶ。"
        en:
          omega_ruby: "Azurill spins its tail as if it were a lasso, then hurls it far.\nThe momentum of the throw sends its body flying, too.\nUsing this unique action, one of these Pokémon managed to\nhurl itself a record 33 feet."
          alpha_sapphire: "Azurill’s tail is large and bouncy. It is packed full of the\nnutrients this Pokémon needs to grow. Azurill can be seen\nbouncing and playing on its big, rubbery tail."
        fr:
          omega_ruby: "Azurill fait tournoyer sa queue comme un lasso et l’envoie\nsi fort que le reste de son corps est également projeté.\nLe record de lancer de ce Pokémon est actuellement de 10 m."
          alpha_sapphire: "La grande queue d’Azurill est élastique. Elle lui permet\nde stocker les nutriments nécessaires à sa croissance.\nParfois, on voit Azurill s’amuser à rebondir sur sa queue\nélastique."
        it:
          omega_ruby: "Azurill fa roteare la propria coda come un lazo, poi la scaglia\nlontano. Nel momento del lancio prende il volo anche\nil suo corpo. Grazie a questa tecnica unica, uno di questi\nPokémon è riuscito a lanciarsi a 10 m di distanza."
          alpha_sapphire: "Azurill è dotato di una coda lunga ed elastica. Inoltre, è ricca\ndi sostanze nutritive indispensabili per la sua sopravvivenza.\nSpesso lo si vede saltellare e giocare sulla coda gommosa\ne molleggiata."
        de:
          omega_ruby: "Azurill schleudert seinen Schweif wie ein Lasso weit aus und\nfliegt dann selbst hinterher. Ein Azurill hat es auf diese Weise\ngeschafft, die Rekordweite von 10 m zurückzulegen."
          alpha_sapphire: "Azurills Schweif ist lang und federnd. Er ist vollgepackt\nmit Nährstoffen, die dieses Pokémon zum Wachsen braucht.\nMan kann es häufig dabei beobachten, wie es auf seinem\ngummiartigen Schweif umherhüpft und spielt."
        es:
          omega_ruby: "Azurill enrolla la cola como si fuera un lazo y la despliega a\ncontinuación todo lo que puede. De esta forma, un Azurill\nllegó a lanzarse a sí mismo hasta 10 m."
          alpha_sapphire: "Azurill tiene una especie de pelota en la cola, que contiene los\nnutrientes necesarios para crecer. Es fácil ver a este Pokémon\nsaltando y jugueteando sentado encima de la misma."
        ko:
          omega_ruby: "올가미를 쓰듯 꼬리를 휘휘 돌려\n던질 때의 힘으로 날아간다.\n최고 10m를 날아간 기록이 있다."
          alpha_sapphire: "꼬리에는 성장을 위해 필요한\n영양이 가득 채워져 있다.\n탄력 있는 꼬리에 올라가 논다."
