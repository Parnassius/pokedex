      descriptions:
        jp_kana:
          omega_ruby: "しぜんのエネルギーに　よって　ゲンシカイキし\nほんらいの　すがたを　とりもどす。そのちからは\nあらしを　よびよせ　うみを　ひろげる。"
          alpha_sapphire: "うみの　けしん　と つたわる　ポケモン。\nしぜんのエネルギーを　もとめて　グラードンと\nあらそいを　くりかえした　でんせつが　ある。"
        jp_kanji:
          omega_ruby: "自然のエネルギーに　よって　ゲンシカイキし\n本来の　姿を　取り戻す。その力は\n嵐を　呼び寄せ　海を　広げる。"
          alpha_sapphire: "海の　化身　と 伝わる　ポケモン。\n自然のエネルギーを　求めて　グラードンと\n争いを　繰り返したという　伝説が　ある。"
        en:
          omega_ruby: "Through Primal Reversion and with nature’s\nfull power, it will take back its true form. It can\nsummon storms that cause the sea levels to rise."
          alpha_sapphire: "Kyogre is said to be the personification of the sea itself.\nLegends tell of its many clashes against Groudon,\nas each sought to gain the power of nature."
        fr:
          omega_ruby: "Grâce à l’énergie de la nature, il peut accomplir\nsa Primo-Résurgence pour retrouver son apparence originelle.\nCe pouvoir lui permet d’appeler de terribles déluges\npour étendre les mers."
          alpha_sapphire: "Un Pokémon considéré comme l’avatar des océans.\nSelon les légendes, il a disputé de nombreux combats\navec Groudon pour contrôler l’énergie de la nature."
        it:
          omega_ruby: "L’energia della natura può causare l’archeorisveglio\ndi questo Pokémon, facendolo tornare al suo aspetto\noriginario.\nPuò provocare diluvi torrenziali in grado di espandere\nla superficie dei mari."
          alpha_sapphire: "Si dice che questo Pokémon abbia un profondo\nlegame con le distese dei mari.\nLe leggende narrano dei suoi continui scontri con\nGroudon per ottenere l’energia della natura."
        de:
          omega_ruby: "Mithilfe von Naturenergie kann es eine Protomorphose\ndurchführen und so seine ursprüngliche Form zurückerlangen.\nDadurch kann es Stürme erzeugen und das Meer vergrößern."
          alpha_sapphire: "Es heißt, Kyogre sei die Personifizierung des Meeres.\nLegenden zufolge hat es in seinem Bestreben, sich die\nNaturenergie anzueignen, viele Male gegen Groudon gekämpft."
        es:
          omega_ruby: "Kyogre se sirve de la energía de la naturaleza para realizar su\nRegresión Primigenia y recobrar su apariencia primitiva. Con tal\npoder, puede desencadenar tempestades para expandir los\nocéanos."
          alpha_sapphire: "A Kyogre siempre se le ha descrito como el Pokémon que\nexpandió los océanos. Varias leyendas cuentan que libró\ncombates contra Groudon en repetidas ocasiones para tener\nel control de la energía de la naturaleza."
        ko:
          omega_ruby: "자연의 힘에 의해 원시회귀하여\n원래의 모습을 되찾는다. 그 힘은\n폭풍을 불러들이며 바다를 확장한다."
