          alpha_sapphire: "もっている　マスクは　デスマスが\nにんげんだった　ときの　かお。\nたまに　みつめては　ないている。"
        jp_kanji:
          omega_ruby: "お墓に　埋葬された　人の\n魂が　ポケモンに　変化した。\n死ぬ前の　記憶が　残っている。"
          alpha_sapphire: "持っている　マスクは\nデスマスが　人間だった　ときの　顔。\nたまに　見つめては　泣いている。"
        en:
          omega_ruby: "These Pokémon arose from the spirits of people\ninterred in graves. Each retains memories of its\nformer life."
          alpha_sapphire: "Each of them carries a mask that used to be its face\nwhen it was human. Sometimes they look at it\nand cry."
        fr:
          omega_ruby: "Il est né de l’âme d’un défunt inhumé dans une tombe antique.\nIl a conservé ses anciens souvenirs."
          alpha_sapphire: "Le motif de son masque est son visage quand il était humain.\nParfois, il le regarde et se met à pleurer."
        it:
          omega_ruby: "Erano un tempo spettri che riposavano in antiche tombe.\nConservano la memoria della loro vita mortale."
          alpha_sapphire: "La maschera che indossa è il volto che aveva quando era un\numano. A volte si mette a piangere mentre la guarda."
        de:
          omega_ruby: "Es entsteht aus den Seelen von längst begrabenen Menschen\nund kann sich immer noch an deren Vergangenheit erinnern."
          alpha_sapphire: "Seine Maske ist ein Abbild des Gesichts, das es als Mensch\nhatte. Manchmal weint es, wenn man ihm in die Augen sieht."
        es:
          omega_ruby: "Almas de humanos sepultados en tumbas que han adquirido\nforma de Pokémon. Recuerdan su vida antes de la muerte."
          alpha_sapphire: "Su máscara representa la cara que poseía cuando era humano.\nA veces se le saltan las lágrimas al contemplarla."
        ko:
          omega_ruby: "무덤에 매장된 사람의\n영혼이 포켓몬으로 변했다.\n죽기 전 기억이 남아 있다."
          alpha_sapphire: "가지고 있는 마스크는 데스마스가\n사람이었을 때의 얼굴이다.\n가끔 마스크를 쳐다보며 운다."
cofagrigus:
