      descriptions:
        jp_kana:
          omega_ruby: "ひとみが　きんいろに　ひかるとき\nカベの　むこうに　かくれている\nえものを　みつけることが　できる。"
          alpha_sapphire: "レントラーの　とうし　のうりょくは\nきけんな　ものを　はっけんする　とき\nとても　やくに　たつのだ。"
        jp_kanji:
          omega_ruby: "瞳が　金色に　光るとき\n壁の　向こうに　隠れている\n獲物を　見つけることが　できる。"
          alpha_sapphire: "レントラーの　透視能力は\n危険な　ものを　発見するとき\nとても　役に立つのだ。"
        en:
          omega_ruby: "When its eyes gleam gold, it can spot hiding\nprey—even those taking shelter behind a wall."
          alpha_sapphire: "Luxray’s ability to see through objects comes in\nhandy when it’s scouting for danger."
        fr:
          omega_ruby: "Quand ses yeux se dorent, il peut repérer une proie cachée,\nmême si elle est derrière un mur."
          alpha_sapphire: "Sa capacité à voir à travers tout est très utile pour détecter\nles moindres dangers."
        it:
          omega_ruby: "Se i suoi occhi sono dorati, può individuare le prede,\nanche quelle che si nascondono dietro i muri."
          alpha_sapphire: "L’abilità radioscopica di Luxray si rivela utile quando gli fa\nscoprire oggetti pericolosi."
        de:
          omega_ruby: "Leuchten seine Augen golden auf, kann es Beute, die sich\nversteckt, sehen. Es kann durch Wände sehen."
          alpha_sapphire: "Beim Aufspüren von Gefahren sind Luxtras hellseherische\nFähigkeiten äußerst hilfreich."
        es:
          omega_ruby: "Cuando sus ojos brillan como el oro, puede ver presas\nescondidas, incluso detrás de un muro."
          alpha_sapphire: "La potente visión de Luxray resulta extremadamente valiosa\ncuando acecha el peligro."
        ko:
          omega_ruby: "눈동자가 금색으로 빛날 때\n벽의 저편에 숨어 있는\n먹이를 찾아낼 수 있다."
          alpha_sapphire: "렌트라의 투시 능력은\n위험한 것을 발견할 때\n매우 도움이 된다."
