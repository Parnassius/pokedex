      types:
        - normal
      egg_groups:
        - field
        - fairy
      abilities:
        - cute_charm
        - normalize
      hidden_ability: wonder_skin
      descriptions:
        jp_kana:
          omega_ruby: "マイペースで　じゆうきままな　くらしを　このむ。\nきのむくまま　エサを　たべたり　ねむったり\nしているので　１にちの　リズムが　バラバラだ。"
          alpha_sapphire: "きまった　すみかを　もたずに　くらす　ポケモン。\nほかの　ポケモンが　ねどこに　ちかよって　きても\nけっして　あらそわず　ねる　ばしょを　かえる。"
        jp_kanji:
          omega_ruby: "マイペースで　自由気ままな　暮らしを　好む。\n気の向くまま　エサを　食べたり　眠ったり\nしているので　１日の　リズムが　バラバラだ。"
          alpha_sapphire: "決まった　すみかを　持たずに　暮らす　ポケモン。\n他の　ポケモンが　寝床に　近寄って　きても\n決して　争わず　寝る　場所を　変える。"
        en:
          omega_ruby: "Delcatty prefers to live an unfettered existence in which it can\ndo as it pleases at its own pace. Because this Pokémon eats\nand sleeps whenever it decides, its daily routines are\ncompletely random."
          alpha_sapphire: "Delcatty sleeps anywhere it wants without keeping a permanent\nnest. If other Pokémon approach it as it sleeps, this Pokémon\nwill never fight—it will just move away somewhere else."
        fr:
          omega_ruby: "Delcatty préfère vivre une existence sans contraintes,\nau cours de laquelle chacun pourrait faire ce qu’il veut.\nComme ce Pokémon mange et dort quand il le décide,\nson rythme de vie est totalement aléatoire."
          alpha_sapphire: "Delcatty peut dormir n’importe où. Il n’a pas de nid\npermanent. Lorsque d’autres Pokémon lui cherchent\ndes noises pendant son sommeil, il ne répond pas et\nse contente de partir dormir ailleurs."
        it:
          omega_ruby: "Delcatty preferisce vivere una vita in libertà, in cui poter\nfare ciò che più gli aggrada in base alle proprie esigenze.\nPoiché anche gli orari dei pasti e del sonno sono\ncompletamente liberi, la sua vita quotidiana è casuale."
          alpha_sapphire: "Delcatty dorme dove più gli aggrada senza mai una dimora\nfissa. Se gli si avvicinano altri Pokémon, Delcatty non lotta\nmai, ma leva le tende e si sposta da un’altra parte."
        de:
          omega_ruby: "Enekoro liebt seine Eigenständigkeit. So kann es das tun,\nwas es möchte, und kann selbst das Tempo bestimmen.\nDa dieses Pokémon schläft und isst, wenn es Lust dazu hat,\nist sein Tagesablauf eher zufälliger Natur."
          alpha_sapphire: "Enekoro schläft dort, wo es ihm gefällt und hat kein\ndauerhaftes Nest. Nähern sich ihm andere Pokémon,\nwenn es schläft, kämpft es nicht mit ihnen, sondern\nzieht weiter."
        es:
          omega_ruby: "Delcatty prefiere llevar una vida independiente y hacer lo que\nse le antoje. Como este Pokémon come y duerme según vea\nen cada momento, no se puede decir que tenga unos hábitos\nregulares en el día a día."
          alpha_sapphire: "Delcatty duerme en cualquier lugar sin tener que mantener el\nnido en un mismo sitio. Si otro Pokémon se le acerca mientras\nduerme, no se pondrá a luchar con él; simplemente se irá a\notro sitio."
        ko:
          omega_ruby: "자기 방식대로 자유로운 삶을 즐긴다.\n마음 내키는 대로 먹이를 먹고 잠을 자기\n때문에 하루의 리듬이 제각각이다."
          alpha_sapphire: "일정한 거처 없이 생활하는 포켓몬이다.\n다른 포켓몬이 잠자리에 가까이 다가와도\n절대 다투지 않고 이동하여 잔다."
