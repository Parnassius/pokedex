          alpha_sapphire: "ながれぼしの　おおい　よるは　わ　に　なって\nおどる　ピィの　すがたを　みることが　できる。\nひのでまで　おどり　よつゆで　のどを　うるおす。"
        jp_kanji:
          omega_ruby: "流れ星の　多い　夜は　輪に　なって\n踊る　ピィの　姿を　みることが　できる。\n日の出まで　踊り　夜露で　のどを　潤す。"
          alpha_sapphire: "流れ星の　多い　夜は　輪に　なって\n踊る　ピィの　姿を　みることが　できる。\n日の出まで　踊り　夜露で　のどを　潤す。"
        en:
          omega_ruby: "On nights with many shooting stars, Cleffa can be seen\ndancing in a ring. They dance through the night and stop only\nat the break of day, when these Pokémon quench their thirst\nwith the morning dew."
          alpha_sapphire: "On nights with many shooting stars, Cleffa can be seen\ndancing in a ring. They dance through the night and stop only\nat the break of day, when these Pokémon quench their thirst\nwith the morning dew."
        fr:
          omega_ruby: "Les nuits où il y a des étoiles filantes, on peut voir des Mélo\ndanser en cercle. Ils dansent toute la nuit et ne s’arrêtent\nqu’à l’aube. Ces Pokémon se désaltèrent alors avec la rosée\ndu matin."
          alpha_sapphire: "Les nuits où il y a des étoiles filantes, on peut voir des Mélo\ndanser en cercle. Ils dansent toute la nuit et ne s’arrêtent\nqu’à l’aube. Ces Pokémon se désaltèrent alors avec la rosée\ndu matin."
        it:
          omega_ruby: "In notti con molte stelle cadenti, è facile vedere molti Cleffa\ndanzare in cerchio. Ballano per tutta la notte fermandosi\nsoltanto alle prime luci dell’alba per dissetarsi bevendo\nle gocce di rugiada."
          alpha_sapphire: "In notti con molte stelle cadenti, è facile vedere molti Cleffa\ndanzare in cerchio. Ballano per tutta la notte fermandosi\nsoltanto alle prime luci dell’alba per dissetarsi bevendo\nle gocce di rugiada."
        de:
          omega_ruby: "In Nächten mit vielen Sternschnuppen kann man Pii im Kreis\ntanzen sehen. Es tanzt die ganze Nacht hindurch und hört\nerst bei Sonnenaufgang auf, um seinen Durst mit Morgentau\nzu stillen."
          alpha_sapphire: "In Nächten mit vielen Sternschnuppen kann man Pii im Kreis\ntanzen sehen. Es tanzt die ganze Nacht hindurch und hört\nerst bei Sonnenaufgang auf, um seinen Durst mit Morgentau\nzu stillen."
        es:
          omega_ruby: "Cuando hay lluvia de estrellas, a los Cleffa se les puede\nver danzando en círculos durante toda la noche. Solo paran\ncuando rompe el día; entonces, dejan de bailar y calman su\nsed con el rocío de la mañana."
          alpha_sapphire: "Cuando hay lluvia de estrellas, a los Cleffa se les puede\nver danzando en círculos durante toda la noche. Solo paran\ncuando rompe el día; entonces, dejan de bailar y calman su\nsed con el rocío de la mañana."
        ko:
          omega_ruby: "별똥별이 많은 밤에는 둥글게 모여\n춤추는 삐의 모습을 볼 수 있다.\n일출 때까지 춤추며 밤이슬로 목을 축인다."
          alpha_sapphire: "별똥별이 많은 밤에는 둥글게 모여\n춤추는 삐의 모습을 볼 수 있다.\n일출 때까지 춤추며 밤이슬로 목을 축인다."
