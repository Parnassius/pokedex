      descriptions:
        jp_kana:
          omega_ruby: "とりこんだ　たいようこうせんを\nエネルギーコアで　はんのう　させて\nひかりのたまとして　うちだしてくる。"
          alpha_sapphire: "たいないの　コアで　エネルギーを\nあっしゅくして　うちだす　こうげきは\nやまを　ふきとばす　いりょく。"
        jp_kanji:
          omega_ruby: "取りこんだ　太陽光線を\nエネルギーコアで　反応　させて\n光の玉として　撃ちだしてくる。"
          alpha_sapphire: "体内の　コアで　エネルギーを\n圧縮して　撃ち出す　攻撃は\n山を　吹き飛ばす　威力。"
        en:
          omega_ruby: "The solar rays it absorbs are processed in its\nenergy core and fired as a ball of light."
          alpha_sapphire: "Compressing the energy from its internal core\nlets it fire off an attack capable of blowing away\na mountain."
        fr:
          omega_ruby: "Il amplifie dans son noyau l’énergie du soleil absorbée\npar son corps et la projette en une boule de lumière."
          alpha_sapphire: "Il comprime de l’énergie dans son corps, et ses attaques sont\nassez puissantes pour renverser des montagnes."
        it:
          omega_ruby: "Assorbe i raggi solari e, grazie al suo nucleo energetico,\nli trasforma in palle di luce che poi spara."
          alpha_sapphire: "Comprime l’energia nel suo nucleo interno per poi spararla\ncon una potenza che può spazzare via anche le montagne."
        de:
          omega_ruby: "Es verarbeitet Sonnenstrahlen in seinem Energiekern zu\nLichtkugeln weiter, um sie im Kampf auf seinen Gegner\nabzufeuern."
          alpha_sapphire: "Es kann ganze Berge einebnen, indem es Energie entlädt,\ndie es in seinem Kern gesammelt und verdichtet hat."
        es:
          omega_ruby: "Absorbe los rayos solares, procesa esa energía en su núcleo\ny lanza poderosas bolas de luz a sus enemigos."
          alpha_sapphire: "El núcleo de su cuerpo comprime la energía para lanzar\nataques capaces de destruir una montaña."
        ko:
          omega_ruby: "거두어들인 태양 광선을\n에너지 코어로 반응시켜\n빛의 구슬로 쏘아낸다."
          alpha_sapphire: "체내의 코어에서 에너지를\n압축하여 쏘아대는 공격은\n산을 날려버릴 만한 위력이다."
woobat:
  species_id: 527
  names:
    jp_kana: コロモリ
    jp_kanji: コロモリ
    en: Woobat
    fr: Chovsourir
    it: Woobat
    de: Fleknoil
    es: Woobat
    ko: 또르박쥐
