    mismagius:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 105
        special_defense: 105
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "じゅもんを　となえる　ポケモン。\nあいてを　くるしめるもの　だけでなく\nしあわせにする　じゅもんも　ある。"
          alpha_sapphire: "じゅもんの　ような　あやしい\nなきごえで　あいてを　くるしめる。\nしんしゅつきぼつの　ポケモン。"
        jp_kanji:
          omega_ruby: "じゅもんを　唱える　ポケモン。\n相手を　苦しめるもの　だけでなく\n幸せにする　じゅもんも　ある。"
          alpha_sapphire: "じゅもんの　ような　怪しい　鳴き声で\n相手を　苦しめる。\n神出鬼没の　ポケモン。"
        en:
          omega_ruby: "It chants incantations. While they usually torment\ntargets, some chants bring happiness."
          alpha_sapphire: "Its cries sound like incantations to torment the foe.\nIt appears where you least expect it."
        fr:
          omega_ruby: "Il psalmodie des incantations. Ce sont souvent\ndes malédictions, mais certaines apportent la joie."
          alpha_sapphire: "Un Pokémon insaisissable qui tourmente ses ennemis avec\nson cri semblable à une incantation."
        it:
          omega_ruby: "Recita incantesimi che tormentano il nemico. Tuttavia, alcune\nformule portano felicità."
          alpha_sapphire: "Tormenta i malcapitati con un verso simile a formule magiche.\nAppare dovunque in qualsiasi momento."
        de:
          omega_ruby: "Es spricht Beschwörungen. Viele lösen Schmerzen aus,\nmanche aber bringen Glück."
          alpha_sapphire: "Sein bizarrer, bannfluchartiger Ruf quält seine Gegner.\nEs verschwindet so plötzlich, wie es auftaucht."
        es:
          omega_ruby: "Recita cánticos. Algunos de ellos atormentan a sus rivales,\nmientras que otros producen felicidad."
          alpha_sapphire: "Atormenta a sus rivales con gritos que parecen conjuros.\nAparece en ocasiones y lugares imprevistos."
        ko:
          omega_ruby: "주문을 외는 포켓몬이다.\n상대를 고통스럽게 하는 것뿐만\n아니라 행복하게 하는 주문도 있다."
          alpha_sapphire: "주문 같은 수상한\n울음소리로 상대를 괴롭힌다.\n신출귀몰하는 포켓몬이다."
honchkrow:
