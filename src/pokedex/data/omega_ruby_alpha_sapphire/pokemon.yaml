          alpha_sapphire: "つばさを　つかって　とぶように　スキップ。\nすいめんを　あるく　ことだって　できるのだ。\nしずかな　つきよに　みずうみを　あるく。"
        jp_kanji:
          omega_ruby: "翼を　使って　飛ぶように　スキップ。\n水面を　歩く　ことだって　できるのだ。\n静かな　月夜に　湖を　歩く。"
          alpha_sapphire: "翼を　使って　飛ぶように　スキップ。\n水面を　歩く　ことだって　できるのだ。\n静かな　月夜に　湖を　歩く。"
        en:
          omega_ruby: "Clefable moves by skipping lightly as if it were flying using its\nwings. Its bouncy step lets it even walk on water. It is known\nto take strolls on lakes on quiet, moonlit nights."
          alpha_sapphire: "Clefable moves by skipping lightly as if it were flying using\nits wings. Its bouncy step lets it even walk on water.\nIt is known to take strolls on lakes on quiet, moonlit nights."
        fr:
          omega_ruby: "Les Mélodelfe se déplacent en sautant doucement,\ncomme s’ils volaient. Leur démarche légère leur permet\nmême de marcher sur l’eau. On raconte qu’ils se promènent\nsur les lacs, les soirs où la lune est claire."
          alpha_sapphire: "Les Mélodelfe se déplacent en sautant doucement,\ncomme s’ils volaient. Leur démarche légère leur permet\nmême de marcher sur l’eau. On raconte qu’ils se promènent\nsur les lacs, les soirs où la lune est claire."
        it:
          omega_ruby: "Clefable si muove saltellando leggero come se fluttuasse\nsorretto dalle sue ali. Così riesce anche a camminare\nsull’acqua. È solito passeggiare sui laghi in silenziose\nnotti di luna piena."
          alpha_sapphire: "Clefable si muove saltellando leggero come se fluttuasse\nsorretto dalle sue ali. Così riesce anche a camminare\nsull’acqua. È solito passeggiare sui laghi in silenziose\nnotti di luna piena."
        de:
          omega_ruby: "Pixi bewegt sich fort, indem es leicht mit den Flügeln schlägt.\nDurch seinen federnden Gang kann es sogar über Wasser\ngehen. Bei Mondschein unternimmt es Spaziergänge auf Seen."
          alpha_sapphire: "Pixi bewegt sich fort, indem es leicht mit den Flügeln schlägt.\nDurch seinen federnden Gang kann es sogar über Wasser\ngehen. Bei Mondschein unternimmt es Spaziergänge auf Seen."
        es:
          omega_ruby: "Clefable se mueve dando saltitos como si fuera haciendo uso\nde las alas. Estos pequeños brincos le permiten caminar por\nel agua. De todos es sabido que le encanta darse paseos por\nlos lagos en tranquilas noches de luna llena."
          alpha_sapphire: "Clefable se mueve dando saltitos como si fuera haciendo uso\nde las alas. Estos pequeños brincos le permiten caminar por\nel agua. De todos es sabido que le encanta darse paseos por\nlos lagos en tranquilas noches de luna llena."
        ko:
          omega_ruby: "날개를 사용하여 날아가듯 뛰어간다.\n물 위를 걷는 것도 할 수 있다.\n조용한 달밤에 호수를 걷는다."
          alpha_sapphire: "날개를 사용하여 날아가듯 뛰어간다.\n물 위를 걷는 것도 할 수 있다.\n조용한 달밤에 호수를 걷는다."
