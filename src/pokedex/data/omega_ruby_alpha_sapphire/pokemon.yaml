          alpha_sapphire: "ボサボサの　たいもうの　なかに\nたべものを　かくして　もちあるく。\nたべる　ときは　ゴクリと　まるのみ。"
        jp_kanji:
          omega_ruby: "長い　体の　毛の　下に\n食べ物を　隠す　習性。\n隠したことを　忘れてしまう。"
          alpha_sapphire: "ボサボサの　体毛の　中に\n食べ物を　隠して　持ち歩く。\n食べる　ときは　ゴクリと　まる飲み。"
        en:
          omega_ruby: "It hides food under its long body hair. However,\nit forgets it has hidden the food."
          alpha_sapphire: "It conceals food under the long fur on its body.\nIt carts around this food stash and swallows it\nwithout chewing."
        fr:
          omega_ruby: "Il cache de la nourriture sous les grands poils de son corps,\nmais il finit souvent par l’oublier."
          alpha_sapphire: "Goinfrex cache de la nourriture dans sa fourrure en pagaille.\nIl avale tout en une bouchée."
        it:
          omega_ruby: "Nasconde il cibo sotto i lunghi peli del suo corpo. Tuttavia,\nfinisce spesso per dimenticarlo."
          alpha_sapphire: "Nasconde il cibo sotto il pelo arruffato. Lo inghiotte senza\nmasticarlo: glop!"
        de:
          omega_ruby: "Unter seinem langen Fell versteckt es Nahrung. Aber es\nvergisst, dass es sie dort versteckt hat."
          alpha_sapphire: "Unter seinem struppigen Fell trägt es Nahrung mit sich herum.\nDann verschlingt es sie in einem Happs."
        es:
          omega_ruby: "Esconde comida bajo el largo pelo de su cuerpo, pero más\ntarde lo olvida."
          alpha_sapphire: "En el interior de su pelaje revuelto esconde la comida que\nluego engullirá de una vez."
        ko:
          omega_ruby: "몸의 긴 털 안쪽에\n먹이를 숨기는 습성이 있다.\n숨긴 것을 잊어버린다."
          alpha_sapphire: "부스스한 털 안에\n먹이를 숨겨서 갖고 다닌다.\n먹을 때는 꿀꺽 통째로 삼킨다."
riolu:
