          omega_ruby: "L’épaisse fourrure cotonneuse de Wattouat se charge\nd’électricité statique lorsqu’on la frotte. Plus elle est chargée,\nplus l’ampoule au bout de sa queue est lumineuse."
          alpha_sapphire: "L’épaisse fourrure cotonneuse de Wattouat se charge\nd’électricité statique lorsqu’on la frotte. Plus elle est chargée,\nplus l’ampoule au bout de sa queue est lumineuse."
        it:
          omega_ruby: "Il morbido manto lanoso di Mareep genera una carica\nelettrostatica mediante sfregamento. La luminosità\ndella lampadina sulla punta della coda dipende dalla\npotenza della carica elettrica."
          alpha_sapphire: "Il morbido manto lanoso di Mareep genera una carica\nelettrostatica mediante sfregamento. La luminosità\ndella lampadina sulla punta della coda dipende dalla\npotenza della carica elettrica."
        de:
          omega_ruby: "Voltilamms flauschiges, wollenes Fell erzeugt Reibung und\nstatische Aufladung. Je höher die elektrische Ladung wird,\ndesto heller leuchtet die Glühbirne an seinem Schweif."
          alpha_sapphire: "Voltilamms flauschiges, wollenes Fell erzeugt Reibung und\nstatische Aufladung. Je höher die elektrische Ladung wird,\ndesto heller leuchtet die Glühbirne an seinem Schweif."
        es:
          omega_ruby: "Mareep tiene un pelaje lanudo suave que produce carga\nestática por el roce. Cuanto más se carga de electricidad\nestática, más brilla la bombilla que tiene en el extremo de la\ncola."
          alpha_sapphire: "Mareep tiene un pelaje lanudo suave que produce carga\nestática por el roce. Cuanto más se carga de electricidad\nestática, más brilla la bombilla que tiene en el extremo de la\ncola."
        ko:
          omega_ruby: "털의 마찰로 정전기가 모인다.\n전력이 많이 모일수록 꼬리\n끝에 붙은 전구가 밝게 빛난다."
          alpha_sapphire: "털의 마찰로 정전기가 모인다.\n전력이 많이 모일수록 꼬리\n끝에 붙은 전구가 밝게 빛난다."
