          alpha_sapphire: "栄養　満点の　タマゴを　毎日　産む。\n食欲を　無くした　人でも　ペロリと\n食べてしまうほど　美味しい　タマゴだ。"
        en:
          omega_ruby: "Chansey lays nutritionally excellent eggs on an everyday basis.\nThe eggs are so delicious, they are easily and eagerly\ndevoured by even those people who have lost their appetite."
