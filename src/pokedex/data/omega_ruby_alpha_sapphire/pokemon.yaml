regirock:
  species_id: 377
  names:
    jp_kana: レジロック
    jp_kanji: レジロック
    en: Regirock
    fr: Regirock
    it: Regirock
    de: Regirock
    es: Regirock
    ko: 레지락
  forms:
    regirock:
      form_id: 0
      base_stats:
        hp: 80
        attack: 100
        defense: 200
        special_attack: 50
        special_defense: 100
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 3
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - undiscovered
      abilities:
        - clear_body
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          omega_ruby: "むかし　ひとに　ふういんされた　ポケモン。\nたたかいで　からだが　くずれると　じぶんで\nあたらしい　いわを　さがして　なおすと　いう。"
          alpha_sapphire: "からだを　つくっている　がんせきは　すべて\nちがう　とちから　ほりだされた　ものであると\nさいきんの　けんきゅうで　はんめいした。"
        jp_kanji:
          omega_ruby: "昔　人に　封印された　ポケモン。\n戦いで　体が　崩れると　自分で\n新しい　岩を　探して　直すと　いう。"
          alpha_sapphire: "体を　つくっている　岩石は　すべて\n違う　土地から　掘り出された　ものであると\n最近の　研究で　判明した。"
        en:
          omega_ruby: "Regirock was sealed away by people long ago. If this\nPokémon’s body is damaged in battle, it is said to seek\nout suitable rocks on its own to repair itself."
          alpha_sapphire: "Regirock’s body is composed entirely of rocks. Recently,\na study made the startling discovery that the rocks were all\nunearthed from different locations."
        fr:
          omega_ruby: "Regirock fut isolé par les gens il y a très longtemps.\nLorsque le corps de ce Pokémon est endommagé\nau combat, on raconte qu’il cherche des rochers pour\nse réparer."
          alpha_sapphire: "Le corps de Regirock est entièrement constitué de rochers.\nRécemment, une étude a découvert que ces rochers\nprovenaient de lieux très variés."
        it:
          omega_ruby: "Molto tempo fa Regirock era stato imprigionato dagli esseri\numani. Se subisce danni in lotta, cerca nuove rocce adatte\nper riparare le rotture."
          alpha_sapphire: "Il corpo di Regirock è formato interamente da pietre.\nDa un recente studio è emerso che ogni pietra proviene\nda un luogo diverso."
        de:
          omega_ruby: "Regirock wurde vor langer Zeit von Menschen\nweggeschlossen. Wenn der Körper dieses Pokémon\nim Kampf Schaden nimmt, sucht es nach passenden\nSteinen, um sich selbst zu reparieren."
          alpha_sapphire: "Regirocks Körper besteht komplett aus Steinen.\nErst kürzlich stellte man erstaunt fest, dass die\nSteine alle an unterschiedlichen Orten ausgegraben\nwurden."
        es:
          omega_ruby: "A Regirock lo mantuvieron encerrado y aislado hace tiempo.\nDicen que, si resulta dañado en combate, se pone él mismo\na buscar piedras parecidas a las suyas y se las pone para\nrecomponerse."
          alpha_sapphire: "Regirock está formado en su totalidad por piedras. En un\nestudio reciente, se descubrió que cada una de las piedras\nhabía sido desenterrada en sitios distintos."
        ko:
          omega_ruby: "오래전 사람에게 봉인된 포켓몬이다.\n싸움으로 몸이 부서지면 스스로\n새로운 바위를 찾아서 고친다고 한다."
          alpha_sapphire: "몸을 이루고 있는 암석은 모두\n다른 땅에서 파내진 것들이라고\n최근 연구를 통해 판명됐다."
