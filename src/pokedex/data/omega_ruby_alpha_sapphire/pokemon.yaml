      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - super_luck
      hidden_ability: rivalry
      descriptions:
        jp_kana:
          omega_ruby: "ハトーボーの　すむ　もりの　おくには\nあらそいのない　へいわな　くにが\nあると　しんじられている。"
          alpha_sapphire: "せかいの　どこに　いても\nじぶんの　すの　ばしょは　わかるので\nトレーナーとも　はぐれたりしない。"
        jp_kanji:
          omega_ruby: "ハトーボーの　住む　森の　奥には\n争いのない　平和な　国が　あると\n信じられている。"
          alpha_sapphire: "世界の　どこに　いても\n自分の　巣の　場所は　わかるので\nトレーナーとも　はぐれたりしない。"
        en:
          omega_ruby: "Many people believe that, deep in the forest where\nTranquill live, there is a peaceful place where there\nis no war."
          alpha_sapphire: "No matter where in the world it goes, it knows\nwhere its nest is, so it never gets separated from\nits Trainer."
        fr:
          omega_ruby: "On dit que tout au fond de la forêt où il vit, il y aurait un pays\npaisible qui n’a jamais connu la guerre."
          alpha_sapphire: "Quel que soit le lieu où il se trouve, il arrive toujours\nà retrouver son Dresseur comme son propre nid."
        it:
          omega_ruby: "Si dice che nel cuore della foresta in cui vive Tranquill si trovi\nun paese che non conosce conflitti."
          alpha_sapphire: "Dovunque si trovi, è sempre in grado di ritrovare il suo nido.\nAllo stesso modo, non perde mai di vista il suo Allenatore."
        de:
          omega_ruby: "Viele Leute glauben, dass es tief in seinem heimatlichen Wald\nein Land der Harmonie gibt, wo man keine Kriege kennt."
          alpha_sapphire: "Findet selbst von der anderen Seite des Globus zu seinem\nNest zurück. Nichts kann es von seinem Trainer trennen."
        es:
          omega_ruby: "Según los rumores, en lo más profundo del bosque donde\nmora Tranquill, hay un mundo pacífico y exento de luchas."
          alpha_sapphire: "Puede regresar sin problema alguno a su nido desde cualquier\nlugar del globo y jamás se separa de quien lo entrena."
        ko:
          omega_ruby: "유토브가 사는 숲 속에는\n싸움이 없는 평화로운 나라가\n있다고 믿어진다."
          alpha_sapphire: "세계 어디에 있어도\n자신의 둥지가 있는 곳을 알 수 있어\n트레이너를 잃어버리지 않는다."
unfezant:
