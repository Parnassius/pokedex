          alpha_sapphire: "なかまと　あそんでいるとき　おたがいの　でんきが\nショートして　ひばなを　だす　ことが　あるぞ。\nひばなに　びっくり　すると　なきだしてしまうよ。"
        jp_kanji:
          omega_ruby: "雷雲が　でている　ときや　空気の\n乾燥した　日は　電気が　たまりやすい。\nパチパチ　静電気の　音が　鳴っているよ。"
          alpha_sapphire: "仲間と　遊んでいるとき　お互いの　電気が\nショートして　火花を　出す　ことが　あるぞ。\n火花に　びっくり　すると　泣き出してしまうよ。"
        en:
          omega_ruby: "Pichu charges itself with electricity more easily on days with\nthunderclouds or when the air is very dry. You can hear the\ncrackling of static electricity coming off this Pokémon."
          alpha_sapphire: "When Pichu plays with others, it may short out electricity with\nanother Pichu, creating a shower of sparks. In that event, this\nPokémon will begin crying, startled by the flash of sparks."
        fr:
          omega_ruby: "Pichu se charge plus facilement en électricité les jours d’orage\nou lorsque l’air est très sec. On peut entendre le crépitement\nde l’électricité statique générée par ce Pokémon."
          alpha_sapphire: "Lorsque Pichu joue, il lui arrive de faire des courts-circuits\navec un autre Pichu, créant ainsi une gerbe d’étincelles.\nDu coup, ce Pokémon prend peur et se met à pleurer."
        it:
          omega_ruby: "Pichu si carica di elettricità più facilmente in caso di cielo\ncoperto da nubi temporalesche o aria molto secca. Spesso\nsi può percepire lo scoppiettio della sua carica elettrostatica."
          alpha_sapphire: "Quando Pichu gioca con i suoi simili, la sua elettricità crea\nuna pioggia di scintille, scontrandosi con quella degli altri.\nIn questo caso, inizia a lacrimare accecato dalla luce\ndelle scintille."
        de:
          omega_ruby: "An Gewittertagen oder Tagen, an denen die Luft sehr trocken\nist, kann sich Pichu leichter mit Elektrizität aufladen. Dann kann\nman das Knistern statischer Aufladung hören."
          alpha_sapphire: "Wenn Pichu mit anderen spielt, kann es einen Kurzschluss\nmit einem seiner Artgenossen erzeugen, sodass die Funken\nsprühen. Dann beginnt es zu weinen, weil es vor den Funken\nerschrickt."
        es:
          omega_ruby: "A Pichu le resulta más fácil cargarse de electricidad en días\nde nubarrones o cuando sopla un aire muy seco. Es posible\noír la electricidad estática que emana de este Pokémon."
          alpha_sapphire: "Cuando Pichu juega con otros, puede liberar electricidad y\nproducir una auténtica lluvia de chispas. Cuando esto ocurre,\nchilla asustado por tanta chispa."
        ko:
          omega_ruby: "번개 구름이 있을 때나 공기가\n건조한 날은 전기가 쉽게 모인다.\n타다닥 정전기 소리가 난다."
          alpha_sapphire: "동료와 놀고 있을 때 서로의 전기가\n합선되어 불꽃이 일어나는 일이 있다.\n불꽃에 깜짝 놀라면 울기 시작한다."
