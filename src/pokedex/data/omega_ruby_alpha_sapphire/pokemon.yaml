      descriptions:
        jp_kana:
          omega_ruby: "たいあたりで　５０トンの　せんしゃを\nひっくりかえす　パワー。じぶんが\nたてと　なって　なかまを　まもる。"
          alpha_sapphire: "かおの　まえで　こぶしを　あわせて\nぼうぎょの　ポーズを　とると\nばくだんの　ちょくげきも　たえる。"
        jp_kanji:
          omega_ruby: "体当たりで　５０トンの　戦車を\nひっくり返す　パワー。\n自分が　盾となって　仲間を　守る。"
          alpha_sapphire: "顔の　前で　こぶしを　合わせて\n防御の　ポーズを　とると\n爆弾の　直撃も　耐える。"
        en:
          omega_ruby: "Its Tackle is forceful enough to flip a 50-ton tank.\nIt shields its allies from danger with its own body."
          alpha_sapphire: "When it takes a defensive posture with its fists\nguarding its face, it could withstand a bomb blast."
        fr:
          omega_ruby: "Il est si puissant qu’il pourrait renverser un char de 50 t\nd’un seul assaut. Il se sert de son corps comme d’un bouclier\npour protéger ses alliés."
          alpha_sapphire: "Il se défend en joignant ses poings devant son visage.\nDans cette posture, il peut même résister à l’onde de choc\nd’une explosion."
        it:
          omega_ruby: "Attaccando può rovesciare un carro armato da 50 t. Protegge\ngli alleati facendo loro scudo con il proprio corpo."
          alpha_sapphire: "In posizione difensiva, con i pugni in guardia, è in grado\ndi resistere persino a un’esplosione diretta."
        de:
          omega_ruby: "Es ist so stark, dass es selbst 50 t schwere Panzer umkippen\nkann. Es schützt seine Artgenossen, indem es sich ihnen als\nSchild anbietet."
          alpha_sapphire: "Wenn es seine Fäuste vors Gesicht hält und so eine\nVerteidigungshaltung einnimmt, kann es selbst eine\nExplosion überstehen."
        es:
          omega_ruby: "Su fuerza es tal que, de un empellón, puede hacer volcar un\ntanque de 50 toneladas. Protege a sus aliados cuando hace\nde escudo."
          alpha_sapphire: "Cuando adopta una postura defensiva juntando ambos puños\ndelante de la cara, es capaz de resistir incluso el impacto\ndirecto de una bomba."
        ko:
          omega_ruby: "몸통박치기로 50톤 전차를\n뒤집는 파워를 지녔다. 자신이\n방패가 되어 동료를 지킨다."
          alpha_sapphire: "얼굴 앞에 주먹을 맞대어\n방어 포즈를 취하면\n폭탄의 직격도 견뎌낸다."
fennekin:
  species_id: 653
  names:
    jp_kana: フォッコ
    jp_kanji: フォッコ
