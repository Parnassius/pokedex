gourgeist:
  species_id: 711
  names:
    jp_kana: パンプジン
    jp_kanji: パンプジン
    en: Gourgeist
    fr: Banshitrouye
    it: Gourgeist
    de: Pumpdjinn
    es: Gourgeist
    ko: 펌킨인
  forms:
    gourgeist_medium_variety:
      form_id: 0
      names:
        jp_kana: ふつうのサイズ
        jp_kanji: ふつうのサイズ
        en: Average Size
        fr: Taille Normale
        it: Normale
        de: Größe M
        es: Tamaño Normal
        ko: 보통 사이즈
      base_stats:
        hp: 65
        attack: 90
        defense: 122
        special_attack: 58
        special_defense: 75
        speed: 84
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - amorphous
      abilities:
        - pickup
        - frisk
      hidden_ability: insomnia
      descriptions:
        jp_kana:
          omega_ruby: "しんげつの　よるに　ぶきみな　こえで\nうたいながら　まちなかを　さまよう。\nその　うたを　きくと　のろわれる。"
          alpha_sapphire: "かみのけのような　うでで　えものを\nしめつける。くるしむ　ようすを\nみながら　たのしそうに　うたうのだ。"
        jp_kanji:
          omega_ruby: "新月の　夜に　不気味な　声で\n歌いながら　街中を　さまよう。\nその歌を　聞くと　のろわれる。"
          alpha_sapphire: "髪の毛のような　腕で　獲物を\n締めつける。苦しむ　様子を　見ながら\n楽しそうに　歌うのだ。"
        en:
          omega_ruby: "Singing in eerie voices, they wander\ntown streets on the night of the new moon.\nAnyone who hears their song is cursed."
          alpha_sapphire: "It enwraps its prey in its hairlike arms.\nIt sings joyfully as it observes the\nsuffering of its prey."
        fr:
          omega_ruby: "Les nuits de nouvelle lune, ce Pokémon erre dans les rues\nen chantant d’une voix lugubre. Ceux qui l’entendent sont\nmaudits."
          alpha_sapphire: "Il enserre ses proies dans ses bras, semblables à\nde longues mèches de cheveux. Il se délecte de\nleur souffrance en chantonnant gaiement."
        it:
          omega_ruby: "Vaga per le città nelle notti di luna nuova intonando\nuna melodia sinistra. Chi la ascolta, viene colpito da\nuna maledizione."
          alpha_sapphire: "Intrappola le prede con i suoi arti simili a capelli e canta\ndolcemente mentre queste si dibattono per liberarsi."
        de:
          omega_ruby: "Unter unheimlichen Gesängen durchstreift es in\nNeumondnächten Städte und Dörfer. Wer dem\nunheilvollen Gesang lauscht, wird verflucht."
          alpha_sapphire: "Mit seinen haarähnlichen Armen erfasst es seine Beute\nund stimmt angesichts deren offenkundiger Qualen freudig\nein Lied an."
        es:
          omega_ruby: "En las noches de luna nueva deambula por las calles de las\nciudades y emite espeluznantes alaridos que maldicen a\nquienes los oyen."
          alpha_sapphire: "Atrapa a su presa con los brazos, que parecen formar sendas\nmatas de pelo, y entona una alegre canción mientras se\nregodea con su sufrimiento."
        ko:
          omega_ruby: "초승달이 뜬 밤에 기분 나쁜 목소리로\n노래를 부르며 마을 안을 헤맨다.\n그 노래를 들으면 저주를 받는다."
          alpha_sapphire: "머리카락 같은 팔로 사냥감을\n조른다. 괴로워하는 모습을\n지켜보며 즐거운 듯 노래한다."
