        jp_kana:
          omega_ruby: "もりの　なかの　みずべで　くらす。\nひるまは　もりの　そとに　でて\nこうらの　きに　ひかりを　あてる。"
          alpha_sapphire: "きれいな　みずが　わきでる　ばしょを\nしっていて　なかまの　ポケモンを\nせなかに　のせて　そこまで　はこぶ。"
        jp_kanji:
          omega_ruby: "森の　中の　水辺で　暮らす。\n昼間は　森の　外に　出て\n甲羅の　木に　光を　当てる。"
          alpha_sapphire: "きれいな　水が　わき出る　場所を\n知っていて　仲間の　ポケモンを\n背中に　乗せて　そこまで　運ぶ。"
        en:
          omega_ruby: "It lives along water in forests. In the daytime,\nit leaves the forest to sunbathe its treed shell."
          alpha_sapphire: "It knows where pure water wells up. It carries fellow\nPokémon there on its back."
        fr:
          omega_ruby: "Il vit en forêt près de l’eau. En journée, il la quitte pour dorer\nsa carapace feuillue au soleil."
          alpha_sapphire: "Il sait d’instinct où trouver une source d’eau pure.\nIl y transporte d’autres Pokémon sur son dos."
        it:
          omega_ruby: "Vive nelle foreste vicino all’acqua, ma esce di giorno per far\nprendere sole alle piante sul guscio."
          alpha_sapphire: "Sa come trovare sorgenti incontaminate, dove porta i Pokémon\namici tenendoli sulla schiena."
        de:
          omega_ruby: "Es lebt in der Nähe von Wasser in Wäldern. Tagsüber verlässt\nes diese, um ein Sonnenbad zu nehmen."
          alpha_sapphire: "Es weiß, wo es reinstes Quellwasser finden kann.\nTrägt andere Pokémon auf seinem Rücken dorthin."
        es:
          omega_ruby: "Vive en los bosques cerca del agua. Por el día, sale a que les\ndé el sol a las plantas de su espalda."
          alpha_sapphire: "Sabe dónde encontrar manantiales de agua pura y lleva a\nlos Pokémon amigos hasta allí en su lomo."
        ko:
          omega_ruby: "숲 속의 물가에서 산다.\n낮에는 숲 밖으로 나와서\n등껍질의 나무에 빛을 쬔다."
          alpha_sapphire: "깨끗한 물이 솟아나는 장소를\n알고 있어서 동료 포켓몬을\n등에 태우고 그곳까지 데려다 준다."
torterra:
  species_id: 389
  names:
    jp_kana: ドダイトス
    jp_kanji: ドダイトス
    en: Torterra
    fr: Torterra
    it: Torterra
    de: Chelterrar
    es: Torterra
    ko: 토대부기
  forms:
