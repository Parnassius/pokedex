        en:
          omega_ruby: "Farfetch’d is always seen with a stalk from a plant of some\nsort. Apparently, there are good stalks and bad stalks. This\nPokémon has been known to fight with others over stalks."
          alpha_sapphire: "Farfetch’d is always seen with a stalk from a plant of some\nsort. Apparently, there are good stalks and bad stalks. This\nPokémon has been known to fight with others over stalks."
        fr:
          omega_ruby: "On voit souvent des Canarticho avec une tige, récupérée sur\nune plante quelconque. Apparemment, ils peuvent distinguer\nles bonnes des mauvaises. On a vu ces Pokémon se battre\npour des histoires de tiges."
          alpha_sapphire: "On voit souvent des Canarticho avec une tige, récupérée sur\nune plante quelconque. Apparemment, ils peuvent distinguer\nles bonnes des mauvaises. On a vu ces Pokémon se battre\npour des histoires de tiges."
        it:
          omega_ruby: "Farfetch’d ha sempre con sé il gambo di qualche pianta.\nPare che alcuni gambi siano migliori di altri. Spesso lotta\ncon altri Pokémon per avere i gambi migliori."
          alpha_sapphire: "Farfetch’d ha sempre con sé il gambo di qualche pianta.\nPare che alcuni gambi siano migliori di altri. Spesso lotta\ncon altri Pokémon per avere i gambi migliori."
        de:
          omega_ruby: "Porenta trifft man immer mit einer Lauchstange an. Es gibt\ngute und schlechte Stangen. Dieses Pokémon kämpft mit\nHilfe seiner Stange gegen seine Gegner."
          alpha_sapphire: "Porenta trifft man immer mit einem Pflanzenstängel an,\ndessen Qualität unterschiedlich ausfallen kann.\nVon diesem Pokémon wird behauptet, es kämpfe gegen\ndie eigenen Artgenossen um die besten Stängel."
        es:
          omega_ruby: "Al parecer, entre los puerros que suelen llevar los Farfetch’d,\nlos hay mejores y peores. A estos Pokémon se les ha visto\nluchar entre ellos por los mejores puerros."
          alpha_sapphire: "Al parecer, entre los puerros que suelen llevar los Farfetch’d,\nlos hay mejores y peores. A estos Pokémon se les ha visto\nluchar entre ellos por los mejores puerros."
        ko:
          omega_ruby: "가지고 있는 식물의 줄기에도 좋은 것과\n그렇지 않은 것이 있는 듯하여 파오리들이\n줄기를 둘러싸고 싸우는 일도 있다."
          alpha_sapphire: "가지고 있는 식물의 줄기에도 좋은 것과\n그렇지 않은 것이 있는 듯하여 파오리들이\n줄기를 둘러싸고 싸우는 일도 있다."
