        jp_kana:
          omega_ruby: "からだの　なかに　かざんを　もつ　ポケモンだ。\nからだに　たまった　せっし　１まんどの　マグマを\nときどき　せなかの　コブから　ふきあげている。"
          alpha_sapphire: "せなかの　コブは　ほねが　かたちを　かえたもの。\nにえたぎった　マグマを　ときどき　ふきあげる。\nおこった　ときに　よく　ふんかする　らしい。"
        jp_kanji:
          omega_ruby: "体の　中に　火山を　持つ　ポケモンだ。\n体に　たまった　摂氏　１万度の　マグマを\n時々　背中の　コブから　噴き上げている。"
          alpha_sapphire: "背中の　コブは　骨が　形を　変えたもの。\n煮えたぎった　マグマを　時々　噴き上げる。\n怒った　ときに　よく　噴火する　らしい。"
        en:
          omega_ruby: "Camerupt has a volcano inside its body. Magma of\n18,000 degrees Fahrenheit courses through its body.\nOccasionally, the humps on this Pokémon’s back erupt,\nspewing the superheated magma."
          alpha_sapphire: "The humps on Camerupt’s back are formed by a transformation\nof its bones. They sometimes blast out molten magma.\nThis Pokémon apparently erupts often when it is enraged."
        fr:
          omega_ruby: "Le corps de Camérupt renferme un volcan. Du magma\nà 10 000 °C coule dans ses veines. De temps en temps,\nles bosses sur le dos de ce Pokémon entrent en éruption\net crachent le magma surchauffé."
          alpha_sapphire: "Les bosses sur le dos de Camérupt sont apparues après\nune déformation de ses os. Elles crachent parfois du magma\nen fusion. Ce Pokémon entre apparemment en éruption\nlorsqu’il est énervé."
        it:
          omega_ruby: "Camerupt ha un vulcano all’interno del proprio corpo.\nNelle sue vene scorre magma liquido a 10.000 °C.\nTalvolta le gobbe che ha sulla schiena eruttano, espellendo\nmagma rovente."
          alpha_sapphire: "Le gobbe sulla schiena di Camerupt si sono formate dalla\ntrasformazione delle sue ossa. Talvolta emettono magma fuso.\nPare che questo Pokémon erutti spesso quando è infuriato."
        de:
          omega_ruby: "Camerupt trägt einen Vulkan in seinem Körper. 10 000 °C\nheißes Magma fließt in ihm. Manchmal brechen die Höcker auf\nseinem Rücken aus und verspucken glühend heißes Magma."
          alpha_sapphire: "Die Höcker auf Camerupts Rücken sind durch eine\nTransformation seiner Knochen entstanden. Hin und\nwieder stoßen sie Magma aus. Dieses Pokémon bricht\nhäufig aus, wenn es wütend ist."
        es:
          omega_ruby: "Camerupt encierra un volcán en su interior y magma de\n10 000 °C le recorre el cuerpo. A veces, las jorobas de la\nespalda entran en erupción y escupen el abrasivo magma."
          alpha_sapphire: "Las jorobas de Camerupt se originaron por una deformación\nde los huesos. A veces escupen magma líquido, sobre todo\ncuando el Pokémon se enfada."
        ko:
          omega_ruby: "몸 안에 화산을 지닌 포켓몬이다.\n몸에 모은 섭씨 1만 도의 마그마를\n가끔 등의 혹에서 뿜어 올리고 있다."
          alpha_sapphire: "등의 혹은 뼈가 변형된 것이다.\n펄펄 끓는 마그마를 가끔 뿜어 올린다.\n화났을 때 자주 분화하는 것 같다."
