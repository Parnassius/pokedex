      descriptions:
        jp_kana:
          omega_ruby: "からだの　なかでは　けつえきの　かわりに\nきょうりょくな　じりょくが　めぐっている。\nじりょくの　はどうで　なかまと　かいわする。"
          alpha_sapphire: "からだから　でている　じりょくと　ちきゅうの\nじりょくを　はんぱつさせて　ちゅうに　うかぶ。\nおしりの　ツメを　がけに　くいこませて　ねむる。"
        jp_kanji:
          omega_ruby: "体の　中では　血液の　代りに\n強力な　磁力が　巡っている。\n磁力の　波動で　仲間と　会話する。"
          alpha_sapphire: "体から　出ている　磁力と　地球の\n磁力を　反発させて　宙に　浮かぶ。\nお尻の　ツメを　崖に　食い込ませて　眠る。"
        en:
          omega_ruby: "Instead of blood, a powerful magnetic force courses\nthroughout Beldum’s body. This Pokémon communicates\nwith others by sending controlled pulses of magnetism."
          alpha_sapphire: "Beldum keeps itself floating by generating a magnetic force\nthat repels earth’s natural magnetism. When it sleeps, this\nPokémon anchors itself to a cliff using the hooks on its rear."
        fr:
          omega_ruby: "Au lieu du sang, une force magnétique très puissante coule\ndans les veines de Terhal. Ce Pokémon communique avec\nles autres en envoyant des pulsations magnétiques."
          alpha_sapphire: "Terhal peut léviter en générant un champ magnétique qui\nrepousse le magnétisme naturel de la terre. Lorsqu’il dort, ce\nPokémon s’ancre à une falaise grâce à ses crochets dorsaux."
        it:
          omega_ruby: "Al posto del sangue, il corpo di Beldum è attraversato da\nuna potente forza magnetica. Il Pokémon comunica con\ngli altri inviando impulsi magnetici controllati."
          alpha_sapphire: "Beldum fluttua nell’aria generando una forza magnetica\ncontraria alla naturale forza di gravità terrestre.\nQuando dorme, si ancora alle scogliere usando i suoi\nganci posteriori."
        de:
          omega_ruby: "Anstelle von Blut fließt eine starke magnetische Energie durch\nTanhels Körper. Dieses Pokémon kommuniziert mit anderen,\nindem es kontrollierte magnetische Impulse aussendet."
          alpha_sapphire: "Tanhel hält sich am Schweben, indem es eine magnetische\nKraft erzeugt, die dem Erdmagnetfeld entgegenwirkt.\nWenn es schläft, verankert sich dieses Pokémon mit den\nHaken an seinem Hinterteil an einem Felsen."
        es:
          omega_ruby: "En lugar de sangre, Beldum tiene una poderosa fuerza\nmagnética corriéndole por las venas. Este Pokémon se\ncomunica enviando controlados impulsos magnéticos."
          alpha_sapphire: "Beldum se mantiene flotando en el aire gracias a la fuerza\nmagnética que genera y que repele la gravedad. Para dormir,\neste Pokémon se ancla a los riscos usando los ganchos que\ntiene."
        ko:
          omega_ruby: "몸 안에는 혈액 대신에\n강력한 자력이 돌고 있다.\n자력의 파동으로 동료와 대화한다."
          alpha_sapphire: "몸에서 나오는 자력과 지구의\n자력을 반발시켜 공중에 뜬다.\n엉덩이의 발톱을 절벽에 박고 잔다."
