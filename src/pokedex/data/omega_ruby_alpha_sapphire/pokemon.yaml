      descriptions:
        jp_kana:
          omega_ruby: "まっくらな　どうくつで　くらす。\n２０まんヘルツの　ちょうおんぱを\nおおきな　みみから　はっしゃする。"
          alpha_sapphire: "２０まんヘルツの　ちょうおんぱを\nあびると　くっきょうな　レスラーも\nめが　まわり　たっていられないのだ。"
        jp_kanji:
          omega_ruby: "真っ暗な　洞窟で　暮らす。\n２０万ヘルツの　超音波を\n大きな　耳から　発射する。"
          alpha_sapphire: "２０万ヘルツの　超音波を　浴びると\n屈強な　レスラーも　目が　回り\n立っていられないのだ。"
        en:
          omega_ruby: "They live in pitch-black caves. Their enormous ears\ncan emit ultrasonic waves of 200,000 hertz."
          alpha_sapphire: "Even a robust wrestler will become\ndizzy and unable to stand when exposed\nto its 200,000-hertz ultrasonic waves."
        fr:
          omega_ruby: "Il apprécie les grottes les plus sombres. Ses grandes oreilles\nlui permettent de générer des ultrasons d’une fréquence\nde 200 000 Hz."
          alpha_sapphire: "Les ultrasons à 200 000 Hz qu’il émet suffiraient à rendre\ngroggy le plus chevronné des lutteurs."
        it:
          omega_ruby: "Vive in caverne completamente buie. Emette onde ultrasoniche\nalla frequenza di 200.000 Hz dalle grandi orecchie."
          alpha_sapphire: "Questo Pokémon emette ultrasuoni a 200.000 Hz in grado\ndi stordire e stendere anche un lottatore professionista."
        de:
          omega_ruby: "Es lebt im Inneren pechschwarzer Höhlen. Seine riesigen\nOhren setzen Ultraschallwellen von 200 000 Hz frei."
          alpha_sapphire: "Selbst ein gestandener Ringer geht bei den 200 000 Hz\nhohen Ultraschallwellen dieses Pokémon unweigerlich in\ndie Knie."
        es:
          omega_ruby: "Habita en cuevas donde reina la más absoluta oscuridad y\nemite ondas ultrasónicas de 200 000 Hz a través de sus\nenormes orejas."
          alpha_sapphire: "Ni el más recio de los luchadores profesionales sería capaz de\naguantar sus ondas ultrasónicas de 200 000 Hz sin marearse\ne hincar la rodilla."
        ko:
          omega_ruby: "캄캄한 동굴에서 산다.\n20만 Hz의 초음파를\n커다란 귀에서 발사한다."
          alpha_sapphire: "20만 Hz의 초음파를 받으면\n막강한 레슬러도 현기증이 나\n서 있을 수 없다."
noivern:
  species_id: 715
  names:
    jp_kana: オンバーン
    jp_kanji: オンバーン
    en: Noivern
    fr: Bruyverne
    it: Noivern
    de: UHaFnir
    es: Noivern
    ko: 음번
