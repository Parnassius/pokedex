          omega_ruby: "トゲの　たくさん　ついた　しっぽを\nあいてに　たたきつけて　こうげき。\nきしょうの　はげしい　ポケモン。"
          alpha_sapphire: "きしょうが　はげしく　トゲの　ついた\nしっぽを　ふりまわして　たたかう。\nあたまの　はっぱは　とても　にがい。"
        jp_kanji:
          omega_ruby: "トゲの　たくさん　ついた　尻尾を\n相手に　たたきつけて　攻撃。\n気性の　激しい　ポケモン。"
          alpha_sapphire: "気性が　激しく　トゲの　ついた\n尻尾を　振り回して　戦う。\n頭の　葉っぱは　とても　苦い。"
        en:
          omega_ruby: "It attacks enemies with strikes of its thorn-covered\ntail. This Pokémon is wild tempered."
          alpha_sapphire: "Ill tempered, it fights by swinging its barbed tail\naround wildly. The leaf growing on its head is\nvery bitter."
        fr:
          omega_ruby: "Il frappe ses ennemis avec sa queue couverte de pointes.\nUn Pokémon au caractère agressif."
          alpha_sapphire: "Il a un tempérament violent et se bat avec sa queue\npleine d’épines. La feuille sur sa tête est très amère."
        it:
          omega_ruby: "Attacca il nemico colpendolo con la coda piena di aculei.\nPokémon dal carattere impetuoso."
          alpha_sapphire: "Di carattere impetuoso, lotta roteando la coda dotata di aculei.\nLe foglie che ha sul capo sono molto amare."
        de:
          omega_ruby: "Wer sich mit diesem temperamentvollen Pokémon anlegt,\nbekommt seinen mit Dornen bestückten Schweif zu spüren."
          alpha_sapphire: "Ein hitziger Geselle, der im Kampf seinen dornigen Schweif\numherschwingt. Auf seinem Kopf wachsen bittere Kräuter."
        es:
          omega_ruby: "Ataca estampando las espinas de su cola en el enemigo. Es\nun Pokémon con mucho temperamento."
          alpha_sapphire: "Pokémon muy temperamental que lucha con su cola revestida\nde púas. Las hojas de su cabeza están muy amargas."
        ko:
          omega_ruby: "가시가 잔뜩 박힌 꼬리를\n상대에게 힘껏 쳐서 공격한다.\n기질이 격한 포켓몬이다."
          alpha_sapphire: "기질이 격하여 가시가 박힌\n꼬리를 휘두르며 싸운다.\n머리의 잎사귀는 매우 쓰다."
