hoopa:
  species_id: 720
  names:
    jp_kana: フーパ
    jp_kanji: フーパ
    en: Hoopa
    fr: Hoopa
    it: Hoopa
    de: Hoopa
    es: Hoopa
    ko: 후파
  forms:
    hoopa_confined:
      form_id: 0
      names:
        jp_kana: いましめられしフーパ
        jp_kanji: いましめられしフーパ
        en: Hoopa Confined
        fr: Hoopa Enchaîné
        it: Hoopa Vincolato
        de: Gebanntes Hoopa
        es: Hoopa Contenido
        ko: 굴레에 빠진 후파
      base_stats:
        hp: 80
        attack: 110
        defense: 60
        special_attack: 150
        special_defense: 130
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - ghost
      egg_groups:
        - undiscovered
      abilities:
        - magician
      descriptions:
        jp_kana:
          omega_ruby: "しんのすがたは　きょだいな　ちからを　もっている。\nざいほう　ほしさに　それが　かくされた　しろ　ごと\nひきぬき　うばいさった　という　でんせつが　ある。"
          alpha_sapphire: "６つの　リングと　６つの　きょだいな　うで　で\nあらゆるものを　うばうと　いわれる。ちからを\nふうじられ　ちいさな　すがたに　かえられた。"
        jp_kanji:
          omega_ruby: "真の姿は　巨大な　力を　持っている。\n財宝　欲しさに　それが　隠された　城ごと\n引き抜き　奪い去った　という　伝説が　ある。"
          alpha_sapphire: "６つの　リングと　６つの　巨大な腕で\nあらゆるものを　奪うと　いわれる。\n力を　封じられ　小さな姿に　変えられた。"
        en:
          omega_ruby: "In its true form, it possess a huge amount of power.\nLegends of its avarice tell how it once carried off\nan entire castle to gain the treasure hidden within."
          alpha_sapphire: "It is said to be able to seize anything it desires\nwith its six rings and six huge arms. With its power\nsealed, it is transformed into a much smaller form."
        fr:
          omega_ruby: "Il possède une puissance considérable sous son apparence\nvéritable. Une légende raconte qu’il désirait si fort un trésor\ncaché dans un château qu’il déroba l’édifice tout entier."
          alpha_sapphire: "On raconte que grâce à ses six anneaux et ses six énormes\nbras, il est capable de dérober tout ce qui lui plaît.\nMais son pouvoir a été scellé, et il a été réduit à l’état\nd’un être minuscule."
        it:
          omega_ruby: "Quando assume la sua vera forma, acquisisce un’energia\nstraordinaria. Secondo la leggenda, è talmente bramoso di\ngioielli che può rubare un castello intero per impossessarsi\ndei suoi tesori."
          alpha_sapphire: "Si dice che possa rubare tutto ciò che vuole grazie\nai suoi sei anelli e alle sue sei enormi braccia.\nLa sua potenza è stata sigillata, riducendo di molto\nle sue dimensioni effettive."
        de:
          omega_ruby: "In seiner wahren Gestalt verfügt es über enorme Kräfte.\nLegenden zufolge hat es einst ein ganzes Schloss gestohlen,\nweil es den darin versteckten Schatz für sich haben wollte."
          alpha_sapphire: "Mit seinen sechs Ringen und seinen sechs riesigen Armen\nkann es alles an sich reißen, was es möchte. Wenn seine\nKraft versiegelt wird, nimmt es jedoch eine kleinere Gestalt an."
        es:
          omega_ruby: "En su forma original, este Pokémon posee una fuerza\ndescomunal. Una leyenda cuenta que una vez robó un tesoro\ndel interior de una fortaleza."
          alpha_sapphire: "Dicen que gracias a sus seis anillos y seis enormes brazos\npuede robar todo lo que se le antoja.\nAdquirió una forma reducida cuando alguien selló su poder."
        ko:
          omega_ruby: "진정한 모습일 때는 거대한 힘을 가지고 있다.\n원하는 재물을 손에 넣기 위해 그것이 숨겨진\n성을 통째로 빼돌려 사라졌다는 전설이 있다."
          alpha_sapphire: "6개의 링과 6개의 거대한 팔로\n수많은 것들을 빼앗는다고 전해진다. \n힘이 봉인되어 작은 모습으로 변했다."
