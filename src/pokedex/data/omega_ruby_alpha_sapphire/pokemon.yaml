        ko:
          omega_ruby: "맑은 날에는 바다 위를 우아하게 뛰어오르는\n만타인 무리를 볼 수 있다.\n총어가 들러붙어 있어도 신경 쓰지 않는다."
          alpha_sapphire: "맑은 날에는 바다 위를 우아하게 뛰어오르는\n만타인 무리를 볼 수 있다.\n총어가 들러붙어 있어도 신경 쓰지 않는다."
