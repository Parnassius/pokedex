          omega_ruby: "つぼみが　たいようの　ひかりを\nあびて　はなびらを　ひろげると\nかっぱつに　うごく　ように　なる。"
          alpha_sapphire: "つよい　ひざしを　かんじとると\nとざしていた　はなびらを　ひろげ\nぜんしんで　にっこうを　あびる。"
        jp_kanji:
          omega_ruby: "つぼみが　太陽の　光を　浴びて\n花びらを　広げると\n活発に　動くように　なる。"
          alpha_sapphire: "強い　日差しを　感じとると\n閉ざしていた　花びらを　広げ\n全身で　日光を　浴びる。"
        en:
          omega_ruby: "During times of strong sunlight, its bud blooms,\nits petals open fully, and it becomes very active."
          alpha_sapphire: "If it senses strong sunlight, it opens its folded\npetals to absorb the sun’s rays with its whole body."
        fr:
          omega_ruby: "Une fois gorgé de soleil, il déploie ses pétales et bouge\navec vivacité."
          alpha_sapphire: "Sous un grand soleil, il ouvre ses pétales pour en absorber\nles rayons."
        it:
          omega_ruby: "Sboccia quando si espone ai raggi solari, espandendo la\ncorolla e diventando molto attivo."
          alpha_sapphire: "Quando splende il sole, ama aprire i suoi petali per assorbire\ni raggi solari con tutto il corpo."
        de:
          omega_ruby: "Bei Sonnenschein entfaltet seine Knospe ihre Blütenblätter\nund es springt lebhaft umher."
          alpha_sapphire: "Spürt es Sonnenlicht, öffnet es seine Blütenblätter und nimmt\ndie Energie der Sonnenstrahlen auf."
        es:
          omega_ruby: "Cuando los rayos de sol inundan su capullo, abre de par en\npar sus pétalos y se vuelve muy dinámico."
          alpha_sapphire: "Cuando detecta luz solar fuerte, despliega los pétalos y\nabsorbe todos los rayos posibles."
        ko:
          omega_ruby: "봉오리가 태양의 빛을\n쬐어 꽃잎이 피면\n활발하게 움직일 수 있게 된다."
          alpha_sapphire: "강한 햇살을 느끼면\n움츠려 있던 꽃잎을 펼쳐\n전신으로 햇빛을 받는다."
