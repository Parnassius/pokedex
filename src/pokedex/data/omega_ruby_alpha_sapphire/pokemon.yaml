          alpha_sapphire: "しっぽの　ほのおは　きぶんを　ひょうげん。\nたのしい　ときには　ゆらゆら　ほのおが　ゆれて\nおこった　ときには　めらめら　さかんに　もえる。"
        jp_kanji:
          omega_ruby: "尻尾の　炎は　気分を　表現。\n楽しい　ときには　ゆらゆら　炎が　ゆれて\n怒った　ときには　めらめら　盛んに　燃える。"
          alpha_sapphire: "尻尾の　炎は　気分を　表現。\n楽しい　ときには　ゆらゆら　炎が　ゆれて\n怒った　ときには　めらめら　盛んに　燃える。"
        en:
          omega_ruby: "The flame that burns at the tip of its tail is an indication\nof its emotions. The flame wavers when Charmander\nis enjoying itself. If the Pokémon becomes enraged,\nthe flame burns fiercely."
          alpha_sapphire: "The flame that burns at the tip of its tail is an indication\nof its emotions. The flame wavers when Charmander\nis enjoying itself. If the Pokémon becomes enraged,\nthe flame burns fiercely."
        fr:
          omega_ruby: "La flamme qui brûle au bout de sa queue indique l’humeur\nde ce Pokémon. Elle vacille lorsque Salamèche est content.\nEn revanche, lorsqu’il s’énerve, la flamme prend\nde l’importance et brûle plus ardemment."
          alpha_sapphire: "La flamme qui brûle au bout de sa queue indique l’humeur\nde ce Pokémon. Elle vacille lorsque Salamèche est content.\nEn revanche, lorsqu’il s’énerve, la flamme prend\nde l’importance et brûle plus ardemment."
        it:
          omega_ruby: "La fiamma sulla punta della coda indica il suo stato emotivo.\nSe la fiamma ondeggia significa che Charmander si sta\ndivertendo. Quando il Pokémon si infuria, la fiamma arde\nviolentemente."
          alpha_sapphire: "La fiamma sulla punta della coda indica il suo stato emotivo.\nSe la fiamma ondeggia significa che Charmander si sta\ndivertendo. Quando il Pokémon si infuria, la fiamma arde\nviolentemente."
        de:
          omega_ruby: "Die Flamme auf seiner Schweifspitze zeigt seine\nGefühlslage an. Sie flackert, wenn Glumanda\nzufrieden ist. Wenn dieses Pokémon wütend wird,\nlodert die Flamme gewaltig."
          alpha_sapphire: "Die Flamme auf seiner Schweifspitze zeigt seine\nGefühlslage an. Sie flackert, wenn Glumanda\nzufrieden ist. Wenn dieses Pokémon wütend wird,\nlodert die Flamme sehr stark."
        es:
          omega_ruby: "La llama que tiene en la punta de la cola arde según sus\nsentimientos. Llamea levemente cuando está alegre y arde\nvigorosamente cuando está enfadado."
          alpha_sapphire: "La llama que tiene en la punta de la cola arde según sus\nsentimientos. Llamea levemente cuando está alegre y arde\nvigorosamente cuando está enfadado."
        ko:
          omega_ruby: "꼬리의 불꽃은 기분을 표현한다.\n즐거울 때는 흔들흔들 불꽃이 흔들리고\n화가 났을 때는 활활 맹렬히 불타오른다."
          alpha_sapphire: "꼬리의 불꽃은 기분을 표현한다.\n즐거울 때는 흔들흔들 불꽃이 흔들리고\n화가 났을 때는 활활 맹렬히 불타오른다."
