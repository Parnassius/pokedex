        jp_kana:
          omega_ruby: "ゆうがな　みかけに　よらず\nつばさで　ちからづよく　はばたき\nすうせんキロ　とびつづけられる。"
          alpha_sapphire: "よあけと　ともに　スワンナたちは\nおどりはじめる。まんなかで　おどる\nスワンナが　むれの　リーダー。"
        jp_kanji:
          omega_ruby: "優雅な　みかけに　よらず\n翼で　力強く　羽ばたき\n数千キロ　飛び続けられる。"
          alpha_sapphire: "夜明けと　ともに　スワンナたちは\n踊りはじめる。真ん中で　踊る\nスワンナが　群れの　リーダー。"
        en:
          omega_ruby: "Despite their elegant appearance, they can flap\ntheir wings strongly and fly for thousands of miles."
          alpha_sapphire: "Swanna start to dance at dusk. The one dancing in\nthe middle is the leader of the flock."
        fr:
          omega_ruby: "Un Pokémon gracieux, mais aussi robuste. Il peut voler\ndes milliers de kilomètres grâce à ses ailes puissantes."
          alpha_sapphire: "Ils se mettent à danser à la tombée de la nuit. Le Lakmécygne\nqui danse au centre est le chef de la troupe."
        it:
          omega_ruby: "Non è solo elegante. Con il poderoso battito d’ali riesce\na volare per migliaia di chilometri senza fermarsi."
          alpha_sapphire: "Gli Swanna iniziano a ballare quando sorge il sole. Il capo\ndel gruppo balla sempre al centro."
        de:
          omega_ruby: "Sie wirken zerbrechlich, aber ihre starken Schwingen tragen\nsie in einem Stück bis zu 1 000 km weit."
          alpha_sapphire: "Wenn der Morgen dämmert, fangen sie an zu tanzen.\nDas Swaroness in der Mitte führt die Gruppe an."
        es:
          omega_ruby: "Aunque no lo parezca por su grácil elegancia, puede batir con\nfuerza las alas y volar durante miles de kilómetros."
          alpha_sapphire: "Comienzan a danzar al amanecer. El líder de la bandada se\nsitúa en el centro."
        ko:
          omega_ruby: "우아한 외모와 다르게\n힘찬 날갯짓으로\n수천 km를 계속 날 수 있다."
          alpha_sapphire: "새벽이 오면 스완나들이\n춤추기 시작한다. 한가운데에서 춤추는\n스완나가 무리의 우두머리다."
vanillite:
  species_id: 582
  names:
    jp_kana: バニプッチ
    jp_kanji: バニプッチ
    en: Vanillite
    fr: Sorbébé
    it: Vanillite
    de: Gelatini
    es: Vanillite
    ko: 바닐프티
