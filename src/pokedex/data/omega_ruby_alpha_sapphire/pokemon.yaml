          omega_ruby: "からだの　ちゅうしんに　ある　コアと　よばれる\nぶぶんが　なないろに　かがやく　ことから\nうみのほうせき　という　べつめいを　つけられた。"
          alpha_sapphire: "ほしがたの　からだを　スクリューの　ように\nかいてんさせて　すいちゅうを　およぎまわる。\nちゅうおうに　ある　コアが　なないろに　ひかる。"
        jp_kanji:
          omega_ruby: "体の　中心に　ある　コアと　呼ばれる\n部分が　七色に　輝く　ことから\n海の宝石　という　別名を　つけられた。"
          alpha_sapphire: "星型の　体を　スクリューの　ように\n回転させて　水中を　泳ぎ回る。\n中央に　ある　コアが　七色に　光る。"
        en:
          omega_ruby: "Starmie’s center section—the core—glows brightly in seven\ncolors. Because of its luminous nature, this Pokémon has\nbeen given the nickname “the gem of the sea.”"
          alpha_sapphire: "Starmie swims through water by spinning its star-shaped\nbody as if it were a propeller on a ship. The core at the\ncenter of this Pokémon’s body glows in seven colors."
        fr:
          omega_ruby: "Le centre de Staross, son cœur, resplendit de sept\ndifférentes couleurs. Du fait de sa brillance naturelle,\non appelle ce Pokémon le « joyau des mers »."
          alpha_sapphire: "Staross nage en faisant tournoyer son corps en forme d’étoile,\nun peu à la manière d’une hélice de bateau. Le cœur au centre\ndu corps de ce Pokémon brille de sept couleurs."
        it:
          omega_ruby: "Il centro del corpo di Starmie, il suo nucleo, brilla in sette\ncolori. Per la sua luminosità è chiamato “Gemma del mare”."
          alpha_sapphire: "Starmie nuota roteando vorticosamente il corpo a stella come\nfosse l’elica di una nave. Il suo nucleo brilla in sette diversi\ncolori."
        de:
          omega_ruby: "Starmies Mittelteil, sein Kern, leuchtet in sieben Farben.\nAufgrund dieser Eigenschaft wird es auch „Juwel des Meeres“\ngenannt."
          alpha_sapphire: "Starmie kann schwimmen, indem es seinen sternförmigen\nKörper wie eine Schiffsschraube dreht. Der Kern in seiner\nKörpermitte leuchtet in sieben Farben."
        es:
          omega_ruby: "La parte central de Starmie, el núcleo brillante, resplandece\ncon siete colores distintos. Debido a su naturaleza luminosa, a\neste Pokémon se le ha dado el apelativo de la Gema del Mar."
          alpha_sapphire: "Starmie nada por el agua haciendo girar su cuerpo estrellado\na modo de hélice. El núcleo de este Pokémon brilla y llega a\ntornarse de siete colores."
        ko:
          omega_ruby: "몸의 중심에 있는 핵이라 불리는\n부분이 일곱 빛깔로 빛나기에\n바다의 보석이라는 별명이 붙었다."
          alpha_sapphire: "별 모양인 몸을 스크루처럼\n회전시켜 물속을 헤엄쳐 다닌다.\n중앙에 있는 코어가 일곱 빛깔로 빛난다."
