          omega_ruby: "うまれつき　ヒレが　ボロボロで　みっともないため\nだれにも　あいてに　されない　ポケモンだ。\nうみと　かわの　どちらでも　せいかつできる。"
          alpha_sapphire: "からだは　ボロボロだが　どこでも　いきていける\nしぶとい　せいめいりょくを　もつ　ポケモン。\nしかし　ノロマなので　すぐに　つかまってしまう。"
        jp_kanji:
          omega_ruby: "生まれつき　ヒレが　ボロボロで　みっともないため\n誰にも　相手に　されない　ポケモンだ。\n海と　川の　どちらでも　生活できる。"
          alpha_sapphire: "体は　ボロボロだが　どこでも　生きていける\nしぶとい　生命力を　持つ　ポケモン。\nしかし　ノロマなので　すぐに　捕まってしまう。"
        en:
          omega_ruby: "Feebas’s fins are ragged and tattered from the start of its life.\nBecause of its shoddy appearance, this Pokémon is largely\nignored. It is capable of living in both the sea and in rivers."
          alpha_sapphire: "While Feebas’s body is in tatters, it has a hardy and tenacious\nlife force that enables it to live anywhere. However, this\nPokémon is also slow and dimwitted, making it an easy catch."
        fr:
          omega_ruby: "Les nageoires de Barpau sont abîmées et déchirées\ndès sa naissance. Ce Pokémon est généralement ignoré\nà cause de son apparence miséreuse. Il peut vivre\ndans la mer ou en eau douce."
          alpha_sapphire: "Même si le corps de Barpau est en lambeaux, il reste tenace\net obstiné, ce qui lui permet de survivre partout. Cependant,\nce Pokémon est très lent et un peu bête, ce qui en fait\nune proie facile."
        it:
          omega_ruby: "Le pinne di Feebas sono logore e sbrindellate fin dalla\nnascita. A causa di questo suo aspetto disordinato,\nil Pokémon è solitamente ignorato. È in grado di vivere\nin mare e nei fiumi."
          alpha_sapphire: "Sebbene abbia il corpo logoro, Feebas è molto tenace\ne resistente, potendo così vivere in ogni luogo. Tuttavia,\nquesto Pokémon è anche lento e poco sveglio, il che\nlo rende una preda facile."
        de:
          omega_ruby: "Barschwas Flossen waren schon immer zerfetzt. Wegen seines\nmerkwürdigen Aussehens wird dieses Pokémon weitgehend\nignoriert. Es kann sowohl im Meer als auch in Flüssen leben."
          alpha_sapphire: "Obwohl Barschwas Körper zerfetzt ist, besitzt es eine harte\nund zähe Lebenskraft, sodass es überall leben kann. Aber\ndieses Pokémon ist langsam und dusselig. Daher ist es leicht\nzu fangen."
        es:
          omega_ruby: "Feebas tiene las aletas melladas y rasgadas desde que nace.\nDebido a este aspecto poco imponente, son pocos los que lo\ntienen en cuenta. Este Pokémon puede vivir tanto en agua\nsalada como dulce."
          alpha_sapphire: "Aunque Feebas tenga el cuerpo mellado, posee una\ntremenda y constante fuerza vital que le permite vivir en\ncualquier lugar. Con todo, es un Pokémon lento y simplón;\nes fácil de atrapar."
        ko:
          omega_ruby: "태어날 때부터 지느러미가 너덜너덜\n보기 흉해서 아무도 상대해주지 않는 포켓몬이다.\n바다와 강 양쪽 모두에서 생활할 수 있다."
          alpha_sapphire: "몸은 엉망이지만 어디에서든 살아갈 수 있는\n끈질긴 생명력을 지닌 포켓몬이다.\n하지만 아둔해서 금방 붙잡힌다."
milotic:
  species_id: 350
  names:
    jp_kana: ミロカロス
    jp_kanji: ミロカロス
    en: Milotic
    fr: Milobellus
    it: Milotic
    de: Milotic
    es: Milotic
    ko: 밀로틱
  forms:
    milotic:
      form_id: 0
      base_stats:
        hp: 95
        attack: 60
        defense: 79
        special_attack: 100
        special_defense: 125
        speed: 81
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - marvel_scale
        - competitive
      hidden_ability: cute_charm
      descriptions:
        jp_kana:
          omega_ruby: "もっとも　うつくしい　ポケモンと　いわれている。\nいかりや　にくしみの　こころを　いやして\nあらそいを　しずめる　ちからを　もっている。"
          alpha_sapphire: "おおきな　みずうみの　そこに　すんでいる。\nからだが　あざやかな　ピンクいろに　かがやくとき\nすさんだ　こころを　いやす　はどうを　はなつ。"
        jp_kanji:
          omega_ruby: "最も　美しい　ポケモンと　いわれている。\n怒りや　憎しみの　心を　癒して\n争いを　鎮める　力を　持っている。"
          alpha_sapphire: "大きな　湖の　底に　すんでいる。\n体が　鮮やかな　ピンク色に　輝くとき\n荒んだ　心を　癒す　波動を　放つ。"
        en:
          omega_ruby: "Milotic is said to be the most beautiful of all the Pokémon.\nIt has the power to becalm such emotions as anger and\nhostility to quell bitter feuding."
          alpha_sapphire: "Milotic live at the bottom of large lakes. When this\nPokémon’s body glows a vivid pink, it releases a pulsing\nwave of energy that brings soothing calm to troubled hearts."
        fr:
          omega_ruby: "Certains prétendent que Milobellus est le plus beau de tous\nles Pokémon. Il a le pouvoir d’apaiser certaines émotions\ncomme la colère ou l’hostilité, afin d’éviter les querelles\ninutiles."
          alpha_sapphire: "Milobellus vit au fond des grands lacs. Lorsque le corps\nde ce Pokémon devient rose vif, il libère une pulsation\nd’énergie, capable d’apaiser les esprits agités."
        it:
          omega_ruby: "Pare che Milotic sia il più bello tra tutti i Pokémon.\nHa il potere di placare emozioni come la rabbia e l’astio,\ndomando così anche le più accese controversie."
          alpha_sapphire: "Milotic vive sui fondali dei grandi laghi. Quando il suo corpo\nriluce di un rosa intenso, rilascia una forte onda energetica,\nin grado di placare gli spiriti irrequieti."
        de:
          omega_ruby: "Milotic soll das schönste aller Pokémon sein. Es hat die\nMacht, Emotionen wie Wut und Feindseligkeit zu besänftigen\nund somit erbitterten Streit zu vermeiden."
          alpha_sapphire: "Milotic lebt auf dem Grund großer Seen. Wenn dieses\nPokémon rosa leuchtet, gibt es eine Energiewelle ab,\ndie einem zornigen Herzen wohltuende Ruhe verschaffen\nkann."
        es:
          omega_ruby: "De Milotic se dice que es el Pokémon más bello. Tiene la\ncapacidad de calmar sentimientos tales como el miedo y la\nhostilidad, y apaciguar las relaciones de áspera enemistad."
          alpha_sapphire: "Milotic vive en lo más profundo de los lagos. Cuando\nintensifica el color rosa de la piel, libera una fuerte onda de\nenergía que tranquiliza a todo el que tenga el ánimo alterado."
        ko:
          omega_ruby: "가장 아름다운 포켓몬이라고 불리고 있다.\n분노나 증오의 마음을 치유하여\n분쟁을 진정시키는 힘을 지니고 있다."
          alpha_sapphire: "큰 호수의 밑바닥에 살고 있다.\n몸이 선명한 핑크빛으로 반짝일 때\n피폐해진 마음을 치유하는 파동을 발산한다."
