        jp_kana:
          omega_ruby: "すいじょうきを　ふきだして　じぶんの\nすがたを　のうむで　かくす。ひとの\nたちいらない　やまに　すむと　いう。"
          alpha_sapphire: "せなかの　アームから　たいないの\nすいじょうきを　ふんしゃする。\nやま　ひとつ　ふきとばす　いりょく。"
        jp_kanji:
          omega_ruby: "水蒸気を　噴き出して　自分の　姿を\n濃霧で　隠す。人の　立ち入らない\n山に　住むという。"
          alpha_sapphire: "背中の　アームから\n体内の　水蒸気を　噴射する。\n山　ひとつ　吹き飛ばす　威力。"
        en:
          omega_ruby: "It lets out billows of steam and disappears into\nthe dense fog. It’s said to live in mountains\nwhere humans do not tread."
          alpha_sapphire: "It expels its internal steam from the\narms on its back. It has enough\npower to blow away a mountain."
        fr:
          omega_ruby: "Il est capable de générer un nuage de vapeur pour se cacher.\nIl vit dans des montagnes inhabitées."
          alpha_sapphire: "Il évacue la vapeur qui s’accumule à l’intérieur de son corps\npar les bras situés sur son dos. Ce jet est assez puissant\npour raser des montagnes."
        it:
          omega_ruby: "Si nasconde emettendo spesse nubi di vapore attorno a sé.\nSi dice che viva su montagne non frequentate dall’uomo."
          alpha_sapphire: "Emette il vapore generato nel suo corpo dalle braccia\ncongiunte ad anello sul dorso. La potenza del getto\npotrebbe spazzare via una montagna."
        de:
          omega_ruby: "Es stößt Wasserdampf aus und versteckt sich im dadurch\nentstehenden dichten Nebel. Es lebt in Bergen, die von\nMenschen gemieden werden."
          alpha_sapphire: "Über die Arme auf seinem Rücken stößt es Wasserdampf aus.\nSeine Kraft reicht aus, um Berge zu versetzen."
        es:
          omega_ruby: "Expulsa vapor y desaparece entre la densa niebla. Dicen que\nhabita en montañas solitarias."
          alpha_sapphire: "Expulsa vapor de agua por los brazos que tiene en la espalda.\nSale a tal potencia que sería capaz de arrasar una montaña\nentera."
        ko:
          omega_ruby: "수증기를 뿜어내어 자신의\n모습을 짙은 안개 속에 숨긴다. 사람이\n오지 않는 산에 산다고 한다."
          alpha_sapphire: "등에 있는 팔로 체내의\n수증기를 분사한다.\n산 하나를 날려버릴 정도의 위력이다."
