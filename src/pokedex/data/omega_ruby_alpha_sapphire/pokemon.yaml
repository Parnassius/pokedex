      types:
        - ghost
        - fire
      egg_groups:
        - amorphous
      abilities:
        - flash_fire
        - flame_body
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          omega_ruby: "たましいを　すいとり　ひをともす。\nひとが　しぬのを　まつため\nびょういんを　うろつくようになった。"
          alpha_sapphire: "りんじゅうの　さいに　あらわれて\nたましいが　にくたいを　はなれると\nすかさず　すいとってしまうのだ。"
        jp_kanji:
          omega_ruby: "魂を　吸いとり　火を灯す。\n人が　死ぬのを　待つため\n病院を　うろつくようになった。"
          alpha_sapphire: "臨終の　際に　現れて\n魂が　肉体を　離れると\nすかさず　吸い取ってしまうのだ。"
        en:
          omega_ruby: "The spirits it absorbs fuel its baleful fire. It hangs\naround hospitals waiting for people to pass on."
          alpha_sapphire: "It arrives near the moment of death and steals spirit\nfrom the body."
        fr:
          omega_ruby: "Il aspire les âmes pour entretenir sa flamme.\nIl erre dans les hôpitaux dans l’attente d’un trépas."
          alpha_sapphire: "Il apparaît au moment du trépas et aspire l’âme à l’instant\nmême où elle quitte le corps."
        it:
          omega_ruby: "La sua fiamma si accende quando risucchia gli spettri. Si trova\nspesso nei pressi dei cimiteri, dove questi abbondano."
          alpha_sapphire: "Appare sul finire della vita per risucchiare l’energia delle\nanime vagabonde."
        de:
          omega_ruby: "Es nährt seine Flamme mit den Seelen seiner Opfer.\nHeutzutage irrt es auf der Suche nach Seelen durch\nKrankenhäuser."
          alpha_sapphire: "Es erscheint im Augenblick des Todes und verschlingt die\nSeele des Verblichenen, sofort nachdem sie den Körper\nverlassen hat."
        es:
          omega_ruby: "Al absorber almas, su llama se enciende. Espera a que la\ngente fallezca, así que suele deambular por los hospitales."
          alpha_sapphire: "Aparece hacia el final de la vida y absorbe el alma en cuanto\nesta se separa del cuerpo."
        ko:
          omega_ruby: "영혼을 빨아들여 불을 밝힌다.\n사람이 죽는 것을 기다리기 위해\n병원을 서성거리게 되었다."
          alpha_sapphire: "임종 때 나타나서\n영혼이 육체를 떠나면\n재빨리 빨아들여 버린다."
chandelure:
