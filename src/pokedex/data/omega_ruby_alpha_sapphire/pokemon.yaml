          alpha_sapphire: "オスが　メスに　きゅうあいするとき\nはっする　ちょうおんぱを　あびると\nとても　たのしい　きぶんになる。"
        jp_kanji:
          omega_ruby: "コンクリートも　壊せるほどの\n強い　超音波を　出すとき\n尻尾が　激しく　震える。"
          alpha_sapphire: "オスが　メスに　求愛するとき\n発する　超音波を　浴びると\nとても　楽しい　気分になる。"
        en:
          omega_ruby: "It shakes its tail vigorously when it emits ultrasonic\nwaves strong enough to reduce concrete to rubble."
          alpha_sapphire: "Anyone who comes into contact with the ultrasonic\nwaves emitted by a courting male experiences a\npositive mood shift."
        fr:
          omega_ruby: "Sa queue s’agite frénétiquement quand il émet ses ultrasons\nassez puissants pour pulvériser du béton."
          alpha_sapphire: "Le mâle courtise la femelle à l’aide d’ultrasons. Les écouter\nmet de très bonne humeur."
        it:
          omega_ruby: "Quando emette delle onde ultrasoniche così forti da rompere\nil cemento, la coda gli oscilla con forza."
          alpha_sapphire: "È molto piacevole essere investiti dalle onde ultrasoniche\nche il maschio emette quando corteggia la femmina."
        de:
          omega_ruby: "Beim Abfeuern seiner Ultraschallwellen, mit denen es selbst\nBeton zertrümmern kann, wedelt es eifrig mit dem Schweif."
          alpha_sapphire: "Wer den Ultraschallwellen eines Männchens in der Balz\nausgesetzt wird, verfällt in eine euphorische Stimmung."
        es:
          omega_ruby: "Cuando emite ondas ultrasónicas, que incluso pueden\nreventar el cemento, agita su cola con vehemencia."
          alpha_sapphire: "Todos rebosan de alborozo cuando perciben las ondas\nultrasónicas emitidas por el macho para cortejar a la hembra."
        ko:
          omega_ruby: "콘크리트도 부술 정도로\n강한 초음파를 낼 때\n꼬리가 심하게 흔들린다."
          alpha_sapphire: "수컷이 암컷에게 구애할 때\n발사하는 초음파에 노출되면\n기분이 매우 즐거워진다."
drilbur:
  species_id: 529
  names:
