          omega_ruby: "Nidoran♀ est couvert de pointes qui sécrètent un poison\npuissant. On pense que ce petit Pokémon a développé\nces pointes pour se défendre. Lorsqu’il est en colère,\nune horrible toxine sort de sa corne."
          alpha_sapphire: "Nidoran♀ est couvert de pointes qui sécrètent un poison\npuissant. On pense que ce petit Pokémon a développé\nces pointes pour se défendre. Lorsqu’il est en colère,\nune horrible toxine sort de sa corne."
        it:
          omega_ruby: "Gli aculei di Nidoran♀ secernono un potente veleno.\nSi pensa che si siano sviluppati per proteggere questo\nPokémon dal corpo minuto. Quando è adirato, rilascia\nuna potente tossina dal corno."
          alpha_sapphire: "Gli aculei di Nidoran♀ secernono un potente veleno.\nSi pensa che si siano sviluppati per proteggere questo\nPokémon dal corpo minuto. Quando è adirato, rilascia\nuna potente tossina dal corno."
        de:
          omega_ruby: "Nidoran♀ besitzt Widerhaken, die ein starkes Gift ausstoßen.\nSie sind vermutlich zum Schutz dieses schmächtigen Pokémon\nentstanden. Wenn es wütend wird, stößt es ein gefährliches\nGift aus seinem Horn aus."
          alpha_sapphire: "Nidoran♀ besitzt Widerhaken, die ein starkes Gift ausstoßen.\nSie sind vermutlich zum Schutz dieses schmächtigen Pokémon\nentstanden. Wenn es wütend wird, stößt es ein gefährliches\nGift aus seinem Horn aus."
        es:
          omega_ruby: "Nidoran♀ tiene púas que segregan un veneno muy potente.\nSe piensa que las desarrolló como protección del cuerpo tan\npequeño que tiene. Cuando se enfada, libera una horrible\nsustancia tóxica por el cuerno."
          alpha_sapphire: "Nidoran♀ tiene púas que segregan un veneno muy potente.\nSe piensa que las desarrolló como protección del cuerpo tan\npequeño que tiene. Cuando se enfada, libera una horrible\nsustancia tóxica por el cuerno."
        ko:
          omega_ruby: "작은 몸을 지키기 위해 강력한\n독침이 발달한 것이라 여겨진다.\n화가 나면 뿔 끝에서 맹독을 뿜는다."
          alpha_sapphire: "작은 몸을 지키기 위해 강력한\n독침이 발달한 것이라 여겨진다.\n화가 나면 뿔 끝에서 맹독이 나온다."
