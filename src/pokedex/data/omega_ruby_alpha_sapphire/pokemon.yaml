          omega_ruby: "ジェットスキーに　まけない　そくどで\nおよぐ。つばさの　へりは　するどく\nりゅうひょうを　せつだんする。"
          alpha_sapphire: "クチバシから　のびている　３ぼんの\nツノは　つよさの　しょうちょう。\nリーダーが　いちばん　おおきい。"
        jp_kanji:
          omega_ruby: "ジェットスキーに　負けない　速度で\n泳ぐ。翼の　縁は　鋭く\n流氷を　切断する。"
          alpha_sapphire: "クチバシから　伸びている　３本の\nツノは　強さの　象徴。\nリーダーが　一番　大きい。"
        en:
          omega_ruby: "It swims as fast as a jet boat. The edges of its\nwings are sharp and can slice apart drifting ice."
          alpha_sapphire: "The three horns that extend from its beak attest to\nits power. The leader has the biggest horns."
        fr:
          omega_ruby: "Il nage aussi vite qu’un hors-bord. Le tranchant de ses ailes\npeut fendre un bloc de glace à la dérive."
          alpha_sapphire: "Les trois cornes de son bec sont le symbole de sa force.\nCelles du chef sont plus grosses que les autres."
        it:
          omega_ruby: "Nuota veloce come una moto d’acqua. Le estremità delle ali\nsono aguzze e spaccano anche il ghiaccio."
          alpha_sapphire: "Le tre corna che si allungano dal suo becco attestano la sua\nforza. Il capogruppo ha le corna più grosse."
        de:
          omega_ruby: "Es schwimmt so schnell wie ein Rennboot. Seine Flügel haben\nscharfe Seiten und können Packeis schneiden."
          alpha_sapphire: "Die drei Hörner, die aus dem Schnabel wachsen,\nstehen für Kraft. Ein Anführer hat die größten Hörner."
        es:
          omega_ruby: "Nada tan rápido como un fueraborda. Con los afilados bordes\nde sus alas puede cortar el hielo."
          alpha_sapphire: "Los tres cuernos de su pico son muestra de su fuerza.\nEl líder tiene los cuernos más grandes."
        ko:
          omega_ruby: "제트스키와 맞먹는 속도로\n헤엄친다. 날개 가장자리는\n날카롭게 유빙을 절단한다."
          alpha_sapphire: "부리에서 늘어난 3개의 뿔은\n강하다는 것을 증명한다.\n리더의 뿔이 제일 크다."
starly:
