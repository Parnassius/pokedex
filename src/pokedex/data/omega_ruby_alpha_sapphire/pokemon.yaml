          alpha_sapphire: "Le zampe di Hitmonlee sono estremamente elastiche.\nUsandole a mo’ di molla, si scaglia sul nemico con calci\nrovinosi. Dopo la lotta si strofina le zampe e scioglie i\nmuscoli per recuperare le forze."
        de:
          omega_ruby: "Kicklee kann seine Beine ausfahren und einziehen. Es verblüfft\nseine Gegner mit brutalen Tritten. Nach einem Kampf massiert\nes seine Beine und lockert die Muskeln, um der Erschöpfung\nvorzubeugen."
          alpha_sapphire: "Kicklee kann seine Beine ausfahren und einziehen. Es verblüfft\nseine Gegner mit brutalen Tritten. Nach einem Kampf massiert\nes seine Beine und lockert die Muskeln, um der Erschöpfung\nvorzubeugen."
        es:
          omega_ruby: "Hitmonlee tiene la facilidad de encoger y estirar las patas.\nCon extremidades tan flexibles, propina unas patadas\ndemoledoras. Tras la lucha, se masajea las piernas y relaja\nlos músculos para descansar."
          alpha_sapphire: "Hitmonlee tiene la facilidad de encoger y estirar las patas.\nCon extremidades tan flexibles, propina unas patadas\ndemoledoras. Tras la lucha, se masajea las piernas y relaja\nlos músculos para descansar."
        ko:
          omega_ruby: "자유롭게 신축되는 다리로 강렬한\n킥을 날려 상대를 발로 차 쓰러트린다.\n싸운 뒤에 지친 다리를 주물러 풀어준다."
          alpha_sapphire: "자유롭게 신축되는 다리로 강렬한\n킥을 날려 상대를 발로 차 쓰러트린다.\n싸운 뒤에 지친 다리를 주물러 풀어준다."
