          omega_ruby: "けいかいしんが　とても　つよい。\nきけんを　かんじると　かろやかに\nとびはねて　はしりさってしまう。"
          alpha_sapphire: "みみは　とても　デリケートらしく\nやさしく　ていねいに　さわらないと\nしなやかな　あしで　けられてしまう。"
        jp_kanji:
          omega_ruby: "警戒心が　とても　強い。\n危険を　感じると　軽やかに\n飛び跳ねて　走り去ってしまう。"
          alpha_sapphire: "耳は　とても　デリケートらしく\n優しく　丁寧に　触らないと\nしなやかな　脚で　けられてしまう。"
        en:
          omega_ruby: "Extremely cautious, it quickly bounds off when it\nsenses danger."
          alpha_sapphire: "The ears appear to be delicate. If they are touched\nroughly, it kicks with its graceful legs."
        fr:
          omega_ruby: "Il détecte le moindre danger. Il file discrètement par petits\nbonds rapides quand il se sent menacé."
          alpha_sapphire: "Il est capable de décocher de puissants coups de pied\nsi on touche à ses délicates oreilles."
        it:
          omega_ruby: "È un Pokémon estremamente cauto. Se avverte un pericolo,\nsi dà subito alla fuga saltellando."
          alpha_sapphire: "Ha delle orecchie molto delicate. Se le si tocca con forza,\nscalcia con le sue graziose gambe."
        de:
          omega_ruby: "Es ist extrem vorsichtig. Wenn es Gefahr wittert, macht es sich\nmit flinken Sprüngen aus dem Staub."
          alpha_sapphire: "Es hat sehr empfindliche Ohren. Fasst man sie zu rau an,\nwird es mit seinen grazilen Beinen zutreten."
        es:
          omega_ruby: "Este Pokémon resulta muy precavido. Si siente peligro,\nescapa corriendo a grandes saltos."
          alpha_sapphire: "Sus orejas son muy delicadas. Si alguien las toca con\nbrusquedad, recibirá una espléndida patada."
        ko:
          omega_ruby: "경계심이 아주 강하다.\n위험을 감지하면 가뿐하게\n뛰어올라 달아난다."
          alpha_sapphire: "귀가 아주 민감한 부위이므로\n상냥하고 정중하게 만지지 않으면\n그 매끈한 다리에 차이게 된다."
