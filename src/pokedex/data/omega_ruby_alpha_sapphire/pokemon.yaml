        jp_kana:
          omega_ruby: "いわの　からだを　こおりの　よろいで　かためた。\nくうきちゅうの　すいぶんを　こおらせて　じゆうな\nかたちに　かえる　のうりょくを　もつ　ポケモン。"
          alpha_sapphire: "こおりを　じざいに　あつかう　ちからを　もつ。\nえものを　いっしゅんで　こおらせて　うごけなく\nなった　ところを　おいしく　いただくのだ。"
        jp_kanji:
          omega_ruby: "岩の　体を　氷の　よろいで　かためた。\n空気中の　水分を　凍らせて　自由な\n形に　変える　能力を　持つ　ポケモン。"
          alpha_sapphire: "氷を　自在に　扱う　力を　持つ。\n獲物を　一瞬で　凍らせて　動けなく\nなった　ところを　美味しく　頂くのだ。"
        en:
          omega_ruby: "Glalie has a body made of rock, which it hardens with an armor\nof ice. This Pokémon has the ability to freeze moisture in the\natmosphere into any shape it desires."
          alpha_sapphire: "Glalie has the ability to freely control ice. For example, it can\ninstantly freeze its prey solid. After immobilizing its prey in ice,\nthis Pokémon enjoys eating it in leisurely fashion."
        fr:
          omega_ruby: "Le corps de Oniglali est fait de rochers qu’il endurcit grâce\nà une couche de glace. Ce Pokémon a le pouvoir de geler\nl’humidité ambiante et de lui donner n’importe quelle forme."
          alpha_sapphire: "Oniglali a le pouvoir de contrôler la glace à volonté.\nPar exemple, il peut geler sa proie sur place.\nUne fois la proie immobilisée, ce Pokémon la mange\nsans se presser."
        it:
          omega_ruby: "Il corpo di Glalie è fatto di pietra rivestita da un’armatura\ndi ghiaccio. Questo Pokémon ha la capacità di congelare\nl’umidità nell’atmosfera e darle le forme più svariate."
          alpha_sapphire: "Glalie ha la capacità di sfruttare il ghiaccio a suo vantaggio.\nAd esempio riesce a congelare la preda all’istante. Dopo\naverla immobilizzata nel ghiaccio, se la mangia con gusto\ne in tutta calma."
        de:
          omega_ruby: "Firnontor hat einen Körper aus Stein, den es mit einem\nPanzer aus Eis noch verstärkt. Dieses Pokémon kann die\nLuftfeuchtigkeit der Atmosphäre einfrieren und in jegliche\nForm verwandeln."
          alpha_sapphire: "Firnontor hat die Fähigkeit, Eis zu kontrollieren. Es kann\nbeispielsweise seine Beute augenblicklich einfrieren.\nNachdem es sie im Eis bewegungsunfähig gemacht hat,\nverspeist es sie genüsslich."
        es:
          omega_ruby: "Glalie endurece el cuerpo rocoso que tiene con una coraza\nde hielo. Este Pokémon tiene la habilidad de congelar la\nhumedad del ambiente y formar la figura que se le antoje."
          alpha_sapphire: "Glalie tiene la habilidad de controlar el hielo con total libertad.\nPor ejemplo, puede dejar a su presa totalmente congelada en\nun instante. Y, una vez helada, la devora lentamente."
        ko:
          omega_ruby: "바위로 된 몸을 얼음 갑옷으로 단단히 했다.\n공기 중의 수분을 얼려서 자유로운\n형태로 바꾸는 능력을 지닌 포켓몬이다."
          alpha_sapphire: "얼음을 자유롭게 사용하는 힘을 지녔다.\n먹이를 한순간에 얼려 움직이지\n못하게 하고 맛있게 먹는다."
