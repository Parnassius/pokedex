        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          omega_ruby: "どんな　しょうげきにも　たえられる\nぶあつい　ずがいこつに　おさえられて\nのうみそは　おおきく　ならなかった。"
          alpha_sapphire: "てつのように　かたい　ずがいこつ。\nジャングルの　きぎを　なぎたおし\nえものを　とらえる　あばれんぼう。"
        jp_kanji:
          omega_ruby: "どんな　衝撃にも　耐えられる\n分厚い　頭蓋骨に　押さえられて\n脳みそは　大きく　ならなかった。"
          alpha_sapphire: "鉄のように　硬い　頭蓋骨。\nジャングルの　木々を　なぎ倒し\n獲物を　捕らえる　暴れん坊。"
        en:
          omega_ruby: "Its skull withstands impacts of any magnitude. As a\nresult, its brain never gets the chance to grow."
          alpha_sapphire: "Its skull is as hard as iron. It is a brute that tears\ndown jungle trees while catching prey."
        fr:
          omega_ruby: "À force de cogner son crâne pourtant hyper résistant,\nCharkos a un cerveau atrophié."
          alpha_sapphire: "Son crâne est dur comme du fer. Cette brute abat des arbres\nquand elle chasse sa proie dans la jungle."
        it:
          omega_ruby: "Il suo spesso cranio, che sopporta qualunque impatto,\nè ridotto, e il cervello non si è sviluppato."
          alpha_sapphire: "Il suo cranio è duro come il ferro. È violento e abbatte gli\nalberi della giungla mentre va a caccia di prede."
        de:
          omega_ruby: "Sein dicker Schädelknochen trotzt jedem Angriff. Gleichzeitig\nstoppt er jedoch sein Hirnwachstum."
          alpha_sapphire: "Sein Schädel ist hart wie Eisen. Es reißt Dschungelbäume\nnieder, während es seine Beute jagt."
        es:
          omega_ruby: "Tiene sesos pequeños porque su duro cráneo, que soporta\ncualquier golpe, les impide desarrollarse."
          alpha_sapphire: "Su cráneo es duro como el hierro. Es tan bruto que destroza\nla jungla cuando persigue presas."
        ko:
          omega_ruby: "어떤 충격에도 견딜 수 있는\n두꺼운 두개골에 눌려\n뇌가 자라지 않았다."
          alpha_sapphire: "철처럼 단단한 두개골이다.\n정글의 나무들을 넘어뜨려서\n먹이를 잡는 난동꾼이다."
shieldon:
  species_id: 410
  names:
    jp_kana: タテトプス
    jp_kanji: タテトプス
    en: Shieldon
    fr: Dinoclier
    it: Shieldon
    de: Schilterus
    es: Shieldon
