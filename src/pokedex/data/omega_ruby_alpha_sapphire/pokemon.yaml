        jp_kana:
          omega_ruby: "なかまの　ためなら　どれだけ\nきずつこうとも　たたかいを　やめない\nゆうかんな　おおぞらの　せんし。"
          alpha_sapphire: "なかまのため　きけんを　かえりみず\nたたかう。じどうしゃを　つかんだまま\nおおぞらを　まう　ことが　できる。"
        jp_kanji:
          omega_ruby: "仲間の　ためなら　どれだけ\n傷つこうとも　戦いを　やめない\n勇敢な　大空の　戦士。"
          alpha_sapphire: "仲間のため　危険を　かえりみず\n戦う。自動車を　つかんだまま\n大空を　舞う　ことが　できる。"
        en:
          omega_ruby: "For the sake of its friends, this brave warrior of the\nsky will not stop battling, even if injured."
          alpha_sapphire: "They fight for their friends without any thought\nabout danger to themselves. One can carry a car\nwhile flying."
        fr:
          omega_ruby: "Un chevalier du ciel, brave et intrépide. Pour les siens,\nil combat au mépris du danger, sans jamais fléchir."
          alpha_sapphire: "Pour les siens, il combat au mépris du danger. Il est capable\nde soulever une voiture haut dans le ciel."
        it:
          omega_ruby: "È l’intrepido guerriero del cielo. Per difendere i suoi simili,\nlotta fino all’ultimo senza badare alle ferite."
          alpha_sapphire: "Incurante del pericolo, lotta per difendere i compagni.\nPuò sollevare in volo anche una pesante automobile."
        de:
          omega_ruby: "Ein tapferer Krieger der Lüfte, der zum Schutz seiner\nKameraden auch mit Verletzungen immer weiterkämpft."
          alpha_sapphire: "Für Freunde stürzt es sich selbstlos in den Kampf. Es kann mit\nseinen Krallen Autos durch die Lüfte tragen."
        es:
          omega_ruby: "Un valiente guerrero del cielo que no duda en luchar por sus\ncompañeros por graves que sean sus heridas."
          alpha_sapphire: "Lucha por sus compañeros sin reparar en el peligro. Es capaz\nde volar alto incluso con un coche en sus garras."
        ko:
          omega_ruby: "동료를 위해서라면 아무리\n상처를 입더라도 싸움을 관두지 않는\n용감한 넓은 하늘의 전사."
          alpha_sapphire: "동료를 위해 위험을 무릅쓰고\n싸운다. 자동차를 붙잡은 채로\n넓은 하늘을 날 수 있다."
vullaby:
