          omega_ruby: "つむじかぜと　ともに　あらわれて\nいえのなかの　かぐを　うごかしたり\nわたを　のこす　いたずらをする。"
          alpha_sapphire: "どんなに　ほそい　すきまでも\nかぜのように　くぐりぬけてしまう。\nしろい　けだまを　のこしていく。"
        jp_kanji:
          omega_ruby: "つむじかぜと　ともに　現われて\n家の　中の　家具を　動かしたり\n綿を　残す　いたずらをする。"
          alpha_sapphire: "どんなに　細い　すきまでも\n風のように　潜り抜けてしまう。\n白い　毛玉を　残していく。"
        en:
          omega_ruby: "They appear along with whirlwinds. They pull\npranks, such as moving furniture and leaving balls\nof cotton in homes."
          alpha_sapphire: "Like the wind, it can slip through any gap,\nno matter how small. It leaves balls of white\nfluff behind."
        fr:
          omega_ruby: "Il apparaît dans un tourbillon de vent, s’introduit dans\nles maisons et y joue de mauvais tours."
          alpha_sapphire: "Il se faufile comme le vent par les espaces les plus étroits,\nen laissant une touffe de poils blancs."
        it:
          omega_ruby: "Appare con un vortice d’aria, facendo piccoli dispetti come\nspostare i mobili nelle case o lasciare cotone ovunque."
          alpha_sapphire: "Si infiltra nelle fessure più sottili, come un soffio di vento,\nlasciando dietro di sé dei batuffoli bianchi."
        de:
          omega_ruby: "Sie erscheinen mit Orkanböen und spielen den Leuten\nStreiche, indem sie in Häusern Möbel verrücken oder\nWatte verstreuen."
          alpha_sapphire: "Passiert wie ein Luftzug mühelos jeden noch so engen Spalt\nund hinterlässt dort nichts als ein weißes Fellknäuel."
        es:
          omega_ruby: "Aparecen en medio de un torbellino y entran en las casas para\ndescolocar los muebles o esparcir algodón por doquier."
          alpha_sapphire: "Es capaz de atravesar las más mínimas fisuras. A su paso,\ndeja bolitas blancas de pelo."
        ko:
          omega_ruby: "회오리바람과 함께 나타나\n집 안의 가구를 움직이거나\n솜을 남기는 장난을 친다."
          alpha_sapphire: "아무리 좁은 틈이라도\n바람처럼 빠져나간다.\n하얀 털 뭉치를 남기고 간다."
petilil:
  species_id: 548
  names:
    jp_kana: チュリネ
    jp_kanji: チュリネ
