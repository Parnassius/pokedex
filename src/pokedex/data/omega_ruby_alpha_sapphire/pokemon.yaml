      descriptions:
        jp_kana:
          omega_ruby: "せまい　ほらあなを　はしりまわり\nえものを　するどい　ツメで　ほかく。\nかおの　ひふは　いわより　かたい。"
          alpha_sapphire: "にっこうを　つばさで　うけて\nからだを　あたためる。たいおんが\nさがると　うごけなくなってしまう。"
        jp_kanji:
          omega_ruby: "狭い　洞穴を　走り回り\n獲物を　鋭い　ツメで　捕獲。\n顔の　皮膚は　岩より　硬い。"
          alpha_sapphire: "日光を　翼で　受けて　体を　温める。\n体温が　下がると\n動けなくなってしまう。"
        en:
          omega_ruby: "It races through narrow caves, using its sharp claws\nto catch prey. The skin on its face is harder than\na rock."
          alpha_sapphire: "It warms its body by absorbing sunlight with its\nwings. When its body temperature falls, it can no\nlonger move."
        fr:
          omega_ruby: "Il sillonne les grottes étroites, capturant ses proies avec\nses griffes acérées. Sa face est dure comme le roc."
          alpha_sapphire: "Il utilise ses ailes pour emmagasiner la chaleur du soleil.\nSi la température de son corps baisse, il ne peut plus bouger."
        it:
          omega_ruby: "Percorre le grotte anguste catturando le prede con gli\nartigli affilati. La pelle del muso è più dura della roccia."
          alpha_sapphire: "Si riscalda assorbendo la luce del sole dalle ali. Quando la sua\ntemperatura si abbassa, non riesce più a muoversi."
        de:
          omega_ruby: "Es jagt durch enge Höhlengänge und spießt seine Gegner\nmit spitzen Klauen auf. Seine Kopfhaut ist fester als Stein."
          alpha_sapphire: "Es erwärmt seinen Körper, indem es mit den Flügeln\ndas Sonnenlicht einfängt. Kühlt sein Körper ab, erstarrt es."
        es:
          omega_ruby: "Corre por estrechas cavernas y atrapa a sus presas con sus\nafiladas garras. La piel de la cara es más dura que una roca."
          alpha_sapphire: "Calienta su cuerpo absorbiendo los rayos de sol por las alas.\nNo se puede mover si baja su temperatura corporal."
        ko:
          omega_ruby: "좁은 동굴을 뛰어다니며\n날카로운 손톱으로 먹이를 잡는다.\n얼굴 피부는 바위보다 단단하다."
          alpha_sapphire: "날개로 햇빛을 받아\n몸을 따뜻하게 한다. 체온이\n내려가면 움직일 수 없게 된다."
golett:
