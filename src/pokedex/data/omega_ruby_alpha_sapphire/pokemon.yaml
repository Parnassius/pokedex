        jp_kana:
          omega_ruby: "でんきぶくろに　でんきが　たまりすぎた　ときは\nしっぽを　じめんに　つけて　ほうでんする。\nす　の　ちかくには　じめんに　やけこげが　ある。"
          alpha_sapphire: "よわい　でんきを　ぜんしんから　だしているので\nくらやみでは　うっすら　ひかって　みえるよ。\nシッポを　じめんに　さして　でんきを　にがす。"
        jp_kanji:
          omega_ruby: "電気袋に　電気が　たまり過ぎた　ときは\n尻尾を　地面に　つけて　放電する。\n巣　の　近くには　地面に　焼け焦げが　ある。"
          alpha_sapphire: "弱い　電気を　全身から　出しているので\n暗闇では　うっすら　光って　見えるよ。\nシッポを　地面に　刺して　電気を　逃がす。"
        en:
          omega_ruby: "If the electrical sacs become excessively charged,\nRaichu plants its tail in the ground and discharges.\nScorched patches of ground will be found near this\nPokémon’s nest."
          alpha_sapphire: "This Pokémon exudes a weak electrical charge from all over\nits body that makes it take on a slight glow in darkness.\nRaichu plants its tail in the ground to discharge electricity."
        fr:
          omega_ruby: "Si ses joues contiennent trop d’électricité, Raichu plante\nsa queue dans le sol pour se décharger. On trouve des\nparcelles de terre brûlée à proximité du nid de ce Pokémon."
          alpha_sapphire: "Ce Pokémon libère un faible champ électrique tout autour\nde son corps, ce qui le rend légèrement lumineux dans le noir.\nRaichu plante sa queue dans le sol pour évacuer de\nl’électricité."
        it:
          omega_ruby: "Se l’elettricità accumulata nelle guance diventa eccessiva,\nRaichu la scarica piantando la coda nel terreno. Vicino al suo\nnido sono presenti spesso chiazze di erba arsa."
          alpha_sapphire: "Raichu emana una debole carica elettrica da tutto il corpo\nrilucendo così nell’oscurità. Scarica l’elettricità piantando\nla coda nel terreno."
        de:
          omega_ruby: "Wenn seine elektrische Ladung zu groß wird, entlädt Raichu\nseine Energie ins Erdreich. Neben dem Nest dieses Pokémon\nfindet man häufig versengtes Erdreich."
          alpha_sapphire: "Dieses Pokémon gibt eine schwache elektrische Ladung ab.\nDadurch glüht es bei Dunkelheit leicht. Raichu entlädt\nElektrizität, indem es sein Hinterteil in den Boden gräbt."
        es:
          omega_ruby: "Si las bolsas de los mofletes se le cargan demasiado, Raichu\nplanta la cola en el suelo para liberar electricidad. Es común\nencontrar zonas chamuscadas cerca de la madriguera de este\nPokémon."
          alpha_sapphire: "Este Pokémon libera una débil carga eléctrica por todo su\ncuerpo que le hace brillar en la oscuridad. Raichu descarga\nelectricidad plantando la cola en el suelo."
        ko:
          omega_ruby: "전기 주머니에 전기가 넘칠 정도로 차면\n꼬리를 땅에 닿게 하여 방전한다.\n사는 곳 근처의 땅에는 탄 흔적이 있다."
          alpha_sapphire: "약한 전기를 온몸에서 발산하고 있기 때문에\n어두운 곳에서는 희미하게 빛난다.\n꼬리를 땅에 박고 전기를 흘려보낸다."
