        en:
          omega_ruby: "Cubone pines for the mother it will never see again.\nSeeing a likeness of its mother in the full moon, it cries.\nThe stains on the skull the Pokémon wears are made by the\ntears it sheds."
          alpha_sapphire: "Cubone pines for the mother it will never see again. Seeing a\nlikeness of its mother in the full moon, it cries. The stains on\nthe skull the Pokémon wears are made by the tears it sheds."
        fr:
          omega_ruby: "La maman d’Osselait lui manque terriblement et il ne la reverra\njamais. La lune le fait pleurer, car elle lui rappelle sa mère.\nLes taches sur le crâne que porte ce Pokémon sont\nles marques de ses larmes."
          alpha_sapphire: "La maman d’Osselait lui manque terriblement et il ne la reverra\njamais. La lune le fait pleurer, car elle lui rappelle sa mère.\nLes taches sur le crâne que porte ce Pokémon sont\nles marques de ses larmes."
        it:
          omega_ruby: "Cubone si strugge per la madre che non rivedrà mai più.\nPiange alla luna piena che somiglia molto alla madre.\nLe macchie sul teschio che indossa sono dovute alle\nlacrime copiose."
          alpha_sapphire: "Cubone si strugge per la madre che non rivedrà mai più.\nPiange alla luna piena che somiglia molto alla madre.\nLe macchie sul teschio che indossa sono dovute alle\nlacrime copiose."
        de:
          omega_ruby: "Tragosso sehnt sich nach seiner Mutter, die nicht mehr da ist.\nWenn es im Vollmond das Ebenbild seiner Mutter erblickt,\nmuss es weinen. Die Flecken auf dem Totenkopf, den es trägt,\nstammen von vergossenen Tränen."
          alpha_sapphire: "Tragosso sehnt sich nach seiner Mutter, die nicht mehr da ist.\nWenn es im Vollmond das Ebenbild seiner Mutter erblickt,\nmuss es weinen. Die Flecken auf dem Totenkopf, den es trägt,\nstammen von vergossenen Tränen."
        es:
          omega_ruby: "A Cubone le ahoga la pena porque no volverá a ver jamás a\nsu madre. La luna le recuerda a veces a ella, y se pone a\nllorar. Los churretes que tiene en el cráneo que lleva puesto\nson debidos a las lágrimas que derrama."
          alpha_sapphire: "A Cubone le ahoga la pena porque no volverá a ver jamás a\nsu madre. La luna le recuerda a veces a ella, y se pone a\nllorar. Los churretes que tiene en el cráneo que lleva puesto\nson debidos a las lágrimas que derrama."
        ko:
          omega_ruby: "두 번 다시 만나지 못하는 어미의 모습을\n보름달에서 발견하고 울음소리를 낸다.\n뒤집어쓰고 있는 뼈의 얼룩은 눈물 자국이다."
