          alpha_sapphire: "くうかんを　ゆがめる　のうりょくを\nもち　シンオウちほうの　しんわでは\nかみさまとして　えがかれている。"
        jp_kanji:
          omega_ruby: "並行して　並ぶ　空間の　狭間に\n住むと　言われている。\n神話に　登場する　ポケモン。"
          alpha_sapphire: "空間を　ゆがめる　能力を　持ち\nシンオウ地方の　神話では\n神様として　描かれている。"
        en:
          omega_ruby: "It is said to live in a gap in the spatial dimension\nparallel to ours. It appears in mythology."
          alpha_sapphire: "It has the ability to distort space. It is described as\na deity in Sinnoh-region mythology."
        fr:
          omega_ruby: "On dit qu’il hante une faille d’une dimension parallèle\nà la nôtre. Il apparaît dans la mythologie."
          alpha_sapphire: "Il peut modeler l’espace. Les mythes de Sinnoh en parlent\ncomme d’une divinité ancienne."
        it:
          omega_ruby: "Si dice che viva in una dimensione parallela alla nostra.\nAppare nella mitologia."
          alpha_sapphire: "Ha l’abilità di distorcere lo spazio. Nella mitologia della\nregione di Sinnoh è una divinità."
        de:
          omega_ruby: "Man sagt, es lebe in einem Spalt in einer Paralleldimension.\nEs wird in der Mythologie erwähnt."
          alpha_sapphire: "Es hat die Macht, den Raum zu krümmen. In den Mythen\nvon Sinnoh erscheint es als Gottheit."
        es:
          omega_ruby: "Se dice que vive en una dimensión espacial paralela. Aparece\nen la mitología."
          alpha_sapphire: "Tiene la habilidad de distorsionar el espacio. La mitología de\nSinnoh lo describe como una deidad."
        ko:
          omega_ruby: "평행으로 늘어선 공간의\n틈새에 산다고 전해진다.\n신화에 등장하는 포켓몬이다."
          alpha_sapphire: "공간을 뒤틀리게 하는 능력을\n가졌으며 신오지방의 신화에서는\n신으로 묘사되고 있다."
