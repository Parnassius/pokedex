        attack: 100
        defense: 70
        special_attack: 60
        special_defense: 70
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - grass
      egg_groups:
        - field
      abilities:
        - chlorophyll
        - sap_sipper
      hidden_ability: serene_grace
      descriptions:
        jp_kana:
          omega_ruby: "きせつに　よって　すみかを　かえる。\nひとびとは　メブキジカの　ツノで\nきせつの　うつりかわりを　かんじる。"
          alpha_sapphire: "きせつの　うつりかわりと　ともに\nすみかを　かえるので　メブキジカが\nはるをはこぶと　いう　ひともいる。"
        jp_kanji:
          omega_ruby: "季節によって　住処を　変える。\n人々は　メブキジカの　ツノで\n季節の　移り変わりを　感じる。"
          alpha_sapphire: "季節の　移り変わりと　ともに\n住処を　変えるので　メブキジカが\n春を運ぶと　いう　人もいる。"
        en:
          omega_ruby: "They migrate according to the seasons. People can\ntell the season by looking at Sawsbuck’s horns."
          alpha_sapphire: "They migrate according to the seasons, so some\npeople call Sawsbuck the harbingers of spring."
        fr:
          omega_ruby: "Il change d’habitat selon les saisons. Les gens constatent\nle passage des saisons en regardant ses ramures."
          alpha_sapphire: "Il change d’habitat selon les saisons. Certains disent même\nqu’il est celui qui apporte le printemps."
        it:
          omega_ruby: "Cambia dimora a seconda delle stagioni. Gli uomini\nsi accorgono del cambio di stagione osservando\nle sue corna."
          alpha_sapphire: "Si spostano da un luogo all’altro al mutare delle stagioni.\nPer questo alcuni dicono che portano con sé la primavera."
        de:
          omega_ruby: "An seinem Geweih kann man ablesen, wann eine neue\nJahreszeit beginnt. Sein Revier wechselt mit jeder neuen\nJahreszeit."
          alpha_sapphire: "Mancherorts sagt man, sie brächten den Frühling, da sie je\nnach Jahreszeit ihr Revier wechseln."
        es:
          omega_ruby: "Cambia de morada dependiendo de las estaciones.\nObservando sus cuernos, la gente sabe cuándo estas\nvan a cambiar."
          alpha_sapphire: "Migra con el cambio de estación, por lo que hay quien\nconsidera a Sawsbuck el heraldo de la primavera."
        ko:
          omega_ruby: "계절에 따라 거처를 바꾼다.\n사람들은 바라철록의 뿔에서\n계절의 변화를 느낀다."
          alpha_sapphire: "계절의 변화와 함께\n거처를 바꾸기에 바라철록이\n봄을 나른다고 말하는 사람도 있다."
