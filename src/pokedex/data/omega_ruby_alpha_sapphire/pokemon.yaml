          omega_ruby: "のどもとに　どくぶくろを　もつ。\nのどを　ならすと　たまった　どくは\nねりこまれ　きょうりょくになる。"
          alpha_sapphire: "こぶしの　トゲからは　かすりきずでも\nいのちを　おとすほどの　もうどくを\nぶんぴつしている。"
        jp_kanji:
          omega_ruby: "のど元に　毒袋を　持つ。\nのどを　鳴らすと　たまった　毒は\n練りこまれ　強力になる。"
          alpha_sapphire: "こぶしの　トゲからは\nかすり傷でも　命を　落とすほどの\n猛毒を　分泌する。"
        en:
          omega_ruby: "It has a poison sac at its throat. When it croaks,\nthe stored poison is churned for greater potency."
          alpha_sapphire: "Its knuckle claws secrete a toxin so vile that even a\nscratch could prove fatal."
        fr:
          omega_ruby: "Quand il coasse, le poison stocké sous sa gorge est secoué,\nle rendant ainsi plus efficace."
          alpha_sapphire: "Les griffes de ses poings sécrètent une toxine si atroce\nqu’une simple égratignure peut s’avérer fatale."
        it:
          omega_ruby: "Ha una sacca di veleno sulla gola. Quando gracida il veleno\nsi rimescola, diventando più efficace."
          alpha_sapphire: "I suoi artigli secernono una tossina così velenosa che persino\nun graffio può essere letale."
        de:
          omega_ruby: "Verfügt über einen Giftsack an seiner Kehle. Quakt es,\nschäumt das Gift und wird so noch stärker."
          alpha_sapphire: "Die Gelenke an seinen Klauen geben ein so starkes Gift ab,\ndass selbst ein kleiner Kratzer fatal ist."
        es:
          omega_ruby: "Almacena veneno en una bolsa de la garganta. Cuando croa,\neste se agita para lograr mayor potencia."
          alpha_sapphire: "Sus garras segregan una toxina tan potente que un simple\narañazo puede ser mortal."
        ko:
          omega_ruby: "목 주변에 독주머니를 지녔다.\n목을 울리면 모여진 독이\n잘 섞여져서 강력해진다."
          alpha_sapphire: "주먹의 가시는 긁히기만 해도\n생명을 잃을 정도의 맹독을\n분비하고 있다."
carnivine:
  species_id: 455
  names:
    jp_kana: マスキッパ
    jp_kanji: マスキッパ
    en: Carnivine
    fr: Vortente
    it: Carnivine
    de: Venuflibis
    es: Carnivine
    ko: 무스틈니
  forms:
    carnivine:
      form_id: 0
      base_stats:
        hp: 74
        attack: 100
        defense: 72
        special_attack: 90
        special_defense: 72
        speed: 46
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - levitate
      descriptions:
        jp_kana:
          omega_ruby: "あまい　においの　だえきで　えものを\nおびきよせ　おおあごで　がぶり。\n１にち　かけて　えものを　たべる。"
          alpha_sapphire: "しっちたいに　はえる　きにまきつき\nあまいかおりの　だえきで　えものを\nおびきよせては　ひとくちで　たべる。"
        jp_kanji:
          omega_ruby: "甘い　においの　だえきで　獲物を\nおびき寄せ　おおあごで　がぶり。\n１日　かけて　獲物を　食べる。"
          alpha_sapphire: "湿地帯に　生える　木に巻きつき\n甘い香りの　だえきで　獲物を\n誘き寄せては　ひとくちで　食べる。"
        en:
          omega_ruby: "It attracts prey with its sweet-smelling saliva, then\nchomps down. It takes a whole day to eat prey."
          alpha_sapphire: "It binds itself to trees in marshes. It attracts prey\nwith its sweet-smelling drool and gulps them down."
        fr:
          omega_ruby: "Il attire sa proie avec sa salive odorante avant de la croquer.\nIl lui faut une journée pour l’avaler."
          alpha_sapphire: "Il s’accroche aux arbres des marais et attire ses proies avec\nsa salive à l’odeur enivrante."
        it:
          omega_ruby: "Attira le prede con il dolce aroma della saliva e poi le ingoia.\nImpiega un giorno per mangiare una preda."
          alpha_sapphire: "Si attacca agli alberi nelle paludi. Attrae le prede con il dolce\naroma della saliva e poi le ingoia."
        de:
          omega_ruby: "Sein süßlich riechender Speichel zieht Beute an, die es frisst.\nEs braucht einen Tag, sie zu fressen."
          alpha_sapphire: "Klammert sich an Bäume in Sümpfen. Lockt Beute mit seinem\nsüßlichen Speichel an und schluckt sie dann."
        es:
          omega_ruby: "Atrae a sus presas con saliva de olor dulce y las mastica.\nTarda todo un día en comérselas."
          alpha_sapphire: "Se cuelga de los árboles en los pantanos. Atrae a sus presas\ncon su dulce olor y las engulle."
        ko:
          omega_ruby: "달콤한 냄새의 타액으로 먹이를\n끌어들여 큰 턱으로 꿀꺽한다.\n하루에 걸쳐 먹이를 먹는다."
          alpha_sapphire: "늪지대에서 자라는 나무에 엉겨 붙어\n달콤한 냄새의 타액으로 먹이를\n끌어들여 한입에 먹는다."
finneon:
  species_id: 456
  names:
    jp_kana: ケイコウオ
    jp_kanji: ケイコウオ
    en: Finneon
    fr: Écayon
    it: Finneon
    de: Finneon
    es: Finneon
    ko: 형광어
  forms:
    finneon:
