        jp_kana:
          omega_ruby: "めに　みえない　ものを　みぶりで　そこに　あると\nしんじこませる　パントマイムの　たつじん。\nしんじさせた　ものは　ほんとうに　あらわれる。"
          alpha_sapphire: "めに　みえない　ものを　みぶりで　そこに　あると\nしんじこませる　パントマイムの　たつじん。\nしんじさせた　ものは　ほんとうに　あらわれる。"
        jp_kanji:
          omega_ruby: "目に　見えない　ものを　身振りで　そこに　あると\n信じ込ませる　パントマイムの　達人。\n信じさせた　ものは　本当に　現れる。"
          alpha_sapphire: "目に　見えない　ものを　身振りで　そこに　あると\n信じ込ませる　パントマイムの　達人。\n信じさせた　ものは　本当に　現れる。"
        en:
          omega_ruby: "Mr. Mime is a master of pantomime. Its gestures and motions\nconvince watchers that something unseeable actually exists.\nOnce the watchers are convinced, the unseeable thing exists\nas if it were real."
          alpha_sapphire: "Mr. Mime is a master of pantomime. Its gestures and motions\nconvince watchers that something unseeable actually exists.\nOnce the watchers are convinced, the unseeable thing exists\nas if it were real."
        fr:
          omega_ruby: "M. Mime est un pantomime hors pair. Ses gestes et ses\nmouvements parviennent à faire croire que quelque chose\nd’invisible existe réellement. Lorsqu’on y croit, ces choses\ndeviennent palpables."
          alpha_sapphire: "M. Mime est un pantomime hors pair. Ses gestes et ses\nmouvements parviennent à faire croire que quelque chose\nd’invisible existe réellement. Lorsqu’on y croit, ces choses\ndeviennent palpables."
        it:
          omega_ruby: "Mr. Mime è un esperto di mimica. La sua gestualità e i suoi\nmovimenti convincono l’osservatore dell’esistenza di oggetti\ninvisibili, che saranno percepiti come concreti e reali."
          alpha_sapphire: "Mr. Mime è un esperto di mimica. La sua gestualità e i suoi\nmovimenti convincono l’osservatore dell’esistenza di oggetti\ninvisibili, che saranno percepiti come concreti e reali."
        de:
          omega_ruby: "Pantimos ist ein Meister der Pantomime. Seine Gesten und\nBewegungen machen den Zuschauer glauben, dass etwas\nUnsichtbares tatsächlich existiert. Wenn ein Objekt für real\ngehalten wird, beginnt es, wirklich zu existieren."
          alpha_sapphire: "Pantimos ist ein Meister der Pantomime. Seine Gesten und\nBewegungen machen den Zuschauer glauben, dass etwas\nUnsichtbares tatsächlich existiert. Wenn ein Objekt für real\ngehalten wird, beginnt es, wirklich zu existieren."
        es:
          omega_ruby: "Mr. Mime es un experto en pantomima. Con sus gestos y\nmovimientos es capaz de convencer a sus espectadores de\nque algo existe, cuando en realidad no es así. Pero, cuando\nel público se lo cree, las ilusiones se hacen realidad."
          alpha_sapphire: "Mr. Mime es un experto en pantomima. Con sus gestos y\nmovimientos es capaz de convencer a sus espectadores de\nque algo existe, cuando en realidad no es así. Pero, cuando\nel público se lo cree, las ilusiones se hacen realidad."
        ko:
          omega_ruby: "몸짓으로 눈에 보이지 않는 것이 그곳에\n있다고 믿게 만드는 팬터마임의 달인이다.\n있다고 믿게 만든 것은 정말로 나타난다."
          alpha_sapphire: "몸짓으로 눈에 보이지 않는 것이 그곳에\n있다고 믿게 만드는 팬터마임의 달인이다.\n있다고 믿게 만든 것은 정말로 나타난다."
