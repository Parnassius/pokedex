        en:
          omega_ruby: "The heads on their arms do not have brains.\nThey use all three heads to consume and\ndestroy everything."
          alpha_sapphire: "It responds to movement by attacking. This scary,\nthree-headed Pokémon devours everything in\nits path!"
        fr:
          omega_ruby: "Les têtes sur ses bras n’ont pas de cerveau. Avec ses trois\ntêtes, il dévore et détruit tout."
          alpha_sapphire: "Un Pokémon effrayant. Ses trois têtes dévorent tout ce qui\nbouge jusqu’à satiété."
        it:
          omega_ruby: "Le teste che ha sugli arti non hanno cervello. Distrugge\ne divora qualsiasi cosa usando tutte e tre le teste."
          alpha_sapphire: "È davvero terrificante. Reagisce a ogni cosa che si muove,\nattaccandola e sbranandola con le sue tre teste."
        de:
          omega_ruby: "Die Köpfe an seinen beiden Armen haben kein eigenes Gehirn.\nSeine drei Mäuler kauen alles radikal kurz und klein."
          alpha_sapphire: "Ein kaltblütiges Pokémon, das auf alles reagiert, was sich\nbewegt, indem es mit seinen drei Köpfen danach schnappt."
        es:
          omega_ruby: "Las cabezas de sus dos brazos no tienen cerebro. Con sus\ntres cabezas destruye y devora todo a su paso."
          alpha_sapphire: "Un Pokémon temible que ataca todo lo que se mueve y\ndevora con sus tres cabezas cuanto halla a su paso."
        ko:
          omega_ruby: "양팔에 있는 머리에는 뇌가\n없다. 3개의 머리로 모든 것을\n먹어치워 파괴해 버린다."
          alpha_sapphire: "움직이는 것에 반응하여\n덮쳐서 3개의 머리로\n먹어치우는 무시무시한 포켓몬."
