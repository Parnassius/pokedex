      descriptions:
        jp_kana:
          omega_ruby: "かなしみの　くるしさと　よろこびの\nとうとさを　ひとびとに　おしえた。\nかんじょうのかみ　と　よばれている。"
          alpha_sapphire: "みずうみの　そこで　ねむっているが\nたましいが　ぬけだして　すいめんを\nとびまわると　いわれている。"
        jp_kanji:
          omega_ruby: "悲しみの　苦しさと　喜びの　尊さを\n人々に　教えた。\n感情の神と　呼ばれている。"
          alpha_sapphire: "湖の　底で　眠っているが\n魂が　抜け出して　水面を\n飛び回ると　言われている。"
        en:
          omega_ruby: "Known as “The Being of Emotion.” It taught\nhumans the nobility of sorrow, pain, and joy."
          alpha_sapphire: "It sleeps at the bottom of a lake. Its spirit is said to\nleave its body to fly on the lake’s surface."
        fr:
          omega_ruby: "On l’appelle « être de l’émotion ». Il enseigne aux hommes\nla beauté de la tristesse, la douleur et la joie."
          alpha_sapphire: "Il dort au fond d’un lac. On dit que son esprit abandonne\nson corps pour voler à sa surface."
        it:
          omega_ruby: "Detto “Essere delle emozioni”. Ha insegnato agli uomini\nla nobiltà di tristezza, gioia e dolore."
          alpha_sapphire: "Dorme sul fondo di un lago. Si dice che il suo spirito\nabbandoni il corpo per volare in superficie."
        de:
          omega_ruby: "„Das fühlende Wesen“. Es lehrt die Menschen die Ideale von\nTrauer, Schmerz und Freude."
          alpha_sapphire: "Es schläft auf dem Grund eines Sees. Man sagt, sein Geist\nverlasse den Körper und fliege über den See."
        es:
          omega_ruby: "Se le conoce como el Ser de la Emoción. Enseñó a los\nhumanos la nobleza del dolor y la alegría."
          alpha_sapphire: "Duerme en el fondo de un lago. Se dice que su espíritu deja\nel cuerpo para volar sobre el agua."
        ko:
          omega_ruby: "슬픔의 괴로움과 즐거움의 소중함을\n사람들에게 가르쳐 주었다.\n감정의 신이라 불리고 있다."
          alpha_sapphire: "호수의 밑바닥에서 잠자고 있지만\n영혼이 빠져나가서 수면을\n날아다닌다고 전해진다."
