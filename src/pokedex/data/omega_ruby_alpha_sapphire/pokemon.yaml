          alpha_sapphire: "大きな　鳴き声は　１キロ　先まで　届く。\nあちこちで　カン高い　声が　聞こえる　ときは\n仲間たちに　危険を　報せている　合図だ。"
        en:
          omega_ruby: "Spearow has a very loud cry that can be heard over\nhalf a mile away. If its high, keening cry is heard echoing all\naround, it is a sign that they are warning each other of danger."
          alpha_sapphire: "Spearow has a very loud cry that can be heard over\nhalf a mile away. If its high, keening cry is heard echoing all\naround, it is a sign that they are warning each other of danger."
        fr:
          omega_ruby: "Piafabec crie tellement fort qu’il peut être entendu à 1 km\nde distance. Ces Pokémon se préviennent d’un danger\nen entonnant une mélopée très aiguë, qu’ils se renvoient\nles uns les autres, comme un écho."
          alpha_sapphire: "Piafabec crie tellement fort qu’il peut être entendu à 1 km\nde distance. Ces Pokémon se préviennent d’un danger\nen entonnant une mélopée très aiguë, qu’ils se renvoient\nles uns les autres, comme un écho."
        it:
          omega_ruby: "Spearow emette un grido molto acuto, percepibile anche\na 1 km di distanza. Quando questo grido riecheggia\nnei dintorni, questo Pokémon intende avvertire i suoi simili\ndi un pericolo imminente."
          alpha_sapphire: "Spearow emette un grido molto acuto, percepibile anche\na 1 km di distanza. Quando questo grido riecheggia\nnei dintorni, questo Pokémon intende avvertire i suoi simili\ndi un pericolo imminente."
        de:
          omega_ruby: "Habitak kann einen sehr lauten Schrei ausstoßen,\nden man über die Entfernung von 1 km vernehmen kann.\nDurch das Echo seiner hohen, wehklagenden Schreie warnt\ndieses Pokémon seine Artgenossen vor drohender Gefahr."
          alpha_sapphire: "Habitak kann einen sehr lauten Schrei ausstoßen,\nden man über die Entfernung von 1 km vernehmen kann.\nDurch das Echo seiner hohen, wehklagenden Schreie warnt\ndieses Pokémon seine Artgenossen vor drohender Gefahr."
        es:
          omega_ruby: "Spearow pía con tanta fuerza que se le puede oír a 1 km de\ndistancia. Si al agudo chillido le sigue una especie de eco,\nestaremos oyendo la respuesta de otros Spearow que\ncontestan ante el aviso de peligro."
          alpha_sapphire: "Spearow pía con tanta fuerza que se le puede oír a 1 km de\ndistancia. Si al agudo chillido le sigue una especie de eco,\nestaremos oyendo la respuesta de otros Spearow que\ncontestan ante el aviso de peligro."
        ko:
          omega_ruby: "큰 울음소리는 1km 밖까지 도달한다.\n여기저기에서 높은 울음소리가 들릴 때는\n동료에게 위험을 알리고 있는 신호다."
          alpha_sapphire: "큰 울음소리는 1km 밖까지 도달한다.\n여기저기에서 높은 울음소리가 들릴 때는\n동료에게 위험을 알리고 있는 신호다."
