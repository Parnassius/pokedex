          alpha_sapphire: "生き物の　すまない　海底で　眠っている。\n台風が　やってくると　目を　覚まして\n獲物を　探しに　うろつき回ると　いわれる。"
        en:
          omega_ruby: "Kingdra lives at extreme ocean depths that are otherwise\nuninhabited. It has long been believed that the yawning of this\nPokémon creates spiraling ocean currents."
          alpha_sapphire: "Kingdra sleeps on the seafloor where it is otherwise devoid\nof life. When a storm arrives, the Pokémon is said to awaken\nand wander about in search of prey."
        fr:
          omega_ruby: "Hyporoi vit au fin fond des profondeurs océaniques\ngénéralement inhabitées. On a longtemps cru que\nle bâillement de ce Pokémon créait les tourbillons\ndans les océans."
          alpha_sapphire: "Hyporoi dort au fond de l’océan, où aucune autre forme\nde vie ne réside. On raconte que lorsqu’une tempête survient,\nc’est que ce Pokémon s’éveille et erre dans les profondeurs\nen quête de proies."
        it:
          omega_ruby: "Kingdra vive negli abissi oceanici di solito privi di ogni forma\ndi vita. Si crede che uno sbadiglio di Kingdra generi correnti\noceaniche spiraliformi."
          alpha_sapphire: "Kingdra dorme sui fondali marini dove di solito non esistono\nforme di vita. Si dice che in caso di tempesta Kingdra si svegli\ne vada in cerca di prede."
        de:
          omega_ruby: "Seedraking lebt in den Tiefen des Ozeans, die ansonsten\nverwaist sind. Lange hat man geglaubt, dass das Gähnen\ndieses Pokémon Strudel auslöst."
          alpha_sapphire: "Seedraking schläft auf dem Meeresboden, wo ansonsten\nniemand lebt. Wenn ein Sturm aufkommt, wacht es auf und\nmacht sich auf die Suche nach Beute."
        es:
          omega_ruby: "Kingdra vive en lo más profundo del océano, donde no habita\nninguna otra especie. Siempre se ha pensado que su bostezo\ncausaba las corrientes en remolino que se dan en el océano."
          alpha_sapphire: "Kingdra duerme en el lecho marino, donde apenas pueden\nencontrarse otras formas de vida. Cuando estalla una\ntormenta, dicen que se despierta y se pone a vagar en busca\nde su presa."
        ko:
          omega_ruby: "생물이 살지 않는 심해에 서식한다.\n킹드라의 하품이 해류의 소용돌이를\n일으킨다고 오랫동안 믿어져 왔다."
          alpha_sapphire: "생물이 살지 않는 해저에서 자고 있다.\n태풍이 오면 눈을 뜨고\n먹이를 찾으러 돌아다닌다고 전해진다."
