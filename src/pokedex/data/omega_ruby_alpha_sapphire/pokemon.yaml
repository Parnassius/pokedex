          omega_ruby: "せいでんきが　たまって　パチパチする\nけだまを　だいこうぶつの　きのみと\nいっしょに　みきの　あなに　かくす。"
          alpha_sapphire: "たまった　でんきを　わけあたえようと\nほほぶくろを　こすりあわせる\nパチリスを　みかけることも　ある。"
        jp_kanji:
          omega_ruby: "静電気が　たまって　パチパチする\n毛玉を　大好物の　木の実と　一緒に\n幹の　穴に　隠す。"
          alpha_sapphire: "たまった　電気を　分け与えようと\nほほ袋を　こすり合わせる\nパチリスを　見かけることも　ある。"
        en:
          omega_ruby: "It makes fur balls that crackle with static electricity.\nIt stores them with berries in tree holes."
          alpha_sapphire: "A pair may be seen rubbing their cheek pouches\ntogether in an effort to share stored electricity."
        fr:
          omega_ruby: "Il roule des boules de poils pleines d’électricité statique\net les range dans des souches avec des Baies."
          alpha_sapphire: "Il arrive que deux Pachirisu se frottent les joues pour partager\nl’électricité qu’ils ont accumulée."
        it:
          omega_ruby: "Forma delle palle di pelo cariche elettrostaticamente e le\nconserva negli alberi insieme alle bacche."
          alpha_sapphire: "Talvolta due esemplari si sfregano le guance per condividere\nl’elettricità immagazzinata."
        de:
          omega_ruby: "Es bildet ein Fellknäuel, der vor statischer Energie knistert.\nEs speichert die Energie in Bäumen."
          alpha_sapphire: "Um gespeicherte Elektrizität zu teilen, reiben zwei von ihnen\nihre Backentaschen aneinander."
        es:
          omega_ruby: "Crea bolas de pelo que crepitan con electricidad estática.\nLas almacena en agujeros de árboles."
          alpha_sapphire: "A veces se ve a dos frotándose las bolsas de las mejillas\npara compartir electricidad almacenada."
        ko:
          omega_ruby: "정전기가 모여 톡톡 튀는 솜털을\n자신이 좋아하는 나무열매와 함께\n나무줄기의 구멍에 숨긴다."
          alpha_sapphire: "모인 전기를 나눠주려고\n뺨의 주머니를 서로 비비는\n파치리스가 발견되기도 한다."
