      types:
        - fire
      egg_groups:
        - field
      abilities:
        - white_smoke
      hidden_ability: shell_armor
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          omega_ruby: "やまを　ほって　せきたんを　みつけては　せっせと\nこうらの　くうどうに　いれて　もやす　ポケモン。\nおそわれると　くろい　けむりを　だして　にげる。"
          alpha_sapphire: "せきたんを　もやして　エネルギーを　つくりだす。\nひの　いきおいが　よわまると　げんきが　なくなり\nたたかう　ときは　せきたんを　たくさん　もやす。"
        jp_kanji:
          omega_ruby: "山を　掘って　石炭を　見つけては　せっせと\n甲羅の　空洞に　入れて　燃やす　ポケモン。\n襲われると　黒い　煙を　出して　逃げる。"
          alpha_sapphire: "石炭を　燃やして　エネルギーを　つくりだす。\n火の　勢いが　弱まると　元気が　なくなり\n戦う　ときは　石炭を　沢山　燃やす。"
        en:
          omega_ruby: "Torkoal digs through mountains in search of coal. If it finds\nsome, it fills hollow spaces on its shell with the coal and burns\nit. If it is attacked, this Pokémon spouts thick black smoke to\nbeat a retreat."
          alpha_sapphire: "Torkoal generates energy by burning coal. It grows weaker\nas the fire dies down. When it is preparing for battle, this\nPokémon burns more coal."
        fr:
          omega_ruby: "Chartor fore les montagnes à la recherche de charbon.\nLorsqu’il en trouve, il le met dans les emplacements creux\nde sa carapace pour le brûler. Quand il est attaqué,\nce Pokémon crache une épaisse fumée noire pour s’enfuir."
          alpha_sapphire: "Chartor génère de l’énergie en brûlant du charbon.\nIl s’affaiblit lorsque le feu s’éteint. Lorsqu’il se prépare\nau combat, ce Pokémon brûle plus de charbon."
        it:
          omega_ruby: "Torkoal scava in montagna in cerca di carbone. Quando\nlo trova, lo usa per riempire la cavità della propria corazza\ne poi lo brucia. In caso di aggressione, emette nubi di\nfumo nero per poi battere in ritirata."
          alpha_sapphire: "Torkoal genera energia bruciando il carbone. Si indebolisce\ncon l’affievolirsi del fuoco. In preparazione alle lotte\nil Pokémon brucia maggiori quantità di carbone."
        de:
          omega_ruby: "Qurtel schaufelt sich auf der Suche nach Kohle durch\ndie Berge. Wenn es welche findet, füllt es die Hohlräume\nseines Panzers mit Kohle und verbrennt diese. Wenn es\nangegriffen wird, stößt es dicken schwarzen Rauch aus."
          alpha_sapphire: "Qurtel erzeugt Energie, indem es Kohle verbrennt. Wenn das\nFeuer nachlässt, wird es schwächer. In der Vorbereitung auf\neinen Kampf verbrennt dieses Pokémon mehr Kohle."
        es:
          omega_ruby: "Torkoal va cavando por las montañas en busca de carbón.\nCuando lo encuentra, rellena los huecos que tiene dentro del\ncaparazón y lo quema. Si le atacan, este Pokémon echa un\nhumo negro que le permite la retirada."
          alpha_sapphire: "Torkoal genera energía quemando carbón. A medida que se\nextingue el fuego, se va debilitando. Antes de entrar en\ncombate, quema más carbón de lo habitual."
        ko:
          omega_ruby: "산을 파서 석탄을 발견하면 부지런히\n등껍질의 빈 곳에 넣고 태우는 포켓몬이다.\n습격당하면 검은 연기를 내고 도망간다."
          alpha_sapphire: "석탄을 태워서 에너지를 만들어낸다.\n불의 기세가 약해지면 기운이 없어져\n싸울 때는 석탄을 많이 태운다."
spoink:
