        - prankster
      hidden_ability: defiant
      descriptions:
        jp_kana:
          omega_ruby: "くものような　エネルギーたいに\nかはんしんが　つつまれている。\nじそく３００キロで　そらを　とぶ。"
          alpha_sapphire: "トルネロスの　しっぽから　ふきだした\nエネルギーが　おおあらしを　おこす。\nみんかを　ふきとばす　パワー。"
        jp_kanji:
          omega_ruby: "雲のような　エネルギー体に\n下半身が　包まれている。\n時速３００キロで　空を　飛ぶ。"
          alpha_sapphire: "トルネロスの　尻尾から　噴き出した\nエネルギーが　大嵐を　起こす。\n民家を　吹き飛ばす　パワー。"
        en:
          omega_ruby: "The lower half of its body is wrapped in a cloud of\nenergy. It zooms through the sky at 200 mph."
          alpha_sapphire: "Tornadus expels massive energy from its tail,\ncausing severe storms. Its power is great enough\nto blow houses away."
        fr:
          omega_ruby: "Le bas de son corps est entouré d’une masse d’énergie\nsemblable à un nuage. Il vole dans le ciel à 300 km/h."
          alpha_sapphire: "L’énergie dégagée par sa queue provoque d’énormes\ntempêtes dont la force peut renverser des maisons."
        it:
          omega_ruby: "Ha la parte inferiore del corpo avvolta in una nuvola di energia.\nSfreccia nei cieli a 300 km/h."
          alpha_sapphire: "L’energia sprigionata dalla coda di Tornadus provoca una\nviolenta tempesta in grado di spazzare via le case."
        de:
          omega_ruby: "Sein Unterkörper ist in eine wolkenartige Energieschicht\ngehüllt. Es jagt mit bis zu 300 km/h durch die Lüfte."
          alpha_sapphire: "Mit der Energie aus seiner Rute erzeugt es wilde Stürme,\ndie stark genug sind, um ganze Wohnhäuser davonzuwehen."
        es:
          omega_ruby: "La parte inferior de su cuerpo, similar a una nube, está\nrecubierta de un campo de energía. Vuela a 300 km/h."
          alpha_sapphire: "La energía que desprende de su cola genera violentas\ntempestades capaces de echar abajo casas."
        ko:
          omega_ruby: "구름처럼 생긴 에너지체에\n하반신이 둘러싸여 있다.\n시속 300km로 하늘을 난다."
          alpha_sapphire: "토네로스의 꼬리에서 뿜어져 나온\n에너지가 큰 폭풍을 일으킨다.\n민가를 날려버릴 정도의 힘이다."
