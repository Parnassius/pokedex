        jp_kana:
          omega_ruby: "ゴミぶくろが　さんぎょうはいきぶつと\nかがくへんかを　おこした　ことで\nポケモンとして　うまれかわった。"
          alpha_sapphire: "ふえいせいな　ばしょを　このむ。\nゲップのように　はきだす　ガスを\nすいこむと　１しゅうかん　ねこむ。"
        jp_kanji:
          omega_ruby: "ゴミ袋が　産業廃棄物と\n化学変化を　起こした　ことで\nポケモンとして　生まれ変わった。"
          alpha_sapphire: "不衛生な　場所を　好む。\nゲップのように　吐き出す　ガスを\n吸いこむと　１週間　寝込む。"
        en:
          omega_ruby: "The combination of garbage bags and industrial\nwaste caused the chemical reaction that created\nthis Pokémon."
          alpha_sapphire: "Inhaling the gas they belch will make you sleep for\na week. They prefer unsanitary places."
        fr:
          omega_ruby: "Il est né de la mutation d’un sac poubelle contenant\ndes déchets industriels."
          alpha_sapphire: "Il aime les endroits mal tenus. Le gaz qu’il rote endort\npendant une semaine."
        it:
          omega_ruby: "È nato da un sacchetto della spazzatura che ha subito\nun cambiamento chimico a causa delle scorie industriali."
          alpha_sapphire: "Predilige luoghi insalubri. Esala gas dalle fauci in grado di\naddormentare per una settimana."
        de:
          omega_ruby: "Eine Mülltüte, der Industrieabfälle und chemische Reaktionen\nneues Leben eingehaucht haben."
          alpha_sapphire: "Hat ein Faible für schmutzige Orte. Wer das Gas einatmet,\ndas es mit Rülpslauten ausstößt, schläft eine Woche durch."
        es:
          omega_ruby: "Pokémon nacido de la reacción química entre una bolsa de\nbasura y residuos industriales."
          alpha_sapphire: "Le gustan los lugares con suciedad. Quien inhala los gases\nque eructa duerme durante una semana."
        ko:
          omega_ruby: "쓰레기 봉지가 산업 폐기물과\n화학적 변화를 일으켜서\n포켓몬으로 다시 태어났다."
          alpha_sapphire: "비위생적인 장소를 좋아한다.\n트림하듯이 토해내는 가스를\n들이마시면 1주일 동안 잠에 빠진다."
garbodor:
