skiddo:
  species_id: 672
  names:
    jp_kana: メェークル
    jp_kanji: メェークル
    en: Skiddo
    fr: Cabriolaine
    it: Skiddo
    de: Mähikel
    es: Skiddo
    ko: 메이클
  forms:
    skiddo:
      form_id: 0
      base_stats:
        hp: 66
        attack: 65
        defense: 48
        special_attack: 62
        special_defense: 57
        speed: 52
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - sap_sipper
      hidden_ability: grass_pelt
      descriptions:
        jp_kana:
          omega_ruby: "ひとと　くらすようになった\nさいしょの　ポケモンと　いわれる。\nおだやかな　せいかくの　ポケモン。"
          alpha_sapphire: "みずと　たいようが　あれば　せなかの\nはっぱで　エネルギーが　つくれるので\nエサを　たべなくても　へいきなのだ。"
        jp_kanji:
          omega_ruby: "人と　暮らすようになった\n最初の　ポケモンと　言われる。\n穏やかな　性格の　ポケモン。"
          alpha_sapphire: "水と　太陽が　あれば　背中の\n葉っぱで　エネルギーが　作れるので\nエサを　食べなくても　平気なのだ。"
        en:
          omega_ruby: "Thought to be one of the first Pokémon to live in\nharmony with humans, it has a placid disposition."
          alpha_sapphire: "If it has sunshine and water, it doesn’t\nneed to eat, because it can generate\nenergy from the leaves on its back."
        fr:
          omega_ruby: "Ce Pokémon paisible serait le premier à avoir jamais cohabité\navec les humains."
          alpha_sapphire: "Tant qu’il a de l’eau et du soleil en abondance,\nce Pokémon n’a pas besoin de nourriture. Les feuilles\nsur son dos produisent son énergie par photosynthèse."
        it:
          omega_ruby: "Ha un carattere pacifico ed è considerato il primo Pokémon\nad avere stretto amicizia con l’uomo."
          alpha_sapphire: "Ricava energia dal sole e dall’acqua grazie alle foglie che ha\nsul dorso. In questo modo può sopravvivere anche senza\nmangiare."
        de:
          omega_ruby: "Man sagt, es sei eines der ersten Pokémon, die mit Menschen\nzusammengelebt haben. Es ist sehr ruhig und friedfertig."
          alpha_sapphire: "Solange es Wasser und Sonnenlicht hat, kann es mit\nden Blättern auf seinem Rücken Energie erzeugen.\nDeswegen kommt es auch ohne Futter zurecht."
        es:
          omega_ruby: "Se dice que fue la primera especie de Pokémon que se\nacostumbró a vivir con los seres humanos. Tiene una\nnaturaleza muy afable."
          alpha_sapphire: "Puede generar energía con las hojas que tiene en la espalda\ndisponiendo tan solo de agua y luz solar. Gracias a ello puede\nsobrevivir sin comer."
        ko:
          omega_ruby: "사람과 살기 시작한\n최초의 포켓몬이라고 한다.\n온화한 성격의 포켓몬이다."
          alpha_sapphire: "물과 태양이 있으면 등에 있는\n잎으로 에너지를 만들 수 있어서\n먹이를 먹지 않아도 괜찮다."
gogoat:
  species_id: 673
  names:
    jp_kana: ゴーゴート
    jp_kanji: ゴーゴート
    en: Gogoat
    fr: Chevroum
    it: Gogoat
    de: Chevrumm
    es: Gogoat
    ko: 고고트
  forms:
    gogoat:
      form_id: 0
      base_stats:
        hp: 123
        attack: 100
        defense: 62
        special_attack: 97
        special_defense: 81
        speed: 68
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - field
      abilities:
        - sap_sipper
      hidden_ability: grass_pelt
      descriptions:
        jp_kana:
          omega_ruby: "ツノを　にぎる　わずかな　ちがいから\nトレーナーの　きもちを　よみとるので\nいったいとなって　はしれるのだ。"
          alpha_sapphire: "さんがくちたいで　せいかつする。\nツノを　ぶつけあう　ちからくらべの\nしょうしゃが　むれの　リーダーだ。"
        jp_kanji:
          omega_ruby: "ツノを　握る　わずかな　違いから\nトレーナーの　気持ちを　読み取るので\n一体となって　走れるのだ。"
          alpha_sapphire: "山岳地帯で　生活する。\nツノを　ぶつけ合う　力比べの　勝者が\n群れの　リーダーだ。"
        en:
          omega_ruby: "It can tell how its Trainer is feeling by\nsubtle shifts in the grip on its horns.\nThis empathic sense lets them run as if one being."
          alpha_sapphire: "They inhabit mountainous regions.\nThe leader of the herd is decided by\na battle of clashing horns."
        fr:
          omega_ruby: "Quand son Dresseur le tient par une corne, il est capable\nde deviner ses plus subtils changements d’humeur et\nde s’y adapter."
          alpha_sapphire: "Ce Pokémon vit dans les régions montagneuses. Le chef\ndu troupeau s’impose à l’issue d’un combat de cornes."
        it:
          omega_ruby: "È in grado di intuire gli stati d’animo del suo Allenatore dal\nmodo in cui questi gli afferra le corna. Questo permette\na entrambi di correre in perfetta armonia."
          alpha_sapphire: "Vive in regioni montuose. Questi Pokémon stabiliscono il\nleader del gruppo confrontandosi a cornate."
        de:
          omega_ruby: "Es kann die Stimmung seines Trainers an der kleinsten\nVeränderung dessen Griffes um seine Hörner ablesen\nund galoppiert sofort los, wenn dieser es wünscht."
          alpha_sapphire: "Sie leben im Gebirge. Der Herdenanführer wird durch ein\nKräftemessen gewählt, bei dem die Anwärter ihre Hörner\ngegeneinander rammen."
        es:
          omega_ruby: "Percibe los sentimientos del Entrenador por la forma en la que\nagarra sus cuernos, aunque sean variaciones sutiles, y así\navanzan como si fueran un solo ente."
          alpha_sapphire: "Habita en regiones montañosas. El líder de la manada se\ndecide en una demostración de fuerza en la que los\ncontendientes luchan con los cuernos."
        ko:
          omega_ruby: "뿔을 잡을 때 느껴지는 작은 차이로\n트레이너의 마음을 읽어낼 수 있기에\n하나가 되어 달릴 수 있는 것이다."
          alpha_sapphire: "산악 지대에서 생활한다.\n뿔을 서로 부딪쳐서 힘을 겨루어\n승자가 무리의 리더가 된다."
pancham:
  species_id: 674
  names:
    jp_kana: ヤンチャム
    jp_kanji: ヤンチャム
    en: Pancham
    fr: Pandespiègle
    it: Pancham
    de: Pam-Pam
    es: Pancham
    ko: 판짱
  forms:
    pancham:
      form_id: 0
      base_stats:
        hp: 67
        attack: 82
        defense: 62
        special_attack: 46
        special_defense: 48
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          omega_ruby: "てきに　なめられないよう　がんばって\nにらみつけるが　こうかは　うすい。\nくわえた　はっぱが　トレードマーク。"
          alpha_sapphire: "いっしょうけんめい　こわい　かおで\nあいてを　にらみつけるが　あたまを\nなでられると　つい　にやけてしまう。"
        jp_kanji:
          omega_ruby: "敵に　なめられないよう　がんばって\nにらみつけるが　効果は　薄い。\nくわえた　葉っぱが　トレードマーク。"
          alpha_sapphire: "一生懸命　怖い　顔で　相手を\nにらみつけるが　頭を　なでられると\nつい　にやけてしまう。"
        en:
          omega_ruby: "It does its best to be taken seriously by its enemies,\nbut its glare is not sufficiently intimidating.\nChewing on a leaf is its trademark."
          alpha_sapphire: "It does its level best to glare and pull a scary face,\nbut it can’t help grinning if anyone pats its head."
        fr:
          omega_ruby: "Il fait son possible pour intimider ses adversaires avec\nun regard menaçant, mais sans succès. Il a l’habitude\nde constamment mâcher une feuille."
          alpha_sapphire: "Il fait de son mieux pour avoir un air patibulaire, mais il sourit\nbéatement dès qu’on lui caresse la tête."
        it:
          omega_ruby: "Fa di tutto per farsi prendere sul serio dai nemici, ma il suo\nsguardo di sfida non è molto efficace. Ha il vizio di masticare\nuna foglia."
          alpha_sapphire: "Ce la mette tutta per intimorire i nemici con uno sguardo\ntruce, ma appena qualcuno gli accarezza la testa, diventa\nun tenerone."
        de:
          omega_ruby: "Es starrt den Gegner finster an, um nicht unterschätzt zu\nwerden, hat aber nur wenig Erfolg damit. Das Kauen auf\neinem Blatt ist sein Markenzeichen."
          alpha_sapphire: "Es gibt alles, um ein finsteres Gesicht zu machen und\nsein Gegenüber böse anzustarren, aber wenn es am\nKopf gestreichelt wird, muss es unwillkürlich grinsen."
        es:
          omega_ruby: "Se esfuerza mucho para que el enemigo no lo menosprecie,\npero su mirada no intimida demasiado. Se caracteriza por\nmascar siempre una hoja."
          alpha_sapphire: "Se desvive tratando de fulminar a su rival con una mirada\naterradora, pero en cuanto le acarician la cabeza, no puede\nevitar sonreír de oreja a oreja."
        ko:
          omega_ruby: "적이 얕잡아 보지 못하도록 열심히\n노려보지만, 효과가 약하다.\n물고 있는 잎사귀가 트레이드마크다."
          alpha_sapphire: "무서운 얼굴로 열심히\n상대를 노려보지만 머리를\n쓰다듬어주면 금방 해죽거린다."
