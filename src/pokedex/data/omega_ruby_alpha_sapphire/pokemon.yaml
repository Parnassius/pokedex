          alpha_sapphire: "でんせつで　かたられる　ポケモン。\nポケモンを　まもるため　じまんの\nパワーで　しろを　こわした。"
        jp_kanji:
          omega_ruby: "巨大な　城壁を\n一撃で　突破するほどの　突進力。\n伝説で　語られる　ポケモン。"
          alpha_sapphire: "伝説で　語られる　ポケモン。\nポケモンを　守るため　自慢の\nパワーで　城を　壊した。"
        en:
          omega_ruby: "Its charge is strong enough to break through a\ngiant castle wall in one blow. This Pokémon is\nspoken of in legends."
          alpha_sapphire: "Spoken of in legend, this Pokémon used its\nphenomenal power to destroy a castle in its effort\nto protect Pokémon."
        fr:
          omega_ruby: "Sa puissance d’impact lui permet d’enfoncer d’un seul coup\nle rempart d’un château. Un Pokémon de légende."
          alpha_sapphire: "Un Pokémon de légende. Grâce à sa puissance phénoménale,\nil aurait détruit un château pour sauver des Pokémon."
        it:
          omega_ruby: "Quando carica, ha una forza tale da sfondare un’enorme\nmuraglia. Si racconta di lui nelle leggende."
          alpha_sapphire: "Si racconta di lui nelle leggende. Per salvare i Pokémon, ha\ndistrutto un castello con il suo immenso potere."
        de:
          omega_ruby: "Seine Angriffskraft genügt, um selbst mächtige Wälle\nniederzureißen. Ein Held zahlreicher Legenden."
          alpha_sapphire: "Ein in Legenden besungenes Pokémon. Mit seinen\neinzigartigen Kräften zerstörte es zum Schutz der\nPokémon ein Schloss."
        es:
          omega_ruby: "Su potencia al embestir es capaz de derribar las murallas de\nun castillo. Las leyendas hablan de sus proezas."
          alpha_sapphire: "Las leyendas hablan de este Pokémon, que derribó un castillo\ncon su propia fuerza para proteger a otros Pokémon."
        ko:
          omega_ruby: "거대한 성벽을 일격에\n돌파할 만한 돌진력을 가졌다.\n전설로 전해지는 포켓몬이다."
          alpha_sapphire: "전설로 전해지는 포켓몬.\n포켓몬을 지키기 위해 자랑스러운\n파워로 성을 부쉈다."
virizion:
  species_id: 640
  names:
    jp_kana: ビリジオン
    jp_kanji: ビリジオン
    en: Virizion
    fr: Viridium
    it: Virizion
    de: Viridium
    es: Virizion
    ko: 비리디온
