        jp_kana:
          omega_ruby: "ひとなつっこい　ドラゴンポケモン。\nだいすきな　トレーナーに　だきついて\nねんえきで　ヌルヌルにしてしまう。"
          alpha_sapphire: "のびちぢみする　ツノで　こうげき。\nプロボクサー　１００にんぶんの\nパンチに　ひってきする　いりょく。"
        jp_kanji:
          omega_ruby: "人懐っこい　ドラゴンポケモン。\n大好きな　トレーナーに　抱き着いて\n粘液で　ヌルヌルにしてしまう。"
          alpha_sapphire: "伸び縮みする　ツノで　攻撃。\nプロボクサー　１００人分の\nパンチに　匹敵する　威力。"
        en:
          omega_ruby: "This very friendly Dragon-type Pokémon\nwill hug its beloved Trainer, leaving\nthat Trainer covered in sticky slime."
          alpha_sapphire: "It attacks with retractable horns.\nIt throws a punch that’s the equivalent\nof the force of a hundred pro boxers."
        fr:
          omega_ruby: "Ce Pokémon Dragon peu farouche aime faire la fête\nà son Dresseur adoré, le couvrant au passage de\nsa bave collante."
          alpha_sapphire: "Il attaque grâce à ses cornes extensibles. Ses coups sont\naussi puissants que ceux de 100 boxeurs professionnels\nréunis."
        it:
          omega_ruby: "Un Pokémon Drago davvero amichevole. Ama fare le feste\nal suo Allenatore lasciandolo ricoperto di bava."
          alpha_sapphire: "Attacca con i corni che possono allungarsi e accorciarsi.\nHa una forza pari a quella di 100 pugili professionisti."
        de:
          omega_ruby: "Dieses äußerst freundliche Drachen-Pokémon neigt dazu,\nseinen geliebten Trainer zu umarmen und so mit einer dicken\nSchleimschicht zu umhüllen."
          alpha_sapphire: "Es greift den Gegner mit ausfahrbaren Fühlern an.\nSeine Stärke ist vergleichbar mit der Durchschlagskraft\nder Faustschläge von 100 Profiboxern."
        es:
          omega_ruby: "Pokémon de tipo Dragón muy afable al que le gusta abrazar\ncon efusión a su Entrenador, aunque después lo deja\ntotalmente pringado."
          alpha_sapphire: "Ataca con sus antenas retráctiles, desplegando una fuerza\ncomparable a los puñetazos de 100 boxeadores profesionales."
        ko:
          omega_ruby: "사람을 잘 따르는 드래곤포켓몬이다.\n좋아하는 트레이너에게 달려들어\n미끈미끈한 점액투성이로 만들어 버린다."
          alpha_sapphire: "늘었다 줄었다 하는 뿔로 공격한다.\n프로 복서 100명분의\n펀치에 필적하는 위력을 가졌다."
klefki:
