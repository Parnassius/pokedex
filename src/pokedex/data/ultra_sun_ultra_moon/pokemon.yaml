tapu_koko:
  species_id: 785
  names:
    jp_kana: カプ・コケコ
    jp_kanji: カプ・コケコ
    en: Tapu Koko
    fr: Tokorico
    it: Tapu Koko
    de: Kapu-Riki
    es: Tapu Koko
    ko: 카푸꼬꼬꼭
    zh_simp: 卡璞・鸣鸣
    zh_trad: 卡璞・鳴鳴
  forms:
    tapu_koko:
      form_id: 0
      base_stats:
        hp: 70
        attack: 115
        defense: 85
        special_attack: 95
        special_defense: 75
        speed: 130
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - electric_surge
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          ultra_sun: "まもりがみと　よばれるが　きぶんを\nがいする　にんげんや　ポケモンには\nおそいかかる　あらぶるかみ　でもある。"
          ultra_moon: "かみなりを　あやつる　メレメレの\nまもりがみ。　こうきしんおうせいで\nときおり　ひとまえに　あらわれる。"
        jp_kanji:
          ultra_sun: "守り神と　呼ばれるが　気分を\n害する　人間や　ポケモンには\n襲い掛かる　荒ぶる神　でもある。"
          ultra_moon: "雷を　操る　メレメレの\n守り神。　好奇心旺盛で\n時折　人前に　現れる。"
        en:
          ultra_sun: "Although it’s called a guardian deity, if a person\nor Pokémon puts it in a bad mood, it will become\na malevolent deity and attack."
          ultra_moon: "The lightning-wielding guardian deity of\nMelemele, Tapu Koko is brimming with curiosity\nand appears before people from time to time."
        fr:
          ultra_sun: "Bien qu’on le considère comme une divinité\nprotectrice, il peut se montrer cruel envers\nles humains et les Pokémon qui l’ont offensé."
          ultra_moon: "Il est le gardien de Mele-Mele et le maître\nde la foudre. D’un naturel curieux, il apparaît\ndevant les humains de temps à autre."
        it:
          ultra_sun: "È considerato un nume protettore ma, se si\noffende, monta su tutte le furie e non esita\nad attaccare Pokémon ed esseri umani."
          ultra_moon: "Protettore di Mele Mele, è in grado di controllare\ni fulmini. La sua grande curiosità a volte lo\nspinge a mostrarsi agli esseri umani."
        de:
          ultra_sun: "Trotz seiner Rolle als Schutzpatron kommt es\nvor, dass es wild wird und andere Pokémon oder\nMenschen angreift, die ihm die Laune verderben."
          ultra_moon: "Der Schutzpatron Mele-Meles gebietet über\nBlitz und Donner. Dieses lebhafte, neugierige\nPokémon zeigt sich ab und an den Menschen."
        es:
          ultra_sun: "Aunque se le considera un espíritu guardián,\nobra también como espíritu vengativo contra\nlas personas y Pokémon que desatan su ira."
          ultra_moon: "El espíritu guardián de Melemele, capaz de\nblandir el rayo. Su eterna curiosidad le lleva\na veces a mostrarse ante las personas."
        ko:
          ultra_sun: "수호신이라고 불리지만\n기분을 해치는 사람이나 포켓몬을\n공격하는 난폭한 신이기도 하다."
          ultra_moon: "번개를 조종하는 멜레멜레의\n수호신. 호기심이 왕성해서\n가끔 사람들 앞에 나타난다."
        zh_simp:
          ultra_sun: "被称为守护神，但也会袭击\n破坏自己心情的人类和宝可梦，\n是性情凶悍的神。"
          ultra_moon: "操纵雷的美乐美乐的守护神。\n好奇心旺盛，\n会时不时在人们面前现身。"
        zh_trad:
          ultra_sun: "雖被稱為守護神，但會去\n襲擊惹自己不開心的人或寶可夢，\n是個性情凶悍的神。"
          ultra_moon: "操縱雷電，是美樂美樂的\n守護神。有著旺盛的好奇心，\n會不時在人們面前現身。"
tapu_lele:
  species_id: 786
  names:
    jp_kana: カプ・テテフ
    jp_kanji: カプ・テテフ
    en: Tapu Lele
    fr: Tokopiyon
    it: Tapu Lele
    de: Kapu-Fala
    es: Tapu Lele
    ko: 카푸나비나
    zh_simp: 卡璞・蝶蝶
    zh_trad: 卡璞・蝶蝶
  forms:
    tapu_lele:
      form_id: 0
      base_stats:
        hp: 70
        attack: 85
        defense: 75
        special_attack: 130
        special_defense: 115
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - psychic_surge
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          ultra_sun: "かがやく　りんぷんを　ふりまいて\nひとや　ポケモンの　きずを　いやす。\nアーカラで　まつられる　まもりがみだ。"
          ultra_moon: "まもりがみと　よばれるが　むじゃきで\nざんこくな　せいしつも　あわせもつ\nしぜんのけしんと　いえる　そんざい。"
        jp_kanji:
          ultra_sun: "輝く　りん粉を　振りまいて\n人や　ポケモンの　傷を　癒す。\nアーカラで　祀られる　守り神だ。"
          ultra_moon: "守り神と　呼ばれるが　無邪気で\n残酷な　性質も　併せ持つ\n自然の化身と　いえる　存在。"
        en:
          ultra_sun: "It heals the wounds of people and Pokémon by\nsprinkling them with its sparkling scales. This\nguardian deity is worshiped on Akala."
          ultra_moon: "Although called a guardian deity, Tapu Lele is\ndevoid of guilt about its cruel disposition and\ncan be described as nature incarnate."
        fr:
          ultra_sun: "C’est le gardien d’Akala. Il saupoudre une pluie\nd’écailles scintillantes sur les humains\net les Pokémon blessés pour les soigner."
          ultra_moon: "Bien qu’on le considère comme une divinité\nprotectrice, cette incarnation parfaite de\nla nature est aussi innocente que cruelle."
        it:
          ultra_sun: "È il Pokémon protettore di Akala.\nSparge luccicanti nuvole di scaglie che\ncurano le ferite di esseri umani e Pokémon."
          ultra_moon: "È considerato il protettore di Akala e\nrappresenta l’incarnazione della natura. Ha\nun’indole innocente e spietata al tempo stesso."
        de:
          ultra_sun: "Es verteilt leuchtenden Flügelstaub, der die\nWunden von Menschen und Pokémon heilt.\nAuf Akala wird es als Schutzpatron verehrt."
          ultra_moon: "Obwohl man es Schutzpatron nennt, verkörpert\nsein zugleich unschuldiges und grausames\nGemüt das zwiegespaltene Wesen der Natur."
        es:
          ultra_sun: "Esparce escamas brillantes que curan a las\npersonas y los Pokémon. En la isla de Akala es\nvenerado como su espíritu guardián."
          ultra_moon: "Este espíritu guardián es tan candoroso como\ndespiadado, por lo que se podría decir que es\nla encarnación de la naturaleza misma."
        ko:
          ultra_sun: "빛나는 인분을 흩뿌려\n사람이나 포켓몬의 상처를 치료한다.\n아칼라에서 모시는 수호신이다."
          ultra_moon: "수호신으로 불리지만 천진난만하면서\n잔혹한 성질도 겸비한\n자연의 화신이라 할 수 있는 존재다."
        zh_simp:
          ultra_sun: "会到处撒着闪闪发光的鳞粉，\n治愈人类和宝可梦的伤。\n是阿卡拉所供奉的守护神。"
          ultra_moon: "被称为守护神，却兼有\n天真无邪与残酷的性格，\n被誉为自然的化身。"
        zh_trad:
          ultra_sun: "會四處散佈閃閃發亮的鱗粉，\n治癒人和寶可夢的傷。\n是阿羅拉的人們信奉的守護神。"
          ultra_moon: "被稱為守護神，卻同時有著\n天真無邪與殘酷的性格，\n可說是大自然的化身。"
tapu_bulu:
