      descriptions:
        jp_kana:
          ultra_sun: "オニドリルの　なわばりで　たべものを\nもって　あるくのは　キケンだ。\nあっという　まに　かっさらわれるぞ。"
          ultra_moon: "アローラでは　さかなポケモンが\nえもの。　うみの　うえを　せんかいし\nエサをさがす　こうけいが　みられる。"
        jp_kanji:
          ultra_sun: "オニドリルの　縄張りで　食べ物を\n持って　歩くのは　危険だ。\nあっという　間に　かっさらわれるぞ。"
          ultra_moon: "アローラでは　さかなポケモンが\n獲物。　海の　上を　旋回し\nエサを探す　光景が　見られる。"
        en:
          ultra_sun: "Carrying food through Fearow’s territory is\ndangerous. It will snatch the food away from\nyou in a flash!"
          ultra_moon: "In Alola, fish Pokémon are its prey. It can be\nseen circling above the ocean searching\nfor food."
        fr:
          ultra_sun: "Si vous vous promenez sur le territoire d’un\nRapasdepic en transportant de la nourriture,\nvous risquez de vite la voir s’envoler !"
          ultra_moon: "À Alola, il se repaît de Pokémon poissons.\nOn le voit souvent voler en cercle au-dessus\ndes flots en quête de nourriture."
        it:
          ultra_sun: "Chi attraversa il suo territorio portando con sé\ndel cibo corre il rischio di vederselo strappare\nvia in men che non si dica."
          ultra_moon: "Ad Alola si ciba di Pokémon acquatici.\nSpesso lo si vede volteggiare sul mare in\ncerca di prede."
        de:
          ultra_sun: "Wer Essbares dabeihat, sollte sich nicht in\nIbitaks Revier begeben, da sonst ein Überfall\naus heiterem Himmel droht."
          ultra_moon: "In Alola findet es seine Beute im Meer. Ibitak, die\nsuchend ihre Kreise über dem Wasser ziehen,\nsind ein typischer Anblick in der Region."
        es:
          ultra_sun: "Es peligroso pasear con comida por su territorio,\nya que supone exponerse a que en cualquier\nmomento se abalance para robarla."
          ultra_moon: "En Alola, se alimenta de Pokémon pez. A menudo\nse lo puede ver sobrevolando el mar en círculos\nen busca de presas."
        ko:
          ultra_sun: "깨비드릴조 영역에서 음식을\n갖고 다니는 것은 위험하다.\n순식간에 빼앗긴다."
          ultra_moon: "알로라에서는 물고기포켓몬이\n먹이다. 바다 위를 선회하며\n먹이를 찾는 광경을 볼 수 있다."
        zh_simp:
          ultra_sun: "在大嘴雀的领地上拿着食物\n走动可是相当危险的。\n食物转眼间就会被抢走。"
          ultra_moon: "在阿罗拉，它的猎物是鱼宝可梦。\n能看到它盘旋在海上觅食的景象。"
        zh_trad:
          ultra_sun: "在大嘴雀的地盤上\n帶著食物走動是件危險的事，\n食物轉眼間就會被奪走。"
          ultra_moon: "在阿羅拉，牠的獵物是魚寶可夢，\n所以能看見牠盤旋在海上\n尋找食物的景象。"
