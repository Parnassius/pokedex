      types:
        - normal
      egg_groups:
        - field
      abilities:
        - run_away
        - adaptability
      hidden_ability: anticipation
      descriptions:
        jp_kana:
          ultra_sun: "イーブイだけが　とても　ふあんていな\nいでんしを　もっている　りゆうは\nいまだ　かいめい　されて　いない。"
          ultra_moon: "まわりの　えいきょうを　うけやすい\nいでんしを　もつ。　おやに　なった\nトレーナーの　かおにも　にてくるよ。"
        jp_kanji:
          ultra_sun: "イーブイだけが　とても　不安定な\n遺伝子を　持っている　理由は\n未だ　解明　されて　いない。"
          ultra_moon: "まわりの　影響を　受けやすい\n遺伝子を　持つ。　親に　なった\nトレーナーの　顔にも　似てくるよ。"
        en:
          ultra_sun: "The question of why only Eevee has such\nunstable genes has still not been solved."
          ultra_moon: "Its genes are easily influenced by its\nsurroundings. Even its face starts to look like\nthat of its Trainer."
        fr:
          ultra_sun: "À ce jour, nul ne sait pourquoi Évoli est le seul\nPokémon dont l’ADN est instable."
          ultra_moon: "L’ADN d’Évoli est sujet aux influences de\nson environnement. Sa tête finit même par\nressembler à celle de son Dresseur."
        it:
          ultra_sun: "Non si conosce ancora il motivo per cui Eevee\nsia l’unico Pokémon a possedere un corredo\ngenetico così instabile."
          ultra_moon: "Possiede un corredo genetico molto suscettibile\nall’influenza dell’ambiente in cui vive. Può anche\nfinire per assomigliare al suo Allenatore."
        de:
          ultra_sun: "Evoli ist das einzige Pokémon mit einem höchst\ninstabilen Erbmaterial. Die Ursache dafür ist\nnach wie vor unklar."
          ultra_moon: "Seine DNS-Struktur ist anfällig für Einflüsse von\naußen. Selbst die Gesichtszüge seines Trainers\nkönnen sich in ihm wiedererkennen lassen."
        es:
          ultra_sun: "Todavía no se ha esclarecido el motivo por el\nque es el único Pokémon que presenta un\ncódigo genético inestable."
          ultra_moon: "Su genética es muy sensible a la influencia del\nentorno, hasta el punto de que su rostro puede\nllegar a parecerse al de su Entrenador."
        ko:
          ultra_sun: "이브이만 매우 불안정한\n유전자를 갖고 있는 이유는\n아직 해명되지 않았다."
          ultra_moon: "주위의 영향을 받기 쉬운\n유전자를 가졌다. 어버이가 된\n트레이너의 얼굴에도 닮아 간다."
        zh_simp:
          ultra_sun: "至今未弄清为何只有伊布\n携带着非常不稳定的遗传基因。"
          ultra_moon: "有着易受周围影响的遗传基因。\n就连长相都会变得和成为\n它主人的训练家很像哦。"
        zh_trad:
          ultra_sun: "為何只有伊布有著\n極其不穩定的基因？\n理由至今仍然不明。"
          ultra_moon: "有著容易受到周遭影響的基因。\n就連長相都會變得和\n成為牠主人的訓練家越來越像。"
vaporeon:
  species_id: 134
  names:
    jp_kana: シャワーズ
    jp_kanji: シャワーズ
    en: Vaporeon
    fr: Aquali
    it: Vaporeon
    de: Aquana
    es: Vaporeon
    ko: 샤미드
    zh_simp: 水伊布
    zh_trad: 水伊布
  forms:
    vaporeon:
      form_id: 0
      base_stats:
        hp: 130
        attack: 65
        defense: 60
        special_attack: 110
        special_defense: 95
        speed: 65
      evs_yield:
        hp: 2
        attack: 0
