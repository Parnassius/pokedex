      types:
        - normal
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "てんきに　よって　すがたが　かわるが\nかがくてきな　はんのうの　けっかで\nじぶんの　いしでは　ないらしい。"
          ultra_moon: "てんきに　よって　すがたが　かわる。\nきしょうが　あらくなるほど\nきしょうも　あらっぽく　なってくる。"
        jp_kanji:
          ultra_sun: "天気に　よって　姿が　変わるが\n化学的な　反応の　結果で\n自分の　意思では　ないらしい。"
          ultra_moon: "天気に　よって　姿が　変わる。\n気象が　荒くなるほど\n気性も　荒っぽく　なってくる。"
        en:
          ultra_sun: "Although its form changes with the weather,\nthat is apparently the result of a chemical\nreaction and not the result of its own free will."
          ultra_moon: "Its form changes depending on the weather.\nThe rougher conditions get, the rougher\nCastform’s disposition!"
        fr:
          ultra_sun: "Il change de forme en fonction de la météo,\nmais ce phénomène serait en fait une réaction\nchimique indépendante de sa volonté."
          ultra_moon: "Il n’y a pas que son apparence qui change en\nfonction de la météo : son tempérament aussi !\nPlus il y a de vent, plus il se montre agressif."
        it:
          ultra_sun: "Il suo aspetto cambia con le condizioni\natmosferiche per effetto di una reazione\nchimica indipendente dalla sua volontà."
          ultra_moon: "Il suo aspetto cambia con le condizioni\natmosferiche. Più il tempo è brutto, più\ndiventa aggressivo."
        de:
          ultra_sun: "Seine Erscheinung ändert sich je nach Wetter.\nDies hat weniger mit seinem eigenen Willen zu\ntun als vielmehr mit einer chemischen Reaktion."
          ultra_moon: "Seine Gestalt ändert sich abhängig vom Wetter.\nJe ungestümer dieses ist, desto gröber wird\nauch sein Charakter."
        es:
          ultra_sun: "Cambia de apariencia en función del tiempo\natmosférico, pero se trata más bien de una\nreacción química ajena a su voluntad."
          ultra_moon: "El tiempo atmosférico cambia tanto su aspecto\ncomo su estado de ánimo. Cuanto más arrecia,\nmás agresivo se vuelve."
        ko:
          ultra_sun: "날씨에 따라 모습이 바뀌지만,\n화학 반응의 결과일 뿐\n자신의 의지는 아닌 듯하다."
          ultra_moon: "날씨에 따라 모습이 바뀐다.\n날씨가 궂을수록\n성질도 난폭해진다."
        zh_simp:
          ultra_sun: "样子会根据天气发生变化。\n但这是根据化学反应的结果，\n似乎并不是出于它的本意。"
          ultra_moon: "样子会根据天气发生变化。\n天气越恶劣，\n性格也会变得越暴躁。"
        zh_trad:
          ultra_sun: "樣子會隨著天氣而改變。\n這似乎是化學反應產生的結果，\n不受牠自身的意志控制。"
          ultra_moon: "樣子會隨著天氣而變化。\n天氣越是惡劣，\n性情就會變得越粗暴。"
    castform_sunny_form:
      form_id: 1
      names:
        jp_kana: たいようのすがた
        jp_kanji: たいようのすがた
        en: Sunny Form
        fr: Forme Solaire
        it: Forma Sole
        de: Sonnenform
        es: Forma Sol
        ko: 태양의 모습
        zh_simp: 太阳的样子
        zh_trad: 太陽的樣子
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "はれた　ひの　ポワルンの　すがた。\nヒーターのまえに　おく　じっけんでは\nこの　かたちに　へんかしなかった。"
          ultra_moon: "あつい　ひざしを　あびていると\nこのすがたに　かわる。　ほてった\nからだを　さわると　パサパサするぞ。"
        jp_kanji:
          ultra_sun: "晴れた　日の　ポワルンの　姿。\nヒーターの前に　置く　実験では\nこの　形に　変化しなかった。"
          ultra_moon: "暑い　日差しを　浴びていると\nこの姿に　変わる。　火照った\n身体を　触ると　パサパサするぞ。"
        en:
          ultra_sun: "This is the form Castform takes on bright days.\nIn an experiment where Castform was placed in\nfront of a heater, it didn’t change to this form."
          ultra_moon: "Castform changes to this form when it basks in\nbright sunlight. When you touch its glowing skin,\nit feels all dried out!"
        fr:
          ultra_sun: "Morphéo adopte cette apparence uniquement\nles jours ensoleillés. On a tenté de reproduire\nce phénomène avec un radiateur, sans succès."
          ultra_moon: "Morphéo adopte cette apparence lorsqu’il y a\ndu soleil. Son corps rougeoyant est très sec\nau toucher."
        it:
          ultra_sun: "È la forma di Castform nei giorni di sole.\nCome dimostrato, non è sufficiente metterlo\ndavanti a una stufa per farlo trasformare..."
          ultra_moon: "Castform assume questa forma quando viene\nscaldato dai raggi del sole. Il suo corpo ardente\nè molto secco al tatto."
        de:
          ultra_sun: "Diese Gestalt nimmt Formeo an sonnigen Tagen\nan. Versuche, diesen Wandel künstlich mit einem\nHeizstrahler herbeizuführen, schlugen fehl."
          ultra_moon: "Diese Gestalt nimmt Formeo bei einem heißen\nSonnenbad an. Sein glühender Körper fühlt sich\nsehr trocken an."
        es:
          ultra_sun: "Castform adopta esta forma cuando hace sol.\nPonerlo delante de un radiador no basta para\ndesencadenar esta transformación."
          ultra_moon: "Castform adopta esta forma cuando hace sol.\nSu cuerpo ardiente es muy reseco al tacto."
        ko:
          ultra_sun: "맑은 날의 캐스퐁의 모습이다.\n히터 앞에 두는 실험에서는\n이 모습으로 변하지 않았다."
          ultra_moon: "뜨거운 햇볕을 받고 있으면\n이 모습으로 변한다. 화끈한\n몸을 만지면 건조해진다."
        zh_simp:
          ultra_sun: "天气晴朗时飘浮泡泡的样子。\n在将它放到取暖器前的实验里，\n没有变成这个形态。"
          ultra_moon: "如果在烈日下暴晒，就会变成\n这个样子。如果碰到它热烘烘的身体，\n会感觉干巴巴的。"
        zh_trad:
          ultra_sun: "飄浮泡泡在天氣晴朗時的樣子。\n在把牠放到暖爐前面的實驗中，\n牠並沒有變成這種形態。"
          ultra_moon: "暴露在烈日下就會變成這個樣子。\n如果去摸牠熱烘烘的身體，\n會感覺到乾巴巴的。"
    castform_rainy_form:
      form_id: 2
      names:
        jp_kana: あまみずのすがた
        jp_kanji: あまみずのすがた
        en: Rainy Form
        fr: Forme Eau de Pluie
        it: Forma Pioggia
        de: Regenform
        es: Forma Lluvia
        ko: 빗방울의 모습
        zh_simp: 雨水的样子
        zh_trad: 雨水的樣子
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
