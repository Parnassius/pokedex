      descriptions:
        jp_kana:
          ultra_sun: "ナッシーは　アローラじんの　ほこり。\nれきしてきな　かいがや　たてものに\nその　すがたが　きざまれている。"
          ultra_moon: "ながいくびを　ムチのように　しならせ\nあたまを　あいてに　たたきつける。\nじぶんも　すこしクラクラしてしまう。"
        jp_kanji:
          ultra_sun: "ナッシーは　アローラ人の　誇り。\n歴史的な　絵画や　建物に\nその　姿が　刻まれている。"
          ultra_moon: "長い首を　ムチのように　しならせ\n頭を　相手に　叩きつける。\n自分も　少しクラクラしてしまう。"
        en:
          ultra_sun: "Exeggutor is the pride of the Alolan people. Its\nimage is carved into historical buildings\nand murals."
          ultra_moon: "It swings its long neck like a whip and smacks\nits opponents. This makes Exeggutor itself\ndizzy, too."
        fr:
          ultra_sun: "Il a toujours fait la fierté d’Alola. On le trouve\nreprésenté dans les œuvres d’art et\nles bâtiments de toutes les époques."
          ultra_moon: "Il utilise son grand cou comme un fouet\net assène des coups de tête à son adversaire.\nCes attaques l’étourdissent aussi un peu."
        it:
          ultra_sun: "Exeggutor è l’orgoglio di Alola. La sua immagine\nè raffigurata in diversi dipinti ed edifici storici."
          ultra_moon: "Agita il lungo collo come una frusta per\ncolpire l’avversario con le teste, però rimane\nun po’ stordito anche lui."
        de:
          ultra_sun: "Alola-Kokowei ist der ganze Stolz der Einwohner\nAlolas. Deshalb ziert sein Abbild auch sehr viele\ngeschichtsträchtige Gemälde und Gebäude."
          ultra_moon: "Es greift mit seinen harten Köpfen an, indem es\nseinen langen Hals wie eine Peitsche schwingt.\nDabei wird ihm jedoch leicht schwindlig."
        es:
          ultra_sun: "Es el orgullo de la región de Alola. Aparece\nrepresentado en obras de arte y edificios a lo\nlargo de la historia."
          ultra_moon: "Golpea al oponente a cabezazos chasqueando\nel cuello como un látigo. Se marea un poco al\nhacerlo."
        ko:
          ultra_sun: "나시는 알로라인들의 자랑이다.\n역사적인 회화나 건물에\n그 모습이 새겨져 있다."
          ultra_moon: "긴 목을 채찍처럼 휘둘러서\n머리로 상대를 힘껏 친다.\n자신도 조금 어질어질해진다."
        zh_simp:
          ultra_sun: "椰蛋树是阿罗拉人的骄傲。\n在历史悠久的绘画及建筑物上\n都刻有它的样子。"
          ultra_moon: "能让长脖子像鞭子一样弯曲，\n并用头重重地敲打对手。\n自己也会有些头晕眼花。"
        zh_trad:
          ultra_sun: "椰蛋樹是阿羅拉人的驕傲。\n在許多歷史悠久的繪畫和建築物上\n都留下了牠的身影。"
          ultra_moon: "能像甩鞭子一樣揮動長脖子，\n用頭重重地敲擊對手。\n自己也會有些頭暈眼花。"
cubone:
  species_id: 104
  names:
    jp_kana: カラカラ
    jp_kanji: カラカラ
    en: Cubone
    fr: Osselait
    it: Cubone
    de: Tragosso
    es: Cubone
    ko: 탕구리
    zh_simp: 卡拉卡拉
    zh_trad: 卡拉卡拉
  forms:
    cubone:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 95
        special_attack: 40
        special_defense: 50
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - monster
      abilities:
        - rock_head
        - lightning_rod
      hidden_ability: battle_armor
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          ultra_sun: "なくした　ははおやを　おもい　よるに\nなきさけぶが　そのせいで　てんてきの\nバルジーナに　みつかってしまう。"
          ultra_moon: "ははおやの　ホネを　かぶっているので\nすがおも　ひょうじょうも　わからない。\nただ　いつも　ずっと　ないているぞ。"
        jp_kanji:
          ultra_sun: "亡くした　母親を　思い　夜に\n泣き叫ぶが　そのせいで　天敵の\nバルジーナに　見つかってしまう。"
          ultra_moon: "母親の　ホネを　被っているので\n素顔も　表情も　わからない。\nただ　いつも　ずっと　泣いているぞ。"
        en:
          ultra_sun: "At night, it weeps loudly for its dead mother,\nbut those cries only attract its natural\nenemy—Mandibuzz."
          ultra_moon: "It wears its mother’s skull on its head, so no\none knows what its bare face looks like.\nHowever, it’s clear that it’s always crying."
        fr:
          ultra_sun: "La nuit, il pense avec nostalgie à sa défunte\nmère et éclate en sanglots. Vaututrice, son\nprédateur, le localise au son de ses pleurs."
          ultra_moon: "Comme il porte le crâne de sa mère sur sa tête,\nnul ne connaît son vrai visage. Une seule chose\nest sûre : il ne cesse de pleurer."
        it:
          ultra_sun: "Di notte piange disperatamente pensando alla\nmadre morta. I suoi lamenti attirano i Mandibuzz,\nsuoi predatori naturali."
          ultra_moon: "Poiché indossa sempre il teschio della madre,\nnon si sa che viso o che espressione abbia,\nma è evidente che piange continuamente."
        de:
          ultra_sun: "Nachts weint es laut, weil es seine verstorbene\nMutter vermisst. Dadurch wird jedoch sein\nnatürlicher Feind Grypheldis auf es aufmerksam."
          ultra_moon: "Da es den Schädel seiner Mutter auf dem Kopf\nträgt, weiß man nicht, wie sein Gesicht aussieht.\nBekannt ist nur, dass es ständig weint."
        es:
          ultra_sun: "Al caer la noche, rompe a llorar pensando en su\ndifunta madre, lo que delata su presencia ante\nlos Mandibuzz, sus enemigos naturales."
          ultra_moon: "Al cubrir su rostro con el cráneo de su madre,\nsu expresión queda velada. La única emoción\nque lo delata es su llanto constante."
        ko:
          ultra_sun: "밤이 되면 죽은 엄마를 생각하며\n울부짖는데, 그 탓에 천적인\n버랜지나에게 발각된다."
          ultra_moon: "어미의 뼈를 뒤집어쓰고 있어서\n얼굴도 표정도 알 수 없다.\n그저 언제나 계속해서 울고 있다."
        zh_simp:
          ultra_sun: "会思念已故的母亲而在夜里哭叫，\n因此会被其天敌秃鹰娜发现。"
          ultra_moon: "头上戴着母亲的骨头，\n因此无法知晓其长相和表情，\n只知道它一直在哭。"
        zh_trad:
          ultra_sun: "因為思念死去的母親，\n會在夜裡大聲哭叫，\n導致自己被天敵禿鷹娜發現。"
          ultra_moon: "頭上戴著母親的骨頭，\n所以看不見牠的長相和表情，\n只知道牠一直在哭泣。"
marowak:
  species_id: 105
  names:
    jp_kana: ガラガラ
    jp_kanji: ガラガラ
    en: Marowak
    fr: Ossatueur
    it: Marowak
    de: Knogga
    es: Marowak
    ko: 텅구리
    zh_simp: 嘎啦嘎啦
    zh_trad: 嘎啦嘎啦
  forms:
    marowak:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 110
        special_attack: 50
        special_defense: 80
        speed: 45
      evs_yield:
