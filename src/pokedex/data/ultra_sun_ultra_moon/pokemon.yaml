        jp_kanji:
          ultra_sun: "身体の　色は　水の　温度で\n変化する。　アローラの　サクラビスは\nまぶしいほど　鮮やかに　色付く。"
          ultra_moon: "獲物の　体液を　吸う。\n肉は　海底に　沈み　他の\nポケモンの　エサに　なるのだ。"
        en:
          ultra_sun: "The color of its body changes with the water\ntemperature. The coloration of Gorebyss in Alola\nis almost blindingly vivid."
          ultra_moon: "It sucks bodily fluids out of its prey. The\nleftover meat sinks to the seafloor, where it\nbecomes food for other Pokémon."
        fr:
          ultra_sun: "La température de l’eau influence la couleur\nde son corps. À Alola, elle est tellement vive\nqu’elle en est éblouissante."
          ultra_moon: "Il se nourrit en aspirant les fluides corporels\nde ses proies. Le reste tombe au fond de la mer,\nnourrissant ainsi d’autres Pokémon."
        it:
          ultra_sun: "Cambia colore in base alla temperatura\ndell’acqua. I Gorebyss che vivono ad Alola\nhanno un colore vivido e quasi abbagliante."
          ultra_moon: "Succhia i fluidi corporei delle sue prede. La\ncarne che ne rimane sprofonda sui fondali marini\ne diventa prezioso nutrimento per altri Pokémon."
        de:
          ultra_sun: "Die Farbe seines Körpers ändert sich je nach\nWassertemperatur. In Alola verfügt es über eine\nfast schon blendend grelle Färbung."
          ultra_moon: "Es saugt die Körpersäfte seiner Beute aus.\nWas übrig bleibt, sinkt zu Boden und wird\nvon anderen Pokémon verspeist."
        es:
          ultra_sun: "Su color de piel varía en base a la temperatura\ndel agua, y los que viven en Alola adoptan\ncolores tan vivos que llegan a deslumbrar."
          ultra_moon: "Absorbe los fluidos corporales de su presa. Los\nrestos que deja caen hasta el lecho marino y se\nconvierten en alimento para otros Pokémon."
        ko:
          ultra_sun: "몸의 색깔은 물의 온도로 변화한다.\n알로라의 분홍장이는 눈부실 정도로\n선명한 빛깔을 지녔다."
          ultra_moon: "먹이의 체액을 빨아들인다.\n고기는 바다 밑으로 가라앉아\n다른 포켓몬의 먹이가 된다."
        zh_simp:
          ultra_sun: "身体的颜色根据水温而变化。\n阿罗拉的樱花鱼呈现出\n令人炫目的鲜艳色彩。"
          ultra_moon: "吸食猎物的体液。\n剩下的肉会沉入海底，\n成为其他宝可梦的食物。"
        zh_trad:
          ultra_sun: "體色會隨著水溫而變化，\n阿羅拉的櫻花魚呈現著\n耀眼奪目的鮮豔色彩。"
          ultra_moon: "會吸取獵物的體液。\n剩下的肉會沉入海底，\n成為其他寶可夢的食物。"
relicanth:
  species_id: 369
  names:
    jp_kana: ジーランス
    jp_kanji: ジーランス
    en: Relicanth
    fr: Relicanth
    it: Relicanth
    de: Relicanth
    es: Relicanth
    ko: 시라칸
    zh_simp: 古空棘鱼
    zh_trad: 古空棘魚
  forms:
    relicanth:
      form_id: 0
      base_stats:
        hp: 100
        attack: 90
        defense: 130
        special_attack: 45
        special_defense: 65
        speed: 55
      evs_yield:
        hp: 1
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
