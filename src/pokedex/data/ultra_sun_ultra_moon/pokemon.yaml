scraggy:
  species_id: 559
  names:
    jp_kana: ズルッグ
    jp_kanji: ズルッグ
    en: Scraggy
    fr: Baggiguane
    it: Scraggy
    de: Zurrokex
    es: Scraggy
    ko: 곤율랭
    zh_simp: 滑滑小子
    zh_trad: 滑滑小子
  forms:
    scraggy:
      form_id: 0
      base_stats:
        hp: 50
        attack: 75
        defense: 70
        special_attack: 35
        special_defense: 70
        speed: 48
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - fighting
      egg_groups:
        - field
        - dragon
      abilities:
        - shed_skin
        - moxie
      hidden_ability: intimidate
      held_items:
        rare: shed_shell
      descriptions:
        jp_kana:
          ultra_sun: "すうひきのグループで　こうどうする。\nちんたら　あるきまわり　めが　あった\nあいてに　いきなり　ずつきを　かます。"
          ultra_moon: "だるんと　のびた　かわを　くびまで\nひっぱりあげて　ガード。　かわが\nのびている　こたいほど　えらいらしい。"
        jp_kanji:
          ultra_sun: "数匹のグループで　行動する。\nちんたら　歩きまわり　目が　合った\n相手に　いきなり　頭突きを　かます。"
          ultra_moon: "だるんと　のびた　皮を　首まで\n引っ張りあげて　ガード。　皮が\nのびている　個体ほど　偉いらしい。"
        en:
          ultra_sun: "They move in small groups, walking around lazily.\nAnyone who makes eye contact gets smacked\nwith a headbutt."
          ultra_moon: "It stretches its saggy skin up to its neck to\nprotect itself. The saggier their skin, the more\nrespect they garner."
        fr:
          ultra_sun: "Il traîne en bandes et distribue des coups\nde tête à ceux qui osent croiser son regard."
          ultra_moon: "Pour se protéger, il remonte sa peau plissée\njusqu’à son cou. Plus la peau est longue, plus\nBaggiguane inspirera de respect."
        it:
          ultra_sun: "Gli Scraggy formano piccoli gruppi e si mettono\na gironzolare tirando improvvisamente testate a\nchiunque incroci il loro sguardo."
          ultra_moon: "Si protegge tirando la pelle su fino al collo.\nSembra che gli esemplari dalla pelle più lunga\nsiano quelli più rispettati."
        de:
          ultra_sun: "Zurrokex trotten in Gruppen von einigen\nExemplaren durch die Gegend. Wer mit ihnen\nAugenkontakt herstellt, erhält Kopfnüsse."
          ultra_moon: "Es zieht seine gummiartige Haut zum Schutz bis\nzum Hals hinauf. Seine Rangfolge scheint davon\nabzuhängen, wie hoch es sie ziehen kann."
        es:
          ultra_sun: "Se desplaza con lentitud en pequeños grupos\ny se lía a cabezazos a la mínima que alguien\nle cruza la mirada."
          ultra_moon: "Se sube la piel arrugada hasta el cuello para\nprotegerse. Parece que los ejemplares con la\npiel más larga son los más respetados."
        ko:
          ultra_sun: "여러 마리 그룹으로 행동한다.\n굼뜨게 다니다 눈이 마주친\n상대에게 느닷없이 박치기를 한다."
          ultra_moon: "축 늘어난 가죽을 목까지\n끌어올려서 가드한다. 가죽이\n늘어난 개체일수록 대단하다고 한다."
        zh_simp:
          ultra_sun: "几只为一组行动。\n漫无目的地到处走，会冷不丁地\n向视线相遇的对手施以头锤。"
          ultra_moon: "会把松垮垮的皮使劲\n向上拉到脖子用来保护自己。\n好像皮拉得越厉害的个体，地位越高。"
        zh_trad:
          ultra_sun: "以數隻為一組來行動。會慢吞吞地\n走來走去，和對方視線對上時\n就會冷不防用頭錘撞過去。"
          ultra_moon: "會把鬆垮垮的皮拉到脖子上\n來保護自己。皮越是鬆垮的\n滑滑小子，地位似乎就越高。"
scrafty:
  species_id: 560
  names:
    jp_kana: ズルズキン
    jp_kanji: ズルズキン
    en: Scrafty
    fr: Baggaïd
    it: Scrafty
    de: Irokex
    es: Scrafty
    ko: 곤율거니
    zh_simp: 头巾混混
    zh_trad: 頭巾混混
