      descriptions:
        jp_kana:
          ultra_sun: "ごうかきゃくせんや　タンカーの\nまわりに　つきまとい　えものを\nひきずりこもうと　ねらっている。"
          ultra_moon: "りょうしが　おそれる　そんざい。\nうみに　ひきずりこみ　いのちを\nうばうと　ウワサ　されている。"
        jp_kanji:
          ultra_sun: "豪華客船や　タンカーの\n周りに　つきまとい　獲物を\n引きずりこもうと　狙っている。"
          ultra_moon: "漁師が　恐れる　存在。\n海に　引きずりこみ　命を\n奪うと　ウワサ　されている。"
        en:
          ultra_sun: "Jellicent is always hanging around fancy cruise\nships and tankers, hoping to drag away its prey."
          ultra_moon: "Fishermen are terrified of Jellicent.\nIt’s rumored to drag them into the sea\nand steal their lives away."
        fr:
          ultra_sun: "On le trouve souvent près des bateaux de\ncroisière et des pétroliers, où il cherche\ndes proies à entraîner dans les abysses."
          ultra_moon: "On raconte que ce Pokémon, redouté par\nles marins, ôte la vie de ses proies en les\nentraînant dans les abysses."
        it:
          ultra_sun: "Lo si incontra spesso vicino a navi da crociera\ne petroliere in cerca di nuove prede da\ntrascinare via con sé."
          ultra_moon: "È molto temuto dai pescatori.\nSi dice che trascini in mare le prede\nper rubarne l’energia vitale."
        de:
          ultra_sun: "Dieses Pokémon schwimmt Kreuzfahrtschiffen\nund Tankern hinterher. Bei Gelegenheit zieht es\nBeute zu sich ins Meer."
          ultra_moon: "Von Fischern wird es gefürchtet. Man sagt,\nes würde Menschen in die Tiefen des Meeres\nhinabzerren und ihnen das Leben rauben."
        es:
          ultra_sun: "Se dedica a perseguir petroleros y cruceros, al\nacecho de presas que arrastrar al fondo del\nmar."
          ultra_moon: "Corre el rumor de que este Pokémon, tan temido\npor los marineros, es capaz de arrastrar a su\npresa al fondo del mar."
        ko:
          ultra_sun: "여객선이나 유조선\n주위를 맴돌며 먹이를\n끌어들이기 위해 노리고 있다."
          ultra_moon: "어부들이 두려워하는 존재다.\n바다로 끌고 들어가 목숨을\n빼앗아간다는 소문이 있다."
        zh_simp:
          ultra_sun: "会缠着豪华客轮或是油轮周围，\n目的是将猎物拖进海里。"
          ultra_moon: "它是令渔夫恐惧的存在。\n传说，它会将渔夫拖入海中，\n夺走对方的性命。"
        zh_trad:
          ultra_sun: "經常纏著豪華客輪\n或是油輪不放，\n目的是把獵物拖進海裡。"
          ultra_moon: "漁夫們對牠十分恐懼。\n傳說中牠會把漁夫拖進海裡，\n奪走他們的性命。"
alomomola:
