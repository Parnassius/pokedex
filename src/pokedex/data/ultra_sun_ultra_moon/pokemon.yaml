  names:
    jp_kana: ウソハチ
    jp_kanji: ウソハチ
    en: Bonsly
    fr: Manzaï
    it: Bonsly
    de: Mobai
    es: Bonsly
    ko: 꼬지지
    zh_simp: 盆才怪
    zh_trad: 盆才怪
  forms:
    bonsly:
      form_id: 0
      base_stats:
        hp: 50
        attack: 80
        defense: 95
        special_attack: 10
        special_defense: 45
        speed: 10
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - undiscovered
      abilities:
        - sturdy
        - rock_head
      hidden_ability: rattled
      descriptions:
        jp_kana:
          ultra_sun: "ひとみから　すいぶんを　ほうしゅつ。\nないているように　みえるので　てきを\nゆだんさせる　こうかも　あるらしい。"
          ultra_moon: "あまり　からだが　しめりすぎると\nしんでしまうので　あせの　ように\nめから　すいぶんを　だしている。"
        jp_kanji:
          ultra_sun: "瞳から　水分を　放出。\n泣いているように　見えるので　敵を\n油断させる　効果も　あるらしい。"
          ultra_moon: "あまり　身体が　湿りすぎると\n死んでしまうので　汗の　ように\n目から　水分を　出している。"
        en:
          ultra_sun: "It discharges moisture from its eyes, making it\nlook like it’s crying—apparently an effective way\nof getting enemies to let down their guard."
          ultra_moon: "If its body gets too damp, it will die. So, in a\nprocess reminiscent of sweating, its eyes\nexpel moisture."
        fr:
          ultra_sun: "Il évacue tout surplus d’eau par les yeux.\nCela ressemble à une crise de larmes et\na parfois pour effet d’attendrir ses ennemis."
          ultra_moon: "Absorber trop d’humidité peut mettre sa vie\nen danger, c’est pourquoi il « sue » tout excès\nde liquide par les yeux."
        it:
          ultra_sun: "Espelle l’umidità dagli occhi dando l’impressione\nche stia piangendo. I nemici che assistono a\nquesto fenomeno abbassano la guardia."
          ultra_moon: "Se il suo corpo è troppo umido, la sua vita è\nin pericolo. Per questo espelle dagli occhi\nl’umidità corporea come se fosse sudore."
        de:
          ultra_sun: "Es gibt über seine Pupillen Wasser ab, was den\nEindruck erweckt, es würde weinen. Bei seinen\nFeinden führt das offenbar zu Unachtsamkeit."
          ultra_moon: "Da ein zu hoher Wasseranteil für seinen Körper\nlebensbedrohlich werden kann, scheidet es\nüber die Augen Wasser aus wie Schweiß."
        es:
          ultra_sun: "Expulsa agua por los ojos, lo que da la impresión\nde que está llorando. Esto puede sorprender a\nlos enemigos y hacer que bajen la guardia."
          ultra_moon: "Debido a que un exceso de humedad en su\ncuerpo puede provocarle la muerte, expulsa\nlíquido por los ojos como si fuera sudor."
        ko:
          ultra_sun: "눈동자에서 수분을 방출한다.\n울고 있는 것처럼 보이기 때문에\n적을 방심시키는 효과도 있는 듯하다."
          ultra_moon: "너무 몸이 습해지면\n죽어 버리기 때문에 땀처럼\n눈에서 수분을 내보내고 있다."
        zh_simp:
          ultra_sun: "会从眼睛里排出水分。\n看起来就像是正在哭泣，\n所以似乎也有让敌人麻痹大意的效果。"
          ultra_moon: "如果身体过于潮湿就会死掉，\n因此会像分泌汗液那样\n从眼睛里排出水分。"
        zh_trad:
          ultra_sun: "會從眼睛排出水分。\n因為看起來就像是在哭，\n似乎也有讓敵人疏忽大意的效果。"
          ultra_moon: "如果身體太過潮濕就會死掉，\n所以牠會像分泌汗水那樣\n從眼睛排出水分。"
mime_jr:
  species_id: 439
  names:
    jp_kana: マネネ
    jp_kanji: マネネ
    en: Mime Jr.
    fr: Mime Jr.
    it: Mime Jr.
    de: Pantimimi
    es: Mime Jr.
