        - flash_fire
      hidden_ability: guts
      descriptions:
        jp_kana:
          ultra_sun: "おおきく　くうきを　すいこむのは\nこうげきの　サイン。　１７００どの\nほのおが　おそってくるぞ。"
          ultra_moon: "こうふんすると　たいないに　ある\nほのおぶくろに　ひが　ついて\nたいおんは　９００ど　まで　あがる。"
        jp_kanji:
          ultra_sun: "大きく　空気を　吸い込むのは\n攻撃の　サイン。　１７００度の\n炎が　襲ってくるぞ。"
          ultra_moon: "興奮すると　体内に　ある\n炎袋に　火が　ついて\n体温は　９００度　まで　あがる。"
        en:
          ultra_sun: "If it inhales deeply, that’s a sign it’s about to\nattack. Prepare to be hit by flames of over\n3,000 degrees Fahrenheit!"
          ultra_moon: "The flame chamber inside its body ignites when\nFlareon gets agitated, reaching temperatures of\nup to 1,650 degrees Fahrenheit."
        fr:
          ultra_sun: "Si vous le voyez inspirer profondément,\nsauvez-vous, car c’est le signe qu’il va attaquer\nen soufflant une flamme à 1 700 °C !"
          ultra_moon: "Lorsqu’il est agité, sa poche de feu interne\ns’enflamme, et sa température corporelle peut\nalors monter jusqu’à 900 °C."
        it:
          ultra_sun: "Quando inspira profondamente significa che\nsi sta preparando all’attacco. Sputa fiamme\nalla temperatura di 1.700 °C."
          ultra_moon: "Quando si agita si genera del fuoco in una sacca\ninterna e la sua temperatura corporea sale fino\na raggiungere i 900 °C."
        de:
          ultra_sun: "Wenn es tief einatmet, bereitet es gerade einen\nAngriff vor. Es kann bis zu 1 700 °C heiße\nFlammen speien."
          ultra_moon: "Ist Flamara aufgeregt, fängt der Flammensack\nin seinem Körper Feuer, wodurch seine\nKörpertemperatur auf bis zu 900 °C steigt."
        es:
          ultra_sun: "Cuando inspira profundamente es señal de que\nse dispone a atacar. Expele llamaradas que\nalcanzan temperaturas de 1700 °C."
          ultra_moon: "Cuando su ánimo se altera, las llamas que\nalmacena en su bolsa interior se avivan y su\ntemperatura corporal llega a los 900 °C."
        ko:
          ultra_sun: "크게 공기를 들이쉬는 것은\n공격 신호다. 1700도의\n불꽃이 엄습해 온다."
          ultra_moon: "흥분하면 체내에 있는\n불꽃 주머니에 불이 붙어서\n체온이 900도까지 오른다."
        zh_simp:
          ultra_sun: "大口吸入空气就是要攻击的前兆。\n这意味着１７００度的火焰即将来袭。"
          ultra_moon: "兴奋时，它体内的火袋就会着火，\n体温会上升到９００度。"
        zh_trad:
          ultra_sun: "當牠大口吸入空氣時，\n就是即將發動攻擊的信號，\n１７００度的火焰即將來襲。"
          ultra_moon: "當牠興奮時，\n體內的火囊就會著火，\n體溫會上升到９００度。"
