          ultra_sun: "ひだりうでで　てきを　ロックすると\nどくの　えきたいを　からだじゅうに\nあびせかけ　みうごきを　ふうじる。"
          ultra_moon: "アローラの　ダストダスが　すこし\nたくましいのは　ベトベトンという\nてんてきが　いるせいだと　いわれる。"
        jp_kanji:
          ultra_sun: "左腕で　敵を　ロックすると\n毒の　液体を　体中に\n浴びせかけ　身動きを　封じる。"
          ultra_moon: "アローラの　ダストダスが　少し\nたくましいのは　ベトベトンという\n天敵が　いるせいだと　いわれる。"
        en:
          ultra_sun: "It locks opponents in place with its left hand,\nimmobilizing them by entirely dousing their\nbodies with poisonous liquid."
          ultra_moon: "Some say the reason Garbodor in Alola are a\nlittle stronger than their counterparts elsewhere\nis the presence of Muk, their natural enemy."
        fr:
          ultra_sun: "Il maîtrise son adversaire de son bras gauche,\npuis l’arrose d’un liquide toxique paralysant."
          ultra_moon: "Ce serait pour pouvoir faire face à Grotadmorv,\nson ennemi juré, que le Miasmax d’Alola est\nlégèrement plus robuste que les autres."
        it:
          ultra_sun: "Blocca il nemico con l’arto sinistro e\nne cosparge il corpo con un liquido\nvelenoso per immobilizzarlo."
          ultra_moon: "I Garbodor che vivono ad Alola sono più robusti\ndel normale per difendersi dai Muk, i loro nemici\nnaturali."
        de:
          ultra_sun: "Mit dem linken Arm nagelt es seinen Gegner fest,\num ihn dann mit einer toxischen Flüssigkeit zu\nbesprühen und ihn so zu lähmen."
          ultra_moon: "Man vermutet, dass die Deponitox in Alola\nwegen ihres Fressfeindes Sleimok kräftiger\nwurden als Artgenossen in anderen Regionen."
        es:
          ultra_sun: "Atrapa a su presa con el brazo izquierdo y luego\nrocía su cuerpo con un líquido venenoso para\ninmovilizarla."
          ultra_moon: "La razón de la mayor fortaleza de los Garbodor\nque viven en la región de Alola se atribuye a la\npresencia de Muk, su enemigo natural."
        ko:
          ultra_sun: "왼쪽 팔로 적을 꼭 붙들고\n독액을 온몸에\n퍼부어 움직임을 막는다."
          ultra_moon: "알로라의 더스트나가 좀 더\n강인한 것은 질뻐기라는\n천적이 있기 때문이라고 전해진다."
        zh_simp:
          ultra_sun: "用左臂锁住敌人后，\n会将有毒的液体泼向对方全身，\n封住其行动。"
          ultra_moon: "阿罗拉的灰尘山有点儿魁梧，\n据说是因为有臭臭泥这个天敌的缘故。"
        zh_trad:
          ultra_sun: "用左臂鎖住敵人後，\n會將毒液灑向敵人全身，\n使對方無法動彈。"
          ultra_moon: "阿羅拉的灰塵山之所以\n比較強壯一點，據說是因為\n有臭臭泥這個天敵在的緣故。"
