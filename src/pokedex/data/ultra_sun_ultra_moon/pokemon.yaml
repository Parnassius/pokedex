      descriptions:
        jp_kana:
          ultra_sun: "としおいると　だっぴ　しなくなる。\nながくながく　いきた　ゴローニャの\nカラは　こけむしていて　みどりだ。"
          ultra_moon: "じぶんで　からだを　ばくはつさせる。\nそのパワーで　きゅうな　やまみちも\nすごい　スピードで　のぼっていく。"
        jp_kanji:
          ultra_sun: "年老いると　脱皮　しなくなる。\n長く長く　生きた　ゴローニャの\nカラは　苔むしていて　緑だ。"
          ultra_moon: "自分で　身体を　爆発させる。\nそのパワーで　急な　山道も\nすごい　スピードで　登っていく。"
        en:
          ultra_sun: "When Golem grow old, they stop shedding their\nshells. Those that have lived a long, long time\nhave shells green with moss."
          ultra_moon: "It detonates its own body. The power from\nthat explosion can propel it up steep mountain\npaths with amazing speed."
        fr:
          ultra_sun: "Lorsqu’il arrive à un âge avancé, il arrête de\nmuer. Un Grolem ayant vécu très longtemps\nest recouvert de mousse verte."
          ultra_moon: "Il est capable de faire exploser une partie de\nson corps. Le souffle lui permet de se projeter\nà toute vitesse vers les sommets."
        it:
          ultra_sun: "Quando invecchia, non fa più la muta.\nIl guscio dei Golem molto anziani si ricopre\ndi muschio tingendosi di verde."
          ultra_moon: "Può farsi esplodere e risalire a gran velocità\ni pendii montani più ripidi sfruttando la\nspinta che riceve."
        de:
          ultra_sun: "Im Alter hört es auf, sich zu häuten. Der Panzer\nbetagter Geowaz ist mit dichtem, grünem Moos\nbewachsen."
          ultra_moon: "Es kann sich in die Luft sprengen. Diese\nExplosionen setzt es ein, um selbst steile\nBergpfade in rasantem Tempo zu meistern."
        es:
          ultra_sun: "A medida que envejece, pierde la facultad de\nmudar la piel. Se han observado ejemplares de\nedad avanzada totalmente cubiertos de musgo."
          ultra_moon: "Puede hacer estallar su cuerpo a voluntad. El\nimpulso que esto genera le permite ascender\na toda velocidad a la cima de las montañas."
        ko:
          ultra_sun: "나이가 들면 탈피를 하지 않는다.\n긴 세월을 산 딱구리의 껍질은\n이끼가 끼어 초록색이다."
          ultra_moon: "스스로 몸을 폭발시킨다.\n그 파워로 가파른 산길도\n굉장한 스피드로 올라간다."
        zh_simp:
          ultra_sun: "年老后就不会蜕皮了。\n活过了漫长岁月的隆隆岩身上的\n外皮会长满苔藓变成绿色。"
          ultra_moon: "它会让自己的身体爆炸，\n然后利用这爆炸的力量，\n快速登上陡峭的山路。"
        zh_trad:
          ultra_sun: "年老之後就不會再脫皮。\n活過了漫長歲月的隆隆岩\n外皮會長滿苔蘚而變成綠色。"
          ultra_moon: "會讓自己的身體爆炸，\n然後利用爆炸的力量\n快速登上陡峭的山路。"
    golem_alolan_form:
      form_id: 1
