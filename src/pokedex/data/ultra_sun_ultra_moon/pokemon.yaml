      hidden_ability: light_metal
      descriptions:
        jp_kana:
          ultra_sun: "はがねの　ような　からだを　もつ。\nごつくて　おもい　ハサミは　てきを\nはさむより　たたきつぶすのに　むく。"
          ultra_moon: "１ど　てきと　はんだんした　ものは\nこうてつの　かたさを　もつ　ハサミで\nこなごなになるまで　なぐりつづける。"
        jp_kanji:
          ultra_sun: "鋼の　ような　身体を　持つ。\nごつくて　重い　ハサミは　敵を\n挟むより　叩き潰すのに　向く。"
          ultra_moon: "１度　敵と　判断した　ものは\n鋼鉄の　硬さを　もつ　ハサミで\n粉々になるまで　殴り続ける。"
        en:
          ultra_sun: "Its body is like steel. Its tough, heavy pincers\nare more suited to smashing enemies than\ngrabbing them."
          ultra_moon: "Once it has identified something as an enemy, it\nwill continue beating them with its steel-hard\npincers until there’s nothing left but scraps."
        fr:
          ultra_sun: "Son corps est aussi solide que l’acier. Ses\npinces, grosses et lourdes, sont plus adaptées\nau broyage qu’à la capture d’ennemis."
          ultra_moon: "Il utilise ses énormes pinces dures comme\nde l’acier pour réduire en miettes ceux\nqu’il identifie comme des ennemis."
        it:
          ultra_sun: "Il suo corpo è duro come l’acciaio. Con le pesanti\ne robuste chele schiaccia facilmente il nemico\nnon appena lo afferra."
          ultra_moon: "Dopo aver stabilito che qualcuno è suo nemico,\nlo colpisce con le chele dure come l’acciaio fino\na ridurlo in polvere."
        de:
          ultra_sun: "Sein Körper ist hart wie Stahl. Es nutzt seine\ngroßen, schweren Scheren weniger, um Gegner\nzu packen, als um sie niederzuschlagen."
          ultra_moon: "Sobald es ein anderes Pokémon als Feind\nerkennt, schlägt es dieses mit seinen\nstahlharten Scheren gnadenlos in Stücke."
        es:
          ultra_sun: "Su cuerpo es duro como el acero. Con sus\npinzas grandes y pesadas, si agarra a un rival,\nmás que inmovilizarlo lo destroza."
          ultra_moon: "Una vez que identifica a su enemigo, arremete\ncontra él hasta hacerlo trizas con sus pinzas\nduras como el acero."
        ko:
          ultra_sun: "강철 같은 몸을 가졌다.\n완고하고 무거운 집게는 적을\n잡기보다 때려눕히기에 적당하다."
          ultra_moon: "한번 적이라고 판단한 상대는\n강철의 강도를 지닌 집게로\n가루가 되도록 때린다."
        zh_simp:
          ultra_sun: "有着钢铁般的身体。\n比起夹住敌人，它粗重的钳子\n更适合用来把敌人砸扁。"
          ultra_moon: "一旦将对方认定为敌人，\n就会用钢铁般坚硬的钳子\n持续殴打对方，直到其粉身碎骨。"
        zh_trad:
          ultra_sun: "有著鋼鐵般的身體，比起用來\n夾住敵人，牠粗重的鉗子\n更適合用來把敵人砸扁。"
          ultra_moon: "一旦將對方認定為敵人，\n就會用鋼鐵般堅硬的鉗子\n不斷毆打，直到將對方粉碎。"
    scizor_mega:
