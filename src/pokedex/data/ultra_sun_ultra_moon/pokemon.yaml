        - frisk
        - infiltrator
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          ultra_sun: "こうぶつは　くだもの。　ちょうおんぱを\nあてて　よく　じゅくした　ものだけを\nえらびだして　くらう　グルメなのだ。"
          ultra_moon: "エサと　なる　くだものを　さがして\nとびまわる。　じゅくして　いるかを\nちょうおんぱで　はんべつ　できるぞ。"
        jp_kanji:
          ultra_sun: "好物は　果物。　超音波を\nあてて　よく　熟した　ものだけを\n選び出して　食らう　グルメなのだ。"
          ultra_moon: "エサと　なる　果物を　探して\n飛びまわる。　熟して　いるかを\n超音波で　判別　できるぞ。"
        en:
          ultra_sun: "Fruits are its favorite foods. This gourmet\ncarefully picks out just the ripe ones using\nits sonar."
          ultra_moon: "It flies around in search of fruit to eat. It uses\nultrasonic waves to detect which fruits are ripe."
        fr:
          ultra_sun: "Il adore les fruits et, en véritable gourmet, il ne\nmange que ceux qui sont bien mûrs. Il utilise ses\nultrasons pour déterminer le degré de maturité."
          ultra_moon: "Il vole à la recherche de fruits à manger.\nIl peut déterminer si un fruit est mûr ou non\ngrâce à ses ultrasons."
        it:
          ultra_sun: "Adora la frutta. Ha gusti raffinati e usa gli\nultrasuoni per individuare i frutti maturi al punto\ngiusto, ignorando gli altri."
          ultra_moon: "Vola alla ricerca di frutti di cui cibarsi.\nÈ in grado di determinare se sono maturi grazie\nagli ultrasuoni che emette."
        de:
          ultra_sun: "Es liebt Obst. Als Feinschmecker sortiert es\njedoch unreife Früchte mit Ultraschallwellen aus\nund verleibt sich nur reifes Obst ein."
          ultra_moon: "Es sucht die Gegend im Flug nach Obst ab, das\nseine Nahrung darstellt. Mit Ultraschallwellen\nkann es genau erkennen, welches Obst reif ist."
        es:
          ultra_sun: "Le encanta la fruta, pero es tan selecto que\nemite ondas ultrasónicas para detectar cuáles\nestán maduras y el resto lo descarta."
          ultra_moon: "Revolotea en busca de fruta, su principal fuente\nde sustento. Con las ondas ultrasónicas que\nemite puede determinar cuáles están maduras."
        ko:
          ultra_sun: "과일을 좋아한다. 초음파를\n이용해서 잘 익은 것만\n골라내 먹는 미식가다."
          ultra_moon: "먹이인 과일을 찾아\n날아다닌다. 익은 정도를\n초음파로 판별할 수 있다."
        zh_simp:
          ultra_sun: "喜欢吃水果。会用超音波击中水果，\n然后只挑选出已成熟的来食用，\n是个美食家。"
          ultra_moon: "寻找作为食物的水果，四处飞翔。\n能用超音波判断水果熟了没有。"
        zh_trad:
          ultra_sun: "喜歡吃水果。是個美食家，\n會對水果發射超音波，\n從中挑選出成熟的果實來吃。"
          ultra_moon: "為了尋找能當食物的水果\n而四處飛翔。能用超音波\n判斷水果是否已成熟。"
