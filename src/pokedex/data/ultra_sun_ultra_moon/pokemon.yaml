pineco:
  species_id: 204
  names:
    jp_kana: クヌギダマ
    jp_kanji: クヌギダマ
    en: Pineco
    fr: Pomdepik
    it: Pineco
    de: Tannza
    es: Pineco
    ko: 피콘
    zh_simp: 榛果球
    zh_trad: 榛果球
  forms:
    pineco:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 90
        special_attack: 35
        special_defense: 35
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - sturdy
      hidden_ability: overcoat
      descriptions:
        jp_kana:
          ultra_sun: "きに　ぶらさがり　じっと　えものの\nむしポケモンが　くるのを　まっている。\nアローラでの　こうぶつは　アブリーだ。"
          ultra_moon: "きのかわを　だえきで　はりあわせ\nあつく　おおきくしていく。　としおいた\nクヌギダマは　とてつもない　でかさ。"
        jp_kanji:
          ultra_sun: "木に　ぶら下がり　じっと　獲物の\nむしポケモンが　来るのを　待っている。\nアローラでの　好物は　アブリーだ。"
          ultra_moon: "木の皮を　唾液で　貼り合わせ\n厚く　大きくしていく。　年老いた\nクヌギダマは　とてつもない　でかさ。"
        en:
          ultra_sun: "Motionless, it hangs from trees, waiting for\nits bug Pokémon prey to come to it. Its favorite\nin Alola is Cutiefly."
          ultra_moon: "It sticks tree bark to itself with its saliva,\nmaking itself thicker and larger. Elderly Pineco\nare ridiculously huge."
        fr:
          ultra_sun: "Accroché à sa branche, il attend patiemment\nses proies favorites : les Pokémon Insecte.\nLes Bombydou sont son péché mignon."
          ultra_moon: "Il grandit en utilisant sa salive pour coller\nl’écorce des arbres sur son corps. Un Pomdepik\nâgé peut prendre des proportions démesurées."
        it:
          ultra_sun: "Si ciba di Pokémon Coleottero e attende\npazientemente le prede appeso a un ramo. Quelli\nche vivono ad Alola sono ghiotti di Cutiefly."
          ultra_moon: "Aumenta di dimensioni e spessore incollandosi\naddosso strati di corteccia con la saliva. Con il\ntempo può raggiungere dimensioni spropositate."
        de:
          ultra_sun: "Es hängt an Bäumen und wartet regungslos auf\nseine Beute, Käfer-Pokémon. In Alola ernährt es\nsich bevorzugt von Wommel."
          ultra_moon: "Es macht seinen Körper breiter und größer,\nindem es sich mit Speichel Baumrinde anklebt.\nÄltere Tannza sind deshalb unfassbar groß."
        es:
          ultra_sun: "Se aposta en los árboles y espera inmóvil a\nque pase un Pokémon insecto al que atrapar.\nEn Alola tiene predilección por los Cutiefly."
          ultra_moon: "Usa saliva para adherir corteza de árbol a su\ncuerpo y así aumentar de volumen. Con la edad\npuede alcanzar un tamaño gigantesco."
        ko:
          ultra_sun: "나무에 매달려 가만히 먹이인\n벌레포켓몬이 올 때를 기다린다.\n알로라에서 좋아하는 건 에블리다."
          ultra_moon: "나무껍질을 타액으로 붙여서\n몸을 두껍고 크게 만든다.\n나이를 먹은 피콘은 엄청나게 크다."
        zh_simp:
          ultra_sun: "会挂在树上静静等待作为\n它猎物的虫宝可梦送上门来。\n在阿罗拉，它喜欢吃的是萌虻。"
          ultra_moon: "会用唾液将树皮粘在自己身上，\n从而让自己变得又厚又大。\n上了年纪的榛果球是无比巨大的。"
        zh_trad:
          ultra_sun: "會掛在樹上靜靜等待被牠\n當成獵物的蟲寶可夢上門。\n在阿羅拉，牠最愛吃的是萌虻。"
          ultra_moon: "會用唾液把樹皮貼在自己身上，\n讓自己變得更厚更大。上了年紀的\n榛果球是無比巨大的。"
forretress:
  species_id: 205
  names:
    jp_kana: フォレトス
    jp_kanji: フォレトス
    en: Forretress
    fr: Foretress
    it: Forretress
    de: Forstellka
    es: Forretress
    ko: 쏘콘
    zh_simp: 佛烈托斯
    zh_trad: 佛烈托斯
  forms:
    forretress:
      form_id: 0
      base_stats:
        hp: 75
        attack: 90
        defense: 140
        special_attack: 60
        special_defense: 60
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - steel
      egg_groups:
        - bug
      abilities:
        - sturdy
      hidden_ability: overcoat
      descriptions:
        jp_kana:
          ultra_sun: "なにかが　ちかづくだけで　こうてつの\nカラのはへんを　うちだし　こうげき。\nいしは　なく　じょうけんはんしゃだ。"
          ultra_moon: "えものを　のみこむ　いっしゅんだけ\nカラの　なかみが　あらわれるが　その\nすがたを　みたものは　まだいない。"
        jp_kanji:
          ultra_sun: "なにかが　近付くだけで　鋼鉄の\nカラの破片を　撃ちだし　攻撃。\n意思は　なく　条件反射だ。"
          ultra_moon: "獲物を　呑み込む　一瞬だけ\nカラの　中身が　現れるが　その\n姿を　見た者は　まだいない。"
        en:
          ultra_sun: "When something approaches it, it fires off\nfragments of its steel shell in attack. This is not\na conscious action but a conditioned reflex."
          ultra_moon: "In the moment that it gulps down its prey, the\ninside of its shell is exposed, but to this day,\nno one has ever seen that sight."
        fr:
          ultra_sun: "Il attaque tout ce qui s’approche d’un peu trop\nprès en lançant des morceaux de sa coquille\nd’acier. Il n’a aucun contrôle sur ce réflexe."
          ultra_moon: "On ne peut voir l’intérieur de sa carapace que\nlorsqu’il engloutit sa nourriture, mais il est si\nrapide que personne n’a encore jamais réussi."
        it:
          ultra_sun: "Scaglia frammenti del suo guscio d’acciaio\ntemprato contro qualunque cosa gli si avvicini,\nma si tratta di un riflesso involontario."
          ultra_moon: "L’istante in cui ingoia la preda è l’unico momento\nin cui è possibile sbirciare nella sua conchiglia.\nNessuno sa esattamente come sia fatto."
        de:
          ultra_sun: "Kommt ihm irgendetwas zu nahe, feuert es Teile\nseiner stählernen Schale ab. Das geschieht\njedoch aus Reflex, nicht aus eigenem Willen."
          ultra_moon: "Sein Inneres ist nur kurz sichtbar, wenn es flugs\nseine Beute verschlingt. Bisher hat es noch kein\nMensch geschafft, einen Blick hineinzuwerfen."
        es:
          ultra_sun: "Cuando algo se le acerca, ataca disparando\nfragmentos de su coraza de acero. Se trata de\nun puro acto reflejo."
          ultra_moon: "El momento en el que engulle a su presa es el\núnico instante donde muestra su cuerpo, pero\nhasta ahora ningún humano lo ha visto."
        ko:
          ultra_sun: "무엇이든 다가오기만 하면\n강철 껍질의 파편을 쏘며 공격한다.\n의지가 없는 조건 반사다."
          ultra_moon: "먹이를 삼키는 순간에는\n껍질 안의 모습이 나타나지만\n그 모습을 본 자는 아직 없다."
        zh_simp:
          ultra_sun: "只要一有东西靠近，它就会射出\n钢铁外壳的碎片进行攻击。\n这是一种无意识的条件反射。"
          ultra_moon: "仅在吞下猎物的瞬间，壳里面的\n身体才会出现，但至今仍未有\n人或宝可梦见过其真面目。"
        zh_trad:
          ultra_sun: "只要有東西靠近，牠就會\n發射鋼鐵外殼的碎片來攻擊。\n這是一種與意識無關的條件反射。"
          ultra_moon: "只有在吞下獵物的瞬間，\n殼裡的身體才會出現。\n至今還沒有人見過牠的真面目。"
dunsparce:
  species_id: 206
  names:
    jp_kana: ノコッチ
    jp_kanji: ノコッチ
