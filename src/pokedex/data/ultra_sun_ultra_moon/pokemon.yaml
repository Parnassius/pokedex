  names:
    jp_kana: タマタマ
    jp_kanji: タマタマ
    en: Exeggcute
    fr: Noeunoeuf
    it: Exeggcute
    de: Owei
    es: Exeggcute
    ko: 아라리
    zh_simp: 蛋蛋
    zh_trad: 蛋蛋
  forms:
    exeggcute:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 80
        special_attack: 60
