      descriptions:
        jp_kana:
          ultra_sun: "アゴの　ちからは　きょうりょくだが\nあらそいを　このまないので　めったに\nひろうする　きかいは　ないのだ。"
          ultra_moon: "わかい　じょせいに　だいにんきだが\nおくびょうなうえに　せんさいなので\nばんけん　としては　むのうだ。"
        jp_kanji:
          ultra_sun: "アゴの　力は　強力だが\n争いを　好まないので　滅多に\n披露する　機会は　ないのだ。"
          ultra_moon: "若い　女性に　大人気だが\n臆病な上に　繊細なので\n番犬　としては　無能だ。"
        en:
          ultra_sun: "While it has powerful jaws, it doesn’t care for\ndisputes, so it rarely has a chance to display\ntheir might."
          ultra_moon: "Although it’s popular with young people,\nGranbull is timid and sensitive, so it’s totally\nincompetent as a watchdog."
        fr:
          ultra_sun: "Sa mâchoire est étonnamment puissante,\nmais comme il n’aime pas se battre, il n’a\npas souvent l’occasion de s’en servir."
          ultra_moon: "Les jeunes gens en sont fous, mais sa timidité\net sa grande délicatesse en font un piètre\nPokémon de garde."
        it:
          ultra_sun: "Ha una mascella molto potente, ma non ama\nbattersi, perciò non ha molte occasioni di dare\nprova della sua forza."
          ultra_moon: "Piace moltissimo ai giovani.\nDi indole timida e delicata, non è adatto a fare\nla guardia."
        de:
          ultra_sun: "Sein Unterkiefer ist sehr stark. Da es jedoch\nden Kampf scheut, kommt es nur selten dazu,\ndies zu demonstrieren."
          ultra_moon: "Es ist bei jungen Leuten sehr beliebt. Aufgrund\nseines feigen und sensiblen Charakters ist es\nals Wache allerdings völlig ungeeignet."
        es:
          ultra_sun: "Su mandíbula posee una fuerza abrumadora,\npero, como no le gusta pelear, rara vez tiene\nocasión de demostrarlo."
          ultra_moon: "Es muy popular entre la gente joven, pero su\npersonalidad afable y algo miedosa hacen de\nél un pésimo guardián."
        ko:
          ultra_sun: "턱의 힘은 강력하지만\n다툼을 좋아하지 않아 그다지\n싸우는 걸 볼 기회가 많지 않다."
          ultra_moon: "젊은 여성에게 인기가 많지만\n겁쟁이인데다가 섬세하기 때문에\n지킴이로는 무능하다."
        zh_simp:
          ultra_sun: "颚的力量很强，但不喜欢争斗，\n所以很少有展露的机会。"
          ultra_moon: "虽然深受年轻女性的欢迎，\n但它胆小怕事，内心柔弱，\n所以无法成为一条看门犬。"
        zh_trad:
          ultra_sun: "下顎的力量很強，\n但因為生性不喜歡鬥爭，\n所以很少有展露的機會。"
          ultra_moon: "雖然很受年輕女性歡迎，\n但牠不但膽小而且個性纖細，\n以看門狗來說一點用都沒有。"
