      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
        - anger_point
      hidden_ability: defiant
      descriptions:
        jp_kana:
          ultra_sun: "おこらせた　あいてを　ゆるさず\nおいつづける。　たたきのめして\nうごかなくなっても　まだ　ゆるさない。"
          ultra_moon: "ほかの　ポケモンよりも　のうないの\nけっかんが　じょうぶなので　おこり\nつづけても　げんきで　いられるのだ。"
        jp_kanji:
          ultra_sun: "怒らせた　相手を　許さず\n追い続ける。　叩きのめして\n動かなくなっても　まだ　許さない。"
          ultra_moon: "他の　ポケモンよりも　脳内の\n血管が　丈夫なので　怒り\n続けても　元気で　いられるのだ。"
        en:
          ultra_sun: "It will never forgive opponents who have\nangered it. Even after it has beaten them down\nuntil they can’t move, it never ever forgives."
          ultra_moon: "The blood vessels in its brain are sturdier than\nthose of other Pokémon, so it can stay healthy\ndespite its constant raging."
        fr:
          ultra_sun: "Il ne pardonne rien et poursuit sans relâche\nceux qui l’ont courroucé. Même les assommer\nne suffira pas à apaiser sa rancune."
          ultra_moon: "Les vaisseaux sanguins de son cerveau étant\nplus résistants que ceux d’autres Pokémon,\nil peut rester en état de colère perpétuelle."
        it:
          ultra_sun: "Insegue chi lo fa arrabbiare senza dargli tregua\ne non lo perdona neanche dopo averlo ridotto\nall’immobilità a furia di percosse."
          ultra_moon: "I vasi sanguigni del suo cervello sono più robusti\ndi quelli degli altri Pokémon e sono in grado di\nresistere al suo stato di collera perpetua."
        de:
          ultra_sun: "Wer es nervt, wird auf ewig verfolgt. Selbst\nnachdem es seinen Gegner zu Boden gebracht\nhat, kann es ihm noch nicht verzeihen."
          ultra_moon: "Da es robustere Hirnblutgefäße als andere\nPokémon hat, wirkt sich selbst kontinuierlicher\nZorn nicht schädlich auf seine Gesundheit aus."
        es:
          ultra_sun: "Si se enfada, perseguirá sin descanso al objeto\nde su enojo. Aun habiéndolo golpeado hasta la\nextenuación, seguirá guardándole rencor."
          ultra_moon: "Los vasos sanguíneos de su cerebro son más\nfuertes que los de otros Pokémon, por lo que\npuede vivir en cólera perpetua sin problemas."
        ko:
          ultra_sun: "화나게 한 상대를 용서하지 않고\n계속 쫓아다닌다. 때려눕혀\n움직일 수 없게 돼도 용서하지 않는다."
          ultra_moon: "다른 포켓몬들보다도\n뇌의 혈관이 튼튼해서 계속\n화를 내도 건강을 유지한다."
        zh_simp:
          ultra_sun: "它不会原谅激怒它的人或宝可梦，\n会持续地追击对方。就算把对方揍得\n无法动弹也依然不会原谅对方。"
          ultra_moon: "比起其他宝可梦，\n它的脑血管更加坚固，\n就算持续发怒也能精力充沛。"
        zh_trad:
          ultra_sun: "不會原諒激怒自己的對手，\n會不斷追擊，就算把對方揍到\n無法動彈也不會原諒對方。"
          ultra_moon: "和其他的寶可夢比起來，\n牠的腦血管特別結實，\n就算一直發怒也能活得好好的。"
growlithe:
  species_id: 58
  names:
    jp_kana: ガーディ
    jp_kanji: ガーディ
    en: Growlithe
    fr: Caninos
    it: Growlithe
    de: Fukano
    es: Growlithe
    ko: 가디
    zh_simp: 卡蒂狗
    zh_trad: 卡蒂狗
  forms:
    growlithe:
      form_id: 0
      base_stats:
        hp: 55
        attack: 70
        defense: 45
        special_attack: 70
        special_defense: 50
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - intimidate
        - flash_fire
      hidden_ability: justified
      descriptions:
        jp_kana:
          ultra_sun: "なれれば　ひとなつっこいのだが\nやせいでは　イワンコと　なわばりを\nめぐって　はげしく　あらそっている。"
          ultra_moon: "おおむかしから　にんげんと　ともに\nせいかつ　してきた。　せっきじだいの\nいせきから　ホネが　しゅつどされた。"
        jp_kanji:
          ultra_sun: "慣れれば　人懐っこいのだが\n野生では　イワンコと　縄張りを\n巡って　激しく　争っている。"
          ultra_moon: "大昔から　人間と　ともに\n生活　してきた。　石器時代の\n遺跡から　骨が　出土された。"
        en:
          ultra_sun: "While it’s quite friendly toward humans once it’s\ngrown used to them, in the wild it must be quite\nfierce to defend its territory from Rockruff."
          ultra_moon: "It has lived alongside humans since ages ago.\nIts bones have been found in excavations of\nruins from the Stone Age."
        fr:
          ultra_sun: "Il est très facile à apprivoiser, mais à l’état\nsauvage, il combat férocement les Rocabot\npour le contrôle de son territoire."
          ultra_moon: "Cela fait des siècles qu’il vit avec les humains.\nDes ossements de Caninos ont été retrouvés\nsur des sites datant de l’âge de pierre."
        it:
          ultra_sun: "È molto docile con gli esseri umani a cui\nsi affeziona, ma in natura lotta furiosamente\ncon i Rockruff per il controllo del territorio."
          ultra_moon: "Vive con gli esseri umani da tempi antichissimi.\nSono state ritrovate ossa di questo Pokémon\nin siti archeologici risalenti all’età della pietra."
        de:
          ultra_sun: "Hat es sich erst einmal an Menschen gewöhnt,\nwird es sehr zutraulich. In der Wildnis liefert es\nsich jedoch heftige Revierkämpfe mit Wuffels."
          ultra_moon: "Von alters her lebt es Seite an Seite mit den\nMenschen. In Ausgrabungsstätten steinzeitlicher\nRuinen wurden Überreste von Fukano gefunden."
        es:
          ultra_sun: "Es muy afable con las personas una vez que ha\ncogido confianza, pero, en estado salvaje, libra\nviolentas disputas territoriales con los Rockruff."
          ultra_moon: "Restos óseos hallados en yacimientos fósiles\nmuestran que su convivencia con los humanos\nse remonta a la Edad de Piedra."
        ko:
          ultra_sun: "익숙해지면 사람을 잘 따르지만,\n야생에서는 암멍이와\n영역을 두고 격렬히 다툰다."
          ultra_moon: "먼 옛날부터 인간과 함께\n생활해 왔다. 석기 시대\n유적에서 뼈가 출토되었다."
        zh_simp:
          ultra_sun: "熟悉后便会与人亲近，\n但野生的卡蒂狗会和岩狗狗\n就领地而展开激烈的争夺。"
          ultra_moon: "很久很久以前就和人类一起生活。\n从石器时代的遗迹中\n出土过它的骨头。"
        zh_trad:
          ultra_sun: "與人熟悉之後會表現得很親近，\n但野生的卡蒂狗會為了爭奪地盤，\n與岩狗狗展開激烈的鬥爭。"
          ultra_moon: "很久以前開始就和人類\n一起生活。從石器時代的\n遺跡中出土過牠的骨頭。"
arcanine:
  species_id: 59
  names:
    jp_kana: ウインディ
    jp_kanji: ウインディ
    en: Arcanine
    fr: Arcanin
    it: Arcanine
    de: Arkani
    es: Arcanine
    ko: 윈디
    zh_simp: 风速狗
    zh_trad: 風速狗
  forms:
    arcanine:
      form_id: 0
      base_stats:
        hp: 90
        attack: 110
        defense: 80
        special_attack: 100
        special_defense: 80
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - intimidate
        - flash_fire
      hidden_ability: justified
      descriptions:
        jp_kana:
          ultra_sun: "おおむかしに　とある　ぶしょうと\nともに　たたかい　くにを　おさめた\nという　でんせつが　のこされている。"
          ultra_moon: "おおくの　いいつたえが　のこっており\nでんせつの　ポケモンと　よばれるが\nいがいと　みつかる　かずは　おおい。"
        jp_kanji:
          ultra_sun: "大昔に　とある　武将と\nともに　戦い　国を　治めた\nという　伝説が　残されている。"
          ultra_moon: "多くの　言い伝えが　残っており\n伝説の　ポケモンと　呼ばれるが\n意外と　見つかる　数は　多い。"
        en:
          ultra_sun: "Legends tell of its fighting alongside a general\nand conquering a whole country."
          ultra_moon: "There are so many old tales about them that\nthey’re called legendary Pokémon, but there are\nway more of them around than you’d expect."
        fr:
          ultra_sun: "Une légende célèbre relate les exploits d’un\nchef de guerre et de son Arcanin à la conquête\nd’un certain royaume antique."
          ultra_moon: "Tant de mythes circulent sur son compte\nqu’il est parfois qualifié de légendaire, alors\nqu’en réalité, il est on ne peut plus commun."
        it:
          ultra_sun: "Narra la leggenda che in un lontano passato\nabbia lottato a fianco di un generale,\naiutandolo a conquistare paesi interi."
          ultra_moon: "Si narra di lui in molti racconti, tanto che viene\nchiamato “Pokémon leggendario”. Non è però un\nPokémon raro, ma piuttosto comune."
        de:
          ultra_sun: "Der Legende nach soll es vor langer Zeit an der\nSeite eines Kriegshelden gekämpft und so an\nder Eroberung eines Landes mitgewirkt haben."
          ultra_moon: "Es ranken sich so viele Mythen um Arkani, dass\nes gemeinhin als legendär gilt. In Wirklichkeit \nkommt es jedoch sehr häufig vor."
        es:
          ultra_sun: "Cuenta una antigua leyenda que, tiempo ha, llegó\na conquistar territorios enteros luchando junto a\ncierto señor de la guerra."
          ultra_moon: "La infinidad de mitos relacionados con este\nPokémon le ha conferido un carácter de leyenda,\naunque en realidad es muy común."
        ko:
          ultra_sun: "아주 먼 옛날 어느 장수와\n함께 싸워 나라를 다스렸다고 하는\n전설이 남아 있다."
          ultra_moon: "많은 전설이 남아 있어\n전설의 포켓몬이라고 불리지만\n의외로 발견되는 수는 많다."
        zh_simp:
          ultra_sun: "流传着这样一个传说。\n很久以前，它曾经和某位武将\n一起并肩战斗并治理国家。"
          ultra_moon: "虽然留有众多传说，\n被称为传说的宝可梦，\n但发现它的次数却意外的多。"
        zh_trad:
          ultra_sun: "在遠古流傳至今的傳說中，\n牠曾與某位武將並肩作戰，\n共同治理國家。"
          ultra_moon: "雖然留下了許多傳說，\n被人們稱為傳說的寶可夢，\n但發現到的數量卻意外地多。"
poliwag:
  species_id: 60
  names:
    jp_kana: ニョロモ
    jp_kanji: ニョロモ
    en: Poliwag
    fr: Ptitard
    it: Poliwag
    de: Quapsel
    es: Poliwag
    ko: 발챙이
    zh_simp: 蚊香蝌蚪
    zh_trad: 蚊香蝌蚪
  forms:
    poliwag:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          ultra_sun: "きけんなのに　りくに　あがりたがる。\nまだ　よちよちあるき　なので　てきに\nみつかると　あわてて　みずのなかへ。"
          ultra_moon: "うずまきの　むきは　ちいきにより\nびみょうに　ちがう。　ニョロモの\nマニアは　ひとめで　みわけるらしい。"
        jp_kanji:
          ultra_sun: "危険なのに　陸に　上がりたがる。\nまだ　よちよち歩き　なので　敵に\n見つかると　慌てて　水の中へ。"
          ultra_moon: "うずまきの　向きは　地域により\n微妙に　違う。　ニョロモの\nマニアは　一目で　見分けるらしい。"
        en:
          ultra_sun: "Despite the danger, it wants to come up on land.\nSo it does its best to waddle along, but when\nan enemy finds it, it rushes back to the water."
          ultra_moon: "The direction of the swirl on their stomachs\ndiffers depending on where they live. Poliwag\naficionados can tell them apart at a glance."
        fr:
          ultra_sun: "Malgré le danger, il ne cesse de sortir de l’eau.\nComme il a encore du mal à marcher, il s’y\nréfugie toutefois dès qu’un prédateur approche."
          ultra_moon: "L’orientation de sa spirale diffère légèrement\nselon les régions. Les fans de ces Pokémon\npeuvent les différencier au premier coup d’œil."
        it:
          ultra_sun: "Nonostante i pericoli, gli piace salire sulla\nterraferma. Dato che non cammina ancora bene,\nse incontra un nemico torna subito in acqua."
          ultra_moon: "La direzione della spirale che ha sulla pancia\nvaria da zona a zona. Gli appassionati di Poliwag\nvedono la differenza a colpo d’occhio."
        de:
          ultra_sun: "Trotz der Gefahren kommt es gerne an Land.\nTaucht ein Feind auf, flitzt es hastig auf seinen\nnoch wackligen Beinen zurück ins Wasser."
          ultra_moon: "Die Ausrichtung seiner Spirale weist je nach\nRegion subtile Unterschiede auf. Quapsel-Fans\nerkennen diese auf einen Blick."
        es:
          ultra_sun: "A pesar del peligro, le gusta salir a tierra firme.\nComo es un poco torpe al caminar, regresa al\nagua rápidamente cuando se acerca un enemigo."
          ultra_moon: "Un fan que se precie de serlo sabrá identificar\na primera vista la espiral de su vientre, cuya\norientación varía según su región de origen."
        ko:
          ultra_sun: "위험한데도 지상으로 올라가고 싶어한다.\n아직 아장아장 걷기 때문에 적에게\n노출되면 황급히 물속으로 들어간다."
          ultra_moon: "소용돌이의 방향은 지역에 따라\n미묘하게 다르다. 발챙이 마니아는\n한눈에 구분할 수 있다고 한다."
        zh_simp:
          ultra_sun: "虽然危险，却向往登上陆地。\n因为它还只能晃晃悠悠地走路，\n所以被敌人发现后会慌忙逃入水中。"
          ultra_moon: "因地域不同，漩涡的方向也有着\n微妙的差异。蚊香蝌蚪的爱好者\n好像一眼就能分辨出来。"
        zh_trad:
          ultra_sun: "雖然危險卻總是想登上陸地。\n因為連走路都還走不穩，\n所以一被敵人發現就會慌忙逃進水中。"
          ultra_moon: "漩渦的方向隨著地域的不同有著\n微妙的差異。蚊香蝌蚪的愛好者\n似乎一眼就能分辨出來。"
poliwhirl:
  species_id: 61
  names:
    jp_kana: ニョロゾ
    jp_kanji: ニョロゾ
    en: Poliwhirl
    fr: Têtarte
    it: Poliwhirl
    de: Quaputzi
    es: Poliwhirl
    ko: 슈륙챙이
    zh_simp: 蚊香君
    zh_trad: 蚊香君
  forms:
    poliwhirl:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 65
        special_attack: 50
        special_defense: 50
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      hidden_ability: swift_swim
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          ultra_sun: "りくでも　くらせるように　なったのに\nえものの　さかなポケモンが　おおい\nみずの　なかで　すごしている。"
          ultra_moon: "ひふが　かんそうすると　げんきが\nなくなってしまうので　こまめに\nすいぶんを　ほきゅうして　あげよう。"
        jp_kanji:
          ultra_sun: "陸でも　暮らせるように　なったのに\n獲物の　さかなポケモンが　多い\n水の　中で　過ごしている。"
          ultra_moon: "皮膚が　乾燥すると　元気が\nなくなってしまうので　こまめに\n水分を　補給して　あげよう。"
        en:
          ultra_sun: "Although it has become capable of living on\nland, it spends its time in the water, where\nits prey, fish Pokémon, are plentiful."
          ultra_moon: "Its health suffers when its skin dries out, so be\nsure to moisturize it diligently."
        fr:
          ultra_sun: "Il est enfin capable de vivre sur la terre ferme,\nmais il passe le plus clair de son temps\nà chasser dans les eaux poissonneuses."
          ultra_moon: "Son état de santé se dégrade à mesure que\nsa peau s’assèche, aussi faut-il veiller à ce\nqu’il soit toujours bien hydraté."
        it:
          ultra_sun: "Si è adattato anche alla terraferma, ma passa\nla maggior parte del tempo in acqua, dove trova\nmolti Pokémon acquatici di cui cibarsi."
          ultra_moon: "Se la sua pelle si secca, perde vitalità, quindi\nè importante assicurarsi che sia costantemente\nidratato."
        de:
          ultra_sun: "Es hat zwar gelernt, auch an Land zu überleben,\nhält sich aber trotzdem vorwiegend im Wasser\nauf, wo es nach Fisch-Pokémon jagen kann."
          ultra_moon: "Trocknet seine Haut aus, verliert es an Vitalität.\nAn Land sollte man daher stets darauf achten,\nes mit ausreichend Flüssigkeit zu versorgen."
        es:
          ultra_sun: "Puede vivir en tierra firme perfectamente, pero\nprefiere el agua, donde encuentra más Pokémon\npez que le sirven de sustento."
          ultra_moon: "Cuando se le seca la piel, su salud se resiente,\npor lo que conviene asegurarse de mantenerlo\nsiempre bien hidratado."
        ko:
          ultra_sun: "지상에서 살 수 있게 되었는데도\n먹이인 물고기포켓몬이 많은\n수중에서 지낸다."
          ultra_moon: "피부가 건조해지면\n기력이 없어지게 되므로\n부지런히 수분을 보충해 주자."
        zh_simp:
          ultra_sun: "虽然已经能在陆地上生活，\n但还是栖息在有大量\n鱼宝可梦可捕食的水中。"
          ultra_moon: "皮肤干燥就会失去活力，\n所以经常给它补充水分吧。"
        zh_trad:
          ultra_sun: "雖然已經能在陸地上生活，\n但還是棲息在有大量魚寶可夢\n可以獵食的水中。"
          ultra_moon: "皮膚一旦乾燥就會\n失去活力，所以要\n經常幫牠補充水分。"
poliwrath:
  species_id: 62
  names:
    jp_kana: ニョロボン
    jp_kanji: ニョロボン
    en: Poliwrath
    fr: Tartard
    it: Poliwrath
    de: Quappo
    es: Poliwrath
    ko: 강챙이
    zh_simp: 蚊香泳士
    zh_trad: 蚊香泳士
  forms:
    poliwrath:
      form_id: 0
      base_stats:
        hp: 90
        attack: 95
        defense: 95
        special_attack: 70
        special_defense: 90
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 3
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - fighting
      egg_groups:
        - water_1
      abilities:
        - water_absorb
        - damp
      hidden_ability: swift_swim
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          ultra_sun: "みずポケモンの　なかでも　かなり\nおよぎは　たっしゃな　ぶるい　なのに\nふだんは　りくで　すごしている。"
          ultra_moon: "およぎで　きたえた　きんにくは\nふとく　たくましい。　せいけんづきで\nおおきな　いわも　こなごなに　する。"
        jp_kanji:
          ultra_sun: "みずポケモンの　中でも　かなり\n泳ぎは　達者な　部類　なのに\n普段は　陸で　過ごしている。"
          ultra_moon: "泳ぎで　鍛えた　筋肉は\n太く　たくましい。　正拳突きで\n大きな　岩も　粉々に　する。"
        en:
          ultra_sun: "It’s quite a gifted swimmer, even among\nWater-type Pokémon, but it normally spends its\ntime on land."
          ultra_moon: "The muscles it has developed through swimming\nare thick and powerful. When it lands a square\npunch, it can turn huge boulders to dust."
        fr:
          ultra_sun: "Bien qu’il fasse partie des Pokémon de type Eau\nles plus doués pour la nage, il reste en général\nsur la terre ferme."
          ultra_moon: "Son impressionnante musculature a été sculptée\npar sa nage vigoureuse. Un direct du droit lui\nsuffit à réduire un gros rocher en miettes."
        it:
          ultra_sun: "È un nuotatore particolarmente abile anche\nrispetto ad altri Pokémon che vivono in acqua,\nma di solito vive sulla terraferma."
          ultra_moon: "È dotato di muscoli vigorosi, sviluppatisi\ngrazie al nuoto. Con un pugno può mandare\nin frantumi anche un grosso masso."
        de:
          ultra_sun: "Selbst unter den Wasser-Pokémon gilt es als\nhervorragender Schwimmer. Dennoch hält es\nsich vorwiegend an Land auf."
          ultra_moon: "Dank seines Schwimmtrainings ist es ein wahres\nMuskelpaket. Ein Faustschlag reicht ihm aus, um\nselbst riesige Felsen zu zertrümmern."
        es:
          ultra_sun: "Pese a ser uno de los mejores nadadores entre\nlos Pokémon acuáticos, pasa la mayor parte del\ntiempo en tierra firme."
          ultra_moon: "Horas de nado han cincelado una musculatura\nimpresionante, hasta el punto de ser capaz de\npulverizar rocas de un puñetazo."
        ko:
          ultra_sun: "물포켓몬 중에서도 수영 실력이\n매우 뛰어난 부류인데도\n평상시에는 지상에서 지낸다."
          ultra_moon: "수영으로 단련한 근육은\n두텁고 강하다. 정권 지르기로\n큰 바위도 가루로 만들어 버린다."
        zh_simp:
          ultra_sun: "虽然在水宝可梦中是属于\n游泳健将那一类的，\n但平时却生活在陆地上。"
          ultra_moon: "通过游泳锻炼出来的肌肉结实又健硕。\n正面直拳连巨大的岩石都能击碎。"
        zh_trad:
          ultra_sun: "在水屬性寶可夢中是屬於\n游泳健將那一類型，\n但平時卻生活在陸地上。"
          ultra_moon: "靠著游泳鍛鍊出的肌肉\n非常粗壯結實。牠使出的\n正拳就連巨大的岩石也能擊碎。"
abra:
