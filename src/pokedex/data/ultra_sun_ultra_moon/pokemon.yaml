        - inner_focus
      hidden_ability: pressure
      descriptions:
        jp_kana:
          ultra_sun: "えものを　きりさいたあとは　かわらの\nいしで　はを　とぐ。　それぞれの\nコマタナに　おきにいりの　いしがある。"
          ultra_moon: "キリキザンの　めいれいの　ままに\nてきを　おそう。　あいてを　きりさくと\nりょうての　やいばを　うちならすぞ。"
        jp_kanji:
          ultra_sun: "獲物を　切り裂いたあとは　河原の\n石で　刃を　研ぐ。　それぞれの\nコマタナに　お気に入りの　石がある。"
          ultra_moon: "キリキザンの　命令の　ままに\n敵を　襲う。　相手を　切り裂くと\n両手の　刃を　打ち鳴らすぞ。"
        en:
          ultra_sun: "After shredding its prey, it sharpens its blades\non a stone by the river. Each Pawniard has its\nown favorite sharpening stone."
          ultra_moon: "It follows Bisharp’s orders to a tee when it\nattacks enemies. After slashing an opponent,\nPawniard clangs both of its blades together."
        fr:
          ultra_sun: "Après avoir dépecé ses ennemis, il va sur les\nberges pour aiguiser ses lames sur une pierre.\nChaque Scalpion a d’ailleurs son caillou fétiche."
          ultra_moon: "Il obéit à Scalproie au doigt et à l’œil sur le\nchamp de bataille. Il fait résonner ses lames\nl’une contre l’autre une fois son ennemi tranché."
        it:
          ultra_sun: "Dopo aver fatto a pezzi la preda, affila le sue\nlame con pietre di fiume. Ogni Pawniard ha\nle sue pietre preferite."
          ultra_moon: "Seguendo prontamente gli ordini di Bisharp, si\nlancia sul nemico e lo fa a pezzi, poi fa risuonare\nle sue lame di un clangore metallico."
        de:
          ultra_sun: "Erst schlitzt es seine Beute auf, dann schärft es\nseine Klingen an den Felsen eines Flussbetts.\nJedes Gladiantri besitzt einen Lieblingsfelsen."
          ultra_moon: "Es greift seine Gegner auf Befehl von Caesurio\nan. Nachdem es seine Beute aufgeschlitzt hat,\nlässt es seine Klingen schwingend ertönen."
        es:
          ultra_sun: "Tras rebanar a sus presas, afila sus cuchillas\ncon piedras de río. Cada Pawniard tiene una\npiedra favorita."
          ultra_moon: "Acata las órdenes de Bisharp a pies juntillas.\nCuando rebana a un oponente, hace sonar las\ncuchillas de sus brazos chocándolas entre sí."
        ko:
          ultra_sun: "먹이를 베어 가른 후에는\n기와 돌로 칼날을 간다.\n자망칼마다 좋아하는 돌이 있다."
          ultra_moon: "절각참의 명령에 따라\n적을 공격한다. 상대를 베어 가르면\n양손의 칼날을 부딪친다."
        zh_simp:
          ultra_sun: "在劈开猎物后，会用河滩的石头\n将刀刃磨快。不同的驹刀小兵\n都有各自喜欢的石头。"
          ultra_moon: "遵照劈斩司令的命令袭击敌人。\n如果劈开了对手，\n就会击响双手的刀刃。"
        zh_trad:
          ultra_sun: "斬斷獵物之後，會用河灘上的\n石頭來磨刀。每個駒刀小兵\n各自有著自己喜歡的石頭。"
          ultra_moon: "遵照劈斬司令的命令\n襲擊敵人。斬斷對手時，\n就會敲響雙手的刀刃。"
bisharp:
  species_id: 625
  names:
    jp_kana: キリキザン
    jp_kanji: キリキザン
    en: Bisharp
    fr: Scalproie
    it: Bisharp
    de: Caesurio
    es: Bisharp
    ko: 절각참
    zh_simp: 劈斩司令
    zh_trad: 劈斬司令
  forms:
    bisharp:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 100
        special_attack: 60
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - steel
      egg_groups:
        - human_like
      abilities:
        - defiant
        - inner_focus
      hidden_ability: pressure
      descriptions:
        jp_kana:
          ultra_sun: "どんなに　つよい　キリキザンでも\nあたまの　やいばが　はこぼれすると\nボスの　ざを　いんたいすると　いう。"
          ultra_moon: "コマタナの　むれを　ひきいている。\nあいてに　とどめを　さすときも\nいっさい　ひょうじょうを　かえない。"
        jp_kanji:
          ultra_sun: "どんなに　強い　キリキザンでも\n頭の　刃が　刃こぼれすると\nボスの　座を　引退すると　いう。"
          ultra_moon: "コマタナの　群れを　率いている。\n相手に　止めを　刺すときも\n一切　表情を　変えない。"
        en:
          ultra_sun: "No matter how strong the Bisharp, it’s said\nthat if the blade on its head is chipped, it will\nretire from its position as the boss."
          ultra_moon: "It leads a group of Pawniard. Bisharp doesn’t\neven change its expression when it deals\nthe finishing blow to an opponent."
        fr:
          ultra_sun: "Peu importe la puissance du Scalproie,\nil abdique de son rôle de chef si la lame\nde sa tête subit la moindre ébréchure."
          ultra_moon: "Il dirige une cohorte de Scalpion. Il ne laisse\ntransparaître aucune émotion lorsqu’il assène\nle coup de grâce."
        it:
          ultra_sun: "Per quanto sia forte, se la lama sulla sua testa\nviene intaccata deve rinunciare al comando\ndel gruppo."
          ultra_moon: "Comanda gruppi di Pawniard. Quando attacca\nil nemico per dargli il colpo di grazia, non lascia\ntrasparire alcuna emozione."
        de:
          ultra_sun: "Es heißt, dass ein Caesurio ungeachtet seiner\nStärke seinen Rang als Anführer abtreten muss,\nwenn die Klinge an seinem Kopf schartig wird."
          ultra_moon: "Es führt eine Gruppe von Gladiantri an. Selbst\nwenn es dem Gegner den finalen Stoß versetzt,\nbleibt sein Gesichtsausdruck stets unverändert."
        es:
          ultra_sun: "Por fuerte que sea un Bisharp, la más mínima\nmella en la hoja de su cabeza es deshonrosa\ny motivo de destitución como líder de su grupo."
          ultra_moon: "Lidera un grupo de Pawniard y no muestra el\nmás mínimo sentimiento ni cuando propina el\nataque de gracia al rival."
        ko:
          ultra_sun: "아무리 강한 절각참이라도\n머리의 칼날의 이가 빠지면\n보스의 자리를 은퇴한다고 한다."
          ultra_moon: "자망칼의 무리를 거느리고 있다.\n상대를 마무리할 때도\n전혀 표정을 바꾸지 않는다."
        zh_simp:
          ultra_sun: "据说，无论是多么强大的劈斩司令，\n一旦头部的刀刃有损伤，\n就会从首领的位置上引退。"
          ultra_moon: "率领着驹刀小兵群。\n在给对手致命一击时，\n也完全面不改色。"
        zh_trad:
          ultra_sun: "據說無論是多麼強大的劈斬司令，\n一旦頭上的刀刃出現了缺損，\n就會從首領的位子上退下來。"
          ultra_moon: "率領著成群的駒刀小兵。\n即使在給對手致命一擊的時候，\n也完全面不改色。"
