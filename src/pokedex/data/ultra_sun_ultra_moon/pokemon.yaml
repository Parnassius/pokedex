          ultra_moon: "ふだん　おしゃべりな　こどもが\nむくちに　なった　ときは　ゾロアが\nいれかわって　いるかも　しれないよ。"
        jp_kanji:
          ultra_sun: "臆病な　性質の　ポケモンで\n仲間と　いるとき　以外は　ほぼ\n他の　誰かに　化けている。"
          ultra_moon: "普段　おしゃべりな　子どもが\n無口に　なった　ときは　ゾロアが\n入れ替わって　いるかも　しれないよ。"
        en:
          ultra_sun: "This Pokémon has a cowardly disposition, so\nwhen it’s not around friends, it basically\nalways stays transformed as something else."
          ultra_moon: "If a normally talkative child suddenly stops\ntalking, it may have been replaced by Zorua."
        fr:
          ultra_sun: "Timide de nature, il change constamment\nd’apparence, sauf quand il est entouré de\nses congénères."
          ultra_moon: "Si un enfant volubile a soudain perdu sa langue,\nméfiez-vous ! C’est peut-être un Zorua qui\na pris son apparence..."
        it:
          ultra_sun: "È un Pokémon molto timido. Quando non è\ncircondato dai suoi simili, assume sembianze\ndiverse dalle quelle abituali."
          ultra_moon: "Se un bambino chiacchierone diventa di colpo\ntaciturno, potrebbe essere in realtà uno Zorua\nche ne ha preso le sembianze."
        de:
          ultra_sun: "Ein furchtsames Pokémon, das die Gestalt eines\nanderen annimmt, wenn es sich nicht in der\nGesellschaft seiner Artgenossen befindet."
          ultra_moon: "Wenn man einem normalerweise geschwätzigen\nKind begegnet, das plötzlich keinen Ton mehr\nspricht, könnte es ein verwandeltes Zorua sein."
        es:
          ultra_sun: "Es tan miedoso que, cuando no se halla junto a\nsus compañeros, casi siempre adopta un\naspecto distinto."
          ultra_moon: "Si un niño parlanchín se vuelve taciturno, tal vez\npueda tratarse en realidad de un Zorua que ha\nadoptado su aspecto."
        ko:
          ultra_sun: "겁이 많은 포켓몬으로\n동료와 있을 때 말고는 거의\n다른 누군가로 둔갑하고 있다."
          ultra_moon: "평소에 수다스러운 아이가\n과묵해졌다면 조로아가\n둔갑한 것일지도 모른다."
        zh_simp:
          ultra_sun: "性格胆小的宝可梦，\n不和伙伴呆在一起的时候，\n通常都会幻化成其他东西。"
          ultra_moon: "平时很爱说话的孩子\n如果突然不说话了，\n或许是被索罗亚替换了哦。"
        zh_trad:
          ultra_sun: "性情膽小的寶可夢。\n除了和夥伴待在一起的時候之外，\n通常都會幻化成其他東西。"
          ultra_moon: "平常很愛說話的孩子\n如果突然變得很沉默，\n就有可能是索羅亞假扮的。"
zoroark:
  species_id: 571
  names:
    jp_kana: ゾロアーク
    jp_kanji: ゾロアーク
    en: Zoroark
    fr: Zoroark
    it: Zoroark
    de: Zoroark
    es: Zoroark
    ko: 조로아크
    zh_simp: 索罗亚克
    zh_trad: 索羅亞克
  forms:
    zoroark:
      form_id: 0
      base_stats:
        hp: 60
        attack: 105
        defense: 60
        special_attack: 120
        special_defense: 60
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - illusion
      descriptions:
        jp_kana:
          ultra_sun: "なにかに　ばけるだけ　ではなく\nなんびゃくにんもの　ひとに\nまぼろしを　みせる　ちからをもつ。"
          ultra_moon: "にんげんに　すみかを　あばかれそうに\nなると　まぼろしを　みせて　もりを\nさまよわせ　つづける　という。"
        jp_kanji:
          ultra_sun: "何かに　化けるだけ　ではなく\n何百人もの　人に\n幻を　見せる　力をもつ。"
          ultra_moon: "人間に　棲み処を　暴かれそうに\nなると　幻を　みせて　森を\n彷徨わせ　続ける　という。"
        en:
          ultra_sun: "It doesn’t just transform itself—it also has the\npower to make hundreds of people see\nits illusions."
          ultra_moon: "If it thinks humans are going to discover its den,\nZoroark shows them visions that make them\nwander around in the woods."
        fr:
          ultra_sun: "Il est non seulement capable de changer\nd’apparence, mais il peut également créer\ndes illusions pour hypnotiser les humains."
          ultra_moon: "Les humains qui osent menacer son habitat\nfinissent par errer éternellement dans les bois,\nvictimes de ses illusions."
        it:
          ultra_sun: "Oltre a essere in grado di trasformarsi in\nqualsiasi cosa, ha anche il potere di creare\nmiraggi, traendo in inganno centinaia di persone."
          ultra_moon: "Se un essere umano sta per scoprire la sua\ntana, crea dei miraggi per depistarlo, facendolo\nvagare nel bosco all’infinito."
        de:
          ultra_sun: "Es kann nicht nur seine Gestalt verändern,\nsondern auch Illusionen erzeugen, um auf einen\nSchlag mehrere Hundert Menschen zu täuschen."
          ultra_moon: "Es heißt, dass es jene Menschen, die sein Revier\nzu enthüllen drohen, mit Illusionen täuscht und\ndazu bringt, unentwegt durch den Wald zu irren."
        es:
          ultra_sun: "No solo es capaz de transformarse, sino que\ntambién puede crear ilusiones para confundir\na cientos de personas."
          ultra_moon: "Si percibe que un humano está amenazando su\nhábitat, crea visiones para aturdirlo y hacerlo\nvagar por el bosque sin cesar."
        ko:
          ultra_sun: "둔갑술이 가능할 뿐만 아니라\n수백 명의 사람에게 환상을\n보여줄 수 있는 힘을 가졌다."
          ultra_moon: "인간에게 거처를 들킬 위기에\n처하면 환상을 보여줘서\n숲을 떠돌게 한다고 전해진다."
        zh_simp:
          ultra_sun: "不只是幻化成其他东西，\n还拥有让几百人看见幻像的力量。"
          ultra_moon: "据说，栖息地快要暴露在人类面前时，\n它就会制造出幻象，\n让人在森林里不断徘徊。"
        zh_trad:
          ultra_sun: "不只會幻化成其他東西，\n還擁有能夠讓數百人\n看見幻象的力量。"
          ultra_moon: "據說當牠的棲息地快要暴露在\n人類面前時，牠會製造出幻影，\n讓人在森林裡不斷徘徊。"
minccino:
  species_id: 572
  names:
    jp_kana: チラーミィ
    jp_kanji: チラーミィ
    en: Minccino
    fr: Chinchidou
    it: Minccino
    de: Picochilla
    es: Minccino
    ko: 치라미
    zh_simp: 泡沫栗鼠
    zh_trad: 泡沫栗鼠
  forms:
