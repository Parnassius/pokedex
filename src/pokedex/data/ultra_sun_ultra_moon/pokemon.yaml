      descriptions:
        jp_kana:
          ultra_sun: "５ほんのツノから　ほのおを　ふきだし\nあいてと　たたかう。　そのおんどは\nさいだいで　３０００どに　たっする。"
          ultra_moon: "ほのおを　つかって　みを　まもる。\nむかしの　ひとびとは　たいように\nすが　あると　しんじていた。"
        jp_kanji:
          ultra_sun: "５本のツノから　炎を　吹きだし\n相手と　戦う。　その温度は\n最大で　３０００度に　達する。"
          ultra_moon: "炎を　使って　身を　守る。\n昔の　人々は　太陽に\n巣が　あると　信じていた。"
        en:
          ultra_sun: "When battling opponents, it sprays fire from its\nfive horns. The max temperature of the flames\ncan reach nearly 5,500 degrees Fahrenheit."
          ultra_moon: "It protects itself with flame. Long years ago,\npeople believed Larvesta had a nest on the sun."
        fr:
          ultra_sun: "Il se bat en projetant des flammes par ses\ncinq cornes. Ces gerbes de feu dévastatrices\npeuvent atteindre les 3 000 °C."
          ultra_moon: "Il se sert de flammes pour se défendre. Jadis,\nles anciens pensaient qu’il nichait dans le soleil."
        it:
          ultra_sun: "Lotta contro i suoi avversari lanciando fiamme\ndai suoi cinque corni a una temperatura che\npuò raggiungere i 3.000 °C."
          ultra_moon: "Si protegge grazie alle sue fiamme.\nNell’antichità si credeva che facesse il nido\nnel sole."
        de:
          ultra_sun: "Es bekämpft seine Gegner mithilfe der Flammen,\ndie es aus seinen fünf Hörnern auf sie abfeuert.\nDiese erreichen Temperaturen bis zu 3 000 °C."
          ultra_moon: "Es schützt sich mithilfe von Flammen. Früher\nglaubte man, dass sich sein Nest in der Sonne\nselbst befände."
        es:
          ultra_sun: "Cuando ha de enfrentarse a un rival, expulsa a\ntravés de los cinco cuernos llamaradas que\nllegan a alcanzar temperaturas de 3000 ºC."
          ultra_moon: "Utiliza las llamas para defenderse. La gente de\népocas pasadas tenía la creencia de que\nanidaba en el propio sol."
        ko:
          ultra_sun: "5개의 뿔에서 불꽃을 뿜어내\n상대와 싸운다. 그 온도는\n최대 3000도에 달한다."
          ultra_moon: "불꽃을 사용해서 몸을 지킨다.\n옛날 사람들은 태양에 활화르바의\n둥지가 있다고 믿고 있었다."
        zh_simp:
          ultra_sun: "从５只角中喷出火焰与对手战斗。\n那温度最高可达３０００度。"
          ultra_moon: "使用火焰保护身体。\n过去的人们相信它的巢穴在太阳上。"
        zh_trad:
          ultra_sun: "從５根角中噴出火焰\n與對手戰鬥。火焰的溫度\n最高可達３０００度。"
          ultra_moon: "會用火焰保護自己。\n過去的人們相信\n牠的巢在太陽上。"
