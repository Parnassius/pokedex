        en:
          ultra_sun: "It digs through the ground with its hard claws\nand crunches down gems with its thick pointy\nteeth. Carbink is its favorite food."
          ultra_moon: "Materials from gems it has eaten float to the\nsurface of its body and can form an infinite\nnumber of patterns among individuals."
        fr:
          ultra_sun: "Il creuse le sol de ses griffes acérées pour\ntrouver des gemmes, qu’il croque comme\ns’il s’agissait de chips. Il raffole des Strassie."
          ultra_moon: "Les éléments présents dans les gemmes qu’il\nmange remontent à la surface de son corps,\nformant des motifs d’une infinie variété."
        it:
          ultra_sun: "Scava il terreno con gli artigli robusti e frantuma\nle gemme con le grosse zanne.\nÈ molto ghiotto di Carbink."
          ultra_moon: "Le sostanze contenute nelle gemme che\ningerisce emergono a livello epidermico e\nformano i motivi più disparati."
        de:
          ultra_sun: "Mit seinen scharfen Krallen gräbt es nach\nEdelsteinen, die es mit seinen dicken Fängen\nzerbeißt. Besonders gern frisst es Rocara."
          ultra_moon: "Die Substanzen der Edelsteine, die es frisst,\nverfestigen sich an seiner Körperoberfläche,\nwobei unendlich viele Musterungen entstehen."
        es:
          ultra_sun: "Horada la tierra con sus duras garras y extrae\ngemas que luego desmenuza con sus gruesos\ncolmillos. Los Carbink son su manjar predilecto."
          ultra_moon: "Algunos de los elementos de las gemas con las\nque se alimenta emergen en su piel creando\npatrones variopintos."
        ko:
          ultra_sun: "딱딱한 발톱으로 땅에 구멍을 파고\n굵은 이빨로 보석을 북북 갉는다.\n멜리시를 매우 좋아한다."
          ultra_moon: "신체의 표면에 먹은\n보석의 성분이 떠오른다.\n그 패턴은 무한대다."
        zh_simp:
          ultra_sun: "用坚硬的爪子掘土，\n用粗粗的牙齿嘎嘣嘎嘣地嚼宝石。\n非常喜欢吃小碎钻。"
          ultra_moon: "所吃宝石的成分会在\n身体表面浮现出来。\n所形成的花纹变化无限。"
        zh_trad:
          ultra_sun: "會用堅硬的爪子挖土，\n並用粗壯的獠牙啃食寶石。\n最喜歡吃小碎鑽。"
          ultra_moon: "吃下的寶石成分會在身體\n表面浮現出來。所形成的\n花紋有無限多種變化。"
    sableye_mega:
      form_id: 1
      names:
        jp_kana: メガヤミラミ
        jp_kanji: メガヤミラミ
        en: Mega Sableye
        fr: Méga-Ténéfix
        it: MegaSableye
        de: Mega-Zobiris
        es: Mega-Sableye
        ko: 메가깜까미
        zh_simp: 超级勾魂眼
        zh_trad: 超級勾魂眼
      base_stats:
        hp: 50
        attack: 85
        defense: 125
        special_attack: 85
        special_defense: 115
        speed: 20
      evs_yield:
        hp: 0
        attack: 1
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - ghost
      egg_groups:
        - human_like
      abilities:
        - magic_bounce
      descriptions:
        jp_kana:
          ultra_sun: "メガシンカの　エネルギーを　あびた\nむねの　ほうせきは　ぼうちょうし\nひふを　ひきさいて　とびだした。"
          ultra_moon: "きょだいかした　ほうせきで　あらゆる\nこうげきを　ガード。　ただし　すごく\nおもたいので　うごくのは　にがて。"
        jp_kanji:
          ultra_sun: "メガシンカの　エネルギーを　浴びた\n胸の　宝石は　膨張し\n皮膚を　引き裂いて　飛び出した。"
          ultra_moon: "巨大化した　宝石で　あらゆる\n攻撃を　ガード。　ただし　すごく\n重たいので　動くのは　苦手。"
        en:
          ultra_sun: "Bathed in the energy of Mega Evolution, the\ngemstone on its chest expands, rips through\nits skin, and falls out."
          ultra_moon: "It blocks any and all attacks with its giant-sized\ngemstone. However, the stone’s a heavy burden,\nand it limits Mega Sableye’s movements."
        fr:
          ultra_sun: "Le joyau sur sa poitrine a absorbé tant d’énergie\nsuite à la Méga-Évolution qu’il a énormément\ngrossi et s’est détaché en déchirant sa peau."
          ultra_moon: "Son joyau est devenu immense et très lourd. Il\nlui permet de se protéger contre toute attaque,\nmais ralentit beaucoup ses mouvements."
        it:
          ultra_sun: "La gemma sul petto, diventata enorme per aver\nassorbito l’energia della megaevoluzione, è\nuscita dal corpo aprendosi un varco nella pelle."
          ultra_moon: "La sua gemma, divenuta enorme, lo protegge da\nqualsiasi attacco, ma essendo molto pesante\ngli impedisce di muoversi liberamente."
        de:
          ultra_sun: "Durch die Mega-Entwicklung wurde das Juwel\nauf seiner Brust so groß, dass es sich durch\nseine Haut schnitt und vom Körper löste."
          ultra_moon: "Mit seinem riesigen Edelstein kann es jeden\nAngriff abwehren. Dessen hohes Gewicht\nschränkt es jedoch in seiner Bewegung ein."
        es:
          ultra_sun: "Debido a la energía de la megaevolución, la gema\nde su pecho se ha agrandado y desprendido\ndesgarrándole la piel."
          ultra_moon: "Su gema, cuyo tamaño ha aumentado, le sirve de\nescudo contra algunos ataques. Sin embargo, su\npeso le estorba para moverse."
        ko:
          ultra_sun: "메가진화 에너지에 쏘인\n가슴의 보석은 팽창하여\n피부를 찢고 튀어나왔다."
          ultra_moon: "거대해진 보석으로 모든\n공격을 가드한다. 단 대단히\n무거워서 움직이는 것은 서툴다."
        zh_simp:
          ultra_sun: "胸口的宝石沐浴了\n超级进化的能量后膨胀起来，\n将皮肤撑裂，然后飞出。"
          ultra_moon: "巨大化的宝石可以防御住所有攻击。\n但是因为特别重，不擅长移动。"
        zh_trad:
          ultra_sun: "胸口的寶石在沐浴了\n超級進化的能量之後膨脹，\n撐破皮膚冒了出來。"
          ultra_moon: "巨大化的寶石能抵擋一切攻擊。\n但因為非常沉重，\n所以牠不擅長移動。"
mawile:
  species_id: 303
  names:
    jp_kana: クチート
    jp_kanji: クチート
    en: Mawile
    fr: Mysdibule
    it: Mawile
    de: Flunkifer
    es: Mawile
    ko: 입치트
    zh_simp: 大嘴娃
    zh_trad: 大嘴娃
  forms:
    mawile:
      form_id: 0
      base_stats:
        hp: 50
        attack: 85
        defense: 85
        special_attack: 55
        special_defense: 55
        speed: 50
      evs_yield:
        hp: 0
