      descriptions:
        jp_kana:
          ultra_sun: "とっても　ひとなつっこい。　なつくと\nネバネバの　ねんえきに　まみれた\nからだで　だきついてくるが　がまんだ。"
          ultra_moon: "ヌルヌルの　ひふの　したには\nぶあつい　しぼうの　そうが　あり\nてきの　こうげきを　うけながす。"
        jp_kanji:
          ultra_sun: "とっても　人懐っこい。　懐くと\nネバネバの　粘液に　まみれた\n身体で　抱きついてくるが　我慢だ。"
          ultra_moon: "ヌルヌルの　皮膚の　下には\n分厚い　脂肪の　層が　あり\n敵の　攻撃を　受け流す。"
        en:
          ultra_sun: "It’s very friendly toward people. If you grow\nclose to it, Goodra will hug you with its sticky,\nslime-covered body. Don’t get mad."
          ultra_moon: "Underneath its slimy skin is a thick layer of fat,\nand the combination of the two makes enemies’\nattacks slide right off."
        fr:
          ultra_sun: "Très câlin, ce Pokémon a tendance à se frotter\naux gens auxquels il s’attache avec son corps\nvisqueux. Dresseurs de Muplodocus, tenez bon."
          ultra_moon: "Une épaisse couche de graisse se trouve sous\nsa peau visqueuse et lui permet d’encaisser\nles attaques ennemies."
        it:
          ultra_sun: "È molto socievole e se si affeziona a qualcuno lo\nabbraccia ricoprendolo di bava appiccicosa.\nCi vuole pazienza con questo Pokémon..."
          ultra_moon: "Sotto la sua pelle viscosa c’è uno spesso strato\ndi grasso che assorbe i colpi dei nemici."
        de:
          ultra_sun: "Dieses freundliche Pokémon hat die Eigenart,\nmit seinem schleimigen, klebrigen Körper all jene\nzu umarmen, die es mag."
          ultra_moon: "Unter seiner schleimigen Haut befindet sich eine\ndicke Speckschicht, die gegnerische Angriffe\nabfängt."
        es:
          ultra_sun: "Un Pokémon muy amistoso que demuestra su\nafecto con abrazos viscosos y gelatinosos. Se\nnecesita algo de estoicismo para no apartarse."
          ultra_moon: "Debajo de su resbaladiza piel cuenta con una\nvoluminosa capa de grasa que le permite\nbloquear los ataques enemigos."
        ko:
          ultra_sun: "매우 사람을 잘 따른다. 친밀해지면\n끈적끈적한 점액투성이인\n몸으로 끌어안으려 하지만 참아야 한다."
          ultra_moon: "미끈미끈한 피부 아래에는\n두꺼운 지방층이 있어\n적의 공격을 받아넘긴다."
        zh_simp:
          ultra_sun: "和人非常亲近。变得亲密后，\n会用被黏糊糊的黏液包裹着的身体\n抱住人的身体，要忍耐哦。"
          ultra_moon: "黏糊糊的皮肤下面有很厚的脂肪层，\n可以卸掉敌人的攻击。"
        zh_trad:
          ultra_sun: "和人非常親近。變得親密後，\n會用沾滿黏糊糊黏液的身體\n抱上來，這時就只能忍耐了。"
          ultra_moon: "黏糊糊的皮膚下面\n有很厚的脂肪層，\n讓敵人的攻擊起不了作用。"
klefki:
  species_id: 707
  names:
    jp_kana: クレッフィ
    jp_kanji: クレッフィ
    en: Klefki
    fr: Trousselin
    it: Klefki
    de: Clavion
    es: Klefki
    ko: 클레피
    zh_simp: 钥圈儿
    zh_trad: 鑰圈兒
  forms:
    klefki:
      form_id: 0
      base_stats:
        hp: 57
        attack: 80
        defense: 91
        special_attack: 80
        special_defense: 87
        speed: 75
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - fairy
      egg_groups:
        - mineral
      abilities:
        - prankster
      hidden_ability: magician
      descriptions:
        jp_kana:
          ultra_sun: "なぜ　カギを　あつめるか　ふめいだが\nあげると　とても　よろこぶ。　ただし\nマスターキーじゃないと　イヤみたい。"
          ultra_moon: "むかしは　こうざんに　すんでいたが\nエサの　こうぶつが　へってきたので\nひとざとに　あらわれるようになった。"
        jp_kanji:
          ultra_sun: "なぜ　カギを　集めるか　不明だが\nあげると　とても　喜ぶ。　ただし\nマスターキーじゃないと　イヤみたい。"
          ultra_moon: "昔は　鉱山に　棲んでいたが\nエサの　鉱物が　減ってきたので\n人里に　現れるようになった。"
        en:
          ultra_sun: "Although it’s unclear why it collects keys, giving\nit a key makes Klefki very happy. However, it\napparently only likes master keys."
          ultra_moon: "Long ago it lived in mines, but once the minerals\nthat make up its diet became scarcer, Klefki\nbegan appearing in human settlements."
        fr:
          ultra_sun: "Nul ne sait pourquoi il collectionne les clés,\nmais il est aux anges dès qu’on lui en donne une.\nIl n’accepte toutefois que les passe-partout."
          ultra_moon: "Il vivait autrefois dans les mines, mais quand\nles minéraux dont il se délectait se sont faits\nplus rares, il a migré vers les villages."
        it:
          ultra_sun: "Per qualche motivo che nessuno sa, colleziona\nchiavi. È felicissimo quando gliene regalano una,\nma attenzione: accetta solo i passe-partout."
          ultra_moon: "In passato viveva nelle miniere, ma poiché i\nminerali di cui si nutre si sono fatti più rari,\nadesso è possibile incontrarlo anche nei villaggi."
        de:
          ultra_sun: "Niemand weiß, weshalb es Schlüssel sammelt,\naber schenkt man ihm einen, freut es sich sehr.\nEs akzeptiert allerdings nur Generalschlüssel."
          ultra_moon: "Früher lebte es in Minen. Da sein mineralisches\nFutter dort aber immer seltener wird, findet man\nes nun auch in Menschensiedlungen."
        es:
          ultra_sun: "Su afán por coleccionar llaves es un misterio y\nse alegra mucho si le regalan una, pero si esta\nno es una llave maestra, se le tuerce la cara."
          ultra_moon: "Hace tiempo solía vivir en minas, pero tras la\ndisminución de los minerales que le servían de\nalimento, se trasladó a poblaciones humanas."
        ko:
          ultra_sun: "왜 열쇠를 모으는지 알 수 없지만\n주면 매우 기뻐한다.\n단 마스터키만 좋아하는 것 같다."
          ultra_moon: "옛날에는 광산에 살았지만\n먹이인 광물이 줄어들어서\n사람이 사는 마을에 나타나기 시작했다."
        zh_simp:
          ultra_sun: "不知为何要收集钥匙，\n但如果给它的话，就会很高兴。\n不过好像不是万能钥匙就不喜欢。"
          ultra_moon: "过去一直住在矿山里，\n但因为作为食物的矿物不断减少，\n便开始出现在村落里。"
        zh_trad:
          ultra_sun: "雖不知牠為何要收集鑰匙，\n但如果給牠鑰匙，牠就會很開心。\n不過，牠似乎就只喜歡萬能鑰匙。"
          ultra_moon: "過去棲息在礦山裡，因為\n作為食物的礦物逐漸減少，\n於是開始出現在人類的聚落中。"
phantump:
  species_id: 708
  names:
    jp_kana: ボクレー
    jp_kanji: ボクレー
    en: Phantump
    fr: Brocélôme
    it: Phantump
    de: Paragoni
    es: Phantump
    ko: 나목령
    zh_simp: 小木灵
    zh_trad: 小木靈
  forms:
    phantump:
      form_id: 0
      base_stats:
        hp: 43
        attack: 70
        defense: 48
        special_attack: 50
        special_defense: 60
        speed: 38
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - grass
        - amorphous
      abilities:
        - natural_cure
        - frisk
      hidden_ability: harvest
      descriptions:
        jp_kana:
          ultra_sun: "こどものこえを　まね　ひとを　もりの\nおくふかくへ　まよいこませる。\nじぶんのなかまに　するつもりなのだ。"
          ultra_moon: "きりかぶに　なにかしらの　たましいが\nやどり　うまれた。　みどりの　はを\nにだしたしるは　まんびょうに　きく。"
        jp_kanji:
          ultra_sun: "子どもの声を　真似　人を　森の\n奥深くへ　迷いこませる。\n自分の仲間に　する　つもりなのだ。"
          ultra_moon: "切り株に　何かしらの　魂が\n宿り　生まれた。　緑の　葉を\n煮出した汁は　万病に　効く。"
        en:
          ultra_sun: "By imitating the voice of a child, it causes\npeople to get hopelessly lost deep in the forest.\nIt’s trying to make friends with them."
          ultra_moon: "An unknown spirit came to lodge in a tree\nstump, creating this Pokémon. A cure-all can be\nmade from an infusion of its green leaves."
        fr:
          ultra_sun: "Il imite la voix d’un enfant pour inciter les gens\nà se perdre au plus profond des bois. Il espère\nainsi se faire de nouveaux amis."
          ultra_moon: "Il est né lorsqu’une âme est venue se loger dans\nune souche. Les infusions de ses feuilles vertes\npermettent de guérir toutes les maladies."
        it:
          ultra_sun: "Imita la voce di un bambino per spingere chi\nla sente ad addentrarsi nei boschi e smarrirsi,\nsperando così di farsi nuovi amici."
          ultra_moon: "Ha preso vita quando uno spirito è entrato nel\nceppo di un albero. Dalle sue foglie verdi si\nricava un infuso che cura ogni male."
        de:
          ultra_sun: "Es imitiert die Stimme eines Kindes, um\nMenschen tief in den Wald zu locken. Es hofft,\nso neue Freunde zu machen."
          ultra_moon: "Ein Baumstumpf, den sich eine Seele als neues\nZuhause ausgesucht hat. Kocht man seine\ngrünen Blätter ab, erhält man ein Allheilmittel."
        es:
          ultra_sun: "Imita la voz de un niño con la intención de que\nalgún humano se adentre y se pierda en lo más\nprofundo del bosque y puedan hacerse amigos."
          ultra_moon: "Nació cuando un espíritu desconocido se alojó\nen el interior de un tocón. Una infusión con sus\nhojas verdes puede curar toda afección."
        ko:
          ultra_sun: "아이 목소리를 흉내 내어 사람을\n숲 깊숙이 유인해 길을 잃게 한다.\n자신의 동료로 삼을 생각이다."
          ultra_moon: "그루터기에 무언가의 영혼이\n깃들어 태어났다. 녹색 잎사귀를\n달여 낸 물은 만병에 듣는다."
        zh_simp:
          ultra_sun: "会模拟孩子的声音\n将人引入森林的深处让其迷失。\n因为打算让对方做自己的伙伴。"
          ultra_moon: "不知什么魂魄寄居在\n树桩上诞生而成。\n绿色叶子煮出来的汁包治百病。"
        zh_trad:
          ultra_sun: "會模仿孩子的聲音，\n把人引到森林深處讓人迷路。\n因為牠想讓對方當自己的夥伴。"
          ultra_moon: "某種靈魂附在樹樁上\n而誕生。綠色的葉子\n煮出來的湯汁可治百病。"
trevenant:
  species_id: 709
  names:
    jp_kana: オーロット
    jp_kanji: オーロット
    en: Trevenant
    fr: Desséliande
    it: Trevenant
    de: Trombork
    es: Trevenant
    ko: 대로트
    zh_simp: 朽木妖
    zh_trad: 朽木妖
  forms:
    trevenant:
      form_id: 0
      base_stats:
        hp: 85
        attack: 110
        defense: 76
        special_attack: 65
        special_defense: 82
        speed: 56
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - grass
        - amorphous
      abilities:
        - natural_cure
        - frisk
      hidden_ability: harvest
      descriptions:
        jp_kana:
          ultra_sun: "もりの　ばけものと　おそれられる。\nきこりたちは　オーロットが　きらう\nほのおタイプをつれ　もりに　はいる。"
          ultra_moon: "あしの　さきから　のばした　ねっこで\nちかくの　きぎを　あやつり　もりを\nあらすものを　おそう　ポケモンだ。"
        jp_kanji:
          ultra_sun: "森の　化け物と　恐れられる。\n木こりたちは　オーロットが　嫌う\nほのおタイプを連れ　森に　入る。"
          ultra_moon: "足の　先から　伸ばした　根っこで\n近くの　木々を　操り　森を\n荒らす者を　襲う　ポケモンだ。"
        en:
          ultra_sun: "It’s feared as a ghost of the forest.\nLumberjacks bring along Fire types, which\nTrevenant hates, when they enter the forest."
          ultra_moon: "This Pokémon controls trees via roots\nstretching from its feet, and it will attack\nanyone that dares to ravage the forest."
        fr:
          ultra_sun: "Les bûcherons n’entrent pas dans les bois sans\nPokémon Feu, effrayés par cette créature\nconsidérée comme un fantôme sylvestre."
          ultra_moon: "Il contrôle les arbres environnants grâce aux\nracines qui poussent au bout de ses pieds,\net attaque quiconque saccage la forêt."
        it:
          ultra_sun: "È temuto e ritenuto da tutti il mostro del bosco.\nI taglialegna si inoltrano nei boschi solo con\nPokémon di tipo Fuoco, di cui ha il terrore."
          ultra_moon: "Attacca chi vuole danneggiare i boschi\nassumendo il controllo degli alberi vicini con le\nradici che si dipartono dalla punta dei suoi piedi."
        de:
          ultra_sun: "Ein gefürchtetes Waldungeheuer. Holzfäller\nbetreten den Wald daher nur in Begleitung von\nFeuer-Pokémon, die Trombork verabscheut."
          ultra_moon: "Die Wurzeln, die aus seinen Beinen gewachsen\nsind, kontrollieren nahe gelegene Bäume. Es\ngreift alle an, die dem Wald Schaden zufügen."
        es:
          ultra_sun: "Se cree que es un demonio del bosque. Los\nleñadores solo se adentran llevando consigo\nPokémon de tipo Fuego, a los que detesta."
          ultra_moon: "Este Pokémon controla a los árboles alargando\nlas raíces que surgen de sus pies, para así\nplantar cara a quienes perjudican el bosque."
        ko:
          ultra_sun: "숲의 요괴라고 두려워했다.\n나무꾼들은 대로트가 싫어하는\n불꽃타입을 데리고 숲에 들어간다."
          ultra_moon: "발끝에서 자라난 뿌리로\n주변의 나무를 조종해서 숲을\n어지럽히는 자를 공격하는 포켓몬이다."
        zh_simp:
          ultra_sun: "人们惧怕它，认为它是森林的妖怪。\n樵夫们会带着朽木妖讨厌的\n火属性宝可梦再进入森林。"
          ultra_moon: "会用从脚尖伸出来的根须操纵\n附近的树木，袭击破坏森林者。"
        zh_trad:
          ultra_sun: "人們認為牠是可怕的森林怪物。\n樵夫們進入森林時，會帶著\n朽木妖討厭的火屬性寶可夢。"
          ultra_moon: "這種寶可夢會用腳尖延伸出的\n根鬚操縱附近的樹木，襲擊\n破壞森林環境的人或寶可夢。"
