          ultra_moon: "シッポの　さきから　でる　たいえきで\nマークを　えがく。　マークに　よっては\nマニアに　たかねで　とりひきされる。"
        jp_kanji:
          ultra_sun: "シッポの　先から　でる　体液は\nドーブルの　感情に　よって\n色合いが　変化　するのだ。"
          ultra_moon: "シッポの　先から　でる　体液で\nマークを　えがく。　マークに　よっては\nマニアに　高値で　取引される。"
        en:
          ultra_sun: "The fluid of Smeargle’s tail secretions changes\nin the intensity of its hue as the Pokémon’s\nemotions change."
          ultra_moon: "It draws symbols with the fluid that oozes from\nthe tip of its tail. Depending on the symbol,\nSmeargle fanatics will pay big money for them."
        fr:
          ultra_sun: "La teinte du liquide qui coule de sa queue varie\nen fonction de son humeur."
          ultra_moon: "Il se sert du liquide qui sort de sa queue pour\ndessiner sa marque. Ses fans s’arrachent ses\nplus beaux tracés à prix d’or."
        it:
          ultra_sun: "Dalla punta della coda secerne un fluido\ncorporeo la cui tonalità cambia in base\nalle sue emozioni."
          ultra_moon: "Traccia dei segni con il fluido prodotto dalla\npunta della coda. Gli appassionati comprano\nle sue opere a caro prezzo."
        de:
          ultra_sun: "Der Farbton der Flüssigkeit, die aus seiner\nSchweifspitze austritt, ändert sich je nach\nGefühlslage."
          ultra_moon: "Mit der Flüssigkeit, die aus seiner Schweifspitze\naustritt, hinterlässt es Markierungen. Die besten\nwerden unter Fans zu hohen Preisen gehandelt."
        es:
          ultra_sun: "La tonalidad del líquido que libera por la cola\ncambia en función de su estado anímico."
          ultra_moon: "Dibuja marcas con el líquido que secreta por la\ncola. Algunos de sus admiradores han llegado a\npagar auténticas fortunas por ellas."
        ko:
          ultra_sun: "꼬리 끝에서 나오는 체액은\n루브도의 감정에 따라\n색조가 변화한다."
          ultra_moon: "꼬리 끝에서 나오는 체액으로\n마크를 그린다. 마크에 따라서는\n마니아에게 비싼 값에 거래된다."
        zh_simp:
          ultra_sun: "从尾巴前端渗出的体液\n会随着图图犬情绪的\n变化而呈现不同的颜色。"
          ultra_moon: "会用尾巴前端渗出的体液画下标记。\n对于有些标记，爱好者会以高价买卖。"
        zh_trad:
          ultra_sun: "從尾巴尖端滲出的體液\n會隨著圖圖犬的情緒變化\n而出現不同的顏色。"
          ultra_moon: "會用尾巴前端分泌出的液體\n畫下標記。其中有些標記會\n吸引愛好者以高價買賣。"
