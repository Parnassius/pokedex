      descriptions:
        jp_kana:
          ultra_sun: "とりこんだ　みずを　あっしゅくして\nうちだす。　ぶあつい　てっぱんに\nあなを　あけるほどの　いりょくだ。"
          ultra_moon: "みぎうでの　みは　よくしまっている。\nもげた　ハサミは　しょくざい　として\nかいがいに　ゆしゅつ　される。"
        jp_kanji:
          ultra_sun: "取り込んだ　水を　圧縮して\n撃ちだす。　分厚い　鉄板に\n穴を　開けるほどの　威力だ。"
          ultra_moon: "右腕の　身は　よく締まっている。\nもげた　ハサミは　食材　として\n海外に　輸出　される。"
        en:
          ultra_sun: "It compresses the water it has sucked up and\nthen projects it with enough power to punch a\nhole right through a thick sheet of iron."
          ultra_moon: "Its right arm is packed with meat. When its\npincer falls off, it’s exported to be used as a\ncooking ingredient."
        fr:
          ultra_sun: "Il aspire de l’eau et la projette sous pression\npour attaquer. Le jet est si puissant qu’il perce\nmême d’épaisses plaques d’acier."
          ultra_moon: "La chair de sa pince droite est très ferme.\nLes pinces tombées sont vendues à l’étranger\ncomme ingrédients de cuisine."
        it:
          ultra_sun: "Assorbe acqua che comprime e rilascia in un\ngetto con una pressione tale da perforare\nanche spesse lastre d’acciaio."
          ultra_moon: "La polpa della chela destra è molto soda.\nQuelle che si staccano vengono esportate come\nprodotti alimentari."
        de:
          ultra_sun: "Es saugt Wasser auf und feuert dieses mit\nhohem Druck als Strahl ab. Dieser ist so stark,\ndass er dicke Eisenplatten durchlöchern kann."
          ultra_moon: "Das Fleisch in seiner rechten Schere ist sehr\nfest. Wenn sie abfällt, wird sie aufgesammelt\nund zum Verzehr ins Ausland exportiert."
        es:
          ultra_sun: "Comprime el agua que traga y la convierte en\nproyectiles de tal potencia que atraviesan\nincluso gruesas placas de metal."
          ultra_moon: "La pinza de su extremidad derecha es muy\nrobusta. Cuando se les caen, se recogen para\nexportarlas como ingrediente culinario."
        ko:
          ultra_sun: "빨아들인 물을 압축해 쏜다.\n두꺼운 철판에\n구멍을 뚫을 정도로 위력적이다."
          ultra_moon: "오른팔의 속살은 꽉 차 있다.\n떨어진 집게는 식재료로써\n해외에 수출된다."
        zh_simp:
          ultra_sun: "压缩吸入的水，然后射出去。\n那威力连很厚的铁板都能\n打穿一个洞。"
          ultra_moon: "右臂非常紧实饱满。\n掉落下来的钳子作为食材\n被销往海外。"
        zh_trad:
          ultra_sun: "會將吸入體內的水\n壓縮之後發射出去，威力足以\n在厚厚的鐵板上打穿一個洞。"
          ultra_moon: "右臂的肉非常緊實飽滿。\n脫落下來的鉗子會被\n當成食材外銷到海外。"
