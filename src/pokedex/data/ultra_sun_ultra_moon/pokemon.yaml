      types:
        - electric
      egg_groups:
        - human_like
      abilities:
        - motor_drive
      hidden_ability: vital_spirit
      held_items:
        rare: electirizer
      descriptions:
        jp_kana:
          ultra_sun: "でんきが　ほとばしるシッポを　にぎり\nたいでんした　こぶしを　つくると\nちからまかせに　ぶんなぐる。"
          ultra_moon: "エレキブル　１ぴきで　だいとしの\nたてもの　すべての　でんりょくを\n１ねんぶん　まかなうことが　できる。"
        jp_kanji:
          ultra_sun: "電気が　ほとばしるシッポを　握り\n帯電した　拳を　作ると\n力任せに　ぶん殴る。"
          ultra_moon: "エレキブル　１匹で　大都市の\n建物　すべての　電力を\n１年分　まかなうことが　できる。"
        en:
          ultra_sun: "It grips its tail, which spews electricity, and\nthen beats down opponents with the power of\nits electrified fist."
          ultra_moon: "A single Electivire can provide enough electricity\nfor all the buildings in a big city for a year."
        fr:
          ultra_sun: "Il tient fermement le bout de sa queue pour\ncharger son poing d’électricité, puis martèle\nses ennemis de coups dévastateurs."
          ultra_moon: "Il suffit d’un seul Élekable pour alimenter tous\nles bâtiments d’une métropole pendant un an."
        it:
          ultra_sun: "Afferra le code sature di elettricità per caricare\ni suoi pugni al massimo della potenza per poi\ncolpire il nemico."
          ultra_moon: "Un singolo Electivire è in grado di fornire\nl’elettricità necessaria agli edifici di una grande\ncittà per un anno."
        de:
          ultra_sun: "Es umfasst seine vor Elektrizität sprühenden\nSchweife, um seine Hände aufzuladen und dann\nmit aller Kraft zuzuschlagen."
          ultra_moon: "Ein einzelnes Elevoltek erzeugt genügend\nElektrizität, um eine Großstadt ein ganzes Jahr\nlang mit Strom zu versorgen."
        es:
          ultra_sun: "Agarra sus colas para electrificar los puños y\nluego soltar puñetazos devastadores."
          ultra_moon: "La electricidad que genera un solo Electivire es\nsuficiente para cubrir la demanda energética de\nlos edificios de una metrópoli durante un año."
        ko:
          ultra_sun: "전기를 내뿜는 꼬리를 잡고\n주먹에 전기를 머금으면\n있는 힘껏 때린다."
          ultra_moon: "에레키블 1마리로\n대도시 건물 전체의 전력을\n1년 동안 공급할 수 있다."
        zh_simp:
          ultra_sun: "握住冒着电火花的尾巴\n做成带电的拳头后，\n就会用尽全力猛殴。"
          ultra_moon: "只要１只电击魔兽就能\n提供一座大城市的建筑物\n１年所需的全部电力。"
        zh_trad:
          ultra_sun: "會握住帶著強烈電流的尾巴，\n形成帶電的拳頭，\n然後使盡力氣痛毆對手。"
          ultra_moon: "只要１隻電擊魔獸就能提供\n整座大都市所有建築物\n一整年所需的電力。"
magmortar:
  species_id: 467
  names:
    jp_kana: ブーバーン
    jp_kanji: ブーバーン
    en: Magmortar
    fr: Maganon
    it: Magmortar
    de: Magbrant
    es: Magmortar
    ko: 마그마번
    zh_simp: 鸭嘴炎兽
    zh_trad: 鴨嘴炎獸
  forms:
    magmortar:
      form_id: 0
      base_stats:
        hp: 75
        attack: 95
        defense: 67
        special_attack: 125
        special_defense: 95
        speed: 83
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - human_like
      abilities:
        - flame_body
      hidden_ability: vital_spirit
      held_items:
        rare: magmarizer
      descriptions:
        jp_kana:
          ultra_sun: "いまでも　きんぞくを　かこうするのに\nブーバーンの　ほのおに　たよっている\nこうじょうも　すくなくないのだ。"
          ultra_moon: "ひのたまを　うちだして　てきを\nしとめる。　まっくろコゲに　なるので\nえものを　とるときには　つかわない。"
        jp_kanji:
          ultra_sun: "今でも　金属を　加工するのに\nブーバーンの　炎に　頼っている\n工場も　少なくないのだ。"
          ultra_moon: "火の玉を　撃ちだして　敵を\n仕留める。　まっくろコゲに　なるので\n獲物を　とるときには　使わない。"
        en:
          ultra_sun: "There are still quite a few factories that rely on\nthe flames provided by Magmortar to\nprocess metals."
          ultra_moon: "Magmortar takes down its enemies by shooting\nfireballs, which burn them to a blackened crisp.\nIt avoids this method when hunting prey."
        fr:
          ultra_sun: "Il existe encore de nombreuses usines qui\nutilisent les flammes de Maganon pour faire\nfondre les métaux."
          ultra_moon: "Il peut terrasser ses ennemis d’une seule boule\nde feu. Il évite toutefois de s’en servir pour\nchasser, car sa proie finirait carbonisée."
        it:
          ultra_sun: "Ancora oggi molte fabbriche dipendono dal\nfuoco dei Magmortar nella lavorazione\ndei metalli."
          ultra_moon: "Spara palle di fuoco per abbattere i nemici, ma\nnon per catturare le prede, perché altrimenti le\ncarbonizzerebbe."
        de:
          ultra_sun: "Auch heute gibt es noch einige Fabriken,\nin denen die Flammen von Magbrant zur\nVerarbeitung von Metall verwendet werden."
          ultra_moon: "Es schießt Feuerbälle auf seine Gegner. Da alles,\nwas es damit trifft, verkohlt wird, sieht es auf\nder Jagd nach Beute von dieser Methode ab."
        es:
          ultra_sun: "En la actualidad son aún muchas las empresas\nmetalúrgicas que dependen de las llamas de\nMagmortar para trabajar el metal."
          ultra_moon: "Expulsa bolas de fuego con las que arrolla a su\nenemigo y lo deja completamente chamuscado,\nrazón por la que evita este método al cazar."
        ko:
          ultra_sun: "지금도 금속을 가공할 때\n마그마번의 불꽃에 의존하는\n공장이 적지 않다."
          ultra_moon: "불구슬을 발사해서 적을\n처리한다. 새까만 재가 되어서\n먹이를 잡는 데는 사용하지 않는다."
        zh_simp:
          ultra_sun: "至今仍依靠鸭嘴炎兽的火焰\n来加工金属的工厂也不少。"
          ultra_moon: "发射出火球，一招制敌。\n因为会把对方弄得焦黑，\n所以在捕捉猎物时不会使用。"
        zh_trad:
          ultra_sun: "至今仍有不少的工廠\n是依靠鴨嘴炎獸的火焰\n來對金屬進行加工。"
          ultra_moon: "會發射火球解決敵人。\n因為火球會把對手燒成焦炭，\n所以在捕捉獵物時不會使用。"
