      descriptions:
        jp_kana:
          ultra_sun: "こはくに　のこされた　いでんしから\nふくげんさせた。　よそういじょうに\nきょうぼうで　ぎせいしゃも　でた。"
          ultra_moon: "こだいの　おおぞらを　わがものがおで\nとびまわっていた。　じめんに　おりると\nあるくのも　おそく　よわかったらしい。"
        jp_kanji:
          ultra_sun: "琥珀に　残された　遺伝子から\n復元させた。　予想以上に\n凶暴で　犠牲者も　でた。"
          ultra_moon: "古代の　大空を　我がもの顔で\n飛びまわっていた。　地面に　降りると\n歩くのも　遅く　弱かったらしい。"
        en:
          ultra_sun: "Restored from DNA found in amber, this\nPokémon exhibited ferocity that was greater\nthan expected. Some casualties resulted."
          ultra_moon: "It flew through the open skies over the ancient\ncontinent as if they were its own. When it\ntouched ground, its walk was weak and slow."
        fr:
          ultra_sun: "Recréé à partir d’ADN contenu dans de l’ambre,\nil s’est avéré plus féroce que prévu et a causé\nla mort de plusieurs personnes."
          ultra_moon: "L’air suffisant qu’il affichait lorsqu’il volait dans\nles cieux s’effaçait vite une fois sur terre, où il\nétait faible et peinait à se mouvoir rapidement."
        it:
          ultra_sun: "Questo Pokémon è stato rigenerato a partire da\nmateriale genetico ritrovato nell’ambra. La sua\ninaspettata ferocia ha causato delle vittime."
          ultra_moon: "Nei tempi antichi dominava i cieli, ma sulla\nterraferma era debole e lento nei movimenti."
        de:
          ultra_sun: "Ein grausames Pokémon, das vielen das Leben\nschwer gemacht hat. Es wurde aus Genmaterial\nreproduziert, das in Bernstein enthalten war."
          ultra_moon: "Dieses antike Pokémon flog einst gebieterisch\ndurch die Lüfte. Auf dem Boden hingegen war\nes schwach und konnte nur langsam gehen."
        es:
          ultra_sun: "Recreado a partir de material genético extraído\ndel ámbar, es más feroz de lo que se preveía.\nQuien lo subestime lo puede pagar caro."
          ultra_moon: "Dominaba los cielos en la época prehistórica.\nEn tierra firme, sin embargo, se revela como un\nPokémon débil y de movimientos torpes."
        ko:
          ultra_sun: "호박에 남겨진 유전자로\n복원시켰다. 예상 밖으로\n흉포하여 희생자도 발생했다."
          ultra_moon: "고대의 넓은 하늘을 제집처럼\n날아다녔다. 땅에 내려오면\n걷는 것도 느리고 약했다고 한다."
        zh_simp:
          ultra_sun: "由琥珀中残留的遗传基因复原而来。\n性情比想像的还要粗暴，\n甚至还出现了牺牲者。"
          ultra_moon: "会以一副傲然的姿态翱翔在\n古代的广袤天空中。降落到地面后，\n它好像会变弱，走起路来也会变慢。"
        zh_trad:
          ultra_sun: "由琥珀中殘留的基因還原而來。\n性情比想像中更加兇暴，\n甚至還出現了犧牲者。"
          ultra_moon: "以高高在上的姿態翱翔在\n古代的天空中。一旦降落到地面\n就會變得很弱，連走路也很慢。"
    aerodactyl_mega:
      form_id: 1
      names:
        jp_kana: メガプテラ
        jp_kanji: メガプテラ
        en: Mega Aerodactyl
        fr: Méga-Ptéra
        it: MegaAerodactyl
        de: Mega-Aerodactyl
        es: Mega-Aerodactyl
        ko: 메가프테라
        zh_simp: 超级化石翼龙
        zh_trad: 超級化石翼龍
      base_stats:
        hp: 80
        attack: 135
        defense: 85
        special_attack: 70
        special_defense: 95
        speed: 150
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - rock
        - flying
      egg_groups:
        - flying
      abilities:
        - tough_claws
      descriptions:
        jp_kana:
          ultra_sun: "うごくもの　すべてに　おそいかかる。\nメガシンカが　からだに　ふたんで\nとても　いらだって　いるからだ。"
          ultra_moon: "メガシンカに　より　うしなわれていた\nいでんしが　よみがえり　ぜんしんを\nおおう　するどい　いわが　ふっかつ。"
        jp_kanji:
          ultra_sun: "動くもの　すべてに　襲いかかる。\nメガシンカが　身体に　負担で\nとても　苛立って　いるからだ。"
          ultra_moon: "メガシンカに　より　失われていた\n遺伝子が　よみがえり　全身を\n覆う　鋭い　岩が　復活。"
        en:
          ultra_sun: "It will attack anything that moves.\nMega Evolution is a burden on its body, so it’s\nincredibly irritated."
          ultra_moon: "Mega Evolution awakened some dormant genes,\nbringing back the sharp rocks that once\ncovered Aerodactyl’s entire body."
        fr:
          ultra_sun: "Il attaque tout ce qui bouge. Le stress de la\nMéga-Évolution le rend extrêmement irritable."
          ultra_moon: "La Méga-Évolution a réveillé des gènes\ninactifs et son corps s’est couvert de pierres\ntranchantes."
        it:
          ultra_sun: "Attacca qualsiasi cosa si muova. Lo stress a cui\nla megaevoluzione sottopone il suo organismo lo\nrende estremamente irritabile."
          ultra_moon: "La megaevoluzione riattiva i suoi geni latenti,\nfacendogli spuntare pietre affilate su tutto\nil corpo."
        de:
          ultra_sun: "Durch die Strapazen der Mega-Entwicklung ist\ndieses Pokémon über alle Maßen gereizt, was es\ndazu bringt, alles anzugreifen, was sich bewegt."
          ultra_moon: "Durch die Mega-Entwicklung wurden verlorene\nGene reaktiviert, die etliche spitze Steine an\nseinem ganzen Körper entstehen ließen."
        es:
          ultra_sun: "Ataca todo lo que se mueve. La megaevolución\nafecta a su cuerpo entero, lo que lo pone de\nmuy mal humor."
          ultra_moon: "La megaevolución activa un gen latente que\nhace que le crezcan afiladas rocas por todo el\ncuerpo."
        ko:
          ultra_sun: "움직이는 모든 것에 덤벼든다.\n메가진화가 신체에 부담을 주어\n신경이 날카로워졌기 때문이다."
          ultra_moon: "메가진화로 인해 잃어버렸던\n유전자가 되살아나 전신을 감싸는\n날카로운 바위가 부활했다."
        zh_simp:
          ultra_sun: "会攻击所有会动的东西。\n超级进化对身体造成了负担，\n所以会非常的暴躁不安。"
          ultra_moon: "因超级进化而失去的遗传基因重新复苏，\n覆盖全身的尖锐岩石也去而复返。"
        zh_trad:
          ultra_sun: "會攻擊所有會動的東西。\n這是因為超級進化對身體造成負擔，\n使得牠極度煩躁不安的緣故。"
          ultra_moon: "超級進化使得失去的基因\n重新復甦，覆蓋著全身的\n尖銳岩石也因此重現。"
snorlax:
  species_id: 143
  names:
    jp_kana: カビゴン
    jp_kanji: カビゴン
    en: Snorlax
    fr: Ronflex
    it: Snorlax
