      descriptions:
        jp_kana:
          ultra_sun: "あるにんむの　ために　かいはつされた\nポケモンへいき。　じっけんちゅうに\nぼうそうした　ため　とうけつされた。"
          ultra_moon: "ぼうそうの　きけんが　あるため\nせいぎょマスクに　よって　ほんとうの\nちからを　ふういん　されているのだ。"
        jp_kanji:
          ultra_sun: "ある任務の　ために　開発された\nポケモン兵器。　実験中に\n暴走した　ため　凍結された。"
          ultra_moon: "暴走の　危険が　あるため\n制御マスクに　よって　本当の\n力を　封印　されているのだ。"
        en:
          ultra_sun: "A Pokémon weapon developed for a specific\nmission, it went berserk during an experiment,\nso it was cryogenically frozen."
          ultra_moon: "There’s danger of its going on a rampage, so its\ntrue power is sealed away beneath its\ncontrol mask."
        fr:
          ultra_sun: "Développé en tant qu’arme dans un but bien\nprécis, il est devenu incontrôlable lors d’une\nexpérience et a dû être cryogénisé."
          ultra_moon: "On lui fait porter un masque qui limite\nsa puissance afin d’éviter qu’il n’en perde\nle contrôle et sème le chaos."
        it:
          ultra_sun: "È stato creato come arma per una missione\nprecisa. Fu ibernato dopo aver perso il controllo\ndurante un esperimento."
          ultra_moon: "La maschera che porta ha la funzione di\ntenere a freno la sua vera potenza e impedirgli\ndi perdere il controllo."
        de:
          ultra_sun: "Dieses für einen bestimmten Zweck als Waffe\nkreierte Pokémon geriet bei einem Experiment\naußer Kontrolle und wurde deshalb stillgelegt."
          ultra_moon: "Da die Gefahr besteht, dass es sonst alles kurz\nund klein schlägt, muss es eine Kontrollmaske\ntragen, die seine wahre Macht unterdrückt."
        es:
          ultra_sun: "Este Pokémon se creó en un laboratorio como\narma para cierto fin. Fue criogenizado tras\ndesbocarse durante un experimento."
          ultra_moon: "La máscara que lleva sirve para contener su\nverdadero poder y evitar que se descontrole."
        ko:
          ultra_sun: "특정 임무를 위해 개발된\n포켓몬 병기다. 실험 중에\n폭주해서 중단되었다."
          ultra_moon: "폭주의 위험이 있어\n제어마스크를 통해 본래의\n힘을 봉인하고 있다."
        zh_simp:
          ultra_sun: "是为了某个任务而\n被开发出来的宝可梦武器。\n因为在试验中暴走而被冻结了。"
          ultra_moon: "因为有暴走的危险，\n所以被控制面罩\n封印住了真正的力量。"
        zh_trad:
          ultra_sun: "為了某個任務而被開發出來的\n寶可夢兵器。因為在實驗中失控\n而遭到了凍結。"
          ultra_moon: "因為有失控的危險，\n所以被控制面罩\n封住了真正的力量。"
