frillish:
  species_id: 592
  names:
    jp_kana: プルリル
    jp_kanji: プルリル
    en: Frillish
    fr: Viskuse
    it: Frillish
    de: Quabbel
    es: Frillish
    ko: 탱그릴
    zh_simp: 轻飘飘
    zh_trad: 輕飄飄
  forms:
    frillish:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 50
        special_attack: 65
        special_defense: 85
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - water_absorb
        - cursed_body
      hidden_ability: damp
      descriptions:
        jp_kana:
          ultra_sun: "ベールのような　てあしを　まきつけ\nおよいでいる　えものを\nしんかいに　ひきずりこんでしまう。"
          ultra_moon: "てきを　しびれさせ　おぼれさせるため\nベールの　ような　てあしには　めには\nみえない　どくばりが　たくさん。"
        jp_kanji:
          ultra_sun: "ベールのような　手足を　巻きつけ\n泳いでいる　獲物を\n深海に　引きずりこんでしまう。"
          ultra_moon: "敵を　痺れさせ　溺れさせるため\nベールの　ような　手足には\n目には　見えない　毒針が　たくさん。"
        en:
          ultra_sun: "It wraps its veillike arms and legs around prey\nswimming by and drags them down to the\ndepths of the ocean."
          ultra_moon: "Using the invisible poison spikes on its veillike\narms and legs, it paralyzes its enemies and\ncauses them to drown."
        fr:
          ultra_sun: "Il enroule ses membres en forme de voiles\nautour de ses proies, puis les entraîne dans\nles abysses."
          ultra_moon: "Ses membres en forme de voiles sont couverts\nde dards venimeux invisibles qui lui servent\nà paralyser ses ennemis avant de les noyer."
        it:
          ultra_sun: "Con i suoi tentacoli a forma di velo avvolge\nla sua preda mentre nuota e la trascina con sé\nsul fondo del mare."
          ultra_moon: "I suoi tentacoli a forma di velo sono ricoperti\nda invisibili pungiglioni velenosi con i quali\nparalizza il nemico per poi annegarlo."
        de:
          ultra_sun: "Durch das Meer schwimmende Beute umschlingt\nes mit seinen schleierartigen Armen und zieht\nsie in die Tiefe."
          ultra_moon: "Mit bloßem Auge nicht sichtbare Giftstacheln\nbedecken seine schleierartigen Arme. Mit ihnen\nlähmt es seine Beute, bevor es sie ertränkt."
        es:
          ultra_sun: "Hace uso de sus extremidades en forma de velo\npara atrapar a su presa cuando está nadando y\narrastrarla al fondo del mar."
          ultra_moon: "Paraliza y ahoga a sus enemigos con sus\ntentáculos en forma de velo, cubiertos de\nmultitud de púas venenosas imperceptibles."
        ko:
          ultra_sun: "베일 같은 손발을 휘감아\n헤엄치는 먹이를\n심해로 끌고 간다."
          ultra_moon: "적을 마비시켜서 물에 빠뜨리기 위해\n베일 같은 손발에는 눈에\n보이지 않는 독침이 잔뜩 있다."
        zh_simp:
          ultra_sun: "会用薄纱般的手脚缠住\n正在游泳的猎物，\n将其拖入深海之中。"
          ultra_moon: "为了麻痹敌人，让其溺毙，\n薄纱般的手脚上有许多\n肉眼无法看到的毒针。"
        zh_trad:
          ultra_sun: "會用薄紗般的手腳纏住\n正在游泳的獵物，\n將對方拖進深海。"
          ultra_moon: "為了讓敵人麻痺而溺斃，\n牠那薄紗般的手腳上長著\n許多肉眼看不見的毒針。"
jellicent:
  species_id: 593
  names:
    jp_kana: ブルンゲル
    jp_kanji: ブルンゲル
    en: Jellicent
    fr: Moyade
    it: Jellicent
    de: Apoquallyp
    es: Jellicent
    ko: 탱탱겔
    zh_simp: 胖嘟嘟
    zh_trad: 胖嘟嘟
