      types:
        - steel
        - fairy
      egg_groups:
        - field
        - fairy
      abilities:
        - huge_power
      descriptions:
        jp_kana:
          ultra_sun: "ひじょうに　こうげきてきな　せいしつ。\nふたつのアゴで　えものを　はさむと\nちからまかせに　ひきちぎる。"
          ultra_moon: "２つの　アゴは　いしが　あるように\nはげしく　あばれまくっている。\nひとかみで　がんせきも　コナゴナだ。"
        jp_kanji:
          ultra_sun: "非常に　攻撃的な　性質。\n２つの　アゴで　獲物を　挟むと\n力任せに　引きちぎる。"
          ultra_moon: "２つの　アゴは　意思が　あるように\n激しく　暴れまくっている。\nひと噛みで　岩石も　コナゴナだ。"
        en:
          ultra_sun: "It has an extremely vicious disposition. It grips\nprey in its two sets of jaws and tears them\napart with raw power."
          ultra_moon: "Its two sets of jaws thrash about violently as if\nthey each had a will of their own. One gnash\nfrom them can turn a boulder to dust."
        fr:
          ultra_sun: "Ce Pokémon extrêmement agressif agrippe\nses proies avec ses deux mâchoires et les\ndéchiquette de toutes ses forces."
          ultra_moon: "Ses deux gueules bougent violemment, comme\nmues par leur propre volonté. Elles peuvent\npulvériser un rocher d’un seul claquement."
        it:
          ultra_sun: "Dando prova di un carattere estremamente\naggressivo, afferra la preda con le sue mascelle\ne con una potenza brutale la fa a pezzi."
          ultra_moon: "Le due bocche si agitano furiosamente come se\navessero volontà propria. Possono sbriciolare\nuna roccia con un solo morso."
        de:
          ultra_sun: "Ein äußerst angriffslustiges Pokémon, das seine\nBeute mit der geballten Kraft seiner beiden\nKiefer zerreißt."
          ultra_moon: "Seine Kiefer wüten so wild, dass man denken\nkönnte, sie hätten ein eigenes Bewusstsein.\nSelbst Felsgestein zermalmt es mit einem Biss."
        es:
          ultra_sun: "Tiene un carácter muy agresivo. Atrapa a sus\nvíctimas con sus dos juegos de mandíbulas y\nlas despedaza."
          ultra_moon: "Sus mandíbulas se agitan con violencia como si\ntuvieran voluntad propia. Pueden hacer pedazos\nuna roca de un solo mordisco."
        ko:
          ultra_sun: "매우 공격적인 성질을 가졌다.\n2개의 턱으로 먹이를 끼워\n전력을 다해 잡아 뜯는다."
          ultra_moon: "2개의 턱은 의지가 있는 것처럼\n격렬하게 마구 날뛴다.\n한번 물면 암석도 산산조각 난다."
        zh_simp:
          ultra_sun: "性格非常具有攻击性。\n会用２个颚夹住猎物，\n竭尽全力将对方撕碎。"
          ultra_moon: "２个颚部像是有意识一样，\n猛烈地大闹着。\n只要咬一口，连岩石都能粉碎。"
        zh_trad:
          ultra_sun: "具有強大的攻擊性。\n會用２個大顎夾住獵物，\n然後使盡力量把對手撕碎。"
          ultra_moon: "２個大顎像是有自我意識般地\n激烈大鬧著。只要咬上一口，\n就連岩石都能粉碎。"
