      names:
        jp_kana: えいえんのはな
        jp_kanji: えいえんのはな
        en: Eternal Flower
        fr: Éternelle
        it: Fiore Eterno
        de: Ewigblütler
        es: Flor Eterna
        ko: 영원의 꽃
        zh_simp: 永恒之花
        zh_trad: 永恆之花
      base_stats:
        hp: 74
        attack: 65
        defense: 67
        special_attack: 125
        special_defense: 128
        speed: 92
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          ultra_sun: "もっている　はなは　いまは　どこにも\nさいていない。　そして　おそろしい\nちからを　ひめていると　おもわれる。"
          ultra_moon: "まがまがしい　はなには　おそろしい\nエネルギーが　ひめられているが\nそれを　むじゃきに　ふりまわしている。"
        jp_kanji:
          ultra_sun: "持っている　花は　今は　どこにも\n咲いていない。　そして　恐ろしい\n力を　秘めていると　思われる。"
          ultra_moon: "禍々しい　花には　恐ろしい\nエネルギーが　秘められているが\nそれを　無邪気に　振りまわしている。"
        en:
          ultra_sun: "The flower it’s holding can no longer be found\nblooming anywhere. It’s also thought to contain\nterrifying power."
          ultra_moon: "Terrifying energy is concealed within its\nominous flower, but Floette still swings it\nabout innocently."
        fr:
          ultra_sun: "La fleur qu’il porte ne pousse plus nulle part.\nOn pense qu’elle renferme un terrible pouvoir."
          ultra_moon: "Bien que sa fleur de mauvais augure renferme\nune énergie terrible, il l’agite en l’air d’un air\ninnocent."
        it:
          ultra_sun: "Il fiore che porta con sé non sembra esistere\nin natura. Alcuni ritengono che nasconda un\npotere spaventoso."
          ultra_moon: "Brandisce candidamente il suo fiore nefasto,\nincurante del fatto che racchiuda una terribile\nenergia."
        de:
          ultra_sun: "Seine Blume blüht gegenwärtig nirgendwo sonst.\nMan munkelt, sie berge gewaltige Kräfte in sich."
          ultra_moon: "In der unheilvollen Blume, die es arglos hin und\nher schwenkt, schlummern unfassbare Kräfte."
        es:
          ultra_sun: "Hoy en día, la flor que lleva ya no se ve en la\nnaturaleza. Se cree que alberga un temible\npoder."
          ultra_moon: "Menea descuidadamente su siniestra flor sin\nreparar en el aterrador poder que esta esconde."
        ko:
          ultra_sun: "갖고 있는 꽃은 이제 어디에도\n피지 않는다. 그리고 무서운\n힘을 간직하고 있다고 추정된다."
          ultra_moon: "불길한 꽃에는 무서운\n에너지가 담겨 있지만\n이를 천진난만하게 휘두른다."
        zh_simp:
          ultra_sun: "它拿着的花，\n现在任何地方都没有在开放。\n而且被认为蕴藏着恐怖的力量。"
          ultra_moon: "那朵不祥的花里蕴藏着恐怖的能量，\n但它却天真地挥舞着那花。"
        zh_trad:
          ultra_sun: "牠手中的花如今並沒有\n開在任何地方。人們認為\n在那之中蘊藏著可怕的力量。"
          ultra_moon: "散發不祥氣氛的花裡\n蘊藏著可怕的能量，\n但牠卻天真地揮舞著那朵花。"
florges:
  species_id: 671
  names:
    jp_kana: フラージェス
    jp_kanji: フラージェス
    en: Florges
    fr: Florges
    it: Florges
    de: Florges
    es: Florges
    ko: 플라제스
    zh_simp: 花洁夫人
    zh_trad: 花潔夫人
  forms:
    florges_red_flower:
      form_id: 0
      names:
        jp_kana: あかいはな
        jp_kanji: あかいはな
        en: Red Flower
        fr: Fleur Rouge
        it: Fiore Rosso
        de: Rotblütler
        es: Flor Roja
        ko: 빨간 꽃
        zh_simp: 红花
        zh_trad: 紅花
      base_stats:
        hp: 78
        attack: 65
        defense: 68
        special_attack: 112
        special_defense: 154
        speed: 75
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          ultra_sun: "そだてた　はなばなを　あやつる。\nフラージェスの　はなつ　はなふぶきは\nうつくしさも　パワーも　あっとうてき。"
          ultra_moon: "すうひゃくねんの　じゅみょうをもつ。\nていえんを　まもりつづけることに\nその　いっしょうを　ささげるという。"
        jp_kanji:
          ultra_sun: "育てた　花々を　操る。\nフラージェスの　放つ　花吹雪は\n美しさも　パワーも　圧倒的。"
          ultra_moon: "数百年の　寿命を持つ。\n庭園を　守り続けることに\nその　一生を　ささげるという。"
        en:
          ultra_sun: "It controls the flowers it grows. The petal\nblizzards that Florges triggers are overwhelming\nin their beauty and power."
          ultra_moon: "Its life can span several hundred years. It’s said\nto devote its entire life to protecting gardens."
        fr:
          ultra_sun: "Il contrôle les fleurs qu’il cultive. Les tempêtes\nde pétales qu’il déchaîne sont aussi belles que\nredoutables."
          ultra_moon: "Il peut vivre des centaines d’années, et\nconsacre sa longue existence à l’entretien\ndes jardins."
        it:
          ultra_sun: "Ha il potere di controllare i fiori che coltiva.\nÈ in grado di creare tempeste di fiori tanto\nmeravigliose quanto devastanti."
          ultra_moon: "Può vivere per centinaia di anni e dedica la sua\nintera esistenza alla cura dei giardini fioriti."
        de:
          ultra_sun: "Es kontrolliert selbst gezüchtete Blumen. Die\nBlütenwirbel, die es erzeugt, sind überwältigend\nschön und stark."
          ultra_moon: "Es hat eine Lebenserwartung von mehreren\nHundert Jahren. Man sagt, es widme sein ganzes\nDasein beharrlich der Pflege von Blumengärten."
        es:
          ultra_sun: "Es capaz de controlar las flores que cultiva. La\nráfaga de pétalos que emplea es hermosa a la\nvez que devastadora."
          ultra_moon: "Su esperanza de vida asciende a varios siglos y\ndedica toda su dilatada existencia al cuidado\nde los jardines."
        ko:
          ultra_sun: "기른 꽃들을 조종한다.\n플라제스가 발산하는 꽃보라는\n아름다움도 파워도 압도적이다."
          ultra_moon: "수백 년의 수명을 가졌다.\n정원을 지키는 일에\n일생을 바친다고 한다."
        zh_simp:
          ultra_sun: "会操纵自己培育的花。\n花洁夫人释放的落英缤纷，\n其美貌和力量都是压倒性的。"
          ultra_moon: "拥有几百年的寿命。\n据说会终其一生不断地守护着庭园。"
        zh_trad:
          ultra_sun: "會操縱自己培育的花朵。\n花潔夫人使出的落英繽紛\n有著壓倒性的力與美。"
          ultra_moon: "擁有數百年的壽命。\n據說牠終其一生都會\n不斷守護著庭園。"
