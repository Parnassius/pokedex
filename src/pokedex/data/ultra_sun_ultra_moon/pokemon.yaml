        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
        - snow_cloak
      hidden_ability: weak_armor
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          ultra_sun: "マイナス　５０どの　れいきを　はく。\nあたたかい　ばしょに　いると\nちょっとずつ　ちいさくなって　いく。"
          ultra_moon: "あさひを　あびる　つららが　まだ\nとけたくないと　ねがい　うまれた。\nよるは　ゆきに　もぐって　ねむる。"
        jp_kanji:
          ultra_sun: "マイナス　５０度の　冷気を　吐く。\n暖かい　場所に　いると\nちょっとずつ　小さくなって　いく。"
          ultra_moon: "朝日を　浴びる　つららが　まだ\n溶けたくないと　願い　生まれた。\n夜は　雪に　潜って　眠る。"
        en:
          ultra_sun: "It exhales cold air that is at –58 degrees\nFahrenheit. When it’s in a warm place, it shrinks\nlittle by little."
          ultra_moon: "When the morning sun hit an icicle, it wished not\nto melt, and thus Vanillite was born. At night, it\nburies itself in snow to sleep."
        fr:
          ultra_sun: "Son souffle glacé descend jusqu’à -50 °C.\nIl fond peu à peu quand il se retrouve dans\nun endroit chaud."
          ultra_moon: "Il est né d’une stalactite de glace qui, face au\nsoleil du matin, a fait le vœu de ne pas fondre.\nIl se terre dans la neige pour dormir la nuit."
        it:
          ultra_sun: "Il suo fiato ha una temperatura di -50 °C.\nQuando si trova in un luogo caldo, il volume\ndel suo corpo si riduce a poco a poco."
          ultra_moon: "È nato dal desiderio di una stalattite che non\nvoleva sciogliersi ai raggi del sole mattutino.\nLa notte dorme immerso nella neve."
        de:
          ultra_sun: "Die Temperatur seines Atems liegt bei -50 °C.\nWenn es sich an warmen Orten aufhält, wird es\nnach und nach kleiner."
          ultra_moon: "Es entstand aus dem Wunsch eines Eiszapfens,\nder in der Morgensonne nicht schmelzen wollte.\nNachts schläft es tief vergraben im Schnee."
        es:
          ultra_sun: "Exhala vaho a una temperatura de -50 ºC. Su\ntamaño corporal se reduce poco a poco cuando\nse encuentra en un lugar cálido."
          ultra_moon: "Nació a partir del deseo de una estalactita de\nno derretirse con los rayos del albor. Por la\nnoche se arropa bajo la nieve para dormir."
        ko:
          ultra_sun: "마이너스 50도 냉기를 내뱉는다.\n따듯한 장소에 있으면\n조금씩 작아진다."
          ultra_moon: "아침 햇살을 받은 고드름이 아직\n녹고 싶지 않다고 소원하여 태어났다.\n밤에는 눈 속에 들어가 잠든다."
        zh_simp:
          ultra_sun: "会吐出零下５０度的冷气。\n如果呆在温暖的场所，\n就会一点点地变小。"
          ultra_moon: "是由沐浴在朝阳下但仍不愿\n融化的冰柱诞生而成。\n晚上会潜入雪中睡觉。"
        zh_trad:
          ultra_sun: "會吐出零下５０度的寒氣。\n如果待在溫暖的地方，\n身體就會漸漸地變小。"
          ultra_moon: "誕生自沐浴在朝陽下的\n冰柱還不願融化的心意。\n夜裡會潛進雪中睡覺。"
vanillish:
  species_id: 583
  names:
    jp_kana: バニリッチ
    jp_kanji: バニリッチ
    en: Vanillish
    fr: Sorboul
    it: Vanillish
    de: Gelatroppo
    es: Vanillish
    ko: 바닐리치
    zh_simp: 多多冰
    zh_trad: 多多冰
  forms:
    vanillish:
      form_id: 0
      base_stats:
        hp: 51
        attack: 65
        defense: 65
        special_attack: 80
        special_defense: 75
        speed: 59
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
        - snow_cloak
      hidden_ability: weak_armor
      held_items:
        rare: never_melt_ice
      descriptions:
        jp_kana:
          ultra_sun: "こおりの　つぶを　ふきかけて　てきの\nからだを　こおらせる。　アローラの\nバニリッチは　ぜんたいてきに　こがら。"
          ultra_moon: "ひょうがきを　いきぬいた　とても\nたくましい　ポケモン。　こと　あつい\nちほうでは　ばつぐんの　にんき。"
        jp_kanji:
          ultra_sun: "氷の粒を　吹きかけて　敵の\n身体を　凍らせる。　アローラの\nバニリッチは　全体的に　小柄。"
          ultra_moon: "氷河期を　生き抜いた　とても\nたくましい　ポケモン。　こと　暑い\n地方では　抜群の　人気。"
        en:
          ultra_sun: "It sprays its enemies with grains of ice to freeze\nthem. Most Vanillish in Alola are smaller\nthan average."
          ultra_moon: "This hearty Pokémon survived the Ice Age.\nIt’s incredibly popular in very hot regions."
        fr:
          ultra_sun: "Il souffle des particules de glace pour geler\nses ennemis. Les Sorboul d’Alola sont plus\npetits que la moyenne."
          ultra_moon: "Ce robuste Pokémon a survécu à l’ère glaciaire.\nIl est extrêmement populaire dans les régions\nchaudes."
        it:
          ultra_sun: "Congela i nemici cospargendoli di granelli di\nghiaccio. I Vanillish che vivono ad Alola sono\npiù piccoli della media."
          ultra_moon: "Un Pokémon incredibilmente robusto, rimasto\ninalterato fin dall’era glaciale. È popolarissimo\ntra gli abitanti delle regioni più calde."
        de:
          ultra_sun: "Es friert seine Gegner ein, indem es ihre Körper\nmit einem Atem aus Eiskörnern bedeckt. In Alola\nfindet man vergleichsweise kleine Exemplare."
          ultra_moon: "Gelatroppo sind so widerstandsfähig, dass sie\nsogar eine Eiszeit überdauerten. In warmen\nRegionen erfreuen sie sich großer Beliebtheit."
        es:
          ultra_sun: "Exhala partículas de hielo para congelar a sus\nrivales. Los Vanillish de la región de Alola son\nmás pequeños que el resto."
          ultra_moon: "Un Pokémon muy resistente que logró sobrevivir\na la glaciación. En las regiones cálidas goza de\ngran popularidad."
        ko:
          ultra_sun: "얼음 입자를 세게 내뿜어\n적의 몸을 얼린다. 알로라의\n바닐리치는 전체적으로 몸집이 작다."
          ultra_moon: "빙하기에 꿋꿋하게 살아남은\n매우 강인한 포켓몬. 특히 더운\n지방에서는 뛰어난 인기를 자랑한다."
        zh_simp:
          ultra_sun: "喷出冰粒，冻住敌人的身体。\n阿罗拉的多多冰整体都是小型的。"
          ultra_moon: "从冰河时期生存下来，\n非常魁梧的宝可梦。\n特别是在炎热的地方，极受欢迎。"
        zh_trad:
          ultra_sun: "會噴出冰粒凍住敵人的身體。\n棲息在阿羅拉的多多冰\n整體來說體型比較小。"
          ultra_moon: "從冰河期生存下來，\n是非常強壯的寶可夢。\n在天氣炎熱的地方極受歡迎。"
vanilluxe:
  species_id: 584
  names:
    jp_kana: バイバニラ
    jp_kanji: バイバニラ
    en: Vanilluxe
    fr: Sorbouboul
    it: Vanilluxe
    de: Gelatwino
    es: Vanilluxe
    ko: 배바닐라
    zh_simp: 双倍多多冰
    zh_trad: 雙倍多多冰
  forms:
    vanilluxe:
      form_id: 0
      base_stats:
        hp: 71
        attack: 95
        defense: 85
        special_attack: 110
        special_defense: 95
        speed: 79
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - mineral
      abilities:
        - ice_body
        - snow_warning
      hidden_ability: weak_armor
      held_items:
        common: never_melt_ice
      descriptions:
        jp_kana:
          ultra_sun: "２つの　くちから　ふぶきを　はく。\nどこでも　ゆきを　つくりだせるので\nスキーヤーや　ボーダーに　にんき。"
          ultra_moon: "あさひで　とけかけた　２ひきの\nバニリッチが　くっつき　さむいばんに\nふたたび　こおったとき　うまれる。"
        jp_kanji:
          ultra_sun: "２つの　口から　吹雪を　吐く。\nどこでも　雪を　作りだせるので\nスキーヤーや　ボーダーに　人気。"
          ultra_moon: "朝日で　溶けかけた　２匹の\nバニリッチが　くっつき　寒い晩に\n再び　凍ったとき　生まれる。"
        en:
          ultra_sun: "It blasts blizzards from its two mouths. It can\ncreate snow anywhere, so it gets a lot of love\nfrom skiers and snowboarders."
          ultra_moon: "Vanilluxe is born when two Vanillish, half-melted\nby the day’s light, stick to each other and\nfreeze together in the cold return of night."
        fr:
          ultra_sun: "Ses deux bouches peuvent souffler du blizzard.\nSa capacité à créer de la neige à volonté le rend\npopulaire auprès des skieurs et snowboarders."
          ultra_moon: "Sorbouboul est né lorsque deux Sorboul, à moitié\nfondus par le soleil, se sont collés l’un à l’autre\net ont été soudés par la gelée nocturne."
        it:
          ultra_sun: "Produce tempeste di neve dalle due bocche.\nÈ amato da Sciatori e Snowboarder perché\npuò creare la neve ovunque."
          ultra_moon: "È nato da due Vanillish parzialmente squagliatisi\nal sole, che in una fredda notte si sono uniti\ne ricongelati."
        de:
          ultra_sun: "Aus seinen zwei Mündern stößt es Eisböen aus.\nDa es praktisch überall Schnee erzeugen kann,\nist es bei Snowboardern und Skifahrern beliebt."
          ultra_moon: "Es entsteht, wenn zwei Gelatroppo im Licht\nder Morgensonne miteinander verschmelzen\nund dann in einer kalten Nacht wieder gefrieren."
        es:
          ultra_sun: "Expulsa ventiscas por ambas bocas y, como\npuede crear nieve en cualquier lugar, es famoso\nentre quienes practican esquí o snowboard."
          ultra_moon: "Su nacimiento se produce cuando dos Vanillish\nse derriten por la mañana, se mezclan y, durante\nla gélida noche, se congelan juntos."
        ko:
          ultra_sun: "2개의 입에서 눈보라를 뿜어낸다.\n어디에서든 눈을 만들어 내기 때문에\n스키어나 스노보더에게 인기다."
          ultra_moon: "아침 해에 녹아내리던 2마리의\n바닐리치가 붙어서 추운 밤에\n다시 얼어붙으면 태어난다."
        zh_simp:
          ultra_sun: "从２张嘴里喷出暴风雪。\n无论在哪里都能制作出雪来，\n所以很受滑雪和滑雪板爱好者欢迎。"
          ultra_moon: "因朝阳而开始融化的\n２只多多冰贴在一起，\n在寒冷的夜里再次冻结时诞生而成。"
        zh_trad:
          ultra_sun: "會從２張嘴裡噴出暴風雪。\n由於不管在哪裡都能造雪，\n所以很受雪上運動家的歡迎。"
          ultra_moon: "因朝陽而開始融化的２隻\n多多冰貼在一起，在寒冷的夜裡\n再次凍結後，成為雙倍多多冰。"
