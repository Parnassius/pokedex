      descriptions:
        jp_kana:
          ultra_sun: "そぼうだが　じぶんの　かぞくや\nむれのなかまや　なわばりを　とっても\nたいせつにしている　ポケモンなのだ。"
          ultra_moon: "つばを　はいて　あいてを　ちょうはつ。\nきまった　なわばりを　もっており\nいっしょう　そこを　はなれず　すごす。"
        jp_kanji:
          ultra_sun: "粗暴だが　自分の　家族や\n群れの仲間や　縄張りを　とっても\n大切にしている　ポケモンなのだ。"
          ultra_moon: "唾を　吐いて　相手を　挑発。\n決まった　縄張りを　もっており\n一生　そこを　離れず　過ごす。"
        en:
          ultra_sun: "This Pokémon may be rude, but it takes very\ngood care of its family, its friends, and its turf."
          ultra_moon: "It taunts its opponents by spitting. It has a\ncertain territory that it never leaves its whole\nlife long."
        fr:
          ultra_sun: "Ses airs de gros dur cachent en fait un grand\ncœur dévoué à sa famille, sa bande et\nson territoire."
          ultra_moon: "Il provoque ses ennemis en crachant.\nIl passe toute sa vie sans s’aventurer hors\ndes frontières bien définies de son territoire."
        it:
          ultra_sun: "È un Pokémon violento, ma al tempo stesso\nmolto dedito alla famiglia, ai membri del proprio\ngruppo e al suo territorio."
          ultra_moon: "Provoca il nemico sputandogli addosso.\nQuando conquista un territorio, non lo\nabbandona più per tutta la vita."
        de:
          ultra_sun: "Diesem ungestümen Pokémon liegen Freunde,\nFamilie und Revier sehr am Herzen."
          ultra_moon: "Es provoziert Gegner, indem es sie anspuckt.\nJedes Exemplar besitzt sein eigenes Revier,\ndas es niemals verlässt."
        es:
          ultra_sun: "A pesar de su apariencia chulesca, se preocupa\nmucho por los miembros de su familia, el resto\ndel grupo y su territorio."
          ultra_moon: "Provoca a su rival escupiéndole. No se aventura\nfuera de su propio territorio, donde pasa toda la\nvida."
        ko:
          ultra_sun: "거칠고 난폭하지만, 자신의 가족과\n무리 동료의 영역을 매우\n소중히 여기는 포켓몬이다."
          ultra_moon: "침을 뱉어서 상대를 도발한다.\n정해진 영역을 가지고 있으며\n평생 그곳을 벗어나지 않고 산다."
        zh_simp:
          ultra_sun: "性格粗鲁，但是对于自己的家族、\n群体的伙伴和领地，非常重视。"
          ultra_moon: "吐出唾沫挑衅对手。\n有着固定的领地，\n会在那儿度过一生，永不离开。"
        zh_trad:
          ultra_sun: "性情很粗暴，但牠是一種\n對自己的家族、群體的夥伴\n以及地盤十分重視的寶可夢。"
          ultra_moon: "會吐口水來挑釁對手。\n有著固定的地盤，會待在\n裡頭度過一生，永不離開。"
