      descriptions:
        jp_kana:
          ultra_sun: "かたいクチバシで　じゅもくを　つつく。\nつつくリズムで　そのときの　きげんや\nたいちょうも　なんとなく　わかる。"
          ultra_moon: "ほそく　みえるが　きょうじんな\nくびの　きんにくをもつ。　びょうかん\n１６れんだで　きを　つつきまくるぞ。"
        jp_kanji:
          ultra_sun: "硬いクチバシで　樹木を　つつく。\nつつくリズムで　そのときの　機嫌や\n体調も　なんとなく　わかる。"
          ultra_moon: "細く　見えるが　強靭な\n首の　筋肉を持つ。　秒間\n１６連打で　木を　突きまくるぞ。"
        en:
          ultra_sun: "It pecks at trees with its hard beak. You can\nget some idea of its mood or condition from the\nrhythm of its pecking."
          ultra_moon: "It may look spindly, but its neck muscles are\nheavy-duty. It can peck at a tree 16 times\nper second!"
        fr:
          ultra_sun: "On peut deviner son état d’esprit et de santé\nen étudiant le rythme auquel il tape contre\nles arbres avec son bec dur."
          ultra_moon: "Son cou fin renferme des muscles étonnamment\npuissants. Il tape contre les arbres à raison\nde seize coups de bec par seconde."
        it:
          ultra_sun: "Picchia sul legno con il suo duro becco.\nDal ritmo dei suoi colpi è possibile capire\nil suo umore e il suo stato di salute."
          ultra_moon: "Sembra esile ma nel collo ha muscoli d’acciaio.\nRiesce a beccare i tronchi degli alberi al ritmo\ndi 16 colpi al secondo."
        de:
          ultra_sun: "Es pickt mit seinem robusten Schnabel auf\nBäume ein. An seinem Pickrhythmus lassen sich\nseine Laune und sein Befinden ablesen."
          ultra_moon: "Es sieht schmächtig und schwach aus, doch es\nhat sehr kräftige Halsmuskeln. Dadurch kann es\n16-mal pro Sekunde auf Bäume einpicken."
        es:
          ultra_sun: "Agujerea los árboles con su robusto pico.\nAl oír su picoteo, uno puede deducir más o\nmenos su humor o su estado de forma."
          ultra_moon: "Pese a su fino aspecto, tiene la musculatura del\ncuello muy desarrollada: agujerea los árboles a\nuna velocidad de 16 picotazos por segundo."
        ko:
          ultra_sun: "딱딱한 부리로 나무를 쫀다.\n쪼는 리듬으로 그때의 기분이나\n상태를 대강 알 수 있다."
          ultra_moon: "가늘어 보이지만 강인한\n목 근육을 가졌다. 초당\n16연타로 나무를 마구 쪼아 댄다."
        zh_simp:
          ultra_sun: "会用坚硬的鸟嘴啄树木。\n通过啄击的节奏，大致就能知道\n它当时的心情和身体状况。"
          ultra_moon: "拥有看着很细，\n却很强韧的颈部肌肉。\n能以每秒１６连击的速度猛啄树木。"
        zh_trad:
          ultra_sun: "會用堅硬的鳥嘴啄樹木。\n從牠啄擊的節奏可以大致看出\n牠當時的心情和身體狀況。"
          ultra_moon: "看起來很細的脖子其實\n有著強韌的肌肉，能以\n每秒１６連擊的速度猛啄樹木。"
trumbeak:
