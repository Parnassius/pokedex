hoothoot:
  species_id: 163
  names:
    jp_kana: ホーホー
    jp_kanji: ホーホー
    en: Hoothoot
    fr: Hoothoot
    it: Hoothoot
    de: Hoothoot
    es: Hoothoot
    ko: 부우부
    zh_simp: 咕咕
    zh_trad: 咕咕
