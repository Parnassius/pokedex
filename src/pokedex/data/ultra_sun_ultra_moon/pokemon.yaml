          ultra_sun: "Zygarde assume questa forma quando viene\naggregato il 10% delle sue cellule. Si lancia sul\nnemico e lo morde al petto con le zanne affilate."
          ultra_moon: "Forma di Zygarde derivante dall’aggregazione\ndel 10% delle sue cellule sparse nel mondo.\nEccelle nelle lotte corpo a corpo."
        de:
          ultra_sun: "In dieser Form vereint Zygarde 10 % seiner\nZellen in sich. Mit seinen spitzen Fangzähnen\nstürzt es sich auf den Körper des Gegners."
          ultra_moon: "Diese Form nimmt es an, wenn 10 % seiner\nZellen gesammelt wurden. Das Spezialgebiet\nvon diesem Pokémon ist der Nahkampf."
        es:
          ultra_sun: "Zygarde asume esta forma al reunir el 10% de\nsus células. Se abalanza sobre su oponente\ny lo hace trizas con sus afilados colmillos."
          ultra_moon: "Zygarde adopta esta forma al reunir el 10%\nde sus células. Destaca en el combate a corta\ndistancia."
        ko:
          ultra_sun: "지가르데의 일부가 1할 정도\n모였다. 상대의 품으로 뛰어들어\n날카로운 이빨로 물어 버린다."
          ultra_moon: "각지의 지가르데 셀이\n10% 모였을 때 태어난다.\n접근전이 특기다."
        zh_simp:
          ultra_sun: "基格尔德的一部分\n聚集了十分之一左右。\n会扑到对手的怀里用锐利的牙齿咬住。"
          ultra_moon: "在各地的基格尔德・细胞\n聚集到１０％时诞生。\n擅长近战。"
        zh_trad:
          ultra_sun: "構成基格爾德的單位聚集了\n十分之一左右。牠會撲到\n對手懷裡，用銳利的牙齒啃咬。"
          ultra_moon: "各地的基格爾德・細胞\n聚集了１０％之後所誕生。\n擅長近距離戰鬥。"
    zygarde_50_forme_power_construct:
      form_id: 3
      names:
        jp_kana: ５０％フォルム
        jp_kanji: ５０％フォルム
        en: 50% Forme
        fr: Forme 50 %
        it: Forma 50%
        de: 50%-Form
        es: Forma 50%
        ko: 50%폼
        zh_simp: ５０％形态
        zh_trad: ５０％形態
      base_stats:
        hp: 108
        attack: 100
        defense: 121
        special_attack: 81
        special_defense: 95
        speed: 95
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - undiscovered
      abilities:
        - power_construct
      descriptions:
        jp_kana:
          ultra_sun: "ジガルデの　いちぶが　はんぶんほど\nあつまった　すがた。　せいたいけいを\nかんしする　やくめを　もっている。"
          ultra_moon: "せいたいけいを　おびやかす　ものと\nたたかうとき　さらに　きょうりょくな\nすがたに　へんかすると　いわれる。"
        jp_kanji:
          ultra_sun: "ジガルデの　一部が　半分ほど\n集まった　姿。　生態系を\n監視する　役目を　持っている。"
          ultra_moon: "生態系を　脅かす　ものと\n戦うとき　更に　強力な\n姿に　変化すると　いわれる。"
        en:
          ultra_sun: "This is Zygarde’s form when about half of its\npieces have been assembled. It plays the role of\nmonitoring the ecosystem."
          ultra_moon: "Some say it can change to an even more\npowerful form when battling those who\nthreaten the ecosystem."
        fr:
          ultra_sun: "La forme que Zygarde prend lorsqu’il rassemble\n50 % de ses Cellules. Sa mission est de\nsurveiller l’écosystème."
          ultra_moon: "Ce Pokémon serait capable de prendre\nune forme encore plus puissante quand il se bat\ncontre un ennemi qui menace l’écosystème."
        it:
          ultra_sun: "Zygarde assume questa forma quando vengono\naggregate metà delle sue cellule. Questo\nPokémon presiede all’equilibrio dell’ecosistema."
          ultra_moon: "Si dice che possa assumere una forma ancora\npiù potente quando si trova di fronte un nemico\nche rappresenta una minaccia per l’ecosistema."
        de:
          ultra_sun: "In dieser Form vereint Zygarde 50 % seiner\nZellen in sich. Seine Aufgabe besteht darin,\ndas Ökosystem zu überwachen."
          ultra_moon: "Im Kampf gegen all jene, die das Ökosystem in\nGefahr bringen, nimmt es angeblich eine noch\nmächtigere Form an."
        es:
          ultra_sun: "Esta es la forma que adopta Zygarde al reunir el\n50% de sus células. Su cometido consiste en\nvigilar el ecosistema."
          ultra_moon: "Según los rumores, puede adoptar una forma\naún más poderosa cuando se enfrenta a\nquienquiera que amenace el ecosistema."
        ko:
          ultra_sun: "지가르데의 일부가 반 정도\n모인 모습이다. 생태계를\n감시하는 역할을 맡고 있다."
          ultra_moon: "생태계를 위협하는 자와\n싸울 때 더욱 강력한 모습으로\n변화한다고 전해진다."
        zh_simp:
          ultra_sun: "基格尔德的一部分\n大约聚集了一半的样子。\n有着监视生态系统的职责。"
          ultra_moon: "据说，在与威胁到生态系统者战斗时，\n它会变化为更强大的样子。"
        zh_trad:
          ultra_sun: "構成基格爾德的單位\n聚集了大約一半的樣子。\n有著監視生態系統的使命。"
          ultra_moon: "據說在與威脅到生態系統的\n對手戰鬥時，牠會變化成\n更加強大的姿態。"
    zygarde_complete_forme:
      form_id: 4
      names:
        jp_kana: パーフェクトフォルム
        jp_kanji: パーフェクトフォルム
        en: Complete Forme
        fr: Forme Parfaite
        it: Forma Perfetta
        de: Optimumform
        es: Forma Completa
        ko: 퍼펙트폼
        zh_simp: 完全体形态
        zh_trad: 完全體形態
      base_stats:
        hp: 216
        attack: 100
        defense: 121
        special_attack: 91
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - undiscovered
      abilities:
        - power_construct
      descriptions:
        jp_kana:
          ultra_sun: "かんぺきなる　ジガルデの　すがた。\nむねの　くちから　すべてを　けしさる\nこうエネルギーを　ほうしゃする。"
          ultra_moon: "すべての　ジガルデ・セルが　あつまり\nたんじょうする。　せいたいけいを\nみだすものを　ぶりょくで　しずめる。"
        jp_kanji:
          ultra_sun: "完璧なる　ジガルデの　姿。\n胸の　口から　すべてを　消し去る\n高エネルギーを　放射する。"
          ultra_moon: "すべての　ジガルデ・セルが　集まり\n誕生する。　生態系を\n乱すものを　武力で　鎮める。"
        en:
          ultra_sun: "This is Zygarde’s perfected form. From the\norifice on its chest, it radiates high-powered\nenergy that eliminates everything."
          ultra_moon: "Born when all of Zygarde’s cells have been\ngathered together, it uses force to neutralize\nthose who harm the ecosystem."
        fr:
          ultra_sun: "La forme parfaite de Zygarde. L’orifice sur\nsa poitrine peut déchaîner une puissante\nénergie capable de tout anéantir."
          ultra_moon: "La forme que Zygarde prend lorsqu’il rassemble\n100 % de ses Cellules. Il utilise sa force pour\narrêter ceux qui menacent l’écosystème."
        it:
          ultra_sun: "La forma perfetta di Zygarde. Dalla bocca che\nha sul petto può sprigionare un’energia talmente\npotente da annientare qualsiasi cosa."
          ultra_moon: "Zygarde assume questa forma quando vengono\naggregate tutte le sue cellule. Sprigiona la sua\npotenza contro chiunque minacci l’ecosistema."
        de:
          ultra_sun: "In seiner Optimumform stößt Zygarde über die\nÖffnung in seiner Brust eine extrem starke\nEnergie aus, die alles auslöschen kann."
          ultra_moon: "Diese Form nimmt es an, wenn 100 % seiner\nZellen versammelt sind. Jegliche Schädigung\ndes Ökosystems unterbindet es gewaltsam."
        es:
          ultra_sun: "Esta es la forma definitiva de Zygarde. Por la\nboca de su pecho emite una potente energía\nque arrasa con todo."
          ultra_moon: "Zygarde adopta esta forma al reunir el 100% de\nsus células. Con su fuerza, abate a quienquiera\nque amenace el ecosistema."
        ko:
          ultra_sun: "완벽한 지가르데의 모습이다.\n가슴의 입으로 모든 것을 지워 없애는\n높은 에너지를 방사한다."
          ultra_moon: "모든 지가르데 셀이 모여서\n탄생한다. 생태계를 어지럽히는 자를\n무력으로 진압한다."
        zh_simp:
          ultra_sun: "完整的基格尔德的样子。\n从胸部的嘴里放射出\n能摧毁一切的高能量。"
          ultra_moon: "所有基格尔德・细胞聚集后诞生而成。\n会用武力镇压破坏生态系统者。"
        zh_trad:
          ultra_sun: "基格爾德最完美的樣子。\n會從胸前的口中發射出\n能摧毀一切的強大能量。"
          ultra_moon: "所有的基格爾德・細胞\n聚集起來所誕生。會用武力\n鎮壓破壞生態系統的對手。"
