      descriptions:
        jp_kana:
          ultra_sun: "こだいの　あたたかい　うみに　いた。\nかいそうに　ばけ　えものを　まちぶせ\nちかよったところを　まるのみにする。"
          ultra_moon: "きょうりょくな　きゅうばんで　いわに\nはりついているので　どんな\nあらなみでも　ながされないのだ。"
        jp_kanji:
          ultra_sun: "古代の　暖かい　海に　いた。\n海草に　化け　獲物を　待ち伏せ\n近寄ったところを　丸呑みにする。"
          ultra_moon: "強力な　吸盤で　岩に\n張り付いているので　どんな\n荒波でも　流されないのだ。"
        en:
          ultra_sun: "In ancient times, it lived in warm seas. It\ndisguised itself as seaweed to ambush its prey\nand devoured them whole when they got close."
          ultra_moon: "It sticks to rocks with its powerful suckers and\ncan’t be washed away no matter how rough the\nsurf gets."
        fr:
          ultra_sun: "Il vivait déjà dans les mers chaudes il y a fort\nlongtemps. Il imite les algues pour masquer sa\nprésence et gobe toute proie qui l’approche."
          ultra_moon: "Il s’accroche aux rochers grâce à ses ventouses\npuissantes. Une fois fixé, aucun courant marin,\naussi violent soit-il, ne peut l’en déloger."
        it:
          ultra_sun: "Anticamente viveva nei mari caldi. Si finge alga\nmarina per tendere un agguato alla preda e\nquando si avvicina la inghiotte in un sol boccone."
          ultra_moon: "Si attacca alle rocce con ventose potentissime,\nresistendo anche alle mareggiate più violente."
        de:
          ultra_sun: "In der Vorzeit lebte es im warmen Meer. Es\ntarnte sich als Seegras, um Beute aufzulauern\nund sie dann zu verschlingen."
          ultra_moon: "Da es sich mit seinen starken Saugnäpfen an\nFelsen heftete, konnte es selbst von den\nstärksten Wellen nicht mitgerissen werden."
        es:
          ultra_sun: "Habitaba en los cálidos mares de antaño. Se\nhace pasar por alga marina, espera al acecho de\nsu presa y la engulle cuando esta se acerca."
          ultra_moon: "Sus potentes ventosas le permiten aferrarse\nfirmemente a las rocas, de tal manera que ni\nuna violenta marejada consigue arrastrarlo."
        ko:
          ultra_sun: "고대의 따듯한 바다에 살았다.\n해초로 둔갑해 먹이를 기다리다가\n다가오면 통째로 삼킨다."
          ultra_moon: "강력한 흡반으로 바위에\n달라붙어 있어서 아무리\n거친 파도가 쳐도 떠내려가지 않는다."
        zh_simp:
          ultra_sun: "曾生活在古代温暖的海里。\n伪装成海草，埋伏着等待猎物，\n等对方靠近的时候一口吞下。"
          ultra_moon: "用强力的吸盘扒在岩石上，\n因此无论怎样的惊涛骇浪\n也不会被冲走。"
        zh_trad:
          ultra_sun: "曾經生活在古代的溫暖海洋中。\n會偽裝成海草，埋伏著等待獵物，\n在獵物靠近時一口吞下。"
          ultra_moon: "會用強力的吸盤附著在\n岩石上，不管遇到什麼樣的\n驚濤駭浪都不會被沖走。"
cradily:
