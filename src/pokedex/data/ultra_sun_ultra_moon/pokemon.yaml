      descriptions:
        jp_kana:
          ultra_sun: "およぐちからは　あまり　つよくない。\nシッポを　ふって　えものを　よびよせ\nちかよったところを　ガブリと　いく。"
          ultra_moon: "しんかいに　せいそく。　ハンテールが\nはまに　うちあがると　ふきつなことが\nおこるという　いいつたえが　ある。"
        jp_kanji:
          ultra_sun: "泳ぐ力は　あまり　強くない。\nシッポを　振って　獲物を　呼び寄せ\n近寄ったところを　ガブリと　いく。"
          ultra_moon: "深海に　生息。　ハンテールが\n浜に　打ちあがると　不吉なことが\n起こるという　言い伝えが　ある。"
        en:
          ultra_sun: "It’s not the strongest swimmer. It wags its tail to\nlure in its prey and then gulps them down as\nsoon as they get close."
          ultra_moon: "Deep seas are their habitat. According to\ntradition, when Huntail wash up onshore,\nsomething unfortunate will happen."
        fr:
          ultra_sun: "Ce piètre nageur se sert de sa queue pour\nappâter ses proies. Il les gobe si elles\napprochent de trop près."
          ultra_moon: "Il habite dans les profondeurs de l’océan.\nUn Serpang trouvé sur la plage serait\nun mauvais présage."
        it:
          ultra_sun: "Non è un grande nuotatore. Attira la preda\nagitando la coda, e non appena si avvicina\nla ingoia in un boccone."
          ultra_moon: "Vive nelle profondità marine. Secondo le\nleggende, quando un Huntail si arena sulla riva\nè segno che sta per accadere una disgrazia."
        de:
          ultra_sun: "Schwimmen ist nicht seine Stärke. Es schwingt\nseinen Schweif, um Beute anzulocken und\nverschluckt sie im Ganzen, wenn sie sich nähert."
          ultra_moon: "Es lebt in der Tiefsee. Einer Überlieferung\nzufolge geschieht etwas Unheilvolles, wenn\nein Aalabyss am Strand auftaucht."
        es:
          ultra_sun: "Curiosamente, no es un gran nadador. Agita la\ncola para atraer a sus presas y, cuando estas\nse acercan, las engulle de golpe."
          ultra_moon: "Vive en los fondos marinos. Según una leyenda,\nque un Huntail aparezca varado en la playa es\nseñal de mal augurio."
        ko:
          ultra_sun: "헤엄치는 힘은 그다지 강하지 않다.\n꼬리를 흔들어 먹이를 유인해\n다가오면 덥석 문다."
          ultra_moon: "심해에 서식한다. 헌테일이\n해변에 올라오면 불길한 일이\n일어난다는 전설이 있다."
        zh_simp:
          ultra_sun: "游泳能力不太强。\n会挥动尾巴来吸引猎物，\n在很接近的时候一口咬住。"
          ultra_moon: "栖息在深海中。\n传说，如果猎斑鱼被冲上沙滩，\n就会有不祥的事情发生。"
        zh_trad:
          ultra_sun: "游泳能力不怎麼強，\n會揮動尾巴來吸引獵物，\n趁獵物靠近的時候一口咬住。"
          ultra_moon: "棲息在深海中。傳說如果\n有獵斑魚被沖上沙灘，\n就會有不好的事發生。"
