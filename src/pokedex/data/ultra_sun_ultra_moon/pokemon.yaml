      types:
        - steel
        - psychic
      egg_groups:
        - mineral
      abilities:
        - clear_body
      hidden_ability: light_metal
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          ultra_sun: "２つの　のうみそから　きょうりょくな\nサイコエネルギーを　ほうしゃし\nえものの　みうごきを　ふうじる。"
          ultra_moon: "こうそくで　そらを　とびまわり\nえものを　みつけると　するどいツメで\nがっちり　つかんで　はなさないのだ。"
        jp_kanji:
          ultra_sun: "２つの　脳みそから　強力な\nサイコエネルギーを　放射し\n獲物の　身動きを　封じる。"
          ultra_moon: "高速で　空を　飛びまわり\n獲物を　見つけると　鋭いツメで\nがっちり　つかんで　離さないのだ。"
        en:
          ultra_sun: "With its two brains, it fires powerful psychic\nenergy to stop its prey in their tracks."
          ultra_moon: "It flies at high speeds around the skies. When it\nfinds its prey, Metang takes a firm grip with its\nsharp claws and never lets go."
        fr:
          ultra_sun: "Grâce à ses deux cerveaux, il peut déchaîner\nune puissante force psychique qui lui permet\nd’immobiliser ses proies."
          ultra_moon: "Il parcourt le ciel à toute allure à la recherche\nd’une proie. Quand il en trouve une, il l’attrape\navec ses griffes acérées et ne la lâche plus."
        it:
          ultra_sun: "Grazie alla fusione di due cervelli, è in grado di\nscatenare fortissimi poteri psichici che\nimmobilizzano le prede."
          ultra_moon: "Vola a grande velocità. Una volta individuata\nla preda, la afferra saldamente con gli artigli\naffilati e non la lascia più andare."
        de:
          ultra_sun: "Durch seine zwei Gehirne kann es sehr starke\nPsycho-Kräfte freisetzen, mit denen es seine\nBeute bewegungsunfähig macht."
          ultra_moon: "Es fliegt schnell durch die Luft. Wenn es Beute\nentdeckt, packt es sie mit seinen scharfen\nKlauen und lässt sie nicht mehr los."
        es:
          ultra_sun: "El poder psíquico combinado de ambos\ncerebros es tal que le permite paralizar a sus\npresas."
          ultra_moon: "Surca el cielo a gran velocidad. En cuanto avista\nsu presa, la agarra con sus afiladas garras y ya\nno se desprende de ella."
        ko:
          ultra_sun: "2개의 뇌에서 강력한\n사이코 에너지를 방사하여\n먹이를 움직이지 못하게 한다."
          ultra_moon: "고속으로 하늘을 날아다니다가\n먹이를 발견하면 날카로운 발톱으로\n꽉 잡고 놓지 않는다."
        zh_simp:
          ultra_sun: "会从２个大脑里放射出\n强力的精神能量，\n封住猎物的行动。"
          ultra_moon: "以高速在空中飞来飞去，\n如果发现猎物就会用锐利的爪子\n牢牢抓住，绝不松开。"
        zh_trad:
          ultra_sun: "會從２個大腦發射出\n強大的精神能量，\n藉此封鎖獵物的行動。"
          ultra_moon: "會以高速在空中四處飛行。\n當發現獵物時，會用銳利的爪子\n牢牢抓住獵物，絕不鬆開。"
