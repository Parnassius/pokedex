grubbin:
  species_id: 736
  names:
    jp_kana: アゴジムシ
    jp_kanji: アゴジムシ
    en: Grubbin
    fr: Larvibule
    it: Grubbin
    de: Mabula
    es: Grubbin
    ko: 턱지충이
    zh_simp: 强颚鸡母虫
    zh_trad: 強顎雞母蟲
  forms:
    grubbin:
      form_id: 0
      base_stats:
        hp: 47
        attack: 62
        defense: 45
        special_attack: 55
        special_defense: 45
        speed: 46
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - swarm
      descriptions:
        jp_kana:
          ultra_sun: "もし　すあなを　みつけても　てを\nつっこんでは　ダメだ。　いやがる\nアゴジムシに　かみつかれるぞ。"
          ultra_moon: "ネバネバした　いとを　はき　あいての\nうごきを　とめた　ところを　するどく\nじょうぶなアゴで　はさみ　しとめる。"
        jp_kanji:
          ultra_sun: "もし　巣穴を　見つけても　手を\n突っ込んでは　ダメだ。　嫌がる\nアゴジムシに　噛みつかれるぞ。"
          ultra_moon: "ネバネバした　糸を　吐き　相手の\n動きを　止めた　ところを　鋭く\n丈夫なアゴで　挟み　仕留める。"
        en:
          ultra_sun: "If you find its nest, you shouldn’t stick your\nhand inside. You’ll get bitten by an\nirritated Grubbin."
          ultra_moon: "It spits a sticky thread to stop opponents in\ntheir tracks, and then it grabs them in its\nsharp, sturdy mandibles to take them down."
        fr:
          ultra_sun: "Larvibule n’aime pas les intrus, alors ne mettez\npas la main dans son nid, sous peine de vous\nfaire mordre !"
          ultra_moon: "Il crache un fil gluant pour empêtrer ses\nennemis. Une fois immobilisés, il les attaque\nen les mordant de ses puissantes mandibules."
        it:
          ultra_sun: "Se trovi un nido di Grubbin, non infilarci dentro\nla mano: non amano le intrusioni e rischi di farti\ndare un bel morso."
          ultra_moon: "Secerne un filo appiccicoso con cui immobilizza\nl’avversario per poi stritolarlo tra le sue\nrobuste mandibole."
        de:
          ultra_sun: "Wer den Bau eines Mabula findet, sollte nicht\ndie Hand hineinstecken. Das mag es nämlich\ngar nicht und schnappt dann gnadenlos zu."
          ultra_moon: "Es lähmt Gegner, indem es einen klebrigen Faden\nauf sie spuckt. Mit seinen kräftigen Kiefern\nnimmt es diese dann in die Mangel."
        es:
          ultra_sun: "Conviene no meter la mano en la madriguera de\nun Grubbin, so pena de provocarlo y llevarse un\nbuen mordisco."
          ultra_moon: "Inmoviliza al rival con el hilo viscoso que secreta\ny lo atrapa con sus duras y fuertes mandíbulas\npara atacarlo sin cuartel."
        ko:
          ultra_sun: "혹시 소굴을 발견하더라도\n손을 넣으면 안 된다. 싫어하는\n턱지충이에게 물린다."
          ultra_moon: "끈적끈적한 실을 뿜어 상대의\n움직임을 멈추고 날카롭고\n튼튼한 턱으로 집어서 처리한다."
        zh_simp:
          ultra_sun: "即使发现了它的巢穴，\n也不能贸然把手伸进去。\n会被强颚鸡母虫厌烦而咬住。"
          ultra_moon: "吐出黏黏的丝，制住对手的行动后，\n用锋利而结实的颚部夹住，\n给予致命一击。"
        zh_trad:
          ultra_sun: "就算發現強顎雞母蟲的巢穴\n也絕不能把手伸進去，\n不然會惹起牠的反感而被咬。"
          ultra_moon: "會吐出黏黏的絲，停住對手的行動，\n然後用銳利而結實的顎部\n夾住獵物，給予致命一擊。"
charjabug:
  species_id: 737
  names:
    jp_kana: デンヂムシ
    jp_kanji: デンヂムシ
    en: Charjabug
    fr: Chrysapile
    it: Charjabug
    de: Akkup
    es: Charjabug
    ko: 전지충이
    zh_simp: 虫电宝
    zh_trad: 蟲電寶
  forms:
    charjabug:
      form_id: 0
      base_stats:
        hp: 57
        attack: 82
        defense: 95
        special_attack: 55
        special_defense: 75
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
