    jp_kanji: オコリザル
    en: Primeape
    fr: Colossinge
    it: Primeape
    de: Rasaff
    es: Primeape
    ko: 성원숭
    zh_simp: 火暴猴
    zh_trad: 火爆猴
  forms:
