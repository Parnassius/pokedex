        jp_kana:
          ultra_sun: "したが　どこまで　のびるのかの\nコンテストが　かいさい　されている。\nげんざいの　さいこうきろくは２５ｍ。"
          ultra_moon: "てあし　より　ベロを　つかうほうが\nずっと　とくい。　ちいさな　マメの\n１つぶだけを　きように　つまめる。"
        jp_kanji:
          ultra_sun: "舌が　どこまで　伸びるのかの\nコンテストが　開催　されている。\n現在の　最高記録は２５ｍ。"
          ultra_moon: "手足　より　ベロを　使うほうが\nずっと　得意。　小さな　マメの\n１粒だけを　器用に　摘める。"
        en:
          ultra_sun: "A contest is under way to determine which one\ncan stick its tongue out the farthest. The\ncurrent record is...more than 82 feet."
          ultra_moon: "It uses its tongue much more skillfully than its\nhands or its feet. It can deftly pick up a\nsingle small bean with its tongue."
        fr:
          ultra_sun: "Il existe un concours visant à déterminer lequel\nd’entre eux a la langue la plus longue. Le record\nactuel est de 25 m."
          ultra_moon: "Il est bien plus adroit avec sa langue qu’avec\nses autres membres, au point qu’elle peut même\nlui servir à ramasser un grain de riz minuscule."
        it:
          ultra_sun: "Esiste una competizione per stabilire qual è\nil Lickilicky che riesce ad allungare di più la\nlingua. Il record attuale è di 25 metri."
          ultra_moon: "È molto più bravo a usare la lingua che gli arti,\ntanto che con essa riesce ad afferrare perfino\nun piccolo fagiolo."
        de:
          ultra_sun: "Es gibt Wettbewerbe dazu, welches Schlurplek\nseine Zunge am weitesten herausstrecken kann.\nDer Rekord liegt bei 25 m."
          ultra_moon: "Es kann mit seiner Zunge geschickter umgehen\nals mit seinen Armen und Beinen. Selbst winzige\nBöhnchen hebt es mit ihrer Hilfe problemlos auf."
        es:
          ultra_sun: "Se celebra una competición para comprobar qué\nLickilicky logra extender más lejos la lengua. El\nrécord actual es de 25 metros."
          ultra_moon: "Es mucho más hábil usando la lengua que sus\nextremidades, hasta el punto de poder coger\ncon gran maña una minúscula habichuela."
        ko:
          ultra_sun: "혀가 어디까지 늘어나는지\n콘테스트가 열린다.\n현재 최고 기록은 25m다."
          ultra_moon: "손발보다 혀를 사용하는 것이\n훨씬 능숙하다. 작은 콩 1알도\n능숙하게 집을 수 있다."
        zh_simp:
          ultra_sun: "会举行看谁舌头伸得远的大赛。\n目前的最高纪录是２５米。"
          ultra_moon: "比起手脚，它更擅长使用舌头。\n哪怕是１粒小小的豆子也能灵活地摘下。"
        zh_trad:
          ultra_sun: "會舉行比賽誰的舌頭\n伸得最遠的大會。\n目前的最高紀錄是２５公尺。"
          ultra_moon: "比起手腳，牠更加擅長使用舌頭。\n就算是１粒小小的豆子，\n牠也能靈巧地用舌頭撿起來。"
