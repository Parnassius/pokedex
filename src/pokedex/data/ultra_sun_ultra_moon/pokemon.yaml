          ultra_sun: "デパートの　しんぐコーナーには\nプリンの　ふしぎな　こもりうたを\nしゅうろくしたＣＤが　うられている。"
          ultra_moon: "うたう　うたは　すむ　ちほうによって\nぜんぜん　ちがっている。　なかには\nシャウトするような　ものまで　あるぞ。"
        jp_kanji:
          ultra_sun: "デパートの　寝具コーナーには\nプリンの　不思議な　子守唄を\n収録した　ＣＤが　売られている。"
          ultra_moon: "歌う　歌は　棲む　地方によって\n全然　違っている。　中には\nシャウトするような　ものまで　あるぞ。"
        en:
          ultra_sun: "Recordings of Jigglypuff’s strange lullabies can\nbe purchased from department stores. These\nCDs can be found near the bedding area."
          ultra_moon: "The songs they sing are totally different\ndepending on the region they live in. Some even\nsound like they’re shouting!"
        fr:
          ultra_sun: "Les rayons literie des magasins proposent\ngénéralement des CD de berceuses chantées\npar des Rondoudou."
          ultra_moon: "Les airs qu’il chante varient selon la région\noù il habite. Certains chants s’apparentent\nà des hurlements."
        it:
          ultra_sun: "Ai grandi magazzini nel reparto camera da letto\nsono in vendita dei CD con la registrazione della\nmisteriosa ninnananna cantata da Jigglypuff."
          ultra_moon: "Il suo canto è diversissimo a seconda della\nregione in cui vive. In alcuni casi, più che\ncantare sembra quasi che urli."
        de:
          ultra_sun: "In der Bettenabteilung von Kaufhäusern erhält\nman auch CDs mit Pummeluffs wundersam\neinlullendem Gesang."
          ultra_moon: "Sein Gesang unterscheidet sich je nach der\nRegion, in der es lebt. Mancherorts erinnert er\nmehr an Geschrei."
        es:
          ultra_sun: "En la sección de muebles de dormitorio de los\ngrandes almacenes se pueden encontrar discos\nrecopilatorios de nanas cantadas por Jigglypuff."
          ultra_moon: "Su canto varía enormemente de una región a\notra. En algunos casos, más que cantos parecen\naullidos."
        ko:
          ultra_sun: "백화점 침구 코너에는\n푸린의 신비한 자장가를\n수록한 CD를 판매하고 있다."
          ultra_moon: "부르는 노래는 서식하는 지방에\n따라 전혀 다르다. 그중에는\n샤우팅하는 듯한 노래도 있다."
        zh_simp:
          ultra_sun: "可以在百货商店的寝具区\n买到收录有胖丁那\n神奇摇篮曲的ＣＤ。"
          ultra_moon: "栖息的地区不同，它唱的歌\n也完全不同。里面甚至还有\n一些歌听起来像是在大喊大叫。"
        zh_trad:
          ultra_sun: "在百貨公司的寢具區\n可以買到收錄著胖丁那\n奇妙搖籃曲的ＣＤ。"
          ultra_moon: "隨著棲息的地方不同，所唱的歌\n也完全不一樣。甚至有一部分胖丁\n唱的歌聽起來就像是在大吼大叫。"
wigglytuff:
