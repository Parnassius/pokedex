      abilities:
        - natural_cure
        - serene_grace
      hidden_ability: healer
      held_items:
        common: lucky_punch
      descriptions:
        jp_kana:
          ultra_sun: "おいしく　えいようもある　タマゴを\nほかのポケモンに　ねらわれるうちに\nにげあしが　はやくなったらしい。"
          ultra_moon: "おなかの　タマゴを　ねらい\nらんかく　されてきた　れきしから\nせいそくすうは　とても　すくない。"
        jp_kanji:
          ultra_sun: "おいしく　栄養もある　タマゴを\n他のポケモンに　狙われるうちに\n逃げ足が　速くなったらしい。"
          ultra_moon: "お腹の　タマゴを　狙い\n乱獲　されてきた　歴史から\n生息数は　とても　少ない。"
        en:
          ultra_sun: "It seems that other Pokémon’s efforts to take\nits delicious, nutritious egg away from it caused\nChansey to get faster at fleeing."
          ultra_moon: "Because the eggs on their bellies have been\noverharvested by people in the past, the\nChansey population remains very small."
        fr:
          ultra_sun: "À force de fuir les Pokémon qui en avaient après\nses œufs, réputés pour leur goût et leur valeur\nnutritive, il a appris à courir plus vite."
          ultra_moon: "Pendant longtemps, ce Pokémon a été chassé\nà outrance pour ses œufs, ce qui explique\nsa population fort réduite."
        it:
          ultra_sun: "Molti Pokémon cercano di rubare le sue uova\ngustose e nutrienti. Probabilmente per questo\nè diventato velocissimo nella fuga."
          ultra_moon: "In passato è stato vittima di una caccia sfrenata\nper le sue uova. Per questo motivo non sono\nrimasti molti esemplari di questo Pokémon."
        de:
          ultra_sun: "Es hat gelernt, rasch davonzulaufen, da es viele\nPokémon auf die nahrhaften und köstlichen Eier\nabgesehen haben, die es legt."
          ultra_moon: "Einst wurde es exzessiv von Wilddieben gejagt,\ndie es auf das Ei in seinem Beutel abgesehen\nhatten. Mittlerweile ist es daher sehr selten."
        es:
          ultra_sun: "Ha desarrollado gran velocidad para huir de los\nPokémon que quieren robarle sus huevos, que\nson exquisitos y poseen un gran valor nutritivo."
          ultra_moon: "Su número ha disminuido espectacularmente\ndebido al constante hurto del que son objeto\nsus huevos."
        ko:
          ultra_sun: "맛있고 영양 많은 알을\n다른 포켓몬들이 자꾸 노려서\n도망치는 속도가 빨라진 듯하다."
          ultra_moon: "배에 있는 알을 노리고\n마구잡이로 잡힌 역사에서\n개체 수는 매우 적다."
        zh_simp:
          ultra_sun: "其他宝可梦盯上了它那既美味\n又营养的蛋，在这追逐的过程中，\n它逃跑的速度好像变快了。"
          ultra_moon: "经历了一段以夺取它腹部的\n蛋为目标的滥捕历史后，\n它的数量已经变得非常稀少。"
        zh_trad:
          ultra_sun: "因為其他寶可夢盯上了牠\n營養又美味的蛋，牠的腳程\n似乎在逃跑的過程中變快了。"
          ultra_moon: "由於曾有過以奪取牠腹部的蛋\n為目的而加以濫捕的歷史，\n所以牠的數量非常稀少。"
