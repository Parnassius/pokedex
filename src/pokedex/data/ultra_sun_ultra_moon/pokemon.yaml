      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: analytic
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          ultra_sun: "たびたび　ていでんの　げんいんとなる\nため　コイルが　いやがる　でんぱを\nながす　はつでんしょも　あるほど。"
          ultra_moon: "さいきんは　でんせんが　じめんに\nうめられているためか　はつでんしょを\nおそう　コイルが　ふえている。"
        jp_kanji:
          ultra_sun: "たびたび　停電の　原因と　なる\nため　コイルが　嫌がる　電波を\n流す　発電所も　あるほど。"
          ultra_moon: "最近は　電線が　地面に\n埋められているためか　発電所を\n襲う　コイルが　増えている。"
        en:
          ultra_sun: "It’s frequently the cause of power outages,\nwhich is why some power plants send out\nelectrical signals that it can’t stand."
          ultra_moon: "Perhaps because electrical lines are often\nburied these days, the number of Magnemite\nattacks on power plants has increased."
        fr:
          ultra_sun: "Ce Pokémon causant des coupures de courant,\ncertaines centrales l’éloignent en diffusant\ndes ondes qu’il déteste."
          ultra_moon: "De nos jours, les câbles électriques sont\nenterrés, aussi les Magnéti attaquent-ils\nde plus en plus les centrales électriques."
        it:
          ultra_sun: "Poiché spesso causano dei blackout, alcune\ncentrali elettriche diffondono delle onde radio\nche i Magnemite non sopportano."
          ultra_moon: "Gli attacchi da parte dei Magnemite alle centrali\nelettriche sono notevolmente aumentati, forse\nperché al giorno d’oggi i cavi sono interrati."
        de:
          ultra_sun: "Da Magnetilo Stromausfälle verursacht, werden\nin vielen Kraftwerken Radiowellen ausgesendet,\ndie es nicht leiden kann, um es zu vertreiben."
          ultra_moon: "Seit Stromleitungen zunehmend unterirdisch\nverlegt werden, stürzen sich mehr und mehr\nMagnetilo direkt auf Kraftwerke."
        es:
          ultra_sun: "Frecuentemente son la causa de apagones, por\nlo que algunas centrales eléctricas emiten unas\nondas que detestan para ahuyentarlos."
          ultra_moon: "Debido a que el tendido eléctrico es ahora\nsoterrado, han aumentado los asaltos a\ncentrales eléctricas causados por Magnemite."
        ko:
          ultra_sun: "종종 정전의 원인이 되기 때문에\n코일이 싫어하는 전파를\n내보내는 발전소도 있을 정도다."
          ultra_moon: "최근에는 전선이 땅에\n묻혀 있기 때문인지 발전소를\n습격하는 코일이 늘고 있다."
        zh_simp:
          ultra_sun: "因为它时常会引发停电，\n所以有些发电厂会发出\n小磁怪讨厌的电波。"
          ultra_moon: "可能是因为最近的电线\n都被埋在了地下，所以袭击\n发电厂的小磁怪变多了。"
        zh_trad:
          ultra_sun: "由於小磁怪經常引發停電，\n有的發電廠甚至會特地發射\n小磁怪討厭的電波。"
          ultra_moon: "可能是因為最近電線都埋在\n地下的關係，襲擊發電廠的\n小磁怪變得越來越多了。"
