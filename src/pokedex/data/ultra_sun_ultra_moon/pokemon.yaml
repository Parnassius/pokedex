      types:
        - bug
        - electric
      egg_groups:
        - bug
      abilities:
        - battery
      held_items:
        rare: cell_battery
      descriptions:
        jp_kana:
          ultra_sun: "おちばに　うまり　ほとんど　うごかず\nひたすら　ふようどを　くっている。\nまちがって　ふむと　ビリビリするぞ。"
          ultra_moon: "おそわれても　がんじょうな　カラで\nまもりに　てっする。　しつこい\nあいてには　でんきで　はんげき。"
        jp_kanji:
          ultra_sun: "落ち葉に　埋まり　ほとんど　動かず\nひたすら　腐葉土を　食っている。\n間違って　踏むと　ビリビリするぞ。"
          ultra_moon: "襲われても　頑丈な　カラで\n守りに　徹する。　しつこい\n相手には　電気で　反撃。"
        en:
          ultra_sun: "It buries itself in fallen leaves and barely\nmoves, munching away on humus. If you\naccidentally step on one, you’ll get a shock!"
          ultra_moon: "Its stout shell provides excellent defense from\nattacks. It uses electricity on\npersistent opponents."
        fr:
          ultra_sun: "Il passe son temps à manger du terreau, tapi\nsans bouger sous les feuilles mortes. Gare\nà la décharge si vous lui marchez dessus !"
          ultra_moon: "Sa solide carapace lui sert de protection en\ncas d’attaque. Si un ennemi s’acharne, il riposte\navec une décharge électrique."
        it:
          ultra_sun: "Si nasconde tra le foglie cadute a terra e rimane\nimmobile nutrendosi esclusivamente di humus.\nChi lo pesta per sbaglio prende la scossa."
          ultra_moon: "Il suo robusto esoscheletro lo protegge dagli\nattacchi. Se il nemico non molla, contrattacca\ncon scariche elettriche."
        de:
          ultra_sun: "Es vergräbt sich unter Blättern, wo es nahezu\nregungslos verharrt und Humus frisst. Tritt man\nversehentlich auf es, verteilt es Stromschläge."
          ultra_moon: "Wird es angegriffen, gewährt ihm sein robuster\nPanzer hervorragenden Schutz. Hartnäckige\nGegner greift es mit Elektro-Attacken an."
        es:
          ultra_sun: "Escondido bajo la hojarasca, permanece casi\ninmóvil mientras come humus con fruición. Quien\nlo pisa en un descuido se lleva una descarga."
          ultra_moon: "Cuando lo atacan, se protege con su robusto\ncaparazón. Si el rival lo sigue atosigando, le\nsuelta una descarga eléctrica."
        ko:
          ultra_sun: "낙엽에 묻혀 거의 움직이지 않고\n그저 부엽토만 먹는다.\n잘못 밟으면 찌릿찌릿하다."
          ultra_moon: "공격을 받아도 튼튼한 껍질로\n철저히 방어한다. 끈질긴\n상대에게는 전기로 반격한다."
        zh_simp:
          ultra_sun: "埋在落叶里一动不动，\n专心致志地吃着腐叶土。\n如果不小心错踩到它，就会被电到。"
          ultra_moon: "即使被袭击也会一直用\n结实的外壳保护自己。\n会用电反击纠缠不休的对手。"
        zh_trad:
          ultra_sun: "埋在落葉堆裡幾乎不動，\n只是不斷地吃著腐葉土。\n如果不小心踩到牠就會被電到。"
          ultra_moon: "即使遭到襲擊也會用\n堅固的外殼貫徹守勢。\n遇到糾纏不休的對手時會用電來反擊。"
