emolga:
  species_id: 587
  names:
    jp_kana: エモンガ
    jp_kanji: エモンガ
    en: Emolga
    fr: Emolga
    it: Emolga
    de: Emolga
    es: Emolga
    ko: 에몽가
    zh_simp: 电飞鼠
    zh_trad: 電飛鼠
  forms:
    emolga:
      form_id: 0
      base_stats:
        hp: 55
        attack: 75
        defense: 60
        special_attack: 75
        special_defense: 60
        speed: 103
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
        - flying
      egg_groups:
        - field
      abilities:
        - static
      hidden_ability: motor_drive
      descriptions:
        jp_kana:
          ultra_sun: "でんきを　たくわえ　そらを　とぶ。\nかみなりが　とどろく　まよなかには\nそらを　うめつくすほど　いることも。"
          ultra_moon: "でんきを　まきちらしながら　とぶので\nとりポケモンたちが　ちかづかない。\nおかげで　エサを　ひとりじめできる。"
        jp_kanji:
          ultra_sun: "電気を　蓄え　空を　飛ぶ。\n雷が　とどろく　真夜中には\n空を　埋め尽くすほど　いることも。"
          ultra_moon: "電気を　まき散らしながら　飛ぶので\nとりポケモンたちが　近付かない。\nおかげで　エサを　ひとりじめできる。"
        en:
          ultra_sun: "They store up electricity to fly through the air.\nWhen thunder cracks at night, sometimes there\nare almost enough of them to blot out the sky."
          ultra_moon: "As it flies, it scatters electricity around, so bird\nPokémon keep their distance. That’s why\nEmolga can keep all its food to itself."
        fr:
          ultra_sun: "Il plane dans les airs une fois qu’il est chargé en\nélectricité. Les nuits où le tonnerre gronde, des\ncentaines d’Emolga se regroupent dans le ciel."
          ultra_moon: "Les Pokémon oiseaux ne s’approchent pas de lui\ncar il décharge de l’électricité en planant. Il peut\ndonc garder sa nourriture pour lui tout seul."
        it:
          ultra_sun: "Si carica di energia e si alza in volo.\nNelle notti di fulmini e tempesta, questi Pokémon\nsono così numerosi da invadere tutto il cielo."
          ultra_moon: "Vola emettendo scariche elettriche che tengono\nalla larga gli altri Pokémon alati, e per questo\nnon fa molta fatica a procurarsi il cibo."
        de:
          ultra_sun: "Es speichert Strom, um damit durch die Lüfte\nzu segeln. Ein nächtliches Blitzgewitter stellt\nsich manchmal als ein Schwarm Emolga heraus."
          ultra_moon: "Vogel-Pokémon halten sich von ihm fern, da es\nim Flug Strom entlädt. Frei von Konkurrenz kann\nes seine Beute so für sich allein beanspruchen."
        es:
          ultra_sun: "Se carga de electricidad y se echa a volar.\nDurante las noches de tormenta eléctrica se los\nve a centenares surcando el cielo."
          ultra_moon: "Desprende descargas eléctricas mientras vuela,\npor lo que los Pokémon pájaro no se le acercan,\ny así puede quedarse la comida para él solo."
        ko:
          ultra_sun: "전기를 모아 하늘을 난다.\n천둥이 치는 한밤중에는\n하늘을 가득 메울 정도로 많다."
          ultra_moon: "전기를 흩뿌리면서 날기 때문에\n새포켓몬들이 다가오지 않는다.\n덕분에 먹이를 독차지할 수 있다."
        zh_simp:
          ultra_sun: "蓄着电在空中飞行。\n有时甚至会在雷鸣的深夜里，\n密密麻麻布满整个天空。"
          ultra_moon: "一边到处放电一边飞翔，\n因此鸟宝可梦们都不会靠近。\n得益于此，可以独占食物。"
        zh_trad:
          ultra_sun: "蓄著電在空中飛行。\n在雷電交加的深夜裡，牠們甚至\n會密密麻麻地佈滿整個天空。"
          ultra_moon: "會一邊到處放電一邊飛行，\n所以鳥寶可夢們不會靠近牠，\n這讓牠可以獨佔食物。"
