      descriptions:
        jp_kana:
          ultra_sun: "サイコパワーだけでなく　かいりきも\nじまん。　４ほんの　あしで　えものを\nつかみ　ツメで　うごきを　ふうじる。"
          ultra_moon: "スーパーコンピュータよりも　すごい\nはんだんで　あいてを　ぶんせきし\nれいせいに　おいつめていくのだ。"
        jp_kanji:
          ultra_sun: "サイコパワーだけでなく　怪力も\n自慢。　４本の　足で　獲物を\nつかみ　ツメで　動きを　封じる。"
          ultra_moon: "スーパーコンピュータよりも　すごい\n判断で　相手を　分析し\n冷静に　追い詰めていくのだ。"
        en:
          ultra_sun: "It boasts not only psychic powers but also\nfantastic strength. It grabs its prey with its four\nlegs and holds them in place with its claws."
          ultra_moon: "It analyzes its opponents with more accuracy\nthan a supercomputer, which enables it to\ncalmly back them into a corner."
        fr:
          ultra_sun: "Il est aussi fier de sa force physique que de ses\npouvoirs psychiques. Il immobilise ses proies\navec les griffes d’acier de ses quatre pattes."
          ultra_moon: "Implacable, il analyse son ennemi encore\nplus précisément qu’un superordinateur et\nle pousse dans ses derniers retranchements."
        it:
          ultra_sun: "Oltre ai potenti poteri psichici, possiede una\nstraordinaria forza fisica. Afferra la preda con le\nquattro zampe e la immobilizza con gli artigli."
          ultra_moon: "Grazie a capacità diagnostiche superiori a quelle\ndi un supercomputer, analizza il nemico e lo\nmette alle strette senza scomporsi minimamente."
        de:
          ultra_sun: "Es besitzt nicht nur Psycho-Kräfte, sondern ist\nauch sehr stark. Beute packt es mit seinen vier\nBeinen und hält sie mit seinen Krallen fest."
          ultra_moon: "Es kann seine Gegner besser analysieren als ein\nSupercomputer und treibt sie mit kühlem Kopf in\ndie Enge."
        es:
          ultra_sun: "Se enorgullece tanto de su poder psíquico como\nde su gran fuerza. Agarra a sus presas con las\ncuatro extremidades metálicas y las inmoviliza."
          ultra_moon: "Analiza al enemigo con más precisión incluso\nque un superordenador y, sin inmutarse, lo pone\ncontra las cuerdas."
        ko:
          ultra_sun: "사이코 파워뿐만 아니라 괴력도\n겸비하고 있다. 4개의 다리로 먹이를\n붙잡고 발톱으로 움직이지 못하게 한다."
          ultra_moon: "슈퍼컴퓨터보다 굉장한\n판단력으로 상대를 분석하여\n냉정하게 궁지에 몰아넣는다."
        zh_simp:
          ultra_sun: "不只是精神力量，还以怪力而自豪。\n能用４只脚抓住猎物，\n用爪子封住对方的行动。"
          ultra_moon: "以超越超级计算机的\n判断力分析对手，\n冷静地将对手逼入绝境。"
        zh_trad:
          ultra_sun: "除了精神力量，也以怪力為傲。\n會用４隻腳捕捉獵物，\n再用鋼鐵爪子封鎖對方的行動。"
          ultra_moon: "會以超越超級電腦的\n判斷力分析對手，\n冷靜地將對手逼入絕境。"
    metagross_mega:
