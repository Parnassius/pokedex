      descriptions:
        jp_kana:
          ultra_sun: "ウルトラホールから　しゅつげんした。\nふくすうの　せいめいが　つみあがり\n１ぴきを　けいせいしている　ようだ。"
          ultra_moon: "ＵＢらしき　なぞの　せいめいたい。\nとつぜん　うごきだして　おそってきた\nいしがきの　しょうたいは　こいつだ。"
        jp_kanji:
          ultra_sun: "ウルトラホールから　出現した。\n複数の　生命が　積み上がり\n１匹を　形成している　ようだ。"
          ultra_moon: "ＵＢらしき　謎の　生命体。\n突然　動き出して　襲ってきた\n石垣の　正体は　こいつだ。"
        en:
          ultra_sun: "It appeared from an Ultra Wormhole. Each one\nappears to be made up of many life-forms\nstacked one on top of each other."
          ultra_moon: "When stone walls started moving and attacking,\nthe brute’s true identity was this mysterious\nlife-form, which brings to mind an Ultra Beast."
        fr:
          ultra_sun: "Il est sorti d’une Ultra-Brèche. Il est composé\nde plusieurs petites entités qui s’assemblent\npour n’en former qu’une seule."
          ultra_moon: "On suppose que cette mystérieuse forme de vie\nest une Ultra-Chimère. Si un mur se met en\nbranle et vous attaque sans prévenir, c’est lui."
        it:
          ultra_sun: "È arrivato attraverso un Ultravarco. Sembra\nessere costituito da più creature impilate che\nformano una singola unità."
          ultra_moon: "Questa misteriosa forma di vita sembra essere\nun’Ultracreatura. Se all’improvviso un muro si\nmuove e attacca, in realtà si tratta di lui."
        de:
          ultra_sun: "Diese Kreatur kam durch eine Ultrapforte.\nSie besteht anscheinend aus mehreren\naufeinandergestapelten Wesen."
          ultra_moon: "Diese rätselhafte Lebensform ist vermutlich eine\nUltrabestie. Sie sieht aus wie eine Steinmauer,\nbis sie sich plötzlich bewegt und angreift."
        es:
          ultra_sun: "Surgió de un Ultraumbral. Parece estar\ncompuesto de varias criaturas que se han\ncombinado para formar un solo ser."
          ultra_moon: "Extraña criatura que podría ser un Ultraente.\nParece un muro rocoso hasta que se mueve de\nrepente y ataca."
        ko:
          ultra_sun: "울트라홀에서 출현했다.\n여러 개의 생명이 쌓여\n1마리를 형성하고 있는 듯하다."
          ultra_moon: "UB 같은 수수께끼의 생명체.\n갑자기 움직이기 시작해서 덮쳐온\n돌담의 정체는 이 녀석이다."
        zh_simp:
          ultra_sun: "从究极之洞里出现。\n好像是复数的生命累积起来，\n形成了１只。"
          ultra_moon: "像是究极异兽的谜一般的生命体。\n突然动起来并展开袭击的石墙，\n正身就是这家伙。"
        zh_trad:
          ultra_sun: "從究極之洞中出現。\n似乎是由多數的生命\n堆積起來形成的個體。"
          ultra_moon: "疑似究極異獸的神秘生命體。\n突然動起來展開襲擊的石牆，\n它的真面目就是這個傢伙。"
blacephalon:
  species_id: 806
  names:
    jp_kana: ズガドーン
    jp_kanji: ズガドーン
    en: Blacephalon
    fr: Pierroteknik
    it: Blacephalon
    de: Kopplosio
    es: Blacephalon
    ko: 두파팡
    zh_simp: 砰头小丑
    zh_trad: 砰頭小丑
  forms:
    blacephalon:
      form_id: 0
      base_stats:
        hp: 53
        attack: 127
        defense: 53
        special_attack: 151
        special_defense: 79
        speed: 107
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - fire
        - ghost
      egg_groups:
        - undiscovered
      abilities:
        - beast_boost
      descriptions:
        jp_kana:
          ultra_sun: "クネクネうごいて　ひとに　ちかづくと\nとつぜん　あたまを　ばくはつさせた。\nウルトラビーストの　いっしゅらしい。"
          ultra_moon: "ウルトラホールから　あらわれたＵＢ。\nばくはつで　あいてを　おどろかし\nそのすきに　せいきを　うばっていた。"
        jp_kanji:
          ultra_sun: "クネクネ動いて　人に　近付くと\n突然　頭を　爆発させた。\nウルトラビーストの　一種らしい。"
          ultra_moon: "ウルトラホールから　現れた　ＵＢ。\n爆発で　相手を　驚かし\nその隙に　生気を　奪っていた。"
        en:
          ultra_sun: "It slithers toward people. Then, without warning,\nit triggers the explosion of its own head.\nIt’s apparently one kind of Ultra Beast."
          ultra_moon: "A UB that appeared from an Ultra Wormhole, it\ncauses explosions, then takes advantage of\nopponents’ surprise to rob them of their vitality."
        fr:
          ultra_sun: "Il s’approche des gens avec son allure\ndésarticulée et fait subitement exploser\nsa tête. Ce serait une Ultra-Chimère."
          ultra_moon: "Cette Ultra-Chimère sortie d’une Ultra-Brèche\nprovoque des explosions pour surprendre\nl’ennemi et en profite pour voler son énergie."
        it:
          ultra_sun: "Sembra che sia un’Ultracreatura. Si avvicina\nalle persone ondeggiando e fa esplodere la\nsua testa all’improvviso."
          ultra_moon: "Ultracreatura arrivata attraverso un Ultravarco.\nSorprende le prede con un’esplosione e ne\napprofitta per sottrarre la loro energia vitale."
        de:
          ultra_sun: "Dieses Wesen ist vermutlich eine Ultrabestie.\nEs nähert sich Menschen tänzelnd, nur um dann\nplötzlich seinen Kopf explodieren zu lassen."
          ultra_moon: "Eine Ultrabestie, die durch eine Ultrapforte kam.\nSie erschreckt ihre Gegner mit Explosionen\nund raubt ihnen dann ihre Lebenskraft."
        es:
          ultra_sun: "Parece ser uno de los temibles Ultraentes.\nSe acerca a la gente contoneándose y hace\nexplotar su propia cabeza súbitamente."
          ultra_moon: "Un Ultraente surgido de un Ultraumbral. Crea\nuna explosión para sorprender al oponente y\naprovecha para absorber su energía vital."
        ko:
          ultra_sun: "꿈틀거리며 사람에게 다가오다\n느닷없이 머리를 폭발시킨다.\n울트라비스트의 일종인 듯하다."
          ultra_moon: "울트라홀에서 나타난 UB.\n폭발로 상대를 놀라게 하고\n그 틈에 생기를 빼앗는다."
        zh_simp:
          ultra_sun: "扭啊扭地移动着，\n靠近人后会突然让头爆炸。\n好像是究极异兽中的一种。"
          ultra_moon: "从究极之洞里出现的究极异兽。\n用爆炸吓唬对手，\n趁那空当夺走对方的生命气息。"
        zh_trad:
          ultra_sun: "會扭動著身體靠近人，\n然後突然讓頭爆炸。\n似乎是究極異獸的一種。"
          ultra_moon: "從究極之洞中出現的究極異獸。\n會用爆炸嚇唬對手，\n然後趁機奪取對方的精氣。"
