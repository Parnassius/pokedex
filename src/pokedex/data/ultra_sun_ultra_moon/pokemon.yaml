    jp_kanji: コジョフー
    en: Mienfoo
    fr: Kungfouine
    it: Mienfoo
    de: Lin-Fu
    es: Mienfoo
    ko: 비조푸
    zh_simp: 功夫鼬
    zh_trad: 功夫鼬
  forms:
    mienfoo:
      form_id: 0
      base_stats:
        hp: 45
        attack: 85
        defense: 50
        special_attack: 55
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - inner_focus
        - regenerator
      hidden_ability: reckless
      descriptions:
        jp_kana:
          ultra_sun: "あさに　ゆっくりとした　うごきで\nいろんな　ポーズを　とる　むれの\nすがたを　みることが　できるよ。"
          ultra_moon: "やまおくに　こもり　むれの　なかまと\nしゅぎょうに　はげむ。　むれによって\nキックや　チョップのかたが　ちがう。"
        jp_kanji:
          ultra_sun: "朝に　ゆっくりとした　動きで\nいろんな　ポーズを　とる　群れの\n姿を　見ることが　できるよ。"
          ultra_moon: "山奥に　こもり　群れの　仲間と\n修行に　励む。　群れによって\nキックや　チョップの型が　違う。"
        en:
          ultra_sun: "They can often be seen in packs in the morning,\nslowly moving their bodies through a series\nof poses."
          ultra_moon: "They seclude themselves in the mountains and\ndevote themselves to training. The form of their\nkicks and chops differs from pack to pack."
        fr:
          ultra_sun: "Au petit jour, on peut voir des meutes de\nKungfouine qui s’entraînent en effectuant\ndes mouvements lents et méthodiques."
          ultra_moon: "Il s’isole en montagne pour s’entraîner avec\nses congénères. Les techniques de coups de\npied ou de poing changent d’une meute à l’autre."
        it:
          ultra_sun: "Al mattino è possibile vedere gruppi di Mienfoo\nche si esercitano eseguendo movimenti lenti\ne assumendo varie posizioni."
          ultra_moon: "Si ritira sui monti per allenarsi assieme ai suoi\ncompagni. Ogni gruppo sviluppa tecniche di\ncalci e pugni diverse."
        de:
          ultra_sun: "In den Morgenstunden kann man Gruppen dieses\nPokémon dabei beobachten, wie sie mit grazilen\nBewegungen diverse Posen einnehmen."
          ultra_moon: "Mit seiner Gruppe zieht es sich tief in die Berge\nzurück, um dort zu trainieren. Jede der Gruppen\nentwickelt eigene Schlag- und Tritt-Techniken."
        es:
          ultra_sun: "A primera hora de la mañana pueden verse\ngrupos de Mienfoo realizando movimientos\nlentos y adoptando distintas poses."
          ultra_moon: "Suele recluirse con otros congéneres en las\nmontañas para entrenar. Según el grupo, la\ntécnica de sus patadas o puñetazos varía."
        ko:
          ultra_sun: "아침에 느릿느릿 움직이며\n여러 포즈를 취하는\n무리의 모습을 볼 수 있다."
          ultra_moon: "산속에 들어가 무리의 동료와\n수행에 힘쓴다. 무리에 따라\n킥이나 촙의 방식이 다르다."
        zh_simp:
          ultra_sun: "可以在早上看到用慢悠悠的\n动作摆出各种姿势的群体哦。"
          ultra_moon: "在山中闭关，与群体的伙伴们潜心修行。\n根据群体的不同，\n踢和劈的技法也不一样。"
        zh_trad:
          ultra_sun: "在早晨可以看見牠們\n集體用緩慢的動作\n擺出各種姿勢哦。"
          ultra_moon: "與群體的夥伴們一起在深山裡\n閉關修行。不同的群體有著不同的\n踢腿和手刀技法。"
mienshao:
  species_id: 620
  names:
    jp_kana: コジョンド
    jp_kanji: コジョンド
    en: Mienshao
    fr: Shaofouine
    it: Mienshao
    de: Wie-Shu
    es: Mienshao
    ko: 비조도
    zh_simp: 师父鼬
    zh_trad: 師父鼬
  forms:
    mienshao:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 60
        special_attack: 95
        special_defense: 60
        speed: 105
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - inner_focus
        - regenerator
      hidden_ability: reckless
      descriptions:
        jp_kana:
          ultra_sun: "れんぞく　こうげきで　あいてを\nあっとうする。　とどめの　いちげきは\nゆっくり　ちからを　ためて　はなつ。"
          ultra_moon: "きみょうなこえで　ほえたら　キケン。\nめにもとまらぬ　キックや　チョップの\nれんぞくこうげきが　はじまるぞ。"
        jp_kanji:
          ultra_sun: "連続　攻撃で　相手を\n圧倒する。　とどめの　一撃は\nゆっくり　力を　ためて　放つ。"
          ultra_moon: "奇妙な声で　吠えたら　危険。\n目にも止まらぬ　キックや　チョップの\n連続攻撃が　始まるぞ。"
        en:
          ultra_sun: "It overwhelms its opponents with continuous\nattacks and then slowly stores up power\nbefore delivering the finishing blow."
          ultra_moon: "When Mienshao lets out a bizarre wail, you’re in\ndanger. A flurry of kicks and chops too fast to\nsee is about to be unleashed!"
        fr:
          ultra_sun: "Il accule son ennemi avec une rafale d’attaques\nfulgurantes, puis concentre son énergie pour\nlui donner le coup de grâce."
          ultra_moon: "Le cri lugubre de Shaofouine annonce qu’il est\nsur le point de déchaîner une pluie de coups\nsi rapides qu’ils en sont invisibles."
        it:
          ultra_sun: "Mette alle strette l’avversario con una raffica\ndi colpi, poi si concentra per raccogliere le\nenergie prima di sferrare il colpo finale."
          ultra_moon: "Se emette un verso bizzarro, è meglio stargli\nalla larga: potrebbe scatenare una pioggia di\ncalci e pugni così rapidi da essere invisibili!"
        de:
          ultra_sun: "Es überwältigt seine Gegner mit einer Serie aus\nAngriffen. Den finalen Stoß versetzt es ihnen\nerst, nachdem es seine Energie gebündelt hat."
          ultra_moon: "Gibt es einen sonderbaren Laut von sich, sollte\nman schnell in Deckung gehen, da eine rasante\nAngriffsserie aus Schlägen und Tritten folgt."
        es:
          ultra_sun: "Ataca al rival con una rápida ráfaga de golpes,\nmientras reúne poco a poco la energía necesaria\npara asestar el golpe definitivo."
          ultra_moon: "Si emite extraños aullidos, hay que extremar la\nprecaución: empezará a repartir un sinfín de\npatadas y puñetazos a una velocidad pasmosa."
        ko:
          ultra_sun: "연속 공격으로 상대를 압도한다.\n마무리는 느긋하게\n힘을 모아 일격을 가한다."
          ultra_moon: "기묘한 소리로 짖는다면 위험하다.\n눈에 보이지도 않는 킥과 촙의\n연속 공격이 시작된다."
        zh_simp:
          ultra_sun: "会用连续攻击压倒对手。\n致命的一击会在缓慢蓄力后施展出来。"
          ultra_moon: "用奇妙的声音叫唤的话，就危险了。\n它会展开飞快的踢和劈来连续攻击。"
        zh_trad:
          ultra_sun: "會用連續攻擊壓倒對手。\n致命的一擊會在\n緩慢蓄力之後施展出來。"
          ultra_moon: "當牠用奇妙聲音發出叫喊時是很危險的，\n由快到無法看清的踢腿和手刀\n組成的連續攻擊將接踵而來。"
druddigon:
  species_id: 621
  names:
    jp_kana: クリムガン
    jp_kanji: クリムガン
    en: Druddigon
    fr: Drakkarmin
    it: Druddigon
    de: Shardrago
    es: Druddigon
    ko: 크리만
    zh_simp: 赤面龙
    zh_trad: 赤面龍
  forms:
    druddigon:
      form_id: 0
      base_stats:
        hp: 77
        attack: 120
        defense: 90
        special_attack: 60
        special_defense: 90
        speed: 48
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
