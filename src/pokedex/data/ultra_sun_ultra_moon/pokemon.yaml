  names:
    jp_kana: スリープ
    jp_kanji: スリープ
    en: Drowzee
    fr: Soporifik
    it: Drowzee
    de: Traumato
    es: Drowzee
    ko: 슬리프
    zh_simp: 催眠貘
    zh_trad: 催眠貘
  forms:
    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
