      descriptions:
        jp_kana:
          ultra_sun: "どくその　まじった　ほのおを　ふいて\nあいてに　とどめを　さす。　えものは\nむれで　びょうどうに　わけあうぞ。"
          ultra_moon: "ぶきみな　とおぼえが　とくちょう。\nむかしの　ひとは　じごく　からの\nつかいと　かんがえ　おそれていた。"
        jp_kanji:
          ultra_sun: "毒素の　混じった　炎を　吹いて\n相手に　止めを　刺す。　獲物は\n群れで　平等に　分け合うぞ。"
          ultra_moon: "不気味な　遠吠えが　特徴。\n昔の　人は　地獄　からの\n使いと　考え　恐れていた。"
        en:
          ultra_sun: "They spew flames mixed with poison to finish\noff their opponents. They divvy up their prey\nevenly among the members of their pack."
          ultra_moon: "Identifiable by its eerie howls, people a long\ntime ago thought it was the grim reaper and\nfeared it."
        fr:
          ultra_sun: "Il crache des flammes empoisonnées pour\nachever ses proies, qu’il partage avec les\nautres membres de sa meute."
          ultra_moon: "Ceux qui le craignaient jadis lui ont donné le\nsurnom de « messager de la Faucheuse » à\ncause de son hurlement sinistre si particulier."
        it:
          ultra_sun: "Mette KO il nemico sputando fiamme che\ncontengono una tossina. Divide equamente\nle prede con il resto del branco."
          ultra_moon: "Le sue urla sinistre sono inconfondibili.\nUn tempo era ritenuto un messaggero degli\ninferi e tutti lo temevano."
        de:
          ultra_sun: "Es bekämpft seine Gegner mit giftigen Flammen.\nErlegte Beute wird im Rudel gerecht aufgeteilt."
          ultra_moon: "Sein unheimliches Heulen ist unverkennbar.\nFrüher wurde es von den Menschen als Bote\ndes Todes gefürchtet."
        es:
          ultra_sun: "Remata a sus rivales exhalando llamas tóxicas.\nSi abate una presa, la compartirá a partes\niguales con el resto de la manada."
          ultra_moon: "Su rasgo distintivo son los escalofriantes\naullidos que profiere. Antiguamente, era temido\ny considerado un emisario del inframundo."
        ko:
          ultra_sun: "독소가 섞인 불꽃을 불어\n상대를 처리한다. 먹이는\n무리가 공평에게 나눈다."
          ultra_moon: "기분 나쁜 울음소리가 특징이다.\n옛날 사람들은 지옥에서 온\n사자라고 여겨 두려워했다."
        zh_simp:
          ultra_sun: "能喷出混有毒素的火焰结果对手。\n会和群体中的成员平分猎物。"
          ultra_moon: "恐怖的长嚎是其特征。\n过去人们曾认为它是来自\n地狱的使者而对其心存畏惧。"
        zh_trad:
          ultra_sun: "會噴出帶有毒素的火焰\n給予對手致命的一擊。\n會與群體的成員平分獵物。"
          ultra_moon: "特徵是令人不寒而慄的長嚎。\n過去人們認為牠是來自\n地獄的使者，對牠十分畏懼。"
    houndoom_mega:
      form_id: 1
      names:
        jp_kana: メガヘルガー
        jp_kanji: メガヘルガー
        en: Mega Houndoom
        fr: Méga-Démolosse
        it: MegaHoundoom
        de: Mega-Hundemon
        es: Mega-Houndoom
        ko: 메가헬가
        zh_simp: 超级黑鲁加
        zh_trad: 超級黑魯加
      base_stats:
        hp: 75
        attack: 90
        defense: 90
        special_attack: 140
        special_defense: 90
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - dark
        - fire
      egg_groups:
        - field
      abilities:
        - solar_power
      descriptions:
        jp_kana:
          ultra_sun: "あかいツメや　シッポの　せんたんは\nヘルガー　じしんが　くるしむほどの\nこうおんで　すでに　とけかけている。"
          ultra_moon: "メガシンカで　ぜんしんが　はつねつ。\nはげしい　ほのおの　いぶきを\nふきだし　あいてを　すみに　かえる。"
        jp_kanji:
          ultra_sun: "赤いツメや　シッポの　先端は\nヘルガー　自身が　苦しむほどの\n高温で　すでに　溶けかけている。"
          ultra_moon: "メガシンカで　全身が　発熱。\n激しい　炎の　息吹を\n噴き出し　相手を　炭に　変える。"
        en:
          ultra_sun: "Its red claws and the tips of its tail are melting\nfrom high internal temperatures that are painful\nto Houndoom itself."
          ultra_moon: "Houndoom’s entire body generates heat when\nit Mega Evolves. Its fearsome fiery breath turns\nits opponents to ash."
        fr:
          ultra_sun: "Ses griffes et le bout de sa queue sont si\nchauds qu’ils atteignent le point de fusion,\nce qui fait souffrir ce pauvre Démolosse."
          ultra_moon: "Son corps tout entier devient fiévreux lors\nde la Méga-Évolution. Il réduit ses adversaires\nen cendres avec son souffle enflammé."
        it:
          ultra_sun: "Le unghie rosse e la punta della coda sono sul\npunto di sciogliersi per l’altissima temperatura,\ninsopportabile per il Pokémon stesso."
          ultra_moon: "A causa della megaevoluzione il suo corpo\nsi arroventa. Sputa fiamme ad altissima\ntemperatura che carbonizzano l’avversario."
        de:
          ultra_sun: "Seine extrem hohe Körpertemperatur hat zur\nFolge, dass die Spitze seiner Rute sowie seine\nroten Klauen zu schmelzen beginnen."
          ultra_moon: "Die Mega-Entwicklung erhitzt seinen Körper. Der\nFeuerodem, den es dem Gegner entgegenspeit,\nverwandelt diesen in ein Häuflein Asche."
        es:
          ultra_sun: "Sus uñas y el extremo de la cola comienzan a\nfundirse debido a las altas temperaturas,\natormentando al propio Houndoom."
          ultra_moon: "La energía de la megaevolución hace que su\ncuerpo desprenda un calor ardiente. Reduce a\ncenizas al oponente con su aliento de fuego."
        ko:
          ultra_sun: "빨간 발톱과 꼬리 끝은\n헬가 자신도 괴로울 정도로\n뜨거우며 이미 용해되고 있다."
          ultra_moon: "메가진화로 인해 전신이 발열한다.\n격렬한 불꽃의 숨결을 뿜어내서\n상대를 재로 만들어 버린다."
        zh_simp:
          ultra_sun: "在黑鲁加自己都吃不消的高温下，\n红色爪子和尾巴前端已经开始熔化了。"
          ultra_moon: "全身会因超级进化而发热。\n能喷出烈焰吐息，\n将对手烧成焦炭。"
        zh_trad:
          ultra_sun: "在黑魯加自己都吃不消的高溫下，\n牠的紅色爪子和尾巴前端\n已經開始融化了。"
          ultra_moon: "全身因超級進化而發熱。\n能吐出猛烈的火焰，\n把對手燒成焦炭。"
