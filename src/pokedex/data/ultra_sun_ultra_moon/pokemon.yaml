weavile:
  species_id: 461
  names:
    jp_kana: マニューラ
    jp_kanji: マニューラ
    en: Weavile
    fr: Dimoret
    it: Weavile
    de: Snibunna
    es: Weavile
    ko: 포푸니라
    zh_simp: 玛狃拉
    zh_trad: 瑪狃拉
  forms:
    weavile:
      form_id: 0
      base_stats:
        hp: 70
        attack: 120
        defense: 65
        special_attack: 45
        special_defense: 85
        speed: 125
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - ice
      egg_groups:
        - field
      abilities:
        - pressure
      hidden_ability: pickpocket
      held_items:
