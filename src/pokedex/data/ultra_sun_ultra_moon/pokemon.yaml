          ultra_moon: "コラッタたちを　ひきいて　むれを\nつくる。　むれどうしは　なかが　わるく\nエサばを　めぐり　はげしく　あらそう。"
        jp_kanji:
          ultra_sun: "とても　欲張りな　性質。　巣には\nコラッタたちに　集めさせた　エサが\n食べきれないほど　たんまり　あるぞ。"
          ultra_moon: "コラッタたちを　率いて　群れを\n作る。　群れ同士は　仲が　悪く\nエサ場を　巡り　激しく　争う。"
        en:
          ultra_sun: "It has an incredibly greedy personality. Its nest\nis filled with so much food gathered by Rattata\nat its direction, it can’t possibly eat it all."
          ultra_moon: "It commands a nest of Rattata. Different nests\ndon’t get along, whipping up severe fights over\nfeeding grounds."
        fr:
          ultra_sun: "Pokémon très avide, il est souvent incapable\nde manger toute la nourriture accumulée\ndans son nid par ses Rattata subordonnés."
          ultra_moon: "Il rassemble des Rattata pour former un groupe.\nLes hordes ne s’entendent pas entre elles et se\ndisputent violemment les sources de nourriture."
        it:
          ultra_sun: "Molto ingordo di natura, si fa portare il cibo\ndai Rattata, accumulandone nella tana più\ndi quanto riesca a mangiarne."
          ultra_moon: "Si circonda di Rattata con cui forma il proprio\nbranco. Nei branchi regna la discordia e spesso\nsorgono feroci dispute per il cibo."
        de:
          ultra_sun: "Es ist unglaublich gierig. Oftmals kann es gar\nnicht alles fressen, was es die Rattfratz in sein\nNest zusammentragen lässt."
          ultra_moon: "Es schart eine Gruppe von Rattfratz um sich.\nDie verschiedenen Rudel vertragen sich jedoch\nnicht und streiten stets um Futterstellen."
        es:
          ultra_sun: "Es de naturaleza avariciosa. Obliga a los Rattata\na acumular tanta comida en su madriguera que\na menudo no puede comérsela toda."
          ultra_moon: "Forma colonias con Rattata. Las colonias se\nllevan mal y compiten entre sí por las mejores\nfuentes de alimento."
        ko:
          ultra_sun: "매우 욕심이 많다. 둥지에는\n꼬렛들이 모은 먹이가\n다 먹지 못할 만큼 쌓여 있다."
          ultra_moon: "꼬렛들을 거느리고 무리를 만든다.\n다른 무리와는 사이가 나빠서\n먹이를 두고 격렬하게 싸운다."
        zh_simp:
          ultra_sun: "性格非常贪婪。巢穴里满是\n让小拉达们收集起来的，\n吃都吃不完的食物。"
          ultra_moon: "会率领小拉达们组建群体。\n群体之间的关系不好，\n会围绕觅食地激烈地争斗。"
        zh_trad:
          ultra_sun: "性情非常貪婪，巢穴裡堆滿\n讓小拉達們收集來的食物，\n多到吃都吃不完。"
          ultra_moon: "帶領小拉達們組成群體。\n群體之間的關係很惡劣，\n會為了爭奪覓食地而激烈爭鬥。"
