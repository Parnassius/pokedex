    it: Tapu Bulu
    de: Kapu-Toro
    es: Tapu Bulu
    ko: 카푸브루루
    zh_simp: 卡璞・哞哞
    zh_trad: 卡璞・哞哞
  forms:
    tapu_bulu:
      form_id: 0
      base_stats:
        hp: 70
