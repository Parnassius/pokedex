      types:
        - water
      egg_groups:
        - field
      abilities:
        - water_absorb
      hidden_ability: hydration
      descriptions:
        jp_kana:
          ultra_sun: "きれいな　みずべが　おもな　すみか。\nがいてきに　おそわれそうに　なると\nみずに　とびこみ　すがたを　かくす。"
          ultra_moon: "ヒレで　まわりの　すいぶんを　かんち\nしている。　こきざみに　ふるえだすと\nすうじかんご　には　あめが　ふる。"
        jp_kanji:
          ultra_sun: "綺麗な　水辺が　主な　棲み処。\n外敵に　襲われそうに　なると\n水に　飛び込み　姿を　隠す。"
          ultra_moon: "ヒレで　まわりの　水分を　感知\nしている。　小刻みに　震えだすと\n数時間後には　雨が　降る。"
        en:
          ultra_sun: "Clean, clear waters are its usual habitat. When\nit’s about to be attacked by an invading enemy,\nit dives into the water to hide."
          ultra_moon: "It detects nearby moisture with its fin. When its\nfin begins trembling rapidly, that means rain will\nfall in a few hours."
        fr:
          ultra_sun: "On le trouve principalement dans les sources\nlimpides. Lorsqu’un ennemi est sur le point\nde l’attaquer, il plonge se réfugier dans l’eau."
          ultra_moon: "Il perçoit l’humidité ambiante grâce aux ailerons\nde sa tête. S’ils frémissent, c’est qu’il pleuvra\nd’ici quelques heures."
        it:
          ultra_sun: "Vive principalmente sulle rive più belle.\nQuando percepisce la presenza di un predatore\nsi tuffa rapidamente nell’acqua per nascondersi."
          ultra_moon: "Riesce a percepire l’umidità circostante con\nle pinne. Se cominciano a vibrare vuol dire\nche pioverà nel giro di poche ore."
        de:
          ultra_sun: "Es lebt meist an klaren Gewässern. Wittert es\neinen feindlichen Angriff, verschwindet es ins\nWasser und macht sich unsichtbar."
          ultra_moon: "Mit seinen Flossen nimmt es die Feuchtigkeit in\nseiner Umgebung wahr. Vibrieren diese, beginnt\nes in den nächsten Stunden zu regnen."
        es:
          ultra_sun: "Suele habitar en cuerpos de agua cristalina. Si\nadvierte un posible ataque enemigo, se sumerge\nbajo el agua para ocultarse."
          ultra_moon: "Sus aletas detectan la humedad del ambiente.\nSi comienzan a vibrar, es señal de que lloverá\nen las próximas horas."
        ko:
          ultra_sun: "아름다운 물가가 주요 서식지다.\n외적에게 습격당할 상황이 되면\n물로 뛰어들어 모습을 감춘다."
          ultra_moon: "지느러미로 주변의 수분을\n감지한다. 조금씩 떨기 시작하면\n수 시간 후에는 비가 내린다."
        zh_simp:
          ultra_sun: "美丽的水边是其主要的栖息地。\n如果感觉有外敌来袭，\n它就会跳入水中躲起来。"
          ultra_moon: "会通过鳍来感知周围的水分。\n如果它开始微微颤抖，\n那么数小时后就会下雨。"
        zh_trad:
          ultra_sun: "主要的棲息地是乾淨的水邊。\n一旦有遭到外敵侵襲的危險，\n就會跳進水中躲起來。"
          ultra_moon: "會用鰭感知周圍的水分。\n如果牠開始微微顫抖，\n幾個小時之後就會下雨。"
jolteon:
