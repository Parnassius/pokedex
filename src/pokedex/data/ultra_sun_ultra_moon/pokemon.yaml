electivire:
  species_id: 466
  names:
    jp_kana: エレキブル
    jp_kanji: エレキブル
    en: Electivire
    fr: Élekable
    it: Electivire
    de: Elevoltek
    es: Electivire
    ko: 에레키블
    zh_simp: 电击魔兽
    zh_trad: 電擊魔獸
  forms:
    electivire:
      form_id: 0
      base_stats:
        hp: 75
        attack: 123
        defense: 67
        special_attack: 95
        special_defense: 85
