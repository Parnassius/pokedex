          ultra_sun: "ふかい　きりの　おくに　すんでいると\nおそれ　うやまわれてきた。　みずを\nあやつる　ポニの　まもりがみだ。"
          ultra_moon: "まもりがみと　よばれるが　むやみに\nちかづく　あいてには　おそろしい\nわざわいを　もたらすこともある。"
        jp_kanji:
          ultra_sun: "深い　霧の　奥に　棲んでいると\n恐れ　敬われてきた。　水を\n操る　ポニの　守り神だ。"
          ultra_moon: "守り神と　呼ばれるが　無闇に\n近付く　相手には　恐ろしい\n災いを　もたらすこともある。"
        en:
          ultra_sun: "This guardian deity of Poni Island manipulates\nwater. Because it lives deep within a thick fog,\nit came to be both feared and revered."
          ultra_moon: "Although it’s called a guardian deity, terrible\ncalamities sometimes befall those who\nrecklessly approach Tapu Fini."
        fr:
          ultra_sun: "Gardien de Poni et maître de l’eau, il vit au plus\nprofond de la brume. C’est notamment pour\ncette raison qu’il est à la fois craint et vénéré."
          ultra_moon: "Il ne faut pas se laisser berner par son statut\nde divinité protectrice : il lui arrive de mettre en\npièces ceux qui osent s’approcher de trop près."
        it:
          ultra_sun: "Protettore di Poni, ha il potere di controllare i\nflutti. Vive in una fitta nebbia, venerato e temuto\nallo stesso tempo."
          ultra_moon: "È considerato un Pokémon protettore, ma a volte\narreca sciagure tremende a chi gli si avvicina in\nmodo avventato."
        de:
          ultra_sun: "Als Schutzpatron von Poni kontrolliert es das\nWasser und lauert im dichten Nebel. Es wird\ngleichermaßen gefürchtet wie respektiert."
          ultra_moon: "Man bezeichnet es zwar als Schutzpatron, doch\nall jene, die sich ihm unbedacht nähern, werden\nvon furchtbaren Katastrophen heimgesucht."
        es:
          ultra_sun: "El espíritu guardián de Poni, temido y venerado\na la vez. Mora en una espesa niebla y manipula\nel agua a su antojo."
          ultra_moon: "A pesar de ser un espíritu guardián, trae\ndesgracias a aquellos que se le acercan sin la\ndebida cortesía."
        ko:
          ultra_sun: "짙은 안개 속에 살고 있다고\n두려움과 존경을 받아 왔다.\n물을 조종하는 포니의 수호신이다."
          ultra_moon: "수호신으로 불리지만 무턱대고\n다가오는 상대에게는 무서운\n재앙을 가져다주는 일도 있다."
        zh_simp:
          ultra_sun: "栖息在浓雾深处而被人们敬畏着。\n是操纵着水的波尼的守护神。"
          ultra_moon: "被称为守护神，但有时会给\n随便靠近的对方带去恐怖的灾难。"
        zh_trad:
          ultra_sun: "棲息在濃霧的深處，\n受到了人們的敬畏。\n能夠操縱水，是波尼的守護神。"
          ultra_moon: "被稱為守護神，但有時\n會對隨便靠近自己的對手\n帶來恐怖的災難。"
cosmog:
  species_id: 789
  names:
    jp_kana: コスモッグ
