      descriptions:
        jp_kana:
          ultra_sun: "きほんてきに　ぼんやり　している。\nシッポが　ちぎれて　シェルダーが\nはずれてしまうと　ヤドンに　もどる。"
          ultra_moon: "シッポの　あまみを　もっと　もっと\nすすろうと　よくばった　シェルダーが\nまきがい　じょうに　へんかしたのだ。"
        jp_kanji:
          ultra_sun: "基本的に　ぼんやり　している。\nシッポが　ちぎれて　シェルダーが\n外れてしまうと　ヤドンに　戻る。"
          ultra_moon: "シッポの　甘みを　もっと　もっと\nすすろうと　欲張った　シェルダーが\n巻き貝状に　変化したのだ。"
        en:
          ultra_sun: "Spacing out is basically all it does. It turns back\ninto Slowpoke if its tail, along with Shellder,\nbreaks off."
          ultra_moon: "Shellder, in its greed to suck out more and more\nsweetness from Slowbro’s tail, has\nmetamorphosed into a spiral-shaped shell."
        fr:
          ultra_sun: "Ce Pokémon passe son temps dans l’oisiveté\nla plus totale. Sa queue se détache parfois et il\nperd son Kokiyas, redevenant ainsi un Ramoloss."
          ultra_moon: "Un Kokiyas avide s’est accroché à sa queue\npour en sucer le jus sucré et s’est transformé\npour prendre une forme en spirale."
        it:
          ultra_sun: "Ha sempre un’aria un po’ assente. Se perde la\ncoda e lo Shellder che vi è attaccato, si\ntrasforma in uno Slowpoke."
          ultra_moon: "Lo Shellder che sta attaccato alla sua coda per\nsucchiarne avidamente la dolce linfa si è\ntrasformato, assumendo una forma a spirale."
        de:
          ultra_sun: "Ein von Grund auf begriffsstutziges Pokémon.\nVerliert es seine Rute mitsamt Muschas,\nentwickelt es sich zu Flegmon zurück."
          ultra_moon: "Das Muschas an seiner Rute bekommt von dem\nsüßen Geschmack einfach nicht genug und\nmutiert für mehr Biss zu einer Spiralform."
        es:
          ultra_sun: "Vive en un estado de distracción constante.\nSi el Shellder que tiene en la cola se desprende,\nrevierte a su estadio evolutivo anterior."
          ultra_moon: "El Shellder que le muerde la cola para sorber su\ndulce savia ha terminado por transformarse en\nuna especie de caracola."
        ko:
          ultra_sun: "기본적으로 멍하니 있다.\n꼬리가 끊겨 셀러가 떨어지면\n야돈으로 돌아간다."
          ultra_moon: "꼬리의 단맛을 더 많이\n마시기 위해 욕심을 낸 셀러가\n고둥 모양으로 변화했다."
        zh_simp:
          ultra_sun: "基本上一直在发呆。\n当尾巴被切断，大舌贝脱落后，\n它就会变回呆呆兽。"
          ultra_moon: "为了能从其尾巴上吸到\n更多更多的甜味，贪吃的大舌贝\n把外壳变成了螺旋状的样子。"
        zh_trad:
          ultra_sun: "基本上一直在發呆。\n當尾巴斷掉，大舌貝脫落後\n就會變回呆呆獸。"
          ultra_moon: "為了能夠從尾巴上吸到更多的\n甘美精華，貪吃的大舌貝\n把外殼變化成了螺旋狀。"
    slowbro_mega:
      form_id: 1
      names:
        jp_kana: メガヤドラン
        jp_kanji: メガヤドラン
        en: Mega Slowbro
        fr: Méga-Flagadoss
        it: MegaSlowbro
        de: Mega-Lahmus
        es: Mega-Slowbro
        ko: 메가야도란
        zh_simp: 超级呆壳兽
        zh_trad: 超級呆殼獸
      base_stats:
        hp: 95
        attack: 75
        defense: 180
        special_attack: 130
        special_defense: 80
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - shell_armor
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          ultra_sun: "すさまじい　エネルギーが　シッポの\nシェルダーの　ちからを　きょうかした。\nヤドンには　とくに　えいきょうなし。"
          ultra_moon: "シェルダーに　まるのみ　されて\nてっぺきの　まもりを　てに　いれた。\nなかは　けっこう　かいてき　なのだ。"
        jp_kanji:
          ultra_sun: "凄まじい　エネルギーが　シッポの\nシェルダーの　力を　強化した。\nヤドンには　特に　影響なし。"
          ultra_moon: "シェルダーに　丸呑み　されて\n鉄壁の　守りを　手に　入れた。\n中は　結構　快適　なのだ。"
        en:
          ultra_sun: "Tremendous energy strengthened the power of\nthe Shellder on its tail, but it doesn’t really\naffect Slowpoke."
          ultra_moon: "Having been swallowed whole by Shellder,\nSlowbro now has an iron defense. It’s pretty\ncomfortable in there, too."
        fr:
          ultra_sun: "Toute l’énergie de la Méga-Évolution a profité\nau Kokiyas accroché à sa queue. Le Ramoloss,\nlui, n’a pas changé."
          ultra_moon: "Il est complètement enveloppé dans le Kokiyas,\nqui forme un cocon impénétrable, mais somme\ntoute plutôt confortable."
        it:
          ultra_sun: "Un’energia formidabile ha potenziato lo Shellder\nattaccato alla coda. Lo Slowpoke, invece, non\nsembra aver subito cambiamenti."
          ultra_moon: "Viene completamente inghiottito da Shellder\nche gli fornisce un riparo impenetrabile e\npiuttosto confortevole."
        de:
          ultra_sun: "Gewaltige Energiemengen haben zwar das\nMuschas an seiner Rute gestärkt, auf Flegmon\nhatten sie aber keinen besonderen Einfluss."
          ultra_moon: "Muschas verschlang es in einem Stück, wodurch\nes nun durch einen undurchdringbaren Panzer\ngeschützt ist. Im Inneren ist es bequem."
        es:
          ultra_sun: "La descomunal energía de esta evolución recae\nsobre el Shellder que porta en la cola, mientras\nque casi no afecta al propio Slowpoke."
          ultra_moon: "El Shellder ha engullido a Slowbro por completo,\naportándole una defensa impenetrable cuyo\ninterior resulta muy agradable."
        ko:
          ultra_sun: "굉장한 에너지가 꼬리의\n셀러의 힘을 강화했다.\n야돈에게 특별히 영향은 없다."
          ultra_moon: "셀러에게 통째로 삼켜져서\n철벽의 방어를 손에 넣었다.\n안은 꽤 쾌적하다."
        zh_simp:
          ultra_sun: "惊人的能量强化了\n尾巴上大舌贝的力量。\n对呆呆兽倒没什么影响。"
          ultra_moon: "被大舌贝整个吞下后，\n它获得了铜墙铁壁般的防御力。\n里面待起来相当舒适。"
        zh_trad:
          ultra_sun: "驚人的能量強化了\n尾巴上大舌貝的力量。\n對呆呆獸倒是沒什麼影響。"
          ultra_moon: "被大舌貝整個吞下後，\n獲得了銅牆鐵壁般的防禦力。\n裡面待起來相當舒適。"
magnemite:
  species_id: 81
  names:
    jp_kana: コイル
    jp_kanji: コイル
    en: Magnemite
    fr: Magnéti
    it: Magnemite
    de: Magnetilo
    es: Magnemite
    ko: 코일
    zh_simp: 小磁怪
    zh_trad: 小磁怪
  forms:
    magnemite:
      form_id: 0
      base_stats:
        hp: 25
        attack: 35
        defense: 70
        special_attack: 95
        special_defense: 55
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
