      descriptions:
        jp_kana:
          ultra_sun: "オスは　メスの　ほぼ　いいなり。\nとった　エサも　ほとんど　みつぐので\nえいようぶそくで　しんか　できない。"
          ultra_moon: "どくガスで　あいてを　フラフラに\nよわらせてから　おそう。　いつも\nフラフラしてる　パッチールは　にがて。"
        jp_kanji:
          ultra_sun: "オスは　メスの　ほぼ　いいなり。\n獲った　エサも　ほとんど　貢ぐので\n栄養不足で　進化　できない。"
          ultra_moon: "毒ガスで　相手を　フラフラに\n弱らせてから　襲う。　いつも\nフラフラしてる　パッチールは　苦手。"
        en:
          ultra_sun: "The males will do whatever the females tell\nthem. They give the females most of their food.\nDue to malnutrition, the males can’t evolve."
          ultra_moon: "It weakens opponents and sends them\nreeling with its poisonous gas. Salandit doesn’t\ndeal well with Spinda, since it’s always reeling."
        fr:
          ultra_sun: "La femelle domine le mâle, qui ne peut évoluer\nen raison de carences nutritionnelles. Il lui offre\nen effet presque toutes ses proies en tribut."
          ultra_moon: "Il attaque après avoir fait chanceler ses ennemis\navec son gaz toxique. Cela ne fonctionne pas\ntrès bien sur les Spinda, chancelants de base."
        it:
          ultra_sun: "I maschi di Salandit sono del tutto in balia delle\nfemmine, a cui offrono ogni preda catturata.\nNon si evolvono a causa della malnutrizione."
          ultra_moon: "Fa barcollare il nemico con un gas velenoso per\npoi attaccarlo. Spinda, che barcolla già di suo,\nlo mette molto in difficoltà."
        de:
          ultra_sun: "Das Männchen ist dem Weibchen hörig. Da es\ndiesem fast seine gesamte Beute gibt, leidet es\nan Unterernährung und entwickelt sich nicht."
          ultra_moon: "Es bringt Gegner mit Giftgas ins Taumeln und\nschlägt dann zu. Mit Pandir, die von Natur aus\ntaumeln, kommt es deshalb gar nicht klar."
        es:
          ultra_sun: "Los machos están a merced de las hembras.\nLes ceden la mayoría de presas que capturan,\ny la falta de nutrientes les impide evolucionar."
          ultra_moon: "Debilita a sus presas con gas venenoso y ataca\ncuando ve que se tambalean. Spinda, que de por\nsí camina oscilando, suele darle problemas."
        ko:
          ultra_sun: "수컷은 거의 암컷의 지시에 따른다.\n잡아 온 먹이도 거의 바치기 때문에\n영양 부족으로 진화할 수 없다."
          ultra_moon: "독가스로 상대를 비틀비틀\n약하게 만든 뒤 덮친다. 언제나\n비틀거리는 얼루기에게 약하다."
        zh_simp:
          ultra_sun: "雄性基本对雌性唯命是从。\n获得的食物也基本都会上缴，\n所以因营养不足而无法进化。"
          ultra_moon: "先用毒瓦斯让对手变得晕乎乎，\n对方变虚弱后，再发动袭击。\n不擅长对付总是晕乎乎的晃晃斑。"
        zh_trad:
          ultra_sun: "雄性對雌性幾乎是唯命是從。\n因為獲得的食物幾乎都獻給了雌性，\n所以雄性因為營養不足而無法進化。"
          ultra_moon: "會先用毒氣讓對手衰弱到站都站不穩，\n然後再發動襲擊。不擅長應付\n總是一副站不穩樣子的晃晃斑。"
salazzle:
  species_id: 758
