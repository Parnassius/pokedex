      descriptions:
        jp_kana:
          ultra_sun: "ゆうがな　ダンスで　てきの　こころを\nリラックスさせ　ゆだんした　ところに\nサイコパワーを　あびせかける。"
          ultra_moon: "うすもものミツを　すった　オドリドリ。\nおどっている　ときは　トレーナーの\nしじが　きこえないほど　マイペース。"
        jp_kanji:
          ultra_sun: "優雅な　ダンスで　敵の　心を\nリラックスさせ　油断した　ところに\nサイコパワーを　浴びせかける。"
          ultra_moon: "うすもものミツを　吸った　オドリドリ。\n踊っている　ときは　トレーナーの\n指示が　聞こえないほど　マイペース。"
        en:
          ultra_sun: "It relaxes its opponents with its elegant dancing.\nWhen they let their guard down, it showers\nthem with psychic energy."
          ultra_moon: "This Oricorio has sipped pink nectar. It gets so\ncaught up in its dancing that it sometimes\ndoesn’t hear its Trainer’s orders."
        fr:
          ultra_sun: "Il détend ses ennemis avec une danse élégante,\net profite de leur inattention pour les frapper\nde ses pouvoirs psychiques."
          ultra_moon: "Un Plumeline ayant bu du Nectar Rose. Il est\ntellement transporté par sa danse qu’il n’entend\npas les instructions de son Dresseur."
        it:
          ultra_sun: "Fa rilassare il nemico con una danza raffinata\ne approfitta della sua distrazione per colpirlo\ncon i suoi poteri psichici."
          ultra_moon: "Un Oricorio che si è nutrito di Nettare rosa.\nDanza con un tale trasporto che non sente\nneanche le indicazioni del suo Allenatore."
        de:
          ultra_sun: "Sein eleganter Tanz verleitet den Gegner zur\nNachlässigkeit, was es dazu nutzt, seine\nPsycho-Kräfte auf ihn abzufeuern."
          ultra_moon: "Ein Choreogel, das rosa Nektar geschlürft hat.\nWährend es tanzt, wird alles andere für es zur\nNebensache, selbst die Befehle seines Trainers."
        es:
          ultra_sun: "Con su elegante danza tranquiliza al enemigo.\nEn cuanto este baja la guardia, lo ataca con\nsus poderes psíquicos."
          ultra_moon: "Forma que toma Oricorio al libar Néctar Rosa.\nSe relaja tanto cuando está bailando que deja\nde oír las órdenes de su Entrenador."
        ko:
          ultra_sun: "우아한 댄스로 적의 마음을\n진정시키고 방심한 틈을 타\n사이코 파워를 퍼붓는다."
          ultra_moon: "연분홍꿀을 빨아들인 춤추새.\n춤을 출 때는 트레이너의 지시가\n들리지 않을 정도로 마이페이스다."
        zh_simp:
          ultra_sun: "用优雅的舞蹈放松敌人的心，\n趁其麻痹大意时释放出精神力量。"
          ultra_moon: "吸食了桃粉色花蜜的花舞鸟。\n跳舞的时候会随心所欲，\n连训练家的指示都听不见。"
        zh_trad:
          ultra_sun: "會用優雅的舞蹈讓敵人放鬆，\n然後趁敵人疏忽大意的時候\n釋放出精神力量。"
          ultra_moon: "吸食了桃粉色花蜜的花舞鳥。\n跳舞的時候總是隨心所欲，\n連訓練家的指令都聽不見。"
