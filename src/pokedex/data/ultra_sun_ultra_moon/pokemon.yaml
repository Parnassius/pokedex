      descriptions:
        jp_kana:
          ultra_sun: "そだつに　つれて　きしょうは　あらく\nこうげきてきに　なる。　もてあまして\nすてる　トレーナーも　すくなくない。"
          ultra_moon: "くびの　いわを　こすりつけてくるのは\nしんあいの　あかし。　ただし　いわは\nするどいので　かなり　いたいぞ。"
        jp_kanji:
          ultra_sun: "育つに　つれて　気性は　荒く\n攻撃的に　なる。　持て余して\n捨てる　トレーナーも　少なくない。"
          ultra_moon: "首の　岩を　こすりつけてくるのは\n親愛の　証。　ただし　岩は\n鋭いので　かなり　痛いぞ。"
        en:
          ultra_sun: "As they develop, their disposition grows more\nviolent and aggressive. Many Trainers find them\ntoo much to handle and abandon them."
          ultra_moon: "When it rubs the rocks on its neck against you,\nthat’s proof of its love for you. However, the\nrocks are sharp, so the gesture is quite painful!"
        fr:
          ultra_sun: "Il devient de plus en plus sauvage et agressif en\ngrandissant. Il n’est pas rare que son Dresseur\nl’abandonne, ne sachant plus qu’en faire."
          ultra_moon: "Il frotte les cailloux pointus de son cou\ncontre son Dresseur en signe d’affection.\nC’est adorable, mais douloureux."
        it:
          ultra_sun: "Più cresce e più diventa impetuoso e aggressivo.\nNon sono pochi gli Allenatori che se ne liberano\nquando non sono più in grado di gestirlo."
          ultra_moon: "Sfrega le appuntite pietre del suo collo\naddosso agli altri. È un segno di affetto\nabbastanza doloroso!"
        de:
          ultra_sun: "Mit dem Alter werden sie immer angriffslustiger\nund wilder. Trainer, die damit nicht umgehen\nkönnen, setzen sie deshalb oft aus."
          ultra_moon: "Reibt es seinen steinernen Fellkragen an einem\nTrainer, ist das ein Zeichen seiner Zuneigung. Da\ner jedoch scharf ist, besteht Verletzungsgefahr."
        es:
          ultra_sun: "A medida que crece, se vuelve más salvaje y\nagresivo. No son pocos los Entrenadores que\nse deshacen de él por no poder controlarlo."
          ultra_moon: "Restriega las rocas que tiene en el cuello contra\nsu Entrenador como señal de afecto, pero son\ntan puntiagudas que hacen bastante daño."
        ko:
          ultra_sun: "자라면서 거칠고 공격적으로\n변한다. 감당이 안 돼서\n버리는 트레이너도 적지 않다."
          ultra_moon: "목에 있는 바위를 비벼대는 것은\n친밀하다는 증거다. 단 바위는\n날카로워서 꽤 아프다."
        zh_simp:
          ultra_sun: "随着成长，性格也会变得\n粗暴而有攻击性。因难以应付\n而丢弃它的训练家也不少。"
          ultra_moon: "把脖子上的岩石蹭过来是\n感情深厚的证明。\n但是岩石很锋利，相当疼。"
        zh_trad:
          ultra_sun: "在成長的過程中，性情會漸漸\n變得粗暴而有攻擊性。也有不少\n訓練家因為應付不了而遺棄牠。"
          ultra_moon: "會用脖子上的岩石來摩蹭，\n代表彼此感情深厚。但因為\n岩石很銳利，所以會很痛。"
