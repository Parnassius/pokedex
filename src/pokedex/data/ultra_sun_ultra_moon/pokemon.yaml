      descriptions:
        jp_kana:
          ultra_sun: "いしきを　どうちょうさせて　あいての\nきもちを　りかい。　ひとの　おせわを\nするのに　べんりな　のうりょく。"
          ultra_moon: "およそ　５００ねんまえ　かがくしゃに\nよって　つくられた。　ソウルハートと\nよばれる　パーツが　ほんたいなのだ。"
        jp_kanji:
          ultra_sun: "意識を　同調させて　相手の\n気持ちを　理解。　人の　お世話を\nするのに　便利な　能力。"
          ultra_moon: "およそ　５００年前　科学者に\nよって　作られた。　ソウルハートと\n呼ばれる　パーツが　本体なのだ。"
        en:
          ultra_sun: "It synchronizes its consciousness with others\nto understand their feelings. This faculty makes\nit useful for taking care of people."
          ultra_moon: "Built roughly 500 years ago by a scientist,\nthe part called the Soul-Heart is the\nactual life-form."
        fr:
          ultra_sun: "Il accède à la conscience des individus en\nse synchronisant avec eux. Cette faculté\nl’aide à prendre soin d’eux."
          ultra_moon: "Il a été créé par un scientifique il y a environ\n500 ans de cela. Sa véritable essence est\nun organe nommé Animacœur."
        it:
          ultra_sun: "Sincronizzando la sua coscienza a quella degli\naltri, riesce a capire il loro stato d’animo. Grazie\na quest’abilità si prende cura degli esseri umani."
          ultra_moon: "Fu costruito circa 500 anni fa da uno scienziato.\nLa sua vera essenza si trova in un componente\nchiamato “Cuoreanima”."
        de:
          ultra_sun: "Es synchronisiert sein Bewusstsein mit dem\nanderer, um ihre Gefühle zu verstehen. Dadurch\nfällt es ihm leicht, Menschen zu helfen."
          ultra_moon: "Es wurde vor ungefähr 500 Jahren von einem\nWissenschaftler erschaffen. Sein eigentlicher\nKörper ist der als „Seelenherz“ bezeichnete Teil."
        es:
          ultra_sun: "Sincroniza su consciencia con la de los demás\npara comprender sus sentimientos. Utiliza esta\ncapacidad para cuidar de las personas."
          ultra_moon: "Pokémon artificial creado por científicos hace\nunos 500 años. Su verdadera esencia es una\npieza llamada Coránima."
        ko:
          ultra_sun: "의식을 동조시켜 상대의\n마음을 이해한다. 사람을\n도울 때 편리한 능력이다."
          ultra_moon: "약 500년 전 과학자에 의해\n만들어졌다. 소울하트라고\n불리는 파츠가 본체다."
        zh_simp:
          ultra_sun: "能够让意识同步，理解对方的心情。\n用来照料人的话是很方便的能力。"
          ultra_moon: "大约５００年前由科学家制作而成。\n被称为魂心的部分是它的本体。"
        zh_trad:
          ultra_sun: "能夠讓意識同步，\n藉此理解對方的心情。\n在照顧別人時是很方便的能力。"
          ultra_moon: "由大約５００年前的\n科學家所製造。\n本體是被稱為魂心的零件。"
    magearna_original_color:
