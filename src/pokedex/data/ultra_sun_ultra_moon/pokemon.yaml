clefairy:
  species_id: 35
  names:
    jp_kana: ピッピ
    jp_kanji: ピッピ
    en: Clefairy
    fr: Mélofée
    it: Clefairy
    de: Piepi
    es: Clefairy
    ko: 삐삐
    zh_simp: 皮皮
    zh_trad: 皮皮
  forms:
    clefairy:
      form_id: 0
      base_stats:
        hp: 70
        attack: 45
        defense: 48
        special_attack: 60
        special_defense: 65
        speed: 35
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - cute_charm
        - magic_guard
      hidden_ability: friend_guard
      held_items:
        rare: moon_stone
      descriptions:
        jp_kana:
          ultra_sun: "にんきだが　かずが　すくないので\nきちょう。　むやみに　みせびらかすと\nどろぼうに　ねらわれるぞ。"
          ultra_moon: "つきあかりを　あびた　つばさは\nあわく　かがやき　はばたかなくとも\nちゅうに　うかんで　まいおどる。"
        jp_kanji:
          ultra_sun: "人気だが　数が　少ないので\n貴重。　むやみに　見せびらかすと\n泥棒に　狙われるぞ。"
          ultra_moon: "月明かりを　浴びた　翼は\n淡く　輝き　羽ばたかなくとも\n宙に　浮かんで　舞い踊る。"
        en:
          ultra_sun: "They’re popular, but they’re rare. Trainers who\nshow them off recklessly may be targeted\nby thieves."
          ultra_moon: "Bathed in moonlight, its wings glow faintly.\nWithout even flapping, Clefairy rises into the air,\nwhere it dances around."
        fr:
          ultra_sun: "Il est très rare en dépit de sa popularité. Ne le\nlaissez pas sans surveillance, car il risquerait\nde se faire dérober par un voleur de Pokémon !"
          ultra_moon: "Quand ses ailes absorbent la lumière de la lune,\nelles brillent légèrement et le font léviter pour\nlui permettre de danser dans les airs."
        it:
          ultra_sun: "Questo Pokémon molto popolare è piuttosto raro\ne prezioso. È meglio evitare di metterlo troppo in\nmostra, o si corre il rischio di farselo rubare."
          ultra_moon: "Danza librandosi a mezz’aria senza sbattere\nle ali, che al chiarore della luna emettono un\ndebole scintillio."
        de:
          ultra_sun: "Dieses beliebte Pokémon hat Seltenheitswert.\nWer leichtsinnig damit prahlt, eins zu haben,\nkönnte in das Visier von Dieben geraten."
          ultra_moon: "Im Mondlicht erstrahlen seine Flügel in sanftem\nSchein und lassen es auch ohne Flügelschlag\nin der Luft schwebend tanzen."
        es:
          ultra_sun: "Es muy popular y la escasez de ejemplares lo\nhace muy valioso. Quien presume mucho de\ntener uno se arriesga a que se lo roben."
          ultra_moon: "Cuando la luz de la luna baña sus alas, estas\nemiten un tenue brillo y, sin batirlas siquiera,\nlevita en el aire y comienza a bailar."
        ko:
          ultra_sun: "인기가 있지만, 개체 수가 적어\n귀하다. 함부로 자랑하다가는\n도둑의 타깃이 된다."
          ultra_moon: "달빛에 비친 날개는 희미하게\n빛나고 날갯짓하지 않아도\n허공을 떠다니며 춤을 춘다."
        zh_simp:
          ultra_sun: "虽然深受人们的喜爱，但由于数量稀少\n故而十分珍贵。如果随便把它\n带出来炫耀，就会被小偷盯上哦。"
          ultra_moon: "沐浴着月光的翅膀会发出\n淡淡的光辉。即便不挥动翅膀，\n它也能浮在空中翩翩起舞。"
        zh_trad:
          ultra_sun: "深受人們喜愛，但因為數量稀少\n所以十分珍貴。如果隨便把牠\n帶出來炫耀，就會被小偷盯上哦。"
          ultra_moon: "沐浴著月光的翅膀會發出\n淡淡的光輝，不需要振翅\n就能浮在空中翩翩起舞。"
