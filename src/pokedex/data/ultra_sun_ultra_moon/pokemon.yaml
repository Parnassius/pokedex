        jp_kana:
          ultra_sun: "かんぜんな　ふくげんは　ふかのうで\nじつは　ぜんしんに　うもうの　ような\nけが　あるのではという　せつがある。"
          ultra_moon: "こだいの　おうじゃ。　おおアゴの\nちからは　すさまじく　じどうしゃも\nかんたんに　かみちぎってしまう。"
        jp_kanji:
          ultra_sun: "完全な　復元は　不可能で\n実は　全身に　羽毛の　ような\n毛が　あるのではという　説がある。"
          ultra_moon: "古代の　王者。　大アゴの\n力は　凄まじく　自動車も\n簡単に　噛みちぎってしまう。"
        en:
          ultra_sun: "Complete restoration is impossible, allowing\nroom for theories that its entire body was\nonce covered in a feather-like coat."
          ultra_moon: "The king of the ancient world, it can easily\ncrunch a car with the devastating strength\nof its enormous jaws."
        fr:
          ultra_sun: "La reconstitution de Pokémon est un art\nimparfait. D’aucuns pensent même qu’il était en\nfait couvert d’une robe semblable à un plumage."
          ultra_moon: "Il régnait sur le monde en maître incontesté.\nSa mâchoire est si puissante qu’il n’a aucun\nmal à croquer une voiture."
        it:
          ultra_sun: "Sembra che non si riesca a rigenerarlo alla\nperfezione. Secondo alcune teorie il suo corpo\nera ricoperto da un manto simile a un piumaggio."
          ultra_moon: "Regnava incontrastato nell’era preistorica.\nLa sua enorme mandibola è così potente che\npuò masticare facilmente anche un’automobile."
        de:
          ultra_sun: "Es kann nicht originalgetreu aus Fossilien\nzurückverwandelt werden. Theorien zufolge\numgab seinen Körper einst eine Art Federkleid."
          ultra_moon: "Ein urzeitlicher Regent. Mit seinem extrem\nstarken Kiefer kann Monargoras selbst Autos\nspielend leicht durchbeißen."
        es:
          ultra_sun: "Según algunas teorías, este Pokémon no es una\nrecreación exacta del de épocas pasadas, ya\nque debería estar recubierto de plumas."
          ultra_moon: "Antaño era considerado un rey indiscutible. El\nbrutal poder de su mandíbula le permite triturar\nun coche con suma facilidad."
        ko:
          ultra_sun: "완전한 복원은 불가능해서\n사실은 전신에 깃털 같은\n털이 있을 것이라는 설도 있다."
          ultra_moon: "고대의 왕. 큰 턱은\n힘이 엄청나서 자동차도\n간단하게 물어뜯어 버린다."
        zh_simp:
          ultra_sun: "有说法，要完全复原是不可能的，\n实际上它全身都是羽毛一样的毛发。"
          ultra_moon: "是古代的王者。\n大颚的力量很惊人，\n连汽车也能轻易咬碎。"
        zh_trad:
          ultra_sun: "要完全復原牠是不可能的。\n有人說牠全身上下\n其實覆滿了羽毛般的體毛。"
          ultra_moon: "古代的王者。\n大顎的力量非常驚人，\n連汽車也能輕易咬碎。"
amaura:
  species_id: 698
  names:
    jp_kana: アマルス
    jp_kanji: アマルス
    en: Amaura
    fr: Amagara
    it: Amaura
    de: Amarino
    es: Amaura
    ko: 아마루스
    zh_simp: 冰雪龙
    zh_trad: 冰雪龍
  forms:
    amaura:
      form_id: 0
      base_stats:
        hp: 77
        attack: 59
        defense: 50
        special_attack: 67
        special_defense: 63
