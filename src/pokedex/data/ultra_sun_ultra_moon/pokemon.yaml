      types:
        - ghost
        - ground
      egg_groups:
        - amorphous
      abilities:
        - water_compaction
      hidden_ability: sand_veil
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ultra_sun: "あたまの　スコップは　おきにいり。\nとりかえしにきた　こどもと　ケンカ。\nムキに　なって　なぐりあいに　なる。"
          ultra_moon: "すなあそびで　つくった　すなやまは\nかえるとき　こわさないと　たましいが\nやどり　スナバァに　なるかもしれない。"
        jp_kanji:
          ultra_sun: "頭の　スコップは　お気に入り。\n取り返しに　来た　子どもと　ケンカ。\nムキに　なって　殴り合いに　なる。"
          ultra_moon: "砂遊びで　作った　砂山は\n帰るとき　壊さないと　魂が\n宿り　スナバァに　なるかもしれない。"
        en:
          ultra_sun: "It likes the shovel on its head, so Sandygast\nwill get serious and fight any children who come\nto take it back."
          ultra_moon: "If you build sand mounds when you’re playing,\ndestroy them before you go home, or they\nmay get possessed and become Sandygast."
        fr:
          ultra_sun: "Il tient beaucoup à la pelle sur sa tête.\nSi un enfant cherche à la récupérer, il se bat\nsans retenir ses coups pour la garder."
          ultra_moon: "Détruisez vos pâtés de sable avant de rentrer\nchez vous, sinon une âme pourrait les posséder\net les transformer en Bacabouh."
        it:
          ultra_sun: "È affezionato alla paletta che ha nel capo.\nSe arriva un bambino per riprendersela,\nsi scatena una vera e propria zuffa."
          ultra_moon: "A fine giornata bisognerebbe disperdere la\nsabbia ammucchiata, altrimenti uno spirito\npotrebbe animarla e generare un Sandygast."
        de:
          ultra_sun: "Die Schaufel auf seinem Kopf ist sein größter\nSchatz. Versucht ein Kind, sich seine Schaufel\nzurückzuholen, gibt es diese nicht kampflos auf."
          ultra_moon: "Lässt man beim Spielen gebaute Sandhaufen\nzurück, kann es vorkommen, dass sich eine\nSeele dort einnistet und ein Sankabuh entsteht."
        es:
          ultra_sun: "Siente mucho apego por la pala de su cabeza.\nSi un niño intenta quitársela, se enfurece y pelea\npor ella."
          ultra_moon: "Los montículos de arena que los niños no allanan\nantes de irse a casa pueden acabar poseídos\npor un espíritu y convertirse en este Pokémon."
        ko:
          ultra_sun: "머리의 삽을 마음에 들어한다.\n되찾으러 온 아이와 싸우다가\n열을 올리면서 치고 받고 싸운다."
          ultra_moon: "모래장난으로 만든 모래산은\n돌아갈 때 부수지 않으면 영혼이\n깃들어서 모래꿍이 될지도 모른다."
        zh_simp:
          ultra_sun: "很喜欢头上的小铲子,\n会和回来拿的孩子打架。\n互相打着打着就当真了。"
          ultra_moon: "玩沙子时堆成的沙山，\n如果没有在回家时破坏掉，\n就有可能会被魂魄附着，成为沙丘娃。"
        zh_trad:
          ultra_sun: "很喜歡頭上的鏟子。\n會和來拿回鏟子的孩子打架，\n打著打著往往會真的互毆起來。"
          ultra_moon: "玩沙時堆成的沙山如果沒有\n在回家時破壞掉，就有可能\n被靈魂附上而變成沙丘娃。"
palossand:
  species_id: 770
  names:
    jp_kana: シロデスナ
    jp_kanji: シロデスナ
    en: Palossand
    fr: Trépassable
    it: Palossand
    de: Colossand
    es: Palossand
    ko: 모래성이당
    zh_simp: 噬沙堡爷
    zh_trad: 噬沙堡爺
  forms:
    palossand:
      form_id: 0
      base_stats:
        hp: 85
        attack: 75
        defense: 110
        special_attack: 100
        special_defense: 75
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - ground
      egg_groups:
        - amorphous
      abilities:
        - water_compaction
      hidden_ability: sand_veil
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ultra_sun: "ひとつぶの　すなにも　いしが　ある。\nちいさな　ポケモンを　のみこみ\nいきたまま　せいきを　うばう。"
          ultra_moon: "すなあらしを　まきおこし　あいての\nみうごきを　ふうじてから　せいきを\nうばう　おそろしい　ポケモンだ。"
        jp_kanji:
          ultra_sun: "一粒の　砂にも　意思が　ある。\n小さな　ポケモンを　呑み込み\n生きたまま　生気を　奪う。"
          ultra_moon: "砂嵐を　巻き起こし　相手の\n身動きを　封じてから　生気を\n奪う　恐ろしい　ポケモンだ。"
        en:
          ultra_sun: "Each of its grains of sand has its own will.\nPalossand eats small Pokémon and siphons\naway their vital essence while they’re still alive."
          ultra_moon: "Once it has whipped up a sandstorm to halt\nits opponents in their tracks, this terrifying\nPokémon snatches away their vitality."
        fr:
          ultra_sun: "Chacun de ses grains de sable a sa volonté\npropre. Trépassable gobe de petits Pokémon\npour absorber leur énergie vitale."
          ultra_moon: "Ce terrifiant Pokémon déclenche des tempêtes\nde sable pour immobiliser ses victimes, puis\nabsorbe leur énergie vitale."
        it:
          ultra_sun: "Ognuno dei suoi granelli ha una volontà propria.\nInghiotte vivi i Pokémon più piccoli e ne ruba\nl’energia vitale."
          ultra_moon: "Questo temibile Pokémon immobilizza i nemici\ncon una tempesta di sabbia per poi rubarne\nl’energia vitale."
        de:
          ultra_sun: "Jedes einzelne seiner Körner verfügt über einen\neigenen Willen. Kleine Pokémon verschluckt es\nlebendig und saugt ihnen die Lebensenergie aus."
          ultra_moon: "Ein grauenvolles Pokémon, das seine Feinde in\neinen Sandsturm einschließt, um sie dann ihrer\nLebensenergie zu berauben."
        es:
          ultra_sun: "Cada grano de arena de su cuerpo tiene\nvoluntad propia. Engulle a Pokémon pequeños\nestando aún vivos para robarles la energía vital."
          ultra_moon: "Este temible Pokémon crea tormentas de arena\nque impiden moverse a sus víctimas y después\nles arrebata su energía vital."
        ko:
          ultra_sun: "한 알의 모래에도 의지가 있다.\n작은 포켓몬을 산 채로 삼켜서\n생기를 뺏는다."
          ultra_moon: "모래바람을 일으켜서 상대의\n움직임을 봉인하고 생기를\n뺏는 무서운 포켓몬이다."
        zh_simp:
          ultra_sun: "即使是一粒沙子也有思想。\n会吞下小型的宝可梦，\n活生生地夺走对方的生命气息。"
          ultra_moon: "会卷起沙暴，封住对手的行动后\n再夺走其生命气息，\n是恐怖的宝可梦。"
        zh_trad:
          ultra_sun: "每一粒沙子都有意識。\n會活生生吞下小型寶可夢，\n奪走對方的精氣。"
          ultra_moon: "會捲起沙暴封住對手的行動，\n然後奪走對手的精氣，\n是一種很可怕的寶可夢。"
pyukumuku:
