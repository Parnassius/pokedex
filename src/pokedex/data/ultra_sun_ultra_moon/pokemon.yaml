      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "あめに　うたれると　このすがたに\nへんかする。　みずで　すこしだけ\nからだが　ふくらみ　ブヨブヨしている。"
          ultra_moon: "あめに　うたれる　ポワルンの　すがた。\nシャワーを　あびせた　じっけんでは\nこの　かたちに　へんかしなかった。"
        jp_kanji:
          ultra_sun: "雨に　打たれると　この姿に\n変化する。　水で　少しだけ\n身体が　ふくらみ　ブヨブヨしている。"
          ultra_moon: "雨に　打たれる　ポワルンの　姿。\nシャワーを　浴びせた　実験では\nこの　形に　変化しなかった。"
        en:
          ultra_sun: "Castform changes to this form when rain hits it.\nIts body is soft and slightly swollen with water."
          ultra_moon: "This is Castform’s form when pelted by rain. In\nan experiment where it was placed in a shower,\nthis Pokémon didn’t change to this form."
        fr:
          ultra_sun: "Morphéo adopte cette apparence quand il est\nfrappé par la pluie. L’eau gonfle légèrement son\ncorps et lui donne une consistance gélatineuse."
          ultra_moon: "Morphéo adopte cette apparence uniquement\nles jours de pluie. On a tenté de reproduire\nce phénomène sous une douche, sans succès."
        it:
          ultra_sun: "È la forma di Castform quando è bagnato dalla\npioggia. Con l’acqua si gonfia leggermente e\ndiventa molle."
          ultra_moon: "È la forma di Castform quando è bagnato dalla\npioggia. Come dimostrato, non è sufficiente\nmetterlo sotto la doccia per farlo trasformare..."
        de:
          ultra_sun: "Diese Gestalt nimmt Formeo an, wenn Regen auf\nes niederprasselt. Sein Körper ist dann weich\nund hat etwas Wasser aufgesogen."
          ultra_moon: "Diese Gestalt nimmt Formeo an Regentagen an.\nVersuche, diesen Wandel künstlich mithilfe einer\nDusche herbeizuführen, schlugen fehl."
        es:
          ultra_sun: "Castform adopta esta forma cuando llueve.\nDebido a la absorción de agua, su cuerpo\nresulta esponjoso al tacto."
          ultra_moon: "Castform adopta esta forma cuando llueve.\nPonerlo bajo la ducha no basta para obtener\nesta transformación."
        ko:
          ultra_sun: "비를 맞으면 이 모습으로\n변화한다. 물로 조금\n몸이 부풀어 올라 말랑말랑하다."
          ultra_moon: "비를 맞은 캐스퐁의 모습.\n샤워기로 물을 뿌린 실험에서는\n이 모습으로 변화하지 않았다."
        zh_simp:
          ultra_sun: "被雨淋到后，就会变成这个样子。\n身体遇水会稍稍有点膨胀，软绵绵的。"
          ultra_moon: "被雨淋到时飘浮泡泡的样子。\n在让它淋浴的实验里，\n没有变成这个形态。"
        zh_trad:
          ultra_sun: "被雨淋到時就會變成這個樣子。\n身體因為水分而脹了起來，\n變得胖嘟嘟的。"
          ultra_moon: "飄浮泡泡被雨淋到時的樣子。\n在讓牠淋浴的實驗裡，\n牠並沒有變成這種形態。"
    castform_snowy_form:
      form_id: 3
      names:
        jp_kana: ゆきぐものすがた
        jp_kanji: ゆきぐものすがた
        en: Snowy Form
        fr: Forme Blizzard
        it: Forma Nuvola di Neve
        de: Schneeform
        es: Forma Nieve
        ko: 설운의 모습
        zh_simp: 雪云的样子
        zh_trad: 雪雲的樣子
      base_stats:
        hp: 70
        attack: 70
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - amorphous
      abilities:
        - forecast
      held_items:
        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "あられを　あびる　ポワルンの　すがた。\nれいとうこに　いれる　じっけんでは\nこの　かたちに　へんかしなかった。"
          ultra_moon: "あられに　うたれると　この　すがたに\nへんかする。　ぜんしん　つめたく\nひふは　すこし　こおっているぞ。"
        jp_kanji:
          ultra_sun: "霰を　浴びる　ポワルンの　姿。\n冷凍庫に　入れる　実験では\nこの　形に　変化しなかった。"
          ultra_moon: "霰に　打たれると　この　姿に\n変化する。　全身　冷たく\n皮膚は　少し　凍っているぞ。"
        en:
          ultra_sun: "This is the form Castform takes when hit by\nhail. In an experiment where it was placed in a\nfreezer, it didn’t change to this form."
          ultra_moon: "This is Castform’s form when caught in a\nhailstorm. Its whole body is chilled, and its skin\nis partially frozen!"
        fr:
          ultra_sun: "Morphéo adopte cette apparence uniquement\nles jours enneigés. On a tenté de reproduire ce\nphénomène avec un congélateur, sans succès."
          ultra_moon: "Morphéo adopte cette apparence quand il est\nfrappé par la grêle. Tout son corps est froid\net sa peau est légèrement givrée."
        it:
          ultra_sun: "È la forma di Castform quando grandina.\nCome dimostrato, non è sufficiente metterlo nel\ncongelatore per farlo trasformare..."
          ultra_moon: "È la forma di Castform quando grandina.\nIl suo corpo si raffredda e la sua pelle, in parte,\nè ghiacciata."
        de:
          ultra_sun: "Diese Gestalt nimmt Formeo an, wenn es hagelt.\nVersuche, diesen Wandel künstlich mithilfe einer\nGefriertruhe herbeizuführen, schlugen fehl."
          ultra_moon: "Diese Gestalt nimmt Formeo an, wenn es von\nHagel getroffen wird. Sein Körper ist so kalt,\ndass seine Haut leicht gefriert."
        es:
          ultra_sun: "Castform adopta esta forma cuando graniza.\nMeterlo en un congelador no basta para\ndesencadenar esta transformación."
          ultra_moon: "Castform adopta esta forma cuando graniza.\nSu cuerpo se enfría y su piel se congela\nparcialmente."
        ko:
          ultra_sun: "눈을 맞은 캐스퐁의 모습이다.\n냉동고에 넣는 실험에서는\n이 모습으로 변하지 않았다."
          ultra_moon: "싸라기눈을 맞으면 이 모습으로\n변화한다. 전신이 차갑고\n피부는 조금 얼어 있다."
        zh_simp:
          ultra_sun: "被冰雹打到时飘浮泡泡的样子。\n在将它放入冷冻库的实验里，\n没有变成这个形态。"
          ultra_moon: "如果被冰雹打到，\n就会变成这个样子。\n全身冷冷的，皮肤有点儿冻住。"
        zh_trad:
          ultra_sun: "飄浮泡泡被冰雹打到時的樣子。\n在把牠放進冷凍庫的實驗裡，\n牠並沒有變成這種形態。"
          ultra_moon: "被冰雹打到時就會變成這個樣子。\n全身上下冷冰冰的，\n皮膚有一點結冰。"
kecleon:
  species_id: 352
  names:
    jp_kana: カクレオン
    jp_kanji: カクレオン
    en: Kecleon
    fr: Kecleon
    it: Kecleon
    de: Kecleon
    es: Kecleon
    ko: 켈리몬
    zh_simp: 变隐龙
    zh_trad: 變隱龍
  forms:
    kecleon:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 120
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - color_change
      hidden_ability: protean
      descriptions:
        jp_kana:
          ultra_sun: "からだの　いろを　かえて　けしきに\nとけこむ。　ながく　かまわないでいると\nスネて　すがたを　みせなくなる。"
          ultra_moon: "かくれるとき　いがいにも　きぶんや\nちょうしで　からだのいろが　かわる。\nいろが　こいときほど　げんきだぞ。"
        jp_kanji:
          ultra_sun: "身体の　色を　変えて　景色に\n溶け込む。　長く　かまわないでいると\nスネて　姿を　見せなくなる。"
          ultra_moon: "隠れるとき　以外にも　気分や\n調子で　身体の色が　変わる。\n色が　濃いときほど　元気だぞ。"
        en:
          ultra_sun: "It changes its hue to blend into its surroundings.\nIf no one takes notice of it for too long, it will\npout and never reveal itself."
          ultra_moon: "Its color changes for concealment and also\nwhen its mood or health changes. The darker\nthe color, the healthier it is."
        fr:
          ultra_sun: "Il change de couleur pour se camoufler, mais si\non cesse de lui prêter attention pendant trop\nlongtemps, il se vexe et ne se montre plus..."
          ultra_moon: "Sa couleur change quand il se cache, mais varie\naussi selon son humeur et son état de santé :\nplus il est en forme, plus sa couleur est vive."
        it:
          ultra_sun: "Si mimetizza con l’ambiente mutando il colore\ndel proprio corpo. Se lo si ignora, si imbroncia\ne non si fa più vedere."
          ultra_moon: "Cambia colore non solo per mimetizzarsi ma\nanche in base all’umore e allo stato di salute.\nPiù il suo colore è intenso, più è in forze."
        de:
          ultra_sun: "Es kann mit der Umgebung verschmelzen, indem\nes seine Farbe ändert. Wenn man es längere Zeit\nignoriert, macht es sich schmollend unsichtbar."
          ultra_moon: "Seine Färbung ändert sich nicht nur zur Tarnung,\nsondern auch je nach Laune und Verfassung. Je\nkräftiger seine Farben sind, desto vitaler ist es."
        es:
          ultra_sun: "Cambia de color para fundirse con el paisaje,\npero, si pasa desapercibido demasiado tiempo,\nse enfurruña y no vuelve a hacerse visible."
          ultra_moon: "Incluso cuando no se está mimetizando, el color\nde su cuerpo cambia según cómo se encuentre.\nUn color más intenso indica mayor vitalidad."
        ko:
          ultra_sun: "몸의 색을 바꿔 경치에 녹아든다.\n오랫동안 방치하면 토라져서\n모습을 볼 수 없게 된다."
          ultra_moon: "숨을 때 말고도 기분이나\n컨디션에 따라 몸의 색이 바뀐다.\n색이 진할수록 건강하다."
        zh_simp:
          ultra_sun: "能改变身体的颜色，融入周围景色中。\n如果长时间不管它，就会闹别扭不现身。"
          ultra_moon: "在不隐身的时候，身体的颜色\n也会随着心情和状态改变。\n颜色越浓的时候越有精神。"
        zh_trad:
          ultra_sun: "能改變體色，融入周圍的景色中。\n如果長時間不去理會牠，\n牠就會鬧彆扭而不肯現身。"
          ultra_moon: "就算是在不需要隱身的時候，\n體色也會隨心情和身體狀態而改變。\n顏色越濃代表牠越有活力。"
shuppet:
  species_id: 353
  names:
    jp_kana: カゲボウズ
    jp_kanji: カゲボウズ
    en: Shuppet
    fr: Polichombr
    it: Shuppet
    de: Shuppet
    es: Shuppet
    ko: 어둠대신
    zh_simp: 怨影娃娃
    zh_trad: 怨影娃娃
  forms:
    shuppet:
      form_id: 0
      base_stats:
        hp: 44
        attack: 75
        defense: 35
        special_attack: 63
        special_defense: 33
        speed: 45
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - insomnia
        - frisk
      hidden_ability: cursed_body
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          ultra_sun: "うらみ　ねたみ　そねみの　ような\nかんじょうを　くらうので　ひとに\nよっては　ありがたい　そんざいだ。"
          ultra_moon: "ひぐれに　カゲボウズが　ならぶような\nいえとは　つきあうな　と　いう\nふるい　ことわざが　のこっている。"
        jp_kanji:
          ultra_sun: "恨み　妬み　嫉みの　ような\n感情を　食らうので　人に　よっては\nありがたい　存在だ。"
          ultra_moon: "日暮れに　カゲボウズが　並ぶような\n家とは　付き合うな　と　いう\n古い　ことわざが　残っている。"
        en:
          ultra_sun: "It eats up emotions like malice, jealousy, and\nresentment, so some people are grateful for\nits presence."
          ultra_moon: "There’s a proverb that says, “Shun the house\nwhere Shuppet gather in the growing dusk.”"
        fr:
          ultra_sun: "Les gens apprécient ce Pokémon, car il se\nnourrit de leurs émotions négatives telles que\nla rancœur et la jalousie."
          ultra_moon: "Il existe un proverbe ancien qui dit :\n« Fuis la demeure où les Polichombr se\nrassemblent en nombre à la pénombre. »"
        it:
          ultra_sun: "Si nutre di sentimenti turpi come rancore, invidia\ne gelosia. Per questo, alcuni sono felici che\nesista."
          ultra_moon: "Un vecchio proverbio esorta a stare lontani\ndalle case in cui, al calar del sole, si annidano\ngli Shuppet."
        de:
          ultra_sun: "Da es sich von Gefühlen wie Rachsucht, Neid\nund Eifersucht ernährt, sind die Menschen für\ndie Existenz dieses Pokémon dankbar."
          ultra_moon: "Einem alten Sprichwort zufolge soll man sich von\nHäusern fernhalten, an denen sich bei Einbruch\nder Dunkelheit Shuppet aneinanderreihen."
        es:
          ultra_sun: "Se alimenta de sentimientos negativos como la\nenvidia, el rencor y el odio, así que su presencia\nes más que bienvenida por los humanos."
          ultra_moon: "Según un viejo proverbio, conviene mantenerse\nalejado de aquellas casas a las que se arrime\nuna multitud de Shuppet cuando cae la noche."
        ko:
          ultra_sun: "원한, 시샘, 질투 같은\n감정을 먹기 때문에 사람에게는\n고마운 존재다."
          ultra_moon: "해질녘에 어둠대신이 줄지어 있는\n집과는 어울리지 말라는\n오랜 속담이 남아 있다."
        zh_simp:
          ultra_sun: "因为会吞食类似于\n怨恨、嫉妒之类的感情，\n所以对于有的人来说是可贵的存在。"
          ultra_moon: "流传着这样的古老俗语，\n日暮时分，不要去\n排列着怨影娃娃的房子。"
        zh_trad:
          ultra_sun: "因為會吞食怨恨、嫉妒\n之類的情感，對某些人來說\n是很可貴的寶可夢。"
          ultra_moon: "不要去跟那些在黃昏時有\n怨影娃娃在排隊的人家來往。\n這是自古流傳下來的諺語。"
