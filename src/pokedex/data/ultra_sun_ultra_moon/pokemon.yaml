      descriptions:
        jp_kana:
          ultra_sun: "なかまと　クチバシを　たたきあわせて\nコミュニケーション。　たたく　つよさや\nかいすうで　きもちを　つたえあう。"
          ultra_moon: "つがいが　なかむつまじいことで\nしられる。　えんぎもの　の　かわりに\nけっこんしきに　つれて　こられる。"
        jp_kanji:
          ultra_sun: "仲間と　クチバシを　叩き合わせて\nコミュニケーション。　叩く　強さや\n回数で　気持ちを　伝えあう。"
          ultra_moon: "番いが　仲睦まじいことで\n知られる。　縁起物　の　代わりに\n結婚式に　連れて　こられる。"
        en:
          ultra_sun: "They smack beaks with others of their kind to\ncommunicate. The strength and number of hits\ntell each other how they feel."
          ultra_moon: "Known for forming harmonious couples, this\nPokémon is brought to wedding ceremonies as a\ngood luck charm."
        fr:
          ultra_sun: "Ils communiquent entre eux en se frappant\nmutuellement sur le bec. La force et la cadence\ndes coups en disent long sur leur état d’esprit."
          ultra_moon: "Les couples de Bazoucan sont réputés pour leur\nharmonie. On en amène souvent aux mariages\npour porter bonheur aux jeunes époux."
        it:
          ultra_sun: "I Toucannon comunicano tra di loro sbattendo\ni becchi. La forza e il numero dei colpi indicano\ni sentimenti che vogliono esprimere."
          ultra_moon: "Le coppie di Toucannon sono famose per la loro\nperfetta armonia. Per questo c’è chi le porta ai\nmatrimoni come augurio di felicità per gli sposi."
        de:
          ultra_sun: "Sie kommunizieren miteinander, indem sie ihre\nSchnäbel gegeneinanderschlagen. Stärke und\nAnzahl der Schläge übermitteln ihre Gefühle."
          ultra_moon: "Tukanon-Pärchen sind für ihr harmonisches\nZusammenleben bekannt. Daher werden sie oft\nals Glücksbringer zu Hochzeiten mitgebracht."
        es:
          ultra_sun: "Se comunican con sus compañeros chocando los\npicos. El número de veces y la fuerza con la que\nlo hacen transmiten sus distintos sentimientos."
          ultra_moon: "Las parejas de Toucannon son famosas por la\narmonía que reina entre ellas. Por eso se llevan\na las bodas como portadores de buena fortuna."
        ko:
          ultra_sun: "동료와 부리를 부딪히며\n커뮤니케이션한다. 부딪히는 강도나\n횟수로 기분을 전달한다."
          ultra_moon: "암수의 사이가 좋다고 알려져 있다.\n행운을 부르기 위해\n결혼식에 데리고 온다."
        zh_simp:
          ultra_sun: "与伙伴互相敲击鸟嘴\n进行交流。通过敲击的强度\n和次数来互相传达心情。"
          ultra_moon: "因成双成对感情和睦而闻名。\n它被视为一种吉祥的象征，\n常被带到结婚仪式去。"
        zh_trad:
          ultra_sun: "會與夥伴互相敲擊鳥嘴\n來進行溝通，透過敲擊的強度\n和次數來傳達彼此的心情。"
          ultra_moon: "以伴侶之間深厚的感情而聞名。\n被視為一種吉利的象徵，\n常被人帶到結婚典禮去。"
