          ultra_sun: "めだまもようで　てきを　いかく。\nそれで　ダメなら　４まいの　ハネを\nつかって　きように　にげまわるのだ。"
          ultra_moon: "うすい　ハネの　ような　しょっかくは\nしっけを　すいやすい。　あめの　ひは\nきの　ウロなどで　じっと　すごす。"
        jp_kanji:
          ultra_sun: "目玉模様で　敵を　威嚇。\nそれで　ダメなら　４枚の　ハネを\n使って　器用に　逃げまわるのだ。"
          ultra_moon: "薄い　ハネの　ような　触角は\n湿気を　吸いやすい。　雨の　日は\n木の　ウロなどで　じっと　過ごす。"
        en:
          ultra_sun: "Masquerain intimidates enemies with the eyelike\npatterns of its eyespots. If that doesn’t work, it\ndeftly makes its escape on its set of four wings."
          ultra_moon: "Its thin, winglike antennae are highly absorbent.\nIt waits out rainy days in tree hollows."
        fr:
          ultra_sun: "Ses protubérances en forme d’yeux servent\nà intimider ses ennemis. Si cela ne marche pas,\nil utilise ses quatre ailes pour s’enfuir."
          ultra_moon: "Ses antennes en forme d’ailes absorbent\nfacilement l’humidité. Par temps de pluie,\nil attend patiemment au creux d’un arbre."
        it:
          ultra_sun: "Intimorisce i nemici con i motivi a forma di\nocchio. Se lo stratagemma non funziona,\nfugge via agitando le quattro ali."
          ultra_moon: "Le sue antenne, simili ad ali sottili, assorbono\nl’umidità. Quando piove si rifugia all’interno\ndelle cavità degli alberi."
        de:
          ultra_sun: "Kann es Feinde nicht mit seinen augenähnlichen\nMustern einschüchtern, flieht es geschwind\nmithilfe seiner vier Flügel."
          ultra_moon: "Seine Antennen erinnern an dünne Flügel und\nsaugen leicht Flüssigkeit auf. Regentage\nverbringt es regungslos in Baumhöhlen."
        es:
          ultra_sun: "Intimida a sus enemigos con las grandes pupilas\nde sus antenas. Si esto no funciona, bate sus\ncuatro alas para huir."
          ultra_moon: "Sus grandes antenas en forma de ojos tienden a\nabsorber humedad. Los días de lluvia, se refugia\nen cavidades de los árboles y espera paciente."
        ko:
          ultra_sun: "눈알 모양으로 적을 위협한다.\n그래도 안 되면 4장의 날개를\n사용해 재빠르게 도망친다."
          ultra_moon: "얇은 날개처럼 생긴 더듬이는\n습기를 머금기 쉽다. 비가 오는 날은\n나무 구멍 등에서 얌전히 지낸다."
        zh_simp:
          ultra_sun: "会用眼珠花纹威吓敌人。\n如果这样不起作用，就会挥动\n４根翅膀，灵活地四处逃窜。"
          ultra_moon: "像薄薄的翅膀一样的触角\n很容易吸收湿气。\n雨天会静静地待在树洞等地方度过。"
        zh_trad:
          ultra_sun: "會用眼珠花紋威嚇敵人。\n如果威嚇起不了作用，就會用\n４片翅膀靈活地四處竄逃。"
          ultra_moon: "薄薄翅膀般的觸角很容易\n吸收濕氣。下雨天會靜靜待在\n樹洞之類的地方度過。"
