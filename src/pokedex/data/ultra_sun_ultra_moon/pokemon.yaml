      descriptions:
        jp_kana:
          ultra_sun: "ゆうがに　なみの　うえを　とびはねる\nマンタインを　えがいた　えハガキや\nポスターは　にんきのアローラみやげ。"
          ultra_moon: "かれいに　およぐ　マンタインに\nあこがれ　サーフィンを　はじめたと\nいう　ひとも　おおいのだ。"
        jp_kanji:
          ultra_sun: "優雅に　波の　上を　飛びはねる\nマンタインを　描いた　絵ハガキや\nポスターは　人気のアローラ土産。"
          ultra_moon: "華麗に　泳ぐ　マンタインに\n憧れ　サーフィンを　始めたと\nいう　人も　多いのだ。"
        en:
          ultra_sun: "Postcards and posters featuring Mantine\nleaping elegantly above the waves are popular\nsouvenirs of Alola."
          ultra_moon: "Many people have taken up surfing because\nthey admire how magnificently Mantine swims."
        fr:
          ultra_sun: "Une carte postale ou un poster d’un Démanta\nplanant gracieusement au-dessus des vagues\nest un souvenir typique d’Alola."
          ultra_moon: "Nombreux sont les surfeurs qui ont trouvé leur\nvocation après être tombés sous le charme\nde la nage majestueuse d’un Démanta."
        it:
          ultra_sun: "Volteggia con grazia sulle onde ed è raffigurato\nin cartoline e poster di Alola molto apprezzati\ncome souvenir."
          ultra_moon: "Mantine nuota con un’eleganza tale che molti\ndicono di aver iniziato a praticare il surf\nper cercare di emularlo."
        de:
          ultra_sun: "Postkarten und Poster, auf denen Mantax\nelegant über die Wellen springt, sind beliebte\nMitbringsel aus Alola."
          ultra_moon: "Es gibt viele Menschen, die mit dem Surfen\nangefangen haben, weil sie die wunderschön\ndahinschwimmenden Mantax so bewundern."
        es:
          ultra_sun: "Un souvenir típico de Alola son las postales y\npósteres con dibujos de Mantine saltando\ngrácilmente sobre las olas del mar."
          ultra_moon: "Muchos surfistas se iniciaron en la disciplina\ninspirados por el grácil nado de los Mantine."
        ko:
          ultra_sun: "우아하게 파도 위를 튀어 오르는\n만타인을 그린 그림엽서나 포스터는\n인기 있는 알로라 특산품이다."
          ultra_moon: "화려하게 헤엄치는 만타인을\n동경하여 서핑을 시작했다는\n사람도 많이 있다."
        zh_simp:
          ultra_sun: "阿罗拉的人气特产是绘有巨翅飞鱼\n在海浪上优雅跳跃的明信片及海报。"
          ultra_moon: "也有很多人是因为向往\n巨翅飞鱼那华丽的泳姿\n才开始冲浪的。"
        zh_trad:
          ultra_sun: "阿羅拉的熱門特產是畫了\n巨翅飛魚在海浪上優雅跳躍\n的手繪明信片和海報。"
          ultra_moon: "也有許多人是因為嚮往\n巨翅飛魚的華麗泳姿\n才開始衝浪的。"
skarmory:
