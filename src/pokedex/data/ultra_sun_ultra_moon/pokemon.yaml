stufful:
  species_id: 759
  names:
    jp_kana: ヌイコグマ
    jp_kanji: ヌイコグマ
    en: Stufful
    fr: Nounourson
    it: Stufful
    de: Velursi
    es: Stufful
    ko: 포곰곰
    zh_simp: 童偶熊
    zh_trad: 童偶熊
  forms:
    stufful:
      form_id: 0
      base_stats:
        hp: 70
        attack: 75
        defense: 50
        special_attack: 45
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
