      types:
        - normal
      egg_groups:
        - field
      abilities:
        - comatose
      descriptions:
        jp_kana:
          ultra_sun: "うまれてから　ずっと　ねむったまま。\nふかい　ねむりに　おちているときは\nいっさい　うごかなくなる。"
          ultra_moon: "しぬまで　ずっと　ねむったままなのは\nエサの　はっぱに　ますいの　ような\nせいぶんが　ふくまれているからだ。"
        jp_kanji:
          ultra_sun: "生まれてから　ずっと　眠ったまま。\n深い　眠りに　落ちているときは\n一切　動かなくなる。"
          ultra_moon: "死ぬまで　ずっと　眠ったままなのは\nエサの　葉っぱに　麻酔の　ような\n成分が　含まれているからだ。"
        en:
          ultra_sun: "It stays asleep from the moment it’s born.\nWhen it falls into a deep sleep, it stops\nmoving altogether."
          ultra_moon: "It remains asleep from birth to death as a result\nof the sedative properties of the leaves that\nform its diet."
        fr:
          ultra_sun: "Il dort continuellement depuis sa naissance.\nLorsqu’il est en phase de sommeil profond,\nil ne bouge plus d’un poil."
          ultra_moon: "Ce Pokémon passe sa vie entière à dormir\nà cause des composants anesthésiants qui\nse trouvent dans les feuilles qu’il mange."
        it:
          ultra_sun: "Dorme ininterrottamente fin dalla nascita.\nQuando il suo sonno è particolarmente profondo\nrimane completamente immobile."
          ultra_moon: "Poiché le foglie di cui si nutre contengono una\nsostanza soporifera, Komala trascorre la sua\nintera vita dormendo."
        de:
          ultra_sun: "Vom Augenblick seiner Geburt an verbringt es\nsein ganzes Leben schlafend. Wenn es extrem\ntief schläft, wird es völlig regungslos."
          ultra_moon: "Es verbringt sein Leben schlafend, bis es stirbt.\nDas liegt an den narkotisierenden Wirkstoffen,\ndie in den Blättern enthalten sind, die es frisst."
        es:
          ultra_sun: "Duerme continuamente desde que nace. Cuando\nel sueño en el que está sumido es especialmente\nprofundo, se queda inmóvil."
          ultra_moon: "El motivo de su letargo vitalicio es la sustancia\nsomnífera que contienen las hojas de las que\nse alimenta."
        ko:
          ultra_sun: "태어날 때부터 계속 자고 있다.\n깊은 수면에 빠져 있을 때는\n일체 움직이지 않는다."
          ultra_moon: "죽을 때까지 계속 잠들어 있는 이유는\n먹이인 잎사귀에 마취 성분이\n포함되어 있기 때문이다."
        zh_simp:
          ultra_sun: "出生后就一直都睡着。\n进入深度睡眠的时候，\n会变的一动也不动。"
          ultra_moon: "到死都一直是睡着的状态，\n是因为吃的叶子里含有\n类似麻醉药的成分。"
        zh_trad:
          ultra_sun: "從出生那刻起就一直在睡覺。\n當進入深度睡眠的時候，\n會變得完全靜止不動。"
          ultra_moon: "終其一生都處於睡著的狀態。\n這是因為牠所吃的葉子裡\n含有類似麻醉藥的成分。"
turtonator:
  species_id: 776
  names:
    jp_kana: バクガメス
    jp_kanji: バクガメス
    en: Turtonator
    fr: Boumata
    it: Turtonator
    de: Tortunator
    es: Turtonator
    ko: 폭거북스
    zh_simp: 爆焰龟兽
    zh_trad: 爆焰龜獸
  forms:
    turtonator:
      form_id: 0
      base_stats:
        hp: 60
        attack: 78
        defense: 135
        special_attack: 91
        special_defense: 85
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
