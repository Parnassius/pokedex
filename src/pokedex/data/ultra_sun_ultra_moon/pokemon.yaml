      descriptions:
        jp_kana:
          ultra_sun: "なぞのエネルギーによって　かつどう。\nこだいから　うごきつづけているので\nそろそろ　パワーが　つきるとも。"
          ultra_moon: "こだいじんが　しもべに　するため\nねんどを　こねて　こしらえたらしいが\nエネルギーげんは　ふめいだ。"
        jp_kanji:
          ultra_sun: "謎の　エネルギーに　よって　活動。\n古代から　動き続けているので\nそろそろ　パワーが　尽きるとも。"
          ultra_moon: "古代人が　しもべに　するため\n粘土を　こねて　こしらえたらしいが\nエネルギー源は　不明だ。"
        en:
          ultra_sun: "Its movements are powered by a mysterious\nenergy. It has continued to move since ancient\ntimes, so its power may soon run out."
          ultra_moon: "Although ancient people apparently built it by\nworking with clay, the source of its energy\nis unclear."
        fr:
          ultra_sun: "Une mystérieuse énergie l’alimente depuis\nl’Antiquité, mais, qui sait ? Cette énergie\nn’est peut-être pas éternelle..."
          ultra_moon: "Les anciens, désirant avoir un serviteur,\nl’auraient façonné avec de l’argile. En revanche,\non ignore toujours d’où provient son énergie."
        it:
          ultra_sun: "È animato da un’energia misteriosa, ma essendo\nin funzione fin dall’antichità si sospetta che\npotrebbe esaurirsi presto."
          ultra_moon: "Un popolo antico lo ha creato modellando\nl’argilla per farne un servitore. La fonte\ndell’energia che lo anima è sconosciuta."
        de:
          ultra_sun: "Es wird seit uralten Zeiten durch eine Energie\nrätselhaften Ursprungs angetrieben. Manche\ngehen davon aus, dass diese bald erschöpft ist."
          ultra_moon: "Ein uraltes Volk hat dieses Pokémon aus Lehm\nerschaffen, um es zu seinem Diener zu machen.\nDer Ursprung seiner Energie ist unbekannt."
        es:
          ultra_sun: "Se mueve gracias a una misteriosa energía, pero,\nhabiendo estado activo desde la antigüedad,\ndicha energía podría agotarse tarde o temprano."
          ultra_moon: "Se dice que fue creado antiguamente a partir de\narcilla para usarlo como sirviente, pero se\ndesconoce cuál es su fuente de energía."
        ko:
          ultra_sun: "수수께끼의 에너지로 활동한다.\n고대부터 계속 움직였기 때문에\n슬슬 파워가 다할 때가 됐을지도 모른다."
          ultra_moon: "고대인이 부하로 삼기 위해\n점토를 빚어서 만들었다고 하나\n에너지원은 불명확하다."
        zh_simp:
          ultra_sun: "因谜一般的能量而活动。\n因为从古代开始就持续活动，\n说不定很快就会用尽力量。"
          ultra_moon: "古代人捏制黏土制作它\n好像是为了让其当仆人。\n但它的能量源尚不明确。"
        zh_trad:
          ultra_sun: "靠著神秘的能量來活動。\n因為從古代開始就持續活動，\n有可能就快要耗盡力量了。"
          ultra_moon: "古代人之所以捏黏土製造牠，\n似乎是為了當成僕人使喚。\n能量來源至今不明。"
