      descriptions:
        jp_kana:
          ultra_sun: "アローラに　くらす　スリーパーの\nターゲットは　おもに　ネッコアラ。\nひとは　あまり　ひがいに　あわない。"
          ultra_moon: "よるに　ねむれない　ひとの　ために\nびょういんで　おいしゃさんの\nてつだいをする　スリーパーも　いる。"
        jp_kanji:
          ultra_sun: "アローラに　暮らす　スリーパーの\nターゲットは　主に　ネッコアラ。\n人は　あまり　被害に　あわない。"
          ultra_moon: "夜に　眠れない　人の　ために\n病院で　お医者さんの\n手伝いをする　スリーパーも　いる。"
        en:
          ultra_sun: "In Alola, Komala is Hypno’s main target. It rarely\nharms people."
          ultra_moon: "There are some Hypno that assist doctors with\npatients who can’t sleep at night in hospitals."
        fr:
          ultra_sun: "À Alola, les Hypnomade s’en prennent\nprincipalement aux Dodoala. Les humains\nn’ont donc pas grand-chose à craindre."
          ultra_moon: "Certains Hypnomade travaillent comme\nassistants dans les cliniques visant à guérir\nles patients de leurs insomnies."
        it:
          ultra_sun: "Ad Alola, gli Hypno prendono di mira soprattutto\ni Komala e raramente disturbano gli esseri\numani."
          ultra_moon: "Alcuni Hypno fanno da assistenti ai medici\nnegli ospedali per curare i pazienti che\nsoffrono di insonnia."
        de:
          ultra_sun: "In Alola hat es Hypno hauptsächlich auf Koalelu\nabgesehen. Menschen schadet es kaum."
          ultra_moon: "Manchmal unterstützt es das medizinische\nPersonal in Krankenhäusern, wenn Patienten\nan Schlaflosigkeit leiden."
        es:
          ultra_sun: "En Alola, los altercados con humanos son\nescasos, ya que el objetivo predilecto de los\nHypno son los Komala."
          ultra_moon: "Este Pokémon presta ayuda al personal médico\nde los hospitales cuando algún paciente\npresenta dificultades para conciliar el sueño."
        ko:
          ultra_sun: "알로라에서 사는 슬리퍼의\n타깃은 주로 자말라다.\n사람은 그다지 피해를 입지 않는다."
          ultra_moon: "밤에 잠들지 못하는 사람을 위해\n병원에서 의사를\n도와주는 슬리퍼도 있다."
        zh_simp:
          ultra_sun: "生活在阿罗拉的引梦貘人的\n目标主要是树枕尾熊。\n人倒不怎么会成为受害者。"
          ultra_moon: "为了帮助那些在晚上无法\n入睡的人们，也有些引梦貘人\n会去医院协助医生。"
        zh_trad:
          ultra_sun: "居住在阿羅拉的引夢貘人\n主要的目標是樹枕尾熊，\n人們倒是不太會成為被害者。"
          ultra_moon: "為了幫助那些晚上失眠的人，\n也有些引夢貘人會到\n醫院去協助醫生。"
