    de: Aranestro
    es: Araquanid
    ko: 깨비물거미
    zh_simp: 滴蛛霸
    zh_trad: 滴蛛霸
  forms:
    araquanid:
      form_id: 0
      base_stats:
        hp: 68
        attack: 70
        defense: 92
        special_attack: 50
        special_defense: 132
        speed: 42
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
        - bug
      egg_groups:
        - water_1
        - bug
      abilities:
        - water_bubble
      hidden_ability: water_absorb
      held_items:
