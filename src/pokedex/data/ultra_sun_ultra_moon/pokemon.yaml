      abilities:
        - sand_veil
      hidden_ability: sand_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          ultra_sun: "よく　ツメや　ツノが　おれてしまう。\nおれた　ツメや　ツノで　つちを\nたがやす　どうぐが　つくられる。"
          ultra_moon: "ふとい　ツメの　おかげで　きのぼりが\nとくいだ。　そのまま　きの　うえを\nねどこにする　サンドパンも　おおい。"
        jp_kanji:
          ultra_sun: "よく　ツメや　ツノが　折れてしまう。\n折れた　ツメや　ツノで　土を\n耕す　道具が　作られる。"
          ultra_moon: "太い　ツメの　おかげで　木登りが\n得意だ。　そのまま　木の　上を\n寝床にする　サンドパンも　多い。"
        en:
          ultra_sun: "Its claws and horns often break off. The broken\nclaws and horns can be used to carve plows for\ntilling farm fields."
          ultra_moon: "Thanks to its thick claws, it’s good at climbing\ntrees. There are plenty of Sandslash that park\nthemselves in trees and go right to sleep."
        fr:
          ultra_sun: "Ses épines et ses griffes se cassent souvent.\nCes pointes brisées peuvent servir d’outils\npour creuser le sol."
          ultra_moon: "Ses grosses griffes lui permettent de grimper\naux arbres sans peine. Il n’est pas rare de voir\nun Sablaireau endormi dans les frondaisons."
        it:
          ultra_sun: "I suoi aculei si spezzano spesso.\nUna volta recuperati, si possono usare per\nfabbricare attrezzi per coltivare la terra."
          ultra_moon: "Grazie ai suoi grossi artigli può arrampicarsi\nsugli alberi con estrema facilità. Non è raro\nvederlo dormire fra i rami."
        de:
          ultra_sun: "Seine Krallen und Stacheln brechen oft ab. Sie\nwerden dann zu Werkzeugen für den Ackerbau\nverarbeitet."
          ultra_moon: "Mit seinen Krallen kann es gut Bäume erklimmen.\nHäufig macht es die Baumkrone dann gleich zu\nseinem Schlafplatz."
        es:
          ultra_sun: "Sus garras y púas se caen con frecuencia y\npueden recogerse para elaborar aperos de\nlabranza."
          ultra_moon: "Sus gruesas garras le permiten escalar árboles\ncon gran agilidad. De hecho, no es extraño ver\nejemplares durmiendo entre el follaje."
        ko:
          ultra_sun: "발톱과 뿔이 잘 부러진다.\n부러진 발톱과 뿔은 땅을\n일구는 도구로 만들어진다."
          ultra_moon: "굵은 발톱 덕분에 나무타기가\n특기다. 나무 위에 올라가서\n잠을 자는 고지도 많다."
        zh_simp:
          ultra_sun: "爪子和角经常会折断。\n折断的爪子和角会被制作成\n用来耕作土地的用具。"
          ultra_moon: "得益于粗粗的爪子，所以它很\n擅长爬树。也有很多穿山王\n会直接把树上当成睡觉的地方。"
        zh_trad:
          ultra_sun: "爪子和尖刺經常折斷。\n折斷的爪子和尖刺被人們用來\n製作成耕作土地的工具。"
          ultra_moon: "擅長用厚實的爪子來爬樹。\n也有許多穿山王會直接把\n樹上當成睡覺的地方。"
    sandslash_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 75
        attack: 100
        defense: 120
        special_attack: 25
        special_defense: 65
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
        - steel
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: slush_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          ultra_sun: "せつげんを　こうそくで　かける。\nゆきを　かきわけるために　ツメが\nぶっとく　するどく　はったつした。"
          ultra_moon: "おおむかしは　さばくに　すんでいた。\nするどいツメを　しっかり　つきたてて\nひょうざんも　すべらず　のぼっていく。"
        jp_kanji:
          ultra_sun: "雪原を　高速で　駆ける。\n雪を　掻きわけるために　ツメが\nぶっとく　鋭く　発達した。"
          ultra_moon: "大昔は　砂漠に　棲んでいた。\n鋭いツメを　しっかり　突き立てて\n氷山も　滑らず　登っていく。"
        en:
          ultra_sun: "It runs across snow-covered plains at high\nspeeds. It developed thick, sharp claws to plow\nthrough the snow."
          ultra_moon: "A long, long time ago, it lived in the desert. With\nits sharp claws fully extended, it can climb right\nup an iceberg without slipping."
        fr:
          ultra_sun: "Il sillonne les étendues enneigées à toute allure.\nIl a développé des griffes épaisses et pointues\npour s’assurer une meilleure prise sur la glace."
          ultra_moon: "Ce Pokémon vivait jadis dans les déserts.\nGrâce à ses griffes acérées, il peut même\ngravir des glaciers."
        it:
          ultra_sun: "Ha sviluppato degli artigli robusti e affilati\nper farsi strada fra la neve, in cui ora\nriesce a correre a gran velocità."
          ultra_moon: "Anticamente viveva nel deserto. Piantando\nsaldamente gli artigli affilati, riesce a scalare\nsenza scivolare persino gli iceberg."
        de:
          ultra_sun: "Es rast in hohem Tempo durch den Schnee.\nSeine Krallen sind groß und scharf, damit es\nsich leichter durchgraben kann."
          ultra_moon: "Vor Urzeiten lebte es in der Wüste. Mithilfe\nseiner scharfen Krallen erklimmt es Eisberge,\nohne abzurutschen."
        es:
          ultra_sun: "Atraviesa los parajes nevados a gran velocidad.\nHa desarrollado unas garras robustas y afiladas\npara moverse mejor en la nieve."
          ultra_moon: "En la antigüedad vivía en el desierto. Sus\nafiladas garras le permiten incluso trepar\nicebergs."
        ko:
          ultra_sun: "설원을 고속으로 달린다.\n눈을 헤치기 위해 발톱이\n두껍고 예리하게 발달했다."
          ultra_moon: "먼 옛날에는 사막에 살았다.\n날카로운 발톱을 단단히 꽂아서\n빙산도 미끄러지지 않고 오른다."
        zh_simp:
          ultra_sun: "能在雪原上奔驰。\n为了将雪拨开，它的爪子\n长得又粗又尖，十分发达，"
          ultra_moon: "很久以前曾栖息在沙漠里。\n会用利爪牢牢地插入山体，\n即便是攀爬冰山也不会滑落。"
        zh_trad:
          ultra_sun: "能在雪原上高速移動。\n為了將雪撥開，牠的爪子\n特別發達，長得粗壯而尖銳。"
          ultra_moon: "很久以前曾經棲息在沙漠裡。\n會用銳利的爪子牢牢插進山壁，\n即使攀爬冰山也不會滑落。"
