      descriptions:
        jp_kana:
          ultra_sun: "きょうりょくな　さいみんじゅつを\nつかう。　それを　りようし　あくじを\nはたらくものは　あとを　たたない。"
          ultra_moon: "どうたいの　もようを　ひからせて\nエモノを　あやつり　おびき　よせる。\nヒレさきは　ばつぐんの　きれあじ。"
        jp_kanji:
          ultra_sun: "強力な　さいみんじゅつを\n使う。　それを　利用し　悪事を\n働く者は　後を　絶たない。"
          ultra_moon: "胴体の　模様を　光らせて\nエモノを　操り　おびき　よせる。\nヒレ先は　抜群の　切れ味。"
        en:
          ultra_sun: "When it comes to strong hypnosis, there’s an\nendless number of people who utilize Malamar\nfor their nefarious deeds."
          ultra_moon: "It flashes the pattern on its torso to control its\nprey and draw them in. The edges of its fins are\nsupremely sharp."
        fr:
          ultra_sun: "Les personnes malintentionnées tentent\nsouvent de s’approprier ses grands pouvoirs\nhypnotiques pour servir leurs mauvais desseins."
          ultra_moon: "Il fait briller les motifs qui ornent son corps\nafin d’attirer ses proies. L’extrémité de ses\ntentacules est aussi coupante qu’un rasoir."
        it:
          ultra_sun: "Possiede incredibili poteri ipnotici che tanti\nmalintenzionati cercano di sfruttare a proprio\nvantaggio."
          ultra_moon: "Fa lampeggiare i motivi sul suo corpo per\nattirare a sé la preda. Le estremità dei suoi\ntentacoli sono affilatissime."
        de:
          ultra_sun: "Dieses Pokémon kann starke hypnotische\nKräfte einsetzen, die ständig von Halunken für\nüble Machenschaften missbraucht werden."
          ultra_moon: "Mithilfe der blinkenden Muster an seinem Rumpf\nhypnotisiert es seine Beute und lockt sie an. Die\nEnden seiner Flossen sind rasiermesserscharf."
        es:
          ultra_sun: "Posee grandes poderes hipnóticos de los que\ninnumerables criminales se aprovechan para\ncometer delitos."
          ultra_moon: "Hipnotiza a su presa con las luces que emite su\ntorso y la atrae hacia sí. Las puntas de sus\ntentáculos son extremadamente afiladas."
        ko:
          ultra_sun: "강력한 최면술을 사용한다.\n그것을 이용해 못된 짓을\n하는 자들이 끊이지 않는다."
          ultra_moon: "몸통에 있는 모양을 빛내서\n먹이를 조종해 끌어들인다.\n지느러미 끝은 굉장히 날카롭다."
        zh_simp:
          ultra_sun: "会使用强力的催眠术。\n用此来做坏事者源源不断。"
          ultra_moon: "让身体上的花纹发光，\n操纵猎物，引诱其靠近。\n鳍的前端非常锋利。"
        zh_trad:
          ultra_sun: "會使用強力的催眠術。\n利用這點來做壞事的人\n從來就沒有少過。"
          ultra_moon: "會讓身體上的花紋發光，\n操縱獵物靠近自己。\n鰭的前端非常鋒利。"
