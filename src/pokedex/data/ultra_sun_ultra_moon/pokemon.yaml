      descriptions:
        jp_kana:
          ultra_sun: "てんこうを　あやつると　しんじられ\nハクリューの　すむ　みずうみには\nおそなえものが　たえない。"
          ultra_moon: "としあけに　からだを　くねらせながら\nそらを　とぶ　すがたを　みられると\nいちねん　けんこうだと　いわれる。"
        jp_kanji:
          ultra_sun: "天候を　操ると　信じられ\nハクリューの　棲む　湖には\nお供え物が　絶えない。"
          ultra_moon: "年明けに　身体を　くねらせながら\n空を　飛ぶ　姿を　見られると\n１年　健康だと　いわれる。"
        en:
          ultra_sun: "Lakes where Dragonair live are filled with\nofferings from people, because they believe this\nPokémon is able to control the weather."
          ultra_moon: "Some say that if you see it at the start of the\nyear, flying through the sky and twisting its\nbody, you’ll be healthy all year long."
        fr:
          ultra_sun: "On raconte que ce Pokémon a le pouvoir de\nmodifier le climat. Les offrandes affluent donc\nau bord des lacs où il vit."
          ultra_moon: "Voir ce Pokémon serpenter dans le ciel\nau réveillon présage d’une bonne santé\npour la nouvelle année."
        it:
          ultra_sun: "Si crede che abbia il potere di controllare le\ncondizioni atmosferiche. Presso i laghi in cui\nvive non mancano mai offerte a lui dedicate."
          ultra_moon: "Si dice che se si vede questo Pokémon\nserpeggiare nel cielo all’inizio dell’anno,\nsi avranno dodici mesi di ottima salute."
        de:
          ultra_sun: "Aufgrund der Annahme, es könne das Wetter\nbeeinflussen, finden sich an Seen, die es\nbewohnt, viele Opfergaben."
          ultra_moon: "Wenn man zu Neujahr sieht, wie sich ein\nDragonir durch die Lüfte schlängelt, erwartet\neinen angeblich ein Jahr bester Gesundheit."
        es:
          ultra_sun: "Existe la creencia de que puede controlar el\nclima y a menudo se hallan ofrendas a orillas\nde los lagos donde habita."
          ultra_moon: "Se dice que ver a este Pokémon serpenteando\npor los cielos en año nuevo es augurio de buena\nsalud para el año entrante."
        ko:
          ultra_sun: "날씨를 조종한다는 믿음 때문에\n신뇽이 있는 호수에는\n공물이 끊이지 않는다."
          ultra_moon: "새해에 몸을 구부리며\n하늘을 나는 모습을 보면\n1년 동안 건강하다고 전해진다."
        zh_simp:
          ultra_sun: "人们相信它能操纵天气，\n所以在哈克龙栖息的湖里，\n供品总是源源不断。"
          ultra_moon: "据说在新年时，如果能看到它\n扭动着身子在空中飞翔的样子，\n那么这一年就能健健康康的。"
        zh_trad:
          ultra_sun: "人們相信牠能操縱天氣，\n所以哈克龍居住的湖裡\n總是不乏人們獻上的供品。"
          ultra_moon: "據說如果能在新年時看見\n牠扭動身子在空中飛翔的樣子，\n這一年就能過得很健康。"
