      descriptions:
        jp_kana:
          ultra_sun: "ふあんていな　きょどうが　めだつ。\nプログラムを　アップデートした\nぎじゅつしゃの　うでの　せいらしい。"
          ultra_moon: "ついかした　プログラムが　まずかった。\nおかしな　きょどうが　めだつので\nじっけんしっぱい　なのかも　しれない。"
        jp_kanji:
          ultra_sun: "不安定な　挙動が　目立つ。\nプログラムを　アップデートした\n技術者の　腕の　せいらしい。"
          ultra_moon: "追加した　プログラムが　まずかった。\nおかしな　挙動が　目立つので\n実験失敗　なのかも　しれない。"
        en:
          ultra_sun: "Its behavior is noticeably unstable, which is\napparently due to the incompetence of the\nengineer who updated its programming."
          ultra_moon: "A faulty update was added to its programming.\nIts behavior is noticeably strange, so the\nexperiment may have been a failure."
        fr:
          ultra_sun: "Son comportement, manifestement étrange,\ns’expliquerait par l’incompétence du technicien\nqui a mis à jour son système d’exploitation."
          ultra_moon: "Le logiciel qu’on lui a implanté était de toute\névidence défaillant. Il s’agit sans doute d’une\nexpérience ratée, vu son étrange comportement."
        it:
          ultra_sun: "Mostra un comportamento instabile, da attribuire\nprobabilmente alla scarsa competenza di chi ha\naggiornato il suo software."
          ultra_moon: "Il software aggiuntivo che gli è stato installato\naveva dei bug. I suoi comportamenti strani fanno\npensare che si tratti di un esperimento fallito."
        de:
          ultra_sun: "Sein seltsames Verhalten verdankt es offenbar\nder Unfähigkeit des Wissenschaftlers, der seine\nSoftware aktualisiert hat."
          ultra_moon: "Eine fehlerhafte neue Software führte zu seinem\nauffällig seltsamen Verhalten. Vermutlich\nhandelt es sich um ein verkorkstes Experiment."
        es:
          ultra_sun: "Llama la atención por su errática conducta, la\ncual se debe a la torpeza de quien realizara la\nactualización de su sistema operativo."
          ultra_moon: "El software que se le instaló era defectuoso. Tal\nvez se trate de un experimento fallido, a tenor\nde su extraño comportamiento."
        ko:
          ultra_sun: "불안정한 거동이 눈에 띈다.\n프로그램을 업데이트한\n기술자의 실력이 문제인 듯하다."
          ultra_moon: "추가한 프로그램이 좋지 않았다.\n괴상한 동작이 눈에 띄는 걸 보니\n실험에 실패한 것일지도 모른다."
        zh_simp:
          ultra_sun: "不稳定的举动很惹人注目。\n这问题好像要归咎于负责\n升级程序的技术人员的水平。"
          ultra_moon: "追加的程序不太好。\n因为其怪异的举动很惹人注目，\n所以或许是实验失败了。"
        zh_trad:
          ultra_sun: "動作明顯地不穩定。\n這個問題似乎要歸咎於\n負責升級程式的技術人員。"
          ultra_moon: "新追加的程式大有問題，\n做出的動作明顯地有些怪異。\n實驗或許可說是失敗了。"
