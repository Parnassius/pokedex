      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - hyper_cutter
        - mold_breaker
      hidden_ability: moxie
      descriptions:
        jp_kana:
          ultra_sun: "クワガノンと　なわばりを　あらそう。\nアローラでは　なぜか　ヘラクロスと\nけっこう　なかが　よいらしい。"
          ultra_moon: "たくましいが　さむさが　じゃくてん。\nよるに　なると　このはの　なかに\nからだを　うずめて　ねむる。"
        jp_kanji:
          ultra_sun: "クワガノンと　縄張りを　争う。\nアローラでは　なぜか　ヘラクロスと\n結構　仲が　良いらしい。"
          ultra_moon: "たくましいが　寒さが　弱点。\n夜に　なると　木の葉の　中に\n身体を　埋めて　眠る。"
        en:
          ultra_sun: "It gets into territorial disputes with Vikavolt.\nFor some reason, it apparently gets along well\nwith Heracross in Alola."
          ultra_moon: "Although it’s tough, it can’t handle cold well.\nWhen night falls, it buries itself in leafage\nand sleeps."
        fr:
          ultra_sun: "Des luttes territoriales l’opposent aux Lucanon.\nÀ Alola, il semble bien s’entendre avec Scarhino."
          ultra_moon: "Ce Pokémon a beau être robuste, il supporte\nmal le froid. La nuit, il s’enfouit donc sous un tas\nde feuilles pour dormir au chaud."
        it:
          ultra_sun: "Si contende il territorio con i Vikavolt.\nPer qualche motivo, ad Alola i Pinsir sembrano\nandare d’accordo con gli Heracross."
          ultra_moon: "È molto robusto ma non sopporta il freddo.\nAl calare della notte, si ripara sotto uno strato\ndi foglie per dormire."
        de:
          ultra_sun: "Es liefert sich Revierkämpfe mit Donarion. Aus\nnoch unbekannten Gründen versteht es sich in\nAlola ausgesprochen gut mit Skaraborn."
          ultra_moon: "Es ist zwar robust, verträgt jedoch keine Kälte.\nBei Anbruch der Nacht vergräbt es sich im Laub\nund schläft."
        es:
          ultra_sun: "Son famosas sus disputas territoriales con los\nVikavolt. En Alola parece llevarse muy bien con\nlos Heracross por motivos que se desconocen."
          ultra_moon: "Es de constitución robusta, pero no soporta el\nfrío. Al caer la noche, se cubre con un manto de\nhojas antes de conciliar el sueño."
        ko:
          ultra_sun: "투구뿌논과 영역 다툼을 한다.\n알로라에서는 어째서인지\n헤라크로스와 사이가 좋은 듯하다."
          ultra_moon: "늠름하지만 추위가 약점이다.\n밤이 되면 나뭇잎 속에\n몸을 파묻고 잔다."
        zh_simp:
          ultra_sun: "会和锹农炮虫争夺领地。\n在阿罗拉，不知为何它和\n赫拉克罗斯的关系好像相当不错。"
          ultra_moon: "虽然身体壮实，但弱点是怕冷。\n到了晚上，就会将身体\n埋在树叶中睡觉。"
        zh_trad:
          ultra_sun: "會和鍬農炮蟲爭奪地盤。\n不知為何，在阿羅拉這裡，\n牠和赫拉克羅斯的關係相當不錯。"
          ultra_moon: "雖然很強壯，但弱點是怕冷。\n到了晚上就會把身體\n埋在樹葉堆裡睡覺。"
    pinsir_mega:
      form_id: 1
      names:
        jp_kana: メガカイロス
        jp_kanji: メガカイロス
        en: Mega Pinsir
        fr: Méga-Scarabrute
        it: MegaPinsir
        de: Mega-Pinsir
        es: Mega-Pinsir
        ko: 메가쁘사이저
        zh_simp: 超级凯罗斯
        zh_trad: 超級凱羅斯
      base_stats:
        hp: 65
        attack: 155
        defense: 120
        special_attack: 65
        special_defense: 90
        speed: 105
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - aerilate
      descriptions:
        jp_kana:
          ultra_sun: "メガシンカし　とべるように　なった。\nよほど　うれしいのか　めったに\nちじょうには　おりてこないぞ。"
          ultra_moon: "もうスピードで　とびまわり　あいての\nすきを　ねらっている。　きょだいな\nハサミで　くしざしにする　つもりだ。"
        jp_kanji:
          ultra_sun: "メガシンカし　飛べるように　なった。\nよほど　嬉しいのか　滅多に\n地上には　降りてこないぞ。"
          ultra_moon: "猛スピードで　飛びまわり　相手の\n隙を　狙っている。　巨大な\nハサミで　串刺しにする　つもりだ。"
        en:
          ultra_sun: "After Mega Evolution, it becomes able to fly.\nPerhaps because it’s so happy, it rarely\ntouches the ground."
          ultra_moon: "It zips around at blistering speeds, looking for\nan opening to skewer its opponent on its\ngiant pincers."
        fr:
          ultra_sun: "Grâce à la Méga-Évolution, il peut voler. Il est\ntellement content d’en profiter qu’il se pose\nrarement."
          ultra_moon: "Il vole à toute allure et attend le moment propice\npour attaquer ses adversaires. Il les embroche\nsur ses deux pinces."
        it:
          ultra_sun: "Grazie alla megaevoluzione ha acquisito la\ncapacità di volare. Ne è talmente felice che\nscende a terra solo di rado."
          ultra_moon: "Vola a grande velocità intorno all’avversario\naspettando il momento propizio per trafiggerlo\ncon le sue corna."
        de:
          ultra_sun: "Durch die Mega-Entwicklung kann es nun fliegen.\nAus lauter Freude darüber kommt es nur noch\nselten auf den Boden zurück."
          ultra_moon: "Es schnellt durch die Lüfte und hält nach den\nSchwachpunkten seiner Gegner Ausschau, um\nsie mit seinen riesigen Scheren aufzuspießen."
        es:
          ultra_sun: "Gracias a la megaevolución, ahora puede volar.\nTal vez su alegría sea el motivo de que apenas\nse pose en tierra firme."
          ultra_moon: "Revolotea alrededor de su oponente a gran\nvelocidad, buscando una oportunidad para\nensartarlo con sus pinzas gigantes."
        ko:
          ultra_sun: "메가진화해 날 수 있게 되었다.\n얼마나 기쁜지 지상으로\n잘 내려오지 않는다."
          ultra_moon: "맹렬한 스피드로 날아다니며\n상대의 빈틈을 노린다.\n거대한 집게로 찌를 생각이다."
        zh_simp:
          ultra_sun: "超级进化后变得可以飞行了。\n或许是因为太过高兴，\n它几乎不会降落到地面上。"
          ultra_moon: "会以极快的速度飞来飞去，\n并寻找对手的可乘之机。\n目的是用巨大的钳子穿刺对手。"
        zh_trad:
          ultra_sun: "超級進化之後變得可以飛行。\n也許是因為太開心了，\n牠幾乎不會降落到地上。"
          ultra_moon: "會以極快的速度飛來飛去，\n尋找對手的可乘之機。\n目的是用巨大的鉗子刺穿對手。"
tauros:
  species_id: 128
  names:
    jp_kana: ケンタロス
    jp_kanji: ケンタロス
    en: Tauros
    fr: Tauros
    it: Tauros
    de: Tauros
    es: Tauros
    ko: 켄타로스
    zh_simp: 肯泰罗
    zh_trad: 肯泰羅
  forms:
    tauros:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 95
        special_attack: 40
        special_defense: 70
        speed: 110
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - intimidate
        - anger_point
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          ultra_sun: "しゅうだんで　せいかつする。　むれの\nなかで　１ばん　ふとく　ながく\nキズだらけの　ツノをもつのが　ボス。"
          ultra_moon: "アローラの　ケンタロスが　ほかの\nちほうより　すこし　おだやか　なのは\nきこうが　かんけいして　いるらしい。"
        jp_kanji:
          ultra_sun: "集団で　生活する。　群れの\n中で　１番　太く　長く\nキズだらけの　ツノを持つのが　ボス。"
          ultra_moon: "アローラの　ケンタロスが　他の\n地方より　少し　穏やか　なのは\n気候が　関係して　いるらしい。"
        en:
          ultra_sun: "They live in groups. The one with the longest,\nthickest, and most-scarred horns is the boss\nof the herd."
          ultra_moon: "The climate seems to be related to the reason\nTauros in Alola are a little calmer than those in\nother regions."
        fr:
          ultra_sun: "Les Tauros vivent en troupeaux menés par ceux\ndont les cornes sont les plus grosses, les plus\nlongues et les plus abimées."
          ultra_moon: "La douceur du climat local explique sans doute\npourquoi les Tauros d’Alola sont plus paisibles\nque leurs congénères d’outre-mer."
        it:
          ultra_sun: "I Tauros vivono in branchi capeggiati\ndall’esemplare che sfoggia le corna più grosse\ne lunghe e che mostrano più scalfitture."
          ultra_moon: "I Tauros che vivono ad Alola hanno un’indole\nleggermente più docile. Sembra che questa\nparticolarità sia dovuta al clima di Alola."
        de:
          ultra_sun: "Sie leben in Herden. Ihr Anführer ist das Tauros\nmit den kräftigsten und längsten Hörnern sowie\nden meisten Kampfspuren darauf."
          ultra_moon: "Tauros in Alola sind etwas sanftmütiger als in\nanderen Regionen. Dies ist offenbar auf das\nKlima zurückzuführen."
        es:
          ultra_sun: "Vive en manadas dominadas por el ejemplar que\nluce la cornamenta más mellada y de mayor\ntamaño y grosor."
          ultra_moon: "En Alola, los Tauros muestran un carácter más\nsosegado que en otras regiones. Posiblemente,\nesto guarde relación con lo apacible del clima."
        ko:
          ultra_sun: "집단생활을 한다. 무리 중에서\n가장 굵고 길며 상처가 많은\n뿔을 가진 것이 보스다."
          ultra_moon: "알로라의 켄타로스가 다른\n지방보다 조금 차분한 것은\n기후와 관련이 있다고 한다."
        zh_simp:
          ultra_sun: "会组成一个群体生活。\n在群体中，谁的角最粗最长，\n并伤痕累累，谁就是老大。"
          ultra_moon: "比起其他地区来，\n阿罗拉的肯泰罗更温和一点。\n这好像和当地的气候有关。"
        zh_trad:
          ultra_sun: "會組成群體來生活。\n群體中角最粗、最長，\n且傷痕最多的就是老大。"
          ultra_moon: "比起其他地區，阿羅拉的\n肯泰羅性情比較溫和。\n這似乎與當地的氣候有關。"
magikarp:
  species_id: 129
  names:
    jp_kana: コイキング
    jp_kanji: コイキング
    en: Magikarp
    fr: Magicarpe
    it: Magikarp
    de: Karpador
    es: Magikarp
    ko: 잉어킹
    zh_simp: 鲤鱼王
    zh_trad: 鯉魚王
  forms:
    magikarp:
      form_id: 0
      base_stats:
        hp: 20
        attack: 10
        defense: 55
        special_attack: 15
        special_defense: 20
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_2
        - dragon
      abilities:
        - swift_swim
      hidden_ability: rattled
      descriptions:
        jp_kana:
          ultra_sun: "はるか　おおむかしは　それなりに\nつよかったが　ときが　たつに　つれて\nどんどんどんどん　よわくなっていった。"
          ultra_moon: "せいめいりょくが　つよく　きたない\nみずでも　へっちゃら。　せかいじゅうの\nみずべに　せいそく　しているぞ。"
        jp_kanji:
          ultra_sun: "遥か　大昔は　それなりに　\n強かったが　時が　経つに　つれて\nどんどんどんどん　弱くなっていった。"
          ultra_moon: "生命力が　強く　汚い\n水でも　へっちゃら。　世界中の\n水辺に　生息　しているぞ。"
        en:
          ultra_sun: "In the distant past, they were fairly strong, but\nthey have become gradually weaker over time."
          ultra_moon: "Thanks to their strong hold on life, dirty water\ndoesn’t bother them at all. They live in waters\nall over the world!"
        fr:
          ultra_sun: "Il y a fort, fort longtemps, il était relativement\npuissant. Il est toutefois devenu de plus en plus\nnul au fil du temps."
          ultra_moon: "Sa survie ne dépendant pas de la salubrité\ndes eaux dans lesquelles il nage, on rencontre\nce Pokémon aux quatre coins du monde."
        it:
          ultra_sun: "Anticamente Magikarp era piuttosto forte, ma\ncol tempo è diventato sempre più debole."
          ultra_moon: "È molto resistente e può sopravvivere anche\nnelle acque più sporche. Se ne trovano nelle\nacque di tutto il mondo."
        de:
          ultra_sun: "Vor langer, langer Zeit war es anscheinend\nziemlich stark, doch es wurde zusehends\nschwächer und schwächer."
          ultra_moon: "Unbekümmert strotzt es selbst in verseuchten\nGewässern nur so vor Lebenskraft. Man findet\nes in allen Teilen der Welt in Ufernähe."
        es:
          ultra_sun: "Al parecer, en la antigüedad había gozado de\ngran fuerza, pero con el paso del tiempo se ha\nido debilitando hasta su estado actual."
          ultra_moon: "Su resistencia le permite vivir en las aguas más\nturbias. Por eso se los puede ver nadando en\ncualquier lugar del mundo."
        ko:
          ultra_sun: "먼 옛날에는 그럭저럭\n강한 편이었으나\n시간이 흐르면서 점점 약해졌다."
          ultra_moon: "생명력이 강해서 더러운\n물이라도 문제없다. 전 세계의\n물가에 서식하고 있다."
        zh_simp:
          ultra_sun: "在非常遥远的过去，它还是十分\n强大的，但随着时间的推移，\n它变得越来越弱，越来越弱了。"
          ultra_moon: "生命力顽强，\n即便在污水中也毫不在意。\n生活在世界各地的水边。"
        zh_trad:
          ultra_sun: "在遙遠的過去實力還算強大，\n但隨著時光的流轉，\n牠變得越來越弱了。"
          ultra_moon: "生命力頑強，\n即使待在污水中也不怕。\n棲息在世界各地的水邊。"
gyarados:
  species_id: 130
  names:
    jp_kana: ギャラドス
    jp_kanji: ギャラドス
    en: Gyarados
    fr: Léviator
    it: Gyarados
    de: Garados
    es: Gyarados
    ko: 갸라도스
    zh_simp: 暴鲤龙
    zh_trad: 暴鯉龍
  forms:
    gyarados:
      form_id: 0
      base_stats:
        hp: 95
        attack: 125
        defense: 79
        special_attack: 60
        special_defense: 100
        speed: 81
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - flying
      egg_groups:
        - water_2
        - dragon
      abilities:
        - intimidate
      hidden_ability: moxie
      descriptions:
        jp_kana:
          ultra_sun: "はかいこうせんを　はきまくり\nあたり　いちめんを　やきつくす。\nはかいのかみと　よぶ　ちほうもある。"
          ultra_moon: "しんか　エネルギーが　のうさいぼうを\nつよく　しげきした　けっか　とても\nきょうぼうな　せいかくに　へんかした。"
        jp_kanji:
          ultra_sun: "破壊光線を　はきまくり\nあたり　一面を　焼き尽くす。\n破壊の神と　呼ぶ　地方もある。"
          ultra_moon: "進化　エネルギーが　脳細胞を\n強く　刺激した　結果　とても\n凶暴な　性格に　変化した。"
        en:
          ultra_sun: "It fires hyper beams in all directions, burning the\nsurrounding area to ash. There are some regions\nwhere it’s called “the deity of destruction.”"
          ultra_moon: "The energy from evolution stimulated its brain\ncells strongly, causing it to become\nvery ferocious."
        fr:
          ultra_sun: "Avec son Ultralaser, il anéantit d’immenses\nétendues. Dans ces régions dévastées, il est\nsurnommé « le dieu de la destruction »."
          ultra_moon: "L’énergie libérée au moment de son évolution\na fortement stimulé ses cellules cérébrales\net causé son tempérament pour le moins violent."
        it:
          ultra_sun: "Incenerisce tutto ciò che lo circonda usando\nIper Raggio. In alcune regioni ci si riferiva\na lui con il nome di “dio della distruzione”."
          ultra_moon: "La sua natura estremamente violenta è dovuta ai\nforti stimoli subiti dalle sue cellule cerebrali a\ncausa dell’energia sprigionatasi con l’evoluzione."
        de:
          ultra_sun: "Mit seinem Hyperstrahl legt es die Umgebung\nin Schutt und Asche. Manchmal wird es auch\nals „Gottheit der Zerstörung“ bezeichnet."
          ultra_moon: "Die bei der Entwicklung freigesetzte Energie\nstimuliert seine Gehirnzellen und verleiht ihm\neine sehr zügellose, gewalttätige Natur."
        es:
          ultra_sun: "Allí donde alcanza su Hiperrayo la tierra queda\ncarbonizada por completo. En algunas regiones\nlo consideran una deidad destructiva."
          ultra_moon: "La energía desprendida durante la evolución\nafecta de forma irreversible sus neuronas,\ndando origen a su agresividad manifiesta."
        ko:
          ultra_sun: "파괴광선을 무자비하게 쏘아\n주변 일대를 태워 버린다.\n파괴의 신이라고 부르는 지방도 있다."
          ultra_moon: "진화 에너지가 뇌세포를\n강하게 자극한 결과 매우\n난폭한 성격으로 변화했다."
        zh_simp:
          ultra_sun: "能不断地吐出破坏光线，\n将周围一带燃烧殆尽。\n也有一些地区称其为破坏神。"
          ultra_moon: "进化能量猛烈刺激\n脑细胞的结果就是，\n它的性格变得非常的残暴。"
        zh_trad:
          ultra_sun: "會不斷吐出破壞光線，\n把周圍一帶燃燒殆盡，\n有的地方把牠稱為破壞神。"
          ultra_moon: "進化能量強烈刺激了\n腦細胞，結果使得\n牠的性格變得非常兇暴。"
    gyarados_mega:
      form_id: 1
      names:
        jp_kana: メガギャラドス
        jp_kanji: メガギャラドス
        en: Mega Gyarados
        fr: Méga-Léviator
        it: MegaGyarados
        de: Mega-Garados
        es: Mega-Gyarados
        ko: 메가갸라도스
        zh_simp: 超级暴鲤龙
        zh_trad: 超級暴鯉龍
      base_stats:
        hp: 95
        attack: 155
        defense: 109
        special_attack: 70
        special_defense: 130
        speed: 81
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
        - dragon
      abilities:
        - mold_breaker
      descriptions:
        jp_kana:
          ultra_sun: "メガシンカで　からだに　ふたんが\nかかっている。　ストレスで　いっそう\nきょうぼうに　あばれまわるのだ。"
          ultra_moon: "マッハの　そくどで　すいちゅう　から\nとびだす。　まきこまれれば　おおきな\nふねも　まっぷたつに　へしおれるぞ。"
        jp_kanji:
          ultra_sun: "メガシンカで　身体に　負担が\nかかっている。　ストレスで\n一層　凶暴に　暴れまわるのだ。"
          ultra_moon: "マッハの　速度で　水中　から\n飛び出す。　巻き込まれれば　大きな\n船も　真っ二つに　へし折れるぞ。"
        en:
          ultra_sun: "Mega Evolution places a burden on its body.\nThe stress causes it to become all the\nmore ferocious."
          ultra_moon: "It zooms out of the water at Mach speeds. Even\nlarge ships caught in its path are split cleanly\nin two!"
        fr:
          ultra_sun: "La Méga-Évolution est très rude pour son\norganisme. Ce stress le rend encore plus\nviolent et destructeur que d’habitude."
          ultra_moon: "Il jaillit de l’eau à une vitesse supersonique.\nSi un grand navire se trouve sur sa trajectoire,\ncelui-ci se retrouve coupé en deux."
        it:
          ultra_sun: "La megaevoluzione mette a dura prova il suo\norganismo. Questo stress lo rende ancora più\nferoce del solito."
          ultra_moon: "Esce dall’acqua alla velocità del suono, con\nun impeto tale da spaccare in due anche una\ngrossa nave."
        de:
          ultra_sun: "Die Mega-Entwicklung strapaziert seinen Körper\nso sehr, dass es dauerhaft unter Stress steht\nund nur noch ungestümer wütet."
          ultra_moon: "Es schnellt mit Mach-Geschwindigkeit aus dem\nWasser hervor. Selbst große Schiffe werden\nentzweigeteilt, wenn sie sich im Weg befinden."
        es:
          ultra_sun: "La megaevolución le pasa factura a su cuerpo.\nEl estrés hace que su instinto de destrucción\nse acentúe aún más."
          ultra_moon: "Sale del agua a velocidad supersónica, partiendo\nen dos las embarcaciones que se encuentren\nsurcando la superficie."
        ko:
          ultra_sun: "메가진화로 몸에 부담이\n더해졌다. 스트레스로 인해\n한층 더 흉포하게 날뛴다."
          ultra_moon: "마하의 속도로 수중에서\n튀어나온다. 휩쓸리면 큰 배도\n두 동강이 나버린다."
        zh_simp:
          ultra_sun: "身体在超级进化时\n承受了很大的负担。\n会因压力而越发粗暴地横冲直撞。"
          ultra_moon: "能以音速飞出水面。\n如果被卷入其中的话，\n即使是大船也会被折成两段。"
        zh_trad:
          ultra_sun: "超級進化對牠的身體造成了負擔。\n對此感到壓力的牠\n會更加兇暴地四處大鬧。"
          ultra_moon: "能以音速飛出水面。\n一旦被捲入其中，\n就算是大船也會被折成兩段。"
