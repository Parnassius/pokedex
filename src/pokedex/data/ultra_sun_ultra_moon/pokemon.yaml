dratini:
  species_id: 147
  names:
    jp_kana: ミニリュウ
    jp_kanji: ミニリュウ
    en: Dratini
    fr: Minidraco
    it: Dratini
    de: Dratini
    es: Dratini
    ko: 미뇽
    zh_simp: 迷你龙
    zh_trad: 迷你龍
  forms:
    dratini:
      form_id: 0
      base_stats:
        hp: 41
        attack: 64
        defense: 45
        special_attack: 50
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
