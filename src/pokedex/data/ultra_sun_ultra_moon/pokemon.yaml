      descriptions:
        jp_kana:
          ultra_sun: "６かくけいの　あなは　みみ。　みみの\nおくには　エネルギーコアが　あるので\nてを　つっこむと　おこりだすぞ。"
          ultra_moon: "じわれの　だんそうから　みつかった。\nからだを　こうせいする　せいぶんは\nなんびゃくねんも　まえの　つちだ。"
        jp_kanji:
          ultra_sun: "六角形の　穴は　耳。　耳の\n奥には　エネルギーコアが　あるので\n手を　突っ込むと　怒りだすぞ。"
          ultra_moon: "地割れの　断層から　見つかった。\n身体を　構成する　成分は\n何百年も　前の　土だ。"
        en:
          ultra_sun: "The hexagonal hole is its ear. Deep in that ear is\nan energy core, so if you stick your hand in\nthere, Roggenrola will be very angry!"
          ultra_moon: "It was found in a fissure in a layer of exposed\nrock. The material that makes up its body is\ndirt from several hundred years ago."
        fr:
          ultra_sun: "Sa cavité hexagonale est une oreille. Il se met\nen colère si l’on tente d’y plonger la main, car\nc’est là que se trouve son noyau d’énergie."
          ultra_moon: "Ce Pokémon a été découvert dans une faille\nrocheuse. La terre qui constitue son corps\nremonte à plusieurs centaines d’années."
        it:
          ultra_sun: "La conca esagonale è il suo orecchio, al cui\ninterno si trova un nucleo di energia. Per questo\nsi arrabbia se qualcuno ci infila una mano."
          ultra_moon: "È stato trovato nelle spaccature del terreno.\nIl suo corpo è composto da terra risalente a\ncentinaia di anni fa."
        de:
          ultra_sun: "Das sechseckige Loch dient ihm als Ohr. Tief\ndarin liegt sein Energiekern versteckt. Wenn\njemand hineingreift, wird es wütend."
          ultra_moon: "Dieses Pokémon wurde in den Klüften einer\nErdspalte entdeckt. Sein Körper setzt sich aus\njahrhundertealter Erde zusammen."
        es:
          ultra_sun: "El agujero con forma de hexágono es su oído, y\nen su interior cuenta con un núcleo de energía,\npor lo que se enfurece si meten la mano dentro."
          ultra_moon: "Fue descubierto entre las grietas de una falla.\nSu cuerpo está compuesto por una tierra que\ndata de cientos de años."
        ko:
          ultra_sun: "육각형의 구멍은 귀다. \n귀 안에 에너지 코어가 있어서\n손을 넣으면 화를 낸다."
          ultra_moon: "땅이 갈라진 곳의 단층에서 발견되었다.\n몸을 구성하는 성분은\n수백 년도 전의 흙이다."
        zh_simp:
          ultra_sun: "六角形的洞是它的耳朵。\n耳朵里面有能量核心，\n所以如果把手伸进去就会发怒。"
          ultra_moon: "是从地裂的断层中被发现的。\n构成身体的成分是好几百年前的土。"
        zh_trad:
          ultra_sun: "六角形的洞是耳朵。\n耳朵裡面有能量核心，\n如果把手伸進去就會惹牠生氣。"
          ultra_moon: "在地裂的斷層中被發現。\n構成身體的成分是\n好幾百年前的泥土。"
boldore:
  species_id: 525
  names:
    jp_kana: ガントル
    jp_kanji: ガントル
    en: Boldore
    fr: Géolithe
    it: Boldore
    de: Sedimantur
    es: Boldore
    ko: 암트르
    zh_simp: 地幔岩
    zh_trad: 地幔岩
