      descriptions:
        jp_kana:
          ultra_sun: "そうしょくの　おとなしい　ポケモン。\nじょうぶな　かおの　ひふで　じめんを\nほり　きのねっこなども　くっていた。"
          ultra_moon: "たいこの　ちそうから　かせきが\nみつかるが　かおの　ぶぶん　いがいが\nはっけん　されたことは　ない。"
        jp_kanji:
          ultra_sun: "草食の　おとなしい　ポケモン。\n丈夫な　顔の　皮膚で　地面を\n掘り　木の根っこなども　食っていた。"
          ultra_moon: "太古の　地層から　化石が\n見つかるが　顔の　部分　以外が\n発見　されたことは　ない。"
        en:
          ultra_sun: "A mild-mannered, herbivorous Pokémon, it used\nits face to dig up tree roots to eat. The skin on\nits face was plenty tough."
          ultra_moon: "Although its fossils can be found in layers of\nprimeval rock, nothing but its face has ever\nbeen discovered."
        fr:
          ultra_sun: "Cet herbivore, très calme de nature, utilisait\nla peau durcie de son museau pour déterrer\ndes racines à grignoter."
          ultra_moon: "On retrouve des fossiles de Dinoclier dans\nles couches sédimentaires préhistoriques, mais\nseule sa tête a résisté à l’épreuve du temps."
        it:
          ultra_sun: "Era un docile Pokémon erbivoro. Si serviva del\nmuso protetto dalla pelle coriacea per scavare\nnel terreno e mangiare le radici degli alberi."
          ultra_moon: "Fossili di questo Pokémon sono stati trovati in\nstrati geologici antichissimi. Tuttavia, gli unici\nresti pervenuti costituiscono parti del muso."
        de:
          ultra_sun: "Ein friedliches, pflanzenfressendes Pokémon.\nMit seiner harten Gesichtshaut wühlte es im\nBoden und fraß Baumwurzeln."
          ultra_moon: "Man findet zwar in uralten Erdschichten\nFossilien dieses Pokémon, aber meist handelt\nes sich dabei nur um Teile des Gesichts."
        es:
          ultra_sun: "Un Pokémon herbívoro de carácter afable.\nCon su dura protección facial podía desenterrar\nlas raíces de los árboles para comérselas."
          ultra_moon: "Los fósiles que se han encontrado hasta ahora\nen estratos prehistóricos pertenecen solo a su\ncara."
        ko:
          ultra_sun: "온순한 초식 포켓몬.\n튼튼한 얼굴 피부로 지면을\n파고들어 나무 뿌리도 먹었다."
          ultra_moon: "태고의 지층에서 화석이\n발견되었지만 얼굴 이외의\n부분이 발견된 적은 없다."
        zh_simp:
          ultra_sun: "食草的温顺宝可梦。\n用结实的脸部皮肤挖掘地面，\n连树根之类的也会吃。"
          ultra_moon: "虽然从太古时代的地层中\n发现了它的化石，\n但尚未发现除了脸以外的部分。"
        zh_trad:
          ultra_sun: "草食性的溫馴寶可夢。\n會用結實的臉部皮膚挖掘地面，\n連樹根之類的東西也會吃。"
          ultra_moon: "雖然在遠古時代的地層中\n發現了牠的化石，但至今未曾\n發現臉部以外的部分。"
bastiodon:
  species_id: 411
  names:
