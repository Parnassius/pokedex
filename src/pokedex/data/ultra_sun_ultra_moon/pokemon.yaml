    jp_kanji: メタング
    en: Metang
    fr: Métang
    it: Metang
    de: Metang
    es: Metang
    ko: 메탕구
    zh_simp: 金属怪
    zh_trad: 金屬怪
  forms:
    metang:
      form_id: 0
      base_stats:
        hp: 60
        attack: 75
        defense: 100
        special_attack: 55
        special_defense: 80
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
