    ko: 하데리어
    zh_simp: 哈约克
    zh_trad: 哈約克
  forms:
    herdier:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 65
        special_attack: 35
        special_defense: 65
        speed: 60
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - intimidate
        - sand_rush
      hidden_ability: scrappy
      descriptions:
        jp_kana:
          ultra_sun: "くろい　たいもうは　そだつほど\nかたく　じょうぶに　なって　ツメや\nキバも　かんたんには　とおさないぞ。"
          ultra_moon: "おおむかしの　へきがに　すがたが\nえがかれているほど　ながい　あいだ\nひとと　くらしを　ともに　してきた。"
        jp_kanji:
          ultra_sun: "黒い　体毛は　育つほど\n硬く　丈夫に　なって　ツメや\nキバも　簡単には　通さないぞ。"
          ultra_moon: "大昔の　壁画に　姿が\n描かれているほど　長い　間\n人と　暮らしを　ともに　してきた。"
        en:
          ultra_sun: "The longer its black fur grows, the harder and\nmore impervious it gets. Claws and fangs can’t\neasily penetrate it."
          ultra_moon: "It has been living with people for so long that\nportrayals of it can be found on the walls of\ncaves from long, long ago."
        fr:
          ultra_sun: "Son pelage sombre devient si robuste au fil\ndu temps que même des crocs ou des griffes\npeinent à passer au travers."
          ultra_moon: "Cela fait si longtemps que ce Pokémon vit\nen harmonie avec les humains qu’il apparaît\nmême sur des peintures rupestres antiques."
        it:
          ultra_sun: "La pelliccia scura diventa più dura e resistente\ncon la crescita e lo difende dagli artigli e dalle\nzanne dei nemici."
          ultra_moon: "Vive al fianco degli esseri umani da tempo\nimmemorabile, tanto che lo si trova raffigurato\npersino in antichissime pitture murali."
        de:
          ultra_sun: "Mit zunehmendem Alter wird sein dunkles Fell\nimmer widerstandsfähiger, sodass selbst Klauen\nund Fangzähne es kaum durchdringen können."
          ultra_moon: "Uralte Wandmalereien sprechen dafür, dass\nTerribark schon seit langer Zeit an der Seite der\nMenschen lebt."
        es:
          ultra_sun: "Con el paso del tiempo, su oscuro pelaje se\nvuelve duro y resistente, lo que le sirve como\nligera protección contra colmillos y cuernos."
          ultra_moon: "Ha convivido mucho tiempo con los humanos,\ncomo atestiguan las pinturas rupestres donde\naparece representado."
        ko:
          ultra_sun: "검은 털은 자랄수록\n딱딱하고 튼튼해져 발톱이나\n이빨로도 쉽게 뚫을 수 없다."
          ultra_moon: "먼 옛날의 벽화에 모습이\n그려져 있을 정도로 오랫동안\n인간과 생활을 함께해 왔다."
        zh_simp:
          ultra_sun: "黑色的体毛会随着成长\n而变得坚硬结实，\n连爪子和牙齿也不能轻易穿透。"
          ultra_moon: "与人类共同生活了很长时间，\n久远到连古代的壁画上都\n描绘着它的样子。"
        zh_trad:
          ultra_sun: "黑色的體毛會隨著成長\n變得越來越堅硬結實，\n連爪子和牙齒也無法輕易穿透。"
          ultra_moon: "長久以來一直與人類共同生活。\n就連遠古時代的壁畫上\n都留有牠的身影。"
stoutland:
  species_id: 508
  names:
    jp_kana: ムーランド
    jp_kanji: ムーランド
