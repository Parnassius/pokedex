        - normal
      egg_groups:
        - field
        - human_like
      abilities:
        - run_away
        - klutz
      hidden_ability: limber
      descriptions:
        jp_kana:
          ultra_sun: "てあしのちからは　よわいが　ぎゅっと\nまるめたみみを　おもいきり　のばすと\nおおきないわも　こなごなに　くだく。"
          ultra_moon: "かたほうの　みみを　いつも　まるめて\nいるのは　てきに　おそわれた　とき\nすぐに　はんげきする　ためだ。"
        jp_kanji:
          ultra_sun: "手足の力は　弱いが　ぎゅっと\n丸めた耳を　おもいきり　のばすと\n大きな岩も　粉々に　砕く。"
          ultra_moon: "片方の　耳を　いつも　丸めて\nいるのは　敵に　襲われた　とき\nすぐに　反撃する　ためだ。"
        en:
          ultra_sun: "Its arms and legs are weak, but when it rolls its\nears up tight and then unleashes them with its\nfull force, it can smash boulders to dust."
          ultra_moon: "The reason it keeps one ear rolled up is so it\ncan launch a swift counterattack if it’s attacked\nby an enemy."
        fr:
          ultra_sun: "Il possède peu de force dans ses membres,\nmais il lui suffit de déplier son oreille comme\nun ressort pour réduire un rocher en poussière."
          ultra_moon: "S’il a toujours une oreille repliée, c’est pour être\nà même de contre-attaquer dès qu’un ennemi\ntente de s’en prendre à lui."
        it:
          ultra_sun: "I suoi arti sono deboli, ma la sua forza è altrove:\nse estende di colpo l’orecchio arrotolato, può\nsbriciolare persino un macigno."
          ultra_moon: "Tiene un orecchio sempre arrotolato per poter\ncontrattaccare prontamente se un nemico lo\nprende di mira."
        de:
          ultra_sun: "Seine Gliedmaßen sind schwach, doch wenn es\nseine aufgerollten Ohren mit geballter Kraft\nhervorschnellen lässt, pulverisiert es jeden Fels."
          ultra_moon: "Eines seiner Ohren ist stets aufgerollt, damit es\nim Falle eines gegnerischen Angriffs jederzeit\nzurückschlagen kann."
        es:
          ultra_sun: "Si bien sus extremidades pecan de débiles, si\nenrolla las orejas y luego las extiende, puede\nhacer añicos incluso rocas bien grandes."
          ultra_moon: "Siempre tiene una de las orejas enrollada para\npoder contraatacar de inmediato si un enemigo\nlanza su ofensiva."
        ko:
          ultra_sun: "손발의 힘은 약하지만, 단단하게\n만 귀를 힘껏 뻗으면\n큰 바위도 산산조각 낸다."
          ultra_moon: "한쪽 귀를 항상 말고 있는 것은\n적에게 공격당했을 때\n바로 반격하기 위해서다."
        zh_simp:
          ultra_sun: "手脚的力量很弱，\n但如果死命伸长紧紧卷起的耳朵，\n连大岩石也能粉碎。"
          ultra_moon: "一只耳朵一直卷着\n是为了被敌人袭击的时候\n能立即反击。"
        zh_trad:
          ultra_sun: "手腳的力量很弱，\n但如果使勁伸長緊緊捲起的耳朵，\n就連大岩石也能粉碎。"
          ultra_moon: "一隻耳朵之所以總是捲起來，\n是為了在遭到敵人襲擊的時候\n能夠立刻做出反擊。"
