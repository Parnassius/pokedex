      descriptions:
        jp_kana:
          ultra_sun: "みらいを　よちする　ちからが　あるが\nみらいを　かえるほどの　ちからは\nもっていないと　いわれる　ポケモン。"
          ultra_moon: "みらいを　みとおして　いるが\nその　へんかを　のぞんでいないので\nじっと　うごかずに　いるらしい。"
        jp_kanji:
          ultra_sun: "未来を　予知する　力が　あるが\n未来を　変えるほどの　力は\n持っていないと　いわれる　ポケモン。"
          ultra_moon: "未来を　見通して　いるが\nその　変化を　望んでいないので\nじっと　動かずに　いるらしい。"
        en:
          ultra_sun: "It’s said that while this Pokémon has the power\nto predict the future, it’s not powerful enough\nto change the future it sees."
          ultra_moon: "While it can see the future, it has no desire to\nchange it, which is probably why it remains\nmotionless at all times."
        fr:
          ultra_sun: "Ce Pokémon aurait le pouvoir de voir l’avenir.\nIl n’a malheureusement pas celui de le changer."
          ultra_moon: "Bien qu’il puisse voir l’avenir, il n’a aucune\nintention de le changer. Cela expliquerait\npourquoi il reste immobile."
        it:
          ultra_sun: "Si dice che questo Pokémon abbia il potere di\nprevedere il futuro, ma non di cambiarlo."
          ultra_moon: "Prevede il futuro ma non gradisce i mutamenti\nche vi scorge. Per questo pare che se ne stia\nsempre immobile."
        de:
          ultra_sun: "Dieses Pokémon kann zwar angeblich die\nZukunft voraussehen, aber seine Kräfte\nreichen nicht aus, um diese auch zu ändern."
          ultra_moon: "Es kann anscheinend in die Zukunft sehen, hat\naber keine Absicht, diese zu ändern. Deshalb\nsteht es einfach nur bewegungslos herum."
        es:
          ultra_sun: "Según se cree, este Pokémon posee el don de la\nclarividencia, pero carece del poder para alterar\nel futuro."
          ultra_moon: "Puede prever el futuro, pero no alberga la menor\nintención de alterarlo. Probablemente sea ese el\nmotivo por el que permanece inmóvil."
        ko:
          ultra_sun: "미래를 예지하는 힘이 있지만,\n미래를 바꿀 정도의 힘은\n없다고 전해지는 포켓몬."
          ultra_moon: "미래를 내다보고 있지만\n그것의 변화를 바라지 않아서\n가만히 움직이지 않는다고 한다."
        zh_simp:
          ultra_sun: "据说该宝可梦虽然有着\n能预知未来的力量，\n但却没有能改变未来的力量。"
          ultra_moon: "能够看穿未来，但可能是因为\n未来的那些变化并不是自己想要的，\n所以它会待着一动不动。"
        zh_trad:
          ultra_sun: "據說這種寶可夢擁有\n能夠預知未來的能力，\n但是沒有足以改變未來的力量。"
          ultra_moon: "能夠看見未來，但似乎因為\n未來的變化不符合期望，\n所以牠一動也不動。"
