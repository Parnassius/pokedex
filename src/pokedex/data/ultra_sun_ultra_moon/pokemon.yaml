      types:
        - water
      egg_groups:
        - field
        - water_2
      abilities:
        - water_veil
        - oblivious
      hidden_ability: pressure
      descriptions:
        jp_kana:
          ultra_sun: "くちを　ひらいたまま　およいで\nかいすいごと　エサをくう。　いらない\nみずは　はなから　ふきだし　すてる。"
          ultra_moon: "ごくごく　まれに　むれが　すなはまに\nうちあがるのは　おおむかし　りくに\nすんでいた　なごりと　いわれている。"
        jp_kanji:
          ultra_sun: "口を　開いたまま　泳いで\n海水ごと　エサを　食う。　いらない\n水は　鼻から　噴き出し　捨てる。"
          ultra_moon: "極々　まれに　群れが　砂浜に\n打ちあがるのは　大昔　陸に\n棲んでいた　名残と　いわれている。"
        en:
          ultra_sun: "It swims along with its mouth open and\nswallows down seawater along with its food.\nIt sprays excess water out of its nostrils."
          ultra_moon: "Due to their memories of when they once lived\non land, pods of them will, very rarely, wash up\non shore."
        fr:
          ultra_sun: "Pour se nourrir, il nage en gardant la bouche\ngrande ouverte, et recrache l’eau dont il n’a\npas besoin par son évent."
          ultra_moon: "On raconte que ce Pokémon habitait jadis\nsur terre. En de rares occasions, on peut en\nvoir se regrouper sur les plages."
        it:
          ultra_sun: "Nuota con la bocca aperta, ingoiando cibo e\nacqua marina, poi espelle l’acqua in eccesso\nspruzzandola dallo sfiatatoio."
          ultra_moon: "Molto raramente si possono vedere gruppi\ndi questi Pokémon adagiati a riva, segno che\nin tempi antichi vivevano sulla terraferma."
        de:
          ultra_sun: "Es schwimmt mit offenem Maul und nimmt mit\ndem Wasser sein Futter auf. Überschüssiges\nWasser stößt es durch seine Nasenlöcher aus."
          ultra_moon: "Als Überbleibsel ihres einstigen Lebens an Land\ndeutet man den Umstand, dass Wailmer ab und\nan auch heute noch Strände aufsuchen."
        es:
          ultra_sun: "Nada con la boca abierta para engullir alimento\ny cantidades ingentes de agua de mar, cuyo\nexceso expulsa luego por el espiráculo."
          ultra_moon: "En raras ocasiones, bancos enteros quedan\nvarados en la playa, tal vez debido a que en un\npasado vivía en tierra firme."
        ko:
          ultra_sun: "입을 열고 헤엄쳐서\n해수와 함께 먹이를 먹는다.\n필요없는 물은 코로 내뿜는다."
          ultra_moon: "매우 드물게 무리가 모래 해변에\n올라오는 것은 먼 옛날 육지에\n살았던 기억 때문이라고 전해진다."
        zh_simp:
          ultra_sun: "会张着嘴游泳，\n将食物连同海水一起吃下去。\n不要的水会从鼻子里喷出来舍弃。"
          ultra_moon: "在极其偶然的情况下它们会群体\n冲上沙滩，据说这是源自它们\n远古时代居住在陆地时的习性。"
        zh_trad:
          ultra_sun: "會張著嘴巴游泳，\n把食物連同海水一起吃下去。\n不要的水會從鼻子噴出去捨棄掉。"
          ultra_moon: "在極少數情況下，吼吼鯨的群體\n會衝上沙灘。據說這是源自牠們在\n遠古時代棲息於陸地上的習性。"
