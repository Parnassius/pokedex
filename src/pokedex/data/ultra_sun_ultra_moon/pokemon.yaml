        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
      hidden_ability: sniper
      held_items:
        rare: sharp_beak
      descriptions:
        jp_kana:
          ultra_sun: "じぶんのテリトリーを　まもるためなら\nおおきな　ポケモンが　あいてでも\nむかっていく　むこうみずな　せいしつ。"
          ultra_moon: "ハネが　みじかく　ながい　きょりを\nとべない。　せわしなく　うごき\nまわって　むしポケモンを　ついばむ。"
        jp_kanji:
          ultra_sun: "自分のテリトリーを　守るためなら\n大きな　ポケモンが　相手でも\n向かっていく　向こう見ずな　性質。"
          ultra_moon: "羽が　短く　長い　距離を\n飛べない。　せわしなく　動き\nまわって　むしポケモンを　ついばむ。"
        en:
          ultra_sun: "Its reckless nature leads it to stand up to\nothers—even large Pokémon—if it has to protect\nits territory."
          ultra_moon: "Due to its short wings, it can’t fly long\ndistances. It wanders about restlessly and\npecks at bug Pokémon."
        fr:
          ultra_sun: "Un Pokémon téméraire qui n’hésite pas\nà affronter des Pokémon plus gros que lui\npour protéger son territoire."
          ultra_moon: "Ses courtes ailes ne lui permettent pas de\nvoler sur de longues distances. Il quadrille\nson territoire pour picorer les Pokémon Insecte."
        it:
          ultra_sun: "Temerario di natura, per difendere il proprio\nterritorio non esita a lanciarsi anche contro\navversari più grandi di lui."
          ultra_moon: "A causa delle ali troppo corte, non riesce a\nvolare per lunghe distanze. Scorrazza qua e là\nalla ricerca di Pokémon Coleottero da beccare."
        de:
          ultra_sun: "Wenn es um die Verteidigung seines Reviers\ngeht, schreckt das draufgängerische Habitak\nselbst vor großen Pokémon nicht zurück."
          ultra_moon: "Aufgrund seiner kurzen Flügel kann es keine\nlangen Strecken fliegen. Es rennt wild durch\ndie Gegend, um Käfer-Pokémon aufzupicken."
        es:
          ultra_sun: "Su temperamento temerario hace que no dude\nen enfrentarse a rivales mucho más grandes\na la hora de defender su territorio."
          ultra_moon: "Sus cortas alas le impiden volar grandes\ndistancias, por lo que revolotea inquieto y\npicotea a todo Pokémon insecto que ve."
        ko:
          ultra_sun: "자신의 영역을 지키기 위해서라면\n상대가 큰 포켓몬이라도\n덤벼드는 무모한 성질을 가졌다."
          ultra_moon: "날개가 짧아서 먼 거리를\n날지 못한다. 쉴 새 없이 움직이며\n벌레포켓몬을 쪼아 댄다."
        zh_simp:
          ultra_sun: "生性鲁莽，只要是为了保护\n自己的领地，即便对手是\n大型宝可梦，也仍会冲向对手。"
          ultra_moon: "翅膀短，无法飞远。\n会跳来跳去忙个不停地\n啄食虫宝可梦。"
        zh_trad:
          ultra_sun: "生性魯莽衝動，\n只要是為了守護自己的地盤，\n即使對手是大型寶可夢也會正面迎戰。"
          ultra_moon: "翅膀很短，無法長距離飛行。\n總是不停地四處跳來跳去，\n忙著啄食蟲寶可夢。"
fearow:
  species_id: 22
  names:
