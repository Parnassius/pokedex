      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - steel
      egg_groups:
        - bug
      abilities:
        - technician
      descriptions:
        jp_kana:
          ultra_sun: "かじょうな　メガシンカのエネルギーを\nたくわえているため　ちょうじかん\nたつと　からだが　とけはじめてしまう。"
          ultra_moon: "はさむより　なぐるほうが　とくい。\nながいじかん　たたかうと　ハサミの\nおもさに　たえられなくなる。"
        jp_kanji:
          ultra_sun: "過剰な　メガシンカの　エネルギーを\n蓄えているため　長時間\n経つと　身体が　溶け始めてしまう。"
          ultra_moon: "はさむより　殴るほうが　得意。\n長い時間　戦うと　ハサミの\n重さに　耐えられなくなる。"
        en:
          ultra_sun: "It stores the excess energy from Mega Evolution,\nso after a long time passes, its body starts\nto melt."
          ultra_moon: "It’s better at beating things than grasping them.\nWhen it battles for a long time, the weight of its\npincers becomes too much to bear."
        fr:
          ultra_sun: "S’il reste trop longtemps sous cette forme,\nson corps commence à fondre à cause\nde l’afflux d’énergie."
          ultra_moon: "Ses pinces lui servent davantage à frapper qu’à\ncouper. Elles sont si lourdes qu’il lui est difficile\nde tenir quand le combat s’éternise."
        it:
          ultra_sun: "Con la megaevoluzione accumula un’enorme\nquantità di energia. Se passa troppo tempo\nin questo stato, comincia a fondere."
          ultra_moon: "Le sue chele funzionano meglio come armi\ncontundenti che da taglio. Se lotta troppo\na lungo, il loro peso diventa insopportabile."
        de:
          ultra_sun: "Da es die Restenergie aus der Mega-Entwicklung\nin seinem Inneren speichert, beginnt sein Körper\nzu schmelzen, wenn es sich lange nicht bewegt."
          ultra_moon: "Es kann besser zuschlagen als zupacken.\nHält ein Kampf lange an, macht ihm das\nGewicht seiner Scheren schwer zu schaffen."
        es:
          ultra_sun: "Almacena en su interior la tremenda energía de\nla megaevolución y, si pasa mucho tiempo en\nesta forma, su cuerpo comienza a fundirse."
          ultra_moon: "Sus pesadas pinzas son más útiles para golpear\na su presa que para atraparla. Si el combate se\nalarga demasiado, no puede con ellas."
        ko:
          ultra_sun: "과도한 메가진화의 에너지를\n축적하고 있기 때문에 시간이\n오래되면 몸이 녹기 시작한다."
          ultra_moon: "잡는 것보다 때리는 것이 특기다.\n장시간을 싸우면 집게의\n무게를 견딜 수 없게 된다."
        zh_simp:
          ultra_sun: "由于体内存储了过多的超级进化能量，\n所以在经过很长一段时间后，\n它的身体就会开始熔化。"
          ultra_moon: "比起夹击，它更擅长用钳子抡打对手。\n长时间战斗后，它就会变得\n无法承受钳子的重量。"
        zh_trad:
          ultra_sun: "體內累積了過多的超級進化能量。\n要是經過了太長的時間，\n牠的身體就會開始融化。"
          ultra_moon: "比起用鉗子夾，更擅長毆打對手。\n戰鬥的時間一旦拉長，\n就會變得無法承受鉗子的重量。"
