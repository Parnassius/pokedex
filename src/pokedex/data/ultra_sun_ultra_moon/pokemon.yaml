      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - swarm
        - technician
      hidden_ability: steadfast
      descriptions:
        jp_kana:
          ultra_sun: "するどい　２つの　カマは　たんなる\nぶきでは　ない。　きように　あやつり\nえものを　さばいて　くらうのだ。"
          ultra_moon: "めにも　とまらぬ　はやわざは\nくうきを　きりさくほど。　ニンジャと\nよばれ　アローラでは　だいにんき。"
        jp_kanji:
          ultra_sun: "鋭い　２つの　カマは　単なる\n武器では　ない。　器用に　操り\n獲物を　さばいて　食らうのだ。"
          ultra_moon: "目にも　止まらぬ　早業は\n空気を　切り裂くほど。　ニンジャと\n呼ばれ　アローラでは　大人気。"
        en:
          ultra_sun: "Its two sharp scythes are more than just\nweapons. It uses them with dexterity to dress\nits prey before eating."
          ultra_moon: "Some call it a ninja. Its movements—\nimperceptibly quick—are sufficient to cleave\nthe air in two. It’s very popular in Alola."
        fr:
          ultra_sun: "Ses avant-bras en forme de faux ne lui servent\npas uniquement à se battre : il les utilise aussi\npour dépecer ses proies avant de les dévorer."
          ultra_moon: "Sa vitesse incroyable lui permet de trancher\nl’air. Il jouit d’une grande popularité à Alola,\noù il est surnommé « le ninja »."
        it:
          ultra_sun: "Usa le due falci affilate sia come armi durante\nla lotta, sia per sfilettare le prede prima di\nmangiarle."
          ultra_moon: "I suoi rapidissimi movimenti gli permettono\ndi tagliare persino l’aria. Ad Alola è molto\npopolare ed è comunemente chiamato “ninja”."
        de:
          ultra_sun: "Seine scharfen Sicheln sind nicht nur Waffen.\nVor einer Mahlzeit filetiert es damit auch\ngeschickt seine Beute."
          ultra_moon: "Mit enormer Schnelligkeit zerkleinert es alles in\nseinem Umfeld. Unter dem Spitznamen „Ninja“\nerfreut es sich in Alola großer Beliebtheit."
        es:
          ultra_sun: "Sus dos guadañas no son meras armas de\ncombate. También las utiliza diestramente para\ndesmenuzar y devorar a sus presas."
          ultra_moon: "Goza de gran popularidad en Alola. Por sus\nveloces movimientos que parecen cortar el\naire, algunos lo llaman el Ninja."
        ko:
          ultra_sun: "날카로운 2개의 낫은 단순한\n무기가 아니다. 요령 있게\n먹이를 발라 먹는다."
          ultra_moon: "눈에 보이지 않는 빠른 기술은\n공기를 베어 가를 정도다. 닌자라\n불리며 알로라에서는 인기가 많다."
        zh_simp:
          ultra_sun: "２把锋利的镰刀并不单单是武器。\n还能灵活地运用它们来\n切割猎物，然后食用。"
          ultra_moon: "连眼睛都无法看清的麻利手法\n甚至能切开空气。它被称为忍者，\n在阿罗拉非常具有人气。"
        zh_trad:
          ultra_sun: "鋒利的２把鐮刀不只是武器，\n飛天螳螂會靈巧地用鐮刀\n分解獵物來進食。"
          ultra_moon: "肉眼無法看清的迅速動作\n甚至能夠斬斷空氣。\n被稱為忍者的牠在阿羅拉很受歡迎。"
jynx:
  species_id: 124
  names:
    jp_kana: ルージュラ
    jp_kanji: ルージュラ
    en: Jynx
    fr: Lippoutou
    it: Jynx
    de: Rossana
    es: Jynx
    ko: 루주라
    zh_simp: 迷唇姐
    zh_trad: 迷唇姐
  forms:
    jynx:
      form_id: 0
      base_stats:
        hp: 65
        attack: 50
        defense: 35
        special_attack: 115
        special_defense: 95
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - ice
        - psychic
      egg_groups:
        - human_like
      abilities:
        - oblivious
        - forewarn
      hidden_ability: dry_skin
      descriptions:
        jp_kana:
          ultra_sun: "どくとくの　リズムで　こしを　ふる。\nアローラに　すむ　ルージュラは\nそのキレが　じつに　すばらしい。"
          ultra_moon: "にんげんの　ことばのような　ふしぎな\nなきごえ。　ルージュラに　うたわせる\nきょくを　つくる　おんがくかもいる。"
        jp_kanji:
          ultra_sun: "独特の　リズムで　腰を　振る。\nアローラに　棲む　ルージュラは\nそのキレが　実に　素晴らしい。"
          ultra_moon: "人間の　言葉のような　不思議な\n鳴き声。　ルージュラに　歌わせる\n曲を　作る　音楽家もいる。"
        en:
          ultra_sun: "It sways its hips to a rhythm all its own. The\nprecise movements of Jynx living in Alola are\ntruly wonderful."
          ultra_moon: "Its strange cries sound like human language.\nThere are some musicians who compose songs\nfor Jynx to sing."
        fr:
          ultra_sun: "Les Lippoutou se déhanchent sur un tempo très\nparticulier, et ceux d’Alola sont particulièrement\nréputés pour leur admirable sens du rythme."
          ultra_moon: "Ses étranges cris s’apparentent à des mots.\nCertains musiciens lui composent des chansons\npour qu’il les interprète."
        it:
          ultra_sun: "Cammina ancheggiando a un ritmo tutto suo.\nI movimenti dei Jynx della regione di Alola sono\nparticolarmente affascinanti."
          ultra_moon: "Emette strani versi che ricordano il linguaggio\numano. Alcuni compositori scrivono melodie\nappositamente per farle cantare ai Jynx."
        de:
          ultra_sun: "Es bewegt seine Hüften in einem eigentümlichen\nRhythmus. Rossana in Alola beherrschen einen\nbesonders anmutigen Hüftschwung."
          ultra_moon: "Sein sonderbarer Ruf klingt fast wie die Sprache\nder Menschen. Manche Musiker schreiben sogar\neigens Lieder, damit Rossana sie singen kann."
        es:
          ultra_sun: "Se bambolea con un ritmo peculiar que, en el\ncaso de los ejemplares que viven en Alola, es\nrealmente cautivador."
          ultra_moon: "Sus particulares gritos recuerdan al lenguaje\nhumano. Algunos artistas han compuesto temas\nespecíficamente para estos Pokémon."
        ko:
          ultra_sun: "독특한 리듬으로 허리를 흔든다.\n알로라에 사는 루주라는\n그 동작이 실로 훌륭하다."
          ultra_moon: "인간의 언어를 닮은 이상한\n울음소리를 가졌다. 루주라가 부르는\n곡을 만드는 음악가도 있다."
        zh_simp:
          ultra_sun: "会按独特的节奏扭动腰部。\n栖息在阿罗拉的迷唇姐，\n那动作更是妙不可言。"
          ultra_moon: "神奇的叫声听起来就像人类的\n语言一样。也有些音乐家\n会谱写一些让迷唇姐唱的曲子。"
        zh_trad:
          ultra_sun: "會以獨特的節奏扭動腰部。\n棲息在阿羅拉的迷唇姐\n動作更是特別完美無瑕。"
          ultra_moon: "奇異的叫聲聽起來就像是\n人類的語言。也有些音樂家\n會創作讓迷唇姐唱的曲子。"
electabuzz:
  species_id: 125
  names:
    jp_kana: エレブー
    jp_kanji: エレブー
    en: Electabuzz
    fr: Élektek
    it: Electabuzz
    de: Elektek
    es: Electabuzz
    ko: 에레브
    zh_simp: 电击兽
    zh_trad: 電擊獸
  forms:
    electabuzz:
      form_id: 0
      base_stats:
        hp: 65
        attack: 83
        defense: 57
        special_attack: 95
        special_defense: 85
        speed: 105
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - human_like
      abilities:
        - static
      hidden_ability: vital_spirit
      held_items:
        rare: electirizer
      descriptions:
        jp_kana:
          ultra_sun: "ぜんしんが　でんきを　おびている。\nうでを　ぐるぐる　まわし　でんきを\nチャージしてから　パンチを　はなつ。"
          ultra_moon: "ていでんが　おこる　げんいんに\nされることが　おおいが　じつは\nかいしゃの　ミスの　ほうが　おおい。"
        jp_kanji:
          ultra_sun: "全身が　電気を　帯びている。\n腕を　ぐるぐる　まわし　電気を\nチャージしてから　パンチを　放つ。"
          ultra_moon: "停電が　起こる　原因に\nされることが　多いが　実は\n会社の　ミスの　ほうが多い。"
        en:
          ultra_sun: "Electricity permeates its body. It swings\nits arms round and round to charge up\nelectricity before unleashing a punch."
          ultra_moon: "While it’s often blamed for power outages, the\ntruth is the cause of outages is more often\nan error on the part of the electric company."
        fr:
          ultra_sun: "Son corps regorge d’électricité. Il la concentre\ndans ses bras en faisant des moulinets, avant\nde décocher un coup d’une violence fulgurante."
          ultra_moon: "On l’accuse d’être à l’origine des coupures\nde courant, mais c’est souvent une excuse pour\ncouvrir les bévues du personnel des centrales."
        it:
          ultra_sun: "Tutto il suo corpo è pervaso di elettricità.\nFa roteare vorticosamente le braccia prima di\nsferrare un pugno per caricarlo il più possibile."
          ultra_moon: "Spesso gli si dà la colpa dei blackout, ma in\nrealtà in genere le vere responsabili sono le\ncompagnie elettriche."
        de:
          ultra_sun: "Sein ganzer Körper speichert Elektrizität.\nVor einem Schlag lädt es seine Arme mit\nkreisförmigen Bewegungen elektrisch auf."
          ultra_moon: "Es wird oft für Stromausfälle verantwortlich\ngemacht, doch viel häufiger handelt es sich\num eine Folge menschlichen Fehlverhaltens."
        es:
          ultra_sun: "Su cuerpo entero emite energía eléctrica. Hace\ngirar los brazos cuales aspas de molino para\ncargar sus puñetazos con electricidad."
          ultra_moon: "Cuando se produce un apagón, a menudo se\nculpa a este Pokémon, aunque en realidad el\nfallo haya sido de la compañía eléctrica."
        ko:
          ultra_sun: "온몸이 전기로 둘러싸여 있다.\n팔을 빙빙 돌려 전기를\n충전 후 펀치를 날린다."
          ultra_moon: "정전이 일어나는 원인으로\n지목되는 경우가 많지만 사실은\n회사의 실수인 경우가 더 많다."
        zh_simp:
          ultra_sun: "全身都带着电。\n会一圈圈抡动手臂\n进行充电后再出拳。"
          ultra_moon: "虽然引起停电的原因多被\n归咎于它们身上，\n但其实很多是电力公司的过失。"
        zh_trad:
          ultra_sun: "全身帶著電流，\n會不斷轉動手臂來充電\n然後使出拳擊。"
          ultra_moon: "人們經常把停電的原因\n歸咎到牠們身上，但其實\n大多是電力公司的過失。"
magmar:
  species_id: 126
  names:
    jp_kana: ブーバー
    jp_kanji: ブーバー
    en: Magmar
    fr: Magmar
    it: Magmar
    de: Magmar
    es: Magmar
    ko: 마그마
    zh_simp: 鸭嘴火兽
    zh_trad: 鴨嘴火獸
  forms:
    magmar:
      form_id: 0
      base_stats:
        hp: 65
        attack: 95
        defense: 57
        special_attack: 100
        special_defense: 85
        speed: 93
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
      egg_groups:
        - human_like
      abilities:
        - flame_body
      hidden_ability: vital_spirit
      held_items:
        rare: magmarizer
      descriptions:
        jp_kana:
          ultra_sun: "ぜんしんが　もえていて　いきを\nするだけでも　あつい。　くしゃみと\nどうじに　ほのおが　ふきだすぞ。"
          ultra_moon: "あついばしょほど　ちょうしが　よい。\nアローラのブーバーは　ほかの　とちと\nくらべ　たくましいと　いわれている。"
        jp_kanji:
          ultra_sun: "全身が　燃えていて　息を\nするだけでも　熱い。　くしゃみと\n同時に　炎が　噴きだすぞ。"
          ultra_moon: "暑い場所ほど　調子が　良い。\nアローラのブーバーは　他の　土地と\n比べ　たくましいと　いわれている。"
        en:
          ultra_sun: "Its entire body is burning. When it breathes,\nthe temperature rises. When it sneezes, flames\nshoot out!"
          ultra_moon: "The hotter the place, the better they feel.\nMagmar in Alola are said to be hardier than\nthose in other areas."
        fr:
          ultra_sun: "Son corps est tellement ardent que même son\nsouffle brûle. Lorsqu’il éternue, des flammes\ns’échappent de son bec."
          ultra_moon: "Plus il fait chaud, mieux il se porte. On dit\nd’ailleurs que le Magmar d’Alola est plus robuste\nque ses cousins habitant d’autres contrées."
        it:
          ultra_sun: "Tutto il suo corpo arde e persino il suo respiro\nè rovente. Quando starnutisce sputa fiamme\ndalla bocca."
          ultra_moon: "Si trova molto a suo agio nei luoghi caldi.\nSi dice che i Magmar che vivono ad Alola\nsiano più robusti di quelli delle altre regioni."
        de:
          ultra_sun: "Mit seinem brennenden Körper und glühenden\nAtem heizt es seine Umgebung auf. Beim Niesen\nstößt es Flammen aus."
          ultra_moon: "Je heißer die Umgebung, desto besser ist\nMagmar in Form. Im Vergleich zu anderen\nRegionen ist es in Alola besonders stark."
        es:
          ultra_sun: "Su cuerpo arde con tal fuerza que su aliento\nresulta abrasador. Expulsa llamaradas con tan\nsolo estornudar."
          ultra_moon: "Se desarrolla mejor cuanto más cálido sea el\nentorno, por lo que los ejemplares de Alola son\nmás robustos que los de otras regiones."
        ko:
          ultra_sun: "온몸이 불에 타고 있어서\n숨을 쉬기만 해도 뜨겁다.\n재채기와 동시에 불꽃을 뿜어낸다."
          ultra_moon: "더운 곳일수록 컨디션이 좋다.\n알로라의 마그마는 다른 지역에\n비해 늠름하다고 한다."
        zh_simp:
          ultra_sun: "全身都在燃烧，\n光是呼出的气息就带着高温，\n打喷嚏时会同时喷出火焰。"
          ultra_moon: "越热的地方，它的身体就会越好。\n据说比起其他地方来，\n阿罗拉的鸭嘴火兽长得更壮实。"
        zh_trad:
          ultra_sun: "全身都在燃燒，\n光是呼出的氣息就帶著高溫，\n打噴嚏時會同時噴出火焰。"
          ultra_moon: "待的地方越熱，身體狀況就越好。\n據說和其他地方比起來，\n阿羅拉的鴨嘴火獸更加強壯。"
pinsir:
