      descriptions:
        jp_kana:
          ultra_sun: "らんぼうな　せいしつだが　こうぶつの\nじゅくした　くだものを　あげると\nてのひらを　かえしたように　なつく。"
          ultra_moon: "いわも　くだく　ちょうおんぱで　めに\nはいる　もの　すべてに　こうげきを\nしかける　ちのけのおおい　ポケモン。"
        jp_kanji:
          ultra_sun: "乱暴な　性質だが　好物の\n熟した　果物を　あげると\n手のひらを　返したように　懐く。"
          ultra_moon: "岩も　砕く　超音波で　目に\n入る　もの　すべてに　攻撃を\n仕掛ける　血の気の多い　ポケモン。"
        en:
          ultra_sun: "Although it has a violent disposition, if you give\nit a nice ripe fruit that it loves, Noivern will\nsuddenly become tame."
          ultra_moon: "This hot-blooded Pokémon attacks anything it\nsees with ultrasonic waves that can\ncrush boulders."
        fr:
          ultra_sun: "D’ordinaire violent, il vous mange littéralement\ndans la main si vous lui donnez des fruits mûrs,\nson mets favori."
          ultra_moon: "Ce Pokémon sanguinaire attaque tout ce qui\nentre dans son champ de vision avec ses\nultrasons capables de pulvériser des rochers."
        it:
          ultra_sun: "È di indole aggressiva, ma se qualcuno gli\noffre i frutti maturi di cui va matto cambia\ncompletamente atteggiamento e diventa docile."
          ultra_moon: "È un Pokémon aggressivo che attacca tutto ciò\nche incontra sul suo cammino con ultrasuoni\ncosì potenti da frantumare anche i massi."
        de:
          ultra_sun: "Es ist von Natur aus brutal. Gibt man ihm jedoch\nseine Leibspeise, reifes Obst, ist es plötzlich\nwie ausgewechselt und wird zahm."
          ultra_moon: "Dieses heißblütige Pokémon, das mithilfe von\nUltraschallwellen Felsen zermalmen kann, greift\nalles an, was ihm unter die Augen kommt."
        es:
          ultra_sun: "Es de carácter violento, pero si se le da su\nalimento favorito, una fruta madura, su actitud\ncambia totalmente y se muestra muy dócil."
          ultra_moon: "De temperamento violento, ataca a todo el que\nse cruce en su camino con unas ondas\nultrasónicas capaces de partir rocas."
        ko:
          ultra_sun: "성질은 난폭하지만 좋아하는\n잘 익은 과일을 주면\n언제 그랬냐는 듯이 잘 따른다."
          ultra_moon: "바위도 부수는 초음파로\n눈에 들어오는 모든 것에 공격을\n가하는 혈기가 왕성한 포켓몬."
        zh_simp:
          ultra_sun: "性格粗暴，但如果给它\n喜爱吃的成熟水果，\n就会一反常态，变得很亲切。"
          ultra_moon: "用岩石都能粉碎的超音波\n将目光所及之处全都攻击一番，\n是血气方刚的宝可梦。"
        zh_trad:
          ultra_sun: "性情粗暴，但如果給牠\n愛吃的成熟水果，牠就會\n改頭換面似地變得很親近人。"
          ultra_moon: "會用連岩石都能粉碎的超音波\n朝目光所及的一切發動攻擊，\n是種性情暴躁的寶可夢。"
