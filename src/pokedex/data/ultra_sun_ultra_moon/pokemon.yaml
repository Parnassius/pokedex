corsola:
  species_id: 222
  names:
    jp_kana: サニーゴ
    jp_kanji: サニーゴ
    en: Corsola
    fr: Corayon
    it: Corsola
    de: Corasonn
    es: Corsola
    ko: 코산호
    zh_simp: 太阳珊瑚
    zh_trad: 太陽珊瑚
  forms:
    corsola:
      form_id: 0
      base_stats:
        hp: 65
        attack: 55
        defense: 95
        special_attack: 65
        special_defense: 95
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
        - rock
      egg_groups:
        - water_1
        - water_3
      abilities:
        - hustle
        - natural_cure
      hidden_ability: regenerator
      held_items:
        rare: luminous_moss
      descriptions:
        jp_kana:
          ultra_sun: "アローラに　くらす　サニーゴは\nピンクが　とても　あざやかで　こい。\nえいようほうふな　うみの　おかげだ。"
          ultra_moon: "てんてきの　ヒドイデが　たくさんいる\nアローラでは　あたまの　えだが\nみじかい　サニーゴが　おおいのだ。"
        jp_kanji:
          ultra_sun: "アローラに　暮らす　サニーゴは\nピンクが　とても　鮮やかで　濃い。\n栄養豊富な　海の　おかげだ。"
          ultra_moon: "天敵の　ヒドイデが　たくさんいる\nアローラでは　頭の　枝が\n短い　サニーゴが　多いのだ。"
        en:
          ultra_sun: "The pink of Corsola that live in Alola is deep\nand vibrant, thanks to seas filled with nutrition."
          ultra_moon: "In Alola, where their natural enemies Mareanie\nare plentiful, many Corsola have stubby\nbranches on their heads."
        fr:
          ultra_sun: "Les nutriments présents dans les eaux riches\nd’Alola ont donné à Corayon cette couleur rose\nsi vive et chatoyante."
          ultra_moon: "À cause de la prolifération de Vorastérie,\nson prédateur naturel, le Corayon d’Alola\na souvent les cornes courtes."
        it:
          ultra_sun: "I Corsola che vivono ad Alola sono di un colore\nrosa intenso e brillante grazie alle acque marine\nricche di elementi nutritivi."
          ultra_moon: "Ad Alola, i rametti sulla testa dei Corsola sono\nspesso più corti del normale per la presenza\nmassiccia di Mareanie, i loro nemici naturali."
        de:
          ultra_sun: "Aufgrund des nährstoffreichen Meeres ist das\nPink der in Alola lebenden Corasonn besonders\nstrahlend und kräftig."
          ultra_moon: "In Alola gibt es viele Corasonn mit kurzen\nKorallenarmen, da es dort von ihren\nFressfeinden Garstella nur so wimmelt."
        es:
          ultra_sun: "La coloración rosa de los ejemplares de Alola es\nextraordinariamente viva e intensa debido a la\nabundancia de nutrientes de sus aguas."
          ultra_moon: "En Alola abundan los Mareanie, su enemigo\nnatural, y por eso se ven muchos Corsola con\nramas de coral más cortas de lo normal."
        ko:
          ultra_sun: "알로라에 사는 코산호는\n핑크가 매우 선명하고 짙다.\n영양이 풍부한 바다 덕분이다."
          ultra_moon: "천적인 시마사리가 잔뜩 있는\n알로라에서는 머리의 가지가\n짧은 코산호가 많다."
        zh_simp:
          ultra_sun: "生活在阿罗拉的太阳珊瑚身上的\n粉红色非常鲜艳浓郁。\n这都是拜富含营养的大海所赐。"
          ultra_moon: "在天敌好坏星大量存在的阿罗拉，\n大多数太阳珊瑚头上的\n枝条都是短短的。"
        zh_trad:
          ultra_sun: "生活在阿羅拉的太陽珊瑚\n身上的粉紅色非常鮮豔濃郁，\n這都是拜富含營養的大海所賜。"
          ultra_moon: "在天敵好壞星大量存在的\n阿羅拉，大多數的太陽珊瑚\n頭上的枝條都短短的。"
remoraid:
  species_id: 223
  names:
    jp_kana: テッポウオ
    jp_kanji: テッポウオ
    en: Remoraid
    fr: Rémoraid
    it: Remoraid
    de: Remoraid
    es: Remoraid
    ko: 총어
    zh_simp: 铁炮鱼
    zh_trad: 鐵炮魚
  forms:
    remoraid:
      form_id: 0
      base_stats:
        hp: 35
        attack: 65
        defense: 35
        special_attack: 65
        special_defense: 35
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - water_2
      abilities:
        - hustle
        - sniper
      hidden_ability: moody
      descriptions:
        jp_kana:
          ultra_sun: "マンタインに　はりつき　おこぼれに\nあずかる。　マンタインが　おそわれると\nいっしょに　なって　たたかうぞ。"
          ultra_moon: "べつめい　うみの　スナイパー。\nみずでっぽうは　１００メートルさきの\nえものにも　かならず　めいちゅうする。"
        jp_kanji:
          ultra_sun: "マンタインに　張りつき　おこぼれに\nあずかる。　マンタインが　襲われると\n一緒に　なって　戦うぞ。"
          ultra_moon: "別名　海の　スナイパー。\nみずでっぽうは　１００メートル先の\n獲物にも　必ず　命中する。"
        en:
          ultra_sun: "This Pokémon clings to Mantine and shares in\nits prosperity. When its Mantine is attacked,\nRemoraid will fight alongside it!"
          ultra_moon: "Also known as the “sniper of the seas,”\nits water gun can hit prey without fail from\nover 300 feet away."
        fr:
          ultra_sun: "Il se colle à un Démanta et se nourrit de\nses restes. Si le Démanta se fait attaquer,\nil l’accompagne au combat."
          ultra_moon: "Surnommé « le tireur d’élite de la mer », il est\ncapable de toucher à coup sûr une cible située\nà 100 m de distance grâce à son Pistolet à O."
        it:
          ultra_sun: "Si attacca a Mantine e si ciba dei suoi avanzi.\nQuando Mantine viene attaccato, lotta insieme\na lui."
          ultra_moon: "Detto anche “il cecchino del mare”, ha una\nprecisione straordinaria. Può colpire la preda\na più di 100 m di distanza con Pistolacqua."
        de:
          ultra_sun: "Es heftet sich an Mantax und ernährt sich von\ndessen Essensresten. Wird Mantax angegriffen,\nkämpft es gemeinsam mit ihm."
          ultra_moon: "Es wird auch „Scharfschütze des Meeres“\ngenannt. Mit seinem Wasserstrahl kann es\nBeute aus 100 m Entfernung treffen."
        es:
          ultra_sun: "Se adhiere a los Mantine para alimentarse de\nlas sobras de su comida. Si atacan a su\nanfitrión, luchará junto a él."
          ultra_moon: "Es capaz de alcanzar una presa a cien metros\ncon su Pistola Agua, lo que le ha valido el\nsobrenombre de Francotirador del Mar."
        ko:
          ultra_sun: "만타인에 달라붙어 남긴 음식을\n먹고 산다. 만타인이 습격당하면\n함께 싸운다."
          ultra_moon: "일명 바다의 스나이퍼다.\n물대포는 100m 앞의 먹이도\n반드시 명중시킨다."
        zh_simp:
          ultra_sun: "会粘在巨翅飞鱼身上，\n吃一点残羹剩饭。如果巨翅飞鱼\n受到袭击，它就会与其一同战斗。"
          ultra_moon: "它又被称为海洋狙击手。\n即便是１００米开外的猎物，\n它射出的水枪也一定能够命中。"
        zh_trad:
          ultra_sun: "會貼在巨翅飛魚身上，靠吃剩的\n食物殘渣過活。當巨翅飛魚遭到\n襲擊時會挺身一起戰鬥。"
          ultra_moon: "又被稱做海洋狙擊手。\n就算是１００公尺外的獵物，\n牠發射的水槍也一定能夠命中。"
