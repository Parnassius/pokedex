      descriptions:
        jp_kana:
          ultra_sun: "ＵＢと　よばれる　べつせかいの\nせいめいたい。　つよい　しんけいどくを\nもっていると　かんがえられる。"
          ultra_moon: "ウルトラホールから　このせかいに\nあらわれた。　ポケモンや　にんげんに\nきせいして　いきているようだ。"
        jp_kanji:
          ultra_sun: "ＵＢと　呼ばれる　別世界の\n生命体。　強い　神経毒を\n持っていると　考えられる。"
          ultra_moon: "ウルトラホールから　この世界に\n現れた。　ポケモンや　人間に\n寄生して　生きているようだ。"
        en:
          ultra_sun: "A life-form from another world, it was dubbed\na UB and is thought to produce a\nstrong neurotoxin."
          ultra_moon: "It appeared in this world from an Ultra\nWormhole. Nihilego appears to be a parasite\nthat lives by feeding on people and Pokémon."
        fr:
          ultra_sun: "Une forme de vie d’un autre monde,\ncommunément appelée « Ultra-Chimère ».\nOn la pense porteuse d’une violente neurotoxine."
          ultra_moon: "Il est venu dans ce monde à travers une\nUltra-Brèche. Tel un parasite, il aurait besoin\nd’un hôte, Pokémon ou humain, pour survivre."
        it:
          ultra_sun: "Una delle forme di vita provenienti da un altro\nmondo, chiamate Ultracreature. Si pensa che\nproduca una neurotossina."
          ultra_moon: "È arrivato in questo mondo attraverso un\nUltravarco. È un parassita di Pokémon\ned esseri umani."
        de:
          ultra_sun: "Eines der Lebewesen aus einer anderen Welt,\ndie Ultrabestien genannt werden. Man glaubt,\ndass es über ein starkes Nervengift verfüge."
          ultra_moon: "Anego kam durch eine Ultrapforte in diese Welt.\nEs scheint ein Parasit zu sein, der Pokémon\nund Menschen befällt."
        es:
          ultra_sun: "Una forma de vida de otro mundo conocida\ncomo Ultraente. Se cree que posee una\nneurotoxina muy potente."
          ultra_moon: "Llegó a este mundo a través de un Ultraumbral.\nEs un parásito que se aprovecha de Pokémon y\npersonas."
        ko:
          ultra_sun: "UB라고 불리는 다른 세계의\n생명체다. 강한 신경독을\n갖고 있을 것으로 추정된다."
          ultra_moon: "울트라홀을 통해 이 세계에\n나타났다. 포켓몬이나 인간에게\n기생해서 사는 듯하다."
        zh_simp:
          ultra_sun: "是被称为究极异兽的\n其他世界的生命体。\n被认为拥有强力的神经毒素。"
          ultra_moon: "从究极之洞出现，来到这个世界。\n好像会寄生在宝可梦或\n人类的身上生存下去。"
        zh_trad:
