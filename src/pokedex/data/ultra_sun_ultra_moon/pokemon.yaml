scizor:
  species_id: 212
  names:
    jp_kana: ハッサム
    jp_kanji: ハッサム
    en: Scizor
    fr: Cizayox
    it: Scizor
    de: Scherox
    es: Scizor
    ko: 핫삼
    zh_simp: 巨钳螳螂
    zh_trad: 巨鉗螳螂
  forms:
    scizor:
      form_id: 0
      base_stats:
        hp: 70
        attack: 130
        defense: 100
        special_attack: 55
        special_defense: 80
        speed: 65
      evs_yield:
        hp: 0
