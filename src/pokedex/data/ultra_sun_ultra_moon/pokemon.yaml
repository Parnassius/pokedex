      descriptions:
        jp_kana:
          ultra_sun: "ウロコを　たたきあわせて　おとを\nならす。　リズムが　さいこうちょうに\nたっしたところで　おそいかかる。"
          ultra_moon: "はがれた　ウロコを　たたいて　なべや\nフライパンに　かこう。　ひの　とおりが\nよくて　つかいやすいと　こうひょう。"
        jp_kanji:
          ultra_sun: "ウロコを　叩き合わせて　音を\n鳴らす。　リズムが　最高潮に\n達したところで　襲いかかる。"
          ultra_moon: "はがれた　ウロコを　叩いて　鍋や\nフライパンに　加工。　火の　通りが\n良くて　使いやすいと　好評。"
        en:
          ultra_sun: "It makes noise by clanging its scales together.\nWhen the rhythm has reached its peak,\nHakamo-o attacks."
          ultra_moon: "The scales it sheds can be molded and\nprocessed to make pots and pans. They\nconduct heat well, so they’re a popular item."
        fr:
          ultra_sun: "Il fait tinter ses écailles en les frottant\nles unes contre les autres, et passe à l’attaque\nquand le rythme atteint son point culminant."
          ultra_moon: "On broie les écailles qu’il a perdues pour\nfabriquer des casseroles et des poêles\nà bonne conductivité thermique."
        it:
          ultra_sun: "Sbatte rumorosamente le sue squame tra di\nloro e, quando il ritmo raggiunge l’apice, si lancia\nall’attacco."
          ultra_moon: "Le pentole e padelle fabbricate con le squame\nche perde sono apprezzate per la loro praticità\ne perché assicurano una cottura uniforme."
        de:
          ultra_sun: "Es lässt seine Schuppen erklingen, indem es sie\naneinanderschlägt. Wenn der Rhythmus seinen\nHöhepunkt erreicht, geht es zum Angriff über."
          ultra_moon: "Seine abgefallenen Schuppen lassen sich zu\nTöpfen oder Pfannen verarbeiten, welche Hitze\ngut übertragen und einfach zu verwenden sind."
        es:
          ultra_sun: "Golpea sus escamas entre sí. Cuando culmina el\nritmo de esta percusión, se abalanza sobre el\nenemigo."
          ultra_moon: "Las escamas que se le caen se utilizan para\nfabricar pucheros y sartenes muy apreciados,\nya que son muy buenas conductoras del calor."
        ko:
          ultra_sun: "비늘을 부딪히며 소리를 낸다.\n리듬이 최고조에 달할 때\n공격해 온다."
          ultra_moon: "떨어진 비늘을 두드려서 냄비나\n프라이팬으로 가공한다. 열전도율이\n좋아서 사용하기 편하다고 호평이다."
        zh_simp:
          ultra_sun: "让鳞片互相敲击，发出声响。\n在节奏达到最高潮的时候发动袭击。"
          ultra_moon: "敲打脱落的鳞片，可以加工成\n炒锅或煎锅。因导热性良好，\n易于使用而受到好评。"
        zh_trad:
          ultra_sun: "會讓鱗片互相撞擊來\n發出聲響，並在節奏達到\n最高潮的時候發動襲擊。"
          ultra_moon: "脫落的鱗片經過搥打可以加工成\n湯鍋或平底鍋。這些鍋子導熱性好又\n容易使用，因此廣受好評。"
kommo_o:
  species_id: 784
