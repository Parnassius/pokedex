    jp_kanji: バンバドロ
    en: Mudsdale
    fr: Bourrinos
    it: Mudsdale
    de: Pampross
    es: Mudsdale
    ko: 만마드
    zh_simp: 重泥挽马
    zh_trad: 重泥挽馬
