        jp_kana:
          ultra_sun: "りょうしは　ながい　こうかいの　とき\nつれていく。　ママンボウが　いれば\nいしゃも　くすりも　いらないからだ。"
          ultra_moon: "よわった　ポケモンを　たすけるのは\nそれを　ねらう　ポケモンに\nじぶんも　おそわれるから　らしい。"
        jp_kanji:
          ultra_sun: "漁師は　長い　航海の　とき\n連れていく。　ママンボウが　いれば\n医者も　薬も　いらないからだ。"
          ultra_moon: "弱った　ポケモンを　助けるのは\nそれを　狙う　ポケモンに\n自分も　襲われるから　らしい。"
        en:
          ultra_sun: "Fishermen take them along on long voyages,\nbecause if you have an Alomomola with you,\nthere’ll be no need for a doctor or medicine."
          ultra_moon: "The reason it helps Pokémon in a weakened\ncondition is that any Pokémon coming after\nthem may also attack Alomomola."
        fr:
          ultra_sun: "Ses talents de guérisseur sont tels que\nles marins l’emportent quand ils embarquent\npour une longue traversée."
          ultra_moon: "On pense qu’il protège les Pokémon affaiblis\nparce qu’il partage avec eux les mêmes\nprédateurs."
        it:
          ultra_sun: "I pescatori li portano sempre con sé quando\npartono per lunghe traversate, perché dove c’è\nun Alomomola non servono medici né medicine."
          ultra_moon: "Sembra che aiuti i Pokémon indeboliti per\nnon rischiare di essere attaccato da eventuali\nloro predatori."
        de:
          ultra_sun: "Auf langen Seereisen lassen sich Fischer von\nMamolida begleiten. So ersparen Sie sich nämlich\neinen Arzt und Medizin."
          ultra_moon: "Mamolida kümmert sich offenbar um verletzte\nPokémon, um nicht selbst von denen angegriffen\nzu werden, die es auf diese abgesehen haben."
        es:
          ultra_sun: "Los pescadores siempre lo llevan consigo en las\ntravesías largas, porque al tener un Alomomola\nno les hacen falta ni medicinas ni médicos."
          ultra_moon: "Se cree que ayuda a los Pokémon heridos y\ndebilitados de forma que los depredadores\nnaturales de estos no le ataquen a él también."
        ko:
          ultra_sun: "어부가 긴 항해를 할 때\n데려간다. 맘복치가 있으면\n의사도 약도 필요 없기 때문이다."
          ultra_moon: "약해진 포켓몬을 도와주는 것은\n이를 노리고 오는 포켓몬에게\n자신도 공격받기 때문이라고 한다."
        zh_simp:
          ultra_sun: "渔夫在长距离航海时会带着它。\n因为有了保姆曼波，\n医生和药都不需要了。"
          ultra_moon: "之所以会救助体弱的宝可梦，\n好像是因为盯上它们的\n宝可梦也会攻击它自己。"
        zh_trad:
          ultra_sun: "漁夫在長程航海時會帶著牠。\n有保母曼波在身邊\n就不需要醫生或藥物了。"
          ultra_moon: "之所以救助衰弱的寶可夢，\n好像是因為自己也會被\n盯上牠們的寶可夢襲擊。"
