          ultra_sun: "きんぞくしつの　ヒゲは　おもいので\nすばやさは　いまいちだが　かたい\nがんばんも　ほりぬくパワーを　もつ。"
          ultra_moon: "きんいろに　ひかる　ヒゲは　こうどな\nセンサー。　すうキロさきの　おとも\nしんどうとして　かんち　できるのだ。"
        jp_kanji:
          ultra_sun: "金属質の　髭は　重いので\n素早さは　いまいちだが　硬い\n岩盤も　掘りぬくパワーを　持つ。"
          ultra_moon: "金色に　光る　ヒゲは　高度な\nセンサー。　数キロ先の　音も\n振動として　感知　できるのだ。"
        en:
          ultra_sun: "Its metallic whiskers are heavy, so it’s not very\nfast, but it has the power to dig\nthrough bedrock."
          ultra_moon: "Its shining gold whiskers are advanced\nsensors that can detect vibrations from sounds\nseveral miles away."
        fr:
          ultra_sun: "Ses vibrisses métalliques sont très lourdes\net le ralentissent, mais elles lui permettent\nde forer même la roche la plus dure."
          ultra_moon: "Ses vibrisses blondes sont des détecteurs\ntrès puissants avec lesquels il peut repérer\ndes ondes sonores à plusieurs kilomètres."
        it:
          ultra_sun: "Le sue pesanti chiome metalliche rallentano\ni suoi movimenti, ma gli permettono di perforare\nanche la dura roccia."
          ultra_moon: "Le sue chiome dorate sono sensori accuratissimi\nin grado di rilevare le vibrazioni di un suono\nprodotto a diversi chilometri di distanza."
        de:
          ultra_sun: "Da seine metallischen Haare schwer sind, ist es\nnicht besonders flink. Im Gegenzug kann es sich\naber durch harte Felsschichten graben."
          ultra_moon: "Seine golden leuchtenden Haare dienen als\nsensible Sensoren. Mit ihnen kann es Geräusche\nin mehreren Kilometern Entfernung wahrnehmen."
        es:
          ultra_sun: "El peso de sus filamentos dorados limita su\nvelocidad, pero su dureza le permite a cambio\nexcavar las capas de roca más duras."
          ultra_moon: "Los filamentos dorados que brillan en su cabeza\nson potentes sensores. Detecta sonidos a\nvarios kilómetros de distancia."
        ko:
          ultra_sun: "금속질의 수염이 무거워서\n스피드는 별로지만 딱딱한 암반도\n깊이 파낼 정도의 파워를 가졌다."
          ultra_moon: "금빛으로 빛나는 수염은 고도의\n센서다. 수 킬로미터 밖의 소리도\n진동으로 감지할 수 있다."
        zh_simp:
          ultra_sun: "金属材质的胡须很重，\n所以速度不怎么快，\n但有着能挖穿坚硬岩盘的力量。"
          ultra_moon: "闪着金光的胡须是高灵敏的感应器。\n连数公里外的声音也能通过振动感知到。"
        zh_trad:
          ultra_sun: "金屬材質的鬍鬚很重，\n所以速度並不快，\n但擁有能夠挖穿堅硬岩盤的力量。"
          ultra_moon: "閃著金光的鬍鬚是靈敏度極高的\n感應器。就連數公里外的聲音\n也能透過振動感應到。"
meowth:
  species_id: 52
  names:
    jp_kana: ニャース
    jp_kanji: ニャース
    en: Meowth
    fr: Miaouss
    it: Meowth
    de: Mauzi
    es: Meowth
    ko: 나옹
    zh_simp: 喵喵
    zh_trad: 喵喵
  forms:
    meowth:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 40
        special_defense: 40
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - pickup
        - technician
      hidden_ability: unnerve
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          ultra_sun: "ゴミすてばに　いくと　ひかりものを\nめぐって　ヤミカラスと　はげしく\nケンカする　こうけいが　みられる。"
          ultra_moon: "コインが　だいすき。　あげれば\nかんたんに　なつくが　きまぐれなので\nあんまり　あてには　ならないよ。"
        jp_kanji:
          ultra_sun: "ゴミ捨て場に　いくと　ひかりものを\n巡って　ヤミカラスと　激しく\nケンカする　光景が　見られる。"
          ultra_moon: "コインが　大好き。　あげれば\n簡単に　懐くが　気まぐれなので\nあんまり　当てには　ならないよ。"
        en:
          ultra_sun: "When visiting a junkyard, you may catch sight\nof it having an intense fight with Murkrow over\nshiny objects."
          ultra_moon: "It loves coins, so if you give it one, you can\nmake friends with Meowth easily. But it’s fickle,\nso you can’t count on that friendship lasting."
        fr:
          ultra_sun: "Il n’est pas rare de l’apercevoir dans les\ndécharges, où il se dispute souvent quelque\nobjet brillant avec un Cornèbre."
          ultra_moon: "Il raffole des pièces de monnaie. Il suffit de lui\nen donner une pour acheter son affection, mais\nvu son caractère, cela ne dure jamais longtemps."
        it:
          ultra_sun: "Nelle discariche capita di vederlo lottare\nfuriosamente con Murkrow per gli oggetti\nluccicanti."
          ultra_moon: "Adora le monetine. Basta dargliene un po’\nperché si affezioni, ma a causa del suo\ncarattere volubile non è affidabile."
        de:
          ultra_sun: "Auf Müllhalden wird man oft Zeuge davon, wie\nes sich einen heftigen Streit mit Kramurx um\nglänzende Gegenstände liefert."
          ultra_moon: "Es hat eine Vorliebe für Münzen. Gibt man ihm\neine, gewinnt man leicht sein Zutrauen, doch das\nwährt dank des launischen Wesens nicht lange."
        es:
          ultra_sun: "No es extraño encontrarlos en los vertederos,\ndonde suelen pelearse con los Murkrow por\ncualquier objeto reluciente."
          ultra_moon: "Adora las monedas y basta con darle una para\nganarse su afecto, que no suele durar mucho\ndebido a su carácter caprichoso."
        ko:
          ultra_sun: "쓰레기장에 가면 빛이 나는 물건을\n두고 니로우와 격렬하게\n싸우는 광경을 볼 수 있다."
          ultra_moon: "동전을 매우 좋아한다. 동전을 주면\n쉽게 친해지지만 변덕스럽기 때문에\n그다지 믿을 게 못 된다."
        zh_simp:
          ultra_sun: "如果去垃圾场的话，\n就能看到它和黑暗鸦为争夺\n发光的东西而激烈打斗的景象。"
          ultra_moon: "非常喜欢硬币。只要给它硬币就能\n轻易和它亲近，但因为它性情多变，\n所以不怎么靠得住哦。"
        zh_trad:
          ultra_sun: "只要去垃圾場就能看見\n牠和黑暗鴉為了爭奪發亮的東西\n而激烈互鬥的景象。"
          ultra_moon: "非常喜歡硬幣，只要給牠硬幣就能\n輕易和牠親近。但因為牠性情善變，\n所以這招也不是一定有效。"
    meowth_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 40
        attack: 35
        defense: 35
        special_attack: 50
        special_defense: 40
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - pickup
        - technician
      hidden_ability: rattled
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          ultra_sun: "きまぐれで　わがままで　あきっぽい。\nつくされるより　つくすのが　すきな\nいちぶの　トレーナーに　だいにんき。"
          ultra_moon: "おおむかしに　さかえた　おうぞくが\nほかの　ちほうから　つれてきた。\nわがままで　プライドが　たかい。"
        jp_kanji:
          ultra_sun: "気まぐれで　わがままで　飽きっぽい。\n尽くされるより　尽くすのが　好きな\n一部の　トレーナーに　大人気。"
          ultra_moon: "大昔に　栄えた　王族が\n他の　地方から　連れてきた。\nわがままで　プライドが　高い。"
        en:
          ultra_sun: "It’s impulsive, selfish, and fickle. It’s very\npopular with some Trainers who like giving it the\nattention it needs."
          ultra_moon: "A royal house that flourished in the distant past\nbrought it here from another region. Meowth is\nboth selfish and prideful."
        fr:
          ultra_sun: "Capricieux, nombriliste et inconstant, il est très\npopulaire auprès des Dresseurs altruistes\nqui aiment les défis."
          ultra_moon: "Ce Pokémon égoïste et très fier a été introduit\ndans la région par une ancienne dynastie royale\ndes plus prospères."
        it:
          ultra_sun: "È capriccioso, egoista e volubile. È molto\npopolare tra gli Allenatori che amano viziare\ni loro Pokémon."
          ultra_moon: "È stato introdotto da un’altra regione grazie\na una fiorente famiglia reale dell’antichità.\nÈ egoista e molto orgoglioso."
        de:
          ultra_sun: "Ein launenhaftes und selbstsüchtiges Pokémon.\nManche Trainer geben ihm nur zu gerne die\nAufmerksamkeit, nach der es sich sehnt."
          ultra_moon: "Es wurde von einer einst prosperierenden\nDynastie aus einer anderen Region nach Alola\ngebracht. Es ist hochmütig und egoistisch."
        es:
          ultra_sun: "Su naturaleza caprichosa, egoísta y voluble lo\nhace popular entre los Entrenadores a los que\nles gusta cumplir los caprichos de sus Pokémon."
          ultra_moon: "Fue importado por una dinastía real que tuvo\ngran apogeo en la antigüedad. Es un Pokémon\negoísta y orgulloso."
        ko:
          ultra_sun: "변덕이 심하고 제멋대로에 싫증을 잘 낸다.\n사랑받는 것보다 사랑을 주는 걸 좋아하는\n일부 트레이너에게 큰 인기다."
          ultra_moon: "먼 옛날에 번영한 왕족이\n다른 지방에서 데려왔다.\n제멋대로에 프라이드가 높다."
        zh_simp:
          ultra_sun: "浮躁、任性、耐不住性子。\n深受那些比起被别人照顾，\n更喜欢照顾别人的训练家欢迎。"
          ultra_moon: "很久以前，由繁荣兴旺的王族\n从其他地区带到此地。\n桀骜不驯，自尊心很强。"
        zh_trad:
          ultra_sun: "性情善變、任性、缺乏耐性，\n很受那些比起被別人照顧，\n更喜歡去照顧別人的訓練家歡迎。"
          ultra_moon: "在遙遠的過去由當時興旺的\n王族從其他地區帶到此地。\n性格任性且自尊心很強。"
persian:
