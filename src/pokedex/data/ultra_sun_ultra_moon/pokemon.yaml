      descriptions:
        jp_kana:
          ultra_sun: "アゴの　ちからが　すさまじい。\nオムスターや　オムナイトの　カラも\nきにせず　まるごと　くっていた。"
          ultra_moon: "かたい　こうらを　さらに　じょうぶに\nするために　とらえた　えものは\nカラやホネまで　のこさず　くうのだ。"
        jp_kanji:
          ultra_sun: "アゴの　力が　凄まじい。\nオムスターや　オムナイトの　カラも\n気にせず　丸ごと　食っていた。"
          ultra_moon: "硬い　甲羅を　更に　丈夫に\nするために　捕らえた　獲物は\nカラやホネまで　残さず　食うのだ。"
        en:
          ultra_sun: "Its jaws are terrifyingly powerful. It could eat\nOmastar and Omanyte whole and not be\nbothered in the slightest by their shells."
          ultra_moon: "Carracosta eats every last bit of the prey it\ncatches, even the shells and bones, to further\nstrengthen its sturdy shell."
        fr:
          ultra_sun: "L’incroyable puissance de sa mâchoire lui\npermettait de broyer facilement les coquilles\nd’Amonistar ou d’Amonita pour les manger."
          ultra_moon: "Afin de renforcer sa carapace, ce Pokémon\nva même jusqu’à manger la coquille et les os\nde ses proies."
        it:
          ultra_sun: "Con le sue mascelle terribilmente potenti poteva\nfrantumare le dure corazze degli Omastar e\ndegli Omanyte per mangiarseli senza problemi."
          ultra_moon: "Per rafforzare il suo carapace mangiava le\nprede intere senza scartare nulla, nemmeno\nle ossa e i gusci."
        de:
          ultra_sun: "Sein Kiefer wurde wegen dessen großer Kraft\ngefürchtet. Sogar Amoroso und Amonitas konnte\nes trotz ihrer Schalen problemlos verschlingen."
          ultra_moon: "Um seinen harten Panzer noch weiter zu\nverstärken, fraß es seine Beute samt Schale\nund Knochen restlos auf."
        es:
          ultra_sun: "La brutal presión que ejerce con su mandíbula\nes tal que las conchas de Omastar y Omanyte\nno son ninguna molestia cuando los devora."
          ultra_moon: "Para reforzar aún más su robusto caparazón,\nengulle incluso las conchas y los huesos de las\npresas que captura."
        ko:
          ultra_sun: "턱의 힘이 무시무시하다.\n암스타나 암나이트의 껍질도\n아무렇지 않게 통째로 먹었다."
          ultra_moon: "단단한 등껍질을 더욱 튼튼하게\n만들기 위해 잡은 먹이는\n껍질이나 뼈까지 남기지 않고 먹는다."
        zh_simp:
          ultra_sun: "颚部的力量非常惊人。\n连多刺菊石兽和菊石兽的壳\n也能轻轻松松地整个吃掉。"
          ultra_moon: "为了让坚硬的甲壳更为结实，\n会把捕捉到的猎物吃到\n连壳和骨头都不剩。"
        zh_trad:
          ultra_sun: "下巴的力量非常驚人，\n連多刺菊石獸和菊石獸的殼\n也能輕而易舉地整個吃掉。"
          ultra_moon: "為了讓堅硬的甲殼變得\n更加結實，會把捉到的獵物\n吃到連殼和骨頭都不剩。"
archen:
  species_id: 566
  names:
    jp_kana: アーケン
    jp_kanji: アーケン
    en: Archen
    fr: Arkéapti
    it: Archen
    de: Flapteryx
    es: Archen
    ko: 아켄
    zh_simp: 始祖小鸟
    zh_trad: 始祖小鳥
