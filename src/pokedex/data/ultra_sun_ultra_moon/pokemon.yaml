      descriptions:
        jp_kana:
          ultra_sun: "こうらから　ふきだす　けむりで\nたいちょうが　わかる。　いきおいが\nはげしいときは　げんきな　しょうこ。"
          ultra_moon: "せきたんを　もやして　エネルギーを\nつくる。　せきたんが　もえつきると\nみうごきが　とれなくなってしまう。"
        jp_kanji:
          ultra_sun: "甲羅から　噴きだす　煙で\n体調が　わかる。　勢いが\n激しいときは　元気な　証拠。"
          ultra_moon: "石炭を　燃やして　エネルギーを\n作る。　石炭が　燃え尽きると\n身動きが　とれなくなってしまう。"
        en:
          ultra_sun: "You can tell how it’s feeling by the smoke\nspouting from its shell. Tremendous velocity\nis a sign of good health."
          ultra_moon: "It burns coal to produce energy. When it has\nburned through all of its coal, it becomes unable\nto move."
        fr:
          ultra_sun: "Un bon indicateur de sa santé est le débit\nde la fumée qui s’échappe de sa carapace :\ns’il est important, c’est qu’il est en pleine forme."
          ultra_moon: "Il tire son énergie du charbon qu’il fait brûler.\nUne fois qu’il a tout consommé, il ne peut plus\nbouger."
        it:
          ultra_sun: "Il fumo che fuoriesce dalla sua corazza permette\ndi capire il suo stato di salute. Quando i getti\nsono vigorosi, significa che sta bene."
          ultra_moon: "Genera energia bruciando carbone e quando lo\nesaurisce non riesce più a muoversi."
        de:
          ultra_sun: "Am Rauch, den es aus seinem Panzer ausstößt,\nerkennt man seine Verfassung. Stößt es diesen\nkraftvoll aus, geht es ihm gut."
          ultra_moon: "Es erzeugt Energie, indem es Kohle verbrennt.\nWenn diese vollständig verbrannt ist, kann es\nsich nicht mehr bewegen."
        es:
          ultra_sun: "El humo que expulsa por el dorso es indicativo\nde su estado de salud. Si las fumarolas brotan\ncon fuerza, significa que está en plena forma."
          ultra_moon: "Genera su energía quemando carbón y, una vez\nque lo ha consumido por completo, ya no puede\nmoverse."
        ko:
          ultra_sun: "등껍질에서 내뿜는 연기로\n몸 상태를 알 수 있다. 기세가\n격렬할 때는 건강하다는 증거다."
          ultra_moon: "석탄을 태워서 에너지를\n만든다. 석탄이 다 타 버리면\n움직이지 못하게 된다."
        zh_simp:
          ultra_sun: "通过甲壳里喷出的烟\n就能了解它的身体状况。\n势头很旺时，说明很有精神。"
          ultra_moon: "燃烧煤炭，制作能量。\n如果煤炭烧尽，\n身体就会变得无法动弹。"
        zh_trad:
          ultra_sun: "從甲殼噴出的煙可以看出牠的\n身體狀況。煙噴得很激烈時，\n代表牠很有精神。"
          ultra_moon: "會燃燒煤炭來製造能量。\n如果煤炭燒光了，\n身體就會變得無法動彈。"
