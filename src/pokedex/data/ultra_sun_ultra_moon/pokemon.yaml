      descriptions:
        jp_kana:
          ultra_sun: "ひかるものに　めがない。　おたからを\nもとめて　ほうせきを　ためこむ\nガバイトの　すに　しのびこむことも。"
          ultra_moon: "ボスのために　キラキラ　ひかるものを\nさがしている。　ふきつな　そんざいと\nいわれ　いみきらう　ひとも　おおい。"
        jp_kanji:
          ultra_sun: "光るものに　目が　ない。　お宝を\n求めて　宝石を　ため込む\nガバイトの　巣に　忍び込むことも。"
          ultra_moon: "ボスのために　キラキラ　光るものを\n探している。　不吉な　存在と\nいわれ　忌み嫌う　人も　多い。"
        en:
          ultra_sun: "It has a weakness for shiny things. It’s been\nknown to sneak into the nests of Gabite—noted\ncollectors of jewels—in search of treasure."
          ultra_moon: "It searches for shiny things for its boss.\nMurkrow’s presence is said to be unlucky, so\nmany people detest it."
        fr:
          ultra_sun: "Il est fasciné par tout ce qui brille. Son\nobsession pour les trésors est telle qu’il va\njusqu’à fouiller les nids des Carmache."
          ultra_moon: "Il cherche des objets brillants pour son chef.\nSa réputation d’oiseau de mauvais augure lui\nvaut la haine de nombreuses personnes."
        it:
          ultra_sun: "Adora gli oggetti luccicanti. La sua brama di\ntesori lo porta a infiltrarsi nelle tane dei Gabite\nper rubare le pietre preziose che custodiscono."
          ultra_moon: "Va in cerca di oggetti luccicanti per il suo capo.\nMolti lo temono e lo detestano credendo che\nporti sfortuna."
        de:
          ultra_sun: "Es hat eine Schwäche für glitzernde Objekte.\nHin und wieder schleicht es sich, in Erwartung\nschillernder Schätze, ins Nest von Knarksel."
          ultra_moon: "Für seinen Chef geht es auf die Jagd nach\nglitzernden Objekten. Von vielen Menschen wird\nes als Überbringer des Unheils verabscheut."
        es:
          ultra_sun: "Le gustan los objetos brillantes. Su fascinación\npor todo cuanto reluce lo lleva a buscar tesoros\nincluso en los nidos de Gabite."
          ultra_moon: "Busca objetos brillantes para su patrón. No\ncuenta con muchas simpatías, pues la gente lo\nconsidera ave de mal agüero."
        ko:
          ultra_sun: "반짝이는 것을 매우 좋아한다.\n보물을 찾아 보석을 모으는\n한바이트 둥지에 몰래 들어가기도 한다."
          ultra_moon: "보스를 위해 반짝반짝 빛나는 것을\n찾고 있다. 불길한 존재로 여겨\n몹시 싫어하는 사람도 많다."
        zh_simp:
          ultra_sun: "对于发光的东西毫无抵抗力。\n为了追求宝物，有时候会潜入\n爱储存宝石的尖牙陆鲨的巢穴。"
          ultra_moon: "会为老大去寻找闪闪发光的东西。\n据说它很不吉利，厌恶它的人也很多。"
        zh_trad:
          ultra_sun: "對閃亮亮的東西毫無抵抗力，\n有時會為了尋求寶物而潛入\n會儲存寶石的尖牙陸鯊的巢穴。"
          ultra_moon: "會為了老大尋找閃閃發亮的東西。\n被人們視為不吉利的象徵，\n厭惡牠的人也很多。"
slowking:
