      descriptions:
        jp_kana:
          ultra_sun: "まだまだ　でんきを　つかうのが　へた。\nおどろいたり　きもちが　たかぶると\nすぐに　ほうでん　してしまうのだ。"
          ultra_moon: "ほっぺに　でんきぶくろが　ある。\nじゅうでん　できているときは\nげんきいっぱい　あそびまわる。"
        jp_kanji:
          ultra_sun: "まだまだ　電気を　使うのが　下手。\n驚いたり　気持ちが　高ぶると\nすぐに　放電　してしまうのだ。"
          ultra_moon: "ほっぺに　電気袋が　ある。\n充電　できているときは\n元気いっぱい　遊びまわる。"
        en:
          ultra_sun: "It still can’t use electricity well. When it’s\nsurprised or excited, it discharges\nelectricity unintentionally."
          ultra_moon: "It has electric sacs in its cheeks. When they’re\nfully charged, Pichu plays very energetically."
        fr:
          ultra_sun: "Il ne contrôle pas encore bien l’électricité,\net laisse échapper des décharges lorsqu’il\nest surpris ou en proie à de fortes émotions."
          ultra_moon: "Les poches de ses joues renferment de\nl’électricité. Lorsqu’elles sont chargées, il a\ntellement d’énergie qu’il ne pense qu’à jouer."
        it:
          ultra_sun: "Non sa ancora controllare bene l’elettricità.\nSe è emozionato o sorpreso, rilascia delle\nscariche."
          ultra_moon: "Ha due sacche elettriche sulle guance.\nQuando sono completamente cariche, gioca\nscorrazzando qua e là pieno di energie."
        de:
          ultra_sun: "Es ist noch nicht sehr geübt im Umgang mit\nElektrizität. Wenn es erschrickt oder aufgeregt\nist, wirft es mit Blitzen um sich."
          ultra_moon: "In den Backentaschen speichert es Elektrizität.\nSind diese vollständig aufgeladen, wirbelt es\nbeim Spielen voller Energie herum."
        es:
          ultra_sun: "Aún no controla muy bien la electricidad, por lo\nque suele emitir descargas involuntarias cuando\nlo sorprenden o siente alguna emoción intensa."
          ultra_moon: "Posee sacos eléctricos en los carrillos. Cuando\nse cargan por completo, se siente pletórico de\nenergía y corre y juguetea sin parar."
        ko:
          ultra_sun: "여전히 전기 사용에 서툴다.\n놀라거나 흥분하게 되면\n바로 방전돼 버린다."
          ultra_moon: "볼에 전기 주머니가 있다.\n충전된 상태에서는\n활발하게 돌아다닌다."
        zh_simp:
          ultra_sun: "仍旧很不擅长使用电力。\n一旦吃惊或是情绪高涨，\n就会立刻开始放电。"
          ultra_moon: "脸颊上有电力袋。\n充满电时就会精神十足地四处玩耍。"
        zh_trad:
          ultra_sun: "還不擅長運用電力，\n一旦吃驚或是情緒高漲\n就會馬上開始放電。"
          ultra_moon: "臉頰上有電力囊。\n當電力充飽的時候，\n會活力十足地四處玩耍。"
