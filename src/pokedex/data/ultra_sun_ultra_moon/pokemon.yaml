      hidden_ability: analytic
      descriptions:
        jp_kana:
          ultra_sun: "サイコパワーで　あいての　きおくを\nかきかえてしまう。　あなたも　すでに\nかきかえられているかも　しれない。"
          ultra_moon: "つよい　サイコパワーを　もっている。\n３しょくに　ひかる　ゆびで　あいてを\nあやつり　きおくを　かきかえてしまう。"
        jp_kanji:
          ultra_sun: "サイコパワーで　相手の　記憶を\n書き換えてしまう。　あなたも　既に\n書き換えられているかも　しれない。"
          ultra_moon: "強い　サイコパワーを　持っている。\n３色に　光る　指で　相手を\n操り　記憶を　書き換えてしまう。"
        en:
          ultra_sun: "With its psychic powers, it rewrites its\nopponents’ memories. You, too, may have\nalready had your memories rewritten."
          ultra_moon: "It has strong psychic powers. Using its fingers\nthat flash three different colors, it controls its\nopponents and rewrites their memories."
        fr:
          ultra_sun: "Il peut modifier les souvenirs avec ses pouvoirs\npsychiques. Vous ne le savez pas encore,\nmais vous avez peut-être déjà tout oublié..."
          ultra_moon: "Ses pouvoirs psychiques sont redoutables.\nIl peut contrôler ses adversaires et modifier\nleurs souvenirs grâce à ses doigts tricolores."
        it:
          ultra_sun: "Modifica i ricordi degli avversari servendosi dei\nsuoi poteri psichici. E chissà... può darsi che\nabbia già alterato anche la tua memoria!"
          ultra_moon: "È dotato di potenti poteri psichici. Controlla\nl’avversario tramite le dita, che emettono luci\ndi tre colori in grado di modificare i ricordi."
        de:
          ultra_sun: "Mithilfe seiner Psycho-Kräfte gestaltet es die\nErinnerungen anderer um. Man weiß nie, ob es\neinen selbst bereits erwischt hat."
          ultra_moon: "Es verfügt über mächtige Psycho-Kräfte. Seine\nin drei Farben leuchtenden Finger manipulieren\nandere und gestalten ihre Erinnerungen um."
        es:
          ultra_sun: "Es capaz de alterar los recuerdos de sus rivales\ngracias a su poder psíquico. De hecho, quizá ya\nhaya alterado los tuyos y no lo sepas."
          ultra_moon: "Este Pokémon, de un poder psíquico increíble,\ncontrola a sus oponentes y altera sus recuerdos\nmediante la luz de sus dedos tricolores."
        ko:
          ultra_sun: "사이코 파워로 상대 기억을\n바꿔 버린다. 당신도 이미\n바뀐 기억일지도 모른다."
          ultra_moon: "강한 사이코 파워를 가지고 있다.\n3가지 색으로 빛나는 손가락으로\n상대를 조종해 기억을 바꿔 버린다."
        zh_simp:
          ultra_sun: "会用精神力量改写对手的记忆。\n你说不定也已经被改写了。"
          ultra_moon: "拥有强大的精神力量。\n会用发着３色光的手指\n操纵对手，改写记忆。"
        zh_trad:
          ultra_sun: "會用精神力量竄改\n對手的記憶。你的記憶\n說不定也已經被竄改了。"
          ultra_moon: "擁有強大的精神力量。\n會用發出３色光輝的手指\n操縱對手，改寫記憶。"
