lickitung:
  species_id: 108
  names:
    jp_kana: ベロリンガ
    jp_kanji: ベロリンガ
    en: Lickitung
    fr: Excelangue
    it: Lickitung
    de: Schlurp
    es: Lickitung
    ko: 내루미
    zh_simp: 大舌头
    zh_trad: 大舌頭
  forms:
    lickitung:
      form_id: 0
      base_stats:
        hp: 90
        attack: 55
        defense: 75
        special_attack: 60
        special_defense: 75
        speed: 30
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - monster
      abilities:
        - own_tempo
        - oblivious
      hidden_ability: cloud_nine
      held_items:
        rare: lagging_tail
      descriptions:
        jp_kana:
          ultra_sun: "ながい　ベロで　なんでも　べろりと\nなめて　たしかめている。　なめられた\nぶぶんを　ほうっておくと　かぶれるぞ。"
          ultra_moon: "よごれは　ベロで　きれいに　なめとる。\nなめたあとは　なんだか　くさいので\nほんとうに　きれいなのかは　あやしい。"
        jp_kanji:
          ultra_sun: "長い　ベロで　なんでも　ベロリと\n舐めて　確かめている。　舐められた\n部分を　放っておくと　かぶれるぞ。"
          ultra_moon: "汚れは　ベロで　綺麗に　舐めとる。\n舐めたあとは　なんだか　臭いので\n本当に　綺麗なのかは　あやしい。"
        en:
          ultra_sun: "It checks out whatever’s around it by licking\neverything. If you don’t clean off a spot where\nit’s licked you, you’ll break out in a rash!"
          ultra_moon: "It licks filth clean with its tongue. Whatever it\nlicks always stinks afterward, so whether it’s\nreally clean is...questionable."
        fr:
          ultra_sun: "Sa longue langue lui sert à goûter tout ce qui\nl’intrigue. Attention, car s’il vous lèche une partie\ndu corps, vous risquez l’infection cutanée."
          ultra_moon: "Il nettoie les saletés d’un coup de langue,\nmais vu l’odeur nauséabonde qui s’en dégage,\nce n’est probablement pas très efficace."
        it:
          ultra_sun: "Esamina tutto ciò che lo circonda con la sua\nlunga lingua. Le parti leccate, se trascurate,\npossono sviluppare irritazioni."
          ultra_moon: "Rimuove lo sporco leccandolo via, ma gli oggetti\nleccati emanano un cattivo odore che fa\ndubitare dell’efficacia della pulizia."
        de:
          ultra_sun: "Mit seiner langen Zunge leckt es an allem, um es\nzu prüfen. Lässt man eine abgeleckte Stelle\nunbehandelt, entwickelt sich ein Ausschlag."
          ultra_moon: "Seine Zunge leckt jede Unreinheit sauber.\nDanach haftet allerdings ein übler Geruch daran,\nwas wiederum am Ergebnis zweifeln lässt."
        es:
          ultra_sun: "Identifica las cosas lamiéndolas con su larga\nlengua. Hay que tener cuidado, pues si no se\ntratan, sus lametones tienen efectos urticantes."
          ultra_moon: "Se limpia y acicala a base de lengüetazos,\naunque el olor que deja su saliva sugiere de\ntodo menos pulcritud."
        ko:
          ultra_sun: "긴 혀를 내밀어 몇 번이고\n핥아 확인한다. 핥은 부분을\n방치하면 염증이 생긴다."
          ultra_moon: "더러워지면 혀로 깨끗하게 핥아 낸다.\n핥고 난 뒤에도 왠지 냄새가 나서\n정말로 깨끗한지는 의심스럽다."
        zh_simp:
          ultra_sun: "不管是什么，都会用长舌头去舔舔看。\n被舔到的部位如果放着不管\n就会红肿发炎。"
          ultra_moon: "会用舌头将污渍舔干净。\n舔过之后有点臭臭的，\n所以是否真的干净很令人怀疑。"
        zh_trad:
          ultra_sun: "不管什麼東西都會用長長的\n舌頭去舔舔看，被舔到的部位\n如果放著不管就會發炎。"
          ultra_moon: "會用舌頭把髒污舔乾淨。\n舔過的地方會有點臭，\n是否真的乾淨令人懷疑。"
