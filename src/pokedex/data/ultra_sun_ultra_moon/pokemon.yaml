        - poison
      egg_groups:
        - field
        - dragon
      abilities:
        - intimidate
        - shed_skin
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          ultra_sun: "アゴを　はずすことで　じぶんより\nおおきな　えものも　まるのみにする。\nしょくごは　からだを　まるめ　やすむ。"
          ultra_moon: "とりポケモンの　タマゴが　こうぶつ。\nかまずに　まるのみするので　のどが\nつまって　きを　うしなうことも。"
        jp_kanji:
          ultra_sun: "顎を　外すことで　自分より\n大きな　獲物も　丸呑みに　する。\n食後は　身体を　丸め　休む。"
          ultra_moon: "とりポケモンの　タマゴが　好物。\n噛まずに　丸呑みするので　喉が\n詰まって　気を　失うことも。"
        en:
          ultra_sun: "By dislocating its jaw, it can swallow prey larger\nthan itself. After a meal, it curls up and rests."
          ultra_moon: "The eggs of bird Pokémon are its favorite food.\nIt swallows eggs whole, so sometimes an egg\ngets stuck, and Ekans faints."
        fr:
          ultra_sun: "Il peut se déboîter la mâchoire pour avaler\ntout rond des proies plus grosses que lui.\nIl se replie ensuite sur lui-même pour digérer."
          ultra_moon: "Il aime tout particulièrement les œufs des\nPokémon oiseaux. Comme il les avale d’un coup,\nil lui arrive de s’étouffer et de s’évanouir."
        it:
          ultra_sun: "Può sganciare la mandibola per ingoiare intere\nprede più grosse di lui. Dopo il pasto, si\narrotola su se stesso per riposarsi."
          ultra_moon: "È ghiotto di Uova di Pokémon alati, che ingoia\nintere. Può accadere che gli si blocchino in\ngola, togliendogli il respiro."
        de:
          ultra_sun: "Es hängt seinen Kiefer aus und verschlingt so\nselbst größere Beute am Stück. Danach rollt\nes sich zusammen und ruht sich aus."
          ultra_moon: "Die Eier von Vogel-Pokémon, sein Leibgericht,\nverschlingt es am Stück. Bleibt ihm eines in der\nKehle stecken, verliert es kurz das Bewusstsein."
        es:
          ultra_sun: "Es capaz de desencajar la mandíbula para\nengullir presas enteras mayores que él mismo,\ntras lo cual se enrosca para descansar."
          ultra_moon: "Los huevos de Pokémon pájaro son su manjar\npredilecto. Como se los traga enteros, en\nocasiones se atraganta y pierde el conocimiento."
        ko:
          ultra_sun: "턱을 빼 자신보다\n큰 먹이를 통째로 삼킨다.\n식후에는 몸을 둥글게 하고 쉰다."
          ultra_moon: "새포켓몬의 알을 좋아한다.\n씹지 않고 통째로 삼키기 때문에\n목이 막혀서 정신을 잃을 때도 있다."
        zh_simp:
          ultra_sun: "甚至可以通过让颚脱位来\n吞食比自己更大的猎物。\n进食后就会蜷缩起身体进行休息。"
          ultra_moon: "它喜食鸟宝可梦的蛋。\n因为不咀嚼就整个吞下，\n所以有时会被噎住而昏倒。"
        zh_trad:
          ultra_sun: "會藉由讓下顎脫臼\n來吞食比自己更大的獵物。\n進食之後會蜷縮起身子休息。"
          ultra_moon: "最愛吃鳥寶可夢的蛋。\n因為總是不咀嚼就整個吞下，\n有時會被噎住而昏倒。"
