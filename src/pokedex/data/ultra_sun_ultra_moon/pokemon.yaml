      descriptions:
        jp_kana:
          ultra_sun: "けの　はえていない　ゴムの　ような\nひふは　でんきを　とおさないので\nさわっても　あんぜん　なのだ。"
          ultra_moon: "ふかふかの　けに　でんきを　ためこむ。\nたくわえすぎて　ところどころ\nつるつるに　はげあがって　しまった。"
        jp_kanji:
          ultra_sun: "毛の　生えていない　ゴムの　ような\n皮膚は　電気を　通さないので\n触っても　安全　なのだ。"
          ultra_moon: "ふかふかの　毛に　電気を　ためこむ。\n蓄えすぎて　ところどころ\nつるつるに　禿げあがって　しまった。"
        en:
          ultra_sun: "In the places on its body where fleece doesn’t\ngrow, its skin is rubbery and doesn’t conduct\nelectricity. Those spots are safe to touch."
          ultra_moon: "It stores electricity in its fluffy fleece. If it\nstores up too much, it will start to go bald in\nthose patches."
        fr:
          ultra_sun: "Sa peau lisse et élastique étant isolante,\non peut la caresser sans risquer de se\nprendre une décharge électrique."
          ultra_moon: "Il accumule de l’électricité dans sa toison\nduveteuse. Il en a tellement stocké qu’il en\na perdu sa laine par endroits."
        it:
          ultra_sun: "La pelle gommosa che ricopre le aree del suo\ncorpo prive di pelliccia non conduce elettricità e\npuò essere toccata senza prendere la scossa."
          ultra_moon: "Raccoglie elettricità nel soffice manto. Alcune\nparti del suo corpo sono diventate interamente\nglabre per la troppa elettricità immagazzinata."
        de:
          ultra_sun: "Die unbehaarten Stellen seiner gummiartigen\nHaut leiten keinen Strom weiter. Dort kann man\nes daher ohne Gefahr anfassen."
          ultra_moon: "Sein flauschiges Fell speichert Elektrizität. Zu\ngroße Mengen bewirkten aber stellenweise einen\nHaarausfall, wo nun glatte Haut freiliegt."
        es:
          ultra_sun: "Las zonas de su piel desprovistas de lana no\ntransmiten electricidad, por lo que pueden\nacariciarse sin miedo."
          ultra_moon: "Su lana sedosa acumula tanta electricidad que\nalgunas partes de su cuerpo se han quedado\ndesprovistas de pelo."
        ko:
          ultra_sun: "털이 나지 않은 고무 같은\n피부는 전기가 통하지 않아\n만져도 안전하다."
          ultra_moon: "푹신푹신한 털에 전기를 저장한다.\n너무 많이 저장해서 여기저기\n반질반질하게 털이 빠져 버렸다."
        zh_simp:
          ultra_sun: "毛发不生有如橡胶一样的\n皮肤不会导电，\n即便触电了也很安全。"
          ultra_moon: "能将电力储存在松软的毛发中。\n因为储存了太多电力，所以身上\n有些地方已经变得光秃秃的了。"
        zh_trad:
          ultra_sun: "一根毛髮也沒有的皮膚\n跟橡膠一樣不會導電，\n即使觸碰到也很安全。"
          ultra_moon: "會將電力儲存在鬆軟的毛中。\n因為儲存了太多電力，\n身上有些地方變得光禿禿的。"
