          ultra_sun: "すばやいわざで　あいてを　あっとう。\nひっさつわざを　はなつ　アピールが\nながすぎて　ピンチにおちいることも。"
          ultra_moon: "かろやかな　ジャンプで　あいての\nしかくに　まわりつつ　たたかう。\nかれいな　かんせつわざも　とくい。"
        jp_kanji:
          ultra_sun: "素早い技で　相手を　圧倒。\n必殺技を　放つ　アピールが\n長すぎて　ピンチに陥ることも。"
          ultra_moon: "軽やかな　ジャンプで　相手の\n死角に　まわりつつ　戦う。\n華麗な　関節技も　得意。"
        en:
          ultra_sun: "It overwhelms opponents with quick moves, but\nsometimes it showboats for too long when it’s\nusing a special move and gets itself into a pinch."
          ultra_moon: "In combat, Hawlucha leaps nimbly about, taking\nadvantage of its opponents’ blind spots. It’s\nalso skilled at using superb submission holds."
        fr:
          ultra_sun: "Il terrasse ses adversaires grâce à sa vitesse,\nmais se pavane tant avant de lancer sa botte\nsecrète qu’il se retrouve parfois en difficulté."
          ultra_moon: "Il combat ses adversaires en sautillant pour\nse retrouver dans leur angle mort. Il maîtrise\nde formidables techniques de clés articulaires."
        it:
          ultra_sun: "Prevale sul nemico grazie alla sua rapidità, ma a\nvolte per mettersi in mostra aspetta troppo a\nlanciare l’attacco finale e si trova in difficoltà."
          ultra_moon: "Durante la lotta, si porta con agili salti negli\nangoli ciechi della visuale dell’avversario.\nÈ in grado di eseguire magnifiche leve articolari."
        de:
          ultra_sun: "Es dominiert seine Gegner mit flinken Attacken.\nOft wird es ihm aber zum Verhängnis, dass es\nseine Spezialtechniken zu lange in Szene setzt."
          ultra_moon: "Im Kampf manövriert es sich mit gewandten\nSprüngen aus dem Blickfeld seines Gegners.\nEs beherrscht auch prachtvolle Hebeltechniken."
        es:
          ultra_sun: "Deja atónito al rival con sus rápidos ataques,\npero se luce tanto antes de dar el golpe\ndefinitivo que a veces sale mal parado."
          ultra_moon: "Con sus ágiles saltos y su juego de piernas,\npermanece siempre en el punto ciego del rival.\nEs un experto en llaves inmovilizadoras."
        ko:
          ultra_sun: "빠른 기술로 상대를 압도한다.\n필살기를 쓰기 위한 어필이\n너무 길어서 위기에 처하기도 한다."
          ultra_moon: "경쾌한 점프로 상대의\n사각을 돌며 싸운다.\n화려한 관절 기술도 특기다."
        zh_simp:
          ultra_sun: "用速度快的招式压倒对手。\n使出必杀技时的展示时间过长，\n有时候会陷入危机。"
          ultra_moon: "会用轻巧的跳跃\n跳到对手的死角来战斗。\n也很擅长华丽的关节招式。"
        zh_trad:
          ultra_sun: "用速度快的招式壓倒對手。\n由於使出必殺技時的前置動作太長，\n有時會因此陷入危機。"
          ultra_moon: "會用輕盈的跳躍\n跳到對手的死角來戰鬥。\n也很擅長華麗的關節技。"
dedenne:
  species_id: 702
  names:
    jp_kana: デデンネ
    jp_kanji: デデンネ
    en: Dedenne
    fr: Dedenne
    it: Dedenne
    de: Dedenne
    es: Dedenne
    ko: 데덴네
    zh_simp: 咚咚鼠
    zh_trad: 咚咚鼠
  forms:
    dedenne:
      form_id: 0
      base_stats:
        hp: 67
        attack: 58
        defense: 57
        special_attack: 81
        special_defense: 67
        speed: 101
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
        - fairy
      egg_groups:
        - field
        - fairy
      abilities:
        - cheek_pouch
        - pickup
      hidden_ability: plus
      descriptions:
        jp_kana:
          ultra_sun: "みんかに　しのびこみ　コンセントから\nでんきを　ぬすむ。　でんきだいが\nおかしいときは　こいつの　しわざ。"
          ultra_moon: "うえの　ヒゲは　あたりを　さぐる\nセンサーで　したに　はえた　ヒゲは\nでんきを　はなつ　きかん　なのだ。"
        jp_kanji:
          ultra_sun: "民家に　忍びこみ　コンセントから\n電気を　盗む。　電気代が\nおかしいときは　こいつの　仕業。"
          ultra_moon: "上の　ヒゲは　辺りを　探る\nセンサーで　下に　生えた　ヒゲは\n電気を　放つ　器官　なのだ。"
        en:
          ultra_sun: "It sneaks into people’s homes and steals\nelectricity from their outlets. When your electric\nbill seems off, it’s the handiwork of this rascal."
          ultra_moon: "Its upper whiskers are sensors that survey its\nsurroundings. Its lower whiskers are organs\nthat shoot electricity."
        fr:
          ultra_sun: "Il s’introduit chez les gens pour voler l’électricité\nvia les prises de courant. On sait qui blâmer\nen cas de facture d’électricité trop élevée !"
          ultra_moon: "Les moustaches du haut lui servent de capteurs\npour inspecter son environnement ; celles du\nbas lui permettent de décharger de l’électricité."
        it:
          ultra_sun: "Si intrufola nelle case per rubare energia dalle\nprese elettriche. Se la bolletta della luce è\nstranamente alta, c’è di sicuro il suo zampino!"
          ultra_moon: "I baffi superiori sono sensori con cui sonda\nl’ambiente circostante, mentre quelli inferiori\nsono organi che emettono elettricità."
        de:
          ultra_sun: "Es schleicht sich in Häuser und zapft an den\nSteckdosen Strom ab. Fällt die Stromrechnung\nmal unerwartet hoch aus, ist Dedenne schuld."
          ultra_moon: "Seine oberen Schnurrhaare dienen ihm als\nSensoren zum Abtasten der Umgebung. Seine\nunteren Schnurrhaare erzeugen Elektrizität."
        es:
          ultra_sun: "Se infiltra en los hogares para robar energía de\nlos enchufes. Si la factura de la electricidad es\ninusualmente alta, seguro que él tiene la culpa."
          ultra_moon: "Los bigotes superiores actúan como sensores\ndel entorno, mientras que los inferiores son\nórganos que generan electricidad."
        ko:
          ultra_sun: "민가에 숨어들어 콘센트에서\n전기를 훔친다. 전기료가\n이상할 때는 이 녀석의 소행이다."
          ultra_moon: "위쪽 수염은 주변을 살피는\n센서이고 아래로 난 수염은\n전기를 발산하는 기관이다."
        zh_simp:
          ultra_sun: "潜入民居，从插座里偷电。\n电费很奇怪的时候，\n就是这家伙的杰作。"
          ultra_moon: "上面的胡子是探索周边的感应器。\n下面长出的胡子是释放电的器官。"
        zh_trad:
          ultra_sun: "會潛入人們家裡，從插座偷電。\n如果發現電費不正常，\n那就是這傢伙幹的。"
          ultra_moon: "上面的鬍鬚是探索周遭環境\n的感應器，長在下面的鬍鬚\n是釋放電流的器官。"
carbink:
  species_id: 703
  names:
    jp_kana: メレシー
    jp_kanji: メレシー
    en: Carbink
    fr: Strassie
    it: Carbink
    de: Rocara
    es: Carbink
    ko: 멜리시
    zh_simp: 小碎钻
    zh_trad: 小碎鑽
  forms:
    carbink:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 150
        special_attack: 50
        special_defense: 150
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - rock
        - fairy
      egg_groups:
        - fairy
        - mineral
      abilities:
        - clear_body
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          ultra_sun: "ちていの　おくふかくには　メレシーの\nむれと　その　じょおうが　くらす\nほうせきの　くにが　あるという。"
          ultra_moon: "からだの　ほうせきが　くもらないよう\nメレシーの　むれでは　ふわふわの\nヒゲで　おたがいを　みがきあうのだ。"
        jp_kanji:
          ultra_sun: "地底の　奥深くには　メレシーの\n群れと　その　女王が　暮らす\n宝石の　国が　あるという。"
          ultra_moon: "身体の　宝石が　曇らないよう\nメレシーの　群れでは　ふわふわの\nヒゲで　お互いを　磨きあうのだ。"
        en:
          ultra_sun: "Some say that deep beneath the surface of the\nworld, a pack of Carbink live with their queen in\na kingdom of jewels."
          ultra_moon: "To keep the jewels on their bodies free of\ntarnish, packs of Carbink use their soft manes\nto polish one another’s jewels."
        fr:
          ultra_sun: "Au plus profond de la terre se trouverait\nun royaume de pierres précieuses où vivent\nla reine des Strassie et son peuple."
          ultra_moon: "Pour éviter que les pierres précieuses de leur\ncorps ne ternissent, les Strassie se les polissent\nmutuellement avec leurs moustaches."
        it:
          ultra_sun: "Corre voce che nelle profondità della terra\nci sia un regno fatto di pietre preziose dove\nvivono i Carbink assieme alla loro regina."
          ultra_moon: "Per evitare che le pietre preziose che adornano\nil loro corpo perdano lucentezza, i Carbink se le\nlucidano a vicenda con i morbidi baffi."
        de:
          ultra_sun: "Tief unter der Erde gibt es angeblich ein\nKönigreich aus Diamanten, in dem Rocara\nzusammen mit ihrer Königin leben."
          ultra_moon: "Um zu verhindern, dass die Edelsteine an ihrem\nKörper den Glanz verlieren, polieren sich Rocara\ngegenseitig mit ihren flauschigen Bärten."
        es:
          ultra_sun: "Se dice que en las profundidades subterráneas\nviven grupos enteros de Carbink con su reina\nrodeados de toda suerte de joyas."
          ultra_moon: "Para que las piedras preciosas que adornan sus\ncuerpos no pierdan lustre, los Carbink se las\npulen unos a otros con sus mullidos bigotes."
        ko:
          ultra_sun: "땅속 깊숙한 곳에는 멜리시의\n무리와 그들의 여왕이 사는\n보석의 나라가 있다고 한다."
          ultra_moon: "몸에 있는 보석의 색이 바래지 않도록\n멜리시의 무리는 푹신푹신한\n수염으로 서로를 닦아준다."
        zh_simp:
          ultra_sun: "据说，在地底的深处，\n有着小碎钻群体和它们的女王\n共同生活的宝石王国。"
          ultra_moon: "为了不让身体上的宝石黯淡，\n小碎钻群体间会用蓬松的胡子\n互相打磨对方。"
        zh_trad:
          ultra_sun: "據說在地底的深處，\n有著小碎鑽族群和牠們的女王\n所居住的寶石王國。"
          ultra_moon: "為了不讓身上的寶石失去光芒，\n小碎鑽的群體會用蓬鬆的鬍子\n互相打磨彼此的身體。"
goomy:
  species_id: 704
