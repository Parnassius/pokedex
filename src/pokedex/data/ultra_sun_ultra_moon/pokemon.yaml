      base_stats:
        hp: 78
        attack: 75
        defense: 75
        special_attack: 70
        special_defense: 70
        speed: 52
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - flying
      egg_groups:
        - flying
      abilities:
        - overgrow
      hidden_ability: long_reach
      descriptions:
        jp_kana:
          ultra_sun: "ナルシストで　きれいずき。\nマメに　おていれ　してあげないと\nいうことを　きかなく　なることも。"
          ultra_moon: "けはいに　とてもびんかん。　うしろに\nたつ　あいてを　けはいで　さっちして\nするどい　はねを　なげて　しとめる。"
        jp_kanji:
          ultra_sun: "ナルシストで　綺麗好き。\nマメに　お手入れ　してあげないと\nいうことを　聞かなく　なることも。"
          ultra_moon: "気配に　とても敏感。　後ろに\n立つ　相手を　気配で　察知して\n鋭い　羽を　投げて　仕留める。"
        en:
          ultra_sun: "This narcissistic Pokémon is a clean freak.\nIf you don’t groom it diligently, it will stop\nlistening to you."
          ultra_moon: "Supremely sensitive to the presence of others,\nit can detect opponents standing behind it,\nflinging its sharp feathers to take them out."
        fr:
          ultra_sun: "Ce narcissique est un amoureux de la propreté.\nIl refuse parfois d’obéir si l’on ne prend pas\ngrand soin de ses plumes."
          ultra_moon: "Il détecte très facilement la présence d’ennemis\nà proximité, et élimine ceux qui se trouvent\ndans son dos en tirant des plumes acérées."
        it:
          ultra_sun: "È narcisista e ama la pulizia al punto di\nsmettere di obbedire se non ci si prende\ncura di lui come si deve."
          ultra_moon: "È molto sensibile all’ambiente circostante.\nPercepisce la presenza del nemico dietro di sé\ne lo abbatte scagliando le sue piume affilate."
        de:
          ultra_sun: "Es gibt sich affektiert und legt großen Wert auf\nSauberkeit. Wenn man es nicht ordentlich pflegt,\nwidersetzt es sich manchmal sogar Befehlen."
          ultra_moon: "Es merkt sofort, wenn jemand in der Nähe ist.\nSpürt es hinter sich die Präsenz eines Gegners,\neliminiert es ihn, indem es scharfe Federn wirft."
        es:
          ultra_sun: "Es narcisista y bastante pulcro, por lo que, si no\nse le dedica suficiente atención a su aseo, se\nniega a obedecer cualquier orden."
          ultra_moon: "Su capacidad de percepción es excelente y\npuede detectar una presencia a sus espaldas\ny aniquilarla con sus afiladas plumas."
        ko:
          ultra_sun: "나르시스트로 깔끔한 걸 좋아한다.\n자주 관리해 주지 않으면\n말을 안 듣기도 한다."
          ultra_moon: "기척에 매우 민감하다. 뒤에\n서 있는 상대를 기척으로 감지하고\n날카로운 날개를 날려서 처리한다."
        zh_simp:
          ultra_sun: "非常自恋，又爱美。\n如果不勤快地给它打理，\n或许会不听话。"
          ultra_moon: "对气息非常敏感。\n从气息就能察觉身后所站的对手，\n投掷出锋利的羽毛给予致命一击。"
        zh_trad:
          ultra_sun: "個性自戀又愛美，\n如果不勤快地為牠打理外表，\n牠有可能會因此變得不聽話。"
          ultra_moon: "對周圍的動靜非常敏感，\n能夠察覺到站在身後的對手，\n投擲鋒利的羽毛給予致命一擊。"
decidueye:
  species_id: 724
  names:
    jp_kana: ジュナイパー
    jp_kanji: ジュナイパー
    en: Decidueye
    fr: Archéduc
    it: Decidueye
    de: Silvarro
    es: Decidueye
    ko: 모크나이퍼
    zh_simp: 狙射树枭
    zh_trad: 狙射樹梟
  forms:
    decidueye:
      form_id: 0
      base_stats:
        hp: 78
        attack: 107
        defense: 75
        special_attack: 100
        special_defense: 100
        speed: 70
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - ghost
      egg_groups:
        - flying
      abilities:
        - overgrow
      hidden_ability: long_reach
      descriptions:
        jp_kana:
          ultra_sun: "やばねを　つがえ　あいてに　はなつ。\nぜったい　はずせないときは　あたまの\nツルをひき　しゅうちゅう　するのだ。"
          ultra_moon: "わずか　０．１びょうで　ハネを\nつがえて　てきを　うつ。　まばたきの\nあいだに　しょうぶが　ついている。"
        jp_kanji:
          ultra_sun: "矢羽を　つがえ　相手に　放つ。\n絶対　外せない時は　頭の\nツルを引き　集中　するのだ。"
          ultra_moon: "わずか　０．１秒で　ハネを\n番えて　敵を　撃つ。　瞬きの\n間に　勝負が　ついている。"
        en:
          ultra_sun: "It nocks its arrow quills and shoots them at\nopponents. When it simply can’t afford to miss,\nit tugs the vine on its head to improve its focus."
          ultra_moon: "Decidueye can nock and fire an arrow at an\nenemy in a tenth of a second, so its battles are\ndecided in the blink of an eye."
        fr:
          ultra_sun: "Les plumes de ses ailes lui servent de flèches.\nQuand il doit à tout prix toucher sa cible, il tire\nsur les lianes de son cou pour se concentrer."
          ultra_moon: "Il est capable de décocher ses plumes sur\nson ennemi en un dixième de seconde,\ns’assurant ainsi la victoire en un clin d’œil."
        it:
          ultra_sun: "Scocca piume come fossero frecce. Quando non\ndeve mancare il bersaglio, tira le liane del\ncappuccio per ridurne l’apertura e mirare meglio."
          ultra_moon: "È in grado di scoccare piume e colpire il nemico\nin un decimo di secondo, aggiudicandosi la\nvittoria in un batter d’occhio."
        de:
          ultra_sun: "Es legt seine Federpfeile an, um sie auf Gegner\nzu schießen. Muss ein Schuss sitzen, zieht es\nzur Konzentration an einer seiner Kopfranken."
          ultra_moon: "Es braucht bloß 0,1 Sekunden, um eine Feder\nanzulegen und auf den Gegner zu schießen.\nOft besiegt es einen, bevor man blinzeln kann."
        es:
          ultra_sun: "Usa sus plumas como flechas para atacar a los\nrivales. Si no puede permitirse fallar, frunce su\ncapucha para concentrarse mejor."
          ultra_moon: "Tan solo le lleva una décima de segundo sacar\nuna pluma y disparar al rival, y muchas veces\ngana el combate en un abrir y cerrar de ojos."
        ko:
          ultra_sun: "살깃을 시위에 메겨서 상대에게 날린다.\n반드시 명중시켜야 할 때는\n머리의 시위를 당겨 집중한다."
          ultra_moon: "불과 0.1초만에\n살깃을 시위에 메겨 적을 공격한다.\n눈 깜짝할 사이에 승부가 나 있다."
        zh_simp:
          ultra_sun: "会搭上箭羽射向对手。\n在绝对不想射偏时，\n会拉紧头上的藤蔓集中精神。"
          ultra_moon: "仅用０.１秒就能搭上羽毛，\n向敌人射击。\n在一瞬之间决出胜负。"
        zh_trad:
          ultra_sun: "會搭上箭羽朝對手射出。\n在絕對必須射中的時候，\n會拉緊頭上的藤蔓來集中精神。"
          ultra_moon: "只需要０．１秒就能\n搭上羽毛向敵人射擊，\n在一瞬間決定勝負。"
litten:
  species_id: 725
  names:
    jp_kana: ニャビー
    jp_kanji: ニャビー
    en: Litten
    fr: Flamiaou
    it: Litten
    de: Flamiau
    es: Litten
    ko: 냐오불
    zh_simp: 火斑喵
    zh_trad: 火斑喵
  forms:
    litten:
      form_id: 0
      base_stats:
        hp: 45
        attack: 65
        defense: 40
        special_attack: 60
        special_defense: 40
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: intimidate
      descriptions:
        jp_kana:
          ultra_sun: "しつこく　つきまとわれると　こころを\nひらかなくなる。　なついてきても\nかじょうな　スキンシップは　きんもつ。"
          ultra_moon: "１ねんに　２ど　けが　はえかわる。\nじきが　くると　じぶんの　からだに\nひを　つけて　ふるい　けを　やく。"
        jp_kanji:
          ultra_sun: "しつこく　付きまとわれると　心を\n開かなくなる。　懐いてきても\n過剰な　スキンシップは　禁物。"
          ultra_moon: "１年に　２度　毛が　生え変わる。\n時期が　くると　自分の　身体に\n火を　つけて　古い　毛を　焼く。"
        en:
          ultra_sun: "If you try too hard to get close to it, it won’t\nopen up to you. Even if you do grow close, giving\nit too much affection is still a no-no."
          ultra_moon: "Its coat regrows twice a year. When the time\ncomes, Litten sets its own body on fire and\nburns away the old fur."
        fr:
          ultra_sun: "Laissez ce Pokémon respirer ou il se renfermera\nsur lui-même. Même s’il devient affectueux,\nallez-y doucement avec les caresses."
          ultra_moon: "Il renouvelle son pelage deux fois par an.\nQuand arrive la période de sa mue, il met\nle feu à son ancienne fourrure."
        it:
          ultra_sun: "Si chiude in se stesso se riceve attenzioni\nsoffocanti. Anche se si affeziona, preferisce\nmantenere una certa distanza."
          ultra_moon: "Cambia il pelo due volte all’anno.\nAl momento della muta, il suo corpo prende\nfuoco e il pelo vecchio viene bruciato."
        de:
          ultra_sun: "Gegenüber Menschen, die zu aufdringlich sind,\nverschließt es sich. Übermäßiger Körperkontakt\nist für Flamiau selbst bei guten Freunden tabu."
          ultra_moon: "Es erneuert sein Fell zweimal pro Jahr. Wenn es\nmal wieder soweit ist, steckt es seinen Körper\nin Brand, um sein altes Haarkleid loszuwerden."
        es:
          ultra_sun: "Detesta que lo acaricien demasiado, aunque lo\nhagan sus seres queridos. En caso de sentirse\nagobiado se recluye en sí mismo."
          ultra_moon: "Muda el pelo dos veces al año. Cuando llega el\nmomento, su cuerpo arde y le prende fuego al\npelaje viejo."
        ko:
          ultra_sun: "집요하게 따라다니면\n마음을 열지 않는다. 친밀해져도\n과도한 스킨십은 금물이다."
          ultra_moon: "1년에 2번 털이 새로 난다.\n때가 되면 자신의 몸에\n불을 붙여서 오래된 털을 태운다."
        zh_simp:
          ultra_sun: "如果被纠缠不休，就不会\n再打开心扉。即使亲近起来，\n过多的亲密接触也是禁忌。"
          ultra_moon: "１年要换２次毛。\n到了换毛的时候，就会用火\n点燃自己的身体，烧掉旧毛。"
        zh_trad:
          ultra_sun: "如果被糾纏不休，就會變得\n不肯打開心扉。就算和牠變得親近了，\n也嚴禁與牠有過度的親密接觸。"
          ultra_moon: "每年會換２次毛。當換毛的\n時期到來時，會用火點燃\n自己的身體，把舊的毛燒掉。"
torracat:
  species_id: 726
  names:
    jp_kana: ニャヒート
    jp_kanji: ニャヒート
    en: Torracat
    fr: Matoufeu
    it: Torracat
    de: Miezunder
    es: Torracat
    ko: 냐오히트
    zh_simp: 炎热喵
    zh_trad: 炎熱喵
  forms:
    torracat:
      form_id: 0
      base_stats:
        hp: 65
        attack: 85
        defense: 50
        special_attack: 80
        special_defense: 50
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: intimidate
      descriptions:
        jp_kana:
          ultra_sun: "なつくと　トレーナーにも　あまえるが\nちからは　つよく　ツメも　するどい。\nぜんしん　きずだらけに　されるぞ。"
          ultra_moon: "たてがみが　ピンと　たっているときは\nちょうしがよい　しょうこ。　ぐあいが\nわるいと　けがうしろに　ねてしまう。"
        jp_kanji:
          ultra_sun: "なつくと　トレーナーにも　甘えるが\n力は　強く　ツメも　鋭い。\n全身　傷だらけに　されるぞ。"
          ultra_moon: "たてがみが　ピンと　立っているときは\n調子が良い　証拠。　具合が\n悪いと　毛が後ろに　寝てしまう。"
        en:
          ultra_sun: "It can act spoiled if it grows close to its Trainer.\nA powerful Pokémon, its sharp claws can leave\nits Trainer’s whole body covered in scratches."
          ultra_moon: "When its mane is standing on end, you can tell\nit’s feeling good. When it isn’t feeling well, its fur\nwill lie down flat."
        fr:
          ultra_sun: "Il sait être affectueux avec son Dresseur,\nmais il ne connaît pas sa force. Câlinez-le,\net vous vous retrouverez couvert de griffures."
          ultra_moon: "Quand la mèche sur sa tête est dressée,\nc’est qu’il se porte bien. Dans le cas contraire,\nelle est plate et tombe vers l’arrière."
        it:
          ultra_sun: "Quando si affeziona, il suo Allenatore deve stare\nattento ai suoi slanci: data la sua forza e i suoi\nartigli affilati, rischia di ritrovarsi pieno di graffi."
          ultra_moon: "Quando la sua criniera è ritta, vuol dire che\nè in buona salute. Se sta male, invece,\nla lascia cadere all’indietro."
        de:
          ultra_sun: "Zutrauliche Miezunder schmiegen sich sogar an\nihren Trainer an. Sie sind so stark, dass dieser\ndabei am ganzen Körper Kratzwunden erleidet."
          ultra_moon: "Hat es seine Mähne aufgestellt, bedeutet dies,\ndass es guter Dinge ist. Geht es ihm jedoch\nschlecht, hängt sie schlaff nach hinten herab."
        es:
          ultra_sun: "Si le coge cariño a su Entrenador se muestra\nafectuoso, pero es tan fuerte y sus garras tan\nafiladas que lo puede dejar lleno de arañazos."
          ultra_moon: "Una crin alzada viene a significar que su estado\nfísico es bueno, mientras que una crin lacia\nhacia atrás indica lo contrario."
        ko:
          ultra_sun: "친해지면 트레이너에게도 응석 부리지만,\n힘은 강하고 발톱도 날카롭다.\n온몸을 상처투성이로 만든다."
          ultra_moon: "갈기가 바짝 서 있으면\n컨디션이 좋다는 증거다. 상태가\n안 좋으면 털이 뒤로 누워 버린다."
        zh_simp:
          ultra_sun: "如果亲近了，也会对训练家撒娇，\n但是力量很强，爪子也很锋利，\n所以会被弄得全身是伤。"
          ultra_moon: "鬃毛竖得直直的时候，\n证明它状态良好。\n状态不好时，毛发会向后倒。"
        zh_trad:
          ultra_sun: "變得親近後也會對訓練家撒嬌。\n但因為力氣很大，爪子又很銳利，\n訓練家會被弄得全身是傷。"
          ultra_moon: "如果牠的鬃毛直直豎立，\n代表牠的狀態很好。\n狀態不好時，毛會向後倒下。"
incineroar:
  species_id: 727
  names:
    jp_kana: ガオガエン
    jp_kanji: ガオガエン
    en: Incineroar
    fr: Félinferno
    it: Incineroar
    de: Fuegro
    es: Incineroar
    ko: 어흥염
    zh_simp: 炽焰咆哮虎
    zh_trad: 熾焰咆哮虎
  forms:
    incineroar:
      form_id: 0
      base_stats:
        hp: 95
        attack: 115
        defense: 90
        special_attack: 80
        special_defense: 90
        speed: 60
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - dark
      egg_groups:
        - field
      abilities:
        - blaze
      hidden_ability: intimidate
      descriptions:
        jp_kana:
          ultra_sun: "あらっぽく　わがままだが　かくしたを\nなぶることは　つまらないので　キライ。\nかくうえの　あいてに　やるきを　だす。"
          ultra_moon: "とうそうしんに　ひが　つくと\nこしの　まわりに　ある　ほのおも\nひときわ　はげしく　もえあがる。"
        jp_kanji:
          ultra_sun: "荒っぽく　わがままだが　格下を\nなぶることは　つまらないので　キライ。\n格上の　相手に　やる気を　出す。"
          ultra_moon: "闘争心に　火が　つくと\n腰の　まわりに　ある　炎も\nひと際　激しく　燃えあがる。"
        en:
          ultra_sun: "Although it’s rough mannered and egotistical, it\nfinds beating down unworthy opponents boring.\nIt gets motivated for stronger opponents."
          ultra_moon: "When its fighting spirit is set alight, the flames\naround its waist become especially intense."
        fr:
          ultra_sun: "Un Pokémon brutal qui n’en fait qu’à sa tête.\nSelon son humeur du moment, il lui arrive parfois\nd’ignorer sciemment les ordres de son Dresseur."
          ultra_moon: "Les flammes autour de ses hanches brûlent\nd’une ardeur redoublée quand sa combativité\ns’embrase."
        it:
          ultra_sun: "Pokémon rude ed egoista. Non gli piace\nprendersela con chi non è al suo livello e\npreferisce lottare con avversari più forti di lui."
          ultra_moon: "Quando arde dalla voglia di lottare, anche\nle fiamme intorno alla vita bruciano più\nintensamente."
        de:
          ultra_sun: "Es ist wild und egoistisch, aber Schwächere\nanzugreifen findet es langweilig und abstoßend.\nNur gegen Stärkere kommt es richtig in Fahrt."
          ultra_moon: "Entbrennt sein Kampfeswille, lodern die Flammen\num seine Hüfte noch heftiger auf."
        es:
          ultra_sun: "Este Pokémon rudo y egoísta considera aburrido\nenfrentarse a un rival inferior a él y prefiere dar\nlo mejor de sí mismo contra rivales más fuertes."
          ultra_moon: "Cuanto mayor es su espíritu combativo, con más\nfuerza arden las llamas que rodean su cintura."
        ko:
          ultra_sun: "거칠고 제멋대로지만 약한 상대를\n괴롭히는 것은 재미없어서 싫어한다.\n강한 상대에게 의욕을 보인다."
          ultra_moon: "투쟁심에 불이 붙으면\n허리 주변에 있는 불꽃도\n한층 격렬하게 타오른다."
        zh_simp:
          ultra_sun: "性格暴躁又任性，\n但讨厌欺凌弱小这类无聊的事。\n对于强大的对手会拿出干劲来。"
          ultra_moon: "如果燃起了斗志，腰周围的火焰\n也会燃烧得格外猛烈。"
        zh_trad:
          ultra_sun: "個性粗魯又任性，但討厭欺負弱小\n這種無聊的事，只有在面對\n強大對手時才會拿出幹勁。"
          ultra_moon: "當牠燃起鬥志的時候，\n腰部周圍的火焰也會\n燃燒得特別猛烈。"
popplio:
