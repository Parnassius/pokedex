      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: galvanize
      held_items:
        common: cell_battery
      descriptions:
        jp_kana:
          ultra_sun: "きむずかしくて　がんこ。　きげんを\nそこねると　ぜんしんから　ほうでんし\nらいめいの　ような　こえで　ほえる。"
          ultra_moon: "たいでんした　おおいわを　はっしゃ。\nちゃくだんすると　あたり　いったいに\nすさまじい　でんげきが　ほとばしる。"
        jp_kanji:
          ultra_sun: "気難しくて　頑固。　機嫌を\n損ねると　全身から　放電し\n雷鳴の　ような　声で　ほえる。"
          ultra_moon: "帯電した　大岩を　発射。\n着弾すると　あたり　一帯に\n凄まじい　電撃が　ほとばしる。"
        en:
          ultra_sun: "It’s grumpy and stubborn. If you upset it, it\ndischarges electricity from the surface of its\nbody and growls with a voice like thunder."
          ultra_moon: "It shoots large rocks that are charged with\nelectricity. Tremendous electric shocks are\nflung out across the whole area of impact."
        fr:
          ultra_sun: "Quand ce Pokémon buté et caractériel s’énerve,\ntout son corps produit des décharges, et ses\ncris résonnent comme le tonnerre."
          ultra_moon: "Il envoie de gros rochers chargés d’électricité\nqui diffusent des ondes électriques tout autour\nde la zone d’impact."
        it:
          ultra_sun: "Ha un carattere scontroso e testardo. Se viene\ncontrariato lancia scariche elettriche da tutto\nil corpo ed emette un verso simile a un tuono."
          ultra_moon: "Spara grosse rocce elettrizzate che propagano\ntremende scariche elettriche per tutta l’area\ndell’impatto."
        de:
          ultra_sun: "Ein dickköpfiges und mürrisches Pokémon. Wenn\nman es verärgert, stößt es aus seinem Körper\nStrom aus und heult mit donnernder Stimme auf."
          ultra_moon: "Es feuert elektrisch geladene Felsen ab. Wenn\ndiese einschlagen, entfesseln sie im umliegenden\nBereich fürchterliche Stromschläge."
        es:
          ultra_sun: "Es de carácter cascarrabias y obstinado.\nCuando se harta, descarga electricidad por\ntodo el cuerpo y ruge con voz atronadora."
          ultra_moon: "Lanza rocas cargadas de electricidad. Estos\nproyectiles emiten temibles descargas allá\ndonde aterrizan."
        ko:
          ultra_sun: "신경질적이며 완고하다. 기분이\n상하면 전신에서 전기를 방출하여\n우렛소리같이 큰 소리로 운다."
          ultra_moon: "전기를 띠는 큰 바위를 발사한다.\n명중하면 주변 일대에\n굉장한 전격을 내뿜는다."
        zh_simp:
          ultra_sun: "个性顽固且难以相处。\n如果它不高兴了，就会全身放电，\n并以雷鸣般的声音吼叫。"
          ultra_moon: "能发射带电的巨大岩石。\n打中后，着弹点附近\n就会迸发出惊人的电击。"
        zh_trad:
          ultra_sun: "個性頑固且難相處。\n心情不好的時候會從全身放電，\n並發出像雷鳴般的吼叫聲。"
          ultra_moon: "會發射帶電的大岩石。\n被擊中的地點周圍\n會迸發出驚人的電擊。"
