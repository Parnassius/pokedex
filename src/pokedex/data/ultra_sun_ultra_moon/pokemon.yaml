      descriptions:
        jp_kana:
          ultra_sun: "からだから　あふれた　エネルギーが\nオレンジいろの　けっしょうになった。\nダイヤモンドも　くだく　かたさだぞ。"
          ultra_moon: "オレンジの　けっしょうは　おおきな\nエネルギーの　かたまり。　かちが\nあるので　ねらわれることも　ある。"
        jp_kanji:
          ultra_sun: "身体から　あふれた　エネルギーが\nオレンジ色の　結晶に　なった。\nダイヤモンドも　砕く　硬さだぞ。"
          ultra_moon: "オレンジの　結晶は　大きな\nエネルギーの　塊。　価値が\nあるので　狙われることも　ある。"
        en:
          ultra_sun: "The energy overflowing from its body has\nturned into orange crystals that are hard\nenough to smash diamonds."
          ultra_moon: "Its orange crystals are lumps of powerful\nenergy. They’re valuable, so Boldore is\nsometimes targeted for them."
        fr:
          ultra_sun: "L’énergie qui émane de son corps s’est\ntransformée en cristaux orangés suffisamment\ndurs pour briser le diamant."
          ultra_moon: "Géolithe est parfois pris pour cible à cause\nde ses cristaux orangés de grande valeur,\nformés d’énergie condensée."
        it:
          ultra_sun: "L’energia che fuoriesce dal suo corpo forma dei\ncristalli arancioni talmente duri da frantumare\nanche i diamanti."
          ultra_moon: "È un Pokémon molto ambito per i preziosi\ncristalli arancioni che ha sul corpo, fatti di\nenergia condensata."
        de:
          ultra_sun: "Energie, die aus seinem Körper austrat, hat sich\nzu orangefarbenen, harten Kristallen verfestigt.\nSie können sogar Diamanten zersplittern."
          ultra_moon: "In den orangefarbenen Kristallen an seinem\nKörper sind große Mengen Energie gespeichert.\nDas macht sie wertvoll und heiß begehrt."
        es:
          ultra_sun: "La energía que desprende de su cuerpo termina\npor solidificarse en cristales anaranjados, tan\nduros que pueden quebrar hasta los diamantes."
          ultra_moon: "Los cristales naranjas de su cuerpo son energía\ncondensada. El valor que poseen es tal que lo\nconvierten en un Pokémon muy codiciado."
        ko:
          ultra_sun: "몸에서 넘쳐흐르는 에너지가\n오렌지색 결정이 되었다.\n다이아몬드도 부술 정도로 견고하다."
          ultra_moon: "오렌지색 결정은 큰\n에너지의 덩어리다. 가치가\n있어 노려지는 일도 있다."
        zh_simp:
          ultra_sun: "从身体里溢出的能量\n变成了橙色的结晶。\n其硬度连钻石都能弄碎。"
          ultra_moon: "橙色的结晶是大大的能量块。\n因为很有价值，\n所以有时会被袭击。"
        zh_trad:
          ultra_sun: "從身體溢出的能量\n形成了橘色的結晶，\n硬度高到連鑽石都能敲碎。"
          ultra_moon: "橘色的部分是大塊的\n能量結晶。因為很有價值，\n所以牠有時會被襲擊。"
