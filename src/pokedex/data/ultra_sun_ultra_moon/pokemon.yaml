        - swarm
        - early_bird
      hidden_ability: iron_fist
      descriptions:
        jp_kana:
          ultra_sun: "せなかの　もようは　よぞらの　ほしと\nかんけい　していると　いわれているが\nくわしいことは　まだ　ふめいのまま。"
          ultra_moon: "きらめく　こなを　ふりまきながら\nよぞらを　とぶ。　こなが　からだに\nつくと　いいことが　あるといわれる。"
        jp_kanji:
          ultra_sun: "背中の　模様は　夜空の　星と\n関係　していると　言われているが\n詳しいことは　まだ　不明のまま。"
          ultra_moon: "きらめく　粉を　振りまきながら\n夜空を　飛ぶ。　粉が　身体に\nつくと　いいことが　あるといわれる。"
        en:
          ultra_sun: "It’s said that the patterns on its back are\nrelated to the stars in the night sky, but the\ndetails of that relationship remain unclear."
          ultra_moon: "It flies through the night sky, sprinkling sparkly\ndust. According to some, if that dust sticks to\nyou, good things will happen to you."
        fr:
          ultra_sun: "Le motif qui orne son dos aurait un lien avec\nles étoiles, mais nul ne sait encore en quoi\nconsiste ce lien."
          ultra_moon: "Il vole dans le ciel nocturne en répandant une\npoudre scintillante. Si elle vous touche, quelque\nchose de positif devrait bientôt vous arriver."
        it:
          ultra_sun: "Si dice che il motivo sul suo dorso abbia una\nqualche relazione con le stelle, ma non si sa\nancora niente di preciso."
          ultra_moon: "Svolazza nel cielo notturno lasciando dietro di\nsé una scia di polvere luccicante. Si dice che\nil contatto con essa porti fortuna."
        de:
          ultra_sun: "Es heißt, das Muster auf seinem Rücken stehe in\nZusammenhang mit den Sternen am Firmament.\nGenaueres ist bisher aber noch nicht bekannt."
          ultra_moon: "Nachts fliegt Ledian durch die Gegend und\nverstreut glitzernden Puder. Es soll Glück\nbringen, wenn man etwas davon abbekommt."
        es:
          ultra_sun: "Se dice que los motivos que luce en el dorso\nguardan relación con las estrellas, aunque esta\nteoría sigue siendo todo un misterio."
          ultra_moon: "Vuela por el cielo nocturno esparciendo un polvo\nbrillante. Dicen que entrar en contacto con este\npolvo trae buena suerte."
        ko:
          ultra_sun: "등의 모양은 밤하늘의 별과\n연관이 있다고 전해지지만\n자세한 것은 아직 알려지지 않았다."
          ultra_moon: "반짝이는 가루를 흩뿌리며\n밤하늘을 난다. 가루가 몸에 붙으면\n좋은 일이 생긴다고 전해진다."
        zh_simp:
          ultra_sun: "据说它背上的花纹和\n夜空里的星星有关，\n但是具体情况至今未明。"
          ultra_moon: "在夜空中飞翔的同时\n会抛撒闪闪发光的粉末。\n据说粉末沾到身上就会有好事发生。"
        zh_trad:
          ultra_sun: "據說牠背上的花紋與\n夜空中的星星有關，\n但詳細情形至今仍然不明。"
          ultra_moon: "一邊撒落閃閃發亮的粉末，一邊在\n夜空中飛翔。據說如果身上沾到\n這種粉末，就會有好事發生。"
spinarak:
