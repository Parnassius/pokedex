raichu:
  species_id: 26
  names:
    jp_kana: ライチュウ
    jp_kanji: ライチュウ
    en: Raichu
    fr: Raichu
    it: Raichu
    de: Raichu
    es: Raichu
    ko: 라이츄
    zh_simp: 雷丘
    zh_trad: 雷丘
  forms:
    raichu:
      form_id: 0
      base_stats:
        hp: 60
        attack: 90
        defense: 55
        special_attack: 90
        special_defense: 80
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
      egg_groups:
        - field
        - fairy
      abilities:
        - static
      hidden_ability: lightning_rod
      descriptions:
        jp_kana:
          ultra_sun: "からだに　でんきが　たまるに　つれ\nこうげきてきに。　じつは　でんきが\nストレスなのではという　せつもある。"
          ultra_moon: "ピカチュウの　すがたが　すきな\nトレーナーも　おおく　なかなか\nすがたを　みかけない　ポケモン。"
        jp_kanji:
          ultra_sun: "身体に　電気が　たまるに　つれ\n攻撃的に。　実は　電気が\nストレスなのでは　という　説もある。"
          ultra_moon: "ピカチュウの　姿が　好きな\nトレーナーも　多く　なかなか\n姿を　見かけない　ポケモン。"
        en:
          ultra_sun: "As electricity builds up inside its body, it\nbecomes more aggressive. One theory is that\nthe electricity buildup is actually causing stress."
          ultra_moon: "Because so many Trainers like the way Pikachu\nlooks, you don’t see this Pokémon very often."
        fr:
          ultra_sun: "Plus il est chargé en électricité, plus il se montre\nagressif. D’aucuns pensent que ce courant\nélectrique le stresse."
          ultra_moon: "Ce Pokémon est très rare, car la plupart\ndes Dresseurs lui préfèrent Pikachu."
        it:
          ultra_sun: "Diventa più aggressivo con l’accumularsi di\nenergia elettrica. Alcuni pensano che sia\nl’elettricità stessa a causargli stress."
          ultra_moon: "Molti Allenatori gli preferiscono Pikachu e per\nquesto non lo si vede spesso in giro."
        de:
          ultra_sun: "Je mehr es sich elektrisch auflädt, desto\naggressiver wird es. Man vermutet, dass die\nElektrizität den Stress verursache."
          ultra_moon: "Ein eher seltenes Pokémon, da viele Trainer\nPikachu bevorzugen."
        es:
          ultra_sun: "Se vuelve más agresivo a medida que acumula\nelectricidad. Hay quien afirma que esta le\nprovoca estrés."
          ultra_moon: "Como la mayoría de Entrenadores prefiere a\nPikachu, no se ven muchos ejemplares de este\nPokémon."
        ko:
          ultra_sun: "몸에 전기가 쌓일수록 공격적으로\n변한다. 사실은 전기가\n스트레스라는 설도 있다."
          ultra_moon: "피카츄의 모습을 좋아하는\n트레이너도 많아서 좀처럼\n모습을 보기 힘든 포켓몬이다."
        zh_simp:
          ultra_sun: "随着电力在体内的积聚，它会越发地\n具有攻击性。也有说法讲到\n其实电力就是它的压力。"
          ultra_moon: "因为有很多训练家喜欢\n它进化前的皮卡丘模样，\n所以这种宝可梦十分少见。"
        zh_trad:
          ultra_sun: "隨著體內電力的累積，\n性情會變得具有攻擊性。\n也有人認為電力對牠其實是種壓力。"
          ultra_moon: "許多訓練家比較喜歡\n皮卡丘的模樣，因而使得\n這種寶可夢相當少見。"
    raichu_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 60
        attack: 85
        defense: 50
        special_attack: 95
        special_defense: 85
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - electric
        - psychic
      egg_groups:
        - field
        - fairy
      abilities:
        - surge_surfer
      descriptions:
        jp_kana:
          ultra_sun: "サイコパワーを　しゅうちゅう　させた\nシッポにのり　すべるように　いどう。\nおかサーファーの　いみょうを　もつ。"
          ultra_moon: "ほっぺを　もみしだくと　あまくて\nかぐわしい　においが　ただよう。\nただし　かるく　しびれてしまうぞ。"
        jp_kanji:
          ultra_sun: "サイコパワーを　集中させた\nシッポに乗り　滑るように　移動。\n陸サーファーの　異名を　持つ。"
          ultra_moon: "ほっぺを　揉みしだくと　甘くて\nかぐわしい　匂いが　漂う。\nただし　軽く　痺れてしまうぞ。"
        en:
          ultra_sun: "It focuses psychic energy into its tail and rides\nit like it’s surfing. Another name for this\nPokémon is “hodad.”"
          ultra_moon: "When you rub its cheeks, a sweet fragrance\ncomes wafting out. However, you’ll also get a\nlight shock!"
        fr:
          ultra_sun: "Il concentre son énergie psychique dans sa\nqueue et s’en sert comme d’une planche de surf.\nOn le surnomme « le surfeur tellurique »."
          ultra_moon: "Si vous pincez ses joues rondouillardes,\nune douce odeur sucrée se répand dans l’air.\nMais attention à la petite décharge électrique !"
        it:
          ultra_sun: "Concentra i suoi poteri psichici nella coda\ne si sposta su di essa come se scivolasse.\nÈ soprannominato “il surfista di terra”."
          ultra_moon: "Se pizzicate, le sue guance emanano un dolce\nprofumo, però danno anche una leggera scossa."
        de:
          ultra_sun: "Es sammelt Psycho-Kräfte in seinem Schweif\nund bewegt sich wie ein Surfer auf diesem fort.\nMan nennt es daher auch den „Geländesurfer“."
          ultra_moon: "Kräftiges Massieren seiner Backentaschen setzt\neinen süßen Geruch frei. Dafür nimmt man auch\ngerne einen leichten Elektroschock in Kauf."
        es:
          ultra_sun: "Concentra sus poderes psíquicos en la cola y\nse desplaza deslizándose sobre ella. Se lo\nconoce como el Surfista de Tierra Firme."
          ultra_moon: "Si le frotan los mofletes, desprende un dulce\naroma. Sin embargo, es fácil que se le duerma\nla mano a quien lo haga."
        ko:
          ultra_sun: "사이코 파워를 집중시킨\n꼬리를 타고 미끄러지듯 이동한다.\n육지 서퍼라는 별명이 있다."
          ultra_moon: "볼을 주무르면 달콤하고\n향기로운 냄새가 난다.\n단 살짝 저린다."
        zh_simp:
          ultra_sun: "会骑上集中有精神力量的尾巴，\n像滑行一样移动。\n有着“陆地冲浪手”这一别名。"
          ultra_moon: "如果揉搓它的脸颊，\n就会飘出一股甜甜的芳香。\n但是会有轻微的麻痹感。"
        zh_trad:
          ultra_sun: "會站上集中了精神力量的尾巴，\n像滑行般地移動。\n別名是「陸地衝浪手」。"
          ultra_moon: "如果搓揉牠的臉頰，\n就會飄散出甜美的芳香，\n但是會有輕微的麻痺感。"
sandshrew:
  species_id: 27
  names:
    jp_kana: サンド
    jp_kanji: サンド
    en: Sandshrew
    fr: Sabelette
    it: Sandshrew
    de: Sandan
    es: Sandshrew
    ko: 모래두지
    zh_simp: 穿山鼠
    zh_trad: 穿山鼠
  forms:
    sandshrew:
      form_id: 0
      base_stats:
        hp: 50
        attack: 75
        defense: 85
        special_attack: 20
        special_defense: 30
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_veil
      hidden_ability: sand_rush
      held_items:
        rare: grip_claw
      descriptions:
        jp_kana:
          ultra_sun: "あめの　すくない　とちに　すんでいる。\nきけんが　せまると　からだを　まるめ\nやわらかい　おなかを　まもるぞ。"
          ultra_moon: "しっけで　ひふが　ふやけてくると\nかざんに　むかう。　ちねつの　たかい\nじめんに　はりつき　かわかすのだ。"
        jp_kanji:
          ultra_sun: "雨の　少ない　土地に　棲んでいる。\n危険が　迫ると　身体を　丸め\n柔らかい　お腹を　守るぞ。"
          ultra_moon: "湿気で　皮膚が　ふやけてくると\n火山に　向かう。　地熱の　高い\n地面に　はりつき　乾かすのだ。"
        en:
          ultra_sun: "It lives in areas of limited rainfall. When danger\napproaches, it curls up into a ball to protect its\nsoft stomach."
          ultra_moon: "When its skin gets wrinkled from moisture, it\nheads for a volcano. It lies flat on a spot with a\nlot of geothermal heat and dries itself out."
        fr:
          ultra_sun: "Il vit dans les régions où il pleut rarement.\nQuand il est en danger, il se roule en boule pour\nprotéger son ventre, qui est son point faible."
          ultra_moon: "Lorsque sa peau est saturée d’humidité,\nil se dirige vers un volcan et se sèche\nà la chaleur du magma."
        it:
          ultra_sun: "Vive in zone con scarse precipitazioni.\nQuando è minacciato da un pericolo, si\nraggomitola per proteggere il ventre molle."
          ultra_moon: "Quando la sua pelle assorbe troppa umidità,\nraggiunge un vulcano e si stende sul terreno\ncaldo per asciugarsi."
        de:
          ultra_sun: "Es lebt in trockenen Gebieten mit wenig Regen.\nBei Gefahr rollt es sich zu einem Ball zusammen\nund schützt so seine weiche Bauchgegend."
          ultra_moon: "Bei zu viel Feuchtigkeit sucht es einen Vulkan\nauf, um auf dem warmen Erdboden seine\naufgeweichte Haut wieder zu trocknen."
        es:
          ultra_sun: "Prefiere hábitats secos. Cuando intuye peligro,\nse enrolla hasta hacerse una bola para proteger\nlas partes blandas de su cuerpo."
          ultra_moon: "Cuando la humedad le satura la piel, se dirige a\nun volcán y aprovecha las altas temperaturas\ndel suelo para secarse."
        ko:
          ultra_sun: "비가 적은 토지에 살고 있다.\n위험한 상황이 되면 몸을 웅크려\n부드러운 배를 지킨다."
          ultra_moon: "습기로 인해 피부가 불면\n화산으로 이동한다. 지열이 높은\n지면에 달라붙어 말리는 것이다."
        zh_simp:
          ultra_sun: "栖息在雨量稀少的土地上。\n遇到危险就会蜷缩起身体，\n并以此来保护自己柔弱的腹部。"
          ultra_moon: "如果皮肤因湿气而发胀，\n它就会前往火山。会趴在地热\n温度很高的地面上烘干皮肤。"
        zh_trad:
          ultra_sun: "棲息在雨量稀少的地區。\n遇到危險時會蜷縮起身體，\n藉此保護自己柔軟的腹部。"
          ultra_moon: "當皮膚因為濕氣而發脹變軟時，\n會前往火山地區，趴在因地熱\n而帶著高溫的地面上烘乾。"
    sandshrew_alolan_form:
      form_id: 1
      names:
