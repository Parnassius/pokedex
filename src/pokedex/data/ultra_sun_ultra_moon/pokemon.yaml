      descriptions:
        jp_kana:
          ultra_sun: "じぶんの　テリトリーを　レーダーで\nかんし　している。　しんにゅうしゃは\nはかいこうせんで　ただちに　しょぶん。"
          ultra_moon: "いまだに　うちゅうから　やってきたと\nしんじる　ひとびとも　いる。\nきょうりょくな　じりょくを　はなつ。"
        jp_kanji:
          ultra_sun: "自分の　テリトリーを　レーダーで\n監視　している。　侵入者は\n破壊光線で　ただちに　処分。"
          ultra_moon: "未だに　宇宙から　やってきたと\n信じる　人々も　いる。\n強力な　磁力を　放つ。"
        en:
          ultra_sun: "It uses radar to monitor its territory. Intruders\nare quickly disposed of with a hyper beam."
          ultra_moon: "There are still people who believe that this\nPokémon came from outer space. It emanates\na powerful magnetic field."
        fr:
          ultra_sun: "Il surveille son territoire à l’aide de son radar,\net élimine rapidement tout intrus avec son\nlaser destructeur."
          ultra_moon: "De nombreuses personnes pensent encore qu’il\ns’agit d’un Pokémon venu de l’espace. Il émet\nun champ magnétique extrêmement puissant."
        it:
          ultra_sun: "Sorveglia il suo territorio via radar ed elimina\nimmediatamente gli intrusi con un raggio\ndistruttore."
          ultra_moon: "Ancora oggi c’è chi crede che Magnezone sia\nvenuto dallo spazio. Emette un’intensa forza\nmagnetica."
        de:
          ultra_sun: "Es überwacht sein Territorium mithilfe seines\nRadars. Entdeckt es Eindringlinge, greift es sie\nunvermittelt mit einem Hyperstrahl an."
          ultra_moon: "Manche Menschen glauben immer noch, dass\nMagnezone von einem anderen Planeten stamme.\nEs geht ein starkes Magnetfeld von ihm aus."
        es:
          ultra_sun: "Gracias a su radar detecta a cualquier intruso\nque se adentre en su territorio y lo elimina sin\nmiramientos con su rayo destructor."
          ultra_moon: "Todavía hay quien cree hoy en día que proviene\ndel espacio. Emite un campo magnético de gran\npotencia."
        ko:
          ultra_sun: "자신의 영토를 레이더로\n감시하고 있다. 침입자는\n파괴광선으로 즉시 처분한다."
          ultra_moon: "아직까지 우주에서 왔다고\n믿는 사람들도 있다.\n강력한 자력을 발산한다."
        zh_simp:
          ultra_sun: "用雷达监视着自己的领地。\n一旦发现入侵者，\n就会立即用破坏光线惩治。"
          ultra_moon: "直至今日仍有人们相信\n它是来自宇宙的。\n会释放出强力的磁力。"
        zh_trad:
          ultra_sun: "用雷達監視著自己的地盤。\n一旦發現入侵者，就會立刻\n用破壞光線來解決對方。"
          ultra_moon: "至今仍然有人相信\n牠來自宇宙。\n會釋放出強大的磁力。"
lickilicky:
  species_id: 463
  names:
    jp_kana: ベロベルト
