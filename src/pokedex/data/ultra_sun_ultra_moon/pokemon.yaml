      types:
        - dragon
      egg_groups:
        - water_1
        - dragon
      abilities:
        - shed_skin
      hidden_ability: marvel_scale
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          ultra_sun: "まだ　よわいので　みずそこに　みを\nひそめ　しずんできた　ものを\nくらいながら　ひそかに　くらす。"
          ultra_moon: "まいにちに　ちかい　ペースで\nだっぴを　くりかえし　おおきくなる。\nだっぴしたての　ひふは　やわらかい。"
        jp_kanji:
          ultra_sun: "まだ　弱いので　水底に　身を\n潜め　沈んできた　ものを\n食らいながら　ひそかに　暮らす。"
          ultra_moon: "毎日に　近い　ペースで\n脱皮を　繰り返し　大きくなる。\n脱皮したての　皮膚は　やわらかい。"
        en:
          ultra_sun: "It’s still weak, so it lurks on the floor of bodies\nof water, eating whatever food sinks down and\nliving a quiet life."
          ultra_moon: "It sheds its skin—almost on a daily basis—and\ngrows larger. Its skin is soft just after it’s\nbeen shed."
        fr:
          ultra_sun: "Encore faible, il se cache dans les eaux\nprofondes et se nourrit de ce qui tombe de\nla surface. Il mène une existence paisible."
          ultra_moon: "Il grandit en muant quasiment tous les jours.\nSa peau est toute douce après la mue."
        it:
          ultra_sun: "Poiché è ancora debole, vive nascosto sui\nfondali. Si ciba di tutto quello che cade in acqua."
          ultra_moon: "Cresce cambiando pelle quasi ogni giorno.\nSubito dopo la muta, la pelle nuova è molto\nsoffice."
        de:
          ultra_sun: "Dratini ist noch schwach und lebt daher ruhig\nund verborgen in tiefen Gewässern. Es ernährt\nsich von allem, was über ihm versinkt."
          ultra_moon: "Es häutet sich fast täglich und wird dadurch\ngrößer. Unmittelbar nach der Häutung fühlt sich\nseine neue Haut angenehm weich an."
        es:
          ultra_sun: "Mientras todavía es débil, lleva una vida\ndiscreta oculto en el lecho marino y se alimenta\nde lo que cae al agua."
          ultra_moon: "Crece a gran ritmo y muda la piel casi a diario.\nLa piel nueva es muy suave al tacto."
        ko:
          ultra_sun: "아직 약해서 물밑으로\n몸을 숨기고 가라앉는 것을\n먹으면서 얌전히 지낸다."
          ultra_moon: "매일 비슷한 페이스로\n탈피를 반복하며 커진다.\n방금 탈피한 피부는 부드럽다."
        zh_simp:
          ultra_sun: "由于还很弱小，\n所以会潜伏在水底悄悄地生活．\n靠着吃沉入水中的东西为生。"
          ultra_moon: "以接近每天一次的频率\n反复蜕皮并长大。\n刚蜕完皮的皮肤很娇嫩。"
        zh_trad:
          ultra_sun: "由於還很弱小，所以會\n潛伏在水底悄悄地生活，\n靠著吃沉入水底的東西為生。"
          ultra_moon: "以接近每天一次的頻率\n反覆脫皮並長大。\n剛脫完皮的皮膚很柔軟。"
dragonair:
  species_id: 148
  names:
    jp_kana: ハクリュー
    jp_kanji: ハクリュー
    en: Dragonair
    fr: Draco
    it: Dragonair
    de: Dragonir
    es: Dragonair
    ko: 신뇽
    zh_simp: 哈克龙
    zh_trad: 哈克龍
  forms:
    dragonair:
      form_id: 0
      base_stats:
        hp: 61
        attack: 84
        defense: 65
        special_attack: 70
        special_defense: 70
        speed: 70
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
