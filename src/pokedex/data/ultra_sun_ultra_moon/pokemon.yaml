rowlet:
  species_id: 722
  names:
    jp_kana: モクロー
    jp_kanji: モクロー
    en: Rowlet
    fr: Brindibou
    it: Rowlet
    de: Bauz
    es: Rowlet
    ko: 나몰빼미
    zh_simp: 木木枭
    zh_trad: 木木梟
  forms:
    rowlet:
      form_id: 0
      base_stats:
        hp: 68
        attack: 55
        defense: 55
        special_attack: 50
        special_defense: 50
        speed: 42
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - flying
      egg_groups:
        - flying
      abilities:
        - overgrow
      hidden_ability: long_reach
      descriptions:
        jp_kana:
          ultra_sun: "はものの　ように　するどい　はねを\nとばして　こうげき。　あしのちからも\nつよく　キックも　あなどれないのだ。"
          ultra_moon: "せまくて　くらいばしょが　おちつく。\nトレーナーの　ふところや　バッグを\nすの　かわりに　することも　あるぞ。"
        jp_kanji:
          ultra_sun: "刃物の　ように　鋭い　羽を\n飛ばして　攻撃。　足の力も\n強く　キックも　侮れないのだ。"
          ultra_moon: "狭くて　暗い場所が　落ち着く。\nトレーナーの　ふところや　バッグを\n巣の　代わりに　することも　あるぞ。"
        en:
          ultra_sun: "It sends its feathers, which are as sharp as\nblades, flying in attack. Its legs are strong,\nso its kicks are also formidable."
          ultra_moon: "It feels relaxed in tight, dark places and has\nbeen known to use its Trainer’s pocket or bag\nas a nest."
        fr:
          ultra_sun: "Il attaque en tirant des plumes acérées.\nLa force de ses coups de patte est également\nredoutable."
          ultra_moon: "Il se sent à l’aise dans les endroits sombres\net étroits. Il se sert parfois de la poche ou\ndu sac de son Dresseur comme d’un nid."
        it:
          ultra_sun: "Attacca lanciando piume affilate come lame e\npuò anche tirare poderosi calci con le zampe\nrobuste."
          ultra_moon: "Si sente a suo agio in luoghi stretti e bui.\nA volte usa le tasche o la Borsa del suo\nAllenatore a mo’ di nido."
        de:
          ultra_sun: "Es schleudert messerscharfe Federn auf seine\nGegner. Aber auch seine Tritte sind nicht zu\nunterschätzen, denn es hat sehr kräftige Beine."
          ultra_moon: "An engen, dunklen Orten fühlt es sich wohl.\nManchmal zweckentfremdet es die Brusttasche\noder den Beutel seines Trainers als Nest."
        es:
          ultra_sun: "Usa sus afiladas plumas como arma arrojadiza\ny la fuerza de sus patas le permite asestar\npoderosas patadas que es mejor no subestimar."
          ultra_moon: "Se siente a gusto en lugares angostos y oscuros.\nEn más de una ocasión usa el bolsillo o la\nmochila de su Entrenador a modo de nido."
        ko:
          ultra_sun: "칼같이 날카로운 날개를 날려\n공격한다. 발의 힘도 강해\n킥도 무시할 수 없다."
          ultra_moon: "좁고 어두운 곳을 편안해한다.\n트레이너의 품이나 가방을\n둥지로 삼을 때도 있다."
        zh_simp:
          ultra_sun: "射出像刀刃般锐利的羽毛进行攻击。\n脚上的力量也很强，\n脚踢也不可小觑。"
          ultra_moon: "在狭窄黑暗的地方会很平静。\n有时候也会用训练家的怀抱\n或包包代替巢穴。"
        zh_trad:
          ultra_sun: "能射出刀刃般鋒利的羽毛\n進行攻擊。雙腳的力量也很強，\n腳踢的威力同樣不能小看。"
          ultra_moon: "在狹窄陰暗的地方才會感到安穩。\n有時也會用訓練家的懷抱\n或是包包代替巢穴。"
dartrix:
