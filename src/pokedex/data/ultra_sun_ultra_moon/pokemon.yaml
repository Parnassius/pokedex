      descriptions:
        jp_kana:
          ultra_sun: "おとしよりに　にんきで　せんもんしも\nあるほど。　あいこうかは　うでの\nながさや　かくどに　こだわるのだ。"
          ultra_moon: "しなやか　かつ　たくましい　うでは\nおなじポーズを　とりつづけるうちに\nきたえられた　たまもの　なのだ。"
        jp_kanji:
          ultra_sun: "お年寄りに　人気で　専門誌も\nあるほど。　愛好家は　腕の\n長さや　角度に　こだわるのだ。"
          ultra_moon: "しなやか　かつ　たくましい　腕は\n同じポーズを　とり続けるうちに\n鍛えられた　賜物　なのだ。"
        en:
          ultra_sun: "It’s so popular with the elderly that there’s a\nmagazine devoted to this Pokémon. Fans obsess\nover the particular length and angle of its arms."
          ultra_moon: "The result of its holding the same pose all the\ntime is arms that have become supple\nyet strong."
        fr:
          ultra_sun: "Il fait l’objet de revues spécialisées tant il est\npopulaire auprès des personnes âgées. Ses fans\naiment surtout la longueur et l’angle de ses bras."
          ultra_moon: "La souplesse et la robustesse de ses bras sont\nle fruit d’un entraînement long et rigoureux\nqui consiste en une immobilité prolongée."
        it:
          ultra_sun: "Gli anziani lo adorano e ci sono riviste dedicate\na lui. Gli appassionati danno molta importanza\nalla lunghezza e all’angolatura delle sue braccia."
          ultra_moon: "Mantiene la stessa posizione tutto il giorno\ne per questo le sue braccia sono diventate\nrobuste e flessibili."
        de:
          ultra_sun: "Es ist sehr beliebt bei Senioren und hat sogar\nseine eigene Fachzeitschrift. Auf Länge und\nWinkel seiner Arme legen Fans besonderen Wert."
          ultra_moon: "Mogelbaum verharrt lange in derselben Pose,\nwodurch seine Arme äußerst gelenkig und\nkräftig geworden sind."
        es:
          ultra_sun: "Aparece en algunas revistas especializadas\npopulares entre la gente mayor. Sus fans adoran\nlo largo y anguloso de sus extremidades."
          ultra_moon: "A fuerza de mantener la misma postura, sus\nextremidades se han vuelto flexibles y robustas."
        ko:
          ultra_sun: "노인에게 인기로 전문지가\n있을 정도다. 애호가는 팔의\n길이와 각도에 신경 쓴다."
          ultra_moon: "유연하면서도 강인한 팔은\n같은 포즈를 계속해서 취하는 동안\n단련된 덕분에 얻을 수 있었다."
        zh_simp:
          ultra_sun: "很受老年人喜爱，甚至还有关于\n它的专门杂志。它的爱好者\n很讲究它手臂的长度和角度。"
          ultra_moon: "它之所以会有柔软又结实的手臂，\n是因为在长期摆出同样\n姿势的过程中得到了锻炼。"
        zh_trad:
          ultra_sun: "很受老人家喜愛，甚至有\n關於牠的專門雜誌。愛好者\n特別講究牠的手臂長度和角度。"
          ultra_moon: "牠那柔韌又強壯的手臂，\n是因為長期擺著同樣姿勢\n而獲得的鍛鍊成果。"
