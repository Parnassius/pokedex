      descriptions:
        jp_kana:
          ultra_sun: "ふだんは　あさせの　かいていに　すみ\nしおが　ひくと　そのまま　りくに\nあがって　えものを　さがしていた。"
          ultra_moon: "こだいのうみの　にくしょくポケモン。\n８つのしょくしゅで　えものを　とらえ\nしょうかえきで　とかしながら　くう。"
        jp_kanji:
          ultra_sun: "普段は　浅瀬の　海底に　棲み\n潮が　引くと　そのまま　陸に\nあがって　獲物を　探していた。"
          ultra_moon: "古代の海の　肉食ポケモン。\n８つの触手で　獲物を　捕らえ\n消化液で　溶かしながら　食う。"
        en:
          ultra_sun: "Normally, it lived on shallow sea shoals. When\nthe tide went out, this Pokémon came up on\nland to search for prey."
          ultra_moon: "This carnivorous Pokémon lived in primordial\nseas. It catches prey in its eight tentacles and\ndissolves them with digestive fluid as it eats."
        fr:
          ultra_sun: "Il habitait généralement dans les hauts-fonds,\nmais parcourait le littoral en quête de proies\nlorsque la marée était basse."
          ultra_moon: "Ce carnivore des mers antiques attrape sa proie\nà l’aide de ses huit tentacules, puis la dissout\navec ses sucs digestifs."
        it:
          ultra_sun: "Questo Pokémon viveva sui fondali di acque\npoco profonde e con la bassa marea andava in\ncerca di prede sulla riva."
          ultra_moon: "Questo antico Pokémon carnivoro afferra\nla preda con gli otto tentacoli, poi la scioglie\nusando un acido e cibandosene man mano."
        de:
          ultra_sun: "Es lebte für gewöhnlich an seichten Stellen im\nMeer. Bei Ebbe kam es an Land, um nach Beute\nzu suchen."
          ultra_moon: "Ein fleischfressendes Pokémon aus dem Urmeer.\nMit seinen acht Tentakeln fing es Beute und\nlöste sie in Verdauungssaft auf, bevor es sie aß."
        es:
          ultra_sun: "Por lo general habitaba en las profundidades\ndel mar y salía a tierra firme en busca de presas\ncuando bajaba la marea."
          ultra_moon: "Pokémon carnívoro de mares ancestrales. Con\nlos ocho tentáculos atrapa a su presa y la come\na medida que sus jugos gástricos la disuelven."
        ko:
          ultra_sun: "평소에는 얕은 여울 바다 밑에 살고\n물이 빠지면 그대로 지상으로\n올라가 먹이를 찾았다."
          ultra_moon: "고대 바다의 육식 포켓몬.\n8개의 촉수로 먹이를 잡아서\n소화액으로 녹여 가며 먹는다."
        zh_simp:
          ultra_sun: "平常栖息在海的浅滩底部，\n退潮的时候就爬到陆地上，\n四处寻找猎物。"
          ultra_moon: "古代海里的食肉宝可梦。\n能用８根触手捕捉猎物，\n一边用消化液溶化一边吃。"
        zh_trad:
          ultra_sun: "平時棲息在海中淺灘的底部，\n每當退潮時就會爬到陸地上，\n四處尋找獵物。"
          ultra_moon: "古代海裡的肉食性寶可夢。\n會用８根觸手捉住獵物，\n一邊用消化液溶解一邊進食。"
