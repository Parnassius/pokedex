      descriptions:
        jp_kana:
          ultra_sun: "メリープの　けで　つくった　いふくは\nせいでんきが　たまりやすい　ので\nとくしゅな　かこうが　されている。"
          ultra_moon: "わたげが　こすれ　でんきが　たまる。\nかわいいからと　すでで　さわると\nバチッと　しびれて　いたいのだ。"
        jp_kanji:
          ultra_sun: "メリープの　毛で　作った　衣服は\n静電気が　たまりやすい　ので\n特殊な　加工が　されている。"
          ultra_moon: "綿毛が　こすれ　電気が　たまる。\nかわいいからと　素手で　触ると\nバチッと　痺れて　痛いのだ。"
        en:
          ultra_sun: "Clothing made from Mareep’s fleece is easily\ncharged with static electricity, so a special\nprocess is used on it."
          ultra_moon: "Rubbing its fleece generates electricity.\nYou’ll want to pet it because it’s cute, but if you\nuse your bare hand, you’ll get a painful shock."
        fr:
          ultra_sun: "En raison de leur tendance à stocker l’électricité\nstatique, les vêtements en laine de Wattouat\nsubissent un traitement spécial."
          ultra_moon: "Il a beau être mignon, sa laine génère de\nl’électricité quand on la frotte. Tentez de le\ncaresser, et il vous mettra vite au courant !"
        it:
          ultra_sun: "Gli indumenti fatti con lana di Mareep si caricano\nmolto facilmente di elettricità statica e per\nquesto necessitano di un trattamento speciale."
          ultra_moon: "La lana di Mareep genera elettricità se sfregata.\nChi lo tocca a mani nude, tentato dal suo\naspetto adorabile, riceve una dolorosa scossa."
        de:
          ultra_sun: "Kleidung aus Voltilamms Wolle erfordert eine\nspezielle Verarbeitung, da sie ansonsten zu\nelektrostatischer Aufladung neigt."
          ultra_moon: "Seine Wolle lädt sich durch Reibung elektrisch\nauf. Streichelt man dieses süße Pokémon mit\nbloßer Hand, bekommt man einen Elektroschock."
        es:
          ultra_sun: "Las prendas elaboradas con la lana de Mareep\nse cargan fácilmente de electricidad estática y\nrequieren de tratamientos especiales."
          ultra_moon: "Su lana acumula electricidad estática con la\nfricción. Al ser tan adorable, la gente se acerca\npara acariciarlo y se lleva un doloroso chispazo."
        ko:
          ultra_sun: "메리프의 털로 만든 의복은\n정전기가 잘 일어나기 때문에\n특수한 가공이 되어 있다."
          ultra_moon: "솜털이 마찰하여 전기가 모인다.\n귀엽다고 맨손으로 만지면\n따끔하게 저리고 아프다."
        zh_simp:
          ultra_sun: "用咩利羊的毛制成的\n衣服容易起静电，\n所以会做特殊加工。"
          ultra_moon: "绒毛摩擦产生的电力会被储存起来。\n如果觉得可爱而直接用手碰它的话，\n就会被啪地一下电得又麻又痛。"
        zh_trad:
          ultra_sun: "用咩利羊的毛製成的\n衣服很容易起靜電，\n所以會經過特殊加工。"
          ultra_moon: "會累積絨毛摩擦時所產生的電力。\n如果因為牠可愛而直接用手去摸，\n就會被電得又麻又痛。"
