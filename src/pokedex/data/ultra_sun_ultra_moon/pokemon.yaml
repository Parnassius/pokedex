floette:
  species_id: 670
  names:
    jp_kana: フラエッテ
    jp_kanji: フラエッテ
    en: Floette
    fr: Floette
    it: Floette
    de: Floette
    es: Floette
    ko: 플라엣테
    zh_simp: 花叶蒂
    zh_trad: 花葉蒂
  forms:
    floette_red_flower:
      form_id: 0
      names:
        jp_kana: あかいはな
        jp_kanji: あかいはな
        en: Red Flower
        fr: Fleur Rouge
        it: Fiore Rosso
        de: Rotblütler
        es: Flor Roja
        ko: 빨간 꽃
        zh_simp: 红花
        zh_trad: 紅花
      base_stats:
        hp: 54
        attack: 45
        defense: 47
        special_attack: 75
        special_defense: 98
        speed: 52
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          ultra_sun: "はなを　そだて　じぶんの　ぶきとして\nりよう。　うつくしくさいた　はなほど\nきょうりょくなパワーを　ひめている。"
          ultra_moon: "じぶんの　パワーを　はなに　あたえ\nこころを　こめて　せわを　する。\nかだんを　あらすものは　ゆるさない。"
        jp_kanji:
          ultra_sun: "花を　育て　自分の　武器として\n利用。　美しく咲いた　花ほど\n強力なパワーを　秘めている。"
          ultra_moon: "自分の　パワーを　花に　与え\n心を　こめて　世話を　する。\n花壇を　荒らすものは　許さない。"
        en:
          ultra_sun: "It raises flowers and uses them as weapons.\nThe more gorgeous the blossom, the more\npower it contains."
          ultra_moon: "It gives its own power to flowers, pouring its\nheart into caring for them. Floette never forgives\nanyone who messes up a flower bed."
        fr:
          ultra_sun: "Il cultive des fleurs et les utilise en tant\nqu’armes. Plus une fleur est belle, plus\nelle renferme de puissance."
          ultra_moon: "Il fait profiter ses fleurs de ses pouvoirs et met\ntout son cœur à leur entretien. Gare à ceux qui\nravagent ses plates-bandes !"
        it:
          ultra_sun: "Fa crescere il suo fiore e lo utilizza come arma.\nPiù il fiore è bello, maggiore è il potere che\nracchiude."
          ultra_moon: "Trasmette il suo potere ai fiori e se ne prende\ncura con tutto il suo amore. Non ha alcuna pietà\nper chi deturpa le sue aiuole."
        de:
          ultra_sun: "Es kämpft mit einer Blume, die es selbst\ngezüchtet hat. Je schöner ihre Blüte, desto\nstärker die Macht, die sie birgt."
          ultra_moon: "Es überträgt seine Kraft auf Blumen und pflegt\ndiese mit ganzem Herzen. Es verzeiht keinem,\nder sein Blumenbeet verwüstet."
        es:
          ultra_sun: "Usa como arma la flor que cultiva por su cuenta\ny, cuanto mayor sea la belleza de esta, mayor\nserá también el poder que oculta en su interior."
          ultra_moon: "Confiere su poder a las flores y cuida de ellas\ncon mucho esmero; no perdona que destruyan\nlos campos donde estas crecen."
        ko:
          ultra_sun: "꽃을 길러 자신의 무기로\n이용한다. 아름답게 핀 꽃일수록\n강력한 파워를 간직하고 있다."
          ultra_moon: "자신의 파워를 꽃에 주고\n진심을 담아 돌본다.\n화단을 어지럽히는 자는 용서하지 않는다."
        zh_simp:
          ultra_sun: "会培育花朵当作自己的武器来用。\n越是开得美丽的花，\n蕴藏着的力量就越强大。"
          ultra_moon: "把自己的力量给花，用心地照料。\n绝不原谅那些破坏花坛者。"
        zh_trad:
          ultra_sun: "會培育花朵來當成自己的武器。\n開得越美麗的花朵，\n所蘊藏的力量就越強大。"
          ultra_moon: "會把自己的力量分給花，\n用心地加以照料。\n絕不會原諒破壞花壇的傢伙。"
