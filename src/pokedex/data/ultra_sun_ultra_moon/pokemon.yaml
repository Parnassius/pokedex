      types:
        - dragon
      egg_groups:
        - dragon
        - monster
      abilities:
        - rough_skin
        - sheer_force
      hidden_ability: mold_breaker
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          ultra_sun: "あかい　かおの　ひふは　いわよりも\nかたい。　せまい　どうくつの　なかで\nてきに　むかって　かおから　とつげき。"
          ultra_moon: "ディグダや　ダグトリオが　ほった\nトンネルに　しんにゅう。　えものが\nとおるのを　しずかに　まっている。"
        jp_kanji:
          ultra_sun: "赤い　顔の　皮膚は　岩よりも\n硬い。　狭い　洞窟の　中で\n敵に　向かって　顔から　突撃。"
          ultra_moon: "ディグダや　ダグトリオが　掘った\nトンネルに　侵入。　獲物が\n通るのを　静かに　待っている。"
        en:
          ultra_sun: "The red skin on its face is harder than rock.\nIn narrow caves, it squares off against its\nenemies and charges face-first right into them."
          ultra_moon: "It infiltrates tunnels that Pokémon like Diglett\nand Dugtrio have dug and quietly waits for prey\nto pass through."
        fr:
          ultra_sun: "La peau rouge de sa gueule est dure comme\nle roc. Il accule ses ennemis dans les boyaux\ndes cavernes et les attaque à coups de tête."
          ultra_moon: "Il se faufile dans les tunnels creusés par les\nTaupiqueur et les Triopikeur. Il attend ensuite\ntranquillement qu’une proie passe à sa portée."
        it:
          ultra_sun: "La pelle rossa del muso è più dura della pietra.\nAffronta i nemici in grotte anguste lanciandosi\ncontro di loro e colpendoli a testate."
          ultra_moon: "Si intrufola nei tunnel scavati dai Diglett e dai\nDugtrio aspettando in silenzio l’arrivo di una\npreda."
        de:
          ultra_sun: "Seine rote Kopfhaut ist fester als Stein. Es jagt\nseine Gegner durch enge Höhlengänge und\nstürmt mit dem Kopf voran auf sie zu."
          ultra_moon: "Es dringt in Schächte ein, die von Digda oder\nDigdri gegraben wurden. Dort wartet es still\nund geduldig auf seine Beute."
        es:
          ultra_sun: "La piel roja de su cara es más dura que una\nroca. La usa para atacar a sus enemigos cuando\nlos acorrala en cuevas angostas."
          ultra_moon: "Aprovecha los túneles excavados por los Diglett\ny Dugtrio para esperar tranquilamente en su\ninterior a que alguna presa pase cerca."
        ko:
          ultra_sun: "빨간 얼굴의 피부는 바위보다\n딱딱하다. 좁은 동굴 안에서\n적을 향해 얼굴로 돌격한다."
          ultra_moon: "디그다나 닥트리오가 판 터널에\n침입한다. 먹이가 지나가기를\n조용히 기다리고 있다."
        zh_simp:
          ultra_sun: "红色脸孔上的皮肤比岩石还要硬。\n在狭窄的洞窟中，\n会用脸朝向敌人发动突击。"
          ultra_moon: "会入侵地鼠或三地鼠挖掘的隧道。\n静静地等待着猎物的经过。"
        zh_trad:
          ultra_sun: "臉上的紅色皮膚比岩石\n還要堅硬。在狹窄的洞窟中，\n會用臉朝著敵人發動突襲。"
          ultra_moon: "會入侵地鼠或三地鼠\n挖掘的隧道，靜靜地\n等待著獵物經過。"
