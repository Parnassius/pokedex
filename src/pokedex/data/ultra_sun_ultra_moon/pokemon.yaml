        jp_kana:
          ultra_sun: "うまくなりたくて　ずっと　うたの\nれんしゅうを　している。　ねてるときも\nゆめの　なかで　うたっているよ。"
          ultra_moon: "ほうっておくと　ずーっと　うたの\nれんしゅうを　つづける。　のどを\nいためないように　やすませてあげて。"
        jp_kanji:
          ultra_sun: "上手くなりたくて　ずっと　歌の\n練習を　している。　寝ているときも\n夢の　中で　歌っているよ。"
          ultra_moon: "放っておくと　ずーっと　歌の\n練習を　続ける。　喉を\n痛めないように　休ませてあげて。"
        en:
          ultra_sun: "It’s always practicing its singing because it\nwants to improve. Even when it’s asleep,\nit keeps singing in its dreams!"
          ultra_moon: "Left to its own devices, it will constantly\npractice singing. You should make it take a\nbreak so it doesn’t hurt its throat."
        fr:
          ultra_sun: "Il s’entraîne dur pour maîtriser le chant.\nMême quand il dort, il continue de faire\ndes gammes dans ses rêves."
          ultra_moon: "Si on le laissait faire, il passerait son temps\nà chanter. Il vaut donc mieux l’en empêcher\npour préserver sa petite gorge."
        it:
          ultra_sun: "Si allena continuamente nel canto per migliorare.\nAnche mentre dorme, continua a cantare\nin sogno."
          ultra_moon: "Se lasciato fare, si allena nel canto senza sosta.\nOgni tanto è meglio fargli fare una pausa per\nevitare che si faccia male alla gola."
        de:
          ultra_sun: "Um seine Gesangskünste zu verbessern, übt es\npausenlos. Selbst wenn es schon schläft, singt\nes in seinen Träumen weiter."
          ultra_moon: "Wenn man es lässt, widmet es sich unentwegt\ndem Gesang. Zur Schonung der Stimmbänder\nwerden gezielte Pausen empfohlen."
        es:
          ultra_sun: "Practica constantemente para mejorar su canto,\nllegando incluso a cantar en sueños."
          ultra_moon: "Si le dejan, se pasa el día entero practicando su\ncanto, así que conviene animarlo a descansar de\nvez en cuando para que no se destroce la voz."
        ko:
          ultra_sun: "노래를 잘하고 싶어서\n계속 연습을 한다. 잘 때도\n꿈속에서 노래를 부른다."
          ultra_moon: "내버려 두면 계속해서\n노래 연습을 반복한다.\n목이 상하지 않도록 쉬게 해주자."
        zh_simp:
          ultra_sun: "为了能动听地歌唱，它会一直练习唱歌。\n就算是睡着了，也会在梦中不停地歌唱哦。"
          ultra_moon: "如果不去管它，它就会一直练习唱歌。\n所以还是让它休息会，别伤到了嗓子。"
        zh_trad:
          ultra_sun: "為了讓歌喉變好，\n牠一直努力練習唱歌，\n就連在睡夢中也不斷歌唱。"
          ultra_moon: "放著不管的話，牠就會一直\n練習唱歌。要記得讓牠休息，\n不然是會弄壞嗓子的。"
