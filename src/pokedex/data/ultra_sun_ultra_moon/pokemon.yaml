      descriptions:
        jp_kana:
          ultra_sun: "やく２０ねんまえの　かがくりょくで\nうみだされた　ポケモンなので　いまや\nじだいおくれな　ぶぶんも　おおい。"
          ultra_moon: "２０ねんまえ　うちゅうを　ゆめみた\nかがくしゃたちに　よって　つくられた。\nいまだ　そのゆめは　かなっていない。"
        jp_kanji:
          ultra_sun: "約２０年前の　科学力で\n生み出された　ポケモンなので　今や\n時代遅れな　部分も　多い。"
          ultra_moon: "２０年前　宇宙を　夢見た\n科学者たちに　よって　作られた。\n未だ　その夢は　叶っていない。"
        en:
          ultra_sun: "This Pokémon was created using the\ncutting-edge science of 20 years ago, so\nmany parts of it have since become obsolete."
          ultra_moon: "It was built 20 years ago by scientists who\ndreamed of exploring space. Their dreams have\nyet to come true."
        fr:
          ultra_sun: "Un Pokémon artificiel créé il y a vingt ans,\net qui est donc complètement dépassé sur\nbien des points."
          ultra_moon: "Il a été conçu il y a vingt ans par des\nchercheurs qui rêvaient de conquérir l’espace.\nCe rêve n’est toujours pas devenu réalité."
        it:
          ultra_sun: "Un Pokémon creato circa 20 anni fa grazie alle\nconoscenze scientifiche dell’epoca. Molte sue\nparti sono ormai obsolete."
          ultra_moon: "Un Pokémon creato 20 anni fa da alcuni\nscienziati che sognavano di esplorare lo spazio.\nIl loro sogno non è stato ancora realizzato."
        de:
          ultra_sun: "Dieses Pokémon wurde vor etwa 20 Jahren\nkünstlich erschaffen. Ein Großteil der damals\nverwendeten Technik ist heute längst überholt."
          ultra_moon: "Es wurde vor 20 Jahren von Wissenschaftlern\nerschaffen, die vom Erforschen des Weltraums\nträumten. Ihr Traum hat sich bisher nicht erfüllt."
        es:
          ultra_sun: "Fue creado por el hombre unos 20 años atrás\ncon los medios del momento, por lo que ahora\nestá desfasado en muchos aspectos."
          ultra_moon: "Fue creado hace 20 años por un grupo de\ncientíficos que soñaba con explorar el espacio.\nDicho sueño aún no se ha cumplido."
        ko:
          ultra_sun: "약 20년 전의 과학 기술로 태어난\n포켓몬이기 때문에 지금은\n시대에 뒤떨어진 부분도 많다."
          ultra_moon: "20년 전 우주를 꿈꾸는\n과학자들에 의해 만들어졌다.\n아직 그 꿈은 이루지 못했다."
        zh_simp:
          ultra_sun: "由大约２０年前的科学力量\n创造出来的宝可梦，\n所以现在很多部分已经过时了。"
          ultra_moon: "由２０年前梦想着宇宙的\n科学家们创造而成。\n那梦想至今仍未实现。"
        zh_trad:
          ultra_sun: "由於是大約２０年前的\n科學技術創造出的寶可夢，\n如今許多部分已經過時了。"
          ultra_moon: "在２０年前被夢想著能探索\n宇宙的科學家們創造出來。\n這個夢想至今仍未實現。"
omanyte:
  species_id: 138
  names:
    jp_kana: オムナイト
    jp_kanji: オムナイト
    en: Omanyte
    fr: Amonita
    it: Omanyte
    de: Amonitas
    es: Omanyte
    ko: 암나이트
    zh_simp: 菊石兽
    zh_trad: 菊石獸
  forms:
    omanyte:
      form_id: 0
      base_stats:
        hp: 35
