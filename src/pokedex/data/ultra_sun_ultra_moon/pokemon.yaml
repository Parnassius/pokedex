spinda:
  species_id: 327
  names:
    jp_kana: パッチール
    jp_kanji: パッチール
    en: Spinda
    fr: Spinda
    it: Spinda
    de: Pandir
    es: Spinda
    ko: 얼루기
    zh_simp: 晃晃斑
    zh_trad: 晃晃斑
  forms:
    spinda:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 60
        special_defense: 60
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
        - human_like
      abilities:
        - own_tempo
        - tangled_feet
      hidden_ability: contrary
      descriptions:
        jp_kana:
          ultra_sun: "フラフラ　おぼつかない　あしどり。\nながい　あいだ　あるきつづけると\nきぶんが　わるくなってしまう。"
          ultra_moon: "１ぴきずつ　ブチもようは　ことなる。\nフラフラした　うごきで　あいての\nこうげきを　ぜつみょうに　かわすぞ。"
        jp_kanji:
          ultra_sun: "フラフラ　おぼつかない　足取り。\n長い　間　歩き続けると\n気分が　悪くなってしまう。"
          ultra_moon: "１匹ずつ　ブチ模様は　異なる。\nフラフラした　動きで　相手の\n攻撃を　絶妙に　かわすぞ。"
        en:
          ultra_sun: "Its steps are shaky and stumbling. Walking for a\nlong time makes it feel sick."
          ultra_moon: "Each Spinda’s spot pattern is different. With its\nstumbling movements, it evades opponents’\nattacks brilliantly!"
        fr:
          ultra_sun: "Il déambule d’un pas chancelant. S’il marche\ntrop longtemps, il finit par avoir le tournis."
          ultra_moon: "Chaque Spinda possède un pelage unique.\nCe Pokémon esquive les attaques de son\nadversaire grâce à d’imprévisibles oscillations."
        it:
          ultra_sun: "Si muove con passo incerto e barcollante.\nSe cammina troppo finisce per sentirsi male."
          ultra_moon: "Ogni Spinda ha un motivo maculato unico.\nGrazie ai suoi movimenti incerti, riesce a\nschivare brillantemente gli attacchi nemici."
        de:
          ultra_sun: "Es hat einen unsicheren, schwankenden Gang.\nWenn es längere Zeit läuft, wird ihm schlecht."
          ultra_moon: "Jedes Pandir hat ein anderes Fleckenmuster.\nMit seinem taumelnden Gang weicht es\ngegnerischen Angriffen souverän aus."
        es:
          ultra_sun: "Se mueve tambaleándose de un lado para otro\ny termina mareado si camina durante un largo\nperíodo."
          ultra_moon: "Los dibujos en el pelaje de cada Spinda son\ndiferentes. Esquiva de forma asombrosa los\nataques de los rivales gracias a sus tambaleos."
        ko:
          ultra_sun: "걸음걸이가 비틀비틀 불안하다.\n긴 시간 계속 걸으면\n기분이 나빠진다."
          ultra_moon: "개체마다 얼룩무늬가 다르다.\n비틀거리는 움직임으로\n상대의 공격을 절묘하게 피한다."
        zh_simp:
          ultra_sun: "晃晃悠悠，步伐不稳健。\n如果长时间连续行走，\n就会变得状态很差。"
          ultra_moon: "每一只身上的斑点花纹都不同。\n会用晃晃悠悠的动作\n绝妙地躲避对手的攻击。"
        zh_trad:
          ultra_sun: "總是搖搖晃晃，連走都走不穩。\n如果連續走了太長的時間，\n身體就會不舒服。"
          ultra_moon: "每一隻身上的斑點都不一樣。\n會用搖搖晃晃的動作\n巧妙地避開對手的攻擊。"
trapinch:
  species_id: 328
  names:
    jp_kana: ナックラー
    jp_kanji: ナックラー
    en: Trapinch
    fr: Kraknoix
    it: Trapinch
    de: Knacklion
    es: Trapinch
    ko: 톱치
    zh_simp: 大颚蚁
    zh_trad: 大顎蟻
  forms:
    trapinch:
      form_id: 0
      base_stats:
        hp: 45
        attack: 100
        defense: 45
        special_attack: 45
        special_defense: 45
        speed: 10
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
      egg_groups:
        - bug
      abilities:
        - hyper_cutter
        - arena_trap
      hidden_ability: sheer_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          ultra_sun: "アゴは　いわも　くだくが　おもくて\nひっくり　かえると　おきられない。\nメグロコは　そのすきを　ねらうのだ。"
          ultra_moon: "わなを　かねた　すを　つくり\nひたすら　えものを　まちかまえる。\nよるになると　すなに　もぐり　ねる。"
        jp_kanji:
          ultra_sun: "アゴは　岩も　砕くが　重くて\nひっくり　返ると　起きられない。\nメグロコは　その隙を　狙うのだ。"
          ultra_moon: "罠を　兼ねた　巣を　作り\nひたすら　獲物を　待ちかまえる。\n夜になると　砂に　潜り　寝る。"
        en:
          ultra_sun: "Its jaws are strong enough to crush rocks but\nso heavy that it can’t get up if it flips over.\nSandile seize those moments as their chance."
          ultra_moon: "It builds nests that double as traps, lying in\nwait for its prey to get caught. When night falls,\nit digs itself a spot beneath the sand to sleep."
        fr:
          ultra_sun: "Sa lourde mâchoire peut briser le roc, mais s’il\ntombe à la renverse, il ne peut plus se relever.\nMascaïman en profite alors pour l’attaquer."
          ultra_moon: "Pour attraper ses proies, il bâtit un nid piégé\net attend patiemment. Lorsque la nuit tombe,\nil s’enfouit dans le sable pour dormir."
        it:
          ultra_sun: "Con le pesanti mascelle spacca anche le pietre.\nTuttavia, se cade all’indietro non può rialzarsi\ne Sandile ne approfitta per attaccarlo."
          ultra_moon: "Costruisce una tana che fa anche da trappola e\nattende pazientemente le prede. La notte dorme\nsotto la sabbia."
        de:
          ultra_sun: "Sein Kiefer kann sogar Felsen zermalmen, ist\naber so schwer, dass es sich nicht aufrichten\nkann, wenn es hinfällt. Das nutzen Ganovil aus."
          ultra_moon: "Sein Bau dient gleichzeitig als Falle, in der es\nBeute auflauert. Nachts gräbt es sich zum\nSchlafen im Sand ein."
        es:
          ultra_sun: "Puede triturar rocas con su mandíbula, pero su\npeso le impide darse la vuelta si lo tumban. Los\nSandile sacan provecho de este punto débil."
          ultra_moon: "Construye un nido, que también sirve de trampa,\ny espera pacientemente a su presa. Durante la\nnoche duerme enterrado en la arena."
        ko:
          ultra_sun: "턱은 바위도 부수지만 무거워서\n뒤집히면 일어나지 못한다.\n깜눈크는 그 틈을 노린다."
          ultra_moon: "함정을 겸하는 둥지를 만들고\n한결같이 먹이를 기다리고 있다.\n밤이 되면 모래 속에 숨어서 잔다."
        zh_simp:
          ultra_sun: "颚部连岩石也能弄碎，但很重，\n如果翻身了，就会爬不起来。\n黑眼鳄会趁这个空当袭击它。"
          ultra_moon: "制造兼有陷阱功能的巢穴，\n一心一意埋伏着等待猎物。\n到了晚上就潜回沙中睡觉。"
        zh_trad:
          ultra_sun: "重量十足的下顎足以粉碎岩石，\n一旦身子翻過去就爬不起來，\n黑眼鱷會趁這個空檔襲擊牠。"
          ultra_moon: "會製造兼有陷阱功能的巢穴，\n不斷埋伏著等待獵物上門。\n到了夜晚就會潛進沙中睡覺。"
vibrava:
  species_id: 329
  names:
    jp_kana: ビブラーバ
    jp_kanji: ビブラーバ
    en: Vibrava
    fr: Vibraninf
    it: Vibrava
    de: Vibrava
    es: Vibrava
    ko: 비브라바
    zh_simp: 超音波幼虫
    zh_trad: 超音波幼蟲
  forms:
