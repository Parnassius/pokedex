espeon:
  species_id: 196
  names:
    jp_kana: エーフィ
    jp_kanji: エーフィ
    en: Espeon
    fr: Mentali
    it: Espeon
    de: Psiana
    es: Espeon
    ko: 에브이
    zh_simp: 太阳伊布
    zh_trad: 太陽伊布
  forms:
    espeon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 95
        speed: 110
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - field
      abilities:
        - synchronize
      hidden_ability: magic_bounce
      descriptions:
        jp_kana:
          ultra_sun: "もともとは　なんの　のうりょくも\nなかったが　みを　まもるために\nよちのうりょくに　めざめたと　いう。"
          ultra_moon: "にっこうを　あびていると　ひたいの\nたまに　サイコパワーが　たまっていく。\nよるの　たたかいは　にがて　なのだ。"
        jp_kanji:
          ultra_sun: "元々は　なんの　能力も\nなかったが　身を　守るために\n予知能力に　目覚めたと　いう。"
          ultra_moon: "日光を　浴びていると　額の\n玉に　サイコパワーが　たまっていく。\n夜の　戦いは　苦手　なのだ。"
        en:
          ultra_sun: "Although it originally had no powers at all,\npeople say its precognitive faculties were\nawakened by its need to protect itself."
          ultra_moon: "Psychic power builds up in the orb on its\nforehead as it bathes in the sunshine. Espeon is\nnot good at battling at night."
        fr:
          ultra_sun: "À l’origine, il n’était doté d’aucune compétence\nparticulière, mais il a développé un don de\nprescience pour se défendre."
          ultra_moon: "Le joyau sur son front accumulant de la force\npsychique lorsqu’il est exposé à la lumière\ndu soleil, il préfère les combats de jour."
        it:
          ultra_sun: "Inizialmente non aveva particolari abilità,\nma in seguito ha sviluppato delle capacità\npremonitrici per difendersi."
          ultra_moon: "Accumula poteri psichici esponendo alla luce\nsolare la sfera che ha sulla fronte.\nLe lotte notturne non sono il suo forte."
        de:
          ultra_sun: "Es heißt, dass die Fähigkeit der Prophezeiung\nerst im Laufe der Zeit in ihm erwacht sei, damit\nes sich selbst vor Unheil bewahren könne."
          ultra_moon: "Indem es im Sonnenlicht badet, speichert es\nPsycho-Kraft in der Kugel an seiner Stirn. Daher\ntut es sich nachts beim Kämpfen etwas schwer."
        es:
          ultra_sun: "Originariamente, carecía de habilidades\nespeciales, pero terminó desarrollando\nfacultades premonitorias para protegerse."
          ultra_moon: "La luz del sol imbuye de poder psíquico la\nesfera de su frente, por lo que los combates\nnocturnos son su punto débil."
        ko:
          ultra_sun: "원래는 아무런 능력도 없었지만\n몸을 지키기 위해\n예지 능력에 눈뜨게 됐다고 한다."
          ultra_moon: "햇빛을 받으면 이마의 구슬에\n사이코 파워가 모인다.\n밤에 하는 싸움에 약하다."
        zh_simp:
          ultra_sun: "本来没有任何能力，\n但据说为了保护自己\n从而觉醒了预知能力。"
          ultra_moon: "如果沐浴在阳光下，额头上的\n珠子就会开始储存精神力量。\n不擅长夜间战斗。"
        zh_trad:
          ultra_sun: "據說本來沒有任何能力，\n是為了要保護自己，\n預知的能力才因此覺醒。"
          ultra_moon: "只要沐浴在陽光下，額頭上的\n珠子裡就會開始累積精神力量。\n不擅長在夜間戰鬥。"
umbreon:
  species_id: 197
  names:
    jp_kana: ブラッキー
    jp_kanji: ブラッキー
    en: Umbreon
    fr: Noctali
    it: Umbreon
    de: Nachtara
    es: Umbreon
    ko: 블래키
    zh_simp: 月亮伊布
    zh_trad: 月亮伊布
  forms:
    umbreon:
      form_id: 0
      base_stats:
        hp: 95
        attack: 65
        defense: 110
        special_attack: 60
        special_defense: 130
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - synchronize
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          ultra_sun: "やこうせいの　ポケモン。　おおきな\nひとみは　まっくらやみでも　えものの\nすがたを　ハッキリと　とらえるぞ。"
          ultra_moon: "やみよに　ひそみ　えものを　ねらう。\nおそいかかる　しゅんかん　からだの\nわっかが　にぶく　あやしく　ひかる。"
        jp_kanji:
          ultra_sun: "夜行性の　ポケモン。　大きな\n瞳は　真っ暗闇でも　獲物の\n姿を　ハッキリと　とらえるぞ。"
          ultra_moon: "闇夜に　潜み　獲物を　狙う。\n襲いかかる　瞬間　身体の\n輪っかが　鈍く　あやしく　光る。"
        en:
          ultra_sun: "This Pokémon is nocturnal. Even in total\ndarkness, its large eyes can spot its\nprey clearly!"
          ultra_moon: "It lurks in the dark of night looking for prey.\nAt the moment it pounces, the rings on its\nbody glow dimly but ominously."
        fr:
          ultra_sun: "Les larges pupilles de ce Pokémon nocturne\nlui permettent de distinguer parfaitement ses\nproies même dans l’obscurité la plus profonde."
          ultra_moon: "Il se cache dans la pénombre pour chasser.\nLes anneaux sur son corps brillent d’une aura\nlugubre quand il passe à l’attaque."
        it:
          ultra_sun: "È un Pokémon notturno. Le sue grandi pupille\ngli permettono di vedere chiaramente le prede\nanche nell’oscurità più profonda."
          ultra_moon: "Resta nascosto nell’oscurità in attesa della\npreda. Nell’istante in cui attacca, i cerchi che ha\nsul corpo brillano di una fioca luce misteriosa."
        de:
          ultra_sun: "Die Pupillen dieses nachtaktiven Pokémon sind\ngroß genug, um auch in der schwärzesten Nacht\nnoch seine Beute deutlich erkennen zu können."
          ultra_moon: "Es lauert seiner Beute im Schutz der Dunkelheit\nauf. Greift es an, erzeugen die Ringe an seinem\nKörper ein schwaches, ominöses Leuchten."
        es:
          ultra_sun: "Un Pokémon de hábitos nocturnos. Sus grandes\npupilas le permiten distinguir con total claridad\na sus presas en la más densa oscuridad."
          ultra_moon: "Acecha a sus presas al amparo de la oscuridad.\nSus círculos emiten un brillo ominoso cuando se\ndispone a saltar al ataque."
        ko:
          ultra_sun: "야행성 포켓몬. 큰 눈동자는\n칠흑 같은 어둠에서도 먹이의\n모습을 정확하게 찾아낸다."
          ultra_moon: "어둠 속에 숨어 먹이를 노린다.\n습격하는 순간 몸의 둥근 무늬가\n희미하고 이상하게 빛난다."
        zh_simp:
          ultra_sun: "夜行性宝可梦。\n大大的瞳孔即便在一片漆黑中\n也能看清猎物的样子。"
          ultra_moon: "会潜伏在暗处袭击猎物。\n在发动袭击的瞬间，它身上的\n圈圈会发出黯淡的诡异之光。"
        zh_trad:
          ultra_sun: "夜行性寶可夢。\n大大的眼睛即使在一片漆黑中\n也能看清獵物的樣子。"
          ultra_moon: "會潛伏在黑暗裡準備襲擊獵物。\n在發動襲擊的瞬間，牠身上的\n圈圈會發出黯淡的詭異亮光。"
murkrow:
  species_id: 198
  names:
    jp_kana: ヤミカラス
    jp_kanji: ヤミカラス
    en: Murkrow
    fr: Cornèbre
    it: Murkrow
    de: Kramurx
    es: Murkrow
    ko: 니로우
    zh_simp: 黑暗鸦
    zh_trad: 黑暗鴉
  forms:
