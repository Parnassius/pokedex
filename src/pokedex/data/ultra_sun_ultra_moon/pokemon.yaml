      descriptions:
        jp_kana:
          ultra_sun: "こきゅうすると　どくガスが　もれる。\nにおいを　かぎつけ　ベトベトンが\nよだれを　たらして　やってくる。"
          ultra_moon: "ゲップの　ように　はきだす　ガスは\nちいさな　こが　すいこんでしまうと\nいのちに　かかわるほど　きけん。"
        jp_kanji:
          ultra_sun: "呼吸すると　毒ガスが　漏れる。\n匂いを　嗅ぎつけ　ベトベトンが\nよだれを　垂らして　やってくる。"
          ultra_moon: "ゲップの　ように　吐き出す　ガスは\n小さな　子が　吸い込んでしまうと\n命に　関わるほど　危険。"
        en:
          ultra_sun: "Poisonous gas leaks out of it when it breathes.\nMuk that catch a whiff of that stench will\ncome drooling."
          ultra_moon: "If a young Pokémon or child breathes in the\ntoxic gas that Trubbish belches out, it could be\na life-threatening situation."
        fr:
          ultra_sun: "Il laisse échapper un gaz toxique quand\nil respire. Les Grotadmorv, par l’odeur alléchés,\naccourent alors en salivant."
          ultra_moon: "Le gaz toxique qu’il laisse échapper par\nsa bouche peut s’avérer dangereux pour les\nenfants et les jeunes Pokémon qui le respirent."
        it:
          ultra_sun: "Esala gas tossici a ogni respiro.\nQuando Muk ne sente l’odore, si dirige verso\ndi lui con l’acquolina in bocca."
          ultra_moon: "Il gas tossico che gli sfugge dalla bocca può\nessere pericolosissimo se inalato da bambini\no piccoli di Pokémon."
        de:
          ultra_sun: "Mit jedem Atemzug entweicht ihm giftiges Gas.\nBekommt ein Sleimok davon Wind, nimmt es\ngierig sabbernd die Fährte auf und verfolgt es."
          ultra_moon: "Atmen kleine Kinder oder Pokémon das Gas ein,\ndas es rülpsend ausstößt, ist nicht nur ihr\nGeruchssinn in Gefahr, sondern sogar ihr Leben."
        es:
          ultra_sun: "Expulsa gases nocivos al respirar. Cuando Muk\nse percata del olor, acude salivando."
          ultra_moon: "Los gases que exhala a modo de eructos\npueden poner en peligro la vida de niños y crías\nPokémon que los inhalen de forma accidental."
        ko:
          ultra_sun: "숨을 쉬면 독가스가 새어 나온다.\n냄새를 맡고 질뻐기가\n침을 흘리며 찾아온다."
          ultra_moon: "트림처럼 내뱉는 가스는\n어린아이가 들이마시면\n치명적일 정도로 위험하다."
        zh_simp:
          ultra_sun: "呼吸的时候会有毒瓦斯漏出。\n臭臭泥闻到气味就会流着口水赶过来。"
          ultra_moon: "像打嗝一样吐出的瓦斯，\n一旦被小孩子吸入，\n就会有性命攸关的危险。"
        zh_trad:
          ultra_sun: "呼吸時會有毒氣漏出，\n聞到這個味道的臭臭泥會\n流著口水跑過來。"
          ultra_moon: "像打嗝一樣吐出的氣體\n一旦被小孩子吸進去，\n就會造成生命危險。"
