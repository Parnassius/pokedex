        speed: 95
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - rks_system
      descriptions:
        jp_kana:
          ultra_sun: "かくせいし　しんかした　すがた。\nおもい　マスクから　ときはなたれ\nスピードが　おおはばに　アップ。"
          ultra_moon: "せいぎょマスクを　はかい　できたのは\nパートナーとの　きずなに　よって\nつよい　せいしんりょくを　えたからだ。"
        jp_kanji:
          ultra_sun: "覚醒し　進化した　姿。\n重い　マスクから　解き放たれ\nスピードが　大幅に　アップ。"
          ultra_moon: "制御マスクを　破壊　できたのは\nパートナーとの　絆に　よって\n強い　精神力を　得たからだ。"
        en:
          ultra_sun: "This is its form once it has awakened and\nevolved. Freed from its heavy mask, its speed is\ngreatly increased."
          ultra_moon: "Through the bond it formed with its Trainer, its\nwill was strengthened, and it was able to\ndestroy its control mask."
        fr:
          ultra_sun: "Il a réveillé tout son potentiel et a évolué.\nBriser son lourd masque a décuplé sa vitesse."
          ultra_moon: "Il a réussi à briser son masque grâce à la force\nmentale qu’il a acquise en établissant un lien\npuissant avec son Dresseur."
        it:
          ultra_sun: "Ha risvegliato il suo potere nascosto e si è\nevoluto. Svincolato dalla pesante maschera,\nla sua velocità è notevolmente aumentata."
          ultra_moon: "Il legame di fiducia con il proprio Allenatore\ngli ha permesso di acquistare una grande\nforza d’animo e distruggere la maschera."
        de:
          ultra_sun: "Nun, da es erwacht ist und im Verlauf der\nEntwicklung seine schwere Maske verlor, hat es\ndeutlich an Geschwindigkeit hinzugewonnen."
          ultra_moon: "Es konnte seine Kontrollmaske nur zerbrechen,\nweil die besondere Bindung zu seinem Trainer\nihm die nötige Willensstärke verlieh."
        es:
          ultra_sun: "Esta es la forma que adopta tras evolucionar y\ndespertar todo su potencial. Al deshacerse de\nsu máscara, su velocidad ha aumentado mucho."
          ultra_moon: "Se ha liberado de la máscara de contención\ngracias a su fortaleza mental, fruto del\nestrecho vínculo con su Entrenador."
        ko:
          ultra_sun: "각성으로 진화한 모습이다.\n무거운 마스크에서 벗어나\n스피드가 크게 올라갔다."
          ultra_moon: "제어마스크를 파괴할 수 있었던 것은\n파트너와의 유대를 통해\n강한 정신력을 얻었기 때문이다."
        zh_simp:
          ultra_sun: "觉醒进化后的样子。\n从沉重的面罩里被解放出来，\n速度大幅提升。"
          ultra_moon: "能够破坏控制面罩，\n是因为通过与同伴的牵绊\n而获得了强大的精神力。"
        zh_trad:
          ultra_sun: "覺醒進化之後的模樣。\n從沉重的面罩中獲得解放，\n速度大幅提升。"
          ultra_moon: "之所以能破壞控制面罩，\n是因為牠透過與夥伴的羈絆，\n獲得了強大的精神力。"
    silvally_type_fighting:
      form_id: 1
      names:
        jp_kana: タイプ：ファイト
        jp_kanji: タイプ：ファイト
        en: "Type: Fighting"
        fr: "Type : Combat"
        it: Tipo Lotta
        de: Typ:Kampf
        es: "Tipo: Lucha"
        ko: 타입:파이팅
        zh_simp: 属性：战斗
        zh_trad: 屬性：戰鬥
      base_stats:
        hp: 95
        attack: 95
        defense: 95
        special_attack: 95
        special_defense: 95
        speed: 95
      evs_yield:
        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - undiscovered
      abilities:
        - rks_system
      descriptions:
        jp_kana:
          ultra_sun: "かくせいに　せいこう。　でんせつの\nポケモンの　ように　じぶんのタイプを\nへんかさせ　たたかうことが　できる。"
          ultra_moon: "ふういん　された　タイプチェンジの\nのうりょくを　かいほう。　わきあがる\nエネルギーで　ぎんいろに　かがやく。"
        jp_kanji:
          ultra_sun: "覚醒に　成功。　伝説の\nポケモンのように　自分のタイプを\n変化させ　戦うことが　できる。"
          ultra_moon: "封印　された　タイプチェンジの\n能力を　解放。　湧きあがる\nエネルギーで　銀色に　輝く。"
        en:
          ultra_sun: "Having been awakened successfully, it can\nchange its type and battle—just like a certain\nPokémon depicted in legends."
          ultra_moon: "Its capacity to change types unleashed, it\nshines silver due to the energy springing forth\nfrom within."
        fr:
          ultra_sun: "Il a réussi à réveiller tout son potentiel. Il peut\nchanger de type à volonté, comme un certain\nPokémon légendaire."
          ultra_moon: "Il a enfin libéré tout son pouvoir et peut changer\nde type à volonté. L’énergie qui afflue en lui le\nfait briller d’une lueur argentée."
        it:
          ultra_sun: "È riuscito a risvegliare il suo potere nascosto.\nPuò cambiare tipo per lottare al meglio, come un\naltro Pokémon di cui si narra nelle leggende."
          ultra_moon: "È riuscito a liberare il suo potere, grazie al quale\npuò cambiare tipo a piacimento. L’energia\nche emana lo fa brillare di una luce argentea."
        de:
          ultra_sun: "Durch sein Erwachen ist es nun in der Lage, wie\nein bestimmtes Legendäres Pokémon seinen Typ\nzu ändern."
          ultra_moon: "Seine zuvor versiegelte Fähigkeit, den Typ zu\nwechseln, wurde freigesetzt. Die Energie, die\nin ihm fließt, lässt es silbern schimmern."
        es:
          ultra_sun: "Tras despertar su verdadero potencial, puede\ncambiar de tipo a voluntad como cierto\nPokémon legendario."
          ultra_moon: "Su habilidad para cambiar de tipo ya no está\nsellada. La energía que emana le da un brillo\nplateado."
        ko:
          ultra_sun: "각성에 성공했다. 전설의\n포켓몬처럼 자신의 타입을\n변화시키며 싸울 수 있다."
          ultra_moon: "봉인되었던 타입 체인지의\n능력을 해방했다. 솟아나는\n에너지로 인해 은빛으로 빛난다."
        zh_simp:
          ultra_sun: "已成功觉醒。\n能像传说的宝可梦一样\n改变自己的属性来战斗。"
          ultra_moon: "封印着的改变属性的能力被解开了。\n涌出的能量使它闪着银色光辉。"
        zh_trad:
          ultra_sun: "已成功覺醒。\n能夠像傳說的寶可夢那樣\n改變自己的屬性來戰鬥。"
          ultra_moon: "被封印的改變屬性能力\n得到解放，湧現出的能量\n讓牠閃耀著銀色光輝。"
