        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - poison
      egg_groups:
        - bug
      abilities:
        - swarm
        - insomnia
      hidden_ability: sniper
      descriptions:
        jp_kana:
          ultra_sun: "よごと　えものを　もとめて　さまよう。\nみつけた　えものに　いとを　はき\nみうごきを　ふうじて　キバで　かじる。"
          ultra_moon: "いとを　はいて　えものを　とらえる。\nよるに　なると　すから　はなれて\nせっきょくてきに　かりを　するぞ。"
        jp_kanji:
          ultra_sun: "夜ごと　獲物を　求めて　さ迷う。\n見つけた　獲物に　糸を　吐き\n身動きを　封じて　キバで　かじる。"
          ultra_moon: "糸を　はいて　獲物を　捕らえる。\n夜に　なると　巣から　離れて\n積極的に　狩りを　するぞ。"
        en:
          ultra_sun: "Every night, it wanders around in search of\nprey, whose movements it restrains by spewing\nthreads before it bites into them with its fangs."
          ultra_moon: "It spews threads from its mouth to catch its\nprey. When night falls, it leaves its web to go\nhunt aggressively."
        fr:
          ultra_sun: "Il erre chaque nuit à la recherche d’une proie.\nQuand il en trouve une, il l’immobilise grâce à\nses fils, puis la croque avec ses mandibules."
          ultra_moon: "Il capture ses proies en projetant un fil qu’il\nsécrète. À la nuit tombée, il quitte sa toile\net part chasser activement."
        it:
          ultra_sun: "Vaga di notte in cerca di prede. Quando ne\ntrova una, usa il suo filo per immobilizzarla e poi\nla divora con le sue zanne."
          ultra_moon: "Intrappola la preda usando il filo che secerne\ndalla bocca. Quando scende la notte si allontana\ndalla tela per cacciare."
        de:
          ultra_sun: "Nachts wandert es auf der Suche nach Futter\numher. Wird es fündig, fesselt es seine Beute\nmit einem Seidenfaden und beißt zu."
          ultra_moon: "Seine Beute ergreift es mit einem Seidenfaden.\nBei Anbruch der Nacht verlässt es sein Netz\nund macht sich auf die Jagd."
        es:
          ultra_sun: "Ronda por la noche en busca de presas a las\nque inmoviliza con su hilo para luego clavarles\nlos colmillos."
          ultra_moon: "Captura a sus presas con el hilo que segrega.\nAl caer la noche, abandona su tela y sale a\ncazar activamente."
        ko:
          ultra_sun: "밤마다 먹이를 찾아 떠돈다.\n발견한 먹이에 실을 내뿜어\n움직이지 못하게 하고 이빨로 갉아먹는다."
          ultra_moon: "실을 뿜어서 먹이를 잡는다.\n밤이 되면 둥지를 떠나\n적극적으로 사냥에 나선다."
        zh_simp:
          ultra_sun: "每晚都会为了寻求猎物而四处游走。\n发现猎物时会吐丝封住对方的行动，\n然后用牙齿啃食。"
          ultra_moon: "会通过吐丝来捕捉猎物。\n到了晚上，就会离开\n巢穴并积极地狩猎。"
        zh_trad:
          ultra_sun: "每晚都為了尋求獵物而四處徘徊，\n發現獵物時會吐絲封鎖對方的行動，\n然後用牙齒啃食。"
          ultra_moon: "會吐絲來捕捉獵物。\n每到夜晚就會離開巢穴，\n積極地展開狩獵。"
crobat:
  species_id: 169
  names:
    jp_kana: クロバット
    jp_kanji: クロバット
