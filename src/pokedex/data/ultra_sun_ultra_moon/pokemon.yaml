          ultra_sun: "ふだん　うみのなかに　くらしているが\nひふが　かんそう　するまでなら\nりくちでも　かつどう　できるぞ。"
          ultra_moon: "キケンを　かんじると　むらさきいろの\nしるを　だす。　あぶらあせの　ような\nものだと　かんがえられている。"
        jp_kanji:
          ultra_sun: "普段　海の中に　暮らしているが\n皮膚が　乾燥　するまでなら\n陸地でも　活動　できるぞ。"
          ultra_moon: "危険を　感じると　紫色の\n汁を　だす。　あぶら汗の　ような\nものだと　考えられている。"
        en:
          ultra_sun: "While they normally live in the sea, they can\nfunction on land, too, until their skin dries out."
          ultra_moon: "When it senses danger, a purple liquid oozes out\nof it. The liquid is thought to be something like\ngreasy sweat."
        fr:
          ultra_sun: "Il vit normalement dans la mer, mais il peut\naussi s’installer sur la terre ferme, tant que\nsa peau reste humide."
          ultra_moon: "Il sécrète un liquide mauve lorsqu’il se sent\nen danger. Il s’agirait d’un phénomène similaire\naux sueurs froides."
        it:
          ultra_sun: "Vive solitamente in mare, ma può spostarsi\nanche sulla terraferma e restarvi finché\nla pelle non inizia a seccarsi."
          ultra_moon: "Quando avverte il pericolo, secerne un liquido\nviola. Si ritiene sia un fenomeno simile ai sudori\nfreddi causati dalla paura."
        de:
          ultra_sun: "Es lebt zwar für gewöhnlich im Meer, kann sich\naber auch an Land bewegen, bis seine Haut\naustrocknet."
          ultra_moon: "Spürt es Gefahr, stößt es eine lilafarbene\nFlüssigkeit aus. Man geht davon aus, dass es\nsich dabei um eine Art Angstschweiß handelt."
        es:
          ultra_sun: "Por lo general suele habitar en el agua, pero\ntambién puede moverse por tierra firme siempre\ny cuando su piel no se reseque por completo."
          ultra_moon: "Cuando se siente amenazado, secreta un fluido\nmorado. Según se cree, podría tratarse de un\nfenómeno similar al de los sudores fríos."
        ko:
          ultra_sun: "평소에는 바닷속에서 지내지만,\n피부가 마르기 전까지는\n육지에서도 활동할 수 있다."
          ultra_moon: "위험을 느끼면 보라색\n분비액을 내보낸다. 진땀 같은\n것이라고 여겨지고 있다."
        zh_simp:
          ultra_sun: "平常在海里生活，\n但只要皮肤没有干燥，\n也可以在陆地活动。"
          ultra_moon: "如果感到危险，就会分泌出紫色的汁。\n人们认为这是类似于虚汗的东西。"
        zh_trad:
          ultra_sun: "平常生活在海裡，\n但只要皮膚沒有乾燥，\n也可以在陸地上活動。"
          ultra_moon: "感受到危險時會分泌\n紫色的汁液。人們認為\n這是類似冷汗的東西。"
    shellos_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
        it: Mare Est
        de: Östliches Meer
        es: Mar Este
        ko: 동쪽바다
        zh_simp: 东海
        zh_trad: 東海
      base_stats:
        hp: 76
        attack: 48
        defense: 48
        special_attack: 57
        special_defense: 62
        speed: 34
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          ultra_sun: "キケンを　かんじると　むらさきいろの\nしるを　ふきだす。　きんちょうによる\nあぶらあせ　という　せつが　ある。"
          ultra_moon: "たかい　さいせいのうりょくに　めを\nつけた　かがくしゃが　さいぼうの\nせいぶんを　ぶんせきちゅう。"
        jp_kanji:
          ultra_sun: "危険を　感じると　紫色の\n汁を　噴きだす。　緊張による\nあぶら汗　という　説がある。"
          ultra_moon: "高い　再生能力に　目を\nつけた　科学者が　細胞の\n成分を　分析中。"
        en:
          ultra_sun: "When it senses danger, it gushes a purple liquid.\nSome theories suggest this liquid is a greasy\nsweat induced by stress."
          ultra_moon: "Scientists interested in its great regenerative\ncapabilities are currently analyzing the materials\nfrom which its cells are made."
        fr:
          ultra_sun: "Il sécrète un liquide mauve en cas de danger.\nSelon certaines théories, ce serait de la sueur\ndue à sa nervosité."
          ultra_moon: "Les scientifiques qui ont observé son fort\npouvoir de régénération analysent actuellement\nles composants de ses cellules."
        it:
          ultra_sun: "Nelle situazioni di pericolo emette un liquido\nviola. Alcuni pensano che sia una specie di\nsudore freddo dovuto al nervosismo."
          ultra_moon: "Possiede un’incredibile capacità rigenerativa.\nLa sua struttura cellulare è tuttora oggetto di\nricerche approfondite da parte degli scienziati."
        de:
          ultra_sun: "Fühlt es sich bedroht, stößt es eine lilafarbene\nFlüssigkeit aus. Es heißt, dabei handele es sich\num Angstschweiß."
          ultra_moon: "Seine hohe Regenerationskraft sicherte ihm die\nAufmerksamkeit der Wissenschaft, die sich der\nAnalyse seiner Zellbestandteile widmet."
        es:
          ultra_sun: "Si se siente amenazado, segrega un líquido de\ncolor morado. Se cree que es sudor fruto de la\nansiedad."
          ultra_moon: "Tiene una enorme capacidad de regeneración,\npor lo que los científicos están estudiando su\ncomposición celular."
        ko:
          ultra_sun: "위험을 감지하면 보라색\n액체를 내뿜는다. 긴장해서\n진땀을 흘리는 것이라는 설도 있다."
          ultra_moon: "높은 재생 능력을\n눈여겨본 과학자가\n세포의 성분을 분석 중이다."
        zh_simp:
          ultra_sun: "如果感到危险，就会喷出紫色的汁。\n据说这是因紧张而产生的虚汗。"
          ultra_moon: "着眼于无壳海兔强大再生能力的\n科学家正在分析它细胞的成分。"
        zh_trad:
          ultra_sun: "感到危險時會噴出紫色的汁液。\n也有說法是，這種汁液\n是因為緊張而冒出的冷汗。"
          ultra_moon: "看上了無殼海兔強大\n再生能力的科學家正在\n分析牠的細胞成分。"
gastrodon:
  species_id: 423
  names:
    jp_kana: トリトドン
    jp_kanji: トリトドン
    en: Gastrodon
    fr: Tritosor
    it: Gastrodon
    de: Gastrodon
    es: Gastrodon
    ko: 트리토돈
    zh_simp: 海兔兽
    zh_trad: 海兔獸
  forms:
    gastrodon_west_sea:
      form_id: 0
      names:
        jp_kana: にしのうみ
        jp_kanji: にしのうみ
        en: West Sea
        fr: Mer Occident
        it: Mare Ovest
        de: Westliches Meer
        es: Mar Oeste
        ko: 서쪽바다
        zh_simp: 西海
        zh_trad: 西海
      base_stats:
        hp: 111
        attack: 83
