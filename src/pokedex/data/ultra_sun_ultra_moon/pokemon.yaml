      descriptions:
        jp_kana:
          ultra_sun: "みみを　ムチのように　しならせて\nてきに　うちつける。　きしょうは\nはげしく　こうせんてきな　きしつ。"
          ultra_moon: "メガシンカに　よって　たたかいの\nほんのうが　かくせい。　こうげきの\nじゃまに　なる　けを　ぬぎすてた。"
        jp_kanji:
          ultra_sun: "耳を　ムチのように　しならせて\n敵に　打ちつける。　気性は\n激しく　好戦的な　気質。"
          ultra_moon: "メガシンカに　よって　戦いの\n本能が　覚醒。　攻撃の\n邪魔になる　毛を　脱ぎ捨てた。"
        en:
          ultra_sun: "It swings its ears like whips and strikes its\nenemies with them. It has an intensely\ncombative disposition."
          ultra_moon: "Mega Evolution awakens its combative instincts.\nIt has shed any fur that got in the way of\nits attacks."
        fr:
          ultra_sun: "Ce Pokémon au tempérament violent se sert\nde ses oreilles comme s’il s’agissait de fouets\npour corriger ses adversaires."
          ultra_moon: "La Méga-Évolution a réveillé en lui son esprit\ncombatif. Il a perdu sa fourrure superflue,\nqui risquait de le gêner pour se battre."
        it:
          ultra_sun: "Colpisce i nemici usando le orecchie come\nfruste. Ha un temperamento violento e bellicoso."
          ultra_moon: "La megaevoluzione ha risvegliato il suo spirito\ncombattivo sopito e lo ha liberato della\npelliccia eliminando ogni intralcio nella lotta."
        de:
          ultra_sun: "Seine Ohren nutzt es als Peitschen, um damit\nauf seine Gegner einzuschlagen. Es ist sehr\nangriffslustig."
          ultra_moon: "Durch die Energie der Mega-Entwicklung ist sein\nKampftrieb erwacht. Es hat sich jenes Fells\nentledigt, das bei Angriffen nur stören würde."
        es:
          ultra_sun: "Utiliza las orejas a modo de látigo para fustigar\nal enemigo. Posee un temperamento violento y\ncombativo."
          ultra_moon: "La megaevolución despierta en él un instinto\nguerrero y le permite librarse del pelaje que\nle estorbaba a la hora de atacar."
        ko:
          ultra_sun: "귀를 채찍처럼 휘어\n적을 때린다. 격렬하고\n호전적인 기질을 타고났다."
          ultra_moon: "메가진화에 의해\n투쟁 본능이 각성했다. 공격에\n방해가 되는 털을 벗어 버렸다."
        zh_simp:
          ultra_sun: "像鞭子一样挥动耳朵鞭打敌人。\n脾气暴躁又好战。"
          ultra_moon: "战斗的本能因超级进化而觉醒。\n会舍弃干扰它攻击的毛发。"
        zh_trad:
          ultra_sun: "會像鞭子一樣\n揮動耳朵鞭打敵人。\n性情暴躁而好戰。"
          ultra_moon: "戰鬥的本能因為\n超級進化而覺醒。\n捨棄了會妨礙攻擊的毛皮。"
