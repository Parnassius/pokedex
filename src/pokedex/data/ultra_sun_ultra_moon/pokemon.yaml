        rare: leftovers
      descriptions:
        jp_kana:
          ultra_sun: "くうか　ねるかしか　していないが\nなにかの　きっかけで　ほんきをだすと\nすごい　パワーを　はっきするらしい。"
          ultra_moon: "たべること　いがいに　きょうみが\nない。　ひるねちゅうに　おなかのうえに\nのっかっても　まるで　きにしないぞ。"
        jp_kanji:
          ultra_sun: "食うか　寝るかしか　していないが\nなにかの　きっかけで　本気を出すと\n凄い　パワーを　発揮するらしい。"
          ultra_moon: "食べること　以外に　興味が\nない。　昼寝中に　お腹の上に\n乗っかっても　まるで　気にしないぞ。"
        en:
          ultra_sun: "It doesn’t do anything other than eat and sleep.\nWhen prompted to make a serious effort,\nthough, it apparently displays awesome power."
          ultra_moon: "It has no interest in anything other than eating.\nEven if you climb up on its stomach while it’s\nnapping, it doesn’t seem to mind at all!"
        fr:
          ultra_sun: "Il ne fait pas grand-chose à part manger\net dormir, mais gare à lui quand il décide\nde passer à l’action !"
          ultra_moon: "La seule chose qui l’intéresse, c’est manger.\nIl ne se réveille même pas si quelqu’un grimpe\nsur son ventre pendant qu’il fait une sieste."
        it:
          ultra_sun: "Non fa altro che mangiare e dormire, ma quando\ndecide di fare sul serio tira fuori una potenza\neccezionale."
          ultra_moon: "Il suo unico interesse è il cibo. Quando fa\nla sua pennichella pomeridiana, non si accorge\nnemmeno se qualcuno gli sale sulla pancia."
        de:
          ultra_sun: "Wenn es nicht gerade frisst, dann schläft es.\nMacht es aber einmal Ernst, ist Schluss mit\nlustig."
          ultra_moon: "Bei ihm geht es immer nur ums Fressen. Macht\nman es sich auf seinem Bauch bequem, während\nes döst, ist es ihm daher egal."
        es:
          ultra_sun: "Poco hace aparte de comer y dormir, pero\npuede desatar una fuerza arrolladora si le da\nun arrebato."
          ultra_moon: "Solo piensa en comer y lo demás no le interesa.\nCuando duerme la siesta, no se inmuta ni aunque\nalguien se le tumbe en la barriga."
        ko:
          ultra_sun: "먹거나 자는 것밖에 안 하지만\n일단 진심을 다하게 되면\n굉장한 파워를 발휘하는 듯하다."
          ultra_moon: "먹는 것 외에는 관심이 없다.\n낮잠 중에 배 위에 올라타도\n전혀 신경 쓰지 않는다."
        zh_simp:
          ultra_sun: "平时不是吃就是睡，但如果因\n某些事而认真起来的话，\n好像就会发挥出惊人的力量。"
          ultra_moon: "只对吃感兴趣。\n即便是在它睡午觉时跳到\n它肚子上，它也毫不在意。"
        zh_trad:
          ultra_sun: "平常不是吃就是睡，但如果\n因某種原因認真起來的話，\n似乎就會發揮驚人的力量。"
          ultra_moon: "就只對吃感興趣。\n當牠睡午覺時，就算站上牠的肚子，\n牠也絲毫不會在意。"
