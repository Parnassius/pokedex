        - water
        - flying
      egg_groups:
        - undiscovered
      abilities:
        - swift_swim
        - water_absorb
      hidden_ability: water_veil
      descriptions:
        jp_kana:
          ultra_sun: "とても　ひとなつっこく　よくなつく。\nタマンタとの　ふれあい　ツアーは\nだいにんきの　ビーチアクティビティ。"
          ultra_moon: "ひとなつっこく　にんげんの　ふねの\nちかくまで　よってくる。　せなかの\nもようは　ちいきによって　ことなる。"
        jp_kanji:
          ultra_sun: "とても　人懐っこく　よく懐く。\nタマンタとの　ふれあい　ツアーは\n大人気の　ビーチアクティビティ。"
          ultra_moon: "人懐っこく　人間の　船の\n近くまで　よってくる。　背中の\n模様は　地域によって　異なる。"
        en:
          ultra_sun: "It’s highly friendly and easily tamed. Tours that\ntake people swimming with Mantyke are a\nsuper-popular beach activity."
          ultra_moon: "Mantyke are friendly toward people and will\napproach boats closely. The patterns on their\nbacks differ depending on their habitat."
        fr:
          ultra_sun: "Il est très affectueux et adore les humains.\nLes excursions permettant d’aller nager avec\nlui sont très populaires auprès des touristes."
          ultra_moon: "Il s’approche souvent des bateaux pour\nsympathiser avec les humains. Le motif\nqui orne son dos varie selon son habitat."
        it:
          ultra_sun: "È molto socievole e si affeziona facilmente.\nNuotare assieme ai Mantyke accompagnati da\nuna guida è un’attività tipica delle zone balneari."
          ultra_moon: "Si avvicina spesso alle imbarcazioni per\nsocializzare con gli esseri umani. Il disegno\nsul dorso è diverso a seconda della regione."
        de:
          ultra_sun: "Ein sehr zahmes, zutrauliches Pokémon. Touren,\nbei denen man Mantirps begegnen kann, sind\neine beliebte Freizeitaktivität an Küstenorten."
          ultra_moon: "Es ist so zutraulich, dass es sich sogar Schiffen\nvoller Menschen nähert. Die Rückenmuster von\nMantirps sind in jeder Region unterschiedlich."
        es:
          ultra_sun: "Es un Pokémon muy afable y profesa cariño por\nlos humanos. Los tours para nadar con Mantyke\nse han convertido en una actividad muy popular."
          ultra_moon: "Su carácter afable lo lleva a acercarse sin temor\na barcos con presencia humana. Los dibujos del\nlomo cambian según la región."
        ko:
          ultra_sun: "매우 사람을 잘 따른다.\n타만타 체험 투어는\n인기가 많은 비치 액티비티다."
          ultra_moon: "사람을 잘 따라서 인간의 배\n근처까지 다가온다. 등의\n모양은 지역에 따라 다르다."
        zh_simp:
          ultra_sun: "非常不认生，很容易亲近。\n与小球飞鱼的互动巡游\n是非常受欢迎的海滩活动。"
          ultra_moon: "不认生，会靠近人类的船只。\n背上的花纹根据地域而有所不同。"
        zh_trad:
          ultra_sun: "性情毫不怕生，很容易親近人。\n與小球飛魚互動的行程\n是非常受歡迎的海灘活動。"
          ultra_moon: "很親近人類，會主動靠近\n人類的船隻。背上的花紋\n依地域而有所不同。"
