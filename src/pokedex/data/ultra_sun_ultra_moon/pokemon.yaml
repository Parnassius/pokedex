lillipup:
  species_id: 506
  names:
    jp_kana: ヨーテリー
    jp_kanji: ヨーテリー
    en: Lillipup
    fr: Ponchiot
    it: Lillipup
    de: Yorkleff
    es: Lillipup
    ko: 요테리
    zh_simp: 小约克
    zh_trad: 小約克
  forms:
    lillipup:
      form_id: 0
      base_stats:
        hp: 45
        attack: 60
        defense: 45
        special_attack: 25
        special_defense: 45
        speed: 55
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - vital_spirit
        - pickup
      hidden_ability: run_away
      descriptions:
        jp_kana:
          ultra_sun: "はんだんりょくに　すぐれた　ポケモン。\nかてない　あいてと　はんだんしたら\nさっさと　シッポを　まいて　にげる。"
          ultra_moon: "かしこく　トレーナーの　いうことを\nすなおに　きくので　しょしんしゃでも\nそだてやすいと　にんきの　ポケモン。"
        jp_kanji:
          ultra_sun: "判断力に　優れた　ポケモン。\n勝てない　相手と　判断したら\nさっさと　シッポを　巻いて　逃げる。"
          ultra_moon: "賢く　トレーナーの　いうことを\n素直に　聞くので　初心者でも\n育てやすいと　人気の　ポケモン。"
        en:
          ultra_sun: "This Pokémon has excellent judgment.\nIf it decides it can’t defeat an opponent,\nit immediately turns tail and vamooses."
          ultra_moon: "This Pokémon is popular with beginners\nbecause it’s intelligent, obedient to its Trainer’s\ncommands, and easy to raise."
        fr:
          ultra_sun: "Réputé pour sa grande perspicacité, il s’enfuit\nla queue entre les pattes s’il s’estime trop faible\npour gagner."
          ultra_moon: "Sa docilité en fait un Pokémon facile à élever.\nIl est notamment populaire auprès des\nDresseurs débutants."
        it:
          ultra_sun: "È molto perspicace e capisce al volo se può\ncompetere con l’avversario. Se sa di non\npoterlo battere, fugge con la coda fra le gambe."
          ultra_moon: "È molto popolare per la sua intelligenza e per la\ndocilità nel seguire le istruzioni, che lo rendono\nadatto anche agli Allenatori principianti."
        de:
          ultra_sun: "Ein Pokémon mit ausgeprägtem Urteilsvermögen.\nBefindet es seinen Gegner für zu stark, zieht es\nden Schwanz ein und sucht sofort das Weite."
          ultra_moon: "Dieses pfiffige Pokémon ist besonders bei\nAnfängern beliebt, da es den Befehlen seines\nTrainers brav folgt und leicht zu trainieren ist."
        es:
          ultra_sun: "Este Pokémon destaca por su perspicacia. Si\npercibe que no lleva las de ganar, no duda en\nhuir con el rabo entre las piernas."
          ultra_moon: "Este inteligente Pokémon es muy popular, ya que\nobedece sin rechistar a su Entrenador e incluso\nlos novatos pueden entrenarlo sin problemas."
        ko:
          ultra_sun: "판단력이 뛰어난 포켓몬.\n이길 수 없는 상대라고 판단되면\n바로 꼬리를 내리고 도망친다."
          ultra_moon: "영리해서 트레이너가 하는 말을\n잘 따르기 때문에 초보자라도\n키우기 쉬워서 인기 있는 포켓몬이다."
        zh_simp:
          ultra_sun: "是拥有优秀判断力的宝可梦。\n如果判断出自己无法战胜对手，\n就会立即夹着尾巴逃走。"
          ultra_moon: "很聪明，会忠实地听从训练家的吩咐，\n所以即便是新手也很容易培育。\n是很受欢迎的宝可梦。"
        zh_trad:
          ultra_sun: "擁有優秀判斷力的寶可夢。\n一旦判斷自己無法戰勝對手，\n就會立刻夾著尾巴逃走，"
          ultra_moon: "聰明的牠會忠實地聽從訓練家的吩咐，\n所以即使是新手也很容易培育。\n是很受歡迎的寶可夢。"
