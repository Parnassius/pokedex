      descriptions:
        jp_kana:
          ultra_sun: "ふくぶに　はつでん　きかんを　もつ。\nおおアゴに　エネルギーを　あつめ\nすさまじい　でんげきを　はなつ。"
          ultra_moon: "アクロバティックな　ひこうで　てきを\nかくらん。　ひるんだ　すきを　ついて\nでんげきビームを　おみまいする。"
        jp_kanji:
          ultra_sun: "腹部に　発電　器官を　持つ。\n大アゴに　エネルギーを　集め\n凄まじい　電撃を　放つ。"
          ultra_moon: "アクロバティックな　飛行で　敵を\nかく乱。　ひるんだ　隙を　ついて\n電撃ビームを　お見舞いする。"
        en:
          ultra_sun: "It has an organ that generates electricity in its\nabdomen. It concentrates energy in its strong\njaws and fires off powerful jolts of electricity."
          ultra_moon: "Vikavolt flusters opponents with acrobatic\nflying maneuvers. This creates an opening for\nit to deliver an electric beam attack."
        fr:
          ultra_sun: "Il possède un organe électrogène sur le ventre.\nIl concentre de l’énergie dans ses mandibules\navant de libérer une puissante décharge."
          ultra_moon: "Il déroute l’ennemi avec ses pirouettes\nacrobatiques, puis profite de sa surprise\npour l’attaquer grâce à un rayon électrique."
        it:
          ultra_sun: "Nella pancia ha un organo che genera elettricità.\nAccumula energia nelle mandibole per poi\nrilasciare potenti scariche elettriche."
          ultra_moon: "Confonde i nemici con voli acrobatici e, non\nappena li vede esitare, li colpisce con un\nraggio elettrico."
        de:
          ultra_sun: "Es erzeugt mit einem Organ in seinem Bauch\nElektrizität. In seinem großen Kiefer speichert\nes Strom für enorm starke Elektrosalven."
          ultra_moon: "Mit akrobatischen Flugmanövern verwirrt es\nseine Gegner und nutzt diese Gelegenheit, um\nElektrostrahlen auf sie abzufeuern."
        es:
          ultra_sun: "El órgano que posee en el abdomen genera\nelectricidad. Libera la energía acumulada en sus\ngrandes mandíbulas con una potente descarga."
          ultra_moon: "Aturde al enemigo con su vuelo acrobático y\naprovecha el desconcierto para propinarle una\ndescarga en forma de rayo."
        ko:
          ultra_sun: "복부에 발전 기관을 갖고 있다.\n큰 턱에 에너지를 모아\n굉장한 전격을 쏜다."
          ultra_moon: "아크로바틱한 비행으로 적을\n교란한다. 풀이 죽은 틈을 타\n전격 빔을 가한다."
        zh_simp:
          ultra_sun: "腹部拥有发电器官。\n在大颚里收集能量，\n释放出惊人的电击。"
          ultra_moon: "以杂技般的飞行搅乱敌人。\n抓住对方胆怯的那一瞬，\n施展出电击光束。"
        zh_trad:
          ultra_sun: "腹部有著發電器官，\n會將能量集中在大顎上，\n發出驚人的電擊。"
          ultra_moon: "會以雜技般的飛行擾亂敵人，\n趁著對手退縮的那一瞬間\n施展出電擊光束。"
