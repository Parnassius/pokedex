diglett:
  species_id: 50
  names:
    jp_kana: ディグダ
    jp_kanji: ディグダ
    en: Diglett
    fr: Taupiqueur
    it: Diglett
    de: Digda
    es: Diglett
    ko: 디그다
    zh_simp: 地鼠
    zh_trad: 地鼠
  forms:
    diglett:
      form_id: 0
      base_stats:
        hp: 10
        attack: 55
        defense: 25
        special_attack: 35
        special_defense: 45
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_veil
        - arena_trap
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          ultra_sun: "ちかに　トンネルを　ほって　いどう。\nひかりが　きらいなので　ちじょうに\nでてくるのは　ひが　しずんでから。"
          ultra_moon: "のうかでは　さくもつの　まわりに\nディグダの　こうぶつの　きを　うえて\nじめんを　たがやして　もらっているよ。"
        jp_kanji:
          ultra_sun: "地下に　トンネルを　掘って　移動。\n光が　嫌いなので　地上に\n出てくるのは　日が　沈んでから。"
          ultra_moon: "農家では　作物の　まわりに\nディグダの　好物の　木を　植えて\n地面を　耕して　もらっているよ。"
        en:
          ultra_sun: "It travels through tunnels that it digs\nunderground. It hates sunlight, so it comes\nout only after the sun goes down."
          ultra_moon: "Around their crops, farmers plant the kind of\ntree that Diglett like to eat as a way of getting\nDiglett to plow the fields for them."
        fr:
          ultra_sun: "Il se déplace en creusant des tunnels.\nIl déteste la lumière et n’apparaît à la\nsurface qu’une fois le soleil couché."
          ultra_moon: "Pour encourager les Taupiqueur à labourer leurs\nchamps, les agriculteurs les bordent d’arbres\nappréciés de ces Pokémon."
        it:
          ultra_sun: "Si sposta scavando gallerie nel terreno.\nOdia la luce e sale in superficie solo dopo\nil tramonto."
          ultra_moon: "Gli agricoltori piantano attorno ai campi gli alberi\namati da questi Pokémon per fare in modo che\narino il terreno per loro."
        de:
          ultra_sun: "Es gräbt unterirdische Tunnel und bewegt sich\ndarin fort. Da es Licht verabscheut, taucht es\nerst nachts wieder an der Oberfläche auf."
          ultra_moon: "Auf Farmen werden Digdas Lieblingsbäume um\ndie Feldfrüchte herum gepflanzt. Im Gegenzug\ndurchpflügen sie dafür den Boden."
        es:
          ultra_sun: "Se desplaza excavando túneles subterráneos.\nNo soporta la luz brillante, por lo que solo sale\na la superficie tras la puesta de sol."
          ultra_moon: "Muchos agricultores flanquean sus campos con\nárboles del agrado de los Diglett para atraerlos\ny fomentar así que labren la tierra."
        ko:
          ultra_sun: "지하에 터널을 파서 이동한다.\n빛을 싫어해서 해가 진 후에\n지상으로 나온다."
          ultra_moon: "농가에서는 작물 주변에\n디그다가 좋아하는 나무를 심어서\n땅을 일구게 하고 있다."
        zh_simp:
          ultra_sun: "会在地下挖掘隧道移动。\n由于讨厌光线，所以会在\n太阳落山后来到地上。"
          ultra_moon: "农户会在农作物周围\n种上地鼠喜食的树木，\n并以此来让它们耕作土地哦。"
        zh_trad:
          ultra_sun: "會在地下挖隧道來移動。\n由於討厭陽光，所以總是在\n太陽下山後才來到地上。"
          ultra_moon: "農民們會在農作物周圍\n種上地鼠喜歡的樹木，\n藉此讓牠們來耕作土地。"
    diglett_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 10
        attack: 55
        defense: 30
        special_attack: 35
        special_defense: 45
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - ground
        - steel
      egg_groups:
        - field
      abilities:
        - sand_veil
        - tangling_hair
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          ultra_sun: "ようがんしつの　じめんも　グングン\nほりすすむほど　パワフルだが\nなかなか　すがたを　みせないぞ。"
          ultra_moon: "ほかの　ちほうの　ディグダよりも\nちからもち。　ようがんしつの　じめんを\nほりすすめる　うち　きたえられたのだ。"
        jp_kanji:
          ultra_sun: "溶岩質の　地面も　グングン\n掘り進むほど　パワフルだが\nなかなか　姿を　見せないぞ。"
          ultra_moon: "他の　地方の　ディグダよりも\n力持ち。　溶岩質の　地面を\n掘り進める　うち　鍛えられたのだ。"
        en:
          ultra_sun: "Although it’s powerful enough to dig right\nthrough volcanic rock, it doesn’t allow itself to\nbe seen very often."
          ultra_moon: "The need to dig through volcanic rock in the\nground has made them more powerful than\nthe Diglett of other regions."
        fr:
          ultra_sun: "Ce Pokémon est si robuste qu’il peut creuser\ndes tunnels dans les roches volcaniques.\nIl est rare d’en apercevoir un spécimen."
          ultra_moon: "Plus puissant que les Taupiqueur des autres\nrégions, il se fait les muscles en forant la lave\nsolidifiée."
        it:
          ultra_sun: "Questo Pokémon non si fa vedere molto spesso.\nÈ talmente forte da riuscire a scavare con\nfacilità anche nel terreno lavico."
          ultra_moon: "È più forte dei Diglett delle altre regioni perché\nsi allena scavando nel terreno lavico."
        de:
          ultra_sun: "Es ist so kräftig, dass es sich mühelos durch\nSchichten von Lavagestein graben kann. An der\nOberfläche zeigt es sich nur selten."
          ultra_moon: "Es ist kräftiger als die Digda anderer Regionen.\nDiese Stärke hat es sich beim Graben durch\nSchichten von Lavagestein antrainiert."
        es:
          ultra_sun: "Este formidable Pokémon excava sin problema\nincluso en terreno volcánico, pero no se deja\nver fácilmente."
          ultra_moon: "Su fuerza, mayor que la de los Diglett de otras\nregiones, es el resultado de cavar túneles en\nterreno volcánico."
        ko:
          ultra_sun: "용암질의 지면도 거침없이 파며\n나아갈 정도로 파워풀하지만\n모습을 잘 드러내지 않는다."
          ultra_moon: "다른 지방의 디그다보다도\n힘이 세다. 용암질의 땅을\n파헤치는 동안 단련된 것이다."
        zh_simp:
          ultra_sun: "力量强大，即使是熔岩地质的\n地面也能飞快地挖掘前进。\n但它却很少现身。"
          ultra_moon: "比其他地区的地鼠更有力气。\n这是在挖掘熔岩地质的\n地面前进时锻炼出来的。"
        zh_trad:
          ultra_sun: "力量強大，即使在熔岩地質的\n地面也能飛快地挖掘前進。\n但牠很少在人們面前現身。"
          ultra_moon: "比其他地區的地鼠更有力氣。\n這是在熔岩地質的地層中\n挖掘前進而鍛鍊出來的。"
dugtrio:
  species_id: 51
  names:
    jp_kana: ダグトリオ
    jp_kanji: ダグトリオ
    en: Dugtrio
    fr: Triopikeur
    it: Dugtrio
    de: Digdri
    es: Dugtrio
    ko: 닥트리오
    zh_simp: 三地鼠
    zh_trad: 三地鼠
  forms:
    dugtrio:
      form_id: 0
      base_stats:
        hp: 35
        attack: 100
        defense: 50
        special_attack: 50
        special_defense: 70
        speed: 120
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - ground
      egg_groups:
        - field
      abilities:
        - sand_veil
        - arena_trap
      hidden_ability: sand_force
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          ultra_sun: "いつも　なかよしの　３つごだが\nごく　まれに　どのあたまが　はじめに\nエサを　くうかで　おおゲンカになる。"
          ultra_moon: "つるりとした　かたちを　しているが\nとてつもなく　かたいあたま。　どんな\nじばんも　ずつきで　ほりすすめるぞ。"
        jp_kanji:
          ultra_sun: "いつも　仲良しの　３つ子だが\nごく　まれに　どの頭が　初めに\nエサを　食うかで　大ゲンカになる。"
          ultra_moon: "つるりとした　形を　しているが\nとてつもなく　硬い頭。　どんな\n地盤も　頭突きで　掘り進めるぞ。"
        en:
          ultra_sun: "While the three of them normally get along\nsplendidly, on rare occasions a huge fight will\nbreak out over which head gets to eat first."
          ultra_moon: "Dugtrio’s heads are sleek and smooth and\nincredibly hard. It can dig through any soil with\nits headbutts."
        fr:
          ultra_sun: "Ces triplés s’entendent à merveille, mais en\nde rares occasions, une terrible dispute éclate\npour savoir qui va manger en premier."
          ultra_moon: "D’apparence lisse, ses têtes sont\nincroyablement dures. Il creuse la terre\nà coups de crâne répétés."
        it:
          ultra_sun: "In genere le tre teste vanno d’accordo, ma a\nvolte può capitare che scoppi una lite furiosa\nper decidere quale mangerà per prima."
          ultra_moon: "Le sue teste sono perfettamente lisce e\nincredibilmente dure. Può scavare a testate\nqualsiasi tipo di terreno."
        de:
          ultra_sun: "Digdri sind Drillinge und normalerweise ein Herz\nund eine Seele. Nur ganz selten streiten sie sich,\nwelcher Kopf zuerst ans Futter darf."
          ultra_moon: "Seine Köpfe sind vollkommen glatt und steinhart.\nMit Kopfnüssen gräbt es sich mühelos durch\njeden Untergrund."
        es:
          ultra_sun: "Este trío se lleva de maravilla, aunque muy de\nvez en cuando se enzarzan en acaloradas\ndisputas para decidir cuál come primero."
          ultra_moon: "A pesar de ser lisas, sus cabezas son de una\ndureza extraordinaria. Puede horadar el terreno\nmás difícil a base de testarazos."
        ko:
          ultra_sun: "언제나 사이좋은 세쌍둥이지만\n극히 드물게 어느 머리가 먼저\n먹이를 먹을까로 큰 싸움을 한다."
          ultra_moon: "매끄러운 형태를 하고 있지만\n굉장히 머리가 단단하다. 어떤\n지반이라도 박치기로 파고 간다."
        zh_simp:
          ultra_sun: "三胞胎的感情一直很好，\n但在极少数情况下，也会为哪个\n脑袋先进食而激烈争吵。"
          ultra_moon: "虽然长得很圆润，但却有着出奇\n坚硬的脑袋。不管是怎样的地层，\n它都能用头锤的方式挖掘前进。"
        zh_trad:
          ultra_sun: "三胞胎的感情一向很好，\n但在極少數情況下也會為了\n哪個頭先吃東西而大吵一架。"
          ultra_moon: "腦袋長得渾圓光滑，但卻\n極為堅硬。不管是哪種地層\n都能用頭錘挖掘前進。"
    dugtrio_alolan_form:
