        - technician
      descriptions:
        jp_kana:
          ultra_sun: "あいての　かげに　もぐって　うごきや\nちからを　まねる。　まねているうちに\nほんもの　よりも　つよくなるぞ。"
          ultra_moon: "ひとや　ポケモンの　かげの　なかに\nもぐる。　もぐった　あいての　きもちを\nりかいして　のうりょくを　コピーする。"
        jp_kanji:
          ultra_sun: "相手の　影に　潜って　動きや\n力を　真似る。　真似ているうちに\n本物　よりも　強くなるぞ。"
          ultra_moon: "人や　ポケモンの　影の　中に　潜る。\n潜った　相手の　気持ちを\n理解して　能力を　コピーする。"
        en:
          ultra_sun: "It slips into the shadows of others and mimics\ntheir powers and movements. As it improves, it\nbecomes stronger than those it’s imitating."
          ultra_moon: "It sinks into the shadows of people and\nPokémon, where it can understand their feelings\nand copy their capabilities."
        fr:
          ultra_sun: "Il se fond dans l’ombre de son adversaire\npour imiter sa force et ses attaques.\nLa copie surpasse alors l’original."
          ultra_moon: "Il se terre dans les ombres des humains\net des Pokémon. Il peut lire dans l’esprit\nde ses hôtes et copier leurs habilités."
        it:
          ultra_sun: "Si infiltra nell’ombra del nemico, copiandone\ni movimenti e la forza. L’imitazione finisce per\ndiventare più forte dell’originale."
          ultra_moon: "Infiltrandosi nell’ombra di Pokémon ed esseri\numani riesce a comprendere il loro stato d’animo\ne a copiarne le capacità."
        de:
          ultra_sun: "Schlüpft es in den Schatten seines Gegners, um\ndessen Bewegungen und Kräfte zu imitieren,\nkann es sogar stärker als das Original werden."
          ultra_moon: "Es verschmilzt mit den Schatten von Menschen\nund Pokémon, wodurch es ihre Gefühle\nverstehen und ihre Fähigkeiten kopieren kann."
        es:
          ultra_sun: "Se oculta en la sombra de su oponente y copia\nsus movimientos y su fuerza. Su imitación\nresulta más poderosa que el original."
          ultra_moon: "Se infiltra en la sombra de las personas y los\nPokémon. Sintoniza con sus sentimientos y\ncopia sus capacidades."
        ko:
          ultra_sun: "상대 그림자에 숨어들어\n움직임이나 능력을 흉내 낸다.\n그러다가 진짜보다 강해진다."
          ultra_moon: "사람이나 포켓몬의 그림자 속에\n숨는다. 숨은 상대의 마음을\n이해하고 능력을 복사한다."
        zh_simp:
          ultra_sun: "能潜入对方的影子，\n模仿对方的动作和力量。\n在模仿的过程中会变得比本尊更强。"
          ultra_moon: "会潜入人或宝可梦的影子里。\n会理解所潜入者的心情，\n复制其能力。"
        zh_trad:
          ultra_sun: "能夠潛入對手的影子，\n模仿對手的動作和能力。\n在模仿的過程中會變得比本尊更強。"
          ultra_moon: "會潛進人或寶可夢的影子裡。\n能理解潛入對象的心情，\n並複製對方的能力。"
poipole:
