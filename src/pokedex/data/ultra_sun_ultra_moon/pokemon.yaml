      descriptions:
        jp_kana:
          ultra_sun: "よく　なついて　よく　あまえる。\nその　しぐさと　かおの　ギャップで\nわかい　じょせいは　メロメロらしい。"
          ultra_moon: "みためと　ちがって　おくびょうなので\nほかの　こいぬポケモンと　いっしょに\nすると　いじめられることも　ある。"
        jp_kanji:
          ultra_sun: "よく　懐いて　よく　甘える。\nその　仕草と　顔の　ギャップで\n若い　女性は　メロメロらしい。"
          ultra_moon: "見た目と　違って　臆病なので\n他の　こいぬポケモンと　一緒に\nすると　いじめられることも　ある。"
        en:
          ultra_sun: "It grows close to others easily and is also easily\nspoiled. The disparity between its face and its\nactions makes many young people wild about it."
          ultra_moon: "In contrast to its appearance, it’s quite\ntimid. When playing with other puppy\nPokémon, it sometimes gets bullied."
        fr:
          ultra_sun: "Il s’attache très facilement et aime être cajolé.\nUne telle sensibilité cachée derrière une mine\nrenfrognée fait fondre beaucoup de jeunes gens."
          ultra_moon: "Malgré les apparences, c’est un grand timide\nqui fait souvent l’objet de railleries quand il se\ntrouve au milieu d’un groupe de Pokémon Chiot."
        it:
          ultra_sun: "Si affeziona facilmente ed è sempre in cerca di\nattenzioni, nonostante la sua espressione.\nI giovani lo adorano proprio per questo."
          ultra_moon: "Nonostante il suo aspetto, è piuttosto timido.\nQuando si ritrova in mezzo a dei Pokémon\nCagnolino, tutti lo prendono in giro."
        de:
          ultra_sun: "Es wird schnell zahm und wird gerne verwöhnt.\nViele lieben den Kontrast zwischen seiner\nmürrischen Miene und dem putzigen Charakter."
          ultra_moon: "Man sieht es ihm zwar nicht an, aber es ist\nrecht feige. Lässt man es mit anderen kleinen\nHunde-Pokémon spielen, wird es oft gehänselt."
        es:
          ultra_sun: "Le gusta que le hagan mimos y coge confianza\ncon facilidad. A la gente le fascina el contraste\nentre su aspecto fiero y carácter dulce."
          ultra_moon: "A pesar de su aspecto, es muy tímido y afable.\nA menudo es objeto de burla cuando se junta\ncon Pokémon Perrito."
        ko:
          ultra_sun: "금방 따르고 금방 응석을 부린다.\n하는 행동과 생김새의 격차 때문에\n젊은 여성은 헤롱헤롱하는 듯하다."
          ultra_moon: "겉보기와 다르게 겁쟁이라\n다른 강아지포켓몬과 함께\n있으면 괴롭힘을 당할 때도 있다."
        zh_simp:
          ultra_sun: "喜欢亲近人，爱撒娇。\n它的动作与长相之间的反差\n好像会让年轻女性为之着迷。"
          ultra_moon: "它和看上去不同，其实很胆小。\n所以如果把它和小狗宝可梦\n放在一起，它就有可能会受到欺负。"
        zh_trad:
          ultra_sun: "喜歡與人親近，很會撒嬌。\n牠的動作與長相之間的反差\n似乎能讓年輕女性不禁著迷。"
          ultra_moon: "個性與外表相反，其實很膽小。\n要是把牠和其他小狗寶可夢\n放在一起，牠有可能會被欺負。"
granbull:
