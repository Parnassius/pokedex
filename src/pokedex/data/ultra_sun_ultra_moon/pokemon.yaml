      descriptions:
        jp_kana:
          ultra_sun: "まだ　とべないが　ジャンプりょくは\nばつぐん。　たかい　きの　えだに\nとびあがり　きのめを　ついばむ。"
          ultra_moon: "こちらを　じっと　かんさつするような\nまなざし。　ちょっとでも　ちかづくと\nぴょんぴょん　はねて　にげていく。"
        jp_kanji:
          ultra_sun: "まだ　飛べないが　ジャンプ力は\n抜群。　高い　木の　枝に\n飛び上がり　木の芽を　ついばむ。"
          ultra_moon: "こちらを　じっと　観察するような\n眼差し。　ちょっとでも　近付くと\nぴょんぴょん　はねて　逃げていく。"
        en:
          ultra_sun: "Although it still can’t fly, its jumping power is\noutstanding. It jumps way up into trees and\nplucks the buds from the branches."
          ultra_moon: "The look in its eyes gives the impression that\nit’s carefully observing you. If you approach it,\nNatu will hop away."
        fr:
          ultra_sun: "Bien qu’il ne sache pas encore voler, il peut\nsauter jusqu’aux plus hautes branches des\narbres pour en picorer les bourgeons."
          ultra_moon: "Son regard fixe semble dévisager les gens.\nIl s’enfuit en sautillant à la moindre tentative\nd’approche."
        it:
          ultra_sun: "Non sa ancora volare, ma spiccando salti\neccezionali riesce a raggiungere anche i rami\npiù alti per cibarsi dei germogli che vi crescono."
          ultra_moon: "Sembra osservare ciò che lo circonda con\nsguardo inquisitore. Se si accenna appena ad\navvicinarsi, scappa via saltellando."
        de:
          ultra_sun: "Natu kann noch nicht fliegen, aber hervorragend\nspringen. So erreicht es selbst hoch liegende\nÄste, an deren Knospen es dann pickt."
          ultra_moon: "Sein durchdringender Blick scheint einen stets\nzu beobachten. Kommt man ihm auch nur ein\nbisschen näher, ergreift es hüpfend die Flucht."
        es:
          ultra_sun: "Aún no puede volar, pero su increíble capacidad\nde salto le permite alcanzar las ramas de los\nárboles más altos y picotear los brotes tiernos."
          ultra_moon: "Con su penetrante mirada, parece estar en\nvigilancia constante. A la mínima que se le\nacercan, sale huyendo dando botes."
        ko:
          ultra_sun: "아직 날 수 없지만, 점프력은\n상당하다. 높은 나뭇가지에\n뛰어올라 나무순을 쪼아 먹는다."
          ultra_moon: "이쪽을 가만히 관찰하는 듯한\n눈빛이다. 조금이라도 다가가면\n통통 튀어서 도망친다."
        zh_simp:
          ultra_sun: "虽然还无法飞行，但跳跃力超群。\n能跳上很高的树枝啄食树芽。"
          ultra_moon: "它的目光仿佛一直在\n观察着这里。只要稍有靠近，\n它就会一蹦一蹦地跳着逃开。"
        zh_trad:
          ultra_sun: "雖然還不會飛，\n但跳躍力超群，會跳上\n高處的樹枝去啄食樹芽。"
          ultra_moon: "牠的眼神似乎一直在\n觀察著這裡。但只要稍微靠近，\n牠就會蹦蹦跳跳地逃開。"
xatu:
