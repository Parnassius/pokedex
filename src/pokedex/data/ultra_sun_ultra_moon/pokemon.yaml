      types:
        - grass
        - fairy
      egg_groups:
        - undiscovered
      abilities:
        - grassy_surge
      hidden_ability: telepathy
      descriptions:
        jp_kana:
          ultra_sun: "まもりがみと　よばれるが　てきと\nみなした　ものは　てっていてきに\nたたきつぶす　はげしさを　もっている。"
          ultra_moon: "シッポを　ならし　いばしょを　つたえ\nむだなあらそいを　さける。　くさきを\nあやつる　ウラウラの　まもりがみ。"
        jp_kanji:
          ultra_sun: "守り神と　呼ばれるが　敵と\n見なした　者は　徹底的に\n叩き潰す　激しさを　持っている。"
          ultra_moon: "シッポを　鳴らし　居場所を　伝え\n無駄な争いを　避ける。　草木を\n操る　ウラウラの　守り神。"
        en:
          ultra_sun: "Although it’s called a guardian deity, it’s violent\nenough to crush anyone it sees as an enemy."
          ultra_moon: "It makes ringing sounds with its tail to let others\nknow where it is, avoiding unneeded conflicts.\nThis guardian deity of Ula’ula controls plants."
        fr:
          ultra_sun: "Bien qu’on le connaisse comme une divinité\nprotectrice, il peut se montrer sans pitié envers\nceux qu’il considère comme ses ennemis."
          ultra_moon: "Il est le gardien d’Ula-Ula et le maître\ndes plantes. Il évite les combats inutiles en\nfaisant tinter sa queue pour signaler son arrivée."
        it:
          ultra_sun: "È considerato un Pokémon protettore,\nma annienta senza pietà tutti quelli che\nconsidera nemici."
          ultra_moon: "Protettore di Ula Ula, ha il potere di controllare\nla vegetazione. Fa risuonare la coda per\nsegnalare la sua presenza ed evitare lotte inutili."
        de:
          ultra_sun: "Obwohl man es als Schutzpatron bezeichnet,\nverfügt es über die nötige Härte, um seine\nFeinde erbarmungslos zu vernichten."
          ultra_moon: "Als Gebieter über die Pflanzen macht Ula-Ulas\nSchutzpatron mit seinem Schweif auf sich\naufmerksam, um unnötige Kämpfe zu vermeiden."
        es:
          ultra_sun: "Se lo conoce como espíritu guardián, pero abate\nsin piedad a aquellos que considera sus\nenemigos."
          ultra_moon: "El espíritu guardián de Ula-Ula, que gobierna\nla flora. Hace repicar su cola para alertar de\nsu presencia y prevenir riñas sin sentido."
        ko:
          ultra_sun: "수호신으로 불리지만\n적이라고 간주한 자는 철저하게\n때려 부수는 격렬함을 갖고 있다."
          ultra_moon: "꼬리로 소리를 내어 위치를 알림으로써\n불필요한 싸움을 피한다. 초목을\n조종하는 울라울라의 수호신."
        zh_simp:
          ultra_sun: "被称为守护神，\n但拥有将视为敌人者\n彻底击溃的强悍。"
          ultra_moon: "会鸣响尾巴，告知自己的居所，\n以避免不必要的战争。\n是操纵草木的乌拉乌拉的守护神。"
        zh_trad:
          ultra_sun: "雖被稱呼為守護神，\n但有著會將自己視為敵人的對手\n徹底擊潰的狂暴個性。"
          ultra_moon: "會搖響尾巴告知周圍自己的位置，\n藉此避免不必要的鬥爭。\n是操縱草木的烏拉烏拉守護神。"
