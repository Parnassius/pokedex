      types:
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - torrent
      hidden_ability: liquid_voice
      descriptions:
        jp_kana:
          ultra_sun: "しらないダンスを　みると　こうふん。\nおどれるように　なるまで　けんめいに\nれんしゅうする　どりょくか　だよ。"
          ultra_moon: "ふくらませた　みずのバルーンを\nてあしで　はじき　てきに　たたきつけ\nばくはつさせて　こうげき　するのだ。"
        jp_kanji:
          ultra_sun: "知らないダンスを　見ると　興奮。\n踊れるように　なるまで　懸命に\n練習する　努力家　だよ。"
          ultra_moon: "膨らませた　水のバルーンを\n手足で　はじき　敵に　叩きつけ\n爆発させて　攻撃　するのだ。"
        en:
          ultra_sun: "It gets excited when it sees a dance it doesn’t\nknow. This hard worker practices diligently until\nit can learn that dance."
          ultra_moon: "It attacks by smacking its enemies with the\nexploding water balloons that it creates."
        fr:
          ultra_sun: "Il est tout excité quand il est témoin d’une danse\nqu’il ne connaît pas. Il s’entraîne alors comme\nun forcené jusqu’à la maîtriser à la perfection."
          ultra_moon: "Il utilise ses pattes pour lancer des ballons\nd’eau sur ses ennemis. Les ballons explosent\nau moment de l’impact."
        it:
          ultra_sun: "Si emoziona quando assiste a una danza che\nnon conosce ancora e si esercita con impegno\nfinché non la impara alla perfezione."
          ultra_moon: "Attacca creando palloncini d’acqua che lancia\ncon le sue pinne. I palloncini esplodono al\ncontatto con il nemico."
        de:
          ultra_sun: "Sieht es einen Tanz, den es nicht kennt, wird es\nganz aufgeregt. Dann übt es fleißig, bis es ihn\ngemeistert hat."
          ultra_moon: "Es erzeugt Wasserblasen, die es mit seinen\nFlossen auf Gegner schleudert. Die Blasen\nplatzen dadurch und schaden dem Ziel."
        es:
          ultra_sun: "Se emociona al contemplar una danza que no\nconoce y se esfuerza sobremanera por aprender\ntodos sus pasos a la perfección."
          ultra_moon: "Crea burbujas de agua que lanza al rival con\nsus aletas y que explotan cuando alcanzan al\nobjetivo."
        ko:
          ultra_sun: "모르는 댄스를 보면 흥분한다.\n출 수 있을 때까지 열심히\n연습하는 노력가다."
          ultra_moon: "부풀린 물의 벌룬을\n손발로 튕겨 내어 적에게 날린 후\n폭발시켜서 공격한다."
        zh_simp:
          ultra_sun: "如果看到没见过的舞蹈，就会很兴奋。\n会拼命练习直到自己也会跳为止。\n是个很努力的家伙哦。"
          ultra_moon: "用手脚将自己吹起的\n水做的气球弹出去砸向敌人，\n让气球爆炸攻击对方。"
        zh_trad:
          ultra_sun: "個性勤奮，只要看見自己\n不知道的舞蹈，就會很興奮。\n會拚命練習直到自己也會跳為止。"
          ultra_moon: "會用手腳將自己吹起來的\n水球彈出去砸向敵人，\n再讓水球爆開進行攻擊。"
primarina:
  species_id: 730
  names:
    jp_kana: アシレーヌ
    jp_kanji: アシレーヌ
    en: Primarina
    fr: Oratoria
    it: Primarina
    de: Primarene
    es: Primarina
    ko: 누리레느
    zh_simp: 西狮海壬
    zh_trad: 西獅海壬
  forms:
    primarina:
      form_id: 0
      base_stats:
        hp: 80
        attack: 74
        defense: 74
        special_attack: 126
        special_defense: 116
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - water
        - fairy
      egg_groups:
        - water_1
        - field
      abilities:
        - torrent
      hidden_ability: liquid_voice
      descriptions:
        jp_kana:
          ultra_sun: "アシレーヌに　とって　たたかいは\nステージ。　かれいに　うたって\nまいおどり　えものを　しとめる。"
          ultra_moon: "うたひめの　いみょうを　もつ。\nつきよの　ばんに　むれを　ひきいて\nうたう　すがたは　げんそうてき。"
        jp_kanji:
          ultra_sun: "アシレーヌに　とって　戦いは\nステージ。　華麗に　歌って\n舞い踊り　獲物を　仕留める。"
          ultra_moon: "歌姫の　異名を　持つ。\n月夜の　晩に　群れを　率いて\n歌う　姿は　幻想的。"
        en:
          ultra_sun: "To Primarina, every battle is a stage. It takes\ndown its prey with beautiful singing\nand dancing."
          ultra_moon: "Also known as a songstress, it has a fantastical\nlook on moonlit nights when it leads its colony\nin song."
        fr:
          ultra_sun: "Pour lui, le combat est une performance\nartistique. Il chante et danse de toute son âme\npour abattre ses proies."
          ultra_moon: "Surnommé « la diva », il offre un spectacle\nenchanteur lorsqu’il dirige un chœur composé\nde ses congénères à la lumière de la lune."
        it:
          ultra_sun: "Per Primarina la lotta è uno show.\nDà il colpo di grazia alla sua preda\ncantando e piroettando con eleganza."
          ultra_moon: "Il suo soprannome è “principessa del canto”.\nLo spettacolo che offre mentre dirige il coro dei\nsuoi simili al chiar di luna è una visione da sogno."
        de:
          ultra_sun: "Für Primarene ist jeder Kampf wie eine\nAufführung. Es erlegt seine Beute mithilfe von\nanmutigem Gesang und Tanzschritten."
          ultra_moon: "Der Anblick, wenn es in vom Mond erhellten\nNächten seine singende Kolonie dirigiert, ist\nmagisch. Es wird auch Primadonna genannt."
        es:
          ultra_sun: "Primarina considera los combates como un\nescenario ideal donde abatir a su presa con\nun canto y baile que derrochan elegancia."
          ultra_moon: "Recibe el sobrenombre de Diva. El espectáculo\nque ofrece al dirigir el coro de sus congéneres\na la luz de la luna es absolutamente primoroso."
        ko:
          ultra_sun: "누리레느에게 싸움은 스테이지다.\n화려하게 노래하고 춤을 추며\n먹이의 숨통을 끊는다."
          ultra_moon: "가희라는 별명을 가졌다.\n달이 뜨는 밤에 무리를 이끌고\n노래하는 모습은 환상적이다."
        zh_simp:
          ultra_sun: "对于西狮海壬来说，战斗就是舞台。\n华丽地唱着歌跳着舞，给猎物致命一击。"
          ultra_moon: "拥有歌姬这个别名。\n在月夜率领群体唱歌的样子\n充满了幻想色彩。"
        zh_trad:
          ultra_sun: "對西獅海壬來說，戰鬥就是\n表演的舞台，牠會在華麗地\n唱歌跳舞的同時給予獵物致命一擊。"
          ultra_moon: "擁有歌姬的別名。\n在月夜裡率領群體歌唱\n的樣子充滿了幻想色彩。"
pikipek:
  species_id: 731
  names:
    jp_kana: ツツケラ
