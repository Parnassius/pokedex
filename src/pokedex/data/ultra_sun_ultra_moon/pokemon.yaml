        jp_kana:
          ultra_sun: "チビノーズと　よばれる　ユニットを\nあやつるが　たまに　まいごに　なって\nかえってこないことも　あるらしい。"
          ultra_moon: "３つの　ちいさな　ユニットを　つかい\nエサを　とったり　てきと　たたかう。\nほんたいは　ほぼ　めいれいするだけ。"
        jp_kanji:
          ultra_sun: "チビノーズと　呼ばれる　ユニットを\n操るが　たまに　迷子に　なって\n帰ってこないことも　あるらしい。"
          ultra_moon: "３つの　小さな　ユニットを　使い\nエサを　とったり　敵と　戦う。\n本体は　ほぼ　命令するだけ。"
        en:
          ultra_sun: "Although it can control its units known as\nMini-Noses, they sometimes get lost and don’t\ncome back."
          ultra_moon: "It uses three small units to catch prey and\nbattle enemies. The main body mostly just\ngives orders."
        fr:
          ultra_sun: "Il est capable de piloter ses Mini-nez à distance,\nmais il arrive que l’un d’entre eux s’aventure\ntrop loin et se perde pour ne jamais revenir."
          ultra_moon: "Il utilise ses trois petites unités pour combattre\nses ennemis et capturer ses proies. Le reste de\nson corps se contente de donner des ordres."
        it:
          ultra_sun: "Controlla delle unità dette Mininasi, ma pare che\na volte queste si smarriscano e non riescano più\na tornare."
          ultra_moon: "Usa le tre piccole unità per procacciare il cibo\ne lottare contro i nemici. Il corpo centrale si\nlimita quasi esclusivamente a impartire ordini."
        de:
          ultra_sun: "Es steuert kleine Einheiten, die man Mininasen\nnennt. Leider verirren sie sich manchmal, und es\nheißt, dass einige von ihnen nie wiederkehren."
          ultra_moon: "Sein Körper selbst befehligt meist nur die drei\nkleinen Einheiten, die an seiner Stelle kämpfen\nund für die Nahrungssuche zuständig sind."
        es:
          ultra_sun: "Manipula unas pequeñas unidades conocidas\ncomo mininarices, aunque estas a veces se\npierden y no saben cómo regresar a Probopass."
          ultra_moon: "Usa sus tres pequeñas unidades para capturar\npresas o combatir, mientras que el resto de su\ncuerpo se dedica casi solo a impartir órdenes."
        ko:
          ultra_sun: "꼬마코파스라고 불리는 유닛을\n조종하지만 가끔 미아가 되어\n돌아오지 않는 경우도 있는 듯하다."
          ultra_moon: "3개의 작은 유닛을 사용해서\n먹이를 잡거나 적과 싸운다.\n본체는 거의 명령할 뿐이다."
        zh_simp:
          ultra_sun: "操纵着被称为小朝北鼻的部件，\n但这些部件好像偶尔也会迷路，没法回来。"
          ultra_moon: "使用３个小部件获取食物，\n或是和敌人战斗。\n本体基本上只负责下命令。"
        zh_trad:
          ultra_sun: "會操縱被稱為小朝北鼻的組件。\n但這些組件有時似乎會\n因為迷路而無法回來。"
          ultra_moon: "會驅使３個小組件去\n獲取食物或與敵人戰鬥。\n本體基本上只負責下命令。"
