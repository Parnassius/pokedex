          ultra_moon: "つちの　なかの　えいようで　そだつ。\nおよそ　やま　ひとつぶんの　つちを\nくうことで　サナギに　なるのだ。"
        jp_kanji:
          ultra_sun: "地下で　生まれ　土を　食いながら\n親の　いる　地上を　目指す。\nまぶしいので　光は　苦手だよ。"
          ultra_moon: "土の　中の　栄養で　育つ。\nおよそ　山　１つ分の　土を\n食うことで　サナギに　なるのだ。"
        en:
          ultra_sun: "Born underground, it eats its way through dirt to\nthe surface, where its parents are. It doesn’t\ndeal well with the bright light it finds there."
          ultra_moon: "Raised on nutrients it finds in the dirt, it eats\nroughly a mountain’s worth of dirt before\nit becomes a pupa."
        fr:
          ultra_sun: "Il naît sous terre et doit se frayer un chemin à\ncoups de mâchoire pour rejoindre ses parents\nà la surface. Il déteste la lumière, qui l’éblouit."
          ultra_moon: "Il se nourrit des nutriments présents dans le\nsol. Il lui faut dévorer l’équivalent d’une petite\nmontagne pour se changer en chrysalide."
        it:
          ultra_sun: "Nasce sottoterra e risale in superficie verso i\ngenitori mangiando la terra lungo il cammino.\nDetesta la luce, che trova troppo abbagliante."
          ultra_moon: "Cresce assorbendo nutrimento dal terreno.\nDopo aver divorato una quantità di terra\npari a una montagna, diventa crisalide."
        de:
          ultra_sun: "Es wird unterirdisch geboren und frisst sich\ndurchs Erdreich an die Oberfläche zu seinen\nEltern. Es verabscheut grelles, blendendes Licht."
          ultra_moon: "Es wächst durch die Nährstoffe im Boden.\nWenn es ungefähr einen ganzen Berg Erde\ngefressen hat, verpuppt es sich."
        es:
          ultra_sun: "Nace bajo el suelo y, para reunirse con sus\nprogenitores en la superficie, asciende comiendo\ntierra. Evita la luz directa porque lo deslumbra."
          ultra_moon: "Crece alimentándose de nutrientes del suelo.\nTras devorar el equivalente a una pequeña\nmontaña, se prepara para convertirse en pupa."
        ko:
          ultra_sun: "지하에서 태어나 흙을 먹으면서\n어버이가 있는 지상을 향해 올라간다.\n눈이 부셔서 빛은 좋아하지 않는다."
          ultra_moon: "땅속의 영양으로 성장한다.\n대략 산 하나만큼의 흙을\n먹으면 번데기가 된다."
        zh_simp:
          ultra_sun: "诞生于地下，会一边吃着泥土，\n一边朝至亲所在的地面前进。\n因为光线刺眼，所以它不太能适应哦。"
          ultra_moon: "靠着土壤中的养分长大。\n当吃下大约一座山那么多的土后，\n它就会变成蛹。"
        zh_trad:
          ultra_sun: "誕生在地裡，會一邊吃著泥土\n一邊朝母親所在的地面上前進。\n光線很刺眼，所以牠不太能適應。"
          ultra_moon: "靠著土中的營養長大。\n當吃下大約一座山那麼多的\n土壤之後，牠就會變成蛹。"
pupitar:
  species_id: 247
  names:
    jp_kana: サナギラス
    jp_kanji: サナギラス
    en: Pupitar
    fr: Ymphect
    it: Pupitar
    de: Pupitar
    es: Pupitar
    ko: 데기라스
    zh_simp: 沙基拉斯
    zh_trad: 沙基拉斯
  forms:
    pupitar:
      form_id: 0
      base_stats:
        hp: 70
        attack: 84
        defense: 70
        special_attack: 65
        special_defense: 70
        speed: 51
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - ground
      egg_groups:
        - monster
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          ultra_sun: "しんかを　まてず　あっしゅくガスで\nとびまわり　あばれて　ストレスを\nかいしょうする　めいわくな　ポケモン。"
          ultra_moon: "あばれまわる　きけんな　サナギ。\nがんばんの　ような　カラの　なかでは\nつぎの　からだが　できあがりつつある。"
        jp_kanji:
          ultra_sun: "進化を　待てず　圧縮ガスで\n飛びまわり　暴れて　ストレスを\n解消する　迷惑な　ポケモン。"
          ultra_moon: "暴れまわる　危険な　サナギ。\n岩盤の　ような　カラの　中では\n次の　身体が　できあがりつつある。"
        en:
          ultra_sun: "This troublesome Pokémon can’t wait to evolve,\nso it relieves its stress by wildly propelling itself\naround using compressed gas."
          ultra_moon: "This dangerous pupa thrashes about. Its shell is\nas hard as bedrock, containing its gradually\nforming new body within."
        fr:
          ultra_sun: "Impatient d’évoluer, il évacue son stress en\nlibérant des gaz sous haute pression qui le\nfont bondir dans tous les sens. Une vraie plaie !"
          ultra_moon: "Cette chrysalide est très dangereuse.\nÀ l’intérieur de cette carapace solide comme\nle roc, son nouveau corps se développe."
        it:
          ultra_sun: "In attesa dell’evoluzione, sfoga la sua\nimpazienza svolazzando ovunque spinto dal gas\ncompresso che espelle, dando fastidio a tutti."
          ultra_moon: "È una pericolosa crisalide che semina\ndistruzione. All’interno del guscio duro come\nuna roccia si sta formando il suo nuovo corpo."
        de:
          ultra_sun: "Es kann seine Entwicklung nicht erwarten und\nstört andere, wenn es zum Stressabbau mithilfe\nvon komprimiertem Gas durch die Luft zischt."
          ultra_moon: "Pupitar ist wild und gefährlich. In seinem\nsteinharten Panzer arbeitet es an der\nFertigstellung seines nächsten Körpers."
        es:
          ultra_sun: "Este Pokémon está impaciente por evolucionar\ny libera tensiones expulsando gas comprimido\ncon el que se propulsa. Un verdadero incordio."
          ultra_moon: "Posee un enorme poder destructivo. Dentro de\nsu caparazón duro como la roca, su cuerpo\nexperimenta una metamorfosis."
        ko:
          ultra_sun: "진화를 기다리지 못하고 압축가스로\n날아다니며 날뛰어 스트레스를\n해소하는 성가신 포켓몬."
          ultra_moon: "마구 날뛰는 위험한 번데기다.\n암반 같은 껍질 속에서는\n다음 몸이 만들어지고 있다."
        zh_simp:
          ultra_sun: "它是令人头痛的宝可梦。\n不等进化完成就会利用压缩气体\n四处乱飞大闹来纾解压力。"
          ultra_moon: "会到处胡闹，相当危险的蛹。\n在岩盘一样的外壳内，\n新的身体正在逐渐成形。"
        zh_trad:
          ultra_sun: "等不及進化，就會用壓縮氣體\n四處亂飛大鬧來抒解壓力，\n是種令人頭痛的寶可夢。"
          ultra_moon: "會到處大鬧，是種很危險的蛹。\n在彷彿岩盤一般的外殼裡，\n新的身體正在逐漸成形。"
tyranitar:
  species_id: 248
  names:
    jp_kana: バンギラス
    jp_kanji: バンギラス
    en: Tyranitar
    fr: Tyranocif
    it: Tyranitar
    de: Despotar
    es: Tyranitar
    ko: 마기라스
    zh_simp: 班基拉斯
    zh_trad: 班基拉斯
  forms:
    tyranitar:
      form_id: 0
      base_stats:
        hp: 100
        attack: 134
        defense: 110
        special_attack: 95
        special_defense: 100
        speed: 61
      evs_yield:
