        - steel
        - fairy
      egg_groups:
        - field
        - fairy
      abilities:
        - hyper_cutter
        - intimidate
      hidden_ability: sheer_force
      held_items:
        rare: iron_ball
      descriptions:
        jp_kana:
          ultra_sun: "ずるがしこく　おそろしい　ポケモン。\nキュートな　しぐさで　ゆだんさせ\nいきなり　おおアゴで　まるのみにする。"
          ultra_moon: "２つの　くちを　もつ。　こうとうぶの\nおおアゴには　みかくが　ないため\nにがてな　ものは　こちらで　たべる。"
        jp_kanji:
          ultra_sun: "ずる賢く　恐ろしい　ポケモン。\nキュートな　仕草で　油断させ\nいきなり　おおアゴで　丸呑みにする。"
          ultra_moon: "２つの　口を　持つ。　後頭部の\n大アゴには　味覚が　ないため\n苦手な　ものは　こちらで　食べる。"
        en:
          ultra_sun: "A cunning and terrifying Pokémon, its cuteness\nmakes opponents let down their guard—and\nthen it swallows them whole with its huge jaws."
          ultra_moon: "It has two mouths. The big jaws on the back of\nits head can’t taste anything, so that’s the\nmouth it uses to eat foods it doesn’t like."
        fr:
          ultra_sun: "Rusé et dangereux, ce Pokémon profite de son\nair candide pour tromper ses ennemis, et les\ngobe d’un trait dès qu’ils ont le dos tourné."
          ultra_moon: "Il possède deux bouches. Celle au sommet de sa\ntête ne percevant pas les saveurs, il s’en sert\npour manger les aliments qui lui déplaisent."
        it:
          ultra_sun: "Scaltro e pericoloso, induce il nemico ad\nabbassare la guardia con atteggiamenti graziosi\ne lo divora in un colpo con le possenti mascelle."
          ultra_moon: "Ha due bocche. Quella dietro la nuca, dotata di\npossenti mascelle, non percepisce i sapori e\nviene usata per mangiare i cibi meno graditi."
        de:
          ultra_sun: "Ein verschlagenes Pokémon, das sich niedlich\ngibt, um die Beute in Sicherheit zu wiegen. Dann\nverschlingt es diese mit seinem riesigen Kiefer."
          ultra_moon: "Es hat zwei Münder. Mit dem großen Kiefer auf\nseinem Hinterkopf kann es nichts schmecken,\ndeswegen isst es damit Dinge, die es nicht mag."
        es:
          ultra_sun: "Este Pokémon astuto y temible engaña al rival\ncon su aspecto dulce para luego engullirlo de un\nbocado cuando menos se lo espera."
          ultra_moon: "Tiene dos bocas. Las grandes mandíbulas a su\nespalda carecen de sentido del gusto, por lo\nque las usa para comer lo que no le agrada."
        ko:
          ultra_sun: "약삭빠르고 무서운 포켓몬.\n귀여운 행동으로 방심하게 한 후\n느닷없이 큰 턱으로 통째로 삼켜 버린다."
          ultra_moon: "2개의 입을 가졌다. 후두부의\n큰 턱에는 미각이 없어서\n싫어하는 것은 이쪽으로 먹는다."
        zh_simp:
          ultra_sun: "狡黠而又恐怖的宝可梦。\n用可爱的举止让人麻痹大意，\n然后出其不意地用大颚一口吞下。"
          ultra_moon: "拥有２张嘴。\n因为头部后面的大颚里没有味觉，\n所以那里用来吃不喜欢的东西。"
        zh_trad:
          ultra_sun: "聰明又狡猾，可怕的寶可夢。\n會用可愛的動作使對手掉以輕心，\n然後出其不意地用大顎一口吞下。"
          ultra_moon: "擁有２張嘴。頭部後面的大顎\n沒有味覺，所以會用來\n吃那些自己不喜歡的東西。"
    mawile_mega:
      form_id: 1
      names:
        jp_kana: メガクチート
        jp_kanji: メガクチート
        en: Mega Mawile
        fr: Méga-Mysdibule
        it: MegaMawile
        de: Mega-Flunkifer
        es: Mega-Mawile
        ko: 메가입치트
        zh_simp: 超级大嘴娃
        zh_trad: 超級大嘴娃
      base_stats:
        hp: 50
