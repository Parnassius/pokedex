      descriptions:
        jp_kana:
          ultra_sun: "ゆきやまとざんに　きた　やまおとこを\nこおりづけにし　すみかに　もちかえる。\nびなんし　しか　ねらわれない。"
          ultra_moon: "ひどい　ふぶきの　ばんに　ひとざとに\nおりてくると　いう。　ノックされても\nドアを　あけては　いけないぞ。"
        jp_kanji:
          ultra_sun: "雪山登山に　来た　山男を\n氷漬けにし　棲家に　持ち帰る。\n美男子　しか　狙われない。"
          ultra_moon: "ひどい　吹雪の　晩に　人里に\n下りてくると　いう。　ノックされても\nドアを　開けては　いけないぞ。"
        en:
          ultra_sun: "It freezes hikers who have come to climb snowy\nmountains and carries them back to its home. It\nonly goes after men it thinks are handsome."
          ultra_moon: "It’s said that on nights of terrible blizzards, it\ncomes down to human settlements. If you hear\nit knocking at your door, do not open it!"
        fr:
          ultra_sun: "Momartik gèle les Montagnards qui s’aventurent\ndans les pics enneigés et emmène ceux qu’il\ntrouve beaux dans sa tanière."
          ultra_moon: "On dit qu’il apparaît dans les zones habitées\nles soirs de tempête de neige. Si vous entendez\ntoquer à la porte, n’allez pas ouvrir !"
        it:
          ultra_sun: "Congela i Montanari che si avventurano su per\nle montagne innevate e li porta nella sua tana,\nma solo se li trova particolarmente attraenti."
          ultra_moon: "Si dice che appaia nei centri abitati nelle notti in\ncui imperversano bufere di neve. Se bussa alla\nporta, non bisogna aprire per nessun motivo."
        de:
          ultra_sun: "Wanderer, die durch verschneite Berge stapfen,\nfriert es ein und nimmt sie mit in seinen Bau.\nAllerdings nur jene, die es als schön erachtet."
          ultra_moon: "Es heißt, dass es am Abend eines Schneesturms\nMenschensiedlungen heimsuche. Wenn es an der\nTür klopft, sollte man sie besser nicht öffnen."
        es:
          ultra_sun: "Congela a los hombres que se aventuran en las\ncimas nevadas y se los lleva a su guarida, pero\ntan solo a aquellos que considera apuestos."
          ultra_moon: "Se dice que aparece de noche en poblaciones\ntras una intensa ventisca. Si llama a la puerta,\nno se le debe abrir bajo ningún concepto."
        ko:
          ultra_sun: "설산에 등산 온 남자를\n얼려버려 집으로 가지고 간다.\n미남만 노린다."
          ultra_moon: "심하게 눈보라 치는 밤에 사람이 사는\n마을에 내려온다고 한다. 노크해도\n문을 열어줘선 안 된다."
        zh_simp:
          ultra_sun: "把前来爬雪山的登山男\n冻成冰块，带回自己的巢穴。\n而且只会盯上美男子。"
          ultra_moon: "据说会在刮着猛烈暴风雪的夜晚下山，\n前往人类居住的村落。\n所以即使听到敲门声也千万不能开门。"
        zh_trad:
          ultra_sun: "會把來爬雪山的登山男\n凍成冰塊後帶回自己的巢穴，\n目標就只限於美男子。"
          ultra_moon: "據說會在颳著猛烈暴風雪的夜晚\n下山來到人類的村落。所以就算\n聽到敲門聲也千萬不可以開門。"
