      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 3
      types:
        - poison
        - flying
      egg_groups:
        - flying
      abilities:
        - inner_focus
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          ultra_sun: "キバが　するどいので　くらやみで\nかまれ　ちを　すわれても　いたみが\nなくて　すぐに　きが　つかない。"
          ultra_moon: "ひとや　ポケモンの　いきちが　エサ。\nすこし　すわないで　いるだけで\nよわって　とべなくなって　しまう。"
        jp_kanji:
          ultra_sun: "キバが　鋭いので　暗闇で\n噛まれ　血を　吸われても　痛みが\nなくて　すぐに　気が　つかない。"
          ultra_moon: "人や　ポケモンの　生き血が　エサ。\n少し　吸わないで　いるだけで\n弱って　飛べなくなって　しまう。"
        en:
          ultra_sun: "Its fangs are so sharp, if it bites you in the dark\nand sucks your blood, you won’t notice any pain\nor realize you’ve been bitten."
          ultra_moon: "It feeds on the blood of living people and\nPokémon. If it can’t drink any blood for even a\nshort while, it becomes weak and unable to fly."
        fr:
          ultra_sun: "Ses crocs sont si acérés qu’il peut sucer\nle sang de ses proies dans l’obscurité sans\nmême qu’elles s’en rendent compte."
          ultra_moon: "Il se nourrit du sang frais d’humains et de\nPokémon. S’il en manque ne serait-ce qu’un\ninstant, il s’affaiblit et ne peut plus voler."
        it:
          ultra_sun: "Succhia il sangue alle sue vittime nell’oscurità.\nLe sue zanne sono così affilate che i suoi morsi\nsono indolori e le vittime non se ne accorgono."
          ultra_moon: "Si nutre del sangue di persone e Pokémon.\nSe rimane senza anche solo per poco, si\nindebolisce al punto di non riuscire più a volare."
        de:
          ultra_sun: "Iksbat hat sehr scharfe Zähne, sodass seine\nBeute oft nichts davon merkt, wenn es in der\nDunkelheit zubeißt und ihr Blut aussaugt."
          ultra_moon: "Frisches Blut von Menschen und Pokémon ist\nseine Nahrung. Ohne konstanten Nachschub\nwird es schwach und kann nicht mehr fliegen."
        es:
          ultra_sun: "Sus colmillos son tan afilados que su mordedura\nresulta indolora y puede chupar la sangre a sus\npresas en la oscuridad sin que se percaten."
          ultra_moon: "Se alimenta de sangre fresca de humanos y\nPokémon. Debe alimentarse constantemente o,\nde lo contrario, se vuelve débil y no puede volar."
        ko:
          ultra_sun: "이빨이 예리해서 어둠 속에서 물려\n피를 빨려도 통증이 없기 때문에\n금세 알아차리지 못한다."
          ultra_moon: "사람이나 포켓몬의 피가 먹이다.\n잠시만 피를 빨지 않아도\n약해져서 날지 못하게 되어 버린다."
        zh_simp:
          ultra_sun: "牙齿锋利，就算在黑暗中被它\n咬住吸血也不会感到疼痛，\n所以无法立刻发觉。"
          ultra_moon: "人和宝可梦的鲜血是其食物。\n只要不吸上一口，\n就会衰弱得无法飞行。"
        zh_trad:
          ultra_sun: "牙齒很銳利，就算在黑暗中被牠\n咬住吸血，也會因感覺不到疼痛\n而無法立刻發現。"
          ultra_moon: "主食是人和寶可夢的鮮血。\n只要一小段時間沒吸血，\n就會衰弱到無法飛行。"
chinchou:
  species_id: 170
  names:
    jp_kana: チョンチー
    jp_kanji: チョンチー
    en: Chinchou
    fr: Loupio
    it: Chinchou
    de: Lampi
