caterpie:
  species_id: 10
  names:
    jp_kana: キャタピー
    jp_kanji: キャタピー
    en: Caterpie
    fr: Chenipan
    it: Caterpie
    de: Raupy
    es: Caterpie
    ko: 캐터피
    zh_simp: 绿毛虫
    zh_trad: 綠毛蟲
  forms:
    caterpie:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 35
        special_attack: 20
        special_defense: 20
        speed: 45
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shield_dust
      hidden_ability: run_away
      descriptions:
        jp_kana:
          ultra_sun: "はやく　せいちょう　したいのか\nしょくよくおうせいで　１にちに\n１００まいの　はっぱを　くらう。"
          ultra_moon: "からだは　やわらかく　ちからもない。\nしぜんかいでは　つねに　エサとして\nねらわれ　つづける　うんめい。"
        jp_kanji:
          ultra_sun: "早く　成長　したいのか\n食欲旺盛で　１日に\n１００枚の　葉っぱを　食らう。"
          ultra_moon: "身体は　柔らかく　力もない。\n自然界では　常に　エサとして\n狙われ　続ける　運命。"
        en:
          ultra_sun: "Perhaps because it would like to grow up\nquickly, it has a voracious appetite, eating\na hundred leaves a day."
          ultra_moon: "Its body is soft and weak. In nature, its\nperpetual fate is to be seen by others as food."
        fr:
          ultra_sun: "C’est peut-être parce qu’il a envie de grandir\nle plus vite possible qu’il est si vorace.\nIl engloutit une centaine de feuilles par jour."
          ultra_moon: "Son corps est mou et sans force.\nLa nature semble l’avoir destiné à servir\nde proie aux autres Pokémon."
        it:
          ultra_sun: "Mangia 100 foglie al giorno. La sua voracità\npotrebbe essere dovuta al desiderio di crescere\nin fretta."
          ultra_moon: "Il suo corpo è molle e privo di forza.\nMolto spesso il suo destino in natura è\ndi cadere preda di altri Pokémon."
        de:
          ultra_sun: "Das nimmersatte Raupy verschlingt 100 Blätter\nam Tag. Vermutlich strebt es so ein schnelleres\nWachstum an."
          ultra_moon: "Sein weicher und schwacher Körper ist ein\nallseits beliebtes Futter. Es muss sich daher\nstets vor Angreifern in Acht nehmen."
        es:
          ultra_sun: "Muestra un apetito voraz, debido quizás a sus\nganas de acelerar su desarrollo. Puede llegar a\ndevorar un centenar de hojas al día."
          ultra_moon: "Su cuerpo es blando y carente de fuerza. Parece\nque la naturaleza lo hubiera destinado a servir\nde sustento a otros Pokémon."
        ko:
          ultra_sun: "빨리 성장하고 싶어서인지\n식욕이 왕성하여 하루에\n100장의 잎사귀를 먹는다."
          ultra_moon: "몸은 부드럽고 힘도 없다.\n자연계에서는 항상 먹이로\n노려지게 될 운명이다."
        zh_simp:
          ultra_sun: "或许是想要尽快长大，\n它的食欲非常旺盛，\n每天能吃掉１００片叶子。"
          ultra_moon: "身体软绵绵的，也没什么力气。\n在自然界，它的命运就是作为\n猎物而被不断捕食。"
        zh_trad:
          ultra_sun: "或許是為了讓自己快點成長，\n牠的食慾非常旺盛，\n每天要吃掉１００片樹葉。"
          ultra_moon: "身體柔軟，又沒什麼力氣。\n在自然界，牠的命運就是\n不斷被當成獵物來捕食。"
metapod:
  species_id: 11
  names:
    jp_kana: トランセル
    jp_kanji: トランセル
    en: Metapod
    fr: Chrysacier
    it: Metapod
    de: Safcon
    es: Metapod
    ko: 단데기
    zh_simp: 铁甲蛹
    zh_trad: 鐵甲蛹
  forms:
    metapod:
      form_id: 0
      base_stats:
        hp: 50
        attack: 20
        defense: 55
        special_attack: 25
        special_defense: 25
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
      egg_groups:
        - bug
      abilities:
        - shed_skin
      descriptions:
        jp_kana:
          ultra_sun: "カラのなかは　ドロドロの　えきたい。\nしんかに　そなえて　からだじゅうの\nさいぼうを　つくりなおしている。"
          ultra_moon: "とても　かたいカラは　ツツケラに\nつつかれても　びくともしないが\nゆれて　なかみが　こぼれてしまう。"
        jp_kanji:
          ultra_sun: "カラの中は　ドロドロの　液体。\n進化に　備えて　体中の\n細胞を　作りなおしている。"
          ultra_moon: "とても　硬いカラは　ツツケラに\n突かれても　びくともしないが\n揺れて　中身が　こぼれてしまう。"
        en:
          ultra_sun: "Its shell is filled with a thick liquid. All of the\ncells throughout its body are being rebuilt in\npreparation for evolution."
          ultra_moon: "Its hard shell doesn’t crack a bit even if Pikipek\npecks at it, but it will tip over, spilling out\nits insides."
        fr:
          ultra_sun: "Sa carapace contient un liquide gluant.\nSa structure cellulaire est en cours de\nmodification en vue de son évolution prochaine."
          ultra_moon: "Sa carapace est très solide et résiste sans\npeine aux assauts des Picassaut. Si elle bascule,\npar contre, son contenu s’éparpille au sol."
        it:
          ultra_sun: "La sua corazza contiene un liquido vischioso.\nRistruttura tutte le cellule del suo corpo\npreparandosi all’evoluzione."
          ultra_moon: "La sua dura corazza resiste anche alle beccate\ndei Pikipek ma, se oscilla troppo, il contenuto\npuò fuoriuscire."
        de:
          ultra_sun: "Sein Panzer birgt ein dickflüssiges Inneres.\nIn Vorbereitung auf seine Entwicklung wird seine\nZellstruktur vollständig umgestaltet."
          ultra_moon: "Ein Schnabelangriff von Peppeck kann Safcons\nhartem Panzer nichts anhaben, doch wenn es\nzu schaukeln beginnt, läuft sein Inneres aus."
        es:
          ultra_sun: "El interior del caparazón es un líquido viscoso.\nTodas las células de su cuerpo se están\nregenerando en preparación para su evolución."
          ultra_moon: "Su dura coraza resiste los picotazos de un\nPikipek, pero, si se agita mucho, su contenido\npuede verterse por el suelo."
        ko:
          ultra_sun: "껍질 안은 걸쭉한 액체다.\n진화를 대비하여 몸 전체의\n세포를 재구성하고 있다."
          ultra_moon: "매우 단단한 껍질은 콕코구리가\n쪼아도 꿈쩍도 하지 않지만 흔들림에\n약해서 내용물이 흘러나와 버린다."
        zh_simp:
          ultra_sun: "壳里面是黏糊糊的液体。\n为了准备迎接进化，\n正在不断地更新体内的细胞。"
          ultra_moon: "外壳非常坚硬，即使受到\n小笃儿的啄击也能安然无恙，\n但壳里的身体会因晃动而流出来。"
        zh_trad:
          ultra_sun: "殼裡面是黏糊糊的液體。\n為了準備迎接進化，\n正不斷更新全身的細胞。"
          ultra_moon: "外殼非常堅硬，就算被\n小篤兒啄到也能平安無事，\n但殼裡的身體會因為晃動而流出來。"
