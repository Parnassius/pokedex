      descriptions:
        jp_kana:
          ultra_sun: "かふんが　しめるので　あめが　きらい。\nくもゆきが　あやしくなると　きの\nうろで　じっとして　うごかなくなる。"
          ultra_moon: "しつどや　かざむき　から　てんこうを\nよそく　できる。　せいてんが　つづく\nときにしか　すがたを　みせないのだ。"
        jp_kanji:
          ultra_sun: "花粉が　湿るので　雨が　嫌い。\n雲行きが　怪しくなると　木の\nうろで　じっとして　動かなくなる。"
          ultra_moon: "湿度や　風向き　から　天候を\n予測　できる。　晴天が　続く\n時にしか　姿を　見せないのだ。"
        en:
          ultra_sun: "Rain makes pollen damp, so Ribombee hates\nrain. When it sees ominous clouds, it finds a\nhollow in a tree, where it waits stock-still."
          ultra_moon: "It can predict the weather from moisture levels\nand wind direction. Ribombee only reveals itself\nwhen there are a few clear days in a row."
        fr:
          ultra_sun: "Il déteste la pluie car elle mouille le pollen.\nQuand la météo se dégrade, il se cache alors\ndans le creux d’un arbre et attend sans bouger."
          ultra_moon: "Il peut prévoir le temps qu’il va faire grâce\nà l’humidité et à la direction du vent. Il ne pointe\nle bout de ses ailes que par beau temps."
        it:
          ultra_sun: "Odia la pioggia perché bagna il polline.\nSe il tempo si fa minaccioso, si infila nella cavità\ndi un albero e se ne resta lì fermo."
          ultra_moon: "Prevede che tempo farà dall’umidità e dalla\ndirezione del vento. Lo si vede in giro solo\ndurante i periodi di bel tempo stabile."
        de:
          ultra_sun: "Es hasst Regen, weil dadurch der Blütenstaub\nnass wird. Ziehen Regenwolken auf, versteckt\nes sich in Baumhöhlen und wartet regungslos."
          ultra_moon: "Es kann anhand der Luftfeuchtigkeit und der\nWindrichtung das Wetter vorhersagen. Es zeigt\nsich nur bei klarem Wetter."
        es:
          ultra_sun: "Odia la lluvia porque humedece el polen. Si en el\ncielo aparecen nubes amenazadoras, permanece\ninmóvil y expectante en el hueco de un árbol."
          ultra_moon: "Puede predecir las condiciones meteorológicas\nfijándose en la humedad y dirección del viento.\nSolo se avistan cuando reina el buen tiempo."
        ko:
          ultra_sun: "화분이 축축해져서 비를 싫어한다.\n구름의 움직임이 수상해지면\n나무 구멍에서 움직이지 않는다."
          ultra_moon: "습도나 바람의 방향으로 날씨를\n예측할 수 있다. 맑은 날씨가\n이어지는 때에만 모습을 보인다."
        zh_simp:
          ultra_sun: "因为花粉会湿，所以讨厌下雨。\n如果开始阴云密布了，\n就会静静地躲在树洞里不行动。"
          ultra_moon: "能够从湿度和风向预测天气状况。\n只有在持续晴天的时候才能\n看见它的样子。"
        zh_trad:
          ultra_sun: "討厭下雨，因為花粉會濕掉。\n當天上烏雲密佈的時候，\n牠會靜靜地躲在樹洞裡不動。"
          ultra_moon: "能從濕度及風向預測天氣。\n只有在天氣持續放晴的時候\n才能見到牠的身影。"
