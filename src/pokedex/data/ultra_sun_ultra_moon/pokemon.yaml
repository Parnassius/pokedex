        jp_kana:
          ultra_sun: "げんしじんが　すんでいた　ほらあなの\nかべに　ヤジロンらしき　ポケモンの\nすがたが　えがかれていた。"
          ultra_moon: "なかまを　みつけると　やかましく\nなきわめき　あつまる。　おおむかしの\nぼちから　たいりょうに　みつかる。"
        jp_kanji:
          ultra_sun: "原始人が　住んでいた　洞穴の\n壁に　ヤジロンらしき　ポケモンの\n姿が　描かれていた。"
          ultra_moon: "仲間を　見つけると　やかましく\n鳴きわめき　集まる。　大昔の\n墓地から　大量に　見つかる。"
        en:
          ultra_sun: "Depictions of Pokémon similar to Baltoy have\nbeen found on the walls of caves where\nprimitive humans lived."
          ultra_moon: "When they find others of their kind, they cry\nout loudly and gather together. Large numbers\nof them can be found in old graveyards."
        fr:
          ultra_sun: "Des esquisses de Pokémon ressemblant à des\nBalbuto ont été retrouvées dans des grottes\njadis habitées par des hommes préhistoriques."
          ultra_moon: "Quand il aperçoit des congénères, il les rejoint\nen émettant des sons stridents. On en a trouvé\nbeaucoup dans de très vieux cimetières."
        it:
          ultra_sun: "Nelle pareti delle grotte in cui vivevano gli uomini\nprimitivi sono state trovate raffigurazioni di\nPokémon simili ai Baltoy."
          ultra_moon: "Quando incontra i propri simili si unisce a loro\nformando un gruppo molto chiassoso. Ne sono\nstati trovati in gran numero in antichi cimiteri."
        de:
          ultra_sun: "In Höhlen, in denen Urmenschen lebten, gibt es\nWandmalereien von einem Pokémon, das wie\nPuppance aussieht."
          ultra_moon: "Wenn sie Artgenossen entdecken, versammeln\nsie sich und brüllen gemeinsam. Sie wurden\nzuhauf in alten Grabstätten gefunden."
        es:
          ultra_sun: "Los humanos de tiempos primitivos solían pintar\nen las cuevas donde habitaban siluetas muy\nparecidas a las de Baltoy."
          ultra_moon: "Al ver a más de los suyos, se juntan y emiten\nunos chillidos estridentes. Su presencia solía ser\nnumerosa en cementerios de gran antigüedad."
        ko:
          ultra_sun: "원시인이 살았던 동굴 벽에\n오뚝군으로 추정되는\n포켓몬의 모습이 그려져 있다."
          ultra_moon: "동료를 발견하면 시끄럽게\n울부짖으며 모인다. 오래된\n묘지에서 대량으로 발견된다."
        zh_simp:
          ultra_sun: "在原始人所居住的洞穴墙壁上，\n描绘着像是天秤偶的宝可梦的样子。"
          ultra_moon: "如果发现了伙伴，\n就会吵吵闹闹地叫唤着聚集。\n会大量出现在古代的墓地里。"
        zh_trad:
          ultra_sun: "在原始人居住的洞穴裡，\n可以看見牆壁上畫著\n像是天秤偶的寶可夢。"
          ultra_moon: "只要發現夥伴就會發出\n吵雜的叫聲聚集起來。\n會大量出沒在古代的墳場裡。"
claydol:
  species_id: 344
  names:
    jp_kana: ネンドール
    jp_kanji: ネンドール
    en: Claydol
    fr: Kaorine
    it: Claydol
    de: Lepumentas
    es: Claydol
    ko: 점토도리
    zh_simp: 念力土偶
    zh_trad: 念力土偶
  forms:
    claydol:
      form_id: 0
      base_stats:
        hp: 60
        attack: 70
        defense: 105
        special_attack: 70
        special_defense: 120
        speed: 75
      evs_yield:
        hp: 0
