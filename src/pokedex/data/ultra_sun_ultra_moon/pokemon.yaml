      types:
        - normal
        - fighting
      egg_groups:
        - field
      abilities:
        - fluffy
        - klutz
      hidden_ability: cute_charm
      descriptions:
        jp_kana:
          ultra_sun: "たいぼくも　へしおる　ちからじまん。\nおしりの　きかんから　においを　だし\nなかまと　コミュニケーションをとる。"
          ultra_moon: "だきしめられたり　さわられるのが\nだいきらい。　ジタバタ　あばれて\nていこうする　ちからは　ものすごい。"
        jp_kanji:
          ultra_sun: "大木も　へし折る　力自慢。\nおしりの　器官から　匂いを　出し\n仲間と　コミュニケーションをとる。"
          ultra_moon: "抱きしめられたり　触られるのが\n大嫌い。　ジタバタ　暴れて\n抵抗する　力は　ものすごい。"
        en:
          ultra_sun: "It boasts power enough to split large trees in\nhalf. The organ on its rear releases an odor that\nit uses to communicate with others of its kind."
          ultra_moon: "Stufful hates to be hugged or touched in any\nway. It will squirm, thrash, and resist with\namazing power."
        fr:
          ultra_sun: "Il est si fort qu’il peut abattre un grand arbre.\nL’odeur que dégage l’organe sur son derrière lui\npermet de communiquer avec ses semblables."
          ultra_moon: "Il déteste être touché ou pris dans les bras,\net se débat de toutes ses forces pour\nse dégager."
        it:
          ultra_sun: "Riesce a spezzare anche gli alberi più grossi.\nComunica con i suoi simili usando l’odore che\nemana da un organo che ha sul posteriore."
          ultra_moon: "Detesta profondamente essere toccato o\nabbracciato e resiste dibattendosi con tutta\nla sua incredibile forza."
        de:
          ultra_sun: "Es ist stark genug, um große Baumstämme zu\nzerbrechen. Über Düfte aus dem Organ am\nHinterteil kommuniziert es mit Artgenossen."
          ultra_moon: "Es hasst es, angefasst oder gar gedrückt zu\nwerden und wehrt sich dagegen, indem es mit\nunglaublicher Kraft wild um sich schlägt."
        es:
          ultra_sun: "Es capaz de derribar un árbol con su fuerza. Se\ncomunica con sus congéneres mediante el olor\nque emite el órgano de su parte posterior."
          ultra_moon: "Odia que lo toquen o lo abracen. Se resiste\nempleando toda su fuerza, que es considerable."
        ko:
          ultra_sun: "큰 나무도 꺽을 만큼 힘이 세다.\n엉덩이의 기관에서 냄새를 풍겨\n동료와 커뮤니케이션을 한다."
          ultra_moon: "껴안거나 만지는 것을\n아주 싫어한다. 바둥바둥 날뛰면서\n저항하는 힘이 굉장하다."
        zh_simp:
          ultra_sun: "以连大树都能折断的力量而自豪。\n从臀部的器官发出气味，\n与伙伴进行交流。"
          ultra_moon: "非常讨厌被抱住或是被碰触。\n手脚乱蹬挣扎抵抗的力气会非常大。"
        zh_trad:
          ultra_sun: "以連大樹都能折斷的力氣為傲。\n會從臀部的器官發出氣味，\n藉此與夥伴進行溝通。"
          ultra_moon: "非常討厭被抱住或是被觸摸。\n會手腳亂揮地掙扎，\n抵抗的力氣非常大。"
bewear:
  species_id: 760
  names:
    jp_kana: キテルグマ
    jp_kanji: キテルグマ
    en: Bewear
    fr: Chelours
    it: Bewear
    de: Kosturso
    es: Bewear
    ko: 이븐곰
    zh_simp: 穿着熊
    zh_trad: 穿著熊
  forms:
    bewear:
      form_id: 0
      base_stats:
        hp: 120
        attack: 125
        defense: 80
        special_attack: 55
        special_defense: 60
        speed: 60
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - fighting
      egg_groups:
        - field
      abilities:
        - fluffy
        - klutz
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          ultra_sun: "おおきく　てを　ふるのは　いかくと\nけいかいの　サイン。　いっこくも\nはやく　にげないと　いのちは　ない。"
          ultra_moon: "すさまじい　かいりきが　じまん。\nアローラちほうで　もっとも　きけんな\nポケモンと　よぶ　ひとも　おおい。"
        jp_kanji:
          ultra_sun: "大きく　手を　振るのは　威嚇と\n警戒の　サイン。　一刻も\n早く　逃げないと　命は　ない。"
          ultra_moon: "すさまじい　怪力が　自慢。\nアローラ地方で　もっとも　危険な\nポケモンと　呼ぶ　人も　多い。"
        en:
          ultra_sun: "It waves its hands wildly in intimidation and\nwarning. Life is over for anyone who doesn’t\nrun away as fast as possible."
          ultra_moon: "It boasts tremendous physical strength. Many\npeople call it the most dangerous Pokémon in\nthe Alola region."
        fr:
          ultra_sun: "Il fait de grands gestes avec ses pattes pour\nintimider et mettre en garde ses ennemis.\nMieux vaut alors prendre ses jambes à son cou !"
          ultra_moon: "Sa force colossale fait sa fierté. De nombreuses\npersonnes le considèrent comme le Pokémon\nle plus dangereux d’Alola."
        it:
          ultra_sun: "Agita energicamente le braccia in segno di\nminaccia o di avvertimento. L’unica via di\nscampo è darsela a gambe."
          ultra_moon: "Va fiero della propria forza smisurata.\nMolti ritengono che Bewear sia il Pokémon\npiù pericoloso di Alola."
        de:
          ultra_sun: "Wenn es wild mit seinen Armen wedelt, ist das\neine warnende Drohgebärde. Wem sein Leben\nlieb ist, sollte schleunigst die Flucht ergreifen."
          ultra_moon: "Es ist für seine immense Stärke bekannt. Viele\nhalten es für das gefährlichste Pokémon der\nAlola-Region."
        es:
          ultra_sun: "Agita violentamente los brazos como amenaza.\nQuien presencie este gesto debe huir en el acto\nsi aprecia su vida."
          ultra_moon: "Está orgulloso de su fuerza bruta. Son muchos\nlos que lo consideran el Pokémon más peligroso\nde Alola."
        ko:
          ultra_sun: "손을 크게 휘두르는 것은\n위협과 경계의 신호다. 재빨리\n도망치지 않으면 목숨을 보장할 수 없다."
          ultra_moon: "무시무시한 괴력을 자랑한다.\n알로라지방에서 가장 위험한\n포켓몬이라 부르는 사람도 많다."
        zh_simp:
          ultra_sun: "大幅度地挥手是威吓和警戒的信号。\n一刻也不能耽误，不逃就没命了。"
          ultra_moon: "以惊人的怪力而自豪。\n在阿罗拉地区也有很多人\n称之为最危险的宝可梦。"
        zh_trad:
          ultra_sun: "大動作的揮手是威嚇與警戒的信號。\n看見時一定要立刻逃走，\n不然可是會沒命的。"
          ultra_moon: "以驚人的怪力而自豪。\n在阿羅拉地區，也有很多人\n稱呼牠為最危險的寶可夢。"
bounsweet:
  species_id: 761
  names:
