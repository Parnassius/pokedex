          ultra_moon: "みたものに　へんしん　する。　ただし\nめのまえに　いないものの　ときは\nきおくしだいなので　しっぱいもする。"
        jp_kanji:
          ultra_sun: "どんなものにも　変身　できるが\nメタモンごとに　得意な　ものと\n苦手な　ものが　あるらしい。"
          ultra_moon: "見たものに　変身　する。　ただし\n目の前に　いないものの　ときは\n記憶次第なので　失敗もする。"
        en:
          ultra_sun: "While it can transform into anything, each Ditto\napparently has its own strengths and\nweaknesses when it comes to transformations."
          ultra_moon: "It transforms into whatever it sees. If the thing\nit’s transforming into isn’t right in front of it,\nDitto relies on its memory—so sometimes it fails."
        fr:
          ultra_sun: "Il peut prendre l’apparence de n’importe quoi,\nmais chaque Métamorph a son propre domaine\nde prédilection et ses propres faiblesses."
          ultra_moon: "Il prend la forme de ce qu’il voit. Lorsqu’il n’a\npas de modèle sous les yeux, il doit se fier à sa\nmémoire et le résultat laisse parfois à désirer."
        it:
          ultra_sun: "Ditto è in grado di assumere le sembianze di\nqualsiasi cosa. Ogni esemplare riesce meglio\nin alcune trasformazioni piuttosto che in altre."
          ultra_moon: "Si trasforma in qualsiasi cosa veda. Tuttavia,\nquando non ha di fronte il suo modello si affida\nalla memoria, e talvolta sbaglia."
        de:
          ultra_sun: "Ditto kann jede beliebige Gestalt annehmen,\nwobei aber jedes Exemplar individuelle\nStärken und Schwächen aufweist."
          ultra_moon: "Es kann sich in alles verwandeln, was es sieht.\nMuss es sich dabei aber auf sein Gedächtnis\nverlassen, macht es manchmal auch Fehler."
        es:
          ultra_sun: "Los Ditto pueden adoptar cualquier aspecto,\npero cada individuo tiene un objeto de imitación\nque se le da mejor que otros."
          ultra_moon: "Puede transformarse en cualquier cosa que vea,\npero, si intenta hacerlo de memoria, habrá\ndetalles que se le escapen."
        ko:
          ultra_sun: "뭐든지 변신할 수 있지만\n메타몽마다 잘하는 변신과\n잘 못하는 변신이 있다고 한다."
          ultra_moon: "본 적이 있는 것으로 변신한다.\n단 눈앞에 없는 것으로 변신할 때는\n기억에 따르기 때문에 실패하기도 한다."
        zh_simp:
          ultra_sun: "可以变身成任何东西，\n但好像每只百变怪都有着自己\n擅长和不擅长变形的东西。"
          ultra_moon: "会变身成它看到的东西。\n但对于不在眼前的东西，它只能靠\n记忆来变身，所以有时也会失败。"
        zh_trad:
          ultra_sun: "能夠變身成任何東西，\n但每隻百變怪似乎各自有\n擅長和不擅長變形的對象。"
          ultra_moon: "能變身成自己看過的東西。\n但當對象不在眼前時，因為只能\n靠記憶來變身，所以有時會失敗。"
eevee:
  species_id: 133
  names:
    jp_kana: イーブイ
    jp_kanji: イーブイ
    en: Eevee
    fr: Évoli
    it: Eevee
    de: Evoli
    es: Eevee
    ko: 이브이
    zh_simp: 伊布
    zh_trad: 伊布
  forms:
    eevee:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 50
        special_attack: 45
        special_defense: 65
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
