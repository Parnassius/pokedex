      descriptions:
        jp_kana:
          ultra_sun: "たいないに　すうひゃくリットルの\nどくえきを　ためている。　ＵＢと\nよばれる　せいぶつの　いっしゅ。"
          ultra_moon: "ウルトラビーストの　いっしゅ。\nどくばりから　ねんどが　たかく\nひかる　どくえきを　はっしゃする。"
        jp_kanji:
          ultra_sun: "体内に　数百リットルの\n毒液を　ためている。\nＵＢと　呼ばれる　生物の　一種。"
          ultra_moon: "ウルトラビーストの　一種。\n毒針から　粘度が　高く\n光る　毒液を　発射する。"
        en:
          ultra_sun: "It stores hundreds of liters of poisonous liquid\ninside its body. It is one of the organisms known\nas UBs."
          ultra_moon: "One kind of Ultra Beast, it fires a glowing,\nvenomous liquid from its needles. This liquid\nis also immensely adhesive."
        fr:
          ultra_sun: "Son corps contient des hectolitres de poison.\nIl fait partie de ces créatures que l’on nomme\n« Ultra-Chimères »."
          ultra_moon: "Cette Ultra-Chimère utilise son aiguillon pour\nsécréter un venin toxique, luisant et gluant."
        it:
          ultra_sun: "È una delle forme di vita note come\nUltracreature. Il suo corpo contiene\ncentinaia di litri di veleno."
          ultra_moon: "Una delle Ultracreature. Il luminoso liquido\ntossico che emette dagli aculei è caratterizzato\nda un’elevata viscosità."
        de:
          ultra_sun: "Eines der Lebewesen, die Ultrabestien genannt\nwerden. In seinem Körper bewahrt es Hunderte\nLiter giftiger Flüssigkeit auf."
          ultra_moon: "Diese Ultrabestie verschießt aus ihren\nGiftstacheln ein leuchtendes, dickflüssiges Gift."
        es:
          ultra_sun: "Una de las temibles criaturas conocidas como\nUltraentes. En su cuerpo almacena cientos\nde litros de veneno."
          ultra_moon: "Uno de los Ultraentes. Su aguijón segrega un\nlíquido tóxico cuya viscosidad le da una\napariencia brillante."
        ko:
          ultra_sun: "체내에 수백 리터의\n독액을 갖고 있다.\nUB라고 불리는 생물의 일종이다."
          ultra_moon: "울트라비스트의 일종.\n독침에서 점도가 높고\n빛나는 독액을 발사한다."
        zh_simp:
          ultra_sun: "体内储存着几百升的毒液。\n是被称为究极异兽的生物中的一种。"
          ultra_moon: "究极异兽中的一种。\n会从毒针发射出\n黏性很大又发光的毒液。"
        zh_trad:
          ultra_sun: "體內儲存著數百公升的毒液，\n是被稱為究極異獸的生物\n中的一種。"
          ultra_moon: "究極異獸的一種。\n會從毒針發射出\n黏度很高的發光毒液。"
