      types:
        - ground
        - dragon
      egg_groups:
        - bug
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ultra_sun: "はばたきで　すなあらしを　まきおこし\nそこに　ワルビアルを　ひそませる。\nつかまえた　えものは　わけあうぞ。"
          ultra_moon: "うつくしい　うたの　ような　はおとに\nこころを　うばわれて　さばくで\nそうなんする　ひとが　ぞくしゅつ。"
        jp_kanji:
          ultra_sun: "羽ばたきで　砂嵐を　巻き起こし\nそこに　ワルビアルを　潜ませる。\n捕まえた　獲物は　分け合うぞ。"
          ultra_moon: "美しい　歌の　ような　羽音に\n心を　奪われて　砂漠で\n遭難する　人が　続出。"
        en:
          ultra_sun: "By flapping their wings, Flygon cause\nsandstorms that conceal Krookodile.\nThe team then splits the prey they catch."
          ultra_moon: "People continue to have their hearts stolen by\nits enchanting songs and find themselves\nstranded in the desert."
        fr:
          ultra_sun: "D’un battement d’ailes, il provoque des\ntempêtes qui engloutissent les Crocorible.\nIl partage ses proies avec ses congénères."
          ultra_moon: "Il n’est pas rare que des gens se perdent dans\nle désert après avoir succombé au charme\ndu son mélodieux qu’il émet avec ses ailes."
        it:
          ultra_sun: "Sbattendo le ali, genera tempeste di sabbia in\ncui fa nascondere Krookodile, poi spartisce\ncon lui le prede catturate."
          ultra_moon: "Genera un suono simile a un canto melodioso\ncon le ali. Molti, incantati da questa melodia,\nfiniscono per smarrirsi nel deserto."
        de:
          ultra_sun: "Durch das Schlagen ihrer Flügel erzeugen sie\nSandstürme, von denen Rabigator erfasst\nwerden. Gefangene Beute teilen sie auf."
          ultra_moon: "Sein wie wunderschöner Gesang klingender\nFlügelschlag verzaubert Menschen und sorgt\nständig dafür, dass diese in der Wüste stranden."
        es:
          ultra_sun: "Al batir las alas levanta tormentas de arena en\nlas que se esconden los Krookodile, para luego\ncompartir las presas que cacen entre ambos."
          ultra_moon: "Muchas personas se han perdido en el desierto\ntras quedar cautivadas por el sonido que emite\nal batir las alas, semejante a una bella melodía."
        ko:
          ultra_sun: "날갯짓으로 모래바람을 일으켜\n그곳에 악비아르를 숨긴다.\n잡은 먹이는 나누어 갖는다."
          ultra_moon: "아름다운 노랫소리 같은 날갯소리에\n마음을 빼앗겨 사막에서\n조난당하는 사람이 속출한다."
        zh_simp:
          ultra_sun: "挥动翅膀卷起沙暴，\n让流氓鳄潜伏在那里。\n捉到的猎物会一起分享。"
          ultra_moon: "由于会被美丽歌声般的\n振翅声夺走心神，\n因此沙漠中不断有人遇难。"
        zh_trad:
          ultra_sun: "會拍動翅膀捲起沙暴，\n讓流氓鱷潛伏在裡面。\n捉到的獵物會一起分享。"
          ultra_moon: "不斷有人被牠如同\n美麗歌聲般的振翅聲迷住，\n因而在沙漠中遇難。"
