      types:
        - water
        - rock
      egg_groups:
        - water_1
        - water_2
      abilities:
        - swift_swim
        - rock_head
      hidden_ability: sturdy
      held_items:
        rare: deep_sea_scale
      descriptions:
        jp_kana:
          ultra_sun: "ぜつめつしたと　かんがえられていた。\nジーランスの　なは　はっけんしゃの\nなまえを　もじって　つけられた。"
          ultra_moon: "１おくねんかん　まったく　すがたが\nかわっていないのは　せいめい　として\nかんせい　されているから　らしい。"
        jp_kanji:
          ultra_sun: "絶滅したと　考えられていた。\nジーランスの　名は　発見者の\n名前を　もじって　つけられた。"
          ultra_moon: "１億年間　まったく　姿が\n変わっていないのは　生命　として\n完成　されているから　らしい。"
        en:
          ultra_sun: "Thought to have gone extinct, Relicanth was\ngiven a name that is a variation of the name of\nthe person who discovered it."
          ultra_moon: "The reason it hasn’t changed at all in a hundred\nmillion years is that it’s apparently already a\nperfect life-form."
        fr:
          ultra_sun: "On a longtemps cru son espèce disparue.\nSon nom serait une déformation du patronyme\nde la personne qui l’a découvert."
          ultra_moon: "On raconte que s’il n’a pas changé d’apparence\nen 100 millions d’années, c’est parce qu’il\na atteint le stade de forme de vie parfaite."
        it:
          ultra_sun: "Un tempo si credeva che si fosse estinto.\nPrende il nome dalla persona che lo ha\nscoperto."
          ultra_moon: "La sua forma è immutata da 100 milioni di anni\ne ciò sembra indicare che abbia raggiunto\nla perfezione."
        de:
          ultra_sun: "Es galt als ausgestorben. Der Name Relicanth\nist eine Abwandlung des Namens seines\nEntdeckers."
          ultra_moon: "Seine seit 100 Millionen Jahren unveränderte\nGestalt wird als Zeichen dafür gesehen, dass\nes eine vollendete Lebensform ist."
        es:
          ultra_sun: "Se creía que esta especie se había extinguido.\nLe pusieron su nombre, Relicanth, en honor a\nsu descubridor."
          ultra_moon: "La razón por la que su aspecto no ha cambiado\nun ápice durante 100 millones de años se debe,\nal parecer, a que es una forma de vida perfecta."
        ko:
          ultra_sun: "멸종되었고 여겨져 왔다.\n시라칸의 이름은 발견한\n사람의 이름을 따서 만들어졌다."
          ultra_moon: "1억년 동안 전혀 모습이\n바뀌지 않은 것은 생명체로서\n완성되었기 때문이라고 한다."
        zh_simp:
          ultra_sun: "曾被认为已经灭绝。\n古空棘鱼的名字是\n模仿发现者的名字而起的。"
          ultra_moon: "好像作为生命已是完成状态，\n所以在１亿年间，\n样子完全没有变化。"
        zh_trad:
          ultra_sun: "曾被認為已經絕種。\n古空棘魚名字的由來\n是取自發現者的名字。"
          ultra_moon: "之所以在１億年之間完全沒有\n外觀上的變化，似乎是因為牠的\n生命形式已經達到了完美境界。"
luvdisc:
  species_id: 370
  names:
    jp_kana: ラブカス
    jp_kanji: ラブカス
    en: Luvdisc
    fr: Lovdisc
    it: Luvdisc
    de: Liebiskus
    es: Luvdisc
    ko: 사랑동이
    zh_simp: 爱心鱼
    zh_trad: 愛心魚
  forms:
    luvdisc:
      form_id: 0
      base_stats:
        hp: 43
        attack: 30
        defense: 55
        special_attack: 40
        special_defense: 65
        speed: 97
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
