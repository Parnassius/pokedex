      descriptions:
        jp_kana:
          ultra_sun: "たよりない　ガスじょうの　からだは\nちょっとの　かぜにも　ながされるが\nぜんぜん　きにして　いない　ようす。"
          ultra_moon: "このせかいの　ポケモンかは　なぞ。\nピンチに　なると　ワープを　つかって\nあんぜんな　ばしょへ　みを　かくす。"
        jp_kanji:
          ultra_sun: "頼りない　ガス状の　身体は\nちょっとの　風にも　流されるが\n全然　気にして　いない　様子。"
          ultra_moon: "この世界の　ポケモンかは　謎。\nピンチに　なると　ワープを　使って\n安全な　場所へ　身を　隠す。"
        en:
          ultra_sun: "Even though its helpless, gaseous body can be\nblown away by the slightest breeze, it doesn’t\nseem to care."
          ultra_moon: "Whether or not it’s a Pokémon from this world\nis a mystery. When it’s in a jam, it warps away\nto a safe place to hide."
        fr:
          ultra_sun: "Son corps est composé d’un gaz très instable.\nIl se fait emporter par la moindre brise, mais\nn’a pas l’air de s’en soucier pour autant."
          ultra_moon: "Nul ne sait s’il vient vraiment de ce monde.\nEn cas de danger, il se téléporte vers un endroit\nsûr pour s’y cacher."
        it:
          ultra_sun: "Il suo corpo è formato da un gas instabile.\nPotrebbe volare via al minimo soffio di vento,\nma non sembra preoccuparsene."
          ultra_moon: "Non si sa se provenga da questo mondo.\nQuando è in pericolo, si teletrasporta in\nun luogo sicuro dove rimane nascosto."
        de:
          ultra_sun: "Da sein Körper aus Gas besteht, kann es schon\nvon einem leichten Luftzug weggeweht werden.\nAber das scheint ihm nichts auszumachen."
          ultra_moon: "Es ist unklar, ob es aus dieser Welt stammt oder\nnicht. Wenn es in Gefahr ist, teleportiert es sich\nan einen sicheren Ort und versteckt sich."
        es:
          ultra_sun: "Hasta la brisa más leve es capaz de arrastrar\nsu cuerpo, compuesto de una materia gaseosa\ninestable, pero no parece que eso le moleste."
          ultra_moon: "No está claro si es un Pokémon de este mundo.\nCuando está en apuros, se teletransporta a un\nlugar seguro donde esconderse."
        ko:
          ultra_sun: "의지할 곳 없는 가스 상태의 몸은\n약한 바람에도 휩쓸리지만,\n전혀 신경 쓰지 않는 듯하다."
          ultra_moon: "이 세계의 포켓몬인지는 의문이다.\n위험해지면 워프를 사용해서\n안전한 장소에 몸을 숨긴다."
        zh_simp:
          ultra_sun: "那不可靠的气体状身体\n只要稍微有点风就会被吹走，\n但却总是完全不在意的样子。"
          ultra_moon: "是否是这个世界的宝可梦\n尚且是个谜。在遇到危机的时候\n会使用空间跳跃，隐身去安全的地方。"
        zh_trad:
          ultra_sun: "不可靠的氣體狀身體\n只要稍微有點風就會被吹走，\n但牠看起來一點都不在意。"
          ultra_moon: "是否是這個世界的寶可夢還是個謎。\n在遇到危險的時候會使用空間跳躍，\n躲到安全的地方去。"
cosmoem:
  species_id: 790
  names:
    jp_kana: コスモウム
    jp_kanji: コスモウム
