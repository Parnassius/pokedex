      descriptions:
        jp_kana:
          ultra_sun: "こだいじんが　ろうどうりょく　として\nゴルーグを　はつめいしたといわれる。\nあるじの　めいれいに　ちゅうじつだ。"
          ultra_moon: "むねの　ふういんが　とけてしまうと\nみさかいなく　あばれまわって\nまちを　がれきの　やまに　かえる。"
        jp_kanji:
          ultra_sun: "古代人が　労働力　として\nゴルーグを　発明したといわれる。\n主の　命令に　忠実だ。"
          ultra_moon: "胸の　封印が　解けてしまうと\n見境なく　暴れまわって\n街を　がれきの　山に　変える。"
        en:
          ultra_sun: "Some say that ancient people invented Golurk\nto serve as a laborer. It follows its master’s\norders faithfully."
          ultra_moon: "When the seal on its chest is removed, it rages\nindiscriminately, turning the whole town around\nit into a mountain of rubble."
        fr:
          ultra_sun: "Il aurait été créé dans les temps anciens pour\nservir de bête de somme. La voix de son maître\nfait loi."
          ultra_moon: "Gare au sceau de sa poitrine ! S’il est brisé,\nGolemastoc perd le contrôle et charge avec\nfureur. Il peut alors raser une ville entière."
        it:
          ultra_sun: "Pare che sia stato creato dagli antichi per\naiutare nei lavori pesanti. Esegue gli ordini del\nsuo padrone senza battere ciglio."
          ultra_moon: "Se il sigillo che ha sul petto viene rimosso, perde\nil controllo e distrugge tutto ciò che incontra,\nriducendo intere città in macerie."
        de:
          ultra_sun: "Es heißt, Golgantes sei von einem alten Volk\nerschaffen worden, um diesem als Arbeiter zu\ndienen. Deshalb befolgt es ergeben Befehle."
          ultra_moon: "Löst sich das Siegel auf seiner Brust, gerät es\nvöllig außer Kontrolle und legt ganze Städte in\nSchutt und Asche."
        es:
          ultra_sun: "Se dice que fue creado en la antigüedad para\nusarlo como mano de obra. Acata las órdenes\nde su amo sin rechistar."
          ultra_moon: "Si se le desprende el sello del pecho, pierde el\ncontrol y arrasa con todo sin miramientos: puede\nconvertir un pueblo en un montón de escombros."
        ko:
          ultra_sun: "고대인이 노동력으로 활용하기 위해\n골루그를 발명했다고 전해진다.\n주인의 명령에 충실하다."
          ultra_moon: "가슴에 있는 봉인이 풀리면\n무작정 날뛰고 다니면서\n마을을 벽돌 더미로 만들어 버린다."
        zh_simp:
          ultra_sun: "据说，古代人发明了\n泥偶巨人作为他们的劳动力。\n它很忠实于主人的命令。"
          ultra_moon: "胸口的封印如果解开，\n就会不管不顾地横冲直撞，\n把街道都变成瓦砾堆。"
        zh_trad:
          ultra_sun: "據說古代人發明泥偶巨人\n是為了當成勞動力來使用。\n牠會忠實遵從主人的命令。"
          ultra_moon: "胸口的封印一旦解開\n就會不顧一切地四處大鬧，\n把街道全都化成瓦礫堆。"
