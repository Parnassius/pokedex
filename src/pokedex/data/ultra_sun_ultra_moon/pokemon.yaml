      types:
        - poison
      egg_groups:
        - undiscovered
      abilities:
        - beast_boost
      descriptions:
        jp_kana:
          ultra_sun: "いせかいに　おいては　たびだちの\nパートナーに　えらばれるほど\nしたしまれている　ウルトラビースト。"
          ultra_moon: "いせかいに　すむ　ウルトラビースト。\nあたまの　どくばりから　どくえきを\nあいてに　かけて　ケラケラ　わらう。"
        jp_kanji:
          ultra_sun: "異世界に　おいては　旅立ちの\nパートナーに　選ばれるほど\n親しまれている　ウルトラビースト。"
          ultra_moon: "異世界に　棲む　ウルトラビースト。\n頭の　毒針から　毒液を\n相手に　かけて　ケラケラ　笑う。"
        en:
          ultra_sun: "This Ultra Beast is well enough liked to be\nchosen as a first partner in its own world."
          ultra_moon: "An Ultra Beast that lives in a different world, it\ncackles wildly as it sprays its opponents with\npoison from the needles on its head."
        fr:
          ultra_sun: "Dans son monde, cette Ultra-Chimère est fort\nappréciée pour son naturel conciliant, qui fait\nd’elle un compagnon de voyage idéal."
          ultra_moon: "Cette Ultra-Chimère venue d’un autre monde\nricane lorsqu’elle asperge ses proies de venin\ngrâce au dard qu’elle a sur la tête."
        it:
          ultra_sun: "Un’Ultracreatura talmente socievole da essere\nspesso scelta come compagno di viaggio nel\nmondo da cui proviene."
          ultra_moon: "Un’Ultracreatura che vive in un altro mondo.\nSghignazza felice quando avvelena gli avversari\ncon il pungiglione che ha sul capo."
        de:
          ultra_sun: "Diese Ultrabestie wird in der Welt, aus der sie\nkommt, so gemocht, dass sie oft als Partner für\nReisen gewählt wird."
          ultra_moon: "Diese Ultrabestie aus einer anderen Welt\nbesprüht Gegner laut lachend mit einer giftigen\nFlüssigkeit aus den Stacheln auf ihrem Kopf."
        es:
          ultra_sun: "En su mundo, este Ultraente se considera tan\nentrañable como para ser elegido compañero de\nviaje."
          ultra_moon: "Un Ultraente originario de otro mundo. Se burla\ndel oponente mientras lo rocía de veneno con el\naguijón que tiene en la cabeza."
        ko:
          ultra_sun: "다른 세계에서는 여행\n파트너로 삼을 정도로\n친근한 울트라비스트다."
          ultra_moon: "다른 세계에 사는 울트라비스트.\n머리의 독침에서 나온 독액을\n상대에게 끼얹고 깔깔 웃는다."
        zh_simp:
          ultra_sun: "在异世界是亲切的究极异兽，\n甚至能被选为踏上旅程的同伴。"
          ultra_moon: "栖息在异世界的究极异兽。\n会从头部的毒针朝对手\n喷出毒液，咯咯咯大笑。"
        zh_trad:
          ultra_sun: "在異世界是人們十分熟悉的\n究極異獸，有時甚至會被選為\n踏上旅程時的夥伴。"
          ultra_moon: "棲息在異世界的究極異獸。\n會從頭上的毒針朝對手\n噴出毒液，然後放聲大笑。"
