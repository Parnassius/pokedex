      descriptions:
        jp_kana:
          ultra_sun: "かおのホネが　でかくて　かたいので\nふくげんが　せいこう　するまで\nせぼねと　かんちがい　されていた。"
          ultra_moon: "やく１おくねんまえの　ポケモン。\nおそろしく　がんじょうな　かおは\nこうてついじょうの　こうどを　もつ。"
        jp_kanji:
          ultra_sun: "顔の骨が　でかくて　硬いので\n復元が　成功するまで\n背骨と　勘違い　されていた。"
          ultra_moon: "約１億年前の　ポケモン。\n恐ろしく　頑丈な　顔は\n鋼鉄以上の　硬度を　持つ。"
        en:
          ultra_sun: "The bones of its face are huge and hard, so\nthey were mistaken for its spine until after this\nPokémon was successfully restored."
          ultra_moon: "This Pokémon is from roughly 100 million years\nago. Its terrifyingly tough face is harder\nthan steel."
        fr:
          ultra_sun: "Jusqu’à ce qu’on reconstitue ce Pokémon avec\nsuccès, on prenait les grands os solides qui\ncouvrent son visage pour sa colonne vertébrale."
          ultra_moon: "Un Pokémon éteint depuis environ 100 millions\nd’années. Sa tête incroyablement solide était\nplus dure que l’acier."
        it:
          ultra_sun: "Prima che venisse rigenerato si riteneva\nerroneamente che le grandi e solide ossa\ndel muso facessero parte del dorso."
          ultra_moon: "Questo Pokémon esisteva 100 milioni di anni fa.\nIl suo muso, incredibilmente resistente, può\nessere persino più duro dell’acciaio."
        de:
          ultra_sun: "Als man Fossilien noch nicht zurückverwandeln\nkonnte, war man der Ansicht, sein großer, harter\nGesichtsknochen sei sein Rücken."
          ultra_moon: "Dieses Pokémon lebte vor etwa 100 Millionen\nJahren. Sein unglaublich robustes Gesicht ist\nhärter als Stahl."
        es:
          ultra_sun: "Hasta que no se regeneró por completo a este\nPokémon, se pensaba que los grandes y recios\nhuesos de su rostro eran su columna vertebral."
          ultra_moon: "Un Pokémon con una antigüedad de unos cien\nmillones de años. Su rostro posee una dureza\nimpresionante, superior incluso a la del acero."
        ko:
          ultra_sun: "얼굴의 뼈가 크고 딱딱해서\n복원에 성공할 때까지\n등뼈라고 잘못 알려져 있었다."
          ultra_moon: "약 1억 년 전의 포켓몬이다.\n무섭게 튼튼한 얼굴은\n강철 이상의 경도를 가졌다."
        zh_simp:
          ultra_sun: "脸部的骨头又大又硬，\n所以在复原成功前，\n一直被错误地认作了脊椎。"
          ultra_moon: "大约１亿年前的宝可梦。\n极其结实的脸有着超越钢铁的硬度。"
        zh_trad:
          ultra_sun: "臉部的骨頭又大又硬，\n所以在復原成功之前\n一直被誤認為是脊椎骨。"
          ultra_moon: "大約１億年前的寶可夢。\n結實到極點的臉擁有\n超越鋼鐵的硬度。"
