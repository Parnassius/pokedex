skrelp:
  species_id: 690
  names:
    jp_kana: クズモー
    jp_kanji: クズモー
    en: Skrelp
    fr: Venalgue
    it: Skrelp
    de: Algitt
    es: Skrelp
    ko: 수레기
    zh_simp: 垃垃藻
    zh_trad: 垃垃藻
  forms:
    skrelp:
      form_id: 0
      base_stats:
        hp: 50
        attack: 60
        defense: 60
        special_attack: 60
        special_defense: 60
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - poison
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - poison_point
        - poison_touch
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          ultra_sun: "もくずに　まぎれ　おおきなポケモンに\nおそわれないよう　じっと　している。\nくさった　かいそうが　おもな　エサ。"
          ultra_moon: "およぐのが　ヘタなので　もくずに\nまきついている。　アローラちほうでは\nダダリンの　そばで　よく　みつかる。"
        jp_kanji:
          ultra_sun: "藻屑に　紛れ　大きなポケモンに\n襲われないよう　じっと　している。\n腐った　海草が　主な　エサ。"
          ultra_moon: "泳ぐのが　下手なので　藻屑に\n巻きついている。　アローラ地方では\nダダリンの　そばで　よく　見つかる。"
        en:
          ultra_sun: "It vanishes into seaweed and remains perfectly\nstill to avoid attacks from large Pokémon.\nRotten seaweed is its main food source."
          ultra_moon: "It’s not good at swimming, so it clings to the\nseaweed. In the Alola region, it’s often found\nnear Dhelmise."
        fr:
          ultra_sun: "Il reste tapi au fond des océans, à l’abri des\nplus gros Pokémon. Il se nourrit principalement\nd’algues pourries."
          ultra_moon: "Comme il n’est pas très bon nageur, il se\ncontente de s’entortiller autour des algues.\nÀ Alola, on le trouve souvent près de Sinistrail."
        it:
          ultra_sun: "Si nasconde immobile tra la vegetazione marina\nper sfuggire ai Pokémon più grandi. Si nutre\nprevalentemente di alghe in decomposizione."
          ultra_moon: "È un pessimo nuotatore e preferisce restare\navvinghiato alle alghe. Nella regione di Alola\nlo si trova spesso al fianco di Dhelmise."
        de:
          ultra_sun: "Es versteckt sich regungslos zwischen Algen,\num Angriffe von großen Pokémon zu vermeiden.\nVerfaulter Seetang ist seine bevorzugte Speise."
          ultra_moon: "Es wickelt sich um treibende Algenfetzen, da es\nein schlechter Schwimmer ist. In Alola sieht man\nes oft Seite an Seite mit Moruda."
        es:
          ultra_sun: "Permanece escondido e inmóvil entre las algas\npara protegerse de Pokémon más grandes. Su\nprincipal sustento son las algas podridas."
          ultra_moon: "Sus dotes para el nado dejan que desear y se\nenrolla en las algas. En la región de Alola se le\nsuele ver acompañando a Dhelmise."
        ko:
          ultra_sun: "수초 찌꺼기로 뒤범벅을 하고 큰 포켓몬에게\n공격당하지 않도록 가만히 있다.\n썩은 해초가 주요 먹이다."
          ultra_moon: "헤엄을 잘 못 치기 때문에 해초를\n휘감고 있다. 알로라지방에서는\n타타륜 주변에서 자주 발견된다."
        zh_simp:
          ultra_sun: "同碎藻混杂在一起，为了不被\n大型宝可梦袭击，一直一动不动的。\n以腐烂的海藻为主要食物。"
          ultra_moon: "因为不擅长游泳，\n所以会缠住碎藻。在阿罗拉地区，\n经常能在破破舵轮旁边发现它。"
        zh_trad:
          ultra_sun: "為了不被大型寶可夢襲擊，\n總是混在海藻屑裡動也不動。\n主要的食物是腐爛的海草。"
          ultra_moon: "因為不擅長游泳，所以會纏在\n海藻碎屑上。在阿羅拉地區，\n經常可以在破破舵輪旁邊看見牠。"
dragalge:
  species_id: 691
  names:
    jp_kana: ドラミドロ
    jp_kanji: ドラミドロ
    en: Dragalge
    fr: Kravarech
    it: Dragalge
    de: Tandrak
    es: Dragalge
    ko: 드래캄
    zh_simp: 毒藻龙
    zh_trad: 毒藻龍
  forms:
    dragalge:
      form_id: 0
      base_stats:
        hp: 65
        attack: 75
        defense: 90
        special_attack: 97
        special_defense: 123
        speed: 44
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - poison
        - dragon
      egg_groups:
        - water_1
        - dragon
      abilities:
        - poison_point
        - poison_touch
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          ultra_sun: "きょうぼうで　よってきた　あいてに\nどくえきを　ふきかける。　なぜだか\nダダリンとだけは　とっても　なかよし。"
          ultra_moon: "かいそうに　まぎれて　えものを　まち\nきんぞくを　とかすほどの　どくえきを\nふきかけて　しとめるのだ。"
        jp_kanji:
          ultra_sun: "凶暴で　寄ってきた　相手に\n毒液を　吹きかける。　なぜだか\nダダリンとだけは　とっても　仲良し。"
          ultra_moon: "海藻に　まぎれて　獲物を　待ち\n金属を　溶かすほどの　毒液を\n吹きかけて　仕留めるのだ。"
        en:
          ultra_sun: "This vicious Pokémon sprays a poisonous liquid\non opponents that come near. For whatever\nreason, it gets along really well with Dhelmise."
          ultra_moon: "It blends in with seaweed to ambush its prey\nand then takes them down with a poisonous\nliquid strong enough to melt metal."
        fr:
          ultra_sun: "Les étourdis qui divaguent du côté de chez lui\nse font chasser à grands jets de poison.\nCurieusement, il adore Sinistrail."
          ultra_moon: "Il attend sa proie tapi au milieu des algues,\net attaque en crachant un poison si corrosif\nqu’il peut même dissoudre le métal."
        it:
          ultra_sun: "È spietato e spruzza un liquido velenoso sui\nPokémon ostili che gli si avvicinano. Per qualche\nstrano motivo, va d’accordo solo con Dhelmise."
          ultra_moon: "Aspetta la preda nascosto tra le alghe e\nl’attacca spruzzandole addosso un liquido\naltamente corrosivo che scioglie anche il metallo."
        de:
          ultra_sun: "Ein boshaftes Pokémon, das alle, die sich ihm\nnähern, mit Gift bespritzt. Einzig mit Moruda\nversteht es sich aus unbekannten Gründen gut."
          ultra_moon: "Es versteckt sich in Algen und lauert dort seiner\nBeute auf. Diese greift es mit einem Gift an, das\nselbst Metall zum Schmelzen bringt."
        es:
          ultra_sun: "Este violento Pokémon escupe veneno a los\nrivales que se le acercan. Sin embargo, por algún\nextraño motivo, se lleva muy bien con Dhelmise."
          ultra_moon: "Se esconde entre las algas y espera a sus\npresas, a las cuales rocía con un veneno tan\ncáustico que puede derretir hasta el metal."
        ko:
          ultra_sun: "매우 흉포해서, 다가온 상대에게\n독액을 내뿜는다. 무슨 이유에서인지\n타타륜과만 매우 사이가 좋다."
          ultra_moon: "해조와 뒤섞여서 먹이를 기다렸다\n금속을 녹일 정도의 독액을\n내뿜어서 처리한다."
        zh_simp:
          ultra_sun: "性格粗暴，会朝靠近的对手\n喷出毒液。不知为何，\n只和破破舵轮关系非常好。"
          ultra_moon: "混在海藻里，等待着猎物，\n会喷出连金属都能溶解的毒液，\n给猎物致命一击。"
        zh_trad:
          ultra_sun: "性情兇暴，會對靠近自己的對手\n噴出毒液。不知為何就只跟\n破破舵輪關係非常親密。"
          ultra_moon: "混在海藻裡等待獵物上門。\n會噴出連金屬都能溶解的毒液，\n給獵物致命一擊。"
clauncher:
  species_id: 692
  names:
    jp_kana: ウデッポウ
    jp_kanji: ウデッポウ
    en: Clauncher
    fr: Flingouste
    it: Clauncher
    de: Scampisto
    es: Clauncher
    ko: 완철포
    zh_simp: 铁臂枪虾
    zh_trad: 鐵臂槍蝦
  forms:
    clauncher:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 62
        special_attack: 58
        special_defense: 63
