      descriptions:
        jp_kana:
          ultra_sun: "ほそく　ながい　つばさ。　じょうしょう\nきりゅうに　のって　グライダーの\nように　おおぞらに　まいあがるのだ。"
          ultra_moon: "うみべの　がけに　すをつくる。\nだいこうぶつの　ヨワシを　さがし\nうみの　うえを　せんかい　している。"
        jp_kanji:
          ultra_sun: "細く　長い　翼。　上昇\n気流に　乗って　グライダーの\nように　大空に　舞い上がるのだ。"
          ultra_moon: "海辺の　崖に　巣を作る。\n大好物の　ヨワシを　探し\n海の　上を　旋回　している。"
        en:
          ultra_sun: "With its long, thin wings, it catches updrafts\nand flies like a glider high up into the sky."
          ultra_moon: "It builds nests in cliffs by the sea. It circles the\nskies above the ocean looking for its favorite\nfood—Wishiwashi."
        fr:
          ultra_sun: "Grâce à ses ailes longues et fines, il se laisse\nporter par les courants ascendants pour planer\njusqu’au firmament."
          ultra_moon: "Il fait son nid sur les falaises du littoral\net survole la mer en cercle à la recherche\nde son mets favori : les petits Froussardine."
        it:
          ultra_sun: "Grazie alle ali lunghe e strette, vola in alto\nlasciandosi trasportare dalle correnti\nascensionali come un aliante."
          ultra_moon: "Fa il nido sulle rocce a picco lungo la costa.\nVola sul mare in cerca delle sue prede preferite,\ni Wishiwashi."
        de:
          ultra_sun: "Seine Flügel sind lang und schmal. Es nutzt die\nAufwinde, um wie ein Segelflugzeug hoch in den\nHimmel emporzusteigen."
          ultra_moon: "Es baut sein Nest auf steilen Klippen und kreist\nüber dem Meer auf der Suche nach Lusardin,\nseiner Lieblingsspeise."
        es:
          ultra_sun: "Tiene alas largas y finas. Se deja llevar por las\ncorrientes ascendentes y luego planea a alta\ncota grácilmente."
          ultra_moon: "Anida en los riscos junto a la costa y sobrevuela\nel mar trazando círculos en busca de algún\nWishiwashi que llevarse al buche."
        ko:
          ultra_sun: "가늘고 긴 날개다. 상승 기류를\n타고 글라이더처럼\n넓은 하늘로 높이 떠오른다."
          ultra_moon: "바닷가 절벽에 둥지를 짓는다.\n가장 좋아하는 약어리를 찾아\n바다 위를 선회하고 있다."
        zh_simp:
          ultra_sun: "翅膀又细又长。\n能乘着上升气流，\n像滑翔机一样在空中翱翔。"
          ultra_moon: "在海边的悬崖上筑巢。\n会在海上盘旋，\n寻找它非常爱吃的弱丁鱼。"
        zh_trad:
          ultra_sun: "翅膀又細又長，\n能乘著上升氣流，\n像滑翔機一般飛上天空。"
          ultra_moon: "在海邊的懸崖上築巢。\n會在海上盤旋，尋找牠\n最愛吃的弱丁魚。"
pelipper:
  species_id: 279
  names:
    jp_kana: ペリッパー
    jp_kanji: ペリッパー
    en: Pelipper
