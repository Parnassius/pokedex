    es: Tropius
    ko: 트로피우스
    zh_simp: 热带龙
    zh_trad: 熱帶龍
  forms:
    tropius:
      form_id: 0
      base_stats:
        hp: 99
        attack: 68
        defense: 83
        special_attack: 72
        special_defense: 87
        speed: 51
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
        - flying
      egg_groups:
        - monster
        - grass
      abilities:
        - chlorophyll
        - solar_power
      hidden_ability: harvest
      descriptions:
        jp_kana:
          ultra_sun: "アローラにすむ　トロピウスの　くびに\nみのる　フサは　ほかの　ちほうより\nかくべつに　あまくて　もうさいこう。"
          ultra_moon: "くびの　フサが　おいしくて　にんき。\nあたたかい　とちには　トロピウスを\nそだてる　ぼくじょうが　たくさん。"
        jp_kanji:
          ultra_sun: "アローラに棲む　トロピウスの　首に\n実る　フサは　他の　地方より\n格別に　甘くて　もう最高。"
          ultra_moon: "首の　フサが　美味しくて　人気。\n暖かい　土地には　トロピウスを\n育てる　牧場が　たくさん。"
        en:
          ultra_sun: "The bunches of fruit growing around the necks\nof Tropius in Alola are especially sweet\ncompared to those in other regions."
          ultra_moon: "Bunches of delicious fruit grow around its neck.\nIn warm areas, many ranches raise Tropius."
        fr:
          ultra_sun: "Les fruits qui poussent sur le cou des Tropius\nd’Alola sont si doux qu’ils surclassent ceux\ndes autres régions."
          ultra_moon: "Dans les régions où il fait chaud, on trouve des\nfermes dédiées à l’élevage de ce Pokémon, très\napprécié pour les fruits poussant sur son cou."
        it:
          ultra_sun: "I grappoli di frutti che crescono attorno al collo\ndei Tropius che vivono ad Alola sono più dolci e\nprelibati di quelli degli esemplari di altre regioni."
          ultra_moon: "Molti amano i grappoli di frutti che crescono\nattorno al collo di Tropius. Nelle regioni calde,\ndiversi pascoli sono riservati a questo Pokémon."
        de:
          ultra_sun: "Die Früchte, die am Hals der in Alola lebenden\nTropius hängen, sind die besten, denn sie sind\nsüßer als die in anderen Regionen."
          ultra_moon: "Die leckeren Früchte an seinem Hals sind sehr\nbeliebt. In warmen Gebieten gibt es viele\nFarmen, auf denen Tropius gezüchtet werden."
        es:
          ultra_sun: "Los frutos que crecen en el cuello del Tropius de\nla región de Alola son mucho más dulces y ricos\nque los de otros lugares."
          ultra_moon: "A la gente le encanta la deliciosa fruta de sus\nracimos. En las regiones cálidas abundan las\ngranjas que se dedican a criar Tropius."
        ko:
          ultra_sun: "알로라에 사는 트로피우스는\n다른 지방에 비해 목에 열리는\n송이가 특히 달콤하고 맛있다."
          ultra_moon: "목에 난 송이는 맛있어서 인기다.\n따뜻한 장소에는 트로피우스를\n키우는 목장이 많다."
        zh_simp:
          ultra_sun: "栖息在阿罗拉的热带龙\n脖子里结的那串水果比其他地区的\n甜得多，是最最棒的。"
          ultra_moon: "脖子上的那串水果很美味，\n很受欢迎。在温暖的地方，\n有许多培育热带龙的牧场。"
        zh_trad:
          ultra_sun: "棲息在阿羅拉的熱帶龍\n脖子上的果實比其他地區的更甜，\n簡直美味到了極點。"
          ultra_moon: "脖子上的美味水果很受歡迎。\n在溫暖的地區有很多\n養殖熱帶龍的牧場。"
