      descriptions:
        jp_kana:
          ultra_sun: "さらに　すぐれた　ずのうに　なった。\nその　けっかの　たたかいは　めを\nおおいたくなるほど　れいこくだ。"
          ultra_moon: "かてないと　はんだんすると　ツメで\nあいてを　つかみ　だいばくはつの\nカウントを　はじめるぞ。"
        jp_kanji:
          ultra_sun: "更に　優れた　頭脳に　なった。\nその　結果の　戦いは　目を\n覆いたくなるほど　冷酷だ。"
          ultra_moon: "勝てないと　判断すると　ツメで\n相手を　つかみ　大爆発の\nカウントを　始めるぞ。"
        en:
          ultra_sun: "Its intellect surpasses its previous level,\nresulting in battles so cruel, they’ll make\nyou want to cover your eyes."
          ultra_moon: "When it knows it can’t win, it digs the claws\non its legs into its opponent and starts the\ncountdown to a big explosion."
        fr:
          ultra_sun: "Ses cerveaux exceptionnels se sont encore\naméliorés, et son intelligence le pousse à faire\npreuve d’une cruauté insoutenable en combat."
          ultra_moon: "Quand il voit qu’il ne peut pas gagner, il attrape\nson adversaire avec ses griffes et lance\nle compte à rebours avant explosion."
        it:
          ultra_sun: "La megaevoluzione ha sviluppato ulteriormente\nla sua intelligenza, di cui si serve per lottare\ncon freddezza e crudeltà inaudite."
          ultra_moon: "Quando sa di non poter più vincere, afferra\nil nemico con gli artigli e fa partire il conto\nalla rovescia che innesca l’esplosione."
        de:
          ultra_sun: "Durch die Zunahme seiner Hirnkapazität wurde\nsein Kampfstil derart schonungslos, dass man\neinfach nur wegschauen möchte."
          ultra_moon: "Hält es die Lage für aussichtslos, nagelt es den\nGegner mit seinen Beinkrallen fest und startet\neinen Countdown, der in einer Explosion endet."
        es:
          ultra_sun: "Tras la megaevolución, su inteligencia aumenta\naún más, lo que le lleva a luchar con tal\natrocidad que hasta da miedo mirar."
          ultra_moon: "Si prevé su derrota, atrapa al oponente con las\ngarras de sus extremidades y provoca una\ngran explosión."
        ko:
          ultra_sun: "두뇌가 더욱 명석해졌다.\n그 결과, 싸움은 차마\n눈 뜨고 볼 수 없을 정도로 냉혹하다."
          ultra_moon: "이길 수 없다고 판단하면 발톱으로\n상대를 붙잡고 대폭발의\n카운트를 시작한다."
        zh_simp:
          ultra_sun: "它的头脑变得更优秀了。\n其结果令战斗变得冷酷得惨不忍睹。"
          ultra_moon: "如果判断自己无法战胜，\n就会用爪子抓住对手，\n开始大爆炸的倒计时。"
        zh_trad:
          ultra_sun: "頭腦變得更加優秀了。\n結果使得牠的戰鬥\n冷酷到令人不忍卒睹。"
          ultra_moon: "如果判斷自己無法獲勝，\n就會用爪子抓住對手，\n開始大爆炸的倒數計時。"
