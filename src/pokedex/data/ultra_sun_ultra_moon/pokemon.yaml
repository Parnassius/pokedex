      descriptions:
        jp_kana:
          ultra_sun: "ハネを　しんどうさせ　ちょうおんぱを\nはなつ。　きぜつした　えものを　すなの\nなかに　いきうめにして　ほぞんする。"
          ultra_moon: "ハネを　しんどうさせ　おんぱを\nはっせいさせる。　いっしょに　いる\nトレーナーは　みみせんが　ひつよう。"
        jp_kanji:
          ultra_sun: "ハネを　振動させ　超音波を\n放つ。　気絶した　獲物を　砂の\n中に　生き埋めにして　保存する。"
          ultra_moon: "ハネを　振動させ　音波を\n発生させる。　一緒に　いる\nトレーナーは　耳栓が　必要。"
        en:
          ultra_sun: "It vibrates its wings to generate ultrasonic\nwaves, causing its prey to faint. Then it buries\nthe prey alive in the sand to preserve it."
          ultra_moon: "It vibrates its wings to send out odd sound\nwaves. Trainers who are with it need earplugs."
        fr:
          ultra_sun: "Il émet des ultrasons avec ses ailes pour\nassommer ses proies, puis les ensable vivantes\npour les conserver."
          ultra_moon: "Il émet de puissantes ondes sonores en battant\ndes ailes, aussi est-il recommandé à son\nDresseur de se protéger les tympans."
        it:
          ultra_sun: "Grazie agli ultrasuoni che produce con le\nvibrazioni delle ali, fa svenire le prede e le\nseppellisce nella sabbia per conservarle."
          ultra_moon: "Genera strane onde acustiche con le vibrazioni\ndelle ali. Gli Allenatori devono proteggersi le\norecchie con dei tappi."
        de:
          ultra_sun: "Durch die Vibration seiner Flügel erzeugt es\nUltraschallwellen. Es vergräbt bewusstlose\nBeute im Sand, um sie zu konservieren."
          ultra_moon: "Es lässt seine Flügel vibrieren, um dadurch\nbizarre Schallwellen zu erzeugen. Seine Trainer\nbrauchen Ohrstöpsel."
        es:
          ultra_sun: "Emite ondas ultrasónicas cuando hace vibrar\nsus alas. Entierra bajo la arena a las presas que\nha dejado inconscientes para conservarlas."
          ultra_moon: "Genera raras ondas sónicas batiendo las alas.\nEl estruendo es tal que sus Entrenadores\nnecesitan tapones para los oídos."
        ko:
          ultra_sun: "날개를 진동시켜 초음파를 발산한다.\n기절한 먹이를 모래 속에\n산 채로 묻어 저장한다."
          ultra_moon: "날개를 진동시켜서 음파를\n발생시킨다. 함께 있는\n트레이너는 귀마개가 필요하다."
        zh_simp:
          ultra_sun: "振动翅膀，发出超音波。\n会把晕厥的猎物\n活埋在沙子里保存。"
          ultra_moon: "会振动翅膀，产生特殊的音波。\n呆在一起的训练家\n有必要准备好耳塞。"
        zh_trad:
          ultra_sun: "振動翅膀發出超音波。\n會把暈厥的獵物，\n活埋在沙中保存。"
          ultra_moon: "會振動翅膀來製造特殊音波。\n和牠待在一起的訓練家\n必須準備耳塞才行。"
