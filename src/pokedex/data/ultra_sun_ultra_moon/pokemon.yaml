      descriptions:
        jp_kana:
          ultra_sun: "ほのおの　りんぷんを　ふりまきながら\nとびまわる。　こだいの　ひとびとは\nたいようのいかりと　よび　おそれた。"
          ultra_moon: "もえさかる　ほのおのまゆから　うまれ\nさむさに　くるしむひとや　ポケモンを\nすくったという　でんせつが　ある。"
        jp_kanji:
          ultra_sun: "炎の　鱗粉を　振りまきながら\n飛びまわる。　古代の　人々は\n太陽の怒りと　呼び　恐れた。"
          ultra_moon: "燃え盛る　炎の繭から　生まれ\n寒さに　苦しむ人や　ポケモンを\n救ったという　伝説が　ある。"
        en:
          ultra_sun: "As it flies, it scatters its flaming scales. It was\nfeared by ancient people, who referred to it as\n“the rage of the sun.”"
          ultra_moon: "According to legends, it was hatched from a\nflaming cocoon to save people and Pokémon\nthat were suffering from the cold."
        fr:
          ultra_sun: "Il décrit des cercles dans le ciel en faisant\npleuvoir des écailles enflammées. Il était jadis\nsurnommé « le courroux solaire »."
          ultra_moon: "Selon la légende, il serait né d’un cocon\nde flammes et serait venu à la rescousse\ndes humains et des Pokémon souffrant du froid."
        it:
          ultra_sun: "Vola spargendo scaglie infuocate.\nEra temuto dai popoli dell’antichità, che lo\nchiamavano “Ira del sole”."
          ultra_moon: "Secondo una leggenda è nato da un bozzolo\ninfuocato per salvare dal freddo Pokémon\ned esseri umani."
        de:
          ultra_sun: "Während es umherfliegt, verteilt es glühenden\nFlügelstaub. Einst wurde es von den Menschen\ngefürchtet und als „Zorn der Sonne“ bezeichnet."
          ultra_moon: "Alten Legenden zufolge wurde es aus einem\nlodernden Kokon geboren, um von Kälte\nbedrohte Menschen und Pokémon zu retten."
        es:
          ultra_sun: "Esparce escamas flamígeras a medida que surca\nel cielo. Era temido por la gente de tiempo ha,\nque lo apodaron la Ira del Sol."
          ultra_moon: "Una leyenda relata cómo nació de un capullo en\nllamas para acudir al rescate de humanos y\nPokémon ateridos por el frío."
        ko:
          ultra_sun: "불꽃의 인분을 흩뿌리며\n날아다닌다. 고대 사람들은\n태양의 분노라고 부르며 두려워했다."
          ultra_moon: "타오르는 불꽃의 고치에서 태어나\n추위에 괴로워하는 사람이나\n포켓몬을 구했다는 전설이 있다."
        zh_simp:
          ultra_sun: "一边挥撒火焰鳞粉一边到处飞翔。\n古代的人们惧怕地称之为太阳的怒火。"
          ultra_moon: "传说，它从熊熊燃烧着\n火焰的茧中诞生，会救助\n受寒冷之苦的人和宝可梦。"
        zh_trad:
          ultra_sun: "一邊散佈火焰鱗粉，一邊四處飛翔。\n古代的人們稱呼牠為太陽的怒火，\n對牠十分畏懼。"
          ultra_moon: "傳說中，牠是從熊熊燃燒著\n火焰的繭中誕生。會去救助\n受寒冷所苦的人和寶可夢。"
