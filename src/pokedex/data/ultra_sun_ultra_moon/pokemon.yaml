      descriptions:
        jp_kana:
          ultra_sun: "みんかに　しのびこみ　たいせつな\nものを　かくしたり　へやじゅうに\nわたを　まきちらす　やっかいものだ。"
          ultra_moon: "とくていの　すみかを　もたない。\nつむじかぜに　のって　あちこちに\nあらわれては　イタズラを　するのだ。"
        jp_kanji:
          ultra_sun: "民家に　忍び込み　大切な\nものを　隠したり　部屋中に\n綿を　まき散らす　厄介者だ。"
          ultra_moon: "特定の　棲み処を　持たない。\nつむじ風に　乗って　あちこちに\n現れては　イタズラを　するのだ。"
        en:
          ultra_sun: "This nuisance sneaks into people’s homes,\nwhere it hides important things and scatters\ncotton all over the place."
          ultra_moon: "Whimsicott doesn’t live in a fixed location. It\nfloats around on whirling winds, appearing all\nover the place to perform its mischief."
        fr:
          ultra_sun: "Ce petit chenapan s’introduit chez les gens,\ncache leurs affaires et répand du coton aux\nquatre coins de la pièce."
          ultra_moon: "Ce Pokémon sans domicile fixe se laisse porter\npar les tornades et sème la zizanie partout où\nil passe."
        it:
          ultra_sun: "È dispettoso e ama entrare di soppiatto nelle\ncase, nascondendo oggetti importanti e\nspargendo cotone ovunque."
          ultra_moon: "Non ha un habitat fisso e si sposta fluttuando\ntrasportato dai vortici d’aria, facendo dispetti\novunque va."
        de:
          ultra_sun: "Ein Störenfried, der heimlich in Wohnhäuser\neindringt und dann wichtige Dinge versteckt\nsowie in allen Zimmern Watte verstreut."
          ultra_moon: "Es lässt sich nirgends nieder, sondern reitet\nwohin auch immer Orkanböen es tragen und\nspielt den Leuten dann Streiche."
        es:
          ultra_sun: "Este travieso Pokémon entra sigilosamente en\nlas casas, esconde los objetos valiosos y\ndispersa bolas de algodón por todas partes."
          ultra_moon: "Este Pokémon no vive en un lugar determinado,\nsino que se deja llevar por los torbellinos para\ndesplazarse y realizar sus travesuras."
        ko:
          ultra_sun: "민가에 몰래 들어가 소중한 물건을\n감추거나 솜을 방 안에 여기저기\n흩트러 놓는 성가신 존재이다."
          ultra_moon: "특정한 서식지가 정해져 있지 않다.\n회오리바람을 타고 여기저기에\n나타나서는 장난을 친다."
        zh_simp:
          ultra_sun: "潜入民居，藏起重要的东西，\n或是在屋子里到处撒棉花，\n是个捣蛋的家伙。"
          ultra_moon: "并没有特定的栖息地。\n乘着旋风到处现身，搞恶作剧。"
        zh_trad:
          ultra_sun: "會潛入人們家裡藏起重要的東西，\n或是把棉花撒得滿屋子都是，\n是個麻煩的傢伙。"
          ultra_moon: "沒有特定的棲息地。\n會乘著旋風移動，\n到處現身去惡作劇。"
petilil:
  species_id: 548
  names:
    jp_kana: チュリネ
    jp_kanji: チュリネ
    en: Petilil
    fr: Chlorobule
    it: Petilil
    de: Lilminip
