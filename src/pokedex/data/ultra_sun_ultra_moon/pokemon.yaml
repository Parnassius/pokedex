  names:
    jp_kana: オドリドリ
    jp_kanji: オドリドリ
    en: Oricorio
    fr: Plumeline
    it: Oricorio
    de: Choreogel
    es: Oricorio
    ko: 춤추새
    zh_simp: 花舞鸟
    zh_trad: 花舞鳥
  forms:
    oricorio_baile_style:
      form_id: 0
      names:
        jp_kana: めらめらスタイル
        jp_kanji: めらめらスタイル
        en: Baile Style
        fr: Style Flamenco
        it: Stile Flamenco
        de: Flamenco-Stil
        es: Estilo Apasionado
        ko: 이글이글스타일
        zh_simp: 热辣热辣风格
        zh_trad: 熱辣熱辣風格
      base_stats:
        hp: 75
        attack: 70
        defense: 70
        special_attack: 98
        special_defense: 70
        speed: 93
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
        - flying
      egg_groups:
        - flying
      abilities:
        - dancer
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          ultra_sun: "じょうねつてきな　ダンスで　てきの\nこころを　つかみ　ゆだんした　すきに\nもえさかる　ほのおで　やきつくす。"
          ultra_moon: "くれないのミツを　すった　オドリドリ。\nトレーナーが　しじを　まちがえると\nはげしく　おこる　げきじょうか　だ。"
        jp_kanji:
          ultra_sun: "情熱的な　ダンスで　敵の\n心を　つかみ　油断した　隙に\n燃えさかる　炎で　焼き尽くす。"
          ultra_moon: "くれないのミツを　吸った　オドリドリ。\nトレーナーが　指示を　間違えると\n激しく　怒る　激情家　だ。"
        en:
          ultra_sun: "It wins the hearts of its enemies with its\npassionate dancing and then uses the opening\nit creates to burn them up with blazing flames."
          ultra_moon: "This Oricorio has drunk red nectar. If its Trainer\ngives the wrong order, this passionate Pokémon\nbecomes fiercely angry."
        fr:
          ultra_sun: "Il envoûte ses ennemis avec une danse\nfougueuse, et profite de leur inattention\npour les noyer sous un torrent de flammes."
          ultra_moon: "Un Plumeline ayant bu du Nectar Rouge.\nD’un naturel passionné, il brûle de rage\nquand son Dresseur se trompe d’ordre."
        it:
          ultra_sun: "Ammalia il nemico con una danza appassionata\ne approfitta della sua distrazione per attaccare\ncon fiamme potentissime riducendolo in cenere."
          ultra_moon: "Un Oricorio che si è nutrito di Nettare rosso.\nÈ molto melodrammatico e va su tutte le furie se\nil suo Allenatore gli dà un’indicazione sbagliata."
        de:
          ultra_sun: "Mit feurigen Tanzschritten zieht es Gegner in\nseinen Bann und nutzt ihre Unachtsamkeit, um\nsie mit lodernden Flammen einzuäschern."
          ultra_moon: "Ein Choreogel, das roten Nektar geschlürft hat.\nEs neigt zur Theatralik. Gibt ihm sein Trainer\neinen falschen Befehl, macht es ihm eine Szene."
        es:
          ultra_sun: "Con su danza apasionada cautiva al enemigo.\nEn cuanto este baja la guardia, lo calcina con\nsus enormes llamaradas."
          ultra_moon: "Forma que toma Oricorio al libar Néctar Rojo. Su\nvehemencia le lleva a ponerse hecho una furia\nsi el Entrenador le imparte la orden equivocada."
        ko:
          ultra_sun: "정열적인 댄스로 적의 마음을\n사로잡아 방심하게 한 후\n타오르는 불꽃으로 태워버린다."
          ultra_moon: "다홍꿀을 빨아들인 춤추새.\n트레이너가 틀린 지시를 내리면\n격렬하게 화를 내는 격정적인 성격이다."
        zh_simp:
          ultra_sun: "用热情的舞蹈抓住敌人的心，\n趁对方疏忽的间隙，\n用熊熊燃烧的火焰将其烧尽。"
          ultra_moon: "吸食了朱红色花蜜的花舞鸟。\n训练家弄错指示的话就会非常生气。\n是情感变化非常剧烈的家伙。"
        zh_trad:
          ultra_sun: "會用熱情的舞蹈抓住敵人的心，\n再趁對手失去戒心的空檔\n用熊熊燃燒的火焰把對方燒成灰。"
          ultra_moon: "吸食了朱紅色花蜜的花舞鳥。\n訓練家如果做出了錯誤的指示，\n感情起伏激烈的牠就會非常生氣。"
    oricorio_pom_pom_style:
      form_id: 1
      names:
        jp_kana: ぱちぱちスタイル
        jp_kanji: ぱちぱちスタイル
        en: Pom-Pom Style
        fr: Style Pom-Pom
        it: Stile Cheerdance
        de: Cheerleading-Stil
        es: Estilo Animado
        ko: 파칙파칙스타일
        zh_simp: 啪滋啪滋风格
        zh_trad: 啪滋啪滋風格
      base_stats:
        hp: 75
        attack: 70
        defense: 70
        special_attack: 98
        special_defense: 70
