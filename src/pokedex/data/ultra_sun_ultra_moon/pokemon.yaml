        jp_kana:
          ultra_sun: "サイコパワーで　てきを　むかえうつ。\n３つのあたま　それぞれが　ねんりきを\nはなつので　そのいりょくは　３ばいだ。"
          ultra_moon: "３つのあたまは　みな　べつの　ことを\nかんがえている。　いきたい　ほうこうが\nちがうと　みうごきが　とれなくなる。"
        jp_kanji:
          ultra_sun: "サイコパワーで　敵を　迎え撃つ。\n３つの頭　それぞれが　念力を\n放つので　その威力は　３倍だ。"
          ultra_moon: "３つの頭は　皆　別の　ことを\n考えている。　行きたい　方向が\n違うと　身動きが　とれなくなる。"
        en:
          ultra_sun: "It engages its enemies using psychic powers.\nEach of its three heads fires off psychokinetic\nenergy, tripling its power."
          ultra_moon: "Each of its three heads has its own thoughts.\nWhen they want to go in different directions,\nExeggutor becomes unable to move."
        fr:
          ultra_sun: "Il frappe ses adversaires de ses pouvoirs\npsychiques. Comme il a trois têtes, la puissance\nde ses attaques s’en voit triplée."
          ultra_moon: "Ses trois têtes pensent indépendamment.\nSi elles ne se mettent pas d’accord sur le\nchemin à emprunter, Noadkoko fait du surplace."
        it:
          ultra_sun: "Attacca l’avversario emettendo onde\npsicocinetiche da ogni testa. La potenza\ncomplessiva risulta triplicata."
          ultra_moon: "Le sue tre teste ragionano in modo indipendente.\nQuando vogliono andare in direzioni diverse,\nExeggutor non riesce più a muoversi."
        de:
          ultra_sun: "Gegen Feinde setzt es Psycho-Kräfte ein. Seine\ndrei Köpfe greifen unabhängig voneinander an,\nwodurch sich der Gesamtangriff verdreifacht."
          ultra_moon: "Jeder seiner drei Köpfe hat einen eigenen Willen.\nKönnen sie sich nicht auf eine Richtung einigen,\nbleibt es wie angewurzelt auf der Stelle stehen."
        es:
          ultra_sun: "Ataca al rival con poderes psíquicos. Como tiene\ntres cabezas, la potencia de sus ataques se ve\ntriplicada."
          ultra_moon: "Sus tres cabezas poseen juicio propio. Si no se\nponen de acuerdo en qué dirección tomar,\nExeggutor se quedará plantado en el sitio."
        ko:
          ultra_sun: "사이코 파워로 적을 대적한다.\n3개의 머리가 각각 염동력을\n발산해서 그 위력은 3배가 된다."
          ultra_moon: "3개의 머리는 모두 다른 생각을\n하고 있다. 가고 싶은 방향이\n다르면 움직일 수 없게 된다."
        zh_simp:
          ultra_sun: "会用精神力量来迎击敌人。\n３个脑袋会分别放出念力，\n所以威力也会变成３倍。"
          ultra_moon: "３个脑袋分别想着不同的事情。\n如果每个脑袋想去的方向不同，\n身体就会无法动弹。"
        zh_trad:
          ultra_sun: "會用精神力量迎戰敵人。\n３個頭會分別發出念力，\n所以威力也會變成３倍。"
          ultra_moon: "３個頭分別想著不同的事。\n如果每個頭想去的方向不同，\n就會在原地無法動彈。"
