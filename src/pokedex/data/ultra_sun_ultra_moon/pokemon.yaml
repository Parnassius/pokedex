        jp_kana:
          ultra_sun: "しっけが　たりないのか　えいようが\nたりないのか　アローラの　パラスの\nキノコは　そだちが　いまいち。"
          ultra_moon: "とうちゅうかそう　という　キノコが\nムシを　あやつっているのだ。\nムシの　いしは　むしされる。"
        jp_kanji:
          ultra_sun: "湿気が　足りないのか　栄養が\n足りないのか　アローラの　パラスの\nキノコは　育ちが　いまいち。"
          ultra_moon: "冬虫夏草と　いう　キノコが\n虫を　操っているのだ。\n虫の　意思は　無視される。"
        en:
          ultra_sun: "Whether it’s due to a lack of moisture or a lack\nof nutrients, in Alola the mushrooms on Paras\ndon’t grow up quite right."
          ultra_moon: "The mushrooms, known as tochukaso, are\ncontrolling the bug. Even if the bug bugs the\nmushrooms, they tell it to bug off."
        fr:
          ultra_sun: "C’est probablement par manque de nutriments\net d’humidité que les champignons sur son dos\npeinent à se développer à Alola."
          ultra_moon: "Les champignons, appelés tochukaso,\ncontrôlent l’insecte contre sa volonté."
        it:
          ultra_sun: "I funghi sul dorso di Paras crescono con\ndifficoltà ad Alola, forse per mancanza\ndi umidità o di nutrimento."
          ultra_moon: "I funghi che crescono sul dorso di questo\nPokémon, chiamati tochukaso, controllano le sue\nazioni contro la sua volontà."
        de:
          ultra_sun: "In Alola sind Paras’ Pilze etwas unterentwickelt.\nVielleicht mangelt es ihm hier an Feuchtigkeit\noder Nährstoffen."
          ultra_moon: "Paras’ Körper kann nicht nach seinem eigenen\nWillen handeln, da er von Tochukaso, den Pilzen\nauf seinem Rücken, kontrolliert wird."
        es:
          ultra_sun: "Ya sea por la falta de humedad o de nutrientes,\nlas setas parásitas de los Paras en Alola suelen\nser más pequeñas que en otras regiones."
          ultra_moon: "Las setas que tiene en el dorso, llamadas\ntochukaso, controlan al insecto contra su\nvoluntad."
        ko:
          ultra_sun: "습도가 낮아서인지 영양이\n부족해서인지 알로라 파라스의\n버섯은 성장이 그저 그렇다."
          ultra_moon: "동충하초라고 불리는 버섯이\n벌레를 조종하고 있다.\n벌레의 의사는 무시된다."
        zh_simp:
          ultra_sun: "可能是湿气不够，也可能是营养不足，\n反正阿罗拉的派拉斯背上的\n蘑菇都长得不怎么样。"
          ultra_moon: "是一种叫做冬虫夏草的\n蘑菇在控制着虫子。\n虫子的意志会被它忽视。"
        zh_trad:
          ultra_sun: "不知是因為濕氣不夠還是營養不足，\n阿羅拉的派拉斯背上的\n蘑菇長得都不怎麼樣。"
          ultra_moon: "控制蟲子的是一種\n叫做冬蟲夏草的蕈類。\n蟲子的意志會被忽視。"
parasect:
