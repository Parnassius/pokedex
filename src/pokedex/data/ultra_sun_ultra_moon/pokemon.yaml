      types:
        - rock
        - ice
      egg_groups:
        - monster
      abilities:
        - refrigerate
      hidden_ability: snow_warning
      descriptions:
        jp_kana:
          ultra_sun: "こだいの　さむいとちに　すんでいた。\nアマルスが　いななくとき　よぞらに\nオーロラが　あらわれる　という。"
          ultra_moon: "ふくげんに　せいこうしたが　いまの\nかんきょうは　あつすぎて　ながいきは\nできないと　かんがえられている。"
        jp_kanji:
          ultra_sun: "古代の　寒い土地に　棲んでいた。\nアマルスが　いななくとき　夜空に\nオーロラが　現れる　という。"
          ultra_moon: "復元に　成功したが　今の\n環境は　暑過ぎて　長生きは\nできないと　考えられている。"
        en:
          ultra_sun: "It lived in cold areas in ancient times. It’s said\nthat when Amaura whinnies, auroras appear in\nthe night sky."
          ultra_moon: "Amaura was restored successfully, but it’s not\nexpected to live long because of the heat of the\ncurrent environment."
        fr:
          ultra_sun: "Amagara vivait jadis dans les terres glacées.\nOn dit que lorsqu’il pousse un cri, une aurore\nboréale nimbe le ciel nocturne."
          ultra_moon: "Il a été reconstitué, mais son corps n’est pas\nadapté aux températures actuelles, ce qui\naffecte probablement son espérance de vie."
        it:
          ultra_sun: "In passato abitava nelle terre più fredde.\nSi dice che quando emette il suo verso, nel cielo\nnotturno compaia l’aurora boreale."
          ultra_moon: "È stato rigenerato con successo, ma si pensa\nche il clima attuale sia troppo caldo e che la sua\nsperanza di vita non sia molto elevata."
        de:
          ultra_sun: "Vor Urzeiten lebte es in kalten Gebieten. Es\nheißt, wenn Amarino seine Stimme erklingen\nlässt, erscheinen Polarlichter."
          ultra_moon: "Es konnte aus einem Fossil zurückverwandelt\nwerden, aber seine Lebenserwartung ist niedrig,\nda das heutige Klima zu heiß für es ist."
        es:
          ultra_sun: "Vivía en zonas gélidas en épocas pasadas y,\nsegún dicen, el sonido que emite provoca la\naparición de auroras boreales nocturnas."
          ultra_moon: "Aunque se ha regenerado con éxito, las cálidas\ntemperaturas actuales no le son propicias y\nafectan a su esperanza de vida."
        ko:
          ultra_sun: "고대에 차가운 토지에서 살았다.\n아마루스가 울면 밤하늘에\n오로라가 나타난다고 한다."
          ultra_moon: "복원에 성공했지만 오늘날의\n환경은 너무 더워서 오래 살지는\n못할 것으로 여겨지고 있다."
        zh_simp:
          ultra_sun: "曾栖息在古代寒冷的土地上。\n据说，冰雪龙鸣叫的时候，\n夜空中会出现极光。"
          ultra_moon: "虽然复原成功了，\n但由于现在的环境过热，\n被认为无法长期生存。"
        zh_trad:
          ultra_sun: "曾經棲息在古代的寒冷地帶。\n據說當冰雪龍發出鳴叫時，\n夜空中就會出現極光。"
          ultra_moon: "雖然從化石中復原成功，\n但因為現代的環境太熱了，\n被認為無法長久生存。"
aurorus:
