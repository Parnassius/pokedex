      descriptions:
        jp_kana:
          ultra_sun: "かせきから　ふくげんした　アノプスを\nうみに　はなっても　げんきが　ない。\nとうじと　すいしつが　ちがうからだ。"
          ultra_moon: "こだいの　むしポケモンの　いっしゅ。\n８まいの　ハネを　つかって　いがいに\nすばやく　およいでいた　らしい。"
        jp_kanji:
          ultra_sun: "化石から　復元した　アノプスを\n海に　放っても　元気が　ない。\n当時と　水質が　違うからだ。"
          ultra_moon: "古代の　むしポケモンの　１種。\n８枚の　ハネを　使って　意外に\n素早く　泳いでいた　らしい。"
        en:
          ultra_sun: "When restored Anorith are released into the\nocean, they don’t thrive, because the water\ncomposition has changed since their era."
          ultra_moon: "This is one kind of primeval bug Pokémon.\nWith eight wings, it could apparently swim\na lot faster than you’d expect."
        fr:
          ultra_sun: "Ce Pokémon ranimé à partir d’un fossile\nvivait dans des eaux très pures. Il ne pourrait\ndonc pas s’acclimater aux océans actuels."
          ultra_moon: "Ce Pokémon Insecte préhistorique nageait\napparemment à une vitesse surprenante\ngrâce à ses huit « ailes »."
        it:
          ultra_sun: "Questo Pokémon rigenerato da un fossile non è\na suo agio se rilasciato nel mare, a causa del\npeggioramento nella qualità delle acque odierne."
          ultra_moon: "È un antico Pokémon Coleottero. Pare che\nnuotasse in modo sorprendentemente rapido\nusando le sue otto ali."
        de:
          ultra_sun: "Wenn man es aus einem Fossil wiederherstellt\nund ins Meer entlässt, geht es ihm dort nicht\ngut, da die Wasserqualität sich verändert hat."
          ultra_moon: "Dieses urzeitliche Käfer-Pokémon konnte mit\nseinen acht Flügeln ungewöhnlich schnell\nschwimmen."
        es:
          ultra_sun: "Si este Pokémon, regenerado a partir de un fósil,\nse libera en el mar, no se aclimata bien debido a\nla notable diferencia en la calidad del agua."
          ultra_moon: "Un Pokémon insecto ancestral. Según parece,\nera capaz de nadar sorprendentemente rápido\ngracias a sus ocho alas."
        ko:
          ultra_sun: "화석에서 복원한 아노딥스를\n바다에 놓아줘도 기운이 없다.\n당시와 수질이 다르기 때문이다."
          ultra_moon: "고대 벌레포켓몬의 일종.\n8장의 날개를 사용해서 제법\n빠르게 헤엄쳤다고 한다."
        zh_simp:
          ultra_sun: "从化石复原而来的太古羽虫\n即使放到海里，也不会有精神。\n因为现在的水质已和当时不同了。"
          ultra_moon: "古代虫宝可梦中的一种。\n好像会使用８根翅膀游泳，\n速度意外的快。"
        zh_trad:
          ultra_sun: "從化石復原而來的太古羽蟲\n就算放進海裡也不會有活力，\n因為現在的水質和當年是不同的。"
          ultra_moon: "是古代的蟲寶可夢的一種。\n會用８片翅膀游動，\n速度出乎意料地快。"
armaldo:
  species_id: 348
  names:
    jp_kana: アーマルド
    jp_kanji: アーマルド
    en: Armaldo
    fr: Armaldo
    it: Armaldo
    de: Armaldo
    es: Armaldo
    ko: 아말도
    zh_simp: 太古盔甲
    zh_trad: 太古盔甲
  forms:
    armaldo:
      form_id: 0
      base_stats:
        hp: 75
        attack: 125
        defense: 100
        special_attack: 70
        special_defense: 80
        speed: 45
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
