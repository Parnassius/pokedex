      descriptions:
        jp_kana:
          ultra_sun: "ピンチに　なると　とっきから　あまい\nしるを　だす。　これを　あつめた\nシロップは　パンにつけると　うまい。"
          ultra_moon: "みずくさの　おおい　いけや　ぬまに\nすむ。　せいそくちも　くう　エサも　\nちかい　シズクモと　よく　あらそう。"
        jp_kanji:
          ultra_sun: "ピンチに　なると　突起から　甘い\n汁を　出す。　これを　集めた\nシロップは　パンにつけると　美味い。"
          ultra_moon: "水草の　多い　池や　沼に\n棲む。　棲息地も　食う　エサも\n近い　シズクモと　よく　争う。"
        en:
          ultra_sun: "If it’s in a pinch, it will secrete a sweet liquid\nfrom the tip of its head. Syrup made from\ngathering that liquid is tasty on bread."
          ultra_moon: "It lives in ponds and marshes that feature lots\nof plant life. It often fights with Dewpider,\nwhose habitat and diet are similar."
        fr:
          ultra_sun: "En cas de danger, il sécrète un liquide sucré\ndu sommet de sa tête. Le sirop fabriqué à partir\nde ce liquide est délicieux étalé sur du pain !"
          ultra_moon: "Il vit dans les lacs ou les marais où prospèrent\nles plantes hydrophiles. Il se dispute souvent\nproies et territoire avec son voisin, Araqua."
        it:
          ultra_sun: "Quando è in difficoltà, secerne un liquido dolce\ndalla punta della testa. Lo sciroppo ricavato da\nquesto liquido è ottimo da spalmare sul pane."
          ultra_moon: "Vive tra le piante acquatiche di stagni e paludi.\nSpesso lotta con i Dewpider per contendersi\nil cibo e il territorio."
        de:
          ultra_sun: "In Gefahrensituationen scheidet es eine süße\nFlüssigkeit aus seinem Fortsatz aus. Der daraus\nhergestellte Sirup schmeckt köstlich auf Brot."
          ultra_moon: "Es lebt in pflanzenreichen Teichen und Sümpfen\nund streitet sich oft mit Araqua, da sie ähnliche\nHabitate haben und ähnliches Futter fressen."
        es:
          ultra_sun: "Si se siente amenazado, segrega un líquido\ndulce por la cabeza. El sirope elaborado con\nese líquido resulta delicioso untado en pan."
          ultra_moon: "Vive en estanques y pantanales donde abunde\nla flora acuática y compite fieramente con los\nDewpider por el territorio y el sustento."
        ko:
          ultra_sun: "위기를 맞으면 돌기에서\n달콤한 액체가 나온다. 이것을 모은\n시럽을 빵에 바르면 맛있다."
          ultra_moon: "물풀이 많은 연못이나 늪에 산다.\n서식지도 먹는 먹이도 비슷한\n물거미와 자주 싸운다."
        zh_simp:
          ultra_sun: "如果遇到危险，就会从突起的\n地方分泌出甜汁。收集它制成糖浆，\n然后涂抹在面包上就会非常可口。"
          ultra_moon: "栖息在水草丛生的池塘或沼泽里。\n会经常和栖息地以及食物\n都与自己相近的滴蛛争斗。"
        zh_trad:
          ultra_sun: "遇到危險時會從突起的部分\n流出甜甜的汁液。把這種汁液\n製成的糖漿塗在麵包上會很可口。"
          ultra_moon: "棲息在水草叢生的池塘或沼澤。\n經常和棲息地以及食物都與\n自己相近的滴蛛互相爭鬥。"
