          ultra_moon: "こころ　やさしい　ポケモンで　うみで\nおぼれた　にんげんや　ポケモンを\nたすけたという　はなしを　よくきく。"
        jp_kanji:
          ultra_sun: "荒れ狂う　海も　ものともせずに\n飛んでいく。　その姿を　見かけた\n船長は　海の化身と　呼んだ。"
          ultra_moon: "心　やさしい　ポケモンで　海で\n溺れた　人間や　ポケモンを\n助けたという　話を　よく聞く。"
        en:
          ultra_sun: "It flies over raging seas as if they were nothing.\nObserving this, a ship’s captain dubbed this\nPokémon “the sea incarnate.”"
          ultra_moon: "You’ll often hear tales of this kindhearted\nPokémon rescuing people or Pokémon that\nare drowning."
        fr:
          ultra_sun: "Il brave les flots impétueux sans ciller. C’est\npour cette raison qu’un capitaine l’ayant vu à\nl’œuvre l’a surnommé « l’avatar de la mer »."
          ultra_moon: "De nombreux témoignages racontent que ce\nPokémon, de nature bienveillante, aurait sauvé\ndes humains et des Pokémon de la noyade."
        it:
          ultra_sun: "Sorvola come se niente fosse anche i mari più\nagitati. Un capitano, vedendolo all’opera, l’ha\nsoprannominato “l’incarnazione del mare”."
          ultra_moon: "È un Pokémon buono e mansueto. Si racconta\nspesso di come accorra in aiuto di persone\ne Pokémon che stanno affogando."
        de:
          ultra_sun: "Es fliegt ohne Bedenken selbst über tosende\nMeere. Ein Schiffskapitän nannte es nach\ndiesem Anblick die „Inkarnation des Meeres“."
          ultra_moon: "Dragoran ist ein äußerst gutherziges Pokémon,\nvon dem man sich erzählt, es habe Menschen\nund andere Pokémon vor dem Ertrinken gerettet."
        es:
          ultra_sun: "Sobrevuela los mares desafiando las más fieras\ntempestades, lo que le valió que cierto capitán\nde un buque lo llamara el Avatar de la Mar."
          ultra_moon: "Un Pokémon benévolo que, según cuentan,\nacude al rescate de Pokémon o humanos que se\nencuentren a la deriva."
        ko:
          ultra_sun: "성난 바다도 아랑곳하지 않고\n날아간다. 그 모습을 본 선장은\n바다의 화신이라고 불렀다."
          ultra_moon: "상냥한 포켓몬으로\n바다에 빠진 인간이나 포켓몬을\n구해 주었다는 이야기가 자주 들린다."
        zh_simp:
          ultra_sun: "即便是狂风暴雨的海上，它也能波澜\n不惊地飞过。目睹过它那身姿的\n船长称其为大海的化身。"
          ultra_moon: "心地善良的宝可梦，\n经常能听到它救助了在海里\n溺水的人或宝可梦的消息。"
        zh_trad:
          ultra_sun: "能輕描淡寫地飛越驚濤駭浪，\n目睹這個景象的船長\n稱呼牠為大海的化身。"
          ultra_moon: "心地善良的寶可夢。\n經常能聽見牠在海上救了\n溺水的人或寶可夢的消息。"
