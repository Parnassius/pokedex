      hidden_ability: unnerve
      descriptions:
        jp_kana:
          ultra_sun: "なかまとの　れんけいが　とくい。\nパートナーに　なると　トレーナーの\nめいれいに　とっても　ちゅうじつだ。"
          ultra_moon: "よあけまえに　ぶきみな　とおぼえを\nくりかえし　じぶんたちの　むれの\nそんざいを　アピール　している。"
        jp_kanji:
          ultra_sun: "仲間との　連携が　得意。\nパートナーに　なると　トレーナーの\n命令に　とっても　忠実だ。"
          ultra_moon: "夜明け前に　不気味な　遠吠えを\n繰り返し　自分たちの　群れの\n存在を　アピール　している。"
        en:
          ultra_sun: "It cooperates with others skillfully. When it\nbecomes your partner, it’s very loyal to you as\nits Trainer and will obey your orders."
          ultra_moon: "They make repeated eerie howls before dawn\nto call attention to their pack."
        fr:
          ultra_sun: "Ce Pokémon est doué pour le travail en équipe.\nC’est un compagnon fidèle qui écoute les ordres\nde son Dresseur sans sourciller."
          ultra_moon: "Si ses congénères et lui poussent de sinistres\nhurlements avant l’aube, c’est pour signaler\nleur présence à tout le monde."
        it:
          ultra_sun: "Agisce sempre in squadra con i suoi simili.\nÈ un compagno fedele e segue attentamente\nle istruzioni del suo Allenatore."
          ultra_moon: "Gli urli sinistri che emette prima dell’alba hanno\nla funzione di segnalare la presenza del suo\nbranco."
        de:
          ultra_sun: "Es ist auf Zusammenarbeit spezialisiert und\nfolgt den Befehlen seines Trainers aufs Wort."
          ultra_moon: "Mit wiederholtem unheimlichen Heulen vor\nTagesanbruch machen sie auf die Existenz\nihres Rudels aufmerksam."
        es:
          ultra_sun: "Famoso por su lealtad y ánimo cooperativo.\nObedecerá sin dudar todo cuanto le ordene\nsu Entrenador."
          ultra_moon: "Los escalofriantes aullidos que profiere justo\nantes del alba son para señalar la presencia de\nsu manada."
        ko:
          ultra_sun: "동료와의 연계가 특기다.\n파트너가되면 트레이너의\n명령에 매우 충실하다."
          ultra_moon: "동이 트기 전에 기분 나쁜 울음을\n반복하여 자신들 무리의\n존재를 어필한다."
        zh_simp:
          ultra_sun: "擅长与伙伴的合作。\n如果成为同伴，\n就会非常听从训练家的命令。"
          ultra_moon: "会在天亮之前反复发出恐怖的长嚎，\n并以此来彰显自己群体的存在。"
        zh_trad:
          ultra_sun: "擅長與夥伴合作。\n只要與訓練家成為搭檔，\n就會徹底服從訓練家的命令。"
          ultra_moon: "會在天亮前反覆發出令人\n不寒而慄的長嚎，藉此強調\n自己群體的存在。"
houndoom:
