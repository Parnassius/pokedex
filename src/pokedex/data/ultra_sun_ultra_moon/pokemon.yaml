  names:
    jp_kana: ケーシィ
    jp_kanji: ケーシィ
    en: Abra
    fr: Abra
    it: Abra
    de: Abra
    es: Abra
    ko: 캐이시
    zh_simp: 凯西
    zh_trad: 凱西
  forms:
    abra:
      form_id: 0
      base_stats:
        hp: 25
        attack: 20
        defense: 15
        special_attack: 105
        special_defense: 55
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - synchronize
        - inner_focus
      hidden_ability: magic_guard
      held_items:
        rare: twisted_spoon
      descriptions:
        jp_kana:
          ultra_sun: "ねむっている　あいだも　さまざまな\nちょうのうりょくを　つかってくるので\nおきているのか　みわけが　つかない。"
          ultra_moon: "あいての　こころを　よみとって\nキケンが　せまるまえに　テレポート。\nつかまえるには　むしんに　なれ。"
        jp_kanji:
          ultra_sun: "眠っている　あいだも　様々な\n超能力を　使ってくるので\n起きているのか　見分けが　つかない。"
          ultra_moon: "相手の　心を　読みとって\n危険が　迫る前に　テレポート。\n捕まえるには　無心に　なれ。"
        en:
          ultra_sun: "It uses various psychic powers even while it’s\nsleeping, so you can’t tell whether or not\nit’s awake."
          ultra_moon: "It can read others’ minds and will teleport away\nwhen danger approaches. You must clear your\nmind if you want to catch it."
        fr:
          ultra_sun: "Il utilise certains de ses pouvoirs psychiques\nmême quand il dort, aussi est-ce impossible\nde savoir s’il est éveillé ou non."
          ultra_moon: "Il lit les pensées de ses adversaires et se\ntéléporte au loin avant d’être en danger. Pour\nl’attraper, il faut faire le vide dans son esprit."
        it:
          ultra_sun: "Può usare i suoi poteri psichici anche mentre\ndorme. Per questo è difficile capire se è sveglio\noppure no."
          ultra_moon: "Grazie alla sua capacità di leggere nel pensiero,\nprevede il pericolo e si teletrasporta lontano.\nPer catturarlo bisogna svuotare la mente."
        de:
          ultra_sun: "Da es seine Psycho-Kräfte selbst im Schlaf\neinsetzt, weiß man meistens nicht, ob es gerade\nwach ist oder schläft."
          ultra_moon: "Es liest die Gedanken seines Gegners und setzt\nbei Gefahr Teleport ein. Wer es fangen möchte,\nübe seinen Geist in absoluter Gelassenheit."
        es:
          ultra_sun: "Es capaz de usar sus poderes psíquicos aun\nestando dormido, por lo que es difícil distinguir\nentre sus estados de sueño y vigilia."
          ultra_moon: "Lee el pensamiento del rival y se teletransporta\nantes de verse en peligro. Para atraparlo es\nnecesario mantener la mente en blanco."
        ko:
          ultra_sun: "자는 동안에도 다양한\n초능력을 사용하기 때문에\n깨어 있는 것이 아닌지 헷갈린다."
          ultra_moon: "상대의 마음을 읽어서\n위험이 닥치기 전에 순간이동한다.\n잡으려면 마음을 비워야 한다."
        zh_simp:
          ultra_sun: "即使是在睡梦中\n也会使用各种超能力，\n所以分辨不出它是不是醒着。"
          ultra_moon: "能读取对方的心声，在危险临近前\n会通过瞬间移动逃走。\n要捕捉它的话，你得放空心灵。"
        zh_trad:
          ultra_sun: "即使在睡夢中也會\n使出各式各樣的超能力，\n所以很難分辨牠是不是醒著。"
          ultra_moon: "會讀對方的心，在危險來臨前\n使出瞬間移動逃走。要捕捉牠\n就必須讓自己的心完全放空。"
