      descriptions:
        jp_kana:
          ultra_sun: "なにごとにも　どうじず　ものしずか。\nくちに　ふくんだ　つちと　だえきを\nまぜて　とくしゅな　どろを　つくる。"
          ultra_moon: "１０トン　ある　にもつを　ひきながら\nみっかみばん　やすまずに　やまみちを\nあるきつづけることが　できるのだ。"
        jp_kanji:
          ultra_sun: "何事にも　動じず　物静か。\n口に　含んだ　土と　唾液を\n混ぜて　特殊な　泥を　作る。"
          ultra_moon: "１０トン　ある　荷物を　引きながら\n三日三晩　休まずに　山道を\n歩き続けることが　できるのだ。"
        en:
          ultra_sun: "It remains calm and unmoving no matter the\nsituation. It mixes dirt with the saliva in its\nmouth to make a special kind of mud."
          ultra_moon: "It can trudge mountain roads without rest\nfor three days and three nights, all the while\ndragging a 10-ton load."
        fr:
          ultra_sun: "Il reste calme et impassible en toutes\ncirconstances. Il mélange sa salive à de la terre\npour créer une boue spéciale dans sa bouche."
          ultra_moon: "Il peut parcourir les chemins de montagne\npendant trois jours et trois nuits en tirant\nun fardeau de dix tonnes sans se reposer."
        it:
          ultra_sun: "Rimane calmo e imperturbabile in qualsiasi\ncircostanza. Produce un fango speciale\nmescolando nella sua bocca terra e saliva."
          ultra_moon: "È in grado di percorrere strade di montagna\nper tre giorni e tre notti senza fermarsi\ntrainando dei carichi di ben 10 tonnellate."
        de:
          ultra_sun: "Dieses unerschütterliche und stets gelassene\nPokémon produziert aus seinem Speichel und\nErde einen speziellen Schlamm in seinem Maul."
          ultra_moon: "Es kann drei Tage und Nächte lang eine Last von\nzehn Tonnen über Bergpfade ziehen, ohne eine\nPause einlegen zu müssen."
        es:
          ultra_sun: "No se inmuta por nada. Mastica tierra y la\nmezcla con su saliva para crear un lodo singular."
          ultra_moon: "Aguanta tres días y tres noches portando\ncargas de diez toneladas por caminos de\nmontaña sin un solo descanso."
        ko:
          ultra_sun: "어떤 일에도 동요하지 않고 차분하다.\n입에 머금은 흙과 침을 섞어\n특수한 진흙을 만든다."
          ultra_moon: "10톤이나 되는 짐을 끌면서\n삼일 밤낮 쉬지 않고\n산길을 걸을 수 있다."
        zh_simp:
          ultra_sun: "无论发生什么都不会动，\n非常好静。把嘴里含着的土\n和唾液混合，制作成特殊的泥。"
          ultra_moon: "可以拉着１０吨重的货物\n连续三天三夜不眠不休，\n在山路上持续行走。"
        zh_trad:
          ultra_sun: "無論發生什麼事都能不動如山。\n會把含進嘴裡的土與唾液混合，\n製造出特殊的泥。"
          ultra_moon: "能夠拉著重達１０噸的貨物\n連續三天三夜不眠不休地\n在山路上持續行走。"
dewpider:
  species_id: 751
  names:
    jp_kana: シズクモ
    jp_kanji: シズクモ
    en: Dewpider
    fr: Araqua
    it: Dewpider
    de: Araqua
    es: Dewpider
    ko: 물거미
    zh_simp: 滴蛛
    zh_trad: 滴蛛
  forms:
    dewpider:
      form_id: 0
      base_stats:
        hp: 38
        attack: 40
        defense: 52
        special_attack: 40
        special_defense: 72
        speed: 27
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
        - bug
      egg_groups:
        - water_1
        - bug
      abilities:
        - water_bubble
      hidden_ability: water_absorb
      held_items:
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "シズクモどうしが　であうと　あたまの\nすいほうを　じまんし　アピールする。\nちいさな　ほうが　みちを　ゆずる。"
          ultra_moon: "みずの　なかに　とけた　さんそしか\nすえないので　すいほうを　かぶって\nりくちを　あるきまわるのだ。"
        jp_kanji:
          ultra_sun: "シズクモ同士が　出会うと　頭の\n水泡を　自慢し　アピールする。\n小さな　方が　道を　譲る。"
          ultra_moon: "水の　中に　溶けた　酸素しか\n吸えないので　水泡を　被って\n陸地を　歩きまわるのだ。"
        en:
          ultra_sun: "When two Dewpider meet, they display their\nwater bubbles to each other. Then the one with\nthe smaller bubble gets out of the other’s way."
          ultra_moon: "It can only breathe oxygen that has dissolved in\nwater, so it wears a water bubble on its head\nwhen it walks around on land."
        fr:
          ultra_sun: "Quand deux Araqua se croisent, ils comparent\nla taille de leur bulle. Celui qui a la plus petite\ndoit céder le passage."
          ultra_moon: "L’oxygène contenu dans l’eau étant le seul\nqu’il puisse respirer, il met toujours sa tête\ndans une bulle quand il est sur la terre ferme."
        it:
          ultra_sun: "Quando due Dewpider si incontrano, mettono\nin mostra con orgoglio la bolla sulla loro testa.\nChi ha quella più piccola cede il passo."
          ultra_moon: "Può respirare solo l’ossigeno contenuto\nnell’acqua. Sulla terraferma, tiene sempre la\ntesta dentro la sua bolla."
        de:
          ultra_sun: "Stehen sich zwei Araqua im Weg, vergleichen sie\ndie Wasserblasen auf ihrem Kopf. Das mit der\nkleineren Blase macht dann dem anderen Platz."
          ultra_moon: "Es kann nur Sauerstoff einatmen, der in Wasser\ngelöst ist. Deshalb hüllt es seinen Kopf immer in\neine Wasserblase, wenn es an Land geht."
        es:
          ultra_sun: "Si se encuentran dos ejemplares de la especie,\ncomparan el tamaño de sus burbujas.\nEl perdedor ha de ceder el paso."
          ultra_moon: "Solo puede respirar el oxígeno presente en el\nagua, por lo que utiliza una burbuja para\nrespirar en tierra firme."
        ko:
          ultra_sun: "물거미끼리 만나면 머리의\n수포를 자랑하며 어필한다.\n작은 쪽이 뒤로 물러난다."
          ultra_moon: "물속에 녹아 있는 산소로만\n호흡할 수 있어서 수포를 쓰고\n육지를 돌아다닌다."
        zh_simp:
          ultra_sun: "如果滴蛛同类之间相遇，\n它们会自豪地用头上的水泡炫耀。\n水泡小的一方就会让路。"
          ultra_moon: "因为只吸收溶解在水中的氧气，\n所以会戴着水泡在陆地上到处走。"
        zh_trad:
          ultra_sun: "滴蛛們在與同類相遇時，\n會互相炫耀自己頭上的水泡，\n水泡小的一方會乖乖讓路。"
          ultra_moon: "因為只能吸收溶解在\n水中的氧氣，所以在陸地上\n走動時會戴著水泡。"
araquanid:
  species_id: 752
