      descriptions:
        jp_kana:
          ultra_sun: "ながい　けの　したに　たべものを\nかくすが　かくしたことを　わすれて\nいしゅう　さわぎに　なることも。"
          ultra_moon: "くえそうなもの　だったら　とりあえず\nひろって　まるのみ。　くさったエサでも\nへいきな　がんじょうな　いを　もつ。"
        jp_kanji:
          ultra_sun: "長い　毛の　下に　食べ物を\n隠すが　隠したことを　忘れて\n異臭　騒ぎに　なることも。"
          ultra_moon: "食えそうなもの　だったら　とりあえず\n拾って　丸呑み。　腐ったエサでも\n平気な　頑丈な　胃を　持つ。"
        en:
          ultra_sun: "It hides food under its long fur, but it\nsometimes forgets about it and causes\na stinky disturbance."
          ultra_moon: "Anything that looks edible, Munchlax will go on\nand swallow whole. Its stomach is tough enough\nto handle it even if the food has gone rotten."
        fr:
          ultra_sun: "Il a tendance à cacher des aliments dans son\népaisse fourrure... et à les oublier là. L’odeur\nputride qui s’en dégage alors est plutôt gênante."
          ultra_moon: "Dès qu’il voit quelque chose de comestible,\nil le ramasse et l’avale tout de go. Son estomac\nlui permet de digérer même la nourriture avariée."
        it:
          ultra_sun: "Nasconde il cibo sotto il lungo pelo, ma spesso\nse ne dimentica finché non inizia a esalare\nodori molesti a causa della putrefazione."
          ultra_moon: "Inghiotte qualunque cosa sia commestibile senza\nmasticare. Ha uno stomaco robusto che gli\npermette di digerire anche il cibo andato a male."
        de:
          ultra_sun: "Unter seinem langen Fell versteckt es Nahrung.\nAber es vergisst, dass es sie dort versteckt\nhat und regt sich dann über den Gestank auf."
          ultra_moon: "Alles, was essbar aussieht, verschlingt es mit\neinem Happs. Sogar Verdorbenes kann seinem\nstarken Magen nichts anhaben."
        es:
          ultra_sun: "Aprovecha su largo pelaje para ocultar comida,\npero se le suele olvidar y acaba generando un\nolor a putrefacción muy molesto para los demás."
          ultra_moon: "En cuanto encuentra algo comestible, lo recoge y\nlo engulle de un bocado. Su robusto estómago le\npermite ingerir alimentos podridos sin inmutarse."
        ko:
          ultra_sun: "긴 털 아래에 음식을 숨기지만\n숨긴 것을 잊어 고약한 냄새가\n난다며 소동이 날 때도 있다."
          ultra_moon: "먹을 만해 보이면 일단 주워서\n통째로 삼킨다. 썩은 먹이라도\n소화시키는 튼튼한 위를 가졌다."
        zh_simp:
          ultra_sun: "长长的毛发下面藏着食物，\n但有时也会忘记藏了东西\n而发生异臭的问题。"
          ultra_moon: "只要是看着能吃的东西，就先捡起来\n一口吞下。拥有强韧的胃，\n即便是腐烂的食物也不要紧。"
        zh_trad:
          ultra_sun: "牠會把食物藏在長長的毛裡面，\n但有時會忘了自己藏著東西的事，\n造成惡臭四散的問題。"
          ultra_moon: "只要是看起來能吃的東西，\n就會撿起來吞下去。有著強韌的胃，\n就算是腐爛的食物也不怕。"
riolu:
  species_id: 447
  names:
    jp_kana: リオル
    jp_kanji: リオル
    en: Riolu
    fr: Riolu
    it: Riolu
    de: Riolu
    es: Riolu
    ko: 리오르
    zh_simp: 利欧路
    zh_trad: 利歐路
  forms:
    riolu:
      form_id: 0
      base_stats:
        hp: 40
        attack: 70
        defense: 40
        special_attack: 35
        special_defense: 40
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - undiscovered
      abilities:
        - steadfast
        - inner_focus
      hidden_ability: prankster
      descriptions:
        jp_kana:
          ultra_sun: "はどうと　よばれる　なみを　みて\nひとや　ポケモンの　きもちを　しる。\nきけんな　あいてには　ちかづかない。"
          ultra_moon: "なかまとの　コミュニケーションに\nはどうと　よばれる　なみを　つかう。\nなかないので　てきに　ばれないのだ。"
        jp_kanji:
          ultra_sun: "波動と　呼ばれる　波を　見て\n人や　ポケモンの　気持ちを　知る。\n危険な　相手には　近付かない。"
          ultra_moon: "仲間との　コミュニケーションに\n波動と　呼ばれる　波を　使う。\n鳴かないので　敵に　ばれないのだ。"
        en:
          ultra_sun: "It knows how people and Pokémon feel by\nlooking at their auras. It doesn’t approach\ndangerous opponents."
          ultra_moon: "It uses waves called auras to communicate with\nothers of its kind. It doesn’t make any noise\nduring this time, so its enemies can’t detect it."
        fr:
          ultra_sun: "Il peut détecter les émotions des humains et\ndes Pokémon grâce à leur aura. Il ne s’approche\npas des individus qu’il juge dangereux."
          ultra_moon: "Il se sert d’auras pour communiquer avec\nles siens. Ses ennemis ne peuvent pas espionner\nses conversations, car il n’émet aucun son."
        it:
          ultra_sun: "È in grado di percepire le emozioni di Pokémon\ned esseri umani attraverso la loro aura. Si tiene\nalla larga dagli avversari pericolosi."
          ultra_moon: "Comunica con i suoi simili usando onde definite\n“aura” senza emettere alcun verso, riuscendo\ncosì a non farsi intercettare dai nemici."
        de:
          ultra_sun: "Durch Wellen, die Aura genannt werden, kann es\ndie Gefühle von Menschen und Pokémon lesen.\nVon bedrohlichen Gegnern hält es sich fern."
          ultra_moon: "Es kommuniziert mit seinen Artgenossen über\nWellen, die man Aura nennt. So verständigt es\nsich lautlos und bleibt Gegnern verborgen."
        es:
          ultra_sun: "Percibe en forma de ondas las emociones de\nPokémon y humanos, y jamás se acerca a quien\nle da la sensación de ser peligroso."
          ultra_moon: "En lugar de usar la voz, se comunica con los\ndemás mediante ondas conocidas como auras\ny así pasa desapercibido ante sus enemigos."
        ko:
          ultra_sun: "파동이라고 불리는 파를 보면\n사람과 포켓몬의 마음을 알 수 있다.\n위험한 상대에게는 다가가지 않는다."
          ultra_moon: "동료와의 커뮤니케이션에\n파동이라 불리는 파장을 사용한다.\n울지 않아서 적에게 들키지 않는다."
        zh_simp:
          ultra_sun: "能看见被称为波导的一种波，\n感知人和宝可梦的心情。\n不会靠近危险的对手。"
          ultra_moon: "会使用一种叫做波导的波\n来和伙伴交流。由于交流时无需鸣叫，\n因此不会被敌人发现。"
        zh_trad:
          ultra_sun: "能夠看見被稱為波導的波動，\n藉此探知人和寶可夢的心情。\n不會靠近危險的對手。"
          ultra_moon: "會使用一種被稱為波導的波\n來與夥伴溝通。因為不用發出聲音，\n所以不會被敵人發現。"
lucario:
  species_id: 448
  names:
    jp_kana: ルカリオ
    jp_kanji: ルカリオ
    en: Lucario
    fr: Lucario
    it: Lucario
    de: Lucario
    es: Lucario
    ko: 루카리오
    zh_simp: 路卡利欧
    zh_trad: 路卡利歐
  forms:
    lucario:
      form_id: 0
      base_stats:
        hp: 70
        attack: 110
        defense: 70
        special_attack: 115
        special_defense: 70
        speed: 90
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fighting
        - steel
      egg_groups:
        - field
        - human_like
      abilities:
        - steadfast
        - inner_focus
      hidden_ability: justified
      descriptions:
        jp_kana:
          ultra_sun: "せいしんを　しゅうちゅうして　はなつ\nはどうと　よばれる　ふしぎな　なみは\nおおいわをも　こなごなに　くだく。"
          ultra_moon: "はどうの　なみで　あいての　きもちを\nキャッチする。　しりたくないことも\nわかるので　ストレスを　ためやすい。"
        jp_kanji:
          ultra_sun: "精神を　集中して　放つ\n波動と　呼ばれる　不思議な　波は\n大岩をも　粉々に　砕く。"
          ultra_moon: "波動の　波で　相手の　気持ちを\nキャッチする。　知りたくないことも\nわかるので　ストレスを　ためやすい。"
        en:
          ultra_sun: "It concentrates its mental energy and fires off\nmysterious waves called auras, which can crush\nboulders of large size to dust."
          ultra_moon: "Lucario reads its opponent’s feelings with its\naura waves. It finds out things it would rather\nnot know, so it gets stressed out easily."
        fr:
          ultra_sun: "Il peut canaliser son énergie mentale pour\ndéchaîner des auras mystérieuses capables\nde réduire d’énormes rochers en miettes."
          ultra_moon: "Grâce à ses auras, il peut détecter toutes les\némotions de son adversaire, même celles qu’il\npréférerait ignorer et qui lui causent du stress."
        it:
          ultra_sun: "È in grado di concentrare le sue energie\nspirituali per sprigionare un’aura che può\nfrantumare anche grossi macigni."
          ultra_moon: "Riesce a identificare le emozioni dell’avversario\ntramite l’aura. A volte capta pensieri che\npreferirebbe ignorare e questo gli causa stress."
        de:
          ultra_sun: "Unter starker Konzentration kann es rätselhafte\nWellen von sich geben, die man Aura nennt.\nDamit kann es sogar große Felsen pulverisieren."
          ultra_moon: "Es kann über die Auren anderer deren Gefühle\nwahrnehmen. Da es dabei auch Dinge erfährt,\ndie es lieber nicht wüsste, ist es oft gestresst."
        es:
          ultra_sun: "Acumula poder espiritual y lo canaliza en forma\nde auras misteriosas capaces de hacer añicos\nincluso enormes rocas."
          ultra_moon: "Puede percibir sentimientos ajenos a través de\nsu aura, pero averiguar cosas que preferiría no\nsaber constituye una fuente de estrés para él."
        ko:
          ultra_sun: "정신을 집중하고 발산하는\n파동이라고 불리는 신비한 파는\n큰 바위도 산산이 부숴 버린다."
          ultra_moon: "파동의 파장으로 상대의 기분을\n캐치한다. 알고 싶지 않은 일도\n알게 되어 스트레스가 잘 쌓인다."
        zh_simp:
          ultra_sun: "它集中精神所放出的一种\n神奇的波，被称为波导，\n连巨大的岩石都能击得粉碎。"
          ultra_moon: "用波导来侦测对手的心情。\n不想知道的事情也会知道，\n所以很容易累积压力。"
        zh_trad:
          ultra_sun: "集中精神後能放出一種\n被稱為波導的奇異波動，\n就連巨大的岩石都能粉碎。"
          ultra_moon: "會用波導來偵測對手的心情。\n就連不想知道的事也會知道，\n所以很容易累積壓力。"
    lucario_mega:
      form_id: 1
      names:
        jp_kana: メガルカリオ
        jp_kanji: メガルカリオ
        en: Mega Lucario
        fr: Méga-Lucario
        it: MegaLucario
        de: Mega-Lucario
        es: Mega-Lucario
        ko: 메가루카리오
        zh_simp: 超级路卡利欧
        zh_trad: 超級路卡利歐
      base_stats:
        hp: 70
        attack: 145
        defense: 88
        special_attack: 140
        special_defense: 70
        speed: 112
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fighting
        - steel
      egg_groups:
        - field
        - human_like
      abilities:
        - adaptability
      descriptions:
        jp_kana:
          ultra_sun: "メガシンカで　はどうが　ぼうちょう。\nとうそうほんのうの　おもむくままに\nひじょうな　しゅだんで　てきをうつ。"
          ultra_moon: "ばくはつてきな　エネルギーを　あびて\nとうそうほんのうが　めざめた。　てきに\nたいして　いっさい　ようしゃしない。"
        jp_kanji:
          ultra_sun: "メガシンカで　波動が　膨張。\n闘争本能の　赴くままに\n非情な　手段で　敵を討つ。"
          ultra_moon: "爆発的な　エネルギーを　浴びて\n闘争本能が　目覚めた。　敵に\n対して　一切　容赦しない。"
        en:
          ultra_sun: "Its aura has expanded due to Mega Evolution.\nGoverned only by its combative instincts, it\nstrikes enemies without mercy."
          ultra_moon: "Bathed in explosive energy, its combative\ninstincts have awakened. For its enemies, it has\nno mercy whatsoever."
        fr:
          ultra_sun: "Son aura s’est dilatée sous l’effet de la\nMéga-Évolution. Son instinct guerrier le\npousse à abattre sans pitié ses ennemis."
          ultra_moon: "Son instinct guerrier s’est réveillé après son\nexposition à une explosion d’énergie. Il n’a\nabsolument aucune pitié pour ses ennemis."
        it:
          ultra_sun: "Con la megaevoluzione, la sua aura si è espansa.\nSegue ciecamente il suo istinto guerriero e si\ngetta sul nemico attaccando implacabile."
          ultra_moon: "L’esplosiva energia evolutiva ha risvegliato il\nsuo istinto guerriero. Non mostra alcuna pietà\nper il nemico."
        de:
          ultra_sun: "Durch die Mega-Entwicklung wächst seine Aura.\nSeinem Kampftrieb folgend schlägt es gänzlich\nunbarmherzig auf seine Gegner ein."
          ultra_moon: "Die explosive Energie, der es ausgesetzt war,\nhat seinen Kampftrieb geweckt. Mitleid mit\nseinen Gegnern kennt es nicht."
        es:
          ultra_sun: "La megaevolución ha expandido su aura.\nObedeciendo a su instinto guerrero, ataca sin\npiedad a sus enemigos."
          ultra_moon: "La explosiva energía de la megaevolución ha\ndespertado su instinto guerrero. No tiene\npiedad con sus enemigos."
        ko:
          ultra_sun: "메가진화로 파동이 팽창한다.\n투쟁 본능이 이끄는 대로\n비정한 수단으로 적과 싸운다."
          ultra_moon: "폭발적인 에너지를 받아\n투쟁 본능에 눈을 떴다. 적을\n대할 때는 일절 봐주지 않는다."
        zh_simp:
          ultra_sun: "因超级进化，波导发生膨胀。\n会在斗争本能的驱使下，\n用无情的手段攻击敌人。"
          ultra_moon: "沐浴在爆发性的能量中，\n使得斗争的本能觉醒了。\n对于敌人，毫不留情。"
        zh_trad:
          ultra_sun: "超級進化使得波導膨脹。\n牠會在鬥爭本能的驅使之下，\n以無情的手段打倒敵人。"
          ultra_moon: "沐浴在爆發性的能量中，\n使得鬥爭本能覺醒了。\n對敵人絲毫不會留情。"
