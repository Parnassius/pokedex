      descriptions:
        jp_kana:
          ultra_sun: "およぎが　はやい　さかなポケモンでも\nかなしばりで　うごきを　とめて\nかんたんに　つかまえることができる。"
          ultra_moon: "およぎの　プロフェッショナル。\nながい　シッポを　たくみに　くねらせ\nまるまる　ふつか　およいでいられる。"
        jp_kanji:
          ultra_sun: "泳ぎが　速い　さかなポケモンでも\n金縛りで　動きを　止めて\n簡単に　捕まえることが　できる。"
          ultra_moon: "泳ぎの　プロフェッショナル。\n長い　シッポを　巧みに　くねらせ\n丸々　２日　泳いでいられる。"
        en:
          ultra_sun: "Even fast-swimming fish Pokémon can be\ndisabled by Golduck. It brings them to a\nstandstill and seizes them."
          ultra_moon: "A professional swimmer, it can continue\nswimming for two days straight by waving its\nlong tail skillfully."
        fr:
          ultra_sun: "Même les Pokémon poissons les plus rapides\nne peuvent pas lui échapper. Il les capture\navec facilité en les immobilisant."
          ultra_moon: "Ce professionnel de la natation dispose d’une\nlongue queue souple qui lui permet de nager\nsans interruption pendant deux jours."
        it:
          ultra_sun: "Riesce a immobilizzare anche i Pokémon\nacquatici più veloci. In questo modo, può\ncatturarli con facilità."
          ultra_moon: "È un nuotatore provetto. Muovendo abilmente\nla sua lunga coda, può nuotare ininterrottamente\nper due giorni."
        de:
          ultra_sun: "Es bringt selbst schnelle Fisch-Pokémon zum\nStillstand und ergreift sie anschließend mit\nLeichtigkeit."
          ultra_moon: "Ein exzellenter Schwimmer. Wenn es seinen\nlangen, beweglichen Schwanz geschickt\neinsetzt, kann es zwei Tage durchschwimmen."
        es:
          ultra_sun: "Puede paralizar incluso a los Pokémon pez más\nveloces, lo que le permite atraparlos con suma\nfacilidad."
          ultra_moon: "Un portento de la natación capaz de nadar\ndurante dos días sin interrupción moviendo su\nlarga cola con destreza."
        ko:
          ultra_sun: "빠르게 헤엄치는 물고기포켓몬이라도\n사슬묶기로 꼼짝 못 하게 해서\n쉽게 잡을 수 있다."
          ultra_moon: "수영의 전문가다.\n긴 꼬리를 능숙하게 흔들어서\n이틀 내내 헤엄칠 수 있다."
        zh_simp:
          ultra_sun: "即便是游得很快的鱼宝可梦，\n它也能用定身法定住其行动，\n并轻易地进行捕捉。"
          ultra_moon: "游泳专家。\n能灵活地摇摆长尾巴，\n游上整整２天。"
        zh_trad:
          ultra_sun: "即使面對游得很快的魚寶可夢，\n也能用定身法停住對方的動作，\n輕易地捕捉獵物。"
          ultra_moon: "游泳專家。能靈活地\n擺動長長的尾巴，\n連續游上整整２天。"
mankey:
  species_id: 56
  names:
    jp_kana: マンキー
    jp_kanji: マンキー
    en: Mankey
    fr: Férosinge
    it: Mankey
    de: Menki
    es: Mankey
    ko: 망키
    zh_simp: 猴怪
    zh_trad: 猴怪
  forms:
    mankey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 35
        special_attack: 35
        special_defense: 45
        speed: 70
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - vital_spirit
        - anger_point
      hidden_ability: defiant
      descriptions:
        jp_kana:
          ultra_sun: "ちょっとしたことで　すぐ　おこる。\nストレスを　ためこまないので\nかなり　ながいきする　ポケモンだ。"
          ultra_moon: "１ぴきが　おこりだすと　まわりも\nおこりだすので　マンキーの　むれに\nせいじゃくが　おとずれることは　ない。"
        jp_kanji:
          ultra_sun: "ちょっとしたことで　すぐ　怒る。\nストレスを　ため込まないので\nかなり　長生きする　ポケモンだ。"
          ultra_moon: "１匹が　怒りだすと　まわりも\n怒りだすので　マンキーの　群れに\n静寂が　訪れることは　ない。"
        en:
          ultra_sun: "The smallest of things could cause it to lose its\ntemper. Because it doesn’t hold in its stress,\nthis Pokémon can live a long time."
          ultra_moon: "If one gets angry, all the others around it will\nget angry, so silence is a rare visitor in a troop\nof Mankey."
        fr:
          ultra_sun: "La moindre contrariété le rend furieux. Comme\nrien ne l’atteint durablement, il n’accumule\npas de stress et peut vivre très vieux."
          ultra_moon: "Il suffit qu’un Férosinge s’énerve pour que\nses congénères en fassent de même, aussi\nleurs groupes ne connaissent-ils jamais la paix."
        it:
          ultra_sun: "Basta un nonnulla per farlo andare su tutte\nle furie. Tuttavia, non accumula stress e vive\nmolto a lungo."
          ultra_moon: "Se uno di loro si arrabbia, si infuriano anche\ni Mankey che gli stanno intorno. Per questo\nnelle loro colonie non regna mai il silenzio."
        de:
          ultra_sun: "Selbst Kleinigkeiten regen es sofort auf. Da es\nStress aber nicht in sich hineinfrisst, erfreut es\nsich eines langen Lebens."
          ultra_moon: "Wird es wütend, färbt das auch auf seine\nKameraden ab. In einer Schar von Menki kehrt\ndaher niemals Ruhe ein."
        es:
          ultra_sun: "Se encoleriza enseguida por cualquier minucia.\nPor otro lado, al no acumular estrés, suele gozar\nde una vida longeva."
          ultra_moon: "Cuando un ejemplar se enfada, contagia su ira\nal resto, por lo que los grupos de Mankey\ndesconocen el concepto de vida reposada."
        ko:
          ultra_sun: "작은 일에도 금방 화를 낸다.\n스트레스를 쌓아 두지 않아서\n꽤 오래 사는 포켓몬이다."
          ultra_moon: "1마리가 화를 내면 주변에서도\n화를 내기 때문에 망키 무리가\n조용해지는 일은 없다."
        zh_simp:
          ultra_sun: "该宝可梦会因一点小事而立刻动怒。\n由于不会积累压力，\n所以能活相当长的时间。"
          ultra_moon: "只要有１只发怒，\n周围的猴怪也会跟着发怒，\n所以猴怪群里没有一刻是安静的。"
        zh_trad:
          ultra_sun: "遇到一點小事就會發怒。\n因為從不累積壓力，\n因此這種寶可夢相當長壽。"
          ultra_moon: "只要有１隻發怒，周圍的\n猴怪也會跟著開始發起怒來，\n所以猴怪群從沒有一刻是安靜的。"
primeape:
  species_id: 57
  names:
