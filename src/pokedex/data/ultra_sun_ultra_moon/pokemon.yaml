        jp_kana:
          ultra_sun: "はるか　おおむかしの　ぶんけんに\nつきを　さそいし　けものと　いう\nなまえで　きろくが　のこっている。"
          ultra_moon: "いせかいに　つうじる　あな　から\nみちの　ちからや　せいめいを　この\nせかいに　よびよせることも　ある。"
        jp_kanji:
          ultra_sun: "遥か　大昔の　文献に\n月を　誘いし　獣と　いう\n名前で　記録が　残っている。"
          ultra_moon: "異世界に　通じる　穴　から\n未知の　力や　生命を　この\n世界に　呼び寄せることも　ある。"
        en:
          ultra_sun: "Records of it exist in writings from long, long\nago, where it was known by the name\n“the beast that calls the moon.”"
          ultra_moon: "It sometimes summons unknown powers and\nlife-forms here to this world from holes that\nlead to other worlds."
        fr:
          ultra_sun: "Des documents extrêmement anciens\nle décrivent comme « celui qui invite la lune »."
          ultra_moon: "Il lui arrive d’invoquer dans ce monde\ndes créatures et des puissances inconnues\nvia une brèche menant à d’autres dimensions."
        it:
          ultra_sun: "In antichissimi documenti si parla di lui come\ndella “creatura che evoca la luna”."
          ultra_moon: "A volte gli Ultravarchi che apre servono da\npassaggio verso il nostro mondo per forze\ne forme di vita sconosciute."
        de:
          ultra_sun: "In Schriftstücken aus längst vergangenen\nZeiten wird es als „Mondbringer“ bezeichnet."
          ultra_moon: "Öffnet es eine Ultrapforte, ebnet es mitunter\nfür fremde Kräfte und Lebewesen den Weg in\nunsere Welt."
        es:
          ultra_sun: "Aparece en obras de la literatura antigua en las\nque se refieren a él como la “criatura que invoca\na la luna”."
          ultra_moon: "A veces, las fisuras interdimensionales que crea\nsirven de pasaje para fuerzas y formas de vida\ndesconocidas."
        ko:
          ultra_sun: "먼 옛날 문헌에\n달을 현혹하는 짐승이라는\n이름으로 기록되어 있다."
          ultra_moon: "다른 세계로 통하는 구멍을 통해\n미지의 힘이나 생명을\n이 세계로 불러들이는 경우도 있다."
        zh_simp:
          ultra_sun: "在遥远过去的文献里，\n以邀引月亮之兽为名留下了记录。"
          ultra_moon: "有时候会从通往异世界的\n洞穴里把未知的力量和生命\n召唤到这个世界来。"
        zh_trad:
          ultra_sun: "在遙遠過去的文獻裡，\n牠被人們以邀引月亮之獸\n的名字記錄了下來。"
          ultra_moon: "有時會從通往異世界的\n洞穴裡把未知的力量和生命\n召喚到這個世界來。"
nihilego:
  species_id: 793
