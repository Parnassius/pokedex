        - water_1
        - water_3
      abilities:
        - swift_swim
        - shell_armor
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          ultra_sun: "おもいカラが　げんいんで　ほろんだと\nかんがえられている　こだいポケモン。\nオクタンの　とおい　そせん　らしい。"
          ultra_moon: "しょくしゅで　えものを　からめとり\nみうごきを　ふうじて　するどい\nキバで　とどめを　さすのだ。"
        jp_kanji:
          ultra_sun: "重いカラが　原因で　滅んだと\n考えられている　古代ポケモン。\nオクタンの　遠い　祖先　らしい。"
          ultra_moon: "触手で　獲物を　からめとり\n身動きを　封じて　鋭い\nキバで　止めを　刺すのだ。"
        en:
          ultra_sun: "Its heavy shell is thought to be the reason this\nancient Pokémon died out. It’s apparently a\ndistant ancestor of Octillery."
          ultra_moon: "It wraps its prey in its tentacles to immobilize\nthem and then finishes them off with its\nsharp fangs."
        fr:
          ultra_sun: "On suppose que ce Pokémon antique a disparu\nen raison de la lourdeur de sa coquille. Il est\nl’ancêtre présumé des Octillery."
          ultra_moon: "Il immobilise ses proies avec ses tentacules\net leur inflige le coup de grâce à l’aide de\nses crocs aiguisés."
        it:
          ultra_sun: "Si ritiene che questo antico Pokémon si sia\nestinto a causa della conchiglia troppo pesante.\nSembra sia un lontano antenato di Octillery."
          ultra_moon: "Afferra e immobilizza le prede con i tentacoli,\nper poi infliggere il colpo di grazia con le sue\nzanne affilate."
        de:
          ultra_sun: "Diesem prähistorischen Pokémon wurde wohl\ndas Gewicht seines Gehäuses zum Verhängnis.\nEs ist ein ferner Vorfahre von Octillery."
          ultra_moon: "Mit seinen Tentakeln umklammerte es fest seine\nBeute, bevor es ihr mit seinen scharfen Zähnen\nden Garaus machte."
        es:
          ultra_sun: "Un posible antepasado remoto de Octillery\ncuya extinción se cree debida a que su concha\nse hizo demasiado pesada."
          ultra_moon: "Atrapa a sus presas con los tentáculos y, una\nvez inmovilizadas, las desgarra con sus afilados\ncolmillos."
        ko:
          ultra_sun: "무거운 껍질 때문에 멸종했다고\n추정되는 고대 포켓몬.\n대포무노의 먼 선조인 듯하다."
          ultra_moon: "촉수로 먹이를 휘감아\n움직임을 봉쇄한 뒤\n날카로운 이빨로 마무리한다."
        zh_simp:
          ultra_sun: "被认为是由于身上沉重的壳\n而灭绝的古代宝可梦。\n好像是章鱼桶的远祖。"
          ultra_moon: "用触手缠住猎物并让其\n无法动弹后，就会用锋利的\n牙齿使出致命一击。"
        zh_trad:
          ultra_sun: "被認為是因為身上沉重的殼\n而滅絕的古代寶可夢。\n似乎是章魚桶的遠祖。"
          ultra_moon: "會用觸手纏住獵物，\n封鎖對手的行動，然後用\n銳利的牙齒給予致命一擊。"
