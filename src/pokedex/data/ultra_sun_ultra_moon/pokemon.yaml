      descriptions:
        jp_kana:
          ultra_sun: "けたちがいの　エネルギーが　のろいを\nぞうふくし　おさえきれない。　じぶんの\nトレーナーさえ　うらんでしまうのだ。"
          ultra_moon: "メガシンカで　おんねんが　ぞうふく。\nチャックの　なかに　しまわれていた\nのろいの　パワーが　あふれだす。"
        jp_kanji:
          ultra_sun: "桁違いの　エネルギーが　呪いを\n増幅し　抑えきれない。　自分の\nトレーナーさえ　恨んでしまうのだ。"
          ultra_moon: "メガシンカで　怨念が　増幅。\nチャックの　中に　仕舞われていた\n呪いの　パワーが　あふれ出す。"
        en:
          ultra_sun: "Extraordinary energy amplifies its cursing power\nto such an extent that it can’t help but curse its\nown Trainer."
          ultra_moon: "Mega Evolution increases its vindictiveness, and\nthe cursing power that was held back by its\nzipper comes spilling out."
        fr:
          ultra_sun: "Le surplus d’énergie a amplifié sa malédiction\net l’a rendue incontrôlable. Il en vient même à\néprouver de la rancœur envers son Dresseur."
          ultra_moon: "La Méga-Évolution a amplifié sa rancœur,\net le maléfice qui était autrefois contenu\ndéborde maintenant des fermetures éclair."
        it:
          ultra_sun: "La sua maledizione, amplificata da un’energia\nsmisurata, diventa incontrollabile, spingendo\nil Pokémon a odiare persino il suo Allenatore."
          ultra_moon: "La megaevoluzione amplifica il suo rancore\nfacendo erompere l’energia negativa, prima\ncontenuta dalle cerniere."
        de:
          ultra_sun: "Von gewaltigen Energiemengen verstärkt, wird\nsein Fluch unbeherrschbar. Es hegt selbst\ngegen seinen eigenen Trainer einen Groll."
          ultra_moon: "Sein Groll wächst infolge der Mega-Entwicklung.\nDie Macht seines Fluches, der durch seinen\nReißverschluss eingesperrt war, quillt über."
        es:
          ultra_sun: "La desmesurada energía alimenta la maldición\nque sufre hasta volverla incontrolable, haciendo\nque odie a su propio Entrenador."
          ultra_moon: "La megaevolución ha alimentado su odio\nhaciendo emerger por las cremalleras el poder\nmaléfico que antes estaba contenido."
        ko:
          ultra_sun: "어마어마한 에너지가 저주를\n증폭시켜 통제가 불가능하다\n자신의 트레이너마저 저주한다."
          ultra_moon: "메가진화로 원념이 증폭되었다.\n지퍼 안에 들어 있던\n저주의 파워가 넘쳐 난다."
        zh_simp:
          ultra_sun: "过大的能量增强了诅咒，\n无法压制。\n就连自己的训练家也会憎恨。"
          ultra_moon: "因为超级进化，怨念增强。\n拉链里面收纳着的诅咒之力\n满溢出来。"
        zh_trad:
          ultra_sun: "過大的能量讓詛咒增強到\n無法抑制的地步，使得牠\n連自己的訓練家也開始憎恨。"
          ultra_moon: "超級進化使得怨念增強，\n導致原本收在拉鍊裡的\n詛咒之力滿了出來。"
