      hidden_ability: minus
      descriptions:
        jp_kana:
          ultra_sun: "ふしぜんな　かみなりぐもの　したには\nライボルトが　いる。　かみなりと\nおなじ　スピードで　かけると　いう。"
          ultra_moon: "でんきで　きんにくを　しげきするので\nすばやく　うごける。　きんにくつうも\nでんきで　ほぐすので　すぐ　なおる。"
        jp_kanji:
          ultra_sun: "不自然な　雷雲の　下には\nライボルトが　いる。　雷と\n同じ　スピードで　駆けると　いう。"
          ultra_moon: "電気で　筋肉を　刺激するので\n素早く　動ける。　筋肉痛も\n電気で　ほぐすので　すぐ　治る。"
        en:
          ultra_sun: "Manectric can be found beneath unnatural\nthunderclouds. People say it can run at the\nsame speed as lightning striking."
          ultra_moon: "It stimulates its own muscles with electricity, so\nit can move quickly. It eases its soreness with\nelectricity, too, so it can recover quickly as well."
        fr:
          ultra_sun: "Si un nuage orageux un peu louche apparaît\ndans le ciel, un Élecsprint se trouve sûrement\nen dessous. On le dit aussi rapide que l’éclair."
          ultra_moon: "Il diffuse de l’électricité dans ses membres pour\naugmenter sa vitesse. C’est également ainsi\nqu’il apaise ses douleurs musculaires."
        it:
          ultra_sun: "Se si notano strane nubi temporalesche, sotto\ndi loro si vedrà questo Pokémon. Si dice che sia\nin grado di correre alla velocità del fulmine."
          ultra_moon: "L’elettricità gli stimola i muscoli rendendolo\npiù veloce e inoltre allevia i suoi dolori muscolari\nfacendolo tornare rapidamente in forma."
        de:
          ultra_sun: "Voltenso ist unter ungewöhnlichen\nGewitterwolken zu finden. Man erzählt sich,\ndass es so schnell wie ein Blitz sei."
          ultra_moon: "Da es seine Muskeln mit Elektrizität stimuliert,\nkann es sich sehr schnell bewegen. Auch\nMuskelkater heilt es sofort mit Strom."
        es:
          ultra_sun: "Cuando se dan nubes de tormenta un tanto\ninusuales, este Pokémon suele hallarse debajo.\nSe dice que se mueve a la velocidad del rayo."
          ultra_moon: "La electricidad estimula su musculatura para\nque pueda moverse a gran velocidad y le ayuda\na recuperarse del dolor muscular rápidamente."
        ko:
          ultra_sun: "이상한 번개 구름 아래에는\n썬더볼트가 있다. 번개와\n같은 스피드로 달린다고 한다."
          ultra_moon: "전기로 근육을 자극해서\n재빠르게 움직일 수 있다. 근육통도\n전기로 풀기 때문에 금방 낫는다."
        zh_simp:
          ultra_sun: "在不自然的雷云之下有着雷电兽。\n听说会用和雷同等的速度奔驰。"
          ultra_moon: "用电刺激肌肉，所以能迅速行动。\n用电也能缓解肌肉疼痛，\n因此很快会治愈。"
        zh_trad:
          ultra_sun: "在不自然的雷雲之下有著\n雷電獸的身影。據說牠\n奔馳的速度和雷電一樣快。"
          ultra_moon: "會用電流刺激肌肉，所以能\n迅速行動。電流同時也能幫助\n肌肉放鬆，讓酸痛迅速痊癒。"
    manectric_mega:
      form_id: 1
      names:
        jp_kana: メガライボルト
        jp_kanji: メガライボルト
        en: Mega Manectric
        fr: Méga-Élecsprint
        it: MegaManectric
        de: Mega-Voltenso
        es: Mega-Manectric
        ko: 메가썬더볼트
        zh_simp: 超级雷电兽
        zh_trad: 超級雷電獸
      base_stats:
        hp: 70
        attack: 75
        defense: 80
        special_attack: 135
        special_defense: 80
        speed: 135
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - field
      abilities:
        - intimidate
      descriptions:
        jp_kana:
          ultra_sun: "メガシンカで　すさまじい　りょうの\nでんりょくが　たいないに　たまるが\nあつかいきれず　もてあましている。"
          ultra_moon: "からだに　でんきが　たまりすぎていて\nいらだっている。　らくらいと　おなじ\nスピードの　しゅんぱつりょくがある。"
        jp_kanji:
          ultra_sun: "メガシンカで　凄まじい　量の\n電力が　体内に　たまるが\n扱いきれず　持て余している。"
          ultra_moon: "身体に　電気が　たまりすぎていて\n苛立っている。　落雷と　同じ\nスピードの　瞬発力がある。"
        en:
          ultra_sun: "Mega Evolution fills its body with a tremendous\namount of electricity, but it’s too much for\nManectric to fully control."
          ultra_moon: "Too much electricity has built up in its body,\nirritating Manectric. Its explosive speed is equal\nto that of a lightning bolt."
        fr:
          ultra_sun: "Grâce à la Méga-Évolution, son corps a accumulé\nune quantité astronomique d’électricité, mais il\nen gâche une partie car il ne peut tout utiliser."
          ultra_moon: "L’électricité accumulée dans son corps lui\npermet de se déplacer à la vitesse de l’éclair,\nmais elle le rend aussi colérique."
        it:
          ultra_sun: "Con la megaevoluzione accumula una quantità\nenorme di elettricità, ma non avendone piena\npadronanza non riesce a utilizzarla al meglio."
          ultra_moon: "L’eccesso di energia elettrica accumulata nel\nsuo corpo lo rende molto irascibile. Scatena la\nsua forza esplosiva con la velocità di un fulmine."
        de:
          ultra_sun: "Durch die Mega-Entwicklung sammelt sich in\nseinem Körper mehr elektrische Energie an,\nals es verbrauchen kann."
          ultra_moon: "Durch die überschüssige Elektrizität in seinem\nKörper ist es sehr gereizt. Seine explosive Kraft\nhat die Geschwindigkeit eines Blitzschlags."
        es:
          ultra_sun: "La megaevolución hace que se acumule en su\ninterior más electricidad de la que es capaz de\nutilizar."
          ultra_moon: "La electricidad se acumula en su cuerpo y lo\npone de mal humor. Desata su fuerza explosiva\ncon la velocidad de un rayo."
        ko:
          ultra_sun: "메가진화로 엄청난 양의\n전력이 체내에 쌓이지만\n다 쓰지 못해 처치 곤란이다."
          ultra_moon: "몸에 전기가 너무 쌓여서\n화가 나 있다. 낙뢰와 같은\n스피드의 순발력을 가졌다."
        zh_simp:
          ultra_sun: "因超级进化，\n体内储存了惊人的电量，\n但由于没有妥善运用而难以处理。"
          ultra_moon: "因身体里储存着过多的电\n而焦躁不安。有着与落雷\n相同速度的瞬间爆发力。"
        zh_trad:
          ultra_sun: "藉由超級進化在體內\n儲存了驚人的電量，\n但卻沒有能力好好加以運用。"
          ultra_moon: "因為體內儲存了過多電力\n而焦躁不安。有著與落雷\n相同速度的瞬間爆發力。"
