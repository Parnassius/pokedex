morelull:
  species_id: 755
  names:
    jp_kana: ネマシュ
    jp_kanji: ネマシュ
    en: Morelull
    fr: Spododo
    it: Morelull
    de: Bubungus
    es: Morelull
    ko: 자마슈
    zh_simp: 睡睡菇
    zh_trad: 睡睡菇
  forms:
    morelull:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 55
        special_attack: 65
        special_defense: 75
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - grass
        - fairy
      egg_groups:
        - grass
      abilities:
        - illuminate
        - effect_spore
      hidden_ability: rain_dish
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          ultra_sun: "ひかるほうしを　あたりに　ばらまく。\nきけんだが　ネマシュのすむ　もりへの\nナイトツアーは　にんきが　ある。"
          ultra_moon: "うすぐらく　しめったばしょが　すき。\nよるに　なると　キノコの　かさに\nつまった　ほうしが　はっこうする。"
        jp_kanji:
          ultra_sun: "光る　胞子を　あたりに　ばらまく。\n危険だが　ネマシュの棲む　森への\nナイトツアーは　人気が　ある。"
          ultra_moon: "薄暗く　湿った場所が　好き。\n夜に　なると　キノコの　かさに\n詰まった　胞子が　発光する。"
        en:
          ultra_sun: "It scatters its shining spores around itself.\nEven though they’re dangerous, nighttime tours\nof forests where Morelull live are popular."
          ultra_moon: "It likes damp dark places. When night falls, the\nspores filling the caps of its mushrooms glow."
        fr:
          ultra_sun: "Il répand des spores luminescentes autour de\nlui. Malgré le danger qu’il représente, les balades\nnocturnes dans les bois où il vit sont populaires."
          ultra_moon: "Il aime les endroits sombres et humides.\nLa nuit, il fait rayonner les spores contenues\ndans ses chapeaux."
        it:
          ultra_sun: "Sparge tutt’intorno spore brillanti. Nonostante il\npericolo, i tour notturni nei boschi in cui vivono\ni Morelull vanno molto di moda."
          ultra_moon: "Gli piacciono i luoghi ombrosi e umidi.\nQuando scende la notte, le spore di cui sono\ncolmi i suoi cappelli si illuminano."
        de:
          ultra_sun: "Es streut blinkende Sporen aus. Obgleich nicht\nungefährlich, sind nächtliche Führungen durch\nWälder, in denen Bubungus leben, sehr beliebt."
          ultra_moon: "Es bevorzugt dunkle, feuchte Orte. Nachts\nfangen die Sporen in seinen Pilzhüten an zu\nleuchten."
        es:
          ultra_sun: "Esparce esporas luminosas a su alrededor.\nA pesar del peligro, los tours nocturnos a través\nde los bosques que habitan son muy populares."
          ultra_moon: "Prefiere los lugares oscuros y húmedos. Por la\nnoche, las esporas que almacena en los\nsombrerillos lucen en la oscuridad."
        ko:
          ultra_sun: "빛이 나는 포자를 주변에 흩뿌린다.\n위험하지만 자마슈가 사는 숲의\n밤 여행 투어는 인기가 있다."
          ultra_moon: "어둡고 습한 곳을 좋아한다.\n밤이 되면 버섯의 갓에\n모인 포자가 발광한다."
        zh_simp:
          ultra_sun: "在周围到处撒发光的孢子。\n虽然危险，但去睡睡菇居住的\n森林进行夜巡很受人们欢迎。"
          ultra_moon: "喜欢阴暗潮湿的地方。\n到了夜里，蘑菇伞下\n储满的孢子就会发光。"
        zh_trad:
          ultra_sun: "會向四周散佈發光的孢子。\n雖然危險，但在睡睡菇棲息的森林\n舉行的夜遊行程很受人們歡迎。"
          ultra_moon: "喜歡陰暗潮濕的地方。\n到了夜裡，菇傘下塞得\n滿滿的孢子就會發光。"
shiinotic:
  species_id: 756
  names:
    jp_kana: マシェード
    jp_kanji: マシェード
    en: Shiinotic
    fr: Lampignon
    it: Shiinotic
    de: Lamellux
    es: Shiinotic
    ko: 마셰이드
    zh_simp: 灯罩夜菇
    zh_trad: 燈罩夜菇
  forms:
    shiinotic:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 80
        special_attack: 90
        special_defense: 100
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - grass
        - fairy
      egg_groups:
        - grass
      abilities:
        - illuminate
        - effect_spore
      hidden_ability: rain_dish
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          ultra_sun: "えものを　ねむらせ　うでの　さきから\nせいきを　うばう。　なかまが　よわると\nせいきを　おくって　たすけてあげる。"
          ultra_moon: "なわばりを　めぐり　パラセクトと\nあらそい　はじめると　あたりいちめん\nほうしまみれに　なってしまうぞ。"
        jp_kanji:
          ultra_sun: "獲物を　眠らせ　腕の　先から\n生気を　奪う。　仲間が　弱ると\n生気を　送って　助けてあげる。"
          ultra_moon: "縄張りを　巡り　パラセクトと\n争い　はじめると　あたり一面\n胞子まみれに　なってしまうぞ。"
        en:
          ultra_sun: "It puts its prey to sleep and siphons off their\nvitality through the tip of its arms. If one of its\nkind is weakened, it helps by sending it vitality."
          ultra_moon: "When it starts fighting for territory with\nParasect, the entire area gets completely\ncoated in spores!"
        fr:
          ultra_sun: "Il endort ses victimes puis aspire leur énergie\nvitale avec ses doigts. Il aide ses congénères\naffaiblis en partageant cette énergie avec eux."
          ultra_moon: "Quand un conflit territorial éclate entre Parasect\net lui, un brouillard de spores envahit toute\nla zone."
        it:
          ultra_sun: "Addormenta la preda e utilizza le estremità delle\nsue braccia per rubarle l’energia vitale, che può\nanche trasmettere ai compagni in difficoltà."
          ultra_moon: "Quando Shiinotic e Parasect lottano per\nil dominio di un territorio, finiscono per\ncoprire ogni cosa con le loro spore."
        de:
          ultra_sun: "Es lullt seine Gegner in den Schlaf und raubt\nihnen über seine Fingerspitzen die Lebenskraft.\nDiese schickt es schwächelnden Kameraden."
          ultra_moon: "Kommt es zwischen ihm und Parasek zu\nRevierkämpfen, ist hinterher die gesamte\nUmgebung mit Sporen bedeckt."
        es:
          ultra_sun: "Duerme a su presa y le arrebata la vitalidad con\nsus brazos. Si otro Shiinotic se encuentra en\napuros, le transmite sus fuerzas."
          ultra_moon: "Al rondar por su territorio, si se encuentra con\nun Parasect, competirá con él y acabarán\ndejando el lugar cubierto de esporas."
        ko:
          ultra_sun: "먹이를 잠들게 하고 팔 끝으로\n생기를 빼앗는다. 동료가 약해지면\n생기를 보내 도와준다."
          ultra_moon: "영역을 두고 파라섹트와\n싸움을 시작하면 부근 일대는\n포자투성이가 되어 버린다."
        zh_simp:
          ultra_sun: "让猎物睡着，然后从手腕处夺走\n对方的生命气息。伙伴虚弱的话，\n就会输送生命气息给予拯救。"
          ultra_moon: "一旦围绕着领地问题\n与派拉斯特展开争斗，\n周围就会变得到处都是孢子。"
        zh_trad:
          ultra_sun: "會讓獵物睡著，然後用手臂前端\n奪取獵物的精氣。在夥伴虛弱的時候，\n會輸送精氣過去拯救對方。"
          ultra_moon: "一旦為了爭奪地盤而\n與派拉斯特展開鬥爭，\n周圍就會變得到處都是孢子。"
salandit:
  species_id: 757
  names:
    jp_kana: ヤトウモリ
    jp_kanji: ヤトウモリ
    en: Salandit
    fr: Tritox
    it: Salandit
    de: Molunk
    es: Salandit
    ko: 야도뇽
    zh_simp: 夜盗火蜥
    zh_trad: 夜盜火蜥
  forms:
    salandit:
      form_id: 0
      base_stats:
        hp: 48
        attack: 44
        defense: 40
        special_attack: 71
        special_defense: 40
        speed: 77
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
