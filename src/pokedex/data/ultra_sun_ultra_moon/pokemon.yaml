      types:
        - grass
      egg_groups:
        - field
      abilities:
        - leaf_guard
      hidden_ability: chlorophyll
      descriptions:
        jp_kana:
          ultra_sun: "あらそいは　このまないが　なかまを\nまもるためならば　シッポの　はっぱを\nとがらせ　やいばにかえて　たたかう。"
          ultra_moon: "こうごうせいで　えいよう　ほきゅう。\nキレイな　かわが　ながれる　もりの\nおくふかくで　しずかに　くらしている。"
        jp_kanji:
          ultra_sun: "争いは　好まないが　仲間を\n守るためならば　シッポの　葉っぱを\n尖らせ　刃に変えて　戦う。"
          ultra_moon: "光合成で　栄養　補給。\nキレイな　川が　流れる　森の\n奥深くで　静かに　暮らしている。"
        en:
          ultra_sun: "Although it doesn’t like disputes, it will sharpen\nthe leaf on its tail into a blade and fight if it has\nto protect its friends."
          ultra_moon: "It gets its nutrition from photosynthesis. It lives\na quiet life deep in forests where clean\nrivers flow."
        fr:
          ultra_sun: "Il n’aime pas le conflit, mais s’il doit protéger\nses amis, il peut raidir sa queue en forme de\nfeuille et la rendre aussi tranchante qu’une lame."
          ultra_moon: "Il vit dans le calme des forêts profondes\ntraversées par de jolis ruisseaux, où il se\nnourrit de lumière et d’eau fraîche."
        it:
          ultra_sun: "Non ama battersi, ma se deve difendere i suoi\ncompagni non esita a lottare trasformando\nla foglia della coda in una lama affilata."
          ultra_moon: "Si nutre grazie alla fotosintesi. Vive nel cuore\ndelle foreste dove scorrono fiumi limpidi,\nin luoghi immersi nella pace e nella tranquillità."
        de:
          ultra_sun: "Folipurba kämpft nicht gerne, aber sollten sich\nseine Kameraden in Gefahr befinden, verwendet\nes seinen blattartigen Schweif wie eine Klinge."
          ultra_moon: "Mittels Photosynthese versorgt es sich mit\nNährstoffen. Es lebt abgeschieden in dichten,\nvon glitzernden Bächen durchzogenen Wäldern."
        es:
          ultra_sun: "A pesar de evitar a toda costa los combates, si\nha de proteger a sus amigos, no duda en usar la\nhoja de la cola como una afilada espada."
          ultra_moon: "Realiza la fotosíntesis para obtener nutrientes.\nHabita en la apacible espesura de los bosques\nbañados por arroyos de agua cristalina."
        ko:
          ultra_sun: "다툼을 좋아하지 않지만 동료를\n지키기 위해서라면 꼬리의 잎사귀를\n날카로운 칼날로 만들어 싸운다."
          ultra_moon: "광합성으로 영양을 보충한다.\n깨끗한 강이 흐르는 숲의\n깊은 곳에 조용하게 살고 있다."
        zh_simp:
          ultra_sun: "本身并不好斗，但如果是为了\n保护伙伴，就会削尖尾巴上的叶片，\n变成刀刃来作战。"
          ultra_moon: "通过光合作用补充营养。\n在有清澈河流的森林深处\n静静地生活着。"
        zh_trad:
          ultra_sun: "本性並不好鬥，但若是為了\n保護夥伴，牠會讓尾巴上的\n葉片變尖，形成刀刃來戰鬥。"
          ultra_moon: "靠光合作用補充營養。\n在有著清澈河流的森林深處\n靜靜地生活著。"
glaceon:
  species_id: 471
  names:
    jp_kana: グレイシア
