      descriptions:
        jp_kana:
          ultra_sun: "こだいのうみに　いきていた　ポケモン。\nアーケオスの　エサだったようで\nはがたのついた　かせきが　みつかる。"
          ultra_moon: "こだいの　かせきから　ふくげんされた。\nおおむかし　うみだった　ばしょから\nかいのカセキが　はっくつ　される。"
        jp_kanji:
          ultra_sun: "古代の海に　生きていた　ポケモン。\nアーケオスの　エサだったようで\n歯型のついた　化石が　見つかる。"
          ultra_moon: "古代の　化石から　復元された。\n大昔　海だった　場所から\nかいのカセキが　発掘　される。"
        en:
          ultra_sun: "Omanyte lived in the seas of antiquity. Its\nfossils have been found bearing bite marks from\nArcheops, so apparently Archeops preyed on it."
          ultra_moon: "It was restored from an ancient fossil. Those\nHelix Fossils are excavated from areas that\nwere once oceans long, long ago."
        fr:
          ultra_sun: "Un Pokémon qui vivait dans les mers antiques.\nDes fossiles présentant des traces de morsures\nindiquent qu’il était la proie d’Aéroptéryx."
          ultra_moon: "Un Pokémon recréé à partir d’un fossile antique.\nCes Nautiles se trouvent en des endroits jadis\nrecouverts par les flots."
        it:
          ultra_sun: "Pokémon che viveva nei mari ancestrali.\nPer via dei segni di zanne ritrovati sui fossili,\nsi pensa che venisse cacciato dagli Archeops."
          ultra_moon: "Durante scavi in luoghi anticamente sommersi\nsi trovano spesso degli Helixfossili, da cui\nquesto Pokémon viene rigenerato."
        de:
          ultra_sun: "Es lebte im urzeitlichen Meer. Bissspuren auf\nseinen Fossilien deuten darauf hin, dass es\ndamals von Aeropteryx gejagt wurde."
          ultra_moon: "Es konnte durch Fossilien seines Gehäuses\nneu belebt werden, die an Orten gefunden\nwurden, an denen sich früher das Meer befand."
        es:
          ultra_sun: "Pokémon prehistórico que vivía en el océano.\nLas marcas de mordeduras en sus fósiles\nindican que solía ser presa de los Archeops."
          ultra_moon: "Este Pokémon ha sido regenerado a partir de\nFósiles Hélix hallados en estratos que\ncorresponden al lecho de océanos prehistóricos."
        ko:
          ultra_sun: "고대의 바다에 살았던 포켓몬.\n아케오스의 먹이였던 것으로 추정되며\n잇자국이 있는 화석이 발견된다."
          ultra_moon: "고대 화석에서 복원되었다.\n오랜 옛날 바다였던 곳에서\n조개화석이 발굴된다."
        zh_simp:
          ultra_sun: "生活在古代海洋中的宝可梦。\n好像曾是始祖大鸟的食物，\n发现过带有齿痕的化石。"
          ultra_moon: "从古代的化石复原而来。\n在很久以前还是海洋的地方\n能发掘出它的贝壳化石。"
        zh_trad:
          ultra_sun: "生活在古代海洋中的寶可夢。\n似乎是始祖大鳥的食物，\n曾被發現過帶有齒痕的化石。"
          ultra_moon: "從古代的化石復原而來。\n在很久以前曾經是海洋的地方\n能夠發掘到牠的貝殼化石。"
omastar:
  species_id: 139
  names:
    jp_kana: オムスター
    jp_kanji: オムスター
    en: Omastar
    fr: Amonistar
    it: Omastar
    de: Amoroso
    es: Omastar
    ko: 암스타
    zh_simp: 多刺菊石兽
    zh_trad: 多刺菊石獸
  forms:
    omastar:
      form_id: 0
      base_stats:
        hp: 70
        attack: 60
        defense: 125
        special_attack: 115
        special_defense: 70
