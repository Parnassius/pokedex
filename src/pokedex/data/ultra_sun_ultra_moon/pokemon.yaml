bruxish:
  species_id: 779
  names:
    jp_kana: ハギギシリ
    jp_kanji: ハギギシリ
    en: Bruxish
    fr: Denticrisse
    it: Bruxish
    de: Knirfish
    es: Bruxish
    ko: 치갈기
    zh_simp: 磨牙彩皮鱼
    zh_trad: 磨牙彩皮魚
  forms:
    bruxish:
      form_id: 0
      base_stats:
        hp: 68
        attack: 105
        defense: 70
        special_attack: 70
        special_defense: 70
        speed: 92
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - water_2
      abilities:
        - dazzling
        - strong_jaw
      hidden_ability: wonder_skin
      held_items:
        rare: razor_fang
      descriptions:
        jp_kana:
          ultra_sun: "すなに　もぐり　あたまの　とっきから\nサイコパワーを　ほうしゃ。　あたりの\nようすを　さぐりつつ　えものを　まつ。"
          ultra_moon: "ヒドイデの　ハリも　とおさないほど\nぶあつい　ひふ。　じょうぶな　はで\nボリボリと　ハリを　かじって　くう。"
        jp_kanji:
          ultra_sun: "砂に　潜り　頭の　突起から\nサイコパワーを　放射。　あたりの\n様子を　探りつつ　獲物を　待つ。"
          ultra_moon: "ヒドイデの　ハリも　通さないほど\n分厚い　皮膚。　丈夫な　歯で\nボリボリと　ハリを　かじって　食う。"
        en:
          ultra_sun: "It burrows beneath the sand, radiating\npsychic power from the protuberance on its\nhead. It waits for prey as it surveys the area."
          ultra_moon: "Its skin is thick enough to fend off Mareanie’s\nspikes. With its robust teeth, Bruxish crunches\nup the spikes and eats them."
        fr:
          ultra_sun: "Enfoui dans le sable, il projette ses pouvoirs\npsychiques via l’appendice qu’il a sur la tête,\net scanne les environs en attendant sa proie."
          ultra_moon: "Sa peau est si épaisse que même les épines\nde Vorastérie ne peuvent la percer. Il les croque\nbruyamment grâce à ses dents solides."
        it:
          ultra_sun: "Si nasconde nella sabbia ed emette il suo potere\npsichico dalla protuberanza sulla testa. Aspetta\nla preda sorvegliando l’ambiente che lo circonda."
          ultra_moon: "La sua pelle spessa non viene scalfita neanche\ndagli aculei dei Mareanie, che sgranocchia con\nle robuste zanne."
        de:
          ultra_sun: "Es vergräbt sich im Sand und setzt über den\nFortsatz an seinem Kopf Psycho-Kräfte frei. So\nscannt es die Gegend ab und wartet auf Beute."
          ultra_moon: "Seine Haut ist so hart, dass selbst die Nadeln\neines Garstella sie nicht durchdringen. Mit\nseinen kräftigen Zähnen zerkaut es sie einfach."
        es:
          ultra_sun: "Oculto bajo la arena, emite poderes psíquicos\npor la protuberancia de su cabeza. Analiza el\nentorno mientras espera a que caiga su presa."
          ultra_moon: "Su piel es tan gruesa que ni las espinas de\nMareanie pueden perforarla. Con su fuerte\ndentadura tritura y engulle dichas espinas."
        ko:
          ultra_sun: "모래로 숨어들어 머리의 돌기에서\n사이코 파워를 방사한다. 주변의\n상태를 탐지하면서 먹이를 기다린다."
          ultra_moon: "시마사리의 바늘도 뚫지 못할 정도로\n두꺼운 피부를 가졌다. 튼튼한 이빨로\n어적어적 바늘을 갉아서 먹는다."
        zh_simp:
          ultra_sun: "潜藏在沙子里，\n从头部的突起物里放射出精神力量。\n会边探查周围的情形边等待猎物。"
          ultra_moon: "厚实的皮肤连好坏星的针\n也穿不透。会用结实的牙齿\n嘎嘣嘎嘣地咬碎针吃下去。"
        zh_trad:
          ultra_sun: "會潛藏在沙子裡，\n從頭部的突起物發射精神力量，\n在探查周圍狀況的同時等待獵物。"
          ultra_moon: "厚實的皮膚連好壞星的針\n也無法穿透。會用結實的牙齒\n把針咬碎之後吃下去。"
drampa:
  species_id: 780
  names:
    jp_kana: ジジーロン
    jp_kanji: ジジーロン
    en: Drampa
    fr: Draïeul
    it: Drampa
    de: Sen-Long
    es: Drampa
    ko: 할비롱
    zh_simp: 老翁龙
    zh_trad: 老翁龍
  forms:
    drampa:
      form_id: 0
      base_stats:
        hp: 78
        attack: 60
        defense: 85
        special_attack: 135
        special_defense: 91
        speed: 36
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - berserk
        - sap_sipper
      hidden_ability: cloud_nine
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          ultra_sun: "おともだちに　なった　こどもが\nいじめられると　いじめた　こどもの\nいえを　さがして　やきつくしてしまう。"
          ultra_moon: "まちに　あらわれ　こどもと　あそぶ。\nきけんな　めに　あっても　こどもを\nまもるので　おくさんも　あんしんだ。"
        jp_kanji:
          ultra_sun: "お友達に　なった　子どもが\nいじめられると　いじめた　子どもの\n家を　探して　焼き尽くしてしまう。"
          ultra_moon: "町に　現れ　子どもと　遊ぶ。\n危険な　目に　あっても　子どもを\n守るので　奥さんも　安心だ。"
        en:
          ultra_sun: "If a child it has made friends with is bullied,\nDrampa will find the bully’s house and burn it to\nthe ground."
          ultra_moon: "It appears in towns and plays with the children.\nDrampa will protect kids when they’re in danger,\nso their moms don’t have to worry."
        fr:
          ultra_sun: "S’il apprend qu’un enfant avec lequel il s’est lié\nd’amitié est persécuté par ses camarades,\nil trouve leur maison et la réduit en cendres."
          ultra_moon: "Il vient en ville pour jouer avec les enfants,\net les protège en cas de danger. Les parents\npeuvent donc avoir l’esprit tranquille !"
        it:
          ultra_sun: "Se i bambini con cui ha fatto amicizia vengono\nmaltrattati, cerca la casa dei responsabili e\nla riduce in cenere."
          ultra_moon: "Visita le città per giocare con i bambini ed è\nsempre pronto a proteggerli. Per questo,\nquando c’è lui i genitori sono tranquilli."
        de:
          ultra_sun: "Wenn eines der Kinder, mit denen es befreundet\nist, von jemandem gehänselt wird, sucht es das\nHaus des Übeltäters auf und brennt es nieder."
          ultra_moon: "Es besucht so manche Stadt und spielt mit den\nKindern. Mütter können beruhigt sein, da es die\nKinder auch in brenzligen Situationen beschützt."
        es:
          ultra_sun: "Si un niño con el que ha trabado amistad sufre\nlas burlas de otro niño, busca la casa del\nabusón y le prende fuego."
          ultra_moon: "Se adentra en los pueblos para jugar con los\nniños. Los protege de cualquier peligro, así que\nsus padres están tranquilos."
        ko:
          ultra_sun: "친구가 된 아이가 괴롭힘을\n당하면 괴롭힌 아이의\n집에 찾아가서 태워버린다."
          ultra_moon: "마을에 나타나서 아이들과 논다.\n위험에 처해도 아이를\n지켜주기 때문에 어머니도 안심할 수 있다."
        zh_simp:
          ultra_sun: "如果和自己成为朋友的孩子被欺负，\n就会找到欺负他的那个孩子家，\n然后用火燃烧殆尽。"
          ultra_moon: "会和出现在镇上的孩子玩耍。\n即使遇到危险也会保护孩子，\n所以妈妈们也很放心。"
        zh_trad:
          ultra_sun: "如果和自己成為朋友的孩子被欺負，\n牠會去找出欺負人的那個孩子家，\n然後把房子燒光光。"
          ultra_moon: "會出現在城鎮裡和孩子們玩耍。\n遇上危險時會保護孩子，\n所以媽媽們也很放心。"
dhelmise:
  species_id: 781
  names:
    jp_kana: ダダリン
    jp_kanji: ダダリン
    en: Dhelmise
    fr: Sinistrail
    it: Dhelmise
    de: Moruda
    es: Dhelmise
    ko: 타타륜
    zh_simp: 破破舵轮
    zh_trad: 破破舵輪
  forms:
    dhelmise:
      form_id: 0
      base_stats:
        hp: 70
        attack: 131
        defense: 100
        special_attack: 86
        special_defense: 90
        speed: 40
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - grass
      egg_groups:
        - mineral
      abilities:
        - steelworker
      descriptions:
        jp_kana:
          ultra_sun: "みどりのモズクを　からませ　せいきを\nうばい　すする。　ホエルオーみたいな\nおおものばかりを　このんで　ねらう。"
          ultra_moon: "くさりの　ような　みどりの　もくずは\nすうひゃくメートルも　のびる。\nクズモーと　なぜか　なかよし。"
        jp_kanji:
          ultra_sun: "緑のモズクを　絡ませ　生気を\n奪い　すする。　ホエルオーみたいな\n大物ばかりを　好んで　狙う。"
          ultra_moon: "鎖の　ような　緑の　藻屑は\n数百メートルも　のびる。\nクズモーと　なぜか　仲良し。"
        en:
          ultra_sun: "It wraps its prey in green seaweed and sucks\naway their vitality. It only likes to go after big\nprey like Wailord."
          ultra_moon: "Its chain-like green seaweed can stretch\noutward for hundreds of yards. For some\nreason, it gets along well with Skrelp."
        fr:
          ultra_sun: "Il enserre ses victimes de ses algues vertes\npour aspirer leur énergie vitale. Il ne chasse\nque les grosses proies, comme les Wailord."
          ultra_moon: "Les algues vertes formant sa chaîne s’étendent\nsur plusieurs centaines de mètres. Il s’entend\nbien avec Venalgue."
        it:
          ultra_sun: "Ruba l’energia vitale della preda avvolgendola\ncon le sue alghe verdi. Prende di mira solo\ni Pokémon di grossa stazza come Wailord."
          ultra_moon: "Le sue alghe formano una specie di catena che\npuò allungarsi per diverse centinaia di metri. Per\nqualche strano motivo, va d’accordo con Skrelp."
        de:
          ultra_sun: "Es wickelt grünes Seegras um seine Beute und\nsaugt ihr die Energie aus. Auf seinem Speiseplan\nstehen nur große Pokémon wie Wailord."
          ultra_moon: "Seinen kettenartigen, grünen Seetang kann es\nmehrere 100 m weit strecken. Warum es sich\ngerade mit Algitt gut versteht, weiß man nicht."
        es:
          ultra_sun: "Envuelve a sus víctimas con su alga verde y les\nabsorbe la vitalidad. Se deleita en cazar solo\npresas de gran tamaño, como Wailord."
          ultra_moon: "Su alga verde se extiende en forma de cadena\nvarios cientos de metros. Por algún motivo, se\nlleva bien con Skrelp."
        ko:
          ultra_sun: "녹색의 해초를 휘감아 생기를\n빨아들인다. 주로 고래왕처럼\n몸집이 큰 것을 노린다."
          ultra_moon: "사슬 같은 녹색 해초는\n수백 미터나 늘어난다.\n희한하게도 수레기와 사이가 좋다."
        zh_simp:
          ultra_sun: "缠绕着绿色的海藻，抢夺并吸取\n生命气息。光喜欢吃吼鲸王那样的\n大型生物，会攻击它们。"
          ultra_moon: "像锁链一样的绿色碎藻\n能绵延数百米。\n不知为何与垃垃藻关系很好。"
        zh_trad:
          ultra_sun: "會用綠色的海藻纏住獵物\n並奪取精氣。總是喜歡找上\n吼鯨王之類的大型對手。"
          ultra_moon: "像鎖鏈一樣的綠色海藻\n能夠綿延數百公尺長。\n不知為何與垃垃藻關係很好。"
jangmo_o:
  species_id: 782
  names:
    jp_kana: ジャラコ
    jp_kanji: ジャラコ
    en: Jangmo-o
    fr: Bébécaille
    it: Jangmo-o
    de: Miniras
    es: Jangmo-o
    ko: 짜랑꼬
    zh_simp: 心鳞宝
    zh_trad: 心鱗寶
  forms:
    jangmo_o:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 65
        special_attack: 45
        special_defense: 45
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - bulletproof
        - soundproof
      hidden_ability: overcoat
      held_items:
        rare: razor_claw
      descriptions:
        jp_kana:
          ultra_sun: "あたまの　ウロコで　いわや　じめんを\nバシバシ　たたき　あいてを　いかく。\nおとで　なかまと　れんらくも　とる。"
          ultra_moon: "てきに　せなかを　みせず　たたかう。\nゆうかんな　せいしつから　こだいの\nせんしは　このんで　なかまに　した。"
        jp_kanji:
          ultra_sun: "頭の　ウロコで　岩や　地面を\nバシバシ　叩き　相手を　威嚇。\n音で　仲間と　連絡も　とる。"
          ultra_moon: "敵に　背中を　見せず　戦う。\n勇敢な　性質から　古代の\n戦士は　好んで　仲間に　した。"
        en:
          ultra_sun: "It smacks the scales on its head against rocks\nor against the ground to frighten its opponents.\nIt can also contact its friends with these noises."
          ultra_moon: "It will never show an enemy its back in battle.\nAncient warriors liked Jangmo-o for its valiant\ndisposition and made it one of their own."
        fr:
          ultra_sun: "Il frotte violemment l’écaille de sa tête sur des\npierres et sur le sol pour intimider ses ennemis\nou pour communiquer avec ses congénères."
          ultra_moon: "Il ne tourne jamais le dos à son adversaire en\ncombat. Les guerriers d’autrefois s’en faisaient\nun compagnon, car ils appréciaient sa bravoure."
        it:
          ultra_sun: "Sbatte con violenza le squame che ha sul capo\ncontro le rocce e sul terreno per spaventare i\nnemici e per comunicare coi suoi simili."
          ultra_moon: "Lotta senza dare mai le spalle al nemico.\nI guerrieri del passato lo sceglievano come\nalleato per la sua indole coraggiosa."
        de:
          ultra_sun: "Mit der Schuppe an seinem Kopf schlägt es laut\nauf Steine oder auf den Boden, um seine Gegner\neinzuschüchtern oder Freunde zu rufen."
          ultra_moon: "Im Kampf dreht es seinem Feind nie den Rücken\nzu. Weil es so unerschrocken ist, wurde es von\nKriegern uralter Völker als Partner bevorzugt."
        es:
          ultra_sun: "Embiste ferozmente contra las rocas o el suelo\ncon la escama de su cabeza e intimida al rival.\nEl sonido también le sirve para comunicarse."
          ultra_moon: "Combate sin dar nunca la espalda al enemigo.\nLos guerreros de la antigüedad admiraban su\nosadía y lo tomaban como compañero."
        ko:
          ultra_sun: "머리의 비늘로 바위나 지면을\n마구 두드려 상대를 위협한다.\n소리로 동료와 연락도 취한다."
          ultra_moon: "적에게 등을 보이지 않고 싸운다.\n용감한 기질을 갖고 있어서\n고대의 전사는 곧잘 동료로 삼았다."
        zh_simp:
          ultra_sun: "用头部的鳞片砰砰砰地\n敲响岩石和地面，威吓对手。\n也会用声音和伙伴联络。"
          ultra_moon: "战斗的时候不会让敌人看到背部。\n因为性格勇敢，古代的战士\n很喜欢让它做自己的伙伴。"
        zh_trad:
          ultra_sun: "會用頭部的鱗片敲擊\n岩石或地面來威嚇對手。\n也會用這種聲音和夥伴聯絡。"
          ultra_moon: "戰鬥時不會讓對手看見自己背後。\n因為性情勇敢，古代的戰士\n很喜歡讓牠做自己的夥伴。"
