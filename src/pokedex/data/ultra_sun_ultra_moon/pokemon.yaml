          ultra_sun: "A life-form that lives in another world, its body\nis thin and supple, but it also possesses\ngreat power."
          ultra_moon: "Although it’s alien to this world and a danger\nhere, it’s apparently a common organism in the\nworld where it normally lives."
        fr:
          ultra_sun: "Une forme de vie venant d’un autre monde.\nSon corps gracile cache une puissance\ninsoupçonnée."
          ultra_moon: "Cette créature venue d’ailleurs est dangereuse\ndans notre monde, mais il semblerait qu’elle soit\ntrès commune dans le sien."
        it:
          ultra_sun: "Una forma di vita proveniente da un altro mondo.\nIl suo corpo esile e flessibile nasconde una forza\ninaspettata."
          ultra_moon: "Nel nostro mondo il suo aspetto appare strano\ne minaccioso, ma sembra che in quello da cui\nproviene sia una creatura molto comune."
        de:
          ultra_sun: "Ein Lebewesen aus einer anderen Welt. Sein\nKörper ist schmal und anmutig, doch es verbirgt\nsich große Kraft darin."
          ultra_moon: "In dieser Welt wirkt sein Aussehen gefährlich\nund fremdartig, doch in seiner ursprünglichen\nWelt ist es ein ganz gewöhnliches Lebewesen."
        es:
          ultra_sun: "Una forma de vida procedente de otro mundo.\nAunque su cuerpo es esbelto y flexible, alberga\nun gran poder."
          ultra_moon: "Para los seres de este mundo resulta extraño\ny peligroso, pero en el mundo del que procede\nes una criatura muy común."
        ko:
          ultra_sun: "다른 세계에 사는 생명체다.\n가늘고 부드러운 몸이지만,\n강한 파워를 간직하고 있는 듯하다."
          ultra_moon: "이 세계와는 성질이 다르고\n위험하지만 원래 살던 세계에서는\n흔히 볼 수 있는 생물인 듯하다."
        zh_simp:
          ultra_sun: "栖息在其他世界的生命体。\n身体纤细柔软，\n但是看起来蕴藏着强大的力量。"
          ultra_moon: "在这个世界是异类，很危险，\n但在它原本栖息的世界，\n好像只是寻常能见的生物。"
        zh_trad:
          ultra_sun: "棲息在其他世界的生命體。\n身體纖細柔軟，\n但似乎蘊藏著強大的力量。"
          ultra_moon: "在這個世界是危險的異類，\n但牠在原本棲息的世界裡\n似乎是隨處可見的普通生物。"
