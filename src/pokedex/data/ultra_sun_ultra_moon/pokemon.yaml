      descriptions:
        jp_kana:
          ultra_sun: "りくに　くらし　えものを　もとめて\nうみへ　かりへと　でかけていた。\nするどい　ツメが　さいだいの　ぶき。"
          ultra_moon: "うみから　ちじょうで　くらすように\nなった。　いちぶの　むしポケモンの\nそせんで　あることが　わかった。"
        jp_kanji:
          ultra_sun: "陸に　暮らし　獲物を　求めて\n海へ　狩りへと　でかけていた。\n鋭い　ツメが　最大の　武器。"
          ultra_moon: "海から　地上で　暮らすように\nなった。　一部の　むしポケモンの\n祖先で　あることが　わかった。"
        en:
          ultra_sun: "It lived on land and went out into the sea to\nhunt for prey. Its sharp claws were its\ngreatest weapon."
          ultra_moon: "Armaldo adapted from living in water to living on\nland. It has been determined that it is the\nancestor of some bug Pokémon."
        fr:
          ultra_sun: "Ce Pokémon terrestre avait pour habitude\nd’aller chasser ses proies en mer à l’aide de\nses armes de prédilection : ses griffes acérées."
          ultra_moon: "Considéré comme l’un des ancêtres des\nPokémon Insecte, il avait quitté la mer pour\ns’installer sur la terre ferme."
        it:
          ultra_sun: "Viveva sulla terraferma e si tuffava in mare\nper cacciare le prede. La sua arma migliore\nerano gli artigli affilati."
          ultra_moon: "Originariamente viveva in mare, ma poi si spostò\nsulla terraferma. Si è scoperto che è l’antenato\ndi alcuni Pokémon Coleottero."
        de:
          ultra_sun: "Es lebte an Land und jagte im Meer nach Beute.\nSeine scharfen Klauen waren seine größte Waffe."
          ultra_moon: "Es hat früher im Meer gelebt und ist dann an\nLand gekommen. Man hat herausgefunden, dass\nes der Vorfahre einiger Käfer-Pokémon ist."
        es:
          ultra_sun: "Vivía en tierra firme, pero se adentraba en el\nmar en busca de presas a las que cazar con\nsus afiladas pinzas, un arma de lo más temible."
          ultra_moon: "Este Pokémon abandonó el mar para habitar en\ntierra firme. Según se ha demostrado, es el\nantepasado de algunos Pokémon insecto."
        ko:
          ultra_sun: "지상에 살며 먹이를 찾아\n바다로 사냥을 나갔다.\n날카로운 발톱이 최대 무기다."
          ultra_moon: "바다에서 살다가 지상에서도\n살 수 있게 되었다. 일부 벌레포켓몬의\n조상인 것으로 밝혀졌다."
        zh_simp:
          ultra_sun: "生活在陆地上，曾为了\n寻找猎物而出发去海里狩猎。\n锐利的爪子是它最大的武器。"
          ultra_moon: "从海里变成了在陆地生活。\n据了解，是一部分虫宝可梦的祖先。"
        zh_trad:
          ultra_sun: "過去的牠生活在陸地上，\n會為了尋找獵物而去海中狩獵。\n銳利的爪子是牠最大的武器。"
          ultra_moon: "從海裡搬到了陸地上生活。\n根據了解，牠是一部份\n蟲寶可夢的祖先。"
feebas:
  species_id: 349
  names:
    jp_kana: ヒンバス
    jp_kanji: ヒンバス
    en: Feebas
    fr: Barpau
    it: Feebas
    de: Barschwa
    es: Feebas
    ko: 빈티나
    zh_simp: 丑丑鱼
    zh_trad: 醜醜魚
  forms:
    feebas:
      form_id: 0
      base_stats:
        hp: 20
        attack: 15
        defense: 20
        special_attack: 10
        special_defense: 55
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - swift_swim
        - oblivious
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          ultra_sun: "ボロボロなので　だれも　つかまえない。\nまずそうなので　えものにも　されない。\nけっかてきに　どんどん　ふえていく。"
          ultra_moon: "みすぼらしいので　たいていの　ひとは\nみむきも　しないが　ヒンバス　だけを\nあつめる　コレクターだって　いるぞ。"
        jp_kanji:
          ultra_sun: "ボロボロなので　誰も　捕まえない。\nまずそうなので　獲物にも　されない。\n結果的に　どんどん　増えていく。"
          ultra_moon: "みすぼらしいので　大抵の　人は\n見向きも　しないが　ヒンバス　だけを\n集める　コレクターだって　いるぞ。"
        en:
          ultra_sun: "They look ragged, so no one catches them. They\nlook like they’d taste bad, so predators won’t\neat them. And their numbers continue to grow."
          ultra_moon: "Because of its wretched appearance, most\npeople pay it no attention, but there are some\nwho collect Feebas—and Feebas alone!"
        fr:
          ultra_sun: "Son apparence peu ragoûtante repousse les\nprédateurs et dissuade les gens de le pêcher.\nSa population augmente donc rapidement."
          ultra_moon: "En raison de sa laideur, la plupart des gens\ndétournent le regard quand ils le croisent.\nIl a cependant des fans qui le collectionnent."
        it:
          ultra_sun: "Per via del suo misero aspetto, nessuno lo\ncattura e nessun predatore lo trova appetitoso.\nPer questo continua a proliferare."
          ultra_moon: "Molti non lo degnano di uno sguardo per via del\nsuo misero aspetto. Tuttavia, alcuni collezionisti\ncatturano solo i Feebas."
        de:
          ultra_sun: "Wegen ihres schäbigen Aussehens werden sie\nnicht gefangen und auch als Beute verschmäht.\nDadurch vermehren sie sich ungehindert."
          ultra_moon: "Die meisten Menschen schenken ihm wegen\nseines armseligen Äußeren keine Beachtung.\nDoch es gibt Sammler, die nur Barschwa wollen."
        es:
          ultra_sun: "Debido a su cuerpo mellado y su feo aspecto, no\nes muy apetecible como presa ni popular entre\nlos Entrenadores y por eso está proliferando."
          ultra_moon: "Debido a su aspecto tan descuidado, la mayoría\nde la gente no le presta atención. Sin embargo,\nhay personas que coleccionan solo Feebas."
        ko:
          ultra_sun: "모습이 초라해서 아무도 잡지 않는다.\n맛없어 보여서 아무도 먹지 않는다.\n결과적으로 개체 수만 점점 늘어난다."
          ultra_moon: "외모가 초라해서 대부분 사람은\n거들떠보지도 않지만 빈티나만을\n모으는 컬렉터도 있다."
        zh_simp:
          ultra_sun: "因为破破烂烂的，谁也不要捉。\n因为看起来不好吃，也不会被当做猎物。\n结果就是，数量嗖嗖地增加起来。"
          ultra_moon: "因为长得寒碜，\n大多数人看都不看，\n但是有只收集丑丑鱼的收藏家。"
        zh_trad:
          ultra_sun: "因為破破爛爛的，誰也不會去捉牠。\n因為看起來很難吃，所以不會被當成獵物。\n於是數量就變得越來越多了。"
          ultra_moon: "因為長得很難看，大多數的人\n對牠毫無興趣。但也有\n專門收集醜醜魚的收藏家存在。"
milotic:
  species_id: 350
  names:
    jp_kana: ミロカロス
    jp_kanji: ミロカロス
    en: Milotic
    fr: Milobellus
    it: Milotic
    de: Milotic
    es: Milotic
    ko: 밀로틱
    zh_simp: 美纳斯
    zh_trad: 美納斯
  forms:
    milotic:
      form_id: 0
      base_stats:
        hp: 95
        attack: 60
        defense: 79
        special_attack: 100
        special_defense: 125
        speed: 81
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - dragon
      abilities:
        - marvel_scale
        - competitive
      hidden_ability: cute_charm
      descriptions:
        jp_kana:
          ultra_sun: "もっとも　うつくしいと　いわれるが\nヒンバスが　すきで　そだててきた\nトレーナーには　びみょう　らしい。"
          ultra_moon: "おおきな　みずうみの　そこに　すむ。\nうつくしい　そのすがたは　みたものの\nこころの　けがれを　はらう　という。"
        jp_kanji:
          ultra_sun: "最も　美しいと　いわれるが\nヒンバスが　好きで　育ててきた\nトレーナーには　微妙　らしい。"
          ultra_moon: "大きな　湖の　底に　棲む。\n美しい　その姿は　見た者の\n心の　けがれを　はらう　という。"
        en:
          ultra_sun: "While Milotic is said to be the most beautiful\nPokémon, Trainers who like Feebas and have\nraised it are seemingly disappointed by Milotic."
          ultra_moon: "Its dwelling place is the bottom of big lakes.\nThose who behold its loveliness are said to\nhave their hearts purified."
        fr:
          ultra_sun: "Il est considéré comme le plus beau de tous\nles Pokémon, mais il est loin de faire l’unanimité\nauprès des fans de Barpau !"
          ultra_moon: "Le simple fait d’apercevoir cet habitant du fond\ndes grands lacs permettrait de purifier son\ncœur des troubles qui l’habitent."
        it:
          ultra_sun: "Si dice che sia il Pokémon più bello del mondo,\nma su questo gli appassionati di Feebas più\nincalliti non sono d’accordo."
          ultra_moon: "Vive sul fondo dei grandi laghi. Pare che la sua\nbellezza vertiginosa purifichi l’animo di chi lo\nvede da tutte le brutture."
        de:
          ultra_sun: "Es soll das schönste Pokémon sein, aber Trainer,\ndie Barschwa trainiert haben, weil sie es mögen,\nsollen nicht so begeistert sein."
          ultra_moon: "Es lebt auf dem Grund großer Seen. Es heißt, der\nAnblick seiner Schönheit befreie jedes Herz von\nUnreinheit."
        es:
          ultra_sun: "Dicen que es el Pokémon más bello, pero es algo\nque los Entrenadores forofos de los Feebas\nponen en tela de juicio."
          ultra_moon: "Vive en lo más profundo de los grandes lagos.\nSe dice que su gran belleza purifica el corazón\nde todos aquellos que lo contemplen."
        ko:
          ultra_sun: "가장 아름답다고 하지만\n빈티나가 좋아서 기른\n트레이너에게는 미묘한 듯하다."
          ultra_moon: "큰 호수 바닥에 산다.\n아름다운 그 모습은 보는 이의\n마음의 부정함을 없앤다고 한다."
        zh_simp:
          ultra_sun: "被称为最美的宝可梦，\n对于因喜爱丑丑鱼而培育它的\n训练家，好像很微妙。"
          ultra_moon: "栖息在很大的湖底。\n听说，只要看见它那美丽的样子，\n心里的污秽就会被清除。"
        zh_trad:
          ultra_sun: "被稱為最美的寶可夢。\n但就喜歡醜醜魚而培育牠的\n訓練家看來卻未必如此。"
          ultra_moon: "棲息在大湖的湖底。\n據說只要看見牠美麗的身影，\n心中的污穢就會得到淨化。"
