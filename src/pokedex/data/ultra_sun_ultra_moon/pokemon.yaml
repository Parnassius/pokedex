      descriptions:
        jp_kana:
          ultra_sun: "はなで　ふくらませる　バルーンは\nひび　れんしゅうを　かさねることで\nすこしずつ　おおきく　なっていく。"
          ultra_moon: "だんりょくせいの　ある　みずの\nバルーンに　のって　だいジャンプ。\nアクロバティックに　たたかうぞ。"
        jp_kanji:
          ultra_sun: "鼻で　膨らませる　バルーンは\n日々　練習を　重ねることで\n少しずつ　大きく　なっていく。"
          ultra_moon: "弾力性の　ある　水の\nバルーンに　乗って　大ジャンプ。\nアクロバティックに　戦うぞ。"
        en:
          ultra_sun: "The balloons it inflates with its nose grow\nlarger and larger as it practices day by day."
          ultra_moon: "Popplio gets on top of its bouncy water balloons\nto jump higher. It’s quite the acrobatic fighter!"
        fr:
          ultra_sun: "À force de s’entraîner quotidiennement,\nles ballons qu’il gonfle avec son nez grossissent\nde jour en jour."
          ultra_moon: "Il monte sur un ballon d’eau élastique pour\neffectuer de grands sauts. Son style de combat\nest on ne peut plus acrobatique."
        it:
          ultra_sun: "Grazie al costante allenamento, i palloncini\nche gonfia con il naso diventano ogni giorno\nun po’ più grandi."
          ultra_moon: "Sfrutta l’elasticità dei palloncini d’acqua per\nrimbalzarci sopra e saltare ancora più in alto.\nAnche nelle lotte è un vero acrobata!"
        de:
          ultra_sun: "Dank seines täglichen Trainings gelingt es ihm,\nmit seiner Nase immer größere Blasen zu\nerzeugen."
          ultra_moon: "Es klettert auf seine elastischen Wasserblasen\nund nutzt sie als Trampolin. Sein Kampfstil ist\nsehr akrobatisch."
        es:
          ultra_sun: "Gracias al entrenamiento diario al que se\nsomete, es capaz de inflar burbujas cada vez\nmás grandes a través de la nariz."
          ultra_moon: "Monta sobre las burbujas de agua para realizar\ngrandes saltos. Su estilo de combate es\nbastante acrobático."
        ko:
          ultra_sun: "코로 부풀리는 벌룬은\n매일 연습을 반복하면서\n조금씩 커진다."
          ultra_moon: "탄력이 있는 물의\n벌룬을 타고 크게 점프한다.\n아크로바틱하게 싸운다."
        zh_simp:
          ultra_sun: "通过每天不断地重复练习，\n用鼻子吹起来的气球\n一点点地变大起来。"
          ultra_moon: "乘着有弹性的水做的气球，\n进行大大的跳跃。\n会像表演杂技那样战斗。"
        zh_trad:
          ultra_sun: "靠著每天不斷地練習，\n用鼻子吹出的氣球\n會一點一滴地漸漸變大。"
          ultra_moon: "會乘著有彈性的水球\n做出大大的跳躍，\n像表演雜技般地戰鬥。"
brionne:
  species_id: 729
  names:
    jp_kana: オシャマリ
    jp_kanji: オシャマリ
    en: Brionne
    fr: Otarlette
    it: Brionne
    de: Marikeck
    es: Brionne
    ko: 키요공
    zh_simp: 花漾海狮
    zh_trad: 花漾海獅
  forms:
    brionne:
      form_id: 0
      base_stats:
        hp: 60
        attack: 69
        defense: 69
        special_attack: 91
        special_defense: 81
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
