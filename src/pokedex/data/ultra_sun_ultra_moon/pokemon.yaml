      types:
        - water
      egg_groups:
        - water_3
      abilities:
        - illuminate
        - natural_cure
      hidden_ability: analytic
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          ultra_sun: "ほしくずが　うみに　おちて\nヒトデマンに　なったのだ　という\nみんわが　かくちに　のこっている。"
          ultra_moon: "いくら　きずついても　へいき。\nさいせいのうりょくが　たかいので\nはんにちぐらいで　もとに　もどるぞ。"
        jp_kanji:
          ultra_sun: "星屑が　海に　落ちて\nヒトデマンに　なったのだ　という\n民話が　各地に　残っている。"
          ultra_moon: "いくら　傷ついても　平気。\n再生能力が　高いので\n半日ぐらいで　元に　戻るぞ。"
        en:
          ultra_sun: "In many places, there are folktales of stardust\nfalling into the ocean and becoming Staryu."
          ultra_moon: "No number of injuries can bother Staryu. Its\namazing regenerative powers return it to its\nprevious state in half a day!"
        fr:
          ultra_sun: "Si l’on en croit une légende populaire, il serait\nné d’une pluie de poussière d’étoiles tombée\ndans la mer."
          ultra_moon: "Étant capable de se régénérer en une demi-\njournée seulement, il ne craint aucune blessure."
        it:
          ultra_sun: "In molti luoghi è ancora diffusa la credenza\nche gli Staryu nascano da polvere di stelle\ncaduta in fondo al mare."
          ultra_moon: "Le ferite non sono un problema per Staryu:\ngrazie alle sue eccellenti capacità rigenerative,\ntorna intero in mezza giornata."
        de:
          ultra_sun: "Einer weitverbreiteten Volkssage zufolge ist\nSterndu aus Sternennebel entstanden, der ins\nMeer gefallen war."
          ultra_moon: "Verletzungen machen diesem Pokémon nichts\naus. Dank seiner Regenerationsfähigkeit ist es\neinen halben Tag später schon wieder wie neu."
        es:
          ultra_sun: "Varias leyendas populares atribuyen su origen\na polvo de estrellas que se precipitó en la mar."
          ultra_moon: "Puede sufrir graves heridas sin problema,\nya que sus notables facultades regenerativas\nle permiten recuperarse en apenas medio día."
        ko:
          ultra_sun: "무수한 별들이 바다로 떨어져\n별가사리가 되었다고 하는\n민화가 각지에 남아 있다."
          ultra_moon: "아무리 상처를 입어도 문제없다.\n재생 능력이 높아서\n한나절이면 원래대로 돌아온다."
        zh_simp:
          ultra_sun: "在各地都流传着\n星屑掉到海里就会变成海星星\n这样的民间故事。"
          ultra_moon: "不管受了多少伤也没问题。\n再生能力很高，\n所以半天左右就会复原。"
        zh_trad:
          ultra_sun: "在各地都流傳著\n星星落到海中之後變成了\n海星星的民間傳說。"
          ultra_moon: "不管受多少傷都不怕。\n由於再生能力很強，\n只要半天左右就會復原。"
starmie:
  species_id: 121
