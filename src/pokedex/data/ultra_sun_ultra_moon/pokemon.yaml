          ultra_sun: "うつくしい　おびれが　とくちょうだが\nトサキントどうしは　ツノの　ふとさと\nするどさを　きそいあっているらしい。"
          ultra_moon: "ドレスの　ような　ヒレを　ひらひらと\nゆらしながら　およぐ　すがたから\nみずの　プリンセスと　よばれる。"
        jp_kanji:
          ultra_sun: "美しい　尾びれが　特徴だが\nトサキント同士は　ツノの　太さと\n鋭さを　競い合っているらしい。"
          ultra_moon: "ドレスの　ような　ヒレを　ひらひらと\n揺らしながら　泳ぐ　姿から\n水の　プリンセスと　呼ばれる。"
        en:
          ultra_sun: "Although known for their splendid tail fins,\nGoldeen apparently compete among themselves\nto see whose horn is thickest and sharpest."
          ultra_moon: "The way it swims along fluttering its dress-like\nfins has earned it the name “princess of\nthe water.”"
        fr:
          ultra_sun: "Prisés pour la beauté de leur nageoire caudale,\nles Poissirène rivalisent quant à eux pour savoir\nqui a la corne la plus épaisse et la plus acérée."
          ultra_moon: "La beauté de ses nageoires, qu’il agite telle\nune robe de bal, lui a valu le surnom de\n« princesse des eaux »."
        it:
          ultra_sun: "È famoso per le sue splendide pinne caudali.\nSembra che competa con i suoi simili per\nstabilire chi ha il corno più spesso e affilato."
          ultra_moon: "Quando nuota, le sue pinne fluttuano dolcemente\ncome un vestito da ballo. Da questo deriva il suo\nsoprannome “principessa delle acque”."
        de:
          ultra_sun: "Es ist für seine schöne Schwanzflosse bekannt.\nMiteinander wetteifern sie aber darum, wer das\ndickste und spitzeste Horn auf dem Kopf hat."
          ultra_moon: "Beim Schwimmen flattern seine Flossen wie ein\nKleid, was ihm eine märchenhafte Ausstrahlung\nverleiht. Man nennt es auch „Wasserprinzessin“."
        es:
          ultra_sun: "La hermosa aleta caudal es su rasgo distintivo,\npero por lo que compiten los propios Goldeen es\npor lucir el cuerno más grueso y afilado."
          ultra_moon: "Al nadar, sus hermosas aletas ondean gráciles\ncual vestido de gala, lo que le ha merecido el\napodo de Princesa de los Mares."
        ko:
          ultra_sun: "아름다운 꼬리지느러미가 특징이지만\n콘치끼리는 뿔의 굵기와\n날카로움을 겨루는 듯 하다."
          ultra_moon: "드레스 같은 지느러미를 하늘하늘\n흔들면서 헤엄치는 모습 때문에\n물의 프린세스라고 불린다."
        zh_simp:
          ultra_sun: "虽然漂亮的尾鳍是其特征，\n但角金鱼之间好像会比\n谁的角更粗更尖锐。"
          ultra_moon: "会飘飘然地摇摆着\n像裙子一样的鱼鳍游动，\n所以它被称为水中公主。"
        zh_trad:
          ultra_sun: "特徵是美麗的尾鰭，\n但角金魚們之間競爭的\n似乎是角的粗細和尖銳度。"
          ultra_moon: "會輕飄飄地搖擺著\n像裙子一樣的鰭來游動，\n所以牠被稱為水中公主。"
seaking:
  species_id: 119
  names:
    jp_kana: アズマオウ
    jp_kanji: アズマオウ
    en: Seaking
    fr: Poissoroy
    it: Seaking
    de: Golking
    es: Seaking
    ko: 왕콘치
    zh_simp: 金鱼王
    zh_trad: 金魚王
  forms:
    seaking:
      form_id: 0
      base_stats:
        hp: 80
        attack: 92
        defense: 65
        special_attack: 65
        special_defense: 80
        speed: 68
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
        - water_veil
      hidden_ability: lightning_rod
      held_items:
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "ツノは　ドリルのように　かいてんして\nかたい　いわも　グングン　くりぬく。\nオスのほうが　あざやかな　いろあい。"
          ultra_moon: "オスは　かわぞこで　おどって　メスに\nアピール。　１ばん　うつくしく\nまった　オスに　メスが　あつまる。"
        jp_kanji:
          ultra_sun: "ツノは　ドリルのように　回転して\n硬い　岩も　グングン　くり貫く。\nオスの方が　鮮やかな　色合い。"
          ultra_moon: "オスは　川底で　踊って　メスに\nアピール。　１番　美しく\n舞った　オスに　メスが　集まる。"
        en:
          ultra_sun: "Its horn spins like a drill to steadily hollow out\nrocks—even harder ones. The coloration of the\nmale is more vivid."
          ultra_moon: "To attract females, males dance on the river’s\nfloor. The females gather around the male that\ndances most gracefully."
        fr:
          ultra_sun: "Il peut forer des rocs en faisant tourner sa\ncorne comme une perceuse. Les mâles ont\ndes couleurs plus vives que les femelles."
          ultra_moon: "Les mâles dansent devant les femelles pour\ns’attirer leurs faveurs ; les plus talentueux\ngagneront leur admiration."
        it:
          ultra_sun: "Facendo girare il corno come la punta\ndi un trapano perfora anche la roccia.\nI maschi hanno colori più sgargianti."
          ultra_moon: "I maschi danzano sul letto dei fiumi cercando\ndi attirare l’attenzione delle femmine, che si\nradunano attorno al miglior danzatore."
        de:
          ultra_sun: "Sein Horn rotiert wie ein Bohrer und höhlt selbst\ndie härtesten Felsen aus. Männliche Golking\nerstrahlen in besonders prächtigen Farben."
          ultra_moon: "Männliche Golking tanzen in Flussbetten, um die\nweiblichen Exemplare zu beeindrucken, die sich\ndann um den allerbesten Tänzer scharen."
        es:
          ultra_sun: "Es capaz de pulverizar las rocas más duras\nhaciendo girar su cuerno a modo de taladro.\nLos machos presentan una coloración más viva."
          ultra_moon: "Los machos ejecutan una coreografía en el\nlecho del río para ganarse la atención de las\nhembras, que acuden al mejor bailarín."
        ko:
          ultra_sun: "뿔이 드릴처럼 회전하기 때문에\n단단한 바위도 쉽게 뚫는다.\n수컷이 선명한 색을 띤다."
          ultra_moon: "수컷은 강바닥에서 춤을 추며\n암컷에게 어필한다. 가장 아름답게\n춤을 추는 수컷에게 암컷이 모여든다."
        zh_simp:
          ultra_sun: "头上的角会像钻头一样旋转，\n即便是坚硬的岩石也能一下子贯穿。\n雄性有着鲜艳的颜色。"
          ultra_moon: "雄性会在河底跳舞并以此来吸引雌性。\n雌性会聚集到跳得最美的雄性身边。"
        zh_trad:
          ultra_sun: "頭上的角會像鑽頭一樣旋轉，\n就連堅硬的岩石也能輕易貫穿。\n雄性的顏色比較鮮豔。"
          ultra_moon: "雄性會在河底跳舞，藉此吸引\n雌性的目光。雌性會聚集到\n舞跳得最美的雄性身邊。"
staryu:
  species_id: 120
  names:
    jp_kana: ヒトデマン
    jp_kanji: ヒトデマン
    en: Staryu
    fr: Stari
    it: Staryu
    de: Sterndu
    es: Staryu
    ko: 별가사리
    zh_simp: 海星星
    zh_trad: 海星星
  forms:
    staryu:
      form_id: 0
      base_stats:
        hp: 30
        attack: 45
        defense: 55
        special_attack: 70
        special_defense: 55
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
