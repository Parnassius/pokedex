      descriptions:
        jp_kana:
          ultra_sun: "ふだんは　みずのなかで　すごす。\nまんぷくの　とき　しとめた　えものは\nあたまの　すいほうに　しまっておく。"
          ultra_moon: "だいじなものを　すいほうに　しまう\nしゅうせいがある。　ちゅういしないと\nトレーナーも　しまおうとしてくるぞ。"
        jp_kanji:
          ultra_sun: "普段は　水の中で　過ごす。\n満腹の　とき　仕留めた　獲物は\n頭の　水泡に　仕舞っておく。"
          ultra_moon: "大事なものを　水泡に　仕舞う\n習性がある。　注意しないと\nトレーナーも　仕舞おうとしてくるぞ。"
        en:
          ultra_sun: "It usually passes its time in the water. When its\nbelly is full, it stores its subdued prey in the\nwater bubble on its head."
          ultra_moon: "It has a habit of storing things it values in its\nwater bubble. If its Trainer doesn’t watch out,\nAraquanid will try to put them in its bubble!"
        fr:
          ultra_sun: "Il passe la plupart de son temps dans l’eau.\nS’il est rassasié, il peut conserver ses proies\ndans sa bulle pour les manger plus tard."
          ultra_moon: "Il a pour habitude d’enfermer ce qui lui est cher\ndans sa bulle. Si son Dresseur n’est pas vigilant,\nTarenbulle essaiera de l’y ranger lui aussi !"
        it:
          ultra_sun: "Se ne sta per lo più in acqua. Quando è sazio,\nconserva le prede che ha catturato nella bolla\nche ha in testa."
          ultra_moon: "Conserva le cose importanti nella sua bolla\nd’acqua. Potrebbe provare a metterci anche\nil suo Allenatore, se questo non sta attento."
        de:
          ultra_sun: "Es verlässt das Wasser nur sehr selten. Wenn es\nsatt ist, bewahrt es erledigte Beute in der\nWasserblase auf seinem Kopf auf."
          ultra_moon: "Dinge, die ihm wichtig sind, pflegt es in seiner\nWasserblase aufzubewahren. Dazu gehört auch\nsein Trainer, wenn dieser nicht aufpasst."
        es:
          ultra_sun: "Pasa la mayor parte del tiempo en el agua.\nSi atrapa alguna presa sin tener hambre,\nla almacena en la burbuja de su cabeza."
          ultra_moon: "Guarda en su burbuja todo lo que le es\npreciado. También intentará atrapar a su\nEntrenador si este se descuida."
        ko:
          ultra_sun: "평소에는 물 안에서 지낸다.\n배가 부를 때는 숨통을 끊은 먹이를\n머리의 수포에 넣어 둔다."
          ultra_moon: "중요한 것을 수포에 넣어 두는\n습성이 있다. 주의하지 않으면\n트레이너도 넣어 두려 한다."
        zh_simp:
          ultra_sun: "平常就是水里生活。\n肚子饱的时候，会把抓获的猎物\n收纳在头部的水泡里。"
          ultra_moon: "有着把重要的东西收纳在\n水泡里的习性。如果不注意，\n连训练家都会被放进去。"
        zh_trad:
          ultra_sun: "平常在水中生活。\n肚子不餓的時候會把捉到的\n獵物收在頭部的水泡裡。"
          ultra_moon: "有著把重要的東西收在水泡裡\n的習性。要是不注意的話，\n連訓練家都會被收進去。"
