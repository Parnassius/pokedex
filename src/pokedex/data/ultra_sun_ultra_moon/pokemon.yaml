rufflet:
  species_id: 627
  names:
    jp_kana: ワシボン
    jp_kanji: ワシボン
    en: Rufflet
    fr: Furaiglon
    it: Rufflet
    de: Geronimatz
    es: Rufflet
    ko: 수리둥보
    zh_simp: 毛头小鹰
    zh_trad: 毛頭小鷹
  forms:
    rufflet:
      form_id: 0
      base_stats:
        hp: 70
        attack: 83
        defense: 50
        special_attack: 37
        special_defense: 50
        speed: 60
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - sheer_force
      hidden_ability: hustle
      descriptions:
        jp_kana:
          ultra_sun: "つよい　きゃくりょくと　じょうぶな\nツメで　かたい　シェルダーの　カラも\nくだいて　なかみを　ついばむ。"
          ultra_moon: "うまれながらの　せんしと　よばれる。\nうまれて　すぐに　おやに　いどみ\nみとめてもらわなければ　いけない。"
        jp_kanji:
          ultra_sun: "強い　脚力と　丈夫な　ツメで\n硬い　シェルダーの　カラも\n砕いて　中身を　ついばむ。"
          ultra_moon: "生まれながらの　戦士と　呼ばれる。\n生まれて　すぐに　親に　挑み\n認めてもらわなければ　いけない。"
        en:
          ultra_sun: "With its powerful legs and sturdy claws, it can\ncrack even the hard shells of Shellder and pluck\nout their insides."
          ultra_moon: "Known as a natural-born warrior, soon after its\nhatching, it will challenge its parent to a fight in\norder to gain their acceptance."
        fr:
          ultra_sun: "Grâce à ses pattes puissantes et à ses serres\nrobustes, il arrive même à briser la coquille de\nKokiyas pour se délecter de son contenu."
          ultra_moon: "C’est un guerrier endurci dès sa naissance.\nIl commence d’ailleurs par défier ses parents\nau combat pour leur prouver sa valeur."
        it:
          ultra_sun: "Ha arti potenti e artigli robusti con cui riesce\na frantumare anche la corazza degli Shellder\nper poterne beccare il corpo all’interno."
          ultra_moon: "È considerato un lottatore nato: la prima cosa\nche fa quando viene al mondo è sfidare i genitori\nper guadagnarsi la loro approvazione."
        de:
          ultra_sun: "Mit seinen kräftigen Beinen und robusten Krallen\nkann es selbst die harte Schale eines Muschas\naufbrechen und das Innere herauspicken."
          ultra_moon: "Dieses Pokémon gilt als geborener Krieger.\nKaum ist es geschlüpft, tritt es gegen seine\nEltern an, um ihre Anerkennung zu bekommen."
        es:
          ultra_sun: "La fuerza de los talones y dureza de las garras\nle permiten perforar la coraza de los Shellder\npara picotear su cuerpo."
          ultra_moon: "Su especie es guerrera y belicosa por naturaleza\ny lo primero que hacen nada más nacer es medir\nsus fuerzas contra sus progenitores."
        ko:
          ultra_sun: "강한 다릿심과 튼튼한 발톱으로\n딱딱한 셀러의 껍질도 부수고\n안에 있는 내용물을 쪼아 먹는다."
          ultra_moon: "타고난 전사라고 불린다.\n태어나자마자 부모에게 도전하여\n인정을 받아야 한다."
        zh_simp:
          ultra_sun: "用强大的脚力和结实的爪子，\n连大舌贝的坚硬外壳都能弄碎，\n将里面的东西啄出来。"
          ultra_moon: "被称为天生的战士。\n出生后必须立即向父母亲发起挑战，\n并得到对方的认可。"
        zh_trad:
          ultra_sun: "靠著強大的腳力和結實的爪子，\n連大舌貝的堅硬外殼都能弄碎，\n去啄食裡面的東西。"
          ultra_moon: "被稱為天生的戰士。一出生\n就必須挑戰自己的父母親，\n並獲得父母親的認可。"
braviary:
  species_id: 628
  names:
    jp_kana: ウォーグル
    jp_kanji: ウォーグル
    en: Braviary
    fr: Gueriaigle
    it: Braviary
    de: Washakwil
    es: Braviary
    ko: 워글
    zh_simp: 勇士雄鹰
    zh_trad: 勇士雄鷹
  forms:
    braviary:
      form_id: 0
      base_stats:
        hp: 100
        attack: 123
        defense: 75
        special_attack: 57
        special_defense: 75
        speed: 80
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - sheer_force
      hidden_ability: defiant
      descriptions:
        jp_kana:
          ultra_sun: "むこうきずの　おおい　ものほど\nゆうかんとされ　うしろきずの　おおい\nものは　むれで　バカに　される。"
          ultra_moon: "そらのゆうしゃの　いみょうを　もつ。\nきずついても　にげることのない\nほこりたかく　ゆうもうな　ポケモン。"
        jp_kanji:
          ultra_sun: "向こう傷の　多い　ものほど\n勇敢とされ　後ろ傷の　多い\nものは　群れで　バカに　される。"
          ultra_moon: "空の勇者の　異名を　持つ。\n傷ついても　逃げることのない\n誇り高く　勇猛な　ポケモン。"
        en:
          ultra_sun: "The more scars it has on its front, the more\nheroic it’s considered to be. Those with many\nscars on their back are mocked by the flock."
          ultra_moon: "Known as “the hero of the skies,” this\nPokémon is so proud and so brave that it will\nnever retreat, even when it’s injured."
        fr:
          ultra_sun: "Les balafres ne font qu’ajouter à sa renommée,\nmais les blessures dans le dos, synonymes de\nfuite en combat, sont mal vues par la volée."
          ultra_moon: "Surnommé « le héros céleste », il est tellement\nfier qu’il préfère endurer mille souffrances\nplutôt que de choisir la fuite."
        it:
          ultra_sun: "Gli esemplari con più cicatrici sul volto sono\nconsiderati i più valorosi. Quelli con cicatrici\nsul dorso, al contrario, sono derisi dal gruppo."
          ultra_moon: "Noto come “l’eroe del cielo”, è un Pokémon fiero\ne coraggioso che non scappa mai di fronte\nal pericolo, neanche quando è ferito."
        de:
          ultra_sun: "Unter Washakwil gelten Narben an der Stirnseite\nals Beweis für Mut. Diejenigen, die viele Narben\nauf der Rückseite vorweisen, werden verhöhnt."
          ultra_moon: "Manche nennen es auch „Krieger der Lüfte“.\nEin stolzes und unerschrockenes Pokémon, das\neher Verletzungen erleidet, als zu fliehen."
        es:
          ultra_sun: "Las cicatrices que surcan su frente demuestran\nsu valor, pero las de su espalda son motivo de\nmofa por parte de su bandada."
          ultra_moon: "Se le conoce como Héroe del Cielo, y su orgullo\ny valía son tales que prefiere salir herido antes\nque huir de forma deshonrosa."
        ko:
          ultra_sun: "안면에 상처가 많을수록\n용감하다고 평가받고 뒤에 상처가\n많으면 무리에서 무시당한다."
          ultra_moon: "하늘의 용자라는 별명을 가졌다.\n상처를 입어도 도망치지 않는\n긍지 높고 용맹한 포켓몬이다."
        zh_simp:
          ultra_sun: "正面伤越多，就表示越勇敢，\n而背面受伤多的则会在群体中\n受到轻视。"
          ultra_moon: "别名天空的勇士。\n即便受伤也绝不逃跑，\n是以此为傲的勇猛的宝可梦。"
        zh_trad:
          ultra_sun: "正面的傷越多就表示越勇敢，\n而背後受傷較多的則會\n在群體中受到輕視。"
          ultra_moon: "擁有空之勇者的別名。\n即使受傷也絕不會逃跑，\n是一種重視榮譽的勇猛寶可夢。"
vullaby:
  species_id: 629
  names:
    jp_kana: バルチャイ
    jp_kanji: バルチャイ
    en: Vullaby
    fr: Vostourno
    it: Vullaby
    de: Skallyk
    es: Vullaby
    ko: 벌차이
    zh_simp: 秃鹰丫头
    zh_trad: 禿鷹丫頭
  forms:
    vullaby:
      form_id: 0
      base_stats:
        hp: 70
        attack: 55
        defense: 75
        special_attack: 45
        special_defense: 65
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
        - overcoat
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          ultra_sun: "ガイコツは　バルジーナが　あたえる。\nつばさは　みじかく　まだ　とべないが\nおおぞらを　ゆめみて　とびはねる。"
          ultra_moon: "たべざかりの　そだちざかり。\nからだの　せいちょうに　あわせて\nガイコツを　なんども　はきかえるよ。"
        jp_kanji:
          ultra_sun: "ガイコツは　バルジーナが　与える。\n翼は　短く　まだ　飛べないが\n大空を　夢見て　飛び跳ねる。"
          ultra_moon: "食べ盛りの　育ち盛り。\n身体の　成長に　あわせて\nガイコツを　何度も　履き替えるよ。"
        en:
          ultra_sun: "Mandibuzz gives it the bones it wears. Vullaby’s\nwings are short, so it can’t fly yet, but it jumps\naround, dreaming of wide open skies."
          ultra_moon: "Its healthy appetite leads to visible growth\nspurts. It often has to replace the bones it\nwears as its size increases."
        fr:
          ultra_sun: "Sa culotte est un cadeau de Vaututrice.\nSes petites ailes ne pouvant pas le porter, il est\ncondamné à sautiller en rêvant au grand azur."
          ultra_moon: "Ce petit est en pleine croissance et forcit à vue\nd’œil. Il doit donc régulièrement changer le crâne\nqui lui sert de culotte."
        it:
          ultra_sun: "Ha ricevuto il suo teschio da Mandibuzz.\nPoiché le corte ali non gli permettono di volare,\nsaltella sognando un giorno di poterlo fare."
          ultra_moon: "Ha un grande appetito e cresce a vista d’occhio.\nMan mano che la sua taglia aumenta, deve\ncambiare il teschio che indossa."
        de:
          ultra_sun: "Seine Schädelwindel erhält es von Grypheldis.\nAuch wenn seine Flügel noch zu klein dafür sind,\nträumt es vom Fliegen und hüpft wild herum."
          ultra_moon: "Durch seinen ständigen Appetit hat Skallyk\nfortlaufend Wachstumsschübe. Deshalb muss\nes seine Schädelwindel immerzu auswechseln."
        es:
          ultra_sun: "El cráneo que usa de protección es regalo de un\nMandibuzz. Como sus alas son muy cortas para\nvolar, da brincos soñando que vuela por el cielo."
          ultra_moon: "Demuestra un voraz apetito y aumenta de\ntamaño a vista de ojo. Su continuo crecimiento\nle obliga a cambiar varias veces de cráneo."
        ko:
          ultra_sun: "해골은 버랜지나가 준다.\n날개가 짧아 아직 날지 못하지만,\n넓은 하늘을 꿈꾸며 뛰어오른다."
          ultra_moon: "한창 먹고 자랄 때다.\n몸의 성장에 맞춰서\n해골을 몇 번이고 갈아입는다."
        zh_simp:
          ultra_sun: "骸骨是秃鹰娜所给予的。\n翅膀很短，还不会飞，\n但是一直憧憬着天空而蹦蹦跳跳的。"
          ultra_moon: "正处于食欲旺盛的发育期。\n为了配合身体的成长，\n会多次更换所穿的骸骨哦。"
        zh_trad:
          ultra_sun: "骸骨是禿鷹娜給的。\n雖然翅膀太短還不能飛，但總是\n因為憧憬著天空而蹦蹦跳跳。"
          ultra_moon: "正處於食慾旺盛的發育期。\n為了配合身體的成長，\n會多次更換所穿的骨頭。"
