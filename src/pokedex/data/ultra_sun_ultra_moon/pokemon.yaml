      descriptions:
        jp_kana:
          ultra_sun: "えものを　こおらせ　まるかじり。\nだけど　こうぶつは　バニプッチなどの\nもともと　こおっている　ポケモンだ。"
          ultra_moon: "さほど　かたくない　いわがほんたい。\nくうきちゅうの　すいぶんを　こおらせ\nこおりの　そうこうを　みにまとう。"
        jp_kanji:
          ultra_sun: "獲物を　凍らせ　丸かじり。\nだけど　好物は　バニプッチなどの\nもともと　凍っている　ポケモンだ。"
          ultra_moon: "さほど　硬くない　岩が本体。\n空気中の　水分を　凍らせ\n氷の　装甲を　身にまとう。"
        en:
          ultra_sun: "It freezes its prey and chews them whole.\nHowever, it prefers to eat Pokémon like Vanillite\nthat are already frozen."
          ultra_moon: "Its actual body is a rock that isn’t particularly\nhard. Glalie absorbs moisture from the air and\ndrapes itself in an armor of ice."
        fr:
          ultra_sun: "Il gèle ses proies avant de les croquer\ngoulûment, même s’il préfère largement les\nPokémon déjà glacés, comme les Sorbébé."
          ultra_moon: "Il gèle les particules d’eau présentes dans l’air\npour se couvrir d’une carapace de glace et ainsi\npallier la fragilité de son corps."
        it:
          ultra_sun: "Congela la preda prima di affondarvi i denti.\nTuttavia, preferisce cibarsi di Pokémon già\nghiacciati come Vanillite."
          ultra_moon: "Poiché il suo corpo è fatto di una pietra non\nparticolarmente dura, congela l’umidità intorno\na lui per rivestirsi di un’armatura di ghiaccio."
        de:
          ultra_sun: "Es friert seine Beute ein und verschlingt sie im\nGanzen. Am liebsten frisst es von vornherein\ngefrorene Pokémon wie Gelatini."
          ultra_moon: "Dieses Pokémon besteht aus einem nicht allzu\nharten Felsen. Es lässt die Feuchtigkeit in der\nLuft gefrieren und hüllt sich in einen Eispanzer."
        es:
          ultra_sun: "Congela a sus presas antes de hincarles el\ndiente, pero su presa favorita son los Pokémon\nque ya están congelados, como los Vanillite."
          ultra_moon: "Su cuerpo rocoso no es excesivamente duro.\nCongela la humedad del ambiente para cubrirse\ncon una armadura de hielo protectora."
        ko:
          ultra_sun: "먹이를 얼려 통째로 갉아먹는다.\n하지만 바닐프티처럼 처음부터\n얼어 있는 포켓몬을 더 좋아한다."
          ultra_moon: "그다지 단단하지 않은 바위가 본체다.\n공기 중의 수분을 얼려\n얼음의 장갑을 몸에 두른다."
        zh_simp:
          ultra_sun: "将猎物冻住，整个咬住。\n但喜欢吃的是迷你冰等\n原本就冻着的宝可梦。"
          ultra_moon: "不那么坚硬的岩石是它的本体。\n能够冻住空气中的水分，\n将冰之装甲裹在身上。"
        zh_trad:
          ultra_sun: "會把獵物凍住後整個拿來啃，\n但最愛吃的還是迷你冰之類\n原本就已經結凍的寶可夢。"
          ultra_moon: "本體是不怎麼堅硬的岩石。\n會讓空氣中的水分凍結，\n為自己裹上一層冰之裝甲。"
    glalie_mega:
      form_id: 1
      names:
        jp_kana: メガオニゴーリ
        jp_kanji: メガオニゴーリ
        en: Mega Glalie
        fr: Méga-Oniglali
        it: MegaGlalie
        de: Mega-Firnontor
        es: Mega-Glalie
        ko: 메가얼음귀신
        zh_simp: 超级冰鬼护
        zh_trad: 超級冰鬼護
      base_stats:
        hp: 80
        attack: 120
        defense: 80
        special_attack: 120
        special_defense: 80
        speed: 100
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - refrigerate
      descriptions:
        jp_kana:
          ultra_sun: "くだけた　くちから　すさまじい\nれいきを　はくと　あたり　いったいは\nホワイトアウトに　おちいってしまう。"
          ultra_moon: "メガシンカの　パワーが　つよすぎて\nアゴが　くだけてしまった。　うまく\nエサを　くえずに　いらだっている。"
        jp_kanji:
          ultra_sun: "砕けた　口から　凄まじい\n冷気を　吐くと　あたり　一帯は\nホワイトアウトに　陥ってしまう。"
          ultra_moon: "メガシンカの　パワーが　強すぎて\nアゴが　砕けてしまった。　うまく\nエサを　食えずに　苛立っている。"
        en:
          ultra_sun: "When it spews stupendously cold air from its\nbroken mouth, the entire area around it gets\nwhited out."
          ultra_moon: "The power of Mega Evolution was so strong that\nit smashed Glalie’s jaw. Its inability to eat very\nwell leaves Glalie irritated."
        fr:
          ultra_sun: "Sa mâchoire déboîtée projette un blizzard\nterrible qui recouvre les alentours d’un voile\nblanc."
          ultra_moon: "Le pouvoir de la Méga-Évolution est si fort\nqu’il en a déboîté sa mâchoire. Il est maintenant\nbien agacé, car il a du mal à manger."
        it:
          ultra_sun: "Soffia un potente getto di aria gelida dalla\nbocca spalancata, ricoprendo tutto ciò che\nlo circonda di un velo bianco."
          ultra_moon: "L’eccessiva potenza della megaevoluzione gli\nha disarticolato la mandibola. Non riesce a\nmangiare bene e questo lo rende furioso."
        de:
          ultra_sun: "Aus seinem zerbrochenen Maul stößt es eiskalte\nLuftströme aus, welche die gesamte Umgebung\nin Weiß hüllen."
          ultra_moon: "Sein Kiefer brach infolge der Mega-Entwicklung\nentzwei, was die Nahrungsaufnahme deutlich\nbeeinträchtigt und es zur Weißglut treibt."
        es:
          ultra_sun: "Por su boca desencajada exhala una ventisca\nhelada que cubre de blanco sus alrededores."
          ultra_moon: "La sobrecogedora energía de la megaevolución\nle ha desencajado la mandíbula. La furia lo\ninvade al no poder comer con normalidad."
        ko:
          ultra_sun: "벌어진 입에서 엄청난\n냉기를 내뿜으면 주변 일대는\n화이트아웃이 발생한다."
          ultra_moon: "메가진화의 파워가 너무 강해서\n턱이 빠져 버렸다. 먹이를\n제대로 먹지 못해 화가 나 있다."
        zh_simp:
          ultra_sun: "如果从破碎的嘴里吐出可怕的冷气，\n会让周围陷入一片白茫茫之中。"
          ultra_moon: "超级进化的力量过强，\n颚部都碎掉了。\n因没法好好吃东西而焦躁。"
        zh_trad:
          ultra_sun: "當牠從裂開的口中吐出\n強烈的寒氣時，周遭會\n化成一片白色世界。"
          ultra_moon: "超級進化的力量過強，\n使得下巴都碎了。因為無法\n好好吃東西而煩躁不已。"
