barboach:
  species_id: 339
  names:
    jp_kana: ドジョッチ
    jp_kanji: ドジョッチ
    en: Barboach
    fr: Barloche
    it: Barboach
    de: Schmerbe
    es: Barboach
    ko: 미꾸리
    zh_simp: 泥泥鳅
    zh_trad: 泥泥鰍
  forms:
    barboach:
      form_id: 0
      base_stats:
        hp: 50
        attack: 48
        defense: 43
        special_attack: 46
        special_defense: 41
        speed: 60
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_2
      abilities:
        - oblivious
        - anticipation
      hidden_ability: hydration
      descriptions:
        jp_kana:
          ultra_sun: "ぜんしん　ヌメヌメ。　とりポケモンに\nついばまれても　ぬるりと　すべって\nにげだすことが　できるのだ。"
          ultra_moon: "ヒゲに　しんけいが　あつまっている。\nにんげんの　はなや　ベロの　ように\nにおいや　あじを　かんじとるぞ。"
        jp_kanji:
          ultra_sun: "全身　ヌメヌメ。　とりポケモンに\nついばまれても　ぬるりと　滑って\n逃げ出すことが　できるのだ。"
          ultra_moon: "ヒゲに　神経が　集まっている。\n人間の　鼻や　ベロの　ように\n匂いや　味を　感じとるぞ。"
        en:
          ultra_sun: "Its entire body is gooey. When pecked at by\nbird Pokémon, it slips and slides its way\nto freedom."
          ultra_moon: "Its whiskers are filled with nerves. They can\nsense smells and flavors just as a person’s nose\nor tongue would."
        fr:
          ultra_sun: "Son corps est tout visqueux, ce qui lui permet\nde glisser entre les serres des Pokémon oiseaux\nafin de s’échapper."
          ultra_moon: "Ses barbillons sont des organes sensoriels :\nils peuvent détecter le goût et les odeurs,\ncomme le font la langue et le nez des humains."
        it:
          ultra_sun: "Grazie al corpo viscido, riesce a sgusciare via\ndalla presa dei Pokémon alati e fuggire."
          ultra_moon: "I suoi baffi sono ricchi di terminazioni nervose e\npercepiscono odori e sapori come il naso e la\nlingua nell’essere umano."
        de:
          ultra_sun: "Sein glitschiger Körper ermöglicht es ihm, dem\nSchnabel von Vogel-Pokémon zu entkommen."
          ultra_moon: "In seinen Barthaaren laufen Nervenstränge\nzusammen. Damit riecht und schmeckt es wie\nMenschen mit ihrer Nase und Zunge."
        es:
          ultra_sun: "Su cuerpo viscoso y resbaladizo le permite\nescapar indemne de las garras de los Pokémon\npájaro que intentan atraparlo."
          ultra_moon: "Sus bigotes contienen terminaciones nerviosas.\nEso les permite captar olores y sabores, como\nsi fueran la nariz o la lengua de un ser humano."
        ko:
          ultra_sun: "전신이 미끈미끈하다. \n새포켓몬이 쪼아도 미끄덩\n미끄러져 도망칠 수 있다."
          ultra_moon: "수염에 신경이 모여 있다.\n인간의 코나 혀와 같이\n냄새나 맛을 감지해 낸다."
        zh_simp:
          ultra_sun: "全身滑腻腻的。\n即使被鸟宝可梦啄到，\n也能哧溜一下滑着逃走。"
          ultra_moon: "胡子上布满神经。\n能像人类的鼻子和舌头那样\n感知气味和味道。"
        zh_trad:
          ultra_sun: "全身黏黏滑滑的，\n就算被鳥寶可夢啄到，\n也可以馬上滑開溜走。"
          ultra_moon: "鬍鬚上滿是神經，\n能像人類的鼻子和舌頭\n那樣感知氣味和味道。"
whiscash:
  species_id: 340
  names:
    jp_kana: ナマズン
    jp_kanji: ナマズン
    en: Whiscash
    fr: Barbicha
    it: Whiscash
    de: Welsar
    es: Whiscash
    ko: 메깅
    zh_simp: 鲶鱼王
    zh_trad: 鯰魚王
  forms:
    whiscash:
      form_id: 0
      base_stats:
        hp: 110
        attack: 78
        defense: 73
        special_attack: 76
        special_defense: 71
        speed: 60
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_2
      abilities:
        - oblivious
        - anticipation
      hidden_ability: hydration
      descriptions:
        jp_kana:
          ultra_sun: "はげしく　じめんを　ゆらし　あいてを\nいかくする。　ぬまぞこの　えものは\nどろごと　まるのみにして　しまう。"
          ultra_moon: "しりょくは　あまりよくない。　ヒゲで\nみずの　しんどうを　かんちして\nえものの　いちを　つきとめるのだ。"
        jp_kanji:
          ultra_sun: "激しく　地面を　揺らし　相手を\n威嚇する。　沼底の　獲物は\n泥ごと　丸呑みにして　しまう。"
          ultra_moon: "視力は　あまりよくない。　ヒゲで\n水の　振動を　感知して\n獲物の　位置を　つきとめるのだ。"
        en:
          ultra_sun: "Whiscash shakes the ground at high intensities\nto intimidate its opponents. It swallows its prey\nwhole—along with mud from the swamp floor."
          ultra_moon: "Its vision is not that good. It senses vibrations in\nthe water with its whiskers to determine the\nlocation of its prey."
        fr:
          ultra_sun: "Il subjugue ses adversaires en déclenchant de\nviolents séismes. Il racle le fond des marais pour\nse nourrir, avalant proies et vase au passage."
          ultra_moon: "Sa vision n’étant pas très bonne, il utilise ses\nbarbillons pour capter les vibrations de l’eau\net repérer ses proies."
        it:
          ultra_sun: "Intimorisce il nemico scatenando una specie di\nterremoto. Si nutre sul fondo delle paludi e\ninghiotte prede e fango insieme."
          ultra_moon: "Poiché la sua vista non è molto sviluppata,\nindividua la posizione della preda percependo\nle vibrazioni dell’acqua con i baffi."
        de:
          ultra_sun: "Es schüchtert seine Gegner ein, indem es den\nBoden beben lässt. Seine Beute verschluckt es\nmitsamt dem Schlamm, in dem sie sich aufhält."
          ultra_moon: "Seine Sehkraft ist schlecht. Es nimmt mit seinen\nBarthaaren Schwingungen im Wasser wahr und\nspürt so seine Beute auf."
        es:
          ultra_sun: "Provoca fuertes temblores de tierra con los que\nintimida a sus rivales. Al engullir a las presas del\nfondo del cenagal también traga bastante lodo."
          ultra_moon: "Como su vista no es muy aguda, utiliza los\nbarbillones para detectar las vibraciones que se\nproducen en el agua y localizar así a su presa."
        ko:
          ultra_sun: "격렬하게 지면을 흔들어 상대를\n위협한다. 늪 바닥의 먹이는\n진흙과 함께 통째로 삼켜 버린다."
          ultra_moon: "시력은 그다지 좋지 않다.\n수염으로 물의 진동을 감지해서\n먹이의 위치를 찾아낸다."
        zh_simp:
          ultra_sun: "猛烈地摇晃地面，威吓对手。\n会将沼泽底部的猎物连同泥巴\n一起整个吞下。"
          ultra_moon: "它的视力不太好。\n会通过胡子来感知水的振动，\n掌握猎物的位置。"
        zh_trad:
          ultra_sun: "會猛烈地搖晃地面來威嚇對手。\n獵食沼澤底部的獵物時，\n會把獵物連同泥巴整個吞下去。"
          ultra_moon: "視力不太好。會透過\n鬍鬚來感知水的振動，\n藉此掌握獵物的位置。"
corphish:
  species_id: 341
  names:
    jp_kana: ヘイガニ
    jp_kanji: ヘイガニ
    en: Corphish
    fr: Écrapince
    it: Corphish
    de: Krebscorps
    es: Corphish
    ko: 가재군
    zh_simp: 龙虾小兵
    zh_trad: 龍蝦小兵
  forms:
    corphish:
      form_id: 0
      base_stats:
        hp: 43
        attack: 80
        defense: 65
        special_attack: 50
        special_defense: 35
        speed: 35
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - water_3
      abilities:
        - hyper_cutter
        - shell_armor
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          ultra_sun: "そだてきれなく　なった　トレーナーが\nにがした　こたいが　ふえ　アローラ\nでも　よく　みかけるように　なった。"
          ultra_moon: "かんきょうに　てきおうする　ちからが\nとてもつよい。　よどんだドブに　いる\nのは　ヒンバスと　こいつ　くらいだ。"
        jp_kanji:
          ultra_sun: "育てきれなく　なった　トレーナーが\n逃がした　個体が　増え　アローラ\nでも　よく　見かけるように　なった。"
          ultra_moon: "環境に　適応する　力が\nとても強い。　淀んだドブに　いる\nのは　ヒンバスと　こいつ　くらいだ。"
        en:
          ultra_sun: "Individuals that have been set free by Trainers\nwho could no longer raise them have become\ncommon, and they can now be found in Alola."
          ultra_moon: "It can adapt very well to its environment.\nFeebas and Corphish are about the only\nPokémon to live in stagnant ditches."
        fr:
          ultra_sun: "On voit souvent des Écrapince sur les plages.\nIl s’agit en fait de Pokémon relâchés par leurs\nDresseurs, qui ne parvenaient pas les élever."
          ultra_moon: "Il peut s’adapter à n’importe quel environnement.\nBarpau et lui sont d’ailleurs les seuls Pokémon\nà vivre dans l’eau des égouts !"
        it:
          ultra_sun: "Sempre più Corphish vengono liberati da\nAllenatori che non possono più allenarli.\nOrmai si incontrano spesso anche ad Alola."
          ultra_moon: "Si adatta a ogni habitat. Insieme a Feebas, è\nl’unico Pokémon che vive nelle acque stagnanti\ndei canali."
        de:
          ultra_sun: "Da immer mehr Krebscorps von überforderten\nTrainern in die Freiheit entlassen werden, sieht\nman dieses Pokémon nun auch oft in Alola."
          ultra_moon: "Sie sind sehr gut darin, sich an ihre Umwelt\nanzupassen. In Gräben mit trübem Wasser\nfindet man nur sie und Barschwa."
        es:
          ultra_sun: "Son muchos los Entrenadores que lo liberan sin\nterminar de criarlo, y su población ha crecido\ntanto que se les ha empezado a avistar en Alola."
          ultra_moon: "Posee una excelente capacidad para adaptarse\na su entorno. Solo Corphish o Feebas habitan\nlas aguas estancadas de los canales."
        ko:
          ultra_sun: "트레이너가 기를 수 없게 되어\n놓아 주었던 개체가 늘어나서\n알로라에서도 흔해졌다."
          ultra_moon: "환경에 적응하는 힘이 매우 강하다.\n탁한 개울에 살 수 있는 건\n빈티나와 이 녀석 정도다."
        zh_simp:
          ultra_sun: "被没有坚持培育的训练家放生了的\n个体在增加，即使在阿罗拉也变得\n时常能见到了。"
          ultra_moon: "对环境的适应力非常强。\n呆在浑浊臭水沟里的\n大概就是丑丑鱼和这家伙。"
        zh_trad:
          ultra_sun: "培育到一半就被訓練家\n放生的個體越來越多，\n如今在阿羅拉也能經常見到。"
          ultra_moon: "對環境的適應力非常強。\n會待在混濁的臭水溝裡的，\n大概只有醜醜魚和這傢伙。"
crawdaunt:
  species_id: 342
  names:
    jp_kana: シザリガー
    jp_kanji: シザリガー
    en: Crawdaunt
    fr: Colhomard
    it: Crawdaunt
    de: Krebutack
    es: Crawdaunt
    ko: 가재장군
    zh_simp: 铁螯龙虾
    zh_trad: 鐵螯龍蝦
  forms:
    crawdaunt:
      form_id: 0
      base_stats:
        hp: 63
        attack: 120
        defense: 85
        special_attack: 90
        special_defense: 55
        speed: 55
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_1
        - water_3
      abilities:
        - hyper_cutter
        - shell_armor
      hidden_ability: adaptability
      descriptions:
        jp_kana:
          ultra_sun: "きしょうがあらく　ケンカを　このむが\nハサミが　もげると　とたんによわき。\nさいせいするまで　ビクビクしている。"
          ultra_moon: "よく　ハサミが　もげる。　ハサミの\nなかみは　マケンカニや　ウデッポウと\nちがって　ドロくさく　じつにまずい。"
        jp_kanji:
          ultra_sun: "気性が　荒く　ケンカを　好むが\nハサミが　もげると　途端に弱気。\n再生するまで　ビクビクしている。"
          ultra_moon: "よく　ハサミが　もげる。　ハサミの\n中身は　マケンカニや　ウデッポウと\n違って　ドロ臭く　実に不味い。"
        en:
          ultra_sun: "Its temperament is rough and it loves to fight,\nbut as soon as its pincers break off, it turns\ncowardly. It stays timid until they grow back."
          ultra_moon: "Its pincers often fall off. Unlike with Crabrawler\nor Clauncher, the meat in its claws is utterly\nnasty and stinking."
        fr:
          ultra_sun: "D’un tempérament fougueux, il adore se battre,\nmais perd tout courage si ses pinces tombent.\nIl n’attend alors qu’une chose : leur repousse !"
          ultra_moon: "Ses pinces tombent facilement, mais sa chair\nest poisseuse et dégoûtante, contrairement\nà celle de Crabagarre et de Flingouste."
        it:
          ultra_sun: "Ha una natura estremamente violenta e ama\nle lotte, ma quando gli cadono le chele perde\ntutto il suo coraggio finché non ricrescono."
          ultra_moon: "Spesso perde le chele, ma la polpa all’interno,\na differenza delle chele dei Crabrawler e dei\nClauncher, ha uno sgradevole sapore di terra."
        de:
          ultra_sun: "Es ist ungestüm und liebt Kämpfe, doch sobald\nes seine Scheren verliert, wird es mutlos. Bis sie\nnachgewachsen sind, zittert es vor Angst."
          ultra_moon: "Es verliert oft seine Scheren. Anders als bei\nKrabbox und Scampisto ist das Innere der\nScheren unappetitlich und stinkt."
        es:
          ultra_sun: "Su carácter agresivo le incita a pelear siempre\nque puede, pero si se le rompe una pinza se\namedrenta y acobarda hasta que se le regenera."
          ultra_moon: "Pierde las pinzas fácilmente. Al contrario que las\nde Crabrawler o Clauncher, su carne apesta a\nlodo y tiene un sabor desagradable."
        ko:
          ultra_sun: "기질이 거칠고 싸움을 좋아하지만,\n집게가 떨어지면 바로 약해진다.\n재생될 때까지 벌벌 떤다."
          ultra_moon: "자주 집게가 떨어진다. 집게의\n속살은 오기지게나 완철포와 달리\n흙내가 나고 정말 맛없다."
        zh_simp:
          ultra_sun: "性格暴躁，喜欢打架，\n但如果钳子掉落，就会一下子弱下来。\n在再生之前，都会提心吊胆的。"
          ultra_moon: "钳子经常会掉。钳子里面\n跟好胜蟹和铁臂枪虾不同，\n有臭泥味，实在很难吃。"
        zh_trad:
          ultra_sun: "性情粗暴愛打架，然而一旦\n鉗子掉落就會馬上變得軟弱，\n在重新長出之前都會提心吊膽。"
          ultra_moon: "鉗子經常脫落。與好勝蟹還有\n鐵臂槍蝦不同，鉗子裡頭的肉\n帶有泥臭味所以很難吃。"
baltoy:
  species_id: 343
  names:
    jp_kana: ヤジロン
    jp_kanji: ヤジロン
    en: Baltoy
    fr: Balbuto
    it: Baltoy
    de: Puppance
    es: Baltoy
    ko: 오뚝군
    zh_simp: 天秤偶
    zh_trad: 天秤偶
  forms:
    baltoy:
      form_id: 0
      base_stats:
        hp: 40
