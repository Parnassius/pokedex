          ultra_moon: "겉껍질이 벗겨진 모습.\n코어의 색이 다른 이유는 먹은\n먹이의 성분이 다르기 때문이다."
        zh_simp:
          ultra_sun: "能遇到从夜空掉落的\n小陨星的地点是有限的，\n阿罗拉正是这宝贵的地方之一。"
          ultra_moon: "外壳脱落后的样子。\n内核颜色的差异\n是根据所吃食物的成分决定的。"
        zh_trad:
          ultra_sun: "能夠遇到從夜空落下的\n小隕星的地方並不多，\n阿羅拉正是這珍貴的地點之一。"
          ultra_moon: "外殼脫落後的樣子。\n核心顏色的差異是根據\n所吃食物的成分而決定。"
komala:
  species_id: 775
  names:
    jp_kana: ネッコアラ
    jp_kanji: ネッコアラ
    en: Komala
    fr: Dodoala
    it: Komala
    de: Koalelu
    es: Komala
    ko: 자말라
    zh_simp: 树枕尾熊
    zh_trad: 樹枕尾熊
  forms:
    komala:
      form_id: 0
      base_stats:
        hp: 65
        attack: 115
        defense: 65
        special_attack: 75
        special_defense: 95
        speed: 65
      evs_yield:
        hp: 0
