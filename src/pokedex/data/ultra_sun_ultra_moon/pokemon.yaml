        - keen_eye
      hidden_ability: tinted_lens
      descriptions:
        jp_kana:
          ultra_sun: "まいにち　かならず　きまったリズムで\nくびを　かしげる。　むかしのひとは\nとけいの　かわりに　かっていた。"
          ultra_moon: "まいにち　きまった　じかんに　なく。\nときをつげる　かみの　つかい　として\nむかしのひとは　たいせつに　していた。"
        jp_kanji:
          ultra_sun: "毎日　必ず　決まったリズムで\n首を　かしげる。　昔の人は\n時計の　代わりに　飼っていた。"
          ultra_moon: "毎日　決まった　時間に　鳴く。\n時を告げる　神の　使い　として\n昔の人は　大切に　していた。"
        en:
          ultra_sun: "Every day, it tilts its head in the same rhythm.\nA long time ago, people raised these Pokémon\nto serve as clocks."
          ultra_moon: "It cries out at the same time every day. A long\ntime ago, people cherished it and considered it\na divine messenger sent to tell the time."
        fr:
          ultra_sun: "Il hoche toujours la tête au même rythme,\naussi faisait-il fréquemment office d’horloge\npar le passé."
          ultra_moon: "Il hulule toujours à la même heure. Il était\nautrefois vénéré comme le messager du dieu\ndu temps."
        it:
          ultra_sun: "Ogni giorno piega la testa a intervalli regolari.\nIn passato questi Pokémon venivano usati\ncome veri e propri orologi."
          ultra_moon: "Fa il suo verso ogni giorno alla stessa ora.\nIn passato era trattato con rispetto, poiché lo si\ncredeva il messaggero di una divinità del tempo."
        de:
          ultra_sun: "Es neigt seinen Kopf tagein, tagaus in einem\nfestgelegten Rhythmus. Früher verwendete man\nes als Uhr."
          ultra_moon: "Hoothoot ruft jeden Tag zur exakt gleichen Zeit.\nFrüher wurde es daher als Bote der Zeitgottheit\nverehrt und geschätzt."
        es:
          ultra_sun: "Mueve la cabeza a un ritmo preciso y constante,\npor lo que en la antigüedad la gente lo usaba\ncomo reloj."
          ultra_moon: "Canta todos los días a la misma hora exacta.\nPor eso en la antigüedad lo veneraban como\nemisario de la divinidad del tiempo."
        ko:
          ultra_sun: "매일 정해진 리듬에 맞춰\n목을 기울인다. 옛날 사람들은\n시계 대용으로 길렀다."
          ultra_moon: "매일 정해진 시간에 운다.\n옛날 사람들은 시간을 알리는\n신의 사자라며 소중히 여겼다."
        zh_simp:
          ultra_sun: "每天必定会按固定的节奏倾斜脖子。\n过去人们会养它来代替时钟。"
          ultra_moon: "每天都会在固定的时间鸣叫。\n过去人们非常重视它，\n把它当做报时的神使。"
        zh_trad:
          ultra_sun: "每天必定會按照\n固定的節奏傾斜脖子，\n過去人們會養牠來代替時鐘。"
          ultra_moon: "每天都會在固定的時間鳴叫。\n過去的人們非常重視牠，\n把牠當成報時的神之使者。"
noctowl:
  species_id: 164
  names:
    jp_kana: ヨルノズク
    jp_kanji: ヨルノズク
    en: Noctowl
    fr: Noarfang
    it: Noctowl
    de: Noctuh
    es: Noctowl
    ko: 야부엉
    zh_simp: 猫头夜鹰
    zh_trad: 貓頭夜鷹
  forms:
    noctowl:
      form_id: 0
      base_stats:
        hp: 100
        attack: 50
        defense: 50
        special_attack: 86
        special_defense: 96
        speed: 70
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - insomnia
        - keen_eye
      hidden_ability: tinted_lens
      descriptions:
        jp_kana:
          ultra_sun: "くらやみでも　はっきり　みえる　めを\nもっており　えものを　にがさない。\nやみよの　ていおうとも　よばれる。"
          ultra_moon: "あたまが　さかさまむきの　ときは\nとても　なやんでいる　あかし。\nそっとしておかないと　ついばまれる。"
        jp_kanji:
          ultra_sun: "暗闇でも　はっきり　見える　目を\n持っており　獲物を　逃がさない。\n闇夜の　帝王とも　呼ばれる。"
          ultra_moon: "頭が　逆さま向きの　ときは\nとても　悩んでいる　証。\nそっとしておかないと　ついばまれる。"
        en:
          ultra_sun: "With eyes that can see in pitch-darkness, it\nnever lets its prey escape. Some even call it\n“the emperor of dark nights.”"
          ultra_moon: "When it turns its head entirely upside down,\nyou know it’s troubled by something. If you don’t\nleave it be, it will peck you."
        fr:
          ultra_sun: "Sa vue perçante lui permettant de distinguer sa\nproie même dans l’obscurité la plus profonde,\nil a reçu le surnom d’« empereur de la nuit »."
          ultra_moon: "Quand il est soucieux, il tourne la tête à 180\ndegrés. Il ne faut alors surtout pas le déranger,\nsous peine de recevoir un coup de bec."
        it:
          ultra_sun: "Riesce a vedere benissimo anche nell’oscurità\ne non si lascia mai sfuggire una preda.\nÈ chiamato anche “re della notte”."
          ultra_moon: "Quando capovolge la testa all’ingiù vuol dire che\nc’è qualcosa che lo preoccupa. Meglio non\ndisturbarlo o si rischia di venire beccati."
        de:
          ultra_sun: "Dank seines perfekten Sehvermögens entgeht\nihm selbst in der Dunkelheit keine Beute. Man\nnennt es auch den „Herrscher der Nacht“."
          ultra_moon: "Dreht es seinen Kopf um 180 Grad, ist es aus\nirgendeinem Grund besorgt. Man lässt es dann\nzur eigenen Sicherheit am besten in Ruhe."
        es:
          ultra_sun: "Apodado el Emperador Nocturno, su aguzada\nvista lo convierte en un formidable cazador aun\nen la más impenetrable oscuridad."
          ultra_moon: "Si da media vuelta a la cabeza es señal de que\nestá preocupado y conviene no molestarlo.\nQuien lo haga se arriesga a recibir un picotazo."
        ko:
          ultra_sun: "어둠 속에서도 뚜렷이 볼 수 있는 눈을\n갖고 있어 먹이를 놓치지 않는다.\n어둠의 제왕이라고도 불린다."
          ultra_moon: "머리가 거꾸로 되었을 때는\n매우 고민하고 있다는 증거다.\n가만히 두지 않으면 쪼아 댄다."
        zh_simp:
          ultra_sun: "即便是在黑暗里，它的眼睛也能\n看得一清二楚，不会放过任何猎物。\n所以也被称为黑夜帝王。"
          ultra_moon: "头倒转过来就表示它非常烦恼。\n如果这时去惊动它，就会被啄。"
        zh_trad:
          ultra_sun: "擁有在黑暗中也能清楚看見的眼睛，\n不會放過任何獵物，\n所以也被稱為黑夜帝王。"
          ultra_moon: "如果牠的頭倒轉過來，\n就代表牠非常煩惱。\n這時如果去驚動牠就會被啄。"
ledyba:
