      descriptions:
        jp_kana:
          ultra_sun: "カラの　なかに　たまった　すなは\nやがて　しんじゅに　かわるが\nじゃま　なので　はきだして　すてる。"
          ultra_moon: "カラを　とじているときも　ベロだけは\nだしっぱなし。　つよく　ひっぱると\nおどろき　カラを　ひらいてしまうよ。"
        jp_kanji:
          ultra_sun: "カラの　中に　たまった　砂は\nやがて　真珠に　変わるが\n邪魔　なので　吐き出して　捨てる。"
          ultra_moon: "カラを　閉じているときも　ベロだけは\n出しっぱなし。　強く　引っ張ると\n驚き　カラを　開いてしまうよ。"
        en:
          ultra_sun: "The sand that accumulates inside its shell\neventually becomes a pearl. But the pearl gets\nin the way, so it spits it out and discards it."
          ultra_moon: "Even when its shell is closed, its tongue still\nhangs out. If you give its tongue a good yank,\nthe shock will cause Shellder to open its shell."
        fr:
          ultra_sun: "Avec le temps, les grains de sable accumulés\ndans sa coquille se changent en perles, mais\ncomme elles le gênent, il préfère les recracher."
          ultra_moon: "Sa langue dépasse même quand sa coquille est\nfermée. Si on tire fort dessus, cette dernière\ns’ouvre sous l’effet de la surprise."
        it:
          ultra_sun: "Con il tempo, la sabbia che si accumula\nnel guscio forma delle perle. Poiché gli danno\nnoia, il Pokémon le sputa via."
          ultra_moon: "La lingua gli sporge a penzoloni anche quando la\nconchiglia è chiusa. Se gliela si tira con forza,\nShellder apre la conchiglia per la sorpresa."
        de:
          ultra_sun: "Der Sand, der sich in Muschas’ Schale sammelt,\nentwickelt sich zu Perlen. Da es diese als\nstörend empfindet, spuckt es sie einfach aus."
          ultra_moon: "Seine Zunge lässt es selbst bei geschlossener\nSchale immer heraushängen. Zieht man fest\ndaran, öffnet es vor Schreck seine Schale."
        es:
          ultra_sun: "La arena que acumula en su interior termina por\ntransformarse en una perla, pero la escupe\nporque le supone un estorbo."
          ultra_moon: "Siempre tiene la lengua fuera, aun con la concha\ncerrada. Si uno tira de ella con fuerza, la abrirá\ndel susto."
        ko:
          ultra_sun: "껍질 안에 쌓인 모래는\n이윽고 진주가 되지만\n방해가 되기 때문에 뱉어 버린다."
          ultra_moon: "껍질을 닫고 있을 때도 혀만은\n내밀고 있다. 세게 잡아당기면\n놀라서 껍질을 연다."
        zh_simp:
          ultra_sun: "虽然留在壳里的沙子终会变成珍珠，\n但会因为碍事而被它吐掉。"
          ultra_moon: "就算是在紧闭贝壳的时候，舌头也会\n一直露在外面。如果强行拉拽舌头，\n它就会吓得打开贝壳哦。"
        zh_trad:
          ultra_sun: "堆積在殼中的沙子\n最後會變成珍珠，\n但會因為佔空間而被牠吐掉。"
          ultra_moon: "就算是在緊閉貝殼的時候，舌頭部分\n也會一直露出來。如果用力拉舌頭，\n牠就會嚇得把殼打開。"
cloyster:
  species_id: 91
  names:
    jp_kana: パルシェン
    jp_kanji: パルシェン
    en: Cloyster
    fr: Crustabri
    it: Cloyster
    de: Austos
    es: Cloyster
    ko: 파르셀
    zh_simp: 刺甲贝
    zh_trad: 刺甲貝
  forms:
    cloyster:
      form_id: 0
      base_stats:
        hp: 50
        attack: 95
        defense: 180
        special_attack: 85
        special_defense: 45
