      descriptions:
        jp_kana:
          ultra_sun: "こだいの　かせきから　ふっかつ。\nうみに　くらしていたが　えものを\nさがして　りくにも　あがっていた。"
          ultra_moon: "ふかさ　１０００メートルの\nしんかいから　りくち　まで　ひろい\nはんいを　かりばに　していた。"
        jp_kanji:
          ultra_sun: "古代の　化石から　復活。\n海に　暮らしていたが　獲物を\n探して　陸にも　あがっていた。"
          ultra_moon: "深さ　１０００メートルの\n深海から　陸地まで　広い\n範囲を　狩場に　していた。"
        en:
          ultra_sun: "It was restored from an ancient fossil. Tirtouga\nlived in the sea but came up onto the land to\nsearch for prey."
          ultra_moon: "Its hunting grounds encompassed a broad area,\nfrom the land to more than half a mile deep in\nthe ocean."
        fr:
          ultra_sun: "Il a été recréé à partir d’un fossile préhistorique.\nIl vivait autrefois dans la mer, mais avait su\ns’adapter pour chasser aussi sur la terre ferme."
          ultra_moon: "Son terrain de chasse s’étendait sur un très\nvaste territoire, de la terre ferme jusqu’à\n1 000 m sous les mers."
        it:
          ultra_sun: "È stato rigenerato da un antico fossile.\nIn passato viveva nel mare, ma per cacciare\nnon esitava a spostarsi sulla terraferma."
          ultra_moon: "Si immergeva fino a 1.000 m di profondità e\nil suo territorio di caccia si estendeva dagli\nabissi marini alla terraferma."
        de:
          ultra_sun: "Es wurde aus einem urzeitlichen Fossil wieder\nzum Leben erweckt. Zwar lebte es im Meer, zur\nFuttersuche ging es jedoch auch an Land."
          ultra_moon: "Sein Jagdrevier erstreckte sich einst von bis\nzu 1 000 m tiefen Meeresgebieten bis zum\nFestland."
        es:
          ultra_sun: "Se ha logrado reconstruir a partir de fósiles.\nAunque viviera en el mar, no dudaba en salir del\nagua a tierra firme en busca de presas."
          ultra_moon: "Poseía un vasto territorio de caza, que abarcaba\ndesde la tierra firme hasta una profundidad\nmarina de 1 km."
        ko:
          ultra_sun: "고대 화석에서 부활했다.\n바다에 살고 있었지만, 먹이를\n찾아 지상으로 올라왔다."
          ultra_moon: "수심 1000m의 심해에서\n육지에 이르기까지\n넓은 범위를 사냥터로 삼았다."
        zh_simp:
          ultra_sun: "由古代的化石复活而来。\n曾生活在海里，\n但也会到陆地上来寻找猎物。"
          ultra_moon: "从１０００米深的深海到陆地，\n这样广阔的范围曾经都是它的狩猎场。"
        zh_trad:
          ultra_sun: "從古代的化石復活而來。\n當時是生活在海裡，\n但也會到陸地上來尋找獵物。"
          ultra_moon: "從１０００公尺深的深海\n一直到陸地上的廣大範圍\n都曾經是牠的獵場。"
