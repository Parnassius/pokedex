        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - no_guard
      hidden_ability: steadfast
      held_items:
        rare: focus_band
      descriptions:
        jp_kana:
          ultra_sun: "しんの　きょうてきに　であうと\nこしの　パワーセーブ　ベルトを\nはずして　ぜんりょくを　はっきする。"
          ultra_moon: "ちょうこくの　モチーフとして　にんき。\nきたえぬかれた　きんにくが　おおくの\nげいじゅつかを　とりこに　している。"
        jp_kanji:
          ultra_sun: "真の　強敵に　出会うと\n腰の　パワーセーブ　ベルトを\n外して　全力を　発揮する。"
          ultra_moon: "彫刻の　モチーフとして　人気。\n鍛えぬかれた　筋肉が　多くの\n芸術家を　虜に　している。"
        en:
          ultra_sun: "When it encounters an enemy that’s truly\nmighty, this Pokémon removes the power-save\nbelt from its waist and unleashes its full power."
          ultra_moon: "A popular motif for sculptures, its incredibly\nwell-developed muscles have captured the\nimagination of many an artist."
        fr:
          ultra_sun: "Quand il rencontre un adversaire vraiment\nredoutable, il retire sa ceinture de force\net déchaîne toute sa puissance."
          ultra_moon: "C’est un modèle très en vogue chez les\nsculpteurs. De nombreux artistes ne jurent\nque par sa musculature parfaite."
        it:
          ultra_sun: "Quando incontra un nemico davvero formidabile,\nsi toglie la cintura che usa per contenere la sua\nforza e scatena tutta la sua potenza."
          ultra_moon: "Gli artisti sono rapiti dalla perfezione dei suoi\nmuscoli ben sviluppati e spesso lo scelgono\ncome soggetto delle loro sculture."
        de:
          ultra_sun: "Trifft es auf einen wahrhaft starken Gegner,\nnimmt es seinen kraftregulierenden Gürtel ab,\num seine volle Stärke entfalten zu können."
          ultra_moon: "Es gilt als beliebtes Motiv in der Bildhauerei.\nSeinen wohlgeformten, stählernen Muskeln sind\nnicht wenige Künstler verfallen."
        es:
          ultra_sun: "Cuando encuentra un rival realmente formidable,\nse quita el cinturón que restringe su energía y\ncombate con todas sus fuerzas."
          ultra_moon: "Su escultural figura lo convierte en un modelo\nideal para artistas del cincel, a los que su\nperfecta musculatura embelesa sin remisión."
        ko:
          ultra_sun: "진정한 강적을 만나면\n허리의 파워 세이브 벨트를\n풀고 전력을 발휘한다."
          ultra_moon: "조각의 모티브로 인기 있다.\n잘 단련된 근육이 많은\n예술가들을 사로잡는다."
        zh_simp:
          ultra_sun: "如果遇到了真正的强敌，\n就会解开腰上的力量限制腰带，\n并使出全力。"
          ultra_moon: "作为雕刻的主题很受欢迎。\n锻炼到极致的肌肉俘获了\n很多艺术家的心。"
        zh_trad:
          ultra_sun: "當遇上真正的強敵時，\n會解開限制力量的腰帶\n來使出全力。"
          ultra_moon: "是很受歡迎的雕刻主題。\n經過千錘百煉的肌肉\n讓許多藝術家為之著迷。"
