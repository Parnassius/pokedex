      descriptions:
        jp_kana:
          ultra_sun: "はなのミツと　かふんが　こうぶつ。\nはなばたけで　エサを　めぐり\nバタフリーと　こぜりあいをしている。"
          ultra_moon: "いきものの　オーラを　かんじとる。\nオーラから　うごきを　さきよみ　して\nてきを　ほんろう　するのが　とくい。"
        jp_kanji:
          ultra_sun: "花のミツと　花粉が　好物。\n花畑で　エサを　巡り\nバタフリーと　小競り合いをしている。"
          ultra_moon: "生き物の　オーラを　感じ取る。\nオーラから　動きを　先読み　して\n敵を　翻弄　するのが　得意。"
        en:
          ultra_sun: "Nectar and pollen are its favorite fare. In fields\nof flowers, it gets into skirmishes with\nButterfree over food."
          ultra_moon: "Cutiefly can pick up the auras of living things. It\nskillfully reads those auras to predict its foes’\nmovements and make fools of them."
        fr:
          ultra_sun: "Il aime le nectar et le pollen, et se dispute\nces denrées avec Papilusion dans les champs\nde fleurs."
          ultra_moon: "Il perçoit l’aura des êtres vivants, ce qui lui\npermet de se jouer de son adversaire en\nprévoyant et en anticipant ses mouvements."
        it:
          ultra_sun: "Adora il nettare e il polline.\nLo si vede spesso nei prati mentre bisticcia\ncon i Butterfree per accaparrarsi il cibo."
          ultra_moon: "Percepisce l’aura degli esseri viventi, riuscendo\ncosì ad anticipare i loro movimenti. Per questo\nha sempre la meglio sui nemici."
        de:
          ultra_sun: "Es liebt Blütenstaub und Nektar. Schwirrt es auf\nder Suche nach Futter durch Blumenbeete,\nhandelt es sich oft Reibereien mit Smettbo ein."
          ultra_moon: "Es kann die Aura von Lebewesen wahrnehmen.\nSo erahnt es die Bewegungen seiner Feinde und\nkann sie geschickt an der Nase herumführen."
        es:
          ultra_sun: "Le encanta el néctar y el polen. Revolotea en\nbusca de alimento por campos de flores, donde\ntiene sus rifirrafes con Butterfree."
          ultra_moon: "Percibe el aura de los seres vivos. Aprovecha\nesta capacidad para juguetear con el enemigo\nanticipándose a sus movimientos."
        ko:
          ultra_sun: "꽃의 꿀과 화분을 좋아한다.\n꽃밭에서 먹이를 두고\n버터플과 옥신각신한다."
          ultra_moon: "생물의 오라를 느낀다.\n오라를 통해 움직임을 먼저 읽어서\n적을 농락하는 것이 특기다."
        zh_simp:
          ultra_sun: "喜欢吃花蜜和花粉。\n会在花圃里寻找食物，\n和巴大蝶展开小冲突。"
          ultra_moon: "能够感知生物的气场。\n很擅长从气场中预先读取\n敌人的行动，玩弄对方。"
        zh_trad:
          ultra_sun: "喜歡吃花蜜和花粉。\n經常在花圃裡為了爭奪食物\n而和巴大蝶發生小衝突。"
          ultra_moon: "能夠感知生物的氣場。\n擅長透過氣場預先判斷\n敵人的行動並玩弄對方。"
