        common: mystic_water
        rare: mystic_water
      descriptions:
        jp_kana:
          ultra_sun: "ひとを　のせて　およぐのが　すき。\nアローラちほう　では　たいせつな\nすいじょうの　こうつう　しゅだん。"
          ultra_moon: "たいせつに　されすぎて　ふえすぎた。\nラプラスが　おおすぎる　うみでは\nさかなポケモンが　へってきたという。"
        jp_kanji:
          ultra_sun: "人を　乗せて　泳ぐのが　好き。\nアローラ地方　では　大切な\n水上の　交通　手段。"
          ultra_moon: "大切に　されすぎて　増えすぎた。\nラプラスが　多すぎる　海では\nさかなポケモンが　減ってきたという。"
        en:
          ultra_sun: "It likes swimming around with people on its\nback. In the Alola region, it’s an important means\nof transportation over water."
          ultra_moon: "They’ve been so cherished that there’s now an\noverabundance. The fish Pokémon population\nhas declined in waters with too many Lapras."
        fr:
          ultra_sun: "Il prend plaisir à transporter des humains sur\nson dos quand il nage. Les habitants d’Alola\nadorent ce moyen de transport."
          ultra_moon: "Cette espèce protégée a tellement proliféré que\nles Pokémon poissons se font apparemment\nplus rares dans les eaux peuplées de Lokhlass."
        it:
          ultra_sun: "Ama trasportare persone sul suo dorso.\nAd Alola, viaggiare in groppa a Lapras è un\nmodo molto popolare di spostarsi sull’acqua."
          ultra_moon: "Fin troppo protetto, ha finito per moltiplicarsi\nin modo eccessivo e questo ha causato una\ndiminuzione dei Pokémon acquatici nei mari."
        de:
          ultra_sun: "Da es liebend gerne beim Schwimmen Menschen\nauf seinem Rücken trägt, gilt es in Alola als\nbedeutendes Transportmittel."
          ultra_moon: "Aufgrund eines Artenschutzabkommens gibt es\nnun zu viele Lapras. In den betroffenen Meeren\nsinkt daher das Vorkommen von Fisch-Pokémon."
        es:
          ultra_sun: "Debido a su buena disposición a llevar gente\nsobre su lomo, ha terminado por convertirse en\nun medio de transporte muy popular en Alola."
          ultra_moon: "Desde que están protegidos, la población de\nLapras ha crecido sin mesura, a la par que la de\nlos Pokémon pez ha ido en descenso."
        ko:
          ultra_sun: "사람을 태우고 헤엄치는 것을 좋아한다.\n알로라지방에서는 소중한\n수상 교통수단이다."
          ultra_moon: "너무 소중히 여겨져서 수가 너무 늘었다.\n라프라스가 너무 많은 바다에는\n물고기포켓몬이 줄어든다고 한다."
        zh_simp:
          ultra_sun: "喜欢乘载着人游泳。\n在阿罗拉地区，\n这是重要的水上交通方式。"
          ultra_moon: "重点保护过头导致数量增加太多。\n据说在拉普拉斯过多的海域，\n鱼宝可梦的数量已经减少了。"
        zh_trad:
          ultra_sun: "喜歡載著人游泳。\n在阿羅拉地區\n是重要的水上交通工具。"
          ultra_moon: "因為受到過度保護而導致數量激增。\n據說在拉普拉斯過多的海域，\n魚寶可夢的數量已漸漸減少了。"
