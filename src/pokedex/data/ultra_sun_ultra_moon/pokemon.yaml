      descriptions:
        jp_kana:
          ultra_sun: "あたまの　なかでは　つねに　せかいを\nかえるような　アイデアが　わきだして\nいるが　ひらめくはじから　わすれる。"
          ultra_moon: "うみの　けんじゃと　よばれる。\nヤレユータンと　ちえくらべを　するが\nけっかは　だいたい　ひきわけ。"
        jp_kanji:
          ultra_sun: "頭の　中では　常に　世界を\n変えるような　アイデアが　わきだして\nいるが　ひらめく端から　忘れる。"
          ultra_moon: "海の　賢者と　呼ばれる。\nヤレユータンと　知恵比べを　するが\n結果は　だいたい　引き分け。"
        en:
          ultra_sun: "It’s constantly coming up with new ideas that\nwould change the world, but as soon as it\nhits upon a new idea, it forgets it."
          ultra_moon: "It’s called “the sage of the sea.” It engages in\nbattles of wits with Oranguru, but the result is\nusually a draw."
        fr:
          ultra_sun: "Il trouve tout le temps des idées formidables\nqui pourraient changer le monde, mais il les\noublie dans la foulée."
          ultra_moon: "On l’appelle « le Grand Sage des mers ».\nSes fréquents concours d’intelligence avec\nGouroutan se terminent souvent par une égalité."
        it:
          ultra_sun: "Ha sempre un sacco di idee che potrebbero\ncambiare il mondo, ma le dimentica un attimo\ndopo che gli sono venute in mente."
          ultra_moon: "È chiamato “il saggio del mare”. Rivaleggia per\nintelligenza con Oranguru e quasi sempre\nle loro sfide finiscono in parità."
        de:
          ultra_sun: "In seinem Kopf kommen ihm ständig große Ideen,\ndie die Welt verändern könnten. Leider vergisst\nes sie jedoch viel zu schnell wieder."
          ultra_moon: "Man nennt es auch den „Weisen des Meeres“.\nEs liefert sich mit Kommandutan epische\nQuiz-Duelle, die zumeist im Gleichstand enden."
        es:
          ultra_sun: "A menudo se le ocurren ideas geniales que\ncambiarían el mundo, pero tan pronto como las\ntiene se le olvidan."
          ultra_moon: "Lo llaman el Sabio del Mar. Disfruta librando\nduelos de inteligencia con Oranguru que suelen\nterminar en tablas."
        ko:
          ultra_sun: "머릿속으로는 항상 세계를 바꿀\n정도의 아이디어가 넘쳐 흐르지만\n번뜩이는 순간 잊어버린다."
          ultra_moon: "바다의 현자라고 불린다.\n하랑우탄과 지혜를 겨루지만\n결과는 대체로 무승부다."
        zh_simp:
          ultra_sun: "脑海中经常会涌现出一些\n像是改变世界的想法，\n但不久后会依次忘记。"
          ultra_moon: "被称为大海的贤者。\n虽然会去和智挥猩比拼智力，\n但结果多是不分上下。"
        zh_trad:
          ultra_sun: "腦海中不停湧現各種\n足以改變世界的點子，\n但牠馬上就會忘了那些點子。"
          ultra_moon: "被稱為大海的賢者。\n會與智揮猩比拼智力，\n但結果大多是不分上下。"
