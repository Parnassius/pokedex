      descriptions:
        jp_kana:
          ultra_sun: "おとなしい　ポケモンだが　おなかの\nまるい　いしを　とりあげると\nないて　さわいで　おおあばれ。"
          ultra_moon: "しろく　まるいものを　みると　はらの\nふくろに　しまう。　しまいすぎて\nうごけなく　なることも　あるほど。"
        jp_kanji:
          ultra_sun: "大人しい　ポケモンだが　お腹の\n丸い　石を　取り上げると\n泣いて　騒いで　大暴れ。"
          ultra_moon: "白く　丸いものを　見ると　腹の\n袋に　しまう。　しまいすぎて\n動けなく　なることも　あるほど。"
        en:
          ultra_sun: "Usually it’s a well-behaved Pokémon, but if you\ntake its round rock away, it will cry and fuss\nand throw a big old tantrum."
          ultra_moon: "When it sees something round and white,\nHappiny puts it into the pouch on its stomach. It\nsometimes becomes overloaded and can’t move."
        fr:
          ultra_sun: "C’est un Pokémon d’un naturel calme. Quiconque\ntente de s’emparer du caillou de sa poche\nventrale s’expose toutefois à un gros caprice."
          ultra_moon: "Dès qu’il repère un objet rond et blanc, il le\nrange dans sa poche ventrale. Il en ramasse\nparfois tellement qu’il ne peut plus bouger."
        it:
          ultra_sun: "È un Pokémon docile, ma se si fa per togliergli\nla pietra dalla tasca ventrale piange, strilla e\ndiventa una furia."
          ultra_moon: "Quando vede un oggetto bianco e tondo lo mette\nnella tasca ventrale. A volte ce ne mette così\ntanti che finisce per non riuscire a muoversi."
        de:
          ultra_sun: "Eigentlich ein sehr braves Pokémon, das aber\nfürchterlich weint und tobt, wenn man den\nrunden, weißen Stein aus seinem Beutel nimmt."
          ultra_moon: "Findet es weiße, runde Steine, verstaut es sie in\nseinem Beutel. Manchmal trägt es so viele davon\nbei sich, dass es nicht mehr laufen kann."
        es:
          ultra_sun: "Se trata de un Pokémon dócil y tranquilo, pero,\nsi le arrebatan la piedra redonda que lleva en la\nbolsa de su panza, se pone a llorar y berrear."
          ultra_moon: "En cuanto ve cosas blancas y redondas, se las\nguarda en la bolsa de su panza. A veces la llena\nhasta tales extremos que no se puede ni mover."
        ko:
          ultra_sun: "온순한 포켓몬이지만\n배의 둥근 돌을 빼내면\n울고불고 난폭해진다."
          ultra_moon: "하얗고 둥근 것을 보면 배의\n주머니에 넣는다. 너무 많이 넣어서\n움직이지 못할 때도 있을 정도다."
        zh_simp:
          ultra_sun: "是非常温顺的宝可梦，\n但如果被夺走了腹部的圆石头，\n就会哭着大吵大闹。"
          ultra_moon: "如果看到又白又圆的东西\n就会放到腹部的袋子里。\n有时甚至会放得太多而动弹不得。"
        zh_trad:
          ultra_sun: "性情溫馴的寶可夢，\n但如果肚子上的圓形石頭被搶走，\n就會哭著大吵大鬧。"
          ultra_moon: "只要看見又白又圓的東西\n就會放進腹部的袋裡。\n有時甚至會放得太多而動彈不得。"
