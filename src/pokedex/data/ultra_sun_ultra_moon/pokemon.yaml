      descriptions:
        jp_kana:
          ultra_sun: "りょうてあしの　ツメを　たいでんさせ\nあいてを　やつざき。　かわされても\nとびちる　でんげきで　かんでんさせる。"
          ultra_moon: "かみなりが　おちるのと　おなじ\nはやさで　てきに　きゅうせっきん。\nするどい　ツメで　やつざきに　する。"
        jp_kanji:
          ultra_sun: "両手足の　ツメを　帯電させ\n相手を　八つ裂き。　かわされても\n飛び散る　電撃で　感電させる。"
          ultra_moon: "雷が　落ちるのと　同じ\n速さで　敵に　急接近。\n鋭い　ツメで　八つ裂きに　する。"
        en:
          ultra_sun: "It electrifies its claws and tears its opponents\napart with them. Even if they dodge its attack,\nthey’ll be electrocuted by the flying sparks."
          ultra_moon: "It approaches its enemies at the speed of\nlightning, then tears them limb from limb with\nits sharp claws."
        fr:
          ultra_sun: "Il déchiquette son adversaire avec ses griffes\nchargées d’électricité. Même si sa cible évite\nl’attaque, elle reçoit un coup de jus."
          ultra_moon: "Il prend l’ennemi par surprise en attaquant\nplus vite que l’éclair, et le débite en morceaux\navec ses griffes acérées."
        it:
          ultra_sun: "Fa a pezzi l’avversario con le unghie cariche di\nelettricità. Anche se il nemico schiva il colpo,\nriceve comunque una scarica folgorante."
          ultra_moon: "Si avvicina all’avversario con la velocità di un\nfulmine e lo fa a pezzi con le unghie affilate."
        de:
          ultra_sun: "Mit seinen elektrisierten Krallen reißt es Gegner\nin Stücke. Selbst wenn sie ausweichen, werden\nsie von elektrisch geladenen Funken getroffen."
          ultra_moon: "Schnell wie der Blitz nähert es sich seinen\nFeinden, um sie dann mit seinen scharfen\nKlauen in Stücke zu reißen."
        es:
          ultra_sun: "Hace jirones al oponente con sus garras\nelectrificadas. Aunque este esquive los golpes,\nacaba electrocutado por las descargas."
          ultra_moon: "Se acerca a su enemigo de forma tan súbita\ncomo la caída de un rayo, y lo hace trizas con\nsus afiladas garras."
        ko:
          ultra_sun: "양 손발톱에 전기를 머금어\n상대를 갈가리 찢는다. 피하더라도\n흩날리는 전격으로 감전시킨다."
          ultra_moon: "번개가 떨어지는 것과 같은\n스피드로 적에게 접근한다.\n날카로운 발톱으로 갈가리 찢는다."
        zh_simp:
          ultra_sun: "让双手双脚的爪子带电，\n将对手撕得稀碎。即使被躲开，\n也会用飞散的电击让其触电。"
          ultra_moon: "用与雷落下相同的速度\n急速接近敌人。\n会用锐利的爪子将对方撕得粉碎。"
        zh_trad:
          ultra_sun: "會讓雙手雙腳的爪子帶電，\n然後將對手撕裂。就算被躲開，\n也會用飛散的電擊讓對手觸電。"
          ultra_moon: "會用與落雷相同的速度\n急速接近敵人，然後用\n銳利的爪子把對手撕碎。"
