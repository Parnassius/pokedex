          ultra_moon: "ぼうだいな　エネルギーが　さいぼうを\nはげしく　しげき。　ねむっていた\nドラゴンの　ちが　めざめたらしい。"
        jp_kanji:
          ultra_sun: "メガシンカの　過剰な　エネルギーが\n遺伝子を　刺激。　抜け落ちたはずの\n体毛が　再び　生えてきた。"
          ultra_moon: "膨大な　エネルギーが　細胞を\n激しく　刺激。　眠っていた\nドラゴンの　血が　目覚めたらしい。"
        en:
          ultra_sun: "Excess energy from Mega Evolution stimulates\nits genes, and the wool it had lost grows\nin again."
          ultra_moon: "Massive amounts of energy intensely stimulated\nAmpharos’s cells, apparently awakening its\nlong-sleeping dragon’s blood."
        fr:
          ultra_sun: "L’afflux d’énergie de la Méga-Évolution a stimulé\nses gènes et a entraîné une repousse de sa\nlaine, perdue depuis des générations."
          ultra_moon: "L’énergie de la Méga-Évolution a altéré son\ntissu cellulaire et réveillé le sang de dragon\nqui sommeillait en lui."
        it:
          ultra_sun: "L’esplosione di energia della megaevoluzione\nha stimolato i suoi geni facendo ricrescere\nla pelliccia che aveva perso."
          ultra_moon: "Un’enorme energia ha stimolato le sue cellule,\nrisvegliando nel Pokémon la forza latente del\ntipo Drago."
        de:
          ultra_sun: "Überschüssige Energien der Mega-Entwicklung\nhaben seine Gene stimuliert. Dadurch wuchs\ndas einst verloren gegangene Fell wieder nach."
          ultra_moon: "Riesige Energiemengen haben seine Zellen stark\nstimuliert. Es scheint, als sei das Drachenblut\nerwacht, das so lange in ihm schlummerte."
        es:
          ultra_sun: "La descomunal energía de la megaevolución le\nafecta a nivel genético y hace que le vuelva a\ncrecer el pelo corporal que había perdido."
          ultra_moon: "La descomunal energía de la megaevolución le\nafecta a nivel celular, haciendo resurgir la\nsangre de dragón latente en su interior."
        ko:
          ultra_sun: "메가진화의 과도한 에너지가\n유전자를 자극한다. 그로 인해\n빠졌던 털이 다시 자랐다."
          ultra_moon: "방대한 에너지가 세포를\n격렬하게 자극한다. 잠들었던\n드래곤의 피가 깨어났다고 한다."
        zh_simp:
          ultra_sun: "超级进化那过多的能量刺激了遗传基因。\n本应脱落的体毛也重新长了出来。"
          ultra_moon: "庞大的能量会激烈地刺激细胞。\n体内沉睡着的龙血好像觉醒了。"
        zh_trad:
          ultra_sun: "超級進化帶來的過剩能量\n刺激了牠的基因，使得原本已經\n脫落的體毛重新長了出來。"
          ultra_moon: "龐大的能量激烈地刺激細胞。\n沉睡在體內的龍血\n似乎因此而覺醒了。"
