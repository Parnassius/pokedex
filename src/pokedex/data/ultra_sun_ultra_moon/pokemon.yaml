      hidden_ability: technician
      descriptions:
        jp_kana:
          ultra_sun: "あいての　うごきや　ひょうじょうを\nいっしょうけんめいに　まねる。\nまだまだ　うまいとは　いえない。"
          ultra_moon: "モノマネが　とくい。　あいてが\nおどろくと　うれしくなって　ついつい\nまねしているのを　わすれてしまう。"
        jp_kanji:
          ultra_sun: "相手の　動きや　表情を\n一生懸命に　真似る。\nまだまだ　うまいとは　いえない。"
          ultra_moon: "モノマネが　得意。　相手が\n驚くと　嬉しくなって　ついつい\n真似しているのを　忘れてしまう。"
        en:
          ultra_sun: "It does its absolute best to mimic the\nmovements and expressions of its opponents,\nbut it’s still not very good at it."
          ultra_moon: "When this gifted mimic surprises an opponent,\nMime Jr. feels so happy that it ends up\nforgetting it was imitating something."
        fr:
          ultra_sun: "Il fait de son mieux pour imiter les gestes\net les expressions de ses adversaires,\nmais il a encore des progrès à faire."
          ultra_moon: "Quand un adversaire reste bouche bée face\nà ses talents de mime, il est tellement content\nqu’il en oublie de continuer sa performance."
        it:
          ultra_sun: "Ce la mette tutta per imitare i movimenti e le\nespressioni dell’avversario, ma non è ancora\nmolto bravo."
          ultra_moon: "Le imitazioni sono la sua specialità. Se riesce a\ndisorientare il nemico, la sua felicità è tale che\nsi interrompe nel bel mezzo della performance."
        de:
          ultra_sun: "Ahmt die Bewegungen und Gesichtsausdrücke\nanderer so gut es kann nach. Leider lassen\nseine Fähigkeiten noch zu wünschen übrig."
          ultra_moon: "Andere nachzuahmen ist sein Steckenpferd.\nKann es sie damit verblüffen, freut es sich so\nsehr, dass es sogar das Imitieren vergisst."
        es:
          ultra_sun: "Imita los movimientos y las expresiones de otros\ntan bien como puede, aunque aún le queda\nmucho por mejorar."
          ultra_moon: "Es un gran imitador. Cuando logra sorprender a\nsu adversario, la alegría le embarga de tal forma\nque se olvida de continuar su actuación."
        ko:
          ultra_sun: "상대의 움직임과 표정을\n열심히 흉내 낸다.\n아직 잘한다고는 할 수 없다."
          ultra_moon: "흉내내기가 특기다.\n상대가 놀라면 기쁜 나머지\n흉내 내고 있다는 사실을 잊어버린다."
        zh_simp:
          ultra_sun: "会拼命地模仿对方的动作和表情。\n但还说不上模仿得很好。"
          ultra_moon: "擅长模仿。如果对方因此大吃一惊，\n它就会很开心，甚至不知不觉\n忘记了自己正在模仿这件事。"
        zh_trad:
          ultra_sun: "會拼命模仿對方的\n動作和表情，\n但還算不上模仿得很好。"
          ultra_moon: "擅長模仿。對方如果因此吃驚，\n牠就會很開心，甚至不知不覺\n忘了自己正在模仿這件事。"
