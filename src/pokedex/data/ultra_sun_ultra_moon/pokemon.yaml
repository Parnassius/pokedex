        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - fairy
      egg_groups:
        - fairy
      abilities:
        - flower_veil
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          ultra_sun: "はなの　ちからが　ないと　キケン。\nでも　すきな　いろと　かたちが\nみつかるまで　たびを　つづけるぞ。"
          ultra_moon: "あたまの　かんむりは　はなの\nかふんを　あつめて　つくったもの。\nいやしの　こうかが　ひめられている。"
        jp_kanji:
          ultra_sun: "花の　力が　ないと　危険。\nでも　好きな　色と　形が\n見つかるまで　旅を　続けるぞ。"
          ultra_moon: "頭の　冠は　花の　花粉を\n集めて　作ったもの。\n癒しの　効果が　秘められている。"
        en:
          ultra_sun: "It’s not safe without the power of a flower, but\nit will keep traveling around until it finds one\nwith the color and shape it wants."
          ultra_moon: "Flabébé wears a crown made from pollen it’s\ncollected from its flower. The crown has hidden\nhealing properties."
        fr:
          ultra_sun: "Bien qu’il soit vulnérable sans le pouvoir\nde sa fleur, il voyagera jusqu’à en trouver\nune de la couleur et de la forme qu’il préfère."
          ultra_moon: "Il confectionne la couronne qui orne sa tête en\nrécoltant du pollen. Elle recèle de nombreuses\npropriétés curatives."
        it:
          ultra_sun: "Senza il potere di un fiore è vulnerabile, tuttavia\nviaggia senza sosta finché non ne trova uno di\nun colore e di una forma che lo soddisfano."
          ultra_moon: "La corona sulla testa è realizzata con il polline\nche raccoglie dai fiori e ha proprietà curative."
        de:
          ultra_sun: "Ohne die Kräfte einer Blume ist es relativ\nschutzlos. Es sucht jedoch so lange, bis es\neine findet, deren Form und Farbe ihm zusagt."
          ultra_moon: "Die Krone auf seinem Kopf hat es sich aus\nPollen von Blumen gebastelt. Sie besitzt eine\nheilende Wirkung."
        es:
          ultra_sun: "Sin el poder que le confiere la flor es una presa\nfácil, así que busca una del tamaño y color\nidóneos y no cesa hasta dar con ella."
          ultra_moon: "Acumula el polen de las flores para confeccionar\nla tiara que lleva en la cabeza, que cuenta con\npropiedades curativas."
        ko:
          ultra_sun: "꽃의 힘이 없으면 위험하다.\n그래도 좋아하는 색과 형태를\n찾을 때까지 여행을 계속한다."
          ultra_moon: "머리의 관은 꽃가루를\n모아서 만든 것이다.\n치유의 효과가 숨겨져 있다."
        zh_simp:
          ultra_sun: "如果没有花的力量，就会很危险。\n但是在找到喜爱的颜色和形状之前，\n会不断地旅行。"
          ultra_moon: "头上的冠是收集花粉做成的。\n蕴藏着治愈的效果。"
        zh_trad:
          ultra_sun: "要是沒有花的力量會很危險，\n但在找到自己喜愛的顏色和形狀之前，\n牠都會繼續旅行下去。"
          ultra_moon: "頭上的冠是收集\n花粉製成的，\n蘊藏著治癒的效果。"
