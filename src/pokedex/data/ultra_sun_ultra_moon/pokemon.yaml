          ultra_moon: "しょくじの　あとは　すなはまで\nにっこうよくを　している。　たいおんを\nあげて　しょうかを　よく　するのだ。"
        jp_kanji:
          ultra_sun: "８ノットの　速度で　海を　泳ぎ\n獲物である　ポケモンを　探す。\n特に　ヨワシが　大好物。"
          ultra_moon: "食事の　後は　砂浜で\n日光浴を　している。　体温を\nあげて　消化を　よく　するのだ。"
        en:
          ultra_sun: "It swims through the ocean at a speed of eight\nknots, searching for Pokémon that will become\nits prey. It’s especially fond of Wishiwashi."
          ultra_moon: "It sunbathes on the beach after meals. The rise\nin its body temperature helps its digestion."
        fr:
          ultra_sun: "Il sillonne les mers à la recherche de ses\nproies à une vitesse de 8 nœuds.\nIl raffole des Froussardine."
          ultra_moon: "Après manger, il s’étale de tout son long sur\nles plages de sable fin. Le soleil le réchauffe\net facilite sa digestion."
        it:
          ultra_sun: "Nuota nel mare alla velocità di 8 nodi alla\nricerca dei Pokémon di cui si nutre.\nÈ particolarmente ghiotto di Wishiwashi."
          ultra_moon: "Dopo mangiato prende il sole sulla spiaggia\nper far aumentare la sua temperatura corporea\ne favorire la digestione."
        de:
          ultra_sun: "Es schwimmt mit bis zu acht Knoten im Meer\nund sucht nach Beute. Für Lusardin hat es eine\nbesondere Vorliebe."
          ultra_moon: "Nach einer Mahlzeit genießt es ein Sonnenbad\nam Strand. Durch die erhöhte Körpertemperatur\nwird seine Verdauung unterstützt."
        es:
          ultra_sun: "Surca los mares a velocidades de 8 nudos en\nbusca de Pokémon que le sirvan de sustento.\nSiente predilección especial por los Wishiwashi."
          ultra_moon: "Le gusta tenderse al sol en la playa después de\ncomer, ya que aumentar su temperatura\ncorporal le facilita la digestión."
        ko:
          ultra_sun: "8노트의 속도로 바다를 헤엄쳐\n먹이가 되는 포켓몬을 찾는다.\n특히 약어리를 매우 좋아한다."
          ultra_moon: "식사 후에는 모래 해변에서\n일광욕을 하고 있다. 체온을\n높여서 소화를 돕기 위함이다."
        zh_simp:
          ultra_sun: "能以８节的速度在海里游动，\n并搜寻能当做猎物的宝可梦。\n特别喜欢吃弱丁鱼。"
          ultra_moon: "进食后会在沙滩上晒日光浴。\n会通过提高体温来帮助消化。"
        zh_trad:
          ultra_sun: "能以８節的速度在海中游動，\n尋找能當成獵物的寶可夢。\n弱丁魚是牠最愛吃的東西。"
          ultra_moon: "進食之後會在沙灘上\n做日光浴，藉此提高體溫\n來幫助消化。"
grimer:
  species_id: 88
  names:
    jp_kana: ベトベター
    jp_kanji: ベトベター
    en: Grimer
    fr: Tadmorv
    it: Grimer
    de: Sleima
    es: Grimer
    ko: 질퍽이
    zh_simp: 臭泥
    zh_trad: 臭泥
  forms:
    grimer:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - amorphous
      abilities:
        - stench
        - sticky_hold
      hidden_ability: poison_touch
      held_items:
        rare: black_sludge
      descriptions:
        jp_kana:
          ultra_sun: "かいていの　ヘドロから　うまれた。\nせいけつな　ばしょでは　たいないの\nばいきんが　ふやせず　しんでしまう。"
          ultra_moon: "さいきんは　こうじょうが　ながす\nはいえきが　きれいで　エサが　ない。\nじき　ぜつめつすると　いわれている。"
        jp_kanji:
          ultra_sun: "海底の　ヘドロから　生まれた。\n清潔な　場所では　体内の\nばい菌が　増やせず　死んでしまう。"
          ultra_moon: "最近は　工場が　流す\n廃液が　綺麗で　エサが　ない。\nじき　絶滅すると　いわれている。"
        en:
          ultra_sun: "It was born from sludge on the ocean floor. In a\nsterile environment, the germs within its body\ncan’t multiply, and it dies."
          ultra_moon: "The wastewater coming from factories is clean\nthese days, so Grimer have nothing to eat.\nThey’re said to be on the verge of extinction."
        fr:
          ultra_sun: "Il est né de la vase polluée des fonds marins.\nDans les lieux trop propres, sa flore bactérienne\nne peut pas proliférer et il dépérit."
          ultra_moon: "Les usines ne rejetant désormais plus de\ndéchets toxiques, il n’a plus rien à se mettre\nsous la dent et se voit menacé d’extinction."
        it:
          ultra_sun: "Proviene dal fango dei fondali marini. Non può\nsopravvivere in ambienti puliti perché i batteri\nnel suo corpo non riescono a moltiplicarsi."
          ultra_moon: "Poiché gli scarichi industriali sono sempre\npiù puliti, fatica a trovare fonti di nutrimento.\nSembra che per questo rischi l’estinzione."
        de:
          ultra_sun: "Sleima ist aus dem Schlamm am Meeresgrund\nentstanden. An sterilen Orten kann es seine\nBakterien nicht kultivieren und stirbt."
          ultra_moon: "Es ernährt sich von Industrieabfällen, die durch\numweltfreundliche Methoden nun aber knapp\nwerden. Es ist daher vom Aussterben bedroht."
        es:
          ultra_sun: "Surgió del limo oceánico. En hábitats impolutos,\nlos gérmenes de su cuerpo no pueden medrar y\ntermina falleciendo."
          ultra_moon: "Debido a la reducción en los vertidos de aguas\nresiduales, su fuente de alimento ha menguado\ny ahora se encuentra en peligro de extinción."
        ko:
          ultra_sun: "바다 밑의 진흙에서 태어났다.\n청결한 장소에서는 체내의\n세균이 증식되지 않아 죽어 버린다."
          ultra_moon: "최근에는 공장에서 나오는\n폐수가 깨끗해서 먹이가 없다.\n곧 멸종될 것이라고 전해진다."
        zh_simp:
          ultra_sun: "诞生于海底的污泥。\n在干净的地方，它就会因\n体内的细菌无法增长而死去。"
          ultra_moon: "最近工厂流出的废水太干净，\n它都没东西可吃。\n据说马上就要灭绝了。"
        zh_trad:
          ultra_sun: "誕生自海底的污泥。\n在乾淨的地方，牠會因為\n體內的細菌無法增長而死去。"
          ultra_moon: "最近工廠排放的廢水太乾淨，\n使得牠沒東西可吃。\n據說就快要絕種了。"
    grimer_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 80
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - dark
      egg_groups:
        - amorphous
      abilities:
        - poison_touch
        - gluttony
      hidden_ability: power_of_alchemy
      held_items:
        rare: black_sludge
      descriptions:
        jp_kana:
          ultra_sun: "アローラの　ゴミしょぶんじょう　には\n１００ぴきぜんごが　すんでいる。　みな\nたくさん　ゴミを　くう　はたらきもの。"
          ultra_moon: "ゴミもんだいを　かいけつ　するために\nアローラに　つれて　こられた。　どんな\nゴミでも　うまそうに　たいらげる。"
        jp_kanji:
          ultra_sun: "アローラの　ゴミ処分場　には\n１００匹前後が　棲んでいる。　みな\nたくさん　ゴミを　食う　働きもの。"
          ultra_moon: "ゴミ問題を　解決　するために\nアローラに　連れて　こられた。　どんな\nゴミでも　美味そうに　平らげる。"
        en:
          ultra_sun: "There are a hundred or so of them living in\nAlola’s waste-disposal site. They’re all hard\nworkers who eat a lot of trash."
          ultra_moon: "Brought to Alola to solve the garbage problem,\nGrimer seems to relish any and all kinds\nof trash."
        fr:
          ultra_sun: "Dans les décharges d’Alola, une centaine\nd’entre eux dévorent les immondices avec\ndiligence."
          ultra_moon: "Ce glouton, capable de dévorer tout et n’importe\nquoi, a été introduit à Alola pour résoudre\nles problèmes de déchets."
        it:
          ultra_sun: "Negli impianti di smaltimento rifiuti di Alola\nne vivono circa 100 esemplari che lavorano\nsodo mangiando rifiuti in quantità."
          ultra_moon: "Siccome divora con gusto ogni sorta di\nimmondizia, è stato introdotto ad Alola per\nrisolvere il problema dello smaltimento dei rifiuti."
        de:
          ultra_sun: "Die Müllanlagen Alolas beherbergen rund\nhundert Exemplare dieses Pokémon. Sie sind\nfleißig dabei, riesige Mengen an Müll zu vertilgen."
          ultra_moon: "Es wurde als Lösung für die Abfallproblematik\nder Region nach Alola gebracht. Alola-Sleima\nverputzen genüsslich jeden erdenklichen Müll."
        es:
          ultra_sun: "En los vertederos de Alola habitan unos 100\nejemplares que devoran la basura con diligencia."
          ultra_moon: "Fue introducido en Alola para solucionar la\nproblemática de los residuos en la región.\nDevora con gusto todo tipo de basura."
        ko:
          ultra_sun: "알로라의 쓰레기 처리장에서는\n약 100마리가 살고 있다. 모두\n쓰레기를 많이 먹는 유능한 일꾼이다."
          ultra_moon: "쓰레기 문제를 해결하기 위해\n알로라에 데려왔다. 쓰레기라면\n뭐든지 맛있게 먹어 치운다."
        zh_simp:
          ultra_sun: "在阿罗拉的垃圾处理场，\n大约栖息着１００只左右的臭泥。\n它们很能干，会吃掉很多垃圾。"
          ultra_moon: "为了解决垃圾问题，\n人们把它带到了阿罗拉。\n它能美美地吃光任何垃圾。"
        zh_trad:
          ultra_sun: "大約有１００隻左右的臭泥\n棲息在阿羅拉的垃圾處理場。\n勤勞的牠們會吃下大量的垃圾。"
          ultra_moon: "為了解決垃圾問題，\n牠被人們帶到了阿羅拉來。\n不管什麼垃圾都能大快朵頤。"
muk:
  species_id: 89
  names:
    jp_kana: ベトベトン
    jp_kanji: ベトベトン
    en: Muk
    fr: Grotadmorv
    it: Muk
    de: Sleimok
    es: Muk
    ko: 질뻐기
    zh_simp: 臭臭泥
    zh_trad: 臭臭泥
  forms:
    muk:
      form_id: 0
      base_stats:
        hp: 105
        attack: 105
        defense: 75
        special_attack: 65
        special_defense: 100
        speed: 50
      evs_yield:
        hp: 1
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
      egg_groups:
        - amorphous
      abilities:
        - stench
        - sticky_hold
      hidden_ability: poison_touch
      held_items:
        common: black_sludge
      descriptions:
        jp_kana:
          ultra_sun: "エサが　へって　かずも　げきげん。\nぜつめつを　ふせぐため　じんこうの\nヘドロいけが　つくられはじめた。"
          ultra_moon: "びょうげんきんを　まきちらすので\nくじょ　しつづけた　けっか\nかずが　げきげんして　しまった。"
        jp_kanji:
          ultra_sun: "エサが　減って　数も　激減。\n絶滅を　防ぐため　人工の\nヘドロ池が　作られ始めた。"
          ultra_moon: "病原菌を　まき散らすので\n駆除　し続けた　結果\n数が　激減して　しまった。"
        en:
          ultra_sun: "Their food sources have decreased, and their\nnumbers have declined sharply. Sludge ponds\nare being built to prevent their extinction."
          ultra_moon: "Because they scatter germs everywhere,\nthey’ve long been targeted for extermination,\nleading to a steep decline in their population."
        fr:
          ultra_sun: "Faute de nourriture, la population de Grotadmorv\ndiminue rapidement. Pour éviter son extinction,\ndes étangs de fange artificiels ont été creusés."
          ultra_moon: "Comme il répand des microbes, on lui a\nbeaucoup fait la chasse. La population de\nGrotadmorv a diminué de manière drastique."
        it:
          ultra_sun: "Il loro numero è calato drasticamente a causa\ndella mancanza di cibo. Per evitarne l’estinzione,\nsono state create pozze di liquami artificiali."
          ultra_moon: "Essendo portatore di germi, è stato sempre\ncacciato senza pietà. Per questo il numero di\nesemplari si è ridotto drasticamente."
        de:
          ultra_sun: "Aufgrund von Futtermangel sieht man es immer\nseltener. Um es vom Aussterben zu bewahren,\nwerden nun künstliche Schlammteiche angelegt."
          ultra_moon: "Da es Krankheitskeime verbreitet, hat man lange\nversucht, es auszurotten. Heute sieht man es\ndaher nur noch selten."
        es:
          ultra_sun: "Su número ha disminuido por falta de sustento,\npor lo que se han creado estanques de lodo\nartificiales para salvarlo de la extinción."
          ultra_moon: "Al ser un portador de toda clase de gérmenes,\nha sido perseguido a lo largo de la historia\nhasta verse abocado casi a la extinción."
        ko:
          ultra_sun: "먹이가 줄어들어 개체 수가 격감했다.\n멸종을 방지하기 위해 \n인공 진흙 연못을 만들기 시작했다."
          ultra_moon: "병원균을 흩뿌리기 때문에\n제거를 거듭한 결과\n수가 급격히 줄어들었다."
        zh_simp:
          ultra_sun: "食物变少数量也会急剧减少。\n为了防止它灭绝，\n人们开始了制造人工污泥池。"
          ultra_moon: "因为它会播撒病原菌，\n所以一直遭到人们的驱逐，\n结果它的数量也急剧减少了。"
        zh_trad:
          ultra_sun: "因為食物減少而導致數量驟減。\n為了防止牠絕種，人們開始\n建造人工的污泥池。"
          ultra_moon: "由於牠會散播病原菌，\n因此不斷遭到驅逐，\n結果導致牠的數量急遽減少。"
    muk_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 105
        attack: 105
        defense: 75
        special_attack: 65
        special_defense: 100
        speed: 50
      evs_yield:
        hp: 1
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - dark
      egg_groups:
        - amorphous
      abilities:
        - poison_touch
        - gluttony
      hidden_ability: power_of_alchemy
      held_items:
        common: black_sludge
      descriptions:
        jp_kana:
          ultra_sun: "たいないに　ある　どくの　しゅるいは\n１００　いじょう。　どくと　どくの\nかがくはんのうが　いのちの　みなもと。"
          ultra_moon: "キバや　ツメに　みえるのは　どくその\nけっしょう。　ふれるだけで　どくに\nおかされるので　ちかづくのは　キケン。"
        jp_kanji:
          ultra_sun: "体内にある　毒の　種類は\n１００　以上。　毒と　毒の\n化学反応が　命の　源。"
          ultra_moon: "キバや　ツメに　見えるのは　毒素の\n結晶。　触れるだけで　毒に\n侵されるので　近付くのは　危険。"
        en:
          ultra_sun: "There are over a hundred kinds of poison inside\nits body. Chemical reactions between different\npoisons are the source of its vitality."
          ultra_moon: "What look like fangs and claws are actually\ncrystallized poison that will afflict you at a\nmere touch, so don’t get too close."
        fr:
          ultra_sun: "Son corps abrite plus de cent toxines\ndifférentes. Les réactions chimiques entre\nces poisons constituent sa source d’énergie."
          ultra_moon: "Ses crocs et ses griffes sont des toxines\ncristallisées. Il gangrène tout ce qu’il touche,\nalors n’approchez pas trop près."
        it:
          ultra_sun: "Il suo corpo contiene più di 100 sostanze\ntossiche diverse dalle cui reazioni chimiche\ntrae energia vitale."
          ultra_moon: "Quelli che sembrano denti e artigli sono in\nrealtà tossine cristallizzate che avvelenano al\nsolo contatto. Avvicinarsi è molto pericoloso."
        de:
          ultra_sun: "In seinem Inneren befinden sich mehr als 100\nverschiedene Toxine. Seine Lebenskraft zieht es\naus den chemischen Reaktionen zwischen ihnen."
          ultra_moon: "Was nach Fangzähnen und Krallen aussieht, sind\nin Wirklichkeit kristalline Giftstoffe. Die bloße\nBerührung führt bereits zur Vergiftung."
        es:
          ultra_sun: "En su cuerpo alberga más de un centenar de\ntipos de veneno. Las reacciones químicas entre\nellos son su fuente de energía."
          ultra_moon: "Sus colmillos y uñas son toxinas cristalizadas.\nEnvenenan al contacto, por lo que no conviene\nacercarse demasiado."
        ko:
          ultra_sun: "체내에 있는 독은\n100종류 이상이다. 독과 독의\n화학 반응이 생명의 근원이다."
          ultra_moon: "이빨이나 손톱으로 보이는 것은\n독소의 결정이다. 만지기만 해도\n독에 중독되므로 다가가면 위험하다."
        zh_simp:
          ultra_sun: "体内的毒素有１００种以上。\n毒素和毒素之间的\n化学反应是其生命之源。"
          ultra_moon: "看上去像牙齿或爪子的东西其实是\n毒素的结晶。只要碰到就会中毒，\n所以靠近它很危险。"
        zh_trad:
          ultra_sun: "體內毒素的種類有１００種以上。\n毒素與毒素之間的化學反應\n是牠的生命之源。"
          ultra_moon: "看起來像牙齒和爪子的東西是\n毒素結晶。一旦碰到就會中毒，\n所以靠近牠是很危險的。"
shellder:
  species_id: 90
  names:
    jp_kana: シェルダー
    jp_kanji: シェルダー
    en: Shellder
    fr: Kokiyas
    it: Shellder
    de: Muschas
    es: Shellder
    ko: 셀러
    zh_simp: 大舌贝
    zh_trad: 大舌貝
  forms:
    shellder:
      form_id: 0
      base_stats:
        hp: 30
        attack: 65
        defense: 100
        special_attack: 45
        special_defense: 25
        speed: 40
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_3
      abilities:
        - shell_armor
        - skill_link
      hidden_ability: overcoat
      held_items:
        common: pearl
