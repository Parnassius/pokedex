        jp_kana:
          ultra_sun: "ムシの　ほうは　ほぼ　しんでいて\nほんたいは　せなかの　キノコだ。\nもげると　もう　うごかなくなる。"
          ultra_moon: "どくの　ほうしは　かんぽうやくにも\nつかわれる。　アローラさんは\nあまり　しつが　よくないらしい。"
        jp_kanji:
          ultra_sun: "ムシの　方は　ほぼ　死んでいて\n本体は　背中の　キノコだ。\nもげると　もう　動かなくなる。"
          ultra_moon: "毒の　胞子は　漢方薬にも\n使われる。　アローラ産は\nあまり　質が　良くないらしい。"
        en:
          ultra_sun: "The bug is mostly dead, with the mushroom on\nits back having become the main body. If the\nmushroom comes off, the bug stops moving."
          ultra_moon: "Its poisonous spores are also used in traditional\nmedicine. Apparently, spores produced in Alola\nare not of very good quality."
        fr:
          ultra_sun: "L’insecte est quasiment mort, à ce stade, et le\nchampignon est devenu le véritable cerveau.\nSi on l’ôte de son dos, il ne peut plus bouger."
          ultra_moon: "Des remèdes traditionnels sont préparés avec\nses spores empoisonnées, mais ceux produits\nà Alola seraient de moindre qualité."
        it:
          ultra_sun: "La parte essenziale di questo Pokémon,\npraticamente morto, è costituita dal fungo sulla\nsua schiena. Se si stacca, non può più muoversi."
          ultra_moon: "Dalle sue spore velenose si possono ricavare\ndei farmaci. Tuttavia, sembra che quelli prodotti\nad Alola non siano di buona qualità."
        de:
          ultra_sun: "Der Pilz auf seinem Rücken ist sein wichtigstes\nKörperteil. Der Rest ist quasi leblos und kann\nsich ohne den Pilz nicht bewegen."
          ultra_moon: "Seine Giftsporen werden als natürliches\nHeilmittel verwendet, doch bei Parasek aus\nAlola ist die Qualität etwas minderwertig."
        es:
          ultra_sun: "La mayor parte de su cuerpo está atrofiada,\nexcepto la seta del dorso, que controla al resto.\nSi se desprende, Parasect ya no podrá moverse."
          ultra_moon: "Sus esporas venenosas se usan para elaborar\nremedios medicinales que en Alola, al parecer,\nson de calidad más bien mediocre."
        ko:
          ultra_sun: "벌레는 거의 죽은 상태이고\n본체는 등의 버섯이다.\n떨어지면 더는 움직일 수 없다."
          ultra_moon: "독 포자는 한방약으로도\n사용된다. 알로라산은\n그다지 품질이 좋지 않다고 한다."
        zh_simp:
          ultra_sun: "底下的虫子基本上死了，\n真正的本体是背上的蘑菇。\n如果蘑菇掉下来，它就不会动了。"
          ultra_moon: "有毒的孢子也能用于中药。\n阿罗拉产的好像品质不怎么样。"
        zh_trad:
          ultra_sun: "本體是背上的蘑菇，\n底下的蟲子幾乎已經死亡。\n一旦蘑菇脫落，牠就再也不會動了。"
          ultra_moon: "有毒的孢子也能用於中藥。\n但阿羅拉地區生產出來的品質\n似乎不怎麼樣。"
