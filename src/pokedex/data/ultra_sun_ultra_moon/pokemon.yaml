snorunt:
  species_id: 361
  names:
    jp_kana: ユキワラシ
    jp_kanji: ユキワラシ
    en: Snorunt
    fr: Stalgamin
    it: Snorunt
    de: Schneppke
    es: Snorunt
    ko: 눈꼬마
    zh_simp: 雪童子
    zh_trad: 雪童子
  forms:
    snorunt:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 50
        special_attack: 50
        special_defense: 50
        speed: 50
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ice
      egg_groups:
        - fairy
        - mineral
      abilities:
        - inner_focus
        - ice_body
      hidden_ability: moody
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          ultra_sun: "ゆきや　こおりが　おもな　エサ。\nあたたかな　アローラでは　かぎられた\nばしょ　でしか　いきていけない。"
          ultra_moon: "さむい　とちの　かねもちは　みんな\nこどもの　ころに　ユキワラシと\nあそんだ　おもいでが　あるらしい。"
        jp_kanji:
          ultra_sun: "雪や　氷が　主な　エサ。\n暖かな　アローラでは　限られた\n場所　でしか　生きていけない。"
          ultra_moon: "寒い　土地の　金持ちは　みんな\n子どもの　頃に　ユキワラシと\n遊んだ　思い出が　あるらしい。"
        en:
          ultra_sun: "It feeds mainly on ice and snow. It’s only able to\nsurvive in a limited number of places in the\nwarm Alola region."
          ultra_moon: "Rich people from cold areas all share childhood\nmemories of playing with Snorunt."
        fr:
          ultra_sun: "Il se nourrit principalement de neige et de glace.\nLe climat chaud d’Alola le contraint à vivre dans\ndes lieux bien spécifiques."
          ultra_moon: "Il semblerait que toute personne aisée ayant\ngrandi dans les régions enneigées se rappelle\navoir joué avec un Stalgamin étant enfant."
        it:
          ultra_sun: "Si nutre principalmente di neve e ghiaccio.\nAd Alola, dove il clima è generalmente caldo,\nsopravvive solo in determinate zone."
          ultra_moon: "Sembra che tutte le persone facoltose delle\nregioni fredde ricordino di aver giocato con\nuno Snorunt da piccoli."
        de:
          ultra_sun: "Es ernährt sich hauptsächlich von Eis und\nSchnee. Im warmen Alola kann es daher nur\nan wenigen Orten überleben."
          ultra_moon: "Wohlhabende Leute aus kalten Gebieten haben\nalle in ihrer Kindheit mit Schneppke gespielt."
        es:
          ultra_sun: "Se alimenta sobre todo de hielo y nieve. Debido\na las temperaturas cálidas que reinan en Alola,\nsolo puede habitar en contados lugares."
          ultra_moon: "Según parece, en las regiones frías todos los\nmiembros de las familias pudientes recuerdan\nhaber jugado con Snorunt en su infancia."
        ko:
          ultra_sun: "눈과 얼음이 주요 먹이다.\n따듯한 알로라에서는 한정된\n장소에서만 살 수 있다."
          ultra_moon: "추운 토지의 부자들은 모두\n어린 시절에 눈꼬마와\n놀았던 추억이 있다고 한다."
        zh_simp:
          ultra_sun: "雪和冰是它的主要食物。\n在温暖的阿罗拉只能在\n限定的地方生存。"
          ultra_moon: "寒冷地方的富人们，\n好像都会有小时候\n和雪童子一起玩的回忆。"
        zh_trad:
          ultra_sun: "雪和冰是牠的主食。\n在溫暖的阿羅拉地區，\n牠只能在少數地方生存。"
          ultra_moon: "寒冷地帶的有錢人們\n好像都有在小時候和\n雪童子一起玩的回憶。"
glalie:
  species_id: 362
  names:
    jp_kana: オニゴーリ
    jp_kanji: オニゴーリ
    en: Glalie
    fr: Oniglali
    it: Glalie
    de: Firnontor
    es: Glalie
    ko: 얼음귀신
    zh_simp: 冰鬼护
    zh_trad: 冰鬼護
  forms:
    glalie:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 80
        special_attack: 80
        special_defense: 80
