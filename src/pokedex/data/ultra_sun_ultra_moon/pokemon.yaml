      descriptions:
        jp_kana:
          ultra_sun: "ながれぼしの　おおい　よるに　むれ\nわになって　ダンス。　その　すがたを\nみると　ちょっと　いいことが　あるよ。"
          ultra_moon: "ながれぼしに　のってきたと　いわれる。\nピィが　あらわれるのは　むかし\nいんせきが　おちた　ばしょ　らしい。"
        jp_kanji:
          ultra_sun: "流れ星の　多い　夜に　群れ\n輪になって　ダンス。　その　姿を\n見ると　ちょっと　いいことが　あるよ。"
          ultra_moon: "流れ星に　乗ってきたと　いわれる。\nピィが　現れるのは　昔\n隕石が　落ちた　場所　らしい。"
        en:
          ultra_sun: "On nights with many shooting stars,\nthey gather in packs and dance in circles. If you\nshould see them, something good will happen!"
          ultra_moon: "Said to have ridden here on a shooting star,\nCleffa seem to appear in places where\nmeteorites have struck in the past."
        fr:
          ultra_sun: "Les nuits où les étoiles filantes inondent le\nciel, il danse en cercle avec ses congénères.\nOn dit qu’admirer ce spectacle porte bonheur."
          ultra_moon: "Il serait parvenu jusqu’à nous en chevauchant\nune étoile filante. On le trouve dans les endroits\noù des météorites sont tombées."
        it:
          ultra_sun: "Nelle notti con molte stelle cadenti, i Cleffa si\nriuniscono per danzare in cerchio. Si dice che\nassistere alla loro danza sia di buon augurio."
          ultra_moon: "Si dice che sia arrivato in groppa a una stella\ncadente. Sembra che appaia principalmente in\nluoghi in cui in passato è caduto un meteorite."
        de:
          ultra_sun: "In Nächten mit vielen Sternschnuppen bilden\nPii einen Kreis und tanzen. Der Anblick dieses\nSpektakels soll Glück bringen."
          ultra_moon: "Es heißt, Pii sei auf einem Meteor hierhergereist.\nAn Orten, wo diese Pokémon anzutreffen sind,\nsoll früher mal ein Meteorit eingeschlagen sein."
        es:
          ultra_sun: "Las noches de lluvia de estrellas, se congregan\ny bailan en círculo. Se cree que presenciar este\nespectáculo trae buena suerte."
          ultra_moon: "Se dice que llegó en una estrella fugaz. Este\nPokémon suele encontrarse en lugares donde\nhan caído meteoritos."
        ko:
          ultra_sun: "별똥별이 많은 밤에 둥글게\n무리 지어 춤을 춘다. 그 모습을\n보면 조금 좋은 일이 생긴다."
          ultra_moon: "별똥별을 타고 왔다고 전해진다.\n삐가 나타나는 곳은 옛날에\n운석이 떨어졌던 장소라는 듯하다."
        zh_simp:
          ultra_sun: "在流星众多的晚上，它们会聚集起来\n并围成一圈跳舞．如果能在那时\n看到它们，就会遇到一些好事情哦。"
          ultra_moon: "据说是乘着流星而来。\n皮宝宝好像会出现在\n以前有陨石坠落过的地方。"
        zh_trad:
          ultra_sun: "會在流星多的夜裡聚集起來，\n圍成一圈跳舞。如果能看見牠們\n跳舞的樣子，就會遇上好事。"
          ultra_moon: "據說是乘著流星而來。\n皮寶寶似乎會出現在\n過去有過隕石墜落的地方。"
igglybuff:
