        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          ultra_sun: "とても　かたいカラを　もつ。　カラに\nついた　キズは　しだいに　もりあがり\nおおきく　するどいトゲへと　そだつ。"
          ultra_moon: "ヤドンの　シッポが　だいこうぶつ。\nときには　りくに　はいあがってまで\nヤドンを　さがすことも　あるほど。"
        jp_kanji:
          ultra_sun: "とても　硬いカラを　持つ。　カラに\nついた　キズは　次第に　盛り上がり\n大きく　鋭いトゲへと　育つ。"
          ultra_moon: "ヤドンの　シッポが　大好物。\nときには　陸に　はいあがってまで\nヤドンを　探すことも　あるほど。"
        en:
          ultra_sun: "If areas of Cloyster’s very hard shell get\ndamaged, those areas swell, gradually growing\ninto large sharp spikes."
          ultra_moon: "Slowpoke tails are its favorite food. It has even\nbeen known to come up on land to look for\nSlowpoke from time to time."
        fr:
          ultra_sun: "Il a une coquille à toute épreuve. En cicatrisant,\nles blessures sur ses valves forment des\nexcroissances qui évoluent en dards pointus."
          ultra_moon: "Il raffole tant des queues de Ramoloss qu’il\nlui arrive de ramper jusqu’à la terre ferme\npour rechercher son péché mignon."
        it:
          ultra_sun: "Ha un guscio estremamente duro. Le parti\ndanneggiate si ispessiscono fino a diventare\ndei grossi aculei affilati."
          ultra_moon: "A volte sale sulla terraferma in cerca di\nSlowpoke perché va matto per la sua coda."
        de:
          ultra_sun: "Seine Schale ist extrem hart. Schäden an der\nSchale schwellen zunächst an und entwickeln\nsich allmählich zu großen, scharfen Stacheln."
          ultra_moon: "Flegmon-Ruten sind seine Leibspeise. Manchmal\nkriecht es sogar an Land, nur um nach Flegmon\nzu suchen."
        es:
          ultra_sun: "Su concha es increíblemente dura. Las heridas\nque recibe en la misma, al cicatrizar, generan\nenormes púas afiladas."
          ultra_moon: "Las colas de Slowpoke le gustan tanto que en\nocasiones llega incluso a aventurarse en tierra\nfirme en busca de este Pokémon."
        ko:
          ultra_sun: "매우 단단한 껍질을 갖고 있다.\n껍질에 생긴 상처는 점점 부풀어서\n크고 날카로운 가시로 자란다."
          ultra_moon: "야돈의 꼬리를 아주 좋아한다.\n때로는 육지에 기어 올라와서\n야돈을 찾을 때도 있을 정도다."
        zh_simp:
          ultra_sun: "拥有非常坚硬的外壳。\n外壳上的伤痕会逐渐隆起，\n长成大大的尖刺。"
          ultra_moon: "非常喜欢吃呆呆兽的尾巴。\n有时甚至会爬到陆地上\n来寻找呆呆兽。"
        zh_trad:
          ultra_sun: "擁有極為堅硬的外殼。\n外殼上的傷痕會逐漸隆起，\n最後變成巨大的尖刺。"
          ultra_moon: "最愛吃呆呆獸的尾巴。\n有時甚至會爬到陸地上\n來尋找呆呆獸。"
gastly:
  species_id: 92
  names:
    jp_kana: ゴース
    jp_kanji: ゴース
    en: Gastly
    fr: Fantominus
    it: Gastly
    de: Nebulak
    es: Gastly
    ko: 고오스
    zh_simp: 鬼斯
    zh_trad: 鬼斯
  forms:
    gastly:
      form_id: 0
      base_stats:
        hp: 30
        attack: 35
        defense: 30
        special_attack: 100
        special_defense: 35
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ultra_sun: "はかばで　はっせいする　ガスに\nおんねんが　やどるうち　やがて\nポケモンに　なったと　いわれている。"
          ultra_moon: "からだの　９５パーセントは　どくガス。\nのこりの　５パーセントは　どくガスで\nしんだものの　たましいだと　いわれる。"
        jp_kanji:
          ultra_sun: "墓場で　発生する　ガスに\n怨念が　宿るうち　やがて\nポケモンに　なったと　いわれている。"
          ultra_moon: "身体の　９５パーセントは　毒ガス。\n残りの　５パーセントは　毒ガスで\n死んだ者の　魂だと　いわれる。"
        en:
          ultra_sun: "It’s said that gas emanating from a graveyard\nwas possessed by the grievances of the\ndeceased and thus became a Pokémon."
          ultra_moon: "Poisonous gas comprises 95% of its body. It’s\nsaid that the remaining 5% is made up of the\nsouls of those who died from the gas."
        fr:
          ultra_sun: "Ce Pokémon serait né des émanations gazeuses\ndes cimetières et de la rancœur qui les habite."
          ultra_moon: "Il est composé à 95 % de gaz toxiques. Les 5 %\nrestants ? Aux dires de certains, il s’agirait d’un\nmélange de gaz toxiques et d’âmes damnées."
        it:
          ultra_sun: "Si dice che questo Pokémon sia nato quando\ni gas esalati da un cimitero sono stati\nanimati da un sentimento di rancore."
          ultra_moon: "Il 95% del suo corpo è composto da gas tossici.\nSi dice che la percentuale restante sia l’anima\ndi qualcuno morto intossicato."
        de:
          ultra_sun: "Es heißt, dieses Pokémon sei aus einem tiefen\nGroll entstanden, der Gasen innewohnte, die auf\nFriedhöfen ausgeströmt waren."
          ultra_moon: "Es besteht zu 95 % aus Giftgas. Die restlichen\n5 % bestehen aus Seelen von Opfern giftiger\nGase."
        es:
          ultra_sun: "Se dice que su origen son nubes de gas\nprovenientes de un cementerio que cobraron\nvida al verse imbuidas de rencor."
          ultra_moon: "Su cuerpo está formado en un 95% por gas\nvenenoso. El 5% restante corresponde a las\nalmas de quienes fallecieran a causa del gas."
        ko:
          ultra_sun: "무덤에서 발생한 가스에\n원념이 머물러 이윽고\n포켓몬이 되었다고 전해진다."
          ultra_moon: "몸의 95퍼센트는 독가스다.\n남은 5퍼센트는 독가스에 의해\n죽은 이들의 영혼이라고 전해진다."
        zh_simp:
          ultra_sun: "据说是怨念寄宿在了\n墓地散发出的气体中，\n并最终变成了宝可梦。"
          ultra_moon: "身体的９５％是毒瓦斯。\n剩下的５％据说是死于\n毒瓦斯的死者的灵魂。"
        zh_trad:
          ultra_sun: "據說怨念寄宿在\n墳場產生的瓦斯裡，\n最後變成了寶可夢。"
          ultra_moon: "身體的９５％是由毒氣構成。\n剩下的５％據說是死於毒氣的\n死者的靈魂。"
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
    jp_kanji: ゴースト
    en: Haunter
    fr: Spectrum
    it: Haunter
    de: Alpollo
    es: Haunter
    ko: 고우스트
    zh_simp: 鬼斯通
    zh_trad: 鬼斯通
  forms:
    haunter:
      form_id: 0
      base_stats:
        hp: 45
        attack: 50
        defense: 45
        special_attack: 115
        special_defense: 55
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          ultra_sun: "つきのない　よる。　ゴーストは\nのろう　あいてを　さがしているので\nであるかない　ほうが　いいぞ。"
          ultra_moon: "かなしい　きもちの　よるは　ひとりで\nそとに　でると　キケン。　ゴーストに\nつかまり　いえに　かえれなくなる。"
        jp_kanji:
          ultra_sun: "月のない　夜。　ゴーストは\n呪う　相手を　探しているので\n出歩かない　方が　いいぞ。"
          ultra_moon: "悲しい　気持ちの　夜は　１人で\n外に　出ると　危険。　ゴーストに\n捕まり　家に　帰れなくなる。"
        en:
          ultra_sun: "On moonless nights, Haunter searches for\nsomeone to curse, so it’s best not to go out\nwalking around."
          ultra_moon: "It’s dangerous to go outside alone on nights\nwhen you’re feeling sad. Haunter will catch you,\nand you won’t be able to go back home."
        fr:
          ultra_sun: "Gare aux nuits sans lune ! C’est là que Spectrum\nerre à la recherche d’âmes à damner.\nToute promenade est fortement déconseillée."
          ultra_moon: "Évitez les balades nocturnes en solitaire en cas\nde vague à l’âme : si Spectrum vous attrape,\nvous ne pourrez plus rentrer chez vous !"
        it:
          ultra_sun: "Nelle notti senza luna è meglio rimanere in casa:\nHaunter vaga in cerca di vittime su cui scagliare\nmaledizioni!"
          ultra_moon: "È pericoloso uscire da soli la notte quando\nsi è tristi: si rischia di essere presi da Haunter\ne non poter più fare ritorno a casa."
        de:
          ultra_sun: "In mondlosen Nächten sucht es nach Opfern,\ndie es mit einem Fluch belegen kann. Zu Hause\nist man daher am sichersten aufgehoben."
          ultra_moon: "Von Kummer Geplagte sollten nachts nicht allein\nherumspazieren. Ansonsten lauert ihnen Alpollo\nauf und lässt sie nie mehr nach Hause zurück."
        es:
          ultra_sun: "Se aconseja no salir a pasear en las noches de\nluna nueva, cuando los Haunter acechan en\nbusca de su próxima víctima."
          ultra_moon: "Quienes se sientan tristes no deben salir solos\npor la noche, pues Haunter estará al acecho, los\natrapará y no podrán volver a casa."
        ko:
          ultra_sun: "달이 뜨지 않은 밤. 고우스트는\n저주할 상대를 찾기 때문에\n나다니지 않는 것이 좋다."
          ultra_moon: "슬픈 기분이 드는 밤에는 혼자\n밖에 나가면 위험하다. 고우스트에게\n붙잡혀 집에 돌아갈 수 없게 된다."
        zh_simp:
          ultra_sun: "在没有月亮的晚上，\n鬼斯通会寻找可以诅咒的对象，\n所以不要外出走动比较好哦。"
          ultra_moon: "心情悲伤时单独夜出很危险。\n因为你会被鬼斯通捉住而无法回家。"
        zh_trad:
          ultra_sun: "在沒有月亮的夜裡，\n鬼斯通會四處尋找詛咒的對象，\n所以不要外出比較好。"
          ultra_moon: "心情悲傷時在夜晚單獨外出\n是很危險的。鬼斯通會捉住你，\n讓你回不了家。"
