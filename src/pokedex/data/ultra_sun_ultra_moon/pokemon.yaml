      types:
        - psychic
        - steel
      egg_groups:
        - undiscovered
      abilities:
        - full_metal_body
      descriptions:
        jp_kana:
          ultra_sun: "ウルトラホールを　ひらいた　けっか\nいせかいの　エネルギーや　せいめいを\nこのせかいに　よぶことも　あるのだ。"
          ultra_moon: "はるか　おおむかしの　ぶんけんに\nたいようを　くらいし　けものと　いう\nなまえで　きろくが　のこっている。"
        jp_kanji:
          ultra_sun: "ウルトラホールを　開いた　結果\n異世界の　エネルギーや　生命を\nこの世界に　呼ぶことも　あるのだ。"
          ultra_moon: "遥か　大昔の　文献に\n太陽を　喰らいし　獣と　いう\n名前で　記録が　残っている。"
        en:
          ultra_sun: "Sometimes the result of its opening an Ultra\nWormhole is that energy and life-forms from\nother worlds are called here to this world."
          ultra_moon: "In writings from the distant past, it’s called by\nthe name “the beast that devours the sun.”"
        fr:
          ultra_sun: "Lorsqu’il ouvre une Ultra-Brèche, il arrive que\nde l’énergie et des formes de vie d’autres\nmondes se retrouvent dans le nôtre."
          ultra_moon: "Des documents extrêmement anciens\nle décrivent comme « celui qui dévore le soleil »."
        it:
          ultra_sun: "A volte gli Ultravarchi che apre servono da\npassaggio verso il nostro mondo per energia\ne forme di vita."
          ultra_moon: "In antichissimi documenti si parla di lui come\ndella “creatura che si nutre di sole”."
        de:
          ultra_sun: "Öffnet es eine Ultrapforte, ebnet es mitunter\nfür fremde Energie und Lebewesen den Weg in\nunsere Welt."
          ultra_moon: "In Schriftstücken aus längst vergangenen\nZeiten wird es als „Sonnenverschlinger“\nbezeichnet."
        es:
          ultra_sun: "Es capaz de crear Ultraumbrales a través de los\ncuales formas de vida y energía procedentes de\notros mundos acuden al nuestro."
          ultra_moon: "Aparece en obras de la literatura antigua en las\nque se refieren a él como “la criatura que se\nnutre del sol”."
        ko:
          ultra_sun: "울트라홀을 연 결과\n다른 세계의 에너지나 생명을\n이 세계로 부르기도 한다."
          ultra_moon: "아득히 먼 옛날의 문헌에\n태양을 삼키는 짐승이라는\n이름으로 기록이 남아 있다."
        zh_simp:
          ultra_sun: "打开了究极之洞的结果是，\n把异世界的能量和生命召唤到\n这个世界的事也时有发生。"
          ultra_moon: "在遥远过去的文献里，\n以吞食太阳之兽为名留下了记录。"
        zh_trad:
          ultra_sun: "打開究極之洞的後果，\n是有可能把異世界的能量和生命\n召喚到這個世界來。"
          ultra_moon: "在遙遠過去的文獻中，\n留有牠是吞食太陽之獸\n的相關紀錄。"
