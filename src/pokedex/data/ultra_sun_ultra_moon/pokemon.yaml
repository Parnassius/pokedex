rattata:
  species_id: 19
  names:
    jp_kana: コラッタ
    jp_kanji: コラッタ
    en: Rattata
    fr: Rattata
    it: Rattata
    de: Rattfratz
    es: Rattata
    ko: 꼬렛
    zh_simp: 小拉达
    zh_trad: 小拉達
  forms:
    rattata:
      form_id: 0
      base_stats:
        hp: 30
        attack: 56
        defense: 35
        special_attack: 25
        special_defense: 35
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - run_away
        - guts
      hidden_ability: hustle
      descriptions:
        jp_kana:
          ultra_sun: "いっしょう　まえばが　のびつづける。\nあまりに　のびすぎると　エサが\nたべられなくなって　がし　する。"
          ultra_moon: "ありふれた　ポケモンだが　ちゅうい。\nするどい　まえばは　かたい\nざいもくさえ　かんたんに　へしおる。"
        jp_kanji:
          ultra_sun: "一生　前歯が　伸び続ける。\nあまりに　伸びすぎると　エサが\n食べられなくなって　餓死　する。"
          ultra_moon: "ありふれた　ポケモンだが　注意。\n鋭い　前歯は　堅い\n材木さえ　簡単に　へしおる。"
        en:
          ultra_sun: "Its incisors grow continuously throughout its life.\nIf its incisors get too long, this Pokémon\nbecomes unable to eat, and it starves to death."
          ultra_moon: "This Pokémon is common but hazardous. Its\nsharp incisors can easily cut right through\nhard wood."
        fr:
          ultra_sun: "Ses incisives poussent tout au long de sa vie.\nSi elles dépassent une certaine longueur,\nil ne peut plus s’alimenter et meurt de faim."
          ultra_moon: "Prenez garde à ce Pokémon très répandu :\nses puissantes incisives sont si acérées\nqu’elles peuvent couper des troncs d’arbre."
        it:
          ultra_sun: "I suoi incisivi continuano a crescere per tutta\nla vita. Se si allungano troppo, non riesce più\na nutrirsi e muore di fame."
          ultra_moon: "È un Pokémon molto comune con il quale è\nmeglio fare attenzione: con i suoi incisivi affilati\npuò tranciare anche un’asse di legno durissimo."
        de:
          ultra_sun: "Seine Nagezähne wachsen sein ganzes Leben\nüber. Werden sie allzu lang, kann es damit nicht\nmehr fressen und verhungert."
          ultra_moon: "Ein weitverbreitetes Pokémon, das nicht ganz\nungefährlich ist. Selbst hartes Holz zerkleinert\nes mit seinen scharfen Nagezähnen mühelos."
        es:
          ultra_sun: "Sus incisivos crecen durante toda su vida. Si\naumentan demasiado de tamaño, no puede\nalimentarse y muere de inanición."
          ultra_moon: "Un Pokémon muy extendido con el que conviene\ntener cuidado ya que sus afilados incisivos son\ncapaces de roer maderas nobles sin problema."
        ko:
          ultra_sun: "평생 앞니가 계속 자란다.\n너무 많이 자라면 먹이를\n먹을 수 없어 굶어 죽는다."
          ultra_moon: "흔한 포켓몬이지만 주의해야 한다.\n날카로운 앞니는 단단한 나무도\n간단하게 부러뜨린다."
        zh_simp:
          ultra_sun: "门牙会终生生长。\n但要是长得太长，\n就会因无法进食而饿死。"
          ultra_moon: "虽是常见的宝可梦，但也不能掉以轻心。\n锋利的门牙甚至连坚硬的\n木材都能轻易咬断。"
        zh_trad:
          ultra_sun: "門牙會終生生長，\n如果長得太長，\n就會因為無法進食而餓死。"
          ultra_moon: "雖然是常見的寶可夢，但還是要小心。\n銳利的門牙十分堅硬，\n就連木材也能輕易咬斷。"
    rattata_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 30
        attack: 56
        defense: 35
        special_attack: 25
        special_defense: 35
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - normal
      egg_groups:
        - field
      abilities:
        - gluttony
        - hustle
      hidden_ability: thick_fat
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          ultra_sun: "しんせんな　ものにしか　きょうみを\nしめさない。　かいものに　つれていくと\nしょくざいえらびの　とき　たすかる。"
          ultra_moon: "エサを　もとめて　よなよな　みんかに\nしのびこむ。　たいりょう　はっせいが\nしゃかい　もんだいと　なっている。"
        jp_kanji:
          ultra_sun: "新鮮な　ものにしか　興味を\n示さない。　買い物に　連れていくと\n食材選びの　とき　助かる。"
          ultra_moon: "エサを　求めて　夜な夜な　民家に\n忍び込む。　大量　発生が\n社会　問題と　なっている。"
        en:
          ultra_sun: "It shows no interest in anything that isn’t fresh.\nIf you take it shopping with you, it will help you\npick out ingredients."
          ultra_moon: "Night after night, they sneak into people’s\nhomes seeking food. A massive outbreak of\nthem has become an issue of public concern."
        fr:
          ultra_sun: "Ce Pokémon difficile n’aime que les produits\nextra-frais. Faites vos emplettes avec lui,\ncar son flair s’avérera très utile !"
          ultra_moon: "La nuit, il s’introduit dans les maisons pour\nfouiner à la recherche de nourriture.\nSa prolifération est devenue problématique."
        it:
          ultra_sun: "È interessato solo al cibo fresco e questo lo\nrende un aiutante prezioso nella scelta degli\ningredienti migliori quando si va a fare spesa."
          ultra_moon: "Di notte si intrufola nelle case in cerca di cibo.\nLa presenza massiccia di questi Pokémon\nè diventata un problema."
        de:
          ultra_sun: "Es zeigt nur an frischen Dingen Interesse. Nimmt\nman es mit zum Einkaufen, hilft es einem bei der\nAuswahl von Zutaten."
          ultra_moon: "Sie schleichen sich jede Nacht auf der Suche\nnach Futter in Wohnhäuser. Ihre massenhafte\nVerbreitung führt zu weitreichenden Problemen."
        es:
          ultra_sun: "Solo muestra interés por los productos más\nfrescos, lo que lo convierte en un valioso aliado\na la hora de hacer la compra."
          ultra_moon: "Por la noche se aventura en las casas en busca\nde comida. El elevado número de ejemplares se\nestá convirtiendo en un problema."
        ko:
          ultra_sun: "신선한 것에만 흥미를 보인다.\n장을 볼 때 데려가면\n식재료 고를 때 도움이 된다."
          ultra_moon: "먹이를 구하고자 밤마다 민가에\n숨어든다. 대량 발생이\n사회 문제가 되었다."
        zh_simp:
          ultra_sun: "只对新鲜的东西感兴趣。\n如果带它去买东西，\n在挑选食材时会很有帮助。"
          ultra_moon: "为了寻找食物，会在每天夜里\n潜入民宅。它的大量出现\n已经成为了社会问题。"
        zh_trad:
          ultra_sun: "只對新鮮的東西感興趣。\n如果帶著牠去買東西，\n在挑選食材時會很有幫助。"
          ultra_moon: "每天夜裡都會為了尋找食物\n而潛入人們家中。牠們的大量\n出現已經成了社會問題。"
raticate:
  species_id: 20
  names:
    jp_kana: ラッタ
    jp_kanji: ラッタ
    en: Raticate
    fr: Rattatac
    it: Raticate
    de: Rattikarl
    es: Raticate
    ko: 레트라
    zh_simp: 拉达
    zh_trad: 拉達
  forms:
    raticate:
      form_id: 0
      base_stats:
        hp: 55
