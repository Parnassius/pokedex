        - rock
        - water
      egg_groups:
        - water_1
        - water_3
      abilities:
        - swift_swim
        - battle_armor
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          ultra_sun: "りくでも　かつどう　できるよう\nからだが　へんかを　はじめていたが\nまにあわず　ぜつめつ　してしまった。"
          ultra_moon: "およそ　２９ノットで　およぐ。\nすばやく　えものに　ちかづくと\nカマで　きりさき　とどめを　さす。"
        jp_kanji:
          ultra_sun: "陸でも　活動　できるよう\n身体が　変化を　始めていたが\n間に合わず　絶滅　してしまった。"
          ultra_moon: "およそ　２９ノットで　泳ぐ。\n素早く　獲物に　近付くと\nカマで　切り裂き　止めを　刺す。"
        en:
          ultra_sun: "Its body had begun to change so it could\nfunction on land. But it didn’t adapt in time and\nwent extinct."
          ultra_moon: "It swims at speeds of roughly 29 knots, quickly\nclosing in on its prey and slashing into them\nwith its scythes to finish them off."
        fr:
          ultra_sun: "Son corps avait commencé à évoluer pour\ns’adapter à la vie sur la terre ferme, mais il était\ndéjà trop tard, et son espèce s’est éteinte."
          ultra_moon: "Capable d’atteindre une vitesse de 29 nœuds,\nil se rue sur ses proies pour les transpercer\nde ses lames."
        it:
          ultra_sun: "Questo Pokémon stava cominciando ad adattarsi\nalla vita sulla terraferma, ma si è estinto prima\ndella conclusione del processo."
          ultra_moon: "Nuota a una velocità di circa 29 nodi. Si avvicina\nrapidamente alla preda e le dà il colpo di grazia\ntagliandola con le falci."
        de:
          ultra_sun: "Dieses Pokémon hatte begonnen, sich an das\nLeben an Land anzupassen, starb aber aus,\nbevor es den Wandel vollziehen konnte."
          ultra_moon: "Mit einem Tempo von etwa 29 Knoten schwamm\nes zu seiner Beute und schlitzte sie mit seinen\nSicheln auf, bevor es ihr den Gnadenstoß gab."
        es:
          ultra_sun: "Empezó a desarrollar rasgos de adaptación a la\nvida en tierra firme, pero fue demasiado tarde\npara evitar la extinción de la especie."
          ultra_moon: "Nada a una velocidad de 29 nudos. Se abalanza\nsobre su presa y la desgarra con sus afiladas\npatas antes de asestar el golpe de gracia."
        ko:
          ultra_sun: "육지에서도 활동할 수 있도록\n신체가 변화하기 시작했지만\n때가 늦어서 멸종해 버렸다."
          ultra_moon: "약 29노트로 헤엄친다.\n재빠르게 먹이에 다가가\n낫으로 베어 갈라 마무리한다."
        zh_simp:
          ultra_sun: "为了在陆地上也能活动，\n身体开始了演化，\n但没等演化完，它就灭绝了。"
          ultra_moon: "能以大约２９节的速度游动。\n快速接近猎物后，会用镰刀\n撕裂猎物并给予其致命一击。"
        zh_trad:
          ultra_sun: "為了在陸地上也能活動，\n身體開始了演化，\n但還來不及演化完就絕種了。"
          ultra_moon: "能以大約２９節的速度游動。\n會迅速地接近獵物，然後用鐮刀\n撕裂對手給予致命一擊。"
