      descriptions:
        jp_kana:
          ultra_sun: "６ぴきで　１ぴき。　なにかあって\n１ぴき　へっても　よくあさに　なると\nかならず　６ぴきに　もどっている。"
          ultra_moon: "アローラさんの　タマタマは　おんなじ\nおおきさでも　かなり　おもたい。\nしっかり　なかみが　つまっているのだ。"
        jp_kanji:
          ultra_sun: "６匹で　１匹。　なにかあって\n１匹　減っても　翌朝に　なると\n必ず　６匹に　戻っている。"
          ultra_moon: "アローラ産の　タマタマは　同じ\n大きさでも　かなり　重たい。\nしっかり　中身が　詰まっているのだ。"
        en:
          ultra_sun: "Six of them form a single Pokémon. Should one\nof the six be lost, the next morning there will\nonce more be six."
          ultra_moon: "Although they are the same size as other\nExeggcute, the ones produced in Alola are quite\nheavy. Their shells are packed full."
        fr:
          ultra_sun: "Six pour le prix d’un ! Si par malheur l’un d’entre\neux disparaît, il est remplacé dès le lendemain\nmatin par une nouvelle recrue."
          ultra_moon: "Bien qu’ils fassent la même taille, les Noeunoeuf\nd’Alola sont plus lourds que ceux des autres\nrégions, car leur intérieur est bien plus dense."
        it:
          ultra_sun: "Ciascun Pokémon è formato da sei individui.\nAnche se dovesse sparirne uno per qualche\nmotivo, la mattina dopo sarebbero di nuovo sei."
          ultra_moon: "Gli Exeggcute che vivono ad Alola, pur essendo\ngrandi come quelli di altre regioni, sono più\npesanti per via dell’interno più denso."
        de:
          ultra_sun: "Dieses Pokémon besteht aus sechs Individuen.\nGeht eines verloren, sind es am nächsten\nMorgen trotzdem auf jeden Fall wieder sechs."
          ultra_moon: "Owei in Alola sind trotz gleicher Größe schwerer\nals ihre Artgenossen in anderen Regionen, da ihr\nInneres eine besonders hohe Dichte hat."
        es:
          ultra_sun: "Seis criaturas en una. Si Exeggcute pierde alguno\nde los huevos que lo componen, este volverá a\ncrecer a la mañana siguiente."
          ultra_moon: "Pese a tener el mismo tamaño, los Exeggcute de\nAlola son más pesados que los de otras\nregiones, ya que su interior es más denso."
        ko:
          ultra_sun: "6마리가 1마리다. 어쩌다\n1마리가 줄어도 다음날 아침이 되면\n다시 6마리로 돌아와 있다."
          ultra_moon: "알로라산 아라리는\n같은 크기라도 꽤 무겁다.\n내용물이 꽉 차 있다."
        zh_simp:
          ultra_sun: "６只加在一起算１只。\n即便出于某些原因少了１只，\n到了次日清晨也一定会变回６只。"
          ultra_moon: "即便大小相同，\n阿罗拉产的蛋蛋却很沉重。\n这是因为里面长得十分密实。"
        zh_trad:
          ultra_sun: "６隻合起來算是１隻。就算\n發生了什麼事導致少了１隻，\n隔天也一定會變回６隻。"
          ultra_moon: "即使大小相同，\n阿羅拉產的蛋蛋會特別重。\n這是因為牠裡面長得非常紮實。"
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
