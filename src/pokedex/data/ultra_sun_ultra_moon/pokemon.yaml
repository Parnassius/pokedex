      descriptions:
        jp_kana:
          ultra_sun: "アローラの　ペルシアンとは　ひたいの\nほうせきのいろが　ちがって　みえるが\nせいぶんは　あまり　かわらないのだ。"
          ultra_moon: "おかねもちに　にんきの　ポケモン。\nひたいの　ほうせきを　ねらって\nハンターたちに　ねらわれることも。"
        jp_kanji:
          ultra_sun: "アローラの　ペルシアンとは　額の\n宝石の色が　違って　見えるが\n成分は　あまり　変わらないのだ。"
          ultra_moon: "お金持ちに　人気の　ポケモン。\n額の　宝石を　狙って\nハンターたちに　狙われることも。"
        en:
          ultra_sun: "Although the jewel on its forehead appears to\nbe a different color than those of Alolan\nPersian, it’s mostly made of the same material."
          ultra_moon: "This Pokémon is popular with rich people.\nIt’s also targeted by hunters who are after\nthe jewel in its forehead."
        fr:
          ultra_sun: "Malgré une composition quasiment identique,\nsa gemme est d’une couleur différente de celle\ndu Persian d’Alola."
          ultra_moon: "Un Pokémon prisé des classes aisées.\nIl est néanmoins la cible des voleurs convoitant\nla gemme qui orne son front."
        it:
          ultra_sun: "La gemma che ha sulla fronte è di un colore\ndiverso da quella dei Persian di Alola, ma è\ncomposta praticamente dello stesso il materiale."
          ultra_moon: "È molto popolare tra le persone facoltose.\nA volte viene preso di mira dai cacciatori,\nattirati dalla gemma che ha sulla fronte."
        de:
          ultra_sun: "Das Juwel auf seiner Stirn hat eine andere Farbe\nals jenes von Snobilikat aus Alola, doch die\nZusammensetzung ist großteils gleich."
          ultra_moon: "Unter Wohlbetuchten ein besonders beliebtes\nPokémon. Räuberbanden haben es stets auf\ndas Juwel auf seiner Stirn abgesehen."
        es:
          ultra_sun: "La joya que luce en la frente presenta una\ncoloración distinta a la del Persian de Alola,\naunque la composición es casi idéntica."
          ultra_moon: "Un Pokémon de alto copete, objetivo primordial\nde ladrones que quieren apoderarse de la joya\nque luce en la frente."
        ko:
          ultra_sun: "알로라의 페르시온과는\n이마의 보석 색깔이 다르지만,\n성분은 크게 다르지 않다."
          ultra_moon: "부자들에게 인기가 많은 포켓몬이다.\n이마에 박힌 보석 때문에\n사냥꾼들이 노리는 경우도 있다."
        zh_simp:
          ultra_sun: "虽然额头上的宝石颜色\n和阿罗拉猫老大的不一样，\n但成分却没什么两样。"
          ultra_moon: "很受有钱人喜爱的宝可梦。\n有时会遭到那些打它额头\n宝石主意的猎人们袭击。"
        zh_trad:
          ultra_sun: "額頭上的寶石顏色看起來\n和阿羅拉的貓老大不一樣，\n但其實成分沒有什麼不同。"
          ultra_moon: "很受有錢人喜愛的寶可夢。\n有些獵人會為了額頭上的\n寶石而獵捕牠。"
    persian_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 65
        attack: 60
        defense: 60
        special_attack: 75
        special_defense: 65
