        - fighting
      egg_groups:
        - human_like
      abilities:
        - guts
        - no_guard
      hidden_ability: steadfast
      held_items:
        rare: focus_band
      descriptions:
        jp_kana:
          ultra_sun: "４ほんの　うでで　あいてを　とらえ\nふくざつな　かたちに　しめあげる。\nカイリキースペシャルと　ひとはよぶ。"
          ultra_moon: "４ほんの　うでで　せめも　まもりも\nどうじに　こなす。　このよの　すべての\nかくとうぎを　きわめている　という。"
        jp_kanji:
          ultra_sun: "４本の　腕で　相手を　捕らえ\n複雑な　形に　締め上げる。\nカイリキースペシャルと　人は呼ぶ。"
          ultra_moon: "４本の　腕で　攻めも　守りも\n同時に　こなす。　この世の　すべての\n格闘技を　極めている　という。"
        en:
          ultra_sun: "It grasps its opponents with its four arms and\ntwists them up in an intricate hold. People call\nit “the Machamp special.”"
          ultra_moon: "With four arms, it can attack and defend\nsimultaneously. It’s said to have mastered\nevery martial art in the world."
        fr:
          ultra_sun: "Il attrape son adversaire avec ses quatre mains\navant de le tordre de différentes façons.\nOn appelle cela le Massage Spécial Mackogneur."
          ultra_moon: "Ses quatre bras lui permettent d’attaquer et\nde se défendre en même temps. Il maîtriserait\ntous les arts martiaux existants."
        it:
          ultra_sun: "Afferra l’avversario con le sue quattro braccia\ne lo avvinghia in una stretta complicatissima\ncomunemente chiamata “morsa di Machamp”."
          ultra_moon: "Grazie alle sue quattro braccia può attaccare\ne difendersi allo stesso tempo. Si dice che sia\nesperto di tutte le arti marziali del mondo."
        de:
          ultra_sun: "Es ergreift seinen Gegner mit seinen vier Armen\nund hält ihn in einem komplizierten Würgegriff.\nMan nennt dies Machomeis Spezialgriff."
          ultra_moon: "Mithilfe seiner vier Arme kann es gleichzeitig\nangreifen und verteidigen. Man sagt, es\nbeherrsche alle Arten der Kampfkunst."
        es:
          ultra_sun: "Agarra a su rival con sus cuatro manos y lo\ninmoviliza con una llave imposible que se conoce\ncomo la Especial de Machamp."
          ultra_moon: "Sus cuatro brazos le permiten atacar y defender\nsimultáneamente. Se dice que domina todas las\nartes marciales habidas y por haber."
        ko:
          ultra_sun: "4개의 팔로 상대를 붙잡아\n복잡한 모양으로 세게 조른다.\n사람들은 괴력몬 스페셜이라고 부른다."
          ultra_moon: "4개의 팔로 공격도 방어도\n동시에 해낸다. 이 세상의 모든\n격투기를 통달했다고 한다."
        zh_simp:
          ultra_sun: "会用４只手臂捉住对手，\n并将其勒成一个复杂的形状。\n人称怪力式固定技。"
          ultra_moon: "４只手臂攻守兼备。\n据说它精通这世上所有的格斗技。"
        zh_trad:
          ultra_sun: "會用４隻手臂捉住對手，\n把對手扭成複雜的姿勢，\n人們稱呼這招為怪力特技。"
          ultra_moon: "４隻手臂能夠同時兼顧\n進攻與防守。據說牠精通\n這世上所有的格鬥技。"
