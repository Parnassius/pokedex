      abilities:
        - leaf_guard
      hidden_ability: contrary
      held_items:
        rare: miracle_seed
      descriptions:
        jp_kana:
          ultra_sun: "むしポケモンの　ふりを　するのは\nみを　まもるため。　りょううでの\nはなびらは　するどい　きれあじ。"
          ultra_moon: "まいを　まうように　てきを　きりさく。\nみやびな　すがた　から　もっとも\nあでやかな　くさポケモンと　よばれる。"
        jp_kanji:
          ultra_sun: "むしポケモンの　ふりを　するのは\n身を　守るため。　両腕の\n花びらは　鋭い　切れ味。"
          ultra_moon: "舞を　舞うように　敵を　切り裂く。\n雅な　姿　から　もっとも\n艶やかな　くさポケモンと　呼ばれる。"
        en:
          ultra_sun: "For self-protection, it pretends to be a bug\nPokémon. Both of its arms bear\nkeen-edged petals."
          ultra_moon: "As it slashes into its enemies, it looks like it’s\ndancing. Its elegant appearance has led some\nto call it the most glamorous Grass Pokémon."
        fr:
          ultra_sun: "C’est pour se protéger qu’il se fait passer pour\nun Pokémon Insecte. Les pétales de ses bras\nsont extrêmement coupants."
          ultra_moon: "Sa façon de trancher ses ennemis ressemble\nà une danse. Son élégance lui a valu le titre\nde « plus beau Pokémon Plante »."
        it:
          ultra_sun: "Cerca di farsi passare per Pokémon Coleottero\nper proteggersi. I petali delle sue braccia sono\nestremamente affilati."
          ultra_moon: "Trancia il nemico come se stesse danzando.\nIl suo aspetto elegante gli è valso la fama di\nessere il più affascinante Pokémon di tipo Erba."
        de:
          ultra_sun: "Es tarnt sich zu seinem eigenen Schutz als\nKäfer-Pokémon. Die Blütenblätter an seinen\nbeiden Armen sind scharfkantig."
          ultra_moon: "Es schlitzt Gegner mit tänzelnden Angriffen auf.\nDank seiner Eleganz wird es auch als das\nanmutigste aller Pflanzen-Pokémon bezeichnet."
        es:
          ultra_sun: "Se hace pasar por Pokémon de tipo Bicho como\nmecanismo de defensa. Los pétalos de sus\nbrazos tienen un filo muy agudo."
          ultra_moon: "Corta al rival con movimientos que recuerdan a\nuna danza. Su elegancia lo ha dado a conocer\ncomo el Pokémon de tipo Planta más fascinante."
        ko:
          ultra_sun: "벌레포켓몬인 척하는 것은\n몸을 지키기 위해서다. 양팔의\n꽃잎은 예리해서 잘 자른다."
          ultra_moon: "춤추듯 적을 베어 가른다.\n우아한 모습 때문에 가장\n아름다운 풀포켓몬이라 불린다."
        zh_simp:
          ultra_sun: "为了保护自己而伪装成虫宝可梦。\n双臂的花瓣非常锋利。"
          ultra_moon: "像跳舞一样将敌人劈开。\n因优雅的姿态理所当然地\n被称为最艳丽的草属性宝可梦。"
        zh_trad:
          ultra_sun: "之所以偽裝成蟲寶可夢\n是為了要保護自己。\n雙手的花瓣非常鋒利。"
          ultra_moon: "斬斷敵人的動作就像是跳舞一般。\n優雅的姿態使得牠被稱為\n最豔麗的草屬性寶可夢。"
