      descriptions:
        jp_kana:
          ultra_sun: "ちからくらべが　すきだが　やさしさも\nあわせもち　たたかった　あいてを\nねぎらうなど　れいぎを　おもんじる。"
          ultra_moon: "ふとって　おおきな　ハリテヤマが\nつよいとは　かぎらない。　こがらでも\nみがるで　わざに　たけたものもいる。"
        jp_kanji:
          ultra_sun: "力比べが　好きだが　優しさも\nあわせもち　戦った　相手を\nねぎらうなど　礼儀を　重んじる。"
          ultra_moon: "太って　大きな　ハリテヤマが\n強いとは　限らない。　小柄でも\n身軽で　技に　長けたものもいる。"
        en:
          ultra_sun: "Although they enjoy comparing their strength,\nthey’re also kind. They value etiquette, praising\nopponents they battle."
          ultra_moon: "Hariyama that are big and fat aren’t necessarily\nstrong. There are some small ones that move\nnimbly and use moves skillfully."
        fr:
          ultra_sun: "Bien qu’il aime les rapports de force, c’est aussi\nun cœur tendre qui sait respecter et féliciter\nses adversaires pour leur combativité."
          ultra_moon: "Les Hariyama les plus forts ne sont pas\nforcément les plus grands. Les petits gabarits\naussi ont plus d’un tour dans leur sac."
        it:
          ultra_sun: "Adora le gare di forza, ma dà anche molta\nimportanza alla gentilezza e alle buone maniere.\nPer questo ringrazia l’avversario dopo la lotta."
          ultra_moon: "Gli Hariyama non hanno bisogno di essere\ngrandi e grossi per essere forti. Quelli piccoli\nsono agili ed efficaci nell’eseguire le mosse."
        de:
          ultra_sun: "Es liebt das Kräftemessen, vergisst dabei aber\nnie die Etikette und bedankt sich nach dem\nKampf stets höflich bei seinem Gegner."
          ultra_moon: "Hariyama sind nicht nur stark, wenn sie groß\nund schwer sind. Auch kleine und leichte\nExemplare können Attacken effektiv einsetzen."
        es:
          ultra_sun: "Adora las competiciones de fuerza, pero el\nrespeto y la cortesía hacia sus adversarios\nson muy importantes para este noble Pokémon."
          ultra_moon: "No todos los Hariyama son grandotes, recios y\nfuertes. También los hay de menor tamaño pero\nmayor agilidad y precisión en los movimientos."
        ko:
          ultra_sun: "힘겨루기를 좋아하지만,\n선한 성품도 겸비하여 대결 상대를\n치하하는 등 예의를 중시한다."
          ultra_moon: "뚱뚱하고 큰 하리뭉이 다 강한 것은\n아니다. 작지만 몸이 가볍고\n기술이 뛰어난 하리뭉도 있다."
        zh_simp:
          ultra_sun: "虽然喜欢比试力气，\n但心地和善且注重礼仪，\n会慰劳自己的对战对手。"
          ultra_moon: "体型粗壮的铁掌力士未必强大。\n即便身型矮小，也有身轻如燕，\n擅长巧力的铁掌力士。"
        zh_trad:
          ultra_sun: "雖然喜歡和對手比力氣，\n但心地善良且注重禮儀，\n會慰勞與自己對戰的對手。"
          ultra_moon: "體型壯碩的鐵掌力士未必就很強。\n也有體型雖小，但身輕如燕\n且技巧高超的鐵掌力士存在。"
