      egg_groups:
        - undiscovered
      abilities:
        - rks_system
      descriptions:
        jp_kana:
          ultra_sun: "かくせいに　せいこう。　でんせつの\nポケモンの　ように　じぶんのタイプを\nへんかさせ　たたかうことが　できる。"
          ultra_moon: "ふういん　された　タイプチェンジの\nのうりょくを　かいほう。　わきあがる\nエネルギーで　ぎんいろに　かがやく。"
        jp_kanji:
          ultra_sun: "覚醒に　成功。　伝説の\nポケモンのように　自分のタイプを\n変化させ　戦うことが　できる。"
          ultra_moon: "封印　された　タイプチェンジの\n能力を　解放。　湧きあがる\nエネルギーで　銀色に　輝く。"
        en:
          ultra_sun: "Having been awakened successfully, it can\nchange its type and battle—just like a certain\nPokémon depicted in legends."
          ultra_moon: "Its capacity to change types unleashed, it\nshines silver due to the energy springing forth\nfrom within."
        fr:
          ultra_sun: "Il a réussi à réveiller tout son potentiel. Il peut\nchanger de type à volonté, comme un certain\nPokémon légendaire."
          ultra_moon: "Il a enfin libéré tout son pouvoir et peut changer\nde type à volonté. L’énergie qui afflue en lui le\nfait briller d’une lueur argentée."
        it:
          ultra_sun: "È riuscito a risvegliare il suo potere nascosto.\nPuò cambiare tipo per lottare al meglio, come un\naltro Pokémon di cui si narra nelle leggende."
          ultra_moon: "È riuscito a liberare il suo potere, grazie al quale\npuò cambiare tipo a piacimento. L’energia\nche emana lo fa brillare di una luce argentea."
        de:
          ultra_sun: "Durch sein Erwachen ist es nun in der Lage, wie\nein bestimmtes Legendäres Pokémon seinen Typ\nzu ändern."
          ultra_moon: "Seine zuvor versiegelte Fähigkeit, den Typ zu\nwechseln, wurde freigesetzt. Die Energie, die\nin ihm fließt, lässt es silbern schimmern."
        es:
          ultra_sun: "Tras despertar su verdadero potencial, puede\ncambiar de tipo a voluntad como cierto\nPokémon legendario."
          ultra_moon: "Su habilidad para cambiar de tipo ya no está\nsellada. La energía que emana le da un brillo\nplateado."
        ko:
          ultra_sun: "각성에 성공했다. 전설의\n포켓몬처럼 자신의 타입을\n변화시키며 싸울 수 있다."
          ultra_moon: "봉인되었던 타입 체인지의\n능력을 해방했다. 솟아나는\n에너지로 인해 은빛으로 빛난다."
        zh_simp:
          ultra_sun: "已成功觉醒。\n能像传说的宝可梦一样\n改变自己的属性来战斗。"
          ultra_moon: "封印着的改变属性的能力被解开了。\n涌出的能量使它闪着银色光辉。"
        zh_trad:
          ultra_sun: "已成功覺醒。\n能夠像傳說的寶可夢那樣\n改變自己的屬性來戰鬥。"
          ultra_moon: "被封印的改變屬性能力\n得到解放，湧現出的能量\n讓牠閃耀著銀色光輝。"
