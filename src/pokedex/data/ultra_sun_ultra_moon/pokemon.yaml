          ultra_moon: "ねてる　あいだに　ほっぺの　ふくろで\nでんきを　つくる。　ねぶそく　だと\nよわい　でんきしか　だせなくなるぞ。"
        jp_kanji:
          ultra_sun: "電気を　ため込む　性質。\nピカチュウが　群れて　暮らす　森は\n落雷が　絶えず　危険だ。"
          ultra_moon: "寝てる　間に　ほっぺの　袋で\n電気を　作る。　寝不足　だと\n弱い　電気しか　出せなくなるぞ。"
        en:
          ultra_sun: "Its nature is to store up electricity. Forests\nwhere nests of Pikachu live are dangerous,\nsince the trees are so often struck by lightning."
          ultra_moon: "While sleeping, it generates electricity in the\nsacs in its cheeks. If it’s not getting enough\nsleep, it will be able to use only weak electricity."
        fr:
          ultra_sun: "Son corps peut accumuler de l’électricité.\nLes forêts abritant des groupes de Pikachu\nsont d’ailleurs souvent frappées par la foudre."
          ultra_moon: "Quand il dort, il génère de l’électricité dans les\npoches de ses joues. S’il manque de sommeil,\nil ne peut plus émettre qu’un faible courant."
        it:
          ultra_sun: "Accumula naturalmente elettricità. I boschi\npopolati da gruppi di Pikachu sono pericolosi\nperché continuamente colpiti dai fulmini."
          ultra_moon: "Mentre dorme produce energia elettrica nelle\nsacche che ha sulle guance. Se non riposa\nabbastanza può emettere solo deboli scariche."
        de:
          ultra_sun: "Es liegt in seiner Natur, konstant Elektrizität zu\nspeichern. Die Wälder, in denen Pikachu leben,\nbergen stets die Gefahr eines Blitzgewitters."
          ultra_moon: "Seine Backentaschen laden sich elektrisch auf,\nwährend es schläft. Bei Schlafmangel kann es\nnur Schwachstrom entladen."
        es:
          ultra_sun: "Acumulan electricidad de forma natural. Los\nbosques donde habitan en grupos están en\npeligro constante de ser alcanzados por rayos."
          ultra_moon: "Mientras duerme, acumula electricidad en las\nbolsas de sus mejillas. Si no logra conciliar el\nsueño, solo puede emitir débiles descargas."
        ko:
          ultra_sun: "전기를 모으는 성질을 띠고 있다.\n피카츄가 무리 지어 사는 숲은\n낙뢰가 끊이지 않아 위험하다."
          ultra_moon: "자는 동안 볼의 주머니에서\n전기를 만든다. 잠이 부족하면\n약한 전기밖에 낼 수 없게 된다."
        zh_simp:
          ultra_sun: "有积存电力的特质。\n在皮卡丘群居的森林里\n会落雷不断，十分危险。"
          ultra_moon: "会在睡着时用脸颊上的袋子\n制造电力。如果睡眠不足，\n就只能放出微弱的电力。"
        zh_trad:
          ultra_sun: "擁有儲蓄電力的特性。\n皮卡丘群居的森林裡\n會不斷落雷，十分危險。"
          ultra_moon: "會在睡覺時用臉頰上的囊\n製造電力。如果睡眠不足，\n就只能放出微弱的電力。"
    pikachu_original_cap:
      form_id: 1
      names:
        jp_kana: オリジナルキャップ
        jp_kanji: オリジナルキャップ
        en: Original Cap
        fr: Casquette Originale
        it: Berretto Originale
        de: Original-Kappe
        es: Gorra Original
        ko: 오리지널캡
        zh_simp: 初始帽子
        zh_trad: 初始帽子
      base_stats:
        hp: 35
        attack: 55
        defense: 40
        special_attack: 50
        special_defense: 50
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
      egg_groups:
        - undiscovered
      abilities:
        - static
      hidden_ability: lightning_rod
      held_items:
        rare: light_ball
      descriptions:
        jp_kana:
          ultra_sun: "パートナーである　トレーナーの\nぼうしを　かぶった　ちょっと\nめずらしい　ピカチュウの　すがた。"
          ultra_moon: "あいぼうの　トレーナーの　ぼうしを\nかぶった　ピカチュウ。　サイズが\nあっておらず　すこし　ブカブカだ。"
        jp_kanji:
          ultra_sun: "パートナーである　トレーナーの\n帽子を　かぶった　ちょっと\n珍しい　ピカチュウの　姿。"
          ultra_moon: "相棒の　トレーナーの　帽子を\n被った　ピカチュウ。　サイズが\nあっておらず　少し　ブカブカだ。"
        en:
          ultra_sun: "This form of Pikachu is somewhat rare. It wears\nthe hat of its Trainer, who is also its partner."
          ultra_moon: "This Pikachu is wearing its Trainer’s cap. Since\nthe cap’s not the right size, the fit is a bit loose."
        fr:
          ultra_sun: "Ce Pikachu hors du commun ne se sépare pas\nde la casquette de son Dresseur, qu’il considère\ncomme son partenaire."
          ultra_moon: "Un Pikachu portant la casquette de son\nDresseur, qu’il considère comme son partenaire.\nElle est trop grande pour lui et glisse un peu."
        it:
          ultra_sun: "Un Pikachu fuori dal comune, con indosso\nil cappello del suo inseparabile Allenatore."
          ultra_moon: "Un Pikachu che indossa il cappello del suo\namato Allenatore. La taglia però non è quella\ngiusta e gli sta un po’ largo."
        de:
          ultra_sun: "Dieses Pikachu trägt die Kappe des Trainers,\nmit dem es sich zusammengeschlossen hat.\nEin Anblick, den man nicht alle Tage sieht!"
          ultra_moon: "Dieses Pikachu trägt die Kappe des Trainers,\nmit dem es sich zusammengeschlossen hat.\nSie ist ihm allerdings ein bisschen zu groß."
        es:
          ultra_sun: "Un Pikachu poco común que lleva puesta la\ngorra de su Entrenador."
          ultra_moon: "Un Pikachu que lleva puesta la gorra de su\nEntrenador, aunque le queda un poco grande."
        ko:
          ultra_sun: "파트너인 트레이너의\n모자를 쓴 조금\n특이한 피카츄의 모습이다."
          ultra_moon: "파트너인 트레이너의 모자를\n쓴 피카츄. 사이즈가\n맞지 않아 조금 헐렁하다."
        zh_simp:
          ultra_sun: "戴着同伴训练家的帽子，\n有点珍稀的皮卡丘的样子。"
          ultra_moon: "戴着搭档训练家帽子的皮卡丘。\n尺寸不太合适，有点空空荡荡的。"
        zh_trad:
          ultra_sun: "戴著同伴訓練家的帽子，\n樣子有點珍稀的皮卡丘。"
          ultra_moon: "戴著拍檔訓練家帽子的皮卡丘。\n因為尺寸不太合適，\n戴起來有點鬆垮垮的。"
