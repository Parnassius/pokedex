      descriptions:
        jp_kana:
          ultra_sun: "えものを　しとめて　とおぼえすると\nあちこちから　なかまが　しゅくふく\nする　きんぞくおんが　こだまする。"
          ultra_moon: "はがねの　ウロコを　まとう　こぶしを\nふるって　ゆうかんに　たたかう。\nじまんの　とくぎは　アッパーカット。"
        jp_kanji:
          ultra_sun: "獲物を　仕留めて　遠吠えすると\nあちこちから　仲間が　祝福する\n金属音が　こだまする。"
          ultra_moon: "鋼の　ウロコを　まとう　拳を\nふるって　勇敢に　戦う。\n自慢の　特技は　アッパーカット。"
        en:
          ultra_sun: "When it howls after finishing off its prey, the\nmetallic sounds of its celebrating comrades can\nbe heard from all around."
          ultra_moon: "It battles valiantly with its fists, which are\narmored in steel scales. Kommo-o specializes\nin uppercuts."
        fr:
          ultra_sun: "Quand il hurle pour fêter sa victoire sur une\nproie, on entend ses congénères se réjouir de\ntoutes parts dans un grand tintement métallique."
          ultra_moon: "Il se bat vaillamment avec ses poings couverts\nd’écailles d’acier. Il est particulièrement fier\nde l’impact de ses uppercuts."
        it:
          ultra_sun: "Quando cattura una preda, lancia un forte urlo.\nSentendolo, i suoi simili in ogni luogo esultano\nfacendo echeggiare un rumore metallico."
          ultra_moon: "Lotta con audacia agitando i pugni ricoperti da\nsquame d’acciaio. I montanti sono il suo forte."
        de:
          ultra_sun: "Hat es seine Beute erlegt, stößt es ein Heulen\naus, was von seinen Artgenossen nah und fern\nmit einem metallischen Rasseln gefeiert wird."
          ultra_moon: "Es kämpft wacker und lässt dabei seine Fäuste\nfliegen, die von metallenen Schuppen bedeckt\nsind. Seine Spezialität ist der Kinnhaken."
        es:
          ultra_sun: "Al atrapar a su presa, emite un rugido. Los de\nsu especie responden con un fragor metálico\npara felicitarle por la captura."
          ultra_moon: "Lucha valerosamente con sus puños recubiertos\nde escamas de acero. Tiene un gancho\nformidable."
        ko:
          ultra_sun: "먹이의 숨통을 끊고 포효하면\n여기저기에서 축하하는\n동료의 금속음이 메아리친다."
          ultra_moon: "강철의 비늘을 두른 주먹을\n휘두르며 용감하게 싸운다.\n자신 있는 특기는 어퍼컷이다."
        zh_simp:
          ultra_sun: "一招制住猎物，发出长嚎后，\n伙伴们祝福的金属音\n会从各个地方回荡起来。"
          ultra_moon: "挥动着裹满钢的鳞片的拳头，\n勇敢地战斗。\n引以为豪的特技是上勾拳。"
        zh_trad:
          ultra_sun: "當解決掉獵物後發出嚎叫時，\n四周各處會迴盪起夥伴們\n表示祝福之意的金屬聲。"
          ultra_moon: "揮舞包裹著鋼鐵鱗片的\n拳頭勇敢地戰鬥。\n上勾拳是牠引以為傲的特技。"
