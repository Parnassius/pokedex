      descriptions:
        jp_kana:
          ultra_sun: "クチバシの　せんたんを　そりかえらせ\n１００　いじょうの　なきごえを\nじゆうに　なきわけることが　できる。"
          ultra_moon: "たべた　きのみのタネを　くちから\nはっしゃ。　タネはだいちに　ちらばり\nあらたな　くさきが　うまれるのだ。"
        jp_kanji:
          ultra_sun: "クチバシの　先端を　反り返らせ\n１００　以上の　鳴き声を\n自由に　鳴きわけることが　できる。"
          ultra_moon: "食べた　きのみのタネを　口から\n発射。　タネは大地に　散らばり\n新たな　草木が　生まれるのだ。"
        en:
          ultra_sun: "It can bend the tip of its beak to produce over\na hundred different cries at will."
          ultra_moon: "From its mouth, it fires the seeds of berries\nit has eaten. The scattered seeds give rise\nto new plants."
        fr:
          ultra_sun: "Ce Pokémon est capable de produire plus\nde cent sons différents en recourbant le bout\nde son bec."
          ultra_moon: "Il crache violemment les noyaux des Baies\nqu’il a mangées. Ils s’éparpillent au sol\net donnent naissance à de nouvelles plantes."
        it:
          ultra_sun: "Mutando l’estremità del becco è in grado\ndi emettere più di 100 cinguettii differenti."
          ultra_moon: "Spara dal becco i semi delle bacche di cui\nsi nutre, da cui poi spuntano nuove piante."
        de:
          ultra_sun: "Indem es seine Schnabelspitze verformt, kann\nes mehr als 100 verschiedene Rufe ausstoßen."
          ultra_moon: "Es feuert mit seinem Schnabel Samen von\ngefressenen Beeren ab. Aus den Samen, die am\nBoden liegenbleiben, entstehen neue Pflanzen."
        es:
          ultra_sun: "Al torcer la punta del pico es capaz de emitir a\nsu antojo más de 100 graznidos diferentes."
          ultra_moon: "Dispara por el pico las semillas de las bayas\ningeridas. Al dispersarse por el suelo, de ellas\nacaban germinando nuevas plantas."
        ko:
          ultra_sun: "부리의 끝을 뒤로 젖혀\n100가지 이상의 울음소리를\n자유롭게 낼 수 있다."
          ultra_moon: "먹은 나무열매의 씨를 부리에서\n발사한다. 씨는 대지에 흩어져서\n새로운 풀과 나무가 자라난다."
        zh_simp:
          ultra_sun: "嘟起鸟嘴的嘴尖，\n可以自由地叫出１００种以上的声音。"
          ultra_moon: "会将吃掉的树果种子从\n口中射出。种子散落在大地上，\n新的草木便会生长出来。"
        zh_trad:
          ultra_sun: "只要噘起鳥嘴的前端，\n就能自在地發出\n１００種以上的叫聲。"
          ultra_moon: "會將吃掉的樹果種子從口中\n發射出去。散落在大地上的種子\n將孕育出新的草木。"
toucannon:
