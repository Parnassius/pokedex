      descriptions:
        jp_kana:
          ultra_sun: "ナマコブシなげ　という　ぶんかは\nうちあげられた　ナマコブシを　うみに\nなげかえす　しゅうかんが　はじまり。"
          ultra_moon: "ぜんしん　たいえきで　ヌルヌル。\nうっかり　ふむと　ころんでしまうし\nおこって　なぐってくるぞ。"
        jp_kanji:
          ultra_sun: "ナマコブシ投げ　という　文化は\n打ち上げられた　ナマコブシを　海に\n投げ返す　習慣が　始まり。"
          ultra_moon: "全身　体液で　ヌルヌル。\nうっかり　踏むと　転んでしまうし\n怒って　殴ってくるぞ。"
        en:
          ultra_sun: "The tradition known as Pyukumuku chucking\nstarted from the custom of throwing Pyukumuku\nback into the sea after they wash onshore."
          ultra_moon: "Its entire body is covered in its own slime. If you\naccidentally step on one, you’ll slip, and it will\nget mad and smack you!"
        fr:
          ultra_sun: "Lancer à la mer les Concombaffe venus\ns’échouer sur le rivage était une habitude qui\ns’est depuis muée en une véritable tradition."
          ultra_moon: "Tout son corps est recouvert d’un mucus gluant.\nVeillez à ne pas glisser dessus : il en profiterait\npour vous mettre une grosse claque !"
        it:
          ultra_sun: "L’abitudine di ributtare in mare gli esemplari\nspiaggiati ha dato origine a una vera e\npropria tradizione."
          ultra_moon: "Il suo intero corpo è ricoperto da un fluido\nvischioso. Chi lo calpesta scivola a terra e\nsi prende anche un pugno."
        de:
          ultra_sun: "Das heutzutage übliche Gufa-Schleudern ist\naus dem Brauch entstanden, angespülte Gufa\nwieder ins Meer zurückzuwerfen."
          ultra_moon: "Wer versehentlich auf seinen glitschigen Körper\ntritt, rutscht nicht nur aus, sondern handelt sich\nauch Gufas Ärger und Hiebe ein."
        es:
          ultra_sun: "La costumbre de lanzar de nuevo al agua los\nPyukumuku que han sido arrastrados hasta la\norilla se ha convertido en toda una tradición."
          ultra_moon: "Su cuerpo está recubierto de fluidos viscosos.\nSi alguien lo pisa, resbalará y Pyukumuku lo\ngolpeará furioso."
        ko:
          ultra_sun: "해무기던지기라는 문화는\n육지로 밀려온 해무기를 바다로 던져\n돌려보내는 습관에서 시작되었다."
          ultra_moon: "전신이 체액으로 미끈거린다.\n실수로 밟으면 넘어지고\n화를 내며 때리려 든다."
        zh_simp:
          ultra_sun: "扔拳海参的文化始于\n将冲上岸的拳海参扔回海里这个习俗。"
          ultra_moon: "全身因体液而滑溜溜的。\n如果不小心踩上去就会摔倒，\n而且还会被生气的它殴打。"
        zh_trad:
          ultra_sun: "扔拳海參的文化\n最早是始於將被沖上海岸的\n拳海參扔回海裡的習俗。"
          ultra_moon: "全身因體液而滑溜溜的。\n如果不小心踩到牠就會跌倒，\n然後被生氣的牠痛打。"
