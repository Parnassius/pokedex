        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - stakeout
        - strong_jaw
      hidden_ability: adaptability
      held_items:
        rare: pecha_berry
      descriptions:
        jp_kana:
          ultra_sun: "ながい　どうたいの　なかみは\nほとんど　いぶくろ。　おおぐいなので\nエサだいは　バカに　ならない。"
          ultra_moon: "なんでも　たべるが　しんせんで\nいきているものが　いいので　えものを\nさがして　みちを　ねりあるく。"
        jp_kanji:
          ultra_sun: "長い　胴体の　中身は\nほとんど　胃袋。　大食いなので\nエサ代は　バカに　ならない。"
          ultra_moon: "なんでも　食べるが　新鮮で\n生きているものが　いいので\n獲物を　探して　道を　練り歩く。"
        en:
          ultra_sun: "Its stomach takes up most of its long torso.\nIt’s a big eater, so the amount Trainers have to\nspend on its food is no laughing matter."
          ultra_moon: "Although it will eat anything, it prefers fresh\nliving things, so it marches down streets\nin search of prey."
        fr:
          ultra_sun: "Son estomac occupe la plus grande partie de\nson long corps. Le Dresseur de ce gros mangeur\ndoit prévoir un budget nourriture conséquent."
          ultra_moon: "Il mange de tout, mais aime particulièrement\nles proies fraîches, voire encore vives. Il erre\nsur les routes à leur recherche."
        it:
          ultra_sun: "Lo stomaco occupa la maggior parte del suo\nlungo corpo. È un gran mangione e mantenerlo\ncosta davvero un occhio della testa."
          ultra_moon: "Gli Yungoos mangiano di tutto ma preferiscono\ncibo fresco o prede vive. Si vedono spesso\nsfilare lungo le strade alla ricerca di cibo."
        de:
          ultra_sun: "Sein Magen füllt beinahe das gesamte Innere\nseines länglichen Körpers aus. Die bei diesem\nVielfraß anfallenden Futterkosten sind enorm."
          ultra_moon: "Es ist zwar ein Allesfresser, bevorzugt aber\nfrische oder lebendige Nahrung. Auf der Suche\nnach Beute marschiert es die Straßen entlang."
        es:
          ultra_sun: "El estómago le ocupa gran parte de su largo\ncuerpo. Alimentar a este auténtico tragaldabas\nno es moco de pavo, por el coste que conlleva."
          ultra_moon: "Pese a ser omnívoro, siente predilección por los\nalimentos frescos o incluso seres vivos. Por eso\nmarcha por los caminos en busca de presas."
        ko:
          ultra_sun: "긴 몸통은 거의 위장으로\n이루어져 있다. 대식가여서\n식비를 무시할 수 없다."
          ultra_moon: "무엇이든 먹지만 신선하고\n살아 있는 것을 좋아해서\n먹이를 찾아 길을 누비고 다닌다."
        zh_simp:
          ultra_sun: "长长的躯体里面基本都是胃。\n因为食量很大，伙食费不可小觑。"
          ultra_moon: "什么都吃，但喜欢吃新鲜的活物。\n所以会为了寻找猎物在路上四处游走。"
        zh_trad:
          ultra_sun: "長長的身體內部幾乎\n全被胃佔滿。因為食量很大，\n飼養牠的伙食費相當驚人。"
          ultra_moon: "雖然什麼都吃，但特別\n偏好活生生的新鮮食物，\n會為了尋找獵物而四處遊走。"
gumshoos:
  species_id: 735
  names:
    jp_kana: デカグース
    jp_kanji: デカグース
    en: Gumshoos
    fr: Argouste
    it: Gumshoos
    de: Manguspektor
    es: Gumshoos
    ko: 형사구스
    zh_simp: 猫鼬探长
    zh_trad: 貓鼬探長
  forms:
    gumshoos:
      form_id: 0
