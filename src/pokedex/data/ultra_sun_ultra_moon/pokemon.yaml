        jp_kana:
          ultra_sun: "さむさに　とても　よわい　ポケモン。\nおんだんな　アローラでは　とても\nいきいきした　すがたが　みられる。"
          ultra_moon: "とっても　おくびょうな　ポケモン。\nなかまと　いっしょに　リフレクターを\nはって　すを　まもって　いるのだ。"
        jp_kanji:
          ultra_sun: "寒さに　とても　弱い　ポケモン。\n温暖な　アローラでは　とても\n生き生きした　姿が　見られる。"
          ultra_moon: "とっても　臆病な　ポケモン。\n仲間と　一緒に　リフレクターを\n張って　巣を　守って　いるのだ。"
        en:
          ultra_sun: "This Pokémon is very sensitive to cold. In the\nwarmth of Alola, it appears quite lively."
          ultra_moon: "These very cowardly Pokémon join together and\nuse Reflect to protect their nest."
        fr:
          ultra_sun: "Ce Pokémon très sensible au froid semble\nrevivre lorsqu’il se trouve dans des régions\nchaudes comme Alola."
          ultra_moon: "Extrêmement timide, ce Pokémon défend le nid\nqu’il partage avec ses congénères en utilisant\nProtection."
        it:
          ultra_sun: "Nel clima temperato di Alola, questo Pokémon\nestremamente sensibile al freddo è arzillo\ne pieno di vita."
          ultra_moon: "È un Pokémon incredibilmente timido. Protegge\nil nido usando Riflesso assieme ai suoi simili."
        de:
          ultra_sun: "Dieses Pokémon reagiert sehr empfindlich auf\nKälte. Im warmen Klima Alolas strotzt es nur so\nvor Lebensfreude."
          ultra_moon: "Es ist ein sehr scheues Pokémon. Gemeinsam\nmit seinen Artgenossen nutzt es Reflektor, um\nsein Nest zu beschützen."
        es:
          ultra_sun: "Este Pokémon no soporta el frío. En Alola, sin\nembargo, se encuentra en su elemento y se lo\npuede ver revoloteando vivaracho por doquier."
          ultra_moon: "Un Pokémon bastante temeroso. Junto con sus\ncongéneres, protege su nido usando Reflejo."
        ko:
          ultra_sun: "추위에 매우 약한 포켓몬.\n온난한 알로라에서는 매우\n생기가 넘치는 모습을 볼 수 있다."
          ultra_moon: "매우 겁이 많은 포켓몬이다.\n동료와 함께 리플렉터를 펼쳐서\n보금자리를 지키고 있다."
        zh_simp:
          ultra_sun: "非常怕冷的宝可梦。\n在温暖的阿罗拉，\n可以看到它生气勃勃的样子。"
          ultra_moon: "非常胆小的宝可梦。\n会和伙伴一起张开反射壁来保护巢穴。"
        zh_trad:
          ultra_sun: "非常怕冷的寶可夢。\n在溫暖的阿羅拉可以看見\n牠生氣勃勃的樣子。"
          ultra_moon: "非常膽小的寶可夢。\n會和夥伴一起張開反射壁，\n藉此保護巢穴。"
ledian:
  species_id: 166
  names:
    jp_kana: レディアン
    jp_kanji: レディアン
    en: Ledian
    fr: Coxyclaque
    it: Ledian
    de: Ledian
    es: Ledian
    ko: 레디안
    zh_simp: 安瓢虫
    zh_trad: 安瓢蟲
  forms:
