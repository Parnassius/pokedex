      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - rock_head
      hidden_ability: sheer_force
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          ultra_sun: "そらをとぶ　とりポケモンを　みるたび\nうらやましくなって　ヘッドバッドで\nあたりのものを　こなごなに　くだく。"
          ultra_moon: "あたまを　つよく　うちつける　ことで\nしんかに　えいきょうする　さいぼうを\nしげきしている　というせつも　ある。"
        jp_kanji:
          ultra_sun: "空を飛ぶ　とりポケモンを　見るたび\n羨ましくなって　ヘッドバッドで\nあたりのものを　粉々に　砕く。"
          ultra_moon: "頭を　強く　打ちつける　ことで\n進化に　影響する　細胞を\n刺激している　という説も　ある。"
        en:
          ultra_sun: "Whenever it sees bird Pokémon flying through\nthe sky, it becomes envious and smashes its\nsurroundings to bits with headbutts."
          ultra_moon: "Some theories suggest that its behavior\nof forcefully bashing its head into things\nstimulates cells that affect its evolution."
        fr:
          ultra_sun: "Il est jaloux des Pokémon oiseaux. Dès qu’il en\nvoit un voler, il donne des coups de tête dans\ntous les sens et détruit tout sur son passage."
          ultra_moon: "Selon certaines théories, il donne des coups\nde tête pour stimuler les cellules qui lui\npermettent d’évoluer."
        it:
          ultra_sun: "Ogni volta che vede volare i Pokémon alati,\nviene preso dall’invidia e polverizza a testate\nqualunque cosa abbia a tiro."
          ultra_moon: "Secondo una teoria, le potenti testate che sferra\npermetterebbero di stimolare le cellule che\npresiedono all’evoluzione."
        de:
          ultra_sun: "Jedes Mal, wenn es ein Vogel-Pokémon am\nHimmel fliegen sieht, zerstört es vor Neid\nalles in seiner Umgebung mit Kopfstößen."
          ultra_moon: "Einer Theorie zufolge werden durch seine\nKopfstöße Zellen angeregt, die seine\nEntwicklung beeinflussen."
        es:
          ultra_sun: "Cada vez que ve volar a un Pokémon pájaro le\ncorroe la envidia por dentro y asesta cabezazos\na todo lo que le rodea hasta hacerlo añicos."
          ultra_moon: "Según una teoría, los fuertes cabezazos que\npropina estimulan las células implicadas en su\nevolución."
        ko:
          ultra_sun: "하늘을 나는 새포켓몬을 볼 때마다\n부러워서 머리로 주변에 있는 것을\n들이받아 산산조각으로 부숴 버린다."
          ultra_moon: "머리를 강하게 부딪쳐서\n진화에 영향을 주는 세포를\n자극하고 있다는 설도 있다."
        zh_simp:
          ultra_sun: "每次见到在空中飞行的鸟宝可梦，\n就会变得非常羡慕，\n而用头锤把周围的东西砸得粉碎。"
          ultra_moon: "也有说法，说它通过重重地\n敲打脑袋来刺激影响进化的细胞。"
        zh_trad:
          ultra_sun: "每當見到飛在天空上的鳥寶可夢，\n牠就會羨慕到用頭錘\n把周圍的東西砸得粉碎。"
          ultra_moon: "也有說法是，牠會藉由\n用力地撞擊頭部來刺激\n影響進化的細胞。"
shelgon:
