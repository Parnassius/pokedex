      descriptions:
        jp_kana:
          ultra_sun: "だんりょくの　ある　ボディーと\nキメこまやかな　けがわが　にんき。\nだきしめて　ねると　きもちいい。"
          ultra_moon: "おこると　おもいっきり　いきを\nすいこみ　どんどん　ふくらんでいく。\nなんと　２０ばいに　なることもある。"
        jp_kanji:
          ultra_sun: "弾力の　ある　ボディーと\nキメ細やかな　毛皮が　人気。\n抱きしめて　寝ると　気持ちいい。"
          ultra_moon: "怒ると　思いっきり　息を\n吸い込み　どんどん　膨らんでいく。\nなんと　２０倍に　なることもある。"
        en:
          ultra_sun: "Thanks to its bouncy body and fine fur,\nthis Pokémon is sought after. Holding one\nin your arms while you sleep feels great."
          ultra_moon: "When it gets angry, it inhales with all its might,\nand its body gradually inflates. Sometimes they\ncan grow 20 times larger!"
        fr:
          ultra_sun: "Il est célébré pour son corps élastique et son\npelage soyeux. Quel bonheur que de faire une\nsieste en serrant un Grodoudou contre soi !"
          ultra_moon: "Lorsqu’il se fâche, il se gonfle d’air et peut\natteindre jusqu’à vingt fois son volume normal."
        it:
          ultra_sun: "È molto amato per l’elasticità del suo corpo\ne la morbidezza della sua pelliccia. Dormire\nabbracciati a questo Pokémon è molto piacevole."
          ultra_moon: "Se si arrabbia, aspira quanta più aria possibile\ne si gonfia enormemente, fino ad aumentare la\nsua taglia anche di 20 volte."
        de:
          ultra_sun: "Dank seines elastischen Körpers und feinen\nFells ist es sehr beliebt. Es fühlt sich herrlich\nan, mit Knuddeluff in den Armen einzuschlafen."
          ultra_moon: "Ist es verärgert, atmet es möglichst viel Luft ein\nund bläst damit sein Volumen auf das bis zu\nZwanzigfache auf."
        es:
          ultra_sun: "Su cuerpo flexible y su pelaje suave y sedoso lo\nhacen muy popular. Muchos encuentran\nreconfortante dormir abrazándolo."
          ultra_moon: "Cuando se enfada, inhala con fuerza e hincha\nsu cuerpo hasta aumentar incluso 20 veces su\ntamaño normal."
        ko:
          ultra_sun: "탄력 있는 몸과\n세밀한 결의 모피가 인기다.\n껴안고 자면 기분 좋다."
          ultra_moon: "화가 나면 힘껏 숨을\n들이쉬어서 점점 부풀어 오른다.\n무려 20배로 커질 때도 있다."
        zh_simp:
          ultra_sun: "富有弹性的身体和细腻的\n毛皮很受人们的喜爱。\n抱着它睡会感觉很惬意。"
          ultra_moon: "生起气来就会死命地\n吸气让自己不断膨胀。\n有时甚至能胀大到原来的２０倍。"
        zh_trad:
          ultra_sun: "富有彈性的身體和\n細緻的毛皮深受人們喜愛。\n抱著牠睡覺是件很舒服的事。"
          ultra_moon: "生氣時會拼命吸氣，\n讓自己的身體不斷膨脹。\n有時甚至能脹大到原來的２０倍。"
zubat:
  species_id: 41
  names:
    jp_kana: ズバット
    jp_kanji: ズバット
