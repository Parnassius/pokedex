      egg_groups:
        - water_3
      abilities:
        - illuminate
        - natural_cure
      hidden_ability: analytic
      held_items:
        common: stardust
        rare: star_piece
      descriptions:
        jp_kana:
          ultra_sun: "かがやく　コアは　うみの　ほうせきと\nよばれる。　こうかな　アクセサリーに\nかえられ　かくれて　とりひきされる。"
          ultra_moon: "きかがくてきな　ボディを　かいてんし\nすいちゅうを　およぐ。　つねに　なぞの\nでんぱを　はっしんして　いるらしい。"
        jp_kanji:
          ultra_sun: "輝く　コアは　海の　宝石と\n呼ばれる。　高価な　アクセサリーに\n変えられ　隠れて　取引される。"
          ultra_moon: "幾何学的な　ボディを　回転し\n水中を　泳ぐ。　常に　謎の\n電波を　発信して　いるらしい。"
        en:
          ultra_sun: "Its sparkling core is called “the gem of the sea.”\nThis core can be made into high-priced\naccessories that are traded in secret."
          ultra_moon: "It rotates its geometrically shaped body to swim\nthrough the water. It always seems to be\nsending out mysterious radio waves."
        fr:
          ultra_sun: "On appelle son cœur lumineux « le joyau de la\nmer ». Les bijoux fabriqués à partir de celui-ci\nse vendent à prix d’or et en secret."
          ultra_moon: "Ce Pokémon fait tourner son corps géométrique\npour se déplacer dans l’eau. Il semblerait qu’il\némette continuellement des ondes mystérieuses."
        it:
          ultra_sun: "Con il suo nucleo brillante, chiamato\n“gemma del mare”, si producono preziosi\naccessori che vengono poi venduti di nascosto."
          ultra_moon: "Nuota ruotando il suo corpo geometrico.\nSembra che emetta costantemente dei\nmisteriosi segnali radio."
        de:
          ultra_sun: "Sein leuchtender Kern, das „Juwel des Meeres“,\nist so wertvoll, dass manche ihn zu Schmuck\nverarbeiten und unter der Hand verkaufen."
          ultra_moon: "Es rotiert seinen geometrischen Körper, um sich\nim Wasser fortzubewegen. Wie es scheint,\nsendet es immerzu mysteriöse Radiowellen aus."
        es:
          ultra_sun: "Su reluciente núcleo se conoce como la Gema\ndel Mar y con él se elaboran adornos por los\nque se pagan fortunas."
          ultra_moon: "Se desplaza por el agua haciendo girar su\ncuerpo geométrico. Parece que emite unas\nextrañas ondas electromagnéticas."
        ko:
          ultra_sun: "빛나는 코어는 바다의 보석이라고\n불린다. 고가의 액세서리로\n만들어져 은밀히 거래된다."
          ultra_moon: "기하학적인 몸을 회전시켜\n수중에서 헤엄친다. 항상 의문의\n전파를 발신하고 있다고 한다."
        zh_simp:
          ultra_sun: "发光的核心被称为海之宝石。\n有人将它变成昂贵的饰品，\n在暗地里偷偷地买卖。"
          ultra_moon: "能旋转几何图形一样的\n身体在水中游泳。\n好像一直在发射神秘的电波。"
        zh_trad:
          ultra_sun: "閃耀的核心被人們稱為海中寶石。\n有人把它變成昂貴的飾品，\n在暗地裡偷偷買賣。"
          ultra_moon: "會轉動像幾何圖形般的身體\n在水中游動。似乎一直在\n發射神秘的電波。"
mr_mime:
  species_id: 122
  names:
    jp_kana: バリヤード
    jp_kanji: バリヤード
    en: Mr. Mime
    fr: M. Mime
    it: Mr. Mime
    de: Pantimos
    es: Mr. Mime
    ko: 마임맨
    zh_simp: 魔墙人偶
    zh_trad: 魔牆人偶
  forms:
    mr_mime:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 65
        special_attack: 100
        special_defense: 120
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - psychic
        - fairy
      egg_groups:
        - human_like
      abilities:
        - soundproof
        - filter
      hidden_ability: technician
      descriptions:
        jp_kana:
          ultra_sun: "すばらしい　パントマイムの　うでまえ。\nみとれている　あいだに　いつのまにか\nほんとうに　かべが　できているのだ。"
          ultra_moon: "パントマイムで　みえない　かべを\nうみだす。　かんしんして　あげないと\nおうふくビンタで　おそってくるぞ。"
        jp_kanji:
          ultra_sun: "素晴らしい　パントマイムの　腕前。\n見とれている　間に　いつの間にか\n本当に　壁が　できているのだ。"
          ultra_moon: "パントマイムで　見えない　壁を\n生みだす。　感心して　あげないと\nおうふくビンタで　襲ってくるぞ。"
        en:
          ultra_sun: "Its pantomime skills are wonderful. You may\nbecome enraptured while watching it, but next\nthing you know, Mr. Mime has made a real wall."
          ultra_moon: "It creates invisible walls with its pantomiming.\nIf you don’t act impressed, it will attack you\nwith a double slap!"
        fr:
          ultra_sun: "Il est tellement doué pour l’art du mime qu’il est\ncapable de faire apparaître un vrai mur sous\nle regard médusé de son public."
          ultra_moon: "Grâce à ses talents de mime, il est capable de\nfaire apparaître de vrais murs. Applaudissez-le,\nau risque de recevoir une ou deux Torgnoles !"
        it:
          ultra_sun: "Con le sue eccezionali abilità di mimo incanta\ngli spettatori e, prima che se ne accorgano,\ncrea dei muri in tutto e per tutto reali."
          ultra_moon: "Crea pareti invisibili grazie alle sue doti da mimo.\nAttacca chiunque non mostri ammirazione\ncon una sonora Doppiasberla."
        de:
          ultra_sun: "Sein Können als Pantomime ist verblüffend. Vor\nlauter Bewunderung merkt man gar nicht, wie\nplötzlich eine echte Wand vor einem erscheint."
          ultra_moon: "Durch Pantomime lässt es unsichtbare Wände\nentstehen. Wer davon nicht beeindruckt ist,\nwird mit einem Duplexhieb bestraft."
        es:
          ultra_sun: "Su talento para el mimo es tal que resulta\ncautivador, y llega a crear muros de verdad sin\nque quien lo observa se dé cuenta."
          ultra_moon: "Crea muros invisibles con sus grandes dotes de\nmimo. Quien no se muestre impresionado recibirá\nun sonoro Doble Bofetón."
        ko:
          ultra_sun: "팬터마임 실력이 굉장하다.\n넋을 놓고 보다 보면\n어느새 진짜 벽이 나타난다."
          ultra_moon: "팬터마임으로 보이지 않는 벽을\n만들어 낸다. 감탄하지 않으면\n연속뺨치기로 공격해 온다."
        zh_simp:
          ultra_sun: "有着非凡的默剧表演实力。\n在你看入迷的时候，不知不觉间\n就会出现一面真正的墙壁。"
          ultra_moon: "能通过默剧生成一道看不见的墙壁。\n如果不赞美它的话，\n连环巴掌就会向你袭来。"
        zh_trad:
          ultra_sun: "實力出神入化的默劇高手。\n當人們看牠的表演看到入神時，\n不知不覺間眼前會出現真正的牆壁。"
          ultra_moon: "會用默劇製造出看不見的牆壁。\n如果不讚美牠的話，\n連環巴掌就會向你襲來。"
scyther:
