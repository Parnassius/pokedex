      descriptions:
        jp_kana:
          ultra_sun: "くった　えものの　ホネを　つかって\nきように　すを　つくる。　おおくの\nホネは　カラカラの　ものだ。"
          ultra_moon: "バルチャイの　ために　いつも　エサを\nさがしている。　よわった　ポケモンを\nみつけしだい　すまで　つれさるぞ。"
        jp_kanji:
          ultra_sun: "食った　獲物の　骨を　使って\n器用に　巣を　作る。\n多くの　骨は　カラカラの　ものだ。"
          ultra_moon: "バルチャイの　ために　いつも　エサを\n探している。　弱った　ポケモンを\n見つけ次第　巣まで　連れ去るぞ。"
        en:
          ultra_sun: "It skillfully arranges the bones of its prey to\nconstruct its nest. Most of the bones\nare Cubone."
          ultra_moon: "It’s always searching for food for Vullaby. When\nit finds a weak Pokémon, Mandibuzz swoops it\nright off to its nest."
        fr:
          ultra_sun: "Il utilise avec dextérité les ossements de\nses proies pour construire son nid. La plupart\nde ces os appartenaient à des Osselait."
          ultra_moon: "Il est toujours à la recherche de nourriture pour\nVostourno. Quand il trouve un Pokémon affaibli,\nil fond sur la proie et l’emporte dans son nid."
        it:
          ultra_sun: "Costruisce abilmente il nido usando le ossa\ndelle sue prede, soprattutto quelle di Cubone."
          ultra_moon: "È sempre in cerca di cibo per Vullaby. Appena\ntrova un Pokémon indebolito, lo trasporta subito\nal suo nido."
        de:
          ultra_sun: "Nachdem es seine Beute verspeist hat, baut es\naus deren Knochen mit viel Geschick sein Nest.\nDie meisten davon stammen von Tragosso."
          ultra_moon: "Für Skallyk geht es pausenlos auf Futtersuche.\nTrifft es auf ein geschwächtes Pokémon, bringt\nes dieses sogar bis zu seinem Nest."
        es:
          ultra_sun: "Utiliza con pericia los huesos de las presas que\ndevora para así construir un nido. La mayoría de\nlos huesos pertenecen a los Cubone."
          ultra_moon: "Busca sin cesar comida para alimentar a\nVullaby. Atrapa al instante a cualquier Pokémon\ndebilitado que aviste y lo lleva al nido."
        ko:
          ultra_sun: "먹은 먹이의 뼈를 사용해\n솜씨 좋게 둥지를 만든다.\n대부분의 뼈는 탕구리의 것이다."
          ultra_moon: "벌차이를 위해 언제나 먹이를\n찾고 있다. 약해진 포켓몬을\n발견하는 대로 둥지로 데려간다."
        zh_simp:
          ultra_sun: "会使用所吃猎物的骨头\n灵巧地做成自己的巢穴。\n大多数骨头都是卡拉卡拉的。"
          ultra_moon: "为了秃鹰丫头而一直寻找着食物。\n一旦找到体弱的宝可梦\n就会掳去自己的巢穴。"
        zh_trad:
          ultra_sun: "會利用吃掉獵物後剩下的骨頭\n靈巧地做成自己的巢穴。\n大部分的骨頭是來自卡拉卡拉。"
          ultra_moon: "為了禿鷹丫頭不斷尋找食物。\n只要發現衰弱的寶可夢，\n就會捉起來帶回巢穴去。"
