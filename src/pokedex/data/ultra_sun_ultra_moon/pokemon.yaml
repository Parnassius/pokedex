clamperl:
  species_id: 366
  names:
    jp_kana: パールル
    jp_kanji: パールル
    en: Clamperl
    fr: Coquiperl
    it: Clamperl
    de: Perlu
    es: Clamperl
    ko: 진주몽
    zh_simp: 珍珠贝
    zh_trad: 珍珠貝
  forms:
    clamperl:
      form_id: 0
      base_stats:
        hp: 35
        attack: 64
        defense: 85
        special_attack: 74
        special_defense: 55
        speed: 32
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - shell_armor
      hidden_ability: rattled
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          ultra_sun: "こうみえて　にくしょく。　２まいの\nカラで　えものを　がっちり　はさんで\nうごかなくなるまで　はなさない。"
          ultra_moon: "パールルの　しんじゅは　とても\nきちょう。　シェルダーの　しんじゅの\n１０ばいいじょう　かちが　あるとも。"
        jp_kanji:
          ultra_sun: "こう見えて　肉食。　２枚の\nカラで　獲物を　がっちり　挟んで\n動かなくなるまで　離さない。"
          ultra_moon: "パールルの　真珠は　とても\n貴重。　シェルダーの　真珠の\n１０倍以上　価値が　あるとも。"
        en:
          ultra_sun: "Despite its appearance, it’s carnivorous. It\nclamps down on its prey with both sides of its\nshell and doesn’t let go until they stop moving."
          ultra_moon: "Clamperl’s pearls are exceedingly precious.\nThey can be more than 10 times as costly\nas Shellder’s pearls."
        fr:
          ultra_sun: "Malgré les apparences, c’est un carnivore qui\nattrape sa proie avec sa coquille et l’immobilise\njusqu’à ce qu’elle ne se débatte plus."
          ultra_moon: "La perle de Coquiperl est tellement précieuse\nqu’elle peut valoir plus de dix fois la valeur\nde celle de Kokiyas."
        it:
          ultra_sun: "Nonostante le apparenze, è carnivoro. Intrappola\nla preda con la conchiglia bivalve e la tiene\nstretta finché non smette di muoversi."
          ultra_moon: "La perla di Clamperl è talmente preziosa da\nvalere fino a oltre dieci volte quella di Shellder."
        de:
          ultra_sun: "Dieses fleischfressende Pokémon klemmt seine\nBeute mit seiner Schale fest und lässt sie erst\nlos, wenn sie sich nicht mehr rührt."
          ultra_moon: "Seine Perle ist sehr kostbar. Es heißt, sie sei\nmindestens zehnmal so viel wert wie jene von\nMuschas."
        es:
          ultra_sun: "Este Pokémon, que no aparenta ser carnívoro,\natrapa a sus presas con ambas conchas y no\nlas suelta hasta que dejan de moverse."
          ultra_moon: "La perla que contiene vale un potosí. De hecho,\nsu precio puede llegar a ser incluso más de diez\nveces superior al de la perla de Shellder."
        ko:
          ultra_sun: "보기와는 다르게 육식이다.\n2개의 껍질로 먹이를 꽉 물고\n움직이지 않을 때까지 놓지 않는다."
          ultra_moon: "진주몽의 진주는 매우 귀하다.\n셀러의 진주의 10배 이상\n가치가 있다고도 한다."
        zh_simp:
          ultra_sun: "别看它长这样，它可是食肉的。\n用２片外壳牢牢夹住猎物，\n直到完全不动了才会放开。"
          ultra_moon: "珍珠贝的珍珠非常贵重。\n据说，其价值或许是\n大舌贝珍珠的１０倍以上。"
        zh_trad:
          ultra_sun: "別看牠長這樣，牠可是肉食性的。\n會用２片外殼牢牢夾住獵物，\n直到獵物完全不動了才會放開。"
          ultra_moon: "珍珠貝的珍珠非常貴重，\n據說價值是大舌貝\n所產珍珠的１０倍以上。"
huntail:
  species_id: 367
  names:
    jp_kana: ハンテール
    jp_kanji: ハンテール
    en: Huntail
    fr: Serpang
    it: Huntail
    de: Aalabyss
    es: Huntail
    ko: 헌테일
    zh_simp: 猎斑鱼
    zh_trad: 獵斑魚
  forms:
    huntail:
      form_id: 0
      base_stats:
        hp: 55
        attack: 104
        defense: 105
        special_attack: 94
        special_defense: 75
        speed: 52
      evs_yield:
        hp: 0
        attack: 1
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
      abilities:
        - swift_swim
      hidden_ability: water_veil
      held_items:
