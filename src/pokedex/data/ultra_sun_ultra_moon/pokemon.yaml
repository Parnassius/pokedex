      descriptions:
        jp_kana:
          ultra_sun: "なかまたちとの　トレーニングで\nじしんと　きんにくが　ついたら\nマクノシタに　しょうぶを　いどむ。"
          ultra_moon: "えいようかの　たかい　エサをこのむ。\nこうりつよく　きんにくを　つけるため\nほんのうが　もとめて　いるのだ。"
        jp_kanji:
          ultra_sun: "仲間たちとの　トレーニングで\n自信と　筋肉が　ついたら\nマクノシタに　勝負を　挑む。"
          ultra_moon: "栄養価の　高い　エサを好む。\n効率よく　筋肉を　つけるため\n本能が　求めて　いるのだ。"
        en:
          ultra_sun: "Once this Pokémon has gained enough\nconfidence and muscle from training with its\nfriends, it challenges Makuhita to a battle."
          ultra_moon: "It likes food that’s highly nutritious because its\ninstincts drive it to build muscle efficiently."
        fr:
          ultra_sun: "Il s’entraîne avec ses amis pour accroître sa\nmasse musculaire et gagner en confiance.\nUne fois prêt, il ira défier un Makuhita."
          ultra_moon: "Il aime les aliments très nutritifs. Il les choisit\ninstinctivement pour développer sa musculature\naussi efficacement que possible."
        it:
          ultra_sun: "Si allena assieme ai suoi simili per sviluppare\ni muscoli e acquisire sicurezza. Quando si sente\npronto, sfida Makuhita."
          ultra_moon: "L’istinto lo spinge a preferire cibi ricchi\ndi nutrienti, in modo da poter sviluppare\ni muscoli nel modo più efficiente."
        de:
          ultra_sun: "Wenn es im Training mit seinen Kameraden genug\nSelbstvertrauen und Muskeln aufgebaut hat,\nfordert es Makuhita zu einem Kampf heraus."
          ultra_moon: "Es liebt Futter mit besonders hohem Nährwert.\nDieses Instinktverhalten dient einem möglichst\neffektiven Muskelaufbau."
        es:
          ultra_sun: "Entrena con sus congéneres para potenciar su\nmusculatura y confianza en sí mismo y, llegado\nel momento, reta en combate a los Makuhita."
          ultra_moon: "Prefiere los alimentos con gran valor nutritivo.\nLos escoge instintivamente para desarrollar de\nforma eficaz los músculos."
        ko:
          ultra_sun: "동료들과의 트레이닝으로\n자신감과 근육이 생기면\n마크탕에게 대결을 신청한다."
          ultra_moon: "영양가 높은 먹이를 좋아한다.\n효율적으로 근육을 키우기 위해\n본능적으로 원하고 있는 것이다."
        zh_simp:
          ultra_sun: "在和伙伴们的锻炼中\n获得了自信和肌肉后，\n就会去向幕下力士挑战。"
          ultra_moon: "喜食营养价值高的食物。\n为了能有效地增长肌肉，\n它发自本能地追求着这些食物。"
        zh_trad:
          ultra_sun: "藉由與夥伴的鍛鍊\n獲得了自信與肌肉之後，\n就會向幕下力士挑戰。"
          ultra_moon: "喜歡營養價值高的食物。\n之所以如此是受到本能驅使，\n為的是讓肌肉增長得更有效率。"
machoke:
  species_id: 67
  names:
    jp_kana: ゴーリキー
    jp_kanji: ゴーリキー
    en: Machoke
    fr: Machopeur
    it: Machoke
