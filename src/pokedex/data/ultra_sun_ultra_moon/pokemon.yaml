      types:
        - fire
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - shell_armor
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          ultra_sun: "かざんに　すみ　いおうや　こうぶつを\nくっている。　くったエサの　せいぶんが\nばくはつする　こうらの　もとに　なる。"
          ultra_moon: "ばくはつする　こうらは　やっかいだが\nしっけに　よわい。　あめの　ひは\nどうくつのおくで　じっと　している。"
        jp_kanji:
          ultra_sun: "火山に　棲み　硫黄や　鉱物を\n食っている。　食ったエサの　成分が\n爆発する　甲羅の　元に　なる。"
          ultra_moon: "爆発する　甲羅は　厄介だが\n湿気に　弱い。　雨の　日は\n洞窟の奥で　じっと　している。"
        en:
          ultra_sun: "It lives in volcanoes and eats sulfur and other\nminerals. Materials from the food it eats form\nthe basis of its explosive shell."
          ultra_moon: "Its exploding shell poses a real danger but\nis sensitive to moisture. On rainy days,\nTurtonator takes silent refuge in caves."
        fr:
          ultra_sun: "Il vit dans les volcans et se nourrit de soufre\net de minéraux. Les composants de ses repas\nrenforcent sa carapace explosive."
          ultra_moon: "Sa carapace explosive est très dangereuse,\nmais elle est sensible à l’humidité. Il se cache\ndonc au fond de sa grotte les jours de pluie."
        it:
          ultra_sun: "Vive nei vulcani e si nutre di zolfo e minerali,\nche rendono il suo carapace esplosivo."
          ultra_moon: "Il suo pericoloso carapace esplosivo è messo\nfuori uso dall’umidità. Nei giorni di pioggia\nsi rifugia all’interno delle grotte."
        de:
          ultra_sun: "Es lebt an Vulkanen, wo es sich von Schwefel\nund Mineralien ernährt. Durch diese Bestandteile\nwird sein Rückenpanzer explosiv."
          ultra_moon: "Sein explosiver Rückenpanzer ist gefährlich,\nverträgt aber keine Feuchtigkeit. Bei Regen\nzieht es sich deshalb tief in eine Höhle zurück."
        es:
          ultra_sun: "Vive en los volcanes y se alimenta de azufre y\nminerales. Los componentes que ingiere le\nsirven para formar su caparazón explosivo."
          ultra_moon: "Su caparazón explosivo es un verdadero peligro,\npero no aguanta bien la humedad. Los días de\nlluvia, este Pokémon se refugia en una cueva."
        ko:
          ultra_sun: "화산에 살며 황이나 광물을\n먹는다. 먹은 먹이의 성분이\n폭발하는 등껍질의 바탕이 된다."
          ultra_moon: "폭발하는 등껍질은 성가시게도\n습기에 약하다. 비가 내리는 날에는\n동굴 깊은 곳에서 가만히 있다."
        zh_simp:
          ultra_sun: "栖息在火山，吃硫磺和矿物。\n所吃食物的成分会成为\n爆炸的甲壳的来源。"
          ultra_moon: "爆炸的甲壳是个麻烦，\n但却很怕湿气。下雨天会一直\n静静地呆在洞窟深处。"
        zh_trad:
          ultra_sun: "棲息在火山，吃硫磺和礦物為生。\n吃下的食物中所含的成分\n形成了牠那會爆炸的甲殼。"
          ultra_moon: "會爆炸的甲殼雖然危險\n但很怕濕氣。下雨天會\n靜靜地待在洞窟深處。"
