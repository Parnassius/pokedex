leafeon:
  species_id: 470
  names:
    jp_kana: リーフィア
    jp_kanji: リーフィア
    en: Leafeon
    fr: Phyllali
    it: Leafeon
    de: Folipurba
    es: Leafeon
    ko: 리피아
    zh_simp: 叶伊布
    zh_trad: 葉伊布
  forms:
    leafeon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 110
        defense: 130
        special_attack: 60
