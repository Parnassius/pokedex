      descriptions:
        jp_kana:
          ultra_sun: "ハサミは　ときどき　もげることもあり\nさいせいするまでは　コソコソくらす。\nハサミのなかみは　とてもおいしいよ。"
          ultra_moon: "みぎの　ハサミから　みずを　ふきだし\nいどう。　バランスが　わるいので\nまっすぐ　およぐのは　へたくそ。"
        jp_kanji:
          ultra_sun: "ハサミは　時々　もげることもあり\n再生するまでは　コソコソ暮らす。\nハサミの中身は　とても美味しいよ。"
          ultra_moon: "右の　ハサミから　水を　噴き出し\n移動。　バランスが　悪いので\nまっすぐ　泳ぐのは　下手くそ。"
        en:
          ultra_sun: "Its claws occasionally fall off, and it keeps a low\nprofile until they grow back. The meat of its\nclaws is so delicious!"
          ultra_moon: "It moves around by jetting water from its right\npincer. It has a poor sense of balance, so it’s\nterrible at swimming straight."
        fr:
          ultra_sun: "Sa pince, à la chair délicieuse, tombe parfois.\nIl se fait alors tout petit et se cache le temps\nqu’elle repousse."
          ultra_moon: "Il se déplace en propulsant de l’eau par sa pince\ndroite. Il n’est cependant pas très agile et est\nincapable de nager droit."
        it:
          ultra_sun: "Se capita che gli si stacchi una chela, resta\nnascosto finché non ricresce. La polpa delle sue\nchele è una vera prelibatezza."
          ultra_moon: "Si sposta spruzzando acqua dalla chela destra.\nHa un pessimo equilibrio e non riesce a nuotare\nseguendo una traiettoria dritta."
        de:
          ultra_sun: "Manchmal verliert es seine Scheren. Danach lebt\nes in Zurückgezogenheit, bis sie nachwachsen.\nDas Fleisch im Inneren der Scheren ist köstlich."
          ultra_moon: "Das Ungleichgewicht, das entsteht, wenn es zur\nFortbewegung Wasser aus der rechten Schere\nspritzt, hindert es daran, gerade zu schwimmen."
        es:
          ultra_sun: "En alguna que otra ocasión se le cae la pinza,\ny hasta que le crece de nuevo vive aislado. La\ncarne del interior de las pinzas es deliciosa."
          ultra_moon: "Para moverse, expulsa chorros de agua por su\npinza derecha. Tiene muy mal equilibrio, por lo\nque es incapaz de nadar en línea recta."
        ko:
          ultra_sun: "가끔 집게가 떨어지면\n재생할 때까지 몰래 숨어 다닌다.\n집게 속살은 매우 맛있다."
          ultra_moon: "오른쪽 집게에서 물을 뿜어내서\n이동한다. 밸런스가 나빠서\n똑바로 헤엄치는 것에 몹시 서툴다."
        zh_simp:
          ultra_sun: "钳子时常会掉落，\n在再生之前，会悄悄地生活。\n钳子里面的肉非常美味哦。"
          ultra_moon: "从右侧的钳子里喷出水来移动。\n因为平衡性很差，\n所以不擅长直线游泳。"
        zh_trad:
          ultra_sun: "鉗子時常會脫落，\n在重新長出前會偷偷摸摸地生活。\n鉗子裡面的肉非常美味。"
          ultra_moon: "從右邊的鉗子噴出水來移動。\n因為無法取得平衡，\n所以不擅長直線游動。"
clawitzer:
  species_id: 693
  names:
