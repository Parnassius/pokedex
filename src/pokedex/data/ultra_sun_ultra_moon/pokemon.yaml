      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - oblivious
      hidden_ability: sweet_veil
      held_items:
        rare: grassy_seed
      descriptions:
        jp_kana:
          ultra_sun: "かたいヘタで　まもられているので\nとりポケモンとも　へいきで　あそぶ。\nつつかれまくるが　きに　していない。"
          ultra_moon: "とびはねるように　うごきまわり\nあたまの　ヘタを　ふりまわす。\nぶつけられると　かなり　いたいぞ。"
        jp_kanji:
          ultra_sun: "硬いヘタで　守られているので\nとりポケモンとも　平気で　遊ぶ。\n突かれまくるが　気に　していない。"
          ultra_moon: "飛び跳ねるように　動きまわり\n頭の　ヘタを　振りまわす。\nぶつけられると　かなり　痛いぞ。"
        en:
          ultra_sun: "It’s protected by its hard sepals, so it plays\nwith bird Pokémon without worry. They peck it\nrelentlessly, but it doesn’t care."
          ultra_moon: "It bounces around, swinging the sepals on its\nhead with abandon. They’re quite painful when\nthey smack you!"
        fr:
          ultra_sun: "Confiant en la protection offerte par son solide\ncalice, il n’hésite pas à jouer avec les Pokémon\noiseaux. Il se fait picorer, mais il s’en moque."
          ultra_moon: "Sa démarche sautillante fait balancer le calice\nqui se dresse sur sa tête. Recevoir un coup\nde sépale est très douloureux !"
        it:
          ultra_sun: "Gioca tranquillamente anche con i Pokémon alati\nperché si sente protetto dalle sue rigide foglie.\nNon sembra preoccuparsi delle loro beccate."
          ultra_moon: "Se ne va in giro saltellando e agitando le foglie\nche ha sulla testa. Andare a sbattere contro\nuno Steenee può essere molto doloroso."
        de:
          ultra_sun: "Es kann bedenkenlos mit Vogel-Pokémon\nspielen, da sein fester Blütenkelch es schützt.\nDas pausenlose Gepicke ist ihm einerlei."
          ultra_moon: "Es bewegt sich hüpfend umher und schüttelt\ndabei den Blütenkelch auf seinem Kopf. Ein\nZusammenprall mit ihm ist ziemlich schmerzhaft."
        es:
          ultra_sun: "Puede jugar con Pokémon pájaro sin peligro\ngracias al duro cáliz que protege su cuerpo.\nNo le importa que lo picoteen."
          ultra_moon: "Se desplaza dando saltos que hacen botar el\ncáliz de su cabeza. Recibir un golpe de sus\nsépalos duele bastante."
        ko:
          ultra_sun: "딱딱한 꼭지로 보호되기 때문에\n새포켓몬과도 문제없이 논다.\n쪼여도 신경 쓰지 않는다."
          ultra_moon: "뛰어오르듯 돌아다니면서\n머리의 꼭지를 휘두른다.\n부딪히면 상당히 아프다."
        zh_simp:
          ultra_sun: "因为被坚硬的壳盖保护着，\n所以和鸟宝可梦都能淡定地玩耍。\n就算反复被啄也不会在意。"
          ultra_moon: "蹦蹦跳跳地四处行动，\n挥舞着头部的壳盖。\n如果被撞到了会非常疼。"
        zh_trad:
          ultra_sun: "因為被堅硬的果蒂保護著，\n所以跟鳥寶可夢也能安心玩耍。\n雖然不停被啄，但牠毫不在意。"
          ultra_moon: "蹦蹦跳跳地四處活動，\n同時揮舞頭上的果蒂。\n如果被打到會很痛。"
tsareena:
  species_id: 763
  names:
    jp_kana: アマージョ
    jp_kanji: アマージョ
    en: Tsareena
    fr: Sucreine
    it: Tsareena
    de: Fruyal
    es: Tsareena
    ko: 달코퀸
    zh_simp: 甜冷美后
    zh_trad: 甜冷美后
  forms:
    tsareena:
      form_id: 0
      base_stats:
        hp: 72
        attack: 120
        defense: 98
        special_attack: 50
        special_defense: 98
        speed: 72
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
