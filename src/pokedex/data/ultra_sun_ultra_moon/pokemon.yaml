        jp_kana:
          ultra_sun: "かざんの　ふんか　から　にげるうちに\nゆきやまに　うつりすんだ。　こおりの\nこうらは　はがねなみの　かたさ。"
          ultra_moon: "せなかの　ひふは　はがねの　かたさ。\nやわらかい　おなかを　ねらわれるので\nひっしに　じめんに　しがみつく。"
        jp_kanji:
          ultra_sun: "火山の　噴火から　逃げるうちに\n雪山に　移り棲んだ。　氷の\n甲羅は　鋼並みの　硬さ。"
          ultra_moon: "背中の　皮膚は　鋼の　硬さ。\n柔らかい　おなかを　狙われるので\n必死に　地面に　しがみつく。"
        en:
          ultra_sun: "After fleeing a volcanic eruption, it ended up\nmoving to an area of snowy mountains. Its ice\nshell is as hard as steel."
          ultra_moon: "The skin on its back is as hard as steel.\nPredators go after its soft belly, so it clings to\nthe ground desperately."
        fr:
          ultra_sun: "Il a migré dans les montagnes enneigées\npour échapper aux éruptions volcaniques.\nSa carapace de glace est dure comme l’acier."
          ultra_moon: "La peau de son dos est dure comme l’acier.\nPour protéger son petit ventre mou, qui est son\npoint faible, il se colle le plus possible au sol."
        it:
          ultra_sun: "È migrato sulle montagne innevate per sfuggire\nalle eruzioni dei vulcani. La sua corazza di\nghiaccio ha la durezza dell’acciaio."
          ultra_moon: "La pelle rinforzata della schiena è dura come\nl’acciaio. Per proteggere il ventre molle,\nsi avvinghia al terreno con tutte le forze."
        de:
          ultra_sun: "Um sich vor Vulkanausbrüchen zu schützen,\nfloh es in verschneites Gebirge. Sein Eispanzer\nist hart wie Stahl."
          ultra_moon: "Sein Rücken ist hart wie Stahl. Gegner haben es\nauf seine weiche Bauchgegend abgesehen,\nweshalb es sich hartnäckig am Boden festkrallt."
        es:
          ultra_sun: "Cambió su hábitat a las montañas nevadas tras\nhuir de una erupción volcánica. Su caparazón\nde hielo posee la dureza del acero."
          ultra_moon: "La piel de su espalda es dura como el acero.\nPara protegerse la tripa, que es blanda, se\naferra al suelo con todas sus fuerzas."
        ko:
          ultra_sun: "화산 분화로부터 도망가다\n설산으로 옮겨 살게 되었다.\n얼음 껍질은 강철처럼 단단하다."
          ultra_moon: "등의 피부는 강철처럼 단단하다.\n부드러운 배가 약점이기 때문에\n필사적으로 땅에 달라붙는다."
        zh_simp:
          ultra_sun: "在逃离火山喷发的途中\n移居到了雪山上。\n冰甲壳硬如钢铁。"
          ultra_moon: "背上的皮肤硬如钢铁。\n因为柔软的肚子会成为攻击目标，\n所以它会死命地趴在地上。"
        zh_trad:
          ultra_sun: "在逃離火山爆發的過程中\n移居到了雪山上。冰之甲殼\n有著不遜於鋼鐵的硬度。"
          ultra_moon: "背上的皮膚硬如鋼鐵。\n因為柔軟的肚子會成為攻擊目標，\n所以牠會死命地趴在地上。"
sandslash:
  species_id: 28
  names:
    jp_kana: サンドパン
    jp_kanji: サンドパン
    en: Sandslash
    fr: Sablaireau
    it: Sandslash
    de: Sandamer
    es: Sandslash
    ko: 고지
    zh_simp: 穿山王
    zh_trad: 穿山王
  forms:
    sandslash:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 110
        special_attack: 45
        special_defense: 55
        speed: 65
      evs_yield:
        hp: 0
