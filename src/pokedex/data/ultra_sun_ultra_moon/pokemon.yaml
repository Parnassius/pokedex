carvanha:
  species_id: 318
  names:
    jp_kana: キバニア
    jp_kanji: キバニア
    en: Carvanha
    fr: Carvanha
    it: Carvanha
    de: Kanivanha
    es: Carvanha
    ko: 샤프니아
    zh_simp: 利牙鱼
    zh_trad: 利牙魚
  forms:
    carvanha:
      form_id: 0
      base_stats:
        hp: 45
        attack: 90
        defense: 20
        special_attack: 65
        special_defense: 20
        speed: 65
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
      abilities:
        - rough_skin
      hidden_ability: speed_boost
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          ultra_sun: "おくびょうで　１ぴきでは　かりも\nしない。　５ひき　くらい　あつまると\nきゅうに　きょうぼうに　なるぞ。"
          ultra_moon: "じょうぶなアゴと　キバは　もくぞうの\nふね　なら　かんたんに　かみくだく。\nエサをめぐり　バスラオと　あらそう。"
        jp_kanji:
          ultra_sun: "臆病で　１匹では　狩りも\nしない。　５匹　くらい　集まると\n急に　凶暴に　なるぞ。"
          ultra_moon: "丈夫なアゴと　キバは　木造の\n船　なら　簡単に　噛み砕く。\nエサを巡り　バスラオと　争う。"
        en:
          ultra_sun: "They’re such cowards that they won’t hunt\nalone. When five or so of them get together,\nthey suddenly turn ferocious!"
          ultra_moon: "With its sturdy jaws and fangs, it can easily\nchomp wooden boats to splinters. It fights with\nBasculin over food."
        fr:
          ultra_sun: "C’est un couard qui ne chasse jamais tout seul.\nDès qu’il se retrouve dans un groupe de cinq,\npar contre, il devient on ne peut plus féroce !"
          ultra_moon: "Grâce à sa mâchoire d’acier et ses dents\nacérées, il déchiquette sans peine les canots.\nBargantua et lui se disputent le menu fretin."
        it:
          ultra_sun: "È di indole timida e non va mai a caccia da solo,\nma in un gruppo di quattro o cinque esemplari\ndiventa molto feroce."
          ultra_moon: "Può frantumare una nave di legno usando le\nsue mascelle robuste e dai denti affilati.\nSi contende il cibo con i Basculin."
        de:
          ultra_sun: "Dieses ängstliche Pokémon jagt nicht, wenn es\nallein ist. Aber sobald sich fünf von ihnen\nversammeln, geraten sie in Rage."
          ultra_moon: "Mit seinem robusten Kiefer und starken Zähnen\nzerbeißt es mühelos Holzboote. Es streitet mit\nBarschuft um Futter."
        es:
          ultra_sun: "Es algo timorato, por lo que nunca va solo. Pero,\nen cuanto se reúnen cinco ejemplares, de pronto\nse convierten en una fuerza de la naturaleza."
          ultra_moon: "Puede destrozar a bocados fácilmente un barco\nde madera con sus potentes mandíbulas y\ncolmillos. Compite por presas con los Basculin."
        ko:
          ultra_sun: "겁이 많아 1마리일 때는 사냥도\n하지 않는다. 5마리 정도 모이면\n갑자기 흉포해진다."
          ultra_moon: "튼튼한 턱과 이빨은 나무로 만든\n배라면 간단하게 깨물어 부순다.\n먹이를 두고 배쓰나이와 싸운다."
        zh_simp:
          ultra_sun: "非常胆小，１只的话不会去狩猎。\n如果聚集了５只左右的话，\n就会一下子变得很粗暴。"
          ultra_moon: "结实的颚部和牙齿，如果是\n木头造的船，轻易就可以咬碎。\n围绕食物的问题，和野蛮鲈鱼争斗。"
        zh_trad:
          ultra_sun: "個性膽小，只有１隻的話連狩獵\n也不敢去，但如果聚集了５隻左右\n就會一下子變得兇暴。"
          ultra_moon: "結實的下巴和牙齒能夠\n輕易地咬碎木造的船隻。\n與野蠻鱸魚互相爭奪著食物。"
sharpedo:
  species_id: 319
  names:
    jp_kana: サメハダー
    jp_kanji: サメハダー
    en: Sharpedo
    fr: Sharpedo
    it: Sharpedo
    de: Tohaido
    es: Sharpedo
    ko: 샤크니아
    zh_simp: 巨牙鲨
    zh_trad: 巨牙鯊
  forms:
    sharpedo:
      form_id: 0
      base_stats:
        hp: 70
        attack: 120
        defense: 40
        special_attack: 95
        special_defense: 40
        speed: 95
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
      abilities:
        - rough_skin
      hidden_ability: speed_boost
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          ultra_sun: "ぬけた　キバを　もっていると　うみで\nじこに　あわないと　しんじられており\nアクセサリーなどに　かこう　される。"
          ultra_moon: "おしりの　あなから　のみこんだ\nかいすいを　ふきだし　およぐ。\nちの　においには　とても　びんかん。"
        jp_kanji:
          ultra_sun: "抜けた　キバを　持っていると　海で\n事故に　遭わないと　信じられており\nアクセサリーなどに　加工　される。"
          ultra_moon: "おしりの　穴から　飲み込んだ\n海水を　噴き出し　泳ぐ。\n血の　匂いには　とても　敏感。"
        en:
          ultra_sun: "People believe that carrying one of its\ndiscarded fangs will prevent mishaps at sea,\nso the fangs are made into accessories."
          ultra_moon: "It drinks in seawater and jets it from its rear to\npropel itself. It’s very sensitive to the scent\nof blood."
        fr:
          ultra_sun: "On fabrique des accessoires à partir de ses\ndents, car elles ont la réputation de protéger\nleurs porteurs des accidents en mer."
          ultra_moon: "Ce Pokémon extrêmement sensible à l’odeur\ndu sang se déplace en évacuant par son orifice\npostérieur l’eau de mer qu’il avale."
        it:
          ultra_sun: "Si dice che i suoi denti siano dei portafortuna\nche proteggono dagli incidenti in mare. Con\nquelli che perde vengono fabbricati accessori."
          ultra_moon: "Nuota espellendo dalla parte posteriore del\ncorpo l’acqua di mare ingerita. È molto sensibile\nall’odore del sangue."
        de:
          ultra_sun: "Man glaubt, dass die ausgefallenen Zähne von\nTohaido vor Unfällen auf dem Meer schützen.\nDeswegen werden sie zu Schmuck verarbeitet."
          ultra_moon: "Es schwimmt, indem es das Meerwasser, das es\ntrinkt, aus seinem Hinterteil ausstößt. Für den\nGeruch von Blut ist es sehr empfänglich."
        es:
          ultra_sun: "Existe la creencia de que sus dientes traen\nbuena suerte en la mar, por lo que se usan para\nla elaboración de amuletos y adornos."
          ultra_moon: "Nada tragando agua marina, que le sirve de\npropulsión al expelerla por detrás. Su olfato es\nextremadamente sensible al olor de la sangre."
        ko:
          ultra_sun: "빠진 이빨을 지니고 있으면 바다에서\n사고를 당하지 않는다고 믿어\n액세서리 등으로 가공된다."
          ultra_moon: "엉덩이의 구멍으로 들이마신\n바닷물을 뿜어내서 헤엄친다.\n피 냄새에는 매우 민감하다."
        zh_simp:
          ultra_sun: "人们相信，如果带着它脱落的牙齿\n就不会在海上遭遇事故，\n因此会将牙齿加工为饰品等。"
          ultra_moon: "会从臀部的孔里喷出\n喝入的海水来游泳。\n对血的气味十分敏感。"
        zh_trad:
          ultra_sun: "人們相信只要帶著牠脫落的牙齒\n就不會在海上遭遇事故，\n因此會將牠的牙齒加工成飾品。"
          ultra_moon: "會將吞下的海水從臀部的\n孔中噴出，藉此來游動。\n對血的氣味非常敏感。"
    sharpedo_mega:
      form_id: 1
      names:
        jp_kana: メガサメハダー
        jp_kanji: メガサメハダー
        en: Mega Sharpedo
        fr: Méga-Sharpedo
        it: MegaSharpedo
        de: Mega-Tohaido
        es: Mega-Sharpedo
        ko: 메가샤크니아
        zh_simp: 超级巨牙鲨
        zh_trad: 超級巨牙鯊
      base_stats:
        hp: 70
        attack: 140
        defense: 70
        special_attack: 110
        special_defense: 65
        speed: 105
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - dark
      egg_groups:
        - water_2
      abilities:
        - strong_jaw
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          ultra_sun: "きいろい　もようは　かこの　ふるきず。\nメガシンカの　エネルギーが　めぐって\nズキズキ　いたんで　くるしいらしい。"
          ultra_moon: "とっしんした　しゅんかん　あたまから\nするどい　トゲが　とびだし　あいての\nからだを　ふかく　きずつける。"
        jp_kanji:
          ultra_sun: "黄色い　模様は　過去の　古傷。\nメガシンカの　エネルギーが　巡って\nズキズキ　痛んで　苦しいらしい。"
          ultra_moon: "突進した　瞬間　頭から\n鋭い　トゲが　飛び出し　相手の\n体を　深く　傷つける。"
        en:
          ultra_sun: "The yellow patterns it bears are old scars. The\nenergy from Mega Evolution runs through them,\ncausing it sharp pain and suffering."
          ultra_moon: "The moment it charges into its opponent,\nsharp spikes pop out of Sharpedo’s head,\nleaving its opponent with deep wounds."
        fr:
          ultra_sun: "Ses marques jaunes sont des cicatrices\nd’anciennes blessures. L’énergie de la\nMéga-Évolution ravive ses vieilles douleurs."
          ultra_moon: "Quand il charge, des pics acérés surgissent\nsur sa tête ; il s’en sert pour blesser gravement\nses adversaires."
        it:
          ultra_sun: "I segni gialli sono vecchie cicatrici. Sembra che\nl’energia della megaevoluzione, scorrendo nel\nsuo corpo, gli causi fitte lancinanti."
          ultra_moon: "Nell’istante in cui parte alla carica, dalla sua\ntesta spuntano degli aculei che causano delle\nferite profonde all’avversario."
        de:
          ultra_sun: "Bei den gelben Mustern handelt es sich um alte\nNarben, die stark schmerzen, wenn Energie aus\nder Mega-Entwicklung durch seinen Leib fließt."
          ultra_moon: "Wenn es vorwärtsprescht, schnellen scharfe\nStacheln aus seinem Kopf, mit denen es dem\nGegner tiefe Wunden zufügt."
        es:
          ultra_sun: "Las marcas amarillas son cicatrices antiguas.\nLa energía de la megaevolución provoca que\nempiecen a dolerle otra vez."
          ultra_moon: "Al embestir, saca unas espinas cortantes de la\ncabeza que se clavan en el cuerpo del rival y le\ncausan heridas profundas."
        ko:
          ultra_sun: "노란색 모양은 오래된 상처다.\n메가진화 에너지가 돌면서\n욱신욱신 아파 괴로운 듯하다."
          ultra_moon: "돌진한 순간 머리에서\n날카로운 가시가 튀어나와 상대의\n몸에 깊은 상처를 입힌다."
        zh_simp:
          ultra_sun: "黄色的花纹是以前的旧伤。\n超级进化的能量在里面游走，\n一阵一阵的疼痛，好像很痛苦。"
          ultra_moon: "在猛撞的瞬间，\n会从头上射出尖刺，\n给对手的身体造成很深的伤。"
        zh_trad:
          ultra_sun: "黃色紋路是過去留下的舊傷。\n超級進化的能量流過時似乎會\n陣陣抽痛，讓牠苦不堪言。"
          ultra_moon: "會在衝刺的瞬間\n從頭上射出尖刺，\n在對手身上留下深深的創傷。"
wailmer:
  species_id: 320
  names:
    jp_kana: ホエルコ
    jp_kanji: ホエルコ
    en: Wailmer
    fr: Wailmer
    it: Wailmer
    de: Wailmer
    es: Wailmer
    ko: 고래왕자
    zh_simp: 吼吼鲸
    zh_trad: 吼吼鯨
  forms:
    wailmer:
      form_id: 0
      base_stats:
        hp: 130
        attack: 70
        defense: 35
        special_attack: 70
        special_defense: 35
        speed: 60
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
