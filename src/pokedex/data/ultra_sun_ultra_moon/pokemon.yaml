      names:
        jp_kana: あかいろのコア
        jp_kanji: あかいろのコア
        en: Red Core
        fr: Noyau Rouge
        it: Nucleo Rosso
        de: Roter Kern
        es: Núcleo Rojo
        ko: 빨간색 코어
        zh_simp: 红色核心
        zh_trad: 紅色核心
      base_stats:
        hp: 60
        attack: 100
        defense: 60
        special_attack: 100
        special_defense: 60
        speed: 120
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - mineral
      abilities:
        - shields_down
      descriptions:
        jp_kana:
          ultra_sun: "よぞらから　ふってくる　メテノと\nであえる　スポットは　かぎられていて\nアローラは　きちょうな　そのひとつ。"
          ultra_moon: "がいかくの　むけた　すがた。\nコアの　いろの　ちがいは　たべた\nエサの　せいぶんに　よるもの。"
        jp_kanji:
          ultra_sun: "夜空から　降ってくる　メテノと\n出会える　スポットは　限られていて\nアローラは　貴重な　そのひとつ。"
          ultra_moon: "外殻の　むけた　姿。\nコアの　色の　違いは　食べた\nエサの　成分に　よるもの。"
        en:
          ultra_sun: "Places where Minior fall from the night sky are\nfew and far between, with Alola being one of\nthe precious few."
          ultra_moon: "This is its form when its shell has fallen off.\nThe color of its core depends on the materials\nthat made up the food it ate."
        fr:
          ultra_sun: "Alola fait partie des rares endroits où l’on peut\nobserver un Météno tombant du ciel."
          ultra_moon: "Météno se présente sous cette forme quand il\nperd sa carapace. La couleur de son noyau varie\nen fonction des composants de sa nourriture."
        it:
          ultra_sun: "Alola è uno dei rari luoghi in cui di notte è\npossibile vedere dei Minior cadere dal cielo."
          ultra_moon: "Un Minior che ha perso il suo guscio.\nLe diverse colorazioni del nucleo dipendono\ndagli elementi che assimila."
        de:
          ultra_sun: "Alola ist einer der wenigen Orte, an denen es\nmöglich ist, dieses Pokémon vom Nachthimmel\nherabfallen zu sehen."
          ultra_moon: "In dieser Form hat es seine Schale verloren. Die\nInhaltsstoffe in Metenos Nahrung nehmen\nEinfluss auf die Färbung seines Kerns."
        es:
          ultra_sun: "Alola es uno de los pocos lugares en los que,\ndurante la noche, se puede ver cómo los Minior\ncaen del cielo."
          ultra_moon: "Minior presenta esta apariencia tras perder su\ncaparazón. El color del núcleo varía en función\nde su dieta."
        ko:
          ultra_sun: "밤하늘에서 떨어지는 메테노와\n만날 수 있는 장소는 제한되어 있다.\n알로라는 그 귀한 장소 중 한 곳이다."
          ultra_moon: "겉껍질이 벗겨진 모습.\n코어의 색이 다른 이유는 먹은\n먹이의 성분이 다르기 때문이다."
        zh_simp:
          ultra_sun: "能遇到从夜空掉落的\n小陨星的地点是有限的，\n阿罗拉正是这宝贵的地方之一。"
          ultra_moon: "外壳脱落后的样子。\n内核颜色的差异\n是根据所吃食物的成分决定的。"
        zh_trad:
          ultra_sun: "能夠遇到從夜空落下的\n小隕星的地方並不多，\n阿羅拉正是這珍貴的地點之一。"
          ultra_moon: "外殼脫落後的樣子。\n核心顏色的差異是根據\n所吃食物的成分而決定。"
