    jp_kanji: アマカジ
    en: Bounsweet
    fr: Croquine
    it: Bounsweet
    de: Frubberl
    es: Bounsweet
    ko: 달콤아
    zh_simp: 甜竹竹
    zh_trad: 甜竹竹
  forms:
    bounsweet:
      form_id: 0
      base_stats:
        hp: 42
        attack: 30
        defense: 38
        special_attack: 30
        special_defense: 38
        speed: 32
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
        - oblivious
      hidden_ability: sweet_veil
      held_items:
        rare: grassy_seed
      descriptions:
        jp_kana:
          ultra_sun: "あまく　おいしそうな　においのせいで\nとりポケモンに　ねらわれるが　あまり\nかしこくないので　きに　していない。"
          ultra_moon: "とりポケモンに　のみこまれそうに\nなると　あたまのヘタを　かいてんして\nていこうするが　たいてい　ダメだ。"
        jp_kanji:
          ultra_sun: "甘く　美味しそうな　匂いのせいで\nとりポケモンに　狙われるが　あまり\n賢くないので　気に　していない。"
          ultra_moon: "とりポケモンに　呑み込まれそうに\nなると　頭のヘタを　回転して\n抵抗するが　大抵　ダメだ。"
        en:
          ultra_sun: "Because of its sweet, delicious aroma, bird\nPokémon are always after it, but it’s not\nintelligent enough to care."
          ultra_moon: "It tries to resist being swallowed by a bird\nPokémon by spinning the sepals on its head.\nIt’s usually a fruitless attempt."
        fr:
          ultra_sun: "Son odeur appétissante en fait la cible idéale\ndes Pokémon oiseaux, mais comme il n’est\npas très malin, ça lui est égal."
          ultra_moon: "Pour résister aux Pokémon oiseaux qui tentent\nde le manger, il fait tourner le sépale qui est sur\nsa tête, mais c’est généralement peine perdue."
        it:
          ultra_sun: "A causa del suo profumino delizioso, Bounsweet\nè preda di molti Pokémon alati, ma non essendo\nmolto perspicace non se ne preoccupa granché."
          ultra_moon: "Quando un Pokémon alato sta per inghiottirlo,\nBounsweet cerca di resistere ruotando le foglie\nche ha sul capo, con scarsi risultati."
        de:
          ultra_sun: "Da es einen köstlich süßen Duft verströmt, wird\nes oft von Vogel-Pokémon angegriffen. Das stört\nes jedoch nicht, weil es nicht sehr helle ist."
          ultra_moon: "Droht es von einem Vogel-Pokémon verschluckt\nzu werden, lässt es zur Abwehr den Kelch auf\nseinem Kopf rotieren, was jedoch selten hilft."
        es:
          ultra_sun: "El dulce aroma que desprenden los convierte\nen presa de los Pokémon pájaro, pero, al no ser\nmuy avispados, no se alteran en absoluto."
          ultra_moon: "Cuando un Pokémon pájaro está a punto de\nengullirlo, gira el cáliz de su cabeza a modo de\nhélice para evitarlo, pero suele ser en vano."
        ko:
          ultra_sun: "달고 맛있는 냄새 때문에\n새포켓몬이 타깃으로 삼지만\n영리하지 않아 신경 쓰지 않는다."
          ultra_moon: "새포켓몬에게 삼켜질 것 같으면\n머리의 꼭지를 회전시켜서\n저항하지만 대체로 소용없다."
        zh_simp:
          ultra_sun: "因为闻起来又甜又香的气味\n而被鸟宝可梦袭击，\n但是不太聪明，所以根本没在意。"
          ultra_moon: "如果快要被鸟宝可梦吞进去了，\n就会旋转头部的壳盖进行抵抗，\n不过基本上是没用的。"
        zh_trad:
          ultra_sun: "甜美的香味讓牠成了鳥寶可夢\n襲擊的對象，但因為牠不怎麼聰明，\n所以根本不在意。"
          ultra_moon: "快要被鳥寶可夢吞下去的時候\n會旋轉頭部的果蒂來抵抗，\n但大部分情況下都是徒勞無功。"
steenee:
  species_id: 762
  names:
    jp_kana: アママイコ
    jp_kanji: アママイコ
