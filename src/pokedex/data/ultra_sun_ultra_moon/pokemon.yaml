pancham:
  species_id: 674
  names:
    jp_kana: ヤンチャム
    jp_kanji: ヤンチャム
    en: Pancham
    fr: Pandespiègle
    it: Pancham
    de: Pam-Pam
    es: Pancham
    ko: 판짱
    zh_simp: 顽皮熊猫
    zh_trad: 頑皮熊貓
  forms:
    pancham:
      form_id: 0
      base_stats:
        hp: 67
        attack: 82
        defense: 62
        special_attack: 46
        special_defense: 48
        speed: 43
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          ultra_sun: "ゴロンダの　あとを　こぶんの　ように\nついていく。　おおきな　しっぱいを\nすると　はっぱを　とられてしまう。"
          ultra_moon: "あいてを　ビビらせようと　ひっし。\nいっしょうけんめい　にらんできたら\nこわがるふりを　してあげよう。"
        jp_kanji:
          ultra_sun: "ゴロンダの　あとを　子分の　ように\nついていく。　大きな　失敗を\nすると　葉っぱを　取られてしまう。"
          ultra_moon: "相手を　ビビらせようと　必死。\n一生懸命　睨んできたら\n怖がるふりを　してあげよう。"
        en:
          ultra_sun: "It follows Pangoro around like a henchman.\nWhen Pancham makes a big mistake, its leaf\ngets taken away."
          ultra_moon: "It’s desperate to intimidate its opponents.\nBe nice and pretend to be scared if you\ncatch it glaring at you intensely."
        fr:
          ultra_sun: "Il suit Pandarbare comme son ombre et\nle considère comme son chef. S’il fait\nune grosse bêtise, on lui confisque sa feuille."
          ultra_moon: "Il essaie à tout prix d’intimider son adversaire.\nS’il vous fait les gros yeux, faites-lui plaisir\net prenez l’air apeuré !"
        it:
          ultra_sun: "Segue Pangoro ovunque come un discepolo.\nSe commette gravi errori, gli viene confiscata\nla foglia che tiene in bocca."
          ultra_moon: "Cerca di intimorire l’avversario a tutti i costi.\nA volte fissa le persone per spaventarle e, per\nfarlo felice, basta far finta di aver paura."
        de:
          ultra_sun: "Es folgt treu seinem großen Vorbild, Pandagro.\nBegeht Pam-Pam einen schwerwiegenden\nFehler, nimmt ihm Pandagro sein Blatt ab."
          ultra_moon: "Mit seinem finsteren Blick versucht es, seinen\nGegner einzuschüchtern. Manchmal sollte man\nihm den Gefallen tun und verängstigt reagieren."
        es:
          ultra_sun: "Sigue los pasos de Pangoro, a quien considera\nsu maestro. En caso de cometer un grave error,\neste le arrebata la hierba de la boca."
          ultra_moon: "Intenta amedrentar a su oponente a toda costa.\nSi fija la mirada en alguien, solo hay que\naparentar tener miedo para hacerlo feliz."
        ko:
          ultra_sun: "부란다의 뒤를 부하처럼\n따라다닌다. 큰 실패를 하면\n잎사귀를 빼앗겨 버린다."
          ultra_moon: "상대를 겁먹게 하려고 필사적이다.\n열심히 노려 본다면\n겁먹은 척을 해 주자."
        zh_simp:
          ultra_sun: "像跟班那样跟在流氓熊猫后头。\n如果犯了重大错误，\n叶子就会被拿走。"
          ultra_moon: "拼命地想让对手惧怕。\n如果它用尽全力瞪着你的话，\n就装作自己很害怕吧。"
        zh_trad:
          ultra_sun: "像跟班似地跟在流氓熊貓後面。\n如果犯了重大的錯誤，\n葉子就會被沒收。"
          ultra_moon: "拼命地想讓對手害怕。\n如果牠用盡全力瞪著你看，\n就裝作自己很害怕吧。"
pangoro:
  species_id: 675
  names:
    jp_kana: ゴロンダ
    jp_kanji: ゴロンダ
    en: Pangoro
    fr: Pandarbare
    it: Pangoro
    de: Pandagro
    es: Pangoro
    ko: 부란다
    zh_simp: 流氓熊猫
    zh_trad: 流氓熊貓
  forms:
    pangoro:
      form_id: 0
      base_stats:
        hp: 95
        attack: 124
        defense: 78
        special_attack: 69
        special_defense: 71
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - dark
      egg_groups:
        - field
        - human_like
      abilities:
        - iron_fist
        - mold_breaker
      hidden_ability: scrappy
      held_items:
        rare: mental_herb
      descriptions:
        jp_kana:
          ultra_sun: "うでっぷしが　じまんの　ワイルドな\nポケモン。　ごうかいな　せいしつに\nほれこむ　トレーナーも　おおい。"
          ultra_moon: "こぶしで　かたる　タイプ。　ガタガタ\nいわず　ぶんなぐり　ダンプカーも\nふっとばす　とっしんを　かます。"
        jp_kanji:
          ultra_sun: "腕っ節が　自慢の　ワイルドな\nポケモン。　豪快な　性質に\n惚れこむ　トレーナーも　多い。"
          ultra_moon: "こぶしで　語る　タイプ。　ガタガタ\nいわず　ぶん殴り　ダンプカーも\nふっ飛ばす　突進を　かます。"
        en:
          ultra_sun: "This rowdy Pokémon boasts great physical\nstrength. Many Trainers are also smitten by its\nlively character."
          ultra_moon: "Pangoro is the type to talk with its fists. It\ndoesn’t say much as it pummels opponents with\nenough force to send a dump truck flying."
        fr:
          ultra_sun: "Ce Pokémon féroce est très fier de ses gros\nbras. Beaucoup de Dresseurs l’apprécient\npour son côté truculent."
          ultra_moon: "Il est du genre à laisser ses poings parler :\nil martèle ses ennemis et charge avec assez\nde force pour envoyer voler un camion-benne."
        it:
          ultra_sun: "È aggressivo e va molto fiero della forza delle\nsue braccia. Molti Allenatori vanno matti per\nil suo carattere intrepido."
          ultra_moon: "Preferisce parlare la lingua dei pugni. Si lancia\nalla carica con un impeto tale da far prendere\nil volo a un autocarro."
        de:
          ultra_sun: "Ein ungezügeltes Pokémon, das mit seinen\nFäusten ordentlich austeilen kann. Viele Trainer\nsind völlig vernarrt in sein energisches Wesen."
          ultra_moon: "Ein Pokémon, das lieber die Fäuste sprechen\nlässt, als lange Reden zu schwingen. Selbst\nKipplaster fliegen meterweit, wenn es sie rammt."
        es:
          ultra_sun: "Pokémon un tanto agresivo que se jacta de la\nfuerza de sus puños. A muchos Entrenadores\nles llama la atención su carácter atrevido."
          ultra_moon: "Prefiere solucionar las disputas a mamporros.\nPuede embestir un camión y hacerlo volar por\nlos aires a largas distancias sin despeinarse."
        ko:
          ultra_sun: "완력을 뽐내는 와일드한\n포켓몬. 호쾌한 성질에\n반하는 트레이너도 많다."
          ultra_moon: "주먹으로 이야기하는 타입이다.\n긴말 없이 냅다 때려서\n덤프트럭도 날려버리는 돌진을 먹인다."
        zh_simp:
          ultra_sun: "以腕力为傲的野性的宝可梦。\n性格豪爽，\n因此迷恋它的训练家也很多。"
          ultra_moon: "是用拳头来说话的那一型。\n一句话也不说就猛殴，\n会使出连翻斗车都能击飞的猛撞。"
        zh_trad:
          ultra_sun: "以自己的腕力為傲，\n充滿野性的寶可夢。\n豪爽的性情令許多訓練家為之著迷。"
          ultra_moon: "屬於用拳頭來說話的類型。\n會二話不說地揮拳痛毆，\n或使出連大卡車都能撞飛的猛撞。"
furfrou:
  species_id: 676
  names:
    jp_kana: トリミアン
    jp_kanji: トリミアン
    en: Furfrou
    fr: Couafarel
    it: Furfrou
    de: Coiffwaff
    es: Furfrou
    ko: 트리미앙
    zh_simp: 多丽米亚
    zh_trad: 多麗米亞
  forms:
    furfrou_natural_form:
      form_id: 0
      names:
        jp_kana: やせいのすがた
        jp_kanji: やせいのすがた
        en: Natural Form
        fr: Forme Sauvage
        it: Forma Selvatica
        de: Zottelform
        es: Forma Salvaje
        ko: 야생의 모습
        zh_simp: 野生的样子
        zh_trad: 野生的樣子
      base_stats:
        hp: 75
        attack: 80
        defense: 60
        special_attack: 65
        special_defense: 90
        speed: 102
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - fur_coat
      descriptions:
        jp_kana:
          ultra_sun: "たいもうを　いかに　うつくしく\nカットするか　きぞくたちの　あいだで\nきそわれた　じだいが　あった。"
          ultra_moon: "ほうっておくと　たいもうは　どんどん\nのびつづけるが　しんらいした\nものにしか　カットは　ゆるさない。"
        jp_kanji:
          ultra_sun: "体毛を　いかに　美しく\nカットするか　貴族たちの　間で\n競われた　時代が　あった。"
          ultra_moon: "放っておくと　体毛は　どんどん\n伸び続けるが　信頼した\n者にしか　カットは　許さない。"
        en:
          ultra_sun: "There was an era when aristocrats would\ncompete to see who could trim their Furfrou’s\nfur into the most exquisite style."
          ultra_moon: "Left alone, its fur will grow longer and longer,\nbut it will only allow someone it trusts to cut it."
        fr:
          ultra_sun: "Il fut un temps où la noblesse organisait\ndes concours pour déterminer quel Couafarel\narborait la plus belle coupe."
          ultra_moon: "Sa fourrure pousse indéfiniment, mais il refuse\nde se faire couper la toison par une personne\nen qui il n’a pas confiance."
        it:
          ultra_sun: "In passato i nobili gareggiavano tra loro per\nstabilire quale Furfrou avesse il taglio più bello."
          ultra_moon: "Se non viene tagliato, il suo pelo continua\na crescere a dismisura. Si lascia tosare\nsolamente dalle persone di cui si fida."
        de:
          ultra_sun: "Es gab eine Zeit, in der Adlige darum stritten,\nwer seinem Coiffwaff den schönsten Schnitt\nverpassen könne."
          ultra_moon: "Trimmt man sein Fell nicht regelmäßig, wächst es\nohne Unterlass. Allerdings lässt es sich nur von\njemandem frisieren, dem es traut."
        es:
          ultra_sun: "Hubo una época en la que los aristócratas\ncompetían entre ellos procurando que el corte\nde pelo de su Furfrou fuera el mejor de todos."
          ultra_moon: "El pelo le crece sin cesar, pero solo deja que se\nlo corten aquellos de quienes se fía plenamente."
        ko:
          ultra_sun: "털을 얼마나 아름답게\n커트하는지 귀족들 사이에서\n경쟁하던 시대가 있었다."
          ultra_moon: "가만히 두면 털이 점점\n자라지만 신뢰하는 자가 아니면\n커트를 허락하지 않는다."
        zh_simp:
          ultra_sun: "曾有过一个时代，\n贵族之间会比赛\n如何把它的体毛修剪得美丽。"
          ultra_moon: "如果置之不理，\n体毛会不断地长长，\n但只允许信赖的人修剪。"
        zh_trad:
          ultra_sun: "曾經有過一個時代，\n貴族之間會互相比較\n誰能把牠的體毛修剪得更美麗。"
          ultra_moon: "如果放著不管，體毛就會\n不斷變長，但牠只允許\n信賴的人幫自己修剪。"
