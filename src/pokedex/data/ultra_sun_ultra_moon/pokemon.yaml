      descriptions:
        jp_kana:
          ultra_sun: "チームプレイで　とりポケモンの\nすあなから　タマゴを　ぬすみだすが\nだれが　くうかで　ケンカになるのだ。"
          ultra_moon: "やみよに　まぎれ　えものを　ねらう。\nサンドを　ねらい　ツメを　たてるが\nひふが　かたく　おれてしまうことも。"
        jp_kanji:
          ultra_sun: "チームプレイで　とりポケモンの\n巣穴から　タマゴを　盗み出すが\n誰が　食うかで　ケンカになるのだ。"
          ultra_moon: "闇夜に　まぎれ　獲物を　狙う。\nサンドを　狙い　ツメを　たてるが\n皮膚が　硬く　折れてしまうことも。"
        en:
          ultra_sun: "They will cooperate to steal eggs from the nests\nof bird Pokémon, but fights break out to\ndetermine which one gets to eat the eggs."
          ultra_moon: "It blends into the dark of night to ambush its\nprey. Sneasel will attack Sandshrew, but its\nhard skin can cause Sneasel’s claws to snap off."
        fr:
          ultra_sun: "Il fait équipe avec ses congénères pour voler\nles œufs des Pokémon oiseaux, mais ils se font\nla guerre pour décider de qui les mangera."
          ultra_moon: "Ce chasseur nocturne profite de l’obscurité\npour s’attaquer aux Sabelette, mais il se casse\nparfois les griffes sur leur peau très dure."
        it:
          ultra_sun: "Questi Pokémon agiscono in squadra per rubare\nle Uova dai nidi dei Pokémon alati, ma poi\nlitigano per stabilire chi le mangerà."
          ultra_moon: "Si nasconde nell’oscurità puntando la preda.\nQuando attacca i Sandshrew, che hanno la pelle\nmolto dura, a volte i suoi artigli si spezzano."
        de:
          ultra_sun: "Sie bilden ein Team, um gemeinsam Eier aus den\nNestern von Vogel-Pokémon zu klauen. Dann\nstreiten sie sich darüber, wer sie fressen darf."
          ultra_moon: "Es lauert seiner Beute im Dunkeln auf. Wenn es\nSandan mit seinen Krallen angreift, brechen\ndiese manchmal an dessen robuster Haut ab."
        es:
          ultra_sun: "Colabora con los suyos para saquear nidos de\nPokémon pájaro, aunque luego se disputan\nfieramente quién se come los huevos."
          ultra_moon: "Acecha a sus presas en la oscuridad nocturna.\nEn ocasiones, ataca a algún Sandshrew y acaba\npartiéndose las garras contra su dura piel."
        ko:
          ultra_sun: "팀플레이로 새포켓몬의\n둥지에서 알을 훔쳐 내지만,\n누가 먹을까로 싸움이 난다."
          ultra_moon: "어둠 속에 숨어 먹이를 노린다.\n모래두지를 노리고 손톱을 세우지만\n피부가 단단해서 부러지는 경우도 있다."
        zh_simp:
          ultra_sun: "依靠团队合作从鸟宝可梦的\n巢穴里将蛋偷出来后，\n却会为了由谁来吃而争吵不休。"
          ultra_moon: "会趁着夜色袭击猎物。\n伸出爪子袭击穿山鼠时，有时会因\n对方坚硬的皮肤而导致爪子折断。"
        zh_trad:
          ultra_sun: "靠著團隊合作從鳥寶可夢的\n巢穴中把蛋偷出來之後，\n卻會為了由誰來吃而爭吵。"
          ultra_moon: "會趁著黑夜襲擊獵物。\n遇上穿山鼠時會伸出爪子來獵捕，\n但對方堅硬的皮膚有時會讓爪子折斷。"
