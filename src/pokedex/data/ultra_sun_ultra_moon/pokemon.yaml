        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - monster
      abilities:
        - parental_bond
      descriptions:
        jp_kana:
          ultra_sun: "ばくはつてきな　エネルギーを　あびた\nこどもが　いちじてきに　せいちょう。\nははおやは　きが　きでは　ない。"
          ultra_moon: "メガシンカした　この　せなかを　みた\nははおやは　いずれ　おとずれる\nわかれのひに　おもいを　はせるのだ。"
        jp_kanji:
          ultra_sun: "爆発的な　エネルギーを　浴びた\n子どもが　一時的に　成長。\n母親は　気が　気では　ない。"
          ultra_moon: "メガシンカした　子の　背中を　見た\n母親は　いずれ　訪れる\n別れの日に　思いを　馳せるのだ。"
        en:
          ultra_sun: "The explosive energy the child is bathed in\ncauses temporary growth. The mother is beside\nherself with worry about it."
          ultra_moon: "When the mother sees the back of her Mega-\nEvolved child, it makes her think of the day\nwhen her child will inevitably leave her."
        fr:
          ultra_sun: "Avec l’afflux d’énergie de la Méga-Évolution,\nle rejeton grandit temporairement, ce qui ne\nrassure pas sa mère."
          ultra_moon: "Quand la mère voit son petit grandir grâce\nà la Méga-Évolution, elle pense avec tristesse\nau jour où il quittera définitivement le nid."
        it:
          ultra_sun: "Avendo assorbito una quantità esorbitante\ndi energia, il piccolo è cresciuto di colpo,\nfacendo impensierire molto la madre."
          ultra_moon: "Guardando il suo piccolo cresciuto grazie alla\nmegaevoluzione, la madre comincia a pensare\nche un giorno dovrà separarsi da lui."
        de:
          ultra_sun: "Gewaltige Energiemengen haben das Junge in\nkürzester Zeit heranwachsen lassen. Seine\nMutter ist aufgrund dessen angespannt."
          ultra_moon: "Nun, da ihr Junges durch die Mega-Entwicklung\nherangewachsen ist, denkt die Mutter immerzu\nan den stetig nahenden Tag des Abschieds."
        es:
          ultra_sun: "La explosiva energía de la megaevolución hace\ncrecer de golpe a la cría, lo que causa\npreocupación a la madre."
          ultra_moon: "Al ver cómo su cría crece tras megaevolucionar,\nla madre comienza a pensar en el inevitable\nmomento de su separación."
        ko:
          ultra_sun: "폭발적인 에너지에 쏘인\n새끼가 일시적으로 성장한다.\n엄마는 안절부절못한다."
          ultra_moon: "메가진화한 새끼의 등을 본\n어미는 언젠가 찾아올\n이별의 날을 생각하게 된다."
        zh_simp:
          ultra_sun: "沐浴惊人能量后的孩子\n得到了暂时性的成长。\n母亲却十分焦虑。"
          ultra_moon: "看到孩子超级进化后的背影，\n母亲就会想起终将来临的离别之日。"
        zh_trad:
          ultra_sun: "沐浴了爆炸性能量的孩子\n得到了暫時性的成長，\n母親卻是擔心得不得了。"
          ultra_moon: "看到孩子超級進化後的背影，\n母親就會不禁想像起\n終將來臨的別離之日。"
