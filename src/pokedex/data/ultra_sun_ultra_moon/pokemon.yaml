      descriptions:
        jp_kana:
          ultra_sun: "くうふくの　あまり　はがねポケモンに\nかみついたせいで　キバの　かけた\nゴルバットを　たまに　みかけるぞ。"
          ultra_moon: "１どに　３００シーシーの　けつえきを\nすいとる。　あまりに　たくさん　ちを\nすって　とべなくなることも　ある。"
        jp_kanji:
          ultra_sun: "空腹の　あまり　はがねポケモンに\n噛みついたせいで　キバの　欠けた\nゴルバットを　たまに　見かけるぞ。"
          ultra_moon: "１度に　３００シーシーの　血液を\n吸い取る。　あまりに　たくさん　血を\n吸って　飛べなくなることも　ある。"
        en:
          ultra_sun: "Every once in a while, you’ll see a Golbat that’s\nmissing some fangs. This happens when hunger\ndrives it to try biting a Steel-type Pokémon."
          ultra_moon: "They can suck down over 10 ounces of blood in\none go. They have been known to drink so much\nblood that they can no longer fly."
        fr:
          ultra_sun: "On rencontre parfois des Nosferalto édentés\nque la faim a poussés à attaquer un Pokémon\nde type Acier."
          ultra_moon: "Ce Pokémon peut absorber jusqu’à 300 ml\nde sang d’un coup. Victime de sa gourmandise,\nil en devient parfois trop lourd pour voler."
        it:
          ultra_sun: "A volte si vedono dei Golbat senza canini\nperché, spinti dalla fame, hanno provato\nad azzannare un Pokémon di tipo Acciaio."
          ultra_moon: "Può succhiare 300 cc di sangue in un colpo\nsolo. Quando ne succhia troppo, non riesce\npiù a volare."
        de:
          ultra_sun: "Um seinen Hunger zu stillen, versucht es\nmitunter auch, in Stahl-Pokémon zu beißen,\nund bricht sich dabei die Reißzähne ab."
          ultra_moon: "In einem Schluck kann es bis zu 300 ml Blut\nabsaugen. Manchmal trinkt es so viel, dass es\nnicht mehr fliegen kann."
        es:
          ultra_sun: "En ocasiones se ven ejemplares a los que les\nfalta algún colmillo por haber intentado morder\na un Pokémon de tipo Acero, presas del hambre."
          ultra_moon: "Es capaz de ingerir 300 cc de sangre de una\nsentada. A veces chupa tanta que es incapaz\nde volar."
        ko:
          ultra_sun: "배가 고픈 나머지 강철포켓몬을\n물어 버리는 바람에 이빨이 빠진\n골뱃을 가끔 볼 수 있다."
          ultra_moon: "한 번에 300cc의 혈액을\n빨아들인다. 너무 많은 피를\n빨아들여서 날 수 없게 되는 일도 있다."
        zh_simp:
          ultra_sun: "因为它肚子太饿\n而去咬了钢属性宝可梦，\n所以偶尔会看见缺了牙的大嘴蝠。"
          ultra_moon: "一次能吸３００毫升的血液。\n有时会因吸血过多而无法飞行。"
        zh_trad:
          ultra_sun: "有時可以看見因為肚子太餓\n而去咬鋼屬性寶可夢，\n結果因此缺了牙齒的大嘴蝠。"
          ultra_moon: "一次能吸３００毫升的血液。\n有時會因為吸了太多的血，\n連飛都飛不起來。"
