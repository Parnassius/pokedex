        - cute_charm
        - klutz
      hidden_ability: limber
      descriptions:
        jp_kana:
          ultra_sun: "ねんに　２かい　けが　はえかわる。\nそのけを　つかった　マフラーや\nぼうしは　とっても　あたたかいぞ。"
          ultra_moon: "けいかいしんが　つよく　たたかいは\nこのまないが　しなやかな　あしから\nパワフルな　キックを　くりだすぞ。"
        jp_kanji:
          ultra_sun: "年に　２回　毛が　生えかわる。\nその毛を　使った　マフラーや\n帽子は　とっても　あたたかいぞ。"
          ultra_moon: "警戒心が　強く　戦いは\n好まないが　しなやかな　足から\nパワフルな　キックを　繰り出すぞ。"
        en:
          ultra_sun: "Lopunny regrows its coat twice a year. Mufflers\nand hats made from its fur are really warm."
          ultra_moon: "It’s notably wary and has a dislike of fighting,\nbut at the same time, it can deliver powerful\nkicks with its lithe legs."
        fr:
          ultra_sun: "Il mue deux fois par an. Les écharpes et\nles chapeaux fabriqués à partir de ses poils\ntiennent bien chaud."
          ultra_moon: "Il est très vigilant et n’aime pas vraiment\nse battre, mais gare aux coups de patte\ndévastateurs qu’il peut décocher !"
        it:
          ultra_sun: "Cambia il pelo due volte l’anno. Le sciarpe e\ni berretti fatti con la lana che perde sono\nmolto caldi."
          ultra_moon: "È cauto e rifugge la lotta, ma può sferrare\npotenti calci con le sue gambe aggraziate."
        de:
          ultra_sun: "Es wechselt zweimal im Jahr seine Wolle. Daraus\nlassen sich Schals oder Mützen herstellen, die\nihre Träger mollig warmhalten."
          ultra_moon: "Ein sehr vorsichtiges Pokémon, das Kämpfe zu\nvermeiden sucht. Mit seinen grazilen Beinen teilt\nes kräftige Tritte aus."
        es:
          ultra_sun: "Muda el pelo dos veces al año. Este se usa\nen la confección de unos gorros y bufandas\nque abrigan mucho."
          ultra_moon: "Es cauteloso y nada amante de los combates,\npero puede propinar potentes patadas si la\nsituación lo requiere."
        ko:
          ultra_sun: "연 2회 털갈이를 한다.\n그 털로 만든 머플러나\n모자는 매우 따듯하다."
          ultra_moon: "경계심이 강하고 싸움은\n좋아하지 않지만 유연한 다리로\n파워풀한 킥을 날린다."
        zh_simp:
          ultra_sun: "一年会换２次毛。\n用这个毛制作的\n围巾和帽子非常温暖。"
          ultra_moon: "警戒心很强，不喜欢战斗，\n但能够用柔软的脚使出有力的脚踢。"
        zh_trad:
          ultra_sun: "每年會換２次毛。\n用這種毛製成的\n圍巾和帽子非常保暖。"
          ultra_moon: "警戒心很強。雖然不喜歡戰鬥，\n但牠能夠用柔韌的雙腳\n使出強而有力的踢腿。"
    lopunny_mega:
