      descriptions:
        jp_kana:
          ultra_sun: "わるいこの　ところには　ゲンガーが\nやってくる　という　いいつたえは\nせかいじゅうで　きくことが　できる。"
          ultra_moon: "じたくに　いても　キケン。　へやの\nすみに　できた　わずかな　くらがりに\nひそみ　えものを　ねらっている。"
        jp_kanji:
          ultra_sun: "悪い子の　ところには　ゲンガーが\nやってくる　という　言い伝えは\n世界中で　聞くことが　できる。"
          ultra_moon: "自宅に　いても　危険。　部屋の\n隅に　できた　わずかな　暗がりに\n潜み　獲物を　狙っている。"
        en:
          ultra_sun: "You can hear tales told all over the world about\nhow Gengar will pay a visit to children who\nare naughty."
          ultra_moon: "Even your home isn’t safe. Gengar will lurk in\nwhatever dark corner of a room it can find and\nwait for its chance to catch its prey."
        fr:
          ultra_sun: "Les enfants du monde entier redoutent\nla menace de l’Ectoplasma qui viendra les\nchercher s’ils ne sont pas sages."
          ultra_moon: "Même chez soi, on n’est pas à l’abri.\nEctoplasma attend, tapi dans un recoin sombre,\npour mieux bondir sur ses proies..."
        it:
          ultra_sun: "I genitori di tutto il mondo ammoniscono i\nbambini dicendo loro che, se non fanno i bravi,\narriverà Gengar!"
          ultra_moon: "Neanche casa propria è un luogo sicuro: Gengar\nsi cela negli angoli bui pronto a impossessarsi\ndello spirito vitale delle sue prede."
        de:
          ultra_sun: "Unartige Kinder holt sich Gengar. So heißt es\nweltweit in mündlichen Überlieferungen."
          ultra_moon: "Selbst zu Hause ist man vor Gengar nicht sicher.\nIn den kleinsten Schatten der engsten Winkel\nlauert es auf Beute."
        es:
          ultra_sun: "No es raro oír a padres de todos los rincones\ndel mundo advertir a sus hijos que, si no se\nportan bien, un Gengar vendrá a por ellos."
          ultra_moon: "Uno no está a salvo ni en su propia casa, pues\nle basta una simple sombra para aparecer y\nabalanzarse sobre su presa."
        ko:
          ultra_sun: "못된 아이가 있는 곳에 팬텀이\n찾아온다고 하는 이야기는\n전 세계에서 들을 수 있다."
          ultra_moon: "집에 있어도 위험하다.\n방구석에 생긴 작은 그림자에\n숨어서 먹이를 노리고 있다."
        zh_simp:
          ultra_sun: "在世界各地都能听到\n耿鬼会去找坏孩子这样的传说。"
          ultra_moon: "即使待在自己家里也很危险。\n因为它会潜伏在房屋角落里\n仅有的一点阴暗处伺机捕捉猎物。"
        zh_trad:
          ultra_sun: "在世界各地都能聽到\n孩子如果不乖的話\n就會被耿鬼找上門的傳說。"
          ultra_moon: "即使待在自己家裡也很危險。\n牠會潛伏在房屋角落僅有的\n一丁點陰暗處，伺機捕捉獵物。"
    gengar_mega:
