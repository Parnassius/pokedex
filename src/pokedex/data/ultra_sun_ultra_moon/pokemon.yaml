      descriptions:
        jp_kana:
          ultra_sun: "うもうが　こまかいので　じゅくれんの\nしょくにん　でなければ　ふくげんに\nしっぱいするという　こだいのポケモン。"
          ultra_moon: "とりポケモンの　そせんと　いわれる。\nはばたく　きんにくが　まだ　よわく\nじょそうを　つけなければ　とべない。"
        jp_kanji:
          ultra_sun: "羽毛が　細かいので　熟練の\n職人　でなければ　復元に\n失敗するという　古代の　ポケモン。"
          ultra_moon: "とりポケモンの　祖先と　いわれる。\n羽ばたく　筋肉が　まだ　弱く\n助走を　つけなければ　飛べない。"
        en:
          ultra_sun: "This ancient Pokémon’s plumage is delicate,\nso if anyone other than an experienced\nprofessional tries to restore it, they will fail."
          ultra_moon: "Said to be an ancestor of bird Pokémon, the\nmuscles it uses to flap its wings are still weak,\nso it needs a long runway in order to take off."
        fr:
          ultra_sun: "Les plumes de ce Pokémon antique sont si fines\nque seuls les experts les plus talentueux\npeuvent leur rendre justice en le reconstituant."
          ultra_moon: "On dit que c’est l’ancêtre des Pokémon oiseaux.\nLes muscles de ses ailes étant assez faibles,\nil doit prendre son élan pour s’envoler."
        it:
          ultra_sun: "È un Pokémon antico dal piumaggio molto fitto.\nSolo i più esperti riescono a rigenerarlo con\nsuccesso."
          ultra_moon: "Si ritiene che sia l’antenato dei Pokémon alati.\nHa i muscoli delle ali non ancora sviluppati\ne per volare deve prendere la rincorsa."
        de:
          ultra_sun: "Aufgrund seines feinen Gefieders glückt die\nZurückverwandlung dieses urzeitlichen Pokémon\nnur Experten mit langjähriger Erfahrung."
          ultra_moon: "Es gilt als Urahn aller Vogel-Pokémon. Da die\nMuskeln an seinen Flügeln noch zu schwach\nsind, kann es nur mit Anlauf fliegen."
        es:
          ultra_sun: "Pokémon vetusto de plumaje tan fino que solo\nalguien con extremada pericia puede regenerar\na partir de un fósil."
          ultra_moon: "Precursor de los Pokémon pájaro. Para alzar el\nvuelo necesita coger carrerilla, debido a una\nmusculatura en las alas poco desarrollada."
        ko:
          ultra_sun: "깃털이 매우 가늘어\n숙련된 장인이 아니면 복원에\n실패한다고 전해지는 고대의 포켓몬."
          ultra_moon: "새포켓몬의 조상이라 불린다.\n날갯짓하는 근육은 아직 약해서\n도움닫기를 하지 않으면 날 수 없다."
        zh_simp:
          ultra_sun: "古代的宝可梦。\n因为羽毛很细，所以如果不是\n熟练的匠人，就会复原失败。"
          ultra_moon: "据说是鸟宝可梦的祖先。\n挥动翅膀的肌肉还很弱，\n必须助跑才能飞起来。"
        zh_trad:
          ultra_sun: "古代的寶可夢。\n因為羽毛很細，若不是由熟練的\n師傅來動手，就無法成功復原。"
          ultra_moon: "據說是鳥寶可夢的祖先。\n用來振翅的肌肉還很弱，\n必須靠助跑才能飛起來。"
