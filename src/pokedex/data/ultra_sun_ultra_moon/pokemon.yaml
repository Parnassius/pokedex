      descriptions:
        jp_kana:
          ultra_sun: "ついに　とべたよろこびで　おおぞらを\nかけめぐる。　つかれはて　ねむるまで\nちじょうに　ほとんど　おりてこない。"
          ultra_moon: "つよく　ねがいつづけて　きた　けっか\nからだの　さいぼうが　とつぜんへんい。\nねんがんの　つばさを　てにいれた。"
        jp_kanji:
          ultra_sun: "ついに　飛べた喜びで　大空を\n駆け巡る。　疲れ果て　眠るまで\n地上に　ほとんど　降りてこない。"
          ultra_moon: "強く　願い続けて　きた　結果\n身体の　細胞が　突然変異。\n念願の　翼を　手に入れた。"
        en:
          ultra_sun: "Overjoyed at finally being able to fly, it flies all\nover the place and usually doesn’t land until it’s\ncompletely exhausted and needs to sleep."
          ultra_moon: "Thanks to its fervent wishes, the cells in its\nbody finally mutated, and at last it has its\nheart’s desire—wings."
        fr:
          ultra_sun: "Maintenant qu’il peut enfin voler, il passe tout\nson temps à parcourir le ciel et ne redescend\nque quand il tombe d’épuisement."
          ultra_moon: "Après avoir prié jour et nuit de tout son cœur,\nson souhait a enfin été exaucé : ses cellules\nont muté pour donner naissance à des ailes !"
        it:
          ultra_sun: "Esprime la sua gioia di essere finalmente in\ngrado di volare scorrazzando nel cielo e scende\na terra solo quando è sfinito e assonnato."
          ultra_moon: "Il suo intenso desiderio di volare ha provocato\nuna mutazione cellulare che ha fatto nascere le\ntanto agognate ali."
        de:
          ultra_sun: "Voller Freude darüber, endlich fliegen zu können,\nkreist es am Himmel. Es kommt erst wieder zu\nBoden, wenn es am Rande der Erschöpfung ist."
          ultra_moon: "Als Ergebnis seines lang gehegten Wunsches\nhaben seine Zellen eine plötzliche Mutation\nvollzogen und ihm sind Flügel gewachsen."
        es:
          ultra_sun: "Ahora que por fin puede volar, surca los cielos\ncon una sonrisa en el rostro. No pisa tierra firme\na no ser que tenga que dormir o esté exhausto."
          ultra_moon: "Su fuerte y firme deseo de volar provocó una\nmutación repentina de su estructura celular que\nle permitió obtener las alas que tanto ansiaba."
        ko:
          ultra_sun: "드디어 날 수 있다는 기쁨에 넓은 하늘을\n날아다닌다. 지쳐서 잠들기 전까지\n지상으로 거의 내려오지 않는다."
          ultra_moon: "강하게 바라고 바란 결과\n몸의 세포가 돌연변이를 일으켜서\n염원하던 날개를 손에 넣었다."
        zh_simp:
          ultra_sun: "因为终于能飞的喜悦，\n而在天空四处疾飞。\n不到精疲力竭要睡觉就几乎不落地。"
          ultra_moon: "因为不断强烈地祈求着，\n结果身体的细胞发生了突然变异。\n终于得到了心心念念的翅膀。"
        zh_trad:
          ultra_sun: "因為終於能飛的喜悅而不斷\n在天空四處翱翔。在耗盡體力\n而入睡之前，幾乎不會降落。"
          ultra_moon: "在不斷地強烈祈求之下，\n身體的細胞發生了突變，\n讓牠得到了夢寐以求的翅膀。"
    salamence_mega:
      form_id: 1
      names:
        jp_kana: メガボーマンダ
        jp_kanji: メガボーマンダ
        en: Mega Salamence
        fr: Méga-Drattak
        it: MegaSalamence
        de: Mega-Brutalanda
        es: Mega-Salamence
        ko: 메가보만다
        zh_simp: 超级暴飞龙
        zh_trad: 超級暴飛龍
      base_stats:
        hp: 95
        attack: 145
        defense: 130
        special_attack: 120
        special_defense: 90
        speed: 120
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
