      descriptions:
        jp_kana:
          ultra_sun: "もともと　アローラには　いなかったが\nむかし　コラッタが　たいりょうに\nはっせいしたときに　つれてこられた。"
          ultra_moon: "とても　がまんづよい　せいしつだが\nこうぶつの　コラッタを　みつけると\nわれを　わすれて　とびかかるぞ。"
        jp_kanji:
          ultra_sun: "もともと　アローラには　いなかったが\n昔　コラッタが　大量に\n発生したときに　連れて来られた。"
          ultra_moon: "とても　我慢強い　性質だが\n好物の　コラッタを　見つけると\n我を　忘れて　飛びかかるぞ。"
        en:
          ultra_sun: "Although it wasn’t originally found in Alola, this\nPokémon was brought over a long time ago\nwhen there was a huge Rattata outbreak."
          ultra_moon: "Patient by nature, this Pokémon loses control of\nitself and pounces when it spots its favorite\nmeal—Rattata!"
        fr:
          ultra_sun: "À l’origine, on ne le trouvait pas à Alola,\nmais il y a été introduit il y a bien longtemps\npour faire face à la prolifération de Rattata."
          ultra_moon: "D’un naturel très patient, il ne peut toutefois\ns’empêcher de bondir sur son plat favori,\nRattata, s’il en voit un."
        it:
          ultra_sun: "È stato introdotto ad Alola in passato per\nfare fronte alla sovrappopolazione di Rattata."
          ultra_moon: "È un Pokémon molto paziente, ma quando\ntrova un Rattata, di cui va pazzo, perde\nil controllo e lo assale."
        de:
          ultra_sun: "Dieses Pokémon lebte ursprünglich nicht in Alola\nund wurde vor langer Zeit eingeführt, als es eine\nÜberpopulation von Rattfratz in der Region gab."
          ultra_moon: "Dieses Pokémon ist eigentlich sehr geduldig.\nSieht es jedoch ein Rattfratz, seine Leibspeise,\nstürzt es sich völlig außer Kontrolle auf es."
        es:
          ultra_sun: "No es autóctono de Alola, sino que se introdujo\npara paliar la superpoblación de Rattata que se\nprodujo en el pasado."
          ultra_moon: "Tiene un carácter muy paciente, pero en cuanto\navista un Rattata, su manjar predilecto, pierde\nel control y se lanza sobre él como un poseso."
        ko:
          ultra_sun: "원래 알로라에 없었지만,\n옛날 꼬렛이 대량으로\n발생했을 때 데려왔다."
          ultra_moon: "매우 인내심이 강한 성질이지만\n좋아하는 꼬렛을 발견하면\n이성을 잃고 덤벼든다."
        zh_simp:
          ultra_sun: "原本在阿罗拉是没有的，\n但过去小拉达大量出现的时候\n被带了过来。"
          ultra_moon: "忍耐力非常强，\n但如果见到它爱吃的小拉达，\n就会忘乎所以地扑过去。"
        zh_trad:
          ultra_sun: "原本沒有棲息在阿羅拉，\n是在過去小拉達大量繁殖的時候\n被人們帶過來的。"
          ultra_moon: "忍耐力非常強，然而只要\n看見自己愛吃的小拉達，\n就會立刻忘我地撲上去。"
