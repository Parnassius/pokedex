spearow:
  species_id: 21
  names:
    jp_kana: オニスズメ
    jp_kanji: オニスズメ
    en: Spearow
    fr: Piafabec
    it: Spearow
    de: Habitak
    es: Spearow
    ko: 깨비참
    zh_simp: 烈雀
    zh_trad: 烈雀
  forms:
    spearow:
      form_id: 0
      base_stats:
        hp: 40
        attack: 60
        defense: 30
        special_attack: 31
        special_defense: 31
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
