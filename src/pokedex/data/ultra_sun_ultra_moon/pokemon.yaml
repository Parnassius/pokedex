      abilities:
        - trace
        - download
      hidden_ability: analytic
      descriptions:
        jp_kana:
          ultra_sun: "ＡＩを　とうさい。　じりきで\nさまざまなことを　まなんでいくが\nよけいなことまで　おぼえだす。"
          ultra_moon: "うちゅうくうかん　でも　しなないが\nむじゅうりょく　では　うまく\nみうごきを　とることが　できない。"
        jp_kanji:
          ultra_sun: "ＡＩを　搭載。　自力で\n様々なことを　学んでいくが\n余計なことまで　覚えだす。"
          ultra_moon: "宇宙空間　でも　死なないが\n無重力　では　うまく\n身動きを　とることが　できない。"
        en:
          ultra_sun: "AI has been installed in it. It learns various\nthings all on its own, but it even remembers\nthings it doesn’t need to know."
          ultra_moon: "Even though it doesn’t die in the vacuum of\nspace, it can’t move around very well in\nzero gravity."
        fr:
          ultra_sun: "Grâce à son intelligence artificielle, il peut\napprendre beaucoup de choses par lui-même,\nqu’elles soient utiles... ou un peu superflues."
          ultra_moon: "Bien qu’il puisse survivre dans l’espace, il peine\nmalheureusement à se mouvoir en apesanteur."
        it:
          ultra_sun: "Dotato di intelligenza artificiale, è in grado di\nimparare autonomamente molte cose... anche\nquelle che non dovrebbe!"
          ultra_moon: "Sopravvive anche nello spazio, ma non è in\ngrado di muoversi agevolmente a causa\ndell’assenza di gravità."
        de:
          ultra_sun: "Es ist mit künstlicher Intelligenz ausgestattet\nund kann selbstständig verschiedene Dinge\nlernen. Darunter ist jedoch auch viel Unnützes."
          ultra_moon: "Es ist zwar imstande, auch im All zu überleben,\naber in der Schwerelosigkeit kann es sich nicht\ngut fortbewegen."
        es:
          ultra_sun: "Un Pokémon dotado de inteligencia artificial y\ncapacidad de aprendizaje autónomo, aunque a\nveces aprende cosas que no debería."
          ultra_moon: "Puede sobrevivir en el espacio, aunque la\nausencia de gravedad entorpece sus\nmovimientos."
        ko:
          ultra_sun: "AI를 탑재했다. 자력으로\n다양한 것을 습득하지만\n필요 없는 것까지 배운다."
          ultra_moon: "우주 공간에서도 죽지 않지만\n무중력 상태에서는\n제대로 몸을 가누지 못한다."
        zh_simp:
          ultra_sun: "搭载有ＡＩ。\n会自己学习各种各样的事情，\n但也会记住一些多余的东西。"
          ultra_moon: "虽然在宇宙空间里也不会死亡，\n但在无重力的环境下，\n它无法顺利地转动身体。"
        zh_trad:
          ultra_sun: "內建ＡＩ。\n會自己學習各式各樣的事物，\n但也會記住一些多餘的東西。"
          ultra_moon: "雖然在宇宙空間裡也不會死亡，\n但在無重力的環境下，\n牠根本無法順利活動身體。"
