      descriptions:
        jp_kana:
          ultra_sun: "しょくしゅに　すむ　バクテリアが\nランターンの　たいえきを　すうとき\nつよい　はっこうげんしょうが　おこる。"
          ultra_moon: "かいちゅうの　はるか　ふかくに　すむ。\nひかりで　えものの　めを　くらませて\nひるんだ　すきに　まるのみに　する。"
        jp_kanji:
          ultra_sun: "触手に　棲む　バクテリアが\nランターンの　体液を　吸うとき\n強い　発光現象が　起こる。"
          ultra_moon: "海中の　遥か　深くに　棲む。\n光で　獲物の　目を　くらませて\nひるんだ　隙に　丸呑みに　する。"
        en:
          ultra_sun: "When the bacteria living inside its antennae\nabsorb Lanturn’s bodily fluids, a strong\nluminescent effect is produced."
          ultra_moon: "It lives far down in the depths of the ocean. It\nblinds its prey with light, using the moment\nthey’re dazzled to swallow them whole."
        fr:
          ultra_sun: "Les bactéries nichées dans l’antenne de Lanturn\némettent une lumière vive quand elles aspirent\nses fluides corporels."
          ultra_moon: "Ce Pokémon des abysses immobilise ses proies\nen les aveuglant grâce à la lumière de son\nantenne, puis les gobe toutes crues."
        it:
          ultra_sun: "Quando i batteri nelle antenne di Lanturn\nassimilano i suoi fluidi corporei, scatenano una\nreazione che sprigiona una forte luce."
          ultra_moon: "Vive negli abissi più remoti. Abbaglia la preda\ncon la sua luce e approfitta del suo stordimento\nper ingoiarla in un sol boccone."
        de:
          ultra_sun: "In Lanturns Antennen leben Bakterien, die seine\nKörperflüssigkeiten aufnehmen und so ein\neindrucksvolles Lichtspektakel auslösen."
          ultra_moon: "Dieses tief im Meer lebende Pokémon blendet\nseine Beute mit dem Licht seiner Antennen und\nverschlingt sie anschließend mit einem Schluck."
        es:
          ultra_sun: "Cuando las bacterias que viven en sus antenas\nabsorben sus fluidos corporales, sufren una\nreacción que libera una luz intensa."
          ultra_moon: "Vive en lo más profundo del océano. Deslumbra\na su presa con la luz de sus antenas y, mientras\nestá confusa, la engulle de un bocado."
        ko:
          ultra_sun: "촉수에 사는 박테리아가\n랜턴의 체액을 빨아들일 때\n강한 발광 현상이 일어난다."
          ultra_moon: "바닷속 깊고 깊은 곳에 산다.\n빛으로 먹이의 눈을 멀게 해서\n풀이 죽은 틈을 타 통째로 삼킨다."
        zh_simp:
          ultra_sun: "栖息在触手里的细菌在\n吸食电灯怪的体液时，\n会产生强烈的发光现象。"
          ultra_moon: "栖息在深邃的海里。\n会用光眩晕猎物，并趁对方\n畏缩时将其整个吞下。"
        zh_trad:
          ultra_sun: "當棲息在觸手中的細菌\n吸食電燈怪的體液時，\n會產生強烈的發光現象。"
          ultra_moon: "棲息在很深的海底。會用\n刺眼的光線讓獵物看不見東西，\n再趁對方畏縮時一口吞下。"
pichu:
