      descriptions:
        jp_kana:
          ultra_sun: "ふくらんだ　クチバシの　なかに\nちいさなポケモンを　いれて　はこぶ。\nどこに　つれていくのかは　わからない。"
          ultra_moon: "おおきな　クチバシで　ヨワシを\nすくって　まるのみに　する。　１どで\n３０ぴき　いじょうを　たいらげるぞ。"
        jp_kanji:
          ultra_sun: "膨らんだ　クチバシの　中に\n小さなポケモンを　入れて　運ぶ。\nどこに　連れていくのかは　わからない。"
          ultra_moon: "大きな　クチバシで　ヨワシを\nすくって　丸呑みに　する。　１度で\n３０匹　以上を　平らげるぞ。"
        en:
          ultra_sun: "It places small Pokémon into its spacious beak\nand carries them around. No one knows where\nit’s taking them."
          ultra_moon: "It scoops up Wishiwashi in its huge beak and\nswallows them whole. It can devour more than\n30 at one go!"
        fr:
          ultra_sun: "Il se sert de son énorme bec pour transporter\nde petits Pokémon, mais nul ne sait où il les\nemporte..."
          ultra_moon: "Il pêche les Froussardine à l’aide de son large\nbec et les avale d’un trait. Il peut en ingurgiter\njusqu’à trente d’un coup."
        it:
          ultra_sun: "Trasporta piccoli Pokémon tenendoli nel suo\nenorme becco, ma non si sa dove li porti."
          ultra_moon: "Pesca i Wishiwashi con l’enorme becco e li\ninghiotte in un sol boccone. Può mangiarne\nanche 30 per volta."
        de:
          ultra_sun: "In seinem riesigen Schnabel transportiert es\nkleine Pokémon. Niemand weiß, wohin es sie\nbringt."
          ultra_moon: "Mit seinem großen Schnabel schöpft es Lusardin\naus dem Wasser und schluckt sie im Ganzen.\nEs kann über 30 Stück auf einmal verspeisen."
        es:
          ultra_sun: "Transporta Pokémon pequeños en su enorme\npico, aunque nadie sabe a dónde los lleva."
          ultra_moon: "Atrapa Wishiwashi con su enorme pico para\nluego engullirlos enteros, llegando a comer más\nde 30 ejemplares de una sentada."
        ko:
          ultra_sun: "부풀린 부리 안에\n작은 포켓몬을 넣어 운반한다.\n어디로 데려가는지는 알 수 없다."
          ultra_moon: "커다란 부리로 약어리를\n건져 올려 통째로 삼킨다.\n한 번에 30마리 이상 먹어 치운다."
        zh_simp:
          ultra_sun: "会将小型宝可梦放入它那鼓得\n大大的鸟嘴中运送。但是要把它\n带到哪儿去就不得而知了。"
          ultra_moon: "会用大大的鸟嘴捞起\n弱丁鱼后整个吞下。\n一次可吃下３０只以上。"
        zh_trad:
          ultra_sun: "會把小型寶可夢裝進牠那\n脹鼓鼓的鳥嘴中運送，\n但沒人知道會被牠帶到哪裡去。"
          ultra_moon: "會用大大的鳥嘴\n撈起弱丁魚然後吞下。\n一次可以吃下３０隻以上。"
