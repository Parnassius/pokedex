lycanroc:
  species_id: 745
  names:
    jp_kana: ルガルガン
    jp_kanji: ルガルガン
    en: Lycanroc
    fr: Lougaroc
    it: Lycanroc
    de: Wolwerock
    es: Lycanroc
    ko: 루가루암
    zh_simp: 鬃岩狼人
    zh_trad: 鬃岩狼人
  forms:
    lycanroc_midday_form:
      form_id: 0
      names:
        jp_kana: まひるのすがた
        jp_kanji: まひるのすがた
        en: Midday Form
        fr: Forme Diurne
        it: Forma Giorno
        de: Tagform
        es: Forma Diurna
        ko: 한낮의 모습
        zh_simp: 白昼的样子
        zh_trad: 白晝的樣子
      base_stats:
        hp: 75
        attack: 115
        defense: 65
        special_attack: 55
        special_defense: 65
        speed: 112
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - keen_eye
        - sand_rush
      hidden_ability: steadfast
      descriptions:
        jp_kana:
          ultra_sun: "タテガミのいわは　するどく　ナイフの\nような　きれあじ。　じわじわ　えものを\nおいつめ　よわらせて　しとめる。"
          ultra_moon: "タテガミの　いわは　ナイフより\nするどい　きれあじ。　かけた　はへんは\nおまもり　として　たいせつに　される。"
        jp_kanji:
          ultra_sun: "タテガミの岩は　鋭く　ナイフの\nような　切れ味。　じわじわ　獲物を\n追い詰め　弱らせて　仕留める。"
          ultra_moon: "タテガミの　岩は　ナイフより\n鋭い　切れ味。　欠けた　破片は\nお守り　として　大切に　される。"
        en:
          ultra_sun: "The sharp rocks in its mane can cut like knives.\nLycanroc wears its prey down by degrees\nbefore finishing them off."
          ultra_moon: "The rocks in its mane are sharper than a knife.\nFragments that break off are treasured as\ngood luck charms."
        fr:
          ultra_sun: "Les rocs de sa crinière sont aiguisés comme\ndes couteaux. Il poursuit patiemment sa cible\npour l’affaiblir et lui porter le coup de grâce."
          ultra_moon: "Les rocs de sa crinière sont plus acérés que\ndes couteaux. Les morceaux qui s’en détachent\nsont considérés comme des porte-bonheur."
        it:
          ultra_sun: "La sua criniera di roccia è affilata come la lama\ndi un coltello. Segue la preda senza mai perderla\ndi vista e quando è stanca le dà il colpo finale."
          ultra_moon: "La sua criniera di roccia è più affilata della lama\ndi un coltello. Le sue schegge sono considerate\ndei preziosi portafortuna."
        de:
          ultra_sun: "Seine steinerne Mähne ist scharf wie ein Messer.\nEs verfolgt seine Beute mit viel Geduld, bis diese\ndie Kräfte verlassen, und erlegt sie dann."
          ultra_moon: "Seine steinerne Mähne ist schärfer als ein\nMesser. Abgebrochene Stücke gelten als\nwertvolle Glücksbringer."
        es:
          ultra_sun: "Su melena de piedra es tan afilada como un\ncuchillo. Hostiga a su presa sin cesar hasta\nagotarla, para luego asestarle el golpe de gracia."
          ultra_moon: "Su melena de piedra es más afilada incluso\nque un cuchillo. Los fragmentos que se le\ndesprenden son muy codiciados como amuleto."
        ko:
          ultra_sun: "바위로 된 갈기는 날카로운 나이프처럼\n잘 잘린다. 천천히 먹이를 궁지로 몰아\n약하게 만든 후 숨통을 끊는다."
          ultra_moon: "갈기에 있는 바위는 나이프보다\n예리하고 날카롭다. 떨어진 파편은\n부적으로써 소중히 여겨진다."
        zh_simp:
          ultra_sun: "鬃毛里的岩石像刀子一样锋利。\n会对猎物穷追不舍，\n待其慢慢虚弱后再给予致命一击。"
          ultra_moon: "鬃毛里的岩石比刀子还要锋利。\n掉落的碎片作为护身符\n而被人们收藏。"
        zh_trad:
          ultra_sun: "鬃毛裡的岩石像刀子一樣鋒利。\n會對獵物窮追不捨，等獵物\n筋疲力盡時再給予致命一擊。"
          ultra_moon: "鬃毛裡的岩石比刀子還要鋒利。\n掉落的碎片會被人\n當成護身符好好收藏著。"
    lycanroc_midnight_form:
      form_id: 1
      names:
        jp_kana: まよなかのすがた
        jp_kanji: まよなかのすがた
        en: Midnight Form
        fr: Forme Nocturne
        it: Forma Notte
        de: Nachtform
        es: Forma Nocturna
        ko: 한밤중의 모습
        zh_simp: 黑夜的样子
        zh_trad: 黑夜的樣子
      base_stats:
        hp: 85
        attack: 115
        defense: 75
        special_attack: 55
        special_defense: 75
        speed: 82
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - keen_eye
        - vital_spirit
      hidden_ability: no_guard
      descriptions:
        jp_kana:
          ultra_sun: "きにいらない　めいれいは　へいきで\nむし。　あいてを　しとめるためなら\nきずつくことも　まるで　きにしない。"
          ultra_moon: "むれを　つくらず　１ぴきで　くらす。\nじぶんの　ちからを　ひきだしてくれる\nトレーナーの　いうことしか　きかない。"
        jp_kanji:
          ultra_sun: "気に入らない　命令は　平気で\n無視。　相手を　仕留めるためなら\n傷つくことも　まるで　気にしない。"
          ultra_moon: "群れを　作らず　１匹で　暮らす。\n自分の　力を　引き出してくれる\nトレーナーの　いうことしか　聞かない。"
        en:
          ultra_sun: "It has no problem ignoring orders it doesn’t like.\nIt doesn’t seem to mind getting hurt at all—as\nlong as it can finish off its opponent."
          ultra_moon: "They live alone without forming packs. They will\nonly listen to orders from Trainers who can\ndraw out their true power."
        fr:
          ultra_sun: "Il n’hésite pas à ignorer les ordres qui ne lui\nplaisent pas. Il est prêt à tout pour battre son\nadversaire, même s’il n’en sort pas indemne."
          ultra_moon: "Cet habitué à la vie en solitaire n’obéit qu’aux\nDresseurs qui savent exploiter tout le potentiel\nde sa force."
        it:
          ultra_sun: "Ignora bellamente gli ordini che non gli vanno\na genio. Il suo unico obiettivo è sconfiggere\nil nemico, al prezzo di qualunque ferita."
          ultra_moon: "Vive solitario, senza mai formare un branco.\nDà retta solamente agli Allenatori che riescono\na tirare fuori tutto il suo potenziale."
        de:
          ultra_sun: "Befehle, die ihm nicht zusagen, missachtet es\neinfach. Um den Gegner zu besiegen, nimmt es\nauch Verletzungen in Kauf."
          ultra_moon: "Diese Pokémon sind Einzelgänger und bilden\nkeine Rudel. Sie gehorchen nur Trainern, die es\nschaffen, ihnen ihre ganze Kraft zu entlocken."
        es:
          ultra_sun: "Si no está de acuerdo con una orden, no duda\nen ignorarla. No le importa salir herido con tal\nde derrotar al oponente."
          ultra_moon: "Vive en soledad, sin depender de otros. Solo\nconfía en los Entrenadores que saben sacar a\nrelucir toda su fuerza."
        ko:
          ultra_sun: "마음에 안 드는 명령은 무시한다.\n상대의 숨통을 끊기 위해서라면\n상처 입는 것도 전혀 개의치 않는다."
          ultra_moon: "무리를 짓지 않고 홀로 지낸다.\n자신의 힘을 끌어내 주는\n트레이너의 말밖에 듣지 않는다."
        zh_simp:
          ultra_sun: "对于不喜欢的命令会\n淡定地无视。为了解决对手，\n即使受伤了也完全不在意。"
          ultra_moon: "不集结成群，而是单独１只生活。\n只听从于能引出自己力量的训练家。"
        zh_trad:
          ultra_sun: "會毫不猶豫地忽視\n自己不喜歡的命令。只要能解決對手，\n就算自己受傷也完全不在意。"
          ultra_moon: "不集結成群，而是單獨生活。\n只會聽命於能夠引出\n自己力量的訓練家。"
    lycanroc_dusk_form:
      form_id: 2
      names:
        jp_kana: たそがれのすがた
        jp_kanji: たそがれのすがた
        en: Dusk Form
        fr: Forme Crépusculaire
        it: Forma Crepuscolo
        de: Zwielichtform
        es: Forma Crepuscular
        ko: 황혼의 모습
        zh_simp: 黄昏的样子
        zh_trad: 黃昏的樣子
      base_stats:
        hp: 75
        attack: 117
        defense: 65
        special_attack: 55
        special_defense: 65
        speed: 110
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - field
      abilities:
        - tough_claws
      descriptions:
        jp_kana:
          ultra_sun: "ゆうひを　あび　とくべつな　しんかを\nした　ルガルガン。　ものしずかだが\nはげしい　とうしを　ひめている。"
          ultra_moon: "たそがれどきに　しんかした　けっか\nなぜか　かわった　すがたに。\nアローラでは　とても　めずらしい。"
        jp_kanji:
          ultra_sun: "夕日を　浴び　特別な　進化を\nした　ルガルガン。　もの静かだが\n激しい　闘志を　秘めている。"
          ultra_moon: "黄昏時に　進化した　結果\nなぜか　変わった　姿に。\nアローラでは　とても　珍しい。"
        en:
          ultra_sun: "Bathed in the setting sun of evening, Lycanroc\nhas undergone a special kind of evolution.\nAn intense fighting spirit underlies its calmness."
          ultra_moon: "This strange form is the result of its evolving at\ndusk. It’s very rare in Alola."
        fr:
          ultra_sun: "Ce Lougaroc a subi une évolution spéciale en\nétant irradié par les rayons du soleil couchant.\nSon calme cache une combativité hors norme."
          ultra_moon: "Ce Lougaroc a adopté une forme étrange en\névoluant au coucher du soleil. C’est un spécimen\nparticulièrement rare à Alola."
        it:
          ultra_sun: "Un Lycanroc speciale, evolutosi alla luce del\ntramonto. Sotto l’apparente calma, nasconde\nun impetuoso spirito combattivo."
          ultra_moon: "Misteriosa evoluzione di Lycanroc che si verifica\nsolo al crepuscolo.\nAd Alola è un esemplare molto raro."
        de:
          ultra_sun: "Diese besondere Entwicklung vollzog es durch\nein Bad in der Abendsonne. Es wirkt zwar ruhig,\naber in ihm schlummert ein großer Kampfgeist."
          ultra_moon: "Eine eigenartige Form, die durch die Entwicklung\nim abendlichen Zwielicht entstand. In ganz Alola\nscheint es kein weiteres Exemplar zu geben."
        es:
          ultra_sun: "Lycanroc evoluciona a esta forma especial\ncuando se expone al sol del atardecer. Parece\npacífico, pero posee un gran espíritu combativo."
          ultra_moon: "Cuando Lycanroc evoluciona al atardecer\nadopta esta peculiar forma, de la que se ven\nmuy pocos ejemplares en Alola."
        ko:
          ultra_sun: "석양빛으로 특별하게 진화한\n루가루암. 차분하지만\n격렬한 투지를 숨기고 있다."
          ultra_moon: "황혼 때 진화한 결과\n어찌 된 일인지 희귀한 모습이 되었다.\n알로라에서는 매우 드물다."
        zh_simp:
          ultra_sun: "沐浴着夕阳而发生了\n特殊进化的鬃岩狼人。\n很安静，却蕴藏着强烈的斗志。"
          ultra_moon: "在黄昏时进化了，\n结果不知怎么变成了别的样子。\n在阿罗拉是非常珍稀的。"
        zh_trad:
          ultra_sun: "在夕陽照射下完成\n特殊進化的鬃岩狼人。\n舉止沉穩，但蘊藏著強烈的鬥志。"
          ultra_moon: "在黃昏時進化的結果，\n不知為何變成這種奇特的樣子。\n在阿羅拉地區是很難得一見的。"
wishiwashi:
  species_id: 746
  names:
    jp_kana: ヨワシ
    jp_kanji: ヨワシ
    en: Wishiwashi
    fr: Froussardine
    it: Wishiwashi
    de: Lusardin
    es: Wishiwashi
    ko: 약어리
    zh_simp: 弱丁鱼
    zh_trad: 弱丁魚
  forms:
    wishiwashi_solo_form:
      form_id: 0
      names:
        jp_kana: たんどくのすがた
        jp_kanji: たんどくのすがた
        en: Solo Form
        fr: Forme Solitaire
        it: Forma Individuale
        de: Einzelform
        es: Forma Individual
        ko: 단독의 모습
        zh_simp: 单独的样子
        zh_trad: 單獨的樣子
      base_stats:
        hp: 45
        attack: 20
        defense: 20
        special_attack: 25
        special_defense: 25
        speed: 40
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - schooling
      descriptions:
        jp_kana:
          ultra_sun: "よわいので　むれで　こうどう。\nだが　はぐれて　１ぴきで　およぐ\nすがたを　みかけることも　おおい。"
          ultra_moon: "ピンチに　なると　ひとみを　ひからせ\nなかまを　よぶ。　その　ひかりは\n４０キロメートル　さきまで　とどく。"
        jp_kanji:
          ultra_sun: "弱いので　群れで　行動。\nだが　はぐれて　１匹で　泳ぐ\n姿を　見かけることも　多い。"
          ultra_moon: "ピンチに　なると　瞳を　光らせ\n仲間を　呼ぶ。　その　光は\n４０キロメートル　先まで　届く。"
        en:
          ultra_sun: "They’re weak, so they move in schools.\nHowever, they can also often be seen all alone,\nhaving strayed from the school."
          ultra_moon: "When it’s in a jam, its shining eyes attract\nothers of its kind. The light from its eyes is\nvisible almost 25 miles away."
        fr:
          ultra_sun: "Il se déplace en banc pour pallier sa faiblesse,\nmais il n’est pas rare de voir un Froussardine\nnager en solitaire."
          ultra_moon: "Il fait briller ses pupilles pour rameuter\nses congénères lorsque la situation tourne\nmal. Le signal est visible à 40 km de distance."
        it:
          ultra_sun: "È molto debole, per questo agisce sempre con\nil suo banco. Spesso, però, si vedono esemplari\nvagare da soli dopo aver perso di vista gli altri."
          ultra_moon: "Quando si trova in difficoltà chiede aiuto ai\nsuoi compagni emettendo una luce dalle pupille\nvisibile fino a 40 km di distanza."
        de:
          ultra_sun: "Es bewegt sich nur im Schwarm fort, da es sehr\nschwach ist. Oft sieht man aber auch einzelne\nExemplare, die vom Schwarm getrennt wurden."
          ultra_moon: "Bei Gefahr ruft es seine Artgenossen herbei,\nindem es seine Augen aufglänzen lässt. Dieses\nLicht ist 40 km weit zu sehen."
        es:
          ultra_sun: "Se agrupan debido a su manifiesta debilidad,\naunque también se suelen avistar nadando\nen solitario, separados de su banco."
          ultra_moon: "Al sentirse amenazado, alerta a sus congéneres\nemitiendo un brillo por las pupilas que puede\nverse incluso a 40 kilómetros de distancia."
        ko:
          ultra_sun: "약해서 무리 지어 행동한다.\n하지만 혼자 떨어져서 헤엄치는\n모습도 자주 볼 수 있다."
          ultra_moon: "위험해지면 눈을 반짝여서\n동료를 부른다. 그 빛은\n40km 밖까지 도달한다."
        zh_simp:
          ultra_sun: "因为很弱小，所以会群体行动。\n但也经常能见到走散后\n独自１只在游泳的样子。"
          ultra_moon: "遇到危机时，会让瞳孔发光来呼唤伙伴。\n那光线能抵达４０公里开外的地方。"
        zh_trad:
          ultra_sun: "因為很弱小，總是以群體行動。\n但也能經常見到與群體走散了的\n弱丁魚單獨游動的樣子。"
          ultra_moon: "遇到危機時會讓眼睛發光\n來呼喚夥伴。那種光能夠\n傳到４０公里遠的地方。"
    wishiwashi_school_form:
      form_id: 1
      names:
        jp_kana: むれたすがた
        jp_kanji: むれたすがた
        en: School Form
        fr: Forme Banc
        it: Forma Banco
        de: Schwarmform
        es: Forma Banco
        ko: 군집의 모습
        zh_simp: 鱼群的样子
        zh_trad: 魚群的樣子
      base_stats:
        hp: 45
        attack: 140
        defense: 130
        special_attack: 140
        special_defense: 135
        speed: 30
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - schooling
      descriptions:
        jp_kana:
          ultra_sun: "ヨワシたちが　てきに　たちむかうため\nじんけいを　くんだ。　うみのまものと\nよばれるほどの　ちからを　ほこる。"
          ultra_moon: "うみの　まものと　よばれて　いる。\nたたかいで　きずつき　ヨワシのかずが\nへると　ただの　むれに　もどる。"
        jp_kanji:
          ultra_sun: "ヨワシたちが　敵に　立ち向かうため\n陣形を　組んだ。　海の魔物と\n呼ばれるほどの　力を　誇る。"
          ultra_moon: "海の　魔物と　呼ばれて　いる。\n戦いで　傷つき　ヨワシの数が\n減ると　ただの　群れに　戻る。"
        en:
          ultra_sun: "Wishiwashi assemble in this formation to face\noff against strong foes. It boasts a strength\nthat earned it the name “demon of the sea.”"
          ultra_moon: "Called “demon of the sea” by some, when\nWishiwashi are injured in battle and their\nnumbers dwindle, they become a regular school."
        fr:
          ultra_sun: "Il prend cette forme quand ses congénères se\njoignent à lui pour affronter un adversaire. Il est\nsi fort qu’on l’appelle « le démon des mers »."
          ultra_moon: "On l’appelle « le démon des mers ». Quand trop\nde Froussardine tombent sous les coups de\nl’ennemi, le banc reprend une activité normale."
        it:
          ultra_sun: "I Wishiwashi si uniscono in questa forma per\naffrontare il nemico. La forza di questa creatura\nle ha valso il nome di “Demone del mare”."
          ultra_moon: "Viene chiamato anche “Demone del mare”.\nSe troppi Wishiwashi scappano per le ferite\nriportate, il banco si disperde."
        de:
          ultra_sun: "Diese Form nehmen Lusardin an, um ihrem\nGegner zu trotzen. Aufgrund der enormen Stärke\nnennt man sie auch „Ungeheuer der Meere“."
          ultra_moon: "Auch „Ungeheuer der Meere“ genannt. Wird es\nim Kampf verletzt, sinkt die Zahl der Lusardin\nund sie bilden einen gewöhnlichen Schwarm."
        es:
          ultra_sun: "Un banco de Wishiwashi que se han agrupado\npara plantar cara al enemigo. Su fuerza les\nmerece el apodo de la Bestia del Mar."
          ultra_moon: "Es conocido como la Bestia del Mar. Si el número\nde Wishiwashi heridos durante el combate sube\nmucho, el banco vuelve a ser inofensivo."
        ko:
          ultra_sun: "약어리들이 적에게 맞서기 위해\n진형을 짰다. 바다의 요괴라고\n불릴 정도의 힘을 자랑한다."
          ultra_moon: "바다의 마물이라 불린다.\n싸움으로 상처를 입어 약어리의 수가\n줄어들면 평범한 무리로 돌아간다."
        zh_simp:
          ultra_sun: "弱丁鱼们为了对抗敌人而\n组成了阵型。以被称之为\n海之魔物的力量而自豪。"
          ultra_moon: "被称为海之魔物。\n如果在战斗中受伤，弱丁鱼数量减少，\n就会回到普通的群体状态。"
        zh_trad:
          ultra_sun: "弱丁魚們為了對抗敵人\n而組成了陣形。以被人們\n稱為海中魔物的力量為傲。"
          ultra_moon: "被稱為海中魔物。如果在\n戰鬥中受傷，導致弱丁魚數量減少，\n就會變回普通的群體。"
mareanie:
  species_id: 747
  names:
    jp_kana: ヒドイデ
    jp_kanji: ヒドイデ
    en: Mareanie
    fr: Vorastérie
    it: Mareanie
    de: Garstella
    es: Mareanie
    ko: 시마사리
    zh_simp: 好坏星
    zh_trad: 好壞星
  forms:
    mareanie:
      form_id: 0
      base_stats:
        hp: 50
        attack: 53
        defense: 62
        special_attack: 43
        special_defense: 52
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - water
      egg_groups:
        - water_1
      abilities:
        - merciless
        - limber
      hidden_ability: regenerator
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          ultra_sun: "サニーゴのえだを　くうので　しぜんに\nおちた　えだを　あつめて　かこうする\nしょくにんたちに　にくまれている。"
          ultra_moon: "あたま　いがいの　ばしょ　なら\nちぎれても　すぐに　さいせいする。\nひとばん　ねむれば　もとどおりだ。"
        jp_kanji:
          ultra_sun: "サニーゴの枝を　食うので　自然に\n落ちた　枝を　集めて　加工する\n職人たちに　憎まれている。"
          ultra_moon: "頭　以外の　場所　なら\nちぎれても　すぐに　再生する。\n一晩　眠れば　元通りだ。"
        en:
          ultra_sun: "They eat Corsola branches, so Mareanie are\nhated by craftsmen who work with Corsola\nbranches that have naturally fallen off."
          ultra_moon: "Aside from its head, its body parts\nregenerate quickly if they’re cut off. After a\ngood night’s sleep, Mareanie is back to normal."
        fr:
          ultra_sun: "Son amour des cornes de Corayon lui vaut\nl’hostilité des artisans qui les récoltent dans\nla nature pour en faire des objets."
          ultra_moon: "Une nuit lui suffit à régénérer n’importe quelle\npartie de son corps, à l’exception de sa tête,\net ce, quelle que soit l’étendue des dégâts."
        it:
          ultra_sun: "Poiché mangia i coralli dei Corsola, non è visto\ndi buon occhio dagli artigiani che raccolgono\ne lavorano i rametti caduti spontaneamente."
          ultra_moon: "A condizione che la testa rimanga intatta, anche\nse gli staccano qualche pezzo si rigenera subito.\nDopo una notte di riposo ritorna come nuovo."
        de:
          ultra_sun: "Die Arme von Corasonn sind seine Leibspeise.\nHandwerker, die natürlich abgefallene Arme von\nCorasonn verarbeiten, mögen sie deshalb nicht."
          ultra_moon: "Bis auf den Kopf wachsen all seine Körperteile\nschnell nach, wenn sie abgetrennt werden.\nDafür muss es nur eine Nacht durchschlafen."
        es:
          ultra_sun: "Los artesanos intentan exterminarlo porque se\ncome las ramas de los Corsola, que ellos solo\nrecogen al desprenderse de forma natural."
          ultra_moon: "Salvo la cabeza, cualquier parte del cuerpo que\nle arranquen es capaz de regenerarse en tan\nsolo una noche de descanso."
        ko:
          ultra_sun: "코산호의 가지를 먹기 때문에 자연스럽게\n떨어지는 가지를 모아 가공하는\n장인들의 미움을 받고 있다."
          ultra_moon: "머리 이외의 곳이라면\n찢겨 나가더라도 금방 재생한다.\n하룻밤 자고 나면 원래대로 돌아온다."
        zh_simp:
          ultra_sun: "因为它会吃太阳珊瑚的枝，\n所以被收集自然掉落的枝\n来加工的匠人们所厌恶。"
          ultra_moon: "如果是头部以外的地方，\n即使切成碎片也能立刻再生。\n只要睡一晚就能恢复原样。"
        zh_trad:
          ultra_sun: "因為牠會吃太陽珊瑚的枝條，\n所以專門收集自然掉落的枝條\n來加工的工匠們很討厭牠。"
          ultra_moon: "如果是頭部以外的部位，\n就算被切碎也能立刻再生，\n只要睡一晚就能回復原狀。"
toxapex:
  species_id: 748
  names:
    jp_kana: ドヒドイデ
    jp_kanji: ドヒドイデ
    en: Toxapex
    fr: Prédastérie
    it: Toxapex
    de: Aggrostella
    es: Toxapex
    ko: 더시마사리
    zh_simp: 超坏星
    zh_trad: 超壞星
  forms:
    toxapex:
      form_id: 0
      base_stats:
        hp: 50
        attack: 63
        defense: 152
        special_attack: 53
        special_defense: 142
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - poison
        - water
      egg_groups:
        - water_1
      abilities:
        - merciless
        - limber
      hidden_ability: regenerator
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          ultra_sun: "もうどくの　トゲを　とばして　てきを\nこうげき。　ちかづいてきた　あいては\nあしの　ツメで　なぎはらうぞ。"
          ultra_moon: "１２ほんの　あしで　なかみを　まもる\nドームを　つくる。　しおの　ながれを\nうけないので　とても　すごしやすいぞ。"
        jp_kanji:
          ultra_sun: "猛毒の　トゲを　飛ばして　敵を\n攻撃。　近づいてきた　相手は\n足の　ツメで　薙ぎ払うぞ。"
          ultra_moon: "１２本の　足で　中身を　守る\nドームを　作る。　潮の　流れを\n受けないので　とても　過ごしやすいぞ。"
        en:
          ultra_sun: "To attack, this Pokémon sends toxic spikes\nflying at its enemies. Ones that come close get\nmown down by the claws on its feet."
          ultra_moon: "With its 12 legs, it creates a dome to shelter\nwithin. The flow of the tides doesn’t affect\nToxapex in there, so it’s very comfortable."
        fr:
          ultra_sun: "Il attaque ses ennemis en projetant des épines\nempoisonnées, et il utilise ses griffes pour\ntranspercer ceux qui l’approchent de trop près."
          ultra_moon: "Avec ses douze pattes, il crée un dôme\nprotecteur qui lui permet de ne pas subir\nl’influence des marées."
        it:
          ultra_sun: "Attacca il nemico lanciando aculei velenosi.\nFalcia i nemici che gli si avvicinano con gli\nartigli dei suoi tentacoli."
          ultra_moon: "Con i suoi 12 tentacoli, forma una cupola\nprotettiva che resiste anche alle correnti\nmarine e assicura un piacevole riparo."
        de:
          ultra_sun: "Es feuert hochgiftige Dornen auf seine Gegner\nab. Kommen sie ihm zu nahe, mäht es sie mit\nden Krallen an seinen Beinen nieder."
          ultra_moon: "Seine zwölf Beine bilden eine schützende\nKuppel, in der es sich gut leben lässt, da das\nInnere nicht von der Strömung erfasst wird."
        es:
          ultra_sun: "Ataca a su enemigo lanzándole unas espinas\nextremadamente venenosas. Si este se acerca,\nlo acribilla con las garras de sus extremidades."
          ultra_moon: "Sus doce extremidades forman una cúpula que\nprotege el interior. Este es todo un remanso de\npaz, ya que no se ve afectado por las mareas."
        ko:
          ultra_sun: "맹독의 가시를 날려서\n적을 공격한다. 다가온 상대는\n발톱으로 쓸어버린다."
          ultra_moon: "12개의 다리로 내부를 지키는\n돔을 만든다. 조수의 흐름에\n영향을 받지 않아 매우 쾌적하다."
        zh_simp:
          ultra_sun: "会射出有剧毒的尖刺攻击敌人。\n用脚上的爪子扫平靠近的对手。"
          ultra_moon: "用１２只脚制作圆顶保护身体。\n因为不会受到潮水流动的影响，\n日子很好过。"
        zh_trad:
          ultra_sun: "會射出帶有劇毒的尖刺\n攻擊敵人，並用腳上的爪子\n撂倒靠近自己的對手。"
          ultra_moon: "用１２隻腳製造保護身體的圓頂。\n裡頭不會受到潮水流動的影響，\n待起來非常舒適。"
mudbray:
  species_id: 749
  names:
    jp_kana: ドロバンコ
    jp_kanji: ドロバンコ
    en: Mudbray
    fr: Tiboudet
    it: Mudbray
    de: Pampuli
    es: Mudbray
    ko: 머드나기
    zh_simp: 泥驴仔
    zh_trad: 泥驢仔
  forms:
    mudbray:
      form_id: 0
      base_stats:
        hp: 70
        attack: 100
        defense: 70
        special_attack: 45
        special_defense: 55
        speed: 45
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
