      descriptions:
        jp_kana:
          ultra_sun: "ツノで　あたりの　ようすを　さぐる。\nとても　びんかんなので　にぎられると\nショックで　うごけなくなってしまう。"
          ultra_moon: "からだの　ほとんどは　すいぶん。\nかんそうすると　しんでしまうので\nいつも　ひかげで　じっと　している。"
        jp_kanji:
          ultra_sun: "ツノで　あたりの　様子を　探る。\nとても　敏感なので　握られると\nショックで　動けなくなってしまう。"
          ultra_moon: "身体の　ほとんどは　水分。\n乾燥すると　死んでしまうので\nいつも　日陰で　じっと　している。"
        en:
          ultra_sun: "It uses its horns to check out its surroundings.\nThey’re very sensitive, so if you grab them, it\nwill feel a strong shock and be unable to move."
          ultra_moon: "Its body is mostly water. If it dries out, it will\ndie, so it’s always sitting with perfect stillness\nin the shade."
        fr:
          ultra_sun: "Ses cornes lui permettent d’inspecter\nles alentours. Elles sont si sensibles que\ntout son corps se fige si on les pince."
          ultra_moon: "Son corps est majoritairement composé d’eau.\nIl meurt s’il se dessèche, aussi préfère-t-il vivre\ntapi dans l’ombre."
        it:
          ultra_sun: "I corni con cui sonda l’ambiente circostante sono\ncosì sensibili che, se qualcuno glieli afferra,\nil Pokémon resta pietrificato per lo shock."
          ultra_moon: "Il suo corpo è formato prevalentemente d’acqua\ne se si disidrata rischia di morire. Per questo\nse ne sta rintanato all’ombra."
        de:
          ultra_sun: "Mit seinen Fühlern tastet es die Umgebung ab.\nEs ist so empfindlich, dass es in Schockstarre\nverfällt, wenn man es in die Hand nimmt."
          ultra_moon: "Sein Körper besteht fast ausschließlich aus\nWasser. Trocknet es aus, stirbt es. Deshalb hält\nes sich immer bewegungslos im Schatten auf."
        es:
          ultra_sun: "Palpa los alrededores con sus cuernos. Estos\nson tan sensibles que se queda paralizado si\nalguien se los agarra."
          ultra_moon: "La mayor parte de su cuerpo está compuesto\npor agua, por lo que muere si llega a secarse.\nSiempre se le encuentra inmóvil en la sombra."
        ko:
          ultra_sun: "뿔로 주변의 상황을 살핀다.\n매우 민감하여 잡으면\n쇼크로 움직일 수 없게 된다."
          ultra_moon: "몸의 대부분이 수분이다.\n건조해지면 죽어 버리므로\n언제나 그늘에서 가만히 있다."
        zh_simp:
          ultra_sun: "用角探索周围的情况。\n非常敏感，所以只要被握住，\n就会因震惊而无法动弹。"
          ultra_moon: "身体几乎都是水分。\n如果干燥就会死亡，\n所以一直都静静地呆在背阴处。"
        zh_trad:
          ultra_sun: "會用角探查周圍的狀況。\n角非常敏感，一旦被握住，\n牠就會驚嚇到無法動彈。"
          ultra_moon: "身體絕大部分是水分，\n一旦乾燥就會死亡，\n所以總是靜靜待在陰暗處。"
sliggoo:
  species_id: 705
  names:
    jp_kana: ヌメイル
    jp_kanji: ヌメイル
    en: Sliggoo
    fr: Colimucus
    it: Sliggoo
    de: Viscargot
    es: Sliggoo
    ko: 미끄네일
    zh_simp: 黏美儿
    zh_trad: 黏美兒
  forms:
    sliggoo:
      form_id: 0
      base_stats:
        hp: 68
        attack: 75
        defense: 53
        special_attack: 83
        special_defense: 113
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - dragon
      egg_groups:
        - dragon
      abilities:
        - sap_sipper
        - hydration
      hidden_ability: gooey
      held_items:
        rare: shed_shell
      descriptions:
        jp_kana:
          ultra_sun: "のそのそ　はって　いどうする。\nうずじょうの　とっきは　のうみそや\nないぞうが　つまっている　ぶぶん。"
          ultra_moon: "ぜんしんが　なんでも　ドロドロに\nとかす　ねんえきで　つつまれている。\nさわるときは　てぶくろを　しよう。"
        jp_kanji:
          ultra_sun: "のそのそ　這って　移動する。\n渦状の　突起は　脳みそや\n内臓が　詰まっている　部分。"
          ultra_moon: "全身が　何でも　ドロドロに\n溶かす　粘液で　包まれている。\n触るときは　手袋を　しよう。"
        en:
          ultra_sun: "It crawls along sluggishly. The swirly protrusion\non its back is filled with its brain and\nother organs."
          ultra_moon: "Its entire body is covered with gooey mucus\nthat can dissolve anything. Be sure to put\ngloves on if you’re going to touch it."
        fr:
          ultra_sun: "Il se déplace en rampant lentement.\nSes organes et son cerveau se trouvent dans\nsa protubérance dorsale en forme de spirale."
          ultra_moon: "Son corps est recouvert d’un mucus capable\nde faire fondre n’importe quoi. Pensez à mettre\ndes gants adaptés si vous voulez le toucher !"
        it:
          ultra_sun: "Si sposta strisciando lentamente.\nLa protuberanza a forma di spirale sul dorso\ncontiene il cervello e i suoi organi interni."
          ultra_moon: "Il suo corpo è ricoperto da un liquido vischioso\nin grado di sciogliere qualsiasi cosa e per\ntoccarlo bisogna indossare guanti speciali."
        de:
          ultra_sun: "Es bewegt sich gemächlich kriechend fort.\nDer spiralförmige Fortsatz beherbergt sein\nGehirn und seine inneren Organe."
          ultra_moon: "Sein Körper ist von einem alles zersetzenden\nSchleim bedeckt. Will man diesen berühren,\nsollte man vorher Schutzhandschuhe anziehen."
        es:
          ultra_sun: "Este Pokémon se arrastra con lentitud. La\nprotuberancia en espiral de su espalda contiene\ntanto el cerebro como los órganos internos."
          ultra_moon: "Su cuerpo está recubierto por una mucosidad\nque puede disolver cualquier material, así que\nes mejor usar guantes especiales para tocarlo."
        ko:
          ultra_sun: "느릿느릿 기어서 이동한다.\n나선의 돌기는 뇌와\n내장으로 꽉 차 있다."
          ultra_moon: "전신이 무엇이든 흐물흐물하게\n녹이는 점액으로 둘러싸여 있다.\n만질 때는 장갑을 끼자."
        zh_simp:
          ultra_sun: "慢吞吞地爬行移动。\n旋涡状的突起里装着大脑和内脏。"
          ultra_moon: "全身包裹着能把所有东西\n都溶解得黏腻腻的黏液。\n接触的时候戴上手套吧。"
        zh_trad:
          ultra_sun: "慢吞吞地爬行著移動。\n漩渦狀的突起部分\n裝著牠的大腦和內臟。"
          ultra_moon: "全身包裹著能把一切東西\n溶解成黏糊的黏液。\n觸摸牠時記得戴上手套。"
goodra:
