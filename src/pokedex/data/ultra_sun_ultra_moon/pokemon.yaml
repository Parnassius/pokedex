        jp_kana:
          ultra_sun: "シッポの　ひかりは　うちゅうまで\nとどくので　どこにいるか　まるわかり。\nだから　ふだんは　けしている。"
          ultra_moon: "シッポは　つよく　あかるく　かがやく。\nふなのりたちの　みちしるべ　として\nむかしから　たいせつに　されてきた。"
        jp_kanji:
          ultra_sun: "シッポの　光は　宇宙まで\n届くので　どこにいるか　まるわかり。\nだから　普段は　消している。"
          ultra_moon: "シッポは　強く　明るく　輝く。\n船乗りたちの　道しるべ　として\n昔から　大切に　されてきた。"
        en:
          ultra_sun: "The light from its tail can be seen from space.\nThis is why you can always tell exactly where it\nis, which is why it usually keeps the light off."
          ultra_moon: "Its tail shines bright and strong. It has been\nprized since long ago as a beacon for sailors."
        fr:
          ultra_sun: "La lumière de sa queue est si vive qu’on peut\nla voir depuis l’espace. En général, il l’éteint\ndonc pour éviter de se faire repérer."
          ultra_moon: "Sa queue brille d’une lumière éclatante.\nDepuis des temps très anciens, il est vénéré\ncomme le guide des marins."
        it:
          ultra_sun: "Questo Pokémon è facile da individuare grazie\nalla luce della sua coda, visibile anche dallo\nspazio. Per questo di solito la tiene spenta."
          ultra_moon: "La punta della sua coda brilla di una luce molto\nintensa che in passato era una preziosa guida\nper i marinai."
        de:
          ultra_sun: "Das Licht seiner Schweifspitze kann man selbst\naus dem Weltall noch sehen. Um seinen Standort\nzu verbergen, macht es sein Licht zumeist aus."
          ultra_moon: "Seine Schweifspitze strahlt ein starkes, helles\nLicht aus. Auf See gilt dieses Leuchten von\nalters her als bedeutender Wegweiser."
        es:
          ultra_sun: "La luz que emite su cola puede verse desde el\nespacio, delatando su presencia a todos. Es por\neso que normalmente la mantiene apagada."
          ultra_moon: "Su cola emite un brillo claro e intenso. Se lo\nvenera desde tiempos remotos como guía de los\nmarineros."
        ko:
          ultra_sun: "꼬리의 빛은 우주까지 도달하여\n어디에 있든 바로 알 수 있다.\n그래서 평소에는 끄고 있다."
          ultra_moon: "꼬리는 강하고 밝게 빛난다.\n뱃사람들의 길잡이로서\n옛날부터 소중히 여겨져 왔다."
        zh_simp:
          ultra_sun: "尾巴上的光能传至宇宙，\n所以身在何处一目了然。\n因此它平时不会让尾巴发光。"
          ultra_moon: "尾巴会发出很强的亮光。\n从以前起，它就被船员们\n当做路标而深受重视。"
        zh_trad:
          ultra_sun: "尾巴發出的光能直達宇宙，\n讓牠的所在位置一目了然，\n所以牠平常不會讓尾巴發光。"
          ultra_moon: "尾巴發出的耀眼光芒\n被船員們當成引路的路標，\n從過去就一直深受重視。"
