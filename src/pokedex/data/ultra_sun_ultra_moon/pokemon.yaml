        - forewarn
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          ultra_sun: "レジャーしせつの　ちかくで　すがたを\nみかける。　そのばん　こどもが　みる\nたのしいユメを　ねらって　いるのだ。"
          ultra_moon: "えものを　ねむらせ　みている　ユメを\nくらう。　わるいユメは　すっぱくて\nあまり　このんで　たべないらしい。"
        jp_kanji:
          ultra_sun: "レジャー施設の　近くで　姿を\n見かける。　その晩　子どもが　見る\n楽しいユメを　狙って　いるのだ。"
          ultra_moon: "獲物を　眠らせ　見ている　ユメを\n喰らう。　悪いユメは　すっぱくて\nあまり　好んで　食べないらしい。"
        en:
          ultra_sun: "It can be spotted near recreational facilities,\nintending to eat the pleasant dreams of children\nwho enjoyed themselves there that day."
          ultra_moon: "It puts its prey to sleep and devours their\ndreams. It seems that bad dreams taste sour,\nso Drowzee doesn’t particularly like eating them."
        fr:
          ultra_sun: "Il aime musarder près des parcs d’attractions :\naprès y avoir passé une bonne journée, les\nenfants font de beaux rêves, dont il se délecte."
          ultra_moon: "Il regarde ses proies dormir et avale leurs rêves.\nLes cauchemars ayant un petit goût aigrelet,\nil a tendance à les bouder."
        it:
          ultra_sun: "Ha un debole per i sogni divertenti dei bambini.\nPer questo è facile incontrarlo vicino alle\nstrutture ricreative."
          ultra_moon: "Addormenta le prede per mangiare i loro sogni.\nSembra che non gradisca gli incubi a causa del\nloro sapore acido."
        de:
          ultra_sun: "Traumato hat es auf die lustigen Träume von\nKindern abgesehen. Man sieht es daher oft in\nder Nähe von Freizeiteinrichtungen."
          ultra_moon: "Traumato versetzt seine Beute in den Schlaf und\nfrisst ihre Träume. Alpträume mag es aufgrund\nihres säuerlichen Geschmacks nicht so gern."
        es:
          ultra_sun: "Se lo puede ver cerca de instalaciones lúdicas\ndonde, al caer la noche, sale a la caza de los\nsueños de los niños."
          ultra_moon: "Duerme a sus víctimas para luego devorar sus\nsueños. Las pesadillas no son de su agrado, ya\nque al parecer tienen un regusto agrio."
        ko:
          ultra_sun: "레저 시설 근처에서 볼 수 있다. \n그날 밤 아이가 꾸는\n즐거운 꿈을 노리고 있다."
          ultra_moon: "먹이를 잠들게 해 보고 있는 꿈을\n먹는다. 나쁜 꿈은 시큼해서\n그다지 즐겨 먹지 않는다고 한다."
        zh_simp:
          ultra_sun: "能在娱乐设施的附近见到其身影。\n会偷吃那晚孩子们所做的美梦。"
          ultra_moon: "会让猎物睡着并吃掉其所做的梦。\n恶梦酸酸的，它好像不怎么喜欢吃。"
        zh_trad:
          ultra_sun: "在遊樂設施附近可以看見\n牠的身影，因為牠想吃那一晚\n孩子們所做的美夢。"
          ultra_moon: "會讓獵物睡著，吃掉對方\n所做的夢。惡夢的味道是酸的，\n所以牠似乎不怎麼愛吃。"
