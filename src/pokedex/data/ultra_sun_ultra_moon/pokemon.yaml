fletchling:
  species_id: 661
  names:
    jp_kana: ヤヤコマ
    jp_kanji: ヤヤコマ
    en: Fletchling
    fr: Passerouge
    it: Fletchling
    de: Dartiri
    es: Fletchling
    ko: 화살꼬빈
    zh_simp: 小箭雀
    zh_trad: 小箭雀
  forms:
    fletchling:
      form_id: 0
      base_stats:
        hp: 45
        attack: 50
        defense: 43
        special_attack: 40
        special_defense: 38
        speed: 62
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - normal
        - flying
      egg_groups:
        - flying
      abilities:
        - big_pecks
      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          ultra_sun: "ひとなつっこい　ポケモンだけど\nむりに　さわると　からだを　いっきに\nはつねつさせるので　やけど　するぞ。"
          ultra_moon: "からだは　いつでも　あたたかい。\nさむい　ちいきの　トレーナーは\nベッドで　いっしょに　ねるらしい。"
        jp_kanji:
          ultra_sun: "人懐っこい　ポケモンだけど\n無理やり　触ると　身体を　一気に\n発熱させるので　火傷　するぞ。"
          ultra_moon: "身体は　いつでも　暖かい。\n寒い　地域の　トレーナーは\nベッドで　一緒に　寝るらしい。"
        en:
          ultra_sun: "While it’s an amiable Pokémon, if you touch it\nunexpectedly, it will heat up its body in an\ninstant, and you’ll be burned."
          ultra_moon: "Its body is always warm. Trainers who live in\ncold areas apparently sleep with it in their bed."
        fr:
          ultra_sun: "Bien qu’il soit affectueux, il peut brusquement\naugmenter sa température et infliger des\nbrûlures à ceux qui le touchent par surprise."
          ultra_moon: "Une agréable chaleur émane toujours de son\npetit corps. Dans les régions froides, il n’est\npas rare qu’il dorme dans le lit de son Dresseur."
        it:
          ultra_sun: "Ha un’indole amichevole, ma se viene infastidito\naumenta all’istante la sua temperatura corporea\nprovocando ustioni al colpevole."
          ultra_moon: "Il suo corpo è sempre caldo e per questo gli\nAllenatori che vivono in zone fredde a volte\nlo lasciano dormire nel loro letto."
        de:
          ultra_sun: "Es ist eigentlich sehr zutraulich. Berührt man es\naber gegen seinen Willen, erhitzt es blitzartig\nseinen Körper, was zu Verbrennungen führt."
          ultra_moon: "Sein Körper ist immer warm. In kalten Gebieten\nschlafen Trainer deshalb oft in einem Bett\nmit ihm."
        es:
          ultra_sun: "Es de carácter afable, pero si lo tocan en contra\nde su voluntad, aumenta repentinamente su\ntemperatura y puede provocar quemaduras."
          ultra_moon: "Su cuerpo emana bastante calor, razón por la\nque los Entrenadores de regiones frías les\npermiten dormir en sus camas."
        ko:
          ultra_sun: "사람을 잘 따르는 포켓몬이지만,\n억지로 만지면 몸을 단숨에\n발열시켜 화상을 입는다."
          ultra_moon: "몸은 언제나 따뜻하다.\n추운 지역의 트레이너는\n침대에서 함께 잔다고 한다."
        zh_simp:
          ultra_sun: "是和人很亲近的宝可梦，\n但如果强行触碰，它就会让身体\n一下子发热，从而造成灼伤。"
          ultra_moon: "身体一直都很温暖。\n听说寒冷地区的训练家\n会和它一起睡在床上。"
        zh_trad:
          ultra_sun: "雖然是種容易與人親近的寶可夢，\n但如果強行去摸牠，牠的身體會\n一口氣發熱而讓人灼傷。"
          ultra_moon: "身體總是很溫暖。\n寒冷地區的訓練家似乎\n會和牠一起睡在床上。"
fletchinder:
  species_id: 662
  names:
    jp_kana: ヒノヤコマ
    jp_kanji: ヒノヤコマ
    en: Fletchinder
    fr: Braisillon
    it: Fletchinder
    de: Dartignis
    es: Fletchinder
    ko: 불화살빈
    zh_simp: 火箭雀
    zh_trad: 火箭雀
  forms:
