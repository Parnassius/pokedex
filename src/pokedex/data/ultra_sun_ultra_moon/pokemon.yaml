        jp_kana:
          ultra_sun: "１４ほんの　せなかの　ハリの　けは\nびっくりしたり　こうふんすることが\nあると　かってに　さかだってしまう。"
          ultra_moon: "でんきを　つくる　ちからは　あまり\nつよくないので　かみなりを　あびて\nじゅうでん　するぞ。"
        jp_kanji:
          ultra_sun: "１４本の　背中の　ハリの　毛は\nびっくりしたり　興奮することが\nあると　勝手に　逆立ってしまう。"
          ultra_moon: "電気を　作る　力は　あまり\n強くないので　かみなりを　浴びて\n充電　するぞ。"
        en:
          ultra_sun: "When it’s surprised or agitated, the 14 fur\nspikes on its back will stand up involuntarily."
          ultra_moon: "Its capacity to produce electricity is somewhat\nlimited, so it gets charged up by letting lightning\nstrike it!"
        fr:
          ultra_sun: "Les quatorze épines de son dos se hérissent de\nleur propre chef quand il est surpris ou excité."
          ultra_moon: "Il ne produit pas beaucoup d’électricité par\nlui-même, aussi se recharge-t-il quand il y a\nde l’orage."
        it:
          ultra_sun: "Quando viene infastidito o colto di sorpresa,\nle 14 spine che ha sulla schiena si drizzano\nspontaneamente."
          ultra_moon: "Poiché la sua capacità di generare elettricità\nnon è molto sviluppata, si espone ai fulmini\nper ricaricarsi."
        de:
          ultra_sun: "Es hat 14 lange stachelartige Strähnen auf dem\nRücken, die sich unfreiwillig aufstellen, wenn es\nsich freut oder von etwas überrascht wird."
          ultra_moon: "Da es selbst nicht besonders viel Elektrizität\nerzeugen kann, badet es in den Blitzen von\nGewittern, um sich aufzuladen."
        es:
          ultra_sun: "Eriza inconscientemente las 14 púas de su lomo\ncuando se asusta o se pone nervioso."
          ultra_moon: "Como no se le da bien generar electricidad por\nsí mismo, se abastece con la de los rayos."
        ko:
          ultra_sun: "등에 난 14개의 바늘 털은\n놀라거나 흥분했을 때\n멋대로 곤두선다."
          ultra_moon: "전기를 만드는 힘은\n그다지 강하지 않아서\n번개를 맞아서 충전한다."
        zh_simp:
          ultra_sun: "背上的１４根针毛在受惊\n或是兴奋的时候会随意竖起来。"
          ultra_moon: "制造电的力量不太强，\n因此会沐浴着雷进行充电。"
        zh_trad:
          ultra_sun: "背上的１４根針狀毛\n在牠受驚嚇或是興奮的時候\n會不受控制地豎起來。"
          ultra_moon: "製造電的力量並不強，\n所以會藉著讓雷電落在\n身上來幫自己充電。"
