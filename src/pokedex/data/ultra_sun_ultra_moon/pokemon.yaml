makuhita:
  species_id: 296
  names:
    jp_kana: マクノシタ
    jp_kanji: マクノシタ
    en: Makuhita
    fr: Makuhita
    it: Makuhita
    de: Makuhita
    es: Makuhita
    ko: 마크탕
    zh_simp: 幕下力士
    zh_trad: 幕下力士
  forms:
    makuhita:
      form_id: 0
      base_stats:
        hp: 72
        attack: 60
        defense: 30
        special_attack: 20
        special_defense: 30
        speed: 25
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - human_like
      abilities:
        - thick_fat
        - guts
      hidden_ability: sheer_force
      held_items:
        rare: black_belt
      descriptions:
        jp_kana:
          ultra_sun: "きの　みきに　むかって　はりてを\nくりかえし　けいこする。　ナッシーに\nはりてして　なげとばされることも。"
          ultra_moon: "つよい　マクノシタを　そだてるために\nトレーナーたちが　でんとうてきに\nつくる　ナベりょうりが　あるという。"
        jp_kanji:
          ultra_sun: "木の　幹に　向かって　張り手を\n繰り返し　稽古する。　ナッシーに\n張り手して　投げ飛ばされることも。"
          ultra_moon: "強い　マクノシタを　育てるために\nトレーナーたちが　伝統的に\n作る　ナベ料理が　あるという。"
        en:
          ultra_sun: "It practices its slaps by repeatedly slapping\ntree trunks. It has been known to slap an\nExeggutor and get flung away."
          ultra_moon: "There’s a rumor of a traditional recipe for stew\nthat Trainers can use to raise strong Makuhita."
        fr:
          ultra_sun: "Il s’entraîne en frappant les arbres de la paume\nde la main. Il peut arriver qu’il s’attaque à un\npauvre Noadkoko, qui l’envoie alors valser."
          ultra_moon: "Il existerait un plat mijoté traditionnel que\nles Dresseurs cuisinent pour rendre leur\nMakuhita encore plus fort."
        it:
          ultra_sun: "Si allena tirando manate contro gli alberi.\nA volte finisce per colpire un Exeggutor, che\ngli rende la pariglia scaraventandolo via."
          ultra_moon: "Sembra che gli Allenatori preparino un piatto\ntradizionale particolarmente indicato per far\ncrescere forti i propri Makuhita."
        de:
          ultra_sun: "Es trainiert, indem es mit der flachen Hand auf\nBaumstämme einschlägt. Manchmal erwischt es\nKokowei und wird von diesen weggeschleudert."
          ultra_moon: "Es heißt, es gebe einen Eintopf, den Trainer auf\ntraditionelle Weise zubereiten, um Makuhita\ndamit noch stärker zu machen."
        es:
          ultra_sun: "Entrena golpeando los troncos de los árboles\ncon la mano abierta. A veces le da por error a\nun Exeggutor y este lo lanza volando."
          ultra_moon: "Dicen que los Entrenadores dan de comer a sus\nMakuhita un guiso tradicional para que se hagan\nmás fuertes todavía."
        ko:
          ultra_sun: "나무줄기에 손바닥 치기를 하며\n단련한다. 나시에게 손바닥 치기를\n해서 내던져지기도 한다."
          ultra_moon: "강한 마크탕을 키우기 위해\n트레이너들이 전통적으로\n만드는 전골 요리가 있다고 한다."
        zh_simp:
          ultra_sun: "会朝着树干反复练习巴掌招数。\n有时会因为朝着椰蛋树\n练习巴掌招数而被扔飞。"
          ultra_moon: "据说为了培育强大的幕下力士，\n存在着一种训练家们按传统\n手法制作的火锅料理。"
        zh_trad:
          ultra_sun: "會對著樹幹反覆練習推掌，\n有時會因為對著椰蛋樹使出推掌\n而反過來被丟得遠遠的。"
          ultra_moon: "據說為了培育強大的幕下力士，\n訓練家們會製作一種\n傳統的火鍋料理。"
hariyama:
  species_id: 297
  names:
    jp_kana: ハリテヤマ
    jp_kanji: ハリテヤマ
    en: Hariyama
    fr: Hariyama
    it: Hariyama
    de: Hariyama
    es: Hariyama
    ko: 하리뭉
    zh_simp: 铁掌力士
    zh_trad: 鐵掌力士
  forms:
    hariyama:
      form_id: 0
      base_stats:
        hp: 144
        attack: 120
        defense: 60
        special_attack: 40
        special_defense: 60
        speed: 50
      evs_yield:
        hp: 2
        attack: 0
