tentacool:
  species_id: 72
  names:
    jp_kana: メノクラゲ
    jp_kanji: メノクラゲ
    en: Tentacool
    fr: Tentacool
    it: Tentacool
    de: Tentacha
    es: Tentacool
    ko: 왕눈해
    zh_simp: 玛瑙水母
    zh_trad: 瑪瑙水母
  forms:
    tentacool:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 35
        special_attack: 50
        special_defense: 100
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
        - poison
      egg_groups:
        - water_3
      abilities:
        - clear_body
        - liquid_ooze
      hidden_ability: rain_dish
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          ultra_sun: "うみべを　ただよい　えものを　さがす。\nどくの　しょくしゅは　ちぎれることも\nあるが　じかんが　たてば　はえてくる。"
          ultra_moon: "からだの　９９パーセントが　すいぶん。\nのこりの　１パーセントに　どくそを\nつくる　きかんが　あるのだ。"
        jp_kanji:
          ultra_sun: "海辺を　漂い　獲物を　探す。\n毒の　触手は　ちぎれることも\nあるが　時間が　経てば　生えてくる。"
          ultra_moon: "身体の　９９パーセントが　水分。\n残りの　１パーセントに　毒素を\n作る　器官が　あるのだ。"
        en:
          ultra_sun: "It drifts through the sea searching for prey.\nIts poisonous tentacles break off sometimes,\nbut after a while, they grow back."
          ultra_moon: "Its body is 99% water. The remaining 1%\ncontains the organ that makes its poison."
        fr:
          ultra_sun: "Il flotte près des côtes à la recherche de proies.\nIl lui arrive de perdre ses tentacules toxiques,\nmais ceux-ci repoussent avec le temps."
          ultra_moon: "Son corps est composé à 99 % d’eau. Le 1 %\nrestant est occupé par l’organe qui sécrète\nles toxines."
        it:
          ultra_sun: "Fluttua in acqua lungo la costa in cerca di prede.\nI tentacoli velenosi a volte si staccano, ma col\ntempo ricrescono."
          ultra_moon: "Il 99% del suo corpo è composto d’acqua.\nIl restante 1% è costituito da un organo\nche produce una sostanza velenosa."
        de:
          ultra_sun: "Es treibt in Küstennähe im Wasser und sucht\nnach Beute. Seine giftigen Tentakel fallen ab und\nzu ab, wachsen aber mit der Zeit wieder nach."
          ultra_moon: "Es besteht zu 99 % aus Wasser. Das restliche\n1 % wird von einem Organ für die Giftproduktion\neingenommen."
        es:
          ultra_sun: "Ronda las costas en busca de presas. Si pierde\nalguno de sus tentáculos venenosos, le volverá\na crecer al cabo del tiempo."
          ultra_moon: "Su cuerpo está compuesto de agua en un 99%.\nEl 1% restante es el órgano que segrega sus\ntoxinas."
        ko:
          ultra_sun: "해변을 떠다니며 먹이를 찾는다.\n독이 있는 촉수는 끊어지기도 하지만\n시간이 흐르면 다시 자란다."
          ultra_moon: "몸의 99퍼센트가 수분이다.\n남은 1퍼센트에 독소를\n만드는 기관이 있다."
        zh_simp:
          ultra_sun: "会漂浮在海边寻找猎物。\n虽然有毒的触手也会断掉，\n但过一段时间就会重新长出来。"
          ultra_moon: "身体的９９％是水分。\n剩下的１％中包含了\n用来制造毒素的器官。"
        zh_trad:
          ultra_sun: "會漂浮在海邊尋找獵物。\n有毒的觸手有時也會斷掉，\n但過了一段時間就會重新長出來。"
          ultra_moon: "身體的９９％是水分。\n剩下的１％之中包含了\n用來製造毒素的器官。"
tentacruel:
  species_id: 73
  names:
    jp_kana: ドククラゲ
    jp_kanji: ドククラゲ
    en: Tentacruel
    fr: Tentacruel
    it: Tentacruel
    de: Tentoxa
    es: Tentacruel
    ko: 독파리
    zh_simp: 毒刺水母
    zh_trad: 毒刺水母
  forms:
    tentacruel:
      form_id: 0
      base_stats:
        hp: 80
        attack: 70
        defense: 65
        special_attack: 80
        special_defense: 120
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - water
        - poison
      egg_groups:
        - water_3
      abilities:
        - clear_body
        - liquid_ooze
      hidden_ability: rain_dish
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          ultra_sun: "あかい　たまから　ちょうおんぱを\nはっせいさせ　えものを　よわらせると\n８０ぽんの　しょくしゅを　まきつける。"
          ultra_moon: "あかい　たまを　ひからせて　なかまと\nこうしん　している。　てんめつは\nけいかいを　しらせる　あいずなのだ。"
        jp_kanji:
          ultra_sun: "赤い　玉から　超音波を\n発生させ　獲物を　弱らせると\n８０本の　触手を　巻きつける。"
          ultra_moon: "紅い　玉を　光らせて　仲間と\n交信　している。　点滅は\n警戒を　知らせる　合図なのだ。"
        en:
          ultra_sun: "It fires off ultrasonic waves from its red orbs\nto weaken its prey, and then it wraps them up\nin its 80 tentacles."
          ultra_moon: "It communicates with others of its kind by\nlighting up the red orbs on its head. When\nthe orbs are blinking, it’s a warning sign."
        fr:
          ultra_sun: "Il émet des ultrasons par ses globes rouges afin\nd’affaiblir ses proies, puis les enserre de ses\n80 tentacules."
          ultra_moon: "Il communique avec ses congénères en faisant\nbriller ses globes rouges. Il les fait clignoter\ns’il veut leur envoyer un avertissement."
        it:
          ultra_sun: "Indebolisce la preda emettendo ultrasuoni\ndalle sfere rosse per poi avvolgerla con i suoi\n80 tentacoli."
          ultra_moon: "Comunica con i suoi simili facendo brillare\nle sfere rosse. Le fa lampeggiare per segnalare\nagli altri di fare attenzione."
        de:
          ultra_sun: "Mit Ultraschallwellen aus seinen roten Kugeln\nschwächt es zunächst seine Beute, um sie dann\nmit seinen 80 Tentakeln fest zu umwickeln."
          ultra_moon: "Wenn Tentoxa untereinander kommunizieren,\nglühen ihre roten Kugeln. Ein wiederholtes\nAufleuchten steht für ein Warnsignal."
        es:
          ultra_sun: "Emite ondas ultrasónicas por sus esferas rojas\nque inmovilizan a su presa para luego proceder\na rodearla con sus 80 tentáculos."
          ultra_moon: "Se comunica con los suyos mediante el brillo de\nsus esferas rojas. Un parpadeo, por ejemplo, es\nseñal de advertencia."
        ko:
          ultra_sun: "붉은 구슬로 초음파를 발생시켜\n먹이가 약해지면\n80개의 촉수로 휘감는다."
          ultra_moon: "붉은 구슬을 빛내서 동료와\n교신하고 있다. 깜빡이는 것은\n경계를 알리는 신호다."
        zh_simp:
          ultra_sun: "从红色珠子中发出超音波\n使猎物变得虚弱后，\n就会用８０根触手缠住对手。"
          ultra_moon: "能让红色珠子发光来与伙伴交流。\n忽明忽暗的闪光是用来\n告知要保持警惕的信号。"
        zh_trad:
          ultra_sun: "會從紅色珠子中發出超音波，\n使獵物變得虛弱，\n然後用８０根觸手纏住獵物。"
          ultra_moon: "透過讓紅色珠子發光來與\n夥伴交流。閃爍的光芒是\n用來通知警戒狀況的信號。"
geodude:
  species_id: 74
  names:
    jp_kana: イシツブテ
    jp_kanji: イシツブテ
    en: Geodude
    fr: Racaillou
    it: Geodude
    de: Kleinstein
    es: Geodude
    ko: 꼬마돌
    zh_simp: 小拳石
    zh_trad: 小拳石
  forms:
    geodude:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 100
        special_attack: 30
        special_defense: 30
        speed: 20
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      abilities:
        - rock_head
        - sturdy
      hidden_ability: sand_veil
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          ultra_sun: "ながく　いきた　イシツブテは　かどが\nとれて　まんまる。　せいかくも　とても\nおちついていて　おだやか　なのだ。"
          ultra_moon: "りょうてを　つかい　けわしい　がけを\nのぼる。　そのすがたを　みた　ひとが\nボルダリングを　はじめたらしい。"
        jp_kanji:
          ultra_sun: "長く　生きた　イシツブテは　角が\nとれて　まんまる。　性格も　とても\n落ち着いていて　穏やか　なのだ。"
          ultra_moon: "両手を　使い　険しい　崖を\n登る。　その姿を　見た　人が\nボルダリングを　始めたらしい。"
        en:
          ultra_sun: "Geodude that have lived a long life have had all\ntheir edges smoothed out until they’re totally\nround. They also have a calm, quiet disposition."
          ultra_moon: "It uses both hands to climb precipitous cliffs.\nPeople who see it in action have been known to\ntake up bouldering."
        fr:
          ultra_sun: "Les aspérités de Racaillou s’adoucissent au fil\ndes années, tout comme sa personnalité.\nIl devient tout lisse, tout rond, et tout calme."
          ultra_moon: "Il grimpe les côtes escarpées à mains nues.\nC’est en le voyant à l’œuvre que des humains\nse sont mis à l’escalade de bloc."
        it:
          ultra_sun: "Col passare degli anni le asperità del suo corpo\nvengono levigate, rendendolo perfettamente\nrotondo, e il suo carattere si fa più tranquillo."
          ultra_moon: "Scala pareti scoscese a mani nude.\nSi dice che la pratica del bouldering sia stata\nispirata da questo Pokémon."
        de:
          ultra_sun: "Mit dem Alter verliert es zunehmend seine\nKantigkeit, bis es vollkommen rund und auch\ncharakterlich immer ausgeglichener wird."
          ultra_moon: "Mit den Armen erklimmt es selbst steile Hänge.\nUnter den Menschen soll diese Klettermethode\nVorbild für den Bouldersport gewesen sein."
        es:
          ultra_sun: "Con la edad, su temperamento se amansa y su\ncuerpo se va alisando hasta adquirir una forma\ncompletamente redonda."
          ultra_moon: "Escala a manos desnudas las pendientes de las\nmontañas. Al parecer, esta fue la fuente de\ninspiración para la práctica de la escalada libre."
        ko:
          ultra_sun: "오래 산 꼬마돌은 모가 없이\n동그랗다. 성격도 매우\n차분하고 온화하다."
          ultra_moon: "양손을 사용해서 험한 절벽을\n오른다. 그 모습을 본 사람이\n볼더링을 시작했다고 한다."
        zh_simp:
          ultra_sun: "活了很久的小拳石在身上的角\n被磨平后会变得圆滚滚的。\n性格也非常的冷静平稳。"
          ultra_moon: "会用双手登上险峻的悬崖。\n人们好像是在看到它那身姿之后，\n才开始了抱石攀岩运动。"
        zh_trad:
          ultra_sun: "活得久的小拳石身上的稜角\n會被磨平而變得圓滾滾的，\n性格也會變得穩重而隨和。"
          ultra_moon: "會用雙手攀登險峻的山崖。\n人們似乎是在目睹牠那姿態之後\n才開始了抱石攀岩運動。"
    geodude_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 40
        attack: 80
        defense: 100
        special_attack: 30
        special_defense: 30
        speed: 20
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - electric
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: galvanize
      held_items:
        rare: cell_battery
      descriptions:
        jp_kana:
          ultra_sun: "いしころと　まちがえ　ふんでしまうと\nおこって　ずつきを　かましてくる。\nいたいだけでなく　ビリッと　くるぞ。"
          ultra_moon: "ずつきで　なかまと　きそいあう。\nあたまの　さてつは　じりょくの\nつよいほうに　ひっついて　しまうぞ。"
        jp_kanji:
          ultra_sun: "石ころと　間違え　踏んでしまうと\n怒って　頭突きを　かましてくる。\n痛いだけでなく　ビリッと　くるぞ。"
          ultra_moon: "頭突きで　仲間と　競いあう。\n頭の　砂鉄は　磁力の\n強い方に　引っ付いて　しまうぞ。"
        en:
          ultra_sun: "If you mistake it for a rock and step on it, it will\nheadbutt you in anger. In addition to the pain,\nit will also zap you with a shock."
          ultra_moon: "Geodude compete against each other with\nheadbutts. The iron sand on their heads will\nstick to whichever one has stronger magnetism."
        fr:
          ultra_sun: "Il donne un violent coup de tête à quiconque\nle confond avec un caillou et lui marche dessus.\nLe coup est accompagné d’une petite décharge."
          ultra_moon: "Il se mesure à ses congénères à grands coups\nde tête. La limaille se colle sur la tête de celui\ndont la force magnétique est la plus grande."
        it:
          ultra_sun: "Se lo si pesta scambiandolo per un sasso,\nsi arrabbia e attacca con delle testate che,\noltre a far male, danno anche la scossa."
          ultra_moon: "Sfida i suoi simili facendo a testate. La polvere\nmetallica sulla testa si raggruma nei punti in cui\nl’attrazione magnetica è più forte."
        de:
          ultra_sun: "Verwechselt man es mit einem Felsbrocken und\ntritt darauf, erwarten einen eine schmerzhafte\nKopfnuss gepaart mit einem Stromschlag."
          ultra_moon: "Kleinstein klären Streitigkeiten mit Kopfnüssen.\nDer Eisensand an ihren Köpfen heftet sich\ndabei an jenes, das mehr Magnetkraft aufweist."
        es:
          ultra_sun: "Si lo pisan al confundirlo con una roca, se\nenfada y embiste con la cabeza. Además de\ndoler, da calambre."
          ultra_moon: "Pelea contra los de su especie a cabezazos.\nLa arena ferruginosa de su cabeza se pega al\nque esté más magnetizado."
        ko:
          ultra_sun: "돌멩이로 착각해 밟으면\n화를 내며 박치기를 한다.\n통증뿐 아니라 찌릿찌릿하다."
          ultra_moon: "박치기로 동료와 겨룬다.\n머리의 사철은 자력이\n강한 쪽으로 달라붙어 버린다."
        zh_simp:
          ultra_sun: "如果误以为是小石头而踩下去的话，\n它就会很生气并用头锤顶回来。\n被它撞到不单是痛，还会感觉麻麻的。"
          ultra_moon: "会用头锤和伙伴争斗。\n头上的铁矿砂会附着在\n磁力强的一方那里。"
        zh_trad:
          ultra_sun: "如果把它誤認為是小石頭而踩下去，\n牠就會生氣地用頭錘來反擊。\n被牠撞到不只會痛，還會感到麻麻的。"
          ultra_moon: "會用頭錘與夥伴競爭。\n頭上的鐵沙會被磁力\n較強的那一方吸過去。"
graveler:
  species_id: 75
  names:
    jp_kana: ゴローン
    jp_kanji: ゴローン
    en: Graveler
    fr: Gravalanch
    it: Graveler
    de: Georok
    es: Graveler
    ko: 데구리
    zh_simp: 隆隆石
    zh_trad: 隆隆石
  forms:
    graveler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 95
        defense: 115
        special_attack: 45
        special_defense: 45
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      abilities:
        - rock_head
        - sturdy
      hidden_ability: sand_veil
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          ultra_sun: "がけを　のぼり　さんちょうを　めざす。\nてっぺんに　つくなり　すぐに　きた\nやまみちを　ころがり　おちていく。"
          ultra_moon: "がけを　ころがり　いどうする。\nまちがえて　かわに　おちると\nさいごの　あがきで　だいばくはつ。"
        jp_kanji:
          ultra_sun: "崖を　登り　山頂を　目指す。\nてっぺんに　着くなり　すぐに　来た\n山道を　転がり　落ちていく。"
          ultra_moon: "崖を　転がり　移動する。\n間違えて　川に　落ちると\n最期の　あがきで　大爆発。"
        en:
          ultra_sun: "It climbs up cliffs as it heads toward the peak\nof a mountain. As soon as it reaches the summit,\nit rolls back down the way it came."
          ultra_moon: "It travels by rolling down cliffs. If it falls into a\nriver, it will explode with its last gasp."
        fr:
          ultra_sun: "Il escalade les falaises pour en atteindre les\nsommets. Une fois tout en haut, il se laisse\nrouler par le chemin d’où il est arrivé."
          ultra_moon: "Il se déplace en se laissant rouler le long des\nfalaises. Si par malheur il finit dans une rivière,\nil se fait exploser en dernier recours."
        it:
          ultra_sun: "Scala le pareti scoscese delle montagne\ne, una volta raggiunta la vetta, rotola\ngiù lungo lo stesso percorso."
          ultra_moon: "Si sposta rotolando lungo dirupi scoscesi.\nSe finisce dentro a un fiume, viene colto dalla\ndisperazione e si fa esplodere."
        de:
          ultra_sun: "Es klettert Berghänge bis zum Gipfel empor.\nEinmal oben angekommen, rollt es über den\nBergpfad sogleich wieder hinunter."
          ultra_moon: "Es bewegt sich rollend über Abhänge fort.\nStürzt es versehentlich in einen Fluss, sprengt\nes sich in seiner Verzweiflung selbst in die Luft."
        es:
          ultra_sun: "Escala los riscos de las montañas y, una vez\nalcanzada la cima, desciende rodando por los\nsenderos."
          ultra_moon: "Se desplaza rodando por las laderas. Si por\nmala fortuna termina cayendo en un río, con su\núltimo aliento causa una gigantesca explosión."
        ko:
          ultra_sun: "정상을 목표로 절벽을 오른다.\n정상에 도착하면 곧바로\n올라온 산길을 굴러 내려간다."
          ultra_moon: "절벽을 굴러서 이동한다.\n실수로 강에 떨어지면\n최후의 발악으로 대폭발한다."
        zh_simp:
          ultra_sun: "会爬上山崖前往山顶。\n到达山顶后，会立刻\n沿着来时的山路滚下去。"
          ultra_moon: "会从悬崖上滚下来移动。\n如果不慎落入河里，\n就会来个大爆炸以作最后挣扎。"
        zh_trad:
          ultra_sun: "會爬上山崖朝山頂前進，\n一到達山頂就會馬上沿著\n來時的山路滾下去。"
          ultra_moon: "藉著從山崖上滾落來移動。\n如果不小心掉進河裡，\n就會在最後掙扎時來個大爆炸。"
    graveler_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 55
        attack: 95
        defense: 115
        special_attack: 45
        special_defense: 45
        speed: 35
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - electric
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
      hidden_ability: galvanize
      held_items:
        rare: cell_battery
      descriptions:
        jp_kana:
          ultra_sun: "ゴローンどうし　あらそうと　あたりに\nひかりと　ばくおんがする。　じもとの\nひとは　おかはなびと　よんでいる。"
          ultra_moon: "こうぶつの　いしの　えいきょうで\nぜんしんが　でんきを　おびている。\nとても　けんかっぱやい　せいかく。"
        jp_kanji:
          ultra_sun: "ゴローン同士　争うと　あたりに\n光と　爆音がする。　地元の\n人は　陸花火と　呼んでいる。"
          ultra_moon: "好物の　石の　影響で\n全身が　電気を　帯びている。\nとても　喧嘩っ早い　性格。"
        en:
          ultra_sun: "When two Graveler fight each other, it fills the\nsurroundings with flashes of light and sound.\nPeople call it the “fireworks of the earth.”"
          ultra_moon: "Graveler’s entire body is tinged with electricity\ndue to the stones it likes to eat. It’s very\nquick-tempered."
        fr:
          ultra_sun: "Quand ils combattent entre eux, l’air est saturé\nd’éclairs et de détonations. Les gens du coin les\nsurnomment « les feux d’artifice des collines »."
          ultra_moon: "Ce grand Pokémon soupe au lait raffole des\npierres chargées en électricité ; il en mange\ntellement qu’il déborde d’énergie."
        it:
          ultra_sun: "Quando i Graveler lottano fra di loro, provocano\nlampi e botti. Gli abitanti di Alola li chiamano\nfuochi artificiali di terra."
          ultra_moon: "Per effetto delle rocce di cui è ghiotto, il suo\ncorpo è interamente pervaso dall’elettricità.\nHa un carattere molto litigioso."
        de:
          ultra_sun: "Streiten sie sich untereinander, erzeugen sie ein\nlautes Knallen und grelles Leuchten, das von\nEinheimischen „Felsenfeuerwerk“ genannt wird."
          ultra_moon: "Durch seine bevorzugte Gesteinsnahrung ist\nsein Körper von Elektrizität erfüllt. Außerdem\nist es sehr streitlustig."
        es:
          ultra_sun: "Cuando dos Graveler pelean entre ellos, el aire\nse llena de destellos y estallidos. Los lugareños\nlo suelen comparar con fuegos artificiales."
          ultra_moon: "Su cuerpo rebosa electricidad debido al tipo de\nrocas de las que se alimenta. Es muy propenso\na pelearse."
        ko:
          ultra_sun: "데구리끼리 싸우면 주변에\n빛과 폭음이 난다. 그 지방 사람은\n육지 불꽃놀이라고 부른다."
          ultra_moon: "좋아하는 돌의 영향으로\n전신에 전기를 띠고 있다.\n매우 쉽게 싸우려 드는 성격이다."
        zh_simp:
          ultra_sun: "隆隆石之间互相争斗的话，\n它们周围就会出现闪光和爆炸声。\n当地人把这种现象称为陆地烟花。"
          ultra_moon: "受到喜欢吃的石头影响，\n它全身都带着电。\n性格非常好斗。"
        zh_trad:
          ultra_sun: "隆隆石之間互相爭鬥時，\n周圍會出現閃光和爆炸聲。\n當地人把這種現象稱為陸地煙火。"
          ultra_moon: "受到愛吃的石頭影響，\n牠的全身都帶著電。\n性格非常好鬥。"
golem:
  species_id: 76
  names:
    jp_kana: ゴローニャ
    jp_kanji: ゴローニャ
    en: Golem
    fr: Grolem
    it: Golem
    de: Geowaz
    es: Golem
    ko: 딱구리
    zh_simp: 隆隆岩
    zh_trad: 隆隆岩
  forms:
    golem:
      form_id: 0
      base_stats:
        hp: 80
        attack: 120
        defense: 130
        special_attack: 55
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
