    en: Butterfree
    fr: Papilusion
    it: Butterfree
    de: Smettbo
    es: Butterfree
    ko: 버터플
    zh_simp: 巴大蝶
    zh_trad: 巴大蝶
  forms:
    butterfree:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 50
        special_attack: 90
        special_defense: 80
        speed: 70
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - bug
        - flying
      egg_groups:
        - bug
      abilities:
        - compound_eyes
      hidden_ability: tinted_lens
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          ultra_sun: "ハネを　つつむ　りんぷんは　もうどく。\nキャタピーを　ねらう　とりポケモンを\nみつけると　ふりかけて　おいはらうぞ。"
          ultra_moon: "きれいな　はなの　ミツが　こうぶつ。\nはなばたけで　アブリーとの　しれつな\nなわばりあらそいを　くりひろげる。"
        jp_kanji:
          ultra_sun: "羽を　包む　りん粉は　猛毒。\nキャタピーを　狙う　とりポケモンを\n見つけると　ふりかけて　追い払うぞ。"
          ultra_moon: "綺麗な　花の　ミツが　好物。\n花畑で　アブリーとの　熾烈な\n縄張り争いを　繰り広げる。"
        en:
          ultra_sun: "Its wings are covered in toxic scales. If it finds\nbird Pokémon going after Caterpie, Butterfree\nsprinkles its scales on them to drive them off."
          ultra_moon: "Nectar from pretty flowers is its favorite food.\nIn fields of flowers, it has heated battles with\nCutiefly for territory."
        fr:
          ultra_sun: "Lorsqu’il surprend un Pokémon oiseau attaquant\nun Chenipan, il répand les écailles très toxiques\nqui recouvrent ses ailes sur l’assaillant."
          ultra_moon: "Il raffole du nectar des plus jolies fleurs.\nDans les prairies, les luttes territoriales\nl’opposant à Bombydou sont impitoyables."
        it:
          ultra_sun: "Se vede dei Pokémon alati attaccare Caterpie,\nli scaccia cospargendoli con la velenosissima \npolvere che ricopre le sue ali."
          ultra_moon: "È ghiotto del nettare dei fiori più belli.\nSi contende i prati in fiore con Cutiefly in furiose\nlotte per il territorio."
        de:
          ultra_sun: "Sieht es ein Raupy, das von Vogel-Pokémon\nangegriffen wird, schlägt es diese mit seinem\nhochgiftigen Flügelstaub in die Flucht."
          ultra_moon: "Es liebt den Blütenhonig schöner Blumen.\nAuf Blumenfeldern liefert es sich erbitterte\nRevierkämpfe mit Wommel."
        es:
          ultra_sun: "Si un Pokémon pájaro acecha a un Caterpie,\nButterfree esparcirá las escamas venenosas\nque recubren sus alas para ahuyentarlo."
          ultra_moon: "Adora el néctar de las flores más bellas. Libra\nferoces disputas territoriales en los prados con\nlos Cutiefly."
        ko:
          ultra_sun: "날개를 감싼 인분은 맹독이다.\n캐터피를 노리는 새포켓몬을\n발견하면 흩뿌려 내쫓는다."
          ultra_moon: "예쁜 꽃의 꿀을 좋아한다.\n꽃밭에서 에블리와 치열한\n영역 싸움을 벌인다."
        zh_simp:
          ultra_sun: "翅膀上覆盖着的鳞粉有剧毒。\n如果发现有鸟宝可梦要袭击绿毛虫，\n就会撒出鳞粉将它赶跑。"
          ultra_moon: "喜食美丽花儿的花蜜。\n会在花圃里和萌虻\n展开激烈的领地之争。"
        zh_trad:
          ultra_sun: "附著在翅膀上的鱗粉帶有劇毒，\n一旦發現有鳥寶可夢要襲擊綠毛蟲，\n就會撒出鱗粉來趕跑對方。"
          ultra_moon: "愛吃美麗花朵的花蜜，\n總是在花圃和萌虻\n展開激烈的地盤爭奪戰。"
