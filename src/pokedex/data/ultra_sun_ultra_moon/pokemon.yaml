          ultra_moon: "すさまじい　エネルギーを　あびて\nビルドアップ。　メガシンカが　おわると\nひどい　きんにくつうに　なやまされる。"
        jp_kanji:
          ultra_sun: "２本の　ツノで　挟みこみ　自分の\n体重の　５００倍の　重さの　ものも\n持ち上げることが　できるのだ。"
          ultra_moon: "凄まじい　エネルギーを　浴びて\nビルドアップ。　メガシンカが　終わると\nひどい　筋肉痛に　悩まされる。"
        en:
          ultra_sun: "It can grip things with its two horns and lift\n500 times its own body weight."
          ultra_moon: "A tremendous influx of energy builds it up, but\nwhen Mega Evolution ends, Heracross is\nbothered by terrible soreness in its muscles."
        fr:
          ultra_sun: "Il peut soulever des objets pesant jusqu’à 500\nfois son poids en les pinçant entre ses cornes."
          ultra_moon: "Le flot d’énergie décuple ses muscles, mais\nlui donne de terribles courbatures après avoir\nretrouvé sa forme d’origine."
        it:
          ultra_sun: "Usando le sue corna riesce a sollevare oggetti\n500 volte più pesanti di lui."
          ultra_moon: "La formidabile energia della megaevoluzione\nfa sviluppare i suoi muscoli, ma quando torna\nal suo stato normale è tutto indolenzito."
        de:
          ultra_sun: "Der Klammergriff seiner beiden Hörner\nermöglicht es ihm, das 500-fache seines\nKörpergewichts zu tragen."
          ultra_moon: "Die gewaltige Energie der Mega-Entwicklung hilft\nihm dabei, an Kraft hinzuzugewinnen. Lässt die\nWirkung nach, leidet es an üblem Muskelkater."
        es:
          ultra_sun: "Es capaz de encajar entre sus dos cuernos\nobjetos que superen su peso 500 veces y\nlevantarlos sin problema."
          ultra_moon: "La formidable energía de la megaevolución\ndesarrolla sus músculos. Al volver a su forma\noriginal, tiene dolorosas agujetas."
        ko:
          ultra_sun: "2개의 뿔에 끼워\n자신 체중의 500배 무게인\n물건도 들어 올릴 수 있다."
          ultra_moon: "굉장한 에너지를 받아서\n벌크업한다. 메가진화가 끝나면\n심한 근육통에 시달린다."
        zh_simp:
          ultra_sun: "会用２只角夹住并举起对方。\n甚至能举起比自己体重\n重５００倍的东西。"
          ultra_moon: "会通过沐浴惊人的能量来健美。\n超级进化结束后，\n它就会受苦于强烈的肌肉疼痛。"
        zh_trad:
          ultra_sun: "會用２隻角夾住東西舉起來。\n牠甚至能舉起比自己體重\n重５００倍的重量。"
          ultra_moon: "在驚人能量的洗禮下變得更健壯。\n在超級進化結束後，牠會受\n強烈的肌肉酸痛所苦。"
