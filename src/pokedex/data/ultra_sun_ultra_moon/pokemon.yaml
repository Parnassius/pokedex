        jp_kana:
          ultra_sun: "ひとたび　たたかいとなれば　じぶんの\nなんばいもある　ドラゴンポケモンにも\nいっさいひるまず　とびかかっていく。"
          ultra_moon: "トレーナーの　うでに　リボンじょうの\nしょっかくを　まきつけてくる。\nふれると　きもちが　わかる　からだ。"
        jp_kanji:
          ultra_sun: "ひとたび　戦いとなれば　自分の\n何倍もある　ドラゴンポケモンにも\nいっさい怯まず　飛びかかっていく。"
          ultra_moon: "トレーナーの　腕に　リボン状の\n触角を　巻きつけてくる。\n触れると　気持ちが　わかる　からだ。"
        en:
          ultra_sun: "Once a fight breaks out, it will unflinchingly\ncharge at dragon Pokémon that are many times\nlarger than itself."
          ultra_moon: "Sylveon wraps its ribbonlike feelers around its\nTrainer’s arm because this touch enables it to\nread its Trainer’s feelings."
        fr:
          ultra_sun: "Une fois le combat entamé, il n’hésite pas\nune seconde, même contre un Pokémon\nde type Dragon dix fois plus gros que lui."
          ultra_moon: "Enrouler l’une de ses antennes en forme\nde ruban autour du bras de son Dresseur\nlui permet de connaître ses sentiments."
        it:
          ultra_sun: "Nella lotta, parte all’attacco senza esitare\nun istante, anche quando si trova di fronte\nimponenti Pokémon di tipo Drago."
          ultra_moon: "Avvolge le sue antenne simili a fiocchetti intorno\nal braccio dell’Allenatore per comprendere i suoi\nsentimenti."
        de:
          ultra_sun: "Kommt es zum Kampf, stürzt es sich furchtlos\nins Gefecht, selbst wenn sein Gegner ein\nvielfach größeres Drachen-Pokémon ist."
          ultra_moon: "Feelinara umwickelt den Arm seines Trainers mit\nseinen bandförmigen Fühlern, da es so spüren\nkann, wie es ihm geht."
        es:
          ultra_sun: "Cuando se enfrasca en un combate lo da todo\nsin titubear un segundo, aunque se enfrente a\nun Pokémon de tipo Dragón más grande que él."
          ultra_moon: "Al rodear el brazo de su Entrenador con los\napéndices sensoriales en forma de cintas, es\ncapaz de comprender sus sentimientos."
        ko:
          ultra_sun: "한번 싸움이 나면 자신보다\n몇 배나 큰 드래곤포켓몬에게도\n전혀 기죽지 않고 덤벼든다."
          ultra_moon: "트레이너의 팔에 리본 모양의\n더듬이를 휘감는다.\n닿으면 기분을 알 수 있기 때문이다."
        zh_simp:
          ultra_sun: "一旦进入战斗状态，\n即使面对比自己大几倍的龙宝可梦，\n也会毫不畏惧地飞扑过去。"
          ultra_moon: "会用缎带般的触角缠住训练家的手臂。\n因为只要触碰后就能知道对方的心情。"
        zh_trad:
          ultra_sun: "一旦進入戰鬥狀態，\n即便對手是比自己大幾倍的龍寶可夢，\n也會毫不畏懼地飛撲過去。"
          ultra_moon: "會用緞帶般的觸角纏住\n訓練家的手臂，因為牠可以\n透過觸碰來得知對方的心情。"
