      hidden_ability: skill_link
      descriptions:
        jp_kana:
          ultra_sun: "しろいけは　からだから　しみだす\nあぶらで　コーティング　されており\nてきのこうげきも　つるりと　さける。"
          ultra_moon: "ぜんしんから　しみだす　あぶらは\nとても　なめらか。　はだあれに\nなやむひとにも　こうかてきなのだ。"
        jp_kanji:
          ultra_sun: "白い毛は　身体から　しみだす\n油で　コーティング　されており\n敵の攻撃も　つるりと　避ける。"
          ultra_moon: "全身から　染み出す　油は\nとても　なめらか。　肌荒れに\n悩む人にも　効果的なのだ。"
        en:
          ultra_sun: "The white parts of its coat are covered in an oil\nsecreted from its body, so this Pokémon can\nslide right away from its enemies’ attacks."
          ultra_moon: "The oil that seeps from its body is really\nsmooth. For people troubled by bad skin,\nthis oil is an effective treatment."
        fr:
          ultra_sun: "Grâce à la sécrétion huileuse dont ses poils\nblancs sont recouverts, les attaques glissent\nsur sa fourrure comme sur de la soie."
          ultra_moon: "Le liquide que son corps sécrète est\nétrangement huileux. C’est un remède efficace\npour les personnes qui ont la peau sèche."
        it:
          ultra_sun: "Schiva con facilità i colpi dei nemici, che\nscivolano sulla pelliccia bianca rivestita dal\ngrasso speciale prodotto dal suo corpo."
          ultra_moon: "Il grasso particolarmente oleoso prodotto dal\nsuo corpo è molto efficace contro le irritazioni\ncutanee."
        de:
          ultra_sun: "Sein weißer Flaum ist von einem Film aus\nspeziellem Öl überzogen, das aus seinem Körper\naustritt. Gegnerische Angriffe gleiten daran ab."
          ultra_moon: "Aus seinem Körper tritt besonders schmieriges\nÖl aus, das für Menschen, die unter trockener\nHaut leiden, von großem Nutzen ist."
        es:
          ultra_sun: "Su níveo pelaje está recubierto de una sustancia\noleosa, secretada por su propio cuerpo, que\nhace resbalar los golpes enemigos."
          ultra_moon: "La grasa que exuda por todo el cuerpo es muy\nlubrificante y altamente apreciada por las\npersonas con problemas de piel seca."
        ko:
          ultra_sun: "하얀 털은 몸에서 나오는\n기름으로 코팅되어\n적의 공격도 매끄럽게 피한다."
          ultra_moon: "전신에서 배어 나오는 기름은\n매우 부드럽다. 거친 피부가\n고민인 사람에게도 효과적이다."
        zh_simp:
          ultra_sun: "白色的毛发上涂满身体里渗出的油，\n连敌人的攻击也能滑溜溜地避开。"
          ultra_moon: "从全身渗出的油非常滑。\n对于因肌肤干燥而烦恼的人\n也很有效果。"
        zh_trad:
          ultra_sun: "體內滲出的油在\n白色的毛皮上形成覆膜，\n能滑溜溜地避開敵人的攻擊。"
          ultra_moon: "從全身滲出的油非常滑。\n對於因為肌膚乾燥而\n煩惱的人也很有效果。"
