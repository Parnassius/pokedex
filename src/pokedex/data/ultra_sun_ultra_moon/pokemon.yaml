tirtouga:
  species_id: 564
  names:
    jp_kana: プロトーガ
    jp_kanji: プロトーガ
    en: Tirtouga
    fr: Carapagos
    it: Tirtouga
    de: Galapaflos
    es: Tirtouga
    ko: 프로토가
    zh_simp: 原盖海龟
    zh_trad: 原蓋海龜
  forms:
    tirtouga:
      form_id: 0
      base_stats:
        hp: 54
        attack: 78
        defense: 103
        special_attack: 53
        special_defense: 45
        speed: 22
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - rock
      egg_groups:
        - water_1
        - water_3
      abilities:
        - solid_rock
        - sturdy
