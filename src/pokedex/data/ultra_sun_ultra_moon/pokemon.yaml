cottonee:
  species_id: 546
  names:
    jp_kana: モンメン
    jp_kanji: モンメン
    en: Cottonee
    fr: Doudouvet
    it: Cottonee
    de: Waumboll
    es: Cottonee
    ko: 소미안
    zh_simp: 木棉球
    zh_trad: 木棉球
  forms:
    cottonee:
      form_id: 0
      base_stats:
        hp: 40
        attack: 27
        defense: 60
        special_attack: 37
        special_defense: 50
        speed: 66
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - grass
        - fairy
      egg_groups:
        - grass
        - fairy
      abilities:
        - prankster
        - infiltrator
      hidden_ability: chlorophyll
      held_items:
        rare: absorb_bulb
      descriptions:
        jp_kana:
          ultra_sun: "わたを　とばして　みを　まもる。\nあめに　ぬれると　わたが　しめって\nおもくなり　みうごきが　とれなくなる。"
          ultra_moon: "おそわれると　からだの　ワタを\nとばして　おとりにする。　とばした\nワタは　また　すぐに　はえてくるぞ。"
        jp_kanji:
          ultra_sun: "綿を　飛ばして　身を　守る。\n雨に　濡れると　綿が　湿って\n重くなり　身動きが　とれなくなる。"
          ultra_moon: "襲われると　身体の　ワタを\n飛ばして　おとりにする。　飛ばした\nワタは　また　すぐに　生えてくるぞ。"
        en:
          ultra_sun: "To protect itself, it shoots cotton from its body.\nWhen it gets wet in the rain, its cotton grows\nmoist and heavy, and it can’t move as well."
          ultra_moon: "When attacked, it expels cotton from its\nbody to create a diversion. The cotton it loses\ngrows back in quickly."
        fr:
          ultra_sun: "Il projette un nuage de coton pour se protéger.\nQuand il pleut, son coton s’imbibe d’eau et\nle rend si lourd qu’il est incapable de bouger."
          ultra_moon: "Lorsqu’on l’attaque, il sème du coton pour faire\ndiversion. Celui-ci repousse tout de suite."
        it:
          ultra_sun: "Si difende creando una nuvola di cotone.\nQuando piove, il cotone si appesantisce\nper l’umidità impedendogli di muoversi."
          ultra_moon: "Se viene attaccato, crea una nuvola di cotone\ncome diversivo. Il cotone consumato a questo\nscopo ricresce immediatamente."
        de:
          ultra_sun: "Es schützt sich, indem es Watte verstreut.\nWird es Regen ausgesetzt, saugt es sich voll\nund wird zu schwer, um sich zu bewegen."
          ultra_moon: "Wird es angegriffen, verstreut es zur Täuschung\nWatte, die es von seinem Körper nimmt. Die\nverbrauchte Watte wächst sofort wieder nach."
        es:
          ultra_sun: "Lanza bolas de algodón como defensa. Cuando\nllueve y se moja, se vuelve tan pesado que le\nresulta difícil moverse."
          ultra_moon: "Cuando lo atacan despide bolas de algodón a\nmodo de señuelo. Estas, sin embargo, vuelven a\ncrecer enseguida."
        ko:
          ultra_sun: "솜을 날려 몸을 지킨다.\n비에 젖으면 솜이 축축하고\n무거워져 움직일 수 없게 된다."
          ultra_moon: "공격당하면 몸에 있는 솜을\n날려 미끼로 쓴다. 날린 솜은\n또 금방 자라난다."
        zh_simp:
          ultra_sun: "会喷出棉花保护身体。\n如果淋到雨，棉花就会受潮变重，\n身体变得动弹不得。"
          ultra_moon: "一旦被袭击，就会喷出\n身上的棉花来代替自己的身体。\n喷出的棉花很快又会长出来。"
        zh_trad:
          ultra_sun: "會撒出棉花保護自己。\n如果淋到雨，棉花就會受潮變重，\n讓牠的身體動彈不得。"
          ultra_moon: "遭到襲擊時，會噴出身上的\n棉花當成替身。噴出的棉花\n很快就會長回來。"
whimsicott:
  species_id: 547
  names:
    jp_kana: エルフーン
    jp_kanji: エルフーン
    en: Whimsicott
    fr: Farfaduvet
    it: Whimsicott
    de: Elfun
    es: Whimsicott
    ko: 엘풍
    zh_simp: 风妖精
    zh_trad: 風妖精
  forms:
    whimsicott:
      form_id: 0
      base_stats:
        hp: 60
        attack: 67
        defense: 85
        special_attack: 77
        special_defense: 75
        speed: 116
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
