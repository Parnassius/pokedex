      descriptions:
        jp_kana:
          ultra_sun: "１ぴきが　サンドの　あしを　すくい\nひっくりかえすと　もう　１ぴきが\nするどいツメで　とどめを　さす。"
          ultra_moon: "かしこくなり　エサを　めぐっての\nケンカは　おこらなくなった。　ツメで\nひっかかれると　とうしょうになるぞ。"
        jp_kanji:
          ultra_sun: "１匹が　サンドの　足を　すくい\nひっくり返すと　もう　１匹が\n鋭いツメで　止めを　刺す。"
          ultra_moon: "賢くなり　エサを　巡っての\nケンカは　起こらなくなった。　ツメで\nひっかかれると　凍傷になるぞ。"
        en:
          ultra_sun: "One Weavile will trip a Sandshrew and flip it\nover, and then another Weavile will deal the\nfinishing blow with its sharp claws."
          ultra_moon: "Thanks to its increased intelligence, scrapping\nover food is a thing of the past. A scratch from\nits claws will give you a case of frostbite!"
        fr:
          ultra_sun: "Il chasse les Sabelette en équipe : un Dimoret\nmaintient la proie sur le dos, puis un deuxième\nl’achève d’un coup de griffe."
          ultra_moon: "Il est devenu assez sournois pour ne plus avoir\nà se battre pour ses proies. Quiconque entre\nen contact avec ses griffes souffrira de gelures."
        it:
          ultra_sun: "Caccia in coppia: un Weavile fa cadere\nSandshrew mandandolo a gambe all’aria mentre\nun altro dà il colpo di grazia con gli artigli affilati."
          ultra_moon: "Si è fatto furbo e non ha più bisogno di lottare\nper il cibo. Il tocco dei suoi artigli provoca dei\ngeloni."
        de:
          ultra_sun: "Zieht es einem Sandan die Beine weg, gibt ein\nweiteres Snibunna der nun rücklings liegenden\nBeute mit seinen Krallen den Gnadenstoß."
          ultra_moon: "Es hat gelernt, sich mit Artgenossen nicht mehr\num seine Beute zu streiten. Kratzer durch seine\nKlauen hinterlassen Frostbeulen."
        es:
          ultra_sun: "Trabaja en parejas. Uno pone la zancadilla a un\nSandshrew y, cuando está boca arriba, el otro\nWeavile lo ataca con sus afiladas garras."
          ultra_moon: "Se ha vuelto tan astuto que las disputas por las\npresas obtenidas son cosa del pasado. Quien se\nve golpeado por sus garras sufre congelaciones."
        ko:
          ultra_sun: "1마리가 모래두지에게 다리를 걸어\n뒤집으면 다른 1마리가\n날카로운 발톱으로 처리한다."
          ultra_moon: "영리해져서 먹이를 두고\n싸우지 않게 되었다. 손톱으로\n할퀴어지면 동상에 걸린다."
        zh_simp:
          ultra_sun: "１只负责绊住穿山鼠的脚，\n将其翻过来后，另１只用\n锐利的爪子给予致命一击。"
          ultra_moon: "变聪明了，\n不会因为食物的分配而打架。\n如果被它的爪子勾到就会冻伤。"
        zh_trad:
          ultra_sun: "一隻負責絆住穿山鼠的腳，\n讓牠翻過來。另一隻則用\n銳利的爪子給予致命一擊。"
          ultra_moon: "變得比較聰明，\n不再為了爭奪食物而打架。\n要是被牠的爪子抓到就會凍傷。"
magnezone:
  species_id: 462
  names:
    jp_kana: ジバコイル
    jp_kanji: ジバコイル
    en: Magnezone
    fr: Magnézone
    it: Magnezone
    de: Magnezone
    es: Magnezone
    ko: 자포코일
    zh_simp: 自爆磁怪
    zh_trad: 自爆磁怪
  forms:
    magnezone:
      form_id: 0
      base_stats:
        hp: 70
        attack: 70
        defense: 115
        special_attack: 130
        special_defense: 90
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - electric
        - steel
      egg_groups:
        - mineral
      abilities:
        - magnet_pull
        - sturdy
