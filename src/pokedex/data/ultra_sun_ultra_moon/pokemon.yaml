      descriptions:
        jp_kana:
          ultra_sun: "あたまから　ねばりけの　ある　ツルを\nのばして　はなを　つんで　じぶんを\nかざる。　はなが　ないと　ふあん。"
          ultra_moon: "つんだ　はなを　たいえきで　からだに\nくっつける。　はなびらから　ただよう\nかおりには　いやしの　こうかがある。"
        jp_kanji:
          ultra_sun: "頭から　粘り気の　ある　ツルを\n伸ばして　花を　摘んで　自分を\n飾る。　花が　ないと　不安。"
          ultra_moon: "摘んだ　花を　体液で　身体に\nくっつける。　花弁から　ただよう\n香りには　癒しの　効果がある。"
        en:
          ultra_sun: "It stretches sticky vines out from its head and\npicks flowers to adorn itself with. When it\ndoesn’t have any flowers, it feels uneasy."
          ultra_moon: "It picks flowers and sticks them to its body\nwith fluids it produces. The aroma that wafts\nfrom its petals has a healing effect."
        fr:
          ultra_sun: "Il ramasse des fleurs en déployant la liane\ngluante accrochée à sa tête et s’en agrémente.\nIl se sent mal à l’aise lorsqu’il n’en a pas."
          ultra_moon: "Il cueille des fleurs qu’il colle sur son corps\ngrâce à ses fluides corporels. Le parfum qui\némane de ses pétales a des vertus apaisantes."
        it:
          ultra_sun: "Ama adornare di fiori la liana appiccicosa\nche gli spunta dalla testa. Se resta senza\nfiori, si fa prendere dall’ansia."
          ultra_moon: "Usa i suoi fluidi corporei per attaccarsi addosso\ni fiori che raccoglie. Il profumo che emana dai\nsuoi petali ha proprietà curative."
        de:
          ultra_sun: "Mit der klebrigen Ranke an seinem Kopf pflückt\nes Blumen und schmückt sich dann mit ihnen.\nFehlt ihm sein Blütenschmuck, wird es nervös."
          ultra_moon: "Es pflückt Blumen und klebt sie mithilfe eines\nSekrets an seinen Körper. Von seinen Blüten\ngeht ein Duft mit heilsamer Wirkung aus."
        es:
          ultra_sun: "Adorna con flores el tallo pegajoso que brota\nde su cabeza. Sin ellas se siente intranquilo."
          ultra_moon: "Prende flores en su tallo usando sus fluidos\ncorporales. El aroma que desprenden los\npétalos tiene propiedades curativas."
        ko:
          ultra_sun: "머리에서 끈적거리는 시위를\n늘려서 꽃을 따서 치장한다.\n꽃이 없으면 불안하다."
          ultra_moon: "딴 꽃에 체액을 묻혀 몸에\n붙인다. 꽃잎에서 감도는\n향기는 치유 효과가 있다."
        zh_simp:
          ultra_sun: "从头上伸出有粘性的藤蔓，\n用摘下的花朵装饰自己。\n没有花就会感到不安。"
          ultra_moon: "用体液把摘下的花粘在身上。\n从花瓣散发出来的香气具有治愈的效果。"
        zh_trad:
          ultra_sun: "會從頭上伸出有黏性的藤蔓\n摘下花朵，拿來裝飾自己。\n沒有花就會感到不安。"
          ultra_moon: "會用體液把摘下的花黏在身上。\n花瓣散發出的香氣\n具有療癒的效果。"
oranguru:
  species_id: 765
  names:
    jp_kana: ヤレユータン
    jp_kanji: ヤレユータン
    en: Oranguru
    fr: Gouroutan
    it: Oranguru
    de: Kommandutan
    es: Oranguru
    ko: 하랑우탄
    zh_simp: 智挥猩
    zh_trad: 智揮猩
  forms:
    oranguru:
      form_id: 0
      base_stats:
        hp: 90
        attack: 60
        defense: 80
        special_attack: 90
        special_defense: 110
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - telepathy
      hidden_ability: symbiosis
      descriptions:
        jp_kana:
          ultra_sun: "ふだんは　きのうえで　めいそうして\nすごす。　かってにモンスターボールを\nなげて　ポケモンに　めいれいする。"
          ultra_moon: "ヤレユータンどうしは　なかが　わるく\nどちらが　かしこく　かくが　うえか\nちえくらべを　くりかえす。"
        jp_kanji:
          ultra_sun: "普段は　木の上で　瞑想して\n過ごす。　勝手にモンスターボールを\n投げて　ポケモンに　命令する。"
          ultra_moon: "ヤレユータン同士は　仲が　悪く\nどちらが　賢く　格が　上か\n知恵比べを　繰り返す。"
        en:
          ultra_sun: "It normally spends its time meditating in the\ntreetops. It throws Poké Balls and gives other\nPokémon orders as it pleases."
          ultra_moon: "Oranguru don’t get along with each other, so\nthey’re always engaging in battles of wits to\ndecide which one is superior."
        fr:
          ultra_sun: "Il médite généralement en haut des arbres.\nIl se permet de lancer des Poké Balls sur les\nautres Pokémon et leur donne des ordres."
          ultra_moon: "Les Gouroutan ne s’entendent pas bien entre\neux. Ils ne cessent de se provoquer en duel\npour comparer leur degré d’intelligence."
        it:
          ultra_sun: "Solitamente passa il tempo meditando in cima\nagli alberi. A volte si diverte a lanciare Poké Ball\ne dare ordini agli altri Pokémon."
          ultra_moon: "Gli Oranguru non vanno d’accordo tra di loro\ne si sfidano sempre in prove d’intelligenza\nper stabilire chi sia il più sagace."
        de:
          ultra_sun: "Es verbringt die meiste Zeit in Meditation auf\nBaumwipfeln. Manchmal wirft es Pokébälle auf\nPokémon und erteilt ihnen Befehle."
          ultra_moon: "Kommandutan kommen nicht gut miteinander\naus. Ständig wetteifern sie, wer von ihnen wohl\nam klügsten sei."
        es:
          ultra_sun: "Se pasa las horas meditando en lo alto de los\nárboles. Cuando se le antoja, lanza Poké Balls a\notros Pokémon y les da órdenes."
          ultra_moon: "Los Oranguru se llevan mal entre ellos y\ncompiten constantemente para saber cuál es\nsuperior y más inteligente que los demás."
        ko:
          ultra_sun: "평소에는 나무 위에서 명상하며\n지낸다. 제멋대로 몬스터볼을\n던져 포켓몬에게 명령한다."
          ultra_moon: "하랑우탄끼리는 사이가 좋지 않아서\n누가 더 똑똑하고 수준이 높은지\n지혜 겨루기를 반복한다."
        zh_simp:
          ultra_sun: "平常就在树上冥想着度日。\n会随意投掷精灵球，\n命令宝可梦。"
          ultra_moon: "智挥猩同类之间关系很差，\n总是反反复复地斗智，\n看谁更聪明，水平更高。"
        zh_trad:
          ultra_sun: "平時待在樹上冥想度日。\n會隨意投擲精靈球，\n對寶可夢下達命令。"
          ultra_moon: "智揮猩同類之間的關係很差，\n總是反覆不斷地鬥智，\n看誰比較聰明。"
passimian:
  species_id: 766
  names:
    jp_kana: ナゲツケサル
    jp_kanji: ナゲツケサル
    en: Passimian
    fr: Quartermac
    it: Passimian
    de: Quartermak
    es: Passimian
    ko: 내던숭이
    zh_simp: 投掷猴
    zh_trad: 投擲猴
  forms:
    passimian:
      form_id: 0
      base_stats:
        hp: 100
        attack: 120
        defense: 90
        special_attack: 40
        special_defense: 60
        speed: 80
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - field
      abilities:
        - receiver
      hidden_ability: defiant
      descriptions:
        jp_kana:
          ultra_sun: "だえきを　つかって　はっぱを　かたに\nはりつけて　マーキング。　はっぱの\nはいちで　どの　むれか　わかるよ。"
          ultra_moon: "きのみは　ぶきで　あり　しゅしょく。\nむれの　なかで　１ばん　とおくまで\nきのみを　なげられるものが　ボスだ。"
        jp_kanji:
          ultra_sun: "唾液を　使って　葉っぱを　肩に\n貼り付けて　マーキング。　葉っぱの\n配置で　どの　群れか　わかるよ。"
          ultra_moon: "きのみは　武器で　あり　主食。\n群れの　中で　１番　遠くまで\nきのみを　投げられるものが　ボスだ。"
        en:
          ultra_sun: "They use their saliva to stick leaves to their\nshoulders. You can tell what troop they belong\nto from the position of the leaves."
          ultra_moon: "Berries are its weapons as well as the staple of\nits diet. The one that can throw a berry the\nfarthest is the boss of the troop."
        fr:
          ultra_sun: "Il utilise sa salive pour coller des feuilles\nsur ses épaules. Leur disposition indique\nson appartenance à un groupe particulier."
          ultra_moon: "Les Baies constituent à la fois son arme\net la base de son alimentation. Celui qui peut\nles lancer le plus loin devient le chef du groupe."
        it:
          ultra_sun: "Le foglie sulle spalle, attaccate con la saliva,\nformano un simbolo che identifica il gruppo\ndi appartenenza di ogni Passimian."
          ultra_moon: "Utilizza le bacche sia come arma che come cibo.\nIl Passimian che riesce a scagliarle più lontano\ndiventa il capo del suo gruppo."
        de:
          ultra_sun: "Mit Speichel klebt es sich Blätter als Markierung\nauf die Schultern. Die Anordnung dieser Blätter\nzeigt, welcher Gruppe sie angehören."
          ultra_moon: "Beeren sind nicht nur sein Hauptnahrungsmittel,\nsie dienen auch als Waffe. Wer sie am weitesten\nwerfen kann, gilt als Anführer der Gruppe."
        es:
          ultra_sun: "Adorna sus hombros con hojas que adhiere con\nsu saliva. La distribución de estas hojas indica\na qué manada pertenece."
          ultra_moon: "Las bayas son su arma, además de su sustento.\nEl que sea capaz de lanzarlas a mayor distancia\nse convierte en el líder de la manada."
        ko:
          ultra_sun: "침으로 어깨에 잎사귀를\n붙여서 마킹한다. 잎사귀의\n위치로 어느 무리인지 알 수 있다."
          ultra_moon: "나무열매가 무기이자 주식이다.\n무리 중에서 가장 멀리\n나무열매를 던지는 자가 보스다."
        zh_simp:
          ultra_sun: "使用唾液将叶片贴在肩上做标记。\n通过叶片的分布就能明白\n是哪个群体哦。"
          ultra_moon: "树果是它的武器，也是主食。\n在群体中，能把树果投得最远的\n就是它们的老大。"
        zh_trad:
          ultra_sun: "會用唾液將葉片貼在肩膀上\n當作標記。只要看葉片的排列\n就能得知所屬的群體。"
          ultra_moon: "樹果是牠的武器，也是主食。\n在群體中，誰能把樹果投得最遠，\n誰就是牠們的老大。"
wimpod:
  species_id: 767
  names:
    jp_kana: コソクムシ
    jp_kanji: コソクムシ
    en: Wimpod
    fr: Sovkipou
    it: Wimpod
    de: Reißlaus
    es: Wimpod
    ko: 꼬시레
    zh_simp: 胆小虫
    zh_trad: 膽小蟲
  forms:
    wimpod:
      form_id: 0
      base_stats:
        hp: 25
        attack: 35
        defense: 40
        special_attack: 20
        special_defense: 30
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - bug
        - water
      egg_groups:
        - bug
        - water_3
      abilities:
        - wimp_out
      descriptions:
        jp_kana:
          ultra_sun: "おちてるものは　なんでも　ひろう。\nコインを　もっていることも　あるので\nヤミカラスやニャースに　ねらわれる。"
          ultra_moon: "とても　しょうしんものの　ポケモン。\nなにかが　ちかづくだけで　こうそくで\nあしを　うごかして　にげていくよ。"
        jp_kanji:
          ultra_sun: "落ちているものは　何でも　拾う。\nコインを　持っていることも　あるので\nヤミカラスやニャースに　狙われる。"
          ultra_moon: "とても　小心者の　ポケモン。\n何かが　近付くだけで　高速で\n足を　動かして　逃げていくよ。"
        en:
          ultra_sun: "It will pick up anything it finds on the ground.\nSometimes it finds coins, so Murkrow and\nMeowth will go after it."
          ultra_moon: "An astonishingly cowardly Pokémon, Wimpod\nwill whir its legs at high speeds to run away if\nanything comes near it."
        fr:
          ultra_sun: "Il ramasse tout ce qu’il trouve par terre, y\ncompris des pièces. Cela lui vaut d’être pris\npour cible par les Cornèbre et les Miaouss."
          ultra_moon: "Un Pokémon timoré qui se sauve à toutes pattes\ndès que l’on s’approche de lui."
        it:
          ultra_sun: "Raccoglie da terra ogni tipo di oggetto.\nQuando trova delle monete viene preso\ndi mira da Murkrow e Meowth."
          ultra_moon: "È un Pokémon estremamente timoroso.\nNon appena qualcosa gli si avvicina, Wimpod se\nla svigna a gran velocità agitando le zampette."
        de:
          ultra_sun: "Es hebt alles auf, was es finden kann. Manchmal\nbefinden sich darunter auch Münzen, weshalb\nes oft von Kramurx und Mauzi gejagt wird."
          ultra_moon: "Dieses Pokémon ist ein wahrer Drückeberger.\nSobald sich ihm etwas nähert, strampelt es flink\nmit seinen Beinchen und nimmt Reißaus."
        es:
          ultra_sun: "Recoge todo lo que encuentra por el suelo. A\nveces recoge monedas, lo que atrae la atención\nde Murkrow y Meowth."
          ultra_moon: "Es un Pokémon muy cobarde. En cuanto nota\nque algo se le acerca, sale huyendo a gran\nvelocidad."
        ko:
          ultra_sun: "떨어져 있는 것은 뭐든지 줍는다.\n동전을 갖고 있을 때도 있어\n니로우나 나옹이 노리고 있다."
          ultra_moon: "매우 소심한 포켓몬.\n무언가가 다가오기만 해도 고속으로\n다리를 움직여서 도망친다."
        zh_simp:
          ultra_sun: "无论是什么掉落的东西，都会捡。\n因为有时候也会拿着硬币，\n所以会被黑暗鸦和喵喵袭击。"
          ultra_moon: "是非常胆小的宝可梦。\n只要有什么靠近，\n就会飞快地拔腿就逃哦。"
        zh_trad:
          ultra_sun: "掉在地上的東西全都會撿起來。\n因為有時也會撿到硬幣，\n所以會被黑暗鴉和喵喵襲擊。"
          ultra_moon: "非常膽小的寶可夢。\n只要有什麼東西靠近，\n就會迅速地拔腿就逃。"
golisopod:
  species_id: 768
  names:
    jp_kana: グソクムシャ
    jp_kanji: グソクムシャ
    en: Golisopod
    fr: Sarmuraï
    it: Golisopod
    de: Tectass
    es: Golisopod
    ko: 갑주무사
    zh_simp: 具甲武者
    zh_trad: 具甲武者
  forms:
    golisopod:
      form_id: 0
      base_stats:
        hp: 75
        attack: 125
        defense: 140
        special_attack: 60
        special_defense: 90
