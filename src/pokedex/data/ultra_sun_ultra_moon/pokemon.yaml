      descriptions:
        jp_kana:
          ultra_sun: "すてられた　ヌイグルミに　おんねんが\nやどった。　じぶんを　すてたものを\nさがし　ふくしゅうする　つもりだ。"
          ultra_moon: "すてられた　おんねんで　うまれる。\nたいせつに　されると　まんぞくして\nもとの　ヌイグルミに　もどるという。"
        jp_kanji:
          ultra_sun: "捨てられた　ヌイグルミに　怨念が\n宿った。　自分を　捨てた者を\n探し　復しゅうする　つもりだ。"
          ultra_moon: "捨てられた　怨念で　生まれる。\n大切に　されると　満足して\n元の　ヌイグルミに　戻るという。"
        en:
          ultra_sun: "It’s a stuffed toy that was thrown away and\nbecame possessed, ever searching for the one\nwho threw it away so it can exact its revenge."
          ultra_moon: "Resentment at being cast off made it spring into\nbeing. Some say that treating it well will satisfy\nit, and it will once more become a stuffed toy."
        fr:
          ultra_sun: "Animée par la rancune, cette poupée\nabandonnée traque son ancien propriétaire\npour se venger."
          ultra_moon: "Il est né de la rancune qu’il a ressentie quand\nil a été abandonné. Il redevient apparemment\nune poupée si l’on en prend grand soin."
        it:
          ultra_sun: "È un peluche pieno di rancore per essere stato\nbuttato via. Cerca senza darsi pace il vecchio\nproprietario per vendicarsi."
          ultra_moon: "È stato generato dalla rabbia per essere stato\nbuttato via. Si dice che se ci si prende cura di\nlui, tornerà a essere il peluche di un tempo."
        de:
          ultra_sun: "Einst als Plüschpuppe weggeworfen, ist dieses\nhasserfüllte Pokémon auf der Suche nach dem\nTäter, um sich an ihm zu rächen."
          ultra_moon: "Geboren aus Hass, weil es weggeworfen wurde,\nsoll es sich wieder in eine Plüschpuppe\nzurückverwandeln, wenn es sich geliebt fühlt."
        es:
          ultra_sun: "Este muñeco de trapo alberga gran odio por la\npersona que lo abandonó, a quien busca sin\ndescanso para vengarse."
          ultra_moon: "El rencor de haber sido tirado a la basura fue lo\nque le dio vida. Se dice que puede convertirse\nde nuevo en muñeco si se le trata con cariño."
        ko:
          ultra_sun: "버려진 인형에 원념이 깃들었다.\n자신을 버린 자를 \n찾아내 복수할 셈이다."
          ultra_moon: "버려진 원념에 의해 태어난다.\n소중히 대하면 만족해서\n원래의 인형으로 돌아간다고 한다."
        zh_simp:
          ultra_sun: "怨念附在被丢弃的玩偶身上，\n打算寻找丢弃自己的人来报仇。"
          ultra_moon: "因被丢弃的怨念而诞生。\n听说，如果满足它受重视的需求，\n就会变回原来的玩偶。"
        zh_trad:
          ultra_sun: "怨念附在被丟棄的玩偶上，\n不斷尋找著丟棄自己的人，\n想要為自己報仇。"
          ultra_moon: "誕生自遭到捨棄時的怨念。\n據說只要讓牠感覺自己受到重視，\n牠就會滿意地變回原本的玩偶。"
    banette_mega:
