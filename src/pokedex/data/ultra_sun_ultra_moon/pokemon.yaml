        - levitate
      held_items:
        rare: light_clay
      descriptions:
        jp_kana:
          ultra_sun: "ぬれると　からだが　とけてしまう。\nあめが　ふってくると　サイコパワーで\nぜんしんを　つつんで　まもる。"
          ultra_moon: "こだいじんが　そらから　おりてきた\nなにかを　もして　つくったらしい。\nりょううで　から　ビームを　はなつ。"
        jp_kanji:
          ultra_sun: "濡れると　身体が　溶けてしまう。\n雨が　降ってくると　サイコパワーで\n全身を　包んで　守る。"
          ultra_moon: "古代人が　空から　降りてきた\nなにかを　模して　作ったらしい。\n両腕　から　ビームを　放つ。"
        en:
          ultra_sun: "If it gets wet, its body melts. When rain starts\nto fall, it wraps its whole body up with its\npsychic powers to protect itself."
          ultra_moon: "The ancient people who made it apparently\nmodeled it after something that descended\nfrom the sky. It fires beams from both arms."
        fr:
          ultra_sun: "Il fond au moindre contact avec l’eau et doit\ndonc entourer son corps d’énergie psychique\npour se protéger les jours de pluie."
          ultra_moon: "Il aurait été fabriqué par une civilisation\nancienne, sur le modèle d’un objet mystérieux\ntombé du ciel. Ses bras peuvent tirer des lasers."
        it:
          ultra_sun: "Se si bagna, si scioglie. Quando piove,\nsi protegge usando i suoi poteri psichici."
          ultra_moon: "Sembra che sia stato creato da un popolo antico\nispirandosi a qualcosa di misterioso caduto\ndal cielo. Emette raggi dagli arti superiori."
        de:
          ultra_sun: "Wenn es nass wird, schmilzt es. Fängt es an zu\nregnen, errichtet es mit seinen Psycho-Kräften\neine schützende Hülle um seinen Körper."
          ultra_moon: "Menschen der Urzeit haben es als Nachbildung\nvon etwas, das vom Himmel kam, hergestellt.\nEs verschießt Strahlen aus beiden Händen."
        es:
          ultra_sun: "Su cuerpo se disuelve si se moja, razón por la\nque emplea su poder psíquico para crear una\nbarrera a su alrededor los días de lluvia."
          ultra_moon: "Se cree que fue creado por humanos primitivos\nque tomaron como modelo algo caído del cielo.\nDispara rayos por las manos."
        ko:
          ultra_sun: "젖으면 몸이 녹아버린다.\n비가 오면 사이코 파워로\n전신을 감싸서 지킨다."
          ultra_moon: "고대인이 하늘에서 내려온\n무언가를 본떠서 만들었다고 한다.\n양팔에서 빔을 발사한다."
        zh_simp:
          ultra_sun: "如果淋湿，身体就会溶解掉。\n所以下雨时会用精神力量\n包住全身，保护自己。"
          ultra_moon: "好像是古代人模仿\n从天而降的某物制作而成。\n会从双臂发射出光束。"
        zh_trad:
          ultra_sun: "一旦被淋濕身體就會溶解，\n所以下雨時牠會用精神力量\n包住全身來保護自己。"
          ultra_moon: "似乎是古代人模仿從天而降的\n某種東西而製造的。\n會從雙臂發射出光束。"
lileep:
