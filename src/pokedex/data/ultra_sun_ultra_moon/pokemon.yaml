      types:
        - rock
        - dragon
      egg_groups:
        - monster
        - dragon
      abilities:
        - strong_jaw
      hidden_ability: sturdy
      descriptions:
        jp_kana:
          ultra_sun: "おおアゴは　すさまじい　はかいりょく。\nふくげんさせても　とうじと　おなじ\nすがたでは　ないという　せつもある。"
          ultra_moon: "あまえんぼうで　わがまま。　チゴラスは\nじゃれているつもりでも　あいては\nおおけがでは　すまないことも　ある。"
        jp_kanji:
          ultra_sun: "大アゴは　凄まじい　破壊力。\n復元させても　当時と　同じ\n姿では　ないという　説もある。"
          ultra_moon: "甘えんぼうで　わがまま。　チゴラスは\nじゃれているつもりでも　相手は\n大怪我では　済まないことも　ある。"
        en:
          ultra_sun: "Its large jaw has incredible destructive power.\nSome theories suggest that its restored form is\ndifferent from its form of long ago."
          ultra_moon: "Tyrunt is spoiled and selfish. It may just be\ntrying to frolic, but sometimes the ones it’s\ntrying to frolic with are gravely injured."
        fr:
          ultra_sun: "Sa mâchoire géante est d’une puissance\nredoutable. Le Pokémon reconstitué serait\nlégèrement différent de son modèle antique."
          ultra_moon: "Il est un peu égoïste et aime être le centre\nd’attention. Il arrive que ses partenaires de jeu\nfinissent avec de graves blessures."
        it:
          ultra_sun: "La sua mandibola ha un’enorme forza\ndistruttrice. Secondo alcuni il suo aspetto\noriginale è un po’ diverso da quello rigenerato."
          ultra_moon: "È capriccioso e ama farsi coccolare.\nAnche se non lo fa di proposito, può ferire\ngravemente il suo compagno di giochi."
        de:
          ultra_sun: "Sein riesiger Kiefer birgt zerstörerische Kräfte.\nEs heißt, zurückverwandelte Balgoras seien\nnicht identisch mit den ursprünglichen Pokémon."
          ultra_moon: "Es ist verwöhnt und trotzig. Wer es mit ihm zu\ntun hat, muss eventuell mit mehr als schweren\nWunden rechnen, selbst wenn es nur spielen will."
        es:
          ultra_sun: "Puede ejercer una enorme presión con su gran\nmandíbula. Se cree que esta especie regenerada\na partir de un fósil difiere de la de tiempo ha."
          ultra_moon: "Un tanto egoísta y malcriado. Aunque solo esté\nbromeando, a veces puede causar graves\nheridas a sus compañeros de juegos."
        ko:
          ultra_sun: "큰 턱은 무시무시한 파괴력을\n지녔다. 복원시켜도 당시와\n같은 모습은 아니라는 설도 있다."
          ultra_moon: "응석받이에 제멋대로다. 티고라스는\n장난으로 한 일이라도 상대는\n큰 부상으로 끝나지 않을 때도 있다."
        zh_simp:
          ultra_sun: "大颚有着非常惊人的破坏力。\n有说法，即使复原，\n也没法恢复到原本的样子。"
          ultra_moon: "爱撒娇又任性。有时候，\n即使宝宝暴龙只打算逗着玩，\n对方也会严重受伤。"
        zh_trad:
          ultra_sun: "大顎有著非常驚人的破壞力。\n也有一種說法是，即使將牠復原，\n也無法重現牠原本的樣子。"
          ultra_moon: "愛撒嬌又任性。有時候\n即使寶寶暴龍只是想鬧著玩，\n對手也會受到重創。"
tyrantrum:
  species_id: 697
