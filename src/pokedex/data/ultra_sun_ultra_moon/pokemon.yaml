        jp_kanji: メガハッサム
        en: Mega Scizor
        fr: Méga-Cizayox
        it: MegaScizor
        de: Mega-Scherox
        es: Mega-Scizor
        ko: 메가핫삼
        zh_simp: 超级巨钳螳螂
        zh_trad: 超級巨鉗螳螂
      base_stats:
        hp: 70
        attack: 150
