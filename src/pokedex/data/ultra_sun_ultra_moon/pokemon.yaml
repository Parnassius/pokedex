      descriptions:
        jp_kana:
          ultra_sun: "どうくつの　おくふかくに　すみ\nフェロモンで　メロメロに　した\nヤトウモリたちを　はべらせている。"
          ultra_moon: "エサが　とれなかった　ヤトウモリを\nほのおが　ふきだす　てのひらで\nはげしく　ビンタし　おしおきする。"
        jp_kanji:
          ultra_sun: "洞窟の　奥深くに　棲み\nフェロモンで　メロメロに　した\nヤトウモリたちを　侍らせている。"
          ultra_moon: "エサが　獲れなかった　ヤトウモリを\n炎が　噴き出す　手のひらで\n激しく　ビンタし　お仕置きする。"
        en:
          ultra_sun: "Salazzle lives deep in caves and forces the\nSalandit it has attracted with its pheromones\nto serve it."
          ultra_moon: "It punishes Salandit that couldn’t bring it food\nwith a fierce slap of its flame-spewing palm."
        fr:
          ultra_sun: "Ce Pokémon habite au fin fond des cavernes.\nIl se fait servir par des Tritox envoûtés par\nses phéromones."
          ultra_moon: "Malamandre punit sans merci les Tritox qui\nrentrent bredouilles de la chasse, généralement\nd’une gifle de sa paume enflammée."
        it:
          ultra_sun: "Vive nel profondo delle caverne e si circonda\ndi Salandit che ammalia con i suoi potenti\nferomoni."
          ultra_moon: "Punisce i Salandit che tornano senza una preda\nschiaffeggiandoli vigorosamente con le zampe\nanteriori che sprigionano fuoco."
        de:
          ultra_sun: "Dieses tief in Höhlen lebende Pokémon hält sich\nmännliche Molunk, die es sich mit Pheromonen\nhörig gemacht hat, als Diener."
          ultra_moon: "Aus seinen Handflächen schießt Feuer hervor.\nEs verpasst damit Molunk, die keine Beute\nzurückgebracht haben, schallende Ohrfeigen."
        es:
          ultra_sun: "Vive en las profundidades de las cuevas.\nGracias a sus feromonas, atrae Salandit y los\nhace presas de su voluntad."
          ultra_moon: "Castiga a los Salandit que no le traen caza\nabofeteándolos con sus ardientes zarpas."
        ko:
          ultra_sun: "동굴 깊은 곳에서 살며\n페로몬으로 헤롱헤롱하게 만들어\n야도뇽을 시중들게 한다."
          ultra_moon: "먹이를 잡지 못한 야도뇽은\n불꽃을 뿜어내는 손바닥으로\n세차게 따귀를 때려서 벌을 준다."
        zh_simp:
          ultra_sun: "居住在洞窟的深处，\n让那些因费洛蒙而着迷的\n夜盗火蜥侍奉自己。"
          ultra_moon: "对于没有猎获食物的夜盗火蜥，\n焰后蜥会用喷火的手掌猛烈地\n打它们的耳光，以作惩罚。"
        zh_trad:
          ultra_sun: "棲息在洞窟的深處，\n讓那些被自己的費洛蒙迷住的\n夜盜火蜥們侍奉自己。"
          ultra_moon: "對於那些沒捕到獵物的夜盜火蜥，\n焰后蜥會用噴火的手掌猛打\n牠們耳光作為懲罰。"
