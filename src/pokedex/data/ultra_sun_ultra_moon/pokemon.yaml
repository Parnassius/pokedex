        jp_kanji: ポワルンのすがた
        en: Normal
        fr: Forme de Morphéo
        it: Forma Castform
        de: Formeo
        es: Forma de Castform
        ko: 캐스퐁의 모습
        zh_simp: 飘浮泡泡的样子
        zh_trad: 飄浮泡泡的樣子
      base_stats:
        hp: 70
        attack: 70
