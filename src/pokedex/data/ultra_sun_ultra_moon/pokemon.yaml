      descriptions:
        jp_kana:
          ultra_sun: "さいしんの　けんきゅうで　おなかの\nもようは　２０しゅるい　いじょうの\nパターンが　あることが　はんめい。"
          ultra_moon: "おなかの　もようで　ひるませると\nすばやく　からだで　しめあげて\nあいての　こどうが　とまるのを　まつ。"
        jp_kanji:
          ultra_sun: "最新の　研究で　お腹の\n模様は　２０種類　以上の\nパターンが　あることが　判明。"
          ultra_moon: "お腹の　模様で　ひるませると\n素早く　身体で　締め上げて\n相手の　鼓動が　止まるのを　待つ。"
        en:
          ultra_sun: "The latest research has determined that there\nare over 20 possible arrangements of the\npatterns on its stomach."
          ultra_moon: "After stunning its opponents with the pattern\non its stomach, it quickly wraps them up in its\nbody and waits for them to stop moving."
        fr:
          ultra_sun: "Une étude récente aurait recensé plus de vingt\nmotifs différents pouvant orner le devant du\ncapuchon des Arbok."
          ultra_moon: "Il intimide sa proie grâce au motif situé sur\nle devant de son capuchon, puis l’enserre\njusqu’à ce que son cœur cesse de battre."
        it:
          ultra_sun: "Secondo gli studi più recenti, esistono più di 20\nvarianti del disegno che ha sul ventre."
          ultra_moon: "Spiazza l’avversario con il disegno sul ventre,\npoi gli si avvinghia rapidamente e aspetta che\nil suo battito cardiaco si fermi."
        de:
          ultra_sun: "Jüngsten Forschungsergebnissen zufolge gibt\nes mehr als 20 verschiedene Musterungen, die\nArboks Bauch aufweisen kann."
          ultra_moon: "Es schüchtert seinen Gegner mit dem Muster\nauf seinem Bauch ein und nimmt ihn dann in den\nWürgegriff, bis es keinen Widerstand mehr spürt."
        es:
          ultra_sun: "Recientes estudios han llegado a identificar\nhasta una veintena de patrones distintos que\npuede presentar el motivo de su cuello."
          ultra_moon: "Tras confundir a su presa con el motivo de su\ncuerpo, se enrosca a su alrededor y la aferra,\na la espera de que su pulso se detenga."
        ko:
          ultra_sun: "최근 연구에서 배 모양은\n20종류 이상의\n패턴이 있다고 판명되었다."
          ultra_moon: "배의 무늬로 풀이 죽게 한 뒤\n재빠르게 몸으로 조여서\n상대의 고동이 멈추기를 기다린다."
        zh_simp:
          ultra_sun: "根据最新的研究显示，\n它们腹部的花纹有着\n２０种以上不同的图案。"
          ultra_moon: "用腹部的花纹让对手畏缩后，\n就会快速地用身体勒住对手，\n并等着对手的心跳停止。"
        zh_trad:
          ultra_sun: "最新的研究結果顯示，\n牠們肚子上的花紋\n有２０種以上的不同圖案。"
          ultra_moon: "用腹部的花紋使對手畏縮後，\n就會迅速地用身體纏緊對手，\n然後靜待對手心跳停止。"
