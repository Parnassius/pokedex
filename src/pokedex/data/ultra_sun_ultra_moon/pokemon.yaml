inkay:
  species_id: 686
  names:
    jp_kana: マーイーカ
    jp_kanji: マーイーカ
    en: Inkay
    fr: Sepiatop
    it: Inkay
    de: Iscalar
    es: Inkay
    ko: 오케이징
    zh_simp: 好啦鱿
    zh_trad: 好啦魷
  forms:
    inkay:
      form_id: 0
      base_stats:
        hp: 53
        attack: 54
        defense: 53
        special_attack: 37
        special_defense: 46
        speed: 45
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - psychic
      egg_groups:
        - water_1
        - water_2
      abilities:
        - contrary
        - suction_cups
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          ultra_sun: "ひかりを　てんめつさせて　えものを\nおびきよせると　ながい　しょくしゅで\nからめとり　うごきを　ふうじるぞ。"
          ultra_moon: "なかまと　じょうほう　こうかんを\nするとき　からだの　はっこうたいを\nふくざつな　リズムで　ひからせる。"
        jp_kanji:
          ultra_sun: "光を　点滅させて　獲物を\nおびきよせると　長い　触手で\n絡めとり　動きを　封じるぞ。"
          ultra_moon: "仲間と　情報　交換を\nするとき　身体の　発光体を\n複雑な　リズムで　光らせる。"
        en:
          ultra_sun: "It draws prey near with its blinking lights and\nthen wraps them up in its long tentacles and\nholds them in place."
          ultra_moon: "When exchanging information with others of its\nkind, it flashes the light-emitting spots on its\nbody in a complex rhythm."
        fr:
          ultra_sun: "Il attire ses proies en faisant clignoter\nson corps, puis les immobilise en les enserrant\nde ses longs tentacules."
          ultra_moon: "Il fait clignoter ses points lumineux à différentes\nfréquences pour échanger des informations\navec ses congénères."
        it:
          ultra_sun: "Attira a sé la preda con luci lampeggianti\nper poi immobilizzarla avvinghiandola con\ni suoi tentacoli."
          ultra_moon: "Scambia informazioni con i suoi simili facendo\nlampeggiare i motivi sul suo corpo in sequenze\ncomplesse."
        de:
          ultra_sun: "Mit den blinkenden Punkten auf seinem Körper\nlockt es Beute an, um sie dann mit seinen langen\nTentakeln bewegungsunfähig zu machen."
          ultra_moon: "Wenn es mit seinen Artgenossen kommuniziert,\nlässt es die leuchtenden Punkte auf seinem\nKörper in einem komplexen Rhythmus blinken."
        es:
          ultra_sun: "Los destellos que emite atraen a su presa, a la\nque rodea con sus largos tentáculos e inmoviliza\npor completo."
          ultra_moon: "Los complejos patrones de destellos que emite\ncon sus órganos luminosos le permiten\ncomunicarse con sus congéneres."
        ko:
          ultra_sun: "빛을 깜박여 먹이를 꾀어내고\n긴 촉수로 포박하여\n움직이지 못하게 한다."
          ultra_moon: "동료와 정보 교환을 할 때\n몸의 발광체를\n복잡한 리듬으로 빛낸다."
        zh_simp:
          ultra_sun: "闪烁着光，让猎物受诱惑靠近后，\n会用长长的触手缠住对方，\n封住其行动。"
          ultra_moon: "与伙伴交换信息时，\n会让身上的发光体\n以复杂的节奏发光。"
        zh_trad:
          ultra_sun: "會利用閃爍的光吸引獵物靠近，\n然後用長長的觸手纏住對手，\n封鎖獵物的行動。"
          ultra_moon: "與夥伴交換訊息時，\n會讓身上的發光體\n以複雜的節奏發光。"
malamar:
  species_id: 687
  names:
    jp_kana: カラマネロ
    jp_kanji: カラマネロ
    en: Malamar
    fr: Sepiatroce
    it: Malamar
    de: Calamanero
    es: Malamar
    ko: 칼라마네로
    zh_simp: 乌贼王
    zh_trad: 烏賊王
  forms:
    malamar:
      form_id: 0
      base_stats:
        hp: 86
