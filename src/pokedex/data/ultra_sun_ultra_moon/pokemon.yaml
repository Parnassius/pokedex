      descriptions:
        jp_kana:
          ultra_sun: "もっている　スプーンは　フーディンが\nちょうのうりょくで　うみだしたもの。\nせかいに　１ぽんだけの　オリジナル。"
          ultra_moon: "こころから　しんらいした　あいてには\nスプーンを　ゆずる。　このスプーンで\nたべると　なんでも　おいしいらしい。"
        jp_kanji:
          ultra_sun: "持っている　スプーンは　フーディンが\n超能力で　生み出したもの。\n世界に　１本だけの　オリジナル。"
          ultra_moon: "心から　信頼した　相手には\nスプーンを　譲る。　このスプーンで\n食べると　なんでも　美味しいらしい。"
        en:
          ultra_sun: "Alakazam uses its psychic powers to make the\nspoons it carries. Each spoon is an original that\nthere’s only one of in the whole world."
          ultra_moon: "If it trusts someone deeply, it will let them have\none of its spoons. Anything you eat with that\nspoon is apparently delicious."
        fr:
          ultra_sun: "Il a lui-même créé ses cuillers avec sa propre\nforce psychique. Chaque exemplaire est unique\nau monde."
          ultra_moon: "S’il a pleinement confiance en quelqu’un, il lui\noffre une cuiller en gage d’amitié. Tout ce que\nl’on mange avec cette cuiller a un goût délicieux."
        it:
          ultra_sun: "I cucchiai che ha con sé sono stati creati grazie\nai suoi poteri psichici e sono esemplari unici\nal mondo."
          ultra_moon: "Chi si guadagna la sua piena fiducia ottiene in\nregalo uno dei suoi cucchiai. Se usato per\nmangiare, dà un sapore delizioso a tutti i cibi."
        de:
          ultra_sun: "Die beiden Löffel hat es mithilfe seiner Psycho-\nKräfte selbst erschaffen. Jeder von ihnen ist\nweltweit einzigartig."
          ultra_moon: "Wenn es volles Vertrauen in jemanden hat,\nüberlässt es ihm einen Löffel. Mit diesem wird\nangeblich alles zu einer Köstlichkeit."
        es:
          ultra_sun: "Las cucharas que lleva las creó él mismo con\nsus poderes psíquicos. Son únicas en el mundo\nentero."
          ultra_moon: "Quien se granjea su favor recibe como presente\nuna cuchara. Al parecer, todo cuanto se coma\ncon ella tendrá un sabor exquisito."
        ko:
          ultra_sun: "지니고 있는 숟가락은 후딘이\n초능력으로 만들어 낸 것이다.\n이 세상에 1개뿐인 오리지널이다."
          ultra_moon: "진심으로 신뢰하는 상대에게는\n숟가락을 양보한다. 이 숟가락으로\n먹으면 무엇이든 맛있다고 한다."
        zh_simp:
          ultra_sun: "手中的汤匙是胡地用超能力生成的。\n每把汤匙都是这世上独一无二的。"
          ultra_moon: "会把汤匙交给自己信任的对象。\n如果用这把汤匙吃东西的话，\n不管吃什么好像都会觉得很美味。"
        zh_trad:
          ultra_sun: "手中的湯匙是胡地\n用超能力製造出來的，\n是全世界獨一無二的作品。"
          ultra_moon: "會把湯匙交給自己打從心裡\n信任的對象。如果用這種湯匙吃東西，\n不管是什麼吃起來似乎都會很美味。"
    alakazam_mega:
      form_id: 1
      names:
        jp_kana: メガフーディン
        jp_kanji: メガフーディン
        en: Mega Alakazam
        fr: Méga-Alakazam
        it: MegaAlakazam
        de: Mega-Simsala
        es: Mega-Alakazam
        ko: 메가후딘
        zh_simp: 超级胡地
        zh_trad: 超級胡地
      base_stats:
        hp: 55
        attack: 50
        defense: 65
        special_attack: 175
        special_defense: 105
        speed: 150
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - trace
      held_items:
        rare: twisted_spoon
      descriptions:
        jp_kana:
          ultra_sun: "ひたいに　ある　あかい　きかんから\nサイコパワーを　ほうしゅつして\nあいての　すべてを　みとおすぞ。"
          ultra_moon: "きんにくと　ひきかえに　フーディンの\nしんの　ちからが　かいほう　された。\nサイコパワーで　すべてを　みとおす。"
        jp_kanji:
          ultra_sun: "額に　ある　赤い　器官から\nサイコパワーを　放出して\n相手の　すべてを　見通すぞ。"
          ultra_moon: "筋肉と　引き換えに　フーディンの\n真の　力が　解放　された。\nサイコパワーで　すべてを　見通す。"
        en:
          ultra_sun: "It sends out psychic power from the red organ\non its forehead to foresee its opponents’\nevery move."
          ultra_moon: "Having traded away its muscles, Alakazam’s\ntrue power has been unleashed. With its\npsychic powers, it can foresee all things."
        fr:
          ultra_sun: "Il se sert de l’organe rouge sur son front pour\némettre ses pouvoirs psychiques et sonder\nson adversaire pour tout savoir de lui."
          ultra_moon: "La Méga-Évolution a fait fondre ses muscles\npour libérer sa véritable puissance. Il est\nomniscient grâce à ses pouvoirs psychiques."
        it:
          ultra_sun: "Scatena i suoi poteri psichici tramite l’organo\nrosso sulla fronte e li usa per scoprire tutti\ni segreti del suo avversario."
          ultra_moon: "La megaevoluzione ha sprigionato la sua vera\npotenza a scapito dei muscoli. Grazie ai suoi\npoteri psichici può conoscere ogni cosa."
        de:
          ultra_sun: "Das rote Organ auf seiner Stirn sondert Psycho-\nKräfte ab, die es ihm ermöglichen, seine Gegner\nvollständig zu durchschauen."
          ultra_moon: "Im Tausch gegen seine Muskelkraft konnte es\nseine wahren Psycho-Kräfte freisetzen, die ihm\neinen alles durchschauenden Blick verleihen."
        es:
          ultra_sun: "El poder psíquico que emite el órgano rojo de\nsu frente le revela todos los secretos del\noponente."
          ultra_moon: "Sacrifica su musculatura a cambio de liberar la\nverdadera escala de su fuerza. Con sus poderes\npsíquicos, no hay nada que se le escape."
        ko:
          ultra_sun: "이마에 있는 빨간 기관에서\n사이코 파워를 방출해\n상대의 모든 것을 볼 수 있다."
          ultra_moon: "근육과 맞바꿔 후딘의\n진정한 힘이 해방되었다.\n사이코 파워로 모든 것을 꿰뚫어 본다."
        zh_simp:
          ultra_sun: "会从额头上的红色器官中\n放出精神力量，\n并看穿对手的一切。"
          ultra_moon: "胡地以肌肉为代价\n换来了真正力量的释放。\n能用精神力量看穿一切。"
        zh_trad:
          ultra_sun: "會從額頭上的紅色器官\n釋放出精神力量，\n藉此看穿對手的一切。"
          ultra_moon: "胡地以肌肉為代價\n換來了真正力量的解放。\n能用精神力量看穿一切。"
