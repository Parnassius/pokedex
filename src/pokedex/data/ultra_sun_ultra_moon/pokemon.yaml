      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      held_items:
        rare: chesto_berry
      descriptions:
        jp_kana:
          ultra_sun: "おとなしい　さみしがりや　だけど\nボロきれの　なかみを　みようとすると\nはげしく　いやがり　ていこうする。"
          ultra_moon: "かぜが　まって　ぐうぜん　なかみを\nみてしまった　トレーナーは　そのひの\nばんに　くるしみ　もがいて　しんだ。"
        jp_kanji:
          ultra_sun: "大人しい　寂しがり屋　だけど\nボロ切れの　中身を　見ようとすると\n激しく　嫌がり　抵抗する。"
          ultra_moon: "風が　舞って　偶然　中身を\n見てしまった　トレーナーは　その日の\n晩に　苦しみ　もがいて　死んだ。"
        en:
          ultra_sun: "Although it’s a quiet, lonely Pokémon, if you try\nto look at what’s under its rag, it will become\nagitated and resist violently."
          ultra_moon: "A gust of wind revealed what hides under this\nPokémon’s rag to a passing Trainer, who went\nhome and died painfully that very night."
        fr:
          ultra_sun: "Ce Pokémon docile déteste la solitude, mais\nil oppose une résistance acharnée si l’on essaie\nde jeter un coup d’œil sous son déguisement."
          ultra_moon: "Une bourrasque a un jour permis à un Dresseur\nde voir sous le déguisement de Mimiqui. Il est\nmort le soir même dans d’atroces souffrances."
        it:
          ultra_sun: "È un Pokémon tranquillo che soffre di solitudine.\nSe qualcuno cerca di sbirciare sotto il panno che\nlo nasconde, si oppone con forza."
          ultra_moon: "Un Allenatore che ha visto cosa si cela sotto\nil suo panno per una folata di vento è andato\nincontro a una morte dolorosa la sera stessa."
        de:
          ultra_sun: "Eigentlich ist es friedlich und sehnt sich nur\nnach Gesellschaft, doch versucht man, unter\nseinen Lumpen zu linsen, wehrt es sich heftig."
          ultra_moon: "Ein Trainer, der durch einen Windstoß Mimigmas\nwahre Gestalt unter seinem Lumpen erblickte,\nstarb am selben Abend einen qualvollen Tod."
        es:
          ultra_sun: "Es de carácter tranquilo y propenso a sentirse\nsolo. Odia que intenten mirar bajo su saco, y se\nresiste con todas sus fuerzas."
          ultra_moon: "Al levantarse su saco a causa de un golpe de\nviento, un Entrenador vio su verdadera forma y\nmurió dolorosamente esa misma noche."
        ko:
          ultra_sun: "얌전하고 외로움을 잘 타지만,\n넝마 조각의 속을 보려고 하면\n격렬하게 싫어하며 저항한다."
          ultra_moon: "바람이 불어서 우연히 속을\n봐 버린 트레이너는 그날 밤\n고통에 몸부림치다 죽었다."
        zh_simp:
          ultra_sun: "稳重又怕寂寞，\n但如果想要看它的破布里面，\n就会非常厌恶，激烈反抗。"
          ultra_moon: "因为风吹起而偶然见到\n它里面的训练家，\n会在当天晚上痛苦地挣扎着死去。"
        zh_trad:
          ultra_sun: "性情溫和且害怕寂寞，\n但如果有人試圖窺看破布裡面的樣子，\n牠就會非常厭惡地激烈反抗。"
          ultra_moon: "因為風把布吹起來而偶然\n見到牠裡面模樣的訓練家，\n當天晚上會在痛苦掙扎中死去。"
    mimikyu_busted_form:
      form_id: 1
      names:
        jp_kana: ばれたすがた
        jp_kanji: ばれたすがた
        en: Busted Form
        fr: Forme Démasquée
        it: Forma Smascherata
        de: Entlarvte Form
        es: Forma Descubierta
        ko: 들킨 모습
        zh_simp: 现形的样子
        zh_trad: 現形的樣子
      base_stats:
        hp: 55
        attack: 90
        defense: 80
        special_attack: 50
        special_defense: 105
        speed: 96
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - ghost
        - fairy
      egg_groups:
        - amorphous
      abilities:
        - disguise
      descriptions:
        jp_kana:
          ultra_sun: "かがみの　まえに　たって　ひっしに\nおれた　くびを　なおす。　なかなか\nなおらないので　なかみは　ないている。"
          ultra_moon: "しょうたいが　ばれそうで　かなしい。\nくびの　ぶぶんを　おった　あいては\nぜったい　ゆるさず　ふくしゅうする。"
        jp_kanji:
          ultra_sun: "鏡の　前に　立って　必死に\n折れた　首を　直す。　なかなか\n直らないので　中身は　泣いている。"
          ultra_moon: "正体が　ばれそうで　悲しい。\n首の　部分を　折った　相手は\n絶対　許さず　復しゅうする。"
        en:
          ultra_sun: "It stands in front of a mirror, trying to fix its\nbroken neck as if its life depended on it. It has\na hard time getting it right, so it’s crying inside."
          ultra_moon: "Sad that its true identity may be exposed,\nMimikyu will mercilessly seek revenge on any\nopponent that breaks its neck."
        fr:
          ultra_sun: "Il essaie de toutes ses forces de redresser son\ncou tordu devant un miroir, mais n’y parvenant\npas, il finit par sangloter sous son déguisement."
          ultra_moon: "Au bord des larmes lorsque son déguisement\ncommence à tomber, il se venge en maudissant\nla personne qui lui a tordu le cou."
        it:
          ultra_sun: "Passa ore davanti allo specchio tentando\ndisperatamente di aggiustare il collo rotto del\nsuo travestimento, ma non ci riesce e piange."
          ultra_moon: "È affranto perché il suo vero aspetto rischia di\nessere scoperto. Si vendica sempre su chi\nha rovinato il suo prezioso travestimento."
        de:
          ultra_sun: "Vor dem Spiegel versucht es verzweifelt, den\ngeknickten Hals seines Kostüms aufzurichten.\nDa es nicht klappen will, weint es bittere Tränen."
          ultra_moon: "Es wird traurig, wenn seine wahre Gestalt zum\nVorschein zu kommen droht. Wer sein Kostüm\nbeschädigt, zieht seine Rachsucht auf sich."
        es:
          ultra_sun: "Frente al espejo, intenta por todos los medios\nenderezar el cuello roto de su disfraz. No tiene\nfácil arreglo, y eso le hace llorar."
          ultra_moon: "Le entristece que pueda descubrirse su\nidentidad. Jamás perdona a quienes rompen\nsu disfraz y no descansa hasta vengarse."
        ko:
          ultra_sun: "거울 앞에 서서 필사적으로\n부러진 목을 고친다.\n쉽게 고쳐지지 않아 안에서는 울고 있다."
          ultra_moon: "정체를 들킬 것 같아 슬퍼한다.\n목 부분을 꺾은 상대는 절대\n용서하지 않고 복수한다."
        zh_simp:
          ultra_sun: "站在镜子前，拼命竖直折了的脖子。\n因为怎么都竖不直而在身体里哭泣。"
          ultra_moon: "因正身就要暴露而很悲痛。\n绝不原谅折断了它脖子的对手，\n会向对方报仇。"
        zh_trad:
          ultra_sun: "站在鏡子前面拼命想擺正折斷的脖子，\n但卻怎樣都回復不了原狀。\n裡頭的真身因此哭了起來。"
          ultra_moon: "因為真面目快要曝光而傷心。\n不會原諒折斷脖子部分的對手，\n無論如何都會報仇。"
