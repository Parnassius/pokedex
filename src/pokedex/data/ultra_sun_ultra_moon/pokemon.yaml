slowpoke:
  species_id: 79
  names:
    jp_kana: ヤドン
    jp_kanji: ヤドン
    en: Slowpoke
    fr: Ramoloss
    it: Slowpoke
    de: Flegmon
    es: Slowpoke
    ko: 야돈
    zh_simp: 呆呆兽
    zh_trad: 呆呆獸
  forms:
    slowpoke:
      form_id: 0
      base_stats:
        hp: 90
        attack: 65
        defense: 65
        special_attack: 40
        special_defense: 40
        speed: 15
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      hidden_ability: regenerator
      held_items:
        rare: lagging_tail
      descriptions:
        jp_kana:
          ultra_sun: "あくびを　すると　あめが　ふる\nという　いいつたえ　から　ヤドンを\nまつっている　ちいきが　あるという。"
          ultra_moon: "しぜんにちぎれ　そこらに　おちている\nシッポは　てがるで　きちょうな\nしょくりょうの　ひとつ　だった。"
        jp_kanji:
          ultra_sun: "あくびを　すると　雨が　降る\nという　言い伝え　から　ヤドンを\nまつっている　地域が　あるという。"
          ultra_moon: "自然にちぎれ　そこらに　落ちている\nシッポは　手軽で　貴重な\n食料の　ひとつ　だった。"
        en:
          ultra_sun: "There are some places where Slowpoke is\nworshiped because of a long-standing belief\nthat whenever Slowpoke yawns, it rains."
          ultra_moon: "Although their tails, which fall off naturally, can\neasily be found lying around, they’re a precious\ningredient for cooking."
        fr:
          ultra_sun: "Ce Pokémon, vénéré et considéré comme un\ndevin dans certaines régions, a donné naissance\nau dicton : Ramoloss a bâillé, attention à l’ondée."
          ultra_moon: "Les queues de Ramoloss parfois retrouvées\ndans la nature étaient un ingrédient de cuisine\nparticulièrement prisé."
        it:
          ultra_sun: "Secondo una leggenda, quando sbadiglia piove.\nSembra che in alcune regioni venga venerato\nper questo motivo."
          ultra_moon: "Le code di Slowpoke si staccano naturalmente\ne cadono qua e là. Vengono raccolte e usate\ncome preziosi ingredienti in cucina."
        de:
          ultra_sun: "Einer Legende zufolge soll Flegmons Gähnen\nRegen herbeiführen. In manchen Regionen wird\nihm deswegen gehuldigt."
          ultra_moon: "Von selbst abgefallene Flegmon-Ruten scheinen\nüberall herumzuliegen. Dennoch gilt dieses\neinfache Nahrungsmittel als hochwertig."
        es:
          ultra_sun: "La leyenda afirma que su bostezo atrae las\nlluvias, por lo que en ciertas regiones lo\nconsideran prácticamente una deidad."
          ultra_moon: "Su cola se desprende con facilidad de forma\nnatural y es un ingrediente muy valorado en la\nelaboración de platos de alta cocina."
        ko:
          ultra_sun: "하품을 하면 비가 온다는\n구전 때문에 야돈을\n받을어 모시는 지역도 있다고 한다."
          ultra_moon: "주변에 자연스럽게 떨어져 있는\n꼬리는 손쉽게 얻을 수 있는\n귀중한 식재료 중 하나였다."
        zh_simp:
          ultra_sun: "有传说讲呆呆兽打哈欠\n就会下雨，所以据说\n有些地方会供奉呆呆兽。"
          ultra_moon: "会自然断裂并脱落下来的尾巴\n是一种容易得到又十分贵重的食材。"
        zh_trad:
          ultra_sun: "傳說當呆呆獸打呵欠時\n就會開始下雨，所以據說\n有些地區會祭祀呆呆獸。"
          ultra_moon: "自然斷裂後脫落的尾巴\n是一種容易取得但又\n十分貴重的食材。"
slowbro:
  species_id: 80
  names:
    jp_kana: ヤドラン
    jp_kanji: ヤドラン
    en: Slowbro
    fr: Flagadoss
    it: Slowbro
    de: Lahmus
    es: Slowbro
    ko: 야도란
    zh_simp: 呆壳兽
    zh_trad: 呆殼獸
  forms:
    slowbro:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 110
        special_attack: 100
        special_defense: 80
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
