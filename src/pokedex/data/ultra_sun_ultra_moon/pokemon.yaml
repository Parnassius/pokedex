    zh_simp: 吉利蛋
    zh_trad: 吉利蛋
  forms:
    chansey:
      form_id: 0
      base_stats:
        hp: 250
        attack: 5
        defense: 5
        special_attack: 35
        special_defense: 105
        speed: 50
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
