      descriptions:
        jp_kana:
          ultra_sun: "ぎんの　スプーンを　じっと　みつめ\nサイコパワーを　ぞうふくし　はなつ。\nきんの　スプーンでは　ダメらしい。"
          ultra_moon: "つよい　せいしんりょくを　もつが\nぎんの　スプーンを　もっていないと\nサイコパワーが　はんげんしてしまう。"
        jp_kanji:
          ultra_sun: "銀の　スプーンを　じっと　見つめ\nサイコパワーを　増幅し　放つ。\n金の　スプーンでは　ダメらしい。"
          ultra_moon: "強い　精神力を　持つが\n銀の　スプーンを　持っていないと\nサイコパワーが　半減してしまう。"
        en:
          ultra_sun: "It stares at a silver spoon to amplify its psychic\npowers before it lets loose. Apparently, gold\nspoons are no good."
          ultra_moon: "It possesses strong mental capabilities, but its\npsychic powers are halved when it’s not\nholding a silver spoon."
        fr:
          ultra_sun: "Il fixe sa cuiller d’argent pour concentrer son\nénergie psychique avant de la libérer, mais\nil ne peut rien faire avec une cuiller en or."
          ultra_moon: "Son esprit est doté d’impressionnantes\nfacultés, mais elles sont diminuées de moitié\ns’il n’a pas de cuiller d’argent."
        it:
          ultra_sun: "Prima di usare i suoi poteri psichici, li amplifica\nfissando un cucchiaio d’argento. Sembra che\nnon riesca a fare lo stesso con i cucchiai d’oro."
          ultra_moon: "Ha una grande forza mentale, ma la potenza dei\nsuoi poteri è dimezzata se non ha con sé il suo\ncucchiaio d’argento."
        de:
          ultra_sun: "Es verstärkt seine Psycho-Kräfte, indem es auf\nseinen Silberlöffel starrt. Mit einem goldenen\nLöffel funktioniert es anscheinend nicht."
          ultra_moon: "Es verfügt über starke Psycho-Kräfte, doch\nohne seinen Silberlöffel reduzieren sich diese\num die Hälfte."
        es:
          ultra_sun: "Es capaz de doblar una cuchara de plata fijando\nla mirada y usando sus poderes psíquicos, pero\nno puede hacer lo propio con una de oro."
          ultra_moon: "Sus impresionantes poderes mentales se ven\nreducidos a la mitad cuando no lleva consigo\nsu cuchara de plata."
        ko:
          ultra_sun: "은 숟가락을 가만히 주시하고\n사이코 파워를 증폭하여 발산한다.\n금 숟가락으로는 안 되는 듯하다."
          ultra_moon: "강한 정신력을 가졌지만\n은 숟가락이 없으면\n사이코 파워가 반감되어 버린다."
        zh_simp:
          ultra_sun: "会盯着银汤匙来增强\n并放出精神力量。\n用金汤匙好像就不行。"
          ultra_moon: "虽然有着强大的精神力，\n但如果没有拿着银汤匙，\n精神力量就会减半。"
        zh_trad:
          ultra_sun: "會盯著銀湯匙瞧，\n來增強並釋放精神力量。\n換成金湯匙似乎就沒用了。"
          ultra_moon: "擁有強大的精神力。\n但如果沒有拿著銀湯匙，\n精神力量就會減半。"
