      descriptions:
        jp_kana:
          ultra_sun: "あらゆる　とりポケモンの　そせんと\nかんがえられてきたが　さいきんの\nけんきゅうでは　ちがうというせつも。"
          ultra_moon: "かせきから　ふくげんされた。\nハネは　あるが　まだ　とぶことは\nできない　こだいの　とりポケモン。"
        jp_kanji:
          ultra_sun: "あらゆる　とりポケモンの　祖先と\n考えられてきたが　最近の\n研究では　違うという　説も。"
          ultra_moon: "化石から　復元された。\n羽は　あるが　まだ　飛ぶことは\nできない　古代の　とりポケモン。"
        en:
          ultra_sun: "Once thought to be the ancestor of all bird\nPokémon, some of the latest research suggests\nthat may not be the case."
          ultra_moon: "Restored from a fossil, this ancient bird\nPokémon has wings but can’t yet fly."
        fr:
          ultra_sun: "Il a longtemps été considéré comme l’ancêtre\ncommun de tous les Pokémon oiseaux, mais\ndes études récentes réfutent cette théorie."
          ultra_moon: "Bien qu’il ait des ailes, ce Pokémon antique\nrecréé à partir d’un fossile est incapable\nde voler."
        it:
          ultra_sun: "Si è sempre pensato che fosse l’antenato di\ntutti i Pokémon alati, ma studi recenti hanno\nmesso in dubbio questa tesi."
          ultra_moon: "Pokémon molto antico rigenerato da un fossile.\nNonostante abbia le ali, non è in grado di volare."
        de:
          ultra_sun: "Es wurde lange Zeit für den Urahn aller Vogel-\nPokémon gehalten, doch jüngste Forschungen\nführen zu unterschiedlichen Theorien."
          ultra_moon: "Es wurde aus einem Fossil zurückverwandelt.\nTrotz seiner Flügel kann dieses Urzeitvogel-\nPokémon noch nicht fliegen."
        es:
          ultra_sun: "Siempre se ha creído que era el antecesor de\nlos Pokémon pájaro, aunque investigaciones\nrecientes lo ponen en duda."
          ultra_moon: "Este Pokémon pájaro ancestral, regenerado a\npartir de un fósil, es incapaz de volar pese a\ntener alas."
        ko:
          ultra_sun: "모든 새포켓몬의 선조라고\n여겨져 왔지만 최근 연구에서는\n아니라는 설도 대두되었다."
          ultra_moon: "화석에서 복원되었다.\n날개는 있지만 아직 나는 것은\n불가능한 고대의 새포켓몬."
        zh_simp:
          ultra_sun: "被认为是所有鸟宝可梦的祖先，\n但最近的研究里也有说法\n认为这个是错误的。"
          ultra_moon: "从化石复原而来。\n有翅膀，但还不会飞。\n是古代的鸟宝可梦。"
        zh_trad:
          ultra_sun: "一直以來被認為是所有\n鳥寶可夢的祖先，但最近也有\n研究指出事實並非如此。"
          ultra_moon: "從化石復原而來。\n有翅膀，但還不會飛。\n是古代的鳥寶可夢。"
archeops:
  species_id: 567
  names:
    jp_kana: アーケオス
    jp_kanji: アーケオス
