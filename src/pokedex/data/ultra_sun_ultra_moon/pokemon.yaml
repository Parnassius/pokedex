      descriptions:
        jp_kana:
          ultra_sun: "２ほんの　しょくしゅが　ほのかに\nひかって　えものを　よびよせる。\nよづりに　べんりな　ポケモンだ。"
          ultra_moon: "ひかる　しょくしゅの　てんめつで\nチョンチーどうしは　たがいの\nなわばりを　しゅちょう　しあう。"
        jp_kanji:
          ultra_sun: "２本の　触手が　ほのかに\n光って　獲物を　呼び寄せる。\n夜釣りに　便利な　ポケモンだ。"
          ultra_moon: "光る　触手の　点滅で\nチョンチー同士は　互いの\n縄張りを　主張　しあう。"
        en:
          ultra_sun: "Its two antennae glow softly to lure in prey,\nmaking it a useful Pokémon for night fishing."
          ultra_moon: "Chinchou blink their shining antennae at one\nanother to claim their respective turf."
        fr:
          ultra_sun: "Ses deux antennes luisent légèrement pour\nattirer ses proies. C’est un Pokémon très\npratique pour pêcher la nuit."
          ultra_moon: "Les Loupio marquent les limites de leur territoire\nen faisant clignoter leurs antennes."
        it:
          ultra_sun: "Dalle antenne emette una debole luce che usa\nper attirare a sé le prede. È un compagno\nperfetto per la pesca notturna."
          ultra_moon: "Vive nelle profondità marine, al riparo dalla luce\ndel sole. Usa le antenne luminose per\ncomunicare con i suoi simili."
        de:
          ultra_sun: "Das schwache Licht seiner zwei Antennen\nzieht andere Pokémon an. Es ist somit ein\nidealer Begleiter beim Nachtangeln."
          ultra_moon: "Es lässt seine leuchtenden Antennen aufblitzen,\num vor anderen Lampi sein Revier geltend zu\nmachen."
        es:
          ultra_sun: "Sus dos antenas emiten una tenue luz con la que\natrae a sus presas. Resulta un compañero ideal\npara una partida de pesca nocturna."
          ultra_moon: "Hace parpadear las luces de sus antenas para\ncomunicarse con sus congéneres y así marcar\nsu territorio."
        ko:
          ultra_sun: "2개의 촉수가 어렴풋이 빛나\n먹이를 불러들인다.\n밤낚시에 편리한 포켓몬이다."
          ultra_moon: "빛나는 촉수를 깜빡여서\n초라기끼리 서로의\n영역을 주장한다."
        zh_simp:
          ultra_sun: "会通过２根触手发出\n微光来吸引猎物。\n是一种在夜钓时很有用的宝可梦。"
          ultra_moon: "灯笼鱼之间会通过发光触手上\n发出的闪光来宣示各自的领地。"
        zh_trad:
          ultra_sun: "會讓２根觸手微微發光，\n藉此引誘獵物靠近。\n是種在夜釣時很好用的寶可夢。"
          ultra_moon: "燈籠魚們會透過\n發光觸手的閃爍\n來宣示彼此的地盤。"
lanturn:
  species_id: 171
  names:
    jp_kana: ランターン
    jp_kanji: ランターン
    en: Lanturn
    fr: Lanturn
    it: Lanturn
    de: Lanturn
    es: Lanturn
    ko: 랜턴
    zh_simp: 电灯怪
    zh_trad: 電燈怪
  forms:
