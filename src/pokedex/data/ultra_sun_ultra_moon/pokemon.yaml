          ultra_sun: "くうきと　たいもうの　まさつで\nせいでんきが　はっせい。　ラクライが\nはしると　バチバチと　おとが　なる。"
          ultra_moon: "ながい　たいもうが　こすれあうことで\nぜんしんに　せいでんきが　たまる。\nスピードが　じまんの　ポケモン。"
        jp_kanji:
          ultra_sun: "空気と　体毛の　摩擦で\n静電気が　発生。　ラクライが\n走ると　バチバチと　音が　鳴る。"
          ultra_moon: "長い　体毛が　こすれあうことで\n全身に　静電気が　たまる。\nスピードが　自慢の　ポケモン。"
        en:
          ultra_sun: "Friction between the air and its fur produces\nstatic electricity. When Electrike runs, it makes\na crackling sound."
          ultra_moon: "Static electricity builds up all over its body\nas strands of its long fur rub together. This\nPokémon boasts incredible speed."
        fr:
          ultra_sun: "La friction de ses poils avec l’air génère de\nl’électricité statique quand il court et produit\nun son qui s’apparente à des crépitements."
          ultra_moon: "Il est très fier de sa vitesse et peut envelopper\nson corps d’électricité statique en frottant\nses longs poils."
        it:
          ultra_sun: "L’attrito fra l’atmosfera e la sua pelliccia genera\nelettricità statica e quando corre si avverte\nun crepitio."
          ultra_moon: "Accumula elettricità statica in tutto il corpo\nsfregando la folta pelliccia. Il suo punto di forza\nè la velocità."
        de:
          ultra_sun: "Durch die Reibung zwischen seinem Fell und\nder Luft entsteht Elektrizität. Wenn es rennt,\nverursacht es ein knisterndes Geräusch."
          ultra_moon: "Durch das Aneinanderreiben seiner langen\nHaare speichert sein ganzer Körper Elektrizität.\nEs ist besonders stolz auf seine Schnelligkeit."
        es:
          ultra_sun: "La fricción con el aire carga su pelaje de\nelectricidad estática, por lo que pueden oírse\ncrepitantes chispazos cuando corre."
          ultra_moon: "Este Pokémon genera electricidad estática\nfrotando su largo pelaje. También destaca por\nsu velocidad."
        ko:
          ultra_sun: "공기와 털의 마찰로\n정전기가 발생한다. 썬더라이가\n달리면 탁탁 소리가 난다."
          ultra_moon: "긴 털이 마찰하는 과정에서\n전신에 정전기가 모인다.\n스피드가 특기인 포켓몬이다."
        zh_simp:
          ultra_sun: "通过空气与体毛的摩擦产生静电。\n落雷兽如果奔跑，\n会发出噼里啪啦的声音。"
          ultra_moon: "长长的体毛，\n通过摩擦在全身储存静电。\n是以速度为傲的宝可梦。"
        zh_trad:
          ultra_sun: "會透過空氣和體毛的摩擦\n來產生靜電。落雷獸奔跑時\n會發出劈哩啪啦的聲音。"
          ultra_moon: "會讓長長的體毛互相摩擦，\n藉此在全身儲存靜電。\n是種以速度為傲的寶可夢。"
manectric:
  species_id: 310
  names:
    jp_kana: ライボルト
    jp_kanji: ライボルト
    en: Manectric
    fr: Élecsprint
    it: Manectric
    de: Voltenso
    es: Manectric
    ko: 썬더볼트
    zh_simp: 雷电兽
    zh_trad: 雷電獸
  forms:
    manectric:
      form_id: 0
      base_stats:
        hp: 70
        attack: 75
        defense: 60
        special_attack: 105
        special_defense: 60
        speed: 105
      evs_yield:
        hp: 0
