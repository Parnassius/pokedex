seel:
  species_id: 86
  names:
    jp_kana: パウワウ
    jp_kanji: パウワウ
    en: Seel
    fr: Otaria
    it: Seel
    de: Jurob
    es: Seel
    ko: 쥬쥬
    zh_simp: 小海狮
    zh_trad: 小海獅
  forms:
    seel:
      form_id: 0
      base_stats:
        hp: 65
        attack: 45
        defense: 55
        special_attack: 45
        special_defense: 70
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - thick_fat
        - hydration
      hidden_ability: ice_body
      descriptions:
        jp_kana:
          ultra_sun: "つめたい　うみにしか　すまないと\nかんがえられてきた。　アローラに\nあらわれる　りゆうは　ナゾ。"
          ultra_moon: "ぶあつい　しぼうの　おかげで　さむい\nうみも　へっちゃらだけど　あたたかい\nうみでは　ちょっと　バテやすいのだ。"
        jp_kanji:
          ultra_sun: "冷たい　海にしか　棲まないと\n考えられてきた。　アローラに\n現れる　理由は　ナゾ。"
          ultra_moon: "分厚い　脂肪の　おかげで　寒い\n海も　へっちゃらだけど　暖かい\n海では　ちょっと　バテやすいのだ。"
        en:
          ultra_sun: "It has always been supposed that Seel live only\nin cold seas. Their having shown up in Alola is\na mystery."
          ultra_moon: "Thanks to its thick fat, cold seas don’t bother it\nat all, but it gets tired pretty easily in\nwarm waters."
        fr:
          ultra_sun: "Tout le monde pensait qu’il ne pouvait survivre\nque dans les mers froides.\nPersonne ne sait donc ce qu’il fait à Alola."
          ultra_moon: "Sa couche de gras lui permet d’être à l’aise\ndans les eaux les plus froides. Il a par contre\nplus de mal à supporter les mers chaudes."
        it:
          ultra_sun: "Finora si pensava che i Seel potessero vivere\nsolo nei mari gelidi, pertanto la loro comparsa\nad Alola è alquanto misteriosa."
          ultra_moon: "Grazie al suo spesso strato di grasso nuota\ntranquillamente nell’acqua gelida. Nei mari\ncaldi rischia facilmente lo sfinimento."
        de:
          ultra_sun: "Bisher wurde vermutet, dass es ausschließlich\nin kalten Gewässern lebe. Warum es auch in\nAlola auftaucht, ist noch ein Rätsel."
          ultra_moon: "Kalte Meere machen ihm dank seiner dicken\nFettschicht nichts aus. Wärmere Gewässer\nsetzen ihm hingegen sehr zu."
        es:
          ultra_sun: "Siempre se ha creído que solo puede subsistir\nen aguas frías. El motivo de su aparición en\nAlola es un misterio."
          ultra_moon: "La gruesa capa de grasa que le permite nadar\nsin problemas en aguas frías le da más de un\nsofoco en climas más cálidos."
        ko:
          ultra_sun: "차가운 바다에서만 산다고\n추정되었다. 알로라에\n나타나는 이유를 알 수 없다."
          ultra_moon: "두꺼운 지방 덕분에\n추운 바다는 문제없지만\n따뜻한 바다에서 쉽게 지친다."
        zh_simp:
          ultra_sun: "人们一直以为它只生活在寒冷的海域。\n它出现在阿罗拉的原因是个谜。"
          ultra_moon: "因为有着厚厚的脂肪，\n所以在寒冷的海里它也毫不在意，\n但在温暖的海里却有点容易疲劳。"
        zh_trad:
          ultra_sun: "人們一向認為牠只棲息在\n寒冷的海域，沒人知道牠\n出現在阿羅拉的原因。"
          ultra_moon: "因為有著厚厚的脂肪，\n所以完全不怕寒冷的海域，\n但在溫暖的海裡就有點容易中暑。"
