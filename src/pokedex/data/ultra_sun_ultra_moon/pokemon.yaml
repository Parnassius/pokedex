gible:
  species_id: 443
  names:
    jp_kana: フカマル
    jp_kanji: フカマル
    en: Gible
    fr: Griknot
    it: Gible
    de: Kaumalat
    es: Gible
    ko: 딥상어동
    zh_simp: 圆陆鲨
    zh_trad: 圓陸鯊
  forms:
    gible:
      form_id: 0
      base_stats:
        hp: 58
        attack: 70
        defense: 45
        special_attack: 40
        special_defense: 45
        speed: 42
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          ultra_sun: "うごくものに　はんのうし　とびついて\nかみつく。　じぶんが　きずつくことも\nあるけれど　あまり　きにしていない。"
          ultra_moon: "アローラより　さらに　あつい　とちが\nほんらいの　すみか。　いっしょに\nすむなら　だんぼうだいが　かかる。"
        jp_kanji:
          ultra_sun: "動くものに　反応し　飛びついて\n噛みつく。　自分が　傷つくことも\nあるけれど　あまり　気にしていない。"
          ultra_moon: "アローラより　さらに　暑い　土地が\n本来の　棲み処。　一緒に\n住むなら　暖房代が　かかる。"
        en:
          ultra_sun: "It reacts to anything that moves—flies right at it\nand bites it. Sometimes it injures itself, but it\ndoesn’t care too much."
          ultra_moon: "Its original home is an area much hotter than\nAlola. If you’re planning to live with one, your\nheating bill will soar."
        fr:
          ultra_sun: "Il saute sur tout ce qui bouge pour y planter\nses dents. Cette manie lui vaut quelques\nblessures, mais il n’en a que faire."
          ultra_moon: "Il vient d’un endroit où il fait bien plus chaud\nque dans la région d’Alola. La facture de\nchauffage est donc élevée quand on vit avec lui."
        it:
          ultra_sun: "Appena sente qualcosa muoversi, salta fuori\ne lo addenta. Spesso si fa male da solo,\nma non se ne preoccupa particolarmente."
          ultra_moon: "È abituato a climi più caldi di quello di Alola.\nAvere un Gible in casa significa incorrere in\nbollette del riscaldamento salate."
        de:
          ultra_sun: "Wenn sich etwas in seiner Nähe bewegt, stürzt\nes sich darauf und beißt fest zu, auch wenn es\nsich dabei selbst verletzt."
          ultra_moon: "Es ist ein weitaus wärmeres Klima gewohnt, als\ndas, was in Alola vorherrscht. Trainer dieses\nPokémon sollten mit hohen Heizkosten rechnen."
        es:
          ultra_sun: "En cuanto percibe un objeto en movimiento, se\nlanza contra él y le asesta dentelladas. A veces\nse hiere a sí mismo, pero no le importa."
          ultra_moon: "Un Pokémon habituado a un clima aún más\ncálido que el de Alola. Quien convive con un\nGible gasta mucho dinero en calefacción."
        ko:
          ultra_sun: "움직이는 것에 반응하여\n달려들어 덥석 문다. 자신이 상처를\n입어도 별로 신경 쓰지 않는다."
          ultra_moon: "알로라보다 더 더운 곳이\n본래 서식지다. 함께\n지내려면 난방비가 든다."
        zh_simp:
          ultra_sun: "会对动的东西发生反应，\n飞扑过去咬住。有时候\n会伤到自己，但也不太在意。"
          ultra_moon: "原本栖息在比阿罗拉更热的地方。\n一起住的话，要花很多暖气费。"
        zh_trad:
          ultra_sun: "會對動的東西產生反應並撲過去咬住。\n有時會因此傷到自己，\n但牠並不怎麼在意。"
          ultra_moon: "原本棲息在比阿羅拉更熱的地方。\n如果想和牠住在一起，\n暖氣費的開銷會很大。"
gabite:
  species_id: 444
  names:
    jp_kana: ガバイト
    jp_kanji: ガバイト
    en: Gabite
    fr: Carmache
    it: Gabite
    de: Knarksel
    es: Gabite
    ko: 한바이트
    zh_simp: 尖牙陆鲨
    zh_trad: 尖牙陸鯊
  forms:
    gabite:
      form_id: 0
      base_stats:
        hp: 68
        attack: 90
        defense: 65
        special_attack: 50
        special_defense: 55
        speed: 82
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          ultra_sun: "ひかるものが　だいすき。　メレシーを\nねらう　ヤミラミを　みつけると\nはげしく　いかって　おそいかかる。"
          ultra_moon: "だっぴして　おおきくなって　いく。\nウロコを　すって　こなにした　ものは\nかんぽうやくの　げんりょうに　なる。"
        jp_kanji:
          ultra_sun: "光るものが　大好き。　メレシーを\n狙う　ヤミラミを　見つけると\n激しく　怒って　襲いかかる。"
          ultra_moon: "脱皮して　大きくなって　いく。\nウロコを　擦って　粉にした　ものは\n漢方薬の　原料に　なる。"
        en:
          ultra_sun: "It loves shiny things. When it finds a Sableye\ntrying to catch a Carbink, Gabite becomes\nfuriously angry and attacks the Sableye."
          ultra_moon: "It sheds its skin and gradually grows larger. Its\nscales can be ground into a powder and used\nas raw materials for traditional medicine."
        fr:
          ultra_sun: "Il adore tout ce qui brille, et rien ne l’énerve plus\nqu’un Ténéfix s’en prenant à un Strassie. S’il est\ntémoin d’une telle agression, il passe à l’attaque."
          ultra_moon: "Il mue régulièrement au cours de sa croissance.\nLes écailles ainsi tombées peuvent être pilées\npour préparer des remèdes traditionnels."
        it:
          ultra_sun: "Adora gli oggetti luccicanti. Se sorprende un\nSableye a caccia di Carbink, si infuria e lo\nattacca."
          ultra_moon: "Quando il suo corpo si ingrandisce, fa la muta.\nCon la polvere ricavata frantumando le scaglie\nscartate si preparano dei rimedi naturali."
        de:
          ultra_sun: "Es liebt funkelnde Dinge. Sieht es ein Zobiris,\ndas ein Rocara jagt, stürzt es sich wütend auf\nden Verfolger."
          ultra_moon: "Wenn es wächst, streift es seine Schuppen ab.\nDiese lassen sich zu einem Pulver zerkleinern,\ndas als Basis für natürliche Heilmittel dient."
        es:
          ultra_sun: "Se vuelve loco por las cosas brillantes y no duda\nen atacar con violencia a los Sableye que\nacechan a los Carbink."
          ultra_moon: "Muda la piel a medida que crece. Las escamas\nque pierde se pueden pulverizar para utilizar\ncomo ingrediente en remedios medicinales."
        ko:
          ultra_sun: "반짝이는 것을 매우 좋아한다.\n멜리시를 노리는 깜까미를 발견하면\n격렬하게 화를 내며 덤벼든다."
          ultra_moon: "탈피하면서 커진다.\n비늘을 비벼서 가루로 만든 것은\n한방약의 원료가 된다."
        zh_simp:
          ultra_sun: "非常喜欢发光的东西。\n如果发现正在攻击小碎钻的勾魂眼，\n就会非常生气地发动袭击。"
          ultra_moon: "会反复蜕皮变大。\n将鳞片磨成粉，\n可以作为中药的原料。"
        zh_trad:
          ultra_sun: "最喜歡會發亮的東西。\n只要發現在打小碎鑽主意的勾魂眼，\n就會非常生氣地發動攻擊。"
          ultra_moon: "會反覆脫皮並長大。\n將牠的鱗片磨成粉之後，\n可以當成中藥的原料。"
garchomp:
  species_id: 445
  names:
    jp_kana: ガブリアス
    jp_kanji: ガブリアス
    en: Garchomp
    fr: Carchacrok
    it: Garchomp
    de: Knakrack
    es: Garchomp
    ko: 한카리아스
    zh_simp: 烈咬陆鲨
    zh_trad: 烈咬陸鯊
  forms:
    garchomp:
      form_id: 0
      base_stats:
        hp: 108
        attack: 130
        defense: 95
        special_attack: 80
        special_defense: 85
        speed: 102
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_veil
      hidden_ability: rough_skin
      descriptions:
        jp_kana:
          ultra_sun: "おんそくで　とび　えものを　さがす。\nエサを　めぐり　ボーマンダと\nくうちゅうせんを　くりひろげる。"
          ultra_moon: "きめこまかく　とがった　ウロコは\nくうきていこうを　へらすだけでなく\nおそってきた　あいてを　きずつけるぞ。"
        jp_kanji:
          ultra_sun: "音速で　飛び　獲物を　探す。\nエサを　巡り　ボーマンダと\n空中戦を　繰り広げる。"
          ultra_moon: "きめ細かく　尖った　ウロコは\n空気抵抗を　減らすだけでなく\n襲ってきた　相手を　傷つけるぞ。"
        en:
          ultra_sun: "It flies at the speed of sound while searching\nfor prey, and it has midair battles with\nSalamence as the two compete for food."
          ultra_moon: "Its fine scales don’t just reduce wind\nresistance—their sharp edges also cause injury\nto any opponent who attacks it."
        fr:
          ultra_sun: "Il vole à la vitesse du son en quête de nourriture.\nDrattak et lui se disputent souvent leurs proies\ndans des combats aériens impressionnants."
          ultra_moon: "En plus de maximiser son aérodynamisme,\nses écailles lisses et pointues ont l’avantage\nde blesser ses ennemis quand ils l’attaquent."
        it:
          ultra_sun: "Caccia le prede volando a velocità supersonica.\nLe lotte aeree con Salamence per contendersi\nil cibo sono all’ordine del giorno."
          ultra_moon: "Le sue scaglie finissime e aguzze riducono\nl’attrito con l’aria e gli permettono allo stesso\ntempo di danneggiare i nemici che lo attaccano."
        de:
          ultra_sun: "Es geht mit Schallgeschwindigkeit fliegend auf\ndie Jagd und leistet sich mit Brutalanda\nLuftkämpfe um das Vorrecht auf die Beute."
          ultra_moon: "Mit seinen feinporigen Schuppen kann es nicht\nnur den Luftwiderstand verringern, sondern\nauch nahende Angreifer verletzen."
        es:
          ultra_sun: "Surca el aire a velocidad supersónica en busca\nde presas y no duda en librar una batalla aérea\ncon un Salamence para quedarse con ellas."
          ultra_moon: "Sus escamas, pequeñas, lisas y afiladas, no solo\nlo hacen más aerodinámico, sino que le sirven\npara herir al rival que ose atacarlo."
        ko:
          ultra_sun: "음속으로 날아다니며 먹이를 찾는다.\n먹이를 두고 보만다와\n공중전을 펼친다."
          ultra_moon: "매끄럽고 뾰족한 비늘은\n공기 저항을 줄일 뿐만 아니라\n습격해 온 상대를 상처 입힌다."
        zh_simp:
          ultra_sun: "以音速飞行，寻找猎物。\n围绕着食物的问题，\n和暴飞龙展开空中战。"
          ultra_moon: "细小又尖锐的鳞片，\n不但可以减少空气的阻力，\n还能使来袭击的对手受伤。"
        zh_trad:
          ultra_sun: "以音速飛行來尋找獵物。\n會為了爭奪食物而與\n暴飛龍展開空中戰鬥。"
          ultra_moon: "細小而尖銳的鱗片\n不僅能夠減少空氣阻力，\n還能令來襲的敵人受傷。"
    garchomp_mega:
      form_id: 1
      names:
        jp_kana: メガガブリアス
        jp_kanji: メガガブリアス
        en: Mega Garchomp
        fr: Méga-Carchacrok
        it: MegaGarchomp
        de: Mega-Knakrack
        es: Mega-Garchomp
        ko: 메가한카리아스
        zh_simp: 超级烈咬陆鲨
        zh_trad: 超級烈咬陸鯊
      base_stats:
        hp: 108
        attack: 170
        defense: 115
        special_attack: 120
        special_defense: 95
        speed: 92
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dragon
        - ground
      egg_groups:
        - monster
        - dragon
      abilities:
        - sand_force
      descriptions:
        jp_kana:
          ultra_sun: "うでと　ハネが　とけ　カマの　ように\nへんかして　しまった。　いかり\nくるって　あばれに　あばれまくるぞ。"
          ultra_moon: "メガシンカまえ　より　きょうぼうな\nせいしつ。　りょううでの　カマで\nてきを　ズタズタに　きりきざむ。"
        jp_kanji:
          ultra_sun: "腕と　羽が　溶け　カマの　ように\n変化して　しまった。　怒り\n狂って　暴れに　暴れまくるぞ。"
          ultra_moon: "メガシンカ前　より　凶暴な\n性質。　両腕の　カマで\n敵を　ズタズタに　切り刻む。"
        en:
          ultra_sun: "Its arms and wings melted into something like\nscythes. Mad with rage, it rampages on and on."
          ultra_moon: "Its disposition is more vicious than before its\nMega Evolution. Garchomp carves its opponents\nup with the scythes on both arms."
        fr:
          ultra_sun: "Furieux d’avoir perdu ses bras ailés au profit\nde deux grandes faux, il se laisse emporter\npar la violence."
          ultra_moon: "La Méga-Évolution l’a rendu plus brutal.\nIl taille en pièces ses ennemis à l’aide\nde ses bras en forme de faux."
        it:
          ultra_sun: "Con l’evoluzione, le sue ali si sono fuse con le\nbraccia, tramutandole in falci. Pazzo d’ira, si\nsfoga scatenando tutta la sua furia."
          ultra_moon: "Il suo temperamento è diventato molto più\naggressivo dopo la megaevoluzione.\nFa a brandelli i nemici con le sue falci."
        de:
          ultra_sun: "Der Energieschub hat seine Flügel und Arme zu\nSicheln verschmelzen lassen. Außer sich vor\nWut, lässt es seinem Zorn freien Lauf."
          ultra_moon: "Es ist wütender und brutaler als vor der\nMega-Entwicklung. Mit seinen sichelartigen\nArmfortsätzen zerfetzt es seine Gegner."
        es:
          ultra_sun: "Sus extremidades se han fundido con sus alas,\nadoptando forma de guadañas. Su ira lo hace\nenloquecer y arremeter contra todo."
          ultra_moon: "La megaevolución exacerba su agresividad.\nHace jirones al enemigo con sus extremidades\nen forma de guadañas."
        ko:
          ultra_sun: "팔과 날개가 녹아\n낫처럼 변화했다.\n미친 듯이 난폭하게 날뛴다."
          ultra_moon: "메가진화 전보다 난폭한\n성질을 가졌다. 양팔의 낫으로\n적을 갈기갈기 조각낸다."
        zh_simp:
          ultra_sun: "手臂和翅膀熔化，变成了镰刀状。\n会因发怒狂暴而到处大闹。"
          ultra_moon: "性格比超级进化前更粗暴。\n会用双臂的镰刀把敌人割得粉碎。"
        zh_trad:
          ultra_sun: "手臂和翅膀融化，變成像是\n鐮刀的形狀。憤怒到發狂的牠\n因此不停大鬧特鬧。"
          ultra_moon: "性情比超級進化之前\n更加兇暴。會用雙臂的\n鐮刀把敵人切成碎片。"
munchlax:
