      descriptions:
        jp_kana:
          ultra_sun: "１ねんに　１センチしか　うごかないが\nピンチに　おちいると　かいてんし\nいっしゅんで　ちちゅうに　もぐる。"
          ultra_moon: "きょうりょくな　じりょくで　えものを\nひきよせ　うごかず　かりを　するが\nてんてきを　ひきよせることもある。"
        jp_kanji:
          ultra_sun: "１年に　１センチしか　動かないが\nピンチに　陥ると　回転し\n一瞬で　地中に　潜る。"
          ultra_moon: "強力な　磁力で　獲物を\n引き寄せ　動かず　狩りを　するが\n天敵を　引き寄せることもある。"
        en:
          ultra_sun: "It moves less than an inch a year, but when\nit’s in a jam, it will spin and drill down into the\nground in a split second."
          ultra_moon: "It hunts without twitching a muscle by pulling in\nits prey with powerful magnetism. But\nsometimes it pulls natural enemies in close."
        fr:
          ultra_sun: "Il ne se déplace que d’un centimètre par an,\nmais s’il se sent menacé, il virevolte et s’enfonce\ndans le sol en un instant."
          ultra_moon: "Grâce à sa force magnétique, il peut chasser\nses proies sans se déplacer, mais il attire\nparfois ses pires ennemis."
        it:
          ultra_sun: "Si sposta di 1 cm all’anno, ma quando si trova\nin difficoltà ruota su se stesso e in un attimo\nsi nasconde sottoterra."
          ultra_moon: "Il suo potente magnetismo gli permette di\nattirare le prede senza muoversi, ma a volte\nattrae anche i suoi nemici naturali."
        de:
          ultra_sun: "Es bewegt sich nur 1 cm pro Jahr, aber in\nNotlagen bohrt es sich mit seinem Körper\nblitzschnell in den Boden."
          ultra_moon: "Es jagt bewegungslos, indem es Beute mit\nseinem starken Magnetfeld zu sich heranzieht.\nManchmal sind jedoch auch Fressfeinde dabei."
        es:
          ultra_sun: "Solo se desplaza un centímetro al año, pero, si\nse siente amenazado, gira sobre sí mismo y se\nhunde bajo tierra en un abrir y cerrar de ojos."
          ultra_moon: "Su potente fuerza magnética le permite atraer a\nsus presas sin necesidad de moverse, aunque a\nveces también atrae a sus enemigos naturales."
        ko:
          ultra_sun: "1년에 1cm밖에 움직이지 않지만\n위기에 처하면 회전하여\n순식간에 땅속으로 파고든다."
          ultra_moon: "강력한 자력으로 먹이를 끌어당겨\n움직이지 않고 사냥을 하지만\n천적을 끌어당기는 일도 있다."
        zh_simp:
          ultra_sun: "１年只会移动１厘米。\n但在陷入危机时会旋转身体，\n瞬间潜入地下。"
          ultra_moon: "它会一动不动地用强力的\n磁力将猎物吸过来狩猎。\n但有时也会吸到天敌。"
        zh_trad:
          ultra_sun: "每年只會移動１公分，\n但在陷入危機時會轉動身體，\n在一瞬間潛入地底。"
          ultra_moon: "牠會動也不動地用強大的\n磁力把獵物吸過來獵捕，\n但有時也會把天敵吸來。"
