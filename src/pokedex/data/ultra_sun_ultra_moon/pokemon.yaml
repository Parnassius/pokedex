          ultra_moon: "いわあなが　おもな　ねどこ。\nオクタンが　はく　まっくろな　スミは\nりょうりの　ざいりょうにも　なる。"
        jp_kanji:
          ultra_sun: "逃げるときに　はく　スミは特別。\n嗅覚を　鈍らせる　成分で\n鼻がきく　ポケモンも　惑わすぞ。"
          ultra_moon: "岩穴が　おもな　寝床。\nオクタンが　はく　まっくろな　スミは\n料理の　材料にも　なる。"
        en:
          ultra_sun: "The ink it spits when escaping is special.\nIt contains a substance that dulls the sense of\nsmell, so Pokémon with keen noses get lost."
          ultra_moon: "It usually sleeps in caves. The pitch-black ink\nthat Octillery spits is also used for cooking."
        fr:
          ultra_sun: "Il projette une encre spéciale quand il s’enfuit.\nCelle-ci perturbe l’odorat des Pokémon, même\nde ceux dotés d’un bon flair."
          ultra_moon: "Il dort dans les cavités rocheuses.\nL’encre noire qu’il projette sert aussi\nd’ingrédient de cuisine."
        it:
          ultra_sun: "Mentre fugge dai nemici sputa un inchiostro\nche inibisce le funzioni olfattive persino\ndei Pokémon con l’odorato più sviluppato."
          ultra_moon: "Ha l’abitudine di dormire nelle fessure delle\nrocce. Spara un inchiostro nerissimo che viene\nusato anche come ingrediente per cucinare."
        de:
          ultra_sun: "Die Tinte, die es während der Flucht ausspeit,\nvermindert den Geruchssinn und verwirrt selbst\nPokémon mit einer guten Nase."
          ultra_moon: "Es schläft hauptsächlich in Felshöhlen. Die\nschwarze Tinte, die es ausspeit, wird auch als\nKochzutat verwendet."
        es:
          ultra_sun: "La tinta que expulsa al huir inhibe la capacidad\nolfativa del rival y afecta incluso a los Pokémon\ncon el olfato más aguzado."
          ultra_moon: "Duerme principalmente en cavidades rocosas.\nLa tinta negra que escupe se utiliza como\ningrediente en la alta cocina."
        ko:
          ultra_sun: "도망칠 때 내뿜는 먹물은 특별하다.\n후각을 둔하게 하는 성분으로\n후각이 발달한 포켓몬도 말려든다."
          ultra_moon: "바위굴이 주된 잠자리다.\n대포무노가 뱉는 새까만 먹물은\n요리 재료로도 쓰인다."
        zh_simp:
          ultra_sun: "逃跑时吐出来的墨汁很特别。\n里面有着能让嗅觉变迟钝的成分，\n连鼻子灵敏的宝可梦也能迷惑。"
          ultra_moon: "岩洞是它主要的栖身之所。\n章鱼桶吐出的漆黑墨汁\n还会被当成制作料理时的食材。"
        zh_trad:
          ultra_sun: "逃跑時吐出特別的墨汁，\n裡頭含有會讓嗅覺變遲鈍的成分，\n就算是鼻子靈敏的寶可夢也能騙過。"
          ultra_moon: "岩洞是牠主要的棲身之處。\n章魚桶吐出的漆黑墨汁\n也可以用來當成料理用的食材。"
delibird:
  species_id: 225
  names:
    jp_kana: デリバード
    jp_kanji: デリバード
    en: Delibird
    fr: Cadoizo
    it: Delibird
    de: Botogel
    es: Delibird
    ko: 딜리버드
    zh_simp: 信使鸟
    zh_trad: 信使鳥
  forms:
    delibird:
      form_id: 0
      base_stats:
        hp: 45
        attack: 55
        defense: 45
        special_attack: 65
        special_defense: 45
