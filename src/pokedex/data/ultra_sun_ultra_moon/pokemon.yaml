        - rock_head
        - lightning_rod
      hidden_ability: battle_armor
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          ultra_sun: "ホネを　なげつけ　バルジーナを\nうちおとす。　おやの　かたきを\nうっていると　かんがえられている。"
          ultra_moon: "リズミカルに　ホネを　うちならし\nなかまと　れんらくを　とりあっている。\nそのパターンは　５０ちかく　あるのだ。"
        jp_kanji:
          ultra_sun: "ホネを　投げつけ　バルジーナを\n撃ち落す。　親の　かたきを\n討っていると　考えられている。"
          ultra_moon: "リズミカルに　ホネを　打ち鳴らし\n仲間と　連絡を　取りあっている。\nそのパターンは　５０近く　あるのだ。"
        en:
          ultra_sun: "It throws bones at Mandibuzz to knock it down.\nIt’s thought that Marowak is trying to avenge\nits parent."
          ultra_moon: "They thump their bones rhythmically to\ncommunicate among themselves. There are\nnearly 50 different rhythmic patterns."
        fr:
          ultra_sun: "Il lance son os pour abattre les Vaututrice.\nOn pense qu’il agit ainsi pour venger sa mère."
          ultra_moon: "Il joue des percussions avec son os afin de\ncommuniquer avec ses congénères. Il existe\nune cinquantaine de mélodies différentes."
        it:
          ultra_sun: "Scaglia il suo osso per abbattere i Mandibuzz.\nSi dice che in questo modo voglia vendicare\nla morte di sua madre."
          ultra_moon: "Comunica con i propri simili sbattendo\nritmicamente il suo osso. Sono stati contati\ncirca 50 ritmi diversi."
        de:
          ultra_sun: "Es wirft seinen Knochen nach Grypheldis, um es\nvom Himmel zu holen. Man nimmt an, dass es\nsich für seine Mutter an ihm rächen will."
          ultra_moon: "Es kommuniziert mit seinen Kameraden durch\nrhythmisches Knochenklappern. Fast 50 Muster\nsind bisher bekannt."
        es:
          ultra_sun: "Lanza su hueso para abatir a los Mandibuzz.\nSegún cuentan, es su forma de vengar a su\nmadre."
          ultra_moon: "Se comunica con los suyos golpeando su hueso\nrítmicamente. Se han llegado a contabilizar\nhasta cincuenta patrones distintos."
        ko:
          ultra_sun: "뼈를 던져 버랜지나를\n떨어뜨린다. 부모의 원한을\n갚기 위한 것으로 추측된다."
          ultra_moon: "리드미컬하게 뼈다귀를 두들겨서\n동료와 연락을 주고받는다.\n그 패턴은 50개 가까이 존재한다."
        zh_simp:
          ultra_sun: "会用力扔骨头击落秃鹰娜。\n人们认为它这是在给亲人报仇。"
          ultra_moon: "会有节奏地敲响骨头，\n并以此和伙伴进行联络。\n节奏有着近５０种变化。"
        zh_trad:
          ultra_sun: "會投擲骨頭擊落禿鷹娜。\n人們認為牠這麼做是\n為了幫母親報仇。"
          ultra_moon: "會節奏性地敲響骨頭，\n藉此與夥伴進行聯絡。\n節奏有著將近５０種不同變化。"
    marowak_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 60
        attack: 80
        defense: 110
        special_attack: 50
        special_defense: 80
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fire
        - ghost
      egg_groups:
        - monster
      abilities:
        - cursed_body
        - lightning_rod
      hidden_ability: rock_head
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          ultra_sun: "みどり　ゆたかな　アローラちほうは\nガラガラに　とって　かこくな　とち。\nいきのびるため　ほのおを　あやつる。"
          ultra_moon: "ホネで　なぐると　のろいの　ほのおが\nもえうつる。　いくら　みずを　かけても\nいつまでも　きえずに　もえつづけるぞ。"
        jp_kanji:
          ultra_sun: "緑　豊かな　アローラ地方は\nガラガラに　とって　過酷な　土地。\n生きのびるため　炎を　操る。"
          ultra_moon: "ホネで　殴ると　呪いの　炎が\n燃えうつる。　いくら　水を　かけても\nいつまでも　消えずに　燃え続けるぞ。"
        en:
          ultra_sun: "The rich greenery of the Alola region is hard on\nMarowak. It controls fire to stay alive."
          ultra_moon: "When it beats opponents with its bone, the\ncursed flames spread to them. No amount of\nwater will stop those flames from burning."
        fr:
          ultra_sun: "La région riche et fertile d’Alola se révèle\nparticulièrement inhospitalière pour Ossatueur.\nIl a appris à maîtriser le feu pour survivre."
          ultra_moon: "Quand il frappe avec son os, des flammes\nmaudites enveloppent sa cible. Rien ne peut\néteindre ce feu éternel."
        it:
          ultra_sun: "La lussureggiante regione di Alola è un posto\ninospitale per Marowak, che per sopravvivere\nha imparato a servirsi del fuoco."
          ultra_moon: "Quando colpisce con il suo osso, appicca un\nfuoco maledetto che continuerà a bruciare\nin eterno per quanta acqua ci si versi sopra."
        de:
          ultra_sun: "Die vielfältige Flora der Alola-Region ist ein\ngefährliches Terrain für Knogga. Alola-Knogga\nkämpfen deshalb mit Feuer, um zu überleben."
          ultra_moon: "Wer von seinem Knochen getroffen wird, auf den\nspringt eine verfluchte Flamme über. Mit wie viel\nWasser man sie auch übergießt, sie erlischt nie."
        es:
          ultra_sun: "La región de Alola, tan frondosa y fértil, no\nresulta un entorno acogedor para Marowak.\nManipula el fuego para mantenerse vivo."
          ultra_moon: "Lo que golpea con su hueso queda prendido con\nsu eterna llama maldita, que nunca se apaga por\nmucha agua que se le eche encima."
        ko:
          ultra_sun: "초목이 우거진 알로라지방은\n텅구리에게 있어서 가혹한 토지다.\n살아남기 위해 불꽃을 조종한다."
          ultra_moon: "뼈다귀로 때리면 저주의 불꽃이\n옮겨붙는다. 아무리 물을 끼얹어도\n언제까지나 꺼지지 않고 계속 불타오른다."
        zh_simp:
          ultra_sun: "对于嘎啦嘎啦来说，绿意盎然的\n阿罗拉地区是一片残酷的土地。\n为了活下去，它会去操纵火焰。"
          ultra_moon: "用骨头打击对方时，诅咒之焰就会\n蔓延到对方身上。不管浇多少水，\n它都不会熄灭，会永远燃烧下去。"
        zh_trad:
          ultra_sun: "綠意盎然的阿羅拉地區\n對嘎啦嘎啦來說是個嚴苛的環境。\n牠必須為了活下去而操縱火焰。"
          ultra_moon: "用骨頭打擊對方時，詛咒之火會\n蔓延到對方身上。這種火無法\n用水澆熄，會永遠燃燒下去。"
