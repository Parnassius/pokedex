        - fairy
      egg_groups:
        - fairy
      abilities:
        - cute_charm
        - magic_guard
      hidden_ability: unaware
      held_items:
        rare: moon_stone
      descriptions:
        jp_kana:
          ultra_sun: "１キロさきで　はりが　おちた　おとも\nきこえてしまうので　ひとやポケモンが\nすくない　ふかいやまおくで　くらす。"
          ultra_moon: "まんげつの　ばん　じっと　よぞらを\nみているのは　ホームシックなのだと\nかんがえる　かがくしゃも　いる。"
        jp_kanji:
          ultra_sun: "１キロ先で　針が　落ちた　音も\n聞こえてしまうので　人やポケモンが\n少ない　深い山奥で　暮らす。"
          ultra_moon: "満月の　晩　じっと　夜空を\n見ているのは　ホームシックなのだと\n考える　科学者も　いる。"
        en:
          ultra_sun: "It can’t help but hear a pin drop from over half\na mile away, so it lives deep in the mountains\nwhere there aren’t many people or Pokémon."
          ultra_moon: "Some scientists believe that it gazes intently at\nthe sky on nights with a full moon because\nit’s homesick."
        fr:
          ultra_sun: "Il préfère vivre au fond des montagnes, loin des\nhumains et des Pokémon, car il peut entendre\nune aiguille tomber à un kilomètre de distance."
          ultra_moon: "Selon certains scientifiques, c’est parce qu’il\na le mal du pays qu’il fixe le ciel les soirs de\npleine lune."
        it:
          ultra_sun: "Può sentire il rumore di uno spillo che cade a\n1 km di distanza. Per questo vive in recessi\nmontani, lontano da esseri umani e Pokémon."
          ultra_moon: "Nelle notti di luna piena si perde a fissare il\ncielo. Secondo alcuni studiosi, pensa con\nnostalgia alla sua casa lontana."
        de:
          ultra_sun: "Es hört eine fallende Nadel aus 1 km Entfernung\nund lebt daher tief in den Bergen, weit weg vom\nLärm der Menschen und anderer Pokémon."
          ultra_moon: "Bei Vollmond blickt es still zum Nachthimmel\nhinauf. Manche Wissenschaftler deuten dieses\nVerhalten als Heimweh."
        es:
          ultra_sun: "Su fino oído puede percibir la caída de un alfiler\na un kilómetro de distancia. Por eso prefiere\nvivir en las montañas, lejos del mundanal ruido."
          ultra_moon: "Algunos científicos sostienen que cuando mira\nal cielo fijamente en las noches de luna llena es\nporque siente morriña."
        ko:
          ultra_sun: "1km 떨어진 곳에서 바늘이 떨어지는\n소리도 들을 수 있어 사람과 포켓몬이\n적은 깊은 산속에 산다."
          ultra_moon: "보름달이 뜨는 밤에 밤하늘을\n바라보는 이유는 향수병 때문이라고\n생각하는 과학자도 있다."
        zh_simp:
          ultra_sun: "连１公里外针落地的声音都能听到，\n所以它生活在鲜有人或\n宝可梦出入的深山里。"
          ultra_moon: "也有科学家认为，它之所以\n会在满月的晚上盯着夜空看，\n是因为它患上了思乡病。"
        zh_trad:
          ultra_sun: "由於連１公里外針落地的聲音\n也能聽見，所以牠生活在很少有\n人或寶可夢出現的深山裡。"
          ultra_moon: "也有科學家認為，牠之所以\n會在滿月的晚上盯著夜空看，\n是因為牠在想家。"
vulpix:
  species_id: 37
  names:
    jp_kana: ロコン
    jp_kanji: ロコン
    en: Vulpix
    fr: Goupix
    it: Vulpix
    de: Vulpix
    es: Vulpix
    ko: 식스테일
    zh_simp: 六尾
    zh_trad: 六尾
  forms:
    vulpix:
      form_id: 0
      base_stats:
        hp: 38
        attack: 41
        defense: 40
        special_attack: 50
        special_defense: 65
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - flash_fire
      hidden_ability: drought
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          ultra_sun: "うつくしい　シッポで　だいにんき。\nただし　まめに　ブラッシングしないと\nあっというまに　けだまだらけになる。"
          ultra_moon: "ひの　たまを　あやつり　えものを\nとらえる。　こどもから　そだてると\nこいぬポケモンの　ように　なつくよ。"
        jp_kanji:
          ultra_sun: "美しい　シッポで　大人気。\nただし　まめに　ブラッシングしないと\nあっという間に　毛玉だらけになる。"
          ultra_moon: "火の玉を　操り　獲物を\n捕らえる。　子どもから　育てると\nこいぬポケモンの　ように　懐くよ。"
        en:
          ultra_sun: "Its beautiful tails have made it very popular.\nHowever, if it’s not brushed diligently, it will\nbe a mass of tangles before you know it."
          ultra_moon: "It manipulates balls of fire to catch its prey.\nIf you raise one from when it’s young, it will\ngrow close to you like a puppy Pokémon."
        fr:
          ultra_sun: "Ses queues magnifiques en font un Pokémon\ntrès populaire. Il faut toutefois les lui brosser\nfréquemment pour éviter les nœuds."
          ultra_moon: "Il attrape ses proies en manipulant des boules\nde feu. Élevé depuis son plus jeune âge, il se\nrévélera aussi affectueux qu’un Pokémon Chiot."
        it:
          ultra_sun: "Le sue code lo rendono un Pokémon molto\namato. Vanno spazzolate con cura per\nevitare che si riempiano subito di nodi."
          ultra_moon: "Crea palle infuocate che usa con maestria per\ncatturare le prede. Se allenato fin da cucciolo,\nsi affeziona come un Pokémon Cagnolino."
        de:
          ultra_sun: "Dank seiner hübschen Schweife erfreut es sich\ngroßer Beliebtheit. Wird es aber nicht regelmäßig\ngebürstet, ist es sofort voller Fellknäuel."
          ultra_moon: "Bei der Beutejagd speit es Feuerbälle. Zieht man\nein Vulpix von Kindesbeinen an auf, entwickelt\nes eine Anhänglichkeit wie ein Hund-Pokémon."
        es:
          ultra_sun: "Es muy popular por sus hermosas colas. Hay\nque cepillárselas a menudo o, de lo contrario,\nse le hacen enredos todo el rato."
          ultra_moon: "Es capaz de controlar bolas de fuego con las\nque atrapa a sus presas. Le coge apego a quien\nlo críe desde cachorro, cual Pokémon Perrito."
        ko:
          ultra_sun: "아름다운 꼬리 때문에 인기가 많다.\n단 바지런히 빗질을 하지 않으면\n순식간에 헝클어진다."
          ultra_moon: "불구슬을 조종하여 먹이를\n잡는다. 어릴 때부터 키우면\n강아지포켓몬처럼 따른다."
        zh_simp:
          ultra_sun: "因漂亮的尾巴而深受人们喜爱。\n但是，如果不经常给其梳理毛发，\n很快就会变得全是毛球。"
          ultra_moon: "会操纵火球捕捉猎物。\n如果从小就开始培育的话，\n它就会像小狗宝可梦那样亲近人哦。"
        zh_trad:
          ultra_sun: "牠美麗的尾巴深受人們喜愛。\n但如果沒有經常幫牠梳理，\n很快就會變得滿是毛球。"
          ultra_moon: "會操縱火球捕捉獵物。\n如果從小就開始養育的話，\n牠就會像小狗寶可夢那樣親近人。"
    vulpix_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 38
        attack: 41
        defense: 40
        special_attack: 50
        special_defense: 65
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - ice
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: snow_warning
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          ultra_sun: "かわいいからと　むやみに　ちかづくと\nむれの　ボスで　ある　キュウコンが\nあらわれて　こおりづけに　される。"
          ultra_moon: "むれで　たすけあって　いきている。\nマイナス　５０どの　いきで　えものを\nしっかり　こおらせてから　くらう。"
        jp_kanji:
          ultra_sun: "かわいいからと　無闇に　近付くと\n群れの　ボスで　ある　キュウコンが\n現れて　氷漬けに　される。"
          ultra_moon: "群れで　助け合って　生きている。\nマイナス　５０度の　息で　獲物を\nしっかり　凍らせてから　喰らう。"
        en:
          ultra_sun: "If you carelessly approach it because it’s cute,\nthe boss of the pack, Ninetales, will appear and\nfreeze you."
          ultra_moon: "They live together in a skulk, helping one\nanother. Before eating their prey, they freeze it\nsolid with their –58 degree Fahrenheit breath."
        fr:
          ultra_sun: "Gare à ceux qui s’approchent de ce petit bout\nde chou, car le Feunard qui dirige la meute en\nprofitera pour les transformer en bloc de glace !"
          ultra_moon: "Ses congénères et lui forment des meutes\npour s’entraider. Il congèle ses proies avec\nson souffle à -50 °C, avant de les dévorer."
        it:
          ultra_sun: "È davvero carino, ma se qualcuno gli si avvicina\nsenza cautela rischia di essere ridotto a un\nblocco di ghiaccio dal Ninetales capobranco."
          ultra_moon: "I Vulpix vivono in branco aiutandosi a vicenda.\nDivorano le prede dopo averle congelate con\nil loro soffio a -50 °C."
        de:
          ultra_sun: "Wer sich Vulpix leichtsinnig nähert, weil es doch\nso süß ist, wird sogleich von Vulnona, dem\nAnführer des Rudels, eingefroren."
          ultra_moon: "Vulpix helfen sich in ihrem Rudel gegenseitig.\nMit seinem eisigen Atem von -50 °C friert es\nseine Beute ein, bevor es sie verspeist."
        es:
          ultra_sun: "Aquellos incautos que se le acercan por su\nentrañable apariencia acaban congelados por\nel Ninetales que lidera la manada."
          ultra_moon: "Los miembros de la manada se ayudan entre sí.\nCongela a sus presas con su aliento gélido a\n-50 ºC antes de devorarlas."
        ko:
          ultra_sun: "귀엽다고 무턱대고 다가가면\n무리의 보스인 나인테일이\n나타나 얼려 버린다."
          ultra_moon: "무리가 서로 도우면서 살아간다.\n영하 50도의 숨결로 먹이를\n꽁꽁 얼려서 먹는다."
        zh_simp:
          ultra_sun: "如果觉得可爱而随便靠近它的话，\n群体中的老大九尾就会出现，\n并把你冰封起来。"
          ultra_moon: "会成群结队地互助生活。\n能以零下５０度的吐息\n将猎物冻结实后再进食。"
        zh_trad:
          ultra_sun: "如果因為牠可愛而隨便靠近的話，\n群體的老大九尾就會出現，\n把你冰封起來。"
          ultra_moon: "成群結隊地互助生活。\n會吐出零下５０度的氣息，\n將獵物牢牢凍住後再進食。"
ninetales:
  species_id: 38
  names:
    jp_kana: キュウコン
    jp_kanji: キュウコン
    en: Ninetales
    fr: Feunard
    it: Ninetales
    de: Vulnona
    es: Ninetales
    ko: 나인테일
    zh_simp: 九尾
    zh_trad: 九尾
  forms:
    ninetales:
      form_id: 0
      base_stats:
        hp: 73
        attack: 76
        defense: 75
        special_attack: 81
        special_defense: 100
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 1
      types:
        - fire
      egg_groups:
        - field
      abilities:
        - flash_fire
      hidden_ability: drought
      held_items:
        rare: charcoal
      descriptions:
        jp_kana:
          ultra_sun: "しつこく　しゅうねんぶかい　せいしつ。\n１ど　うらむと　しそんを　ふくめ\n１０００ねんかん　たたりつづける。"
          ultra_moon: "くちから　ふいた　ゆらめく　ほのおで\nさいみん　じょうたいにして　えものを\nおそう　ひじょうに　かしこいポケモン。"
        jp_kanji:
          ultra_sun: "しつこく　執念深い　性質。\n１度　恨むと　子孫を　含め\n１０００年間　祟り続ける。"
          ultra_moon: "口から　吹いた　揺らめく　炎で\n催眠　状態にして　獲物を\n襲う　非常に　賢いポケモン。"
        en:
          ultra_sun: "It is vindictive and relentless by nature.\nThose who cross it even once will be cursed for\na thousand years, along with their descendants."
          ultra_moon: "The flickering flames it spews from its mouth\nleave its opponents hypnotized. Then, this\nextremely intelligent Pokémon attacks."
        fr:
          ultra_sun: "Un Pokémon très rancunier. S’il est offensé,\nson ressentiment peut poursuivre le coupable\net sa descendance pendant un millénaire."
          ultra_moon: "Un Pokémon extrêmement intelligent qui crache\ndes flammes vacillantes pour hypnotiser\net capturer ses proies."
        it:
          ultra_sun: "È molto ostinato e vendicativo. Chi si attira il\nsuo rancore cade vittima di una maledizione\nmillenaria che si trasmette anche ai discendenti."
          ultra_moon: "È un Pokémon estremamente intelligente.\nDalla bocca sputa fiammelle con cui\nipnotizza le prede prima di attaccarle."
        de:
          ultra_sun: "Dieses Pokémon ist sehr rachsüchtig. Wer\nseinen Groll provoziert, den verfolgt bis in seine\nNachkommenschaft ein tausendjähriger Fluch."
          ultra_moon: "Ein höchst intelligentes Pokémon. Es speit\nzuckende Flammen aus dem Mund, um seine\nBeute vor dem Angriff zu hypnotisieren."
        es:
          ultra_sun: "Un Pokémon extraordinariamente vengativo.\nSi recibe una afrenta, su rencor puede perdurar\ndurante un milenio y trascender generaciones."
          ultra_moon: "Este Pokémon es sumamente inteligente.\nControla las llamas que expele por la boca para\nhipnotizar y capturar a sus presas."
        ko:
          ultra_sun: "끈질기고 집념이 강한 성질을 가졌다.\n한 번 원한을 사면 자손을 포함해\n1000년간 해를 입는다."
          ultra_moon: "입에서 흔들리는 불꽃을 뿜어서\n최면 상태로 만든 후에 먹이를\n덮치는 매우 똑똑한 포켓몬이다."
        zh_simp:
          ultra_sun: "性格执拗，爱记仇。一旦遭到它的怨恨，\n它便会在１０００年间不断作祟，\n连对方的子孙都不放过。"
          ultra_moon: "非常聪明的宝可梦。\n能从口中吐出摇曳的火焰来使猎物\n进入催眠状态，继而展开袭击。"
        zh_trad:
          ultra_sun: "性情執拗，一旦遭到牠的怨恨，\n牠會在１０００年間不斷作祟，\n連對方的子孫都不放過。"
          ultra_moon: "會從口中吐出搖曳的火焰，\n讓獵物陷入催眠狀態後再發動襲擊。\n是一種非常聰明的寶可夢。"
    ninetales_alolan_form:
      form_id: 1
      names:
        jp_kana: アローラのすがた
        jp_kanji: アローラのすがた
        en: Alola Form
        fr: Forme d’Alola
        it: Forma di Alola
        de: Alola-Form
        es: Forma de Alola
        ko: 알로라의 모습
        zh_simp: 阿罗拉的样子
        zh_trad: 阿羅拉的樣子
      base_stats:
        hp: 73
        attack: 67
        defense: 75
        special_attack: 81
        special_defense: 100
        speed: 109
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - ice
        - fairy
      egg_groups:
        - field
      abilities:
        - snow_cloak
      hidden_ability: snow_warning
      held_items:
        rare: snowball
      descriptions:
        jp_kana:
          ultra_sun: "ゆきやまで　まよった　にんげんを\nふもとまで　あんない　してくれるのは\nさっさと　おいはらいたいからだ。"
          ultra_moon: "キュウコンの　すむ　やまには　かみが\nおとずれると　いわれ　むかしは\nたちいることを　きんじられていた。"
        jp_kanji:
          ultra_sun: "雪山で　迷った　人間を\n麓まで　案内　してくれるのは\nさっさと　追い払いたいからだ。"
          ultra_moon: "キュウコンの　棲む　山には　神が\n訪れると　いわれ　昔は\n立ち入ることを　禁じられていた。"
        en:
          ultra_sun: "The reason it guides people all the way down to\nthe mountain’s base is that it wants them to\nhurry up and leave."
          ultra_moon: "Some said that deities visited mountains where\nNinetales live, so in times long past, no one was\nallowed to go into those mountains."
        fr:
          ultra_sun: "S’il raccompagne en lieu sûr les humains égarés\ndans ses montagnes enneigées, c’est pour se\ndébarrasser au plus vite de ces importuns."
          ultra_moon: "Comme on pensait que les dieux visitaient les\nmontagnes choisies par les Feunard, elles\nétaient autrefois souvent interdites d’accès."
        it:
          ultra_sun: "Accompagna fino a valle i viandanti smarriti\nsulle montagne innevate per sbarazzarsi di\nloro il prima possibile."
          ultra_moon: "In passato era proibito mettere piede sulle\nmontagne abitate dai Ninetales, perché si\npensava che fossero visitate dalle divinità."
        de:
          ultra_sun: "Menschen, die sich im verschneiten Gebirge\nverlaufen haben, weist es den Weg nach unten,\nweil es sie so schnell wie möglich loswerden will."
          ultra_moon: "Früher glaubte man, dass von Vulnona bewohnte\nBerge von einer Gottheit aufgesucht würden. Es\nwar daher verboten, diese zu erklimmen."
        es:
          ultra_sun: "Guía hasta el pie de la montaña a quienes se\npierden en la nieve porque su presencia le\nresulta un estorbo."
          ultra_moon: "En la antigüedad estaba prohibido el acceso\na las montañas donde viven estos Pokémon,\npues se decía que eran visitadas por deidades."
        ko:
          ultra_sun: "설산에서 길을 잃은 사람을\n산기슭까지 안내해 주는 것은\n얼른 쫓아내고 싶기 때문이다."
          ultra_moon: "나인테일이 사는 산에는\n신이 찾아온다고 전해져서\n옛날에는 출입을 금지했었다."
        zh_simp:
          ultra_sun: "它之所以会将雪山中\n迷路的人们带到山脚下，\n是因为想快点赶走他们。"
          ultra_moon: "据说九尾栖息的山中会有神仙来访，\n所以过去是禁止上山的。"
        zh_trad:
          ultra_sun: "之所以會將在雪山\n迷路的人們帶到山腳下，\n是因為想快點趕走他們。"
          ultra_moon: "據說九尾棲息的山中\n會有神靈來訪，所以\n過去是禁止入山的。"
