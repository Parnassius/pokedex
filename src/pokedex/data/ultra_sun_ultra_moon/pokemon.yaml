        jp_kana:
          ultra_sun: "たいないの　さいぼうが　めまぐるしく\nへんかしている　さいちゅう。　かたい\nカラは　ホネと　おなじ　せいぶんだ。"
          ultra_moon: "どうくつの　おくふかくに　すむ。\nかたい　カラの　なかに　とじこもり\nそらを　とぶ　ひを　ゆめ　みている。"
        jp_kanji:
          ultra_sun: "体内の　細胞が　目まぐるしく\n変化している　最中。　硬い\nカラは　ホネと　同じ　成分だ。"
          ultra_moon: "洞窟の　奥深くに　棲む。\n硬い　カラの　中に　閉じこもり\n空を　飛ぶ　日を　夢見ている。"
        en:
          ultra_sun: "The cells within its body are changing at a\nbewildering pace. Its hard shell is made from\nthe same substance as bone."
          ultra_moon: "Shelgon lives deep within caves. It stays shut\nup in its hard shell, dreaming of the day it will\nbe able to fly."
        fr:
          ultra_sun: "À l’intérieur de sa carapace, dont la composition\ns’apparente à celle des os, son corps subit\nune véritable révolution cellulaire."
          ultra_moon: "Il habite au fond des grottes et, bien à l’abri\nau creux de sa solide carapace, il rêve du jour\noù il pourra enfin s’envoler dans les cieux."
        it:
          ultra_sun: "Le cellule all’interno della dura corazza,\ncomposta da materiale osseo, mutano a una\nvelocità vertiginosa."
          ultra_moon: "Vive nelle profondità delle grotte. Resta chiuso\nnella dura corazza sognando il giorno in cui\nsarà in grado di volare."
        de:
          ultra_sun: "Die Zellen in seinem Körper sind in ständigem,\nrasantem Wandel begriffen. Seine Schale\nbesteht aus derselben Substanz wie Knochen."
          ultra_moon: "Es lebt tief im Inneren von Höhlen. Von seiner\nharten Schale umgeben träumt es von dem Tag,\nan dem es am Himmel fliegt."
        es:
          ultra_sun: "Las células de su cuerpo se transforman a una\nvelocidad vertiginosa. Su dura coraza está\nformada por una especie de tejido óseo."
          ultra_moon: "Vive en el fondo de las grutas. Mientras se\nrecluye en su dura concha, sueña con el día\nen el que pueda surcar el cielo volando."
        ko:
          ultra_sun: "체내의 세포가 빠르게\n변화하고 있는 중이다. 단단한\n껍질은 뼈와 같은 성분이다."
          ultra_moon: "동굴 깊숙한 곳에 산다.\n단단한 껍질 속에 틀어박혀\n하늘을 나는 날을 꿈꾸고 있다."
        zh_simp:
          ultra_sun: "体内的细胞正处于千变万化的时期。\n坚硬的壳与骨头的成分相同。"
          ultra_moon: "栖息在洞窟的深处，\n躲在坚硬的外壳里，\n梦想着飞上天空的那一天。"
        zh_trad:
          ultra_sun: "體內的細胞以令人\n目不暇給的速度不斷變化。\n堅硬的外殼成分與骨骼相同。"
          ultra_moon: "棲息在洞窟深處。\n總是躲在堅硬的外殼裡，\n夢想著飛上天空的那一天。"
salamence:
