      descriptions:
        jp_kana:
          ultra_sun: "からだを　おおう　かたいカラは\nダイヤモンドなみの　きょうどを　もつ。\nかつためには　しゅだんを　えらばない。"
          ultra_moon: "じゆうに　のびちぢみする　ツメが\nさいだいの　ぶき。　コソクムシを\nしたがえていることも　あるのだ。"
        jp_kanji:
          ultra_sun: "身体を　覆う　硬いカラは\nダイヤモンド並みの　強度を　持つ。\n勝つためには　手段を　選ばない。"
          ultra_moon: "自由に　伸び縮みする　ツメが\n最大の　武器。　コソクムシを\n従えていることも　あるのだ。"
        en:
          ultra_sun: "The shell covering its body is as hard as\ndiamond. This Pokémon will do anything it\ntakes to win."
          ultra_moon: "Its claws, which it can extend and retract at\nwill, are its greatest weapons. Golisopod is\nsometimes accompanied by Wimpod."
        fr:
          ultra_sun: "La carapace qui recouvre son corps est aussi\ndure que le diamant. Il ne recule devant rien\npour gagner."
          ultra_moon: "Ses griffes rétractiles sont sa plus grande arme.\nIl se fait parfois accompagner d’une suite\nde Sovkipou."
        it:
          ultra_sun: "Il durissimo carapace che protegge il suo corpo\nè resistente come il diamante. Questo Pokémon\nè disposto a tutto pur di vincere."
          ultra_moon: "La sua arma più potente sono gli artigli, che\npuò estendere e ritrarre a volontà. A volte\nsi fa accompagnare da Wimpod."
        de:
          ultra_sun: "Der harte Panzer auf seinem Rücken steht\nDiamanten in Sachen Härte in nichts nach.\nUm zu gewinnen, sind ihm alle Mittel recht."
          ultra_moon: "Seine gefährlichste Waffe sind seine Klauen,\ndie es nach Belieben ein- und ausfahren kann.\nManchmal wird es von Reißlaus begleitet."
        es:
          ultra_sun: "El caparazón que protege su cuerpo es tan duro\ncomo el diamante. Hará lo que sea por conseguir\nla victoria."
          ultra_moon: "Su mayor arma son sus garras retráctiles.\nA veces va acompañado por un séquito de\nWimpod."
        ko:
          ultra_sun: "몸을 덮고 있는 두꺼운 껍질은\n다이아몬드 정도의 강도다.\n이기기 위해서는 수단을 가리지 않는다."
          ultra_moon: "자유롭게 늘었다 줄었다 하는\n발톱이 최대의 무기다.\n꼬시레를 거느리고 있을 때도 있다."
        zh_simp:
          ultra_sun: "覆盖着身体的坚硬外壳\n拥有媲美钻石的强度。\n为了胜利会不择手段。"
          ultra_moon: "会自由伸缩的爪子是它最大的武器。\n有时也会带领着胆小虫。"
        zh_trad:
          ultra_sun: "覆蓋著身體的堅硬外殼\n有著不遜於鑽石的強度。\n為了勝利會不擇手段。"
          ultra_moon: "能自由伸縮的爪子是牠\n最大的武器。有時也會\n帶著膽小蟲當手下。"
sandygast:
  species_id: 769
  names:
    jp_kana: スナバァ
    jp_kanji: スナバァ
    en: Sandygast
    fr: Bacabouh
    it: Sandygast
    de: Sankabuh
    es: Sandygast
    ko: 모래꿍
    zh_simp: 沙丘娃
    zh_trad: 沙丘娃
  forms:
    sandygast:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 80
        special_attack: 70
        special_defense: 45
        speed: 15
      evs_yield:
        hp: 0
        attack: 0
