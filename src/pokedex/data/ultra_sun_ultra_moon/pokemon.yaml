      descriptions:
        jp_kana:
          ultra_sun: "そうなんした　ひとに　じぶんのエサを\nわけあたえる。　ざっしょく　なので\nむしポケモンを　わたされることも。"
          ultra_moon: "シッポで　エサを　つつみこみ\nはこぶ。　１ばん　おおきな　シッポの\nデリバードが　むれの　ボスだぞ。"
        jp_kanji:
          ultra_sun: "遭難した　人に　自分のエサを\nわけ与える。　雑食　なので\nむしポケモンを　渡されることも。"
          ultra_moon: "シッポで　エサを　包みこみ\n運ぶ。　１番　大きな　シッポの\nデリバードが　群れの　ボスだぞ。"
        en:
          ultra_sun: "It shares its food with people who are stranded.\nBecause Delibird is omnivorous, sometimes\nit gives those people bug Pokémon."
          ultra_moon: "It wraps food in its tail to carry it around.\nThe Delibird with the biggest tail is the boss\nof the flock!"
        fr:
          ultra_sun: "Il partage sa nourriture avec les personnes en\ndifficulté mais, étant omnivore, il peut lui arriver\nde leur offrir des Pokémon Insecte."
          ultra_moon: "Il transporte toute sa nourriture dans sa queue.\nLe Cadoizo qui a la plus grande devient le chef\nde la volée."
        it:
          ultra_sun: "Se incontra qualcuno che si è perso, condivide\nil cibo che ha con sé. È onnivoro, perciò\npotrebbe offrire anche dei Pokémon Coleottero."
          ultra_moon: "Trasporta il cibo avvolgendolo nella coda.\nIl Delibird con la coda più grande diventa\nil capo di tutto lo stormo."
        de:
          ultra_sun: "Es teilt sein Futter mit Menschen in Not. Da es\nein Allesfresser ist, kann es passieren, dass sie\nauch mal Käfer-Pokémon bekommen."
          ultra_moon: "Dieses Pokémon sammelt seine Nahrung in\nseinem Schweif. Das Botogel mit dem größten\nSchweif ist der Anführer der Gruppe."
        es:
          ultra_sun: "Si ve a alguien en apuros, comparte su alimento\ncon él. Aunque, al ser omnívoro, podría ser que\ncompartiera algún que otro Pokémon insecto."
          ultra_moon: "Usa la cola para transportar su alimento. El\nejemplar que posea la cola de mayor tamaño se\nconvertirá en el líder de la bandada."
        ko:
          ultra_sun: "조난 당한 사람에게 자신의 먹이를\n나눠준다. 잡식이어서\n벌레포켓몬을 건네주기도 한다."
          ultra_moon: "꼬리로 먹이를 둘러싸서\n운반한다. 가장 큰 꼬리를 가진\n딜리버드가 무리의 보스다."
        zh_simp:
          ultra_sun: "会把自己的食物分给遇难者。\n因为它是杂食性的宝可梦，\n所以有时会把虫宝可梦分给对方。"
          ultra_moon: "会用尾巴将食物裹起来运送。\n尾巴最大的信使鸟\n就是群体里的老大。"
        zh_trad:
          ultra_sun: "會把自己的食物分給遇難者。\n因為牠是雜食性的寶可夢，\n分到的食物有時會是蟲寶可夢。"
          ultra_moon: "會用尾巴包住食物來搬運。\n尾巴最大的信使鳥\n就是群體裡的老大。"
mantine:
  species_id: 226
  names:
    jp_kana: マンタイン
    jp_kanji: マンタイン
    en: Mantine
    fr: Démanta
    it: Mantine
    de: Mantax
    es: Mantine
    ko: 만타인
    zh_simp: 巨翅飞鱼
    zh_trad: 巨翅飛魚
  forms:
    mantine:
      form_id: 0
      base_stats:
        hp: 85
