      hidden_ability: gale_wings
      descriptions:
        jp_kana:
          ultra_sun: "くさむらに　ひのこを　まきちらす。\nほのおに　おどろいて　とびだしてきた\nむしポケモンを　ぱくりと　いただく。"
          ultra_moon: "とびはじめた　ちょくごの　スピードは\nすべての　とりポケモンの　なかでも\nトップクラスの　はやさ　なのだ。"
        jp_kanji:
          ultra_sun: "草むらに　ひのこを　まき散らす。\n炎に　驚いて　飛び出してきた\nむしポケモンを　ぱくりと　いただく。"
          ultra_moon: "飛びはじめた　直後の　スピードは\nすべての　とりポケモンの　中でも\nトップクラスの　速さ　なのだ。"
        en:
          ultra_sun: "It scatters embers in the tall grass. Then bug\nPokémon, frightened by the flames, come\nflying out, and Fletchinder gobbles them up."
          ultra_moon: "Its speed right after takeoff already puts it in\nthe top speed class of all bird Pokémon."
        fr:
          ultra_sun: "Il enflamme des touffes d’herbe en crachant\ndes escarbilles. Il n’a plus qu’à s’emparer des\nPokémon Insecte qui s’enfuient pour les gober."
          ultra_moon: "À peine décolle-t-il que sa vitesse lui permet\ndéjà de rivaliser avec les Pokémon oiseaux\nles plus rapides."
        it:
          ultra_sun: "Sparge scintille per incendiare i cespugli e fa\nman bassa dei Pokémon Coleottero che saltano\nfuori spaventati."
          ultra_moon: "La velocità che raggiunge subito dopo aver\nspiccato il volo è una delle più alte registrate\ntra i Pokémon alati."
        de:
          ultra_sun: "Es versprüht Funken im hohen Gras und fängt\ndie dadurch aufgescheuchten Käfer-Pokémon\nab, indem es sie mit dem Schnabel aufpickt."
          ultra_moon: "Kaum ein anderes Vogel-Pokémon gewinnt\ndirekt nach dem Abflug so schnell an Tempo\nwie Dartignis."
        es:
          ultra_sun: "Prende fuego a los arbustos con las chispas\nque suelta y aprovecha para cazar los Pokémon\nBicho que salen corriendo despavoridos."
          ultra_moon: "La velocidad que alcanza nada más emprender\nel vuelo es de las más altas de entre todos los\nPokémon pájaro."
        ko:
          ultra_sun: "풀숲에 불꽃을 흩뿌린다.\n불꽃에 놀라 뛰쳐나온\n벌레포켓몬을 덥석 먹어 치운다."
          ultra_moon: "날기 시작한 직후의 스피드는\n모든 새포켓몬 중에서도\n톱클래스 수준이다."
        zh_simp:
          ultra_sun: "向草丛挥撒火花。\n然后大口吞食被火焰吓到\n从草丛跳出来的虫宝可梦。"
          ultra_moon: "刚起飞后的速度，\n在所有鸟宝可梦中也是顶级的。"
        zh_trad:
          ultra_sun: "會向草叢撒出火花，\n然後趁蟲寶可夢被火焰嚇到\n從草叢跳出來時大口吞食。"
          ultra_moon: "剛起飛時的速度\n在所有的鳥寶可夢之中\n是數一數二的。"
talonflame:
  species_id: 663
  names:
    jp_kana: ファイアロー
    jp_kanji: ファイアロー
    en: Talonflame
    fr: Flambusard
    it: Talonflame
    de: Fiaro
