      abilities:
        - swarm
        - insomnia
      hidden_ability: sniper
      descriptions:
        jp_kana:
          ultra_sun: "いとを　はいて　つくった　すは\nけっこう　がんじょう。　１０キロの\nいわを　のせても　やぶれない。"
          ultra_moon: "キバの　どくは　さほど　つよくないが\nすに　かかって　うごけない　えものを\nよわらせるには　じゅうぶん。"
        jp_kanji:
          ultra_sun: "糸を　はいて　作った　巣は\n結構　頑丈。　１０キロの\n岩を　乗せても　破れない。"
          ultra_moon: "キバの　毒は　さほど　強くないが\n巣に　かかって　動けない　獲物を\n弱らせるには　充分。"
        en:
          ultra_sun: "With threads from its mouth, it fashions sturdy\nwebs that won’t break even if you set a rock\non them."
          ultra_moon: "Although the poison from its fangs isn’t that\nstrong, it’s potent enough to weaken prey that\ngets caught in its web."
        fr:
          ultra_sun: "La toile qu’il tisse avec les fils qu’il sécrète est\ntellement solide qu’elle peut soutenir une pierre\nde dix kilos."
          ultra_moon: "Le poison contenu dans les mandibules de\nce Pokémon n’est pas très violent, mais il suffit\nà immobiliser les proies piégées dans sa toile."
        it:
          ultra_sun: "Con il filo che secerne dalla bocca tesse una\ntela talmente resistente da sostenere il peso\ndi una roccia di 10 kg."
          ultra_moon: "Il veleno delle zanne non è particolarmente\npotente, ma è sufficiente a indebolire\nle prede intrappolate nella tela."
        de:
          ultra_sun: "Es spinnt ein äußerst robustes Netz aus seinen\nFäden, das selbst unter dem Gewicht eines\n10 kg schweren Steines nicht reißt."
          ultra_moon: "Das Gift an seinen Mundwerkzeugen ist nicht\nsonderlich stark, jedoch ausreichend, um Beute\nzu schwächen, die ihm ins Netz gegangen ist."
        es:
          ultra_sun: "Segrega un hilo de increíble resistencia con el\nque teje su tela, capaz de soportar el peso de\nuna roca de 10 kg sin romperse."
          ultra_moon: "El veneno de sus colmillos no es demasiado\ntóxico, pero basta para mantener inmovilizadas\na las presas que caen en sus redes."
        ko:
          ultra_sun: "실을 내뿜어 만든 둥지는\n제법 튼튼하다. 10kg의\n바위를 올려도 끄떡없다."
          ultra_moon: "이빨의 독은 그다지 강하진 않지만\n둥지에 걸려서 움직일 수 없는 먹이를\n약하게 만들기에는 충분하다."
        zh_simp:
          ultra_sun: "由它吐丝制成的巢穴非常坚固。\n即便放上１０公斤重的岩石\n也不会破掉。"
          ultra_moon: "牙齿上的毒并不强烈，\n但用来削弱那些挂在网上\n无法动弹的猎物是绰绰有余了。"
        zh_trad:
          ultra_sun: "吐絲製成的巢穴相當堅固，\n即使放上１０公斤重的岩石\n也不會破掉。"
          ultra_moon: "牙齒的毒性並不強烈，\n但用來削弱那些掛在蛛網上\n無法動彈的獵物是綽綽有餘。"
ariados:
  species_id: 168
  names:
    jp_kana: アリアドス
    jp_kanji: アリアドス
    en: Ariados
    fr: Migalos
    it: Ariados
    de: Ariados
    es: Ariados
    ko: 아리아도스
    zh_simp: 阿利多斯
    zh_trad: 阿利多斯
  forms:
    ariados:
      form_id: 0
      base_stats:
        hp: 70
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 70
        speed: 40
      evs_yield:
        hp: 0
