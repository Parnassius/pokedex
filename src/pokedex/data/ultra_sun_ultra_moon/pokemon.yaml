heracross:
  species_id: 214
  names:
    jp_kana: ヘラクロス
    jp_kanji: ヘラクロス
    en: Heracross
    fr: Scarhino
    it: Heracross
    de: Skaraborn
    es: Heracross
    ko: 헤라크로스
    zh_simp: 赫拉克罗斯
    zh_trad: 赫拉克羅斯
  forms:
    heracross:
      form_id: 0
      base_stats:
        hp: 80
        attack: 125
        defense: 75
        special_attack: 40
        special_defense: 95
        speed: 85
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - bug
        - fighting
      egg_groups:
        - bug
      abilities:
        - swarm
        - guts
      hidden_ability: moxie
      descriptions:
        jp_kana:
          ultra_sun: "ふといツノが　じまん。　アローラでは\nクワガノンが　さいだいの　ライバルで\nしょっちゅう　ケンカを　している。"
          ultra_moon: "あまいミツを　もとめ　もりの　なかを\nさがしまわる。　かいりきは　じまんだが\nとぶのは　あまり　とくいでは　ない。"
        jp_kanji:
          ultra_sun: "太いツノが　自慢。　アローラでは\nクワガノンが　最大の　ライバルで\nしょっちゅう　ケンカを　している。"
          ultra_moon: "甘いミツを　求め　森の　中を\n探しまわる。　怪力は　自慢だが\n飛ぶのは　あまり　得意では　ない。"
        en:
          ultra_sun: "It’s proud of its thick horn. In Alola, its biggest\nrival is Vikavolt, which it’s always fighting with."
          ultra_moon: "It roams through forests searching for sweet\nnectar. Although it boasts fantastic physical\nstrength, it’s not that good at flying."
        fr:
          ultra_sun: "Il est très fier de sa grosse corne. Il se chamaille\nsouvent avec Lucanon, son plus grand rival."
          ultra_moon: "Il parcourt les forêts à la recherche de miel.\nIl est très fier de sa force colossale, mais sa\ncapacité à voler laisse quelque peu à désirer."
        it:
          ultra_sun: "Il grosso corno è il suo punto di forza. Ad Alola\nha una forte rivalità con i Vikavolt, con i quali\nè costantemente in lotta."
          ultra_moon: "Si aggira per le foreste in cerca di miele.\nPossiede una forza spaventosa di cui va fiero,\nma non è molto abile nel volo."
        de:
          ultra_sun: "Sein mächtiges Horn ist sein ganzer Stolz.\nEs streitet sich ständig mit Donarion, seinem\ngrößten Rivalen in Alola."
          ultra_moon: "Auf der Suche nach süßem Honig durchstreift\nes die Wälder. Es ist stolz auf seine Stärke,\naber fliegen kann es nicht besonders gut."
        es:
          ultra_sun: "Luce con orgullo su gran cornamenta. Los\nVikavolt son sus mayores rivales en Alola y\ntienen enfrentamientos constantes."
          ultra_moon: "Ronda los bosques en busca de miel. Se jacta\nde su fuerza, pero su capacidad de vuelo deja\nmucho que desear."
        ko:
          ultra_sun: "두꺼운 뿔이 자랑거리다. \n알로라에서는 투구뿌논이\n최대 라이벌로 자주 싸움을 한다."
          ultra_moon: "달콤한꿀을 찾아 숲속을\n돌아다닌다. 괴력을 자랑하지만\n나는 것은 그리 잘하지 못한다."
        zh_simp:
          ultra_sun: "粗粗的角是其骄傲。\n在阿罗拉，锹农炮虫是它最大的\n竞争者，双方经常大打出手。"
          ultra_moon: "会在森林中四处寻找甜甜蜜。\n虽然对于自己的一身怪力\n很是自豪，但却不怎么擅长飞行。"
        zh_trad:
          ultra_sun: "以擁有粗壯的角為傲。在阿羅拉，\n鍬農炮蟲是牠最大的競爭者，\n雙方經常大打出手。"
          ultra_moon: "會在森林中四處尋找甜甜蜜。\n雖然以擁有一身怪力為傲，\n但卻不是很擅長飛行。"
    heracross_mega:
