      descriptions:
        jp_kana:
          ultra_sun: "どろあそびが　だいすき。　まいにち\nどろを　あびないと　ストレスで\nいうことを　きかなくなってしまう。"
          ultra_moon: "かなりの　ちからもち。　じぶんの\nたいじゅうの　５０ばいの　にもつを\nのせられても　まるで　へいきだ。"
        jp_kanji:
          ultra_sun: "泥遊びが　大好き。　毎日\n泥を　浴びないと　ストレスで\nいうことを　聞かなくなってしまう。"
          ultra_moon: "かなりの　力持ち。　自分の\n体重の　５０倍の　荷物を\n乗せられても　まるで　平気だ。"
        en:
          ultra_sun: "It loves playing in the mud. If it isn’t showered\nwith mud on a daily basis, it gets stressed\nout and stops listening to its Trainer."
          ultra_moon: "Possessing mighty power, Mudbray can be\nloaded with 50 times its own body weight\nand will be totally fine."
        fr:
          ultra_sun: "Il adore jouer dans la boue. S’il ne prend pas\nson bain de boue quotidien, il tombe dans un tel\nétat de stress qu’il n’obéit plus à son Dresseur."
          ultra_moon: "Ce Pokémon costaud n’a aucun mal à porter\ndes fardeaux pesant cinquante fois son poids."
        it:
          ultra_sun: "Adora giocare nel fango. Se non si fa il suo\nbagno di fango quotidiano, accumula stress e\nnon ascolta più le indicazioni del suo Allenatore."
          ultra_moon: "È un Pokémon incredibilmente forte.\nPuò trasportare pesi 50 volte superiori al suo\ncome se niente fosse."
        de:
          ultra_sun: "Es spielt liebend gern im Schlamm. Kann es sich\nnicht täglich darin suhlen, hört es vor lauter\nStress nicht mehr auf Befehle seines Trainers."
          ultra_moon: "Es ist ziemlich stark. Selbst wenn es mit dem\n50-fachen seines Gewichts beladen wird,\nscheint ihm das nichts auszumachen."
        es:
          ultra_sun: "Le encanta chapotear en el lodo. Si no recibe su\nbaño de lodo diario, se vuelve desobediente por\nel estrés."
          ultra_moon: "Posee una fuerza asombrosa. Puede llevar sin\ndificultad cargas cuyo peso sea 50 veces\nsuperior al suyo."
        ko:
          ultra_sun: "진흙 놀이를 매우 좋아한다. \n매일 진흙을 뒤집어쓰지 않으면\n스트레스가 쌓여 말을 듣지 않게 된다."
          ultra_moon: "상당한 힘을 가졌다. 자신의\n체중의 50배에 달하는 짐을\n실어도 전혀 아무렇지도 않다."
        zh_simp:
          ultra_sun: "非常喜欢玩泥巴。\n如果不每天在泥巴里玩的话，\n就会因压力而不听话。"
          ultra_moon: "相当有力气。\n即使驼着比自己重５０倍的货物\n也完全轻轻松松的。"
        zh_trad:
          ultra_sun: "最喜歡玩泥巴。\n如果沒有每天到泥巴裡玩的話，\n會因為壓力累積而變得不聽話。"
          ultra_moon: "相當有力氣。即使背起\n比自己重５０倍的貨物\n也絲毫不會感到費力。"
mudsdale:
  species_id: 750
  names:
