      descriptions:
        jp_kana:
          ultra_sun: "５００ねん　ちかく　まえの　すがた。\nその　からだは　たんなる　いれもので\nじんぞうの　たましいが　ほんたいだ。"
          ultra_moon: "じんぞうの　たましいで　かどうする。\nあざやかな　そうしょくは　おうけへの\nけんじょうひんの　しょうこ。"
        jp_kanji:
          ultra_sun: "５００年　近く　前の　姿。\nその　身体は　単なる　入れもので\n人造の　魂が　本体だ。"
          ultra_moon: "人造の　魂で　稼動する。\n鮮やかな　装飾は　王家への\n献上品の　証拠。"
        en:
          ultra_sun: "This is its form from almost 500 years ago. Its\nbody is nothing more than a container—its\nartificial heart is the actual life-form."
          ultra_moon: "It functions thanks to its artificial soul. The vivid\ndecoration is proof that it was presented as a\ngift to royalty."
        fr:
          ultra_sun: "C’est la forme de Magearna tel qu’il était il y a\n500 ans. Son corps n’est qu’une enveloppe\nrenfermant son cœur, une âme artificielle."
          ultra_moon: "Animé par une âme artificielle, ce Pokémon\nfut offert en cadeau à la famille royale, comme\nle prouvent ses luxueux ornements."
        it:
          ultra_sun: "Questa è la forma che Magearna aveva circa\n500 anni fa. Il corpo è solo un contenitore, e la\nsua vera essenza risiede in un’anima artificiale."
          ultra_moon: "È vivo grazie alla sua anima artificiale.\nI suoi splendidi ornamenti mostrano che fu\nofferto in dono a una famiglia reale."
        de:
          ultra_sun: "So sah Magearna vor etwa 500 Jahren aus. Sein\nKörper ist lediglich ein Gefäß, das eigentliche\nPokémon ist eine künstlich erschaffene Seele."
          ultra_moon: "Es wird durch seine künstlich erschaffene Seele\nangetrieben. Das überreiche Dekor weist es als\nGeschenk an eine Königsfamilie aus."
        es:
          ultra_sun: "Este es el aspecto que presentaba Magearna\nhace 500 años. Su cuerpo es solo un recipiente\npara su verdadera esencia, es un alma artificial."
          ultra_moon: "Un Pokémon infundido con un alma artificial. Sus\nrefinados ornamentos son prueba de que fue un\nregalo para una familia real."
        ko:
          ultra_sun: "500년 전의 모습이다.\n그 몸은 단순한 용기로\n인조 영혼이 본체다."
          ultra_moon: "인조 영혼에 의해 가동된다.\n화려한 장식은 왕가에 바친\n진상품이라는 증거다."
        zh_simp:
          ultra_sun: "差不多５００年前的样子。\n那身体只是容器，\n人造的魂魄才是它的本体。"
          ultra_moon: "用人造的魂魄来运转。\n鲜艳的装饰证明了它是\n献给王室的贡品。"
        zh_trad:
          ultra_sun: "將近５００年前的模樣。\n那身體不過是個容器，\n人造的靈魂才是本體。"
          ultra_moon: "靠著人造的靈魂來運作。\n鮮豔的裝飾證明了\n牠是獻給王室的貢品。"
marshadow:
  species_id: 802
  names:
    jp_kana: マーシャドー
    jp_kanji: マーシャドー
    en: Marshadow
    fr: Marshadow
    it: Marshadow
