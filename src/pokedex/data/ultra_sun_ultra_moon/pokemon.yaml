        - refrigerate
      hidden_ability: snow_warning
      descriptions:
        jp_kana:
          ultra_sun: "ひょうざんの　なかに　とうじのままの\nすがたで　こおりづけに　なった\nアマルルガが　みつかり　ニュースに。"
          ultra_moon: "からだの　ひょうめんの　おんどは\nマイナス　１５０ど。　ふだんは\nとてもおとなしく　やさしいポケモン。"
        jp_kanji:
          ultra_sun: "氷山の　中に　当時のままの\n姿で　氷漬けに　なった\nアマルルガが　見つかり　ニュースに。"
          ultra_moon: "身体の　表面の　温度は\nマイナス　１５０度。　普段は\nとても大人しく　やさしいポケモン。"
        en:
          ultra_sun: "An Aurorus was found frozen solid within a\nglacier, just as it appeared long ago, which\nbecame quite a big event in the news."
          ultra_moon: "This usually quiet and kindly Pokémon has a\nsurface temperature of around\n–240 degrees Fahrenheit."
        fr:
          ultra_sun: "Un Dragmara a été retrouvé dans un glacier,\nen parfait état de conservation, ce qui a fait\nla une des actualités."
          ultra_moon: "La température de la surface de son corps\nest de -150 °C. Ce Pokémon est généralement\ntrès calme et très doux."
        it:
          ultra_sun: "Di recente ha fatto notizia il ritrovamento di\nun esemplare in perfetto stato di conservazione\nintrappolato in un iceberg."
          ultra_moon: "La superficie del suo corpo ha una temperatura\ndi -150 °C. È un Pokémon generalmente molto\ntranquillo e docile."
        de:
          ultra_sun: "Kürzlich sorgte der Fund eines in einem Eisberg\neingeschlossenen, perfekt konservierten\nAmagargas aus der Urzeit für Schlagzeilen."
          ultra_moon: "Die Oberfläche seines Körpers ist -150 °C kalt.\nFür gewöhnlich ist es ein sehr besonnenes und\nsanftmütiges Pokémon."
        es:
          ultra_sun: "El descubrimiento de un Aurorus en perfecto\nestado de conservación en el interior de un\niceberg se convirtió en noticia."
          ultra_moon: "La superficie de su cuerpo se mantiene a una\ntemperatura de -150 ºC. Por lo general, es un\nPokémon muy dócil y afable."
        ko:
          ultra_sun: "빙산 안에 당시의 모습 그대로\n얼어붙은 아마루르가가\n발견되어 화제를 모았다."
          ultra_moon: "몸의 표면 온도는 영하 150도다.\n평소에는 매우 얌전하고\n상냥한 포켓몬이다."
        zh_simp:
          ultra_sun: "报道里说，在冰山中发现了\n被冻住的冰雪巨龙，\n仍保持着当时的样子。"
          ultra_moon: "身体表面的温度是零下１５０度。\n平常是非常稳重温和的宝可梦。"
        zh_trad:
          ultra_sun: "有人在冰山裡發現了結凍的冰雪巨龍，\n牠仍然保持著當時的模樣。\n這件事被新聞報了出來。"
          ultra_moon: "身體表面的溫度是\n零下１５０度。平常是\n非常穩重溫和的寶可夢。"
