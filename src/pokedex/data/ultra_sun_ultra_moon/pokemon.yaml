          ultra_sun: "ぜんりょくで　エネルギーを　うつと\nその　パワーで　じぶんの　からだに\nむすうの　きれつが　はしる。"
          ultra_moon: "たいよう　こうせんを　きゅうしゅうし\nエネルギーを　うちだす。　ふだんは\nちちゅうふかくに　みをひそめている。"
        jp_kanji:
          ultra_sun: "全力で　エネルギーを　撃つと\nその　パワーで　自分の　身体に\n無数の　亀裂が　はしる。"
          ultra_moon: "太陽　光線を　吸収し\nエネルギーを　撃ち出す。　普段は\n地中深くに　身を潜めている。"
        en:
          ultra_sun: "When it fires off energy with all its might, the\npower creates countless fissures on its body."
          ultra_moon: "It absorbs rays of sunlight and shoots out\nenergy. It’s usually lurking deep beneath\nthe surface."
        fr:
          ultra_sun: "D’innombrables fissures se dessinent à\nla surface de son corps lorsqu’il déchaîne\ntoute son énergie."
          ultra_moon: "Il peut absorber les rayons du soleil et les\nrejeter sous forme d’énergie, mais il se cache\ngénéralement au plus profond de la terre."
        it:
          ultra_sun: "Quando spara energia con tutte le sue forze,\nla potenza è tale da causare numerose fessure\nsul suo corpo."
          ultra_moon: "Assorbe i raggi solari e li converte in energia\nper poi spararla. Tuttavia, in genere si rifugia\nnelle viscere della terra."
        de:
          ultra_sun: "Wenn es mit geballter Kraft seine gesamte\nEnergie entlädt, führt das dazu, dass sich auf\nseinem Körper unzählige Risse auftun."
          ultra_moon: "Es absorbiert Sonnenstrahlen, um sie als Energie\nwieder zu entladen. Üblicherweise versteckt es\nsich tief unter der Erde."
        es:
          ultra_sun: "Cuando dispara energía con todas sus fuerzas,\nla potencia es tal que le provoca incontables\nfisuras por todo el cuerpo."
          ultra_moon: "Absorbe los rayos de sol y los expulsa en forma\nde energía. Suele ocultarse en las profundidades\nsubterráneas."
        ko:
          ultra_sun: "전력으로 에너지를 쏘면\n그 파워로 자신의 몸에\n무수한 균열이 생긴다."
          ultra_moon: "태양 광선을 흡수해서\n에너지를 쏜다. 평소에는\n땅속 깊은 곳에 몸을 숨기고 있다."
        zh_simp:
          ultra_sun: "如果以全力射出能量，\n那力量能让它自己的身体\n骤然产生出无数裂缝。"
          ultra_moon: "吸收太阳的光线，射出能量。\n平常都把身体藏在地底深处。"
        zh_trad:
          ultra_sun: "如果全力射出能量，\n強大的力量會讓牠自己的身體\n產生出無數的裂痕。"
          ultra_moon: "會吸收太陽的光線，然後\n發射能量。平時都把自己\n藏在地底深處。"
