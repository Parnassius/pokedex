        - levitate
      descriptions:
        jp_kana:
          ultra_sun: "たたりや　のろいを　ふりまくとして\nおそれられて　きた。　きまぐれに\nひとをたすける　じゅもんも　つかう。"
          ultra_moon: "のろいの　ことばを　つぶやいて\nひどい　ずつうや　おそろしい\nまぼろしを　みせて　くるしめる。"
        jp_kanji:
          ultra_sun: "祟りや　呪いを　振りまくとして\n恐れられて　きた。　気まぐれに\n人を助ける　呪文も　使う。"
          ultra_moon: "呪いの　言葉を　つぶやいて\nひどい　頭痛や　恐ろしい\n幻を　見せて　苦しめる。"
        en:
          ultra_sun: "Feared for its wrath and the curses it spreads,\nthis Pokémon will also, on a whim, cast spells\nthat help people."
          ultra_moon: "Its muttered curses can cause awful headaches\nor terrifying visions that torment others."
        fr:
          ultra_sun: "Redouté pour ses sortilèges et ses malédictions,\nce Pokémon peut néanmoins faire preuve de\nbienveillance, si l’envie lui en prend."
          ultra_moon: "Il susurre des malédictions pour tourmenter\nses ennemis et leur infliger de terribles\nmigraines ou des hallucinations terrifiantes."
        it:
          ultra_sun: "È temuto perché lancia maledizioni e causa\nsventure, ma a volte decide di usare i suoi\nincantesimi per aiutare le persone."
          ultra_moon: "Infligge tormenti al nemico recitando formule\nmalefiche che causano terribili emicranie o\nprovocano spaventose visioni."
        de:
          ultra_sun: "Es wird für seine Flüche und Beschwörungen\ngefürchtet. Wenn ihm danach ist, spricht es\nauch mal Bannsprüche, die Menschen helfen."
          ultra_moon: "Es verursacht schreckliche Qualen, indem es\nFlüche flüstert, die schlimme Kopfschmerzen\nund fürchterliche Halluzinationen auslösen."
        es:
          ultra_sun: "Es temido por su afición a lanzar maldiciones y\nconjuros a diestro y siniestro, pero a veces le\nda por usar la magia para ayudar a alguien."
          ultra_moon: "Murmura conjuros para atormentar al enemigo y\nprovocarle dolores de cabeza insoportables o\nvisiones terroríficas."
        ko:
          ultra_sun: "닥치는 대로 재앙과 저주를 내려\n두려움의 대상이었다. 변덕을 부려\n사람을 돕는 주문도 사용하기도 한다."
          ultra_moon: "저주의 말을 중얼거리며\n심한 두통이나 무서운\n환상을 보여 줘서 괴롭힌다."
        zh_simp:
          ultra_sun: "因为四处作祟，播撒诅咒\n而被人们所恐惧。\n也会随性地使用帮助人类的咒文。"
          ultra_moon: "会吟诵诅咒的语言，\n让对方极度头疼，或是看到\n恐怖的幻觉，深受折磨。"
        zh_trad:
          ultra_sun: "因為會四處作祟並散播詛咒\n而被人們畏懼。有時也會\n隨性地使用幫助人的咒語。"
          ultra_moon: "會喃喃唸誦詛咒的話語，\n使對手激烈頭痛，或是看見\n恐怖的幻覺，藉此折磨對手。"
honchkrow:
  species_id: 430
  names:
    jp_kana: ドンカラス
    jp_kanji: ドンカラス
    en: Honchkrow
    fr: Corboss
    it: Honchkrow
    de: Kramshef
    es: Honchkrow
    ko: 돈크로우
    zh_simp: 乌鸦头头
    zh_trad: 烏鴉頭頭
  forms:
    honchkrow:
      form_id: 0
      base_stats:
        hp: 100
        attack: 125
        defense: 52
        special_attack: 105
        special_defense: 52
        speed: 71
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
        - flying
      egg_groups:
        - flying
      abilities:
        - insomnia
        - super_luck
      hidden_ability: moxie
      descriptions:
        jp_kana:
          ultra_sun: "しっぱいしたり　うらぎった　こぶんは\nぜったいに　ゆるさない。　むれの\nちつじょを　まもるため　やむないのだ。"
          ultra_moon: "てきと　たたかうのは　ほぼ　こぶん。\nじぶんの　てを　よごすのは　あいてに\nさいごの　とどめを　さすときだけ。"
        jp_kanji:
          ultra_sun: "失敗したり　裏切った　子分は\n絶対に　許さない。　群れの\n秩序を　守るため　やむないのだ。"
          ultra_moon: "敵と　戦うのは　ほぼ　子分。\n自分の　手を　汚すのは　相手に\n最後の　止めを　刺すときだけ。"
        en:
          ultra_sun: "It will absolutely not forgive failure from or\nbetrayal by its goons. It has no choice in this\nif it wants to maintain the order of the flock."
          ultra_moon: "Its goons take care of most of the fighting for it.\nThe only time it dirties its own hands is in\ndelivering a final blow to finish off an opponent."
        fr:
          ultra_sun: "Il ne pardonne jamais la trahison ou la défaite\nd’un subordonné. Le bien-être de l’ensemble\nde la volée en dépend."
          ultra_moon: "Ses sous-fifres font le sale boulot pour lui.\nIl n’intervient en combat que pour donner\nle coup de grâce à son ennemi."
        it:
          ultra_sun: "Non perdona niente ai suoi seguaci, dai\ntradimenti ai più piccoli errori. Non c’è altro\nmodo per mantenere la disciplina nel gruppo."
          ultra_moon: "Lascia che siano i suoi seguaci a lottare contro\nil nemico e si scomoda solo per assestare\nil colpo di grazia."
        de:
          ultra_sun: "Für Untergebene, die versagen oder es verraten,\nhat es keine Gnade übrig. Das ist nötig, um die\nDisziplin in der Gruppe aufrechtzuerhalten."
          ultra_moon: "Das Kämpfen überlässt es größtenteils seinen\nUntergebenen. Es macht sich nur die Flügel\nschmutzig, um dem Gegner den Rest zu geben."
        es:
          ultra_sun: "No perdona el más mínimo error ni la traición de\nsus subordinados. Este estricto código es para\npreservar la integridad de su bandada."
          ultra_moon: "Delega el combate en sus leales súbditos y solo\nse involucra cuando llega la hora de asestarle el\ngolpe de gracia al enemigo."
        ko:
          ultra_sun: "실패하거나 배신한 부하는\n절대 용서하지 않는다. 무리의\n질서를 지키기 위해 어쩔 수 없다."
          ultra_moon: "적과 싸우는 것은 거의 부하다.\n자신의 손을 더럽히는 것은 상대에게\n마지막 일격을 가할 때뿐이다."
        zh_simp:
          ultra_sun: "绝对不能容忍失败或是背叛的跟班。\n是为了维持群体的秩序，\n不得已而为之的。"
          ultra_moon: "和敌人战斗的基本都是跟班。\n只有在最后刺入对手的致命一击\n才会弄脏自己的手。"
        zh_trad:
          ultra_sun: "絕不會容忍失敗或背叛的手下。\n這是為了維持群體的秩序，\n而不得不用的手段。"
          ultra_moon: "與敵人的戰鬥幾乎全由手下來應付。\n只有在最後給對手致命一擊的時候，\n才會弄髒自己的手。"
