fomantis:
  species_id: 753
  names:
    jp_kana: カリキリ
    jp_kanji: カリキリ
    en: Fomantis
    fr: Mimantis
    it: Fomantis
    de: Imantis
    es: Fomantis
    ko: 짜랑랑
    zh_simp: 伪螳草
    zh_trad: 偽螳草
  forms:
    fomantis:
      form_id: 0
      base_stats:
        hp: 40
        attack: 55
        defense: 35
        special_attack: 50
        special_defense: 35
        speed: 35
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - leaf_guard
      hidden_ability: contrary
      held_items:
        rare: miracle_seed
      descriptions:
        jp_kana:
          ultra_sun: "ひが　のぼると　４まいの　はっぱを\nひろげ　にっこうよく。　あたまの\nさきから　いい　においが　するよ。"
          ultra_moon: "おひさまの　ひかりが　だいすき。\nしっかり　にっこうよくを　することで\nいろあざやかに　そだっていくのだ。"
        jp_kanji:
          ultra_sun: "日が　昇ると　４枚の　葉っぱを\n広げ　日光浴。　頭の\n先から　いい　匂いが　するよ。"
          ultra_moon: "お日様の　光が　大好き。\nしっかり　日光浴を　することで\n色鮮やかに　育っていくのだ。"
        en:
          ultra_sun: "When the sun rises, Fomantis spreads its four\nleaves and bathes in the sunlight. The tip of its\nhead has a pleasant aroma."
          ultra_moon: "It loves the sunshine. When it basks in the\nsunlight regularly, it grows up with\nvivid coloration."
        fr:
          ultra_sun: "Quand le jour se lève, il déploie ses quatre\nfeuilles pour prendre un bain de soleil.\nUne odeur agréable émane du haut de sa tête."
          ultra_moon: "Il raffole de la lumière du jour. Sa couleur devient\nde plus en plus vive à mesure qu’il s’abreuve\ndes rayons du soleil."
        it:
          ultra_sun: "Quando esce il sole dispiega le sue quattro\nfoglie per assorbirne la luce. Il suo capo emana\nun profumo molto gradevole."
          ultra_moon: "Adora la luce del sole. Più resta esposto al sole,\npiù i suoi colori si fanno vividi."
        de:
          ultra_sun: "Scheint die Sonne, streckt es seine vier Blätter\nvon sich und badet im Licht. Von seiner\nKopfspitze geht ein angenehmer Duft aus."
          ultra_moon: "Es liebt Sonnenlicht. Gönnt es sich regelmäßig\nSonnenbäder, blüht es in prächtigen, satten\nFarben auf."
        es:
          ultra_sun: "Al salir el sol, expande sus cuatro hojas\nbuscando la luz. De su cabeza emana un\nagradable aroma."
          ultra_moon: "Le encanta la luz solar. Cuanto más toma el sol,\nmás llamativos son los colores que desarrolla."
        ko:
          ultra_sun: "해가 뜨면 4장의 잎을\n펼치고 일광욕한다.\n머리끝에서 좋은 냄새가 난다."
          ultra_moon: "햇빛을 매우 좋아한다.\n착실하게 일광욕을 하면\n선명한 빛으로 자란다."
        zh_simp:
          ultra_sun: "太阳升起后，就会展开\n４片叶子进行日光浴。\n会从头顶发出好闻的味道哦。"
          ultra_moon: "非常喜欢阳光。\n通过充分地沐浴阳光，\n颜色会长得很鲜艳。"
        zh_trad:
          ultra_sun: "太陽出來時，會張開\n４片葉子來做日光浴。\n會從頭頂發出宜人的香味。"
          ultra_moon: "最喜歡太陽光。\n會透過充分沐浴陽光，\n讓自己長得色彩鮮豔。"
lurantis:
  species_id: 754
  names:
    jp_kana: ラランテス
    jp_kanji: ラランテス
    en: Lurantis
    fr: Floramantis
    it: Lurantis
    de: Mantidea
    es: Lurantis
    ko: 라란티스
    zh_simp: 兰螳花
    zh_trad: 蘭螳花
  forms:
    lurantis:
      form_id: 0
      base_stats:
        hp: 70
