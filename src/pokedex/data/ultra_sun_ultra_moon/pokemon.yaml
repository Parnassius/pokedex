surskit:
  species_id: 283
  names:
    jp_kana: アメタマ
    jp_kanji: アメタマ
    en: Surskit
    fr: Arakdo
    it: Surskit
    de: Gehweiher
    es: Surskit
    ko: 비구술
    zh_simp: 溜溜糖球
    zh_trad: 溜溜糖球
  forms:
