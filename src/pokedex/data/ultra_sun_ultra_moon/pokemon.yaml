      abilities:
        - serene_grace
        - run_away
      hidden_ability: rattled
      descriptions:
        jp_kana:
          ultra_sun: "じめんを　ほりすすみ　いどう。\nディグダと　おたがいの　トンネルを\nなかよく　きょうよう　している。"
          ultra_moon: "ひとの　すがたを　みると　シッポで\nあなを　ほって　にげてしまう。\nもし　であえたなら　ラッキーだよ。"
        jp_kanji:
          ultra_sun: "地面を　掘り進み　移動。\nディグダと　お互いの　トンネルを\n仲良く　共用　している。"
          ultra_moon: "人の　姿を　見ると　シッポで\n穴を　掘って　逃げてしまう。\nもし　出会えたなら　ラッキーだよ。"
        en:
          ultra_sun: "It travels by digging through the ground.\nDiglett and Dunsparce share one another’s\ntunnels happily."
          ultra_moon: "When it sees a person, it digs a hole with its tail\nto make its escape. If you happen to find one,\nconsider yourself lucky."
        fr:
          ultra_sun: "Il se déplace en creusant dans le sol et partage\nles tunnels ainsi créés avec les Taupiqueur.\nCes Pokémon s’entendent très bien."
          ultra_moon: "Quand il aperçoit la silhouette d’un humain,\nil s’enfuit en creusant un trou avec sa queue.\nQuiconque en voit un peut s’estimer chanceux !"
        it:
          ultra_sun: "Si sposta scavando nel terreno.\nI Dunsparce e i Diglett condividono di buon\ngrado i tunnel che scavano."
          ultra_moon: "Appena scorge un essere umano fugge\nscavando con la coda. Incontrarne uno è\nun vero e proprio colpo di fortuna."
        de:
          ultra_sun: "Sie bewegen sich fort, indem sie sich durch den\nBoden graben. Da Dummisel sich mit Digda gut\nverstehen, teilen sie ihre Tunnel miteinander."
          ultra_moon: "Erblickt es einen Menschen, bohrt es mit seinem\nSchweif ein Loch und ergreift sofort die Flucht.\nMan braucht viel Glück, um ihm zu begegnen."
        es:
          ultra_sun: "Se desplaza excavando túneles subterráneos.\nSe lleva bien con los Diglett, con quienes suele\ncompartir túneles."
          ultra_moon: "En cuanto ve un humano, horada en el suelo un\nagujero con la cola y huye. Quien logra ver uno\npuede considerarse afortunado."
        ko:
          ultra_sun: "지면을 파고 다니며 이동한다.\n디그다와 서로의 터널을\n사이좋게 같이 사용하고 있다."
          ultra_moon: "사람의 모습을 보면 꼬리로\n구멍을 파서 도망가 버린다.\n만났다면 운이 좋은 것이다."
        zh_simp:
          ultra_sun: "能挖掘地面移动。\n会友好地和地鼠共用各自的隧道。"
          ultra_moon: "一看到人就会用尾巴挖洞逃走。\n如果遇到了它，就说明你很幸运哦。"
        zh_trad:
          ultra_sun: "會挖掘地面來移動。\n與地鼠保持著友好的關係，\n會共用彼此的隧道。"
          ultra_moon: "一看到人就會用尾巴\n挖洞逃走。如果能夠遇見牠，\n代表你很幸運。"
