      types:
        - dragon
        - flying
      egg_groups:
        - dragon
      abilities:
        - aerilate
      held_items:
        rare: dragon_fang
      descriptions:
        jp_kana:
          ultra_sun: "あばれまくるのは　じまんの　２つの\nつばさが　つよい　エネルギーで\nいびつに　くっついた　ストレスのせい。"
          ultra_moon: "まえあしを　カラの　すきまに　のせて\nひこうたいせいを　とる。　ふくざつな\nちけいも　こうそくで　とびまわるぞ。"
        jp_kanji:
          ultra_sun: "暴れまくるのは　自慢の　２つの\n翼が　強い　エネルギーで\n歪に　くっついた　ストレスのせい。"
          ultra_moon: "前足を　カラの　隙間に　乗せて\n飛行体勢を　とる。　複雑な\n地形も　高速で　飛びまわるぞ。"
        en:
          ultra_sun: "The stress of its two proud wings becoming\nmisshapen and stuck together because of\nstrong energy makes it go on a rampage."
          ultra_moon: "It puts its forelegs inside its shell to streamline\nitself for flight. Salamence flies at high speeds\nover all kinds of topographical features."
        fr:
          ultra_sun: "Frustré de voir ses précieuses ailes déformées\net soudées suite à la Méga-Évolution, il laisse\nlibre cours à sa violence."
          ultra_moon: "Il se met en position de vol en rangeant ses\npattes avant dans sa carapace, et fonce en\nrase-mottes au-dessus des terrains accidentés."
        it:
          ultra_sun: "Ha sviluppato tendenze violente a causa della\nfrustrazione nel vedere le sue preziose ali unite\ne deformate dall’energia della megaevoluzione."
          ultra_moon: "Sistema le zampe anteriori all’interno del suo\ncarapace ed è pronto a volare. Sorvola a gran\nvelocità anche le zone più impervie."
        de:
          ultra_sun: "Durch die Kraft der Mega-Entwicklung wuchsen\nseine geliebten Flügel unnatürlich zusammen,\nwas bei ihm Stress und Tobsucht auslöste."
          ultra_moon: "Es platziert seine Vorderläufe in der Lücke\nzwischen Körper und Panzer, um in dieser\nFlughaltung über jedes Gelände zu düsen."
        es:
          ultra_sun: "La energía de la megaevolución hace que sus\npreciadas alas se adhieran de forma anormal,\nlo que le provoca estrés y lo vuelve agresivo."
          ultra_moon: "Introduce las patas delanteras en la parte\nfrontal de su coraza para surcar el aire a gran\nvelocidad incluso en las zonas más difíciles."
        ko:
          ultra_sun: "날뛰는 이유는 자랑스러운 2개의\n날개가 강한 에너지로 불안정하게\n붙어서 스트레스를 받기 때문이다."
          ultra_moon: "앞다리를 껍질 틈에 얹어서\n비행 태세를 갖춘다. 복잡한\n지형도 고속으로 날아다닌다."
        zh_simp:
          ultra_sun: "它那引以为傲的２根翅膀\n因强大的能量而扭曲着粘在一起，\n让它倍感压力，到处横冲直撞。"
          ultra_moon: "会将前脚收拢在外壳的间隙中，\n变为飞行的姿势。即使是复杂的\n地形也能以高速飞来飞去。"
        zh_trad:
          ultra_sun: "牠引以為傲的一對翅膀\n因強大的能量而扭曲相黏。\n備感壓力的牠為此四處大鬧。"
          ultra_moon: "採取將前腳搭在外殼間隙的\n姿勢來飛行。即使面對複雜的\n地形也能以高速飛來飛去。"
beldum:
  species_id: 374
  names:
    jp_kana: ダンバル
    jp_kanji: ダンバル
    en: Beldum
    fr: Terhal
    it: Beldum
    de: Tanhel
    es: Beldum
    ko: 메탕
    zh_simp: 铁哑铃
    zh_trad: 鐵啞鈴
  forms:
    beldum:
      form_id: 0
      base_stats:
        hp: 40
        attack: 55
        defense: 80
        special_attack: 35
        special_defense: 60
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
