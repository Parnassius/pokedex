      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          ultra_sun: "むかしは　カラを　しょっていた。\nせなかの　おくに　そのなごりの\nかたくて　うすい　さらが　ある。"
          ultra_moon: "すむ　ばしょや　エサの　えいきょうで\nいろや　かたちが　へんか　する。\nなみの　おだやかな　いそべに　おおい。"
        jp_kanji:
          ultra_sun: "昔は　カラを　背負っていた。\n背中の　奥に　その名残の\n硬くて　薄い　皿が　ある。"
          ultra_moon: "棲む　場所や　エサの　影響で\n色や　形が　変化　する。\n波の　おだやかな　磯辺に　多い。"
        en:
          ultra_sun: "Long ago, it had a shell on its back. There’s now\na vestigial plate on its back that’s hard but thin."
          ultra_moon: "Their shape and color change, depending on\ntheir environment and diet. There are many of\nthem at beaches where the waves are calm."
        fr:
          ultra_sun: "La fine soucoupe qui se trouve à l’intérieur de\nson dos est le dernier vestige de la carapace\njadis portée par son espèce."
          ultra_moon: "Il change de forme et de couleur selon son\nhabitat et son alimentation. On le trouve\nsouvent sur les plages à la faible houle."
        it:
          ultra_sun: "In passato era protetto da un carapace di cui\nl’unica traccia rimasta è il disco duro e sottile\nsul suo dorso."
          ultra_moon: "Il colore e la forma del suo corpo mutano in\nbase all’habitat e all’alimentazione. Ne vivono\ntanti sui litorali rocciosi dove il mare è calmo."
        de:
          ultra_sun: "Vor langer Zeit hatte es einen Panzer. In seinem\nRücken ist davon noch eine harte, dünne Platte\nübrig."
          ultra_moon: "Seine Farbe und Form ändern sich je nachdem,\nwo es lebt und was es frisst. Man trifft viele von\nihnen an Küsten mit mäßiger Brandung an."
        es:
          ultra_sun: "Un caparazón le cubría la espalda antaño, y el\núnico indicio de este hecho es la fina y dura\nplaca en la capa interna del lomo."
          ultra_moon: "Altera tanto la forma como el color en función\nde su hábitat y el alimento del que se nutre.\nAbunda en las playas de calmo oleaje."
        ko:
          ultra_sun: "옛날에는 껍질을 등에 지고 있었다.\n그 흔적이 남아 등 안에\n딱딱하고 얇은 접시가 있다."
          ultra_moon: "사는 장소나 먹이의 영향으로\n색이나 모습이 변화한다.\n파도가 잔잔한 바위해변에 많다."
        zh_simp:
          ultra_sun: "曾经一直背着壳。\n在背的里面有着\n又硬又薄的壳的痕迹。"
          ultra_moon: "受栖息地和食物的影响，\n颜色和形状会发生变化。\n在波浪平稳的岩岸有很多。"
        zh_trad:
          ultra_sun: "過去背上曾經有殼，\n如今只在背部內側殘留著\n又硬又薄的弧狀物。"
          ultra_moon: "體色和外型會隨著\n棲息地和食物而變化。\n經常出現在波浪平緩的岩岸。"
    gastrodon_east_sea:
      form_id: 1
      names:
        jp_kana: ひがしのうみ
        jp_kanji: ひがしのうみ
        en: East Sea
        fr: Mer Orient
        it: Mare Est
        de: Östliches Meer
        es: Mar Este
        ko: 동쪽바다
        zh_simp: 东海
        zh_trad: 東海
      base_stats:
        hp: 111
        attack: 83
        defense: 68
        special_attack: 92
        special_defense: 82
        speed: 39
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ground
      egg_groups:
        - water_1
        - amorphous
      abilities:
        - sticky_hold
        - storm_drain
      hidden_ability: sand_force
      descriptions:
        jp_kana:
          ultra_sun: "おそわれると　むらさきいろの　しるを\nふきだす。　どくでは　ないが　にくが\nにがくなるので　くわれないのだ。"
          ultra_moon: "ぶんるいじょうは　シェルダーや\nパルシェンの　しんせき。　うみから\nあがって　エサを　さがすことも　ある。"
        jp_kanji:
          ultra_sun: "襲われると　紫色の　汁を\n噴きだす。　毒では　ないが　肉が\n苦くなるので　食われないのだ。"
          ultra_moon: "分類上は　シェルダーや\nパルシェンの　親戚。　海から\nあがって　エサを　探すことも　ある。"
        en:
          ultra_sun: "When it’s attacked, it gushes a purple liquid\nthat’s not poisonous but makes Gastrodon’s\nmeat bitter and inedible."
          ultra_moon: "A relative of Shellder and Cloyster, this\nocean dweller sometimes comes onto land\nin search of food."
        fr:
          ultra_sun: "Il sécrète un liquide mauve quand il est attaqué.\nCelui-ci n’est pas toxique, mais il rend sa viande\ntrès amère et immangeable."
          ultra_moon: "Il fait partie de la même famille que Kokiyas et\nCrustabri. Il sort parfois de la mer pour trouver\nà manger."
        it:
          ultra_sun: "Se viene attaccato emette un liquido viola che,\npur non essendo velenoso, rende la sua carne\nmolto amara e sgradevole per i predatori."
          ultra_moon: "Da un punto di vista tassonomico è un parente\nstretto di Shellder e Cloyster. A volte si spinge\nfin sulla terraferma per cercare cibo."
        de:
          ultra_sun: "Wird es angegriffen, sondert es ein lilafarbenes\nSekret ab. Dieses ist nicht giftig, doch seine\nbittere Note macht sein Fleisch ungenießbar."
          ultra_moon: "Es ist mit Muschas und Austos verwandt.\nZwecks Nahrungssuche verlässt es mitunter\ndas Meer."
        es:
          ultra_sun: "Si es víctima de un ataque, segrega un líquido\nde color morado. No es venenoso, pero tiene un\ngusto amargo nada apetecible."
          ultra_moon: "Su especie está relacionada con los Shellder y\nlos Cloyster. A veces sale a tierra firme para\nbuscar sustento."
        ko:
          ultra_sun: "습격당하면 보라색의 액체를\n내뿜는다. 독은 아니지만 고기가\n써지기 때문에 잡아먹히지 않는다."
          ultra_moon: "분류상으로는 셀러나\n파르셀의 친척이다. 바다에서\n올라와 먹이를 찾을 때도 있다."
        zh_simp:
          ultra_sun: "如果被袭击，就会喷出紫色的汁。\n虽然没有毒，但会让肉变苦，\n所以不能吃。"
          ultra_moon: "在分类上，与大舌贝和刺甲贝是亲戚。\n有时会从海里上来寻找食物。"
        zh_trad:
          ultra_sun: "遭到襲擊時會噴出紫色的汁液。\n雖然沒有毒，但肉會因此而變苦，\n這讓牠不會被吃掉。"
          ultra_moon: "在分類上是大舌貝和\n刺甲貝的親戚。有時會從\n海裡上來尋找食物。"
ambipom:
  species_id: 424
  names:
    jp_kana: エテボース
    jp_kanji: エテボース
    en: Ambipom
    fr: Capidextre
    it: Ambipom
    de: Ambidiffel
    es: Ambipom
    ko: 겟핸보숭
    zh_simp: 双尾怪手
    zh_trad: 雙尾怪手
  forms:
    ambipom:
      form_id: 0
      base_stats:
        hp: 75
        attack: 100
        defense: 66
        special_attack: 60
        special_defense: 66
        speed: 115
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - normal
      egg_groups:
        - field
      abilities:
        - technician
        - pickup
      hidden_ability: skill_link
      descriptions:
        jp_kana:
          ultra_sun: "いごこちのよい　きを　めぐって\nナゲツケサルのグループと　なわばりを\nあらそっている。　けっかは　５ぶだ。"
          ultra_moon: "なにを　するにも　シッポを　つかう。\n２ほんの　シッポで　だきしめられたら\nほんとうに　なつかれた　あかし。"
        jp_kanji:
          ultra_sun: "居心地の良い　木を　巡って\nナゲツケサルのグループと　縄張りを\n争っている。　結果は　５分だ。"
          ultra_moon: "なにを　するにも　シッポを　使う。\n２本の　シッポで　抱きしめられたら\n本当に　懐かれた　証。"
        en:
          ultra_sun: "In their search for comfortable trees, they get\ninto territorial disputes with groups of\nPassimian. They win about half the time."
          ultra_moon: "It uses its tails for everything. If it wraps both\nof its tails around you and gives you a squeeze,\nthat’s proof it really likes you."
        fr:
          ultra_sun: "Il se dispute constamment les arbres les plus\nconfortables avec Quartermac et remporte\nla victoire la moitié du temps."
          ultra_moon: "Il utilise toujours ses deux queues pour faire\nla moindre tâche. Il s’en sert aussi pour enlacer\nles gens qu’il affectionne tout particulièrement."
        it:
          ultra_sun: "Questi Pokémon si azzuffano con i Passimian\nper aggiudicarsi il territorio con gli alberi più\ncomodi e la metà delle volte la spuntano."
          ultra_moon: "Usa le code per fare tutto. Se abbraccia\nqualcuno con entrambe le code, significa che\nprova un grande affetto per questa persona."
        de:
          ultra_sun: "Sie streiten sich mit Gruppen von Quartermak\num die bequemsten Bäume. Etwa die Hälfte\ndieser Revierkämpfe gewinnen sie."
          ultra_moon: "Es benutzt seine zwei Schweife für alles, was es\ntut. Wenn es jemanden mit ihnen umarmt, ist das\nein Beweis seiner Zuneigung."
        es:
          ultra_sun: "Su especie arma constantes trifulcas por los\nárboles más cómodos con los Passimian. Suelen\nganar la mitad de las veces."
          ultra_moon: "Utiliza las dos colas para todo. Cuando abraza\na alguien con ellas significa que esa persona se\nha ganado por completo su confianza."
        ko:
          ultra_sun: "머물기 좋은 나무를 두고\n내던숭이 그룹과 영역\n다툼을 하고 있다. 승률은 비슷하다."
          ultra_moon: "무엇을 하더라도 꼬리를 사용한다.\n2개의 꼬리로 껴안는다면\n정말로 친밀해졌다는 증거다."
        zh_simp:
          ultra_sun: "围绕着舒适的树木的问题，\n一直在和投掷猴群体争夺领地。\n但结果是五五分。"
          ultra_moon: "无论做什么都会用到尾巴。\n如果被它的２条尾巴抱紧，\n那就证明是真的和你很亲近。"
        zh_trad:
          ultra_sun: "為了搶佔舒適好住的樹木，\n不斷與投擲猴群爭奪地盤，\n但結果是雙方勢均力敵。"
          ultra_moon: "不管做什麼事都會用到尾巴。\n如果牠用２根尾巴抱緊你，\n就代表牠真的和你很親近。"
drifloon:
  species_id: 425
  names:
    jp_kana: フワンテ
    jp_kanji: フワンテ
    en: Drifloon
    fr: Baudrive
    it: Drifloon
    de: Driftlon
    es: Drifloon
    ko: 흔들풍손
    zh_simp: 飘飘球
    zh_trad: 飄飄球
  forms:
    drifloon:
      form_id: 0
      base_stats:
        hp: 90
        attack: 50
        defense: 34
        special_attack: 60
        special_defense: 44
        speed: 70
      evs_yield:
        hp: 1
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      hidden_ability: flare_boost
      descriptions:
        jp_kana:
          ultra_sun: "まるい　からだの　なかに　たくさんの\nたましいが　つまっている。　だれかを\nみちづれにするたび　ふくらんでいく。"
          ultra_moon: "みちばたで　さまよう　たましいたちが\nかたまって　うまれる。　こどもを\nなかまに　しようと　てを　ひっぱる。"
        jp_kanji:
          ultra_sun: "丸い　身体の　中に　たくさんの\n魂が　詰まっている。　誰かを\n道連れにするたび　膨らんでいく。"
          ultra_moon: "道端で　さまよう　魂たちが\nかたまって　生まれる。　子どもを\n仲間に　しようと　手を　引っ張る。"
        en:
          ultra_sun: "Its round body is stuffed with souls and\nexpands each time it leads someone away."
          ultra_moon: "Wandering souls gathered together to form this\nPokémon. When trying to make friends with\nchildren, Drifloon grabs them by the hand."
        fr:
          ultra_sun: "Son corps rond contient une quantité d’âmes\nimpressionnante. Plus il entraîne de personnes\navec lui, plus son corps gonfle."
          ultra_moon: "Né d’une agglomération d’âmes errantes,\nil entraîne les enfants par la main pour s’en\nfaire des amis."
        it:
          ultra_sun: "Il suo corpo rotondo contiene molte anime.\nPiù tempo passa in compagnia, più il suo\ncorpo si gonfia."
          ultra_moon: "È formato dalle anime che vagano sul ciglio\ndella strada. Prende con sé i bambini\ntenendoli per mano."
        de:
          ultra_sun: "Sein runder Körper ist mit vielen Seelen gefüllt.\nJedes Mal, wenn es jemanden entführt, wird es\ngrößer."
          ultra_moon: "Es entstand aus verirrten Seelen, die sich\nzusammengefunden hatten. Kinder zerrt es an\nder Hand mit, um sich mit ihnen anzufreunden."
        es:
          ultra_sun: "En el interior de su cuerpo redondo almacena\ngran número de almas. Aumenta de tamaño con\ncada persona que se lleva."
          ultra_moon: "Está formado por espíritus errantes que vagan\npor los caminos. Se lleva a los niños de la mano\npara entablar amistad con ellos."
        ko:
          ultra_sun: "둥근 몸 안에는 많은 혼으로\n가득 차 있다. 누군가를 길동무로\n삼을 때마다 부풀어 오른다."
          ultra_moon: "길가를 헤매는 영혼들이\n한데 모여 태어난다. 아이를\n동료로 만들려고 손을 잡아당긴다."
        zh_simp:
          ultra_sun: "圆圆的身体里塞满了许多魂魄。\n每次带着谁一起走的时候，\n身体就会鼓起来。"
          ultra_moon: "在路上游荡的魂魄们聚积诞生而成。\n想让孩子成为自己的伙伴\n而去拉他们的手。"
        zh_trad:
          ultra_sun: "圓滾滾的身體裡塞滿了靈魂，\n每當牠把誰給帶走時，\n身體就會更加膨脹。"
          ultra_moon: "在路上遊蕩的靈魂聚集起來\n而誕生的寶可夢。為了讓孩子成為\n自己的夥伴，飄飄球會去拉他們的手。"
drifblim:
  species_id: 426
  names:
    jp_kana: フワライド
    jp_kanji: フワライド
    en: Drifblim
    fr: Grodrive
    it: Drifblim
    de: Drifzepeli
    es: Drifblim
    ko: 둥실라이드
    zh_simp: 随风球
    zh_trad: 隨風球
  forms:
    drifblim:
      form_id: 0
      base_stats:
        hp: 150
        attack: 80
        defense: 44
        special_attack: 90
        special_defense: 54
        speed: 80
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ghost
        - flying
      egg_groups:
        - amorphous
      abilities:
        - aftermath
        - unburden
      hidden_ability: flare_boost
      descriptions:
        jp_kana:
          ultra_sun: "ゆうやみを　かぜに　のって　とぶ\nフワライドに　つかまると　あのよへ\nはこばれるという　ウワサだ。"
          ultra_moon: "たいないの　ガスの　げんりょうは\nたましい。　からだが　しぼんでくると\nひとや　ポケモンを　つれさるという。"
        jp_kanji:
          ultra_sun: "夕闇を　風に　乗って　飛ぶ\nフワライドに　捕まると　あの世へ\n運ばれるという　ウワサだ。"
          ultra_moon: "体内の　ガスの　原料は\n魂。　身体が　しぼんでくると\n人や　ポケモンを　連れ去るという。"
        en:
          ultra_sun: "There’s a rumor that if you catch a Drifblim\nfloating on the wind at dusk, you’ll be carried\naway to the afterlife."
          ultra_moon: "The raw material for the gas inside its body\nis souls. When its body starts to deflate, it’s\nthought to carry away people and Pokémon."
        fr:
          ultra_sun: "Si l’on en croit la rumeur, il serait possible de\nse rendre dans l’au-delà en se laissant porter\npar le vent nocturne, accroché à un Grodrive."
          ultra_moon: "Son gaz est essentiellement composé d’âmes. Si\npar malheur son corps se dégonfle, on dit qu’il\nentraîne humains et Pokémon dans sa chute."
        it:
          ultra_sun: "Gira voce che afferrando un Drifblim mentre\nvola trasportato dal vento al crepuscolo si\nvenga condotti nell’aldilà."
          ultra_moon: "I gas all’interno del suo corpo sono costituiti da\nanime. Si dice che, se inizia a sgonfiarsi, nella\nsua caduta trascini con sé persone e Pokémon."
        de:
          ultra_sun: "Gerüchten zufolge wird man ins Jenseits\nmitgenommen, wenn man sich an einem\nDrifzepeli festhält, das im Abendwind driftet."
          ultra_moon: "Das Gas in seinem Körper besteht aus Seelen.\nEs heißt, wenn sein Körper zusammenfalle,\nnehme es Menschen und Pokémon mit sich."
        es:
          ultra_sun: "Se rumorea que los Drifblim que surcan el cielo\nal ocaso llevan a todos aquellos que atrapan al\nmás allá."
          ultra_moon: "El gas que alberga su interior se compone de\nalmas. Si su cuerpo se deshincha, arrastra\nconsigo tanto a personas como a Pokémon."
        ko:
          ultra_sun: "땅거미 진 후 바람을 타며 날아다니는\n둥실라이드에게 잡히면 저세상으로\n데려간다는 소문이다."
          ultra_moon: "체내에 있는 가스의 원료는\n영혼이다. 몸이 쪼그라지기 시작하면\n사람이나 포켓몬을 데려간다고 한다."
        zh_simp:
          ultra_sun: "谣传说，如果被乘着风\n在暮色里飞行的随风球捉住，\n就会被运送往那个世界。"
          ultra_moon: "体内气体的原料是魂魄。\n据说如果身体变得干瘪，\n就会把人和宝可梦带走。"
        zh_trad:
          ultra_sun: "傳說如果被乘著風\n在暮色裡飛行的隨風球捉住，\n就會被帶到陰間去。"
          ultra_moon: "體內氣體的原料是靈魂。\n據說如果牠的身體開始消氣，\n就會去把人或寶可夢帶走。"
buneary:
  species_id: 427
  names:
    jp_kana: ミミロル
    jp_kanji: ミミロル
    en: Buneary
    fr: Laporeille
    it: Buneary
    de: Haspiror
    es: Buneary
    ko: 이어롤
    zh_simp: 卷卷耳
    zh_trad: 捲捲耳
  forms:
    buneary:
      form_id: 0
      base_stats:
        hp: 55
        attack: 66
        defense: 44
        special_attack: 44
        special_defense: 56
