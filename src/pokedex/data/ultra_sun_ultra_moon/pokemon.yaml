      descriptions:
        jp_kana:
          ultra_sun: "タマゴは　たべると　しあわせになると\nいわれるほど　ぜっぴん。　しじょうで\n１ばん　たかい　ねだんが　つく。"
          ultra_moon: "あいじょうに　みちあふれた　ポケモン。\nトレーナーと　こころを　かよわせた\nラッキーだけが　しんかできるという。"
        jp_kanji:
          ultra_sun: "タマゴは　食べると　幸せになると\nいわれるほど　絶品。　市場で\n１番　高い　値段が　つく。"
          ultra_moon: "愛情に　満ちあふれた　ポケモン。\nトレーナーと　心を　通わせた\nラッキーだけが　進化できるという。"
        en:
          ultra_sun: "Their eggs are such a delicacy that some say\neating one will bring you happiness. These eggs\nfetch the highest prices on the market."
          ultra_moon: "This Pokémon is overflowing with love. Only\nChansey that share a strong bond with their\nTrainer can evolve, so people say."
        fr:
          ultra_sun: "Ses œufs sont si bons qu’il suffirait d’en manger\nun pour trouver le bonheur. Au marché, c’est\nle produit qui se vend le plus cher."
          ultra_moon: "Ce Pokémon déborde de compassion.\nOn raconte que seuls les Leveinard ayant ouvert\nleur cœur à leur Dresseur peuvent évoluer."
        it:
          ultra_sun: "Le sue uova sono talmente deliziose che si dice\nrendano felice chiunque le mangi. Per questo\nhanno prezzi altissimi sul mercato."
          ultra_moon: "È molto affettuoso e comprensivo. Si dice che\npossa evolversi solo da un Chansey che va\nd’amore e d’accordo con il proprio Allenatore."
        de:
          ultra_sun: "Sein Ei ist eine Kostbarkeit, denn es heißt, wer\ndavon esse, werde glücklich. Auf dem Markt\nerzielt es deshalb Spitzenpreise."
          ultra_moon: "Es ist ein sehr liebevolles Pokémon. Nur ein\nChaneira, das in völligem Einklang mit seinem\nTrainer ist, entwickelt sich zu Heiteira."
        es:
          ultra_sun: "Se dice que los huevos de Blissey están tan\nricos que dan la felicidad a quien los prueba.\nPor eso alcanzan precios exorbitantes."
          ultra_moon: "Un Pokémon que rebosa amor y del que se dice\nque solo puede evolucionar de un Chansey que\nesté muy unido a su Entrenador."
        ko:
          ultra_sun: "알을 먹으면 행복해진다고\n전해질 정도로 맛이 일품이다.\n시장에서 제일 가격이 비싸다."
          ultra_moon: "애정이 넘치는 포켓몬이다.\n트레이너와 마음이 통하는\n럭키만이 진화할 수 있다고 한다."
        zh_simp:
          ultra_sun: "这个蛋是天下一绝，\n甚至有吃下去就会获得幸福的说法。\n所以它在市场上的价格是最高的。"
          ultra_moon: "心中充满着爱的宝可梦。\n据说只有和训练家心灵相通的\n吉利蛋才能进化。"
        zh_trad:
          ultra_sun: "牠的蛋美味至極，甚至有\n吃了就能獲得幸福的說法，\n所以在市場上的價格是最高的。"
          ultra_moon: "心中充滿了愛的寶可夢。\n據說只有和訓練家心靈相通的\n吉利蛋才能進化。"
