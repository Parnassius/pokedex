minior:
  species_id: 774
  names:
    jp_kana: メテノ
    jp_kanji: メテノ
    en: Minior
    fr: Météno
    it: Minior
    de: Meteno
    es: Minior
    ko: 메테노
    zh_simp: 小陨星
    zh_trad: 小隕星
  forms:
    minior_red_meteor:
      form_id: 0
      names:
        jp_kana: りゅうせいのすがた
        jp_kanji: りゅうせいのすがた
        en: Meteor Form
        fr: Forme Météore
        it: Forma Meteora
        de: Meteorform
        es: Forma Meteorito
        ko: 유성의 모습
        zh_simp: 流星的样子
        zh_trad: 流星的樣子
      base_stats:
        hp: 60
        attack: 60
        defense: 100
        special_attack: 60
        special_defense: 100
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - rock
        - flying
      egg_groups:
        - mineral
      abilities:
        - shields_down
      held_items:
        rare: star_piece
      descriptions:
        jp_kana:
          ultra_sun: "オゾンそうに　すみ　より　つよい\nポケモンの　エサに　なっている。\nにげるうちに　ちじょうに　おちてくる。"
          ultra_moon: "がいかくは　とても　がんじょうだが\nちじょうに　らっかする　ショックで\nこっぱみじんに　くだけてしまう。"
        jp_kanji:
          ultra_sun: "オゾン層に　棲み　より　強い\nポケモンの　エサに　なっている。\n逃げるうちに　地上に　おちてくる。"
          ultra_moon: "外殻は　とても　頑丈だが\n地上に　落下する　ショックで\n木っ端微塵に　砕けてしまう。"
        en:
          ultra_sun: "It lives in the ozone layer, where it becomes\nfood for stronger Pokémon. When it tries to run\naway, it falls to the ground."
          ultra_moon: "Although its outer shell is uncommonly durable,\nthe shock of falling to the ground smashes the\nshell to smithereens."
        fr:
          ultra_sun: "Il vit dans la couche d’ozone, où des Pokémon\nplus forts que lui cherchent à le manger.\nIl tombe à terre lorsqu’il tente de s’enfuir."
          ultra_moon: "Sa carapace, pourtant très solide, éclate\nen mille morceaux quand il s’écrase sur\nla terre en tombant du ciel."
        it:
          ultra_sun: "Vive nello strato d’ozono, dove Pokémon più\nforti di lui lo cacciano per cibarsene. Spesso\nprecipita sulla terraferma cercando di fuggire."
          ultra_moon: "Il suo guscio esterno è estremamente resistente,\nma quando precipita dallo strato d’ozono\nl’impatto con il suolo lo fa andare in mille pezzi."
        de:
          ultra_sun: "Es lebt in der Ozonschicht und dient stärkeren\nPokémon als Nahrung. Wenn es vor ihnen flieht,\nstürzt es auf die Oberfläche des Planeten."
          ultra_moon: "Seine äußere Schale ist zwar sehr robust, durch\nden Aufprall auf der Oberfläche des Planeten\nzersplittert sie allerdings."
        es:
          ultra_sun: "Vive en la capa de ozono, donde puede resultar\npresa de Pokémon más fuertes. Al huir, acaba\nprecipitándose a tierra firme."
          ultra_moon: "Lo recubre un duro caparazón que se quiebra\nen pedazos al impactar con la superficie de la\ntierra."
        ko:
          ultra_sun: "오존층에 살며 더 강한\n포켓몬의 먹이가 된다.\n도망치다 지상으로 떨어진다."
          ultra_moon: "겉껍질은 매우 튼튼하지만\n지상에 낙하할 때의 충격으로\n산산이 조각나 버린다."
        zh_simp:
          ultra_sun: "栖息在臭氧层，成为了\n更强大的宝可梦的食物。\n会在逃跑的过程中掉落到地上。"
          ultra_moon: "外壳非常坚固，但落到地上的\n冲击会让它碎成细屑。"
        zh_trad:
          ultra_sun: "棲息在臭氧層，被更強大的\n寶可夢當成了食物。\n在逃跑的過程中落到了地上。"
          ultra_moon: "外殼非常堅固，\n但墜落到地上時的衝擊\n會讓牠碎成細屑。"
