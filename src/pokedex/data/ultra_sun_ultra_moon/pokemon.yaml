      descriptions:
        jp_kana:
          ultra_sun: "たいもうを　こおらせ　するどい　ハリに\nかえて　みを　まもる。　たいおんは\nマイナス６０どまで　さげられるのだ。"
          ultra_moon: "いっしゅんで　しゅういの　すいぶんを\nこおらせ　こおりの　つぶを　つくり\nえもの　めがけて　うちだすのだ。"
        jp_kanji:
          ultra_sun: "体毛を　凍らせ　鋭い　ハリに\n変えて　身を　守る。　体温は\nマイナス６０度まで　下げられるのだ。"
          ultra_moon: "一瞬で　周囲の　水分を\n凍らせ　氷の　粒を　作り\n獲物　めがけて　撃ちだすのだ。"
        en:
          ultra_sun: "It protects itself by freezing its fur into sharp\nneedles. It can drop its body temperature below\n–75 degrees Fahrenheit."
          ultra_moon: "It can instantaneously freeze any moisture\nthat’s around it, creating ice pellets to shoot at\nits prey."
        fr:
          ultra_sun: "Pour se protéger, il gèle ses poils jusqu’à les\ntransformer en picots de glace. Sa température\ncorporelle peut descendre jusqu’à -60 °C."
          ultra_moon: "Il gèle les particules d’eau qui l’entourent\npour former de petits cristaux de glace,\nqu’il utilise ensuite pour lapider ses proies."
        it:
          ultra_sun: "Congela la sua pelliccia creando degli aghi\nacuminati per difendersi. La sua temperatura\ncorporea può scendere fino a -60 °C."
          ultra_moon: "In un istante congela l’umidità circostante e crea\ngranelli di ghiaccio che scaglia sulla preda."
        de:
          ultra_sun: "Es lässt sein Fell gefrieren und macht es somit\nso spitz wie Eiszapfen. Seine Körpertemperatur\nkann es auf -60 °C senken."
          ultra_moon: "Es lässt die Wasserbestandteile in der Luft in\nSekundenschnelle zu Diamantstaub gefrieren\nund greift damit seine Beute an."
        es:
          ultra_sun: "Congela su pelaje y lo convierte en afilados\npinchos para defenderse. Es capaz de reducir\nsu temperatura corporal hasta -60 ºC."
          ultra_moon: "En un solo instante congela las partículas de\nagua a su alrededor y crea cristales de hielo\ncon los que ataca a su presa."
        ko:
          ultra_sun: "몸의 털을 얼려 예리한 바늘로\n만들어 몸을 지킨다. 체온은\n마이너스 60도까지 내릴 수 있다."
          ultra_moon: "순식간에 주위의 수분을\n얼려서 얼음 결정을 만든 후\n먹이를 향해 날린다."
        zh_simp:
          ultra_sun: "把体毛冻住，\n变成锐利的针来保护身体。\n体温最低可下降到零下６０度。"
          ultra_moon: "能瞬间将周围的水分冻住，\n做成冰粒，朝着猎物发射出去。"
        zh_trad:
          ultra_sun: "會把體毛凍住，\n變成銳利的針來保護自己。\n體溫最低可下降到零下６０度。"
          ultra_moon: "能夠在一瞬間將周圍的\n水分凍結起來形成冰粒，\n然後朝獵物發射出去。"
