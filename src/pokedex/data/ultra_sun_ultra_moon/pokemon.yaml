      types:
        - electric
      egg_groups:
        - field
      abilities:
        - volt_absorb
      hidden_ability: quick_feet
      descriptions:
        jp_kana:
          ultra_sun: "はいの　なかに　でんきを　うみだす\nきかんが　ある。　といきに　まざって\nでんきの　おとが　バチバチきこえる。"
          ultra_moon: "さかだてた　けを　はりの　ように\nとばす。　てきが　よわった　ところを\n１まんボルトの　でんげきで　しとめる。"
        jp_kanji:
          ultra_sun: "肺の　中に　電気を　生み出す\n器官が　ある。　吐息に　混ざって\n電気の　音が　バチバチ聞こえる。"
          ultra_moon: "逆立てた　毛を　針の　ように\n飛ばす。　敵が　弱った　ところを\n１万ボルトの　電撃で　仕留める。"
        en:
          ultra_sun: "Its lungs contain an organ that creates\nelectricity. The crackling sound of electricity\ncan be heard when it exhales."
          ultra_moon: "Its fur stands on end, becoming like needles\nit fires at enemies. Once they’re weakened, it\nfinishes them off with a 10,000 volt shock."
        fr:
          ultra_sun: "Un organe situé à l’intérieur de ses poumons\nproduit de l’électricité. On entend une sorte\nde crépitement chaque fois qu’il expire."
          ultra_moon: "Il projette ses poils hérissés comme si c’étaient\ndes aiguilles, avant d’achever ses ennemis ainsi\naffaiblis avec des décharges de 10 000 volts."
        it:
          ultra_sun: "I suoi polmoni contengono un organo che\nproduce elettricità. Quando respira, si può\nudire un crepitio."
          ultra_moon: "Rizza i peli e li scaglia come se fossero aghi.\nFinisce gli avversari indeboliti con scariche da\n10.000 volt."
        de:
          ultra_sun: "Blitza verfügt über ein Organ in der Lunge,\ndas Elektrizität erzeugt. Wenn dieses Pokémon\nausatmet, hört man ein elektrisches Knistern."
          ultra_moon: "Es stellt seine Haare auf und feuert sie ab wie\nNadeln. Dann gibt es dem geschwächten Gegner\nmit einem 10 000 V starken Blitz den Rest."
        es:
          ultra_sun: "Posee un órgano en los pulmones que genera\nelectricidad. Cuando respira se puede oír un\ncrepitar eléctrico."
          ultra_moon: "Lanza sus pelos erizados a modo de púas. Tras\ndebilitar a su rival, lo remata con una descarga\nde 10 000 voltios."
        ko:
          ultra_sun: "폐 안에 전기를 만드는\n기관이 있다. 날숨에 섞여\n탁탁하는 전기 소리가 들린다."
          ultra_moon: "곤두세운 털을 바늘처럼\n날린다. 적이 약해진 순간\n1만 볼트의 전격으로 처리한다."
        zh_simp:
          ultra_sun: "肺中有能产生电力的器官。\n从它的吐息中，能听到里面\n混杂着噼里啪啦的电流声。"
          ultra_moon: "能将竖起来的毛发像针一样射出去。\n会趁着敌人虚弱的时候，\n用１万伏特的电击解决它。"
        zh_trad:
          ultra_sun: "肺中有著能產生電力的器官，\n可以聽見牠吐氣的聲音裡\n混雜著劈哩啪啦的電流聲。"
          ultra_moon: "能將豎起來的毛像針一樣\n發射出去。會趁敵人衰弱的時候\n用１萬伏特的電擊解決對手。"
