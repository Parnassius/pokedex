          ultra_sun: "がなるような　なきごえなのに　とある\nさっきょくかは　えいきょうを　うけて\nうつくしい　バラードを　つくった。"
          ultra_moon: "あたまの　まきげが　ながく　りっぱな\nニョロトノほど　おおくの　ニョロモや\nニョロゾを　したがえている。"
        jp_kanji:
          ultra_sun: "がなるような　鳴き声なのに　とある\n作曲家は　影響を　受けて\n美しい　バラードを　作った。"
          ultra_moon: "頭の　巻き毛が　長く　立派な\nニョロトノほど　多くの　ニョロモや\nニョロゾを　従えている。"
        en:
          ultra_sun: "Although its cries sound like screams, a\ncomposer created a beautiful ballad that was\ninfluenced by the sounds."
          ultra_moon: "The longer and more luxurious the curled hair on\nits head, the greater the number of Poliwag and\nPoliwhirl that will obey it."
        fr:
          ultra_sun: "Bien que le chant de ce Pokémon s’apparente\nà des cris, un musicien s’en est inspiré pour\ncomposer une magnifique ballade."
          ultra_moon: "La longueur et la beauté du cheveu bouclé qui\norne la tête de Tarpaud influencent directement\nle nombre de Ptitard et de Têtarte lui obéissant."
        it:
          ultra_sun: "Nonostante emetta un verso chiassoso,\nun compositore si è ispirato alle sue grida\nper scrivere delle splendide ballate."
          ultra_moon: "Più lungo e arricciato è il pennacchio sul capo\ndi un Politoed, maggiore è il numero di Poliwag\ne Poliwhirl che obbediranno ai suoi ordini."
        de:
          ultra_sun: "Sein Ruf mag zwar wie Gebrüll klingen, doch\nein Komponist ließ sich von ihm zu einer\ntraumhaften Ballade inspirieren."
          ultra_moon: "Je länger und prächtiger Quaxos Haarlocke ist,\ndesto mehr Quapsel und Quaputzi führt es an."
        es:
          ultra_sun: "A pesar de lo discordante de sus gritos, un\nautor se inspiró en ellos para componer una\nhermosa balada."
          ultra_moon: "Cuanto más largo y magnífico sea el rizo que\nluce en la cabeza, más Poliwag y Poliwhirl se\nsometerán a su mandato."
        ko:
          ultra_sun: "고함치는 듯한 울음소리임에도\n어느 작곡가는 영향을 받아\n아름다운 발라드를 만들었다."
          ultra_moon: "둥글게 말린 머리칼이 길고 훌륭한\n왕구리일수록 많은 발챙이나\n슈륙챙이가 따르고 있다."
        zh_simp:
          ultra_sun: "明明叫声有如嚎叫一般，\n但某位作曲家却受其影响\n创作了优美的叙事曲。"
          ultra_moon: "蚊香蛙皇头上的卷毛越长，\n长得越仪表堂堂，就越能领导\n更多的蚊香蝌蚪和蚊香君。"
        zh_trad:
          ultra_sun: "雖然叫聲像噪音一樣吵，\n但某位作曲家卻受到其影響，\n創作了優美的敘事曲。"
          ultra_moon: "頭上捲毛越長的蚊香蛙皇\n就越有派頭，且能夠得到\n越多蚊香蝌蚪和蚊香君的追隨。"
