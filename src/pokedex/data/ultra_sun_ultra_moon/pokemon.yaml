      descriptions:
        jp_kana:
          ultra_sun: "なぞの　でんぱを　はっしん　しており\nレアコイルが　すんでいる　ばしょでは\nせいみつききが　こしょうしてしまう。"
          ultra_moon: "あまぐもが　できると　たかいところに\nあつまってくる。　かみなりが\nおちるのを　まっているのだ。"
        jp_kanji:
          ultra_sun: "謎の　電波を　発信　しており\nレアコイルが　棲んでいる　場所では\n精密機器が　故障してしまう。"
          ultra_moon: "雨雲が　できると　高いところに\n集まってくる。　雷が\n落ちるのを　待っているのだ。"
        en:
          ultra_sun: "Delicate equipment can malfunction in areas\ninhabited by Magneton, which send out\nmysterious electrical signals."
          ultra_moon: "When rain clouds form, many Magneton gather\nin high places to wait for lightning to strike."
        fr:
          ultra_sun: "Les Magnéton émettent d’étranges ondes,\net les appareils de précision ont tendance\nà tomber en panne à leur approche."
          ultra_moon: "Quand de gros nuages de pluie s’amoncellent\ndans le ciel, les Magnéton se rassemblent\nsur les hauteurs pour attendre la foudre."
        it:
          ultra_sun: "Nelle zone abitate dai Magneton, i dispositivi\ndi precisione spesso si guastano a causa delle\nstrane onde prodotte da questi Pokémon."
          ultra_moon: "Quando il cielo si copre di nuvole temporalesche,\ni Magneton si raggruppano in luoghi sopraelevati\nin attesa dei fulmini."
        de:
          ultra_sun: "Es erzeugt seltsame Radiowellen, die Störungen\nan Präzisionsinstrumenten in seiner Umgebung\nverursachen."
          ultra_moon: "Ziehen Regenwolken auf, versammeln sich\nMagneton in großer Höhe und warten darauf,\ndass der Blitz einschlägt."
        es:
          ultra_sun: "Las misteriosas ondas eléctricas que emiten\nprovocan toda clase de averías en la electrónica\nde precisión allí donde viven."
          ultra_moon: "Cuando se forman nubes de tormenta, se\ncongregan en las alturas aguardando a que\ncaigan rayos."
        ko:
          ultra_sun: "정체 모를 전파를 발신하기 때문에\n레어코일이 사는 곳에는\n정밀 기기가 고장 난다."
          ultra_moon: "비구름이 생기면 높은 곳에\n모여든다. 번개가 치기를\n기다리는 것이다."
        zh_simp:
          ultra_sun: "会发出神秘的电波，\n在三合一磁怪栖息的地方，\n精密机器会发生故障。"
          ultra_moon: "雨云形成后，\n它们就会聚集在高处，\n等待着从天上落下雷电。"
        zh_trad:
          ultra_sun: "會發出神秘的電波。\n在三合一磁怪棲息的地方，\n精密機器會發生故障。"
          ultra_moon: "當天空中出現雨雲時，\n牠們就會聚集在高處，\n等待著天上落下雷電。"
