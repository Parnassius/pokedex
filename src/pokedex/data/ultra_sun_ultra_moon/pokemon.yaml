        - sturdy
      descriptions:
        jp_kana:
          ultra_sun: "たいこ　アローラを　しはい　していた\nおうさまは　ほしのまゆと　よんで\nあがめるための　さいだんを　つくった。"
          ultra_moon: "ひかりを　すいながら　せいちょうを\nつづけている。　きんいろの　からは\nおどろくほどに　がんじょう。"
        jp_kanji:
          ultra_sun: "太古　アローラを　支配　していた\n王様は　星の繭と　呼んで\n崇めるための　祭壇を　作った。"
          ultra_moon: "光を　吸いながら　成長を\n続けている。　金色の　カラは\n驚くほどに　頑丈。"
        en:
          ultra_sun: "The king who ruled Alola in times of antiquity\ncalled it the “cocoon of the stars” and built\nan altar to worship it."
          ultra_moon: "As it absorbs light, Cosmoem continues to grow.\nIts golden shell is surprisingly solid."
        fr:
          ultra_sun: "Un antique roi d’Alola lui a donné le surnom\nde « cocon céleste » et a même érigé un autel\nen son honneur."
          ultra_moon: "Il continue à grandir en absorbant de la lumière.\nSa carapace dorée est étonnamment solide."
        it:
          ultra_sun: "Un antico re di Alola gli diede il nome di\n“Bozzolo di stella” e costruì un altare\nper venerarlo."
          ultra_moon: "Continua a crescere assorbendo la luce.\nIl suo esoscheletro dorato è incredibilmente\nduro."
        de:
          ultra_sun: "Ein vor Urzeiten über Alola herrschender König\nnannte es „Sternenkokon“ und erbaute ihm zu\nEhren ein Podium."
          ultra_moon: "Es nimmt Licht in sich auf und wächst so immer\nweiter. Seine goldene Schale ist überraschend\nhart."
        es:
          ultra_sun: "En la antigüedad, un rey de Alola lo apodó\nCrisálida de las Estrellas y erigió un altar en su\nhonor."
          ultra_moon: "Crece continuamente gracias a la luz que\nabsorbe. Su caparazón dorado es más duro de\nlo que parece."
        ko:
          ultra_sun: "먼 옛날 알로라를 지배하던\n왕은 별의 고치라고 부르며\n숭상하기 위한 제단을 만들었다."
          ultra_moon: "빛을 흡수하면서 성장을\n계속하고 있다. 금색의 껍질은\n놀라울 정도로 튼튼하다."
        zh_simp:
          ultra_sun: "太古时代支配着阿罗拉的国王，\n称之为星之茧，\n因为崇拜它而建造了祭坛。"
          ultra_moon: "一边吸收光，一边不断成长。\n金色的外壳坚硬得令人吃惊。"
        zh_trad:
          ultra_sun: "太古時代支配著阿羅拉的國王\n稱呼牠為星之繭，\n為了崇拜牠而建造了祭壇。"
          ultra_moon: "一邊吸收光一邊不斷成長。\n金色的外殼堅硬到\n令人驚異的程度。"
solgaleo:
