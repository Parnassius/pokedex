        jp_kanji:
          ultra_sun: "この世界では　異質で　危険だが\n本来　棲んでいる　世界では\n普通に　見かける　生物らしい。"
          ultra_moon: "ＵＢと　呼ばれる　未知の　生命。\n常に　腹を　すかせているのか\nずっと　なにかを　喰らっている。"
        en:
          ultra_sun: "Although it’s alien to this world and a danger\nhere, it’s apparently a common organism in the\nworld where it normally lives."
          ultra_moon: "An unknown life-form called a UB. It may be\nconstantly hungry—it is certainly always\ndevouring something."
        fr:
          ultra_sun: "Cette créature venue d’ailleurs est dangereuse\ndans notre monde, mais il semblerait qu’elle soit\ntrès commune dans le sien."
          ultra_moon: "Cette créature inconnue appelée\n« Ultra-Chimère » semble constamment\naffamée : elle mange en permanence."
        it:
          ultra_sun: "Nel nostro mondo il suo aspetto appare strano\ne minaccioso, ma sembra che in quello da cui\nproviene sia una creatura molto comune."
          ultra_moon: "Una misteriosa forma di vita nota come\nUltracreatura. Mangia in continuazione, come\nse fosse costantemente affamata."
        de:
          ultra_sun: "In dieser Welt wirkt sein Aussehen gefährlich\nund fremdartig, doch in seiner ursprünglichen\nWelt ist es ein ganz gewöhnliches Lebewesen."
          ultra_moon: "Eine unbekannte Lebensform, die zu den\nUltrabestien gehört. Sie scheint immer hungrig\nzu sein, da sie ununterbrochen frisst."
        es:
          ultra_sun: "Para los seres de este mundo resulta extraño\ny peligroso, pero en el mundo del que procede\nes una criatura muy común."
          ultra_moon: "Uno de los extraños Ultraentes. Siempre está\ncomiendo algo, como poseído de un hambre\ninsaciable."
        ko:
          ultra_sun: "이 세계와는 성질이 다르고\n위험하지만 원래 살던 세계에서는\n흔히 볼 수 있는 생물인 듯하다."
          ultra_moon: "UB라고 불리는 미지의 생명체.\n늘 배가 고픈 상태인 것인지\n계속해서 무언가를 먹고 있다."
        zh_simp:
          ultra_sun: "在这个世界是异类，很危险，\n但在它原本栖息的世界，\n好像只是寻常能见的生物。"
          ultra_moon: "被称为究极异兽的未知生命。\n不知是不是经常觉得肚子饿，\n一直都在吃着什么东西。"
        zh_trad:
          ultra_sun: "在這個世界是危險的異類，\n但在原本棲息的世界裡，\n牠似乎是常見的普通生物。"
          ultra_moon: "被稱為究極異獸的未知生命。\n不知是否總覺得肚子餓，\n牠隨時都在吃東西。"
necrozma:
  species_id: 800
  names:
    jp_kana: ネクロズマ
    jp_kanji: ネクロズマ
    en: Necrozma
    fr: Necrozma
    it: Necrozma
    de: Necrozma
    es: Necrozma
    ko: 네크로즈마
    zh_simp: 奈克洛兹玛
    zh_trad: 奈克洛茲瑪
  forms:
    necrozma:
      form_id: 0
      base_stats:
        hp: 97
        attack: 107
        defense: 101
        special_attack: 127
        special_defense: 89
        speed: 79
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - prism_armor
      descriptions:
        jp_kana:
          ultra_sun: "エネルギーとなる　ひかりを　もとめて\nあばれる　すがたは　どこか　くるしげ。\nべつの　せかいの　そんざい　らしい。"
          ultra_moon: "ひかりが　エネルギーげん。　ひかりを\nくらわないで　いると　ふじゅんぶつが\nたまり　くろずんで　うごけなくなる。"
        jp_kanji:
          ultra_sun: "エネルギーとなる　光を　求めて\n暴れる　姿は　どこか　苦しげ。\n別の　世界の　存在　らしい。"
          ultra_moon: "光が　エネルギー源。　光を\n喰らわないで　いると　不純物が\nたまり　黒ずんで　動けなくなる。"
        en:
          ultra_sun: "It looks somehow pained as it rages around in\nsearch of light, which serves as its energy.\nIt’s apparently from another world."
          ultra_moon: "Light is the source of its energy. If it isn’t\ndevouring light, impurities build up in it and on it,\nand Necrozma darkens and stops moving."
        fr:
          ultra_sun: "Il semble souffrir dans sa recherche désespérée\nde lumière, sa source d’énergie. On pense\nqu’il vient d’un autre monde."
          ultra_moon: "S’il ne dévore pas assez de lumière, sa source\nd’énergie, il accumule les impuretés. Il noircit\net finit par ne plus pouvoir bouger."
        it:
          ultra_sun: "Pare che sia una creatura di un altro mondo.\nLa luce è la sua fonte d’energia e la cerca con\nfuria, rivelando sofferenza."
          ultra_moon: "La luce è la sua fonte di energia. Quando non\nriesce a consumarne, accumula impurità che lo\nscuriscono e gli impediscono di muoversi."
        de:
          ultra_sun: "Diese Kreatur stammt wohl aus einer anderen\nWelt. Sie wirkt gequält, wenn sie auf der Suche\nnach Licht, seiner Energiequelle, herumwütet."
          ultra_moon: "Licht ist seine Energiequelle. Kann es dieses\nnicht verschlingen, sammeln sich Unreinheiten\nan und es wird schwarz und regungslos."
        es:
          ultra_sun: "La luz es su fuente de energía y la busca con tal\ndesespero que da la impresión de que sufre.\nParece ser una criatura de otro mundo."
          ultra_moon: "La luz es su fuente de energía. Si no absorbe la\nsuficiente, empieza a acumular impurezas que\nhacen que se quede negruzco e inmóvil."
        ko:
          ultra_sun: "에너지인 빛을 찾아 날뛰는 모습은\n어딘지 모르게 괴로워 보인다.\n다른 세계의 존재인 듯하다."
          ultra_moon: "빛이 에너지원이다.\n빛을 받지 못하면 불순물이 쌓여서\n검게 변해 움직일 수 없게 된다."
        zh_simp:
          ultra_sun: "为了寻找作为能量的光\n而发狂的样子看上去有些痛苦。\n好像存在于其他世界。"
          ultra_moon: "光是它的能量源。如果不吃\n光的话，杂质会慢慢积聚，\n它就会发黑而变得不能动弹。"
        zh_trad:
          ultra_sun: "為了尋求作為能量的光\n而發狂的牠看起來有些痛苦。\n似乎是來自於其他世界。"
          ultra_moon: "光是牠的能量來源。如果一段時間\n沒吃到光，雜質就會逐漸累積，\n使得牠身體發黑且變得無法動彈。"
    necrozma_dusk_mane:
      form_id: 1
      names:
        jp_kana: たそがれのたてがみ
        jp_kanji: たそがれのたてがみ
        en: Dusk Mane
        fr: Crinière du Couchant
        it: Criniera del Vespro
        de: Abendmähne
        es: Melena Crepuscular
        ko: 황혼의 갈기
        zh_simp: 黄昏之鬃
        zh_trad: 黃昏之鬃
      base_stats:
        hp: 97
        attack: 157
        defense: 127
        special_attack: 113
        special_defense: 109
        speed: 77
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
        - steel
      egg_groups:
        - undiscovered
      abilities:
        - prism_armor
      descriptions:
        jp_kana:
          ultra_sun: "ソルガレオのひかりを　くらいつづける\nすがた。　てきに　とびかかり　せなかと\nししのツメで　あいてを　きりさく。"
          ultra_moon: "ソルガレオの　パワーを　すいつづける\nネクロズマの　すがた。　ひじょうに\nきょうぼうで　てが　つけられない。"
        jp_kanji:
          ultra_sun: "ソルガレオの光を　喰らい続ける\n姿。　敵に　とびかかり　背中と\n四肢のツメで　相手を　切り裂く。"
          ultra_moon: "ソルガレオの　パワーを　吸い続ける\nネクロズマの　姿。　非常に\n凶暴で　手が　つけられない。"
        en:
          ultra_sun: "This is its form while it is devouring the light of\nSolgaleo. It pounces on foes and then slashes\nthem with the claws on its four limbs and back."
          ultra_moon: "This is Necrozma’s form while it’s absorbing\nthe power of Solgaleo, making it extremely\nferocious and impossible to control."
        fr:
          ultra_sun: "La forme que Necrozma prend lorsqu’il absorbe\nla lumière de Solgaleo. Il bondit sur ses ennemis\net leur assène des coups de griffes."
          ultra_moon: "La forme que Necrozma prend lorsqu’il absorbe\nla puissance de Solgaleo. Il devient alors très\nviolent et totalement incontrôlable."
        it:
          ultra_sun: "Necrozma assume questa forma quando si nutre\ndella luce di Solgaleo. Lacera i nemici con gli\nartigli che ha sulla schiena e sugli arti."
          ultra_moon: "Necrozma assume questa forma quando\nassorbe la potenza di Solgaleo. Nessuno può\narginare la sua incredibile ferocia."
        de:
          ultra_sun: "Necrozma nimmt diese Form an, wenn es das\nLicht von Solgaleo verschlingt. Es schlitzt\nGegner mit seinen vielen scharfen Krallen auf."
          ultra_moon: "Diese Form nimmt es an, wenn es die Kraft von\nSolgaleo verschlingt. Es wurde von seiner Wut\nvöllig übermannt und ist nicht zu bändigen."
        es:
          ultra_sun: "Forma que adopta tras alimentarse de la luz de\nSolgaleo. Se lanza sobre su oponente y lo\ndesgarra sin piedad."
          ultra_moon: "Forma que adopta Necrozma al absorber el\npoder de Solgaleo. Su propensión a la violencia\nlo convierte en una gran amenaza incontrolable."
        ko:
          ultra_sun: "솔가레오의 빛을 먹어치우는\n모습이다. 적에게 덤벼들어 등과\n사지를 발톱으로 상대를 베어 가른다."
          ultra_moon: "솔가레오의 파워를 흡수한\n네크로즈마의 모습. 굉장히\n난폭해서 손쓸 방도가 없다."
        zh_simp:
          ultra_sun: "不断吞食索尔迦雷欧的光的样子。\n会扑向敌人，用背上和四肢的爪子\n将对手劈开。"
          ultra_moon: "奈克洛兹玛不断吸取\n索尔迦雷欧的力量的样子。\n非常粗暴，令人无从应付。"
        zh_trad:
          ultra_sun: "不斷吞食著索爾迦雷歐的光。\n會撲向敵人，用背上和四肢的\n爪子將對手斬斷。"
          ultra_moon: "奈克洛茲瑪不斷吸取\n索爾迦雷歐力量的樣子。\n非常兇暴，令人無從應付。"
    necrozma_dawn_wings:
      form_id: 2
      names:
        jp_kana: あかつきのつばさ
        jp_kanji: あかつきのつばさ
        en: Dawn Wings
        fr: Ailes de l’Aurore
        it: Ali dell’Aurora
        de: Morgenschwingen
        es: Alas del Alba
        ko: 새벽의 날개
        zh_simp: 拂晓之翼
        zh_trad: 拂曉之翼
      base_stats:
        hp: 97
        attack: 113
        defense: 109
        special_attack: 157
        special_defense: 127
        speed: 77
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - psychic
        - ghost
      egg_groups:
        - undiscovered
      abilities:
        - prism_armor
      descriptions:
        jp_kana:
          ultra_sun: "ルナアーラに　もはや　いしは　ない。\nネクロズマに　しはいされ　すべての\nエネルギーを　ほうしゅつ　しつづける。"
          ultra_moon: "ルナアーラのひかりを　くらいつづける\nすがた。　きょだいな　ツメで　てきを\nつかむと　ちからまかせに　ひきちぎる。"
        jp_kanji:
          ultra_sun: "ルナアーラに　最早　意思は　ない。\nネクロズマに　支配され　すべての\nエネルギーを　放出　し続ける。"
          ultra_moon: "ルナアーラの光を　喰らい続ける\n姿。　巨大な　ツメで　敵を\nつかむと　力任せに　引きちぎる。"
        en:
          ultra_sun: "Lunala no longer has a will of its own. Now under\nthe control of Necrozma, it continuously expels\nall of its energy."
          ultra_moon: "This is its form while it’s devouring the light\nof Lunala. It grasps foes in its giant claws and\nrips them apart with brute force."
        fr:
          ultra_sun: "Lunala a perdu toute volonté propre.\nDésormais sous le contrôle de Necrozma,\nil se vide de son énergie en continu."
          ultra_moon: "La forme que Necrozma prend lorsqu’il absorbe\nla lumière de Lunala. Il attrape et déchiquette\nses adversaires à l’aide de ses longues griffes."
        it:
          ultra_sun: "In questa forma, Lunala è rimasto privo di\nvolontà. Necrozma controlla ogni suo movimento\ne lo svuota poco a poco di tutte le sue energie."
          ultra_moon: "Necrozma assume questa forma quando si nutre\ndella luce di Lunala. Afferra il nemico con i suoi\nenormi artigli e lo fa a pezzi con la sua potenza."
        de:
          ultra_sun: "In dieser Form unterliegt Lunala gänzlich\nNecrozmas Kontrolle, es hat keinen eigenen\nWillen mehr. Seine Energie fließt ungehindert aus."
          ultra_moon: "Necrozma nimmt diese Form an, wenn es das\nLicht von Lunala verschlingt. Es packt und\nzerreißt Gegner mit seinen gewaltigen Krallen."
        es:
          ultra_sun: "En esta forma, Lunala no goza de voluntad\npropia. Necrozma tiene control absoluto y\nabsorbe su energía poco a poco."
          ultra_moon: "Forma que adopta Necrozma al nutrirse de la luz\nde Lunala. Atrapa al enemigo con sus enormes\ngarras y usa la fuerza bruta para hacerlo trizas."
        ko:
          ultra_sun: "루나아라의 의식은 어느새 사라졌다.\n네크로즈마에게 지배되어\n모든 에너지를 방출하고 있다."
          ultra_moon: "루나아라의 빛을 먹어치운\n모습. 거대한 발톱으로 적을\n잡으면 있는 힘껏 찢어 버린다."
        zh_simp:
          ultra_sun: "露奈雅拉已经没有自我意识。\n它被奈克洛兹玛支配，\n不断释放出全部能量。"
          ultra_moon: "不断吞食露奈雅拉的光的样子。\n会用巨大的爪子抓住敌人，使劲撕开。"
        zh_trad:
          ultra_sun: "露奈雅拉已經沒有自我意識。\n在奈克洛茲瑪的支配之下，\n不斷釋放出全部的能量。"
          ultra_moon: "不斷吞噬露奈雅拉的光的樣子。\n會用巨大的爪子抓住敵人，\n然後用力將對手撕裂。"
    necrozma_ultra:
      form_id: 3
      names:
        jp_kana: ウルトラネクロズマ
        jp_kanji: ウルトラネクロズマ
        en: Ultra Necrozma
        fr: Ultra-Necrozma
        it: UltraNecrozma
        de: Ultra-Necrozma
        es: Ultra-Necrozma
        ko: 울트라네크로즈마
        zh_simp: 究极奈克洛兹玛
        zh_trad: 究極奈克洛茲瑪
      base_stats:
        hp: 97
        attack: 167
        defense: 97
        special_attack: 167
        special_defense: 97
        speed: 129
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 1
      types:
        - psychic
        - dragon
      egg_groups:
        - undiscovered
      abilities:
        - neuroforce
      descriptions:
        jp_kana:
          ultra_sun: "あっとうてきな　ひかりエネルギーを\nきゅうしゅうし　へんかした　すがた。\nぜんしんから　レーザーこうを　はなつ。"
          ultra_moon: "ぜんしんから　はなたれる　ひかりは\nせいぶつや　しぜんに　さようし\nさまざまな　えいきょうを　およぼす。"
        jp_kanji:
          ultra_sun: "圧倒的な　光エネルギーを\n吸収し　変化した　姿。\n全身から　レーザー光を　放つ。"
          ultra_moon: "全身から　放たれる　光は\n生物や　自然に　作用し\nさまざまな　影響を　およぼす。"
        en:
          ultra_sun: "This is its form when it has absorbed\noverwhelming light energy. It fires laser beams\nfrom all over its body."
          ultra_moon: "The light pouring out from all over its body\naffects living things and nature, impacting them\nin various ways."
        fr:
          ultra_sun: "Necrozma prend cette forme quand il a absorbé\nune quantité phénoménale d’énergie lumineuse.\nDes rayons laser émanent de tout son corps."
          ultra_moon: "La lumière libérée par son corps affecte\nla nature et les êtres vivants de bien\ndes manières."
        it:
          ultra_sun: "Necrozma assume questa forma dopo aver\nassorbito un’enorme quantità di energia\nluminosa. Spara raggi laser da tutto il corpo."
          ultra_moon: "Il contatto con la luce che sprigiona dal suo\ncorpo produce gli effetti più disparati."
        de:
          ultra_sun: "Der Verzehr gewaltiger Mengen an Lichtenergie\nbringt diese Form hervor. Es verschießt\nLaserstrahlen aus seinem ganzen Körper."
          ultra_moon: "Das Licht, das von seinem Körper ausgeht,\nkann verschiedene Auswirkungen auf Natur\nund Lebewesen haben."
        es:
          ultra_sun: "Esta forma es el resultado de haber absorbido\nuna gran cantidad de energía luminosa. Emite\nrayos láser por todo el cuerpo."
          ultra_moon: "La luz que emite por todo el cuerpo influye de\ndiversas formas en los seres vivos y el medio\nambiente."
        ko:
          ultra_sun: "압도적인 빛 에너지를\n흡수하여 변화한 모습이다.\n전신에서 레이저를 내뿜는다."
          ultra_moon: "전신에서 뿜어져 나오는 빛은\n생물이나 자연에 작용하여\n다양한 영향을 미친다."
        zh_simp:
          ultra_sun: "吸收压倒性的光能量后\n变化而成的样子。\n从全身发射出激光。"
          ultra_moon: "全身放出的光会对\n生物和自然发生作用，\n造成各种各样的影响。"
        zh_trad:
          ultra_sun: "吸收了壓倒性的光能量之後\n變化而成的樣子。\n能從全身發射雷射光。"
          ultra_moon: "全身放出的光會對\n生物和自然界產生作用，\n造成各式各樣的影響。"
magearna:
