          ultra_sun: "おどろかせることが　いきがい。\nくびの　あかいたまに　みみを　あてると\nなかから　ひめいが　きこえてくるぞ。"
          ultra_moon: "ひとが　なきさけぶ　こえを　まねて\nみんなを　おびえさせ　よろこぶ。\nきもが　すわった　あいては　にがて。"
        jp_kanji:
          ultra_sun: "驚かせることが　生きがい。\n首の　赤い玉に　耳を　あてると\n中から　悲鳴が　聞こえてくるぞ。"
          ultra_moon: "人が　泣き叫ぶ　声を　真似て\nみんなを　おびえさせ　喜ぶ。\n肝が　据わった　相手は　苦手。"
        en:
          ultra_sun: "What gives meaning to its life is surprising\nothers. If you set your ear against the red orbs\naround its neck, you can hear shrieking."
          ultra_moon: "What makes it happy is imitating the voices of\nweeping people and scaring everyone. It doesn’t\ndeal well with folks who aren’t easily frightened."
        fr:
          ultra_sun: "Effrayer les gens est sa raison d’être. Si l’on\npresse l’oreille contre les sphères rouges de\nson cou, on peut entendre des gémissements."
          ultra_moon: "Il adore faire peur aux humains en imitant\nleurs pleurs, et n’apprécie guère ceux qui\nne se laissent pas intimider."
        it:
          ultra_sun: "Terrorizzare gli altri è la sua ragione d’essere.\nAvvicinando l’orecchio alle sfere rosse che ha\nal collo, si sentono grida e gemiti."
          ultra_moon: "Si diverte a seminare il terrore imitando le grida\ne i lamenti degli esseri umani.\nNon ha vita facile con chi non si lascia intimidire."
        de:
          ultra_sun: "Andere zu erschrecken ist sein Lebenssinn.\nWenn man das Ohr auf die roten Kugeln an\nseinem Hals legt, kann man Hilfeschreie hören."
          ultra_moon: "Es genießt es, das Schluchzen eines Menschen\nnachzuahmen und andere damit zu erschrecken.\nWen das kaltlässt, den kann es nicht leiden."
        es:
          ultra_sun: "Vive para asustar a la gente. Al acercar la oreja\na las perlas rojas de su cuello, pueden oírse\nsollozos de angustia en su interior."
          ultra_moon: "Disfruta imitando llantos humanos para asustar\na la gente. Los valientes no le caen demasiado\nbien."
        ko:
          ultra_sun: "놀라게 하는 것이 삶의 낙이다.\n목의 빨간 구슬에 귀를 대면\n안에서 비명이 들려온다."
          ultra_moon: "사람이 울부짖는 소리를 흉내 내\n모두를 겁주고 기뻐한다.\n담력이 강한 상대는 좋아하지 않는다."
        zh_simp:
          ultra_sun: "吓唬别人是其活着的意义。\n如果把耳朵贴近它脖子上的红珠子，\n就能从中听到悲鸣声。"
          ultra_moon: "会通过模仿人哭叫的声音\n来吓唬大家并以此为乐。\n不擅长对付胆大的对手。"
        zh_trad:
          ultra_sun: "把嚇唬別人當成自己活著的意義。\n如果把耳朵貼近牠脖子上的紅珠子，\n就會聽見裡頭傳來哀嚎的聲音。"
          ultra_moon: "會藉由模仿人哭叫的聲音\n嚇唬大家來取樂。\n不擅長應付膽大的對手。"
