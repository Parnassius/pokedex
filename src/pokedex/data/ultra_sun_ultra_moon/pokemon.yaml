      descriptions:
        jp_kana:
          ultra_sun: "ぬけおちた　つばさを　かこうして\nつくる　ほうちょうは　いちりゅうの\nりょうりにんも　なっとくのきれあじ。"
          ultra_moon: "はがねの　よろいを　みに　まとう。\nおもそうに　みえるが　さいだい\n３００キロの　そくどで　とべるぞ。"
        jp_kanji:
          ultra_sun: "抜け落ちた　翼を　加工して\n作る　包丁は　一流の\n料理人も　納得の切れ味。"
          ultra_moon: "鋼の　鎧を　身に　まとう。\n重そうに　見えるが　最大\n３００キロの　速度で　飛べるぞ。"
        en:
          ultra_sun: "The wing feathers it sheds can be processed\nand made into knives whose sharpness is\nrecognized by the finest chefs."
          ultra_moon: "Its body is draped in steel armor. It looks heavy,\nbut it can fly at speeds of up to 185 miles\nan hour!"
        fr:
          ultra_sun: "Les couteaux fabriqués à partir des plumes\nde ce Pokémon sont appréciés des plus grands\nchefs cuisiniers pour leur tranchant acéré."
          ultra_moon: "Il peut paraître lourd, avec son armure d’acier,\nmais il est en fait capable de voler à une vitesse\nde 300 km/h."
        it:
          ultra_sun: "Le piume che perde vengono usate per\nfabbricare coltelli affilatissimi, particolarmente\napprezzati dai migliori cuochi."
          ultra_moon: "L’armatura d’acciaio di cui è rivestito lo fa\nsembrare pesante, ma nonostante questa può\nvolare a una velocità di 300 km/h."
        de:
          ultra_sun: "Die Federn, die ihm ausfallen, werden zu\nKüchenmessern verarbeitet, mit deren Schärfe\nauch erstklassige Köche zufrieden sind."
          ultra_moon: "Durch seinen stählernen Panzer sieht es zwar\nschwer aus, aber dennoch kann es bis zu\n300 km/h schnell fliegen."
        es:
          ultra_sun: "Los cuchillos fabricados con las plumas que se\nle caen son reconocidos entre los cocineros más\nprestigiosos por la gran calidad de sus filos."
          ultra_moon: "Su cuerpo está recubierto de una coraza\nmetálica que, por pesada que parezca, no le\nimpide volar a 300 km/h."
        ko:
          ultra_sun: "빠진 날개를 가공해서\n만드는 식칼은 일류 요리사도\n인정할 정도로 날카롭다."
          ultra_moon: "강철의 갑옷을 몸에 걸친다.\n무거워 보이지만 최고\n300km의 속도로 날 수 있다."
        zh_simp:
          ultra_sun: "用其脱落的翅膀加工制成的菜刀，\n锋利得足以让一流厨师都点头认可。"
          ultra_moon: "全身披着钢甲。\n虽然看上去很重，但最快能以\n每小时３００公里的速度飞行。"
        zh_trad:
          ultra_sun: "將牠脫落下來的翅膀\n加工製成的菜刀，鋒利程度\n足以讓一流廚師也點頭認可。"
          ultra_moon: "全身披著鋼鐵鎧甲。\n看起來很重，但牠能以\n最高３００公里的時速飛行。"
houndour:
  species_id: 228
