        jp_kanji: ふらふらスタイル
        en: Pa’u Style
        fr: Style Hula
        it: Stile Hula
        de: Hula-Stil
        es: Estilo Plácido
        ko: 훌라훌라스타일
        zh_simp: 呼拉呼拉风格
        zh_trad: 呼拉呼拉風格
      base_stats:
        hp: 75
