      types:
        - rock
        - dark
      egg_groups:
        - monster
      abilities:
        - sand_stream
      hidden_ability: unnerve
      descriptions:
        jp_kana:
          ultra_sun: "たたかう　あいてを　もとめて　やまを\nさまよう。　であっても　かくしたが\nあいてだと　むしして　さっていく。"
          ultra_moon: "すすむ　みちの　まえに　やまが\nあれば　くずし　いえが　あれば\nはかいする　うごく　さいがいポケモン。"
        jp_kanji:
          ultra_sun: "戦う　相手を　求めて　山を\nさ迷う。　出会っても　格下が\n相手だと　無視して　去っていく。"
          ultra_moon: "進む　道の　前に　山が\nあれば　崩し　家が　あれば\n破壊する　動く　災害ポケモン。"
        en:
          ultra_sun: "It wanders through the mountains seeking\nopponents to fight. If it finds an opponent that’s\nnot worthy, Tyranitar ignores it and wanders on."
          ultra_moon: "This Pokémon is a mobile disaster, leaving\nmountains crumbled and houses destroyed in\nits wake."
        fr:
          ultra_sun: "Il parcourt les montagnes à la recherche d’un\nadversaire. Si ce dernier n’est pas à la hauteur,\nil préfère l’ignorer et s’en aller."
          ultra_moon: "Aucun obstacle n’arrête ce Pokémon lorsqu’il\nse déplace : les montagnes, il les démolit ;\nles maisons, il les anéantit."
        it:
          ultra_sun: "Vaga tra i monti alla ricerca di avversari con\ncui lottare. Se però non li ritiene alla sua altezza,\nli ignora e se ne va."
          ultra_moon: "Provoca disastri non appena si muove.\nSe sul suo cammino incontra una montagna,\nla spiana, e se trova una casa la distrugge."
        de:
          ultra_sun: "Es durchstreift die Berge auf der Suche nach\nGegnern. Begegnet es einem, der ihm nicht\nebenbürtig ist, ignoriert es ihn und zieht weiter."
          ultra_moon: "Dieses Pokémon ist ein wandelndes Desaster.\nBerge, die ihm im Weg stehen, reißt es ein und\nHäuser macht es dem Erdboden gleich."
        es:
          ultra_sun: "Recorre las montañas en busca de rivales para\ncombatir. Si juzga que no están a su altura, los\nignora y pasa de largo."
          ultra_moon: "Nada puede parar a este Pokémon cuando se\nmueve: derriba montañas, arrasa edificios y\ndestroza todo lo que se le ponga por delante."
        ko:
          ultra_sun: "싸울 상대를 찾아 산을 떠돈다.\n만나도 격이 떨어지는\n상대라고 무시하고 떠나간다."
          ultra_moon: "앞길에 산이 있으면 무너뜨리고\n집이 있으면 파괴하는\n걸어다니는 재해 포켓몬이다."
        zh_simp:
          ultra_sun: "会在山中徘徊以寻求战斗对手。\n但如果遇到的是比自己弱小的对手，\n它就会视若无睹地离开。"
          ultra_moon: "在前进的道路上，\n它会遇山毁山，遇楼拆楼，\n是一种会移动的灾害型宝可梦。"
        zh_trad:
          ultra_sun: "會在山中徘徊尋找對手來戰鬥，\n但如果遇到的是比自己弱小的對手，\n牠就會視若無睹地離開。"
          ultra_moon: "這種寶可夢是會移動的災害。\n在牠前進的道路上，不管是\n山還是房屋都會被破壞殆盡。"
    tyranitar_mega:
      form_id: 1
      names:
        jp_kana: メガバンギラス
        jp_kanji: メガバンギラス
        en: Mega Tyranitar
        fr: Méga-Tyranocif
        it: MegaTyranitar
        de: Mega-Despotar
        es: Mega-Tyranitar
        ko: 메가마기라스
        zh_simp: 超级班基拉斯
        zh_trad: 超級班基拉斯
      base_stats:
        hp: 100
        attack: 164
        defense: 150
        special_attack: 95
        special_defense: 120
        speed: 71
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
        - dark
      egg_groups:
        - monster
      abilities:
        - sand_stream
      descriptions:
        jp_kana:
          ultra_sun: "すさまじいパワーを　ちゅうにゅうされ\nせなかが　さけて　しまった。　ただただ\nはかいする　ほんのうのみで　うごく。"
          ultra_moon: "メガシンカの　えいきょうで　さらに\nきょうぼうに　なった。　トレーナーの\nめいれいも　きこえているか　ふめい。"
        jp_kanji:
          ultra_sun: "凄まじい　パワーを　注入され\n背中が　裂けて　しまった。　ただただ\n破壊する　本能のみで　動く。"
          ultra_moon: "メガシンカの　影響で　更に\n凶暴に　なった。　トレーナーの\n命令も　聞こえているか　不明。"
        en:
          ultra_sun: "Due to the colossal power poured into it, this\nPokémon’s back split right open. Its destructive\ninstincts are the only thing keeping it moving."
          ultra_moon: "The effects of Mega Evolution make it more\nferocious than ever. It’s unclear whether\nit can even hear its Trainer’s orders."
        fr:
          ultra_sun: "Sous l’influence de la Méga-Évolution, son dos\ns’est fissuré et il n’écoute dorénavant plus que\nses pulsions destructrices."
          ultra_moon: "Il est encore plus violent en méga-évoluant,\nà tel point que l’on se demande s’il entend\ntoujours les ordres de son Dresseur."
        it:
          ultra_sun: "Sulla schiena gli si è aperto uno squarcio per\nl’enorme energia liberata dalla megaevoluzione.\nAgisce spinto solo da un istinto di distruzione."
          ultra_moon: "La megaevoluzione l’ha reso ancora più feroce\ndel solito ed è difficile capire se stia davvero\nseguendo le indicazioni dell’Allenatore."
        de:
          ultra_sun: "Die gewaltige aufgenommene Energie hat seine\nRückenpartie zum Bersten gebracht. Es wird von\nblinder Zerstörungswut getrieben."
          ultra_moon: "Die Mega-Entwicklung macht es noch rasender,\nals es ohnehin schon ist. Es ist ungewiss, ob es\ndie Befehle seines Trainers hören kann."
        es:
          ultra_sun: "La tremenda fuerza de la megaevolución ha\nhecho que se le desgarre la espalda. Se mueve\nguiado tan solo por su instinto de destrucción."
          ultra_moon: "La megaevolución lo vuelve aún más violento que\nde costumbre. Es difícil saber si oye las órdenes\nde su Entrenador."
        ko:
          ultra_sun: "굉장한 파워를 주입하여\n등이 갈라져 버렸다. 그저\n파괴하는 본능만 남아 움직인다."
          ultra_moon: "메가진화의 영향으로 더욱\n난폭해졌다. 트레이너의\n명령도 들리는지 불명확하다."
        zh_simp:
          ultra_sun: "后背由于体内注入了惊人的\n能量而裂开了。只剩下破坏的\n本能在驱使着它行动。"
          ultra_moon: "因超级进化的影响，它变得更加粗暴了。\n不清楚它是否还会听从训练家的命令。"
        zh_trad:
          ultra_sun: "體內注入了驚人的能量，\n使得牠的背部裂開，只剩下\n破壞的本能驅使著牠行動。"
          ultra_moon: "在超級進化的影響之下變得\n更加兇暴，就連牠聽不聽得見\n訓練家的命令都不清楚。"
