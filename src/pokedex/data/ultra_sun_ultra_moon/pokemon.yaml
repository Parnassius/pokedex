          ultra_sun: "シッポで　いろんなことを　していたら\nてさきは　ぶきように　なってしまった。\nたかい　きのうえに　すを　つくる。"
          ultra_moon: "きの　うえから　えものが　いないか\nさがす。　こうぶつの　アマカジを\nみると　こうふんして　とびかかるぞ。"
        jp_kanji:
          ultra_sun: "シッポで　いろんなことを　していたら\n手先は　不器用に　なってしまった。\n高い　木の上に　巣を　作る。"
          ultra_moon: "木の　上から　獲物が　いないか\n探す。　好物の　アマカジを\n見ると　興奮して　飛びかかるぞ。"
        en:
          ultra_sun: "As it did more and more with its tail, its hands\nbecame clumsy. It makes its nest high in\nthe treetops."
          ultra_moon: "It searches for prey from the tops of trees.\nWhen it spots its favorite food, Bounsweet,\nAipom gets excited and pounces."
        fr:
          ultra_sun: "À force d’utiliser sa queue à tort et à travers,\nelle est devenue plus habile que ses mains.\nIl l’utilise pour faire son nid en haut des arbres."
          ultra_moon: "Il guette ses proies depuis la cime des arbres.\nQuand il aperçoit un Croquine, son mets préféré,\nil se jette dessus."
        it:
          ultra_sun: "Poiché utilizza la coda per fare qualsiasi cosa,\nle sue vere mani sono diventate molto maldestre.\nFa il nido sugli alberi più alti."
          ultra_moon: "Individua le prede dalla cima degli alberi.\nAppena avvista un Bounsweet, di cui è ghiotto,\ngli balza addosso preso dall’entusiasmo."
        de:
          ultra_sun: "Der übermäßige Einsatz seines Schweifes hatte\ndie Zurückbildung seiner Hände zur Folge.\nEs lebt in den Kronen hoher Bäume."
          ultra_moon: "Es sitzt in Baumwipfeln und hält Ausschau nach\nBeute. Sieht es ein Frubberl, sein Leibgericht,\nstürzt es begeistert auf es herab."
        es:
          ultra_sun: "De tanto utilizar la cola, esta se ha vuelto más\nhábil que sus dedos. Construye sus nidos en\nlas copas de los árboles."
          ultra_moon: "Sube a las copas de los árboles para buscar\npresas. Si encuentra un Bounsweet, su manjar\npredilecto, se alboroza y se abalanza sobre él."
        ko:
          ultra_sun: "꼬리로 이것저것 하는 사이에\n손이 둔해지고 말았다.\n높은 나무 위에 둥지를 만든다."
          ultra_moon: "나무 위에서 먹이를 찾는다.\n좋아하는 달콤아를 발견하면\n흥분해서 덤벼든다."
        zh_simp:
          ultra_sun: "习惯用尾巴做各种事情后，\n手就变得不怎么灵活了。\n会在很高的树上筑巢。"
          ultra_moon: "会从树上寻找猎物。\n发现喜食的甜竹竹后，\n就会兴奋地飞扑过去。"
        zh_trad:
          ultra_sun: "習慣了用尾巴做各種事之後，\n雙手就變得不怎麼靈活了。\n會在很高的樹上築巢。"
          ultra_moon: "會從樹上尋找獵物。\n只要發現自己愛吃的甜竹竹，\n就會興奮地飛撲過去。"
