    zh_simp: 超音蝠
    zh_trad: 超音蝠
  forms:
    zubat:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 30
        special_defense: 40
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - poison
        - flying
      egg_groups:
        - flying
      abilities:
        - inner_focus
      hidden_ability: infiltrator
      descriptions:
        jp_kana:
          ultra_sun: "めだまが　ないので　めは　みえない。\nくちから　だす　ちょうおんぱで\nまわりの　ようすを　うかがっている。"
          ultra_moon: "にっこうを　あびると　ヤケドするほど\nひふが　うすい。　さむくなると　むれて\nからだを　よせあい　あたためあうのだ。"
        jp_kanji:
          ultra_sun: "目玉が　ないので　目は　見えない。\n口から　出す　超音波で\n周りの　様子を　うかがっている。"
          ultra_moon: "日光を　浴びると　ヤケドするほど\n皮膚が　薄い。　寒くなると　群れて\n身体を　寄せあい　暖めあうのだ。"
        en:
          ultra_sun: "It has no eyeballs, so it can’t see. It checks its\nsurroundings via the ultrasonic waves it emits\nfrom its mouth."
          ultra_moon: "Their skin is so thin that they’ll be burned if\nsunlight hits them. When it gets cold out, they\ngather together to warm one another’s bodies."
        fr:
          ultra_sun: "Dépourvu d’yeux, il se repère dans l’espace\ngrâce aux ultrasons qu’il émet avec sa bouche."
          ultra_moon: "Sa peau est si fine que la lumière du soleil\nlui cause des brûlures. Lorsqu’il fait froid, ses\ncongénères et lui se serrent pour se réchauffer."
        it:
          ultra_sun: "Non ha occhi e non può vedere, ma è in\ngrado di percepire l’ambiente circostante\nemettendo ultrasuoni dalla bocca."
          ultra_moon: "Ha una pelle così sottile che la luce solare\ngli provoca delle bruciature. Quando fa freddo\nsi stringe ai suoi simili per scaldarsi."
        de:
          ultra_sun: "Da es keine Augäpfel hat, ist es blind. Mithilfe\nvon Ultraschallwellen, die es aus dem Mund\naussendet, erkundet es seine Umgebung."
          ultra_moon: "Seine dünne Haut erleidet bei Sonnenlicht\nVerbrennungen. Bei Kälte schmiegt es sich\nan seine Artgenossen, um sich zu wärmen."
        es:
          ultra_sun: "Como carece de ojos y no puede ver, emite\nultrasonidos que le permiten escrutar el entorno\ny orientarse."
          ultra_moon: "Su piel es tan fina que, si se expone al sol,\npuede sufrir quemaduras. Cuando hace frío,\nse junta con los suyos para entrar en calor."
        ko:
          ultra_sun: "눈이 없어서 보지 못한다.\n입으로 초음파를 발산하여\n주변의 상황을 파악한다."
          ultra_moon: "햇빛을 받으면 화상을 입을 정도로\n피부가 얇다. 추워지면 무리 지어\n서로 몸을 기대서 체온을 나눈다."
        zh_simp:
          ultra_sun: "因为没有眼珠，所以无法视物。\n会从口中发出超音波\n来探测周围的情况。"
          ultra_moon: "皮肤薄到只要被阳光照射到就会晒伤。\n天气变冷后，就会抱团取暖。"
        zh_trad:
          ultra_sun: "因為沒有眼珠所以看不見東西。\n會從口中發出超音波\n來探測周圍的狀況。"
          ultra_moon: "皮膚薄到只要被陽光照射到\n就會曬傷。當天氣變冷時，\n會成群靠在一起互相取暖。"
