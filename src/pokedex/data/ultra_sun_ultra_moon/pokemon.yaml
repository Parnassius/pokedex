elgyem:
  species_id: 605
  names:
    jp_kana: リグレー
    jp_kanji: リグレー
    en: Elgyem
    fr: Lewsor
    it: Elgyem
    de: Pygraulon
    es: Elgyem
    ko: 리그레
    zh_simp: 小灰怪
    zh_trad: 小灰怪
  forms:
    elgyem:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 55
        special_attack: 85
        special_defense: 55
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - telepathy
        - synchronize
      hidden_ability: analytic
      descriptions:
        jp_kana:
          ultra_sun: "すさまじい　サイコパワーを　あやつる。\nうちゅうじん　もくげきじょうほうの\nおおくは　リグレーの　みまちがいだ。"
          ultra_moon: "およそ　５０ねんまえ　ちじょうに\nおちた　ＵＦＯから　あらわれたと\nいわれる　なぞの　おおい　ポケモン。"
        jp_kanji:
          ultra_sun: "凄まじい　サイコパワーを　操る。\n宇宙人　目撃情報の　多くは\nリグレーの　見間違いだ。"
          ultra_moon: "およそ　５０年前　地上に\n落ちた　ＵＦＯから　現れたと\nいわれる　謎の　多い　ポケモン。"
        en:
          ultra_sun: "It controls tremendous psychic power. Most\nreports of alien sightings are actually just\npeople mistaking Elgyem for an alien."
          ultra_moon: "This Pokémon is shrouded in mystery. It’s said\nto have appeared from a UFO that fell from the\nsky about 50 years ago."
        fr:
          ultra_sun: "Il possède de redoutables pouvoirs psychiques.\nLa plupart des signalements d’extraterrestres\ncorrespondent à des Lewsor qui se promènent."
          ultra_moon: "Ce Pokémon est nimbé de mystère. On raconte\nqu’il serait apparu il y a 50 ans, après la chute\nd’un OVNI."
        it:
          ultra_sun: "I suoi poteri psichici sono straordinari. Quando\nqualcuno dichiara di aver visto un alieno, nella\nmaggior parte dei casi si tratta di un Elgyem."
          ultra_moon: "È un Pokémon dai molti misteri.\nSi dice che provenga da un UFO schiantatosi\n50 anni fa."
        de:
          ultra_sun: "Es besitzt unfassbare Psycho-Kräfte. Etliche\nMeldungen über Sichtungen von Außerirdischen\nentpuppten sich als Verwechslungen mit ihm."
          ultra_moon: "Ein geheimnisumwobenes Pokémon, von dem\nes heißt, es sei aus einem vor 50 Jahren\nabgestürzten UFO erschienen."
        es:
          ultra_sun: "Es capaz de usar un formidable poder psíquico.\nMuchos creen haber avistado extraterrestres\ncuando, en realidad, lo que vieron eran Elgyem."
          ultra_moon: "Pokémon envuelto en un halo de misterio cuya\naparición, 50 años atrás, coincide curiosamente\ncon la caída de un ovni."
        ko:
          ultra_sun: "무시무시한 사이코 파워를 조종한다.\n우주인 목격 정보의 대부분은\n리그레를 보고 착각한 것이다."
          ultra_moon: "약 50년 전 지상에 떨어진\nUFO에서 나타났다고 전해지는\n수수께끼로 둘러싸인 포켓몬."
        zh_simp:
          ultra_sun: "操纵着非常惊人的精神力量。\n大多数目击外星人的信息都是\n错把小灰怪看成外星人了。"
          ultra_moon: "据说，是在大约５０年前\n从掉落到地面的ＵＦＯ里出现的。\n是充满未解之谜的宝可梦。"
        zh_trad:
          ultra_sun: "操縱著驚人的精神力量。\n大部分目擊到外星人的消息\n都是把小灰怪錯看成外星人了。"
          ultra_moon: "據說是大約５０年前從\n墜落到地上的ＵＦＯ中出現。\n是充滿未解之謎的寶可夢。"
beheeyem:
  species_id: 606
  names:
    jp_kana: オーベム
    jp_kanji: オーベム
    en: Beheeyem
    fr: Neitram
    it: Beheeyem
    de: Megalon
    es: Beheeyem
