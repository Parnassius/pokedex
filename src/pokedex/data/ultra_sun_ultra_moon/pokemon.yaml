      descriptions:
        jp_kana:
          ultra_sun: "たいないでは　けつえきの　かわりに\nじりょくが　めぐっている。　ちょうしが\nわるいときは　じしゃくを　あげよう。"
          ultra_moon: "おこらせると　あばれるだけでなく\nつよい　じりょくを　はなつので\nきかいの　たぐいは　こわれてしまう。"
        jp_kanji:
          ultra_sun: "体内では　血液の　代わりに\n磁力が　巡っている。　調子が\n悪いときは　磁石を　あげよう。"
          ultra_moon: "怒らせると　暴れるだけでなく\n強い　磁力を　放つので\n機械の　類は　壊れてしまう。"
        en:
          ultra_sun: "Instead of blood, magnetism flows through its\nbody. When it’s feeling bad, try giving it\na magnet."
          ultra_moon: "If you anger it, it will do more than rampage. It\nwill also burst out strong magnetism, causing\nnearby machines to break."
        fr:
          ultra_sun: "Son corps n’est pas traversé par du sang, mais\npar des champs magnétiques. S’il est fatigué,\nil suffit de lui donner un aimant à grignoter."
          ultra_moon: "Quand on l’énerve, il entre dans une colère noire\net déchaîne un puissant champ magnétique\nqui peut endommager les machines alentour."
        it:
          ultra_sun: "Nel corpo di Beldum invece del sangue scorre\nuna forza magnetica. Quando non si sente bene,\nbasta dargli una calamita."
          ultra_moon: "Quando si arrabbia diventa violento ed emette\nuna potente forza magnetica che danneggia\nle macchine."
        de:
          ultra_sun: "Statt Blut fließt in seinem Körper magnetische\nEnergie. Wenn es sich nicht gut fühlt, kann man\nihm einen Magnet geben."
          ultra_moon: "Wenn man es wütend macht, tobt es nicht nur,\nsondern sendet auch eine starke magnetische\nKraft aus, die manche Maschinen kaputtmacht."
        es:
          ultra_sun: "En vez de torrente sanguíneo, el cuerpo de este\nPokémon cuenta con corrientes magnéticas. Es\nrecomendable darle un imán si se encuentra mal."
          ultra_moon: "Cuando se le provoca, no solo monta en cólera,\nsino que emite también un potente magnetismo\nque inutiliza ciertos tipos de máquinas."
        ko:
          ultra_sun: "체내에는 혈액을 대신하여\n자력이 돌고 있다. 몸 상태가\n좋지 않을 때는 자석을 주자."
          ultra_moon: "화가 나면 날뛸 뿐만 아니라\n강한 자력도 발산하기 때문에\n기계 종류는 고장 나 버린다."
        zh_simp:
          ultra_sun: "体内循环着的不是血液而是磁力。\n身体状况不好时，就给它磁铁吧。"
          ultra_moon: "如果把它惹恼，不仅会大闹一番，\n还会放出强大的磁力，\n所以会把机械类的东西都破坏掉。"
        zh_trad:
          ultra_sun: "在體內循環的不是血液而是磁力。\n當牠身體狀況不好的時候\n就拿磁鐵給牠吧。"
          ultra_moon: "如果惹牠生氣，牠不但會大鬧，\n還會放出強大的磁力，\n讓機械類的東西壞掉。"
metang:
  species_id: 375
  names:
