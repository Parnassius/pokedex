      types:
        - ghost
        - flying
      egg_groups:
        - flying
      abilities:
        - dancer
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          ultra_sun: "みやびな　ダンスで　てきの　こころを\nみりょうして　ゆだんした　ところに\nしをまねく　のろいを　あびせかける。"
          ultra_moon: "むらさきのミツを　すった　オドリドリ。\nしなやかで　あでやかな　おどりを\nさんこうにする　ダンサーも　いる。"
        jp_kanji:
          ultra_sun: "雅な　ダンスで　敵の　心を\n魅了して　油断した　ところに\n死を招く　呪いを　浴びせかける。"
          ultra_moon: "むらさきのミツを　吸った　オドリドリ。\nしなやかで　艶やかな　踊りを\n参考にする　ダンサーも　いる。"
        en:
          ultra_sun: "It charms its opponents with its refined dancing.\nWhen they let their guard down, it places a\ncurse on them that will bring on their demise."
          ultra_moon: "This Oricorio has sipped purple nectar. Some\ndancers use its graceful, elegant dancing\nas inspiration."
        fr:
          ultra_sun: "Il fait fondre le cœur de ses ennemis avec une\ndanse gracieuse, et profite de leur inattention\npour les frapper d’une malédiction mortelle."
          ultra_moon: "Un Plumeline ayant bu du Nectar Mauve.\nSes mouvements souples et élégants sont\nsource d’inspiration pour plus d’un danseur."
        it:
          ultra_sun: "Ammalia il nemico con una danza raffinata e\napprofitta della sua distrazione per colpirlo con\nuna maledizione fatale."
          ultra_moon: "Un Oricorio che si è nutrito di Nettare viola.\nAlcuni ballerini traggono ispirazione dalla sua\ndanza leggiadra e ammaliante."
        de:
          ultra_sun: "Sein anmutiger Tanz betört den Gegner. Diese\nUnachtsamkeit nutzt es, um fatale Flüche auf\nihn herabregnen zu lassen."
          ultra_moon: "Ein Choreogel, das purpurnen Nektar geschlürft\nhat. Viele Tänzer lassen sich von seinen grazilen\nBewegungen inspirieren."
        es:
          ultra_sun: "Con su refinada danza seduce al enemigo.\nEn cuanto este baja la guardia, lo convierte\nen presa de una maldición mortífera."
          ultra_moon: "Forma que toma Oricorio al libar Néctar Violeta.\nHay bailarines que se inspiran en la fluidez y\nhermosura de su danza."
        ko:
          ultra_sun: "단아한 댄스로 적의 마음을\n매료시켜 방심한 틈을 타\n죽음을 부르는 주술을 퍼붓는다."
          ultra_moon: "보라꿀을 빨아들인 춤추새.\n유연하고 우아한 춤을\n참고하는 댄서도 있다."
        zh_simp:
          ultra_sun: "用优美的舞蹈迷惑敌人的心，\n趁其麻痹大意时释放出招致死亡的诅咒。"
          ultra_moon: "吸食了兰紫色花蜜的花舞鸟。\n也有舞者会参考它\n柔美而艳丽的舞蹈。"
        zh_trad:
          ultra_sun: "會用優美的舞蹈讓敵人沉醉，\n然後趁敵人疏忽大意的時候\n施加足以致死的詛咒。"
          ultra_moon: "吸食了蘭紫色花蜜的花舞鳥。\n也有些舞者會去參考牠那\n柔美而豔麗的舞蹈。"
cutiefly:
  species_id: 742
  names:
    jp_kana: アブリー
    jp_kanji: アブリー
    en: Cutiefly
    fr: Bombydou
    it: Cutiefly
