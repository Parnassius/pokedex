      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - fur_coat
        - technician
      hidden_ability: rattled
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          ultra_sun: "あいらしい　かおに　にあわず\nよわった　えものを　しとめないで\nいたぶる　ざんにんな　せいしつ。"
          ultra_moon: "まるいかおは　とみの　しょうちょう。\nより　ふくよかで　おおきな　かおの\nペルシアンが　うつくしいと　される。"
        jp_kanji:
          ultra_sun: "愛らしい　顔に　似合わず\n弱った　獲物を　仕留めないで\nいたぶる　残忍な　性質。"
          ultra_moon: "丸い顔は　富の　象徴。\nより　ふくよかで　大きな　顔の\nペルシアンが　美しいと　される。"
        en:
          ultra_sun: "In contrast to its lovely face, it’s so brutal that it\ntortures its weakened prey rather than finishing\nthem off."
          ultra_moon: "Its round face is a symbol of wealth. Persian\nthat have bigger, plumper faces are considered\nmore beautiful."
        fr:
          ultra_sun: "Ne vous fiez pas à son air aimable. C’est un\nPokémon cruel qui aime jouer avec ses proies\nblessées, sans daigner les achever."
          ultra_moon: "Sa tête ronde est un symbole de bonne fortune.\nLa rondeur et la grosseur de celle-ci sont des\ncritères de beauté chez les Persian."
        it:
          ultra_sun: "Nonostante il muso grazioso ha un’indole\ncrudele, tanto che si diverte a giocare con le\nprede indebolite senza dar loro il colpo di grazia."
          ultra_moon: "Il suo viso tondo è simbolo di ricchezza e più\nè grosso e paffuto, più bello viene considerato\nil Pokémon."
        de:
          ultra_sun: "Sein liebliches Gesicht steht im Kontrast zu der\ngrausamen Vorliebe dafür, seine geschwächte\nBeute ausgiebig zu quälen, bevor es sie erlegt."
          ultra_moon: "Sein rundes Gesicht wird als Symbol für\nWohlstand gedeutet. Alola-Snobilikat gelten als\numso reizender, je praller und größer dieses ist."
        es:
          ultra_sun: "La dulzura de su cara está en contradicción\ncon su cruel costumbre de torturar a las presas\ndebilitadas sin darles el golpe de gracia."
          ultra_moon: "La redondez de su cara es símbolo de fortuna.\nSe los considera más hermosos cuanto más\ngrande y rechoncho es su rostro."
        ko:
          ultra_sun: "사랑스러운 얼굴에 안 맞게\n약한 먹이를 죽이지 않고\n괴롭히는 잔인한 성질을 가졌다."
          ultra_moon: "둥근 얼굴은 부의 상징이다.\n더 포동포동하고 큰 얼굴을 가진\n페르시온이 아름답다고 여겨진다."
        zh_simp:
          ultra_sun: "不同于其可爱的脸蛋，\n它有着玩弄衰弱的猎物\n而不杀死它们的残忍性格。"
          ultra_moon: "圆脸是富贵的象征。\n体型丰满，大盘脸的\n猫老大会被认为是美丽的。"
        zh_trad:
          ultra_sun: "雖然長相十分可愛，\n但卻有著故意不殺死衰弱的獵物，\n好讓自己能夠恣意玩弄的殘忍性格。"
          ultra_moon: "圓圓的臉是富貴的象徵。\n人們認為有著豐滿體態\n和大臉的貓老大才美。"
psyduck:
  species_id: 54
  names:
    jp_kana: コダック
    jp_kanji: コダック
    en: Psyduck
    fr: Psykokwak
    it: Psyduck
    de: Enton
    es: Psyduck
    ko: 고라파덕
    zh_simp: 可达鸭
    zh_trad: 可達鴨
  forms:
    psyduck:
      form_id: 0
      base_stats:
        hp: 50
        attack: 52
        defense: 48
        special_attack: 65
        special_defense: 50
        speed: 55
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - water
      egg_groups:
        - water_1
        - field
      abilities:
        - damp
        - cloud_nine
      hidden_ability: swift_swim
      descriptions:
        jp_kana:
          ultra_sun: "ねんりきを　つかうと　ずつうが\nするので　ふだんは　なるべく　なにも\nしないで　ボーっと　すごしているよ。"
          ultra_moon: "ずつうが　はっせいしている　あいだ\nのうさいぼうが　ふだんの　１０ばい\nかつどう　していることが　わかった。"
        jp_kanji:
          ultra_sun: "念力を　使うと　頭痛が\nするので　普段は　なるべく　何も\nしないで　ボーっと　過ごしているよ。"
          ultra_moon: "頭痛が　発生している　間\n脳細胞が　普段の　１０倍\n活動　していることが　わかった。"
        en:
          ultra_sun: "Using psychokinesis gives it a headache, so it\nnormally passes the time spacing out and doing\nas little as possible."
          ultra_moon: "It has been found that its brain cells are\n10 times more active when Psyduck is\nexperiencing a headache."
        fr:
          ultra_sun: "Utiliser ses pouvoirs psychiques lui donne\nde terribles migraines, aussi préfère-t-il passer\ntout son temps immobile à ne rien faire."
          ultra_moon: "Des scientifiques ont découvert que lorsqu’il\nsouffre de migraines, ses neurones fonctionnent\ndix fois plus vite qu’en temps normal."
        it:
          ultra_sun: "Usare i suoi poteri psicocinetici gli causa dei\ngran mal di testa, perciò passa il tempo\ncercando di fare e pensare il meno possibile."
          ultra_moon: "Gli scienziati hanno scoperto che quando ha\nmal di testa la sua attività cerebrale aumenta\ndi dieci volte rispetto al solito."
        de:
          ultra_sun: "Wenn es seine Psycho-Kräfte einsetzt, bekommt\nes Kopfschmerzen. Deshalb steht es lieber\nuntätig und geistesabwesend herum."
          ultra_moon: "Es wurde herausgefunden, dass die Aktivität\nseiner Hirnzellen bei Kopfschmerzen auf das\nZehnfache ansteigt."
        es:
          ultra_sun: "El uso de sus poderes psíquicos le provoca un\ngran dolor de cabeza, por lo que prefiere tener\nla mente en blanco y no hacer nada en absoluto."
          ultra_moon: "Estudios recientes han desvelado que, cuando\nsufre un episodio de cefalea, su actividad\nneuronal es diez veces superior a lo normal."
        ko:
          ultra_sun: "염동력을 사용하면 두통이 생겨서\n평소에는 아무것도 하지 않고\n가능한 멍하니 지낸다."
          ultra_moon: "두통이 발생하는 동안\n뇌세포가 평소의 10배나\n활동한다는 사실이 밝혀졌다."
        zh_simp:
          ultra_sun: "使用念力会头痛，\n所以平时会尽量不做任何事，\n就在发呆中度过哦。"
          ultra_moon: "据了解，头痛发生时，\n它的脑细胞会比平时活跃１０倍。"
        zh_trad:
          ultra_sun: "一使出念力就會頭痛，\n所以平常盡量什麼事都不做，\n整天不停地發呆。"
          ultra_moon: "據了解，當頭痛發生時，\n牠的腦細胞活動\n會比平時活躍１０倍。"
golduck:
  species_id: 55
  names:
    jp_kana: ゴルダック
    jp_kanji: ゴルダック
    en: Golduck
    fr: Akwakwak
    it: Golduck
    de: Entoron
    es: Golduck
