      descriptions:
        jp_kana:
          ultra_sun: "ひに　２０リットルの　ちちを　だす。\nぼくそうの　しつが　よい　とちほど\nだす　ミルクは　コクがあり　うまい。"
          ultra_moon: "ミルクは　おいしく　えいようまんてん。\nただし　のみすぎると　おなかが\nくだることも　あるので　ちゅういだ。"
        jp_kanji:
          ultra_sun: "日に　２０リットルの　乳を　出す。\n牧草の　質が　良い　土地ほど\n出す　ミルクは　コクがあり　美味い。"
          ultra_moon: "ミルクは　おいしく　栄養満点。\nただし　飲みすぎると　お腹が\n下ることも　あるので　注意だ。"
        en:
          ultra_sun: "It produces over five gallons of milk a day. The\nhigher the quality of the pastures it lives in,\nthe richer and tastier its milk becomes."
          ultra_moon: "Its milk is delicious and chock-full of nutrients.\nHowever, if you drink too much, it could make\nyour stomach hurt, so be careful."
        fr:
          ultra_sun: "Les 20 litres de lait qu’il produit chaque jour\ngagneront en saveur et en caractère s’il vit\ndans un pâturage de bonne qualité."
          ultra_moon: "Son lait est délicieux et très nutritif, mais il ne\nfaut pas en abuser pour éviter d’éventuels\npetits problèmes de digestion."
        it:
          ultra_sun: "Produce 20 litri di latte al giorno. Più alta è la\nqualità del pascolo, più gustoso sarà il latte."
          ultra_moon: "Il suo latte è buono e ricco di sostanze nutritive,\nma se se ne beve troppo, si rischia il mal di\npancia."
        de:
          ultra_sun: "Es gibt täglich 20 l Milch. Je besser die Qualität\ndes Grases ist, desto schmackhafter ist sie."
          ultra_moon: "Seine Milch ist lecker und nahrhaft. Doch wenn\nman zu viel davon trinkt, kann man Durchfall\nbekommen."
        es:
          ultra_sun: "Produce 20 litros de leche al día, que es más\nsabrosa cuanto mejor sea el pasto."
          ultra_moon: "La leche de Miltank es deliciosa y nutritiva,\npero, consumida en exceso, puede causar\nretortijones."
        ko:
          ultra_sun: "하루에 20리터의 젖을 짠다.\n목초의 질이 좋은 산지일수록\n밀크는 진해서 맛있다."
          ultra_moon: "우유는 맛있고 영양 만점이다.\n단 너무 마시면 배가\n아플 수도 있으므로 주의하자."
        zh_simp:
          ultra_sun: "每天能产出２０升的牛奶。\n越是能长出优质牧草的土地，\n它所产出的牛奶也就越香浓可口。"
          ultra_moon: "牛奶很可口又富含营养。\n但要小心，如果喝多了，\n有时就会拉肚子。"
        zh_trad:
          ultra_sun: "每天能生產２０公升的鮮奶。\n當地的牧草越是優質，\n牠所生產的鮮奶就越香濃美味。"
          ultra_moon: "牛奶既美味又營養豐富，\n但要小心，如果喝太多了，\n有時可能會拉肚子。"
blissey:
