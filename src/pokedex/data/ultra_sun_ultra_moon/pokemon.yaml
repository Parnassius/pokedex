    jp_kanji: オニドリル
    en: Fearow
    fr: Rapasdepic
    it: Fearow
    de: Ibitak
    es: Fearow
    ko: 깨비드릴조
    zh_simp: 大嘴雀
    zh_trad: 大嘴雀
