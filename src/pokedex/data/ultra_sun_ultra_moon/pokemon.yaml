kangaskhan:
  species_id: 115
  names:
    jp_kana: ガルーラ
    jp_kanji: ガルーラ
    en: Kangaskhan
    fr: Kangourex
    it: Kangaskhan
    de: Kangama
    es: Kangaskhan
    ko: 캥카
    zh_simp: 袋兽
    zh_trad: 袋獸
  forms:
    kangaskhan:
      form_id: 0
      base_stats:
        hp: 105
        attack: 95
        defense: 80
        special_attack: 40
        special_defense: 80
        speed: 90
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - monster
      abilities:
        - early_bird
        - scrappy
      hidden_ability: inner_focus
      descriptions:
        jp_kana:
          ultra_sun: "おなかの　ふくろに　わがこを　いれて\nまもる。　こどもを　きずつけたものは\nぜったいに　ゆるさず　たたきのめす。"
          ultra_moon: "ふくろから　ぬけだして　あそんでいる\nこどもには　ちかづいては　いけない。\nどこかで　ははおやが　みまもっている。"
        jp_kanji:
          ultra_sun: "お腹の　袋に　我が子を　入れて\n守る。　子どもを　傷つけた者は\n絶対に　許さず　叩きのめす。"
          ultra_moon: "袋から　抜け出して　遊んでいる\n子どもには　近付いては　いけない。\nどこかで　母親が　見守っている。"
        en:
          ultra_sun: "Kangaskhan protects its child by keeping it in\nits pouch. It has zero forgiveness for those\nwho harm its child and will beat them down."
          ultra_moon: "You shouldn’t get close to the child when it’s\nplaying outside its mother’s pouch. Its mother is\nalways nearby watching over it."
        fr:
          ultra_sun: "Kangourex protège son petit en le mettant\ndans sa poche, et se montre sans pitié envers\nquiconque ose lui faire du mal."
          ultra_moon: "Ne vous approchez surtout pas d’un bébé\nKangourex sorti de sa poche pour jouer !\nSa mère le surveille sûrement d’un peu plus loin."
        it:
          ultra_sun: "Protegge il proprio cucciolo tenendolo nel\nmarsupio che ha sulla pancia e attacca\nfuriosamente chiunque osi ferirlo."
          ultra_moon: "Non bisogna avvicinarsi a un cucciolo che gioca\nfuori dal marsupio: la madre è sempre nei\nparaggi e vigila attenta su di lui."
        de:
          ultra_sun: "Sein Junges beschützt es in seinem Beutel.\nWer dieses verwundet, den erwarten Kangamas\nGroll und eine rücksichtslose Tracht Prügel."
          ultra_moon: "Wer ein Kangama-Junges sieht, das zum Spielen\nden Beutel verlassen hat, sollte sich ihm nicht\nnähern. Seine Mutter behält es stets im Auge."
        es:
          ultra_sun: "Mete a la cría en su marsupio para protegerla. Si\nalguien hace daño a su retoño, monta en cólera\ny ataca al agresor sin miramientos."
          ultra_moon: "No es prudente acercarse a un retoño que esté\njugando fuera de su bolsa, pues la madre nunca\nanda lejos."
        ko:
          ultra_sun: "배의 주머니에 자신의 새끼를 넣어\n지킨다. 새끼에게 해를 끼치는 자는\n절대 용서하지 않고 때려눕힌다."
          ultra_moon: "주머니를 빠져나와 놀고 있는\n새끼에게는 다가가선 안 된다.\n어딘가에서 어미가 지켜보고 있다."
        zh_simp:
          ultra_sun: "会把自己的孩子放入腹袋里保护起来。\n对于胆敢伤害自己孩子的家伙，\n会毫不留情地予以痛击。"
          ultra_moon: "不能接近从袋里溜出来玩耍的孩子。\n因为它的母亲就在某处守护着它。"
        zh_trad:
          ultra_sun: "把自己的孩子放進腹部的\n袋子裡保護，會毫不留情地\n狠狠教訓傷害自己孩子的傢伙。"
          ultra_moon: "絕對不要靠近從袋獸腹中\n溜出來玩耍的孩子，\n因為母親正在某處守護著牠。"
    kangaskhan_mega:
      form_id: 1
      names:
        jp_kana: メガガルーラ
        jp_kanji: メガガルーラ
        en: Mega Kangaskhan
        fr: Méga-Kangourex
        it: MegaKangaskhan
        de: Mega-Kangama
        es: Mega-Kangaskhan
        ko: 메가캥카
        zh_simp: 超级袋兽
        zh_trad: 超級袋獸
      base_stats:
        hp: 105
        attack: 125
        defense: 100
        special_attack: 60
        special_defense: 100
        speed: 100
