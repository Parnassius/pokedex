      hidden_ability: hustle
      descriptions:
        jp_kana:
          ultra_sun: "うしろあしの　ちいさい　みずかきで\nうみを　およいで　しまを　わたり\nてきから　にげていた　という。"
          ultra_moon: "ヒゲは　バランスを　とる　たいせつな\nきかん。　どんなに　なかよくなっても\nさわられると　おこって　かみつく。"
        jp_kanji:
          ultra_sun: "後ろ足の　小さい　水かきで\n海を　泳いで　島を　渡り\n敵から　逃げていた　という。"
          ultra_moon: "ヒゲは　バランスを　とる　大切な\n器官。　どんなに　仲良くなっても\n触られると　怒って　噛みつく。"
        en:
          ultra_sun: "People say that it fled from its enemies by\nusing its small webbed hind feet to swim\nfrom island to island in Alola."
          ultra_moon: "Its whiskers are essential for maintaining its\nbalance. No matter how friendly you are, it will\nget angry and bite you if you touch its whiskers."
        fr:
          ultra_sun: "Les petites palmes de ses pattes postérieures\nlui permettraient de se rendre d’île en île\nà la nage afin d’échapper à ses prédateurs."
          ultra_moon: "Il se sert de ses moustaches pour garder\nl’équilibre. Que le Rattatac soit apprivoisé\nou non, ne le touchez pas ou il vous mordrait !"
        it:
          ultra_sun: "Si dice che sia sfuggito ai nemici nuotando da\nun’isola all’altra grazie alle minuscole membrane\ntra le dita delle zampe posteriori."
          ultra_moon: "Usa i baffi per mantenersi in equilibrio.\nSe qualcuno li sfiora, si arrabbia e morde anche\nquelli a cui è molto affezionato."
        de:
          ultra_sun: "Auf der Flucht vor seinen Feinden nutzt es die\nSchwimmhäute an seinen Hinterläufen, um von\nInsel zu Insel zu schwimmen."
          ultra_moon: "Mit seinen Barthaaren hält es die Balance.\nBerührt man sie, wird es wütend und beißt zu,\negal, wie zutraulich es auch sein mag."
        es:
          ultra_sun: "Las pequeñas membranas que tiene en las\npatas traseras le permiten nadar entre las islas\nde Alola y escapar así de sus depredadores."
          ultra_moon: "Mantiene el equilibrio gracias a sus bigotes.\nAunque le coja confianza a alguien, uno puede\nllevarse un mordisco si intenta tocarlo."
        ko:
          ultra_sun: "뒷발의 작의 물갈퀴로\n바다를 헤엄쳐 섬을 건너\n적을 피해 도망쳤다고 한다."
          ultra_moon: "수염은 밸런스를 잡기 위한 중요한\n기관이다. 아무리 친해져도\n만지면 화를 내며 문다."
        zh_simp:
          ultra_sun: "据说会用后脚上小小的蹼\n泅水渡海，穿越岛屿\n来躲避敌人的追击。"
          ultra_moon: "胡须是用来保持平衡的重要器官。\n即使感情再好，只要摸了它的胡须，\n它就会发火咬你。"
        zh_trad:
          ultra_sun: "據說牠為了躲避敵人，\n會用後腳的小蹼在海中游泳，\n渡海逃往別的島嶼。"
          ultra_moon: "鬍鬚是用來保持平衡的重要器官。\n就算感情再好，如果摸了牠的鬍鬚，\n牠都會生氣地咬過來。"
