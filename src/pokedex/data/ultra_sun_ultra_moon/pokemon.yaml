        - cute_charm
        - technician
      hidden_ability: skill_link
      descriptions:
        jp_kana:
          ultra_sun: "けっぺきしょうで　すこしの　よごれも\nゆるせない。　シッポを　モップにして\nてっていてきに　よごれを　おとす。"
          ultra_moon: "じぶんの　からだや　すの　そうじで\nよごれた　シッポは　きれいな\nわきみずで　１にち　かけて　あらう。"
        jp_kanji:
          ultra_sun: "潔癖症で　少しの　汚れも\n許せない。　シッポを　モップにして\n徹底的に　汚れを　落とす。"
          ultra_moon: "自分の　身体や　巣の　掃除で\n汚れた　シッポは　綺麗な\n湧き水で　１日　かけて　洗う。"
        en:
          ultra_sun: "A clean freak that will not allow even the\nslightest mess, it uses its tail like a mop to\nthoroughly clean any and all filth."
          ultra_moon: "When its tail has gotten dirty from self-cleaning\nor from cleaning its nest, Minccino spends a\nwhole day washing its tail in clean spring water."
        fr:
          ultra_sun: "Ce maniaque de la propreté ne supporte pas\nla moindre saleté. Il utilise sa queue comme\nune serpillière pour tout nettoyer."
          ultra_moon: "Il lui faut bien une journée entière pour laver\nsa queue après s’en être servi pour faire le\nménage dans son nid et épousseter son corps."
        it:
          ultra_sun: "È un maniaco della pulizia e non sopporta\nneanche la più piccola traccia di sporco. Usa la\ncoda come una scopa per pulire ogni superficie."
          ultra_moon: "Passa giornate intere a lavare la sua coda con\nacqua pura di sorgente dopo averla usata per\nspazzolare la tana e il proprio corpo."
        de:
          ultra_sun: "Es hat einen Putzfimmel und duldet selbst das\nkleinste Staubkorn nicht. Seinen Schweif benutzt\nes als Mopp, mit dem es alles picobello putzt."
          ultra_moon: "Wird sein Schweif beim Putzen seines Baus oder\nKörpers schmutzig, verbringt es einen ganzen\nTag damit, ihn mit klarem Wasser zu reinigen."
        es:
          ultra_sun: "Este Pokémon es extremadamente pulcro y no\npuede ver ni una mota de suciedad o la limpiará\nusando su cola como si fuera una mopa."
          ultra_moon: "Tras usar la cola para limpiar su madriguera o\nsu propio cuerpo, se pasa un día entero\nlavándosela con agua de manantial."
        ko:
          ultra_sun: "결벽증이 있어서 조금의 더러움도\n용서하지 않는다. 꼬리를 걸레 삼아\n꼼꼼히 더러운 것을 닦아 낸다."
          ultra_moon: "자신의 몸이나 보금자리를 청소하느라\n더러워진 꼬리는 깨끗한 샘물로\n하루에 걸쳐서 씻는다."
        zh_simp:
          ultra_sun: "因为有洁癖，所以不能容忍\n一丁点儿的脏污。会把尾巴\n当做拖把彻底地清除脏污。"
          ultra_moon: "因为清洁自己的身体和巢穴\n而弄脏的尾巴，会花上１天的时间\n用涌出的干净泉水清洗。"
        zh_trad:
          ultra_sun: "因為有潔癖，無法容忍絲毫髒污。\n會把尾巴當成拖把，\n把髒污的地方徹底擦乾淨。"
          ultra_moon: "當尾巴因為打掃自己的身體\n和巢穴而變髒時，會花一整天時間\n用乾淨的湧泉水把尾巴洗乾淨。"
