cranidos:
  species_id: 408
  names:
    jp_kana: ズガイドス
    jp_kanji: ズガイドス
    en: Cranidos
    fr: Kranidos
    it: Cranidos
    de: Koknodon
    es: Cranidos
    ko: 두개도스
    zh_simp: 头盖龙
    zh_trad: 頭蓋龍
  forms:
    cranidos:
      form_id: 0
      base_stats:
        hp: 67
        attack: 125
        defense: 40
        special_attack: 30
        special_defense: 30
        speed: 58
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          ultra_sun: "たいこの　ポケモン。　かたくて\nじょうぶな　ずがいこつを　もつが\nあたまは　そうとうに　わるかった。"
          ultra_moon: "かたい　ずがいこつが　とくちょう。\nずつきで　じゅもくを　へしおって\nみのった　きのみを　くっていた。"
        jp_kanji:
          ultra_sun: "太古の　ポケモン。　硬くて\n丈夫な　頭蓋骨を　持つが\n頭は　相当に　悪かった。"
          ultra_moon: "硬い　頭蓋骨が　特徴。\n頭突きで　樹木を　へし折って\n実った　きのみを　食っていた。"
        en:
          ultra_sun: "A primeval Pokémon, it possesses a hard and\nsturdy skull, lacking any intelligence within."
          ultra_moon: "Its hard skull is its distinguishing feature. It\nsnapped trees by headbutting them, and then\nit fed on their ripe berries."
        fr:
          ultra_sun: "Un Pokémon préhistorique doté d’un crâne très\nsolide, mais d’un cerveau très peu performant."
          ultra_moon: "Son crâne extrêmement solide est sa principale\ncaractéristique. Il s’en servait pour faire tomber\ndes arbres les Baies dont il se nourrissait."
        it:
          ultra_sun: "Pokémon che esisteva in epoca antica, dotato di\nun cranio duro e resistente ma dall’intelligenza\nnon altrettanto sviluppata."
          ultra_moon: "Era caratterizzato da un cranio durissimo,\ngrazie al quale spezzava gli alberi a testate\nper poi cibarsi delle bacche mature."
        de:
          ultra_sun: "Dieses urzeitliche Pokémon war trotz seines\nharten, robusten Schädels nicht sehr schlau."
          ultra_moon: "Seine Besonderheit ist der harte Schädel. Mit\nseinem Kopfstoß fällte es Bäume, um deren\nFrüchte fressen zu können."
        es:
          ultra_sun: "Este Pokémon arcaico cuenta con un cráneo\nsólido y resistente, pero su cerebro no está a la\npar."
          ultra_moon: "Se caracteriza por la dureza de su cráneo.\nDerribaba árboles a cabezazos para comerse\nlas bayas maduras que colgaban de ellos."
        ko:
          ultra_sun: "태곳적 포켓몬. 딱딱하고\n튼튼한 두개골을 가졌지만\n머리는 정말 나빴다."
          ultra_moon: "단단한 두개골이 특징이다.\n박치기로 나무를 부러뜨려\n잘 익은 나무열매를 먹었다."
        zh_simp:
          ultra_sun: "太古时代的宝可梦。\n拥有坚硬而结实的头盖骨，\n但是脑子相当不好使。"
          ultra_moon: "坚硬的头盖骨是其特征。\n会用头锤撞断树木，\n吃树上结的树果。"
        zh_trad:
          ultra_sun: "太古時代的寶可夢。\n擁有堅硬而結實的頭蓋骨，\n但是頭腦相當不靈光。"
          ultra_moon: "特徵是堅硬的頭蓋骨。\n會用頭錘撞斷樹木，\n吃樹上長的樹果。"
rampardos:
  species_id: 409
  names:
    jp_kana: ラムパルド
    jp_kanji: ラムパルド
    en: Rampardos
    fr: Charkos
    it: Rampardos
    de: Rameidon
    es: Rampardos
    ko: 램펄드
    zh_simp: 战槌龙
    zh_trad: 戰槌龍
  forms:
    rampardos:
      form_id: 0
      base_stats:
        hp: 97
        attack: 165
        defense: 60
        special_attack: 65
        special_defense: 50
        speed: 58
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - rock
      egg_groups:
        - monster
      abilities:
        - mold_breaker
      hidden_ability: sheer_force
      descriptions:
        jp_kana:
          ultra_sun: "おおむかしの　ひとは　かせきを\nほりだし　こうてつ　よりも　かたい\nずがいこつで　かぶとを　つくっていた。"
          ultra_moon: "ずつきが　とくいな　こだいのポケモン。\nほんとうに　のうみそが　ちいさいので\nおろかで　ほろんだというせつも　ある。"
        jp_kanji:
          ultra_sun: "大昔の　人は　化石を\n掘り出し　鋼鉄　よりも　硬い\n頭蓋骨で　兜を　作っていた。"
          ultra_moon: "頭突きが　得意な　古代のポケモン。\n本当に　脳みそが　小さいので\n愚かで　滅んだという説も　ある。"
        en:
          ultra_sun: "In ancient times, people would dig up fossils of\nthis Pokémon and use its skull, which is harder\nthan steel, to make helmets."
          ultra_moon: "This ancient Pokémon used headbutts skillfully.\nIts brain was really small, so some theories\nsuggest that its stupidity led to its extinction."
        fr:
          ultra_sun: "Il y a bien longtemps, les hommes fabriquaient\ndes casques plus solides que l’acier à partir de\ncrânes de Charkos fossilisés."
          ultra_moon: "Pokémon préhistorique célèbre pour ses coups\nde tête puissants et son petit cerveau, son\nextinction serait due à son extrême bêtise."
        it:
          ultra_sun: "In tempi antichi gli uomini si servivano dei fossili\ndel cranio di questi Pokémon, più duro\ndell’acciaio, per fabbricare elmi."
          ultra_moon: "Questo antico Pokémon eccelle nel dare testate.\nSecondo una teoria, si è estinto perché troppo\nottuso. Il suo cervello è infatti molto piccolo."
        de:
          ultra_sun: "Vor langer Zeit wurden die Fossilien dieses\nPokémon ausgegraben und aus den stahlharten\nSchädeln Helme hergestellt."
          ultra_moon: "Dieses auf Kopfstöße spezialisierte urzeitliche\nPokémon soll einer Theorie zufolge wegen seines\nkleinen Hirns aus Dummheit ausgestorben sein."
        es:
          ultra_sun: "Los hombres de antaño que encontraban restos\nfosilizados de Rampardos usaban su cráneo,\nmás duro que el metal, para fabricar cascos."
          ultra_moon: "Pokémon prehistórico especializado en dar\ncabezazos. Una teoría atribuye su extinción a\nsu cerebro pequeño y a su poca inteligencia."
        ko:
          ultra_sun: "먼 옛날 사람은 화석을 발굴하여\n강철보다 딱딱한 두개골로\n투구를 만들었다."
          ultra_moon: "박치기가 특기인 고대 포켓몬이다.\n뇌가 정말 작기 때문에\n멍청해서 멸종했다는 설도 있다."
        zh_simp:
          ultra_sun: "过去的人们曾在挖出化石后，\n用比钢铁还硬的头盖骨做成头盔。"
          ultra_moon: "擅长头锤的古代宝可梦。\n因为大脑真的很小，\n所以也有说法它是因愚笨而灭亡的。"
        zh_trad:
          ultra_sun: "古時候人們會挖出牠的化石，\n用比鋼鐵還要堅硬的\n頭蓋骨製作頭盔。"
          ultra_moon: "擅長頭錘的古代寶可夢。\n因為大腦真的很小，所以也有說法\n認為牠是因為太笨而滅亡的。"
