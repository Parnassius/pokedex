        speed: 0
      types:
        - electric
        - flying
      egg_groups:
        - flying
      abilities:
        - dancer
      held_items:
        rare: honey
      descriptions:
        jp_kana:
          ultra_sun: "ようきな　ダンスで　てきの　こころを\nもりあげて　ゆだんした　ところに\nでんげきを　あびせ　かんでんさせる。"
          ultra_moon: "やまぶきのミツを　すった　オドリドリ。\nげんきの　ない　ひとを　みかけると\nダンスで　はげまそうと　してくれるよ。"
        jp_kanji:
          ultra_sun: "陽気な　ダンスで　敵の　心を\n盛り上げて　油断した　ところに\n電撃を　浴びせ　感電させる。"
          ultra_moon: "やまぶきのミツを　吸った　オドリドリ。\n元気の　ない　人を　見かけると\nダンスで　励まそうと　してくれるよ。"
        en:
          ultra_sun: "It lifts its opponents’ spirits with its cheerful\ndance moves. When they let their guard down,\nit electrocutes them with a jolt."
          ultra_moon: "This Oricorio has drunk bright yellow nectar.\nWhen it sees someone looking glum, it will try to\ncheer them up with a dance."
        fr:
          ultra_sun: "Il enchante ses ennemis avec une danse joyeuse\net survoltée, et profite de leur inattention pour\nles électrocuter."
          ultra_moon: "Un Plumeline ayant bu du Nectar Jaune.\nQuand il aperçoit quelqu’un qui a une baisse\nde tension, il danse pour lui remonter le moral."
        it:
          ultra_sun: "Fa entusiasmare il nemico con una danza vivace\ne approfitta della sua distrazione per colpirlo\ncon una scarica elettrica."
          ultra_moon: "Un Oricorio che si è nutrito di Nettare giallo.\nSe vede qualcuno giù di morale, cerca di fargli\ntornare il sorriso con la sua danza."
        de:
          ultra_sun: "Sein heiterer Tanz verleitet den Gegner zur\nUnachtsamkeit, was es dazu nutzt, um diesem\neinen elektrischen Schlag zu verpassen."
          ultra_moon: "Ein Choreogel, das gelben Nektar geschlürft hat.\nWenn jemand bedrückt wirkt, versucht es\ndiesen mit seinem fröhlichen Tanz aufzumuntern."
        es:
          ultra_sun: "Con su alegre y viva danza anima al enemigo.\nEn cuanto este baja la guardia, le suelta una\ndescarga eléctrica."
          ultra_moon: "Forma que toma Oricorio al libar Néctar Amarillo.\nSi ve a alguien con la moral baja, intenta animarlo\ncon su baile."
        ko:
          ultra_sun: "쾌활한 댄스로 적의 마음을\n들뜨게 해서 방심한 틈을 타\n전격을 쏘아 감전시킨다."
          ultra_moon: "진노랑꿀을 빨아들인 춤추새.\n기운이 없는 사람을 발견하면\n댄스로 격려해 준다."
        zh_simp:
          ultra_sun: "用欢乐的舞蹈振奋敌人的心，\n趁其麻痹大意时发出电击让其触电。"
          ultra_moon: "吸食了金黄色花蜜的花舞鸟。\n如果发现没有精神的人，\n就会想用舞蹈给予鼓励哦。"
        zh_trad:
          ultra_sun: "會用歡樂的舞蹈讓敵人開心，\n然後趁敵人疏忽大意的時候\n發出電擊讓對手觸電。"
          ultra_moon: "吸食了金黃色花蜜的花舞鳥。\n只要看見沒有精神的人，\n就會試著用舞蹈來給予鼓勵。"
    oricorio_pau_style:
