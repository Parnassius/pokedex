litleo:
  species_id: 667
  names:
    jp_kana: シシコ
    jp_kanji: シシコ
    en: Litleo
    fr: Hélionceau
    it: Litleo
    de: Leufeo
    es: Litleo
    ko: 레오꼬
    zh_simp: 小狮狮
    zh_trad: 小獅獅
  forms:
    litleo:
      form_id: 0
      base_stats:
        hp: 62
        attack: 50
        defense: 58
        special_attack: 73
        special_defense: 54
        speed: 72
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - fire
        - normal
      egg_groups:
        - field
      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          ultra_sun: "おさないころは　なかまと　むれている。\nじぶんで　えものを　かるようになると\nむれから　おいだされ　ひとりだちする。"
          ultra_moon: "けっきさかんで　こうきしんおうせい。\nおこったり　たたかいが　はじまると\nみじかい　たてがみは　あつくなる。"
        jp_kanji:
          ultra_sun: "幼い頃は　仲間と　群れている。\n自分で　獲物を　狩るようになると\n群れから　追い出され　独り立ちする。"
          ultra_moon: "血気盛んで　好奇心旺盛。\n怒ったり　戦いが　始まると\n短い　たてがみは　熱くなる。"
        en:
          ultra_sun: "When they’re young, they live with a pride. Once\nthey’re able to hunt prey on their own, they’re\nkicked out and have to make their own way."
          ultra_moon: "This hot-blooded Pokémon is filled with\ncuriosity. When it gets angry or starts\nfighting, its short mane gets hot."
        fr:
          ultra_sun: "Il est élevé avec ses congénères au sein\nde la troupe, mais dès qu’il peut chasser seul,\nil doit partir et vivre par ses propres moyens."
          ultra_moon: "Il déborde d’énergie et de curiosité. Quand\nil se fâche ou qu’il s’apprête à se battre,\nsa courte crinière s’échauffe."
        it:
          ultra_sun: "Da piccolo vive in gruppo con i suoi simili, ma\nappena impara a catturare da solo le sue prede\nviene allontanato e diventa indipendente."
          ultra_moon: "Ha una spiccata curiosità ed è pieno di energie.\nQuando si arrabbia o si appresta a lottare,\nla sua corta criniera si scalda."
        de:
          ultra_sun: "Bis es seine Beute selbst fangen kann, bewegt\nes sich in Rudeln. Danach wird es verstoßen und\nmuss auf eigenen Pfoten stehen."
          ultra_moon: "Ein sehr aktives und neugieriges Pokémon.\nBei Kampfbeginn und wenn es wütend ist,\nwird seine Mähne heiß."
        es:
          ultra_sun: "Mientras es solo una cría vive con el resto de la\nmanada, pero en cuanto aprende a cazar se\nsepara del grupo y se independiza."
          ultra_moon: "Este enérgico Pokémon es de naturaleza curiosa\ne inquieta y, tanto al comienzo de un combate\ncomo cuando se enoja, su crin prende fuego."
        ko:
          ultra_sun: "어릴 때는 동료와 무리를 이룬다.\n스스로 먹이를 사냥할 수 있게 되면\n무리에서 쫓겨나 독립한다."
          ultra_moon: "혈기가 왕성하고 호기심도 왕성하다.\n화가 나거나 싸움이 시작되면\n짧은 갈기가 뜨거워진다."
        zh_simp:
          ultra_sun: "小时候会与伙伴们群居生活。\n一旦自己能捕猎后，\n就会被赶出群体独立生活。"
          ultra_moon: "血气方刚且好奇心旺盛。\n如果生气或是开始战斗，\n短短的鬃毛就会变热。"
        zh_trad:
          ultra_sun: "小時候會和夥伴們群居在一起，\n當成長到能自己捕捉獵物之後，\n就會被趕出群體獨立生活。"
          ultra_moon: "血氣方剛且好奇心旺盛。\n當牠生氣或是開始戰鬥時，\n短短的鬃毛就會變熱。"
pyroar:
  species_id: 668
  names:
    jp_kana: カエンジシ
    jp_kanji: カエンジシ
    en: Pyroar
    fr: Némélios
    it: Pyroar
    de: Pyroleo
    es: Pyroar
    ko: 화염레오
    zh_simp: 火炎狮
    zh_trad: 火炎獅
  forms:
    pyroar:
      form_id: 0
      base_stats:
        hp: 86
        attack: 68
        defense: 72
        special_attack: 109
        special_defense: 66
        speed: 106
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - fire
        - normal
      egg_groups:
        - field
      abilities:
        - rivalry
        - unnerve
      hidden_ability: moxie
      descriptions:
        jp_kana:
          ultra_sun: "オスは　ふだん　だらだら　しているが\nきょうてきが　おそってくると　わがみを\nかえりみず　なかまを　まもるぞ。"
          ultra_moon: "せっし　６０００どの　いきを　はくが\nえものには　つかわない。　にくは\nなまの　ほうが　このみ　だから。"
        jp_kanji:
          ultra_sun: "オスは　普段　だらだら　しているが\n強敵が　襲ってくると　わが身を\nかえりみず　仲間を　守るぞ。"
          ultra_moon: "摂氏　６０００度の　息を　吐くが\n獲物には　使わない。　肉は\n生のほうが　好み　だから。"
        en:
          ultra_sun: "The males are usually lazy, but when attacked\nby a strong foe, a male will protect its friends\nwith no regard for its own safety."
          ultra_moon: "The temperature of its breath is over 10,000\ndegrees Fahrenheit, but Pyroar doesn’t use it on\nits prey. This Pokémon prefers to eat raw meat."
        fr:
          ultra_sun: "Le mâle a tendance à se prélasser à longueur\nde journée. Si un ennemi surgit, en revanche,\nil défend ses congénères au péril de sa vie."
          ultra_moon: "Son souffle enflammé atteint les 6 000 °C,\nmais il ne l’utilise jamais contre ses proies.\nIl préfère en effet la viande crue."
        it:
          ultra_sun: "Di solito il maschio passa le giornate nell’ozio,\nma se compare un nemico temibile è pronto a\nrischiare la vita per proteggere i compagni."
          ultra_moon: "Con il suo soffio, infiamma l’aria a una\ntemperatura di 6.000 °C, ma evita di farlo con\nle prede perché preferisce la carne cruda."
        de:
          ultra_sun: "Männliche Exemplare faulenzen die meiste Zeit.\nWird ihr Rudel von starken Gegnern angegriffen,\nverteidigen sie dieses jedoch mit ihrem Leben."
          ultra_moon: "Es kann 6 000 °C heiße Atemluft ausstoßen,\ndie es jedoch nicht bei der Jagd verwendet.\nSeine Beute verspeist es nämlich lieber roh."
        es:
          ultra_sun: "Por lo general, el macho suele ser un holgazán,\npero si aparece un enemigo poderoso, no duda\nen plantarle cara para proteger a los suyos."
          ultra_moon: "Su aliento alcanza temperaturas de 6000 ºC,\naunque no lo emplea contra sus presas, ya que\nprefiere la carne más bien cruda."
        ko:
          ultra_sun: "수컷은 평소에 빈둥거리지만,\n강적이 덤벼들면 자신을\n돌보지 않고 동료를 지킨다."
          ultra_moon: "섭씨 6000도의 숨결을 내뱉지만\n먹이에는 사용하지 않는다.\n고기는 날것을 좋아하기 때문이다."
        zh_simp:
          ultra_sun: "雄性平时总是拖拖拉拉的，\n但如果有强敌来袭，\n就会不顾自身，保护伙伴。"
          ultra_moon: "会吐出摄氏６０００度的气息，\n但不会用于猎物。\n因为更喜欢吃生的肉。"
        zh_trad:
          ultra_sun: "雄性平常十分懶散，\n但當有強敵來襲的時候，\n會奮不顧身地保護夥伴。"
          ultra_moon: "能吐出攝氏６０００度的氣息，\n但不會用在獵物身上，\n因為牠比較喜歡吃生肉。"
