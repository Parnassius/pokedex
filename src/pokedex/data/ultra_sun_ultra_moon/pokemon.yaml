        jp_kanji: メガゲンガー
        en: Mega Gengar
        fr: Méga-Ectoplasma
        it: MegaGengar
        de: Mega-Gengar
        es: Mega-Gengar
        ko: 메가팬텀
        zh_simp: 超级耿鬼
        zh_trad: 超級耿鬼
      base_stats:
        hp: 60
        attack: 65
        defense: 80
        special_attack: 170
        special_defense: 95
        speed: 130
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          ultra_sun: "すべての　ものの　いのちを　ねらう。\nあるじで　ある　トレーナーにさえ\nのろいを　かけようと　ねらっているぞ。"
          ultra_moon: "メガシンカに　よって　いじげんへの\nアクセスが　かのうに。　ぜんしんが\nあやしい　パワーに　みちみちている。"
        jp_kanji:
          ultra_sun: "すべての　ものの　命を　狙う。\n主で　ある　トレーナーにさえ\n呪いを　かけようと　狙っているぞ。"
          ultra_moon: "メガシンカに　よって　異次元への\nアクセスが　可能に。　全身が\nあやしい　パワーに　満ち満ちている。"
        en:
          ultra_sun: "It tries to take the lives of anyone and everyone.\nIt will even try to curse the Trainer who is\nits master!"
          ultra_moon: "Mega Evolution has made it possible for Gengar\nto access other dimensions. Its entire body is\nbrimming with strange power."
        fr:
          ultra_sun: "Ce Pokémon en a vraiment après la terre\nentière. Il essaie même de maudire son propre\nDresseur !"
          ultra_moon: "Grâce à la Méga-Évolution, il a accès à une autre\ndimension. Son corps déborde de puissance\nocculte."
        it:
          ultra_sun: "Vuole impossessarsi dello spirito di qualsiasi\nessere vivente. Tenta di scagliare maledizioni\npersino contro il suo Allenatore."
          ultra_moon: "Grazie alla megaevoluzione ha ottenuto\nl’accesso a un’altra dimensione. Il suo corpo\nè pervaso da un sinistro potere."
        de:
          ultra_sun: "Gengar hat es auf das Leben aller Kreaturen\nabgesehen. Es versucht selbst seinen eigenen\nTrainer mit einem Fluch zu belegen."
          ultra_moon: "Durch die Energie der Mega-Entwicklung kann es\nin eine andere Dimension abtauchen. Sein ganzer\nKörper quillt von einer seltsamen Kraft über."
        es:
          ultra_sun: "Ansía poner fin a todos los seres vivos y hasta\nintenta maldecir a su propio Entrenador."
          ultra_moon: "La megaevolución le ha hecho capaz de acceder\na otras dimensiones. Su cuerpo rebosa un poder\ninquietante."
        ko:
          ultra_sun: "모든 생명을 노린다.\n주인인 트레이너에게도\n저주를 걸려고 한다."
          ultra_moon: "메가진화에 의해 다른 차원으로\n접근할 수 있게 되었다. 전신이\n이상한 파워로 넘치고 있다."
        zh_simp:
          ultra_sun: "会夺取所有东西的生命。\n即便是作为主人的训练家，\n也是它想要施咒的目标。"
          ultra_moon: "因为超级进化，\n它变得可以连接异次元。\n全身充满了神奇的力量。"
        zh_trad:
          ultra_sun: "會奪取所有東西的生命。\n即使是身為牠主人的訓練家，\n也是牠試圖詛咒的對象。"
          ultra_moon: "因為超級進化，牠獲得了\n前往異次元的能力。\n全身充滿了奇異的力量。"
