          ultra_sun: "はねは　ひを　とおさず　じょうぶ。\nむかしの　しょうぼうしの　ふくは\nファイアローの　はねで　できていた。"
          ultra_moon: "とりポケモンが　おもな　えもの。\nきゅうせっきんからの　ちからづよい\nキックで　じめんに　たたきおとす。"
        jp_kanji:
          ultra_sun: "羽は　火を　通さず　丈夫。\n昔の　消防士の　服は\nファイアローの　羽で　できていた。"
          ultra_moon: "とりポケモンが　主な　獲物。\n急接近からの　力強い\nキックで　地面に　叩き落す。"
        en:
          ultra_sun: "Its tough wings don’t allow fire to pass through\nthem. A long time ago, firefighters’ outfits were\nmade from Talonflame wings."
          ultra_moon: "Bird Pokémon make up most of its diet.\nIt approaches at high speeds and smacks them\ndown to the ground with its powerful kick."
        fr:
          ultra_sun: "Son plumage résistant est ignifugé.\nJadis, la combinaison portée par les pompiers\nétait faite de plumes de Flambusard."
          ultra_moon: "La plupart de ses proies sont des Pokémon\noiseaux. Il surgit sans prévenir et propulse\nsa victime au sol d’un puissant coup de patte."
        it:
          ultra_sun: "Le sue ali sono robuste e ignifughe.\nIn passato le divise dei pompieri venivano\nfabbricate con le sue piume."
          ultra_moon: "Caccia soprattutto Pokémon alati. Si avvicina\nrapido alla preda e l’abbatte con un calcio\npotentissimo, facendola precipitare al suolo."
        de:
          ultra_sun: "Sein Gefieder ist robust und feuerfest. Früher\nfertigte man Feuerwehranzüge deshalb aus\nFiaro-Federn."
          ultra_moon: "Fiaro ernährt sich vor allem von Vogel-Pokémon.\nEs nähert sich überfallartig seiner Beute und\nbefördert sie mit einem kräftigen Tritt zu Boden."
        es:
          ultra_sun: "Sus alas son resistentes al fuego, por lo que se\nsolían usar sus plumas para confeccionar trajes\nde bombero."
          ultra_moon: "Su presa favorita son los Pokémon pájaro, a los\ncuales se acerca a velocidades vertiginosas y\nderriba con la temible potencia de sus patas."
        ko:
          ultra_sun: "날개는 불이 붙지 않고 튼튼하다.\n옛날에는 소방관들의 옷을\n파이어로의 날개로 만들었다."
          ultra_moon: "새포켓몬이 주된 먹이다.\n갑자기 접근한 뒤 강력한\n킥으로 땅에 떨어뜨린다."
        zh_simp:
          ultra_sun: "羽毛很结实，连火都烧不穿。\n过去的消防员服就是用\n烈箭鹰的羽毛做成的。"
          ultra_moon: "鸟宝可梦是它的主要猎物。\n用迅速接近后的强力踢\n将对方打落到地面。"
        zh_trad:
          ultra_sun: "羽毛很結實而且能夠防火。\n在過去消防隊員的制服\n是用烈箭鷹的羽毛製成的。"
          ultra_moon: "主要的獵物是鳥寶可夢。\n會急速接近對手，然後用\n猛烈的腳踢把對手擊落到地面。"
