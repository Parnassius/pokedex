          ultra_moon: "光る　尾びれで　獲物を　誘う。\n昼は　海面　近くに　いて\n夜に　なると　深みに　移動。"
        en:
          ultra_sun: "When night falls, their pink patterns begin to\nshine. They’re popular with divers, so there are\nresorts that feed them to keep them close."
          ultra_moon: "It lures in prey with its shining tail fins. It stays\nnear the surface during the day and moves to\nthe depths when night falls."
        fr:
          ultra_sun: "Les motifs roses de sa peau brillent la nuit.\nDes stations balnéaires l’attirent avec de la\nnourriture, car il est très aimé des plongeurs."
          ultra_moon: "Il attire ses proies avec ses nageoires caudales\nlumineuses. Il passe la journée à la surface\net se retire dans les abysses la nuit venue."
        it:
          ultra_sun: "I motivi rosa sul suo corpo brillano di notte.\nPoiché è molto amato dai sub, alcuni centri\nturistici li attirano con il cibo."
          ultra_moon: "Attira la preda con le sue brillanti pinne.\nDi giorno nuota vicino alla superficie del mare,\nmentre di notte si sposta in profondità."
        de:
          ultra_sun: "Seine rosafarbene Musterung leuchtet in der\nNacht. Wegen seiner Popularität unter Tauchern\nist es ein gern gesehener Gast in Feriengebieten."
          ultra_moon: "Seine leuchtenden Flossen locken Beute an. Bei\nTag bleibt es nahe an der Wasseroberfläche,\nwährend es abends in den Tiefen verschwindet."
        es:
          ultra_sun: "Las marcas rosadas de su piel brillan al caer la\nnoche. Triunfa entre los buceadores, por eso en\nlos resorts turísticos le proporcionan alimento."
          ultra_moon: "Por el día permanece cerca de la superficie y se\nretira a las profundidades por la noche. Atrae a\nlas presas con sus brillantes aletas caudales."
        ko:
          ultra_sun: "핑크색 모양은 밤이 되면 빛이 난다.\n다이버에게 인기여서 리조트에서\n길들여지기도 한다."
          ultra_moon: "빛나는 꼬리지느러미로 먹이를 유인한다.\n낮에는 해수면 가까이 있다가\n밤이 되면 깊은 곳으로 이동한다."
        zh_simp:
          ultra_sun: "粉红色的花纹到了夜里就会发光。\n很受潜水者欢迎，\n所以有时会被驯养在度假地。"
          ultra_moon: "用发光的尾鳍引诱猎物。\n白天会在海面附近，\n到了夜里就向海的深处移动。"
        zh_trad:
          ultra_sun: "粉紅色的花紋到了夜裡就會發光。\n由於很受潛水者的歡迎，\n在度假地有時會被人工馴養。"
          ultra_moon: "會用發光的尾鰭引誘獵物。\n白天會待在海面附近，\n到了夜裡就會向深海移動。"
lumineon:
  species_id: 457
  names:
    jp_kana: ネオラント
    jp_kanji: ネオラント
    en: Lumineon
    fr: Luminéon
    it: Lumineon
    de: Lumineon
    es: Lumineon
    ko: 네오라이트
    zh_simp: 霓虹鱼
    zh_trad: 霓虹魚
  forms:
    lumineon:
      form_id: 0
      base_stats:
        hp: 69
        attack: 69
        defense: 76
        special_attack: 69
        special_defense: 86
        speed: 91
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
        - storm_drain
      hidden_ability: water_veil
      descriptions:
        jp_kana:
          ultra_sun: "ふかい　うみの　そこは　えものが\nすくない。　きちょうなエサを　めぐり\nランターンと　はげしく　あらそう。"
          ultra_moon: "しんかいの　かいていを　はうように\nおよぐ。　げんそうてきな　ヒレの\nひかりは　よぞらの　ほしの　よう。"
        jp_kanji:
          ultra_sun: "深い　海の　底は　獲物が\n少ない。　貴重な　エサを　巡り\nランターンと　激しく　争う。"
          ultra_moon: "深海の　海底を　はうように\n泳ぐ。　幻想的な　ヒレの\n光は　夜空の　星の　よう。"
        en:
          ultra_sun: "Deep down at the bottom of the ocean, prey is\nscarce. Lumineon get into fierce disputes with\nLanturn over food."
          ultra_moon: "They traverse the deep waters as if crawling\nover the seafloor. The fantastic lights of its\nfins shine like stars in the night sky."
        fr:
          ultra_sun: "La nourriture étant très rare dans les abysses\nmarins, Luminéon doit souvent se disputer\nses précieuses proies avec Lanturn."
          ultra_moon: "Il se déplace en rampant dans les profondeurs\nde l’océan. Ses nageoires brillent telles des\nétoiles dans le ciel nocturne."
        it:
          ultra_sun: "I fondali marini non gli offrono molte occasioni\nper cibarsi, perciò si scontra continuamente\ncon i Lanturn per accaparrarsi le prede migliori."
          ultra_moon: "Avanza strisciando sul fondo degli abissi marini.\nLa luce meravigliosa delle sue pinne ricorda\nle stelle risplendenti del cielo notturno."
        de:
          ultra_sun: "Auf dem tiefen Meeresboden gibt es nur wenig\nBeute, weshalb es sich mit Lanturn heftige\nKämpfe um das wertvolle Futter liefert."
          ultra_moon: "Es bewegt sich krabbelnd über den Boden der\nTiefsee. Seine prachtvollen Flossen leuchten\nwie der Sternenhimmel."
        es:
          ultra_sun: "Es difícil encontrar presas en lo más profundo\ndel mar, por lo que lucha a capa y espada con\nlos Lanturn si avista una que merezca la pena."
          ultra_moon: "Nada arrastrándose por el lecho marino. Sus\nespléndidas aletas brillan como las estrellas del\nfirmamento."
        ko:
          ultra_sun: "깊은 바다 밑은 먹이가\n적다. 귀한 먹이를 두고\n랜턴과 격렬히 싸운다."
          ultra_moon: "심해 해저를 기어가듯 헤엄친다.\n환상적인 지느러미의 빛은\n밤하늘의 별과 같다."
        zh_simp:
          ultra_sun: "深海的海底猎物很少。\n四处寻找宝贵的食物，\n和电灯怪展开激烈争夺。"
          ultra_moon: "像是爬行一样在深海的海底游泳。\n鳍上发出的充满幻想的光\n就像是夜空的星星。"
        zh_trad:
          ultra_sun: "深海的海底獵物很少，\n為了爭奪寶貴的食物，\n會和電燈怪展開激烈的鬥爭。"
          ultra_moon: "像爬行般地在海底游動。\n鰭發出的光充滿奇幻氣氛，\n就像夜空中的星星一樣。"
mantyke:
  species_id: 458
  names:
    jp_kana: タマンタ
    jp_kanji: タマンタ
    en: Mantyke
    fr: Babimanta
    it: Mantyke
    de: Mantirps
    es: Mantyke
    ko: 타만타
    zh_simp: 小球飞鱼
    zh_trad: 小球飛魚
  forms:
    mantyke:
      form_id: 0
      base_stats:
        hp: 45
        attack: 20
        defense: 50
        special_attack: 60
        special_defense: 120
        speed: 50
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
