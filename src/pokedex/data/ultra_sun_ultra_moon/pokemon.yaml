        jp_kana:
          ultra_sun: "あたまの　はを　てんぴで　かわかし\nせんじて　のむと　とうじの　げんきが\nもどると　おとしよりに　だいにんき。"
          ultra_moon: "きれいな　みずと　つちを　このむ。\nすみかの　かんきょうが　わるくなると\nあらたなとちへと　むれで　ひっこす。"
        jp_kanji:
          ultra_sun: "頭の　葉を　天日で　乾かし\n煎じて　飲むと　当時の　元気が\n戻ると　お年寄りに　大人気。"
          ultra_moon: "綺麗な　水と　土を　好む。\n棲み処の　環境が　悪くなると\n新たな土地へと　群れで　引っ越す。"
        en:
          ultra_sun: "Some say if you dry the leaves on its head, boil\nthem down, and drink the infusion, your vigor\nwill return, so Petilil is popular with the elderly."
          ultra_moon: "They prefer clean water and soil. When the\nenvironment they live in turns bad, the whole\nbunch will up and move to a new area."
        fr:
          ultra_sun: "En raison de leurs vertus revigorantes,\nles feuilles de sa tête sont séchées au soleil\npuis bues en infusion par les personnes âgées."
          ultra_moon: "À cheval sur la qualité de la terre et de l’eau,\nil migre avec ses congénères lorsque son\nenvironnement se dégrade."
        it:
          ultra_sun: "Le foglie che ha sul capo sono molto amate\ndagli anziani perché, essiccate al sole e bevute\ncome tisana, hanno un effetto rinvigorente."
          ultra_moon: "I Petilil prediligono i luoghi caratterizzati da\nterra e acqua pulite. Se il loro ambiente si\ndeteriora, si trasferiscono in massa."
        de:
          ultra_sun: "Sehr beliebt bei Senioren, da ein Tee aus den\nsonnengetrockneten Blättern seines Kopfes\nwie ein Schluck aus dem Jungbrunnen wirkt."
          ultra_moon: "Sie bevorzugen sauberes Wasser und reine Erde.\nSollten sich die Bedingungen in der Umgebung\nverschlechtern, ziehen sie in der Gruppe weiter."
        es:
          ultra_sun: "Los ancianos aprecian las hojas de su cabeza,\nya que, secadas al sol y tomadas en infusión,\ndevuelven la vitalidad perdida."
          ultra_moon: "Prefiere el agua y la tierra sin impurezas. Si el\nentorno en el que habita empeora, emigra en\ngrupo hacia un nuevo territorio."
        ko:
          ultra_sun: "머리의 잎을 햇볕에 말려\n달여 마시면 젊은 시절의 기력이\n돌아온다며 노인에게 큰 인기다."
          ultra_moon: "깨끗한 물과 흙을 좋아한다.\n서식지의 환경이 나빠지면\n새로운 장소로 무리가 이동한다."
        zh_simp:
          ultra_sun: "如果利用阳光晒干它头上的叶子，\n再煎煮后饮用，会马上变得有活力，\n在老年人中很受欢迎。"
          ultra_moon: "很喜欢干净的水和土壤。\n如果栖息地的环境变差，\n就会群体迁移到新的地方去。"
        zh_trad:
          ultra_sun: "把牠頭上的葉子放在太陽下曬乾，\n煎煮之後服用就能回復精力，\n因此很受老年人的喜愛。"
          ultra_moon: "喜歡乾淨的水和土壤。\n如果棲息地的環境變差，\n就會成群遷移到新的地方。"
lilligant:
  species_id: 549
  names:
    jp_kana: ドレディア
    jp_kanji: ドレディア
    en: Lilligant
    fr: Fragilady
    it: Lilligant
    de: Dressella
    es: Lilligant
    ko: 드레디어
    zh_simp: 裙儿小姐
    zh_trad: 裙兒小姐
  forms:
    lilligant:
      form_id: 0
      base_stats:
        hp: 70
        attack: 60
        defense: 75
        special_attack: 110
        special_defense: 75
        speed: 90
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - grass
      egg_groups:
        - grass
      abilities:
        - chlorophyll
        - own_tempo
      hidden_ability: leaf_guard
      held_items:
        rare: absorb_bulb
      descriptions:
        jp_kana:
          ultra_sun: "そだった　つちの　せいぶんに　よって\nはなの　かおりは　すこしずつ　ちがう。\nかぐと　こころが　いやされ　やすらぐ。"
          ultra_moon: "うつくしいので　ほかの　ポケモンに\nすかれる。　あたまのはなは　ていれを\nおこたると　すぐに　くさって　かれる。"
        jp_kanji:
          ultra_sun: "育った　土の　成分に　よって\n花の　香りは　少しずつ　違う。\n嗅ぐと　心が　癒され　安らぐ。"
          ultra_moon: "美しいので　他の　ポケモンに\n好かれる。　頭の花は　手入れを\n怠ると　すぐに　腐って　枯れる。"
        en:
          ultra_sun: "The fragrance of its flower differs slightly\ndepending on the soil where it grew up.\nSniffing the aroma calms your heart and mind."
          ultra_moon: "It’s well liked by other Pokémon because of its\nbeauty. The flower on its head needs constant\ncare, or it will soon wither and rot."
        fr:
          ultra_sun: "Le parfum de sa fleur calme les nerfs et apaise\nl’esprit. Il varie légèrement selon la composition\nde la terre dans laquelle Fragilady a poussé."
          ultra_moon: "Sa beauté lui confère une grande popularité\nauprès des autres Pokémon. Si l’on ne prend\npas soin de la fleur sur sa tête, elle fane."
        it:
          ultra_sun: "Il profumo del suo fiore, che varia lievemente in\nbase alla composizione del terreno dove il\nPokémon è cresciuto, dona serenità."
          ultra_moon: "La sua bellezza affascina anche gli altri\nPokémon. Il fiore che ha sulla testa necessita\ndi continue attenzioni, altrimenti appassisce."
        de:
          ultra_sun: "Sein Blumenduft wird von der Beschaffenheit\nder Erde, auf der es aufwächst, beeinflusst.\nDaran zu riechen ist eine Wohltat für die Seele."
          ultra_moon: "Es ist aufgrund seiner Schönheit bei anderen\nPokémon beliebt. Die Blume an seinem Kopf\nverwelkt sofort, wenn man sie nicht pflegt."
        es:
          ultra_sun: "El olor que desprende su flor varía en función\nde la composición de la tierra en la que crezca.\nSu aroma calma los nervios y sosiega el alma."
          ultra_moon: "Su belleza fascina a otros Pokémon. La flor de la\ncabeza se marchita enseguida si no se le presta\nel cuidado necesario."
        ko:
          ultra_sun: "자란 흙의 성분에 따라 꽃향기는\n조금씩 다르다. 냄새를 맡으면\n마음이 치유되고 평온해진다."
          ultra_moon: "아름다워서 다른 포켓몬들에게\n사랑받는다. 머리의 꽃은 손질을\n게을리하면 금방 상해서 시든다."
        zh_simp:
          ultra_sun: "根据栽培土壤的成分不同，\n花香也会略微不一样。\n闻一下就能治愈心灵，心情舒畅。"
          ultra_moon: "因为美丽而受其他宝可梦喜爱。\n头上的花如果疏于照料，\n很快就会腐烂枯萎。"
        zh_trad:
          ultra_sun: "隨著栽培用的土壤不同，\n花香也會有些不一樣。\n聞一下就能舒緩心情，帶來安寧。"
          ultra_moon: "因為美麗的模樣而受到其他\n寶可夢的喜愛。頭上的花如果\n疏於照料，很快就會腐爛枯萎。"
basculin:
  species_id: 550
  names:
    jp_kana: バスラオ
    jp_kanji: バスラオ
    en: Basculin
    fr: Bargantua
    it: Basculin
    de: Barschuft
    es: Basculin
    ko: 배쓰나이
    zh_simp: 野蛮鲈鱼
    zh_trad: 野蠻鱸魚
  forms:
    basculin_red_striped_form:
      form_id: 0
      names:
        jp_kana: あかすじのすがた
        jp_kanji: あかすじのすがた
        en: Red-Striped Form
        fr: Motif Rouge
        it: Forma Linearossa
        de: Rotlinige Form
        es: Forma Raya Roja
        ko: 적색근의 모습
        zh_simp: 红条纹的样子
        zh_trad: 紅條紋的樣子
      base_stats:
        hp: 70
        attack: 92
        defense: 65
        special_attack: 80
        special_defense: 55
        speed: 98
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - reckless
        - adaptability
      hidden_ability: mold_breaker
      held_items:
        rare: deep_sea_tooth
      descriptions:
        jp_kana:
          ultra_sun: "らんぼうかつ　どうもうな　ポケモン。\nあかとあおの　バスラオは　なわばりを\nめぐって　いつも　ケンカしている。"
          ultra_moon: "らんぼう　なので　バスラオの　むれが\nあらわれた　みずうみには　ヘイガニや\nシザリガーくらいしか　いなくなるぞ。"
        jp_kanji:
          ultra_sun: "乱暴かつ　獰猛な　ポケモン。\n赤と　青の　バスラオは　縄張りを\n巡って　いつも　ケンカしている。"
          ultra_moon: "乱暴　なので　バスラオの　群れが\n現れた　湖には　ヘイガニや\nシザリガーくらいしか　いなくなるぞ。"
        en:
          ultra_sun: "Savage, violent Pokémon, red and blue Basculin\nare always fighting each other over territory."
          ultra_moon: "When a school of Basculin appears in a lake,\neverything else disappears, except for Corphish\nand Crawdaunt. That’s how violent Basculin are."
        fr:
          ultra_sun: "C’est un Pokémon d’une grande férocité.\nLes Bargantua bleus et les Bargantua rouges\nse livrent une guerre territoriale sans merci."
          ultra_moon: "Il est si violent que tous les Pokémon\ndisparaissent des lacs où un banc de Bargantua\ns’installe, à part les Écrapince et les Colhomard."
        it:
          ultra_sun: "È un Pokémon particolarmente violento e feroce.\nI Basculin con la linea rossa e quelli con la linea\nblu litigano spesso per il territorio."
          ultra_moon: "I Basculin sono così violenti che, quando\narrivano in gruppo in un lago, tutti i Pokémon\nspariscono a parte i Corphish e i Crawdaunt."
        de:
          ultra_sun: "Ein wildes und brutales Pokémon. Rot gestreifte\nund blau gestreifte Barschuft tragen ständig\nKämpfe um ihr Territorium aus."
          ultra_moon: "Dieses Pokémon ist so brutal, dass in Seen\nneben einem Schwarm Barschuft nur noch\nKrebscorps und Krebutack bestehen können."
        es:
          ultra_sun: "Este Pokémon tiene un carácter violento y feroz.\nLas peleas entre los de color azul y los de color\nrojo para marcar territorio son frecuentes."
          ultra_moon: "Es tan violento que en los lagos donde aparece\nun banco de Basculin solo son capaces de\nquedarse Corphish o Crawdaunt."
        ko:
          ultra_sun: "난폭하고 사나운 포켓몬.\n빨강과 파랑의 배쓰나이는\n영역을 두고 언제나 싸운다."
          ultra_moon: "난폭해서 배쓰나이 무리가\n나타난 호수에는 가재군이나\n가재장군 정도밖에 남지 않게 된다."
        zh_simp:
          ultra_sun: "是性格粗暴又凶猛的宝可梦。\n红色和蓝色的野蛮鲈鱼\n总是为了领地问题打架。"
          ultra_moon: "因为性格粗暴，在野蛮鲈鱼群\n出现的湖里，就只有龙虾小兵\n和铁螯龙虾之类的能留下来。"
        zh_trad:
          ultra_sun: "性情粗暴且凶猛的寶可夢。\n紅色和藍色的野蠻鱸魚\n總是為了爭奪地盤而打架。"
          ultra_moon: "因為性情粗暴，在野蠻鱸魚群\n出沒的湖裡，就只有龍蝦小兵\n或鐵螯龍蝦之類的能夠留下來。"
    basculin_blue_striped_form:
      form_id: 1
      names:
        jp_kana: あおすじのすがた
        jp_kanji: あおすじのすがた
        en: Blue-Striped Form
        fr: Motif Bleu
        it: Forma Lineablu
        de: Blaulinige Form
        es: Forma Raya Azul
        ko: 청색근의 모습
        zh_simp: 蓝条纹的样子
        zh_trad: 藍條紋的樣子
      base_stats:
        hp: 70
        attack: 92
        defense: 65
        special_attack: 80
        special_defense: 55
        speed: 98
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - water
      egg_groups:
        - water_2
      abilities:
        - rock_head
        - adaptability
      hidden_ability: mold_breaker
      held_items:
        rare: deep_sea_scale
      descriptions:
        jp_kana:
          ultra_sun: "おおアゴで　なんでも　たべつくす\nバスラオじたいも　より　つよい\nせいぶつには　エサに　すぎない。"
          ultra_moon: "みずうみのチンピラと　よぶ　ひとも\nいる。　いろの　ちがいの　いみは\nまだ　よく　わかっていないのだ。"
        jp_kanji:
          ultra_sun: "おおアゴで　なんでも　食べ尽くす\nバスラオ自体も　より　強い\n生物には　エサに　すぎない。"
          ultra_moon: "湖のチンピラと　呼ぶ　人も\nいる。　色の　違いの　意味は\nまだ　よく　わかっていないのだ。"
        en:
          ultra_sun: "Even Basculin, which devours everything it can\nwith its huge jaws, is nothing more than food to\norganisms stronger than itself."
          ultra_moon: "Some people call it “the thug of the lake.”\nWhether the differences in color are meaningful\nis not yet known."
        fr:
          ultra_sun: "Bien que sa grande mâchoire lui permette de\nmanger n’importe quoi, Bargantua est la proie\ndes prédateurs plus gros que lui."
          ultra_moon: "Certains l’appellent « le voyou des lacs ».\nPour l’instant, nul ne sait vraiment ce que\nles différences de couleur signifient."
        it:
          ultra_sun: "La sua grande mandibola gli permette di\ndivorare tutto quello che gli capita a tiro, ma\ncade comunque preda di Pokémon più forti di lui."
          ultra_moon: "Alcuni li chiamano “canaglie dei laghi”.\nNon si sa ancora se le differenti colorazioni\nabbiano un significato particolare."
        de:
          ultra_sun: "Es frisst alles, was ihm vor seinen gewaltigen\nKiefer kommt. Doch im Angesicht noch stärkerer\nPokémon wird es selbst schnell zur Beute."
          ultra_moon: "Böse Zungen nennen sie die „Rowdys des Sees“.\nWas es mit ihren Farbunterschieden auf sich\nhat, ist noch nicht hinreichend erforscht."
        es:
          ultra_sun: "Devora cualquier cosa que esté al alcance de\nsus enormes mandíbulas, incluso presas más\nfuertes que él."
          ultra_moon: "Hay gente que los llama los Matones del Lago.\nNo se sabe a qué se deben las diferencias en\nsu pigmentación."
        ko:
          ultra_sun: "큰 턱으로 뭐든지 먹어 치우는\n배쓰나이조차도 더 강한\n생물에게는 먹이에 지나지 않는다."
          ultra_moon: "호수의 불량배라고 부르는 사람도\n있다. 색이 다른 의미는\n아직 제대로 밝혀지지 않았다."
        zh_simp:
          ultra_sun: "无论是什么，都会用大颚吃掉。\n但野蛮鲈鱼本身也不过是\n更强大生物的食物罢了。"
          ultra_moon: "也有人称之为湖里的小混混。\n不同的颜色有什么意义，\n目前还不太明白。"
        zh_trad:
          ultra_sun: "會用大顎把一切東西都吃掉。\n然而野蠻鱸魚本身在更強大的\n生物面前也不過是食物罷了。"
          ultra_moon: "也有人稱牠為湖裡的小混混。\n目前還不是很清楚\n顏色的不同代表了什麼意義。"
sandile:
  species_id: 551
  names:
    jp_kana: メグロコ
    jp_kanji: メグロコ
    en: Sandile
    fr: Mascaïman
    it: Sandile
    de: Ganovil
    es: Sandile
    ko: 깜눈크
    zh_simp: 黑眼鳄
    zh_trad: 黑眼鱷
  forms:
    sandile:
      form_id: 0
      base_stats:
        hp: 50
        attack: 72
        defense: 35
        special_attack: 35
        special_defense: 35
        speed: 65
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        rare: black_glasses
      descriptions:
        jp_kana:
          ultra_sun: "ねんじゅう　あたたかい　アローラは\nすごしやすい　かんきょう。　さばく\nいがいでも　ときどき　みかける。"
          ultra_moon: "まだ　かりは　へたなので　おもに\nさばくで　いきだおれたものを　くう。\nさばくのそうじやと　よばれる。"
        jp_kanji:
          ultra_sun: "年中　暖かい　アローラは\n過ごしやすい　環境。　砂漠\n以外でも　時々　見かける。"
          ultra_moon: "まだ　狩りは　下手なので　おもに\n砂漠で　行き倒れたものを　食う。\n砂漠の掃除屋と　呼ばれる。"
        en:
          ultra_sun: "Alola, where it’s warm all year round, is a\ncomfortable environment for this Pokémon.\nSometimes you’ll even see it outside of deserts."
          ultra_moon: "Sandile’s still not good at hunting, so it mostly\neats things that have collapsed in the desert.\nIt’s called “the cleaner of the desert.”"
        fr:
          ultra_sun: "Les températures tropicales d’Alola sont idéales\npour ce Pokémon, que l’on peut même parfois\nrencontrer en dehors du désert."
          ultra_moon: "N’étant pas très bon chasseur, il se nourrit de\nla charogne qu’il trouve dans les dunes, ce qui\nlui vaut son surnom de « nettoyeur du désert »."
        it:
          ultra_sun: "Le temperature tropicali di Alola rendono questa\nregione l’ambiente ideale per i Sandile, tanto che\nvengono avvistati anche fuori dai deserti."
          ultra_moon: "La caccia non è il suo forte e si ciba soprattutto\ndi prede che trova già morte nel deserto. Per\nquesto viene chiamato “spazzino del deserto”."
        de:
          ultra_sun: "Das ganzjährig warme Klima der Alola-Region\nbietet ihm günstige Lebensbedingungen. Ab und\nan trifft man es sogar außerhalb von Wüsten an."
          ultra_moon: "Da es kein geschickter Jäger ist, begnügt es\nsich mit dem, was in der Wüste verendet. Man\nnennt es auch die „Putzkraft der Wüste“."
        es:
          ultra_sun: "El hábitat de Alola, cálido durante todo el año,\nes ideal para este Pokémon, por lo que también\nse le puede ver fuera del desierto."
          ultra_moon: "Se nutre principalmente de cadáveres hallados\nen la arena, debido a su ineptitud para la caza.\nDe ahí su apodo: el Barrendero del Desierto."
        ko:
          ultra_sun: "일 년 내내 따듯한 알로라는\n지내기 좋은 환경이다.\n사막이 아닌 곳에서도 가끔 볼 수 있다."
          ultra_moon: "아직 사냥은 서툴러서 주로\n사막에서 객사한 것을 먹는다.\n사막의 청소부라 불린다."
        zh_simp:
          ultra_sun: "对它来说，全年温暖的阿罗拉\n是很容易生活的环境。\n即使在沙漠以外也时常能见到。"
          ultra_moon: "因为还不太擅长狩猎，\n所以主要是吃倒毙在沙漠里的东西。\n被称为沙漠的清扫者。"
        zh_trad:
          ultra_sun: "一年到頭都很溫暖的阿羅拉\n對牠來說是很適合居住的環境。\n在沙漠以外的地方也能時常見到牠。"
          ultra_moon: "因為還不太擅長狩獵，主要是\n吃倒斃在沙漠裡的東西維生，\n被稱為沙漠的清道夫。"
krokorok:
  species_id: 552
  names:
    jp_kana: ワルビル
    jp_kanji: ワルビル
    en: Krokorok
    fr: Escroco
    it: Krokorok
    de: Rokkaiman
    es: Krokorok
    ko: 악비르
    zh_simp: 混混鳄
    zh_trad: 混混鱷
  forms:
    krokorok:
      form_id: 0
      base_stats:
        hp: 60
        attack: 82
        defense: 45
        special_attack: 45
        special_defense: 45
        speed: 74
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        rare: black_glasses
      descriptions:
        jp_kana:
          ultra_sun: "からだが　ひえるのが　とてもにがて。\nきおんが　さがる　ばんには　さばくの\nすなの　おくふかくに　もぐっている。"
          ultra_moon: "えものの　いちぶは　すなのなかに\nうめて　かりが　しっぱいしたときの\nひじょうしょくに　するのだ。"
        jp_kanji:
          ultra_sun: "体が　冷えるのが　とても　苦手。\n気温が　下がる　晩には　砂漠の\n砂の　奥深くに　潜っている。"
          ultra_moon: "獲物の　１部は　砂の中に\n埋めて　狩りが　失敗したときの\n非常食に　するのだ。"
        en:
          ultra_sun: "Krokorok really hates it when its body gets\ncold. On nights when the temperature drops,\nit digs deep into the desert sands."
          ultra_moon: "It buries some of its prey in the sand to use as\nemergency meals when its hunts\nare unsuccessful."
        fr:
          ultra_sun: "Son corps supportant mal les baisses de\ntempérature, il s’ensable profondément lorsque\nles nuits sont trop fraîches."
          ultra_moon: "Il garde une partie de ses prises en réserve\ndans le sable, au cas où il rentrerait bredouille\nde la chasse."
        it:
          ultra_sun: "Odia il freddo. Se di notte la temperatura\ncala eccessivamente, si scava un rifugio in\nprofondità sotto la sabbia."
          ultra_moon: "Sotterra alcune prede nella sabbia come scorta\nd’emergenza per i casi in cui la caccia non dia\nbuoni frutti."
        de:
          ultra_sun: "Rokkaiman verträgt es nicht gut, wenn sein\nKörper auskühlt. Deshalb vergräbt es sich an\nbesonders kalten Abenden tief im Wüstensand."
          ultra_moon: "Einen Teil seiner Beute vergräbt es als Notration\nim Sand. Auf sie greift es zurück, wenn es von\neiner erfolglosen Jagd zurückkehrt."
        es:
          ultra_sun: "Su gran debilidad es el frío, por lo que cuando\nbajan las temperaturas de noche en el desierto,\nexcava un agujero en la arena y se cobija en él."
          ultra_moon: "Entierra parte de sus presas bajo la arena para\nreservarlas a modo de víveres de emergencia,\nen caso de una caza infructuosa."
        ko:
          ultra_sun: "몸이 차가워지는 것을 매우 싫어한다.\n기온이 내려가는 밤에는\n사막 모래 속으로 깊숙이 파고든다."
          ultra_moon: "먹이의 일부는 모래 속에\n묻어서 사냥에 실패했을 때의\n비상식량으로 삼는다."
        zh_simp:
          ultra_sun: "非常害怕身体变冷。\n在气温下降的夜晚\n会潜藏在沙漠的沙子深处。"
          ultra_moon: "把猎物的一部分埋在沙子里，\n作为狩猎失败时的储备粮。"
        zh_trad:
          ultra_sun: "非常害怕身體變冷。\n在氣溫下降的夜晚，\n會潛藏在沙漠的沙底深處。"
          ultra_moon: "會把獵物的一部份\n埋在沙子裡，當成狩獵\n失敗時的儲備糧食。"
krookodile:
  species_id: 553
  names:
    jp_kana: ワルビアル
    jp_kanji: ワルビアル
    en: Krookodile
    fr: Crocorible
    it: Krookodile
    de: Rabigator
    es: Krookodile
    ko: 악비아르
    zh_simp: 流氓鳄
    zh_trad: 流氓鱷
  forms:
    krookodile:
      form_id: 0
      base_stats:
        hp: 95
        attack: 117
        defense: 80
        special_attack: 65
        special_defense: 70
        speed: 92
      evs_yield:
        hp: 0
        attack: 3
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - dark
      egg_groups:
        - field
      abilities:
        - intimidate
        - moxie
      hidden_ability: anger_point
      held_items:
        common: black_glasses
      descriptions:
        jp_kana:
          ultra_sun: "５０キロ　さきに　いる　えものを\nみつけると　さばくを　およぐように\nいどうして　とびかかり　かみつく。"
          ultra_moon: "フライゴンの　おこす　すなあらしに\nみを　ひそめて　えものが　くるのを\nじっと　まちかまえている。"
        jp_kanji:
          ultra_sun: "５０キロ　先に　いる　獲物を\n見つけると　砂漠を　泳ぐように\n移動して　飛びかかり　噛みつく。"
          ultra_moon: "フライゴンの　起こす　砂嵐に\n身を　潜めて　獲物が　くるのを\nじっと　待ちかまえている。"
        en:
          ultra_sun: "When it spots prey, even at a distance of over\n30 miles, it swims through the desert as if it\nwere water, then jumps out and chomps them."
          ultra_moon: "It conceals itself in sandstorms that Flygon\nwhip up and waits patiently for prey to appear."
        fr:
          ultra_sun: "Il peut repérer une proie à une distance de\n50 km. Il s’approche alors en « nageant » dans\nle sable, puis lui saute dessus pour la croquer."
          ultra_moon: "Lors des tempêtes de sable provoquées par\nLibégon, il se terre dans le sol, à l’affût d’une\nproie."
        it:
          ultra_sun: "Individua la preda anche a 50 km di distanza e\navanza verso di essa come se nuotasse nella\nsabbia per poi balzarle addosso e azzannarla."
          ultra_moon: "Si nasconde nelle tempeste di sabbia create\ndai Flygon aspettando immobile che passi\nuna preda."
        de:
          ultra_sun: "Entdeckt es Beute in bis zu 50 km Entfernung,\nbewegt es sich schwimmend durch die Wüste,\nbis es hervorspringt und nach ihr schnappt."
          ultra_moon: "Es legt sich inmitten eines Sandsturms, der von\nLibelldra entfacht wurde, auf die Lauer und\nwartet dort geduldig auf seine Beute."
        es:
          ultra_sun: "Al avistar una presa incluso a 50 km, repta\nhacia ella por la arena como si nadara y se\nabalanza para despedazarla con sus fauces."
          ultra_moon: "Se oculta en las tormentas de arena provocadas\npor Flygon y espera pacientemente al acecho\nde su presa."
        ko:
          ultra_sun: "50km 떨어져 있는 먹이를\n발견하면 사막을 헤엄치듯이\n이동하여 덤벼들어 덥석 문다."
          ultra_moon: "플라이곤이 일으키는 모래바람에\n몸을 숨기고 먹이가 오는 것을\n가만히 기다리고 있다."
        zh_simp:
          ultra_sun: "如果发现前方５０公里处的猎物，\n就会像游泳一样在沙漠里移动，\n扑过去咬住。"
          ultra_moon: "把身体藏在沙漠蜻蜓引起的沙暴中，\n静静地等待着猎物的到来。"
        zh_trad:
          ultra_sun: "當發現了前方５０公里處的獵物，\n就會像游泳一樣在沙漠上移動，\n然後飛撲過去咬住。"
          ultra_moon: "會藏身在沙漠蜻蜓\n引發的沙暴中，靜靜\n等待著獵物的到來。"
