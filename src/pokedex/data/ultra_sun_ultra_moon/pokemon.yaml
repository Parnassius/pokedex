absol:
  species_id: 359
  names:
    jp_kana: アブソル
    jp_kanji: アブソル
    en: Absol
    fr: Absol
    it: Absol
    de: Absol
    es: Absol
    ko: 앱솔
    zh_simp: 阿勃梭鲁
    zh_trad: 阿勃梭魯
  forms:
    absol:
      form_id: 0
      base_stats:
        hp: 65
        attack: 130
        defense: 60
        special_attack: 75
        special_defense: 60
        speed: 75
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - pressure
        - super_luck
      hidden_ability: justified
      descriptions:
        jp_kana:
          ultra_sun: "ふきつなのは　みためだけ。　たはたを\nまもってくれたり　いへんを　ひとに\nつげてくれる　ありがたい　そんざい。"
          ultra_moon: "ろうじんは　わざわいポケモンと　よび\nいみきらうが　さいがいを　よち　する\nちからに　かんしんが　たかまっている。"
        jp_kanji:
          ultra_sun: "不吉なのは　見た目だけ。　田畑を\n守ってくれたり　異変を　人に\n告げてくれる　ありがたい　存在。"
          ultra_moon: "老人は　わざわいポケモンと　呼び\n忌み嫌うが　災害を　予知　する\n力に　関心が　高まっている。"
        en:
          ultra_sun: "The only thing unlucky about Absol is its\nappearance. It protects fields and warns people\nof disaster, so one ought to be grateful for it."
          ultra_moon: "The elderly call it the disaster Pokémon and\ndetest it, but interest in its power to predict\ndisasters is on the rise."
        fr:
          ultra_sun: "Contrairement à ce que son apparence suggère,\nil s’agit d’un Pokémon bienveillant qui protège\nles champs et annonce les catastrophes."
          ultra_moon: "Les anciens le détestent et le nomment « le\nPokémon Désastre », mais d’autres l’apprécient\npour son aptitude à prédire les catastrophes."
        it:
          ultra_sun: "Nonostante l’aspetto inquietante, è un Pokémon\nbenevolo che protegge i campi e avvisa gli\nesseri umani di calamità naturali imminenti."
          ultra_moon: "Gli anziani lo detestano chiamandolo “il Pokémon\ndei disastri”, ma la sua capacità di predire i\ncataclismi desta sempre più interesse."
        de:
          ultra_sun: "Nur sein Erscheinen ist unheilvoll. Die Menschen\nsind ihm dankbar, weil es ihre Felder beschützt\nund sie vor drohenden Katastrophen warnt."
          ultra_moon: "Alte Leute verabscheuen es als das Desaster-\nPokémon, aber seine Fähigkeit, Katastrophen\nvorherzusagen, findet immer mehr Anerkennung."
        es:
          ultra_sun: "Aunque su apariencia sea siniestra, en realidad\nle agradecen que alerte de cualquier catástrofe\ninminente y que proteja los cultivos."
          ultra_moon: "Pese a que los ancianos lo repudian tildándolo\nde Pokémon Catástrofe, cada vez es mayor el\ninterés por su capacidad de prever desastres."
        ko:
          ultra_sun: "비록 겉모습은 불길하지만\n논밭을 지키거나 이변을 사람에게\n알려 주는 고마운 존재다."
          ultra_moon: "노인들은 재난포켓몬이라고 부르며\n미워하지만 재해를 예지하는\n능력에 관심이 높아지고 있다."
        zh_simp:
          ultra_sun: "不祥的只是它的外表。\n实际上它是会帮忙守护田地，\n或是告知人们异变的难能可贵的存在。"
          ultra_moon: "老人们称之为灾祸宝可梦，\n对它很忌惮。但人们对它\n预知灾害的能力非常感兴趣。"
        zh_trad:
          ultra_sun: "牠只有外表看起來不吉祥。其實牠會幫忙\n守護田地，還會在災害發生時發出警告，\n是種對人們很有助益的寶可夢。"
          ultra_moon: "老人們稱呼牠為災禍寶可夢，\n對牠十分忌諱。但目前牠預知\n災害的能力正越來越受到重視。"
    absol_mega:
      form_id: 1
      names:
        jp_kana: メガアブソル
        jp_kanji: メガアブソル
        en: Mega Absol
        fr: Méga-Absol
        it: MegaAbsol
        de: Mega-Absol
        es: Mega-Absol
        ko: 메가앱솔
        zh_simp: 超级阿勃梭鲁
        zh_trad: 超級阿勃梭魯
      base_stats:
        hp: 65
        attack: 150
        defense: 60
        special_attack: 115
        special_defense: 60
        speed: 115
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - magic_bounce
      descriptions:
        jp_kana:
          ultra_sun: "ほんらい　あらそいを　このまないため\nたたかいの　ための　この　すがたに\nかわることを　とても　きらっている。"
          ultra_moon: "メガシンカの　エネルギーを　いあつの\nオーラに　かえて　ふりまいている。\nきのよわいひとは　ショックし　する。"
        jp_kanji:
          ultra_sun: "本来　争いを　好まないため\n戦いの　ための　この　姿に\n変わることを　とても　嫌っている。"
          ultra_moon: "メガシンカの　エネルギーを　威圧の\nオーラに　変えて　振りまいている。\n気の弱い人は　ショック死　する。"
        en:
          ultra_sun: "Normally, it dislikes fighting, so it really hates\nchanging to this form for battles."
          ultra_moon: "It converts the energy from Mega Evolution into\nan intimidating aura. Fainthearted people expire\nfrom shock at the sight of it."
        fr:
          ultra_sun: "Étant d’une nature très pacifique, il a horreur\nde prendre cette forme adaptée au combat."
          ultra_moon: "Il transforme l’énergie de la Méga-Évolution pour\ncréer et projeter une aura menaçante. Les gens\nde faible constitution peuvent en mourir."
        it:
          ultra_sun: "L’indole pacifica di questo Pokémon lo porta\na detestare questa sua forma, che è perfetta\nper la lotta."
          ultra_moon: "Utilizza l’energia della megaevoluzione per\ncreare un’aura minacciosa così impressionante\nda far morire di spavento le persone più fragili."
        de:
          ultra_sun: "Dieses von Natur aus konfliktscheue Pokémon\nnimmt nur widerwillig diese eigens auf Kämpfe\nausgerichtete Gestalt an."
          ultra_moon: "Es verbreitet eine unheilvolle Aura, die es aus\nder Energie der Mega-Entwicklung gewinnt und\ndie bei Zartbesaiteten zum Schocktod führt."
        es:
          ultra_sun: "Al ser de naturaleza pacífica, odia adoptar esta\nforma tan apta para los combates."
          ultra_moon: "La energía de la megaevolución lo rodea\nformando un aura abrumadora. Quienes carecen\nde fortaleza espiritual mueren del susto al verlo."
        ko:
          ultra_sun: "원래 다툼을 좋아하지 않기 때문에\n싸우기 위해 이 모습으로\n변하는 것을 매우 싫어한다."
          ultra_moon: "메가진화 에너지를 위압적인\n오라로 바꿔서 흩뿌리고 있다.\n기가 약한 사람은 쇼크사한다."
        zh_simp:
          ultra_sun: "因为原本就不喜欢斗争，\n所以非常讨厌为了战斗\n而变成这个样子。"
          ultra_moon: "超级进化的能量变作\n威慑的气场，四散播撒。\n胆怯的人会被惊吓致死。"
        zh_trad:
          ultra_sun: "因為本性不喜歡爭鬥，\n所以非常討厭為了戰鬥\n而變成這個樣子。"
          ultra_moon: "將超級進化的能量化成\n威嚇的氣場四處散佈。\n膽怯的人甚至會驚嚇致死。"
