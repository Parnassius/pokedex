      descriptions:
        jp_kana:
          ultra_sun: "あまりに　たくさん　さかなポケモンを\nくらうので　かずが　ふえすぎると\nりょうしたちに　おいはらわれている。"
          ultra_moon: "ちいさな　ホエルコが　サメハダーや\nダダリンに　おそわれると　むれの\nなかまが　いちがんになって　まもる。"
        jp_kanji:
          ultra_sun: "あまりに　たくさん　さかなポケモンを\n食らうので　数が　増えすぎると\n漁師たちに　追い払われている。"
          ultra_moon: "小さな　ホエルコが　サメハダーや\nダダリンに　襲われると　群れの\n仲間が　一丸になって　守る。"
        en:
          ultra_sun: "They eat so many fish Pokémon that when\nWailord become too numerous, fishermen have\nto chase them off."
          ultra_moon: "When a small Wailmer is attacked by Sharpedo\nor Dhelmise, its whole pod works together to\nprotect it."
        fr:
          ultra_sun: "Les Wailord se sont multipliés à force de se\ngaver de Pokémon poissons, tant et si bien que\nles pêcheurs doivent les renvoyer vers le large."
          ultra_moon: "Si un petit Wailmer vient à se faire attaquer par\nun Sharpedo ou un Sinistrail, les Wailord du banc\nse regroupent autour de lui pour le protéger."
        it:
          ultra_sun: "Si nutrono di enormi quantità di Pokémon\nacquatici. Quando diventano troppo numerosi,\ni pescatori li allontanano."
          ultra_moon: "Se un piccolo Wailmer viene attaccato da uno\nSharpedo o da un Dhelmise, gli altri Wailord\ngli si raggruppano attorno per proteggerlo."
        de:
          ultra_sun: "Sie verzehren Unmengen an Fisch-Pokémon,\nweshalb sie von Fischern vertrieben werden,\nwenn sie sich zu stark vermehren."
          ultra_moon: "Wenn ein kleines Wailmer von Tohaido oder\nMoruda angegriffen wird, schließt sich der Rest\nseiner Gruppe zusammen und beschützt es."
        es:
          ultra_sun: "Debido a su voraz apetito por los Pokémon pez,\nlos pescadores se ven obligados a controlar su\nnúmero si proliferan demasiado."
          ultra_moon: "Cuando un Sharpedo o un Dhelmise acechan a\nun pequeño Wailmer, el banco entero de Wailord\nse une para protegerlo."
        ko:
          ultra_sun: "너무 많은 물고기포켓몬을\n먹기 때문에 개체 수가 많이 늘어나면\n어부들에게 내쫓긴다."
          ultra_moon: "작은 고래왕자가 샤크니아나\n타타륜에게 공격당하면 무리의\n동료들이 한마음이 되어 지켜 준다."
        zh_simp:
          ultra_sun: "因为会吃太多的鱼宝可梦，\n所以数量增加过多的话，会被渔夫们驱赶。"
          ultra_moon: "小小的吼吼鲸如果被\n巨牙鲨和破破舵轮袭击的话，\n群体伙伴就会团结一致来守护。"
        zh_trad:
          ultra_sun: "因為會吃掉太多的魚寶可夢，\n一旦牠們的數量增加得太多，\n就會遭到漁夫們的驅趕。"
          ultra_moon: "當體型小的吼吼鯨被巨牙鯊\n或破破舵輪襲擊時，群體的夥伴\n就會團結起來一起守護。"
