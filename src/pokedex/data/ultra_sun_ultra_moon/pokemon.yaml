      form_id: 0
      names:
        jp_kana: ばけたすがた
        jp_kanji: ばけたすがた
        en: Disguised Form
        fr: Forme Déguisée
        it: Forma Mascherata
        de: Verkleidete Form
        es: Forma Encubierta
        ko: 둔갑한 모습
        zh_simp: 化形的样子
        zh_trad: 化形的樣子
      base_stats:
        hp: 55
        attack: 90
        defense: 80
        special_attack: 50
        special_defense: 105
