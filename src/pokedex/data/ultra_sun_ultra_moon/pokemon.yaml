      descriptions:
        jp_kana:
          ultra_sun: "なにかを　たしかめるときは　て　より\nさきに　くちびるで　ふれてみる。\nこまめに　なめて　よごれを　おとす。"
          ultra_moon: "くちびるは　びんかんな　センサー。\nあれないように　きの　じゅえきを\nまいにち　ぬって　ほしつしているよ。"
        jp_kanji:
          ultra_sun: "なにかを　確かめるときは　手　より\n先に　唇で　触れてみる。\nこまめに　舐めて　汚れを　落とす。"
          ultra_moon: "唇は　敏感な　センサー。\n荒れないように　木の　樹液を\n毎日　塗って　保湿しているよ。"
        en:
          ultra_sun: "When it examines things, before touching them\nwith its hands, it makes lip contact and then\ndiligently licks all the dirt off its lips."
          ultra_moon: "Highly perceptive sensors, Smoochum’s lips are\nkept moist by its daily application of tree sap."
        fr:
          ultra_sun: "Avant même de toucher de ses mains un objet\nqui l’intéresse, il le tâte de ses lèvres. S’il est\nsale, il le lèche au passage pour le nettoyer."
          ultra_moon: "Ses lèvres sont des détecteurs hypersensibles.\nIl les enduit de sève tous les jours pour les\ngarder hydratées et éviter les gerçures."
        it:
          ultra_sun: "Tocca gli oggetti con le labbra prima ancora\nche con le mani per analizzarli. Se sono sporchi,\nli lecca accuratamente per pulirli."
          ultra_moon: "Le sue labbra sono recettori molto sensibili.\nPer evitare che si rovinino, le mantiene idratate\napplicandovi ogni giorno la linfa degli alberi."
        de:
          ultra_sun: "Bevor es Dinge in die Hände nimmt, die es\ninteressieren, untersucht es diese mit den\nLippen. Dabei leckt es sie sorgfältig sauber."
          ultra_moon: "Die Lippen sind sein empfindlichster Körperteil.\nEs schmiert sie täglich mit Baumsaft ein, damit\nsie nicht austrocknen und rissig werden."
        es:
          ultra_sun: "Cuando quiere examinar algo, lo toca con los\nlabios antes que con las manos. Si está sucio,\nlimpia la mugre lamiendo repetidamente."
          ultra_moon: "Los labios son la parte más sensible de su\ncuerpo. Para que no se le cuarteen, los mantiene\nhidratados a diario con savia de los árboles."
        ko:
          ultra_sun: "무언가를 확인할 때는\n손보다 입술을 먼저 갖다 댄다.\n바지런히 핥아 더러운 것을 닦는다."
          ultra_moon: "입술은 민감한 센서다.\n트지 않게 나무 수액을 매일 발라서\n촉촉하게 유지하고 있다."
        zh_simp:
          ultra_sun: "在确认某样东西时，\n会先用嘴唇而不是手去触碰试试。\n会经常用舌头舔去污渍。"
          ultra_moon: "嘴唇是敏感的感应器。\n为了不让嘴唇干裂，它每天\n都会用树汁涂抹嘴唇来保湿哦。"
        zh_trad:
          ultra_sun: "在確認某樣東西時不是用手，\n而是會先用嘴唇去觸碰。\n會經常用舌頭舔去髒污。"
          ultra_moon: "嘴唇是敏感的感應器。\n為了不讓嘴唇乾裂，牠每天\n都會用樹液塗抹嘴唇來保濕。"
elekid:
  species_id: 239
  names:
    jp_kana: エレキッド
    jp_kanji: エレキッド
    en: Elekid
    fr: Élekid
    it: Elekid
    de: Elekid
    es: Elekid
    ko: 에레키드
    zh_simp: 电击怪
    zh_trad: 電擊怪
  forms:
    elekid:
      form_id: 0
      base_stats:
        hp: 45
        attack: 63
        defense: 37
        special_attack: 65
        special_defense: 55
        speed: 95
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - electric
      egg_groups:
        - undiscovered
      abilities:
        - static
      hidden_ability: vital_spirit
      held_items:
        rare: electirizer
      descriptions:
        jp_kana:
          ultra_sun: "かみなりの　おちる　おとを　きくと\nごきげん。　おちこんだときの　ために\nろくおん　しておくと　べんりだよ。"
          ultra_moon: "ツノが　あおじろく　ひかったときが\nじゅうでん　かんりょうの　サイン。\nさわると　ビリリと　しびれるぞ。"
        jp_kanji:
          ultra_sun: "雷の　落ちる　音を　聞くと\nご機嫌。　落ち込んだときの　ために\n録音　しておくと　便利だよ。"
          ultra_moon: "ツノが　青白く　光ったときが\n充電　完了の　サイン。\n触ると　ビリリと　痺れるぞ。"
        en:
          ultra_sun: "When it hears the crash of thunder, Elekid’s\nmood improves. It can be useful to record that\nsound and play it when Elekid’s feeling down."
          ultra_moon: "When its horns shine a bluish white, that’s the\nsign it’s fully charged. You’ll get a shocking\njolt if you touch it!"
        fr:
          ultra_sun: "Il adore le bruit de la foudre. Si vous\nl’enregistrez, vous pouvez le lui diffuser\nà loisir pour le mettre de bonne humeur."
          ultra_moon: "Lorsqu’il est chargé à bloc, ses cornes émettent\nune lueur bleuâtre. Attention à ne pas les\ntoucher ou vous risquez l’électrocution !"
        it:
          ultra_sun: "Il rombo dei tuoni lo mette di buon umore, perciò\nè utile averne una registrazione a portata\ndi mano per quando è triste."
          ultra_moon: "Quando le corna si illuminano di una luce\nbiancastra dalle sfumature blu, è carico di\nelettricità. Chi lo tocca rimane fulminato."
        de:
          ultra_sun: "Elekid freut sich, wenn es Donner hört. Es lohnt\nsich, das Geräusch aufzunehmen und es ihm\nvorzuspielen, wenn es mal schlecht drauf ist."
          ultra_moon: "Seine Hörner leuchten weiß-blau, wenn es sich\nfertig aufgeladen hat. Fasst man es dann an,\nbekommt man einen Schlag und wird gelähmt."
        es:
          ultra_sun: "El ruido de los truenos le mejora el ánimo.\nConviene tener a mano una grabación para\ncuando esté en horas bajas."
          ultra_moon: "Cuando se carga de electricidad, sus cuernos\nemiten una luz blanquecina. Quien lo toque\nrecibirá un potente calambrazo."
        ko:
          ultra_sun: "번개 소리를 들으면 기분이 좋아진다.\n우울해질 때를 대비해서\n녹음해 두면 편리하다."
          ultra_moon: "뿔이 푸르스름하게 빛날 때가\n충전이 완료되었다는 신호다.\n만지면 찌릿하게 저리다."
        zh_simp:
          ultra_sun: "听到打雷的声音会很高兴。如果事先\n将打雷的声音录下来，那么在它消沉的\n时候就能很方便地放给它听了哦。"
          ultra_moon: "当角发出青白色亮光时，\n就表示充电已经完成了。\n如果去摸，就会被电得麻麻的。"
        zh_trad:
          ultra_sun: "聽到打雷的聲音就會很高興。\n如果能先把打雷的聲音錄下來，\n當牠心情低落的時候會很好用。"
          ultra_moon: "當角發出青白色亮光時，\n就代表充電已經完成了。\n如果去摸就會被電到麻痺。"
magby:
  species_id: 240
  names:
    jp_kana: ブビィ
    jp_kanji: ブビィ
    en: Magby
    fr: Magby
    it: Magby
    de: Magby
    es: Magby
    ko: 마그비
    zh_simp: 鸭嘴宝宝
    zh_trad: 鴨嘴寶寶
  forms:
    magby:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 37
        special_attack: 70
        special_defense: 55
        speed: 83
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - undiscovered
      abilities:
        - flame_body
      hidden_ability: vital_spirit
      held_items:
        rare: magmarizer
      descriptions:
        jp_kana:
          ultra_sun: "はなから　ちょろちょろと　ほのおが\nもれているときは　かぜを　ひいている。\nマグマのなかで　やすませて　あげてね。"
          ultra_moon: "たいおんは　つねに　６００どぜんご。\nブビィが　おっこちると　ちいさな\nいけ　くらいなら　ひあがってしまう。"
        jp_kanji:
          ultra_sun: "鼻から　ちょろちょろと　炎が\n漏れているときは　風邪を　ひいている。\nマグマの中で　休ませて　あげてね。"
          ultra_moon: "体温は　常に　６００度前後。\nブビィが　落っこちると　小さな\n池　くらいなら　干上がってしまう。"
        en:
          ultra_sun: "When flames drip from its nose, that means it\nhas a cold. Have it lie down for a nice rest in\nsome magma."
          ultra_moon: "Its body temperature is always around 1,100\ndegrees Fahrenheit. If Magby falls into a small-\nenough pond, the whole thing will dry up."
        fr:
          ultra_sun: "Lorsque de petites flammes s’échappent\nde son nez, c’est qu’il est enrhumé. Le meilleur\nremède est encore de lui donner un bain de lave."
          ultra_moon: "Sa température corporelle est d’environ 600 °C.\nS’il tombe dans une mare, celle-ci s’évapore\net il n’en reste plus rien."
        it:
          ultra_sun: "Quando dalle narici escono piccole fiamme\ntremule, significa che è raffreddato. In questi\ncasi bisogna farlo riposare nel magma."
          ultra_moon: "Ha una temperatura corporea di circa 600 °C.\nSe cade in un piccolo stagno, può farlo\nevaporare completamente."
        de:
          ultra_sun: "Wenn es kleine Flammen aus seiner Nase\nausstößt, ist es erkältet. Dann sollte man ihm\neine Ruhepause in Magma gönnen."
          ultra_moon: "Seine Körpertemperatur liegt immer bei etwa\n600 °C. Wenn es in einen kleinen See fällt,\ntrocknet dieser komplett aus."
        es:
          ultra_sun: "Cuando se le escapan pequeñas llamaradas por\nel hocico significa que está resfriado y el mejor\nremedio es un buen baño de magma."
          ultra_moon: "Su temperatura corporal ronda los 600 °C. Si\ncae en un pequeño estanque, es capaz de\nevaporarlo por completo."
        ko:
          ultra_sun: "코에서 불꽃이 줄줄 흐른다면\n감기에 걸린 것이다.\n마그마에서 쉬게 해 주자."
          ultra_moon: "체온은 항상 600도 전후다.\n마그비가 물에 떨어지면 작은\n연못 정도는 말라붙어 버린다."
        zh_simp:
          ultra_sun: "当火焰哧溜哧溜地从鼻子里\n漏出来时，就表示它感冒了。\n这时就让它去熔岩里休息会吧。"
          ultra_moon: "体温经常在６００度左右。\n如果鸭嘴宝宝掉到池塘里，\n池塘里的水就会被蒸发干净。"
        zh_trad:
          ultra_sun: "當火焰像打開水龍頭似地不停從\n鼻子冒出來時，就代表牠感冒了。\n這時就讓牠待在熔岩裡休息吧。"
          ultra_moon: "體溫隨時保持在６００度左右。\n如果鴨嘴寶寶掉進小池塘裡，\n整池水馬上就會蒸發殆盡。"
