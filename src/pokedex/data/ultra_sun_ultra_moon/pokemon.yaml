        - water
      egg_groups:
        - water_2
      abilities:
        - swift_swim
      hidden_ability: hydration
      held_items:
        common: heart_scale
      descriptions:
        jp_kana:
          ultra_sun: "ハートがたの　ウロコを　もっていると\nこいびとが　できると　ウワサに　なり\nらんかくされた　じだいも　あった。"
          ultra_moon: "あたたかい　うみの　サンゴしょうが\nすみか。　サニーゴのえだの　あいだで\nねむるのが　とくに　おきにいり。"
        jp_kanji:
          ultra_sun: "ハート型の　ウロコを　持っていると\n恋人が　できると　ウワサに　なり\n乱獲された　時代も　あった。"
          ultra_moon: "暖かい　海の　サンゴ礁が\n棲み処。　サニーゴの枝の　間で\n眠るのが　特に　お気に入り。"
        en:
          ultra_sun: "There was an era when it was overfished due to\nthe rumor that having one of its heart-shaped\nscales would enable you to find a sweetheart."
          ultra_moon: "Luvdisc makes its home in coral reefs in warm\nseas. It especially likes sleeping in the space\nbetween Corsola’s branches."
        fr:
          ultra_sun: "Il fut un temps où les gens le capturaient en\nmasse pour s’approprier ses écailles en forme\nde cœur, supposées porter chance en amour."
          ultra_moon: "Il vit dans les récifs coralliens des mers\nchaudes, et aime particulièrement dormir\nentre les cornes des Corayon."
        it:
          ultra_sun: "In passato è stato vittima di una caccia sfrenata\nper via delle sue scaglie a forma di cuore, che si\nriteneva facessero trovare l’anima gemella."
          ultra_moon: "Vive nelle barriere coralline dei mari caldi.\nAma particolarmente dormire fra le ramificazioni\ndei Corsola."
        de:
          ultra_sun: "Früher wurde es überfischt, weil man glaubte,\nder Besitz einer seiner herzförmigen Schuppen\nführe zu einer erfolgreichen Partnersuche."
          ultra_moon: "Es lebt in den Korallenriffen warmer Meere und\nschläft besonders gern zwischen den Armen\nvon Corasonn."
        es:
          ultra_sun: "Según las leyendas, una escama con forma de\ncorazón brinda suerte en el amor, lo que condujo\ntiempo ha a su pesca excesiva."
          ultra_moon: "Vive en los arrecifes de coral de mares cálidos.\nDormir entre las ramas de los Corsola es algo\npor lo que siente una especial predilección."
        ko:
          ultra_sun: "하트 모양의 비늘을 갖고 있으면\n연인이 생긴다는 소문이 돌아\n남획된 시대도 있었다."
          ultra_moon: "따뜻한 바다의 산호초가 서식지다.\n코산호의 가지 사이에서\n자는 것을 특히 좋아한다."
        zh_simp:
          ultra_sun: "如果拥有它的心形鳞片，\n就能交往到恋人。也曾有个时期\n因为这个谣传而遭到滥捕。"
          ultra_moon: "温暖海域的珊瑚礁是它的栖息地。\n特别喜欢在太阳珊瑚的枝条间睡觉。"
        zh_trad:
          ultra_sun: "傳聞說如果擁有牠的心形鱗片\n就能交到男女朋友，這讓牠\n曾經在某段時期遭到濫捕。"
          ultra_moon: "溫暖海域的珊瑚礁是\n牠的棲息地。最喜歡在\n太陽珊瑚的枝條間睡覺。"
bagon:
  species_id: 371
  names:
    jp_kana: タツベイ
    jp_kanji: タツベイ
    en: Bagon
    fr: Draby
    it: Bagon
    de: Kindwurm
    es: Bagon
    ko: 아공이
    zh_simp: 宝贝龙
    zh_trad: 寶貝龍
