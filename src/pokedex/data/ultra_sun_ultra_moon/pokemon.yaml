      descriptions:
        jp_kana:
          ultra_sun: "うつくしい　けりわざの　つかいて。\nキックボクシングの　チャンピオンも\nいちげきで　ノックアウトするぞ。"
          ultra_moon: "こうげきてきな　きしつの　ポケモンで\nキックの　めいしゅ。　あいてを\nけりあげるたび　たかわらいする。"
        jp_kanji:
          ultra_sun: "美しい　蹴り技の　使い手。\nキックボクシングの　チャンピオンも\n一撃で　ノックアウトするぞ。"
          ultra_moon: "攻撃的な　気質の　ポケモンで\nキックの　名手。　相手を\n蹴り上げるたび　高笑いする。"
        en:
          ultra_sun: "A master of grand and beautiful kicks, it can\nknock out even kickboxing champions with a\nsingle blow."
          ultra_moon: "A Pokémon with an aggressive personality and\na mastery of kicking, it cackles every time it\nkicks an opponent."
        fr:
          ultra_sun: "Ce véritable virtuose du coup de pied peut\nmettre K.O. un champion de kick-boxing\nen une seule frappe."
          ultra_moon: "Ce Pokémon bagarreur possède un jeu de\njambes hors du commun. Il éclate de rire entre\nchaque coup de pied qu’il assène à sa victime."
        it:
          ultra_sun: "Tira calci con grazia ed eleganza. Uno solo\ndei suoi colpi è sufficiente per mandare al\ntappeto anche un campione di kickboxing."
          ultra_moon: "È un Pokémon dal temperamento combattivo.\nLa sua specialità sono i calci e ogni volta che\nne assesta uno scoppia in una sonora risata."
        de:
          ultra_sun: "Seine Kicktechniken sind äußerst grazil. Selbst\nKickbox-Champions kann es mit einem einzigen\nTritt auf die Bretter befördern."
          ultra_moon: "Dieses angriffslustige Pokémon ist für seine\nvirtuosen Tritte berühmt. Mit jedem Kick müssen\nseine Gegner zudem lautes Gelächter ertragen."
        es:
          ultra_sun: "Propina bellas patadas con elegancia. Una sola\nbastaría para dejar fuera de combate a un\ncampeón de kickboxing."
          ultra_moon: "Es un Pokémon combativo y especialista en\npropinar patadas. Suelta una risotada cada vez\nque acierta al oponente."
        ko:
          ultra_sun: "아름다운 발차기의 전문가다.\n킥복싱의 챔피언도\n일격으로 녹아웃시킨다."
          ultra_moon: "공격적인 기질을 가진 포켓몬으로\n킥의 명수다. 상대를\n차올릴 때마다 크게 웃는다."
        zh_simp:
          ultra_sun: "优美的脚踢招式的行家。\n就连搏击冠军也能用\n一招脚踢将对方击倒。"
          ultra_moon: "是具有攻击性的宝可梦，\n也是脚踢的高手。\n每次踢起对手时都会高声大笑。"
        zh_trad:
          ultra_sun: "動作優美的踢技高手。\n就算是面對搏擊冠軍，\n也能一擊將對方打倒。"
          ultra_moon: "攻擊性很強的寶可夢，\n同時也是踢腿高手。\n每次踢飛對手時都會高聲大笑。"
comfey:
  species_id: 764
  names:
    jp_kana: キュワワー
    jp_kanji: キュワワー
    en: Comfey
    fr: Guérilande
    it: Comfey
    de: Curelei
    es: Comfey
    ko: 큐아링
    zh_simp: 花疗环环
    zh_trad: 花療環環
  forms:
    comfey:
      form_id: 0
      base_stats:
        hp: 51
        attack: 52
        defense: 90
        special_attack: 82
        special_defense: 110
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - fairy
      egg_groups:
        - grass
      abilities:
        - flower_veil
        - triage
      hidden_ability: natural_cure
      held_items:
