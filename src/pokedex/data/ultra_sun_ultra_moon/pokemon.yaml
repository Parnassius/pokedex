    zh_simp: 凯罗斯
    zh_trad: 凱羅斯
  forms:
    pinsir:
      form_id: 0
      base_stats:
        hp: 65
        attack: 125
        defense: 100
        special_attack: 55
        special_defense: 70
        speed: 85
      evs_yield:
        hp: 0
