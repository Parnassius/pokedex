        - water_1
        - water_3
      abilities:
        - swift_swim
        - battle_armor
      hidden_ability: weak_armor
      descriptions:
        jp_kana:
          ultra_sun: "３おくねんまえに　さかえた　ポケモン。\nとある　ちほうでは　いまでも　まれに\nいきた　すがたが　みられると　いう。"
          ultra_moon: "ごく　いちぶの　ちいきを　のぞいて\nぜつめつ　してしまった　ポケモン。\nかたい　カラで　みを　まもる。"
        jp_kanji:
          ultra_sun: "３億年前に　栄えた　ポケモン。\nとある　地方では　今でも　まれに\n生きた　姿が　見られると　言う。"
          ultra_moon: "ごく　一部の　地域を　除いて\n絶滅　してしまった　ポケモン。\n硬い　カラで　身を　守る。"
        en:
          ultra_sun: "This Pokémon thrived 300 million years ago. It’s\nsaid that living specimens can still be seen\nin a certain region—a rare sight."
          ultra_moon: "This Pokémon became extinct everywhere,\nexcept in a few areas. It protects itself with its\nhard shell."
        fr:
          ultra_sun: "Un Pokémon qui prospérait il y a 300 millions\nd’années. On raconte que de rares survivants\nsubsistent dans une certaine région."
          ultra_moon: "Ce Pokémon, doté d’une solide carapace\nprotectrice, a totalement disparu de la surface\nde la terre, sauf dans une région particulière."
        it:
          ultra_sun: "Pokémon vissuto 300 milioni di anni fa.\nSi dice che in una certa regione si possano\nancora trovare rarissimi esemplari viventi."
          ultra_moon: "Questo Pokémon si è ormai estinto in tutte le\nregioni tranne una. È protetto da una conchiglia\nrobusta."
        de:
          ultra_sun: "Kabuto erlebte seine Blütezeit vor 300 Millionen\nJahren. Doch in einer bestimmten Region gibt es\nangeblich noch einige lebende Exemplare."
          ultra_moon: "Dieses Pokémon ist überall ausgestorben, mit\nAusnahme einer bestimmten Region. Es schützt\nsich mit einem harten Panzer."
        es:
          ultra_sun: "Este Pokémon vivió hace 300 millones de años,\npero en cierta región se dice que han llegado a\nverse ejemplares vivos hoy en día."
          ultra_moon: "Posee una dura coraza que lo protege. Este\nPokémon se ha extinguido en todo el mundo\nsalvo en una región determinada."
        ko:
          ultra_sun: "3억 년 전에 번성했던 포켓몬.\n어느 지방에서는 지금도 드물게\n살아 있는 모습을 볼 수 있다고 한다."
          ultra_moon: "극히 일부 지역을 제외하고\n멸종해 버린 포켓몬이다.\n단단한 껍질로 몸을 지킨다."
        zh_simp:
          ultra_sun: "３亿年前繁衍兴旺的宝可梦。\n据说在某些地区，至今仍能\n偶尔看见活着的化石盔。"
          ultra_moon: "除某些极少数地方外，\n该宝可梦已基本灭绝。\n会用坚硬的外壳保护身体。"
        zh_trad:
          ultra_sun: "３億年前十分常見的寶可夢。\n據說在某個地區至今仍\n偶爾能看見活著的化石盔。"
          ultra_moon: "除了極少數的區域之外，\n這種寶可夢幾乎已經絕種。\n會用堅硬的外殼保護身體。"
kabutops:
