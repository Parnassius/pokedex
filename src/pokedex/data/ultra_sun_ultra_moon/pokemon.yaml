      descriptions:
        jp_kana:
          ultra_sun: "ながく　あたたかい　けの　おかげで\nさむさは　へっちゃら。　アローラの\nムーランドは　すこし　くるしそうだ。"
          ultra_moon: "ながく　あつでの　たいもうを　もつ。\nむかしは　さむい　ちほうでは　１かに\n１ぴき　ムーランドを　かっていた。"
        jp_kanji:
          ultra_sun: "長く　暖かい　毛の　おかげで\n寒さは　へっちゃら。　アローラの\nムーランドは　少し　苦しそうだ。"
          ultra_moon: "長く　厚手の　体毛を　もつ。\n昔は　寒い　地方では　一家に\n１匹　ムーランドを　飼っていた。"
        en:
          ultra_sun: "It pays no mind to the cold, thanks to its long\nwarm coat. Stoutland in Alola look a\nlittle uncomfortable."
          ultra_moon: "Its fur is long and thick. A long time ago in cold\nregions, every household kept a Stoutland."
        fr:
          ultra_sun: "Son long pelage le protège parfaitement du froid.\nMalheureusement pour lui, cela n’est pas très\nutile à Alola."
          ultra_moon: "Il possède un pelage long et épais. Jadis, dans\nles régions froides, chaque foyer en élevait un."
        it:
          ultra_sun: "Non teme il freddo grazie al manto lungo\ne caldo. Gli Stoutland che vivono ad Alola,\nperò, sembrano soffrire un po’ il caldo."
          ultra_moon: "Ha un manto lungo e folto. In passato, nelle\nregioni fredde ogni famiglia aveva uno Stoutland."
        de:
          ultra_sun: "Dank seines langen, warmen Fells kann ihm die\nKälte nichts anhaben. In Alola hat es daher\nleider mit dem schwülen Klima zu kämpfen."
          ultra_moon: "Es hat langes, dickes Fell. Vor einiger Zeit war\nes in kalten Gegenden üblich, dass jede Familie\nein Bissbark im Haus hielt."
        es:
          ultra_sun: "El largo y cálido pelaje le permite soportar sin\nningún problema el frío, pero resulta un poco\nasfixiante en Alola."
          ultra_moon: "Posee un largo y tupido pelaje. En las regiones\nfrías no había antaño una casa que no tuviese\nun Stoutland."
        ko:
          ultra_sun: "길고 따듯한 털 덕분에\n추위는 걱정 없다. 알로라의\n바랜드는 조금 괴로운 것 같다."
          ultra_moon: "길고 두꺼운 털을 가졌다.\n옛날 추운 지방에서는 한 집에\n1마리씩 바랜드를 키웠다."
        zh_simp:
          ultra_sun: "多亏了那身又长又暖和的毛，\n抵御寒冷根本不在话下。\n阿罗拉的长毛狗看上去有点辛苦。"
          ultra_moon: "拥有又长又厚实的体毛。\n过去在寒冷的地方，\n每家都会养１只长毛狗。"
        zh_trad:
          ultra_sun: "靠著又長又暖的毛皮，\n一點也不怕寒冷的天氣。\n但阿羅拉的長毛狗看起來有點難受。"
          ultra_moon: "有著又長又厚的體毛。\n過去在寒冷的地方，\n每戶人家都會養１隻長毛狗。"
