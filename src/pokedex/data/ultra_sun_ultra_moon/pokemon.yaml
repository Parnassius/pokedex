      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
      egg_groups:
        - water_3
      abilities:
        - hyper_cutter
        - iron_fist
      hidden_ability: anger_point
      held_items:
        rare: aspear_berry
      descriptions:
        jp_kana:
          ultra_sun: "かたい　ハサミは　せめも　まもりも\nとくい。　マケンカニ　どうしの\nたたかいは　ボクシングの　ようだ。"
          ultra_moon: "ヤシのきと　まちがえて　ナッシーに\nのぼることもある。　いかりを　かって\nふりおとされて　ふみつけられる。"
        jp_kanji:
          ultra_sun: "硬い　ハサミは　攻めも　守りも\n得意。　マケンカニ　同士の\n戦いは　ボクシングの　ようだ。"
          ultra_moon: "ヤシの木と　間違えて　ナッシーに\n登ることもある。　怒りを　かって\n振り落とされて　踏みつけられる。"
        en:
          ultra_sun: "Its hard pincers are well suited to both offense\nand defense. Fights between two Crabrawler\nare like boxing matches."
          ultra_moon: "Crabrawler has been known to mistake\nExeggutor for a coconut tree and climb it. The\nenraged Exeggutor shakes it off and stomps it."
        fr:
          ultra_sun: "Ses robustes pinces sont aussi efficaces pour\nl’attaque que pour la défense. Les combats de\nCrabagarre ressemblent à des matchs de boxe."
          ultra_moon: "Il grimpe parfois sur un Noadkoko qu’il a pris\npour un cocotier. Il se fait alors éjecter puis\npiétiner par le Noadkoko courroucé."
        it:
          ultra_sun: "Utilizza le robuste chele sia per attaccare\nche per difendersi. Le lotte tra Crabrawler\nassomigliano molto a incontri di boxe."
          ultra_moon: "A volte si arrampica sugli Exeggutor, prendendoli\nper vere palme. Per tutta risposta, questi si\nadirano, lo scaraventano a terra e lo calpestano."
        de:
          ultra_sun: "Seine harten Scheren eignen sich sowohl für\noffensive als auch defensive Techniken. Kämpfe\nzwischen zwei Krabbox ähneln Boxkämpfen."
          ultra_moon: "Manchmal hält es ein Kokowei für eine Palme\nund klettert es hinauf. Dieses schüttelt es dann\nwütend ab und verpasst ihm einen Tritt."
        es:
          ultra_sun: "Usa hábilmente sus robustas pinzas tanto para\natacar como para defenderse. Las peleas entre\ncongéneres parecen combates de boxeo."
          ultra_moon: "A veces trepa por Exeggutor al confundirlo con\nuna palmera de verdad. Este, presa de la ira, se\ndesembaraza de él a sacudidas y lo pisotea."
        ko:
          ultra_sun: "딱딱한 집게는 공격과 수비에\n모두 능하다. 오기지게끼리의\n싸움은 복싱 같다."
          ultra_moon: "야자나무로 착각하고 나시에\n오르는 일도 있다. 분노를 사\n내동댕이쳐진 다음 짓밟힌다."
        zh_simp:
          ultra_sun: "坚硬的钳子攻守皆宜。\n好胜蟹同类之间的战斗\n就像是拳击一样。"
          ultra_moon: "有时会把椰蛋树错认为椰子树\n而爬上去。惹怒椰蛋树后\n被抖落下来，并遭到踩踏。"
        zh_trad:
          ultra_sun: "堅硬的鉗子攻守皆宜。\n好勝蟹與好勝蟹之間的戰鬥\n就像是拳擊賽一樣。"
          ultra_moon: "有時會錯把椰蛋樹當成椰子樹\n而爬上去。惹怒椰蛋樹的牠會被\n甩下來並遭到踩踏。"
crabominable:
  species_id: 740
  names:
    jp_kana: ケケンカニ
    jp_kanji: ケケンカニ
    en: Crabominable
    fr: Crabominable
    it: Crabominable
    de: Krawell
    es: Crabominable
    ko: 모단단게
    zh_simp: 好胜毛蟹
    zh_trad: 好勝毛蟹
  forms:
    crabominable:
      form_id: 0
      base_stats:
        hp: 97
        attack: 132
        defense: 77
        special_attack: 62
        special_defense: 67
        speed: 43
      evs_yield:
        hp: 0
        attack: 2
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fighting
        - ice
      egg_groups:
        - water_3
      abilities:
        - hyper_cutter
        - iron_fist
      hidden_ability: anger_point
      held_items:
        rare: cheri_berry
      descriptions:
        jp_kana:
          ultra_sun: "ハサミの　なかに　れいきを　ためて\nぶんなぐる。　ぶあつい　こおりの\nかべも　こなごなに　してしまうぞ。"
          ultra_moon: "かんがえるより　まず　なぐってみる。\nゆきなだれを　パンチの　ラッシュで\nおしかえしたという　きろくも　ある。"
        jp_kanji:
          ultra_sun: "ハサミの　中に　冷気を　溜めて\nぶん殴る。　分厚い　氷の\n壁も　粉々に　してしまうぞ。"
          ultra_moon: "考えるより　まず　殴ってみる。\nゆきなだれを　パンチの　ラッシュで\n押し返したという　記録も　ある。"
        en:
          ultra_sun: "It stores coldness in its pincers and pummels its\nfoes. It can even smash thick walls of ice\nto bits!"
          ultra_moon: "Before it stops to think, it just starts pummeling.\nThere are records of its turning back\navalanches with a flurry of punches."
        fr:
          ultra_sun: "Il concentre le froid dans ses pinces avant de\nfrapper. Ses coups sont suffisamment puissants\npour réduire un épais mur de glace en morceaux."
          ultra_moon: "Agir ou réfléchir ? Crabominable choisit de\nfrapper ! On raconte qu’il serait déjà parvenu\nà repousser une avalanche à coups de pince."
        it:
          ultra_sun: "Accumula aria fredda all’interno delle chele\nper poi picchiare duro. Riesce a sbriciolare\nanche spessi muri di ghiaccio."
          ultra_moon: "Attacca subito, senza pensarci due volte.\nSecondo alcune testimonianze, ha fermato\nuna valanga con una raffica di pugni."
        de:
          ultra_sun: "Es speichert kalte Luft in seinen Scheren. Wenn\nes mit diesen um sich schlägt, kann es selbst\ndicke Eiswände zerbröckeln."
          ultra_moon: "Es denkt nicht lange nach und schlägt einfach\nzu. Laut manchen Berichten kann es mit seinen\nschnellen Schlägen selbst Lawinen stoppen."
        es:
          ultra_sun: "En el interior de las pinzas acumula aire gélido.\nLos golpes que asesta son capaces de hacer\nañicos incluso gruesas paredes de hielo."
          ultra_moon: "No se lo piensa dos veces a la hora de zurrar.\nSe tiene constancia de que sus puñetazos\nfrenéticos han llegado a detener aludes."
        ko:
          ultra_sun: "집게 안에 냉기를 모아\n때려눕힌다. 두꺼운 얼음벽도\n가루로 만들어 버린다."
          ultra_moon: "생각하기보다는 일단 때리고 본다.\n눈사태를 펀치 러시로\n되받아쳤다는 기록도 있다."
        zh_simp:
          ultra_sun: "在钳子中积蓄冷气，然后猛殴。\n即使是很厚的冰壁也能打得粉碎。"
          ultra_moon: "比起思考，会先试着打打看。\n曾经有过用拳头猛攻\n打退雪崩的记录。"
        zh_trad:
          ultra_sun: "會將寒氣聚集在鉗子中\n然後用力痛毆。就算是\n厚厚的冰壁也能打得粉碎。"
          ultra_moon: "習慣不經過大腦先動手打了再說。\n以前曾有過用連續不斷的拳擊\n把雪崩推回去的紀錄。"
oricorio:
