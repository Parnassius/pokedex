    fr: "Un contact avec le\nPokémon peut paralyser."
    it: "Al contatto subito, può\ncausare paralisi."
    de: "Kann bei Berührung\nparalysieren."
    es: "Puede paralizar al\nmínimo contacto."
    ko: "접촉한 상대를\n마비시킬 때가 있다."
steadfast:
  names:
    jp_kana: ふくつのこころ
    en: Steadfast
    fr: Impassible
    it: Cuordeciso
    de: Felsenfest
    es: Impasible
    ko: 불굴의마음
  descriptions:
    jp_kana: "ひるむ　たびに\nすばやさが　あがる。"
    en: "Raises Speed each time\nthe Pokémon flinches."
    fr: "Augmente la Vitesse quand\nle Pokémon a peur."
    it: "Aumenta la Velocità se\nil Pokémon tentenna."
    de: "Erhöht Initiative, sobald\nPokémon zurückschreckt."
    es: "Cada vez que retrocede\nsube su Velocidad."
    ko: "풀죽을 때마다\n스피드가 올라간다."
stench:
  names:
    jp_kana: あくしゅう
    en: Stench
    fr: Puanteur
    it: Tanfo
    de: Duftnote
    es: Hedor
    ko: 악취
  descriptions:
    jp_kana: "やせいの　ポケモンが\nよりつき　にくくなる。"
    en: "The stench helps keep\nwild Pokémon away."
    fr: "La puanteur peut repous-\nser les Pokémon sauvages."
    it: "Questo tanfo allontana\ni Pokémon selvatici."
    de: "Hilft, wilde Pokémon\nfernzuhalten."
    es: "El olor ayuda a mantener\nlejos Pokémon salvajes."
    ko: "야생 포켓몬이\n접근하기 어려워진다."
sticky_hold:
  names:
    jp_kana: ねんちゃく
    en: Sticky Hold
    fr: Glue
    it: Antifurto
    de: Wertehalter
    es: Viscosidad
