    fr: "Augmente l’esquive si le\nPokémon est confus."
    it: "Aumenta l’elusione se\nil Pokémon è confuso."
    de: "Erhöht Fluchtwert, wenn\ndas Pokémon verwirrt ist."
    es: "Sube la evasión si el\nPokémon está confuso."
    ko: "혼란에 빠져있으면\n회피하기 쉬워진다."
technician:
  names:
    jp_kana: テクニシャン
