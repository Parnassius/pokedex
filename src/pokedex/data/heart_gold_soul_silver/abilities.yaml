    fr: "Booste les capacités\nInsecte en cas de besoin."
    it: "In difficoltà potenzia le\nmosse di tipo Coleottero."
    de: "Stärkt Käfer-Attacken\nin Not."
    es: "Potencia los ataques de\ntipo Bicho en un apuro."
    ko: "위급할 때 벌레타입의\n위력이 올라간다."
swift_swim:
  names:
    jp_kana: すいすい
