  descriptions:
    jp_kana: "どく　まひ　やけどを\nあいてに　うつす。"
    en: "Passes a burn, poison,\nor paralysis to the foe."
    fr: "Transmet brûlure, poison\nou paralysie à l’ennemi."
    it: "Passa veleno, paralisi o\nscottatura al nemico."
    de: "Gibt Verbrennung, Ver-\ngiftung u. Paraly. an Geg."
    es: "Pasa envenenamiento,\nparálisis y quemaduras."
    ko: "독, 마비, 화상을\n상대에게 옮긴다."
tangled_feet:
  names:
    jp_kana: ちどりあし
    en: Tangled Feet
    fr: Pieds Confus
    it: Intricopiedi
    de: Fußangel
    es: Tumbos
