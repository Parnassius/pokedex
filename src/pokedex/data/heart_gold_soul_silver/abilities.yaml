    fr: "Protège des capacités\nmettant K.O. en un coup."
    it: "Protegge dalle mosse che\ncausano KO in un colpo."
    de: "Schutz gegen\nK.O.-Treffer-Angriffe."
    es: "Protege de movimientos\nque dejan KO de 1 golpe."
    ko: "일격 필살기가\n통하지 않는다."
suction_cups:
  names:
    jp_kana: きゅうばん
    en: Suction Cups
    fr: Ventouse
    it: Ventose
    de: Saugnapf
    es: Ventosas
    ko: 흡반
  descriptions:
    jp_kana: "いれかえさせる　わざが\nきかない。"
    en: "Negates foes’ moves that\nforce switching out."
    fr: "Annule les cap. forçant\nà changer de Pokémon."
    it: "Resiste alle mosse che\ncomportano sostituzione."
    de: "Neg. gegn. Att., die PKMN\naustauschen würden."
    es: "Anula movimientos rivales\nque fuerzan el relevo."
    ko: "교체시킨 기술이\n효과를 발휘하지 못한다."
super_luck:
  names:
    jp_kana: きょううん
