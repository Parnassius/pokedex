    ko: 가속
  descriptions:
    jp_kana: "ちょっとずつ\nすばやく　なっていく。"
    en: "Its Speed stat is\ngradually boosted."
    fr: "La Vitesse du Pokémon\naugmente progressivement."
    it: "Graduale aumento della\nVelocità del Pokémon."
    de: "Erhöht Initiative nach\nund nach."
    es: "Aumenta la Velocidad\ngradualmente."
    ko: "조금씩\n스피드가 높아진다."
stall:
  names:
    jp_kana: あとだし
    en: Stall
    fr: Frein
    it: Rallentatore
    de: Zeitspiel
    es: Rezagado
    ko: 시간벌기
