    fr: "Attaque toujours après \nl’ennemi, même plus lent."
    it: "Anche i nemici più lenti\nattaccano per primi."
    de: "Das Pokémon bewegt sich \nnach weniger agilen Gegn."
    es: "El Pokémon se mueve\ntras el rival más lento."
    ko: "상대보다 재빨라도\n행동이 느려진다."
static:
  names:
    jp_kana: せいでんき
    en: Static
    fr: Statik
    it: Statico
    de: Statik
    es: Elec. Estát.
    ko: 정전기
  descriptions:
    jp_kana: "さわった　あいてを\nまひさせる　ことがある。"
