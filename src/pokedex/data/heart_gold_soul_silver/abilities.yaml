    jp_kana: "あめのとき　すばやさが\nあがる。"
    en: "Boosts the Pokémon’s\nSpeed in rain."
    fr: "Augmente la Vitesse du\nPokémon s’il pleut."
    it: "Dà al Pokémon più\nVelocità nella pioggia."
    de: "Steigert Initiative bei\nRegen."
    es: "Sube la Velocidad cuando\nhay lluvia."
    ko: "비가 올 때 스피드가\n올라간다."
synchronize:
  names:
    jp_kana: シンクロ
    en: Synchronize
    fr: Synchro
    it: Sincronismo
    de: Synchro
