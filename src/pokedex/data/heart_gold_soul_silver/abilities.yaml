    fr: "Attire les attaques Eau\nvisant un Pokémon."
    it: "Il Pokémon attira tutte\nle mosse di tipo Acqua."
    de: "Zieht offens. Wasser-Att.\nan, die auf 1 PKMN zielen."
    es: "Atrae ataques de tipo\nAgua lanzados a un PKMN."
    ko: "물타입의 기술을\n모두 자신이 맞는다."
sturdy:
  names:
    jp_kana: がんじょう
    en: Sturdy
    fr: Fermeté
    it: Vigore
    de: Robustheit
    es: Robustez
    ko: 옹골참
  descriptions:
    jp_kana: "いちげきひっさつが\nきかない。"
