adaptability:
  names:
    jp_kana: てきおうりょく
    en: Adaptability
    fr: Adaptabilité
    it: Adattabilità
    de: Anpassung
    es: Adaptable
    ko: 적응력
  descriptions:
    jp_kana: "タイプが　おなじ　わざの\nいりょくが　あがる。"
    en: "Powers up moves of the\nsame type."
    fr: "Augmente la puissance des\ncapacités de même type."
    it: "Potenzia le mosse del\ntipo del Pokémon."
    de: "Steigert Attacken\ndesselben Typs."
    es: "Potencia los movimientos\ndel mismo tipo."
    ko: "타입이 같은 기술의\n위력이 올라간다."
aftermath:
  names:
    jp_kana: ゆうばく
    en: Aftermath
    fr: Boom Final
    it: Scoppio
    de: Finalschlag
    es: Resquicio
    ko: 유폭
  descriptions:
    jp_kana: "ひんしの　ときに　ふれた\nあいてに　ダメージ。"
    en: "Damages the foe landing\nthe finishing hit."
    fr: "Blesse l’ennemi qui \nporte le coup de grâce."
    it: "Arreca danno al nemico\nsferrante il colpo da KO."
    de: "Schadet dem Gegn., der\nfinale Attacke landet."
    es: "Daña al rival que le ha\ndado el golpe de gracia."
    ko: "기절할 때 스친\n상대에게 데미지를 준다."
air_lock:
  names:
    jp_kana: エアロック
    en: Air Lock
    fr: Air Lock
    it: Riparo
    de: Klimaschutz
    es: Bucle Aire
    ko: 에어록
  descriptions:
    jp_kana: "てんきの　えいきょうが\nなくなる。"
    en: "Eliminates the effects of\nweather."
    fr: "Annule les effets du\nclimat."
    it: "Neutralizza gli effetti\nmeteo."
    de: "Eliminiert die Wirkung\ndes Wetters."
    es: "Anula los efectos del\ntiempo atmosférico."
    ko: "날씨의 영향이\n없어진다."
anger_point:
  names:
    jp_kana: いかりのつぼ
    en: Anger Point
    fr: Colérique
    it: Grancollera
    de: Kurzschluss
    es: Irascible
    ko: 분노의경혈
  descriptions:
    jp_kana: "きゅうしょに　うけると\nこうげきが　あがる。"
    en: "Raises Attack upon\ntaking a critical hit."
    fr: "Monte l’Attaque au max.\naprès un coup critique."
    it: "Massimizza l’Attacco\ndopo un brutto colpo."
    de: "Maximiert Angriff n. Ein-\nstecken e. Volltreffers."
    es: "Potencia el Ataque tras\nrecibir un golpe crítico."
    ko: "급소에 맞으면\n공격이 올라간다."
anticipation:
  names:
    jp_kana: きけんよち
    en: Anticipation
    fr: Anticipation
    it: Presagio
    de: Vorahnung
    es: Anticipación
    ko: 위험예지
  descriptions:
    jp_kana: "あいての　もつ　きけんな\nわざを　さっちする。"
    en: "Senses the foe’s\ndangerous moves."
    fr: "Prévoit les capacités\nennemies dangereuses."
    it: "Rivela se il nemico ha\nmosse pericolose."
    de: "Ahnt gefährliche Attacken\ndes Gegners voraus."
    es: "Prevé los movimientos\npeligrosos del rival."
    ko: "상대가 지닌 위험한\n기술을 감지한다."
arena_trap:
  names:
    jp_kana: ありじごく
    en: Arena Trap
    fr: Piège
    it: Trappoarena
    de: Auswegslos
    es: Trampa Arena
    ko: 개미지옥
  descriptions:
    jp_kana: "せんとうで　あいてを\nにげられなくする。"
    en: "Prevents the foe from\nfleeing."
    fr: "Empêche l’ennemi de\ns’enfuir."
    it: "Impedisce la fuga al\nnemico."
    de: "Verhindert Flucht\ndes Gegners."
    es: Evita que el rival huya.
    ko: "배틀에서 상대를\n도망칠 수 없게 한다."
bad_dreams:
  names:
    jp_kana: ナイトメア
    en: Bad Dreams
    fr: Mauvais Rêve
    it: Sogniamari
    de: Alptraum
    es: Mal Sueño
    ko: 나이트메어
  descriptions:
    jp_kana: "ねむっている　あいての\nＨＰを　へらす。"
    en: "Reduces a sleeping\nfoe’s HP."
    fr: "Réduit les PV d’un ennemi\nendormi."
    it: "Riduce i PS dei nemici\naddormentati."
    de: "Senkt die KP eines\nschlafenden Gegners."
    es: "Reduce los PS de un rival\nmientras duerme."
    ko: "잠들어 있는 상대의\nHP를 줄인다."
battle_armor:
  names:
    jp_kana: カブトアーマー
    en: Battle Armor
    fr: Armurbaston
    it: Lottascudo
    de: Kampfpanzer
    es: Armad. Bat.
    ko: 전투무장
  descriptions:
    jp_kana: "あいての　こうげきが\nきゅうしょに　あたらない。"
    en: "The Pokémon is protected\nagainst critical hits."
    fr: "Le Pokémon est protégé\ndes coups critiques."
    it: "Evita che il Pokémon\nsubisca brutti colpi."
    de: Wehrt Volltreffer ab.
    es: Bloquea golpes críticos.
    ko: "상대의 공격이\n급소에 맞지 않는다."
blaze:
  names:
    jp_kana: もうか
    en: Blaze
    fr: Brasier
    it: Aiutofuoco
    de: Großbrand
    es: Mar Llamas
    ko: 맹화
  descriptions:
    jp_kana: "ピンチのとき　ほのおの\nいりょくが　あがる。"
    en: "Powers up Fire-type\nmoves in a pinch."
    fr: "Booste les capacités\nFeu en cas de besoin."
    it: "In difficoltà potenzia\nle mosse di tipo Fuoco."
    de: "Stärkt Feuer-Attacken\nin Not."
    es: "Potencia los ataques de\ntipo Fuego en un apuro."
    ko: "위급할 때 불꽃타입의\n위력이 올라간다."
chlorophyll:
  names:
    jp_kana: ようりょくそ
    en: Chlorophyll
    fr: Chlorophyle
    it: Clorofilla
    de: Chlorophyll
    es: Clorofila
    ko: 엽록소
  descriptions:
    jp_kana: "はれのとき　すばやさが\nあがる。"
    en: "Boosts the Pokémon’s\nSpeed in sunshine."
    fr: "Augmente la Vitesse du\nPokémon s’il y a du soleil."
    it: "Aumenta Velocità del\nPokémon se c’è il sole."
    de: "Steigert Initiative bei\nSonnenschein."
    es: "Sube la Velocidad cuando\nhay sol."
    ko: "맑을 때 스피드가\n올라간다."
clear_body:
  names:
    jp_kana: クリアボディ
    en: Clear Body
    fr: Corps Sain
    it: Corpochiaro
    de: Neutraltorso
    es: Cuerpo Puro
    ko: 클리어바디
  descriptions:
    jp_kana: "あいてに　のうりょくを\nさげられない。"
    en: "Prevents its stats from\nbeing lowered."
    fr: "Peut empêcher les stats\ndu Pokémon de baisser."
    it: "Evita la riduzione delle\nstatistiche, se subita."
    de: "Verhindert Absenken\nder Statuswerte evtl."
    es: "Puede evitar que bajen\nlas características."
    ko: "상대가 능력을\n떨어뜨릴 수 없다."
cloud_nine:
  names:
    jp_kana: ノーてんき
    en: Cloud Nine
    fr: Ciel Gris
    it: Antimeteo
    de: Wolke Sieben
    es: Aclimatación
    ko: 날씨부정
  descriptions:
    jp_kana: "てんきの　えいきょうが\nなくなる。"
    en: "Eliminates the effects of\nweather."
    fr: "Annule les effets du\nclimat."
    it: "Neutralizza gli effetti\nmeteo."
    de: Keine Wetter-Effekte.
    es: "Anula los efectos del\ntiempo atmosférico."
    ko: "날씨의 영향이\n없어진다."
color_change:
  names:
    jp_kana: へんしょく
    en: Color Change
    fr: Déguisement
    it: Cambiacolore
    de: Farbwechsel
    es: Cambio Color
    ko: 변색
  descriptions:
    jp_kana: "うけた　わざの　タイプに\nへんかする。"
    en: "Changes the Pokémon’s\ntype to the foe’s move."
    fr: "Le Pokémon adopte le type\nde la capacité ennemie."
    it: "Cambia il tipo del Pokémon\nsecondo la mossa subita."
    de: "Typ des Anwenders wird zu\ndem der gegnerischen Att."
    es: "Cambia el tipo al del\nmovimiento rival."
    ko: "받은 기술의 타입으로\n변화한다."
compound_eyes:
  names:
    jp_kana: ふくがん
    en: Compoundeyes
    fr: Oeil Composé
    it: Insettocchi
    de: Facettenauge
    es: Ojocompuesto
    ko: 복안
  descriptions:
    jp_kana: "わざの　めいちゅうりつが\nあがる。"
    en: "The Pokémon’s accuracy\nis boosted."
    fr: "Augmente la précision du\nPokémon."
    it: "Aumenta la precisione\ndel Pokémon."
    de: Steigert Genauigkeit.
    es: Aumenta la precisión.
    ko: "기술의 명중률이\n올라간다."
cute_charm:
  names:
    jp_kana: メロメロボディ
    en: Cute Charm
    fr: Joli Sourire
    it: Incantevole
    de: Charmebolzen
    es: Gran Encanto
    ko: 헤롱헤롱바디
  descriptions:
    jp_kana: "ふれると　メロメロに\nすることがある。"
    en: "Contact with the Pokémon\nmay cause infatuation."
    fr: "Séduit parfois l’ennemi\nau contact."
    it: "Al contatto subito, il\nnemico può infatuarsi."
    de: "Kann bei Kontakt\nbetörend wirken."
    es: "Tocar al Pokémon puede\ncausar enamoramiento."
    ko: "스치면 헤롱헤롱 상태가\n될 때가 있다."
damp:
  names:
    jp_kana: しめりけ
    en: Damp
    fr: Moiteur
    it: Umidità
    de: Feuchtigkeit
    es: Humedad
    ko: 습기
  descriptions:
    jp_kana: "だれも　じばくが\nできなくなる。"
    en: "Prevents combatants\nfrom self-destructing."
    fr: "Empêche les combattants\nde s’autodétruire."
    it: "L’autodistruzione di chi\nè in campo è impedita."
    de: "Verhindert Selbstzer-\nstörung der Kämpfenden."
    es: "Evita que se\nautodestruyan."
    ko: "누구도 자폭\n할 수 없게 된다."
download:
  names:
    jp_kana: ダウンロード
    en: Download
    fr: Télécharge
    it: Download
    de: Download
    es: Descarga
    ko: 다운로드
  descriptions:
    jp_kana: "あいての　のうりょくを\nみて　つよさを　かえる。"
    en: "Adjusts power according\nto the foe’s ability."
    fr: "Ajuste la puissance selon\nl’ennemi."
    it: "Regola la potenza in base\nal nemico."
    de: "Passt Kraft entsprechend\nder gegn. Statuswerte an."
    es: "Adapta su fuerza para\ncada rival."
    ko: "상대의 능력을\n보고 능력치를 바꾼다."
drizzle:
  names:
    jp_kana: あめふらし
    en: Drizzle
    fr: Crachin
    it: Piovischio
    de: Niesel
    es: Llovizna
    ko: 잔비
  descriptions:
    jp_kana: "せんとうに　でると\nあめを　ふらす。"
    en: "The Pokémon makes it rain\nif it appears in battle."
    fr: "Le Pokémon invoque la pluie\nquand il entre au combat."
    it: "Se scende in campo, il\nPokémon attira pioggia."
    de: "Ruft im Kampf\nRegen herbei."
    es: "Hace que llueva cuando\nentra en combate."
    ko: "배틀에 나가면\n비를 내린다."
drought:
  names:
    jp_kana: ひでり
    en: Drought
    fr: Sécheresse
    it: Siccità
    de: Dürre
    es: Sequía
    ko: 가뭄
  descriptions:
    jp_kana: "せんとうに　でると\nにほんばれに　なる。"
    en: "The Pokémon makes it\nsunny if it is in battle."
    fr: "Invoque le soleil quand il\nest au combat."
    it: "Il Pokémon fa uscire\nil sole nella lotta."
    de: Erzeugt Sonne im Kampf.
    es: "El sol sale si el Pokémon\nentra en combate."
    ko: "배틀에 나가면\n쾌청이 된다."
dry_skin:
  names:
    jp_kana: かんそうはだ
    en: Dry Skin
    fr: Peau Sèche
    it: Pellearsa
    de: Trockenheit
    es: Piel Seca
    ko: 건조피부
  descriptions:
    jp_kana: "あついと　ＨＰが　へる。\nみずで　ＨＰを　かいふく。"
    en: "Reduces HP if it is hot.\nWater restores HP."
    fr: "Perd des PV à la chaleur.\nL’eau les restaure."
    it: "Riduce PS se fa caldo.\nL’acqua ridà PS."
    de: "Heißes Wetter reduziert\nKP. Wasser steigert KP."
    es: "Pierde PS si hace calor.\nLos recupera con agua."
    ko: "더우면 HP가 줄어든다.\n물로 HP를 회복한다."
early_bird:
  names:
    jp_kana: はやおき
    en: Early Bird
    fr: Matinal
    it: Sveglialampo
    de: Frühwecker
    es: Madrugar
    ko: 일찍기상
  descriptions:
    jp_kana: おきるのが　はやくなる。
    en: "The Pokémon awakens\nquickly from sleep."
    fr: "Le Pokémon se réveille\nplus rapidement."
    it: "Il Pokémon si risveglia\nrapidamente dal sonno."
    de: Schnelles Aufwachen.
    es: "El Pokémon se despierta\nrápidamente."
    ko: "잠듦 상태에서\n빨리 깨어난다."
effect_spore:
  names:
    jp_kana: ほうし
    en: Effect Spore
    fr: Pose Spore
    it: Spargispora
    de: Sporenwirt
    es: Efec. Espora
    ko: 포자
  descriptions:
    jp_kana: "ふれると　どく　まひ\nねむりに　することがある。"
    en: "Contact may paralyze,\npoison, or cause sleep."
    fr: "Peut paralyser, empoison-\nner, endormir au contact."
    it: "Al contatto può causare\nVLN, PAR o DRM."
    de: "Bei Kontakt evtl. Paraly.,\nVergiftg. oder Schlaf."
    es: "Puede dormir, envenenar\no paralizar al contacto."
    ko: "스치면 독, 마비, 잠듦\n상태가 될 때가 있다."
filter:
  names:
    jp_kana: フィルター
    en: Filter
    fr: Filtre
    it: Filtro
    de: Filter
    es: Filtro
    ko: 필터
  descriptions:
    jp_kana: "こうかばつぐん　のとき\nいりょくを　よわめる。"
    en: "Reduces damage from\nsupereffective attacks."
    fr: "Affaiblit les capacités\n“super efficaces”."
    it: "Riduce la potenza delle\nmosse superefficaci."
    de: "Senkt die Stärke sehr\neffektiver Attacken."
    es: "Mitiga los movimientos\nsupereficaces."
    ko: "효과가 굉장한 기술의\n위력을 약하게 한다."
flame_body:
  names:
    jp_kana: ほのおのからだ
    en: Flame Body
    fr: Corps Ardent
    it: Corpodifuoco
    de: Flammkörper
    es: Cuerpo Llama
    ko: 불꽃몸
  descriptions:
    jp_kana: "ふれた　あいてを　やけど\nさせることがある。"
    en: "Contact with the Pokémon\nmay burn the foe."
    fr: "Peut brûler l’ennemi s’il y\na contact."
    it: "Il contatto subito può\nscottare il nemico."
    de: "Kann bei Kontakt zu\nVerbrennung führen."
    es: "Puede quemar al mínimo\ncontacto."
    ko: "접촉한 상대에게\n화상을 입힐 때가 있다."
flash_fire:
  names:
    jp_kana: もらいび
    en: Flash Fire
    fr: Torche
    it: Fuocardore
    de: Feuerfänger
    es: Absor. Fuego
    ko: 타오르는불꽃
  descriptions:
    jp_kana: "ほのおを　うけると\nほのおわざが　つよくなる。"
    en: "It powers up Fire-type\nmoves if it’s hit by one."
    fr: "Booste capacités Feu si\ntouché par attaques Feu."
    it: "Potenzia le mosse fuoco\nse colpiti dalle stesse."
    de: "Verstärkt Feuer-A., wenn\nv. Feuer-A. getroffen."
    es: "Potencia movs. tipo Fuego\ntras ataques tipo Fuego."
    ko: "불꽃을 받으면\n불꽃 기술이 강해진다."
flower_gift:
  names:
    jp_kana: フラワーギフト
    en: Flower Gift
    fr: Don Floral
    it: Regalfiore
    de: Pflanzengabe
    es: Don Floral
    ko: 플라워기프트
  descriptions:
    jp_kana: "はれのとき　じぶんと\nみかたが　つよくなる。"
    en: "Powers up party Pokémon\nwhen it is sunny."
    fr: "Pokémon de l’équipe plus\npuissants au soleil."
    it: "Potenzia i Pokémon della\nsquadra se c’è il sole."
    de: "Steigert Effektivität von\nTeam-Pokémon bei Sonne."
    es: "Potencia los Pokémon del\nequipo si está soleado."
    ko: "맑을 때 자신과\n같은 편이 강해진다."
forecast:
  names:
    jp_kana: てんきや
    en: Forecast
    fr: Météo
    it: Previsioni
    de: Prognose
    es: Predicción
    ko: 기분파
  descriptions:
    jp_kana: "てんきで　ポワルンが\nへんかする。"
    en: "CASTFORM transforms with\nthe weather."
    fr: "MORPHEO change de forme\nselon le climat."
    it: "L’aspetto di CASTFORM\ncambia in base al tempo."
    de: "FORMEO verändert seine\nForm abhängig vom Wetter."
    es: "Cambia con el tiempo\natmosférico."
    ko: "날씨에 따라\n캐스퐁이 변화한다."
forewarn:
  names:
    jp_kana: よちむ
    en: Forewarn
    fr: Prédiction
    it: Premonizione
    de: Vorwarnung
    es: Alerta
    ko: 예지몽
  descriptions:
    jp_kana: "あいての　もつ　わざを\nよみとることが　できる。"
    en: "Determines what moves\nthe foe has."
    fr: "Découvre la capacité\nennemie la plus puissante."
    it: "Scopre la mossa più\npotente del nemico."
    de: "Gibt Auskunft über die\nstärkste gegn. Attacke."
    es: "Determina el movimiento\nmás potente del rival."
    ko: "상대가 지닌 기술을\n꿰뚫어볼 수 있다."
frisk:
  names:
    jp_kana: おみとおし
    en: Frisk
    fr: Fouille
    it: Indagine
    de: Schnüffler
    es: Cacheo
    ko: 통찰
  descriptions:
    jp_kana: "あいての　もちものを\nしることが　できる。"
    en: "The Pokémon can check\nthe foe’s held item."
    fr: "Permet de connaître\nl’objet tenu par l’ennemi."
    it: "Il Pokémon scopre che\nstrumento ha il nemico."
    de: "Gibt Auskunft über\ngegnerische Items."
    es: "El Pokémon puede ver el\nobjeto que lleva el rival."
    ko: "상대가 지닌 물건을\n알 수 있다."
gluttony:
  names:
    jp_kana: くいしんぼう
    en: Gluttony
    fr: Gloutonnerie
    it: Voracità
    de: Völlerei
    es: Gula
    ko: 먹보
  descriptions:
    jp_kana: "きのみを　いつもより\nはやく　つかう。"
    en: "Encourages the early use\nof a held Berry."
    fr: "Encourage l’utilisation\nd’une Baie tenue."
    it: "Favorisce l’uso rapido\ndi una Bacca tenuta."
    de: "Ermutigt zum frühzeitigen\nVerwenden einer Beere."
    es: "Fomenta el uso rápido de\nla Baya que porta."
    ko: "나무열매를 여느 때보다\n빨리 사용한다."
guts:
  names:
    jp_kana: こんじょう
    en: Guts
    fr: Cran
    it: Dentistretti
    de: Adrenalin
    es: Agallas
    ko: 근성
  descriptions:
    jp_kana: "じょうたい　いじょうで\nこうげきが　あがる。"
    en: "Boosts Attack if there is\na status problem."
    fr: "Augmente l’Attaque s’il y\na un problème de statut."
    it: "Aumenta l’Attacco in\ncaso di problemi di stato."
    de: "Steigert Angriff bei\nStatusproblemen."
    es: "Sube el Ataque si sufre\nun problema de estado."
    ko: "상태 이상이 되면\n공격이 올라간다."
heatproof:
  names:
    jp_kana: たいねつ
    en: Heatproof
    fr: Ignifuge
    it: Antifuoco
    de: Hitzeschutz
    es: Ignífugo
    ko: 내열
  descriptions:
    jp_kana: "ほのお　わざの\nいりょくを　よわめる。"
    en: "Weakens the power of\nFire-type moves."
    fr: "Réduit la puissance des\ncapacités de type Feu."
    it: "Indebolisce l’effetto di\nmosse di tipo Fuoco."
