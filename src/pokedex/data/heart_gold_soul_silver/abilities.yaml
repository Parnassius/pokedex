    fr: "Augmente la fréquence\ndes coups critiques."
    it: "Maggiore probabilità di\ninfliggere brutti colpi."
    de: "Erhöht die Chance auf\neinen Volltreffer."
    es: "Aumenta la probabilidad\nde dar golpes críticos."
    ko: "상대의 급소에\n공격이 맞기 쉽다."
swarm:
  names:
    jp_kana: むしのしらせ
