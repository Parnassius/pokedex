    fr: "Augmente la résistance\naux cap. Feu et Glace."
    it: "Protegge meglio da mosse\ndi tipo Fuoco e Ghiaccio."
    de: "Schutz vor Hitze\nund Kälte."
    es: "Protege de los ataques\nde tipo Fuego y Hielo."
    ko: "불꽃과 얼음타입의\n기술에 강하다."
tinted_lens:
  names:
    jp_kana: いろめがね
    en: Tinted Lens
    fr: Lentiteintée
    it: Lentifumé
    de: Aufwertung
    es: Cromolente
    ko: 색안경
  descriptions:
    jp_kana: "こうかいまひとつ　のとき\nわざを　つよめる。"
    en: "Powers up “not very\neffective” moves."
    fr: "Améliore les capacités\n“pas très efficaces”."
    it: "Potenzia le mosse\n“non molto efficaci”."
    de: "Steigert nicht sehr\neffektive Attacken."
    es: "Potencia los movimientos\n“poco eficaces”."
    ko: "효과가 별로인 기술이\n강해진다."
torrent:
  names:
    jp_kana: げきりゅう
    en: Torrent
    fr: Torrent
    it: Acquaiuto
    de: Sturzbach
    es: Torrente
    ko: 급류
  descriptions:
    jp_kana: "ピンチのとき　みずの\nいりょくが　あがる。"
    en: "Powers up Water-type\nmoves in a pinch."
    fr: "Booste les capacités\nEau en cas de besoin."
    it: "In difficoltà potenzia\nle mosse di tipo Acqua."
    de: "Stärkt Wasser-Attacken\nin Not."
    es: "Potencia los ataques de\ntipo Agua en un apuro."
    ko: "위급할 때 물타입의\n위력이 올라간다."
trace:
  names:
    jp_kana: トレース
    en: Trace
    fr: Calque
    it: Traccia
    de: Fährte
    es: Rastro
    ko: 트레이스
  descriptions:
    jp_kana: "あいてと　おなじ\nとくせいに　なる。"
    en: "The Pokémon copies the\nfoe’s ability."
    fr: "Imite la capacité spéciale\nde l’ennemi."
    it: Copia l’abilità del nemico.
    de: "Das Pokémon kopiert \nFähigkeit des Gegners."
    es: "El Pokémon copia la\nhabilidad del rival."
    ko: "상대와 같은\n특성이 된다."
truant:
  names:
    jp_kana: なまけ
    en: Truant
    fr: Absentéisme
    it: Pigrone
    de: Schnarchnase
    es: Ausente
    ko: 게으름
  descriptions:
    jp_kana: "こうげきが　れんぞくで\nだせない。"
    en: "Pokémon can’t attack\non consecutive turns."
    fr: "Le Pokémon ne frappe\nqu’un tour sur deux."
    it: "Il Pokémon può attaccare\nun turno sì e uno no."
    de: "Greift nur in jedem\n2. Zug an."
    es: "El Pokémon no atacará en\nturnos consecutivos."
    ko: "연속으로\n공격할 수 없다."
unaware:
  names:
    jp_kana: てんねん
    en: Unaware
    fr: Inconscient
    it: Imprudenza
    de: Unkenntnis
    es: Ignorante
    ko: 천진
  descriptions:
    jp_kana: "あいての　のうりょくの\nへんかを　むしする。"
    en: "Ignores any change in\nability by the foe."
    fr: "Ignore les changements de\nstats de l’ennemi."
    it: "Ignora gli aumenti delle\nstatistiche del nemico."
    de: "Ignoriert Wechsel der\nStatuswerte des Gegners."
    es: "Ignora mejoras en las\nestadísticas del enemigo."
    ko: "상대의 능력\n변화를 무시한다."
unburden:
  names:
    jp_kana: かるわざ
    en: Unburden
    fr: Délestage
    it: Agiltecnica
    de: Entlastung
    es: Liviano
    ko: 곡예
  descriptions:
    jp_kana: "どうぐが　なくなると\nすばやさが　あがる。"
    en: "Raises Speed if a held\nitem is used."
    fr: "Augmente la Vit. si l’objet\ntenu est utilisé ou perdu."
    it: "Sale Veloc. se strum. te-\nnuto si perde o consuma."
    de: "Erhöht Init., wenn 1 Item\nverwendet/verloren wird."
    es: "Sube la Veloc. si usa o\npierde un objeto llevado."
    ko: "도구가 없어지면\n스피드가 올라간다."
vital_spirit:
  names:
    jp_kana: やるき
    en: Vital Spirit
    fr: Esprit Vital
    it: Spiritovivo
    de: Munterkeit
    es: Espír. Vital
    ko: 의기양양
  descriptions:
    jp_kana: "ねむり　じょうたいに\nならない。"
    en: "Prevents the Pokémon\nfrom falling asleep."
    fr: "Empêche le Pokémon\nde s’endormir."
    it: "Impedisce al Pokémon\ndi addormentarsi."
    de: Verhindert Einschlafen.
    es: Evita quedarse dormido.
    ko: "잠듦 상태가\n되지 않는다."
volt_absorb:
  names:
    jp_kana: ちくでん
    en: Volt Absorb
    fr: Absorb Volt
    it: Assorbivolt
    de: Voltabsorber
    es: Absor. Elec.
    ko: 축전
  descriptions:
    jp_kana: "でんきを　うけると\nかいふくする。"
    en: "Restores HP if hit by an\nElectric-type move."
    fr: "Récupère des PV si touché\npar une capacité Electrik."
    it: "Ridà PS se si subisce una\nmossa di tipo Elettro."
    de: "Wandelt Elektrizität in\nKP um."
    es: "Recupera PS al recibir\nataques eléctricos."
    ko: "전기를 받으면\n회복한다."
water_absorb:
  names:
    jp_kana: ちょすい
    en: Water Absorb
    fr: Absorb Eau
    it: Assorbacqua
    de: H2O-Absorber
    es: Absor. Agua
    ko: 저수
  descriptions:
    jp_kana: "みずを　うけると\nかいふくする。"
    en: "Restores HP if hit by a\nWater-type move."
    fr: "Récupère des PV si touché\npar une capacité Eau."
    it: "Ridà PS se si subisce\nuna mossa di tipo Acqua."
    de: Wandelt Wasser in KP um.
    es: "Recupera PS al recibir \nataques de tipo Agua."
    ko: "물을 받으면\n회복한다."
water_veil:
  names:
    jp_kana: みずのベール
    en: Water Veil
    fr: Ignifu-Voile
    it: Idrovelo
    de: Aquahülle
    es: Velo Agua
    ko: 수의베일
  descriptions:
    jp_kana: "やけど　じょうたいに\nならない。"
    en: "Prevents the Pokémon\nfrom getting a burn."
    fr: "Protège le Pokémon\ndes brûlures."
    it: "Impedisce al Pokémon di\nrimanere scottato."
    de: "Verhindert\nVerbrennungen."
    es: Evita las quemaduras.
    ko: "화상 상태가\n되지 않는다."
white_smoke:
  names:
    jp_kana: しろいけむり
    en: White Smoke
    fr: Ecran Fumée
    it: Fumochiaro
    de: Pulverrauch
    es: Humo Blanco
    ko: 하얀연기
  descriptions:
    jp_kana: "あいてに　のうりょくを\nさげられない。"
    en: "Prevents its stats from\nbeing lowered."
    fr: "Empêche la réduction des\nstats du Pokémon."
    it: "Evita le riduzioni delle\nstatistiche, se subite."
    de: "Verhindert das Absenken\nder Statuswerte."
    es: "Evita que se reduzcan\nlas características."
    ko: "상대가 능력을\n떨어뜨릴 수 없다."
wonder_guard:
  names:
    jp_kana: ふしぎなまもり
    en: Wonder Guard
    fr: Garde Mystik
    it: Magidifesa
    de: Wunderwache
    es: Superguarda
    ko: 불가사의부적
  descriptions:
    jp_kana: "こうかばつぐん　しか\nあたらない。"
    en: "Only supereffective\nmoves will hit."
    fr: "Seules capacités “super\nefficaces” l’atteignent."
    it: "Rende vulnerabili solo\nalle mosse superefficaci."
    de: "Nur sehr effektive Treffer\nschaden."
    es: "Solo le dañan movimientos\nmuy eficaces."
    ko: "효과가 굉장한 기술밖에\n맞지 않는다."
