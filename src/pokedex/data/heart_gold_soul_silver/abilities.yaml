  descriptions:
    jp_kana: どうぐを　とられない。
    en: "Protects the Pokémon\nfrom item theft."
    fr: "Protège le Pokémon\ncontre le vol d’objets."
    it: "Protegge il Pokémon\ndal furto di strumenti."
    de: "Verhindert Item-\nDiebstahl."
    es: "Impide el robo\nde objetos."
    ko: 도구를 빼앗기지 않는다.
storm_drain:
  names:
    jp_kana: よびみず
    en: Storm Drain
    fr: Lavabo
    it: Acquascolo
    de: Sturmsog
    es: Colector
    ko: 마중물
