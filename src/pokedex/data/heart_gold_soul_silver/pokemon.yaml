      descriptions:
        jp_kana:
          heart_gold: "じまんのツノを　あいての　おなかの\nしたに　ねじこみ　いっきに　もちあげ\nぶんなげてしまう　ちからもち。"
          soul_silver: "ふだんは　とても　おとなしいが\nミツをすうのを　じゃまする　やつは\nツノを　つかって　おいはらう。"
        en:
          heart_gold: "This powerful Pokémon thrusts\nits prized horn under its enemies’\nbellies, then lifts and throws them."
          soul_silver: "It is usually docile, but if it is\ndisturbed while sipping honey,\nit chases off the intruder with its horn."
        fr:
          heart_gold: "Ce Pokémon est si puissant\nqu’il peut projeter ses ennemis\nen l’air grâce à ses cornes."
          soul_silver: "Le plus souvent docile, il chasse\nles intrus avec sa corne s’il est\nattaqué quand il mange du miel."
        it:
          heart_gold: "Questo potente Pokémon infilza\ncon il corno la pancia del nemico,\nsollevandolo e lanciandolo lontano."
          soul_silver: "Pacifico, ma se lo si disturba\nmentre gusta il miele scaccia\nl’intruso con il suo corno."
        de:
          heart_gold: "Dieses kräftige Pokémon rammt\nsein stolzes Horn unter den\nRumpf des Gegners und wirft ihn um."
          soul_silver: "Es ist ruhig. Wird es aber beim\nHonignaschen gestört, verjagt es\nden Störenfried mit seinem Horn."
        es:
          heart_gold: "Este fuerte Pokémon clava su\npreciado cuerno en la tripa del\nenemigo, lo eleva y luego lo arroja."
          soul_silver: "Suele ser dócil, pero si se le\nmolesta mientras succiona miel,\nperseguirá con su cuerno al intruso."
        ko:
          heart_gold: "자랑스러운 뿔을 상대의 배\n밑에 틀어박고 단번에 들어 올려\n집어던지는 천하장사다."
          soul_silver: "보통은 매우 얌전하지만\n꿀을 먹을 때 방해하는 자는\n뿔을 사용해 쫓아 버린다."
sneasel:
