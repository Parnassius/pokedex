        jp_kana:
          heart_gold: "どくばりは　とても　きょうりょく。\nめだつ　からだの　いろは\nあいてに　けいかいを　させるためだ。"
          soul_silver: "あたまのさき　５センチの　どくばりで\nこうげき　してくる。いつもは\nエサとなる　はっぱのしたにいる。"
        en:
          heart_gold: "Its poison stinger is very powerful.\nIts bright-colored body is intended\nto warn off its enemies."
          soul_silver: "It attacks using a two-inch poison\nbarb on its head. It can usually be\nfound under the leaves it eats."
        fr:
          heart_gold: "Son aiguillon empoisonné est très\ndangereux. Son corps est coloré\nafin de repousser ses ennemis."
          soul_silver: "Il attaque grâce au pic empoisonné\nde sa tête. Il se cache sous les\nfeuilles qu’il mange."
        it:
          heart_gold: "Ha un pungiglione molto velenoso.\nLa vivace colorazione del suo corpo\nè un avvertimento per i nemici."
          soul_silver: "Attacca con l’aculeo lungo 5 cm\nche ha sul capo. È facile trovarlo\nsotto le foglie di cui si nutre."
        de:
          heart_gold: "Sein Giftstachel ist gefährlich.\nSein hellleuchtender Körper\nsoll Feinde abschrecken."
          soul_silver: "Es greift mit dem 5 cm großen Gift-\nstachel auf seinem Kopf an. Es ist\nstets unter Laub anzutreffen."
        es:
          heart_gold: "Su venenoso aguijón es muy\npotente y su colorido cuerpo\nhace que los enemigos huyan."
          soul_silver: "Ataca con la púa de 5 cm de su\ncabeza. Suele encontrarse\ndebajo de las hojas que come."
        ko:
          heart_gold: "독침이 매우 강력하다.\n눈에 띄는 몸의 색깔은\n상대방을 경계시키기 위해서다."
          soul_silver: "머리끝 5cm 정도의 독침으로\n공격을 해온다. 보통은\n먹이가 되는 나뭇잎 밑에 있다."
kakuna:
