        jp_kana:
          heart_gold: "ふだんは　くさむらに　かくれている。\nたたかいは　このまず　おそわれると\nひっしに　すなをかけて　みをまもる。"
          soul_silver: "くさむらや　もりに　おおく　ぶんぷ。\nおとなしい　せいかくで　はばたいて\nすなをかけ　てきを　おいはらう。"
        en:
          heart_gold: "It usually hides in tall grass.\nBecause it dislikes fighting,\nit protects itself by kicking up sand."
          soul_silver: "Common in grassy areas and forests,\nit is very docile and will chase off\nenemies by flapping up sand."
        fr:
          heart_gold: "Il se cache dans les hautes\nherbes et n’aime pas se battre.\nIl se défend en jetant du sable."
          soul_silver: "Commun dans les forêts et les\nplaines, docile, il fait fuir ses\nennemis en envoyant du sable."
        it:
          heart_gold: "Di solito si nasconde nell’erba\nalta. Poiché odia lottare, tira la\nsabbia con le zampe come difesa."
          soul_silver: "Comune tra l’erba e nelle foreste,\nè molto docile e tiene alla larga\ni nemici sollevando sabbia."
        de:
          heart_gold: "Es versteckt sich im hohen Gras. Da\nes Kämpfe verabscheut, wirbelt\nes Sand auf, um sich zu schützen."
          soul_silver: "Es ist meist in Wäldern anzutreffen.\nEs ist ruhig und verjagt seine\nFeinde, indem es Sand aufwirbelt."
        es:
          heart_gold: "Suele ocultarse entre altas\nhierbas. Como no le gusta luchar,\nse defiende pateando arena."
          soul_silver: "Común en zonas de hierba y\nbosques, es muy dócil y ahuyenta\na sus enemigos levantando arena."
        ko:
          heart_gold: "평소에는 풀숲에 숨어 있다.\n싸움을 좋아하지 않아 공격받으면\n필사적으로 모래를 뿌려 몸을 지킨다."
          soul_silver: "풀숲과 숲에 많이 분포되어 있다.\n얌전한 성격으로 날갯짓을 해서\n모래를 뿌려 상대를 쫓아낸다."
pidgeotto:
  species_id: 17
