        jp_kana:
          heart_gold: "うすい　ガスのような　からだで\nどこにでも　しのびこむが\nかぜが　ふくと　ふきとばされる。"
          soul_silver: "ガスでできた　うすい　からだは\nどんな　おおきさの　あいても\nつつみこみ　いきのねを　とめる。"
        en:
          heart_gold: "With its gas-like body, it can sneak\ninto any place it desires. However,\nit can be blown away by wind."
          soul_silver: "Its body is made of gas. Despite lacking\nsubstance, it can envelop an opponent\nof any size and cause suffocation."
        fr:
          heart_gold: "Son corps gazéiforme lui permet\nde se dissimuler n’importe où,\nmais le vent peut le déloger."
          soul_silver: "Son corps est composé de gaz. Il peut\nainsi envelopper un adversaire et le\nfaire suffoquer."
        it:
          heart_gold: "Il suo corpo gassoso può infilarsi\novunque. Tuttavia un colpo di\nvento lo può spazzare via."
          soul_silver: "Il suo corpo sottile è fatto\ndi gas. Avvolge nemici di ogni\ndimensione, soffocandoli."
        de:
          heart_gold: "Aufgrund seines Gas-Körpers kommt\nes an jeden Ort. Es kann jedoch\nvom Wind davongeweht werden."
          soul_silver: "Es hat einen gasförmigen Körper.\nEs kann jeden Gegner mit Giftgas\neinnebeln und dadurch ersticken."
        es:
          heart_gold: "Con su cuerpo gaseoso puede\ncolarse por donde quiera, aunque con\nun golpe de viento saldría despedido."
          soul_silver: "Su etéreo cuerpo está hecho de gas.\nPuede envolver a un oponente de\ncualquier tamaño hasta ahogarlo."
        ko:
          heart_gold: "연한 가스 같은 몸으로\n어디든지 숨어들어 가지만\n바람이 불면 날려가 버린다."
          soul_silver: "가스로 만들어진 몸은\n어떠한 크기의 상대라도\n둘러싸서 숨을 못 쉬게 한다."
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
    en: HAUNTER
    fr: SPECTRUM
    it: HAUNTER
    de: ALPOLLO
    es: HAUNTER
    ko: 고우스트
