          heart_gold: "Nella lotta, se s’incurva vuol\ndire che sta per attaccare con\nle fiamme che ha sul dorso."
          soul_silver: "Un Pokémon completamente ricoperto\nda una pelliccia non infiammabile. Può\nresistere a qualsiasi attacco di fuoco."
