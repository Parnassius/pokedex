          soul_silver: "にんげんの　ような　ことばも\nはなしているが　それよりも\nおどりで　きもちを　つたえるらしい。"
        en:
          heart_gold: "It rocks its body rhythmically.\nIt appears to alter the rhythm\ndepending on how it is feeling."
          soul_silver: "It speaks a language similar to\nthat of humans. However, it seems\nto use dancing to communicate."
        fr:
          heart_gold: "Il bouge son corps en cadence.\nLe rythme change en fonction de\nson humeur."
          soul_silver: "Il utilise un langage proche de\ncelui des humains. Il semble\ncommuniquer en dansant."
        it:
          heart_gold: "Agita il corpo ritmicamente.\nPare che il ritmo dipenda\ndal suo stato d’animo."
          soul_silver: "Parla una lingua simile a quella umana.\nTuttavia, sembra comunicare attraverso\nla danza."
        de:
          heart_gold: "Es bewegt seinen Körper rhythmisch\nhin und her. Seine Gemütslage\nbestimmt den Rhythmus."
          soul_silver: "Seine Sprache ist der Sprache der\nMenschen ähnlich. Aber es scheint,\nals ob es durch Tanz kommuniziert."
        es:
          heart_gold: "Mueve su cuerpo rítmicamente.\nParece cambiar de ritmo\ndependiendo de cómo se sienta."
          soul_silver: "Habla un idioma similar al de los\nhumanos. Sin embargo, parece que\nusa la danza para comunicarse."
        ko:
          heart_gold: "리드미컬하게 몸을 흔들고 있다.\n그때의 감정에 따라\n리듬이 달라지는 것 같다."
          soul_silver: "인간처럼 말도\n하고 있지만 그보다도\n춤으로 감정을 전하는 듯하다."
electabuzz:
