        - rivalry
      descriptions:
        jp_kana:
          heart_gold: "ちいさな　ツノに　ひめられた\nどくの　いりょくは　ものすごい。\nわずかな　キズでも　いのちとりだ。"
          soul_silver: "たたかいは　あまり　このまないが\nいざと　いうときは\nツノのどくで　あいてを　くるしめる。"
        en:
          heart_gold: "The poison hidden in its small horn\nis extremely potent. Even a tiny\nscratch can have fatal results."
          soul_silver: "Although not very combative, it will\ntorment its foes with poison spikes\nif it is threatened in any way."
        fr:
          heart_gold: "Un poison très puissant suinte de\nses piquants. Une égratignure peut\ncauser un empoisonnement fatal."
          soul_silver: "Peu combatif, il préfère tourmenter\nses ennemis à l’aide de dards\nempoisonnés s’il est menacé."
        it:
          heart_gold: "Il veleno del suo piccolo corno è\npotentissimo. Anche una lieve\nferita può essere fatale."
          soul_silver: "Sebbene non troppo agguerrito, se si\nsente minacciato tormenta i nemici\ncon i suoi aculei velenosi."
        de:
          heart_gold: "Das Gift in seinem kleinen Horn ist\nsehr potent. Ein kleiner Kratzer\nkann fatale Folgen haben."
          soul_silver: "Obwohl es nicht aggressiv ist,\nmalträtiert es seine Feinde bei\nBedrohung mit seinen Giftstacheln."
        es:
          heart_gold: "El veneno oculto en su pequeño\ncuerno es extremadamente\npotente. El menor roce sería fatal."
          soul_silver: "Aunque no es muy agresivo,\ncastiga a sus enemigos con púas\nvenenosas, si se siente amenazado."
        ko:
          heart_gold: "작은 뿔에 감춰진\n독의 위력은 대단하다.\n약간의 상처에도 목숨을 잃는다."
          soul_silver: "싸움을 그리 좋아하지 않지만\n위기가 닥쳤을 때는\n뿔의 독으로 상대를 물리친다."
nidorina:
