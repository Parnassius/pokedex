          soul_silver: "きに　くっついたまま　うごかない。\nかたいカラの　はへんを　ばらまいて\nちかづくものを　おいはらう。"
        en:
          heart_gold: "Its entire body is shielded by a\nsteel-hard shell. What lurks inside\nthis shell is a total mystery."
          soul_silver: "It remains immovably rooted to its\ntree. It scatters pieces of its hard\nshell to drive its enemies away."
        fr:
          heart_gold: "Son corps est protégé par une\nénorme carapace. Ce qui se trouve\nsous cette armure est un mystère."
          soul_silver: "Il est totalement fixé à son arbre.\nIl lance des morceaux de sa carapace\npour faire fuir son ennemi."
        it:
          heart_gold: "L’intero corpo è protetto da un\nguscio duro come acciaio. Nessuno\nsa cosa si trovi sotto l’armatura."
          soul_silver: "Rimane saldamente attaccato al\nsuo albero. Tiene lontani i nemici\nlanciando pezzi del duro guscio."
        de:
          heart_gold: "Sein gesamter Körper steckt in\neiner stahlharten Schale. Sein\nInneres bleibt ein Geheimnis."
          soul_silver: "Es bleibt stets bei seinem Baum.\nEs verstreut Teile seiner Schale, um\nso seine Feinde zu verjagen."
        es:
          heart_gold: "Todo su cuerpo está protegido por\nuna coraza de metal. Lo que\nesconde la coraza es un misterio."
          soul_silver: "Permanece inmóvil agarrado a su\nárbol. Dispara trozos de su dura\ncoraza para alejar al enemigo."
        ko:
          heart_gold: "강철 같은 단단한 껍질로\n전신을 싸고 있다.\n내용물의 정체는 수수께끼다."
          soul_silver: "나무에 붙어 있는 채로 안 움직인다.\n단단한 껍질 파편을 흩뿌려서\n다가오는 자를 쫓아버린다."
