        - water
      egg_groups:
        - water_1
        - fairy
      abilities:
        - thick_fat
        - huge_power
      descriptions:
        jp_kana:
          heart_gold: "しっぽの　さきには　みずよりも\nかるい　あぶらが　つまっているから\nおぼれることなく　かわをすすめる。"
          soul_silver: "シッポの　さきっぽが　うきぶくろの\nやくわりを　はたすので　はげしい\nながれでも　おぼれたりしない。"
        en:
          heart_gold: "The tip of its tail, which contains\noil that is lighter than water,\nlets it swim without drowning."
          soul_silver: "The end of its tail serves as a\nbuoy that keeps it from drowning,\neven in a vicious current."
        fr:
          heart_gold: "Le bout de sa queue est rempli\nd’huile plus légère que l’eau,\nce qui lui permet de ne pas couler."
          soul_silver: "Le bout de sa queue lui sert\nde bouée, l’empêchant de se\nnoyer même par fort courant."
        it:
          heart_gold: "La punta della coda, contenendo un olio\npiù leggero dell’acqua, gli permette di\nnuotare senza affogare."
          soul_silver: "La punta della coda funziona come\nuna boa e non lo fa affogare neppure\nin una violenta corrente."
        de:
          heart_gold: "Da seine Schweifspitze Öl enthält,\ndas leichter als Wasser ist, kann\nes schwimmen, ohne unterzugehen."
          soul_silver: "Da es am Schweifende eine Art Boje\nträgt, kann es selbst bei der stär-\nksten Strömung nicht ertrinken."
        es:
          heart_gold: "La punta de su cola, que\ncontiene aceite, le permite nadar\nsin miedo a ahogarse."
          soul_silver: "Usa el extremo de su cola como boya\nque le impide ahogarse, incluso si\nlo arrastra una fuerte corriente."
        ko:
          heart_gold: "꼬리 끝에는 물보다\n가벼운 기름이 가득 차 있어서\n물에 빠지지 않고 강을 건널 수 있다."
          soul_silver: "꼬리의 끝이 부레의\n역할을 하기 때문에 거센\n물살에도 빠지거나 하지 않는다."
azumarill:
