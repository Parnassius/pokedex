          soul_silver: "まぶしい　ひかりを　はなって\nあいての　めを　くらませ　うごけない\nあいだに　まるのみに　してしまう。"
        en:
          heart_gold: "The light it emits is so bright that\nit can illuminate the sea’s surface\nfrom a depth of over three miles."
          soul_silver: "It blinds prey with an intense burst of\nlight. With the prey incapacitated, the\nPokémon swallows it in a single gulp."
        fr:
          heart_gold: "Sa brillance est si forte qu’il\npeut illuminer les fonds marins\nà 5 000 mètres de profondeur."
          soul_silver: "Il aveugle sa proie avec une\nlumière intense, puis l’avale d’un\nseul trait une fois immobilisée."
        it:
          heart_gold: "Emette una luce così intensa che può\nilluminare la superficie del mare\nda oltre 5 km di profondità."
          soul_silver: "Acceca la preda con un’intensa\nondata di luce, immobilizzandola,\nper poi ingoiarla in un sol boccone."
        de:
          heart_gold: "Sein Licht ist so hell, dass es selbst\nvom Meeresgrund aus 5 000 Metern\nTiefe an die Oberfläche dringt."
          soul_silver: "Es blendet seine Beute mit einem\nstarken Blitz und verschlingt die\ngelähmte Beute mit einem Schluck."
        es:
          heart_gold: "La luz que emite es tan brillante\nque puede iluminar la superficie del\nmar desde unos 5 km de profundidad."
          soul_silver: "Ciega a su presa con una luz\nintensa, y luego se la traga\nde un solo bocado."
        ko:
          heart_gold: "랜턴이 내는 빛은\n5000m의 깊이에서도\n수면까지 전해질 정도로 밝다."
          soul_silver: "눈부신 빛을 발산하여 상대의 눈을\n안 보이게 만들어 움직이지 못하는\n동안에 통째로 삼켜버린다."
pichu:
