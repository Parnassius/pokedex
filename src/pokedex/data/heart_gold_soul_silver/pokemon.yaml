bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    en: BULBASAUR
    fr: BULBIZARRE
    it: BULBASAUR
    de: BISASAM
    es: BULBASAUR
    ko: 이상해씨
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          heart_gold: "せなかの　たねの　なかには\nえいようが　たっぷり。たねは\nからだと　いっしょに　おおきくなる。"
          soul_silver: "うまれたときから　せなかに　タネを\nせおっている。からだが　おおきく\nそだつごとに　タネも　おおきくなる。"
        en:
          heart_gold: "The seed on its back is filled\nwith nutrients. The seed grows\nsteadily larger as its body grows."
          soul_silver: "It carries a seed on its back right\nfrom birth. As it grows older, the\nseed also grows larger."
        fr:
          heart_gold: "La graine sur son dos est gorgée\nde nutriments. Elle grossit en\nconséquence de sa croissance."
          soul_silver: "Il porte une graine sur son\ndos depuis la naissance. Elle\ngrandit avec lui."
        it:
          heart_gold: "Il seme che ha sul dorso è ricco di\nsostanze nutrienti. Il seme cresce\ncostantemente con il suo corpo."
          soul_silver: "Dalla nascita ha un seme sul\ndorso. Quando cresce, anche\nil seme diventa più grande."
        de:
          heart_gold: "Der Samen auf dem Rücken enthält\nNährstoffe. Er wächst mit\nzunehmender Körpergröße."
          soul_silver: "Von Geburt an trägt es einen\nSamen auf seinem Rücken. Wächst\nes, so wächst auch der Samen."
        es:
          heart_gold: "La semilla de su lomo está llena\nde nutrientes. La semilla brota\na medida que el Pokémon crece."
          soul_silver: "Lleva una semilla en su lomo desde\nque nació. A medida que crece,\nla semilla se hace más grande."
        ko:
          heart_gold: "등의 씨앗 안에는\n영양이 가득하다. 씨앗은\n몸과 함께 커진다."
          soul_silver: "태어날 때부터 등에 씨앗을\n짊어지고 있다. 몸이 크게\n성장함에 따라 씨앗도 커진다."
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    en: IVYSAUR
    fr: HERBIZARRE
    it: IVYSAUR
    de: BISAKNOSP
    es: IVYSAUR
    ko: 이상해풀
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          heart_gold: "たいようの　ひかりを　あびるほど\nからだに　ちからが　わいて\nせなかの　つぼみが　そだっていく。"
          soul_silver: "せなかの　つぼみから　あまいかおりが\nただよいはじめたのは　もうすぐ\nおおきなハナが　ひらく　しょうこだ。"
        en:
          heart_gold: "Exposure to sunlight adds to its\nstrength. Sunlight also makes the\nbud on its back grow larger."
          soul_silver: "If the bud on its back starts to\nsmell sweet, it is evidence that\nthe large flower will soon bloom."
        fr:
          heart_gold: "La lumière du soleil le rend plus\nfort et vigoureux. Le bulbe sur\nson dos grossit en conséquence."
          soul_silver: "Si le bourgeon sur son dos\ncommence à sentir bon, la fleur\nrisque d’éclore bientôt."
        it:
          heart_gold: "L’esposizione alla luce solare\nlo rafforza e fa crescere il\nbocciolo che ha sul dorso."
          soul_silver: "Se il bocciolo che ha sulla\nschiena emana un dolce profumo,\npresto sboccerà il grande fiore."
        de:
          heart_gold: "Die Sonne macht es stärker. Die\nKnospe auf seinem Rücken wächst\nunter dem Einfluss von Sonnenlicht."
          soul_silver: "Verbreitet die Knospe auf seinem\nRücken einen süßen Duft, ist das\nein Anzeichen, dass sie bald blüht."
        es:
          heart_gold: "Puede aumentar su fuerza con\nenergía solar. Esta también hace\nque crezca el capullo de su lomo."
          soul_silver: "Si el capullo de su lomo comienza\na oler dulce, indica que la\ngran flor pronto florecerá."
        ko:
          heart_gold: "햇빛을 받을수록\n몸에 힘이 솟아나\n등의 꽃봉오리가 자라난다."
          soul_silver: "등의 꽃봉오리에서 달콤한 향기가\n나기 시작했다는 것은 이제 곧\n커다란 꽃이 핀다는 증거다."
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    en: VENUSAUR
    fr: FLORIZARRE
    it: VENUSAUR
    de: BISAFLOR
    es: VENUSAUR
    ko: 이상해꽃
  forms:
