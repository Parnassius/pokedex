      descriptions:
        jp_kana:
          heart_gold: "おおきく　ちからづよい　あごで\nかみつくと　そのまま　くびをふって\nあいてを　ずたずたに　ひきちぎる。"
          soul_silver: "ちじょうでは　からだを　ささえるのが\nつらいので　よつんばいだが\nとても　すばやく　いどうできる。"
        en:
          heart_gold: "When it bites with its massive and\npowerful jaws, it shakes its head\nand savagely tears its victim up."
          soul_silver: "It is hard for it to support its weight\nout of water, so it sometimes gets\ndown on all fours. But it moves fast."
        fr:
          heart_gold: "Quand il mord avec sa puissante\nmâchoire, il secoue sa tête pour\ndéchiqueter sa pauvre victime."
          soul_silver: "Il a du mal à se mouvoir hors\nde l’eau, alors il marche à quatre\npattes. Il reste très rapide."
        it:
          heart_gold: "Mordendo con le grandi e potenti\nmandibole, agita il capo riducendo\nla vittima in brandelli."
          soul_silver: "Fuori dall’acqua cammina su due zampe,\nma è molto pesante. Perciò le usa tutte\ne quattro se vuole essere più veloce."
        de:
          heart_gold: "Wenn es mit seinem kräftigen Kiefer\nzubeißt, schüttelt es seinen Kopf\nund reißt seine Opfer in Stücke."
          soul_silver: "Aufgrund seines Gewichts verlässt\nes das Wasser nur selten. Also geht\nes auf allen Vieren."
        es:
          heart_gold: "Al morder con sus feroces fauces,\nmueve su cabeza despedazando\nsalvajemente a su víctima."
          soul_silver: "Le cuesta soportar su propio peso\nfuera del agua, así que va a cuatro\npatas. Aun así es rápido."
        ko:
          heart_gold: "크고 힘센 턱으로\n한번 물면 그대로 목을 흔들어\n상대를 갈기갈기 찢는다."
          soul_silver: "지상에서는 몸을 지탱하기가\n힘들기 때문에 엎드려 다니지만\n매우 빠르게 이동할 수 있다."
sentret:
  species_id: 161
  names:
    jp_kana: オタチ
