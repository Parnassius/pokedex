      egg_groups:
        - field
      abilities:
        - sand_veil
        - arena_trap
      held_items:
        rare: soft_sand
      descriptions:
        jp_kana:
          heart_gold: "ひふが　とても　うすいので\nひかりに　てらされると　けつえきが\nあたためられて　よわってしまう。"
          soul_silver: "ディグダが　とおったあとの\nだいちは　ほどよく　たがやされて\nさいこうの　はたけに　なる。"
        en:
          heart_gold: "Its skin is very thin. If it is exposed\nto light, its blood heats up,\ncausing it to grow weak."
          soul_silver: "If a DIGLETT digs through a field,\nit leaves the soil perfectly tilled\nand ideal for planting crops."
        fr:
          heart_gold: "Son épiderme est très fin. S’il est\nexposé au soleil, son sang se\nréchauffe, ce qui l’affaiblit."
          soul_silver: "Si un TAUPIQUEUR creuse un tunnel\nsous un champ, il retourne la terre\net améliore les récoltes."
        it:
          heart_gold: "La sua pelle è sottilissima. Se si\nespone alla luce, il sangue si\nriscalda, indebolendolo."
          soul_silver: "Se un DIGLETT scava una fossa\nlascia il terreno perfettamente\nlavorato e pronto per la semina."
        de:
          heart_gold: "Seine Haut ist sehr dünn. Wird es\nSonnenlicht ausgesetzt, erhitzt\nsich sein Blut und es wird schwach."
          soul_silver: "Setzt ein DIGDA Schaufler auf\neinem Acker ein, ist die Erde ideal\ngepflügt, um etwas anzupflanzen."
        es:
          heart_gold: "Su piel es muy fina. Si se expone\na la luz, su sangre se calienta\ny su crecimiento se debilita."
          soul_silver: "Si un DIGLETT excava un terreno,\nlo deja perfectamente arado y\npreparado para sembrarlo."
        ko:
          heart_gold: "피부가 매우 얇아서\n빛을 쪼이게 되면 혈액이\n데워져 약해진다."
          soul_silver: "디그다가 지나간 뒤의\n대지는 알맞게 땅이 갈려\n최고의 밭이 된다."
dugtrio:
  species_id: 51
  names:
    jp_kana: ダグトリオ
    en: DUGTRIO
