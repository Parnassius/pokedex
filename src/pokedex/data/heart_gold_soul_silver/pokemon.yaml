          heart_gold: "ぜんしんに　キノコのほうしを　あびて\nうまれてくる。からだが　そだつと\nせなかから　キノコが　はえてくる。"
          soul_silver: "からだが　おおきくなると\nせなかから　とうちゅうかそう\nという　キノコが　はえてくる。"
        en:
          heart_gold: "It is doused with mushroom spores\nwhen it is born. As its body grows,\nmushrooms sprout from its back."
          soul_silver: "As its body grows, large mushrooms\nnamed tochukaso start sprouting\nout of its back."
        fr:
          heart_gold: "Il est couvert de spores à la naissance\nqui se transforment en champignons\nquand il grandit."
          soul_silver: "Quand son corps grandit, des\nchampignons orientaux dits “tochukaso”\nse mettent à pousser sur son dos."
        it:
          heart_gold: "Quando nasce è coperto di spore\ndi fungo. Quando cresce gli\nspuntano funghi sulla schiena."
          soul_silver: "Mentre il corpo cresce, sul dorso\ngli spuntano funghi orientali\nchiamati tochukaso."
        de:
          heart_gold: "Es ist von Geburt an mit Pilzsporen\nübersät. Wenn es wächst, sprießen\nPilze auf seinem Rücken."
          soul_silver: "Während es langsam heranwächst,\nsprießen große, exotische Pilze\naus seinem Rücken."
        es:
          heart_gold: "Está cubierto de esporas de seta\nal nacer. A medida que crece, las\nsetas brotan de su lomo."
          soul_silver: "Al crecer, unas setas orientales\nllamadas “tochukaso”\ncomienzan a germinar en su lomo."
        ko:
          heart_gold: "전신에 버섯포자를 뒤집어쓰고\n태어난다. 몸이 자라면\n등에서 버섯이 자라난다."
          soul_silver: "몸이 크게 자라면\n등에서 동충하초라는\n버섯이 돋아난다."
parasect:
