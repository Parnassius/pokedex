          soul_silver: "はっぱの　うらがわに　たまった\nあさつゆ　だけを　のんで　くらす。\nほかには　なにも　たべないという。"
        en:
          heart_gold: "It may plummet from the sky.\nIf attacked by a SPEAROW,\nit will violently shake its leaves."
          soul_silver: "It lives by drinking only dewdrops\nfrom under the leaves of plants.\nIt is said that it eats nothing else."
        fr:
          heart_gold: "Il tombe du ciel soudainement. S’il\nest attaqué par un PIAFABEC, il\nsecoue violemment ses feuilles."
          soul_silver: "Il vit en buvant la rosée sur\nles feuilles. On dit qu’il ne\npeut rien avaler d’autre."
        it:
          heart_gold: "Piomba dall’alto improvvisamente.\nSe è attaccato da uno SPEAROW,\nagita violentemente le foglie."
          soul_silver: "Vive nutrendosi delle gocce di rugiada\nche cadono dalle foglie delle piante.\nPare che non mangi altro."
        de:
          heart_gold: "Manchmal fällt es plötzlich vom Himmel.\nWird es von HABITAK angegriffen,\nschüttelt es seine Blätter."
          soul_silver: "Es ernährt sich ausschließlich von\nden Tautropfen, die von den Blät-\ntern über ihm hinabfallen."
        es:
          heart_gold: "Puede caer del cielo de repente.\nSi le ataca un SPEAROW, moverá\nviolentamente sus hojas."
          soul_silver: "Se alimenta del rocío que hay\nsobre las hojas de las plantas.\nDicen que no come nada más."
        ko:
          heart_gold: "어느 날 아침 갑자기 떨어진다.\n깨비참에게 습격당하면 잎사귀를\n세차게 흔들어서 쫓아 버린다."
          soul_silver: "나뭇잎의 뒷면에 모인\n이슬만을 먹고 산다. 그 밖에는\n아무것도 먹지 않는다고 한다."
