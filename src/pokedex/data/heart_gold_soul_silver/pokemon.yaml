          heart_gold: "ベロの　さきまで　しんけいが\nはったつ　しているので\nびみょうな　うごきが　かのうだ。"
          soul_silver: "ながい　したは　ねばねばした\nだえきで　べっとり。どんなものでも\nくっついて　とても　べんり。"
        en:
          heart_gold: "Its tongue has well-developed\nnerves that run to the very tip,\nso it can be deftly manipulated."
          soul_silver: "Its long tongue, slathered with a\ngooey saliva, sticks to anything,\nso it is very useful."
        fr:
          heart_gold: "Sa langue est très sensible.\nIl peut l’utiliser pour manipuler\nadroitement des objets."
          soul_silver: "Sa longue langue sécrète une salive\ngluante qui se colle à n’importe\nquoi. Elle est très efficace!"
        it:
          heart_gold: "La sua lingua ha nervi ben sviluppati\nche raggiungono la punta ed è\nquindi facilmente governabile."
          soul_silver: "La lunga lingua intrisa di saliva\nappiccicosa si attacca agli oggetti\ne può diventare molto utile."
        de:
          heart_gold: "In seiner sensiblen Zunge reichen\ndie Muskeln bis in die Spitze. Darum\nkann es sie stark verbiegen."
          soul_silver: "Seine Zunge ist mit klebrigem\nSpeichel bedeckt, der überall haf-\ntet. Dies ist sehr nützlich."
        es:
          heart_gold: "Los nervios superdesarrollados\nhallados por toda su lengua permiten\nque la manipule hábilmente."
          soul_silver: "Su larga lengua, recubierta de\nsaliva pegajosa, se pega a todo,\npor lo que es muy útil."
        ko:
          heart_gold: "혀끝까지 신경이\n발달해 있어서\n미묘한 움직임이 가능하다."
          soul_silver: "긴 혀는 끈적끈적한\n침으로 덮여 있다. 어떤 것이든\n달라붙어서 매우 편리하다."
koffing:
  species_id: 109
