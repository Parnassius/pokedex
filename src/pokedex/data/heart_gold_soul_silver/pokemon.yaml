          soul_silver: "ものごとを　かんがえだすと\nくびを　１８０ど　かいてん　させて\nあたまの　はたらきを　たかめる。"
        en:
          heart_gold: "Its eyes are specially adapted.\nThey concentrate even faint light\nand enable it to see in the dark."
          soul_silver: "When it needs to think, it rotates\nits head 180 degrees to sharpen\nits intellectual power."
        fr:
          heart_gold: "Ses yeux sont adaptés à la nuit.\nIls peuvent concentrer la\nfaible lumière dans l’obscurité."
          soul_silver: "Quand il réfléchit, il tourne\nsa tête sur 180 degrés pour\noptimiser son mode de pensée."
        it:
          heart_gold: "Ha degli occhi speciali con cui\nconcentra anche la luce più\nfioca per poter vedere al buio."
          soul_silver: "Quando pensa ruota la testa di\n180 gradi per potenziare le sue\ncapacità intellettive."
        de:
          heart_gold: "Sein Sehvermögen ist hervorragend.\nSelbst bei schwachem Licht kann\nes jedes Detail erkennen."
          soul_silver: "Muss es nachdenken, dreht es sei-\nnen Kopf um 180 Grad, um so seinen\nIntellekt zu schärfen."
        es:
          heart_gold: "Sus ojos están especialmente\nadaptados. Concentran la luz\npara poder ver en la oscuridad."
          soul_silver: "Cuando necesita pensar, gira su\ncabeza 180° para agudizar\nsu capacidad intelectual."
        ko:
          heart_gold: "양쪽 눈이 특수한 구조다.\n적은 양의 빛이라도 잘 모아\n어둠 속에서도 주위를 분별한다."
          soul_silver: "뭔가를 생각해내면\n목을 180도 회전시켜\n두뇌 회전을 높인다."
ledyba:
  species_id: 165
  names:
