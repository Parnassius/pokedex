          soul_silver: "シッポの　さきから　あまみが\nにじみでている。えいようは　ないが\nかんでいると　しあわせな　きぶん。"
        en:
          heart_gold: "It lazes vacantly near water.\nIf something bites its tail, it won’t\neven notice for a whole day."
          soul_silver: "A sweet sap leaks from its tail’s\ntip. Although not nutritious, the\ntail is pleasant to chew on."
        fr:
          heart_gold: "Il est tellement paresseux qu’il\nlui faut une journée pour\nremarquer qu’on lui mord la queue."
          soul_silver: "Une sève sucrée coule du bout de\nsa queue. Peu nutritive, elle\nreste agréable à mâchouiller."
        it:
          heart_gold: "Ozia assentemente vicino all’acqua.\nSe gli si mordesse la coda non\nse ne accorgerebbe neppure."
          soul_silver: "Una dolce linfa gli cola dalla punta\ndella coda. Non è nutriente, ma ha\nun buon sapore."
        de:
          heart_gold: "Es faulenzt am Wasser. Wenn es\nin den Schweif gebissen wird, be-\nmerkt es das erst am nächsten Tag."
          soul_silver: "Süßer Saft ist auf seiner Rute.\nObwohl sie nicht nahrhaft ist,\nmacht es Spaß, darauf zu kauen."
        es:
          heart_gold: "Descansa ocioso junto al agua.\nSi algo muerde su cola, no lo\nnotará en todo el día."
          soul_silver: "De la punta de su cola gotea una\nsavia muy dulce. No es nutritiva,\npero es deliciosa para mascar."
        ko:
          heart_gold: "물가에서 멍하니 있다.\n뭔가가 꼬리를 깨물어도\n하루 종일 눈치채지 못한다."
          soul_silver: "꼬리의 끝에서 달콤한 맛이\n번져나오고 있다. 영양은 없지만\n물고 있으면 행복한 기분이 든다."
slowbro:
