        jp_kana:
          heart_gold: "よだれのように　みえる　あまいミツ。\nとても　ねばねば　しており\nふれると　いつまでも　まとわりつく。"
          soul_silver: "ねばねばした　よだれのような　ミツ。\nとても　あまいのだが　においが\nいじょうに　くさくて　ちかよれない。"
        en:
          heart_gold: "What appears to be drool is actually\nsweet honey. It is very sticky and\nclings stubbornly if touched."
          soul_silver: "It secretes a sticky, drool-like\nhoney. Although sweet, it smells\ntoo repulsive to get very close."
        fr:
          heart_gold: "Ce qui semble être sa bave est en\nfait du miel très collant. Si on le\ntouche, il adhère fortement."
          soul_silver: "Il sécrète un miel gluant, semblable\nà de la bave. Il est sucré mais sent\nbeaucoup trop mauvais."
        it:
          heart_gold: "Ciò che sembra bava è in realtà\ndolce miele. È molto viscoso:\nsi attacca appena lo si sfiora."
          soul_silver: "Secerne un miele viscoso, simile\na bava. È dolce, ma ha un odore\ninsopportabile se ci si avvicina."
        de:
          heart_gold: "Was wie Speichel aussieht, ist\neigentlich Honig. Er ist zähflüssig\nund klebrig, wenn man ihn berührt."
          soul_silver: "Es scheidet zähen, sabberähnlichen\nHonig aus. Obwohl dieser süß\nriecht, ist es eklig in seiner Nähe."
        es:
          heart_gold: "Lo que parece ser baba es\nrealmente miel. Es muy pegajoso y\nse adhiere tercamente si lo tocas."
          soul_silver: "Segrega una miel pegajosa. Aunque\nes dulce, su olor es demasiado\nrepulsivo como para acercarse."
        ko:
          heart_gold: "침처럼 보이는 달콤한 꿀.\n매우 끈적거려서\n닿으면 계속 떨어지지 않는다."
          soul_silver: "끈적끈적 거리는 침 같은 꿀.\n매우 달콤하지만 냄새가\n너무나 역겨워서 다가갈 수 없다."
vileplume:
