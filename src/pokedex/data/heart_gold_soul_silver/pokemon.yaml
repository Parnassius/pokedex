          soul_silver: "ゆうぐれ　みずべに　すがたをみせる。\nひたいが　あやしく　ひかるとき\nじんつうりきを　つかいこなすという。"
        en:
          heart_gold: "When it swims at full speed using\nits long, webbed limbs, its forehead\nsomehow begins to glow."
          soul_silver: "It appears by waterways at dusk.\nIt may use telekinetic powers if\nits forehead glows mysteriously."
        fr:
          heart_gold: "Quand il nage à vitesse maximale\ngrâce à ses pattes palmées, son\nfront émet une lueur étrange."
          soul_silver: "Il apparaît dans les étendues d’eau\nau crépuscule. Si son front brille,\nil se sert de sa télékinésie."
        it:
          heart_gold: "Quando nuota a tutta velocità con i\nsuoi lunghi arti palmati, la fronte\ngli diventa incandescente."
          soul_silver: "Appare presso i corsi d’acqua col\nbuio. Acquisisce poteri telecinetici\nse la sua fronte diventa incandescente."
        de:
          heart_gold: "Wenn es mit seinen Flossen\nschnell durch das Wasser schwimmt,\nbeginnt seine Stirn zu glühen."
          soul_silver: "Es taucht bei Sonnenuntergang am\nWasser auf. Leuchtet seine Stirn,\nsetzt es telekinetische Kräfte ein."
        es:
          heart_gold: "Cuando nada a toda velocidad usando\nsus palmeadas extremidades,\nsu frente comienza a brillar."
          soul_silver: "Aparece en ríos al anochecer.\nPuede usar poderes telequinéticos\nsi su frente brilla misteriosamente."
        ko:
          heart_gold: "물갈퀴가 달린 긴 손발을\n써서 전력으로 헤엄치면\n왠지 이마에서 빛이 반짝인다."
          soul_silver: "해질 무렵 강가에 모습을 나타낸다.\n이마가 이상하게 빛날 때\n신통력을 발휘한다고 전해진다."
mankey:
  species_id: 56
  names:
