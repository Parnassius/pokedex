          soul_silver: "おおむかしの　ポケモン。\nごくまれに　いきた　かせきとして\nはっけん　される　ことがある。"
        en:
          heart_gold: "On rare occasions, some have been\nfound as fossils which they became\nwhile hiding on the ocean floor."
          soul_silver: "This Pokémon lived in ancient times.\nOn rare occasions, it has been\ndiscovered as a living fossil."
        fr:
          heart_gold: "Ils ont été fossilisés alors\nqu’ils se dissimulaient dans\nles fonds marins."
          soul_silver: "Ce Pokémon est très ancien.\nOn en trouve rarement sous\nforme de fossile vivant."
        it:
          heart_gold: "Occasionalmente, nascosti sul fondo\ndell’oceano, se ne trovano alcuni\nin forma fossile."
          soul_silver: "Un Pokémon che viveva nell’antichità.\nRitrovarne esemplari ancora in vita è\nraro. È come un fossile vivente."
        de:
          heart_gold: "Ihre Fossilien, zu denen sie wur-\nden, als sie sich am Meeresgrund\nversteckten, sind seltene Funde."
          soul_silver: "Dieses Pokémon lebte in der An-\ntike. Man hat es selten als leben-\ndes Fossil entdeckt."
        es:
          heart_gold: "En raras ocasiones se han encontrado\ncomo fósiles, porque se habían\nescondido en el fondo marino."
          soul_silver: "Este Pokémon vivió en la antigüedad.\nRara vez se ha conseguido\nrevivir sus fósiles."
        ko:
          heart_gold: "해저에 몸을 숨긴 \n모습 그대로 화석이 된 것이\n가끔 발견된다."
          soul_silver: "오랜 옛날의 포켓몬이다.\n극히 드물게 살아있는 화석으로서\n발견된 일이 있다."
