          soul_silver: "ちいさくても　おとなを　ビリビリ\nさせるほどの　でんげきを　はなてる。\nただし　じぶんも　おどろいてしまう。"
        en:
          heart_gold: "It is not yet skilled at storing\nelectricity. It may send out a\njolt if amused or startled."
          soul_silver: "Despite its small size, it can zap\neven adult humans. However, if it\ndoes so, it also surprises itself."
        fr:
          heart_gold: "Il ne sait pas encore stocker\nl’électricité. Il envoie des\ndécharges par jeu ou par peur."
          soul_silver: "Malgré sa petite taille, il peut\nélectrocuter des adultes. Il se\nsurprend lui-même en le faisant."
        it:
          heart_gold: "Non è ancora bravo a immagazzinare\nelettricità. Se si emoziona oppure\nè divertito ne perde un po’."
          soul_silver: "Nonostante sia minuto può abbattere\nanche una persona adulta. Ma se lo\nfa, sorprende persino se stesso."
        de:
          heart_gold: "Es kann noch nicht mit Elektrizität\numgehen. Es wirft Blitze, wenn es\nsich freut oder erstaunt ist."
          soul_silver: "Obwohl es so klein ist, kann es sogar\nErwachsene überwältigen. Tritt\ndies ein, ist es selbst erstaunt."
        es:
          heart_gold: "Todavía no domina el almacenamiento\nde electricidad, y descargará un\nrayo si se divierte o asusta."
          soul_silver: "A pesar de su pequeño tamaño,\nataca incluso a los humanos,\nalgo que le sorprende incluso a él."
        ko:
          heart_gold: "아직 전기를 모으는 게 서툴다.\n놀라거나 웃으면\n바로 방전돼 버린다."
          soul_silver: "작아도 어른을 찌릿찌릿\n감전시킬 정도의 전기를 낸다.\n단, 자신도 놀라 어찌할 줄 모른다."
