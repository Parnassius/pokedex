          soul_silver: "ちちゅう　ふかくで　うまれる。\nまわりの　つちを　たいらげないと\nちじょうに　でてこれない。"
        en:
          heart_gold: "It feeds on soil. After it has eaten\na large mountain, it falls asleep\nso it can grow."
          soul_silver: "It is born deep underground. It\ncan’t emerge until it has entirely\nconsumed the soil around it."
        fr:
          heart_gold: "Il se nourrit de terre. Une fois\nqu’il a absorbé une montagne, il\ns’endort et commence à évoluer."
          soul_silver: "Né sous terre, il ne peut atteindre\nla surface que s’il a mangé toute\nla terre qui l’entoure."
        it:
          heart_gold: "Si nutre di terra. Dopo aver\ndivorato una montagna intera, si\naddormenta per poter crescere."
          soul_silver: "Nato nel profondo sottosuolo, non può\nemergere finché non ha consumato\ntutto il terreno intorno a sé."
        de:
          heart_gold: "Es ernährt sich von Erde. Nachdem\nes einen Berg verspeist hat,\nschläft es ein, um zu wachsen."
          soul_silver: "Es wird tief unter der Erde geboren\nund kann erst an die Oberfläche,\nwenn es diese aufgefressen hat."
        es:
          heart_gold: "Se alimenta de tierra. Después de\ncomer una gran montaña, se duerme\ny empieza a crecer."
          soul_silver: "Nace muy profundo en el suelo, y no\npodrá salir hasta que se haya\ncomido la tierra que le rodea."
        ko:
          heart_gold: "흙을 먹으며 살고 있다.\n큰 산을 하나 다 먹으면\n성장을 위해 잠자기 시작한다."
          soul_silver: "땅속 깊은 곳에서 태어난다.\n근처의 흙을 먹어 치우지 않으면\n지상으로 나오지 않는다."
