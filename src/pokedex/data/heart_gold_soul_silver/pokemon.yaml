      form_id: 0
      base_stats:
        hp: 78
        attack: 84
        defense: 78
        special_attack: 109
        special_defense: 85
        speed: 100
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 3
        special_defense: 0
        speed: 0
      types:
        - fire
        - flying
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          heart_gold: "ほんきで　おこった　リザードンの\nしっぽの　さきの　ほのおは\nあおじろく　もえあがる。"
          soul_silver: "なんでも　とかしてしまうほどの\nしゃくねつの　ほのおを　ふきだし\nあいてを　くるしめる。"
        en:
          heart_gold: "If CHARIZARD becomes furious,\nthe flame at the tip of its tail flares\nup in a light blue shade."
          soul_silver: "Breathing intense, hot flames, it can\nmelt almost anything. Its breath\ninflicts terrible pain on enemies."
        fr:
          heart_gold: "Quand DRACAUFEU s’énerve, la flamme\nau bout de sa queue brille d’une\nlueur blanche avec des reflets bleus."
          soul_silver: "Pouvant souffler des flammes\nintenses, il peut faire fondre\nn’importe quoi. Gare à sa colère!"
        it:
          heart_gold: "Se s’infuria, la fiamma che ha\nsulla punta della coda si colora\ndi un blu biancastro."
          soul_silver: "Sputando fiamme caldissime può\nsciogliere quasi ogni cosa. Le sue\nfiamme causano dolori terribili."
        de:
          heart_gold: "Wenn GLURAK wütend wird, flackert\ndie Flamme auf seiner Schweifspitze\nin einem bläulichen Ton."
          soul_silver: "Sein heißer Feueratem kann fast\nalles schmelzen. Sein Atem fügt\nden Gegnern enorme Schmerzen zu."
        es:
          heart_gold: "Si CHARIZARD se enfurece, la llama\nde la punta de su cola producirá\ndestellos de color azul claro."
          soul_silver: "Con sus intensas llamas, derrite\ncasi cualquier cosa. Su aliento\ncausa un terrible dolor al enemigo."
        ko:
          heart_gold: "정말 화가 난 리자몽\n꼬리 끝의 불꽃은\n푸르스름하게 불타오른다."
          soul_silver: "무엇이든 녹여버릴 정도의\n작열하는 화염을 뿜어\n상대를 공격한다."
squirtle:
