      types:
        - psychic
        - flying
      egg_groups:
        - flying
      abilities:
        - synchronize
        - early_bird
      descriptions:
        jp_kana:
          heart_gold: "ほとんど　うごかず　なきもせず\nじっとするのは　かこと　みらいを\nみているからだと　しんじられている。"
          soul_silver: "みぎめは　みらいを\nひだりめは　かこを　みていると\nみなみアメリカで　つたえられている。"
        en:
          heart_gold: "They say that it stays still and\nquiet because it is seeing both the\npast and future at the same time."
          soul_silver: "In South America, it is said that\nits right eye sees the future and its\nleft eye views the past."
        fr:
          heart_gold: "On dit qu’il est calme et tranquille\ncar il peut voir en permanence\nle passé et le futur."
          soul_silver: "Il paraît que son œil gauche peut\nvoir le passé et que son œil droit\nest capable de voir le futur."
        it:
          heart_gold: "Si dice che sia così quieto\nperché sta osservando passato\ne futuro allo stesso tempo."
          soul_silver: "In Sudamerica si dice che il suo\nocchio destro veda il futuro e\nquello sinistro il passato."
        de:
          heart_gold: "Man sagt, es sei so still und in sich\ngekehrt, weil es die Zukunft und\ndie Vergangenheit parallel sieht."
          soul_silver: "In Südamerika glaubt man, dass\nsein rechtes Auge die Zukunft und\ndas linke die Vergangenheit sieht."
        es:
          heart_gold: "Dicen que se mantiene quieto\ny en silencio porque observa el\npasado y el futuro al mismo tiempo."
          soul_silver: "Dicen en Sudamérica que su ojo\nderecho ve el futuro y que\nel izquierdo ve el pasado."
        ko:
          heart_gold: "거의 움직이거나 울지 않고\n가만히 있는 것은 과거와 미래를\n보고 있기 때문이라고 여겨진다."
          soul_silver: "오른쪽 눈은 미래를\n왼쪽 눈은 과거를 보고 있다고\n남아메리카에서 전해지고 있다."
mareep:
  species_id: 179
  names:
    jp_kana: メリープ
    en: MAREEP
    fr: WATTOUAT
    it: MAREEP
    de: VOLTILAMM
    es: MAREEP
    ko: 메리프
  forms:
    mareep:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 40
        special_attack: 65
        special_defense: 45
        speed: 35
