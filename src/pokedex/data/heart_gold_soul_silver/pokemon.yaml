      descriptions:
        jp_kana:
          heart_gold: "ぜんそくりょくで　はしりまわって\nすなけむりを　まきあげ じぶんの\nすがたを　かくそうとする。"
          soul_silver: "すごい　いきおいで　じめんをほると\nトゲや　ツメが　おれてしまうが\nつぎのひには　はえそろっている。"
        en:
          heart_gold: "In an attempt to hide itself,\nit will run around at top speed to\nkick up a blinding dust storm."
          soul_silver: "If it digs at an incredible pace,\nit may snap off its spikes and\nclaws. They grow back in a day."
        fr:
          heart_gold: "S’il est menacé, il se met à courir\nfrénétiquement pour soulever un\nnuage de poussière aveuglant."
          soul_silver: "Il creuse si vite qu’il peut briser\nses épines et ses griffes. Mais\nelles repoussent en une journée."
        it:
          heart_gold: "Per nascondersi può girare su se\nstesso velocemente e provocare\nuna tempesta di polvere accecante."
          soul_silver: "Se scava molto velocemente gli\nsi consumano le punte e gli artigli,\nma gli ricrescono in un giorno."
        de:
          heart_gold: "Um sich zu verstecken, wirbelt es\nwild herum und erzeugt so einen \nSandsturm, der den Gegner verwirrt."
          soul_silver: "Wenn es schnell gräbt, können seine\nStacheln und Krallen abbrechen. Sie\nwachsen binnen eines Tages nach."
        es:
          heart_gold: "En un intento por esconderse, saldrá\ncorriendo a gran velocidad, dejando\ntras de sí una gran polvareda."
          soul_silver: "Si cava a gran velocidad, puede\nque se le caigan las garras y púas.\nVuelven a crecerle en un día."
        ko:
          heart_gold: "전속력으로 뛰어다니며\n모래먼지를 일으켜 자신의\n모습을 감추려 한다."
          soul_silver: "굉장한 기세로 지면을 파면\n가시와 발톱이 부러져 버리지만\n다음 날에는 바로 돋아나 있다."
nidoran_f:
