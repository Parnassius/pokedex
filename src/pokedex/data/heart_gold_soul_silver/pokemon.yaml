      descriptions:
        jp_kana:
          heart_gold: "２ひき　よりそいあうと　おたがいの\nけがわが　きもちよすぎて\nはなれられなく　なってしまう。"
          soul_silver: "キメこまやかな　けがわの　もちぬし。\nおこらせると　どんどん　ふくらみ\nのしかかってくるので　ちゅうい。"
        en:
          heart_gold: "Their fur feels so good that if two\nof them snuggle together,\nthey won’t want to be separated."
          soul_silver: "It has a very fine fur. Take care not\nto make it angry, or it may inflate\nsteadily and hit with a body slam."
        fr:
          heart_gold: "Leur fourrure est si douce que\ns’ils se font des câlins ils ne\nvoudront plus se séparer."
          soul_silver: "Il a une très belle fourrure. Ne\njamais le mettre en colère ou il\ngonflera et fera un plaquage."
        it:
          heart_gold: "Hanno un pelo così morbido che\nse due di loro si abbracciano\nnon vogliono più separarsi."
          soul_silver: "Ha un pelo molto bello. Attenzione a\nnon farlo adirare, perché può gonfiarsi\ne caricare con tutto il suo peso."
        de:
          heart_gold: "Sein Fell ist so flauschig, dass,\nwenn zwei zusammenstehen, sie\nnicht getrennt werden möchten."
          soul_silver: "Es hat ein weiches Fell. Ver-\närgere es nicht, denn andernfalls\nsetzt es ständig Bodyslam ein."
        es:
          heart_gold: "Su piel es tan suave que si dos\nde ellos se acurrucan juntos,\nno querrán separarse nunca."
          soul_silver: "Tiene una piel muy fina. Ten cuidado de\nno enfadarle, o se inflará y golpeará\nusando todo su cuerpo."
        ko:
          heart_gold: "2마리가 바싹 붙어 있으면 서로의\n털이 너무 기분 좋아서\n떨어지지 않게 되어버린다."
          soul_silver: "고운 결의 세밀한 털을 지니고 있다.\n화나게 하면 점점 부풀려\n덮쳐 누르기 때문에 주의가 필요하다."
zubat:
