      descriptions:
        jp_kana:
          heart_gold: "じっと　みみを　すますと\nはげしい　ながれの　かわの　なかに\nなにが　いるのか　ききわけられる。"
          soul_silver: "みずあそびを　するとき\nみずが　はいってこないように\nながい　みみを　まいている。"
        en:
          heart_gold: "By keeping still and listening\nintently, it can tell what is in even\nwild, fast-moving rivers."
          soul_silver: "When it plays in water, it rolls up\nits elongated ears to prevent their\ninsides from getting wet."
        fr:
          heart_gold: "En ne bougeant plus et en écoutant,\nil peut discerner ce qu’il y a au\nfond des fleuves."
          soul_silver: "Quand il joue dans l’eau, il\nroule ses oreilles en boule\npour éviter de les mouiller."
        it:
          heart_gold: "Ascoltando in silenzio con attenzione\ncapisce ciò che si può trovare\nanche nei fiumi più impetuosi."
          soul_silver: "Quando gioca in acqua arrotola le\nlunghe orecchie perché non si\nbagnino all’interno."
        de:
          heart_gold: "Verhält es sich regungslos und\nlauscht, hört es, was sich in wilden\nund reißenden Flüssen abspielt."
          soul_silver: "Spielt es im Wasser, rollt es sei-\nne langen Ohren zusammen, um zu\nverhindern, dass Wasser eindringt."
        es:
          heart_gold: "Guardando silencio y prestando\nmucha atención puede saber lo que\nhay en los rápidos y salvajes ríos."
          soul_silver: "Cuando juega en el agua, enrolla\nsus alargadas orejas para evitar\nque le entre agua."
        ko:
          heart_gold: "가만히 귀를 기울이면\n세차게 흐르는 강 안에\n무엇이 있는지 분간할 수 있다."
          soul_silver: "물놀이를 할 때\n물이 들어가지 않도록\n긴 귀를 감고 있다."
sudowoodo:
  species_id: 185
  names:
    jp_kana: ウソッキー
    en: SUDOWOODO
    fr: SIMULARBRE
    it: SUDOWOODO
