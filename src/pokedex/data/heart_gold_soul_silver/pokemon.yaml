      descriptions:
        jp_kana:
          heart_gold: "がんじょうな　いしあたま。\nきゅうばんつきの　あしを　からませ\nひたすら　あたまで　うちすえる。"
          soul_silver: "いわあなに　もぐりこむ　せいしつの\nもちぬしで　ねむくなると　ほかの\nオクタンの　すあなを　うばう。"
        en:
          heart_gold: "It traps foes with the suction cups\non its tentacles, then smashes\nthem with its rock-hard head."
          soul_silver: "It instinctively sneaks into rocky\nholes. If it gets sleepy, it steals\nthe nest of a fellow OCTILLERY."
        fr:
          heart_gold: "Il capture ses ennemis avec ses\ntentacules et les écrase ensuite\navec sa tête dure comme la pierre."
          soul_silver: "Il s’introduit furtivement dans\nles rochers. S’il est fatigué, il\nprend le nid d’un autre OCTILLERY."
        it:
          heart_gold: "Cattura i nemici con le ventose\ndei tentacoli per poi colpirli con\nil suo capo duro come pietra."
          soul_silver: "S’introduce istintivamente in buchi\nnella roccia. Se ha sonno occupa\nla tana di un altro OCTILLERY."
        de:
          heart_gold: "Beim Beutefang setzt es seine\nTentakel ein. Es zermalmt seine\nBeute mit seinem steinharten Kopf."
          soul_silver: "Es verkriecht sich instinktiv in\nFelshöhlen. Wird es müde, raubt es\ndas Versteck eines fremden OCTILLERY."
        es:
          heart_gold: "Atrapa a los enemigos con\nsus tentáculos y después los\ngolpea con su dura cabeza."
          soul_silver: "Instintivamente se escabulle entre\nlas rocas. Si le entra sueño,\nrobará la guarida de otro OCTILLERY."
        ko:
          heart_gold: "튼튼한 돌머리다.\n빨판이 붙어 있는 다리를 휘감아\n한결같이 머리로 세게 때린다."
          soul_silver: "바위구멍에 숨어드는 성질의\n소유자로 잠이 오면 다른\n대포무노의 거처를 빼앗는다."
delibird:
  species_id: 225
  names:
    jp_kana: デリバード
    en: DELIBIRD
