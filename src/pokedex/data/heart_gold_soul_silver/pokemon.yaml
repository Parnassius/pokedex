          soul_silver: "こおりが　うかぶ　つめたい　うみが\nだいすき。ながいシッポは　むきを\nすばやく　かえるのに　やくだつ。"
        en:
          heart_gold: "Its streamlined body has little\ndrag in water. The colder the\ntemperature, the friskier it gets."
          soul_silver: "It loves frigid seas with ice\nfloes. It uses its long tail to\nchange swimming direction quickly."
        fr:
          heart_gold: "Son corps hydrodynamique glisse\ndans l’eau. Plus l’eau est froide\nplus il se sent à l’aise."
          soul_silver: "Il aime les mers glaciales. Sa longue\nqueue lui permet de changer de direction\ntrès vite."
        it:
          heart_gold: "Il suo corpo affusolato ha poco\nattrito nell’acqua. Le basse\ntemperature lo rendono vivace."
          soul_silver: "Ama le acque gelide dove galleggia\nil ghiaccio. Muovendo la coda, può\ncambiare rapidamente direzione."
        de:
          heart_gold: "Es verspürt kaum Widerstand im\nWasser. Je niedriger die Temperatur,\ndesto verspielter verhält es sich."
          soul_silver: "Es liebt das Eismeer. Beim Schwim-\nmen setzt es seinen langen Schweif\nein, um die Richtung zu ändern."
        es:
          heart_gold: "Su aerodinámico cuerpo avanza\nfácilmente por el agua. Cuanto más\nfría, más diversión."
          soul_silver: "Adora los mares helados con\ntémpanos. Usa su larga cola para\ncambiar de rumbo al nadar."
        ko:
          heart_gold: "몸은 물의 저항이\n적은 유선형이다.\n추워질수록 기운이 난다."
          soul_silver: "얼음이 떠다니는 차가운 바다를\n좋아한다. 긴 꼬리는 방향을\n재빨리 바꾸는 데 도움이 된다."
grimer:
  species_id: 88
