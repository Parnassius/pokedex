          soul_silver: "３００シーシーの　ちを　すえるが\nいちどに　すいすぎると　からだが\nおもたくなって　ふらふら　する。"
        en:
          heart_gold: "However hard its victim’s hide may be,\nit punctures with sharp fangs\nand gorges itself with blood."
          soul_silver: "It can drink more than 10 ounces of\nblood at once. If it has too much,\nit gets heavy and flies clumsily."
        fr:
          heart_gold: "Sa morsure peut percer l’épiderme\nle plus dur. Il peut ainsi boire le\nsang de ses ennemis."
          soul_silver: "Il peut boire plus de 300 cl de sang\nen une fois. S’il en a trop bu, il\ns’alourdit et vole plus lentement."
        it:
          heart_gold: "Per quanto dura sia la pelle della\nvittima, la fora con le zanne\naffilate macchiandosi di sangue."
          soul_silver: "Può bere più di 300 ml di sangue\nalla volta. Se ne beve troppo,\nsi appesantisce e vola goffamente."
        de:
          heart_gold: "Wie dick die Haut des Opfers auch\nist, seine spitzen Zähne durchbohren\nsie und es trinkt von seinem Blut."
          soul_silver: "Es kann bis zu 0,3 Liter Blut auf\neinmal trinken. Trinkt es zu viel,\nwird es schwer und fliegt behäbig."
        es:
          heart_gold: "Por muy dura que sea la piel de su\nvíctima, clava sus afilados colmillos\npara atiborrarse de su sangre."
          soul_silver: "Puede succionar más de 300 ml de\nsangre de golpe. Si toma demasiada,\nengorda mucho y vuela torpemente."
        ko:
          heart_gold: "아무리 단단한 피부라도\n예리한 송곳니로 뚫어\n듬뿍 피를 빤다."
          soul_silver: "300cc의 피를 빨 수 있지만\n한 번에 너무 많이 빨면 몸이\n무거워져서 비틀거린다."
