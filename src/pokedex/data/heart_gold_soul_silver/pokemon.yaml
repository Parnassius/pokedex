          soul_silver: "だれかに　すがたを　みられると\nシッポで　あなをほって　にげだす。\nハネで　すこしだけ　うかべる。"
        en:
          heart_gold: "When spotted, this Pokémon escapes\nbackward by furiously boring into\nthe ground with its tail."
          soul_silver: "If spotted, it escapes by burrowing\nwith its tail. It can float just\nslightly using its wings."
        fr:
          heart_gold: "Il s’enfuit en creusant à reculons\ndans le sol avec sa queue dès\nqu’un ennemi le repère."
          soul_silver: "S’il est repéré, il fuit en\ncreusant avec sa queue. Il\npeut léviter avec ses ailes."
        it:
          heart_gold: "Se lo si scopre, questo Pokémon fugge\nall’indietro scavando furiosamente\nnel terreno con la coda."
          soul_silver: "Se viene scoperto, fugge scavando\ncon la coda. Le ali non gli permettono\nche brevi voli."
        de:
          heart_gold: "Wird es entdeckt, flüchtet dieses\nPokémon, indem es sich mit seinem\nSchweif in den Boden gräbt."
          soul_silver: "Wird es entdeckt, gräbt es sich ins\nErdreich, um zu fliehen. Setzt es\nseine Flügel ein, kann es schweben."
        es:
          heart_gold: "Este Pokémon escapa hacia\natrás perforando el suelo con\nsu cola, si es descubierto."
          soul_silver: "Si se siente amenazado, escapa\ncavando con su cola. Puede flotar\nligeramente usando sus alas."
        ko:
          heart_gold: "누군가에게 들키면\n꼬리로 땅을 파서\n뒤쪽으로 도망친다."
          soul_silver: "누군가에게 모습을 보이면\n꼬리로 구멍을 파서 도망친다.\n날개로 약간은 공중에 뜰 수 있다."
