          soul_silver: "きせつふうに　ながされつつ\nしそんを　ふやすため　わたほうしを\nせかいの　あちこちに　ばらまく。"
        en:
          heart_gold: "Once it catches the wind, it deftly\ncontrols its cotton-puff spores--\nit can even float around the world."
          soul_silver: "Drifts on seasonal winds and spreads\nits cotton-like spores all over\nthe world to make more offspring."
        fr:
          heart_gold: "Quand il est pris dans le vent,\nil utilise ses appendices de\ncoton pour voler autour du monde."
          soul_silver: "Il se laisse porter par le vent et\nrépand ses spores duveteuses dans\nle monde pour se multiplier."
        it:
          heart_gold: "Sospinto dal vento controlla con\nabilità i semi a batuffolo di cotone\nper volare anche intorno al mondo."
          soul_silver: "Si fa trasportare dai venti stagionali,\nspargendo ovunque i suoi semi simili\nal cotone per moltiplicarsi."
        de:
          heart_gold: "Wenn es einmal vom Wind erfasst\nwurde, wird es mit seinen Fallschirm-\nchen um den ganzen Erdball getragen."
          soul_silver: "Es lässt sich von Winden tragen und\nverstreut auf diese Weise seinen\nSamen über die ganze Welt."
        es:
          heart_gold: "Si es llevado por el viento, podría\ndar la vuelta al mundo controlando\nel vuelo con sus esporas."
          soul_silver: "Se desplaza con los vientos\nestacionales y suelta sus esporas\npor todo el mundo para reproducirse."
        ko:
          heart_gold: "한번 바람을 타면\n솜 포자를 자유자재로 움직이며\n세계 일주를 해 버린다."
          soul_silver: "계절풍을 따라 흘러다니며\n자손을 늘리기 위해 포자를\n세계 여기저기에 흩뿌린다."
