          soul_silver: "Un Pokémon qui parcourt le\nmonde. Le vent du nord souffle\nà chaque fois qu’il apparaît."
        it:
          heart_gold: "Si dice che sia la reincarnazione dei\nventi nordici. Purifica all’istante\nl’acqua torbida e putrida."
          soul_silver: "Un Pokémon che corre in lungo\ne in largo. Si dice che ogni volta\nche appare, soffino i venti del nord."
        de:
          heart_gold: "Man sagt, es sei die Wiedergeburt\ndes Nordwindes. Es kann ver-\nschmutztes Wasser im Nu reinigen."
          soul_silver: "Dieses Pokémon jagt über das Land.\nMan sagt, der kalte Nordwind\nbegleite es auf seinen Wegen."
        es:
          heart_gold: "Conocido como la reencarnación de\nlos vientos del norte, puede\npurificar aguas turbias y sucias."
          soul_silver: "Este Pokémon corre por la tierra.\nDicen que siempre que aparece,\nsoplan vientos del norte."
        ko:
          heart_gold: "순식간에 더럽고 탁한\n물도 깨끗하게 하는 힘을 가졌다.\n북풍이 다시 태어난 것이라고 한다."
          soul_silver: "모습을 나타냈을 때\n웬일인지 북풍이 분다고 전해지는\n대지를 달리는 포켓몬이다."
