          soul_silver: "ちからを　たくわえるため　ふかい\nかいていで　ねむっているらしい。\nめざめると　たつまきに　なるという。"
        en:
          heart_gold: "It is said that it usually hides in\nunderwater caves. It can create\nwhirlpools by yawning."
          soul_silver: "It sleeps deep on the ocean floor to\nbuild its energy. It is said to\ncause tornadoes as it wakes."
        fr:
          heart_gold: "On dit qu’il se cache dans les\ngrottes sous-marines. Il peut\ncréer des tourbillons en bâillant."
          soul_silver: "Il dort au plus profond de l’océan\npour accumuler de l’énergie. Son\nréveil cause des tornades."
        it:
          heart_gold: "Si dice che si nasconda in grotte\nsottacqua. Il suo sbadiglio\npuò provocare dei vortici."
          soul_silver: "Dorme sul fondo dell’oceano per\nricaricarsi di energia. Si dice che\ncausi uragani quando si sveglia."
        de:
          heart_gold: "Man sagt, es hause in Unterwasser-\nhöhlen. Es kann mächtige Strudel\ngenerieren, wenn es gähnt."
          soul_silver: "Tief unten am Meeresboden tankt\nes Energie im Schlaf. Wacht es\nauf, kann es Tornados auslösen."
        es:
          heart_gold: "Dicen que suele esconderse en\ncuevas submarinas. Puede crear\ntorbellinos al bostezar."
          soul_silver: "Duerme en el fondo del océano para\nrecargarse de energía. Dicen que\ncausa tornados cuando se levanta."
        ko:
          heart_gold: "평소에는 해저동굴에\n몸을 숨기고 있는 것 같다. 하품으로\n소용돌이를 발생시킨다."
          soul_silver: "힘을 비축하기 위해 깊은\n해저에서 잠들어 있는 듯하다.\n눈을 뜨면 회오리를 일으킨다고 전해진다."
phanpy:
