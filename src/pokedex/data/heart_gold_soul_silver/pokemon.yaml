          heart_gold: "They say that if it emits an aura\nfrom its whole body, the weather\nwill begin to change instantly."
          soul_silver: "Its crystalline orbs appear to\ngive this Pokémon the power to\nfreely control the weather."
        fr:
          heart_gold: "On dit que si tout son corps\német une aura, les conditions\nclimatiques changeront bientôt."
          soul_silver: "Ses orbes de cristal\ndonnent le pouvoir de\ncontrôler le climat."
        it:
          heart_gold: "Dicono che quando un’aura gli\ncirconda il corpo, significa che il\ntempo cambierà immediatamente."
          soul_silver: "Pare che le sfere di cristallo diano\na questo Pokémon il pieno controllo\nsulle condizioni atmosferiche."
        de:
          heart_gold: "Die Aura, die es umgibt, ist so\nstark, dass es in der Lage ist, das\nWetter sofort zu verändern."
          soul_silver: "Die kristallenen Bälle an seinem\nSchweif ermöglichen es ihm, das\nWetter zu beeinflussen."
        es:
          heart_gold: "Dicen que cuando su cuerpo\ndesprende un aura, el tiempo\nempieza a cambiar inmediatamente."
          soul_silver: "Sus cristalinos orbes parecen\ndarle al Pokémon el poder de\ncontrolar el clima libremente."
        ko:
          heart_gold: "전신에서 오라를 발산하면\n주변 날씨가 순식간에\n변한다고 한다."
          soul_silver: "수정 같은 구슬에는\n날씨를 자유롭게 조종하는\n능력이 담겨 있는 듯하다."
