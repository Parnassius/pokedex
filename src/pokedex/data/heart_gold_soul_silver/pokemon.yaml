          soul_silver: "たたかいのとき　８０ぽんの\nしょくしゅを　すべて　のばして\nどくの　ほういもうを　つくりあげる。"
        en:
          heart_gold: "Its 80 tentacles absorb water and\nstretch almost endlessly to\nconstrict its prey and enemies."
          soul_silver: "In battle, it extends all 80 of\nits tentacles to entrap its opponent\ninside a poisonous net."
        fr:
          heart_gold: "Ses 80 tentacules absorbent de\nl’eau et s’étirent sans fin pour\nenserrer et capturer ses adversaires."
          soul_silver: "En combat, il se sert de ses 80\ntentacules pour emprisonner son\nadversaire dans un filet venimeux."
        it:
          heart_gold: "Ha 80 tentacoli che assorbono\nl’acqua e si distendono ad libitum\nper soffocare la preda."
          soul_silver: "Nella lotta estende gli ottanta\ntentacoli per intrappolare il\nnemico in una rete velenosa."
        de:
          heart_gold: "Seine 80 Tentakel absorbieren das\nWasser und sind sehr dehnbar,\num Beute und Feinde zu umklammern."
          soul_silver: "Im Kampf bilden seine 80 Tentakel\nein Giftnetz, in dem es seine Geg-\nner fängt und sie vergiftet."
        es:
          heart_gold: "Sus 80 tentáculos absorben agua y\nse alargan para oprimir la \nrespiración de sus presas y enemigos."
          soul_silver: "En la batalla, extiende sus 80\ntentáculos para atrapar al enemigo\nen una red venenosa."
        ko:
          heart_gold: "80개가 넘는 많은\n촉수는 수분을 머금고\n어디까지라도 늘여서 휘감는다."
          soul_silver: "싸울 때 80개의\n촉수를 모두 뻗어서\n독의 포위망을 펼친다."
geodude:
  species_id: 74
