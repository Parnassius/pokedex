          soul_silver: "へんしんは　かんぺき　なのだが\nわらわされて　ちからが　ぬけると\nへんしんは　とけてしまう。"
        en:
          heart_gold: "It can transform into anything.\nWhen it sleeps, it changes into a\nstone to avoid being attacked."
          soul_silver: "Its transformation ability is perfect.\nHowever, if made to laugh, it\ncan’t maintain its disguise."
        fr:
          heart_gold: "Il peut se transformer en tout.\nQuand il dort, il se change en\npierre pour éviter d’être attaqué."
          soul_silver: "Sa capacité de transformation est\nparfaite. Si vous le faites rire,\nil ne pourra rester déguisé."
        it:
          heart_gold: "Si può trasformare in qualsiasi cosa.\nQuando dorme si tramuta in pietra\nper evitare gli attacchi."
          soul_silver: "La sua capacità di trasformarsi è\nperfetta. Ma se lo si fa ridere,\nperde subito il travestimento."
        de:
          heart_gold: "Es kann sich in alles verwandeln.\nWenn es schläft, verwandelt es sich\nin einen Stein, um sicher zu sein."
          soul_silver: "Seine Verwandlungskunst ist\nperfekt. Bringt man es jedoch zum\nLachen, fällt seine Tarnung."
        es:
          heart_gold: "Se puede transformar en cualquier\ncosa. Cuando duerme, se vuelve\nroca para evitar ataques."
          soul_silver: "Su habilidad para transformarse es\nperfecta. Pero si se le hace reír,\nperderá su poder de transformación."
        ko:
          heart_gold: "어떤 것으로든 변신할 수 있다.\n잘 때는 돌로 변신해서\n습격당하지 않도록 하고 있다."
          soul_silver: "변신은 완벽하지만\n비웃음을 당해 힘이 빠지면\n변신이 풀려버리고 만다."
