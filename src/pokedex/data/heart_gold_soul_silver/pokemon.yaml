          soul_silver: "はねの　りんぷんは　いろがこいと\nどくをあたえ　うすいと　しびれさすと\nいったぐあいに　こうかが　ちがう。"
        en:
          heart_gold: "When it attacks, it flaps its large\nwings violently to scatter its\npoisonous powder all around."
          soul_silver: "The powder on its wings is poisonous\nif it is dark in hue. If it is light in hue,\nit causes paralysis."
        fr:
          heart_gold: "Il bat des ailes violemment pour\nprojeter des poudres empoisonnées\nvers ses adversaires."
          soul_silver: "Si la poudre sur ses ailes est\nsombre, elle empoisonne. Si\nelle est claire, elle paralyse."
        it:
          heart_gold: "Quando attacca batte con forza le sue\nlarghe ali spargendo ovunque\nla sua polvere velenosa."
          soul_silver: "La polvere sulle sue ali è velenosa\nse è di colore scuro. Se è chiara,\ninvece, provoca paralisi."
        de:
          heart_gold: "Beim Angriff schlägt es wild\nmit seinen Flügeln, um seinen\nGiftpuder überall zu verstreuen."
          soul_silver: "Ist es schwarz, enthält sein Puder\nGift. Ist es weiß, paralysiert sein\nPuder alle Gegner bei Berührung."
        es:
          heart_gold: "Cuando ataca, agita sus largas\nalas violentamente para esparcir\npolvo venenoso a su alrededor."
          soul_silver: "El polvo de sus alas es venenoso\nsi es de color oscuro. Si es claro,\ncausa parálisis."
        ko:
          heart_gold: "공격할 때는 격하게\n커다란 날개를 쳐서\n독가루를 뿌린다."
          soul_silver: "날개의 가루는 상태에 따라 색이\n짙어지면 독의 성질을 내고 색이\n옅어지면 마비의 효과를 나타낸다."
