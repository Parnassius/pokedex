        jp_kana:
          heart_gold: "やまから　ころがり　おちるとき\nからだの　あちこちが　とれても\nきにしない　ごうかいな　せいかく。"
          soul_silver: "あるいても　おそいので\nころがって　いどう。とちゅうに\nなにがあっても　きにしない。"
        en:
          heart_gold: "With a free and uncaring nature,\nit doesn’t mind if pieces break off\nwhile it rolls down mountains."
          soul_silver: "A slow walker, it rolls to move. It\npays no attention to any object that\nhappens to be in its path."
        fr:
          heart_gold: "D’une nature téméraire, il se moque\nde perdre des parties de son\ncorps quand il dévale les pentes."
          soul_silver: "Plutôt lent, il se déplace en roulant\nsans prêter attention à ce qu’il y a\nsur sa route."
        it:
          heart_gold: "Di natura libera e incurante, non\nsi preoccupa se perde dei pezzi\nmentre si rotola giù dai monti."
          soul_silver: "Lento a camminare, si sposta\nrotolando. Non fa attenzione agli\noggetti che trova sulla sua strada."
        de:
          heart_gold: "Es ist ihm völlig gleichgültig,\nwenn Stücke aus ihm herausbrechen,\nwährend es Berge hinabrollt."
          soul_silver: "Da es nur langsam gehen kann, bewegt\nes sich rollend. Es nimmt keine\nRücksicht auf Hindernisse."
        es:
          heart_gold: "De naturaleza descuidada y\nlibre, no le importa dañarse\ncuando baja rodando montañas."
          soul_silver: "Rueda lentamente para moverse.\nNo presta atención a ningún objeto\nque se cruce en su camino."
        ko:
          heart_gold: "산에서 굴러 떨어질 때\n몸의 여기저기가 부서져도\n신경 쓰지 않는 호쾌한 성격이다."
          soul_silver: "걸음이 늦기 때문에\n굴러서 이동한다. 도중에\n무슨 일이 있어도 신경 쓰지 않는다."
