      descriptions:
        jp_kana:
          heart_gold: "きけんがせまると　くちから　はきだす\nあわで　ぜんしんを　つつんで\nからだを　おおきく　みせようとする。"
          soul_silver: "ハサミは　かんたんに　もげる。\nハサミが　なくなると　どうしてだか\nよこあるき　できなくなってしまう。"
        en:
          heart_gold: "If it senses danger approaching,\nit cloaks itself with bubbles from\nits mouth so it will look bigger."
          soul_silver: "The pincers break off easily. If it\nloses a pincer, it somehow becomes\nincapable of walking sideways."
        fr:
          heart_gold: "S’il est menacé, il se cache derrière\nles bulles émises par sa bouche\npour paraître plus gros."
          soul_silver: "Ses pinces sont fragiles. S’il\nen perd une, il n’arrive plus\nà marcher de côté."
        it:
          heart_gold: "Se si sente in pericolo, si\ncirconda di bolle che produce con\nla bocca per sembrare più grande."
          soul_silver: "Le chele si rompono facilmente.\nSe ne perde una diventa incapace\ndi camminare lateralmente."
        de:
          heart_gold: "Wittert es Gefahr, hüllt es sich in\nBlasen aus seinem Maul, um größer\nzu erscheinen."
          soul_silver: "Seine Scheren brechen leicht ab.\nWenn es eine verliert, kann es\nnicht mehr seitwärts laufen."
        es:
          heart_gold: "Ante el peligro, se camufla con\nlas burbujas que desprende su\nboca, para parecer más grande."
          soul_silver: "Sus pinzas se rompen fácilmente.\nSi pierde una, aparentemente se\nvuelve incapaz de caminar de lado."
        ko:
          heart_gold: "위험이 닥치면 입에서 뿜어내는\n거품으로 전신을 감싸서\n몸을 크게 보이려고 한다."
          soul_silver: "집게는 간단하게 분리된다.\n집게가 없어지면 어째서인지\n게걸음을 하지 못하게 된다."
kingler:
  species_id: 99
  names:
    jp_kana: キングラー
    en: KINGLER
    fr: KRABBOSS
    it: KINGLER
    de: KINGLER
    es: KINGLER
    ko: 킹크랩
