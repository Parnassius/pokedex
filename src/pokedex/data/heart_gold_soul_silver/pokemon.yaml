          soul_silver: "くうきちゅうの　すいぶんを　こおらせ\nゆきを　ふらせながら　とんでいく\nでんせつの　とりポケモンの　ひとつ。"
        en:
          heart_gold: "The magnificent, seemingly translucent\nwings of this legendary bird Pokémon\nare said to be made of ice."
          soul_silver: "One of the legendary bird Pokémon,\nit chills moisture in the atmosphere\nto create snow while flying."
        fr:
          heart_gold: "Les majestueuses ailes translucides\nde ce Pokémon légendaire semblent\nêtre faites de givre."
          soul_silver: "L’un des Pokémon Oiseaux\nlégendaires. Il gèle l’humidité\nen volant et fait neiger."
        it:
          heart_gold: "Sembra che le magnifiche ali\nsemitrasparenti di questo Pokémon\nleggendario siano di ghiaccio."
          soul_silver: "Uno dei Pokémon uccello leggendari.\nQuando vola congela l’umidità e\nproduce neve."
        de:
          heart_gold: "Die grazilen und transparenten\nFlügel dieses Legendären Vogel-\nPokémon sollen aus Eis sein."
          soul_silver: "Ein Legendäres Vogel-Pokémon. Es\ngefriert das Wasser in der Atmos-\nphäre, um im Schnee zu fliegen."
        es:
          heart_gold: "Dicen que las magníficas alas\ntranslúcidas de este legendario\nPokémon pájaro son de hielo."
          soul_silver: "Uno de los Pokémon pájaro\nlegendarios. Enfría la humedad\npara crear nieve mientras vuela."
        ko:
          heart_gold: "투명해 보이는 훌륭한 날개는\n얼음으로 되어 있다고 전해지는\n전설의 새포켓몬이다."
          soul_silver: "공기 중의 수분을 얼려서\n눈을 날리며 날아가는\n전설의 새포켓몬 중 한 마리다."
