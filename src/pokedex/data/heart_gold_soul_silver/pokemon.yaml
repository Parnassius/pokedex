        - field
      abilities:
        - poison_point
        - rivalry
      descriptions:
        jp_kana:
          heart_gold: "こがらだが　ツノのなかには　どくが\nいっぱい。ぜんしんで　とびこんできて\nツノをさし　どくを　ながしこむ。"
          soul_silver: "おおきな　みみを　たてて\nまわりをさぐり　きけんが　せまると\nさきに　こうげきを　しかけてくる。"
        en:
          heart_gold: "It is small, but its horn is filled\nwith poison. It charges then stabs\nwith the horn to inject poison."
          soul_silver: "It raises its big ears to check its\nsurroundings. It will strike\nfirst if it senses any danger."
        fr:
          heart_gold: "Il est tout petit, mais ses piquants\nsont enduits d’un poison fulgurant\nqu’il inocule en chargeant."
          soul_silver: "Il soulève ses oreilles pour surveiller\nles environs et frappe en premier en\ncas de danger."
        it:
          heart_gold: "Pur piccolo, il corno è colmo di veleno.\nCarica, poi infilza con il corno\niniettando il veleno."
          soul_silver: "Rizza le orecchie per esaminare\nl’ambiente circostante. Al primo\nsegnale di pericolo attacca per primo."
        de:
          heart_gold: "Es ist klein, aber sein Horn ist\ngiftig. Es bohrt sein Horn in seine\nGegner, um Gift zu injizieren."
          soul_silver: "Es stellt seine Ohren auf, um die\nUmgebung zu prüfen. Spürt es Ge-\nfahr, greift es stets zuerst an."
        es:
          heart_gold: "Es pequeño, pero su cuerno está\nlleno de veneno. Primero embiste y\ndespués lanza su venenosa cornada."
          soul_silver: "Levanta sus orejas para vigilar los\nalrededores. Será el primero en\natacar si se siente amenazado."
        ko:
          heart_gold: "작은 몸집이지만 뿔 안에는 독이\n가득하다. 온몸을 던져 덮치며\n뿔로 찔러 독을 흘려 넣는다."
          soul_silver: "커다란 귀를 세워서\n주변을 살피고 위험이 닥치면\n먼저 공격을 해온다."
nidorino:
