        en:
          heart_gold: "This legendary bird Pokémon\ncauses savage thunderstorms by\nflapping its glittering wings."
          soul_silver: "This legendary bird Pokémon is\nsaid to appear only when a thundercloud\nparts into two halves."
        fr:
          heart_gold: "Quand ce Pokémon légendaire bat\nses ailes d’énergie, il provoque de\ngigantesques orages."
          soul_silver: "Ce Pokémon Oiseau légendaire\nn’apparaît que lorsqu’un\nnuage orageux est divisé en deux."
        it:
          heart_gold: "Battendo le ali splendenti, questo\nPokémon uccello leggendario\ncausa violente tempeste."
          soul_silver: "Pokémon uccello leggendario: si\nfa vedere solo quando una nube da\ntemporale si rompe simmetricamente."
        de:
          heart_gold: "Dieses Legendäre Vogel-Pokémon\nverursacht Gewitterstürme, indem\nes mit den Flügeln schlägt."
          soul_silver: "Dieses Legendäre Vogel-Pokémon\nsoll nur dann auftauchen, wenn sich\neine Gewitterwolke teilt."
        es:
          heart_gold: "Este legendario Pokémon pájaro\nprovoca violentas tormentas de\nrayos agitando sus brillantes alas."
          soul_silver: "Dicen que este Pokémon pájaro\nlegendario solo aparece cuando se\nabren las nubes en una tormenta."
        ko:
          heart_gold: "반짝이는 날개로 날개 치면\n세찬 번개가 발생하는\n전설의 새포켓몬 중 하나다."
          soul_silver: "번개 구름이 둘로 갈라졌을 때\n모습을 나타낸다고 전해지는\n전설의 새포켓몬이다."
