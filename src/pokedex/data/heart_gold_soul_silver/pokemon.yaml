        jp_kana:
          heart_gold: "シャワーズの　ぜんしんの　ひれが\nこきざみに　ふるえはじめるのは\nすうじかんごに　あめがふる　しるし。"
          soul_silver: "きれいな　みずべを　このんでいる。\nさいぼうが　みずのぶんしに　にており\nみずに　とけることもできる。"
        en:
          heart_gold: "When VAPOREON’s fins begin to\nvibrate, it is a sign that rain\nwill come within a few hours."
          soul_silver: "It prefers beautiful shores. With\ncells similar to water molecules,\nit could melt in water."
        fr:
          heart_gold: "Si ses nageoires vibrent, il y a des\nchances pour qu’il se mette à \npleuvoir dans les prochaines heures."
          soul_silver: "Il préfère les belles plages. Il peut\nse dissoudre à volonté grâce à\nses cellules proches de l’eau."
        it:
          heart_gold: "Se le pinne di VAPOREON iniziano\na vibrare, vuol dire che pioverà\nnel giro di poche ore."
          soul_silver: "Preferisce stare sulla costa. In acqua\nle sue cellule simili a molecole acquee\nsi possono scomporre."
        de:
          heart_gold: "Vibrieren die Flossen AQUANAs,\nbedeutet dies, dass es in den\nnächsten Stunden zu regnen beginnt."
          soul_silver: "Es liebt schöne Ufer. Da seine\nZellstruktur Wassermolekülen ähn-\nlich ist, schmilzt es im Wasser."
        es:
          heart_gold: "Cuando las aletas de VAPOREON\nvibran, significa que lloverá en\nlas próximas horas."
          soul_silver: "Prefiere las bellas costas.\nCon células parecidas al agua,\npodría fundirse en la misma."
        ko:
          heart_gold: "샤미드의 전신의 지느러미가\n조금씩 떨리기 시작하는 것은\n몇 시간 뒤에 비가 내린다는 표시."
          soul_silver: "아름다운 물가를 좋아한다.\n세포가 물의 분자구조와 닮아서\n물에 녹는 것도 가능하다."
