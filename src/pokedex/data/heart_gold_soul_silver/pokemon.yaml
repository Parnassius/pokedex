      descriptions:
        jp_kana:
          heart_gold: "じっとしていると　ようがんで　できた\nからだが　ひえて　かたまるから\nねむることなく　うごきまわっている。"
          soul_silver: "かざんちたいに　おおく　はっせい。\nあたたかい　ところを　さがして\nのろのろ　はいずりまわっている。"
        en:
          heart_gold: "It never sleeps. It has to keep\nmoving because if it stopped, its\nmagma body would cool and harden."
          soul_silver: "A common sight in volcanic areas, it\nslowly slithers around in a\nconstant search for warm places."
        fr:
          heart_gold: "Il ne dort jamais. Il doit toujours\nse déplacer, car s’il est immobile,\nson corps de lave se solidifie."
          soul_silver: "Commun dans les régions volcaniques,\nil se déplace sans cesse pour\ntrouver des endroits chauds."
        it:
          heart_gold: "Non dorme mai. Deve essere sempre\nin movimento o il suo corpo di\nmagma si raffredda e si secca."
          soul_silver: "Comune nelle aree vulcaniche, striscia\nin giro lentamente, sempre alla ricerca\ndi luoghi caldi."
        de:
          heart_gold: "Es schläft nie. Es muss in Bewegung\nbleiben, da sein Magma-Körper sonst\nabkühlen und erhärten würde."
          soul_silver: "Es hält sich ständig bei Vulkanen\nauf und ist stets kriechend auf der\nSuche nach warmen Aufenthaltsorten."
        es:
          heart_gold: "No duerme nunca. Tiene que seguir\nmoviéndose porque si se detiene,\nsu cuerpo de lava podría enfriarse."
          soul_silver: "Asiduo a las zonas volcánicas,\nse desliza lentamente en\nbusca de lugares calientes."
        ko:
          heart_gold: "가만히 있으면 용암으로 된\n몸이 식어서 딱딱해지기 때문에\n잠도 자지 않고 계속 움직이고 있다."
          soul_silver: "화산지대에 많이 나타난다.\n따뜻한 곳을 찾아서\n느릿느릿 기어다니고 있다."
magcargo:
