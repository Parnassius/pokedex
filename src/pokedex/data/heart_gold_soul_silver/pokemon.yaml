        jp_kana:
          heart_gold: "ころがって　いどう　するので\nじめんが　でこぼこ　だと\nショックで　ばくはつ　してしまう。"
          soul_silver: "モンスターボールが　うりだされたのと\nおなじ　じきに　はっけんされた。\nなにか　かんけいがある　といわれる。"
        en:
          heart_gold: "It rolls to move. If the ground is\nuneven, a sudden jolt from hitting\na bump can cause it to explode."
          soul_silver: "It was discovered when Poké Balls\nwere introduced. It is said that\nthere is some connection."
        fr:
          heart_gold: "Il se déplace en roulant. S’il\ntrébuche sur une aspérité, un\néclair jaillit et il explose."
          soul_silver: "Découvert en même temps que\nles Poké Balls. Il paraît qu’il\nexiste un lien entre les deux."
        it:
          heart_gold: "Rotola. Se il terreno è irregolare,\npuò esplodere all’improvviso\nurtando una gobba."
          soul_silver: "Scoperto all’epoca dell’invenzione\ndelle Poké Ball. Si pensa che\ni due fatti siano correlati."
        de:
          heart_gold: "Es bewegt sich rollend fort.\nRollt es gegen ein Hindernis, kann\nes plötzlich explodieren."
          soul_silver: "Es wurde entdeckt, als man Pokébälle\neinführte. Es scheint, als gäbe\nes da einen Zusammenhang."
        es:
          heart_gold: "Se mueve rodando. Si el terreno es\nirregular, una chispa provocada\npor algún bache lo hará explotar."
          soul_silver: "Fue descubierto cuando se crearon\nlas Poké Balls. Se dice que\ntiene algo que ver con ellas."
        ko:
          heart_gold: "굴러서 이동하기 때문에\n땅이 울퉁불퉁하면\n쇼크로 폭발해버린다."
          soul_silver: "몬스터볼이 팔리기 시작했을 때와\n같은 시기에 발견되었다.\n뭔가 관계가 있다고 전해진다."
