          soul_silver: "からだを　きたえるのが　だいすき。\nいちにちじゅう　しゅぎょう　しても\nぜんぜん　まだ　ものたりない。"
        en:
          heart_gold: "Always brimming with power,\nit passes time by lifting boulders.\nDoing so makes it even stronger."
          soul_silver: "It loves to work out and build its\nmuscles. It is never satisfied,\neven if it trains hard all day long."
        fr:
          heart_gold: "Toujours en train de s’entraîner,\nil passe son temps à soulever des\npoids pour devenir plus puissant."
          soul_silver: "Il aime faire de la musculation.\nConstamment insatisfait, il\ns’entraîne toute la journée."
        it:
          heart_gold: "Sempre traboccante di energia,\npassa il tempo a sollevare massi.\nCosì diventa ancora più forte."
          soul_silver: "Gli piace sviluppare i muscoli.\nNon è soddisfatto neppure dopo\nessersi allenato tutto il giorno."
        de:
          heart_gold: "Da es vor Kraft strotzt, hebt es\nzum Zeitvertreib Felsen. Dadurch\ngewinnt es an zusätzlicher Stärke."
          soul_silver: "Es liebt das Muskelaufbautraining.\nEs ist nie zufrieden, selbst wenn\nes den ganzen Tag trainierte."
        es:
          heart_gold: "Siempre rebosante de fuerza, pasa\nel tiempo levantando piedras. Esto\nle lleva a ser aún más fuerte."
          soul_silver: "Adora ejercitar sus músculos.\nNunca está contento, aunque\nlleve todo el día entrenando."
        ko:
          heart_gold: "항상 파워풀하다. 체력이\n남아돌기 때문에 심심풀이로\n바위를 들어 올려 더욱 강해진다."
          soul_silver: "체력단련을 제일 좋아한다.\n온종일 수행을 해도\n전혀 지치지 않는다."
machoke:
