      descriptions:
        jp_kana:
          heart_gold: "ミツをみつけると　みかづきもようが\nかがやく。あまいミツが　しみこんだ\nてのひらを　いつも　なめている。"
          soul_silver: "たべものが　へる　ふゆのまえに\nあちこちに　たべものを　かくす\nしゅうせいを　もっている。"
        en:
          heart_gold: "If it finds honey, its crescent mark\nglows. It always licks its paws\nbecause they’re soaked with honey."
          soul_silver: "Before food becomes scarce in\nwintertime, its habit is to hoard\nfood in many hidden locations."
        fr:
          heart_gold: "Sa marque en forme de lune brille\nquand il trouve du miel. Il lèche ses\npattes qui en sont toujours couvertes."
          soul_silver: "Il se fait des réserves de\nnourriture dans des cachettes\navant l’arrivée de l’hiver."
        it:
          heart_gold: "Se trova del miele la sua mezzaluna\ndiventa più luminosa. Si lecca\nle zampe intrise di miele."
          soul_silver: "Per prepararsi all’inverno, è sua\nabitudine accumulare il cibo in\ndiversi nascondigli."
        de:
          heart_gold: "Findet es Honig, leuchtet die Si-\nchel auf seinem Kopf. Es leckt oft\nseine mit Honig bedeckten Pfoten."
          soul_silver: "Steht der Winter vor der Türe, hor-\ntet es Nahrung an vielen verschiede-\nnen, nur ihm bekannten Orten."
        es:
          heart_gold: "Si encuentra miel, brillará la marca\nde su frente. Se lame las garras\ncuando están llenas de miel."
          soul_silver: "Antes de que la comida escasee en\ninvierno, tiene por costumbre\nocultar comida en lugares secretos."
        ko:
          heart_gold: "꿀을 발견하면 초승달 모양이\n빛난다. 달콤한 꿀이 배어든\n손바닥을 항상 핥고 있다."
          soul_silver: "먹이가 줄어드는 겨울 전에\n이곳저곳에 먹을 것을 숨겨두는\n습성을 지니고 있다."
ursaring:
  species_id: 217
