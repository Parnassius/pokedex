        jp_kana:
          heart_gold: "りっぱな　たてがみに　みとれる\nひとがいるほど　どうどうとしている\nちゅうごくの　でんせつポケモン。"
          soul_silver: "どうどうとした　なきごえは\nいげんに　あふれ　きいたものは\nおもわず　ひれふしてしまう。"
        en:
          heart_gold: "This legendary Chinese Pokémon is\nconsidered magnificent. Many people\nare enchanted by its grand mane."
          soul_silver: "Its magnificent bark conveys a\nsense of majesty. Anyone hearing it\ncan’t help but grovel before it."
        fr:
          heart_gold: "Ce Pokémon légendaire en Chine\na une crinière si somptueuse qu’il\nest vénéré par certains."
          soul_silver: "Son aboiement est tout simplement\nmajestueux. On ne peut que ramper\nà ses pieds après l’avoir entendu."
        it:
          heart_gold: "Questo Pokémon leggendario cinese\nè considerato magnifico. La sua\ngrandiosa criniera incanta molti."
          soul_silver: "Il suo incredibile ruggito ispira un senso\ndi maestosità. Chiunque lo senta non\npuò far a meno di prostrarsi."
        de:
          heart_gold: "Dieses Legendäre chinesische Pokémon\nwird wegen seiner Schönheit verehrt.\nVor allem wegen der Mähne."
          soul_silver: "Sein bezauberndes Bellen klingt ma-\njestätisch. Jeder, der es vernimmt,\nmuss sich automatisch verbeugen."
        es:
          heart_gold: "Este Pokémon chino legendario es\nconsiderado magnífico. A mucha\ngente le encanta su gran melena."
          soul_silver: "Su magnífico ladrido transmite\nmajestuosidad. Todo el que lo\nescuche no podrá evitar adularlo."
        ko:
          heart_gold: "훌륭한 갈기에 매료되는\n사람이 있을 정도로 당당한\n중국 전설의 포켓몬이다."
          soul_silver: "위풍당당한 울음소리는\n위엄이 넘쳐 소리를 들은 상대는\n무의식중에 몸을 움츠리게 된다."
poliwag:
