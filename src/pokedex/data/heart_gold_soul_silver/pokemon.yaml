          soul_silver: "おちた　あたまは　タマタマとして\nなかまを　さがすため　とくしゅな\nテレパシーを　だしはじめる。"
        en:
          heart_gold: "Its three heads think independently.\nHowever, they are friendly and\nnever appear to squabble."
          soul_silver: "If a head drops off, it emits a\ntelepathic call in search of others\nto form an EXEGGCUTE cluster."
        fr:
          heart_gold: "Ses trois têtes sont autonomes.\nElles semblent toutefois en\nharmonie et ne se disputent jamais."
          soul_silver: "Si une des têtes tombe, elle émet un\nappel télépathique pour reconstituer\nune grappe de NOEUNOEUF."
        it:
          heart_gold: "Ha tre teste che ragionano\nautonomamente. Ma sono amichevoli\ne non litigano mai tra di loro."
          soul_silver: "Se perde una delle teste, questa inizia\na emettere un richiamo telepatico per\nformare un gruppo di EXEGGCUTE."
        de:
          heart_gold: "Seine drei Köpfe denken unabhängig\nvoneinander. Dennoch sind sie\nnett zueinander und streiten nie."
          soul_silver: "Fällt einer der Köpfe ab, sendet\ner Telepathiewellen aus, um mit\nOWEI eine Gruppe zu bilden."
        es:
          heart_gold: "Sus tres cabezas piensan de forma\nindependiente. Sin embargo, son\namigas y no suelen discutir nunca."
          soul_silver: "Si se le cae una cabeza, emite una\nseñal telepática para buscar más\ny formar un grupo."
        ko:
          heart_gold: "3개의 머리는 생각하는 것이\n각각 다르지만 사이가 좋아서\n싸우지 않는 것 같다."
          soul_silver: "떨어진 머리는 아라리로서\n동료를 찾기 위해 특수한\n텔레파시를 내기 시작한다."
