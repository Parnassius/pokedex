        jp_kana:
          heart_gold: "ツノの　まがりぐあいが　まわりの\nくうきの　ながれを　びみょうにかえ\nふしぎな　くうかんを　つくりだす。"
          soul_silver: "ツノの　かたちを　みていると\nかんかくが　だんだん　おかしくなり\nじぶんの　ちからで　たてなくなる。"
        en:
          heart_gold: "The curved antlers subtly change\nthe flow of air to create a strange\nspace where reality is distorted."
          soul_silver: "Those who stare at its antlers will\ngradually lose control of their\nsenses and be unable to stand."
        fr:
          heart_gold: "Ses bois tordus changent le flot\nde l’air et créent une distorsion\nspatiale dans la réalité."
          soul_silver: "Ceux qui observent ses bois perdront\nprogressivement leurs sens et ne\npourront plus se tenir debout."
        it:
          heart_gold: "Le corna ricurve modificano le correnti\nd’aria, creando una strana zona\ndi distorsione della realtà."
          soul_silver: "Chi osserva le sue corna perde\ngradualmente i sensi e la capacità\ndi stare in piedi."
        de:
          heart_gold: "Sein gebogenes Geweih generiert\nvia Luftänderung einen Raum, in dem\ndie Wirklichkeit verzerrt wird."
          soul_silver: "Der Anblick seines Geweihs lässt den\nBetrachter ohnmächtig werden\nund zu Boden sinken."
        es:
          heart_gold: "Su cornamenta cambia el flujo\ndel aire para crear un espacio\nde realidad distorsionada."
          soul_silver: "Todo aquel que se quede mirando\nsu cornamenta, perderá el control\ny el equilibrio."
        ko:
          heart_gold: "뿔의 휘어진 상태가 주변\n공기의 흐름을 미묘하게 바꿔서\n이상한 공간을 만들어낸다."
          soul_silver: "뿔의 모양을 보고 있으면\n감각이 점점 이상해져서\n자신의 힘으로 서 있을 수 없게 된다."
smeargle:
