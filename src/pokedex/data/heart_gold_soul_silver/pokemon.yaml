        jp_kana:
          heart_gold: "りょうめは　レーダーきのうを\nそなえている。くらやみに　かくれた\nちいさなむしも　つかまえてたべる。"
          soul_silver: "ぜんしんから　どくが　にじみでる。\nくらくなると　あかりに　むらがった\nちいさなむしを　とらえて　たべる。"
        en:
          heart_gold: "Its eyes also function as radar\nunits. It catches and eats small\nbugs that hide in darkness."
          soul_silver: "Poison oozes from all over its body.\nIt catches and eats small bugs at\nnight that are attracted by light."
        fr:
          heart_gold: "Ses yeux fonctionnent comme des\nradars. Il se nourrit de petits\ninsectes cachés dans le noir."
          soul_silver: "Son corps sécrète un poison redoutable.\nLa nuit, il mange de petits insectes\nattirés par la lumière."
        it:
          heart_gold: "I suoi occhi fanno anche da radar,\nper catturare e mangiare piccoli\ninsetti che vivono nell’oscurità."
          soul_silver: "Da tutto il suo corpo cola veleno.\nDi notte cattura e mangia piccoli\ninsetti attratti dalla luce."
        de:
          heart_gold: "Seine Augen dienen ihm gleichzeitig\nals Radar. Es ernährt sich von\nKäfern, die im Dunkeln leben."
          soul_silver: "Gift bedeckt seinen Körper. Es\nfängt und frisst nachts kleine Kä-\nfer, die von Licht angelockt wurden."
        es:
          heart_gold: "Sus ojos también funcionan como\nradares. Atrapa y come pequeños\nbichos ocultos en la oscuridad."
          soul_silver: "Rezuma veneno por todo su cuerpo.\nAtrapa y come pequeños bichos\nnocturnos atraídos por la luz."
        ko:
          heart_gold: "양쪽 눈은 레이더 기능을\n가지고 있다. 어둠에 숨어 있는\n작은 벌레도 잡아먹는다."
          soul_silver: "전신에서 독이 번져나온다.\n어두워지면 밝은 곳에 모인\n작은 벌레를 잡아먹는다."
venomoth:
