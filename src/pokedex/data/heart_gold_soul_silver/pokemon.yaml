      descriptions:
        jp_kana:
          heart_gold: "うまれたては　やわらかい　こうらも\nすぐに　ゆびでつつくと　はじくほどの\nだんりょくせいを　もつようになる。"
          soul_silver: "うまれて　しばらくすると　かたまる\nこうらには　だんりょくせいが　あって\nゆびで　つつくと　はじきかえされる。"
        en:
          heart_gold: "The shell is soft when it is born.\nIt soon becomes so resilient,\nprodding fingers will bounce off it."
          soul_silver: "The shell, which hardens soon after\nit is born, is resilient. If you\npoke it, it will bounce back out."
        fr:
          heart_gold: "Sa carapace est molle à la\nnaissance, mais elle devient de\nplus en plus dure avec l’âge."
          soul_silver: "Sa carapace commence à durcir\njuste après sa naissance.\nJeune, elle est assez tendre."
        it:
          heart_gold: "Quando nasce, il suo guscio è\ntenero. Ma presto diviene elastico:\nse un dito lo tocca, rimbalza."
          soul_silver: "Dopo la nascita il soffice guscio si\nindurisce fino a diventare elastico.\nI colpi gli rimbalzano contro."
        de:
          heart_gold: "Sein Panzer ist bei Geburt weich.\nEr wird bald so elastisch, dass\nkleinere Stöße von ihm abprallen."
          soul_silver: "Sein Panzer, der bald nach der Ge-\nburt aushärtet, bleibt federnd.\nDrückt man darauf, springt er zurück."
        es:
          heart_gold: "Su caparazón es blando al nacer.\nPero pronto se endurecerá y será\ncapaz de resistir cualquier amenaza."
          soul_silver: "La concha, que se endurece al\npoco de nacer, es elástica.\nSi la golpeas, rebotará."
        ko:
          heart_gold: "갓 태어났을 땐 부드러운 등껍질도\n곧 손으로 찌르면 튕길 정도의\n탄력성을 가지게 된다."
          soul_silver: "태어나서 조금 지나면 딱딱해지는\n등껍질에는 탄력성이 있어서\n손가락으로 찌르면 튕겨버린다."
wartortle:
  species_id: 8
  names:
    jp_kana: カメール
    en: WARTORTLE
    fr: CARABAFFE
    it: WARTORTLE
    de: SCHILLOK
    es: WARTORTLE
    ko: 어니부기
