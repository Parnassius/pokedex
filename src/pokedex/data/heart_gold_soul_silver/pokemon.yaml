          soul_silver: "するどいカマで　えものを　きりさき\nながれでる　たいえきを　すすっていた\nきょうぼうな　こだいの　ポケモン。"
        en:
          heart_gold: "In the water, it tucks in its limbs\nto become more compact, then it\nwiggles its shell to swim fast."
          soul_silver: "With sharp claws, this ferocious,\nancient Pokémon rips apart prey\nand sucks their body fluids."
        fr:
          heart_gold: "Dans l’eau, il se recroqueville sur\nses jambes et il agite sa coquille\npour nager à très grande vitesse."
          soul_silver: "Avec ses griffes acérées, cet\nancien Pokémon aspire les\nfluides vitaux de ses proies."
        it:
          heart_gold: "In acqua raccoglie gli arti per diventare\npiù compatto, agitando il guscio\nper nuotare veloce."
          soul_silver: "Con gli artigli affilati, questo\nantico Pokémon dilania la vittima\ne ne succhia i fluidi corporei."
        de:
          heart_gold: "Im Wasser zieht es seine Beine an\nund bewegt seinen Panzer, um so\nschneller schwimmen zu können."
          soul_silver: "Dieses antike und brutale Pokémon\nschlitzte die Beute mit seinen schar-\nfen Klauen auf und saugte sie aus."
        es:
          heart_gold: "Repliega sus extremidades en el\nagua para hacerse más compacto, y\nmueve su concha para nadar rápido."
          soul_silver: "Con sus garras, este feroz y\nantiguo Pokémon despedaza a\nsu presa y absorbe sus fluidos."
        ko:
          heart_gold: "수중을 이동할 때\n손발을 작게 접고\n등껍질을 구부려 빠르게 헤엄친다."
          soul_silver: "날카로운 낫으로 먹이를 베어 갈라\n흐르는 체액을 빨아먹던\n난폭한 고대의 포켓몬이다."
