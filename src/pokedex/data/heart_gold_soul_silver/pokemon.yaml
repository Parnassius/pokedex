      descriptions:
        jp_kana:
          heart_gold: "でんきを　たくわえすぎた　けっか\nからだの　ひょうめんに　うぶげすら\nはえない　ぶぶんが　できてしまった。"
          soul_silver: "ふかふかの　たいもうは　でんきを\nためやすいが　ゴムのような　ひふの\nおかげで　じぶんは　しびれない。"
        en:
          heart_gold: "As a result of storing too much\nelectricity, it developed patches\nwhere even downy wool won’t grow."
          soul_silver: "Its fluffy fleece easily stores\nelectricity. Its rubbery hide keeps\nit from being electrocuted."
        fr:
          heart_gold: "Il stocke trop d’électricité et\nson poil ne peut plus repousser à\ncertains endroits de son corps."
          soul_silver: "Sa douce laine stocke facilement\nl’électricité. Sa peau caoutchouteuse\nprévient l’électrocution."
        it:
          heart_gold: "Immagazzinando troppa elettricità,\nsu intere parti del corpo non\ncresce neppure la lanugine."
          soul_silver: "La soffice pelliccia raccoglie\nelettricità. Non si fulmina grazie\nad uno strato di pelle gommosa."
        de:
          heart_gold: "Da es zu viel Elektrizität gespei-\nchert hat, hat es Flecken, an denen\nnicht einmal feine Wolle wächst."
          soul_silver: "Sein flauschiges Fell speichert\nElektrizität. Seine Gummihaut\nschützt es vor Stromstößen."
        es:
          heart_gold: "Como almacena tanta\nelectricidad, ha desarrollado\nparches donde no crece ni la lana."
          soul_silver: "Su esponjosa lana almacena\nelectricidad. Su piel gomosa\nevita que sea electrocutado."
        ko:
          heart_gold: "전기를 너무 많이 모은 결과\n몸의 표면에 솜털조차\n자라지 않는 부분이 생겼다."
          soul_silver: "푹신푹신한 털은 전기를\n모으기 쉽지만 고무 같은 피부\n덕분에 자신은 마비되지 않는다."
ampharos:
  species_id: 181
  names:
    jp_kana: デンリュウ
    en: AMPHAROS
    fr: PHARAMP
    it: AMPHAROS
    de: AMPHAROS
    es: AMPHAROS
    ko: 전룡
