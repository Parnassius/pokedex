        jp_kana:
          heart_gold: "いちど　カラを　とじてしまうと\nどんな　かいりきの　もちぬしでも\nあけることは　ふかのうだ。"
          soul_silver: "しおのながれが　はげしい　うみに\nせいそくしている　パルシェンの\nカラのトゲは　おおきく　するどい。"
        en:
          heart_gold: "Once it slams its shell shut,\nit is impossible to open, even by\nthose with superior strength."
          soul_silver: "CLOYSTER that live in seas with harsh\ntidal currents grow large, sharp\nspikes on their shells."
        fr:
          heart_gold: "Quand il referme sa coquille, il\nest impossible de la rouvrir, même\navec une force hors du commun."
          soul_silver: "Les CRUSTABRI vivant dans des mers\naux courants forts développent des\ndards sur leur coquille."
        it:
          heart_gold: "Quando richiude il guscio nessuno\npuò aprirlo, neppure chi è dotato\ndi una forza straordinaria."
          soul_silver: "Ai CLOYSTER che vivono in mari con\nforti maree crescono grandi aculei\naffilati sui gusci."
        de:
          heart_gold: "Ist seine Schale erst geschlossen,\nist es selbst mit viel Kraft nicht\nmehr möglich, diese zu öffnen."
          soul_silver: "AUSTOS, die im Meer mit starker\nStrömung leben, werden groß und\nentwickeln scharfe Stacheln."
        es:
          heart_gold: "Cuando cierra de golpe su concha\nes imposible abrirla, hasta para los\nmás fuertes."
          soul_silver: "A los CLOYSTER que viven en las\nfuertes corrientes marinas les crecen\nlargas y afiladas púas en la concha."
        ko:
          heart_gold: "한번 껍질을 닫아버리면\n어떤 괴력의 소유자도\n여는 것은 불가능하다."
          soul_silver: "조수의 흐름이 격한 바다에\n서식하고 있는 파르셀의\n껍질의 가시는 크고 날카롭다."
gastly:
  species_id: 92
