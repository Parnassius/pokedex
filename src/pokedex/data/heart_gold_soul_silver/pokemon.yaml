      descriptions:
        jp_kana:
          heart_gold: "はったつした　むねの　きんにくは\nかるく　はばたいただけで\nおおかぜを　おこせるほどだ。"
          soul_silver: "うつくしい　ハネは　ひろげて\nあいてを　いかく　するだけでなく\nマッハ２で　そらをとべる。"
        en:
          heart_gold: "Its well-developed chest muscles make\nit strong enough to whip up a gusty\nwindstorm with just a few flaps."
          soul_silver: "It spreads its beautiful wings\nwide to frighten its enemies. It\ncan fly at Mach 2 speed."
        fr:
          heart_gold: "Son torse est si musclé que le\nmoindre battement d’ailes peut\ncréer de terribles tourbillons."
          soul_silver: "Il déploie ses magnifiques ailes\npour effrayer ses ennemis. En vol,\nil peut atteindre Mach 2."
        it:
          heart_gold: "I forti muscoli pettorali gli\npermettono di provocare una\ntempesta di vento battendo le ali."
          soul_silver: "Spiega le belle ali per terrorizzare\ni nemici. Può raggiungere\nla velocità di Mach 2."
        de:
          heart_gold: "Seine Brustmuskeln sind so kräftig,\ndass es mit wenig Flattern einen\nstarken Windstoß erzeugen kann."
          soul_silver: "Es spreizt seine mächtigen Flügel,\num seine Feinde zu verängstigen. Es\nkann bis zu Mach 2 schnell fliegen."
        es:
          heart_gold: "Sus músculos pectorales son\ntan fuertes que podría parar una\nventisca con unos cuantos aleteos."
          soul_silver: "Despliega sus bellas alas para\nacobardar a sus enemigos. Puede\nvolar a una velocidad de 2 mach."
        ko:
          heart_gold: "발달한 가슴 근육은\n가볍게 날개를 치는 것만으로\n큰 바람을 일으킬 정도다."
          soul_silver: "아름다운 날개는 펼쳐서\n상대를 위협하는 것뿐만 아니라\n마하 2로 하늘을 날 수 있다."
rattata:
