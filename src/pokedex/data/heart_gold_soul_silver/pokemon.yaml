        jp_kana:
          heart_gold: "さいぼうを　しらべると　タッツーには\nなかった　あらたな　いでんしが\nはっけんされ　わだいと　なっている。"
          soul_silver: "ひれの　さきから　どくを　ぶんぴつ。\nひれや　ほねは　かんぽうやくの\nざいりょうとして　ちょうほうされる。"
        en:
          heart_gold: "An examination of its cells revealed\nthe presence of a gene not found in\nHORSEA. It became a hot topic."
          soul_silver: "Its fin-tips leak poison. Its fins\nand bones are highly valued as\ningredients in herbal medicine."
        fr:
          heart_gold: "Son analyse cellulaire révèle la\nprésence de gènes n’appartenant\npas aux HYPOTREMPE."
          soul_silver: "Ses nageoires et ses os sont des\ningrédients très recherchés de la\nmédecine naturelle."
        it:
          heart_gold: "Un esame delle cellule ha rivelato\nla presenza di un gene assente\nin HORSEA. Se ne è parlato molto."
          soul_silver: "Dalle punte delle pinne cola veleno.\nLe pinne e le ossa sono rimedi\nnaturali molto apprezzati."
        de:
          heart_gold: "Eine Zelluntersuchung ergab, dass\nes ein Gen besitzt, das SEEPER nicht\nhat. Ein bemerkenswerter Fund."
          soul_silver: "An seinen Flossen tritt Gift aus.\nSeine Knochen und Flossen sind eine\nbeliebte Zutat für Arznei."
        es:
          heart_gold: "Un análisis de sus células revela la\npresencia de un gen no encontrado\nen HORSEA. Es un tema muy polémico."
          soul_silver: "Las puntas de sus aletas segregan\nveneno. Sus aletas y huesos son muy\nvalorados en la medicina natural."
        ko:
          heart_gold: "세포를 조사한 결과 쏘드라에게는\n없었던 새로운 유전자가\n발견되어 화제가 되고 있다."
          soul_silver: "지느러미 끝에서 독을 분비한다.\n지느러미와 뼈는 한약의\n재료로 소중하게 여겨지고 있다."
goldeen:
