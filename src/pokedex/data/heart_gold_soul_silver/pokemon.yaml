      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - hustle
        - serene_grace
      descriptions:
        jp_kana:
          heart_gold: "カラのなかに　しあわせが　たくさん\nつまっているらしく　やさしくされると\nこううんを　わけあたえる　という。"
          soul_silver: "ねている　トゲピーを　うまく\nたたせることが　できれば　しあわせに\nなれるとの　いいつたえがある。"
        en:
          heart_gold: "The shell seems to be filled with\njoy. It is said that it will share\ngood luck when treated kindly."
          soul_silver: "A proverb claims that happiness\nwill come to anyone who can make a\nsleeping TOGEPI stand up."
        fr:
          heart_gold: "Sa coquille est remplie de joie.\nOn dit que s’il est bien traité,\nil porte chance."
          soul_silver: "Un proverbe nous enseigne que le\nbonheur touchera celui qui peut\nfaire tenir debout un TOGEPI endormi."
        it:
          heart_gold: "Il suo guscio sembra ricolmo di\ngioia. Si dice che porti fortuna\nse lo si tratta bene."
          soul_silver: "Un proverbio dice che chi riuscirà\na far alzare un TOGEPI dormiente\nsarà baciato dalla fortuna."
        de:
          heart_gold: "Seine Schale ist voll von Freude.\nEs teilt sein Glück, wenn man es\nfreundlich und gut behandelt."
          soul_silver: "Ein Sprichwort besagt, dass Glück\ndem widerfährt, dem es gelingt,\nein schlafendes TOGEPI zu wecken."
        es:
          heart_gold: "El cascarón parece estar lleno de\nalegría. Dicen que trae buena\nsuerte si es tratado con cariño."
          soul_silver: "Dice el proverbio que quien\ndespierte a un TOGEPI de su\nsueño, alcanzará la felicidad."
        ko:
          heart_gold: "껍질 안에 행복이 가득\n차 있어서 상냥하게 대하면\n행운을 나누어 준다고 한다."
          soul_silver: "자고 있는 토게피를 잘\n세울 수 있다면 행복해질 수\n있다는 이야기가 전해진다."
togetic:
  species_id: 176
  names:
