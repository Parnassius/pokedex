          soul_silver: "ぶかっこうに　おおきくなった\nハサミを　いきおいよく　もちあげると\nバランスがくずれ　よたついてしまう。"
        en:
          heart_gold: "It can hardly lift its massive,\novergrown pincer. The pincer’s size\nmakes it difficult to aim properly."
          soul_silver: "Its pincers grow peculiarly large.\nIf it lifts the pincers too fast,\nit loses its balance and staggers."
        fr:
          heart_gold: "Il soulève péniblement son énorme\npince. Elle est si grosse qu’il lui\nest difficile de bien viser avec."
          soul_silver: "Ses pinces deviennent énormes. S’il\nles soulève trop vite, il risque de\nperdre l’équilibre."
        it:
          heart_gold: "Gli è difficile sollevare la sua enorme\nchela. La sua dimensione ne rende\ndifficile un utilizzo efficace."
          soul_silver: "Una delle sue chele è particolarmente\ngrande. Se la alza troppo rapidamente\npuò perdere l’equilibrio."
        de:
          heart_gold: "Es kann seine Riesenscheren kaum\nheben. Die Größe seiner Scheren\nerschwert ihm das Zielen."
          soul_silver: "Seine Scheren werden sehr groß.\nHebt es sie zu schnell, verliert\nes die Balance und strauchelt."
        es:
          heart_gold: "Le cuesta levantar su exagerada y\ndesproporcionada pinza. Su tamaño\nle impide apuntar correctamente."
          soul_silver: "Sus pinzas son muy grandes. Si las\nlevanta demasiado rápido, pierde\nel equilibrio y se tambalea."
        ko:
          heart_gold: "너무나도 커진 집게는\n들어 올릴 수는 있지만 \n목표물을 제대로 잡을 수 없다."
          soul_silver: "볼품없이 크게 자라난\n집게를 기세 좋게 들고 걷다 보면\n밸런스가 무너져 뒤뚱거리게 된다."
