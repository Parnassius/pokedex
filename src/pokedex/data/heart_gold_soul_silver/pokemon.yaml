      descriptions:
        jp_kana:
          heart_gold: "どちらかが　ふくらむと　かたほうは\nしぼむ　ふたごの　ドガース。いつも\nたいないの　どくガスを　まぜている。"
          soul_silver: "たいないに　ふくまれる　どくガスを\nぎりぎりまで　うすめると\nさいこうきゅうの　こうすいができる。"
        en:
          heart_gold: "If one of the twin KOFFING inflates,\nthe other one deflates. It constantly\nmixes its poisonous gases."
          soul_silver: "Top-grade perfume is made using its\ninternal poison gases by diluting\nthem to the highest level."
        fr:
          heart_gold: "Si l’un des deux SMOGO se gonfle,\nl’autre se dégonfle. Ils mélangent\nleurs gaz en permanence."
          soul_silver: "En diluant au plus haut point ses\ngaz internes, on peut obtenir des\nparfums de premier choix."
        it:
          heart_gold: "Se un gemello KOFFING si sgonfia,\nl’altro si gonfia. I gas velenosi dei\ndue si mischiano continuamente."
          soul_silver: "I suoi velenosi gas interni\ndiluiti al massimo sono usati per\nprodurre profumi pregiatissimi."
        de:
          heart_gold: "Pumpt sich eines der zwei SMOGON\nauf, lässt das andere Luft ab. So\nfindet ein Giftgasaustausch statt."
          soul_silver: "Aus seinem Gift wird ein edles\nParfum gewonnen, indem man es auf\ndas Äußerste verdünnt."
        es:
          heart_gold: "Si uno de los gemelos KOFFING se\ninfla, el otro se desinfla. Mezclan\nconstantemente sus venenosos gases."
          soul_silver: "El mejor perfume se fabrica con\nsus venenosos gases internos,\ndiluyéndolos lo máximo posible."
        ko:
          heart_gold: "한쪽이 부풀어 오르면 다른 한쪽은\n오그라드는 쌍둥이 또가스. 항상\n체내의 독가스를 섞고 있다."
          soul_silver: "체내에 들어 있는 독가스의\n농도를 극한까지 낮추면\n최고급의 향수가 된다."
rhyhorn:
