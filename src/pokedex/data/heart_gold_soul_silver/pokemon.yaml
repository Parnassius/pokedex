      descriptions:
        jp_kana:
          heart_gold: "うでを　ぐるぐるまわして　でんきを\nはっせいさせるが　すぐ　つかれるので\nすこししか　でんきが　ためられない。"
          soul_silver: "どんなに　はげしい　あらしでも\nかみなりが　なっていれば\nたのしそうに　あそびまわる。"
        en:
          heart_gold: "It rotates its arms to generate\nelectricity, but it tires easily,\nso it only charges up a little bit."
          soul_silver: "Even in the most vicious storm,\nthis Pokémon plays happily if thunder\nrumbles in the sky."
        fr:
          heart_gold: "Il fait pivoter ses bras pour\ncréer de l’énergie pendant un bref\ninstant car il se fatigue vite."
          soul_silver: "Ce Pokémon joue toujours gaiement,\nmême dans le plus violent des\norages, au milieu de terribles éclairs."
        it:
          heart_gold: "Genera elettricità ruotando le\nbraccia, ma non fa mai una ricarica\ncompleta perché si stanca presto."
          soul_silver: "Anche nelle più impetuose tempeste\nquesto Pokémon gioca allegramente\nse ode il rombo di un tuono in cielo."
        de:
          heart_gold: "Es rotiert mit den Armen, um Elektrizität\nzu erzeugen. Da es sehr schnell\nmüde wird, erzeugt es nur wenig."
          soul_silver: "Im schlimmsten Sturm, mit Blitzen\nund Donnergetöse, fühlt sich dieses\nPokémon am wohlsten."
        es:
          heart_gold: "Gira sus brazos para generar\nelectricidad, pero se agota rápido,\nasí que solo se recarga un poco."
          soul_silver: "Incluso en la peor de las\ntormentas, este Pokémon juega\nfeliz si un trueno cruza el cielo."
        ko:
          heart_gold: "팔을 빙글빙글 돌려서 전기를\n발생시키지만 금방 지쳐서\n전기를 조금밖에 모을 수 없다."
          soul_silver: "아무리 거친 폭풍이 몰아쳐도\n번개가 치고 있다면\n즐겁게 놀고 다닌다."
