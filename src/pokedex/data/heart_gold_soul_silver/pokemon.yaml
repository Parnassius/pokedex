          soul_silver: "みなもを　あてもなく　ただよう。\nみずのなかでは　すがたが　みえにくく\nさされるまで　きづかないこともある。"
        en:
          heart_gold: "When the tide goes out, dehydrated\nTENTACOOL remains can be found\nwashed up on the shore."
          soul_silver: "It drifts aimlessly in waves. Very\ndifficult to see in water, it may\nnot be noticed until it stings."
        fr:
          heart_gold: "Quand la marée descend, il est\nassez fréquent de retrouver des\nTENTACOOL échoués sur le sable."
          soul_silver: "Il se laisse porter par le courant.\nIl est difficile à voir jusqu’à ce\nqu’il pique."
        it:
          heart_gold: "Con la bassa marea si possono \ntrovare resti disidratati di \nTENTACOOL sul bagnasciuga."
          soul_silver: "Si lascia trasportare dalle onde.\nDifficilmente visibile in acqua,\nsi fa notare solo quando punge."
        de:
          heart_gold: "Bei Ebbe kann man die Überreste\nvon TENTACHA finden, die an den\nStrand gespült wurden."
          soul_silver: "Es treibt ziellos im Wasser. Es ist\nschwer zu erkennen und wird erst be-\nmerkt, wenn es zusticht."
        es:
          heart_gold: "Cuando baja la marea, podrían\naparecer restos deshidratados de\nTENTACOOL junto a la orilla."
          soul_silver: "Nada sin rumbo por las olas. Es\ndifícil de ver en el agua. A veces\nno se le ve hasta que pica."
        ko:
          heart_gold: "바닷물이 빠지면 모래 해변에\n남아 바싹 마른\n왕눈해를 볼 수 있다."
          soul_silver: "파도 위를 정처 없이 떠다닌다.\n물속에서는 모습을 보기 어려워\n찔릴 때까지 느끼지 못하기도 한다."
tentacruel:
