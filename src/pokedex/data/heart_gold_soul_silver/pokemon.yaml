          soul_silver: "おとなの　からだを　つくっている。\nなかみが　やわらかくなるほど\nそとのカラは　かたくなっていく。"
        en:
          heart_gold: "Although it is a cocoon, it can\nmove a little. It can extend its\npoison barb if it is attacked."
          soul_silver: "From this form, it will grow into\nan adult. As its body becomes softer,\nthe external shell hardens."
        fr:
          heart_gold: "Bien qu’il ne soit qu’un cocon, il\npeut se déplacer lentement. Il se\ndéfend avec une pique empoisonnée."
          soul_silver: "A partir de cette forme, il deviendra\nadulte. Son corps plus tendre est\nprotégé par sa carapace."
        it:
          heart_gold: "Pur essendo un bozzolo, può\nmuoversi un po’. Può estendere\nil pungiglione quando è attaccato."
          soul_silver: "Destinato ad evolversi in un adulto.\nMentre il corpo diventa più\nmorbido, il guscio s’indurisce."
        de:
          heart_gold: "Obwohl es ein Kokon ist, kann es\nsich bewegen. Wird es angegriffen,\nfährt es seinen Giftstachel aus."
          soul_silver: "Es befindet sich in einem Zwischen-\nstadium. Sein Körper wird immer\nweicher und seine Schale härter."
        es:
          heart_gold: "Aunque sea un capullo, es capaz\nde moverse. Extenderá su púa\nvenenosa si es atacado."
          soul_silver: "A partir de esta forma, crece hasta\nser adulto. Su cuerpo se ablanda\nmientras su capullo se fortalece."
        ko:
          heart_gold: "번데기지만 조금은 움직일 수 있다.\n적에게 공격을 받을 듯하면\n독침을 쏠 때도 있다."
          soul_silver: "성충의 몸을 만들고 있다.\n안쪽이 부드러워지는 만큼\n바깥의 고치는 딱딱해져 간다."
beedrill:
