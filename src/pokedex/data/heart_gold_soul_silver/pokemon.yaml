        jp_kana:
          heart_gold: "せかいいち　おおきな　はなびらは\nあるくたびに　ゆれて　たいりょうの\nどくかふんを　ばらまいてしまう。"
          soul_silver: "ボンッという　おとがして　つぼみが\nひらくと　アレルギーを　おこす\nどくかふんを　ばらまきはじめる。"
        en:
          heart_gold: "It has the world’s largest petals.\nWith every step, the petals shake\nout heavy clouds of toxic pollen."
          soul_silver: "The bud bursts into bloom with a\nbang. It then starts scattering\nallergenic, poisonous pollen."
        fr:
          heart_gold: "Il possède des pétales énormes.\nA chaque pas ils sèment d’épais\nnuages de pollen toxique."
          soul_silver: "Le bourgeon éclot en détonant. Il\ncommence alors à disperser son\npollen empoisonné irritant la peau."
        it:
          heart_gold: "Ha i petali più grandi del mondo.\nAd ogni suo passo, i petali liberano\nfitte nubi di polline tossico."
          soul_silver: "Il bocciolo fiorisce con un’esplosione.\nPoi inizia a spargere polline irritante e\nvelenoso."
        de:
          heart_gold: "Es besitzt die größten Blätter\nder Welt. Bei jedem Schritt\nstreut es Giftpollen zu Boden."
          soul_silver: "Die Knospe wird mit einem Knall\nzur Blüte. Dann verteilt es seine\nallergenen, giftigen Pollen."
        es:
          heart_gold: "Tiene los pétalos más grandes del\nmundo. Estos expulsan densas\nnubes de polen tóxico al caminar."
          soul_silver: "El capullo florece de golpe.\nEntonces, empieza a soltar\npolen alergénico y venenoso."
        ko:
          heart_gold: "세계에서 제일 큰 꽃잎은\n걸을 때마다 흔들려 대량의\n독 꽃가루를 흩뿌린다."
          soul_silver: "펑하는 소리가 나며 꽃봉오리가\n열리면 알레르기를 일으키는\n독 꽃가루를 뿌리기 시작한다."
