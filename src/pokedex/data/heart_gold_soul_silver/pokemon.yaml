          soul_silver: "ものすごい　かそくりょく。\nはしりだして　たったの　１０ぽで\nさいこうじそく　２４０キロになる。"
        en:
          heart_gold: "At full gallop, its four hooves\nbarely touch the ground because\nit moves so incredibly fast."
          soul_silver: "With incredible acceleration, it\nreaches its top speed of 150 mph\nafter running just 10 steps."
        fr:
          heart_gold: "Quand il galope, ses sabots frôlent\nà peine le sol, ce qui donne\nl’impression qu’il glisse sur le vent."
          soul_silver: "Capable d’une accélération\nincroyable, il peut atteindre les\n240 km/h en seulement 10 pas!"
        it:
          heart_gold: "Quando è lanciato al galoppo corre così\nvelocemente che le sue zampe quasi\nnon toccano terra."
          soul_silver: "Ha un’incredibile accelerazione:\nraggiunge la sua massima velocità\n(240 km/h) in soli dieci passi."
        de:
          heart_gold: "Bei vollem Galopp berühren seine\nHufe kaum den Boden, da es so\nunglaublich schnell ist."
          soul_silver: "Bereits nach 10 Schritten erreicht\nes seine Höchstgeschwindigkeit\nvon sage und schreibe 240 km/h."
        es:
          heart_gold: "A galope, sus cuatro\ncascos apenas tocan el suelo\nporque se mueve rapidísimo."
          soul_silver: "Con una aceleración increíble,\npuede alcanzar los 240 km/h\nen solo diez trotes."
        ko:
          heart_gold: "달릴 때 4개의 다리가\n거의 땅에 닿지 않는다.\n그 정도로 빨리 움직일 수 있다."
          soul_silver: "엄청나게 빠른 가속력.\n달리기 시작해 겨우 10걸음으로\n최고시속 240km가 된다."
slowpoke:
