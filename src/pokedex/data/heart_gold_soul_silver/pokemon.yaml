        jp_kana:
          heart_gold: "かたい　きのみも　でんげきで\nやいて　やわらかくしてから\nたべる　ちえを　もちあわせている。"
          soul_silver: "しっぽを　たてて　まわりの\nようすを　さぐっていると　ときどき\nかみなりが　しっぽに　おちてくる。"
        en:
          heart_gold: "This intelligent Pokémon roasts\nhard berries with electricity to\nmake them tender enough to eat."
          soul_silver: "It raises its tail to check its\nsurroundings. The tail is sometimes\nstruck by lightning in this pose."
        fr:
          heart_gold: "Ce Pokémon rusé électrifie les\nfruits pas assez mûrs pour les\nrendre tendres et bons à manger."
          soul_silver: "Il élève sa queue pour surveiller\nles environs. Elle attire souvent la\nfoudre dans cette position."
        it:
          heart_gold: "Questo Pokémon cuoce le bacche\ndure con l’elettricità per renderle\ntenere prima di mangiarle."
          soul_silver: "Solleva la coda per esaminare l’ambiente\ncircostante. A volte la coda è colpita da\nun fulmine quando è in questa posizione."
        de:
          heart_gold: "Dieses clevere Pokémon grillt\nharte Beeren mit Elektrizität, um\nsie anschließend zu essen."
          soul_silver: "Es streckt seinen Schweif nach\noben, um seine Umgebung zu prüfen.\nHäufig fährt ein Blitz hinein."
        es:
          heart_gold: "Este inteligente Pokémon tuesta\nlas duras bayas con electricidad\npara hacerlas más comestibles."
          soul_silver: "Levanta su cola para vigilar los\nalrededores. A veces, puede ser\nalcanzado por un rayo en esa pose."
        ko:
          heart_gold: "딱딱한 열매도 전기로\n구워 부드럽게 해서\n먹는 지혜를 가졌다."
          soul_silver: "꼬리를 세우고 주변의\n상황을 살피다 보면 가끔\n꼬리에 번개가 친다."
raichu:
