        jp_kana:
          heart_gold: "あたまの　しょっかく　から\nきょうれつな　においを　だして\nてきを　おいはらい　みをまもる。"
          soul_silver: "あしの　さきは　どんなところにも\nすいつく　きゅうばん。ひっしに\nきのぼりをして　はっぱを　たべる。"
        en:
          heart_gold: "For protection, it releases a horrible\nstench from the antennae on its\nhead to drive away enemies."
          soul_silver: "Its feet have suction cups\ndesigned to stick to any surface. It\ntenaciously climbs trees to forage."
        fr:
          heart_gold: "Pour se protéger, il émet un gaz\npuant par ses antennes, qui fait\nfuir ses ennemis audacieux."
          soul_silver: "Ses pattes ont des ventouses lui\npermettant de grimper sur toute\nsurface, notamment les arbres."
        it:
          heart_gold: "Per proteggersi emette un puzzo\nterribile dall’antenna sul\ncapo, tenendo lontani i nemici."
          soul_silver: "Le sue zampe hanno ventose che\npossono aderire ad ogni superficie.\nSale sugli alberi cercando cibo."
        de:
          heart_gold: "Als Schutz vor Feinden\nsondert es einen übel riechenden\nGestank mit seinen Antennen ab."
          soul_silver: "Die Saugnäpfe an den Beinen haften\nauf jedem Untergrund. Es sucht\nhartnäckig in Bäumen nach Futter."
        es:
          heart_gold: "Para protegerse despide un hedor\nhorrible de sus antenas, con el\nque repele a sus enemigos."
          soul_silver: "Sus patas tienen ventosas con las\nque se adhieren a cualquier sitio.\nEscala árboles buscando forraje."
        ko:
          heart_gold: "머리의 더듬이로부터\n강렬한 냄새를 내어\n적을 물리치고 몸을 보호한다."
          soul_silver: "발끝에는 어디든지\n달라붙는 빨판이 있다. 필사적으로\n나무타기를 해서 나뭇잎을 먹는다."
metapod:
