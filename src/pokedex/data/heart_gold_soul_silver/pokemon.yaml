          soul_silver: "れんぞくで　キックを　はなつうちに\nりょうあしは　どんどん　のびて\nにげだそうとする　あいても　けれる。"
        en:
          heart_gold: "This amazing Pokémon has an awesome\nsense of balance. It can kick in\nsuccession from any position."
          soul_silver: "If it starts kicking repeatedly,\nboth legs will stretch even longer\nto strike a fleeing foe."
        fr:
          heart_gold: "Il possède un fantastique sens de\nl’équilibre et peut donner des coups\nde pied dans toutes les positions."
          soul_silver: "S’il commence à donner des séries\nde coups de pied, ses jambes\ngrandissent et il gagne en allonge."
        it:
          heart_gold: "Questo straordinario Pokémon ha\nun grande equilibrio. Può scalciare\nripetutamente da ogni posizione."
          soul_silver: "Se parte con una scarica di colpi,\nle gambe possono farsi ancora più\nlunghe per colpire un nemico in fuga."
        de:
          heart_gold: "Dieses Pokémon besitzt einen\nformidablen Gleichgewichtssinn.\nEs kann pausenlos zutreten."
          soul_silver: "Wenn es anfängt pausenlos zu tre-\nten, kann es seine Beine ausfahren,\num fliehende Feinde zu treffen."
        es:
          heart_gold: "Este Pokémon tiene un sentido\ndel equilibrio increíble. Puede\ndar patadas desde cualquier sitio."
          soul_silver: "Si empieza a dar patadas, sus\npatas se alargarán aún más para\ngolpear al enemigo en su huida."
        ko:
          heart_gold: "훌륭한 밸런스 감각으로\n어떤 자세라도 연속\n킥을 날리는 대단한 녀석이다."
          soul_silver: "연속으로 킥을 하는 동안\n양쪽 다리는 점점 길어져서\n도망치려고 하는 상대도 걷어찬다."
