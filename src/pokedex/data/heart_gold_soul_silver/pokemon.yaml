      descriptions:
        jp_kana:
          heart_gold: "はったつした　あごは　パワフルで\nなんでも　かみくだいて　しまうので\nおやのトレーナーでも　ようちゅうい。"
          soul_silver: "ちいさいながらも　あばれんぼう。\nめのまえで　うごくものが　あれば\nとにかく　かみついてくる。"
        en:
          heart_gold: "Its powerful, well-developed jaws\nare capable of crushing anything.\nEven its Trainer must be careful."
          soul_silver: "It is small but rough and tough.\nIt won’t hesitate to take a bite out\nof anything that moves."
        fr:
          heart_gold: "Sa mâchoire surdéveloppée est\ncapable de tout broyer. Même son\ndresseur doit s’en méfier."
          soul_silver: "Petit mais costaud, il n’hésite\npas à mordre tout ce qui\npasse à portée de ses dents."
        it:
          heart_gold: "Le sue potenti mandibole possono\nfrantumare qualsiasi cosa. Anche\nl’Allenatore dev’essere cauto."
          soul_silver: "Piccolo, ma forte e deciso.\nNon esita ad avventarsi su\nqualsiasi cosa si muova."
        de:
          heart_gold: "Seine starken Kiefer können alles\nzermalmen. Selbst sein Trainer muss\nsich vor ihm in Acht nehmen."
          soul_silver: "Es ist klein, aber zäh und stark. Es\nzögert nicht, jeden anzugreifen,\nwenn dieser ihm zu nahe kommt."
        es:
          heart_gold: "Sus desarrolladas y potentes fauces\npueden romper cualquier cosa. Su\nEntrenador debe tener cuidado."
          soul_silver: "Es pequeño pero violento. No\ndudará en morder cualquier cosa\nque se mueva cerca."
        ko:
          heart_gold: "발달한 턱은 파워풀해서\n뭐든지 깨물어 부수기 때문에\n어버이 트레이너라도 주의해야 한다."
          soul_silver: "작아도 성격은 아주 거칠다.\n눈앞에서 움직이는 것이 있으면\n무조건 물어버린다."
croconaw:
