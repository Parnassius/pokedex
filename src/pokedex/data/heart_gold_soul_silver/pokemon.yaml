          soul_silver: "ぶらさがったまま　エサとなる\nむしが　とんでくるのを　まっている。\nじぶんじしんは　あまり　うごかない。"
        en:
          heart_gold: "It likes to make its shell thicker\nby adding layers of tree bark. The\nadditional weight doesn’t bother it."
          soul_silver: "It hangs and waits for flying insect\nprey to come near. It does not move\nabout much on its own."
        fr:
          heart_gold: "Il renforce sa carapace en y\najoutant des écorces d’arbre.\nIl devient alors plus lourd."
          soul_silver: "Il se suspend et attend qu’un\ninsecte vole à proximité. Il ne\nbougera pas de lui-même."
        it:
          heart_gold: "Inspessisce il guscio aggiungendo\nstrati di corteccia. Non lo\nimpensierisce l’aumento di peso."
          soul_silver: "Sta appeso in attesa di catturare\ngli insetti che si avvicinano in\nvolo. Non ama molto muoversi."
        de:
          heart_gold: "Es fügt seiner Schale schichten-\nweise Baumrinde hinzu. Die\nzusätzliche Belastung ist ihm gleich."
          soul_silver: "Es lauert vorbeifliegender Beute\nauf, die in seine Nähe kommt. Daher\nbewegt es sich nur sehr selten."
        es:
          heart_gold: "Le gusta engrosar su coraza\nañadiendo cortezas de árbol. El\naumento de peso no le molesta."
          soul_silver: "Se cuelga y espera a los insectos\nque pasan cerca. No suele moverse\nmucho por su cuenta."
        ko:
          heart_gold: "나무껍질을 짜맞춰서\n껍질을 두껍게 하는 것을 좋아한다.\n무거워져도 신경 쓰지 않는다."
          soul_silver: "매달려 있는 채로 먹이가 되는\n벌레가 날아오기를 기다리고 있다.\n자기 자신은 그다지 움직이지 않는다."
