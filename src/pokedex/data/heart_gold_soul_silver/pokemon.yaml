      descriptions:
        jp_kana:
          heart_gold: "エサを　さがすため　はなを\nこすりあわせ　じめんを　ほっている。\nたまに　おんせんを　ほりあてる。"
          soul_silver: "いい　においを　かぎつけると\nあとさき　かんがえず　においの\nほうこうへ　ダッシュしてしまう。"
        en:
          heart_gold: "It rubs its snout on the ground to\nfind and dig up food. It sometimes\ndiscovers hot springs."
          soul_silver: "If it smells something enticing, it\ndashes off headlong to find the\nsource of the aroma."
        fr:
          heart_gold: "Il renifle le sol avec sa truffe pour\ny dénicher de la nourriture. Il\ntrouve parfois des sources d’eau."
          soul_silver: "S’il sent une odeur attirante,\nil fonce tête la première pour\nen trouver l’origine."
        it:
          heart_gold: "Sfrega il muso sul terreno per scovare\ndel cibo. Talvolta scopre sorgenti\nd’acqua calda."
          soul_silver: "Appena avverte un profumo invitante,\ncerca subito di capire la provenienza\ndi quell’odore."
        de:
          heart_gold: "Auf Nahrungssuche schnüffelt es am\nBoden entlang. Es entdeckt dabei\nmanchmal auch heiße Quellen."
          soul_silver: "Wenn es etwas Vielversprechendes\nerschnuppert, dann stürzt es in\nWindeseile darauf zu."
        es:
          heart_gold: "Frota su hocico contra el suelo\npara desenterrar comida. A veces\ndescubre aguas termales."
          soul_silver: "Si percibe un aroma tentador,\nse tira de cabeza para encontrar\nel origen de dicho olor."
        ko:
          heart_gold: "먹이를 찾기 위해 코를\n바닥에 비벼 땅을 파고 있다.\n가끔 온천을 찾아낸다."
          soul_silver: "좋은 냄새를 맡으면\n뒷일을 생각하지 않고 냄새 나는\n방향으로 대시해버린다."
piloswine:
