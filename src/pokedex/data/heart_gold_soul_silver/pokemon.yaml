      egg_groups:
        - fairy
        - grass
      abilities:
        - chlorophyll
        - leaf_guard
      descriptions:
        jp_kana:
          heart_gold: "あたまのうえに　さいた　ハナは\nきおんに　よって　ひらいたり\nとじたりする　せいしつを　もつ。"
          soul_silver: "たいようの　ひかりを　あびるため\nはなびらを　ひろげるだけでなく\nちかづこうと　そらにうかんでしまう。"
        en:
          heart_gold: "The bloom on top of its head opens\nand closes as the temperature\nfluctuates up and down."
          soul_silver: "It spreads its petals to absorb\nsunlight. It also floats in the air\nto get closer to the sun."
        fr:
          heart_gold: "Le bourgeon sur sa tête s’ouvre et se\nferme en fonction des fluctuations de\nla température ambiante."
          soul_silver: "Il étend ses pétales pour absorber\nla lumière du soleil. Il flotte\npour se rapprocher du soleil."
        it:
          heart_gold: "Il fiore sul capo si apre e si\nchiude con il continuo mutare\ndella temperatura corporea."
          soul_silver: "Spalanca i petali per assorbire la\nluce solare. Fluttua nell’aria\nper essere più vicino al sole."
        de:
          heart_gold: "Temperaturschwankungen veranlassen\nes, die Blüte auf seinem Kopf immer\nzu öffnen oder zu schließen."
          soul_silver: "Es öffnet seine Blüte, um Sonnen-\nlicht aufzunehmen. Es schwebt in der\nLuft, um der Sonne näher zu sein."
        es:
          heart_gold: "La flor de su cabeza se\nabre y cierra según suba o\nbaje la temperatura."
          soul_silver: "Abre sus pétalos para absorber la\nluz solar. También flota en el aire\npara estar más cerca del sol."
        ko:
          heart_gold: "머리 위에 핀 꽃은\n기온에 따라 피거나\n지는 성질을 가졌다."
          soul_silver: "태양의 빛을 잘 받기 위해\n꽃잎을 펼칠 뿐만 아니라\n가까이 가려고 하늘로 떠올라버린다."
