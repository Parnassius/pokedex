        - intimidate
        - anger_point
      descriptions:
        jp_kana:
          heart_gold: "ツノを　つきあわせて　たたかう。\nむれをまもる　つよい　ケンタロスは\nキズだらけの　ツノを　じまんする。"
          soul_silver: "３ぼんのしっぽで　じぶんを　たたき\nたたかう　きもちを　たかめると\nぜんそくりょくで　つっこんでくる。"
        en:
          heart_gold: "They fight each other by locking\nhorns. The herd’s protector takes\npride in its battle-scarred horns."
          soul_silver: "After heightening its will to fight\nby whipping itself with its three\ntails, it charges at full speed."
        fr:
          heart_gold: "Ils se battent avec leurs cornes.\nCelles du chef de la tribu sont\ncouvertes de cicatrices."
          soul_silver: "Après s’être fouetté avec ses\ntrois queues pour augmenter son\nagressivité, il charge."
        it:
          heart_gold: "Lottano tra loro incrociando le\ncorna. Il capobranco è fiero dei\nsegni delle lotte sulle sue corna."
          soul_silver: "Prima si frusta con le tre code\nper caricarsi, poi parte all’attacco\na tutta velocità."
        de:
          heart_gold: "Sie kämpfen mit ihren Hörnern. Der\nHerdenführer ist stolz auf seine\nHörner, die viele Kampfspuren haben."
          soul_silver: "Es kämpft mit vollem Einsatz, nach-\ndem es sich mit seinen 3 Schweifen\nauspeitschte, um sich anzustacheln."
        es:
          heart_gold: "Luchan entre sí con sus cuernos.\nEl jefe de la manada alardea de\nlas cicatrices de sus cuernos."
          soul_silver: "Después de animarse a luchar\nfustigándose con sus tres colas,\ncarga a toda velocidad."
        ko:
          heart_gold: "뿔을 맞대고 싸운다.\n무리를 지키는 강한 켄타로스는\n상처투성이가 된 뿔을 자랑한다."
          soul_silver: "3개의 꼬리로 자신을 때려서\n투지가 끓어오르면\n전속력으로 돌진해온다."
magikarp:
  species_id: 129
  names:
    jp_kana: コイキング
    en: MAGIKARP
