          heart_gold: "とおったあとに　のこった　からだの\nいちぶから　また　ベトベターがうまれ\nあたりは　いっそう　くさくなる。"
          soul_silver: "ベトベターが　とおったあとは\nバイきん　だらけ　なので\nどんな　くさも　はえなくなる。"
        en:
          heart_gold: "As it moves, it loses bits of its body,\nfrom which new GRIMER emerge.\nThis worsens the stench around it."
          soul_silver: "Wherever GRIMER has passed, so\nmany germs are left behind that\nno plants will ever grow again."
        fr:
          heart_gold: "En se déplaçant il sème des parties\nde son corps qui deviendront plus\ntard des TADMORV."
          soul_silver: "Là où TADMORV passe, les plantes\ntrépassent et ne repoussent plus\njamais."
        it:
          heart_gold: "Muovendosi perde pezzetti del proprio\ncorpo, da cui nascono nuovi GRIMER.\nCosì il fetore aumenta."
          soul_silver: "Ovunque passi, GRIMER lascia così\ntanti germi che nessuna pianta\npuò più crescere."
        de:
          heart_gold: "Bei jeder Bewegung verliert es Teile,\naus denen neue SLEIMA entstehen.\nDies verschlimmert den Gestank."
          soul_silver: "Egal, wo SLEIMA auch vorbeikommt,\nes hinterlässt so viele Keime, dass\ndort nie wieder Pflanzen wachsen."
        es:
          heart_gold: "Mientras se mueve, pierde partes\nde su cuerpo, de donde saldrá un\nnuevo GRIMER. Esto aumenta su hedor."
          soul_silver: "GRIMER deja tantos gérmenes\npor donde pasa, que allí no vuelve\na crecer ninguna planta."
        ko:
          heart_gold: "지나가고 나서 남은 몸의\n일부에서 다시 질퍽이가 태어나\n주변은 더욱 악취가 난다."
          soul_silver: "질퍽이가 지나간 자리는\n세균투성이기 때문에\n어떠한 풀도 자라지 못하게 된다."
muk:
