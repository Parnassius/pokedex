          soul_silver: "けんきゅうのすえ　うみだされた\nじんこうの　ポケモン。きほんてきな\nどうさしか　プログラムされていない。"
        en:
          heart_gold: "It is a manmade Pokémon. Since it\ndoesn’t breathe, people are eager\nto try it in any environment."
          soul_silver: "A manmade Pokémon that came about as\na result of research. It is programmed\nwith only basic motions."
        fr:
          heart_gold: "Il a été conçu par l’homme. Comme\nil ne respire pas, on le teste\ndans tous les environnements."
          soul_silver: "Un Pokémon créé par l’homme après\nde longues recherches. Il ne\nconnaît que peu de mouvements."
        it:
          heart_gold: "Questo Pokémon, creato dall’uomo,\nnon ha bisogno di respirare ed è\nutilizzato in ogni tipo di ambiente."
          soul_silver: "Questo Pokémon è il risultato di\nuna ricerca umana. Esegue solo\ni movimenti più elementari."
        de:
          heart_gold: "Das ist ein künstliches Pokémon,\ndas nicht atmet. Daher wird es in\njeder Umgebung eingesetzt."
          soul_silver: "Ein künstlich produziertes Pokémon,\nwelches das Ergebnis von Forschungen\nist. Es ist simpel aufgebaut."
        es:
          heart_gold: "Es un Pokémon creado por el\nhombre. Como no respira, la gente\nquiere probarlo en cualquier sitio."
          soul_silver: "Pokémon creado por el hombre\ntras muchas investigaciones.\nSus habilidades son básicas."
        ko:
          heart_gold: "호흡을 하지 않기 때문에\n어디서나 활약할 수 있을 것으로\n기대되는 인공의 포켓몬이다."
          soul_silver: "연구 끝에 태어난\n인공포켓몬이다. 기본적인\n동작만 프로그램되어 있다."
omanyte:
