          heart_gold: "おどるように　かれいで　なめらかな\nキックわざに　みとれていると\nきつい　いちげきを　おみまいされる。"
          soul_silver: "くるくる　まわって　キックをはなつ。\nこうそくで　まわっていると\nそのまま　じめんに　もぐっていく。"
        en:
          heart_gold: "If you are enchanted by its smooth,\ndance-like kicks, you may get a closer\nexperience with one than you’d like."
          soul_silver: "It launches kicks while spinning. If\nit spins at high speed, it may bore\nits way into the ground."
        fr:
          heart_gold: "Si vous êtes fasciné par sa\ndanse de coups de pied, vous\nrisquez de le regretter."
          soul_silver: "Il donne des coups de pied tout en\ntournant. Il tourne si vite\nqu’il peut ainsi creuser le sol."
        it:
          heart_gold: "Se ci si fa incantare dall’elegante\ndanza dei suoi calci, si rischia\ndi ricevere una bella lezione."
          soul_silver: "Gira su se stesso tirando calci.\nSe gira molto velocemente può\nscavare una fossa nel terreno."
        de:
          heart_gold: "Lässt du dich von seinen eleganten,\nanmutigen und tanzartigen Tritten\nbetören, wirst du vermöbelt."
          soul_silver: "Es dreht sich um sich selbst und\nverteilt Tritte. Ist es schnell\ngenug, bohrt es sich in den Boden."
        es:
          heart_gold: "Si te encantan sus suaves,\nelegantes y danzarinas patadas,\nacabarás taladrado."
          soul_silver: "Lanza patadas mientras gira.\nSi alcanza mucha velocidad,\npuede cavar un hoyo en la tierra."
        ko:
          heart_gold: "춤추듯이 화려하고 부드러운\n킥 기술에 빠져 있으면\n제대로 일격을 선사한다."
          soul_silver: "빙글빙글 돌며 킥을 날린다.\n고속으로 돌다 보면\n그대로 지면을 파고들어 간다."
smoochum:
