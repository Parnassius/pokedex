      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 1
        speed: 0
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      abilities:
        - overgrow
      descriptions:
        jp_kana:
          heart_gold: "おおきな　はなびらを　ひろげ\nたいようの　ひかりを　あびていると\nからだに　げんきが　みなぎっていく。"
          soul_silver: "あびた　たいようの　ひかりを\nエネルギーに　へんかんできるので\nなつの　ほうが　つよくなる。"
        en:
          heart_gold: "By spreading the broad petals of\nits flower and catching the sun’s\nrays, it fills its body with power."
          soul_silver: "It is able to convert sunlight into\nenergy. As a result, it is more\npowerful in the summertime."
        fr:
          heart_gold: "Ses pétales lui servent à capter\nla lumière du soleil. Il peut\nainsi en canaliser l’énergie."
          soul_silver: "Il est capable de transformer\nla lumière en énergie. Il est\ndonc redoutable en été."
        it:
          heart_gold: "Si riempie di energia grazie ai\ngrandi petali del fiore, che\nspalanca catturando i raggi solari."
          soul_silver: "Può convertire la luce solare\nin energia. Per questo è più\nforte in estate."
        de:
          heart_gold: "Es spreizt die breiten Blätter\nseiner Blüte, um seinen Körper\nmit Sonnenenergie zu durchfluten."
          soul_silver: "Es verwandelt Sonnenlicht in Ener-\ngie. Dadurch ist es im Sommer stets\nstärker als im Winter."
        es:
          heart_gold: "Llena su cuerpo de energía con\nlos rayos solares que captan\nlos anchos pétalos de su flor."
          soul_silver: "Puede convertir la luz del sol\nen energía. Por esa razón,\nes más poderoso en verano."
        ko:
          heart_gold: "큰 꽃잎을 펼쳐\n햇빛을 받고 있으면\n몸에 힘이 넘쳐흐른다."
          soul_silver: "내리쪼이는 태양빛을\n에너지로 변환할 수 있기 때문에\n여름에 더욱 강해진다."
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    en: CHARMANDER
    fr: SALAMECHE
    it: CHARMANDER
    de: GLUMANDA
    es: CHARMANDER
    ko: 파이리
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          heart_gold: "シッポで　もえる　ほのおは\nせいめいりょくの　あらわれ。\nげんきがないと　ほのおは　よわまる。"
          soul_silver: "しっぽの　ほのおは　ヒトカゲの\nせいめいりょくの　あかし。\nげんきだと　さかんに　もえさかる。"
        en:
          heart_gold: "The flame on its tail shows the\nstrength of its life force. If it is weak,\nthe flame also burns weakly."
          soul_silver: "The flame on its tail indicates\nCHARMANDER’s life force. If it is\nhealthy, the flame burns brightly."
        fr:
          heart_gold: "La flamme au bout de sa queue montre\nla vivacité de son énergie. S’il est\nfaible, sa flamme sera petite."
          soul_silver: "La flamme sur sa queue représente\nl’énergie vitale de SALAMECHE. Quand\nil est vigoureux, elle brûle plus fort."
        it:
          heart_gold: "La fiamma che ha sulla coda\ndimostra tutta la sua forza.\nSe è fiacco, la fiamma è fioca."
          soul_silver: "La fiamma che CHARMANDER ha\nsulla coda indica la sua forza vitale.\nSe è in forma, la fiamma è vivace."
        de:
          heart_gold: "Die Flamme auf der Schweifspitze\nzeigt die Lebensenergie an. Ist sie\nschwach, ist die Flamme klein."
          soul_silver: "Die Flamme auf seiner Schweif-\nspitze zeigt die Lebensenergie an.\nIst es gesund, leuchtet sie hell."
        es:
          heart_gold: "La llama de su cola indica su\nfuerza vital. Si está débil,\nla llama arderá más tenue."
          soul_silver: "La llama de su cola indica la\nfuerza vital de CHARMANDER.\nSerá brillante si está sano."
        ko:
          heart_gold: "꼬리에서 타오르는 불꽃은\n생명력의 상징.\n기운이 없으면 불꽃이 약해진다."
          soul_silver: "꼬리의 불꽃은 파이리의\n생명력의 상징이다.\n건강할 때 왕성하게 불타오른다."
charmeleon:
