        jp_kana:
          heart_gold: "どんなに　とおくの　ものおとも\nききわけられるので　ふだんは\nしずかな　ところに　かくれている。"
          soul_silver: "どんなに　とおくの　ものおとも\nききわけられるほど　みみが　いいので\nふだんは　しずかなところを　このむ。"
        en:
          heart_gold: "With its acute hearing, it can\npick up sounds from far away.\nIt usually hides in quiet places."
          soul_silver: "Its very sensitive ears let it\ndistinguish distant sounds. As a\nresult, it prefers quiet places."
        fr:
          heart_gold: "Son ouïe très fine lui permet\nd’entendre des sons distants. Il\nse cache dans des endroits isolés."
          soul_silver: "Ses oreilles très sensibles lui\npermettent d’entendre de très loin,\nil préfère donc les endroits calmes."
        it:
          heart_gold: "Con il suo fine udito può captare\nsuoni molto distanti. Di solito\nsi nasconde in luoghi tranquilli."
          soul_silver: "Grazie all’udito finissimo può\navvertire suoni lontani. Quindi\npreferisce luoghi silenziosi."
        de:
          heart_gold: "Mit seinem sensiblen Gehör nimmt\nes entfernte Geräusche wahr. Es\nversteckt sich an ruhigen Orten."
          soul_silver: "Mit seinen sensiblen Ohren kann es\nselbst entfernte Geräusche unter-\nscheiden. Daher liebt es Stille."
        es:
          heart_gold: "Con su fino oído puede percibir\nsonidos muy lejanos. Suele\nhabitar en lugares silenciosos."
          soul_silver: "Sus sensibles oídos le permiten\ndistinguir sonidos lejanos. Por eso,\nprefiere lugares tranquilos."
        ko:
          heart_gold: "아무리 먼 곳에서 나는 소리라도\n구별할 수 있기 때문에 평소에는\n조용한 곳에 숨어 있다."
          soul_silver: "아무리 먼 곳에서 나는 소리라도\n구별할 수 있을 정도로 귀가 밝기에\n보통은 조용한 곳을 좋아한다."
