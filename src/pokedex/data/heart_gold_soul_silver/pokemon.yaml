      descriptions:
        jp_kana:
          heart_gold: "きのぼりも　とくいだが\nまえあしで　ふといみきを　へしおって\nおちてきた　きのみを　たべる。"
          soul_silver: "どんな　においも　かぎわける。\nじめんふかくに　うまっている\nたべものも　のこらず　みつけだす。"
        en:
          heart_gold: "Although it is a good climber,\nit prefers to snap trees with its\nforelegs and eat fallen berries."
          soul_silver: "With its ability to distinguish any\naroma, it unfailingly finds all\nfood buried deep underground."
        fr:
          heart_gold: "Même s’il grimpe bien, il préfère\nsecouer les arbres avec ses pattes\npour faire tomber des Baies."
          soul_silver: "Avec sa capacité à sentir toute\nodeur, il trouve sans faillir de la\nnourriture enfouie dans le sol."
        it:
          heart_gold: "Anche se è un buono scalatore,\nraccoglie le bacche scrollando\ngli alberi con le zampe anteriori."
          soul_silver: "Con la sua capacità di distinguere\nqualsiasi odore, trova cibo nel\nterreno anche a grandi profondità."
        de:
          heart_gold: "Obwohl es gut klettern kann, stößt\nes mit den Pranken gegen die Bäume\nund isst die Beeren vom Boden."
          soul_silver: "Da es alle Gerüche perfekt unter-\nscheiden kann, findet es sogar\nNahrung, die tief im Erdreich ist."
        es:
          heart_gold: "Aunque trepa muy bien, prefiere\nagitar los árboles con sus patas\ny comer las bayas caídas."
          soul_silver: "Capaz de percibir cualquier tipo de\naroma, encuentra sin problemas todo\nalimento enterrado bajo tierra."
        ko:
          heart_gold: "나무 오르기가 특기지만\n앞발로 두꺼운 나무줄기를 꺾어서\n떨어진 나무열매를 먹는다."
          soul_silver: "어떠한 냄새라도 구별할 수 있다.\n땅속 깊이 파묻혀 있는\n먹이도 남김없이 찾아낸다."
slugma:
  species_id: 218
  names:
    jp_kana: マグマッグ
    en: SLUGMA
    fr: LIMAGMA
    it: SLUGMA
    de: SCHNECKMAG
