      descriptions:
        jp_kana:
          heart_gold: "ゆうぜんと　うみを　およぐ。\nたべのこしを　ねらった　テッポウオが\nくっついていても　きにしていない。"
          soul_silver: "ひろい　うみを　じゆうに　およぐ。\nスピードが　のってくると　そのまま\nなみのうえに　とびだしてしまう。"
        en:
          heart_gold: "As it majestically swims, it doesn’t\ncare if REMORAID attach to it for\nscavenging its leftovers."
          soul_silver: "Swimming freely in open seas, it may\nfly out of the water and over the\nwaves if it builds up enough speed."
        fr:
          heart_gold: "Il nage avec majesté. Il ne se\nsoucie pas si un REMORAID\nest attaché à son corps."
          soul_silver: "Vivant en pleine mer, il peut voler\nhors de l’eau au-dessus des\nvagues s’il a assez de vitesse."
        it:
          heart_gold: "Nuotando maestosamente, neppure\nsi accorge se un REMORAID gli sta\nattaccato per mangiare i suoi avanzi."
          soul_silver: "Quando nuota libero in mare aperto\nacquista velocità e schizza fuori\ndall’acqua per volare sulle onde."
        de:
          heart_gold: "Da es so majestätisch schwimmt,\nschert es sich nicht um REMORAID,\ndas seine Essensreste vertilgt."
          soul_silver: "Auf offener See kann es so schnell\nwerden, dass es nach oben schwimmt\nund über den Wellen fliegt."
        es:
          heart_gold: "Mientras nada majestuosamente,\nno le importa que REMORAID le\nsigan para comerse sus sobras."
          soul_silver: "Nada libremente en mar abierto.\nSi va lo bastante rápido,\nvolará sobre las olas del mar."
        ko:
          heart_gold: "유연하게 바다를 헤엄친다.\n먹다 남은 음식을 노린 총어가\n달라붙어 있어도 신경 쓰지 않는다."
          soul_silver: "넓은 바다를 자유롭게 헤엄친다.\n스피드가 올라가면 그대로\n파도 위를 날아올라 버린다."
skarmory:
  species_id: 227
  names:
    jp_kana: エアームド
    en: SKARMORY
    fr: AIRMURE
    it: SKARMORY
    de: PANZAERON
    es: SKARMORY
    ko: 무장조
