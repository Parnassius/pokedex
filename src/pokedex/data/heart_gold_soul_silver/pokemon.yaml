          soul_silver: "はったつした　あしの　ツメを\nエサに　くいこませ　うごけなくして\n１００キロさきの　す　まで　はこぶ。"
        en:
          heart_gold: "It has outstanding vision. However\nhigh it flies, it is able to distinguish\nthe movements of its prey."
          soul_silver: "It renders its prey immobile using \nwell-developed claws, then carries the\nprey more than 60 miles to its nest."
        fr:
          heart_gold: "Il possède une très bonne vue qui\nlui permet de distinguer ses\nproies d’une très haute altitude."
          soul_silver: "Il immobilise sa proie avec ses\npuissantes serres et peut la\ntransporter sur plus de 100 km."
        it:
          heart_gold: "Ha una vista eccellente. Per\nquanto alto stia volando, scorge\nsempre i movimenti della preda."
          soul_silver: "Immobilizza la preda con artigli\nben sviluppati e può trasportarla\nper più di 100 km fino al suo nido."
        de:
          heart_gold: "Sein Sehvermögen ist ausgezeichnet.\nEgal wie hoch es fliegt, es kann\nseine Beute genau beobachten."
          soul_silver: "Es lähmt seine Gegner mit seinen\nKrallen und trägt die Beute in sein\nbis zu 100 km entferntes Nest."
        es:
          heart_gold: "Su visión es extraordinaria.\nAunque vuele muy alto, detectará\ntodo movimiento de su presa."
          soul_silver: "Inmoviliza a su presa usando sus\nenormes garras, y después la lleva\nhasta su nido, a unos 100 km."
        ko:
          heart_gold: "매우 시력이 좋다.\n아무리 높은 장소에서라도\n먹이가 움직이는 모습을 분별한다."
          soul_silver: "발달한 발의 발톱으로\n먹이를 꼼짝 못하게 움켜쥐고\n100km 떨어진 둥지까지 운반한다."
pidgeot:
