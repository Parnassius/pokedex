          soul_silver: "こどもが　うまれたときに\nしぼられた　ミルクには　いつもより\nえいようが　たっぷり　つまっている。"
        en:
          heart_gold: "Its milk is packed with nutrition,\nmaking it the ultimate beverage\nfor the sick or weary."
          soul_silver: "If it is around babies, the milk\nit produces contains much more\nnutrition than usual."
        fr:
          heart_gold: "Son lait est très nutritif. C’est\nune boisson parfaite pour les\nmalades et les personnes âgées."
          soul_silver: "Si elle vient d’avoir un petit,\nson lait est bien plus nutritif\nque d’habitude."
        it:
          heart_gold: "Il suo latte è ricco di sostanze\nnutrienti, che ne fanno il miglior\nrimedio per chi è stanco o malato."
          soul_silver: "Se ha appena avuto un piccolo,\nil latte che produce è molto più\nnutriente del normale."
        de:
          heart_gold: "Aufgrund der vielen Nährstoffe\nstellt seine Milch das ideale Getränk\nfür Kranke und Schwache dar."
          soul_silver: "Wenn es gerade ein Junges hat, dann\nenthält seine Milch mehr Nähr-\nstoffe als gewöhnlich."
        es:
          heart_gold: "Su leche, rica en nutrientes,\nes la mejor bebida contra el\ncansancio y la enfermedad."
          soul_silver: "Si tiene crías, la leche que produce\ncontiene muchos más nutrientes de\nlo normal."
        ko:
          heart_gold: "우유는 영양 만점이다.\n노인과 병든 사람에게\n최고의 음료수다."
          soul_silver: "새끼가 태어났을 때에\n짜낸 우유는 평상시보다\n영양이 듬뿍 담겨 있다."
