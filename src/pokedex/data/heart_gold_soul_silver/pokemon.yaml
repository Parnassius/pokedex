      egg_groups:
        - grass
      abilities:
        - chlorophyll
      descriptions:
        jp_kana:
          heart_gold: "ときおり　キレイハナが　あつまって\nおどるような　しぐさを　みせる。\nたいようをよぶ　ぎしき　といわれる。"
          soul_silver: "なんごくに　おおく　せいそくする。\nおどるとき　はなびらが　ふれあい\nここちよい　おとが　なりひびく。"
        en:
          heart_gold: "BELLOSSOM gather at times and seem\nto dance. They say that the dance\nis a ritual to summon the sun."
          soul_silver: "Plentiful in the tropics. When it\ndances, its petals rub together and\nmake a pleasant ringing sound."
        fr:
          heart_gold: "Les JOLIFLOR se réunissent souvent\npour danser. On pense que c’est\nun rituel pour appeler le soleil."
          soul_silver: "Fréquent dans les tropiques. Quand\nil danse, ses pétales se frottent,\ncréant un son mélodieux."
        it:
          heart_gold: "A volte gruppi di BELLOSSOM\nsembrano danzare. Si dice che\nsia un rito per invocare il sole."
          soul_silver: "Molto comune ai tropici. Quando danza,\ni petali sfregano uno contro l’altro\nproducendo un piacevole tintinnio."
        de:
          heart_gold: "BLUBELLA kommen zusammen, um zu\ntanzen. Man sagt, dieser Tanz sei\nein Ritual, um der Sonne zu huldigen."
          soul_silver: "Es lebt in den Tropen. Beim Tanzen\nreiben seine Blüten aneinander und\nerzeugen ein wohliges Geräusch."
        es:
          heart_gold: "Los BELLOSSOM suelen reunirse\npara bailar. Dicen que sus danzas\nson un ritual para invocar al sol."
          soul_silver: "Abunda en los trópicos. Cuando\nbaila, sus pétalos se rozan\ncreando un agradable tintineo."
        ko:
          heart_gold: "가끔 아르코가 모여서\n춤을 추는 듯한 동작을 보인다.\n태양을 부르는 의식이라 전해진다."
          soul_silver: "남국에 널리 분포하여 서식하고 있다.\n춤출 때 꽃잎끼리 서로 부딪히며\n기분 좋은 소리가 울려 퍼진다."
marill:
  species_id: 183
  names:
    jp_kana: マリル
    en: MARILL
    fr: MARILL
    it: MARILL
    de: MARILL
    es: MARILL
    ko: 마릴
