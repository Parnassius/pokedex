          soul_silver: "カラに　おおわれているが　じゆうに\nとびまわれる。かたさと　はやさを\nもつので　はかいりょく　ばつぐんだ。"
        en:
          heart_gold: "Its shell is as hard as sheet rock,\nand it is also very strong. Its\nthrashing can topple a mountain."
          soul_silver: "Even sealed in its shell, it can move\nfreely. Hard and fast, it has\noutstanding destructive power."
        fr:
          heart_gold: "Sa carapace est aussi dure que la\npierre et il est très fort. Ses\ncoups peuvent raser une montagne."
          soul_silver: "Même coincé dans sa coquille, il\npeut se déplacer. Il est doté d’une\npuissance destructrice terrible."
        it:
          heart_gold: "Fortissimo e con un guscio duro\ncome roccia. Ha un Colpo capace\ndi abbattere una montagna."
          soul_silver: "Può muoversi liberamente anche se è\nchiuso nel guscio. Forte e rapido, ha\nun enorme potere distruttivo."
        de:
          heart_gold: "Es ist sehr stark und sein Panzer\nist steinhart. Setzt es Fuchtler\nein, kann es einen Berg umstürzen."
          soul_silver: "Trotz seiner harten Schale kann\nes sich frei bewegen. Es ist flink\nund äußerst zerstörerisch."
        es:
          heart_gold: "Su caparazón es duro como una\npiedra y muy resistente.\nSu Golpe puede derribar montañas."
          soul_silver: "Hasta encerrado en su coraza, se\nmueve libremente. Duro y rápido,\nsu poder destructivo es enorme."
        ko:
          heart_gold: "암반 같은 단단한 껍질로\n둘러싸여 있지만 힘이 강해서\n난동부리면 산도 무너져버린다."
          soul_silver: "껍질에 덮여 있지만 자유로이\n뛰어다닌다. 단단함과 스피드를\n지니고 있어서 파괴력이 대단하다."
