          soul_silver: "のうりょくを　つかうたびに\nからだから　とくしゅな　アルファはを\nだして　きかいをくるわせる。"
        en:
          heart_gold: "It possesses strong spiritual power.\nThe more danger it faces,\nthe stronger its psychic power."
          soul_silver: "If it uses its abilities, it\nemits special alpha waves that\ncause machines to malfunction."
        fr:
          heart_gold: "Il est doté de puissants pouvoirs\npsy qui s’adaptent à la force des\nennemis qu’il rencontre."
          soul_silver: "En utilisant ses pouvoirs, il émet\ndes ondes alpha et cause des\ndistorsions électroniques."
        it:
          heart_gold: "Ha un forte potere psicologico.\nLa sua forza psichica aumenta\nquando si trova in pericolo."
          soul_silver: "Usando le sue abilità emette\nspeciali onde alfa che causano\nmalfunzionamenti nei macchinari."
        de:
          heart_gold: "Es verfügt über starke Psi-Kräfte.\nJe größer die Gefahr, desto stär-\nker werden seine Psi-Kräfte."
          soul_silver: "Setzt es seine Kräfte ein, sendet\nes Alphawellen aus, die einen Defekt\nbei Maschinen erzeugen können."
        es:
          heart_gold: "Es muy fuerte espiritualmente.\nCuanto mayor sea el peligro,\nmayor será su poder psíquico."
          soul_silver: "Si usa sus habilidades,\nemite ondas alfa especiales que\nhacen que las máquinas fallen."
        ko:
          heart_gold: "강한 정신력의 소유자.\n궁지에 몰리면 몰릴수록\n능력이 높아진다."
          soul_silver: "능력을 사용할 때마다\n몸에서 특수한 알파파를\n발산하여 기계를 교란시킨다."
alakazam:
  species_id: 65
  names:
    jp_kana: フーディン
    en: ALAKAZAM
    fr: ALAKAZAM
    it: ALAKAZAM
    de: SIMSALA
    es: ALAKAZAM
