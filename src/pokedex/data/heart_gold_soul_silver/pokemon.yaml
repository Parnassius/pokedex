          soul_silver: "カラのなかに　たまった　すなつぶが\nシェルダーの　たいえきと　まじりあい\nきれいな　しんじゅが　うみだされる。"
        en:
          heart_gold: "It swims facing backward by opening\nand closing its two-piece shell.\nIt is surprisingly fast."
          soul_silver: "Grains of sand trapped in its\nshells mix with its body fluids to\nform beautiful pearls."
        fr:
          heart_gold: "Il nage à l’envers en ouvrant et en\nrefermant sa coquille. Il peut\natteindre une grande vitesse."
          soul_silver: "Les grains de sable coincés dans sa\ncoquille créent de superbes perles\nune fois mélangés à ses fluides."
        it:
          heart_gold: "Nuota all’indietro aprendo e\nchiudendo le due parti del guscio.\nÈ sorprendentemente rapido."
          soul_silver: "La sabbia trattenuta dai gusci\nsi mischia ai fluidi corporei\nformando perle bellissime."
        de:
          heart_gold: "Es schwimmt auf dem Rücken, indem\nes seine Schalenhälften öffnet und\nschließt. Es ist sehr schnell."
          soul_silver: "Winzige Sandkörner in seiner Schale\nvermischen sich mit seinem Körper-\nsaft und daraus entstehen Perlen."
        es:
          heart_gold: "Nada hacia atrás abriendo y\ncerrando su concha. Es\nsorprendentemente rápido."
          soul_silver: "Los granos de arena atrapados\nen sus valvas se mezclan con sus\nfluidos corporales para crear perlas."
        ko:
          heart_gold: "2장의 껍질을 여닫아서\n뒤쪽으로 헤엄친다.\n그 스피드는 제법 빠르다."
          soul_silver: "껍질 안에 모인 모래알이\n셀러의 체액과 섞여\n아름다운 진주를 만들어낸다."
cloyster:
