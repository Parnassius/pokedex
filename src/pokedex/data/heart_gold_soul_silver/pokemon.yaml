        jp_kana:
          heart_gold: "３つの　あたまが　たがいちがいに\nうごくのは　まわりの　つちを\nやわらかくして　ほりやすくするため。"
          soul_silver: "すごい　ちからの　もちぬしで\nどんなに　かたい　じめんでも\nちか１００キロまで　ほりすすむ。"
        en:
          heart_gold: "Its three heads bob separately up\nand down to loosen the soil nearby,\nmaking it easier for it to burrow."
          soul_silver: "Extremely powerful, they can dig\nthrough even the hardest ground to\na depth of over 60 miles."
        fr:
          heart_gold: "Ses trois têtes pilonnent le sol\npour le rendre friable et\nainsi le creuser plus facilement."
          soul_silver: "Terriblement puissants, ils peuvent\ncreuser un tunnel sur tout type de\nsol et jusqu’à 100 km de profondeur."
        it:
          heart_gold: "Le sue tre teste indipendenti\nsmuovono il terreno per poter\nscavare con maggiore facilità."
          soul_silver: "Estremamente forte, può scavare\nuna fossa anche nella terra più\ndura fino a 100 km di profondità."
        de:
          heart_gold: "Seine drei Köpfe bewegen sich\nabwechselnd hinauf und hinunter, um\ndas Erdreich um ihn zu lockern."
          soul_silver: "Es ist so stark, dass es sich mit\nSchaufler sogar durch steinharten\nBoden bis in 100 km Tiefe gräbt."
        es:
          heart_gold: "Sus tres cabezas suben y bajan\npara remover la tierra cercana,\nfacilitándole la excavación."
          soul_silver: "Muy poderosos, pueden excavar\nhasta los terrenos más duros a una\nprofundidad de más de 100 km."
        ko:
          heart_gold: "3개의 머리가 교차하며\n움직이는 것은 주변의 흙을\n부드럽게 해 파기 쉽게 하기 위해서다."
          soul_silver: "엄청난 힘의 소유자로\n그 어떤 단단한 땅이라도\n지하 100km까지 파 들어 간다."
meowth:
  species_id: 52
