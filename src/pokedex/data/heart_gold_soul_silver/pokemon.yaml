          heart_gold: "２つの　しょくしゅの　さきから\nプラスと　マイナスの　でんきを\nながして　あいてを　しびれさせる。"
          soul_silver: "くらい　かいていでは　いつも\nてんめつ　している　しょくしゅの\nあかり　だけが　つうしんしゅだん。"
        en:
          heart_gold: "It shoots positive and negative\nelectricity between the tips of its\ntwo antennae and zaps its enemies."
          soul_silver: "On the dark ocean floor, its only\nmeans of communication is its\nconstantly flashing lights."
        fr:
          heart_gold: "Il émet avec ses antennes des\nimpulsions positives et négatives qui\npeuvent électrocuter ses ennemis."
          soul_silver: "Au plus profond de l’océan, son\nseul moyen de communication est la\nlumière qui clignote constamment."
        it:
          heart_gold: "Spara elettricità positiva e negativa\ntra le punte delle due antenne\nper colpire i nemici."
          soul_silver: "Negli oscuri fondali oceanici il suo unico\nmezzo di comunicazione sono le luci\nsempre lampeggianti."
        de:
          heart_gold: "Es verschießt negative und positive\nElektronen zwischen seinen Anten-\nnen, um seine Feinde zu erlegen."
          soul_silver: "Am Meeresgrund kann es sich nur\ndurch ständiges Flackern seiner\nLichter der Umgebung kundtun."
        es:
          heart_gold: "Descarga electricidad positiva y\nnegativa entre las puntas de sus dos\nantenas y electrocuta al enemigo."
          soul_silver: "En el oscuro fondo del océano,\nsu único modo de comunicarse\nes emitiendo luces parpadeantes."
        ko:
          heart_gold: "2개의 촉수 끝에서\n플러스와 마이너스의 전기를\n흘려보내 상대를 마비시킨다."
          soul_silver: "어두운 해저에서는 항상\n깜빡거리고 있는 촉수의\n빛만이 통신수단이다."
lanturn:
