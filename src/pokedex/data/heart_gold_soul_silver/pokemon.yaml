          soul_silver: "かみなりが　おちたときのような\nなきごえで　ほえながら\nだいちを　かけめぐる　ポケモン。"
        en:
          heart_gold: "The rain clouds it carries let it\nfire thunderbolts at will. They say\nthat it descended with lightning."
          soul_silver: "A Pokémon that races across the\nland while barking a cry that sounds\nlike crashing thunder."
        fr:
          heart_gold: "Le nuage de pluie qu’il porte peut\nrelâcher la foudre à volonté. On\ndit de lui qu’il est venu avec l’orage."
          soul_silver: "Un Pokémon qui parcourt le\nmonde. Son aboiement est plus\nfort qu’un coup de tonnerre."
        it:
          heart_gold: "Grazie alle nubi di pioggia che ha\ncon sé lancia fulmini a volontà.\nPare che sia arrivato con un lampo."
          soul_silver: "Un Pokémon che corre in lungo\ne in largo lanciando un verso che\nsembra il rumore di un tuono."
        de:
          heart_gold: "Die Regenwolken, die es trägt,\nermöglichen es ihm, Gewitter zu\nerzeugen. Es strotzt vor Blitzen."
          soul_silver: "Dieses Pokémon jagt über das Land\nund stößt dabei ein Gebrüll aus,\ndas wie krachender Donner klingt."
        es:
          heart_gold: "Las nubes de lluvia que lleva le\npermiten lanzar rayos a voluntad.\nDicen que apareció con un rayo."
          soul_silver: "Un Pokémon que corre por el\ncampo mientras lanza un grito\nque recuerda al trueno."
        ko:
          heart_gold: "비구름을 짊어지고 있어서\n어떤 때라도 번개를 칠 수 있다.\n번개와 함께 떨어졌다고 한다."
          soul_silver: "번개가 쳤을 때와 같은\n울음소리로 짖으며\n대지를 달리는 포켓몬이다."
