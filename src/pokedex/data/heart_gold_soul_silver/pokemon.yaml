          soul_silver: "いでんしには　すべての　ポケモンの\nじょうほうが　ふくまれているので\nあらゆる　わざが　つかえるという。"
        en:
          heart_gold: "Apparently, it appears only to\nthose people who are pure of heart\nand have a strong desire to see it."
          soul_silver: "Its DNA is said to contain the genetic\ncodes of all Pokémon, so it can\nuse all kinds of techniques."
        fr:
          heart_gold: "Il n’apparaît qu’aux personnes\nqui ont un cœur pur et qui veulent\nà tout prix le rencontrer."
          soul_silver: "Son ADN contient les codes\ngénétiques de tous les Pokémon. Il\npeut utiliser nombre de techniques."
        it:
          heart_gold: "Sembra che appaia soltanto ai puri\ndi cuore e a coloro che hanno\nun forte desiderio di vederlo."
          soul_silver: "Pare che il suo DNA contenga i codici\ngenetici di tutti i Pokémon; per questo\npuò usare qualsiasi tecnica."
        de:
          heart_gold: "Es scheint, dass es sich nur den\nMenschen zeigt, die reinen Herzens\nsind und es sehen wollen."
          soul_silver: "Seine DNS soll den genetischen Code\naller Pokémon beinhalten. Dadurch\nkann es alle Attacken erlernen."
        es:
          heart_gold: "Dicen que solo se aparece a los\npuros de corazón y a quienes\ndesean verlo con todas sus fuerzas."
          soul_silver: "Dicen que su ADN contiene el código\ngenético de todos los Pokémon, por\nlo que conoce cualquier técnica."
        ko:
          heart_gold: "맑고 깨끗한 마음과\n꼭 만나고 싶다는 간절함이\n있으면 모습을 나타내는 듯하다."
          soul_silver: "유전자에는 모든 포켓몬의\n정보가 담겨 있기 때문에\n모든 기술을 쓸 수 있다고 전해진다."
