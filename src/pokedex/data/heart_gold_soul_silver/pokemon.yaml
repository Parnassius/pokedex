          soul_silver: "こうらに　きのみを　たくわえている。\nおそわれないように　いわの　したに\nこもって　じっとしている。"
        en:
          heart_gold: "The berries it stores in its\nvase-like shell decompose and\nbecome a gooey liquid."
          soul_silver: "It stores berries inside its shell.\nTo avoid attacks, it hides beneath\nrocks and remains completely still."
        fr:
          heart_gold: "Les Baies qu’il stocke dans sa\ncoquille se décomposent et\ndeviennent un liquide gluant."
          soul_silver: "Il garde des baies dans sa coquille.\nPour éviter les attaques, il\ns’immobilise sous un rocher."
        it:
          heart_gold: "Le bacche che raccoglie nel guscio fatto\na vaso marciscono trasformandosi\nin liquido vischioso."
          soul_silver: "Nel guscio raccoglie delle bacche.\nPer evitare attacchi, si nasconde\nsotto le rocce e non fa alcun rumore."
        de:
          heart_gold: "Die Beeren, die es in seinem Inneren\nlagert, gären und daraus ent-\nsteht ein dickflüssiger Saft."
          soul_silver: "Es sammelt Beeren in seiner Schale.\nUm sich vor Attacken zu schützen,\nversteckt es sich unter Steinen."
        es:
          heart_gold: "Las bayas que almacena en su\nconcha se descomponen en\nun líquido pegajoso."
          soul_silver: "Almacena Bayas dentro de su\nconcha. Para evitar ataques, se\nesconde inmóvil bajo las rocas."
        ko:
          heart_gold: "항아리 같은 등껍질 안에\n비축된 나무열매가 녹아서\n걸쭉한 액체가 된다고 한다."
          soul_silver: "껍질에 열매가 비축되어 있다.\n공격받지 않도록 바위 밑에\n틀어박혀 꼼짝하지 않고 있다."
heracross:
