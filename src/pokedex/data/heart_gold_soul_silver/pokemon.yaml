        jp_kana:
          heart_gold: "じぶんより　つよくて　おおきな\nあいてにも　おそれずに　たちむかう\nゆうかんで　たのもしい　せいかく。"
          soul_silver: "ちゅうじつな　せいかくで\nおやの　トレーナーを　まもるため\nひっしに　あいてに　ほえかかる。"
        en:
          heart_gold: "It has a brave and trustworthy\nnature. It fearlessly stands up\nto bigger and stronger foes."
          soul_silver: "Extremely loyal, it will fearlessly\nbark at any opponent to protect\nits own Trainer from harm."
        fr:
          heart_gold: "Il est courageux et fier. Il se\ndresse vaillamment devant ses\nennemis même s’ils sont plus puissants."
          soul_silver: "Très fidèle, il aboiera sans peur\npour protéger son maître du danger\nqui le guette."
        it:
          heart_gold: "Coraggioso e fedele, si oppone\nsenza timore anche a nemici\npiù grandi e forti di lui."
          soul_silver: "Di indole molto leale, abbaia furiosamente\ncontro chiunque minacci di attaccare il\nil suo Allenatore."
        de:
          heart_gold: "Es ist von Natur aus tapfer und\nvertrauenswürdig. Es scheut nicht\nvor starken Gegnern zurück."
          soul_silver: "Es ist sehr loyal. Es bellt furchtlos\njeden Gegner an, um seinen Trainer\nvor Schaden zu bewahren."
        es:
          heart_gold: "De naturaleza valiente y\nhonrada, se enfrenta sin miedo\na enemigos más grandes y fuertes."
          soul_silver: "Extremadamente fiel, ladrará sin\ntemor a cualquier enemigo para\ndefender a su Entrenador."
        ko:
          heart_gold: "자신보다 강하고 큰\n상대라도 겁 없이 맞서는\n용감하고 믿음직스런 성격이다."
          soul_silver: "충직한 성격으로\n자신의 트레이너를 지키기 위해\n필사적으로 상대방에게 짖어댄다."
arcanine:
