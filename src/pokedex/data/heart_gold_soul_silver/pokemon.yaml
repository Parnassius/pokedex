      types:
        - water
        - flying
      egg_groups:
        - water_2
        - dragon
      abilities:
        - intimidate
      descriptions:
        jp_kana:
          heart_gold: "むかし　いくさに　なるたびに\nギャラドスが　あらわれ　あちこちを\nひのうみに　していった　という。"
          soul_silver: "いちど　すがたを　あらわすと\nまわりを　すべて　やきつくさないと\nいかりが　しずまらない　という。"
        en:
          heart_gold: "They say that during past strife,\nGYARADOS would appear and leave\nblazing ruins in its wake."
          soul_silver: "Once it appears, it goes on a rampage.\nIt remains enraged until it\ndemolishes everything around it."
        fr:
          heart_gold: "On dit que pendant les guerres,\nil serait apparu et il aurait semé\nchaos et destruction sur le monde."
          soul_silver: "Quand il apparaît, il se lance dans\nune rage destructrice jusqu’à ce\nque tout soit détruit."
        it:
          heart_gold: "Si dice che in guerra i GYARADOS\napparissero lasciando soltanto\nincendi e rovine sul loro cammino."
          soul_silver: "Appena appare monta su tutte le\nfurie. Non si placa finché non ha\ndemolito qualsiasi cosa."
        de:
          heart_gold: "Man sagt, dass GARADOS in den\nalten Kriegen aufgetaucht sei und\nnichts als Ruinen hinterlassen hat."
          soul_silver: "Taucht es auf, randaliert es. Es\nberuhigt sich erst, wenn es al-\nles um sich zerstört hat."
        es:
          heart_gold: "Dicen que en guerras pasadas,\nGYARADOS aparecía dejando a su\npaso la ruina y el caos."
          soul_silver: "Cuando aparece lo destroza todo.\nNo deja de estar furioso hasta que\nlo destruye todo."
        ko:
          heart_gold: "옛날에 전쟁이 날 때마다\n갸라도스가 나타나서 사방을\n불바다로 만들었다고 전해진다."
          soul_silver: "한번 모습을 나타내면\n주변 전체를 박살 내지 않고는\n분노가 가라앉지 않는다고 전해진다."
lapras:
  species_id: 131
  names:
    jp_kana: ラプラス
    en: LAPRAS
    fr: LOKHLASS
    it: LAPRAS
    de: LAPRAS
    es: LAPRAS
    ko: 라프라스
  forms:
    lapras:
      form_id: 0
      base_stats:
        hp: 130
        attack: 85
        defense: 80
        special_attack: 85
        special_defense: 95
        speed: 60
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
        - ice
      egg_groups:
        - monster
        - water_1
      abilities:
        - water_absorb
        - shell_armor
      descriptions:
        jp_kana:
          heart_gold: "やさしい　こころの　もちぬし。\nめったに　あらそわないため　たくさん\nつかまえられ　かずが　へった。"
          soul_silver: "ひとを　せなかにのせて　うみをいく。\nきげんがいいと　きれいな　なきごえで\nうたうことも　あるらしい。"
        en:
          heart_gold: "They have gentle hearts. Because\nthey rarely fight, many have been\ncaught. Their number has dwindled."
          soul_silver: "It ferries people across the sea on\nits back. It may sing an enchanting\ncry if it is in a good mood."
        fr:
          heart_gold: "Ils sont d’une nature gentille.\nComme ils se battent rarement,\nils sont en voie d’extinction."
          soul_silver: "Il transporte les gens sur son dos.\nS’il est de bonne humeur, il se met\nà chanter un air agréable."
        it:
          heart_gold: "Sono buoni d’animo e lottano di\nrado, così molti di loro sono facili\nprede: sono stati decimati."
          soul_silver: "Trasporta la gente per il mare\nsul suo dorso. Se è di buon umore\nemette un verso dolce e melodioso."
        de:
          heart_gold: "Sie sind gutmütig. Da sie selten\nkämpfen, wurden sie oft gefangen.\nIhre Anzahl ist stark reduziert."
          soul_silver: "Die Menschen überqueren das Meer\nauf seinem Rücken. Ist es fröhlich,\nstimmt es ein entzückendes Lied an."
        es:
          heart_gold: "Son buenos de corazón. Muchos\nfueron capturados por ser tan\npacíficos. Ahora hay muchos menos."
          soul_silver: "Lleva a la gente por el mar en su\nlomo. Si está de buen humor,\ncanta una bella melodía."
        ko:
          heart_gold: "부드러운 마음의 소유자다.\n좀처럼 다투지 않아 많이\n잡혔기 때문에 수가 줄었다."
          soul_silver: "사람을 등에 태우고 바다를 건넌다.\n기분이 좋으면 아름다운 목소리로\n노래를 하기도 하는 듯하다."
