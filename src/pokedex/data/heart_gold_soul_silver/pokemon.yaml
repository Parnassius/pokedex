          soul_silver: "せなかの　カラは　くずれやすいが\nときどき　たいないを　めぐっている\nこうねつの　ほのおが　ふきだす。"
        en:
          heart_gold: "The shell on its back is just skin\nthat has cooled and hardened. It\nbreaks easily with a slight touch."
          soul_silver: "Its brittle shell occasionally\nspouts intense flames that \ncirculate throughout its body."
        fr:
          heart_gold: "La coquille sur son dos est une\npartie de sa peau qui s’est refroidie\net solidifiée. Elle est fragile."
          soul_silver: "Sa coquille, très fragile, projette\nrégulièrement des flammes qui\ncirculent dans son corps."
        it:
          heart_gold: "Il guscio sul dorso è pelle raffreddata\ne secca. Si rompe facilmente\nal minimo tocco."
          soul_silver: "A volte intense fiamme partono dal\nfragile guscio e avvolgono tutto il\nsuo corpo."
        de:
          heart_gold: "Das Haus auf seinem Rücken ist aus-\ngehärtete Haut. Es zerbricht schon\nbei der geringsten Berührung."
          soul_silver: "Aus seinem porösen Schneckengehäuse\nsprudeln Feuerfontänen, die\nseinen Körper durchfluten."
        es:
          heart_gold: "La concha de su lomo son restos\nde piel enfriada y endurecida. Se\nrompe fácilmente con solo tocarla."
          soul_silver: "En ocasiones, su resbaladiza\nconcha lanza intensas llamaradas\nque recorren todo su cuerpo."
        ko:
          heart_gold: "등껍질은 피부가 식어서\n딱딱해졌을 뿐이다. 뭔가가\n부딪히기만 해도 간단히 부서진다."
          soul_silver: "등껍질은 깨어지기 쉽지만\n가끔 체내를 순환하고 있는\n고열의 불꽃을 뿜어낸다."
swinub:
  species_id: 220
