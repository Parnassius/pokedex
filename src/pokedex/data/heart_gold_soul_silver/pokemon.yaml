        jp_kana:
          heart_gold: "おおきな　あいてに　おそわれても\nはったつした　せびれを　あやつり\nすいちゅうを　じゆうに　にげる。"
          soul_silver: "はったつした　おおきな　ヒレを\nすばやく　うごかすことで　まえを\nむいたまま　うしろに　いどうできる。"
        en:
          heart_gold: "If attacked by a larger enemy,\nit quickly swims to safety by adeptly\ncontrolling its well-developed dorsal fin."
          soul_silver: "Its big, developed fins move rapidly,\nallowing it to swim backward\nwhile still facing forward."
        fr:
          heart_gold: "S’il est menacé par un gros adversaire,\nil s’enfuit en nageant rapidement grâce\nà ses nageoires."
          soul_silver: "Ses larges nageoires lui permettent\nde se déplacer à reculons tout en\nregardant en avant."
        it:
          heart_gold: "Se è attaccato da un nemico più\ngrande, si mette in salvo nuotando\nagilmente con la pinna dorsale."
          soul_silver: "Con le sue pinne grandi e ben\nsviluppate nuota all’indietro\nmentre sta ancora guardando avanti."
        de:
          heart_gold: "Wird es von einem größeren Gegner\nangegriffen, setzt es seine Rücken-\nflosse ein, um davonzuschwimmen."
          soul_silver: "Seine Flossen sind sehr schnell. Da-\ndurch kann es rückwärts schwim-\nmen, ohne seinen Kopf umzudrehen."
        es:
          heart_gold: "Si es atacado por un enemigo más\ngrande, nada veloz a un lugar\nseguro gracias a su aleta dorsal."
          soul_silver: "Sus desarrolladas aletas son\nrápidas y le permiten nadar hacia\natrás aunque mire hacia delante."
        ko:
          heart_gold: "커다란 상대에게 습격당해도\n발달한 등지느러미를 써서\n수중을 자유롭게 도망친다."
          soul_silver: "발달한 커다란 지느러미를\n재빠르게 움직이는 것으로 앞을\n향한 채 뒤로 이동할 수 있다."
seadra:
