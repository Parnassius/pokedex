        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - electric
      egg_groups:
        - monster
        - field
      abilities:
        - static
      descriptions:
        jp_kana:
          heart_gold: "からだに　せいでんきが　たまると\nたいもうが　いつもの　２ばいほどに\nふくらむ。さわると　しびれる。"
          soul_silver: "たいもうは　どんどん　のびる。\nなつになると　ぜんぶ　ぬけおちるが\nいっしゅうかんで　もとどおりになる。"
        en:
          heart_gold: "If static electricity builds in its\nbody, its fleece doubles in volume.\nTouching it will shock you."
          soul_silver: "Its fleece grows continually. In\nthe summer, the fleece is fully\nshed, but it grows back in a week."
        fr:
          heart_gold: "Son corps produit de l’électricité\nstatique. Quand il est bien chargé,\nson poil double de volume."
          soul_silver: "Sa toison pousse constamment.\nEn été, même tondue, sa laine\nrepousse en moins d’une semaine."
        it:
          heart_gold: "Se il corpo si riempie d’elettricità,\nil volume della lana raddoppia.\nIl contatto causa uno shock."
          soul_silver: "La lana gli ricresce di continuo. In\nestate la perde completamente, ma\nsi riforma nel giro di una settimana."
        de:
          heart_gold: "Lädt es sich statisch auf, ver-\ndoppelt sich sein Umfang. Wer es\nberührt, erhält einen Elektroschock."
          soul_silver: "Sein Fell wächst ständig. Im Sommer\nwird es geschoren, aber sein Fell\nwächst binnen einer Woche nach."
        es:
          heart_gold: "Cuando almacena electricidad en\nsu cuerpo, dobla su volumen.\nTócalo y recibirás una descarga."
          soul_silver: "Su lana crece continuamente.\nEn verano la pierde toda, pero\nle vuelve a crecer en una semana."
        ko:
          heart_gold: "몸에 정전기가 모이면\n털이 평소의 2배 정도로\n부풀어 오른다. 만지면 마비된다."
          soul_silver: "몸의 털은 점점 자란다.\n여름이 되면 전부 빠지지만\n일주일 정도면 원래대로 자라난다."
flaaffy:
  species_id: 180
  names:
    jp_kana: モココ
    en: FLAAFFY
    fr: LAINERGIE
    it: FLAAFFY
    de: WAATY
    es: FLAAFFY
    ko: 보송송
