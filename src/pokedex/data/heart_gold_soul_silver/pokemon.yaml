        jp_kana:
          heart_gold: "どんなに　たかい　ところから\nおちても　からだを　まるめれば\nバウンドできて　たすかるのだ。"
          soul_silver: "みずけを　きらい　かんそうちに\nふかいあなを　ほって　せいかつする。\nいっしゅんで　からだを　まるめる。"
        en:
          heart_gold: "If it fell from a great height, this\nPokémon could save itself by rolling\ninto a ball and bouncing."
          soul_silver: "Disliking water, it lives in deep\nburrows in arid areas. It can roll\nitself instantly into a ball."
        fr:
          heart_gold: "S’il tombe de haut, il peut\namortir sa chute en se roulant\nen boule pour ainsi rebondir."
          soul_silver: "Détestant l’eau, il vit dans de\nprofondes tanières des régions\narides. Il aime se rouler en boule."
        it:
          heart_gold: "Se cade da una grande altezza,\nquesto Pokémon può salvarsi\nappallottolandosi e rimbalzando."
          soul_silver: "Odia l’acqua e vive in tane profonde\nall’interno di zone aride. È capace di\nappallottolarsi in un istante."
        de:
          heart_gold: "Fällt es aus großer Höhe, rollt\nsich dieses Pokémon zusammen, um\nso den Sturz abzufangen."
          soul_silver: "Da es Wasser verabscheut, gräbt es\nsich in trockenes Erdreich ein. Es\nkann sich rasch zu einem Ball rollen."
        es:
          heart_gold: "Si cayese de gran altura, este Pokémon\npodría convertirse en una pelota y\nrebotar contra el suelo."
          soul_silver: "Como odia el agua, vive en madrigueras\nmuy profundas en zonas áridas.\nPuede hacerse una bola al instante."
        ko:
          heart_gold: "아무리 높은 곳에서\n떨어져도 몸을 둥글게 말면\n바운드해서 살 수 있다."
          soul_silver: "습기를 싫어해서 건조한 땅에\n깊은 구멍을 파고 생활한다.\n눈 깜짝할 사이에 몸을 둥글게 만다."
sandslash:
