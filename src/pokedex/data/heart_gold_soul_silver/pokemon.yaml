      descriptions:
        jp_kana:
          heart_gold: "よるは　ツノで　じめんをほって\nなかで　ねむる。あさはやくだと\nひふに　しめった　つちがついている。"
          soul_silver: "ながいツノを　ふりまわして\nこうげき　してくる。さむいときは\nもりのおくに　すがたをかくす。"
        en:
          heart_gold: "With its pincer horns, it digs burrows\nto sleep in at night. In the morning,\ndamp soil clings to its body."
          soul_silver: "It swings its long pincer horns wildly\nto attack. During cold periods, it\nhides deep in forests."
        fr:
          heart_gold: "Il creuse des abris avec ses pinces\npour y dormir. Le matin, la terre\nhumide reste collée à son corps."
          soul_silver: "Il attaque sauvagement avec\nses bois. En hiver, il se cache\nau plus profond des forêts."
        it:
          heart_gold: "Di notte dorme in cunicoli che scava\ncon le sue corna. Al mattino ha il\ncorpo coperto di terra umida."
          soul_silver: "Quando attacca agita le lunghe\ncorna. Nei periodi freddi\nsta nascosto nelle foreste."
        de:
          heart_gold: "Es gräbt sich mit seinen Hörnern\neinen Unterschlupf für die Nacht.\nAm Morgen klebt nasse Erde an ihm."
          soul_silver: "Beim Angriff verdreht es sein Ge-\nweih. In Kälteperioden versteckt\nes sich tief im Wald."
        es:
          heart_gold: "Cava guaridas con sus cuernos para\npasar la noche. Por la mañana, la\ntierra húmeda se pega a su cuerpo."
          soul_silver: "Arremete violentamente con\nsu cornamenta. Cuando llega el\nfrío, se adentra en los bosques."
        ko:
          heart_gold: "밤에는 뿔로 땅을 파서\n그 안에서 잔다. 이른 아침에는\n피부에 축축한 흙이 붙어 있다."
          soul_silver: "긴 뿔을 휘둘러서\n공격을 해온다. 추울 때는\n숲 깊은 곳에 몸을 숨긴다."
tauros:
  species_id: 128
  names:
    jp_kana: ケンタロス
    en: TAUROS
    fr: TAUROS
    it: TAUROS
    de: TAUROS
    es: TAUROS
