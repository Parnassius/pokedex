      descriptions:
        jp_kana:
          heart_gold: "どんな　ものでも　たべるので\nエサとなるものが　ある　ばしょに\nすみついて　どんどん　こどもをうむ。"
          soul_silver: "たべるものが　あるところなら\nどこにだって　せいそくする。\n１にちじゅう　エサを　さがしている。"
        en:
          heart_gold: "It eats anything. Wherever food is\navailable, it will settle down and\nproduce offspring continuously."
          soul_silver: "Living wherever there is food\navailable, it ceaselessly scavenges\nfor edibles the entire day."
        fr:
          heart_gold: "Ils s’installent en colonies dans\ndes endroits qui regorgent de\nnourriture et se multiplient."
          soul_silver: "Vivant là où se trouve la nourriture,\nce charognard passe ses journées\nà la rechercher."
        it:
          heart_gold: "Mangia qualsiasi cosa. Si sistema\novunque ci sia del cibo,\nmoltiplicandosi ininterrottamente."
          soul_silver: "Vive ovunque si trovi del cibo,\ncercando incessantemente\nqualsiasi cosa sia commestibile."
        de:
          heart_gold: "Es frisst alles. Wo es Nahrung\nfindet, baut es ein Nest und\npflanzt sich ständig fort."
          soul_silver: "Es baut sein Nest, wo es Futter\nfindet. Es ist den ganzen Tag auf\nder Suche nach etwas Essbarem."
        es:
          heart_gold: "Come de todo. Se establece\ndondequiera que haya comida\ny se reproduce continuamente."
          soul_silver: "Vive allí donde haya comida\ndisponible. Busca todo el día,\nsin descanso, algo comestible."
        ko:
          heart_gold: "뭐든지 먹기 때문에\n먹이가 될 만한 것이 있는 장소에\n정착하여 계속 새끼를 낳는다."
          soul_silver: "먹을 것이 있는 곳이라면\n어디서든 서식한다.\n온종일 먹이를 찾아다닌다."
raticate:
  species_id: 20
  names:
    jp_kana: ラッタ
    en: RATICATE
