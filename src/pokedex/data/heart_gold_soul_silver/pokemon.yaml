        jp_kana:
          heart_gold: "さんらんの　じきに　なると\nかくちから　アズマオウが　あつまり\nかわのいろが　まっかに　そまる。"
          soul_silver: "ツノで　かわぞこの　いわを　くりぬき\nすをつくるのは　うみつけた　タマゴが\nながされないように　するためだ。"
        en:
          heart_gold: "During spawning season, SEAKING\ngather from all over, causing rivers to\nappear a brilliant red."
          soul_silver: "Using its horn, it bores holes in\nriverbed boulders, making nests to\nprevent its eggs from washing away."
        fr:
          heart_gold: "Pendant la saison du frai, les\nPOISSOROY se regroupent en bancs,\ncolorant les rivières en rouge."
          soul_silver: "Il fait des trous dans les rochers\ndes berges pour y faire son joli\npetit nid."
        it:
          heart_gold: "Durante la deposizione delle uova,\ni SEAKING riuniti colorano l’acqua\ndei fiumi di un rosso intenso."
          soul_silver: "Con il corno scava buchi nei massi\ndei fiumi, costruendo tane che\ndifendono le uova dalla corrente."
        de:
          heart_gold: "In der Laichzeit sammeln sich viele\nGOLKING in den Flüssen, die\ndadurch rot erstrahlen."
          soul_silver: "Es laicht in Löchern, die es mit\nseinem Horn in Felsen gebohrt\nhat, damit sein Laich sicher ist."
        es:
          heart_gold: "Durante la puesta acuden SEAKING\nde todas partes, coloreando los\nríos de un rojo brillante."
          soul_silver: "Cava con su cuerno un nido en las\npiedras del lecho del río para que\nsus huevos no sean arrastrados."
        ko:
          heart_gold: "산란할 시기가 되면\n각지에서 왕콘치가 모여들어\n강의 색깔을 새빨갛게 물들인다."
          soul_silver: "뿔로 강바닥의 바위를 파헤쳐\n둥지를 만드는 것은 낳은 알이\n떠내려가지 않도록 하기 위함이다."
staryu:
