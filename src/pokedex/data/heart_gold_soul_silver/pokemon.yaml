        jp_kana:
          heart_gold: "ふんしゃした　みずの　いきおいに\nまけないように　わざと\nたいじゅうを　おもくしているのだ。"
          soul_silver: "こうらの　ロケットほう　から\nふきだした　ジェットすいりゅうは\nぶあつい　てっぱんも　つらぬく。"
        en:
          heart_gold: "It deliberately makes itself heavy\nso it can withstand the recoil\nof the water jets it fires."
          soul_silver: "The rocket cannons on its shell fire\njets of water capable of punching\nholes through thick steel."
        fr:
          heart_gold: "Il devient énorme afin de supporter\nle puissant recul provoqué par le\ntir de ses Hydrocanons."
          soul_silver: "Les canons sur sa carapace tirent\ndes jets d’eau capables de percer\nmême de l’acier trempé!"
        it:
          heart_gold: "Aumenta il suo peso per poter\nresistere al contraccolpo dei\ngetti d’acqua che spara."
          soul_silver: "I cannoni sul suo guscio\nsparano getti d’acqua capaci\ndi bucare l’acciaio."
        de:
          heart_gold: "Es macht sich absichtlich schwer,\num den Rückstoß seiner Hydropumpe\nabzufangen."
          soul_silver: "Die Wassersalven, die es mit den\nKanonen in seinem Panzer abfeuert,\ndurchdringen sogar Panzerstahl."
        es:
          heart_gold: "Deliberadamente se hace más pesado\npara contrarrestar la fuerza de\nlos chorros de agua que dispara."
          soul_silver: "Los cañones de su concha disparan\nchorros de agua capaces de hacer\nagujeros en las planchas de acero."
        ko:
          heart_gold: "분사한 물의 기세에\n밀리지 않도록 일부러\n체중을 무겁게 불리고 있다."
          soul_silver: "등껍질의 로켓포에서\n뿜어져 나오는 제트 수류는\n두꺼운 철판도 뚫는다."
caterpie:
