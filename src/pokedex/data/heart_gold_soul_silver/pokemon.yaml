      descriptions:
        jp_kana:
          heart_gold: "からだの　ひょうめんには　でんきが\nながれている。あたりが　くらいと\nぜんしんが　あおじろく　ひかるのだ。"
          soul_silver: "ぜんしんから　つねに　でんきが\nはなたれているため　ちかづくと\nかみのけが　さかだってしまう。"
        en:
          heart_gold: "Electricity runs across the surface\nof its body. In darkness, its entire\nbody glows a whitish-blue."
          soul_silver: "Its body constantly discharges\nelectricity. Getting close to it\nwill make your hair stand on end."
        fr:
          heart_gold: "Des ondes électriques parcourent\nla surface de son corps. Il brille\nd’un éclat bleuté dans le noir."
          soul_silver: "Son corps décharge constamment de\nl’électricité. En restant à côté de\nlui, vos poils se hérisseront."
        it:
          heart_gold: "La corrente elettrica attraversa\nla superficie del suo corpo che\nal buio riluce di un blu perlato."
          soul_silver: "Il corpo scarica continuamente\nelettricità. A chi gli sta vicino si\nrizzano i capelli in testa."
        de:
          heart_gold: "Elektrizität bedeckt seinen Kör-\nper. Im Dunkeln erstrahlt es in\neinem bläulichen Ton."
          soul_silver: "Sein Körper entlädt sich ständig.\nKommt man ihm zu nahe, stehen einem\ndie Haare senkrecht vom Kopf ab."
        es:
          heart_gold: "Por la superficie de su piel corre\nla electricidad. En la oscuridad,\nsu cuerpo se torna blanquecino."
          soul_silver: "Su cuerpo descarga electricidad\nconstantemente. Si te acercas,\nte pondrá los pelos de punta."
        ko:
          heart_gold: "몸의 표면에는 전기가\n흐르고 있다. 주변이 어두우면\n전신이 푸르스름하게 빛난다."
          soul_silver: "전신에서 항상 전기가\n흐르고 있기 때문에 가까이 가면\n머리카락이 곤두서버린다."
magmar:
