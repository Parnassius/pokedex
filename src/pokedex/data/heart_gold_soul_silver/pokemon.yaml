wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    en: WOBBUFFET
    fr: QULBUTOKE
    it: WOBBUFFET
    de: WOINGENAU
    es: WOBBUFFET
    ko: 마자용
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      evs_yield:
        hp: 2
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - amorphous
      abilities:
        - shadow_tag
      descriptions:
        jp_kana:
          heart_gold: "ひかりや　ショックを　きらう。\nこうげきされると　からだが　ふくらみ\nはんげきが　きょうりょくに　なる。"
          soul_silver: "まっくろな　シッポを　かくすため\nくらやみで　ひっそりと　いきている。\nじぶんからは　こうげき　しない。"
        en:
          heart_gold: "It hates light and shock. If\nattacked, it inflates its body to\nbuild up its counterstrike."
          soul_silver: "To keep its pitch-black tail hidden,\nit lives quietly in the darkness.\nIt is never first to attack."
        fr:
          heart_gold: "Il déteste la lumière et les chocs.\nS’il est attaqué, il se gonflera\npour riposter violemment."
          soul_silver: "Pour cacher sa queue noire, il\nvit discrètement dans l’obscurité.\nIl n’attaque jamais le premier."
        it:
          heart_gold: "Odia la luce e gli shock. Se è\nattaccato, gonfia il corpo per\npreparare il contrattacco."
          soul_silver: "Se ne sta sempre tranquillo al buio\nper nascondere la coda nera come la\npece. Non attacca mai per primo."
        de:
          heart_gold: "Es hasst Licht und Schläge. Wird es\nangegriffen, pumpt es sich auf, um\neinen Gegenschlag vorzubereiten."
          soul_silver: "Es lebt in der Dunkelheit, um\nseinen schwarzen Schweif zu ver-\nstecken. Es greift nie zuerst an."
        es:
          heart_gold: "Odia la luz y las sacudidas. Si le\natacan, infla su cuerpo para\naumentar su contraataque."
          soul_silver: "Para mantener oculta su negra\ncola, vive en silencio en la\noscuridad. Nunca ataca primero."
        ko:
          heart_gold: "빛과 쇼크를 싫어한다.\n공격받으면 몸이 부풀어올라\n반격이 강력해진다."
          soul_silver: "새까만 꼬리를 숨기기 위해\n어둠 속에서 은밀히 지내고 있다.\n자신이 먼저 공격하는 일은 없다."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    en: GIRAFARIG
    fr: GIRAFARIG
    it: GIRAFARIG
    de: GIRAFARIG
    es: GIRAFARIG
    ko: 키링키
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - normal
        - psychic
      egg_groups:
        - field
      abilities:
        - inner_focus
        - early_bird
      held_items:
        rare: persim_berry
      descriptions:
        jp_kana:
          heart_gold: "シッポにも　ちいさな　のうがある。\nちかよると　においに　はんのうして\nかみついて　くるので　ちゅうい。"
          soul_silver: "シッポにも　ちいさな　のう　がある。\nにおいに　つられて　かってに\nシッポが　かみついてくることもある。"
        en:
          heart_gold: "Its tail has a small brain of its\nown. Beware! If you get close, it\nmay react to your scent by biting."
          soul_silver: "Its tail, which also contains a\nsmall brain, may bite on its own if\nit notices an alluring smell."
        fr:
          heart_gold: "Sa queue possède un cerveau.\nSi vous vous en approchez, elle\nvous sentira et vous mordra."
          soul_silver: "Sa queue, qui contient également\nun petit cerveau, peut mordre\nd’elle-même."
        it:
          heart_gold: "La coda possiede un cervello\nautonomo. Se ci si avvicina può\nfiutare la presenza e mordere."
          soul_silver: "La coda, provvista di un piccolo\ncervello, morde di propria volontà\nse avverte un profumo allettante."
        de:
          heart_gold: "Sein Schweif hat ein eigenes\nGehirn. Achtung! Kommst du ihm zu\nnahe, kann es dich riechen und beißt."
          soul_silver: "Sein Schweif, der auch ein Gehirn\nhat, beißt manchmal von alleine\nzu, wenn er einen Duft wahrnimmt."
        es:
          heart_gold: "Su cola tiene un pequeño cerebro.\n¡Cuidado! Si te acercas, puede\nreaccionar a tu olor y morder."
          soul_silver: "Su cola, que también tiene un\npequeño cerebro, muerde por su\ncuenta si nota un olor seductor."
        ko:
          heart_gold: "꼬리에도 작은 뇌가 있다.\n다가가면 냄새에 반응해서\n물어서 공격하므로 주의하자."
          soul_silver: "꼬리에도 작은 뇌가 있다.\n냄새에 이끌려서 맘대로\n꼬리가 달려든 적도 있다."
pineco:
