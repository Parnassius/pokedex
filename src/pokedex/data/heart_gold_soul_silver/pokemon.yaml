          soul_silver: "いつも　くちづけ　するかのように\nゆったりとした　リズムで\nくびを　ぜんごに　ゆらしている。"
        en:
          heart_gold: "Its lips are the most sensitive\npart of its body. It always uses\nits lips first to examine things."
          soul_silver: "It always rocks its head slowly\nbackwards and forwards as if it is\ntrying to kiss someone."
        fr:
          heart_gold: "Ses lèvres sont la partie la plus\nsensible de son corps. Il les\nutilise pour examiner les objets."
          soul_silver: "Il balance sa tête d’avant en\narrière et donne l’impression\nd’essayer d’embrasser quelqu’un."
        it:
          heart_gold: "Le labbra sono la parte più\nsensibile del corpo, il primo organo\ncon cui analizza nuovi oggetti."
          soul_silver: "Continua a muovere la testa avanti\ne indietro lentamente, come se\nprovasse a baciare qualcuno."
        de:
          heart_gold: "Die Lippen sind sein empfindlichster\nKörperteil. Neue Dinge untersucht\nes zuerst damit."
          soul_silver: "Es wippt mit dem Kopf langsam vor\nund zurück, als versuche es,\njemanden zu küssen."
        es:
          heart_gold: "Sus labios son la parte más\nsensible de su cuerpo. Siempre\nlos usa para examinar las cosas."
          soul_silver: "Siempre mueve la cabeza hacia\ndelante y hacia atrás como si\nquisiera besar a alguien."
        ko:
          heart_gold: "입술이 제일 민감하다.\n뭐든지 먼저 입술로 건드려서\n어떤 것인지 확인한다."
          soul_silver: "항상 뽀뽀를 하려는 듯이\n편안한 리듬으로\n목을 전후로 흔들고 있다."
elekid:
