          soul_silver: "はいごに　けはいを　かんじると\nダイヤモンドより　かたい　ひづめの\nうしろあしで　けりあげてしまう。"
        en:
          heart_gold: "It is a weak runner immediately\nafter birth. It gradually becomes\nfaster by chasing after its parents."
          soul_silver: "Its hind legs, which have hooves that\nare harder than diamond, kick back\nat any presence it senses behind it."
        fr:
          heart_gold: "A la naissance, il ne court pas très\nvite. Il devient de plus en plus\nrapide en courant après ses parents."
          soul_silver: "Ses pattes arrière ont des sabots\nplus solides que le diamant. Il rue\ndès qu’il sent une présence."
        it:
          heart_gold: "Appena nato non è un buon \ncorridore. Diventa sempre più\nveloce rincorrendo i suoi genitori."
          soul_silver: "I suoi arti posteriori hanno zoccoli\npiù duri del diamante. Se sente\nqualcuno dietro di sé, scalcia."
        de:
          heart_gold: "Nach der Geburt ist es noch lang-\nsam, aber es wird bald schneller,\nda es seinen Eltern nachrennt."
          soul_silver: "Es schlägt mit seinen Hinterläufen,\ndie härter als Diamant sind, aus,\nwenn es etwas hinter sich spürt."
        es:
          heart_gold: "Al nacer es un poco lento, pero\npoco a poco se vuelve más rápido\npara poder seguir a sus padres."
          soul_silver: "Sus patas traseras tienen pezuñas\ntan duras como el diamante, con las\nque da coces a quien está detrás."
        ko:
          heart_gold: "태어나서 바로는 잘 달리지 못한다.\n어미를 쫓아다니면서 점점\n빨리 달릴 수 있게 된다."
          soul_silver: "배후에서 이상한 기미를 느끼면\n뒷다리의 다이아몬드보다 단단한\n발굽으로 걷어차 버린다."
