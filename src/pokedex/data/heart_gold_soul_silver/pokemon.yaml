      descriptions:
        jp_kana:
          heart_gold: "ながい　たいもうに　おおわれて\nめのまえの　ようすが　わからず\nひたすらに　とっしんを　くりかえす。"
          soul_silver: "あいて　めがけて　とっしんするとき\nせなかの　たいもうが　さかだつ。\nおとに　ものすごく　びんかん。"
        en:
          heart_gold: "Because the long hair all over its\nbody obscures its sight, it just\nkeeps charging repeatedly."
          soul_silver: "If it charges at an enemy, the\nhairs on its back stand up straight.\nIt is very sensitive to sound."
        fr:
          heart_gold: "Ses yeux sont masqués par\nses longs poils. Il ne voit rien\net se déplace en chargeant."
          soul_silver: "S’il charge un ennemi, les poils\nde son dos se dressent. Il est\ntrès sensible au son."
        it:
          heart_gold: "Poiché il lungo pelo sul suo corpo\ngli impedisce di vedere, non fa che\ncaricare il nemico senza tregua."
          soul_silver: "Quando carica il nemico, i peli\ngli si rizzano sul dorso. È molto\nsensibile ai suoni."
        de:
          heart_gold: "Da sein haariges Fell seine Sicht\nenorm beeinträchtigt, greift es\nständig an, um den Gegner zu treffen."
          soul_silver: "Beim Angriff auf einen Gegner\nstellen sich seine Rückenhaare auf.\nEs hört außergewöhnlich gut."
        es:
          heart_gold: "Como su largo pelaje le impide\nver con claridad, sigue\natacando repetidamente."
          soul_silver: "Si carga contra un enemigo, los\npelos de su lomo se erizarán. Es\nmuy sensible al sonido."
        ko:
          heart_gold: "긴 털로 덮여 있어서\n눈앞의 상태를 모르고\n한결같이 돌진만을 반복한다."
          soul_silver: "상대를 목표로 삼고 돌진할 때\n등에 있는 털이 곤두선다.\n소리에 매우 민감하다."
corsola:
  species_id: 222
