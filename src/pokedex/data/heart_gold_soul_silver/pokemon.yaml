        jp_kana:
          heart_gold: "シッポを　たてて　すこしでも\nとおくの　ようすを　しらべている\nけいかいしんが　つよい　ポケモン。"
          soul_silver: "とおくまで　みれるように　シッポを\nつかってたつ。てきを　みつけると\nおおごえで　なかまに　しらせる。"
        en:
          heart_gold: "A very cautious Pokémon, it raises\nitself up using its tail to get a\nbetter view of its surroundings."
          soul_silver: "It stands on its tail so it can see\na long way. If it spots an enemy, it\ncries loudly to warn its kind."
        fr:
          heart_gold: "C’est un Pokémon très prudent.\nIl se dresse sur sa queue pour\nmieux observer les environs."
          soul_silver: "Il se tient dressé sur sa queue pour\nvoir les ennemis arriver de loin.\nA ce moment, il avertit ses amis."
        it:
          heart_gold: "Pokémon molto cauto. Si alza da terra\ncon la coda per scrutare i dintorni."
          soul_silver: "Ritto sulla coda, guarda lontano. Se\nnota un nemico lancia forti richiami\nper avvertire quelli della sua specie."
        de:
          heart_gold: "Ein sehr vorsichtiges Pokémon. Es\nstellt sich auf seinen Schweif, um\ndie Umgebung zu überblicken."
          soul_silver: "Es stellt sich auf den Schweif, um\nweiter zu blicken. Erspäht es einen\nFeind, schreit es laut auf."
        es:
          heart_gold: "Un Pokémon muy precavido. Se\nlevanta con su cola para tener\nuna mejor vista de los alrededores."
          soul_silver: "Se apoya sobre su cola para ver\na mucha distancia. Si divisa a un\nenemigo, dará la alarma a gritos."
        ko:
          heart_gold: "꼬리를 세워서 조금이라도\n먼 곳의 상태를 살피는\n경계심이 강한 포켓몬이다."
          soul_silver: "먼 곳까지 볼 수 있도록 꼬리를\n사용해서 선다. 상대를 발견하면\n큰 소리로 동료에게 알린다."
furret:
