      descriptions:
        jp_kana:
          heart_gold: "おおきく　からだを　ふくらませてから\nうたう　こもりうたは　いつもより\nながくて　ぜったいに　ねむくなる。"
          soul_silver: "つぶらな　ひとみを　みつめていると\nねむたくなるような　ここちよい\nうたを　うたいはじめる。"
        en:
          heart_gold: "If it inflates to sing a lullaby,\nit can perform longer and cause\nsure drowsiness in its audience."
          soul_silver: "Looking into its cute, round eyes\ncauses it to sing a relaxing melody,\ninducing its enemies to sleep."
        fr:
          heart_gold: "En se gonflant, il peut chanter\nune longue berceuse qui endort\ninévitablement ses adversaires."
          soul_silver: "Le regarder dans les yeux le pousse\nà chantonner une douce mélopée qui\nendort ses adversaires."
        it:
          heart_gold: "Se si gonfia e usa il suo Canto\ndiventa più resistente e causa una\nforte sonnolenza in chi lo ascolta."
          soul_silver: "Se lo si fissa nei dolci occhi tondi\nintona una melodia rilassante che\nspinge i nemici ad addormentarsi."
        de:
          heart_gold: "Wenn es Gesang einsetzt, steigt\nseine Ausdauer und seine Zuhörer\nwerden in Tiefschlaf versetzt."
          soul_silver: "Schaut man ihm in seine niedlichen\nKulleraugen, beginnt es zu singen\nund seine Gegner schlafen ein."
        es:
          heart_gold: "Si se hincha para cantar una nana,\ncantará más tiempo, y podría\ncausar sopor en el público."
          soul_silver: "Si le miras a sus bonitos y redondos\nojos, cantará una relajante melodía\ncon la que duerme al enemigo."
        ko:
          heart_gold: "크게 몸을 부풀려\n노래하는 자장가는 평소보다\n길어서 반드시 잠이 온다."
          soul_silver: "동그랗고 귀여운 눈동자를 쳐다보면\n잠이 올 것 같이 기분 좋은\n노래를 부르기 시작한다."
wigglytuff:
  species_id: 40
  names:
    jp_kana: プクリン
