          soul_silver: "くびのまわりの　ふかふかした\nたいもうを　ひろげ　９００どまで\nあがった　たいおんを　さましている。"
        en:
          heart_gold: "It stores some of the air it inhales in\nits internal flame pouch, which heats it\nto over 3,000 degrees Fahrenheit."
          soul_silver: "It fluffs out its fur collar to cool down\nits body temperature, which can reach\n1,650 degrees Fahrenheit."
        fr:
          heart_gold: "Il stocke de l’air dans sa poche\nde flammes et le chauffe à une\ntempérature de 1 700 °C."
          soul_silver: "Il ébouriffe sa collerette pour\nabaisser sa température qui peut\navoisiner les 900 °C."
        it:
          heart_gold: "Immagazzina parte dell’aria che\ninala in una tasca ardente interna,\nche arriva fino a 1700ºC."
          soul_silver: "Arruffa il folto pelo intorno\nal collo per raffreddare il corpo\nche può raggiungere i 900ºC."
        de:
          heart_gold: "Es speichert einen Teil seiner\nAtemluft in seinem Körper und\nerhitzt sie auf bis zu 1 700 Grad."
          soul_silver: "Es fährt seinen Pelzkragen aus,\num seine Körpertemperatur, die\nbis 900 Grad beträgt, abzukühlen."
        es:
          heart_gold: "Almacena parte del aire que inhala\nen su bolsa interior, que llega a\ncalentarse a más de 1700 grados."
          soul_silver: "Ahueca el pelaje de su cuello para\nbajar la temperatura de su cuerpo,\nque puede llegar a 900°."
        ko:
          heart_gold: "들이마신 공기 일부는\n체내의 불꽃 주머니로 보내져\n1700도의 불꽃이 된다."
          soul_silver: "목 주위의 푹신푹신한\n털을 펼쳐 900도까지\n올라간 체온을 식히고 있다."
porygon:
