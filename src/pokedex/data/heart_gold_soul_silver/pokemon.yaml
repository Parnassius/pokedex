          soul_silver: "かっぱつで　あそびずきな　せいかく。\nなついてくれるので　いっしょに\nあそびたがる　じょせいも　おおい。"
        en:
          heart_gold: "Although it looks frightening, it\nis actually kind and affectionate.\nIt is very popular among women."
          soul_silver: "It has an active, playful nature.\nMany women like to frolic with it\nbecause of its affectionate ways."
        fr:
          heart_gold: "Malgré son air menaçant, il est\ngentil et très affectueux. Il est\ntrès populaire chez les femmes."
          soul_silver: "Il est d’une nature joviale. De\nnombreuses femmes l’apprécient\npour sa gentillesse."
        it:
          heart_gold: "Nonostante l’aspetto spaventoso\nè in realtà dolce e affettuoso.\nÈ molto popolare tra le donne."
          soul_silver: "Ha uno spirito attivo e giocoso.\nA molti piace giocherellare con lui\nper i suoi modi affettuosi."
        de:
          heart_gold: "Obwohl es angsteinflößend\naussieht, ist es sehr liebevoll\nund bei Frauen sehr beliebt."
          soul_silver: "Es ist von Natur aus verspielt.\nEs tollt mit vielen Frauen herum,\nda es ihnen zugeneigt ist."
        es:
          heart_gold: "Aunque parezca aterrador, en\nrealidad es amable y afectuoso. Es\nmuy popular entre las mujeres."
          soul_silver: "Muy travieso por naturaleza,\na muchas mujeres les gusta jugar\ncon él porque es muy cariñoso."
        ko:
          heart_gold: "무서운 얼굴 생김새지만 마음은\n매우 상냥해서 여성에게도\n아주 인기있는 포켓몬이다."
          soul_silver: "활발하고 노는 것을 좋아하는 성격.\n잘 따르기 때문에 함께\n놀고 싶어하는 여성들이 많다."
