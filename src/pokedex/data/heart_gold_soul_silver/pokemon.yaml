          heart_gold: "よるになると　からだの　ちゅうしんが\nひとの　こどうと　おなじリズムで\nゆっくりと　てんめつする。"
          soul_silver: "からだの　ちゅうしんで　ひかる\nコアが　あるかぎり　からだが\nちぎれても　さいせい　できる。"
        en:
          heart_gold: "At night, the middle of its body\nslowly flickers with the same\nrhythm as a human heartbeat."
          soul_silver: "Even if its body is torn, it can\nregenerate as long as the glowing\ncentral core remains intact."
        fr:
          heart_gold: "La nuit, le centre de son corps\német des pulsations au même\nrythme que le cœur des humains."
          soul_silver: "Même si son corps est détruit, il\npeut se régénérer aussi longtemps\nque son cœur est en bon état."
        it:
          heart_gold: "Di notte il centro del suo corpo\npulsa continuamente allo stesso\nritmo del cuore umano."
          soul_silver: "Anche se il corpo è lacerato, continua\na rigenerarsi finché il nucleo ardente\ncentrale rimane intatto."
        de:
          heart_gold: "Nachts blinkt die Mitte seines\nKörpers im selben Rhythmus wie\ndas menschliche Herz."
          soul_silver: "Auch wenn sein Körper nicht mehr\nintakt ist, kann es sich regenerie-\nren, wenn der Kern leuchtet."
        es:
          heart_gold: "De noche, la parte central de su\ncuerpo parpadea al ritmo del\nlatido cardíaco de los humanos."
          soul_silver: "Aunque sus brazos se rompan\npodrán regenerarse, siempre y\ncuando su núcleo siga intacto."
        ko:
          heart_gold: "밤이 되면 몸의 중심이\n사람들의 고동과 같은 리듬으로\n천천히 반짝거린다."
          soul_silver: "몸의 중심에서 빛나는\n핵이 있는 한 몸이\n찢겨나가도 재생할 수 있다."
starmie:
