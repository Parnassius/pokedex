      descriptions:
        jp_kana:
          heart_gold: "ハネッコどうし　あつまって　かぜに\nふきとばされないように　している。\nでも　そよかぜに　ふかれるのはすき。"
          soul_silver: "とても　かるい　からだ。\nふきとばされないよう　しっかり\nじめんを　ふみしめている。"
        en:
          heart_gold: "To keep from being blown away by\nthe wind, they gather in clusters.\nBut they do enjoy gentle breezes."
          soul_silver: "Its body is so light, it must\ngrip the ground firmly with its\nfeet to keep from being blown away."
        fr:
          heart_gold: "Pour éviter d’être balayés par les\nvents, ils se rassemblent en groupes.\nIls adorent flotter dans la brise."
          soul_silver: "Son corps est si léger qu’il doit\ns’agripper au sol pour éviter de\ns’envoler les jours de brise."
        it:
          heart_gold: "Si stringono l’uno accanto all’altro\nper resistere al vento. Tuttavia,\namano la brezza leggera."
          soul_silver: "Ha un corpo così leggero che deve\naggrapparsi saldamente al suolo\nper non volare via."
        de:
          heart_gold: "Um nicht vom Wind davongeweht zu\nwerden, treten sie stets in Gruppen\nauf. Eine Brise gefällt ihnen."
          soul_silver: "Sein Körper ist so leicht, dass es\nseine Füße im Boden verankert, da-\nmit es nicht davongeweht wird."
        es:
          heart_gold: "Para evitar ser llevados por el\nviento, se reúnen en grupos,\naunque adoran las suaves brisas."
          soul_silver: "Su cuerpo es tan ligero, que debe\nagarrarse bien al suelo con las\npatas para no irse con el viento."
        ko:
          heart_gold: "통통코끼리 모여 바람에\n날아가지 않도록 하고 있다.\n단 산들바람에 날리는 것은 좋아한다."
          soul_silver: "매우 가벼운 몸을 가졌다.\n바람에 날아가지 않도록 단단히\n지면을 밟아 지탱하고 있다."
skiploom:
  species_id: 188
  names:
    jp_kana: ポポッコ
    en: SKIPLOOM
    fr: FLORAVOL
    it: SKIPLOOM
    de: HUBELUPF
    es: SKIPLOOM
