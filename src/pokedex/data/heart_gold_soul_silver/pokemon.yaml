      descriptions:
        jp_kana:
          heart_gold: "どんどん　そだっては　はえかわる\nあたまの　さきは　きれいなので\nたからもの　として　にんきがたかい。"
          soul_silver: "みなみの　うみの　くにでは\nサニーゴの　しゅうだんの　うえで\nひとびとが　せいかつ　している。"
        en:
          heart_gold: "It continuously sheds and grows.\nThe tip of its head is prized as\na treasure because of its beauty."
          soul_silver: "In a south-sea nation, the people\nlive in communities that are\nbuilt on groups of these Pokémon."
        fr:
          heart_gold: "Il grandit en permanence. Les\nexquises excroissances de sa\ntête sont très recherchées."
          soul_silver: "Dans les îles du sud, des\ncommunautés se sont formées\nsur le dos de tels Pokémon."
        it:
          heart_gold: "Muta la pelle e cresce di continuo.\nLa punta che ha sul capo è un\nsimbolo della sua bellezza."
          soul_silver: "A sud, vi è un popolo di mare che vive\nin comunità fondate su questo tipo\ndi Pokémon."
        de:
          heart_gold: "Es häutet sich ständig und wächst.\nSeine Kopfspitze wurde als Schatz\nder Schönheit ausgezeichnet."
          soul_silver: "Sie schließen sich in Gruppen zu-\nsammen und bilden Inseln, auf denen\nim Südmeer Menschen leben."
        es:
          heart_gold: "Crece y muda continuamente.\nLa parte superior de su cabeza es\nmuy apreciada por su belleza."
          soul_silver: "En un país costero del sur,\nla gente vive en comunidades\nsobre grupos de este Pokémon."
        ko:
          heart_gold: "점점 자라면서 다시 돋아나는\n머리의 끝이 아름다워\n보물로서 인기가 많다."
          soul_silver: "남쪽 바다의 나라에서는\n코산호의 집단 위에서\n사람들이 생활하고 있다."
remoraid:
  species_id: 223
  names:
