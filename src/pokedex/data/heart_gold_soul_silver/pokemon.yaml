          soul_silver: "くうきの　ながれを　よみとることで\nこれからの　てんきや　あいての\nうごきなどを　すべて　あててしまう。"
        en:
          heart_gold: "It uses the fine hair that covers\nits body to sense air currents and\npredict its enemy’s actions."
          soul_silver: "By reading air currents, it can\npredict things such as the weather\nor its foe’s next move."
        fr:
          heart_gold: "Son fin pelage enregistre les\ncourants d’air provoqués par les\ndéplacements de ses ennemis."
          soul_silver: "En analysant les courants aériens,\nil peut prédire le climat ou même\nles mouvements de son adversaire."
        it:
          heart_gold: "Il pelo sottile che ricopre il suo\ncorpo analizza le correnti d’aria\ne predice le mosse del nemico."
          soul_silver: "Analizza le correnti d’aria per predire\nle condizioni atmosferiche o la\nprossima mossa del nemico."
        de:
          heart_gold: "Mit seinen Körperhaaren nimmt es\nLuftströmungen wahr. Dadurch sagt\nes gegnerische Attacken voraus."
          soul_silver: "Es liest die Luftströmungen und\nkann dadurch das Wetter oder den\nAngriff des Gegners vorhersehen."
        es:
          heart_gold: "Usa el corto pelaje que cubre\nsu cuerpo para sentir el viento\ny predecir las acciones enemigas."
          soul_silver: "Basándose en las corrientes de\naire predice cosas como el clima o\nel próximo ataque del enemigo."
        ko:
          heart_gold: "전신의 세밀한 털로\n공기의 흐름을 감지해\n상대방의 행동을 예측한다."
          soul_silver: "공기의 흐름을 읽어내서\n앞으로의 날씨와 상대의\n움직임 등을 모두 맞혀버린다."
umbreon:
  species_id: 197
  names:
    jp_kana: ブラッキー
    en: UMBREON
    fr: NOCTALI
    it: UMBREON
    de: NACHTARA
    es: UMBREON
    ko: 블래키
  forms:
    umbreon:
      form_id: 0
      base_stats:
        hp: 95
        attack: 65
        defense: 110
        special_attack: 60
        special_defense: 130
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - dark
      egg_groups:
        - field
      abilities:
        - synchronize
        - synchronize
      descriptions:
        jp_kana:
          heart_gold: "こうふんすると　からだじゅうの\nけあなから　どくその　まじった\nあせを　ふきとばし　みをまもる。"
          soul_silver: "ちかよるものを　おそれさせるため\nからだの　わっかもようは\nくらくなると　しぜんにひかりだす。"
        en:
          heart_gold: "When agitated, this Pokémon\nprotects itself by spraying\npoisonous sweat from its pores."
          soul_silver: "When darkness falls, the rings\non the body begin to glow, striking\nfear in the hearts of anyone nearby."
        fr:
          heart_gold: "Pour se défendre, ce Pokémon\német un gaz empoisonné par\nles pores de sa peau."
          soul_silver: "Quand la nuit tombe, les anneaux\nsur son corps se mettent à luire,\nterrorisant tout ce qui est proche."
        it:
          heart_gold: "Quando è nervoso, questo Pokémon\nsi difende spruzzando sudore\nvelenoso dai suoi pori."
          soul_silver: "Nell’oscurità, gli anelli sul suo\ncorpo brillano, terrorizzando chi\nsi trova nelle vicinanze."
        de:
          heart_gold: "Fühlt es sich bedroht, sondert es\ntödlichen Giftschweiß aus seinen\nPoren ab, um sich zu schützen."
          soul_silver: "Bei Einbruch der Dunkelheit leuch-\nten die Ringe auf seinem Körper und\nverängstigen alle in seiner Nähe."
        es:
          heart_gold: "Cuando se siente amenazado, este\nPokémon se protege lanzando sudor\nvenenoso por todos sus poros."
          soul_silver: "Cuando oscurece, los anillos de su\ncuerpo comienzan a brillar, asustando\na cualquiera que se acerque."
        ko:
          heart_gold: "흥분하면 몸 전체의\n모공에서 독소가 섞인\n땀을 날려 몸을 보호한다."
          soul_silver: "접근하는 무리에게 겁을 주기 위해\n몸에 있는 고리 모양의 문양은\n어두워지면 자연적으로 빛을 낸다."
murkrow:
  species_id: 198
  names:
    jp_kana: ヤミカラス
    en: MURKROW
    fr: CORNEBRE
    it: MURKROW
    de: KRAMURX
    es: MURKROW
    ko: 니로우
  forms:
    murkrow:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 42
        special_attack: 85
        special_defense: 42
        speed: 91
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - flying
      egg_groups:
        - flying
      abilities:
        - insomnia
        - super_luck
      descriptions:
        jp_kana:
          heart_gold: "よる　すがたを　みかけると\nふきつなことが　おきると　しんじられ\nいみきらわれている　ポケモン。"
          soul_silver: "おいかけてくるものが　いると\nくらい　やまみちに　さそいこみ\nさんざん　まよわせるという。"
        en:
          heart_gold: "Feared and loathed by many,\nit is believed to bring misfortune to\nall those who see it at night."
          soul_silver: "It is said that when chased, it\nlures its attacker onto dark mountain\ntrails where the foe will get lost."
        fr:
          heart_gold: "Craint et peu aimé, il paraît\nqu’il porte malheur à ceux qui\ncroisent son chemin la nuit."
          soul_silver: "Il paraît qu’une fois pourchassé,\nil attire son ennemi dans la\nmontagne où il se perdra."
        it:
          heart_gold: "Molti lo temono e lo detestano\ncredendo che porti sfortuna a\ncoloro che lo vedono di notte."
          soul_silver: "Si dice che quando è inseguito\nattiri il nemico verso montagne\nbuie per farlo perdere."
        de:
          heart_gold: "Viele verabscheuen und hassen es,\nda sie glauben, es bringe Verderben,\nwenn sie ihm nachts begegnen."
          soul_silver: "Wird es von einem Gegner verfolgt,\nlockt es ihn auf dunkle Bergpfade,\nwo sein Gegner sich verläuft."
        es:
          heart_gold: "Temido y odiado por muchos, dicen\nque trae la desgracia a todos\naquellos que lo ven por la noche."
          soul_silver: "Dicen que al ser perseguido, atrae\nal atacante hacia los caminos de la\noscura montaña, donde se perderá."
        ko:
          heart_gold: "밤에 모습을 발견하면\n불길한 일이 생긴다고 여겨져\n몹시 미움받는 포켓몬이다."
          soul_silver: "따라오는 자가 있으면\n어둠의 산길로 끌어들여\n호되게 혼을 빼놓는다."
slowking:
  species_id: 199
  names:
    jp_kana: ヤドキング
    en: SLOWKING
    fr: ROIGADA
    it: SLOWKING
    de: LASCHOKING
    es: SLOWKING
    ko: 야도킹
  forms:
    slowking:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 80
        special_attack: 100
        special_defense: 110
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 3
        speed: 0
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      abilities:
        - oblivious
        - own_tempo
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          heart_gold: "すごい　ちせいと　ひらめきを\nもっている。どんなときでも　あわてず\nさわがず　のんびりとしている。"
          soul_silver: "かまれたとき　あたまに　しみこんだ\nどくそに　よって　ただならない\nのうりょくに　めざめた　ヤドン。"
        en:
          heart_gold: "It has incredible intellect and\nintuition. Whatever the situation,\nit remains calm and collected."
          soul_silver: "When its head was bitten, toxins\nentered SLOWPOKE’s head and unlocked\nan extraordinary power."
        fr:
          heart_gold: "D’une grande intelligence,\nil sait rester calme, même\nen situation stressante."
          soul_silver: "Une fois sa tête mordue, des\ntoxines ont envahi RAMOLOSS et lui\nont conféré des pouvoirs immenses."
        it:
          heart_gold: "Dotato di incredibile intelligenza\ne intuito, sa restare calmo e\npadrone di sé in ogni situazione."
          soul_silver: "Quando la testa di SLOWPOKE fu\nmorsa, vi penetrarono delle tossine\nche produssero un enorme potere."
        de:
          heart_gold: "Sein feines Gespür und Intellekt\nzeichnen es aus. Es bleibt in jeder\nSituation gelassen und besonnen."
          soul_silver: "Als FLEGMON in den Kopf gebissen\nwurde, floss Gift in seinen Kopf und\nsetzte eine gewaltige Kraft frei."
        es:
          heart_gold: "Su intelecto e intuición son\nincreíbles. No pierde la\ncompostura en ninguna situación."
          soul_silver: "Al ser mordido en la cabeza,\nSLOWPOKE absorbió unas toxinas\nque liberaron su oculto poder."
        ko:
          heart_gold: "대단한 지성과 번뜩임을\n가지고 있다. 어떤 때라도 당황하거나\n소란피우지 않고 느긋하게 있다."
          soul_silver: "물렸을 때 머리에 깊게 스며든\n독소에 의해 심상치 않은\n능력에 눈을 뜬 야돈이다."
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    en: MISDREAVUS
    fr: FEUFOREVE
    it: MISDREAVUS
    de: TRAUNFUGIL
    es: MISDREAVUS
    ko: 무우마
