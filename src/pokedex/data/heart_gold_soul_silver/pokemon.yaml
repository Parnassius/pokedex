        jp_kana:
          heart_gold: "からだを　くねらせ　よじらせ\nちちゅうを　ほりすすむ　おとは\nはるか　とおくまで　なりひびく。"
          soul_silver: "おおきく　じょうぶな　からだを\nくねらせ　よじらせ　じそく８０キロで\nじめんを　いきおいよく　ほりすすむ。"
        en:
          heart_gold: "It twists and squirms through\nthe ground. The thunderous roar of\nits tunneling echoes a long way."
          soul_silver: "It rapidly bores through the ground\nat 50 mph by squirming and\ntwisting its massive, rugged body."
        fr:
          heart_gold: "Il se trémousse et se convulse dans\nle sol. Le son qu’il produit en\ncreusant la terre résonne très loin."
          soul_silver: "Il creuse dans le sol à une vitesse\nde 80 km/h en contorsionnant son\nimmense corps de pierre."
        it:
          heart_gold: "Si contorce e si dimena attraverso\nil terreno. Il cupo boato del suo\nscavare giunge molto lontano."
          soul_silver: "Si fa strada nel terreno fino ad\n80 km/h contorcendosi e agitando\nil corpo grande e possente."
        de:
          heart_gold: "Es gräbt sich durchs Erdreich. Das\nlaute Bohren, wenn es einen Tunnel\ngräbt, ist von Weitem zu hören."
          soul_silver: "Es bohrt sich mit 80 km/h durch das\nErdreich, indem es seinen massiven,\nrauen Körper dreht und windet."
        es:
          heart_gold: "Gira y se retuerce bajo la tierra.\nEl atronador rugido de su\nexcavación resuena a lo lejos."
          soul_silver: "Perfora el suelo rápidamente, a\n80 km/h, girando y retorciendo\nsu robusto y enorme cuerpo."
        ko:
          heart_gold: "몸을 구부리고 비틀어서\n땅속을 파고 지나가는 소리는\n아주 먼 곳까지 울려 퍼진다."
          soul_silver: "크고 튼튼한 몸을\n뒤틀고 꽈서 시속 80km로\n땅을 기세 좋게 파나간다."
drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
    en: DROWZEE
    fr: SOPORIFIK
    it: DROWZEE
    de: TRAUMATO
    es: DROWZEE
    ko: 슬리프
  forms:
    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
        defense: 45
        special_attack: 43
        special_defense: 90
