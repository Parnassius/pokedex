        it:
          heart_gold: "Dal suo collo si spande un profumo\ndi spezie, che spinge alla lotta\nchi lo avverte."
          soul_silver: "Dal suo collo si propaga un profumo\nvivace. Esso stimola il recupero della\nsalute."
        de:
          heart_gold: "Die Blätter um seinen Hals verbrei-\nten einen würzigen Duft, der beim\nEinatmen den Kampfgeist anregt."
          soul_silver: "Ein würziges Aroma geht von seinen\nBlättern aus. Das Aroma soll\ngesundheitsfördernd sein."
        es:
          heart_gold: "Su cuello huele a especias. Dicen\nque, por alguna razón, su simple\nolor te incita a luchar."
          soul_silver: "Emana un aroma picante de su\ncuello. El aroma actúa como\nestimulante para recuperar salud."
        ko:
          heart_gold: "목 주변에서 나는\n향긋한 향기를 맡으면\n왠지 싸우고 싶어진다."
          soul_silver: "목 주변에서 발산하는\n향신료 같은 향기에는\n힘을 내도록 하는 효과가 있다."
