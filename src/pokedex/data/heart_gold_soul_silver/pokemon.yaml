          soul_silver: "もともと　かんかくが　にぶかったが\nシェルダーの　どくそが　しみこみ\nいたさを　かんじなくなった。"
        en:
          heart_gold: "If the tail-biting SHELLDER is thrown\noff in a harsh battle, it reverts to\nbeing an ordinary SLOWPOKE."
          soul_silver: "Naturally dull to begin with, it\nlost its ability to feel pain due\nto SHELLDER’s seeping poison."
        fr:
          heart_gold: "Si pendant un combat le KOKIYAS\naccroché à sa queue est arraché,\nil redevient un RAMOLOSS."
          soul_silver: "D’une nature assez léthargique, il\nne ressent plus la douleur à cause\ndu poison injecté par le KOKIYAS."
        it:
          heart_gold: "Se combattendo perde lo SHELLDER\nche gli morde la coda, si trasforma\nin un comune SLOWPOKE."
          soul_silver: "Di natura piuttosto ottusa, ha perso\nla sensibilità al dolore a causa del\nveleno di uno SHELLDER."
        de:
          heart_gold: "Wenn das MUSCHAS an seinem Schweif\nin einem Kampf abgeschüttelt wird,\nentwickelt es sich in FLEGMON zurück."
          soul_silver: "Von Natur aus lahm, hat es auf-\ngrund von MUSCHAS betäubendem Gift\nsein Schmerzempfinden verloren."
        es:
          heart_gold: "Si el SHELLDER que muerde su cola\nse desprende durante una lucha, se\nconvertirá en un simple SLOWPOKE."
          soul_silver: "Algo torpe por naturaleza, ha\ndejado de sentir dolor por\nel veneno de SHELLDER."
        ko:
          heart_gold: "격한 싸움에서 꼬리를\n물고 있는 셀러가 떨어지면\n원래의 야돈으로 돌아간다."
          soul_silver: "원래부터 감각이 둔했었지만\n셀러의 독소가 퍼져\n아픔을 느끼지 못하게 되었다."
magnemite:
