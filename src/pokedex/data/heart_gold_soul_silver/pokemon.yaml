        jp_kana:
          heart_gold: "なきごえが　ひびきわたると\nあちこちから　ニョロモや\nニョロゾたちが　あつまってくる。"
          soul_silver: "３ひき　いじょう　ニョロトノが\nあつまると　かならず　どなるような\nなきごえで　がっしょうを　はじめる。"
        en:
          heart_gold: "If POLIWAG and POLIWHIRL hear its\nechoing cry, they respond by\ngathering from far and wide."
          soul_silver: "Whenever three or more of these get\ntogether, they sing in a loud\nvoice that sounds like bellowing."
        fr:
          heart_gold: "Si PTITARD et TETARTE entendent\nson cri, ils se rassemblent pour\nvenir le rencontrer."
          soul_silver: "Quand trois ou plus se réunissent,\nils chantent d’une même voix\nressemblant à un beuglement."
        it:
          heart_gold: "Se i POLIWAG o i POLIWHIRL odono\nil suo verso rimbombante si\nradunano anche da enormi distanze."
          soul_silver: "Quando tre o più POLITOED si trovano\ninsieme, iniziano a cantare ad alta voce,\nproducendo una sorta di gracchio."
        de:
          heart_gold: "Hören QUAPSEL und QUAPUTZI seinen\nRuf, antworten sie, indem sie sich\nvon nah und fern versammeln."
          soul_silver: "Sind drei oder mehr von ihnen zu-\nsammen, singen sie so laut, dass man\nan Hundegebell erinnert wird."
        es:
          heart_gold: "Si POLIWAG y POLIWHIRL oyen su\nllanto, acudirán de todas partes\npara consolarlo."
          soul_silver: "Cuando tres o más de estos se\njuntan, emiten un sonido muy\nfuerte parecido a un bramido."
        ko:
          heart_gold: "울음소리가 울려 퍼지면\n여기저기에서 발챙이와\n슈륙챙이들이 모인다."
          soul_silver: "3마리 이상 왕구리가\n모이면 반드시 고함치는 듯한\n울음소리로 합창하기 시작한다."
hoppip:
  species_id: 187
