        jp_kana:
          heart_gold: "せなかの　つばさに　つきのひかりを\nあつめることで　くうちゅうに\nうかぶことが　できるらしい。"
          soul_silver: "あいくるしい　しぐさと　なきごえで\nかわいいと　だいにんきの　ポケモン。\nだが　めったに　みつからない。"
        en:
          heart_gold: "The moonlight that it stores in the\nwings on its back apparently gives\nit the ability to float in midair."
          soul_silver: "Its adorable behavior and cry\nmake it highly popular. However,\nthis cute Pokémon is rarely found."
        fr:
          heart_gold: "La lumière de la lune qu’il emmagasine\ndans ses ailes dorsales lui permet de\nflotter dans les airs."
          soul_silver: "Son comportement adorable le rend\ntrès populaire. Malheureusement,\nil est très, très rare."
        it:
          heart_gold: "Sembra che la luce lunare che\nraccoglie nelle ali sul dorso gli\npermetta di volare a mezz’aria."
          soul_silver: "Il suo verso e il comportamento lo\nrendono molto popolare, anche se\nquesto dolce Pokémon è raro."
        de:
          heart_gold: "Aufgrund des gespeicherten Mond-\nlichts in seinen Flügeln auf dem\nRücken kann es in der Luft schweben."
          soul_silver: "Aufgrund seines freundlichen Ver-\nhaltens ist es sehr beliebt. Dieses\nPokémon ist jedoch selten."
        es:
          heart_gold: "La luz de luna que guarda en las\nalas de su lomo parece darle\nla habilidad de flotar en el aire."
          soul_silver: "Su adorable grito y comportamiento\nlo hacen muy popular. Sin embargo,\nes muy raro de encontrar."
        ko:
          heart_gold: "등의 날개에 달빛을\n모으면 공중에\n떠오를 수 있다는 듯하다."
          soul_silver: "애교 있는 몸동작과 울음소리로\n귀엽다고 많은 인기를 누리는 포켓몬.\n그러나 좀처럼 눈에 띄지 않는다."
clefable:
