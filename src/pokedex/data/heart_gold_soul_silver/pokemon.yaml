        - steadfast
      descriptions:
        jp_kana:
          heart_gold: "いつでも　げんきいっぱい。\nつよくなるため　まけても　まけても\nあいてに　たちむかっていく。"
          soul_silver: "てごろな　あいてを　みつけると\nすぐに　なぐりかかってくるので\nちいさくても　ゆだんならない。"
        en:
          heart_gold: "It is always bursting with energy.\nTo make itself stronger, it\nkeeps on fighting even if it loses."
          soul_silver: "Even though it is small, it can’t be\nignored because it will slug any\nhandy target without warning."
        fr:
          heart_gold: "Il est plein d’énergie. Il se\nbat tout le temps pour être plus\nfort, quitte à perdre un combat."
          soul_silver: "Même petit, il ne vaut mieux\npas l’ignorer: il frappe fort\net souvent sans prévenir."
        it:
          heart_gold: "Sempre traboccante di energia.\nPer rinforzarsi continua a\ncombattere anche dopo aver perso."
          soul_silver: "Pur essendo piccolo, non passa\ninosservato: colpisce senza preavviso\nqualsiasi oggetto nelle vicinanze."
        de:
          heart_gold: "Es strotzt vor Energie. Um noch\nstärker zu werden, kämpft es\nweiter, auch wenn es verloren hat."
          soul_silver: "Es ist zwar nicht groß, aber dennoch\nunübersehbar, denn es schlägt\njederzeit ohne Vorwarnung zu."
        es:
          heart_gold: "Ataca siempre con mucha energía.\nPara fortalecerse a sí mismo, sigue\nluchando aunque pierda."
          soul_silver: "Aunque es pequeño, es mejor no\nignorarlo porque atacará cualquier\nobjetivo sin previo aviso."
        ko:
          heart_gold: "항상 기운이 넘친다.\n강해지기 위해 계속 져도\n상대에게 맞선다."
          soul_silver: "만만한 상대를 발견하면\n바로 공격해오기 때문에\n몸집이 작아도 방심은 할 수 없다."
