        it:
          heart_gold: "Si dice che riposi sempre sul\nfondo del mare perché la sua\nforza è troppo elevata."
          soul_silver: "Viene definito il guardiano dei\nmari. Si dice che sia stato visto\nnelle notti di tempesta."
        de:
          heart_gold: "Man sagt, dass es sich meist ruhig\nam Meeresboden aufhält, um seine\nKräfte im Zaum zu halten."
          soul_silver: "Man berichtet, es sei der Wächter\nder Meere und man habe es im Herzen\neines tosenden Sturmes gesehen."
        es:
          heart_gold: "Dicen que permanece en\nsilencio en el fondo del mar\ndebido a su inmenso poder."
          soul_silver: "Dicen que es el guardián de los\nmares. Hay rumores de que fue\nvisto en una noche de tormenta."
        ko:
          heart_gold: "매우 강한 능력을 가졌기 때문에\n깊은 바다 밑에서 조용히\n시간을 보낸다고 전해진다."
          soul_silver: "바다의 신이라고 전해지는\n포켓몬이다. 폭풍 치는 밤에 모습을\n봤다는 이야기가 전해져온다."
