        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - flying
      egg_groups:
        - flying
      abilities:
        - keen_eye
        - sturdy
      descriptions:
        jp_kana:
          heart_gold: "じょうぶな　ハネは　おもそうだが\nホネのなかは　くうどうで　かるく\nじゆうに　おおぞらを　とびまわる。"
          soul_silver: "いばらの　なかに　すをつくる。\nトゲで　きずつきながら　そだてられた\nヒナの　ハネは　かたくなる。"
        en:
          heart_gold: "Its sturdy wings look heavy, but\nthey are actually hollow and light,\nallowing it to fly freely in the sky."
          soul_silver: "After nesting in bramble bushes,\nthe wings of its chicks grow hard\nfrom scratches by thorns."
        fr:
          heart_gold: "Ses ailes sont en fait légères et\ncreuses. Il vole facilement et peut\natteindre de très hautes altitudes."
          soul_silver: "Après avoir fait son nid dans les\nronces, ses petits s’endurcissent à\nforce d’être sans cesse éraflés."
        it:
          heart_gold: "Le imponenti ali sembrano pesanti,\nma in realtà sono vuote e leggere,\ne lo fanno volare libero nel cielo."
          soul_silver: "Facendo il nido tra i rovi, le ali\ndei suoi piccoli si rinforzano\nper i graffi causati dalle spine."
        de:
          heart_gold: "Seine robusten Flügel scheinen\nschwer zu sein. Aber sie sind hohl\nund es kann frei emporfliegen."
          soul_silver: "Die dornigen Zweige seines\nNests bewirken, dass die Flügel\nseiner Jungen fest und hart werden."
        es:
          heart_gold: "Sus fuertes alas parecen pesadas,\naunque son huecas y ligeras,\ny le permiten volar libremente."
          soul_silver: "Después de anidar en zarzas,\nlas alas de sus polluelos crecen\nfortalecidas por los rasguños."
        ko:
          heart_gold: "튼튼한 날개가 무거워 보이지만\n뼛속은 비어 있어서 가벼우므로\n자유롭게 파란 하늘을 날아다닌다."
          soul_silver: "가시나무 안에 둥지를 만든다.\n가시에 상처를 입어가며 자라난\n새끼들의 날개는 단단해진다."
houndour:
