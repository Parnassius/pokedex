          soul_silver: "イワークが　１００ねん　いじょう\nいきると　からだの　せいぶんが\nダイヤのように　へんかする　という。"
        en:
          heart_gold: "Its body has been compressed deep\nunder the ground. As a result,\nit is even harder than a diamond."
          soul_silver: "It’s said that if an ONIX lives for 100\nyears, its composition becomes\ndiamondlike as it evolves into a STEELIX."
        fr:
          heart_gold: "Son corps a été compressé sous\nla terre. Il est devenu plus\nrésistant que le diamant."
          soul_silver: "On raconte qu’il s’agit d’un ONIX\nde plus de 100 ans dont le corps\nest devenu comme du diamant."
        it:
          heart_gold: "Il suo corpo, pressato a grandissime\nprofondità, è diventato più duro\ndel diamante."
          soul_silver: "Un ONIX vissuto più di 100 anni.\nIl suo corpo ha cambiato composizione\ned è diventato duro come il diamante."
        de:
          heart_gold: "Es wurde tief in der Erde derartig\nzusammengestaucht, dass sein\nKörper härter als ein Diamant wurde."
          soul_silver: "Man sagt, dass ein ONIX, das über\n100 Jahre alt ist, hart wie ein\nDiamant sein soll."
        es:
          heart_gold: "Su cuerpo ha sido comprimido en el\ninterior de la tierra y, por eso,\nes hasta más duro que el diamante."
          soul_silver: "Dicen que si ONIX viviera más de 100\naños, su composición sería\nla del diamante, como STEELIX."
        ko:
          heart_gold: "깊은 땅 아래에서\n압축된 몸은\n다이아몬드보다 단단하다."
          soul_silver: "롱스톤이 100년 이상\n살면 몸의 성분이\n다이아몬드처럼 변한다고 전해진다."
