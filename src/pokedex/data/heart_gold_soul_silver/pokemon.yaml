          soul_silver: "３ぼんの　どくばりの　なかでは\nおしりに　ついているのが　いちばん\nきょうりょくな　どくをだす。"
        en:
          heart_gold: "It can take down any opponent with\nits powerful poison stingers.\nIt sometimes attacks in swarms."
          soul_silver: "It has three poison barbs.\nThe barb on its tail secretes the\nmost powerful poison."
        fr:
          heart_gold: "Il peut venir à bout de ses\nadversaires grâce à ses aiguillons.\nIl attaque souvent en nuées."
          soul_silver: "Il a trois dards venimeux. Le dard\nsur sa queue sécrète le poison\nle plus puissant et dangereux."
        it:
          heart_gold: "Può abbattere ogni avversario \ncon i velenosissimi aculei.\nTalvolta attacca in sciami."
          soul_silver: "Ha tre aculei velenosi.\nQuello sulla coda secerne\nil veleno più potente."
        de:
          heart_gold: "Mit seinen gefährlichen Stacheln\nkann es jeden Gegner besiegen.\nEs tritt auch in Schwärmen auf."
          soul_silver: "Es besitzt drei Giftstacheln. Mit\ndem Stachel an seinem Hinterleib\ninjiziert es das wirksamste Gift."
        es:
          heart_gold: "Puede vencer a cualquier rival\ncon sus potentes aguijones\nvenenosos. Puede atacar en grupo."
          soul_silver: "Tiene tres púas venenosas.\nLa púa de su cola segrega\nun veneno muy potente."
        ko:
          heart_gold: "어떠한 상대라도 강력한\n독침으로 쏘아 죽인다.\n가끔 집단으로 공격해온다."
          soul_silver: "3개의 독침 중에서는\n엉덩이에 달린 것이 제일\n강력한 독을 낸다."
pidgey:
  species_id: 16
  names:
    jp_kana: ポッポ
    en: PIDGEY
    fr: ROUCOOL
    it: PIDGEY
    de: TAUBSI
    es: PIDGEY
    ko: 구구
