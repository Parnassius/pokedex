          heart_gold: "This legendary Pokémon scatters\nembers with every flap of its wings.\nIt is a thrilling sight to behold."
          soul_silver: "This legendary bird Pokémon is\nsaid to bring early spring to\nthe wintry lands it visits."
        fr:
          heart_gold: "Ce Pokémon légendaire sème des\nbraises à chaque battement d’ailes.\nSa beauté fait fondre les gens."
          soul_silver: "Ce Pokémon Oiseau légendaire\nannonce un printemps précoce\naux régions qu’il visite."
        it:
          heart_gold: "Questo Pokémon leggendario sparge\ntizzoni ardenti ad ogni batter\nd’ali: uno spettacolo esaltante."
          soul_silver: "Pokémon uccello leggendario che\nsembra portare la primavera nei\ngelidi paesi che attraversa."
        de:
          heart_gold: "Dieses Legendäre Pokémon ver-\nstreut mit jedem Flügelschlag Glut.\nDas ist ein anmutiger Anblick."
          soul_silver: "Dieses Legendäre Vogel-Pokémon\nsoll Wintergebieten bei Besuch ei-\nnen frühen Frühling bescheren."
        es:
          heart_gold: "Este Pokémon legendario esparce\nascuas con cada aleteo. Es una\nvisión digna de ver."
          soul_silver: "Dicen que este Pokémon pájaro\nlegendario lleva la primavera a las\ntierras invernales por las que pasa."
        ko:
          heart_gold: "날개 칠 때마다 불꽃이 반짝인다.\n본 사람의 마음을 녹이는\n아름다움을 가진 전설의 포켓몬이다."
          soul_silver: "파이어가 모습을 보인 설국에는\n한 걸음 빠르게 봄이 찾아온다고\n전해지는 전설의 포켓몬이다."
