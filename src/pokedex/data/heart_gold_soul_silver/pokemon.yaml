      descriptions:
        jp_kana:
          heart_gold: "よぞらに　ほしが　またたくとき\nかがやく　こなを　ふりまきながら\nひらひらと　とんでいく。"
          soul_silver: "せなかの　ほしもようは\nよぞらの　ほしのかずに　はんのうして\nおおきくなったり　ちいさくなる。"
        en:
          heart_gold: "When the stars flicker in the\nnight sky, it flutters about,\nscattering a glowing powder."
          soul_silver: "The spot patterns on its back grow\nlarger or smaller depending on the\nnumber of stars in the night sky."
        fr:
          heart_gold: "Quand les étoiles brillent dans le\nciel, il volette partout en semant\nderrière lui une poudre brillante."
          soul_silver: "Les étoiles sur son dos deviennent\nplus grandes ou plus petites selon\nle nombre d’étoiles dans le ciel."
        it:
          heart_gold: "Si aggira nella notte stellata\nlasciando cadere una scia di\npolvere incandescente."
          soul_silver: "I puntini sulla schiena sono più\ngrandi o più piccoli secondo il\nnumero di stelle nel cielo."
        de:
          heart_gold: "Leuchten die Sterne am Nachthimmel,\nschwirrt es umher und verstreut\neinen strahlenden, leuchtenden Puder."
          soul_silver: "Die Größe des Sternenmusters\nhängt direkt mit der Anzahl der\nSterne am Firmament zusammen."
        es:
          heart_gold: "Cuando parpadean las estrellas en\nel cielo nocturno, se mece\ndesprendiendo un polvo brillante."
          soul_silver: "Las estrellas de su lomo crecen y\ndecrecen dependiendo de\nlas estrellas del cielo nocturno."
        ko:
          heart_gold: "밤하늘의 별이 깜빡일 때\n반짝이는 가루를 흩뿌리며\n훨훨 날아간다."
          soul_silver: "등의 별 모양은\n밤하늘의 별의 숫자에 반응하여\n커졌다가 작아졌다가 한다."
spinarak:
  species_id: 167
  names:
    jp_kana: イトマル
    en: SPINARAK
