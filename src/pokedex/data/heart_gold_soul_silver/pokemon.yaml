          soul_silver: "さゆうの　ユニットから\nじゅうりょくを　さえぎる　ちからを\nだすので　くうちゅうに　うかべる。"
        en:
          heart_gold: "It is attracted by electromagnetic\nwaves. It may approach Trainers\nif they are using their Pokégear."
          soul_silver: "The units at the sides of its body\ngenerate antigravity energy to\nkeep it aloft in the air."
        fr:
          heart_gold: "Il est attiré par les ondes\nélectromagnétiques et le Pokématos\ndes Dresseurs en chasse."
          soul_silver: "Les parties sur les côtés de son\ncorps génèrent une énergie lui\npermettant de léviter."
        it:
          heart_gold: "Attratto dalle onde elettromagnetiche.\nÈ facile che si avvicini a un Allenatore\nche usa il Pokégear."
          soul_silver: "Le unità alle due estremità del corpo\nproducono energia antigravitazionale\ncon cui si mantiene a mezz’aria."
        de:
          heart_gold: "Elektromagnetische Wellen ziehen\nes an. Trainer, die den Pokécom\nverwenden, ziehen MAGNETILO an."
          soul_silver: "Die Magneten an seinem Körper er-\nzeugen ein AntiGrav.-Feld, um es\nständig in der Schwebe zu halten."
        es:
          heart_gold: "Atraído por ondas electromagnéticas,\npodría acercarse a los Entrenadores\nque estén usando el Pokégear."
          soul_silver: "Las unidades a los lados de su\ncuerpo generan energía antigravitatoria\npara mantenerlo en el aire."
        ko:
          heart_gold: "전파에 이끌리는 성질이다.\n포켓기어를 쓰고 있으면\n다가오는 일도 있는 듯하다."
          soul_silver: "좌우의 유닛에서\n중력을 차단하는 힘을\n발휘하기에 공중에 뜰 수 있다."
magneton:
