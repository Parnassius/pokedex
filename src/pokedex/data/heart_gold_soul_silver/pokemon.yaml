      descriptions:
        jp_kana:
          heart_gold: "つめたい　うみが　だいすき。\nちじょうでは　うまく　あるけないが\nすいちゅうなら　じゆうに　およげる。"
          soul_silver: "ひるまは　あさい　かいていで\nねていることが　おおい。\nおよぐときは　はなのあなが　とじる。"
        en:
          heart_gold: "Although it can’t walk well on land,\nit is a graceful swimmer. It especially\nloves being in frigid seas."
          soul_silver: "In daytime, it is often found asleep\non the seabed in shallow waters.\nIts nostrils close while it swims."
        fr:
          heart_gold: "Bien qu’il puisse marcher sur\nla terre ferme, ce formidable\nnageur préfère les eaux froides."
          soul_silver: "Il passe le plus clair de la journée à\ndormir dans des eaux peu profondes.\nIl ferme les narines pour plonger."
        it:
          heart_gold: "Pur poco abile sulla terraferma, è\nun elegante nuotatore. Apprezza\nparticolarmente i mari gelidi."
          soul_silver: "Di giorno lo si può trovare addormentato\nsul fondo del mare in acque basse.\nSe nuota chiude le narici."
        de:
          heart_gold: "Obwohl es an Land nicht gut laufen\nkann, ist es ein graziler Schwim-\nmer. Es liebt vor allem das Eismeer."
          soul_silver: "Tagsüber ist es in Flussbetten\nflacher Gewässer zu finden. Es\nschließt unter Wasser die Nase."
        es:
          heart_gold: "Aunque torpe en tierra, es un\nhábil nadador. Lo que más le\ngusta es nadar en mares helados."
          soul_silver: "De día, puedes verlo dormido en\nel fondo de aguas poco profundas.\nCierra sus fosas nasales al nadar."
        ko:
          heart_gold: "차가운 바다를 매우 좋아한다.\n지상에서는 잘 걸을 수 없지만\n수중에서는 자유롭게 헤엄칠 수 있다."
          soul_silver: "낮에는 얕은 바다 밑에서\n자고 있을 때가 잦다.\n헤엄칠 때는 콧구멍이 닫힌다."
dewgong:
  species_id: 87
