        - monster
        - water_1
      abilities:
        - torrent
      descriptions:
        jp_kana:
          heart_gold: "ながいきの　シンボルと　されている。\nこうらに　コケが　ついているのは\nとくに　ながいきの　カメールだ。"
          soul_silver: "ふさふさの　みみと　しっぽを\nたくみに　あやつって　すいちゅうでの\nバランスを　たもつ。"
        en:
          heart_gold: "It is a well-established symbol of\nlongevity. If its shell has algae on it,\nthat WARTORTLE is very old."
          soul_silver: "It cleverly controls its furry\nears and tail to maintain its\nbalance while swimming."
        fr:
          heart_gold: "Il est considéré comme un symbole\nde longévité. Les algues accrochées\nà sa carapace indiquent son âge."
          soul_silver: "Il contrôle efficacement sa\nqueue et ses oreilles pour\nnager encore plus vite."
        it:
          heart_gold: "Viene considerato un simbolo di\nlongevità. Se ci sono alghe sul\nsuo guscio, allora è molto anziano."
          soul_silver: "Controlla abilmente le orecchie e la\ncoda coperte di pelo, mantenendo\nl’equilibrio mentre nuota."
        de:
          heart_gold: "Es gilt als Symbol von Langlebig-\nkeit. Ist sein Panzer mit Moos\nübersät, ist SCHILLOK sehr alt."
          soul_silver: "Es balanciert geschickt mit seinen\nbuschigen Ohren und dem Schweif,\nwährend es im Wasser schwimmt."
        es:
          heart_gold: "Es reconocido como símbolo de\nlongevidad. Los WARTORTLE ancianos\ntienen algas sobre el caparazón."
          soul_silver: "Utiliza sus peludas orejas\ny patas para mantener\nel equilibrio al nadar."
        ko:
          heart_gold: "장수의 상징으로 여겨진다.\n등껍질에 이끼가 붙어 있는 것은\n특히 장수한 어니부기다."
          soul_silver: "탐스러운 귀와 꼬리를\n능숙하게 다뤄서 수중에서의\n밸런스를 유지한다."
blastoise:
