          soul_silver: "りょうてを　つかい　どんな　けわしい\nやまみちも　どんどん　のぼっていく。\nおこると　げんこつを　ふりまわす。"
        en:
          heart_gold: "Most people may not notice,\nbut a closer look should reveal that\nthere are many GEODUDE around."
          soul_silver: "It uses its arms to steadily climb\nsteep mountain paths. It swings\nits fists around if angered."
        fr:
          heart_gold: "On ne les remarque généralement pas,\nmais nous sommes en fait entourés\npar des colonies de RACAILLOU."
          soul_silver: "Il se sert de ses bras pour\nescalader. En colère, il\nvirevolte avec ses poings."
        it:
          heart_gold: "Possono passare inosservati,\nma se si guarda con attenzione si\npossono notare parecchi GEODUDE."
          soul_silver: "Scala di continuo ripide montagne\ncon le braccia. Se è arrabbiato\ninizia ad agitare i pugni."
        de:
          heart_gold: "Viele Leute wissen das nicht, aber\nbei näherer Betrachtung erkennt\nman, dass es viele KLEINSTEIN gibt."
          soul_silver: "Es setzt seine Arme ein, um steile\nBerge zu erklimmen. Ist es ver-\närgert, wirbelt es mit den Fäusten."
        es:
          heart_gold: "Puede que mucha gente no se dé\ncuenta, pero si miras con detenimiento,\nverás muchos GEODUDE alrededor."
          soul_silver: "Usa sus brazos para escalar\nmontañas escarpadas. Si se\nenfada, balancea sus puños."
        ko:
          heart_gold: "많은 사람들이 눈치채지 못할 뿐.\n주위를 잘 살펴보면\n꼬마돌이 많이 있다."
          soul_silver: "양손을 사용하여 아무리 험난한\n산길이라도 헤쳐 올라간다.\n화가 나면 주먹을 휘두른다."
graveler:
