          soul_silver: "ふきそくな　かたちの　いでんしは\nまわりの　えいきょうを　うけやすい。\nかんきょうが　かわると　しんかする。"
        en:
          heart_gold: "It has the ability to alter the\ncomposition of its body to suit its\nsurrounding environment."
          soul_silver: "Its irregularly configured DNA is\naffected by its surroundings. It\nevolves if its environment changes."
        fr:
          heart_gold: "Il a la capacité de changer la\ncomposition de son corps pour\ns’adapter à son environnement."
          soul_silver: "Son ADN très instable s’adapte\ntoujours à son environnement. Il\névolue quand ce dernier change."
        it:
          heart_gold: "Ha la capacità di alterare la\ncomposizione del corpo per\nadattarsi all’ambiente circostante."
          soul_silver: "Il suo DNA irregolare è condizionato\ndall’habitat. Si evolve in base alle\ncondizioni ambientali."
        de:
          heart_gold: "Es verfügt über die Fähigkeit,\nseinen Körper perfekt an die\njeweilige Umgebung anzupassen."
          soul_silver: "Seine anomale DNS-Struktur hängt\nvon der Umgebung ab. Verändert sich\ndiese, so entwickelt es sich."
        es:
          heart_gold: "Es capaz de alterar la\ncomposición de su cuerpo para\ncamuflarse con el entorno."
          soul_silver: "Su ADN irregular se ve afectado\npor el entorno. Evoluciona si\ncambia su entorno."
        ko:
          heart_gold: "주위의 환경에 맞춰서\n몸의 구조를 바꿔나가는\n능력의 소유자다."
          soul_silver: "불규칙한 형태의 유전자는\n주변의 영향을 받기 쉽다.\n환경이 바뀌면 진화한다."
vaporeon:
