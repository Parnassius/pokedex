        en:
          heart_gold: "This carefree Pokémon has an\neasy-going nature. While swimming,\nit always bumps into boat hulls."
          soul_silver: "Due to its relaxed and carefree\nattitude, it often bumps its head on\nboulders and boat hulls as it swims."
        fr:
          heart_gold: "Ce Pokémon est très insouciant.\nQuand il nage, il fonce tête la\npremière dans la coque des bateaux."
          soul_silver: "Très distrait, il se cogne souvent\nla tête sur des rochers ou\nsur des coques de bateaux."
        it:
          heart_gold: "Questo Pokémon sbarazzino non si\nfa grossi problemi: nuotando urta\nsempre gli scafi delle barche."
          soul_silver: "Con il suo atteggiamento rilassato\ne disinvolto, nuota scontrandosi\nspesso contro scogli e scafi di barche."
        de:
          heart_gold: "Dieses genügsame Pokémon ist sehr\numgänglich. Beim Schwimmen stößt es\nimmer wieder gegen Schiffe."
          soul_silver: "Aufgrund seiner sorglosen Ein-\nstellung rammt es seinen Kopf oft\ngegen Felsen oder Schiffsrümpfe."
        es:
          heart_gold: "Este despreocupado Pokémon es de\nnaturaleza tranquila. Siempre\nque nada, choca con los barcos."
          soul_silver: "Debido a su despreocupada\nactitud, a menudo golpea su cabeza\ncontra rocas o barcos al nadar."
        ko:
          heart_gold: "느긋한 성격으로\n제멋대로 헤엄치고는 늘\n배의 밑바닥에 머리를 들이받곤 한다."
          soul_silver: "느긋한 성격으로\n헤엄치다가 강바닥의 돌과\n배의 밑바닥에 머리를 들이받곤 한다."
