      descriptions:
        jp_kana:
          heart_gold: "シッポのさきが　ひかりかがやく。\nひかりは　はるか　とおくまで　とどき\nまよったものの　みちしるべとなる。"
          soul_silver: "シッポの　あかりは　とおくまで\nとどくので　むかしより　かがりび\nとして　だいじに　されている。"
        en:
          heart_gold: "The tail’s tip shines brightly and\ncan be seen from far away. It acts\nas a beacon for lost people."
          soul_silver: "The bright light on its tail can be\nseen far away. It has been treasured\nsince ancient times as a beacon."
        fr:
          heart_gold: "Le bout de sa queue brille si\nfort qu’il peut être vu de très\nloin. Il sert de balise aux gens."
          soul_silver: "La lumière vive sur sa queue peut\nêtre vue de loin. Il a longtemps été\nutilisé dans les phares."
        it:
          heart_gold: "La punta molto luminosa della coda\nè visibile da grandi distanze.\nFa da segnale per chi si è perso."
          soul_silver: "La forte luce che ha sulla coda è\nvisibile da molto lontano. Da sempre\nè un riferimento per chi si perde."
        de:
          heart_gold: "Seine Schweifspitze ist so hell,\ndass viele Verschollene es als\nOrientierungspunkt nutzen."
          soul_silver: "Das helle Licht an dem Schweifende\nist von Weitem zu sehen. Es gilt\nseit der Antike als Leuchtfeuer."
        es:
          heart_gold: "La punta de su cola reluce\nbrillantemente y puede ser vista\ndesde lejos. Es usado como faro."
          soul_silver: "El brillo de su cola es visible\ndesde lejos. En la antigüedad\nse usaba mucho como faro."
        ko:
          heart_gold: "꼬리 끝이 빛나며 반짝인다.\n빛이 아득히 먼 곳까지 닿아서\n길 잃은 자들의 이정표가 된다."
          soul_silver: "꼬리의 빛은 멀리까지\n전해지기 때문에 예전부터 봉화\n역할로서 중요하게 여겨지고 있다."
bellossom:
  species_id: 182
  names:
    jp_kana: キレイハナ
    en: BELLOSSOM
    fr: JOLIFLOR
    it: BELLOSSOM
    de: BLUBELLA
    es: BELLOSSOM
    ko: 아르코
