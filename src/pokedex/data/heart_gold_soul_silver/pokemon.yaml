          soul_silver: "うごいても　ざんぞうしか　みえない。\nとまっても　くさむらに　みをかくすと\nほごしょくで　わからない。"
        en:
          heart_gold: "It slashes through grass with its\nsharp scythes, moving too fast\nfor the human eye to track."
          soul_silver: "When it moves, it leaves only a\nblur. If it hides in grass, its protective\ncoloration makes it invisible."
        fr:
          heart_gold: "Il fauche les herbes avec ses\nlames acérées. Il bouge si vite\nqu’on ne peut le voir à l’œil nu."
          soul_silver: "Quand il se déplace, il apparaît en\nrémanence. S’il se cache, son\ncamouflage le rend invisible."
        it:
          heart_gold: "Si fa strada tra l’erba grazie alle\nlame affilate, muovendosi troppo\nvelocemente per l’occhio umano."
          soul_silver: "Quando si muove si vede solo\nuna scia. Nell’erba i suoi colori\nmimetici lo rendono invisibile."
        de:
          heart_gold: "Es bewegt sich mit seinen Sensen so\nschnell durch das Gras, dass es\nkein Mensch sehen kann."
          soul_silver: "Wenn es sich bewegt, sieht man\nes nur flüchtig. Im Gras ist es\naufgrund seiner Farbe unsichtbar."
        es:
          heart_gold: "Avanza por la hierba con sus\nafiladas guadañas, más rápido de lo\nque el ojo humano pueda percibir."
          soul_silver: "Al moverse deja solo una estela.\nSi se esconde en la hierba,\nsus colores le hacen invisible."
        ko:
          heart_gold: "잘 드는 예리한 낫을 써서\n풀숲을 베고 지나간다. 매우\n빠른 움직임에 눈이 따라가지 못한다."
          soul_silver: "움직여도 잔상밖에 보이지 않는다.\n멈춰도 풀숲에 몸을 숨기면\n보호색 때문에 보이지 않는다."
jynx:
