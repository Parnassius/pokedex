      descriptions:
        jp_kana:
          heart_gold: "ふしぎな　ちからを　ひめているが\nつかった　きおくが　ないので\nいつも　くびを　かしげている。"
          soul_silver: "いつもの　ずつうが　はげしくなると\nふしぎなちからを　はっきするが\nそのときの　きおくは　ないらしい。"
        en:
          heart_gold: "It has mystical powers but doesn’t\nrecall that it has used them.\nThat is why it always looks puzzled."
          soul_silver: "If its chronic headache peaks, it\nmay exhibit odd powers. It seems\nunable to recall such an episode."
        fr:
          heart_gold: "Il ne se souvient pas qu’il a\ndes pouvoirs psy. C’est pour\ncela qu’il a l’air si confus."
          soul_silver: "Plus sa migraine devient forte, plus\nil gagne d’étranges pouvoirs. Mais\nil oublie tout après."
        it:
          heart_gold: "Ha poteri soprannaturali ma non\nricorda di averli usati. Per questo\nsembra sempre perplesso."
          soul_silver: "Se il suo mal di testa cronico si\nacuisce, può acquisire strani\npoteri, ma poi se ne dimentica."
        de:
          heart_gold: "Es besitzt mystische Kräfte, die\nes unbewusst einsetzt. Daher ist\nsein Blick immer verwirrt."
          soul_silver: "Es leidet unter starker Migräne,\naufgrund deren es Kräfte entwickelt.\nDanach erinnert es sich an nichts."
        es:
          heart_gold: "Tiene poderes místicos que no\nrecuerda haber usado. Por eso,\nsiempre parece desconcertado."
          soul_silver: "Si su jaqueca crónica empeora,\npodría mostrar extraños poderes.\nNo parece recordar nada después."
        ko:
          heart_gold: "이상한 힘을 간직하고 있지만\n사용했던 기억이 없으므로\n항상 고개를 갸웃거리고 있다."
          soul_silver: "평상시보다 두통이 심해지면\n이상한 힘을 발산하지만\n그때의 기억은 없는 듯하다."
golduck:
  species_id: 55
  names:
    jp_kana: ゴルダック
