      descriptions:
        jp_kana:
          heart_gold: "こうげきの　けはいを　よみとって\nおそわれるまえに　さっさと\nテレポートで　そのばを　さっていく。"
          soul_silver: "きまぐれに　テレポートを\nくりかえしていると　まるで\nぶんしん　したかのように　みえる。"
        en:
          heart_gold: "It senses impending attacks and\nteleports away to safety before the\nactual attacks can strike."
          soul_silver: "If it decides to teleport randomly,\nit evokes the illusion that it\nhas created copies of itself."
        fr:
          heart_gold: "Il prévoit les attaques futures\net se téléporte pour se mettre\nà l’abri et éviter le combat."
          soul_silver: "En se téléportant d’une façon\naléatoire, il donne l’impression\nd’avoir des doubles."
        it:
          heart_gold: "Avverte gli attacchi imminenti e si\nteletrasporta in salvo prima che\nl’attacco lo possa colpire."
          soul_silver: "Se inizia a teletrasportarsi a destra\ne a manca, si ha l’illusione che abbia\ncreato delle copie di se stesso."
        de:
          heart_gold: "Es sieht die Attacken der Gegner\nvoraus und setzt Teleport ein, um\nsich in Sicherheit zu bringen."
          soul_silver: "Durch den zufälligen Einsatz von\nTeleport entsteht der Eindruck, es\ngeneriere Abbilder von sich."
        es:
          heart_gold: "Siente los ataques inminentes y se\nteletransporta a un lugar seguro,\nantes de que estos puedan darle."
          soul_silver: "Si decide teletransportarse\nal azar, dará la impresión de haber\ncreado copias de sí mismo."
        ko:
          heart_gold: "공격의 낌새를 읽고\n공격당하기 전에 얼른\n순간이동으로 그 장소를 떠난다."
          soul_silver: "제멋대로 순간이동을\n반복하고 있으면 마치\n분신술을 펼치는 듯 보인다."
kadabra:
