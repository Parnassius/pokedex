        special_defense: 0
        speed: 0
      types:
        - normal
      egg_groups:
        - undiscovered
      abilities:
        - cute_charm
      descriptions:
        jp_kana:
          heart_gold: "とても　やわらかい　からだ。\nいちど　ころがると　はずみまくって\nぜんぜん　とまれなくなる。"
          soul_silver: "だんりょくせい　あふれる\nからだの　もちぬしで　どこでも\nどんなときでも　はずんでいる。"
        en:
          heart_gold: "It has a very soft body. If it\nstarts to roll, it will bounce all\nover and be impossible to stop."
          soul_silver: "Its extremely flexible and\nelastic body makes it bounce\ncontinuously--anytime, anywhere."
        fr:
          heart_gold: "Son corps est très doux.\nQuand il commence à rebondir,\nil est impossible de l’arrêter."
          soul_silver: "Son corps est très élastique,\nce qui lui permet de rebondir\ntout le temps et où il veut."
        it:
          heart_gold: "Il suo corpo è morbidissimo. Se\ninizia a rotolare, rimbalza così\nforte che è impossibile fermarlo."
          soul_silver: "Il corpo molto flessibile ed\nelastico lo fa rimbalzare\nda ogni parte continuamente."
        de:
          heart_gold: "Sein Körper ist sehr weich. Kommt\nes ins Rollen, hüpft es herum\nund man kann es nicht aufhalten."
          soul_silver: "Aufgrund seines extrem flexiblen\nund elastischen Körpers springt es\nständig überall umher."
        es:
          heart_gold: "Su cuerpo es muy blando. Si se pone\na rodar, rebotará contra todo y\nserá imposible de parar."
          soul_silver: "Su cuerpo realmente flexible\ny elástico le permite rebotar\ncuando sea y donde sea."
        ko:
          heart_gold: "매우 부드러운 몸이다.\n한번 구르면 탄력이 붙어서\n전혀 멈출 수 없게 된다."
          soul_silver: "탄력성이 넘치는\n몸을 지녀서 언제\n어디서든 튀어 다니고 있다."
togepi:
  species_id: 175
  names:
    jp_kana: トゲピー
    en: TOGEPI
    fr: TOGEPI
    it: TOGEPI
    de: TOGEPI
    es: TOGEPI
    ko: 토게피
