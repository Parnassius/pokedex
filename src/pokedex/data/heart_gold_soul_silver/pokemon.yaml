          heart_gold: "しろい　しっぽが　おおきくなると\nいろがついて　６ぽんに　わかれる。\nだきしめると　ほんのり　あたたかい。"
          soul_silver: "じぶんより　つよい　あいてに\nおそわれると　キズついた　ふりをして\nまどわせ　そのすきに　にげてしまう。"
        en:
          heart_gold: "As it develops, its single white\ntail gains color and splits into six.\nIt is quite warm and cuddly."
          soul_silver: "If it is attacked by an enemy that\nis stronger than itself, it feigns\ninjury to fool the enemy and escapes."
        fr:
          heart_gold: "Quand il grandit, sa queue blanche\nse colore et se divise en six. Il\nest gentil, doux et câlin."
          soul_silver: "S’il est attaqué par un ennemi trop\nfort pour lui, il feint la blessure\npour s’échapper facilement."
        it:
          heart_gold: "Crescendo, la sua coda bianca si\ncolora e si divide in sei. È molto\ntenero e affettuoso."
          soul_silver: "Se è attaccato da un nemico\npiù forte, si finge ferito per\ningannarlo e fuggire."
        de:
          heart_gold: "Beim Heranwachsen teilt sich sein\nSchweif sechsfach und wird farbig.\nEs ist warm und anschmiegsam."
          soul_silver: "Greift es ein größerer Gegner an,\ntäuscht es eine Verletzung vor,\num sicher vor ihm zu flüchten."
        es:
          heart_gold: "A medida que crece, su blanca\ncola gana color y se divide en\nseis. Es cálido y adorable."
          soul_silver: "Si le ataca un enemigo más fuerte\nque él, finge estar herido para\nconfundirle y huir."
        ko:
          heart_gold: "하얀 꼬리가 커지면\n물들어 6개로 나누어진다.\n껴안으면 조금 따뜻하다."
          soul_silver: "자신보다 강한 상대에게\n공격을 받으면 다친 척을 해서\n속이고 그 틈을 타서 도망친다."
ninetales:
