          soul_silver: "１０ぽんの　あしを　じょうずに\nくねらせ　うみを　およいでいたという\nおおむかしの　ポケモン。"
        en:
          heart_gold: "Revived from an ancient fossil,\nthis Pokémon uses air stored in its\nshell to sink and rise in water."
          soul_silver: "This Pokémon from ancient times is\nsaid to have navigated the sea by\nadeptly twisting its 10 tentacles."
        fr:
          heart_gold: "Recréé à partir d’un fossile, il utilise\nl’air dans sa coquille pour s’enfoncer\ndans l’eau ou faire surface."
          soul_silver: "Ce Pokémon des temps anciens est\nsupposé avoir navigué en\ncontorsionnant ses 10 tentacules."
        it:
          heart_gold: "Questo Pokémon, resuscitato\nda un antico fossile, usa l’aria\ndel guscio per immergersi."
          soul_silver: "Sembra che questo Pokémon\ndell’antichità nuotasse per i\nmari con i suoi dieci tentacoli."
        de:
          heart_gold: "Es wurde aus einem Fossil reanimiert.\nEs nutzt die Luftkammern in seiner\nSchale, um ab- und aufzutauchen."
          soul_silver: "Man sagt, dass dieses antike\nPokémon mit seinen 10 Tentakeln das\nMeer durchkreuzen konnte."
        es:
          heart_gold: "Resucitado de un fósil, este\nPokémon usa el aire de su concha\npara sumergirse y emerger."
          soul_silver: "Se dice que este antiguo Pokémon\nsurcó el mar moviendo\nlos 10 tentáculos que posee."
        ko:
          heart_gold: "고대의 화석에서 부활했다.\n껍질 안에 모은 공기로\n수중에서 뜨고 가라앉기를 반복했다."
          soul_silver: "10개의 다리로 능숙하게\n꼼틀거리며 바다를 헤엄쳤다고 전해지는\n오랜 옛날의 포켓몬이다."
omastar:
