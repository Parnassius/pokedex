          soul_silver: "きゅうな　ながれの　かわも\nじそく５ノットの　スピードで\nぐんぐん　さかのぼっていく。"
        en:
          heart_gold: "Its dorsal, pectoral and tail fins\nwave elegantly in water. That is why\nit is known as the water dancer."
          soul_silver: "A strong swimmer, it is capable of\nswimming nonstop up fast streams at\na steady speed of five knots per hour."
        fr:
          heart_gold: "Ses nageoires dorsales et pectorales\nbougent avec élégance. Il est\nsurnommé le danseur des flots."
          soul_silver: "Un bon nageur, capable de remonter un\ntorrent à la vitesse impressionnante de\n5 nœuds."
        it:
          heart_gold: "Le pinne su dorso, petto e coda\nondulano con grazia in acqua. Così\nlo chiamano “danzatore d’acqua”."
          soul_silver: "Forte nuotatore, capace di risalire\ntorrenti impetuosi alla velocità\ncostante di cinque nodi."
        de:
          heart_gold: "Seine Brust-, Rücken- und Schweif-\nflossen sehen anmutig aus. Daher\nnennt man es den “Wassertänzer”."
          soul_silver: "Es ist ein guter Schwimmer. Es kann\nselbst reißende Ströme mit kon-\nstant fünf Knoten hinaufschwimmen."
        es:
          heart_gold: "Sus aletas dorsal, trasera y pectoral\nondean gráciles en el agua. Por eso\nes llamado el bailarín acuático."
          soul_silver: "Un gran nadador, capaz de remontar\nfuertes corrientes sin parar y a una\nvelocidad media de 5 nudos."
        ko:
          heart_gold: "등, 가슴, 꼬리지느러미가\n우아하게 나부끼기 때문에\n물의 무희라고 불린다."
          soul_silver: "물살이 빠른 강도\n시속 5노트의 스피드로\n쓱쓱 거슬러 올라간다."
seaking:
