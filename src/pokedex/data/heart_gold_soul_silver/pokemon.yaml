          soul_silver: "ぜんしんの　ちいさな　ハリは\nうろこが　へんかしたもの。\nささると　どくで　きをうしなう。"
        en:
          heart_gold: "To fire its poison spikes, it must\ninflate its body by drinking over\n2.6 gallons of water all at once."
          soul_silver: "The small spikes covering its body\ndeveloped from scales. They inject\na toxin that causes fainting."
        fr:
          heart_gold: "Pour tirer ses dards empoisonnés,\nil gonfle son corps en buvant\n10 litres d’eau subitement."
          soul_silver: "Son corps est recouvert de pics\nprovenant de ses écailles. Ils\nsécrètent un poison étourdissant."
        it:
          heart_gold: "Per sparare le punte velenose,\ngonfia il corpo bevendo più di\n10 litri d’acqua in una volta."
          soul_silver: "I piccoli aculei che coprono il suo corpo\nsi sono formati dalle squame. Contengono\nuna tossina che fa svenire."
        de:
          heart_gold: "Um seine Giftstacheln abzufeuern,\nmuss es seinen Körper aufpumpen,\nindem es 10 Liter trinkt."
          soul_silver: "Die kleinen Stacheln an seinem\nKörper sind aus Schuppen ent-\nstanden. Damit injiziert es Gift."
        es:
          heart_gold: "Para arrojar sus venenosas púas,\ninfla su cuerpo bebiendo hasta diez\nlitros de agua de una sola vez."
          soul_silver: "Las pequeñas púas que cubren su\ncuerpo eran escamas. Inyectan\nuna toxina que debilita."
        ko:
          heart_gold: "전신의 독침을 날리기 위해\n10리터의 물을 단번에\n마시고 몸을 부풀린다."
          soul_silver: "전신의 작은 바늘은\n비늘이 변화한 것이다.\n찔리면 독 때문에 정신을 잃게 된다."
scizor:
