          soul_silver: "ぶきみな　とおぼえを　きいた\nポケモンは　ふるえ　いちもくさんに\nじぶんの　すに　もどる。"
        en:
          heart_gold: "If you are burned by the flames\nit shoots from its mouth,\nthe pain will never go away."
          soul_silver: "Upon hearing its eerie howls, other\nPokémon get the shivers and head\nstraight back to their nests."
        fr:
          heart_gold: "Les blessures provoquées par son\nsouffle de flamme sont permanentes\net la douleur ne s’en va jamais."
          soul_silver: "En entendant ses hurlements\nsinistres, les autres Pokémon\nprennent peur et fuient vers leur nid."
        it:
          heart_gold: "Se si è bruciati dalle fiamme che\nsputa dalla bocca, il dolore\nrimarrà per sempre."
          soul_silver: "Udendo i suoi terrificanti latrati,\ngli altri Pokémon iniziano a tremare\ne si precipitano nelle loro tane."
        de:
          heart_gold: "Wirst du von den Flammen getroffen,\ndie aus seinem Mund schießen, wirst\ndu für immer gebrandmarkt sein."
          soul_silver: "Wenn andere Pokémon sein\ngräuliches Geheul hören, erschauern\nsie und verstecken sich schleunigst."
        es:
          heart_gold: "Si te quemas con las llamas que\nlanza por su boca, el dolor\nno desaparecerá nunca."
          soul_silver: "Al oír sus siniestros aullidos,\nlos otros Pokémon se estremecen\ny se guarecen."
        ko:
          heart_gold: "입에서 뿜어내는 불꽃으로\n화상을 입으면 언제까지나\n상처 난 자리가 욱신거린다."
          soul_silver: "기분 나쁜 울음소리를 들은\n포켓몬은 겁을 내서 그대로 곧장\n자신의 둥지로 되돌아온다."
kingdra:
