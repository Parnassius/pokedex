        jp_kana:
          heart_gold: "ねているときに　ちかよると\nねぼけたまま　おこりだして\nわけもわからず　おいかけてくる。"
          soul_silver: "だれかの　しせんを　かんじただけで\nもうれつに　おこりだす。そして\nめがあった　ものを　おいかけるのだ。"
        en:
          heart_gold: "If approached while asleep,\nit may awaken and angrily give chase\nin a groggy state of semi-sleep."
          soul_silver: "It becomes wildly furious if it even\nsenses someone looking at it. It\nchases anyone that meets its glare."
        fr:
          heart_gold: "Dérangé dans son sommeil, il peut\nse défendre comme une furie alors\nqu’il est encore à moitié endormi."
          soul_silver: "Il devient fou furieux s’il se sent\nobservé et pourchasse ceux sur\nqui il pose son regard."
        it:
          heart_gold: "Se lo si avvicina mentre dorme può\nscagliarsi all’inseguimento, ancora\nmezzo addormentato."
          soul_silver: "Diventa furioso se si sente\nosservato. Attacca chiunque\nincontri il suo sguardo."
        de:
          heart_gold: "Wenn man sich ihm nähert, während\nes schläft, wacht es auf und startet\neine Verfolgung im Halbschlaf."
          soul_silver: "Spürt es, dass jemand es anblickt,\nwird es zornig. Es folgt jedem, der\nes wagt, seinen Blick zu erwidern."
        es:
          heart_gold: "Si te acercas a él mientras duerme,\nse despertará y te dará caza en\nestado medio sonámbulo."
          soul_silver: "Se pone furioso si nota que\nalguien le está mirando. Persigue\na cualquiera que le vea enfadado."
        ko:
          heart_gold: "자고 있을 때 다가가면\n잠이 덜 깬 채로 화를 내며\n영문도 모르고 뒤쫓아온다."
          soul_silver: "누군가의 시선을 느끼기만 해도\n대단히 화를 낸다. 그리고\n눈이 마주친 상대를 쫓아다닌다."
growlithe:
