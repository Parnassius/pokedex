          soul_silver: "おたがいの　コイルを　むすびつける\nじりょくは　きょうりょくで　まわりの\nすいぶんを　かんそう　させるほど。"
        en:
          heart_gold: "Three MAGNEMITE are linked by a\nstrong magnetic force. Earaches\nwill occur if you get too close."
          soul_silver: "The MAGNEMITE are united by a\nmagnetism so powerful, it dries all\nmoisture in its vicinity."
        fr:
          heart_gold: "Le lien magnétique qui lie ces trois\nMAGNETI provoque des douleurs aux\noreilles si on s’en approche."
          soul_silver: "Les MAGNETI sont unis par un magnétisme\nsi puissant qu’il assèche toute humidité\nà proximité."
        it:
          heart_gold: "Tre MAGNEMITE sono uniti da un forte\ncampo magnetico. Le orecchie\nfischiano avvicinandosi troppo."
          soul_silver: "I MAGNEMITE sono uniti da un campo\nmagnetico così forte da seccare\nogni liquido nelle vicinanze."
        de:
          heart_gold: "Drei MAGNETILO sind durch ein\nMagnetfeld verbunden. In seiner\nNähe bekommt man Ohrensausen."
          soul_silver: "Die MAGNETILO werden von einem\nstarken Magnetfeld zusammenge-\nhalten, das Feuchtigkeit aufsaugt."
        es:
          heart_gold: "Tres MAGNEMITE se enlazan por\nuna intensa fuerza magnética. Si te\nacercas, te dolerán los oídos."
          soul_silver: "Los MAGNEMITE están unidos por un\nmagnetismo tan fuerte, que repele\nla humedad que hay a su alrededor."
        ko:
          heart_gold: "3개의 코일은 강한 자력으로\n연결되어 있다. 가까이 다가가면\n강한 귀울림에 시달리게 된다."
          soul_silver: "상호 간에 코일을 엮어서\n강력하게 만든 자력은 주변의\n수분을 건조하게 만들 정도다."
farfetchd:
