        jp_kana:
          heart_gold: "むれを　つくらないと　ふあんで\nうごけなくなるほど　おくびょうだが\nなかまがいると　かっぱつに　うごく。"
          soul_silver: "さむくなると　あちこちから\nレディバが　たくさん　あつまって\nよりそいあい　あたためあう。"
        en:
          heart_gold: "It is very timid. It will be afraid\nto move if it is alone. But it will\nbe active if it is in a group."
          soul_silver: "When the weather turns cold, lots\nof LEDYBA gather from everywhere to\ncluster and keep each other warm."
        fr:
          heart_gold: "De nature timide, il a peur de se\ndéplacer seul. Il est plus actif\net courageux dans un groupe."
          soul_silver: "Quand le temps se rafraîchit, de\nnombreux COXY se réunissent pour\nconserver un maximum de chaleur."
        it:
          heart_gold: "Timidissimo. Ha sempre paura di\nmuoversi da solo. Ma in gruppo\nsa diventare molto attivo."
          soul_silver: "Quando inizia a far freddo, i\nLEDYBA si riuniscono da ogni\nluogo per scaldarsi tra loro."
        de:
          heart_gold: "Es ist sehr scheu. Es hat Angst\nsich zu bewegen, wenn es alleine\nist. In Gruppen ist es sehr aktiv."
          soul_silver: "Wird es kalt, versammeln sich viele\nLEDYBA von nah und fern, um sich\ngegenseitig Wärme zu schenken."
        es:
          heart_gold: "Es muy tímido. Tiene miedo de\nmoverse cuando va solo. Pero si\nva en grupo, se vuelve muy activo."
          soul_silver: "Cuando llega el frío, se reúnen\nmuchos LEDYBA de todas partes\npara darse calor."
        ko:
          heart_gold: "무리를 만들지 않으면 불안해서\n움직이지 못할 정도로 겁이 많지만\n동료가 있으면 활발하게 움직인다."
          soul_silver: "추워지면 여기저기로부터\n레디바가 많이 모여들어\n바싹 붙어 서로 따뜻하게 해준다."
