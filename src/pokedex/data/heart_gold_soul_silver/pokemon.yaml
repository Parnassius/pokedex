      descriptions:
        jp_kana:
          heart_gold: "おしりからだけでなく　くちからも\nいとを　だすので　みただけでは\nどっちが　あたまか　わからない。"
          soul_silver: "つねに　おしりから　でている\nとくべつな　いっぽんの　いとを\nたどっていくと　すにつながっている。"
        en:
          heart_gold: "It spins string not only from its\nrear but also from its mouth. It’s\nhard to tell which end is which."
          soul_silver: "A single strand of a special string\nis endlessly spun out of its rear.\nThe string leads back to its nest."
        fr:
          heart_gold: "Il peut produire des fils de soie par\nl’arrière-train ou par la bouche.\nIl est difficile de différencier les deux."
          soul_silver: "Un fil spécial très solide relie\ndirectement son corps à son\nnid en permanence."
        it:
          heart_gold: "Seguendo il filo che gli esce\nda dietro, si giunge di certo\nfino al suo nido."
          soul_silver: "Tesse un filo ininterrotto dalla\nsua parte posteriore. Seguendo il\nfilo si giunge al suo nido."
        de:
          heart_gold: "Da es Fäden sowohl mit dem Hinter-\nleib, als auch mit dem Mund spinnt,\nverwechselt man die beiden leicht."
          soul_silver: "Aus seinem Hinterleib spinnt es einen\nendlosen Faden. Folgt man ihm,\ngelangt man in sein Nest."
        es:
          heart_gold: "Teje su telaraña desde atrás y\ndesde su boca. Es muy difícil\nsaber dónde está cada cual."
          soul_silver: "Una hebra de un hilo especial\nes tejida sin fin desde su parte\ntrasera. El hilo acaba en su nido."
        ko:
          heart_gold: "엉덩이뿐 아니라 입에서도\n실을 내기 때문에 봐서는\n어느 쪽이 머리인지 모른다."
          soul_silver: "항상 엉덩이에서 나오는\n특별한 한 가닥의 실을 더듬어 가면\n둥지와 연결되어 있다."
