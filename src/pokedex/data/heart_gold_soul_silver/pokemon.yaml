      descriptions:
        jp_kana:
          heart_gold: "りょうめを　とじると　ぜんしんの\nかんかくが　いっそう　とぎすまされ\nさいこうの　のうりょくが　だせる。"
          soul_silver: "のうさいぼうは　いつも　ぶんれつして\nしぬまで　ふえつづけるので\nあらゆることを　おぼえておける。"
        en:
          heart_gold: "Closing both its eyes heightens all\nits other senses. This enables it to\nuse its abilities to their extremes."
          soul_silver: "Its brain cells multiply continually\nuntil it dies. As a result,\nit remembers everything."
        fr:
          heart_gold: "En fermant ses yeux, il aiguise\nses autres sens, ce qui lui permet\nd’augmenter ses pouvoirs."
          soul_silver: "Ses cellules cérébrales se\nmultiplient jusqu’à sa mort.\nIl se souvient donc de tout."
        it:
          heart_gold: "Se chiude gli occhi potenzia gli altri\nsensi. Così può sfruttare al meglio\nle sue capacità."
          soul_silver: "Le sue cellule cerebrali si moltiplicano\ndi continuo. Perciò ricorda qualsiasi\ncosa gli accada."
        de:
          heart_gold: "Schließt es die Augen, schärfen\nsich seine anderen Sinne. Dadurch\nperfektioniert es seine Fähigkeiten."
          soul_silver: "Seine Gehirnzellen vervielfachen sich\nsein ganzes Leben lang. Daher kann\nes sich immer an alles erinnern."
        es:
          heart_gold: "Cerrando sus ojos aumenta sus\ndemás sentidos. Esto le permite\nusar sus habilidades al máximo."
          soul_silver: "Sus neuronas se multiplican\ncontinuamente durante su vida.\nPor eso, siempre lo recuerda todo."
        ko:
          heart_gold: "양쪽 눈을 감으면 전신의\n감각이 한층 더 예민해져\n최상의 능력을 낼 수 있다."
          soul_silver: "뇌 세포는 항상 분열해서\n죽을 때까지 늘어나기 때문에\n모든 것을 기억해 놓을 수 있다."
machop:
