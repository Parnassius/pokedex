        jp_kana:
          heart_gold: "１にち　ずっと　エサをはこんでる。\nそうなんした　ひとが　デリバードの\nエサで　たすかった　はなしもある。"
          soul_silver: "きりたった　がけの　さきにある\nすで　まつ　ヒナたちのため\n１にちじゅう　エサを　はこんでいる。"
        en:
          heart_gold: "It carries food all day long.\nThere are tales about lost people\nwho were saved by its stored food."
          soul_silver: "It nests at the edge of sharp\ncliffs. It spends all day carrying\nfood to its awaiting chicks."
        fr:
          heart_gold: "Il transporte de la nourriture\ntoute la journée. Il porte secours\naux égarés en leur donnant à manger."
          soul_silver: "Il fait son nid au bord des falaises\nabruptes. Il passe sa journée à\nnourrir ses petits."
        it:
          heart_gold: "Trasporta cibo per tutto il giorno.\nSi racconta che molti dispersi si\nsiano salvati con il suo cibo."
          soul_silver: "Fa il nido sugli spigoli di scogli\naguzzi. Passa il giorno a portare\ncibo ai suoi piccoli affamati."
        de:
          heart_gold: "Es trägt immer Lebensmittel bei\nsich. Man sagt, dass Verschollene\nnur seinetwegen überlebten."
          soul_silver: "Sein Nest baut es an scharfkantigen\nFelsklippen. Es ist den ganzen Tag\nauf Futtersuche für seine Jungen."
        es:
          heart_gold: "Siempre lleva comida. Dicen que\nhay muchos desaparecidos que\nsobrevivieron gracias a esta."
          soul_silver: "Anida en el borde de escarpados\nacantilados. Se pasa todo el día\nllevando comida a sus polluelos."
        ko:
          heart_gold: "온종일 먹이를 운반한다.\n조난당한 사람이 딜리버드의\n먹이로 살아났다는 이야기도 있다."
          soul_silver: "깎아 세운 듯한 절벽 끝에 있는\n둥지에서 기다리는 새끼들을 위해\n온종일 먹이를 운반하고 있다."
mantine:
  species_id: 226
  names:
    jp_kana: マンタイン
    en: MANTINE
    fr: DEMANTA
    it: MANTINE
    de: MANTAX
    es: MANTINE
    ko: 만타인
