          soul_silver: "いみもなく　おこって　あばれだすと\nなかまの　くべつも　つかなくなるので\nちかよるのは　ひじょうに　きけんだ。"
        en:
          heart_gold: "It is extremely ill-tempered.\nGroups of them will attack any\nhandy target for no reason."
          soul_silver: "It’s unsafe to approach if it gets\nviolently enraged for no reason and\ncan’t distinguish friends from foes."
        fr:
          heart_gold: "Agressif et de mauvais caractère,\nil attaque ses proies en bande dès\nqu’il en repère une à proximité."
          soul_silver: "Il ne peut dissocier ses amis de\nses ennemis et a tendance à enrager\nlorsqu’on l’approche."
        it:
          heart_gold: "Ha un pessimo carattere. Può\nattaccare in gruppo qualsiasi\nobiettivo senza alcuna ragione."
          soul_silver: "Se è tanto arrabbiato da non riuscire\npiù a distinguere gli amici dai nemici,\nè pericoloso avvicinarsi."
        de:
          heart_gold: "Es ist extrem jähzornig. Tritt es\nin Gruppen auf, greift es grundlos\nalles an, was in Reichweite ist."
          soul_silver: "Da es grundlos angreift und nicht\nzwischen Freund oder Feind unter-\nscheidet, ist es sehr gefährlich."
        es:
          heart_gold: "Tiene muy mal humor.\nEn grupo ataca cualquier\ncosa sin motivo aparente."
          soul_silver: "Es peligroso acercarse si se enfada\nsin razón aparente, ya que no\ndistingue entre amigos y enemigos."
        ko:
          heart_gold: "항상 화를 내고 있다.\n적당한 먹이를 발견하면\n무리를 이루어 덤벼든다."
          soul_silver: "이유없이 화내고 날뛰기 시작하면\n동료도 구별하지 못하기 때문에\n가까이 가는 것은 매우 위험하다."
primeape:
  species_id: 57
  names:
    jp_kana: オコリザル
    en: PRIMEAPE
    fr: COLOSSINGE
    it: PRIMEAPE
    de: RASAFF
    es: PRIMEAPE
    ko: 성원숭
