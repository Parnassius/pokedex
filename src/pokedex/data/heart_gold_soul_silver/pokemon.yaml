      descriptions:
        jp_kana:
          heart_gold: "ちからのない　なさけない　ポケモン。\nたまに　たかく　とびはねても\n２メートルを　こすのが　やっとだ。"
          soul_silver: "とにかくはねる。いみもなく　はねる。\nはねているときに　とんできた\nピジョンなどに　つかまってしまう。"
        en:
          heart_gold: "An underpowered, pathetic Pokémon.\nIt may jump high on rare occasions,\nbut usually not more than seven feet."
          soul_silver: "For no reason, it jumps and splashes\nabout, making it easy for predators\nlike PIDGEOTTO to catch it mid-jump."
        fr:
          heart_gold: "Un Pokémon tout à fait pathétique.\nC’est à peine s’il peut sauter plus\nde 2 mètres en hauteur."
          soul_silver: "Il effectue des bonds hors de\nl’eau, faisant de lui une proie\nfacile pour les ROUCOUPS."
        it:
          heart_gold: "Un Pokémon debole, patetico. In\nrare occasioni può saltare in alto,\ndi solito non più di due metri."
          soul_silver: "Salta e sguazza senza ragione.\nPer predatori come PIDGEOTTO\nè facile catturarlo al volo."
        de:
          heart_gold: "Ein schwaches und träges Pokémon.\nManchmal springt es sehr hoch,\naber selten höher als zwei Meter."
          soul_silver: "Es springt grundlos in die Luft.\nDas macht es einfach für Räuber\nwie TAUBOGA, es im Sprung zu fangen."
        es:
          heart_gold: "Un Pokémon desvalido y patético.\nA veces es capaz de saltar alto,\npero rara vez más de dos metros."
          soul_silver: "Salta y chapotea sin razón alguna.\nEs una presa fácil para PIDGEOTTO,\nque lo atrapa en pleno salto."
        ko:
          heart_gold: "힘없는 한심한 포켓몬이다.\n가끔 높이 뛰어오르지만\n2m를 넘는 게 고작이다."
          soul_silver: "아무튼 튀어오른다. 이유도 없이\n튀어오른다. 튀어오르고 있을 때\n날아온 피죤 등에게 잡혀버린다."
gyarados:
  species_id: 130
  names:
    jp_kana: ギャラドス
    en: GYARADOS
    fr: LEVIATOR
    it: GYARADOS
    de: GARADOS
    es: GYARADOS
    ko: 갸라도스
