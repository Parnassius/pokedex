          soul_silver: "こどもを　まもるためなら\nどんなに　キズついても　けっして\nたたかいを　あきらめない。"
        en:
          heart_gold: "If it is safe, the young gets out of\nthe belly pouch to play. The adult\nkeeps a close eye on the youngster."
          soul_silver: "To protect its young, it will\nnever give up during battle, no\nmatter how badly wounded it is."
        fr:
          heart_gold: "Dans les endroits sûrs, le\npetit quitte sa poche pour jouer\nsous la protection des adultes."
          soul_silver: "Pour protéger ses petits, il\nn’abandonnera jamais un combat,\nquel que soit son état."
        it:
          heart_gold: "Se è al sicuro, il piccolo esce dal\nmarsupio e inizia a giocare sotto\ngli occhi vigili dell’adulto."
          soul_silver: "Per proteggere i piccoli non si arrende\nmai nella lotta; poco importa quanto\ngravi siano le sue ferite."
        de:
          heart_gold: "Fühlt es sich sicher, dann ver-\nlässt das Junge den Beutel. Die\nMutter behält es ständig im Auge."
          soul_silver: "Um sein Junges zu beschützen, gibt\nes einen Kampf nie auf, egal\nwie schwer verwundet es ist."
        es:
          heart_gold: "Si no hay peligro, el joven sale de\nla bolsa y juega. El adulto vigila\natentamente al joven."
          soul_silver: "Para proteger a su pequeño,\nnunca abandonará el combate,\nsin importar lo herido que esté."
        ko:
          heart_gold: "안전한 장소라면 새끼도\n배의 주머니에서 나와서 논다.\n어미는 그것을 가만히 지켜본다."
          soul_silver: "자식을 지키기 위해서라면\n아무리 상처를 입더라도 절대\n싸움을 멈추지 않는다."
horsea:
  species_id: 116
  names:
    jp_kana: タッツー
