          soul_silver: "たいないの　どくガスは　くうきより\nすこし　かるい　せいぶん。だから\nいつも　すこしだけ　うかんでいる。"
        en:
          heart_gold: "Its thin, filmy body is filled\nwith gases that cause constant\nsniffles, coughs and teary eyes."
          soul_silver: "The poisonous gases it contains\nare a little bit lighter than air,\nkeeping it slightly airborne."
        fr:
          heart_gold: "Sa fine enveloppe est remplie de\ngaz qui provoquent en permanence\ndes reniflements et des irritations."
          soul_silver: "Les gaz nocifs qu’il contient\nsont un peu plus légers que l’air\net le maintiennent en lévitation."
        it:
          heart_gold: "Il suo corpo rarefatto e sottile\nè composto da gas che causano\nraffreddori, tosse e lacrimazione."
          soul_silver: "I gas velenosi che contiene sono di\npoco più leggeri dell’aria, perciò\nresta sollevato da terra."
        de:
          heart_gold: "Sein dünner Körper ist mit Gasen\nangefüllt, die Husten und Schnupfen\nverursachen und die Augen reizen."
          soul_silver: "Das Giftgas, das es umgibt, ist\netwas leichter als Luft. Dadurch\nschwebt es in geringer Höhe."
        es:
          heart_gold: "Su fino y delgado cuerpo está lleno\nde gases que causan tos, lagrimeos\nconstantes y estornudos."
          soul_silver: "Los gases venenosos que\ncontiene son más ligeros que el\naire, y por eso puede flotar."
        ko:
          heart_gold: "얇은 막과 같은 몸에는\n눈물, 기침, 콧물을\n멈출 수 없게 하는 가스가 가득하다."
          soul_silver: "체내의 독가스는 공기보다\n약간 가벼운 성분이다. 그래서\n항상 공중에 약간 떠 있다."
weezing:
  species_id: 110
  names:
    jp_kana: マタドガス
