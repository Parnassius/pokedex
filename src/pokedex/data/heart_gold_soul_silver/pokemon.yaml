          soul_silver: "ほほの　でんきぶくろに　たまった\nでんきが　さいだいりょうに　なると\nりょうみみは　まっすぐ　のびる。"
        en:
          heart_gold: "When its electricity builds, its\nmuscles are stimulated, and it becomes\nmore aggressive than usual."
          soul_silver: "If the electric pouches in its\ncheeks become fully charged,\nboth ears will stand straight up."
        fr:
          heart_gold: "Quand son taux d’énergie monte,\nses muscles se contractent et il\ndevient plus agressif."
          soul_silver: "Ses oreilles se dressent lorsque\nles poches à électricité sur ses\njoues sont remplies."
        it:
          heart_gold: "Se l’elettricità aumenta, i muscoli\nsono sollecitati e diventa più\naggressivo del solito."
          soul_silver: "Se le tasche elettriche sulle sue\nguance si caricano completamente,\ngli si rizzano le orecchie."
        de:
          heart_gold: "Wenn es sich auflädt, zucken seine\nMuskeln und es wird aggressiver\nund kampflustiger."
          soul_silver: "Wenn seine Backentaschen voll auf-\ngeladen sind, stehen seine beiden\nOhren senkrecht nach oben."
        es:
          heart_gold: "Cuando se carga de electricidad,\nsus músculos se tensan y se vuelve\nmás agresivo de lo normal."
          soul_silver: "Si sus mejillas se cargan por\ncompleto de electricidad,\nambas orejas se levantarán."
        ko:
          heart_gold: "전기가 모이면\n근육이 자극되어 여느 때보다\n공격적이 된다."
          soul_silver: "양 볼의 전기 주머니에 모인\n전기가 가득 차게 되면\n두 귀가 곧게 선다."
sandshrew:
