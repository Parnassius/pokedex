          soul_silver: "９ほんの　うつくしい　しっぽには\n１０００ねん　いきるだけの\nふしぎなエネルギーが　つまっている。"
        en:
          heart_gold: "Some legends claim that each of its\nnine tails has its own unique type\nof special mystical power."
          soul_silver: "Its nine beautiful tails are filled\nwith a wondrous energy that could\nkeep it alive for 1,000 years."
        fr:
          heart_gold: "Selon la légende, chacune de ses\nneuf queues possède un pouvoir\nmagique, unique et spécial."
          soul_silver: "Ses neufs magnifiques queues sont\nremplies d’une énergie incroyable\nlui assurant une vie de 1 000 ans!"
        it:
          heart_gold: "Narra la leggenda che ognuna\ndelle sue nove code abbia uno\nspecifico potere magico."
          soul_silver: "Le nove belle code sono cariche\ndi una favolosa energia, capace\ndi tenerlo in vita per mille anni."
        de:
          heart_gold: "Eine Legende sagt, dass jedem\nseiner neun Schwänze eine einzig-\nartige mystische Kraft innewohnt."
          soul_silver: "Seine neun schönen Schweife sind \nerfüllt von einer magischen Energie,\num es 1 000 Jahre leben zu lassen."
        es:
          heart_gold: "Cuentan algunas leyendas que cada\nuna de sus nueve colas posee su\npropio y único poder místico."
          soul_silver: "Sus nueve bonitas colas están llenas\nde una maravillosa energía que podría\nmantenerlo vivo durante mil años."
        ko:
          heart_gold: "9개의 꼬리에는 각각\n다른 신비한 힘이\n숨어 있다고 한다."
          soul_silver: "9개의 아름다운 꼬리에는\n1000년을 살아가는\n신비한 에너지가 담겨 있다."
jigglypuff:
