      descriptions:
        jp_kana:
          heart_gold: "じゆうに　あごを　はずせるので\nおおきな　えものでも　のみこめるが\nおもくなって　うごけなくなる。"
          soul_silver: "いつもは　くさむらに　かくれている。\nうまれたては　どくを　もたないので\nかまれても　いたいだけだ。"
        en:
          heart_gold: "It can freely detach its jaw to\nswallow large prey whole. It can\nbecome too heavy to move, however."
          soul_silver: "It always hides in grass. When first\nborn, it has no poison, so its\nbite is painful, but harmless."
        fr:
          heart_gold: "Sa mâchoire peut se désarticuler\nafin d’avaler de larges proies. Il\ndevient alors trop gros pour bouger."
          soul_silver: "Il se cache dans les hautes herbes.\nA sa naissance, il n’a pas de poison\nmais sa morsure est douloureuse."
        it:
          heart_gold: "Sposta facilmente la mandibola\nper ingoiare grosse prede.\nPer il peso, si muove con difficoltà."
          soul_silver: "Si nasconde sempre nell’erba. Appena\nnato non ha veleno, quindi la sua\npuntura è dolorosa, ma non velenosa."
        de:
          heart_gold: "Es hängt seinen Kiefer aus, um\nBeute zu verschlingen. Es ist\ndann zu schwer, um zu kriechen."
          soul_silver: "Es versteckt sich stets im Gras.\nBei Geburt hat es noch kein Gift.\nSein Biss tut weh, ist aber harmlos."
        es:
          heart_gold: "Puede separar su mandíbula para\nengullir grandes presas, aunque\nesto le dificulte el movimiento."
          soul_silver: "Siempre se esconde en la hierba. Como\nno tiene veneno al nacer, su mordisco\nes doloroso pero inofensivo."
        ko:
          heart_gold: "자유롭게 턱을 뺄 수 있어서\n큰 먹이도 삼킬 수 있지만\n무거워져서 움직일 수 없게 된다."
          soul_silver: "보통은 풀숲에 숨어지낸다.\n아기 때는 독을 지니지 않아\n물려도 조금 아플 뿐이다."
arbok:
  species_id: 24
  names:
    jp_kana: アーボック
    en: ARBOK
    fr: ARBOK
    it: ARBOK
    de: ARBOK
    es: ARBOK
    ko: 아보크
