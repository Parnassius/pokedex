      descriptions:
        jp_kana:
          heart_gold: "どんなときでも　ぜんりょくで\nこうどう　するが　つかれたりしない\nタフで　じょうぶな　ポケモン。"
          soul_silver: "ぜんしんの　きんにくに　ちからが\nみなぎっている。じっと　していても\nすごい　いあつかんを　だしている。"
        en:
          heart_gold: "It always goes at its full power,\nbut this very tough and durable\nPokémon never gets tired."
          soul_silver: "The muscles covering its body teem\nwith power. Even when still, it\nexudes an amazing sense of strength."
        fr:
          heart_gold: "Il se donne toujours à fond, mais\nce Pokémon ne se fatigue jamais.\nIl est très résistant à l’effort."
          soul_silver: "Tous les muscles de son corps\nregorgent de puissance. Il\ndégage une aura redoutable."
        it:
          heart_gold: "Utilizza sempre il massimo della sua\nenergia, ma questo Pokémon forte\ne resistente non si stanca mai."
          soul_silver: "I muscoli del suo corpo traboccano\ndi forza. Anche da fermo trasmette\nun incredibile senso di potenza."
        de:
          heart_gold: "Es kämpft immer mit all seiner\nKraft. Dieses Pokémon hat eine\nenorme Kondition und wird nie müde."
          soul_silver: "Sein muskulöser Körper strotzt vor\nKraft. Sein Körper strahlt auch im\nRuhezustand pure Kraft aus."
        es:
          heart_gold: "Siempre va a máxima potencia,\npero este fuerte y resistente\nPokémon no se cansa nunca."
          soul_silver: "Los músculos que cubren su cuerpo\nirradian poder. Aun inmóvil,\nrezuma una fuerza increíble."
        ko:
          heart_gold: "어떤 때라도 전력으로\n행동하지만 지치지 않는\n터프하고 튼튼한 포켓몬이다."
          soul_silver: "전신에 근육의 힘이\n가득 넘친다. 가만히 있어도\n엄청난 압박감을 느끼게 한다."
machamp:
