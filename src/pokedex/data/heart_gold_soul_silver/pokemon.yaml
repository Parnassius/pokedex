          heart_gold: "おなかの　うずは　びみょうに\nうねっているので　じっと　みていると\nだんだん　ねむくなってしまう。"
          soul_silver: "ぜんしんの　ひふは　しめっているが\nおなかの　うずまきの　ぶぶんの\nかんしょくは　すべすべと　している。"
        en:
          heart_gold: "The swirl on its belly subtly undulates.\nStaring at it may gradually\ncause drowsiness."
          soul_silver: "The skin on most of its body is\nmoist. However, the skin on its\nbelly spiral feels smooth."
        fr:
          heart_gold: "Le tourbillon sur son ventre bouge\nlégèrement. Le regarder longtemps\npeut engendrer une somnolence."
          soul_silver: "Sur la plus grande partie de son\ncorps, sa peau est moite. La peau de\nsa spirale est très douce."
        it:
          heart_gold: "La spirale disegnata sulla pancia\ngira piano. Fissandola, si cade\nlentamente addormentati."
          soul_silver: "Ha la pelle umida su gran parte del\ncorpo. Quella della spirale che\nha sulla pancia è liscia."
        de:
          heart_gold: "Die Spirale auf seinem Bauch dreht\nsich langsam. Wer sie zu lange an-\nsieht, verfällt in eine Art Hypnose."
          soul_silver: "Der Großteil seiner Haut ist\nfeucht. Dennoch ist die Haut um\nseine Spirale glatt und weich."
        es:
          heart_gold: "La espiral de su pecho se ondula\ndelicadamente. Mirarlo provoca\ngradualmente un estado de sopor."
          soul_silver: "Gran parte de su piel es\nesponjosa. Sin embargo, la piel\nde su espiral es muy suave."
        ko:
          heart_gold: "배의 소용돌이가 미묘하게\n꾸불거리므로 가만히 보고 있으면\n점점 잠이 오게 된다."
          soul_silver: "전신의 피부는 젖어 있지만\n배의 소용돌이 부분의\n감촉은 미끈미끈하다."
poliwrath:
