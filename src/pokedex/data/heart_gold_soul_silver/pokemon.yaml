          soul_silver: "どんな　かんきょうでも\nおおきくなると　さゆうたいしょうの\nきかがくてきなボディに　そだつ。"
        en:
          heart_gold: "The middle section of its body is\ncalled the core. It glows in a\ndifferent color each time it is seen."
          soul_silver: "Regardless of the environment it\nlives in, its body grows to form a\nsymmetrical geometric shape."
        fr:
          heart_gold: "La partie centrale de son corps\nest appelée le cœur. Il brille d’une\ncouleur différente à chaque fois."
          soul_silver: "Quel que soit son environnement, son\ncorps grandit de façon à créer une\nforme géométrique et symétrique."
        it:
          heart_gold: "La parte centrale del suo corpo è\nchiamata nucleo. Ogni volta ha\nun colore diverso."
          soul_silver: "Indipendentemente da dove vive,\nil suo corpo cresce assumendo una\nforma geometrica simmetrica."
        de:
          heart_gold: "Der Mittelteil seines Körpers wird\nKern genannt. Bei jedem Hinsehen\nleuchtet er in einer anderen Farbe."
          soul_silver: "Egal, wo es auch aufwächst, sein\nKörper entwickelt sich stets zu\neiner geometrischen Figur."
        es:
          heart_gold: "La parte central de su cuerpo se\ndenomina núcleo. Brilla en colores\ndiferentes cada vez que es visto."
          soul_silver: "Sin tener en cuenta el entorno\nen el que vive, su cuerpo crece\npara formar una figura geométrica."
        ko:
          heart_gold: "몸의 중앙에 있는\n핵이라고 불리는 부분은 볼 때마다\n다른 색의 빛을 발산한다."
          soul_silver: "어떠한 환경에서든\n자라나면 좌우대칭의\n기하학적인 몸으로 성장한다."
mr_mime:
  species_id: 122
  names:
    jp_kana: バリヤード
