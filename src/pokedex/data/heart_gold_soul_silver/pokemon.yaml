        jp_kana:
          heart_gold: "カラのなかは　しんかの　じゅんびで\nとても　やわらかく　くずれやすい。\nなるべく　うごかないようにしている。"
          soul_silver: "いっしょうけんめい　そとがわの\nカラをかため　しんかの　じゅんびで\nやわらかい　からだを　まもっている。"
        en:
          heart_gold: "Inside the shell, it is soft and\nweak as it prepares to evolve.\nIt stays motionless in the shell."
          soul_silver: "It prepares for evolution by hardening\nits shell as much as possible\nto protect its soft body."
        fr:
          heart_gold: "Son corps, sous sa carapace, est\nmou et tendre. Il reste immobile\nen attendant d’évoluer."
          soul_silver: "Avant d’évoluer, il durcit autant\nque possible sa carapace pour\nprotéger son corps vulnérable."
        it:
          heart_gold: "Morbido e debole dentro al suo\nguscio, si prepara ad evolversi.\nNel guscio non fa alcun movimento."
          soul_silver: "Prepara l’evoluzione indurendo\nil guscio il più possibile per\nproteggere il morbido corpo."
        de:
          heart_gold: "Im Inneren ist es weich, da es sich\nauf seine Entwicklung vorbereitet.\nEs bewegt sich dabei nicht."
          soul_silver: "Steht seine Entwicklung bevor,\nhärtet es seine Schale, um seinen\nempfindlichen Körper zu schützen."
        es:
          heart_gold: "En el caparazón, mientras se\nprepara para evolucionar, está\nblando y débil, en estado catatónico."
          soul_silver: "Prepara su evolución\nfortaleciendo su caparazón\npara proteger su débil cuerpo."
        ko:
          heart_gold: "껍질 안은 진화를 준비하느라\n매우 부드럽고 부서지기 쉽다.\n되도록 움직이지 않으려 한다."
          soul_silver: "열심히 바깥쪽에\n껍질을 만들고 진화 준비를 하여\n부드러운 몸을 보호하고 있다."
butterfree:
