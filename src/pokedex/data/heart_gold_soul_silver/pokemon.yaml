          soul_silver: "Un Pokémon qui parcourt le monde.\nOn dit qu’il en naît un à chaque fois\nqu’un volcan apparaît."
        it:
          heart_gold: "Se abbaia, fa eruttare i vulcani.\nSfoga la sua incontenibile\npotenza correndo dappertutto."
          soul_silver: "Un Pokémon che corre in lungo\ne in largo. Si dice che nasca ogni\nvolta che si forma un nuovo vulcano."
        de:
          heart_gold: "Sein Bellen löst Eruptionen aus. Es\nkann seine Kraft nicht zügeln und\nes streift rastlos durchs Land."
          soul_silver: "Dieses Pokémon jagt über das Land.\nMan sagt, in jedem neuen Vulkan\nwird ein ENTEI geboren."
        es:
          heart_gold: "Cuando ruge, los volcanes entran\nen erupción. Como no puede controlar\nsu poder, corre siempre sin pausa."
          soul_silver: "Un Pokémon que corre por la\ntierra. Dicen que siempre nace uno\ncuando aparece un nuevo volcán."
        ko:
          heart_gold: "울부짖으면 화산이 분화한다.\n넘쳐흐르는 힘을 주체하지 못하고\n길이란 길은 모두 돌아다닌다."
          soul_silver: "새로운 화산이 생길 때마다\n태어난다고 전해지는\n대지를 달리는 포켓몬이다."
