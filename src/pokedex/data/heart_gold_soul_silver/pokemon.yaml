      descriptions:
        jp_kana:
          heart_gold: "いつも　いっぽんあしで　たっている。\nあしを　いれかえる　しゅんかんは\nすばやくて　なかなか　みられない。"
          soul_silver: "たいないの　じかんの　かんかくは\nどんなときでも　せいかくで\nきまった　リズムで　くびをかしげる。"
        en:
          heart_gold: "It always stands on one foot.\nIt changes feet so fast,\nthe movement can rarely be seen."
          soul_silver: "It has a perfect sense of time.\nWhatever happens, it keeps rhythm by\nprecisely tilting its head in time."
        fr:
          heart_gold: "Il se tient toujours sur un pied.\nIl change de pied si vite qu’on peut\nà peine distinguer ce mouvement."
          soul_silver: "Il a un sens du timing parfait.\nIl reste toujours en rythme en\nbalançant sa tête."
        it:
          heart_gold: "Sta sempre su un piede solo.\nCambia piede così rapidamente\nche è raro vederlo mentre lo fa."
          soul_silver: "Ha un eccezionale senso del ritmo.\nTiene il tempo piegando la testa\na intervalli regolari."
        de:
          heart_gold: "Es steht immer auf einem Bein. Es\nwechselt sein Standbein so\nschnell, dass man es kaum sieht."
          soul_silver: "Sein Zeitgefühl ist perfekt. Was\nauch immer passiert, es behält\nden Rhythmus, da sein Kopf wackelt."
        es:
          heart_gold: "Camina con una sola pata.\nCambia tan rápidamente de\npata que apenas se le ve."
          soul_silver: "Su percepción del tiempo es exacta.\nOcurra lo que ocurra, lleva\nel ritmo moviendo la cabeza."
        ko:
          heart_gold: "항상 한 발로 서 있다.\n발을 교체하는 순간이\n빨라서 좀처럼 볼 수 없다."
          soul_silver: "체내의 시간 감각은\n어느 때든 정확해서\n규칙적인 리듬으로 목을 기울인다."
noctowl:
  species_id: 164
