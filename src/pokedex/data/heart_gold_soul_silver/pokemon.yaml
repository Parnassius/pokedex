      descriptions:
        jp_kana:
          heart_gold: "まわりの　ねつを　うばっている。\nとつぜん　さむけが　するのは\nゲンガーが　あらわれたからだ。"
          soul_silver: "いのちを　うばおうと　きめた\nえものの　かげに　もぐりこみ\nじっと　チャンスを　ねらってる。"
        en:
          heart_gold: "It steals heat from its surroundings.\nIf you feel a sudden chill,\nit is certain that a GENGAR appeared."
          soul_silver: "To steal the life of its target, it\nslips into the prey’s shadow and\nsilently waits for an opportunity."
        fr:
          heart_gold: "Il capture la chaleur de son\nentourage. Quand l’air se rafraîchit,\nc’est qu’ECTOPLASMA est là."
          soul_silver: "Il se cache dans l’ombre de sa\nvictime et, le moment venu, lui\nvole son énergie vitale."
        it:
          heart_gold: "Assorbe calore dall’ambiente. Se si\nsente un brivido di gelo improvviso,\nè senz’altro apparso un GENGAR."
          soul_silver: "Per sottrarre energia alla vittima si\nnasconde nella sua ombra e attende\nin silenzio il momento opportuno."
        de:
          heart_gold: "Es entzieht seiner Umgebung Wärme.\nWird dir plötzlich kalt, ist bestimmt\nein GENGAR in der Nähe."
          soul_silver: "Um Gegner zu besiegen, stellt\nes sich in deren Schatten und war-\ntet auf eine günstige Gelegenheit."
        es:
          heart_gold: "Roba el calor de sus alrededores.\nSi sientes un escalofrío, seguro\nque hay algún GENGAR cerca."
          soul_silver: "Para quitar la vida a su presa,\nse desliza en su sombra y espera\nsu oportunidad en silencio."
        ko:
          heart_gold: "주변의 열을 빼앗고 있다.\n갑자기 한기가 느껴지는 것은\n팬텀이 나타났기 때문이다."
          soul_silver: "생명을 빼앗으려고 정한\n먹이의 그림자에 숨어들어\n꼼짝하지 않고 기회를 노리고 있다."
onix:
