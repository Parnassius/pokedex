      descriptions:
        jp_kana:
          heart_gold: "４ほんのうでを　すばやく　うごかし\nあらゆる　かくどから　やすむことなく\nパンチや　チョップを　たたきこむ。"
          soul_silver: "４ほんのうでで　あいての　てあしを\nおさえこみ　じゆうを　うばうと\nちへいせんのむこうまで　なげとばす。"
        en:
          heart_gold: "It quickly swings its four arms to\nrock its opponents with ceaseless\npunches and chops from all angles."
          soul_silver: "It uses its four powerful arms to\npin the limbs of its foe, then\nthrows the victim over the horizon."
        fr:
          heart_gold: "Il balance ses quatre bras avec\nviolence pour broyer son\nadversaire sous une pluie de coups."
          soul_silver: "Il se sert de ses quatre bras pour\nenserrer les membres de sa victime\npuis il la projette au loin."
        it:
          heart_gold: "Agita velocemente le quattro\nbraccia scuotendo gli avversari\ncon pugni e colpi da ogni direzione."
          soul_silver: "Con le sue quattro potenti braccia\nafferra gli arti del nemico per poi\nlanciarlo lontano."
        de:
          heart_gold: "Es verwendet seine vier Arme, um\nseine Gegner mit Schlägen aus\nallen Winkeln einzudecken."
          soul_silver: "Es setzt seine vier Arme ein, um\ndie Glieder seiner Gegner festzuhal-\nten. Dann wirft es sie hinfort."
        es:
          heart_gold: "Mueve rápidamente sus cuatro brazos\npara golpear con incesantes golpes\ny puñetazos desde todos los ángulos."
          soul_silver: "Usa sus cuatro poderosos brazos\npara agarrar a su enemigo y\nlanzarlo lo más lejos posible."
        ko:
          heart_gold: "4개의 팔을 재빠르게 움직여서\n모든 각도에서 쉬지 않고\n펀치와 당수를 날린다."
          soul_silver: "4개의 팔로 상대방의 손발을\n붙잡아 꼼짝 못하게 만들고\n지평선 멀리까지 던져버린다."
bellsprout:
