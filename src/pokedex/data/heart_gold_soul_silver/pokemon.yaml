          soul_silver: "ひるまは　むやみやたらと　げんきに\nうごきまわるが　ひが　しずむと\nばったり　うごかなくなる。"
        en:
          heart_gold: "It converts sunlight into energy.\nIn the darkness after sunset, it\ncloses its petals and becomes still."
          soul_silver: "In the daytime, it rushes about in a\nhectic manner, but it comes to a\ncomplete stop when the sun sets."
        fr:
          heart_gold: "Il convertit la lumière du soleil\nen énergie. Quand la nuit tombe,\nses pétales se referment."
          soul_silver: "Durant la journée, il erre sans\nbut, mais dès la tombée de la\nnuit, il s’arrête complètement."
        it:
          heart_gold: "Converte la luce solare in energia.\nNell’oscurità, dopo il tramonto,\nrichiude i petali e si fa quieto."
          soul_silver: "Di giorno si muove freneticamente,\nma quando cala il sole si ferma e\ninterrompe ogni attività."
        de:
          heart_gold: "Es wandelt Sonnenlicht in Energie.\nNach Sonnenuntergang schließt es\nseine Blüten und wird still."
          soul_silver: "Tagsüber rennt es hektisch umher,\naber sobald die Sonne unterge-\ngangen ist, wird es bewegungslos."
        es:
          heart_gold: "Convierte la luz solar en energía.\nEn la oscuridad, tras el atardecer,\ncierra sus pétalos y queda inmóvil."
          soul_silver: "De día, corre histérico de un lado\na otro, pero cuando se pone el sol,\nse detiene por completo."
        ko:
          heart_gold: "햇살을 에너지로 바꾼다.\n태양이 저물어 어두워지면\n꽃잎을 닫고 멈춰 서 있다."
          soul_silver: "낮에는 지나칠 정도로 활발히\n돌아다니지만 해가 저물면\n돌연 움직이지 않게 된다."
