          soul_silver: "からだの　せいぶんは　もうどく。\nうっかり　ふれてしまうと\nねつを　だして　ねこんでしまう。"
        en:
          heart_gold: "They love to gather in smelly areas\nwhere sludge accumulates, making\nthe stench around them worse."
          soul_silver: "Its body is made of a powerful poison.\nTouching it accidentally will\ncause a fever that requires bed rest."
        fr:
          heart_gold: "Il recherche les endroits sales où\nil y a des ordures pour y établir\nson habitat puant et infect."
          soul_silver: "Son corps sécrète un puissant poison\npouvant causer de violents accès de\nfièvre en cas de contact."
        it:
          heart_gold: "Amano riunirsi vicino a puzzolenti\nliquami di scolo, rendendo il\nfetore ancora più intenso."
          soul_silver: "Il suo corpo è fatto di un potente\nveleno. Il contatto con esso causa\nfebbre alta e obbliga a stare a letto."
        de:
          heart_gold: "Sie treffen sich an stinkenden\nOrten, an denen der Schleim sich\ntürmt. Dies merkt man am Gestank."
          soul_silver: "Sein Körper besteht aus Gift.\nEine zufällige Berührung reicht\naus, um fiebrig im Bett zu liegen."
        es:
          heart_gold: "Les encanta reunirse en zonas\napestosas donde se acumula el lodo,\nhaciendo su olor más insoportable."
          soul_silver: "Su cuerpo está hecho de un veneno\nmuy potente. Si se toca, causa\nfiebre y obliga a guardar cama."
        ko:
          heart_gold: "진흙이 쌓여 악취가 나는 장소를\n좋아해서 모여들기 때문에\n주변은 더욱 악취가 난다."
          soul_silver: "몸의 성분은 맹독이다.\n실수로 만지게 되면\n열이 나서 눕게 된다."
shellder:
