          soul_silver: "キバが　ながくて　おおきいほど\nむれのなかでの　ランクが　たかい。\nキバがのびるには　じかんがかかる。"
        en:
          heart_gold: "It has sharp, hard tusks and a\nrugged hide. Its tackle is strong\nenough to knock down a house."
          soul_silver: "The longer and bigger its tusks,\nthe higher its rank in its herd.\nThe tusks take long to grow."
        fr:
          heart_gold: "Il a des défenses aiguisées et une\npeau épaisse. Ses charges peuvent\ndétruire une maison."
          soul_silver: "Plus grandes sont ses défenses, plus\nhaut est son rang dans le troupeau.\nElles poussent lentement."
        it:
          heart_gold: "Ha zanne dure e affilate e la\npelle grinzosa. La sua Azione è\ncosì forte da abbattere una casa."
          soul_silver: "Più grandi sono le zanne, più\nalto è il suo rango nel branco.\nLe zanne crescono lentamente."
        de:
          heart_gold: "Aufgrund seiner scharfen Stoßzähne\nund seiner rauen Haut könnte es\nmit Tackle ein Haus niederreißen."
          soul_silver: "Je größer und länger die Stoß-\nzähne, desto höher ist ihr Rang in\nder Herde, doch das dauert lange."
        es:
          heart_gold: "Tiene afilados y duros colmillos, y\nuna gruesa piel. Su Placaje es tan\nfuerte que puede derribar una casa."
          soul_silver: "Cuanto más grandes son sus colmillos,\nmayor su estatus en la manada. Los\ncolmillos tardan mucho en crecer."
        ko:
          heart_gold: "예리하고 단단한 이빨과\n더욱 튼튼한 피부의 \n몸통박치기는 집도 부술 정도다."
          soul_silver: "송곳니가 길고 클수록\n무리 중에서 서열이 높다.\n송곳니가 자라는 데는 시간이 걸린다."
porygon2:
