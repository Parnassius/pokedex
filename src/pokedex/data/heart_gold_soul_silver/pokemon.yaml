          heart_gold: "Les légendes racontent qu’il survole\nle monde en permanence grâce\nà ses merveilleuses ailes colorées."
          soul_silver: "Son corps brille des sept couleurs\nde l’arc-en-ciel, arc-en-ciel qui se\nconstitue derrière lui quand il vole."
        it:
          heart_gold: "Narra la leggenda che questo Pokémon\nsorvoli instancabilmente il mondo\ncon splendide ali dai sette colori."
          soul_silver: "Narra la leggenda che il suo corpo\nbrilli di sette colori. Volando lascia\nun arcobaleno dietro di sé."
        de:
          heart_gold: "Man sagt, dass dieses Pokémon\nauf seinen siebenfarbigen Schwingen\ndurch die Lüfte fliegt."
          soul_silver: "Sein Körper soll in sieben Farben\nleuchten. Im Flug zieht es\neinen Regenbogen hinter sich her."
        es:
          heart_gold: "Cuenta la leyenda que este Pokémon\nvuela por el cielo con sus\nmagníficas alas de siete colores."
          soul_silver: "Cuenta la leyenda que brilla en\nsiete colores. Dicen que deja\nun arcoíris tras de sí al volar."
        ko:
          heart_gold: "무지개색의 훌륭한 날개로\n세계의 하늘을 날고 있다는\n신화로 전해지는 포켓몬이다."
          soul_silver: "몸은 일곱 빛으로 빛나고\n날아간 자리에는 무지개가 생긴다는\n신화 속에 남아 있는 포켓몬이다."
