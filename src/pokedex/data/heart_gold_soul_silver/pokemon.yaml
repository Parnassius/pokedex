      descriptions:
        jp_kana:
          heart_gold: "ぜんしん　はりのような　ウロコで\nおおわれている。どんな　こうげきにも\nひるんだ　ようすは　みせない。"
          soul_silver: "ウロコで　おおわれた　がんじょうな\nからだで　すあなの　いりぐちをふさぎ\nてきから　こどもたちを　まもる。"
        en:
          heart_gold: "Its body is covered with needle-like\nscales. It never shows signs\nof shrinking from any attack."
          soul_silver: "It uses its scaly, rugged body to\nseal the entrance of its nest and\nprotect its young from predators."
        fr:
          heart_gold: "Son corps est couvert de pointes\nformant une carapace très\nrésistante qui le protège en combat."
          soul_silver: "Il se sert de son corps lourdement\nprotégé pour empêcher les\nprédateurs d’accéder à son nid."
        it:
          heart_gold: "Il suo corpo è coperto di squame\nappuntite. Non indietreggia\ndavanti ad alcun attacco."
          soul_silver: "Con il suo corpo robusto e squamoso\nsbarra l’accesso alla tana e\nprotegge i piccoli dai predatori."
        de:
          heart_gold: "Sein Körper ist mit nadelähnlichen\nSchuppen bedeckt. Dies macht\nes gegen Attacken nahezu immun."
          soul_silver: "Es benutzt seinen schuppigen Kör-\nper, um den Höhleneingang als\nSchutz für seine Jungen zu sperren."
        es:
          heart_gold: "Su cuerpo está cubierto por\npequeñas escamas. Nunca parece\nacobardarse ante ningún ataque."
          soul_silver: "Usa su cuerpo duro y escamoso para\nsellar la entrada a su madriguera\ny protegerse de los depredadores."
        ko:
          heart_gold: "전신이 바늘 같은 비늘로\n뒤덮여 있다. 어떤 공격에도\n풀이 죽은 모습은 보이지 않는다."
          soul_silver: "비늘로 뒤덮인 튼튼한\n몸으로 둥지의 입구를 막아\n상대로부터 새끼들을 지킨다."
nidoran_m:
  species_id: 32
