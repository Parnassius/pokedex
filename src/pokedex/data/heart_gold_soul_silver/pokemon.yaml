        jp_kana:
          heart_gold: "つきのひかりを　あびて　めざめると\nあちこち　うごきまわる。ひるまは\nじめんのなかで　じっとしている。"
          soul_silver: "つきのひかりを　あびて　うごきだす。\nよるのあいだに　タネを　あちこちに\nばらまくため　あるきまわる。"
        en:
          heart_gold: "Awakened by moonlight, it roams\nactively at night. In the day, it stays\nquietly underground."
          soul_silver: "If exposed to moonlight, it\nstarts to move. It roams far and\nwide at night to scatter its seeds."
        fr:
          heart_gold: "La lumière de la lune le rend\ntrès actif. Pendant la journée,\nil se dissimule sous la terre."
          soul_silver: "Il ne se déplace pour disséminer\nses graines que lorsqu’il est\nexposé aux rayons de lune."
        it:
          heart_gold: "Gira di notte, svegliandosi con\nla luce lunare. Di giorno se ne\nsta tranquillamente sottoterra."
          soul_silver: "Inizia a muoversi quando è esposto\nalla luce lunare. Di notte percorre\ngrandi distanze spargendo semi."
        de:
          heart_gold: "Es erwacht bei Mondschein und\nwandert rastlos. Tagsüber versteckt\nes sich still unter der Erde."
          soul_silver: "Wird es vom Mondschein getroffen,\nbewegt es sich. Nachts wandert es\nweite Wege, um Samen zu streuen."
        es:
          heart_gold: "Despertado por la luz de la luna,\nvaga por la noche. De día se\nmantiene en silencio bajo la tierra."
          soul_silver: "Se mueve si se expone a la luz de\nla luna. Merodea por la noche\npara esparcir sus semillas."
        ko:
          heart_gold: "달빛을 받아 눈을 뜨면\n여기저기를 돌아다닌다. 낮에는\n땅속에서 움직이지 않고 있다."
          soul_silver: "달빛을 받아 움직인다.\n밤중에 씨앗을 여기저기\n뿌리기 위해 돌아다닌다."
gloom:
