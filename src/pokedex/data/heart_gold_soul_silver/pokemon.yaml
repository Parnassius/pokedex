      descriptions:
        jp_kana:
          heart_gold: "みじかい　ハネを　はばたかせ\nくさむらの　むしを　おいだしては\nみじかい　くちばしで　ついばむ。"
          soul_silver: "じぶんの　テリトリーを　まもるため\nみじかいハネを　はばたかせ\nいそがしく　とびまわっている。"
        en:
          heart_gold: "It flaps its short wings to flush out\ninsects from tall grass. It then\nplucks them with its stubby beak."
          soul_silver: "Very protective of its territory, it\nflaps its short wings busily to\ndart around at high speed."
        fr:
          heart_gold: "Il bat des ailes pour éjecter les\ninsectes réfugiés dans les herbes\net les picore ensuite avec son bec."
          soul_silver: "Très protecteur de son territoire, il\nbat vite des ailes pour se déplacer à\ntoute allure."
        it:
          heart_gold: "Battendo le corte ali scova insetti\nnell’erba alta. Poi li raccoglie\ncon il suo tozzo becco."
          soul_silver: "Molto geloso del suo territorio,\nsvolazza in giro a gran velocità\nbattendo le ali continuamente."
        de:
          heart_gold: "Es flattert mit seinen kleinen\nFlügeln, um Insekten aus dem Gras\nzu scheuchen und zu verspeisen."
          soul_silver: "Es beschützt sein Gebiet stets vor\nEindringlingen. Daher fliegt es\nständig wild umher."
        es:
          heart_gold: "Aletea con sus cortas alas para\nhacer salir a los insectos de la\nhierba, y los caza con su pico."
          soul_silver: "Muy protector de su territorio,\nmueve sus cortas alas sin descanso\npara lanzarse a toda velocidad."
        ko:
          heart_gold: "짧은 날개를 쳐서\n풀숲의 벌레를 몰아내\n짧은 부리로 쪼아댄다."
          soul_silver: "자신의 영역을 지키기 위해\n작은 날개를 쳐서\n바쁘게 주위를 날아 맴돈다."
fearow:
  species_id: 22
  names:
    jp_kana: オニドリル
    en: FEAROW
    fr: RAPASDEPIC
    it: FEAROW
