          heart_gold: "Dreht es dir im Kampf den Rücken\nzu, wird es dich mit den Flammen\nseines Rückens angreifen."
          soul_silver: "Das Fell dieses Pokémon ist nicht\nentflammbar. Es ist gegen jegliche\nFeuerattacken immun."
        es:
          heart_gold: "Ten cuidado si te da la espalda\nen combate. Significa que te\nva a atacar con su lomo de fuego."
          soul_silver: "El pelaje de este Pokémon\nes ignífugo. Puede soportar\ncualquier ataque de fuego."
        ko:
          heart_gold: "배틀 중에 등을 보이면\n주의가 필요하다. 등의 불꽃으로\n공격해올 것이라는 뜻이다."
          soul_silver: "몸을 뒤덮은 털가죽은\n절대로 불에 타지 않는다.\n어떠한 불꽃 공격에도 괜찮다."
typhlosion:
