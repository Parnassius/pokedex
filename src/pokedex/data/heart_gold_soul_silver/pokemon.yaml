      descriptions:
        jp_kana:
          heart_gold: "こころやさしい　ひとの　まえに\nしあわせを　もたらすため\nすがたを　あらわすと　いわれている。"
          soul_silver: "やさしいひとの　そばに　いないと\nげんきが　でなくなってしまう。\nはねをうごかさずに　そらにうかべる。"
        en:
          heart_gold: "They say that it will appear before\nkindhearted, caring people and\nshower them with happiness."
          soul_silver: "It grows dispirited if it is not\nwith kind people. It can float in\nmidair without moving its wings."
        fr:
          heart_gold: "On dit qu’il n’apparaît qu’aux\ncœurs purs. Il apporte la joie\net le bonheur à son maître."
          soul_silver: "Il se démoralise vite s’il n’est\npas avec des gens sympathiques. Il\npeut léviter sans battre des ailes."
        it:
          heart_gold: "Si dice che appaia alle persone buone e\npremurose, inondandole di felicità."
          soul_silver: "S’intristisce se non si trova con\npersone gentili. Può restare sospeso\nin aria senza bisogno di muovere le ali."
        de:
          heart_gold: "Man sagt, es zeigt sich nur guther-\nzigen und einfühlsamen Menschen.\nEs überschüttet sie mit Freude."
          soul_silver: "Es wird entmutigt, wenn es unter\nunfreundlichen Menschen ist. Es\nkann ohne Flügel niedrig schweben."
        es:
          heart_gold: "Dicen que aparece entre gentes\ncuidadosas y de buen corazón, a\nquienes inunda de felicidad."
          soul_silver: "Si no está con gente amable,\nse entristece. Puede flotar en\nel aire sin mover las alas."
        ko:
          heart_gold: "마음 착한 사람 앞에\n행복을 가져다주기 위해\n모습을 나타낸다고 전해진다."
          soul_silver: "상냥한 사람 곁에 있지 않으면\n기운이 나지 않게 되어버린다.\n날개를 움직이지 않고 뜰 수 있다."
natu:
  species_id: 177
  names:
    jp_kana: ネイティ
    en: NATU
    fr: NATU
    it: NATU
    de: NATU
    es: NATU
    ko: 네이티
  forms:
    natu:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 45
        special_attack: 70
        special_defense: 45
        speed: 70
      evs_yield:
        hp: 0
