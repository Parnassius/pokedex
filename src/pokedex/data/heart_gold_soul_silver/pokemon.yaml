          soul_silver: "いちど　まきついたら　ぜったいに\nはなれない。するどい　キバで\nえものを　ひきさくように　たべる。"
        en:
          heart_gold: "Apparently, it cracked SHELLDER’s\nshell with its sharp fangs and\nsucked out the insides."
          soul_silver: "Once wrapped around its prey,\nit never lets go. It eats the prey\nby tearing at it with sharp fangs."
        fr:
          heart_gold: "Il paraît qu’il cassait des\nKOKIYAS avec ses crocs acérés\npour en absorber l’intérieur."
          soul_silver: "Une fois enroulé autour de sa\nproie, il ne la laisse pas repartir\net la dévore avec ses crocs."
        it:
          heart_gold: "Sembra che abbia rotto il guscio di\nSHELLDER con le zanne affilate,\nsucchiandone il contenuto."
          soul_silver: "Dopo aver avvolto la preda non la\nmolla più. La mangia facendola\na brandelli con i denti affilati."
        de:
          heart_gold: "Es scheint, als ob es die Schale\nvon MUSCHAS mit seinen Zähnen\naufbrach und den Inhalt trank."
          soul_silver: "Hat es die Beute erst eingewickelt,\nlässt es nicht mehr los. Es ver-\nspeist sie, indem es sie zerreißt."
        es:
          heart_gold: "Al parecer, rompió la concha de\nSHELLDER con sus afilados colmillos\ny absorbió el interior."
          soul_silver: "Cuando agarra a su presa, nunca\nla deja escapar. Se la come\ndespedazándola con sus colmillos."
        ko:
          heart_gold: "껍질에 숨은 셀러도\n예리한 이빨로 껍질을 깨서\n내용물을 빨아내고 있었던 것 같다."
          soul_silver: "한번 휘감으면 절대\n놓지 않는다. 날카로운 이빨로\n먹이를 찢듯이 먹는다."
