          soul_silver: "ゆびさきから　はなたれる\nふしぎな　はどうが　くうきをかためて\nほんとうの　かべを　つくりだす。"
        en:
          heart_gold: "A skilled mime from birth,\nit gains the ability to create\ninvisible objects as it matures."
          soul_silver: "Its fingertips emit a peculiar\nforce field that hardens air to\ncreate an actual wall."
        fr:
          heart_gold: "C’est un excellent mime. Avec le\ntemps, il gagne la capacité de\ncréer des objets invisibles."
          soul_silver: "Le bout de ses doigts émet un\nchamp de force solidifiant l’air\nau point d’en faire un mur."
        it:
          heart_gold: "Mimo esperto fin dalla nascita,\ncrescendo impara addirittura a\ncreare oggetti invisibili."
          soul_silver: "Le punte delle dita emettono un\ncampo di forza che indurisce l’aria\ncreando una vera barriera."
        de:
          heart_gold: "Ein begabter Mime von Geburt an.\nWird es älter, kann es unsichtbare\nObjekte generieren."
          soul_silver: "Seine Fingerkuppen erzeugen ein\nspezielles Kraftfeld, das die Luft\nerhärtet und eine Wand generiert."
        es:
          heart_gold: "Un hábil mimo desde que nace.\nAprende a crear objetos invisibles\na medida que crece."
          soul_silver: "Sus dedos emiten un campo de fuerza\nmuy especial, que endurece el\naire para crear un auténtico muro."
        ko:
          heart_gold: "팬터마임 실력을 타고났다.\n자라면서 기술이 향상되어\n보이지 않는 것도 만들어내게 된다."
          soul_silver: "손가락 끝에서 발산되는\n이상한 파동이 공기를 단단하게 하여\n진정한 벽을 만들어낸다."
scyther:
  species_id: 123
  names:
