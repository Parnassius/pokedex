          soul_silver: "こころやさしい　せいかくで\nびょうきの　ポケモンを　みつけては\nなおるまで　かんびょう　してあげる。"
        en:
          heart_gold: "Anyone who takes even one taste of\nBLISSEY’s egg becomes unfailingly\ncaring and pleasant to everyone."
          soul_silver: "It has a very compassionate nature.\nIf it sees a sick Pokémon, it will\nnurse the sufferer back to health."
        fr:
          heart_gold: "Celui qui mange un peu de l’œuf\nde LEUPHORIE devient aimable\net plaisant avec tout le monde."
          soul_silver: "Il est d’une nature protectrice.\nS’il voit un Pokémon malade,\nil le soignera jusqu’à guérison."
        it:
          heart_gold: "Basta anche solo assaggiare un\nuovo di BLISSEY per diventare\ngentili e premurosi con chiunque."
          soul_silver: "Di indole molto compassionevole,\nse trova un Pokémon ammalato\nlo accudisce per farlo guarire."
        de:
          heart_gold: "Jeder, der einen Bissen von dem Ei,\ndas HEITEIRA hält, nimmt, wird gegen-\nüber anderen sorgsam und höflich."
          soul_silver: "Es ist sehr mitfühlend. Wenn es\nein krankes Pokémon sieht, pflegt\nes dieses wieder gesund."
        es:
          heart_gold: "Cualquiera que pruebe un poco de\nhuevo de BLISSEY, se volverá más\namable y agradable con todos."
          soul_silver: "Es de naturaleza compasiva. Si\nve un Pokémon enfermo, lo\ncuidará hasta que se recupere."
        ko:
          heart_gold: "해피너스가 낳은 알을\n한입이라도 먹은 사람은\n누구에게도 상냥해진다."
          soul_silver: "마음 착한 성격으로\n병든 포켓몬을 발견하면\n회복될 때까지 간호해준다."
raikou:
