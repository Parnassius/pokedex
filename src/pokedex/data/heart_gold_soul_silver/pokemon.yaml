          soul_silver: "どうもうな　せいかく。\nおやの　ポッポを　おいはらい\nすに　のこされた　タマゴをたべる。"
        en:
          heart_gold: "Its paws conceal sharp claws. If\nattacked, it suddenly extends the\nclaws and startles its enemy."
          soul_silver: "Vicious in nature, it drives PIDGEY\nfrom their nests and scavenges any\nleftovers it can find."
        fr:
          heart_gold: "Ses griffes sont cachées dans\nses pattes. S’il est attaqué, il les\nsort pour frapper ses ennemis."
          soul_silver: "De nature agressive, il chasse\nles ROUCOOL de leur nid et\ndévore les œufs abandonnés."
        it:
          heart_gold: "Le zampe nascondono artigli\naffilati. Se è attaccato, allunga\ngli artigli spaventando i nemici."
          soul_silver: "Di spirito malevolo, spinge i\nPIDGEY ad abbandonare il nido per\navventarsi sulle uova incustodite."
        de:
          heart_gold: "In seinen Pfoten stecken scharfe\nKrallen. Es fährt sie blitzschnell\naus, um die Gegner zu überraschen."
          soul_silver: "Es besitzt ein grausames Wesen.\nEs verjagt TAUBSI von deren Nest\nund labt sich an den Eiern."
        es:
          heart_gold: "Sus ocultas garras son muy\nafiladas. Si le atacan, extiende\nsus garras y asusta al enemigo."
          soul_silver: "Es malvado por naturaleza.\nSaca a los PIDGEY de sus nidos\npara devorar sus huevos."
        ko:
          heart_gold: "예리한 손톱을 손가락 안에\n감추고 있다. 갑자기 뻗어서\n습격해온 상대를 풀죽게 만든다."
          soul_silver: "모질고 사나운 성격이다.\n어미 구구를 쫓아내고\n둥지에 남은 알을 먹는다."
teddiursa:
