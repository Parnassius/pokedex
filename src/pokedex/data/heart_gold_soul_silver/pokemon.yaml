      descriptions:
        jp_kana:
          heart_gold: "いきを　すったり　はいたり\nするたびに　くちと　はなから\nひのこが　もれてしまう。"
          soul_silver: "かざんの　ふんかこうで　みつかる。\nたいおんは　６００ども　あるので\nこがらだが　あなどれない。"
        en:
          heart_gold: "Each and every time it inhales\nand exhales, hot embers dribble\nfrom its mouth and nostrils."
          soul_silver: "It is found in volcanic craters. Its body\ntemperature is over 1,100 degrees\nFahrenheit, so don’t underestimate it."
        fr:
          heart_gold: "A chaque fois qu’il respire, des\nbraises brûlantes sortent de sa\nbouche et de ses narines."
          soul_silver: "On le trouve dans le cratère des\nvolcans. Sa température dépasse\nles 600 °C, alors faites attention!"
        it:
          heart_gold: "Ogni volta che inspira ed espira,\nbrace ardente gli esce dalla\nbocca e dalle narici."
          soul_silver: "Si trova nei crateri dei vulcani e la\nsua temperatura corporea supera i\n600ºC. Non è da sottovalutare."
        de:
          heart_gold: "Bei jedem Atemzug springen glühende\nKohlenstücke aus seinem Mund\nund aus seinen Nasenlöchern."
          soul_silver: "Zu finden ist es in Vulkankratern.\nSeine Körpertemperatur erreicht\nüber 600 Grad. Vergiss das nicht!"
        es:
          heart_gold: "Cada vez que inspira y expira,\nlanza ascuas por su boca y\npor sus fosas nasales."
          soul_silver: "Aparece en los cráteres de los\nvolcanes. Puede alcanzar los\n600°, así que no lo subestimes."
        ko:
          heart_gold: "숨을 쉬거나 뱉을\n때마다 입과 코에서\n불꽃이 새어나온다."
          soul_silver: "화산의 분화구에서 발견할 수 있다.\n체온은 600도나 되기 때문에\n작다고 업신여길 수 없다."
