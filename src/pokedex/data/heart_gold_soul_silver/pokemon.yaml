          heart_gold: "Ce Pokémon voyage dans le temps.\nLes forêts où il apparaît deviennent\nprodigieusement luxuriantes."
          soul_silver: "Quand CELEBI disparaît au fin fond\nde la forêt, il laisse derrière\nlui un œuf venant du futur."
        it:
          heart_gold: "Questo Pokémon viaggia attraverso\nil tempo. Le foreste in cui appare\nprosperano rigogliose."
          soul_silver: "Quando scompare nella foresta,\nsi dice che lasci dietro di sé un\nuovo che proviene dal futuro."
        de:
          heart_gold: "Dieses Pokémon reist durch Zeit\nund Raum. Bäume und Wiesen\nwuchern, wenn es in der Nähe ist."
          soul_silver: "Wenn CELEBI in einem Wald ver-\nschwindet, lässt es laut Legende\nein Ei aus der Zukunft zurück."
        es:
          heart_gold: "Este Pokémon vaga por el tiempo.\nLa hierba y los árboles crecen\npor los campos por donde pasa."
          soul_silver: "Dicen que cuando CELEBI se interna\nen un bosque, deja tras de sí\nun huevo traído del futuro."
        ko:
          heart_gold: "시간을 넘어 여기저기를 방황한다.\n세레비가 모습을 나타낸\n숲은 초목이 무성해진다고 한다."
          soul_silver: "세레비가 모습을 감춘\n숲 깊은 곳에 남겨진 알은\n미래로부터 가져온 듯하다."
