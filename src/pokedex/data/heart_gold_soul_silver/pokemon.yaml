          soul_silver: "おとなになると　なかまから\nせなかに　あしあとの　マークを\nつけられる　しゅうせいを　もつ。"
        en:
          heart_gold: "A special fluid oozes from the tip\nof its tail. It paints the fluid\neverywhere to mark its territory."
          soul_silver: "Once it becomes an adult, it has a\ntendency to let its comrades plant\nfootprints on its back."
        fr:
          heart_gold: "Un liquide coule du bout de sa\nqueue. Il peint avec ce fluide\npour marquer son territoire."
          soul_silver: "Arrivé à l’âge adulte, il laisse\nses camarades poser leur\nempreinte de patte sur son dos."
        it:
          heart_gold: "Sulla coda ha un fluido speciale,\nche rilascia ovunque per\nmarcare il suo territorio."
          soul_silver: "Quando è adulto tende a farsi\nlasciare orme di zampe sul\ndorso dai propri compagni."
        de:
          heart_gold: "Eine spezielle Flüssigkeit tritt\nan seiner Schweifspitze aus, mit\nder es sein Revier markiert."
          soul_silver: "Ist es erwachsen, lässt es sich gern\nvon seinen Kameraden Fußabdrücke\nauf den Rücken setzen."
        es:
          heart_gold: "La punta de su cola rezuma un\nfluido especial. Lo pinta todo con\neste líquido para marcar su terreno."
          soul_silver: "Cuando llega a adulto, suele\ndejar que sus camaradas dejen\nsus huellas sobre su lomo."
        ko:
          heart_gold: "꼬리 끝에서 분비되는\n액체를 여기저기에 칠해\n자신의 영역을 어필한다."
          soul_silver: "어른이 되면 동료로부터\n등에 발자국 마크를\n받는 습성을 가진다."
