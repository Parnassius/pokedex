      descriptions:
        jp_kana:
          heart_gold: "２つの　あたまを　じゅんばんに\nじょうげ　させることで　はしるときの\nあんていかんが　アップする。"
          soul_silver: "あしあとの　ふかさが　１０センチにも\nなるほど　じめんを　ちからづよく\nふみしめ　そうげんを　かけぬける。"
        en:
          heart_gold: "By alternately raising and lowering\nits two heads, it balances itself\nto be more stable while running."
          soul_silver: "It races through grassy plains with\npowerful strides, leaving footprints\nup to four inches deep."
        fr:
          heart_gold: "En dressant alternativement ses\ndeux têtes il peut courir plus vite\net garder son équilibre."
          soul_silver: "Il parcourt les plaines verdoyantes\nen laissant des empreintes de pas\nprofondes de plus de 10 cm."
        it:
          heart_gold: "Alzando e abbassando le due teste\nalternativamente, si rende più\nstabile durante la corsa."
          soul_silver: "Corre a grandi balzi per le praterie,\nlasciando orme che arrivano fino a\n10 cm di profondità."
        de:
          heart_gold: "Um beim Rennen nicht das Gleich-\ngewicht zu verlieren, streckt es\nseine Köpfe abwechselnd voraus."
          soul_silver: "Es rennt sehr schnell über be-\nwachsene Felder und hinterlässt 10\ncm tiefe Fußspuren."
        es:
          heart_gold: "Alternando ambas cabezas arriba y\nabajo, se equilibra para\ncorrer de una forma más estable."
          soul_silver: "Corre por las praderas con\npotentes zancadas, dejando huellas\nde hasta 10 cm de profundidad."
        ko:
          heart_gold: "2개의 머리를 순서대로\n상하로 움직여서 달릴 때\n안정감을 높인다."
          soul_silver: "깊이 10cm 이상의 발자국이\n생길 정도로 땅을 힘차게\n박차고 초원을 달린다."
dodrio:
