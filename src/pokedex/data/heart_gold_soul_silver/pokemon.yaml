        jp_kana:
          heart_gold: "ひょうめんは　けっこう　かたい。\nひびわれても　なかみが　こぼれたり\nすることなく　いきていける。"
          soul_silver: "タマタマだけに　つたわる\nテレパシーを　だしあっているので\nどんなときでも　６ひき　あつまれる。"
        en:
          heart_gold: "Their shells are very durable. Even if\nthey crack, they can survive without\nspilling their contents."
          soul_silver: "Using telepathy only they can\nemploy, they always form a\ncluster of six EXEGGCUTE."
        fr:
          heart_gold: "Sa coquille est très résistante.\nSi elle est fendue, il peut survivre\nen gardant son intégrité."
          soul_silver: "En utilisant leurs pouvoirs\ntélépathiques, ils forment des\ngrappes de six NOEUNOEUF."
        it:
          heart_gold: "Ha un guscio molto resistente.\nAnche se si rompe, sopravvive\nsenza perdere il contenuto."
          soul_silver: "L’EXEGGCUTE ha un richiamo telepatico\nunico che usa per formare gruppi di\nsei individui con i propri simili."
        de:
          heart_gold: "Seine Schale ist sehr hart. Selbst\nRisse darin schaden ihm nicht, da\nes sein Inneres nicht verschüttet."
          soul_silver: "Mit Telepathie, die nur sie\nverstehen, bilden sie stets eine\nGruppe von sechs OWEI."
        es:
          heart_gold: "Su cáscara es muy resistente. Si\nllega a romperse, podría sobrevivir\nsi evita derramar su contenido."
          soul_silver: "Usan poderes telepáticos\nentre ellos para reunirse\nen grupos de seis."
        ko:
          heart_gold: "표면이 제법 단단하다.\n금이 가도 내용물이 흐르거나\n하지 않고 살아갈 수 있다."
          soul_silver: "아라리에게만 전해지는\n텔레파시를 주고받고 있어서\n어떤 때든 6마리가 함께 모여 있다."
