          soul_silver: "なかまだけで　わかりあえる\nなきごえで　おたがいの　いちを\nたしかめながら　えものをおいつめる。"
        en:
          heart_gold: "It uses different kinds of cries for\ncommunicating with others of its\nkind and for pursuing its prey."
          soul_silver: "To corner prey, they check each\nother’s location using barks that\nonly they can understand."
        fr:
          heart_gold: "Il communique en produisant\ndifférents cris avec ses semblables\nou quand il poursuit sa proie."
          soul_silver: "Pour traquer leur proie, ils se\nlocalisent mutuellement avec des\naboiements compris par eux seuls."
        it:
          heart_gold: "Usa versi differenti per comunicare\ncon altri del suo tipo e per\ninseguire la preda."
          soul_silver: "Per circondare la preda, gli HOUNDOUR\nsi comunicano la posizione reciproca con\nululati che capiscono solo loro."
        de:
          heart_gold: "Sein Ruf bei der Beutejagd unter-\nscheidet sich von dem Ruf, wenn es\nmit Artgenossen kommuniziert."
          soul_silver: "Sie treiben ihre Beute in die Enge\nund orientieren sich dabei anhand\nihres Bellens, das nur sie verstehen."
        es:
          heart_gold: "Usa diferentes tipos de gritos\npara comunicarse con los de su\nespecie o para seguir a su presa."
          soul_silver: "Para arrinconar a su presa,\ncomprueban sus posiciones con\nladridos que solo ellos entienden."
        ko:
          heart_gold: "동료에게 연락할 때와\n먹이를 쫓을 때\n울음소리의 종류가 다르다."
          soul_silver: "동료끼리만 서로 알 수 있는\n울음소리로 서로의 위치를\n확인해가며 먹이를 몰아붙인다."
houndoom:
