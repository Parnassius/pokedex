          soul_silver: "せなかの　キノコが　そだつほど\nばらまかれる　キノコのほうしの\nこうかは　きょうりょくになる。"
        en:
          heart_gold: "It stays mostly in dark, damp places,\nthe preference not of the bug, but\nof the big mushroom on its back."
          soul_silver: "The larger the mushroom on its\nback grows, the stronger the\nmushroom spores it scatters."
        fr:
          heart_gold: "Il se cache dans les endroits sombres\net humides pour s’accommoder aux\nexigences de ses champignons."
          soul_silver: "Plus le champignon sur son dos\ngrandit, plus celui-ci émet des\nspores puissantes dans l’air."
        it:
          heart_gold: "Più cresce il fungo sulla sua\nschiena, più potenti sono le\nspore che dissemina."
          soul_silver: "Più cresce il fungo che ha sul\ndorso, più forti diventano le\nspore che sparge."
        de:
          heart_gold: "Es hält sich meist an dunklen und\nfeuchten Orten auf. Der Riesen-\npilz auf seinem Rücken mag das."
          soul_silver: "Je größer der Pilz auf seinem\nRücken wird, desto stärker werden\nauch die Sporen, die es verteilt."
        es:
          heart_gold: "Suele vivir en lugares oscuros\ny húmedos, los preferidos, no del\nbicho, sino de la seta de su lomo."
          soul_silver: "Cuanto más grande sea la seta de\nsu lomo, más resistentes serán\nlas esporas que esta suelta."
        ko:
          heart_gold: "어둡고 축축한 장소를 좋아한다.\n그것은 벌레가 아닌 크게 자란\n등에 있는 버섯의 취향이다."
          soul_silver: "등의 버섯이 자랄수록\n흩뿌려지는 버섯포자의\n효과는 강력해진다."
venonat:
