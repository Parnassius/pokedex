      descriptions:
        jp_kana:
          heart_gold: "いつも　きのふりを　している。\nからだの　つくりは　しょくぶつより\nいしや　いわなどに　ちかいようだ。"
          soul_silver: "おそわれないように　きのまねをする。\nみずがにがてで　あめが　ふりだすと\nいつのまにか　すがたを　けす。"
        en:
          heart_gold: "Although it always pretends to be a\ntree, its composition appears more\nsimilar to rock than to vegetation."
          soul_silver: "It disguises itself as a tree to\navoid attack. It hates water, so it\nwill disappear if it starts raining."
        fr:
          heart_gold: "Il fait semblant d’être un arbre.\nSa composition est en fait plus\nproche de la pierre."
          soul_silver: "Il se déguise en arbre pour éviter\nles problèmes. Il déteste l’eau\net se cache par temps de pluie."
        it:
          heart_gold: "Sebbene finga di essere un albero,\nla composizione sembra più simile\na quella di una roccia."
          soul_silver: "Si traveste da albero per evitare\ngli attacchi. Odiando l’acqua,\nscompare appena inizia a piovere."
        de:
          heart_gold: "Obwohl es vorgibt, ein Baum zu sein,\nkommt seine Zusammensetzung einem\nStein näher als einer Pflanze."
          soul_silver: "Es tarnt sich als Baum, um nicht an-\ngegriffen zu werden. Es hasst Was-\nser, darum läuft es bei Regen weg."
        es:
          heart_gold: "Aunque pretende ser un árbol, en\nsu composición se parece más a\nuna roca que a una planta."
          soul_silver: "Se disfraza de árbol para no ser\natacado. Odia el agua, por lo que\ndesaparecerá si empieza a llover."
        ko:
          heart_gold: "항상 나무인 척하고 있다.\n몸의 구조는 식물보다\n돌이나 바위에 가까운 듯하다."
          soul_silver: "습격당하지 않도록 나무 흉내를 낸다.\n물에 약하기 때문에 비가 내리면\n어느 순간에 모습을 감춰버린다."
politoed:
  species_id: 186
  names:
    jp_kana: ニョロトノ
    en: POLITOED
    fr: TARPAUD
    it: POLITOED
    de: QUAXO
    es: POLITOED
    ko: 왕구리
