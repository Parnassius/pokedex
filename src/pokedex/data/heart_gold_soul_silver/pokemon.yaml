          soul_silver: "どこからか　ホネを　ひろってくる。\nせかいの　どこかに　ガラガラだけの\nはかばが　あるという　ウワサだ。"
        en:
          heart_gold: "It has been seen pounding boulders\nwith the bone it carries in order\nto tap out messages to others."
          soul_silver: "It collects bones from an unknown place.\nSome whisper that a MAROWAK graveyard\nexists somewhere in the world."
        fr:
          heart_gold: "Il frappe sur les rochers avec sa\nmassue-os pour envoyer des messages\nà ses compagnons éloignés."
          soul_silver: "Il collectionne des os. Il paraît\nqu’il existe un cimetière\nd’OSSATUEUR quelque part..."
        it:
          heart_gold: "Viene visto colpire massi con l’osso\nche impugna per trasmettere messaggi."
          soul_silver: "Raccoglie ossa da un luogo sconosciuto.\nSi dice che da qualche parte nel mondo ci\nsia un cimitero MAROWAK."
        de:
          heart_gold: "Es schlägt mit dem Knochen in sei-\nner Hand gegen Felsen, um anderen\nBotschaften zu übermitteln."
          soul_silver: "Es sammelt Knochen an geheimen Orten.\nEs soll irgendwo eine Begräbnis-\nstätte für KNOGGA geben."
        es:
          heart_gold: "Se le ha visto golpeando rocas\ncon el hueso que lleva para\nenviar mensajes a los demás."
          soul_silver: "Recoge huesos de algún lugar.\nDicen que existe un cementerio\nde MAROWAK en algún sitio."
        ko:
          heart_gold: "가지고 있는 뼈로 돌을 두드려\n소리를 내서 동료에게 연락하는\n모습이 목격되었다."
          soul_silver: "어디선가 뼈를 주워온다.\n이 세상 어딘가에 텅구리만의\n무덤이 있다는 소문이다."
