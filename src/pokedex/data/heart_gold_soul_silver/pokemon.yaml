      descriptions:
        jp_kana:
          heart_gold: "えものが　ちかくを　とおりかかるまで\nじぶんの　すで　なんにちも　おなじ\nかっこうで　じっと　まちつづける。"
          soul_silver: "ほそくて　じょうぶな　いとを\nはりめぐらして　わなを　しかけると\nえものが　かかるのを　ひたすらまつ。"
        en:
          heart_gold: "It lies still in the same pose for\ndays in its web, waiting for its\nunsuspecting prey to wander close."
          soul_silver: "It spins a web using fine--but\ndurable--thread. It then waits\npatiently for prey to be trapped."
        fr:
          heart_gold: "Il reste immobile dans sa toile pendant\ndes jours. Il attend que sa proie\nse rapproche pour la capturer."
          soul_silver: "Il tisse une toile en utilisant\nun fil fin mais solide, puis il\nattend tranquillement sa proie."
        it:
          heart_gold: "Può rimanere immobile nella\ntela per giorni, attendendo che\ns’avvicini una preda ignara."
          soul_silver: "Tesse la tela con un filo sottile ma\nresistente. Poi attende paziente che\nuna preda ci finisca dentro."
        de:
          heart_gold: "Es sitzt tagelang regungslos in\nseinem Netz und lauert unvorsichtiger\nBeute auf, die ihm zu nahe kommt."
          soul_silver: "Es spinnt ein Netz aus feinem, aber\nreißfestem Faden. Dann wartet es\nauf Beute, die im Netz zappelt."
        es:
          heart_gold: "Mantiene la misma postura en su\ntelaraña durante días, esperando a\nque se acerque una presa inocente."
          soul_silver: "Teje su telaraña con hilo fino pero\nresistente. Espera pacientemente a\nque caiga su presa."
        ko:
          heart_gold: "먹이가 근처를 지나갈 때까지\n자신의 둥지에서 며칠이고 같은\n모습으로 가만히 기다린다."
          soul_silver: "가늘고 튼튼한 실을\n뿜어 엮어서 덫을 만들고\n먹이가 걸리기만을 기다린다."
ariados:
