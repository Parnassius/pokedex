        special_defense: 0
        speed: 1
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      abilities:
        - blaze
      descriptions:
        jp_kana:
          heart_gold: "もえたぎるような　せいかくで　いつも\nたたかう　あいてを　さがしている。\nかたないと　ちが　しずまらない。"
          soul_silver: "もえる　しっぽを　ふりまわし\nするどい　ツメで　あいてを　きりさく\nあらあらしい　せいかく。"
        en:
          heart_gold: "It is very hotheaded by nature,\nso it constantly seeks opponents.\nIt calms down only when it wins."
          soul_silver: "It has a barbaric nature. In battle,\nit whips its fiery tail around\nand slashes away with sharp claws."
        fr:
          heart_gold: "Il a le sang chaud de par sa nature.\nIl est constamment à la recherche de\nnouveaux adversaires."
          soul_silver: "Il est très sauvage. En combat,\nil se sert de ses griffes acérées\net de sa queue."
        it:
          heart_gold: "Turbolento di natura, è sempre\nalla ricerca di avversari. Si\nplaca solo dopo aver vinto."
          soul_silver: "Ha un’indole spietata. Durante\nla lotta frusta con la forte coda\ne taglia con artigli affilati."
        de:
          heart_gold: "Es ist hitzig und sucht ständig\nnach Gegnern. Es beruhigt sich\nnur, wenn es gewinnt."
          soul_silver: "Es ist brutal veranlagt. Im Kampf\nschlägt es mit seinem Schweif und\nsetzt seine scharfen Klauen ein."
        es:
          heart_gold: "Por naturaleza, se acalora con\nfacilidad: siempre está buscando\nenemigos. Solo se calma cuando gana."
          soul_silver: "De naturaleza bárbara, en la\nbatalla esgrime su fiera cola,\ny araña con sus afiladas garras."
        ko:
          heart_gold: "타오르는 듯한 성격으로 늘\n싸울 상대를 찾는다.\n이겨야만 마음이 가라앉는다."
          soul_silver: "불타는 꼬리를 휘두르며\n날카로운 발톱으로 상대를\n베어 가르는 몹시 거친 성격이다."
charizard:
  species_id: 6
  names:
    jp_kana: リザードン
    en: CHARIZARD
    fr: DRACAUFEU
    it: CHARIZARD
    de: GLURAK
    es: CHARIZARD
    ko: 리자몽
  forms:
