        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
        - flying
      egg_groups:
        - flying
      abilities:
        - synchronize
        - early_bird
      descriptions:
        jp_kana:
          heart_gold: "はねが　そだちきって　おらず\nとびはねるようにして　いどうする。\nいつも　なにかを　みつめている。"
          soul_silver: "ふだんは　ちじょうで　エサをさがすが\nごくたまに　きのえだに　とびのって\nきのめを　ついばんだりする。"
        en:
          heart_gold: "Because its wings aren’t yet fully\ngrown, it has to hop to get around.\nIt is always staring at something."
          soul_silver: "It usually forages for food on the\nground but may, on rare occasions,\nhop onto branches to peck at shoots."
        fr:
          heart_gold: "Ses ailes ne sont pas assez développées\net il ne peut que planer péniblement.\nIl fixe toujours quelque chose."
          soul_silver: "Il cherche sa nourriture par\nterre, mais quelquefois il grimpe\naux arbres pour manger."
        it:
          heart_gold: "Poiché le sue ali non sono ancora ben\nsviluppate, deve saltellare.\nSembra fissare sempre qualcosa."
          soul_silver: "Di solito cerca il cibo per terra, ma\nin rare occasioni può saltare sui\nrami e beccare i germogli."
        de:
          heart_gold: "Da seine Flügel nicht voll ausge-\nbildet sind, bewegt es sich hüp-\nfend. Es starrt immer etwas an."
          soul_silver: "Gewöhnlich sucht es am Boden nach\nFutter, aber manchmal springt\nes auch auf Äste, um dort zu suchen."
        es:
          heart_gold: "Va dando saltitos porque sus alas\nno han crecido lo suficiente.\nSiempre está pendiente de algo."
          soul_silver: "Normalmente busca comida por el\nsuelo. En raras ocasiones, salta\na las ramas para picotear brotes."
        ko:
          heart_gold: "날개가 아직 잘 발달하지 못해서\n뛰어오르는 것처럼 이동한다.\n항상 뭔가를 바라보고 있다."
          soul_silver: "보통은 지상에서 먹이를 찾지만\n극히 드물게 나뭇가지에 날아 앉아\n나무의 순을 쪼아먹기도 한다."
xatu:
  species_id: 178
  names:
    jp_kana: ネイティオ
    en: XATU
