          soul_silver: "いつもは　がけに　はりついている。\nえものをみつけると　はねをひろげ\nかぜにのり　おそいかかってくる。"
        en:
          heart_gold: "It flies straight at its target’s\nface, then clamps down on the\nstartled victim to inject poison."
          soul_silver: "It usually clings to cliffs. When it\nspots its prey, it spreads its wings\nand glides down to attack."
        fr:
          heart_gold: "Il vole droit vers le visage de sa\ncible effrayée et s’y accroche\npour lui injecter son poison."
          soul_silver: "Il s’accroche souvent aux falaises.\nSa proie repérée, il plane vers elle\npour l’attaquer."
        it:
          heart_gold: "Vola in picchiata sulla testa\ndel nemico, lo atterra e gli\ninietta il suo veleno."
          soul_silver: "Di solito sta attaccato agli scogli.\nAttacca la preda spalancando le\nali e planando."
        de:
          heart_gold: "Es fliegt direkt auf das Gesicht\nseiner Feinde zu und injiziert ihnen\neine Überdosis Gift."
          soul_silver: "Es hängt meist an Klippen. Erspäht\nes Beute, spreizt es seine Flügel\nund greift diese sofort an."
        es:
          heart_gold: "Vuela directo a la cara del \nobjetivo y acaba con su aterrada\nvíctima inyectándole veneno."
          soul_silver: "A veces se sujeta a los precipicios.\nCuando divisa una presa, despliega\nsus alas y planea para atacar."
        ko:
          heart_gold: "얼굴을 겨냥하고 날아와\n들러붙어 먹이가 놀라는\n사이에 독침을 찌른다."
          soul_silver: "보통은 벼랑에 붙어 있다.\n먹이를 발견하면 날개를 펼쳐\n바람을 타고 날아 덮친다."
