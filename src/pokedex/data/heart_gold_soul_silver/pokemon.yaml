        en:
          heart_gold: "Its body can’t be harmed by any\nsort of attack, so it is very eager\nto make challenges against enemies."
          soul_silver: "Extremely strong, it can change the\nlandscape. It has an insolent nature\nthat makes it not care about others."
        fr:
          heart_gold: "Son corps ne peut être blessé\npar une attaque physique. Il\npense tout le temps à se battre."
          soul_silver: "Il est si fort qu’il peut changer\nla topographie du terrain. Il ne se\npréoccupe pas des autres."
        it:
          heart_gold: "Il suo corpo non è scalfito da\nalcun attacco, perciò sfida i\nnemici con estrema facilità."
          soul_silver: "La sua forza è tale da poter cambiare\nil paesaggio. L’indole insolente lo\nrende indifferente agli altri."
        de:
          heart_gold: "Sein Körper ist gegen Attacken\nimmun. Daher sucht es ständig nach\nneuen Gegnern, die gegen es antreten."
          soul_silver: "Es ist so stark, dass es ganze\nLandstriche verwüsten kann. Es\nist kaltblütig und rücksichtslos."
        es:
          heart_gold: "Su cuerpo es casi inmune a los\nataques. Por eso le encanta\ndesafiar a sus enemigos."
          soul_silver: "Tiene tanta fuerza que puede\ncambiar el paisaje. Su naturaleza\ninsolente le hace ser muy egoísta."
        ko:
          heart_gold: "어떤 공격에도 꿈쩍도 하지 않는\n몸을 가졌기 때문에\n자꾸 승부를 걸어온다."
          soul_silver: "주변 지형을 바꾸는 정도쯤은\n쉽게 해낼 정도의 힘을 가지고 있다.\n주위에 신경 쓰지 않는 대담한 성격."
