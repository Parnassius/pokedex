        - normal
      egg_groups:
        - field
      abilities:
        - limber
        - technician
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          heart_gold: "ぜんしんから　ただよう　きひんに\nあこがれる　ひとも　おおいが\nなにかあると　すぐ　ひっかいてくる。"
          soul_silver: "しなやかな　きんにくの　おかげで\nあしおとひとつ　たてずに　あるける。\nえものを　かるときは　いっしゅん。"
        en:
          heart_gold: "Many adore it for its sophisticated air.\nHowever, it will lash out and\nscratch for little reason."
          soul_silver: "Its lithe muscles allow it to walk\nwithout making a sound. It\nattacks in an instant."
        fr:
          heart_gold: "Très apprécié pour son air\nsophistiqué, il est très capricieux\net se met à griffer pour un rien."
          soul_silver: "Ses muscles souples lui permettent\nde marcher sans un bruit et\nd’attaquer en l’espace d’un instant."
        it:
          heart_gold: "Molti lo amano per il suo aspetto\nelegante. Ma può scatenarsi e\ngraffiare alla minima provocazione."
          soul_silver: "I muscoli flessibili gli consentono di\ncamminare senza fare alcun rumore.\nAttacca in un lampo."
        de:
          heart_gold: "Viele bewundern sein erhabenes\nAuftreten. Es attackiert und\nkratzt ohne wirklichen Grund."
          soul_silver: "Aufgrund seiner geschmeidigen Mus-\nkeln kann es sich lautlos bewegen.\nEs greift ohne Vorwarnung an."
        es:
          heart_gold: "Muy valorado por su aire\nsofisticado. Sin embargo, ataca y\naraña por el más mínimo motivo."
          soul_silver: "Sus ágiles músculos le permiten\nmoverse sin hacer ruido.\nAtaca al instante."
        ko:
          heart_gold: "전신에서 감도는 기품을\n동경하는 사람도 많지만\n무슨 일이 생기면 바로 할퀸다."
          soul_silver: "부드러운 근육 덕분에\n발소리를 내지 않고 걸을 수 있다.\n먹이를 사냥할 때는 순식간이다."
psyduck:
