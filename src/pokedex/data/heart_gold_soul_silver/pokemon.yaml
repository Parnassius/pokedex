          soul_silver: "しにわかれた　ははおやの　ホネを\nいつも　かぶっているので\nすがおが　どんなふうか　わからない。"
        en:
          heart_gold: "If it is sad or lonely, the skull\nit wears shakes and emits a plaintive\nand mournful sound."
          soul_silver: "It always wears the skull of its\ndead mother, so no one has any idea\nwhat its hidden face looks like."
        fr:
          heart_gold: "S’il est triste et seul, le crâne\nqu’il porte se met à bouger. Il\német alors un son plaintif."
          soul_silver: "Il porte constamment le crâne de\nsa mère. Personne ne sait à quoi il\nressemble sans ce crâne."
        it:
          heart_gold: "Se è stanco o si sente solo, il\nteschio che ha in testa vibra ed\nemette un suono lamentoso."
          soul_silver: "Indossa sempre il teschio della\nmamma scomparsa: nessuno l’ha\nmai potuto vedere in faccia."
        de:
          heart_gold: "Ist es einsam oder traurig, wackelt\nder Schädel den es trägt und man\nhört es jammern und wimmern."
          soul_silver: "Es trägt immer den Schädel seiner\nverstorbenen Mutter. Darum weiß\nniemand, wie sein Gesicht aussieht."
        es:
          heart_gold: "Si está triste o solitario, agita\nla calavera y emite un sonido\nlúgubre y lastimero."
          soul_silver: "Siempre lleva la calavera de su\ndifunta madre, así que nadie sabe\ncómo es su cara oculta."
        ko:
          heart_gold: "슬플 때와 외로울 때는\n덮어쓴 뼈가 흔들려\n덧없고 안타까운 소리가 난다."
          soul_silver: "죽은 어미의 해골을\n항상 뒤집어쓰고 있어서\n얼굴이 어떻게 생겼는지 모른다."
marowak:
