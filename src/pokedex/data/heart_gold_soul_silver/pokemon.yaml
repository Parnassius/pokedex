          soul_silver: "たたかいで　ちからを　さいだいげんに\nだせるように　ふだんは　すこしも\nうごかず　エネルギーをためている。"
        en:
          heart_gold: "Because its battle abilities were\nraised to the ultimate level,\nit thinks only of defeating its foes."
          soul_silver: "It usually remains motionless to\nconserve energy, so that it may\nunleash its full power in battle."
        fr:
          heart_gold: "Ses capacités de combat ont été\naméliorées au niveau maximum.\nIl ne pense qu’à se battre."
          soul_silver: "Habituellement, il reste immobile\npour économiser son énergie qu’il\npréfère consacrer au combat."
        it:
          heart_gold: "Dato che le sue abilità nel\ncombattimento sono al massimo,\nnon fa altro che battere i nemici."
          soul_silver: "Di solito rimane immobile,\nconservando l’energia che\npoi scatena durante la lotta."
        de:
          heart_gold: "Da seine Kampffähigkeit ins Un-\nermessliche erhöht wurde, denkt es\ndaran, seine Feinde zu besiegen."
          soul_silver: "Gewöhnlich bewegt es sich nicht, um\nEnergie zu sparen, damit es im Kampf\nseine volle Kraft entfalten kann."
        es:
          heart_gold: "Debido a su increíble capacidad\nde lucha, solo piensa en eliminar\na sus enemigos."
          soul_silver: "Normalmente, permanece inmóvil\npara conservar la energía y poder\nliberarla luego en el combate."
        ko:
          heart_gold: "한계점까지 전투능력을\n높일 수 있었기 때문에 눈앞의 적을\n쓰러뜨리는 것만 생각하게 되었다."
          soul_silver: "싸움에서 최대한의 힘을\n낼 수 있도록 평소에는 조금도\n움직이지 않고 에너지를 모으고 있다."
