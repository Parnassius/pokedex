          soul_silver: "うしろあしだけで　たつようになり\nのうが　はったつした。ぶあつい\nひふは　マグマのなかでも　へいきだ。"
        en:
          heart_gold: "Its rugged hide protects it from\neven the heat of lava. However,\nthe hide also makes it insensitive."
          soul_silver: "Its brain developed when it began\nwalking on hind legs. Its thick\nhide protects it even in magma."
        fr:
          heart_gold: "Son épiderme épais le protège\nmême de la chaleur de la lave, mais\nil est insensible en conséquence."
          soul_silver: "Son cerveau s’est développé quand il\na commencé à marcher sur 2 pattes.\nSa peau le protège même du magma."
        it:
          heart_gold: "La sua pelle dura lo protegge\npersino dalla lava, però lo\nrende anche insensibile."
          soul_silver: "Il cervello si è sviluppato da quando\nsi muove sulle zampe posteriori. La\npelle lo difende dal magma."
        de:
          heart_gold: "Seine dicke Haut schützt es vor\nheißer Lava, aber sie macht es\nauch sonst unempfindlich."
          soul_silver: "Sein Gehirn entwickelte sich, als es\nbegann, auf den Hinterbeinen zu stehen.\nSeine Haut schützt es vor Magma."
        es:
          heart_gold: "Su dura coraza le protege hasta\ndel calor de la lava. Sin embargo,\ntambién le hace insensible."
          soul_silver: "Su cerebro se desarrolló cuando\nempezó a usar sus patas traseras.\nSu piel resiste hasta la lava."
        ko:
          heart_gold: "용암의 뜨거움도 느끼지 않는\n튼튼한 피부의 소유자.\n그만큼 둔하기도 하다."
          soul_silver: "뒷다리로만 설 수 있게 되어\n뇌가 발달했다. 두꺼운\n피부는 마그마 속에서도 문제없다."
chansey:
