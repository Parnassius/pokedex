      descriptions:
        jp_kana:
          heart_gold: "かたい　キバで　なんでも　かじる。\nコンクリートで　できた　ビルすら\nかじって　たおしてしまう。"
          soul_silver: "ヒゲで　バランスを　とっている。\nキバは　どんどん　のびるので\nなんでも　かじって　けずっている。"
        en:
          heart_gold: "Gnaws on anything with its tough\nfangs. It can even topple concrete\nbuildings by gnawing on them."
          soul_silver: "Its whiskers help it to maintain\nbalance. Its fangs never stop growing,\nso it gnaws to pare them down."
        fr:
          heart_gold: "Sa morsure est redoutable. Ses\nterribles crocs peuvent ronger\nles fondations des immeubles."
          soul_silver: "Ses moustaches favorisent son\néquilibre. Ses crocs grandissent\nsans cesse pour mieux mâcher."
        it:
          heart_gold: "Rosicchia ovunque con i denti\nrobusti. Può anche abbattere\nedifici di cemento rosicchiandoli."
          soul_silver: "Con i baffi si tiene in equilibrio.\nLa continua crescita dei denti\nlo forza a rosicchiare sempre."
        de:
          heart_gold: "Es nagt mit seinen Zähnen alles an.\nEs kann sogar Gebäude aus Beton\ndadurch zum Einsturz bringen."
          soul_silver: "Mit seinen Barthaaren hält es die\nBalance. Da seine Zähne stetig wach-\nsen, muss es ständig etwas annagen."
        es:
          heart_gold: "Roe cualquier cosa con sus duros\ncolmillos. Puede hasta derribar\nciertos edificios royéndolos."
          soul_silver: "Sus bigotes le ayudan a guardar\nel equilibrio. Sus colmillos no dejan\nde crecer y los reduce mordiendo."
        ko:
          heart_gold: "단단한 이빨로 뭐든지 갉는다.\n콘크리트로 만들어진 빌딩도\n갉아서 넘어뜨린다."
          soul_silver: "수염으로 밸런스를 잡고 있다.\n이빨이 점점 길어지기 때문에\n무엇이든 갉아서 닳게 하고 있다."
spearow:
