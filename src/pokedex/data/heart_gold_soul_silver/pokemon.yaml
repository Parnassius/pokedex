        it:
          heart_gold: "Già grande alla nascita, continua\npoi a crescere, cambiando\nripetutamente la pelle."
          soul_silver: "Un Pokémon pieno di energia\nvitale. Cambia la pelle per\ndiventare sempre più grande."
        de:
          heart_gold: "Es ist bereits bei Geburt sehr\nlang. Durch permanentes Häuten\nwird es schnell noch größer."
          soul_silver: "Dieses Pokémon strotzt vor Le-\nbensenergie. Es häutet sich stän-\ndig und wird dadurch größer."
        es:
          heart_gold: "Al nacer ya tiene un tamaño\nconsiderable. Muda continuamente\nde piel a la vez que crece."
          soul_silver: "Este Pokémon está lleno de vida.\nMuda su piel continuamente\ny crece cada vez más."
        ko:
          heart_gold: "태어났을 때부터 이미 크다.\n탈피를 반복해서\n점점 자라나 길어진다."
          soul_silver: "탈피를 반복하면\n점점 크게 자라게 되는\n생명력 넘치는 포켓몬이다."
