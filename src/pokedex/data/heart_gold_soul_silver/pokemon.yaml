        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - psychic
      egg_groups:
        - human_like
      abilities:
        - insomnia
        - forewarn
      descriptions:
        jp_kana:
          heart_gold: "たのしいユメを　みていたはずなのに\nどんなユメか　おもいだせないとき。\nきっと　スリープに　たべられたのだ。"
          soul_silver: "たべたユメは　ぜんぶ　おぼえている。\nこどもの　ユメのほうが　おいしいので\nめったに　おとなの　ユメはたべない。"
        en:
          heart_gold: "If you think that you had a good dream\nbut you can’t remember it,\na DROWZEE has probably eaten it."
          soul_silver: "It remembers every dream it eats. It\nrarely eats the dreams of adults\nbecause children’s are much tastier."
        fr:
          heart_gold: "Si vous pensez avoir rêvé mais\nque vous ne vous en souvenez pas,\nc’est que SOPORIFIK a tout mangé."
          soul_silver: "Il se souvient de tous les rêves qu’il a\navalés. Il préfère les rêves plus goûtus\ndes enfants."
        it:
          heart_gold: "Se si pensa di aver fatto un bel sogno,\nma non lo si ricorda, magari l’ha\nmangiato un DROWZEE."
          soul_silver: "Ricorda ogni singolo sogno che\nmangia. Preferisce quelli dei bambini\nperché sono molto più gustosi."
        de:
          heart_gold: "Hast du gut geträumt und kannst\ndich nicht erinnern, hat ein\nTRAUMATO deinen Traum gefressen."
          soul_silver: "Es kann sich an jeden gefressenen\nTraum erinnern. Die Träume von\nKindern bekommen ihm besser."
        es:
          heart_gold: "Si crees haber tenido un buen\nsueño y no puedes acordarte, seguro\nque se lo ha comido un DROWZEE."
          soul_silver: "Recuerda todos los sueños que come.\nRaramente come sueños de adultos,\nporque los de los niños son mejores."
        ko:
          heart_gold: "즐거운 꿈을 꾸고 있었는데\n어떤 꿈인지 생각나지 않을 때는\n분명히 슬리프가 꿈을 먹었을 것이다."
          soul_silver: "먹어치운 꿈은 모두 기억하고 있다.\n아이들의 꿈이 맛있기 때문에\n어른들의 꿈은 거의 먹지 않는다."
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
    en: HYPNO
    fr: HYPNOMADE
    it: HYPNO
    de: HYPNO
    es: HYPNO
    ko: 슬리퍼
