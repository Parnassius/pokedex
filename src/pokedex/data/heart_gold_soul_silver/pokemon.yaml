          soul_silver: "パワーあふれる　ふとい　シッポは\nしめつけた　あいての　せぼねも\nかんたんに　へしおってしまう。"
        en:
          heart_gold: "It swings its big tail around during\nbattle. If its foe flinches, it will\ncharge with its sturdy body."
          soul_silver: "Its tail is thick and powerful. If\nit binds an enemy, it can render the\nvictim helpless quite easily."
        fr:
          heart_gold: "Il bouscule ses ennemis de sa\npuissante queue et les charge\nensuite pour les écraser au sol."
          soul_silver: "Si elle enserre un ennemi, sa queue\nredoutable peut briser sa colonne\nvertébrale comme un biscuit sec."
        it:
          heart_gold: "In lotta fa girare la coda. Se il nemico\ntentenna, lo carica con il suo fisico\npossente."
          soul_silver: "Ha una coda spessa e potente. Se\navvolge un nemico, può facilmente\nsopraffarlo senza via di scampo."
        de:
          heart_gold: "Es greift zuerst mit dem Schweif\nan. Weicht sein Gegner aus, greift\nes mit seinem Körper an."
          soul_silver: "Sein Schweif ist sehr stark. Wi-\nckelt es einen Gegner ein, kann\nes mühelos sein Rückgrat brechen."
        es:
          heart_gold: "Mueve su cola en combate. Si\nsu enemigo queda atontado, le\nembiste con su robusto cuerpo."
          soul_silver: "Su cola es gruesa y potente. Si\natrapa al enemigo con ella, podría\ndejarlo fuera de combate."
        ko:
          heart_gold: "큰 꼬리를 휘둘러\n상대가 풀이 죽으면 튼튼한\n몸으로 돌진해 온다."
          soul_silver: "힘이 넘치는 두꺼운 꼬리는\n힘껏 조이고 있는 상대의 척추를\n간단하게 부러뜨려버린다."
clefairy:
