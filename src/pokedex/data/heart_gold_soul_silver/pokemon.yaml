          soul_silver: "ハネを　つかっても　とべないが\nこうそくで　はばたかせることで\nたいおんを　ちょうせい　できる。"
        en:
          heart_gold: "It swings its eye-patterned pincers\nup to scare its foes. This makes\nit look like it has three heads."
          soul_silver: "Its wings are not used for flying.\nThey are flapped at high speed to\nadjust its body temperature."
        fr:
          heart_gold: "Il effraie l’ennemi en agitant ses\npinces en forme d’yeux et donne\nainsi l’impression d’avoir 3 têtes."
          soul_silver: "Ses ailes ne sont pas utilisées pour\nvoler. Il bat des ailes à grande\nvitesse pour ajuster sa température."
        it:
          heart_gold: "Agita le chele su cui sono disegnati\nocchi per spaventare i nemici.\nCosì pare avere tre teste."
          soul_silver: "Non usa le ali per volare, ma per\nregolare la temperatura corporea\nbattendole molto velocemente."
        de:
          heart_gold: "Es hält seine mit Augen gemusterten\nScheren nach oben, um seine Feinde\ndadurch abzuschrecken."
          soul_silver: "Es benutzt seine Flügel nicht zum\nfliegen, sondern regelt durch em-\nsiges Schlagen die Körpertemperatur."
        es:
          heart_gold: "Mueve sus pinzas para asustar al\nenemigo. Por los dibujos de su\ncuerpo parece tener tres cabezas."
          soul_silver: "No usa sus alas para volar. Las\nagita a gran velocidad para\nregular su temperatura."
        ko:
          heart_gold: "눈알 무늬가 붙은 집게를\n치켜들어 상대를 위협하면\n머리가 3개 있는 것처럼 보인다."
          soul_silver: "날개를 사용해도 날 수 없지만\n고속으로 날갯짓을 해서\n체온을 조절할 수 있다."
shuckle:
