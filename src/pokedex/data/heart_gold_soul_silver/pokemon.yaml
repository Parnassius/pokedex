          soul_silver: "さらに　けんきゅうが　すすめられ\nのうりょくが　たかまった。ときどき\nプログラムにない　しぐさを　みせる。"
        en:
          heart_gold: "This upgraded version of PORYGON\nis designed for space exploration.\nIt can’t fly, however."
          soul_silver: "Further research enhanced its \nabilities. Sometimes, it may exhibit\nmotions that were not programmed."
        fr:
          heart_gold: "Cette version améliorée de PORYGON\na été créée pour explorer l’espace,\nmais elle ne vole même pas."
          soul_silver: "Des recherches poussées ont\namélioré ses capacités. Il a appris\nde nouveaux mouvements."
        it:
          heart_gold: "Questa evoluzione di PORYGON è adatta\nalle esplorazioni nello spazio.\nTuttavia non sa volare."
          soul_silver: "Ricerche avanzate hanno potenziato\nle sue capacità. Ora può fare movimenti\nche non erano programmati."
        de:
          heart_gold: "Diese verbesserte PORYGON-Version\nwurde für den Einsatz im Weltall\ngebaut. Es kann aber nicht fliegen."
          soul_silver: "Seine Fähigkeiten wurden verbessert.\nEs zeigt manchmal sogar Handlungen,\ndie nicht einprogrammiert sind."
        es:
          heart_gold: "Esta versión mejorada de PORYGON\nfue creada para explorar el\nespacio, aunque no puede volar."
          soul_silver: "La investigación mejoró sus\nhabilidades. A veces, puede\nactuar de forma no programada."
        ko:
          heart_gold: "행성개발을 할 수 있도록\n폴리곤을 버전 업했지만\n아직 하늘도 날지 못한다."
          soul_silver: "더욱 연구가 진행되어\n능력이 올라갔다. 가끔\n프로그램에 없는 행동을 보인다."
stantler:
