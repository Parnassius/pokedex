          heart_gold: "Un doux parfum émane de la feuille\nplacée sur sa tête. Il est très\ngentil et aime dormir au soleil."
          soul_silver: "Sa feuille à l’arôme agréable\na le pouvoir de déterminer la\ntempérature et l’humidité."
        it:
          heart_gold: "Un dolce profumo si diffonde\ndalla sua testa. È docile\ne ama scaldarsi al sole."
          soul_silver: "Le sue foglie piacevolmente\nprofumate hanno il potere di\nrilevare l’umidità e la temperatura."
        de:
          heart_gold: "Ein süßer Duft geht von dem Blatt\nauf seinem Kopf aus. Es ist ruhig\nund liegt gerne in der Sonne."
          soul_silver: "Mit seinem aromatischem Blatt\nist es in der Lage die Temperatur\nund die Luftfeuchtigkeit zu messen."
        es:
          heart_gold: "Un dulce aroma se desprende de la\nhoja de su cabeza. Es dócil y le\nencanta absorber los rayos de sol."
          soul_silver: "Sus hojas aromáticas\nson capaces de medir la\nhumedad y la temperatura."
        ko:
          heart_gold: "머리의 잎사귀에서 살짝 달콤한\n향기가 감돈다. 얌전하며\n햇볕을 쬐는 것을 매우 좋아한다."
          soul_silver: "좋은 향기가 나는 잎사귀는\n주변의 습도나 온도를\n탐지하는 능력을 지니고 있다."
