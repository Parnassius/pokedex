      descriptions:
        jp_kana:
          heart_gold: "だいじなクキが　はえている　ばしょを\nあらそうとする　やつは　もっている\nクキを　つかいこなして　やっつける。"
          soul_silver: "ひじょうしょくの　クキを　たべると\nいちもくさんに　かけだして\nほかの　クキを　さがしにいく。"
        en:
          heart_gold: "If anyone tries to disturb where the\nessential plant stalks grow, it uses its\nown stalk to thwart them."
          soul_silver: "If it eats the plant stalk it carries\nas emergency rations, it runs off\nin search of a new stalk."
        fr:
          heart_gold: "Il défend les plants de poireaux\navec son légume pour repousser\ntous les méchants pas beaux."
          soul_silver: "S’il mange le légume qui lui sert\nde ration d’urgence, il court en\nchercher un autre au plus vite."
        it:
          heart_gold: "Se qualcuno disturba la crescita\ndei gambi per lui così preziosi, lo\nblocca usando il suo come un’arma."
          soul_silver: "Se mangia il gambo che porta con sé\nper le emergenze, corre alla ricerca\ndi un altro gambo."
        de:
          heart_gold: "Betritt jemand das Feld, auf dem\nseine Lauchstangen wachsen, vertreibt\nes ihn persönlich mit seiner Stange."
          soul_silver: "Wenn es seine Stange im Notfall\nauffrisst, begibt es sich sofort auf\ndie Suche nach einer neuen."
        es:
          heart_gold: "Si a alguien se le ocurre estropear\nlos cultivos de puerros, usará\nsu propio puerro para evitarlo."
          soul_silver: "Si se come el puerro que lleva\npara una emergencia, saldrá\ncorriendo en busca de otro puerro."
        ko:
          heart_gold: "중요한 줄기가 나는 장소를\n망치려 하는 녀석은 가지고 있는\n줄기를 써서 쓰러뜨린다."
          soul_silver: "비상식량인 줄기를 먹으면\n곧바로 달려가\n다른 줄기를 찾으러 간다."
doduo:
