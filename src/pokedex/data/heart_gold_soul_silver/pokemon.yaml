      descriptions:
        jp_kana:
          heart_gold: "ほんとうに　なにも　みえない\nくらやみで　ゴーストは　しずかに\nえものを　ねらっているのだ。"
          soul_silver: "ガスじょうの　したで　なめられると\nからだの　ふるえが　とまらなくなり\nやがては　し　に　いたるという。"
        en:
          heart_gold: "In total darkness, where nothing is\nvisible, HAUNTER lurks, silently\nstalking its next victim."
          soul_silver: "Its tongue is made of gas. If licked,\nits victim starts shaking constantly\nuntil death eventually comes."
        fr:
          heart_gold: "Dans les ténèbres impénétrables,\nlà où on ne voit rien, il se déplace\nen silence à l’affût de sa proie."
          soul_silver: "Sa langue est faite de gaz. Un ennemi\nléché est pris de tremblements\njusqu’à ce que mort s’en suive."
        it:
          heart_gold: "Nella totale oscurità, dove non si\nvede nulla, HAUNTER s’avvicina\nfurtivamente alla prossima vittima."
          soul_silver: "La sua lingua è gassosa. Se la\nvittima viene leccata, si agita\nfino a cadere sfinita."
        de:
          heart_gold: "ALPOLLO wartet in der Finsternis\nauf seine Opfer. Es lauert ihnen\nauf und stellt ihnen nach."
          soul_silver: "Seine Zunge ist aus Gas. Leckt es\nan einem Gegner, zittert er und\nverliert eventuell das Bewusstsein."
        es:
          heart_gold: "En la oscuridad total, donde no\nse ve nada, HAUNTER acecha\na su próxima víctima."
          soul_silver: "Su lengua está hecha de gas. Si lame\na su víctima, esta sufrirá constantes\ntemblores hasta que muere."
        ko:
          heart_gold: "정말 아무것도 보이지 않는\n어둠 속에서 고우스트는 조용히\n먹이를 노리고 있다."
          soul_silver: "가스로 된 혀로 핥게 되면\n몸의 떨림이 멈추지 않게 되어\n결국에는 죽음에 이른다고 전해진다."
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
