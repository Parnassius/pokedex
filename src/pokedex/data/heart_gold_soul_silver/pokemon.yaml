          soul_silver: "わざと　からだを　ばくはつさせ\nその　いきおいを　りようして\nやまから　やまへと　とんでいく。"
        en:
          heart_gold: "It sheds its skin once a year.\nThe discarded shell immediately\nhardens and crumbles away."
          soul_silver: "It is capable of blowing itself up.\nIt uses this explosive force to\njump from mountain to mountain."
        fr:
          heart_gold: "Il change de peau une fois par an.\nSa vieille armure se durcit alors\net tombe en poussière."
          soul_silver: "Capable de se faire exploser, il se\nsert de ce pouvoir pour sauter de\nmontagne en montagne."
        it:
          heart_gold: "Cambia pelle una volta all’anno.\nIl vecchio guscio subito si\nindurisce e si sgretola."
          soul_silver: "Ha la capacità di esplodere. Se\nusa la sua forza esplosiva può\nsaltare da un monte all’altro."
        de:
          heart_gold: "Es häutet sich einmal im Jahr.\nDie abgestreifte Haut wird sofort\nhart und bröckelt ab."
          soul_silver: "Es kann sich in die Luft sprengen.\nEs setzt diese Explosionen ein,\num von Berg zu Berg zu springen."
        es:
          heart_gold: "Muda su piel una vez al año. La\nconcha desechada se endurece\nde inmediato y se desmorona."
          soul_silver: "Es capaz de inflarse a sí mismo.\nUsa esta fuerza explosiva para\nsaltar de montaña a montaña."
        ko:
          heart_gold: "1년에 1번 탈피한다.\n벗어 던진 껍질은 바로 굳어\n너덜너덜하게 부서져 흩어진다."
          soul_silver: "고의로 몸을 폭발시켜\n그 기세를 이용하여\n산에서 산으로 날아간다."
ponyta:
