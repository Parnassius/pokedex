          soul_silver: "おもすぎる　キバのため\nいつも　くびを　かしげている。\nただし　かみつきは　きょうりょく。"
        en:
          heart_gold: "It is actually timid and easily\nspooked. If attacked, it flails\nabout to fend off its attacker."
          soul_silver: "Because its fangs are too heavy, it\nalways keeps its head tilted down.\nHowever, its bite is powerful."
        fr:
          heart_gold: "Il est en fait très timide et un\npeu hésitant. S’il est attaqué,\nil se défend avec énergie."
          soul_silver: "Ses crocs sont trop lourds, ce\nqui lui fait pencher la tête.\nAttention à sa morsure."
        it:
          heart_gold: "Timido e facile da spaventare, se\nattaccato inizia ad agitarsi per\ntenere lontano il nemico."
          soul_silver: "Sta sempre con il capo piegato in\navanti, perché ha le zanne troppo\npesanti. Il suo morso è potente."
        de:
          heart_gold: "Es ist sehr scheu und ängstlich.\nAttackiert man es, fuchtelt es wild\nherum, um den Gegner abzuschütteln."
          soul_silver: "Weil seine Reißzähne so schwer\nsind, ist sein Kopf gesenkt. Sein\nBiss ist jedoch schmerzhaft."
        es:
          heart_gold: "Es muy tímido y asustadizo.\nSi se siente atacado, se moverá\npara evitar al enemigo."
          soul_silver: "Debido a sus pesados colmillos,\nsiempre va con la cabeza baja.\nSu Mordisco es muy potente."
        ko:
          heart_gold: "사실은 겁쟁이다.\n습격당하면 필사적으로 손발을\n흔들어 적을 쫓아내려 한다."
          soul_silver: "너무 무거운 송곳니 때문에\n항상 목을 기울이고 있다.\n단 물어뜯기는 강력하다."
