      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      egg_groups:
        - amorphous
      abilities:
        - levitate
      descriptions:
        jp_kana:
          heart_gold: "よなかに　ひとの　なきさけぶような\nなきごえを　だして　みんなを\nおどろかせる　いたずらずき。"
          soul_silver: "いきなり　うしろがみに　かみつき\nひっぱっては　ひとの　おどろく\nすがたをみて　よろこんでいる。"
        en:
          heart_gold: "It likes playing mischievous tricks,\nsuch as screaming and wailing to\nstartle people at night."
          soul_silver: "It loves to bite and yank people’s\nhair from behind without warning,\njust to see their shocked reactions."
        fr:
          heart_gold: "Il pousse des hurlements la\nnuit pour effrayer les gens."
          soul_silver: "Il adore mordre et tirer les\ncheveux des gens par surprise,\njuste pour voir leur réaction."
        it:
          heart_gold: "Si diverte a fare brutti scherzi, come\ngridare e lamentarsi in piena notte\nspaventando la gente."
          soul_silver: "Gli piace mordere e tirare i capelli\ndelle persone all’improvviso, tanto\nper spaventarle un po’."
        de:
          heart_gold: "Es liebt Streiche und erschreckt\nnachts Menschen, indem es heult\noder ihnen im Dunkeln auflauert."
          soul_silver: "Es liebt, Menschen zu beißen und sie\nan den Haaren zu ziehen, nur um\nihre Reaktionen zu sehen."
        es:
          heart_gold: "Le gusta hacer travesuras como\ngritar y aullar por la noche,\npara asustar a la gente."
          soul_silver: "Le gusta morder y tirar del pelo de\nla gente desde atrás sin avisar,\nsolo para ver su reacción."
        ko:
          heart_gold: "밤중에 사람이 울부짖는\n울음소리를 내어 모두를\n놀라게 하는 장난꾸러기다."
          soul_silver: "갑자기 뒷머리에 달려들어\n잡아당기고는 사람들이 놀라는\n모습을 보며 즐거워한다."
unown:
  species_id: 201
  names:
    jp_kana: アンノーン
    en: UNOWN
    fr: ZARBI
    it: UNOWN
    de: ICOGNITO
    es: UNOWN
    ko: 안농
  forms:
    unown_a:
      form_id: 0
      names:
        jp_kana: あるすがた
        en: One form
        fr: Forme unique
        it: Forma Vaga
        de: Einform
        es: Una forma
        ko: 형태별 모습
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      egg_groups:
        - undiscovered
      abilities:
        - levitate
      descriptions:
        jp_kana:
          heart_gold: "すがたかたちが　むかしの　せきばんに\nしるされた　もじに　にており\nかんけいあるのではと　ウワサされる。"
          soul_silver: "からだじたいは　うすっぺらく\nいつも　かべに　はりついている。\nかたちに　なにか　いみがあるらしい。"
        en:
          heart_gold: "Their shapes look like hieroglyphs\non ancient tablets. It is said\nthat the two are somehow related."
          soul_silver: "Its flat, thin body is always\nstuck on walls. Its shape appears\nto have some meaning."
        fr:
          heart_gold: "Ils ressemblent aux vieux hiéroglyphes\ninscrits sur les tablettes.\nIl semble qu’ils y soient liés."
          soul_silver: "Son corps plat et fin est toujours\ncollé aux murs. On pense que sa\nforme a une signification."
        it:
          heart_gold: "La loro forma è simile a geroglifici su\nantiche tavole. Si pensa che non\nsia una coincidenza."
          soul_silver: "Il corpo piatto e sottile sta sempre\nattaccato ai muri. Pare che la forma\nabbia un preciso significato."
        de:
          heart_gold: "Ihr Äußeres erinnert an Hieroglyphen\nauf antiken Steinplatten. Man\nsagt, es gäbe einen Zusammenhang."
          soul_silver: "Sein flacher, dünner Körper hängt\nimmer an Wänden. Seine Form scheint\neine Bedeutung zu haben."
        es:
          heart_gold: "Tienen forma de jeroglíficos\nsobre lápidas antiguas. Dicen\nque ambos están relacionados."
          soul_silver: "Su cuerpo fino y plano aparece\nsiempre en los muros. Su forma\nparece tener algún significado."
        ko:
          heart_gold: "모습이 옛날 석판에\n새겨진 문자와 닮아서\n관계가 있을 것이라는 소문이 있다."
          soul_silver: "몸 자체는 굉장히 얇고\n항상 벽에 들러붙어 있다.\n모습에는 뭔가 의미가 있는 듯하다."
