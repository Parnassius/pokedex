          soul_silver: "あいじょう　ひょうげんで　はなを\nぶつけてくるが　ちからが　あるので\nきをつけないと　ふっとばされる。"
        en:
          heart_gold: "It swings its long snout around\nplayfully, but because it is so\nstrong, that can be dangerous."
          soul_silver: "As a sign of affection, it bumps\nwith its snout. However, it is so\nstrong, it may send you flying."
        fr:
          heart_gold: "Il balance sa trompe pour\ns’amuser, mais il est si fort que\ncela peut être dangereux."
          soul_silver: "Il se cogne sur celui ou celle\nqu’il apprécie. Il est cependant\nsi fort qu’il fait souvent mal."
        it:
          heart_gold: "Agita la proboscide per\ngioco, ma è così forte che\npuò essere pericoloso."
          soul_silver: "Dà colpi con il muso in segno di\naffetto, ma è così forte che può far\nvolare la gente in questo modo."
        de:
          heart_gold: "Es wirft seinen langen Rüssel im\nSpiel wild umher. Da es so stark\nist, könnte dies gefährlich werden."
          soul_silver: "Als Zeichen seiner Zuneigung stupst\nes dich mit dem Rüssel, was dich\naber buchstäblich umwerfen könnte."
        es:
          heart_gold: "Mueve su larga trompa para jugar,\npero como es tan fuerte, esto\npodría resultar peligroso."
          soul_silver: "Como muestra de afecto, golpea\ncon su trompa. Aunque es tan\nfuerte que te mandará lejos."
        ko:
          heart_gold: "장난칠 생각으로\n코를 휘두르며 오지만\n상당한 힘이어서 위험하다."
          soul_silver: "애정 표현으로 코를\n부딪쳐 오지만 힘이 있기 때문에\n조심하지 않으면 날아가 버린다."
donphan:
