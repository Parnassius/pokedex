          soul_silver: "おおきな　りょうめで　３６０ど\nあらゆる　ほうこうを　みわたして\nエサとなる　むしを　さがしている。"
        en:
          heart_gold: "If it flaps its wings really fast,\nit can generate shock waves that\nwill shatter windows in the area."
          soul_silver: "Its large eyes can scan 360 degrees.\nIt looks in all directions to seek\nout insects as its prey."
        fr:
          heart_gold: "En battant des ailes très vite, il\npeut générer une violente onde\nde choc qui peut briser les fenêtres."
          soul_silver: "Ses immenses yeux peuvent voir à\n360 degrés. Il regarde partout pour\ntrouver ses proies, les insectes."
        it:
          heart_gold: "Se agita le ali ad altissima velocità\npuò generare onde che distruggono\ni vetri delle finestre nella zona."
          soul_silver: "I suoi grandi occhi vedono a 360\ngradi, cercando in ogni direzione\ninsetti da catturare."
        de:
          heart_gold: "Schlägt es schnell mit den Flügeln,\nerzeugt es Schockwellen, durch die\nsogar Fenster zerbersten."
          soul_silver: "Seine riesigen Augen verfügen über\neinen Blickwinkel von 360 Grad. Es\nerspäht mit ihnen Beutetiere."
        es:
          heart_gold: "Si aletea muy rápido, genera ondas\nexpansivas capaces de hacer añicos\ntodas las ventanas próximas."
          soul_silver: "Sus grandes ojos pueden girar\n360°. Mira en todas direcciones\nen busca de insectos como presa."
        ko:
          heart_gold: "고속으로 날개를 치면\n충격파가 발생해서\n주변의 유리창이 깨진다."
          soul_silver: "커다란 양쪽 눈으로 360도\n모든 방향을 멀리 살펴서\n먹이가 되는 벌레를 찾고 있다."
