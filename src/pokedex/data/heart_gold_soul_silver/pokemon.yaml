          soul_silver: "Il reste en général courbé. S’il\nest en colère ou surpris, des\nflammes jaillissent de son dos."
        it:
          heart_gold: "Spesso se ne sta appallottolato\ngiacché timido. Se è attaccato,\nsi difende infuocando il dorso."
          soul_silver: "Di solito sta raggomitolato.\nSe ha paura o è sorpreso,\nlancia fiamme dal dorso."
        de:
          heart_gold: "Es ist ruhig und kugelt sich\nstets zusammen. Zum Schutz ent-\nflammt es seinen Rücken."
          soul_silver: "Es ist immer gebeugt. Wird es an-\ngegriffen oder ist es überrascht,\nschießen Flammen aus seinem Rücken."
        es:
          heart_gold: "Es tímido y siempre se enrosca\ncomo una pelota. Si es atacado,\nenciende su lomo para protegerse."
          soul_silver: "Suele estar acurrucado.\nSi se enfada o asusta,\nlanzará llamas por su lomo."
        ko:
          heart_gold: "겁이 많아서 늘 몸을 웅크리고\n있다. 습격당하면 등의 불꽃을\n타오르게 해서 몸을 보호한다."
          soul_silver: "평소에는 등을 둥글게 하고 있다.\n화가 났을 때와 놀랐을 때\n등에서 불꽃을 뿜어낸다."
