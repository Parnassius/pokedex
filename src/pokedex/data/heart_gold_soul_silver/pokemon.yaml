      descriptions:
        jp_kana:
          heart_gold: "とても　おなかが　すいてると\nであった　にんげんを　むりやり\nねむらせ　ユメを　たべてしまう。"
          soul_silver: "どんなときでも　もっている　ふりこを\nきまったリズムで　ゆらしている。\nちかよると　なぜか　ねむくなる。"
        en:
          heart_gold: "When it is very hungry, it puts\nhumans it meets to sleep,\nthen it feasts on their dreams."
          soul_silver: "Always holding a pendulum that it\nswings at a steady rhythm, it causes\ndrowsiness in anyone nearby."
        fr:
          heart_gold: "S’il est affamé, il endort les\nhumains qu’il rencontre pour\nse repaître de leurs rêves."
          soul_silver: "Il a un pendule qui va et vient de\nfaçon régulière et qui peut\nendormir les ennemis aux alentours."
        it:
          heart_gold: "Quando ha molta fame addormenta\ngli umani che incontra, per poi\nmangiare i loro sogni."
          soul_silver: "Il pendolo che ha sempre con sé, e\nche agita sempre allo stesso ritmo,\nfa assopire chiunque sia nei paraggi."
        de:
          heart_gold: "Wenn es hungrig ist, versetzt es\ndie Menschen, die es trifft, in\nSchlaf, um ihre Träume zu fressen."
          soul_silver: "Es hält immer ein Pendel, das es\nständig bewegt. Das verursacht bei\njedem in seiner Nähe Müdigkeit."
        es:
          heart_gold: "Cuando está muy hambriento, duerme\na los humanos que encuentra para\npoder devorar sus sueños."
          soul_silver: "Lleva siempre un péndulo que oscila\na un ritmo constante. Este\ncausa sueño a su alrededor."
        ko:
          heart_gold: "매우 배가 고플 때는\n만난 인간을 억지로\n잠들게 해 꿈을 먹어버린다."
          soul_silver: "항상 지니고 있는 추를\n규칙적인 리듬으로 흔들고 있다.\n가까이 가면 어쩐지 졸린다."
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
    en: KRABBY
    fr: KRABBY
    it: KRABBY
