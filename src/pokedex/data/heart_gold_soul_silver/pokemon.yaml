          soul_silver: "ミツのにおいに　むらがった　もの\nすべて　くちのなかで　とかしてしまう\nきょうぼうな　しょくぶつポケモン。"
        en:
          heart_gold: "Acid that has dissolved many prey\nbecomes sweeter, making it even\nmore effective at attracting prey."
          soul_silver: "This horrifying plant Pokémon attracts\nprey with aromatic honey,\nthen melts them in its mouth."
        fr:
          heart_gold: "Son acide devient plus doux\navec le temps, ce qui le rend\nplus attractif pour son gibier."
          soul_silver: "Ce terrible Pokémon Plante attire\nses proies avec un miel onctueux\npuis les avale tout rond."
        it:
          heart_gold: "L’acido si fa più dolce dopo avervi\ndissolto molte prede. Così attrae\nnuove prede ancora più facilmente."
          soul_silver: "Questo spaventoso Pokémon simile ad\nuna pianta attrae le prede con miele\nprofumato e se le scioglie in bocca."
        de:
          heart_gold: "Säure, in der bereits viele Insekten\naufgelöst wurden, ist süßer\nund effektiver beim Beutefang."
          soul_silver: "Dieses grausame Pflanzen-Pokémon\nködert Beute mit Honigaroma und\nzersetzt sie in seinem Maul."
        es:
          heart_gold: "El ácido con que disuelve a muchas\npresas se endulza, haciéndolo hasta\nmás efectivo para atraer a su presa."
          soul_silver: "Este terrorífico Pokémon planta\natrae a su presa con miel aromática\npara derretirla luego en su boca."
        ko:
          heart_gold: "많은 먹이를 녹인\n용해액은 단맛이 더해져서\n더욱 먹이를 모으기 쉽게 된다."
          soul_silver: "꿀 냄새를 맡고 모여든 것\n모두를 입안에서 녹여버리는\n난폭한 식물포켓몬이다."
tentacool:
