      descriptions:
        jp_kana:
          heart_gold: "まいにち　ミツを　あつめまわる。\nあしの　うぶげに　ミツを　ぬりこんで\nすに　もちかえる　しゅうせいをもつ。"
          soul_silver: "ハネの　りんぷんは　みずをはじく。\nどんな　あめが　ふっていても\nミツを　あつめるため　とびまわる。"
        en:
          heart_gold: "It collects honey every day. It rubs\nhoney onto the hairs on its legs\nto carry it back to its nest."
          soul_silver: "Water-repellent powder on its\nwings enables it to collect honey,\neven in the heaviest of rains."
        fr:
          heart_gold: "Il ramasse du miel chaque jour et\nil l’agglutine sur les poils de ses\npattes pour le transporter."
          soul_silver: "Une poudre imperméable protège\nses ailes et lui permet de récupérer\ndu miel par tout temps."
        it:
          heart_gold: "Raccoglie miele tutti i giorni, e\nse lo spalma sui peli delle\nzampe per trasportarlo al nido."
          soul_silver: "Grazie alla polvere idrorepellente\nsulle ali, può raccogliere miele\nanche sotto la forte pioggia."
        de:
          heart_gold: "Es sammelt täglich Honig. Es\nreibt ihn in seine Beinhaare, um\nihn in sein Nest zu transportieren."
          soul_silver: "Da seine Flügel mit einem wasser-\nabweisenden Puder überzogen sind,\nkann es im Regen Honig sammeln."
        es:
          heart_gold: "Recoge miel a diario y la\nadhiere al pelo de sus patas\npara llevarla a su colmena."
          soul_silver: "El polvo hidrófugo de sus alas le\npermite recoger miel, incluso\nbajo la lluvia más intensa."
        ko:
          heart_gold: "매일 꿀을 모으러 다닌다.\n다리의 솜털에 꿀을 발라\n둥지로 가지고 가는 습성이 있다."
          soul_silver: "날개의 가루는 물을 튕겨낸다.\n아무리 비가 내려도\n꿀을 모으기 위해 날아다닌다."
weedle:
