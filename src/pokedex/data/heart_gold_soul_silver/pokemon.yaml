          soul_silver: "あふれるほどの　でんきエネルギーを\nたいないに　ためこんでいるので\nすこしの　しげきで　ばくはつする。"
        en:
          heart_gold: "It is dangerous. If it has too much\nelectricity and has nothing to do,\nit amuses itself by exploding."
          soul_silver: "It stores an overflowing amount of\nelectric energy inside its body.\nEven a small shock makes it explode."
        fr:
          heart_gold: "Il est dangereux. S’il est trop\nchargé en électricité et qu’il\ns’ennuie, il explose."
          soul_silver: "Il stocke tellement d’énergie\ndans son corps qu’une simple\nsecousse peut le faire exploser."
        it:
          heart_gold: "Considerato pericoloso. Se ha troppa\nelettricità e non ha di meglio da\nfare, si diverte ad esplodere."
          soul_silver: "Dato che accumula nel proprio corpo\nun’incredibile quantità di elettricità,\nesplode alla minima provocazione."
        de:
          heart_gold: "Es ist gefährlich. Besitzt es zu\nviel Elektrizität und Freizeit, amü-\nsiert es sich, indem es explodiert."
          soul_silver: "Es speichert eine riesige Menge\nElektrizität in seinem Körper. Es\nexplodiert beim kleinsten Ruck."
        es:
          heart_gold: "Es peligroso. Si almacena mucha\nelectricidad y está ocioso,\nse entretiene explosionando."
          soul_silver: "Almacena una enorme cantidad\nde electricidad en su cuerpo. Una\npequeña sacudida le hará explotar."
        ko:
          heart_gold: "대량의 전기 에너지를\n주체하지 못하고 한가해지면\n폭발하며 놀기 때문에 위험하다."
          soul_silver: "넘칠 정도의 전기 에너지를\n체내에 모으고 있기 때문에\n약간의 자극만으로도 폭발한다."
