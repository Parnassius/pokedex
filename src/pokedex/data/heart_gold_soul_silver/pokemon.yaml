        jp_kana:
          heart_gold: "いかりが　さいこうちょうのとき\nさわったもの　すべて　いっしゅんで\nもえあがらせるほどに　あつい。"
          soul_silver: "もえさかる　たいもうを　こすりあわせ\nばくふうを　おこして　こうげきする\nおおわざを　かくしもっている。"
        en:
          heart_gold: "If its rage peaks, it becomes so\nhot that anything that touches it\nwill instantly go up in flames."
          soul_silver: "It has a secret, devastating move.\nIt rubs its blazing fur together\nto cause huge explosions."
        fr:
          heart_gold: "Quand il est furieux, il devient\nsi chaud que tout ce qu’il touche\ns’enflamme instantanément."
          soul_silver: "Il a un coup secret dévastateur.\nEn frottant sa fourrure ardente,\nil crée une forte explosion."
        it:
          heart_gold: "Quando è davvero arrabbiato\ndiventa così caldo che qualsiasi\ncosa tocchi va subito a fuoco."
          soul_silver: "Ha una devastante mossa segreta.\nPuò sfregare la pelliccia infuocata\ne causare forti esplosioni."
        de:
          heart_gold: "Wenn sein Zorn den Zenit über-\nsteigt, wird es so heiß, dass alles,\nwas es berührt, in Flammen aufgeht."
          soul_silver: "Es verfügt über eine verheerende\nGeheimattacke. Es reibt sein Fell,\num Explosionen zu erzeugen."
        es:
          heart_gold: "Si su furia crece, se calienta tanto\nque cualquier cosa que toque se\nprenderá al instante."
          soul_silver: "Tiene una habilidad secreta\ny devastadora. Causa explosiones\nal frotar su pelaje."
        ko:
          heart_gold: "분노가 정점에 달했을 때\n건드린 자를 모두 순식간에\n불태워버릴 정도로 뜨겁다."
          soul_silver: "한창 타오르는 털을 문질러\n폭풍을 일으켜서 공격하는\n큰 기술을 감추어 놓고 있다."
totodile:
