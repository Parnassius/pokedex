        it:
          heart_gold: "L’aroma che si spande dai suoi\npetali contiene una sostanza\nche placa gli istinti aggressivi."
          soul_silver: "Il respiro di MEGANIUM può\nfar riprendere l’erba e le piante\nmorte che ricrescono rigogliose."
        de:
          heart_gold: "Das Aroma aus seiner Blüte\nenthält Stoffe, die jegliche\nAggressivität schwinden lassen."
          soul_silver: "MEGANIE kann mit seinem Atem abge-\nstorbene Gräser und Planzen reani-\nmieren. Sie sind dann gesund."
        es:
          heart_gold: "El olor que desprenden sus\npétalos contiene una sustancia que\ncalma el instinto agresivo."
          soul_silver: "El aliento de MEGANIUM tiene\nel poder de revivir los rastrojos,\nademás de regenerarlos."
        ko:
          heart_gold: "꽃잎에서 발산되는\n향기에는 다투는 마음을\n가라앉게 하는 성분이 담겨 있다."
          soul_silver: "메가니움이 뿜어내는 숨결에는\n말라죽은 풀과 나무를 살려내는\n힘이 담겨 있다."
