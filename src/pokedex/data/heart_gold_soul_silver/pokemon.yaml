      descriptions:
        jp_kana:
          heart_gold: "もっている　タマゴを\nわらないように　きをつけて　あるく。\nでも　にげあしは　とても　はやい。"
          soul_silver: "かずが　すくなく　つかまえにくい。\nつかまえた　トレーナーに\nしあわせを　もたらすと　いわれる。"
        en:
          heart_gold: "It walks carefully to prevent its\negg from breaking. However,\nit is extremely fast at running away."
          soul_silver: "Being few in number and difficult to\ncapture, it is said to bring happiness\nto the Trainer who catches it."
        fr:
          heart_gold: "Il marche lentement pour ne pas\nabîmer son œuf. Mais il peut\ntoutefois s’enfuir très vite."
          soul_silver: "Extrêmement rare et difficile\nà trouver, il apporte joie et\nbonheur à celui qui le possède."
        it:
          heart_gold: "Cammina con prudenza per non\nrompere il suo uovo. Tuttavia,\npuò fuggire con estrema rapidità."
          soul_silver: "Poco numerosi e difficili da prendere,\nsi dice che portino fortuna a chi riesce\na catturarli."
        de:
          heart_gold: "Es läuft extrem langsam, damit\nsein Ei nicht zerbricht. Es kann\njedoch schnell davonlaufen."
          soul_silver: "Es ist selten und schwer zu fangen.\nMan sagt, es würde dem Trainer, der\nes gefangen hat, Freude bringen."
        es:
          heart_gold: "Camina con cuidado para que no se\nrompa su huevo. Sin embargo, es\nextremadamente rápida escapando."
          soul_silver: "Poco numerosos y difíciles de\ncapturar. Dicen que traen la\nfelicidad al que los captura."
        ko:
          heart_gold: "지니고 있는 알을\n깨지 않도록 조심해서 걸어 다닌다.\n그러나 도망치는 것은 매우 빠르다."
          soul_silver: "수가 적어서 잡기 어렵다.\n자신을 잡은 트레이너에게\n행복을 가져다준다고 전해진다."
tangela:
  species_id: 114
  names:
    jp_kana: モンジャラ
    en: TANGELA
    fr: SAQUEDENEU
    it: TANGELA
    de: TANGELA
    es: TANGELA
    ko: 덩쿠리
