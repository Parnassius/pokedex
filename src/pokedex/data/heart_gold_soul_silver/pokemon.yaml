        jp_kana:
          heart_gold: "キバは　ぬけても　つぎから　つぎに\nはえてくる。いつも　くちのなかには\n４８ぽんの　キバが　そろっている。"
          soul_silver: "おおぐちを　あけて　こうげき。\nかみついたとき　ぬけた　キバは\nつぎからつぎに　はえてくる。"
        en:
          heart_gold: "If it loses a fang, a new one\ngrows back in its place. There are\nalways 48 fangs lining its mouth."
          soul_silver: "It opens its huge jaws wide when\nattacking. If it loses any fangs\nwhile biting, they grow back in."
        fr:
          heart_gold: "Quand il perd un croc, il en repousse\nun autre. Sa bouche est en\npermanence composée de 48 dents."
          soul_silver: "Il ouvre grand sa mâchoire quand\nil attaque. Si ses crocs se cassent,\nils repoussent très vite."
        it:
          heart_gold: "Se perde un dente gliene ricresce\nun altro. La sua bocca contiene\nsempre 48 denti."
          soul_silver: "Quando attacca, spalanca le grandi\nmascelle. Se morsicando perde un\ndente, gli ricresce."
        de:
          heart_gold: "Verliert es einen seiner Zähne,\nwächst ein neuer nach. Es hat immer\n48 Zähne in seinem Kiefer."
          soul_silver: "Beim Angriff reißt es sein Maul auf.\nVerliert es dabei einen Zahn, wächst\ndieser schnell wieder nach."
        es:
          heart_gold: "Si pierde un colmillo, le crecerá\notro en su lugar. Siempre\ntiene 48 colmillos en su boca."
          soul_silver: "Abre sus grandes fauces cuando le\natacan. Si pierde algún colmillo al\nmorder, le vuelve a crecer."
        ko:
          heart_gold: "이빨이 빠져도 계속해서\n자란다. 항상 입안에는\n48개의 이빨이 나 있다."
          soul_silver: "큰 입을 벌려서 공격한다.\n물었을 때 빠진 이빨은\n계속해서 돋아난다."
feraligatr:
