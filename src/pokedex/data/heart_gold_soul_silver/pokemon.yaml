          soul_silver: "かんだかい　こえで　さけびながら\nこだいの　おおぞらを　とんでいたと\nされる　どうもうな　ポケモン。"
        en:
          heart_gold: "A vicious Pokémon from the distant\npast, it appears to have flown by\nspreading its wings and gliding."
          soul_silver: "This vicious Pokémon is said to\nhave flown in ancient skies while\nshrieking high-pitched cries."
        fr:
          heart_gold: "Un Pokémon féroce qui nous vient\ndu passé. Il vole en étirant ses\nailes pour planer dans les airs."
          soul_silver: "Ce terrible Pokémon a dominé\nles cieux d’une autre époque,\nterrorisant ses ennemis."
        it:
          heart_gold: "Feroce Pokémon dell’antichità.\nSi dice che potesse volare\nplanando ad ali spiegate."
          soul_silver: "Si dice che questo feroce Pokémon\nvolasse nei cieli dell’antichità lanciando\nversi acuti."
        de:
          heart_gold: "Ein fieses Pokémon aus vergangener\nZeit, das angeblich seine Flügel\neinsetzte, um zu gleiten."
          soul_silver: "Dieses grausame, antike Pokémon\nflog durch die Luft und stieß\nsehr hohe und laute Schreie aus."
        es:
          heart_gold: "Un malvado Pokémon que data de\nhace mucho tiempo. Parece volar\nextendiendo sus alas y planeando."
          soul_silver: "Dicen que este malvado Pokémon\nvolaba por los antiguos cielos\nprofiriendo sus agudos gritos."
        ko:
          heart_gold: "오랜 옛날의 사나운 포켓몬이다.\n날개를 펼쳐 하늘을\n미끄러지듯 날고 있었다고 한다."
          soul_silver: "날카로운 목소리로 울부짖으며\n고대의 넓은 하늘을 날아다녔다고\n여겨지는 거칠고 사나운 포켓몬이다."
