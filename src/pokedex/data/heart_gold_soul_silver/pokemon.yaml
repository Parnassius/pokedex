      descriptions:
        jp_kana:
          heart_gold: "こどもに　エサを　わけあたえるとき\nおやが　かみくだき　やわらかくした\nエサを　はきもどして　あたえる。"
          soul_silver: "おんこうで　やさしい　せいかく。\nツノのそだちも　おそいため\nこのんで　たたかおうとはしない。"
        en:
          heart_gold: "When feeding its young, it first\nchews the food into a paste, then\nspits it out for the offspring."
          soul_silver: "It has a calm and caring nature.\nBecause its horn grows slowly, it\nprefers not to fight."
        fr:
          heart_gold: "Pour nourrir ses petits, il mâche\nles aliments pour les rendre tendres\net il les recrache à ses bébés."
          soul_silver: "De nature calme et affectueuse, il\npréfère éviter les combats car sa\ncorne grandit lentement."
        it:
          heart_gold: "Per nutrire i piccoli, prima intenerisce\nil cibo masticandolo, poi lo sputa\nper i cuccioli."
          soul_silver: "Mite e compassionevole. Poiché il\nsuo corno ricresce lentamente,\npreferisce non lottare."
        de:
          heart_gold: "Ehe es seine Jungen füttert,\nzerkaut es das Futter und\ngibt es ihnen anschließend."
          soul_silver: "Es ist von Natur aus sehr ruhig und\numsorgend. Da sein Horn langsam\nwächst, vermeidet es den Kampf."
        es:
          heart_gold: "Cuando alimenta a sus crías,\nprimero mastica y ablanda la comida\ny luego la escupe para su prole."
          soul_silver: "Es tranquila por naturaleza.\nComo su cuerno crece lentamente,\nprefiere no luchar."
        ko:
          heart_gold: "새끼에게 먹이를 나눠줄 때\n어미가 깨물어 부드럽게 한\n먹이를 토해서 준다."
          soul_silver: "온화하고 부드러운 성격이다.\n뿔의 성장도 늦기 때문에\n잘 싸우려 하지 않는다."
nidoqueen:
  species_id: 31
  names:
