        jp_kana:
          heart_gold: "まるいものを　みつけると\nじかんを　わすれて　あそんでしまう。\nそして　つかれて　ねてしまう。"
          soul_silver: "きらきら　ひかるモノが　だいすき。\nとくに　コインが　おきにいりで\nひろっては　どこかに　かくしている。"
        en:
          heart_gold: "It is fascinated by round objects.\nIt can’t stop playing with them\nuntil it tires and falls asleep."
          soul_silver: "It loves anything that shines. It\nespecially adores coins that it\npicks up and secretly hoards."
        fr:
          heart_gold: "Il est fasciné par les objets\nronds et ne peut pas s’empêcher\nde jouer jusqu’à l’épuisement."
          soul_silver: "Il aime tout ce qui brille, et\nparticulièrement les pièces qu’il\nramasse et accumule en secret."
        it:
          heart_gold: "Gli piacciono gli oggetti rotondi.\nNon può fare a meno di giocarci\nfino a stancarsi e addormentarsi."
          soul_silver: "Ama tutto ciò che splende, soprattutto\nle monete che raccoglie e accumula\nsegretamente."
        de:
          heart_gold: "Es ist von runden Objekten faszi-\nniert. Es spielt solange damit, bis\nes müde wird und einschläft."
          soul_silver: "Es liebt alles Glänzende. Es hat\neine Vorliebe für Münzen, die es\naufliest und unbemerkt hortet."
        es:
          heart_gold: "Le fascinan los objetos redondos.\nNo deja de jugar con ellos hasta\nque se cansa y cae rendido."
          soul_silver: "Le encanta todo lo que brilla.\nAdora especialmente las monedas\nque recoge y va amontonando."
        ko:
          heart_gold: "둥근 물건을 발견하면\n장난치느라 시간가는 줄 모른다.\n그리고 지쳐서 잠들어버린다."
          soul_silver: "반짝반짝 빛나는 물건을 좋아한다.\n특히 동전을 제일 좋아해서\n주워서는 어딘가에 감춰 놓는다."
persian:
  species_id: 53
  names:
    jp_kana: ペルシアン
    en: PERSIAN
    fr: PERSIAN
    it: PERSIAN
    de: SNOBILIKAT
    es: PERSIAN
    ko: 페르시온
