          soul_silver: "どこから　シッポか　よくわからない。\nてあしは　みじかいが　すばしっこく\nうごきまわって　コラッタを　おそう。"
        en:
          heart_gold: "It makes a nest to suit its long and\nskinny body. The nest is impossible\nfor other Pokémon to enter."
          soul_silver: "There is no telling where the tail\nbegins. Despite its short legs, it is\nquick and likes to chase RATTATA."
        fr:
          heart_gold: "Il fabrique un nid qui convient\nà son corps très fin, et où lui\nseul peut entrer."
          soul_silver: "On ne peut déterminer l’endroit où\ncommence la queue. C’est un très\nbon chasseur de RATTATA."
        it:
          heart_gold: "Il suo nido è adatto al corpo lungo e\nmagro. Gli altri Pokémon non\nriescono ad entrarci."
          soul_silver: "Impossibile dire dove inizi la coda.\nNonostante le zampe corte, è veloce\na cacciare i RATTATA."
        de:
          heart_gold: "Sein Nest ist seinem schmalen und\ndünnen Körper angepasst. Kein\nanderes Pokémon kommt hinein."
          soul_silver: "Wo sein Schweif beginnt, ist schwer\nzu sagen. Trotz seiner kurzen Beine\njagt es RATTFRATZ schnell nach."
        es:
          heart_gold: "Construye un nido donde introducir\nsu largo y delgado cuerpo, en el que\nno pueden entrar otros Pokémon."
          soul_silver: "No se sabe dónde comienza su cola.\nA pesar de sus cortas patas,\nes rápido en cazar a RATTATA."
        ko:
          heart_gold: "가늘고 긴 몸의 형태에\n맞춘 둥지를 만들어 다른\n포켓몬은 들어오지 못하게 한다."
          soul_silver: "어디서부터가 꼬리인지 잘 모른다.\n손발은 짧지만 재빠르게\n움직여서 꼬렛을 덮친다."
hoothoot:
