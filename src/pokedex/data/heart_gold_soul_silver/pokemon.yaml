        it:
          heart_gold: "Si dice che questo Pokémon voli\ncontinuamente sorvolando il mare\nper salvare chi sta affogando."
          soul_silver: "Questo Pokémon di mare ha una stazza\neccezionale con cui può agilmente\nsuperare i mari più agitati."
        de:
          heart_gold: "Man sagt, dass dieses Pokémon\nständig über die Meere fliegt und\nErtrinkende rettet."
          soul_silver: "Dieses Pokémon ist so gebaut,\ndass es bedenkenlos selbst über\ntosende Gewässer fliegen kann."
        es:
          heart_gold: "Dicen que este Pokémon vuela\ncontinuamente sobre la inmensidad\ndel mar y que rescata a náufragos."
          soul_silver: "La constitución de este Pokémon\nmarino le permite volar libremente\nsobre las tempestades."
        ko:
          heart_gold: "바다에 빠진 사람을\n구하기 위해 넓은 바다를\n항상 날고 있다고 한다."
          soul_silver: "뛰어난 풍채로 성난 바다 위를\n개의치 않고 자유롭게 날아다니는\n바다의 화신이다."
