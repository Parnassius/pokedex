          soul_silver: "きんにくを　すべて　つかった\nダイナミックな　およぎが　とくいだが\nなぜか　ちじょうで　せいかつする。"
        en:
          heart_gold: "This strong and skilled swimmer is\neven capable of crossing the\nPacific Ocean just by kicking."
          soul_silver: "Although an energetic, skilled\nswimmer that uses all of its muscles,\nit lives on dry land."
        fr:
          heart_gold: "Ce puissant nageur pourrait\ntraverser l’océan Pacifique en\nquelques battements de pieds."
          soul_silver: "Nageur émérite se servant du moindre\nde ses muscles, il préfère cependant\nvivre sur la terre ferme."
        it:
          heart_gold: "Questo forte ed esperto nuotatore\npotrebbe attraversare l’oceano\nnuotando solo con gli arti inferiori."
          soul_silver: "Sebbene nuoti con potenza e abilità\nutilizzando tutti i suoi muscoli,\npreferisce vivere sulla terraferma."
        de:
          heart_gold: "QUAPPO ist ein guter Schwimmer.\nEs kann den Pazifik nur mit Einsatz\nseiner Beine durchschwimmen."
          soul_silver: "Obwohl es ein geschickter und aus-\ndauernder Schwimmer ist, der alle\nMuskeln einsetzt, lebt es an Land."
        es:
          heart_gold: "Este fuerte y hábil nadador\nes capaz hasta de cruzar los\ngrandes océanos, solo por placer."
          soul_silver: "Aunque es un nadador muy hábil\ny enérgico, que usa todos sus\nmúsculos, vive en tierra firme."
        ko:
          heart_gold: "물장구치는 것만으로도\n태평양을 횡단할 수 있을 정도로\n헤엄치는 것이 특기다."
          soul_silver: "근육을 전부 사용하는\n역동적인 헤엄치기가 특기지만\n웬일인지 지상에서 생활한다."
abra:
