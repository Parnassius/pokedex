      descriptions:
        jp_kana:
          heart_gold: "はったつした　みみを　たてて\nまわりの　けはいを　さぐる。\nなにかあると　すぐに　とびかかる。"
          soul_silver: "おこりっぽい　せいかくで\nこうふんすると　ツノを　つきさし\nもうどくを　ながしこんでくる。"
        en:
          heart_gold: "It raises its big ears to check its\nsurroundings. If it senses anything,\nit attacks immediately."
          soul_silver: "Quick to anger, it stabs enemies with\nits horn to inject a powerful poison\nwhen it becomes agitated."
        fr:
          heart_gold: "Il dresse ses oreilles à l’affût\nd’un bruit suspect et attaque\ntoute menace se rapprochant de lui."
          soul_silver: "Rapidement énervé, il frappe ses\nadversaires de sa corne qui\ninjecte un puissant poison."
        it:
          heart_gold: "Rizza le grandi orecchie per\nesaminare la zona. Se avverte\nqualcosa, attacca immediatamente."
          soul_silver: "Irascibile, quando si innervosisce\ninfilza i nemici con il corno e\ninietta un potente veleno."
        de:
          heart_gold: "Es überwacht mit seinen riesigen\nOhren die Umgebung. Registriert\nes eine Bewegung, greift es an."
          soul_silver: "Es ist aufbrausend und setzt sein\nHorn, dessen Gift im Kampf noch\npotenter ist, ohne zu zögern ein."
        es:
          heart_gold: "Levanta sus grandes orejas\npara vigilar. Si detecta algo,\natacará de inmediato."
          soul_silver: "Muy irascible. Si se altera, clava\nel cuerno a sus enemigos para\ninyectarles un potente veneno."
        ko:
          heart_gold: "발달한 귀를 세워\n주위의 낌새를 살핀다.\n무슨 일이 생기면 바로 덤벼든다."
          soul_silver: "화를 잘 내는 성격으로\n흥분을 하면 뿔로 찔러서\n맹독을 흘려 넣는다."
nidoking:
