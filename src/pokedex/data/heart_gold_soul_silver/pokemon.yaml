      descriptions:
        jp_kana:
          heart_gold: "ようかいえきの　ききめを　なくす\nえきたいも　ぶんぴつ　しているので\nじぶんは　とけたり　しないのだ。"
          soul_silver: "くちよりも　おおきな　えものは\nきれあじ　するどい　はっぱで\nきざんで　のこさず　たべるのだ。"
        en:
          heart_gold: "Even though it is filled with acid,\nit does not melt because it also\noozes a protective fluid."
          soul_silver: "If its prey is bigger than its\nmouth, it slices up the victim with\nsharp leaves, then eats every morsel."
        fr:
          heart_gold: "Il sécrète de l’acide qui ne\nle consume pas car il produit aussi\nun élément qui le neutralise."
          soul_silver: "Si sa proie est plus grande que sa\nbouche, il la découpe avec ses\nfeuilles acérées puis la dévore."
        it:
          heart_gold: "Sebbene sia pieno di acido, riesce\na non sciogliersi perché emette\nun liquido neutralizzante."
          soul_silver: "Se la preda è più grande della sua\nbocca, la fa a pezzi con foglie\naffilate prima di mangiarla."
        de:
          heart_gold: "Obwohl es mit Säure angefüllt\nist, verätzt es sich nicht, da es\ngegen Säure resistent ist."
          soul_silver: "Wenn die Beute nicht in sein\nMaul passt, zerstückelt es sie\nund frisst jeden Krümel."
        es:
          heart_gold: "Aunque está lleno de ácido, no\nllega a derretirse porque también\nrezuma fluidos neutralizantes."
          soul_silver: "Si su presa no le cabe en la boca,\nla corta con hojas afiladas,\nfacilitando su digestión."
        ko:
          heart_gold: "용해액의 효능을 없애는\n액체도 분비하고 있어서\n자신은 녹지 않는다."
          soul_silver: "입보다도 큰 먹이는\n잘 드는 날카로운 잎사귀로\n잘라 남김없이 먹어치운다."
victreebel:
