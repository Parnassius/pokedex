          soul_silver: "ちじょうを　あるきまわるときは\nぬるぬるした　どくの　ねんまくで\nからだのひょうめんを　おおっている。"
        en:
          heart_gold: "This Pokémon lives in cold water.\nIt will leave the water to search\nfor food when it gets cold outside."
          soul_silver: "When it walks around on the\nground, it coats its body with a\nslimy, poisonous film."
        fr:
          heart_gold: "Ce Pokémon vit en eaux froides.\nIl ne les quitte que pour se nourrir\nquand il fait froid à l’extérieur."
          soul_silver: "Quand il marche sur la terre\nferme, il répand une fine couche de\npoison tout le long de son corps."
        it:
          heart_gold: "Vive nell’acqua fredda. Quando fa freddo\nfuori, esce dall’acqua per cercare cibo."
          soul_silver: "Camminando avanti e indietro,\nricopre il corpo di una pellicola\nvischiosa e velenosa."
        de:
          heart_gold: "Dieses Pokémon lebt in Eiswasser.\nWird es an Land kalt, verlässt es\ndas Wasser und sucht nach Futter."
          soul_silver: "Bewegt es sich an Land, bedeckt es\nseinen gesamten Körper mit einem\nschleimigen Giftfilm."
        es:
          heart_gold: "Este Pokémon vive en aguas frías.\nSale del agua para buscar comida\ncuando refresca el ambiente."
          soul_silver: "Cuando camina por el suelo,\nenvuelve su cuerpo con una\npelícula suave y venenosa."
        ko:
          heart_gold: "차가운 물속에서 생활한다.\n근처가 선선해지면 먹이를\n찾으러 지상에도 나타난다."
          soul_silver: "지상을 돌아다닐 때는\n미끈미끈한 독의 점막으로\n몸의 표면을 덮고 있다."
quagsire:
