        - chlorophyll
        - leaf_guard
      descriptions:
        jp_kana:
          heart_gold: "ぜんしんを　おおう　ツタは\nいつも　こまかく　うごきつづけて\nあいての　しんけいを　かきみだす。"
          soul_silver: "うごくものに　ツルを　からめる。\nツルは　びみょうに　ゆれているので\nからみつかれると　くすぐったい。"
        en:
          heart_gold: "The vines that cloak its entire\nbody are always jiggling.\nThey effectively unnerve its foes."
          soul_silver: "It tangles any moving thing with\nits vines. Their subtle shaking\nis ticklish if you get ensnared."
        fr:
          heart_gold: "Les lianes qui camouflent son\ncorps bougent tout le temps, ce qui\nagace souvent ses adversaires."
          soul_silver: "Il paralyse tout ce qui bouge avec\nses lianes. Elles vous chatouillent\nsi vous êtes capturé."
        it:
          heart_gold: "Le liane che coprono il suo\ncorpo dondolano in continuazione. \nCiò innervosisce molto i nemici."
          soul_silver: "Intrappola nelle liane qualsiasi cosa si\nmuova. Il loro lieve movimento può fare\nil solletico."
        de:
          heart_gold: "Die Ranken an seinem Körper sind\nständig in Bewegung. Dadurch\nwerden seine Gegner verwirrt."
          soul_silver: "Es berührt alles, was sich bewegt,\nmit seinen Ranken. Diese Berührungen\nsind sehr kitzelig."
        es:
          heart_gold: "Las lianas que ocultan todo su\ncuerpo no dejan de moverse. Esto\ndesconcierta a sus enemigos."
          soul_silver: "Enreda cualquier cosa que se mueva\ncon sus lianas. Si te atrapa, te hará\ncosquillas con su delicado balanceo."
        ko:
          heart_gold: "전신을 덮는 덩굴은\n항상 미세하게 계속 움직여서\n상대의 신경을 흐트러뜨린다."
          soul_silver: "움직이는 것에 덩굴을 감는다.\n덩굴은 미묘하게 흔들리기 때문에\n휘감기면 간지럽다."
kangaskhan:
  species_id: 115
  names:
    jp_kana: ガルーラ
