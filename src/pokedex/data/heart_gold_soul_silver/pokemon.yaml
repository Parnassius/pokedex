      descriptions:
        jp_kana:
          heart_gold: "さむいところは　にがて。あつい\nほのおを　ふきだし　すみやすいように\nまわりの　かんきょうを　かえるのだ。"
          soul_silver: "からだの　ひょうめんには\nたいようと　おなじような　ほのおの\nゆらめきが　はっせい　している。"
        en:
          heart_gold: "It dislikes cold places, so it blows\nscorching flames to make the\nenvironment suitable for itself."
          soul_silver: "The fiery surface of its body gives\noff a wavering, rippling glare\nthat is similar to the sun."
        fr:
          heart_gold: "Il n’aime pas les endroits froids.\nIl façonne son nid à sa convenance\navec son souffle de feu."
          soul_silver: "La surface ardente de son corps émet\ndes éclats de lumière aussi puissants\nque ceux du soleil."
        it:
          heart_gold: "Odiando i luoghi freddi, li bruciacchia\nsputando fiamme che li rendono\npiù adatti ai suoi gusti."
          soul_silver: "La superficie ardente del corpo\nemana una luce irregolare e\nviolenta, simile a quella solare."
        de:
          heart_gold: "Es hasst kalte Orte. Um es für sich\nangenehmer zu gestalten, erwärmt\nes seine Umgebung mit seinem Atem."
          soul_silver: "Die feurige Haut seines Körpers\nbesitzt einen flackernden Glanz,\nder an die Sonne erinnert."
        es:
          heart_gold: "Odia los lugares fríos y despide\ncalientes llamas para hacer el\nentorno un poco más confortable."
          soul_silver: "Su ardiente piel desprende\nun brillo ondeante y cegador,\nsimilar al del sol."
        ko:
          heart_gold: "추운 곳을 싫어한다. 뜨거운\n불꽃을 뿜어내어 살기 좋게\n주위의 환경을 바꾼다."
          soul_silver: "몸의 표면에는\n태양과 같은 정도로 불꽃의\n이글거림이 발생하고 있다."
pinsir:
  species_id: 127
