          soul_silver: "くうきを　きりさく　パンチ。\nかすっただけで　やけどに　なるほど\nパンチの　スピードは　はやいのだ。"
        en:
          heart_gold: "Its punches slice the air. However,\nit seems to need a short break after\nfighting for three minutes."
          soul_silver: "Its punches slice the air. They are\nlaunched at such high speed, even a\nslight graze could cause a burn."
        fr:
          heart_gold: "Ses poings fendent l’air!\nMais il a besoin d’une petite\npause toutes les trois minutes."
          soul_silver: "Ses poings fendent l’air. Ils sont si\nrapides qu’un simple frôlement peut\ncauser une brûlure."
        it:
          heart_gold: "Fende l’aria con i suoi pugni.\nTuttavia, deve sempre fare una\npausa dopo tre minuti di lotta."
          soul_silver: "I suoi pugni fendono l’aria. Hanno\nuna tale velocità che se sfiorano\nqualcosa causano una scottatura."
        de:
          heart_gold: "Seine Fäuste zerschneiden die\nLuft. Es muss jedoch alle drei\nMinuten eine kurze Pause einlegen."
          soul_silver: "Seine Fäuste zerschneiden regel-\nrecht die Luft. Bei der geringsten\nReibung entzünden sie sich."
        es:
          heart_gold: "Sus puños cortan el aire, aunque\nparece necesitar un descanso tras\ntres minutos de combate."
          soul_silver: "Sus puñetazos cortan el aire.\nSon tan veloces que el más mínimo\nroce podría causar una quemadura."
        ko:
          heart_gold: "공기를 베어 가르는 펀치.\n하지만 3분간 공격하면\n잠시 쉬고 싶어하는 것 같다."
          soul_silver: "주변의 공기를 가르는 펀치.\n스치기만 해도 화상을 입을 정도로\n펀치 스피드는 매우 빠르다."
lickitung:
