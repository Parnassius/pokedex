          soul_silver: "たいないに　でんきが　たまると\nぜんしんの　たいもうが　ぜんぶ\nするどく　とがりはじめる。"
        en:
          heart_gold: "It concentrates the weak electric\ncharges emitted by its cells and\nlaunches wicked lightning bolts."
          soul_silver: "Every hair on its body starts to\nstand sharply on end if it becomes\ncharged with electricity."
        fr:
          heart_gold: "Il concentre la charge électrique\ncréée dans chacune de ses cellules\npour projeter un éclair."
          soul_silver: "Chaque poil sur son corps se\ndresse quand il se charge en\nélectricité."
        it:
          heart_gold: "Le sue deboli scariche elettriche\nsi concentrano nelle cellule,\nlanciando sinistre saette luminose."
          soul_silver: "Quando inizia a caricarsi di\nelettricità, gli si rizza ogni\npelo del corpo."
        de:
          heart_gold: "Es sammelt die schwache Energie,\ndie von seinen Zellen ausgeht und\nschleudert starke Blitze aus."
          soul_silver: "Lädt es sich mit Elektrizität auf,\nsteht jedes einzelne seiner Kör-\nperhaare steil nach oben."
        es:
          heart_gold: "Concentra la débil actividad\neléctrica de sus células para\nlanzar dañinas descargas."
          soul_silver: "Todos los pelos de su cuerpo se\nponen de punta si empieza a\ncargarse de electricidad."
        ko:
          heart_gold: "세포가 내고 있는 약한\n전기를 하나로 모아서\n강력한 전기를 발산한다."
          soul_silver: "체내에 전기가 모이면\n전신의 털이 모두\n날카롭게 곤두서기 시작한다."
