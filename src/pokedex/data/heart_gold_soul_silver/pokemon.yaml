          soul_silver: "くらいところも　とびまわれるのは\nちょうおんぱを　だして　まわりの\nじょうきょうを　しらべるからだ。"
        en:
          heart_gold: "While flying, it constantly emits\nultrasonic waves from its mouth to\ncheck its surroundings."
          soul_silver: "Capable of flying safely in dark\nplaces, it emits ultrasonic cries\nto check for any obstacles."
        fr:
          heart_gold: "Il émet des ultrasons avec sa\nbouche pour se repérer dans\nles environs pendant qu’il vole."
          soul_silver: "Capable de voler dans des grottes\nobscures, il émet des ultrasons pour\ndétecter les divers obstacles."
        it:
          heart_gold: "Mentre vola emette continuamente\nultrasuoni dalla bocca analizzando\ncosì l’ambiente circostante."
          soul_silver: "Capace di volare tranquillamente al\nbuio, emette versi ad ultrasuoni per\nschivare gli ostacoli."
        de:
          heart_gold: "Im Flug sendet es ständig Schall-\nwellen aus, um ein genaues Bild der\nUmgebung zu erhalten."
          soul_silver: "Es kann sicher im Dunkeln fliegen,\nda es sich mittels Ultraschallwellen\nperfekt orientieren kann."
        es:
          heart_gold: "Al volar, emite constantemente\nondas ultrasónicas por la boca\npara comprobar los alrededores."
          soul_silver: "Capaz de volar con seguridad\nen la oscuridad, emite ultrasonidos\npara detectar los obstáculos."
        ko:
          heart_gold: "날고 있을 때는 늘 입에서\n초음파를 내서 주변이\n어떤 상태인지 판단하고 있다."
          soul_silver: "캄캄한 곳도 날아다닐 수 있는 것은\n초음파를 내서 주변의\n상황을 조사하기 때문이다."
golbat:
  species_id: 42
  names:
    jp_kana: ゴルバット
    en: GOLBAT
