          soul_silver: "いぶくろの　しょうかえきは\nどんな　どくも　しょうか　できる。\nおちているものを　たべても　へいき。"
        en:
          heart_gold: "What sounds like its cry may\nactually be its snores or the\nrumblings of its hungry belly."
          soul_silver: "Its stomach’s digestive juices can\ndissolve any kind of poison. It can\neven eat things off the ground."
        fr:
          heart_gold: "Ce qui semble être son cri serait en\nfait le bruit de ses ronflements et\ndes gargouillis de son estomac."
          soul_silver: "Ses sucs digestifs peuvent dissoudre\nn’importe quel type de poison. Il peut\nmanger des aliments trouvés par terre."
        it:
          heart_gold: "Ciò che sembra il verso potrebbe invece\nessere il suo modo di russare o\nil gorgogliare dello stomaco."
          soul_silver: "I suoi succhi gastrici possono sciogliere\nqualsiasi veleno. Può mangiare anche il\ncibo per terra."
        de:
          heart_gold: "Was sich wie sein Ruf anhört, ist\ntatsächlich sein Schnarchen - oder\ndas Knurren seines Magens."
          soul_silver: "Seine Magensäfte können jedes Gift\nzersetzen. Es kann sich sogar nur von\nErdreich ernähren."
        es:
          heart_gold: "Su supuesto grito podrían ser\nsus ronquidos, o los ruidos de\nsu hambrienta tripa."
          soul_silver: "Sus jugos digestivos pueden\ndisolver cualquier tipo de veneno.\nPuede hasta comer cosas del suelo."
        ko:
          heart_gold: "울음소리라 생각되지만 사실은\n코를 고는 소리이거나 배가 고파서\n나는 소리다."
          soul_silver: "위 안의 소화액은\n어떠한 독도 소화할 수 있다.\n땅에 떨어진 것을 먹어도 괜찮다."
