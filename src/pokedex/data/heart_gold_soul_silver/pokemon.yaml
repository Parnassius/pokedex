        jp_kana:
          heart_gold: "はえたばかりの　あしで あるくのは\nにがてなので　いつも\nみずのなかを　およぎまわってる。"
          soul_silver: "おなかの　うずまきの　むきは\nちほうによって　ことなる。どうやら\nせきどうが　かんけい　するらしい。"
        en:
          heart_gold: "Because it is inept at walking on\nits newly grown legs, it always \nswims around in water."
          soul_silver: "The direction of its belly spiral\ndiffers by area. The equator is\nthought to have an effect on this."
        fr:
          heart_gold: "A la naissance, ses jambes ne peuvent\nle supporter. C’est pour cela qu’il ne\nfait que nager dans l’eau."
          soul_silver: "Le sens de la spirale sur son ventre\nchange suivant la région. On pense\nque c’est dû à l’équateur."
        it:
          heart_gold: "Non potendo camminare sulle sue\ngambe appena spuntate, non fa\nche nuotare avanti e indietro."
          soul_silver: "La direzione della spirale sulla\npancia varia da zona a zona. Si\ndice che dipenda dall’equatore."
        de:
          heart_gold: "Da es mit seinen neu gewachsenen\nFüßen noch nicht gut laufen kann,\nschwimmt es nur im Wasser umher."
          soul_silver: "Die Ausrichtung seiner Spirale\nhängt von dem Gebiet ab. Man sagt,\nder Äquator habe damit zu tun."
        es:
          heart_gold: "Por ser un poco torpe al caminar\ncon sus jóvenes patas, siempre\nprefiere nadar a caminar."
          soul_silver: "La dirección de la espiral de su\ntripa cambia por zonas. Se cree\nque le influye el ecuador."
        ko:
          heart_gold: "갓 생긴 다리로 걷는 게\n서툴러서 항상\n물속을 헤엄쳐 다닌다."
          soul_silver: "배의 소용돌이 무늬의 방향은\n지방에 따라 다르다. 아무래도\n적도와 관계가 있는 것 같다."
poliwhirl:
