      descriptions:
        jp_kana:
          heart_gold: "４まいに　ふえた　つばさで\nくらやみを　しずかに　とんでいく。\nとなりを　とおられても　きづかない。"
          soul_silver: "あしにも　ハネが　はったつしたので\nこうそくで　とべるように　なったが\nとまって　やすむのは　へたになった。"
        en:
          heart_gold: "It flies so silently through the\ndark on its four wings that it may\nnot be noticed even when nearby."
          soul_silver: "The development of wings on its legs\nenables it to fly fast but also\nmakes it tough to stop and rest."
        fr:
          heart_gold: "Il vole en silence dans l’obscurité\nà l’aide de ses quatre ailes. Même\ntrès proche on ne l’entend pas."
          soul_silver: "Les ailes qui ont poussé sur ses\npattes lui permettent de voler très\nvite mais le gênent pour dormir."
        it:
          heart_gold: "Vola nel buio con le sue quattro ali\nin modo talmente silenzioso che è\ndifficile notarlo anche se è vicino."
          soul_silver: "Le ali sviluppatissime lo fanno\nvolare veloce, ma gli rendono anche\ndifficile fermarsi e riposarsi."
        de:
          heart_gold: "Mit seinen vier Flügeln fliegt es\nso geräuschlos durch die Nacht,\ndass man es nicht bemerkt."
          soul_silver: "Durch die Bildung von Flügeln an\nseinen Beinen fliegt es schnell,\naber hat Probleme bei der Landung."
        es:
          heart_gold: "Es tan silencioso cuando vuela en la\noscuridad con sus cuatro alas, que\ncuesta percibirlo cuando se acerca."
          soul_silver: "Las alas de sus patas le permiten\nvolar rápidamente, pero también\nle dificultan pararse y descansar."
        ko:
          heart_gold: "4장으로 수가 늘어난 날개로\n어둠 속을 조용히 날아간다.\n주위를 지나쳐도 눈치채지 못한다."
          soul_silver: "발에도 날개가 발달해 있어서\n고속으로 날 수 있게 됐지만\n멈춰서 쉬는 것은 어렵게 되었다."
chinchou:
