          soul_silver: "たかい　きの　うえで　くらしている。\nえだから　えだへ　とびうつるとき\nシッポで　たくみに　バランスをとる。"
        en:
          heart_gold: "Its tail is so powerful that it can\nuse it to grab a tree branch and\nhold itself up in the air."
          soul_silver: "It lives atop tall trees. When\nleaping from branch to branch, it\ndeftly uses its tail for balance."
        fr:
          heart_gold: "Sa queue est si forte qu’il peut\nl’utiliser pour se suspendre aux\nbranches des arbres."
          soul_silver: "Il vit sur les plus hautes cimes.\nSautant de branche en branche, sa\nqueue lui assure un bon équilibre."
        it:
          heart_gold: "La sua coda è così forte che\npuò appendersi ad un albero\ne rimanere sospeso."
          soul_silver: "Vive in cima agli alberi più alti.\nUsando abilmente la coda, mantiene\nl’equilibrio quando salta di ramo in ramo."
        de:
          heart_gold: "Sein Schweif ist so kräftig, dass\nes sich stundenlang damit an\neinem Ast in der Luft halten kann."
          soul_silver: "Es lebt in den Kronen großer Bäu-\nme. Es hüpft von Ast zu Ast und\nbalanciert mit seinem Schweif."
        es:
          heart_gold: "Su cola es tan potente que puede\nusarla para agarrarse a la\nrama de un árbol y no caer."
          soul_silver: "Vive en lo alto de los árboles.\nCuando salta de rama en rama,\nusa su cola para equilibrarse."
        ko:
          heart_gold: "힘이 센 꼬리만으로\n나뭇가지에 매달려서\n몸을 지탱할 수 있다."
          soul_silver: "높은 나무 위에서 살고 있다.\n나뭇가지에서 가지로 뛰어 건널 때\n꼬리로 능숙하게 밸런스를 잡는다."
sunkern:
