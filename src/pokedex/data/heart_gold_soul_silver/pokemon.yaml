        jp_kana:
          heart_gold: "ねらいは　せいかく。ふきだす　みずは\n１００メートルさきで　うごく\nえものに　かならず　めいちゅうする。"
          soul_silver: "きゅうばんの　ように　へんかした\nせびれで　マンタインに　くっつき\nたべのこしを　わけてもらっている。"
        en:
          heart_gold: "It has superb accuracy. The water\nit shoots out can strike moving\nprey from more than 300 feet away."
          soul_silver: "Using its dorsal fin as a suction\npad, it clings to a MANTINE’s\nunderside to scavenge for leftovers."
        fr:
          heart_gold: "Il est très précis quand il crache\nses jets d’eau. Il peut toucher\nune cible mouvante à 100 mètres."
          soul_silver: "Se servant de sa nageoire dorsale,\nil s’accroche sous un DEMANTA pour\nrécupérer ses restes."
        it:
          heart_gold: "La sua precisione è straordinaria.\nPuò colpire una preda in movimento\nanche a più di 100 metri."
          soul_silver: "Usando la pinna dorsale come una\nventosa, s’attacca alla pancia di un\nMANTINE cibandosi dei suoi avanzi."
        de:
          heart_gold: "Es ist äußerst präzise. Es kann\nmit seinem Wasserschuss Beute er-\nlegen, die 100 Meter entfernt ist."
          soul_silver: "Mit seiner Rückenflosse saugt es\nsich an der Unterseite eines MANTAX\nfest und lebt von Speiseresten."
        es:
          heart_gold: "Tiene muy buena puntería. Dispara\nagua a sus presas, hasta si se están\nmoviendo, a más de 100 metros."
          soul_silver: "Usando su aleta dorsal para\nsuccionar, se une a un MANTINE\npara buscar restos de comida."
        ko:
          heart_gold: "조준이 정확하다. 뿜어낸 물은\n100m 앞에서 움직이는\n먹이를 반드시 명중시킨다."
          soul_silver: "빨판처럼 변화한\n등지느러미로 만타인에게 달라붙어\n먹다 남은 것을 얻어먹고 있다."
octillery:
  species_id: 224
  names:
    jp_kana: オクタン
    en: OCTILLERY
    fr: OCTILLERY
    it: OCTILLERY
    de: OCTILLERY
    es: OCTILLERY
    ko: 대포무노
