      descriptions:
        jp_kana:
          heart_gold: "３ばいの　じょうほうを　あつめて\nこうどな　さくせんを　ねる。たまに\nかんがえすぎて　うごけなくなる。"
          soul_silver: "どれか１つの　あたまで　エサを\nたべれば　のこりの　あたまも\nみたされて　あらそわなくなる。"
        en:
          heart_gold: "It collects data and plans three times\nas wisely, but it may think too much\nand fall into a state of immobility."
          soul_silver: "If one of the heads gets to eat,\nthe others will be satisfied, too,\nand they will stop squabbling."
        fr:
          heart_gold: "Il réfléchit trois fois avant de\nprendre une décision, ce qui\npeut le rendre immobile."
          soul_silver: "Si l’une des têtes mange, les autres\nseront également rassasiées et\narrêteront ainsi de se chamailler."
        it:
          heart_gold: "Raccoglie dati e li elabora con\nle sue tre teste, ma se si\nconcentra troppo s’immobilizza."
          soul_silver: "Se una delle teste trova del cibo,\nanche le altre sono soddisfatte\ne smettono di bisticciare."
        de:
          heart_gold: "Es sammelt Daten und überlegt sich\nalles dreimal, ehe es sich entscheidet.\nDadurch wird es oft gelähmt."
          soul_silver: "Bekommt einer der Köpfe Futter, sind\nauch die anderen zufrieden und\nhören auf zu streiten."
        es:
          heart_gold: "Recoge datos y hace planes el\ntriple de rápido, pero si piensa\ndemasiado podría quedar paralizado."
          soul_silver: "Si una de las cabezas come,\nlas otras quedarán satisfechas y\ndejarán de pelearse."
        ko:
          heart_gold: "3배의 정보를 모아\n고도의 작전을 짠다. 가끔은\n너무 많이 생각해서 움직이지 못한다."
          soul_silver: "셋 중 하나의 머리가 먹이를\n먹으면 나머지 머리도 만족해서\n다투지 않게 된다."
seel:
