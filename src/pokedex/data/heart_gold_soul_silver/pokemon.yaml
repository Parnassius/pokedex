        - normal
      egg_groups:
        - undiscovered
      abilities:
        - cute_charm
        - magic_guard
      held_items:
        common: leppa_berry
        rare: moon_stone
      descriptions:
        jp_kana:
          heart_gold: "おほしさまのような　シルエット。\nそのすがたから　ながれぼしにのって\nやってくると　しんじられている。"
          soul_silver: "ながれぼしが　おおい　よる。\nふしぎと　ピィの　すがたを\nみかけることが　おおくなる。"
        en:
          heart_gold: "Because of its unusual, starlike\nsilhouette, people believe that\nit came here on a meteor."
          soul_silver: "When numerous meteors illuminate\nthe night sky, sightings of\nCLEFFA strangely increase."
        fr:
          heart_gold: "Il ressemble un peu à une étoile.\nOn suppose qu’il est venu sur\nterre accroché à une météorite."
          soul_silver: "Quand de nombreux météores\nilluminent le ciel, on peut voir\nplus de MELO que d’habitude."
        it:
          heart_gold: "Per il suo aspetto bizzarro, a\nforma di stella, c’è chi crede\nche provenga da una meteora."
          soul_silver: "Quando molte meteore illuminano\nil cielo notturno, stranamente si\navvistano molti più CLEFFA."
        de:
          heart_gold: "Aufgrund seiner ungewöhnlichen\nSternform sagt man, es sei auf\neinem Meteor hierhergereist."
          soul_silver: "Erleuchten viele Meteore den Nacht-\nhimmel, dann kann man PII seltsamer-\nweise viel öfter begegnen."
        es:
          heart_gold: "Por su inusual forma estrellada,\nla gente cree que procede de un\nmeteorito que cayó a la tierra."
          soul_silver: "Cuando varios meteoros iluminan\nel cielo nocturno, la vista de\nCLEFFA mejora de forma extraña."
        ko:
          heart_gold: "별님 같은 실루엣이다.\n그 모습 때문에 별똥별을 타고\n온다고 여겨진다."
          soul_silver: "별똥별이 많은 밤,\n이상하게도 삐의 모습을\n발견하는 일이 많아진다."
igglybuff:
  species_id: 174
