      descriptions:
        jp_kana:
          heart_gold: "いっきに　おおぞらまで　まいあがり\nそこから　きゅうこうかで\nいっきに　おそいかかるのだ。"
          soul_silver: "ほそながい　くちばしを　じょうずに\nつかって　じめんのなかの　ちいさな\nむしを　つまみだし　たべてしまう。"
        en:
          heart_gold: "It shoots itself suddenly high into\nthe sky, then plummets down in\none fell swoop to strike its prey."
          soul_silver: "It cleverly uses its thin, long\nbeak to pluck and eat small insects\nthat hide under the ground."
        fr:
          heart_gold: "Il se propulse en l’air d’un\ncoup d’aile pour fondre en un\npiqué foudroyant sur sa proie."
          soul_silver: "Il se sert habilement de son\nbec pour dénicher de petits\ninsectes enfouis dans le sol."
        it:
          heart_gold: "Si libra improvvisamente alto nel\ncielo, poi si lancia in picchiata\ne colpisce spietatamente la preda."
          soul_silver: "Usa con astuzia il suo becco lungo\ne sottile per catturare e nutrirsi di\npiccoli insetti nascosti nel terreno."
        de:
          heart_gold: "Es fliegt steil empor und stürzt\nsich anschließend herab, um seine\nBeute zu erlegen."
          soul_silver: "Es setzt seinen langen, dünnen\nSchnabel geschickt ein, um kleine\nInsekten am Boden aufzupicken."
        es:
          heart_gold: "Asciende al cielo repentinamente\npara caer después en picado, y de\nun solo golpe atrapar a su presa."
          soul_silver: "Usa sabiamente su fino y largo\npico para extraer y comer insectos\nque se ocultan bajo tierra."
        ko:
          heart_gold: "단숨에 파란 하늘까지 날아올라\n거기서부터 급강하하여\n단숨에 공격해온다."
          soul_silver: "가늘고 긴 부리를 능숙하게\n사용하여 지면의 작은\n벌레를 집어 먹는다."
ekans:
  species_id: 23
  names:
    jp_kana: アーボ
    en: EKANS
    fr: ABO
    it: EKANS
    de: RETTAN
    es: EKANS
