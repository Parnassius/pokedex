      descriptions:
        jp_kana:
          heart_gold: "ひょろっとした　からだつき　だが\nえものを　とらえるときの　うごきは\nめにも　とまらないほど　すばやい。"
          soul_silver: "あしを　じめんふかくまで　のばして\nすいぶんを　ほきゅうする。そのとき\nおそわれると　にげだせない。"
        en:
          heart_gold: "Even though its body is extremely\nskinny, it is blindingly fast\nwhen catching its prey."
          soul_silver: "It plants its feet deep underground\nto replenish water. It can’t escape\nits enemy while it’s rooted."
        fr:
          heart_gold: "Même si son corps est très frêle,\nce Pokémon est extrêmement rapide\nquand il attaque ses adversaires."
          soul_silver: "Il enracine profondément ses\npieds pour puiser de l’eau. Il ne\npeut pas fuir dans cette position."
        it:
          heart_gold: "Sebbene abbia un corpo magrissimo,\nsa essere molto rapido quando\nsi scaglia sulla preda."
          soul_silver: "Penetra il terreno con le zampe\nper rifornirsi d’acqua. Durante\nquest’azione non può difendersi."
        de:
          heart_gold: "Obwohl sein Körper sehr schmal\nist, schnappt es blitzschnell\nnach Beute."
          soul_silver: "Es bohrt seine Füße tief in die\nErde, um Wasser aufzunehmen. Dann\nkann es nicht vor Feinden fliehen."
        es:
          heart_gold: "Aunque su cuerpo es extremadamente\ndelgado, es muy rápido a la hora\nde capturar sus presas."
          soul_silver: "Planta sus patas bajo tierra para\nabsorber agua. No puede escapar\nde su enemigo si está arraigado."
        ko:
          heart_gold: "홀쭉한 체격이지만\n먹이를 잡을 때의 움직임은\n눈에 보이지 않을 정도로 빠르다."
          soul_silver: "다리를 지면 깊이 뻗어서\n수분을 보충한다. 그때\n공격을 받으면 도망치지 못한다."
weepinbell:
