        jp_kana:
          heart_gold: "４ほんの　あしは　みじかくて\nうまく　まがれない。ただひたすらに\nとっしん　するだけだ。"
          soul_silver: "じぶんの　すすんでいる　ほうこうに\nなにが　あろうと　きにしていない。\nぜんぶ　とっしんで　こわすだけだ。"
        en:
          heart_gold: "It is inept at turning because of\nits four short legs. It can only\ncharge and run in one direction."
          soul_silver: "It doesn’t care if there is anything\nin its way. It just charges and\ndestroys all obstacles."
        fr:
          heart_gold: "Ses petites jambes ne lui permettent\npas de tourner facilement. Il ne\npeut que charger tout droit."
          soul_silver: "Quand il est lancé, plus rien ne\nl’arrête. Il vaut mieux ne pas\nse trouver sur son passage!"
        it:
          heart_gold: "Le quattro piccole zampe gli impediscono\ndi voltarsi. Così corre e attacca\nin una sola direzione."
          soul_silver: "Non si preoccupa degli oggetti che\ntrova sulla sua strada: carica e\ndistrugge ogni ostacolo."
        de:
          heart_gold: "Aufgrund seiner kurzen Beine kann\nes sich nicht umdrehen. Es kann\nimmer nur in eine Richtung laufen."
          soul_silver: "Es schert sich nicht um Hinder-\nnisse. Es greift an und zerstört alles,\nwas sich ihm in den Weg stellt."
        es:
          heart_gold: "Es un poco torpe al girar debido a\nsus cuatro cortas patas. Solo puede\natacar y correr en una dirección."
          soul_silver: "No le importa si hay algo en su\ncamino. Se limita a arremeter\ncontra cualquier obstáculo."
        ko:
          heart_gold: "4개의 다리는 짧아서\n잘 굽혀지지 않는다. 단지 한결같이\n돌진할 뿐이다."
          soul_silver: "자신이 향하고 있는 방향에\n무엇이 있든지 신경 쓰지 않는다.\n모두 돌진해서 부술 뿐이다."
rhydon:
