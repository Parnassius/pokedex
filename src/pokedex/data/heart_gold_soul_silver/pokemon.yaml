        - dragon
      abilities:
        - intimidate
        - shed_skin
      descriptions:
        jp_kana:
          heart_gold: "おなかの　おそろしい　かおのような\nもようを　みせつけ　すくんだ\nえものを　しめつけ　どくをあたえる。"
          soul_silver: "とても　しゅうねんぶかい　せいかく。\nいちど　ターゲットに　きめた\nえものは　どこまでも　おいつづける。"
        en:
          heart_gold: "Transfixing prey with the face-like\npattern on its belly, it binds\nand poisons the frightened victim."
          soul_silver: "With a very vengeful nature, it\nwon’t give up the chase, no matter\nhow far, once it targets its prey."
        fr:
          heart_gold: "Hypnotisant sa victime avec les\nmotifs dessinés sur son ventre,\nil peut ensuite l’empoisonner."
          soul_silver: "De nature revancharde, il n’abandonne\njamais sa proie lorsqu’il décide de la\nprendre en chasse."
        it:
          heart_gold: "Terrorizza la preda con il viso\ndisegnato sulla pancia, poi blocca\ne avvelena la vittima atterrita."
          soul_silver: "Molto vendicativo, se individua una\npreda non si dà pace finché non la\nraggiunge, non importa quando."
        de:
          heart_gold: "Mit seiner Musterung lähmt es den\nGegner, um ihn anschließend zu\numwickeln und zu vergiften."
          soul_silver: "Es ist sehr rachsüchtig, denn es\nverfolgt seine Beute egal wie\nweit, wenn es sie erst erspäht hat."
        es:
          heart_gold: "Paralizando a su presa con los\ndibujos de su piel, apresa y\nenvenena a la asustada víctima."
          soul_silver: "De naturaleza muy vengativa, no\ncejará en la persecución. Irá\ntras su presa, no importa adónde."
        ko:
          heart_gold: "배에 무서운 얼굴 같은\n모양을 보여 놀란\n먹이를 조이고 중독시킨다."
          soul_silver: "매우 집념이 강한 성격이다.\n한번 타깃으로 정한\n먹이는 어디든지 쫓아간다."
pikachu:
  species_id: 25
  names:
    jp_kana: ピカチュウ
