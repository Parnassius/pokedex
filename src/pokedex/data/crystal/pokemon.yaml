        attack: 90
        defense: 50
        special_attack: 85
        special_defense: 45
        speed: 55
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "おなかがへると　きれあじ　するどい\nはっぱを　とばしまくる。うんわるく\nきられると　そのまま　エサにされる。"
        en:
          crystal: "When it’s hungry,\nit swings its\nrazor-sharp\fleaves, slicing up\nany unlucky object\nnearby for food."
        fr:
          crystal: "Affamé, il remue\nses feuilles acé-\nrées et tranche\fsans scrupule tout\nce qui l’entoure."
        it:
          crystal: "Se ha fame, agita\nle foglie affilate\ncome lame, per poi\fcibarsi di ciò che\nè riuscito a\ntagliare."
        de:
          crystal: "Ist es hungrig,\nwirft es seine\nmesserscharfen\fBlätter umher, und\nzerteilt alles\num sich herum."
        es:
          crystal: "Cuando tiene\nhambre, agita las\nhojas afiladas que\ftiene y rebana lo\nque tenga a mano\npara alimentarse."
victreebel:
  species_id: 71
  names:
    jp_kana: ウツボット
    en: VICTREEBEL
    fr: EMPIFLOR
    it: VICTREEBEL
    de: SARZENIA
    es: VICTREEBEL
  forms:
    victreebel:
