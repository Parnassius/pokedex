        en:
          crystal: "This brawny\nPOKéMON courses\naround the earth,\fspouting flames\nhotter than a\nvolcano’s magma."
        fr:
          crystal: "Ce puissant POKé-\nMON court sans\narrêt en crachant\fdes flammes plus\nchaudes que du\nmagma."
        it:
          crystal: "POKéMON vigoroso,\nche corre in lungo\ne in largo\fsputando fiamme\npiù calde del\nmagma."
        de:
          crystal: "Dieses muskulöse\nPOKéMON durch-\nstreift das Land\fund spuckt Flam-\nmen heißer als\nflüssiges Magma."
        es:
          crystal: "Este musculoso\nPOKéMON recorre el\nmundo expulsando\fllamas tan calien-\ntes como el magma\nde un volcàn."
