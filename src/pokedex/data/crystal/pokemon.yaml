        special_defense: 80
        speed: 95
      types:
        - dark
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "くちから　ふきだす　ほのおは\nたいないの　どくそを　もやしたもの。\nつきさすような　においがする。"
        en:
          crystal: "The pungent-\nsmelling flame\nthat shoots from\fits mouth results\nfrom toxins burn-\ning in its body."
        fr:
          crystal: "Les flammes malo-\ndorantes qui éma-\nnent de sa bouche\fsont le résultat\nd’une combustion\nde toxines."
        it:
          crystal: "L’odore acre delle\nfiamme che gli\nescono dalla bocca\fdipende dalle\ntossine che gli\nbruciano in corpo."
        de:
          crystal: "Der stechende\nGestank seiner\nFlamme, die seinem\fMaul entspringt,\nkommt von dem Gift\nin seinem Körper."
        es:
          crystal: "Las acres llamas\nque lanza por la\nboca provienen de\flas toxinas que\narden dentro de su\ncuerpo."
kingdra:
  species_id: 230
  names:
    jp_kana: キングドラ
