        jp_kana:
          crystal: "くちびるの　しんけいが　いちばん\nはったつ　しており　みしらぬものは\nまず　くちびるで　ふれてみる。"
        en:
          crystal: "The sensitivity of\nits lips develops\nmost quickly.\fIt uses them to\ntry to identify\nunknown objects."
        fr:
          crystal: "Ses lèvres sont la\npartie la plus\nsensible de son\fcorps. Il les\nutilise pour exa-\nminer les objets."
        it:
          crystal: "La sensibilità\ndelle labbra si\nsviluppa molto\fpresto. Le usa\nper analizzare\nnuovi oggetti."
        de:
          crystal: "Die Empfindsamkeit\nseiner Lippen\nentwickelt sich am\fschnellsten. Mit\nihnen tastet es\nfremde Objekte ab."
        es:
          crystal: "Sus labios son la\nparte màs sensible\nde su cuerpo.\fLos utiliza para\ntratar de identi-\nficar objetos."
elekid:
  species_id: 239
  names:
    jp_kana: エレキッド
    en: ELEKID
    fr: ELEKID
    it: ELEKID
    de: ELEKID
    es: ELEKID
  forms:
    elekid:
      form_id: 0
      base_stats:
        hp: 45
        attack: 63
        defense: 37
        special_attack: 65
        special_defense: 55
        speed: 95
      types:
        - electric
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          crystal: "はげしい　かみなりが　だいすき。\nからだに　でんきを　ためるとき\nツノのあいだが　あおじろく　ひかる。"
        en:
          crystal: "It loves violent\nthunder. The space\nbetween its horns\fflickers bluish-\nwhite when it is\ncharging energy."
        fr:
          crystal: "Il aime les vio-\nlents éclairs.\nUn halo bleu clair\fapparaît entre ses\ncornes s’il charge\nde l’énergie."
        it:
          crystal: "Ama i violenti\ntuoni. Quando\ncarica energia, lo\fspazio tra le\ncorna si colora\ndi blu biancastro."
        de:
          crystal: "Es mag gewaltigen\nDonner. Die Luft\nzwischen seinen\fHörnern leuchtet\nblau, wenn es sich\nauflädt."
        es:
          crystal: "Adora los rayos\nmàs violentos. La\ncavidad entre sus\fcuernos vibra\ncuando està\ncargando energía."
magby:
  species_id: 240
  names:
    jp_kana: ブビィ
    en: MAGBY
    fr: MAGBY
    it: MAGBY
    de: MAGBY
    es: MAGBY
  forms:
    magby:
      form_id: 0
      base_stats:
        hp: 45
        attack: 75
        defense: 37
        special_attack: 70
        special_defense: 55
        speed: 83
      types:
        - fire
      egg_groups:
        - undiscovered
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          crystal: "うまれつき　６００どの　ひをふける。\nブビィの　すがたが　おおくなるのは\nふんかの　まえぶれと　されている。"
        en:
          crystal: "It naturally spits\nan 1100-degree\nflame. It is said\fwhen many appear,\nit heralds a\nvolcanic eruption."
        fr:
          crystal: "Il crache une\nflamme de 600\ndegrés. On dit que\fson apparition\nprovoque une érup-\ntion volcanique."
        it:
          crystal: "Sputa fiamme a 600\ngradi. Se ne\nappaiono molti,\fsi dice che un\nvulcano stia per\neruttare."
        de:
          crystal: "Die Flamme, die es\nspuckt, hat 600\nGrad C. Wo viele\fvon ihnen sind,\nkommt es zu einem\nVulkanausbruch."
        es:
          crystal: "Su naturaleza le\npermite lanzar\nllamas a 600’v. Se\fdice que si hay\nmuchos, un volcàn\nharà erupción."
miltank:
  species_id: 241
  names:
    jp_kana: ミルタンク
    en: MILTANK
    fr: ECREMEUH
    it: MILTANK
    de: MILTANK
    es: MILTANK
  forms:
    miltank:
      form_id: 0
      base_stats:
        hp: 95
        attack: 80
