        fr:
          crystal: "Né sous la terre,\nil devient une\nnymphe en avalant\fassez de terre\npour recouvrir une\nmontagne."
        it:
          crystal: "Nasce nel profondo\nsottosuolo; dopo\naver mangiato una\fmontagna di terra\nsi trasforma in\nuna crisalide."
        de:
