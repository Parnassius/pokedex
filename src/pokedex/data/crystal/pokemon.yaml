      base_stats:
        hp: 40
        attack: 80
        defense: 100
        special_attack: 30
        special_defense: 30
        speed: 20
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          crystal: "がんじょうな　からだが　じまん。\nがんがん　ぶつかりあって\nおたがいの　かたさを　きそいあう。"
        en:
          crystal: "Proud of their\nsturdy bodies,\nthey bash against\feach other in a\ncontest to prove\nwhose is harder."
        fr:
          crystal: "Fiers de leur\ncorps résistant,\nils se jettent les\funs contre les\nautres pour être\nles plus forts."
        it:
          crystal: "Fieri dei loro\ncorpi robusti, si\ndivertono a\fscontrarsi per\nvedere chi ha il\nfisico più forte."
        de:
          crystal: "Da sie stolz auf\nihre harten Körper\nsind, tragen sie\fWettbewerbe aus,\num den Härtesten\nzu ermitteln."
        es:
          crystal: "Està orgulloso del\ncuerpo robusto que\ntiene. De hecho,\fse bate con los de\nsu grupo para ver\nquién resiste màs."
graveler:
  species_id: 75
  names:
    jp_kana: ゴローン
    en: GRAVELER
    fr: GRAVALANCH
    it: GRAVELER
    de: GEOROK
    es: GRAVELER
  forms:
    graveler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 95
        defense: 115
        special_attack: 45
        special_defense: 45
        speed: 35
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          crystal: "やまみちを　ころがって　すすむ。\nスピードが　はやくなると　おおきな\nいわに　ぶつかって　とまるのだ。"
        en:
          crystal: "It travels by rol-\nling on mountain\npaths. If it gains\ftoo much speed, it\nstops by running\ninto huge rocks."
        fr:
          crystal: "Il se déplace en\nroulant sur les\nchemins de monta-\fgne. Il s’arrête\nalors en percutant\nun rocher."
        it:
          crystal: "Si muove rotolando\nper i sentieri di\nmontagna. Se è\ftroppo veloce si\nferma scontrando\nenormi rocce."
        de:
          crystal: "Es rollt Bergpfade\nentlang. Rollt es\nzu schnell, bremst\fes ab, indem es\ngegen gewaltige\nFelsen rollt."
        es:
          crystal: "Se desplaza rodan-\ndo por pasos de\nmontaña. Cuando\fcoge mucha veloci-\ndad, se estampa\ncontra las rocas."
golem:
  species_id: 76
  names:
    jp_kana: ゴローニャ
    en: GOLEM
    fr: GROLEM
    it: GOLEM
    de: GEOWAZ
    es: GOLEM
  forms:
    golem:
      form_id: 0
      base_stats:
        hp: 80
        attack: 110
        defense: 130
        special_attack: 55
        special_defense: 65
        speed: 45
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: everstone
      descriptions:
        jp_kana:
          crystal: "がんせきの　ように　がんじょうな\nからだは　とても　きょうりょくな\nダイナマイトでも　きずつかない。"
        en:
          crystal: "Its rock-like body\nis so durable,\neven high-powered\fdynamite blasts\nfail to scratch\nits rugged hide."
        fr:
          crystal: "Sa peau de pierre\nest si dure que\nmême de la dynami-\fte ne peut la\nfendre."
        it:
          crystal: "Il suo corpo è\ncosì resistente\nche neppure la\fdinamite può\nscalfirne la pelle\nindurita."
        de:
          crystal: "Sein felsartiger\nKörper ist so\nhart, dass selbst\fDynamit keine\nKratzer in seiner\nHaut hinterlässt."
        es:
          crystal: "Tiene un cuerpo\nrocoso tan fuerte\nque ni siquiera\fla dinamita màs\npotente le haría\nningùn rasguño."
ponyta:
  species_id: 77
  names:
    jp_kana: ポニータ
    en: PONYTA
    fr: PONYTA
    it: PONYTA
    de: PONITA
    es: PONYTA
  forms:
    ponyta:
      form_id: 0
      base_stats:
        hp: 50
        attack: 85
        defense: 55
        special_attack: 65
        special_defense: 65
        speed: 90
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "まいにち　のびていく　ざっそうを\nとびこえ　きたえた　ジャンプりょくは\nポケモンの　なかでも　トップクラス。"
        en:
          crystal: "Training by\njumping over grass\nthat grows longer\fevery day has made\nit a world-class\njumper."
        fr:
          crystal: "Il est devenu un\nexcellent sauteur\nde haies en s’en-\ftraînant dans les\nhautes herbes."
        it:
          crystal: "Allenandosi tra\nl’erba che cresce\nogni giorno più\falta, diventa un\neccezionale\nsaltatore."
        de:
          crystal: "Das Springen über\nGras, das täglich\nwächst, hat es zu\feinem Springer von\nWeltklasse\ngemacht."
        es:
          crystal: "Tras largos perio-\ndos de entrena-\nmiento en zonas de\fexhuberante vege-\ntación, es todo un\nexperto en salto."
rapidash:
  species_id: 78
  names:
    jp_kana: ギャロップ
    en: RAPIDASH
    fr: GALOPA
    it: RAPIDASH
    de: GALLOPA
    es: RAPIDASH
  forms:
    rapidash:
      form_id: 0
      base_stats:
        hp: 65
        attack: 100
        defense: 70
        special_attack: 80
        special_defense: 80
        speed: 105
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "とにかく　はしるのが　だいすき。\nスピードが　あがってくると\nたてがみの　ゆらめきは　ながくなる。"
        en:
          crystal: "It just loves to\ngallop. The faster\nit goes, the long-\fer the swaying\nflames of its mane\nwill become."
        fr:
          crystal: "Il adore galoper.\nPendant sa course,\nses flammes s’al-\flongent au fur et\nà mesure qu’il ga-\ngne de la vitesse."
        it:
          crystal: "Il galoppo è la\nsua grande\npassione. Più\faccelera, più\ncrescono le fiamme\ndella criniera."
        de:
          crystal: "Es liebt zu ga-\nloppieren. Je\nschneller es ist,\fdesto länger sind\ndie Flammen in\nseiner Mähne."
        es:
          crystal: "Le encanta ir al\ngalope. Cuanta màs\nvelocidad alcanza,\fmayor es la estela\nde fuego que dejan\nsus crines."
slowpoke:
  species_id: 79
  names:
    jp_kana: ヤドン
    en: SLOWPOKE
    fr: RAMOLOSS
    it: SLOWPOKE
    de: FLEGMON
    es: SLOWPOKE
  forms:
    slowpoke:
      form_id: 0
      base_stats:
        hp: 90
        attack: 65
        defense: 65
        special_attack: 40
        special_defense: 40
        speed: 15
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          crystal: "いつも　ぼんやり　としている。\nうまみが　しみでる　しっぽに\nエサが　くいついても　きづかない。"
        en:
          crystal: "It is always so\nabsent-minded that\nit won’t react,\feven if its\nflavorful tail is\nbitten."
        fr:
          crystal: "Il est tellement\nparesseux qu’il\nlui faut une jour-\fnée pour remarquer\nqu’on lui mord la\nqueue."
        it:
          crystal: "È sempre talmente\ndistratto che non\nreagisce neppure\fse gli si morsica\nla gustosissima\ncoda."
        de:
          crystal: "Es ist stets geis-\ntig abwesend. Da-\nher reagiert es\fnicht, wenn es in\nseine leckere Rute\ngebissen wird."
        es:
          crystal: "Està siempre tan\nensimismado que,\naunque le muerdan\fla cola tan apeti-\ntosa que tiene, ni\nse inmutarà."
slowbro:
  species_id: 80
  names:
    jp_kana: ヤドラン
    en: SLOWBRO
    fr: FLAGADOSS
    it: SLOWBRO
    de: LAHMUS
    es: SLOWBRO
  forms:
    slowbro:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 110
        special_attack: 100
        special_defense: 80
        speed: 30
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          crystal: "くっついている　シェルダーは\nしっぽから　にじみでる　うまみが\nほしくて　ずっと　はなれない。"
        en:
          crystal: "An attached\nSHELLDER won’t let\ngo because of the\ftasty flavor that\noozes out of its\ntail."
        fr:
          crystal: "Le KOKIYAS accro-\nché à sa queue est\nfriand de ce qu’il\fdévore et ne veut\npas lâcher prise."
        it:
          crystal: "Lo SHELLDER che\ngli sta attaccato\nnon si stacca mai,\fa causa del\nprofumo appetitoso\ndella coda."
        de:
          crystal: "Das MUSCHAS an\nseiner Rute lässt\nnicht locker, da\fein leckerer Ge-\nschmack aus seiner\nRute strömt."
        es:
          crystal: "Tiene una cola tan\napetecible, que el\nSHELLDER que va\fenganchado a ella,\nno se soltarà por\nnada del mundo."
magnemite:
  species_id: 81
  names:
    jp_kana: コイル
    en: MAGNEMITE
    fr: MAGNETI
    it: MAGNEMITE
    de: MAGNETILO
    es: MAGNEMITE
  forms:
    magnemite:
      form_id: 0
      base_stats:
        hp: 25
        attack: 35
        defense: 70
        special_attack: 95
        special_defense: 55
        speed: 45
      types:
        - electric
        - steel
      egg_groups:
        - mineral
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          crystal: "さゆうの　ユニットから　つよい\nでんきがでると　コイルの　からだは\nきょうりょくな　じしゃくになる。"
        en:
          crystal: "The electricity\nemitted by the\nunits on each side\fof its body cause\nit to become a\nstrong magnet."
        fr:
          crystal: "Le courant émis\npar les unités de\nchaque côté de son\fcorps fait de lui\nun très puissant\naimant."
        it:
          crystal: "È un potente\nmagnete, grazie\nall’elettricità\femessa dalle unità\nposte alle sue due\nestremità."
        de:
          crystal: "Beide Elemente an\nseinem Körper\nstrahlen so viel\fElektrizität ab,\ndass es ein star-\nker Magnet wird."
        es:
          crystal: "La gran cantidad\nde electricidad\nque libera por\ftodos lados, le\nconvierte en un\npotente imàn."
magneton:
  species_id: 82
  names:
    jp_kana: レアコイル
    en: MAGNETON
    fr: MAGNETON
    it: MAGNETON
    de: MAGNETON
    es: MAGNETON
  forms:
    magneton:
      form_id: 0
      base_stats:
        hp: 50
        attack: 60
        defense: 95
        special_attack: 120
        special_defense: 70
        speed: 70
      types:
        - electric
        - steel
      egg_groups:
        - mineral
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          crystal: "レアコイルが　たくさん　すがたを\nあらわすと　じきあらしが　おこって\nつうしんが　みだれる。"
        en:
          crystal: "When many\nMAGNETON gather\ntogether, the\fresulting magnetic\nstorm disrupts\nradio waves."
        fr:
          crystal: "Quand plusieurs\nMAGNETON se ras-\nsemblent, les\fondes émises font\ngriller tous les\npostes de radio."
        it:
          crystal: "Se si riuniscono\nmolti MAGNETON, si\ncrea una tempesta\fmagnetica che\ninterrompe le\nonde radio."
        de:
          crystal: "Versammeln sich\nviele MAGNETON,\nentsteht ein\fstarkes Magnet-\nfeld, das Radio-\nwellen zerstört."
        es:
          crystal: "Al unirse varios\nMAGNETON, se crea\nuna tormenta\fmagnética que\ntrastorna las\nondas de radio."
farfetchd:
  species_id: 83
  names:
    jp_kana: カモネギ
    en: FARFETCH’D
    fr: CANARTICHO
    it: FARFETCH’D
    de: PORENTA
    es: FARFETCH’D
  forms:
    farfetchd:
      form_id: 0
      base_stats:
        hp: 52
        attack: 65
        defense: 55
        special_attack: 58
        special_defense: 62
        speed: 60
      types:
        - normal
        - flying
      egg_groups:
        - flying
        - field
      held_items:
        rare: leek
      descriptions:
        jp_kana:
          crystal: "かずの　へった　カモネギを\nまもるため　クキを　そだてふやそう\nとする　ひとが　あらわれてきた。"
        en:
          crystal: "In order to pre-\nvent their\nextinction, more\fpeople have made\nan effort to breed\nthese POKéMON."
        fr:
          crystal: "Pour éviter tout\nrisque d’extinc-\ntion de l’espèce,\fnombreux sont ceux\nqui élèvent ce\nPOKéMON."
        it:
          crystal: "Molti hanno\nprovato ad\nallevare questi\fPOKéMON per\nevitarne\nl’estinzione."
        de:
          crystal: "Um sie vor dem\nAussterben zu be-\nwahren, haben mehr\fund mehr Menschen\nbegonnen, sie zu\nzüchten."
        es:
          crystal: "Muchas son las\npersonas que se\nhan ocupado de\fcriar a estos\nPOKéMON para evi-\ntar su extinción."
doduo:
  species_id: 84
  names:
    jp_kana: ドードー
    en: DODUO
    fr: DODUO
    it: DODUO
    de: DODU
    es: DODUO
  forms:
    doduo:
      form_id: 0
      base_stats:
        hp: 35
        attack: 85
        defense: 45
        special_attack: 35
        special_defense: 35
        speed: 75
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "みはらしのよい　そうげんに　すむ。\nてきを　みつけたら　すぐさま\nじそく１００キロで　かけだしていく。"
        en:
          crystal: "It lives on a\ngrassy plain where\nit can see a long\fway. If it sees an\nenemy, it runs\naway at 60 mph."
        fr:
          crystal: "Il vit dans les\nplaines pour une\nmeilleure visibi-\flité. Il peut fuir\nà plus de 100km/h."
        it:
          crystal: "Vive in praterie,\ndove può vedere\nfino a grandi\fdistanze. Se\nscorge un nemico\nfugge a 100 km/h."
        de:
          crystal: "Sein Habitat sind\ngrasige, offene\nEbenen. Entdeckt\fes einen Feind, \nrennt es mit\n100 km/h davon."
        es:
          crystal: "Vive en los pasti-\nzales, desde donde\npuede ver el hori-\fzonte. Si divisa\nal enemigo, corre\na màs de 100 km/h."
dodrio:
  species_id: 85
  names:
    jp_kana: ドードリオ
    en: DODRIO
    fr: DODRIO
    it: DODRIO
    de: DODRI
    es: DODRIO
  forms:
    dodrio:
      form_id: 0
      base_stats:
        hp: 60
        attack: 110
        defense: 70
        special_attack: 60
        special_defense: 60
        speed: 100
      types:
        - normal
        - flying
      egg_groups:
        - flying
      held_items:
        rare: sharp_beak
      descriptions:
        jp_kana:
          crystal: "３つの　あたまが　みているまえで\nわずかでも　すきを　みせると\nくちばしで　はげしく　つつかれる。"
        en:
          crystal: "An enemy that\ntakes its eyes off\nany of the three\fheads--even for a\nsecond--will get\npecked severely."
        fr:
          crystal: "Un ennemi ne fai-\nsant pas attention\nà l’une des trois\ftêtes pendant une\nseconde se fait\npicorer."
        it:
          crystal: "Occorre fare\nattenzione a tutte\nle sue tre teste,\faltrimenti si\nrischia d’essere\ncolpiti duramente."
        de:
          crystal: "Lässt ein Feind\nauch nur einen der\ndrei Köpfe für nur\feine Sekunde aus\nden Augen, wird\ner sofort gepickt."
        es:
          crystal: "Màs vale no perder\nde vista ninguna\nde las 3 cabezas.\fDe lo contrario,\nel nùmero de pico-\ntazos serà enorme."
seel:
  species_id: 86
  names:
    jp_kana: パウワウ
    en: SEEL
    fr: OTARIA
    it: SEEL
    de: JUROB
    es: SEEL
  forms:
    seel:
      form_id: 0
      base_stats:
        hp: 65
        attack: 45
        defense: 55
        special_attack: 45
        special_defense: 70
        speed: 45
      types:
        - water
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "みずいろの　たいもうに　おおわれた\nからだは　さむさに　つよい。\nこおりが　うかぶ　うみが　すき。"
        en:
          crystal: "The light blue fur\nthat covers it\nkeeps it protected\fagainst the cold.\nIt loves iceberg-\nfilled oceans."
        fr:
          crystal: "Sa fourrure bleue\nle protège du\nfroid.\fIl adore les mers\nfroides remplies\nd’icebergs."
        it:
          crystal: "Il pelo azzurro\nche lo ricopre lo\nprotegge dal\ffreddo. Predilige\nl’oceano, nuotando\ntra gli iceberg."
        de:
          crystal: "Sein hellblaues\nFell schützt es\nvor Kälte. Es\fliebt das\nSchwimmen in\nEismeeren."
        es:
          crystal: "Està cubierto de\nun pelaje de color\nazul que le sirve\fde protección para\nel frío. Adora los\nocéanos helados."
dewgong:
  species_id: 87
  names:
    jp_kana: ジュゴン
    en: DEWGONG
    fr: LAMANTINE
    it: DEWGONG
    de: JUGONG
    es: DEWGONG
  forms:
    dewgong:
      form_id: 0
      base_stats:
        hp: 90
        attack: 70
        defense: 80
        special_attack: 70
        special_defense: 95
        speed: 70
      types:
        - water
        - ice
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "みずの　おんどが　さがる　よる\nたべものを　もとめ　およぎまわる。\nひるまは　あさい　かいていで　ねる。"
        en:
          crystal: "It sleeps under\nshallow ocean\nwaters during the\fday, then looks\nfor food at night\nwhen it’s cold."
        fr:
          crystal: "Il dort dans\nl’océan le jour et\nva chasser la nuit\florsqu’il fait\nbien froid."
        it:
          crystal: "Di giorno dorme\nnell’oceano, a\npoca profondità.\fDi notte, quando\nfa più freddo,\nricerca il cibo."
        de:
          crystal: "Tagsüber schläft\nes in niedrigen\nMeerestiefen.\fNachts, wenn es\nkalt ist, sucht es\nnach Nahrung."
        es:
          crystal: "Duerme en aguas\npoco profundas\ndurante el día\fy por la noche,\ncuando hace frío,\nbusca comida."
grimer:
  species_id: 88
  names:
    jp_kana: ベトベター
    en: GRIMER
    fr: TADMORV
    it: GRIMER
    de: SLEIMA
    es: GRIMER
  forms:
    grimer:
      form_id: 0
      base_stats:
        hp: 80
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 50
        speed: 25
      types:
        - poison
      egg_groups:
        - amorphous
      held_items:
        rare: nugget
      descriptions:
        jp_kana:
          crystal: "ベトベターどうしが　くっつくと\nおたがいの　からだが　まざりあって\nあたらしい　どくが　うみだされる。"
        en:
          crystal: "When two of these\nPOKéMON’s bodies\nare combined\ftogether, new\npoisons are\ncreated."
        fr:
          crystal: "Quand les corps de\n2 TADMORV se com-\nbinent, de nou-\fveaux poisons sont\ncréés."
        it:
          crystal: "Quando due di\nquesti POKéMON\ncombinano i propri\fcorpi, si creano\nnuove forme di\nveleno."
        de:
          crystal: "Kombiniert man\nzwei dieser\nPOKéMON, so\fentstehen völlig\nneue Arten von\nGift."
        es:
          crystal: "Cuando se une\na otro compañero\nde su especie,\fse generan nuevos\ntipos de sustancia\nvenenosa."
muk:
  species_id: 89
  names:
    jp_kana: ベトベトン
    en: MUK
    fr: GROTADMORV
    it: MUK
    de: SLEIMOK
    es: MUK
  forms:
    muk:
      form_id: 0
      base_stats:
        hp: 105
        attack: 105
        defense: 75
        special_attack: 65
        special_defense: 100
        speed: 50
      types:
        - poison
      egg_groups:
        - amorphous
      held_items:
        rare: nugget
      descriptions:
        jp_kana:
          crystal: "ベトベトンが　とおったあとは\nもうどくが　しみこみ　３ねんたっても\nくさきが　はえてこない。"
        en:
          crystal: "As it moves, a\nvery strong poison\nleaks from it,\fmaking the ground\nthere barren for\nthree years."
        fr:
          crystal: "En bougeant, il\nlaisse un puissant\npoison derrière\flui et rend la\nterre stérile pour\n3 ans."
        it:
          crystal: "Muovendosi lascia\ncadere un veleno\ncosì potente, che\fsu quel terreno\nnon crescerà nulla\nper tre anni."
        de:
          crystal: "Bei jeder Bewegung\ntropft Gift aus\nihm heraus auf den\fBoden, der dadurch\nfür drei Jahre\nverseucht ist."
        es:
          crystal: "A medida que se\nmueve, va goteando\nun veneno letal\fque deja estéril\nel terreno\ndurante tres años."
shellder:
  species_id: 90
  names:
    jp_kana: シェルダー
    en: SHELLDER
    fr: KOKIYAS
    it: SHELLDER
    de: MUSCHAS
    es: SHELLDER
  forms:
    shellder:
      form_id: 0
      base_stats:
        hp: 30
        attack: 65
        defense: 100
        special_attack: 45
        special_defense: 25
        speed: 40
      types:
        - water
      egg_groups:
        - water_3
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          crystal: "カラで　はさみこむのは\nやわらかい　なかみを　さらけだすので\nいちか　ばちかの　しゅだん　なのだ。"
        en:
          crystal: "Clamping on to an\nopponent reveals\nits vulnerable\fparts, so it uses\nthis move only as\na last resort."
        fr:
          crystal: "Il se referme sur\nun ennemi pour at-\ntaquer mais ceci\fle rend vulnérable\net il ne le fait\nque rarement."
        it:
          crystal: "Mentre attanaglia\nil nemico diviene\nvulnerabile,\fperciò usa questa\ntecnica come\nultima risorsa."
        de:
          crystal: "Da es seine ver-\nwundbarste Stelle\nbeim Klammern\fpreisgibt, tut es\ndies nur in wirk-\nlichen Notfällen."
        es:
          crystal: "Cuando utiliza la\nTENAZA en combate,\nse vuelve vulnera-\fble. Por eso sólo\nla usa como ùltimo\nrecurso."
cloyster:
  species_id: 91
  names:
    jp_kana: パルシェン
    en: CLOYSTER
    fr: CRUSTABRI
    it: CLOYSTER
    de: AUSTOS
    es: CLOYSTER
  forms:
    cloyster:
      form_id: 0
      base_stats:
        hp: 50
        attack: 95
        defense: 180
        special_attack: 85
        special_defense: 45
        speed: 70
      types:
        - water
        - ice
      egg_groups:
        - water_3
      held_items:
        common: pearl
        rare: big_pearl
      descriptions:
        jp_kana:
          crystal: "あいてを　つきさすための　トゲは\nナパームだん　でも　こわせない\nカラよりも　はるかに　かたいのだ。"
        en:
          crystal: "Even a missile\ncan’t break the\nspikes it uses to\fstab opponents.\nThey’re even hard-\ner than its shell."
        fr:
          crystal: "Un missile ne peut\npas détruire les\npics qu’il jette\fsur ses ennemis.\nIls sont plus durs\nque sa coquille."
        it:
          crystal: "Neppure un missile\npotrebbe scalfire\nle punte con cui\fcolpisce i nemici.\nSono ancora più\ndure del guscio."
        de:
          crystal: "Nicht einmal eine\nRakete kann seine\nAngriffsstacheln\fzerbrechen. Sie\nsind härter als\nseine Schale."
        es:
          crystal: "Ni el misil màs\ndevastador podría\ndestrozarle los\fpinchos que tiene.\nSon aùn màs duros\nque la concha."
gastly:
  species_id: 92
  names:
    jp_kana: ゴース
    en: GASTLY
    fr: FANTOMINUS
    it: GASTLY
    de: NEBULAK
    es: GASTLY
  forms:
    gastly:
      form_id: 0
      base_stats:
        hp: 30
        attack: 35
        defense: 30
        special_attack: 100
        special_defense: 35
        speed: 80
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "ガスじょうの　からだで　まとわりつき\nえものの　ひふから　すこしずつ\nどくを　おくりこんで　よわらせる。"
        en:
          crystal: "It wraps its op-\nponent in its gas-\nlike body, slowly\fweakening its prey\nby poisoning it\nthrough the skin."
        fr:
          crystal: "Il enferme ses\nproies dans un\nnuage de gaz et\fles empoisonne à\ntravers leur peau."
        it:
          crystal: "Avvolge il nemico\nnel corpo gassoso,\nindebolendolo\flentamente con\nil veleno che gli\npenetra la pelle."
        de:
          crystal: "Es umwickelt seine\nFeinde mit seinem\nGaskörper und\fschwächt sie,\nindem es langsam\nGift injiziert."
        es:
          crystal: "Su estrategia con-\nsiste en envolver\na su rival con su\fgaseoso cuerpo\nenvenenàndole a\ntravés de la piel."
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
    en: HAUNTER
    fr: SPECTRUM
    it: HAUNTER
    de: ALPOLLO
    es: HAUNTER
  forms:
    haunter:
      form_id: 0
      base_stats:
        hp: 45
        attack: 50
        defense: 45
        special_attack: 115
        special_defense: 55
        speed: 95
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "くらやみで　いきを　ひそめながら\nまよいこんだ　えものの　いのちを\nうばおうと　たくらんでいる。"
        en:
          crystal: "It hides in the\ndark, planning to\ntake the life of\fthe next living\nthing that wanders\nclose by."
        fr:
          crystal: "Il se cache dans\nle noir, cherchant\nà prendre la vie\fde la prochaine\ncréature qui le\ncroise."
        it:
          crystal: "Si cela nell’ombra\nattendendo di\nsopraffare il\fprossimo essere\nvivente che gli\ncapita a tiro."
        de:
          crystal: "Es versteckt sich\nim Dunkeln und\nwartet nur darauf,\fdem nächsten Lebe-\nwesen sein Leben\nauszuhauchen."
        es:
          crystal: "Se refugia en la\noscuridad y perma-\nnece al acecho,\fhasta que coge por\nsorpresa a su\npróxima víctima."
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
    en: GENGAR
    fr: ECTOPLASMA
    it: GENGAR
    de: GENGAR
    es: GENGAR
  forms:
    gengar:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 75
        speed: 110
      types:
        - ghost
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "よなか　ひとの　かげに　もぐりこみ\nすこしずつ　たいおんを　うばう。\nねらわれると　さむけが　とまらない。"
        en:
          crystal: "Hiding in people’s\nshadows at night,\nit absorbs their\fheat. The chill it\ncauses makes the\nvictims shake."
        fr:
          crystal: "Il se cache dans\nl’ombre des pas-\nsants et vole leur\fchaleur. Ses vic-\ntimes ressentent\nalors un frisson."
        it:
          crystal: "Di notte si cela\nnell’ombra delle\nvittime per\fassorbirne il\ncalore, provocando\nloro un tremito."
        de:
          crystal: "Es versteckt sich\nim Schatten der\nMenschen und\fabsorbiert deren\nWärme, so dass die\nMenschen frieren."
        es:
          crystal: "De noche, se ocul-\nta en las sombras\ny absorbe el calor\fde la gente. El\nfrío que transmite\nes estremecedor."
onix:
  species_id: 95
  names:
    jp_kana: イワーク
    en: ONIX
    fr: ONIX
    it: ONIX
    de: ONIX
    es: ONIX
  forms:
    onix:
      form_id: 0
      base_stats:
        hp: 35
        attack: 45
        defense: 160
        special_attack: 30
        special_defense: 45
        speed: 70
      types:
        - rock
        - ground
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          crystal: "ちちゅうを　ほりすすみながら\nいろんな　かたいものを　とりこみ\nがんじょうな　からだをつくる。"
        en:
          crystal: "As it digs through\nthe ground, it\nabsorbs many hard\fobjects. This is\nwhat makes its\nbody so solid."
        fr:
          crystal: "En creusant le sol\nil absorbe des\néléments solides,\fce qui lui donne\nde la consistance."
        it:
          crystal: "Mentre scava nel\nterreno assorbe\nmolti oggetti\fduri: per questo\nil suo corpo è\ncosì solido."
        de:
          crystal: "Wenn es sich durch\ndie Erde gräbt,\nnimmt es viele\fharte Gegenstände\nauf, die seinen\nKörper erhärten."
        es:
          crystal: "Al abrirse paso\nbajo tierra, va\nabsorbiendo todo\flo que encuentra.\nEso hace que su\ncuerpo sea sólido."
drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
    en: DROWZEE
    fr: SOPORIFIK
    it: DROWZEE
    de: TRAUMATO
    es: DROWZEE
  forms:
    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
        defense: 45
        special_attack: 43
        special_defense: 90
        speed: 42
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "つきでた　はなを　ひくひくさせると\nどこの　だれが　どんな　ゆめを\nみているのか　ぜんぶ　わかるという。"
        en:
          crystal: "When it twitches\nits nose, it can\ntell where someone\fis sleeping and\nwhat that person\nis dreaming about."
        fr:
          crystal: "Quand il remue son\nnez, il devine où\nsont les dormeurs\fet à quoi ils\nrêvent."
        it:
          crystal: "Storcendo il naso\npuò leggere i\nsogni di coloro\fche stanno\ndormendo e capire\ndove si trovano."
        de:
          crystal: "Wenn es mit der\nNase zuckt, kann\nes feststellen, wo\fjemand schläft und\nwas er gerade\nträumt."
        es:
          crystal: "Cuando tuerce el\nhocico, nota si\nhay alguien\fdormido y con qué\nestà soñando en\nese momento."
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
    en: HYPNO
    fr: HYPNOMADE
    it: HYPNO
    de: HYPNO
    es: HYPNO
  forms:
    hypno:
      form_id: 0
      base_stats:
        hp: 85
        attack: 73
        defense: 70
        special_attack: 73
        special_defense: 115
        speed: 67
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "てにもった　ふりこの　ゆれが\nおおきいほど　さいみんじゅつの\nききめは　ながくなる。"
        en:
          crystal: "The longer it\nswings its\npendulum, the\flonger the effects\nof its hypnosis\nlast."
        fr:
          crystal: "Plus il balance\nson pendule, plus\nil maintient ses\fadversaires en-\ndormis."
        it:
          crystal: "Più a lungo fa\noscillare il\npendolo, più\fpersistenti sono\ngli effetti della\nsua ipnosi."
        de:
          crystal: "Je länger es sein\nPendel schwingt,\ndesto länger sind\fauch die Auswir-\nkungen seiner\nHypnose zu spüren."
        es:
          crystal: "Cuanto màs haga\noscilar el péndulo\nque sostiene, màs\fduraderos seràn\nlos efectos de su\nHIPNOSIS."
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
    en: KRABBY
    fr: KRABBY
    it: KRABBY
    de: KRABBY
    es: KRABBY
  forms:
    krabby:
      form_id: 0
      base_stats:
        hp: 30
        attack: 105
        defense: 90
        special_attack: 25
        special_defense: 25
        speed: 50
      types:
        - water
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          crystal: "エサが　みつからないとき\nすなをたべ　そのなかに　ふくまれる\nえいようぶんを　きゅうしゅう　する。"
        en:
          crystal: "If it is unable\nto find food, it\nwill absorb\fnutrients by\nswallowing a\nmouthful of sand."
        fr:
          crystal: "S’il ne peut trou-\nver de nourriture,\nil avale un petit\ftas de sable et en\nabsorbe les nutri-\nments."
        it:
          crystal: "Se non può trovare\ndel cibo, ingoia\nun po’ di sabbia\fper assorbirne le\nsostanze\nnutritive."
        de:
          crystal: "Findet es keine\nNahrung, ver-\nschluckt es ein\fMaul voll Sand und\nfiltert die Nähr-\nstoffe heraus."
        es:
          crystal: "Si no consigue\nencontrar comida,\nse conformarà con\fabsorber los nu-\ntrientes que pueda\nhaber en la arena."
kingler:
  species_id: 99
  names:
    jp_kana: キングラー
    en: KINGLER
    fr: KRABBOSS
    it: KINGLER
    de: KINGLER
    es: KINGLER
  forms:
    kingler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 130
        defense: 115
        special_attack: 50
        special_defense: 50
        speed: 75
      types:
        - water
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          crystal: "はかいりょく　ばつぐんの　おおきな\nハサミだが　おもすぎるので\nたたかわないときは　じゃまになる。"
        en:
          crystal: "Its oversized claw\nis very powerful,\nbut when it’s not\fin battle, the\nclaw just gets in\nthe way."
        fr:
          crystal: "Sa pince gigantes-\nque est une arme\nterrible, mais en\fdehors des com-\nbats, elle est\ntrès gênante."
        it:
          crystal: "Le enormi chele,\nmolto potenti,\nsono d’impiccio\fquando non si\ntrova in\nbattaglia."
        de:
          crystal: "Seine Riesenschere\nist sehr stark,\nwenn es aber nicht\fkämpft, kommt sie\nihm häufig in die\nQuere."
        es:
          crystal: "Las grandes dimen-\nsiones de la pinza\nque posee son muy\fùtiles en combate,\npero un estorbo a\nla hora de andar."
voltorb:
  species_id: 100
  names:
    jp_kana: ビリリダマ
    en: VOLTORB
    fr: VOLTORBE
    it: VOLTORB
    de: VOLTOBAL
    es: VOLTORB
  forms:
    voltorb:
      form_id: 0
      base_stats:
        hp: 40
        attack: 30
        defense: 50
        special_attack: 55
        special_defense: 55
        speed: 100
      types:
        - electric
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          crystal: "からだの　せいぶんを　しらべると\nしぜんには　ありえない　ぶっしつで\nできていることが　わかった。"
        en:
          crystal: "During the study\nof this POKéMON,\nit was discovered\fthat its compo-\nnents are not\nfound in nature."
        fr:
          crystal: "Lors de l’examen\nde ce POKéMON, on\na découvert qu’il\fn’était pas cons-\ntitué d’éléments\nnaturels."
        it:
          crystal: "Studiando questo\nPOKéMON, s’è\nscoperto che le\fsostanze di cui è\ncomposto non si\ntrovano in natura."
        de:
          crystal: "Als man dieses\nPOKéMON er-\nforschte, fand man\fheraus, dass seine\nTeile nicht\nnatürlich sind."
        es:
          crystal: "Tras muchas inves-\ntigaciones, se vio\nque los elementos\fque componen este\nPOKéMON no estàn\nen la naturaleza."
electrode:
  species_id: 101
  names:
    jp_kana: マルマイン
    en: ELECTRODE
    fr: ELECTRODE
    it: ELECTRODE
    de: LEKTROBAL
    es: ELECTRODE
  forms:
    electrode:
      form_id: 0
      base_stats:
        hp: 60
        attack: 50
        defense: 70
        special_attack: 80
        special_defense: 80
        speed: 140
      types:
        - electric
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          crystal: "でんきエネルギーを　ためこむほど\nこうそくで　うごけるようになるが\nそのぶん　ばくはつ　しやすい。"
        en:
          crystal: "The more energy it\ncharges up, the\nfaster it gets.\fBut this also\nmakes it more\nlikely to explode."
        fr:
          crystal: "Plus il charge\nd’énergie, plus il\nest rapide.\fIl devient alors\nplus à même\nd’exploser."
        it:
          crystal: "L’energia che\nimmagazzina lo fa\nandare sempre più\fveloce, ma lo fa\nanche esplodere\npiù facilmente."
        de:
          crystal: "Je länger es sich\nauflädt, desto\nschneller ist es.\fDadurch steigt das\nRisiko, frühzeitig\nzu explodieren."
        es:
          crystal: "Cuanta màs energía\nalmacena, mayor\nvelocidad alcanza.\fAunque, el riesgo\nde que explote es\ntambién mayor."
exeggcute:
  species_id: 102
  names:
    jp_kana: タマタマ
    en: EXEGGCUTE
    fr: NOEUNOEUF
    it: EXEGGCUTE
    de: OWEI
    es: EXEGGCUTE
  forms:
    exeggcute:
      form_id: 0
      base_stats:
        hp: 60
        attack: 40
        defense: 80
        special_attack: 60
        special_defense: 45
        speed: 40
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "１ぴきだけ　ひきはなそうと　しても\nきょうりょくに　ひきあっているので\nすぐに　６ぴき　あつまってしまう。"
        en:
          crystal: "If even one is\nseparated from the\ngroup, the energy\fbond between the\nsix will make them\nrejoin instantly."
        fr:
          crystal: "Même si l’un d’eux\nest séparé du\ngroupe, l’énergie\fqui les unit les\nfera se regrouper\nà nouveau."
        it:
          crystal: "L’energia che lega\nil gruppo è così\nforte che se uno\fdei sei si stacca,\nviene subito\nriassorbito."
        de:
          crystal: "Selbst wenn sie\ngetrennt werden,\nkommen sie auf\fGrund ihres Ener-\ngiebundes sofort\nwieder zusammen."
        es:
          crystal: "Si alguno se sepa-\nra de los seis,\nla energía que les\fune le absorberà y\nle devolverà junto\na sus compañeros."
exeggutor:
  species_id: 103
  names:
    jp_kana: ナッシー
    en: EXEGGUTOR
    fr: NOADKOKO
    it: EXEGGUTOR
    de: KOKOWEI
    es: EXEGGUTOR
  forms:
    exeggutor:
      form_id: 0
      base_stats:
        hp: 95
        attack: 95
        defense: 85
        special_attack: 125
        special_defense: 65
        speed: 55
      types:
        - grass
        - psychic
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "よい　かんきょうで　そだちすぎて\nたくさん　ふえた　あたまは\nどれか　おちて　タマタマになる。"
        en:
          crystal: "Living in a good\nenvironment makes\nit grow lots of\fheads. A head that\ndrops off becomes\nan EXEGGCUTE."
        fr:
          crystal: "En grandissant\ndans un environne-\nment propice,\fil développe plu-\nsieurs têtes."
        it:
          crystal: "Se si trova in un\nambiente adatto,\ngli crescono molte\fteste. Cadendo,\nuna testa diventa\nun EXEGGCUTE."
        de:
          crystal: "Fühlt es sich\nwohl, wachsen ihm\nKöpfe. Fällt ein\fKopf zu Boden,\nwird daraus ein\nOWEI."
        es:
          crystal: "Deben estar en un\nbuen entorno para\nque le crezcan\fcabezas. Si una se\ndesprende, vivirà\ncomo EXEGGCUTE."
cubone:
  species_id: 104
  names:
    jp_kana: カラカラ
    en: CUBONE
    fr: OSSELAIT
    it: CUBONE
    de: TRAGOSSO
    es: CUBONE
  forms:
    cubone:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 95
        special_attack: 40
        special_defense: 50
        speed: 35
      types:
        - ground
      egg_groups:
        - monster
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          crystal: "うまれて　すぐに　しにわかれた\nははおやの　ホネを　かぶり\nぜったいに　すがおを　みせない。"
        en:
          crystal: "It lost its mother\nafter its birth.\nIt wears its\fmother’s skull,\nnever revealing\nits true face."
        fr:
          crystal: "Il est orphelin à\nla naissance.\nIl porte le crâne\fmaternel et cache\nson vrai visage."
        it:
          crystal: "Ha perso la madre\nalla nascita e ora\nne indossa il\fteschio, non\nmostrando mai il\nproprio aspetto."
        de:
          crystal: "Es hat seine Mut-\nter bei der Geburt\nverloren. Seitdem\fträgt es ihren\nSchädel und zeigt\nnie sein Gesicht."
        es:
          crystal: "Nada màs nacer\nperdió a su madre.\nLleva puesto su\fcràneo para no\ndesvelar a nadie\nsu identidad."
marowak:
  species_id: 105
  names:
    jp_kana: ガラガラ
    en: MAROWAK
    fr: OSSATUEUR
    it: MAROWAK
    de: KNOGGA
    es: MAROWAK
  forms:
    marowak:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 110
        special_attack: 50
        special_defense: 80
        speed: 45
      types:
        - ground
      egg_groups:
        - monster
      held_items:
        rare: thick_club
      descriptions:
        jp_kana:
          crystal: "せかいの　どこかには　ガラガラだけの\nはかばが　あるらしく　てにもっている\nホネは　そこで　ひろってくるという。"
        en:
          crystal: "Somewhere in the\nworld is a ceme-\ntery just for\fMAROWAK. It gets\nits bones from\nthose graves."
        fr:
          crystal: "Il existe un cime-\ntière pour les\nOSSATUEUR.\fC’est là qu’ils se\nfournissent en\nossements."
        it:
          crystal: "Da qualche parte\nnel mondo vi è un\ncimitero di\fMAROWAK. È lì che\nsi procura gli\nossi."
        de:
          crystal: "Irgendwo gibt es\neinen Friedhof nur\nfür KNOGGA. Von\fdort holt es sich\nimmer seine\nKnochen."
        es:
          crystal: "En algùn rincón\ndel mundo, hay un\ncementerio sólo\fpara MAROWAK.\nDe ahí es de donde\ncoge los huesos."
hitmonlee:
  species_id: 106
  names:
    jp_kana: サワムラー
    en: HITMONLEE
    fr: KICKLEE
    it: HITMONLEE
    de: KICKLEE
    es: HITMONLEE
  forms:
    hitmonlee:
      form_id: 0
      base_stats:
        hp: 50
        attack: 120
        defense: 53
        special_attack: 35
        special_defense: 110
        speed: 87
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "じゆうじざいに　のびる　あしで\nあらゆる　けりわざを　つかいこなす。\nべつめい　キックのおに。"
        en:
          crystal: "It is also called\nthe Kick Master.\nIt uses its\felastic legs to\nexecute every\nknown kick."
        fr:
          crystal: "On l’appelle aussi\nle Roi du Coup de\nLatte.\fSes pattes élasti-\nques sont de re-\ndoutables armes."
        it:
          crystal: "È anche chiamato\nMaestro di Calci.\nLa grande agilità\fgli permette di\neseguire ogni tipo\ndi calcio."
        de:
          crystal: "Man nennt es auch\nden Kick Master.\nMit seinen beweg-\flichen Beinen be-\nherrscht es jeden\ndenkbaren Tritt."
        es:
          crystal: "Se le conoce como\nel Maestro de las\nPatadas. Utiliza\fla elasticidad que\ntiene para dar sus\nfamosas patadas."
hitmonchan:
  species_id: 107
  names:
    jp_kana: エビワラー
    en: HITMONCHAN
    fr: TYGNON
    it: HITMONCHAN
    de: NOCKCHAN
    es: HITMONCHAN
  forms:
    hitmonchan:
      form_id: 0
      base_stats:
        hp: 50
        attack: 105
        defense: 79
        special_attack: 35
        special_defense: 110
        speed: 76
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "どんな　しゅるいの　パンチでも\nいりょくを　たかめるため\nひねりながら　うちこんでいく。"
        en:
          crystal: "To increase the\nstrength of all\nits punch moves,\fit spins its arms\njust before making\ncontact."
        fr:
          crystal: "Pour augmenter la\npuissance de ses\ncoups de poing,\fil tourne ses bras\njuste avant de\ntoucher sa cible."
        it:
          crystal: "Per potenziare\ntutti i tipi di\npugni che conosce,\fprima di colpire\nfa roteare le\nbraccia."
        de:
          crystal: "Um seine Schlag-\nkraft noch zu er-\nhöhen, wirbelt es\fkurz, bevor es\nzuschlägt, mit\nseinen Armen."
        es:
          crystal: "Gira los brazos\ncon rapidez para\ncoger fuerza antes\fde golpear. Los\nataques con PUÑO\nson su fuerte."
lickitung:
  species_id: 108
  names:
    jp_kana: ベロリンガ
    en: LICKITUNG
    fr: EXCELANGUE
    it: LICKITUNG
    de: SCHLURP
    es: LICKITUNG
  forms:
    lickitung:
      form_id: 0
      base_stats:
        hp: 90
        attack: 55
        defense: 75
        special_attack: 60
        special_defense: 75
        speed: 30
      types:
        - normal
      egg_groups:
        - monster
      descriptions:
        jp_kana:
          crystal: "２メートル　いじょうの　ながい\nしたで　ぜんしん　なめまわして\nからだを　きれいに　する。"
        en:
          crystal: "It has a tongue\nthat is over 6’6’’\nlong. It uses this\flong tongue to\nlick its body\nclean."
        fr:
          crystal: "Sa langue fait\nplus de 2 mètres.\nIl s’en sert\fnotamment pour se\nnettoyer."
        it:
          crystal: "Usa la lingua\nlunga 2 metri per\nleccarsi il corpo\ffino a renderlo\nperfettamente\npulito."
        de:
          crystal: "Seine Zunge ist\nüber 2 m lang.\nEs setzt sie ein,\fum seinen gesamten\nKörper sauber zu\nlecken."
        es:
          crystal: "Este POKéMON està\nprovisto de una\nlengua de màs de\f2 m que le viene\nmuy bien para\nasearse a diario."
koffing:
  species_id: 109
  names:
    jp_kana: ドガース
    en: KOFFING
    fr: SMOGO
    it: KOFFING
    de: SMOGON
    es: KOFFING
  forms:
    koffing:
      form_id: 0
      base_stats:
        hp: 40
        attack: 65
        defense: 95
        special_attack: 60
        special_defense: 45
        speed: 35
      types:
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "もうどくを　ふきだす　ドガースに\nちかづけたなら　たいないで　ガスが\nうずまいている　ようすが　みえる。"
        en:
          crystal: "If one gets close\nenough to it when\nit expels poison-\fous gas, the gas\nswirling inside it\ncan be seen."
        fr:
          crystal: "Si l’on s’approche\nsuffisamment quand\nil envoie du\fgaz, on peut voir\nses réserves de\npoison."
        it:
          crystal: "Se ci si avvicina\nmentre espelle il\ngas velenoso, si\fpuò vedere il gas\nmuoversi nel suo\ncorpo."
        de:
          crystal: "Ist man nahe bei\nihm, wenn es Gift-\ngas ablässt, kann\fman die Luftver-\nwirbelungen im\nInneren erkennen."
        es:
          crystal: "Si alguien se le\nacerca cuando li-\nbera gas venenoso,\fse puede ver el\nremolino gaseoso\nque tiene dentro."
weezing:
  species_id: 110
  names:
    jp_kana: マタドガス
    en: WEEZING
    fr: SMOGOGO
    it: WEEZING
    de: SMOGMOG
    es: WEEZING
  forms:
    weezing:
      form_id: 0
      base_stats:
        hp: 65
        attack: 90
        defense: 120
        special_attack: 85
        special_defense: 70
        speed: 60
      types:
        - poison
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "ゴミからでる　どくガスを　すうたび\nからだが　ふくらみ　なかの\nにおいが　くさく　なっていく。"
        en:
          crystal: "When it inhales\npoisonous gases\nfrom garbage, its\fbody expands, and\nits insides smell\nmuch worse."
        fr:
          crystal: "Il aspire les gaz\ntoxiques des\ndéchets pour ainsi\fgonfler et sentir\nencore plus\nmauvais."
        it:
          crystal: "Quando inspira gas\nvelenosi dai\nrifiuti, il corpo,\fsi gonfia e il suo\ninterno è ancora\npiù maleodorante."
        de:
          crystal: "Atmet es Giftgase\nvon Abfällen ein,\nbläht es sich auf\fund seine\nInnereien riechen\nnoch schlimmer."
        es:
          crystal: "Al inhalar los\ngases tóxicos que\nse desprenden de\fla basura, se hin-\ncha y el hedor que\nemite es horrible."
rhyhorn:
  species_id: 111
  names:
    jp_kana: サイホーン
    en: RHYHORN
    fr: RHINOCORNE
    it: RHYHORN
    de: RIHORN
    es: RHYHORN
  forms:
    rhyhorn:
      form_id: 0
      base_stats:
        hp: 80
        attack: 85
        defense: 95
        special_attack: 30
        special_defense: 30
        speed: 25
      types:
        - ground
        - rock
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          crystal: "ひとつの　ことしか　おぼえられない。\nとっしんを　はじめると　りゆうは\nどうでもよくなり　すぐに　わすれる。"
        en:
          crystal: "It can remember\nonly one thing at\na time. Once it\fstarts rushing, it\nforgets why it\nstarted."
        fr:
          crystal: "Il ne peut se sou-\nvenir que d’une\nchose à la fois.\fS’il se met à cou-\nrir, il oublie\nsouvent pourquoi."
        it:
          crystal: "Non può ricordare\npiù di una sola\ncosa alla volta.\fParte alla carica\nma ne dimentica\nsubito il motivo."
        de:
          crystal: "Es kann sich immer\nnur eine Sache\nmerken. Hat es\ferst angefangen zu\nlaufen, hat es\nvergessen warum."
        es:
          crystal: "La cabeza no le da\npara retener màs\nde una cosa. Si se\fpone a correr, se\nle olvida por qué\nempezó a hacerlo."
rhydon:
  species_id: 112
  names:
    jp_kana: サイドン
    en: RHYDON
    fr: RHINOFEROS
    it: RHYDON
    de: RIZEROS
    es: RHYDON
  forms:
    rhydon:
      form_id: 0
      base_stats:
        hp: 105
        attack: 130
        defense: 120
        special_attack: 45
        special_defense: 45
        speed: 40
      types:
        - ground
        - rock
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          crystal: "ドリルになる　ツノを　かるくまわせば\nダイヤモンドの　げんせき　だって\nかんたんに　こなごなに　できるのだ。"
        en:
          crystal: "By lightly spin-\nning its drill-\nlike horn, it can\feasily shatter\neven a diamond in\nthe rough."
        fr:
          crystal: "En faisant tourner\nsa corne comme\nune perceuse, il\fpeut même briser\nun diamant à\nl’état brut."
        it:
          crystal: "Facendo ruotare\nleggermente il\ncorno simile ad un\ftrapano è in grado\ndi frantumare un\ndiamante grezzo."
        de:
          crystal: "Wenn es sein boh-\nrerähnliches Horn\ndreht, kann es\fsogar einen Roh-\ndiamanten leicht\nzerschmettern."
        es:
          crystal: "Con poco que haga\ngirar el cuerno\nanillado de la\fcabeza, serà capaz\nde horadar el\ndiamante màs duro."
chansey:
  species_id: 113
  names:
    jp_kana: ラッキー
    en: CHANSEY
    fr: LEVEINARD
    it: CHANSEY
    de: CHANEIRA
    es: CHANSEY
  forms:
    chansey:
      form_id: 0
      base_stats:
        hp: 250
        attack: 5
        defense: 5
        special_attack: 35
        special_defense: 105
        speed: 50
      types:
        - normal
      egg_groups:
        - fairy
      held_items:
        rare: lucky_egg
      descriptions:
        jp_kana:
          crystal: "えいようまんてんの　タマゴをもとめ\nつかまえようと　するひとが　おおいが\nなかなか　すがたを　みかけられない。"
        en:
          crystal: "People try to\ncatch it for its\nextremely\fnutritious eggs,\nbut it rarely can\nbe found."
        fr:
          crystal: "On essaie souvent\nde l’attraper pour\nses oeufs.\fOn a cependant du\nmal à le trouver."
        it:
          crystal: "Molti provano a\ncatturarlo per le\nuova molto\fnutrienti, ma si\nfa vedere molto\nraramente."
        de:
          crystal: "Die Menschen ver-\nsuchen es wegen\nseiner nahrhaften\fEier zu fangen.\nAber es ist\nselten zu finden."
        es:
          crystal: "Es un POKéMON muy\ncodiciado por los\nnutritivos huevos\fque lleva. Pero,\nes realmente difí-\ncil dar con él."
tangela:
  species_id: 114
  names:
    jp_kana: モンジャラ
    en: TANGELA
    fr: SAQUEDENEU
    it: TANGELA
    de: TANGELA
    es: TANGELA
  forms:
    tangela:
      form_id: 0
      base_stats:
        hp: 65
        attack: 55
        defense: 115
        special_attack: 100
        special_defense: 40
        speed: 60
      types:
        - grass
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "ぜんしんを　すきまなく　おおう\nツルは　たたかいのとき　やすまずに\nうごいて　みるものを　いらだたせる。"
        en:
          crystal: "During battle, it\nconstantly moves\nthe vines that\fcover its body in\norder to annoy its\nopponent."
        fr:
          crystal: "En combat, il gi-\ngote ses lianes\nsans arrêt et dans\ftous les sens pour\nénerver son adver-\nsaire."
        it:
          crystal: "Nella lotta agita\ncontinuamente le\nliane che gli\fricoprono il corpo\nper innervosire\nl’avversario."
        de:
