        hp: 50
        attack: 75
        defense: 35
        special_attack: 70
        special_defense: 30
        speed: 40
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "まわりで　うごくものが　あると\nどんなときでも　すぐに　はんのうして\nほそい　ツルを　のばしてくる。"
        en:
          crystal: "If it notices\nanything that\nmoves, it\fimmediately flings\nits vine at the\nobject."
        fr:
          crystal: "S’il repère quel-\nque chose en mou-\nvement, il lance\fimmédiatement ses\nlianes dans cette\ndirection."
        it:
          crystal: "Appena vede\nqualcosa muoversi,\nlo colpisce con\fil tralcio della\npianta che forma\nil suo corpo."
        de:
          crystal: "Bemerkt es etwas,\ndas sich bewegt,\nschlingt es sofort\fseine Ranke um\ndieses Objekt."
        es:
          crystal: "Si detecta algùn\nmovimiento, no du-\ndarà ni un segundo\fen inclinar el\ntallo hacia el\nobjeto sospechoso."
weepinbell:
  species_id: 70
  names:
    jp_kana: ウツドン
    en: WEEPINBELL
    fr: BOUSTIFLOR
    it: WEEPINBELL
    de: ULTRIGARIA
    es: WEEPINBELL
  forms:
    weepinbell:
