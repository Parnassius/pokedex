wobbuffet:
  species_id: 202
  names:
    jp_kana: ソーナンス
    en: WOBBUFFET
    fr: QULBUTOKE
    it: WOBBUFFET
    de: WOINGENAU
    es: WOBBUFFET
  forms:
    wobbuffet:
      form_id: 0
      base_stats:
        hp: 190
        attack: 33
        defense: 58
        special_attack: 33
        special_defense: 58
        speed: 33
      types:
        - psychic
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "くろい　しっぽを　かくすため\nくらい　どうくつにすみ　さらに\nよるにならないと　うごきださない。"
        en:
          crystal: "In order to con-\nceal its black\ntail, it lives in\fa dark cave and\nonly moves about\nat night."
        fr:
          crystal: "Pour cacher sa\nqueue noire, il\nvit dans une\fgrotte sombre et\nne se déplace\nque de nuit."
        it:
          crystal: "Vive in grotte\nbuie per\nnascondere la coda\fnera, uscendo\nall’aperto\nsoltanto di notte."
        de:
          crystal: "Um seinen schwar-\nzen Schwanz zu\nverstecken, lebt\fes in einer Höhle,\ndie es nur nachts\nverläßt."
        es:
          crystal: "Con el fin de que\nnadie le vea la\nnegra cola que\ftiene, vive en una\ncueva oscura y só-\nlo sale de noche."
girafarig:
  species_id: 203
  names:
    jp_kana: キリンリキ
    en: GIRAFARIG
    fr: GIRAFARIG
    it: GIRAFARIG
    de: GIRAFARIG
    es: GIRAFARIG
  forms:
    girafarig:
      form_id: 0
      base_stats:
        hp: 70
        attack: 80
        defense: 65
        special_attack: 90
        special_defense: 65
        speed: 85
      types:
        - normal
        - psychic
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "ピンチに　おいこまれると\nしっぽが　ふしぎな　ちからを\nつかって　てきを　おいはらう。"
        en:
          crystal: "When it is in\ndanger, its tail\nuses some sort of\fmysterious powers\nto drive away the\nenemy."
        fr:
          crystal: "Lorsqu’il est en\ndanger, sa queue\nutiliserait un\fpouvoir mystérieux\npour écarter toute\nmenace."
        it:
          crystal: "Se si sente in\npericolo, usa i\nmisteriosi poteri\fdella coda per\ntenere alla larga\ni nemici."
        de:
          crystal: "Ist es in Gefahr,\nsetzt sein Schwanz\neine Art mystische\fKraft ein, um sich\nden Angreifer vom\nLeib zu halten."
        es:
          crystal: "Cuando està en\npeligro, la cola\nentra en acción.\fUsa sus poderes\ny consigue ahuyen-\ntar al enemigo."
pineco:
  species_id: 204
  names:
    jp_kana: クヌギダマ
    en: PINECO
    fr: POMDEPIK
    it: PINECO
    de: TANNZA
    es: PINECO
  forms:
    pineco:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 90
        special_attack: 35
        special_defense: 35
        speed: 15
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "くちから　はきだす　えきたいは\nきのかわを　つける　せっちゃくざい。\nくうきに　ふれると　かたまるのだ。"
        en:
          crystal: "It spits out a\nfluid that it uses\nto glue tree bark\fto its body. The\nfluid hardens when\nit touches air."
        fr:
          crystal: "Il crache un li-\nquide gluant pour\ncoller de l’écorce\fsur son corps.\nCe fluide durcit\navec l’air."
        it:
          crystal: "Sputa un liquido\nche gli serve per\nincollare al corpo\fla corteccia. Con\nl’aria, il liquido\nsi solidifica."
        de:
          crystal: "Es setzt eine\nklebrige, luft-\ntrocknende Flüs-\fsigkeit ein, um\nseinem Körper Rin-\nde hinzuzufügen."
        es:
          crystal: "Libera un fluido\ncon el que se pega\ncortezas de àrbol.\fAl contacto con el\naire, el fluido se\nsolidifica."
forretress:
  species_id: 205
  names:
    jp_kana: フォレトス
    en: FORRETRESS
    fr: FORETRESS
    it: FORRETRESS
    de: FORSTELLKA
    es: FORRETRESS
  forms:
    forretress:
      form_id: 0
      base_stats:
        hp: 75
        attack: 90
        defense: 140
        special_attack: 60
        special_defense: 60
        speed: 40
      types:
        - bug
        - steel
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "ふとい　きのみきに　くっついている。\nなにかの　けはいを　かんじるたび\nカラの　はへんを　うちだすのだ。"
        en:
          crystal: "Usually found\nhanging on to a\nfat tree trunk. It\fshoots out bits of\nits shell when it\nsees action."
        fr:
          crystal: "On le trouve ac-\ncroché au tronc\ndes grands arbres.\fIl crache des mor-\nceaux de sa cara-\npace sur l’ennemi."
        it:
          crystal: "Spesso lo si vede\nappeso al tronco\ndi qualche grosso\falbero. Se si\nagita lancia pezzi\ndel suo guscio."
        de:
          crystal: "Man findet es auf\nBaumstämmen. Re-\ngistriert es Bewe-\fgung, verschleu-\ndert es Teile\nseiner Schale."
        es:
          crystal: "Suele vérsele en-\nganchado al tronco\nde un àrbol.\fCuando comienza la\nacción, dispara\ntrozos de concha."
dunsparce:
  species_id: 206
  names:
    jp_kana: ノコッチ
    en: DUNSPARCE
    fr: INSOLOURDO
    it: DUNSPARCE
    de: DUMMISEL
    es: DUNSPARCE
  forms:
    dunsparce:
      form_id: 0
      base_stats:
        hp: 100
        attack: 70
        defense: 70
        special_attack: 65
        special_defense: 65
        speed: 45
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "どうくつの　おくふかく\nひかりの　とどかない　ばしょで\nひたすら　じっとしている。"
        en:
          crystal: "It hides deep\ninside caves where\nno light ever\freaches it and\nremains virtually\nmotionless there."
        fr:
          crystal: "Il se cache au fin\nfond des grottes,\nà l’abri de toute\flumière, et reste\nimmobile pendant\ntrès longtemps."
        it:
          crystal: "Si nasconde nel\nfondo delle\ngrotte, dove non\fgiunge neppure un\nraggio di luce, e\nrimane immobile."
        de:
          crystal: "Es versteckt sich\nin finsteren\nHöhlen und\fverharrt dort fast\nohne eine einzige\nBewegung."
        es:
          crystal: "Permanece escon-\ndido dentro de las\ncuevas, donde la\fluz no le llega.\nY ahí se queda\ncasi sin moverse."
gligar:
  species_id: 207
  names:
    jp_kana: グライガー
    en: GLIGAR
    fr: SCORPLANE
    it: GLIGAR
    de: SKORGLA
    es: GLIGAR
  forms:
    gligar:
      form_id: 0
      base_stats:
        hp: 65
        attack: 75
        defense: 105
        special_attack: 35
        special_defense: 65
        speed: 85
      types:
        - ground
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "きりたった　がけに　すをつくる。\nいちど　かっくう　したあとは\nとびはねながら　すに　もどる。"
        en:
          crystal: "It builds its nest\non a steep cliff.\nWhen it is done\fgliding, it hops\nalong the ground\nback to its nest."
        fr:
          crystal: "Il fait son nid\nsur des corniches.\nAprès avoir plané,\fil retourne au nid\nen sautillant."
        it:
          crystal: "Si fa il nido su\nripide scogliere.\nPrima plana, poi\fsaltella sul\nterreno per\ntornare al nido."
        de:
          crystal: "Sein Nest liegt an\neiner steilen\nKlippe. Ist es zu\ferschöpft zum\nGleiten, hüpft es\nins Nest zurück."
        es:
          crystal: "Crea su nido en\nprecipicios escar-\npados. Después de\fplanear, va dando\nsaltitos hasta\nllegar a su nido."
steelix:
  species_id: 208
  names:
    jp_kana: ハガネール
    en: STEELIX
    fr: STEELIX
    it: STEELIX
    de: STAHLOS
    es: STEELIX
  forms:
    steelix:
      form_id: 0
      base_stats:
        hp: 75
        attack: 85
        defense: 200
        special_attack: 55
        special_defense: 65
        speed: 30
      types:
        - steel
        - ground
      egg_groups:
        - mineral
      held_items:
        rare: metal_coat
      descriptions:
        jp_kana:
          crystal: "ぜんしんに　こまかな　こうてつの\nかけらが　くっついており　ひかりを\nキラキラと　はんしゃ　する。"
        en:
          crystal: "The many small\nmetal particles\nthat cover this\fPOKéMON’s body\nreflect bright\nlight well."
        fr:
          crystal: "Il est recouvert\nd’une infinité de\nparticules d’acier\fqui reflètent la\nlumière."
        it:
          crystal: "I pezzetti di\nmetallo che gli\nricoprono il corpo\friflettono molto\nbene la luce\nintensa."
        de:
          crystal: "Die vielen Metall-\nteilchen, die den\nKörper dieses\fPOKéMON bedecken,\nreflektieren das\nLicht sehr gut."
        es:
          crystal: "Las minùsculas\npartículas de\nmetal que recubren\fla superficie de\nsu cuerpo reflejan\nla luz."
snubbull:
  species_id: 209
  names:
    jp_kana: ブルー
    en: SNUBBULL
    fr: SNUBBULL
    it: SNUBBULL
    de: SNUBBULL
    es: SNUBBULL
  forms:
    snubbull:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 50
        special_attack: 40
        special_defense: 40
        speed: 30
      types:
        - normal
      egg_groups:
        - field
        - fairy
      descriptions:
        jp_kana:
          crystal: "じつは　おくびょうな　せいかく。\nおびえているのが　ばれないように\nひっしに　うなりごえを　あげる。"
        en:
          crystal: "In truth, it is a\ncowardly POKéMON.\nIt growls eagerly\fin order to hide\nits fear from its\nopponent."
        fr:
          crystal: "C’est en fait un\nPOKéMON peureux.\nIl aboie fort pour\fcacher sa peur."
        it:
          crystal: "Ringhia spavaldo\nper nascondere la\npaura verso il\fnemico, ma in\nrealtà è piuttosto\ncodardo."
        de:
          crystal: "Eigentlich ist es\nein feiges POKé-\nMON. Es brüllt\fseine Feinde an,\num so seine Angst\nzu verbergen."
        es:
          crystal: "En realidad es muy\ncobarde. Cuando\nse enfrenta a un\foponente, se enva-\nlentona para disi-\nmular el miedo."
granbull:
  species_id: 210
  names:
    jp_kana: グランブル
    en: GRANBULL
    fr: GRANBULL
    it: GRANBULL
    de: GRANBULL
    es: GRANBULL
  forms:
    granbull:
      form_id: 0
      base_stats:
        hp: 90
        attack: 120
        defense: 75
        special_attack: 60
        special_defense: 60
        speed: 45
      types:
        - normal
      egg_groups:
        - field
        - fairy
      descriptions:
        jp_kana:
          crystal: "おおきな　くちを　ひらいて\nふとい　キバを　みせつければ\nたいていの　ポケモンは　にげだす。"
        en:
          crystal: "It can make most\nany POKéMON run\naway simply by\fopening its mouth\nwide to reveal its\nbig fangs."
        fr:
          crystal: "Il peut faire fuir\npresque tous les\nPOKéMON en ouvrant\ftrès largement sa\nmâchoire."
        it:
          crystal: "Se spalanca la\nbocca mostrando i\ngrandi denti,\fquasi tutti i\nPOKéMON fuggono\nspaventati."
        de:
          crystal: "Es kann fast jedes\nPOKéMON vertrei-\nben, indem es sein\fMaul weit öffnet\nund seine scharfen\nReißzähne zeigt."
        es:
          crystal: "Con sólo enseñar\nlas fauces, conse-\nguirà ahuyentar\fpràcticamente a\ntodos los POKéMON\nque se cruce."
qwilfish:
  species_id: 211
  names:
    jp_kana: ハリーセン
    en: QWILFISH
    fr: QWILFISH
    it: QWILFISH
    de: BALDORFISH
    es: QWILFISH
  forms:
    qwilfish:
      form_id: 0
      base_stats:
        hp: 65
        attack: 95
        defense: 75
        special_attack: 55
        special_defense: 55
        speed: 85
      types:
        - water
        - poison
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          crystal: "あいてが　おおきいほど　からだが\nはれつする　げんかいまで　みずを\nのみこみ　からだを　ふくらませる。"
        en:
          crystal: "When faced with a\nlarger opponent,\nit swallows as\fmuch water as it\ncan to match the\nopponent’s size."
        fr:
          crystal: "Face à un adver-\nsaire plus volumi-\nneux, il avale une\fgrande quantité\nd’eau pour avoir\nla même taille."
        it:
          crystal: "Se incontra un\nnemico più grande,\ningoia molta acqua\fper raggiungere le\ndimensioni\ndell’avversario."
        de:
          crystal: "Sieht es sich ei-\nnem größerem Feind\ngegenüber, trinkt\fes möglichst viel\nWasser, um größer\nzu wirken."
        es:
          crystal: "Cuando su rival es\nmayor que él, bebe\nunos buenos tragos\fde agua hasta con-\nseguir igualarle\nen tamaño."
scizor:
  species_id: 212
  names:
    jp_kana: ハッサム
    en: SCIZOR
    fr: CIZAYOX
    it: SCIZOR
    de: SCHEROX
    es: SCIZOR
  forms:
    scizor:
      form_id: 0
      base_stats:
        hp: 70
        attack: 130
        defense: 100
        special_attack: 55
        special_defense: 80
        speed: 65
      types:
        - bug
        - steel
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "こうてつを　ふくんでいる\nハサミで　とらえたものは　どんなに\nかたくても　こなごなに　くだく。"
        en:
          crystal: "This POKéMON’s\npincers, which\ncontain steel, can\fcrush any hard\nobject it gets a\nhold of into bits."
        fr:
          crystal: "Les pinces de ce\nPOKéMON contien-\nnent de l’acier et\fpeuvent réduire en\nmiettes quasiment\nn’importe quoi."
        it:
          crystal: "Le chele, che\ncontengono\nacciaio, possono\ffare a pezzi\nqualsiasi oggetto\nafferrino."
        de:
          crystal: "Dieses POKéMON\nkann mit seinen\nstählernen Scheren\fjeden harten\nGegenstand mühelos\nzermalmen."
        es:
          crystal: "Las pinzas que po-\nsee tienen acero.\nCon ellas, no hay\fnada que se le re-\nsista. Rompen todo\nlo que pillan."
shuckle:
  species_id: 213
  names:
    jp_kana: ツボツボ
    en: SHUCKLE
    fr: CARATROC
    it: SHUCKLE
    de: POTTROTT
    es: SHUCKLE
  forms:
    shuckle:
      form_id: 0
      base_stats:
        hp: 20
        attack: 10
        defense: 230
        special_attack: 10
        special_defense: 230
        speed: 5
      types:
        - bug
        - rock
      egg_groups:
        - bug
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          crystal: "いわをくりぬき　すを　つくるために\nあしさきから　でる　たいえきは\nきのみと　まざると　ジュースになる。"
        en:
          crystal: "The fluid secreted\nby its toes carves\nholes in rocks for\fnesting and can be\nmixed with BERRIES\nto make a drink."
        fr:
          crystal: "Le fluide sécrété\npar ses pattes\nperce la roche\fpour créer un nid\net peut se boire\navec des BAIES."
        it:
          crystal: "Secerne un liquido\ncon cui scava il\nnido nelle rocce e\fche, mischiato\nalle BACCHE, è\nun’ottima bevanda."
        de:
          crystal: "Sein Zehensekret\nätzt Löcher für\nNester in Felsen.\fMischt man es mit\nBEEREN, entsteht\nleckerer Saft."
        es:
          crystal: "El fluido que po-\nsee sirve para ha-\ncer una bebida con\fBAYAS, para abrir\nagujeros en rocas\ny construir nidos."
heracross:
  species_id: 214
  names:
    jp_kana: ヘラクロス
    en: HERACROSS
    fr: SCARHINO
    it: HERACROSS
    de: SKARABORN
    es: HERACROSS
  forms:
    heracross:
      form_id: 0
      base_stats:
        hp: 80
        attack: 125
        defense: 75
        special_attack: 40
        special_defense: 95
        speed: 85
      types:
        - bug
        - fighting
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "ものすごい　かいりきの　もちぬし。\nじぶんの　たいじゅうの　１００ばいの\nおもさでも　らくに　ぶんなげる。"
        en:
          crystal: "With its Herculean\npowers, it can\neasily throw arou-\fnd an object that\nis 100 times its\nown weight."
        fr:
          crystal: "Sa force hercu-\nléenne lui permet\nde soulever et de\fjeter plus de 100\nfois son poids."
        it:
          crystal: "La forza erculea\ngli permette di\nlanciare oggetti\f100 volte\npiù pesanti\ndi lui."
        de:
          crystal: "Mit seiner herku-\nlischen Kraft kann\nes Objekte, die\f100-mal sein Kör-\npergewicht haben,\nmühelos umwerfen."
        es:
          crystal: "Tiene una fuerza\ndescomunal. Puede,\nsin gran esfuerzo,\farrojar objetos\nque superen su pe-\nso en cien veces."
sneasel:
  species_id: 215
  names:
    jp_kana: ニューラ
    en: SNEASEL
    fr: FARFURET
    it: SNEASEL
    de: SNIEBEL
    es: SNEASEL
  forms:
    sneasel:
      form_id: 0
      base_stats:
        hp: 55
        attack: 95
        defense: 55
        special_attack: 35
        special_defense: 75
        speed: 115
      types:
        - dark
        - ice
      egg_groups:
        - field
      held_items:
        rare: quick_claw
      descriptions:
        jp_kana:
          crystal: "じぶんが　めだたないよう　くらやみに\nまぎれて　えものに　おそいかかる\nとても　ずるがしこい　ポケモン。"
        en:
          crystal: "This cunning\nPOKéMON hides\nunder the cover\fof darkness,\nwaiting to attack\nits prey."
        fr:
          crystal: "Ce POKéMON rusé se\ncache dans l’ombre\net attend patiem-\fment de fondre sur\nsa proie."
        it:
          crystal: "Questo POKéMON\nscaltro si\nnasconde nel buio\fnotturno,\nattendendo la\npreda."
        de:
          crystal: "Dieses hinterlis-\ntige POKéMON\nnutzt den Schutz\fder Dunkelheit, um\nahnungsloser Beute\naufzulauern."
        es:
          crystal: "Este POKéMON es\nmuy astuto.\nSe vale de la\foscuridad de la\nnoche para atacar\na su presa."
teddiursa:
  species_id: 216
  names:
    jp_kana: ヒメグマ
    en: TEDDIURSA
    fr: TEDDIURSA
    it: TEDDIURSA
    de: TEDDIURSA
    es: TEDDIURSA
  forms:
    teddiursa:
      form_id: 0
      base_stats:
        hp: 60
        attack: 80
        defense: 50
        special_attack: 50
        special_defense: 50
        speed: 40
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "いつも　ハチミツを　なめている。\nてのひらには　ミツが　しみこみ\nなめると　あまい　あじがする。"
        en:
          crystal: "It always licks\nhoney. Its palm\ntastes sweet\fbecause of all the\nhoney it has\nabsorbed."
        fr:
          crystal: "Il aime le miel.\nSes paumes sont\nsucrées tant il\fse goinfre de miel\ntoute la journée."
        it:
          crystal: "Non fa che leccare\nmiele. Il suo\npalmo è dolce a\fcausa di tutto il\nmiele che ha\nassorbito."
        de:
          crystal: "Es frisst ständig\nHonig. Seine\nPfoten schmecken\fimmer süß, da es\nständig nach Honig\nsucht."
        es:
          crystal: "Se pasa el día\nlamiendo miel. De\nhecho, las palmas\fde las zarpas le\nhuelen a miel de\ntodo lo que come."
ursaring:
  species_id: 217
  names:
    jp_kana: リングマ
    en: URSARING
    fr: URSARING
    it: URSARING
    de: URSARING
    es: URSARING
  forms:
    ursaring:
      form_id: 0
      base_stats:
        hp: 90
        attack: 130
        defense: 75
        special_attack: 75
        special_defense: 75
        speed: 55
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "おおきな　からだの　もちぬしだが\nきのぼりが　じょうずで　きの　うえで\nエサを　たべたり　ねたりする。"
        en:
          crystal: "Although it has a\nlarge body, it is\nquite skilled at\fclimbing trees. It\neats and sleeps in\nthe treetops."
        fr:
          crystal: "Bien que d’une\nlarge corpulence,\nil grimpe aux ar-\fbres pour s’y\nnourrir et y\ndormir."
        it:
          crystal: "Nonostante la\nstazza, è abile\nad arrampicarsi\fin cima agli\nalberi, dove\nmangia e dorme."
        de:
          crystal: "Trotz seines\nriesigen Körpers\nist es ein guter\fKletterer. Es\nfrisst und schläft\nin Baumkronen."
        es:
          crystal: "Aunque es muy\ngrande, no se le\nda nada mal lo de\ftrepar àrboles.\nCome y duerme en\nlas copas."
slugma:
  species_id: 218
  names:
    jp_kana: マグマッグ
    en: SLUGMA
    fr: LIMAGMA
    it: SLUGMA
    de: SCHNECKMAG
    es: SLUGMA
  forms:
    slugma:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 40
        special_attack: 70
        special_defense: 40
        speed: 20
      types:
        - fire
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "マグマッグが　あつまる　ばしょは\nじめんの　おんどが　たかい。\nさむくなると　ひふが　かたまる。"
        en:
          crystal: "These group to-\ngether in areas\nthat are hotter\fthan normal. If it\ncools off, its\nskin hardens."
        fr:
          crystal: "Il vit en groupe\ndans les endroits\nchauds.\fSi la température\nbaisse, sa peau se\nsolidifie."
        it:
          crystal: "Si riuniscono in\naree piuttosto\ncalde. Se cala la\ftemperatura,\ngli si secca\nla pelle."
        de:
          crystal: "Sie versammeln\nsich in heißen\nGebieten. Kühlt es\fsich ab, so wird\nauch seine Haut\nsofort hart."
        es:
          crystal: "Suele ir en grupo\npor zonas\ndemasiado càlidas.\fSi se enfriara, se\nle endurecería la\npiel."
magcargo:
  species_id: 219
  names:
    jp_kana: マグカルゴ
    en: MAGCARGO
    fr: VOLCAROPOD
    it: MAGCARGO
    de: MAGCARGO
    es: MAGCARGO
  forms:
    magcargo:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 120
        special_attack: 80
        special_defense: 80
        speed: 30
      types:
        - fire
        - rock
      egg_groups:
        - amorphous
      descriptions:
        jp_kana:
          crystal: "からだは　いつも　なみうっていて\nようがんのように　あつい。\nときどき　カラから　ひのこがもれる。"
        en:
          crystal: "Its body is as hot\nas lava and is\nalways billowing.\fFlames will\noccasionally burst\nfrom its shell."
        fr:
          crystal: "Son corps en ébul-\nlition est aussi\nchaud que de la\flave. Des flammes\nsortent de sa\ncoquille."
        it:
          crystal: "Il corpo caldo\ncome lava è sempre\nin ebollizione.\fA volte si vedono\nfiammate uscire\ndal guscio."
        de:
          crystal: "Sein Körper ist\nheißer als Lava\nund wogt stets.\fManchmal schießen\nFlammen aus seinem\nHaus."
        es:
          crystal: "Tiene un cuerpo\nque no deja de\nhincharse y tan\fcaliente como la\nlava. La concha\nsuelta llamas."
swinub:
  species_id: 220
  names:
    jp_kana: ウリムー
    en: SWINUB
    fr: MARCACRIN
    it: SWINUB
    de: QUIEKEL
    es: SWINUB
  forms:
    swinub:
      form_id: 0
      base_stats:
        hp: 50
        attack: 50
        defense: 40
        special_attack: 30
        special_defense: 30
        speed: 50
      types:
        - ice
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "はなさきで　じめんを　ほって\nたべるものを　さがしだす。\nこおった　じめんも　へっちゃらだ。"
        en:
          crystal: "It uses the tip of\nits nose to dig\nfor food. Its nose\fis so tough that\neven frozen ground\nposes no problem."
        fr:
          crystal: "Il creuse le sol\navec le bout de\nson nez pour trou-\fver de la nourri-\nture. Il perce mê-\nme la glace."
        it:
          crystal: "Scava con la punta\ndel muso alla\nricerca di cibo.\fIl muso è così\nduro che rompe\nanche il ghiaccio."
        de:
          crystal: "Mit seiner Nase\ngräbt es nach Nah-\nrung. Sie ist so\fhart, dass selbst\ngefrorener Boden\nkein Problem ist."
        es:
          crystal: "Usa el hocico para\nbuscar comida por\nel suelo. Ni el\fsuelo màs frío le\nsupondrà obstàculo\nalguno."
piloswine:
  species_id: 221
  names:
    jp_kana: イノムー
    en: PILOSWINE
    fr: COCHIGNON
    it: PILOSWINE
    de: KEIFEL
    es: PILOSWINE
  forms:
    piloswine:
      form_id: 0
      base_stats:
        hp: 100
        attack: 100
        defense: 80
        special_attack: 60
        special_defense: 60
        speed: 50
      types:
        - ice
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "４ほんの　あしは　みじかいが\nヒヅメは　ひろく　ギザギザ　なので\nゆきのうえでも　すべらず　あるける。"
        en:
          crystal: "Although its legs\nare short, its\nrugged hooves\fprevent it from\nslipping, even on\nicy ground."
        fr:
          crystal: "Bien que pourvu de\ncourtes pattes,\nses sabots sont\fpointus pour l’em-\npêcher de glisser\nsur la glace."
        it:
          crystal: "Ha le zampe corte,\nma grazie agli\nzoccoli ruvidi,\friesce a non\nscivolare neppure\nsul ghiaccio."
        de:
          crystal: "Trotz kurzer Beine\nrutscht es auf\neisigen Flächen\fnicht aus, da sei-\nne Hufe ihm genü-\ngend Halt bieten."
        es:
          crystal: "Aunque tiene las\npatas cortas, las\nfuertes pezuñas le\fpermiten agarrarse\nbien al suelo, a\npesar del hielo."
corsola:
  species_id: 222
  names:
    jp_kana: サニーゴ
    en: CORSOLA
    fr: CORAYON
    it: CORSOLA
    de: CORASONN
    es: CORSOLA
  forms:
    corsola:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 85
        special_attack: 65
        special_defense: 85
        speed: 35
      types:
        - water
        - rock
      egg_groups:
        - water_1
        - water_3
      descriptions:
        jp_kana:
          crystal: "あたまのさきは　きれいな　みずの\nようぶんを　とりこんで　そだつので\nよごれた　うみには　すまない。"
        en:
          crystal: "The points on its\nhead absorb\nnutrients from\fclean water. They\ncannot survive in\npolluted water."
        fr:
          crystal: "Les pointes sur sa\ntête absorbent les\nnutriments marins.\fIl ne peut survi-\nvre en milieu\naquatique pollué."
        it:
          crystal: "Le punte sulla\ntesta assorbono\nnutrimento dall’\facqua pulita. Non\nsopravvive nell’\nacqua inquinata."
        de:
          crystal: "Die Punkte auf\nseinem Kopf ernäh-\nren sich in klarem\fWasser. Es kann\nnicht in Schmutz-\nwasser leben."
        es:
          crystal: "Absorbe los\nnutrientes que\nnecesita del agua\fpor la cabeza. El\nagua contaminada\nacabaría con él."
remoraid:
  species_id: 223
  names:
    jp_kana: テッポウオ
    en: REMORAID
    fr: REMORAID
    it: REMORAID
    de: REMORAID
    es: REMORAID
  forms:
    remoraid:
      form_id: 0
      base_stats:
        hp: 35
        attack: 65
        defense: 35
        special_attack: 65
        special_defense: 35
        speed: 65
      types:
        - water
      egg_groups:
        - water_1
        - water_2
      descriptions:
        jp_kana:
          crystal: "ジェットすいりゅうを　ふきだした\nいきおいを　りようして\nうしろむきに　にげることもある。"
        en:
          crystal: "To escape from an\nattacker, it may\nshoot water out of\fits mouth, then\nuse that force to\nswim backward."
        fr:
          crystal: "Il crache de l’eau\nsur tout prédateur\npour s’échapper.\fLa pression du jet\nle fait se propul-\nser en arrière."
        it:
          crystal: "Per sfuggire ai\nnemici spara acqua\ndalla bocca e usa\fil contraccolpo\nper nuotare\nall’indietro."
        de:
          crystal: "Um zu entkommen,\nschießt es Wasser\naus seinem Maul\fund nutzt den\nRückstoß für seine\nFlucht."
        es:
          crystal: "Para escapar de su\noponente, puede\nechar agua por la\fboca. Ademàs,\nusa el impulso\npara retroceder."
octillery:
  species_id: 224
  names:
    jp_kana: オクタン
    en: OCTILLERY
    fr: OCTILLERY
    it: OCTILLERY
    de: OCTILLERY
    es: OCTILLERY
  forms:
    octillery:
      form_id: 0
      base_stats:
        hp: 75
        attack: 105
        defense: 75
        special_attack: 105
        special_defense: 75
        speed: 45
      types:
        - water
      egg_groups:
        - water_1
        - water_2
      descriptions:
        jp_kana:
          crystal: "あなに　はいりたがる　せいしつで\nほかの　ポケモンが　つくった\nすあなを　よこどりして　ねむる。"
        en:
          crystal: "Its instinct is to\nbury itself in\nholes. It often\fsteals the nesting\nholes of others to\nsleep in them."
        fr:
          crystal: "Il se cache dans\ndes trous. Il lui\narrive même de\fvoler les trous de\nses semblables."
        it:
          crystal: "Usa nascondersi\nnelle buche.\nSpesso ruba i\fnidi di altri\nPOKéMON per\ndormirvi."
        de:
          crystal: "Es schläft ins-\ntinktiv in\nLöchern. Oft\fusurpiert es die\nSchlafplätze von\nanderen."
        es:
          crystal: "Por instinto, se\nentierra en hoyos.\nA menudo ocupa los\fque han hecho\notros para anidar\ny duerme en ellos."
delibird:
  species_id: 225
  names:
    jp_kana: デリバード
