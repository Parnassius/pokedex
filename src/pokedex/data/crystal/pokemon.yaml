        - electric
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          crystal: "くらくなると　まぶしく　かがやく\nしっぽの　あかりは　とおく　はなれた\nうみのうえ　からでも　みつけられる。"
        en:
          crystal: "When it gets dark,\nthe light from its\nbright, shiny tail\fcan be seen from\nfar away on the\nocean’s surface."
        fr:
          crystal: "Le bout de sa\nqueue brille si\nfort qu’il peut\fêtre vu de très\nloin sur la surfa-\nce de l’eau."
        it:
          crystal: "Di notte, la luce\nintensa e lampeg-\ngiante della coda\fsi può vedere\nsull’oceano da\nmolto lontano."
        de:
          crystal: "Bei Dunkelheit\nsieht man das hel-\nle Licht an seinem\fSchwanz von weitem\nüber das Meer\nscheinen."
        es:
          crystal: "Al anochecer, la\nluz intensa que se\ndesprende del ex-\ftremo de la cola,\npuede apreciarse\ndesde muy lejos."
bellossom:
  species_id: 182
  names:
    jp_kana: キレイハナ
