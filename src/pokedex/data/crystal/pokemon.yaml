        jp_kana:
          crystal: "ぬけおちた　ツノの　ねもとの\nまるい　たまを　こなにして　のむと\nぐっすり　ねむれる　といわれる。"
        en:
          crystal: "The round balls\nfound on the\nfallen antlers can\fbe ground into a\npowder that aids\nin sleeping."
        fr:
          crystal: "Les boules sur ses\nbois peuvent être\nréduites en poudre\fpour créer un\nsomnifère."
        it:
          crystal: "Le corna cadute\nhanno sfere che\nsi possono\fmacinare per farne\nuna polvere che\naiuta a dormire."
        de:
          crystal: "Die Kugeln, die\nan abgefallenem\nGeweih gefunden\fwerden, können zu\nSchlafpuder\ngemahlen werden."
        es:
          crystal: "Las redondas bolas\nde su cornamenta\npueden ser usadas\fpara crear unos\npolvos que ayudan\na dormir."
smeargle:
