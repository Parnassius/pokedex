        defense: 50
        special_attack: 45
        special_defense: 65
        speed: 80
      types:
        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      descriptions:
        jp_kana:
          crystal: "あめが　ふってくると　すぐさま\nあたまのうえの　はなを　とじて\nぬれないよう　こかげに　かくれる。"
        en:
          crystal: "As soon as it\nrains, it closes\nits flower and\fhides in the shade\nof a tree to avoid\ngetting wet."
        fr:
          crystal: "Pour ne pas être\nmouillé les jours\nde pluie, il ferme\fses pétales et se\nréfugie sous un\narbre."
        it:
          crystal: "Se piove chiude il\nfiore e corre a\nripararsi sotto\fun albero per\nevitare di\nbagnarsi."
        de:
          crystal: "Es schließt bei\nRegen die Blüte\nauf seinem Kopf\fund versteckt\nsich, um nicht\nnass zu werden."
        es:
          crystal: "En cuanto caen las\nprimeras gotas,\ncierra la flor y\fse pone a cubierto\nbajo un àrbol para\nno mojarse."
jumpluff:
  species_id: 189
  names:
    jp_kana: ワタッコ
    en: JUMPLUFF
    fr: COTOVOL
    it: JUMPLUFF
    de: PAPUNGHA
    es: JUMPLUFF
