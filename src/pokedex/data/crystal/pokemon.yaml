        special_defense: 50
        speed: 65
      types:
        - dark
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "よあけごろ　あたりいったいに\nひびきわたる　ぶきみな　とおぼえで\nじぶんたちの　なわばりを　アピール。"
        en:
          crystal: "Around dawn, its\nominous howl\nechoes through the\farea to announce\nthat this is its\nterritory."
        fr:
          crystal: "Il hurle dès l’au-\nbe pour délimiter\nson territoire.\fOn l’entend à des\nkilomètres à la\nronde."
        it:
          crystal: "All’alba, i suoi\nsinistri urli\nriecheggiano nell’\faria. In questo\nmodo demarca il\nterritorio."
        de:
          crystal: "Im Morgengrauen\nschallt sein omi-\nnöses Geheule über\fdas Gebiet, das es\nfür sich\nbeansprucht."
        es:
          crystal: "Al amanecer,\nresuena por la\nzona su inquietan-\fte aullido para\nanunciar que es su\nterritorio."
houndoom:
  species_id: 229
  names:
    jp_kana: ヘルガー
    en: HOUNDOOM
    fr: DEMOLOSSE
