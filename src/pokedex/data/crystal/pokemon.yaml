          crystal: "Cresce perdendo\nvari strati di\npelle. Durante la\fmuta si protegge\ntra le acque di\nuna cascata."
        de:
          crystal: "Es häutet sich, um\nzu wachsen.\nWährenddessen wird\fes von einem\nschnellen Wasser-\nfall beschützt."
        es:
          crystal: "Durante la etapa\nde crecimiento,\nmuda muchas veces\fde piel y se\nprotege mediante\nla CASCADA."
dragonair:
  species_id: 148
  names:
    jp_kana: ハクリュー
    en: DRAGONAIR
    fr: DRACO
    it: DRAGONAIR
    de: DRAGONIR
    es: DRAGONAIR
  forms:
    dragonair:
      form_id: 0
      base_stats:
        hp: 61
        attack: 84
        defense: 65
        special_attack: 70
        special_defense: 70
        speed: 70
      types:
        - dragon
      egg_groups:
        - water_1
        - dragon
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          crystal: "しんせいな　ポケモンと　いわれる。\nぜんしんが　ほのかに　ひかると\nあたりの　てんきが　さまがわりする。"
        en:
          crystal: "It is called the\ndivine POKéMON.\nWhen its entire\fbody brightens\nslightly, the\nweather changes."
        fr:
          crystal: "On l’appelle le\nPOKéMON divin.\nQuand son corps\fbrille légèrement,\nle climat change."
        it:
          crystal: "È chiamato il\nPOKéMON divino.\nQuando il corpo\fs’illumina\nleggermente,\ncambia il tempo."
        de:
          crystal: "Man nennt es das\ngöttliche POKéMON.\nWenn sein gesamter\fKörper ein wenig\nleuchtet, ändert\nsich das Wetter."
        es:
          crystal: "Se refieren a él\ncomo el POKéMON\ndivino. Cuando le\fbrilla el cuerpo,\nel tiempo cambia\ninmediatamente."
dragonite:
  species_id: 149
  names:
    jp_kana: カイリュー
    en: DRAGONITE
    fr: DRACOLOSSE
    it: DRAGONITE
    de: DRAGORAN
    es: DRAGONITE
