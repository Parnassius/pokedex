        jp_kana:
          crystal: "かくとうセンスを　みがくため\nあらゆる　あいてに　たちむかう。\nまけんきが　ものすごく　つよい。"
        en:
          crystal: "To brush up on its\nfighting skills,\nit will challenge\fanyone. It has a\nvery strong com-\npetitive spirit."
        fr:
          crystal: "Pour augmenter ses\ncapacités, il\ncherche à se bat-\ftre contre n’im-\nporte qui. Il est\ntrès courageux."
        it:
          crystal: "Sfida chiunque per\nmettere alla prova\nle sua abilità\fnella lotta. Ha un\nforte spirito\nagonistico."
        de:
          crystal: "Um seine Kampf-\nfähigkeiten zu\nverbessern, tritt\fes gegen jeden an.\nEs besitzt\ngroßen Kampfgeist."
        es:
          crystal: "Para mejorar sus\ntécnicas de lucha,\ndesafiarà a\fcualquiera. Tiene\nun espíritu muy\ncompetitivo."
hitmontop:
  species_id: 237
