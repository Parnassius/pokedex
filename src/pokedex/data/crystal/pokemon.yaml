        hp: 106
        attack: 110
        defense: 90
        special_attack: 154
        special_defense: 90
        speed: 130
      types:
        - psychic
      egg_groups:
        - undiscovered
      held_items:
        rare: berserk_gene
      descriptions:
        jp_kana:
          crystal: "たたかいの　ためだけに　うみだされ\nいまは　どこかの　どうくつふかくで\nねむっていると　いわれる。"
        en:
          crystal: "Said to rest qui-\netly in an\nundiscovered cave,\fthis POKéMON was\ncreated solely for\nbattling."
        fr:
          crystal: "On dit qu’il se\nrepose dans une\ngrotte inconnue.\fIl a été créé\nuniquement pour le\ncombat."
        it:
          crystal: "POKéMON creato\nesclusivamente per\nla lotta: si dice\fche riposi all’\ninterno di grotte\ninesplorate."
        de:
          crystal: "Man sagt, es lebe\nallein in einer\nunentdeckten Höhle\fund dass es nur\nfür den Kampf\ngeschaffen wurde."
        es:
          crystal: "Parece que descan-\nsa tranquilamente\nen una cueva\fdesconocida. Fue\ncreado expresa-\nmente para luchar."
mew:
  species_id: 151
  names:
    jp_kana: ミュウ
    en: MEW
    fr: MEW
    it: MEW
    de: MEW
    es: MEW
  forms:
    mew:
      form_id: 0
      base_stats:
        hp: 100
        attack: 100
        defense: 100
        special_attack: 100
        special_defense: 100
        speed: 100
      types:
        - psychic
      egg_groups:
        - undiscovered
      held_items:
        rare: miracleberry
      descriptions:
        jp_kana:
          crystal: "すべての　わざを　おぼえるため\nポケモンの　せんぞ　ではないかと\nけんきゅうを　はじめた　ひともいる。"
        en:
          crystal: "Because it can\nlearn any move,\nsome people began\fresearch to see if\nit is the ancestor\nof all POKéMON."
        fr:
          crystal: "Etant donné qu’il\npeut apprendre\ntoutes les capaci-\ftés, on le prend\npour l’ancêtre des\nPOKéMON."
        it:
          crystal: "Poiché apprende\nqualsiasi mossa,\nalcuni studiosi\fipotizzano che sia\nl’antenato di\ntutti i POKéMON."
        de:
          crystal: "Da es jede Attacke\nerlernen kann,\nglauben manche\fMenschen, dass es\nder Urvater aller\nPOKéMON ist."
        es:
          crystal: "Como es capaz de\naprender todos los\nmovimientos,\fse piensa que es\nel ancestro de\ntodos los POKéMON."
chikorita:
  species_id: 152
  names:
    jp_kana: チコリータ
    en: CHIKORITA
    fr: GERMIGNON
    it: CHIKORITA
    de: ENDIVIE
    es: CHIKORITA
  forms:
    chikorita:
