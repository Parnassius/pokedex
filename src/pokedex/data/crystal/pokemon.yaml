bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    en: BULBASAUR
    fr: BULBIZARRE
    it: BULBASAUR
    de: BISASAM
    es: BULBASAUR
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        special_attack: 65
        special_defense: 65
        speed: 45
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          crystal: "うまれて　しばらくの　あいだ\nせなかの　タネに　つまった\nえいようを　とって　そだつ。"
        en:
          crystal: "While it is young,\nit uses the\nnutrients that are\fstored in the\nseeds on its back\nin order to grow."
        fr:
          crystal: "Jeune, il absorbe\nles nutriments\ngardés dans\fson dos pour\ngrandir et se\ndévelopper."
        it:
          crystal: "Da piccolo usa\nle sostanze\nnutritive dei\fsemi sul dorso\nper poter\ncrescere."
        de:
          crystal: "Da es noch klein\nist, frisst es die\nSamen auf seinem\fRücken, um durch\nderen Nährstoffe\nrasch zu wachsen."
        es:
          crystal: "Cuando es joven,\ncrece con los\nnutrientes que\falmacena en las\nsemillas de su\nespalda."
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    en: IVYSAUR
    fr: HERBIZARRE
    it: IVYSAUR
    de: BISAKNOSP
    es: IVYSAUR
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        special_attack: 80
        special_defense: 80
        speed: 60
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          crystal: "せなかの　つぼみは　ようぶんを\nきゅうしゅう　して　ふくらむ。\nはなのさくころ　いいにおいが　する。"
        en:
          crystal: "The bulb on its\nback grows as it\nabsorbs nutrients.\fThe bulb gives off\na pleasant aroma\nwhen it blooms."
        fr:
          crystal: "Le bulbe sur son\ndos grandit en\nabsorbant les nu-\ftriments. Il déga-\nge un doux parfum\naprès éclosion."
        it:
          crystal: "Per crescere, il\nbocciolo sul dorso\nassorbe sostanze\fnutrienti. Quando\nsboccia libera un\npiacevole profumo."
        de:
          crystal: "Nimmt es Nährstof-\nfe zu sich, wächst\nseine Knospe.\fBlüht sie, ver-\nströmt sie einen\nangenehmen Duft."
        es:
          crystal: "El bulbo de la\nespalda crece al\nabsorber\fnutrientes. Cuando\nflorece, emite un\naroma delicioso."
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    en: VENUSAUR
    fr: FLORIZARRE
    it: VENUSAUR
    de: BISAFLOR
    es: VENUSAUR
  forms:
    venusaur:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        special_attack: 100
        special_defense: 100
        speed: 80
      types:
        - grass
        - poison
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          crystal: "たいようの　ひかりをあびて　からだが\nあたたまってくると　はなびら　から\nここちよくなる　かおりが　ただよう。"
        en:
          crystal: "As it warms it-\nself and absorbs\nthe sunlight, its\fflower petals\nrelease a pleasant\nfragrance."
        fr:
          crystal: "Sous le soleil,\nil se réchauffe,\nrégénère, et ses\fpétales dégagent\nun subtil parfum."
        it:
          crystal: "Mentre si riscalda\nassorbendo la luce\nsolare, dai petali\fdel fiore si\ndiffonde un\npiacevole profumo."
        de:
          crystal: "Wenn es sich in\nder Sonne wärmt,\nentströmt den\fBlättern seiner\nBlüte ein wohliges\nAroma."
        es:
          crystal: "Cuando se calienta\nal absorber la luz\ndel sol, sus\fpétalos emiten\nuna placentera\nfragancia."
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    en: CHARMANDER
    fr: SALAMECHE
    it: CHARMANDER
    de: GLUMANDA
    es: CHARMANDER
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      descriptions:
        jp_kana:
          crystal: "しっぽの　さきの　ほのおは\nげんきなら　すこしくらい　ぬれても\nきえることなく　もえさかる。"
        en:
          crystal: "If it’s healthy,\nthe flame on the\ntip of its tail\fwill burn vigor-\nously, even if it\ngets a bit wet."
        fr:
          crystal: "S’il est en bonne\nsanté, la flamme\nsur sa queue est\fimportante, même\ns’il pleut."
        it:
          crystal: "Se è in forma, la\nfiamma sulla punta\ndella coda è\fparticolarmente\nvivace, persino se\nsi bagna un po’."
        de:
          crystal: "Ist es gesund,\nstrahlt die Flamme\nauf der Schwanz-\fspitze leuchtend\nhell, auch wenn\nsie nass wird."
        es:
          crystal: "Si està sano, la\nllama que tiene\nen la cola arderà\fvigorosamente,\naunque se le moje\nun poco."
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    en: CHARMELEON
    fr: REPTINCEL
    it: CHARMELEON
    de: GLUTEXO
    es: CHARMELEON
  forms:
    charmeleon:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        special_attack: 80
        special_defense: 65
        speed: 80
      types:
        - fire
      egg_groups:
        - monster
        - dragon
      descriptions:
        jp_kana:
          crystal: "たたかいで　きもちが　たかぶると\nしゃくねつの　ほのおを　ふきながら\nあたりを　もやしてまわる。"
        en:
          crystal: "If it becomes\nagitated during\nbattle, it spouts\fintense flames,\nincinerating its\nsurroundings."
        fr:
          crystal: "S’il s’énerve pen-\ndant un combat,\nil crache de\fgrandes flammes,\nbrûlant tout aux\nalentours."
        it:
          crystal: "Se s’innervosisce\nnella lotta, sputa\npotenti fiamme che\finceneriscono\nl’area\ncircostante."
        de:
          crystal: "Steigert es sich\nin einen Kampf\nhinein, spuckt es\fFlammen, die auf\nseine Umgebung\nübergreifen."
        es:
          crystal: "Si se inquieta en\ncombate, expulsa\nintensas\fllamaradas que\nincineran los\nalrededores."
charizard:
  species_id: 6
  names:
    jp_kana: リザードン
    en: CHARIZARD
    fr: DRACAUFEU
    it: CHARIZARD
    de: GLURAK
    es: CHARIZARD
  forms:
    charizard:
      form_id: 0
      base_stats:
        hp: 78
        attack: 84
        defense: 78
        special_attack: 109
        special_defense: 85
        speed: 100
      types:
        - fire
        - flying
      egg_groups:
        - monster
        - dragon
      descriptions:
        jp_kana:
          crystal: "つばさで　おおぞらたかく　まう。\nたたかいの　けいけんを　つむほど\nほのおの　おんどは　あがっていく。"
        en:
          crystal: "It uses its wings\nto fly high. The\ntemperature of its\ffire increases as\nit gains exper-\nience in battle."
        fr:
          crystal: "Il utilise ses\nailes pour s’envo-\nler très haut.\fSa flamme devient\nplus chaude en ga-\ngnant des combats."
        it:
          crystal: "Spiega le ali per\nvolare alto. La\ntemperatura del\ffuoco sale mentre\nacquista esperien-\nza nella lotta."
        de:
          crystal: "Mit seinen Flügeln\nfliegt es hoch\nempor. Die Tempe-\fratur seiner Flam-\nme steigt mit der\nKampferfahrung."
        es:
          crystal: "Utiliza las alas\npara volar muy\nalto. La tempera-\ftura de su fuego\naumenta al ganar\nexperiencia."
squirtle:
  species_id: 7
  names:
    jp_kana: ゼニガメ
    en: SQUIRTLE
    fr: CARAPUCE
    it: SQUIRTLE
    de: SCHIGGY
    es: SQUIRTLE
  forms:
    squirtle:
      form_id: 0
      base_stats:
        hp: 44
        attack: 48
        defense: 65
        special_attack: 50
        special_defense: 64
        speed: 43
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          crystal: "あぶなくなると　こうらに　てあしを\nひっこめて　みを　まもりながら\nくちから　みずを　ふきだしてくる。"
        en:
          crystal: "When it feels\nthreatened, it\ndraws its legs\finside its shell\nand sprays water\nfrom its mouth."
        fr:
          crystal: "S’il est menacé,\nil rétracte ses\npattes dans sa\fcarapace et crache\nde l’eau."
        it:
          crystal: "Se si sente\nminacciato, ritira\nle zampe nel\fguscio e inizia a\nspruzzare acqua\ndalla bocca."
        de:
          crystal: "Fühlt es sich be-\ndroht, verkriecht\nes sich in seinen\fPanzer und spuckt\nWasser aus seinem\nMaul."
        es:
          crystal: "Cuando se siente\namenazado, esconde\nlas patas dentro\fde la concha y\nexpele agua por\nla boca."
wartortle:
  species_id: 8
  names:
    jp_kana: カメール
    en: WARTORTLE
    fr: CARABAFFE
    it: WARTORTLE
    de: SCHILLOK
    es: WARTORTLE
  forms:
    wartortle:
      form_id: 0
      base_stats:
        hp: 59
        attack: 63
        defense: 80
        special_attack: 65
        special_defense: 80
        speed: 58
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          crystal: "ながくて　ふさふさの　しっぽは\nながいきの　シンボル。\nとくに　おとしよりに　にんきがある。"
        en:
          crystal: "Its long, furry\ntail is a symbol\nof longevity,\fmaking it quite\npopular among\nolder people."
        fr:
          crystal: "Sa longue queue\nest un symbole de\nlongévité. Il est\fainsi très appré-\ncié par les per-\nsonnes âgées."
        it:
          crystal: "La coda lunga e\nfolta è un simbolo\ndi longevità, che\flo rende popolare\ntra le persone\nanziane."
        de:
          crystal: "Sein langer und\nbuschiger Schwanz\nzeugt von Lang-\flebigkeit. Darum\nist es bei alten\nMenschen beliebt."
        es:
          crystal: "Tiene una cola\nlarga y peluda\nque simboliza\fla longevidad y\nle hace popular\nentre los mayores."
blastoise:
  species_id: 9
  names:
    jp_kana: カメックス
    en: BLASTOISE
    fr: TORTANK
    it: BLASTOISE
    de: TURTOK
    es: BLASTOISE
  forms:
    blastoise:
      form_id: 0
      base_stats:
        hp: 79
        attack: 83
        defense: 100
        special_attack: 85
        special_defense: 105
        speed: 78
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          crystal: "せなかの　ふんしゃこう　から\nいきおいよく　みずを　だすとき\nちからづよく　だいちを　ふみしめる。"
        en:
          crystal: "It firmly plants\nits feet on the\nground before\fshooting water\nfrom the jets on\nits back."
        fr:
          crystal: "Il enfonce bien\nses pattes dans le\nsol avant de pro-\fpulser ses jets\nd’eau avec les\ncanons de son dos."
        it:
          crystal: "Punta i piedi\nsaldamente al\nsuolo, per poi\fsparare getti\nd’acqua dal\ndorso."
        de:
          crystal: "Ehe es seinen\nkräftigen Wasser-\nstrahl abfeuert,\fsucht es sicheren\nHalt."
        es:
          crystal: "Planta firmemente\nlas patas en el\nsuelo antes de\fdisparar chorros\nde agua desde la\nespalda."
caterpie:
  species_id: 10
  names:
    jp_kana: キャタピー
    en: CATERPIE
    fr: CHENIPAN
    it: CATERPIE
    de: RAUPY
    es: CATERPIE
  forms:
    caterpie:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 35
        special_attack: 20
        special_defense: 20
        speed: 45
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "はっぱの　なかに　もぐりこむのは\nからだと　おなじいろの　なかで\nじぶんを　カモフラージュするため。"
        en:
          crystal: "It crawls into\nfoliage where it\ncamouflages itself\famong leaves that\nare the same color\nas its body."
        fr:
          crystal: "Pour se protéger,\nil s’enfonce dans\nle sol en se cou-\fvrant de feuilles\nde la même couleur\nque son corps."
        it:
          crystal: "Strisciando tra la\nvegetazione, si\nmimetizza tra il\ffogliame, che ha\nlo stesso colore\ndel suo corpo."
        de:
          crystal: "Es sucht im Laub\nSchutz und tarnt\nsich mit Blättern,\fdie der Farbe\nseines Körpers\nentsprechen."
        es:
          crystal: "Se agazapa en el\nfollaje donde se\ncamufla entre las\fhojas que son del\nmismo color que\nsu cuerpo."
metapod:
  species_id: 11
  names:
    jp_kana: トランセル
    en: METAPOD
    fr: CHRYSACIER
    it: METAPOD
    de: SAFCON
    es: METAPOD
  forms:
    metapod:
      form_id: 0
      base_stats:
        hp: 50
        attack: 20
        defense: 55
        special_attack: 25
        special_defense: 25
        speed: 30
      types:
        - bug
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "しんかを　まっている　じょうたい。\nかたくなる　ことしか　できないので\nおそわれないよう　じっとしている。"
        en:
          crystal: "This is its pre-\nevolved form. At\nthis stage, it can\fonly harden, so it\nremains motionless\nto avoid attack."
        fr:
          crystal: "A ce niveau de son\névolution, il ne\npeut que durcir\fet rester immobile\npour éviter les\nattaques."
        it:
          crystal: "In questa forma\npreevoluta può\nsolo indurirsi.\fPer questo evita\ngli attacchi\nrestando immobile."
        de:
          crystal: "In diesem Ent-\nwicklungsstadium\nkann es nur seinen\fPanzer erhärten.\nDaher bewegt es\nsich nicht."
        es:
          crystal: "Ésta es la forma\npre-evolucionada.\nEn este estado,\fsólo puede usar\nFORTALEZA, así que\nse queda inmóvil."
butterfree:
  species_id: 12
  names:
    jp_kana: バタフリー
    en: BUTTERFREE
    fr: PAPILUSION
    it: BUTTERFREE
    de: SMETTBO
    es: BUTTERFREE
  forms:
    butterfree:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 50
        special_attack: 80
        special_defense: 80
        speed: 70
      types:
        - bug
        - flying
      egg_groups:
        - bug
      held_items:
        rare: silver_powder
      descriptions:
        jp_kana:
          crystal: "ミツをあつめに　はなから　はなへ\nとびまわる。とおくで　どんな\nはなが　さいたかも　さぐりあてる。"
        en:
          crystal: "It flits from\nflower to flower,\ncollecting honey.\fIt can even\nidentify distant\nflowers in bloom."
        fr:
          crystal: "Il vole de fleur\nen fleur en récol-\ntant du miel. Il\fpeut même identi-\nfier des fleurs\nde très loin."
        it:
          crystal: "Vola di fiore in\nfiore raccogliendo\nmiele. Può\findividuare i\nfiori anche da\ngrande distanza."
        de:
          crystal: "Es eilt von Blume\nzu Blume, ständig\nauf der Suche nach\fHonig. Es kann\nBlumen an deren\nBlüten erkennen."
        es:
          crystal: "Revolotea de flor\nen flor,\nrecolectando miel.\fIncluso puede\nlocalizar capullos\nlejanos en flor."
weedle:
  species_id: 13
  names:
    jp_kana: ビードル
    en: WEEDLE
    fr: ASPICOT
    it: WEEDLE
    de: HORNLIU
    es: WEEDLE
  forms:
    weedle:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 30
        special_attack: 20
        special_defense: 20
        speed: 50
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "あたまの　さきの　ハりからでる\nつよい　どくを　つかって\nじぶんの　みを　まもっている。"
        en:
          crystal: "The barb on top of\nits head secretes\na strong poison.\fIt uses this toxic\nbarb to protect\nitself."
        fr:
          crystal: "Son aiguillon em-\npoisonné est très\ndangereux.\fIl l’utilise pour\nse protéger de ses\nennemis."
        it:
          crystal: "L’aculeo sulla\ntesta secerne un\npotente veleno,\fche usa per\nproteggersi dai\nnemici."
        de:
          crystal: "Der Stachel auf\nseinem Kopf ent-\nhält ein starkes\fGift. Es setzt das\nGift ein, um sich\nzu schützen."
        es:
          crystal: "El cuerno de la\ncabeza segrega un\npotente veneno,\falgo que le\nresulta muy ùtil\npara protegerse."
kakuna:
  species_id: 14
  names:
    jp_kana: コクーン
    en: KAKUNA
    fr: COCONFORT
    it: KAKUNA
    de: KOKUNA
    es: KAKUNA
  forms:
    kakuna:
      form_id: 0
      base_stats:
        hp: 45
        attack: 25
        defense: 50
        special_attack: 25
        special_defense: 25
        speed: 35
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "おおきな　きに　よりかかって\nしんかの　しゅんかんを　まっている。\nじぶんでは　ほとんど　うごけない。"
        en:
          crystal: "Nearly incapable\nof movement, it\nleans against\fstout trees while\nwaiting for its\nevolution."
        fr:
          crystal: "Pratiquement inca-\npable de bouger,\nil se colle aux\farbres et attend\nd’évoluer."
        it:
          crystal: "Quasi incapace di\nmuoversi, resta\nattaccato ai\fforti alberi,\nattendendo di\nevolversi."
        de:
          crystal: "Es kann sich kaum\nbewegen. Daher\nlehnt es sich\fgegen dicke Stämme\nund erwartet\nseine Entwicklung."
        es:
          crystal: "Casi incapaz de\nmoverse, descansa\napoyado en\frobustos àrboles\na la espera de\nsu evolución."
beedrill:
  species_id: 15
  names:
    jp_kana: スピアー
    en: BEEDRILL
    fr: DARDARGNAN
    it: BEEDRILL
    de: BIBOR
    es: BEEDRILL
  forms:
    beedrill:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 40
        special_attack: 45
        special_defense: 80
        speed: 75
      types:
        - bug
        - poison
      egg_groups:
        - bug
      held_items:
        rare: poison_barb
      descriptions:
        jp_kana:
          crystal: "どんなに　てごわい　あいても\nするどい　どくバりで　しとめて\nすに　はこびこんで　エサにする。"
        en:
          crystal: "It uses sharp,\npoisonous stings\nto defeat prey,\fthen takes the\nvictim back to its\nnest for food."
        fr:
          crystal: "Il utilise ses\naiguillons pour\nattaquer sa proie.\fIl la transporte\nensuite à son nid\npour la dévorer."
        it:
          crystal: "Sconfigge la preda\ncon gli aculei\naguzzi e velenosi,\fper poi\ntrasportarla al\nnido e cibarsene."
        de:
          crystal: "Mit seinen Gift-\nstacheln über-\nwältigt es seine\fBeute, die es\ndann zu seinem\nStock trägt."
        es:
          crystal: "Usa aguijones\nvenenosos para\nderrotar a su\fpresa. Entonces,\nlleva a la víctima\nhasta su nido."
pidgey:
  species_id: 16
  names:
    jp_kana: ポッポ
    en: PIDGEY
    fr: ROUCOOL
    it: PIDGEY
    de: TAUBSI
    es: PIDGEY
  forms:
    pidgey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 40
        special_attack: 35
        special_defense: 35
        speed: 56
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "くさむらで　はげしく　はばたき\nすなけむりを　おこして　とびでた\nムシを　とらえて　たべる。"
        en:
          crystal: "It rapidly flaps\nits wings in the\ngrass, stirring up\fa dust cloud that\ndrives insect prey\nout into the open."
        fr:
          crystal: "Il bat vite des\nailes au-dessus de\nl’herbe pour faire\fsortir tous les\ninsectes."
        it:
          crystal: "Agitando le ali\nnell’erba, solleva\nuna nube di\fpolvere per far\nuscire gli insetti\nallo scoperto."
        de:
          crystal: "Es schlägt mit den\nFlügeln, um eine\nStaubwolke aufzu-\fwirbeln, die In-\nsekten aus ihrem\nVersteck treibt."
        es:
          crystal: "Aletea ràpidamente\nsobre la hierba\npara levantar una\fnube de polvo que\nle permite cazar\ninsectos."
pidgeotto:
  species_id: 17
  names:
    jp_kana: ピジョン
    en: PIDGEOTTO
    fr: ROUCOUPS
    it: PIDGEOTTO
    de: TAUBOGA
    es: PIDGEOTTO
  forms:
    pidgeotto:
      form_id: 0
      base_stats:
        hp: 63
        attack: 60
        defense: 55
        special_attack: 50
        special_defense: 50
        speed: 71
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "くうちゅうを　わを　かくように\nゆっくり　とびまわりながら\nえものが　いないか　さがしている。"
        en:
          crystal: "It slowly flies in\na circular pat-\ntern, all the\fwhile keeping a\nsharp lookout for\nprey."
        fr:
          crystal: "Il vole au-dessus\nd’une zone précise\nen décrivant des\fcercles, tout en\ngardant un oeil\nsur ses proies."
        it:
          crystal: "Compie lentamente\nampi cerchi\nnel cielo, per\fperlustrare l’area\nalla ricerca\ndi una preda."
        de:
          crystal: "Während es lang-\nsam Kreise fliegt,\nhält es stets\fAusschau nach\nmöglicher Beute."
