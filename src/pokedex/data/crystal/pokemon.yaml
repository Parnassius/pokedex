          crystal: "Es ist leicht\nerregbar und setzt\nsein Horn ein,\fsobald es einen\nAngreifer\nwahrnimmt."
        es:
          crystal: "Se altera con\nfacilidad y usa\nel cuerno para\fembestir al mínimo\nindicio de algùn\nataque."
nidoking:
  species_id: 34
  names:
    jp_kana: ニドキング
    en: NIDOKING
    fr: NIDOKING
    it: NIDOKING
    de: NIDOKING
    es: NIDOKING
  forms:
    nidoking:
      form_id: 0
      base_stats:
        hp: 81
        attack: 92
        defense: 77
        special_attack: 85
        special_defense: 75
        speed: 85
      types:
        - poison
        - ground
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          crystal: "ふとい　てあしと　しっぽで\nがんがん　せめこむ　ちからじまん。\nせっきんせんを　とくい　とする。"
        en:
          crystal: "It uses its thick\narms, legs and\ntail to attack\fforcefully. Melee\ncombat is its\nspecialty."
        fr:
          crystal: "Il utilise tous\nses membres pour\nattaquer sans\frépit. Il préfère\ncombattre en étant\ncollé à l’ennemi."
        it:
          crystal: "Colpisce\nviolentemente con\nla forte coda e\fgli arti possenti.\nLa sua specialità\nsono le mischie."
        de:
          crystal: "Es greift mit\nseinen kräftigen\nArmen, Beinen und\fdem Schwanz an.\nHandgemenge sind\nseine Spezialität."
        es:
          crystal: "Està dotado de\nfornidas extremi-\ndades y gruesa\fcola. Fulmina a su\nenemigo arreme-\ntiendo contra él."
clefairy:
  species_id: 35
  names:
    jp_kana: ピッピ
    en: CLEFAIRY
    fr: MELOFEE
    it: CLEFAIRY
    de: PIEPI
    es: CLEFAIRY
  forms:
    clefairy:
      form_id: 0
      base_stats:
        hp: 70
        attack: 45
        defense: 48
        special_attack: 60
        special_defense: 65
        speed: 35
      types:
        - normal
      egg_groups:
        - fairy
      held_items:
        common: mysteryberry
        rare: moon_stone
      descriptions:
        jp_kana:
          crystal: "めったに　みつからない　ポケモン。\nふしぎと　まんげつの　よるに\nすがたを　みかけることが　おおい。"
        en:
          crystal: "Though rarely\nseen, it becomes\neasier to spot,\ffor some reason,\non the night of a \nfull moon."
        fr:
          crystal: "Bien que rarement\naperçu, on le\ncroise plus sou-\fvent les nuits de\npleine lune."
        it:
          crystal: "È raro\nincontrarlo, ma\nsembra più facile\fdurante le\nnotti di\nluna piena."
        de:
          crystal: "Obwohl man es nur\nselten sieht,\ntrifft man es\fhäufiger, wenn\ndes Nachts der\nVollmond scheint."
        es:
          crystal: "Aunque no es muy\ncomùn, se le puede\nver por la noche.\fCuriosamente,\nocurre en noches\nde luna llena."
clefable:
  species_id: 36
  names:
    jp_kana: ピクシー
    en: CLEFABLE
    fr: MELODELFE
    it: CLEFABLE
    de: PIXI
    es: CLEFABLE
  forms:
    clefable:
      form_id: 0
      base_stats:
        hp: 95
        attack: 70
        defense: 73
        special_attack: 85
        special_defense: 90
        speed: 60
      types:
        - normal
      egg_groups:
        - fairy
      held_items:
        common: mysteryberry
        rare: moon_stone
      descriptions:
        jp_kana:
          crystal: "すがたを　みられることを\nこのまない　ようせいの　なかま。\nしずかな　やまおくにすむ　という。"
        en:
          crystal: "Said to live in\nquiet, remote\nmountains, this\ftype of fairy has\na strong aversion\nto being seen."
        fr:
          crystal: "On dit qu’il vit\ndans de lointaines\nmontagnes.\fIl déteste\nêtre vu."
        it:
          crystal: "Pare che questo\nessere fatato viva\nin remote, placide\faree montuose.\nNon ama farsi\nvedere."
        de:
          crystal: "Man sagt, es lebe\nin ruhigen, ab-\ngelegenen Berg-\fregionen. Diese\nFeenart hasst es,\ngesehen zu werden."
        es:
          crystal: "Se dice que este\nPOKéMON hada vive\nen la montaña en\fzonas tranquilas\ny lejanas. Odia\nque le vean."
vulpix:
  species_id: 37
  names:
    jp_kana: ロコン
    en: VULPIX
    fr: GOUPIX
    it: VULPIX
    de: VULPIX
    es: VULPIX
  forms:
    vulpix:
      form_id: 0
      base_stats:
        hp: 38
        attack: 41
        defense: 40
        special_attack: 50
        special_defense: 65
        speed: 65
      types:
        - fire
      egg_groups:
        - field
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          crystal: "あたたかい　６ぽんの　しっぽは\nからだが　そだつごとに　けなみが\nよくなり　うつくしく　なっていく。"
        en:
          crystal: "As its body grows\nlarger, its six\nwarm tails become\fmore beautiful,\nwith a more luxur-\nious coat of fur."
        fr:
          crystal: "En grandissant,\nses six queues de-\nviennent plus bel-\fles et se couvrent\nd’une fourrure\nplus épaisse."
        it:
          crystal: "Mentre gli cresce\nil corpo, le sei\ncode si fanno più\fbelle, con una\npelliccia ancora\npiù elegante."
        de:
          crystal: "Wenn es wächst,\nwird sein warmer\n6fach-Schweif\fschöner und be-\nkommt ein\nweicheres Fell."
        es:
          crystal: "A medida que crece\nse le embellecen\nlas seis colas.\fAdemàs, adquiere\nun elegante\npelaje."
ninetales:
  species_id: 38
  names:
    jp_kana: キュウコン
    en: NINETALES
    fr: FEUNARD
    it: NINETALES
    de: VULNONA
    es: NINETALES
