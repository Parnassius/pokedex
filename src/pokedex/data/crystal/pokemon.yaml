        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "ちょっとや　そっとの　こうげきでは\nわずかな　キズすら　つかないほど\nかたい　ひふで　おおわれている。"
        en:
          crystal: "Because this\nPOKéMON’s skin is\nso tough, a normal\fattack won’t even\nleave a scratch on\nit."
        fr:
          crystal: "Sa peau est si\népaisse et résis-\ntante qu’une atta-\fque normale ne\npeut l’atteindre."
        it:
          crystal: "La pelle di questo\nPOKéMON è così\ndura che un\fnormale attacco\nnon può neppure\nscalfirla."
        de:
          crystal: "Die Haut dieses\nPOKéMON ist so\ndick, dass eine\fnormale Attacke\nbei ihm keine Spu-\nren hinterlässt."
        es:
          crystal: "Como la piel de\neste POKéMON es\ndemasiado dura,\fun ataque normal\nno lograrà\nni arañarle."
porygon2:
  species_id: 233
  names:
    jp_kana: ポリゴン２
