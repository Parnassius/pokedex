        hp: 115
        attack: 45
        defense: 20
        special_attack: 45
        special_defense: 25
        speed: 20
      types:
        - normal
      egg_groups:
        - fairy
      descriptions:
        jp_kana:
          crystal: "つぶらな　ひとみを　ゆらしながら\nうたう　こもりうたは　ここちよく\nきかせた　あいてを　ねむらせる。"
        en:
          crystal: "It rolls its cute\neyes as it sings a\nsoothing lullaby.\fIts gentle song\nputs anyone who\nhears it to sleep."
        fr:
          crystal: "Il roule des yeux\net chante une\nlongue BERCEUSE\fqui peut\nendormir ses\nadversaires."
        it:
          crystal: "Fa ruotare i dolci\nocchi cantando una\nninnananna. Il suo\fpiacevole canto fa\naddormentare chi\nlo ascolta."
        de:
          crystal: "Während es ein\nSchlaflied singt,\nrollt es mit den\fAugen. Der zarte\nGesang versetzt\njeden in Schlaf."
        es:
          crystal: "Cierra los ojitos\ny usa su CANTO\npara deleitar a\fquien le oye con\nuna nana que\ninvita a dormir."
wigglytuff:
  species_id: 40
  names:
    jp_kana: プクリン
    en: WIGGLYTUFF
    fr: GRODOUDOU
    it: WIGGLYTUFF
    de: KNUDDELUFF
    es: WIGGLYTUFF
  forms:
    wigglytuff:
      form_id: 0
      base_stats:
        hp: 140
        attack: 70
        defense: 45
        special_attack: 75
        special_defense: 50
        speed: 45
      types:
        - normal
      egg_groups:
        - fairy
      descriptions:
        jp_kana:
          crystal: "ふわふわの　たいもうに　さわると\nてざわりが　とても　よいので\nはなれられなく　なってしまう。"
        en:
          crystal: "The rich, fluffy\nfur that covers\nits body feels so\fgood that anyone\nwho feels it can’t\nstop touching it."
        fr:
          crystal: "Sa fourrure est si\ndouce et riche que\nsi on la caresse,\fon ne veut ni ne\npeut s’arrêter."
        it:
          crystal: "Il suo folto pelo\nè così morbido che\nchiunque lo tocchi\fnon può fare a\nmeno di continuare\nad accarezzarlo."
        de:
          crystal: "Sein dichtes,\nflauschiges Fell \nfühlt sich so toll\fan, dass man nicht\naufhören kann, es\nanzufassen."
        es:
          crystal: "Es como un peluche\nsuave, tan lanudo\nal tacto que,\fcuando lo tocas,\nno puedes dejar de\nacariciarle."
zubat:
  species_id: 41
  names:
    jp_kana: ズバット
    en: ZUBAT
    fr: NOSFERAPTI
    it: ZUBAT
    de: ZUBAT
    es: ZUBAT
  forms:
    zubat:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 30
        special_defense: 40
        speed: 55
      types:
        - poison
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "ひるまは　しゅうだん　となって\nふるびた　たてものや　どうくつの\nてんじょう　から　ぶらさがっている。"
        en:
          crystal: "During the day, it\ngathers with\nothers and hangs\ffrom the ceilings\nof old buildings\nand caves."
        fr:
          crystal: "La journée, il se\njoint à d’autres\net s’accroche au\fplafond des vieux\nimmeubles ou dans\nles grottes."
        it:
          crystal: "Durante il giorno\nriposano insieme,\nappesi ai soffitti\fdi vecchi edifici\no all’interno di\ngrotte."
        de:
          crystal: "Am Tag versammelt\nes sich mit\nseinesgleichen und\fhängt sich an De-\ncken von Häusern\noder Höhlen."
        es:
          crystal: "Durante el día, se\nreùne con otros de\nsu especie y se\fcuelga de los\ntechos de cuevas y\nedificios."
golbat:
  species_id: 42
  names:
    jp_kana: ゴルバット
    en: GOLBAT
    fr: NOSFERALTO
    it: GOLBAT
    de: GOLBAT
    es: GOLBAT
  forms:
    golbat:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 70
        special_attack: 65
        special_defense: 75
        speed: 90
      types:
        - poison
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "えものに　キバを　さしこむと\nいっしゅんで　３００シーシーの\nけつえきを　すいとってしまう。"
        en:
          crystal: "When it plunges\nits fangs into its\nprey, it instantly\fdraws and gulps\ndown more than ten\nounces of blood."
        fr:
          crystal: "S’il plante ses\ncrocs dans sa\nproie, il aspire\fplus de 300cl de\nsang."
        it:
          crystal: "Quando affonda i\ndenti nella preda,\nriesce a succhiare\fall’instante più\ndi 300 cc di\nsangue."
        de:
          crystal: "Wenn seine spitzen\nZähne die Beute\ndurchbohren, saugt\fes ihr sofort mehr\nals 300 ml Blut\naus."
        es:
          crystal: "Al precipitarse\nsobre su víctima,\nle clava los col-\fmillos al instante\ny le chupa màs de\n300 ml de sangre."
oddish:
  species_id: 43
  names:
    jp_kana: ナゾノクサ
    en: ODDISH
    fr: MYSTHERBE
    it: ODDISH
    de: MYRAPLA
    es: ODDISH
  forms:
    oddish:
      form_id: 0
      base_stats:
        hp: 45
        attack: 50
        defense: 55
        special_attack: 75
        special_defense: 65
        speed: 30
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "ひるまは　たいようを　さけるため\nつめたい　じめんに　もぐっている。\nつきのひかりを　あびて　そだつ。"
        en:
          crystal: "During the day, it\nstays in the cold\nunderground to\favoid the sun.\nIt grows by bath-\ning in moonlight."
        fr:
          crystal: "Le jour, il reste\nen sous-sol et\névite le soleil.\fIl grandit en se\nbaignant au clair\nde lune."
        it:
          crystal: "Di giorno vive nel\nfreddo sottosuolo,\nper evitare la\fluce del sole.\nCresce assorbendo\nla luce lunare."
        de:
          crystal: "Tagsüber versteckt\nes sich in der\nkalten Erde, um\fdie Sonne zu\nmeiden. Es wächst\nim Mondschein."
        es:
          crystal: "Durante el día, se\nagazapa en el frío\nsubsuelo huyendo\fdel sol. La luz de\nla luna le hace\ncrecer mucho."
gloom:
  species_id: 44
  names:
    jp_kana: クサイハナ
    en: GLOOM
    fr: ORTIDE
    it: GLOOM
    de: DUFLOR
    es: GLOOM
  forms:
    gloom:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 70
        special_attack: 85
        special_defense: 75
        speed: 40
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "はなから　こぼれでる　かふんも\nよだれのように　たれている　ミツも\nきぜつ　するような　においがする。"
        en:
          crystal: "The smell from its\ndrool-like syrup\nand the pollen on\fits petals is so\nbad, it may make\nopponents faint."
        fr:
          crystal: "L’odeur de son si-\nrop buccal et du\npollen de ses pé-\ftales est si mau-\nvaise qu’elle met\nfacilement K.O."
        it:
          crystal: "Il puzzo della\nbava e del polline\ndei suoi petali\fè così forte che\npuò mandare al\ntappeto il nemico."
        de:
          crystal: "Der Gestank seines\nSpeichels und der\nPollen ist so eke-\flig, dass mancher\nFeind dadurch\nohnmächtig wird."
        es:
          crystal: "El aroma emitido\npor la miel de la\nboca y el polen de\flos pétalos, son\nfulminantes para\nsus oponentes."
vileplume:
  species_id: 45
  names:
    jp_kana: ラフレシア
    en: VILEPLUME
    fr: RAFFLESIA
    it: VILEPLUME
    de: GIFLOR
    es: VILEPLUME
  forms:
    vileplume:
      form_id: 0
      base_stats:
        hp: 75
        attack: 80
        defense: 85
        special_attack: 100
        special_defense: 90
        speed: 50
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "おおきな　はなびらが　ゆれると\nたくさんの　かふんが　ばらまかれて\nまわりの　くうきが　きいろくなる。"
        en:
          crystal: "By shaking its big\npetals, it scat-\nters toxic pollen\finto the air,\nturning the air\nyellow."
        fr:
          crystal: "En gigotant ses\npétales, il émet\ndu pollen toxique\fet s’entoure ainsi\nd’un nuage jaune."
        it:
          crystal: "Scuotendo i grandi\npetali, diffonde\nnell’atmosfera\fpolline tossico,\ncolorando l’aria\ndi giallo."
        de:
          crystal: "Schüttelt es seine\ngroßen Blätter,\nverstreut es Gift-\fpollen, wodurch\nsich die Luft gelb\nverfärbt."
        es:
          crystal: "Al sacudir los\nenormes pétalos\nque tiene, libera\fnubes de polen\ntóxico de color\namarillo."
paras:
  species_id: 46
  names:
    jp_kana: パラス
    en: PARAS
    fr: PARAS
    it: PARAS
    de: PARAS
    es: PARAS
  forms:
    paras:
      form_id: 0
      base_stats:
        hp: 35
        attack: 70
        defense: 55
        special_attack: 45
        special_defense: 55
        speed: 25
      types:
        - bug
        - grass
      egg_groups:
        - bug
        - grass
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          crystal: "とうちゅうかそう　という　せなかに\nはえてきた　キノコが　めいれいして\nきのねっこから　エキスを　すわせる。"
        en:
          crystal: "The tochukaso\ngrowing on this\nPOKéMON’s back\forders it to\nextract juice from\ntree trunks."
        fr:
          crystal: "Le Tochukaso sur\nson dos l’incite\nà aspirer la sève\fdes arbres pour\nse nourrir."
        it:
          crystal: "Il fungo tochukaso\nche gli cresce sul\ndorso lo costringe\fad assorbire i\nsucchi formati\nnei tronchi."
        de:
          crystal: "Die Tochukaso, die\nauf seinem Rücken\nwachsen, befehlen\fihm, den Saft\naus Baumstämmen\nzu trinken."
        es:
          crystal: "La gran seta que\nlleva a cuestas\nle sirve para\fobtener savia\nde los troncos\nde los àrboles."
parasect:
  species_id: 47
  names:
    jp_kana: パラセクト
    en: PARASECT
    fr: PARASECT
    it: PARASECT
    de: PARASEK
    es: PARASECT
  forms:
    parasect:
      form_id: 0
      base_stats:
        hp: 60
        attack: 95
        defense: 80
        special_attack: 60
        special_defense: 80
        speed: 30
      types:
        - bug
        - grass
      egg_groups:
        - bug
        - grass
      held_items:
        common: tiny_mushroom
        rare: big_mushroom
      descriptions:
        jp_kana:
          crystal: "ムシから　エキスが　すえなくなると\nせなかのキノコは　ムシの　タマゴを\nみつけて　ほうしを　うえつける。"
        en:
          crystal: "When nothing’s\nleft to extract\nfrom the bug, the\fmushrooms on its\nback leave spores\non the bug’s egg."
        fr:
          crystal: "Lorsque le champi-\ngnon parasite n’a\nplus rien à aspi-\frer, il laisse des\nspores sur l’oeuf\nde l’insecte."
        it:
          crystal: "Quando ha finito\ndi succhiare\nsostanze dall’\finsetto, il fungo\nlascia spore su un\naltro insetto."
        de:
          crystal: "Kann der Pilz auf\nseinem Rücken dem\nKäfer nichts mehr\fentziehen, übersät\ner dessen Ei mit\nSporen."
        es:
          crystal: "Cuando ya no queda\nnada del bicho,\nla seta del lomo\flibera esporas\nsobre el huevo\ndel mismo."
venonat:
  species_id: 48
  names:
    jp_kana: コンパン
    en: VENONAT
    fr: MIMITOSS
    it: VENONAT
    de: BLUZUK
    es: VENONAT
  forms:
    venonat:
      form_id: 0
      base_stats:
        hp: 60
        attack: 55
        defense: 50
        special_attack: 40
        special_defense: 55
        speed: 45
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "エサにする　ちいさな　ムシは\nよるしか　かつどう　しないので\nそれまで　きのあななどで　ねむる。"
        en:
          crystal: "The small bugs it\neats appear only\nat night, so it\fsleeps in a hole\nin a tree until\nnight falls."
        fr:
          crystal: "Ses proies n’appa-\nraissant que la\nnuit, il dort le\fjour dans un arbre\njusqu’au coucher\ndu soleil."
        it:
          crystal: "Poiché gli insetti\ndi cui si nutre\nappaiono solo la\fnotte, di giorno\ndorme nei buchi\ndegli alberi."
        de:
          crystal: "Die kleinen Käfer,\ndie es frisst,\nsind nachtaktiv.\fDaher schläft es\nin einem Baum, bis\nes dunkel wird."
        es:
          crystal: "Los bichitos que\ncome sólo salen\npor la noche, así\fque, durante el\ndía, duerme en el\nhueco de un àrbol."
venomoth:
  species_id: 49
  names:
    jp_kana: モルフォン
    en: VENOMOTH
    fr: AEROMITE
    it: VENOMOTH
    de: OMOT
    es: VENOMOTH
  forms:
    venomoth:
      form_id: 0
      base_stats:
        hp: 70
        attack: 65
        defense: 60
        special_attack: 90
        special_defense: 75
        speed: 90
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "ばらまかれた　りんぷんに　ふれると\nからだの　かんかくが　おかしくなって\nまっすぐ　たって　いられなくなる。"
        en:
          crystal: "The scales it\nscatters will\nparalyze anyone\fwho touches them,\nmaking that person\nunable to stand."
        fr:
          crystal: "Les écailles qu’il\nsème ont le pou-\nvoir de paralyser\ftotalement un\nennemi."
        it:
          crystal: "Sparge scaglie che\nparalizzano\nchiunque le\ftocchi, rendendolo\nincapace di\nstare in piedi."
        de:
          crystal: "Die Schuppen, die\nes verstreut,\nlähmen jeden, der\fsie berührt und\nzwingen ihn, sich\nzu setzen."
        es:
          crystal: "Lanza unas escamas\nque paralizan a\ncualquiera.\fQuien las toque,\nno podrà ni\nponerse de pie."
diglett:
  species_id: 50
  names:
    jp_kana: ディグダ
    en: DIGLETT
    fr: TAUPIQUEUR
    it: DIGLETT
    de: DIGDA
    es: DIGLETT
  forms:
    diglett:
      form_id: 0
      base_stats:
        hp: 10
        attack: 55
        defense: 25
        special_attack: 35
        special_defense: 45
        speed: 95
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "じめんを　ほりすすみ　きのねっこを\nかじっている。まぶしくないと\nちじょうに　かおを　だしたりする。"
        en:
          crystal: "It digs under-\nground and chews\non tree roots,\fsticking its head\nout only when the\nsun isn’t bright."
        fr:
          crystal: "Il creuse le sol\net mâchouille les\nracines d’arbres,\fne sortant la tête\nque lorsque le so-\nleil est faible."
        it:
          crystal: "Scava nel terreno\nper mangiare le\nradici.\fQuando il sole è\nmeno forte, spunta\nin superficie."
        de:
          crystal: "Es gräbt in der\nErde und nagt an\nBaumwurzeln. Es\fkommt nur heraus,\nwenn die Sonne\nnicht scheint."
        es:
          crystal: "Cava bajo tierra\ny roe las raíces\nde los àrboles.\fAsomarà la cabeza\nsólo cuando el sol\nno brille."
dugtrio:
  species_id: 51
  names:
    jp_kana: ダグトリオ
    en: DUGTRIO
    fr: TRIOPIKEUR
    it: DUGTRIO
    de: DIGDRI
    es: DUGTRIO
  forms:
    dugtrio:
      form_id: 0
      base_stats:
        hp: 35
        attack: 80
        defense: 50
        special_attack: 50
        special_defense: 70
        speed: 120
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "ちか１００キロまで　ほりすすむ\nパワーをひめた　みつごの　ディグダ。\nじめんのしたは　だれも　しらない。"
        en:
          crystal: "These DIGLETT\ntriplets dig over\n60 miles below sea\flevel. No one\nknows what it’s\nlike underground."
        fr:
          crystal: "Ces triplés de\nTAUPIQUEUR creu-\nsent à plus de 100\fkm sous terre,\nvers l’inconnu."
        it:
          crystal: "Questo trio di\nDIGLETT giunge a\noltre 100 km di\fprofondità. La sua\nparte inferiore\nnon s’è mai vista."
        de:
          crystal: "Diese DIGDA-Dril-\nlinge graben\n100 km unter\fNormalnull. Keiner\nweiß, wie es dort\naussieht."
        es:
          crystal: "Estos trillizos\nDIGLETT cavan\nmàs de 100 km\fbajo el mar. Nunca\nse sabe lo que hay\nbajo tierra."
meowth:
  species_id: 52
  names:
    jp_kana: ニャース
    en: MEOWTH
    fr: MIAOUSS
    it: MEOWTH
    de: MAUZI
    es: MEOWTH
  forms:
    meowth:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 35
        special_attack: 40
        special_defense: 40
        speed: 90
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "まぶしく　ひかるものが　だいすき。\nひかるものを　みつけたとき\nなぜか　ひたいのこばんも　かがやく。"
        en:
          crystal: "It loves things\nthat sparkle. When\nit sees a shiny\fobject, the gold\ncoin on its head\nshines too."
        fr:
          crystal: "Il est fasciné par\nles objets bril-\nlants. Lorsqu’il\fen voit un, la\npièce sur son\nfront brille."
        it:
          crystal: "Ama gli oggetti\nscintillanti. Se\nnota qualcosa\fbrillare, splende\nla moneta d’oro\nsulla sua fronte."
        de:
          crystal: "Schimmernde Dinge\nfaszinieren es.\nFindet es etwas\fSchimmerndes, \nleuchtet die Münze\nan seinem Kopf."
        es:
          crystal: "Le fascina todo lo\nque brilla. Si ve\nalgo que destelle,\fla moneda de oro\nque tiene en la\ncabeza brillarà."
persian:
  species_id: 53
  names:
    jp_kana: ペルシアン
    en: PERSIAN
    fr: PERSIAN
    it: PERSIAN
    de: SNOBILIKAT
    es: PERSIAN
  forms:
    persian:
      form_id: 0
      base_stats:
        hp: 65
        attack: 70
        defense: 60
        special_attack: 65
        special_defense: 65
        speed: 115
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "しなやかな　からだの　うちがわに\nきまぐれに　えものを　ひきさいて\nもてあそぶ　やばんさを　ひめている。"
        en:
          crystal: "Behind its lithe,\nelegant appearance\nlies a barbaric\fside. It will tear\napart its prey on\na mere whim."
        fr:
          crystal: "Derrière une appa-\nrence calme et\nélégante, il est\fsauvage et peut\ndéchiqueter sa\nproie."
        it:
          crystal: "Dietro l’aspetto\nelegante e sinuoso\nsi cela una natura\fferoce: può fare\na pezzi un nemico\nper un nonnulla."
        de:
          crystal: "Hinter seiner ele-\nganten Fassade\nliegt ein brutales\fWesen. Es zerfetzt\nseine Beute ein-\nfach aus Spaß."
        es:
          crystal: "Tras su aspecto\nligero y elegante,\nse esconde su lado\fcruel. Harà trizas\na su víctima a la\nmínima de cambio."
psyduck:
  species_id: 54
  names:
    jp_kana: コダック
    en: PSYDUCK
    fr: PSYKOKWAK
    it: PSYDUCK
    de: ENTON
    es: PSYDUCK
  forms:
    psyduck:
      form_id: 0
      base_stats:
        hp: 50
        attack: 52
        defense: 48
        special_attack: 65
        special_defense: 50
        speed: 55
      types:
        - water
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "ふとした　きっかけで　ねていた\nのうさいぼうが　めざめたときだけ\nねんりきが　つかえる　ようだ。"
        en:
          crystal: "The only time it\ncan use its psy-\nchic power is when\fits sleeping brain\ncells happen to\nwake."
        fr:
          crystal: "Il ne peut utili-\nser ses pouvoirs\nPSY que lorsque\fses neurones se\nréveillent."
        it:
          crystal: "Può usare i suoi\npoteri magici solo\nquando le cellule\fcerebrali,\ncasualmente, si\nsvegliano."
        de:
          crystal: "Es kann seine\nPsychokräfte nur\neinsetzen, wenn\fseine schlafenden\nGehirnzellen zu-\nfällig aufwachen."
        es:
          crystal: "Està dotado de un\npoder psíquico que\nno podrà usar\fsi no tiene las\nneuronas despier-\ntas del todo."
golduck:
  species_id: 55
  names:
    jp_kana: ゴルダック
    en: GOLDUCK
    fr: AKWAKWAK
    it: GOLDUCK
    de: ENTORON
    es: GOLDUCK
  forms:
    golduck:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 78
        special_attack: 95
        special_defense: 80
        speed: 85
      types:
        - water
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "ながれの　しずかな　かわや\nみずうみを　このんでいる。\nおよぐ　すがたは　とても　ゆうが。"
        en:
          crystal: "It swims grace-\nfully along on the\nquiet, slow-moving\frivers and lakes\nof which it is so\nfond."
        fr:
          crystal: "Il nage avec une\ngrande grâce le\nlong des lacs ou\fdes rivières\ncalmes."
        it:
          crystal: "La sua passione è\nnuotare con grazia\nnelle placide,\flente acque dei\nlaghi e dei corsi\nd’acqua."
        de:
          crystal: "Es schwimmt ele-\ngant durch stille,\nlangsame Flüsse\fund Seen, weil es\nsich dort gerne\naufhält."
        es:
          crystal: "Nada con elegancia\npor las tranquilas\naguas de ríos y\flagos, donde se\nsiente como pez en\nel agua."
mankey:
  species_id: 56
  names:
    jp_kana: マンキー
    en: MANKEY
    fr: FEROSINGE
    it: MANKEY
    de: MENKI
    es: MANKEY
  forms:
    mankey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 80
        defense: 35
        special_attack: 35
        special_defense: 45
        speed: 70
      types:
        - fighting
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "きのうえで　むれをつくって　くらす。\nむれから　はぐれた　マンキーは\nさびしくて　すぐに　おこりだす。"
        en:
          crystal: "It lives in groups\nin the treetops.\nIf it loses sight\fof its group, it\nbecomes infuriated\nby its loneliness."
        fr:
          crystal: "Il vit en groupe\nau sommet des ar-\nbres. S’il se re-\ftrouve seul, sa\nsolitude le rend\nalors furieux."
        it:
          crystal: "Vivono in branchi,\nin cima agli\nalberi. Se perdono\fil contatto con il\ngruppo s’infuriano\nper la solitudine."
        de:
          crystal: "Es lebt mit Artge-\nnossen in Baumkro-\nnen. Verliert es\fsie aus den Augen,\nwird es vor Ein-\nsamkeit zornig."
        es:
          crystal: "Vive en grupos en\nlas copas de los\nàrboles.\fAl alejarse de la\nmanada se siente\nsolo y se enfada."
primeape:
  species_id: 57
  names:
    jp_kana: オコリザル
    en: PRIMEAPE
    fr: COLOSSINGE
    it: PRIMEAPE
    de: RASAFF
    es: PRIMEAPE
  forms:
    primeape:
      form_id: 0
      base_stats:
        hp: 65
        attack: 105
        defense: 60
        special_attack: 60
        special_defense: 70
        speed: 95
      types:
        - fighting
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "じぶんを　おこらせた　ものは\nせかいのはて　までも　おいつめて\nたたきのめす　らんぼうな　ポケモン。"
        en:
          crystal: "It will beat up\nanyone who makes\nit mad, even if it\fhas to chase them\nuntil the end of\nthe world."
        fr:
          crystal: "Il cherchera à\ncastagner celui\nqui le dérange,\fmême s’il doit le\npoursuivre jusqu’\nau bout du monde."
        it:
          crystal: "Prima o poi\npicchia chiunque\nlo faccia adirare,\fanche a costo di\ninseguirlo fino in\ncapo al mondo."
        de:
          crystal: "Es verprügelt\njeden, der es\nnervt, auch wenn\fes ihn bis ans\nEnde der Welt\nverfolgen muss."
        es:
          crystal: "Ataca a todo aquel\nque le enfade.\nNo pararà hasta\fdar caza a quien\nle moleste, esté\ndonde esté."
growlithe:
  species_id: 58
  names:
    jp_kana: ガーディ
    en: GROWLITHE
    fr: CANINOS
    it: GROWLITHE
    de: FUKANO
    es: GROWLITHE
  forms:
    growlithe:
      form_id: 0
      base_stats:
        hp: 55
        attack: 70
        defense: 45
        special_attack: 70
        special_defense: 50
        speed: 60
      types:
        - fire
      egg_groups:
        - field
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          crystal: "ひろい　なわばりを　もつ。\nしらない　においを　だす　あいては\nはげしく　ほえて　おいだす。"
        en:
          crystal: "It controls a big\nterritory. If it\ndetects an unknown\fsmell, it roars\nloudly to force\nout the intruder."
        fr:
          crystal: "Il contrôle un\ngrand territoire.\nS’il sent un in-\ftrus, il HURLE\npour le chasser."
        it:
          crystal: "Controlla un’ampia\narea. Se avverte\nun odore sospetto,\fringhia per\nfar fuggire\nl’intruso."
        de:
          crystal: "Stößt es in seinem\nweiten Gebiet auf\neinen fremden Ge-\fruch, versucht es\nden Eindringling\nzu vertreiben."
        es:
          crystal: "Tiene marcado un\nvasto territorio.\nSi detecta un olor\fextraño, RUGE con\nfuerza para ahu-\nyentar al enemigo."
arcanine:
  species_id: 59
  names:
    jp_kana: ウインディ
    en: ARCANINE
    fr: ARCANIN
    it: ARCANINE
    de: ARKANI
    es: ARCANINE
  forms:
    arcanine:
      form_id: 0
      base_stats:
        hp: 90
        attack: 110
        defense: 80
        special_attack: 100
        special_defense: 80
        speed: 95
      types:
        - fire
      egg_groups:
        - field
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          crystal: "そうげんを　かけぬける　ようすは\nひとびとの　こころを　とりこにしたと\nむかしの　えまきに　しるされていた。"
        en:
          crystal: "An ancient picture\nscroll shows that\npeople were\fattracted to its\nmovement as it ran\nthrough prairies."
        fr:
          crystal: "Une vieille estam-\npe montre que les\nhumains suivaient\fses mouvements\nlorsqu’il courait\ndans les champs."
        it:
          crystal: "Dal disegno su un’\nantica pergamena\nsi vede come le\fsue corse sui\nprati incantassero\nle persone."
        de:
          crystal: "Eine alte Schrift-\nrolle zeigt, dass\ndie Menschen von\fihm fasziniert\nwaren, als es über\ndas Land rannte."
        es:
          crystal: "Cuenta un antiguo\npergamino que la\ngente se sentía\fatraída por cómo\ncorría por las\npraderas."
poliwag:
  species_id: 60
  names:
    jp_kana: ニョロモ
    en: POLIWAG
    fr: PTITARD
    it: POLIWAG
    de: QUAPSEL
    es: POLIWAG
  forms:
    poliwag:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 90
      types:
        - water
      egg_groups:
        - water_1
      descriptions:
        jp_kana:
          crystal: "おなかの　うずまきは　ひふが\nすけて　みえた　ないぞうの　いちぶ。\nエサをたべたあと　くっきり　みえる。"
        en:
          crystal: "The swirl on its\nbelly is its\ninsides showing\fthrough the skin.\nIt looks clearer\nafter it eats."
        fr:
          crystal: "La spirale sur son\nventre est son\norganisme, visible\fà travers la peau.\nIl est plus clair\naprès son repas."
        it:
          crystal: "La spirale sulla\npancia è la forma\ndel suo intestino.\fDopo mangiato\nappare più\nluminosa."
        de:
          crystal: "Der Kreisel auf\nseinem Bauch sind\nseine Innereien,\fdie durchscheinen.\nHat es gefressen,\nsind sie klarer."
        es:
          crystal: "La espiral que\ntiene en la panza\nes el dibujo de\fsus tripas. Es màs\nnítido cuando\nacaba de comer."
poliwhirl:
  species_id: 61
  names:
    jp_kana: ニョロゾ
    en: POLIWHIRL
    fr: TETARTE
    it: POLIWHIRL
    de: QUAPUTZI
    es: POLIWHIRL
  forms:
    poliwhirl:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 65
        special_attack: 50
        special_defense: 50
        speed: 90
      types:
        - water
      egg_groups:
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          crystal: "じょうずに　あるけるのだが\nすいちゅう　せいかつが　すきなのは\nおそわれることが　すくないからだ。"
        en:
          crystal: "Though it is\nskilled at walk-\ning, it prefers to\flive underwater\nwhere there is\nless danger."
        fr:
          crystal: "Bien qu’il sache\nparfaitement mar-\ncher, il préfère\fles fonds marins,\nbien moins dange-\nreux."
        it:
          crystal: "Sulla terraferma\nsi muove bene, ma\npreferisce vivere\fsott’acqua, dove\ncorre meno\npericoli."
        de:
          crystal: "Obwohl es ein ge-\nschickter Läufer\nist, zieht es das\fLeben unter Wasser\nvor, weil dort\nkaum Gefahr droht."
        es:
          crystal: "Aunque es hàbil en\ntierra, prefiere\nvivir bajo el\fagua, pues hay\nmenos peligros al\nacecho."
poliwrath:
  species_id: 62
  names:
    jp_kana: ニョロボン
    en: POLIWRATH
    fr: TARTARD
    it: POLIWRATH
    de: QUAPPO
    es: POLIWRATH
  forms:
    poliwrath:
      form_id: 0
      base_stats:
        hp: 90
        attack: 85
        defense: 95
        special_attack: 70
        special_defense: 90
        speed: 70
      types:
        - water
        - fighting
      egg_groups:
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          crystal: "はったつした　てあしを　つかって\nほんの　いっしゅん　だけなら\nみずのうえを　はしることが　できる。"
        en:
          crystal: "It can use its\nwell-developed\narms and legs to\frun on the surface\nof the water for a\nsplit second."
        fr:
          crystal: "Il peut, grâce à\nses puissants mem-\nbres, courir à la\fsurface de l’eau\npendant une demi-\nseconde."
        it:
          crystal: "Può usare i suoi\narti ben\nsviluppati per\fcorrere per un\nistante a pelo\nd’acqua."
        de:
          crystal: "Mittels seiner\nstarken Arme und\nBeine kann es für\fden Bruchteil\neiner Sekunde über\nWasser laufen."
        es:
          crystal: "Puede utilizar sus\nfornidos brazos y\npiernas para ir\fpor la superficie\ndel agua durante\nmedio segundo."
abra:
  species_id: 63
  names:
    jp_kana: ケーシィ
    en: ABRA
    fr: ABRA
    it: ABRA
    de: ABRA
    es: ABRA
  forms:
    abra:
      form_id: 0
      base_stats:
        hp: 25
        attack: 20
        defense: 15
        special_attack: 105
        special_defense: 55
        speed: 90
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "きけんな　けはいを　かんじたら\nねていても　テレポートで　にげるよう\nじぶんに　あんじを　かけている。"
        en:
          crystal: "It hypnotizes\nitself so that it\ncan teleport away\fwhen it senses\ndanger, even\nif it is asleep."
        fr:
          crystal: "Il s’hypnotise et\npeut lancer\nTELEPORT, même en-\fdormi, pour éviter\ntout danger."
        it:
          crystal: "S’ipnotizza per\nTELETRASPORTarsi\nin salvo se\favverte un\npericolo, persino\nse sta dormendo."
        de:
          crystal: "Es hypnotisiert\nsich, um mittels\nTELEPORT auch im\fSchlaf zu fliehen,\nwenn es Gefahr\nverspürt."
        es:
          crystal: "Se hipnotiza a sí\nmismo para usar\nTELETRANSPORTE\fsi hay peligro.\nLo usa incluso\nmientras duerme."
kadabra:
  species_id: 64
  names:
    jp_kana: ユンゲラー
    en: KADABRA
    fr: KADABRA
    it: KADABRA
    de: KADABRA
    es: KADABRA
  forms:
    kadabra:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 30
        special_attack: 120
        special_defense: 70
        speed: 105
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "りょうめを　とじると　からだの\nひょうめんから　でる　とくしゅな\nアルファは　は　いつもの２ばい。"
        en:
          crystal: "When it closes its\neyes, twice as\nmany alpha parti-\fcles come out of\nthe surface of its\nbody."
        fr:
          crystal: "En fermant les\nyeux, le double de\nparticules alpha\fse dégage de son\ncorps."
        it:
          crystal: "Quando chiude gli\nocchi, le onde\nalfa che emette\fdalla superficie\ndel corpo\nraddoppiano."
        de:
          crystal: "Schließt es seine\nAugen, entstehen\nauf der Oberfläche\fseines Körpers\ndoppelt so viele\nAlpha-Teilchen."
        es:
          crystal: "Cuando cierra los\nojos, el nùmero de\npartículas alfa\fque desprende su\ncuerpo llega a\nduplicarse."
alakazam:
  species_id: 65
  names:
    jp_kana: フーディン
    en: ALAKAZAM
    fr: ALAKAZAM
    it: ALAKAZAM
    de: SIMSALA
    es: ALAKAZAM
  forms:
    alakazam:
      form_id: 0
      base_stats:
        hp: 55
        attack: 50
        defense: 45
        special_attack: 135
        special_defense: 85
        speed: 120
      types:
        - psychic
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "ちのうしすう　５０００。\nあらゆることを　けいさん　しながら\nたたかいを　ゆうりに　すすめていく。"
        en:
          crystal: "It has an IQ of\n5000. It calcu-\nlates many things\fin order to gain\nthe edge in every\nbattle."
        fr:
          crystal: "Il a un QI de 5000\net fait des\ncalculs en perma-\fnence lui donnant\nainsi l’avantage\nen combat."
        it:
          crystal: "Il suo quoziente\nintellettivo è\n5000. Nella lotta\fesegue molti\ncalcoli per\navvantaggiarsi."
        de:
          crystal: "Sein IQ ist 5000.\nEs berechnet sehr\nviele Dinge, um\fim Kampf das\nLetzte aus sich\nherauszuholen."
        es:
          crystal: "Tiene un C.I.\nfuera de lo comùn.\nLo analiza todo al\fdetalle para coger\nventaja en los\ncombates."
machop:
  species_id: 66
  names:
    jp_kana: ワンリキー
    en: MACHOP
    fr: MACHOC
    it: MACHOP
