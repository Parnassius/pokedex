  forms:
    phanpy:
      form_id: 0
      base_stats:
        hp: 90
        attack: 60
        defense: 60
        special_attack: 40
        special_defense: 40
        speed: 40
      types:
        - ground
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "あさはやく　ひとけのない　みずべに\nやってきて　ながい　はなを\nうまく　つかい　みずあびをする。"
        en:
          crystal: "During the desert-\ned morning hours,\nit comes ashore\fwhere it deftly\nuses its trunk to\ntake a shower."
        fr:
          crystal: "De bonne heure, il\nreste près d’un\npoint d’eau pour\fse laver en utili-\nsant sa trompe."
        it:
          crystal: "Nella quiete\ndel mattino\ns’avvicina alla\friva, usando la\nproboscide per\nfarsi una doccia."
        de:
          crystal: "In den ruhigen\nMorgenstunden\ngeht es zu seiner\fWasserstelle und\nduscht sich mit\nseinem Rüssel."
        es:
          crystal: "A primera hora de\nla mañana, se\nacerca al agua y\fse vale de la\ntrompa para\nducharse."
donphan:
  species_id: 232
  names:
    jp_kana: ドンファン
