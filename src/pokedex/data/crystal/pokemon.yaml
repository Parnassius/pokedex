        special_defense: 60
        speed: 45
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "つかれしらずの　タフな　ポケモン。\nたたかいで　つかった　きんにくは\nどんどん　ふとく　なっていく。"
        en:
          crystal: "This tough POKéMON\nalways stays in\nthe zone. Its\fmuscles become\nthicker after\nevery battle."
        fr:
          crystal: "Il se donne tou-\njours à fond.\nSes muscles sont\fplus importants\naprès chaque com-\nbat."
        it:
          crystal: "POKéMON potente\nche non abbandona\nmai la sua zona.\fI muscoli si fanno\npiù grossi ad ogni\nlotta."
        de:
          crystal: "Dieses starke\nPOKéMON wird nie \nmüde. Seine\fMuskeln werden mit\njedem Kampf dicker\nund größer."
        es:
          crystal: "Este gran POKéMON\nestà siempre en su\nterritorio.\fCon cada combate,\nse le fortalecen\nlos mùsculos."
machamp:
  species_id: 68
  names:
    jp_kana: カイリキー
    en: MACHAMP
    fr: MACKOGNEUR
    it: MACHAMP
