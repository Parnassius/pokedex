        en:
          crystal: "It trains by\nlifting rocks in\nthe mountains. It\fcan even pick up a\nGRAVELER with\nease."
        fr:
          crystal: "Il s’entraîne en\nsoulevant des ro-\nchers dans les\fmontagnes. Il peut\nmême soulever un\nGRAVALANCH."
        it:
          crystal: "S’allena\nsollevando rocce\nsui monti. Può\fpersino reggere un\nGRAVELER senza\ndifficoltà."
        de:
          crystal: "Es trainiert,\nindem es in den\nBergen Felsen\fstemmt. Selbst ein\nGEOROK ist für ihn\nein Leichtgewicht."
        es:
          crystal: "Se entrena en las\nmontañas levantan-\ndo rocas. Incluso\fpuede elevar a un\nGRAVELER sin mucho\nesfuerzo."
machoke:
  species_id: 67
  names:
    jp_kana: ゴーリキー
    en: MACHOKE
    fr: MACHOPEUR
    it: MACHOKE
    de: MASCHOCK
