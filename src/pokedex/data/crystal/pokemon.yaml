        hp: 80
        attack: 105
        defense: 65
        special_attack: 100
        special_defense: 60
        speed: 70
      types:
        - grass
        - poison
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "たいないに　とりこまれた　ものは\nどんなに　かたくても　ようかいえきで\nあとかたなく　とかされてしまう。"
        en:
          crystal: "Once ingested into\nthis POKéMON’s\nbody, even the\fhardest object\nwill melt into\nnothing."
        fr:
          crystal: "Tout corps ingéré\npar ce POKéMON est\nsystématiquement\fdissout en bouil-\nlie."
        it:
          crystal: "Anche l’oggetto\npiù resistente si\nscioglie non\fappena viene\ningerito da questo\nPOKéMON."
        de:
          crystal: "Selbst die härtes-\nten Objekte\nschmelzen, wenn\fder Körper sie\nerst aufgenommen\nhat."
        es:
          crystal: "Cuando este\nPOKéMON ingiere\nalgo, incluso el\fobjeto màs duro\nse disolverà al\ninstante."
tentacool:
  species_id: 72
  names:
    jp_kana: メノクラゲ
    en: TENTACOOL
    fr: TENTACOOL
    it: TENTACOOL
    de: TENTACHA
    es: TENTACOOL
  forms:
    tentacool:
      form_id: 0
      base_stats:
        hp: 40
        attack: 40
        defense: 35
        special_attack: 50
        special_defense: 100
        speed: 70
      types:
        - water
        - poison
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          crystal: "なみに　ながされているとき\nさわったもの　すべて　どくの\nしょくしゅで　さしていく。"
        en:
          crystal: "As it floats along\non the waves, it\nuses its toxic\ffeelers to stab\nanything it\ntouches."
        fr:
          crystal: "En flottant à la\nsurface de l’eau,\nil pique tout ce\fqu’il croise de\nses tentacules\nempoisonnées."
        it:
          crystal: "Galleggiando tra\nle onde, usa i\ntentacoli velenosi\fper colpire tutto\nciò che incontra\nsulla sua strada."
        de:
          crystal: "Wenn es auf den\nWellen treibt,\nsetzt es seine\fgiftigen Tentakel\nein, um alles zu\nberühren."
        es:
          crystal: "Mientras està flo-\ntando en el agua,\nusa sus tóxicos\ftentàculos para\nenvenenar a quien\nle roce."
tentacruel:
  species_id: 73
  names:
    jp_kana: ドククラゲ
    en: TENTACRUEL
    fr: TENTACRUEL
    it: TENTACRUEL
    de: TENTOXA
    es: TENTACRUEL
  forms:
    tentacruel:
      form_id: 0
      base_stats:
        hp: 80
        attack: 70
        defense: 65
        special_attack: 80
        special_defense: 120
        speed: 100
      types:
        - water
        - poison
      egg_groups:
        - water_3
      descriptions:
        jp_kana:
          crystal: "８０ぽんの　しょくしゅは　みずを\nふくむと　どんどん　のびて　えものを\nからめとる　アミのように　なる。"
        en:
          crystal: "When its 80 feel-\ners absorb water,\nit stretches to\fbecome like a net\nto entangle its\nprey."
        fr:
          crystal: "Ses 80 tentacules\nabsorbent de l’eau\net s’étirent sans\ffin pour enserrer\net capturer ses\nadversaires."
        it:
          crystal: "Quando gli 80\ntentacoli\nassorbono l’acqua,\fformano una rete\nper impigliare la\npreda."
        de:
          crystal: "Wenn seine 80 Ten-\ntakel Wasser auf-\nsaugen, breiten\fsie sich netzartig\naus und es geht so\nauf Beutejagd."
        es:
          crystal: "Al chupar agua con\nsus 80 tentàculos,\nse estira formando\funa red para\natrapar a su\nvíctima en ella."
geodude:
  species_id: 74
  names:
    jp_kana: イシツブテ
    en: GEODUDE
    fr: RACAILLOU
    it: GEODUDE
    de: KLEINSTEIN
    es: GEODUDE
  forms:
    geodude:
