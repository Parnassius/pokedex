      types:
        - ice
        - flying
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "いつも　エサを　もちはこんでいる。\nおそわれると　みをまもろう　として\nもっている　エサを　なげつける。"
        en:
          crystal: "It always carries\nits food with it,\nwherever it goes.\fIf attacked, it\nthrows its food at\nthe opponent."
        fr:
          crystal: "Il transporte de\nla nourriture\ntoute la journée\fet en jette sur\ntout attaquant."
        it:
          crystal: "Ovunque vada,\nporta con sé il\ncibo. Se è\fattaccato getta i\nviveri sull’\navversario."
        de:
          crystal: "Es trägt immer\nLebensmittel bei\nsich. Wird es\fattackiert, wirft\nes sie nach dem\nAngreifer."
        es:
          crystal: "Siempre lleva\nla comida consigo,\nvaya donde vaya.\fSi le atacan, se\nla tirarà a su\nadversario."
mantine:
  species_id: 226
  names:
    jp_kana: マンタイン
