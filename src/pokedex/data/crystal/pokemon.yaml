        attack: 50
        defense: 80
        special_attack: 50
        special_defense: 80
        speed: 50
      types:
        - water
      egg_groups:
        - water_1
        - fairy
      descriptions:
        jp_kana:
          crystal: "おなかの　あわのような　もようは\nみずの　なかで　じぶんの　すがたを\nカモフラージュ　してくれる。"
        en:
          crystal: "The bubble-like\npattern on its\nstomach helps it\fcamouflage itself\nwhen it’s in the\nwater."
        fr:
          crystal: "Les motifs sur son\nventre lui permet-\ntent de se camou-\ffler lorsqu’il est\ndans l’eau."
        it:
          crystal: "Le bolle disegnate\nsulla pancia gli\npermettono di\fmimetizzarsi\nquando si trova\nin acqua."
        de:
          crystal: "Das blasenähnliche\nMuster auf seinem\nBauch hilft ihm,\fsich perfekt zu\ntarnen, wenn es\nim Wasser ist."
        es:
          crystal: "Gracias al dibujo\nque tiene en el\nestómago, le\fresulta bastante\nfàcil camuflarse\nen el agua."
sudowoodo:
  species_id: 185
  names:
    jp_kana: ウソッキー
    en: SUDOWOODO
    fr: SIMULARBRE
    it: SUDOWOODO
    de: MOGELBAUM
    es: SUDOWOODO
  forms:
    sudowoodo:
      form_id: 0
      base_stats:
        hp: 70
        attack: 100
        defense: 115
        special_attack: 30
        special_defense: 65
        speed: 30
      types:
        - rock
      egg_groups:
        - mineral
      descriptions:
        jp_kana:
          crystal: "かぜも　ないのに　ゆれている　きを\nみかけたら　それが　ウソッキー。\nあめのひは　すがたを　かくすという。"
        en:
          crystal: "If a tree branch\nshakes when there\nis no wind, it’s a\fSUDOWOODO, not a\ntree. It hides\nfrom the rain."
        fr:
          crystal: "Une branche remue\nalors qu’il n’y a\npas de vent?\fVous venez de\ntrouver un\nSIMULARBRE."
        it:
          crystal: "Se si nota un\nalbero ondeggiare\nanche se non c’è\fvento, quello non\nè un albero, ma\nSUDOWOODO."
        de:
          crystal: "Bewegt ein Baum\nbei Windstille \neinen Ast, ist es\fein MOGELBAUM,\ndas sich vor dem\nRegen schützt."
        es:
          crystal: "Si ves una rama\nmoverse cuando no\nhay viento, habràs\fencontrado un\nSUDOWOODO. Cuando\nllueve se esconde."
politoed:
  species_id: 186
  names:
    jp_kana: ニョロトノ
    en: POLITOED
    fr: TARPAUD
    it: POLITOED
    de: QUAXO
