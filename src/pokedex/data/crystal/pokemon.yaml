        en:
          crystal: "After doing a\nhandstand to\nthrow off the\fopponent’s timing,\nit presents its\nfancy kick moves."
        fr:
          crystal: "Après avoir effec-\ntué un poirier\npour déstabiliser\fl’adversaire, il\nlance des coups de\npied furieux."
        it:
          crystal: "Prima esegue una\nverticale per\nspiazzare il\fnemico, poi parte\ncon i suoi calci\nspettacolari."
        de:
          crystal: "Nach einem Hand-\nstand, der das\nTiming des Gegners\fstören soll, tritt\nes elegant um\nsich."
        es:
          crystal: "Tras hacer el pino\npara despistar a\nsu oponente,\fcomienza a repar-\ntir sus increíbles\npatadas."
smoochum:
  species_id: 238
  names:
    jp_kana: ムチュール
    en: SMOOCHUM
    fr: LIPPOUTI
