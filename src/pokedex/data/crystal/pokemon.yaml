        - dragon
        - flying
      egg_groups:
        - water_1
        - dragon
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          crystal: "ひろい　うみの　どこかには\nカイリューだけが　あつまって\nくらす　しまが　あるらしい。"
        en:
          crystal: "It is said that\nsomewhere in the\nocean lies an\fisland where these\ngather. Only they\nlive there."
        fr:
          crystal: "On dit qu’il exis-\nte une île dans\nl’océan où ces\fPOKéMON se réunis-\nsent pour vivre\npaisiblement."
        it:
          crystal: "Si dice che questi\nPOKéMON si\nriuniscano su un’\fisola in mezzo\nall’oceano, dove\nvivono solo loro."
        de:
          crystal: "Man sagt, dass es\nirgendwo im Meer\neine Insel gibt,\fauf der sie sich\nversammeln. Nur\nsie leben dort."
        es:
          crystal: "Dicen que viven en\nuna isla en algùn\nlugar del océano.\fEs el ùnico lugar\ndonde se les puede\nencontrar."
mewtwo:
  species_id: 150
  names:
    jp_kana: ミュウツー
    en: MEWTWO
    fr: MEWTWO
    it: MEWTWO
    de: MEWTU
    es: MEWTWO
