      base_stats:
        hp: 60
        attack: 62
        defense: 80
        special_attack: 63
        special_defense: 80
        speed: 60
      types:
        - grass
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          crystal: "くびの　まわりの　はっぱから\nただよう　かおりを　かいだ　ひとは\nからだに　ちからが　みなぎってくる。"
        en:
          crystal: "The scent that\nwafts from the\nleaves on its neck\fcauses anyone who\nsmells it to\nbecome energetic."
        fr:
          crystal: "L’odeur épicée des\nfeuilles sur son\ncou est considérée\fpar les humains\ncomme énergisante."
        it:
          crystal: "Il profumo che\nemana dalle foglie\nsul collo riempie\fdi energia\nchiunque lo\navverta."
        de:
          crystal: "Der Duft, aus den\nKnospen um seinen\nHals, setzt bei\fjedem, der ihn\nriecht, neue\nEnergien frei."
        es:
          crystal: "Las hojas que le\nadornan el cuello\nemiten un aroma\fque resulta\nvigorizante para\nquien lo perciba."
meganium:
  species_id: 154
  names:
    jp_kana: メガニウム
    en: MEGANIUM
    fr: MEGANIUM
    it: MEGANIUM
    de: MEGANIE
    es: MEGANIUM
  forms:
    meganium:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 100
        special_attack: 83
        special_defense: 100
        speed: 80
      types:
        - grass
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          crystal: "メガニウムの　そばに　いると\nしんりんよくを　したような\nすがすがしい　きぶんに　なれる。"
        en:
          crystal: "Anyone who stands\nbeside it becomes\nrefreshed, just as\fif they were\nrelaxing in a\nsunny forest."
        fr:
          crystal: "Toute personne se\ntenant près de lui\nse sent instanta-\fnément rafraîchie,\ncomme dans une fo-\nrêt en été."
        it:
          crystal: "Chiunque gli stia\nvicino si ritempra\ncome se riposasse\fin una foresta\naccarezzata dal\nsole."
        de:
          crystal: "Jeder, der neben\nihm steht, fühlt\nsich erfrischt,\fals ob er sich in\nsonnigen Wäldern\nentspannt hätte."
        es:
          crystal: "Estar a su lado es\nmuy refrescante.\nEs una sensación\fparecida a estar\na la sombra en un\ndía de verano."
cyndaquil:
  species_id: 155
  names:
    jp_kana: ヒノアラシ
    en: CYNDAQUIL
    fr: HERICENDRE
    it: CYNDAQUIL
    de: FEURIGEL
    es: CYNDAQUIL
  forms:
    cyndaquil:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        special_attack: 60
        special_defense: 50
        speed: 65
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "せなかから　ふきだす　ほのおは\nおこったときが　いちばん　つよく\nもえあがり　てきを　おどろかせる。"
        en:
          crystal: "The fire that\nspouts from its\nback burns hottest\fwhen it is angry.\nThe flaring flames\nintimidate foes."
        fr:
          crystal: "Les flammes éma-\nnant de son dos\ngrandissent s’il\fest en colère. Il\nimpressionne ainsi\nses ennemis."
        it:
          crystal: "Se s’arrabbia, il\nfuoco sul dorso si\nfa più caldo. Il\fbagliore delle\nfiamme impaurisce\ni nemici."
        de:
          crystal: "Sein Feuer hat die\nhöchste Tempera-\ntur, wenn es zor-\fnig ist. Dadurch\nschüchtert es\nseine Feinde ein."
        es:
          crystal: "Cuando se enfada,\nel fuego que dis-\npara por el lomo\fes infernal. Las\nllamaradas intimi-\ndan a sus rivales."
quilava:
  species_id: 156
  names:
    jp_kana: マグマラシ
    en: QUILAVA
    fr: FEURISSON
    it: QUILAVA
    de: IGELAVAR
    es: QUILAVA
  forms:
    quilava:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        special_attack: 80
        special_defense: 65
        speed: 80
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "たたかいのまえ　せなかを　むけて\nじぶんの　ほのおが　どれくらい\nすごいかを　あいてに　みせつける。"
        en:
          crystal: "Before battle, it\nturns its back on\nits opponent to\fdemonstrate how\nferociously its\nfire blazes."
        fr:
          crystal: "Avant chaque com-\nbat, il tourne le\ndos et montre la\fpuissance de ses\nflammes."
        it:
          crystal: "Prima di lottare\nmostra il dorso al\nnemico per\fimpressionarlo con\nla potenza delle\nsue fiamme."
        de:
          crystal: "Vor dem Kampf\ndreht es dem Feind\nden Rücken zu, um\fihm zu zeigen, wie\nFurcht erregend\nsein Feuer lodert."
        es:
          crystal: "Antes de empezar a\nluchar, se gira\nante su rival para\falardear del al-\ncance y la fuerza\nde sus llamas."
typhlosion:
  species_id: 157
  names:
    jp_kana: バクフーン
    en: TYPHLOSION
    fr: TYPHLOSION
    it: TYPHLOSION
    de: TORNUPTO
    es: TYPHLOSION
  forms:
    typhlosion:
      form_id: 0
      base_stats:
        hp: 78
        attack: 84
        defense: 78
        special_attack: 109
        special_defense: 85
        speed: 100
      types:
        - fire
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "バクフーンの　まわりで　かげろうが\nゆらめき　はじめるのは　たたかう\nじゅんびが　できた　サインなのだ。"
        en:
          crystal: "When heat from its\nbody causes the\nair around it to\fshimmer, this is a\nsign that it is\nready to battle."
        fr:
          crystal: "Quand la chaleur\nde son corps fait\nmiroiter l’air,\fc’est qu’il est\nprêt à combattre."
        it:
          crystal: "Quando il calore\ndel suo corpo è\ncosì forte da far\fscintillare l’aria\nintorno, è pronto\nper lottare."
        de:
          crystal: "Wenn es kampfbe-\nreit ist, strahlt\nsein Körper eine\fderartige Hitze\naus, dass die Luft\num ihn flimmert."
        es:
          crystal: "Cuando el calor\nque libera supera\nlos límites, crea\funa nube a su\nalrededor: està\nlisto para luchar."
totodile:
  species_id: 158
  names:
    jp_kana: ワニノコ
    en: TOTODILE
    fr: KAIMINUS
    it: TOTODILE
    de: KARNIMANI
    es: TOTODILE
  forms:
    totodile:
      form_id: 0
      base_stats:
        hp: 50
        attack: 65
        defense: 64
        special_attack: 44
        special_defense: 48
        speed: 43
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          crystal: "めのまえで　うごくもの　すべてに\nかみつく　あばれんぼう。うかつに\nうしろを　みせては　いけない。"
        en:
          crystal: "This rough critter\nchomps at any\nmoving object it\fsees. Turning your\nback on it is not\nrecommended."
        fr:
          crystal: "Cet petit teigneux\nmâchouille tout ce\nqui lui passe sous\fle nez. Ne lui\ntournez jamais le\ndos!"
        it:
          crystal: "Particolarmente\nviolento, mastica\ntutto ciò che\ftrova: è meglio\nnon perderlo\nd’occhio."
        de:
          crystal: "Dieser kleine\nSchnapper beißt\nalles, was sich\fbewegt. Drehe ihm\nniemals den Rücken\nzu."
        es:
          crystal: "Esta increíble\ncriatura le clava\nlas fauces a todo\flo que se mueve.\nHay que evitar\ndarle la espalda."
croconaw:
  species_id: 159
  names:
    jp_kana: アリゲイツ
    en: CROCONAW
    fr: CROCRODIL
    it: CROCONAW
    de: TYRACROC
    es: CROCONAW
  forms:
    croconaw:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 80
        special_attack: 59
        special_defense: 63
        speed: 58
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          crystal: "いちど　くわえた　えものは\nぜったい　はなさないように\nキバの　さきが　そりかえっている。"
        en:
          crystal: "The tips of its\nfangs are slanted\nbackward. Once\fthose fangs clamp\ndown, the prey has\nno hope of escape."
        fr:
          crystal: "Ses crocs sont\ninclinés vers\nl’arrière, si bien\fqu’il emprisonne\ncelui qu’il mord."
        it:
          crystal: "La punta dei denti\nè inclinata verso\nl’interno. Quando\fsi chiudono, la\nvittima non ha\nscampo."
        de:
          crystal: "Seine Zähne sind\nnach hinten ge-\nrichtet. Hat es\ferst zugebissen,\ngibt es kein\nEntrinnen."
        es:
          crystal: "Si agarra con las\nfauces a su presa,\nno hay marcha\fatràs, pues tiene\nlos colmillos\nhacia dentro."
feraligatr:
  species_id: 160
  names:
    jp_kana: オーダイル
    en: FERALIGATR
    fr: ALIGATUEUR
    it: FERALIGATR
    de: IMPERGATOR
    es: FERALIGATR
  forms:
    feraligatr:
      form_id: 0
      base_stats:
        hp: 85
        attack: 105
        defense: 100
        special_attack: 79
        special_defense: 83
        speed: 78
      types:
        - water
      egg_groups:
        - monster
        - water_1
      descriptions:
        jp_kana:
          crystal: "おおきな　からだを　もっているが\nちからづよい　うしろあしを　つかって\nちじょうでも　すばやく　うごく。"
        en:
          crystal: "Although it has a\nmassive body, its\npowerful hind legs\fenable it to move\nquickly, even on\nthe ground."
        fr:
          crystal: "Bien qu’étant très\nmassif, ses puis-\nsantes pattes ar-\frière lui permet-\ntent de se dépla-\ncer rapidement."
        it:
          crystal: "Nonostante il\ncorpo pesante, con\nle potenti zampe\fposteriori si\nmuove bene anche\nsulla terraferma."
        de:
          crystal: "Obwohl es statt-\nlich ist, kann\nes mit seinen\fkräftigen Beinen\nauch an Land sehr\nschnell laufen."
        es:
          crystal: "A pesar de ser tan\ncorpulento, gra-\ncias a las patas\ftraseras, se mueve\ncon rapidez hasta\npor suelo firme."
sentret:
  species_id: 161
  names:
    jp_kana: オタチ
    en: SENTRET
    fr: FOUINETTE
    it: SENTRET
    de: WIESOR
    es: SENTRET
  forms:
    sentret:
      form_id: 0
      base_stats:
        hp: 35
        attack: 46
        defense: 34
        special_attack: 35
        special_defense: 45
        speed: 20
      types:
        - normal
      egg_groups:
        - field
      held_items:
        rare: berry
      descriptions:
        jp_kana:
          crystal: "みはりやくは　するどく　ないたり\nしっぽで　じめんを　たたいたりして\nなかまに　きけんを　しらせる。"
        en:
          crystal: "When acting as a\nlookout, it warns\nothers of danger\fby screeching and\nhitting the ground\nwith its tail."
        fr:
          crystal: "S’il fait le guet,\nil prévient les\nautres d’un danger\fen criant et en\nfrappant le sol\nde sa queue."
        it:
          crystal: "La vedetta\navverte i suoi\ncompagni del\fpericolo gridando\ne battendo la coda\nsul terreno."
        de:
          crystal: "Wenn es Wache hat,\nwarnt es seine\nArtgenossen, indem\fes schreit und mit\ndem Schwanz auf\nden Boden schlägt."
        es:
          crystal: "Cuando hace de\ncentinela, avisa\ndel peligro a los\fdemàs, chillando y\ndando golpes al\nsuelo con la cola."
furret:
  species_id: 162
  names:
    jp_kana: オオタチ
    en: FURRET
    fr: FOUINAR
    it: FURRET
    de: WIESENIOR
    es: FURRET
  forms:
    furret:
      form_id: 0
      base_stats:
        hp: 85
        attack: 76
        defense: 64
        special_attack: 45
        special_defense: 55
        speed: 90
      types:
        - normal
      egg_groups:
        - field
      held_items:
        common: berry
        rare: gold_berry
      descriptions:
        jp_kana:
          crystal: "からだに　あわせて　つくられた\nほそながい　すあなは　おくにいくほど\nふくざつな　めいろに　なっている。"
        en:
          crystal: "It lives in narrow\nburrows that fit\nits slim body. The\fdeeper the nests\ngo, the more maze-\nlike they become."
        fr:
          crystal: "Il fabrique un nid\nsouterrain très\nétroit et consti-\ftué de galeries\nlabyrinthiques."
        it:
          crystal: "Vive in strette\nbuche, adatte al\nsuo corpo. Più\fsono profonde, più\nsomigliano a\nlabirinti."
        de:
          crystal: "Sein Bau ist sei-\nnem schlanken Kör-\nper angepasst. Je\ftiefer sein Bau\nist, desto ver-\nzweigter ist er."
        es:
          crystal: "Las madrigueras\nson su hogar; se\nadaptan muy bien a\fsu tamaño. Los ni-\ndos estàn al fondo\ndel laberinto."
hoothoot:
  species_id: 163
  names:
    jp_kana: ホーホー
    en: HOOTHOOT
    fr: HOOTHOOT
    it: HOOTHOOT
    de: HOOTHOOT
    es: HOOTHOOT
  forms:
    hoothoot:
      form_id: 0
      base_stats:
        hp: 60
        attack: 30
        defense: 30
        special_attack: 36
        special_defense: 56
        speed: 50
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "いつも　きまった　じかんになると\nなきだすので　とけいがわりに\nつれてあるく　トレーナーもいる。"
        en:
          crystal: "It begins to hoot\nat the same time\nevery day. Some\ftrainers use them\nin place of\nclocks."
        fr:
          crystal: "Il hulule à la\nmême heure chaque\njour.\fCertains dresseurs\ns’en servent comme\nréveil."
        it:
          crystal: "Emettono il loro\nverso ogni giorno\nalla stessa ora.\fAlcuni allenatori\nli usano come veri\ne propri orologi."
        de:
          crystal: "Es ruft immer zur\ngleichen Tages-\nzeit. Einige\fTrainer verzichten\ndaher auf ihre\nArmbanduhren."
        es:
          crystal: "Todos los días\nempieza a ulular a\nla misma hora.\fHay entrenadores\nque los usan a\nmodo de reloj."
noctowl:
  species_id: 164
  names:
    jp_kana: ヨルノズク
    en: NOCTOWL
    fr: NOARFANG
    it: NOCTOWL
    de: NOCTUH
    es: NOCTOWL
  forms:
    noctowl:
      form_id: 0
      base_stats:
        hp: 100
        attack: 50
        defense: 50
        special_attack: 76
        special_defense: 96
        speed: 70
      types:
        - normal
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "ひじょうに　やわらかい　はねは\nとぶとき　おとを　ださないので\nこっそり　えものに　ちかづける。"
        en:
          crystal: "Its extremely soft\nfeathers make no\nsound in flight.\fIt silently sneaks\nup on prey without\nbeing detected."
        fr:
          crystal: "Ses fines plumes\nlui assurent un\nvol silencieux.\fIl peut ainsi sur-\nprendre facilement\nses proies."
        it:
          crystal: "Mentre vola, le\nmorbide penne sono\nsilenziosissime.\fCosì, giunge sulla\npreda senza farsi\nnotare."
        de:
          crystal: "Aufgrund seiner\nweichen Federn\nfliegt es so lei-\fse, dass es sich\nunbemerkt seiner\nBeute nähern kann."
        es:
          crystal: "Tiene un plumaje\ntan suave que,\ncuando vuela, no\fse le oye. Siempre\ncoge a su víctima\npor sorpresa."
ledyba:
  species_id: 165
  names:
    jp_kana: レディバ
    en: LEDYBA
    fr: COXY
    it: LEDYBA
    de: LEDYBA
    es: LEDYBA
  forms:
    ledyba:
      form_id: 0
      base_stats:
        hp: 40
        attack: 20
        defense: 30
        special_attack: 40
        special_defense: 80
        speed: 55
      types:
        - bug
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "おくびょうで　すぐに　むれをつくる。\nあしから　でる　えきたいの　においで\nじぶんの　いばしょを　しらせる。"
        en:
          crystal: "It is timid and\nclusters together\nwith others. The\ffluid secreted by\nits feet indicates\nits location."
        fr:
          crystal: "Il est timide et\nreste près de ses\nsemblables.\fIl a un sens du\ntoucher très\ndéveloppé."
        it:
          crystal: "Timidi, stanno\nsempre uniti.\nLa traccia del\fliquido che esce\ndalle zampe mostra\ndove si trovano."
        de:
          crystal: "Es ist scheu und\nstets mit Artge-\nnossen zusammen.\fDas Sekret an sei-\nnen Füßen führt zu\nseinem Standort."
        es:
          crystal: "Es muy tímido y\nse refugia con los\nde su especie.\fAl caminar, deja\nuna estela que\nindica dónde està."
ledian:
  species_id: 166
  names:
    jp_kana: レディアン
    en: LEDIAN
    fr: COXYCLAQUE
    it: LEDIAN
    de: LEDIAN
    es: LEDIAN
  forms:
    ledian:
      form_id: 0
      base_stats:
        hp: 55
        attack: 35
        defense: 50
        special_attack: 55
        special_defense: 110
        speed: 85
      types:
        - bug
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "きおんが　あがる　ひるまは\nおおきな　はっぱに　みをくるみ\nぐっすりと　ねむっている。"
        en:
          crystal: "In the daytime\nwhen it gets warm,\nit curls up inside\fa big leaf and\ndrifts off into\na deep slumber."
        fr:
          crystal: "Pendant la jour-\nnée, quand il fait\nchaud, il se roule\fdans une feuille\net fait un somme."
        it:
          crystal: "Di giorno quando\nfa caldo, si\nappallottola in\funa grande foglia\ne cade in un sonno\nprofondo."
        de:
          crystal: "Wenn es tagsüber\nwarm wird, rollt\nes sich in einem\fgroßen Blatt ein\nund fällt in einen\ntiefen Schlaf."
        es:
          crystal: "Por la mañana,\ncuando hace calor,\nse enrosca en una\fhoja bien grande y\nva cayendo en un\ndulce sueño."
spinarak:
  species_id: 167
  names:
    jp_kana: イトマル
    en: SPINARAK
    fr: MIMIGAL
    it: SPINARAK
    de: WEBARAK
    es: SPINARAK
  forms:
    spinarak:
      form_id: 0
      base_stats:
        hp: 40
        attack: 60
        defense: 40
        special_attack: 40
        special_defense: 40
        speed: 30
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "いとを　はりめぐらして　つくった\nすに　えものが　ひっかかっても\nくらくなるまで　じっと　まっている。"
        en:
          crystal: "If prey becomes\nensnared in its\nnest of spun\fstring, it waits\nmotionlessly until\nit becomes dark."
        fr:
          crystal: "Si une proie se\nfait piéger dans\nsa toile, il reste\fimmobile et attend\ncalmement la tom-\nbée de la nuit."
        it:
          crystal: "Se una preda\nrimane irretita\nnella sua tela,\fnon le si avvicina\nfinché non cala\nla notte."
        de:
          crystal: "Falls sich Beute\nin seinem Netz\nverfängt, verharrt\fes bewegungslos\nbis zum Einbruch\nder Nacht."
        es:
          crystal: "Atrapa a su presa\nen su telaraña.\nDeja que caiga en\fella y espera\ninmóvil a que\nse haga de noche."
ariados:
  species_id: 168
  names:
    jp_kana: アリアドス
    en: ARIADOS
    fr: MIGALOS
    it: ARIADOS
    de: ARIADOS
    es: ARIADOS
  forms:
    ariados:
      form_id: 0
      base_stats:
        hp: 70
        attack: 90
        defense: 70
        special_attack: 60
        special_defense: 60
        speed: 40
      types:
        - bug
        - poison
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "きまった　ばしょに　すをつくらず\nあたりが　くらくなってから\nエサを　さがしもとめ　うろつく。"
        en:
          crystal: "Rather than mak-\ning a nest in one\nspecific spot, it\fwanders in search\nof food after\ndarkness falls."
        fr:
          crystal: "Plutôt que de tis-\nser une toile à un\nendroit précis, il\ftraverse les\nforêts et chasse\ntel un prédateur."
        it:
          crystal: "Piuttosto che fare\nuna tana in un\nluogo preciso,\fpreferisce girare\ndi notte alla\nricerca di cibo."
        de:
          crystal: "Es spinnt kein\nNetz, um Beute zu\nfangen, sondern\fgeht mit Einbruch\nder Nacht auf\nBeutejagd."
        es:
          crystal: "Por las noches, en\nlugar de hacer el\nnido en un sitio\fdeterminado, va de\nun lado para otro\nbuscando comida."
crobat:
  species_id: 169
  names:
    jp_kana: クロバット
    en: CROBAT
    fr: NOSTENFER
    it: CROBAT
    de: IKSBAT
    es: CROBAT
  forms:
    crobat:
      form_id: 0
      base_stats:
        hp: 85
        attack: 90
        defense: 80
        special_attack: 70
        special_defense: 80
        speed: 130
      types:
        - poison
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "よりはやく　しずかに　とぶことを\nおいもとめていった　けっか\nうしろあしにも　はねが　はえた。"
        en:
          crystal: "As a result of its\npursuit of faster,\nyet more silent\fflight, a new set\nof wings grew on\nits hind legs."
        fr:
          crystal: "En volant plus\nvite et discrète-\nment, une nouvel-\fle paire d’ailes\npousse sur ses\npattes arrière."
        it:
          crystal: "Gli è cresciuto un\naltro paio di ali,\ncon cui può\fvolare in modo\nancora più rapido\ne silenzioso."
        de:
          crystal: "Aufgrund seines\nStrebens noch\nschneller und lei-\fser zu fliegen,\nwuchsen ihm zwei\nneue Flügel."
        es:
          crystal: "Como està siempre\nintentando volar\nmàs ràpido y\fsilenciosamente,\nha desarrollado\notro par de alas."
chinchou:
  species_id: 170
  names:
    jp_kana: チョンチー
    en: CHINCHOU
    fr: LOUPIO
    it: CHINCHOU
    de: LAMPI
    es: CHINCHOU
  forms:
    chinchou:
      form_id: 0
      base_stats:
        hp: 75
        attack: 38
        defense: 38
        special_attack: 56
        special_defense: 56
        speed: 67
      types:
        - water
        - electric
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          crystal: "ひれが　へんかして　できた\nしょくしゅは　それぞれ　プラスと\nマイナスの　でんきが　ながれている。"
        en:
          crystal: "Its antennae, whi-\nch evolved from a\nfin, have both po-\fsitive and neg-\native charges flo-\nwing through them."
        fr:
          crystal: "Ses antennes pro-\nviennent d’ancien-\nnes nageoires et\fsont chargées d’é-\nnergie positive et\nnégative."
        it:
          crystal: "Tra le antenne,\nevoluzione di\nprimitive pinne,\fcorre energia\nnegativa e\npositiva."
        de:
          crystal: "Seine Antennen,\ndie aus Flossen\nentstanden sind,\fsind sowohl posi-\ntiv als auch\nnegativ geladen."
        es:
          crystal: "Lo que ahora es\nuna antena, antes\nera una aleta.\fEn ambos extremos\ntiene carga posi-\ntiva y negativa."
lanturn:
  species_id: 171
  names:
    jp_kana: ランターン
    en: LANTURN
    fr: LANTURN
    it: LANTURN
    de: LANTURN
    es: LANTURN
  forms:
    lanturn:
      form_id: 0
      base_stats:
        hp: 125
        attack: 58
        defense: 58
        special_attack: 76
        special_defense: 76
        speed: 67
      types:
        - water
        - electric
      egg_groups:
        - water_2
      descriptions:
        jp_kana:
          crystal: "エサを　おびきよせるために\nまぶしく　かがやく　ぶぶんは\nせびれの　いちぶが　へんかしたもの。"
        en:
          crystal: "This POKéMON uses\nthe bright part of\nits body, which\fchanged from a\ndorsal fin, to\nlure prey."
        fr:
          crystal: "Il utilise la par-\ntie lumineuse de\nson corps, prove-\fnant d’une nageoi-\nre dorsale, pour\nattirer sa proie."
        it:
          crystal: "Usa la parte\nluminosa del suo\ncorpo, che un\ftempo era la pinna\ndorsale, per\nattirare la preda."
        de:
          crystal: "Dieses POKéMON\nnutzt das helle\nLicht, das aus\feiner Rückenflosse\nentstanden ist, um\nBeute anzulocken."
        es:
          crystal: "Utiliza la parte\nbrillante del\ncuerpo, que en su\fdía fue una aleta,\npara atraer a sus\nvíctimas."
pichu:
  species_id: 172
  names:
    jp_kana: ピチュー
    en: PICHU
    fr: PICHU
    it: PICHU
    de: PICHU
    es: PICHU
  forms:
    pichu:
      form_id: 0
      base_stats:
        hp: 20
        attack: 40
        defense: 15
        special_attack: 35
        special_defense: 35
        speed: 60
      types:
        - electric
      egg_groups:
        - undiscovered
      held_items:
        rare: berry
      descriptions:
        jp_kana:
          crystal: "でんきを　ためこむのが　へた。\nなんらかの　ショックを　うけると\nすぐに　ほうでん　してしまう。"
        en:
          crystal: "It is unskilled at\nstoring electric\npower. Any kind of\fshock causes it to\ndischarge energy\nspontaneously."
        fr:
          crystal: "Il ne sait pas\nencore stocker\nl’électricité. Il\fenvoie des dé-\ncharges souvent\nsans le vouloir."
        it:
          crystal: "Non è ancora bravo\nad immagazzinare\nelettricità.\fQualsiasi emozione\ngliela fa perdere\nspontaneamente."
        de:
          crystal: "Es ist noch nicht\nerfahren im Umgang\nmit Elektrizität.\fBei jedem Stoß\nentlädt es spontan\nEnergie."
        es:
          crystal: "No se le da muy\nbien el almacena-\nmiento de electri-\fcidad. A la mínima\ndescargarà energía\nsin darse cuenta."
cleffa:
  species_id: 173
  names:
    jp_kana: ピィ
    en: CLEFFA
    fr: MELO
    it: CLEFFA
    de: PII
    es: CLEFFA
  forms:
    cleffa:
      form_id: 0
      base_stats:
        hp: 50
        attack: 25
        defense: 28
        special_attack: 45
        special_defense: 55
        speed: 15
      types:
        - normal
      egg_groups:
        - undiscovered
      held_items:
        common: mysteryberry
        rare: moon_stone
      descriptions:
        jp_kana:
          crystal: "ながれぼしの　おちたところを\nみつけることが　できたなら\nきっと　ピィも　みつけられるはず。"
        en:
          crystal: "If the impact site\nof a meteorite is\nfound, this\fPOKéMON is certain\nto be within the\nimmediate area."
        fr:
          crystal: "Si l’on découvre\nun cratère de\nmétéorite, ce\fPOKéMON se trouve\ndans les environs."
        it:
          crystal: "Se si individua\nil punto d’impatto\ndi un meteorite,\fnelle vicinanze si\ntroverà certamente\nquesto POKéMON."
        de:
          crystal: "Wenn man den Ein-\nschlagkrater eines\nMeteors findet,\fist dieses POKéMON\nbestimmt in der\nNähe."
        es:
          crystal: "Allà donde haya\nimpactado un\nmeteorito, serà\fmàs que probable\nencontrar a este\nPOKéMON."
igglybuff:
  species_id: 174
  names:
    jp_kana: ププリン
    en: IGGLYBUFF
    fr: TOUDOUDOU
    it: IGGLYBUFF
    de: FLUFFELUFF
    es: IGGLYBUFF
  forms:
    igglybuff:
      form_id: 0
      base_stats:
        hp: 90
        attack: 30
        defense: 15
        special_attack: 40
        special_defense: 20
        speed: 15
      types:
        - normal
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          crystal: "みじかい　あしで　あるくより\nやわらかい　からだを　つかって\nとびはねながら　うごきまわる。"
        en:
          crystal: "Instead of walking\nwith its short\nlegs, it moves\faround by bouncing\non its soft,\ntender body."
        fr:
          crystal: "Plutôt que de se\ndéplacer avec ses\npetites pattes, il\frebondit avec son\ncorps doux et\nmoelleux."
        it:
          crystal: "Anziché camminare\nsulle sue corte\nzampe, preferisce\frimbalzare sul\nsuo corpo soffice\ne delicato."
        de:
          crystal: "Anstatt mit seinen\nkurzen Beinen zu\nlaufen, hüpft es\fmit seinem weichen\nund kuscheligen\nKörper."
        es:
          crystal: "Para caminar, en\nlugar de usar los\npies que tiene,\fopta por dar botes\ncon su cuerpo re-\ndondo y blandito."
togepi:
  species_id: 175
  names:
    jp_kana: トゲピー
    en: TOGEPI
    fr: TOGEPI
    it: TOGEPI
    de: TOGEPI
    es: TOGEPI
  forms:
    togepi:
      form_id: 0
      base_stats:
        hp: 35
        attack: 20
        defense: 65
        special_attack: 40
        special_defense: 65
        speed: 20
      types:
        - normal
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          crystal: "こううんの　シンボル。\nカラの　なかには　しあわせが\nたくさん　つまっている　という。"
        en:
          crystal: "It is considered\nto be a symbol of\ngood luck. Its\fshell is said to\nbe filled with\nhappiness."
        fr:
          crystal: "Il est connu pour\nêtre un symbole de\nchance. On dit que\fsa coquille est\nremplie de joie."
        it:
          crystal: "Lo si ritiene un\nportafortuna. Si\ndice che il suo\fguscio sia\nricolmo di\nfelicità."
        de:
          crystal: "Es gilt als\nGlücksbringer.\nMan sagt, seine\fSchale ist voll\nvon purer Freude."
        es:
          crystal: "Todo el mundo\ncoincide en que es\nel símbolo de la\fbuena suerte. Se\ndice que va reves-\ntido de felicidad."
togetic:
  species_id: 176
  names:
    jp_kana: トゲチック
    en: TOGETIC
    fr: TOGETIC
    it: TOGETIC
    de: TOGETIC
    es: TOGETIC
  forms:
    togetic:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 85
        special_attack: 80
        special_defense: 105
        speed: 40
      types:
        - normal
        - flying
      egg_groups:
        - flying
        - fairy
      descriptions:
        jp_kana:
          crystal: "ほとんど　はばたきも　しないのに\nすこしばかり　うきながら\nトレーナーの　あとを　ついてくる。"
        en:
          crystal: "Although it does\nnot flap its wings\nvery much, it can\fstay up in the air\nas it tags along\nafter its trainer."
        fr:
          crystal: "Bien qu’il ne bat-\nte pas beaucoup\ndes ailes, il peut\frester en l’air\npour être prêt de\nson dresseur."
        it:
          crystal: "Pur non battendo\nmolto le ali,\npuò restare\fsospeso a\nmezz’aria seguendo\nil suo allenatore."
        de:
          crystal: "Obwohl es nicht\nviel mit den Flü-\ngeln schlägt, hält\fes sich in der\nLuft, wenn es sei-\nnem Trainer folgt."
        es:
          crystal: "Aunque no bate mu-\ncho las alas, pue-\nde aguantar en el\faire el tiempo que\nquiera al lado de\nsu entrenador."
natu:
  species_id: 177
  names:
    jp_kana: ネイティ
    en: NATU
    fr: NATU
    it: NATU
    de: NATU
    es: NATU
  forms:
    natu:
      form_id: 0
      base_stats:
        hp: 40
        attack: 50
        defense: 45
        special_attack: 70
        special_defense: 45
        speed: 70
      types:
        - psychic
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "きように　きのみきを　かけのぼる。\nえださきに　できた　あたらしい\nきのめを　このんで　ついばむ。"
        en:
          crystal: "It is extremely\ngood at climbing\ntree trunks and\flikes to eat the\nnew sprouts on\nthe trees."
        fr:
          crystal: "Il est très doué\npour grimper sur\nle tronc des\farbres et ainsi\nmanger les bour-\ngeons."
        it:
          crystal: "È molto bravo ad\narrampicarsi sui\ntronchi degli\falberi per\nmangiare i\ngermogli."
        de:
          crystal: "Es kann hervor-\nragend klettern.\nEs klettert gerne\fauf Bäume und\nfrisst die jungen\nTriebe."
        es:
          crystal: "Sabe trepar muy\nbien por el tronco\nde los àrboles.\fAdemàs, aprovecha\npara zamparse los\nnuevos brotes."
xatu:
  species_id: 178
  names:
    jp_kana: ネイティオ
    en: XATU
    fr: XATU
    it: XATU
    de: XATU
    es: XATU
  forms:
    xatu:
      form_id: 0
      base_stats:
        hp: 65
        attack: 75
        defense: 70
        special_attack: 95
        special_defense: 70
        speed: 95
      types:
        - psychic
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "あさがた　のぼる　たいようを\nじっと　みつめ　いのりを　ささげると\nほとんど　うごかず　１にちをおえる。"
        en:
          crystal: "Once it begins to\nmeditate at sun-\nrise, the entire\fday will pass\nbefore it will\nmove again."
        fr:
          crystal: "Il peut rester\nà méditer sans\nbouger, du lever\fdu soleil jusqu’à\nla tombée de la\nnuit."
        it:
          crystal: "Quando, all’alba,\ninizia a meditare,\nriesce a rimanere\fimmobile fino\nalla fine del\ngiorno."
        de:
          crystal: "Wenn es bei Son-\nnenaufgang anfängt\nzu meditieren,\fvergeht der ganze\nTag, ehe es sich\nwieder bewegt."
        es:
          crystal: "Cuando se pone a\nmeditar al ama-\nnecer, pierde la\fnoción del tiempo.\nPuede pasarse así\ntodo el día."
mareep:
  species_id: 179
  names:
    jp_kana: メリープ
    en: MAREEP
    fr: WATTOUAT
    it: MAREEP
    de: VOLTILAMM
    es: MAREEP
  forms:
    mareep:
      form_id: 0
      base_stats:
        hp: 55
        attack: 40
        defense: 40
        special_attack: 65
        special_defense: 45
        speed: 35
      types:
        - electric
      egg_groups:
        - monster
        - field
      descriptions:
        jp_kana:
          crystal: "ふかふかの　たいもうは　くうきを\nたくさん　ふくんで　なつは　すずしく\nふゆは　あたたかいのが　とくちょう。"
        en:
          crystal: "It stores lots of\nair in its soft\nfur, allowing it\fto stay cool in\nsummer and warm\nin winter."
        fr:
          crystal: "Il garde une gran-\nde quantité d’air\ndans sa toison\fpour ne pas subir\nles variations de\ntempérature."
        it:
          crystal: "L’aria che\nraccoglie nella\npelliccia gli\fpermette di stare\nfresco d’estate e\ncaldo d’inverno."
        de:
          crystal: "Es speichert viel\nLuft in seinem\nweichen Pelz. Da-\fdurch ist es im\nSommer kalt und\nim Winter warm."
        es:
          crystal: "Almacena aire en\nel lanudo pelaje\nque tiene. Así, se\fmantiene fresco en\nverano y caliente\nen invierno."
flaaffy:
  species_id: 180
  names:
    jp_kana: モココ
    en: FLAAFFY
    fr: LAINERGIE
    it: FLAAFFY
    de: WAATY
    es: FLAAFFY
