        attack: 30
        defense: 30
        special_attack: 30
        special_defense: 30
        speed: 30
      types:
        - grass
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "とても　ひよわ。おそわれても\nはっぱを　ひっしに　ふりまわして\nおいはらうのが　やっとだ。"
        en:
          crystal: "It is very weak.\nIts only means of\ndefense is to\fshake its leaves\ndesperately at its\nattacker."
        fr:
          crystal: "Il est très faible\net a comme seule\ntechnique de dé-\ffense un gigote-\nment de feuilles\nnerveux."
        it:
          crystal: "Debolissimo, la\nsua unica difesa\nè scrollare\fdisperatamente le\nfoglie su chi lo\nattacca."
        de:
          crystal: "Es ist sehr\nschwach. Es kann\nsich nur vertei-\fdigen, indem es\nseine Blätter\nheftig schüttelt."
        es:
          crystal: "Es débil. La ùnica\nforma que tiene de\ndefenderse es agi-\ftar las hojas con\ndesesperación\nfrente a su rival."
sunflora:
  species_id: 192
  names:
    jp_kana: キマワリ
    en: SUNFLORA
    fr: HELIATRONC
    it: SUNFLORA
    de: SONNFLORA
    es: SUNFLORA
  forms:
    sunflora:
      form_id: 0
      base_stats:
        hp: 75
        attack: 75
        defense: 55
        special_attack: 105
        special_defense: 85
        speed: 30
      types:
        - grass
      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "あつい　きせつが　ちかづくと\nかおの　はなびらは　あざやかになり\nかっぱつに　うごくようになる。"
        en:
          crystal: "As the hot season\napproaches, the\npetals on this\fPOKéMON’s face\nbecome more vivid\nand lively."
        fr:
          crystal: "A l’approche des\nbeaux jours, les\npétales entourant\fsa tête deviennent\nplus chatoyants."
        it:
          crystal: "Con l’avvicinarsi\ndella bella\nstagione, i suoi\fpetali si fanno\npiù vivi e\nsplendenti."
        de:
          crystal: "Steht der Sommer\nbevor, werden die\nBlätter um das\fGesicht dieses\nPOKéMON aktiv\nund lebhaft."
        es:
          crystal: "A medida que se\nacerca el verano,\nva adquiriendo un\fcolor màs vivo e\nintenso en los pé-\ntalos de la cara."
yanma:
  species_id: 193
  names:
    jp_kana: ヤンヤンマ
    en: YANMA
    fr: YANMA
    it: YANMA
    de: YANMA
    es: YANMA
  forms:
    yanma:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 45
        special_attack: 75
        special_defense: 45
        speed: 95
      types:
        - bug
        - flying
      egg_groups:
        - bug
      descriptions:
        jp_kana:
          crystal: "おおきな　めだまは　うごかさなくても\nあらゆる　ほうこうを　みわたせるので\nてきや　エサも　すぐ　みつけられる。"
        en:
          crystal: "It can see in all\ndirections without\nmoving its big\feyes, helping it\nspot attackers and\nfood right away."
        fr:
          crystal: "Il peut voir dans\ntoutes les\ndirections sans\favoir à bouger la\ntête."
        it:
          crystal: "Guardando in ogni\ndirezione senza\nmuovere i grandi\focchi, scorge i\nnemici e il cibo\npiù facilmente."
        de:
          crystal: "Es kann in alle\nRichtungen sehen,\nohne seine großen\fAugen zu bewegen.\nSo nimmt es Feinde\nund Beute wahr."
        es:
          crystal: "Puede ver en todas\ndirecciones sin\nmover los ojos.\fAsí localiza a sus\nrivales y la comi-\nda que necesite."
wooper:
  species_id: 194
  names:
    jp_kana: ウパー
    en: WOOPER
    fr: AXOLOTO
    it: WOOPER
    de: FELINO
    es: WOOPER
  forms:
    wooper:
      form_id: 0
      base_stats:
        hp: 55
        attack: 45
        defense: 45
        special_attack: 25
        special_defense: 25
        speed: 15
      types:
        - water
        - ground
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "ぜんしん　とうめいな　ねんまくで\nおおわれており　すでで　さわると\nピリピり　しびれてくる。"
        en:
          crystal: "A mucous\nmembrane covers\nits body. Touching\fit barehanded will\ncause a shooting\npain."
        fr:
          crystal: "Il est recouvert\nd’une membrane\nqui, à son seul\fcontact, provoque\nune terrible dou-\nleur."
        it:
          crystal: "Il suo corpo è\nricoperto da una\nmucosa.\fSe la si tocca con\nle mani nude causa\nun acuto dolore."
        de:
          crystal: "Sein Körper ist\nmit Schleim über-\nzogen. Berührt man\fes, widerfährt\neinem ein stechen-\nder Schmerz."
        es:
          crystal: "Està cubierto por\nuna membrana muco-\nsa. Si le tocas\fdirectamente con\nlas manos, senti-\nràs un gran dolor."
quagsire:
  species_id: 195
  names:
    jp_kana: ヌオー
    en: QUAGSIRE
    fr: MARAISTE
    it: QUAGSIRE
    de: MORLORD
    es: QUAGSIRE
  forms:
    quagsire:
      form_id: 0
      base_stats:
        hp: 95
        attack: 85
        defense: 85
        special_attack: 65
        special_defense: 65
        speed: 35
      types:
        - water
        - ground
      egg_groups:
        - water_1
        - field
      descriptions:
        jp_kana:
          crystal: "からだは　いつも　ぬめっている。\nおよぐたびに　かわぞこに　あたまを\nぶつけているが　きに　していない。"
        en:
          crystal: "Its body is always\nslimy. It often\nbangs its head on\fthe river bottom\nas it swims but\nseems not to care."
        fr:
          crystal: "Il est toujours\ngluant. Il se co-\ngne souvent la tê-\fte au fond des ri-\nvières mais semble\ns’en moquer."
        it:
          crystal: "Ha un corpo molto\nvischioso. Spesso,\nnuotando, urta con\fla testa sul fondo\ndei fiumi, ma non\nse ne preoccupa."
        de:
          crystal: "Sein Körper ist\nstets schleimig.\nEs stößt sich den\fKopf am Fluss-\ngrund, aber das\nist ihm egal."
        es:
          crystal: "Es resbaladizo.\nSuele chocarse\ncontra el suelo al\ftirarse al río de\ncabeza, pero no le\nimporta demasiado."
espeon:
  species_id: 196
  names:
    jp_kana: エーフィ
    en: ESPEON
    fr: MENTALI
    it: ESPEON
    de: PSIANA
    es: ESPEON
  forms:
    espeon:
      form_id: 0
      base_stats:
        hp: 65
        attack: 65
        defense: 60
        special_attack: 130
        special_defense: 95
        speed: 110
      types:
        - psychic
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "あいての　うごきを　よち　するとき\nふたまたに　なっている　しっぽの\nさきは　びみょうに　ゆれている。"
        en:
          crystal: "The tip of its\nforked tail\nquivers when it is\fpredicting its\nopponent’s next\nmove."
        fr:
          crystal: "Le bout fourchu de\nsa queue frémit\nlorsqu’il prédit\fla prochaine atta-\nque de son adver-\nsaire."
        it:
          crystal: "Mentre predice la\nprossima mossa del\nnemico, la coda\fbiforcuta gli\ninizia a\ntremare."
        de:
          crystal: "Die Spitze seines\ngeteilten Schweifs\nbebt, wenn es die\fnächste Attacke\nseines Feindes\nvoraussagt."
        es:
          crystal: "Al predecir el si-\nguiente movimiento\nde su rival,\fchasquea el\nextremo de la cola\nbífida que tiene."
umbreon:
  species_id: 197
  names:
    jp_kana: ブラッキー
    en: UMBREON
    fr: NOCTALI
    it: UMBREON
    de: NACHTARA
    es: UMBREON
  forms:
    umbreon:
      form_id: 0
      base_stats:
        hp: 95
        attack: 65
        defense: 110
        special_attack: 60
        special_defense: 130
        speed: 65
      types:
        - dark
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "まんげつの　よるや\nこうふん　したとき　ぜんしんの\nわっかもようは　きいろく　ひかる。"
        en:
          crystal: "On the night of a\nfull moon, or when\nit gets excited,\fthe ring patterns\non its body glow\nyellow."
        fr:
          crystal: "Les nuits de plei-\nne lune, ou s’il\nest en colère, les\fanneaux sur sa\npeau se mettent\nà briller."
        it:
          crystal: "Nelle notti di\nluna piena e\nquando è agitato\fi cerchi sul\ncorpo emettono un\nbagliore giallo."
        de:
          crystal: "Bei Vollmond oder\nbei Aufregung\nleuchten die ring-\fförmigen Muster\nauf seinem Körper\ngelb auf."
        es:
          crystal: "Cuando hay luna\nllena, o cuando\nse pone nervioso,\fle empiezan a bri-\nllar los anillos\nde color dorado."
murkrow:
  species_id: 198
  names:
    jp_kana: ヤミカラス
    en: MURKROW
    fr: CORNEBRE
    it: MURKROW
    de: KRAMURX
    es: MURKROW
  forms:
    murkrow:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 42
        special_attack: 85
        special_defense: 42
        speed: 91
      types:
        - dark
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "かがやく　ものを　ひろっては\nひみつの　ばしょに　かくしておく。\nよく　ニャースと　うばいあいになる。"
        en:
          crystal: "It hides any shiny\nobject it finds in\na secret location.\fMURKROW and\nMEOWTH loot one\nanother’s stashes."
        fr:
          crystal: "Il vole tous les\nobjets brillants\nqu’il voit.\fLes CORNEBRE et\nles MIAOUSS se vo-\nlent mutuellement."
        it:
          crystal: "Nasconde in un\nluogo segreto\nogni oggetto che\ftrova. MURKROW e\nMEOWTH si derubano\ntra di loro."
        de:
          crystal: "Es versteckt jeden\nschimmernden\nGegenstand.\fKRAMURX und MAUZI\nrauben sich gegen-\nseitig die Beute."
        es:
          crystal: "Esconde objetos\nbrillantes en un\nlugar secreto.\fMEOWTH y MURKROW\nsuelen saquear su\nescondite."
slowking:
  species_id: 199
  names:
    jp_kana: ヤドキング
    en: SLOWKING
    fr: ROIGADA
    it: SLOWKING
    de: LASCHOKING
    es: SLOWKING
  forms:
    slowking:
      form_id: 0
      base_stats:
        hp: 95
        attack: 75
        defense: 80
        special_attack: 100
        special_defense: 110
        speed: 30
      types:
        - water
        - psychic
      egg_groups:
        - monster
        - water_1
      held_items:
        rare: kings_rock
      descriptions:
        jp_kana:
          crystal: "あくびを　するたび　かみついた　\nシェルダーから　どくそが　ながれこみ\nちせいは　どんどん　たかまっていく。"
        en:
          crystal: "Every time it ya-\nwns, SHELLDER\ninjects more poi-\fson into it. The\npoison makes it\nmore intelligent."
        fr:
          crystal: "A chaque bâille-\nment, le KOKIYAS\nlui injecte une\fdose de poison,\nceci le rendant\nplus intelligent."
        it:
          crystal: "Ogni volta che\nsbadiglia SHELLDER\ngli inietta del\fveleno, che lo\nrende più\nintelligente."
        de:
          crystal: "Immer wenn es\ngähnt, injiziert\nMUSCHAS mehr Gift.\fDurch das Gift\nwird es immer\nintelligenter."
        es:
          crystal: "Cada vez que\nbosteza, SHELLDER \nle inyecta veneno.\fAsí, se vuelve\ncada vez màs\ninteligente."
misdreavus:
  species_id: 200
  names:
    jp_kana: ムウマ
    en: MISDREAVUS
    fr: FEUFOREVE
    it: MISDREAVUS
    de: TRAUNFUGIL
    es: MISDREAVUS
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      types:
        - ghost
      egg_groups:
        - amorphous
      held_items:
        rare: spell_tag
      descriptions:
        jp_kana:
          crystal: "ひとの　おどろく　ようすが\nだいすきで　とつぜん　あらわれたり\nなきさけぶような　こえを　だす。"
        en:
          crystal: "It loves to watch\npeople it’s scar-\ned. It frightens\fthem by screaming\nloudly or appear-\ning suddenly."
        fr:
          crystal: "Il aime faire peur\nen criant ou en\napparaissant sou-\fdainement. Il re-\ngarde ensuite ses\nvictimes et rit."
        it:
          crystal: "Si diverte a far\nspaventare la\ngente, gridando\fforte o\napparendo\nall’improvviso."
        de:
          crystal: "Es liebt die Men-\nschen zu beobach-\nten, die es durch\fSchreie oder jähes\nAuftreten er-\nschreckt hat."
        es:
          crystal: "Adora mirar a la\ngente que ha asus-\ntado. Les grita\fmuy fuerte y se\nles aparece cuando\nno se lo esperan."
unown:
  species_id: 201
  names:
    jp_kana: アンノーン
    en: UNOWN
    fr: ZARBI
    it: UNOWN
    de: ICOGNITO
    es: UNOWN
  forms:
    unown_a:
      form_id: 0
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      types:
        - psychic
      egg_groups:
        - undiscovered
      descriptions:
        jp_kana:
          crystal: "いくつか　しゅるいが　いるのは\nそれぞれ　ことなる　のうりょくを\nもっているからだ　という。"
        en:
          crystal: "Because different\ntypes of UNOWN\nexist, it is said\fthat they must\nhave a variety of\nabilities."
        fr:
          crystal: "Comme plusieurs\nsortes de ZARBI\nexistent, on sup-\fpose qu’ils possè-\ndent des pouvoirs\ndifférents."
        it:
          crystal: "Poiché esistono\nmolti tipi diversi\ndi UNOWN, si dice\fche abbiano anche\ndiversi tipi di\nabilità."
        de:
          crystal: "Da es so viele\nunterschiedliche\nICOGNITO gibt,\fglaubt man, sie\nbesäßen verschie-\ndene Fähigkeiten."
        es:
          crystal: "Se dice que, como\nhay muchos tipos\nde UNOWN, deben de\ftener numerosas\ny variadas\nhabilidades."
