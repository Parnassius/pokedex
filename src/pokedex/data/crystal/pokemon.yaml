        en:
          crystal: "Biting into one\nof the delicious\neggs that BLISSEY\fprovides will make\neveryone around\nsmile with joy."
        fr:
          crystal: "Celui qui mange\nun peu de l’oeuf\nde LEUPHORIE\fdevient aimable\net plaisant avec\ntout le monde."
        it:
          crystal: "Addentare un\ndelizioso uovo che\nBLISSEY porta con\fsé mette allegria\na chiunque nelle\nvicinanze."
        de:
