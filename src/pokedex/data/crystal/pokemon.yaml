        attack: 35
        defense: 40
        special_attack: 35
        special_defense: 55
        speed: 50
      types:
        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      descriptions:
        jp_kana:
          crystal: "そよかぜが　ふいただけで\nふわふわ　うかんでしまい\nとなりまち　まで　はこばれる。"
        en:
          crystal: "It can be carried\naway on even the\ngentlest breeze.\fIt may even float\nall the way to the\nnext town."
        fr:
          crystal: "Même la plus légè-\nre des brises peut\nle balayer et\fl’envoyer vers une\nville voisine."
        it:
          crystal: "Anche la brezza\nleggera può\ntrasportarlo\flontano, a volte\nfino ad un’altra\ncittà."
        de:
          crystal: "Eine kleine Brise\nreicht aus, um es\nwegzuwehen. Es\fkann sogar bis in\nden nächsten Ort\ngetragen werden."
        es:
          crystal: "Es tan ligero, que\nla brisa màs leve\nse lo puede llevar\fpor delante. Puede\nir flotando de una\nciudad a otra."
skiploom:
  species_id: 188
  names:
    jp_kana: ポポッコ
    en: SKIPLOOM
