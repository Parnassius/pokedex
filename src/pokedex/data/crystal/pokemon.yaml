      egg_groups:
        - grass
      descriptions:
        jp_kana:
          crystal: "キレイハナたちが　おどりだすと\nはなびらどうし　ふれあって\nきれいで　ここちよい　おとが　する。"
        en:
          crystal: "When these dance\ntogether, their\npetals rub against\feach other,\nmaking pretty,\nrelaxing sounds."
        fr:
          crystal: "Si des JOLIFLOR\ndansent ensemble,\nle frottement de\fleurs feuilles\nproduit un doux\nson apaisant."
        it:
          crystal: "Quando danzano\ninsieme, sfregano\ni petali tra loro\fproducendo suoni\npiacevoli e\nrilassanti."
        de:
          crystal: "Tanzen sie zusam-\nmen, reiben ihre\nBlätter aneinander\fund erzeugen ein\nsehr entspannendes\nGeräusch."
        es:
          crystal: "Si los BELLOSSOM\nse ponen a bailar\njuntos, el roce de\flos pétalos produ-\nce unos sonidos\nmuy relajantes."
marill:
  species_id: 183
  names:
    jp_kana: マリル
    en: MARILL
    fr: MARILL
    it: MARILL
    de: MARILL
