        defense: 80
        special_attack: 65
        special_defense: 85
        speed: 55
      types:
        - fighting
      egg_groups:
        - human_like
      descriptions:
        jp_kana:
          crystal: "４ほんの　うでは　かんがえるより\nはやく　はんしゃてきに　うごき\nなんぱつもの　パンチを　くりだせる。"
        en:
          crystal: "With four arms\nthat react more\nquickly than it\fcan think, it can\nexecute many\npunches at once."
        fr:
          crystal: "Balançant ses 4\nbras plus vite que\nl’éclair, il peut\fdonner plusieurs\ncoups de poing\nen même temps."
        it:
          crystal: "Le quattro braccia\nsono più rapide\ndel suo pensiero.\fPuò assestare vari\npugni nello stesso\nmomento."
        de:
          crystal: "Da seine vier Arme\nschneller sind\nals sein Gehirn,\fkann es unzählige\nSchläge parallel\nausführen."
        es:
          crystal: "Puede dar varios\npuñetazos de una\nsola vez, gracias\fa sus cuatro bra-\nzos. Golpea màs\nràpido que piensa."
bellsprout:
  species_id: 69
  names:
    jp_kana: マダツボミ
    en: BELLSPROUT
    fr: CHETIFLOR
    it: BELLSPROUT
    de: KNOFENSA
    es: BELLSPROUT
