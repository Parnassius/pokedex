      descriptions:
        jp_kana:
          crystal: "のどを　おおきく　ふくらませて\nなきだすと　まわりにいた　ニョロモや\nニョロゾが　すぐさま　やってくる。"
        en:
          crystal: "When it expands\nits throat to\ncroak out a tune,\fnearby POLIWAG and\nPOLIWHIRL gather\nimmediately."
        fr:
          crystal: "Si PTITARD et\nTETARTE entendent\nson chant, ils se\frassemblent pour\nvenir le ren-\ncontrer."
        it:
          crystal: "I POLIWAG e i\nPOLIWHIRL si\nriuniscono subito\fse odono il verso\nrauco che emette\ncon la gola."
        de:
          crystal: "Bläht es seinen\nHals auf, um zu\nquaken, versammeln\fsich QUAPSEL und\nQUAPUTZI von Nah\nund Fern."
        es:
          crystal: "Cuando hincha el\nbuche para croar,\nsi hay cerca algùn\fPOLIWAG o algùn\nPOLIWHIRL, no tar-\ndaràn en llegar."
hoppip:
  species_id: 187
  names:
    jp_kana: ハネッコ
    en: HOPPIP
    fr: GRANIVOL
    it: HOPPIP
