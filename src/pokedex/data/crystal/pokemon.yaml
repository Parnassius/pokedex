    ninetales:
      form_id: 0
      base_stats:
        hp: 73
        attack: 76
        defense: 75
        special_attack: 81
        special_defense: 100
        speed: 100
      types:
        - fire
      egg_groups:
        - field
      held_items:
        common: burnt_berry
        rare: burnt_berry
      descriptions:
        jp_kana:
          crystal: "しっぽの　いっぽん　いっぽんに\nじんつうりきが　こめられている。\n１０００ねん　いきると　いわれる。"
        en:
          crystal: "It is said to live\na thousand years,\nand each of its\ftails is loaded\nwith supernatural\npowers."
        fr:
          crystal: "On dit qu’il vit\n1000 ans et que\nchacune de ses\fqueues a un pou-\nvoir magique."
        it:
          crystal: "Dicono che viva\nun millennio, e\nche ognuna delle\fsue code abbia uno\nspecifico\npotere magico."
        de:
          crystal: "Man sagt, es lebe\n1000 Jahre, und\ndass jeder seiner\fSchwänze über-\nnatürliche Kräfte\ninne hat."
        es:
          crystal: "Cuentan que llega\na vivir hasta mil\naños y que cada\funa de las colas\nposee poderes\nsobrenaturales."
jigglypuff:
  species_id: 39
  names:
    jp_kana: プリン
    en: JIGGLYPUFF
    fr: RONDOUDOU
    it: JIGGLYPUFF
    de: PUMMELUFF
    es: JIGGLYPUFF
  forms:
    jigglypuff:
      form_id: 0
