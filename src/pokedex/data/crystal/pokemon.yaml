      descriptions:
        jp_kana:
          crystal: "さいしんかがくで　しんかした\nじんこうの　ポケモン。ときどき\nプログラムにない　はんのうをみせる。"
        en:
          crystal: "This manmade\nPOKéMON evolved\nfrom the latest\ftechnology. It\nmay have unprog-\nrammed reactions."
        fr:
          crystal: "Créé par une tech-\nnologie humaine,\nil a évolué de sa\fprécédente forme\net a des réactions\nnon programmées."
        it:
          crystal: "POKéMON prodotto\ndall’uomo con la\ntecnologia più\frecente. È persino\ncapace di reazioni\nnon programmate."
        de:
          crystal: "Dieses POKéMON\nist das Ergebnis\nneuester Technolo-\fgie. Es könnte un-\nprogrammierte Re-\naktionen zeigen."
        es:
          crystal: "Este avanzado\nPOKéMON es obra\ndel hombre y de la\ftecnología. Puede\ntener reacciones\nimprevisibles."
stantler:
