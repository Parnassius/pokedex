        hp: 65
        attack: 40
        defense: 70
        special_attack: 80
        special_defense: 140
        speed: 70
      types:
        - water
        - flying
      egg_groups:
        - water_1
      descriptions:
        jp_kana:
          crystal: "じゆうきままに　およぎながら\nくちに　はいってきた　モノをたべる。\nぜんしん　ざらざら　している。"
        en:
          crystal: "It swims along\nfreely, eating\nthings that swim\finto its mouth.\nIts whole body is\nvery coarse."
        fr:
          crystal: "Il nage la bouche\nouverte pour ava-\nler tout et n’im-\fporte quoi.\nSon corps est très\ngranuleux."
        it:
          crystal: "Nuota libero nell’\nacqua e inghiotte\ntutto ciò che gli\ffinisce in bocca.\nIl corpo è molto\nruvido."
        de:
          crystal: "Es schwimmt frei\numher und frisst\nalles, was ihm ins\fMaul schwimmt.\nSein gesamter\nKörper ist rauh."
        es:
          crystal: "Va nadando por ahí\ntranquilamente,\ncomiendo lo que le\fcae en la boca.\nTiene un cuerpo\nmuy resistente."
skarmory:
  species_id: 227
  names:
    jp_kana: エアームド
