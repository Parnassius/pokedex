      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "しっぽの　さきから　ぶんぴつする\nなぞの　えきたいの　いろは\nドーブルごとに　きまっている。"
        en:
          crystal: "The color of the\nmysterious fluid\nsecreted from its\ftail is predeter-\nmined for each\nSMEARGLE."
        fr:
          crystal: "La couleur du mys-\ntérieux fluide de\nsa queue change\fpour chaque\nQUEULORIOR."
        it:
          crystal: "Il colore del\nfluido misterioso\nche secerne dalla\fcoda è\npredeterminato\nper ogni SMEARGLE."
        de:
          crystal: "Die Farbe des\nmysteriösen\nSekrets seines\fSchwanzes ist für\njedes FARBEAGLE\nvorgegeben."
        es:
          crystal: "El color del\nmisterioso fluido\nque segrega por la\fcola, varía\ndependiendo de\ncada SMEARGLE."
tyrogue:
  species_id: 236
  names:
    jp_kana: バルキー
