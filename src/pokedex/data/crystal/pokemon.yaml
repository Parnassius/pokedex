        - water
        - dragon
      egg_groups:
        - water_1
        - dragon
      held_items:
        rare: dragon_scale
      descriptions:
        jp_kana:
          crystal: "どんな　いきものも　おりられない\nふかい　うみのそこで　ねむりながら\nちからを　たくわえている　という。"
        en:
          crystal: "It stores energy\nby sleeping at\nunderwater depths\fat which no other\nlife forms can\nsurvive."
        fr:
          crystal: "Il emmagasine de\nl’énergie en res-\ntant dans les\ffonds marins, là\noù rien d’autre ne\npeut survivre."
        it:
          crystal: "Accumula energia\ndormendo sott’\nacqua a profondità\fproibitive per\nogni altra forma\ndi vita."
        de:
          crystal: "Kein anderes Lebe-\nwesen kann in den\nTiefen existieren,\fin denen es\nschläft und so\nEnergie speichert."
        es:
          crystal: "Almacena energía\ndurmiendo en las\nprofundidades\fsubmarinas, allà\ndonde no llegan\notros seres."
phanpy:
  species_id: 231
  names:
    jp_kana: ゴマゾウ
    en: PHANPY
    fr: PHANPY
    it: PHANPY
    de: PHANPY
