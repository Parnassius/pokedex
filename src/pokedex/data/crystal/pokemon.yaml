        attack: 80
        defense: 140
        special_attack: 40
        special_defense: 70
        speed: 70
      types:
        - steel
        - flying
      egg_groups:
        - flying
      descriptions:
        jp_kana:
          crystal: "ぬけおちた　ハネは　うすく\nするどいので　かたな　として\nつかわれていたことも　あったらしい。"
        en:
          crystal: "The feathers that\nit sheds are very\nsharp. It is said\fthat people once\nused the feathers\nas swords."
        fr:
          crystal: "Les plumes qu’il\nperd sont très\naiguisées. On les\futilisait autre-\nfois comme sabres."
        it:
          crystal: "Le penne che perde\nsono molto\naffilate. Si dice\fche un tempo\nfossero usate come\nspade."
        de:
          crystal: "Seine Federn sind\nsehr scharf. Man\nsagt, dass die\fMenschen die Fe-\ndern als Schwerter\nbenutzten."
        es:
          crystal: "Tiene unas plumas\nen las alas muy\nafiladas. Dicen\fque, antiguamente,\nse utilizaban a\nmodo de espadas."
houndour:
  species_id: 228
  names:
    jp_kana: デルビル
    en: HOUNDOUR
    fr: MALOSSE
