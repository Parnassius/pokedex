        en:
          crystal: "In order to milk a\nMILTANK, one must\nhave a knack for\frhythmically pull-\ning up and down\non its udders."
        fr:
          crystal: "Traire un ECREMEUH\ndemande des tré-\nsors de patience,\fde douceur et de\ndoigté."
        it:
          crystal: "Mungere MILTANK\nnon è facile:\noccorre saper\ftirare su e giù\nritmicamente le\nsue mammelle."
        de:
          crystal: "Um MILTANK zu\nmelken, muss man\nein Gespür dafür\fhaben, wie man das\nEuter rhythmisch\nauf und ab bewegt."
        es:
