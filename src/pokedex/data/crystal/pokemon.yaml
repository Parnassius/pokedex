        special_defense: 50
        speed: 40
      types:
        - water
      egg_groups:
        - water_1
        - fairy
      descriptions:
        jp_kana:
          crystal: "ぜんしんの　たいもうは\nみずを　はじく　せいしつを　もち\nみずあび　しても　かわいている。"
        en:
          crystal: "The fur on its\nbody naturally\nrepels water. It\fcan stay dry, even\nwhen it plays in\nthe water."
        fr:
          crystal: "Sa fourrure est\nimperméable, si\nbien qu’il reste\fsec même en jouant\ndans l’eau."
        it:
          crystal: "La pelliccia è\nidrorepellente.\nCosì, rimane\fasciutto anche\ngiocando\nnell’acqua."
        de:
          crystal: "Sein Fell ist\nvon Natur aus\nwasserabweisend.\fEs bleibt trocken,\nauch wenn es im\nWasser spielt."
        es:
          crystal: "Tiene una piel que\nrepele el agua.\nDe hecho, puede\fpasarse horas\njugando en el agua\nsin mojarse."
azumarill:
  species_id: 184
  names:
    jp_kana: マリルリ
    en: AZUMARILL
    fr: AZUMARILL
    it: AZUMARILL
    de: AZUMARILL
