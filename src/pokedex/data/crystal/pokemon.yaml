      base_stats:
        hp: 45
        attack: 49
        defense: 65
        special_attack: 49
        special_defense: 65
        speed: 45
      types:
        - grass
      egg_groups:
        - monster
        - grass
      descriptions:
        jp_kana:
          crystal: "ひざしを　あびるのが　だいすき。\nあたまの　はっぱを　つかって\nあたたかい　ばしょを　さがす。"
        en:
          crystal: "It loves to bask\nin the sunlight.\nIt uses the leaf\fon its head to\nseek out warm\nplaces."
        fr:
          crystal: "Il aime prendre\ndes bains de\nsoleil. La feuille\fsur sa tête l’aide\nà repérer les\nendroits chauds."
        it:
          crystal: "Ama crogiolarsi al\nsole. Usa la\nfoglia che ha\fsulla testa per\ncercare luoghi\ntiepidi."
        de:
          crystal: "Es liegt gerne in\nder Sonne. Mit\nHilfe des Blattes\fauf seinem Kopf\nfindet es\nwarme Orte."
        es:
          crystal: "Le encanta\ndisfrutar del sol.\nUsa la hoja que\ftiene en la cabeza\npara localizar\nsitios càlidos."
bayleef:
  species_id: 153
  names:
    jp_kana: ベイリーフ
    en: BAYLEEF
    fr: MACRONIUM
    it: BAYLEEF
    de: LORBLATT
    es: BAYLEEF
  forms:
    bayleef:
