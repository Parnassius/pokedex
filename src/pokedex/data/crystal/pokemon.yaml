        en:
          crystal: "Because of its\nrubbery, electric-\nity-resistant\fskin, it can store\nlots of electric-\nity in its fur."
        fr:
          crystal: "Sa peau étant\ncaoutchouteuse et\nisolante, il peut\fgarder du courant\ndans sa fourrure\nsans danger."
        it:
          crystal: "Grazie alla pelle\ngommosa e isolante\npuò immagazzinare\fmoltissima energia\nall’interno della\npelliccia."
        de:
          crystal: "Aufgrund seiner\nelektrizitätsab-\nweisenden Gummi-\fhaut kann es viel\nElektrizität im\nFell speichern."
        es:
          crystal: "Como tiene un pe-\nlaje no conductor\nde electricidad,\fpuede almacenarla\nsin problema en\nsu interior."
ampharos:
  species_id: 181
  names:
    jp_kana: デンリュウ
