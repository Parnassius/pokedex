        en:
          crystal: "This rough POKéMON\nstores energy\ninside its body,\fthen sweeps across\nthe land, shooting\noff electricity."
        fr:
          crystal: "Ce terrible POKé-\nMON emmagasine de\nl’énergie puis\fcourt en lançant\nde puissants\néclairs."
        it:
          crystal: "POKéMON violento\nche accumula\nenergia nel corpo\fe poi corre all’\nimpazzata, scari-\ncando elettricità."
        de:
          crystal: "Dieses aggressive\nPOKéMON speichert\nEnergie in seinem\fKörper und entlädt\nsie, wenn es über\ndas Land streift."
        es:
          crystal: "Este duro POKéMON\nalmacena energía\nen su cuerpo.\fDespués, cuando\nse desplaza por\ntierra, la suelta."
