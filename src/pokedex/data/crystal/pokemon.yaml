    jumpluff:
      form_id: 0
      base_stats:
        hp: 75
        attack: 55
        defense: 70
        special_attack: 55
        special_defense: 85
        speed: 110
      types:
        - grass
        - flying
      egg_groups:
        - fairy
        - grass
      descriptions:
        jp_kana:
          crystal: "どんな　かぜに　あおられても\nわたげを　じざいに　あやつって\nせかいの　すきなところへ　いける。"
        en:
          crystal: "Even in the fierc-\nest wind, it can\ncontrol its fluff\fto make its way to\nany place in the\nworld it wants."
        fr:
          crystal: "Même sous un vent\ntrès violent, il\ncontrôle sa desti-\fnation en bougeant\nses appendices."
        it:
          crystal: "Anche nel vento\nforte controlla\nabilmente il suo\fbatuffolo per\nvolare in ogni\nparte del mondo."
        de:
          crystal: "Auch im stärksten\nWind kann es kon-\ntrollieren, wo\fseine Saat auf dem\nErdball nieder-\ngehen soll."
        es:
          crystal: "Aunque sople el\nviento màs fuerte,\nes capaz de con-\ftrolar los pompo-\nnes y moverse por\ndonde quiera."
aipom:
  species_id: 190
  names:
    jp_kana: エイパム
    en: AIPOM
    fr: CAPUMAIN
    it: AIPOM
    de: GRIFFEL
    es: AIPOM
  forms:
    aipom:
      form_id: 0
      base_stats:
        hp: 55
        attack: 70
        defense: 55
        special_attack: 40
        special_defense: 55
        speed: 85
      types:
        - normal
      egg_groups:
        - field
      descriptions:
        jp_kana:
          crystal: "シッポを　つかって　きのえだに\nぶらさがる。つぎに　とびうつるとき\nからだの　はんどうを　りようする。"
        en:
          crystal: "It uses its tail\nto hang on to tree\nbranches. It uses\fits momentum to\nswing from one\nbranch to another."
        fr:
          crystal: "Sa queue est si\nforte qu’il peut\ns’accrocher aux\fbranches et se\nbalancer d’arbre\nen arbre."
        it:
          crystal: "Usa la coda per\nappendersi ai\nrami, prendendo\flo slancio per\nsaltare da un\nramo all’altro."
        de:
          crystal: "Es setzt seinen\nSchwanz ein, um\nsich an Äste zu\fhängen. Dann\nschwingt es sich\nvon Ast zu Ast."
        es:
          crystal: "Se vale de la cola\npara colgarse de\nlas ramas de los\fàrboles y coge\nimpulso para pasar\nde una a otra."
sunkern:
  species_id: 191
  names:
    jp_kana: ヒマナッツ
