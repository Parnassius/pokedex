cut:
  names:
    jp_kana: いあいぎり
    en: CUT
    fr: COUPE
    it: TAGLIO
    de: ZERSCHNEIDER
    es: CORTE
  descriptions:
    jp_kana: "するどいカマや　ツメなどを　つかって\nてきを　きりつけて　こうげき"
    en: "Cuts using claws,\nscythes, etc."
    fr: "Coupe avec griffe,\ndard, etc."
    it: "Taglia con falci,\nartigli ecc."
    de: "Setzt Klauen,\nSicheln etc. ein."
    es: "Corta con garras,\nguadañas, etc."
defense_curl:
  names:
    jp_kana: まるくなる
    en: DEFENSE CURL
    fr: BOUL’ARMURE
    it: RICCIOLSCUDO
    de: EINIGLER
    es: RIZO DEFENSA
  descriptions:
    jp_kana: "からだを　まるめて　きゅうしょを\nかくし　ぼうぎょを　あげる"
    en: "Heightens the\nuser’s DEFENSE."
    fr: "Monte la DEFENSE\ndu lanceur."
    it: "Migliora DIFESA\ndi chi lo usa."
    de: "Hebt VERT-Wert des\nAngreifers."
    es: "Mejora la DEFENSA\nde quien lo usa."
destiny_bond:
  names:
    jp_kana: みちづれ
    en: DESTINY BOND
    fr: PRLVT DESTIN
    it: DESTINOBBL.
    de: ABGANGSBUND
    es: MISMODESTINO
  descriptions:
    jp_kana: "このわざの　あとに　たおされると\nてきも　せんとうふのうになる"
    en: "The foe faints if\nthe user does."
    fr: "Cible KO en même\ntps que lanceur."
    it: "Il nemico va KO\ncon chi lo usa."
    de: "Beide werden\nbesiegt."
    es: "El enemigo se\ndebilita contigo."
detect:
  names:
    jp_kana: みきり
    en: DETECT
    fr: DETECTION
    it: INDIVIDUA
    de: SCANNER
    es: DETECCIÓN
  descriptions:
    jp_kana: "てきの　こうげきを　かならずよける\nれんぞくで　だすと　しっぱいしやすい"
    en: "Evades attack that\nturn. It may fail."
    fr: "Peut éviter l’at-\ntaque de ce tour."
    it: "Schiva un attacco.\nNon infallibile."
    de: "1 Runde Schutz.\nWdh. fraglich."
    es: "Puede esquivar el\nataque ese turno."
dig:
  names:
    jp_kana: あなをほる
    en: DIG
    fr: TUNNEL
    it: FOSSA
    de: SCHAUFLER
    es: EXCAVAR
  descriptions:
    jp_kana: "１ターンめで　じめんに　もぐり\nつぎのターンで　てきを　こうげき"
    en: "1st turn: Burrow\n2nd turn: Attack"
    fr: "Tour 1: Enterre\nTour 2: Attaque"
    it: "1’vturno: Scompare\n2’vturno: Attacca"
    de: "1. Graben\n2. Angriff"
    es: "1er turno: Cava\n2’v turno: Ataca"
disable:
  names:
    jp_kana: かなしばり
    en: DISABLE
    fr: ENTRAVE
    it: INIBITORE
    de: AUSSETZER
    es: ANULACIÓN
  descriptions:
    jp_kana: "ちょうのうりょくで　てきの　うごきを\nとめて　わざを　１つ　つかえなくする"
    en: "Disables the foe’s\nmost recent move."
    fr: "Annule la dernière\ncap. de la cible."
    it: "Disattiva una\nmossa del nemico."
    de: "Blockiert letzte\nAttacke des Gegn."
    es: "Desactiva ataque\nmàs reciente."
dizzy_punch:
  names:
    jp_kana: ピヨピヨパンチ
    en: DIZZY PUNCH
    fr: UPPERCUT
    it: STORDIPUGNO
    de: IRRSCHLAG
    es: PUÑO-MAREO
  descriptions:
    jp_kana: "リズミカルな　パンチで　こうげき\nてきを　こんらんさせることがある"
    en: "An attack that may\ncause confusion."
    fr: "Attaque pouvant\nrendre confus."
    it: "Può causare\nconfusione."
    de: "Gegner wird evtl.\nverwirrt."
    es: "Ataque que puede\ncausar confusión."
double_edge:
  names:
    jp_kana: すてみタックル
    en: DOUBLE-EDGE
    fr: DAMOCLES
    it: SDOPPIATORE
    de: RISIKOTACKLE
    es: DOBLE FILO
  descriptions:
    jp_kana: "いのちをかけて　てきに　たいあたり\nじぶんもすこし　ダメージをうける"
    en: "A tackle that also\nhurts the user."
    fr: "Charge blessant\nles 2 adversaires."
    it: "Carica: danneggia\nanche chi lo usa."
    de: "Tackle! Angreifer\nwird verletzt."
    es: "Ataque que también\nhiere al jugador."
double_kick:
  names:
    jp_kana: にどげり
    en: DOUBLE KICK
    fr: DOUBLE PIED
    it: DOPPIOCALCIO
    de: DOPPELKICK
    es: DOBLE PATADA
  descriptions:
    jp_kana: "２ほんの　あしをつかって　てきを\n２かい　れんぞくで　こうげき"
    en: "A double kicking\nattack."
    fr: "Double attaque de\ncoup de pied."
    it: "Un attacco con\ndoppio calcio."
    de: "Angriff durch\nDoppel-Kick."
    es: Una patada doble.
double_slap:
  names:
    jp_kana: おうふくビンタ
    en: DOUBLESLAP
    fr: TORGNOLES
    it: DOPPIASBERLA
    de: DUPLEXHIEB
    es: DOBLEBOFETÓN
  descriptions:
    jp_kana: "てきを　おうふくビンタで\n２ー５かい　れんぞくで　こうげき"
    en: "Repeatedly slaps\n2-5 times."
    fr: "Gifle de 2 à\n5 fois."
    it: "2-5 schiaffi\nripetuti."
    de: "Trifft bis zu\n5mal."
    es: "Abofetea de 2 a 5\nveces seguidas."
double_team:
  names:
    jp_kana: かげぶんしん
    en: DOUBLE TEAM
    fr: REFLET
    it: DOPPIOTEAM
    de: DOPPELTEAM
    es: DOBLE EQUIPO
  descriptions:
    jp_kana: "ぶんしんで　てきを　まどわせ\nかいひりつを　あげる"
    en: "Heightens evasive-\nness."
    fr: Monte l’esquive.
    it: "Aumenta capacità\ndi elusione."
    de: "Fluchtwert nimmt\nzu."
    es: "Mejora habilidad\nde EVASIÓN."
dragon_breath:
  names:
    jp_kana: りゅうのいぶき
    en: DRAGONBREATH
    fr: DRACOSOUFFLE
    it: DRAGOSPIRO
    de: FEUERODEM
    es: DRAGOALIENTO
  descriptions:
    jp_kana: "くちから　ものすごい　いきをはいて\nてきを　こうげき"
    en: "A strong breath\nattack."
    fr: "Un souffle\npuissant."
    it: "Un soffio\npotente."
    de: Starke Attacke.
    es: "Ataque soplo\nmuy potente."
dragon_rage:
  names:
    jp_kana: りゅうのいかり
    en: DRAGON RAGE
    fr: DRACO-RAGE
    it: IRA DI DRAGO
    de: DRACHENWUT
    es: FURIA DRAGÓN
  descriptions:
    jp_kana: "しょうげきはで　てきを　こうげき\n４０の　きまったダメージを　あたえる"
    en: "Always inflicts\n40HP damage."
    fr: "Inflige toujours\n40 pts de dégâts."
    it: "Causa sempre un\ndanno di 40 PS."
    de: "Fügt Gegner\n40 KP Schaden zu."
    es: "Siempre produce\n40 PS de daño."
dream_eater:
  names:
    jp_kana: ゆめくい
    en: DREAM EATER
    fr: DEVOREVE
    it: MANGIASOGNI
    de: TRAUMFRESSER
    es: COME SUEÑOS
  descriptions:
    jp_kana: "ねているてきに　あたえた　ダメージの\nはんぶん　たいりょくを　かいふくする"
    en: "Steals HP from a\nsleeping victim."
    fr: "Vole les PV d’une\nvictime endormie."
    it: "Ruba PS al\nnemico che dorme."
    de: "Zieht schlafendem\nGegner KP ab."
    es: "Roba PS a una\nvíctima dormida."
drill_peck:
  names:
    jp_kana: ドリルくちばし
    en: DRILL PECK
    fr: BEC VRILLE
    it: PERFORBECCO
    de: BOHRSCHNABEL
    es: PICO TALADRO
  descriptions:
    jp_kana: "くちばしを　ちゅうしんに　からだを\nかいてんさせて　てきに　とっしんする"
    en: "A strong, spin-\nning-peck attack."
    fr: "Attaque de bec\ntournoyante."
    it: "Attacca con una\nviolenta beccata."
    de: "Starke Schnabel-\nDreh-Attacke."
    es: "Picotazo giratorio\nmuy potente."
dynamic_punch:
  names:
    jp_kana: ばくれつパンチ
    en: DYNAMICPUNCH
    fr: DYNAMOPOING
    it: DINAMIPUGNO
    de: WUCHTSCHLAG
    es: PUÑODINÁMICO
  descriptions:
    jp_kana: "あたりにくいが　ダメージは　おおきい\nあたれば　かならず　こんらんさせる"
    en: "An attack that\nalways confuses."
    fr: "Attaque rendant\ntjrs confus."
    it: "Provoca sempre\nconfusione."
    de: "Gegner wird\nverwirrt."
    es: "Ataque que siempre\nconfunde."
earthquake:
  names:
    jp_kana: じしん
    en: EARTHQUAKE
    fr: SEISME
    it: TERREMOTO
    de: ERDBEBEN
    es: TERREMOTO
  descriptions:
    jp_kana: "じめんを　ゆらして　こうげき\nとんでる　てきいがいに　だいダメージ"
    en: "Tough but useless\nvs. flying foes."
    fr: "Puissant mais inu-\ntile sur volants."
    it: "Buono, ma non con-\ntro tipo volante."
    de: "Stark! Nutzlos\nbei Flug-POKéMON."
    es: "Fuerte pero inùtil\ncontra voladores."
egg_bomb:
  names:
    jp_kana: タマゴばくだん
    en: EGG BOMB
    fr: BOMB’OEUF
    it: UOVOBOMBA
    de: EIERBOMBE
    es: BOMBA HUEVO
  descriptions:
    jp_kana: "タマゴを　おもいっきり　なげつけて\nてきを　こうげき"
    en: "Eggs are hurled at\nthe foe."
    fr: "Lance des oeufs\nsur l’ennemi."
    it: "Lancio di uova\ncontro il nemico."
    de: "Der Gegner erlebt\neinen Eierhagel."
    es: "Arroja huevos\nal enemigo."
ember:
  names:
    jp_kana: ひのこ
    en: EMBER
    fr: FLAMMECHE
    it: BRACIERE
    de: GLUT
    es: ASCUAS
  descriptions:
    jp_kana: "ちいさな　ほのおで　こうげき\nてきを　やけどさせることがある"
    en: "An attack that may\ninflict a burn."
    fr: "Peut infliger\nune brûlure."
    it: "Un attacco che può\nscottare."
    de: "Gegner erleidet\nevtl. Verbrennung."
    es: "Ataque que puede\ncausar quemaduras."
encore:
  names:
    jp_kana: アンコール
    en: ENCORE
    fr: ENCORE
    it: RIPETI
    de: ZUGABE
    es: OTRA VEZ
  descriptions:
    jp_kana: "てきが　さいごに　つかった　わざを\n２ー６ターン　れんぞくで　ださせる"
    en: "Makes the foe re-\npeat 2-6 times."
    fr: "Fait répéter la\ncible 2 à 6 fois."
    it: "Obbliga nemico a\n2-6 ripetizioni."
    de: "Gegner greift\nmax. 6mal an."
    es: "Hace que el rival\nrepita 2-6 veces."
endure:
  names:
    jp_kana: こらえる
    en: ENDURE
    fr: TENACITE
    it: RESISTENZA
    de: AUSDAUER
    es: AGUANTE
  descriptions:
    jp_kana: "そのターンで　こうげきを　うけても\nかならず　たいりょくが　１のこる"
    en: "Always leaves at\nleast 1HP."
    fr: "Laisse toujours au\nmoins 1 PV."
    it: "Conserva sempre\nalmeno 1 PS."
    de: "Mindestens 1 KP\nbleibt übrig."
    es: "Deja siempre 1 PS,\ncomo mínimo."
explosion:
  names:
    jp_kana: だいばくはつ
    en: EXPLOSION
    fr: EXPLOSION
    it: ESPLOSIONE
    de: EXPLOSION
    es: EXPLOSIÓN
  descriptions:
    jp_kana: "てきに　だいダメージを　あたえるが\nつかうと　せんとうふのうに　なる"
    en: "Very powerful but\nmakes user faint."
    fr: "Puissant mais met\nle lanceur KO."
    it: "Potentissimo, ma\nchi attacca va KO."
    de: "Stark; Angreifer\nwird besiegt."
    es: "Muy potente, pero\nte debilita."
extreme_speed:
  names:
    jp_kana: しんそく
    en: EXTREMESPEED
    fr: VIT.EXTREME
    it: EXTRARAPIDO
    de: TURBOTEMPO
    es: VEL. EXTREMA
  descriptions:
    jp_kana: "ものすごい　はやさで　うごいて\nちからづよい　こうげきをする"
    en: "A powerful first-\nstrike move."
    fr: "Coup d’initiative\npuissant."
    it: "Forte attacco che\ncolpisce primo."
    de: "Starke\nErstschlagattacke."
    es: "Un primer golpe\nmuy potente."
false_swipe:
  names:
    jp_kana: みねうち
    en: FALSE SWIPE
    fr: FAUX-CHAGE
    it: FALSOFINALE
    de: TRUGSCHLAG
    es: FALSOTORTAZO
  descriptions:
    jp_kana: "かならず　たいりょくが　１のこるよう\nてかげんして　こうげき"
    en: "Leaves the foe\nwith at least 1HP."
    fr: "Laisse cible avec\nau moins 1 PV."
    it: "Lascia il nemico\ncon almeno 1 PS."
    de: "Gegner behält\nmindestens 1 KP."
    es: "Deja al enemigo\ncon al menos 1 PS."
feint_attack:
  names:
    jp_kana: だましうち
    en: FAINT ATTACK
    fr: FEINTE
    it: FINTA
    de: FINTE
    es: FINTA
  descriptions:
    jp_kana: "てきを　ゆだんさせて　ちかづき\nよけられない　こうげきを　くりだす"
    en: "An attack that\nnever misses."
    fr: "Une attaque qui ne\nrate jamais."
    it: "Un attacco che non\nva mai a vuoto."
    de: "Attacke mit\nTreffergarantie."
    es: "Ataque que no\nfalla nunca."
fire_blast:
  names:
    jp_kana: だいもんじ
    en: FIRE BLAST
    fr: DEFLAGRATION
    it: FUOCOBOMBA
    de: FEUERSTURM
    es: LLAMARADA
  descriptions:
    jp_kana: "だいの　もじが　すべてを　やきつくす\nてきを　やけどさせることがある"
    en: "An attack that\nmay cause a burn."
    fr: "Attaque pouvant\nbrûler."
    it: "Può far scottare\nil nemico."
    de: "Gegner erleidet\nevtl. Verbrennung."
    es: "Ataque que puede\ncausar quemaduras."
fire_punch:
  names:
    jp_kana: ほのおのパンチ
    en: FIRE PUNCH
    fr: POING DE FEU
    it: FUOCOPUGNO
    de: FEUERSCHLAG
    es: PUÑO FUEGO
  descriptions:
    jp_kana: "ほのおをこめた　パンチで　こうげき\nてきを　やけどさせることがある"
    en: "A fiery punch. May\ncause a burn."
    fr: "Poing de feu pou-\nvant brûler."
    it: "Un pugno ardente,\nche può scottare."
    de: "Feuriger Schlag.\nEvtl. Verbrennung."
    es: "Puñetazo ardiente.\nPuede quemar."
fire_spin:
  names:
    jp_kana: ほのおのうず
    en: FIRE SPIN
    fr: DANSEFLAMME
    it: TURBOFUOCO
    de: FEUERWIRBEL
    es: GIRO FUEGO
  descriptions:
    jp_kana: "２ー５ターンのあいだ　てきを\nほのおの　ちゅうしんに　とじこめる"
    en: "Traps foe in fire\nfor 2-5 turns."
    fr: "2 à 5 tours: cible\nimmobile dans feu."
    it: "Fuoco intrappola\nnemico 2-5 turni."
    de: "Trifft Gegner bis\nzu 5mal."
    es: "Atrapa con fuego\nde 2 a 5 turnos."
fissure:
  names:
    jp_kana: じわれ
    en: FISSURE
    fr: ABIME
    it: ABISSO
    de: GEOFISSUR
    es: FISURA
  descriptions:
    jp_kana: "じわれを　おこして　てきを　のみこむ\nのみこまれると　せんとうふのうになる"
    en: "A ground-type,\none-hit KO attack."
    fr: "Type SOL.\nKO en un coup."
    it: "Attacco tipo terra\nda KO immediato."
    de: "K.O. durch\nBoden-Attacke."
    es: "Ataque de tierra.\nK.O. en 1 golpe."
flail:
  names:
    jp_kana: じたばた
    en: FLAIL
    fr: FLEAU
    it: FLAGELLO
    de: DRESCHFLEGEL
    es: AZOTE
  descriptions:
    jp_kana: "じぶんの　たいりょくが　すくないほど\nてきに　おおきなダメージを　あたえる"
    en: "Stronger if the\nuser’s HP is low."
    fr: "Puissant si PV du\nlanceur faibles."
    it: "Forte se chi lo\nusa ha pochi PS."
    de: "Effektiver, wenn \nselbst geschwächt."
    es: "Màs potente si\ntienes pocos PS."
flame_wheel:
  names:
    jp_kana: かえんぐるま
    en: FLAME WHEEL
    fr: ROUE DE FEU
    it: RUOTAFUOCO
    de: FLAMMENRAD
    es: RUEDA FUEGO
  descriptions:
    jp_kana: "ほのおを　まとって　とっしんする\nてきを　やけどさせることがある"
    en: "An attack that may\ncause a burn."
    fr: "Attaque pouvant\nbrûler."
    it: "Può far scottare\nil nemico."
    de: "Gegner erleidet\nevtl. Verbrennung."
    es: "Ataque que puede\ncausar quemaduras."
flamethrower:
  names:
    jp_kana: かえんほうしゃ
    en: FLAMETHROWER
    fr: LANCE-FLAMME
    it: LANCIAFIAMME
    de: FLAMMENWURF
    es: LANZALLAMAS
  descriptions:
    jp_kana: "すごい　ほのおで　こうげき\nてきを　やけどさせることがある"
    en: "An attack that may\ninflict a burn."
    fr: "Peut infliger\nune brûlure."
    it: "Un attacco che può\nscottare."
    de: "Gegner erleidet\nevtl. Verbrennung."
    es: "Ataque que puede\ncausar quemaduras."
flash:
  names:
    jp_kana: フラッシュ
    en: FLASH
    fr: FLASH
    it: FLASH
    de: BLITZ
    es: DESTELLO
  descriptions:
    jp_kana: "つよい　ひかりで　めを　くらませて\nてきの　めいちゅうりつを　さげさせる"
    en: "Blinds the foe to\nreduce accuracy."
    fr: "Enserre cible et\nbaisse précision."
    it: "Abbaglia riducendo\nprecisione nemico."
    de: "Blendet Gegner\n+ senkt Präzision."
    es: "Ciega al enemigo y\nbaja la PRECISIÓN."
fly:
  names:
    jp_kana: そらをとぶ
    en: FLY
    fr: VOL
    it: VOLO
    de: FLIEGEN
    es: VUELO
  descriptions:
    jp_kana: "１ターンめで　そらに　とびたって\nつぎのターンで　てきを　こうげき"
    en: "1st turn: Fly\n2nd turn: Attack"
    fr: "Tour 1: Vol\nTour 2: Attaque"
    it: "1’vturno: Vola\n2’vturno: Attacca"
    de: "1. Emporfliegen\n2. Angriff"
    es: "1er turno: Vuela\n2’v turno: Ataca"
focus_energy:
  names:
    jp_kana: きあいだめ
    en: FOCUS ENERGY
    fr: PUISSANCE
    it: ENERGY CONC.
    de: ENERGIEFOKUS
    es: FOCO ENERGÍA
  descriptions:
    jp_kana: "こうげきに　きあいを　こめて\nきゅうしょに　あたりやすくする"
    en: "Raises the criti-\ncal hit ratio."
    fr: "Monte les chances\nde coup critique."
    it: "Aumenta i\nbrutti colpi."
    de: "Volltrefferquote\nwird erhöht."
    es: "Mayor probabilidad\nde golpe crítico."
foresight:
  names:
    jp_kana: みやぶる
    en: FORESIGHT
    fr: CLAIRVOYANCE
    it: PREVEGGENZA
    de: GESICHTE
    es: PROFECÍA
  descriptions:
    jp_kana: "わざが　あたりにくくなった　てきに\nこうげきを　あてられるようになる"
    en: "Negates accuracy\nreduction moves."
    fr: "Déjoue les cap. de\nbaisse de précis."
    it: "Respinge le mosse\ncontro precisione."
    de: "Schützt vor\nPräzisionssenkung."
    es: "Anula ataques que\nbajan PRECISIÓN."
frustration:
  names:
    jp_kana: やつあたり
    en: FRUSTRATION
    fr: FRUSTRATION
    it: FRUSTRAZIONE
    de: FRUSTRATION
    es: FRUSTRACIÓN
  descriptions:
    jp_kana: "むごい　しうちの　うさばらしに\nてきを　ぜんりょくで　こうげき"
    en: "An attack based on\nlack of loyalty."
    fr: "Attaque sur le\nmanque de loyauté."
    it: "Attacco basato\nsulla slealtà."
    de: "Angriffsgrund:\nKeine Loyalität."
    es: "Basado en la falta\nde lealtad."
fury_attack:
  names:
    jp_kana: みだれづき
    en: FURY ATTACK
    fr: FURIE
    it: FURIA
    de: FURIENSCHLAG
    es: ATAQUE FURIA
  descriptions:
    jp_kana: "とがった　ツノなどを　つかい\n２ー５かい　れんぞくで　こうげき"
