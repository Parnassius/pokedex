magnitude:
  names:
    jp_kana: マグニチュード
    en: MAGNITUDE
    fr: AMPLEUR
    it: MAGNITUDO
    de: INTENSITÄT
    es: MAGNITUD
  descriptions:
    jp_kana: "じめんを　ゆらして　てきを　こうげき\nダメージは　ランダムで　かわる"
    en: "A ground attack\nwith random power."
    fr: "Attaque au sol.\nForce variable."
    it: "Attacco di terra:\npotenza variabile."
    de: "Boden-Angriff,\nIntensität Zufall."
    es: "Ataque de tierra.\nFuerza aleatoria."
mean_look:
  names:
    jp_kana: くろいまなざし
    en: MEAN LOOK
    fr: REGARD NOIR
    it: MALOSGUARDO
    de: HORRORBLICK
    es: MAL DE OJO
  descriptions:
    jp_kana: "てきを　じーっと　みていると　なぜか\nてきは　にげられなく　なってしまう"
    en: "Prevents fleeing\nor switching."
    fr: "Empêche fuite ou\nchangement."
    it: "Impedisce la fuga\ne il cambio."
    de: "Verhindert Flucht\noder Tausch."
    es: "Impide huir o\ncambiar."
meditate:
  names:
    jp_kana: ヨガのポーズ
    en: MEDITATE
    fr: YOGA
    it: MEDITAZIONE
    de: MEDITATION
    es: MEDITACIÓN
  descriptions:
    jp_kana: "ヨガのポーズで　ねむった　ちからを\nひきだし　こうげきを　あげる"
    en: "Raises the user’s\nATTACK."
    fr: "Monte l’ATTAQUE\ndu lanceur."
    it: "Potenzia l’ATTACCO\ndi chi lo usa."
    de: Erhöht ANGR-Wert.
    es: "Mejora el ATAQUE\nde quien lo usa."
mega_drain:
  names:
    jp_kana: メガドレイン
    en: MEGA DRAIN
    fr: MEGA-SANGSUE
    it: MEGASSORBIM.
    de: MEGASAUGER
    es: MEGA AGOTAR
  descriptions:
    jp_kana: "てきに　あたえた　ダメージの\nはんぶん　たいりょくを　かいふくする"
    en: "Steals 1/2 of the\ndamage inflicted."
    fr: "Vole 1/2 des dé-\ngâts infligés."
    it: "Ruba PS pari a\n1/2 del danno."
    de: "Erhält Hälfte des\nSchadens als KP."
    es: "Quita la mitad del\ndaño producido."
mega_kick:
  names:
    jp_kana: メガトンキック
    en: MEGA KICK
    fr: ULTIMAWASHI
    it: MEGACALCIO
    de: MEGAKICK
    es: MEGA PATADA
  descriptions:
    jp_kana: "ものすごい　ちからをこめた　キックで\nてきを　けっとばして　こうげき"
    en: "A powerful kicking\nattack."
    fr: "Coup de pied\npuissant."
    it: "Un potente\ncalcio."
    de: "Starke\nFuß-Attacke."
    es: "Una patada muy\npotente."
mega_punch:
  names:
    jp_kana: メガトンパンチ
    en: MEGA PUNCH
    fr: ULTIMAPOING
    it: MEGAPUGNO
    de: MEGAHIEB
    es: MEGA PUÑO
  descriptions:
    jp_kana: "ものすごい　ちからをこめた　パンチで\nてきを　なぐって　こうげき"
    en: "A powerful punch\nthrown very hard."
    fr: "Un coup de poing\ntrès puissant."
    it: "Un pugno dato\ncon molta potenza."
    de: "Ein kräftiger\nPunch."
    es: "Un puñetazo de\ngran potencia."
megahorn:
  names:
    jp_kana: メガホーン
    en: MEGAHORN
    fr: MEGACORNE
    it: MEGACORNO
    de: VIELENDER
    es: MEGACUERNO
  descriptions:
    jp_kana: "かたいツノを　ものすごい　いきおいで\nつきだして　こうげき"
    en: "A powerful charge\nattack."
    fr: "Une charge\npuissante."
    it: "Una potente\ncarica."
    de: Starke Attacke.
    es: "Ataque muy\npotente."
metal_claw:
  names:
    jp_kana: メタルクロー
    en: METAL CLAW
    fr: GRIFFE ACIER
    it: FERRARTIGLI
    de: METALLKLAUE
    es: GARRA-METAL
  descriptions:
    jp_kana: "かたいツメで　てきを　こうげき\nこうげきが　あがることがある"
    en: "An attack that may\nup user’s ATTACK."
    fr: "Peut monter l’AT-\nTAQUE du lanceur."
    it: "Può potenziare il\nproprio ATTACCO."
    de: "Hebt evtl. den\nANGR-Wert."
    es: "Puede aumentar tu\nATAQUE."
metronome:
  names:
    jp_kana: ゆびをふる
    en: METRONOME
    fr: METRONOME
    it: METRONOMO
    de: METRONOM
    es: METRÓNOMO
  descriptions:
    jp_kana: "ゆびを　ふって　のうを　しげきして\nいろんな　ワザを　ランダムでくりだす"
    en: "Randomly uses any\nPOKéMON move."
    fr: "Lance une capacité\nPOKéMON au hasard."
    it: "Usa una mossa\nPOKéMON a caso."
    de: "Wählt zufällige\nPOKéMON-Attacke."
    es: "Usa al azar un\nataque POKéMON."
milk_drink:
  names:
    jp_kana: ミルクのみ
    en: MILK DRINK
    fr: LAIT A BOIRE
    it: BUONLATTE
    de: MILCHGETRÄNK
    es: BATIDO
  descriptions:
    jp_kana: "キズついた　からだを　たいりょくの\nはんぶんだけ　かいふくする"
    en: "Restores HP by 1/2\nthe max HP."
    fr: "Restaure 1/2 PV\ndu max."
    it: "Restituisce 1/2\ndei PS max."
    de: "Füllt KP zur\nHälfte auf."
    es: "Restaura la mitad\nde los PS màximos."
mimic:
  names:
    jp_kana: ものまね
    en: MIMIC
    fr: COPIE
    it: MIMICA
    de: MIMIKRY
    es: MIMÉTICO
  descriptions:
    jp_kana: "てきが　つかった　わざが\nそのときだけ　じぶんの　わざになる"
    en: "Copies a move used\nby the foe."
    fr: "Copie une capaci-\nté de l’ennemi."
    it: "Imita la mossa\nusata dal nemico."
    de: "Ahmt Attacke des\nAngreifers nach."
    es: "Copia un ataque\ndel enemigo."
mind_reader:
  names:
    jp_kana: こころのめ
    en: MIND READER
    fr: LIRE-ESPRIT
    it: LEGGIMENTE
    de: WILLENSLESER
    es: TELÉPATA
  descriptions:
    jp_kana: "てきの　うごきを　こころで　かんじて\nつぎの　こうげきを　かならず　あてる"
    en: "Ensures the next\nattack will hit."
    fr: "Prochaine attaque\ntouche à coup sûr."
    it: "La mossa seguente\nandrà a segno."
    de: "Treffergarantie\nbeim Angriff."
    es: "Garantiza el éxito\ndel próximo golpe."
minimize:
  names:
    jp_kana: ちいさくなる
    en: MINIMIZE
    fr: LILLIPUT
    it: MINIMIZZ.
    de: KOMPRIMATOR
    es: REDUCCIÓN
  descriptions:
    jp_kana: "からだを　ちぢめて　ちいさくなり\nかいひりつを　あげる"
    en: "Heightens evasive-\nness."
    fr: Monte l’esquive.
    it: "Aumenta capacità\ndi elusione."
    de: "Fluchtwert nimmt\nzu."
    es: "Mejora habilidad\nde EVASIÓN."
mirror_coat:
  names:
    jp_kana: ミラーコート
    en: MIRROR COAT
    fr: VOILE MIROIR
    it: SPECCHIOVELO
    de: SPIEGELCAPE
    es: MANTO ESPEJO
  descriptions:
    jp_kana: "てきから　うけた　とくしゅこうげきの\nダメージを　ばいにして　かえす"
    en: "Counters a SPCL.\nATK move double."
    fr: "Contre ATQ.SPE.\nen frappe double."
    it: "Effetto mossa ATT.\nSPEC. raddoppia."
    de: "SPEZ-Attacke\nzählt doppelt."
    es: "Dobla un ATAQUE\nESPECIAL."
mirror_move:
  names:
    jp_kana: オウムがえし
    en: MIRROR MOVE
    fr: MIMIQUE
    it: SPECULMOSSA
    de: SPIEGELTRICK
    es: MOV. ESPEJO
  descriptions:
    jp_kana: "てきの　わざを　まねして\nおなじわざで　てきを　こうげき"
    en: "Counters with the\nsame move."
    fr: "Contre avec la mê-\nme capacité."
    it: "Contrattacca con\nla stessa mossa."
    de: "Kontert mit glei-\ncher Attacke."
    es: "Contraataca con\nel mismo ataque."
mist:
  names:
    jp_kana: しろいきり
    en: MIST
    fr: BRUME
    it: NEBBIA
    de: WEISSNEBEL
    es: NEBLINA
  descriptions:
    jp_kana: "しろいきりで　からだを　おおい\nのうりょくを　さげられないようにする"
    en: "Prevents stat\nreduction."
    fr: "Contre réduction\nde statut."
    it: "Previene riduzione\nstat."
    de: "Verhindert Status-\nveränderungen."
    es: "Evita reducción\nde caract."
moonlight:
  names:
    jp_kana: つきのひかり
    en: MOONLIGHT
    fr: RAYON LUNE
    it: LUCELUNARE
    de: MONDSCHEIN
    es: LUZ LUNAR
  descriptions:
    jp_kana: "たいりょくを　かいふくする\nじかんで　かいふくりょうが　かわる"
    en: "Restores HP\n(varies by time)."
    fr: "Restaure les PV\n(varie)."
    it: "Restituisce PS\n(varia con l’ora)."
    de: "Füllt KP auf.\n(Anzahl zufällig)"
    es: "Restaura PS (varía\ncon el tiempo)."
morning_sun:
  names:
    jp_kana: あさのひざし
    en: MORNING SUN
    fr: AURORE
    it: MATTINDORO
    de: MORGENGRAUEN
    es: SOL MATINAL
  descriptions:
    jp_kana: "たいりょくを　かいふくする\nじかんで　かいふくりょうが　かわる"
    en: "Restores HP\n(varies by time)."
    fr: "Restaure les PV\n(varie)."
    it: "Restituisce PS\n(varia con l’ora)."
    de: "Füllt KP auf.\n(Anzahl zufällig)"
    es: "Restaura PS (varía\ncon el tiempo)."
mud_slap:
  names:
    jp_kana: どろかけ
    en: MUD-SLAP
    fr: COUD’BOUE
    it: FANGOSBERLA
    de: LEHMSCHELLE
    es: BOFETÓN-LODO
  descriptions:
    jp_kana: "てきの　かおなどに　ドロをかけて\nめいちゅうりつを　さげさせる"
    en: "Reduces the foe’s\naccuracy."
    fr: "Baisse la préci-\nsion de la cible."
    it: "Riduce precisione\navversario."
    de: "Senkt Genauigkeit\ndes Gegners."
    es: "Baja la PRECISIÓN\ndel enemigo."
night_shade:
  names:
    jp_kana: ナイトヘッド
    en: NIGHT SHADE
    fr: TENEBRES
    it: OMBRA NOTT.
    de: NACHTNEBEL
    es: TINIEBLAS
  descriptions:
    jp_kana: "てきに　おそろしい　まぼろしを　みせ\nレベルぶんの　ダメージを　あたえる"
    en: "The user’s level\nequals damage HP."
    fr: "Niveau lanceur\négal aux dégâts."
    it: "Danno pari al liv.\ndi chi attacca."
    de: "Angreiferlevel\ngleich Schaden."
    es: "Tu nivel es igual\na los PS de daño."
nightmare:
  names:
    jp_kana: あくむ
    en: NIGHTMARE
    fr: CAUCHEMAR
    it: INCUBO
    de: NACHTMAHR
    es: PESADILLA
  descriptions:
    jp_kana: "てきが　ねてるあいだ　たいりょくを\nまいターン　４ぶんの１　へらしていく"
    en: "A sleeper loses\n1/4 HP every turn."
    fr: "Dormeur perd 1/4\ndes PV par tour."
    it: "Chi dorme perde\n1/4 PS per turno."
    de: "1/4 KP-Abzug für\nschlafende Gegner."
    es: "El dormido pierde\n1/4 PS por turno."
octazooka:
  names:
    jp_kana: オクタンほう
    en: OCTAZOOKA
    fr: OCTAZOOKA
    it: OCTAZOOKA
    de: OCTAZOOKA
    es: PULPOCAÑÓN
  descriptions:
    jp_kana: "すみの　かたまりを　はっしゃして\nめいちゅうりつを　さげさせる"
    en: "An attack that may\nreduce accuracy."
    fr: "Attaque pouvant\nbaisser précision."
    it: "Può ridurre\nprecisione."
    de: "Senkt evtl. die\nGenauigkeit."
    es: "Puede reducir la\nPRECISIÓN."
outrage:
  names:
    jp_kana: げきりん
    en: OUTRAGE
    fr: COLERE
    it: OLTRAGGIO
    de: WUTANFALL
    es: ENFADO
  descriptions:
    jp_kana: "２ー３ターンのあいだ　あばれつづける\nあばれたあとは　こんらんしてしまう"
    en: "Works 2-3 turns\nand confuses user."
    fr: "Pdt 2 à 3 tours\net rend confus."
    it: "Dura 2-3 turni ma\nconf. chi lo usa."
    de: "Wirkt 2-3 Runden.\nVerwir. Angreifer."
    es: "Dura 2 ó 3 turnos\ny te confunde."
pain_split:
  names:
    jp_kana: いたみわけ
    en: PAIN SPLIT
    fr: BALANCE
    it: MALCOMUNE
    de: LEIDTEILER
    es: DIVIDE DOLOR
  descriptions:
    jp_kana: "てきと　じぶんの　たいりょくを\nたして　それを　なかよく　わける"
    en: "Adds user & foe’s\nHPs. Shares total."
    fr: "Divise total de PV\ncible et lanceur."
    it: "Divide equamente i\nPS di entrambi."
    de: "Addiert alle KP\nund halbiert sie."
    es: "Une los PS de am-\nbos y los divide."
pay_day:
  names:
    jp_kana: ネコにこばん
    en: PAY DAY
    fr: JACKPOT
    it: GIORNO-PAGA
    de: ZAHLTAG
    es: DÍA DE PAGO
  descriptions:
    jp_kana: "こばんをなげて　てきを　こうげき\nせんとうごに　おかねが　てにはいる"
    en: "Throws coins. Gets\nthem back later."
    fr: "Lance des pièces,\nles gagne après."
    it: "Tira monete che\ndopo recupera."
    de: "Wirft Münzen. Wie-\ndererhalt später."
    es: "Arroja monedas que\nluego recupera."
peck:
  names:
    jp_kana: つつく
    en: PECK
    fr: PICPIC
    it: BECCATA
    de: SCHNABEL
    es: PICOTAZO
  descriptions:
    jp_kana: "くちばしなどを　つかって\nてきを　つついて　こうげき"
    en: "Jabs the foe with\na beak, etc."
    fr: "Frappe avec un\nbec, etc."
    it: "Colpisce con\nbeccate e altro."
    de: "Greift Gegner mit\nSchnabel an."
    es: "Ataca al enemigo\ncon el pico."
perish_song:
  names:
    jp_kana: ほろびのうた
    en: PERISH SONG
    fr: REQUIEM
    it: ULTIMOCANTO
    de: ABGESANG
    es: CANTO MORTAL
  descriptions:
    jp_kana: "きいた　ポケモンは　３ターンごに\nせんとうふのうに　なってしまう"
    en: "Both user and foe\nfaint in 3 turns."
    fr: "Lanceur et cible\nKO au 4ème tour."
    it: "Entrambi vanno KO\nin 3 turni."
    de: "Beide werden in 3\nRunden besiegt."
    es: "Tu rival y tù\ncaéis en 3 turnos."
petal_dance:
  names:
    jp_kana: はなびらのまい
    en: PETAL DANCE
    fr: DANSE-FLEUR
    it: PETALODANZA
    de: BLÄTTERTANZ
    es: DANZA PÉTALO
  descriptions:
    jp_kana: "２ー３ターンのあいだ　あばれつづける\nあばれたあとは　こんらんしてしまう"
    en: "Works 2-3 turns\nand confuses user."
    fr: "Dure 2 à 3 tours.\nLanceur confus."
    it: "Dura 2-3 turni ma\nconf. chi lo usa."
    de: "Hält 2-3 Runden.\nVerwir. Angreifer."
    es: "Dura 2-3 turnos\ny te confunde."
pin_missile:
  names:
    jp_kana: ミサイルばり
    en: PIN MISSILE
    fr: DARD-NUEE
    it: MISSILSPILLO
    de: NADELRAKETE
    es: PIN MISIL
  descriptions:
    jp_kana: "するどいハりを　てきに　はっしゃして\n２ー５かい　れんぞくで　こうげき"
    en: "Fires pins that\nstrike 2-5 times."
    fr: "Lance des dards\n2 à 5 fois."
    it: "Spilli di fuoco:\nda 2 a 5 colpi."
    de: "Trifft Gegner bis\nzu 5mal."
    es: "Lanza pùas que\nhieren 2-5 veces."
poison_gas:
  names:
    jp_kana: どくガス
    en: POISON GAS
    fr: GAZ TOXIK
    it: VELENOGAS
    de: GIFTWOLKE
    es: GAS VENENOSO
  descriptions:
    jp_kana: "どくガスを　てきに　ふきかけて\nどくをあたえる"
    en: "A move that may\npoison the foe."
    fr: "Capacité pouvant\nempoisonner."
    it: "Può causare\navvelenamento."
    de: "Gegner wird evtl.\nvergiftet."
    es: "Puede envenenar\nal enemigo."
poison_powder:
  names:
    jp_kana: どくのこな
    en: POISONPOWDER
    fr: POUDRE TOXIK
    it: VELENPOLVERE
    de: GIFTPUDER
    es: POLVO VENENO
  descriptions:
    jp_kana: "どくそを　ふくんだ　こなを　ふりまき\nてきに　どくをあたえる"
    en: "A move that may\npoison the foe."
    fr: "Capacité pouvant\nempoisonner."
    it: "Può causare\navvelenamento."
    de: "Gegner wird evtl.\nvergiftet."
    es: "Puede envenenar\nal enemigo."
poison_sting:
  names:
    jp_kana: どくばり
    en: POISON STING
    fr: DARD-VENIN
    it: VELENOSPINA
    de: GIFTSTACHEL
    es: PICOTAZO VEN
  descriptions:
    jp_kana: "どくのある　ハりや　ツノで　こうげき\nてきに　どくをあたえることがある"
    en: "An attack that may\npoison the target."
    fr: "Attaque pouvant\nempoisonner."
    it: "Può avvelenare\nl’avversario."
    de: "Angriff vergiftet\nGegner evtl."
    es: "Puede envenenar al\nenemigo."
pound:
  names:
    jp_kana: はたく
    en: POUND
    fr: ECRAS’FACE
    it: LIBBRA
    de: PFUND
    es: DESTRUCTOR
  descriptions:
    jp_kana: "てや　しっぽなどを　つかい\nてきを　はたいて　こうげき"
    en: "Pounds with fore-\nlegs or tail."
    fr: "Ecrase avec pattes\nou queue."
    it: "Colpo con arti\nant. o la coda."
    de: "Schlag mit Vorder-\nhuf oder Schwanz."
    es: "Golpea con las\npatas o la cola."
powder_snow:
  names:
    jp_kana: こなゆき
    en: POWDER SNOW
    fr: POUDREUSE
    it: POLNEVE
    de: PULVERSCHNEE
    es: NIEVE POLVO
  descriptions:
    jp_kana: "ゆきを　かぜにのせて　こうげき\nてきを　こおらせることがある"
    en: "An attack that may\ncause freezing."
    fr: "Attaque pouvant\ngeler."
    it: "Attacco che può\ncongelare."
    de: "Gegner wird evtl.\neingefroren."
    es: "Ataque que puede\ncongelar."
present:
  names:
    jp_kana: プレゼント
    en: PRESENT
    fr: CADEAU
    it: REGALINO
    de: GESCHENK
    es: PRESENTE
  descriptions:
    jp_kana: "てきに　ばくだんを　プレゼントする\nたまに　かいふくしてしまうことがある"
    en: "A bomb that may\nrestore HP."
    fr: "Bombe pouvant res-\ntaurer les PV."
    it: "Una bomba che può\nrestituire PS."
    de: "Bombe, die evtl.\nKP auffüllt."
    es: "Bomba que puede\nrestaurar PS."
protect:
  names:
    jp_kana: まもる
    en: PROTECT
    fr: ABRI
    it: PROTEZIONE
    de: SCHUTZSCHILD
    es: PROTECCIÓN
  descriptions:
    jp_kana: "そのターンの　こうげきを　うけない\nれんぞくで　だすと　しっぱいしやすい"
    en: "Foils attack that\nturn. It may fail."
    fr: "Peut déjouer l’at-\ntaque de ce tour."
    it: "Sventa un attacco.\nNon è infallibile."
    de: "1 Runde Schutz.\nWdh. fraglich."
    es: "Frustra el ataque.\nPuede fallar."
psybeam:
  names:
    jp_kana: サイケこうせん
    en: PSYBEAM
    fr: RAFALE PSY
    it: PSICORAGGIO
    de: PSYSTRAHL
    es: PSICO-RAYO
  descriptions:
    jp_kana: "ふしぎな　ひかりを　はっしゃする\nてきを　こんらんさせることがある"
    en: "An attack that may\nconfuse the foe."
    fr: "Attaque pouvant\nrendre confus."
    it: "Può confondere\nl’avversario."
    de: "Gegner wird evtl.\nverwirrt."
    es: "Ataque que puede\nconfundir a rival."
psych_up:
  names:
    jp_kana: じこあんじ
    en: PSYCH UP
    fr: BOOST
    it: PSICAMISÙ
    de: PSYCHO-PLUS
    es: MÁS PSIQUE
  descriptions:
    jp_kana: "てきに　かかっている　ほじょこうかを\nじぶんにも　かける"
    en: "Copies the foe’s\nstat changes."
    fr: "Copie le chang. de\nstat. de la cible."
    it: "Imita statistiche\nnemico."
