    fr: "Monte DEF. du lan-\nceur énormément."
    it: "Aumenta di molto\npropria DIFESA."
    de: "Hebt VERT-Wert des\nAngreifers enorm."
    es: "Aumenta bastante\ntu DEFENSA."
