      base_stats:
        hp: 80
        attack: 80
        defense: 50
        speed: 25
        special: 40
      types:
        - poison
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "ヘドロが　かたまって　うまれた。\nくさくて　さわることが　できないし\nとおったあとには　くさも　はえない。"
        en:
          yellow: "Made of hardened\nsludge. It smells\ntoo putrid to\ftouch.\nEven weeds won’t\ngrow in its path."
        fr:
          yellow: "Ce tas d’ordures\nconcentrées sent\ntrès mauvais.\fRien ne peut\npousser dans son\nsillage putride."
        it:
          yellow: "Formato da fanghi\nsolidificati emana\npuzzo di fogna.\fDove passa lui non\ncresce più neanche\nla gramigna."
        de:
          yellow: "SLEIMAS Körper\nbesteht aus\nIndustrieabfällen.\fWo dieses POKéMON\nhintritt, wächst\nkein Gras mehr!"
        es:
          yellow: "Está hecho de\nfango endurecido.\nHuele a pútrido.\f¡Por donde pasa,\nno crece la\nhierba!"
muk:
  species_id: 89
  names:
    jp_kana: ベトベトン
