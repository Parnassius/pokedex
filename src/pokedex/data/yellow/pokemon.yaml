        jp_kana:
          yellow: "くさむらから　いきなり　とびだして\nするどいカマで　きりさく　すがたは\nまるで　ニンジャの　ようだ。"
        en:
          yellow: "Leaps out of tall\ngrass and slices\nprey with its\fscythes. The move-\nment looks like\nthat of a ninja."
        fr:
          yellow: "Bondissant hors\nde l’herbe comme\nun ninja, il\flacère sa proie\nde ses griffes\nacérées."
        it:
          yellow: "Salta fuori dall’\nerba alta per\nfare a fettine\fle sue prede con\nmovimenti simili\na quelli ninja."
        de:
          yellow: "SICHLOR lebt im\ndichten Unterholz.\nFlink wie ein\fNinja greift es\nmit seinen sichel-\nförmigen Armen an."
