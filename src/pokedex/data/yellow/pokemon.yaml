          yellow: "Vive cerca de las\nplantas. Son\nraramente vistos,\fasí que se piensa\nque se están\nextinguiendo"
doduo:
  species_id: 84
  names:
    jp_kana: ドードー
    en: DODUO
    fr: DODUO
    it: DODUO
    de: DODU
    es: DODUO
