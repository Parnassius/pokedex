      held_items:
        common: silver_leaf
        rare: silver_leaf
      descriptions:
        jp_kana:
          yellow: "あたまのツノで　かわぞこにある\nいわを　くりぬき　すを　つくるのは\nオスの　やくめ　だ。"
        en:
          yellow: "It is the male’s\njob to make a\nnest by carving\fout boulders in a\nstream using the\nhorn on its head."
        fr:
          yellow: "Le mâle utilise\nla corne placée\nsur son front\fpour creuser un\nnid dans la\nrivière."
        it:
          yellow: "Questo POKéMON\nsi scava il nido\nin fondo al mare\fo sul letto di un\nfiume agitando\nil suo corno."
        de:
          yellow: "Dieses POKéMON\nschafft sich einen\nUnterschlupf,\findem es mit\nseinem Horn Steine\naushöhlt."
        es:
          yellow: "Este POKéMON\nhace sus nidos\ntallando cantos\fde riachuelo\ncon el cuerno\nde su cabeza"
staryu:
  species_id: 120
