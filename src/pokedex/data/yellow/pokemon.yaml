    onix:
      form_id: 0
      base_stats:
        hp: 35
        attack: 45
        defense: 160
        speed: 70
        special: 30
      types:
        - rock
        - ground
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "ちちゅうを　ものすごい　いきおいで\nほりすすみ　エサを　さがす。とおった\nあとは　ディグダの　すみかになる。"
        en:
          yellow: "Burrows at high\nspeed in search\nof food. The\ftunnels it leaves\nare used as homes\nby DIGLETTs."
        fr:
          yellow: "Il creuse sous\nterre en quête\nde nourriture.\fSes tunnels\nservent de maison\naux TAUPIQUEUR."
        it:
          yellow: "Scava veloce nel\nterreno in cerca\ndi cibo lasciando\flunghi cunicoli\nusati poi come\ncasa dai DIGLETT."
        de:
          yellow: "Dieses POKéMON\ngräbt auf seiner\nSuche nach Futter\flange Tunnel, in\ndenen sich später\nDIGDAS einnisten."
        es:
          yellow: "Cava a gran\nvelocidad en\nbusca de comida.\fLos túneles que\ndeja son usados\npor los DIGLETT"
drowzee:
  species_id: 96
  names:
    jp_kana: スリープ
