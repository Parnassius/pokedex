        fr:
          yellow: "Il provoque des\npannes de courant\ndans les\fcentrales en\nmangeant de\nl’électricité."
        it:
          yellow: "S’intrufola\nnelle centrali\nper cibarsi di\felettricità\ncausando così\ngravi black out."
        de:
