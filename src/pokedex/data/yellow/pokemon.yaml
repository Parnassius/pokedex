    drowzee:
      form_id: 0
      base_stats:
        hp: 60
        attack: 48
        defense: 45
        speed: 42
        special: 90
      types:
        - psychic
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "いつも　いっしょに　ねむってみると\nときどき　むかし　たべたユメを\nみせてくれる　よるがある。"
        en:
          yellow: "If you sleep by\nit all the time,\nit will sometimes\fshow you dreams\nit has eaten in\nthe past."
        fr:
          yellow: "Si vous dormez\nprès de lui, il\ninfluencera vos\frêves avec les\nsonges qu’il a\ndévorés."
        it:
          yellow: "Tenendolo vicino\nè probabile che\nDROWZEE ti faccia\fvedere i sogni\nche ha mangiato\nin passato."
        de:
          yellow: "Wenn man nett zu\nTRAUMATO ist,\nzeigt es\fmanchmal Träume,\ndie es zuvor\ngefressen hat."
        es:
          yellow: "Si duermes cerca\nde uno todo el\ntiempo, en alguna\focasión podrás\nver sueños que se\nhaya comido antes"
hypno:
  species_id: 97
  names:
    jp_kana: スリーパー
    en: HYPNO
    fr: HYPNOMADE
    it: HYPNO
    de: HYPNO
    es: HYPNO
  forms:
    hypno:
      form_id: 0
      base_stats:
        hp: 85
        attack: 73
        defense: 70
        speed: 67
        special: 115
      types:
        - psychic
      held_items:
        common: gold_leaf
        rare: gold_leaf
      descriptions:
        jp_kana:
          yellow: "うっかり　であったときは　めを\nそらさないと　きけん。てに　もった\nふりこで　ねむらされてしまう。"
        en:
          yellow: "Avoid eye contact\nif you come across\none. It will try\fto put you to\nsleep by using\nits pendulum."
        fr:
          yellow: "Evitez son regard\nquand vous en\ncroisez un, ou il\fessayera de vous\nhypnotiser avec\nson pendule."
        it:
          yellow: "Se lo incontri\nevita il contatto\nvisivo, poiché\fcercherà di\nipnotizzarti con\nil suo pendolo."
        de:
          yellow: "Man sollte den\nAugenkontakt mit\ndiesem POKéMON\fvermeiden. Mit\nseinem Pendel kann\nes hypnotisieren."
        es:
          yellow: "Intenta evitar\ncualquier tipo de\ncontacto visual\fcon este POKéMON.\nPuede hipnotizar\ncon su péndulo"
krabby:
  species_id: 98
  names:
    jp_kana: クラブ
    en: KRABBY
    fr: KRABBY
    it: KRABBY
    de: KRABBY
    es: KRABBY
  forms:
    krabby:
      form_id: 0
      base_stats:
        hp: 30
        attack: 105
        defense: 90
        speed: 50
        special: 25
      types:
        - water
      held_items:
        common: tm033
        rare: tm033
      descriptions:
        jp_kana:
          yellow: "きょうりょくな　ぶきとなる　ハサミは\nこうげきのとき　まれに　もげるが\nあとから　すぐに　はえてくる。"
        en:
          yellow: "Its pincers are\nsuperb weapons.\nThey sometimes\fbreak off during\nbattle, but they\ngrow back fast."
        fr:
          yellow: "Ses pinces sont\nde puissantes\narmes. Si une\fse casse durant\nun combat,elle\nrepoussera vite."
        it:
          yellow: "Le sue chele sono\narmi formidabili.\nSe si rompono\fdurante la lotta\nricrescono\nimmediatamente."
        de:
          yellow: "Die Scheren dieses\nPOKéMON bilden\nperfekte Waffen.\fBrechen sie ab,\nso wachsen sie\nwieder nach."
        es:
          yellow: "Sus pinzas son\narmas perfectas.\nEn alguna ocasión\fpueden romperse\nen combate, pero\ncrecerán rápido"
kingler:
  species_id: 99
  names:
    jp_kana: キングラー
    en: KINGLER
    fr: KRABBOSS
    it: KINGLER
    de: KINGLER
    es: KINGLER
  forms:
    kingler:
      form_id: 0
      base_stats:
        hp: 55
        attack: 130
        defense: 115
        speed: 75
        special: 50
      types:
        - water
      held_items:
        common: silver_leaf
        rare: silver_leaf
      descriptions:
        jp_kana:
          yellow: "かたほうだけ　きょだいか　した\nハサミは　こうてつの　かたさと\n１まんばりきを　もつが　おもすぎる。"
        en:
          yellow: "One claw grew\nmassively and as\nhard as steel.\fIt has 10,000-HP\nstrength. However,\nit is too heavy."
        fr:
          yellow: "Sa pince, grosse\net dure comme de\nl’acier, peut\fdéployer une\npression de\n100 tonnes."
        it:
          yellow: "Le sue enormi\nchele sono dure\ncome l’acciaio.\fHa un’incredibile\nforza, ma è\ntroppo pesante."
        de:
          yellow: "Die große Schere\ndieses POKéMON ist\nhart wie Stahl.\fKINGLER ist sehr\nstark, aber auch\nsehr schwerfällig."
        es:
          yellow: "Una de sus pinzas\ncrece más que la\notra, y es dura\fcomo el acero.\nDe todos modos,\npesa demasiado"
voltorb:
  species_id: 100
  names:
    jp_kana: ビリリダマ
    en: VOLTORB
    fr: VOLTORBE
    it: VOLTORB
    de: VOLTOBAL
    es: VOLTORB
