        attack: 45
        defense: 55
        speed: 85
        special: 70
      types:
        - water
      held_items:
        common: tm033
        rare: tm033
      descriptions:
        jp_kana:
          yellow: "からだの　ちゅうしんぶぶん　さえ\nのこっていれば　どんなに　こまかく\nきられても　さいせいするという。"
        en:
          yellow: "As long as the\ncenter section is\nunharmed, it can\fgrow back fully\neven if it is\nchopped to bits."
        fr:
          yellow: "Tant que sa\npartie centrale\nest indemne, il\fpeut régénérer\nles parties de\nson corps."
        it:
          yellow: "Se non ne viene\ndanneggiato\nil centro può\frigenerare tutte\nle appendici\nperse lottando."
        de:
          yellow: "Solange STERNDUS\nKernstück\nunversehrt bleibt,\fverfügt es über\nexzellente Selbst-\nheilungskräfte."
        es:
          yellow: "Mientras su parte\ncentral se\nmantenga intacta,\fcrecerá de nuevo\naunque haya sido\ndestrozado"
starmie:
  species_id: 121
