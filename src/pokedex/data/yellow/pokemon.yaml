        fr:
          yellow: "Il bouge en\nrythme comme s’il\ndansait.\fIl ondule du\npopotin quand\nil marche."
        it:
          yellow: "Sembra muoversi\ncon un ritmo\ntutto suo, come\fse danzasse.\nAncheggia\nmentre cammina."
        de:
          yellow: "Dieses POKéMON\nbewegt sich nach\neinem besonderen\fRhythmus.\nDabei schwingt es\nmit den Hüften."
