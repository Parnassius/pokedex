    eevee:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 50
        speed: 55
        special: 65
      types:
        - normal
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "アンバランスな　いでんしによって\nしんかの　かのうせいに　あふれる。\nただ　せいぞんすうが　すくない。"
