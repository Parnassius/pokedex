        jp_kana:
          yellow: "ふるくなって　だれも　すまなくなった\nたてものに　はっせいするらしい。\nかたちは　あいまいで　ガスのよう。"
        en:
          yellow: "Said to appear in\ndecrepit, deserted\nbuildings. It has\fno real shape as\nit appears to be\nmade of a gas."
        fr:
          yellow: "On en trouve dans\nles maisons en\nruine. Il n’a\fpas de forme bien\ndéfinie car il\nest fait de gaz."
        it:
          yellow: "Si dice che appaia\nin case diroccate\ne deserte. Non\fha una forma vera\ne propria poiché\nè fatto di gas."
        de:
          yellow: "NEBULAK lebt in\nGeister-Häusern\nund Ruinen.\fSein Körper hat\nkeine feste Form\noder Gestalt."
        es:
          yellow: "Sólo aparece en\nedificios en\nruinas. No tiene\fforma real, ya\nque parece que\nestá hecho de gas"
haunter:
  species_id: 93
  names:
    jp_kana: ゴースト
