      base_stats:
        hp: 35
        attack: 85
        defense: 45
        speed: 75
        special: 35
      types:
        - normal
        - flying
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "はねは　みじかく　そらをとぶのは\nにがてだが　そのかわり　はったつした\nあしで　はやく　かけることができる。"
        en:
          yellow: "Its short wings\nmake flying dif-\nficult. Instead,\fthis POKéMON runs\nat high speed on\ndeveloped legs."
        fr:
          yellow: "Ses petites ailes\nne lui permettent\npas de voler,\fmais il peut\ncourir très\nrapidement."
        it:
          yellow: "Le cortissime ali\nnon gli permettono\ndi volare. Può\ftuttavia correre\nvelocissimo sulle\nzampe sviluppate."
        de:
          yellow: "Dieses POKéMON\nkann nicht gerade\ngut fliegen.\fDafür kann es mit\nseinen Beinen sehr\nschnell laufen."
        es:
          yellow: "Sus cortas alas\nlo hacen volar\ncon dificultad.\fDe todos modos,\npuede correr a\ngran velocidad"
dodrio:
  species_id: 85
  names:
    jp_kana: ドードリオ
