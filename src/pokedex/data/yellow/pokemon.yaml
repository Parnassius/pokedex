        de:
          yellow: "Zur Paarungszeit\nströmen ganze\nSchwärme dieses\fPOKéMON in die\nSeen und Flüsse,\num Eier zu legen."
        es:
          yellow: "En su época de\npuesta de huevos,\nsuelen ser vistos\fnadando por ríos\ncontracorriente\nen grandes grupos"
seaking:
  species_id: 119
