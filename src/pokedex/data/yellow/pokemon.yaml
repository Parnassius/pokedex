        defense: 75
        speed: 50
        special: 65
      types:
        - poison
      held_items:
        common: gold_leaf
        rare: gold_leaf
      descriptions:
        jp_kana:
          yellow: "とっても　くさい！　きぜつするほど\nきょうれつだが　べトベトンは　はなが\nたいかして　においを　かんじない。"
        en:
          yellow: "Smells so awful,\nit can cause\nfainting. Through\fdegeneration, it\nlost its sense of\nsmell."
        fr:
          yellow: "Son odeur immonde\nprovoque des\névanouissements.\fSon odorat s’est\natrophié par sa\npropre puanteur."
        it:
          yellow: "Il suo fetore così\nnauseante causa\nsvenimenti e lui\fstesso ha perso\nnel tempo il senso\ndell’olfatto."
        de:
          yellow: "Dieses POKéMON\nverbreitet einen\nso erbärmlichen\fGestank, daß es\nsich selbst nicht\nmehr riechen kann."
        es:
          yellow: "Huele tan mal que\npuede provocar\ndesmayos. Ha\fdegenerado tanto,\nque ya ni él\nmismo se huele"
shellder:
  species_id: 90
  names:
    jp_kana: シェルダー
