        en:
          yellow: "Born in an active\nvolcano. Its body\nis always cloaked\fin flames, so it\nlooks like a big\nball of fire."
        fr:
          yellow: "Né dans un\nvolcan en fusion,\nson corps est\frecouvert de\nflammes, comme\nune boule de feu."
        it:
          yellow: "Nato in un vulcano\nattivo il suo\ncorpo è coperto\fdi fiamme tanto\nda sembrare una\npalla di fuoco."
        de:
          yellow: "Dieses POKéMON\nentstammt einem\naktiven Vulkan.\fGanz in Flammen\ngehüllt gleicht es\neinem Feuerball."
