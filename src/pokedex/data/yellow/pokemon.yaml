  forms:
    gengar:
      form_id: 0
      base_stats:
        hp: 60
        attack: 65
        defense: 60
        speed: 110
        special: 130
      types:
        - ghost
        - poison
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "とつぜん　さむけを　かんじるとき\nゲンガーが　ちかくにいる。もしかして\nのろいを　かけるかも　しれない。"
        en:
          yellow: "A GENGAR is close\nby if you feel a\nsudden chill.\fIt may be trying\nto lay a curse\non you."
        fr:
          yellow: "Quand il lance\nune malédiction,\nil émet une aura\fmalveillante qui\nprovoque des\nfrissons."
        it:
          yellow: "Un alito gelido\nannuncia l’arrivo\ndi GENGAR.\fAttacca le vittime\ncon orribili\nmaledizioni."
        de:
          yellow: "Ein plötzlicher\nLuftzug kündigt\nGENGARS Besuch an.\fEs belegt seine\nOpfer mit furcht-\nbaren Flüchen."
        es:
          yellow: "Sabrás que un\nGENGAR está cerca\ncuando sufras de\fsudores fríos.\nIntentará echarte\nun hechizo"
onix:
  species_id: 95
  names:
    jp_kana: イワーク
    en: ONIX
