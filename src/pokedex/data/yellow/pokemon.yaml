        en:
          yellow: "A rowdy POKéMON\nwith a lot of\nstamina. Once\frunning, it won’t\nstop until it hits\nsomething."
        fr:
          yellow: "C’est un POKéMON\ntrès endurant.\nIl n’achève sa\fcharge qu’une\nfois sa cible\npulvérisée."
        it:
          yellow: "Questo POKéMON\nforte e violento\ncorre travolgendo\fogni cosa. Solo\nun vero ostacolo\npuò fermarlo."
        de:
          yellow: "Dieses POKéMON\nstrotzt nur so vor\nKraft. Läuft es\ferst einmal, dann\nkann es nur ein\nHindernis stoppen."
        es:
          yellow: "Un rudo POKéMON\nrepleto de\nenergía vital.\fCuando corre, no\npara hasta que\nchoca con algo"
magikarp:
  species_id: 129
