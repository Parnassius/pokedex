        - psychic
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "パントマイムが　とくいで　いつでも\nれんしゅう　している。ないものでも\nそこに　あると　しんじこませる。"
        en:
          yellow: "Always practices\nits pantomime act.\nIt makes enemies\fbelieve something\nexists that\nreally doesn’t."
        fr:
          yellow: "Il est toujours\nen train de mimer.\nIl leurre ses\fennemis en\nmimant des\nactions irréelles."
        it:
          yellow: "La sua pantomima\nconfonde i nemici\nche credono di\fvedere qualcosa\nche in realtà\nnon esiste."
        de:
          yellow: "PANTIMOS verwirrt\nGegner durch sein\nMienenspiel.\fSie glauben, Dinge\nzu sehen, die gar\nnicht existieren."
