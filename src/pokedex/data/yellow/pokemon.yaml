        jp_kana:
          yellow: "やばんで　はかいてきな　せいかく。\nおおむかし　まちを　やきつくした\nきろくがある　きょうふのポケモン。"
        en:
          yellow: "Brutally vicious\nand enormously\ndestructive.\fKnown for totally\ndestroying cities\nin ancient times."
        fr:
          yellow: "Brutal, vicieux\net dangereux, il\nest connu pour\favoir rasé des\nvilles entières\npar le passé."
        it:
          yellow: "Questo POKéMON è\nbrutale e feroce.\nFamoso per aver\fraso al suolo\nin passato\nintere città."
        de:
          yellow: "Dieses POKéMON\nist ungeheuer\nzerstörungwütig.\fEs hat schon ganze\nStädte in Schutt\nund Asche gelegt."
        es:
          yellow: "Este POKéMON es\nenormemente \ndestructivo.\fEn la antigüedad,\nera conocido por\ndestruir ciudades"
lapras:
  species_id: 131
  names:
    jp_kana: ラプラス
