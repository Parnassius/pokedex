bulbasaur:
  species_id: 1
  names:
    jp_kana: フシギダネ
    en: BULBASAUR
    fr: BULBIZARRE
    it: BULBASAUR
    de: BISASAM
    es: BULBASAUR
  forms:
    bulbasaur:
      form_id: 0
      base_stats:
        hp: 45
        attack: 49
        defense: 49
        speed: 45
        special: 65
      types:
        - grass
        - poison
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "なんにちだって　なにも　たべなくても\nげんき！　せなかのタネに　たくさん\nえいようが　あるから　へいきだ！"
        en:
          yellow: "It can go for days\nwithout eating a\nsingle morsel.\fIn the bulb on\nits back, it\nstores energy."
        fr:
          yellow: "Il peut survivre\nplusieurs jours\nsans manger.\fLe bulbe sur son\ndos emmagasine de\nl’énergie."
        it:
          yellow: "Questo POKéMON\npuò stare a lungo\nsenza nutrimento.\fAccumula energia\nnel bulbo che ha\nsulla schiena."
        de:
          yellow: "Dieses POKéMON\nkommt sehr lange\nohne Nahrung aus.\fDie Knolle auf\nseinem Rücken\nspeichert Energie."
        es:
          yellow: "Puede sobrevivir\nlargo tiempo sin\nprobar bocado.\fGuarda energía\nen el bulbo de\nsu espalda"
ivysaur:
  species_id: 2
  names:
    jp_kana: フシギソウ
    en: IVYSAUR
    fr: HERBIZARRE
    it: IVYSAUR
    de: BISAKNOSP
    es: IVYSAUR
  forms:
    ivysaur:
      form_id: 0
      base_stats:
        hp: 60
        attack: 62
        defense: 63
        speed: 60
        special: 80
      types:
        - grass
        - poison
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "ようぶんを　とって　おおきくなった\nつぼみから　かおりが　ただよいだすと\nもうすぐ　ハナがひらく　しょうこだ。"
        en:
          yellow: "The bulb on its\nback grows by\ndrawing energy.\fIt gives off an\naroma when it is\nready to bloom."
        fr:
          yellow: "En emmagasinant\nde l’énergie, son\nbulbe grossit.\fIl en émane un\narôme quand il va\néclore."
        it:
          yellow: "Assorbendo energia\nil suo bulbo\ncresce.\fAl momento della\nfioritura emana\nun forte profumo."
        de:
          yellow: "Die Knospe auf\ndem Rücken wächst\ndurch absorbierte\fEnergie. Kurz vor\nder Blüte sondert\nsie einen Duft ab."
        es:
          yellow: "Su bulbo crece\ncuando absorbe\nenergía.\fDesprende un\nfuerte aroma\ncuando florece"
venusaur:
  species_id: 3
  names:
    jp_kana: フシギバナ
    en: VENUSAUR
    fr: FLORIZARRE
    it: VENUSAUR
    de: BISAFLOR
    es: VENUSAUR
  forms:
    venusaur:
      form_id: 0
      base_stats:
        hp: 80
        attack: 82
        defense: 83
        speed: 80
        special: 100
      types:
        - grass
        - poison
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "せなかに　はえた　おおきな　ハナは\nたいようの　ひかりを　きゅうしゅうし\nエネルギーに　へんかん　できる。"
        en:
          yellow: "The flower on its\nback catches the\nsun’s rays.\fThe sunlight is\nthen absorbed and\nused for energy."
        fr:
          yellow: "Les pétales de\nsa fleur dorsale\nabsorbent les\frayons du soleil\npour en faire de\nl’énergie."
        it:
          yellow: "Il fiore che porta\nsulla schiena\ncattura i raggi\fsolari, li assorbe\ne li trasforma\nin energia."
        de:
          yellow: "Die Blume auf dem\nRücken dieses\nPOKéMON absorbiert\fdas Sonnenlicht\nund wandelt es in\nEnergie um."
        es:
          yellow: "La flor de su\nespalda recoge\nlos rayos del\fSol. Los\ntransforma en\nenergía"
charmander:
  species_id: 4
  names:
    jp_kana: ヒトカゲ
    en: CHARMANDER
    fr: SALAMECHE
    it: CHARMANDER
    de: GLUMANDA
    es: CHARMANDER
  forms:
    charmander:
      form_id: 0
      base_stats:
        hp: 39
        attack: 52
        defense: 43
        speed: 65
        special: 50
      types:
        - fire
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "しずかな　ところに　つれていくと\nシッポが　もえてる　ちいさな\nおとが　きこえてくるよ。"
        en:
          yellow: "The flame at the\ntip of its tail\nmakes a sound as\fit burns. You can\nonly hear it in\nquiet places."
        fr:
          yellow: "La flammèche au\nbout de sa queue\német un son\fcrépitant audible\nseulement dans\nun endroit calme."
        it:
          yellow: "Nel silenzio più\nassoluto si può\nudire la fiamma\fin cima alla sua\ncoda scoppiettare\nbruciando."
        de:
          yellow: "An sehr stillen\nOrten kann man\ndie brennende\fSchwanzspitze\ndieses POKéMON\nlodern hören."
        es:
          yellow: "La llama en la\npunta de su cola\nchisporrotea al\farder. Sólo se\noye en lugares\nsilenciosos"
charmeleon:
  species_id: 5
  names:
    jp_kana: リザード
    en: CHARMELEON
    fr: REPTINCEL
    it: CHARMELEON
    de: GLUTEXO
    es: CHARMELEON
  forms:
    charmeleon:
      form_id: 0
      base_stats:
        hp: 58
        attack: 64
        defense: 58
        speed: 80
        special: 65
      types:
        - fire
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "きょうてきと　たたかいつづけ\nエキサイトすると　あおじろい\nほのおを　はきだすことがある。"
        en:
          yellow: "Tough fights could\nexcite this\nPOKéMON. When\fexcited, it may\nblow out bluish-\nwhite flames."
        fr:
          yellow: "Ce POKéMON est\nviolent. Dans la\nfurie d’un combat\fson aura brille\nd’une flamme\nbleutée."
        it:
          yellow: "Si innervosisce\ndurante le lotte\npiù dure e\ftalvolta sputa\nfiamme blu e\nbianche."
        de:
          yellow: "Verfällt dieses\nPOKéMON in\nAufregung, so\fspuckt es\ngleißend helle\nFlammen."
        es:
          yellow: "Las duras luchas\nexcitan a este\nPOKéMON.\fEntonces, lanzará\nllamaradas\nblanco-azuladas"
charizard:
  species_id: 6
  names:
    jp_kana: リザードン
    en: CHARIZARD
    fr: DRACAUFEU
    it: CHARIZARD
    de: GLURAK
    es: CHARIZARD
  forms:
    charizard:
      form_id: 0
      base_stats:
        hp: 78
        attack: 84
        defense: 78
        speed: 100
        special: 85
      types:
        - fire
        - flying
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "くちから　しゃくねつの　ほのおを\nはきだすとき　シッポのさきは\nより　あかく　はげしく　もえあがる。"
        en:
          yellow: "When expelling a\nblast of super\nhot fire, the red\fflame at the tip\nof its tail burns\nmore intensely."
        fr:
          yellow: "Quand il crache\nson souffle\nbrûlant, la\fflamme au bout de\nsa queue\ns’embrase."
        it:
          yellow: "Quando emette le\nsue lingue di\nfuoco, la fiamma\frossa sulla punta\ndella coda brucia\npiù intensamente."
        de:
          yellow: "Wenn dieses\nPOKéMON einen\nStrahl glühenden\fFeuers speit,\nleuchtet seine\nSchwanzspitze auf."
        es:
          yellow: "Cuando lanza una\ndescarga de fuego\nsúper caliente,\fla roja llama de\nsu cola brilla\nmás intensamente"
squirtle:
  species_id: 7
  names:
    jp_kana: ゼニガメ
    en: SQUIRTLE
    fr: CARAPUCE
    it: SQUIRTLE
    de: SCHIGGY
    es: SQUIRTLE
  forms:
    squirtle:
      form_id: 0
      base_stats:
        hp: 44
        attack: 48
        defense: 65
        speed: 43
        special: 50
      types:
        - water
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "すいめんから　みずを　ふんしゃして\nエサをとる。あぶなくなると　こうらに\nてあしを　ひっこめて　みをまもる。"
        en:
          yellow: "Shoots water at\nprey while in the\nwater.\fWithdraws into\nits shell when in\ndanger."
        fr:
          yellow: "Caché sous l’eau,\nil crache un jet\nd’eau sur sa\fproie et se cache\nà l’intérieur de\nsa coquille."
        it:
          yellow: "Attacca i nemici\ncon potenti getti\nd’acqua. Se si\fsente in pericolo\nsi ritira dentro\nla sua corazza."
        de:
          yellow: "Dieses POKéMON\njagt mit einem\nWasserstrahl.\fBei Gefahr zieht\nes sich in seinen\nPanzer zurück."
        es:
          yellow: "Lanza agua a su\npresa desde el\nagua.\fSe esconde en su\nconcha cuando se\nsiente en peligro"
wartortle:
  species_id: 8
  names:
    jp_kana: カメール
    en: WARTORTLE
    fr: CARABAFFE
    it: WARTORTLE
    de: SCHILLOK
    es: WARTORTLE
  forms:
    wartortle:
      form_id: 0
      base_stats:
        hp: 59
        attack: 63
        defense: 80
        speed: 58
        special: 65
      types:
        - water
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "ポカンと　あたまを　たたかれるとき\nこうらに　ひっこんで　よける。でも\nちょっとだけ　シッポが　でているよ。"
        en:
          yellow: "When tapped, this\nPOKéMON will pull\nin its head, but\fits tail will\nstill stick out a\nlittle bit."
        fr:
          yellow: "Attaqué, il\ncache sa tête\ndans sa carapace,\fmais son corps\ntrop gros ne peut\ny tenir en entier."
        it:
          yellow: "Quando si sente\nminacciato ritira\nla testa nella\fcorazza, mentre\nla coda sporge\nsempre un po’."
        de:
          yellow: "Bei Gefahr zieht\ndieses POKéMON\nseinen Kopf ein.\fDie Schwanzspitze\nragt jedoch aus\ndem Panzer heraus."
        es:
          yellow: "Si es golpeado,\nesconderá su\ncabeza.\fAun así, su\ncola puede\nseguir golpeando"
blastoise:
  species_id: 9
  names:
    jp_kana: カメックス
    en: BLASTOISE
    fr: TORTANK
    it: BLASTOISE
    de: TURTOK
    es: BLASTOISE
  forms:
    blastoise:
      form_id: 0
      base_stats:
        hp: 79
        attack: 83
        defense: 100
        speed: 78
        special: 85
      types:
        - water
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "あいてに　ねらいを　さだめると\nしょうぼうしゃの　ホースより\nつよい　いきおいで　みずを　だす。"
        en:
          yellow: "Once it takes aim\nat its enemy, it\nblasts out water\fwith even more\nforce than a fire\nhose."
        fr:
          yellow: "Une fois sa cible\nalignée, il\nprojette des jets\fd’eau plus\npuissants qu’une\nlance à incendie."
        it:
          yellow: "Dopo aver preso\nla mira colpisce\nil nemico con\fgetti d’acqua\npiù potenti\ndi un idrante."
        de:
          yellow: "Nachdem dieses\nPOKéMON einen\nGegner anvisiert\fhat, attackiert\nes mit einem Hoch-\ndruckwasserstrahl."
        es:
          yellow: "Cuando ataca a\nun enemigo, su\ndescarga de agua\fes aún más\npotente que una\nmanga de bombero"
caterpie:
  species_id: 10
  names:
    jp_kana: キャタピー
    en: CATERPIE
    fr: CHENIPAN
    it: CATERPIE
    de: RAUPY
    es: CATERPIE
  forms:
    caterpie:
      form_id: 0
      base_stats:
        hp: 45
        attack: 30
        defense: 35
        speed: 45
        special: 20
      types:
        - bug
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "あたまの　さきにある　しょっかくに\nふれると　きょうれつな　においを\nだして　みを　まもろうとする。"
        en:
          yellow: "If you touch the\nfeeler on top of\nits head, it will\frelease a horrible\nstink to protect\nitself."
        fr:
          yellow: "Quand on touche\nl’appendice sur\nson front, il\fsécrète un gaz\npuant pour se\nprotéger."
        it:
          yellow: "Se gli si tocca\nil sensore che ha\nsulla testa, si\fdifende emettendo\nun odore\ninsopportabile."
        de:
          yellow: "Berührt man die\nFühler auf dem\nKopf dieses\fPOKéMON, so\nsondert es einen\nekligen Geruch ab."
        es:
          yellow: "Si tocas los\nreceptores de\nsu cabeza,\fsoltará un\nterrible olor\npara protegerse"
metapod:
  species_id: 11
  names:
    jp_kana: トランセル
    en: METAPOD
    fr: CHRYSACIER
    it: METAPOD
    de: SAFCON
    es: METAPOD
  forms:
    metapod:
      form_id: 0
      base_stats:
        hp: 50
        attack: 20
        defense: 55
        speed: 30
        special: 25
      types:
        - bug
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "みをまもるため　ひたすら　カラを\nかたくしても　つよい　しょうげきを\nうけると　なかみが　でてしまう。"
        en:
          yellow: "Hardens its shell\nto protect itself.\nHowever, a large\fimpact may cause\nit to pop out of\nits shell."
        fr:
          yellow: "Il renforce sa\ncarapace pour se\nprotéger. Mais\fun coup puissant\npeut le déloger\nde son armure."
        it:
          yellow: "Per difendersi\nindurisce la\ncorazza, ma un\fcolpo violento\npuò scaraventarlo\nfuori dal guscio."
        de:
          yellow: "Dieses POKéMON\nkann zum Schutz\nseinen Panzer\ferhärten. Es kann\ndennoch nicht alle\nAttacken abwehren."
        es:
          yellow: "Endurece su\nconcha para\nprotegerse. De\ftodos modos, un\ngran impacto\npuede afectarle"
butterfree:
  species_id: 12
  names:
    jp_kana: バタフリー
    en: BUTTERFREE
    fr: PAPILUSION
    it: BUTTERFREE
    de: SMETTBO
    es: BUTTERFREE
  forms:
    butterfree:
      form_id: 0
      base_stats:
        hp: 60
        attack: 45
        defense: 50
        speed: 70
        special: 80
      types:
        - bug
        - flying
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "ハネの　もうどくの　りんぷんには\nみずをはじく　せいしつが　あるので\nあめのひ　でも　とびまわれる。"
        en:
          yellow: "Its wings, covered\nwith poisonous\npowders, repel\fwater. This\nallows it to fly\nin the rain."
        fr:
          yellow: "Ses ailes sont\nenduites d’une\npoudre toxique\fimperméable.\nIl peut voler\nsous la pluie."
        it:
          yellow: "Possiede ali\nidrorepellenti\nricoperte da una\fpolvere velenosa.\nPuò volare anche\nquando piove."
        de:
          yellow: "Die Flügel dieses\nPOKéMON sind\nwasserabweisend\fund von einer\ngiftigen Staub-\nschicht bedeckt."
        es:
          yellow: "Sus alas están\ncubiertas de\npolvos venenosos.\fComo repelen el\nagua, puede volar\nbajo la lluvia"
weedle:
  species_id: 13
  names:
    jp_kana: ビードル
    en: WEEDLE
    fr: ASPICOT
    it: WEEDLE
    de: HORNLIU
    es: WEEDLE
  forms:
    weedle:
      form_id: 0
      base_stats:
        hp: 40
        attack: 35
        defense: 30
        speed: 50
        special: 20
      types:
        - bug
        - poison
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "あたまに　するどい　ハりを　もつ。\nもりや　くさちの　しげみに　かくれ\nひたすら　ハッパを　たべている。"
        en:
          yellow: "Beware of the\nsharp stinger on\nits head. It\fhides in grass\nand bushes where\nit eats leaves."
        fr:
          yellow: "Prenez garde à la\npique empoisonnée\nsur son front.\fIl se cache dans\nles buissons et\nles hautes herbes."
        it:
          yellow: "Ha un pungiglione\naffilato sul capo.\nVive tra l’erba\falta e i cespugli\ndove si nutre\ndi foglie."
        de:
          yellow: "Dieses POKéMON\nverfügt über einen\nspitzen Stachel.\fMan findet es\nmeist auf Wiesen\nund Feldern."
        es:
          yellow: "Cuidado con el\naguijón venenoso\nde su cabeza.\fSe esconde en la\nhierba y arbustos\nmientras come"
kakuna:
  species_id: 14
  names:
    jp_kana: コクーン
    en: KAKUNA
    fr: COCONFORT
    it: KAKUNA
    de: KOKUNA
    es: KAKUNA
  forms:
    kakuna:
      form_id: 0
      base_stats:
        hp: 45
        attack: 25
        defense: 50
        speed: 35
        special: 25
      types:
        - bug
        - poison
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "じぶんでは　ほとんど　うごけないが\nあぶなくなると　ハりをだして\nどくを　あたえることも　あるらしい。"
        en:
          yellow: "Able to move only\nslightly. When\nendangered, it\fmay stick out its\nstinger and poison\nits enemy."
        fr:
          yellow: "Il se déplace\ntrès lentement.\nMenacé, il sort\fson aiguillon\net empoisonne ses\nennemis."
        it:
          yellow: "Si muove molto\nlentamente. Se si\nsente minacciato\favvelena il nemico\ncon il suo \npungiglione."
        de:
          yellow: "Dieses POKéMON\nkann sich kaum\nbewegen.\fBei Gefahr greift\nes mit einem\nGiftstachel an."
        es:
          yellow: "Sólo puede\nmoverse un poco.\nCuando está en\fpeligro, envenena\na su enemigo con\nsu aguijón"
beedrill:
  species_id: 15
  names:
    jp_kana: スピアー
    en: BEEDRILL
    fr: DARDARGNAN
    it: BEEDRILL
    de: BIBOR
    es: BEEDRILL
  forms:
    beedrill:
      form_id: 0
      base_stats:
        hp: 65
        attack: 80
        defense: 40
        speed: 75
        special: 45
      types:
        - bug
        - poison
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "りょうてと　おしりにある　３ぼんの\nどくバりで　あいてを　さして　さして\nさしまくって　こうげきする。"
        en:
          yellow: "It has 3 poisonous\nstingers on its\nforelegs and its\ftail. They are\nused to jab its\nenemy repeatedly."
        fr:
          yellow: "Il se sert de ses\ntrois aiguillons\nempoisonnés pour\fattaquer sans\nrelâche ses\nadversaires."
        it:
          yellow: "Possiede 3 aculei\nvelenosi sulle\nzampe anteriori\fe sull’addome con\ncui punge i nemici\nripetutamente."
        de:
          yellow: "Dieses POKéMON\nverfügt über drei\nGiftstachel. Es\fkann seine Gegner\ndamit wiederholt\nstechen."
        es:
          yellow: "Tiene 3 aguijones\nvenenosos en sus\npatas y cola.\fSuelen pinchar a\nsus enemigos\nrepetidas veces"
pidgey:
  species_id: 16
  names:
    jp_kana: ポッポ
    en: PIDGEY
    fr: ROUCOOL
    it: PIDGEY
    de: TAUBSI
    es: PIDGEY
  forms:
    pidgey:
      form_id: 0
      base_stats:
        hp: 40
        attack: 45
        defense: 40
        speed: 56
        special: 35
      types:
        - normal
        - flying
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "おとなしい　せいかくで　おそわれても\nはんげき　せずに　すなを　かけて\nみを　まもることが　おおい。"
        en:
          yellow: "Very docile. If\nattacked, it will\noften kick up\fsand to protect\nitself rather\nthan fight back."
        fr:
          yellow: "De nature très\ndocile, il\npréfère jeter du\fsable pour se\ndéfendre plutôt\nqu’attaquer."
        it:
          yellow: "Di indole docile\npreferisce alzare\nsabbia sul nemico\fper proteggersi\npiuttosto che\nattaccarlo."
        de:
          yellow: "Ein sanftmütiges\nPOKéMON, welches\nlieber Sand zum\fSchutze auf-\nwirbelt, als\nzurückzuschlagen."
        es:
          yellow: "Son muy dóciles.\nSi son atacados,\nsuelen lanzar\farena en lugar\nde repeler el\nataque"
pidgeotto:
  species_id: 17
  names:
    jp_kana: ピジョン
    en: PIDGEOTTO
    fr: ROUCOUPS
    it: PIDGEOTTO
    de: TAUBOGA
    es: PIDGEOTTO
  forms:
    pidgeotto:
      form_id: 0
      base_stats:
        hp: 63
        attack: 60
        defense: 55
        speed: 71
        special: 50
      types:
        - normal
        - flying
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "ありあまる　たいりょくの　もちぬしで\nひろい　なわばりを　とびまわり\nとおくまで　エサを　さがしにいく。"
        en:
          yellow: "This POKéMON is\nfull of vitality.\nIt constantly\fflies around its\nlarge territory in\nsearch of prey."
        fr:
