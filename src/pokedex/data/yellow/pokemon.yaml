        hp: 65
        attack: 45
        defense: 55
        speed: 45
        special: 70
      types:
        - water
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "こおるほど　さむいところが　すき。\nひょうてんか　１０ど　くらいで\nきもちよく　およいでいる。"
        en:
          yellow: "Loves freezing\ncold conditions.\nRelishes swimming\fin a frigid cli-\nmate of around 14F\ndegrees."
        fr:
          yellow: "Il est à l’aise\ndans les endroits\nfroids et gelés.\fIl peut nager\ndans de l’eau à\n0 degré."
        it:
          yellow: "Adora gli ambienti\nfreddi gelidi.\nNuota in acque a\ftemperature polari\ndi circa 10 gradi\nsotto zero."
        de:
          yellow: "Dieses POKéMON\nbevorzugt eiskalte\nLebensräume und\fschwimmt mit Vor-\nliebe in -10 Grad\nkaltem Wasser."
        es:
          yellow: "A este POKéMON le\nencanta el frío.\nLe encanta nadar\fen climas polares,\nsea cual sea\nla temperatura"
dewgong:
  species_id: 87
  names:
    jp_kana: ジュゴン
