    haunter:
      form_id: 0
      base_stats:
        hp: 45
        attack: 50
        defense: 45
        speed: 95
        special: 115
      types:
        - ghost
        - poison
      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "なめられると　いのちを　すわれる。\nからだが　ふるえて　とまらなくなり\nやがては　し　に　いたるという。"
        en:
          yellow: "By licking, it\nsaps the victim’s\nlife. It causes\fshaking that won’t\nstop until the\nvictim’s demise."
        fr:
          yellow: "Les tremblements\nprovoqués par le\ncontact de sa\flangue éthérée ne\ns’arrêtent qu’à\nl’évanouissement."
        it:
          yellow: "Succhia l’anima al\nnemico con una\nLECCATA. Causa\ftremori orribili\nche finiscono solo\ncon il decesso."
        de:
          yellow: "Dieses POKéMON\nsaugt seinen\nbemitleidenswerten\fOpfern ohne\nGnade die Seele\naus dem Leib."
        es:
          yellow: "Toma la vida de\nsu adversario a\nlengüetazos. Esto\fproduce mareos\nhasta que la\nvíctima fallece"
gengar:
  species_id: 94
  names:
    jp_kana: ゲンガー
