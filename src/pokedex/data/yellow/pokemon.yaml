      held_items:
        common: berry
        rare: berry
      descriptions:
        jp_kana:
          yellow: "どんな　こうげきにも　たえる\nかたいカラだが　ひらくと　やわらかい\nなかみが　むきだしになる。"
        en:
          yellow: "The shell can\nwithstand any\nattack. However,\fwhen it is open,\nthe tender body\nis exposed."
        fr:
          yellow: "Sa coquille le\nprotège de toute\nattaque. Si elle\fs’ouvre son corps\nfragile devient\nvulnérable."
        it:
          yellow: "La sua conchiglia\nresiste ad ogni\nattacco. Tuttavia\fa guscio aperto\ndiventa molto\nvulnerabile."
        de:
          yellow: "Die Schale dieses\nPOKéMON hält allen\nAttacken stand.\fWenn sie geöffnet\nist, wird MUSCHAS\nverwundbar."
        es:
          yellow: "Su concha puede\nevitar cualquier\nataque. El débil\fcuerpo sólo está\nexpuesto cuando\nestá abierta"
cloyster:
  species_id: 91
