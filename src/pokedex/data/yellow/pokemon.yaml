    de: LAPRAS
    es: LAPRAS
  forms:
    lapras:
      form_id: 0
      base_stats:
        hp: 130
        attack: 85
        defense: 80
        speed: 60
        special: 95
      types:
        - water
        - ice
      held_items:
        common: bitter_berry
        rare: bitter_berry
      descriptions:
        jp_kana:
          yellow: "にんげんの　ことばを　りかいする\nやさしい　こころの　もちぬしだ。\nせなかに　のせて　うみをゆく。"
        en:
          yellow: "A gentle soul that\ncan read the minds\nof people. It can\fferry people\nacross the sea on\nits back."
        fr:
          yellow: "D’une âme noble,\nil peut lire dans\nles esprits. Il\ftransporte les\nhumains sur son\ndos."
        it:
          yellow: "Possiede un’anima\ngentile che può\nleggere la mente.\fPuò traghettare la\ngente sull’acqua\nsulla sua groppa."
        de:
          yellow: "Dieses freundliche\nPOKéMON kann\nGedanken lesen.\fAuf seinem Rücken\nträgt es Menschen\nüber das Wasser."
        es:
          yellow: "Este espíritu\ngentil es capaz\nde leer la mente.\fPuede llevar a la\ngente a través\ndel mar"
ditto:
  species_id: 132
  names:
    jp_kana: メタモン
    en: DITTO
    fr: METAMORPH
    it: DITTO
    de: DITTO
    es: DITTO
  forms:
    ditto:
      form_id: 0
      base_stats:
        hp: 48
        attack: 48
        defense: 48
        speed: 48
        special: 48
      types:
        - normal
      held_items:
        common: metal_powder
        rare: metal_powder
      descriptions:
        jp_kana:
          yellow: "あいてをみた　しゅんかん　からだが\nとけるように　へんかを　はじめる。\nほぼ　おなじかたちに　へんしんする。"
        en:
          yellow: "When it spots an\nenemy, its body\ntransfigures into\fan almost perfect\ncopy of its oppo-\nnent."
        fr:
          yellow: "Quand il repère\nun ennemi, il\nadapte sa forme\fpour en faire une\ncopie parfaite."
        it:
          yellow: "Quando incontra\nun nemico è capace\ndi trasformarsi\fnella sua copia\nperfetta in\nun baleno."
        de:
          yellow: "Wenn DITTO einen\nGegner ausmacht,\nnimmt es\fblitzschnell das\nAussehen seines\nGegenübers an."
        es:
          yellow: "Cuando se fija\nen un enemigo,\nsu cuerpo se\ftransforma en una\ncopia perfecta\ndel mismo"
eevee:
  species_id: 133
