      descriptions:
        jp_kana:
          yellow: "ダイヤモンドよりも　かたいカラで\nまもるだけでなく　ついている　トゲを\nとばしてくるので　かなり　てごわい。"
        en:
          yellow: "For protection, it\nuses its harder-\nthan-diamonds\fshell. It also\nshoots spikes from\nthe shell."
        fr:
          yellow: "Sa coquille plus\ndure que le\ndiamant le\fprotège. Il peut\nenvoyer des\nvolées de dards."
        it:
          yellow: "È protetto da una\nconchiglia dura\ncome il diamante.\fTalvolta attacca\nsparando lance\ndalla conchiglia."
        de:
          yellow: "Eine diamantharte\nSchale schützt\ndieses POKéMON.\fEs kann aus seiner\nSchale mit harten\nStacheln schießen."
        es:
          yellow: "Utiliza su concha\npara protegerse.\nDicen que es más\fdura que el\ndiamante. También\nlanza espinas"
gastly:
  species_id: 92
  names:
    jp_kana: ゴース
