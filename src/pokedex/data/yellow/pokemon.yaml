        en:
          yellow: "Grips its prey in\nits pincers and\nsqueezes hard! It\fcan’t move if it’s\ncold, so it lives\nin warm places."
        fr:
          yellow: "Il enserre sa\nproie de sa\npuissante pince.\fIl ne peut se\ndéplacer dans les\nmilieux froids."
        it:
          yellow: "Afferra la preda\ntra le tenaglie\ne la stritola.\fVive in ambienti\ncaldi poiché il\nfreddo lo gela."
        de:
          yellow: "Dieses POKéMON\nbevorzugt einen\nwarmen Lebensraum.\fPINSIR attackiert\nGegner mit seiner\nriesigen Schere."
        es:
