        rare: silver_leaf
      descriptions:
        jp_kana:
          yellow: "コアと　よばれる　ちゅうしんぶぶんが\nなないろに　かがやくのは　つうしん\nしているからだと　いわれている。"
        en:
          yellow: "The center section\nis named the core.\nPeople think it\fis communicating\nwhen it glows in\n7 colors."
        fr:
          yellow: "Quand le centre\nde son corps,\nappelé le coeur,\fbrille de 7\ncouleurs, il\nessaie de parler."
        it:
          yellow: "La parte centrale\nemette i colori\ndell’arcobaleno.\fSi dice che sia\nil suo modo di\ncomunicare."
        de:
          yellow: "STARMIEs Kernstück\nleuchtet in den\nRegenbogen-Farben.\fMan sagt, es\nwürde damit\nkommunizieren."
