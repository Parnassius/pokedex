        hp: 90
        attack: 70
        defense: 80
        speed: 70
        special: 95
      types:
        - water
        - ice
      held_items:
        common: gold_leaf
        rare: gold_leaf
      descriptions:
        jp_kana:
          yellow: "ぜんしん　ゆきのように　まっしろ。\nさむさに　つよく　こおりが　うかぶ\nうみも　げんきよく　およぎまわる。"
        en:
          yellow: "Its entire body is\na snowy-white.\nUnharmed by even\fintense cold, it\nswims powerfully\nin icy waters."
        fr:
          yellow: "Son corps entier\nest d’une couleur\nblanc neige. Il\fpeut nager au\nmilieu des\nicebergs."
        it:
          yellow: "Il suo corpo è\nbianco candido.\nRiesce a nuotare\fvelocissimo\nanche in acque\ncongelate."
        de:
          yellow: "Der Körper dieses\nPOKéMON ist\nschneeweiß.\fEs kann sogar in\nEiswasser kraft-\nvoll schwimmen."
        es:
          yellow: "Su cuerpo es como\nuna bola de\nnieve. Inmune al\ffrío intenso,\nnada rápidamente\nen aguas heladas"
grimer:
  species_id: 88
  names:
    jp_kana: ベトベター
