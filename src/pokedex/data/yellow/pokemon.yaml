        jp_kana:
          yellow: "たよりないので　ゆうめいなポケモン。\nうみ　かわ　いけ　みずたまり\nいたるところを　およいでいる。"
        en:
          yellow: "Famous for being\nvery unreliable.\nIt can be found\fswimming in seas,\nlakes, rivers and\nshallow puddles."
        fr:
          yellow: "Célèbre pour son\ninutilité, on en\ntrouve beaucoup\fdans les océans,\nles étangs et les\nrivières."
        it:
          yellow: "Famoso per la sua\ninaffidabilità lo\nsi vede nuotare\fcomunemente in\nmari, fiumi, laghi\ne zone paludose."
        de:
          yellow: "Man sollte niemals\ngroße Hoffnungen\nauf KARPADOR\fsetzen. Dieses\nPOKéMON ist sehr\nunzuverlässig."
        es:
          yellow: "Famoso por ser\npoco fiable.\nPuede encontrarse\fnadando en mares,\nlagos, ríos y\ncharcos"
gyarados:
  species_id: 130
