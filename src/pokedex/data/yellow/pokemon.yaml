      descriptions:
        jp_kana:
          yellow: "ドードーの　どちらかの　あたまが\nぶんれつした　へんしゅ。そうげんを\nじそく　６０キロで　はしっていく。"
        en:
          yellow: "One of DODUO’s 2\nheads splits to\nform a unique\fspecies. It runs\nclose to 40 MPH\nin prairies."
        fr:
          yellow: "Quand une des 2\ntêtes d’un DODUO\nse divise, il\fdevient un DODRIO\ncapable de courir\nà 60 Km/h."
        it:
          yellow: "Una delle 2 teste\ndi DODUO si divide\ne forma una nuova\fspecie. Riesce a\ntoccare velocità\nincredibili."
        de:
          yellow: "Dieses POKéMON\nentwickelt sich\naus DODU.\fEs erreicht beim\nLaufen sehr hohe\nGeschwindigkeiten."
        es:
          yellow: "Una de las dos\ncabezas de DODUO\nse divide para\fformar un nuevo\nPKMN. Es capaz de\ncorrer a 40 KPH"
seel:
  species_id: 86
  names:
    jp_kana: パウワウ
