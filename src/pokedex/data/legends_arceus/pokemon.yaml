          legends_arceus: "悪しき者の　記憶を　奪い去ると\n畏れ　敬われている　ポケモン。\n知識を　司るとの　記録を　発見す。"
        en:
          legends_arceus: "A Pokémon feared but also respected for stealing away the\nmemories of evildoers. I have found records that suggest Uxie\nholds dominion over knowledge."
        fr:
          legends_arceus: "Ce Pokémon est à la fois adoré et craint pour son aptitude\nà dérober la mémoire des scélérats. Des écrits que j’ai\ndécouverts racontent qu’il maîtrise le savoir."
        it:
          legends_arceus: "Pokémon riverito per via della credenza secondo cui può\ncancellare i ricordi dei rei. Uno scritto da me rinvenuto\nsostiene governi la conoscenza e l’intelletto."
        de:
          legends_arceus: "Ihm wird Ehrfurcht entgegengebracht, da es boshafte Menschen\nihrer Erinnerungen beraubt. Entdeckten Aufzeichnungen zufolge\ngebietet es über das Wissen."
        es:
          legends_arceus: "Temido y adorado, se le atribuye el poder de robar los\nrecuerdos a la gente con maldad en su corazón. Se han hallado\ntextos que lo describen como el Ser de la Sabiduría."
        ko:
          legends_arceus: "악한 자의 기억을 빼앗는다 하여\n경외시되는 포켓몬.\n지식을 관장한다는 기록이 발견되었다."
        zh_simp:
          legends_arceus: "会夺去恶人的记忆，因而受到\n人们敬畏的宝可梦。本人曾发现\n提及此宝可梦司掌知识的记录。"
        zh_trad:
          legends_arceus: "會奪去惡人的記憶，因而受到\n人們敬畏的寶可夢。吾人曾發現\n提及此寶可夢司掌知識的紀錄。"
