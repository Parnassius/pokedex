        en:
          legends_arceus: "A species related to the Pikachu line. Though Pachirisu is a calm\nPokémon, it still presents a danger should one touch its\nelectrified tail or cheeks."
        fr:
          legends_arceus: "Cette espèce est étroitement liée aux Pikachu. Les Pachirisu sont\nde nature calme, mais il reste dangereux de toucher leur queue\net leurs joues électrifiées."
        it:
          legends_arceus: "Parente prossimo di Pikachu e della sua linea evolutiva,\nha indole mite. Coda e gote eiettano elettricità e sono\npertanto dannose al tocco."
        de:
          legends_arceus: "Dieses Pokémon ist mit Pikachu artverwandt. Es verfügt über ein\nsanftes Gemüt, doch Schweif und Backen sind elektrisch geladen\nund sollten aufgrund dessen nicht berührt werden."
        es:
          legends_arceus: "Un pariente cercano de los Pikachu y su cadena evolutiva.\nTiene un carácter afable, mas tocar su cola y mejillas\nelectrizantes supone un gran peligro."
        ko:
          legends_arceus: "피카츄와 근연종이다.\n얌전한 성격이지만 전기를 띠고 있어서\n꼬리나 볼을 만지는 것은 위험하다."
        zh_simp:
          legends_arceus: "属于与皮卡丘相近的物种。\n虽性情温和，但接触其带电的\n尾巴或脸颊仍是件危险的事。"
        zh_trad:
          legends_arceus: "屬於與皮卡丘相近的物種。\n雖然性情溫和，然而接觸其帶電\n的尾巴或臉頰仍是件危險的事。"
