          legends_arceus: "頬の袋に　電気　蓄えるも　感情\n昂りしとき　弾みで　放電す。\n幼体ゆえ　電気の　扱いが　未熟なり。"
        en:
          legends_arceus: "Pichu stores electricity in the sacs on its cheeks but discharges it\ninadvertently when agitated or excited. Being yet immature,\nthe Pokémon’s handling of electricity is rather inept."
        fr:
          legends_arceus: "Il emmagasine de l’électricité dans les poches de ses joues\net laisse échapper des décharges en cas d’émotions fortes.\nIl ne contrôle pas bien l’électricité, car il est encore jeune."
        it:
          legends_arceus: "Stipa nelle sacche delle gote elettricità che eietta d’impeto\nse in preda all’emozione. La giovine età gli impedisce\ndi dominare la sua energia."
        de:
          legends_arceus: "In seinen Backentaschen speichert es Elektrizität, die es bei\nAufregung freisetzt. Aufgrund seines jungen Alters ist seine\nKontrolle über Elektrizität noch unausgereift."
        es:
          legends_arceus: "Cuando se emociona, libera involuntariamente la electricidad\nque almacena en las bolsas de sus mejillas. Debido a su corta\nedad, aún no sabe manejar bien la electricidad."
        ko:
          legends_arceus: "볼의 주머니에 전기를 모으고 있으나\n감정이 고조되면 그 반동으로 방전된다.\n어리기 때문에 전기를 다루는 게 미숙하다."
        zh_simp:
          legends_arceus: "颊囊中蓄有电能，当情绪激昂时\n便会放电。由于年龄尚幼，\n对电力的运用还不熟练。"
        zh_trad:
          legends_arceus: "頰囊中蓄有電能，當情緒激昂時\n便會放電。由於年齡尚幼，\n對電力的運用還不熟練。"
