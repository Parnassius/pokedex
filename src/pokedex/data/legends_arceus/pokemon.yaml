        fr:
          legends_arceus: "Il pétrit du sable et de la boue avec les fils de soie qu’il génère\npour se confectionner une cape. Mais le vent et la pluie pouvant\nabîmer celle-ci, Cheniti se cache dans les crevasses et les grottes."
        it:
          legends_arceus: "Confeziona un manto amalgamando sabbia limacciosa\ncon il filo che tesse. È solito celarsi in spelonche, giacché\ntale rivestimento cede alle intemperie."
        de:
          legends_arceus: "Es speit Fäden aus, die es mit Sand und Schlamm zu einem\nUmhang verarbeitet. Dieser ist jedoch nicht sehr wetterfest,\nweshalb es Schutz in Höhlen und dergleichen sucht."
        es:
          legends_arceus: "Es capaz de crear un abrigo con el limo y la hebra que\nregurgita. Como este no es idóneo para resguardarse del\nviento y la lluvia, se refugia en lugares como cuevas."
        ko:
          legends_arceus: "뿜어낸 실과 모래, 진흙으로 도롱이를 만들어 낸다.\n모래와 진흙으로 된 도롱이는\n비바람에 약하기 때문에 동굴 등에 숨어 지낸다."
        zh_simp:
          legends_arceus: "将吐出的丝揉合泥沙制成蓑衣。\n泥沙所制的蓑衣不耐风雨，\n因此它会躲藏在洞穴等处。"
        zh_trad:
          legends_arceus: "將吐出的絲揉合泥沙製成蓑衣。\n泥沙所製的蓑衣不耐風雨，\n因此牠會躲藏在洞穴等處。"
