        jp_kanji:
          legends_arceus: "ひときわ　大きな　群れを成し　争いは\n絶えることなし。　頭に頂く　冠羽の\n立派なるは　強者の証しと　考察す。"
        en:
          legends_arceus: "They form remarkably large flocks and are constantly fighting\namongst themselves. I suspect that those with magnificent\nplumes on their heads are the strong ones."
        fr:
          legends_arceus: "Ils forment de gigantesques colonies et n’ont de cesse\nde se quereller. Je suspecte les spécimens arborant de\nsomptueuses huppes d’être les plus forts de leur colonie."
        it:
          legends_arceus: "Gli Staravia vivono in larghi stormi, in costante alterco gli uni\ncogli altri. Sospetto che chi tra di essi ha sul capo il piumaggio\npiù florido sia ritenuto il più forte."
        de:
          legends_arceus: "Es lebt in außergewöhnlich großen Schwärmen und gerät oft\nin Streit mit seinen Artgenossen. Je prächtiger die Federhaube,\ndesto stärker ist wohl ihr Träger."
        es:
          legends_arceus: "Forman enormes bandadas que se pelean entre sí\ncontinuamente. Sospecho que el gran penacho que adorna\nsu cabeza simboliza su fuerza."
        ko:
          legends_arceus: "한층 더 큰 무리를 만들어 싸움이\n끊이질 않는다. 머리의 우관이 훌륭할수록\n강한 개체인 것으로 보인다."
        zh_simp:
          legends_arceus: "会形成醒目的大群体来生活，群体内\n总是纷争不断。据考察，头顶上冠羽的\n气派程度对它们而言是强者的象征。"
        zh_trad:
          legends_arceus: "會形成醒目的大群體來生活，群體內\n總是紛爭不斷。據考察，頭頂上羽冠的\n氣派程度對牠們而言是強者的象徵。"
staraptor:
