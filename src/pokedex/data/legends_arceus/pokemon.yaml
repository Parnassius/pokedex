      descriptions:
        jp_kanji:
          legends_arceus: "絢爛なる　容貌を　持つ　偉丈夫。\n炎　纏いて　舞い踊るが如く\n戦う様は　眼福以外の　言葉なし。"
        en:
          legends_arceus: "A tall, hardy Pokémon with a dazzling appearance. It shrouds\nitself in flame and battles as if engaged in dance—truly a sight\nto behold."
        fr:
          legends_arceus: "Ce colosse à l’apparence flamboyante s’enveloppe de flammes\net se meut tel un danseur gracieux. Le voir combattre est\nun spectacle qui laisse sans voix."
        it:
          legends_arceus: "Una brillante creatura, imponente e poderosa. Lotta avvolto\nin fiamme come se danzasse. In verità, un pregevole spettacolo\nper gli occhi."
        de:
          legends_arceus: "Dieses mächtige Pokémon hat ein erhabenes Antlitz. Im Kampf\nhüllt es sich in Flammen und seine Bewegungen gleichen\neinem Tanz – ein wahrhaft unvergesslicher Anblick!"
        es:
          legends_arceus: "Un Pokémon fornido a la par que elegante. Su llamativo estilo\nde combate, que se asemeja a una danza bajo un manto de\nfuego, es todo un regalo para la vista."
        ko:
          legends_arceus: "현란한 용모의 씩씩한 포켓몬.\n불꽃을 두른 채 춤추는 듯이 싸우는 모습은\n진기하다는 말로밖에는 설명이 되지 않는다."
        zh_simp:
          legends_arceus: "拥有绚烂的容貌与奇伟的身姿。\n它在战斗时带着火焰舞动身躯的\n模样，令人大饱眼福，叹为观止。"
        zh_trad:
          legends_arceus: "擁有絢爛的容貌與奇偉的身姿。\n牠在戰鬥時帶著火焰舞動身軀的\n模樣，令人大飽眼福，嘆為觀止。"
