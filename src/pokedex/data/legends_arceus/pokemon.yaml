        jp_kanji:
          legends_arceus: "童の如き　短身なれど　偉丈夫を　軽々\n投げ飛ばす　力自慢。　更なる　高みを\n目指し　ゴローンを　担ぎて　鍛錬す。"
        en:
          legends_arceus: "Though as small as a child, it has strength enough to easily throw\na well-built adult. Striving to become ever stronger, Machop\ntrains by carrying a Graveler on its shoulders."
        fr:
          legends_arceus: "Malgré son petit gabarit, il déploie une puissance suffisante\npour projeter un homme adulte avec aise. Il s’entraîne en\nsoulevant des Gravalanch afin de s’améliorer toujours plus."
        it:
          legends_arceus: "Pur non essendo più alto di un fanciullo, è tanto forte\nda riuscire a scagliare colossi con agio. Anela all’eccellenza\nfisica e solleva Graveler per temprare il corpo."
        de:
          legends_arceus: "Obgleich nicht größer als ein Kind, kann dieser Kraftprotz ohne\nMühe einen Hünen durch die Luft schleudern. Um noch stärker zu\nwerden, stählt er sich, indem er Georok auf den Schultern trägt."
        es:
          legends_arceus: "A pesar de tener la estatura de un niño, puede lanzar por los\naires a un hombre fornido sin problema. Para fortalecerse\naún más, entrena llevando Graveler a sus espaldas."
        ko:
          legends_arceus: "아이만한 단신이지만 대장부를\n가볍게 던져 버릴 정도로 힘이 장사다.\n더 강해지기 위해 데구리를 들며 단련한다."
        zh_simp:
          legends_arceus: "身材如同小童，却身怀能轻易抛投\n巨汉的强健膂力。靠着举隆隆石\n努力将自己锻炼到更高境界。"
        zh_trad:
          legends_arceus: "身材如同小童，卻身懷能輕易拋投\n巨漢的強健膂力。靠著舉隆隆石\n努力將自己鍛鍊到更高境界。"
