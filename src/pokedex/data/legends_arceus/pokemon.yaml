        jp_kanji:
          legends_arceus: "下顎を　覆う　氷塊の装甲は　鋼に勝り\n岩石を　砕くこと　容易なり。　深雪を\nかき分け　険しい　山道を　猛進す。"
        en:
          legends_arceus: "The armor of ice covering its lower jaw puts steel to shame and\ncan shatter rocks with ease. This Pokémon barrels along steep\nmountain paths, cleaving through the deep snow."
        fr:
          legends_arceus: "L’armure de glace qui enveloppe sa mâchoire inférieure peut\nbriser des rocs plus durs que l’acier. Il se meut vélocement\nen fendant la neige épaisse des chemins de montagne."
        it:
          legends_arceus: "L’armatura glaciale di cui la sua mandibola è ammantata è più\ndura dell’acciaio e frantuma la roccia senza sforzo. Avanza pegli\narditi sentieri montani facendosi largo inarrestabile tra la neve."
        de:
          legends_arceus: "Der Eispanzer, der seinen Kiefer bedeckt, ist härter als Stahl und\nkann mühelos Felsgestein zermalmen. Ungestüm prescht es\nsteile Bergpfade empor, indem es sich durch den Schnee pflügt."
        es:
          legends_arceus: "La coraza de hielo que cubre su mandíbula es más dura que el\nacero y le permite triturar rocas con facilidad. Avanza veloz por\nescarpados senderos montañosos apartando la nieve a su paso."
        ko:
          legends_arceus: "아래턱을 감싸고 있는 얼음으로 된 장갑은\n강철보다 단단하여 암석을 손쉽게 부서뜨린다.\n깊이 쌓인 눈을 가로지르며 험한 산길을 맹진한다."
        zh_simp:
          legends_arceus: "包覆下颚的冰块装甲硬度更胜钢铁，\n能轻易地击碎岩石。冰岩怪借此铲开\n厚重积雪，在险峻的山路上猛冲。"
        zh_trad:
          legends_arceus: "包覆下顎的冰塊裝甲硬度更勝鋼鐵，\n能輕易地擊碎岩石。冰岩怪藉此剷開\n厚重積雪，在險峻的山路上猛衝。"
