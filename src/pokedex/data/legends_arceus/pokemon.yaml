          legends_arceus: "星の　煌めきが如き　体形なり。\n箒星　降り注ぎし夜　同胞と集まり\n踊る姿は　まさに　星の化身なり。"
        en:
          legends_arceus: "In silhouette, they resemble twinkling starlight. When shooting\nstars rain from the night sky, Cleffa gather in numbers and dance\nas though they are indeed incarnations of the stars."
        fr:
          legends_arceus: "Sa silhouette rappelle l’éclat des étoiles. Cette ressemblance est\nparticulièrement saisissante lorsqu’il danse avec ses congénères,\nles nuits où les comètes inondent le firmament."
        it:
          legends_arceus: "L’aspetto rammenta una stella scintillante. Allorché danzano\ntutti insieme nelle notti trapunte di astri cadenti paiono\nl’incarnazione del firmamento."
        de:
          legends_arceus: "Ihre Gestalt ähnelt der von funkelnden Sternen. Wenn\nSternschnuppen den Nachthimmel fluten, versammeln sie\nsich und tanzen, als wären sie die Inkarnation der Sterne."
        es:
          legends_arceus: "Su forma se asemeja a la de una estrella rutilante. Cuando las\nestrellas fugaces inundan el cielo nocturno, los Cleffa se juntan\ny bailan como si fuesen la encarnación de los astros."
        ko:
          legends_arceus: "반짝이는 별처럼 생겼다.\n별똥별이 떨어지는 밤에 동료들과 모여\n춤추는 모습은 마치 별의 화신 같다."
        zh_simp:
          legends_arceus: "身体形貌如同闪烁的星芒。\n在流星倾注的夜里与同胞们\n一起舞动的模样宛如星星的化身。"
        zh_trad:
          legends_arceus: "身體形貌如同閃爍的星芒。\n在流星傾注的夜裡與同胞們\n一起舞動的模樣宛如星星的化身。"
