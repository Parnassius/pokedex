        en:
          legends_arceus: "This Pokémon is feared as a deity in Hisuian legend. The birth\nof Palkia was what caused the walls of our world to disappear,\ncreating a sky that spans for infinity."
        fr:
          legends_arceus: "Ce Pokémon est révéré comme une divinité dans une légende\nde Hisui. Sa naissance aurait rompu les barrières de ce monde\npour faire place à des cieux s’étendant à l’infini."
        it:
          legends_arceus: "È temuto quale divinità in certe leggende di Hisui. Al suo\ndivenire, gli argini che cingevano il mondo terreno sparirono,\ncedendo il posto a un cielo sconfinato."
        de:
          legends_arceus: "In den Legenden Hisuis wird es als Gottheit verehrt. Seine\nGeburt riss die Mauern dieser Welt ein und ließ einen\nHimmel erscheinen, der sich ins Unendliche ausbreitet."
        es:
          legends_arceus: "Venerado en la tradición de Hisui como la deidad cuyo origen\nhizo que el muro que confinaba el mundo terrenal cayese y\ndiera lugar a un cielo que se extiende hasta el infinito."
        ko:
          legends_arceus: "신으로서 숭배되어 온 전설이 히스이 땅에 남아 있다.\n이 포켓몬이 탄생하면서 세상의 벽이 허물어지고\n끝없이 펼쳐진 공간이 나타났다고 한다."
        zh_simp:
          legends_arceus: "洗翠地区流传着这样的神话传说：\n当此神诞生，阻隔现世的屏障消失，\n出现了无边无际的空间。"
        zh_trad:
          legends_arceus: "洗翠地區流傳著這樣的神話傳說：\n當此神誕生，阻隔現世的屏障消失，\n出現了無邊無際的空間。"
