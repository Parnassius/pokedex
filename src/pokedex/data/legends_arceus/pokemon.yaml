      types:
        - electric
      descriptions:
        jp_kanji:
          legends_arceus: "放つ　電撃は　１０万ボルトを　凌ぎ\n我が故郷に　棲む　ダイオウドウをも\n一撃で　気絶する　威力なり。"
        en:
          legends_arceus: "It can discharge bursts of electricity exceeding 100,000 volts—\na single strike with that amount of power would incapacitate one\nof the Copperajah of my homeland."
        fr:
          legends_arceus: "Ses décharges électriques outrepassent les 100 000 volts.\nUne seule d’entre elles suffirait à assommer un Pachyradjah,\nun Pokémon de ma région natale."
        it:
          legends_arceus: "Eietta scariche elettriche che superano i 100.000 volt\ne possono stordire con un sol colpo finanche un Copperajah,\ncreatura della mia terra natia."
        de:
          legends_arceus: "Raichu kann elektrische Ladungen freisetzen, die 100 000 V\nübersteigen. Solch eine Kraft reicht aus, um ein Patinaraja\naus meiner Heimat zu Fall zu bringen."
        es:
          legends_arceus: "Libera unas descargas eléctricas que superan los 100 000 V.\nCon semejante potencia podría derribar de un golpe incluso\na un Copperajah, un Pokémon de mi tierra."
        ko:
          legends_arceus: "방출하는 전격은 10만 볼트를 뛰어넘으며\n나의 고향에 사는 대왕끼리동조차\n일격에 기절시킬 정도의 위력을 가졌다."
        zh_simp:
          legends_arceus: "发出的电击能超过十万伏特。\n其威力之强，即使是本人故乡的\n大王铜象也能一击电晕。"
        zh_trad:
          legends_arceus: "發出的電擊能超過１０萬伏特。\n其威力之強，即使是吾人故鄉的\n大王銅象也能一擊電暈。"
clefairy:
