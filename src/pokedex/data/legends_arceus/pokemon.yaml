        en:
          legends_arceus: "Its body is strong, and it has webbing on its hands and feet.\nGolduck can swim easily through rough seas, clawing its way\nthrough the high waves."
        fr:
          legends_arceus: "De constitution robuste, il use de ses membres palmés pour\nsillonner les mers tumultueuses, fendant les hautes vagues\nsans la moindre difficulté."
        it:
          legends_arceus: "Il corpo vigoroso e le membrane degli arti fanno di lui\nun magistrale natatore capace di avanzare imperturbato\ntra i cavalloni dei mari in burrasca."
        de:
          legends_arceus: "Es hat einen robusten Körper mit Schwimmhäuten an den Vorder-\nund Hinterbeinen. Dadurch kann es problemlos in stürmischer\nSee schwimmen und selbst hohem Wellengang trotzen."
        es:
          legends_arceus: "Su excelente condición física y las aletas de las extremidades\nle permiten abrirse paso a través de olas gigantescas y nadar\npor mares embravecidos sin esfuerzo."
        ko:
          legends_arceus: "강건한 육체에 양 손발에 물갈퀴가 있다.\n거친 바다에도 아랑곳하지 않고\n높은 파도를 가르며 유유히 헤엄친다."
        zh_simp:
          legends_arceus: "躯体强健，且手脚皆生有蹼，\n因此得以不惧汹涌波涛，\n在海中破浪悠游。"
        zh_trad:
          legends_arceus: "軀體強健，且手腳皆生有蹼，\n因此得以不懼洶湧波濤，\n在海中破浪悠游。"
