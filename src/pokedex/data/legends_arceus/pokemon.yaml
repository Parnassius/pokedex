          legends_arceus: "A creature given to melancholy. I suspect its metallic shell\ndeveloped as a result of the mucus on its skin reacting with\nthe iron in Hisui’s water."
        fr:
          legends_arceus: "Ce Pokémon est de nature plutôt mélancolique. Je spécule que\nle fer contenu dans les eaux de Hisui a agi sur son mucus\népidermique et a changé sa peau en carapace de métal."
        it:
          legends_arceus: "Ha un temperamento alquanto cupo. Ritengo che il carapace\nmetallico sia il risultato dell’interazione tra l’acqua ferrosa\ndi Hisui e il muco ricoprente la cute."
        de:
          legends_arceus: "Es ist von düsterem Gemüt und verdankt sein Metallgehäuse\nwohl der chemischen Reaktion zwischen dem Schleim auf seiner\nHaut und dem eisenhaltigen Wasser Hisuis."
        es:
          legends_arceus: "Adolece de una personalidad lúgubre. Sospecho que su concha\nmetálica se formó mediante una reacción entre la mucosidad\nque recubre su piel y el contenido férreo del agua de Hisui."
        ko:
          legends_arceus: "음침한 성격을 가졌다. 히스이 땅에 흐르는\n물에 함유된 철이 피부의 점액에 작용하여\n금속 껍질로 변한 것으로 추측된다."
        zh_simp:
          legends_arceus: "性情阴沉。据考察，洗翠地区的水中\n含有的铁质对皮肤的黏液产生作用，\n使其变化成了金属外壳。"
        zh_trad:
          legends_arceus: "性情陰沉。據考察，洗翠地區的水中\n含有的鐵質對皮膚的黏液產生作用，\n使其變化成了金屬外殼。"
