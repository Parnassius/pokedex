          legends_arceus: "金属の殻の　剛柔を　自在に　操る。\n孤独を　厭い　執念深く　好いた者が\n己から　離れると　怒り　荒ぶる。"
        en:
          legends_arceus: "Able to freely control the hardness of its metallic shell.\nIt loathes solitude and is extremely clingy—it will fume and\nrun riot if those dearest to it ever leave its side."
        fr:
          legends_arceus: "Il peut moduler la rigidité de sa carapace de métal à volonté.\nIl abhorre la solitude et enrage si un être qu’il affectionne\nprofondément l’abandonne."
        it:
          legends_arceus: "Può regolare la durezza del carapace metallico. Rifugge\nla solitudine e monta su tutte le furie se abbandonato\nda coloro a cui è più affezionato."
        de:
          legends_arceus: "Es ist imstande, die Härte seines Metallgehäuses nach Belieben\nzu regulieren. Alleinsein missfällt ihm und so wird es von wildem\nZorn gepackt, wenn jemand ihm Liebes es zu verlassen gedenkt."
        es:
          legends_arceus: "Puede alterar la dureza de su caparazón metálico a voluntad.\nDe carácter dependiente, detesta la soledad y monta en\ncólera si lo abandona alguien a quien profese gran afecto."
        ko:
          legends_arceus: "금속 껍질의 강도를 자유롭게 조절할 수 있다.\n고독한 것을 싫어하고 집요하여, 좋아하는 이가\n자신에게서 떨어지려 하면 분노하여 날뛴다."
        zh_simp:
          legends_arceus: "能自在操纵可刚可柔的金属外壳。\n性情执着且厌恶孤独，一旦喜爱的\n对象离开自己便会怒不可遏。"
        zh_trad:
          legends_arceus: "能自在操縱可剛可柔的金屬外殼。\n性情執著且厭惡孤獨，一旦喜愛的\n對象離開自己便會怒不可遏。"
