        en:
          legends_arceus: "The tissue on the surface of its body is curiously similar in\ncomposition to an Apricorn. When irritated, this Pokémon lets\nloose an electric current equal to 20 lightning bolts."
        fr:
          legends_arceus: "Son enveloppe corporelle est étrangement semblable à celle\ndes Noigrumes. S’il est irrité, il relâche un courant électrique\ndont l’intensité atteint vingt fois celle de la foudre."
        it:
          legends_arceus: "Arduo spiegare come la sua struttura superficiale sia\nestremamente affine a quella delle ghicocche. L’elettricità\nche eietta se adirato è pari a quella di 20 folgori."
        de:
          legends_arceus: "Sonderbarerweise ähnelt seine Körperoberfläche der einer\nAprikoko. Die elektrische Kraft, die es bei Frustration entlädt,\ngleicht der von zwanzig Blitzen."
        es:
          legends_arceus: "Curiosamente, su complexión superficial es muy semejante a la\nde un bonguri. Cuando se enoja, la electricidad que emite es\nveinte veces más potente que la de un rayo."
        ko:
          legends_arceus: "신기하게도 표면의 조직이 규토리의 성분과\n매우 흡사하다. 화가 났을 때 방출하는 전류는\n벼락이 20번 떨어진 것에 필적한다."
        zh_simp:
          legends_arceus: "体表的组织与球果的成分极为接近，\n不可思议。当它情绪焦躁时所放出的\n电流，能量足以匹敌２０次的落雷。"
        zh_trad:
          legends_arceus: "體表的組織與球果的成分極為接近，\n實在不可思議。當牠情緒焦躁時所放出\n的電流，能量足以匹敵２０次的落雷。"
