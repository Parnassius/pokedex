        en:
          legends_arceus: "This glutton appears in villages without warning and devours the\nentirety of their rice granaries—such occurrences have long been\ncounted among the gravest of disasters."
        fr:
          legends_arceus: "Ce glouton débarque parfois dans le village sans crier gare pour\nvider les granges en un instant. Il est considéré comme l’une des\npires calamités depuis fort longtemps."
        it:
          legends_arceus: "Creatura assai vorace. Si palesa all’improvviso nei villaggi,\nsvuotando in un istante i sili di riso. Sin da tempi antichi\nlo si annovera tra i più funesti flagelli."
        de:
          legends_arceus: "Dieser Vielfraß sucht ohne Vorwarnung Dörfer heim und\nverschlingt alle dort vorgefundenen Essensvorräte.\nVon alters her gilt sein Auftauchen als großes Unheil."
        es:
          legends_arceus: "Considerado desde antaño una calamidad, este insaciable\nglotón aparece de repente en pueblos y vacía los graneros en\nun instante."
        ko:
          legends_arceus: "불시에 마을에 나타나 순식간에\n곳간을 비워 버리는 대식가.\n예로부터 재앙의 일종으로 여겨져 왔다."
        zh_simp:
          legends_arceus: "这个大胃王会突然出现在村庄里，\n并在转眼间将米仓一扫而空。\n此种行为自古被视为天灾的一种。"
        zh_trad:
          legends_arceus: "這個大胃王會突然出現在村莊裡，\n並在轉眼間將米倉一掃而空。\n此種行為自古被視為天災的一種。"
