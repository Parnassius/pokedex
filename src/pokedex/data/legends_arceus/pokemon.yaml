        jp_kanji:
          legends_arceus: "不可思議な　エネルギーで　漂う。\n背に　刻まれし　文様は　神聖とされ\n古き　墓地などに　まま　描かれる。"
        en:
          legends_arceus: "Floats using a mysterious energy. The pattern engraved upon its\nback is held as sacred and can sometimes be found in imagery\nfrom ancient cemeteries and other such timeworn places."
        fr:
          legends_arceus: "Il flotte dans les airs grâce à une force mystérieuse.\nLe motif gravé en son envers est considéré comme sacré,\net on le retrouve sur les pierres d’anciens cimetières."
        it:
          legends_arceus: "Fluttua per mezzo di un’oscura energia. Il motivo intagliato\nnel dorso è ritenuto sacro e lo si nota iscritto in sepolcri\no altri luoghi di un tempo passato."
        de:
          legends_arceus: "Es schwebt mithilfe einer rätselhaften Energie. Das Muster auf\nseinem Rücken gilt als heilig und ist mitunter auf alten Gräbern\nund an anderen Orten vergangener Zeiten wiederzufinden."
        es:
          legends_arceus: "Levita bajo el influjo de una energía misteriosa. El símbolo de su\nespalda se considera sagrado y puede verse inscrito en algunas\nlápidas antiguas."
        ko:
          legends_arceus: "불가사의한 에너지로 공중에 떠 있다.\n등에 각인된 문양은 신성한 것으로 여겨지며\n오래된 묘지 등에서 종종 그려지기도 한다."
        zh_simp:
          legends_arceus: "靠着不可思议的能量漂浮在半空。\n人们将其背上所刻的纹路视为神圣，\n相同纹路有时会被刻在古时的坟墓等地。"
        zh_trad:
          legends_arceus: "靠著不可思議的能量飄浮在半空。\n人們將其背上所刻的紋路視為神聖，\n相同紋路有時會被刻在古時的墳墓等地。"
