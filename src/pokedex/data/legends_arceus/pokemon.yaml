        jp_kanji:
          legends_arceus: "卵に似た姿。　野山にて　遭遇し折\n卵が動いたと　早とちりする者　多し。\n邪気なき笑顔　人心を癒す　効能あり。"
        en:
          legends_arceus: "This ovate creature is frequently mistaken for a moving egg\nwhen encountered out in the fields or in the mountains.\nIts guileless smile soothes the soul."
        fr:
          legends_arceus: "À cause de son apparence, beaucoup s’imaginent voir un œuf\nse mouvoir tout seul lorsqu’ils le croisent dans la nature.\nSon sourire candide possède des vertus apaisantes."
        it:
          legends_arceus: "A causa delle sue fattezze, chi lo incontra in natura lo crede\nun Uovo deambulante. Il suo gentil sorriso sa rincuorare\ngli animi."
        de:
          legends_arceus: "Aufgrund seines Aussehens wird es in der freien Natur oft mit\neinem sich bewegenden Ei verwechselt. Sein argloses Lächeln\nist Balsam für die Seele."
        es:
          legends_arceus: "Debido a su aspecto, quienes se lo encuentran por el campo\nsuelen pensar que se trata de un huevo que se mueve. Su dulce\nsonrisa es como un bálsamo para el alma."
        ko:
          legends_arceus: "알을 닮아서 산이나 들에서 마주치면\n알이 움직인다고 착각하는 이가 많다.\n순수한 미소에는 마음을 치유하는 효과가 있다."
        zh_simp:
          legends_arceus: "外观好似一颗蛋，常让在野外\n遇见它的人误会蛋会自己动。\n纯真的笑容有疗愈人心的功效。"
        zh_trad:
          legends_arceus: "外觀好似一顆蛋，常讓在野外\n遇見牠的人誤會蛋自己會動。\n純真的笑容有療癒人心的功效。"
