        jp_kanji:
          legends_arceus: "美麗なれど　猛毒　たたえし棘　有す。\n我が故郷では　決闘の申し出に　これを\n相手に送る　古き習わし　伝わる。"
        en:
          legends_arceus: "Though beautiful, it has highly poisonous thorns. There is an old\ntradition in my homeland wherein one would send these thorns\nto an opponent to challenge them to a duel."
        fr:
          legends_arceus: "Ce Pokémon est d’une grande beauté, mais possède des épines\nempoisonnées. Dans ma région natale, il est de coutume de\nl’envoyer à une personne que l’on veut provoquer en duel."
        it:
          legends_arceus: "Di bel sembiante, possiede spine velenifere. È usanza della mia\nterra inviare queste spine all’avversario a domandare una\nsingolar tenzone."
        de:
          legends_arceus: "Dieses wunderschöne Pokémon hat hochgiftige Dornen.\nIn meiner Heimat gibt es eine alte Tradition, nach welcher\ndiese als Aufforderung zum Duell verschickt werden."
        es:
          legends_arceus: "Un Pokémon de gran belleza dotado de espinas altamente\nvenenosas. En mi tierra, existe una antigua tradición de\nenviárselas a alguien para retarlo en duelo."
        ko:
          legends_arceus: "아름답지만 맹독을 띠는 가시가 있다.\n나의 고향에서는 결투를 신청할 때 이를\n상대에게 보내는 오랜 전통이 있다."
        zh_simp:
          legends_arceus: "长着美丽但带有剧毒的棘刺。\n本人的故乡自古流传着以此为信物\n向对手提出决斗要求的习俗。"
        zh_trad:
          legends_arceus: "長著美麗但帶有劇毒的棘刺。\n吾人的故鄉自古流傳著以此為信物\n向對手提出決鬥要求的習俗。"
