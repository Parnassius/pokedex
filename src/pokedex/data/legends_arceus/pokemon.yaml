        jp_kanji:
          legends_arceus: "ガラスの如き　紅赤の目玉より　光線を\n放つ。　浅海を　たゆたうが　干潮の折\n浜端にて　干乾びしこと　あり。"
        en:
          legends_arceus: "They fire beams from the glassy, magenta orbs that resemble\neyes atop their heads, and they drift in shallow seas. During low\ntide, they can sometimes be found on beaches, desiccated."
        fr:
          legends_arceus: "Il projette des rayons lumineux par ses deux globes oculaires\ncarminés et vitreux. Il flotte dans les eaux peu profondes, et\nà marée basse, on le retrouve parfois desséché sur la plage."
        it:
          legends_arceus: "Emette fasci di luce dagli occhi vitrei e vermigli. Fluttua in acque\npoco profonde, ma con la bassa marea può spiaggiare\ne rinsecchirsi."
        de:
          legends_arceus: "Über die roten, augenähnlichen Organe feuern sie Lichtstrahlen\nab. Sie treiben in seichten Gewässern, aber bei Ebbe findet man\nbisweilen ausgetrocknete Exemplare am Strand."
        es:
          legends_arceus: "Sus órganos rojos y cristalinos, que parecen ojos, emiten rayos\nde luz. Suele flotar por mares poco profundos, pero, cuando la\nmarea baja, puede varar en la orilla y terminar secándose."
        ko:
          legends_arceus: "유리처럼 새빨간 눈에서 광선을 내보낸다.\n보통 얕은 바다 위에 떠 있지만 간조일 때\n해변에 말라붙어 있는 경우도 있다."
        zh_simp:
          legends_arceus: "会从玻璃般的赤红眼珠发出光线。\n平时漂浮在浅海中，退潮时偶尔会\n在海滩见到它们被晒得干瘪的身影。"
        zh_trad:
          legends_arceus: "會從玻璃般的赤紅眼珠發出光線。\n平時漂浮在淺海中，退潮時偶爾會\n在海灘見到牠們被曬得乾癟的身影。"
