        jp_kanji:
          legends_arceus: "仄暗き　洞穴を　寝床とする。　両眼は\n退化し　光　失うも　口から　放つ\n音波にて　周囲を　探りて　飛翔す。"
        en:
          legends_arceus: "Makes its home in gloomy caves. Atrophied eyes have left this\nPokémon blind, so it scans its surroundings via sound waves that\nit emits from its mouth as it flies."
        fr:
          legends_arceus: "Il gîte dans les antres enténébrés. Comme il ne possède pas\nd’yeux, il est incapable de percevoir la lumière. Il émet des\nultrasons par la bouche afin de s’orienter par écholocalisation."
        it:
          legends_arceus: "Fa di antri tenebrosi il suo giaciglio. È cieco a causa della\nperdita di entrambi gli occhi, ma vola sondando l’ambiente\ncircostante con onde sonore che emette dalle fauci."
        de:
          legends_arceus: "Es lebt in dunklen Höhlen. Da es aufgrund der komplett zurück-\ngebildeten Augen blind ist, erkundet es beim Fliegen seine\nUmgebung mit Schallwellen, die es über den Mund aussendet."
        es:
          legends_arceus: "Duerme en cuevas oscuras. Al haber perdido los ojos,\nno percibe la luz, pero emite ondas ultrasónicas por la\nboca para examinar los alrededores mientras vuela."
        ko:
          legends_arceus: "어두컴컴한 동굴을 거처로 한다.\n두 눈이 퇴화하여 빛을 잃었으나,\n입에서 나오는 음파로 주위를 살피며 난다."
        zh_simp:
          legends_arceus: "以阴暗的洞穴为巢。两眼退化\n无法视物，但能够口吐音波，\n用以在飞行时探查四周。"
        zh_trad:
          legends_arceus: "以陰暗的洞穴為巢。兩眼退化\n無法視物，但能夠口吐音波，\n用以在飛行時探查四周。"
