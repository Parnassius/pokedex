      types:
        - water
        - ghost
      descriptions:
        jp_kanji:
          legends_arceus: "遡上の旅路にて　志半ばに　散った\n輩の魂を　まとう。　ヒスイ　流れし\n河川においては　敵うもの　皆無なり。"
        en:
          legends_arceus: "Clads itself in the souls of comrades that perished before\nfulfilling their goals of journeying upstream. No other species\nthroughout all Hisui’s rivers is Basculegion’s equal."
        fr:
          legends_arceus: "Ce Pokémon revêt les âmes de ses camarades qui ont péri\nen remontant les rivières. Dans les fleuves qui traversent Hisui,\naucune autre espèce n’est à sa mesure."
        it:
          legends_arceus: "È avvolto dagli spiriti dei suoi simili caduti durante l’ardua\nrisalita da foce a sorgente. Nessuna tra le forme di vita che\nabitano i fiumi di Hisui è in grado di tenergli testa."
        de:
          legends_arceus: "Es hüllt sich in die Seelen von Artgenossen, die auf der Reise\nstromaufwärts ihr Leben ließen. In den Flüssen Hisuis findet sich\nkein Lebewesen, welches ihm das Wasser reichen könnte."
        es:
          legends_arceus: "Durante las remontadas de los ríos, se envuelve de las almas de\nsus congéneres caídos en la ardua travesía. No tiene rival en\nninguna de las corrientes que fluyen por la región de Hisui."
        ko:
          legends_arceus: "물길을 거슬러 오르는 여정에서\n뜻을 이루지 못하고 죽은 동료들의 혼을 두르고 있다.\n히스이에 흐르는 하천에서는 대적할 자가 없다."
        zh_simp:
          legends_arceus: "在溯河而上的旅程中半途丧命的\n伙伴的灵魂缠绕其身。在流经\n洗翠地区的河川里可谓所向无敌。"
        zh_trad:
          legends_arceus: "在溯河而上的旅程中半途喪命者\n的靈魂纏繞其身。在流經洗翠地區\n的河川裡可謂所向無敵。"
