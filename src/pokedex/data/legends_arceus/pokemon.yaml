        en:
          legends_arceus: "It lays curses by thinking wicked thoughts. Writings tell that this\nPokémon was born out of the assembly of five score and eight\nmalevolent spirits."
        fr:
          legends_arceus: "Il lance des malédictions au moyen de pensées maléfiques.\nOn raconte qu’il est né de la fusion de 108 âmes malfaisantes."
        it:
          legends_arceus: "Infligge maledizioni per mezzo di pensieri malevoli.\nStando ai testi, sarebbe scaturito dall’incontro\ndi cento e otto perfidi spiriti."
        de:
          legends_arceus: "Dieses Pokémon kann mithilfe seiner bösen Gedanken Flüche\nverhängen. Es soll aus dem Zusammenschluss von 108 boshaften\nGeistern entstanden sein."
        es:
          legends_arceus: "Un ser capaz de conjurar maldiciones mediante pensamientos\nmalévolos. Se dice que nació de la unión de 108 espíritus\nmalignos."
        ko:
          legends_arceus: "사악한 주문으로 화를 불러온다.\n108개의 악한 영혼이 모여서\n만들어졌다는 기록이 있는 포켓몬."
        zh_simp:
          legends_arceus: "由邪恶的念想带来的邪崇之物。\n据文献记载，此种宝可梦是由\n一百零八个邪恶灵魂聚集所生。"
        zh_trad:
          legends_arceus: "由邪惡的念想帶來的邪祟之物。\n據文獻記載，此種寶可夢是由\n一百零八個邪惡靈魂聚集所生。"
