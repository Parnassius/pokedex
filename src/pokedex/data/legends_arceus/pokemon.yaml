          legends_arceus: "その鳴き声　聞こえぬとき　耐えがたき\n頭痛に　襲われたり。　人の聴覚にて\n感知できぬ　音が　あるやも知れず。"
        en:
          legends_arceus: "This Pokémon gave me an excruciating headache when it\nseemingly cried out without making a sound. Perhaps there are\nsome sounds that the human ear is simply incapable of hearing."
        fr:
          legends_arceus: "Ses cris m’ont provoqué des migraines insupportables, et\npourtant, je n’ai pu les entendre. Il semblerait que certains\nsons échappent à l’oreille humaine."
        it:
          legends_arceus: "Intollerabili mal di testa assalgono chiunque ascolti il suo canto,\nperciò non escluderei che contenga suoni impercettibili\nall’orecchio umano."
        de:
          legends_arceus: "Die lautlosen Schreie dieses Pokémon verursachen unerträgliche\nKopfschmerzen. Möglicherweise erzeugt es Töne, die das\nmenschliche Hörvermögen übersteigen."
        es:
          legends_arceus: "Sus gritos provocan unas migrañas insoportables. Es posible que\nalgunos de los sonidos que emite resulten imperceptibles para\nel oído humano."
        ko:
          legends_arceus: "울음소리가 들리지 않게 되면, 견디기 힘든\n두통에 휩싸이게 된다. 인간의 청력으로\n감지 못하는 소리가 있는 것일지도 모른다."
        zh_simp:
          legends_arceus: "即使在听不见其叫声的时候，也有\n可能发生难以忍受的头痛。也许它\n能够发出人类听觉无法分辨的声音。"
        zh_trad:
          legends_arceus: "即使在聽不見其叫聲的時候，亦有\n可能發生難以忍受的頭痛。也許牠\n能夠發出人類聽覺無法分辨的聲音。"
