        en:
          legends_arceus: "It emits a soothing aura from its ribbon-shaped organs. It wraps\nthese appendages around quarrelers to instantly restore calm to\nthe situation."
        fr:
          legends_arceus: "Ses antennes en forme de rubans émettent des ondes qui\napaisent la colère. Lors d’une querelle, il les enroule autour\ndes deux adversaires afin de calmer la situation."
        it:
          legends_arceus: "L’organo a foggia di fiocco emette radiazioni che placano\nla collera. Lo avviluppa attorno agli irati, quietando tosto\ngli animi."
        de:
          legends_arceus: "Seine bandförmigen Organe verströmen eine besänftigende\nAura. Umwickelt es damit die Beteiligten eines Streits, so legt\nsich ihr Zorn im Handumdrehen."
        es:
          legends_arceus: "Emite ondas por sus apéndices en forma de lazo que calman\nla ira al instante. Puede acallar cualquier situación violenta\nenvolviendo con ellos a los partícipes de una disputa."
        ko:
          legends_arceus: "리본 형태의 기관에서 분노를 가라앉히는\n기운을 발산한다. 다투는 이들에게\n이것을 휘감으면 머지않아 조용해진다."
        zh_simp:
          legends_arceus: "从缎带状器官发出的气可平息怒意。\n发生斗争时，它会用此器官卷住当事者，\n让现场在一瞬间归于平静。"
        zh_trad:
          legends_arceus: "從緞帶狀器官發出的氣可平息怒意。\n發生鬥爭時，牠會用此器官捲住當事者，\n讓現場在一瞬間歸於平靜。"
