        - fighting
      descriptions:
        jp_kanji:
          legends_arceus: "青面の　色深きほど　豪に　長ずる。\n縦横無尽に　跳ね　飛び回り\n尾の火で　強かに　敵を打つ。"
        en:
          legends_arceus: "The deeper the blue on its face, the more powerful it will grow\nto become. It leaps about every which way and lands powerful\nblows against its opponents with the flame on its tail."
        fr:
          legends_arceus: "Plus ce Pokémon est puissant, plus le bleu de son visage est\nintense. Il se meut rapidement en faisant des bonds agiles et\nfrappe ses ennemis de sa queue enflammée."
        it:
          legends_arceus: "Più è profondo il ceruleo color del suo volto, maggiore è\nil suo vigore. Balza e volteggia in ogni dove, ledendo gli inimici\ncon il fuoco della coda."
        de:
          legends_arceus: "Je tiefer das Blau auf seinem Gesicht, umso prächtiger wächst\ndieses Pokémon heran. Es springt wild umher und versetzt\nFeinden harte Hiebe mit seinem Feuerschweif."
        es:
          legends_arceus: "La intensidad del azul del rostro es directamente proporcional\na su fuerza. Salta por todas partes y emplea su cola ígnea para\ngolpear al enemigo."
        ko:
          legends_arceus: "얼굴의 파란 부분이 짙을수록 더 강하다.\n종횡무진으로 뛰어다니며 꼬리의 불꽃으로\n상대를 강하게 공격한다."
        zh_simp:
          legends_arceus: "脸上蓝色越深，实力越是强横。\n会灵活地在四周上窜下跳，\n并以尾上的火焰猛击敌手。"
        zh_trad:
          legends_arceus: "臉上藍色越深，實力越是強橫。\n會靈活地在四周上竄下躍，\n並以尾上火焰猛擊敵手。"
