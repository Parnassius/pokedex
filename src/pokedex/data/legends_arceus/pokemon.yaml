          legends_arceus: "長毛にて　目や口のみならず　四肢まで\n覆い　厳しい冷気に　耐えうる姿なり。\n敵　打ち負かす　白き牙　備える。"
        en:
          legends_arceus: "The long fur of this Pokémon covers its eyes, ears, and even\nlimbs, allowing Piloswine to resist harshly frigid conditions.\nThe Pokémon’s white tusks can be used to defeat its enemies."
        fr:
          legends_arceus: "Il supporte le froid le plus rigoureux grâce à la longue toison\nqui couvre son visage et ses quatre membres. En outre,\nses défenses lui permettent de triompher de ses ennemis."
        it:
          legends_arceus: "Il lungo vello ricopre non solo occhi e fauci, ma pure gli arti,\nproteggendolo da temperature austere. Sgomina gli inimici\ncon le bianche zanne."
        de:
          legends_arceus: "Sein langes Fell, welches Maul, Augen und sogar seine Beine\nbedeckt, schützt es vor bitterer Kälte. Feinde bezwingt es\nmit seinen weißen Stoßzähnen."
        es:
          legends_arceus: "El largo pelaje que lo recubre protege del frío extremo no solo\nsus ojos y hocico, sino también sus patas. Se vale de sus\ncolmillos blancos para abatir a sus rivales."
        ko:
          legends_arceus: "긴 털이 눈과 입뿐만 아니라 사지까지\n덮고 있어서 혹독한 추위에도 견딜 수 있다.\n상대를 제압하는 하얀 엄니를 갖고 있다."
        zh_simp:
          legends_arceus: "口部、双眼以至于四肢都被长毛\n所覆盖，因而得以对抗严寒。\n拥有足以击败敌手的白色獠牙。"
        zh_trad:
          legends_arceus: "口部、雙眼以至於四肢都被長毛\n所覆蓋，因而得以對抗嚴寒。\n擁有足以擊敗敵手的白色獠牙。"
