      descriptions:
        jp_kanji:
          legends_arceus: "包帯　巻かれし姿の　その内を覗くと\n包帯の隙間より　吸い込まれ　戻らずと\n噂あるも　恐ろしく　確認できず。"
        en:
          legends_arceus: "There are rumors that peeking inside its bandage-wrapped body\nwill cause one to get pulled in through the gaps between the\nbandages, never to return. I’ve been too scared to verify."
        fr:
          legends_arceus: "D’après les ouï-dire, quiconque voit ce qui se trouve sous\nles bandages de ce Pokémon est aspiré et piégé à tout jamais.\nCela m’effraie bien trop pour aller vérifier par moi-même..."
        it:
          legends_arceus: "Corre voce che chiunque cerchi di scrutare tra i pertugi\ndelle bende che lo avvolgono ne venga per sempre inghiottito.\nLa paura mi frena dal verificare quanto tali voci siano fondate."
        de:
          legends_arceus: "Wer versucht, unter die Bandagen zu blicken, die seinen Körper\numhüllen, soll eingesaugt werden und nie wieder zurückkehren.\nIch fürchte mich zu sehr, um diesem Gerücht nachzugehen..."
        es:
          legends_arceus: "Se rumorea que quien mire dentro de su cuerpo cubierto de\nvendas será absorbido entre ellas para no regresar jamás. Solo\npensarlo me infunde tal pavor que no he podido indagar más."
        ko:
          legends_arceus: "붕대를 두른 모습. 안을 들여다보려 하면\n붕대 틈으로 빨려 들어가 돌아올 수 없다는\n소문이 있으나, 무서워서 확인하지 못했다."
        zh_simp:
          legends_arceus: "全身被绷带所包裹。传闻若试图去窥看\n绷带内侧，就会被吸进绷带缝隙里永远失踪。\n由于太过可怕，本人不敢确认传闻是否属实。"
        zh_trad:
          legends_arceus: "全身被繃帶所包裹。傳聞若試圖去窺看\n繃帶內側，就會被吸進繃帶縫隙裡永遠失蹤。\n由於太過可怕，吾人不敢確認傳聞是否屬實。"
chimecho:
