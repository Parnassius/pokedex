        en:
          legends_arceus: "The poison that gushes from its aft end is accompanied by an\nutterly evil-smelling odor with such potency that one whiff can\ninduce memory loss."
        fr:
          legends_arceus: "Il propulse un poison extrêmement nauséabond depuis\nson séant. L’odeur est si puissante qu’elle peut entraîner\ndes amnésies."
        it:
          legends_arceus: "Il fluido velenifero che proietta dalle terga emana un fetore\nnauseabondo al punto da cagionare amnesia in chi lo annusa."
        de:
          legends_arceus: "Aus seinem Hinterleib sprüht es eine hochgiftige Flüssigkeit und\nverbreitet dabei einen gräulichen Gestank, welcher so stark ist,\ndass er sogar zu Gedächtnisverlust führt."
        es:
          legends_arceus: "El veneno que expele por su retaguardia produce un olor tan\nnauseabundo que un solo olisqueo basta para producir amnesia."
        ko:
          legends_arceus: "엉덩이를 통해 뿜어내는 독은 격렬한 악취를\n동반한다. 그 위력은 냄새를 맡기만 해도\n기억을 잃어버릴 정도다."
        zh_simp:
          legends_arceus: "从屁股喷出的毒气带有\n猛烈的恶臭，威力之大\n足以让闻到的人丧失记忆。"
        zh_trad:
          legends_arceus: "從屁股噴出的毒氣帶有\n猛烈的惡臭，威力之大\n足以讓聞到的人喪失記憶。"
skuntank:
  species_id: 435
