      descriptions:
        jp_kanji:
          legends_arceus: "海を越えて　飛来したらば　厳しき冬の\n終わりを知る。　慈愛が　ヒスイの地に\n新しき命　芽吹かせるとの　伝承あり。"
        en:
          legends_arceus: "When it flies to this land from across the sea, the bitter winter\ncomes to an end. According to legend, this Pokémon’s love\ngives rise to the budding of fresh life across Hisui."
        fr:
          legends_arceus: "Son arrivée par les mers annonce la fin des hivers rigoureux.\nOn raconte que c’est l’amour que ce Pokémon ressent qui fait\nbourgeonner de nouvelles vies dans la région de Hisui."
        it:
          legends_arceus: "La sua venuta dai cieli al di là del mare annunzia la fine\ndel rigido inverno. Si narra che il suo amore faccia\ngermogliare nuova vita a Hisui."
        de:
          legends_arceus: "Kommt es übers Meer geflogen, neigt sich der harsche Winter\ndem Ende zu. Der Volksmund sagt, dass dank seiner Liebe\nneues Leben in Hisui Knospen treibe."
        es:
          legends_arceus: "Su llegada de allende el mar significa el fin del duro invierno.\nDe acuerdo con el folclore, su amor siempre trae consigo un\nsoplo de vida nueva a Hisui."
        ko:
          legends_arceus: "바다를 건너 날아와 혹독한 겨울의 끝을 알린다.\n자애로움이 히스이 땅에 새로운 생명을\n싹틔우게 했다는 전승이 있다."
        zh_simp:
          legends_arceus: "当它越过大海飞来，便代表严寒的\n冬季即将终结。传说中其慈爱将使\n新的生命在洗翠大地上萌芽。"
        zh_trad:
          legends_arceus: "當牠越過大海飛來，便代表嚴寒的\n冬季即將終結。傳說中其慈愛將使\n新的生命在洗翠大地上萌芽。"
