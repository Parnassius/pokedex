        en:
          legends_arceus: "They generate electricity by spinning their arms. During a\nthunderstorm, if one hears the lively voices of children out in the\nwilderness, what one is actually hearing are the voices of Elekid."
        fr:
          legends_arceus: "Ce Pokémon génère de l’électricité en faisant tourner ses bras.\nLa voix d’enfant enjouée que l’on entend dans les plaines ou\nles montagnes par temps orageux est celle d’Élekid."
        it:
          legends_arceus: "Genera elettricità roteando gli arti superiori. Se durante\ni temporali si odono nelle piane e nei monti risa gioiose\ndi fanciulli, si tratta in realtà di Elekid."
        de:
          legends_arceus: "Es lässt seine Arme kreisen, um Elektrizität zu erzeugen. Hört\nman bei Gewittern von den Ebenen oder Bergen her fröhliche\nKinderstimmen erschallen, so handelt es sich dabei um Elekid."
        es:
          legends_arceus: "Gira los brazos para generar electricidad. Si se oyen voces de\nniños riendo por el campo durante una tormenta, en realidad\nse trata de Elekid."
        ko:
          legends_arceus: "양팔을 돌려서 전기를 만든다. 뇌우가 칠 때\n산에서 아이들이 웅성거리는 소리가 들리면\n그것은 에레키드의 소리일 것이다."
        zh_simp:
          legends_arceus: "会转动双臂来发电。当在雷雨中\n听见山中传来孩童嬉闹的声音，\n那便是由电击怪所发出的。"
        zh_trad:
          legends_arceus: "會轉動雙臂來發電。當在雷雨中\n聽見山中傳來孩童嬉鬧的聲音，\n那便是由電擊怪所發出的。"
