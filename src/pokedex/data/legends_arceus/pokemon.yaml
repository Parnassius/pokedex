      descriptions:
        jp_kanji:
          legends_arceus: "凶暴にして　獰猛なる　気質。\n刀も　弾く　頑強なる　甲羅と\n剛力で　暴れ回り　害を成す。"
        en:
          legends_arceus: "Has a brutish, ferocious temperament. With immense strength\nand a sturdy shell off which swords will bounce, it rampages\nabout and wreaks havoc."
        fr:
          legends_arceus: "Drascore est doté d’un tempérament violent et farouche.\nLorsqu’il se déchaîne, sa force colossale et sa carapace\nà toute épreuve causent des ravages considérables."
        it:
          legends_arceus: "Ha un’indole feroce e barbarica. Peregrina portando distruzione\ncon la sua forza erculea e il suo carapace, impenetrabile persino\na spade."
        de:
          legends_arceus: "Dieses Pokémon ist grausam und brutal. Mit seiner enormen\nStärke und seinem harten Panzer, der selbst Schwertern\nstandhält, richtet es beim Wüten große Zerstörung an."
        es:
          legends_arceus: "Su fuerza sin parangón y su robusto exoesqueleto, que ni una\ncatana es capaz de atravesar, hacen de este violento y atroz\nPokémon una gran amenaza."
        ko:
          legends_arceus: "흉포하고도 영악한 성질을 가졌다.\n검도 튕겨 내는 튼튼한 갑각과 강한 힘으로\n마구 날뛰며 해를 입힌다."
        zh_simp:
          legends_arceus: "性情凶猛残暴。靠着能够弹开\n刀剑的坚固甲壳与强劲的力量\n四处大闹，为祸一方。"
        zh_trad:
          legends_arceus: "性情凶猛殘暴。靠著能夠彈開\n刀劍的堅固甲殼與強橫的勁力\n四處大鬧，為禍一方。"
