      types:
        - ground
        - normal
      descriptions:
        jp_kanji:
          legends_arceus: "ヒスイの地に　敷かれし　湿地の土こそ\n頑丈なる体躯と　泥炭を　自在に　扱う\n新たな　器量　もたらしたと　考察す。"
        en:
          legends_arceus: "I believe it was Hisui’s swampy terrain that gave Ursaluna its\nburly physique and newfound capacity to manipulate peat\nat will."
        fr:
          legends_arceus: "Je pense que ce sont les étendues marécageuses de Hisui qui\nont doté ce Pokémon d’un corps robuste et d’une aptitude à\nmanipuler la tourbe."
        it:
          legends_arceus: "Ritengo che sia stato il terreno palustre di Hisui ad averlo reso\nnerboruto e ad avergli donato la facoltà di manipolare la torba\na suo piacere."
        de:
          legends_arceus: "Vermutlich ist das sumpfige Gelände Hisuis der Grund für seine\nrobuste Statur sowie die neu errungene Fähigkeit, Torf nach\nBelieben manipulieren zu können."
        es:
          legends_arceus: "Tengo la teoría de que el terreno pantanoso de Hisui favoreció\nel desarrollo de su constitución robusta, así como su capacidad\nde manipular la turba a voluntad."
        ko:
          legends_arceus: "히스이 땅에 펼쳐진 습지의 토양 덕분에\n튼튼한 몸과 함께, 이탄을 자유롭게 다루는\n새로운 재주를 익히게 된 것으로 추측된다."
        zh_simp:
          legends_arceus: "考察结果显示，正是遍布在洗翠\n大地上的湿地土壤，造就了它坚实的\n躯体和自在运用泥炭的新能力。"
        zh_trad:
          legends_arceus: "考察結果顯示，正是遍布在洗翠\n大地上的濕地土壤，造就了牠堅實\n的軀體和自在運用泥炭的新能力。"
basculegion:
