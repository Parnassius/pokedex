        en:
          legends_arceus: "Hails from the Johto region. Though usually curled into a ball\ndue to its timid disposition, it harbors tremendous firepower."
        fr:
          legends_arceus: "Ce Pokémon est originaire de Johto. Plutôt timoré, il a coutume\nde se recroqueviller sur lui-même, mais ses flammes ardentes\nrenferment une extraordinaire puissance."
        it:
          legends_arceus: "Originario della terra di Johto, è d’indole ritrosa e suole,\npertanto, star acchiocciolato. Tuttavia cela al suo interno\nun’impetuosa potenza ignea."
        de:
          legends_arceus: "Dieses ängstliche Pokémon aus Johto trifft man zumeist\nzusammengekugelt an, doch in seinem Inneren schlummert\neine mächtige Feuerkraft."
        es:
          legends_arceus: "Este Pokémon de Johto suele hacerse un ovillo debido a su\ncarácter tímido, lo que contrasta con el inmenso poder ígneo\nque encierra en su interior."
        ko:
          legends_arceus: "성도 땅에 사는 포켓몬.\n소심하여 항상 몸을 웅크리고 있으나\n내재하고 있는 화력은 강력하다."
        zh_simp:
          legends_arceus: "栖息在城都地区的宝可梦。\n生性胆小，总是将身子缩成一团，\n但其实体内蕴藏着强大的火力。"
        zh_trad:
          legends_arceus: "棲息在城都地區的寶可夢。\n生性膽小，總是將身子縮成一團，\n但其實體內蘊藏著強大的火力。"
