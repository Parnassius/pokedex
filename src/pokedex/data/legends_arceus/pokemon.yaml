          legends_arceus: "Il manto, composto di materia vegetale, è fuso alle membra,\na mo’ di vello e cute. Sospetto che ciò sia risultato dall’energia\nscaturita durante l’evoluzione."
        de:
          legends_arceus: "Der Pflanzenumhang ist mit dem Pokémon verschmolzen und\nnun, wie Fell oder Haut, Teil seines Körpers. Vermutlich hat\ndie Energie seiner Entwicklung diesen Effekt hervorgerufen."
        es:
          legends_arceus: "Su manto vegetal ha pasado a formar parte de su cuerpo, como\nsi de pelo o piel se tratara. Presumo que es a consecuencia de\nsu evolución."
        ko:
          legends_arceus: "초목으로 만든 도롱이가 본체와 융합하여\n털과 피부처럼 몸의 일부가 되었다.\n진화 에너지의 작용인 것으로 여겨진다."
