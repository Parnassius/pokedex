          legends_arceus: "二又の尾の　回転による　推進力にて\n水中を　自在に　移動。　蒸気船の\nスクリューに似るは　偶然なり。"
        en:
          legends_arceus: "It moves freely in the water by spinning its forked tail for\npropulsion. The resemblance to the screw of a steamboat\nis coincidental."
        fr:
          legends_arceus: "Il se propulse dans l’eau en faisant tournoyer ses deux queues.\nOn croirait voir l’hélice d’un bateau à vapeur."
        it:
          legends_arceus: "Si muove liberamente in acqua per mezzo della forza propulsiva\ndelle due code che ricordano, del tutto fortuitamente, l’elica\nd’un vaporetto."
        de:
          legends_arceus: "Die Rotation seiner zwei Schweife erzeugt Antriebskraft und\nerlaubt es ihm, sich behände im Wasser fortzubewegen.\nJegliche Ähnlichkeit zu einer Schiffsschraube ist reiner Zufall."
        es:
          legends_arceus: "Se desplaza libremente por el agua gracias al impulso que\ngenera al rotar ambas colas, como si de la hélice de un barco\nde vapor se tratase."
        ko:
          legends_arceus: "두 개의 꼬리를 회전시켜서 나온 추진력으로\n수중을 자유롭게 이동한다.\n증기선의 스크루를 닮은 것은 그저 우연이다."
        zh_simp:
          legends_arceus: "会转动分岔的尾巴形成推进力，\n借此在水中自在移动。偶然的是，\n此构造与蒸汽船的螺旋桨十分相似。"
        zh_trad:
          legends_arceus: "會轉動分岔的尾巴形成推進力，\n藉此在水中自在移動。偶然的是，\n此構造與蒸汽船的螺旋槳十分相似。"
