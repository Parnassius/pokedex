        jp_kanji:
          legends_arceus: "険しき　岩壁の横穴を　棲み処とす。\n落石が如く　転がり落ちるを　好むゆえ\n山道では　頭上に　気を配るべし。"
        en:
          legends_arceus: "Dwells in holes dug into sheer walls of stone. It enjoys rolling\ndown slopes as though it were a boulder during a rockfall,\nso keep an eye upward while traversing mountain roads."
        fr:
          legends_arceus: "Il niche dans les crevasses de parois rocheuses et aime dévaler\nles pentes. Gare aux éboulements de Gravalanch sur les chemins\nde montagne !"
        it:
          legends_arceus: "Abita le cavità delle pareti rocciose e ama ruzzolare giù\nalla stregua di un masso. Nelle vie montane è bene, perciò,\nprocedere con cautela."
        de:
          legends_arceus: "Es bewohnt Aushöhlungen in steilen Felswänden und rollt mit\nVergnügen Hänge hinab, als wäre es ein Gesteinsbrocken.\nAuf Bergpfaden sollte man sich daher stets in Acht nehmen!"
        es:
          legends_arceus: "Vive en los agujeros de los muros rocosos. Le encanta caer\nrodando por las laderas como si de una roca se tratase, por\nlo que hay que andarse con cuidado en las montañas."
        ko:
          legends_arceus: "험준한 암벽에 난 구멍을 거처로 삼는다.\n낙석처럼 굴러떨어지는 것을 좋아하기에\n산길에서는 머리 위를 경계해야 한다."
        zh_simp:
          legends_arceus: "以悬崖峭壁上的洞穴为巢，\n喜欢像落石般往下滚落，因此\n走在山路上时一定要小心头上。"
        zh_trad:
          legends_arceus: "以懸崖峭壁上的洞穴為巢，\n喜歡像落石般往下滾落，因此\n走在山路時一定要小心頭上。"
