          legends_arceus: "樹木の素振りするも　幼子も　欺けず。\nその体は　樹皮ならず　岩の手触り。\n水を　ひどく嫌う習性　特記に値す。"
        en:
          legends_arceus: "Though it pretends to be a tree, it fails to fool even children.\nTo the touch, its body feels more like rock than tree bark.\nSudowoodo’s extreme aversion to water merits special note."
        fr:
          legends_arceus: "Il tente de se faire passer pour un arbre, mais personne n’est\ndupe. La texture de son corps s’apparente davantage à celle\nde la pierre qu’à celle de l’écorce. Ce Pokémon exècre l’eau !"
        it:
          legends_arceus: "Benché si finga un albero, non inganna neppure i fanciulli.\nAl tatto la cute non è corteccia, ma roccia. È degna di nota\nla sua avversione per l’acqua."
        de:
          legends_arceus: "Es gibt vor, ein Baum zu sein, doch damit führt es nicht einmal\nKinder in die Irre. Sein Körper fühlt sich nicht wie Rinde, sondern\nwie Stein an. Erwähnenswert ist auch seine Abscheu vor Wasser."
        es:
          legends_arceus: "Finge ser un árbol, mas no engaña ni a un niño. Al tacto, su\ntextura no es similar a la de la corteza, sino a la de una roca.\nLa gran aversión que siente por el agua es digna de mención."
        ko:
          legends_arceus: "나무 행세를 하지만 어린아이도 못 속인다.\n몸은 나무껍질보다는 바위 같은 느낌이다.\n물을 매우 싫어하는 습성은 특기할 만하다."
        zh_simp:
          legends_arceus: "伪装成树木，却连幼童也难以骗过。\n体表并非树皮，触感仿若岩石。\n值得一提的是，此宝可梦极其怕水。"
        zh_trad:
          legends_arceus: "偽裝成樹木，卻連幼童也難以騙過。\n體表並非樹皮，觸感彷若岩石。\n值得一提的是，此寶可夢極其怕水。"
