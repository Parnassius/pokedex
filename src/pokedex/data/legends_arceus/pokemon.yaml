      descriptions:
        jp_kanji:
          legends_arceus: "陽の光　浴び　力　溜めしこと　多し。\n寒冷な気候　原因と　察するも　両翼に\n仕込みし　刃羽根の切れ味　変化なし。"
        en:
          legends_arceus: "Regularly basks in sunlight to gather power—presumably due to\nthe frigid climate. Nonetheless, the edges of the blade quills set\ninto its wings are keen as ever."
        fr:
          legends_arceus: "Il s’expose régulièrement à la lumière du soleil pour reprendre\ndes forces, probablement à cause du climat froid de la région.\nCela n’affecte en rien le tranchant de ses plumes affûtées."
        it:
          legends_arceus: "Si crogiola con assiduità al sole per accumulare vigore, presumo\nper via del rigido clima. Ciononostante, nessun mutamento\nha inficiato il filo tagliente del suo piumaggio alare."
        de:
          legends_arceus: "Oft tankt es Energie durch Sonnenbäder, was dem frostigen\nKlima geschuldet sein mag. Auf die Schärfe der Flügelklingen\nan seinen beiden Schwingen hat dies indes keinerlei Einfluss."
        es:
          legends_arceus: "Se expone al sol para reponer energía, quizá debido al frío\nclima de esta región. Las afiladas plumas de sus alas han\npermanecido, no obstante, inalteradas."
        ko:
          legends_arceus: "햇빛을 받으며 힘을 비축하는 일이 잦다.\n냉랭한 기후가 원인인 것으로 추측되나\n양 날개에 숨겨진 칼날깃의 예리함에는 변화가 없다."
        zh_simp:
          legends_arceus: "经常为了积蓄力量而沐浴阳光。本人推测\n这是因为当地气候较为寒冷，然而藏于\n双翅中的刃羽锋利程度并无不同。"
        zh_trad:
          legends_arceus: "經常為了積蓄力量而沐浴陽光。吾人推測\n這是因為當地氣候較為寒冷，然而藏於\n雙翅中的刃羽鋒利程度並無不同。"
