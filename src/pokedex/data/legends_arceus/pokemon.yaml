        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 2
      types:
        - electric
      descriptions:
        jp_kanji:
          legends_arceus: "頬に　電気を溜めし　袋を　有す。\n森林を　棲み処とし　硬き　木の実は\n電撃で　焼き　食べる　知恵者なり。"
        en:
          legends_arceus: "Possesses cheek sacs in which it stores electricity. This clever\nforest-dweller roasts tough berries with an electric shock before\nconsuming them."
        fr:
          legends_arceus: "Cet astucieux Pokémon gîte en forêt. Ses bajoues contiennent\ndes poches qui emmagasinent l’électricité dont il se sert pour\ngriller les Baies avant de s’en repaître."
        it:
          legends_arceus: "Creatura dal sopraffine intelletto che dimora nei boschi.\nAdopra l’elettricità che stiva nelle sacche delle gote per\ntostare le bacche dure."
        de:
          legends_arceus: "Dieser kluge Waldbewohner nutzt die Elektrizität, die er in\nseinen Backentaschen speichert, um harte Beeren zu braten\nund sie so verspeisen zu können."
        es:
          legends_arceus: "Acumula electricidad en las bolsas que tiene en las mejillas.\nHabita en los bosques, donde tuesta con gran astucia las duras\nbayas que encuentra para comérselas."
        ko:
          legends_arceus: "볼에 전기를 저장하는 주머니가 있다.\n숲을 거처로 삼으며, 단단한 나무열매를\n전기로 익혀 먹는 등의 지혜를 가졌다."
        zh_simp:
          legends_arceus: "双颊有囊，用以积蓄电力。\n栖息在森林，性情聪慧，\n会以电击烧灼坚硬的树果食用。"
        zh_trad:
          legends_arceus: "雙頰有囊，用以積蓄電力。\n棲息在森林，性情聰慧，\n會以電擊燒灼堅硬的樹果食用。"
