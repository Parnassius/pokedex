          legends_arceus: "渦状の尻尾　及び　眼力にて　人を\n惑わす。　隠し持つ　爪も　鋭利ゆえ\n敵に回すと　極めて　厄介。"
        en:
          legends_arceus: "Bewitches humans with its helical tail and piercing gaze.\nIts hidden claws are quite sharp as well, making this Pokémon\nan exceedingly tricky opponent if antagonized."
        fr:
          legends_arceus: "Il trouble les êtres humains à l’aide de sa queue en spirale\net de ses regards perçants. Ses griffes acérées, qu’il garde\ncachées, s’avèrent dangereuses en cas d’affrontement."
        it:
          legends_arceus: "Ammalia gli umani con la coda a spire ed il magnetico sguardo.\nHa artigli retrattili assai aguzzi che arrecano grande danno\nagli inimici."
        de:
          legends_arceus: "Es betört Menschen mit seinem spiralförmigen Schweif und\ndurchdringenden Blick. Die meist eingefahrenen Krallen sind\nscharf und stellen im Kampf überaus gefährliche Waffen dar."
        es:
          legends_arceus: "Engatusa a los humanos con la mirada y su cola en forma de\nespiral. Es recomendable tener cuidado con las afiladas garras\nretráctiles que posee, pues son muy peligrosas."
        ko:
          legends_arceus: "돌돌 말린 꼬리와 시선으로 사람을 현혹한다.\n숨기고 있는 발톱도 예리하기 때문에\n적대하게 되면 매우 성가셔진다."
        zh_simp:
          legends_arceus: "以漩涡状的尾巴及眼力迷惑人心。\n暗藏的爪子也十分锐利，一旦\n与之为敌将会非常棘手。"
        zh_trad:
          legends_arceus: "以漩渦狀的尾巴及眼力迷惑人心。\n暗藏的爪子也十分銳利，一旦\n與之為敵將會非常棘手。"
