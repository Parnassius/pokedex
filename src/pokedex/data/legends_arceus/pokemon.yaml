        en:
          legends_arceus: "It nests in caves untouched by sunlight. Its sharp teeth may fall\nout when worn away or after an impact, but they regrow within\na few days."
        fr:
          legends_arceus: "Il gîte dans les grottes, à l’abri du soleil. Ses dents tranchantes\npeuvent tomber par usure ou après un violent coup, mais elles\nrepoussent en quelques jours."
        it:
          legends_arceus: "Fa di oscuri antri la propria dimora. I suoi denti aguzzi,\npur cadendo per via dell’usura o d’urti, tornano a formarsi\nin pochi giorni."
        de:
          legends_arceus: "Es lebt in Höhlen, in die kein Sonnenlicht dringt. Seine scharfen\nZähne können durch einen Aufprall oder Abnutzung ausfallen,\ndoch sie wachsen in wenigen Tagen wieder nach."
        es:
          legends_arceus: "Mora en cavernas resguardadas de la luz solar. Aunque sus\nafilados colmillos se le puedan caer por el deterioro o un\nfuerte golpe, le brotan unos nuevos en cuestión de días."
        ko:
          legends_arceus: "빛이 닿지 않는 굴을 거처로 삼는다.\n예리한 이빨은 마모되거나 반동 때문에\n빠질 때가 있으나, 며칠이면 재생한다."
        zh_simp:
          legends_arceus: "以日光照不到的洞穴为巢。\n锐利的牙齿即使因磨损或冲击\n而脱落，也能在数天内重新长出。"
        zh_trad:
          legends_arceus: "以日光照不到的洞穴為巢。\n銳利的牙齒即使因磨損或衝擊\n而脫落，也能在數天內重新長出。"
