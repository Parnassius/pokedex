        jp_kanji:
          legends_arceus: "樹液　好み　野山に　数多　生息す。\n異なる姿に　進化するも　理由不明。\n外見にて　判別すること　叶わず。"
        en:
          legends_arceus: "Likes sap and is abundant in the wild. Why it evolves into\nvarious different forms is unknown. One cannot tell from a\nWurmple’s appearance which form it will take when it evolves."
        fr:
          legends_arceus: "Ce Pokémon friand de sève gîte dans les plaines et montagnes.\nOn ignore pourquoi il a deux évolutions possibles, et son aspect\nne permet guère d’entrevoir quelle forme il revêtira."
        it:
          legends_arceus: "Ama la linfa e si trova facilmente in piane e monti. La sua\nevoluzione è, per qualche oscura ragione, biforme e non è\nprevedibile dal suo aspetto."
        de:
          legends_arceus: "Waumpel mag Baumsaft und ist oft in den Ebenen und Bergen\nzu finden. Es ist unklar, warum es zwei Entwicklungsformen hat,\nund man kann ihm nicht ansehen, welche es annehmen wird."
        es:
          legends_arceus: "Adoran la savia y es común encontrarlos por el campo. Se\ndesconoce por qué adoptan formas diferentes al evolucionar, y\nsu aspecto no sirve para determinar cuál de ellas adoptarán."
        ko:
          legends_arceus: "수액을 좋아하여 야산에 다수 서식한다.\n다른 모습으로 진화하는 이유는 불명이다.\n외관으로 판별할 수도 없었다."
        zh_simp:
          legends_arceus: "嗜食树液，大量生息于山野之中。\n进化成不同形态的理由不明，\n且无法从外观判断其进化方式。"
        zh_trad:
          legends_arceus: "嗜食樹液，大量生息於山野之中。\n進化成不同形態的理由不明，\n且無法從外觀判斷其進化方式。"
silcoon:
