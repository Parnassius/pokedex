        jp_kanji:
          legends_arceus: "摩訶不思議な力　操りて　空模様や\n人心　先読みす。　日の光　浴びしとき\n額の　緋の珠　輝きて　活力を増す。"
        en:
          legends_arceus: "Wields an arcane power with which it can predict the weather\nand even people’s thoughts. When bathed in sunshine, the\nscarlet orb on its brow glows and builds energy."
        fr:
          legends_arceus: "Grâce à ses pouvoirs sibyllins, Mentali peut prédire le temps et\nlire dans les cœurs. Lorsqu’il est exposé à la lumière du soleil,\nil devient plus énergique et le joyau rouge sur son front luit."
        it:
          legends_arceus: "Ha facoltà di prevedere il tempo e leggere le menti umane.\nIl sole gli dona vitalità, facendo rilucere la sfera scarlatta\nsulla fronte."
        de:
          legends_arceus: "Mit seinen rätselhaften Kräften kann es das Wetter vorhersehen\nund die Gedanken von Menschen lesen. Sonnenbäder verleihen\nihm Vitalität und lassen die rote Kugel an der Stirn aufleuchten."
        es:
          legends_arceus: "Predice el tiempo y lee los pensamientos humanos gracias a\nun misterioso poder. El sol le aporta vitalidad y hace brillar la\nesfera roja de su frente."
        ko:
          legends_arceus: "불가사의한 힘을 부려서 날씨나\n사람의 마음을 예지한다. 햇빛을 받으면\n이마의 붉은 구슬이 빛나며 활력이 넘친다."
        zh_simp:
          legends_arceus: "能够发挥不可思议的力量，预测\n天候及人心。当沐浴在日光下时，\n额上红珠会发亮，令它活力大增。"
        zh_trad:
          legends_arceus: "能夠發揮不可思議的力量，預測\n天候及人心。當沐浴在日光下時，\n額上紅珠會發亮，令牠活力大增。"
umbreon:
  species_id: 197
  names:
    jp_kanji: ブラッキー
    en: Umbreon
    fr: Noctali
    it: Umbreon
    de: Nachtara
    es: Umbreon
    ko: 블래키
    zh_simp: 月亮伊布
    zh_trad: 月亮伊布
  forms:
    umbreon:
      form_id: 0
      base_stats:
        hp: 95
        attack: 65
        defense: 110
        special_attack: 60
        special_defense: 130
        speed: 65
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 2
        speed: 0
      types:
        - dark
      descriptions:
        jp_kanji:
          legends_arceus: "月光　降り注ぎし　夜半こそ　活発に\n行動す。　大きな　眼は　暗闇なれど\n獲物の姿を　しかと　捉えたり。"
        en:
          legends_arceus: "It is most active in the wee hours of the night, when moonlight\nbathes the land. Its large eyes can pierce the darkness and\nperceive prey with absolute clarity."
        fr:
          legends_arceus: "Il est plus actif au beau milieu de la nuit, quand le monde\nest baigné par le clair de lune. Ses grands yeux distinguent\naisément ses proies dans l’obscurité."
        it:
          legends_arceus: "Trae vitalità dai raggi della luna di mezzanotte. I grandi occhi\ncaptano la presenza della preda pur nell’oscurità."
        de:
          legends_arceus: "Des Nachts, wenn die Welt in Mondlicht getaucht ist, scheint es\nam aktivsten zu sein. Mit seinen großen Augen kann es selbst\nim Dunkeln Beute mit Leichtigkeit erspähen."
        es:
          legends_arceus: "Se vuelve más activo a medianoche, bajo la luz de la luna.\nEs infalible a la hora de atrapar a sus presas en la oscuridad\ngracias a sus grandes ojos."
        ko:
          legends_arceus: "달빛이 비치는 밤중에 활발하게 움직인다.\n커다란 눈은 칠흑 같은 어둠 속에서도\n먹이의 모습을 정확하게 포착한다."
        zh_simp:
          legends_arceus: "活跃于月光洒落大地的夜半时分。\n大大的眼睛即使是在黑暗之中\n也能牢牢捕捉猎物的身影。"
        zh_trad:
          legends_arceus: "活躍於月光灑落大地的夜半時分。\n大大的眼睛即使是在黑暗之中\n也能牢牢捕捉獵物的身影。"
murkrow:
  species_id: 198
  names:
    jp_kanji: ヤミカラス
    en: Murkrow
    fr: Cornèbre
    it: Murkrow
    de: Kramurx
    es: Murkrow
    ko: 니로우
    zh_simp: 黑暗鸦
    zh_trad: 黑暗鴉
  forms:
    murkrow:
      form_id: 0
      base_stats:
        hp: 60
        attack: 85
        defense: 42
        special_attack: 85
        special_defense: 42
        speed: 91
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - dark
        - flying
      descriptions:
        jp_kanji:
          legends_arceus: "凶兆を運ぶと　忌避されし　ポケモン。\n出会いし際は　すらかみ屋は繁盛繁盛\nとの　まじない　唱えよと　教わる。"
        en:
          legends_arceus: "Widely shunned as a bearer of ill fortune. Upon crossing paths\nwith this creature, I’ve been told one must chant “Workrum,\nWorkrum—bad luck, don’t come” as a protective incantation."
        fr:
          legends_arceus: "Les habitants fuient ce Pokémon, car il serait de mauvais augure.\nJ’ai appris que si l’on vient à le croiser, il faut répéter son nom\nà l’envers : « Erbènroc... Erbènroc... »"
        it:
          legends_arceus: "Ritenuto presagio di sciagure, viene evitato dai più. Si dice\nche recitare \"Workrum... Workrum...\" scongiuri la malasorte\nche il suo incontro arreca."
        de:
          legends_arceus: "Es ist als Unglücksbringer verschrien und wird daher gemieden.\nBegegnet man ihm dennoch, so soll man zum Schutz den Namen\ndes Pokémon rückwärts sprechen."
        es:
          legends_arceus: "La gente lo evita al considerarlo de mal agüero. Dicen que,\ncuando uno se encuentra con este Pokémon, debe pronunciar\nsu nombre del revés para protegerse del infortunio que trae."
        ko:
          legends_arceus: "흉조를 가져온다고 기피되는 포켓몬.\n마주치거든 “훠이! 훠이! 액운아 물렀거라!”\n하고 주문을 외우면 피할 수 있다."
        zh_simp:
          legends_arceus: "被认为会带来凶兆，受人厌弃的宝可梦。\n人们说遇见它时念这段咒语可保平安：\n“黑暗鸦，黑压压，你黑暗呀我大发”。"
        zh_trad:
          legends_arceus: "被認為會帶來凶兆，受人厭棄的寶可夢。\n人們說遇見牠時唸這段咒語可保平安：\n「黑暗鴉，黑壓壓，你黑暗呀我大發」。"
misdreavus:
  species_id: 200
  names:
    jp_kanji: ムウマ
    en: Misdreavus
    fr: Feuforêve
    it: Misdreavus
    de: Traunfugil
    es: Misdreavus
    ko: 무우마
    zh_simp: 梦妖
    zh_trad: 夢妖
  forms:
    misdreavus:
      form_id: 0
      base_stats:
        hp: 60
        attack: 60
        defense: 60
        special_attack: 85
        special_defense: 85
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 1
        speed: 0
      types:
        - ghost
      descriptions:
        jp_kanji:
          legends_arceus: "闇に潜み　稚児のごときに　すすり泣き\n旅人の肝を　冷やす。　怯える様　見て\n喜びしとき　胸の赤き珠　妖しく光る。"
        en:
          legends_arceus: "It conceals itself in darkness, sending chills up travelers’ spines\nwith its childlike weeping. As it observes the frightened travelers\nwith glee, the red orbs upon its chest let off an eerie light."
        fr:
          legends_arceus: "Il se tapit dans les ténèbres et imite les sanglots d’un enfant,\nce qui glace le sang des voyageurs. Il s’enchante de leur effroi,\net ses sphères rouges s’illuminent alors d’une lueur inquiétante."
        it:
          legends_arceus: "Si cela nel buio e geme come un infante. Quando gioisce\ndel terrore che cagiona nei viandanti, le rosse sfere del collo\nbrillano sinistramente."
        de:
          legends_arceus: "Es versteckt sich im Dunkeln und erschreckt Reisende mit seinem\nkindlichen Geheul. Deren verängstigtes Antlitz bringt ihm Freude\nund lässt die roten Kugeln an seinem Hals unheilvoll aufleuchten."
        es:
          legends_arceus: "Atemoriza a los viajeros desde las sombras con sollozos como\nlos de un niño. Las esferas rojas de su pecho brillan de forma\ntétrica del placer de ver a sus víctimas temblar del miedo."
        ko:
          legends_arceus: "어둠 속에서 아이처럼 흐느껴 울어 나그네의\n간담을 서늘하게 한다. 겁먹은 모습에 기뻐할 때\n가슴의 빨간 구슬이 영롱하게 빛난다."
        zh_simp:
          legends_arceus: "潜藏于暗处，发出幼儿般的啜泣声\n令旅人听之胆寒。当它以人们恐惧的模样\n取乐时，胸口的红珠会发出妖异的光辉。"
        zh_trad:
          legends_arceus: "潛藏於暗處，發出幼兒般的啜泣聲\n令旅人聽之膽寒。當牠以人們恐懼的模樣\n取樂時，胸口的紅珠會發出妖異的光輝。"
unown:
  species_id: 201
  names:
    jp_kanji: アンノーン
    en: Unown
    fr: Zarbi
    it: Unown
    de: Icognito
    es: Unown
    ko: 안농
    zh_simp: 未知图腾
    zh_trad: 未知圖騰
  forms:
    unown_a:
      form_id: 0
      names:
        jp_kanji: あるすがた
        en: One form
        fr: Forme Unique
        it: Forma Vaga
        de: Eine Form
        es: Forma de Unown
        ko: 형태별 모습
        zh_simp: 某种样子
        zh_trad: 某種樣子
      base_stats:
        hp: 48
        attack: 72
        defense: 48
        special_attack: 72
        special_defense: 48
        speed: 48
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - psychic
      descriptions:
        jp_kanji:
          legends_arceus: "生物とは思えぬ　異形の姿なり。\n形状　異なるもの多く　異国の文字との\n共通性を　訴えるも　評価されず。"
        en:
          legends_arceus: "It is hard to believe these strangely shaped Pokémon are truly\nliving creatures. I’ve pointed out that the species’ many forms\nresemble writing from other lands; no one will take me seriously."
        fr:
          legends_arceus: "Ce Pokémon à l’apparence singulière existe sous moult formes.\nJe semble être le seul à penser que ces dernières rappellent\nun alphabet étranger."
        it:
          legends_arceus: "Questi Pokémon sono multiformi e di apparenza così bizzarra\nche è difficile crederli creature viventi. Io sembro il solo\na vederli simiglianti a caratteri di una lingua straniera."
        de:
          legends_arceus: "Es ist kaum zu glauben, dass es sich bei diesem Pokémon um ein\nLebewesen handelt. Mir scheint, seine vielen Formen ähneln\nfremden Schriftzeichen, doch meine Theorie findet kein Gehör."
        es:
          legends_arceus: "Dada su apariencia extraña, dudo que sea un ser vivo. Mi teoría\nde que las diversas formas que existen podrían estar basadas en\nun alfabeto foráneo no ha recibido ningún respaldo."
        ko:
          legends_arceus: "생물로는 보이지 않는 특이한 생김새.\n형태가 다른 개체가 많고, 이국의 문자와\n공통성을 주장했으나, 받아들여지지 않았다."
        zh_simp:
          legends_arceus: "奇形怪状不似生物，且个体之间\n形状各异，本人指出其身姿与\n异国文字的共通之处，但未获重视。"
        zh_trad:
          legends_arceus: "奇形怪狀不似生物，且個體之間\n形狀各異，吾人指出其身姿與\n異國文字的共通性，但未獲重視。"
