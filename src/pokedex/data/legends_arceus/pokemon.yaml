        speed: 2
      types:
        - normal
      descriptions:
        jp_kanji:
          legends_arceus: "２本に　増えし尻尾を　繋ぎ　輪になり\n仲間の絆　確かめる。　稀に　人も\nその輪に　混ぜてもらうこと　あり。"
        en:
          legends_arceus: "To affirm their kinship, members of this species will form a ring\nby linking their newly doubled tails together. On rare occasions,\nhumans have been accepted into such rings."
        fr:
          legends_arceus: "Pour montrer leur affection, les Capidextre forment des cercles\nen joignant leurs deux queues à celles de leurs camarades. Très\nrarement, des êtres humains peuvent être invités à y participer."
        it:
          legends_arceus: "Come segno d’affetto reciproco, gli Ambipom uniscono\nmutuamente le due code formando un circolo. Rari sono\ngli umani a cui è concesso aggiungersi a tali anelli."
        de:
          legends_arceus: "Als Zeichen der Freundschaft bilden Ambidiffel Kreise, indem\nsie ihre zwei Schweife mit denen ihrer Artgenossen verbinden.\nBisweilen dürfen auch Menschen an diesem Ritual teilnehmen."
        es:
          legends_arceus: "Forma anillos uniendo ambas colas con las de sus semejantes\npara mostrar afecto. Muy poca gente ha tenido el honor de\npresenciar este ritual, mas se han dado casos."
        ko:
          legends_arceus: "2개로 늘어난 꼬리를 이어서 원을 만들고\n동료 간의 유대를 확인한다.\n드물게 사람도 그 원에 끼워 줄 때가 있다."
        zh_simp:
          legends_arceus: "用增为两根的尾巴彼此相牵形成\n圆环，借此感受伙伴间的牵绊。\n人类偶尔也会被邀请加入圆环之中。"
        zh_trad:
          legends_arceus: "用增為兩根的尾巴彼此相牽形成\n圓環，藉此感受夥伴間的牽絆。\n人類偶爾也會被邀請加入圓環之中。"
drifloon:
