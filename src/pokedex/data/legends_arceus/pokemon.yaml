        en:
          legends_arceus: "Though infantile in appearance, it has the mysterious ability to\nread the minds of humans. The pure of heart are met with\nRiolu’s approval, while those of ill nature earn only its loathing."
        fr:
          legends_arceus: "Malgré son apparence juvénile, Riolu possède le pouvoir\nsibyllin de lire dans l’âme des êtres humains. S’il apprécie\nles cœurs purs, les cœurs mauvais n’attirent que son mépris."
        it:
          legends_arceus: "Malgrado le sembianze puerili, possiede l’arcana facoltà\ndi leggere la mente umana. Apprezza i virtuosi ed esecra\ngli animi vili."
        de:
          legends_arceus: "Es ist von kindlicher Gestalt, doch es besitzt die wundersame\nGabe, in die Herzen der Menschen zu blicken. Gute Menschen\nrespektiert es, schlechte verabscheut es."
        es:
          legends_arceus: "De apariencia pueril, posee un enigmático poder que le permite\npercibir los sentimientos de la gente. Acepta a aquellos con\nbuen corazón y repudia a los que tienen malas intenciones."
        ko:
          legends_arceus: "어린 모습을 하고 있지만 인간의 마음을 읽는\n불가사의한 힘을 가지고 있어, 선량한 마음을\n가진 자를 높이 사고, 악한 마음을 증오한다."
        zh_simp:
          legends_arceus: "外貌似幼童，却拥有能解读人心的\n奇异力量。心性良善者将受其认可，\n心性邪恶者则会遭到憎厌。"
        zh_trad:
          legends_arceus: "外貌彷若幼童，卻擁有能夠解讀人心\n的奇異力量。心性良善者將受其認可，\n心性邪惡者則會遭其厭憎。"
