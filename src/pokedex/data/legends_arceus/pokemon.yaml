          legends_arceus: "長き舌を　手の如く　巧みに　操る。\n粘着質の唾液　集め　煮詰めれば\n強力な糊となり　役立つこと　多し。"
        en:
          legends_arceus: "Wields its long tongue deftly, as though it were an arm.\nThe Pokémon’s viscous saliva, once it has been collected and\nboiled down, yields a strong and highly useful adhesive."
        fr:
          legends_arceus: "Il utilise sa langue aussi aisément que nous nous servons\nde nos mains. En faisant bouillir sa salive visqueuse,\non peut fabriquer une glu fort utile."
        it:
          legends_arceus: "Adopra con destrezza la lingua bislunga alla stregua\ndi una mano. La viscosa saliva, se bollita, si converte\nin un efficace e utile collante."
        de:
          legends_arceus: "Es kann seine lange Zunge so geschickt einsetzen, als wäre sie\nein Arm. Kocht man den klebrigen Speichel ein, erhält man\neinen vielseitig verwendbaren, starken Leim."
        es:
          legends_arceus: "Usa su larga lengua con destreza, como si de una mano se\ntratase. Al hervir su untuosa saliva, se obtiene un pegamento\nmuy potente con multitud de usos."
        ko:
          legends_arceus: "기다란 혀를 손처럼 능숙하게 부린다.\n점착성을 띠는 타액을 모아서 졸이면\n강력한 풀이 되어 유용하게 쓰인다."
        zh_simp:
          legends_arceus: "口中长舌如同双手般灵巧。\n收集它带有黏性的唾液加以熬煮，\n便能制成用途广泛的强力黏胶。"
        zh_trad:
          legends_arceus: "口中長舌如同雙手般靈巧。\n收集牠帶有黏性的唾液加以熬煮，\n便能製成用途廣泛的強力黏膠。"
