        jp_kanji:
          legends_arceus: "身の丈　超える　獲物を　倒す威力の\n空気の波を　発す。　小さき風音を\n体内にて　増幅すると　推測す。"
        en:
          legends_arceus: "Can emit waves of air powerful enough to knock out prey taller\nthan itself. I hypothesize that it amplifies the faint sound of wind\nwithin its body."
        fr:
          legends_arceus: "Il émet de puissantes vagues d’air capables de terrasser\ndes proies plus grandes que lui. Je pense que son corps\namplifie le bruit du vent."
        it:
          legends_arceus: "Ingenera onde d’aria capaci di soverchiare prede ben più grandi\ndi lui. Stimo che catturi e accresca il debole suono del vento\nnel vacuo corpo."
        de:
          legends_arceus: "Dieses Pokémon kann Luftwellen erzeugen, die in der Lage sind,\nBeute zu erlegen, die größer ist als es selbst. Ich vermute, dass\nes dazu den Klang des Windes in seinem Körper verstärkt."
        es:
          legends_arceus: "Emite unas ondas de aire capaces de derribar a presas mayores\nque él. Creemos que amplifica el sonido del viento en el\ninterior de su cuerpo."
        ko:
          legends_arceus: "자신의 몸집보다 큰 먹이를 쓰러뜨릴 정도로\n강한 위력의 공기파를 발산한다. 작은 바람 소리를\n몸속에서 증폭시키는 것으로 추측된다."
        zh_simp:
          legends_arceus: "发出的空气波动威力大到足以击倒\n身高超过自己的猎物。据推测，这是\n它将微弱的风声在体内增幅后的结果。"
        zh_trad:
          legends_arceus: "發出的空氣波動威力大到足以擊倒\n身高超過自己的獵物。據推測這是\n牠將微弱的風聲在體內增幅後的結果。"
snorunt:
  species_id: 361
  names:
    jp_kanji: ユキワラシ
