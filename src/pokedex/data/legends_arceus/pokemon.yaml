        en:
          legends_arceus: "Comes to those whose lives have come to an end and escorts\ntheir souls to the afterlife. Known to mistakenly take the souls of\nthose who yet have life left in them, albeit rarely."
        fr:
          legends_arceus: "Ce Pokémon conduit l’âme de ceux dont la vie touche à sa fin\nvers l’au-delà. Il emmène parfois par mégarde une âme dont\nl’heure n’est pas encore venue, mais cela se produit rarement."
        it:
          legends_arceus: "Si palesa al capezzale dei prossimi al trapasso per condurne\nall’aldilà le anime. Talvolta, seppur di rado, cade in fallo\ncarpendo anime precocemente."
        de:
          legends_arceus: "Es erscheint vor jenen, deren Leben erloschen ist, und geleitet\nihre Seelen ins Jenseits. In seltenen Fällen nimmt es versehentlich\nauch jene mit, deren Zeit noch nicht gekommen ist."
        es:
          legends_arceus: "Aparece junto a aquellos al borde de la muerte y conduce sus\nalmas al inframundo. En ocasiones erra y se lleva el alma de\ngente a la que todavía no le había llegado su hora."
        ko:
          legends_arceus: "수명이 다해 가는 자의 곁에 나타나\n영혼을 황천으로 이끈다. 드물게 실수로\n여명이 남은 자의 영혼을 데려가기도 한다."
        zh_simp:
          legends_arceus: "会来到寿命将尽之人身旁，\n将其魂魄引向黄泉。偶尔会\n误将阳寿未尽之人的魂魄带走。"
        zh_trad:
          legends_arceus: "會來到壽命將盡之人身旁，\n將其魂魄引向黃泉。偶爾會\n誤將陽壽未盡之人的魂魄帶走。"
