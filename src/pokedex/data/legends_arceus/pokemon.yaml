          legends_arceus: "口より　水流　噴射す。　命中精度\n極めて　正確。　木の枝に　下がりし\nミノムッチを　撃ち落とし　捕らえる。"
        en:
          legends_arceus: "Spits water from its mouth with incredible accuracy. It captures\nBurmy by shooting them down off the branches from which\nthey dangle."
        fr:
          legends_arceus: "Ce Pokémon crache de l’eau avec une extrême précision.\nIl profite de cette aptitude pour décrocher les Cheniti\nsuspendus aux arbres afin de les capturer."
        it:
          legends_arceus: "Con mirabile precisione eietta dalle fauci fiotti d’acqua.\nAbbatte i Burmy che penzolano dai rami degli alberi\nper poi ghermirli."
        de:
          legends_arceus: "Dieses Pokémon spritzt mit hoher Präzision Wassersalven aus\nseinem Maul. Es nutzt diese Fertigkeit, um von Ästen hängende\nBurmy herunterzuschießen und sie dadurch zu fangen."
        es:
          legends_arceus: "Tiene una puntería excepcional con los chorros de agua que\ndispara por la boca. Los usa para derribar a los Burmy que\ncuelgan de las ramas de los árboles y atraparlos."
        ko:
          legends_arceus: "입에서 물줄기를 분사한다. 조준의 정확도는\n매우 높은 편인데, 나뭇가지에 매달려 있는\n도롱충이를 맞춰서 잡을 정도다."
        zh_simp:
          legends_arceus: "从口中喷射出的水流能够极为\n精确地命中所瞄准的目标。\n会击落并猎捕吊在树枝上的结草儿。"
        zh_trad:
          legends_arceus: "從口中噴射出的水流能夠極為\n精確地命中所瞄準的目標。\n會擊落並獵捕吊在樹枝上的結草兒。"
