        it:
          legends_arceus: "Contrae ed estende a piacimento la lingua, che può misurare\noltre il decuplo della sua statura. I solventi contenuti nella saliva\nrichiedono cautela."
        de:
          legends_arceus: "Es kann seine elastische Zunge nach Belieben auf das Zehnfache\nseiner Körpergröße ausdehnen und auch wieder einziehen.\nDoch Vorsicht: Der Speichel enthält zersetzende Bestandteile."
        es:
          legends_arceus: "Posee una lengua retráctil que, extendida, alcanza más de diez\nveces su tamaño. Su saliva contiene agentes disolventes que es\nmejor evitar."
        ko:
          legends_arceus: "혀는 자유자재로 늘어나서\n자신의 키의 10배 이상으로 늘일 수 있다.\n타액에 용해 성분이 포함되어 있어 주의해야 한다."
        zh_simp:
          legends_arceus: "舌头伸缩自如，最长可延展至\n自身体长的十倍以上。唾液中\n含有溶解成分，不可掉以轻心。"
        zh_trad:
          legends_arceus: "舌頭伸縮自如，最長可延展至\n自身體長的十倍以上。唾液中\n含有溶解成分，不可掉以輕心。"
