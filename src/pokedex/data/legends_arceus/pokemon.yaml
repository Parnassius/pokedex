        en:
          legends_arceus: "A most gallant-looking creature. It emits energy waves and\ncontrols them with precision, using them to sense even faraway\nbeings. I have given the name “aura” to this power."
        fr:
          legends_arceus: "Grâce à un pouvoir que j’ai nommé « aura », ce Pokémon\nà l’allure brave émet des ondes d’énergie pour sentir\nla présence d’individus, même s’ils sont éloignés."
        it:
          legends_arceus: "Vanta fattezze maestose. Irradia a proprio piacimento onde\nd’energia con cui capta la presenza di altri organismi a distanza\ngrazie a un potere che battezzerò \"aura\"."
        de:
          legends_arceus: "Dank einer Kraft, die ich „Aura“ genannt habe, kann dieses\nschneidige Pokémon Wellen aussenden und manipulieren.\nDiese nutzt es, um weit entfernte Wesen wahrzunehmen."
        es:
          legends_arceus: "De porte majestuoso, puede sentir presencias a gran distancia\ncon las ondas que emite y controla a voluntad. Hemos\nbautizado este extraño poder con el nombre de \"aura\"."
        ko:
          legends_arceus: "용감하고 씩씩한 자태를 지녔다. 발산하는 기의\n파장을 자유롭게 부려 떨어진 이를 감지해 내는 힘.\n나는 이것을 “파동”이라 명명했다."
        zh_simp:
          legends_arceus: "容貌威风凛凛。能发出气之波动并自在\n加以引导，借此探知远处对手的虚实。\n本人将此种能力命名为波导。"
        zh_trad:
          legends_arceus: "容貌威風凜凜。能發出氣之波動並自在\n加以引導，藉以探知遠處對手的虛實。\n吾人將此種能力命名為波導。"
