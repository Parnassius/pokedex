        en:
          legends_arceus: "Mushroom-lacking specimens of this Pokémon lie unmoving in\nthe forest, lending credence to the hypothesis that the large\nmushroom is in control of Parasect’s actions."
        fr:
          legends_arceus: "J’ai trouvé un spécimen de cette espèce sans champignon,\nimmobile dans la forêt. Cela confirme mon hypothèse :\nc’est le champignon qui contrôle l’insecte !"
        it:
          legends_arceus: "Si osservano nel bosco esemplari inerti privi di fungo,\nil che corrobora l’ipotesi che proprio il grosso fungo\ncostituisca la parte essenziale della creatura."
        de:
          legends_arceus: "Mitunter erspäht man reglose Exemplare im Wald, die keinen\nPilz auf dem Rücken tragen. Dies bestätigt die Theorie, wonach\nder Pilz sein eigentlicher Körper ist und Parasek kontrolliert."
        es:
          legends_arceus: "A veces se encuentran en los bosques ejemplares inmóviles sin\nla seta del lomo. Esto corrobora la teoría de que es la enorme\nseta quien los domina."
        ko:
          legends_arceus: "숲에서 등의 버섯이 떨어져 움직이지 못하는\n개체를 발견했다. 커다란 버섯 그 자체가\n본체라는 학설을 증명할 샘플이다."
        zh_simp:
          legends_arceus: "森林中存在着背上蘑菇脱落后\n丝毫不动的个体，此样本足可用以\n证明大大的蘑菇才是真身的学说。"
        zh_trad:
          legends_arceus: "森林中存在著背上蘑菇脫落後\n絲毫不動的個體，此樣本足可用以\n證明大大的蘑菇才是本體的學說。"
