        en:
          legends_arceus: "Lives on mountains blanketed in perennial snow. It freezes water\nvapor in the air to make the ice helmet that it dons for defense."
        fr:
          legends_arceus: "Ce Pokémon gîte dans les montagnes recouvertes de neige\néternelle. Il gèle l’eau présente dans l’air pour confectionner\nun casque avec lequel il se protège."
        it:
          legends_arceus: "Dimora nei picchi ammantati di nevi perpetue. Protegge\nle membra indossando un cimiero glaciale formato\ngelando l’umidità dell’aere."
        de:
          legends_arceus: "Es ist im ewigen Schnee der Berge zu Hause und lässt das in der\nLuft enthaltene Wasser gefrieren, um daraus einen Eishelm zum\neigenen Schutze zu fertigen."
        es:
          legends_arceus: "Habita en montañas de nieves perpetuas. Congela el vapor de\nagua del aire para crear un casco de hielo que le sirve como\ndefensa."
        ko:
          legends_arceus: "만년설에 뒤덮인 산악 지대에 서식한다.\n대기 중의 수분을 얼려서 만든\n얼음 투구를 써서 몸을 지킨다."
        zh_simp:
          legends_arceus: "栖息在万年积雪覆盖的山区。\n戴着将大气中的水分冷冻后\n形成的冰盔，借此保护自己。"
        zh_trad:
          legends_arceus: "棲息在萬年積雪覆蓋的山區。\n戴著將大氣中的水分冷凍後\n形成的冰盔，藉此保護自己。"
