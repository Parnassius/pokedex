      descriptions:
        jp_kanji:
          legends_arceus: "金色に　輝く　毛並みは　見事なり。\n９本の　長き尾に　聖なる力　秘め\n千歳　生き長らえると　伝わる。"
        en:
          legends_arceus: "The coat of gleaming golden fur is quite magnificent.\nThis species is said to store sacred power in its nine long tails\nand to live for a millennium."
        fr:
          legends_arceus: "Son superbe pelage brille d’une lueur dorée. Ses neuf longues\nqueues renfermeraient un pouvoir sacral lui octroyant une vie\nde mille ans."
        it:
          legends_arceus: "Il suo mirabile vello risplende di luce aurea. Si narra che viva\nun millennio e che le sue nove lunghe code custodiscano\nun potere ultraterreno."
        de:
          legends_arceus: "Es hat ein prächtiges Fell, das gülden glänzt. Von den neun\nlangen Schweifen heißt es, sie besäßen heilige Kräfte, die ihm\ntausendjähriges Leben schenken."
        es:
          legends_arceus: "Posee un maravilloso pelaje con un brillo dorado. Cuentan que\nsus nueve largas colas encierran un poder sagrado y que puede\nvivir mil años."
        ko:
          legends_arceus: "금빛으로 빛나는 털은 훌륭한 윤기가 흐른다.\n9개의 긴 꼬리에 신성한 힘을 담고 있어\n천 년을 산다고 전해진다."
        zh_simp:
          legends_arceus: "拥有金光闪耀的亮丽毛皮。\n九根长尾蕴藏神圣之力，\n传说可以活上千岁之久。"
        zh_trad:
          legends_arceus: "擁有金光閃耀的亮麗毛皮。\n九根長尾蘊藏神聖之力，\n傳說可以活上千歲之久。"
