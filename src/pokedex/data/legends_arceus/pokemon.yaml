        jp_kanji:
          legends_arceus: "古来　ヒスイの民より　波濤殿と\n呼ばれ　奉られし　ポケモン。\nその翼　名工の業物に　匹敵す。"
        en:
          legends_arceus: "Since ancient times, it has been revered by the people of Hisui,\nwho call it the Master of the Waves. Its wings are a match for\neven master-crafted blades."
        fr:
          legends_arceus: "Les habitants de Hisui l’appellent « l’empereur des flots » et\nle vénèrent depuis le temps jadis. Ses ailes sont comparables\naux épées forgées par les meilleurs artisans."
        it:
          legends_arceus: "Da tempi remoti è noto alle genti di Hisui come il \"signore\ndei flutti\". Le sue ali fendono al pari di lame forgiate\nda sopraffini maestri."
        de:
          legends_arceus: "Die Einwohner Hisuis verehren dieses Pokémon seit jeher als\nden „Fürsten der Wellen“. Seine messerscharfen Flügel stehen\nselbst den Klingen eines Meisterschmiedes in nichts nach."
        es:
          legends_arceus: "Venerado en épocas pasadas en Hisui bajo el apodo de\nEmperador del Oleaje. Sus aletas son tan afiladas como\nuna cuchilla forjada por manos expertas."
        ko:
          legends_arceus: "예로부터 히스이 사람들에게\n파도의 왕이라 불리며 받들어져 온 포켓몬.\n그 날개는 명장이 만든 검에 필적한다."
        zh_simp:
          legends_arceus: "被洗翠居民称为波涛之主，\n自古便受到崇拜的宝可梦。\n其双翼足以匹敌名匠打造的利器。"
        zh_trad:
          legends_arceus: "被洗翠的居民稱為波濤之主，\n自古便受到崇拜的寶可夢。\n其雙翼足以匹敵名匠打造的利器。"
