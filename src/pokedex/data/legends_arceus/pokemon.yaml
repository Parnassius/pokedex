    es: Sneasler
    ko: 포푸니크
    zh_simp: 大狃拉
    zh_trad: 大狃拉
  forms:
    sneasler:
      form_id: 0
      base_stats:
        hp: 80
        attack: 130
        defense: 60
        special_attack: 40
        special_defense: 80
        speed: 120
      evs_yield:
        hp: 0
        attack: 1
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 1
      types:
        - fighting
        - poison
      descriptions:
        jp_kanji:
          legends_arceus: "他種圧倒する　身体能力と　猛毒　有し\n寒冷なる　高地においては　敵なし。\n群れ成さず　単独を良しとする　性質。"
        en:
          legends_arceus: "Because of Sneasler’s virulent poison and daunting physical\nprowess, no other species could hope to best it on the frozen\nhighlands. Preferring solitude, this species does not form packs."
        fr:
          legends_arceus: "Ce Pokémon n’a guère d’ennemis sur les hauteurs froidies,\ncar ses aptitudes physiques sont sans égales et son poison\nest mortel. Il préfère la solitude à la vie en groupe."
        it:
          legends_arceus: "Nei frigidi altipiani non ha pari grazie al veleno che produce\ne a capacità fisiche che nessun’altra specie può eguagliare.\nNon vive in branco e ben sopporta la solitudine."
        de:
          legends_arceus: "Im frostigen Hochland kann diesem Einzelgänger kein anderes\nPokémon das Wasser reichen, da er neben hochwirksamem Gift\nüber herausragende körperliche Fähigkeiten verfügt."
        es:
          legends_arceus: "Gracias a su fortaleza física y potente veneno, ninguna especie\nde las alturas heladas le planta cara. Es de personalidad\nsolitaria y no forma manadas."
        ko:
          legends_arceus: "다른 종을 압도하는 신체 능력과 맹독을 가지고 있어\n한랭한 고지대에서는 맞수가 없다.\n무리를 이루지 않고 고독함을 즐긴다."
        zh_simp:
          legends_arceus: "拥有凌驾其他物种之上的身体能力\n以及剧毒。在寒冷的高地上所向无敌。\n偏好独自行动，而不会集结成群。"
        zh_trad:
          legends_arceus: "擁有凌駕其他物種之上的身體能力\n以及劇毒。在寒冷的高地上所向無敵。\n偏好獨自行動，而不會集結成群。"
