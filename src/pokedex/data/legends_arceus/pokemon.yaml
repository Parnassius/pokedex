        en:
          legends_arceus: "Scatters steel-colored scales as it flaps its wings. Despite\nbeing observed feeding primarily on the nectar of flowers,\nMothim is not often seen around flower gardens."
        fr:
          legends_arceus: "Lorsqu’il bat des ailes, il répand une poudre aux reflets\nargentés. Même s’il a été observé se nourrissant de nectar,\nil est rare de le voir dans les champs de fleurs."
        it:
          legends_arceus: "Sbatte le ali spargendo scaglie color acciaio. Benché il polline\npaia essere il suo alimento primario, di rado si palesa nei campi\nin fiore."
        de:
          legends_arceus: "Durch das Flattern seiner Flügel verstreut es metallfarbenen\nStaub. Es scheint sich hauptsächlich von Nektar zu ernähren,\njedoch findet man es nur selten in Blumenbeeten."
        es:
          legends_arceus: "Esparce un polvo plateado al revolotear. A pesar de alimentarse\na base de néctar, por algún motivo, no es común encontrarlo en\nlos campos de flores."
        ko:
          legends_arceus: "강철색 인분을 흩뿌리며 날갯짓한다.\n꽃의 꿀이 주식인 것으로 관찰되었으나\n꽃밭에서 발견되는 일은 드물다."
        zh_simp:
          legends_arceus: "拍动翅膀时会洒下银灰色的鳞粉。\n虽然观察结果显示其主食是花蜜，\n但却很少在花田看见它们。"
        zh_trad:
          legends_arceus: "拍動翅膀時會灑下銀灰色的鱗粉。\n雖然觀察結果顯示其主食是花蜜，\n但卻很少在花田看見牠們。"
