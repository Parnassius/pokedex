        jp_kanji:
          legends_arceus: "腕の　大きな　鎌は　切れ味　鋭く\n真に　恐ろしき　得物なり。　動き\n俊敏にして　獲物　逃がすことなし。"
        en:
          legends_arceus: "The large, wickedly sharp scythes on its forearms are truly\nfearsome weapons. Prey’s attempts to flee are unfailingly\nthwarted by this Pokémon’s nimble motions."
        fr:
          legends_arceus: "Les grandes serpes tranchantes qu’il possède en lieu et place\nde ses avant-bras sont de terribles armes. Leste et véloce,\nil ne laisse jamais fuir sa proie."
        it:
          legends_arceus: "Le grandi falci degli arti superiori sono armi assai taglienti\ne temibili. Creatura destra e accorta, non manca mai la preda."
        de:
          legends_arceus: "Die großen, scharfen Sicheln an seinen Armen sind wahrlich\nfurchteinflößende Waffen. Diese setzt es mit enormer Agilität\nein und vereitelt so jegliche Fluchtversuche seiner Beute."
        es:
          legends_arceus: "Las guadañas que tiene por brazos, enormes y muy afiladas,\nson un arma temible. No hay presa que escape a sus ágiles\nmovimientos."
        ko:
          legends_arceus: "팔에 달린 커다란 낫은 아주 예리하여\n실로 무서운 무기가 된다.\n움직임이 날래어 먹이를 놓치는 법이 없다."
        zh_simp:
          legends_arceus: "双臂的大镰刀锋利程度堪比\n神兵利器。动作迅捷灵敏，\n没有猎物能逃出其指掌。"
        zh_trad:
          legends_arceus: "雙臂的大鐮刀鋒利程度堪比\n神兵利器。動作迅捷靈敏，\n沒有獵物能逃出其指掌。"
