        en:
          legends_arceus: "Its robust stomach allows it to nonchalantly devour even rotted\nmatter. It pays frequent visits to villages, seeking out food\nscraps intended for compost."
        fr:
          legends_arceus: "Son estomac robuste peut supporter les aliments les plus avariés.\nGoinfrex apparaît dans les villages, à la recherche d’ordures\norganiques destinées au compost."
        it:
          legends_arceus: "Provvisto di un robusto stomaco, si sazia con cibi marcescenti\nsenza remore. Visita assiduamente il villaggio in cerca di rifiuti\ndestinati al concime."
        de:
          legends_arceus: "Sein robuster Magen verträgt selbst Verdorbenes. Es kommt\nregelmäßig in Dörfer, um nach Küchenabfällen zu suchen,\ndie für den Komposthaufen vorgesehen waren."
        es:
          legends_arceus: "Su robusto estómago aguanta incluso alimentos echados a\nperder. Suele visitar la villa atraído por los residuos orgánicos\ndestinados a crear abono."
        ko:
          legends_arceus: "위장이 튼튼하여 상한 것도 아랑곳하지 않고\n먹어 치운다. 퇴비의 원료가 되는\n음식물 쓰레기를 노리고 마을에 출몰한다."
        zh_simp:
          legends_arceus: "拥有强健的胃，即使是腐烂的食物\n也能大快朵颐。会出没在村落中，\n寻找被当成堆肥原料的残羹剩饭。"
        zh_trad:
          legends_arceus: "擁有強健的胃臟，即使是腐敗的食物\n也能大快朵頤。會出沒在村落中，\n尋找被當成堆肥原料的殘羹剩飯。"
