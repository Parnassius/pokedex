        jp_kanji:
          legends_arceus: "水　濁りし　沼地を　棲み処とす。\n視界　悪く　天敵より　姿を隠す。\n体表の粘液により　手掴み　難儀なり。"
        en:
          legends_arceus: "Makes its home in swamps with murky water. The poor visibility\nhides this Pokémon from predators, and the slime on its body\nmakes grasping it difficult."
        fr:
          legends_arceus: "Il gîte dans l’eau boueuse des marais où la visibilité réduite\nle protège des prédateurs. Son corps est difficile à attraper,\ncar il est recouvert d’un film visqueux."
        it:
          legends_arceus: "Dimora in acque palustri, melmose e torbide, che lo celano\nalla vista dei predatori. Il muco della cute lo rende difficile\nda ghermire."
        de:
          legends_arceus: "Es lebt in trüben Sumpfgewässern, wo es dank der schlechten\nSicht vor natürlichen Feinden geschützt ist. Der Schleim an\nseinem Körper macht es schwierig, Schmerbe zu greifen."
        es:
          legends_arceus: "Vive en pantanos de aguas turbias donde la baja visibilidad lo\nesconde de los depredadores. La sustancia viscosa que lo\nrecubre lo hace difícil de agarrar."
        ko:
          legends_arceus: "물이 탁한 늪지를 거처로 삼는다.\n시야가 좋지 않아 천적에게서 몸을 숨긴다.\n몸의 표면의 점액 때문에 붙잡기 쉽지 않다."
        zh_simp:
          legends_arceus: "以水质混浊的沼泽为居所，\n藏身于浊水之中躲避天敌的视线。\n体表的黏液使得它很难用手抓住。"
        zh_trad:
          legends_arceus: "以水質混濁的沼澤為居所，\n藏身於濁水之中躲避天敵的視線。\n體表的黏液使得牠很難用手抓住。"
whiscash:
