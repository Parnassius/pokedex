        en:
          legends_arceus: "When the cold season arrives in Hisui, this Pokémon will wander\nfields and mountains alike in search of its favorite berries.\nUrsaring’s hunger during this time makes it a ferocious danger."
        fr:
          legends_arceus: "À la venue de l’hiver, il part à la recherche de ses Baies\nfavorites dans les montagnes et les plaines de Hisui.\nLa faim le rend irritable et fort agressif."
        it:
          legends_arceus: "Durante la stagione fredda, vaga per le piane e i monti di Hisui\nin cerca delle bacche predilette. L’insaziabile voracità può\nrenderlo iracondo e assai feroce."
        de:
          legends_arceus: "Wenn der Winter Hisui in eisige Kälte hüllt, streift es auf der\nSuche nach seinen Lieblingsbeeren durch Felder und Gebirge.\nMit leerem Magen ist es leicht reizbar und äußerst brutal."
        es:
          legends_arceus: "Cuando el frío comienza a extenderse por la región de Hisui,\nrecorre los campos y montañas en busca de sus bayas favoritas.\nEl hambre lo vuelve extremadamente violento."
        ko:
          legends_arceus: "히스이 땅에 한기가 뒤덮이는 계절이 오면\n좋아하는 나무열매를 모으러 산을 배회한다.\n공복이라 신경이 예민하여 매우 흉포하다."
        zh_simp:
          legends_arceus: "在洗翠大地被严寒笼罩的季节里，\n徘徊于山野之中寻找爱吃的树果。\n空腹带来的焦躁使它变得极为凶暴。"
        zh_trad:
          legends_arceus: "在洗翠大地被嚴寒籠罩的季節裡，\n徘徊於山野之中尋找愛吃的樹果。\n空腹帶來的焦躁使牠變得極為凶暴。"
