        en:
          legends_arceus: "Draped with long vines, it resembles a shrub in appearance.\nIt swings bundles of vines as though they were arms, wrapping\nthem around prey to ensnare them."
        fr:
          legends_arceus: "Ses longues lianes entremêlées lui donnent l’allure d’un buisson.\nIl utilise ces lianes comme des bras qu’il enroule autour de\nses proies pour les ligoter."
        it:
          legends_arceus: "Avvolto da liane fluenti, ha fattezze simili a un cespuglio\nfrondoso. Ghermisce le prede con fasci di liane che adopra\na guisa di arti superiori."
        de:
          legends_arceus: "Aufgrund der langen Ranken, die seine Gestalt bedecken,\nerinnert es an einen Busch. Es bewegt gebündelte Ranken\nwie Arme und umschlingt damit seine Beute."
        es:
          legends_arceus: "La maraña de largas lianas que cubre su cuerpo le confiere\naspecto de matorral. Las trenza a modo de brazos con los\nque atrapa a sus presas."
        ko:
          legends_arceus: "기다란 덩굴에 감겨 있는 모습은 풀숲과도 같다.\n뭉쳐진 덩굴을 팔처럼 휘둘러\n먹이를 휘감은 다음 그대로 포박한다."
        zh_simp:
          legends_arceus: "全身缠满长长藤蔓的模样看起来\n就如一丛杂草。能将束起的藤蔓\n像手臂般自在挥舞，用以卷住猎物。"
        zh_trad:
          legends_arceus: "全身纏滿長長藤蔓的模樣看起來\n就如一叢雜草。能將束起的藤蔓\n像手臂般自在揮舞，用以捲住獵物。"
