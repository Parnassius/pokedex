        it:
          legends_arceus: "Questi Pokémon pattugliano il territorio in coppia. In base\nalle mie indagini, la presenza di componenti di rocce ignee\nnel loro vello parrebbe cagionata dall’attività vulcanica."
        de:
          legends_arceus: "Sie patrouillieren ihr Revier zu zweit. In ihrem Fell lassen sich\nKomponenten von Magmagestein finden, was vermutlich auf\nvulkanische Aktivität innerhalb ihres Habitats verweist."
        es:
          legends_arceus: "Patrullan su territorio en pareja. Las rocas ígneas que salpican su\npelaje quizá sean el resultado de la actividad volcánica del\nlugar."
        ko:
          legends_arceus: "짝을 이루어 영역을 지킨다.\n털에 화성암의 성분이 섞여 있는 것은\n화산 활동의 영향인 것으로 추측된다."
        zh_simp:
          legends_arceus: "两只一组共同负责地盘的警卫工作。\n体毛中混有火成岩的成分，可以\n推想这是受到火山活动的影响。"
        zh_trad:
          legends_arceus: "兩隻一組共同負責地盤的警戒工作。\n體毛中混有火成岩的成分，可以\n推想這是受到火山活動的影響。"
