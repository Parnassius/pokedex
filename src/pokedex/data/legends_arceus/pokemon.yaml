        it:
          legends_arceus: "Ad ogni lieve lesione del manto utilizza materiali\nimmediatamente disponibili per rappezzarlo.\nCela delle membra deboli e sensibili al freddo."
        de:
          legends_arceus: "Sein Körper ist dürr und kälteanfällig. Wird sein Umhang auch\nnur leicht beschädigt, bessert es ihn sogleich mit Material in\ngreifbarer Nähe aus."
        es:
          legends_arceus: "Su cuerpo flacucho no soporta el frío. Si su manto se daña, aun\nsi es levemente, lo repara sin demora con lo que tenga a mano."
        ko:
          legends_arceus: "조금이라도 도롱이가 손상되면\n곧바로 주위에 있는 재료로 수선한다.\n본체는 연약하고 추위에 약하다."
        zh_simp:
          legends_arceus: "蓑衣只要稍有缺损，就会立即\n用身边的材料加以修补。蓑衣内\n的身体十分细瘦且畏惧寒冷。"
        zh_trad:
