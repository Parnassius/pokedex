        it:
          legends_arceus: "Un Pokémon invero periglioso, la cui affilata chela caudale\ncontiene veleno. Non tollera le basse temperature."
        de:
          legends_arceus: "Seine scharfen und giftigen Scheren machen es zu einem\nwahrlich gefährlichen Pokémon. Kälte scheint es jedoch nicht\nso gut zu vertragen."
        es:
          legends_arceus: "Un Pokémon extremadamente peligroso debido a sus afiladas\npinzas repletas de veneno. Parece no tolerar bien las bajas\ntemperaturas."
        ko:
          legends_arceus: "예리한 집게에 독까지 갖춘\n실로 위험한 포켓몬이다.\n하지만 추위에는 약한 듯하다."
        zh_simp:
          legends_arceus: "钳子不但锐利而且带毒，\n毫无疑问是种危险的宝可梦。\n但对于寒冷似乎缺乏抵抗力。"
        zh_trad:
          legends_arceus: "尾上鉗子不但銳利而且帶毒，\n毫無疑問是種危險的寶可夢。\n但對於寒冷似乎缺乏抵抗力。"
