      types:
        - water
        - dark
      descriptions:
        jp_kanji:
          legends_arceus: "非情なる　気質と　太刀筋を　有す。\n怒涛の　連撃は　千重波の　如し。\nヒスイにて　進化せし　稀有なる姿。"
        en:
          legends_arceus: "Hard of heart and deft of blade, this rare form of Samurott is\na product of the Pokémon’s evolution in the region of Hisui. Its\nturbulent blows crash into foes like ceaseless pounding waves."
        fr:
          legends_arceus: "Cette fine lame au tempérament impitoyable est une évolution\nrare qui ne se produit qu’à Hisui. Ses attaques sont aussi\nravageuses que les vagues déferlantes."
        it:
          legends_arceus: "Abile spadaccino dal carattere spietato, attacca con una\nsequela di colpi simili a mille burrascosi flutti. Di raro\nsembiante, frutto dell’evoluzione a Hisui."
        de:
          legends_arceus: "Unbarmherzig, doch meisterhaft im Umgang mit dem Schwert,\nlässt es seine Hiebe auf Gegner hereinbrechen wie Wellen in\nder Brandung. Diese seltene Form entwickelte sich in Hisui."
        es:
          legends_arceus: "De actitud indiferente y muy hábil con la espada, propina\nincesantes y violentos ataques cual maremoto. Se trata de una\nforma poco común que solo se da en Hisui."
        ko:
          legends_arceus: "히스이에서 진화한 희귀한 모습.\n비정한 성격과 칼 솜씨를 자랑한다.\n성난 파도 같은 연격은 천 겹의 파도와도 같다."
        zh_simp:
          legends_arceus: "性情与刀路皆是残酷无情。\n连绵不断的攻击彷如千层浪涛。\n此乃只在洗翠进化而成的稀有姿态。"
        zh_trad:
          legends_arceus: "性情與刀路皆是殘酷無情。\n連綿不斷的攻擊彷如千層浪濤。\n此乃只在洗翠進化而成的稀有姿態。"
