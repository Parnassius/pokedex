        jp_kanji:
          legends_arceus: "多湿なる　森の　木の根本で　散見す。\n背の茸は　冬虫夏草なり。　幼体には\nこれ　無く　育つにつれ　生え出づる。"
        en:
          legends_arceus: "Sometimes seen at the foot of trees in humid forests.\nThe mushrooms on its back—called tochukaso—are not present\non infant specimens and instead emerge as Paras matures."
        fr:
          legends_arceus: "On le trouve près des racines d’arbres dans les forêts\nhumides. Des champignons parasites se développent\nsur son dos à mesure qu’il grandit."
        it:
          legends_arceus: "Si suole trovarlo fra le radici degli alberi in umide foreste.\nI piccoli sono privi di tochukaso, ossia dei funghi che crescono\nsul dorso in età adulta."
        de:
          legends_arceus: "Man findet es vereinzelt an Baumwurzeln in feuchten Wäldern.\nDie Tochukaso-Pilze auf dem Rücken fehlen bei Geburt und\nwachsen erst mit der Zeit heran."
        es:
          legends_arceus: "Se suele dejar ver en bosques húmedos, cerca de las raíces\nde los árboles. Nace sin las setas tochukaso del lomo, que\nbrotan a medida que crece."
        ko:
          legends_arceus: "다습한 숲의 나무뿌리에 드물게 보인다.\n등에 달린 버섯은 동충하초로\n어린 개체에는 없으나 성장하며 돋아난다."
        zh_simp:
          legends_arceus: "散见于潮湿森林里的树木根部。\n背上名为冬虫夏草的蘑菇并非\n与生俱来，而是随着幼体发育而长出。"
        zh_trad:
          legends_arceus: "散見於潮濕森林裡的樹木根部。\n背上名為冬蟲夏草的蘑菇並非\n與生俱來，而是隨著幼體發育而長出。"
