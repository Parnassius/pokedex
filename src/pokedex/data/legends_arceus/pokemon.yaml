        fr:
          legends_arceus: "Un étrange objet a provoqué l’évolution de ce Pokémon.\nLes cylindres au bout de ses bras projettent des boules de feu\nsi ardentes qu’elles liquéfieraient instantanément une marmite."
        it:
          legends_arceus: "Si è evoluto per mezzo di un singolare strumento.\nL’incandescenza dei globi infuocati eiettati dalle membra\ncilindriche è tale da fondere tosto persino un tegame di ferro."
        de:
          legends_arceus: "Es entwickelte sich mithilfe eines seltsamen Gegenstands.\nDie Feuerbälle, die es aus seinen röhrenförmigen Unterarmen\nschießt, sind so heiß, dass sie im Nu Eisentöpfe schmelzen."
        es:
          legends_arceus: "Un extraño objeto provocó esta evolución. Sus brazos\ncilíndricos disparan bolas de fuego a una temperatura\ncapaz de fundir hierro instantáneamente."
        ko:
          legends_arceus: "기묘한 도구에 의해 진화한 모습.\n원통형의 팔 끝에서 나오는 불덩이는\n쇠로 된 냄비도 순식간에 녹여 버릴 정도로 뜨겁다."
        zh_simp:
          legends_arceus: "凭借奇异的道具进化而成。\n从筒状的手臂发射出的火球\n有着可在瞬间融化铁锅的高温。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具進化而成。\n從筒狀的手臂發射出的火球\n有著可在瞬間熔化鐵鍋的高溫。"
