        en:
          legends_arceus: "Its sturdy, curved claws are ideal for traversing precipitous cliffs.\nFrom the tips of these claws drips a venom that infiltrates the\nnerves of any prey caught in Sneasel’s grasp."
        fr:
          legends_arceus: "La forme de ses griffes puissantes lui procure un avantage pour\nescalader les précipices escarpés. Le poison qui flue de leur\nextrémité agit sur les nerfs des proies capturées par Farfuret."
        it:
          legends_arceus: "Possiede dei robusti artigli, la cui foggia adunca gli consente\ndi valicare scoscesi dirupi. Le estremità stillano veleno\nche reca danno ai nervi delle prede catturate."
        de:
          legends_arceus: "Seine robusten Krallen eignen sich ideal dazu, steile Felswände\nzu erklimmen. Von den Spitzen tropft Gift, welches die Nerven\nseiner Beute lähmt."
        es:
          legends_arceus: "Sus robustas garras son ideales para moverse por los riscos más\nescarpados. De sus puntas rezuma un veneno que daña los\nnervios de las presas que captura."
        ko:
          legends_arceus: "단단한 갈고리손톱은 가파른 절벽을 오르기에\n유리하다. 끄트머리에서 나오는 독액은\n먹이를 잡을 때 신경에 침투한다."
        zh_simp:
          legends_arceus: "强健的爪子形状有助于在断崖绝壁上\n行动自如。爪子尖端滴出的毒液会在\n捉住猎物时侵袭其神经。"
        zh_trad:
          legends_arceus: "強健的爪子形狀有助於在斷崖絕壁上\n行動自如。爪子尖端滴出的毒液會在\n捉住獵物時侵襲其神經。"
