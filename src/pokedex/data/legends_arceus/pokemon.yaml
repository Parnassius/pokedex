        en:
          legends_arceus: "Ludicrously strong—when it butts heads with a mountain, it is\nthe mountain that shatters. But its short legs struggle with turns,\nand it is incapable of stopping unless it collides with something."
        fr:
          legends_arceus: "Il peut détruire une montagne d’un coup de tête grâce à sa\nforce démesurée. Bas sur pattes, il peine à changer de direction,\net ne peut s’arrêter à moins de heurter un obstacle."
        it:
          legends_arceus: "Con la sua forza bruta frantuma montagne a suon di testate.\nHa zampe tozze incapaci di svoltare, e può arrestarsi solo\ncozzando contro un ostacolo."
        de:
          legends_arceus: "Dieser Kraftprotz kann mit dem Kopf ganze Berge zertrümmern.\nAufgrund seiner kurzen Beine fällt ihm das Wenden schwer,\ndaher stürmt er so lange vorwärts, bis ihn ein Hindernis aufhält."
        es:
          legends_arceus: "Puede partir montañas a cabezazos con su fuerza descomunal.\nSus cortas patas le impiden girar con facilidad, y es incapaz de\ndetenerse hasta chocar con algo."
        ko:
          legends_arceus: "바위산을 박치기로 부술 정도로 힘이 장사다.\n짧은 다리는 방향 전환에 적합하지 않아서\n무언가와 충돌할 때까지 멈출 수 없다."
        zh_simp:
          legends_arceus: "力大无穷，可用头撞碎山岩。\n四只短腿不擅长回旋，\n在撞上东西之前无法停止。"
        zh_trad:
          legends_arceus: "力大無窮，可用頭撞碎山岩。\n四隻短腿不擅長迴旋，\n在撞上東西之前無法停止。"
