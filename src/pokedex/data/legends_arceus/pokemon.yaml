        jp_kanji:
          legends_arceus: "体毛は　水弾きに　優れ　かつ　\n保温性　上々の　高性能なり。\n河川に　ダムを　こしらえ　巣とす。"
        en:
          legends_arceus: "Bibarel fur repels water and is also a fantastic material for heat\nretention. These Pokémon create dams on rivers to live in."
        fr:
          legends_arceus: "Son pelage imperméable possède d’excellentes propriétés\nd’isolation thermique. Ce Pokémon gîte dans les barrages\nqu’il fabrique dans les rivières."
        it:
          legends_arceus: "Il pregevole vello repelle eccelsamente l’acqua e tiene calde\nle membra. Edifica dighe sui corsi fluviali e vi costruisce\nla sua tana."
        de:
          legends_arceus: "Sein Fell ist hochgradig wasserabweisend und eignet sich\nhervorragend zur Wärmeisolierung. Die Dämme, die es in\nFlüssen errichtet, dienen ihm als Bau."
        es:
          legends_arceus: "Su pelaje es impermeable y, además, le proporciona un\nexcelente aislamiento térmico. Anida en las presas que\nconstruye en los ríos."
        ko:
          legends_arceus: "털은 방수 효과가 뛰어날 뿐만 아니라\n보온성도 아주 훌륭하다.\n하천에 댐을 짓고 집으로 삼는다."
        zh_simp:
          legends_arceus: "体毛有着极佳的防水效果，\n且保温性十足，性能十分优秀。\n会在河中筑起堤坝当作巢穴。"
        zh_trad:
          legends_arceus: "體毛有著極佳的撥水效果，\n且保溫性十足，性能十分優秀。\n會在河中築起堤壩當作巢穴。"
