        en:
          legends_arceus: "This Pokémon is revered as a deity in Hisuian legend. The birth\nof Dialga was what caused the vast river of time to begin\nflowing in our world."
        fr:
          legends_arceus: "Ce Pokémon est révéré comme une divinité dans une légende de\nHisui. Sa naissance serait à l’origine de l’inexorable écoulement\ndu temps en notre monde."
        it:
          legends_arceus: "È venerato quale divinità in certe leggende di Hisui. Al suo\ndivenire, il tempo prese a scorrere nel mondo terreno come\nun fiume impetuoso."
        de:
          legends_arceus: "In den Legenden Hisuis wird es als Gottheit verehrt. Durch seine\nGeburt begann in unserer Welt der Fluss der Zeit zu fließen."
        es:
          legends_arceus: "Venerado en la tradición de Hisui como la deidad cuyo origen\nhizo que el tiempo comenzara a fluir en el mundo terrenal\ncomo las aguas de un caudaloso río."
        ko:
          legends_arceus: "신으로서 숭배되어 온 전설이 히스이 땅에 남아 있다.\n이 포켓몬이 탄생하면서 세상의 시간이\n큰 강물처럼 흘러가기 시작했다고 한다."
        zh_simp:
          legends_arceus: "洗翠地区流传着这样的神话传说：\n当此神诞生，现世的时间便如\n滔滔大河般开始流动。"
        zh_trad:
          legends_arceus: "洗翠地區流傳著這樣的神話傳說：\n當此神誕生，現世的時間便如\n滔滔大河般開始流動。"
