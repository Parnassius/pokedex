        jp_kanji:
          legends_arceus: "巧みに　人語を　模倣する　芸達者。\n齢　重ね　経験を　積んだ者は\n言葉の　意味さえ　理解するという。"
        en:
          legends_arceus: "A versatile performer skilled in the imitation of human speech.\nIt is said that older, more experienced Chatot can even\nunderstand the meaning of the words they mimic."
        fr:
          legends_arceus: "Ils possèdent un grand talent pour imiter le langage humain.\nOn dit que les Pijako plus âgés et expérimentés peuvent\nmême comprendre les mots qu’ils prononcent."
        it:
          legends_arceus: "Maestro nel simulare gli idiomi umani. Pare che, cogli anni\ne l’esperienza, taluni esemplari imparino finanche a\ncomprendere ciò che simulano."
        de:
          legends_arceus: "Es ist sehr geschickt darin, die menschliche Sprache zu imitieren.\nMan sagt, dass ältere und erfahrene Plaudagei sogar die\nBedeutung der nachgeahmten Wörter verstehen."
        es:
          legends_arceus: "Un virtuoso Pokémon versado en el noble arte de replicar el\nhabla humana. Los ejemplares de cierta edad cuentan con más\nexperiencia y parecen entender el significado de las palabras."
        ko:
          legends_arceus: "정교하게 인간의 말을 모사하는 재주꾼.\n나이가 들어 경험이 쌓인 개체는\n그 말의 의미까지 이해한다고 한다."
        zh_simp:
          legends_arceus: "能将人类话语模仿得惟妙惟肖的表演家。\n当随着年龄增长而累积众多经验后，\n甚至能够理解话语中的含义。"
        zh_trad:
          legends_arceus: "能將人類話語模仿得維妙維肖的表演家。\n當隨著年齡增長而累積眾多經驗後，\n甚至還能夠理解話語中的含意。"
