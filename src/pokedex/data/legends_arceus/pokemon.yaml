          legends_arceus: "Ses pattes arrière se sont muées en ailes. Ainsi doté de quatre\nmembres pour voler, il se déplace avec une grande habileté et\npeut se faufiler dans les espaces exigus sans perdre en vélocité."
        it:
          legends_arceus: "Le ali posteriori erano in origine arti. Grazie alle quattro ali\nsfreccia in volo con destrezza e velocità, che rimane immutata\npersino in anguste caverne."
        de:
          legends_arceus: "Seine Hinterbeine sind zu Flügeln geworden. Es setzt seine vier\nFlügel mit großem Geschick ein und vermag so, auch durch enge\nHöhlen ohne Geschwindigkeitsverlust zu fliegen."
        es:
          legends_arceus: "Sus patas traseras se transformaron en alas. Usa las cuatro alas\ncon tal destreza que puede volar por los túneles más angostos\nde las cuevas sin disminuir la velocidad."
        ko:
          legends_arceus: "뒷다리가 변형하여 날개가 되었다.\n4장의 날개를 능숙하게 부려서 동굴의\n좁은 구멍도 속도를 줄이지 않고 통과한다."
        zh_simp:
          legends_arceus: "后肢变形成为翅膀。善于巧妙操纵\n四根翅膀，在洞窟内的狭缝中也能\n速度不减地一飞而过。"
        zh_trad:
          legends_arceus: "後肢變形成為翅膀。善於巧妙操縱\n四張翅膀，在洞窟內的狹縫中也能\n速度不減地一飛而過。"
