    dewott:
      form_id: 0
      base_stats:
        hp: 75
        attack: 75
        defense: 60
        special_attack: 83
        special_defense: 60
        speed: 60
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - water
      descriptions:
        jp_kanji:
          legends_arceus: "日々の　鍛錬の　賜物か\n帆太刀　２枚の　貝さばき　たるや\n剣豪も　裸足の　腕前なり。"
        en:
          legends_arceus: "Its exquisite double-scalchop technique is likely the result of\ndaily training, and it can send even masters of the blade fleeing\nin defeat."
        fr:
          legends_arceus: "Certainement grâce à un entraînement quotidien, il manie\nses deux coupillages avec plus d’adresse encore que\nles meilleurs épéistes."
        it:
          legends_arceus: "La sua padronanza nel brandire le duplici mollusciabole\neccede quella di un mastro schermidore. La ritengo esser\nfrutto di pratica quotidiana."
        de:
          legends_arceus: "Seine meisterhafte Handhabung der beiden Muschelklingen ist\nwohl auf tägliche Übungen zurückzuführen. Damit stellt es selbst\ndie erfahrensten Schwertkämpfer in den Schatten."
        es:
          legends_arceus: "Como resultado de un duro entrenamiento diario, su manejo\nde las dos cuchilleiras excede incluso al de un maestro\nespadachín."
        ko:
          legends_arceus: "매일 단련한 보람이 있는지\n2개의 가리비칼을 다루는 솜씨는\n검호가 무색할 정도가 되었다."
        zh_simp:
          legends_arceus: "或许是拜平日的锻炼所赐，\n运用两枚扇贝贝刀的高超技术\n令剑豪也甘拜下风。"
        zh_trad:
          legends_arceus: "或許是拜平日的鍛鍊所賜，\n運用兩枚扇貝貝刀的高超技術\n能令劍豪也甘拜下風。"
