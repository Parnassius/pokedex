        en:
          legends_arceus: "Though this is a plant Pokémon, it has a gluttonous and unruly\ntemperament. Carnivine attacks its prey with its cavernous maw\nwide open."
        fr:
          legends_arceus: "Malgré sa ressemblance avec les végétaux, il est très vorace\net possède un tempérament agressif. Il use de sa grande\ngueule pour attaquer ses proies."
        it:
          legends_arceus: "È avido e aggressivo, nonostante sia un Pokémon vegetale.\nAggredisce le prede divaricando le grosse fauci."
        de:
          legends_arceus: "Es zählt zwar zu den Pflanzen-Pokémon, ist aber sehr gefräßig\nund wild. Beute greift es an, indem es sein riesiges Maul öffnet."
        es:
          legends_arceus: "Su apariencia vegetal contrasta con su carácter voraz y violento.\nAgrede a sus presas con sus enormes fauces."
        ko:
          legends_arceus: "초목의 포켓몬임에도 불구하고\n탐욕스럽고도 난폭한 성질을 가졌다.\n큰 입을 벌리고는 먹이를 공격한다."
        zh_simp:
          legends_arceus: "虽是草木形态的宝可梦，\n但性情却是贪婪粗暴，\n会张开大口袭击猎物。"
        zh_trad:
          legends_arceus: "雖是草木形態的寶可夢，\n但性情卻是貪婪粗暴，\n會張開大口襲擊獵物。"
