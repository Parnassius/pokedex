        jp_kanji:
          legends_arceus: "フォルムチェンジと　呼ばれし　現象。\n怪鳥のごとき姿こそ　真なりと　考察。\n大海　渡りしとき　この姿で　目撃す。"
        en:
          legends_arceus: "An example of what is known as a “form change,” though I\nsuspect this strange avian guise to be Tornadus’s true form.\nTornadus has been sighted crossing the ocean while in this form."
        fr:
          legends_arceus: "Un changement de forme lui a conféré cette apparence d’oiseau\nmonstrueux. Je pense cependant que c’est son aspect originel.\nIl aurait été aperçu sous cette forme quand il traversait l’océan."
        it:
          legends_arceus: "Il fenomeno del cambio di forma gli ha conferito l’aspetto\ndi un volatile mitologico, che sospetto sia il suo vero sembiante.\nÈ in questa guisa che lo si vede talora attraversare gli oceani."
        de:
          legends_arceus: "Ein Beispiel für das Phänomen des Formwandels. Anscheinend\nhandelt es sich bei dieser seltsamen vogelähnlichen Gestalt,\ndie über dem Meer gesichtet wurde, um sein wahres Antlitz."
        es:
          legends_arceus: "El cambio de forma le confiere el aspecto de una extraña ave\nque sospecho que se trata de su forma original. Ha sido\navistado cruzando los océanos de esta guisa."
        ko:
          legends_arceus: "폼체인지라 불리는 현상에 의해 변했다.\n괴조와도 같은 이 모습이 진정한 모습인 것으로 보인다.\n대해를 건널 때 이 모습으로 목격되었다."
        zh_simp:
          legends_arceus: "此乃被称为形态变化的现象。据考察，\n此一形同怪鸟的姿态才是其真正样貌。\n曾被目击以此姿态横越大海。"
        zh_trad:
          legends_arceus: "此乃被稱為形態變化的現象。據考察，\n此一形同怪鳥的姿態才是其真正樣貌。\n曾被目擊以此姿態橫越大海。"
