        en:
          legends_arceus: "Sprays a poisonous fluid to take down prey. Sometimes, unable\nto stomach the stench of its own fluid, it leaves the bested\nprey uneaten."
        fr:
          legends_arceus: "Il expulse un fluide empoisonné pour occire ses proies. Mais\nla pestilence de ce liquide est telle que, ne pouvant lui-même\nla souffrir, il abandonne parfois son gibier sans s’en repaître."
        it:
          legends_arceus: "Assalta la preda con un liquido velenifero.\nTalvolta l’olezzo del suo medesimo veleno è tale\nda impedirgli di consumare la preda conquistata."
        de:
          legends_arceus: "Dieses Pokémon versprüht eine giftige Flüssigkeit, um Beute zu\nerlegen. Zuweilen kann es den Gestank dieses Gifts selbst nicht\nertragen und lässt seine Beute unangetastet zurück."
        es:
          legends_arceus: "Rocía a sus presas con un fluido venenoso tan hediondo que,\na veces, ni el propio Skuntank es capaz de acercarse para\ncomérselas."
        ko:
          legends_arceus: "독액을 분사하며 먹이와 대치한다.\n자신의 독액에서 나오는 냄새를 견디지 못해\n기껏 잡은 먹이를 먹지 못할 때도 있다."
        zh_simp:
          legends_arceus: "与猎物对峙时会喷出毒液。\n有时会因为自身的毒液过于\n恶臭难耐，而吃不下到手的猎物。"
        zh_trad:
          legends_arceus: "與獵物對峙時會噴出毒液。\n有時會因為己身的毒液過於\n惡臭難耐，而吃不下到手的獵物。"
