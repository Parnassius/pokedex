        jp_kanji:
          legends_arceus: "長寿ほど　頭部の寸法　大きく　重い。\nエスパーパワーは　頭部の重量　比例し\n強まること　測定にて　判明す。"
        en:
          legends_arceus: "The longer Alakazam lives, the larger and heavier its head\nbecomes. Our tests have shown that the strength of its psychic\npowers correlates positively to the weight of its head."
        fr:
          legends_arceus: "Sa tête croît et s’alourdit au fil des ans. Mes études ont montré\nque sa puissance psychique est corrélée au volume de sa tête."
        it:
          legends_arceus: "La mole e il peso del suo capo crescono quanto più avanza\ncon l’età. Gli studi mostrano che più è grave il capo, maggiori\nsono i suoi poteri psichici."
        de:
          legends_arceus: "Größe und Gewicht seines Kopfes nehmen mit dem Alter zu.\nMessungen zufolge verhält sich die Stärke seiner Psycho-Kräfte\nproportional zum Kopfgewicht."
        es:
          legends_arceus: "Su cabeza se vuelve más grande y pesada con los años. Tras un\nriguroso estudio, concluimos que existe una correlación entre\nel peso de su cráneo y la fuerza de sus poderes psíquicos."
        ko:
          legends_arceus: "장수할수록 머리가 크고 무거워진다.\n에스퍼 파워는 머리의 중량에 비례하여\n강해지는 것으로 측정을 통해 판명되었다."
        zh_simp:
          legends_arceus: "越是长寿，头部越是巨大沉重。\n测定结果指出，其超能力的强度\n与头部的重量成正比。"
        zh_trad:
          legends_arceus: "越是長壽，頭部越是巨大沉重。\n測定結果指出，其超能力的強度\n與頭部的重量成正比。"
