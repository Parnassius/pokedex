        en:
          legends_arceus: "Uses its gleaming fins to hunt its prey. The view of Lumineon\nschooling near the surface of the sea at night is breathtaking—\nit’s as though there were shining stars right there."
        fr:
          legends_arceus: "Ce Pokémon chasse ses proies grâce à ses nageoires lumineuses.\nLa nuit, le spectacle d’un banc de Luminéon sous la surface de\nl’eau rappelle le firmament."
        it:
          legends_arceus: "Adopra le pinne luminescenti per cacciare. Nelle notti in cui\ni Lumineon si adunano, la superficie marina rivaleggia con\nlo splendore del firmamento."
        de:
          legends_arceus: "Mit ihren leuchtenden Flossen jagen sie Beute. Wenn Lumineon\nnachts einen Schwarm bilden, funkelt die Wasseroberfläche\nwie ein Sternenhimmel."
        es:
          legends_arceus: "Caza con sus aletas refulgentes. Forma bancos que transforman\nla superficie del mar nocturno en un hermoso cielo abarrotado\nde estrellas."
        ko:
          legends_arceus: "빛나는 지느러미로 먹이를 사냥한다.\n네오라이트가 무리 지어 있는 밤중의 수면은\n기라성 같은 장관을 이룬다."
        zh_simp:
          legends_arceus: "会用发亮的鳍诱捕猎物。在霓虹鱼\n成群出没的夜半时分，可以欣赏到\n水面如星空般闪耀的美景。"
        zh_trad:
          legends_arceus: "會用發亮的鰭誘捕獵物。在霓虹魚\n成群出沒的夜半時分，可以欣賞到\n水面如星空般閃耀的美景。"
