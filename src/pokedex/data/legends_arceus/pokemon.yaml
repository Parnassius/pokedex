        en:
          legends_arceus: "Though large and languid, Hippopotas is difficult to detect\ndue to its tendency to burrow into and lurk beneath the soil.\nWhen agitated or excited, it expels sand from its nostrils."
        fr:
          legends_arceus: "Malgré sa taille imposante, le repérer s’avère difficile, car\nil creuse dans le sol pour se dissimuler. Il expulse du sable\npar le nez lorsqu’il est agité."
        it:
          legends_arceus: "Voluminoso nelle forme, è flemmatico di natura. Giacché\ns’immerge in fosse che scava nel suolo, è arduo avvistarlo.\nNei suoi sprazzi di esuberanza eietta sabbia dal naso."
        de:
          legends_arceus: "Sie mögen groß und schwerfällig sein, doch es ist nicht leicht,\nsie zu Gesicht zu bekommen, weil sie sich im Boden vergraben.\nWenn sie aufgeregt sind, blasen sie Sand aus ihrer Nase."
        es:
          legends_arceus: "Es corpulento y se mueve con lentitud, pero suele enterrarse\npara ocultarse, lo cual dificulta su avistamiento. Expulsa arenilla\npor los orificios nasales cuando se emociona."
        ko:
          legends_arceus: "몸집이 크고 둔하지만 땅을 파고\n숨어 있기에 모습을 보기는 어렵다.\n흥분하면 코로 모래를 뿜어낸다."
        zh_simp:
          legends_arceus: "体型硕大而笨重，但由于会掘开土壤\n藏身其中，因此难以发现其踪迹。\n情绪激动时会从鼻中喷出沙子。"
        zh_trad:
          legends_arceus: "體型碩大而笨重，但由於會掘開土壤\n藏身其中，因此難以發現其蹤跡。\n情緒激動時會從鼻中噴出沙子。"
