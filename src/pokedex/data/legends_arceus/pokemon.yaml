      descriptions:
        jp_kanji:
          legends_arceus: "ひとたび　鳴けば　数多のヤミカラスが\n飛来す。　その様　夜の帳　頭上を覆い\n世を　漆黒の闇に　転ずるが如く。"
        en:
          legends_arceus: "One cry from this Pokémon, and a murder of Murkrow come\nflying. At such times, one would think the curtain of night had\nfallen, plunging the world into jet-black darkness."
        fr:
          legends_arceus: "Il lui suffit d’un croassement pour que moult Cornèbre\nse rassemblent. Un voile noir semble alors se déployer\ndans le ciel, plongeant le monde dans les ténèbres."
        it:
          legends_arceus: "Un solo canto di codesta creatura richiama stuoli di Murkrow,\nche oscurano il cielo come se fosse notte, stendendo una coltre\ncorvina sul mondo."
        de:
          legends_arceus: "Ein Schrei von ihm genügt, um eine Schar Kramurx um sich herum\nzu versammeln. Wenn dies geschieht, so wirkt es, als verdecke\nein dunkler Schleier den Himmel und hülle die Welt in Finsternis."
        es:
          legends_arceus: "Un solo grito de este Pokémon basta para que una enorme\nbandada de Murkrow alce el vuelo y cubra el cielo nocturno\ncon un velo aún más oscuro."
        ko:
          legends_arceus: "한번 울면 수많은 니로우들이 날아온다.\n그 모습은 머리 위에 밤의 장막을 드리워서\n세상을 칠흑 같은 어둠에 빠뜨리는 것만 같다."
        zh_simp:
          legends_arceus: "一声鸣叫便能召唤大量黑暗鸦飞来。\n那副情景就如同夜幕覆盖天地，\n仿佛能令世界陷入无边黑暗之中。"
        zh_trad:
          legends_arceus: "一聲鳴叫便能召喚大量黑暗鴉飛來。\n那副情景就如同夜幕覆蓋天地，\n彷彿能令世界陷入無邊黑暗之中。"
