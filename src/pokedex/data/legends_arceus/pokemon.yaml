        en:
          legends_arceus: "A Pokémon inhabited by the soul of a woman who died bearing\na grudge in the snowy mountains. Legends of Froslass placing\ndeathly curses on misbehaving men send shivers down my spine."
        fr:
          legends_arceus: "Ce Pokémon abrite l’âme d’une femme rancunière disparue\ndans les monts enneigés. Des légendes à glacer le sang relatent\nque Momartik maudit et tue les hommes malfaisants."
        it:
          legends_arceus: "Questo Pokémon ospita lo spirito rancoroso di una donna\nsvanita fra le vette innevate. Si narra maledica a morte\ngli uomini empi, e mi si gela il sangue al sol pensiero."
        de:
          legends_arceus: "Es birgt die Seele einer Frau, die in verschneiten Bergen voller\nGram umgekommen ist. Legenden zufolge belegt es Männer,\ndie Böses tun, mit einem tödlichen Fluch. Wie schauderhaft!"
        es:
          legends_arceus: "Contienen las almas resentidas de mujeres desaparecidas en los\nmontes nevados. Me ponen los pelos de punta, pues se dice\nque maldicen y sacrifican a los hombres que cometen fechorías."
        ko:
          legends_arceus: "원한을 품고 설산으로 사라진 여인의\n혼이 깃든 포켓몬. 품행이 나쁜 남자를\n저주해 죽인다는 오싹한 전승이 있다."
        zh_simp:
          legends_arceus: "被怀抱怨恨消失在雪山中的女人魂魄\n所附的宝可梦。传说会施咒杀死\n行为不检的男人，令人心惊胆战。"
        zh_trad:
          legends_arceus: "被懷抱怨恨消失在雪山中的女人魂魄\n所附的寶可夢。傳說會施咒殺死\n行為不檢的男人，令人心驚膽戰。"
