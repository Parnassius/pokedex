      descriptions:
        jp_kanji:
          legends_arceus: "尾鰭　打ちつけ　沼底　揺るがし\n仰天　逃げんとする　獲物を　丸飲み。\nこれを　人は　地震の源と　勘違いす。"
        en:
          legends_arceus: "Strikes its caudal fin against the swamp bed to shake the ground\nand startle its prey. It will then swallow the fleeing prey whole.\nPeople mistook this behavior as the cause of earthquakes."
        fr:
          legends_arceus: "Ce Pokémon frappe le fond des étangs avec sa queue pour\neffrayer ses proies, puis gobe celles-ci quand elles tentent\nde s’enfuir. On croit à tort qu’il est à l’origine des séismes."
        it:
          legends_arceus: "Scuote il letto delle paludi con la pinna caudale e trangugia\nin un sol boccone le fuggitive prede. Il popolo lo ritiene\ncausa di sismi."
        de:
          legends_arceus: "Es bringt mit seiner Schwanzflosse den Sumpfboden zum Beben,\num seine Beute aufzuschrecken und bei der Flucht in ihrer Gänze\nzu verschlucken. Dies galt irrtümlich als Ursache von Erdbeben."
        es:
          legends_arceus: "Golpea el lecho del pantano con la aleta caudal y engulle las\npresas que huyen asustadas. La gente creía erróneamente que\nesto era lo que provocaba terremotos."
        ko:
          legends_arceus: "꼬리지느러미를 부딪쳐서 늪의 바닥을 뒤흔든 다음\n놀라서 도망치는 먹이를 그대로 삼킨다.\n사람들은 이것이 지진의 원인이라 오해한다."
        zh_simp:
          legends_arceus: "用尾鳍拍击沼底地面制造震动，\n趁机吞食因受惊而逃窜的猎物。\n人们因此误以为它是地震的源头。"
        zh_trad:
          legends_arceus: "用尾鰭拍擊沼底地面製造震動，\n趁機吞食因受驚而逃竄的獵物。\n人們因此誤以為牠是地震的源頭。"
duskull:
