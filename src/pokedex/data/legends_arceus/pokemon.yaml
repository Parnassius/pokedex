        en:
          legends_arceus: "Shakes its body to generate electricity. Its stature belies its\naggression—one must be patient to tame this Pokémon."
        fr:
          legends_arceus: "Il produit de l’électricité en faisant trembler son corps.\nMalgré son petit gabarit, il est de nature agressive :\nréussir à l’apprivoiser requiert beaucoup de patience."
        it:
          legends_arceus: "Scuote le membra per ingenerare elettricità.\nBenché sia minuto, possiede un’indole selvaggia.\nAmmansirlo esige notevole pazienza."
        de:
          legends_arceus: "Durch Zittern erzeugt es Elektrizität. Obgleich man es ihm nicht\nansieht, verfügt es über ein äußerst wildes Gemüt und erfordert\neine Menge Geduld beim Zähmen."
        es:
          legends_arceus: "Produce electricidad haciendo vibrar el cuerpo. A pesar de su\npequeño tamaño, es muy agresivo, por lo que domesticarlo\nrequiere paciencia."
        ko:
          legends_arceus: "몸을 떨어서 전기를 만들어 낸다.\n체구에 어울리지 않게 성격이 거칠기에\n길들이려면 인내가 필요하다."
        zh_simp:
          legends_arceus: "会震动身体来产生电力。\n有着与体格不相称的凶猛性情，\n驯服它需要很大的耐心。"
        zh_trad:
          legends_arceus: "會震動身體來產生電力。\n有著與體格不相稱的暴躁性情，\n馴服牠需要很大的耐心。"
