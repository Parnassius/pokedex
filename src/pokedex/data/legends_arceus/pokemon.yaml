        jp_kanji:
          legends_arceus: "涙　流し　見る者の　同情心を　誘うも\n体内水分を　排出し　健康維持する\n生理現象なり。　騙されるべからず。"
        en:
          legends_arceus: "Its tears elicit sympathy from those who see them, but do\nnot be deceived! This expulsion of body water is merely a\nphysiological mechanism for keeping itself in good health."
        fr:
          legends_arceus: "Ses larmes attirent la sympathie, mais ne vous laissez pas duper :\nil s’agit d’un phénomène physiologique au cours duquel\nManzaï évacue l’eau de son corps afin de garder la santé."
        it:
          legends_arceus: "Le sue lagrime ingannevoli muovono a pietà l’osservatore.\nIn verità, sgorgano per un processo fisiologico atto a secernere\ni fluidi in eccedenza."
        de:
          legends_arceus: "Seine Tränen wecken Mitgefühl bei anderen, aber man sollte sich\ndavon nicht täuschen lassen. Das Ausscheiden von Wasser ist in\nWirklichkeit nur eine gesundheitserhaltende Körperfunktion."
        es:
          legends_arceus: "Sus llantos despiertan compasión, mas son una farsa: se trata de\nun proceso fisiológico con el cual expulsa la humedad de su\ncuerpo para mantenerse sano."
        ko:
          legends_arceus: "눈물을 흘려서 보는 이의 동정심을 자극하나\n이는 체내 수분을 배출해 건강을 유지하는\n생리 현상일 뿐이므로 속아선 안 된다."
        zh_simp:
          legends_arceus: "流泪的模样令见者无不同情。但可\n不要上当，那不过是排出体内水分\n以维持健康的生理现象罢了。"
        zh_trad:
          legends_arceus: "流淚的模樣令見者無不同情。但可\n不要上當，那不過是排出體內水分\n以維持健康的生理現象罷了。"
