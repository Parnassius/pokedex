          legends_arceus: "モンスターボールと　空似せし　謎の\nポケモン。　気　昂るほど　腹に\n蓄えし電流を　解き放ち　大笑す。"
        en:
          legends_arceus: "An enigmatic Pokémon that happens to bear a resemblance to a\nPoké Ball. When excited, it discharges the electric current it has\nstored in its belly, then lets out a great, uproarious laugh."
        fr:
          legends_arceus: "Ce Pokémon mystérieux ressemble étrangement à une Poké Ball.\nLorsqu’il est agité, il relâche le courant électrique emmagasiné\ndans son abdomen et laisse échapper des éclats de rire."
        it:
          legends_arceus: "Enigmatico Pokémon d’accidentale simiglianza con le Poké Ball.\nPiù si galvanizza, più rilascia la corrente elettrica immagazzinata\nnel ventre, ridendo di gusto."
        de:
          legends_arceus: "Ein rätselhaftes Pokémon, das rein zufällig einem Pokéball\nähnelt. Je mehr Aufregung es verspürt, desto mehr seiner im\nBauch gelagerten Elektrizität setzt es herzhaft lachend frei."
        es:
          legends_arceus: "Curioso ejemplar que guarda cierta similitud con una Poké Ball.\nCuanto más se altera, mayor es la descarga eléctrica que libera\nde su vientre, a la que sigue una sonora carcajada."
        ko:
          legends_arceus: "몬스터볼을 닮은 수수께끼의 포켓몬.\n흥분하면 배 속에 비축해 둔 전류를\n방출하며 크게 웃는다."
        zh_simp:
          legends_arceus: "形状颇似精灵球的奇异宝可梦。\n当情绪高涨时，积蓄在腹部的\n电流就会放出，同时发出大笑。"
        zh_trad:
          legends_arceus: "形狀頗似精靈球的奇異寶可夢。\n當情緒高漲時，積蓄在腹部的\n電流就會放出，同時發出大笑。"
