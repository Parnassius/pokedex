        en:
          legends_arceus: "Its white whiskers are very sensitive. Sealeo will balance Spheal\non the tip of its nose, checking its scent and its feel to be sure\nthe Spheal is healthy."
        fr:
          legends_arceus: "Ses moustaches blanches sont très sensibles. Il fait grimper\nles Obalie sur son museau, puis les examine en les reniflant\net en les palpant afin de vérifier qu’ils sont en bonne santé."
        it:
          legends_arceus: "I suoi baffi candidi sono assai sensibili. Pone gli Spheal\nsulla punta del naso per saggiarne la buona salute attraverso\nl’odorato e il tatto."
        de:
          legends_arceus: "Seine weißen Barthaare sind sehr empfindlich. Es balanciert\nSeemops auf seiner Nasenspitze und prüft durch Tasten und\nRiechen, ob diese gesund sind."
        es:
          legends_arceus: "Sus bigotes blancos son muy sensibles. A través del tacto y el\nolfato, puede determinar el estado de salud de un Spheal\ncolocándoselo sobre la nariz."
        ko:
          legends_arceus: "하얀 수염은 감각이 매우 예민하다.\n대굴레오를 코끝에 얹었을 때의 촉감과\n체취로 건강한지 아닌지 확인한다."
        zh_simp:
          legends_arceus: "两腮的白胡须有着敏锐的知觉，\n会将海豹球置于鼻尖，从触感\n及体味确认其是否健康。"
        zh_trad:
          legends_arceus: "兩腮的白鬍鬚有著敏銳的知覺，\n會將海豹球置於鼻尖，從觸感\n及體味確認其是否健康。"
