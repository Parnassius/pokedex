          legends_arceus: "日に１８時間を　睡眠に　費やす。\n睡眠時も　エスパーパワーを　操りて\n危険　迫ると　瞬間移動で　回避す。"
        en:
          legends_arceus: "Spends 18 hours of the day sleeping. Even while asleep, Abra\ncan control its psychic powers—should danger approach, the\nPokémon will simply teleport away."
        fr:
          legends_arceus: "Il dort 18 heures par jour. Même assoupi, il peut effectuer\nun déplacement instantané grâce à ses pouvoirs psychiques\ns’il se sent en danger."
        it:
          legends_arceus: "Dedica al sonno 18 ore al dì. Nondimeno, i suoi poteri psichici\nrestano vigili, trasportandolo tosto altrove all’incombere\ndi un pericolo."
        de:
          legends_arceus: "Es schläft 18 Stunden am Tag. Selbst im Schlaf setzt es seine\nPsycho-Kräfte ein, um sich durch blitzschnelle Ortswechsel\naugenblicklich in Sicherheit zu bringen, wenn Gefahr naht."
        es:
          legends_arceus: "Duerme 18 horas al día. Incluso en pleno sueño, usa sus\npoderes psíquicos para huir mediante teletransportación si\nadvierte algún peligro."
        ko:
          legends_arceus: "하루 18시간을 수면에 소비한다.\n수면 중에도 에스퍼 파워를 부려서\n위기에 처하면 순간이동으로 회피한다."
        zh_simp:
          legends_arceus: "每日皆有１８小时用于睡眠。\n睡眠中也可发挥超能力，\n在遭遇危险时以瞬间移动避开。"
        zh_trad:
          legends_arceus: "每日皆有１８小時用於睡眠。\n睡眠中亦可發揮超能力，\n在遭遇危險時以瞬間移動避開。"
