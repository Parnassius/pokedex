        en:
          legends_arceus: "What a gorgeous sight this Pokémon is as it swims with its long,\npink-painted caudal fins fluttering behind it. Finneon’s beautiful\nappearance has led to its nickname: “finery fish.”"
        fr:
          legends_arceus: "Écayon nage en ondulant ses longues et magnifiques nageoires\ncaudales teintées de rose. Son apparence lui a valu le surnom\nde « poisson pimpant »."
        it:
          legends_arceus: "Nuota elegantemente agitando le lunghe pinne caudali tinte\ndi rosa. Queste sue sembianze gli hanno valso l’appellativo\ndi \"pesce vestito a festa\"."
        de:
          legends_arceus: "Durch die Flatterbewegungen seiner langen rosafarbenen\nSchwanzflossen sieht dieses Pokémon beim Schwimmen sehr\nanmutig aus. Das brachte ihm den Beinamen „Kimono-Fisch“ ein."
        es:
          legends_arceus: "Sus largas aletas caudales tintadas de color rosa ondean con\nelegancia cuando nada, lo cual le ha granjeado el sobrenombre\nde Pez Kimono."
        ko:
          legends_arceus: "분홍빛으로 물든 긴 꼬리지느러미를\n흔들며 아름답게 유영한다. 그 모습에 유래하여\n“비단옷 입은 물고기”라는 별칭이 있다."
        zh_simp:
          legends_arceus: "摇曳着桃红色的长长尾鳍\n在水中游泳的艳丽身姿，\n使它得到了盛装鱼的外号。"
        zh_trad:
          legends_arceus: "搖曳著桃紅色的長長尾鰭\n在水中游泳的豔麗身姿，\n使牠得到了盛裝魚的外號。"
