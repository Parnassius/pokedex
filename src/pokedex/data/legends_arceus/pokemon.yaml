      descriptions:
        jp_kanji:
          legends_arceus: "天翔ける姿　万物を　創りし　存在を\n想起す。　姿を　模すこと　すなわち\nその力を　我がものとする術と　推察。"
        en:
          legends_arceus: "It soars across the sky in a form that greatly resembles the\ncreator of all things. Perhaps this imitation of appearance is\nPalkia’s strategy for gaining Arceus’s powers."
        fr:
          legends_arceus: "Cette forme qui sillonne les cieux me fait penser au créateur de\ntoutes choses. Je pense qu’épouser cette apparence prodigue\nà Palkia les pouvoirs du créateur."
        it:
          legends_arceus: "Vederlo solcare i cieli mi riporta alla mente l’entità creatrice.\nChe, imitandone la forma, stia forse cercando di impadronirsi\ndel suo potere?"
        de:
          legends_arceus: "Dem Schöpfer aller Dinge gleich gleitet es über das Himmelszelt.\nWomöglich gebärdet es sich auf diese Weise, um sich die Macht\nder Schöpfergottheit zu eigen zu machen."
        es:
          legends_arceus: "Esta forma que surca el cielo me hace pensar en el creador de\ntodo lo existente. Quizá adopte dicha forma para hacerse con\nsu poder."
        ko:
          legends_arceus: "하늘을 나는 모습은 만물의 창조주를 연상케한다.\n창조주의 모습을 흉내 냄으로써\n그 힘을 자신의 것으로 만들었다고 추측된다."
        zh_simp:
          legends_arceus: "翱翔天际的姿态令人联想起万物的\n创造主。本人推测，模仿创造主的\n模样正是将其力化为己有的方法。"
        zh_trad:
          legends_arceus: "翱翔天際的姿態令人聯想起萬物的\n創造主。吾人推測，模仿創造主的\n模樣正是將其力化為己有的方法。"
