      descriptions:
        jp_kanji:
          legends_arceus: "ちり芥にて　構成されし体は　景色に\n溶け込み　目立たず。　天敵より　身を\n隠すに　うってつけの様子。"
        en:
          legends_arceus: "Its body, composed of refuse, blends in to the scenery so much\nas to be inconspicuous. This seems to be the perfect way for the\nPokémon to evade the detection of predators."
        fr:
          legends_arceus: "Ce Pokémon passe inaperçu, car son corps constitué de détritus\nse fond dans le paysage. Il n’y a guère d’ensemble plus indiqué\npour échapper aux prédateurs."
        it:
          legends_arceus: "Non salta agli occhi per merito del corpo costituito da scorie,\nche si fonde coll’ambiente in perfetto mimetismo. Un attributo\nideale per occultarsi agli inimici naturali."
        de:
          legends_arceus: "Da der Unrat, der Teil seines Körpers ist, mit der Umgebung\nverschmilzt, fällt es nicht auf. So ist es perfekt vor den Blicken\nseiner Fressfeinde geschützt."
        es:
          legends_arceus: "Su cuerpo compuesto de residuos adopta el color del entorno y\nle sirve de camuflaje, por lo que resulta idóneo para evitar a\nlos depredadores."
        ko:
          legends_arceus: "먼지로 구성된 몸은\n주위 풍경에 녹아들어 눈에 띄지 않는다.\n천적으로부터 몸을 숨기는 데 최적의 모습이다."
        zh_simp:
          legends_arceus: "尘土草芥等垃圾构成的身体能\n毫不起眼地融入周围景色之中，\n正好适合用来躲避天敌袭击。"
        zh_trad:
          legends_arceus: "塵土草芥等垃圾構成的身體能\n毫不起眼地融入周遭景色之中，\n正好適合用來躲避天敵襲擊。"
