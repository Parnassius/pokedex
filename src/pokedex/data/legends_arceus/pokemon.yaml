        fr:
          legends_arceus: "Il peut dénicher les champignons enfouis dans l’herbe\nou la neige grâce à son odorat développé. Les habitants\nde Hisui ont recours à son talent depuis les temps anciens."
        it:
          legends_arceus: "Con il suo eccellente olfatto trova funghi sepolti nell’erba alta\ne nella neve, talento che da lungo tempo torna sovente utile\nalle genti di Hisui."
        de:
          legends_arceus: "Dank seines ausgezeichneten Geruchssinns findet es problemlos\nim hohen Gras versteckte oder von Schnee bedeckte Pilze.\nSeit jeher nutzen die Menschen von Hisui diese Gabe."
        es:
          legends_arceus: "Desde tiempos antiguos, los habitantes de Hisui se han valido\nde su habilidad para encontrar setas enterradas bajo la nieve o\nen la hierba alta usando su agudo olfato."
        ko:
          legends_arceus: "풀숲이나 눈 속에 파묻힌 버섯을 냄새로 찾는\n뛰어난 재능을 가졌다. 예로부터 히스이 땅에\n사는 이들이 이 재능에 많이 의지하였다."
        zh_simp:
          legends_arceus: "擅长靠气味寻找埋藏于草丛或雪中\n的菇蕈。自古以来，洗翠的居民便\n十分依靠它的此项天赋。"
        zh_trad:
          legends_arceus: "擅長靠氣味尋找埋藏於草叢或雪中\n的菇蕈。自古以來，洗翠的居民便\n十分借重牠的此項天賦。"
