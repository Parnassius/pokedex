          legends_arceus: "体毛は　暖かにして　実に　軽量。\nカラテマスターの如き　蹴りを　放ち\n相対す者を　造作なく　撃退す。"
        en:
          legends_arceus: "Its fur is warm and yet remarkably light. This Pokémon kicks as\nthough it were a master of karate, driving back its opponents\nwith ease."
        fr:
          legends_arceus: "Bien que très chaude, sa fourrure est des plus légères.\nSes coups de pied dignes d’un champion de karaté lui\npermettent de repousser ses ennemis sans difficulté."
        it:
          legends_arceus: "Il vello è caldo, benché notevolmente leggero. Sgomina con\nfacilità gli avversari con calci degni di un maestro di karate."
        de:
          legends_arceus: "Sein Fell ist warm und doch bemerkenswert leicht. Mit Tritten,\ndie denen eines Karate-Meisters ebenbürtig sind, vermag es\nGegner problemlos in die Flucht zu schlagen."
        es:
          legends_arceus: "Su pelaje es cálido y sorprendentemente ligero. Propina\npatadas dignas de un karateka, con las que repele fácilmente a\nsus enemigos."
        ko:
          legends_arceus: "털은 따뜻하면서도 실로 가볍다.\n태권도 마스터 같은 발차기를 날려서\n상대를 간단하게 격퇴한다."
        zh_simp:
          legends_arceus: "体毛保暖力十足且极为轻盈。\n能够使出彷如空手道大师般的\n踢击，将来犯的对手轻松击退。"
        zh_trad:
          legends_arceus: "體毛保暖力十足且極為輕盈。\n能夠使出彷如空手道大師般的\n踢擊，將來犯的對手輕鬆擊退。"
