        fr:
          legends_arceus: "Irascible et impulsif, il déclenche des tourbillons chargés\nde sable pour déstabiliser ses adversaires et les agresser."
        it:
          legends_arceus: "È iracondo e per nulla paziente. Genera dei turbini di vento\ne sabbia per debilitare l’inimico e indi assalirlo."
        de:
          legends_arceus: "Dieser leicht reizbare Hitzkopf erzeugt Wirbelstürme aus Sand,\num seine Gegner zu entmutigen. Anschließend geht dieses\nPokémon zum Angriff über."
        es:
          legends_arceus: "Carga contra el enemigo tras desalentarlo con torbellinos de\narena. Es tan temperamental como impulsivo."
        ko:
          legends_arceus: "성미가 급하고 혈기 왕성하다.\n모래의 회오리를 일으켜서\n적의 기세를 꺾은 뒤 덤벼든다."
        zh_simp:
          legends_arceus: "性情急躁容易发怒。\n会引起夹带沙土的旋风，\n挫败敌人锐气后加以袭击。"
        zh_trad:
          legends_arceus: "性情粗暴容易發怒。\n會引發夾帶沙土的旋風，\n令敵手威勢受阻後加以襲擊。"
