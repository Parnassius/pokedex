        en:
          legends_arceus: "Its strangely shaped antlers have the power to bewitch those\nwho see them. Medicine made by grinding up the black orbs\nfrom fallen antlers is an effective treatment for insomnia."
        fr:
          legends_arceus: "Ses bois curieux ont le pouvoir de troubler ceux qui les\ncontemplent. Les boules noires provenant de bois perdus\npeuvent être réduites en poudre pour traiter les insomnies."
        it:
          legends_arceus: "Le inusuali corna hanno il potere di ammaliare chi le osserva.\nAllorché queste cadono, le nere sfere possono essere ridotte\nin polvere per ricavare un rimedio contro l’insonnia."
        de:
          legends_arceus: "Mit seinem seltsam geformten Geweih kann es Betrachter\nverhexen. Zermalmt man die schwarzen Kugeln von abgefallenen\nGeweihen, so erhält man eine Medizin gegen Schlaflosigkeit."
        es:
          legends_arceus: "Su cornamenta de forma extraña tiene un desconcertante\npoder. Cuando la muda, sus bolas negras se pueden pulverizar\ny usarse como remedio contra el insomnio."
        ko:
          legends_arceus: "기괴한 형태의 뿔은 보는 이를 현혹하는 힘을\n가지고 있다. 떨어진 뿔의 검은 구슬을\n으깨서 만든 약은 불면증에 효과가 있다."
        zh_simp:
          legends_arceus: "形状怪异的犄角蕴含迷惑他人之力。\n从角上脱落的黑珠在磨碎后\n可以入药，用以治疗失眠。"
        zh_trad:
          legends_arceus: "形狀怪異的犄角蘊含迷惑他人之力。\n從角上脫落的黑珠在磨碎後\n可以入藥，用以治療失眠。"
