gligar:
  species_id: 207
  names:
    jp_kanji: グライガー
    en: Gligar
    fr: Scorplane
    it: Gligar
    de: Skorgla
    es: Gligar
    ko: 글라이거
    zh_simp: 天蝎
    zh_trad: 天蠍
  forms:
    gligar:
      form_id: 0
      base_stats:
        hp: 65
        attack: 75
        defense: 105
        special_attack: 35
        special_defense: 65
        speed: 85
      evs_yield:
        hp: 0
        attack: 0
        defense: 1
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - ground
        - flying
      descriptions:
        jp_kanji:
          legends_arceus: "尾の先端　凶悪なる　太い針を　有す。\n獲物の顔面に　被さり　視覚を遮蔽し\n尾の針にて　毒を注入し　仕留めたり。"
        en:
          legends_arceus: "Its tail is tipped by a thick, horrible stinger. To bring down prey,\nit will first obscure their vision by covering their faces with its\nbody, and then it will use the stinger to inject them with venom."
        fr:
          legends_arceus: "Quand il chasse, il s’accroche au visage de ses proies pour\nleur obstruer la vue. Il se sert ensuite du dard épais et meurtrier\nau bout de sa queue pour leur inoculer du poison et les achever."
        it:
          legends_arceus: "Copre il volto della preda ostruendole la vista e poi la sopprime\naffondando il grosso aculeo velenifero posto all’estremità\ndella coda."
        de:
          legends_arceus: "Es klammert sich am Gesicht seiner Beute fest, um ihr die Sicht\nzu nehmen. Anschließend erlegt es sie mit dem Gift aus dem\ndicken, bedrohlichen Stachel an seiner Schwanzspitze."
        es:
          legends_arceus: "Se agarra a la cara de su presa y, aprovechando su falta de\nvisión, acaba con ella inyectándole veneno con el grueso y\ntemible aguijón de su cola."
        ko:
          legends_arceus: "꼬리 끝에 흉악한 굵은 침이 달려 있다.\n먹이의 얼굴을 뒤덮어서 시야를 차단하고\n꼬리의 침으로 독을 주입해서 마무리한다."
        zh_simp:
          legends_arceus: "尾部尖端长有恐怖的巨针。\n会扑上猎物的脸，遮蔽其视线，\n再以尾针注入毒素取其性命。"
        zh_trad:
          legends_arceus: "尾部尖端長有恐怖的巨針。\n會撲上獵物的臉，遮蔽其視線，\n再以尾針注入毒素取其性命。"
steelix:
  species_id: 208
  names:
    jp_kanji: ハガネール
    en: Steelix
    fr: Steelix
    it: Steelix
    de: Stahlos
    es: Steelix
    ko: 강철톤
    zh_simp: 大钢蛇
    zh_trad: 大鋼蛇
  forms:
    steelix:
      form_id: 0
      base_stats:
        hp: 75
        attack: 85
        defense: 200
        special_attack: 55
        special_defense: 65
        speed: 30
      evs_yield:
        hp: 0
        attack: 0
        defense: 2
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - steel
        - ground
      descriptions:
        jp_kanji:
          legends_arceus: "奇天烈な　道具により　進化せし姿。\n鋼鉄の粒を　まぶせし　体は　硬く\n金剛石でも　傷付けること　能わず。"
        en:
          legends_arceus: "This Pokémon evolved through use of a strange item. Its body is\ncoated with steel powder and notably hard—not even diamond\ncan leave so much as a scratch."
        fr:
          legends_arceus: "Un étrange objet a provoqué l’évolution de ce Pokémon.\nSon corps couvert de particules d’acier est si dur que\nmême un diamant ne pourrait l’érafler."
        it:
          legends_arceus: "Evolutosi per mezzo di un singolare strumento, ha il corpo\nrivestito di granuli d’acciaio talmente compatti che neppure\nun diamante può scalfirli."
        de:
          legends_arceus: "Es entwickelte sich mithilfe eines seltsamen Gegenstands.\nSeinem mit Metallteilchen bedeckten Körper kann selbst ein\nDiamant nichts anhaben."
        es:
          legends_arceus: "Un extraño objeto provocó esta evolución. Su cuerpo, cubierto\nde partículas de acero, es tan duro que ni un diamante puede\nrayarlo."
        ko:
          legends_arceus: "기묘한 도구에 의해 진화한 모습.\n강철 입자로 뒤덮인 몸은 단단하여\n금강석으로도 상처 입힐 수 없다."
        zh_simp:
          legends_arceus: "凭借奇异的道具进化而成。\n全身涂满钢铁粒子，身躯极为坚硬，\n即便金刚石也无法伤其分毫。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具進化而成。\n全身塗滿鋼鐵粒子，身軀極為堅硬，\n即便金剛石也無法傷其分毫。"
