      descriptions:
        jp_kanji:
          legends_arceus: "色彩鮮やかにて　見目　大層　麗しいが\n蜜　集めし　ミツハニーを　追い払い\n好物を　独り占めせんとする　強欲さ。"
        en:
          legends_arceus: "A colorful and incredibly beautiful but also greedy Pokémon.\nIn an effort to keep its favorite food all to itself, it will chase\naway Combee as they try to gather nectar."
        fr:
          legends_arceus: "Ce Pokémon majestueux aux ailes éclatantes est vorace :\nil chasse les Apitrini qui récoltent du miel afin de ne pas\navoir à partager son mets favori."
        it:
          legends_arceus: "Multicolore e bello alla vista, è di natura avida. Scaccia\ni Combee che raccolgono nettare per tenere per sé\nil suo nutrimento favorito."
        de:
          legends_arceus: "Aufgrund seiner Farbenpracht mag es schön anzusehen sein,\ndoch es hat ein gieriges Wesen. Es vertreibt Wadribie, die auf\nNektarsuche sind, um sein Leibgericht ganz für sich zu haben."
        es:
          legends_arceus: "De colores vivos y gran belleza, este Pokémon es muy\navaricioso y ahuyenta a los Combee para hacerse con el néctar\nque recolectan, pues no le gusta compartir su comida favorita."
        ko:
          legends_arceus: "색이 화려하여 겉보기에는 아주 아름답지만\n꿀을 모으러 온 세꿀버리를 쫓아내고\n먹이를 독차지할 정도로 욕심이 많다."
        zh_simp:
          legends_arceus: "拥有色彩鲜艳的美丽外貌，然而\n性情贪婪，会驱赶正在采集花蜜的\n三蜜蜂，以便独占自己爱吃的花蜜。"
        zh_trad:
          legends_arceus: "擁有色彩鮮豔的美麗外貌，然而\n性情貪婪，會驅趕正在採集花蜜的\n三蜜蜂，以便獨佔自己愛吃的花蜜。"
