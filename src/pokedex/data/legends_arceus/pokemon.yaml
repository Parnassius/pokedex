        es:
          legends_arceus: "Segrega veneno a través de las agujas, razón por la que los\npescadores lo odian. Los ejemplares de otras regiones\npresentan una forma diferente."
        ko:
          legends_arceus: "침으로 독을 흩뿌리며 귀찮게 하기 때문에\n어부들이 몹시 싫어하는 존재다.\n다른 지방에서는 다른 모습으로 서식한다."
        zh_simp:
          legends_arceus: "会用针散布毒素的棘手家伙，因而\n受到渔民们的厌恶。栖息在其他地区的\n千针鱼则是呈现着不同的姿态。"
        zh_trad:
          legends_arceus: "會用針散布毒素的棘手傢伙，因而\n受到漁民們的厭惡。棲息在其他地區\n的千針魚則是呈現著不同的姿態。"
