        en:
          legends_arceus: "The dreaded Being of Willpower. Legends tell of this Pokémon\nmanipulating the will of its adversaries and turning them into\npuppets of its own."
        fr:
          legends_arceus: "Aussi nommé « l’être de la volonté », ce Pokémon est redouté.\nD’après les légendes, il contrôlerait la volonté de ceux qui\nse montrent hostiles au point d’en faire ses pantins."
        it:
          legends_arceus: "Pokémon temuto come la \"divinità della volontà\".\nLa leggenda narra che manipoli il volere di coloro che gli si\noppongono, mutandoli in meri burattini."
        de:
          legends_arceus: "Dieses gefürchtete Pokémon wird auch das „starke Wesen“\ngenannt. Legenden zufolge kontrolliert es den Willen von\nGegnern und verwandelt diese in seine Marionetten."
        es:
          legends_arceus: "El temido Ser de la Voluntad que, según narran las leyendas,\ntransforma a la gente de carácter hostil en marionetas carentes\nde libre albedrío."
        ko:
          legends_arceus: "의지의 신으로 경외시되는 포켓몬.\n적대하는 자의 의지를 조종하여\n꼭두각시로 만든다는 전설이 있다."
        zh_simp:
          legends_arceus: "以意志之神的身份受人畏惧的\n宝可梦。传说它能操纵与自己\n敌对者的意志，使其化为傀儡。"
        zh_trad:
          legends_arceus: "以意志之神的身分受人畏懼的\n寶可夢。傳說牠能操縱與己\n敵對者的意志，使其化成傀儡。"
