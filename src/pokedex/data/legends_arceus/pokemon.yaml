        en:
          legends_arceus: "Though ball-like in shape, this Pokémon is a proficient swimmer.\nI have discovered that if a Mantyke spends much time with\nschools of Remoraid, it will eventually achieve evolution."
        fr:
          legends_arceus: "C’est un nageur remarquable, malgré sa forme arrondie.\nMes études ont démontré que s’il est en contact régulier\navec des bancs de Rémoraid, il finit lui-même par évoluer."
        it:
          legends_arceus: "Gran natatore nonostante le fattezze sferiche.\nÈ dimostrato che il fertile sodalizio con banchi\ndi Remoraid conduce infine all’evoluzione."
        de:
          legends_arceus: "Trotz ihrer runden Gestalt sind sie geschickte Schwimmer.\nMeinen Forschungen zufolge entwickeln sie sich, wenn sie sich\neine Zeit lang unter Remoraid-Schwärme mischen."
        es:
          legends_arceus: "Un nadador avezado a pesar de su complexión esférica. Está\ndemostrado que los ejemplares que se codean con los bancos\nde Remoraid terminan evolucionando."
        ko:
          legends_arceus: "구슬처럼 생겼으나 헤엄의 달인이다.\n총어 무리와의 잦은 교류가\n진화로 이어지게 되는 것으로 밝혀졌다."
        zh_simp:
          legends_arceus: "姿态浑圆如球，却是个游泳高手。\n目前已知与铁炮鱼群体交流较多\n的个体最终得以进化。"
        zh_trad:
          legends_arceus: "姿態渾圓如球，卻是個游泳高手。\n目前已知與鐵炮魚群體交流較多\n的個體最終將得以進化。"
