        en:
          legends_arceus: "This species reached its zenith during the period known as the\nice age. I suspect that Hisui’s frigid climate is in harmony with\nMamoswine’s constitution, thus awakening hidden potential."
        fr:
          legends_arceus: "Cette espèce a atteint son apogée à l’ère glaciaire. Je suppose\nque le climat froid de Hisui est idéal pour sa constitution, et\nqu’il a réveillé le pouvoir qui sommeillait en Mammochon."
        it:
          legends_arceus: "Giunse all’apice dello sviluppo durante l’epoca glaciale.\nIl rigore del clima di Hisui si confà al suo organismo e\nha forse destato in lui un potere latente."
        de:
          legends_arceus: "Seine Blütezeit hatte es in der Eiszeit. Ich vermute, dass die\neisigen Gefilde der Hisui-Region seinem Naturell entsprechen\nund daher eine in ihm schlummernde Kraft geweckt haben."
        es:
          legends_arceus: "Esta especie vivió su máximo apogeo durante la era glacial.\nPresumo que el intenso frío de Hisui despertó el poder latente\nen su interior."
        ko:
          legends_arceus: "빙하기라 불리는 시기에 그 수가 절정에 달했다.\n혹한의 히스이 땅이 체질에 적합하여\n잠들어 있던 힘이 눈을 뜬 것으로 추측된다."
        zh_simp:
          legends_arceus: "在名为冰河期的时代盛极一时。本人\n认为严寒的洗翠地区正适合其体质，\n因而使得它沉睡体内的力量得到觉醒。"
        zh_trad:
          legends_arceus: "在名為冰河期的時代盛極一時。吾人\n認為嚴寒的洗翠地區正適合其體質，\n因而使得牠沉眠體內的力量得到覺醒。"
