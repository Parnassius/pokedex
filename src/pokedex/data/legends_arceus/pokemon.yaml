          legends_arceus: "火山の　噴火口から　生まれ出づると\n伝承あり。　傷　負いし折は　溶岩に\n温泉の如く　浸かりて　体を癒す。"
        en:
          legends_arceus: "Legend has it that this Pokémon was born from the crater of a\nvolcano. When wounded, it bathes in lava to heal its body, much\nas one would soak in a hot spring."
        fr:
          legends_arceus: "Une légende raconte qu’il naît dans les cratères des volcans.\nQuand il est blessé, il se baigne dans la lave afin de se soigner."
        it:
          legends_arceus: "Si narra che sia venuto alla luce dal cratere di un vulcano.\nAllorché è ferito, per sanare le membra s’immerge nella lava\na mo’ di bagno termale."
        de:
          legends_arceus: "Einer Legende nach hat dieses Pokémon in einem Vulkankrater\ndas Licht der Welt erblickt. Erleidet es Verletzungen, nimmt es\nzur Heilung ein Thermalbad in glühender Lava."
        es:
          legends_arceus: "Se dice que nace en los cráteres de los volcanes. Se baña\nen lava cuando está herido para curarse, como si de aguas\ntermales se tratase."
        ko:
          legends_arceus: "화산의 분화구에서 태어났다는 전승이 있다.\n상처를 입으면 온천에 들어가듯이\n용암에 몸을 담가 상처를 치유한다."
        zh_simp:
          legends_arceus: "传说此宝可梦诞生自火山口。\n当它负伤之时，会像泡温泉般\n浸于熔岩之中，借此治愈伤势。"
        zh_trad:
          legends_arceus: "傳說此寶可夢誕生自火山口。\n當牠負傷之時，會像泡溫泉般\n浸於熔岩之中，藉此治癒傷勢。"
