        en:
          legends_arceus: "Commands its subjects to build its hive. It will dispatch any\ninterlopers who dare sneak into its nest and use them as\nnourishment for itself."
        fr:
          legends_arceus: "Apireine ordonne à ses sujets de construire une ruche.\nSi quelqu’un tente de s’y infiltrer, ce Pokémon élimine\nl’intrus et s’en nourrit."
        it:
          legends_arceus: "Governa la costruzione del nido impartendo ordini\nai propri sottomessi. Sopprime e divora qualsivoglia\nintruso che ivi osi introdursi."
        de:
          legends_arceus: "Seine Untergebenen bauen ihm unter seinem Kommando ein\nNest. Wer es wagt, heimlich in dieses Nest einzudringen,\nwird erledigt und verspeist."
        es:
          legends_arceus: "Si algún intruso osa infiltrarse en la colmena que sus obreros\ncrean bajo sus órdenes, acaba con él y lo devora sin\nmiramientos."
        ko:
          legends_arceus: "부하들에게 명령하여 집을 짓게 한다.\n집에 숨어든 괘씸한 자는\n공격하여 자신의 양식으로 삼는다."
        zh_simp:
          legends_arceus: "命令手下筑起巢穴后，一旦有谁\n不识好歹潜入巢穴，蜂女王将会\n解决入侵者并将其化为自身粮食。"
        zh_trad:
          legends_arceus: "命令手下築起巢穴後，一旦有誰\n不識好歹潛入巢穴，蜂女王將會\n解決入侵者並將其化為自身糧食。"
