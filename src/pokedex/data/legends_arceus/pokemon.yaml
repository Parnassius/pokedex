        en:
          legends_arceus: "Gaseous and completely impalpable. Also highly dangerous—\ninhaling part of its poisonous body will cause one to\nfaint instantly."
        fr:
          legends_arceus: "Le corps gazeux de cette forme de vie intangible est composé\nd’un poison qui fait perdre conscience instantanément s’il est\ninhalé. Cela rend ce Pokémon extrêmement dangereux !"
        it:
          legends_arceus: "Vive allo stato gassoso ed è pertanto intangibile. Provoca\nistantaneo deliquio in chi inala porzioni del suo corpo\nperniciosamente velenifero."
        de:
          legends_arceus: "Es besteht aus Gas und ist daher nicht greifbar, jedoch äußerst\ngefährlich. Atmet jemand einen Teil seines giftigen Körpers ein,\nso fällt er sofort in Ohnmacht."
        es:
          legends_arceus: "Es una forma de vida gaseosa, intangible y muy peligrosa.\nCualquiera que inhale una fracción de su tóxico cuerpo se\ndesmayará de inmediato."
        ko:
          legends_arceus: "가스 형태의 생명체로 형체가 일정하지 않다.\n몸의 일부를 들이마시면 금방 기절하게 되는\n독성을 가지고 있어 매우 위험하다."
        zh_simp:
          legends_arceus: "气体状的生命体，难以捉摸。\n毒性强烈，若吸入它身体的一部分\n就会立即失去意识，极其危险。"
        zh_trad:
          legends_arceus: "氣體狀的生物，沒有實體可以捉摸。\n毒性強烈，若吸入牠身體的一部分\n就會立即失去意識，極其危險。"
haunter:
