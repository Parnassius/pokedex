        jp_kanji:
          legends_arceus: "雷撃により　宿敵関係　トルネロスと\n古来より　争うと　伝わる。　大地を\n貫く　稲妻にて　土壌　鍛えたり。"
        en:
          legends_arceus: "They say this wielder of electricity has waged war with its\nnemesis, Tornadus, since time immemorial. The lightning bolts\nit hurls pierce the very earth and enrich the soil."
        fr:
          legends_arceus: "On raconte qu’il se bat depuis les temps anciens contre Boréas,\nson ennemi juré, en maniant la foudre. Les éclairs qu’il lance\ntraversent la terre et enrichissent les sols."
        it:
          legends_arceus: "Si enarra che da tempi immemorabili lotti brandendo saette\ncontro Tornadus, suo acerrimo inimico. Fortifica la terra\ncon fulmini che incidono il suolo."
        de:
          legends_arceus: "Seit Urzeiten soll es mit Blitzgewittern gegen seinen Erzfeind\nBoreos zu Felde ziehen. Seine Blitze bohren sich ins Erdreich\nund bereichern den Boden."
        es:
          legends_arceus: "Se dice que lucha desde tiempos inmemoriales contra Tornadus,\nsu némesis, blandiendo rayos. Lanza descargas fulminantes que\nhoradan el suelo y lo enriquecen."
        ko:
          legends_arceus: "뇌격을 날리며 숙적인 토네로스와\n오래전부터 싸워 왔다고 전해진다.\n대지를 꿰뚫는 벼락으로 토양을 비옥하게 한다."
        zh_simp:
          legends_arceus: "传说它凭借自身的雷击，自古便与\n宿敌龙卷云不断斗争。它那贯穿\n大地的雷击使得土壤得到了精炼。"
        zh_trad:
          legends_arceus: "傳說牠憑藉自身的雷擊，自古便與\n宿敵龍捲雲不斷鬥爭。牠那貫穿\n大地的雷電使得土壤得到了精鍊。"
