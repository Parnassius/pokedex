        en:
          legends_arceus: "Screaming a bloodcurdling battle cry, this huge and ferocious\nbird Pokémon goes out on the hunt. It blasts lakes with shock\nwaves, then scoops up any prey that float to the water’s surface."
        fr:
          legends_arceus: "De taille imposante, ce preux volatile chasse en lançant de\nterribles cris de guerre. Il propage des ondes de choc dans\nles lacs, puis se saisit des proies remontées à la surface."
        it:
          legends_arceus: "Enorme e feroce volatile che nel cacciare leva un tremendo\ngrido di guerra. Sferza gli specchi d’acqua con onde d’urto\ne ghermisce le prede in tal modo condotte a galla."
        de:
          legends_arceus: "Mit entsetzlichem Kampfgeschrei geht dieses erbarmungslose,\nriesige Vogel-Pokémon auf Jagd. Es erzeugt Stoßwellen über\nSeen, um sodann die emportreibende Beute zu ergreifen."
        es:
          legends_arceus: "Esta enorme ave emite un espeluznante graznido de guerra\ncuando sale de caza. Lanza ondas contra los lagos y atrapa a\nlas presas que afloran a la superficie."
        ko:
          legends_arceus: "소름 끼치는 함성을 외쳐서 사냥하는\n용맹하고 큰 새. 호수에 충격파를 발산해서\n수면에 떠오른 먹잇감을 잡는다."
        zh_simp:
          legends_arceus: "勇猛的大鸟。狩猎时会发出\n气势骇人的战吼，朝湖水发出\n冲击波，捕捉浮出水面的猎物。"
        zh_trad:
          legends_arceus: "勇猛的大鳥。狩獵時會發出\n氣勢駭人的戰吼，朝湖水發出\n衝擊波，捕捉浮出水面的獵物。"
