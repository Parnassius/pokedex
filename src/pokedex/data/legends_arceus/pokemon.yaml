        en:
          legends_arceus: "Snaps at its foes with fangs cloaked in blazing flame. Despite its\nbulk, it deftly feints every which way, leading opponents on a\ndeceptively merry chase as it all but dances around them."
        fr:
          legends_arceus: "Il inflige des morsures grâce à ses canines enveloppées de\nflammes ardentes. Malgré sa grande taille, il est très agile :\nil semble danser autour de ses ennemis déconcertés."
        it:
          legends_arceus: "Stringe le prede con le zanne avviluppate in rovente foco.\nEccelle nelle finte nonostante la considerevole stazza. Le sue\nmovenze mentre schernisce gli inimici rassimigliano a una danza."
        de:
          legends_arceus: "Dieser Meister der Finten schnappt mit Fangzähnen zu, die in\nlodernde Flammen gehüllt sind. Ungeachtet seiner großen Statur\nnarrt er Feinde mit leichtfüßigen, tänzelnden Bewegungen."
        es:
          legends_arceus: "Lanza dentelladas con colmillos envueltos en un intenso fuego.\nA pesar de su gran tamaño, es un maestro de las fintas y\njuguetea alrededor de sus oponentes como si danzara."
        ko:
          legends_arceus: "활활 타는 불꽃을 이빨에 두르고 문다.\n체구가 큼에도 불구하고 화려한 움직임으로\n적을 농락하는 모습이 마치 춤추는 것 같다."
        zh_simp:
          legends_arceus: "将猛烈燃烧的火焰缠绕在牙齿上扑向猎物。\n虽然体型很大，却能以灵巧的假动作戏弄敌手，\n那姿态就像是舞蹈一般。"
        zh_trad:
          legends_arceus: "將猛烈燃燒的火焰纏繞在牙齒上撲向獵物。\n雖然體型很大，卻能以靈巧的假動作戲弄敵手，\n那姿態就像是舞蹈一般。"
