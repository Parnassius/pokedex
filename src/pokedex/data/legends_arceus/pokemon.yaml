        en:
          legends_arceus: "A kindhearted Pokémon that will care for any sick person or\nPokémon until their health improves. The eggs it lays are\ndelicious and bring good fortune to those who eat them."
        fr:
          legends_arceus: "Leuphorie a bon cœur : il prend grand soin des individus et\ndes Pokémon malades jusqu’à leur rémission. Ses œufs sont\ndélectables et comblent de joie ceux qui s’en repaissent."
        it:
          legends_arceus: "Di natura caritatevole, accudisce umani e Pokémon infermi\nfino a completa guarigione. Le deliziose uova rendono felice\nchiunque le mangi."
        de:
          legends_arceus: "Es ist sehr mitfühlend und pflegt Menschen sowie Pokémon bis\nzur Genesung. Die von ihm gelegten Eier sind köstlich und\nbringen jedem, der davon isst, Glück."
        es:
          legends_arceus: "Un Pokémon compasivo que cuida de todo aquel que esté\nenfermo, ya sea persona o Pokémon, hasta que sane. Sus\nexquisitos huevos traen la felicidad a quien los come."
        ko:
          legends_arceus: "정이 많아서 병든 사람이나 포켓몬을 보면\n나을 때까지 간호한다. 낳는 알은 맛이 아주\n뛰어나서 먹은 자에게 행복을 가져다준다."
        zh_simp:
          legends_arceus: "富有同情心，会照顾患病的人或\n宝可梦直至对方痊愈。所生的蛋\n滋味绝佳，能为吃下的人带来幸福。"
        zh_trad:
          legends_arceus: "富有同情心，會照顧患病的人或\n寶可夢直至對方痊癒。所生的蛋\n滋味絕佳，能為吃下的人帶來幸福。"
wurmple:
