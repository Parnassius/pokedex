        en:
          legends_arceus: "No records exist of Togetic being seen in the wilds. Rumors\nabound that it evolves under the loving care of a trusted human\ncompanion, upon whom the Pokémon then bestows great joy."
        fr:
          legends_arceus: "Je n’en ai jamais aperçu dans la nature. On dit qu’un Togepi\népouse cette forme lorsqu’il reçoit la protection d’une personne\nqui le comprend. Il comble alors cette dernière de bonheur."
        it:
          legends_arceus: "Non esistono resoconti di avvistamenti in natura. Si narra che,\ncol mutare d’aspetto, dispensi gran felicità a chi se ne è preso\ncura con comprensione."
        de:
          legends_arceus: "Es wurde bisher noch nie in der Wildnis gesichtet. Gerüchten\nzufolge entwickelt sich Togepi zu diesem Pokémon in der Obhut\neines vertrauten Menschen und bringt diesem großes Glück."
        es:
          legends_arceus: "Nunca se ha visto en estado salvaje. Corren rumores de que\nadopta esta forma cuando encuentra a alguien que lo\ncomprende, a quien brinda suerte y felicidad."
        ko:
          legends_arceus: "산이나 들에서 조우했다는 기록은 없다.\n마음이 맞는 자의 비호를 받으면 모습을 바꿔\n큰 행운을 가져다준다고 소문이 자자하다."
        zh_simp:
          legends_arceus: "至今尚无在野外遇见它的纪录。\n据说若有人能知其心意并加以庇护，\n它便会改变形貌并为此人带来福报。"
        zh_trad:
          legends_arceus: "至今尚無在野外遇見牠的紀錄。\n據說若有人能知其心意並加以庇護，\n牠便會改變形貌並為此人帶來福報。"
