        en:
          legends_arceus: "Has a long, rather splendid flotation sac, which prevents\nFloatzel from drowning even in stormy seas. One might glimpse\nthis species around fishing hamlets from time to time."
        fr:
          legends_arceus: "Grâce à son exceptionnel organe de flottaison, il parvient à\nflotter même dans les eaux les plus agitées. On peut parfois\nl’observer à l’entour des villages de pêcheurs."
        it:
          legends_arceus: "Il suo mirabile galleggiante di forma oblunga gli permette\ndi superare indenne la burrasca. Si palesa sovente laddove\nvivono i pescatori."
        de:
          legends_arceus: "Dank seiner langen, prächtigen Schwimmblase ertrinkt es selbst\nin stürmischer See nicht. Man erspäht es bisweilen in der Nähe\nvon Fischerdörfern."
        es:
          legends_arceus: "Cuenta con una magnífica vejiga natatoria alargada que lo\nmantiene a flote en la peor de las tormentas. Suele aparecer\ncerca de las zonas pesqueras."
        ko:
          legends_arceus: "길고 큰 부낭을 가지고 있어서\n거친 바다에서도 물에 빠지는 일이 없다.\n어촌 부근에서 간간이 목격된다."
        zh_simp:
          legends_arceus: "拥有又长又大的浮囊，即便\n遭遇海上风暴也不会溺水。\n时不时会在渔村附近被人目击。"
        zh_trad:
          legends_arceus: "擁有又長又大的浮囊，即便\n遭遇海上風暴也不會溺水。\n三不五時會在漁村附近被人目擊。"
cherubi:
