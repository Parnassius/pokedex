        en:
          legends_arceus: "On a moonless night, a strange incident occurred in which every\none of a village’s inhabitants suffered nightmares. The villagers\nattested that Darkrai appeared before them in these nightmares."
        fr:
          legends_arceus: "On rapporte un étrange incident arrivé par une nuit sans lune :\nles habitants d’un hameau auraient tous eu le même cauchemar,\nau cours duquel Darkrai serait apparu."
        it:
          legends_arceus: "Gli abitanti di un insediamento asseriscono di avere tutti avuto\nun incubo in una notte senza luna e di avervi veduto apparire\nquesto Pokémon."
        de:
          legends_arceus: "Einst begab es sich in einer mondlosen Nacht, dass ein ganzes\nDorf von demselben Alptraum geplagt wurde. Den Berichten\nder Betroffenen zufolge tauchte darin just dieses Pokémon auf."
        es:
          legends_arceus: "En una ocasión, durante una noche de luna nueva, todos los\nhabitantes de un mismo asentamiento sufrieron pesadillas\ncolectivas en las que aparecía este Pokémon."
        ko:
          legends_arceus: "달이 없는 밤. 마을 사람 전원이 악몽을 꾼\n사건이 있었다. 악몽 속에 나타난 포켓몬이\n이 포켓몬이라는 마을 사람들의 증언이 있다."
        zh_simp:
          legends_arceus: "以往曾有过在无月的夜里，村子里\n所有的人都做了恶梦的怪事。村民们\n宣称恶梦中出现的宝可梦就是此宝可梦。"
        zh_trad:
          legends_arceus: "以往曾有過在無月的夜裡，村子裡所有\n的人都夢見了惡夢的異事。村人們宣稱\n惡夢中出現的寶可夢就是此寶可夢。"
