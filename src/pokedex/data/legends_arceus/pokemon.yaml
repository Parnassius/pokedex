        en:
          legends_arceus: "Found more often on the land than in the sea. More active\nwhen it’s cloudy or rainy out than when the weather is fair."
        fr:
          legends_arceus: "On observe davantage ce Pokémon sur terre qu’en mer.\nIl est plus actif lorsque le temps est pluvieux ou couvert\nque lorsqu’il fait beau."
        it:
          legends_arceus: "Trascorre assai più tempo sulla terraferma che in acqua.\nÈ più laborioso in giornate nuvolose o piovorne piuttosto\nche sotto i raggi del sole."
        de:
          legends_arceus: "Es wird häufiger an Land gesichtet als im Meer. Bei bewölktem\nHimmel oder Regenwetter ist es aktiver als bei Sonnenschein."
        es:
          legends_arceus: "Se encuentra más comúnmente en tierra firme que en el mar.\nMuestra mucha actividad durante los días nublados y lluviosos,\nen comparación con aquellos en los que brilla el sol."
        ko:
          legends_arceus: "수중보다 육지에서의 활동이 많다.\n맑은 날에 비해 흐리거나\n비가 내리는 날에 더 활발하다."
        zh_simp:
          legends_arceus: "比起海中，更常在陆地上活动。\n相较于晴天，在阴天及雨天时\n活动会更加活跃。"
        zh_trad:
          legends_arceus: "比起海中，更常在陸地上活動。\n相較於晴天，在陰天及雨天時\n活動會更加活躍。"
ambipom:
