      descriptions:
        jp_kanji:
          legends_arceus: "丑の刻　徘徊し　悪童を　さらうとの\n怪談を　ヒスイの幼子は　みな　信じ\n己の行いを　改めるという。"
        en:
          legends_arceus: "I’ve heard that the children of Hisui all begin to behave once\nthey’ve been told the story of how this Pokémon roams about\nbefore the witching hour to spirit away misbehaving children."
        fr:
          legends_arceus: "On dit que si les enfants de Hisui sont bien élevés,\nc’est parce qu’on leur raconte que les Skelénox sortent\nà la nuit tombée pour emporter ceux qui ne sont pas sages."
        it:
          legends_arceus: "Pare che i fanciulli di Hisui si facciano ubbidienti nell’udire\nche questa creatura vaga a notte fonda per ghermire i monelli\nalla stregua di un orco."
        de:
          legends_arceus: "Angeblich wissen die Kinder in Hisui sich sogleich zu benehmen,\nwenn man ihnen die weit verbreitete Geschichte von Zwirrlicht\nerzählt, das nachts unartige Kinder verschleppen soll."
        es:
          legends_arceus: "Dicen que los niños de Hisui enmiendan su actitud tras escuchar\nlas historias de los Duskull que merodean de madrugada y se\nllevan consigo a aquellos que se portan mal."
        ko:
          legends_arceus: "축시에 배회하며 나쁜 아이를 잡아간다는\n괴담을 들려주면 히스이의 아이들은\n그것을 믿고는 행실을 고친다고 한다."
        zh_simp:
          legends_arceus: "洗翠的孩子们个个都相信夜巡灵\n会在丑时四处徘徊拐走恶童的怪谈。\n这让他们学会了改正自己的过错。"
        zh_trad:
          legends_arceus: "洗翠的孩子們個個都相信，夜巡靈\n會在丑時四處徘徊拐走惡童的怪談。\n這讓他們學會了改正自己的過錯。"
