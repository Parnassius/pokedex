        en:
          legends_arceus: "When confronted by a lack of other materials, Burmy will create\nits cloak using dust and refuse. The cloak seems to be more\ncomfortable than one would think."
        fr:
          legends_arceus: "Lorsqu’il ne trouve pas de matière première adéquate pour\nconfectionner sa cape, il utilise des détritus. Sa cape est\nd’ailleurs bien plus douillette qu’elle n’y paraît."
        it:
          legends_arceus: "In mancanza di materiali idonei, confeziona un manto\nusufruendo di scarti. Contrariamente alle mie aspettative,\nnon pare affatto scomodo."
        de:
          legends_arceus: "Findet es kein brauchbares Material, so fertigt es sich einen\nUmhang aus Unrat an, der sich dem Anschein nach als\nerstaunlich bequem erweist."
        es:
          legends_arceus: "Si no encuentra materiales adecuados, rebusca en la basura y\ncrea un manto con desechos. Parece que este es mucho más\ncómodo de lo que se pudiera creer."
        ko:
          legends_arceus: "적당한 재료가 보이지 않아서\n먼지로 도롱이를 만들었다.\n의외로 착용감이 나쁘지 않은 모양이다."
        zh_simp:
          legends_arceus: "当身边找不到适合的材料时，\n会用尘土草芥等垃圾来做蓑衣。\n裹起来的感觉似乎意外地还不坏。"
        zh_trad:
          legends_arceus: "當身邊找不到適合的材料時，\n會用塵土草芥等垃圾來做蓑衣。\n裹起來的感覺似乎意外地還不壞。"
