        jp_kanji:
          legends_arceus: "木々　色づく頃　姿が　増える。\n触角を　打ち当て　奏でる　音色は\n異国の楽器　マリンバに　似る。"
        en:
          legends_arceus: "When the trees take on new hues, more of these Pokémon\nappear. The tone they create by striking their antennae together\nresembles that of the marimba, an instrument of foreign lands."
        fr:
          legends_arceus: "Ils se font plus nombreux à l’automne, quand les arbres arborent\nde nouvelles teintes. Le son produit lorsque leurs antennes\ns’entrechoquent rappelle le marimba, un instrument étranger."
        it:
          legends_arceus: "Questi Pokémon si palesano numerosi al mutar del colore\ndegli alberi. Le antenne, cozzando, generano un suono\nche rammenta l’esotico strumento della marimba."
        de:
          legends_arceus: "Wenn sich die Blätter an den Bäumen färben, tritt es vermehrt\nauf. Das Aneinanderschlagen seiner Antennen klingt wie das\nSpiel einer Marimba, eines Instruments aus der Fremde."
        es:
          legends_arceus: "Aparece más a menudo cuando las hojas de los árboles\ncambian de color. El sonido que crea al chocar las antenas\nrecuerda al de un exótico instrumento llamado marimba."
        ko:
          legends_arceus: "나무들이 단풍이 들 즈음에 많이 보인다.\n더듬이를 부딪쳐서 연주하는 음색은\n이국의 악기 마림바를 닮았다."
        zh_simp:
          legends_arceus: "当树木染上秋色时数量便会变多。\n敲打触角所奏出的音色听起来\n很像马林巴这种异国乐器。"
        zh_trad:
          legends_arceus: "當樹木染上秋色時數量便會變多。\n敲打觸角所奏出的音色聽起來\n好似木琴這種異國樂器。"
