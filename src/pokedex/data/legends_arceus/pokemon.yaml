        en:
          legends_arceus: "A poison wielder with a dastardly personality. Despite such\nqualities, this species is afforded a measure of popularity due\nto its peculiar cry and comical features."
        fr:
          legends_arceus: "Ce spécimen venimeux est de nature lâche. Il jouit néanmoins\nd’une certaine popularité grâce à son cri grotesque et à ses\ntraits cocasses."
        it:
          legends_arceus: "È velenifero e iniquo per natura. Malgrado ciò, gode\ndi una certa notorietà grazie al suo singolare verso\ne ai comici lineamenti facciali."
        de:
          legends_arceus: "Dieses giftige Pokémon ist von Natur aus niederträchtig,\ndoch aufgrund seines sonderbaren Rufs und lustigen\nGesichtsausdrucks ist es dennoch recht beliebt."
        es:
          legends_arceus: "Es venenoso y le gusta jugar sucio, mas su grito extravagante y\nsu expresión bobalicona parecen hacer de él un Pokémon\nbastante popular."
        ko:
          legends_arceus: "독을 품고 있으며, 성격은 비겁하다.\n하지만 기묘한 울음소리와\n우스꽝스러운 얼굴 때문에 인기가 좋다."
        zh_simp:
          legends_arceus: "身上带毒且性情卑劣。\n但由于奇妙的叫声与滑稽的\n长相，使它颇受人们欢迎。"
        zh_trad:
          legends_arceus: "身上帶毒且性情卑劣。\n但由於奇妙的叫聲與滑稽的\n長相，使得牠頗受人們歡迎。"
