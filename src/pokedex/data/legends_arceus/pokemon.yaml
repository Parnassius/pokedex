        en:
          legends_arceus: "It sinks its sharp fangs into other creatures and slurps up their\nblood. A closer look at the fangs reveals that they are hollow\nand akin to straws."
        fr:
          legends_arceus: "En l’observant, j’ai noté que ses crocs étaient creux comme\ndes pailles. Il les plante dans la chair d’autres créatures afin\nd’aspirer leur sang."
        it:
          legends_arceus: "Sugge il sangue di altre creature tramite gli aguzzi canini che,\nad un’attenta analisi, si son rivelati essere cavi come cannucce."
        de:
          legends_arceus: "Untersucht man die scharfen Fangzähne, die es in seine Beute\nbohrt, um ihr Blut zu saugen, so sind diese innen hohl und\nerinnern an Strohhalme."
        es:
          legends_arceus: "Clava sus afilados colmillos en otros seres vivos para\nchuparles la sangre. Al analizarlos, notamos que están\nhuecos por dentro, como tubos."
        ko:
          legends_arceus: "예리한 이빨로 생명체의 피를 빨아들인다.\n이빨의 형태를 조사한바\n내부에 빨대처럼 빈 공간이 있었다."
        zh_simp:
          legends_arceus: "会用口中利齿吸吮生物的血液，\n经过研究，其牙齿内有空洞，\n构造就如同吸管一般。"
        zh_trad:
          legends_arceus: "會用口中利齒吸吮生物的血液，\n經過研究，其牙齒內有空洞，\n構造就如同吸管一般。"
