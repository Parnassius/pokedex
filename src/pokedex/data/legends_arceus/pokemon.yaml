        en:
          legends_arceus: "The air stored inside the rachises of Decidueye’s feathers\ninsulates the Pokémon against Hisui’s extreme cold. This is\nfirm proof that evolution can be influenced by environment."
        fr:
          legends_arceus: "Les plumes d’Archéduc le protègent de la froideur glaciale\nde Hisui grâce à l’air logé dans leur tige. Voici une preuve\nque l’environnement agit sur l’évolution des Pokémon."
        it:
          legends_arceus: "Resiste all’algido clima di Hisui grazie all’aria trattenuta\nnel rachide delle sue piume. Un chiaro esempio d’evoluzione\ncagionata dall’ambiente."
        de:
          legends_arceus: "Die Kiele seiner Federn enthalten Luft und erlauben es ihm so,\nder extremen Kälte Hisuis zu trotzen. Ein eindeutiger Beweis\ndafür, dass die Umwelt Einfluss auf die Entwicklung haben kann!"
        es:
          legends_arceus: "Almacena aire en el raquis de las plumas, lo que le permite\naguantar las gélidas temperaturas de Hisui. Un claro ejemplo de\ncómo el entorno puede influir en la evolución de los Pokémon."
        ko:
          legends_arceus: "히스이의 극한의 추위에 견디기 위해\n깃털의 심에 공기를 머금어 방한 기능을 갖췄다.\n환경이 진화에 영향을 주는 것으로 판명된다."
        zh_simp:
          legends_arceus: "为抵抗洗翠的严寒气候，羽毛的\n芯中含有空气，因而能够防寒。\n由此可见环境会对进化产生影响。"
        zh_trad:
          legends_arceus: "為抵抗洗翠的嚴寒氣候，羽毛的\n芯中含有空氣，因而能夠防寒。\n由此可見環境會對進化產生影響。"
