          legends_arceus: "多様なる姿に　進化する　可能性あり。\nポケモンの　進化の秘密を　解く鍵\nこの身の内に　あると　確信す。"
        en:
          legends_arceus: "Harbors the potential to evolve into manifold forms.\nWithin Eevee lies the key to the mysteries of Pokémon\nevolution—I’m certain of it."
        fr:
          legends_arceus: "Cette espèce est capable d’évoluer de moult façons. Je pense\nqu’elle détient la clé du secret de l’évolution des Pokémon."
        it:
          legends_arceus: "Ha la facoltà di evolversi in forme variegate. Stimo che in lui\ndimori la chiave per svelare l’arcano dell’evoluzione di ogni\nPokémon."
        de:
          legends_arceus: "Es trägt das Potenzial für etliche verschiedene Entwicklungen\nin sich. Ich bin sicher, dass Evoli den Schlüssel zum Geheimnis\nder Pokémon-Entwicklung birgt."
        es:
          legends_arceus: "Puede adoptar distintas formas al evolucionar. Creemos que en\nél reside la clave para comprender el secreto de la evolución\nde los Pokémon."
        ko:
          legends_arceus: "다양한 모습으로 진화하는 가능성을 지녔다.\n포켓몬 진화의 비밀을 해결할 열쇠가\n이 몸 안에 있다고 확신하고 있다."
        zh_simp:
          legends_arceus: "拥有进化成多种姿态的可能性。\n本人确信解明进化秘密的关键\n就在此宝可梦身上。"
        zh_trad:
          legends_arceus: "擁有進化成多種姿態的可能性。\n吾人確信解明進化秘密的關鍵\n就在此寶可夢身上。"
