        jp_kanji:
          legends_arceus: "常より　頭痛に　悩む。　強まりしとき\n秘めたる力　意に反し　暴発するゆえ\n痛み　和らげる術を　模索中なり。"
        en:
          legends_arceus: "Suffers perpetual headaches. If the agony grows too great,\nPsyduck’s latent power erupts, contrary to Psyduck’s intent.\nErgo, I am exploring ways to ease the pain."
        fr:
          legends_arceus: "Il souffre en permanence de céphalées. Quand la douleur\ndevient trop intense, la force latente de ce Pokémon\nexplose malgré lui. Je recherche un moyen de l’apaiser."
        it:
          legends_arceus: "Gli assidui mal di testa, se intensi, lo portano a esplosioni\ninvolontarie di energie sopite, per cui studio un rimedio\nche allevi il suo tormento."
        de:
          legends_arceus: "Es leidet permanent unter Kopfschmerzen. Bei starken Anfällen\nwerden seine verborgenen Kräfte gegen seinen Willen entfesselt.\nIch suche daher nach Wegen, diese Beschwerden zu lindern."
        es:
          legends_arceus: "Sufre constantes jaquecas. Cuando el dolor se intensifica, libera\nsin querer su poder interior, por lo que estamos investigando\ncómo calmarlo."
        ko:
          legends_arceus: "항상 두통에 시달린다. 두통이 강해지면\n숨겨진 힘이 의사와 상관없이 폭발하기에\n두통을 완화할 방법을 모색 중이다."
        zh_simp:
          legends_arceus: "常年受头痛折磨。疼痛增强之时，\n蕴藏于体内之力将失控爆发。\n故本人正在摸索舒缓头痛之法。"
        zh_trad:
          legends_arceus: "常年為頭痛所苦。疼痛增強之時，\n蘊藏於體內之力將失控爆發。\n故吾人正在摸索舒緩頭痛之法。"
