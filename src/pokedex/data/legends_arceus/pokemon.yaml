        en:
          legends_arceus: "Once the fruit growing alongside the main body is large and\nplump, Cherubi will use the nutrients within to evolve. The fruit\nthen detaches, becoming nourishment for other creatures."
        fr:
          legends_arceus: "Lorsque le fruit poussant à côté de son corps est suffisamment\ngros, Ceribou utilise les nutriments qu’il contient pour évoluer.\nLe fruit se détache alors et sert d’aliment à d’autres Pokémon."
        it:
          legends_arceus: "S’evolve suggendo nutrienti dal frutto che gli cresce a lato\nallorché si fa grande e paffuto. Quindi il frutto cade e diviene\ncibo altrui."
        de:
          legends_arceus: "Sobald die Frucht, die an der Seite wächst, groß und rund ist,\nnutzt Kikugi ihre Nährstoffe zur Entwicklung. Sie fällt sodann\nzu Boden und dient anderen Lebewesen als Nahrung."
        es:
          legends_arceus: "Cuando el fruto con el que coexiste crece lo suficiente, se vale\nde sus nutrientes para evolucionar. Una vez cumplida su función,\neste se desprende y sirve de alimento a otros Pokémon."
        ko:
          legends_arceus: "본체 옆에 자라는 열매가 크고 실해지면\n그 영양분을 사용해서 진화한다. 열매는 이후\n자연스럽게 떨어져 다른 생물의 양분이 된다."
        zh_simp:
          legends_arceus: "会在真身旁的果实长大成熟后，\n使用果实的营养来进化。之后果实\n会自己掉落，成为其他生物的食粮。"
        zh_trad:
          legends_arceus: "會在本體旁的果實長大成熟後，\n使用果實的營養來進化。之後果實\n會自己掉落，成為其他生物的食糧。"
