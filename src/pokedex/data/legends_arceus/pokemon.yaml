      descriptions:
        jp_kanji:
          legends_arceus: "凶事を　祓う　呪文　唱えるゆえに\n家に招く　風習あり。　ただし　機嫌を\n損ねる　行いあれば　災い　もたらす。"
        en:
          legends_arceus: "The incantations Mismagius chants can ward against misfortune,\nso a custom exists of inviting it into one’s home. Incur the\nPokémon’s displeasure, however, and disaster will surely ensue."
        fr:
          legends_arceus: "Ses incantations ayant le pouvoir de repousser le mauvais sort,\nil est de coutume de l’inviter chez soi. Mais attention à ne pas\nle froisser ou il attirera le malheur !"
        it:
          legends_arceus: "Invitato assai gradito in ogni casa per i suoi incantesimi\napotropaici. Nondimeno, è bene non indisporlo o\napporterà grandi sciagure."
        de:
          legends_arceus: "Da die von ihm gesprochenen Bannsprüche Böses vertreiben\nkönnen, ist es Brauch, es zu sich ins Haus einzuladen. Wer es\njedoch verärgert, bringt großes Unheil über sich."
        es:
          legends_arceus: "Existe la costumbre de invitarlo a entrar en los hogares debido a\nsus cánticos contra la mala fortuna. No obstante, si se comete el\nerror de importunarlo, acaecerá una terrible desgracia."
        ko:
          legends_arceus: "흉사를 내쫓는 주문을 외는 까닭에\n집으로 들이는 풍습이 있다.\n단, 이때 기분을 상하게 하면 화를 입는다."
        zh_simp:
          legends_arceus: "由于会咏唱辟邪的咒语，因此\n人们有着将其找来家中的习俗。\n然而一旦惹其不悦，便会反招灾祸。"
        zh_trad:
          legends_arceus: "由於會詠唱驅除凶邪的咒語，因此\n人們有著將其招來家中的習俗。\n然而一旦惹其不悅，便會反招災禍。"
