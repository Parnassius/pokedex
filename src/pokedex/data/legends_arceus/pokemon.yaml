        en:
          legends_arceus: "This Pokémon becomes more energetic the more sunlight there\nis. The part resembling a shell is similar to silt and is slightly\ndamp and warm to the touch."
        fr:
          legends_arceus: "Sa vitalité augmente sous les rayons du soleil. La partie de\nson corps ressemblant à une carapace est en réalité proche\ndu limon. Elle est légèrement chaude et humide."
        it:
          legends_arceus: "Trae maggior vigore dalla luce solare intensa. Quella che\nsembra essere una corazza rammenta il limo ed è lievemente\numida e calda."
        de:
          legends_arceus: "Je stärker die Sonne auf es einstrahlt, desto aktiver wird es.\nDer panzerartige Teil seines Leibs ähnelt Schlick und fühlt sich\nleicht feucht und warm an."
        es:
          legends_arceus: "La luz del sol les aporta vitalidad. Su concha tiene una\napariencia similar al limo y es ligeramente húmeda y cálida."
        ko:
          legends_arceus: "햇빛을 받을수록 활력이 넘친다.\n등껍질처럼 보이는 부위는 진흙 같아서\n약간 축축하면서도 온기가 있다."
        zh_simp:
          legends_arceus: "阳光越是照耀，活力越是充沛。\n形似甲壳的部分质地近似泥沙，\n触感湿润且带有微温。"
        zh_trad:
          legends_arceus: "陽光越是照耀，活力越是充沛。\n形似甲殼的部分質地近似泥沙，\n觸感濕潤且帶有微溫。"
