        en:
          legends_arceus: "They form packs, each having one male as leader. Legends say\nthat when Luxray’s two eyes shimmer with gold, the Pokémon\ncan see through anything."
        fr:
          legends_arceus: "Chaque meute est menée par un mâle. Selon les ouï-dire,\nlorsque les yeux d’un Luxray brillent d’un éclat doré,\nil peut voir à travers toute chose."
        it:
          legends_arceus: "Vive in branchi capeggiati da un esemplare maschio. Si narra\nche, allorché gli occhi rilucono dorati, abbia facoltà di vedere\nattraverso ogni cosa."
        de:
          legends_arceus: "Luxtra bilden Rudel mit einem Männchen als Anführer. Leuchten\nihre Augen gülden auf, so erzählt man sich, vermögen sie durch\nalles hindurchzusehen."
        es:
          legends_arceus: "Cada manada está liderada por un solo macho. Se cuenta que,\ncuando se le iluminan los ojos con un brillo dorado, es capaz de\nver a través de cualquier cosa."
        ko:
          legends_arceus: "한 마리의 수컷을 필두로 무리를 짓는다.\n양 눈이 금빛으로 빛날 때\n만물을 꿰뚫어 본다는 전승이 있다."
        zh_simp:
          legends_arceus: "以一只雄性个体为首领形成群体。\n传说中，当其双眼闪耀金色光辉，\n便能够看透世间万物。"
        zh_trad:
          legends_arceus: "以一隻雄性個體為首領形成群體。\n傳說中，當其雙眼閃耀金色光輝，\n便能夠看透世間萬物。"
