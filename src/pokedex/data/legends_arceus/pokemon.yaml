      descriptions:
        jp_kanji:
          legends_arceus: "海水温　上がりし季節に　海岸付近にて\n漂う姿あり。　蒼き体色　海に紛れし色\nゆえ　天敵より　身を守る　理屈なり。"
        en:
          legends_arceus: "Can be seen floating offshore during seasons when the seas are\nwarm. Its azure body blends in with the ocean waters—logic\nsuggests this is a defense mechanism against natural predators."
        fr:
          legends_arceus: "Quand les eaux se réchauffent, on l’aperçoit parfois vaguer\nprès des côtes. Je pense que si son corps est de la couleur\nde la mer, c’est pour pouvoir se cacher des prédateurs."
        it:
          legends_arceus: "Ondeggia dappresso alle rive all’innalzarsi delle temperature\nmarine. Desumo che il color ceruleo serva ad ascondersi in mare\ned eludere i predatori."
        de:
          legends_arceus: "Steigt die Meerestemperatur, kann man beobachten, wie es\nsich im küstennahen Wasser treiben lässt. Die azurblaue\nKörperfarbe dient ihm wohl als Tarnung vor Fressfeinden."
        es:
          legends_arceus: "Flota cerca de la costa cuando las aguas se vuelven más cálidas.\nSu tono de un azul similar al del mar podría ser un mecanismo\nde defensa contra los depredadores."
        ko:
          legends_arceus: "바다의 수온이 오르는 계절에 해안 부근에서\n떠도는 모습이 보인다. 바다색을 닮은 파란 몸이\n천적으로부터 몸을 보호해 준다."
        zh_simp:
          legends_arceus: "在海水温度上升的季节可以看见它漂在\n海岸附近的身影。苍蓝的体色与海水\n颜色相近，能保护它免于天敌的侵袭。"
        zh_trad:
          legends_arceus: "在海水溫度上升的季節可以看見牠漂在\n海岸附近的身影。蒼藍的體色與海水\n顏色相近，能保護牠免於天敵的侵襲。"
