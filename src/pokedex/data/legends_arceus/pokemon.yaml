        en:
          legends_arceus: "A powerful Pokémon that can split huge boulders with ease.\nDislikes associating with others and chooses to live quietly deep\nwithin the mountains, playing with the snow."
        fr:
          legends_arceus: "Ce Pokémon robuste démolit aisément les rochers les plus\nimposants. Il n’aime pas la compagnie et vit paisiblement\ndans les montagnes reculées où il joue avec la neige."
        it:
          legends_arceus: "Coriaceo e atto a frantumare macigni con agio, mal sopporta\nle interazioni, preferendo un eremo montano ove sollazzarsi\ncon la neve."
        de:
          legends_arceus: "Dieses Pokémon kann selbst große Felsen mühelos zerschlagen.\nEs meidet die Gesellschaft anderer und lebt abgeschieden in\nden Bergen, wo es mit Schnee spielt."
        es:
          legends_arceus: "Capaz de partir pedruscos con su gran fuerza. Detesta la\ncompañía de los demás, así que vive en las entrañas de la\nmontaña, donde juega y retoza en la nieve tranquilamente."
        ko:
          legends_arceus: "거대한 바위를 손쉽게 깨부수는 강자.\n다른 이와의 교류를 꺼려서 깊은 산속에서\n눈과 함께 조용하게 지낸다."
        zh_simp:
          legends_arceus: "就连巨石也能轻易劈开的大力士。\n不爱与外界接触，静静地生活在\n深山之中，平时只与白雪同乐。"
        zh_trad:
          legends_arceus: "就連巨石也能輕易劈開的大力士。\n不愛與外界接觸，靜靜地生活在\n深山之中，平時只與白雪同樂。"
