        jp_kanji:
          legends_arceus: "日差し　強まるとき　頭上に　掲げし蕾\n開く。　この様子に　厳冬が終わり\n芽吹く季節　来たりと　人々は知る。"
        en:
          legends_arceus: "When the sun’s light strengthens, the bud atop this Pokémon’s\nhead opens. This is a sign to the people that the harsh winter is\nover, and the season of budding has begun."
        fr:
          legends_arceus: "Le bourgeon sur sa tête s’ouvre lorsque les rayons du soleil\ns’intensifient. Pour tous, cela marque la fin des rudesses\nhivernales et l’arrivée des beaux jours."
        it:
          legends_arceus: "Quando il sole acquista vigore, le gemme sul capo si schiudono.\nCiò annunzia la fine del rigido inverno e l’inizio della stagione\ndei germogli."
        de:
          legends_arceus: "Wenn die Sonne an Kraft gewinnt, öffnet sich die Knospe auf\nseinem Kopf. Einer Bauernregel nach steht dies für das Ende\ndes harschen Winters und das Erwachen der Natur."
        es:
          legends_arceus: "El capullo que corona su cabeza se abre bajo los cálidos rayos\ndel sol, lo que para muchos es un augurio del fin del duro\ninvierno y la llegada de la época de florecimiento."
        ko:
          legends_arceus: "햇살이 강해지면 머리의 봉오리가 열린다.\n사람들은 이 모습을 보고 추운 겨울이 끝나고\n싹이 트는 계절이 왔다는 것을 알게 된다."
        zh_simp:
          legends_arceus: "当日照变强，头顶上的花苞就会\n开放。人们由此得知寒冬已过，\n新芽生长的季节已经到来。"
        zh_trad:
          legends_arceus: "當日照變強，頭頂上的花苞就會\n開放。人們由此得知寒冬已過，\n新芽生長的季節已經到來。"
