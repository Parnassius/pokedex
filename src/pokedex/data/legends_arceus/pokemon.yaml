      descriptions:
        jp_kanji:
          legends_arceus: "眉月　想わせし　ポケモン。　夜空を\n飛翔の折　一筋の光跡　鮮明に残す。\nまるで　天の川　産みし　天女なり。"
        en:
          legends_arceus: "Cresselia is reminiscent of the crescent moon. It leaves a brilliant\nline of light in its wake as it flies across the night sky. I daresay\nit resembles the heavenly maiden who created the Milky Way."
        fr:
          legends_arceus: "Ce Pokémon évoque un croissant de lune. Lorsqu’il parcourt\nle ciel nocturne, une traîne de lumière majestueuse se déploie\nsur son passage, comme s’il semait la Voie lactée."
        it:
          legends_arceus: "Ricorda la luna crescente e, librandosi nel cielo notturno,\nlascia una fulgida scia. Ciò induce quasi a credere che\nla Via Lattea sia nata da tale essere celestiale."
        de:
          legends_arceus: "Während es übers nächtliche Firmament fliegt, zieht es eine\nLichtspur nach sich, als wäre es ein himmlisches Wesen, das auf\nseinem Weg die Milchstraße malt. Es ähnelt einer Mondsichel."
        es:
          legends_arceus: "Vuela por el cielo nocturno dejando tras de sí una vívida estela\nbrillante, como si se tratara de un ser celestial que traza la Vía\nLáctea. Su figura recuerda a una luna creciente."
        ko:
          legends_arceus: "초승달을 떠올리게 하는 포켓몬.\n밤하늘을 날 때 한 줄기 빛을 선명하게 남긴다.\n그 모습이 마치 은하수를 그리는 선녀 같다."
        zh_simp:
          legends_arceus: "令人联想到弯月的宝可梦。在夜空中\n飞翔时，会留下一道鲜明的光迹，\n就像是在天上画出一条银河的仙女。"
        zh_trad:
          legends_arceus: "令人聯想到彎月的寶可夢。在夜空中\n飛翔時，會留下一道鮮明的光跡，\n就像是在天上畫出一條銀河的仙女。"
