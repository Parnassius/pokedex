      descriptions:
        jp_kanji:
          legends_arceus: "槍の如き　針と　凶暴なる　気質にて\n海鬼の　異名を　持つ　ポケモン。\n毒を　すすりて　己の　糧とす。"
        en:
          legends_arceus: "Its lancelike spikes and savage temperament have earned it the\nnickname “sea fiend.” It slurps up poison to nourish itself."
        fr:
          legends_arceus: "Ses épines semblables à des lances et sa nature violente lui\nvalent le sobriquet « d’ogre des océans ». Il se repaît du poison\nqu’il aspire."
        it:
          legends_arceus: "Appellato \"demone dei mari\" per via del feroce temperamento\ne degli aculei simili a lance, sugge veleno e indi lo converte\nin nutrimento."
        de:
          legends_arceus: "Sein brutales Wesen sowie die speergleichen Stacheln haben\nihm den Beinamen „Meeresdämon“ beschert. Es schlürft Gift,\ndas ihm als Nahrung dient."
        es:
          legends_arceus: "Sus púas, afiladas como lanzas, y su violento carácter le han\ngranjeado el mote de Demonio del Mar. Puede sorber veneno\ncomo sustento alimenticio."
        ko:
          legends_arceus: "창과 같은 침과 흉포한 성질 때문에\n“바다 도깨비”라는 이명이 있는 포켓몬.\n독을 마셔서 자신의 양식으로 삼는다."
        zh_simp:
          legends_arceus: "身上如同枪尖般的针以及凶暴的性情\n使这种宝可梦得到了海鬼的外号。\n会吞下毒物作为自身粮食。"
        zh_trad:
          legends_arceus: "身上如同槍尖般的針以及凶暴的性情\n使這種寶可夢得到了海鬼的外號。\n會吞下毒物作為己身糧食。"
