        en:
          legends_arceus: "Though Gabite are usually of a violent disposition, when I gave\none a glass bead it had been eyeing covetously, it suddenly\nbecame quite docile."
        fr:
          legends_arceus: "Ce Pokémon au tempérament agressif manifestait de l’intérêt\npour une bille en verre. Sitôt que je la lui ai donnée, il est\ndevenu très docile."
        it:
          legends_arceus: "Seppur d’indole irascibile, questo Pokémon si placa non appena\ngli viene fatto dono di perline in vetro, per cui nutre tangibile\ninteresse."
        de:
          legends_arceus: "Knarksel ist eigentlich recht aggressiv veranlagt, doch als ich ihm\neinmal eine von ihm beäugte Glasperle gab, wurde es sehr\nschnell sanftmütig."
        es:
          legends_arceus: "Parece poseer un temperamento belicoso, mas tras entregarle\nuna canica que pareció captar su atención, inmediatamente se\nvolvió más dócil."
        ko:
          legends_arceus: "성질이 사나운 포켓몬이지만\n좋아하는 유리구슬을 주면\n곧바로 고분고분한 성격으로 변한다."
        zh_simp:
          legends_arceus: "虽然是种性情凶暴的宝可梦，\n但只要将它感兴趣的玻璃珠给它，\n它就会立刻变得温顺可亲。"
        zh_trad:
          legends_arceus: "雖然是種性情凶暴的寶可夢，\n但只要將牠感興趣的玻璃珠給牠，\n牠就會立刻變得溫順可親。"
