        en:
          legends_arceus: "A bizarre item caused this Pokémon to evolve. While it now\nexhibits many new gestures and expressions, its biology\nremains inscrutable."
        fr:
          legends_arceus: "Un étrange objet a provoqué l’évolution de ce Pokémon.\nSes mouvements et ses expressions ont gagné en variété,\nmais ses mœurs demeurent un ineffable mystère."
        it:
          legends_arceus: "Si è evoluto per mezzo di un singolare strumento.\nGestualità ed espressività si sono fatte più ricche, seppur\nrimangano ignoti i dati biologici sul suo conto."
        de:
          legends_arceus: "Es entwickelte sich mithilfe eines seltsamen Gegenstands.\nSeine Bewegungen und Ausdrucksformen haben zwar an Vielfalt\ngewonnen, doch seine Physiologie bleibt weiterhin ein Rätsel."
        es:
          legends_arceus: "Un extraño objeto provocó esta evolución. Presenta una mayor\nvariedad de expresiones y gestos, mas su fisiología sigue siendo\nun misterio."
        ko:
          legends_arceus: "기묘한 도구에 의해 진화한 모습.\n행동이 다양해지고 표정도 풍부해졌다.\n하지만 생태는 아직 밝혀내지 못했다."
        zh_simp:
          legends_arceus: "凭借奇异的道具进化而成。\n动作种类增多，且表情更加丰富。\n然而其生态至今仍是未解之谜。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具進化而成。\n動作種類增多，且表情更加豐富。\n然而其生態至今仍是未解之謎。"
