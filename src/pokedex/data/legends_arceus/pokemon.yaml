        - grass
        - fighting
      descriptions:
        jp_kanji:
          legends_arceus: "雪深き山に　棲みしゆえに　脚力が\n発達したと　考察す。　周囲の者を\n鼓舞する　香りを　冠の花より　放つ。"
        en:
          legends_arceus: "I suspect that its well-developed legs are the result of a life\nspent on mountains covered in deep snow. The scent it exudes\nfrom its flower crown heartens those in proximity."
        fr:
          legends_arceus: "Je spécule que ce Pokémon doit ses jambes musclées à son\nhabitat dans les montagnes couvertes de neige épaisse. La fleur\nsur sa couronne exhale un parfum stimulant tout être alentour."
        it:
          legends_arceus: "L’inerpicarsi per innevati sentieri montani parrebbe averne\nsviluppato maggiormente le gambe. Il fiore della sua corona\nspande un aroma capace di dare animo a chi ha d’intorno."
        de:
          legends_arceus: "Die starke Beinmuskulatur verdankt es wohl dem Leben auf\nschneebedeckten Bergen. Über seine Blumenkrone verströmt\nes stimulierende Düfte."
        es:
          legends_arceus: "Habitar en montañas cubiertas de nieves le ha permitido\ndesarrollar unas piernas robustas. Expulsa un aroma por la flor\nde su corona que infunde ánimo a quien esté cerca."
        ko:
          legends_arceus: "눈 덮인 산에 살기 때문에 다릿심이\n발달한 것으로 추측된다. 화관을 통해\n주위에 있는 이를 고무시키는 향기를 내보낸다."
        zh_simp:
          legends_arceus: "据考察，雪山深处的栖息环境为其\n带来了发达的脚力。会从头冠般的\n花中发出鼓舞周围伙伴的香气。"
        zh_trad:
          legends_arceus: "據考察，雪山深處的棲息環境為其\n帶來了發達的腳力。會從頭冠般的\n花中發出鼓舞周遭夥伴的香氣。"
    lilligant_lady_form:
