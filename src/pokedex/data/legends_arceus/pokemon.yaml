      descriptions:
        jp_kanji:
          legends_arceus: "ヒスイの民　赤き鼻先が　つねに　北方\n指し示すと知り　遠出しとき　大いに\n頼る。　古き　羅針盤の原理に　通ず。"
        en:
          legends_arceus: "Once the people of Hisui discovered that its red nose always\npoints north, they grew to rely on it greatly when traveling afar.\nThe nose seems to work in a similar way to ancient compasses."
        fr:
          legends_arceus: "Son nez, qui pointe toujours vers le nord, fonctionne telle\nune boussole. Depuis les temps anciens, les habitants de Hisui\nse servent de lui pour se repérer lors de leurs expéditions."
        it:
          legends_arceus: "Il naso rosso punta invariabilmente a nord, alla stregua\ndelle antiche bussole. Ben lo sa il popolo di Hisui, che\nse ne avvale durante lunghi viaggi."
        de:
          legends_arceus: "Seine rote Nase zeigt stets gen Norden und funktioniert wie ein\ntraditioneller Kompass. Als die Einwohner Hisuis dies lernten,\nbegannen sie, es als Begleiter auf weiten Reisen zu nutzen."
        es:
          legends_arceus: "Su nariz roja funciona como las brújulas tradicionales y siempre\napunta al norte. Cuando los habitantes de Hisui descubrieron\neste hecho, empezaron a emplearlos como guía en sus viajes."
        ko:
          legends_arceus: "히스이 사람들은 빨간 코끝이 항상 북쪽을\n가리킨다는 것을 알고 멀리 나갈 때 크게 의지한다.\n과거의 나침반의 원리와 상통한다."
        zh_simp:
          legends_arceus: "洗翠的居民发现朝北鼻的红色鼻子总是\n指向北方，故在远行时十分依靠它。\n这与古时罗盘的原理相同。"
        zh_trad:
          legends_arceus: "洗翠的居民發現朝北鼻的紅色鼻子總是\n指向北方，故在遠行時大大依靠牠。\n這與古時羅盤的原理相同。"
