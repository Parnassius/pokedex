        jp_kanji:
          legends_arceus: "大岩　連なり　大蛇の如き風貌なり。\n地響き　立て　地中深く　埋もれ\n岩　喰らいながら　隧道　掘り進む。"
        en:
          legends_arceus: "This chain of immense stones resembles a giant serpent. Tremors\nshake the earth above as it burrows deep beneath the ground,\nfeeding on boulders as it goes."
        fr:
          legends_arceus: "Sa silhouette ressemble à celle d’un serpent massif fait de rocs.\nIl se creuse un chemin dans les profondeurs en ingérant la roche,\net génère des secousses sismiques sur son passage."
        it:
          legends_arceus: "Ha l’aspetto d’una serpe bislunga composta di macigni.\nS’immerge nelle profondità e, divorando la roccia, scava\ncunicoli e cagiona sismi."
        de:
          legends_arceus: "Sein Körper aus aufgereihten Felsbrocken ähnelt einer\nRiesenschlange. Felsen verschlingend gräbt es Tunnel ins\nErdreich und lässt den Boden ringsumher erbeben."
        es:
          legends_arceus: "Tiene el aspecto de una gran serpiente formada por rocas\nencadenadas. Provoca temblores al cavar túneles a gran\nprofundidad y engulle las rocas que encuentra a su paso."
        ko:
          legends_arceus: "커다란 바위가 이어진 구렁이 같은 풍채.\n지축을 흔들며 땅속 깊이 파고들어\n바위를 먹으며 굴을 뚫고 나아간다."
        zh_simp:
          legends_arceus: "巨石连缀而成的身姿宛如大蛇。\n会引发天摇地动潜入地下深处，\n吞噬岩石形成隧道供自己前进。"
        zh_trad:
          legends_arceus: "巨石連綴而成的身姿宛如大蛇。\n會引發天搖地動潛入地下深處，\n吞噬岩石形成隧道供自己前進。"
