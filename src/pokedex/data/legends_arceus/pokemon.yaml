          legends_arceus: "La sua cute arenosa è considerevolmente rigida, quanto basta\na respingere senza pena colpi analoghi alle beccate degli Starly."
        de:
          legends_arceus: "Seine sandige Haut ist so hart, dass etwaige Schnabelangriffe\nvon Staralili mühelos an ihr abprallen."
        es:
          legends_arceus: "Su piel arenosa es lo bastante dura como para resistir y repeler\nsin problema alguno los picotazos de un Starly."
        ko:
          legends_arceus: "모래와 진흙으로 된 피부는\n그에 걸맞게 단단하여\n찌르꼬의 부리 정도는 손쉽게 튕겨 낸다."
        zh_simp:
          legends_arceus: "泥沙形成的皮肤有相当的硬度。\n若是姆克儿的嘴喙程度的攻击，\n轻而易举就可以反弹回去。"
        zh_trad:
          legends_arceus: "泥沙形成的皮膚相對地比較堅硬。\n若是姆克兒的嘴喙程度的攻擊，\n輕而易舉就可以反彈回去。"
    wormadam_trash_cloak:
