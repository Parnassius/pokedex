          legends_arceus: "水を　口より　噴射する技は　同じだが\n姿　あまりにも　違うゆえに　長き間\nテッポウオの進化と　信じられず。"
        en:
          legends_arceus: "While Octillery still shoots water from its mouth, the drastic\nanatomical difference between it and Remoraid meant that for\na long time, no one believed the former evolved from the latter."
        fr:
          legends_arceus: "Bien qu’ils aient la même capacité à cracher de l’eau, je n’ai\nréalisé que tardivement que ce Pokémon est l’évolution\nde Rémoraid, tant ils sont dissemblables."
        it:
          legends_arceus: "Può eiettare acqua al pari di un Remoraid, ma a causa\ndelle sembianze assai difformi si è per lungo tempo escluso\nche fosse il risultato della sua evoluzione."
        de:
          legends_arceus: "Octillery schießt zwar ebenso Wasser aus seinem Maul, doch da\nes so anders aussieht, glaubte man lange nicht, dass es sich bei\nihm um die Entwicklung von Remoraid handelt."
        es:
          legends_arceus: "Dispara agua por la boca de manera similar a Remoraid, pero\nsu aspecto es tan diferente que durante mucho tiempo nadie\ncreía que fuera su evolución."
        ko:
          legends_arceus: "물을 입에서 분사하는 기술은 똑같지만\n모습이 너무나도 달라서 오랫동안\n총어가 진화한 것이라고 믿어지지 않았다."
        zh_simp:
          legends_arceus: "虽然同样能从口中喷射水流，但由于\n外貌实在天差地远，长久以来人们\n一直不相信它是由铁炮鱼进化而来。"
        zh_trad:
          legends_arceus: "雖然同樣能從口中噴射水流，但由於\n外貌實在天差地遠，長久以來人們\n一直不相信牠是由鐵炮魚進化而來。"
