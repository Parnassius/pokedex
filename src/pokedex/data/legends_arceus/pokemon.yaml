        en:
          legends_arceus: "Three Magnemite gathered to evolve into this Pokémon.\nThe source of much vexation on my part, as its powerful\nmagnetism destroys my research equipment."
        fr:
          legends_arceus: "Cette évolution résulte du couplage de trois Magnéti. Et je n’en\nsais pas plus, car la puissante force magnétique que ce Pokémon\német endommage mon matériel de recherche. C’est pénible..."
        it:
          legends_arceus: "Evolutosi dall’unione di tre Magnemite, irradia un’intensa\nenergia magnetica che cagiona avaria nei macchinari di ricerca,\nrisultando così molesto."
        de:
          legends_arceus: "Es entstand durch den Zusammenschluss dreier Magnetilo\nund erzeugt ein starkes Magnetfeld, dem ärgerlicherweise\nForschungsgeräte zum Opfer fallen."
        es:
          legends_arceus: "Son tres Magnemite que evolucionaron al unirse. Su fuerte\nmagnetismo puede causar averías en el equipo de investigación,\nlo que es un engorro."
        ko:
          legends_arceus: "세 마리의 코일이 모여 진화한 모습.\n발산하는 강력한 자력으로\n연구 장비를 고장 내기 때문에 성가시다."
        zh_simp:
          legends_arceus: "由三只小磁怪聚集起来进化而成。\n由于会发出强大的磁力，研究它时\n总是碰上机器被破坏的问题。"
        zh_trad:
          legends_arceus: "由三隻小磁怪聚集起來進化而成。\n由於會發出強大的磁力，研究牠時\n總是碰上機器被破壞的問題。"
