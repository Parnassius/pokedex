        en:
          legends_arceus: "Fiery mane aglow, Rapidash darts like an arrow across the land.\nThis prodigiously swift creature can traverse the vast region of\nHisui in a day and a half."
        fr:
          legends_arceus: "Sa crinière flamboyante étincelle lorsqu’il galope telle\nune flèche. Sa vitesse prodigieuse lui permet de traverser\nla vaste région de Hisui en un jour et demi."
        it:
          legends_arceus: "L’ardente crine riluce quando questo prodigioso destriero\ngaloppa fulmineo come un dardo. Può percorrere la vasta Hisui\nin un dì e mezzo."
        de:
          legends_arceus: "Seine Feuermähne leuchtet hell, wenn es flink wie ein Pfeil\ngaloppiert. Dank seiner enormen Geschwindigkeit vermag es\ndie weite Hisui-Region in anderthalb Tagen zu durchqueren."
        es:
          legends_arceus: "El brillo de su crin ardiente hace que parezca una flecha\nal galopar. Puede atravesar Hisui en un día y medio gracias\na su velocidad prodigiosa."
        ko:
          legends_arceus: "불타는 갈기를 빛내며 달리는 모습은 쏜살같다.\n드넓은 히스이 땅을 하루 반 만에\n횡단하는 경이로운 속도를 자랑한다."
        zh_simp:
          legends_arceus: "闪耀着火焰鬃毛向前奔驰的模样如同\n离弦的飞箭般迅疾。神骏无比的它只需\n一天半的功夫就能横越整个洗翠大地。"
        zh_trad:
          legends_arceus: "閃耀著火焰鬃毛向前奔馳的模樣如同\n離弦的飛箭般迅疾。神駿無比的牠只需\n一天半的功夫就能橫越整個洗翠大地。"
