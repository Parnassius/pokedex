        jp_kanji:
          legends_arceus: "白髪　振り乱し姿　死神の如く。\n我が身をも　切り裂く　激しき怨讐にて\n仇　襲い　道連れ覚悟で　仕留めたり。"
        en:
          legends_arceus: "With its disheveled white fur, it looks like an embodiment of\ndeath. Heedless of its own safety, Zoroark attacks its nemeses\nwith a bitter energy so intense, it lacerates Zoroark’s own body."
        fr:
          legends_arceus: "Sa crinière blanche échevelée lui donne l’allure d’un dieu de\nla mort. Le ressentiment qu’il éprouve le déchire physiquement,\nmais lui donne une énergie telle qu’elle peut occire tout ennemi."
        it:
          legends_arceus: "Il vello candido e scarmigliato lo fa somigliare a una divinità\nmortifera. Il profondo astio ne dilania le membra, portandolo\nad abbattersi sull’inimico pronto a condividerne l’amara sorte."
        de:
          legends_arceus: "Durch die zerzauste weiße Mähne gleicht es Gevatter Tod.\nGetrieben von bitterem Groll, von dem es selbst zerfressen wird,\nstreckt es Feinde ohne Rücksicht auf das eigene Leben nieder."
        es:
          legends_arceus: "La revuelta melena blanca le hace parecer la personificación\nde la muerte. Abate a sus rivales sin consideración por su vida\nvaliéndose de un profundo rencor que también daña su cuerpo."
        ko:
          legends_arceus: "백발을 흐트러트린 모습은 마치 사신 같다.\n자신의 몸이 찢어질 정도의 강한 원한을 이용해\n함께 죽을 각오로 원수의 숨통을 노린다."
        zh_simp:
          legends_arceus: "疯狂舞动白发的姿态如同死神。\n在足以撕裂自身的深刻仇怨驱使下，\n抱定同归于尽之心袭杀仇敌。"
        zh_trad:
          legends_arceus: "瘋狂舞動白髮的姿態如同死神。\n在足以撕裂己身的深刻仇怨驅使下，\n抱定同歸於盡之心襲殺仇敵。"
