      descriptions:
        jp_kanji:
          legends_arceus: "雪深き山に　群れを成して　生息す。\n寒冷地に　適応し　姿変えしと　推測。\n凍てつく　吐息で　身を　護る。"
        en:
          legends_arceus: "These Pokémon live in packs in the snowy mountains and defend\nthemselves with icy breath. I suspect this species changed its\nform to adapt to the frigid climate."
        fr:
          legends_arceus: "Ces Pokémon vivent en groupe dans les montagnes enneigées\net utilisent leur souffle glacé pour se protéger. Je pense\nqu’ils ont adopté cette forme pour s’adapter au climat froid."
        it:
          legends_arceus: "Vive in branco sui monti innevati. Ritengo sia mutato\nnell’aspetto per adattarsi al gelo. Si difende con gelidi\nafflati."
        de:
          legends_arceus: "Es lebt in Rudeln auf schneebedeckten Bergen und setzt zur\nVerteidigung seinen eiskalten Atem ein. Vermutlich änderte sich\nseine Gestalt als Anpassung an das frostige Klima."
        es:
          legends_arceus: "Vive en manada en montañas nevadas. Puede que su forma haya\ncambiado para adaptarse al clima. Se defiende exhalando\nun gélido aliento."
        ko:
          legends_arceus: "눈 덮인 산에 무리를 지어 서식한다.\n한랭 지대에 적응하여 모습을 바꾼 것으로 추측된다.\n얼어붙는 숨결로 몸을 지킨다."
        zh_simp:
          legends_arceus: "成群栖息在积雪深厚的山中，可以推测\n其姿态的变化是为了适应寒冷的气候。\n会吐出冰冻的气息来保护自己。"
        zh_trad:
          legends_arceus: "成群棲息在積雪深厚的山中，可以推測\n其姿態的變化是為了適應寒冷的氣候。\n會吐出冰凍的氣息來保護自己。"
