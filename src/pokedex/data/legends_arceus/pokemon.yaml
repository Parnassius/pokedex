        special_attack: 2
        special_defense: 0
        speed: 0
      types:
        - grass
      descriptions:
        jp_kanji:
          legends_arceus: "稀に　震える程度にて　ほぼ動かず。\n閉じた　花弁から　漏れる　香気に\n引き寄せられ　多様なポケモン　集う。"
        en:
          legends_arceus: "Motionless, save for the occasional quiver. A rich array of\nPokémon can be found gathered around it, drawn by the\nscent exuded from Cherrim’s folded petals."
        fr:
          legends_arceus: "Mis à part quelques rares tremblements, il ne se meut guère.\nLe parfum qu’exhalent ses pétales refermés attire une grande\nvariété de Pokémon."
        it:
          legends_arceus: "Eccetto pochi flebili tremori, giammai si muove.\nLa fragranza che trapela dai suoi petali chiusi attira\ncopiosi Pokémon d’ogni sorta."
        de:
          legends_arceus: "Bis auf ein gelegentliches Zittern erscheint es völlig regungslos.\nDer Duft, den seine Blütenblätter verströmen, lockt eine Vielfalt\nvon Pokémon an."
        es:
          legends_arceus: "Apenas se mueve, salvo algún que otro temblor. El aroma que\nemana de su capota parece atraer a una gran variedad de\nPokémon."
        ko:
          legends_arceus: "가끔 몸을 떨기만 할 뿐 거의 미동도 안 한다.\n닫힌 꽃잎에서 새어 나오는 향기에 이끌려서\n다양한 포켓몬들이 모인다."
        zh_simp:
          legends_arceus: "除了偶尔颤动之外几乎动也不动。\n从紧闭的花瓣中泄漏而出的香气\n会吸引多种宝可梦聚集而来。"
        zh_trad:
          legends_arceus: "除了偶爾顫動之外幾乎動也不動。\n從緊閉的花瓣中洩漏而出的香氣\n會吸引多種寶可夢聚集而來。"
    cherrim_sunshine_form:
      form_id: 1
      names:
        jp_kanji: ポジフォルム
        en: Sunshine Form
        fr: Temps Ensoleillé
        it: Forma Splendore
        de: Sonnenform
        es: Forma Soleado
        ko: 포지폼
        zh_simp: 晴天形态
        zh_trad: 晴天形態
