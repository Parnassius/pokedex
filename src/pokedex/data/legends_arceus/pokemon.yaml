        jp_kanji:
          legends_arceus: "振る舞い　パントマイムが如く。\n道化師　思い起こす　姿にて　指先より\n発す　気力　用いて　透明な壁を作る。"
        en:
          legends_arceus: "The behavior of this clown-like Pokémon reminds one of\npantomime. It creates invisible walls using a force emitted\nfrom its fingertips."
        fr:
          legends_arceus: "Ce Pokémon, dont l’apparence évoque celle d’un saltimbanque,\nse meut tel un pantomime. Il peut créer des murs invisibles\ngrâce à l’énergie émanant de l’extrémité de ses doigts."
        it:
          legends_arceus: "Ha il sembiante di un pagliaccio e le movenze di un pantomimo.\nMaterializza muri invisibili con l’uso di energia emessa\ndai polpastrelli."
        de:
          legends_arceus: "Sein Äußeres erinnert an einen Gaukler und sein Verhalten an\neinen Pantomimen. Mit der Kraft, die aus seinen Fingerspitzen\nströmt, kann es unsichtbare Wände erzeugen."
        es:
          legends_arceus: "Su aspecto recuerda al de un payaso, y su comportamiento al\nde un mimo. De la punta de sus dedos emana una energía\ncon la que crea muros invisibles."
        ko:
          legends_arceus: "무언극을 하듯이 행동한다.\n어릿광대를 연상시키는 모습으로 손끝에서\n나오는 기력으로 투명한 벽을 만든다."
        zh_simp:
          legends_arceus: "行为举止如同默剧表演，外貌\n则与小丑无异。能从指尖发出\n气场，造出透明的墙壁。"
        zh_trad:
          legends_arceus: "行為舉止如同默劇表演，外貌\n則與小丑無異。能從指尖發出\n氣場，造出透明的牆壁。"
