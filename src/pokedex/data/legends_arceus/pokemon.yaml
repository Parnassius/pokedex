          legends_arceus: "大洋　回遊し　ごく稀に　ヒスイの近海\n訪れると　噂あり。　フィオネに　似た\n姿なれど　違い多く　関係　分からず。"
        en:
          legends_arceus: "Rumored to migrate across the oceans and visit Hisui’s coastal\nwaters only rarely. Although Manaphy resembles Phione, it is\nalso quite different. The relation between the two is unclear."
        fr:
          legends_arceus: "On dit qu’il parcourt les océans et visite les côtes de Hisui en de\nrares occasions. Il ressemble à Phione, mais ces deux Pokémon\nsont en réalité bien différents. Le lien les unissant m’est inconnu."
        it:
          legends_arceus: "Si dice che migri stagionalmente verso l’oceano e di rado\napprodi a Hisui. Rassomiglia a Phione ma al contempo\nne diverge alquanto, e ignoro il nesso fra i due."
        de:
          legends_arceus: "Es heißt, es ziehe über Ozeane und zeige sich nur selten an den\nKüsten Hisuis. Äußerlich ähnelt es zwar Phione, aber gleichzeitig\nist es ganz anders. Ob es eine Verbindung zwischen ihnen gibt?"
        es:
          legends_arceus: "Se rumorea que migra de un océano a otro y que, en raras\nocasiones, visita las aguas de Hisui. Guarda un parecido físico\ncon Phione, mas desconocemos si hay relación entre ellos."
        ko:
          legends_arceus: "대양을 떠돌다 매우 드물게 히스이 근해를\n찾아온다는 소문이 있다. 피오네를 닮았으나\n차이점이 많고, 정확한 관계가 밝혀지지 않았다."
        zh_simp:
          legends_arceus: "洄游在大洋中，有传闻说它在极少数情况下\n会来到洗翠近海。外形与霏欧纳相似，\n但有许多不同之处，两者之间关系不明。"
        zh_trad:
          legends_arceus: "迴游在大洋中，有傳聞說牠在極少數情況下\n會來到洗翠近海。外型與霏歐納相似，\n但有許多不同之處，兩者之間關係不明。"
