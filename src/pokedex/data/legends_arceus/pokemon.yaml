        en:
          legends_arceus: "Its chick-like looks belie its hotheadedness. It challenges its\nparents at every opportunity, desperate to prove its strength."
        fr:
          legends_arceus: "Même s’il a l’apparence d’un frêle oisillon, il est fort impétueux.\nAvide de prouver sa force, il affronte ses parents à la moindre\noccasion."
        it:
          legends_arceus: "Malgrado sia un volatile minuto, è assai irruente. Al minimo\nscrezio scatena un alterco con i genitori, impaziente\ndi mostrare la sua forza."
        de:
          legends_arceus: "Obwohl sein Aussehen dem eines Kükens gleicht, ist es sehr\nheißblütig und nutzt jede Gelegenheit zum Kräftemessen mit\nden Eltern, um seine Stärke unter Beweis zu stellen."
        es:
          legends_arceus: "Aun siendo un polluelo, es muy impulsivo. Aprovecha cualquier\nocasión para enzarzarse con sus progenitores y poner a prueba\nsu fuerza."
        ko:
          legends_arceus: "새끼의 모습을 하고 있지만 혈기 왕성하다.\n틈만 나면 부모에게 싸움을 걸고는\n자신의 힘을 보여 주려고 기를 쓴다."
        zh_simp:
          legends_arceus: "虽然还是雏鸟，但性情暴躁易怒。\n经常借故向亲鸟挑起斗争，\n为展示自己的力量而奋力搏击。"
        zh_trad:
          legends_arceus: "雖然還是雛鳥，但性情暴躁易怒。\n經常藉故向親鳥挑起鬥爭，\n為展示自己的力量而奮力搏擊。"
