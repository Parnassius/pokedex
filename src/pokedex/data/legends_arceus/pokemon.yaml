        en:
          legends_arceus: "Landorus soars through the sky in this form, bestowing plentiful\nharvests upon the land and earning the people’s reverence.\nIt can traverse the whole of Hisui in a mere couple of hours."
        fr:
          legends_arceus: "Le peuple vénère ce Pokémon, car il assure la fertilité des terres\nqu’il survole sous sa Forme Totémique. Il peut traverser toute\nla région de Hisui en seulement quelques heures."
        it:
          legends_arceus: "Solca da nord a sud i cieli di Hisui in un paio d’ore. Le genti\nvenerano l’aspetto totemico con il quale s’innalza nell’aere\ne dona messi rigogliose."
        de:
          legends_arceus: "Die Menschen verehren es, da es das Land mit Fruchtbarkeit\nsegnet, während es in seiner Tiergeistform durch die Lüfte\ngleitet. Es vermag ganz Hisui in zwei Stunden zu durchqueren."
        es:
          legends_arceus: "La gente venera su Forma Tótem, con la que brinda abundantes\ncosechas al surcar el cielo. Puede cruzar todo Hisui en un par de\nhoras."
        ko:
          legends_arceus: "영물의 모습으로 날아다닐 때\n대지에 풍요를 가져다주고 사람들은 이를 숭배한다.\n순식간에 히스이 땅을 종단할 수 있다."
        zh_simp:
          legends_arceus: "以灵兽之姿翱翔天际时，会为大地\n带来丰收，因而受到众人崇敬。\n只需一刻光阴便能纵断洗翠大地。"
        zh_trad:
          legends_arceus: "以靈獸之姿翱翔天際時，會為大地\n帶來豐收，因而受到眾人崇敬。\n只需一刻光陰便能縱斷洗翠大地。"
