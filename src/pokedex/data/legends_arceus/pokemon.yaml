          legends_arceus: "帯電せし　爪が　自慢の得物。\n狩りの成果を　仲間と　等しく\n分かち合う　仁心を　有す。"
        en:
          legends_arceus: "Proudly uses its electrified claws as weapons. It seems to be a\ngracious Pokémon, evenly sharing the spoils of the hunt with\nothers of its kind."
        fr:
          legends_arceus: "Ce Pokémon semble très généreux et n’hésite pas à partager\nle fruit de sa chasse avec ses compagnons. Ses redoutables\ngriffes électrifiées sont sa grande fierté."
        it:
          legends_arceus: "Gli artigli elettrificati sono la sua fiera arma. Di cuore prodigo,\ncondivide equamente con i suoi simili i frutti della caccia."
        de:
          legends_arceus: "Stolz setzt es seine elektrisierten Krallen als Waffe ein.\nDie Beute seiner erfolgreichen Jagden teilt es großzügig\nmit seinen Artgenossen."
        es:
          legends_arceus: "Sus garras electrizantes son su arma más letal. Parece generoso,\npues no duda en compartir los frutos de su caza con sus\nsemejantes."
        ko:
          legends_arceus: "전기를 띠는 발톱이 주 무기다.\n사냥의 성과를 동료들과 똑같이 나눠 갖는\n어진 마음을 가졌다."
        zh_simp:
          legends_arceus: "带电的爪子是它引以为傲的武器。\n拥有一颗仁义之心，会将狩猎\n所得的成果分享给自己的伙伴。"
        zh_trad:
          legends_arceus: "帶電的爪子是牠引以為傲的武器。\n擁有一顆仁義之心，會將狩獵\n所得的成果分享給自己的夥伴。"
