        en:
          legends_arceus: "This Pokémon evolved through use of a curious item. Its rocklike\nhide is composed of a mysterious substance and can withstand a\nblow from a masterwork sword with nary a scratch."
        fr:
          legends_arceus: "Un étrange objet a provoqué l’évolution de ce Pokémon.\nSon épiderme est fait d’une matière inconnue semblable à de la\nroche, si dure que même un sabre de renom ne saurait l’entamer."
        it:
          legends_arceus: "Si è evoluto per mezzo di un singolare strumento. La cute\nsimile a pietra è composta da materiali ignoti, inscalfibili\npersino dalle lame più pregiate."
        de:
          legends_arceus: "Es entwickelte sich mithilfe eines seltsamen Gegenstands.\nSeine steinartige Haut besteht aus einer unbekannten Substanz,\nder nicht einmal das schärfste Schwert etwas anhaben kann."
        es:
          legends_arceus: "Un extraño objeto provocó esta evolución. Su piel, de aspecto\nrocoso y material desconocido, es tan dura que ni una espada\nde renombre es capaz de rasguñarla."
        ko:
          legends_arceus: "기묘한 도구에 의해 진화한 모습.\n암석 같은 피부는 명검의 일격에도\n흠집 나지 않을 정도로 단단한 미지의 물질로 되어 있다."
        zh_simp:
          legends_arceus: "凭借奇异的道具进化而成。质地类似\n岩石的皮肤是由未知的物质构成，\n硬度之高即便是名刀也无法伤其分毫。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具進化而成。質地類似\n岩石的皮膚是由未知的物質構成，\n硬度之高即便是名刀也無法傷其分毫。"
