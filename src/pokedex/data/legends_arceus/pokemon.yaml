        jp_kanji:
          legends_arceus: "短刀の如き　腕で　音を　発す。\nメロディは　個体に　よりけりゆえ\n好みを　探すも　乙なり。"
        en:
          legends_arceus: "It uses its cutlass-like arms to produce sound, the melody of\nwhich varies from individual to individual. It is a worthwhile\nendeavor to seek out one’s favorite tunes."
        fr:
          legends_arceus: "Il émet des sons grâce à ses bras, semblables à des dagues.\nLa mélodie varie d’un spécimen à l’autre, et il n’y a rien\nde plus sympathique que d’en chercher une à son goût."
        it:
          legends_arceus: "Emette suoni con gli arti simili a sciabole. Ciascun esemplare\nproduce una melodia peculiare ed è un sollazzo cercare\nquella che più aggrada."
        de:
          legends_arceus: "Es erzeugt Töne mithilfe seiner dolchartigen Arme. Die daraus\nentstehende Melodie fällt bei jedem Exemplar anders aus,\ndaher lohnt es sich, nach einer zu suchen, die einem zusagt."
        es:
          legends_arceus: "Sus brazos, afilados como cuchillas, pueden crear sonidos con\nlos que cada ejemplar produce una melodía distinta. En la\nvariedad está el gusto."
        ko:
          legends_arceus: "단검과 같은 팔로 소리를 낸다.\n멜로디가 개체에 따라 다르기에\n취향에 맞는 소리를 찾는 것도 재미있다."
        zh_simp:
          legends_arceus: "用短刀般的手臂发出声音。所奏出\n的旋律随个体不同而异，从中寻找\n自己喜爱的旋律也是一大乐事。"
        zh_trad:
          legends_arceus: "用短刀般的手臂發出聲音。所奏出\n的旋律隨個體不同而異，從中尋找\n自己喜愛的旋律也是一大樂事。"
