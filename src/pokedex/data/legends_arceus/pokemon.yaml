        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - fairy
      descriptions:
        jp_kanji:
          legends_arceus: "満月の夜　静かなる　山間にて　遭遇。\n小さき翼　ほのかに光り　舞う姿は\nまさに　妖精の如き　愛くるしさなり。"
        en:
          legends_arceus: "It can be found in quiet mountain areas on a full moon’s night.\nIts dancing and its tiny, faintly glowing wings confer upon it a\nlovely fairylike quality."
        fr:
          legends_arceus: "J’en ai croisé un dans la quiétude des montagnes, une nuit\nde pleine lune. Alors qu’il dansait telle une charmante fée,\nses ailes menues diffusaient une douce lueur."
        it:
          legends_arceus: "Lo si incontra tra le montagne placide nelle notti di plenilunio.\nDanza con le minute ali rilucenti come un aggraziato essere\nfatato."
        de:
          legends_arceus: "In Vollmondnächten kann man es in ruhigen Bergregionen\nantreffen. Das sanfte Leuchten seiner Flügelchen verleiht\nihm beim Tanzen einen feenhaften Liebreiz."
        es:
          legends_arceus: "Es posible avistarlo en montañas tranquilas durante las noches\nde luna llena. El tenue brillo que emiten sus alas le confiere el\naspecto de una adorable hada cuando baila."
        ko:
          legends_arceus: "보름달이 뜬 밤, 조용한 산속에서 만났다.\n작은 날개를 희미하게 빛내며 춤추는 모습이\n마치 요정과도 같은 귀여움을 자아낸다."
        zh_simp:
          legends_arceus: "能够在满月夜里的静谧山间遇见它。\n小小翅膀绽放着微光，那舞动的\n身姿如同妖精般惹人怜爱。"
        zh_trad:
          legends_arceus: "能夠在滿月夜裡的靜謐山間遇見牠。\n小小翅膀綻放著微光，那舞動的\n身姿如同妖精般惹人憐愛。"
