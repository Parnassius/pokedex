        en:
          legends_arceus: "A once-departed soul, returned to life in Hisui. Derives power\nfrom resentment, which rises as energy atop its head and takes\non the forms of foes. In this way, Zorua vents lingering malice."
        fr:
          legends_arceus: "Zorua serait une âme disparue, ressuscitée à Hisui. Sa rancœur\némane sous forme d’énergie au-dessus de sa tête, puis adopte\nl’apparence de ses ennemis, et finit par se dissiper."
        it:
          legends_arceus: "Uno spirito defunto, tornato a nuova vita nella terra di Hisui.\nIl suo sdegno si fa energia e promana dal capo, tramutandosi\nnell’avversario per esigere vendetta."
        de:
          legends_arceus: "Eine verstorbene Seele, die in Hisui zu neuem Leben erwachte.\nGroll verleiht ihm Kraft und quillt aus seinem Kopf, um als Ventil\nfür den eigenen Hass die Gestalt seiner Feinde anzunehmen."
        es:
          legends_arceus: "Es un alma difunta resucitada en Hisui que transforma su rencor\nen energía. Esta surge de su cabeza y adopta la forma de su\noponente, disipando así su inquina."
        ko:
          legends_arceus: "죽은 영혼이 히스이 땅에서 되살아났다.\n원한은 곧 힘이 되어 머리에 피어오르고\n상대의 모습으로 변하여 원한을 풀려 한다."
        zh_simp:
          legends_arceus: "死后灵魂在洗翠地区复苏。\n怨恨化为力量，从其头部冉冉飘升。\n会化成对手的样貌去洗刷仇恨。"
        zh_trad:
          legends_arceus: "死後靈魂在洗翠地區復甦。\n怨恨化為力量，從其頭部冉冉飄升。\n會化成對手的樣貌去洗刷仇恨。"
