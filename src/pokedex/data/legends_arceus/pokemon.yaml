      descriptions:
        jp_kanji:
          legends_arceus: "親愛なる主　守護する覚悟　見せり。\n淑女を想起する　純白のドレスこそ\n命賭す者　まといし　装束と　言えり。"
        en:
          legends_arceus: "It will dedicate itself to defending a master it has come to\nadore. Its pure white dress, reminiscent of those worn by ladies\nof nobility, is the dress of one who is willing to risk their life."
        fr:
          legends_arceus: "Ce Pokémon vêtu d’une élégante robe blanche est prêt\nà tout pour protéger sa maîtresse ou son maître adoré,\nmême à risquer sa vie."
        it:
          legends_arceus: "Dedica la vita alla protezione di chi reputa sua prediletta guida.\nLe vesti immacolate, che ricordano quelle di una nobildonna,\nsono espressione della sua pura abnegazione."
        de:
          legends_arceus: "Es verehrt seinen Meister und schützt diesen unter Einsatz seines\nLebens. Das weiße Kleid erinnert an das einer edlen Dame und\nist Ausdruck seiner Opferbereitschaft."
        es:
          legends_arceus: "No duda en proteger a su adorado maestro. Su vestido de color\nblanco puro, que recuerda al de una dama, es la vestimenta de\naquel que está dispuesto a arriesgar su vida."
        ko:
          legends_arceus: "친애하는 주인을 보호하려는 각오를 보인다.\n결의가 돋보이는 새하얀 드레스는 그야말로\n목숨을 건 자의 차림새라고 할 수 있다."
        zh_simp:
          legends_arceus: "沙奈朵那一身令人联想起窈窕淑女\n的纯白装束，可说是反映了为守护\n敬爱主人而不惜赌上性命的决心。"
        zh_trad:
          legends_arceus: "沙奈朵那一身令人聯想起窈窕淑女\n的純白裝束，可說是反映了為守護\n敬愛主人而不惜賭上性命的決心。"
nosepass:
