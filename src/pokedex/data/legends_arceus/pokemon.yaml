        jp_kanji:
          legends_arceus: "電気のエネルギーを　糧とする。\n積乱雲　近づく　夕立時には　高木に\n登りて　落雷を待つ姿　目撃す。"
        en:
          legends_arceus: "Feeds on electrical energy. During sudden showers beneath\nlooming thunderclouds, one can observe Electabuzz scaling tall\ntrees, where the Pokémon will then wait for lightning to strike."
        fr:
          legends_arceus: "Ce Pokémon se repaît d’électricité. On peut l’apercevoir\ngrimper à la cime des grands arbres à l’approche d’un orage,\nsemblant guetter la tombée de la foudre."
        it:
          legends_arceus: "Trae alimento dall’energia elettrica. Quando incombono le nubi\nal calar della sera, lo si vede arrampicato su alti alberi in attesa\ndi folgori."
        de:
          legends_arceus: "Elektrizität dient ihnen als Nahrung. Sammeln sich am Abend\nGewitterwolken, sieht man Elektek hohe Bäume emporklettern\nund dort auf Blitzeinschläge harren."
        es:
          legends_arceus: "Se alimenta de electricidad. Cuando, al ocaso, el cielo se cubre\nde nubarrones y cae un aguacero, es posible verlo subido a\nlos árboles más altos a la espera de que caigan rayos."
        ko:
          legends_arceus: "전기 에너지를 양식으로 삼는다.\n적란운과 함께 소나기가 내리는 날, 높은 나무에 올라\n벼락이 떨어지기를 기다리는 모습을 볼 수 있다."
        zh_simp:
          legends_arceus: "以电能为食。当午后乌云密布，\n大雨将临之时，能够看见它\n登上高树等待落雷的模样。"
        zh_trad:
          legends_arceus: "以電能為食。當午後烏雲密布，\n大雨將落之時，能夠看見牠\n登上高樹等待落雷的模樣。"
