        jp_kanji:
          legends_arceus: "古文書にある　龍の正体と　見たり。\n口から　吐きし　熱線にて　ことごとく\n集落を　焼き尽くすと　記されたり。"
        en:
          legends_arceus: "I suspect this Pokémon to be the true identity of a dragon\nwritten of in ancient texts, which claimed that it razed an entire\nvillage with white-hot beams from its maw."
        fr:
          legends_arceus: "Il semble s’agir du dragon décrit dans les vieux manuscrits.\nOn dit qu’il aurait réduit en cendres un hameau entier en\ntirant un trait de lumière incandescent par sa gueule."
        it:
          legends_arceus: "Potrebbe trattarsi del drago di cui si narra nei testi antichi.\nPare che possa incenerire interi villaggi con i raggi roventi\nche eietta dalle fauci."
        de:
          legends_arceus: "Womöglich handelt es sich bei Garados um die wahre Gestalt\neines Drachen aus alten Schriften. Dieser soll mit Hitzestrahlen\naus seinem Maul ganze Dörfer niedergebrannt haben."
        es:
          legends_arceus: "Se trata del dragón descrito en las leyendas antiguas. Según\ndicen, los abrasadores rayos que lanza por la boca pueden\nreducir asentamientos enteros a cenizas."
        ko:
          legends_arceus: "고문서에 나오는 용의 정체로 여겨진다.\n입에서 열선을 내뿜어서 마을을 모조리\n불태워 버렸다는 기록이 있다."
        zh_simp:
          legends_arceus: "被认为是古书所载之龙的真身。\n文献中留有它口吐灼热射线，\n将村落焚烧殆尽的纪录。"
        zh_trad:
          legends_arceus: "被認為是古書所載之龍的真身。\n文獻中留有牠口吐熱線，\n將村落焚燒殆盡的紀錄。"
