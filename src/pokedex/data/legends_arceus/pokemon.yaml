      descriptions:
        jp_kanji:
          legends_arceus: "流氷　接岸し季節は　天敵　少なきゆえ\n陸地より　氷上生活を　好む。　体毛は\n保温効果　高く　極寒に　強し。"
        en:
          legends_arceus: "During the season when drift ice approaches the shore, Spheal\nprefers living on the ice—where fewer predators lurk—rather\nthan the land. Its fur retains heat superbly and resists harsh cold."
        fr:
          legends_arceus: "Quand la banquise dérive et se rapproche des côtes, les Obalie\nquittent les terres et rejoignent la glace, loin des prédateurs.\nLeur fourrure retient bien la chaleur et les protège du froid."
        it:
          legends_arceus: "Nella stagione algida, allorché gli iceberg si accostano alla\nterraferma, preferisce dimorare sui ghiacci, lungi dai predatori.\nIl caldo vello ben tollera le temperature più austere."
        de:
          legends_arceus: "In der Jahreszeit, in der sich Treibeis der Küste nähert, lebt es\nbevorzugt auf dem Eis, da es dort weniger Fressfeinde hat als an\nLand. Sein Fell speichert Wärme und hält extremer Kälte stand."
        es:
          legends_arceus: "Prefiere vivir en los témpanos cercanos a la costa y no quedarse\nen tierra firme, donde hay más depredadores. Su pelaje es muy\naislante, por lo que soporta el frío extremo sin problema."
        ko:
          legends_arceus: "유빙이 해안에 닿는 계절에는 천적이 적어서\n육지보다 얼음 위 생활을 즐긴다.\n털은 보온 효과가 뛰어나서 혹한의 추위에 강하다."
        zh_simp:
          legends_arceus: "在流冰靠岸的季节里，比起陆地\n更喜欢生活在天敌较少的冰上。\n体毛的保温效果极佳，能耐严寒。"
        zh_trad:
          legends_arceus: "在流冰靠岸的季節裡，比起陸地\n更喜歡生活在天敵較少的冰上。\n體毛的保溫效果極佳，能耐酷寒。"
