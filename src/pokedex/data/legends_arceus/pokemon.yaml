        en:
          legends_arceus: "It has 80 tentacles, each with a venomous tip. These tentacles\nare also extendible, lengthening when Tentacruel attempts to\ncatch prey. Use caution."
        fr:
          legends_arceus: "Il possède 80 tentacules dont chaque extrémité contient\ndu venin. La prudence est de mise, car il peut étirer\nses appendices quand il chasse !"
        it:
          legends_arceus: "Possiede 80 tentacoli dalle estremità velenifere. Nell’irretire\nuna preda può prolungarli oltre misura, perciò è d’uopo\nessere cauti."
        de:
          legends_arceus: "Es verfügt über 80 Tentakel mit giftigen Enden, die es auf\nBeutejagd über das normale Maß hinaus dehnen kann.\nBei diesem Pokémon ist Vorsicht geboten!"
        es:
          legends_arceus: "Sus 80 tentáculos tienen veneno en la punta, y además es capaz\nde estirarlos para atrapar a sus presas. Hay que tener cuidado\ncon él."
        ko:
          legends_arceus: "80개의 촉수를 가졌다.\n끝에 독을 품고 있고 먹이를 잡을 때는\n평소보다도 늘어나므로 주의가 필요하다."
        zh_simp:
          legends_arceus: "身上触手共８０根。触手前端有毒，\n在捕捉猎物时会伸得比平时更长，\n遇见时务必得小心。"
        zh_trad:
          legends_arceus: "身上觸手共８０根。觸手前端有毒，\n在捕捉獵物時會伸得比平時更長，\n遇見時務必得小心。"
