          legends_arceus: "影に憑きて　命　狙いし　ポケモン。\n己が影　ひとりでに　笑いしときは\n一刻も早く　清めの札　握るべし。"
        en:
          legends_arceus: "Possesses potential victims’ shadows in an effort to steal away\nthe victims’ lives. If your shadow begins to laugh, you must take\nhold of a protective charm posthaste!"
        fr:
          legends_arceus: "Il hante l’ombre de ceux qu’il désire occire. Si la vôtre\ncommence à rire soudainement, saisissez-vous promptement\nd’un talisman de purification."
        it:
          legends_arceus: "Si impossessa dell’ombra delle sue vittime per carpirne la vita.\nSe la tua ombra ride solitaria d’improvviso, procurati tosto\nun talismano purificatore."
        de:
          legends_arceus: "Es ergreift Besitz vom Schatten jener, denen es nach dem Leben\ntrachtet. Wenn der eigene Schatten mal von selbst loslacht,\nsollte man schleunigst ein Schutzamulett ergreifen."
        es:
          legends_arceus: "Posee las sombras de las víctimas cuyas vidas pretende\narrebatar. Si alguien ve que su sombra se empieza a reír sola,\ndebería conseguir un amuleto purificador lo más rápido posible."
        ko:
          legends_arceus: "그림자 속에 숨어서 목숨을 노리는 포켓몬.\n자신의 그림자가 혼자서 웃고 있다면\n한시라도 빨리 부적을 쥐고 있어야 한다."
        zh_simp:
          legends_arceus: "附在影子里伺机取人性命的宝可梦。\n要是发现脚下的影子自己在笑，\n最好赶紧握住护身符来驱邪。"
        zh_trad:
          legends_arceus: "附在影子裡伺機取人性命的寶可夢。\n要是發現腳下的影子自己在笑，\n最好趕緊握住護身符來驅邪。"
