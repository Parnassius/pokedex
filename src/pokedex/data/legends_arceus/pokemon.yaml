        en:
          legends_arceus: "Hidden within the bouquet on each hand are thorned whips\nloaded with virulent poison. Roserade moves gracefully as it\ncorners its prey and mercilessly lashes them with its whips."
        fr:
          legends_arceus: "Les fleurs de ses bras cachent des fouets ornés d’épines\nimprégnées d’un venin toxique. Gracieux, mais sans pitié,\nil accule ses proies et les achève avec ses fouets."
        it:
          legends_arceus: "Cela velenifere fruste spinose nei mazzolini degli arti.\nCircuisce la preda con suadenti movenze per poi colpirla\ncon le impietose fruste."
        de:
          legends_arceus: "Die Blumensträuße an beiden Armen verfügen über hochgiftige,\ndornige Rankenpeitschen. Mit anmutigen Bewegungen treibt es\nseine Beute in die Enge und peitscht sie mitleidlos aus."
        es:
          legends_arceus: "Las flores de los brazos poseen látigos espinosos impregnados\nde un veneno letal. Acorrala a sus presas con movimientos\nelegantes y las lacera sin piedad alguna con sus látigos."
        ko:
          legends_arceus: "양팔에 달린 꽃다발에 맹독을 품은\n가시 채찍을 숨기고 있다. 화려한 몸놀림으로\n먹이를 쫓는 채찍질은 그야말로 자비가 없다."
        zh_simp:
          legends_arceus: "双手的花束中藏着淬有剧毒的荆棘鞭。\n会以华丽的身法将猎物逼入绝境，\n毫不留情地用鞭子给予制裁。"
        zh_trad:
          legends_arceus: "雙手的花束中藏著淬有劇毒的荊棘鞭。\n會以華麗的身法將獵物逼入絕境，\n毫不留情地用鞭子給予制裁。"
