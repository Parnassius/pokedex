        en:
          legends_arceus: "Flames burn within a saclike organ inside this Pokémon.\nWhen Flareon inhales, these flames grow in intensity, reaching\na mighty 3,000 degrees Fahrenheit."
        fr:
          legends_arceus: "Il possède un organe en forme de poche dans lequel brûlent\ndes flammes. Celles-ci sont attisées par l’air inspiré, et\nleur température peut atteindre 1 700 °C."
        it:
          legends_arceus: "Ha nelle viscere una sacca colma di fiamme ardenti capaci\ndi raggiungere 1.700 ºC. Il suo vigore igneo s’accresce\nall’inspirare."
        de:
          legends_arceus: "Es besitzt ein beutelförmiges Organ, in dem Flammen lodern.\nBeim Einatmen gewinnen diese an Stärke und erreichen eine\nTemperatur von bis zu 1 700  ℃."
        es:
          legends_arceus: "Tiene un órgano en forma de bolsa donde almacena llamas.\nSu poder ígneo, que puede alcanzar los 1700 °C, aumenta\ncuando inhala profundamente."
        ko:
          legends_arceus: "주머니 같은 내장 안에는 불꽃이 타고 있다.\n숨을 들이마셔서 화력을 강화할 수 있다.\n그 온도는 자그마치 1700도에 이른다."
        zh_simp:
          legends_arceus: "囊状的内脏中燃烧着火焰。\n能借吸入空气强化其火力，\n温度甚至可达１７００度之高。"
        zh_trad:
          legends_arceus: "囊狀的內臟中燃燒著火焰。\n能藉吸入空氣強化其火力，\n溫度甚至可達１７００度之高。"
