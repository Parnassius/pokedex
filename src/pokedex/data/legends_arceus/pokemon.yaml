        jp_kanji:
          legends_arceus: "強靭な　肉体と　持久力　兼ね備えし\n剛の者。　鍛錬を　何より　好み\n開墾　普請など　進んで　手伝う。"
        en:
          legends_arceus: "A sturdy creature boasting a robust physique and boundless\nstamina. Loves training above all else and voluntarily assists with\ntasks such as construction and clearing land."
        fr:
          legends_arceus: "Cet être surpuissant, robuste et endurant, adore s’entraîner.\nIl a coutume d’offrir son aide aux agriculteurs et aux bâtisseurs."
        it:
          legends_arceus: "Creatura poderosa e resistente. Predilige attività che temprino\nil corpo, perciò presta solerte aiuto in opere di edificazione\ne disboscamento."
        de:
          legends_arceus: "Dieses muskulöse Pokémon zeichnet sich durch seine Robustheit\nund seine Ausdauer aus. Um sich zu stählen, bietet es seine Hilfe\nbei Schwerstarbeit wie Rodungen und Bauarbeiten an."
        es:
          legends_arceus: "Esta robusta criatura cuenta con una fuerza y resistencia\nasombrosas. Adora tanto entrenarse que se presta a ayudar\ncon labores como la labranza y la construcción."
        ko:
          legends_arceus: "강인한 육체와 내구력을 겸비한 강자.\n단련하는 것을 무엇보다 좋아하며\n개간이나 건축 일을 자진하여 돕는다."
        zh_simp:
          legends_arceus: "兼具强健肉体与持久耐力\n的强者。热爱锻炼，会主动\n协助进行开垦、建筑等工作。"
        zh_trad:
          legends_arceus: "兼具強健肉體與持久耐力\n的強者。熱愛鍛鍊，會主動\n協助進行開墾、建築等工作。"
