        jp_kanji:
          legends_arceus: "女王たる　ポケモンに　忠節を　誓い\n一生懸命に　蜜を　収集し続ける。\n群れにより　蜜の味わい　異なる。"
        en:
          legends_arceus: "They swear fealty to a queen Pokémon and work diligently to\ngather nectar. Each swarm produces a different flavor of honey."
        fr:
          legends_arceus: "Il s’efforce de récolter continuellement du nectar pour sa reine,\nà qui il a juré fidélité. Le goût du miel produit par les Apitrini\nvarie d’une ruche à l’autre."
        it:
          legends_arceus: "Devoti alla loro sovrana, i Combee s’adoprano alacremente\nper la raccolta di nettare. Il gusto del miele da essi prodotto\ndifferisce da colonia a colonia."
        de:
          legends_arceus: "Es schwört dem Pokémon, das als seine Königin fungiert,\newige Treue und sammelt stets emsig Nektar. Je nach Kolonie\nunterscheidet sich der Honig im Geschmack."
        es:
          legends_arceus: "Recolecta néctar sin descanso para su reina, a la que jura\nlealtad. El sabor de la miel varía según la colonia que la\nproduzca."
        ko:
          legends_arceus: "여왕 포켓몬에게 충절을 맹세하고\n꿀을 수집하기를 열심히 반복한다.\n무리에 따라 꿀의 맛이 다르다."
        zh_simp:
          legends_arceus: "对身为女王的宝可梦宣誓效忠，\n时刻都在辛勤地采集花蜜。\n花蜜的风味依群体的不同而异。"
        zh_trad:
          legends_arceus: "對身為女王的寶可夢宣誓效忠，\n時時刻刻都在辛勤地採集花蜜。\n花蜜的風味依群體的不同而異。"
