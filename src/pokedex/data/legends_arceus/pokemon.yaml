      descriptions:
        jp_kanji:
          legends_arceus: "腹中で　燃えし炎　火球として　吐く。\n幼き頃は　白い尾　１本のみ　なれど\n育つにつれ　先分かれ　６本となる。"
        en:
          legends_arceus: "In its belly burns a fire, which Vulpix spits out in the form of\nfireballs. When young, this Pokémon has but one white tail.\nAs the Pokémon matures, this single tail splits into six."
        fr:
          legends_arceus: "Il puise dans les flammes de ses entrailles pour cracher des\nboules de feu. Sa queue, d’un blanc laiteux à la naissance,\nse scinde jusqu’au nombre de six à mesure qu’il grandit."
        it:
          legends_arceus: "Getta sfere infuocate dalle viscere. In tenera età possiede\nuna sola coda, bianca di colore, che crescendo si scinde in sei."
        de:
          legends_arceus: "Es nutzt die Flamme, die in seinem Inneren lodert, um Feuerbälle\nzu speien. Zu Beginn hat es nur einen einzelnen weißen Schweif,\nder sich aber beim Heranwachsen in sechs Exemplare aufspaltet."
        es:
          legends_arceus: "Expulsa las llamas de su interior en forma de bolas de fuego.\nLa cola blanca que tiene de pequeño se divide en seis puntas\na medida que crece."
        ko:
          legends_arceus: "배 속의 불꽃을 불덩이로 만들어 토해 낸다.\n어릴 때는 흰 꼬리 하나뿐이지만\n성장하면서 끝이 갈라져 6개가 된다."
        zh_simp:
          legends_arceus: "能将腹中火焰化成火球喷吐而出。\n在幼龄时期只有一根的白尾，\n会随着年龄增长分叉为六根。"
        zh_trad:
          legends_arceus: "能將腹中火焰化成火球噴吐而出。\n在幼齡時期只有一根的白尾，\n會隨著年齡增長分叉為六根。"
