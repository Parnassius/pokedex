        en:
          legends_arceus: "Bristles its fur into sharp, needlelike points when enraged.\nOne can hear electricity crackle in its breath when it exhales."
        fr:
          legends_arceus: "Lorsqu’il est courroucé, ses poils se dressent et deviennent aussi\npiquants que des aiguilles. On peut entendre des crépitements\nélectriques dans son souffle chaque fois qu’il expire."
        it:
          legends_arceus: "Quando è adirato, rizza il vello a guisa di aghi acuminati.\nNel respirare, emette crepitii di scariche elettriche."
        de:
          legends_arceus: "Erzürnt es, sträubt sich sein Fell, sodass die Haare spitz wie\nNadeln werden. Wenn es ausatmet, kann man das Knistern\nelektrischer Spannung hören."
        es:
          legends_arceus: "Cuando se enfada, el pelaje se le eriza a modo de agujas\npuntiagudas. Es posible oír el crepitar de la electricidad latente\nen su respiración."
        ko:
          legends_arceus: "분노하여 곤두선 털은 뾰족한 바늘 같다.\n숨을 내뱉는 동시에\n파직 파직 전기가 튀는 듯한 소리가 들린다."
        zh_simp:
          legends_arceus: "发怒时体毛会像锐利的针般\n倒竖。气息吞吐之间可以听见\n啪啪作响的电流声。"
        zh_trad:
          legends_arceus: "發怒時體毛會像銳利的針般\n倒豎。氣息吞吐之間可以聽見\n啪啪作響的電流聲。"
