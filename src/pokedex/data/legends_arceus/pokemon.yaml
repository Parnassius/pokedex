        - normal
      descriptions:
        jp_kanji:
          legends_arceus: "耳を　丸める　理由は　所説あり。\n聴力　高すぎるゆえ　耳に　入る　音量\nセーブし　聴覚　守ると　推察す。"
        en:
          legends_arceus: "My hypothesis as to why Buneary rolls up its ears is that its\nhearing is far too keen. I surmise that the Pokémon protects its\nhearing by limiting the sound that may enter its ears."
        fr:
          legends_arceus: "J’ai une théorie permettant d’expliquer pourquoi il replie\nses oreilles : son ouïe est très développée et il cherche à\nse protéger du bruit ambiant en régulant ainsi le volume."
        it:
          legends_arceus: "Posseggo una teoria sulla causa delle orecchie involute:\nsuppongo siano atte a proteggere l’eccellente udito\nda suoni molesti."
        de:
          legends_arceus: "Meiner eigenen Hypothese zufolge rollt Haspiror seine Ohren\nein, um die Lautstärke von eindringenden Geräuschen zu\ndämpfen und so sein äußerst empfindliches Gehör zu schützen."
        es:
          legends_arceus: "Tengo una teoría acerca de su tendencia a enrollar las orejas:\ndada su alta capacidad auditiva, presumo que protege sus oídos\nlimitando el sonido que entra en ellos."
        ko:
          legends_arceus: "귀를 말고 있는 이유에는 여러 설이 있다.\n청력이 너무 좋은 탓에 귀에 들어오는 소리를\n줄여서 청력을 보호하려는 것으로 추측된다."
        zh_simp:
          legends_arceus: "关于它卷起耳朵的原因有着多种说法。\n本人推测是由于其听力过于敏锐，\n因而需要减少入耳的音量以保护听觉。"
        zh_trad:
          legends_arceus: "關於牠捲起耳朵的原因有著多種說法。\n吾人推測是由於其聽力過於敏銳，\n因而需要減少入耳的音量以保護聽覺。"
