        jp_kanji:
          legends_arceus: "鋼に勝る　硬き氷の鎧　身にまとう。\n吐く息にて　獲物を　冷凍し　これを\n氷菓の如く　胃袋に　収めたり。"
        en:
          legends_arceus: "It covers its body with an armor of ice harder than steel. Uses its\nbreath to freeze prey, which it then devours as if they were\nfrozen desserts."
        fr:
          legends_arceus: "Oniglali est recouvert d’une armure de glace plus résistante\nque l’acier. Il gèle ses proies avec son souffle, puis les engloutit\ncomme s’il s’agissait d’un sorbet."
        it:
          legends_arceus: "Avvolge le membra in un’armatura di ghiaccio, dura più\ndell’acciaio. Con il fiato raggela la preda e la stipa\nnello stomaco a mo’ di sorbetto."
        de:
          legends_arceus: "Die Eisrüstung, die seinen Körper bedeckt, ist härter als Stahl.\nMit seinem Atem friert es Beute ein und verschlingt diese dann\nwie Speiseeis."
        es:
          legends_arceus: "Lo protege una armadura de hielo más dura que el acero.\nCongela a su presa con el aire que exhala y la devora, como si\nde un postre helado se tratara."
        ko:
          legends_arceus: "강철보다 단단한 얼음 갑옷을 두르고 있다.\n숨결로 먹이를 얼린 다음\n이것을 얼음과자처럼 배 속에 집어넣는다."
        zh_simp:
          legends_arceus: "身着硬度更胜钢铁的冰甲。\n会吐出气息冰冻猎物，然后\n像吃冰般地把猎物吞进胃里。"
        zh_trad:
          legends_arceus: "身著硬度更勝鋼鐵的冰甲。\n會吐出氣息冰凍獵物，然後\n像吃冰般地把獵物吞進胃裡。"
spheal:
