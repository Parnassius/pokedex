      descriptions:
        jp_kanji:
          legends_arceus: "初雪の頃　姿　見せり。　訪れし家は\n代々　栄えると信ず。　清水より作りし\n氷塊を　戸口に供える　習わし　あり。"
        en:
          legends_arceus: "Arrives alongside the first snow. It’s thought that homes Snorunt\nvisit will prosper for many generations. By tradition, one might\noffer a lump of ice made from pure water at one’s front door."
        fr:
          legends_arceus: "Ce Pokémon se montre aux premières neiges, et l’on dit que\nsa visite apporte la prospérité. Il est coutume de laisser des\nglaçons d’eau pure en guise d’offrande sur le pas de sa porte."
        it:
          legends_arceus: "Si palesa con le prime nevi. Si crede che apporti durevole\nprosperità alle case ove si manifesta. È d’uso offrirgli ghiaccio\nd’acqua pura sull’uscio."
        de:
          legends_arceus: "Es zeigt sich mit dem ersten Schnee. Sein Besuch soll dem Heim\nfür Generationen Glück bringen. Nach alter Sitte legt man für es\nein Stück Eis aus klarem Wasser vor die eigene Haustür."
        es:
          legends_arceus: "Aparece con las primeras nieves. Dicen que las casas que visita\nprosperan durante generaciones, por lo que existe la tradición\nde dejar hielo del agua más pura en la puerta como ofrenda."
        ko:
          legends_arceus: "첫눈이 내릴 때쯤 나타난다.\n방문한 집은 대대로 번창한다고 여겨지기 때문에\n맑은 물을 얼린 얼음덩이를 대문에 두는 관습이 있다."
        zh_simp:
          legends_arceus: "在刚开始降雪的时节现身。人们相信\n雪童子造访的家将会代代繁荣，因此\n有着将清水制成冰块供奉在门口的习俗。"
        zh_trad:
          legends_arceus: "在初開始降雪的時節現身。人們相信\n雪童子造訪的家將會代代繁榮，因而\n有著將清水製成冰塊供奉在門口的習俗。"
