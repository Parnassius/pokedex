        en:
          legends_arceus: "Radiant light caused Dialga to take on a form bearing a striking\nresemblance to the creator Pokémon. Dialga now wields such\ncolossal strength that one must conclude this is its true form."
        fr:
          legends_arceus: "La lumière lui a donné cette forme semblable à celle du créateur\nde toutes choses. La force qu’il déploie est telle que je ne peux\nm’empêcher de penser qu’il est sous sa forme véritable."
        it:
          legends_arceus: "La luce ha cagionato in lui un cambio di forma radicale,\nrendendolo un simulacro della divinità creatrice sì potente\nche fatico a non ritenere questa la sua forma veritiera."
        de:
          legends_arceus: "Licht lässt es eine Form annehmen, die der Schöpfergottheit\nzu gleichen scheint. Die gewaltige Stärke nährt den Verdacht,\ndass es sich bei dieser Gestalt um sein wahres Antlitz handelt."
        es:
          legends_arceus: "La luz desencadena el cambio a esta forma, que recuerda al\ncreador de todo lo existente. La colosal fuerza de la que hace\ngala nos sugiere que se trata de su verdadera forma."
        ko:
          legends_arceus: "밝은 빛이 폼체인지의 방아쇠가 되었다.\n창조신과 흡사한 이 모습이야말로 진정한 모습임에\n의심할 여지가 없을 정도로 강력한 힘을 발휘한다."
        zh_simp:
          legends_arceus: "光明乃是促使形态变化的导火线。此形态\n所能发挥的强大力量，令人不得不认为\n如此酷似创造神的姿态才是其真身。"
        zh_trad:
          legends_arceus: "光明乃是促使形態變化的導火線。此形態\n所能發揮的強大力量，令人不得不認為\n如此酷似創造神的姿態才是其真身。"
