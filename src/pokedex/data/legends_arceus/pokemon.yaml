      descriptions:
        jp_kanji:
          legends_arceus: "厳寒の海原を　揚々と　泳ぎて\n潮騒と　まごう　声色で　さえずる。\n強靭なる翼と　矜持を　有す。"
        en:
          legends_arceus: "It swims gracefully through the frigid sea and sings with a voice\nlike the roaring tide. It has powerful, sturdy wings and dignity\nto match."
        fr:
          legends_arceus: "Il nage gracieusement dans les eaux glaciales des océans\net entonne un chant semblable au grondement des vagues.\nSes ailes sont puissantes, et sa fierté remarquable."
        it:
          legends_arceus: "Nuota con agio in algidi mari, intonando un canto simigliante\nal ruggito delle onde. Ha ali possenti ed incommensurato\norgoglio."
        de:
          legends_arceus: "Würdevoll schwimmt es durch das eiskalte Meer und singt mit\neiner Stimme, die dem Tosen der Wellen gleicht. Die Kraft\nseiner Flügel ist so unbeugsam wie sein Stolz."
        es:
          legends_arceus: "Nada en aguas gélidas sin problema, entonando un gorjeo que\nrecuerda al rugir de las olas. Su orgullo es tan grande como\nfuertes sus aletas."
        ko:
          legends_arceus: "혹한의 바닷가를 유유히 헤엄치며\n파도 소리와 같은 음색으로 노래한다.\n강인한 날개와 높은 긍지를 가졌다."
        zh_simp:
          legends_arceus: "在严寒的大海中昂然畅泳，\n发出彷如海潮声般的音色。\n拥有强韧的翅膀与一身的傲气。"
        zh_trad:
          legends_arceus: "在嚴寒的大海中昂然暢泳，\n發出彷如海潮聲般的音色。\n擁有強韌的翅膀與一身的傲氣。"
