        jp_kanji:
          legends_arceus: "太き牙　流氷を　砕くほど　頑丈なれど\n折れることあり。　されど　翌年なれば\n再生す。　折れし牙　ヒスイ名物なり。"
        en:
          legends_arceus: "Its thick tusks are strong enough to shatter drift ice. They have\nbeen known to break, but they will grow back by the next year.\nThe Hisui region is well known for these broken tusks."
        fr:
          legends_arceus: "Ses défenses sont assez solides pour broyer la glace. Il leur\narrive parfois de se briser, mais elles repoussent en une année.\nHisui est célèbre pour les défenses cassées de Kaimorse."
        it:
          legends_arceus: "Le enormi zanne possono infrangere banchi di ghiaccio.\nTalvolta si rompono, nondimeno si rigenerano in un anno.\nCostituiscono oggetti tipici della terra di Hisui."
        de:
          legends_arceus: "Seine kräftigen Stoßzähne können selbst Treibeis zertrümmern.\nBrechen diese ab, wachsen sie innerhalb eines Jahres wieder\nnach. Hisui ist bekannt für Walraisas abgebrochene Stoßzähne."
        es:
          legends_arceus: "Sus gruesos colmillos son tan fuertes que pueden atravesar\ntémpanos de hielo, aunque a veces llegan a romperse. Si eso\npasa, al año siguiente les vuelven a crecer. Son típicos de Hisui."
        ko:
          legends_arceus: "커다란 엄니는 유빙을 부술 정도로 튼튼하나\n부러질 때도 있다. 그러나 다음 해가 되면\n재생한다. 부러진 엄니는 히스이의 명물이다."
        zh_simp:
          legends_arceus: "粗大的獠牙虽有足以咬碎流冰的强度，\n但有时仍会折断。獠牙折断后会在隔年\n重新长出，断掉的獠牙则成了洗翠的特产。"
        zh_trad:
          legends_arceus: "粗大的獠牙雖有足以咬碎流冰的強度，\n但有時仍會折斷。獠牙折斷後會在隔年\n重新長回，斷掉的獠牙則成了洗翠名產。"
