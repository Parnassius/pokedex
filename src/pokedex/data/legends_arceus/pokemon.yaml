        en:
          legends_arceus: "It licks its paws because of the sweet honey that has soaked into\nthem. It is cunning, stealing into the nests of Combee and taking\nfor itself the honey that the Combee have amassed."
        fr:
          legends_arceus: "J’ai souvent aperçu des Teddiursa en train de lécher\nleurs pattes couvertes de miel. Ils n’hésitent guère à\nen dérober dans les ruches des Apitrini."
        it:
          legends_arceus: "Usa intingere le zampe nel miele per poi leccarle. Creatura\nastuta, fa suo il miele dei Combee trafugandolo dai loro nidi."
        de:
          legends_arceus: "Teddiursa leckt oft an seinen Pranken, da Honig an ihnen haftet.\nListig, wie es ist, nimmt es sich diesen aus Wadribie-Stöcken,\nals ob er ihm gehören würde."
        es:
          legends_arceus: "Se lame continuamente las palmas impregnadas de miel. No\nse queda contento hasta haberse hecho con toda la miel que\nCombee almacena en su panal."
        ko:
          legends_arceus: "손바닥에 밴 달콤한 꿀을 핥는 버릇이 있다.\n세꿀버리가 모은 꿀을 그들의 벌집에서 가로채어\n자신의 것으로 삼는 대담함을 자랑한다."
        zh_simp:
          legends_arceus: "总是舔舐着渗入掌中的香甜蜜汁。\n三蜜蜂积蓄在巢中的花蜜时常\n被它毫不客气地占为己有。"
        zh_trad:
          legends_arceus: "總是舔舐著滲入掌中的香甜蜜汁。\n三蜜蜂積蓄在巢中的花蜜時常\n被牠毫不客氣地佔為己有。"
