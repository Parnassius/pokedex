      descriptions:
        jp_kanji:
          legends_arceus: "幼子　惑わし　彼岸へ　連れ去ると\n伝えられし　ポケモン。　人魂より\n転生したと　噂あるも　真偽不明なり。"
        en:
          legends_arceus: "Said to lure away young children and carry them off to the\nafterlife. Some whisper that Drifloon are formed of reincarnated\nhuman souls, but these rumors are as yet unconfirmed."
        fr:
          legends_arceus: "On raconte qu’il attire les jeunes enfants pour les emmener vers\nl’autre monde. Une autre rumeur dit que les Baudrive seraient\nla réincarnation des âmes humaines, mais cela reste à prouver."
        it:
          legends_arceus: "Pare che attiri a sé i fanciulli per condurli nell’aldilà. Voci\nnon comprovate asseriscono che sia la reincarnazione\ndi un’anima umana."
        de:
          legends_arceus: "Es heißt, es locke kleine Kinder an sich heran, um sie dann ins\nJenseits zu entführen. Unbestätigten Gerüchten zufolge besteht\nes aus wiedergeborenen Menschenseelen."
        es:
          legends_arceus: "Se dice que embauca a los niños para llevárselos al más allá.\nTambién que está formado por almas humanas reencarnadas,\nmas desconocemos la veracidad de dicha afirmación."
        ko:
          legends_arceus: "어린아이를 현혹하여 저세상으로 데려간다고\n전해지는 포켓몬. 도깨비불이 환생했다는\n소문도 있지만, 진위는 불명이다."
        zh_simp:
          legends_arceus: "传说会迷惑幼童，将其带往另一个\n世界的宝可梦。也有传闻说它是由\n鬼魂转生而成，但不知是真是假。"
        zh_trad:
          legends_arceus: "傳說會迷惑幼童，將其帶往另一個\n世界的寶可夢。也有傳聞說牠是由\n鬼魂轉生而成，但不知是真是假。"
