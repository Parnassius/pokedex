        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - grass
      descriptions:
        jp_kanji:
          legends_arceus: "頭の　葉は　薬として　重宝されたり。\n天日で　乾かし　煎じて　飲むと\n苦けれども　疲労回復に　効果抜群。"
        en:
          legends_arceus: "The leaves on its head are highly valued for medicinal purposes.\nDry the leaves in the sun, boil them, and then drink the bitter\ndecoction for remarkably effective relief from fatigue."
        fr:
          legends_arceus: "Une fois séchées au soleil et infusées, les feuilles couvrant\nson chef constituent un remède de choix. Ce dernier est\ncertes amer, mais il est très efficace contre la fatigue."
        it:
          legends_arceus: "Dalle foglie sul capo, se disseccate al sole, si trae un infuso\nimpiegato diffusamente come ottimo farmaco contro\nla spossatezza, seppur amaro."
        de:
          legends_arceus: "Ein Aufguss aus den sonnengetrockneten Blättern seines\nHauptes schmeckt zwar bitter, ist jedoch als wirksames\nMittel gegen Müdigkeit sehr geschätzt."
        es:
          legends_arceus: "Las hojas de la cabeza son codiciadas por sus propiedades\nmedicinales contra el cansancio: se secan al sol y se cuecen\npara crear un brebaje de sabor amargo pero muy eficaz."
        ko:
          legends_arceus: "머리의 잎사귀는 약재로 귀중하게 여겨진다.\n햇볕에 말린 뒤 달여서 마시면\n맛은 쓰지만 피로 회복에 효과 만점이다."
        zh_simp:
          legends_arceus: "头上的叶片是人们爱用的药材。\n在太阳下晒干后煎煮服用，\n虽然味苦但能有效地消除疲劳。"
        zh_trad:
          legends_arceus: "頭上的葉片是人們愛用的藥材。\n在太陽下曬乾後煎煮服用，\n雖然味苦但能有效地消除疲勞。"
