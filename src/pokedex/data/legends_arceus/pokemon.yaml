        en:
          legends_arceus: "Makes its home in mountainous regions, using its arms to climb\nalong harsh mountain roads. Can be troublesome—carelessly\nkicking one will cause it to fly into a rage and chase after you."
        fr:
          legends_arceus: "Il gîte en montagne et use de ses bras pour gravir les chemins\nescarpés. Si par mégarde quelqu’un lui donne un coup de pied,\nil enrage et poursuit l’importun sans relâche."
        it:
          legends_arceus: "Dimora tra le alture e usa le braccia per inerpicarsi su per ripidi\nsentieri. Insegue con astio chi incautamente lo calpesta e può\npertanto risultare molesto."
        de:
          legends_arceus: "Dieser Bergbewohner nutzt seine Arme, um steile Pfade zu\nerklimmen. Er kann eine wahrhafte Plage sein, da er einen\nzornig verfolgt, wenn man versehentlich auf ihn tritt."
        es:
          legends_arceus: "Se vale de los brazos para escalar las montañas escarpadas\nen donde vive. Si alguien lo patea sin querer, se enfada y\npersigue a su agresor, por lo que puede resultar molesto."
        ko:
          legends_arceus: "산악 지대에 살며 양팔로 험한 산길을 오른다.\n무심코 발에 채기라도 하면\n화를 내며 쫓아오기 때문에 성가시다."
        zh_simp:
          legends_arceus: "栖息在山区，用双手攀登险峻的山路。\n若是不小心踢到小拳石可是会惹上\n大麻烦，被发怒的它穷追不舍。"
        zh_trad:
          legends_arceus: "棲息在山區，用雙手攀登險峻的山路。\n若是不小心踢到小拳石可是會惹上\n大麻煩，被發怒的牠窮追不捨。"
graveler:
