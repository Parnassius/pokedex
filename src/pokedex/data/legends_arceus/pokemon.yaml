        en:
          legends_arceus: "Evolved by way of a curious item. The shell covering its body\nhas been shown to be stronger than forged steel."
        fr:
          legends_arceus: "Un étrange objet a provoqué l’évolution de ce Pokémon.\nIl a été démontré que la carapace qui recouvre son corps\nest plus dure que de l’acier trempé."
        it:
          legends_arceus: "Si è evoluto per mezzo di un singolare strumento. Studi\nriportano che la corazza di cui è tutto ricoperto resiste\npiù dell’acciaio forgiato."
        de:
          legends_arceus: "Es entwickelte sich mithilfe eines seltsamen Gegenstands.\nDer Panzer, der seinen Körper umgibt, ist nachweislich härter\nals geschmiedeter Stahl."
        es:
          legends_arceus: "Un extraño objeto provocó esta evolución. Se ha constatado\nque la coraza que lo recubre es más dura que el acero forjado."
        ko:
          legends_arceus: "기묘한 도구에 의해 진화한 모습.\n전신을 감싸는 외피는 단련된 강철에\n뒤지지 않는 강한 강도를 자랑한다."
        zh_simp:
          legends_arceus: "凭借奇异的道具进化而成。\n包覆全身的甲壳极为坚硬，\n据纪录其强度甚至更胜百炼精钢。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具進化而成。\n包覆全身的甲殼極為堅硬，\n據紀錄其強度甚至更勝百鍊精鋼。"
