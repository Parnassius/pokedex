        en:
          legends_arceus: "It drifts along at dusk, perfectly silent. Its transient, melancholy\naspect touches some people deeply—every so often, one will\ncome upon a song or poem devoted to Drifblim."
        fr:
          legends_arceus: "Il flotte sans bruit dans la pénombre du crépuscule. Son allure,\néphémère et empreinte de mélancolie, émeut tant qu’elle est\nchantée au travers de récits et de poèmes."
        it:
          legends_arceus: "Fluttua silente nell’oscurità del vespro. La sua foggia effimera e\nmalinconica tocca il cuore, ispirando sovente poeti e scrittori."
        de:
          legends_arceus: "Lautlos treibt es in der Abenddämmerung dahin. Die ephemere,\nmelancholische Aura, die es umgibt, bewegt die Herzen der\nMenschen und wird in Liedern und Gedichten besungen."
        es:
          legends_arceus: "Al caer el sol, flota sin hacer ruido alguno. Su aura efímera y\nmelancólica causa tal impresión en la gente que ha servido de\ninspiración a escritores y poetas."
        ko:
          legends_arceus: "땅거미 진 하늘을 소리 없이 떠다닌다.\n덧없고도 서글픈 모습에 감동하여서\n노래나 시의 소재로 쓰는 이도 종종 있다."
        zh_simp:
          legends_arceus: "静悄悄地飘在夜色之中。\n那落寞而哀愁的模样颇能扣人心弦，\n时不时会成为诗句的题材。"
        zh_trad:
          legends_arceus: "靜悄悄地飄在夜色之中。\n那落寞而哀愁的模樣頗能扣人心弦，\n三不五時會成為詩句的題材。"
buneary:
  species_id: 427
