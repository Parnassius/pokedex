      types:
        - bug
      descriptions:
        jp_kanji:
          legends_arceus: "細き糸にて　体　包みつつ　進化の活力\n蓄積す。　手足出せず　動き　鈍いが\n双眸にて　睨み利かし　抜け目なし。"
        en:
          legends_arceus: "Wraps itself in thin strings of silk while it stores energy for\nevolution. It can’t extend its limbs and its movement is slow,\nbut its eyes keep a sharp lookout—Silcoon is always on guard."
        fr:
          legends_arceus: "Il s’enveloppe dans des fils de soie en attendant d’accumuler\nl’énergie nécessaire à son évolution. Ses membres entravés\nle ralentissent, mais il a l’œil vif et reste toujours aux aguets."
        it:
          legends_arceus: "Avvolge le membra in fili sottili per accumulare energia\nper l’evoluzione. Lento nel muoversi, ha gli arti bloccati,\nma i suoi occhi sono attenti e vigili."
        de:
          legends_arceus: "Es wickelt sich in feine Fäden und sammelt Energie für seine\nEntwicklung. Da es seine Gliedmaßen nicht einsetzen kann, ist es\nrecht schwerfällig, doch seinem scharfen Blick entgeht nichts."
        es:
          legends_arceus: "Envuelto en una seda muy fina, acumula energía para\nevolucionar. Se mueve con dificultad al tener las extremidades\ninmovilizadas, pero lo observa todo y no pierde detalle."
        ko:
          legends_arceus: "가는 실로 몸을 감싸고 진화할 기운을 모으고 있다.\n움직임이 자유롭지 못하고 둔하지만\n두 눈으로 노려보고 있어 빈틈이 보이지 않는다."
        zh_simp:
          legends_arceus: "以细丝包裹全身，积蓄进化所需的活力。\n虽然无手脚且动作迟缓，但双眼射出的\n凌厉视线不会放过四周的风吹草动。"
        zh_trad:
          legends_arceus: "以細絲包裹全身，積蓄進化所需的活力。\n雖然無手無腳且動作遲緩，但雙眼射出的\n凌厲視線不會放過四周的風吹草動。"
beautifly:
