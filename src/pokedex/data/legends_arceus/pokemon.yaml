        en:
          legends_arceus: "Goomy hides away in the shade of trees, where it’s nice and\nhumid. If the slime coating its body dries out, the Pokémon\ninstantly becomes lethargic."
        fr:
          legends_arceus: "Il se dissimule à l’ombre des arbres, où le taux d’humidité\nest plus élevé. Si la substance visqueuse qui le recouvre sèche,\nil devient léthargique."
        it:
          legends_arceus: "Cela sé stesso all’ombra di madide fronde. Perde tosto vigore\nse il liquido viscido che lo ricopre si essicca."
        de:
          legends_arceus: "Es sucht Schutz im Schatten der Bäume, wo hohe Luftfeuchtigkeit\nherrscht. Trocknet der Schleim aus, der seinen Körper bedeckt,\nverliert es auf der Stelle seine Vitalität."
        es:
          legends_arceus: "Se refugia a la sombra de los árboles donde la humedad es alta.\nSi el líquido viscoso que cubre su cuerpo se reseca, no tarda en\naletargarse."
        ko:
          legends_arceus: "습도가 높은 나무 그늘에 몸을 숨기고 있다.\n몸을 뒤덮고 있는 미끈한 액체가 마르면\n금세 생기를 잃어버린다."
        zh_simp:
          legends_arceus: "藏身在湿度较高的树荫下。\n覆盖着身体的黏糊液体一旦\n干枯，就会立刻失去生命力。"
        zh_trad:
          legends_arceus: "藏身在濕度較高的樹蔭下。\n覆蓋著身體的黏糊液體一旦\n乾枯，就會立刻失去生命力。"
