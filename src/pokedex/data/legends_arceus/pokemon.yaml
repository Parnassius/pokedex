          legends_arceus: "闇夜の　かがり火に　誘われる　習性。\n毒性の強き　鱗粉　ばら撒くゆえ\n集落より　追い払うのに　難儀す。"
        en:
          legends_arceus: "Tends to be drawn to bonfires on dark nights. Difficult to chase\naway from settlements because of the way it scatters highly\ntoxic scales."
        fr:
          legends_arceus: "Les Papinox ont coutume de se réunir nuitamment autour\ndes feux. Il est fort délicat de les chasser du village, car\nils projettent des écailles empoisonnées."
        it:
          legends_arceus: "I Dustox usano radunarsi attorno a falò nell’oscurità della notte.\nDiffondono un pulviscolo assai velenifero e tenerli lungi\ndal villaggio è impresa ostica."
        de:
          legends_arceus: "Dieses Pokémon wird des Nachts von Lagerfeuern angezogen.\nDa es giftigen Puder verstreut, ist es nur schwer aus Siedlungen\nzu verscheuchen."
        es:
          legends_arceus: "Se sienten atraídos por las hogueras en noches muy oscuras.\nMantenerlos alejados de los poblados resulta muy difícil, ya\nque esparcen un polvillo muy venenoso al contacto."
        ko:
          legends_arceus: "어두운 밤의 화톳불에 이끌리는 습성이 있다.\n강한 독성의 인분을 흩뿌리기 때문에\n마을에서 내쫓기도 힘들다."
        zh_simp:
          legends_arceus: "有着被黑暗中的篝火吸引的习性。\n会散布毒性猛烈的鳞粉，令人们\n为了将它们驱离村落而煞费苦心。"
        zh_trad:
          legends_arceus: "有著被黑暗中的篝火吸引的習性。\n會散布毒性猛烈的鱗粉，令人們\n為了將牠們驅離村落而煞費苦心。"
