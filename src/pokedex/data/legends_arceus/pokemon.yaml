        en:
          legends_arceus: "Found in abundance on seashores bordering cold waters.\nWhen pressed upon, the Pokémon will secrete from its body’s\nsurface a purple fluid that will stain one’s clothes."
        fr:
          legends_arceus: "Ce Pokémon gîte près des étendues d’eau froide.\nSi on le caresse trop vigoureusement, sa peau sécrète\nun liquide mauve qui tache les vêtements."
        it:
          legends_arceus: "Se ne trovano svariati esemplari nelle piagge dalle fresche\nacque. Se si tasta la sua superficie con una certa forza,\nne fuoriesce un fluido viola che macchia le vesti."
        de:
          legends_arceus: "In kalten Küstengewässern trifft man es in großer Zahl an.\nWird es unsanft angefasst, tritt eine purpurne Flüssigkeit aus\nseinem Körper aus, die Kleidung verfärbt."
        es:
          legends_arceus: "Se ven muchos especímenes en costas de aguas frías. Si se toca\ncon algo de fuerza, secreta un líquido púrpura que mancha\nla ropa."
        ko:
          legends_arceus: "수온이 차가운 해변에 많이 있다.\n강하게 만지면 표면에서\n보랏빛 점액이 스며 나와 옷을 더럽힌다."
        zh_simp:
          legends_arceus: "常见于水温较低的岩岸。若是\n稍微用力去触摸它，就会被它\n体表渗出的紫色汁液弄脏衣服。"
        zh_trad:
          legends_arceus: "常見於水溫較低的岩岸。若是\n稍微用力去觸摸牠，就會被牠\n體表滲出的紫色汁液弄髒衣服。"
