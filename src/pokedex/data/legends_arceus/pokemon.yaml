        fr:
          legends_arceus: "Un étrange objet a provoqué l’évolution de ce Pokémon.\nQuand son pouls s’emballe, la quantité d’électricité qu’il génère\naugmente. Sa queue libère des décharges de 20 000 volts."
        it:
          legends_arceus: "Si è evoluto per mezzo di un singolare strumento.\nL’accelerare del palpito ingenera più elettricità.\nEietta scariche da 20.000 volt dalle code."
        de:
          legends_arceus: "Es entwickelte sich mithilfe eines seltsamen Gegenstands.\nJe schneller sein Herz schlägt, desto mehr Elektrizität erzeugt es.\nÜber seine Schweife kann es geballte 20 000 V entladen."
        es:
          legends_arceus: "Un extraño objeto provocó esta evolución. Cuanto más rápido\nle late el corazón, mayor electricidad genera. Sus colas liberan\ndescargas de hasta 20 000 V."
        ko:
          legends_arceus: "기묘한 도구에 의해 진화한 모습.\n심박수가 오르면 만드는 전기의 양도 증가한다.\n꼬리를 통해 2만 볼트의 전류를 방출한다."
        zh_simp:
          legends_arceus: "凭借奇异的道具进化而成。\n心跳增快时，发电量将会增加。\n会从尾巴发出两万伏特的电流。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具進化而成。\n心跳增快時，發電量將會增加。\n會從尾巴發出兩萬伏特的電流。"
