        hp: 3
        attack: 0
        defense: 0
        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - normal
      descriptions:
        jp_kanji:
          legends_arceus: "天上より　ヒスイの地を　射す　光源。\n光明にて　ポケモン　導き　守護す。\nヒスイの神話　万物の創造主と　記す。"
        en:
          legends_arceus: "It is the heavenly fount from which pours the light that shines\nacross Hisui. Its luminance guides and protects all Pokémon.\nHisuian mythology states that Arceus is the creator of all things."
        fr:
          legends_arceus: "Il est celui qui illumine Hisui depuis les cieux. Il protège et guide\nles Pokémon de sa lumière. Selon les mythes de la région, il est\nle créateur de toutes choses."
        it:
          legends_arceus: "Fonte della luce che rischiara Hisui dalla volta celeste,\noffre protezione ai Pokémon e fa loro da guida.\nNei miti del luogo è sommo creatore d’ogni cosa."
        de:
          legends_arceus: "Quell des Lichts, das Hisui vom Himmelszelt aus erleuchtet und\nden Pokémon gleichsam als Schutz und Führung dient. In den\nMythen Hisuis wird es als Schöpfer aller Dinge besungen."
        es:
          legends_arceus: "Aquel que ilumina Hisui desde el cielo, salvaguardando y\nguiando a los Pokémon con su fulgor. Según los mitos de estas\ntierras, es el creador de todo lo existente."
        ko:
          legends_arceus: "천상에서 히스이 땅을 비추는 빛의 근원.\n밝은 빛으로 포켓몬을 인도하고 수호한다.\n히스이 신화에는 만물의 창조주라고 기록되어 있다."
        zh_simp:
          legends_arceus: "以自身为光源，从天照耀洗翠大地。\n凭借其光明引导并守护宝可梦。\n洗翠神话视其为万物的创造主。"
        zh_trad:
          legends_arceus: "以己身為光源，從天照耀洗翠大地。\n憑藉其光明引導並守護寶可夢。\n洗翠神話視其為萬物的創造主。"
