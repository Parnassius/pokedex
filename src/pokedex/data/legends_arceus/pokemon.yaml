        jp_kanji:
          legends_arceus: "季節　巡り　厳冬　終わりしこと　喜び\n天に　感謝　捧げしとき　このポケモン\n現れ　枯れし大地を　花で　満たす。"
        en:
          legends_arceus: "When the turning of seasons brings the cruel winter to its end\nand the joyous people give thanks to the heavens, Shaymin\nappears and covers the withered land with flowers."
        fr:
          legends_arceus: "Lorsque la rudesse de l’hiver fait place à des cieux plus cléments,\nsuscitant joie et gratitude à l’adresse du soleil, Shaymin apparaît\npour couvrir de fleurs les terres éprouvées par le froid."
        it:
          legends_arceus: "Al celebrar l’avvicendarsi delle stagioni e la fine del gelo,\nquesto Pokémon si manifesta al popolo gioioso per colmare\ndi fiori le aride terre."
        de:
          legends_arceus: "Richten die Menschen aus Freude über das Ende eines strengen\nWinters ihren Dank gen Himmel, erscheint dieses Pokémon und\nverwandelt das dürre Land in ein Blumenmeer."
        es:
          legends_arceus: "Cuando la gente da gracias al cielo por el fin del largo y crudo\ninvierno, Shaymin aparece y cubre con flores todos los campos\nmarchitos."
        ko:
          legends_arceus: "엄동설한의 계절이 끝난 것에 기뻐하여\n하늘에 감사를 드릴 때, 이 포켓몬이 나타나\n말라 버린 대지를 꽃으로 가득 채운다."
        zh_simp:
          legends_arceus: "当人们欣喜于严冬随着季节更替而终结，\n向上天奉献感谢之意时，此宝可梦就会\n现身，令荒寂的大地开满鲜花。"
        zh_trad:
          legends_arceus: "當人們欣喜於嚴冬隨著季節輪轉而終結，\n向上天奉獻感謝之意時，此寶可夢就會\n現身，令荒寂的大地開滿鮮花。"
