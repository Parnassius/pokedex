          legends_arceus: "体熱を　急低下させる　能力を　有す。\n大気　凍らせ　宝石の如き　煌めく\n細氷を　舞い躍らせる　現象　起こす。"
        en:
          legends_arceus: "Glaceon is able to lower its body temperature very quickly.\nIt freezes the atmosphere, creating diamond dust that glitters\nlike gems while it flutters and dances around."
        fr:
          legends_arceus: "En réduisant subitement sa température corporelle, il déclenche\nle phénomène suivant : l’air se gèle et de fins cristaux de glace\nvirevoltent dans l’atmosphère, telle une pluie de diamants."
        it:
          legends_arceus: "È in grado di ridurre repentinamente la propria temperatura\ncorporea. Gela l’aere, facendo indi turbinare esili granelli\ndi ghiaccio affini a gemme."
        de:
          legends_arceus: "Dieses Pokémon ist in der Lage, seine Körpertemperatur rapide\nzu senken. Es lässt die Luft gefrieren und bringt dadurch feine\nEiskristalle zum Tanzen, die wie Edelsteine glitzern."
        es:
          legends_arceus: "Puede reducir su temperatura corporal de manera instantánea.\nTransforma la humedad del ambiente en finos cristales de hielo\nque danzan en el aire y brillan tanto como piedras preciosas."
        ko:
          legends_arceus: "체온을 급격히 내릴 수 있는 능력을 가졌다.\n대기를 얼려서 보석처럼 반짝이는\n세빙이 흩날리는 현상을 일으킨다."
        zh_simp:
          legends_arceus: "拥有高速降低体温的能力，\n能冻结大气，引发细碎冰晶\n如同宝石般闪耀飞舞的现象。"
        zh_trad:
          legends_arceus: "擁有急速降低體熱的能力。\n能凍結大氣，引發細碎冰晶\n如同寶石般閃耀飛舞的現象。"
