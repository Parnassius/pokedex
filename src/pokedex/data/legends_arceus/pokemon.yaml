          legends_arceus: "大海　優雅に泳ぎ　穏やかな　性質。\n遊泳速度　増せば　海面より　飛び出し\n鳥ポケモンと　見間違うこと　多し。"
        en:
          legends_arceus: "This calm and gentle Pokémon swims gracefully through the sea.\nAfter building speed, it can leap out of the water. It is often\nmisidentified as a bird Pokémon due to this behavior."
        fr:
          legends_arceus: "Un Pokémon d’un naturel calme, qui nage avec joliesse.\nLorsqu’il accélère, il lui arrive de bondir hors de l’eau,\nce qui lui vaut d’être souvent assimilé à un Pokémon oiseau."
        it:
          legends_arceus: "Di natura pacifica, nuota con grazia nell’oceano. Sott’acqua\nacquista velocità e, con un guizzo, si libra alto nell’aere tanto\nda venire spesso scambiato per un Pokémon alato."
        de:
          legends_arceus: "Dieses friedliche Pokémon schwimmt anmutig durchs Meer.\nWenn es beschleunigt, kann es auch kurz über den Wellen\ngleiten, wodurch es oft für ein Vogel-Pokémon gehalten wird."
        es:
          legends_arceus: "De personalidad dócil, nada con elegancia por mar abierto.\nPuede saltar sobre la superficie del agua cuando va muy\ndeprisa, por lo que suelen confundirlo con un Pokémon pájaro."
        ko:
          legends_arceus: "대해를 우아하게 헤엄치며 성질은 온화하다.\n속도가 붙으면 수면에서 튀어나오는 까닭에\n새포켓몬으로 혼동하는 일이 많다."
        zh_simp:
          legends_arceus: "性情温和，悠游于大海之中。\n游泳速度增快时会跃出海面，\n人们常将其误认为鸟宝可梦。"
        zh_trad:
          legends_arceus: "性情溫和，悠游於大海之中。\n游泳速度增快時會躍出海面，\n人們常將其誤認為鳥寶可夢。"
