        en:
          legends_arceus: "The blades extending from its elbows are sharper than the\nfinest swords. Its swordsmanship, albeit self-taught, is\nastonishingly impressive."
        fr:
          legends_arceus: "Les lames qui saillent de ses coudes sont plus affûtées que\ndes sabres de renom. Ce Pokémon a développé son propre\nstyle d’escrime tout à fait remarquable."
        it:
          legends_arceus: "Le lame che protrudono dai gomiti tagliano più d’una spada\npregiata. Seppur allenatosi autonomamente, mostra una\nmaestria nella scherma che lascia attoniti."
        de:
          legends_arceus: "Die Klingen, die aus seinen Ellbogen wachsen, sind schärfer\nals die vortrefflichsten Schwerter. Seine Fechtkunst, die es sich\nselbst angeeignet hat, lädt zum Staunen ein."
        es:
          legends_arceus: "Las cuchillas que le salen de los codos están más afiladas que la\nmejor de las espadas. Pese a ser autodidacta, su habilidad al\nesgrimir estas armas es todo un regalo para la vista."
        ko:
          legends_arceus: "팔꿈치에서 늘어나는 무기의 예리함은\n명검을 뛰어넘는다. 자신만의 방식으로 휘두르는\n화려한 검술은 보는 이의 눈을 휘둥그레지게 만든다."
        zh_simp:
          legends_arceus: "自肘部伸出的刀刃锋利更胜名刀。\n虽然所使的刀法自成一派，但其\n用刀之精湛足以令人瞠目赞叹。"
        zh_trad:
          legends_arceus: "自肘部伸出的刀刃鋒利更勝名刀。\n雖然所使的刀法出於自學，但其\n用刀之精湛足以令人瞠目讚嘆。"
