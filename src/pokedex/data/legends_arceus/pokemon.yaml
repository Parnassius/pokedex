        en:
          legends_arceus: "This species corners prey as a pack, under the guidance of\na leader. Weavile displays increased cunning, leading me to\nspeculate that its evolution caused further brain development."
        fr:
          legends_arceus: "Il chasse ses proies en groupe, sous les ordres d’un meneur.\nL’incroyable fourberie de ce Pokémon me fait penser que\nl’évolution provoque chez lui un développement du cerveau."
        it:
          legends_arceus: "Forma gruppi per braccare le prede sotto l’egida di un leader.\nSi crede che l’evoluzione abbia favorito lo sviluppo\ndell’encefalo, rendendolo più scaltro."
        de:
          legends_arceus: "Unter dem Kommando eines Anführers jagen sie ihre Beute in\nGruppen. Ihre Gerissenheit deutet darauf hin, dass sich die\nEntwicklung förderlich auf ihr Hirnwachstum ausgewirkt hat."
        es:
          legends_arceus: "Viven y cazan en grupo bajo las órdenes de un líder. Su\nincreíble astucia es un claro indicador de que su cerebro se\ndesarrolló al evolucionar."
        ko:
          legends_arceus: "리더의 통솔하에 무리를 이루어 먹잇감을 쫓는다.\n교활함이 한층 더해진 것으로 보아\n진화가 뇌의 발달에도 영향을 준 것으로 추측된다."
        zh_simp:
          legends_arceus: "会在首领的统率下集结成群追捕\n猎物。狡猾程度更甚进化之前，\n本人认为此进化亦使大脑更为发达。"
        zh_trad:
          legends_arceus: "會在首領的統率下集結成群追捕\n獵物。比狃拉更加狡猾，吾人認為\n此乃因其進化促進了大腦的發達。"
