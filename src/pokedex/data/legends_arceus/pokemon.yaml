          legends_arceus: "４本の腕　近接戦において　死角無し。\n瞬く間に　１０００発以上の　拳を\n繰り出し　敵を　圧倒する　豪傑なり。"
        en:
          legends_arceus: "In close combat, its four arms afford it offensive and defensive\nsupremacy. In but a blink, this valiant Pokémon can overwhelm\nits foes with more than 1,000 blows from its fists."
        fr:
          legends_arceus: "Au corps à corps, il excelle en attaque comme en défense\ngrâce à ses quatre bras. Il écrase ses ennemis en assénant\nplus de 1 000 coups de poing en un battement de cils."
        it:
          legends_arceus: "Nel corpo a corpo, le sue quattro braccia gli permettono\ndi eccellere sia in attacco che in difesa. Infligge in rapida\nsuccessione oltre mille colpi agli avversari, soggiogandoli."
        de:
          legends_arceus: "Dank seiner vier Arme besticht es im Nahkampf sowohl im\nAngriff als auch in der Verteidigung. Gegner bezwingt es, indem\nes mehr als 1 000 Faustschläge rasant auf sie herabregnen lässt."
        es:
          legends_arceus: "En combates cuerpo a cuerpo, sus cuatro brazos le otorgan una\nofensiva y una defensa sin fisuras. Puede propinar mil golpes en\nun abrir y cerrar de ojos, lo cual abruma a sus rivales."
        ko:
          legends_arceus: "4개의 팔 덕분에 근접전에서는 사각이 없다.\n순식간에 1000발 이상의 주먹을 내질러\n적을 압도하는 호걸이다."
        zh_simp:
          legends_arceus: "四只手臂在肉搏战中毫无死角。\n能在瞬间击出千发以上的拳击\n压倒对手，是当之无愧的豪杰。"
        zh_trad:
          legends_arceus: "四隻手臂在肉搏戰中毫無死角。\n能在瞬間擊出千發以上的拳擊\n壓倒對手，是當之無愧的豪傑。"
