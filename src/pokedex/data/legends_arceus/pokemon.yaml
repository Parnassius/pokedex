          legends_arceus: "神通力　有す　童が　変容した姿と\n噂あるも　真偽不明。　手に持つ　匙は\n脳波を高める　効能ありと　推察す。"
        en:
          legends_arceus: "There are rumors that a child with mystical powers became\na Kadabra; however, this remains unverified. I suspect that\nthe spoon Kadabra holds enhances its brain waves."
        fr:
          legends_arceus: "J’ai ouï dire que les Kadabra étaient des enfants aux pouvoirs\npsychiques qui se seraient transformés, mais rien ne le confirme.\nLeur cuillère aurait le don d’amplifier leurs ondes mentales."
        it:
          legends_arceus: "Corre voce, non comprovata, che fosse in origine un fanciullo\ndotato di poteri sovrannaturali. Ritengo che il cucchiaio che\nstringe in mano accresca le sue onde cerebrali."
        de:
          legends_arceus: "Unbestätigten Gerüchten zufolge war es einst ein Kind mit\nübersinnlichen Fähigkeiten. Ich nehme an, dass ihm der Löffel in\nder Hand dazu dient, die eigenen Gehirnwellen zu verstärken."
        es:
          legends_arceus: "Corre el rumor de que se trata de un niño con poderes\ntransformado, mas desconozco si es cierto o no. Creemos\nque la cuchara que lleva amplifica sus ondas cerebrales."
        ko:
          legends_arceus: "신통력 있는 아이가 변한 모습이라는 소문이\n있으나 진위는 불명. 쥐고 있는 숟가락에\n뇌파를 강화하는 효과가 있다고 추정된다."
        zh_simp:
          legends_arceus: "有传闻说此宝可梦乃是拥有神通之力的\n小童变化而成，其真伪尚无法证实。\n手中汤匙据推测有增强脑波的性能。"
        zh_trad:
          legends_arceus: "有傳聞說此寶可夢乃是擁有神通之力的\n小童變化而成，其真偽尚無法證實。\n手中湯匙據推測有增強腦波的效能。"
