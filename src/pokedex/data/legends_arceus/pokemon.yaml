          legends_arceus: "Upon taking in the scent of a particular rare flower, Shaymin is\nenveloped in light, and its tiny body transforms. I took a whiff\nof the flower myself, but alas, my body remained unchanged."
        fr:
          legends_arceus: "Dès lors qu’il hume le parfum d’une fleur rare bien particulière,\nson corps menu s’illumine, et il change de forme. J’ai, moi aussi,\ntenté de humer cette fleur, mais il ne s’est rien produit..."
        it:
          legends_arceus: "Se annusa un certo fiore raro, il suo corpo minuto viene avvolto\ndalla luce, assumendo questa guisa. Odorare lo stesso fiore\nnon cagiona mutamento alcuno al mio corpo."
        de:
          legends_arceus: "Riecht es an einer bestimmten seltenen Blume, wird sein kleiner\nKörper von Licht umhüllt und vollzieht einen Formwandel.\nAuf mich hatte das Riechen dieser Blume indes keinen Effekt."
        es:
          legends_arceus: "Al olisquear el aroma de una flor extraña, la luz rodea su\npequeño cuerpo y se transforma. He olfateado esta flor,\npero no ha surtido efecto en mí."
        ko:
          legends_arceus: "진귀한 꽃의 향기를 맡으면 작은 몸이\n빛에 감싸이며 모습이 바뀐다. 시험 삼아\n꽃향기를 맡아봤지만 내 몸에는 아무 변화가 없었다."
        zh_simp:
          legends_arceus: "当嗅闻珍奇之花的香味时，娇小的\n身体将在光辉之中变化成此形貌。\n本人曾尝试嗅闻该花，但没有变化。"
        zh_trad:
          legends_arceus: "當嗅聞珍奇之花的香味時，嬌小的\n身體將在光輝之中變化成此形貌。\n吾人曾嘗試嗅聞此花，但沒有變化。"
arceus:
  species_id: 493
  names:
    jp_kanji: アルセウス
    en: Arceus
    fr: Arceus
    it: Arceus
    de: Arceus
