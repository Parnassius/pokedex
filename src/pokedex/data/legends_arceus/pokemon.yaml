        special_attack: 0
        special_defense: 0
        speed: 0
      types:
        - water
      descriptions:
        jp_kanji:
          legends_arceus: "水の分子と　酷似せし細胞　検出す。\n潜水中　姿　隠すは　これが理由と\n推察。　人魚伝説の正体と　見たり。"
        en:
          legends_arceus: "Tests show that its cells closely resemble water molecules, which\nperhaps explains its ability to conceal its form while submerged.\nI believe the origins of mermaid folklore lie with this Pokémon."
        fr:
          legends_arceus: "L’analyse de ses cellules a révélé qu’elles sont similaires à des\nmolécules d’eau. Cela explique pourquoi il peut disparaître sous\nles flots. Je crois qu’il est à l’origine des légendes sur les sirènes."
        it:
          legends_arceus: "Le sue cellule rassimigliano a molecole d’acqua e forse perciò\nsvanisce quando s’immerge. Potrebbe essere la cagione\ndel mito delle sirene."
        de:
          legends_arceus: "Die Ähnlichkeit zwischen seinen Zellen und Wassermolekülen\nerklärt wohl, weshalb es im Wasser unsichtbar werden kann.\nIch halte es für den Ursprung diverser Meerjungfrauensagen."
        es:
          legends_arceus: "Según nuestros análisis, su estructura celular es similar a las\nmoléculas de agua, lo que le permite mimetizarse al sumergirse.\nTal vez sea el origen de los cuentos de sirenas."
        ko:
          legends_arceus: "물의 분자와 흡사한 세포가 검출되었다.\n물속에서 모습을 감출 수 있는 이유로\n추측된다. 인어 전설의 정체로 여겨진다."
        zh_simp:
          legends_arceus: "从它身上可检出酷似水分子的细胞。\n本人推测这就是它潜水时得以隐身\n的原因，而这也是人鱼传说的真相。"
        zh_trad:
          legends_arceus: "從牠身上可檢出酷似水分子的細胞。\n吾人推測這就是牠潛水時得以隱身\n的原因，而這也是人魚傳說的真相。"
