        en:
          legends_arceus: "Scant few have ever sighted this Pokémon. After studying what\nliterature remains, I am certain Togekiss will reveal itself when\npeace reigns in the land."
        fr:
          legends_arceus: "Rares sont ceux qui ont eu le privilège de le voir. Néanmoins,\nsi l’on en croit les sources anciennes qui sont parvenues jusqu’à\nnous, il ne fait nul doute qu’il se montre en temps de paix."
        it:
          legends_arceus: "Viene avvistato di rado. Alcuni reperti letterari giunti fino a noi\nmi portano a concludere con assoluta certezza che si palesi\nqualora la pace regni sovrana nel mondo."
        de:
          legends_arceus: "Nur wenige hatten je das Privileg, dieses Pokémon zu Gesicht\nzu bekommen. Alten Aufzeichnungen zufolge zeigt es sich nur,\nwenn auf der Welt Frieden herrscht."
        es:
          legends_arceus: "Según antiguos escritos, solo se manifiesta ante la gente\ncuando el mundo se encuentra en paz y armonía. Muy pocos\nhan tenido dicho privilegio."
        ko:
          legends_arceus: "목격된 사례가 거의 없다.\n남아 있는 문헌에 의하면 천하가 태평할 때\n모습을 드러내어 만날 수 있게 된다고 한다."
        zh_simp:
          legends_arceus: "目击案例极为稀少。从留存至今\n的文献记载可知，此宝可梦无疑\n只会在天下太平之时现身于人前。"
        zh_trad:
          legends_arceus: "目擊案例極為稀少。從留存至今\n的文獻記載可知，此寶可夢無疑\n只會在天下太平之時現身於人前。"
