        en:
          legends_arceus: "This Pokémon shares roots with the Sneasel of Hisui, but unlike\nthat species, this one is spiteful in personality. I hypothesize\nthat water and earth can affect Sneasel’s mind and body."
        fr:
          legends_arceus: "Il est de nature ténébreuse, bien qu’il ait les mêmes origines\nque le Farfuret de Hisui. Selon mes hypothèses, la terre et l’eau\nauraient une influence sur son corps et sur son esprit."
        it:
          legends_arceus: "Condivide la medesima origine degli Sneasel di Hisui,\nma è di natura insidiosa. La terra e l’acqua potrebbero\nesercitare su di lui grande influenza."
        de:
          legends_arceus: "Es teilt seine Abstammung mit dem Sniebel der Hisui-Region,\nist jedoch von hinterhältigem Charakter. Meiner Theorie zufolge\nhaben Boden und Wasser Einfluss auf seinen Körper und Geist."
        es:
          legends_arceus: "Comparten orígenes con el Sneasel de Hisui, pero poseen una\npersonalidad más maliciosa. Creemos que el agua y la tierra\npueden influir en su cuerpo y su mente."
        ko:
          legends_arceus: "히스이 땅에 사는 포푸니와 기원은 같지만\n성질은 그와 달리 음습하다. 토양과 물이\n몸과 마음에 영향을 줬다는 가설이 있다."
        zh_simp:
          legends_arceus: "与栖息在洗翠地区的狃拉系出同源，\n但性情却是阴狠狡诈。本人假设，\n此乃各地的水土影响身心所致。"
        zh_trad:
          legends_arceus: "與棲息在洗翠地區的狃拉系出同源，\n但性情卻是陰狠狡詐。吾人假設，\n此乃各地的水土影響身心所致。"
