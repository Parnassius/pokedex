        jp_kanji:
          legends_arceus: "乙女の如き姿なれど　不可思議な能力\n操り　楽園なる景色を　映し出したり。\n紅のかんざしに　秘密あると　推測す。"
        en:
          legends_arceus: "It resembles a maiden in appearance, but it wields strange\npowers to project visions of paradise. I suspect the crimson\nornaments on its head are the key to its abilities."
        fr:
          legends_arceus: "Ce Pokémon a l’apparence d’une jeune fille. Il s’est servi de\nses pouvoirs sibyllins pour me montrer un paysage idyllique.\nJe suspecte ses cornes rouges de renfermer un mystère."
        it:
          legends_arceus: "Le fattezze rimembrano una fanciulla. Possiede il mirabile\npotere di creare visioni ultraterrene, probabilmente per mezzo\ndei rossi fermagli."
        de:
          legends_arceus: "Dieses Pokémon hat eine mädchenhafte Gestalt und kann mit\nseinen wundersamen Kräften paradiesische Trugbilder erzeugen.\nIch vermute, dem roten Kopfschmuck wohnt ein Geheimnis inne."
        es:
          legends_arceus: "Parece una niña, pero maneja un extraño poder con el que me\nmostró una visión celestial. Sospecho que sus horquillas rojas\nesconden algún secreto."
        ko:
          legends_arceus: "소녀 같은 모습을 하고 있지만 신비한 능력을\n부려서 낙원과도 같은 경치를 보여 준다.\n빨간 머리 장식에 비밀이 있는 것으로 보인다."
        zh_simp:
          legends_arceus: "外貌宛若清纯少女，却身怀\n特异能力，能映照出乐园景象。\n据推测其秘密就在红色发饰之中。"
        zh_trad:
          legends_arceus: "外貌宛若清純少女，卻身懷\n特異能力，能映照出樂園景象。\n據推測其秘密就在紅色髮飾之中。"
gardevoir:
  species_id: 282
