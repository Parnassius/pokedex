        en:
          legends_arceus: "Very little is known about its biology. Can knock down massive\ntrees by smashing its beautiful, pearl-like crown against them."
        fr:
          legends_arceus: "J’ai peu d’informations sur le mode de vie de ce Pokémon.\nÀ l’aide de son crâne, qui est beau comme une perle, il est\ncapable d’abattre les plus grands arbres d’un seul coup."
        it:
          legends_arceus: "Poco si conosce sulla sua biologia. Abbatte grandi alberi\ncon il contundente cranio, la cui bellezza rammenta quella\ndi una perla."
        de:
          legends_arceus: "Einzelheiten über seine Lebensweise sind rar. Kopfstöße mit\nseinem Schädel, dessen Schönheit einer Perle gleicht, bringen\nselbst Baumriesen zu Fall."
        es:
          legends_arceus: "Disponemos de escasa información acerca de su relación con el\nentorno. Con su cráneo, hermoso y liso cual perla, puede\nembestir y partir en dos árboles de gran tamaño."
        ko:
          legends_arceus: "생태에 관한 정보가 거의 없다.\n진주처럼 고운 정수리에 부딪히면\n거목조차도 꺾여 버린다."
        zh_simp:
          legends_arceus: "关于其生态的信息十分缺乏。\n当它用珍珠般光滑亮丽的头顶\n猛撞时，就连巨树也能撞断。"
        zh_trad:
          legends_arceus: "關於其生態的資訊十分缺乏。\n當牠用珍珠般光滑亮麗的頭頂\n猛撞時，就連巨樹也能撞斷。"
