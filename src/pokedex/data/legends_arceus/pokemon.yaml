        en:
          legends_arceus: "Eats beach sand for nourishment. Should one Gastrodon\nencounter another of a different color, a fierce battle will\ninevitably ensue."
        fr:
          legends_arceus: "Il se nourrit de sable, dont il tire les éléments nutritifs.\nLorsqu’il croise le chemin d’un Tritosor d’une autre couleur,\nune violente querelle s’ensuit."
        it:
          legends_arceus: "Trae nutrimento dalla sabbia marina. Quando esemplari\ndi diverso colore s’incontrano, scaturisce una feroce lotta."
        de:
          legends_arceus: "Meeressand dient ihm als Nahrung. Kreuzt es den Weg eines\nandersfarbigen Gastrodon, so kommt es unweigerlich zu einem\nheftigen Kampf."
        es:
          legends_arceus: "Ingiere la arena de las playas para alimentarse. Si se cruzan dos\nespecímenes de distinto color, se enfrentan entre sí en una feroz\nbatalla."
        ko:
          legends_arceus: "바다의 모래를 양식으로 삼는다.\n색이 다른 트리토돈끼리 만나면\n격렬한 싸움이 시작된다."
        zh_simp:
          legends_arceus: "以海中沙子作为粮食。\n不同颜色的海兔兽相遇时，\n将会展开激烈无比的斗争。"
        zh_trad:
          legends_arceus: "以海中沙子作為糧食。\n不同顏色的海兔獸相遇時，\n將會展開激烈無比的鬥爭。"
