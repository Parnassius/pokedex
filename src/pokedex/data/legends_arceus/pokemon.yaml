        en:
          legends_arceus: "Some believe that its bell-like cry opens holes to another world.\nIt has been revered as a deity since ancient times."
        fr:
          legends_arceus: "Il est révéré depuis le temps jadis. On raconte que son cri,\nrappelant le son d’une cloche, peut ouvrir des brèches\nvers l’au-delà."
        it:
          legends_arceus: "Riverito come una divinità sin da tempi remoti. Si crede che,\nquando fa risuonare la sua voce a mo’ di campana, si apra\nun varco su un mondo altro."
        de:
          legends_arceus: "Seine Stimme erschallt wie Glockenschläge und soll Portale in\neine andere Welt öffnen können. Seit jeher wird es als Gottheit\nverehrt."
        es:
          legends_arceus: "Se le reverencia desde tiempos inmemoriales como una deidad\ncapaz de abrir una puerta al más allá con su grito similar al\ntañido de una campana."
        ko:
          legends_arceus: "종소리 같은 음색으로 울면\n다른 세계로 통하는 구멍이 열린다고 하여\n예로부터 신으로 추앙받기도 했다."
        zh_simp:
          legends_arceus: "据说当它发出钟声般的音色时，\n通往异界的洞穴便会开启。\n自古被视为神而受到供奉。"
        zh_trad:
          legends_arceus: "據說當牠發出鐘聲般的音色時，\n通往異界的洞穴便會開啟。\n自古就被視為神而受到供奉。"
