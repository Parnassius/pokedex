        en:
          legends_arceus: "Though impudent and difficult to tame, Purugly enjoys great\npopularity due to its fur, the beauty of which surpasses\neven velveteen."
        fr:
          legends_arceus: "Son caractère impudent le rend difficile à apprivoiser.\nIl jouit néanmoins d’une grande popularité grâce à\nsa fourrure plus somptueuse encore que le velours."
        it:
          legends_arceus: "Assai impudente, è ostico da ammansire. Gode nondimeno\ndi grande favore grazie alla splendida pelliccia, incantevole\npiù del velluto."
        de:
          legends_arceus: "Obgleich es unverschämt und schwer zu zähmen ist, erfreut es\nsich doch großer Beliebtheit. Dies hat es seinem schönen Fell zu\nverdanken, welches selbst Baumwollsamt in den Schatten stellt."
        es:
          legends_arceus: "Es desvergonzado y difícil de domesticar, pero su pelaje, más\nhermoso que el terciopelo, hace a este Pokémon muy popular."
        ko:
          legends_arceus: "후안무치하여 길들이기 까다롭지만\n벨벳보다도 아름다운 털을 가지고 있어서\n인기가 많다."
        zh_simp:
          legends_arceus: "性情厚颜无耻且极难驯服，\n但由于拥有更胜棉花绒的\n美丽皮毛，因此很受人欢迎。"
        zh_trad:
          legends_arceus: "性情厚顏無恥且極難馴服，\n但由於擁有更勝棉花絨的\n美麗毛皮，因此很受人歡迎。"
