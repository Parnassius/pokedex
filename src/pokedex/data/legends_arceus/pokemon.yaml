        - flying
      descriptions:
        jp_kanji:
          legends_arceus: "女人の姿より　変わりし現象。\n命　粗末にする者あれば　雲海より\n現れ　憤怒の罰を下し　容赦なし。"
        en:
          legends_arceus: "A different guise from its feminine humanoid form. From the\nclouds, it descends upon those who treat any form of life with\ndisrespect and metes out wrathful, ruthless punishment."
        fr:
          legends_arceus: "Ce Pokémon quitte son apparence de femme et revêt cette\nforme avant de se révéler entre les nuages pour châtier ceux\nqui négligent les êtres vivants. Sa colère est implacable."
        it:
          legends_arceus: "Mutato il sembiante da quello femmineo, emerge da mari\ndi nubi castigando con ira spietata coloro che disprezzano\nla vita."
        de:
          legends_arceus: "Es hat seine weibliche Gestalt abgelegt und stößt aus dem\nWolkenmeer herab, um all jene mit unerbittlichem Zorn\nzu strafen, die das Leben anderer nicht achten."
        es:
          legends_arceus: "Tras perder su apariencia femenina, surge de entre las nubes\ny, sin piedad alguna, desata toda su furia para castigar a\nquienquiera que menosprecie el don de la vida."
        ko:
          legends_arceus: "여인의 형상에서 변한 모습.\n목숨을 함부로 여기는 자가 있으면\n운해로부터 나타나서 자비 없는 분노의 벌을 내린다."
        zh_simp:
          legends_arceus: "自女人的姿态变化而成。若有谁\n做出糟蹋生命之事，便会从云海\n中现身，愤怒地降下无情的惩罚。"
        zh_trad:
          legends_arceus: "自女人的姿態變化而成。若有誰\n做出糟蹋生命之事，便會從雲海\n中現身，憤怒地降下無情的懲罰。"
