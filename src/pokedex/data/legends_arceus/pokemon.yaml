        jp_kanji:
          legends_arceus: "力弱く　愚鈍で　情けなし。　されど\n生命力　強く　濁水を　物ともせぬゆえ\nあらゆる土地にて　生息を　確認す。"
        en:
          legends_arceus: "A feeble, pitiful imbecile of a Pokémon that is nonetheless very\nhardy. Unperturbed by turbid water, it can be found living in all\nsorts of places."
        fr:
          legends_arceus: "Faible, sot, et plutôt pitoyable, ce Pokémon est en revanche\ntrès vivace, si bien qu’il parvient à survivre même en eau\ncroupie. C’est pour cette raison qu’on le trouve en tous lieux."
        it:
          legends_arceus: "È debole e poco accorto, tanto da suscitare pena.\nNondimeno, è assai tenace e può vivere finanche in acque\nfangose, perciò lo si trova in ogni dove."
        de:
          legends_arceus: "Dank unbändiger Lebenskraft vermag es dieses schwache und\nstumpfsinnige Pokémon, auch verschmutztem Wasser zum Trotz\nan allerlei Orten zu existieren."
        es:
          legends_arceus: "Es débil, inútil y patético, pero se ha constatado que tiene\ntal resistencia que tolera hasta aguas ponzoñosas, por lo\nque habita en todas partes."
        ko:
          legends_arceus: "나약하고 우둔하며 한심하지만 생명력이 강해서\n탁한 물에서도 아무렇지 않게 살기 때문에\n다양한 토지에서 서식 중인 것이 확인되었다."
        zh_simp:
          legends_arceus: "身体孱弱，心智驽钝，唯独\n生命力十分强劲，不惧浊水。\n故在所有地域都能发现其踪迹。"
        zh_trad:
          legends_arceus: "身體孱弱，心智駑鈍。唯獨\n生命力十分強勁，不懼濁水，\n故在所有地域都能發現其蹤跡。"
