      descriptions:
        jp_kanji:
          legends_arceus: "たおやかなる　翼　備え　無音にて\n飛翔す。　小刀に比肩す　鋭利なる羽根\n翼より　巧みに　飛ばす技　体得す。"
        en:
          legends_arceus: "Flies noiselessly on delicate wings. It has mastered the art of\ndeftly launching dagger-sharp feathers from those same wings."
        fr:
          legends_arceus: "Ses ailes gracieuses lui permettent de voler silencieusement\net de lancer des plumes aussi tranchantes qu’un poignard,\navec la plus grande dextérité."
        it:
          legends_arceus: "Volteggia cheto con ali leggiadre. Padroneggia tecniche\ncon cui gittare il piumaggio affilato, tagliente al pari di daghe."
        de:
          legends_arceus: "Dank der geschmeidigen Flügel gleitet es lautlos durch die Luft.\nAus seinem Gefieder kann es mit Geschick messerscharfe\nFedern schleudern."
        es:
          legends_arceus: "Sus gráciles alas le permiten volar sin hacer ruido. Lanza con\ngran pericia sus plumas, tan afiladas como dagas."
        ko:
          legends_arceus: "우아한 날개로 소리 없이 난다.\n단검에 비견되는 예리한 깃털을\n정교하게 날리는 기술을 갖추고 있다."
        zh_simp:
          legends_arceus: "靠一对柔韧的翅膀悄然无声地飞行。\n有着用翅膀将锋利程度不逊于小刀\n的羽毛巧妙地发射出去的本领。"
        zh_trad:
          legends_arceus: "靠一對柔韌的翅膀悄然無聲地飛行。\n有著用翅膀將鋒利程度不遜於小刀\n的羽毛巧妙地發射出去的本領。"
