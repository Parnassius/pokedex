        en:
          legends_arceus: "Cells similar to those of plants have been found in its fur.\nIts hard tail can fell a large tree with one stroke, and the tail’s\nsharpness exceeds even that of a sword crafted by a master."
        fr:
          legends_arceus: "Des cellules semblables à celles des végétaux ont été décelées\ndans sa fourrure. Sa queue robuste, plus affilée qu’un sabre\nde renom, peut trancher un arbre en un coup."
        it:
          legends_arceus: "Nel suo vello ho rinvenuto cellule analoghe a quelle vegetali.\nLa coda robusta, affilata più d’una spada pregiata, può recidere\nalberi massicci."
        de:
          legends_arceus: "In seinem Fell lassen sich pflanzenähnliche Zellen nachweisen.\nSein robuster Schweif ist schärfer als ein meisterlich gefertigtes\nSchwert und kann mit einem Streich große Bäume zweiteilen."
        es:
          legends_arceus: "Se han hallado células similares a las de las plantas en su pelaje.\nPuede cortar árboles en dos limpiamente gracias a su dura cola,\ntan afilada como una espada forjada con maestría."
        ko:
          legends_arceus: "체모에서 식물과 비슷한 세포가 검출되었다.\n튼튼한 꼬리는 거목을 일도양단하며\n그 예리함은 명검조차 뛰어넘는다."
        zh_simp:
          legends_arceus: "从体毛中可检出近似植物的细胞。\n坚硬的尾部能将大树一刀两断，\n锋利程度更胜名刀一筹。"
        zh_trad:
          legends_arceus: "從體毛中可檢出近似植物的細胞。\n堅硬的尾部能將大樹一刀兩斷，\n鋒利程度更勝名刀一籌。"
