        en:
          legends_arceus: "The silk coating its body is thin but sufficiently strong. Cascoon’s\nsilk has a luster and texture superior to that of Silcoon’s, and\nclothes made using Cascoon silk are regarded as top-notch."
        fr:
          legends_arceus: "Les fils de soie dans lesquels il s’enveloppe sont fins, mais\nrésistants. D’une qualité supérieure à ceux d’Armulys, ils servent\nà confectionner des vêtements réputés pour leur raffinement."
        it:
          legends_arceus: "Il filo che lo avvolge è fine ma ben resistente. Colore e fulgore\neccedono quelli del filo di Silcoon. È adoprato per\nla confezione di abiti di pregio."
        de:
          legends_arceus: "Es wickelt sich in feine, aber robuste Fäden, deren Glanz und\nFarbe denen von Schaloko überlegen sind. Daraus gefertigte\nKleidung gilt als besonders hochwertig."
        es:
          legends_arceus: "La seda que lo envuelve es fina pero resistente, y de un color y\nun lustre superiores a la de Silcoon. Las prendas hechas con ella\nson muy apreciadas."
        ko:
          legends_arceus: "몸을 감싸는 실은 가늘지만 충분히 튼튼하다.\n실쿤의 실보다 빛깔이 뛰어나서\n이로 지은 옷은 고급스럽다고 평가받는다."
        zh_simp:
          legends_arceus: "包裹全身的丝虽细，但强度十足，\n且色泽更胜甲壳茧的丝，\n以此织成的衣物被人们视为上品。"
        zh_trad:
          legends_arceus: "包裹全身的絲雖細，但強度十足，\n且色澤更勝甲殼繭的絲，\n以此織成的衣物被人們視為上品。"
