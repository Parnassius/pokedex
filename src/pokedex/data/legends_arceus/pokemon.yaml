        en:
          legends_arceus: "Its crimson claws contain a virulent toxin. This toxin can be made\ninto a tonic by diluting it, mixing it with several types of wild\ngrass, and boiling it down over two days."
        fr:
          legends_arceus: "Ses griffes vermillon contiennent un poison mortel. Si on dilue\nce poison et qu’on laisse infuser diverses plantes dans la solution\ndurant deux nuits, on obtient un puissant remède."
        it:
          legends_arceus: "Il potente veleno sito negli artigli scarlatti, se stemperato\ne fatto bollire per due notti con erbe selvatiche, produce\nun farmaco formidabile."
        de:
          legends_arceus: "Seine roten Klauen enthalten ein starkes Gift. Wenn man dieses\nverdünnt, mit mehreren Kräutern vermischt und zwei Tage lang\nkocht, entsteht daraus ein stärkendes Heilmittel."
        es:
          legends_arceus: "Las toxinas que segregan sus garras bermejas se transforman en\nuna potente medicina si se diluyen e infunden junto a ciertas\nhierbas durante dos días."
        ko:
          legends_arceus: "붉게 물든 손톱에 맹독을 품고 있다.\n독을 희석하여 여러 종류의 들풀과 섞은 뒤\n이틀 밤을 달이면 강장제가 된다."
        zh_simp:
          legends_arceus: "嫣红色的爪子上带有剧毒。\n将此毒稀释后混合数种野草，\n煎煮两晚即成强身健体之药。"
        zh_trad:
          legends_arceus: "嫣紅色的爪子上帶有劇毒。\n將此毒稀釋後混合數種野草，\n煎煮兩晚即成強身健體之藥。"
