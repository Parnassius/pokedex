        en:
          legends_arceus: "A bizarre Pokémon with but a single eye embedded in an iron\nsphere. I suspect this creature levitates due to the magnetism it\nemits from its arms, which resemble horseshoe-shaped magnets."
        fr:
          legends_arceus: "Cette curieuse sphère métallique dotée d’un œil léviterait\ngrâce à l’énergie magnétique émise par ses bras. Ces derniers\nressemblent à des aimants en forme de U."
        it:
          legends_arceus: "Ha la bizzarra forma di una sfera metallica con un sol occhio.\nSuppongo leviti grazie al magnetismo degli arti a ferro\ndi cavallo, simili a calamite."
        de:
          legends_arceus: "Diese seltsam aussehende einäugige Eisenkugel schwebt\nanscheinend dank der magnetischen Kraft, die sie mit ihren\nhufeisenförmigen Magnetarmen erzeugt."
        es:
          legends_arceus: "Su aspecto de bola metálica con un ojo resulta verdaderamente\nextraño. Suponemos que flota gracias al magnetismo de los\nimanes con forma de herradura a ambos lados de su cuerpo."
        ko:
          legends_arceus: "쇠구슬에 외눈이 달린 기묘한 모습이다.\n말굽자석처럼 생긴 팔에서 발생하는\n자력에 의해 부유하는 것이라 추정된다."
        zh_simp:
          legends_arceus: "铁球上长着一只眼睛的相貌可谓\n惊世骇俗。据推测，它是靠着马蹄形磁铁\n般的双臂发出的磁力让自己保持悬浮。"
        zh_trad:
          legends_arceus: "鐵球上長著一隻眼睛的相貌可謂奇異。\n據推測，牠是靠著馬蹄形磁鐵般的\n雙臂發出的磁力讓自己保持懸浮。"
