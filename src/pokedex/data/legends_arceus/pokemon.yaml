        en:
          legends_arceus: "Though it differs from other Basculin in several respects,\nincluding demeanor—this one is gentle—I have categorized\nit as a regional form given the vast array of shared qualities."
        fr:
          legends_arceus: "Bien qu’il diffère des autres Bargantua par bien des aspects,\nnotamment son tempérament pacifique, les nombreux traits qu’ils\npartagent me font penser que celui-ci est une forme régionale."
        it:
          legends_arceus: "Differisce da Basculin in vari rispetti, tra cui l’indole mite.\nCiò non ostante, i tratti in comune abbondano, perciò\nlo classifico come sua forma regionale."
        de:
          legends_arceus: "Trotz mancher Unterschiede, wie etwa des sanften Wesens, weist\nes etliche Gemeinsamkeiten mit Barschuft auf. Infolgedessen\nhabe ich es als Regionalform dieses Pokémon eingeordnet."
        es:
          legends_arceus: "A pesar de algunos rasgos que lo diferencian de otros Basculin,\ncomo su plácida naturaleza, puede considerarse una forma\nregional dado el vasto abanico de características compartidas."
        ko:
          legends_arceus: "온후한 성질 등, 차이점이 있지만\n배쓰나이의 특징을 다수 갖추고 있기에\n그것의 리전폼인 것으로 정의 내렸다."
        zh_simp:
          legends_arceus: "此宝可梦具有多项野蛮鲈鱼的特征，\n虽然有性情温驯等不同点存在，\n本人仍将其定义为野蛮鲈鱼的地区形态。"
        zh_trad:
          legends_arceus: "此寶可夢具有多項野蠻鱸魚的特徵，\n雖然有性情溫馴等不同點存在，\n吾人仍將其定義為野蠻鱸魚的地區形態。"
