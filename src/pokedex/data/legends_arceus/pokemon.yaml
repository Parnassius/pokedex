        jp_kanji:
          legends_arceus: "賑やかなる　市場に　時折　ふらりと\n姿　現す。　幼子が如く　人真似をし\n瞳を　輝かせ　人間の反応を　伺う。"
        en:
          legends_arceus: "Known to turn up in bustling marketplaces now and again.\nIt mimics people much as a child would, then watches how they\nreact, eyes sparkling."
        fr:
          legends_arceus: "Ce Pokémon apparaît de manière inopinée dans les marchés\nanimés. Il imite les êtres humains, comme le ferait un enfant,\net attend leur réaction, les yeux brillants."
        it:
          legends_arceus: "Si palesa di quando in quando in gremiti mercati.\nCon gli occhi rilucenti di curiosità, imita gli umani\ne ne osserva le reazioni alla stregua di un fanciullo."
        de:
          legends_arceus: "Ab und zu taucht es unerwartet auf lebhaften Märkten auf.\nWie ein kleines Kind ahmt es Menschen nach und beobachtet\ndann gespannt, wie sie darauf reagieren."
        es:
          legends_arceus: "A veces aparece en los mercados más bulliciosos. Imita a la\ngente como si se tratase de un niño y la observa con un brillo\nde expectación en la mirada para ver cómo reacciona."
        ko:
          legends_arceus: "번화한 시장에 불쑥 모습을 드러내서\n어린아이처럼 남을 흉내 내고는\n눈빛을 반짝이며 인간의 반응을 살핀다."
        zh_simp:
          legends_arceus: "有时会忽然出现在热闹的市场中，\n像幼童般模仿人类的行为，然后\n兴致勃勃地观察人们的反应。"
        zh_trad:
          legends_arceus: "有時會忽然出現在熱鬧的市場中，\n像幼童般模仿人類的行為，然後\n興致勃勃地觀察人們的反應。"
