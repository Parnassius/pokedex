      types:
        - fairy
      descriptions:
        jp_kanji:
          legends_arceus: "静寂たる　月夜に　耳を澄まし　月に\n棲む　仲間の声を　聴くと　伝承あり。\n遠き故郷を想う　我が姿を　重ね見る。"
        en:
          legends_arceus: "Legend says that on clear, quiet nights, it listens for the voices\nof its kin living on the moon. I, too, often think of my homeland,\nso far away."
        fr:
          legends_arceus: "Selon la légende, lorsque la nuit est quiète et étoilée, il tendrait\nl’oreille afin d’entendre les voix de ses congénères restés sur\nla lune. Le voir ainsi me rend nostalgique de ma région..."
        it:
          legends_arceus: "Si narra che nelle notti silenti contempli la luna in ascolto delle\nvoci di coloro che ivi lasciò, memore, come me, della sua\nlontana terra."
        de:
          legends_arceus: "Man sagt, es lausche in stillen und sternklaren Nächten den\nStimmen seiner Artgenossen auf dem Mond. In dieser Hinsicht\ngleicht es mir, der in der Fremde oft seiner Heimat gedenkt."
        es:
          legends_arceus: "Dicen que, en noches tranquilas y despejadas, este Pokémon\nse para a escuchar las voces de los compañeros que dejó atrás\nen la luna. Se ve que no soy el único que extraña su tierra natal."
        ko:
          legends_arceus: "고요한 달밤에 귀를 기울이고\n달에 사는 동료들의 소리를 듣는다는 전승이 있다.\n고향을 그리워하는 나의 모습이 겹쳐 보인다."
        zh_simp:
          legends_arceus: "传说中，它会在寂静的月夜里\n侧耳倾听月亮上伙伴们的声音。\n那身影就仿佛是思念着远方故乡的本人。"
        zh_trad:
          legends_arceus: "傳說中，牠會在寂靜的月夜裡\n側耳傾聽月亮上夥伴們的聲音。\n那身影就彷彿是思念遠方故鄉的吾人。"
