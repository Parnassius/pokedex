      descriptions:
        jp_kanji:
          legends_arceus: "青き蔓で　全身を　覆いたりて　正体\n見ること　能わず。　この蔓　噛めば\n清涼感あり　香辛料として　有用。"
        en:
          legends_arceus: "It is cloaked entirely in blue vines, preventing any glimpse of\nits true identity. The vines impart a refreshing sensation when\nchewed—they’re useful as a spice."
        fr:
          legends_arceus: "On ne peut distinguer son apparence, car son corps est caché\nsous ses lianes bleues. Celles-ci sont utilisées comme condiment,\ncar elles offrent une sensation de fraîcheur quand on les croque."
        it:
          legends_arceus: "Cela le membra dietro una fitta trama di liane cerulee.\nRefrigeranti se masticate, queste liane vengono adoprate\nper insaporire pietanze."
        de:
          legends_arceus: "Sein Körper ist gänzlich in blaue Ranken gehüllt, sodass seine\nwahre Gestalt ein Mysterium bleibt. Sie entfalten beim Kauen\neine frische Note im Mund und eignen sich daher gut als Gewürz."
        es:
          legends_arceus: "Las lianas azules que lo recubren impiden ver su verdadero\naspecto. Estas se usan como especia por la sensación\nrefrescante que producen al morderlas."
        ko:
          legends_arceus: "푸른 덩굴로 전신을 감싸고 있어서\n정체를 알 수 없다. 이 덩굴을 베어 물면\n청량감이 있어서 향신료로 사용된다."
        zh_simp:
          legends_arceus: "全身覆盖着蓝色藤蔓，难以\n窥见其真身。此藤蔓入口清凉，\n可作为辛香料使用。"
        zh_trad:
          legends_arceus: "全身覆蓋著藍色藤蔓，難以\n窺見其真身。此藤蔓入口清涼，\n可作為辛香料使用。"
