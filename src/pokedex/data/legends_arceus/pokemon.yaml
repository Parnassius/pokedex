        en:
          legends_arceus: "A curious item induced this evolution. The Pokémon’s offensive\ncapabilities have greatly increased, but the strangeness of its\nbehavior has magnified in equal measure. This worries me."
        fr:
          legends_arceus: "Un étrange objet l’a fait évoluer de nouveau. Le potentiel\noffensif de ce Pokémon a grandement augmenté, tout\ncomme son comportement curieux. Cela m’inquiète."
        it:
          legends_arceus: "Evolutosi di nuovo per mezzo di un singolare strumento,\nsfoggia un drastico sviluppo offensivo, ma l’accresciuta\nstranezza della sua condotta m’inquieta."
        de:
          legends_arceus: "Es entwickelte sich erneut mithilfe eines seltsamen Gegenstands.\nSeine offensive Stärke hat stark zugenommen, doch sein\nmerkwürdiges Verhalten leider auch. Das bereitet mir Sorgen."
        es:
          legends_arceus: "Un extraño objeto provocó esta nueva evolución. Su poder\nactual es claramente superior, mas el acrecentamiento de su\nconducta errática resulta verdaderamente preocupante."
        ko:
          legends_arceus: "기묘한 도구에 의해 또다시 진화했다.\n공격력이 대폭 향상되었으나, 그에 비례하여\n불가사의한 거동도 늘어나 걱정이 된다."
        zh_simp:
          legends_arceus: "凭借奇异的道具再次进化而成。\n虽然攻击力大幅提升，但随之而来\n的是更多难解的行为，令人担心。"
        zh_trad:
          legends_arceus: "憑藉奇異的道具再次進化而成。\n雖然攻擊力大幅提升，但隨之而來\n的是更多難解的行為，令人擔心。"
