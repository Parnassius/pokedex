        en:
          legends_arceus: "This purehearted Pokémon shares its eggs with the injured.\nThese eggs are so nutritious that they’ve been nicknamed\n“doctors’ doubles.”"
        fr:
          legends_arceus: "Ce Pokémon au cœur pur offre ses œufs aux personnes\nblessées, car ils contiennent tous les nutriments nécessaires\npour se maintenir en bonne santé."
        it:
          legends_arceus: "Puro di cuore, condivide con chi è ferito le sue nutrienti uova,\nnote ai più con il curioso epiteto di \"scacciadottore\"."
        de:
          legends_arceus: "Dieses reinherzige Pokémon teilt seine nahrhaften Eier mit\nVerletzten. Es heißt, der Verzehr dieser Eier erspare einem\nden Arztbesuch."
        es:
          legends_arceus: "Este Pokémon de corazón puro comparte con aquellos que\nestán heridos sus preciados huevos, comúnmente conocidos\ncomo \"alejamédicos\" por sus altas propiedades nutritivas."
        ko:
          legends_arceus: "마음씨가 고와 상처 입은 자에게\n알을 나눠 준다. 이 알은 아주 맛이 깊어서\n약이 필요 없다고 일컬어질 정도이다."
        zh_simp:
          legends_arceus: "天性善良，会将蛋分给伤者。\n此蛋营养丰富且滋味鲜美，\n有着“不求医”的别称。"
        zh_trad:
          legends_arceus: "心性善良，會將蛋分給傷者。\n此蛋營養豐富且滋味鮮美，\n有著不求醫的別名。"
