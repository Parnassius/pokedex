        en:
          legends_arceus: "Bidoof has an unsophisticated face and is rarely flustered by\nanything. There have been incidents involving Bidoof sauntering\ninto villages and gnawing on the houses without a single care."
        fr:
          legends_arceus: "Rien ne semble perturber ces Pokémon à l’apparence fruste.\nParfois, ils se rendent dans les villages, puis se mettent à\ngrignoter tranquillement les habitations."
        it:
          legends_arceus: "Sobri d’aspetto, nulla perturba questi Pokémon. Accade che\nsi palesino con flemma al villaggio e, con altrettanta flemma,\nprendano a rosicchiare case."
        de:
          legends_arceus: "Nichts bringt diese arglos dreinschauenden Pokémon aus dem\nKonzept. Bisweilen spazieren sie seelenruhig ins Dorf und nagen\ndie dortigen Häuser an."
        es:
          legends_arceus: "De expresión simplona y estoicismo apabullante. En ocasiones\nse cuelan en la villa como si tal cosa y se dedican a mordisquear\nlos edificios."
        ko:
          legends_arceus: "우직하게 생긴 얼굴과 만사에 동요하지 않는\n대범함을 가졌다. 태연하게 마을에 들어와선\n아무렇지 않게 집을 갉아 버린 사건이 있었다."
        zh_simp:
          legends_arceus: "表情木讷，遇到何事都能处之泰然。\n过去曾发生大牙狸光明正大地跑进村里，\n还光明正大地把房屋啃了一番的离奇事件。"
        zh_trad:
          legends_arceus: "表情木訥，遇到何事都能處之泰然。\n過去曾發生大牙狸光明正大地跑進村裡，\n還光明正大地把房屋啃了一番的妙事。"
