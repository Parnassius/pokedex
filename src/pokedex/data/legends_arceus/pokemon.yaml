        en:
          legends_arceus: "Full of vigor and always in high spirits. It was once known by the\nname “Lantern-Tail” and feared as some kind of apparition."
        fr:
          legends_arceus: "Il fait preuve d’une fougue ardente et déborde d’énergie.\nLes peuples antiques le nommaient « lutin-lanterne »\net le craignaient, pensant qu’il était un esprit malin."
        it:
          legends_arceus: "Creatura assai vivace, con il fuoco addosso. Veniva chiamato\n\"lanterga\" dagli antichi ed era temuto al pari di uno spirito\nmalevolo."
        de:
          legends_arceus: "Es brennt förmlich vor Tatendrang und Frohmut. In alten Zeiten\nwurde es „Fackelschweif“ genannt und als ein böser Geist\ngefürchtet."
        es:
          legends_arceus: "Un Pokémon lleno de energía y entusiasmo. La gente de\nantaño lo conocía como \"culinterna\" y era temido porque se\npensaba que se trataba de un espíritu maligno."
        ko:
          legends_arceus: "활기가 넘쳐서 항상 기세가 등등하다.\n과거에는 엉덩이에 초롱이 달렸다 하여\n요괴인 줄 알고 두려워하기도 했다."
        zh_simp:
          legends_arceus: "活力十足，时常充满斗志。\n自古被人们称为“臀点灯”，\n当成鬼怪的一种恐惧着。"
        zh_trad:
          legends_arceus: "活力十足，時時刻刻都充滿鬥志。\n自古被人們稱為「臀點燈」，\n當成鬼怪的一種恐懼著。"
