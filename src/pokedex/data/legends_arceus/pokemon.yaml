        en:
          legends_arceus: "Stories tell of this Pokémon being birthed from the boiling\nmagma within Mount Coronet. Its molten-steel body holds\nmany mysteries."
        fr:
          legends_arceus: "Une légende rapporte qu’il serait né du magma bouillant du\nMont Couronné. Son corps d’acier en fusion est fort étrange."
        it:
          legends_arceus: "Si narra che nacque dalle lave cocenti nel cuore del\nMonte Corona. Mi sfugge la vera natura delle sue membra\nd’acciaio fuso."
        de:
          legends_arceus: "Es heißt, dass dieses Pokémon im brodelnden Magma des\nKraterbergs geboren wurde. Sein Körper aus geschmolzenem\nStahl wirft viele Fragen auf."
        es:
          legends_arceus: "Cuentan las historias que nació del ardiente magma del Monte\nCorona. Su cuerpo de acero derretido supone toda una\nincógnita para nosotros."
        ko:
          legends_arceus: "천관산 내부의 끓어오르는\n용암에서 태어났다는 전승이 있다.\n녹아내린 강철의 몸은 그 정체를 알기 어렵다."
        zh_simp:
          legends_arceus: "传说中诞生自天冠山内部滚烫\n熔岩之中。由熔化的钢铁构成的\n身体充满未解之谜。"
        zh_trad:
          legends_arceus: "傳說中誕生自天冠山內部滾燙\n熔岩之中。由熔化的鋼鐵構成\n的身體，充滿未解之謎。"
