        en:
          legends_arceus: "Soars across the heavens at blinding speed—a magnificent sight!\nIt has a feral disposition. Utmost caution is required if one\nmeets a Garchomp out in the wilds."
        fr:
          legends_arceus: "Il sillonne les cieux dans un élan impressionnant, si rapide\nque les yeux peinent à le discerner. Il faut être prudent si\non le croise, car il est de nature agressive."
        it:
          legends_arceus: "Si libra nell’aere in magnifica posa, con foga tale da eludere\nl’occhio umano. Occorre cautela se lo si incontra allo stato\nbrado per via della sua tempra ferina."
        de:
          legends_arceus: "Seine in Windeseile am Himmel vorbeifliegende Gestalt ist ein\ngroßartiger Anblick. Es ist zudem sehr wild, also ist höchste\nVorsicht geboten, wenn man ihm in der Wildnis begegnet."
        es:
          legends_arceus: "Surca el cielo a velocidad vertiginosa y con una técnica\nimpecable. Debido a su carácter agreste, es vital mantenerse\nalerta en el exterior para evitar posibles encontronazos."
        ko:
          legends_arceus: "눈에 보이지 않을 정도의 기세로\n하늘을 나는 모습은 그야말로 장관이다.\n성격이 거칠기 때문에 경계해야 한다."
        zh_simp:
          legends_arceus: "以肉眼无法追上的迅疾速度\n翱翔天际的模样令人叹为观止。\n性情粗野，面对它时须保持戒备。"
        zh_trad:
          legends_arceus: "以肉眼無法追上的迅疾速度\n翱翔天際的模樣令人嘆為觀止。\n性情粗野，面對牠時須保持戒備。"
