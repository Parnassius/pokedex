      descriptions:
        jp_kanji:
          legends_arceus: "晴天ならば　実に　陽気に　活動。\nされど　日が　陰れば　即座に\n花弁を　閉じて　動きを　止める。"
        en:
          legends_arceus: "Cheerfully active on sunny days. Immediately closes its petals\nand becomes immobile once the sun becomes hidden, however."
        fr:
          legends_arceus: "Il devient très actif dès lors que le temps est ensoleillé.\nSitôt que le ciel s’ennuage, il se love dans ses pétales\net ne remue plus d’une feuille."
        it:
          legends_arceus: "Nelle giornate soleggiate è assai alacre e gioviale.\nPurtuttavia al calar del sole chiude tosto i petali, cessando\nogni attività."
        de:
          legends_arceus: "Bei Sonnenschein ist es äußerst rege, doch sobald Wolken\naufziehen, schließt es umgehend seine Blütenblätter und\nbewegt sich nicht mehr."
        es:
          legends_arceus: "Rebosa alegría y energía siempre que brilla el sol y hace buen\ntiempo. En cuanto se nubla el día, se queda inerte y sus pétalos\nse pliegan."
        ko:
          legends_arceus: "날씨가 맑으면 실로 활발하게 움직인다.\n하지만 날이 저물면 곧바로 꽃잎을 닫고는\n움직임을 멈춘다."
        zh_simp:
          legends_arceus: "一到了晴天就会非常积极地\n活动起来，但只要太阳被遮住，\n就会立刻闭上花瓣停止动作。"
        zh_trad:
          legends_arceus: "一到了晴天就會非常積極地\n活動起來，但只要太陽被遮住，\n就會立刻閉上花瓣停止動作。"
shellos:
