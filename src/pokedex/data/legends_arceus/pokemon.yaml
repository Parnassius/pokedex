        en:
          legends_arceus: "Appears where there is clean spring water. The fruit that grows\non the shrubs on its shell is sweet, nutritious, and truly delicious."
        fr:
          legends_arceus: "Ce Pokémon se manifeste là où surgit l’eau pure des sources.\nÀ la fois doux et nourrissants, les fruits qui poussent sur\nles arbres de sa carapace sont tout à fait exquis."
        it:
          legends_arceus: "Si manifesta laddove sgorgano sorgenti d’acqua pura.\nSulla schiena crescono piante dai frutti dolci e nutrienti,\nin verità deliziosi."
        de:
          legends_arceus: "Es erscheint an Orten, wo klares Quellwasser entspringt.\nDie süßen Früchte, die an den Büschen auf seinem Panzer\nwachsen, sind nahrhaft und äußerst delikat."
        es:
          legends_arceus: "Aparece cerca de manantiales de agua pura. Los frutos de las\nplantas que crecen sobre su lomo son muy dulces y nutritivos,\nverdaderas delicias."
        ko:
          legends_arceus: "맑은 샘물이 있는 곳에 나타난다.\n등껍질의 나무에서 자란 열매는 달고\n영양분도 풍부하며 참으로 맛있다."
        zh_simp:
          legends_arceus: "出现在清泉涌出的地方。\n壳上树木所生的果实滋味甘甜\n且营养丰富，十分美味。"
        zh_trad:
          legends_arceus: "出現在清泉湧出的地方。\n殼上樹木所生的果實滋味甘甜\n且營養豐富，十分美味。"
