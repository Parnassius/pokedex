  forms:
    arceus_normal_type:
      form_id: 0
      names:
        jp_kanji: アルセウスのすがた
        en: Arceus
        fr: Forme d’Arceus
        it: Forma di Arceus
        de: Arceus
        es: Forma de Arceus
        ko: 아르세우스의 모습
        zh_simp: 阿尔宙斯的样子
