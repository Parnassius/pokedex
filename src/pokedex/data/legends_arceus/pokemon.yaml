        en:
          legends_arceus: "Its face is sturdy—as strong as diamond—and this hardness\noffers a very stable defense. Much about this species is still\nunknown, such as its natural habitat."
        fr:
          legends_arceus: "Puisque sa tête est dure comme du diamant, la défense\nde ce Pokémon est inébranlable. Mais j’ai encore beaucoup\nà découvrir à son sujet, comme son habitat, par exemple."
        it:
          legends_arceus: "Vanta una difesa inespugnabile grazie al viso massiccio,\ninscalfibile al pari di un diamante. Il suo habitat e altri dati\necologici restano prevalentemente ignoti."
        de:
          legends_arceus: "Sein robustes Gesicht ist so hart wie ein Diamant und bietet ihm\noptimalen Schutz. Viele Aspekte dieses Pokémon sind noch\nunbekannt, wie zum Beispiel sein natürlicher Lebensraum."
        es:
          legends_arceus: "Su rostro, duro cual diamante, le proporciona una defensa\nférrea. Todavía desconocemos cuál es su hábitat natural, entre\nmuchos otros datos."
        ko:
          legends_arceus: "튼튼한 얼굴은 강철에 비견되는 강도이며\n철벽의 방어력을 자랑한다.\n서식지 등, 밝혀지지 않은 것이 많다."
        zh_simp:
          legends_arceus: "强固无比的脸部硬度堪比金刚石，\n使得它在守备方面固若金汤。包括\n栖息地在内的诸多信息至今不明。"
        zh_trad:
          legends_arceus: "強固無比的臉部硬度堪比金剛石，\n使得牠在守備方面固若金湯。包括\n棲息地在內的諸多資訊至今不明。"
