        en:
          legends_arceus: "Known as the Being of Emotion. In legend, this Pokémon was\nfeared, as any who showed disrespect would have their\nemotions thrown into disarray."
        fr:
          legends_arceus: "Aussi nommé « l’être de l’émotion », ce Pokémon est redouté.\nLes légendes rapportent qu’il bouleverserait les émotions\nde ceux qui ignorent le respect, les rendant ainsi fous."
        it:
          legends_arceus: "Porta l’epiteto di \"divinità delle emozioni\".\nÈ temuto per via del mito secondo il quale può scombussolare\nle emozioni degli irriverenti."
        de:
          legends_arceus: "Dieses Pokémon ist auch als das „fühlende Wesen“ bekannt.\nDen Legenden nach wird es gefürchtet, da es die Gefühlswelt\nrespektloser Menschen ins Chaos stürzt."
        es:
          legends_arceus: "Temido por muchos, pues, según el folclore, hace enloquecer a\nla gente que no respeta a los demás. Recibe el sobrenombre de\nSer de la Emoción."
        ko:
          legends_arceus: "감정의 신이라는 이명을 가졌다.\n불경한 자의 감정을 어지럽힌다는\n전승이 있어서 두려움을 사는 포켓몬이다."
        zh_simp:
          legends_arceus: "有着感情之神别名的宝可梦。\n传说它会令对其不敬之人的\n感情失控，因而受到人们畏惧。"
        zh_trad:
          legends_arceus: "有著感情之神別名的寶可夢。\n傳說牠會令對其不敬之人的\n感情失控，因而受到人們畏懼。"
