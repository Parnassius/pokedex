        en:
          legends_arceus: "This Pokémon has an unparalleled horn. Heracross itself\ndemonstrates tremendous power—it’s capable of throwing\nseveral people trained in the traditional arts of war at once."
        fr:
          legends_arceus: "Scarhino possède une corne unique en son genre\net une force telle qu’il peut projeter en un coup\nplusieurs individus qui excellent en arts martiaux."
        it:
          legends_arceus: "Vanta un incomparabile corno e una forza tale\nda scaraventare nell’aere in un sol colpo numerosi\nlottatori esperti di arti marziali."
        de:
          legends_arceus: "Dieses Pokémon demonstriert gern seine enorme Stärke, mit der\nes mehrere geschulte Kämpfer auf einen Schlag wegschleudern\nkann. Sein imposantes Horn sucht seinesgleichen."
        es:
          legends_arceus: "Su cuerno no tiene rival. Su hercúlea fuerza es tal que podría\nlanzar a varios maestros fornidos de artes marciales a la vez."
        ko:
          legends_arceus: "비할 데 없는 뿔을 갖고 있다. 힘겨루기로\n전통 무술에 조예가 있는 장사들 여럿을\n한 번에 날려 버릴 정도로 강력하다."
        zh_simp:
          legends_arceus: "头顶的巨角强健无比。论起力气，\n它刚猛的劲力足以将数名熟习\n传统武艺的大力士一并摔出老远。"
        zh_trad:
          legends_arceus: "頭頂的巨角強健無匹。論起力氣，\n牠剛猛的勁力足以將數名熟習\n傳統武藝的大力士一併摔出老遠。"
