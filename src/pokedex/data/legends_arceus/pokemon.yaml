      descriptions:
        jp_kanji:
          legends_arceus: "姿を　見ることは　極めて　稀。\n同種で　頭を　打ち合い　争うとき\n鐘の音に　似た　轟音が　響く。"
        en:
          legends_arceus: "An incredibly rare sight. They duel each other by ramming their\nheads together, and the resulting sound echoes throughout the\narea like the pealing of a bell."
        fr:
          legends_arceus: "Il est très rare d’apercevoir ce Pokémon. Lorsque deux\nspécimens se querellent, leurs têtes s’entrechoquent et\nproduisent un son qui rappelle celle d’une cloche qui résonne."
        it:
          legends_arceus: "Questi Pokémon si palesano assai di rado. Lottano tra simili\ncozzando le dure teste, che risuonano come fragorose campane."
        de:
          legends_arceus: "Man bekommt es nur selten zu Gesicht. Rammen Artgenossen\nim Kampf die Schädel aneinander, ertönt ein lauter Knall,\nder Glockenklang ähnelt."
        es:
          legends_arceus: "Un Pokémon extremadamente difícil de localizar. Si dos\nCranidos chocan las cabezas al pelear, el sonido del golpe\nresuena como el tañido de una campana."
        ko:
          legends_arceus: "모습을 보이는 경우는 매우 드물다.\n같은 종끼리 머리를 부딪치며 다툴 때\n종소리 같은 굉음이 울려 퍼진다."
        zh_simp:
          legends_arceus: "极其少见的宝可梦。\n同种的两只相争时会以头互撞，\n发出宛如钟声的轰隆声响。"
        zh_trad:
          legends_arceus: "極其少見的寶可夢。\n同種的兩隻相爭時會以頭互撞，\n發出好似鐘聲的轟隆聲響。"
