        jp_kanji:
          legends_arceus: "壁をすり抜け　何処にでも　姿　現す\n恐ろしき悪霊。　舌で　舐められし者\n日に日に　衰弱し　死に至るとの噂。"
        en:
          legends_arceus: "This frightful, malevolent spirit can glide through walls,\nappearing wherever it likes. According to rumor, victims of\na Haunter’s lick will wither to death day by day."
        fr:
          legends_arceus: "Cet esprit malin peut apparaître en tous lieux en traversant\nles murs. J’ai ouï dire que les personnes qu’il lèche\ns’affaiblissent de jour en jour avant de trépasser."
        it:
          legends_arceus: "Terrifico spirito malevolo, scivola tra le pareti, palesandosi\nin ogni dove. Si dice che chi viene da lui leccato languisca\nfino a soccombere."
        de:
          legends_arceus: "Dieser böse Geist kann durch Wände schlüpfen und überall\nerscheinen. Leckt er einen mit der Zunge, wird man Gerüchten\nzufolge allmählich schwächer und scheidet schließlich dahin."
        es:
          legends_arceus: "Es un espíritu maligno que puede atravesar paredes y aparecer\nen cualquier lugar. Se rumorea que aquellos a los que lame se\ndebilitan día tras día y sucumben poco después."
        ko:
          legends_arceus: "벽을 통과하며 어디에서든 모습을 드러내는\n무서운 악령. 혀로 핥은 자는 날이 갈수록\n쇠약해지다 죽음에 이른다는 소문이 있다."
        zh_simp:
          legends_arceus: "能够穿墙透壁，出现在任何地方的\n恐怖恶灵。传说被它的舌头舔过的人\n将会日渐衰弱，最后丧命。"
        zh_trad:
          legends_arceus: "能夠穿牆透壁，出現在任何地方的\n恐怖惡靈。傳說被牠的舌頭舔過的人\n將會日漸衰弱，最後喪命。"
