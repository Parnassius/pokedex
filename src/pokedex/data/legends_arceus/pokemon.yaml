        jp_kanji:
          legends_arceus: "群れから　離れ　単独で　生き抜く\n力を　得たり。　巨漢　鷲掴みにし\n連れ去る　飛翔力は　脅威なり。"
        en:
          legends_arceus: "It has left the flock, having gained strength enough to survive on\nits own. The astounding force with which Staraptor flies through\nthe air allows it to carry away large, burly targets."
        fr:
          legends_arceus: "Il est devenu assez fort pour quitter sa colonie et vivre seul.\nSon impressionnante puissance de vol lui permet de s’agripper\nà des proies gigantesques et de les emporter dans les airs."
        it:
          legends_arceus: "Ha acquisito la forza di vivere in autonomia lungi dallo stormo.\nImpressiona la sua abilità nel volo, che è tale da permettergli\ndi ghermire e trarre via con sé colossi."
        de:
          legends_arceus: "Es hat sich vom Schwarm gelöst, da es nun stark genug ist,\num allein zu überleben. Aufgrund seiner immensen Flugkraft\nkann es sogar Hünen packen und verschleppen."
        es:
          legends_arceus: "Su poder es tal que ya no necesita ir en bandada. Sus potentes\ngarras y alas suponen una amenaza para las presas que caza al\nvuelo."
        ko:
          legends_arceus: "무리를 떠나 혼자 살아갈 수 있게 되었다.\n거한을 붙잡은 채로 날아갈 수 있을 정도로\n날갯짓하는 힘은 매우 위협적이다."
        zh_simp:
          legends_arceus: "获得了离开群体独立生存的能力。\n就连壮汉也能一把抓起带走的\n飞行能力是一大威胁。"
        zh_trad:
          legends_arceus: "獲得了離開群體獨力生存的能力。\n就連壯漢也能一把攫起帶走的\n飛行能力是一大威脅。"
