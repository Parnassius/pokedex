        en:
          legends_arceus: "Extremely violent. When hunting, it wastes none of its energy,\naiming only for prey’s most vulnerable spots. Any who manage\nto tame this Pokémon must be of incredible bravery."
        fr:
          legends_arceus: "Ce Pokémon au tempérament extrêmement brutal chasse\nses proies en s’attaquant directement à leurs points vitaux.\nSeuls les braves peuvent l’apprivoiser."
        it:
          legends_arceus: "D’indole assai feroce, soltanto i prodi riescono ad\nassoggettarlo. Durante la caccia mira ai punti vitali, evitando\nqualsivoglia sperpero di energie."
        de:
          legends_arceus: "Es ist von Natur aus äußerst brutal. Bei der Jagd vergeudet es\nkeine Energie und zielt nur auf die Schwachstellen der Beute ab.\nUm dieses Pokémon zu zähmen, bedarf es viel Mut."
        es:
          legends_arceus: "Cuando caza, apunta a los puntos débiles de sus presas para no\nmalgastar ni un solo movimiento. Hacen falta agallas para\nrelacionarse con esta especie dada su extrema agresividad."
        ko:
          legends_arceus: "성질이 매우 흉포하다. 먹이를 사냥할 때\n급소만을 노려 공격에 군더더기가 없다.\n이 종을 길들여 낸 자는 필시 매우 용감할 것이다."
        zh_simp:
          legends_arceus: "性情极其凶暴，狩猎时会看准猎物的\n要害出击，不会有任何多余动作。\n能驯服此种宝可梦的人堪称豪杰。"
        zh_trad:
          legends_arceus: "性情極其凶暴，狩獵時會看準獵物的\n要害出擊，不會有任何無謂動作。\n能馴服此種寶可夢的人堪稱豪傑。"
