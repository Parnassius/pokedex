        jp_kanji:
          legends_arceus: "その翅　彼方　透け見えるほど　薄く\n頼りなし。　しかれども　飛翔し際は\n大気乱し　人家　吹き飛ばす　力あり。"
        en:
          legends_arceus: "Its frail wings are so thin that one can see clear through them.\nHowever, during flight these wings exhibit the power to churn\nair with force enough to launch a house skyward."
        fr:
          legends_arceus: "Ses ailes sont si fragiles et si fines que l’on voit à travers.\nElles peuvent toutefois provoquer des bourrasques assez\npuissantes pour souffler une habitation lorsque Yanma vole."
        it:
          legends_arceus: "Le sottili ali traslucide parrebbero inaffidabili, eppure possono\ncagionare nell’aere correnti tali da spazzare via case."
        de:
          legends_arceus: "Seine zarten Flügel sind so dünn, dass man hindurchsehen kann.\nBeim Fliegen wirbelt es mit diesen jedoch einen starken Wind\nauf, der selbst ganze Häuser wegzufegen vermag."
        es:
          legends_arceus: "Sus delicadas alas son tan finas que es posible ver a través\nde ellas y, sin embargo, al volar provoca ondas capaces de\nllevarse por delante una casa."
        ko:
          legends_arceus: "반대편이 비칠 정도로 얇고 가녀린\n날개를 가졌다. 하지만 날갯짓의 위력은\n대기를 어지럽히고 민가를 날려 버릴 정도다."
        zh_simp:
          legends_arceus: "翅膀看似脆弱，薄到可以透光。\n然而当它飞翔之时却能拂乱大气，\n发挥足以吹倒家屋的强劲力度。"
        zh_trad:
          legends_arceus: "翅膀看似脆弱，薄到可以透光。\n然而當牠飛翔之時卻能拂亂大氣，\n發揮足以吹倒家屋的強勁力道。"
espeon:
  species_id: 196
  names:
