        jp_kanji:
          legends_arceus: "水温　暖かな　磯辺に　多し。\n存外　人懐っこく　這い寄るが\n粘液に　まみれるため　注意。"
        en:
          legends_arceus: "Found in abundance on seashores bordering warm waters.\nShellos are unexpectedly friendly and will crawl toward any\nperson they see. Take care not to get coated in mucus!"
        fr:
          legends_arceus: "Ce Pokémon très amical gîte dans les eaux chaudes des zones\ncôtières. Peu farouche, il n’hésite pas à s’approcher, alors\nattention à ne pas finir recouvert de mucus gluant !"
        it:
          legends_arceus: "Prospera nelle miti acque costiere. Curiosamente amichevole,\nsi appropinqua di buon grado agli umani, cospargendoli di bava\nda capo a piè."
        de:
          legends_arceus: "Man findet es häufig an Küsten warmer Gewässer. Zwar kriecht\nes überraschend zutraulich auf Menschen zu, doch man sollte\nsich vorsehen, um nicht von seinem Schleim bedeckt zu werden."
        es:
          legends_arceus: "Prospera en las costas de aguas cálidas. Es sorprendentemente\nsociable y se acercará a cualquiera que vea. ¡Hay que procurar\nno acabar cubierto de moco!"
        ko:
          legends_arceus: "수온이 따뜻한 해변에 많이 있다.\n의외로 사람을 잘 따라서 접근해오지만\n점액투성이가 될 수 있으니 주의가 필요하다."
        zh_simp:
          legends_arceus: "多数生息在水温较暖的岩岸。\n性情意外地亲人，会主动靠近过来，\n但要小心被它的黏液沾满全身。"
        zh_trad:
          legends_arceus: "多數生息在水溫較暖的岩岸。\n性情意外地親人，會主動靠近過來，\n但要小心被牠的黏液沾滿全身。"
