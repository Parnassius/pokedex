          legends_arceus: "霹靂閃電　姿　現す。　尾に　連なりし\n珠より　雷撃　降り注ぎ　敵を　一掃。\n威力　凄まじく　一片すら　残らず。"
        en:
          legends_arceus: "Quick as a flash, it materializes out of nowhere. It pulverizes\nfoes into nothingness with showers of devastatingly powerful\nlightning bolts launched from the string of orbs on its tail."
        fr:
          legends_arceus: "Ce Pokémon se révèle quand le tonnerre gronde. Il fait pleuvoir\ndes éclairs d’une puissance démesurée depuis les orbes sur\nsa queue, et réduit ses ennemis à néant."
        it:
          legends_arceus: "Si manifesta come fragor di tuono e sfolgorar di fulmine. Scaglia\nsaette dalle sfere concatenate nella coda, annientando gli\ninimici con potenza sì tremenda da non lasciarne un minuzzolo."
        de:
          legends_arceus: "Es erscheint aus dem Nichts mit der Wucht von Blitz und Donner\nund pulverisiert Feinde mittels mächtiger Blitze, die es aus den\naneinandergereihten Kugeln an seiner Rute herabregnen lässt."
        es:
          legends_arceus: "Aparece a la velocidad del rayo. Por los orbes de la cola lanza\nuna lluvia de rayos de tal potencia que fulmina a sus rivales y\nno deja rastro alguno de ellos."
        ko:
          legends_arceus: "뇌정벽력과 같이 모습을 드러낸다.\n꼬리에 달린 구슬에서 전격을 내리쳐 적을 일소한다.\n위력이 어마어마하여 부스러기도 남지 않는다."
        zh_simp:
          legends_arceus: "在闪电霹雳中现身。会自尾部的\n连串珠子降下雷击扫荡敌手。\n惊人的威力足以令敌手片甲不留。"
        zh_trad:
          legends_arceus: "在閃電霹靂中現身。會自尾部的\n連串珠子降下雷擊掃蕩敵手。\n驚人的威力足以令敵手片甲不留。"
