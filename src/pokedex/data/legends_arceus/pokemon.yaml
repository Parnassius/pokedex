        en:
          legends_arceus: "Much remains unknown about this Pokémon, as few have ever\nseen it. However, we know that it is calm and dislikes conflict,\nand it enjoys polishing its face against trees and rocks."
        fr:
          legends_arceus: "Ce Pokémon est entouré de mystère, car peu l’ont rencontré.\nDe nature placide, il n’aime guère les conflits et préfère polir\nsa tête sur les arbres et les rochers."
        it:
          legends_arceus: "Una creatura grandemente misteriosa, per lo più sconosciuta.\nD’indole gentile, rifugge la lotta, preferendo levigare il viso\ncontro alberi e rocce."
        de:
          legends_arceus: "Da man es nur selten sieht, gleicht dieses Pokémon einem\nMysterium. Es ist sanftmütig, verabscheut Konflikte und poliert\ngerne sein Gesicht an Bäumen und Felsen."
        es:
          legends_arceus: "Un Pokémon rodeado de misterio, ya que son pocos los que\nhan logrado avistarlo. De carácter pacífico, prefiere pulir su\nrostro con rocas y árboles que enzarzarse en disputas."
        ko:
          legends_arceus: "보았다는 자가 적고 수수께끼투성이다.\n성품이 온화하여 다툼을 꺼리고\n목석에 얼굴을 문지르는 것을 좋아한다."
        zh_simp:
          legends_arceus: "十分少见，充满未解之谜的\n宝可梦。性情温和不喜斗争，\n爱用木石来打磨自己的脸。"
        zh_trad:
          legends_arceus: "十分少見，充滿未解之謎的\n寶可夢。性情溫和不喜鬥爭，\n愛用木石來打磨自己的臉。"
