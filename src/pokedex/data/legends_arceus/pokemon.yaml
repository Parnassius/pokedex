          legends_arceus: "This creature’s fur is most mysterious—it is wholly impervious to\nthe burning touch of flame. Should Quilava turn its back to you,\ntake heed! Such a posture indicates a forthcoming attack."
        fr:
          legends_arceus: "Ce Pokémon possède un pelage étrange qui ne peut pas\nprendre feu. S’il vous tourne le dos, prenez garde !\nCela veut dire qu’il va passer à l’attaque."
        it:
          legends_arceus: "Giammai s’è visto il suo misterioso vello prendere fuoco.\nAllorché rivolge il dorso, è d’uopo prendere riparo, giacché\nè una palese avvisaglia d’attacco."
        de:
          legends_arceus: "Es besitzt ein wundersames Fell, das niemals Feuer fängt.\nDreht es einem den Rücken zu, ist Vorsicht geboten.\nDamit signalisiert es, dass es im Begriff ist anzugreifen."
        es:
          legends_arceus: "Posee un misterioso pelaje que nunca prende fuego. Hay\nque prestar mucha atención si te da la espalda, pues esa\nes la señal de que se dispone a atacar."
        ko:
          legends_arceus: "절대로 타지 않는 신비로운 털을 가졌다.\n등을 이쪽으로 돌린다면\n공격하겠다는 신호이므로 주의해야 한다."
        zh_simp:
          legends_arceus: "拥有一身绝不会被点燃的奇异体毛。\n当它背向自己时须特别小心，\n这是它将发动攻击的信号。"
        zh_trad:
          legends_arceus: "擁有一身絕不會被點燃的奇異體毛。\n當牠背向己方時須特別小心，\n這是牠將發動攻擊的信號。"
