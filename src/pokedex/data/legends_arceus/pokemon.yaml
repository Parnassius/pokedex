        en:
          legends_arceus: "It is able to emit powerful magnetism, allowing it control over\nthe iron sand that forms its luscious mustache. Using this iron\nsand, Probopass forms hard stones with which it smites its prey."
        fr:
          legends_arceus: "Sa moustache est faite de sable ferrugineux qu’il a accumulé\ngrâce à son magnétisme puissant. Il s’en sert pour créer un\ngravier dur, qu’il utilise pour abattre ses proies."
        it:
          legends_arceus: "Genera forti campi magnetici con cui manovra la sabbia ferrosa\nimmagazzinata a guisa di baffi. Attacca le prede con dure selci\ne le abbatte."
        de:
          legends_arceus: "Sein prächtiger Schnurrbart ist in Wirklichkeit ein großer Haufen\nEisensand, den es mit seinem starken Magnetismus kontrolliert.\nEs formt harte Steine, mit denen es seine Beute niederstreckt."
        es:
          legends_arceus: "Su tupido bigote es en realidad un cúmulo de polvo de hierro\nque atrae con su magnetismo y que puede controlar a voluntad.\nForma duros proyectiles con los que derriba a sus presas."
        ko:
          legends_arceus: "강한 자력을 발산하여, 멋들어진 수염처럼 모아 둔\n대량의 사철을 부리는 능력을 가졌다.\n단단한 돌멩이로 사냥감을 공격하여 쓰러뜨린다."
        zh_simp:
          legends_arceus: "能发出强大的磁力，自在操纵像\n浓密胡子般积蓄在身上的大量铁沙。\n会发射坚硬的块状物攻击猎物。"
        zh_trad:
          legends_arceus: "能發出強大的磁力，自在操縱像\n濃密鬍子般積蓄在身上的大量鐵沙。\n會發射堅硬的塊狀物攻擊獵物。"
