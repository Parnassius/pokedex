        jp_kanji:
          legends_arceus: "角を　高速回転させ　岩盤を　穿つ。\n甲冑が如き　硬き皮膚は　溶岩の熱を\n物ともせず　火山地帯を　闊歩す。"
        en:
          legends_arceus: "Rapidly rotates its horn to bore through bedrock. It swaggers\naround volcanic regions, protected from the lava’s heat by its\ntough, armorlike hide."
        fr:
          legends_arceus: "Il fait tourner sa corne vélocement pour percer la roche.\nSon épiderme aussi dur qu’une armure lui permet de se mouvoir\ndans les régions volcaniques sans craindre la chaleur de la lave."
        it:
          legends_arceus: "Rotea il corno ad alta velocità per perforare la roccia.\nLa sua cute, solida come una corazza, ben tollera la lava\ndi incandescenti lande vulcaniche."
        de:
          legends_arceus: "Mit schnellen Rotationsbewegungen bohrt es sein Horn in\nFelsgestein. Es kann problemlos durch Vulkanregionen streifen,\nda seine harte, panzerähnliche Haut es vor Lavahitze schützt."
        es:
          legends_arceus: "Gira su cuerno a gran velocidad para taladrar rocas. Se pasea\npor zonas volcánicas como si nada gracias a su piel, dura\ncual coraza, que resiste el calor de la lava."
        ko:
          legends_arceus: "뿔을 고속으로 회전시켜서 암반을 꿰뚫는다.\n갑주처럼 단단한 피부 덕에 용암의 열에도\n끄떡없이 화산 지대를 활보한다."
        zh_simp:
          legends_arceus: "高速旋转的钻角能够穿透岩石。\n甲胄般坚硬的皮肤不惧熔岩高温，\n使它得以横行于火山地带。"
        zh_trad:
          legends_arceus: "高速旋轉的鑽角能夠穿透岩石。\n甲冑般堅硬的皮膚不懼熔岩高溫，\n使牠得以橫行於火山地帶。"
