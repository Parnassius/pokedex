        en:
          legends_arceus: "It has no discernible heartbeat and does not seem to draw\nbreath, and yet it appears to function without issue. I cannot\neven begin to explain this utterly bizarre anomaly."
        fr:
          legends_arceus: "Il ne présente ni souffle ni rythme cardiaque, mais cela\nne semble pas être une contrainte pour lui. Je ne saurais\ndonner une explication à tout cela..."
        it:
          legends_arceus: "Non ci è dato avvertire il pulsare del suo cuore o il respiro,\neppure ciò non ne ostacola l’attività. Una singolare creatura\nche lascia perplessi."
        de:
          legends_arceus: "Dieses sonderbare Wesen ist ein Buch mit sieben Siegeln.\nObgleich sich weder Herzschlag noch Atmung nachweisen\nlassen, scheint sein Körper einwandfrei zu funktionieren."
        es:
          legends_arceus: "No hemos percibido respiración ni pulso algunos, mas su\ncuerpo parece funcionar sin problema. Es tan extraño que me\ntiene perplejo."
        ko:
          legends_arceus: "심장 소리가 들리지 않고 호흡하는 기척조차\n느껴지지 않지만 활동에 지장이 없어 보인다.\n너무나도 기묘하여 어찌 된 일인지 모르겠다."
        zh_simp:
          legends_arceus: "听不见心脏鼓动，亦感受不到\n它的呼吸，但毫不影响它的行动。\n太过不可思议以致完全无法理解。"
        zh_trad:
          legends_arceus: "聽不見心臟鼓動，亦感受不到\n牠的呼吸，但毫不影響牠的行動。\n太過不可思議以致完全無法理解。"
