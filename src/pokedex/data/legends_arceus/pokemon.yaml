        jp_kanji:
          legends_arceus: "万年雪　覆いし　聖なる山に　棲む。\n心　善なる者が　山道　迷うとき\n姿見せ　麓まで　導くと　伝わる。"
        en:
          legends_arceus: "Dwells on sacred peaks perpetually covered in snow. Said to\nappear to virtuous people who have lost their way on mountain\npaths—it then guides them back down to the mountain’s base."
        fr:
          legends_arceus: "Il habite les sommets sacrés couverts de neige éternelle.\nOn raconte qu’il se montre aux personnes vertueuses\négarées pour les guider au pied de la montagne."
        it:
          legends_arceus: "Dimora su vette sacre coperte da nevi perenni. Talune leggende\nnarrano che si palesi per scortare a valle le persone d’animo\nprobo che han smarrito il sentiero."
        de:
          legends_arceus: "Es bewohnt heilige Berge, die mit ewigem Schnee bedeckt sind.\nMan sagt, es zeige sich gutherzigen Menschen, die sich\nverlaufen haben, um sie zum Fuße des Berges zu geleiten."
        es:
          legends_arceus: "Habita en montañas sagradas de nieves eternas. Se dice que se\naparece ante las personas de buen corazón que se extravían y\nlas guía hasta el pie de la montaña."
        ko:
          legends_arceus: "만년설에 뒤덮인 신성한 산에 산다.\n마음이 선한 자가 산길을 헤맬 때 나타나\n산기슭까지 인도한다고 전해진다."
        zh_simp:
          legends_arceus: "栖息在万年积雪覆盖的圣山。\n据说当心地善良者在山中迷路时，\n它会现身引领迷路者下山。"
        zh_trad:
          legends_arceus: "棲息在萬年積雪覆蓋的聖山。\n據說當心地善良者在山中迷路時，\n牠會現身引領迷路者下山。"
