        jp_kanji:
          legends_arceus: "フォルムチェンジにより　脚　無くす。\nこれの棲むは　天地の区別なき　世界と\n考察す。　されど　証明の　手段なし。"
        en:
          legends_arceus: "Giratina loses its legs upon changing into this form. I believe this\nPokémon must hail from a world where the heavens and the\nearth are as one, though I have no way of proving it."
        fr:
          legends_arceus: "Il perd ses pattes lorsqu’il adopte cette forme. Je pense\nqu’il gîte dans un monde où ciel et terre ne font qu’un,\nmais je ne dispose d’aucun moyen de le prouver."
        it:
          legends_arceus: "Privo di gambe per colpa del cambio di forma. Sospetto viva\nin un mondo che non distingue tra cielo e terra, ma non ho\nmodo di dimostrare siffatta teoria."
        de:
          legends_arceus: "Durch den Formwandel verliert es seine Beine. Dieses Pokémon\nmuss wohl in einer Welt leben, in der Himmel und Erde eins\nsind, jedoch ist es mir nicht möglich, dies nachzuweisen."
        es:
          legends_arceus: "Pierde las patas al adoptar esta forma. Sospecho que vive en un\nmundo en el que no hay distinción entre cielo y tierra, aunque\nno tengo manera de probarlo."
        ko:
          legends_arceus: "폼체인지로 인해 다리를 잃었다.\n이것이 사는 곳은 천지가 분간이 되지 않는\n세계인 것으로 추측된다. 하지만 증명할 방법이 없다."
        zh_simp:
          legends_arceus: "脚部随着形态变化而消失。据推测，\n此宝可梦栖息于没有天地之分的\n世界，然而没有手段能加以证明。"
        zh_trad:
          legends_arceus: "腳部隨著形態變化而消失。據推測，\n此寶可夢棲息於沒有天地之分的\n世界，然而沒有手段能加以證明。"
cresselia:
