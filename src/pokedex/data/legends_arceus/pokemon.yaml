oshawott:
  species_id: 501
  names:
    jp_kanji: ミジュマル
    en: Oshawott
    fr: Moustillon
    it: Oshawott
    de: Ottaro
    es: Oshawott
    ko: 수댕이
    zh_simp: 水水獭
    zh_trad: 水水獺
  forms:
    oshawott:
      form_id: 0
      base_stats:
        hp: 55
        attack: 55
        defense: 45
        special_attack: 63
        special_defense: 45
        speed: 45
      evs_yield:
        hp: 0
        attack: 0
        defense: 0
        special_attack: 1
        special_defense: 0
        speed: 0
      types:
        - water
      descriptions:
        jp_kanji:
          legends_arceus: "イッシュの地に　棲みし　ポケモン。\n腹の貝を　得物に　敵を　斬る。\nゆえに　貝の名　帆太刀と　命名す。"
        en:
          legends_arceus: "This Pokémon from the Unova region uses the shell on its belly\nas a weapon to cut down its foes. Thus, I’ve conferred upon this\nshell the name “scalchop.”"
        fr:
          legends_arceus: "Ce Pokémon est originaire d’Unys. Il utilise le coquillage sur\nson ventre pour trancher ses ennemis. J’ai donc décidé\nd’appeler cette arme « coupillage » !"
        it:
          legends_arceus: "Nativo di Unima, trancia gli inimici impiegando a guisa\nd’arma la valva di mollusco custodita sul ventre, che qui\nchiamerò \"mollusciabola\"."
        de:
          legends_arceus: "Es stammt aus Einall und setzt die Muschel an seinem Bauch ein,\num Feinde im Kampf damit aufzuschlitzen. Ich würde diese\nWaffe folglich auf den Namen „Muschelklinge“ taufen."
        es:
          legends_arceus: "Pokémon autóctono de la región de Teselia. Se vale de la vieira\nde su vientre para lacerar a sus enemigos. Por ello, he decidido\nbautizarla \"cuchilleira\"."
        ko:
          legends_arceus: "하나 땅에 사는 포켓몬.\n배에 있는 조개를 무기 삼아 적을 벤다.\n이에 조개의 이름을 “가리비칼”이라 명명했다."
        zh_simp:
          legends_arceus: "栖息在合众地区的宝可梦。\n会将腹部贝壳作为兵刃斩击敌手，\n因而本人将此贝壳命名为扇贝贝刀。"
        zh_trad:
          legends_arceus: "棲息在合眾地區的寶可夢。\n會將腹部貝殼作為兵刃斬擊敵手，\n因而吾人將此貝殼命名為扇貝貝刀。"
dewott:
  species_id: 502
  names:
    jp_kanji: フタチマル
    en: Dewott
    fr: Mateloutre
    it: Dewott
    de: Zwottronin
    es: Dewott
    ko: 쌍검자비
    zh_simp: 双刃丸
    zh_trad: 雙刃丸
