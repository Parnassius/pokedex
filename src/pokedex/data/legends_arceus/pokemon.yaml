        en:
          legends_arceus: "One is likely to encounter this Pokémon while out in the snow.\nThere are stories of Snover appearing in human settlements but\ndoing no harm—rather, they bond with the children."
        fr:
          legends_arceus: "Il est fréquent de l’observer dans les régions enneigées.\nOn raconte qu’il apparaît dans les hameaux sans montrer\nd’animosité, et se lie d’amitié avec les enfants."
        it:
          legends_arceus: "È assai probabile incrociarlo fra le nevi. Si dice visiti\ngli insediamenti umani non per recare danno, ma\nper stringere amicizia con gli infanti."
        de:
          legends_arceus: "Man begegnet ihm oft in schneebedeckten Gebieten. Angeblich\ntaucht es auch in Siedlungen auf, aber nicht, um Unheil\nanzurichten, sondern um sich mit den Kindern anzufreunden."
        es:
          legends_arceus: "Es frecuente encontrarlo en zonas nevadas. Se rumorea que\nvisita los asentamientos humanos, mas no supone ninguna\namenaza, sino que hace buenas migas con los niños."
        ko:
          legends_arceus: "눈 속에서 마주칠 가능성이 높다.\n사람이 사는 마을에 나타나나 피해는 주지 않고\n아이들의 좋은 친구가 되어 준다고 전해진다."
        zh_simp:
          legends_arceus: "在雪中遇见它的可能性很高。传说它\n即使出现在人类村落中也不会带来危害，\n反而会成为孩童们的好朋友。"
        zh_trad:
          legends_arceus: "在雪中遇見牠的可能性很高。傳說牠\n即使出現在人類村落中也不會帶來危害，\n反而會成為孩童們的好朋友。"
