        en:
          legends_arceus: "These Pokémon live in herds out in the grassland. Newborn\nfoals lack their fiery manes, which will develop about an hour\nafter birth."
        fr:
          legends_arceus: "Il peuple les prairies en troupeau. À la naissance, il ne possède\npas ses crins de flammes, mais ceux-ci poussent durant l’heure\nqui suit."
        it:
          legends_arceus: "Questi Pokémon popolano le praterie in mandrie. Appena\nvenuti al mondo sono privi del focoso crine, che cresce,\ntuttavia, entro un’ora dalla nascita."
        de:
          legends_arceus: "Sie leben in Herden auf Grasebenen. Bei der Geburt fehlt\nihnen die feurige Mähne, doch sie wächst in nur einer Stunde\nvollständig heran."
        es:
          legends_arceus: "Forman manadas en las praderas. La crin de fuego no les crece\nhasta una hora después de nacer."
        ko:
          legends_arceus: "초원에 무리를 이루며 산다.\n갓 태어난 새끼에게는 불로 된 갈기가 없으나\n1시간 정도 지나면 갖춰진다."
        zh_simp:
          legends_arceus: "在草原上群居生活。刚诞生的\n幼崽身上没有火焰鬃毛，而是会\n在出生后一小时左右长出来。"
        zh_trad:
          legends_arceus: "在草原上群居生活。剛誕生的\n幼崽身上沒有火焰鬃毛，而是會\n在出生後一小時左右長出來。"
