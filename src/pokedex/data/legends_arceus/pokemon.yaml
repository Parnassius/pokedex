        en:
          legends_arceus: "This remarkable, large-bodied Pokémon would serve beautifully\nas borrowed scenery for a garden, and its strength is peerless.\nTorterra roams the wilderness in search of clean water."
        fr:
          legends_arceus: "Ce géant impressionne autant par sa force que par ses traits,\nqui évoquent la grâce d’un paysage bucolique. Il parcourt\nplaines et collines à la recherche d’eau pure."
        it:
          legends_arceus: "Lodevole gigante dall’impareggiabile forza, le cui fattezze\nevocano ameni paesaggi bucolici. Percorre monti e piane\nin cerca di acqua pura."
        de:
          legends_arceus: "Der riesige Körper dieses erhabenen Pokémon ähnelt einer\nmalerischen Landschaft und ist von unvergleichbarer Stärke.\nEs zieht auf der Suche nach klarem Wasser in der Wildnis umher."
        es:
          legends_arceus: "Un Pokémon enorme con una extraordinaria fuerza y un cuerpo\nque recuerda a un bello y frondoso paisaje. Merodea por los\nmontes y campos en busca de agua limpia."
        ko:
          legends_arceus: "우아하고 아름다운 정원 같은 거대한 몸과\n타의 추종을 불허하는 강력함을 자랑한다.\n깨끗한 물을 찾아 산과 들을 배회한다."
        zh_simp:
          legends_arceus: "拥有形如秀丽园林般的巨躯，\n且是力大无穷的强者。\n为寻求净水而巡遍山野。"
        zh_trad:
          legends_arceus: "擁有形如雋麗林園般的巨軀，\n且是力大無窮的強者。\n為尋求淨水而巡遍山野。"
