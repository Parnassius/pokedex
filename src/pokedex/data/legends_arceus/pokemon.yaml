        jp_kanji:
          legends_arceus: "気分　沈みし者より　気性　朗らかなる\n者を　好む　傾向あり。　老若男女を\n区別せず。　さらなる調査　課題なり。"
        en:
          legends_arceus: "Tends to prefer people with a chipper disposition to those who\nare gloomy, but it has shown no discrimination with regard to\nage or gender. Needs more research."
        fr:
          legends_arceus: "Il a tendance à préférer les individus allègres à ceux qui\nsont démoralisés, sans distinction d’âge ou de sexe.\nJe dois encore approfondir mes recherches à son sujet."
        it:
          legends_arceus: "Sembra prediligere, senza distinzione d’età e di sesso,\nle personalità radiose anziché quelle inclini alla malinconia.\nCreatura da approfondire."
        de:
          legends_arceus: "Unabhängig von Geschlecht und Alter scheint es heitere\nGemüter jenen vorzuziehen, die zu Schwermut neigen.\nDies muss jedoch noch genauer untersucht werden."
        es:
          legends_arceus: "Tiende a preferir la compañía de las personas alegres, sin\nimportar su edad o sexo. Debemos investigarlo más a fondo."
        ko:
          legends_arceus: "우울한 자보다 쾌활한 자를 선호하는\n경향이 있다. 남녀노소를 가리지 않는다.\n더 많은 조사가 필요하다."
        zh_simp:
          legends_arceus: "倾向于亲近心情开朗之人而非\n心情低落之人，且无男女老少之分。\n更深入的调查乃是当前课题。"
        zh_trad:
          legends_arceus: "傾向於親近心情開朗之人而非\n心情低落之人，且無男女老少之分。\n更深入的調查乃是當前課題。"
kirlia:
