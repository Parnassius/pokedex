        jp_kanji:
          legends_arceus: "漆黒の翼　音　立てず　空を滑り\n鋭き牙で　獲物の喉笛に　食らいつく。\n血液　吸い尽くし　満足の様子。"
        en:
          legends_arceus: "It glides soundlessly on pitch-black wings and sinks sharp fangs\ninto the throat of its prey. It takes on a look of satisfaction once\nit has entirely drained its prey of blood."
        fr:
          legends_arceus: "Il fend l’air sans bruit de ses ailes de jais, et plante ses crocs\nacérés dans la trachée de sa proie. Il n’est satisfait qu’une fois\nrepu du sang de sa victime."
        it:
          legends_arceus: "Solca le nubi con ali corvine senza produrre rumore alcuno\nper dipoi azzannare coi canini affilati la gola delle prede.\nNon è pago finché non ne prosciuga le vene."
        de:
          legends_arceus: "Es gleitet mit seinen tiefschwarzen Flügeln lautlos durch die Luft\nund beißt sich mit scharfen Fangzähnen an der Kehle der Beute\nfest. Hat es deren Blut komplett ausgesaugt, wirkt es zufrieden."
        es:
          legends_arceus: "Planea en silencio con sus alas negro azabache y clava sus\nafilados colmillos en las tráqueas de sus víctimas. No queda\nsatisfecho hasta haber succionado por completo su sangre."
        ko:
          legends_arceus: "칠흑 같은 날개로 소리 없이 활공하여\n날카로운 이빨로 사냥감의 목덜미를 문 다음\n혈액을 모두 빨아먹고는 만족스러워한다."
        zh_simp:
          legends_arceus: "用漆黑的双翼悄无声息地滑翔，\n而后将锐利的獠牙刺进猎物的喉咙，\n直至吸尽猎物血液后才会满足。"
        zh_trad:
          legends_arceus: "用漆黑的雙翼悄無聲息地滑翔，\n而後將銳利的獠牙刺進獵物的喉嚨，\n直至吸盡獵物血液後方可滿足。"
