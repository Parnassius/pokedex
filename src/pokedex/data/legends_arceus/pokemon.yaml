          legends_arceus: "嵐を　巻き起こし　ポケモン。　大気を\n撹拌し　季節を　巡らせると　伝わる。\n人に似たる姿こそ　仮の姿と　考察す。"
        en:
          legends_arceus: "This storm-stirring Pokémon is said to cause the seasons to\nturn by whipping up the air. I suspect its humanlike form to be\na false one."
        fr:
          legends_arceus: "Ce Pokémon, connu pour causer des tempêtes, provoquerait\naussi le changement des saisons en agitant l’air. Je suspecte\nson apparence humaine de ne pas être sa forme véritable."
        it:
          legends_arceus: "Cagionatore di tempeste, si tramanda scuota l’atmosfera\nper innescare la successione delle stagioni. Sospetto che\nil suo sembiante antropomorfo non sia reale."
        de:
          legends_arceus: "Es entfacht Stürme und soll Jahreszeitenwechsel herbeiführen,\nindem es die Atmosphäre aufwirbelt. Meiner Meinung nach ist\ndiese menschenähnliche Erscheinung nicht seine wahre Gestalt."
        es:
          legends_arceus: "Pokémon capaz de agitar el aire y generar tempestades. Se dice\nque altera la atmósfera y propicia el cambio de las estaciones.\nTengo sospechas de que su forma antropomórfica no es la real."
        ko:
          legends_arceus: "폭풍을 일으키는 포켓몬.\n대기를 순환시켜서 계절을 바꾼다고 전해진다.\n사람을 닮은 것은 진짜 모습이 아닌 것으로 추측된다."
        zh_simp:
          legends_arceus: "可引发风暴的宝可梦。传说由于它搅拌大气，\n季节因此得以循环不息。据本人考察，\n近似人类的形态才是假象而非真身。"
        zh_trad:
          legends_arceus: "引發風暴的寶可夢。傳說由於牠攪拌大氣，\n季節因此得以循環不息。據吾人考察，\n近似人類的形態才是假象而非真身。"
