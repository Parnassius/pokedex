          legends_arceus: "火山地帯に　生息。　呼吸の度に\n口と鼻より　火の粉を　漏らす。\n体調万全の折は　炎　黄色味　帯びる。"
        en:
          legends_arceus: "This Pokémon lives in volcanic areas. With each breath, sparks\nspurt from its mouth and nose. When Magby is in good health,\nits flames gain a yellow tint."
        fr:
          legends_arceus: "Il gîte en région volcanique. Des flammèches s’échappent\nde son nez et de sa bouche sitôt qu’il expire. Lorsqu’il est\nen bonne santé, ces flammes se teintent de jaune."
        it:
          legends_arceus: "Dimora in aree vulcaniche. Nell’espirare, emana faville da narici\ne fauci. Se le fiamme inclinano al giallo, denotano florida salute."
        de:
          legends_arceus: "Es lebt in vulkanischen Gegenden. Bei jedem Atemzug versprüht\nes Funken aus Mund und Nase. Erfreut es sich guter Gesundheit,\nhaben seine Flammen einen Gelbstich."
        es:
          legends_arceus: "Vive en zonas volcánicas. Expulsa ascuas por la nariz y la boca\nal espirar. Cuando está sano, sus llamas se vuelven amarillas."
        ko:
          legends_arceus: "화산 지대에 서식한다.\n호흡할 때마다 입과 코에서 불티가 나온다.\n몸 상태가 좋으면 불꽃에서 노란 기가 돈다."
        zh_simp:
          legends_arceus: "栖息在火山地带。\n呼吸时会从口鼻冒出火星。\n火的颜色在身体健康时呈现黄色。"
        zh_trad:
          legends_arceus: "棲息在火山地帶。\n呼吸時會從口鼻冒出火星。\n火的顏色在身體健康時呈現黃色。"
