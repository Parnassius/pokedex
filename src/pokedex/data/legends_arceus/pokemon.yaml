        jp_kanji:
          legends_arceus: "野山に　群れを成し　住みつき　鳴き声\n煩わし。　小さきも　翼は　力強く\n打たれしときは　一週間　痛み引かず。"
        en:
          legends_arceus: "They live in the fields and mountains, gathering in large flocks.\nTheir cries are quite obnoxious. Though small, their wings are\nstrong—a strike from them leaves pain that persists for a week."
        fr:
          legends_arceus: "Ce Pokémon au chant désagréable vit en colonies dans\nles plaines et les collines. Bien que de petite taille, ses ailes\npeuvent infliger une vive douleur qui persiste une semaine."
        it:
          legends_arceus: "Questi Pokémon abitano le piane e i monti in gruppi. Il loro\ncanto è molesto all’orecchio. Di stazza minuta, hanno ali\npossenti che arrecano sette giorni di dolore."
        de:
          legends_arceus: "Es lässt sich in Schwärmen auf Feldern und in den Bergen nieder.\nDas Gezwitscher ist nervtötend. Auch wenn es klein ist, zieht ein\nSchlag seiner kräftigen Flügel einwöchige Schmerzen nach sich."
        es:
          legends_arceus: "Vive en el campo formando bandadas de lo más estridentes.\nA pesar de su pequeño tamaño, con sus fuertes alas puede\ncausar contusiones que tardan una semana en sanar."
        ko:
          legends_arceus: "산과 들에 무리를 짓고 살며, 울음소리가\n시끄럽다. 작지만 날개는 힘이 강하여\n여기에 맞으면 일주일간 통증이 계속된다."
        zh_simp:
          legends_arceus: "在山野中成群生活，叫声聒噪吵杂。\n身躯虽小但翅膀十分有力。要是被它的\n翅膀打到，会整整痛上一个星期。"
        zh_trad:
          legends_arceus: "在山野中成群生活，叫聲聒噪吵雜。\n身軀雖小但翅膀十分有力。要是被牠的\n翅膀打到，可是會整整痛上一個星期。"
