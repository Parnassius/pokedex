        en:
          legends_arceus: "This treetop dweller possesses a tail as dexterous as a hand.\nAncient writings describe this Pokémon as a one-armed oddity."
        fr:
          legends_arceus: "Il gîte à la cime des arbres et possède une queue aussi leste\nqu’une main. Dans les textes anciens, il est décrit comme\n« un Pokémon étrange doté d’un seul bras »."
        it:
          legends_arceus: "Dimora sugli alberi e possiede una coda agile\nal pari di una mano. Nell’antichità lo si descriveva\ncome uno strano Pokémon dotato di un solo braccio."
        de:
          legends_arceus: "Es lebt in Baumwipfeln und besitzt einen Schweif, den es so\ngeschickt wie eine Hand einsetzen kann. Alte Schriften\nbeschreiben dieses Pokémon deshalb als einarmige Kuriosität."
        es:
          legends_arceus: "Este morador de las copas de los árboles posee una cola hábil\ncomo una mano. Nos han llegado escritos antiguos en los que\naparece descrito como un extraño Pokémon de un solo brazo."
        ko:
          legends_arceus: "손처럼 자유롭게 움직이는 꼬리를 가졌으며\n나무 위에 산다. 고문서에는 팔이 하나뿐인\n기묘한 포켓몬이라고 묘사되어 있다."
        zh_simp:
          legends_arceus: "拥有如同手掌般灵活的尾巴。\n栖息在树上，有古书将其叙述为\n只有一只手的奇妙宝可梦。"
        zh_trad:
          legends_arceus: "擁有如同手掌般靈活的尾巴。\n棲息在樹上，有古書將其敘述為\n只有一隻手的奇妙寶可夢。"
yanma:
