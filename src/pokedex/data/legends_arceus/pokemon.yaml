        en:
          legends_arceus: "I theorize that a special magnetic field influenced this Pokémon,\nchanging its molecular structure and causing it to evolve. It emits\nstrange radio waves toward space from its antenna."
        fr:
          legends_arceus: "Je pense qu’il a évolué en raison d’une mutation de sa structure\nmoléculaire, après avoir été exposé à un champ magnétique\nspécial. Son antenne émet de mystérieuses ondes vers les cieux."
        it:
          legends_arceus: "Sospetto si sia evoluto per mutazione molecolare indotta da\nun singolare campo magnetico. Inoltra nel cosmo criptici\nsegnali elettrici con l’antenna."
        de:
          legends_arceus: "Seine Entwicklung wurde anscheinend durch ein besonderes\nMagnetfeld ausgelöst, das seine Molekularstruktur veränderte.\nMit seinem Horn sendet es rätselhafte elektrische Wellen ins All."
        es:
          legends_arceus: "Esta evolución podría deberse a la influencia de un campo\nmagnético en su estructura molecular. Su cuerno emite ondas\nmisteriosas hacia el cielo."
        ko:
          legends_arceus: "특수한 자기장의 영향을 받아\n분자 구조가 바뀌어 진화한 것으로 보인다.\n뿔을 통해 하늘로 알 수 없는 전파를 발신한다."
        zh_simp:
          legends_arceus: "考察结果显示，它的进化是分子构造\n受特殊磁场影响后发生改变所致。\n会从独角向天空发射神秘的电波。"
        zh_trad:
          legends_arceus: "考察結果顯示，牠的進化是分子構造\n受特殊磁場影響後發生改變所致。\n會從獨角向天空發射神秘的電波。"
