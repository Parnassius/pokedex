      descriptions:
        jp_kanji:
          legends_arceus: "寒き地を　好み　海辺に　現れる。\n童に　似た　愛らしさに　反し\n気位は高く　人の　施しを　拒む。"
        en:
          legends_arceus: "Prefers cold climes and appears along coasts. It’s an adorable\nlittle thing—as cute as any child—but it’s also prideful, unwilling\nto accept handouts from people."
        fr:
          legends_arceus: "Il a une certaine inclination pour les lieux froids et se manifeste\nle long des côtes. Malgré son apparence enfantine, il est\ntrès fier et n’accepte ni pitié ni traitement de faveur."
        it:
          legends_arceus: "Abita le coste, prediligendo i climi freddi. Le sue fattezze\ngraziose e puerili celano in verità un’indole fiera, sprezzante\ndella carità umana."
        de:
          legends_arceus: "Es bevorzugt kalte Orte und ist oft an Küsten zu sehen. Sein\nÄußeres mag an ein entzückendes Kind erinnern, doch sein\nStolz verbietet es ihm, Almosen von Menschen anzunehmen."
        es:
          legends_arceus: "Suele frecuentar las costas de clima frío. Su aspecto tierno e\ninfantil esconde un corazón orgulloso incapaz de aceptar\nofrendas."
        ko:
          legends_arceus: "추운 곳을 좋아하여 바닷가에 나타난다.\n어린아이를 닮은 귀여움에 어울리지 않게\n자존심이 강해 인간의 도움을 받기 싫어한다."
        zh_simp:
          legends_arceus: "喜爱寒冷，会出现在海边。\n外表如孩童般可爱，但心高气傲，\n不愿接受来自人类的施舍。"
        zh_trad:
          legends_arceus: "喜愛寒冷，會出現在海邊。\n外表如孩童般可愛，但心高氣傲，\n不願接受來自人類的施捨。"
