        jp_kanji:
          legends_arceus: "岩盤の如き殻を　年に１度　脱皮す。\n脱ぎし　岩殻は　土塊へと還り　これを\n畑に撒けば　作物の発育　促進す。"
        en:
          legends_arceus: "The rocklike shell is shed each year. The cast-off shell then\ncrumbles, reverting to a mass of soil, which can be spread across\nfields to promote crop growth."
        fr:
          legends_arceus: "Il mue une fois par an. Son exuvie s’apparente à une carapace\npierreuse et se change en motte de terre. Elle est alors utilisée\npar les agriculteurs pour favoriser la croissance des cultures."
        it:
          legends_arceus: "Una volta all’anno muta il guscio roccioso, che si sgretola\ne ritorna a essere terra. Se sparsa nei campi, tale terra favorisce\nla crescita delle colture."
        de:
          legends_arceus: "Ein Mal im Jahr häutet es sich. Die felsartige abgestreifte\nHülle zerbröselt daraufhin zu Erde, die als Dünger das\nPflanzenwachstum auf Feldern fördert."
        es:
          legends_arceus: "Muda su rocoso caparazón una vez al año. La parte descartada\nse descompone en un amasijo de tierra y sirve como fertilizante\npara los cultivos."
        ko:
          legends_arceus: "암반과도 같은 껍질은 1년에 한 번 탈피한다.\n벗어 낸 바위 껍질은 흙덩이로 돌아가며\n이를 밭에 뿌리면 작물의 발육이 좋아진다."
        zh_simp:
          legends_arceus: "岩石般的外壳每年会蜕皮一次。\n蜕下的石壳将会化作土块，\n撒进田里可以促进农作物的发育。"
        zh_trad:
          legends_arceus: "岩石般的外殼每年會蛻皮一次。\n蛻下的石殼將會化作土塊，\n撒進田裡可以促進農作物的發育。"
