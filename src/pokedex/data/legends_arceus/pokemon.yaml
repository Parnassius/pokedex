        en:
          legends_arceus: "When the incarnations of wind and of lightning clash, Landorus\narrives to quell the conflict. After the tempests and thunderbolts\nabate, the land is sure to be blessed with bountiful harvests."
        fr:
          legends_arceus: "Lorsque les incarnations du vent et des éclairs s’affrontent\navec rage, il apparaît pour les apaiser. Une fois la tempête\net la foudre calmées, d’abondantes récoltes sont assurées."
        it:
          legends_arceus: "Emerge per chetare le dispute fra l’incarnazione dei turbini\ne quella dei fulmini. Il loro dileguarsi sancisce il buon esito\ndelle coltivazioni."
        de:
          legends_arceus: "Es erscheint, um die Fehde zwischen der Verkörperung des\nWindes und jener von Blitz und Donner zu schlichten. Hat sich\ndas Unwetter gelegt, wird das Land mit reicher Ernte gesegnet."
        es:
          legends_arceus: "Aparece para aplacar a las encarnaciones del rayo y del viento\ncuando estas pelean. Una vez sosegada la tormenta y acallados\nlos truenos, se auguran tierras fértiles y buenas cosechas."
        ko:
          legends_arceus: "선풍과 뇌격의 화신이 싸울 때 나타나\n이들을 진정시킨다. 폭풍과 벼락이 물러간 뒤\n풍요를 약속하는 대지가 찾아오는 것이다."
        zh_simp:
          legends_arceus: "会在旋风与电击的化身互相斗争\n之时现身并加以平息。在风暴与\n雷电过后，大地必将迎来丰收。"
        zh_trad:
          legends_arceus: "會在旋風與電擊的化身互相鬥爭\n之時現身並加以平息。在風暴與\n雷電過後，大地必將迎來豐收。"
