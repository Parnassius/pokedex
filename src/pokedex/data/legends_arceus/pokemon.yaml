          legends_arceus: "ラッキーの　真似したりて　丸き石を\n腹の袋に　仕舞い　愛おしむ。\n童子に　懐き　飯事　興じることあり。"
        en:
          legends_arceus: "In imitation of Chansey, it keeps a round stone tucked into its\nbelly pouch and cherishes it dearly. It gets along well with\nchildren and will sometimes play house with them for fun."
        fr:
          legends_arceus: "Pour imiter les Leveinard, il garde dans sa poche centrale\nune pierre ronde dont il prend le plus grand soin. Il s’entend\nbien avec les enfants, et il lui arrive parfois de jouer avec eux."
        it:
          legends_arceus: "Emula Chansey accudendo un rotondo sasso che serba\nnella tasca ventrale. Ama la compagnia dei fanciulli\ne con essi inscena giuochi a tema famigliare."
        de:
          legends_arceus: "Es imitiert Chaneira, indem es sich liebevoll um einen runden\nStein kümmert, den es in seinem Bauchbeutel trägt. Es versteht\nsich gut mit Kindern und spielt manchmal Familie mit ihnen."
        es:
          legends_arceus: "Guarda con mimo una roca ovalada en la bolsa del abdomen,\nimitando a Chansey. Hace buenas migas con los niños y, en\nocasiones, juegan juntos a las casitas."
        ko:
          legends_arceus: "럭키를 흉내 내 둥근 돌을\n배에 있는 주머니에 넣고 소중히 돌본다.\n아이를 따라서 소꿉놀이를 즐기기도 한다."
        zh_simp:
          legends_arceus: "会模仿吉利蛋，将圆石藏于腹部\n袋中悉心爱惜。容易亲近孩童，\n还会一起玩过家家。"
        zh_trad:
          legends_arceus: "會模仿吉利蛋，將圓石藏於腹部\n的袋中悉心愛惜。容易親近孩童，\n還會一起玩扮家家酒。"
