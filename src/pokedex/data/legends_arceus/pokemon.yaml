        en:
          legends_arceus: "A violent creature that fells towering trees with its crude axes\nand shields itself with hard stone. If one should chance upon\nthis Pokémon in the wilds, one’s only recourse is to flee."
        fr:
          legends_arceus: "Il se protège à l’aide de roches dures et abat des arbres avec\nses haches frustes. Comme il possède un tempérament violent,\nil est préférable de fuir quand on le croise dans la nature."
        it:
          legends_arceus: "Abbatte alberi con le grezze asce mentre difende le membra\ncon dura pietra. D’indole brutale, se incontrato in natura\nnon resta che la fuga."
        de:
          legends_arceus: "Harter Fels schützt seinen Körper, während es mit den wuchtigen\nÄxten gewaltige Bäume fällt. Begegnet man diesem ungestümen\nPokémon in der Wildnis, so suche man sein Heil in der Flucht!"
        es:
          legends_arceus: "Las dos toscas hachas le permiten talar árboles mientras su piel\npétrea lo protege. Dada su naturaleza agresiva, es aconsejable\nescapar en caso de toparse con uno en estado salvaje."
        ko:
          legends_arceus: "단단한 바위로 몸을 보호하고 투박한 도끼로\n거목을 베어 넘긴다. 성질이 사납기 때문에\n황무지에서 만난다면 도망치는 수밖에 없다."
        zh_simp:
          legends_arceus: "用坚硬的岩石守护自身，以粗犷的\n斧头砍倒大树。性情暴躁易怒。要是\n在荒野遇见它，逃跑将是唯一选择。"
