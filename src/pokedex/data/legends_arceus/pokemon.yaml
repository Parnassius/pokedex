        en:
          legends_arceus: "Said to purify lost, forsaken souls with its flames and guide them\nto the afterlife. I believe its form has been influenced by the\nenergy of the sacred mountain towering at Hisui’s center."
        fr:
          legends_arceus: "On dit qu’il purifie les âmes perdues à l’aide de ses flammes\navant de les envoyer dans l’au-delà. Je pense que sa forme est\ninfluencée par la montagne sacrée située au cœur de Hisui."
        it:
          legends_arceus: "Reputo l’atmosfera del monte sacro che si erge nel cuore di\nHisui causa del suo mutato aspetto. Si dice mondi le anime\nsmarrite con le proprie vampe per condurle verso l’aldilà."
        de:
          legends_arceus: "Ich vermute, dass die Energie des heiligen Berges im Zentrum\nHisuis sein Äußeres beeinflusst hat. Es heißt, es reinige verlorene\nSeelen in seinen Flammen, um sie sodann ins Jenseits zu führen."
        es:
          legends_arceus: "Mi teoría es que la montaña sagrada que se yergue en el centro\nde Hisui ha influido en su apariencia. Se dice que purifica con\nsus llamas a las almas errantes y las conduce al otro mundo."
        ko:
          legends_arceus: "히스이 중심에 우뚝 선 영산의 기운에\n영향을 받은 모습으로 보인다. 갈 곳 없는 영혼을\n자신의 불꽃으로 정화하여 저승으로 인도한다고 한다."
        zh_simp:
          legends_arceus: "据考察，它是受到耸立于洗翠中心的灵山之气\n影响，才形成了现在的模样。据说会用\n自己的火焰净化并超渡无处可去的灵魂。"
        zh_trad:
          legends_arceus: "據考察，牠是受到聳立於洗翠中心的靈山所發\n之氣的影響，才形成了現在的模樣。據說會用\n自己的火焰淨化並超渡無處可去的靈魂。"
