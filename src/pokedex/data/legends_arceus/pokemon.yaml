      descriptions:
        jp_kanji:
          legends_arceus: "ヒスイの地に　伝わりし　ひと節あり。\n強き光は　深き影　生み出したり。\n深き影こそ　このポケモンと　想像す。"
        en:
          legends_arceus: "There is one Hisuian verse that tells of a powerful light creating\na deep shadow. I imagine that this deep shadow is Giratina."
        fr:
          legends_arceus: "Voici une ancienne expression transmise à travers Hisui :\n« Plus forte est la lumière, plus profonde sera l’ombre qu’elle\ngénère. » Je pense que ce Pokémon est l’ombre en question."
        it:
          legends_arceus: "A Hisui si tramanda il seguente detto: \"Vivida luce crea\nprofonda tenebra\". Suppongo che con \"profonda tenebra\"\nsi alluda a questo Pokémon."
        de:
          legends_arceus: "In Hisui gibt es ein altes Sprichwort: „Gleißendes Licht wirft\neinen tiefen Schatten.“ Ob mit dem tiefen Schatten wohl\nGiratina gemeint ist?"
        es:
          legends_arceus: "En Hisui existe un dicho que reza lo siguiente: \"Cuanto mayor\nsea la luz, mayor será la oscuridad que esta engendre\". ¿Podría\nesa oscuridad ser una alusión a este Pokémon?"
        ko:
          legends_arceus: "히스이 땅에는 이런 구절이 전해 내려오고 있다.\n“강한 빛은 짙은 그림자를 만들어 낸다.”\n이 포켓몬이야말로 그 짙은 그림자를 연상케 한다."
        zh_simp:
          legends_arceus: "洗翠地区自古流传着这样一句话：\n强光照而暗影生。在本人的想象中，\n暗影指的正是这种宝可梦。"
        zh_trad:
          legends_arceus: "洗翠地區自古流傳著這樣一句話：\n強光照而暗影生。在吾人的想像中，\n暗影指的正是這種寶可夢。"
