        en:
          legends_arceus: "The black orbs shine with an uncanny light when the Pokémon is\nerecting invisible barriers. The fur shed from its beard retains\nheat well and is a highly useful material for winter clothing."
        fr:
          legends_arceus: "Ses boules noires émettent une inquiétante lueur lorsqu’il érige\ndes barrières invisibles. Les poils de barbe qu’il perd servent à\nconfectionner des vêtements d’hiver bien chauds."
        it:
          legends_arceus: "Quando si accinge a creare pareti invisibili, le sue atre sfere\nrifulgono di luce sinistra. I crini caduti dalla barba vengon\nadoprati per confezionare caldi abiti invernali."
        de:
          legends_arceus: "Die schwarzen Kugeln leuchten auf ominöse Weise, wenn es\nunsichtbare Wände erschafft. Das Barthaar, das es verliert,\nwird als Material für warme Winterkleidung hoch geschätzt."
        es:
          legends_arceus: "Sus orbes negros brillan con un fulgor misterioso cuando erige\nmuros invisibles. El pelaje que se desprende de sus barbas es\nmuy codiciado para crear cálidos ropajes para el invierno."
        ko:
          legends_arceus: "눈에 보이지 않는 벽을 만들어 낼 때\n검은 구슬이 신비하게 빛난다. 떨어진 수염은\n따뜻해서 겨울옷의 귀중한 재료가 된다."
        zh_simp:
          legends_arceus: "制造肉眼不可见的障壁时，黑珠会发出\n妖异的光辉。从它身上脱落的胡须\n是用来制作温暖冬衣的实用原料。"
        zh_trad:
          legends_arceus: "製造肉眼不可見的障壁時，黑珠會發出\n妖異的光輝。從牠身上脫落的鬍鬚\n是用來製作溫暖冬衣的實用原料。"
