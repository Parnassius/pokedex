        en:
          legends_arceus: "According to legend, Regigigas pulled landmasses together and\nbound them with rope to create the continent of Hisui. Though I\nhave my doubts, the story could well contain a shred of truth."
        fr:
          legends_arceus: "Une légende dit que ce Pokémon aurait amarré un continent à\nl’aide de cordes, puis aurait tiré pour créer Hisui. J’en doute,\nmais peut-être cette histoire contient-elle une part de vérité."
        it:
          legends_arceus: "La leggenda narra che diede forma a Hisui trainando\ncontinenti per poi legarli con dei canapi. Ne dubito,\nma non nego possa esservi un fondo di verità."
        de:
          legends_arceus: "Der Legende nach erschuf es Hisui, indem es Kontinente\nverschob und mit Seilen zusammenband. Ich bezweifle dies,\ndoch womöglich steckt ein Stück Wahrheit darin."
        es:
          legends_arceus: "Según la leyenda, amarró un continente con una cuerda y tiró\nde él para dar forma a Hisui. Aunque tengo mis dudas, este\nmito podría esconder algo de verdad."
        ko:
          legends_arceus: "밧줄에 묶인 대륙을 끌어서 히스이 땅을\n만들어 냈다는 전설이 있다. 의심스럽긴 하나\n사실인 부분이 일부 존재할지도 모른다."
        zh_simp:
          legends_arceus: "传说雷吉奇卡斯用绳索将大陆拖曳而来，\n创造了洗翠的大地。传说内容虽存疑，\n但其中或许蕴藏着一丝真理。"
        zh_trad:
          legends_arceus: "傳說雷吉奇卡斯用繩索將大陸拖曳而來，\n創造了洗翠的大地。傳說內容雖有疑義，\n但其中或許蘊藏著一絲真理。"
giratina:
