no_retreat:
  names:
    jp_kanji: はいすいのじん
    en: No Retreat
    fr: Ultime Bastion
    it: Spalle al Muro
    de: Finalformation
    es: Bastión Final
    ko: 배수의진
    zh_simp: 背水一战
    zh_trad: 背水一戰
  descriptions:
    jp_kanji: "自分の　すべての\n能力が　上がるが　交代　したり\n逃げることが　できなくなる。"
    en: "This move raises all the user’s stats but prevents\nthe user from switching out or fleeing."
    fr: "Le lanceur voit toutes ses stats augmenter,\nmais en contrepartie, il ne peut plus fuir\nou se retirer du combat."
    it: "Chi la usa aumenta tutte le sue statistiche ma non\npuò più fuggire o essere sostituito."
    de: "Alle Statuswerte des Anwenders werden erhöht,\naber dafür kann er weder ausgewechselt werden\nnoch fliehen."
    es: "El usuario aumenta todas sus características, pero ya no\npuede huir ni ser cambiado por otro."
    ko: "자신의 모든 능력이\n올라가지만 교체하거나\n도망칠 수 없게 된다."
    zh_simp: "提高自己的所有能力，\n但无法替换或逃走。"
    zh_trad: "提高自己所有的能力，\n但無法進行替換或逃走。"
noble_roar:
  names:
    jp_kanji: おたけび
    en: Noble Roar
    fr: Râle Mâle
    it: Urlo
    de: Kampfgebrüll
    es: Rugido de Guerra
    ko: 부르짖기
    zh_simp: 战吼
    zh_trad: 戰吼
  descriptions:
    jp_kanji: "おたけびを　あげて\n相手を　威嚇し　相手の\n攻撃と　特攻を　さげる。"
    en: "Letting out a noble roar, the user intimidates the\ntarget and lowers its Attack and Sp. Atk stats."
    fr: "Le lanceur pousse un rugissement qui intimide l’ennemi\net diminue son Attaque et son Attaque Spéciale."
    it: "Chi la usa emette un urlo potente che intimidisce\nil bersaglio, riducendone l’Attacco e l’Attacco\nSpeciale."
    de: "Der Anwender stößt ein Kampfgebrüll aus, das das\nZiel einschüchtert und zugleich seinen Angriffs- und\nSpezial-Angriffs-Wert senkt."
    es: "Intimida a su oponente con un rugido de guerra, lo que\nhace que disminuyan tanto su Ataque como su Ataque\nEspecial."
    ko: "우렁차게 부르짖어서\n상대를 위협하여 상대의 공격과\n특수공격을 떨어뜨린다."
    zh_simp: "发出战吼威吓对手，\n从而降低对手的攻击和特攻。"
    zh_trad: "發出戰吼威嚇對手，\n降低對手的\n攻擊和特攻。"
nuzzle:
  names:
    jp_kanji: ほっぺすりすり
    en: Nuzzle
    fr: Frotte-Frimousse
    it: Elettrococcola
    de: Wangenrubbler
    es: Moflete Estático
    ko: 볼부비부비
    zh_simp: 蹭蹭脸颊
    zh_trad: 蹭蹭臉頰
  descriptions:
    jp_kanji: "電気を　帯びた　ほっぺを\nすりつけて　攻撃。\n相手を　まひ状態に　する。"
    en: "The user attacks by nuzzling its electrified cheeks\nagainst the target. This also leaves the target\nwith paralysis."
    fr: "Le lanceur attaque en frottant ses bajoues chargées\nd’électricité. Paralyse l’ennemi."
    it: "Chi la usa strofina le guance elettrizzate contro\nil bersaglio, paralizzandolo."
    de: "Der Anwender lädt seine Wangen elektrisch auf und\ngreift an, indem er sich damit am Ziel reibt. Das Ziel\nwird paralysiert."
    es: "Quien lo usa frota sus mofletes cargados de electricidad\ncontra el objetivo y consigue paralizarlo."
    ko: "전기가 흐르는 볼을\n비벼서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "将带电的脸颊\n蹭蹭对手进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "用帶電的臉頰\n磨蹭對手進行攻擊。\n能讓對手陷入麻痺狀態。"
oblivion_wing:
  names:
    jp_kanji: デスウイング
    en: Oblivion Wing
    fr: Mort’Ailes
    it: Ali del Fato
    de: Unheilsschwingen
    es: Ala Mortífera
    ko: 데스윙
    zh_simp: 归天之翼
    zh_trad: 死亡之翼
  descriptions:
    jp_kanji: "ねらいを　定めた　相手から　ＨＰを\n吸い取る。　与えた　ダメージの\n半分以上　ＨＰを　回復する。"
    en: "The user absorbs its target’s HP. The user’s HP is\nrestored by over half of the damage taken by\nthe target."
    fr: "Vole l’énergie de la cible.\nRend au lanceur un nombre de PV supérieur ou égal\nà la moitié des dégâts infligés."
    it: "Chi la usa assorbe energia dal bersaglio\nrecuperando una quantità di PS pari a più\ndella metà del danno inferto."
    de: "Der Anwender raubt dem Ziel KP. Die Höhe der\nHeilung beträgt mehr als die Hälfte des beim Ziel\nangerichteten Schadens."
    es: "El usuario absorbe energía del objetivo y aumenta sus\nPS en una cantidad igual o superior a la mitad del daño\ninfligido."
    ko: "조준한 상대로부터 HP를\n흡수한다. 준 데미지의\n반 이상 HP를 회복한다."
    zh_simp: "从锁定的对手身上吸取ＨＰ。\n回复给予对手\n伤害的一半以上的ＨＰ。"
    zh_trad: "從鎖定的對手身上吸取ＨＰ。\n可以回復給予對手\n傷害的一半以上的ＨＰ。"
obstruct:
  names:
    jp_kanji: ブロッキング
    en: Obstruct
    fr: Blocage
    it: Sbarramento
    de: Abblocker
    es: Obstrucción
    ko: 블로킹
    zh_simp: 拦堵
    zh_trad: 攔堵
  descriptions:
    jp_kanji: "相手の　攻撃を　まったく　受けない。\n連続で　だすと　失敗しやすい。\n触れると　防御が　がくっと　下がる。"
    en: "This move enables the user to protect itself from all attacks.\nIts chance of failing rises if it is used in succession.\nDirect contact harshly lowers the attacker’s Defense stat."
    fr: "Le lanceur se protège de toutes les attaques. Peut\néchouer si utilisée plusieurs fois de suite. Baisse beaucoup\nla Défense de l’assaillant s’il utilise une attaque directe."
    it: "Permette di eludere tutti gli attacchi. Se usata in\nsuccessione può fallire. Se un Pokémon tocca chi\nla usa, la sua Difesa diminuisce di molto."
    de: "Der Anwender wehrt jede Attacke ab. Berührt ihn\nwährenddessen ein Pokémon, sinkt dessen Verteidigung\nstark. Scheitert eventuell bei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente. Reduce mucho la Defensa de quien\nejecute un movimiento de contacto contra el usuario."
    ko: "상대의 공격을 전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다.\n접촉한 상대의 방어를 크게 떨어뜨린다."
    zh_simp: "完全抵挡对手的攻击。\n连续使出则容易失败。\n一旦触碰，防御就会大幅降低。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。\n一旦觸碰到，防禦會大幅降低。"
oceanic_operetta:
  names:
    jp_kanji: わだつみのシンフォニア
    en: Oceanic Operetta
    fr: Symphonie des Ondines
    it: Sinfonia del Mare
    de: Grandiose Meeressymphonie
    es: Sinfonía de la Diva Marina
    ko: 바다의심포니
    zh_simp: 海神庄严交响乐
    zh_trad: 海神莊嚴交響樂
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
octazooka:
  names:
    jp_kanji: オクタンほう
    en: Octazooka
    fr: Octazooka
    it: Octazooka
    de: Octazooka
    es: Pulpocañón
    ko: 대포무노포
    zh_simp: 章鱼桶炮
    zh_trad: 章魚桶炮
  descriptions:
    jp_kanji: "相手の顔などに\n墨を吹きかけて攻撃する。\n相手の技を回避しやすくなる。"
    en: "The user sprays ink in the target’s face to inflict damage.\nIncoming moves also become more likely to miss."
    fr: "Le lanceur attaque en projetant de l’encre au visage\nde l’ennemi. Les capacités de la cible deviennent plus\nfaciles à esquiver."
    it: "Chi la usa spruzza inchiostro in faccia al bersaglio.\nInoltre, fa sì che le mosse nemiche falliscano più\nfacilmente."
    de: "Schießt mit Tinte, um Schaden anzurichten, und bewirkt,\ndass gegnerische Attacken den Anwender häufiger\nverfehlen."
    es: "El usuario ataca disparando tinta a la cara del objetivo.\nAdemás, hace que evite con mayor facilidad los\nmovimientos enemigos."
    ko: "상대의 얼굴 등에\n먹물을 내뿜어 공격한다.\n상대의 기술을 회피하기 쉬워진다."
    zh_simp: "向对手的脸等\n喷出墨汁进行攻击。\n会变得较容易闪避对手的招式。"
    zh_trad: "向對手的臉等\n噴出墨汁進行攻擊。\n會變得較容易閃避對手的招式。"
octolock:
  names:
    jp_kanji: たこがため
    en: Octolock
    fr: Octoprise
    it: Tentacolock
    de: Octoklammer
    es: Octopresa
    ko: 문어굳히기
    zh_simp: 蛸固
    zh_trad: 蛸固
  descriptions:
    jp_kanji: "相手を　逃げられなくする。\nかためられた　相手は　毎ターン\n防御と　特防が　下がる。"
    en: "The user locks the target in and prevents it from\nfleeing. This move also lowers the target’s Defense\nand Sp. Def every turn."
    fr: "Le lanceur empêche l’adversaire de fuir.\nÀ chaque tour qui passe, cette capacité baisse\nla Défense et la Défense Spéciale de la cible."
    it: "Chi la usa immobilizza il bersaglio impedendogli\ndi fuggire e ne diminuisce la Difesa e la Difesa Speciale\na ogni turno."
    de: "Das Ziel wird an der Flucht gehindert und seine\nVerteidigung und Spezial-Verteidigung sinken\njede Runde."
    es: "Retiene al objetivo para impedir su huida, a la vez que\nreduce su Defensa y Defensa Especial cada turno."
    ko: "상대를 도망칠 수 없게 한다.\n굳히기에 당한 상대는 매 턴\n방어와 특수방어가 떨어진다."
    zh_simp: "让对手无法逃走。\n对手被固定后，\n每回合都会降低防御和特防。"
    zh_trad: "讓對手無法逃走。\n對手被纏住後，\n防禦和特防每回合都會降低。"
odor_sleuth:
  names:
    jp_kanji: かぎわける
    en: Odor Sleuth
    fr: Flair
    it: Segugio
    de: Schnüffler
    es: Rastreo
    ko: 냄새구별
    zh_simp: 气味侦测
    zh_trad: 氣味偵測
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
ominous_wind:
  names:
    jp_kanji: あやしいかぜ
    en: Ominous Wind
    fr: Vent Mauvais
    it: Funestovento
    de: Unheilböen
    es: Viento Aciago
    ko: 괴상한바람
    zh_simp: 奇异之风
    zh_trad: 奇異之風
  descriptions:
    jp_kanji: "みのけもよだつ突風で\n相手を攻撃する。自分の\n攻めの力　守りの力をあげることもある。"
    en: "The user blasts the target with a gust of repulsive wind.\nThis may also raise the user’s offensive and defensive\nstats."
    fr: "Le lanceur crée une violente bourrasque.\nPeut aussi augmenter la puissance offensive et défensive\ndu lanceur."
    it: "Chi la usa attacca con una raffica di vento\nraccapricciante che può anche aumentarne\nla forza offensiva e la forza difensiva."
    de: "Das Ziel treffen abscheuliche Winde. Erhöht eventuell\ndie Offensivkraft und Defensivkraft des Anwenders."
    es: "Ataca con un viento horripilante que además puede\nsubir la ofensiva y la defensiva del usuario."
    ko: "소름이 끼칠 만한 돌풍으로\n상대를 공격한다.\n자신의 공격력과 방어력이 오를 때가 있다."
    zh_simp: "用令人毛骨悚然的\n强风攻击对手。\n有时会提高自己的进攻力和防守力。"
    zh_trad: "用令人毛骨悚然\n的強風攻擊對手。\n有時還會提高自己的進攻力和防守力。"
origin_pulse:
  names:
    jp_kanji: こんげんのはどう
    en: Origin Pulse
    fr: Onde Originelle
    it: Primopulsar
    de: Ursprungswoge
    es: Pulso Primigenio
    ko: 근원의파동
    zh_simp: 根源波动
    zh_trad: 根源波動
  descriptions:
    jp_kanji: "青白く　輝く　無数の　光線で\n相手を　攻撃する。"
    en: "The user attacks opposing Pokémon with countless\nbeams of light that glow a deep and brilliant blue."
    fr: "D’innombrables rayons lumineux d’un bleu étincelant\ns’abattent sur la cible."
    it: "Attacca i nemici intorno colpendoli\ncon miriadi di raggi di luce blu."
    de: "Der Anwender greift gegnerische Pokémon mit\nunzähligen blau leuchtenden Strahlen an."
    es: "Ataca al objetivo con una infinidad de rayos de luz\nazulada."
    ko: "파랗게 빛나는 무수한 광선으로\n상대를 공격한다."
    zh_simp: "用无数青白色\n且闪耀的光线攻击对手。"
    zh_trad: "放出無數閃耀著青白色光輝的\n光線攻擊對手。"
outrage:
  names:
    jp_kanji: げきりん
    en: Outrage
    fr: Colère
    it: Oltraggio
    de: Wutanfall
    es: Enfado
    ko: 역린
    zh_simp: 逆鳞
    zh_trad: 逆鱗
  descriptions:
    jp_kanji: "激怒して攻撃する。\n技をだしたあと熱中状態になる。"
    en: "The user attacks by going on a rampage, then becomes\nfixated on using this move."
    fr: "Le lanceur attaque frénétiquement et devient obsédé\npar la capacité."
    it: "Chi la usa sfoga la sua ira e attacca il nemico.\nTuttavia, si fissa su questa mossa dopo averla sferrata."
    de: "Ein wütender Angriff. Danach fixiert sich der Anwender\nauf diese Attacke."
    es: Se enfurece y ataca. El usuario se crece tras usarlo.
    ko: "격노하여 공격한다.\n기술을 사용한 다음 열중 상태가 된다."
    zh_simp: "勃然大怒进行攻击。\n招式结束后自己会陷入热衷状态。"
    zh_trad: "勃然大怒進行攻擊。\n招式結束後自己會陷入熱衷狀態。"
overdrive:
  names:
    jp_kanji: オーバードライブ
    en: Overdrive
    fr: Overdrive
    it: Overdrive
    de: Overdrive
    es: Amplificador
    ko: 오버드라이브
    zh_simp: 破音
    zh_trad: 破音
  descriptions:
    jp_kanji: "ギターや　ベースを　かきならして\n激しく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user attacks opposing Pokémon by twanging\na guitar or bass guitar, causing a huge echo and\nstrong vibration."
    fr: "Le lanceur gratte ses cordes de guitare ou de basse\npour créer de violentes vibrations sonores qui blessent\nla cible."
    it: "Chi la usa suona la chitarra o il basso creando un’onda\nsonora potentissima con cui attacca il bersaglio."
    de: "Der Anwender haut in die Saiten seiner Gitarre oder\nseines Basses und erzeugt dröhnende, kraftvolle\nVibrationen, die gegnerischen Pokémon schaden."
    es: "El usuario rasguea la guitarra o el bajo para generar\nenormes vibraciones de intensa reverberación con las\nque ataca al objetivo."
    ko: "기타나 베이스를 쳐서\n큰 울림과 강한 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "奏响吉他和贝斯，释放出\n发出巨响的剧烈震动\n攻击对手。"
    zh_trad: "彈奏吉他和貝斯，\n用發出巨響的激烈震動\n攻擊對手。"
overheat:
  names:
    jp_kanji: オーバーヒート
    en: Overheat
    fr: Surchauffe
    it: Vampata
    de: Hitzekoller
    es: Sofoco
    ko: 오버히트
    zh_simp: 过热
    zh_trad: 過熱
  descriptions:
    jp_kanji: "フルパワーで相手を攻撃する。\n使うと反動で\n自分の攻めの力がさがる。"
    en: "The user attacks the target at full power. The recoil from\nthis move lowers the user’s offensive stats."
    fr: "Attaque l’ennemi à pleine puissance.\nLe contrecoup baisse la puissance offensive\ndu lanceur."
    it: "Chi la usa sferra un potente attacco, ma il contraccolpo\nriduce la sua forza offensiva."
    de: "Angriff mit voller Kraft, der die Offensivkraft des\nAnwenders durch den Rückstoß senkt."
    es: "Ataque en toda regla que baja la ofensiva de quien lo\nusa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 공격력이 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的进攻力会降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的進攻力會降低。"
pain_split:
  names:
    jp_kanji: いたみわけ
    en: Pain Split
    fr: Balance
    it: Malcomune
    de: Leidteiler
    es: Divide Dolor
    ko: 아픔나누기
    zh_simp: 分担痛楚
    zh_trad: 分擔痛楚
  descriptions:
    jp_kanji: "自分の　ＨＰと　相手の　ＨＰを\nあわせて　それを　自分と　相手で\nなかよく　わける。"
    en: "The user adds its HP to the target’s HP, then equally\nshares the combined HP with the target."
    fr: "Le lanceur ajoute ses PV à ceux de sa cible\net les répartit équitablement."
    it: "Chi la usa somma i propri PS a quelli di un altro\nPokémon per poi dividerli in parti uguali."
    de: Addiert KP von Anwender und Ziel. Teilt sie gerecht auf.
    es: "Suma los PS del usuario a los del objetivo y los reparte\na partes iguales."
    ko: "자신의 HP와 상대의 HP를\n합친 것을 자신과 상대가\n사이좋게 나눈다."
    zh_simp: "将自己的ＨＰ和\n对手的ＨＰ相加，\n然后自己和对手友好地平分。"
    zh_trad: "將自己的ＨＰ和\n對手的ＨＰ相加，\n然後雙方友好地平分。"
parabolic_charge:
  names:
    jp_kanji: パラボラチャージ
    en: Parabolic Charge
    fr: Parabocharge
    it: Caricaparabola
    de: Parabolladung
    es: Carga Parábola
    ko: 파라볼라차지
    zh_simp: 抛物面充电
    zh_trad: 拋物面充電
  descriptions:
    jp_kanji: "周りにいる　ポケモン　全員に\nダメージ。　与えた　ダメージの\n半分を　自分が　回復する。"
    en: "The user attacks everything around it. The user’s HP\nis restored by half the damage taken by those hit."
    fr: "Inflige des dégâts à tous les Pokémon autour du lanceur.\nIl récupère en PV la moitié des dégâts infligés."
    it: "Infligge danni a tutti i Pokémon vicini. Chi la\nusa recupera una quantità di PS pari alla metà\ndel danno inferto."
    de: "Fügt allen Pokémon im Umkreis Schaden zu.\nDer Anwender wird um die Hälfte des insgesamt\nangerichteten Schadens geheilt."
    es: "Inflige daño a todos los Pokémon a su alrededor.\nEl usuario absorbe la mitad del daño producido para\nrestaurar sus propios PS."
    ko: "주위에 있는 모든 포켓몬에게\n데미지를 준다. 준 데미지의\n절반을 자신이 회복한다."
    zh_simp: "给周围全体宝可梦造成伤害。\n可以回复给予伤害的一半ＨＰ。"
    zh_trad: "攻擊自己周圍所有的寶可夢。\n可以回復給予傷害的一半ＨＰ。"
parting_shot:
  names:
    jp_kanji: すてゼリフ
    en: Parting Shot
    fr: Dernier Mot
    it: Monito
    de: Abgangstirade
    es: Última Palabra
    ko: 막말내뱉기
    zh_simp: 抛下狠话
    zh_trad: 拋下狠話
  descriptions:
    jp_kanji: "すてゼリフで　相手を　いかくし\n攻撃と　特攻を　さげたのち\n控えの　ポケモンと　入れ替わる。"
    en: "With a parting threat, the user lowers the target’s\nAttack and Sp. Atk stats. Then it switches with a\nparty Pokémon."
    fr: "Menace l’ennemi dans une ultime tirade avant\nde changer de place avec un autre Pokémon.\nRéduit l’Attaque et l’Attaque Spéciale de l’ennemi."
    it: "Chi la usa lancia un monito intimidatorio al bersaglio,\nriducendone l’Attacco e l’Attacco Speciale, e si fa\nsostituire da un altro Pokémon della squadra."
    de: "Schüchtert das Ziel mit einer Abgangstirade ein,\nsodass dessen Angriffs- und Spezial-Angriffs-Wert\nsinken. Danach wird der Anwender ausgewechselt."
    es: "El usuario se cambia por otro Pokémon de su equipo,\npero antes amedrenta a su oponente y hace que\ndisminuyan su Ataque y Ataque Especial."
    ko: "막말을 내뱉어 상대를 위협하여\n공격과 특수공격을 떨어뜨린 후\n교대 포켓몬과 교체한다."
    zh_simp: "抛下狠话威吓对手，\n降低攻击和特攻后，\n和后备宝可梦进行替换。"
    zh_trad: "拋下狠話恐嚇對手，\n降低對手的攻擊和特攻後，\n和後備寶可夢進行替換。"
pay_day:
  names:
    jp_kanji: ネコにこばん
    en: Pay Day
    fr: Jackpot
    it: Giornopaga
    de: Zahltag
    es: Día de Pago
    ko: 고양이돈받기
    zh_simp: 聚宝功
    zh_trad: 聚寶功
  descriptions:
    jp_kanji: "相手の　体に\n小判を　投げつけて　攻撃する。\n戦闘の　あとで　お金が　もらえる。"
    en: "Numerous coins are hurled at the target to inflict\ndamage. Money is earned after the battle."
    fr: "Des pièces sont lancées sur l’ennemi.\nPermet d’obtenir de l’argent à la fin du combat."
    it: "Colpisce il bersaglio con una gran quantità\ndi monete recuperabili dopo la lotta."
    de: "Das Ziel wird mit Münzen beworfen. Das Geld wird\nnach dem Kampf aufgesammelt."
    es: "Arroja monedas al objetivo y las recupera al final del\ncombate."
    ko: "상대의 몸에\n돈을 세게 던져서 공격한다.\n배틀 후에 돈을 받을 수 있다."
    zh_simp: "向对手的身体\n投掷小金币进行攻击。\n战斗后可以拿到钱。"
    zh_trad: "往對手身上\n投擲金幣進行攻擊。\n戰鬥後可以得到錢。"
payback:
  names:
    jp_kanji: しっぺがえし
    en: Payback
    fr: Représailles
    it: Rivincita
    de: Gegenstoß
    es: Vendetta
    ko: 보복
    zh_simp: 以牙还牙
    zh_trad: 以牙還牙
  descriptions:
    jp_kanji: "ためこんで　攻撃する。\n相手より　あとに　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stores power, then attacks. If the user\nmoves after the target, this attack’s power will\nbe doubled."
    fr: "Le lanceur concentre son énergie puis attaque.\nLa puissance de cette capacité est doublée si\nle lanceur agit après l’ennemi."
    it: "Chi la usa accumula forza, poi attacca. La potenza\nraddoppia se il Pokémon agisce dopo il bersaglio."
    de: "Der Anwender lädt die Attacke auf. Handelt das Ziel vor\ndem Anwender, verdoppelt sich die Stärke der Attacke."
    es: "El usuario contraataca con el doble de fuerza si el\nobjetivo usa un movimiento antes."
    ko: "모아서 공격한다.\n상대보다 나중에 공격할 수 있으면\n기술의 위력은 2배가 된다."
    zh_simp: "蓄力攻击。\n如果能在对手之后攻击，\n招式的威力会变成２倍。"
    zh_trad: "累積力量進行攻擊。\n若在對手之後進行攻擊，\n招式的威力會變成２倍。"
peck:
  names:
    jp_kanji: つつく
    en: Peck
    fr: Picpic
    it: Beccata
    de: Pikser
    es: Picotazo
    ko: 쪼기
    zh_simp: 啄
    zh_trad: 啄
  descriptions:
    jp_kanji: "鋭く　とがった　くちばしや　つので\n相手を　突いて　攻撃する。"
    en: "The target is jabbed with a sharply pointed beak\nor horn."
    fr: "Frappe l’ennemi d’un bec pointu ou d’une corne\npour infliger des dégâts."
    it: "Colpisce il bersaglio con il becco appuntito\no con un corno."
    de: Greift das Ziel mit dem Schnabel oder Horn an.
    es: Ensarta al objetivo con un cuerno o pico punzante.
    ko: "날카롭고 뾰족한 부리나 뿔로\n상대를 쪼아서 공격한다."
    zh_simp: "用尖锐的喙或角\n刺向对手进行攻击。"
    zh_trad: "用尖銳的喙或角\n刺向對手進行攻擊。"
perish_song:
  names:
    jp_kanji: ほろびのうた
    en: Perish Song
    fr: Requiem
    it: Ultimocanto
    de: Abgesang
    es: Canto Mortal
    ko: 멸망의노래
    zh_simp: 终焉之歌
    zh_trad: 滅亡之歌
  descriptions:
    jp_kanji: "歌を　聴いた　ポケモンは\n３ターン　たつと　ひんしに　なる。\n交代すると　効果は　なくなる。"
    en: "Any Pokémon that hears this song faints in three\nturns, unless it switches out of battle."
    fr: "Tout Pokémon qui entend ce requiem est K.O.\ndans trois tours à moins qu’il ne soit remplacé."
    it: "Qualunque Pokémon che senta questo canto va\nKO in tre turni, se non lo si sostituisce."
    de: "Wer diese Musik hört, wird nach drei Runden besiegt.\nRettung ist durch den Eintausch eines neuen Pokémon\nmöglich."
    es: "Si un Pokémon escucha este canto y no es cambiado\npor otro en tres turnos, acaba debilitándose."
    ko: "노래를 들은 포켓몬은\n3턴이 지나면 기절한다.\n교체되면 효과가 없어진다."
    zh_simp: "倾听歌声的宝可梦\n经过３回合陷入昏厥。\n替换后效果消失。"
    zh_trad: "聽了歌聲的寶可夢\n３回合後將陷入瀕死。\n替換寶可夢後效果就會消失。"
petal_blizzard:
  names:
    jp_kanji: はなふぶき
    en: Petal Blizzard
    fr: Tempête Florale
    it: Fiortempesta
    de: Blütenwirbel
    es: Tormenta Floral
    ko: 꽃보라
    zh_simp: 落英缤纷
    zh_trad: 落英繽紛
  descriptions:
    jp_kanji: "激しい　花吹雪を　起こし\n周りに　いるものに　攻撃して\nダメージを　与える。"
    en: "The user stirs up a violent petal blizzard and attacks\neverything around it."
    fr: "Déclenche une violente tempête de fleurs qui inflige\ndes dégâts à tous les Pokémon alentour."
    it: "Infligge danni ai Pokémon che ha intorno\nattaccandoli con una tempesta di fiori."
    de: "Der Anwender erzeugt einen turbulenten Blütenwirbel,\nder alle Pokémon im Umkreis erfasst und ihnen Schaden\nzufügt."
    es: "El usuario desata un intenso vendaval de pétalos que\ndaña a los Pokémon a su alrededor."
    ko: "세찬 꽃보라를 일으켜서\n주위에 있는 포켓몬을 공격하여\n데미지를 준다."
    zh_simp: "猛烈地刮起飞雪般的落花，\n攻击周围所有的宝可梦，\n并给予伤害。"
    zh_trad: "猛烈地刮起飛雪般的落花，\n攻擊自己周圍所有的寶可夢。"
petal_dance:
  names:
    jp_kanji: はなびらのまい
    en: Petal Dance
    fr: Danse Fleurs
    it: Petalodanza
    de: Blättertanz
    es: Danza Pétalo
    ko: 꽃잎댄스
    zh_simp: 花瓣舞
    zh_trad: 花瓣舞
  descriptions:
    jp_kanji: "花をまきちらして相手を攻撃する。\n技をだしたあと熱中状態になる。"
    en: "The user attacks the target by scattering petals,\nthen becomes fixated on using this move."
    fr: "Le lanceur attaque en projetant des pétales et devient\nobsédé par la capacité."
    it: "Chi la usa attacca il nemico cospargendolo di petali,\ntuttavia si fissa su questa mossa dopo averla sferrata."
    de: "Ein Angriff mit Blütenblättern. Danach fixiert sich der\nAnwender auf diese Attacke."
    es: "Ataca al objetivo lanzando pétalos. El usuario se crece\ntras usarlo."
    ko: "꽃을 흩뿌려서 상대를 공격한다.\n기술을 사용한 다음 열중 상태가 된다."
    zh_simp: "散落花瓣攻击对手。\n招式结束后自己会陷入热衷状态。"
    zh_trad: "灑出花瓣攻擊對手。\n招式結束後自己會陷入熱衷狀態。"
phantom_force:
  names:
    jp_kanji: ゴーストダイブ
    en: Phantom Force
    fr: Hantise
    it: Spettrotuffo
    de: Phantomkraft
    es: Golpe Fantasma
    ko: 고스트다이브
    zh_simp: 潜灵奇袭
    zh_trad: 潛靈奇襲
  descriptions:
    jp_kanji: "１ターンめで　どこかに　消えて\n２ターンめに　相手を　攻撃する。\n守りを　無視して　攻撃できる。"
    en: "The user vanishes somewhere, then strikes the\ntarget on the next turn. This move hits even if the\ntarget protects itself."
    fr: "Le lanceur disparaît au premier tour et frappe au second.\nCette attaque passe outre les protections."
    it: "Chi la usa scompare improvvisamente per attaccare\npoi nel turno seguente. Questa mossa neutralizza\nle protezioni del bersaglio."
    de: "Der Anwender verschwindet in Runde 1, um seine Kraft\nzu sammeln, und attackiert in Runde 2. Trifft auch,\nwenn sich das Ziel selbst schützt."
    es: "El usuario desaparece en el primer turno y ataca a su\nobjetivo en el segundo. Permite acertar aunque el\nobjetivo esté protegiéndose."
    ko: "1턴째에 어디론가 사라져서\n2턴째에 상대를 공격한다.\n기술 방어를 무시하고 공격할 수 있다."
    zh_simp: "第１回合消失在某处，\n第２回合攻击对手。\n可以无视守护进行攻击。"
    zh_trad: "使用後的第１回合消失到某處，\n並於第２回合攻擊對手。\n可不顧對手的守護進行攻擊。"
photon_geyser:
  names:
    jp_kanji: フォトンゲイザー
    en: Photon Geyser
    fr: Photo-Geyser
    it: Geyser Fotonico
    de: Photonen-Geysir
    es: Géiser Fotónico
    ko: 포톤가이저
    zh_simp: 光子喷涌
    zh_trad: 光子噴湧
  descriptions:
    jp_kanji: "光の　柱で　攻撃する。\n攻撃と　特攻を　比べて\n高いほうで　ダメージを　与える。"
    en: "The user attacks a target with a pillar of light. This\nmove inflicts Attack or Sp. Atk damage—whichever\nstat is higher for the user."
    fr: "Le lanceur fait jaillir un pilier de lumière.\nCompare l’Attaque et l’Attaque Spéciale, et utilise\ncelle qui infligera le plus de dégâts."
    it: "Attacca il bersaglio con una colonna di luce.\nInfligge danni in base all’Attacco o all’Attacco\nSpeciale scegliendo il più alto tra i due."
    de: "Ein Angriff mit einer Lichtsäule. Ist der Angriff höher\nals der Spezial-Angriff, wird die Höhe des Schadens\ndurch den Angriff bestimmt und umgekehrt."
    es: "El usuario ataca con una gran columna de luz. Compara\nsus valores de Ataque y Ataque Especial para infligir\ndaño con el más alto de los dos."
    ko: "빛의 기둥으로 공격한다.\n공격과 특수공격을 비교해서\n높은 쪽으로 데미지를 준다."
    zh_simp: "用光柱来进行攻击。\n比较自己的攻击和特攻，\n用数值相对较高的一项给予对方伤害。"
    zh_trad: "以光柱進行攻擊。\n會比較自己的攻擊和特攻，\n以數值較高的一方進行攻擊。"
pika_papow:
  names:
    jp_kanji: ピカピカサンダー
    en: Pika Papow
    fr: Pika-Fracas
    it: Pikasaetta
    de: Pika-Flash
    es: Pikatormenta
    ko: 피카피카썬더
    zh_simp: 闪闪雷光
    zh_trad: 閃閃雷光
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
pin_missile:
  names:
    jp_kanji: ミサイルばり
    en: Pin Missile
    fr: Dard-Nuée
    it: Missilspillo
    de: Nadelrakete
    es: Pin Misil
    ko: 바늘미사일
    zh_simp: 飞弹针
    zh_trad: 飛彈針
  descriptions:
    jp_kanji: "鋭いハリを発射して攻撃する。\nばらまかれたハリの破片によって\n相手に数回ダメージを与える。"
    en: "Sharp spikes are shot at the target. Spike splinters left\nbehind by this attack continue to damage the target for\nseveral turns."
    fr: "Envoie une rafale de dards.\nLes débris de dards disséminés infligent des dégâts\nà la cible à plusieurs reprises."
    it: "Chi la usa attacca sparando delle spine aguzze\nsul bersaglio. I frammenti di spine sparsi nei dintorni\ninfliggono ripetutamente danni al bersaglio."
    de: "Spitze Nadeln treffen das Ziel. Dieses nimmt durch\nverstreute Nadelsplitter wiederholt Schaden."
    es: "Ataca con una ráfaga de finas púas. Estas dejan\nfragmentos que dañan al objetivo varias veces."
    ko: "날카로운 침을 발사하여 공격한다.\n흩어진 침 파편으로\n상대에게 여러 번 데미지를 준다."
    zh_simp: "向对手发射锐针进行攻击。\n散落的针的碎片\n可给予对手数次伤害。"
    zh_trad: "發射銳利的針進行攻擊。\n散落的針的碎片\n可給予對手數次傷害。"
plasma_fists:
  names:
    jp_kanji: プラズマフィスト
    en: Plasma Fists
    fr: Plasma Punch
    it: Pugni Plasma
    de: Plasmafäuste
    es: Puños Plasma
    ko: 플라스마피스트
    zh_simp: 等离子闪电拳
    zh_trad: 等離子閃電拳
  descriptions:
    jp_kanji: "電気を　まとった　こぶしで\n攻撃。　ノーマルタイプの　技を\nでんきタイプに　してしまう。"
    en: "The user attacks with electrically charged fists.\nThis move changes Normal-type moves to\nElectric-type moves."
    fr: "Le lanceur attaque en projetant de l’électricité\navec ses poings. Convertit les capacités de type Normal\nen type Électrik."
    it: "Chi la usa attacca con pugni carichi di elettricità.\nTrasforma le mosse di tipo Normale in mosse di tipo\nElettro."
    de: "Ein Angriff mit elektrisch geladenen Fäusten, der\nbewirkt, dass Normal-Attacken den Typ Elektro\nannehmen."
    es: "El usuario ataca con puños cargados de electricidad.\nConvierte los movimientos de tipo Normal en\nmovimientos de tipo Eléctrico."
    ko: "전기를 두른 주먹으로\n공격한다. 노말타입 기술을\n전기타입으로 바꿔 버린다."
    zh_simp: "用覆盖着电流的拳头进行攻击。\n使一般属性的招式变成电属性。"
    zh_trad: "用帶有電流的拳頭進行攻擊。\n可以將一般屬性的\n招式轉變為電屬性。"
play_nice:
  names:
    jp_kanji: なかよくする
    en: Play Nice
    fr: Camaraderie
    it: Simpatia
    de: Kameradschaft
    es: Camaradería
    ko: 친해지기
    zh_simp: 和睦相处
    zh_trad: 和睦相處
  descriptions:
    jp_kanji: "相手と　なかよくなって\n戦う　気力を　失わせ\n相手の　攻撃を　さげる。"
    en: "The user and the target become friends, and the\ntarget loses its will to fight. This lowers the target’s\nAttack stat."
    fr: "L’ennemi se lie d’amitié avec le lanceur et perd\nsa combativité, diminuant son Attaque."
    it: "Chi la usa diventa amico del bersaglio,\nrabbonendolo e riducendone così l’Attacco."
    de: "Der Anwender schließt mit dem Ziel Freundschaft\nund nimmt ihm seine Angriffslust. Der Angriffs-Wert\ndes Zieles sinkt."
    es: "Se hace amigo de su oponente y consigue que a este\nse le quiten las ganas de combatir. Además, reduce su\nAtaque."
    ko: "상대와 친해져서\n싸울 마음을 잃게 하여\n상대의 공격을 떨어뜨린다."
    zh_simp: "和对手和睦相处，\n使其失去战斗的气力，\n从而降低对手的攻击。"
    zh_trad: "和對手和睦相處，\n讓對手失去戰鬥意志，\n降低對手的攻擊。"
play_rough:
  names:
    jp_kanji: じゃれつく
    en: Play Rough
    fr: Câlinerie
    it: Carineria
    de: Knuddler
    es: Carantoña
    ko: 치근거리기
    zh_simp: 嬉闹
    zh_trad: 嬉鬧
  descriptions:
    jp_kanji: "じゃれついて攻撃。\n相手の攻めの力をさげることもある。"
    en: "The user plays rough with the target and attacks it.\nThis may also lower the target’s offensive stats."
    fr: "Attaque l’ennemi avec un câlin.\nPeut aussi baisser la puissance offensive de la cible."
    it: "Chi la usa attacca il bersaglio con delle carinerie\nche possono anche ridurre la sua forza offensiva."
    de: "Der Anwender knuddelt das Ziel und greift es an.\nSenkt eventuell die Offensivkraft des Zieles."
    es: "El Pokémon que lo usa le hace cucamonas al objetivo y\nlo ataca. Puede disminuir la ofensiva del objetivo."
    ko: "상대에게 치근거리며 공격한다.\n상대의 공격력을 떨어뜨릴 때가 있다."
    zh_simp: "与对手嬉闹并攻击。\n有时会降低对手的进攻力。"
    zh_trad: "嬉鬧的同時進行攻擊。\n有時還會降低對手的進攻力。"
pluck:
  names:
    jp_kanji: ついばむ
    en: Pluck
    fr: Picore
    it: Spennata
    de: Pflücker
    es: Picoteo
    ko: 쪼아대기
    zh_simp: 啄食
    zh_trad: 啄食
  descriptions:
    jp_kanji: "くちばしで　攻撃。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user pecks the target. If the target is holding a\nBerry, the user eats it and gains its effect."
    fr: "Le lanceur picore la cible.\nSi cette dernière tient une Baie, le lanceur la mange\net profite de ses effets."
    it: "Chi la usa becca il bersaglio. Inoltre, se questi ha\nuna bacca, gliela ruba e ne sfrutta gli effetti."
    de: "Anwender pickt das Ziel, nimmt die Beere, falls das\nZiel eine trägt, und erhält ihren Effekt."
    es: "Picotea al objetivo. Si este sostiene una baya, la picotea\ntambién y obtiene sus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
    zh_simp: "用喙进行攻击。\n当对手携带树果时，\n可以食用并获得其效果。"
    zh_trad: "用鳥喙進行攻擊。\n可以吃下對手攜帶的樹果，\n並獲得樹果的效果。"
poison_fang:
  names:
    jp_kanji: どくどくのキバ
    en: Poison Fang
    fr: Crochet Venin
    it: Velenodenti
    de: Giftzahn
    es: Colmillo Veneno
    ko: 독엄니
    zh_simp: 剧毒牙
    zh_trad: 劇毒牙
  descriptions:
    jp_kanji: "毒の　ある　キバで\n相手に　かみついて　攻撃する。\n猛毒を　おわせる　ことが　ある。"
    en: "The user bites the target with toxic fangs. This may\nalso leave the target badly poisoned."
    fr: "Le lanceur mord l’ennemi de ses crocs toxiques.\nPeut aussi l’empoisonner gravement."
    it: "Chi la usa morde il bersaglio con denti avvelenati\nche possono anche iperavvelenarlo."
    de: "Angriff mit giftigen Reißzähnen. Das Ziel wird eventuell\nschwer vergiftet."
    es: "Colmillos tóxicos que pueden envenenar gravemente al\nobjetivo."
    ko: "독이 있는 이빨로\n상대를 물어서 공격한다.\n맹독을 주입할 때가 있다."
    zh_simp: "用有毒的牙齿\n咬住对手进行攻击。\n有时会使对手中剧毒。"
    zh_trad: "用有毒的牙齒\n咬住對手進行攻擊。\n有時會讓對手陷入劇毒狀態。"
poison_gas:
  names:
    jp_kanji: どくガス
    en: Poison Gas
    fr: Gaz Toxik
    it: Velenogas
    de: Giftwolke
    es: Gas Venenoso
    ko: 독가스
    zh_simp: 毒瓦斯
    zh_trad: 毒瓦斯
  descriptions:
    jp_kanji: "毒ガスを吹きかけて\n相手を毒状態にする。"
    en: "The user sprays a cloud of toxic gas that poisons\nthe target."
    fr: "Un nuage de gaz toxique est projeté sur l’ennemi pour\nl’empoisonner."
    it: "Spruzza addosso al bersaglio una nuvola di gas tossico\nche avvelena."
    de: Hüllt das Ziel in ein Gas ein, das es vergiftet.
    es: "Lanza una nube de gas tóxico al objetivo. Produce\nenvenenamiento."
    ko: "독가스를 내뿜어\n상대를 독 상태로 만든다."
    zh_simp: "将毒瓦斯吹向对手，\n从而让对手陷入中毒状态。"
    zh_trad: "將毒瓦斯吹向對手，\n讓對手陷入中毒狀態。"
poison_jab:
  names:
    jp_kanji: どくづき
    en: Poison Jab
    fr: Direct Toxik
    it: Velenpuntura
    de: Gifthieb
    es: Puya Nociva
    ko: 독찌르기
    zh_simp: 毒击
    zh_trad: 毒擊
  descriptions:
    jp_kanji: "毒にそまった触手や腕で突き刺す。\n相手を毒状態にすることもある。"
    en: "The target is stabbed with a tentacle, arm, or the like\nsteeped in poison. This may also poison the target."
    fr: "Attaque l’ennemi avec un tentacule, un bras,\nou un autre membre imprégné de poison.\nPeut aussi empoisonner la cible."
    it: "Il bersaglio è colpito da un tentacolo o da un arto\nintriso di una sostanza tossica che può anche\navvelenarlo."
    de: "Der Anwender greift mit giftigen Gliedmaßen wie\nTentakeln oder Armen an. Das Ziel wird dabei\neventuell vergiftet."
    es: "Pincha con un tentáculo o brazo envenenado al\nobjetivo, al que puede envenenar."
    ko: "독에 물든 촉수나 팔로 꿰찌른다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "用带毒的触手或手臂刺入对手。\n有时会让对手陷入中毒状态。"
    zh_trad: "以帶有毒性的觸手或手臂刺進對手。\n有時還會讓對手陷入中毒狀態。"
poison_powder:
  names:
    jp_kanji: どくのこな
    en: Poison Powder
    fr: Poudre Toxik
    it: Velenpolvere
    de: Giftpuder
    es: Polvo Veneno
    ko: 독가루
    zh_simp: 毒粉
    zh_trad: 毒粉
  descriptions:
    jp_kanji: "毒のある粉を\nたくさんふりまいて\n相手を毒状態にする。"
    en: "The user scatters a cloud of toxic powder that poisons\nthe target."
    fr: "Le lanceur répand une poudre toxique qui empoisonne\nla cible."
    it: "Investe il bersaglio con una nuvola di polvere\ntossica che avvelena."
    de: Verstreut giftigen Puder, der das Ziel vergiftet.
    es: Polvo tóxico que envenena al objetivo.
    ko: "독이 있는 가루를\n많이 흩뿌려서\n상대를 독 상태로 만든다."
    zh_simp: "撒出大量的毒粉，\n从而让对手陷入中毒状态。"
    zh_trad: "撒出大量的有毒粉末\n讓對手陷入中毒狀態。"
poison_sting:
  names:
    jp_kanji: どくばり
    en: Poison Sting
    fr: Dard-Venin
    it: Velenospina
    de: Giftstachel
    es: Picotazo Veneno
    ko: 독침
    zh_simp: 毒针
    zh_trad: 毒針
  descriptions:
    jp_kanji: "毒のあるハリを\n突き刺して攻撃する。\n相手を毒状態にすることもある。"
    en: "The user stabs the target with a poisonous stinger.\nThis may also poison the target."
    fr: "Un dard toxique qui transperce l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa attacca con un aculeo tossico che può\navvelenare il bersaglio."
    de: Angriff mit Giftstachel. Das Ziel wird eventuell vergiftet.
    es: "Ataca lanzando un aguijón tóxico que además puede\nenvenenar al objetivo."
    ko: "독이 있는 침으로\n꿰찔러서 공격한다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "将有毒的针\n刺入对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將有毒的針\n刺進對手進行攻擊。\n有時還會讓對手陷入中毒狀態。"
poison_tail:
  names:
    jp_kanji: ポイズンテール
    en: Poison Tail
    fr: Queue-Poison
    it: Velenocoda
    de: Giftschweif
    es: Cola Veneno
    ko: 포이즌테일
    zh_simp: 毒尾
    zh_trad: 毒尾
  descriptions:
    jp_kanji: "しっぽで　たたく。\n毒状態に　することが　あり\n急所にも　当たりやすい。"
    en: "The user hits the target with its tail. This may also\npoison the target. Critical hits land more easily."
    fr: "Attaque à taux de critiques élevé.\nPeut aussi empoisonner l’ennemi."
    it: "Chi la usa colpisce con la coda e può avvelenare\nil bersaglio. Probabile brutto colpo."
    de: "Angriff mit hoher Volltrefferquote. Diese Schweifattacke\nvergiftet das Ziel eventuell."
    es: Puede envenenar y dar un golpe crítico.
    ko: "꼬리로 때린다.\n독 상태로 만들 때가 있고\n급소에도 맞기 쉽다."
    zh_simp: "用尾巴拍打。\n有时会让对手陷入中毒状态，\n也容易击中要害。"
    zh_trad: "將尾巴甩向對手進行攻擊。\n有時會讓對手陷入中毒狀態，\n且容易擊中要害。"
pollen_puff:
  names:
    jp_kanji: かふんだんご
    en: Pollen Puff
    fr: Boule Pollen
    it: Sferapolline
    de: Pollenknödel
    es: Bola de Polen
    ko: 꽃가루경단
    zh_simp: 花粉团
    zh_trad: 花粉團
  descriptions:
    jp_kanji: "敵には　爆発する　だんごを\n使って　攻撃。　味方には\n回復する　だんごを　与える。"
    en: "The user attacks the enemy with a pollen puff that\nexplodes. If the target is an ally, it gives the ally a\npollen puff that restores its HP instead."
    fr: "Utilisée sur l’ennemi, envoie une boule explosive\nqui fait des dégâts ; sur un allié, donne du bon pollen\nnutritif qui fait récupérer des PV."
    it: "Chi la usa attacca il nemico con una sfera esplosiva.\nSe colpisce degli alleati, fa recuperare loro dei PS."
    de: "Der Anwender greift mit einem Ball aus Pollen an,\nder beim Ziel explodiert. Mitstreiter werden von\neinem Ball getroffen, der ihre KP auffüllt."
    es: "Ataca al oponente con una bola explosiva. Si esta\nalcanza a un aliado, le hará recuperar PS."
    ko: "상대에게는 폭발하는 경단을\n사용하여 공격한다. 같은 편에게는\n회복하는 경단을 준다."
    zh_simp: "对敌人使用是会爆炸的团子。\n对我方使用则是给予回复的团子。"
    zh_trad: "對敵人使用時，用會爆炸的花粉團來攻擊。\n對我方同伴使用時，\n則給予有回復效果的花粉團。"
poltergeist:
  names:
    jp_kanji: ポルターガイスト
    en: Poltergeist
    fr: Esprit Frappeur
    it: Poltergeist
    de: Poltergeist
    es: Poltergeist
    ko: 폴터가이스트
    zh_simp: 灵骚
    zh_trad: 靈騷
  descriptions:
    jp_kanji: "相手の　持ち物を　あやつって　攻撃。\n相手が　道具を　持っていない　場合は\n失敗する。"
    en: "The user attacks the target by controlling the target’s\nitem. The move fails if the target doesn’t have an item."
    fr: "Le lanceur manipule l’objet tenu par l’ennemi\npour l’attaquer. Échoue si la cible ne tient rien."
    it: "Chi la usa attacca utilizzando lo strumento\ndel bersaglio. La mossa fallisce se quest’ultimo\nnon ha uno strumento."
    de: "Der Anwender greift das Ziel mit dessen getragenem\nItem an. Die Attacke schlägt fehl, wenn das Ziel kein\nItem trägt."
    es: "El usuario ataca utilizando el objeto que lleva el rival.\nSi no tiene ninguno equipado, el movimiento falla."
    ko: "상대의 지닌 물건을 조종해서 공격한다.\n상대가 도구를 지니고 있지 않으면 실패한다."
    zh_simp: "操纵对手的持有物进行攻击。\n当对手没有携带道具时，\n使出此招式时便会失败。"
    zh_trad: "操控對手的持有物進行攻擊。\n對手沒有攜帶道具時，\n則會失敗。"
pound:
  names:
    jp_kanji: はたく
    en: Pound
    fr: Écras’Face
    it: Botta
    de: Klaps
    es: Destructor
    ko: 막치기
    zh_simp: 拍击
    zh_trad: 拍擊
  descriptions:
    jp_kanji: "長い　しっぽや　手などを　使って\n相手を　はたいて　攻撃する。"
    en: "The target is physically pounded with a long tail, a\nforeleg, or the like."
    fr: "Écrase l’ennemi avec les pattes avant ou la queue,\npar exemple."
    it: "Colpisce il bersaglio con la coda o le zampe\nanteriori."
    de: Ein Hieb mit den Vorderbeinen oder dem Schweif.
    es: Golpea con las patas o la cola.
    ko: "긴 꼬리나 손 등을 사용하여\n상대를 때려서 공격한다."
    zh_simp: "使用长长的尾巴或手等\n拍打对手进行攻击。"
    zh_trad: "使用長長的尾巴或手等\n拍打對手進行攻擊。"
powder:
  names:
    jp_kanji: ふんじん
    en: Powder
    fr: Nuée de Poudre
    it: Pulviscoppio
    de: Pulverschleuder
    es: Polvo Explosivo
    ko: 분진
    zh_simp: 粉尘
    zh_trad: 粉塵
  descriptions:
    jp_kanji: "ふんじんを　浴びせた　相手が\nほのお技を　使うと\n爆発して　ダメージを　与える。"
    en: "The user covers the target in a combustible powder.\nIf the target uses a Fire-type move, the powder\nexplodes and damages the target."
    fr: "L’ennemi est pris dans un nuage de poudre.\nS’il utilise une capacité de type Feu lors du même tour,\nle nuage explose et lui inflige des dégâts."
    it: "Il bersaglio viene coperto da un pulviscolo che\nesplode danneggiandolo se questi utilizza\nuna mossa di tipo Fuoco nello stesso turno."
    de: "Setzt das Ziel nach Einsatz von Pulverschleuder in\nderselben Runde eine Feuer-Attacke ein, kommt es\nzu einer Explosion, die ihm schadet."
    es: "Esparce un polvo sobre el objetivo. Si este usa un\nmovimiento de tipo Fuego en el mismo turno, el polvo\nexplota y le inflige daño."
    ko: "분진을 뒤집어쓴 상대가\n불꽃 기술을 쓰면\n폭발하여 데미지를 준다."
    zh_simp: "如果被撒到粉尘的对手\n使用火招式，\n则会爆炸并给予伤害。"
    zh_trad: "被撒到粉塵的對手\n使用火屬性招式時，\n會發生爆炸並受到傷害。"
powder_snow:
  names:
    jp_kanji: こなゆき
    en: Powder Snow
    fr: Poudreuse
    it: Polneve
    de: Pulverschnee
    es: Nieve Polvo
    ko: 눈싸라기
    zh_simp: 细雪
    zh_trad: 細雪
  descriptions:
    jp_kanji: "冷たい粉雪を\n吹きつけて攻撃する。\n相手をしもやけ状態にすることもある。"
    en: "The user attacks with a chilling gust of powdery snow.\nThis may also leave the target with frostbite."
    fr: "Le lanceur projette de la neige poudreuse.\nPeut aussi geler la cible."
    it: "Chi la usa attacca il bersaglio con una raffica di neve\nfarinosa che può anche assiderarlo."
    de: "Angriff mit Schnee, durch den das Ziel eventuell\nFrostbrand erleidet."
    es: "Ataca lanzando nieve que también puede dejar helado\nal objetivo."
    ko: "차가운 가랑눈을\n상대에게 내뿜어 공격한다.\n상대를 동상 상태로 만들 때가 있다."
    zh_simp: "将冰冷的细雪\n吹向对手进行攻击。\n有时会让对手陷入冻伤状态。"
    zh_trad: "將冰冷的細雪\n吹向對手進行攻擊。\n有時還會讓對手陷入凍傷狀態。"
power_gem:
  names:
    jp_kanji: パワージェム
    en: Power Gem
    fr: Rayon Gemme
    it: Gemmoforza
    de: Juwelenkraft
    es: Joya de Luz
    ko: 파워젬
    zh_simp: 力量宝石
    zh_trad: 力量寶石
  descriptions:
    jp_kanji: "宝石のように　きらめく光を発射して\n相手を攻撃する。"
    en: "The user attacks with a ray of light that sparkles as if it\nwere made of gemstones."
    fr: "Le lanceur attaque avec un rayon de lumière\nqui scintille comme s’il était composé de gemmes."
    it: "Chi la usa attacca con un raggio di luce che brilla\ncome se fosse fatto di pietre preziose."
    de: "Anwender attackiert mit einem Lichtstrahl, der funkelt,\nals sei er aus Juwelen."
    es: "Ataca con un rayo de luz que centellea como si lo\nformaran miles de joyas."
    ko: "보석처럼 반짝이는 빛을 발사하여\n상대를 공격한다."
    zh_simp: "发射如宝石般\n闪耀的光芒攻击对手。"
    zh_trad: "發射如寶石般\n閃耀的光芒攻擊對手。"
power_shift:
  names:
    jp_kanji: パワーシフト
    en: Power Shift
    fr: Échange Force
    it: Scambioforza
    de: Kraftwechsel
    es: Cambiapoder
    ko: 파워시프트
    zh_simp: 力量转换
    zh_trad: 力量轉換
  descriptions:
    jp_kanji: "自分の攻めの力と\n守りの力を入れ替える。"
    en: The user swaps its offensive and defensive stats.
    fr: "Le lanceur échange sa puissance offensive avec\nsa puissance défensive."
    it: "Chi la usa scambia la sua forza offensiva con la sua\nforza difensiva."
    de: "Der Anwender tauscht seine Offensivkraft mit seiner\nDefensivkraft."
    es: Intercambia su ofensiva por su defensiva.
    ko: 자신의 공격력과 방어력을 바꾼다.
    zh_simp: "将自己的进攻力\n与防守力互相交换。"
    zh_trad: "將自己的進攻力\n與防守力互相交換。"
power_split:
  names:
    jp_kanji: パワーシェア
    en: Power Split
    fr: Partage Force
    it: Pariattacco
    de: Kraftteiler
    es: Isofuerza
    ko: 파워셰어
    zh_simp: 力量平分
    zh_trad: 力量平分
  descriptions:
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻を　たして\n半分に　わける。"
    en: "The user employs its psychic power to average its\nAttack and Sp. Atk stats with those of the target."
    fr: "Additionne l’Attaque Spéciale et l’Attaque du lanceur\net de sa cible et les redistribue équitablement\nentre les deux."
    it: "Chi la usa sfrutta la sua forza psichica per sommare\nAttacco e Attacco Speciale a quelli del bersaglio\ne dividerli equamente."
    de: "Durch Psycho-Kräfte werden Angriff und Spezial-Angriff\ndes Anwenders und des Zieles addiert und in zwei\ngleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer la media de\nsu Ataque y Ataque Especial con los de su objetivo y\ncompartirlos."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격을 더해서\n반으로 나눈다."
    zh_simp: "利用超能力将自己和对手的\n攻击和特攻相加，\n再进行平分。"
    zh_trad: "用超能力將自己和對手的\n攻擊和特攻各別相加後，\n再進行平分。"
power_swap:
  names:
    jp_kanji: パワースワップ
    en: Power Swap
    fr: Permuforce
    it: Barattoforza
    de: Krafttausch
    es: Cambiafuerza
    ko: 파워스웹
    zh_simp: 力量互换
    zh_trad: 力量互換
  descriptions:
    jp_kanji: "超能力で　自分と　相手の\n攻撃と　特攻の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch\nchanges to its Attack and Sp. Atk stats with\nthe target."
    fr: "Pouvoir qui échange les modifications de l’Attaque\nSpéciale et de l’Attaque du lanceur avec la cible."
    it: "Chi la usa sfrutta la sua forza psichica per scambiare\nle modifiche ad Attacco e Attacco Speciale\ncon il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen an Angriff\nund Spezial-Angriff mit denen des Zieles."
    es: "El usuario emplea su poder mental para intercambiar los\ncambios en el Ataque y Ataque Especial con el objetivo."
    ko: "초능력으로 자신과 상대의\n공격과 특수공격의\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手的攻击\n以及特攻的能力变化。"
    zh_trad: "用超能力將自己和對手的\n攻擊與特攻的能力變化互相交換。"
power_trick:
  names:
    jp_kanji: パワートリック
    en: Power Trick
    fr: Astuce Force
    it: Ingannoforza
    de: Krafttrick
    es: Truco Fuerza
    ko: 파워트릭
    zh_simp: 力量戏法
    zh_trad: 力量戲法
  descriptions:
    jp_kanji: "超能力で\n自分の　攻撃と　防御の\n力を　交換する。"
    en: "The user employs its psychic power to switch its\nAttack stat with its Defense stat."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour\néchanger sa Défense et son Attaque."
    it: "Mossa psichica che permette a chi la usa\ndi scambiare i valori delle sue statistiche\ndi Attacco e Difesa."
    de: "Anwender setzt Psycho-Kräfte ein, um eigenen\nAngriffs- mit Verteidigungs-Wert auszutauschen."
    es: "Usa sus poderes mentales para intercambiar sus\ncaracterísticas de Ataque y Defensa."
    ko: "초능력으로\n자신의 공격과 방어의\n힘을 교환한다."
    zh_simp: "利用超能力交换\n自己的攻击和\n防御的力量。"
    zh_trad: "利用超能力，\n將自己的攻擊和\n防禦互相交換。"
power_trip:
  names:
    jp_kanji: つけあがる
    en: Power Trip
    fr: Arrogance
    it: Tracotanza
    de: Überheblichkeit
    es: Chulería
    ko: 기어오르기
    zh_simp: 嚣张
    zh_trad: 囂張
  descriptions:
    jp_kanji: "自分の　強さを　鼻高々に\n攻撃する。自分の　能力が\nあがって　いるほど　威力が　あがる。"
    en: "The user boasts its strength and attacks the target.\nThe more the user’s stats are raised, the greater the\nmove’s power."
    fr: "Ivre de puissance, le lanceur attaque de toutes\nses forces. Plus ses stats ont été augmentées,\nplus la puissance de l’attaque est élevée."
    it: "Chi la usa attacca il bersaglio sfoggiando\nla propria forza. Più le sue statistiche sono\nstate aumentate, più la mossa è potente."
    de: "Der Anwender prahlt mit seiner Stärke und greift das\nZiel an. Dieser Angriff ist umso stärker, je weiter die\nStatuswerte des Anwenders erhöht sind."
    es: "Ataca al oponente presumiendo de su fuerza. Cuanto\nmás hayan subido las características del usuario,\nmayor será el daño."
    ko: "자신의 강함을 뻐기고\n공격한다. 자신의 능력이\n올라가 있는 만큼 위력이 오른다."
    zh_simp: "耀武扬威地攻击对手，\n自己的能力提高得越多，\n威力就越大。"
    zh_trad: "耀武揚威地攻擊對手，\n自己的能力提高得越多，\n威力就越大。"
power_up_punch:
  names:
    jp_kanji: グロウパンチ
    en: Power-Up Punch
    fr: Poing Boost
    it: Crescipugno
    de: Steigerungshieb
    es: Puño Incremento
    ko: 그로우펀치
    zh_simp: 增强拳
    zh_trad: 增強拳
  descriptions:
    jp_kanji: "繰り返し　打つことで\nだんだん　こぶしが　固くなる。\n相手に　当てると　攻撃が　あがる。"
    en: "Striking opponents over and over makes the user’s\nfists harder. Hitting a target raises the Attack stat."
    fr: "À force de frapper, les poings deviennent plus durs.\nAugmente l’Attaque du lanceur si l’ennemi est touché."
    it: "Rende i pugni più duri a ogni colpo inferto.\nSe i pugni vanno a segno, l’Attacco di chi\nla usa aumenta."
    de: "Die Fäuste des Anwenders härten durch wiederholtes\nZuschlagen ab. Mit jedem Treffer steigt sein\nAngriffs-Wert."
    es: "Cada vez que golpea a un oponente se endurecen sus\npuños. Si acierta al objetivo, el Ataque del usuario\naumenta."
    ko: "반복하여 때리면\n점점 주먹이 단단해진다.\n상대를 때리면 공격이 오른다."
    zh_simp: "通过反复击打对手，\n使自己的拳头慢慢变硬。\n打中对手攻击就会提高。"
    zh_trad: "反覆出拳擊打對手，\n使自己的拳頭慢慢變硬。\n命中對手時會提高自己的攻擊。"
power_whip:
  names:
    jp_kanji: パワーウィップ
    en: Power Whip
    fr: Mégafouet
    it: Vigorcolpo
    de: Blattgeißel
    es: Latigazo
    ko: 파워휩
    zh_simp: 强力鞭打
    zh_trad: 強力鞭打
  descriptions:
    jp_kanji: "ツタや　触手を　激しく　ふるって\n相手を　たたきつけ　攻撃する。"
    en: "The user violently whirls its vines, tentacles, or the\nlike to harshly lash the target."
    fr: "Le lanceur fait virevolter violemment ses lianes\nou ses tentacules pour fouetter l’ennemi."
    it: "Chi la usa agita violentemente liane o tentacoli\nper sferzare il bersaglio."
    de: "Anwender wirbelt seine Ranken oder Tentakel\npeitschenartig gegen das Ziel."
    es: "El usuario agita violentamente sus lianas o tentáculos\npara golpear al objetivo."
    ko: "덩굴이나 촉수를 세차게 흔들어\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "激烈地挥舞青藤或触手\n摔打对手进行攻击。"
    zh_trad: "激烈地揮舞藤蔓或觸手\n向對手進行攻擊。"
precipice_blades:
  names:
    jp_kanji: だんがいのつるぎ
    en: Precipice Blades
    fr: Lame Pangéenne
    it: Spade Telluriche
    de: Abgrundsklinge
    es: Filo del Abismo
    ko: 단애의칼
    zh_simp: 断崖之剑
    zh_trad: 斷崖之劍
  descriptions:
    jp_kanji: "大地の　力を　刃に　変えて\n相手を　攻撃する。"
    en: "The user attacks opposing Pokémon by manifesting\nthe power of the land in fearsome blades of stone."
    fr: "Le Pokémon transforme la puissance de la terre\net attaque la cible avec une lame acérée."
    it: "Attacca i nemici intorno trasformando la potenza\ndella terra in lame affilate."
    de: "Der Anwender wandelt die Kraft des Erdreichs in\nKlingen um, mit denen er gegnerische Pokémon\nangreift."
    es: "Hace que el poder latente de la tierra se manifieste en\nforma de hojas afiladas y ataca al objetivo con ellas."
    ko: "대지의 힘을 칼날로 바꿔\n상대를 공격한다."
    zh_simp: "将大地的力量变化为利刃\n攻击对手。"
    zh_trad: "將大地的力量化為利刃\n攻擊對手。"
present:
  names:
    jp_kanji: プレゼント
    en: Present
    fr: Cadeau
    it: Regalino
    de: Geschenk
    es: Presente
    ko: 프레젠트
    zh_simp: 礼物
    zh_trad: 禮物
  descriptions:
    jp_kanji: "わなを　しかけた　箱を\n相手に　わたして　攻撃する。ＨＰが\n回復して　しまうことも　ある。"
    en: "The user attacks by giving the target a gift with a\nhidden trap. It restores HP sometimes, however."
    fr: "Le lanceur attaque en offrant un cadeau piégé à la cible.\nPeut cependant restaurer certains de ses PV."
    it: "Chi la usa dà un regalo bomba al bersaglio.\nA volte, però, può fargli recuperare PS."
    de: "Eine Bombe als Geschenk. Kann auch KP des Zieles\nwiederherstellen."
    es: "Quien lo usa ataca al objetivo dándole un regalo con\nuna bomba trampa. Sin embargo, a veces restaura sus\nPS."
    ko: "덫을 설치한 상자를\n상대에게 건네어 공격한다.\nHP가 회복돼 버릴 때도 있다."
    zh_simp: "递给对手设有圈套的\n盒子进行攻击。\n也有可能回复对手ＨＰ。"
    zh_trad: "將暗藏機關的盒子\n遞給對手進行攻擊。\n但也有可能回復對手的ＨＰ。"
prismatic_laser:
  names:
    jp_kanji: プリズムレーザー
    en: Prismatic Laser
    fr: Laser Prisme
    it: Prismalaser
    de: Prisma-Laser
    es: Láser Prisma
    ko: 프리즘레이저
    zh_simp: 棱镜镭射
    zh_trad: 稜鏡鐳射
  descriptions:
    jp_kanji: "プリズムの　力で　強力な\n光線を　発射する。\n次の　ターンは　動けなくなる。"
    en: "The user shoots powerful lasers using the power of\na prism. The user can’t move on the next turn."
    fr: "Le lanceur utilise la puissance d’un prisme pour envoyer\nun laser destructeur, mais il doit se reposer\nau tour suivant."
    it: "Chi la usa proietta dei potenti raggi di luce\ngrazie alla potenza del suo prisma, ma non\npuò agire nel turno successivo."
    de: "Der Anwender feuert mithilfe von Prisma-Kraft mächtige\nLichtstrahlen ab. In der nächsten Runde kann er nicht\nhandeln."
    es: "El usuario utiliza un prisma para emitir un rayo de\ngran potencia, pero no puede moverse en el turno\nsiguiente."
    ko: "프리즘의 힘으로 강력한\n광선을 발사한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用棱镜的力量发射强烈光线。\n下一回合自己将无法动弹。"
    zh_trad: "用稜鏡的力量發射強烈光線。\n下一回合自己將無法動彈。"
protect:
  names:
    jp_kanji: まもる
    en: Protect
    fr: Abri
    it: Protezione
    de: Schutzschild
    es: Protección
    ko: 방어
    zh_simp: 守住
    zh_trad: 守住
  descriptions:
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "This move enables the user to protect itself from\nall attacks. Its chance of failing rises if it is used\nin succession."
    fr: "Le lanceur se protège de toutes les attaques.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender wehrt jede Attacke ab. Scheitert eventuell\nbei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
psybeam:
  names:
    jp_kanji: サイケこうせん
    en: Psybeam
    fr: Rafale Psy
    it: Psicoraggio
    de: Psystrahl
    es: Psicorrayo
    ko: 환상빔
    zh_simp: 幻象光线
    zh_trad: 幻象光線
  descriptions:
    jp_kanji: "不思議な　光線を\n相手に　発射して　攻撃する。\n混乱させることが　ある。"
    en: "The target is attacked with a peculiar ray. This may\nalso leave the target confused."
    fr: "Un étrange rayon frappe l’ennemi.\nPeut aussi le rendre confus."
    it: "Colpisce il bersaglio con un raggio speciale.\nPuò anche confonderlo."
    de: Feuert einen Strahl ab, der das Ziel verwirren kann.
    es: Extraño rayo que puede causar confusión.
    ko: "이상한 광선을\n상대에게 발사하여 공격한다.\n혼란시킬 때가 있다."
    zh_simp: "向对手发射\n神奇的光线进行攻击。\n有时会使对手混乱。"
    zh_trad: "向對手發射\n神奇的光線進行攻擊。\n有時會使對手混亂。"
psych_up:
  names:
    jp_kanji: じこあんじ
    en: Psych Up
    fr: Boost
    it: Psicamisù
    de: Psycho-Plus
    es: Más Psique
    ko: 자기암시
    zh_simp: 自我暗示
    zh_trad: 自我暗示
  descriptions:
    jp_kanji: "自分に　暗示を　かけることで\n能力変化の　状態を\n相手と　同じにする。"
    en: "The user hypnotizes itself into copying any stat\nchange made by the target."
    fr: "Une autohypnose qui permet au lanceur de copier\nles changements de stats de la cible."
    it: "Chi la usa s’ipnotizza per copiare ogni modifica\nalle statistiche del bersaglio."
    de: "Der Anwender hypnotisiert sich selbst, um die\nStatusveränderungen des Zieles zu kopieren."
    es: "Quien lo usa se sume en un trance y copia cualquier\ncambio que haya en las características de su objetivo."
    ko: "자신에게 암시를 걸어서\n능력 변화 상태를\n상대와 똑같은 상태로 만든다."
    zh_simp: "向自己施以自我暗示，\n将能力变化的状态\n变得和对手一样。"
    zh_trad: "向自己施加自我暗示，\n讓能力變化的狀態\n變得與對手相同。"
psychic:
  names:
    jp_kanji: サイコキネシス
    en: Psychic
    fr: Psyko
    it: Psichico
    de: Psychokinese
    es: Psíquico
    ko: 사이코키네시스
    zh_simp: 精神强念
    zh_trad: 精神強念
  descriptions:
    jp_kanji: "強い念力を\n相手に送って攻撃する。\n相手の守りの力をさげることもある。"
    en: "The target is hit with a strong telekinetic force to inflict\ndamage. This may also lower the target’s defensive stats."
    fr: "Une puissante vague télékinétique frappe l’ennemi.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Colpisce il bersaglio con una potente forza telecinetica\nche può anche ridurne la forza difensiva."
    de: "Starke Psycho-Attacke, die eventuell die Defensivkraft\ndes Zieles senkt."
    es: "Fuerte ataque telequinético que puede bajar la\ndefensiva del objetivo."
    ko: "강한 염동력을\n상대에게 보내어 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "向对手发送\n强大的念力进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "向對手發送\n強大的念力進行攻擊。\n有時還會降低對手的防守力。"
psychic_fangs:
  names:
    jp_kanji: サイコファング
    en: Psychic Fangs
    fr: Psycho-Croc
    it: Psicozanna
    de: Psychobeißer
    es: Psicocolmillo
    ko: 사이코팽
    zh_simp: 精神之牙
    zh_trad: 精神之牙
  descriptions:
    jp_kanji: "サイコパワーで　かみついて\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user bites the target with its psychic\ncapabilities. This can also destroy Light Screen\nand Reflect."
    fr: "Le lanceur mord la cible avec ses pouvoirs psychiques.\nBrise aussi les barrières comme Mur Lumière\net Protection."
    it: "Morde il bersaglio con delle zanne generate\ncon l’energia psichica e rompe barriere come\nRiflesso e Schermoluce."
    de: "Der Anwender beißt das Ziel mithilfe von\nPsycho-Kräften. Die Attacke durchbricht auch\nBarrieren wie Lichtschild und Reflektor."
    es: "Ataca a sus rivales con poderes psíquicos que además\ndestruyen barreras como Pantalla de Luz y Reflejo."
    ko: "사이코 파워로 물어서\n상대를 공격한다. 빛의장막이나\n리플렉터도 파괴할 수 있다."
    zh_simp: "利用精神力量咬住对手进行攻击。\n还可以破坏光墙和反射壁等。"
    zh_trad: "利用精神力量咬住對手進行攻擊。\n並可破壞光牆和反射壁等。"
psychic_terrain:
  names:
    jp_kanji: サイコフィールド
    en: Psychic Terrain
    fr: Champ Psychique
    it: Campo Psichico
    de: Psychofeld
    es: Campo Psíquico
    ko: 사이코필드
    zh_simp: 精神场地
    zh_trad: 精神場地
  descriptions:
    jp_kanji: "５ターンの間　地面にいると\n先制技を　受けない。\nエスパータイプの　威力が　あがる。"
    en: "This protects Pokémon on the ground from priority\nmoves and powers up Psychic-type moves for\nfive turns."
    fr: "Pendant cinq tours, les Pokémon au sol ne peuvent\nplus subir d’attaques prioritaires et la puissance\ndes capacités de type Psy augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nPsichico: i Pokémon a terra non subiscono mosse ad\nalta priorità e le mosse di tipo Psico sono potenziate."
    de: "Verhindert für fünf Runden, dass Pokémon am Boden\nvon Erstschlag-Attacken getroffen werden. Erhöht die\nStärke von Psycho-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos\nde tipo Psíquico y los Pokémon que están en el suelo\nquedan protegidos contra movimientos con prioridad."
    ko: "5턴 동안 땅에 있으면\n선제공격을 받지 않는다.\n에스퍼타입의 위력이 올라간다."
    zh_simp: "在５回合内，地面上的宝可梦\n不会受到先制招式的攻击。\n超能力属性的招式威力会提高。"
    zh_trad: "在５回合內，地面上的寶可夢\n不會受到先制招式攻擊。\n超能力屬性的招式威力會提高。"
psycho_boost:
  names:
    jp_kanji: サイコブースト
    en: Psycho Boost
    fr: Psycho-Boost
    it: Psicoslancio
    de: Psyschub
    es: Psicoataque
    ko: 사이코부스트
    zh_simp: 精神突进
    zh_trad: 精神突進
  descriptions:
    jp_kanji: "フルパワーで　相手を　攻撃する。\n使うと　反動で\n自分の　特攻が　がくっと　さがる。"
    en: "The user attacks the target at full power. The\nattack’s recoil harshly lowers the user’s\nSp. Atk stat."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Chi la usa sferra un potente attacco, ma il contraccolpo\nriduce di molto il suo Attacco Speciale."
    de: "Angriff mit voller Kraft, der den Spezial-Angriff des\nAnwenders durch den Rückstoß stark senkt."
    es: "Ataque en toda regla que baja mucho el Ataque\nEspecial de quien lo usa."
    ko: "풀 파워로 상대를 공격한다.\n쓰면 반동으로\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "使出全部力量攻击对手。\n使用之后会因为反作用力，\n自己的特攻大幅降低。"
    zh_trad: "釋放全部能量攻擊對手。\n使用後因為反作用力，\n自己的特攻會大幅降低。"
psycho_cut:
  names:
    jp_kanji: サイコカッター
    en: Psycho Cut
    fr: Coupe Psycho
    it: Psicotaglio
    de: Psychoklinge
    es: Psicocorte
    ko: 사이코커터
    zh_simp: 精神利刃
    zh_trad: 精神利刃
  descriptions:
    jp_kanji: "実体化させた\n心の刃で相手を切り裂く。\n急所に当たりやすい。"
    en: "The user tears at the target with blades formed by\npsychic power. This move has a heightened chance of\nlanding a critical hit."
    fr: "Le lanceur entaille l’ennemi grâce à des lames\nfaites d’énergie psychique. Taux de critiques élevé."
    it: "Chi la usa colpisce il bersaglio con lame fatte\ndi forza psichica. Probabile brutto colpo."
    de: "Das Ziel wird mit Klingen attackiert, die aus\nPsycho-Energie bestehen. Hohe Volltrefferquote."
    es: "Ataca al objetivo con cuchillas formadas por energía\npsíquica. Suele ser crítico."
    ko: "실체화시킨 마음의 칼날로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "用实体化的\n心之利刃劈开对手。\n容易击中要害。"
    zh_trad: "用實體化的\n精神利刃斬向對手。\n容易擊中要害。"
psycho_shift:
  names:
    jp_kanji: サイコシフト
    en: Psycho Shift
    fr: Échange Psy
    it: Psicotransfer
    de: Psybann
    es: Psicocambio
    ko: 사이코시프트
    zh_simp: 精神转移
    zh_trad: 精神轉移
  descriptions:
    jp_kanji: "超能力で　暗示を　かけて\n自分の　受けている　状態異常を\n相手に　うつす。"
    en: "Using its psychic power of suggestion, the user\ntransfers its status conditions to the target."
    fr: "Le lanceur transfère ses altérations de statut à l’ennemi\ngrâce à son pouvoir de suggestion."
    it: "Con la forza psichica e la suggestione, chi la usa\npuò trasferire i suoi problemi di stato al Pokémon\ncolpito."
    de: "Anwender nutzt seine Suggestivkräfte, um eigene\nStatusprobleme auf das Ziel zu transferieren."
    es: "Usa su poder mental para transferir al objetivo sus\nproblemas de estado."
    ko: "초능력으로 암시를 걸어서\n자신에게 걸려 있는 상태 이상을\n상대에게 옮긴다."
    zh_simp: "利用超能力施以暗示，\n从而将自己受到的异常状态\n转移给对手。"
    zh_trad: "用超能力施加暗示，\n將自己的異常狀態\n轉移給對手。"
psyshield_bash:
  names:
    jp_kanji: バリアーラッシュ
    en: Psyshield Bash
    fr: Sprint Bouclier
    it: Barrierassalto
    de: Barrierenstoß
    es: Asalto Barrera
    ko: 배리어러시
    zh_simp: 屏障猛攻
    zh_trad: 屏障猛攻
  descriptions:
    jp_kanji: "思念のエネルギーをまといながら\n相手にぶつかっていく。\n自分の守りの力があがることもある。"
    en: "Cloaking itself in psychic energy, the user slams into\nthe target. This may also raise the user’s defensive stats."
    fr: "Le lanceur s’enveloppe d’énergie psychique et frappe\nsa cible de plein fouet. Peut aussi augmenter\nla puissance défensive du lanceur."
    it: "Chi la usa si carica di energia psichica per poi\nschiantarsi sul bersaglio. Inoltre, può aumentare\nla propria forza difensiva."
    de: "Der Anwender hüllt sich in Psycho-Energie und rammt\ndas Ziel. Erhöht eventuell die Defensivkraft des\nAnwenders."
    es: "El usuario ataca envuelto en una energía psíquica que\nademás puede aumentar su defensiva."
    ko: "사념의 에너지를 두른 채로\n상대에 부딪친다.\n자신의 방어력이 오를 때가 있다."
    zh_simp: "让意念的能量覆盖全身，\n撞向对手进行攻击。\n有时还会提高自己的防守力。"
    zh_trad: "讓意念的能量圍繞全身，\n撞向對手進行攻擊。\n有時還會提高自己的防守力。"
psyshock:
  names:
    jp_kanji: サイコショック
    en: Psyshock
    fr: Choc Psy
    it: Psicoshock
    de: Psychoschock
    es: Psicocarga
    ko: 사이코쇼크
    zh_simp: 精神冲击
    zh_trad: 精神衝擊
  descriptions:
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
    en: "The user materializes an odd psychic wave to attack\nthe target. This attack does physical damage."
    fr: "Le lanceur matérialise des ondes mystérieuses\nqu’il projette sur l’ennemi. Inflige des dégâts physiques."
    it: "Chi la usa attacca il bersaglio facendo materializzare\nmisteriose onde psichiche che provocano danni fisici."
    de: "Anwender erzeugt eine seltsame Energiewelle, die dem\nZiel physischen Schaden zufügt."
    es: "Crea una onda psíquica que causa daño físico al\nobjetivo."
    ko: "이상한 염력파를 실체화하여\n상대를 공격한다.\n물리적인 데미지를 준다."
    zh_simp: "将神奇的念波实体化攻击对手。\n给予物理伤害。"
    zh_trad: "將神奇的念力波實體化後攻擊對手。\n給予對手物理傷害。"
psystrike:
  names:
    jp_kanji: サイコブレイク
    en: Psystrike
    fr: Frappe Psy
    it: Psicobotta
    de: Psychostoß
    es: Onda Mental
    ko: 사이코브레이크
    zh_simp: 精神击破
    zh_trad: 精神擊破
  descriptions:
    jp_kanji: "不思議な　念波を　実体化して\n相手を　攻撃する。\n物理的な　ダメージを　与える。"
