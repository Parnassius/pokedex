    fr: Poudre Fureur
    it: Polverabbia
    de: Wutpulver
    es: Polvo Ira
    ko: 분노가루
    zh_simp: 愤怒粉
    zh_trad: 憤怒粉
  descriptions:
    jp_kanji: "イライラさせる　粉を　自分に\nふりかけて　注意を　ひく。　相手の\n攻撃を　すべて　自分に　むける。"
    en: "The user scatters a cloud of irritating powder to\ndraw attention to itself. Opposing Pokémon aim only at\nthe user."
    fr: "Le lanceur s’asperge d’une poudre irritante pour attirer\nl’attention. Il attire toutes les attaques ennemies."
    it: "Chi la usa attira l’attenzione dei nemici\ncospargendosi di una polvere irritante\ne diventando bersaglio di tutti gli attacchi."
    de: "Anwender zieht gegnerische Aufmerksamkeit und\nAngriffe auf sich, indem er ein Wut erzeugendes\nPulver über sich streut."
    es: "Usa un polvo que irrita y centra en el usuario la\natención y los ataques de los rivales."
    ko: "상대를 자극하는 가루를\n자신에게 뿌려서 주의를 끈다.\n상대의 공격은 모두 자신에게 향한다."
    zh_simp: "将令人烦躁的粉末撒在自己身上，\n用以吸引对手的注意。\n使对手的攻击全部指向自己。"
    zh_trad: "將令人煩躁的粉末撒在自己身上，\n吸引對手的注意。進而將對手的攻擊\n全部轉移到自己身上。"
raging_fury:
  names:
    jp_kanji: だいふんげき
    en: Raging Fury
    fr: Grand Courroux
    it: Ira Furente
    de: Flammenwut
    es: Erupción de Ira
    ko: 대격분
    zh_simp: 大愤慨
    zh_trad: 大憤慨
  descriptions:
    jp_kanji: "激しい炎を放ちながら\n暴れまわって攻撃する。\n技をだしたあと熱中状態になる。"
    en: "The user rampages and spews vicious flames to inflict\ndamage on the target, then becomes fixated on using\nthis move."
    fr: "Le lanceur attaque en déchaînant de violentes flammes,\net devient obsédé par la capacité."
    it: "Chi la usa sfoga la sua ira sputando violente fiammate.\nTuttavia, si fissa su questa mossa dopo averla sferrata."
    de: "Der Anwender wütet und speit heftige Flammen aus.\nDanach fixiert er sich auf diese Attacke."
    es: "Ataca con unas violentas llamas. El usuario se crece tras\nusarlo."
    ko: "격렬한 불꽃을 방출하면서\n마구 날뛰어 공격한다.\n기술을 사용한 다음 열중 상태가 된다."
    zh_simp: "一边放出猛烈的火焰，\n一边疯狂乱打进行攻击。\n招式结束后自己会陷入热衷状态。"
    zh_trad: "一邊放出猛烈的火焰，\n一邊瘋狂亂打進行攻擊。\n招式結束後自己會陷入熱衷狀態。"
rain_dance:
  names:
    jp_kanji: あまごい
    en: Rain Dance
    fr: Danse Pluie
    it: Pioggiadanza
    de: Regentanz
    es: Danza Lluvia
    ko: 비바라기
    zh_simp: 求雨
    zh_trad: 求雨
  descriptions:
    jp_kanji: "５ターンの　間　雨を　降らせて\nみずタイプの　威力を　あげる。\nほのおタイプの　威力は　さがる。"
    en: "The user summons a heavy rain that falls for five\nturns, powering up Water-type moves. It lowers\nthe power of Fire-type moves."
    fr: "Invoque de fortes pluies qui durent cinq tours,\naugmentant la puissance des capacités de type Eau\net baissant celle des capacités de type Feu."
    it: "Chi la usa provoca una forte pioggia per cinque turni,\npotenziando le mosse di tipo Acqua e riducendo\nla potenza di quelle di tipo Fuoco."
    de: "Anwender erzeugt starken Regen. Die Stärke von\nWasser-Attacken erhöht sich fünf Runden lang,\nwährend die Stärke von Feuer-Attacken sinkt."
    es: "Genera una fuerte lluvia que refuerza los movimientos\nde tipo Agua durante cinco turnos y debilita los de tipo\nFuego."
    ko: "5턴 동안 비를 내리게 해서\n물타입 기술의 위력을 올린다.\n불꽃타입의 위력은 떨어진다."
    zh_simp: "在５回合内一直降雨，\n从而提高水属性的招式威力。\n火属性的招式威力则降低。"
    zh_trad: "降下大雨，在５回合內\n提高水屬性招式的威力。\n火屬性招式的威力會降低。"
rapid_spin:
  names:
    jp_kanji: こうそくスピン
    en: Rapid Spin
    fr: Tour Rapide
    it: Rapigiro
    de: Turbodreher
    es: Giro Rápido
    ko: 고속스핀
    zh_simp: 高速旋转
    zh_trad: 高速旋轉
  descriptions:
    jp_kanji: "回転して　相手を　攻撃する。\nしめつける　まきつく　やどりぎのタネ　など\n吹きとばす。自分の　素早さも　あがる。"
    en: "A spin attack that can also eliminate such moves as\nBind, Wrap, and Leech Seed. This also raises the user’s\nSpeed stat."
    fr: "Une attaque tournoyante pouvant aussi annuler,\npar exemple, Étreinte, Ligotage ou Vampigraine.\nAugmente également la Vitesse du lanceur."
    it: "Attacco rotante che elimina gli effetti di mosse come\nLegatutto, Avvolgibotta e Parassiseme. Aumenta anche\nla Velocità di chi la usa."
    de: "Trifft das Ziel mit einer Dreh-Attacke. Befreit den\nAnwender unter anderem von Wickel, Klammergriff\nund Egelsamen. Erhöht die Initiative des Anwenders."
    es: "Ataque giratorio que puede eliminar movimientos como\nAtadura, Constricción y Drenadoras. También aumenta\nla Velocidad del usuario."
    ko: "회전해서 상대를 공격한다.\n조이기, 김밥말이, 씨뿌리기 등을\n날려 버린다. 자신의 스피드도 오른다."
    zh_simp: "通过旋转来攻击对手。\n可以摆脱绑紧、紧束、寄生种子\n等招式。还能提高自己的速度。"
    zh_trad: "藉由旋轉來攻擊對手。\n也可以擺脫綁緊、緊束、寄生種子等招式。\n自己的速度也會提高。"
razor_leaf:
  names:
    jp_kanji: はっぱカッター
    en: Razor Leaf
    fr: Tranch’Herbe
    it: Foglielama
    de: Rasierblatt
    es: Hoja Afilada
    ko: 잎날가르기
    zh_simp: 飞叶快刀
    zh_trad: 飛葉快刀
  descriptions:
    jp_kanji: "はっぱを　とばして\n相手を　切りつけて　攻撃する。\n急所に　当たりやすい。"
    en: "Sharp-edged leaves are launched to slash at opposing\nPokémon. Critical hits land more easily."
    fr: "Des feuilles aiguisées comme des rasoirs entaillent\nl’ennemi. Taux de critiques élevé."
    it: "Foglie taglienti sferzano i nemici intorno.\nProbabile brutto colpo."
    de: "Greift gegnerische Pokémon mithilfe von Blättern an.\nHohe Volltrefferquote."
    es: "Corta con hojas afiladas. Un ataque que suele ser\ncrítico."
    ko: "잎사귀를 날려\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "飞出叶片，\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "飛射葉子，\n切斬對手進行攻擊。\n容易擊中要害。"
razor_shell:
  names:
    jp_kanji: シェルブレード
    en: Razor Shell
    fr: Coqui-Lame
    it: Conchilama
    de: Kalkklinge
    es: Concha Filo
    ko: 셸블레이드
    zh_simp: 贝壳刃
    zh_trad: 貝殼刃
  descriptions:
    jp_kanji: "鋭い　貝殻で　切りつけて\n攻撃する。　相手の　防御を\nさげることが　ある。"
    en: "The user cuts its target with sharp shells. This may\nalso lower the target’s Defense stat."
    fr: "Un coquillage aiguisé lacère l’ennemi.\nPeut aussi baisser sa Défense."
    it: "Chi la usa colpisce il bersaglio con il suo guscio\naffilato. Il colpo può anche ridurre la Difesa\ndel bersaglio."
    de: "Schneideangriff mit einer scharfen Muschelschale.\nSenkt eventuell die Verteidigung des Zieles."
    es: "Una afilada vieira ataca al objetivo. También puede\nhacer disminuir su Defensa."
    ko: "날카로운 조개껍질로 베어\n공격한다. 상대의 방어를\n떨어뜨릴 때가 있다."
    zh_simp: "用锋利的贝壳切斩\n对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用鋒利的貝殼斬切\n對手進行攻擊。\n有時會降低對手的防禦。"
razor_wind:
  names:
    jp_kanji: かまいたち
    en: Razor Wind
    fr: Coupe-Vent
    it: Ventagliente
    de: Klingensturm
    es: Viento Cortante
    ko: 칼바람
    zh_simp: 旋风刀
    zh_trad: 旋風刀
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
recover:
  names:
    jp_kanji: じこさいせい
    en: Recover
    fr: Soin
    it: Ripresa
    de: Genesung
    es: Recuperación
    ko: HP회복
    zh_simp: 自我再生
    zh_trad: 自我再生
  descriptions:
    jp_kanji: "細胞を再生させて\n自分のＨＰを回復する。"
    en: The user regenerates its cells to restore its own HP.
    fr: "Le lanceur se soigne en régénérant ses cellules\nafin de récupérer des PV."
    it: Mossa autocurativa. Chi la usa recupera PS.
    de: "Eine Selbstheilung, mit der die KP des Anwenders\naufgefüllt werden."
    es: El usuario regenera sus células para recuperar PS.
    ko: "세포를 재생시켜\n자신의 HP를 회복한다."
    zh_simp: "让细胞再生，\n从而回复自己的ＨＰ。"
    zh_trad: "讓細胞再生，\n回復自己的ＨＰ。"
recycle:
  names:
    jp_kanji: リサイクル
    en: Recycle
    fr: Recyclage
    it: Riciclo
    de: Aufbereitung
    es: Reciclaje
    ko: 리사이클
    zh_simp: 回收利用
    zh_trad: 回收利用
  descriptions:
    jp_kanji: "戦闘中に　使って　なくなった\n自分の　持ち物を　再生させて\n使えるように　する。"
    en: "The user recycles a held item that has been used in\nbattle so it can be used again."
    fr: "Recycle un objet tenu à usage unique déjà utilisé\nlors du combat pour pouvoir l’utiliser à nouveau."
    it: "Chi la usa ricicla uno strumento che ha usato\nnella lotta e può riutilizzarlo."
    de: "Recycling eines getragenen Items, das zuvor im Kampf\nverwendet wurde."
    es: "Recicla y así recupera un objeto equipado de un solo\nuso que ya haya sido empleado durante el combate."
    ko: "배틀 중에 사용하여 없어진\n자신의 지닌 물건을 재생시켜\n사용할 수 있게 한다."
    zh_simp: "使战斗中已经消耗掉的\n自己的持有物再生，\n并可以再次使用。"
    zh_trad: "將在戰鬥中已消耗完的\n寶可夢持有物回收後，\n回復成可以使用的狀態。"
reflect:
  names:
    jp_kanji: リフレクター
    en: Reflect
    fr: Protection
    it: Riflesso
    de: Reflektor
    es: Reflejo
    ko: 리플렉터
    zh_simp: 反射壁
    zh_trad: 反射壁
  descriptions:
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　物理攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom physical attacks for five turns."
    fr: "Crée un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités physiques pendant cinq tours."
    it: "Innalza una barriera misteriosa che riduce i danni degli\nattacchi fisici per sé e gli alleati per cinque turni."
    de: "Eine mysteriöse Wand, die für fünf Runden den Schaden\nvon physischen gegnerischen Treffern reduziert."
    es: "Pared de luz que reduce durante cinco turnos el daño\nproducido por los ataques físicos."
    ko: "5턴 동안 이상한 장막을 쳐서\n상대로부터 받는 물리공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的物理攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的物理攻擊傷害。"
reflect_type:
  names:
    jp_kanji: ミラータイプ
    en: Reflect Type
    fr: Copie-Type
    it: Riflettipo
    de: Typenspiegel
    es: Clonatipo
    ko: 미러타입
    zh_simp: 镜面属性
    zh_trad: 鏡面屬性
  descriptions:
    jp_kanji: "相手の　タイプを　反射して\n自分も　同じ　タイプに　なる。"
    en: "The user reflects the target’s type, making the user the\nsame type as the target."
    fr: "Le lanceur copie le type de la cible et devient\ndu même type."
    it: "Chi la usa cambia il proprio tipo in quello\ndel bersaglio."
    de: "Anwender ahmt das Ziel nach und nimmt dabei\ndessen Typ an."
    es: "Cambia el tipo del Pokémon al mismo tipo que el del\nobjetivo."
    ko: "상대의 타입을 반사해서\n자신도 똑같은 타입이 된다."
    zh_simp: "反射对手的属性，\n让自己也变成一样的属性。"
    zh_trad: "在自己身上反映出對手的屬性，\n讓自己也變成相同的屬性。"
refresh:
  names:
    jp_kanji: リフレッシュ
    en: Refresh
    fr: Régénération
    it: Rinfrescata
    de: Heilung
    es: Alivio
    ko: 리프레쉬
    zh_simp: 焕然一新
    zh_trad: 煥然一新
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
relic_song:
  names:
    jp_kanji: いにしえのうた
    en: Relic Song
    fr: Chant Antique
    it: Cantoantico
    de: Urgesang
    es: Canto Arcaico
    ko: 옛노래
    zh_simp: 古老之歌
    zh_trad: 古老之歌
  descriptions:
    jp_kanji: "いにしえのうたを　相手に　聞かせて\n心に　うったえて　攻撃する。\n眠り状態に　することが　ある。"
    en: "The user sings an ancient song and attacks by\nappealing to the hearts of the listening opposing\nPokémon. This may also induce sleep."
    fr: "Le lanceur attaque l’ennemi en lui chantant une chanson\nd’un autre temps. Peut l’endormir."
    it: "Chi la usa attacca i nemici intorno a sé\nintonando un’antica melodia che colpisce\nil loro spirito. Può anche farli addormentare."
    de: "Anwender greift mit Urgesang an, der gegnerische\nPokémon im tiefsten Inneren anspricht. Diese schlafen\neventuell ein."
    es: "Ataca conmoviendo a los rivales de alrededor con un\nantiguo canto. Puede dormirlos."
    ko: "옛 노래를 상대에게 들려주고\n마음에 호소하여 공격한다.\n잠듦 상태로 만들 때가 있다."
    zh_simp: "让对手听古老之歌，\n打动对手的内心进行攻击。\n有时会让对手陷入睡眠状态。"
    zh_trad: "唱出古老之歌，\n打動對手的心進行攻擊。\n有時會讓對手陷入睡眠狀態。"
rest:
  names:
    jp_kanji: ねむる
    en: Rest
    fr: Repos
    it: Riposo
    de: Erholung
    es: Descanso
    ko: 잠자기
    zh_simp: 睡觉
    zh_trad: 睡覺
  descriptions:
    jp_kanji: "自分のＨＰが回復するが\nねむけ状態になってしまう。"
    en: The user restores its own HP but also becomes drowsy.
    fr: "Le lanceur regagne ses PV mais se retrouve plongé\ndans un état de somnolence."
    it: Chi la usa recupera PS, ma viene affetto da sonnolenza.
    de: "Die KP des Anwenders werden aufgefüllt. Dafür wird er\nallerdings schläfrig."
    es: El usuario recupera PS pero se queda somnoliento.
    ko: "자신의 HP가 회복되지만\n졸음 상태가 된다."
    zh_simp: "回复自己的ＨＰ，\n但是会陷入瞌睡状态。"
    zh_trad: "回復自己的ＨＰ，\n但是會陷入瞌睡狀態。"
retaliate:
  names:
    jp_kanji: かたきうち
    en: Retaliate
    fr: Vengeance
    it: Nemesi
    de: Heimzahlung
    es: Represalia
    ko: 원수갚기
    zh_simp: 报仇
    zh_trad: 報仇
  descriptions:
    jp_kanji: "倒れた　味方の　かたきを　討つ。\n前の　ターンに　味方が\n倒されていると　威力が　あがる。"
    en: "The user gets revenge for a fainted ally. If an ally\nfainted in the previous turn, this move’s power\nis increased."
    fr: "Venge un Pokémon de l’équipe mis K.O.\nSi un Pokémon de l’équipe a été mis K.O. au tour\nd’avant, l’effet augmente."
    it: "Vendica un alleato messo KO. Se ciò è accaduto\nal turno precedente, il danno è maggiore."
    de: "Anwender nimmt Rache für einen besiegten Mitstreiter.\nWurde in der vorigen Runde ein Mitstreiter besiegt,\nsteigt die Stärke."
    es: "Venga a los amigos caídos. Si en el turno anterior han\nderrotado a alguno, la potencia del ataque aumentará."
    ko: "쓰러진 같은 편의 원수를 갚는다.\n앞 턴에서 같은 편이 쓰러지면\n위력이 올라간다."
    zh_simp: "为倒下的同伴报仇。\n如果上一回合有同伴倒下，\n威力就会提高。"
    zh_trad: "為倒下的同伴報仇。\n前一回合有同伴被打倒時，\n招式的威力會提高。"
return:
  names:
    jp_kanji: おんがえし
    en: Return
    fr: Retour
    it: Ritorno
    de: Rückkehr
    es: Retribución
    ko: 은혜갚기
    zh_simp: 报恩
    zh_trad: 報恩
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
revelation_dance:
  names:
    jp_kanji: めざめるダンス
    en: Revelation Dance
    fr: Danse Éveil
    it: Mutadanza
    de: Wecktanz
    es: Danza Despertar
    ko: 잠재댄스
    zh_simp: 觉醒之舞
    zh_trad: 覺醒之舞
  descriptions:
    jp_kanji: "全力で　踊って　攻撃する。\nこの　技の　タイプは\n自分の　タイプと　同じになる。"
    en: "The user attacks the target by dancing very hard.\nThe user’s type determines the type of this move."
    fr: "Le lanceur attaque en dansant avec enthousiasme.\nLe type de la capacité est le même que celui du lanceur."
    it: "Chi la usa si lancia in una danza e attacca il nemico\ncon tutte le sue forze. Il tipo della mossa corrisponde\nal tipo del Pokémon che la usa."
    de: "Der Anwender tanzt und greift dabei das Ziel mit voller\nKraft an. Die Attacke hat denselben Typ wie das\nPokémon, das sie einsetzt."
    es: "Ataque que consiste en un baile muy enérgico. El tipo\nde este ataque se corresponde con el del Pokémon que\nlo ejecuta."
    ko: "전력으로 춤추며 공격한다.\n이 기술의 타입은\n자신의 타입과 같아진다."
    zh_simp: "全力跳舞进行攻击。\n此招式的属性将\n变得和自己的属性相同。"
    zh_trad: "全力跳舞進行攻擊。\n此招式的屬性將\n變得和自己的屬性相同。"
revenge:
  names:
    jp_kanji: リベンジ
    en: Revenge
    fr: Vendetta
    it: Vendetta
    de: Vergeltung
    es: Desquite
    ko: 리벤지
    zh_simp: 报复
    zh_trad: 報復
  descriptions:
    jp_kanji: "相手から　技を　受けていると\nその相手に　対して\n与える　ダメージが　２倍に　なる。"
    en: "This attack move’s power is doubled if the user has\nbeen hurt by the opponent in the same turn."
    fr: "Une attaque deux fois plus puissante si le lanceur\na été blessé par l’ennemi durant ce tour."
    it: "Mossa d’attacco che infligge un danno doppio\nse si è stati colpiti dal Pokémon bersaglio nello\nstesso turno."
    de: "Schaden verdoppelt sich, wenn der Anwender in der\nRunde bereits Schaden durch das Ziel erlitten hat."
    es: "Ataque que produce el doble de daño si el usuario\nresulta herido en el mismo turno."
    ko: "상대에게 기술로 공격받으면\n그 상대에게 주는 데미지가\n2배가 된다."
    zh_simp: "如果受到对手的招式攻击，\n就能给予对手２倍的伤害。"
    zh_trad: "如果受到對手的招式攻擊，\n給予該對手的傷害就會變成２倍。"
reversal:
  names:
    jp_kanji: きしかいせい
    en: Reversal
    fr: Contre
    it: Contropiede
    de: Gegenschlag
    es: Inversión
    ko: 기사회생
    zh_simp: 绝处逢生
    zh_trad: 起死回生
  descriptions:
    jp_kanji: "力を　ふりしぼり　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "An all-out attack that becomes more powerful the\nless HP the user has."
    fr: "Le lanceur ne retient plus ses coups.\nPlus ses PV sont bas, plus l’attaque est puissante."
    it: "Chi la usa attacca con tutte le sue forze.\nPiù i PS sono bassi, maggiore è la potenza\ndi questa mossa."
    de: Richtet mehr Schaden an, wenn eigene KP niedrig sind.
    es: "Ataque desesperado que causa más daño cuantos\nmenos PS tenga el usuario."
    ko: "힘을 쥐어짜서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "竭尽全力进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "竭盡全力進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
rising_voltage:
  names:
    jp_kanji: ライジングボルト
    en: Rising Voltage
    fr: Monte-Tension
    it: Elettroimpennata
    de: Hochspannung
    es: Alto Voltaje
    ko: 라이징볼트
    zh_simp: 电力上升
    zh_trad: 電力上升
  descriptions:
    jp_kanji: "地面から　立ちのぼる　電撃で　攻撃。\n相手が　エレキフィールドに　いる時\n技の　威力が　２倍に　なる。"
    en: "The user attacks with electric voltage rising from\nthe ground. This move’s power doubles when the target\nis on Electric Terrain."
    fr: "Des éclairs surgissent du sol et frappent l’ennemi.\nLa puissance de cette attaque est doublée si la cible\nest sur un Champ Électrifié."
    it: "Chi la usa attacca con dell’elettricità che si alza\ndal suolo. La potenza della mossa raddoppia quando\nl’avversario si trova in un Campo Elettrico."
    de: "Der Anwender greift mit aus dem Boden aufsteigender\nElektrizität an. Die Stärke der Attacke wird verdoppelt,\nwenn beim Gegner ein Elektrofeld aktiv ist."
    es: "Ataca con una descarga eléctrica que surge del terreno\nde combate. La potencia del movimiento se duplica si\nel rival se ve afectado por un campo eléctrico."
    ko: "지면에서 올라오는 전격으로 공격한다.\n상대가 일렉트릭필드 위에 있을 때\n기술의 위력이 2배가 된다."
    zh_simp: "用从地面升腾而起的电击进行攻击。\n当对手处于电气场地上时，\n招式威力会变成２倍。"
    zh_trad: "用從地面升騰的電擊攻擊。\n當對手在電氣場地時，\n招式威力會變成２倍。"
roar:
  names:
    jp_kanji: ほえる
    en: Roar
    fr: Hurlement
    it: Boato
    de: Brüller
    es: Rugido
    ko: 울부짖기
    zh_simp: 吼叫
    zh_trad: 吼叫
  descriptions:
    jp_kanji: "相手を　逃がして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is scared off, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Effraie le Pokémon ennemi et le remplace par un autre.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nSe usata contro singoli Pokémon selvatici, mette\nfine alla lotta."
    de: "Verjagt das Ziel und ersetzt es durch ein anderes\nPokémon. Beendet den Kampf in der Wildnis."
    es: "Se lleva al objetivo, que es cambiado por otro\nPokémon. Si es un Pokémon salvaje, acaba el\ncombate."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "放走对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "趕走對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
roar_of_time:
  names:
    jp_kanji: ときのほうこう
    en: Roar of Time
    fr: Hurle-Temps
    it: Fragortempo
    de: Zeitenlärm
    es: Distorsión
    ko: 시간의포효
    zh_simp: 时光咆哮
    zh_trad: 時光咆哮
  descriptions:
    jp_kanji: "時間がゆがむほどの\n力をうちだして相手を攻撃する。"
    en: "The user blasts the target with power that distorts\neven time."
    fr: Le lanceur frappe si fort qu’il affecte le cours du temps.
    it: "Chi la usa colpisce il bersaglio con una forza capace\ndi alterare il tempo."
    de: "Anwender attackiert mit einer Kraft, die selbst die Zeit\nverzerrt."
    es: "Ataca al objetivo usando tal energía que el tiempo se\ndistorsiona."
    ko: "시간이 뒤틀릴 정도의 힘을\n사용해서 상대를 공격한다."
    zh_simp: "释放出扭曲时间般的\n强大力量攻击对手。"
    zh_trad: "釋放出足以扭曲時間的\n強大力量攻擊對手。"
rock_blast:
  names:
    jp_kanji: ロックブラスト
    en: Rock Blast
    fr: Boule Roc
    it: Cadutamassi
    de: Felswurf
    es: Pedrada
    ko: 락블레스트
    zh_simp: 岩石爆击
    zh_trad: 岩石爆擊
  descriptions:
    jp_kanji: "硬い　岩石を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user hurls hard rocks at the target. Two to five\nrocks are launched in a row."
    fr: "Le lanceur projette un rocher sur l’ennemi\nde deux à cinq fois d’affilée."
    it: "Colpisce il bersaglio con dei massi pesanti lanciati\nin rapida successione. Il numero di massi varia\nda due a cinque."
    de: Wirft zwei- bis fünfmal in Folge Felsblöcke auf das Ziel.
    es: "Lanza pedruscos al objetivo de dos a cinco veces\nconsecutivas."
    ko: "단단한 암석을\n상대에게 발사하여 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手发射\n坚硬的岩石进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n堅硬的岩石進行攻擊。\n連續攻擊２～５次。"
rock_climb:
  names:
    jp_kanji: ロッククライム
    en: Rock Climb
    fr: Escalade
    it: Scalaroccia
    de: Kraxler
    es: Treparrocas
    ko: 락클라임
    zh_simp: 攀岩
    zh_trad: 攀岩
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
rock_polish:
  names:
    jp_kanji: ロックカット
    en: Rock Polish
    fr: Poliroche
    it: Lucidatura
    de: Steinpolitur
    es: Pulimento
    ko: 록커트
    zh_simp: 岩石打磨
    zh_trad: 岩石打磨
  descriptions:
    jp_kanji: "自分の　体を　磨いて　空気の\n抵抗を　少なくする。素早さを\nぐーんと　あげることが　できる。"
    en: "The user polishes its body to reduce drag.\nThis sharply raises the Speed stat."
    fr: "Le lanceur polit son corps pour diminuer sa résistance\nau vent. Augmente beaucoup la Vitesse."
    it: "Chi la usa leviga il proprio corpo per ridurne l’attrito.\nAumenta di molto la Velocità."
    de: "Anwender reduziert so gut wie möglich den\nLuftwiderstand. Erhöht den Initiative-Wert stark."
    es: "Reduce la resistencia puliendo su cuerpo. Aumenta\nmucho la Velocidad."
    ko: "자신의 몸을 갈아\n공기의 저항을 적게 한다.\n스피드를 크게 올릴 수 있다."
    zh_simp: "打磨自己的身体，\n减少空气阻力。\n可以大幅提高自己的速度。"
    zh_trad: "打磨自己的身體，\n減少空氣阻力。\n可大幅提高自己的速度。"
rock_slide:
  names:
    jp_kanji: いわなだれ
    en: Rock Slide
    fr: Éboulement
    it: Frana
    de: Steinhagel
    es: Avalancha
    ko: 스톤샤워
    zh_simp: 岩崩
    zh_trad: 岩崩
  descriptions:
    jp_kanji: "大きな岩を激しく\nぶつけて攻撃する。"
    en: Large boulders are hurled at the target to inflict damage.
    fr: "Envoie de gros rochers sur l’ennemi pour lui infliger\ndes dégâts."
    it: Chi la usa attacca scagliando con violenza grandi massi.
    de: Schleudert riesige Felsen auf das Ziel.
    es: Ataca lanzando grandes pedruscos.
    ko: "큰 바위를\n세차게 부딪쳐서 공격한다."
    zh_simp: "将大岩石\n猛烈地撞向对手进行攻击。"
    zh_trad: "將大岩石\n猛烈地砸向對手進行攻擊。"
rock_smash:
  names:
    jp_kanji: いわくだき
    en: Rock Smash
    fr: Éclate-Roc
    it: Spaccaroccia
    de: Zertrümmerer
    es: Golpe Roca
    ko: 바위깨기
    zh_simp: 碎岩
    zh_trad: 碎岩
  descriptions:
    jp_kanji: "パンチで攻撃する。\n相手の守りの力をさげることもある。"
    en: "The user attacks with a punch.\nThis may also lower the target’s defensive stats."
    fr: "Porte un coup de poing à l’ennemi.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Chi la usa colpisce il bersaglio con un pugno\nche può ridurne la forza difensiva."
    de: "Der Anwender greift mit einem Hieb an und senkt\neventuell die Defensivkraft des Zieles."
    es: "Ataque con los puños que puede bajar la defensiva del\nobjetivo."
    ko: "펀치로 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "用拳头进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "用拳頭進行攻擊。\n有時還會降低對手的防守力。"
rock_throw:
  names:
    jp_kanji: いわおとし
    en: Rock Throw
    fr: Jet-Pierres
    it: Sassata
    de: Steinwurf
    es: Lanzarrocas
    ko: 돌떨구기
    zh_simp: 落石
    zh_trad: 落石
  descriptions:
    jp_kanji: "小さな　岩を　持ちあげて\n相手に　投げつけて　攻撃する。"
    en: "The user picks up and throws a small rock at the\ntarget to attack."
    fr: Le lanceur lâche une pierre sur l’ennemi.
    it: "Chi la usa raccoglie una pietra e la lancia\ncontro il bersaglio."
    de: Das Ziel wird mit einem kleinen Stein beworfen.
    es: Tira una pequeña roca al objetivo.
    ko: "작은 바위를 들어 올려\n상대에게 내던져서 공격한다."
    zh_simp: "拿起小岩石，\n投掷对手进行攻击。"
    zh_trad: "舉起小岩石，\n向對手投擲進行攻擊。"
rock_tomb:
  names:
    jp_kanji: がんせきふうじ
    en: Rock Tomb
    fr: Tomberoche
    it: Rocciotomba
    de: Felsgrab
    es: Tumba Rocas
    ko: 암석봉인
    zh_simp: 岩石封锁
    zh_trad: 岩石封鎖
  descriptions:
    jp_kanji: "岩石を　投げつけて　攻撃する。\n相手の　動きを　封じることで\n素早さを　さげる。"
    en: "Boulders are hurled at the target. This also lowers\nthe target’s Speed stat by preventing its movement."
    fr: "Des rochers frappent l’ennemi.\nRéduit aussi sa Vitesse."
    it: "Colpisce il bersaglio con rocce. Inoltre, lo ostacola\nriducendone la Velocità."
    de: "Angriff mit Felsen. Bei Erfolg wird der Initiative-Wert\ndes Zieles gesenkt."
    es: "Tira rocas que detienen al objetivo y bajan su\nVelocidad."
    ko: "암석을 내던져서 공격한다.\n상대의 움직임을 봉인함으로써\n스피드를 떨어뜨린다."
    zh_simp: "投掷岩石进行攻击。\n封住对手的行动，\n从而降低速度。"
    zh_trad: "投擲岩石進行攻擊。\n封住對手的行動，\n進而降低其速度。"
rock_wrecker:
  names:
    jp_kanji: がんせきほう
    en: Rock Wrecker
    fr: Roc-Boulet
    it: Devastomasso
    de: Felswerfer
    es: Romperrocas
    ko: 암석포
    zh_simp: 岩石炮
    zh_trad: 岩石炮
  descriptions:
    jp_kanji: "巨大な　岩を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user launches a huge boulder at the target to\nattack. The user can’t move on the next turn."
    fr: "Le lanceur attaque en projetant un gros rocher\nsur l’ennemi. Il doit se reposer au tour suivant."
    it: "Chi la usa attacca il bersaglio con un enorme\nmasso, ma si deve riposare al turno successivo."
    de: "Anwender wirft einen riesigen Felsen auf das Ziel.\nIn der nächsten Runde muss der Anwender ruhen."
    es: "Lanza una piedra enorme contra el objetivo, pero tiene\nque descansar el siguiente turno."
    ko: "거대한 바위를\n상대에게 발사하여 공격한다.\n다음 턴은 움직일 수 없게 된다."
    zh_simp: "向对手发射\n巨大的岩石进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射\n巨大的岩石進行攻擊。\n下一回合自己將無法動彈。"
role_play:
  names:
    jp_kanji: なりきり
    en: Role Play
    fr: Imitation
    it: Giocodiruolo
    de: Rollenspiel
    es: Imitación
    ko: 역할
    zh_simp: 扮演
    zh_trad: 扮演
  descriptions:
    jp_kanji: "相手に　なりきって　自分も　相手と\n同じ　特性に　変化する。"
    en: "The user mimics the target completely, copying the\ntarget’s Ability."
    fr: Imite la cible et copie son talent.
    it: "Chi la usa mima in tutto il bersaglio, copiandone\nl’abilità."
    de: Ahmt das Ziel nach und kopiert seine Fähigkeit.
    es: Imita al objetivo por completo y copia su habilidad.
    ko: "상대의 역할을 하여 자신도 상대와\n같은 특성으로 변화한다."
    zh_simp: "扮演对手，\n让自己的特性\n变得和对手相同。"
    zh_trad: "扮演成對手，\n讓自己的特性\n也變得和對手相同。"
rolling_kick:
  names:
    jp_kanji: まわしげり
    en: Rolling Kick
    fr: Mawashi Geri
    it: Calciorullo
    de: Fegekick
    es: Patada Giro
    ko: 돌려차기
    zh_simp: 回旋踢
    zh_trad: 迴旋踢
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
rollout:
  names:
    jp_kanji: ころがる
    en: Rollout
    fr: Roulade
    it: Rotolamento
    de: Walzer
    es: Rodar
    ko: 구르기
    zh_simp: 滚动
    zh_trad: 滾動
  descriptions:
    jp_kanji: "転がって攻撃する。\n技をだしたあと熱中状態になる。"
    en: "The user rolls into the target to deal damage, then\nbecomes fixated on using this move."
    fr: "Le lanceur roule sur l’ennemi et devient obsédé par\nla capacité."
    it: "Chi la usa colpisce il bersaglio rotolando.\nTuttavia, si fissa su questa mossa dopo averla sferrata."
    de: "Der Anwender rollt gegen das Ziel. Danach fixiert er sich\nauf diese Attacke."
    es: "El atacante rueda contra el objetivo. El usuario se crece\ntras usarlo."
    ko: "굴러서 공격한다.\n기술을 사용한 다음 열중 상태가 된다."
    zh_simp: "滚动身体进行攻击。\n招式结束后自己会陷入热衷状态。"
    zh_trad: "滾動身體進行攻擊。\n招式結束後自己會陷入熱衷狀態。"
roost:
  names:
    jp_kanji: はねやすめ
    en: Roost
    fr: Atterrissage
    it: Trespolo
    de: Ruheort
    es: Respiro
    ko: 날개쉬기
    zh_simp: 羽栖
    zh_trad: 羽棲
  descriptions:
    jp_kanji: "地面に降りて体をやすめる。\n自分のＨＰを回復する。"
    en: "The user lands and rests its body. This move restores\nthe user’s HP."
    fr: Le lanceur atterrit et se repose pour récupérer des PV.
    it: Chi la usa sta fermo e riposa, recuperando PS.
    de: "Anwender landet und ruht sich aus. Die KP des\nAnwenders werden aufgefüllt."
    es: "Aterriza sobre la superficie para descansar y recuperar\nPS."
    ko: "땅에 내려와 몸을 쉬게 한다.\n자신의 HP를 회복한다."
    zh_simp: "降到地面，使身体休息。\n回复自己的ＨＰ。"
    zh_trad: "降落到地面，讓身體休息。\n回復自己的ＨＰ。"
rototiller:
  names:
    jp_kanji: たがやす
    en: Rototiller
    fr: Fertilisation
    it: Aracampo
    de: Pflüger
    es: Fertilizante
    ko: 일구기
    zh_simp: 耕地
    zh_trad: 耕地
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
round:
  names:
    jp_kanji: りんしょう
    en: Round
    fr: Chant Canon
    it: Coro
    de: Kanon
    es: Canon
    ko: 돌림노래
    zh_simp: 轮唱
    zh_trad: 輪唱
  descriptions:
    jp_kanji: "歌で　相手を　攻撃する。\nみんなで　輪唱すると　続けて\nだすことが　でき　威力も　あがる。"
    en: "The user attacks the target with a song. Others can\njoin in the Round to increase the power of\nthe attack."
    fr: "Le lanceur attaque l’ennemi en chantant.\nSi plusieurs Pokémon déclenchent cette attaque\nà la suite, l’effet augmente."
    it: "Attacca il bersaglio con una melodia. Se usata\ndurante lo stesso turno da più Pokémon, i danni\ninflitti aumentano."
    de: "Angriff mit Gesang. Singt der Anwender mit allen im\nKanon, steigt die Stärke."
    es: "Un canto que ataca al objetivo. Cuantos más Pokémon\nlo usan, más aumenta de potencia."
    ko: "노래로 상대를 공격한다.\n함께 돌림노래를 하면\n계속해서 쓸 수 있고 위력도 올라간다."
    zh_simp: "用歌声攻击对手。\n同伴还可以接着使出轮唱招式，\n威力也会提高。"
    zh_trad: "用歌聲攻擊對手。\n大家一起輪唱便可以接連使出，\n威力也會提高。"
sacred_fire:
  names:
    jp_kanji: せいなるほのお
    en: Sacred Fire
    fr: Feu Sacré
    it: Magifuoco
    de: Läuterfeuer
    es: Fuego Sagrado
    ko: 성스러운불꽃
    zh_simp: 神圣之火
    zh_trad: 神聖之火
  descriptions:
    jp_kanji: "神秘の　炎で\n相手を　焼きつくして　攻撃する。\nやけど状態に　することが　ある。"
    en: "The target is razed with a mystical fire of great\nintensity. This may also leave the target with a burn."
    fr: "Le lanceur génère un feu mystique d’une intensité\nredoutable pour attaquer l’ennemi.\nPeut aussi le brûler."
    it: "Colpisce il bersaglio con un fuoco mistico di\nenorme intensità che può anche causargli\nuna scottatura."
    de: "Mystische Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Fuego místico de gran intensidad que puede causar\nquemaduras."
    ko: "신비한 불꽃으로\n상대를 태워서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用神秘的火焰\n烧净对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用神秘的火焰\n燒盡對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
sacred_sword:
  names:
    jp_kanji: せいなるつるぎ
    en: Sacred Sword
    fr: Lame Sainte
    it: Spadasolenne
    de: Sanctoklinge
    es: Espada Santa
    ko: 성스러운칼
    zh_simp: 圣剑
    zh_trad: 聖劍
  descriptions:
    jp_kanji: "長い　つので　切りつけ　攻撃する。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user attacks by slicing with a long horn. The\ntarget’s stat changes don’t affect this\nattack’s damage."
    fr: "Un coup de corne violent qui lacère l’ennemi\net lui inflige des dégâts quels que soient\nses changements de stats."
    it: "Chi la usa taglia il bersaglio con una spada magica.\nIl danno inflitto ignora le modifiche alle statistiche\ndel Pokémon colpito."
    de: "Schneideangriff mit langem Horn. Richtet unabhängig\nvon den Statusveränderungen des Zieles Schaden an."
    es: "El usuario ataca con una espada, ignorando cualquier\ncambio en las características del objetivo."
    ko: "긴 뿔로 베어 공격한다.\n상대의 능력 변화에\n관계없이 데미지를 준다."
    zh_simp: "用长角切斩对手进行攻击。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "用長角斬切對手進行攻擊。\n可不顧對手的能力變化\n給予傷害。"
safeguard:
  names:
    jp_kanji: しんぴのまもり
    en: Safeguard
    fr: Rune Protect
    it: Salvaguardia
    de: Bodyguard
    es: Velo Sagrado
    ko: 신비의부적
    zh_simp: 神秘守护
    zh_trad: 神秘守護
  descriptions:
    jp_kanji: "５ターンの　間\n不思議な　力に　守られて\n状態異常に　ならなくなる。"
    en: "The user creates a protective field that prevents\nstatus conditions for five turns."
    fr: "Crée un champ protecteur qui empêche toutes\nles altérations de statut pendant cinq tours."
    it: "Chi la usa crea un campo protettivo che evita problemi\ndi stato per sé e gli alleati per cinque turni."
    de: "Team des Anwenders ist fünf Runden lang vor\nStatusproblemen geschützt."
    es: "Un escudo que protege de problemas de estado, como\nel sueño o la parálisis, durante cinco turnos."
    ko: "5턴 동안\n이상한 힘의 보호를 받아\n상태 이상이 되지 않는다."
    zh_simp: "在５回合内\n被神奇的力量守护，\n从而不会陷入异常状态。"
    zh_trad: "在５回合內\n被神奇的力量守護，\n不會陷入異常狀態。"
sand_attack:
  names:
    jp_kanji: すなかけ
    en: Sand Attack
    fr: Jet de Sable
    it: Turbosabbia
    de: Sandwirbel
    es: Ataque Arena
    ko: 모래뿌리기
    zh_simp: 泼沙
    zh_trad: 潑沙
  descriptions:
    jp_kanji: "相手の　顔に　砂を　かけて\n命中率を　さげる。"
    en: "Sand is hurled in the target’s face, reducing the\ntarget’s accuracy."
    fr: "Lance du sable au visage de l’ennemi pour baisser\nsa Précision."
    it: "Getta sabbia in faccia al bersaglio e ne riduce\nla precisione."
    de: "Senkt Genauigkeit des Zieles, indem ihm Sand ins\nGesicht geworfen wird."
    es: Arroja arena a la cara y baja la Precisión.
    ko: "상대의 얼굴에 모래를 뿌려서\n명중률을 떨어뜨린다."
    zh_simp: "向对手脸上泼沙子，\n从而降低命中率。"
    zh_trad: "向對手的臉上潑沙，\n降低對手的命中率。"
sand_tomb:
  names:
    jp_kanji: すなじごく
    en: Sand Tomb
    fr: Tourbi-Sable
    it: Sabbiotomba
    de: Sandgrab
    es: Bucle Arena
    ko: 모래지옥
    zh_simp: 流沙深渊
    zh_trad: 流沙地獄
  descriptions:
    jp_kanji: "激しく　吹きあれる　砂あらしの\n中に　４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target inside a harshly raging\nsandstorm for four to five turns."
    fr: "Le lanceur emprisonne l’ennemi dans une tempête\nde sable terrifiante qui dure de quatre à cinq tours."
    it: "Chi la usa intrappola il bersaglio in una tempesta\ndi sabbia per quattro o cinque turni."
    de: "Das Ziel leidet für vier bis fünf Runden in einer\nSandhose."
    es: "Enreda al objetivo en un remolino de arena de cuatro a\ncinco turnos."
    ko: "세차게 불어대는\n모래바람 속에 4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n铺天盖地的沙暴中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n鋪天蓋地的沙暴中，\n在４～５回合內進行攻擊。"
sandsear_storm:
  names:
    jp_kanji: ねっさのあらし
    en: Sandsear Storm
    fr: Typhon Pyrosable
    it: Tempesta Ardente
    de: Wüstenorkan
    es: Simún de Arena
    ko: 열사의폭풍
    zh_simp: 热沙风暴
    zh_trad: 熱沙風暴
  descriptions:
    jp_kanji: "熱く焼けた砂と強烈な風で\n包みこんで攻撃する。\n相手をやけど状態にする。"
    en: "The user attacks by wrapping the target in fierce winds\nand searingly hot sand.\nThis also leaves the target with a burn."
    fr: "Le lanceur déclenche un violent typhon mêlé à du sable\nardent qui s’abat sur l’ennemi. Brûle la cible."
    it: "Chi la usa attacca il bersaglio avvolgendolo con sabbia\nardente e un vento fortissimo che lo scottano."
    de: "Der Anwender greift das Ziel an, indem er es mit\nheftigen Windböen und brennend heißem Sand umgibt.\nDas Ziel erleidet Verbrennungen."
    es: "Ataca al objetivo envolviéndolo en unas arenas tórridas\ny un fuerte vendaval que lo queman."
    ko: "뜨겁게 달궈진 모래와 강렬한 바람으로\n상대를 둘러싸서 공격한다.\n상대를 화상 상태로 만든다."
    zh_simp: "用灼热的沙子和强烈的风\n席卷对手进行攻击。\n会让对手陷入灼伤状态。"
    zh_trad: "用灼熱的沙子和強烈的風\n席捲對手進行攻擊。\n會讓對手陷入灼傷狀態。"
sandstorm:
  names:
    jp_kanji: すなあらし
    en: Sandstorm
    fr: Tempête de Sable
    it: Terrempesta
    de: Sandsturm
    es: Tormenta Arena
    ko: 모래바람
    zh_simp: 沙暴
    zh_trad: 沙暴
  descriptions:
    jp_kanji: "５ターンの　間　砂あらしで　いわ\nじめん　はがねタイプ　以外に　ダメージ。\nいわタイプの　特防が　あがる。"
    en: "A five-turn sandstorm is summoned to hurt all\ncombatants except Rock, Ground, and Steel types.\nIt raises the Sp. Def stat of Rock types."
    fr: "Une tempête de sable blesse tous les Pokémon pendant\ncinq tours, sauf ceux de type Roche, Sol ou Acier.\nAugmente la Défense Spéciale des Pokémon Roche."
    it: "Causa una tempesta di sabbia per cinque turni che\ndanneggia tutti i tipi esclusi Terra, Roccia e Acciaio.\nAumenta la Difesa Speciale dei Pokémon di tipo Roccia."
    de: "Sandsturm für fünf Runden. Schadet Pokémon aller\nTypen außer Gestein, Boden und Stahl. Erhöht die\nSpezial-Verteidigung von Gesteins-Pokémon."
    es: "Tormenta de arena que dura cinco turnos y hiere a\ntodos, excepto a los de tipo Roca, Tierra y Acero,\ny aumenta la Defensa Especial de los de tipo Roca."
    ko: "5턴 동안 모래바람을 일으켜\n바위, 땅, 강철타입 이외의 상대에게 데미지를 준다.\n바위타입의 특수방어가 올라간다."
    zh_simp: "在５回合内扬起沙暴，除岩石、地面和\n钢属性以外的宝可梦，都会受到伤害。\n岩石属性的特防还会提高。"
    zh_trad: "揚起沙暴，在５回合內給予\n岩石、地面和鋼屬性以外的寶可夢傷害。\n岩石屬性寶可夢的特防會提高。"
sappy_seed:
  names:
    jp_kanji: すくすくボンバー
    en: Sappy Seed
    fr: Évo-Écolo
    it: Bombafrush
    de: Sprießbomben
    es: Leafitobombas
    ko: 쑥쑥봄버
    zh_simp: 茁茁炸弹
    zh_trad: 茁茁轟炸
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
savage_spin_out:physical:
  names:
    jp_kanji: ぜったいほしょくかいてんざん
    en: Savage Spin-Out
    fr: Cocon Fatal
    it: Bozzolo Fatale
    de: Wirbelnder Insektenhieb
    es: Guadaña Sedosa
    ko: 절대포식회전참
    zh_simp: 绝对捕食回旋斩
    zh_trad: 絕對捕食迴旋斬
  descriptions:
