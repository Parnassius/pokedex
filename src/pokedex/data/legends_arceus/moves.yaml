blast_burn:
  names:
    jp_kanji: ブラストバーン
    en: Blast Burn
    fr: Rafale Feu
    it: Incendio
    de: Lohekanonade
    es: Anillo Ígneo
    ko: 블러스트번
    zh_simp: 爆炸烈焰
    zh_trad: 爆炸烈焰
  descriptions:
    jp_kanji: "爆発の　炎で\n相手を　焼きつくして　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is razed by a fiery explosion. The user\ncan’t move on the next turn."
    fr: "Une explosion ardente souffle l’adversaire.\nLe lanceur doit se reposer au tour suivant."
    it: "Potente esplosione che danneggia il bersaglio,\nma fa saltare il turno successivo a chi la provoca."
    de: "Das Ziel wird von einer starken Explosion getroffen.\nAnwender setzt eine Runde aus."
    es: "Explosión de fuego. El atacante debe descansar el\nsiguiente turno."
    ko: "폭발하는 불꽃으로\n상대를 태워서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "用爆炸的火焰\n烧净对手进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "用爆炸的火焰\n燒盡對手進行攻擊。\n下一回合自己將無法動彈。"
blaze_kick:
  names:
    jp_kanji: ブレイズキック
    en: Blaze Kick
    fr: Pied Brûleur
    it: Calciardente
    de: Feuerfeger
    es: Patada Ígnea
    ko: 브레이즈킥
    zh_simp: 火焰踢
    zh_trad: 火焰踢
  descriptions:
    jp_kanji: "攻撃した　相手を\nやけど状態に　することが　ある。\n急所にも　当たりやすい。"
    en: "The user launches a kick that lands a critical hit\nmore easily. This may also leave the target with\na burn."
    fr: "Le lanceur envoie un coup de pied au taux de critiques\nélevé. Peut aussi brûler la cible."
    it: "Chi la usa tira un calcio. Probabile brutto colpo.\nPuò anche scottare il bersaglio."
    de: "Starker Tritt mit hoher Volltrefferquote. Verursacht\neventuell Verbrennungen."
    es: "Patada que suele ser un golpe crítico y puede causar\nquemaduras."
    ko: "공격한 상대를\n화상 상태로 만들 때가 있다.\n급소에도 맞기 쉽다."
    zh_simp: "攻击对手后，\n有时会使其陷入灼伤状态。\n也容易击中要害。"
    zh_trad: "有時會讓受到攻擊的對手\n陷入灼傷狀態。\n且容易擊中要害。"
bleakwind_storm:
  names:
    jp_kanji: こがらしあらし
    en: Bleakwind Storm
    fr: Typhon Hivernal
    it: Tempesta Boreale
    de: Polarorkan
    es: Vendaval Gélido
    ko: 찬바람폭풍
    zh_simp: 枯叶风暴
    zh_trad: 枯葉風暴
  descriptions:
    jp_kanji: "身も心も震える\n冷たく激しい風で攻撃する。\n相手をしもやけ状態にすることもある。"
    en: "The user attacks with savagely cold winds that cause\nboth body and spirit to tremble.\nThis may also leave the target with frostbite."
    fr: "Frappe l’ennemi d’un typhon froid et brutal, qui fait\ntrembler le cœur et le corps. Peut aussi geler la cible."
    it: "Chi la usa attacca il bersaglio con venti gelidi e sferzanti\nche lo fanno tremare anima e corpo e possono anche\nassiderarlo."
    de: "Der Anwender greift mit starken, kalten Winden an,\ndie Körper und Geist erzittern lassen und beim Ziel\neventuell Frostbrand verursachen."
    es: "Ataca con un viento tan frío que estremece el cuerpo y\nla mente y además puede dejar helado al objetivo."
    ko: "심신을 모두 떨게 만드는\n차갑고도 거친 바람으로 공격한다.\n상대를 동상 상태로 만들 때가 있다."
    zh_simp: "用足以让身心都止不住颤抖的\n冰冷狂风进行攻击。\n有时会让对手陷入冻伤状态。"
    zh_trad: "用足以讓身心都止不住顫抖的\n冰冷狂風進行攻擊。\n有時還會讓對手陷入凍傷狀態。"
blizzard:
  names:
    jp_kanji: ふぶき
    en: Blizzard
    fr: Blizzard
    it: Bora
    de: Blizzard
    es: Ventisca
    ko: 눈보라
    zh_simp: 暴风雪
    zh_trad: 暴風雪
  descriptions:
    jp_kanji: "激しい吹雪を\n吹きつけて攻撃する。\n相手をしもやけ状態にすることもある。"
    en: "A howling blizzard is summoned to strike the target.\nThis may also leave the target with frostbite."
    fr: "Une violente tempête de neige s’abat sur l’ennemi.\nPeut aussi le geler."
    it: "Colpisce il bersaglio con una tremenda tempesta\ndi ghiaccio che può anche assiderarlo."
    de: "Ein Schneesturm wütet, der beim Ziel eventuell\nFrostbrand verursacht."
    es: "Ataca con una tormenta de hielo que además puede\ndejar helado al objetivo."
    ko: "세찬 눈보라를 내뿜어 공격한다.\n상대를 동상 상태로 만들 때가 있다."
    zh_simp: "将猛烈的暴风雪\n刮向对手进行攻击。\n有时会让对手陷入冻伤状态。"
    zh_trad: "將猛烈的暴風雪\n吹向對手進行攻擊。\n有時還會讓對手陷入凍傷狀態。"
block:
  names:
    jp_kanji: とおせんぼう
    en: Block
    fr: Barrage
    it: Blocco
    de: Rückentzug
    es: Bloqueo
    ko: 블록
    zh_simp: 挡路
    zh_trad: 擋路
  descriptions:
    jp_kanji: "両手を　ひろげて　たちはだかり\n相手の　逃げ道を　ふさいで\n逃げられなくする。"
    en: "The user blocks the target’s way with arms spread\nwide to prevent escape."
    fr: "Le lanceur bloque la route de l’ennemi pour\nempêcher sa fuite."
    it: "Chi la usa sbarra la strada al bersaglio\nimpedendone la fuga o la sostituzione."
    de: Anwender versperrt den Fluchtweg des Zieles.
    es: Le corta el paso al objetivo para que no pueda escapar.
    ko: "양팔을 벌리고 서서\n상대의 도주로를 가로막아\n도망칠 수 없게 한다."
    zh_simp: "张开双手进行阻挡，\n封住对手的退路，\n使其不能逃走。"
    zh_trad: "張開雙手進行阻擋，\n封住對手的退路，\n讓對手無法逃走。"
bloom_doom:physical:
  names:
    jp_kanji: ブルームシャインエクストラ
    en: Bloom Doom
    fr: Pétalexplosion Éblouissante
    it: Floriscoppio Sfolgorante
    de: Brillante Blütenpracht
    es: Megatón Floral
    ko: 블룸샤인엑스트라
    zh_simp: 绚烂缤纷花怒放
    zh_trad: 絢爛繽紛花怒放
