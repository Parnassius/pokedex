twister:
  names:
    jp_kanji: たつまき
    en: Twister
    fr: Ouragan
    it: Tornado
    de: Windhose
    es: Ciclón
    ko: 회오리
    zh_simp: 龙卷风
    zh_trad: 龍捲風
  descriptions:
    jp_kanji: "竜巻をおこして\n相手をまきこみ攻撃する。"
    en: The user whips up a vicious tornado to tear at the target.
    fr: Déclenche un terrible ouragan qui s’abat sur l’ennemi.
    it: Un potente tornado si abbatte sul bersaglio.
    de: Trifft das Ziel mit einem heftigen Wirbelsturm.
    es: Crea un violento tornado para hacer trizas al objetivo.
    ko: "회오리를 일으켜\n상대를 휩쓸어 공격한다."
    zh_simp: "兴起龙卷风，\n将对手卷入进行攻击。"
    zh_trad: "刮起龍捲風，\n將對手捲入進行攻擊。"
u_turn:
  names:
    jp_kanji: とんぼがえり
    en: U-turn
    fr: Demi-Tour
    it: Retromarcia
    de: Kehrtwende
    es: Ida y Vuelta
    ko: 유턴
    zh_simp: 急速折返
    zh_trad: 急速折返
  descriptions:
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa fa marcia indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario vuelve a toda prisa para dar paso\na otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
uproar:
  names:
    jp_kanji: さわぐ
    en: Uproar
    fr: Brouhaha
    it: Baraonda
    de: Aufruhr
    es: Alboroto
    ko: 소란피기
    zh_simp: 吵闹
    zh_trad: 吵鬧
  descriptions:
    jp_kanji: "３ターンの　間\n騒いで　相手を　攻撃する。\nそのあいだは　だれも　眠れなくなる。"
    en: "The user attacks in an uproar for three turns.\nDuring that time, no Pokémon can fall asleep."
    fr: "Le lanceur attaque en rugissant durant trois tours.\nPendant ce temps, aucun Pokémon ne peut s’endormir."
    it: "Chi la usa attacca per tre turni con un frastuono\nche non fa dormire nessuno."
    de: "Anwender greift an, indem er über drei Runden hinweg\neinen Aufruhr erzeugt. Verhindert Schlaf."
    es: "Ataca de forma alborotada durante tres turnos.\nMantiene despiertos a todos."
    ko: "3턴 동안\n소란 피워 공격한다.\n그동안은 아무도 잠들지 않게 된다."
    zh_simp: "在３回合内\n用骚乱攻击对手。\n在此期间谁都不能入眠。"
    zh_trad: "在３回合內\n大吵大鬧攻擊對手。\n在此期間誰都無法入眠。"
v_create:
  names:
    jp_kanji: Ｖジェネレート
    en: V-create
    fr: Coup Victoire
    it: Generatore V
    de: V-Generator
    es: V de Fuego
    ko: V제너레이트
    zh_simp: Ｖ热焰
    zh_trad: Ｖ熱焰
  descriptions:
    jp_kanji: "灼熱の　炎を　額から\n発生させて　捨て身の　体当たり。\n防御　特防　素早さが　さがる。"
    en: "With a hot flame on its forehead, the user hurls itself\nat its target. This lowers the user’s Defense, Sp. Def,\nand Speed stats."
    fr: "Le lanceur projette une flamme ardente de son front\net se jette sur l’ennemi. Baisse la Défense, la Défense\nSpéciale et la Vitesse."
    it: "Chi la usa carica emettendo fiamme ardenti dalla\nfronte, a costo di una riduzione di Difesa,\nDifesa Speciale e Velocità."
    de: "Eine Verzweiflungsattacke. Anwender entfacht glühend\nheißes Feuer. Senkt dessen Verteidigung,\nSpezial-Verteidigung und Initiative."
    es: "Golpea con una V de llamas al objetivo. Baja la\nDefensa, la Defensa Especial y la Velocidad de\nquien lo usa."
    ko: "작열하는 불꽃을 이마에서\n발생시켜 이판사판으로 몸통박치기한다.\n방어, 특수방어, 스피드가 떨어진다."
    zh_simp: "从前额产生灼热的火焰，\n舍身撞击对手。\n防御、特防和速度会降低。"
    zh_trad: "在前額產生灼熱的火焰，\n然後捨身撞擊對手。\n自己的防禦、特防和速度會降低。"
vacuum_wave:
  names:
    jp_kanji: しんくうは
    en: Vacuum Wave
    fr: Onde Vide
    it: Vuotonda
    de: Vakuumwelle
    es: Onda Vacío
    ko: 진공파
    zh_simp: 真空波
    zh_trad: 真空波
  descriptions:
    jp_kanji: "こぶしを　ふって\n真空の　波を　まきおこす。\n必ず　先制攻撃できる。"
    en: "The user whirls its fists to send a wave of pure\nvacuum at the target. This move always goes first."
    fr: "Le lanceur agite son poing pour projeter une onde\nde vide. Frappe en priorité."
    it: "Chi la usa rotea i pugni per lanciare un’onda di\nvuoto assoluto verso il bersaglio.\nQuesta mossa ha priorità alta."
    de: "Erstschlag-Attacke, bei der ein Faustwirbel eine\nVakuumwelle auf das Ziel sendet."
    es: "Gira los puños y libera una onda de vacío contra el\nobjetivo. Este movimiento tiene prioridad alta."
    ko: "주먹을 흔들어\n진공의 파도를 일으킨다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "挥动拳头，\n掀起真空波。\n必定能够先制攻击。"
    zh_trad: "揮動拳頭，\n捲起真空波。\n必定能夠發動先制攻擊。"
