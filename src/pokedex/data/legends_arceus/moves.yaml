    en: Splishy Splash
    fr: Pika-Splash
    it: Surfasplash
    de: Plätschersurfer
    es: Salpikasurf
    ko: 참방참방서핑
    zh_simp: 滔滔冲浪
    zh_trad: 滔滔衝浪
