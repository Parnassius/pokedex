spacial_rend:
  names:
    jp_kanji: あくうせつだん
    en: Spacial Rend
    fr: Spatio-Rift
    it: Fendispazio
    de: Raumschlag
    es: Corte Vacío
    ko: 공간절단
    zh_simp: 亚空裂斩
    zh_trad: 亞空裂斬
  descriptions:
    jp_kanji: "周りの空間ごと\n相手を引き裂きダメージを与える。\n急所に当たりやすい。"
    en: "The user tears the target along with the space around it.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur déchire l’ennemi et l’espace autour de lui.\nTaux de critiques élevé."
    it: "Chi la usa lacera il bersaglio e lo spazio che lo circonda.\nProbabile brutto colpo."
    de: "Anwender attackiert mit einer Kraft, die selbst den Raum\num das Ziel herum zerreißt. Hohe Volltrefferquote."
    es: "Desgarra al objetivo y el espacio a su alrededor.\nSuele ser crítico."
    ko: "주위의 공간과 함께\n상대를 절단하여 데미지를 준다.\n급소에 맞기 쉽다."
    zh_simp: "将对手连同周围的空间一起\n撕裂并给予伤害。\n容易击中要害。"
    zh_trad: "將對手連同周圍的空間\n一起切開，給予對手傷害。\n容易擊中要害。"
spark:
  names:
    jp_kanji: スパーク
    en: Spark
    fr: Étincelle
    it: Scintilla
    de: Funkensprung
    es: Chispa
    ko: 스파크
    zh_simp: 电光
    zh_trad: 電光
  descriptions:
    jp_kanji: "電気をまといつつ突進して攻撃。\n相手をまひ状態にすることもある。"
    en: "The user throws an electrically charged tackle at the\ntarget to deal damage. This may also leave the target\nwith paralysis."
    fr: "Lance une charge électrique sur l’ennemi.\nPeut aussi le paralyser."
    it: "Colpisce il bersaglio con una scarica elettrica\ne può anche paralizzarlo."
    de: Eine Elektro-Attacke, die das Ziel eventuell paralysiert.
    es: Ataque eléctrico que puede paralizar al objetivo.
    ko: "전기를 두르고 돌진하여 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞身體，\n向前猛衝進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
sparkling_aria:
  names:
    jp_kanji: うたかたのアリア
    en: Sparkling Aria
    fr: Aria de l’Écume
    it: Canto Effimero
    de: Schaumserenade
    es: Aria Burbuja
    ko: 물거품아리아
    zh_simp: 泡影的咏叹调
    zh_trad: 泡影的詠歎調
  descriptions:
    jp_kanji: "歌うことによって　たくさんの\nバルーンを　放出する。\n技を　受けると　やけどが　治る。"
    en: "The user bursts into song, emitting many bubbles.\nAny Pokémon suffering from a burn will be healed\nby the touch of these bubbles."
    fr: "Le lanceur émet plusieurs bulles en chantant.\nSoigne les brûlures des Pokémon touchés par ces bulles."
    it: "Chi la usa si mette a cantare emettendo tanti\npalloncini d’acqua. I Pokémon che subiscono danni\nda questa mossa guariscono dalle scottature."
    de: "Durch Gesang erzeugte Blasen werden auf das Ziel\ngeschleudert. Alle Pokémon, die dadurch Schaden\nerleiden, werden auch von Verbrennungen geheilt."
    es: "Libera burbujas al cantar. Este movimiento cura las\nquemaduras de los Pokémon que reciban daño."
    ko: "노래 부르는 것으로 많은\n벌룬을 방출한다.\n기술에 맞으면 화상이 낫는다."
    zh_simp: "随着唱歌会放出很多气球。\n受到此招式攻击时，\n灼伤会被治愈。"
    zh_trad: "隨著歌聲放出許多水球。\n受此招式攻擊時，\n灼傷會被治癒。"
sparkly_swirl:
  names:
    jp_kanji: きらきらストーム
    en: Sparkly Swirl
    fr: Évo-Fabulo
    it: Sbrilluccibufera
    de: Glitzersturm
    es: Sylveotornado
    ko: 반짝반짝스톰
    zh_simp: 亮亮风暴
    zh_trad: 亮亮風暴
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
