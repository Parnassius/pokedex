continental_crush:physical:
  names:
    jp_kanji: ワールズエンドフォール
    en: Continental Crush
    fr: Apocalypse Gigalithique
    it: Gigamacigno Polverizzante
    de: Apokalyptische Steinpresse
    es: Aplastamiento Gigalítico
    ko: 월즈엔드폴
    zh_simp: 毁天灭地巨岩坠
    zh_trad: 毀天滅地巨岩墜
