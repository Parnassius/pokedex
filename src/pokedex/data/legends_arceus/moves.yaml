springtide_storm:
  names:
    jp_kanji: はるのあらし
    en: Springtide Storm
    fr: Typhon Passionné
    it: Tempesta Zefirea
    de: Frühlingsorkan
    es: Ciclón Primavera
    ko: 봄의폭풍
    zh_simp: 阳春风暴
    zh_trad: 陽春風暴
  descriptions:
    jp_kanji: "愛憎入りまじった強烈な風で\n相手を包みこんで攻撃する。\n技を放つフォルムで追加効果が変わる。"
    en: "The user attacks by wrapping the target in fierce winds\nbrimming with love and hate. This move’s additional\neffects depend on the user’s form."
    fr: "Le lanceur déclenche un violent typhon mêlé de haine et\nd’amour qui s’abat sur l’ennemi. Les effets additionnels\nchangent en fonction de la forme du lanceur."
    it: "Chi la usa attacca il bersaglio avvolgendolo con un vento\nfortissimo di odio e amore. Questa mossa ha effetti\naggiuntivi diversi a seconda della forma di chi la usa."
    de: "Der Anwender greift das Ziel an, indem er es mit\nheftigen Windböen voller Hassliebe umgibt. Je nach\nForm des Anwenders ändern sich die Zusatzeffekte."
    es: "Desata una tormenta de amor y odio con la que\nenvuelve y ataca al objetivo. Tiene otros efectos\nadicionales según la forma del usuario."
    ko: "애증 섞인 강렬한 바람으로\n상대를 둘러싸서 공격한다.\n기술을 사용하는 폼에 따라 추가 효과가 달라진다."
    zh_simp: "用交织着爱与恨的烈风\n席卷对手进行攻击。\n追加效果会依出招时的形态而改变。"
    zh_trad: "用交織著愛與恨的烈風\n席捲對手進行攻擊。\n追加效果會依出招時的形態而改變。"
stealth_rock:
  names:
    jp_kanji: ステルスロック
    en: Stealth Rock
    fr: Piège de Roc
    it: Levitoroccia
    de: Tarnsteine
    es: Trampa Rocas
    ko: 스텔스록
    zh_simp: 隐形岩
    zh_trad: 隱形岩
  descriptions:
    jp_kanji: "無数の岩をぶつけて攻撃する。\nばらまかれた岩の破片によって\n相手に数回ダメージを与える。"
    en: "The user launches countless stones at the target.\nStone splinters left behind by this attack continue to\ndamage the target for several turns."
    fr: "Lance des pierres flottantes autour de l’ennemi.\nLes débris des pierres disséminés infligent des dégâts\nà la cible à plusieurs reprises."
    it: "Chi la usa lancia una raffica di rocce sul bersaglio.\nI frammenti di rocce sparsi nei dintorni infliggono\nripetutamente danni al bersaglio."
    de: "Angriff mit zahllosen Steingeschossen. Das Ziel nimmt\ndurch verstreute Steinsplitter wiederholt Schaden."
    es: "Ataca lanzando innumerables rocas al objetivo, que\ndejan fragmentos que lo dañan varias veces."
    ko: "무수한 바위를 부딪쳐서 공격한다.\n흩어진 바위 파편으로\n상대에게 여러 번 데미지를 준다."
    zh_simp: "将无数的岩石砸向对手进行攻击。\n散落的岩石碎片\n可给予对手数次伤害。"
    zh_trad: "將無數的岩石砸向對手進行攻擊。\n散落的岩石碎片\n可給予對手數次傷害。"
steam_eruption:
  names:
    jp_kanji: スチームバースト
    en: Steam Eruption
    fr: Jet de Vapeur
    it: Vaporscoppio
    de: Dampfschwall
    es: Chorro de Vapor
    ko: 스팀버스트
    zh_simp: 蒸汽爆炸
    zh_trad: 蒸汽爆炸
  descriptions:
    jp_kanji: "ものすごく　熱い　蒸気を\n相手に　浴びせる。\n相手は　やけどする　ことがある。"
    en: "The user immerses the target in superheated steam.\nThis may also leave the target with a burn."
    fr: "Plonge l’ennemi dans une chaleur étouffante.\nPeut le brûler."
    it: "Travolge il bersaglio con un’ondata di vapore\nrovente che può anche scottarlo."
    de: "Der Anwender feuert einen siedend heißen\nDampfschwall auf das Ziel ab. Dieses kann\ndabei Verbrennungen erleiden."
    es: "Envuelve al Pokémon oponente con vapor\nextremadamente caliente que puede llegar a\nquemarlo."
    ko: "상대에게 굉장히 뜨거운\n증기를 뿜는다.\n상대는 화상을 입기도 한다."
    zh_simp: "将滚烫的蒸汽喷向对手。\n有时会让对手灼伤。"
    zh_trad: "將超高溫的蒸汽噴向對手。\n有時會讓對手陷入灼傷狀態。"
steamroller:
  names:
    jp_kanji: ハードローラー
    en: Steamroller
    fr: Bulldoboule
    it: Rulloduro
    de: Quetschwalze
    es: Rodillo de Púas
    ko: 하드롤러
    zh_simp: 疯狂滚压
    zh_trad: 瘋狂滾壓
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
steel_beam:
  names:
    jp_kanji: てっていこうせん
    en: Steel Beam
    fr: Métalaser
    it: Raggio d’Acciaio
    de: Stahlstrahl
    es: Metaláser
    ko: 철제광선
    zh_simp: 铁蹄光线
    zh_trad: 鐵蹄光線
  descriptions:
    jp_kanji: "全身から集めた　はがねを\nビームとして激しく撃ちだす。\n自分もダメージを受ける。"
    en: "The user fires a beam of steel that it collected from its\nentire body. This also damages the user."
    fr: "Le lanceur concentre du métal issu de tout son corps\nen un rayon qu’il projette violemment sur la cible.\nLe lanceur subit également des dégâts."
    it: "Chi la usa utilizza l’acciaio del proprio corpo per\nsparare un violento raggio, ma subisce danni."
    de: "Der Anwender schießt Stahl, den er in seinem ganzen\nKörper angesammelt hat, in Form eines mächtigen\nStrahls ab. Dabei verletzt er sich auch selbst."
    es: "Utiliza el acero de su cuerpo para disparar un potente\nrayo. El usuario también recibe daño."
    ko: "전신에서 끌어모은 강철을\n빔으로 바꿔 세차게 발사한다.\n자신도 데미지를 입는다."
    zh_simp: "将从全身聚集的钢铁\n化为光束，激烈地发射出去。\n自己也会受到伤害。"
    zh_trad: "將從全身匯聚起來的鋼鐵\n化為光束激烈地發射出去。\n自己也會受到傷害。"
steel_roller:
  names:
    jp_kanji: アイアンローラー
    en: Steel Roller
    fr: Métalliroue
    it: Ferrorullo
    de: Eisenwalze
    es: Allanador Férreo
    ko: 아이언롤러
    zh_simp: 铁滚轮
    zh_trad: 鐵滾輪
  descriptions:
    jp_kanji: "フィールドを　破壊しながら　攻撃。\nなんらかの　フィールド状態に\n変わっていないと　技は　失敗する。"
    en: "The user attacks while destroying the terrain. This move\nfails when the ground hasn’t turned into a terrain."
    fr: "Une attaque qui inflige des dégâts et fait disparaître\nle champ actif, mais qui échoue s’il n’y en a pas\nà ce moment."
    it: "Chi la usa attacca eliminando lo stato del terreno\ndi lotta. La mossa fallisce se nel terreno non è attivo\nalcuno stato."
    de: "Der Anwender greift an und zerstört dabei etwaige\nFelder. Ist kein Feld aktiv, schlägt die Attacke fehl."
    es: "El usuario lanza su ataque y destruye el campo activo\nen el terreno de combate, y falla si no hay ninguno en\nese momento."
    ko: "필드를 파괴하면서 공격한다.\n필드가 어떤 상태로든 변해 있지 않은 경우\n기술은 실패한다."
    zh_simp: "在破坏场地的同时攻击对手。\n如果脚下没有任何场地状态存在，\n使出此招式时便会失败。"
    zh_trad: "一邊破壞場地，一邊進行攻擊。\n在不是特殊狀態的場地上使用，\n招式就會失敗。"
steel_wing:
  names:
    jp_kanji: はがねのつばさ
    en: Steel Wing
    fr: Ailes d’Acier
    it: Alacciaio
    de: Stahlflügel
    es: Ala de Acero
    ko: 강철날개
    zh_simp: 钢翼
    zh_trad: 鋼翼
  descriptions:
    jp_kanji: "硬い　翼を　相手に　たたきつけて\n攻撃する。　自分の　防御が\nあがることが　ある。"
    en: "The target is hit with wings of steel. This may also\nraise the user’s Defense stat."
    fr: "Le lanceur frappe l’ennemi avec des ailes d’acier.\nPeut aussi augmenter la Défense du lanceur."
    it: "Colpisce il bersaglio con ali d’acciaio.\nPuò anche aumentare la Difesa di chi la usa."
    de: "Trifft das Ziel mit Stahlflügeln. Verteidigungs-Wert des\nAnwenders steigt eventuell."
    es: "Alas macizas que golpean al objetivo y pueden subir\nla Defensa del usuario."
    ko: "단단한 날개를 상대에게 부딪쳐서\n공격한다. 자신의 방어가\n올라갈 때가 있다."
    zh_simp: "用坚硬的翅膀敲打\n对手进行攻击。\n有时会提高自己的防御。"
    zh_trad: "用堅硬的翅膀撞擊\n對手進行攻擊。\n有時會提高自己的防禦。"
sticky_web:
  names:
    jp_kanji: ねばねばネット
    en: Sticky Web
    fr: Toile Gluante
    it: Rete Vischiosa
    de: Klebenetz
    es: Red Viscosa
    ko: 끈적끈적네트
    zh_simp: 黏黏网
    zh_trad: 黏黏網
  descriptions:
    jp_kanji: "相手の　周りに　ねばねばした\nネットを　はりめぐらせ　交代で\nでてきた　相手の　素早さを　さげる。"
    en: "The user weaves a sticky net around the opposing\nteam, which lowers their Speed stats upon switching\ninto battle."
    fr: "Déploie une toile visqueuse autour de l’ennemi\nqui ralentit la Vitesse de tout adversaire entrant\nau combat."
    it: "Chi la usa intreccia una rete appiccicosa attorno\nalla squadra avversaria, diminuendo la Velocità dei\nPokémon nemici che entreranno in campo."
    de: "Der Anwender spinnt in der Umgebung des\ngegnerischen Teams ein klebriges Netz und senkt\nso die Initiative neu eingewechselter Pokémon."
    es: "Coloca una red pegajosa alrededor del equipo rival que\nbaja la Velocidad de cualquier adversario que entre a\ncombatir."
    ko: "상대의 주위에 끈적끈적한\n네트를 둘러 펼쳐 교체되어\n나온 상대의 스피드를 떨어뜨린다."
    zh_simp: "在对手周围围上黏黏的网，\n降低替换出场的对手的速度。"
    zh_trad: "在對手周圍撒下黏黏的網，\n降低替換出場的對手的速度。"
stockpile:
  names:
    jp_kanji: たくわえる
    en: Stockpile
    fr: Stockage
    it: Accumulo
    de: Horter
    es: Reserva
    ko: 비축하기
    zh_simp: 蓄力
    zh_trad: 蓄力
  descriptions:
    jp_kanji: "力を　蓄えて　自分の\n防御と　特防を　あげる。\n最大　３回まで　蓄えられる。"
    en: "The user charges up power and raises both its\nDefense and Sp. Def stats. The move can be used\nthree times."
    fr: "Le lanceur accumule de la puissance et augmente\nsa Défense et sa Défense Spéciale.\nPeut être utilisée trois fois."
    it: "Chi la usa accumula energia aumentando\nla Difesa e la Difesa Speciale.\nSi può utilizzare tre volte."
    de: "Lädt Kraft für später auf. Erhöht Verteidigung und\nSpezial-Verteidigung. Kann bis zu dreimal eingesetzt\nwerden."
    es: "Acumula energía y sube la Defensa y la Defensa\nEspecial. Puede utilizarse hasta tres veces."
    ko: "힘을 비축해서 자신의\n방어와 특수방어를 올린다.\n최대 3회까지 비축할 수 있다."
    zh_simp: "积蓄力量，\n提高自己的防御和特防。\n最多积蓄３次。"
    zh_trad: "蓄積力量，\n提高自己的防禦和特防。\n最多蓄積３次。"
stoked_sparksurfer:
  names:
    jp_kanji: ライトニングサーフライド
    en: Stoked Sparksurfer
    fr: Électro-Surf Survolté
    it: Elettrosurf Folgorante
    de: Blitz-Wellenritt
    es: Surfeo Galvánico
    ko: 라이트닝서프라이드
    zh_simp: 驾雷驭电戏冲浪
    zh_trad: 駕雷馭電戲衝浪
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
stomp:
  names:
    jp_kanji: ふみつけ
    en: Stomp
    fr: Écrasement
    it: Pestone
    de: Stampfer
    es: Pisotón
    ko: 짓밟기
    zh_simp: 踩踏
    zh_trad: 踩踏
  descriptions:
    jp_kanji: "大きな　足で\n相手を　踏みつけて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The target is stomped with a big foot. This may also\nmake the target flinch."
    fr: "Écrase l’ennemi avec un énorme pied.\nPeut aussi l’apeurer."
    it: "Colpisce il bersaglio con un grosso piede\ne può anche farlo tentennare."
    de: "Stampfen mit dem Fuß. Das Ziel schreckt eventuell\nzurück."
    es: "Tremendo pisotón que puede hacer que el objetivo se\namedrente."
    ko: "큰 발로\n상대를 짓밟아서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用大脚踩踏对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用大腳踩踏對手進行攻擊。\n有時會讓對手畏縮。"
stomping_tantrum:
  names:
    jp_kanji: じだんだ
    en: Stomping Tantrum
    fr: Trépignement
    it: Battipiedi
    de: Fruststampfer
    es: Pataleta
    ko: 분함의발구르기
    zh_simp: 跺脚
    zh_trad: 跺腳
  descriptions:
    jp_kanji: "悔しさを　バネにして　攻撃する。\n前の　ターンに　技を　外していると\n威力が　倍に　なる。"
    en: "Driven by frustration, the user attacks the target.\nIf the user’s previous move has failed, the power of\nthis move doubles."
    fr: "Le lanceur attaque en utilisant sa frustration. S’il a\nutilisé une capacité qui a échoué au tour précédent,\nla puissance de Trépignement est doublée."
    it: "Chi la usa attacca battendo i piedi per la rabbia.\nSe la mossa usata al turno precedente non è\nandata a segno, la potenza raddoppia."
    de: "Von Frust getrieben greift der Anwender an.\nWenn seine vorige Attacke fehlgeschlagen ist,\nverdoppelt sich die Stärke der Attacke."
    es: "Usa la frustración como revulsivo para atacar.\nLa potencia de Pataleta se duplica si el usuario\nha fallado el último movimiento usado."
    ko: "분함을 발판 삼아 공격한다.\n앞 턴에서 기술이 빗나갔다면\n위력이 배가 된다."
    zh_simp: "化悔恨为力量进行攻击。\n如果上一回合招式没有打中，\n威力就会翻倍。"
    zh_trad: "化悔恨為力量進行攻擊。\n如果上一回合的招式沒有命中，\n威力就會加倍。"
stone_axe:
  names:
    jp_kanji: がんせきアックス
    en: Stone Axe
    fr: Hache de Pierre
    it: Rocciascure
    de: Felsaxt
    es: Hachazo Pétreo
    ko: 암석액스
    zh_simp: 岩斧
    zh_trad: 岩斧
  descriptions:
    jp_kanji: "岩の斧で急所を狙って攻撃する。\nばらまかれた岩の破片によって\n相手に数回ダメージを与える。"
    en: "The user swings its stone axes at the target, aiming to\nland a critical hit. Stone splinters left behind by this\nattack continue to damage the target for several turns."
    fr: "Le lanceur attaque le point faible de sa cible avec\nsa hache de pierre. Les débris de pierre continuent\nd’infliger des dégâts à la cible plusieurs fois."
    it: "Chi la usa attacca il bersaglio con delle scuri di roccia,\nmirando a un brutto colpo. I frammenti di roccia sparsi\nnei dintorni infliggono ripetutamente danni al bersaglio."
    de: "Der Anwender greift mit seinen Felsäxten die\nSchwachstelle des Zieles an. Dieses nimmt durch\nverstreute Felssplitter wiederholt Schaden."
    es: "Ataca el punto débil del objetivo con un hacha de\npiedra, que deja fragmentos que dañan al objetivo\nvarias veces."
    ko: "암석 도끼로 급소를 노려 공격한다.\n흩어진 암석 파편으로\n상대에게 여러 번 데미지를 준다."
    zh_simp: "用岩石之斧瞄准要害进行攻击。\n散落的岩石碎片\n可给予对手数次伤害。"
    zh_trad: "用岩石之斧瞄準要害進行攻擊。\n散落的岩石碎片\n可給予對手數次傷害。"
stone_edge:
  names:
    jp_kanji: ストーンエッジ
    en: Stone Edge
    fr: Lame de Roc
    it: Pietrataglio
    de: Steinkante
    es: Roca Afilada
    ko: 스톤에지
    zh_simp: 尖石攻击
    zh_trad: 尖石攻擊
  descriptions:
    jp_kanji: "とがった岩を\n相手に突き刺して攻撃する。\n急所に当たりやすい。"
    en: "The user stabs the target with sharpened stones.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur fait surgir des pierres aiguisées sous l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa colpisce il bersaglio dal basso con pietre\naffilate. Probabile brutto colpo."
    de: "Anwender schleudert scharfe Steine auf das Ziel.\nHohe Volltrefferquote."
    es: Clava piedras muy afiladas al objetivo. Suele ser crítico.
    ko: "뾰족한 바위를\n상대에게 꿰찔러서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖尖的岩石\n刺入对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的岩石\n刺進對手進行攻擊。\n容易擊中要害。"
stored_power:
  names:
    jp_kanji: アシストパワー
    en: Stored Power
    fr: Force Ajoutée
    it: Veicolaforza
    de: Kraftvorrat
    es: Poder Reserva
    ko: 어시스트파워
    zh_simp: 辅助力量
    zh_trad: 輔助力量
  descriptions:
    jp_kanji: "蓄積された　パワーで　相手を\n攻撃する。自分の　能力が\nあがっているほど　威力が　あがる。"
    en: "The user attacks the target with stored power.\nThe more the user’s stats are raised, the greater\nthe move’s power."
    fr: "Le lanceur attaque l’ennemi avec une force accumulée.\nPlus les stats du lanceur sont augmentées,\nplus le coup est efficace."
    it: "Attacca il bersaglio con l’energia accumulata.\nPiù sono state aumentate le statistiche, maggiore\nè il danno inflitto."
    de: "Angriff mit angesparter Energie. Je stärker die\nStatuswerte des Anwenders erhöht wurden, desto mehr\nSchaden richtet diese Attacke an."
    es: "Acumula poder para golpear. Cuanto más suban las\ncaracterísticas del usuario, mayor será el daño."
    ko: "축적된 파워로 상대를\n공격한다. 자신의 능력이\n올라가 있는 만큼 위력이 오른다."
    zh_simp: "用蓄积起来的力量攻击对手。\n自己的能力提高得越多，\n威力就越大。"
    zh_trad: "用蓄積的力量攻擊對手。\n自己的能力提高越多，\n招式的威力越大。"
storm_throw:
  names:
    jp_kanji: やまあらし
    en: Storm Throw
    fr: Yama Arashi
    it: Tempestretta
    de: Bergsturm
    es: Llave Corsé
    ko: 업어후리기
    zh_simp: 山岚摔
    zh_trad: 山嵐摔
  descriptions:
    jp_kanji: "強烈な　一撃を\n相手に　くりだす。攻撃は\n必ず　急所に　当たる。"
    en: "The user strikes the target with a fierce blow. This\nattack always results in a critical hit."
    fr: Un coup très puissant dont l’effet est toujours critique.
    it: "Chi la usa sferra un colpo micidiale al bersaglio.\nBrutto colpo assicurato."
    de: Ein Angriff mit voller Wucht und Volltreffergarantie.
    es: "Lanza un golpe devastador. Siempre asesta un golpe\ncrítico."
    ko: "강렬한 일격을\n상대에게 날린다. 공격은\n반드시 급소에 맞는다."
    zh_simp: "向对手使出强烈的一击。\n攻击必定会击中要害。"
    zh_trad: "向對手發動強烈的一擊。\n一定會擊中要害。"
strange_steam:
  names:
    jp_kanji: ワンダースチーム
    en: Strange Steam
    fr: Vapeur Féérique
    it: Vapore Incantato
    de: Wunderdampf
    es: Cautivapor
    ko: 원더스팀
    zh_simp: 神奇蒸汽
    zh_trad: 神奇蒸汽
  descriptions:
    jp_kanji: "煙を　噴出して\n相手を　攻撃。\n混乱　させることが　ある。"
    en: "The user attacks the target by emitting steam.\nThis may also confuse the target."
    fr: "Le lanceur émet de la vapeur pour attaquer sa cible.\nPeut aussi la rendre confuse."
    it: "Chi la usa attacca il bersaglio con getti di vapore\nche possono anche confonderlo."
    de: "Der Anwender stößt Dampf aus, mit dem er das Ziel\nangreift. Dieses wird eventuell verwirrt."
    es: "Desprende un humo con el que ataca al objetivo, que\npuede acabar confundido."
    ko: "연기를 분출해서\n상대를 공격한다.\n혼란시킬 때가 있다."
    zh_simp: "喷出烟雾攻击对手。\n有时会使对手混乱。"
    zh_trad: "噴出煙霧攻擊對手。\n有時會使對手混亂。"
strength:
  names:
    jp_kanji: かいりき
    en: Strength
    fr: Force
    it: Forza
    de: Stärke
    es: Fuerza
    ko: 괴력
    zh_simp: 怪力
    zh_trad: 怪力
  descriptions:
    jp_kanji: "こん身の　力で\n相手を　なぐりつけて　攻撃する。"
    en: "The target is slugged with a punch thrown at\nmaximum power."
    fr: Le lanceur cogne l’ennemi de toutes ses forces.
    it: Colpisce il bersaglio con tutte le sue forze.
    de: Das Ziel wird extrem stark getroffen.
    es: Propina un potente puñetazo con todas sus fuerzas.
    ko: "혼신의 힘으로\n상대를 세게 때려서 공격한다."
    zh_simp: "使出浑身力气\n殴打对手进行攻击。"
    zh_trad: "使出渾身力量\n毆打對手進行攻擊。"
strength_sap:
  names:
    jp_kanji: ちからをすいとる
    en: Strength Sap
    fr: Vole-Force
    it: Assorbiforza
    de: Kraftabsorber
    es: Absorbefuerza
    ko: 힘흡수
    zh_simp: 吸取力量
    zh_trad: 吸取力量
  descriptions:
    jp_kanji: "相手の　攻撃力と　同じだけ\n自分の　ＨＰを　回復する。\nそして　相手の　攻撃を　さげる。"
    en: "The user restores its HP by the same amount as the\ntarget’s Attack stat. It also lowers the target’s\nAttack stat."
    fr: "Rend au lanceur une quantité de PV équivalente\nà la stat d’Attaque de la cible, puis baisse celle-ci."
    it: "Fa recuperare una quantità di PS pari all’Attacco\ndel bersaglio, che vedrà diminuire questa statistica."
    de: "Ein Angriff, der die KP des Anwenders um die Höhe des\nAngriffs-Werts des Zieles heilt. Anschließend wird der\nAngriff des Zieles gesenkt."
    es: "Restaura una cantidad de PS equivalente al valor de\nAtaque del rival, que además verá reducida esta\ncaracterística."
    ko: "상대 공격력과 동일하게\n자신의 HP를 회복한다.\n그리고 상대의 공격을 떨어뜨린다."
    zh_simp: "给自己回复和对手攻击力\n相同数值的ＨＰ，\n然后降低对手的攻击。"
    zh_trad: "使自己回復和對手的\n攻擊力相同的ＨＰ。\n然後降低對手的攻擊。"
string_shot:
  names:
    jp_kanji: いとをはく
    en: String Shot
    fr: Sécrétion
    it: Millebave
    de: Fadenschuss
    es: Disparo Demora
    ko: 실뿜기
    zh_simp: 吐丝
    zh_trad: 吐絲
  descriptions:
    jp_kanji: "口から　吹きだした\n糸を　まきつけて　相手の\n素早さを　がくっと　さげる。"
    en: "Opposing Pokémon are bound with silk blown from\nthe user’s mouth that harshly lowers the Speed stat."
    fr: "Le lanceur crache de la soie pour ligoter l’ennemi\net beaucoup baisser sa Vitesse."
    it: "Chi la usa produce della seta che avvolge\ni nemici intorno e ne riduce di molto la Velocità."
    de: "Umwickelt gegnerische Pokémon mit Fäden aus dem\nMund und senkt ihren Initiative-Wert."
    es: Lanza seda a los rivales y reduce mucho su Velocidad.
    ko: "입에서 뿜어낸\n실을 휘감아서 상대의\n스피드를 크게 떨어뜨린다."
    zh_simp: "用口中吐出的丝缠绕对手，\n从而大幅降低对手的速度。"
    zh_trad: "用口中吐出的絲纏繞對手，\n大幅降低對手的速度。"
struggle:
  names:
    jp_kanji: わるあがき
    en: Struggle
    fr: Lutte
    it: Scontro
    de: Verzweifler
    es: Forcejeo
    ko: 발버둥
    zh_simp: 挣扎
    zh_trad: 掙扎
  descriptions:
    jp_kanji: "自分のＰＰがなくなると\nあがいて相手を攻撃する。\n自分も少しダメージを受ける。"
    en: "This attack is used in desperation only if the user\nhas no PP. It also damages the user a little."
    fr: "Une attaque désespérée, utilisée quand le lanceur\nn’a plus de PP. Le blesse aussi légèrement."
    it: "Mossa da usare solo in caso estremo, quando non si\nhanno più PP. Danneggia un po’ anche chi la usa."
    de: "Angriff nur bei verbrauchten AP. Anwender verletzt\nsich selbst leicht."
    es: "Solo se usa como último recurso al acabarse los PP.\nHiere un poco al agresor."
    ko: "자신의 PP가 떨어지면\n발버둥 쳐 상대를 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "当自己的ＰＰ耗尽时，\n努力挣扎攻击对手。\n自己也会受到少许伤害。"
    zh_trad: "在自己的ＰＰ耗盡時，\n努力掙扎攻擊對手。\n自己也會受到少許傷害。"
struggle_bug:
  names:
    jp_kanji: むしのていこう
    en: Struggle Bug
    fr: Survinsecte
    it: Entomoblocco
    de: Käfertrutz
    es: Estoicismo
    ko: 벌레의저항
    zh_simp: 虫之抵抗
    zh_trad: 蟲之抵抗
  descriptions:
    jp_kanji: "抵抗して相手を攻撃する。\n相手の攻めの力をさげる。"
    en: "The user struggles against the target, dealing damage.\nThis also lowers the target’s offensive stats."
    fr: "Le lanceur se débat de toutes ses forces, et attaque.\nBaisse la puissance offensive de la cible."
    it: "Chi la usa attacca il bersaglio opponendo resistenza\ne riducendone la forza offensiva."
    de: "Anwender leistet Widerstand und greift an.\nSenkt die Offensivkraft des Zieles."
    es: "El usuario ofrece resistencia y ataca al rival. También\nreduce su ofensiva."
    ko: "저항해서 상대를 공격한다.\n상대의 공격력을 떨어뜨린다."
    zh_simp: "抵抗并攻击对手。\n会降低对手的进攻力。"
    zh_trad: "抵抗對手進行攻擊。\n會降低對手的進攻力。"
stuff_cheeks:
  names:
    jp_kanji: ほおばる
    en: Stuff Cheeks
    fr: Garde-à-Joues
    it: Riempiguance
    de: Backenstopfer
    es: Atiborramiento
    ko: 볼가득넣기
    zh_simp: 大快朵颐
    zh_trad: 大快朵頤
  descriptions:
    jp_kanji: "持っている　きのみを　食べて\n防御を　ぐーんと　あげる。"
    en: "The user eats its held Berry, then sharply raises its\nDefense stat."
    fr: "Le lanceur mange la Baie qu’il tient, ce qui augmente\nbeaucoup sa Défense."
    it: "Se chi la usa ha con sé una bacca, la mangia\ne la sua Difesa aumenta di molto."
    de: "Der Anwender frisst die Beere, die er trägt,\nwodurch seine Verteidigung stark erhöht wird."
    es: "El usuario ingiere la baya que lleva equipada para\naumentar mucho su Defensa."
    ko: "지니고 있는 나무열매를 먹고\n방어를 크게 올린다."
    zh_simp: "吃掉携带的树果，\n大幅提高防御。"
    zh_trad: "吃掉攜帶的樹果，\n大幅提高自己的防禦。"
stun_spore:
  names:
    jp_kanji: しびれごな
    en: Stun Spore
    fr: Para-Spore
    it: Paralizzante
    de: Stachelspore
    es: Paralizador
    ko: 저리가루
    zh_simp: 麻痹粉
    zh_trad: 麻痺粉
  descriptions:
    jp_kanji: "しびれる粉を\nたくさんふりまいて\n相手をまひ状態にする。"
    en: "The user scatters a cloud of numbing powder that\nparalyzes the target."
    fr: "Le lanceur répand sur l’ennemi une poudre\nqui le paralyse."
    it: "Investe il bersaglio con una nuvola di polvere\nche paralizza."
    de: Verstreut lähmenden Puder, der das Ziel paralysiert.
    es: Esparce polvo que paraliza al objetivo.
    ko: "저리가루를 많이 흩뿌려서\n상대를 마비 상태로 만든다."
    zh_simp: "撒出大量的麻痹粉，\n从而让对手陷入麻痹状态。"
    zh_trad: "撒出大量令人麻痺的粉末，\n讓對手陷入麻痺狀態。"
submission:
  names:
    jp_kanji: じごくぐるま
    en: Submission
    fr: Sacrifice
    it: Sottomissione
    de: Überroller
    es: Sumisión
    ko: 지옥의바퀴
    zh_simp: 深渊翻滚
    zh_trad: 地獄翻滾
  descriptions:
    jp_kanji: "地面に　自分ごと\n相手を　投げつけて　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user grabs the target and recklessly dives for\nthe ground. This also damages the user a little."
    fr: "Le lanceur agrippe l’ennemi et l’écrase au sol.\nBlesse aussi légèrement le lanceur."
    it: "Chi la usa carica il bersaglio in modo spericolato,\nma danneggia anche se stesso."
    de: "Harte Körperattacke, bei der sich der Anwender selbst\nleicht verletzt."
    es: "El usuario se lanza al suelo con el oponente en brazos y\ntambién se hace un poco de daño."
    ko: "땅에 자신과 함께\n상대를 내던져 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "将对手连同自己一起\n摔向地面进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "將對手連同自己一起\n摔向地面進行攻擊。\n自己也會受到少許傷害。"
substitute:
  names:
    jp_kanji: みがわり
    en: Substitute
    fr: Clonage
    it: Sostituto
    de: Delegator
    es: Sustituto
    ko: 대타출동
    zh_simp: 替身
    zh_trad: 替身
  descriptions:
    jp_kanji: "自分の　ＨＰを　少し　削って\n分身を　だす。\n分身は　自分の　身代わりに　なる。"
    en: "The user creates a substitute for itself using some of\nits HP. The substitute serves as the user’s decoy."
    fr: "Le lanceur crée un clone en sacrifiant quelques PV.\nCe clone sert de leurre."
    it: "Chi la usa crea una copia di se stesso usando\nalcuni PS. La copia serve come esca per il nemico."
    de: "Anwender setzt eine kleine Menge an KP ein, um einen\nDoppelgänger zu erzeugen, der für ihn Schläge\neinsteckt."
    es: "Utiliza parte de los PS propios para crear un sustituto\nque actúa como señuelo."
    ko: "자신의 HP를 조금 깎아서\n분신을 만든다.\n분신은 자신의 대타가 된다."
    zh_simp: "削减少许自己的ＨＰ，\n制造分身。\n分身将成为自己的替身。"
    zh_trad: "消耗一些自己的ＨＰ，\n製造分身。\n分身將成為自己的替身。"
subzero_slammer:physical:
  names:
    jp_kanji: レイジングジオフリーズ
    en: Subzero Slammer
    fr: Laser Cryogénique
    it: Criodistruzione Polare
    de: Tobender Geofrost
    es: Crioaliento Despiadado
    ko: 레이징지오프리즈
    zh_simp: 激狂大地万里冰
    zh_trad: 激狂大地萬里冰
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
subzero_slammer:special:
  names:
    jp_kanji: レイジングジオフリーズ
    en: Subzero Slammer
    fr: Laser Cryogénique
    it: Criodistruzione Polare
    de: Tobender Geofrost
    es: Crioaliento Despiadado
    ko: 레이징지오프리즈
    zh_simp: 激狂大地万里冰
    zh_trad: 激狂大地萬里冰
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
sucker_punch:
  names:
    jp_kanji: ふいうち
    en: Sucker Punch
    fr: Coup Bas
    it: Sbigoattacco
    de: Tiefschlag
    es: Golpe Bajo
    ko: 기습
    zh_simp: 突袭
    zh_trad: 突襲
  descriptions:
    jp_kanji: "相手より　先に　攻撃　できる。\n相手が　だす技が\n攻撃技でないと　失敗する。"
    en: "This move enables the user to attack first. This move\nfails if the target is not readying an attack."
    fr: "Permet au lanceur de frapper en priorité.\nÉchoue si l’ennemi ne prépare pas une attaque."
    it: "Chi la usa attacca con alta priorità, ma fallisce\nse il bersaglio non sta preparando un attacco."
    de: "Erstschlag-Attacke, die aber nur gelingt, wenn das Ziel\ngerade eine Attacke vorbereitet, die KP-Schaden\nzufügen würde."
    es: "Permite atacar con prioridad. Falla si el objetivo no está\npreparando ningún ataque."
    ko: "상대보다 먼저 공격할 수 있다.\n상대가 쓴 기술이\n공격기술이 아니면 실패한다."
    zh_simp: "可以比对手先攻击。\n对手使出的招式\n如果不是攻击招式则会失败。"
    zh_trad: "可以搶先對手一步進行攻擊。\n若對手使用的不是攻擊招式則會失敗。"
sunny_day:
  names:
    jp_kanji: にほんばれ
    en: Sunny Day
    fr: Zénith
    it: Giornodisole
    de: Sonnentag
    es: Día Soleado
    ko: 쾌청
    zh_simp: 大晴天
    zh_trad: 大晴天
  descriptions:
    jp_kanji: "５ターンの　間　日差しを　強くして\nほのおタイプの　威力を　あげる。\nみずタイプの　威力は　さがる。"
    en: "The user intensifies the sun for five turns, powering\nup Fire-type moves. It lowers the power of\nWater-type moves."
    fr: "Fait briller le soleil pendant cinq tours, augmentant\nla puissance des capacités de type Feu et baissant\ncelle des capacités de type Eau."
    it: "Chi la usa intensifica i raggi solari per cinque turni,\npotenziando le mosse di tipo Fuoco e riducendo\nla potenza di quelle di tipo Acqua."
    de: "Die Sonne brennt unbarmherzig fünf Runden lang.\nDadurch werden Attacken vom Typ Feuer verstärkt,\nwährend Wasser-Attacken abgeschwächt werden."
    es: "Hace que se intensifique el efecto del sol durante\ncinco turnos, lo que potencia los movimientos de tipo\nFuego y debilita los de tipo Agua."
    ko: "5턴 동안 햇살을 강하게 해서\n불꽃타입 기술의 위력을 올린다.\n물타입의 위력은 떨어진다."
    zh_simp: "在５回合内让日照变得强烈，\n从而提高火属性的招式威力。\n水属性的招式威力则降低。"
    zh_trad: "讓日照增強，在５回合內\n提高火屬性招式的威力。\n水屬性招式的威力會降低。"
sunsteel_strike:
  names:
    jp_kanji: メテオドライブ
    en: Sunsteel Strike
    fr: Choc Météore
    it: Astrocarica
    de: Stahlgestirn
    es: Meteoimpacto
    ko: 메테오드라이브
    zh_simp: 流星闪冲
    zh_trad: 流星閃衝
  descriptions:
    jp_kanji: "流星の　ような　勢いで\n突進する。　相手の　特性を\n無視して　攻撃　することが　できる。"
    en: "The user slams into the target with the force of a\nmeteor. This move can be used on the target\nregardless of its Abilities."
    fr: "Le lanceur fonce sur la cible à la vitesse d’une météorite.\nIgnore le talent de l’ennemi."
    it: "Chi la usa travolge il bersaglio con la potenza\ndi una meteora. Questo attacco ignora l’abilità\ndel bersaglio."
    de: "Der Anwender stürzt mit der Gewalt eines Meteors auf\ndas Ziel. Die Fähigkeit des Zieles wird dabei ignoriert."
    es: "Ataca al objetivo con la potencia de un meteoro,\nignorando su habilidad."
    ko: "유성 같은 기세로\n돌진한다. 상대의 특성을\n무시하고 공격할 수 있다."
    zh_simp: "以流星般的气势猛撞对手。\n可以无视对手的特性进行攻击。"
    zh_trad: "以流星般的氣勢猛撞對手。\n可不顧對手的特性進行攻擊。"
super_fang:
  names:
    jp_kanji: いかりのまえば
    en: Super Fang
    fr: Croc Fatal
    it: Superzanna
    de: Superzahn
    es: Superdiente
    ko: 분노의앞니
    zh_simp: 愤怒门牙
    zh_trad: 憤怒門牙
  descriptions:
    jp_kanji: "鋭い　前歯で\n激しく　かみついて　攻撃する。\n相手の　ＨＰは　半分に　なる。"
    en: "The user chomps hard on the target with its sharp\nfront fangs. This cuts the target’s HP in half."
    fr: "Une vilaine morsure d’incisives qui réduit de moitié\nles PV de l’ennemi."
    it: "Chi la usa salta sul bersaglio azzannandolo\ncon i suoi incisivi affilati e facendogli perdere\nmetà dei PS."
    de: "Greift mit scharfen Reißzähnen an. KP des Zieles\nwerden halbiert."
    es: "Finos colmillos que reducen a la mitad los PS del\nobjetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대의 HP는 절반이 된다."
    zh_simp: "用锋利的门牙\n猛烈地咬住对手进行攻击。\n对手的ＨＰ减半。"
    zh_trad: "用銳利的門牙\n猛烈地咬住對手進行攻擊。\n對手的ＨＰ將會減半。"
superpower:
  names:
    jp_kanji: ばかぢから
    en: Superpower
    fr: Surpuissance
    it: Troppoforte
    de: Kraftkoloss
    es: Fuerza Bruta
    ko: 엄청난힘
    zh_simp: 蛮力
    zh_trad: 蠻力
  descriptions:
    jp_kanji: "すごい　力を　発揮して\n相手を　攻撃する。自分の\n攻撃と　防御が　さがる。"
    en: "The user attacks the target with great power.\nHowever, this also lowers the user’s Attack and\nDefense stats."
    fr: "Une attaque puissante, mais qui baisse l’Attaque\net la Défense du lanceur."
    it: "Chi la usa attacca il bersaglio con grande forza,\nma il suo Attacco e la sua Difesa diminuiscono."
    de: "Starke Attacke, die jedoch auch den Angriff und die\nVerteidigung des Anwenders senkt."
    es: "Ataque de gran potencia, pero que reduce el Ataque y\nla Defensa del agresor."
    ko: "엄청난 힘을 발휘하여\n상대를 공격한다. 자신의\n공격과 방어가 떨어진다."
    zh_simp: "发挥惊人的力量攻击对手。\n自己的攻击和防御会降低。"
    zh_trad: "發揮驚人的力量攻擊對手。\n自己的攻擊和防禦會降低。"
supersonic:
  names:
    jp_kanji: ちょうおんぱ
    en: Supersonic
    fr: Ultrason
    it: Supersuono
    de: Superschall
    es: Supersónico
    ko: 초음파
    zh_simp: 超音波
    zh_trad: 超音波
  descriptions:
    jp_kanji: "特殊な　音波を\n体から　発して\n相手を　混乱させる。"
    en: "The user generates odd sound waves from its body\nthat confuse the target."
    fr: "Le lanceur produit d’étranges ondes sonores\nqui rendent la cible confuse."
    it: "Chi la usa genera dal proprio corpo strane onde\nacustiche che possono confondere il bersaglio."
    de: Ausstoß bizarrer Schallwellen. Das Ziel wird verwirrt.
    es: Raras ondas sónicas que confunden al objetivo.
    ko: "특수한 음파를\n몸에서 발산하여\n상대를 혼란시킨다."
    zh_simp: "从身体发出\n特殊的音波，\n从而使对手混乱。"
    zh_trad: "從身上發出\n特殊的音波，\n讓對手陷入混亂狀態。"
supersonic_skystrike:physical:
  names:
    jp_kanji: ファイナルダイブクラッシュ
    en: Supersonic Skystrike
    fr: Piqué Supersonique
    it: Picchiata Devastante
    de: Finaler Steilflug
    es: Picado Supersónico
    ko: 파이널다이브클래시
    zh_simp: 极速俯冲轰烈撞
    zh_trad: 極速俯衝轟烈撞
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
supersonic_skystrike:special:
  names:
    jp_kanji: ファイナルダイブクラッシュ
    en: Supersonic Skystrike
    fr: Piqué Supersonique
    it: Picchiata Devastante
    de: Finaler Steilflug
    es: Picado Supersónico
    ko: 파이널다이브클래시
    zh_simp: 极速俯冲轰烈撞
    zh_trad: 極速俯衝轟烈撞
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
surf:
  names:
    jp_kanji: なみのり
    en: Surf
    fr: Surf
    it: Surf
    de: Surfer
    es: Surf
    ko: 파도타기
    zh_simp: 冲浪
    zh_trad: 衝浪
  descriptions:
    jp_kanji: "大きな　波で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it by swamping\nits surroundings with a giant wave."
    fr: "Une énorme vague s’abat sur le champ de bataille\net inflige des dégâts à tous les Pokémon autour\ndu lanceur."
    it: "Un’onda enorme sommerge il campo di lotta,\ncolpendo tutti i Pokémon intorno a chi la scatena."
    de: "Anwender greift mit einer gewaltigen Welle\nalle Pokémon im Umkreis an."
    es: Inunda el terreno de combate con una ola gigante.
    ko: "큰 파도로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用大浪\n攻击自己周围所有的宝可梦。"
    zh_trad: "使用大浪\n攻擊自己周圍所有的寶可夢。"
surging_strikes:
  names:
    jp_kanji: すいりゅうれんだ
    en: Surging Strikes
    fr: Torrent de Coups
    it: Idroraffica
    de: Trefferschwall
    es: Azote Torrencial
    ko: 수류연타
    zh_simp: 水流连打
    zh_trad: 水流連打
  descriptions:
    jp_kanji: "みずの型を　極めし\n流れるような　３回の　連撃。\n必ず　急所に　当たる。"
    en: "The user, having mastered the Water style, strikes the\ntarget with a flowing motion three times in a row. This\nattack always results in a critical hit."
    fr: "Le lanceur assène trois coups fluides à l’ennemi.\nCette technique qui inflige toujours un coup critique\nest réservée à ceux qui maîtrisent la puissance de l’Eau."
    it: "Il Pokémon sferra una fluida serie di tre attacchi,\nmassima espressione dello stile di tipo Acqua.\nBrutto colpo assicurato."
    de: "Der Anwender hat den Stil des Wassers gemeistert und\nführt mit fließenden Bewegungen drei Angriffe in Folge\nmit Volltreffergarantie aus."
    es: "El usuario, dominador absoluto del líquido elemento,\ngolpea hasta tres veces con movimientos fluidos.\nSiempre asesta un golpe crítico."
    ko: "물의 태세가 극에 달하여\n물 흐르듯 3회의 연격을 날린다.\n반드시 급소에 맞는다."
    zh_simp: "将水之流派修炼至大成的\n仿若行云流水般的３次连击。\n必定会击中要害。"
    zh_trad: "將水之流派鍛鍊到了極致，\n猶如行雲流水的３次連擊。\n必定會擊中要害。"
swagger:
  names:
    jp_kanji: いばる
    en: Swagger
    fr: Vantardise
    it: Bullo
    de: Angeberei
    es: Contoneo
    ko: 뽐내기
    zh_simp: 虚张声势
    zh_trad: 虛張聲勢
  descriptions:
    jp_kanji: "相手を　怒らせて　混乱させる。\n怒りで　相手の　攻撃は\nぐーんと　あがってしまう。"
    en: "The user enrages and confuses the target. However,\nthis also sharply raises the target’s Attack stat."
    fr: "Fait enrager la cible et la plonge dans la confusion,\nmais augmente beaucoup son Attaque."
    it: "Chi la usa provoca il bersaglio e lo confonde,\nfacendo aumentare però di molto il suo Attacco."
    de: Verwirrt das Ziel und erhöht dessen Angriffs-Wert stark.
    es: "Provoca confusión en el objetivo, pero también sube\nmucho su Ataque."
    ko: "상대를 화내게 해서 혼란시킨다.\n분노로 상대의 공격은\n크게 올라가 버린다."
    zh_simp: "激怒对手，使其混乱。\n因为愤怒，对手的攻击\n会大幅提高。"
    zh_trad: "讓對手火大並陷入混亂。\n但對手的攻擊會因憤怒\n而大幅提高。"
swallow:
  names:
    jp_kanji: のみこむ
    en: Swallow
    fr: Avale
    it: Introenergia
    de: Verzehrer
    es: Tragar
    ko: 꿀꺽
    zh_simp: 吞下
    zh_trad: 吞下
  descriptions:
    jp_kanji: "蓄えた　力を　のみこんで\n自分の　ＨＰを　回復する。\n蓄えているほど　回復する。"
    en: "The power stored using the move Stockpile is\nabsorbed by the user to heal its HP. Storing more\npower heals more HP."
    fr: "Le lanceur absorbe la puissance accumulée\navec Stockage pour restaurer ses PV."
    it: "Chi la usa assorbe l’energia raccolta\ncon la mossa Accumulo e recupera PS.\nMaggiore è l’energia, più PS si recuperano."
    de: "Absorbiert die gehortete Kraft, um KP aufzufüllen.\nJe mehr Energie gehortet wurde, desto mehr KP\nwerden aufgefüllt."
    es: "Absorbe la energía acumulada con Reserva para\nrecobrar salud. Cuanta más se haya acumulado,\nmayor será el número de PS que se recuperen."
    ko: "비축된 힘을 삼켜서\n자신의 HP를 회복한다.\n비축된 만큼 회복한다."
    zh_simp: "将积蓄的力量吞下，\n从而回复自己的ＨＰ。\n积蓄得越多，回复越大。"
    zh_trad: "將蓄積的力量吞下，\n回復自己的ＨＰ。\n蓄積得越多，回復越多。"
sweet_kiss:
  names:
    jp_kanji: てんしのキッス
    en: Sweet Kiss
    fr: Doux Baiser
    it: Dolcebacio
    de: Bitterkuss
    es: Beso Dulce
    ko: 천사의키스
    zh_simp: 天使之吻
    zh_trad: 天使之吻
  descriptions:
    jp_kanji: "天使のように　かわいく　キスして\n相手を　混乱させる。"
    en: "The user kisses the target with a sweet, angelic\ncuteness that causes confusion."
    fr: "Le lanceur envoie un bisou si mignon et désarmant\nqu’il plonge l’ennemi dans la confusion."
    it: "Chi la usa bacia il bersaglio con una dolcezza\nangelica, confondendolo."
    de: "Anwender küsst das Ziel, das durch diese Niedlichkeit\nverwirrt wird."
    es: Da un beso con tal dulzura que causa confusión.
    ko: "천사처럼 귀엽게 키스하여\n상대를 혼란시킨다."
    zh_simp: "像天使般可爱地亲吻对手，\n从而使对手混乱。"
    zh_trad: "像天使般可愛地親吻對手，\n進而使對手混亂。"
sweet_scent:
  names:
    jp_kanji: あまいかおり
    en: Sweet Scent
    fr: Doux Parfum
    it: Profumino
    de: Lockduft
    es: Dulce Aroma
    ko: 달콤한향기
    zh_simp: 甜甜香气
    zh_trad: 甜甜香氣
  descriptions:
    jp_kanji: "香りで　相手の　回避率を\nがくっと　さげる。"
    en: "A sweet scent that harshly lowers opposing\nPokémon’s evasiveness."
    fr: "Un doux parfum qui réduit beaucoup l’Esquive\nde l’ennemi."
    it: "Un dolce profumo che riduce di molto l’elusione\ndei nemici intorno a chi la usa."
    de: "Senkt den Ausweichwert der gegnerischen Pokémon\nstark."
    es: "Un dulce aroma engatusa al objetivo, por lo que se\nreduce mucho su Evasión."
    ko: "향기로 상대의 회피율을\n크게 떨어뜨린다."
    zh_simp: 用香气大幅降低对手的闪避率。
    zh_trad: 用香氣大幅降低對手的閃避率。
swift:
  names:
    jp_kanji: スピードスター
    en: Swift
    fr: Météores
    it: Comete
    de: Sternschauer
    es: Rapidez
    ko: 스피드스타
    zh_simp: 高速星星
    zh_trad: 高速星星
  descriptions:
    jp_kanji: "星型の光を発射して\n相手を攻撃する。\n攻撃は必ず命中する。"
    en: "Star-shaped rays are shot at the target.\nThis attack never misses."
    fr: "Le lanceur envoie des rayons d’étoiles.\nTouche toujours l’ennemi."
    it: "Chi la usa colpisce i nemici intorno con raggi\na forma di stella. Questo attacco è infallibile."
    de: "Verschießt sternförmige Strahlen, die das Ziel stets\ntreffen."
    es: Lanza rayos en forma de estrella que no fallan nunca.
    ko: "별 모양의 빛을 발사해서\n상대를 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "发射星形的光攻击对手。\n攻击必定会命中。"
    zh_trad: "發射星型光線攻擊對手。\n攻擊必定會命中。"
switcheroo:
  names:
    jp_kanji: すりかえ
    en: Switcheroo
    fr: Passe-Passe
    it: Rapidscambio
    de: Wechseldich
    es: Trapicheo
    ko: 바꿔치기
    zh_simp: 掉包
    zh_trad: 掉包
  descriptions:
    jp_kanji: "目にも　とまらぬ　速さで\n自分と　相手の\n持ち物を　交換する。"
    en: "The user trades held items with the target faster\nthan the eye can follow."
    fr: "Le lanceur échange son objet avec celui de la cible\nà une vitesse que l’œil a du mal à suivre."
    it: "Chi la usa scambia lo strumento che ha con quello\ndel bersaglio a una velocità impressionante."
    de: "Anwender tauscht in Windeseile sein getragenes Item\nmit dem des Zieles."
    es: "Intercambia con el objetivo los objetos que llevan tan\nrápido que es imposible verlo a simple vista."
    ko: "눈에 보이지 않는 속도로\n자신과 상대가\n지닌 물건을 교환한다."
    zh_simp: "用一闪而过的速度\n交换自己和对手的持有物。"
    zh_trad: "以肉眼看不清的速度\n將自己和對手的持有物互相交換。"
swords_dance:
  names:
    jp_kanji: つるぎのまい
    en: Swords Dance
    fr: Danse Lames
    it: Danzaspada
    de: Schwerttanz
    es: Danza Espada
    ko: 칼춤
    zh_simp: 剑舞
    zh_trad: 劍舞
  descriptions:
    jp_kanji: "戦いの舞を激しく踊って\n自分の攻めの力をあげる。"
    en: "A frenetic dance to uplift the fighting spirit.\nThis raises the user’s offensive stats."
    fr: "Une danse frénétique qui exalte l’esprit combatif.\nAugmente la puissance offensive du lanceur."
    it: "Danza frenetica che aumenta la forza offensiva\ndi chi la usa."
    de: "Ein wilder Kampftanz, der die Offensivkraft des\nAnwenders erhöht."
    es: Baile frenético que aumenta la ofensiva del usuario.
    ko: "싸움의 춤을 격렬하게 춰서\n자신의 공격력을 올린다."
    zh_simp: "激烈地跳起战舞提高气势。\n提高自己的进攻力。"
    zh_trad: "激烈地跳起戰舞提升氣勢，\n提高自己的進攻力。"
synchronoise:
  names:
    jp_kanji: シンクロノイズ
    en: Synchronoise
    fr: Synchropeine
    it: Sincrumore
    de: Synchrolärm
    es: Sincrorruido
    ko: 싱크로노이즈
    zh_simp: 同步干扰
    zh_trad: 同步干擾
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
synthesis:
  names:
    jp_kanji: こうごうせい
    en: Synthesis
    fr: Synthèse
    it: Sintesi
    de: Synthese
    es: Síntesis
    ko: 광합성
    zh_simp: 光合作用
    zh_trad: 光合作用
  descriptions:
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP\nregained varies with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Chi la usa recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
tackle:
  names:
    jp_kanji: たいあたり
    en: Tackle
    fr: Charge
    it: Azione
    de: Tackle
    es: Placaje
    ko: 몸통박치기
    zh_simp: 撞击
    zh_trad: 撞擊
  descriptions:
    jp_kanji: "相手にむかって\n全身でぶつかっていき攻撃する。"
    en: "A physical attack in which the user charges and slams\ninto the target with its whole body."
    fr: "Le lanceur charge l’ennemi et le percute de tout\nson poids."
    it: "Attacco fisico che colpisce il bersaglio investendolo\ncon tutto il corpo."
    de: Trifft das Ziel mit vollem Körpereinsatz.
    es: Embestida con todo el cuerpo.
    ko: "상대를 향해서 몸 전체를\n부딪쳐 가며 공격한다."
    zh_simp: "用整个身体\n撞向对手进行攻击。"
    zh_trad: "用整個身體\n撞向對手進行攻擊。"
tail_glow:
  names:
    jp_kanji: ほたるび
    en: Tail Glow
    fr: Lumi-Queue
    it: Codadiluce
    de: Schweifglanz
    es: Ráfaga
    ko: 반딧불
    zh_simp: 萤火
    zh_trad: 螢火
  descriptions:
    jp_kanji: "点滅する　光を　眺めて\n自分の　精神を　統一し\n特攻を　ぐぐーんと　あげる。"
    en: "The user stares at flashing lights to focus its mind,\ndrastically raising its Sp. Atk stat."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Chi la usa fissa una luce forte per concentrarsi\ne aumentare moltissimo l’Attacco Speciale."
    de: "Ein blinkendes Licht, das den Spezial-Angriff\ndrastisch erhöht."
    es: "Se concentra en una ráfaga de luz que sube muchísimo\nel Ataque Especial."
    ko: "깜빡거리는 빛을 바라보고\n자신의 정신을 통일하여\n특수공격을 매우 크게 올린다."
    zh_simp: "凝视闪烁的光芒，\n集中自己的精神，\n从而巨幅提高特攻。"
    zh_trad: "凝視閃爍的光芒，\n集中精神，\n極大幅提高自己的特攻。"
tail_slap:
  names:
    jp_kanji: スイープビンタ
    en: Tail Slap
    fr: Plumo-Queue
    it: Spazzasberla
    de: Kehrschelle
    es: Plumerazo
    ko: 스위프뺨치기
    zh_simp: 扫尾拍打
    zh_trad: 掃尾拍打
  descriptions:
    jp_kanji: "硬い　しっぽで\n相手を　たたいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user attacks by striking the target with its hard\ntail. It hits the target two to five times in a row."
    fr: "Le lanceur frappe l’ennemi de deux à cinq fois d’affilée\navec sa queue robuste."
    it: "Chi la usa colpisce il bersaglio con la sua coda\ndura da due a cinque volte di fila."
    de: "Anwender greift das Ziel mit seiner schlagfesten Rute\nzwei- bis fünfmal hintereinander an."
    es: Golpea con la cola de dos a cinco veces seguidas.
    ko: "단단한 꼬리로\n상대를 때려서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用坚硬的尾巴\n拍打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "將堅硬的尾巴\n掃向對手進行攻擊。\n可連續攻擊２～５次。"
tail_whip:
  names:
    jp_kanji: しっぽをふる
    en: Tail Whip
    fr: Mimi-Queue
    it: Colpocoda
    de: Rutenschlag
    es: Látigo
    ko: 꼬리흔들기
    zh_simp: 摇尾巴
    zh_trad: 搖尾巴
  descriptions:
    jp_kanji: "しっぽを　左右に　かわいく　ふって\n油断を　誘う。\n相手の　防御を　さげる。"
    en: "The user wags its tail cutely, making opposing\nPokémon less wary and lowering their Defense stats."
    fr: "Le lanceur remue son adorable queue pour tromper\nla vigilance de l’ennemi et baisser sa Défense."
    it: "Chi la usa agita la coda per distrarre i nemici\nche ha intorno, riducendone la Difesa."
    de: "Der Anwender wedelt niedlich mit dem Schweif und\nveranlasst Gegner dadurch, nachlässig zu werden.\nSenkt die Verteidigung der gegnerischen Pokémon."
    es: Agita la cola para bajar la Defensa del equipo rival.
    ko: "꼬리를 좌우로 귀엽게 흔들어\n방심을 유도한다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "可爱地左右摇晃尾巴，\n诱使对手疏忽大意。\n会降低对手的防御。"
    zh_trad: "可愛地左右搖晃尾巴，\n誘使對手疏忽大意。\n可降低對手的防禦。"
tailwind:
  names:
    jp_kanji: おいかぜ
    en: Tailwind
    fr: Vent Arrière
    it: Ventoincoda
    de: Rückenwind
    es: Viento Afín
    ko: 순풍
    zh_simp: 顺风
    zh_trad: 順風
  descriptions:
    jp_kanji: "激しく　吹きあれる\n風の渦を　つくり　４ターンの　間\n味方　全員の　素早さを　あげる。"
    en: "The user whips up a turbulent whirlwind that ups\nthe Speed stats of the user and its allies for\nfour turns."
    fr: "Génère une rafale de vent qui augmente la Vitesse\ndes Pokémon de l’équipe pendant quatre tours."
    it: "Chi la usa scatena un turbine che aumenta\nla Velocità di tutti i Pokémon della squadra\nper quattro turni."
    de: "Anwender erzeugt einen Wirbelwind, der die Initiative\naller Pokémon im Team für vier Runden erhöht."
    es: "Crea un fuerte remolino que aumenta la Velocidad de\nlos Pokémon de tu equipo durante cuatro turnos."
    ko: "세차게 불어대는\n바람의 소용돌이를 만들어 4턴 동안\n같은 편 모두의 스피드를 올린다."
    zh_simp: "刮起猛烈的旋风，\n在４回合内\n提高我方全员的速度。"
    zh_trad: "刮起猛烈的強風，\n在４回合內\n提高我方全體的速度。"
take_down:
  names:
    jp_kanji: とっしん
    en: Take Down
    fr: Bélier
    it: Riduttore
    de: Bodycheck
    es: Derribo
    ko: 돌진
    zh_simp: 猛撞
    zh_trad: 猛撞
  descriptions:
    jp_kanji: "すごい　勢いで\n相手に　ぶつかって　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "A reckless, full-body charge attack for slamming into\nthe target. This also damages the user a little."
    fr: "Une charge violente qui blesse aussi légèrement\nle lanceur."
    it: "Carica spericolata con tutto il corpo contro\nil bersaglio. Danneggia un po’ anche chi la usa."
    de: "Rücksichtslose Attacke, bei der sich der Anwender\nselbst leicht verletzt."
    es: Carga desmedida que también hiere al agresor.
    ko: "굉장한 기세로\n상대에게 부딪쳐 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "以惊人的气势\n撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "以驚人的氣勢\n撞向對手進行攻擊。\n自己也會受到少許傷害。"
take_heart:
  names:
    jp_kanji: ブレイブチャージ
    en: Take Heart
    fr: Extravaillance
    it: Baldimpulso
    de: Mutschub
    es: Bálsamo Osado
    ko: 브레이브차지
    zh_simp: 勇气填充
    zh_trad: 勇氣填充
  descriptions:
    jp_kanji: "心を奮わせて自分の状態異常を治し\nさらには攻めの力　守りの力をあげる。"
    en: "The user lifts its spirits, healing its own status conditions\nand raising its offensive and defensive stats."
    fr: "Le lanceur fait preuve de bravoure pour soigner\nses altérations de statut et augmenter sa puissance\noffensive et défensive."
    it: "Chi la usa prende coraggio e guarisce dai problemi\ndi stato. Inoltre aumenta la forza offensiva e la forza\ndifensiva."
    de: "Der Anwender fasst sich ein Herz, befreit sich von\nStatusproblemen und erhöht seine Offensivkraft und\nDefensivkraft."
    es: "El usuario se envalentona y se cura de los problemas de\nestado. Además, sube su ofensiva y su defensiva."
    ko: "기운을 고조시켜서 자신의 상태 이상을 회복하고\n공격력과 방어력을 올린다."
    zh_simp: "鼓起冲劲，治愈自己的异常状态，\n同时提高自己的进攻力和防守力。"
    zh_trad: "鼓起衝勁，治癒自己的異常狀態，\n同時提高自己的進攻力和防守力。"
tar_shot:
  names:
    jp_kanji: タールショット
    en: Tar Shot
    fr: Goudronnage
    it: Colpocatrame
    de: Teerschuss
    es: Alquitranazo
    ko: 타르숏
    zh_simp: 沥青射击
    zh_trad: 瀝青射擊
  descriptions:
    jp_kanji: "ねばねばの　タールを　浴びせて\n相手の　素早さを　下げる。\n相手は　ほのおが　弱点に　なる。"
    en: "The user pours sticky tar over the target, lowering the\ntarget’s Speed stat. The target becomes weaker to\nFire-type moves."
    fr: "Le lanceur recouvre sa cible de goudron liquide\npour baisser sa Vitesse et la rendre vulnérable au feu."
    it: "Chi la usa getta catrame appiccicoso sul bersaglio\nabbassandone la Velocità e rendendolo vulnerabile\nal tipo Fuoco."
    de: "Der Anwender übergießt das Ziel mit klebrigem Teer\nund senkt so dessen Initiative. Dadurch wird es schwach\ngegenüber Feuer-Attacken."
    es: "Cubre al objetivo de un alquitrán pegajoso que reduce\nsu Velocidad y lo vuelve débil contra el fuego."
    ko: "끈적끈적한 타르를 날려서\n상대의 스피드를 떨어뜨린다.\n상대는 불꽃이 약점이 된다."
    zh_simp: "泼洒黏糊糊的沥青，\n降低对手的速度，\n并且使对手的弱点变为火。"
    zh_trad: "射出黏黏的瀝青，\n降低對手的速度。\n對手的弱點將變為火。"
taunt:
  names:
    jp_kanji: ちょうはつ
    en: Taunt
    fr: Provoc
    it: Provocazione
    de: Verhöhner
    es: Mofa
    ko: 도발
    zh_simp: 挑衅
    zh_trad: 挑釁
  descriptions:
    jp_kanji: "相手を　怒らせる。　３ターンの\n間　相手は　ダメージを\n与える　技しか　だせなくなる。"
    en: "The target is taunted into a rage that allows it to use\nonly attack moves for three turns."
    fr: "Provoque l’ennemi. L’oblige à n’utiliser que des attaques\npendant trois tours."
    it: "Provoca il bersaglio inducendolo a usare solo mosse\nd’attacco per tre turni."
    de: "Bringt das Ziel in Rage. Dieses kann über drei Runden\nhinweg nur noch angreifen."
    es: "Enfurece al objetivo para que solo use movimientos de\nataque durante tres turnos."
    ko: "상대를 화나게 한다.\n3턴 동안 상대는 데미지를\n주는 기술밖에 쓸 수 없게 된다."
    zh_simp: "使对手愤怒。\n在３回合内让对手\n只能使出给予伤害的招式。"
    zh_trad: "激怒對手。\n在３回合內讓對手\n只能使出給予傷害的招式。"
tearful_look:
  names:
    jp_kanji: なみだめ
    en: Tearful Look
    fr: Larme à l’Œil
    it: Occhionilucidi
    de: Tränendrüse
    es: Ojos Llorosos
    ko: 눈물그렁그렁
    zh_simp: 泪眼汪汪
    zh_trad: 淚眼汪汪
  descriptions:
    jp_kanji: "なみだめに　なって\n相手の　戦力を　喪失させる。\n相手の　攻撃と　特攻が　さがる。"
    en: "The user gets teary eyed to make the target lose\nits combative spirit. This lowers the target’s\nAttack and Sp. Atk stats."
    fr: "Le lanceur jette un regard plein de larmes à la cible.\nCelle-ci perd toute velléité de combat et voit\nson Attaque et son Attaque Spéciale baisser."
    it: "Chi la usa guarda il bersaglio con gli occhi pieni\ndi lacrime e gli fa perdere lo spirito combattivo,\nriducendone l’Attacco e l’Attacco Speciale."
    de: "Dem Anwender stehen Tränen in den Augen, wodurch\ndas Ziel seinen Kampfeswillen verliert. Angriff und\nSpezial-Angriff des Zieles sinken."
    es: "Mira al objetivo con ojos llorosos para hacerle perder\nsu espíritu combativo y reduce su Ataque y Ataque\nEspecial."
    ko: "눈물을 그렁그렁거려\n상대의 전의를 상실하게 한다.\n상대의 공격과 특수공격이 떨어진다."
    zh_simp: "变得泪眼汪汪，\n让对手丧失斗志。\n从而降低对手的攻击和特攻。"
    zh_trad: "變得淚眼汪汪，\n令對手喪失鬥志。\n進而降低對手的攻擊和特攻。"
teatime:
  names:
    jp_kanji: おちゃかい
    en: Teatime
    fr: Thérémonie
    it: Ora del Tè
    de: Teatime
    es: Hora del Té
    ko: 다과회
    zh_simp: 茶会
    zh_trad: 茶會
  descriptions:
    jp_kanji: "おちゃかいを　ひらいて\n場にいる　ポケモンが　それぞれ\n持っている　きのみを　食べる。"
    en: "The user has teatime with all the Pokémon in the battle.\nEach Pokémon eats its held Berry."
    fr: "Le lanceur invite tous les Pokémon sur le terrain\nà prendre le goûter autour d’une tasse de thé.\nCeux qui tiennent une Baie la mangent."
    it: "Chi la usa invita tutti i Pokémon in campo a prendere\nil tè. Quelli che hanno con sé una bacca la mangiano."
    de: "Der Anwender lädt alle am Kampf beteiligten Pokémon\nzu einem Teekränzchen ein, woraufhin diese die Beeren\nessen, die sie bei sich tragen."
    es: "El usuario invita a tomar el té a todos los presentes en\nel terreno de combate, lo que hace que ingieran las\nbayas que lleven equipadas."
    ko: "다과회를 열어서\n배틀에 나와 있는 포켓몬이\n각각 지니고 있는 나무열매를 먹는다."
    zh_simp: "举办一场茶会，\n场上的所有宝可梦都会\n吃掉自己携带的树果。"
    zh_trad: "舉辦茶會，\n在場上的寶可夢都會\n吃掉自己攜帶的樹果。"
techno_blast:
  names:
    jp_kanji: テクノバスター
    en: Techno Blast
    fr: Techno-Buster
    it: Tecnobotto
    de: Techblaster
    es: Tecno Shock
    ko: 테크노버스터
    zh_simp: 高科技光炮
    zh_trad: 高科技光炮
  descriptions:
    jp_kanji: "光弾を　相手に　放出する。\n自分の　持つ\nカセットにより　タイプが　変わる。"
    en: "The user fires a beam of light at its target. The\nmove’s type changes depending on the Drive the\nuser holds."
    fr: "Le lanceur projette un rayon lumineux sur l’ennemi.\nLe type varie selon le Module que tient le lanceur."
    it: "Chi la usa rilascia un colpo di luce contro\nil bersaglio. Il tipo varia a seconda del modulo\nche ha."
    de: "Anwender feuert ein Lichtgeschoss auf das Ziel ab.\nDer Typ der Attacke hängt von dem des Moduls ab."
    es: "Ataca al objetivo con un gran láser. El tipo del ataque\nlo determina el cartucho que porta el usuario."
    ko: "광탄을 상대에게 방출한다.\n자신이 지니고 있는\n카세트에 의해 타입이 바뀐다."
    zh_simp: "向对手放出光弹。\n属性会根据自己\n携带的卡带不同而改变。"
    zh_trad: "向對手發射光彈。\n招式的屬性會隨著自己\n攜帶的卡帶不同而改變。"
tectonic_rage:physical:
  names:
    jp_kanji: ライジングランドオーバー
    en: Tectonic Rage
    fr: Éruption Géo-Sismique
    it: Furore della Terra
    de: Seismische Eruption
    es: Barrena Telúrica
    ko: 라이징랜드오버
    zh_simp: 地隆啸天大终结
    zh_trad: 地隆嘯天大終結
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
tectonic_rage:special:
  names:
    jp_kanji: ライジングランドオーバー
    en: Tectonic Rage
    fr: Éruption Géo-Sismique
    it: Furore della Terra
    de: Seismische Eruption
    es: Barrena Telúrica
    ko: 라이징랜드오버
    zh_simp: 地隆啸天大终结
    zh_trad: 地隆嘯天大終結
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
teeter_dance:
  names:
    jp_kanji: フラフラダンス
    en: Teeter Dance
    fr: Danse Folle
    it: Strampadanza
    de: Taumeltanz
    es: Danza Caos
    ko: 흔들흔들댄스
    zh_simp: 摇晃舞
    zh_trad: 搖晃舞
  descriptions:
    jp_kanji: "フラフラと　ダンスを　おどって\n自分の　周りに　いるものを\n混乱状態に　させる。"
    en: "The user performs a wobbly dance that confuses\nthe Pokémon around it."
    fr: "Danse qui rend confus tous les Pokémon autour\ndu lanceur."
    it: "Chi la usa esegue una danza goffa che confonde\ntutti i Pokémon attorno."
    de: Ein Wackeltanz, der alle Pokémon im Umkreis verwirrt.
    es: "Danza histérica que confunde a los Pokémon que están\nalrededor del usuario."
    ko: "흔들흔들 댄스를 춰서\n주위에 있는 포켓몬을\n혼란 상태로 만든다."
    zh_simp: "摇摇晃晃地跳起舞蹈，\n让自己周围的宝可梦\n陷入混乱状态。"
    zh_trad: "搖搖晃晃地跳起舞，\n讓自己周圍的寶可夢\n陷入混亂狀態。"
telekinesis:
  names:
    jp_kanji: テレキネシス
    en: Telekinesis
    fr: Lévikinésie
    it: Telecinesi
    de: Telekinese
    es: Telequinesis
    ko: 텔레키네시스
    zh_simp: 意念移物
    zh_trad: 意念移物
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
teleport:
  names:
    jp_kanji: テレポート
    en: Teleport
    fr: Téléport
    it: Teletrasporto
    de: Teleport
    es: Teletransporte
    ko: 순간이동
    zh_simp: 瞬间移动
    zh_trad: 瞬間移動
  descriptions:
    jp_kanji: "自分のポケモンがほかにいるときに\n使うと交代する。\n野生のポケモンは離脱する。"
    en: "The user switches places with a party Pokémon in\nwaiting, if there is any able to battle. If a wild Pokémon\nuses this move, it flees."
    fr: "Permet de changer de place avec un autre Pokémon\nsi vous en avez d’autres. Quand cette capacité est\nutilisée par un Pokémon sauvage, celui-ci fuit le combat."
    it: "Chi la usa viene sostituito se ci sono altri Pokémon in\nsquadra. Se un Pokémon selvatico usa questa mossa,\nse la dà a gambe."
    de: "Hat man bei Einsatz ein weiteres Pokémon bei sich, wird\nder Anwender ausgewechselt. Setzen wilde Pokémon die\nAttacke ein, ergreifen diese die Flucht."
    es: "Permite al usuario cambiarse por otro Pokémon del\nequipo, si es posible. Si un Pokémon salvaje usa este\nmovimiento, huye del combate."
    ko: "자신에게 다른 포켓몬이 있을 때\n사용하면 다른 포켓몬과 교체한다.\n야생 포켓몬이 사용하면 배틀에서 이탈한다."
    zh_simp: "当自己有其他宝可梦时使用\n就可以进行替换。\n野生的宝可梦则会脱离战斗。"
    zh_trad: "在自己有其他寶可夢時使用，\n可進行替換。\n野生寶可夢則會脫離戰鬥。"
terrain_pulse:
  names:
    jp_kanji: だいちのはどう
    en: Terrain Pulse
    fr: Champlification
    it: Campopulsar
    de: Feldimpuls
    es: Pulso de Campo
    ko: 대지의파동
    zh_simp: 大地波动
    zh_trad: 大地波動
  descriptions:
    jp_kanji: "フィールドの力を　借りて　攻撃。\n使った時の　フィールドの状態に　よって\n技の　タイプと　威力が　変わる。"
    en: "The user utilizes the power of the terrain to attack.\nThis move’s type and power changes depending on\nthe terrain when it’s used."
    fr: "Une attaque qui tire sa force des champs.\nSon type et sa puissance varient selon le champ actif."
    it: "Chi la usa attacca sfruttando l’energia del terreno\ndi lotta. Il tipo e la potenza della mossa variano\na seconda dello stato del terreno stesso."
    de: "Der Anwender nutzt die Kraft des aktiven Feldes für\nseinen Angriff. Der Typ und die Stärke der Attacke\nändern sich je nach Art des aktiven Feldes."
    es: "El usuario ataca aprovechando la energía del campo\nactivo, que determina tanto el tipo como la potencia\ndel movimiento."
    ko: "필드의 힘을 빌려서 공격한다.\n사용했을 때의 필드 상태에 따라서\n기술 타입과 위력이 바뀐다."
    zh_simp: "借助场地的力量进行攻击。\n视使出招式时场地状态不同，\n招式的属性和威力会有所变化。"
    zh_trad: "藉助場地的力量進行攻擊。\n視使出招式時場地狀態不同，\n招式的屬性和威力會有所變化。"
thief:
  names:
    jp_kanji: どろぼう
    en: Thief
    fr: Larcin
    it: Furto
    de: Raub
    es: Ladrón
    ko: 도둑질
    zh_simp: 小偷
    zh_trad: 小偷
  descriptions:
    jp_kanji: "攻撃と　同時に　道具を　盗む。\n自分が　道具を　持っている　場合は\n盗めない。"
    en: "The user attacks and steals the target’s held item\nsimultaneously. The user can’t steal anything if it\nalready holds an item."
    fr: "Le lanceur attaque la cible et vole son objet.\nLe lanceur ne peut rien voler s’il tient déjà un objet."
    it: "Chi la usa attacca il bersaglio e può rubargli\nlo strumento, se non ne ha già uno."
    de: "Ermöglicht es, das Item des Zieles zu stehlen, solang\nder Anwender selbst keins bei sich trägt."
    es: "El agresor ataca y le quita el objeto al objetivo siempre\ny cuando no lleve ninguno."
    ko: "공격과 동시에 도구를 훔친다.\n자신이 도구를 지니고 있을 경우에는\n훔칠 수 없다."
    zh_simp: "攻击的同时盗取道具。\n当自己携带道具时，\n不会去盗取。"
    zh_trad: "在攻擊的同時偷取道具。\n當寶可夢自己有攜帶道具時，\n則無法偷取。"
thousand_arrows:
  names:
    jp_kanji: サウザンアロー
    en: Thousand Arrows
    fr: Myria-Flèches
    it: Mille Frecce
    de: Tausend Pfeile
    es: Mil Flechas
    ko: 사우전드애로
    zh_simp: 千箭齐发
    zh_trad: 千箭齊發
  descriptions:
    jp_kanji: "浮いている　ポケモンにも　当たる。\n浮いていた　相手は\n撃ち落とされて　地面に　落ちる。"
    en: "This move also hits opposing Pokémon that are in\nthe air. Those Pokémon are knocked down to\nthe ground."
    fr: "Touche même les Pokémon dans les airs.\nDans ce cas, la cible retombe au sol."
    it: "Colpisce i nemici intorno scaraventando\na terra quelli che si trovano in aria."
    de: "Die Attacke erfasst auch fliegende und schwebende\nPokémon. Werden sie getroffen, fallen sie zu Boden."
    es: "Acierta incluso a Pokémon que estén en el aire y los\nhace caer al suelo."
    ko: "떠 있는 포켓몬도 맞힐 수 있다.\n떠 있던 상대는\n맞아서 땅에 떨어진다."
    zh_simp: "可以击中浮在空中的宝可梦。\n空中的对手被击落后，\n会掉到地面。"
    zh_trad: "能夠命中飄浮在空中的寶可夢。\n飄浮在空中的對手\n會被擊落掉到地面。"
thousand_waves:
  names:
    jp_kanji: サウザンウェーブ
    en: Thousand Waves
    fr: Myria-Vagues
    it: Mille Onde
    de: Tausend Wellen
    es: Mil Temblores
    ko: 사우전드웨이브
    zh_simp: 千波激荡
    zh_trad: 千波激盪
  descriptions:
    jp_kanji: "地をはう　波によって　攻撃。\n波に　巻き込まれた　相手は\n戦闘から　逃げられなくなる。"
    en: "The user attacks with a wave that crawls along\nthe ground. Those it hits can’t flee from battle."
    fr: "Attaque avec des vagues glissant au sol.\nL’ennemi pris dedans ne peut pas s’échapper."
    it: "Un’onda strisciante investe i nemici intorno\nimpedendo loro di fuggire."
    de: "Der Anwender greift mit einer Welle an, die dicht über\ndem Boden verläuft und alle Pokémon, die sie erfasst,\nan der Flucht hindert."
    es: "El usuario genera ondas sísmicas que se propagan por\nel suelo y sacuden a los oponentes. Los Pokémon\nalcanzados no podrán huir del combate."
    ko: "땅 위를 뻗어 나가는 파도로 공격한다.\n파도에 휩쓸린 상대는\n전투에서 도망칠 수 없게 된다."
    zh_simp: "从地面掀起波浪进行攻击。\n被掀入波浪中的对手，\n将无法从战斗中逃走。"
    zh_trad: "化成波浪從地面進行攻擊。\n被捲入波浪中的對手\n將無法從戰鬥中逃走。"
thrash:
  names:
    jp_kanji: あばれる
    en: Thrash
    fr: Mania
    it: Colpo
    de: Fuchtler
    es: Golpe
    ko: 난동부리기
    zh_simp: 大闹一番
    zh_trad: 大鬧一番
  descriptions:
    jp_kanji: "２ー３ターンの　間\n暴れまくって　相手を　攻撃する。\n暴れたあとは　混乱する。"
    en: "The user rampages and attacks for two to three\nturns. The user then becomes confused."
    fr: "Une attaque furieuse qui dure de deux à trois tours.\nLe lanceur devient confus."
    it: "Assale e attacca il nemico per due o tre turni,\nma confonde chi la usa."
    de: "Attacke über zwei bis drei Runden, die den Anwender\ndanach verwirrt."
    es: "Ataque de dos a tres turnos que acaba confundiendo\nal agresor."
    ko: "2~3턴 동안\n마구 난동 부려서 상대를 공격한다.\n난동 부린 뒤에는 혼란에 빠진다."
    zh_simp: "在２～３回合内，\n乱打一气地攻击对手。\n大闹一番后自己会陷入混乱。"
    zh_trad: "在２～３回合內\n瘋狂亂打對手進行攻擊。\n大鬧一番後自己會陷入混亂。"
throat_chop:
  names:
    jp_kanji: じごくづき
    en: Throat Chop
    fr: Exécu-Son
    it: Colpo Infernale
    de: Neck Strike
    es: Golpe Mordaza
    ko: 지옥찌르기
    zh_simp: 深渊突刺
    zh_trad: 地獄突刺
  descriptions:
    jp_kanji: "この　技を　受けた　相手は\n地獄の　苦しみから　２ターンの間\n音の　技を　出すことが　できなくなる。"
    en: "The user attacks the target’s throat, and the\nresultant suffering prevents the target from using\nmoves that emit sound for two turns."
    fr: "Inflige une douleur tellement violente à la cible\nqu’elle ne peut plus émettre de sons pendant deux tours."
    it: "Chi viene colpito da questa mossa prova un\ndolore lancinante e non può più usare mosse\nbasate sul suono per due turni."
    de: "Das Pokémon, das von dieser Attacke getroffen wird,\nerleidet starke Schmerzen und kann deswegen zwei\nRunden lang keine Lärm-Attacken mehr einsetzen."
    es: "Inflige al rival un dolor tan abrumador que le impide\nutilizar durante dos turnos ataques que se sirven del\nsonido."
    ko: "이 기술에 맞은 상대는\n지옥의 고통 때문에 2턴 동안\n소리 기술을 낼 수 없다."
    zh_simp: "受到此招式攻击的对手，\n会因为深渊般的痛苦，在２回合内，\n变得无法使出声音类招式。"
    zh_trad: "受到此招式攻擊的對手，\n會因為地獄般的痛苦，在２回合內\n無法使用會發出聲音的招式。"
thunder:
  names:
    jp_kanji: かみなり
    en: Thunder
    fr: Fatal-Foudre
    it: Tuono
    de: Donner
    es: Trueno
    ko: 번개
    zh_simp: 打雷
    zh_trad: 打雷
  descriptions:
    jp_kanji: "激しい雷を\n落として攻撃する。\n相手をまひ状態にすることもある。"
    en: "A wicked thunderbolt is dropped on the target to inflict\ndamage. This may also leave the target with paralysis."
    fr: "La foudre tombe violemment sur l’ennemi.\nPeut aussi le paralyser."
    it: "Colpisce il bersaglio con un fulmine molto violento\nche può anche paralizzarlo."
    de: "Eine verheerende Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Un poderoso rayo que daña al objetivo y puede\nparalizarlo."
    ko: "강한 번개를 떨어뜨려 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "向对手劈下暴雷进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "劈下暴雷進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
thunder_cage:
  names:
    jp_kanji: サンダープリズン
    en: Thunder Cage
    fr: Voltageôle
    it: Elettrogabbia
    de: Blitzgefängnis
    es: Electrojaula
    ko: 썬더프리즌
    zh_simp: 雷电囚笼
    zh_trad: 雷電囚籠
  descriptions:
    jp_kanji: "ほとばしる　電気の　おりの　中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target in a cage of sparking\nelectricity for four to five turns."
    fr: "Le lanceur frappe l’ennemi, et le piège dans une prison\nélectrique qui dure de quatre à cinq tours."
    it: "Il Pokémon attacca il bersaglio imprigionandolo\nin una gabbia di elettricità, che sprigiona corrente\nper quattro o cinque turni."
    de: "Das Ziel wird für vier bis fünf Runden in einem\nelektrischen Käfig gefangen."
    es: "El objetivo queda atrapado en una jaula electrificada\nque permanece en el terreno de cuatro a cinco turnos."
    ko: "전기가 흐르는 우리 안에\n4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n电流四溅的囚笼中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n電流奔竄的電牢中，\n在４～５回合內進行攻擊。"
thunder_fang:
  names:
    jp_kanji: かみなりのキバ
    en: Thunder Fang
    fr: Crocs Éclair
    it: Fulmindenti
    de: Donnerzahn
    es: Colmillo Rayo
    ko: 번개엄니
    zh_simp: 雷电牙
    zh_trad: 雷電牙
  descriptions:
    jp_kanji: "電気をためたキバでかみついて\n相手をまひ状態にすることもある。"
    en: "The user bites the target with electrified fangs to deal\ndamage. This may also leave the target with paralysis."
    fr: "Le lanceur inflige une morsure électrifiée.\nPeut aussi paralyser la cible."
    it: "Chi la usa morde con denti elettrificati che possono\nanche paralizzare il bersaglio."
    de: "Anwender beißt mit elektrifizierten Reißzähnen zu.\nZiel wird eventuell paralysiert."
    es: "El usuario muerde al objetivo con colmillos\nelectrificados que pueden paralizarlo."
    ko: "전기를 모은 이빨로 물어서\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "用蓄满电流的牙齿咬住对手。\n有时会使对手陷入麻痹状态。"
    zh_trad: "用蓄滿電流的牙齒咬住對手。\n有時還會讓對手陷入麻痺狀態。"
thunder_punch:
  names:
    jp_kanji: かみなりパンチ
    en: Thunder Punch
    fr: Poing Éclair
    it: Tuonopugno
    de: Donnerschlag
    es: Puño Trueno
    ko: 번개펀치
    zh_simp: 雷电拳
    zh_trad: 雷電拳
  descriptions:
    jp_kanji: "電撃をこめたパンチで攻撃して\n相手をまひ状態にすることもある。"
    en: "The target is punched with an electrified fist.\nThis may also leave the target with paralysis."
    fr: "Le lanceur attaque l’ennemi d’un coup de poing\nélectrique. Peut aussi le paralyser."
    it: "Chi la usa attacca con un pugno elettrico che può anche\nparalizzare il bersaglio."
    de: Ein elektrischer Schlag, der das Ziel eventuell paralysiert.
    es: Puñetazo eléctrico que puede paralizar al objetivo.
    ko: "전격을 담은 펀치로 공격하여\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "用充满电流的拳头攻击对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用帶有電流的拳頭攻擊對手。\n有時還會讓對手陷入麻痺狀態。"
thunder_shock:
  names:
    jp_kanji: でんきショック
    en: Thunder Shock
    fr: Éclair
    it: Tuonoshock
    de: Donnerschock
    es: Impactrueno
    ko: 전기쇼크
    zh_simp: 电击
    zh_trad: 電擊
  descriptions:
    jp_kanji: "電気の刺激を\n浴びせて攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks the target with a jolt of electricity.\nThis may also leave the target with paralysis."
    fr: "Une décharge électrique tombe sur l’ennemi.\nPeut aussi le paralyser."
    it: "Colpisce il bersaglio con una scarica elettrica che può\nanche paralizzarlo."
    de: Eine Elektro-Attacke, die das Ziel eventuell paralysiert.
    es: Ataque eléctrico que puede paralizar al objetivo.
    ko: "전기 자극을 날려서 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "发出电流刺激对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "發出電流刺激對手進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
thunder_wave:
  names:
    jp_kanji: でんじは
    en: Thunder Wave
    fr: Cage Éclair
    it: Tuononda
    de: Donnerwelle
    es: Onda Trueno
    ko: 전기자석파
    zh_simp: 电磁波
    zh_trad: 電磁波
  descriptions:
    jp_kanji: "弱い電撃を浴びせることで\n相手をまひ状態にする。"
    en: "The user launches a weak jolt of electricity that\nparalyzes the target."
    fr: "Un faible choc électrique frappe l’ennemi.\nParalyse la cible."
    it: "Colpisce il bersaglio con una debole scarica\nelettrica che lo paralizza."
    de: Ein schwacher Stromstoß, der das Ziel paralysiert.
    es: "Una ligera descarga que paraliza al objetivo si lo\nalcanza."
    ko: "약한 전격을 날려서\n상대를 마비 상태로 만든다."
    zh_simp: "向对手发出微弱的电击，\n从而让对手陷入麻痹状态。"
    zh_trad: "放出微弱的電流。\n讓對手陷入麻痺狀態。"
thunderbolt:
  names:
    jp_kanji: １０まんボルト
    en: Thunderbolt
    fr: Tonnerre
    it: Fulmine
    de: Donnerblitz
    es: Rayo
    ko: 10만볼트
    zh_simp: 十万伏特
    zh_trad: 十萬伏特
  descriptions:
    jp_kanji: "強い電撃を\n浴びせて攻撃する。\n相手をまひ状態にすることもある。"
    en: "The user attacks the target with a strong electric blast.\nThis may also leave the target with paralysis."
    fr: "Une grosse décharge électrique tombe sur l’ennemi.\nPeut aussi le paralyser."
    it: "Colpisce il bersaglio con una potente scarica elettrica\nche può anche paralizzarlo."
    de: "Eine starke Elektro-Attacke, die das Ziel eventuell\nparalysiert."
    es: "Potente ataque eléctrico que puede paralizar al\nobjetivo."
    ko: "강한 전격을 날려서 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "向对手发出\n强力电击进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手放出強力電流進行攻擊。\n有時還會讓對手陷入麻痺狀態。"
thunderous_kick:
  names:
    jp_kanji: らいめいげり
    en: Thunderous Kick
    fr: Coup Fulgurant
    it: Calcio Tonante
    de: Donnernder Tritt
    es: Patada Relámpago
    ko: 천둥차기
    zh_simp: 雷鸣蹴击
    zh_trad: 雷鳴蹴擊
  descriptions:
    jp_kanji: "雷の　ような　動きで\n相手を　翻弄しながら　キックする。\n相手の　防御を　さげる。"
    en: "The user overwhelms the target with lightning-like\nmovement before delivering a kick. This also lowers\nthe target’s Defense stat."
    fr: "Le lanceur assène un coup de pied à la cible\nà la vitesse de l’éclair. Baisse aussi la Défense\nde la cible."
    it: "Il Pokémon sferra calci al bersaglio dopo averlo\ndistratto con movimenti fulminei, riducendone\nla Difesa."
    de: "Der Anwender bringt das Ziel mit blitzschnellen\nBewegungen durcheinander und tritt dann zu.\nSenkt die Verteidigung des Zieles."
    es: "El usuario desconcierta al rival con movimientos\ncentelleantes y le propina una patada. Baja la Defensa\ndel objetivo."
    ko: "번개 같은 움직임으로\n상대를 농락하며 킥을 날린다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "以雷电般的动作\n戏耍对手的同时使出脚踢。\n可降低对手的防御。"
    zh_trad: "以雷電般的動作\n一邊戲弄對手一邊使出踢擊。\n可降低對手的防禦。"
tickle:
  names:
    jp_kanji: くすぐる
    en: Tickle
    fr: Chatouille
    it: Solletico
    de: Spaßkanone
    es: Cosquillas
    ko: 간지르기
    zh_simp: 挠痒
    zh_trad: 搔癢
  descriptions:
    jp_kanji: "体を　くすぐり　笑わせる　ことで\n相手の　攻撃と　防御を　さげる。"
    en: "The user tickles the target into laughing, reducing its\nAttack and Defense stats."
    fr: "Le lanceur chatouille l’ennemi, ce qui baisse\nson Attaque et sa Défense."
    it: "Chi la usa solletica il bersaglio e lo fa ridere,\nriducendo il suo Attacco e la sua Difesa."
    de: "Bringt das Ziel zum Lachen und senkt dadurch dessen\nAngriff und Verteidigung."
    es: Hace reír al objetivo para bajar su Ataque y Defensa.
    ko: "몸을 간질여 웃게 만들어서\n상대의 공격과 방어를 떨어뜨린다."
    zh_simp: "给对手挠痒，使其发笑，\n从而降低对手的攻击和防御。"
    zh_trad: "搔癢對手的身體，讓對手發笑，\n降低對手的攻擊和防禦。"
topsy_turvy:
  names:
    jp_kanji: ひっくりかえす
    en: Topsy-Turvy
    fr: Renversement
    it: Sottosopra
    de: Invertigo
    es: Reversión
    ko: 뒤집어엎기
    zh_simp: 颠倒
    zh_trad: 顛倒
  descriptions:
    jp_kanji: "相手に　かかっている\nすべての　能力変化を\nひっくり返して　逆にする。"
    en: "All stat changes affecting the target turn\ntopsy-turvy and become the opposite of what\nthey were."
    fr: Inverse tous les changements de stats de la cible.
    it: "Inverte tutte le modifiche alle statistiche\ndel Pokémon bersaglio."
    de: Invertiert alle Statusveränderungen des Zieles.
    es: "Invierte por completo los cambios en las características\ndel objetivo."
    ko: "상대에게 걸려 있는\n모든 능력 변화를\n뒤집어서 반대로 만든다."
    zh_simp: "颠倒对手身上的\n所有能力变化，\n变成和原来相反的状态。"
    zh_trad: "讓對手身上所有的\n能力變化顛倒過來，\n變成和原來相反的狀態。"
torment:
  names:
    jp_kanji: いちゃもん
    en: Torment
    fr: Tourmente
    it: Attaccalite
    de: Folterknecht
    es: Tormento
    ko: 트집
    zh_simp: 无理取闹
    zh_trad: 無理取鬧
  descriptions:
    jp_kanji: "相手に　いちゃもんを　つけて\n同じ　技を　２回連続で\nだせなくする。"
    en: "The user torments and enrages the target, making it\nincapable of using the same move twice in a row."
    fr: "Le lanceur irrite l’ennemi pour l’empêcher d’utiliser\nla même capacité deux fois de suite."
    it: "Chi la usa tormenta e fa infuriare il bersaglio,\nimpedendogli di usare la stessa mossa\ndue volte di seguito."
    de: "Erzürnt das Ziel, um wiederholten Einsatz derselben\nAttacke zu verhindern."
    es: "Atormenta y enfurece al objetivo, que no puede usar\ndos veces seguidas el mismo movimiento."
    ko: "상대에게 트집을 잡아서\n똑같은 기술을 2회 연속으로\n쓸 수 없게 한다."
    zh_simp: "向对手无理取闹，\n令其不能连续２次\n使出相同招式。"
    zh_trad: "無理取鬧，\n讓對手不能連續２次\n使出相同招式。"
toxic:
  names:
    jp_kanji: どくどく
    en: Toxic
    fr: Toxik
    it: Tossina
    de: Toxin
    es: Tóxico
    ko: 맹독
    zh_simp: 剧毒
    zh_trad: 劇毒
  descriptions:
    jp_kanji: "相手を　猛毒の　状態に　する。\nターンが　すすむほど\n毒の　ダメージが　増えていく。"
    en: "A move that leaves the target badly poisoned.\nIts poison damage worsens every turn."
    fr: "Empoisonne gravement l’ennemi.\nLes dégâts dus au poison augmentent à chaque tour."
    it: "Iperavvelena il bersaglio con una potente tossina.\nIl danno peggiora a ogni turno."
    de: "Vergiftet das Ziel mit einem potenten Toxin schwer.\nDie Vergiftung wird von Runde zu Runde stärker."
    es: "Envenena gravemente al objetivo y causa un daño\nmayor en cada turno."
    ko: "상대를 맹독의 상태로 만든다.\n턴이 진행될수록\n독의 데미지가 증가한다."
    zh_simp: "让对手陷入剧毒状态。\n随着回合的推进，\n中毒伤害会增加。"
    zh_trad: "讓對手陷入劇毒狀態。\n中毒傷害會隨著\n回合的進行而增加。"
toxic_spikes:
  names:
    jp_kanji: どくびし
    en: Toxic Spikes
    fr: Pics Toxik
    it: Fielepunte
    de: Giftspitzen
    es: Púas Tóxicas
    ko: 독압정
    zh_simp: 毒菱
    zh_trad: 毒菱
  descriptions:
    jp_kanji: "相手の　足下に　どくびしを\nしかける。　交代で　でてきた　相手の\nポケモンに　毒を　おわせる。"
    en: "The user lays a trap of poison spikes at the feet of\nthe opposing team. The spikes will poison opposing\nPokémon that switch into battle."
    fr: "Lance des pics autour de l’ennemi.\nIls empoisonnent les ennemis qui entrent au combat."
    it: "Chi la usa piazza una trappola di punte che\navvelenano i nemici che scendono in campo."
    de: "Anwender legt eine Falle mit Giftdornen aus. In den\nKampf eingewechselte gegnerische Pokémon werden\nvergiftet."
    es: "Lanza una trampa de púas tóxicas a los pies del\nobjetivo. El veneno afecta a los Pokémon oponentes\nque entran en combate."
    ko: "상대의 발밑에 독 압정을\n뿌린다. 교체로 나온 상대\n포켓몬에게 독을 퍼지게 한다."
    zh_simp: "在对手的脚下撒毒菱。\n使对手替换出场的宝可梦中毒。"
    zh_trad: "在對手腳下散布毒菱。\n讓對手替換出場的寶可夢\n陷入中毒狀態。"
toxic_thread:
  names:
    jp_kanji: どくのいと
    en: Toxic Thread
    fr: Fil Toxique
    it: Velenotela
    de: Giftfaden
    es: Hilo Venenoso
    ko: 독실
    zh_simp: 毒丝
    zh_trad: 毒絲
  descriptions:
    jp_kanji: "毒の　混じった　糸を　吹き付ける。\n相手を　毒にして\n素早さを　さげる。"
    en: "The user shoots poisonous threads to poison the\ntarget and lower the target’s Speed stat."
    fr: "Tisse un fil imprégné de venin. Empoisonne la cible\net baisse sa Vitesse."
    it: "Avvelena il bersaglio avvolgendolo con filamenti\ntossici e ne riduce la Velocità."
    de: "Der Anwender schießt giftige Fäden auf das Ziel,\ndas dadurch vergiftet wird. Außerdem sinkt seine\nInitiative."
    es: "Ataca al oponente con hilillos venenosos que reducen\nsu Velocidad y lo envenenan."
    ko: "독이 섞인 실을 뿜어낸다.\n상대를 독 상태로 만들고\n스피드를 떨어뜨린다."
    zh_simp: "将混有毒的丝吐向对手。\n使其中毒，\n从而降低对手的速度。"
    zh_trad: "將混有毒的絲吐向對手。\n使其中毒，\n進而降低對手的速度。"
transform:
  names:
    jp_kanji: へんしん
    en: Transform
    fr: Morphing
    it: Trasformazione
    de: Wandler
    es: Transformación
    ko: 변신
    zh_simp: 变身
    zh_trad: 變身
  descriptions:
    jp_kanji: "相手の　ポケモンに　変身することで\n相手と　まったく\n同じ　技が　使える。"
    en: "The user transforms into a copy of the target right\ndown to having the same move set."
    fr: "Le lanceur devient une copie de sa cible et obtient\nla même palette de capacités."
    it: "Chi la usa si trasforma in una copia esatta\ndel bersaglio per sfruttarne le mosse."
    de: "Anwender verwandelt sich in ein Abbild des Zieles und\nkann so auf die gleichen Attacken zugreifen."
    es: "El usuario se transforma en una copia del objetivo, con\nlos mismos movimientos."
    ko: "상대 포켓몬으로 변신하여\n상대와 완전히 똑같은\n기술을 사용할 수 있다."
    zh_simp: "变身成对手宝可梦的样子，\n能够使用和对手\n完全相同的招式。"
    zh_trad: "變身成對手寶可夢的樣子，\n能夠使用和對手\n完全相同的招式。"
tri_attack:
  names:
    jp_kanji: トライアタック
    en: Tri Attack
    fr: Triplattaque
    it: Tripletta
    de: Triplette
    es: Triataque
    ko: 트라이어택
    zh_simp: 三重攻击
    zh_trad: 三重攻擊
  descriptions:
    jp_kanji: "３つの光線で攻撃する。\nまひか　やけどか　しもやけ状態の\nどれかにすることがある。"
    en: "The user strikes with a simultaneous three-beam attack.\nThis may also leave the target with a burn, paralysis,\nor frostbite."
    fr: "Le lanceur envoie trois boules d’énergie simultanément.\nPeut aussi paralyser, brûler ou geler la cible."
    it: "Colpisce il bersaglio con tre raggi di luce che possono\nparalizzarlo, scottarlo o assiderarlo."
    de: "Feuert drei Strahlen ab. Verursacht beim Ziel eventuell\nParalyse, Verbrennungen oder Frostbrand."
    es: "Ataque triple que puede paralizar, quemar o helar al\nobjetivo."
    ko: "3개의 광선으로 공격한다.\n마비, 화상 또는 동상 상태 중\n어느 하나로 만들 때가 있다."
    zh_simp: "用３种光线进行攻击。\n有时会让对手陷入\n麻痹、灼伤或冻伤的状态。"
    zh_trad: "用３種光線進行攻擊。\n有時會讓對手陷入\n麻痺、灼傷或凍傷的狀態。"
trick:
  names:
    jp_kanji: トリック
    en: Trick
    fr: Tour de Magie
    it: Raggiro
    de: Trickbetrug
    es: Truco
    ko: 트릭
    zh_simp: 戏法
    zh_trad: 戲法
  descriptions:
    jp_kanji: "相手の　すきを　ついて\n自分と　相手の\n持ち物を　交換する。"
    en: "The user catches the target off guard and swaps its\nheld item with its own."
    fr: "Le lanceur prend la cible au dépourvu et l’oblige\nà échanger son objet contre le sien."
    it: "Chi la usa coglie il bersaglio in contropiede e lo obbliga\na scambiare il suo strumento con il proprio."
    de: "Der Anwender überrumpelt das Ziel und tauscht mit\nihm die getragenen Items."
    es: Engaña al objetivo desprevenido e intercambia objetos.
    ko: "상대의 빈틈을 노려\n자신과 상대가 지닌 물건을\n바꿔치기한다."
    zh_simp: "抓住对手的空隙，\n交换自己和对手的持有物。"
    zh_trad: "在對手露出空隙時，\n趁機交換自己和對手的持有物。"
trick_or_treat:
  names:
    jp_kanji: ハロウィン
    en: Trick-or-Treat
    fr: Halloween
    it: Halloween
    de: Halloween
    es: Halloween
    ko: 핼러윈
    zh_simp: 万圣夜
    zh_trad: 萬聖夜
  descriptions:
    jp_kanji: "相手を　ハロウィンに　誘う。\n相手の　タイプに\nゴーストタイプが　追加される。"
    en: "The user takes the target trick-or-treating.\nThis adds Ghost type to the target’s type."
    fr: "Insuffle à la cible l’esprit d’Halloween, et ajoute le type\nSpectre à ses types actuels."
    it: "Il bersaglio viene invitato a festeggiare Halloween\ne aggiunge così al proprio tipo anche il tipo\nSpettro."
    de: "Der Anwender lehrt das Ziel das Fürchten. Dieses\nnimmt dadurch zusätzlich den Typ Geist an."
    es: "Invita al objetivo a celebrar Halloween, lo que añade\nel tipo Fantasma a los tipos de este."
    ko: "상대를 핼러윈으로 초대한다.\n상대 타입에\n고스트타입이 추가된다."
    zh_simp: "邀请对手参加万圣夜。\n使对手被追加幽灵属性。"
    zh_trad: "邀請對手參加萬聖夜。\n讓對手追加幽靈屬性。"
trick_room:
  names:
    jp_kanji: トリックルーム
    en: Trick Room
    fr: Distorsion
    it: Distortozona
    de: Bizarroraum
    es: Espacio Raro
    ko: 트릭룸
    zh_simp: 戏法空间
    zh_trad: 戲法空間
  descriptions:
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの　間\n遅い　ポケモンから　行動できる。"
    en: "The user creates a bizarre area in which slower\nPokémon get to move first for five turns."
    fr: "Le lanceur crée une zone mystérieuse où les Pokémon\nles plus lents frappent en priorité pendant cinq tours."
    it: "Chi la usa crea una dimensione in cui i Pokémon\npiù lenti agiscono per primi per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem\nlangsame Pokémon fünf Runden lang zuerst agieren."
    es: "Crea un espacio extraño en el que los Pokémon lentos\nse mueven primero durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 느린 포켓몬부터\n행동할 수 있다."
    zh_simp: "制造出离奇的空间。\n在５回合内\n速度慢的宝可梦可以先行动。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，\n速度慢的寶可夢可以先行動。"
triple_arrows:
  names:
    jp_kanji: ３ぼんのや
    en: Triple Arrows
    fr: Triple Flèche
    it: Triplodardo
    de: Drillingspfeile
    es: Triple Flecha
    ko: 3연화살
    zh_simp: 三连箭
    zh_trad: 三連箭
  descriptions:
    jp_kanji: "かかと落としのあと３本の矢を同時に放つ。\n自分の攻撃が急所に当たりやすくなる。\n相手の守りの力をさげる。"
    en: "The user delivers an axe kick, then fires three arrows.\nThis raises the chance of its future attacks landing critical\nhits and also lowers the target’s defensive stats."
    fr: "Le lanceur frappe du talon et tire trois flèches\nsimultanément. Augmente son taux de critiques.\nBaisse la puissance défensive de l’ennemi."
    it: "Chi la usa sferra un calcio discendente, poi scocca tre\ndardi insieme e rende più probabili i propri brutti colpi.\nInoltre, riduce la forza difensiva del bersaglio."
    de: "Der Anwender tritt zu und schießt drei Pfeile ab.\nSeine Volltrefferquote steigt dadurch. Senkt die\nDefensivkraft des Zieles."
    es: "Asesta un talonazo y lanza tres flechas. Aumenta sus\nposibilidades de dar un golpe crítico y baja la defensiva\ndel objetivo."
    ko: "발뒤꿈치로 찍은 뒤 3개의 화살을 동시에 발사한다.\n자신의 공격이 급소에 맞기 쉬워진다.\n상대의 방어력을 떨어뜨린다."
    zh_simp: "使出一记下压踢后同时发射３箭。\n自己的攻击会变得容易击中要害。\n会降低对手的防守力。"
    zh_trad: "使出一記下壓踢後同時發射３箭。\n自己的攻擊會變得容易擊中要害。\n會降低對手的防守力。"
triple_axel:
  names:
    jp_kanji: トリプルアクセル
    en: Triple Axel
    fr: Triple Axel
    it: Triplo Axel
    de: Dreifach-Axel
    es: Triple Axel
    ko: 트리플악셀
    zh_simp: 三旋击
    zh_trad: 三旋擊
  descriptions:
    jp_kanji: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    en: "A consecutive three-kick attack that becomes more\npowerful with each successful hit."
    fr: "Une salve composée de un à trois coups de pied\ndont la puissance augmente à chaque coup porté."
    it: "Chi la usa sferra fino a tre calci consecutivi\nla cui potenza aumenta a ogni colpo."
    de: "Tritt das Ziel ein- bis dreimal nacheinander. Die Härte\nder Tritte nimmt von Treffer zu Treffer zu."
    es: Patea hasta tres veces seguidas y cada vez más fuerte.
    ko: "3회 연속으로 킥을 날려\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "连续３次踢对手进行攻击。\n每踢中一次，威力就会提高。"
    zh_trad: "連續踢對手３次進行攻擊。\n每踢中一次，威力就會提高。"
triple_kick:
  names:
    jp_kanji: トリプルキック
    en: Triple Kick
    fr: Triple Pied
    it: Triplocalcio
    de: Dreifachkick
    es: Triple Patada
    ko: 트리플킥
    zh_simp: 三连踢
    zh_trad: 三連踢
  descriptions:
    jp_kanji: "３回連続で　キックを　くりだして\n攻撃する。　技が　当たるたびに\n威力は　あがる。"
    en: "A consecutive three-kick attack that becomes more\npowerful with each successful hit."
    fr: "Une salve composée de un à trois coups de pied\ndont la puissance augmente à chaque coup porté."
    it: "Chi la usa sferra fino a tre calci consecutivi\nla cui potenza aumenta a ogni colpo."
    de: "Tritt das Ziel ein- bis dreimal nacheinander. Die Härte\nder Tritte nimmt von Treffer zu Treffer zu."
    es: Patea hasta tres veces seguidas y cada vez más fuerte.
    ko: "3회 연속으로 킥을 날려\n공격한다. 기술이 맞을 때마다\n위력이 올라간다."
    zh_simp: "连续３次踢对手进行攻击。\n每踢中一次，威力就会提高。"
    zh_trad: "連續踢對手３次進行攻擊。\n每踢中一次，威力就會提高。"
trop_kick:
  names:
    jp_kanji: トロピカルキック
    en: Trop Kick
    fr: Botte Sucrette
    it: Tropicalcio
    de: Tropenkick
    es: Patada Tropical
    ko: 트로피컬킥
    zh_simp: 热带踢
    zh_trad: 熱帶踢
  descriptions:
    jp_kanji: "南国　由来の　熱い\nキックを　相手に　浴びせる。\n相手の　攻撃を　さげる。"
    en: "The user lands an intense kick of tropical origins on\nthe target. This also lowers the target’s Attack stat."
    fr: "Un coup de pied chaud comme les tropiques qui inflige\ndes dégâts à la cible et baisse son Attaque."
    it: "Chi la usa colpisce il bersaglio con un potente calcio\nsfruttando una tecnica originaria dei paesi tropicali\ne ne riduce l’Attacco."
    de: "Der Anwender greift das Ziel mit einem heftigen\nTritt tropischer Herkunft an. Dabei sinkt auch der\nAngriffs-Wert des Zieles."
    es: "Lanza una patada con la fuerza del trópico que golpea\nal rival y reduce su Ataque."
    ko: "남쪽 나라에서 유래된\n뜨거운 킥을 상대에게 날린다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "向对手使出来自南国的火热脚踢。\n从而降低对手的攻击。"
    zh_trad: "向對手使出來自南國的火熱腳踢。\n進而降低對手的攻擊。"
trump_card:
  names:
    jp_kanji: きりふだ
    en: Trump Card
    fr: Atout
    it: Asso
    de: Trumpfkarte
    es: As Oculto
    ko: 마지막수단
    zh_simp: 王牌
    zh_trad: 王牌
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
