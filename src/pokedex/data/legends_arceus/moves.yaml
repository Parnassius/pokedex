    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
ceaseless_edge:
  names:
    jp_kanji: ひけん・ちえなみ
    en: Ceaseless Edge
    fr: Vagues à Lames
    it: Lama Milleflutti
    de: Klingenschwall
    es: Tajo Metralla
    ko: 비검천중파
    zh_simp: 秘剑・千重涛
    zh_trad: 秘劍・千重濤
  descriptions:
    jp_kanji: "貝殻の剣によって急所を狙って攻撃する。\nばらまかれた貝殻の破片によって\n相手に数回ダメージを与える。"
    en: "The user slashes its shell blade at the target, aiming to\nland a critical hit. Shell splinters left behind by this attack\nwill continue to damage the target for several turns."
    fr: "Des lames de coquillages entaillent l’ennemi en visant\nses points faibles. Les débris de coquillages disséminés\ninfligent des dégâts à la cible à plusieurs reprises."
    it: "Chi la usa attacca il bersaglio con la spada conchiglia,\nmirando a un brutto colpo. I frammenti di conchiglie\nnei dintorni infliggono ripetutamente danni al bersaglio."
    de: "Der Anwender greift die Schwachstelle des Zieles mit\neiner klingengleichen Muschelschale an. Dieses nimmt\ndurch verstreute Muschelsplitter wiederholt Schaden."
    es: "Ataca al punto débil del rival con una espada de\nconchas, que deja fragmentos que dañan al objetivo\nvarias veces."
    ko: "조개껍질 검으로 급소를 노려 공격한다.\n흩어진 조개껍질 파편으로\n상대에게 여러 번 데미지를 준다."
    zh_simp: "用贝壳之剑瞄准要害进行攻击。\n散落的贝壳碎片\n可给予对手数次伤害。"
    zh_trad: "用貝殼之劍瞄準要害進行攻擊。\n散落的貝殼碎片\n可給予對手數次傷害。"
celebrate:
  names:
    jp_kanji: おいわい
    en: Celebrate
    fr: Célébration
    it: Auguri
    de: Ehrentag
    es: Celebración
    ko: 축하
    zh_simp: 庆祝
    zh_trad: 慶祝
  descriptions:
    jp_kanji: "ポケモンが　とっても\nハッピーな　あなたのことを\nお祝い　してくれる。"
    en: The Pokémon congratulates you on your special day!
    fr: "Le Pokémon vous souhaite plein de bonnes choses\npour cet évènement spécial."
    it: Il Pokémon ti fa gli auguri nel tuo giorno speciale.
    de: Das Pokémon gratuliert dir zu deinem Geburtstag!
    es: El Pokémon te felicita en un día muy especial para ti.
    ko: "포켓몬이 매우\n행복한 당신을\n축하해 준다."
    zh_simp: "宝可梦为十分\n开心的你庆祝。"
    zh_trad: "寶可夢會為了\n非常開心的你而慶祝。"
charge:
  names:
    jp_kanji: じゅうでん
    en: Charge
    fr: Chargeur
    it: Sottocarica
    de: Ladevorgang
    es: Carga
    ko: 충전
    zh_simp: 充电
    zh_trad: 充電
  descriptions:
    jp_kanji: "次の　ターンに　だす　でんきタイプの\n技の　威力を　あげる。\n自分の　特防も　あがる。"
    en: "The user boosts the power of the Electric move it\nuses on the next turn. This also raises the user’s\nSp. Def stat."
    fr: "Le lanceur concentre sa puissance pour sa prochaine\nattaque Électrik. Augmente sa Défense Spéciale."
    it: "Potenzia la mossa di tipo Elettro usata subito\ndopo. Aumenta anche la Difesa Speciale\ndi chi la usa."
    de: "Hebt die Stärke für die kommende Elektro-Attacke\nan und erhöht die Spezial-Verteidigung."
    es: "Recarga energía para potenciar el siguiente movimiento\nde tipo Eléctrico. También sube la Defensa Especial."
    ko: "다음 턴에 쓸 전기타입\n기술의 위력을 올린다.\n자신의 특수방어도 올라간다."
    zh_simp: "提高下一回合使出的\n电属性的招式威力。\n自己的特防也会提高。"
    zh_trad: "提高下一回合使出的\n電屬性招式威力。\n也會提高自己的特防。"
charge_beam:
  names:
    jp_kanji: チャージビーム
    en: Charge Beam
    fr: Rayon Chargé
    it: Raggioscossa
    de: Ladestrahl
    es: Rayo Carga
    ko: 차지빔
    zh_simp: 充电光束
    zh_trad: 充電光束
  descriptions:
    jp_kanji: "電撃の束を相手に発射する。\n電気をためて\n自分の攻めの力をあげることもある。"
    en: "The user attacks the target with an electric charge.\nThe leftover electricity may also raise the user’s\noffensive stats."
    fr: "Le lanceur tire un rayon chargé d’électricité.\nL’électricité emmagasinée peut aussi augmenter\nla puissance offensive du lanceur."
    it: "Chi la usa lancia un fascio di elettricità molto intensa\nche può anche aumentare la sua forza offensiva."
    de: "Ziel wird von einem Elektrostrahl getroffen.\nErhöht eventuell die Offensivkraft des Anwenders."
    es: "Lanza un rayo eléctrico contra el objetivo. Puede subir\nla ofensiva del usuario."
    ko: "전격의 다발을 상대에게 발사한다.\n전기를 모아서\n자신의 공격력을 올릴 때가 있다."
    zh_simp: "向对手发射电击光束。\n由于蓄满电流，\n有时会提高自己的进攻力。"
    zh_trad: "向對手發射電擊光束。\n藉由蓄積電流，\n有時還會提高自己的進攻力。"
charm:
  names:
    jp_kanji: あまえる
    en: Charm
    fr: Charme
    it: Fascino
    de: Charme
    es: Encanto
    ko: 애교부리기
    zh_simp: 撒娇
    zh_trad: 撒嬌
  descriptions:
    jp_kanji: "かわいく　みつめて　油断を　誘い\n相手の　攻撃を　がくっと　さげる。"
    en: "The user gazes at the target rather charmingly,\nmaking it less wary. This harshly lowers the target’s\nAttack stat."
    fr: "Le lanceur fait les yeux doux pour berner l’ennemi\net beaucoup réduire son Attaque."
    it: "Ammalia il bersaglio con lo sguardo per renderlo\nmeno cauto. Ne riduce molto l’Attacco."
    de: Betört das Ziel und reduziert dessen Angriffs-Wert stark.
    es: Engatusa al objetivo y reduce mucho su Ataque.
    ko: "귀엽게 바라보고 방심을 유도하여\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "可爱地凝视，\n诱使对手疏忽大意，\n从而大幅降低对手的攻击。"
    zh_trad: "用撒嬌的眼神\n誘使對手疏忽大意，\n大幅降低對手的攻擊。"
chatter:
  names:
    jp_kanji: おしゃべり
    en: Chatter
    fr: Babil
    it: Schiamazzo
    de: Geschwätz
    es: Cháchara
    ko: 수다
    zh_simp: 喋喋不休
    zh_trad: 喋喋不休
  descriptions:
    jp_kanji: "とても　うるさい　おしゃべりの\n音波で　相手を　攻撃する。\n相手を　混乱させる。"
    en: "The user attacks the target with sound waves of\ndeafening chatter. This confuses the target."
    fr: "Attaque avec les ondes sonores assourdissantes\nqu’il émet en bavardant. Rend l’ennemi confus."
    it: "Chi la usa attacca creando un’onda sonora\ndi parole a vanvera e confonde il bersaglio."
    de: "Der Anwender labert das Ziel zu und greift es mit den\ndadurch entstehenden Schallwellen an, wodurch das\nZiel verwirrt wird."
    es: "Ataca con una onda de sonido muy ruidosa compuesta\npor palabras y confunde al objetivo."
    ko: "매우 시끄럽고 수다스러운\n음파로 상대를 공격한다.\n상대를 혼란시킨다."
    zh_simp: "用非常烦人的，\n喋喋不休的音波攻击对手。\n使对手混乱。"
    zh_trad: "用非常煩人且喋喋不休的\n音波攻擊對手。\n使對手混亂。"
chip_away:
  names:
    jp_kanji: なしくずし
    en: Chip Away
    fr: Attrition
    it: Insidia
    de: Zermürben
    es: Guardia Baja
    ko: 야금야금
    zh_simp: 逐步击破
    zh_trad: 逐步擊破
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
chloroblast:
  names:
    jp_kanji: クロロブラスト
    en: Chloroblast
    fr: Herblast
    it: Clorofillaser
    de: Chlorostrahl
    es: Clorofiláser
    ko: 클로로블라스트
    zh_simp: 叶绿爆震
    zh_trad: 葉綠爆震
  descriptions:
    jp_kanji: "葉緑素を集約して放ち攻撃する。\n自分もダメージを受けるし\n行動順が遅くなる。"
    en: "The user launches its amassed chlorophyll to inflict\ndamage on the target. This also damages the user\nand lowers the user’s action speed."
    fr: "Le lanceur tire un concentré de chlorophylle sur\nl’ennemi. Blesse aussi le lanceur, et recule sa position\ndans l’ordre d’action."
    it: "Chi la usa attacca concentrando della clorofilla per poi\nlanciarla, ma subisce danni e il suo ordine delle azioni\nrallenta."
    de: "Der Anwender greift mit einer hohen Konzentration von\nChlorophyll an, wobei er selbst Schaden erleidet.\nDanach kommt er langsamer wieder zum Zug."
    es: "Concentra clorofila y la dispara en forma de rayo, el\ncual hiere al usuario y hace que sus turnos tarden más\nen llegar."
    ko: "엽록소를 모은 뒤 발사하여 공격한다.\n자신도 데미지를 입는다.\n자신의 행동 순서가 늦어진다."
    zh_simp: "将叶绿素凝聚起来后放出去进行攻击。\n自己也会受到伤害，\n且会让自己的行动顺序延后。"
    zh_trad: "將葉綠素凝聚起來後放出去進行攻擊。\n自己也會受到傷害，\n且會讓自己的行動順序延後。"
circle_throw:
  names:
    jp_kanji: ともえなげ
    en: Circle Throw
    fr: Projection
    it: Ribaltiro
    de: Überkopfwurf
    es: Llave Giro
    ko: 배대뒤치기
    zh_simp: 巴投
    zh_trad: 巴投
  descriptions:
    jp_kanji: "相手を　投げとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is thrown, and a different Pokémon is\ndragged out. In the wild, this ends a battle against\na single Pokémon."
    fr: "Projette le Pokémon ennemi et le remplace par un autre.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il bersaglio è scaraventato via ed è costretto\na lasciare il posto a un altro. Mette fine alle lotte\ncontro singoli Pokémon selvatici."
    de: "Schleudert das Ziel davon und bewirkt damit, dass ein\nanderes Pokémon eingewechselt wird. Beendet Kämpfe\ngegen wilde Pokémon."
    es: "Lanza por los aires al objetivo y hace que salga otro\nPokémon. Si es uno salvaje, acaba el combate."
    ko: "상대를 내던져서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "扔飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "摔飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
clamp:
  names:
    jp_kanji: からではさむ
    en: Clamp
    fr: Claquoir
    it: Tenaglia
    de: Schnapper
    es: Tenaza
    ko: 껍질끼우기
    zh_simp: 贝壳夹击
    zh_trad: 貝殼夾擊
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
clanging_scales:
  names:
    jp_kanji: スケイルノイズ
    en: Clanging Scales
    fr: Vibrécaille
    it: Clamorsquame
    de: Schuppenrasseln
    es: Fragor Escamas
    ko: 스케일노이즈
    zh_simp: 鳞片噪音
    zh_trad: 鱗片噪音
  descriptions:
    jp_kanji: "全身の　うろこを　こすり\n大きな　音を　出して　攻撃する。\n攻撃後　自分の　防御が　さがる。"
    en: "The user rubs the scales on its entire body and makes\na huge noise to attack opposing Pokémon.\nThe user’s Defense stat goes down after the attack."
    fr: "Le lanceur déclenche un vacarme en frottant\nses écailles les unes contre les autres pour attaquer.\nBaisse la Défense du lanceur."
    it: "Chi la usa attacca il bersaglio con un suono\nfortissimo che genera sfregando le scaglie del corpo.\nDopo aver attaccato, la sua Difesa diminuisce."
    de: "Der Anwender erzeugt durch das Rasseln mit seinen\nSchuppen ein lautes Geräusch und greift gegnerische\nPokémon an. Anschließend sinkt seine Verteidigung."
    es: "Frota todas las escamas de su cuerpo para crear un\nfuerte sonido con el que ataca. Cuando el ataque\ntermina, su Defensa se ve reducida."
    ko: "전신의 비늘을 비벼서\n큰 소리를 내 공격한다.\n공격 후 자신의 방어가 떨어진다."
    zh_simp: "摩擦全身鳞片，\n发出响亮的声音进行攻击。\n攻击后自己的防御会降低。"
    zh_trad: "摩擦全身鱗片，\n發出響亮的聲音並進行攻擊。\n攻擊後自己的防禦會降低。"
clangorous_soul:
  names:
    jp_kanji: ソウルビート
    en: Clangorous Soul
    fr: Dracacophonie
    it: Dracofonia
    de: Seelentanz
    es: Estruendo Escama
    ko: 소울비트
    zh_simp: 魂舞烈音爆
    zh_trad: 魂舞烈音爆
  descriptions:
    jp_kanji: "自分の　ＨＰを　少し　削って\nすべての　能力を　上げる。"
    en: The user raises all its stats by using some of its HP.
    fr: "Le lanceur sacrifie une partie de ses PV\npour augmenter toutes ses stats."
    it: "Chi la usa sacrifica un po’ dei suoi PS per aumentare\ntutte le sue statistiche."
    de: "Der Anwender setzt eine kleine Menge an KP ein,\num alle seine Statuswerte zu erhöhen."
    es: "Utiliza parte de los PS propios para subir sus\ncaracterísticas."
    ko: "자신의 HP를 조금 깎아서\n모든 능력을 올린다."
    zh_simp: "削减少许自己的ＨＰ，\n使所有能力都提高。"
    zh_trad: "消耗一些自己的ＨＰ，\n提高自己的所有能力。"
clangorous_soulblaze:
  names:
    jp_kanji: ブレイジングソウルビート
    en: Clangorous Soulblaze
    fr: Dracacophonie Flamboyante
    it: Dracofonia Divampante
    de: Rasselnder Seelentanz
    es: Estruendo Implacable
    ko: 브레이징소울비트
    zh_simp: 炽魂热舞烈音爆
    zh_trad: 熾魂熱舞烈音爆
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
clear_smog:
  names:
    jp_kanji: クリアスモッグ
    en: Clear Smog
    fr: Bain de Smog
    it: Pulifumo
    de: Klärsmog
    es: Niebla Clara
    ko: 클리어스모그
    zh_simp: 清除之烟
    zh_trad: 清除之煙
  descriptions:
    jp_kanji: "特殊な　泥の　塊を\n相手に　投げつけて　攻撃する。\n能力変化を　もとに　もどす。"
    en: "The user attacks the target by throwing a clump of\nspecial mud. All stat changes are returned to normal."
    fr: "Le lanceur jette un tas de détritus spéciaux sur la cible.\nLes changements de stats de la cible sont annulés."
    it: "Attacca il bersaglio lanciandogli contro una nuvola\ndi fumo speciale, che annulla ogni modifica\nalle statistiche."
    de: "Anwender greift das Ziel mit spezialgefertigtem Smog\nan. Setzt dessen Statusveränderungen zurück."
    es: "Ataca al objetivo con una singular bola de lodo que\nelimina cualquier cambio en sus características."
    ko: "특수한 진흙 덩어리를\n상대에게 내던져서 공격한다.\n능력 변화를 원래대로 돌린다."
    zh_simp: "向对手投掷\n特殊的泥块进行攻击。\n使其能力变回原点。"
    zh_trad: "向對手投擲特殊的泥塊進行攻擊。\n能讓對手的能力變化\n回復到初始狀態。"
close_combat:
  names:
    jp_kanji: インファイト
    en: Close Combat
    fr: Close Combat
    it: Zuffa
    de: Nahkampf
    es: A Bocajarro
    ko: 인파이트
    zh_simp: 近身战
    zh_trad: 近身戰
  descriptions:
    jp_kanji: "守りを捨てて\n相手の　ふところに突撃する。\n自分の守りの力がさがる。"
    en: "The user fights the target up close, inflicting damage\nwithout guarding itself. This also lowers the user’s\ndefensive stats."
    fr: "Le lanceur combat au corps à corps sans se protéger.\nBaisse aussi sa puissance défensive."
    it: "Chi la usa attacca abbassando la guardia.\nLa propria forza difensiva si riduce."
    de: "Nahkampf-Attacke ohne Rücksicht auf Verluste.\nSenkt die Defensivkraft des Anwenders."
    es: "Lucha abiertamente contra el objetivo sin protegerse.\nReduce la defensiva del usuario."
    ko: "방어를 포기하고\n상대 쪽으로 깊숙이 돌격한다.\n자신의 방어력이 떨어진다."
    zh_simp: "放弃守护，\n向对手的怀里突击。\n自己的防守力会降低。"
    zh_trad: "反守為攻，近身突擊對手。\n會降低自己的防守力。"
coaching:
  names:
    jp_kanji: コーチング
    en: Coaching
    fr: Coaching
    it: Coaching
    de: Coaching
    es: Motivación
    ko: 코칭
    zh_simp: 指导
    zh_trad: 指導
  descriptions:
    jp_kanji: "的確な　指導を　おこなうことで　\n味方　全員の\n攻撃と　防御を　上げる。"
    en: "The user properly coaches its ally Pokémon,\nboosting their Attack and Defense stats."
    fr: "Le lanceur coache ses alliés, augmentant ainsi\nleur Attaque et leur Défense."
    it: "Chi la usa aumenta l’Attacco e la Difesa di tutti\ngli alleati dando loro indicazioni precise."
    de: "Der Anwender sorgt durch geschickte Anweisungen\ndafür, dass der Angriff und die Verteidigung seiner\nMitstreiter steigen."
    es: "El usuario imparte indicaciones precisas a sus aliados,\nque ven aumentados su Ataque y su Defensa."
    ko: "적절한 지도를 통해서\n같은 편 전원의\n공격과 방어를 올린다."
    zh_simp: "通过进行正确合理的指导，\n提高我方全员的攻击和防御。"
    zh_trad: "透過適切的指導，\n提高我方全體的攻擊和防禦。"
coil:
  names:
    jp_kanji: とぐろをまく
    en: Coil
    fr: Enroulement
    it: Arrotola
    de: Einrollen
    es: Enrosque
    ko: 똬리틀기
    zh_simp: 盘蜷
    zh_trad: 盤蜷
  descriptions:
    jp_kanji: "とぐろを　まいて　集中する。\n自分の　攻撃と　防御と\n命中率を　あげる。"
    en: "The user coils up and concentrates. This raises its\nAttack and Defense stats as well as its accuracy."
    fr: "Le lanceur s’enroule sur lui-même et se concentre.\nSon Attaque, sa Défense et sa Précision augmentent."
    it: "Chi la usa si concentra aumentando Attacco,\nDifesa e precisione."
    de: "Anwender rollt sich zusammen und sammelt sich. Dabei\nwerden Angriff, Verteidigung und Genauigkeit erhöht."
    es: "El usuario se concentra, lo que le permite aumentar\nsu Ataque, Defensa y Precisión."
    ko: "똬리를 틀어서 집중한다.\n자신의 공격과 방어,\n명중률을 올린다."
    zh_simp: "盘蜷着集中精神。\n提高自己的攻击、防御和命中率。"
    zh_trad: "盤蜷身體集中精神。\n可提高自己的攻擊、防禦和命中率。"
comet_punch:
  names:
    jp_kanji: れんぞくパンチ
    en: Comet Punch
    fr: Poing Comète
    it: Cometapugno
    de: Kometenhieb
    es: Puño Cometa
    ko: 연속펀치
    zh_simp: 连续拳
    zh_trad: 連續拳
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
confide:
  names:
    jp_kanji: ないしょばなし
    en: Confide
    fr: Confidence
    it: Confidenza
    de: Vertrauenssache
    es: Confidencia
    ko: 비밀이야기
    zh_simp: 密语
    zh_trad: 密語
  descriptions:
    jp_kanji: "ないしょばなしを　することで　相手の\n集中力を　失わせ\n相手の　特攻を　さげる。"
    en: "The user tells the target a secret, and the target\nloses its ability to concentrate. This lowers\nthe target’s Sp. Atk stat."
    fr: "Dévoile des secrets à l’ennemi, qui perd alors\nsa concentration et voit son Attaque Spéciale diminuer."
    it: "Chi la usa svela dei segreti al bersaglio,\ndistraendolo e riducendone l’Attacco Speciale."
    de: "Der Anwender vertraut dem Ziel ein Geheimnis an\nund stört auf diese Weise dessen Konzentration.\nDer Spezial-Angriff des Zieles sinkt."
    es: "Hace que el objetivo pierda la concentración\ncontándole un secreto. Disminuye el Ataque\nEspecial del oponente."
    ko: "비밀 이야기를 해서\n상대의 집중력을 잃게 하여\n특수공격을 떨어뜨린다."
    zh_simp: "和对手进行密语，\n使其失去集中力，\n从而降低对手的特攻。"
    zh_trad: "向對手低聲密語，\n使對手失去集中力，\n降低對手的特攻。"
confuse_ray:
  names:
    jp_kanji: あやしいひかり
    en: Confuse Ray
    fr: Onde Folie
    it: Stordiraggio
    de: Konfusstrahl
    es: Rayo Confuso
    ko: 이상한빛
    zh_simp: 奇异之光
    zh_trad: 奇異之光
  descriptions:
    jp_kanji: "怪しい　光を\n相手に　みせて　まどわせる。\n相手を　混乱させる。"
    en: "The target is exposed to a sinister ray that\ntriggers confusion."
    fr: "Un rayon sinistre qui plonge l’ennemi dans un état\nde confusion."
    it: "Colpisce il bersaglio con un raggio funesto\nche lo confonde."
    de: Ein fieser Strahl, der das Ziel verwirrt.
    es: Rayo siniestro que confunde al objetivo.
    ko: "이상한 빛을\n상대에게 비춰 당황하게 한다.\n상대를 혼란시킨다."
    zh_simp: "显示奇怪的光，\n扰乱对手。\n使对手混乱。"
    zh_trad: "讓對手看奇怪的光線\n擾亂對手。\n使對手混亂。"
confusion:
  names:
    jp_kanji: ねんりき
    en: Confusion
    fr: Choc Mental
    it: Confusione
    de: Konfusion
    es: Confusión
    ko: 염동력
    zh_simp: 念力
    zh_trad: 念力
  descriptions:
    jp_kanji: "弱い念力を\n相手に送って攻撃する。"
    en: "The target is hit with a weak telekinetic force to\ninflict damage."
    fr: Une faible vague télékinétique frappe l’ennemi.
    it: Colpisce il bersaglio con una leggera forza telecinetica.
    de: "Das Ziel wird von schwacher telekinetischer Energie\ngetroffen."
    es: Débil ataque telequinético.
    ko: "약한 염동력을\n상대에게 보내어 공격한다."
    zh_simp: "向对手发送\n微弱的念力进行攻击。"
    zh_trad: "向對手發送\n微弱的念力進行攻擊。"
constrict:
  names:
    jp_kanji: からみつく
    en: Constrict
    fr: Constriction
    it: Limitazione
    de: Umklammerung
    es: Restricción
    ko: 휘감기
    zh_simp: 缠绕
    zh_trad: 纏繞
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
