venom_drench:
  names:
    jp_kanji: ベノムトラップ
    en: Venom Drench
    fr: Piège de Venin
    it: Velenotrappola
    de: Giftfalle
    es: Trampa Venenosa
    ko: 베놈트랩
    zh_simp: 毒液陷阱
    zh_trad: 毒液陷阱
  descriptions:
    jp_kanji: "特殊な　毒液を　浴びせかける。\n毒状態の　相手は\n攻撃　特攻　素早さが　さがる。"
    en: "Opposing Pokémon are drenched in an odd\npoisonous liquid. This lowers the Attack, Sp. Atk, and\nSpeed stats of a poisoned target."
    fr: "Sécrète un liquide empoisonné.\nDiminue l’Attaque, l’Attaque Spéciale et la Vitesse\nde l’ennemi empoisonné."
    it: "Emette un liquido particolare che riduce\nl’Attacco, l’Attacco Speciale e la Velocità\ndei nemici avvelenati intorno a chi la usa."
    de: "Anwender bespritzt das Ziel mit einer speziellen\nGiftflüssigkeit. Senkt den Angriff, den Spezial-Angriff\nund die Initiative von vergifteten Zielen."
    es: "Impregna a su objetivo con un líquido venenoso que\ndisminuye el Ataque, el Ataque Especial y la Velocidad.\nSolo afecta a Pokémon ya envenenados."
    ko: "특수한 독액을 끼얹는다.\n독 상태인 상대는\n공격, 특수공격, 스피드가 떨어진다."
    zh_simp: "将特殊的毒液泼向对手。\n对处于中毒状态的对手，\n其攻击、特攻和速度都会降低。"
    zh_trad: "向對手發射特殊的毒液。\n陷入中毒狀態的對手\n攻擊、特攻和速度會降低。"
venoshock:
  names:
    jp_kanji: ベノムショック
    en: Venoshock
    fr: Choc Venin
    it: Velenoshock
    de: Giftschock
    es: Carga Tóxica
    ko: 베놈쇼크
    zh_simp: 毒液冲击
    zh_trad: 毒液衝擊
  descriptions:
    jp_kanji: "特殊な毒液を浴びせかける。\n相手が状態異常の場合\n威力は２倍になる。"
    en: "The user drenches the target in a special poisonous\nliquid to inflict damage. This move’s power is doubled\nif the target has a status condition."
    fr: "Le lanceur arrose l’ennemi d’un poison spécial.\nL’effet est doublé si la cible souffre déjà d’une\naltération de statut."
    it: "Lancia uno speciale liquido tossico sul bersaglio.\nSe questi è avvelenato, il danno provocato raddoppia."
    de: "Überschüttet das Ziel mit einer speziellen toxischen\nFlüssigkeit. Doppelt so stark gegen Ziele mit einem\nStatusproblem."
    es: "Cubre al objetivo con un líquido venenoso. El daño\nserá doble si este ya sufre un problema de estado."
    ko: "특수한 독액을 끼얹는다.\n상대가 상태 이상인 경우\n위력이 2배가 된다."
    zh_simp: "将特殊的毒液泼向对手。\n攻击处于异常状态的对手时，\n威力会变成２倍。"
    zh_trad: "將特殊的毒液潑向對手。\n攻擊處於異常狀態的對手時，\n威力會變成２倍。"
victory_dance:
  names:
    jp_kanji: しょうりのまい
    en: Victory Dance
    fr: Danse Victoire
    it: Danzavittoria
    de: Siegestanz
    es: Danza Triunfal
    ko: 승리의춤
    zh_simp: 胜利之舞
    zh_trad: 勝利之舞
  descriptions:
    jp_kanji: "勝利を呼びこむ踊りによって\n自分の攻めの力　守りの力をあげる。\n技で与えるダメージが１．５倍になる。"
    en: "The user performs a dance to usher in victory. This raises\nthe user’s offensive and defensive stats and increases the\ndamage dealt by the user’s moves by 50 percent."
    fr: "Le lanceur danse pour invoquer la victoire. Augmente\nla puissance offensive et la puissance défensive du\nlanceur et multiplie par 1,5 les dégâts des capacités."
    it: "Chi la usa si lancia in una danza per invocare la vittoria\ne far aumentare i danni inflitti del 50%. Inoltre, la sua\nforza offensiva e la sua forza difensiva aumentano."
    de: "Ein Tanz, der den Sieg herbeiführen soll. Dies erhöht\ndie Offensivkraft sowie Defensivkraft des Anwenders\nund lässt seine Attacken 50 % mehr Schaden anrichten."
    es: "Ejecuta una danza que invoca la victoria y aumenta la\nofensiva y la defensiva, y hace que los movimientos\nconsecuentes causen un 50 % más de daño."
    ko: "승리를 부르는 춤으로\n자신의 공격력과 방어력을 올린다.\n기술로 주는 데미지가 1.5배가 된다."
    zh_simp: "凭借唤来胜利的舞蹈\n提高自己的进攻力和防守力，\n并让招式给予的伤害变成１.５倍。"
    zh_trad: "藉由喚來勝利的舞蹈\n提高自己的進攻力和防守力。\n會讓招式給予的傷害變成１.５倍。"
vine_whip:
  names:
    jp_kanji: つるのムチ
    en: Vine Whip
    fr: Fouet Lianes
    it: Frustata
    de: Rankenhieb
    es: Látigo Cepa
    ko: 덩굴채찍
    zh_simp: 藤鞭
    zh_trad: 藤鞭
  descriptions:
    jp_kanji: "ムチのように　しなる　細長い　つるで\n相手を　たたきつけて　攻撃する。"
    en: "The target is struck with slender, whiplike vines to\ninflict damage."
    fr: "Fouette l’ennemi avec de fines lianes pour infliger\ndes dégâts."
    it: "Infligge danni al bersaglio con liane sottili\nsimili a fruste."
    de: Peitschenähnlicher Schlag mit Ranken.
    es: Azota al objetivo con ramas finas.
    ko: "채찍처럼 휘어지는 가늘고 긴 덩굴로\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "用如同鞭子般弯曲而细长的藤蔓\n摔打对手进行攻击。"
    zh_trad: "將如同鞭子般彎曲而細長的藤蔓\n甩向對手進行攻擊。"
vise_grip:
  names:
    jp_kanji: はさむ
    en: Vise Grip
    fr: Force Poigne
    it: Presa
    de: Klammer
    es: Agarre
    ko: 찝기
    zh_simp: 夹住
    zh_trad: 夾住
  descriptions:
    jp_kanji: "相手を　両側から　はさんで\nダメージを　あたえる。"
    en: "The target is gripped and squeezed from both sides\nto inflict damage."
    fr: L’ennemi est attrapé et compressé par les côtés.
    it: Stringe il bersaglio in una morsa.
    de: Das Ziel wird umklammert und zusammengequetscht.
    es: Atrapa y atenaza al objetivo.
    ko: "상대를 양쪽에서 집어서\n데미지를 준다."
    zh_simp: "将对手从两侧夹住，\n给予伤害。"
    zh_trad: "從兩側夾住對手，\n給予傷害。"
vital_throw:
  names:
    jp_kanji: あてみなげ
    en: Vital Throw
    fr: Corps Perdu
    it: Vitaltiro
    de: Überwurf
    es: Tiro Vital
    ko: 받아던지기
    zh_simp: 借力摔
    zh_trad: 借力摔
  descriptions:
    jp_kanji: "相手より　あとに　攻撃する。\nそのかわり　自分の　攻撃は\n必ず　命中する。"
    en: "The user attacks last. In return, this throw move\nnever misses."
    fr: "Le lanceur porte son coup en dernier.\nEn échange, cette capacité n’échoue jamais."
    it: "Chi la usa attacca per ultimo, ma il colpo\nè sempre infallibile."
    de: "Anwender greift als Letzter an, hat dafür aber eine\nTreffergarantie beim eigenen Angriff."
    es: El usuario ataca el último, pero no falla.
    ko: "상대보다 나중에 공격한다.\n그 대신 자신의 공격은\n반드시 명중한다."
    zh_simp: "会在对手之后进行攻击。\n但是自己的攻击必定会命中。"
    zh_trad: "攻擊的順序會在對手之後。\n但是自己的攻擊必定會命中。"
volt_switch:
  names:
    jp_kanji: ボルトチェンジ
    en: Volt Switch
    fr: Change Éclair
    it: Invertivolt
    de: Voltwechsel
    es: Voltiocambio
    ko: 볼트체인지
    zh_simp: 伏特替换
    zh_trad: 伏特替換
  descriptions:
    jp_kanji: "攻撃したあと\nものすごい　スピードで　もどってきて\n控えポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe\nprêt au combat."
    it: "Chi usa questa mossa si tira indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario vuelve a toda prisa para dar paso\na otro Pokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
volt_tackle:
  names:
    jp_kanji: ボルテッカー
    en: Volt Tackle
    fr: Électacle
    it: Locomovolt
    de: Volttackle
    es: Placaje Eléc
    ko: 볼트태클
    zh_simp: 伏特攻击
    zh_trad: 伏特攻擊
  descriptions:
    jp_kanji: "電気をまとって突進して攻撃。\n自分もダメージを受ける。\n相手をまひ状態にすることもある。"
    en: "The user electrifies itself and charges the target to inflict\ndamage. This also damages the user and may leave the\ntarget with paralysis."
    fr: "Le lanceur électrifie son corps avant de charger\nl’ennemi, ce qui blesse également le lanceur.\nPeut aussi paralyser la cible."
    it: "Chi la usa si carica di elettricità e poi attacca.\nPuò anche paralizzare il bersaglio. Il contraccolpo\ncausa danni."
    de: "Angriff mit Elektro-Tackle. Der Anwender nimmt dabei\nselbst Schaden. Das Ziel wird eventuell paralysiert."
    es: "Quien lo usa electrifica su cuerpo para luego atacar.\nSe hiere mucho a sí mismo, pero puede paralizar al\nobjetivo."
    ko: "전기를 한데 모아 돌진하여 공격한다.\n자신도 데미지를 입는다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "让电流覆盖全身猛撞进行攻击。\n自己也会受到伤害。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用電流圍繞全身後猛衝進行攻擊。\n自己也會受到傷害。\n有時還會讓對手陷入麻痺狀態。"
wake_up_slap:
  names:
    jp_kanji: めざましビンタ
    en: Wake-Up Slap
    fr: Réveil Forcé
    it: Svegliopacca
    de: Weckruf
    es: Espabila
    ko: 잠깨움뺨치기
    zh_simp: 唤醒巴掌
    zh_trad: 喚醒巴掌
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
water_gun:
  names:
    jp_kanji: みずでっぽう
    en: Water Gun
    fr: Pistolet à O
    it: Pistolacqua
    de: Aquaknarre
    es: Pistola Agua
    ko: 물대포
    zh_simp: 水枪
    zh_trad: 水槍
  descriptions:
    jp_kanji: "水を　勢いよく\n相手に　発射して　攻撃する。"
    en: The target is blasted with a forceful shot of water.
    fr: De l’eau est projetée avec force sur l’ennemi.
    it: Il bersaglio è colpito da un potente getto d’acqua.
    de: Das Ziel wird mit Wasser bespritzt.
    es: Ataca disparando agua con gran potencia.
    ko: "물을 기세 좋게\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n水流进行攻击。"
    zh_trad: "向對手噴射\n強烈水流進行攻擊。"
water_pledge:
  names:
    jp_kanji: みずのちかい
    en: Water Pledge
    fr: Aire d’Eau
    it: Acquapatto
    de: Wassersäulen
    es: Voto Agua
    ko: 물의맹세
    zh_simp: 水之誓约
    zh_trad: 水之誓約
  descriptions:
    jp_kanji: "水の柱で　攻撃する。\nほのおと　組みあわせると　威力が\nあがって　空に　にじが　かかる。"
    en: "A column of water hits the target. When used with\nits fire equivalent, its power increases and a\nrainbow appears."
    fr: "Une masse d’eau s’abat sur l’ennemi.\nEn l’utilisant avec Aire de Feu, l’effet augmente\net un arc-en-ciel apparaît."
    it: "Attacca il bersaglio con una colonna d’acqua.\nSe usata con Fiammapatto, gli effetti aumentano\ne appare un arcobaleno."
    de: "Ein Angriff mit Wassersäulen. Mit Feuersäulen\nkombiniert steigt die Wirkung und ein Regenbogen\nerscheint."
    es: "Ataca con columnas de agua. Combinado con\nVoto Fuego, crea un arcoíris y aumenta su potencia."
    ko: "물기둥으로 공격한다.\n불꽃과 조합하면 위력이\n올라가고 하늘에 무지개가 걸린다."
    zh_simp: "用水柱进行攻击。\n如果和火组合，威力就会提高，\n天空中会挂上彩虹。"
    zh_trad: "用水柱進行攻擊。\n和火之誓約同時使用時，威力會提高，\n天空會出現彩虹。"
water_pulse:
  names:
    jp_kanji: みずのはどう
    en: Water Pulse
    fr: Vibraqua
    it: Idropulsar
    de: Aquawelle
    es: Hidropulso
    ko: 물의파동
    zh_simp: 水之波动
    zh_trad: 水之波動
  descriptions:
    jp_kanji: "水の振動を\n相手に与えて攻撃する。\n必ず命中する。"
    en: "The user attacks the target with a pulsing blast of water.\nThis attack never misses."
    fr: "Le lanceur envoie un puissant jet d’eau sur l’ennemi.\nN’échoue jamais."
    it: "Il bersaglio viene colpito da un getto d’acqua\npotentissimo. Questo attacco è infallibile."
    de: Angriff mit Wasserwelle. Die Attacke trifft garantiert.
    es: Ataca con un potente chorro de agua que nunca falla.
    ko: "물의 진동을\n상대에게 가하여 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "用水的震动攻击对手。\n必定会命中。"
    zh_trad: "用水的振動攻擊對手。\n必定會命中。"
water_shuriken:
  names:
    jp_kanji: みずしゅりけん
    en: Water Shuriken
    fr: Sheauriken
    it: Acqualame
    de: Wasser-Shuriken
    es: Shuriken de Agua
    ko: 물수리검
    zh_simp: 飞水手里剑
    zh_trad: 飛水手裡劍
  descriptions:
    jp_kanji: "粘液で　できた　手裏剣を\n２ー５回の　間　連続で　だす。\n必ず　先制攻撃　できる。"
    en: "The user hits the target with throwing stars two to\nfive times in a row. This move always goes first."
    fr: "Attaque l’ennemi avec des shuriken de mucus.\nFrappe en priorité deux à cinq fois d’affilée en un tour."
    it: "Chi la usa attacca il bersaglio con degli shuriken\ndi muco da due a cinque volte di fila.\nQuesta mossa ha priorità alta."
    de: "Der Anwender schleudert dem Ziel Wurfsterne\naus einem verdickten Sekret entgegen. Diese\nErstschlag-Attacke trifft zwei- bis fünfmal."
    es: "Golpea al oponente de dos a cinco veces con estrellas\narrojadizas hechas de mucosidad. Este movimiento tiene\nprioridad alta."
    ko: "점액으로 만든 수리검을\n2~5회 연속으로 던진다.\n반드시 선제공격할 수 있다."
    zh_simp: "用粘液制成的手里剑，\n连续攻击２～５次。\n必定能够先制攻击。"
    zh_trad: "射出用黏液製成的手裡劍，\n連續攻擊２～５次。\n必定能夠發動先制攻擊。"
water_sport:
  names:
    jp_kanji: みずあそび
    en: Water Sport
    fr: Tourniquet
    it: Docciascudo
    de: Nassmacher
    es: Hidrochorro
    ko: 물놀이
    zh_simp: 玩水
    zh_trad: 玩水
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
water_spout:
  names:
    jp_kanji: しおふき
    en: Water Spout
    fr: Giclédo
    it: Zampillo
    de: Fontränen
    es: Salpicar
    ko: 해수스파우팅
    zh_simp: 喷水
    zh_trad: 噴水
  descriptions:
    jp_kanji: "潮を　吹きつけて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    en: "The user spouts water to damage opposing\nPokémon. The lower the user’s HP, the lower the\nmove’s power."
    fr: "Le lanceur attaque avec un jet d’eau.\nMoins il a de PV et moins l’attaque est puissante."
    it: "Lancia un getto d’acqua contro il nemico che ha\ndavanti e quelli adiacenti. La potenza è\nproporzionale al numero di PS di chi la usa."
    de: "Eine Wasser-Attacke gegen gegnerische Pokémon.\nJe höher die KP des Anwenders sind, desto mehr\nSchaden richtet sie an."
    es: "Chorro de agua. Cuantos menos PS tenga el usuario,\nmenos dañino será."
    ko: "바닷물을 내뿜어 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 떨어진다."
    zh_simp: "掀起潮水进行攻击。\n自己的ＨＰ越少，\n招式的威力越小。"
    zh_trad: "噴起潮水進行攻擊。\n自己的ＨＰ越少，\n招式的威力越小。"
waterfall:
  names:
    jp_kanji: たきのぼり
    en: Waterfall
    fr: Cascade
    it: Cascata
    de: Kaskade
    es: Cascada
    ko: 폭포오르기
    zh_simp: 攀瀑
    zh_trad: 攀瀑
  descriptions:
    jp_kanji: "すごい　勢いで　相手に　つっこむ。\n相手を　ひるませることが　ある。"
    en: "The user charges at the target and may make\nit flinch."
    fr: "Le lanceur charge l’ennemi à une vitesse remarquable,\nce qui peut l’apeurer."
    it: "Carica il bersaglio a grande velocità e può farlo\ntentennare."
    de: "Eine mächtige Attacke, durch die das Ziel eventuell\nzurückschreckt."
    es: "Embiste con un gran impulso que puede llegar a\namedrentar."
    ko: "굉장한 기세로 상대에게 돌진한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以惊人的气势扑向对手。\n有时会使对手畏缩。"
    zh_trad: "以驚人的氣勢撲向對手。\n有時會讓對手畏縮。"
wave_crash:
  names:
    jp_kanji: ウェーブタックル
    en: Wave Crash
    fr: Aquatacle
    it: Ondaschianto
    de: Wellentackle
    es: Envite Acuático
    ko: 웨이브태클
    zh_simp: 波动冲
    zh_trad: 波動衝
  descriptions:
    jp_kanji: "水をまといつつ全身で相手にぶつかるが\n自分もダメージを受ける。\n自分の行動順がはやくなる。"
    en: "The user shrouds itself in water and slams into the target\nwith its whole body to inflict damage. This also damages\nthe user and raises the user’s action speed."
    fr: "Le lanceur se recouvre entièrement d’eau avant\nde charger sa cible. Blesse aussi le lanceur, mais\navance sa position dans l’ordre d’action."
    it: "Chi la usa si avvolge in uno strato d’acqua e si lancia\nsul bersaglio, subendo tuttavia dei danni. Questa mossa\naccelera inoltre l’ordine delle azioni di chi la usa."
    de: "Der Anwender hüllt sich in Wasser und stürzt sich mit dem\nganzen Körper auf das Ziel, wobei er selbst Schaden\nerleidet. Danach kommt er schneller wieder zum Zug."
    es: "Se envuelve en agua y embiste contra el objetivo. El\nusuario también recibe daño, pero sus turnos tardan\nmenos en llegar."
    ko: "물을 두르고 온몸으로 상대에게 부딪친다.\n자신도 데미지를 입는다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "让水覆盖全身后撞向对手。\n自己也会受到伤害。\n能够让自己的行动顺序提前。"
    zh_trad: "用水圍繞全身並撞向對手。\n自己也會受到傷害。\n能夠讓自己的行動順序提前。"
weather_ball:
  names:
    jp_kanji: ウェザーボール
    en: Weather Ball
    fr: Ball’Météo
    it: Palla Clima
    de: Meteorologe
    es: Meteorobola
    ko: 웨더볼
    zh_simp: 气象球
    zh_trad: 氣象球
  descriptions:
    jp_kanji: "使ったときの　天気に　よって\n技の　タイプと　威力が　変わる。"
    en: "This attack move varies in power and type\ndepending on the weather."
    fr: "Une attaque dont la puissance et le type varient\nen fonction du temps qu’il fait."
    it: "Mossa d’attacco il cui tipo e la cui potenza variano\nin base alle condizioni atmosferiche."
    de: "Typ und Stärke der Attacke sind vom Wetter zum\nZeitpunkt der Anwendung abhängig."
    es: "El tipo y fuerza del ataque varían según el tiempo que\nhaga."
    ko: "사용했을 때의 날씨에 따라서\n기술 타입과 위력이 바뀐다."
    zh_simp: "根据使用时的天气，\n招式属性和威力会改变。"
    zh_trad: "招式屬性和威力會隨著\n使用時天氣的不同而改變。"
whirlpool:
  names:
    jp_kanji: うずしお
    en: Whirlpool
    fr: Siphon
    it: Mulinello
    de: Whirlpool
    es: Torbellino
    ko: 바다회오리
    zh_simp: 潮旋
    zh_trad: 潮旋
  descriptions:
    jp_kanji: "激しく　渦をまく　水の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The user traps the target in a violent swirling\nwhirlpool for four to five turns."
    fr: "Piège l’ennemi dans une trombe d’eau pendant\nquatre à cinq tours."
    it: "Intrappola il bersaglio in un turbine d’acqua per quattro\no cinque turni infliggendo danni a ogni turno."
    de: "Das Ziel wird für vier bis fünf Runden in einer\nWasserhose gefangen."
    es: "Una tromba de agua atrapa al objetivo durante cuatro o\ncinco turnos."
    ko: "세차게 소용돌이치는\n물속에 4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在激烈的\n水流旋涡中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在激烈的\n水流漩渦中，\n在４～５回合內進行攻擊。"
whirlwind:
  names:
    jp_kanji: ふきとばし
    en: Whirlwind
    fr: Cyclone
    it: Turbine
    de: Wirbelwind
    es: Remolino
    ko: 날려버리기
    zh_simp: 吹飞
    zh_trad: 吹飛
  descriptions:
    jp_kanji: "相手を　吹きとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is blown away, and a different Pokémon is\ndragged out. In the wild, this ends a battle against a\nsingle Pokémon."
    fr: "Éjecte le Pokémon ennemi et le remplace par un autre.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Il bersaglio lascia il campo e viene sostituito.\nMette fine alle lotte contro singoli Pokémon\nselvatici."
    de: "Weht das Ziel weg und ersetzt es durch ein anderes\nPokémon. In der Wildnis endet der Kampf."
    es: "Se lleva al objetivo, que es cambiado por otro\nPokémon. Si es un Pokémon salvaje, acaba el\ncombate."
    ko: "상대를 날려 버려서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "吹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "吹飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
wicked_blow:
  names:
    jp_kanji: あんこくきょうだ
    en: Wicked Blow
    fr: Poing Obscur
    it: Pugnotenebra
    de: Finstertreffer
    es: Golpe Oscuro
    ko: 암흑강타
    zh_simp: 暗冥强击
    zh_trad: 暗冥強擊
  descriptions:
    jp_kanji: "あくの型を　極めし\n強烈な　一撃。\n必ず　急所に　当たる。"
    en: "The user, having mastered the Dark style, strikes the\ntarget with a fierce blow. This attack always results\nin a critical hit."
    fr: "Le lanceur assène un coup puissant à l’ennemi.\nCette technique qui inflige toujours un coup critique est\nréservée à ceux qui maîtrisent la puissance des Ténèbres."
    it: "Il Pokémon sferra un singolo colpo potentissimo,\nmassima espressione dello stile di tipo Buio.\nBrutto colpo assicurato."
    de: "Der Anwender hat den Stil des Unlichts gemeistert\nund führt einen fokussierten, harten Schlag mit\nVolltreffergarantie aus."
    es: "Golpe devastador que requiere un absoluto dominio de\nlas artes siniestras. Siempre asesta un golpe crítico."
    ko: "악의 태세가 극에 달하여\n강렬한 일격을 날린다.\n반드시 급소에 맞는다."
    zh_simp: "将恶之流派修炼至大成的\n猛烈一击。\n必定会击中要害。"
    zh_trad: "將惡之流派鍛鍊到了\n極致的強烈一擊。\n必定會擊中要害。"
wide_guard:
  names:
    jp_kanji: ワイドガード
    en: Wide Guard
    fr: Garde Large
    it: Bodyguard
    de: Rundumschutz
    es: Vastaguardia
    ko: 와이드가드
    zh_simp: 广域防守
    zh_trad: 廣域防守
  descriptions:
    jp_kanji: "味方全員に　当たる　攻撃を\n１ターンの　間　防ぐ。"
    en: "The user and its allies are protected from\nwide-ranging attacks for one turn."
    fr: "Annule les attaques visant toute l’équipe pendant\nun tour."
    it: "Chi la usa protegge sé e gli alleati da colpi\nad ampio raggio per un turno."
    de: "Schützt eine Runde lang vor Angriffen, die alle\nPokémon auf der Seite des Anwenders treffen."
    es: "Bloquea los ataques de objetivo múltiple lanzados\ncontra tu equipo durante un turno."
    ko: "같은 편 전원에게 향하는 공격을\n1턴 동안 막는다."
    zh_simp: "在１回合内防住\n击打我方全员的攻击。"
    zh_trad: "在１回合內，\n防禦住攻擊我方全體的攻擊招式。"
wild_charge:
  names:
    jp_kanji: ワイルドボルト
    en: Wild Charge
    fr: Éclair Fou
    it: Sprizzalampo
    de: Stromstoß
    es: Voltio Cruel
    ko: 와일드볼트
    zh_simp: 疯狂伏特
    zh_trad: 瘋狂伏特
  descriptions:
    jp_kanji: "電気をまとい　ぶつかった\n相手をまひ状態にすることもある。\n自分もダメージを受ける。"
    en: "The user shrouds itself in electricity and smashes into\nits target. This also damages the user and may leave\nthe target with paralysis."
    fr: "Attaque avec une charge électrique violente qui blesse\négalement le lanceur. Peut aussi paralyser la cible."
    it: "Chi la usa si carica di elettricità per poi scagliarsi\nsul bersaglio, ma subisce dei danni per il contraccolpo.\nPuò anche paralizzare il bersaglio."
    de: "Anwender erzeugt Spannung und greift an, indem er\nauf Kollisionskurs geht. Er erleidet dabei selbst Schaden.\nDas Ziel wird eventuell paralysiert."
    es: "Carga eléctrica muy potente que hiere a quien la usa y\npuede paralizar al objetivo."
    ko: "전기를 두르고 부딪쳐\n상대를 마비 상태로 만들 때가 있다.\n자신도 데미지를 입는다."
    zh_simp: "让电流覆盖全身，\n有时还会让撞到的对手陷入麻痹状态。\n自己也会受到伤害。"
    zh_trad: "讓電流圍繞身體。\n有時還會讓撞到的對手陷入麻痺狀態。\n自己也會受到傷害。"
wildbolt_storm:
  names:
    jp_kanji: かみなりあらし
    en: Wildbolt Storm
    fr: Typhon Fulgurant
    it: Tempesta Tonante
    de: Donnerorkan
    es: Electormenta
    ko: 번개폭풍
    zh_simp: 鸣雷风暴
    zh_trad: 鳴雷風暴
  descriptions:
    jp_kanji: "嵐を起こし雷雲を呼びよせ\n雷と風で激しく攻撃をする。\n相手をまひ状態にすることもある。"
    en: "The user summons a thunderous tempest and savagely\nattacks with lightning and wind.\nThis may also leave the target with paralysis."
    fr: "Le lanceur déclenche un violent typhon orageux\ndont les rafales et la foudre frappent l’ennemi.\nPeut aussi paralyser la cible."
    it: "Chi la usa chiama a sé una tempesta di fulmini e raffiche\ndi vento con cui attacca violentemente il bersaglio.\nPuò anche paralizzarlo."
    de: "Der Anwender ruft ein heftiges Unwetter herbei, um mit\nWind und Blitzen anzugreifen. Das Ziel wird eventuell\nparalysiert."
    es: "Invoca una tormenta eléctrica que ataca al objetivo con\nfuertes vientos y relámpagos y puede paralizarlo."
    ko: "폭풍을 일으키고 뇌운을 불러서\n번개와 바람으로 매섭게 공격한다.\n상대를 마비 상태로 만들 때가 있다."
    zh_simp: "呼唤雷云引起风暴，\n用雷与风进行激烈的攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "呼喚雷雲引起風暴，\n用雷與風進行激烈的攻擊。\n有時還會讓對手陷入麻痺狀態。"
will_o_wisp:
  names:
    jp_kanji: おにび
    en: Will-O-Wisp
    fr: Feu Follet
    it: Fuocofatuo
    de: Irrlicht
    es: Fuego Fatuo
    ko: 도깨비불
    zh_simp: 磷火
    zh_trad: 鬼火
  descriptions:
    jp_kanji: "不気味で　怪しい　炎を　放って\n相手を　やけどの　状態に　する。"
    en: "The user shoots a sinister flame at the target to inflict\na burn."
    fr: "Lance un bouquet de flammes maléfiques à l’ennemi\npour lui infliger une brûlure."
    it: "Fiamme sinistre e misteriose causano una scottatura\nal bersaglio."
    de: "Anwender feuert unheimliche Flammen ab, die beim\nZiel Verbrennungen verursachen."
    es: Siniestra llama morada que produce quemaduras.
    ko: "으스스하고 괴상한 불꽃을 쏘아\n상대를 화상 상태로 만든다."
    zh_simp: "放出怪异的火焰，\n从而让对手陷入灼伤状态。"
    zh_trad: "放出詭異的火焰，\n讓對手陷入灼傷狀態。"
wing_attack:
  names:
    jp_kanji: つばさでうつ
    en: Wing Attack
    fr: Cru-Ailes
    it: Attacco d’Ala
    de: Flügelschlag
    es: Ataque Ala
    ko: 날개치기
    zh_simp: 翅膀攻击
    zh_trad: 翅膀攻擊
  descriptions:
    jp_kanji: "大きく　ひろげた　りっぱな　翼を\n相手に　ぶつけて　攻撃する。"
    en: "The target is struck with large, imposing wings\nspread wide to inflict damage."
    fr: "L’ennemi est frappé par de larges ailes déployées\npour infliger des dégâts."
    it: "Infligge danni al bersaglio spiegando delle grandi\nali possenti."
    de: Trifft das Ziel mit ausgebreiteten Flügeln.
    es: Golpea al objetivo con unas grandes alas.
    ko: "크게 펼친 훌륭한 날개를\n상대에게 부딪쳐서 공격한다."
    zh_simp: "大大地展开美丽的翅膀，\n将其撞向对手进行攻击。"
    zh_trad: "用大大伸展開來的美麗翅膀，\n撞向對手進行攻擊。"
wish:
  names:
    jp_kanji: ねがいごと
    en: Wish
    fr: Vœu
    it: Desiderio
    de: Wunschtraum
    es: Deseo
    ko: 희망사항
    zh_simp: 祈愿
    zh_trad: 祈願
  descriptions:
    jp_kanji: "次の　ターンに　自分　もしくは\n入れ替わった　ポケモンの　ＨＰを\n最大ＨＰの　半分　回復する。"
    en: "One turn after this move is used, the user’s or its\nreplacement’s HP is restored by half the user’s\nmax HP."
    fr: "Un vœu qui permet au lanceur ou au Pokémon\nentrant sur le terrain au tour suivant de récupérer\nla moitié des PV max du lanceur."
    it: "Quando un Pokémon la usa, al turno successivo\nla metà dei suoi PS massimi viene recuperata\nda lui stesso o dal Pokémon che lo sostituisce."
    de: "Ein Wunsch füllt in der nächsten Runde 50 % der KP\ndes Anwenders bei diesem oder einem eingewechselten\nPokémon auf."
    es: "Restaura en el siguiente turno la mitad de los PS\nmáximos del usuario o se los pasa al Pokémon que lo\nsustituye."
    ko: "다음 턴에 자신 또는\n교체한 포켓몬의 HP를\n최대 HP의 절반만큼 회복한다."
    zh_simp: "在下一回合回复自己或是\n替换出场的宝可梦最大ＨＰ的一半。"
    zh_trad: "在下一回合回復自己或是\n替換上場的寶可夢最大ＨＰ的一半。"
withdraw:
  names:
    jp_kanji: からにこもる
    en: Withdraw
    fr: Repli
    it: Ritirata
    de: Panzerschutz
    es: Refugio
    ko: 껍질에숨기
    zh_simp: 缩入壳中
    zh_trad: 縮入殼中
  descriptions:
    jp_kanji: "殻に　潜りこんで　身を守り\n自分の　防御を　あげる。"
    en: "The user withdraws its body into its hard shell,\nraising its Defense stat."
    fr: "Le lanceur se recroqueville dans sa carapace,\nce qui augmente sa Défense."
    it: "Il corpo si ritira nel suo duro guscio per aumentare\nla Difesa."
    de: "Rückzug in den harten Panzer. Erhöht den\nVerteidigungs-Wert."
    es: "El usuario se resguarda en su coraza, por lo que le sube\nla Defensa."
    ko: "껍질에 숨어 몸을 보호하여\n자신의 방어를 올린다."
    zh_simp: "缩入壳里保护身体，\n从而提高自己的防御。"
    zh_trad: "縮入殼中保護身體，\n提高自己的防禦。"
wonder_room:
  names:
    jp_kanji: ワンダールーム
    en: Wonder Room
    fr: Zone Étrange
    it: Mirabilzona
    de: Wunderraum
    es: Zona Extraña
    ko: 원더룸
    zh_simp: 奇妙空间
    zh_trad: 奇妙空間
  descriptions:
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンのあいだ　すべてのポケモンの\n防御と　特防が　入れ替わる。"
    en: "The user creates a bizarre area in which Pokémon’s\nDefense and Sp. Def stats are swapped for\nfive turns."
    fr: "Le lanceur crée une zone mystérieuse\noù la Défense et la Défense Spéciale de tous\nles Pokémon sont inversées pendant cinq tours."
    it: "Chi la usa crea una dimensione in cui Difesa\ne Difesa Speciale di tutti i Pokémon vengono\nscambiate per cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem über\nfünf Runden die Verteidigung aller Pokémon mit ihrer\nSpezial-Verteidigung getauscht wird."
    es: "Crea una zona misteriosa donde se intercambian la\nDefensa y la Defensa Especial de todos los Pokémon\ndurante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n방어와 특수방어가 바뀐다."
    zh_simp: "制造出离奇的空间。\n在５回合内互换\n所有宝可梦的防御和特防。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，讓所有寶可夢的\n防禦和特防互相交換。"
wood_hammer:
  names:
    jp_kanji: ウッドハンマー
    en: Wood Hammer
    fr: Martobois
    it: Mazzuolegno
    de: Holzhammer
    es: Mazazo
    ko: 우드해머
    zh_simp: 木槌
    zh_trad: 木槌
  descriptions:
    jp_kanji: "硬い胴体を\n相手にたたきつけて攻撃する。\n自分もダメージを受ける。"
    en: "The user slams its rugged body into the target to attack.\nThis also damages the user."
    fr: "Le lanceur heurte l’ennemi de son corps robuste.\nBlesse également le lanceur."
    it: "Chi la usa si lancia con tutto il corpo contro il bersaglio,\nma subisce anche danni."
    de: "Anwender attackiert mit seinem robusten Körper.\nEr erleidet dabei auch selbst Schaden."
    es: "Arremete contra el objetivo con su robusto cuerpo.\nEl usuario también recibe daño."
    ko: "단단한 몸통을\n상대에게 부딪쳐서 공격한다.\n자신도 데미지를 입는다."
    zh_simp: "用坚硬的躯体\n撞击对手进行攻击。\n自己也会受到伤害。"
    zh_trad: "用堅硬的軀體\n撞擊對手進行攻擊。\n自己也會受到傷害。"
work_up:
  names:
    jp_kanji: ふるいたてる
    en: Work Up
    fr: Rengorgement
    it: Cuordileone
    de: Kraftschub
    es: Avivar
    ko: 분발
    zh_simp: 自我激励
    zh_trad: 自我激勵
  descriptions:
    jp_kanji: "自分を　奮いたてて\n攻撃と　特攻を　あげる。"
    en: "The user is roused, and its Attack and Sp. Atk\nstats increase."
    fr: "Le lanceur se rengorge.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Chi la usa si tira su di morale, aumentando\nil proprio Attacco e l’Attacco Speciale."
    de: "Anwender erhält einen Kraftschub, der seinen Angriff\nund Spezial-Angriff erhöht."
    es: "Quien lo usa se concentra y potencia su Ataque y\nsu Ataque Especial."
    ko: "스스로 분발해서\n공격과 특수공격을 올린다."
    zh_simp: "激励自己，\n从而提高攻击和特攻。"
    zh_trad: "激勵自己，\n提高自己的攻擊和特攻。"
worry_seed:
  names:
    jp_kanji: なやみのタネ
    en: Worry Seed
    fr: Soucigraine
    it: Affannoseme
    de: Sorgensamen
    es: Abatidoras
    ko: 고민씨
    zh_simp: 烦恼种子
    zh_trad: 煩惱種子
  descriptions:
    jp_kanji: "心を　なやませる　タネを\n植えつける。　相手を　眠れなくして\n特性を　ふみんに　する。"
    en: "A seed that causes worry is planted on the target.\nIt prevents sleep by making the target’s\nAbility Insomnia."
    fr: "Plante sur la cible une graine qui la rend soucieuse\net remplace son talent par Insomnia, l’empêchant\nainsi de dormir."
    it: "Un seme che causa ansia viene piantato sul\nbersaglio. Ne muta l’abilità in Insonnia e ne\npreviene o rimuove il sonno."
    de: "Ziel wird bepflanzt. Seine Fähigkeit wandelt sich zu\nInsomnia und hindert es daran, einzuschlafen."
    es: "Planta una semilla en el objetivo que le causa pesar.\nSustituye la habilidad del objetivo por Insomnio y le\nimpide dormirse."
    ko: "마음을 괴롭히는 씨앗을\n심는다. 상대를 잠잘 수 없게 해서\n특성을 불면으로 만든다."
    zh_simp: "种植心神不宁的种子。\n使对手不能入眠，\n并将特性变成不眠。"
    zh_trad: "埋下令人心煩意亂的種子，\n讓對手睡不著，\n將對手的特性變成不眠。"
wrap:
  names:
    jp_kanji: まきつく
    en: Wrap
    fr: Ligotage
    it: Avvolgibotta
    de: Wickel
    es: Constricción
    ko: 김밥말이
    zh_simp: 紧束
    zh_trad: 緊束
  descriptions:
    jp_kanji: "長い　体や　つるなどを　使って\n４ー５ターンの　間\n相手に　まきついて　攻撃する。"
    en: "A long body, vines, or the like are used to wrap and\nsqueeze the target for four to five turns."
    fr: "Le lanceur ligote l’ennemi avec des lianes ou son corps\npour l’écraser durant quatre à cinq tours."
    it: "Il lungo corpo o le liane di chi la usa avvolgono\ne stritolano il bersaglio per quattro o cinque turni."
    de: "Umwickelt das Ziel über vier bis fünf Runden mit\nRanken oder Ähnlichem und fügt ihm Schaden zu."
    es: "Oprime al objetivo de cuatro a cinco turnos con ramas\no con su cuerpo."
    ko: "긴 몸이나 덩굴 등을 사용해\n4~5턴 동안\n상대를 휘감아 공격한다."
    zh_simp: "使用长长的身体或藤蔓等，\n在４～５回合内\n紧束对手进行攻击。"
    zh_trad: "使用長長的身體或藤蔓等，\n在４～５回合內\n緊束對手進行攻擊。"
wring_out:
  names:
    jp_kanji: しぼりとる
    en: Wring Out
    fr: Essorage
    it: Strizzata
    de: Auswringen
    es: Estrujón
    ko: 쥐어짜기
    zh_simp: 绞紧
    zh_trad: 絞緊
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
x_scissor:
  names:
    jp_kanji: シザークロス
    en: X-Scissor
    fr: Plaie Croix
    it: Forbice X
    de: Kreuzschere
    es: Tijera X
    ko: 시저크로스
    zh_simp: 十字剪
    zh_trad: 十字剪
  descriptions:
    jp_kanji: "カマやツメを　ハサミのように\n交差させながら相手を切り裂く。\n急所に当たりやすい。"
    en: "The user slashes at the target by crossing its scythes\nor claws as if they were a pair of scissors. This move\nhas a heightened chance of landing a critical hit."
    fr: "Le lanceur taillade l’ennemi en utilisant ses faux\nou ses griffes comme une paire de ciseaux.\nTaux de critiques élevé."
    it: "Chi la usa colpisce il bersaglio con un attacco che\nricorda un colpo di forbici. Probabile brutto colpo."
    de: "Der Anwender führt eine Attacke aus, die einer\nScherenbewegung ähnelt. Hohe Volltrefferquote."
    es: "Cruza las guadañas o las garras para atacar al objetivo\ncomo si fueran unas tijeras. Suele ser crítico."
    ko: "낫이나 발톱을 가위처럼\n교차시키면서 상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "将镰刀或爪子像剪刀般地交叉，\n顺势劈开对手。\n容易击中要害。"
    zh_trad: "將鐮刀或爪子像剪刀般地交叉，\n順勢劈開對手。\n容易擊中要害。"
yawn:
  names:
    jp_kanji: あくび
    en: Yawn
    fr: Bâillement
    it: Sbadiglio
    de: Gähner
    es: Bostezo
    ko: 하품
    zh_simp: 哈欠
    zh_trad: 哈欠
  descriptions:
    jp_kanji: "大きな　あくびで　眠気を　誘う。\n次の　ターンに\n相手を　眠り状態に　する。"
    en: "The user lets loose a huge yawn that lulls the target\ninto falling asleep on the next turn."
    fr: Fait bâiller l’ennemi, qui s’endort au tour suivant.
    it: "Chi la usa fa un grande sbadiglio che\naddormenta il bersaglio al turno seguente."
    de: "Anwender gähnt und das Ziel schläft in der nächsten\nRunde ein."
    es: "Gran bostezo que induce al sueño al objetivo en el\nsiguiente turno."
    ko: "큰 하품으로 졸음을 유도한다.\n다음 턴에 상대를\n잠듦 상태로 만든다."
    zh_simp: "打个大哈欠引起睡意。\n在下一回合让对手陷入睡眠状态。"
    zh_trad: "打個大哈欠引起睡意。\n在下一回合\n讓對手陷入睡眠狀態。"
zap_cannon:
  names:
    jp_kanji: でんじほう
    en: Zap Cannon
    fr: Élecanon
    it: Falcecannone
    de: Blitzkanone
    es: Electrocañón
    ko: 전자포
    zh_simp: 电磁炮
    zh_trad: 電磁炮
  descriptions:
    jp_kanji: "大砲の　ような\n電気を　発射して　攻撃する。\n相手を　まひの　状態に　する。"
    en: "The user fires an electric blast like a cannon to inflict\ndamage and cause paralysis."
    fr: "Un boulet de canon électrifié qui inflige des dégâts\net paralyse l’ennemi."
    it: "Chi la usa scaglia una sfera elettrica\nche infligge danni e paralizza il bersaglio."
    de: "Kanonenähnlicher Elektro-Schuss, der schadet und\nparalysiert."
    es: "Dispara una descarga eléctrica que causa daño y\nparálisis."
    ko: "대포처럼\n전기를 발사해서 공격한다.\n상대를 마비 상태로 만든다."
    zh_simp: "发射大炮一样的\n电流进行攻击。\n让对手陷入麻痹状态。"
    zh_trad: "發射如大炮般的\n電流進行攻擊。\n能讓對手陷入麻痺狀態。"
zen_headbutt:
  names:
    jp_kanji: しねんのずつき
    en: Zen Headbutt
    fr: Psykoud’Boul
    it: Cozzata Zen
    de: Zen-Kopfstoß
    es: Cabezazo Zen
    ko: 사념의박치기
    zh_simp: 意念头锤
    zh_trad: 意念頭錘
  descriptions:
    jp_kanji: "思念の力を\n額に集めて攻撃する。"
    en: "The user focuses its willpower to its head and attacks\nthe target."
    fr: "Le lanceur concentre son énergie psychique dans\nson front et donne un coup de tête."
    it: "Chi la usa concentra le energie psichiche nella testa e si\nlancia contro il bersaglio."
    de: Anwender konzentriert seinen Willen und rammt das Ziel.
    es: "Concentra su energía psíquica en la cabeza para\ngolpear al objetivo."
    ko: "사념의 힘을\n이마에 모아서 공격한다."
    zh_simp: "将思念的力量集中在\n前额进行攻击。"
    zh_trad: "將意念的力量集中在\n前額進行攻擊。"
zing_zap:
  names:
    jp_kanji: びりびりちくちく
    en: Zing Zap
    fr: Électrikipik
    it: Elettropizzico
    de: Elektropikser
    es: Electropunzada
    ko: 찌리리따끔따끔
    zh_simp: 麻麻刺刺
    zh_trad: 麻麻刺刺
  descriptions:
    jp_kanji: "相手に　ぶつかって　強力な\n電気を浴びせ　びりびりちくちく　させる。\n相手を　ひるませる　ことが　ある。"
    en: "A strong electric blast crashes down on the target,\ngiving it an electric shock. This may also make the\ntarget flinch."
    fr: "Le lanceur fonce sur la cible et lui envoie un puissant\nchoc électrique. Peut aussi l’effrayer."
    it: "Chi la usa colpisce il bersaglio investendolo\ncon una potente scarica elettrica che può\nanche farlo tentennare."
    de: "Der Anwender rammt das Ziel und schockt es mit\nstarkem Strom. Das Ziel schreckt eventuell zurück."
    es: "Se lanza contra el objetivo y le suelta una potente\ndescarga eléctrica que puede hacer que se amedrente."
    ko: "상대에게 부딪쳐 강력한\n전기를 날려서 찌리리따끔따끔하게 만든다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "撞向对手，并发出强电，\n使其感到麻麻刺刺的。\n有时会使对手畏缩。"
    zh_trad: "撞向對手，並利用\n強電流使其感到麻麻刺刺的。\n有時會使對手畏縮。"
zippy_zap:
  names:
    jp_kanji: ばちばちアクセル
    en: Zippy Zap
    fr: Pika-Sprint
    it: Sprintaboom
    de: Britzelturbo
    es: Pikaturbo
    ko: 파찌파찌액셀
    zh_simp: 电电加速
    zh_trad: 電電加速
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
