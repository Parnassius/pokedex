    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
corrosive_gas:
  names:
    jp_kanji: ふしょくガス
    en: Corrosive Gas
    fr: Gaz Corrosif
    it: Gas Corrosivo
    de: Korrosionsgas
    es: Gas Corrosivo
    ko: 부식가스
    zh_simp: 腐蚀气体
    zh_trad: 腐蝕氣體
  descriptions:
    jp_kanji: "強い　酸性の　ガスで\n周りに　いるものを　包みこみ\n持っている　道具を　溶かしてしまう。"
    en: "The user surrounds everything around it with\nhighly acidic gas and melts away items they hold."
    fr: "Un gaz corrosif qui enveloppe tous les Pokémon\nalentour et qui dissout les objets qu’ils tiennent."
    it: "Chi la usa avvolge tutti i Pokémon che ha intorno\nin un gas altamente acido, dissolvendo i loro strumenti."
    de: "Der Anwender greift alle Pokémon im Umkreis mit\neinem ätzenden Gas an. Getragene Items werden\ndadurch zersetzt."
    es: "El usuario libera un gas cáustico que envuelve a todos\nlos que se encuentren alrededor y derrite por completo\nlos objetos que lleven equipados."
    ko: "주위에 있는 모든 것을\n강력한 산성 가스로 뒤덮어서\n지니고 있는 도구를 녹여 버린다."
    zh_simp: "用具有强酸性的气体\n包裹住自己周围所有的宝可梦，\n并融化其所携带的道具。"
    zh_trad: "用強烈的酸性氣體\n包圍周圍所有的寶可夢，\n並將攜帶的道具融化掉。"
cosmic_power:
  names:
    jp_kanji: コスモパワー
    en: Cosmic Power
    fr: Force Cosmique
    it: Cosmoforza
    de: Kosmik-Kraft
    es: Masa Cósmica
    ko: 코스믹파워
    zh_simp: 宇宙力量
    zh_trad: 宇宙力量
  descriptions:
    jp_kanji: "宇宙から　神秘の　力を\nとりこむ　ことで\n自分の　防御と　特防を　あげる。"
    en: "The user absorbs a mystical power from space to\nraise its Defense and Sp. Def stats."
    fr: "Le lanceur absorbe un pouvoir mystique spatial\nqui augmente sa Défense et sa Défense Spéciale."
    it: "Chi la usa assorbe una forza mistica dallo spazio\nche aumenta la Difesa e la Difesa Speciale."
    de: "Erhöht Verteidigung und Spezial-Verteidigung durch\neine mystische Kraft."
    es: "Sube la Defensa y la Defensa Especial propias con\nenergía mística."
    ko: "우주로부터 신비한 힘을\n손에 넣음으로써\n자신의 방어와 특수방어를 올린다."
    zh_simp: "汲取宇宙中神秘的力量，\n从而提高自己的防御和特防。"
    zh_trad: "吸取來自宇宙的神秘力量，\n提高自己的防禦和特防。"
cotton_guard:
  names:
    jp_kanji: コットンガード
    en: Cotton Guard
    fr: Cotogarde
    it: Cotonscudo
    de: Watteschild
    es: Rizo Algodón
    ko: 코튼가드
    zh_simp: 棉花防守
    zh_trad: 棉花防守
  descriptions:
    jp_kanji: "フワフワの　綿毛で　自分の\n体を　包みこんで　守る。\n防御を　ぐぐーんと　あげる。"
    en: "The user protects itself by wrapping its body in soft\ncotton, which drastically raises the user’s\nDefense stat."
    fr: "Le lanceur se protège en s’emmitouflant dans du coton.\nSa Défense augmente énormément."
    it: "Chi la usa avvolge il proprio corpo con del cotone\nmolto morbido, proteggendosi e aumentando\nmoltissimo la propria Difesa."
    de: "Anwender schützt sich, indem er sich in einen luftigen\nFlaum hüllt. Erhöht die Verteidigung drastisch."
    es: "Cubre al Pokémon con una madeja protectora.\nAumenta muchísimo la Defensa."
    ko: "푹신푹신한 솜털로 자신의\n몸을 둘러싸서 지킨다.\n방어를 매우 크게 올린다."
    zh_simp: "用软绵绵的绒毛包裹住\n自己的身体进行守护。\n巨幅提高自己的防御。"
    zh_trad: "用軟綿綿的絨毛\n保護自己的身體。\n極大幅提高自己的防禦。"
cotton_spore:
  names:
    jp_kanji: わたほうし
    en: Cotton Spore
    fr: Spore Coton
    it: Cottonspora
    de: Baumwollsaat
    es: Esporagodón
    ko: 목화포자
    zh_simp: 棉孢子
    zh_trad: 棉孢子
  descriptions:
    jp_kanji: "綿のような　フワフワの　胞子を\nまとわり　つかせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user releases cotton-like spores that cling to\nopposing Pokémon, which harshly lowers their\nSpeed stats."
    fr: "Le lanceur libère des spores cotonneuses qui collent\nà l’ennemi et baissent beaucoup sa Vitesse."
    it: "Rilascia spore simili al cotone che si attaccano\nai nemici nei paraggi e ne riducono di molto\nla Velocità."
    de: "Wattebäusche heften sich an gegnerische Pokémon,\nderen Initiative-Wert dadurch stark sinkt."
    es: "Adhiere esporas a los rivales para reducir mucho su\nVelocidad."
    ko: "솜처럼 폭신폭신한 포자를\n착 달라붙게 해서\n상대의 스피드를 크게 떨어뜨린다."
    zh_simp: "将棉花般柔软的孢子\n紧贴对手，\n从而大幅降低对手的速度。"
    zh_trad: "將棉花般柔軟的孢子\n纏繞對手，\n大幅降低對手的速度。"
counter:
  names:
    jp_kanji: カウンター
    en: Counter
    fr: Riposte
    it: Contrattacco
    de: Konter
    es: Contraataque
    ko: 카운터
    zh_simp: 双倍奉还
    zh_trad: 雙倍奉還
  descriptions:
    jp_kanji: "相手から　受けた　物理攻撃の\nダメージを　２倍に　して\n同じ　相手に　返す。"
    en: "A retaliation move that counters any physical attack,\ninflicting double the damage taken."
    fr: "Une riposte qui répond à toute capacité physique\nen infligeant le double de dégâts."
    it: "Mossa che contrasta ogni attacco fisico,\narrecando il doppio del danno ricevuto."
    de: "Kontert physische Treffer und fügt dem Ziel das\nDoppelte des Schadens zu, den der Anwender\nerlitten hat."
    es: Devuelve un golpe físico por duplicado.
    ko: "상대로부터 받은 물리공격의\n데미지를 2배로 만들어\n같은 상대에게 돌려준다."
    zh_simp: "从对手那里受到\n物理攻击的伤害将以\n２倍返还给同一个对手。"
    zh_trad: "將來自對手的物理攻擊傷害加倍後，\n返還給該對手。"
court_change:
  names:
    jp_kanji: コートチェンジ
    en: Court Change
    fr: Change-Côté
    it: Cambiocampo
    de: Seitenwechsel
    es: Cambio de Cancha
    ko: 코트체인지
    zh_simp: 换场
    zh_trad: 換場
  descriptions:
    jp_kanji: "不思議な　力で\nお互いの　場の　効果を　入れ替える。"
    en: "With its mysterious power, the user swaps the effects on\neither side of the field."
    fr: "Une force mystérieuse intervertit les effets\naffectant chaque côté du terrain."
    it: "Una forza misteriosa inverte gli effetti attivi sul campo\nalleato e sul campo avversario."
    de: "Durch eine mysteriöse Macht werden wirksame Effekte\nauf Mitstreiterseite und gegnerischer Seite getauscht."
    es: "Extraño poder que intercambia los efectos en el terreno\nde combate de ambos bandos."
    ko: "이상한 힘으로\n서로의 필드 효과를 교체한다."
    zh_simp: "用神奇的力量\n交换双方的场地效果。"
    zh_trad: "用神奇的力量\n與對手交換場地效果。"
covet:
  names:
    jp_kanji: ほしがる
    en: Covet
    fr: Implore
    it: Supplica
    de: Bezirzer
    es: Antojo
    ko: 탐내다
    zh_simp: 渴望
    zh_trad: 渴望
  descriptions:
    jp_kanji: "かわいく　あまえながら\n相手に　ちかづき\n持っている　道具を　うばう。"
    en: "The user endearingly approaches the target, then\nsteals the target’s held item."
    fr: "Le lanceur s’approche de la cible avec un air angélique\nafin de dérober l’objet qu’elle tient."
    it: "Chi la usa si avvicina al bersaglio con fare innocente e\ngli ruba lo strumento."
    de: "Der Anwender schmeichelt sich beim Ziel ein und\nstiehlt dann das von ihm getragene Item."
    es: "Se acerca con ternura al objetivo, pero le ataca y le\nroba el objeto que lleve."
    ko: "귀엽게 애교 부리며\n상대에게 다가가\n지니고 있는 도구를 뺏는다."
    zh_simp: "一边可爱地撒娇，\n一边靠近对手进行攻击，\n还能夺取对手携带的道具。"
    zh_trad: "一邊可愛地撒嬌，\n一邊靠近對手，\n奪取對手攜帶的道具。"
crabhammer:
  names:
    jp_kanji: クラブハンマー
    en: Crabhammer
    fr: Pince-Masse
    it: Martellata
    de: Krabbhammer
    es: Martillazo
    ko: 찝게햄머
    zh_simp: 蟹钳锤
    zh_trad: 蟹鉗錘
  descriptions:
    jp_kanji: "大きな　ハサミを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The target is hammered with a large pincer. Critical\nhits land more easily."
    fr: "Une grande pince martèle l’ennemi.\nTaux de critiques élevé."
    it: "Danneggia il bersaglio servendosi di una grande\ntenaglia. Probabile brutto colpo."
    de: Schlägt mit Schere zu. Hohe Volltrefferquote.
    es: "Golpea con fuerza con una pinza enorme. Suele asestar\nun golpe crítico."
    ko: "큰 집게를\n상대에게 내리쳐서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用大钳子\n敲打对手进行攻击。\n容易击中要害。"
    zh_trad: "用巨大的鉗子\n敲打對手進行攻擊。\n容易擊中要害。"
crafty_shield:
  names:
    jp_kanji: トリックガード
    en: Crafty Shield
    fr: Vigilance
    it: Truccodifesa
    de: Trickschutz
    es: Truco Defensa
    ko: 트릭가드
    zh_simp: 戏法防守
    zh_trad: 戲法防守
  descriptions:
    jp_kanji: "不思議な　力を　使って\n味方への　変化技を　防ぐ。\nダメージ技は　受けてしまう。"
    en: "The user protects itself and its allies from status\nmoves with a mysterious power. This does not stop\nmoves that do damage."
    fr: "Utilise une force mystérieuse pour protéger l’équipe\ndes capacités de statut. Ne protège pas des autres\ncapacités."
    it: "Grazie a un misterioso potere, protegge chi la usa\ne gli alleati dalle mosse di stato. È tuttavia\ninefficace contro mosse che infliggono danni."
    de: "Schützt mit einer mysteriösen Macht seine Mitstreiter\nund sich vor Status-Attacken, nicht jedoch vor Attacken,\ndie Schaden verursachen."
    es: "Usa unos misteriosos poderes para protegerse a sí\nmismo y a sus aliados de movimientos de estado, pero\nno de otro tipo de ataques."
    ko: "이상한 힘을 사용하여\n같은 편을 공격하는 변화 기술을 막는다.\n데미지 기술은 받는다."
    zh_simp: "使用神奇的力量\n防住攻击我方的变化招式。\n但无法防住伤害招式的攻击。"
    zh_trad: "使用神奇的力量\n防禦住攻擊我方的變化招式。\n但無法防禦住攻擊招式的攻擊。"
cross_chop:
  names:
    jp_kanji: クロスチョップ
    en: Cross Chop
    fr: Coup Croix
    it: Incrocolpo
    de: Kreuzhieb
    es: Tajo Cruzado
    ko: 크로스촙
    zh_simp: 十字劈
    zh_trad: 十字劈
  descriptions:
    jp_kanji: "両手チョップを\n相手に　たたきつけて　攻撃する。\n急所に　当たりやすい。"
    en: "The user delivers a double chop with its forearms\ncrossed. Critical hits land more easily."
    fr: "Le lanceur délivre un coup double en croisant\nles avant-bras. Taux de critiques élevé."
    it: "Investe il bersaglio con un colpo sferrato\ncon entrambe le braccia incrociate.\nProbabile brutto colpo."
    de: "Doppelter Hieb mit den Unterarmen.\nHohe Volltrefferquote."
    es: Corte doble que suele propinar un golpe crítico.
    ko: "양손으로 당수를\n상대에게 힘껏 쳐서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用两手呈十字\n劈打对手进行攻击。\n容易击中要害。"
    zh_trad: "用左右手刀\n劈打對手進行攻擊。\n容易擊中要害。"
cross_poison:
  names:
    jp_kanji: クロスポイズン
    en: Cross Poison
    fr: Poison Croix
    it: Velenocroce
    de: Giftstreich
    es: Veneno X
    ko: 크로스포이즌
    zh_simp: 十字毒刃
    zh_trad: 十字毒刃
  descriptions:
    jp_kanji: "毒の刃で切り裂く。\n急所にも当たりやすい。\n相手を毒状態にすることもある。"
    en: "A slashing attack with a toxic blade that may also\npoison the target. This move has a heightened chance\nof landing a critical hit."
    fr: "Un coup tranchant qui peut empoisonner l’ennemi.\nTaux de critiques élevé."
    it: "Attacco con zanne avvelenate che può anche avvelenare\nil Pokémon colpito. Probabile brutto colpo."
    de: "Ein schneidender Hieb, der das Ziel eventuell vergiftet.\nHat eine hohe Volltrefferquote."
    es: "Tajo que suele ser crítico y puede envenenar al\nobjetivo."
    ko: "독 칼날로 상대를 베어 가른다.\n급소에도 맞기 쉽다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "用毒刃劈开对手。\n容易击中要害，\n有时会让对手陷入中毒状态。"
    zh_trad: "用毒刃劈開對手。\n容易擊中要害。\n有時還會讓對手陷入中毒狀態。"
crunch:
  names:
    jp_kanji: かみくだく
    en: Crunch
    fr: Mâchouille
    it: Sgranocchio
    de: Knirscher
    es: Triturar
    ko: 깨물어부수기
    zh_simp: 咬碎
    zh_trad: 咬碎
  descriptions:
    jp_kanji: "鋭い歯で\n相手をかみくだいて攻撃する。\n相手の守りの力をさげることもある。"
    en: "The user crunches up the target with sharp fangs.\nThis may also lower the target’s defensive stats."
    fr: "Le lanceur mord l’ennemi de ses crocs pointus.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Il bersaglio viene morso con denti affilati e la sua\nforza difensiva può venire ridotta."
    de: "Beißt mit scharfen Reißzähnen zu und senkt eventuell\ndie Defensivkraft des Zieles."
    es: "Tritura con afilados colmillos y puede bajar la defensiva\ndel objetivo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "用利牙咬碎对手进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "用尖銳的牙齒咬碎對手進行攻擊。\n有時還會降低對手的防守力。"
crush_claw:
  names:
    jp_kanji: ブレイククロー
    en: Crush Claw
    fr: Éclate Griffe
    it: Tritartigli
    de: Zermalmklaue
    es: Garra Brutal
    ko: 브레이크크루
    zh_simp: 撕裂爪
    zh_trad: 撕裂爪
  descriptions:
    jp_kanji: "硬く　鋭い　ツメで\n切り裂いて　攻撃する。\n相手の　防御を　さげることが　ある。"
    en: "The user slashes the target with hard and sharp\nclaws. This may also lower the target’s Defense stat."
    fr: "Lacère l’ennemi avec des griffes solides et aiguisées.\nPeut aussi baisser sa Défense."
    it: "Colpisce il bersaglio con artigli robusti e affilati\nche possono ridurne la Difesa."
    de: "Angriff mit scharfen Klauen. Senkt eventuell den\nVerteidigungs-Wert."
    es: "Hace trizas al objetivo con garras afiladas y puede bajar\nsu Defensa."
    ko: "단단하고 날카로운 손톱으로\n베어 갈라서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用坚硬的锐爪\n劈开对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用堅硬的銳爪\n撕裂對手進行攻擊。\n有時會降低對手的防禦。"
crush_grip:
  names:
    jp_kanji: にぎりつぶす
    en: Crush Grip
    fr: Presse
    it: Sbriciolmano
    de: Quetschgriff
    es: Agarrón
    ko: 묵사발
    zh_simp: 捏碎
    zh_trad: 捏碎
  descriptions:
    jp_kanji: "すさまじい力で相手をにぎりつぶす。\n相手のＨＰが残っているほど威力があがる。"
    en: "The target is crushed with great force. The more HP\nthe target has left, the greater this move’s power."
    fr: "Une force puissante écrase l’ennemi. Plus il lui reste\nde PV et plus l’attaque est puissante."
    it: "Colpisce il bersaglio con grande forza. Più PS ha\nil Pokémon colpito, maggiore è la potenza della mossa."
    de: "Ziel wird mit großer Kraft getroffen. Je höher die KP\ndes Zieles, desto stärker die Attacke."
    es: "Estruja al objetivo con gran fuerza. Cuantos más PS le\nqueden al objetivo, más fuerte será el ataque."
    ko: "굉장한 힘으로 상대를 묵사발로 만든다.\n상대의 HP가 남아 있을수록 위력이 올라간다."
    zh_simp: "用骇人的力量捏碎对手。\n对手剩余的ＨＰ越多，\n威力越大。"
    zh_trad: "用驚人的力量捏碎對手。\n對手現有的ＨＰ越多，\n招式的威力越大。"
curse:
  names:
    jp_kanji: のろい
    en: Curse
    fr: Malédiction
    it: Maledizione
    de: Fluch
    es: Maldición
    ko: 저주
    zh_simp: 咒术
    zh_trad: 詛咒
  descriptions:
    jp_kanji: "使う　ポケモンが\nゴーストタイプと　それ以外　とでは\n効果が　変わる。"
    en: "A move that works differently for the Ghost type\nthan for all other types."
    fr: "Une capacité à l’effet différent selon que le lanceur\nest un Pokémon Spectre ou non."
    it: "Una mossa che agisce in modo diverso\nse chi la usa è di tipo Spettro."
    de: "Attacke, deren Wirkung davon abhängt, ob der\nAnwender ein Geister-Pokémon ist."
    es: "Un movimiento que tiene efectos distintos si el usuario\nes de tipo Fantasma o no."
    ko: "기술을 쓰는 포켓몬이\n고스트타입일 때와 그 이외의\n타입일 때는 효과가 다르다."
    zh_simp: "使用该招式的宝可梦，\n其属性是幽灵属性或其他属性时，\n效果会不一样。"
    zh_trad: "使用詛咒時，\n幽靈屬性的寶可夢和其他屬性的寶可夢，\n會獲得不同的招式效果。"
cut:
  names:
    jp_kanji: いあいぎり
    en: Cut
    fr: Coupe
    it: Taglio
    de: Zerschneider
    es: Corte
    ko: 풀베기
    zh_simp: 居合劈
    zh_trad: 居合斬
  descriptions:
    jp_kanji: "カマや　ツメなどで\n相手を　切りつけて　攻撃する。"
    en: The target is cut with a scythe or claw.
    fr: Coupe l’ennemi avec des lames ou des griffes.
    it: Attacca il bersaglio con artigli o falci affilate.
    de: Ein Basisangriff mit Schere oder Klaue.
    es: Corta al adversario con garras, guadañas, etc.
    ko: "낫이나 발톱 등으로\n상대를 베어 공격한다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。"
dark_pulse:
  names:
    jp_kanji: あくのはどう
    en: Dark Pulse
    fr: Vibrobscur
    it: Neropulsar
    de: Finsteraura
    es: Pulso Umbrío
    ko: 악의파동
    zh_simp: 恶之波动
    zh_trad: 惡之波動
  descriptions:
    jp_kanji: "体から悪意にみちた\n恐ろしいオーラを発する。\n攻撃は必ず命中する。"
    en: "The user releases a horrible aura imbued with ill intent.\nThis attack never misses."
    fr: "Le lanceur dégage une horrible aura chargée\nde pensées maléfiques. N’échoue jamais."
    it: "Chi la usa emana un’aura impregnata di oscuri pensieri.\nQuesto attacco è infallibile."
    de: "Anwender greift mit fürchterlicher Aura schlechter\nGedanken an. Die Attacke trifft garantiert."
    es: "Libera una horrible aura llena de malos pensamientos\nque nunca falla."
    ko: "몸에서 악의로 가득한\n무서운 오라를 발한다.\n공격은 반드시 명중한다."
    zh_simp: "从体内发出\n充满恶意的恐怖气场。\n攻击必定会命中。"
    zh_trad: "從身體散發出\n充滿惡意的恐怖氣場。\n攻擊必定會命中。"
dark_void:
  names:
    jp_kanji: ダークホール
    en: Dark Void
    fr: Trou Noir
    it: Vuototetro
    de: Schlummerort
    es: Brecha Negra
    ko: 다크홀
    zh_simp: 暗黑洞
    zh_trad: 暗黑洞
  descriptions:
    jp_kanji: "暗黒の世界に　ひきずり落として\n相手をねむけ状態にしつつ\n守りの力をさげる。"
    en: "The target is dragged into a world of total darkness that\nmakes the target drowsy and lowers its defensive stats."
    fr: "L’ennemi est plongé dans les ténèbres et tombe dans\nun état de somnolence. Baisse la puissance défensive\nde la cible."
    it: "Trascina il bersaglio in un mondo di totale oscurità,\ncausandogli sonnolenza e riducendone la forza difensiva."
    de: "Das Ziel wird in eine Welt der Dunkelheit gezogen\nund schläfrig gemacht. Außerdem sinkt seine\nDefensivkraft."
    es: "El objetivo es enviado a un mundo de tinieblas que lo\ndeja somnoliento y baja su defensiva."
    ko: "암흑의 세계로 끌고 들어가\n상대를 졸음 상태로 만들고\n방어력을 떨어뜨린다."
    zh_simp: "将对手强制拖入黑暗的世界，\n从而让对手陷入瞌睡状态。\n并降低对手的防守力。"
    zh_trad: "將對手強制拉進黑暗的世界，\n讓對手陷入瞌睡狀態，\n並降低對手的防守力。"
darkest_lariat:
  names:
    jp_kanji: ＤＤラリアット
    en: Darkest Lariat
    fr: Dark Lariat
    it: Braccioteso
    de: Dark Lariat
    es: Lariat Oscuro
    ko: DD래리어트
    zh_simp: ＤＤ金勾臂
    zh_trad: ＤＤ金勾臂
  descriptions:
    jp_kanji: "両腕を　回し　相手に　当てる。\n相手の　能力変化に\n関係なく　ダメージを　与える。"
    en: "The user swings both arms and hits the target.\nThe target’s stat changes don’t affect this\nattack’s damage."
    fr: "Le Pokémon étend les bras et frappe l’adversaire\nen tournant violemment. Inflige des dégâts et ignore\nles changements de stats de la cible."
    it: "Chi la usa attacca il bersaglio mulinando gli arti.\nIl danno inflitto ignora le modifiche alle statistiche\ndel bersaglio."
    de: "Der Anwender wirbelt mit beiden Armen und prallt\nso auf das Ziel. Richtet unabhängig von den\nStatusveränderungen des Zieles Schaden an."
    es: "Gira sobre sí mismo y golpea al oponente con ambos\nbrazos. Ignora los cambios en las características del\nobjetivo."
    ko: "양팔을 돌려 상대에게 부딪친다.\n상대의 능력 변화에\n상관없이 데미지를 준다."
    zh_simp: "旋转双臂打向对手。\n无视对手的能力变化，\n直接给予伤害。"
    zh_trad: "旋轉雙臂並打向對手。\n可不顧對手的能力變化\n給予傷害。"
dazzling_gleam:
  names:
    jp_kanji: マジカルシャイン
    en: Dazzling Gleam
    fr: Éclat Magique
    it: Magibrillio
    de: Zauberschein
    es: Brillo Mágico
    ko: 매지컬샤인
    zh_simp: 魔法闪耀
    zh_trad: 魔法閃耀
  descriptions:
    jp_kanji: "強力な光を放ち\n相手にダメージを与える。"
    en: "The user emits a powerful flash of light to inflict damage\non the target."
    fr: "Libère une puissante décharge lumineuse qui inflige\ndes dégâts à l’ennemi."
    it: "Chi la usa emette una luce potentissima che infligge\ndanni al bersaglio."
    de: "Der Anwender feuert einen mächtigen Lichtblitz ab,\nder dem Ziel Schaden zufügt."
    es: Inflige daño al objetivo con una potente luz.
    ko: "강력한 빛을 내어\n상대에게 데미지를 준다."
    zh_simp: "向对手发射强光，\n并给予伤害。"
    zh_trad: "發出強烈的閃光，\n給予對手傷害。"
decorate:
  names:
    jp_kanji: デコレーション
    en: Decorate
    fr: Nappage
    it: Decorazione
    de: Verzierung
    es: Decoración
    ko: 데코레이션
    zh_simp: 装饰
    zh_trad: 裝飾
  descriptions:
    jp_kanji: "かざりつけを　することで\n相手の　攻撃と　特攻を\nぐーんと　上げる。"
    en: "The user sharply raises the target’s Attack and Sp. Atk\nstats by decorating the target."
    fr: "Le lanceur augmente beaucoup l’Attaque et l’Attaque\nSpéciale de la cible en la nappant de glaçage."
    it: "Chi la usa agghinda il bersaglio con delle decorazioni\naumentandone di molto l’Attacco e l’Attacco Speciale."
    de: "Durch Verzierungen werden der Angriff und\nSpezial-Angriff des Zieles stark erhöht."
    es: "Aumenta mucho el Ataque y el Ataque Especial del\nobjetivo al decorarlo."
    ko: "데코레이션을 해서\n상대의 공격과 특수공격을\n크게 올린다."
    zh_simp: "通过装饰，\n大幅提高对方的\n攻击和特攻。"
    zh_trad: "透過裝飾，\n大幅提高對手的\n攻擊和特攻。"
defend_order:
  names:
    jp_kanji: ぼうぎょしれい
    en: Defend Order
    fr: Appel Défense
    it: Comandoscudo
    de: Blockbefehl
    es: A Defender
    ko: 방어지령
    zh_simp: 防御指令
    zh_trad: 防禦指令
  descriptions:
    jp_kanji: "しもべを　呼びだして　自分の　体に\nおおい　つかせる。防御と　特防を\nあげることが　できる。"
    en: "The user calls out its underlings to shield its body,\nraising its Defense and Sp. Def stats."
    fr: "Le lanceur appelle ses sous-fifres pour former\nun bouclier qui augmente sa Défense et sa Défense\nSpéciale."
    it: "Chi la usa raduna i suoi sgherri per creare\nuno scudo, aumentando Difesa e Difesa Speciale."
    de: "Untergebene bilden einen lebenden Schild um\nden Anwender. Erhöht Verteidigung und\nSpezial-Verteidigung."
    es: "El usuario llama a sus súbditos para que formen un\nescudo viviente. Sube la Defensa y la Defensa Especial."
    ko: "부하를 불러내어 자신의 몸을\n뒤덮게 한다. 방어와 특수방어를\n올릴 수 있다."
    zh_simp: "召唤手下，\n让其附在自己的身体上。\n可以提高自己的防御和特防。"
    zh_trad: "呼喚手下，覆蓋住自己的身體。\n可提高自己的防禦和特防。"
defense_curl:
  names:
    jp_kanji: まるくなる
    en: Defense Curl
    fr: Boul’Armure
    it: Ricciolscudo
    de: Einigler
    es: Rizo Defensa
    ko: 웅크리기
    zh_simp: 变圆
    zh_trad: 變圓
  descriptions:
    jp_kanji: "体を　まるめて　ちぢこまり\n自分の　防御を　あげる。"
    en: "The user curls up to conceal weak spots and raise\nits Defense stat."
    fr: "Le lanceur s’enroule pour cacher ses points faibles,\nce qui augmente sa Défense."
    it: "Chi la usa si raggomitola per nascondere\ni punti deboli e aumentare la propria Difesa."
    de: "Verbirgt Schwächen durch Einrollen und hebt\ngleichzeitig den Verteidigungs-Wert."
    es: "Se enrosca para ocultar sus puntos débiles y aumentar\nla Defensa."
    ko: "몸을 둥글게 웅크려서\n자신의 방어를 올린다."
    zh_simp: "将身体蜷曲变圆，\n从而提高自己的防御。"
    zh_trad: "將身體蜷縮成圓形，\n提高自己的防禦。"
defog:
  names:
    jp_kanji: きりばらい
    en: Defog
    fr: Anti-Brume
    it: Scacciabruma
    de: Auflockern
    es: Despejar
    ko: 안개제거
    zh_simp: 清除浓雾
    zh_trad: 清除濃霧
  descriptions:
    jp_kanji: "強い風で　相手の　リフレクターや\nひかりのかべ　などを　はらいのける。\n回避率も　さげる。"
    en: "A strong wind blows away the target’s barriers such\nas Reflect or Light Screen. This also lowers the\ntarget’s evasiveness."
    fr: "Un grand coup de vent qui disperse la Protection\nou le Mur Lumière de l’ennemi. Diminue aussi\nson Esquive."
    it: "Chi la usa spazza via barriere come Riflesso e\nSchermoluce con un forte vento e riduce\nla capacità d’elusione del bersaglio."
    de: "Starker Wind hebt Attacken wie Reflektor und\nLichtschild des Zieles auf. Senkt außerdem den\nAusweichwert."
    es: "Potente viento que barre el reflejo o la pantalla de luz\ncreada por el objetivo. También puede reducir su\nEvasión."
    ko: "강한 바람으로 상대의 리플렉터나\n빛의장막 등을 제거한다.\n회피율도 떨어뜨린다."
    zh_simp: "用强风吹开对手的\n反射壁或光墙等。\n也会降低对手的闪避率。"
    zh_trad: "用強風吹開對手的\n反射壁或光牆等。\n也會降低對手的閃避率。"
destiny_bond:
  names:
    jp_kanji: みちづれ
    en: Destiny Bond
    fr: Lien du Destin
    it: Destinobbligato
    de: Abgangsbund
    es: Mismo Destino
    ko: 길동무
    zh_simp: 同命
    zh_trad: 同命
  descriptions:
    jp_kanji: "技のあと　相手の　攻撃で　ひんしに\nなると　攻撃　相手も　ひんしにする。\n連続して　出すと　失敗する。"
    en: "After using this move, if the user faints, the\nPokémon that landed the knockout hit also faints.\nIts chance of failing rises if it is used in succession."
    fr: "Si un ennemi porte un coup fatal au lanceur après qu’il\na activé cette capacité, ils sont tous les deux mis K.O.\nLa capacité échoue si elle est immédiatement réutilisée."
    it: "Se chi la usa va KO a causa di un attacco,\nchi ha sferrato il colpo da KO fa la stessa fine.\nSe usata in successione fallisce."
    de: "Wird der Anwender nach Einsatz dieser Attacke\nkampfunfähig, führt dies auch beim Pokémon, das\nihn besiegt hat, zum K.O. Scheitert bei Wiederholung."
    es: "Si el usuario se debilita por un ataque rival antes de\nusar otro movimiento, el Pokémon rival se debilitará\ntambién. Puede fallar si se usa repetidamente."
    ko: "기술을 쓴 뒤 상대의 공격으로 기절했을 때\n공격 상대도 기절하게 한다.\n연속으로 쓰면 실패한다."
    zh_simp: "使出招式后，当受到对手攻击\n陷入昏厥时，对手也会一同昏厥。\n连续使出则会失败。"
    zh_trad: "使出招式後，當受到對手攻擊，\n陷入瀕死時，對手也會一同陷入瀕死。\n連續使用時會失敗。"
detect:
  names:
    jp_kanji: みきり
    en: Detect
    fr: Détection
    it: Individua
    de: Scanner
    es: Detección
    ko: 판별
    zh_simp: 看穿
    zh_trad: 看穿
  descriptions:
    jp_kanji: "相手の　攻撃を\nまったく　受けない。\n連続で　だすと　失敗しやすい。"
    en: "This move enables the user to protect itself from\nall attacks. Its chance of failing rises if it is used\nin succession."
    fr: "Le lanceur se protège de toutes les attaques.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Permette di eludere tutti gli attacchi.\nSe usata in successione può fallire."
    de: "Anwender wehrt jede Attacke ab. Scheitert eventuell\nbei Wiederholung."
    es: "Frena todos los ataques, pero puede fallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "完全抵挡\n对手的攻击。\n连续使出则容易失败。"
    zh_trad: "完全防住對手的所有攻擊。\n連續使用時容易失敗。"
devastating_drake:physical:
  names:
    jp_kanji: アルティメットドラゴンバーン
    en: Devastating Drake
    fr: Chaos Draconique
    it: Dragoschianto Finale
    de: Drastisches Drachendröhnen
    es: Dracoaliento Devastador
    ko: 얼티메이트드래곤번
    zh_simp: 究极巨龙震天地
    zh_trad: 究極巨龍震天地
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
devastating_drake:special:
  names:
    jp_kanji: アルティメットドラゴンバーン
    en: Devastating Drake
    fr: Chaos Draconique
    it: Dragoschianto Finale
    de: Drastisches Drachendröhnen
    es: Dracoaliento Devastador
    ko: 얼티메이트드래곤번
    zh_simp: 究极巨龙震天地
    zh_trad: 究極巨龍震天地
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
diamond_storm:
  names:
    jp_kanji: ダイヤストーム
    en: Diamond Storm
    fr: Orage Adamantin
    it: Diamantempesta
    de: Diamantsturm
    es: Torm. Diamantes
    ko: 다이아스톰
    zh_simp: 钻石风暴
    zh_trad: 鑽石風暴
  descriptions:
    jp_kanji: "ダイヤの　嵐を　巻き起こし\nダメージを　与える。　自分の\n防御を　ぐーんと　あげることが　ある。"
    en: "The user whips up a storm of diamonds to damage\nopposing Pokémon. This may also sharply raise the\nuser’s Defense stat."
    fr: "Provoque une tempête de diamants qui inflige\ndes dégâts. Peut beaucoup augmenter la Défense\ndu lanceur."
    it: "Colpisce i nemici che ha intorno con una tempesta\ndi diamanti. Può anche aumentare di molto la Difesa\ndi chi la usa."
    de: "Der Anwender beschwört einen zerstörerischen\nDiamantsturm herauf. Kann die Verteidigung des\nAnwenders stark erhöhen."
    es: "Desata un devastador vendaval de diamantes para\ndañar a los oponentes. Puede aumentar mucho la\nDefensa del usuario."
    ko: "다이아 폭풍을 일으켜\n데미지를 준다. 자신의\n방어를 크게 올릴 때가 있다."
    zh_simp: "掀起钻石风暴给予伤害。\n有时会大幅提高自己的防御。"
    zh_trad: "吹起鑽石風暴給予對手傷害。\n有時會大幅提高自己的防禦。"
dig:
  names:
    jp_kanji: あなをほる
    en: Dig
    fr: Tunnel
    it: Fossa
    de: Schaufler
    es: Excavar
    ko: 구멍파기
    zh_simp: 挖洞
    zh_trad: 挖洞
  descriptions:
    jp_kanji: "１ターン目に　潜り　２ターン目で\n相手を　攻撃する。"
    en: "The user burrows into the ground, then attacks on\nthe next turn."
    fr: Le lanceur creuse au premier tour et frappe au second.
    it: Chi la usa scava al primo turno e attacca al successivo.
    de: "In Runde 1 gräbt sich der Anwender ein und in Runde 2\ngreift er an."
    es: "El usuario cava durante el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 파고들어 2턴째에\n상대를 공격한다."
    zh_simp: "第１回合钻入，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合潛入地底，\n並於第２回合攻擊對手。"
dire_claw:
  names:
    jp_kanji: フェイタルクロー
    en: Dire Claw
    fr: Griffes Funestes
    it: Artigli Fatali
    de: Unheilsklauen
    es: Garra Nociva
    ko: 페이탈클로
    zh_simp: 克命爪
    zh_trad: 剋命爪
  descriptions:
    jp_kanji: "破滅的なツメで急所を狙って攻撃。\n相手を毒　まひ　ねむけの\nいずれかの状態にすることもある。"
    en: "The user lashes out at the target with ruinous claws,\naiming to land a critical hit. This may also leave the\ntarget poisoned, paralyzed, or drowsy."
    fr: "Le lanceur attaque avec des griffes destructrices\nen visant les points faibles. La cible peut aussi être\nempoisonnée, paralysée, ou prise de somnolence."
    it: "Chi la usa attacca il bersaglio con artigli distruttori\nmirando a un brutto colpo. Può anche causargli\navvelenamento, paralisi o sonnolenza."
    de: "Der Anwender greift mit zerstörerischen Klauen die\nSchwachstelle des Zieles an. Dieses wird eventuell\nvergiftet, paralysiert oder schläfrig gemacht."
    es: "Ataca al punto débil del objetivo con unas garras\nletales que pueden envenenarlo, paralizarlo o dejarlo\nsomnoliento."
    ko: "치명적인 손톱으로 급소를 노려 공격한다.\n상대를 독, 마비, 졸음 중\n하나의 상태로 만들 때가 있다."
    zh_simp: "以破灭之爪瞄准要害进行攻击。\n有时还会让对手陷入中毒、\n麻痹、瞌睡之中的一种状态。"
    zh_trad: "以破滅之爪瞄準要害進行攻擊。\n有時還會讓對手陷入中毒、\n麻痺、瞌睡之中的一種狀態。"
disable:
  names:
    jp_kanji: かなしばり
    en: Disable
    fr: Entrave
    it: Inibitore
    de: Aussetzer
    es: Anulación
    ko: 사슬묶기
    zh_simp: 定身法
    zh_trad: 定身法
  descriptions:
    jp_kanji: "相手の　動きを　とめて\n直前に　だしていた　技を\n４ターンの　間　使えなくする。"
    en: "For four turns, this move prevents the target from\nusing the move it last used."
    fr: "Empêche l’ennemi d’employer à nouveau\nsa dernière attaque. Dure quatre tours."
    it: "Per quattro turni impedisce al bersaglio\ndi riutilizzare l’ultima mossa usata."
    de: "Die zuletzt eingesetzte Attacke des Zieles wird für\nvier Runden blockiert."
    es: "Desactiva el último movimiento del objetivo durante\ncuatro turnos."
    ko: "상대의 움직임을 막아\n바로 전에 쓴 기술을\n4턴 동안 사용할 수 없게 만든다."
    zh_simp: "阻碍对手行动，\n之前使出的招式\n将在４回合内无法使用。"
    zh_trad: "阻止對手出招，\n最近一次使用的招式\n在４回合內無法使用。"
disarming_voice:
  names:
    jp_kanji: チャームボイス
    en: Disarming Voice
    fr: Voix Enjôleuse
    it: Incantavoce
    de: Säuselstimme
    es: Voz Cautivadora
    ko: 차밍보이스
    zh_simp: 魅惑之声
    zh_trad: 魅惑之聲
  descriptions:
    jp_kanji: "魅惑の　鳴き声を　だして　相手に\n精神的な　ダメージを　与える。\n攻撃は　必ず　命中　する。"
    en: "Letting out a charming cry, the user does emotional\ndamage to opposing Pokémon. This attack\nnever misses."
    fr: "Laisse s’échapper une voix enchanteresse qui inflige\ndes dégâts psychiques à l’ennemi.\nTouche à coup sûr."
    it: "Chi la usa infligge un danno spirituale ai nemici nei\nparaggi con una voce suadente. L’attacco andrà\nimmancabilmente a segno."
    de: "Der Anwender stößt einen bezirzenden Ruf aus, mit\ndem er gegnerische Pokémon in seinen Bann schlägt\nund ihnen mentalen Schaden zufügt. Trifft garantiert."
    es: "Obnubila a los oponentes con su fascinante voz y les\nprovoca daños emocionales. Siempre acierta al objetivo."
    ko: "매혹적인 울음소리를 내어\n상대에게 정신적 데미지를 준다.\n공격은 반드시 명중한다."
    zh_simp: "发出魅惑的叫声，\n给予对手精神上的伤害。\n攻击必定会命中。"
    zh_trad: "發出迷人的叫聲，\n給予對手精神上的傷害。\n攻擊必定會命中。"
discharge:
  names:
    jp_kanji: ほうでん
    en: Discharge
    fr: Coup d’Jus
    it: Scarica
    de: Ladungsstoß
    es: Chispazo
    ko: 방전
    zh_simp: 放电
    zh_trad: 放電
  descriptions:
    jp_kanji: "まばゆい　電撃で　自分の\n周りに　いるものを　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user strikes everything around it by letting loose\na flare of electricity. This may also cause paralysis."
    fr: "Un flamboiement d’électricité frappe tous les Pokémon\nautour du lanceur. Peut aussi les paralyser."
    it: "Chi la usa colpisce i Pokémon che ha intorno\ncon un bagliore elettrico. Può anche paralizzarli."
    de: "Anwender greift alle Pokémon im Umkreis mit\nElektrizität an. Diese werden eventuell auch paralysiert."
    es: "Una deslumbradora onda eléctrica afecta a los Pokémon\nque hay combatiendo alrededor. Puede paralizar."
    ko: "눈부신 전격으로 자신의\n주위에 있는 포켓몬을 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用耀眼的电击\n攻击自己周围所有的宝可梦。\n有时会让其他宝可梦陷入麻痹状态。"
    zh_trad: "用耀眼的電流\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入麻痺狀態。"
dive:
  names:
    jp_kanji: ダイビング
    en: Dive
    fr: Plongée
    it: Sub
    de: Taucher
    es: Buceo
    ko: 다이빙
    zh_simp: 潜水
    zh_trad: 潛水
  descriptions:
    jp_kanji: "１ターン目で　潜り　２ターン目に\n浮きあがって　攻撃する。"
    en: "Diving on the first turn, the user floats up and\nattacks on the next turn."
    fr: "Le lanceur plonge sous l’eau au premier tour\net frappe au second."
    it: "Chi la usa si tuffa in acqua per emergere\ne attaccare al turno successivo."
    de: "Anwender taucht in Runde 1 ab und greift in Runde 2\naus der Tiefe an."
    es: "El usuario se sumerge en el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 잠수했다가 2턴째에\n떠올라 공격한다."
    zh_simp: "第１回合潜入，\n第２回合浮上来进行攻击。"
    zh_trad: "使用後的第１回合潛入水中，\n並於第２回合浮上來進行攻擊。"
dizzy_punch:
  names:
    jp_kanji: ピヨピヨパンチ
    en: Dizzy Punch
    fr: Uppercut
    it: Stordipugno
    de: Irrschlag
    es: Puño Mareo
    ko: 잼잼펀치
    zh_simp: 迷昏拳
    zh_trad: 迷昏拳
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
doom_desire:
  names:
    jp_kanji: はめつのねがい
    en: Doom Desire
    fr: Vœu Destructeur
    it: Obbliderio
    de: Kismetwunsch
    es: Deseo Oculto
    ko: 파멸의소원
    zh_simp: 破灭之愿
    zh_trad: 破滅之願
  descriptions:
    jp_kanji: "技を　使った　２ターン後に\n無数の　光の　束で\n相手を　攻撃する。"
    en: "Two turns after this move is used, a concentrated\nbundle of light blasts the target."
    fr: "Le lanceur génère une sphère lumineuse qu’il projette\nsur l’ennemi deux tours plus tard."
    it: "Intenso fascio di luce che colpisce il bersaglio\ndopo due turni dall’uso della mossa."
    de: "Angriff mit gebündeltem Licht erfolgt zwei Runden\nnach Attackeneinsatz."
    es: Concentra un haz de luz y ataca dos turnos después.
    ko: "기술을 사용한 2턴 뒤에\n무수한 빛의 다발이\n상대를 공격한다."
    zh_simp: "使用招式２回合后，\n会用无数道光束攻击对手。"
    zh_trad: "使用招式的２回合後，\n向對手發射無數道光束\n進行攻擊。"
double_edge:
  names:
    jp_kanji: すてみタックル
    en: Double-Edge
    fr: Damoclès
    it: Sdoppiatore
    de: Risikotackle
    es: Doble Filo
    ko: 이판사판태클
    zh_simp: 舍身冲撞
    zh_trad: 捨身衝撞
  descriptions:
    jp_kanji: "命を懸けて\n相手に突進して攻撃する。\n自分もダメージを受ける。"
    en: "A reckless, life-risking tackle in which the user rushes\nthe target. This also damages the user."
    fr: "Une charge dangereuse et imprudente.\nBlesse également le lanceur."
    it: "Carica spietata e pericolosa che danneggia anche\nchi la usa."
    de: "Lebensgefährlicher Angriff, bei dem sich der Anwender\nselbst verletzt."
    es: Ataque arriesgado que también hiere al agresor.
    ko: "목숨을 걸고\n상대에게 돌진하여 공격을 한다.\n자신도 데미지를 입는다."
    zh_simp: "拼命地猛撞向对手进行攻击。\n自己也会受到伤害。"
    zh_trad: "捨身衝撞對手進行攻擊。\n自己也會受到傷害。"
double_hit:
  names:
    jp_kanji: ダブルアタック
    en: Double Hit
    fr: Coup Double
    it: Doppiosmash
    de: Doppelschlag
    es: Doble Golpe
    ko: 더블어택
    zh_simp: 二连击
    zh_trad: 二連擊
  descriptions:
    jp_kanji: "力強く構えることで\n技で与えるダメージが１．５倍になる。"
    en: "The user adopts a hard-hitting stance to increase the\ndamage dealt by its moves by 50 percent."
    fr: "Le lanceur prend une puissante posture de combat\nafin d’infliger une fois et demie plus de dégâts."
    it: "Chi la usa assume una posa combattiva per far\naumentare i danni inflitti del 50%."
    de: "Der Anwender nimmt eine konzentrierte Kampfhaltung\nein, wodurch er 50 % mehr Schaden anrichtet."
    es: "El usuario adopta una postura fuerte y hace que los\nmovimientos consecuentes causen un 50 % más de\ndaño."
    ko: "강하게 공격할 자세를 취하여\n기술로 주는 데미지가 1.5배가 된다."
    zh_simp: "摆起强而有力的架势\n让招式给予的伤害变成１.５倍。"
    zh_trad: "擺出強而有力的架勢，\n讓招式給予的傷害變成１.５倍。"
double_iron_bash:
  names:
    jp_kanji: ダブルパンツァー
    en: Double Iron Bash
    fr: Écrous d’Poing
    it: Pugni Corazzati
    de: Panzerfäuste
    es: Ferropuño Doble
    ko: 더블펀처
    zh_simp: 钢拳双击
    zh_trad: 鋼拳雙擊
  descriptions:
    jp_kanji: "胸の　ナットを　軸に　回転して\n２回　続けて　うでを　たたきつける。\n相手を　ひるませる　ことが　ある。"
    en: "The user rotates, centering the hex nut in its chest,\nand then strikes with its arms twice in a row. This may\nalso make the target flinch."
    fr: "Le lanceur fait pivoter l’écrou de sa poitrine deux fois\nd’affilée pour frapper l’adversaire avec ses bras.\nPeut apeurer l’ennemi."
    it: "Chi la usa attacca il bersaglio due volte ruotando su se\nstesso e colpendolo con le braccia. Può anche farlo\ntentennare."
    de: "Der Anwender rotiert um die Schraubenmutter in\nseinem Brustkorb und schlägt zweimal hintereinander\nmit den Armen zu. Das Ziel schreckt eventuell zurück."
    es: "Usando la tuerca del pecho como eje, gira sobre sí\nmismo y golpea con los brazos dos veces seguidas.\nPuede amedrentar al rival."
    ko: "가슴의 너트를 축으로 회전시켜\n2번 연속 팔로 힘껏 친다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "以胸口的螺帽为中心旋转，\n并连续２次挥动手臂打击对手。\n有时会使对手畏缩。"
    zh_trad: "以胸口的螺帽為軸心旋轉，\n連續２次揮動手臂痛擊對手。\n有時會使對手畏縮。"
double_kick:
  names:
    jp_kanji: にどげり
    en: Double Kick
    fr: Double Pied
    it: Doppiocalcio
    de: Doppelkick
    es: Doble Patada
    ko: 두번치기
    zh_simp: 二连踢
    zh_trad: 二連踢
  descriptions:
    jp_kanji: "２本の　足で　相手を　けとばして\n攻撃する。　２回連続で\nダメージを　与える。"
    en: "The target is quickly kicked twice in succession\nusing both feet."
    fr: "Deux coups de pied qui frappent l’ennemi deux fois\nd’affilée."
    it: "Colpisce il bersaglio due volte con una raffica\ndi calci inferti con entrambi i piedi."
    de: Der Anwender tritt in einer Runde zweimal schnell zu.
    es: Una patada doble. Golpea dos veces.
    ko: "2개의 다리로 상대를 걷어차서\n공격한다. 2회 연속으로\n데미지를 준다."
    zh_simp: "用２只脚踢飞对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用２隻腳踢飛對手進行攻擊。\n連續２次給予傷害。"
double_slap:
  names:
    jp_kanji: おうふくビンタ
    en: Double Slap
    fr: Torgnoles
    it: Doppiasberla
    de: Duplexhieb
    es: Doble Bofetón
    ko: 연속뺨치기
    zh_simp: 连环巴掌
    zh_trad: 連環巴掌
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
double_team:
  names:
    jp_kanji: かげぶんしん
    en: Double Team
    fr: Reflet
    it: Doppioteam
    de: Doppelteam
    es: Doble Equipo
    ko: 그림자분신
    zh_simp: 影子分身
    zh_trad: 影子分身
  descriptions:
    jp_kanji: "素早い　動きで　分身を　つくり\n相手を　まどわせて\n回避率を　あげる。"
    en: "By moving rapidly, the user makes illusory copies of\nitself to raise its evasiveness."
    fr: "Le lanceur se déplace si vite qu’il crée des copies\nillusoires de lui-même, augmentant son Esquive."
    it: "Chi la usa si muove in fretta e crea copie illusorie\ndi se stesso che aumentano la capacità di elusione."
    de: "Erzeugt durch schnelle Bewegungen Ebenbilder,\num den Ausweichwert zu erhöhen."
    es: Crea copias de sí mismo para mejorar la Evasión.
    ko: "재빠른 움직임으로 분신을 만들어\n상대에게 혼동을 유발해\n회피율을 올린다."
    zh_simp: "通过快速移动来制造分身，\n扰乱对手，从而提高闪避率。"
    zh_trad: "利用快速移動\n製造出分身擾亂對手，\n提高自己的閃避率。"
draco_meteor:
  names:
    jp_kanji: りゅうせいぐん
    en: Draco Meteor
    fr: Draco-Météore
    it: Dragobolide
    de: Draco Meteor
    es: Cometa Draco
    ko: 용성군
    zh_simp: 流星群
    zh_trad: 流星群
  descriptions:
    jp_kanji: "天空から隕石を相手に落とす。\n自分の攻めの力がさがる。"
    en: "Comets are summoned down from the sky onto the\ntarget. The recoil from this move lowers the user’s\noffensive stats."
    fr: "Le lanceur invoque des comètes qui s’abattent sur\nl’ennemi. Baisse la puissance offensive du lanceur."
    it: "Chi la usa attacca con meteore che cadono dal cielo, ma\nla sua forza offensiva diminuisce."
    de: "Kometen werden heraufbeschworen. Senkt die\nOffensivkraft des Anwenders."
    es: "Hace que grandes cometas caigan del cielo sobre el\nobjetivo. Baja la ofensiva del usuario."
    ko: "천공에서 운석을 상대에게 떨어뜨린다.\n자신의 공격력이 떨어진다."
    zh_simp: "从天空中向对手落下陨石。\n自己的进攻力会降低。"
    zh_trad: "讓隕石從空中落下以攻擊對手。\n自己的進攻力會降低。"
dragon_ascent:
  names:
    jp_kanji: ガリョウテンセイ
    en: Dragon Ascent
    fr: Draco-Ascension
    it: Ascesa del Drago
    de: Zenitstürmer
    es: Ascenso Draco
    ko: 화룡점정
    zh_simp: 画龙点睛
    zh_trad: 畫龍點睛
  descriptions:
    jp_kanji: "大空から　急速落下　して\n相手を　攻撃する。\n自分の　防御と　特防が　さがる。"
    en: "After soaring upward, the user attacks its target by\ndropping out of the sky at high speeds. But it lowers\nits own Defense and Sp. Def stats in the process."
    fr: "Le Pokémon s’abat à toute vitesse sur la cible\ndepuis les hautes couches de l’atmosphère.\nBaisse la Défense et la Défense Spéciale du lanceur."
    it: "Permette di proiettarsi in aria e fiondarsi\nsul bersaglio attaccando ad altissima velocità.\nRiduce la Difesa e la Difesa Speciale di chi la usa."
    de: "Der Anwender greift das Ziel aus atemberaubender\nHöhe im Sturzflug an. Senkt Verteidigung und\nSpezial-Verteidigung des Anwenders."
    es: "El usuario se precipita desde el cielo a una velocidad\nde vértigo para atacar al objetivo, pero hace que bajen\nla Defensa y la Defensa Especial del usuario."
    ko: "넓은 하늘에서 급속으로 강하하여\n상대를 공격한다.\n자신의 방어와 특수방어가 떨어진다."
    zh_simp: "从天空中急速下降攻击对手。\n自己的防御和特防会降低。"
    zh_trad: "從天空中急速下降攻擊對手。\n自己的防禦和特防會降低。"
dragon_breath:
  names:
    jp_kanji: りゅうのいぶき
    en: Dragon Breath
    fr: Draco-Souffle
    it: Dragospiro
    de: Feuerodem
    es: Dragoaliento
    ko: 용의숨결
    zh_simp: 龙息
    zh_trad: 龍息
  descriptions:
    jp_kanji: "ものすごい　息を\n相手に　吹きつけて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user exhales a mighty gust that inflicts damage.\nThis may also leave the target with paralysis."
    fr: "Le lanceur souffle fort sur l’ennemi pour lui infliger\ndes dégâts. Peut aussi le paralyser."
    it: "Investe il bersaglio con una raffica potentissima\nche arreca danni. Può anche paralizzarlo."
    de: "Fegt das Ziel mit zerstörerisch heißem Atem weg.\nParalysiert das Ziel eventuell."
    es: "Poderosa ráfaga de aliento que golpea al objetivo y\npuede paralizarlo."
    ko: "굉장한 숨결을\n상대에게 내뿜어 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "将强烈的气息\n吹向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "將強烈的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
dragon_claw:
  names:
    jp_kanji: ドラゴンクロー
    en: Dragon Claw
    fr: Draco-Griffe
    it: Dragartigli
    de: Drachenklaue
    es: Garra Dragón
    ko: 드래곤크루
    zh_simp: 龙爪
    zh_trad: 龍爪
  descriptions:
    jp_kanji: "鋭く　とがった巨大なツメで\n相手を切り裂いて攻撃する。\n急所に当たりやすい。"
    en: "The user slashes the target with huge, sharp claws.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur lacère l’ennemi de ses grandes griffes\naiguisées. Taux de critiques élevé."
    it: "Chi la usa attacca con artigli affilati che graffiano\nil bersaglio rapidamente e con grande forza.\nProbabile brutto colpo."
    de: "Der Anwender greift das Ziel mit riesigen, scharfen\nKlauen an. Hohe Volltrefferquote."
    es: Araña al objetivo con garras afiladas. Suele ser crítico.
    ko: "날카롭고 뾰족한 거대한 발톱으로\n상대를 베어 갈라서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用尖锐的巨爪\n劈开对手进行攻击。\n容易击中要害。"
    zh_trad: "用尖銳的巨爪\n撕裂對手進行攻擊。\n容易擊中要害。"
dragon_dance:
  names:
    jp_kanji: りゅうのまい
    en: Dragon Dance
    fr: Danse Draco
    it: Dragodanza
    de: Drachentanz
    es: Danza Dragón
    ko: 용의춤
    zh_simp: 龙之舞
    zh_trad: 龍之舞
  descriptions:
    jp_kanji: "神秘的で　力強い　舞を\n激しく　おどる。　自分の\n攻撃と　素早さを　あげる。"
    en: "The user vigorously performs a mystic, powerful\ndance that raises its Attack and Speed stats."
    fr: "Une danse mystique dont le rythme effréné\naugmente l’Attaque et la Vitesse du lanceur."
    it: "Danza mistica e vigorosa che aumenta l’Attacco\ne la Velocità di chi la usa."
    de: "Ein mystischer Tanz, der den Angriffs- und\nInitiative-Wert erhöht."
    es: Danza mística que sube el Ataque y la Velocidad.
    ko: "신비롭고 힘센 춤을\n격렬하게 춘다. 자신의\n공격과 스피드를 올린다."
    zh_simp: "激烈地跳起神秘\n且强有力的舞蹈。\n从而提高自己的攻击和速度。"
    zh_trad: "激烈地跳起神秘又強而有力的舞蹈。\n提高自己的攻擊和速度。"
dragon_darts:
  names:
    jp_kanji: ドラゴンアロー
    en: Dragon Darts
    fr: Draco-Flèches
    it: Dragofrecce
    de: Drachenpfeile
    es: Dracoflechas
    ko: 드래곤애로
    zh_simp: 龙箭
    zh_trad: 龍箭
  descriptions:
    jp_kanji: "ドラメシヤで　２回　攻撃。\n相手が　２匹　いるときは\nそれぞれに　１回ずつ　攻撃する。"
    en: "The user attacks twice using Dreepy. If there are two\ntargets, this move hits each target once."
    fr: "Le lanceur attaque en propulsant deux Fantyrm.\nS’il y a deux adversaires, chacun d’entre eux\nest frappé par un Fantyrm."
    it: "Chi la usa attacca due volte sparando Dreepy.\nQuando sono presenti due bersagli, vengono colpiti\nentrambi una sola volta."
    de: "Der Anwender greift zweimal mit Grolldra an. Bei zwei\nZielen werden beide jeweils einmal angegriffen."
    es: "El usuario ataca propulsando a ambos Dreepy. En caso\nde haber dos adversarios, cada Dreepy golpea a su\npropio objetivo por separado."
    ko: "드라꼰으로 2번 공격한다.\n상대가 2마리일 때는\n각각 1번씩 공격한다."
    zh_simp: "让多龙梅西亚进行２次攻击。\n如果对手有２只宝可梦，\n则对它们各进行１次攻击。"
    zh_trad: "讓多龍梅西亞進行２次攻擊。\n當對手場上有２隻寶可夢時，\n則向牠們各進行１次攻擊。"
dragon_energy:
  names:
    jp_kanji: ドラゴンエナジー
    en: Dragon Energy
    fr: Draco-Énergie
    it: Dragoenergia
    de: Drachenkräfte
    es: Dracoenergía
    ko: 드래곤에너지
    zh_simp: 巨龙威能
    zh_trad: 巨龍威能
  descriptions:
    jp_kanji: "生命力を　パワーに　変え　相手を\n攻撃する。　自分の　ＨＰが　少ないほど\n技の　威力は　さがる。"
    en: "Converting its life-force into power, the user attacks\nopposing Pokémon. The lower the user’s HP, the lower\nthe move’s power."
    fr: "Le lanceur utilise son énergie vitale pour attaquer\nl’ennemi. Moins il a de PV, moins l’attaque est puissante."
    it: "Il Pokémon attacca i nemici convertendo la propria\nforza vitale in energia. La potenza della mossa cala\nman mano che i PS diminuiscono."
    de: "Der Anwender wandelt seine Lebenskraft in Energie um\nund greift gegnerische Pokémon an. Je höher seine\nKP sind, desto mehr Schaden wird angerichtet."
    es: "El usuario convierte su fuerza vital en una energía con\nla que ataca al objetivo. Cuantos menos PS tenga el\nusuario, menor será la potencia del movimiento."
    ko: "생명력을 파워로 바꿔서 상대를 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 떨어진다."
    zh_simp: "把生命力转换为力量攻击对手。\n自己的ＨＰ越少，招式的威力越小。"
    zh_trad: "將生命力化為力量攻擊對手。\n自己的ＨＰ越少，招式的威力越小。"
dragon_hammer:
  names:
    jp_kanji: ドラゴンハンマー
    en: Dragon Hammer
    fr: Draco-Marteau
    it: Marteldrago
    de: Drachenhammer
    es: Martillo Dragón
    ko: 드래곤해머
    zh_simp: 龙锤
    zh_trad: 龍錘
  descriptions:
    jp_kanji: "体を　ハンマーのように\n使って　相手に　襲いかかり\nダメージを　与える。"
    en: "The user uses its body like a hammer to attack the\ntarget and inflict damage."
    fr: "Le lanceur utilise son corps comme un véritable\nmarteau pour écraser la cible."
    it: "Chi la usa infligge danni al bersaglio usando\nil proprio corpo come se fosse un martello."
    de: "Der Anwender nutzt seinen Körper wie einen Hammer\nund stürzt sich auf das Ziel, wodurch dieses Schaden\nerleidet."
    es: "Usa el cuerpo como un martillo para abalanzarse sobre\nsu rival y causarle daño."
    ko: "몸을 해머처럼 써서\n상대를 덮쳐\n데미지를 준다."
    zh_simp: "将身体当作锤子，\n向对手发动袭击，\n给予伤害。"
    zh_trad: "像錘子般地使用身體\n向對手發動襲擊，\n給予傷害。"
dragon_pulse:
  names:
    jp_kanji: りゅうのはどう
    en: Dragon Pulse
    fr: Draco-Choc
    it: Dragopulsar
    de: Drachenpuls
    es: Pulso Dragón
    ko: 용의파동
    zh_simp: 龙之波动
    zh_trad: 龍之波動
  descriptions:
    jp_kanji: "大きな口から衝撃波を\nまきおこして相手を攻撃する。\n攻撃は必ず命中する。"
    en: "The target is attacked with a shock wave generated\nby the user’s gaping mouth. This attack never misses."
    fr: "Le lanceur ouvre la bouche pour envoyer\nune onde de choc qui frappe l’ennemi.\nN’échoue jamais."
    it: "Chi la usa spalanca la bocca e genera un’onda d’urto\nche colpisce il bersaglio. Questo attacco è infallibile."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie aus dem offenen Maul des Anwenders kommt.\nDie Attacke trifft garantiert."
    es: "Abre mucho la boca y libera una onda de choque que\nataca al objetivo y nunca falla."
    ko: "큰 입으로 충격파를\n일으켜서 상대를 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "从大大的口中\n掀起冲击波攻击对手。\n攻击必定会命中。"
    zh_trad: "從張大的口中\n發射衝擊波攻擊對手。\n攻擊必定會命中。"
dragon_rage:
  names:
    jp_kanji: りゅうのいかり
    en: Dragon Rage
    fr: Draco-Rage
    it: Ira di Drago
    de: Drachenwut
    es: Furia Dragón
    ko: 용의분노
    zh_simp: 龙之怒
    zh_trad: 龍之怒
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
dragon_rush:
  names:
    jp_kanji: ドラゴンダイブ
    en: Dragon Rush
    fr: Draco-Charge
    it: Dragofuria
    de: Drachenstoß
    es: Carga Dragón
    ko: 드래곤다이브
    zh_simp: 龙之俯冲
    zh_trad: 龍之俯衝
  descriptions:
    jp_kanji: "すさまじい　殺気で　威圧しながら\n体当たりする。\n相手を　ひるませることが　ある。"
    en: "The user tackles the target while exhibiting\noverwhelming menace. This may also make the\ntarget flinch."
    fr: "Le lanceur frappe l’ennemi en prenant un air menaçant.\nPeut aussi l’apeurer."
    it: "Chi la usa attacca con fare minaccioso e in questo\nmodo può anche far tentennare il bersaglio."
    de: "Anwender führt einen furchteinflößenden Angriff aus.\nDas Ziel schreckt eventuell zurück."
    es: "Ataca de forma brutal mientras intimida al objetivo.\nTambién puede amedrentarlo."
    ko: "굉장한 살기로 위압하면서\n몸통박치기한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "释放出骇人的杀气，\n一边威慑一边撞击对手。\n有时会使对手畏缩。"
    zh_trad: "釋放出駭人的殺氣，\n威嚇並撞擊對手。\n有時會使對手畏縮。"
dragon_tail:
  names:
    jp_kanji: ドラゴンテール
    en: Dragon Tail
    fr: Draco-Queue
    it: Codadrago
    de: Drachenrute
    es: Cola Dragón
    ko: 드래곤테일
    zh_simp: 龙尾
    zh_trad: 龍尾
  descriptions:
    jp_kanji: "相手を　はじきとばして\n控えの　ポケモンを　ひきずりだす。\n野生の　場合は　戦闘が　終わる。"
    en: "The target is knocked away, and a different Pokémon\nis dragged out. In the wild, this ends a battle against\na single Pokémon."
    fr: "Un coup puissant qui blesse la cible et l’envoie au loin.\nLors d’un combat contre un Pokémon sauvage seul,\nmet fin au combat."
    it: "Chi la usa fa volar via il bersaglio in modo che\nvenga sostituito. Se il bersaglio è un singolo\nPokémon selvatico, la lotta finisce."
    de: "Putzt das Ziel vom Feld und wechselt es mit einem\nanderen Pokémon aus. Beendet Kämpfe gegen wilde\nPokémon."
    es: "Ataca al objetivo y lo obliga a cambiarse por otro\nPokémon. Si es uno salvaje, acaba el combate."
    ko: "상대를 튕겨내서\n교대할 포켓몬을 끌어낸다.\n야생의 경우에는 배틀이 끝난다."
    zh_simp: "弹飞对手，强制拉后备宝可梦上场。\n如果对手为野生宝可梦，\n战斗将直接结束。"
    zh_trad: "彈飛對手，\n強制讓後備寶可夢上場。\n對手為野生寶可夢時，戰鬥將直接結束。"
drain_punch:
  names:
    jp_kanji: ドレインパンチ
    en: Drain Punch
    fr: Vampi-Poing
    it: Assorbipugno
    de: Ableithieb
    es: Puño Drenaje
    ko: 드레인펀치
    zh_simp: 吸取拳
    zh_trad: 吸取拳
  descriptions:
    jp_kanji: "こぶしから相手のＨＰを吸い取り\n自分のＨＰを回復する。"
    en: "The user attacks with an energy-draining punch that\nrestores the user’s HP."
    fr: "Un coup de poing qui draine l’énergie.\nConvertit la moitié des dégâts infligés en PV\npour le lanceur."
    it: Pugno che assorbe PS e li fa recuperare a chi lo sferra.
    de: Entzieht dem Ziel KP und füllt die des Anwenders auf.
    es: "Un golpe que drena los PS del objetivo y restaura los\ndel usuario."
    ko: "주먹으로 상대의 HP를 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "用拳头吸取对手的ＨＰ。\n回复自己的ＨＰ。"
    zh_trad: "從拳頭吸取對手的ＨＰ，\n回復自己的ＨＰ。"
draining_kiss:
  names:
    jp_kanji: ドレインキッス
    en: Draining Kiss
    fr: Vampibaiser
    it: Assorbibacio
    de: Diebeskuss
    es: Beso Drenaje
    ko: 드레인키스
    zh_simp: 吸取之吻
    zh_trad: 吸取之吻
  descriptions:
    jp_kanji: "キッスによって相手からＨＰを吸い取り\n自分のＨＰを回復する。"
    en: "The user attacks with an energy-draining kiss that\nrestores the user’s HP."
    fr: "Aspire la force vitale de l’ennemi par un baiser.\nLe lanceur récupère des PV."
    it: "Chi la usa assorbe energia dal bersaglio con un bacio,\nrecuperando PS."
    de: "Der Anwender stiehlt dem Ziel mit einem Kuss KP und\nfüllt damit seine eigenen KP auf."
    es: "El usuario absorbe PS del objetivo con un beso y\nrestaura los suyos propios."
    ko: "키스로 상대의 HP를 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "用一个吻吸取对手的ＨＰ，\n回复自己的ＨＰ。"
    zh_trad: "親吻對手來吸取對手的ＨＰ，\n回復自己的ＨＰ。"
dream_eater:
  names:
    jp_kanji: ゆめくい
    en: Dream Eater
    fr: Dévorêve
    it: Mangiasogni
    de: Traumfresser
    es: Comesueños
    ko: 꿈먹기
    zh_simp: 食梦
    zh_trad: 食夢
  descriptions:
    jp_kanji: "寝ている　相手の　夢を　食べて\n攻撃する。　ダメージの　半分の\nＨＰを　回復する。"
    en: "The user eats the dreams of a sleeping target.\nThe user’s HP is restored by half the damage taken by\nthe target."
    fr: "Le lanceur mange le rêve de l’ennemi endormi\net récupère en PV la moitié des dégâts infligés."
    it: "Attacco che funziona solo su un bersaglio che dorme.\nChi lo usa riceve metà dei PS persi dal Pokémon colpito."
    de: "Frisst die Träume eines schlafenden Zieles. Anwender\nwird um die Hälfte des zugefügten Schadens geheilt."
    es: "Restaura al usuario la mitad del daño causado a un\nobjetivo dormido."
    ko: "잠자고 있는 상대의 꿈을 먹어\n공격한다. 데미지의 절반을\nHP로 회복한다."
    zh_simp: "吃掉正在睡觉的对手的梦\n进行攻击。回复对手\n所受到伤害的一半ＨＰ。"
    zh_trad: "吃掉熟睡中對手的夢\n進行攻擊。可以回復給予對手\n傷害的一半ＨＰ。"
drill_peck:
  names:
    jp_kanji: ドリルくちばし
    en: Drill Peck
    fr: Bec Vrille
    it: Perforbecco
    de: Bohrschnabel
    es: Pico Taladro
    ko: 회전부리
    zh_simp: 啄钻
    zh_trad: 啄鑽
  descriptions:
    jp_kanji: "回転しながら　とがった　くちばしを\n相手に　突き刺して　攻撃する。"
    en: "A corkscrewing attack that strikes the target with a\nsharp beak acting as a drill."
    fr: Une attaque utilisant le bec comme une perceuse.
    it: "Attacco a spirale con un becco aguzzo\nche fa da trapano."
    de: "Korkenzieherangriff, bei dem der Schnabel als\nBohrer dient."
    es: Picotazo giratorio y perforador muy potente.
    ko: "회전하면서 뾰족한 부리를\n상대에게 꿰찔러 공격한다."
    zh_simp: "一边旋转，一边将尖喙\n刺入对手进行攻击。"
    zh_trad: "一邊旋轉，一邊將尖喙\n刺進對手進行攻擊。"
drill_run:
  names:
    jp_kanji: ドリルライナー
    en: Drill Run
    fr: Tunnelier
    it: Giravvita
    de: Schlagbohrer
    es: Taladradora
    ko: 드릴라이너
    zh_simp: 直冲钻
    zh_trad: 直衝鑽
  descriptions:
    jp_kanji: "ドリルのように　体を　回転しながら\n相手に　体当たりする。\n急所に　当たりやすい。"
    en: "The user crashes into its target while rotating its\nbody like a drill. Critical hits land more easily."
    fr: "Le lanceur tourne sur lui-même comme une perceuse\net se jette sur l’ennemi. Taux de critiques élevé."
    it: "Chi la usa si scaglia sul bersaglio ruotando su se stesso\ncome un trapano perforante. Probabile brutto colpo."
    de: "Anwender rammt das Ziel, während er seinen Körper\nwie einen Bohrer dreht. Hohe Volltrefferquote."
    es: "El usuario golpea usando su cuerpo como un taladro.\nSuele ser crítico."
    ko: "드릴처럼 몸을 회전시켜서\n상대에게 몸통박치기한다.\n급소에 맞기 쉽다."
    zh_simp: "像钢钻一样，一边旋转身体\n一边撞击对手。\n容易击中要害。"
    zh_trad: "像鑽頭一樣旋轉身體，\n猛烈地撞擊對手。\n容易擊中要害。"
drum_beating:
  names:
    jp_kanji: ドラムアタック
    en: Drum Beating
    fr: Tambour Battant
    it: Tamburattacco
    de: Trommelschläge
    es: Batería Asalto
    ko: 드럼어택
    zh_simp: 鼓击
    zh_trad: 鼓擊
  descriptions:
    jp_kanji: "ドラムの　根っこを　ドラミングで\nコントロールして　こうげき　することで\n相手の　素早さを　下げる。"
    en: "The user plays its drum, controlling the drum’s roots\nto attack the target. This also lowers the target’s\nSpeed stat."
    fr: "Le lanceur bat son tambour pour en diriger les racines\nsur la cible, l’attaquer, et baisser sa Vitesse."
    it: "Chi la usa percuote il proprio tamburo per\ncontrollarne le radici e attaccare il bersaglio,\nriducendone la Velocità."
    de: "Der Anwender kontrolliert durch Trommeln Wurzeln,\ndie das Ziel angreifen und dessen Initiative senken."
    es: "El usuario controla un tocón mediante la percusión y al\natacar reduce la Velocidad del objetivo."
    ko: "드럼 연주로 뿌리를\n조종해서 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用鼓点来控制\n鼓的根部进行攻击，\n从而降低对手的速度。"
    zh_trad: "用打鼓來控制\n鼓的根部進行攻擊，\n進而降低對手的速度。"
dual_chop:
  names:
    jp_kanji: ダブルチョップ
    en: Dual Chop
    fr: Double Baffe
    it: Doppiocolpo
    de: Doppelhieb
    es: Golpe Bis
    ko: 더블촙
    zh_simp: 二连劈
    zh_trad: 二連劈
  descriptions:
    jp_kanji: "体の　硬い部分で　相手を\nたたいて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks its target by hitting it with brutal\nstrikes. The target is hit twice in a row."
    fr: "Le lanceur frappe l’ennemi deux fois d’affilée\navec les parties les plus robustes de son corps."
    it: "Chi la usa attacca due volte il bersaglio con dei\ncolpi estremamente forti."
    de: "Versetzt dem Ziel mit massiven Extremitäten Hiebe.\nAngriff erfolgt zweimal hintereinander."
    es: "Golpea dos veces seguidas con las partes más recias de\nsu cuerpo."
    ko: "몸의 단단한 부분으로\n상대를 때려 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "用身体坚硬的部分\n拍打对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用身體的堅硬部分攻擊對手。\n連續２次給予傷害。"
dual_wingbeat:
  names:
    jp_kanji: ダブルウイング
    en: Dual Wingbeat
    fr: Double Volée
    it: Doppia Ala
    de: Doppelflügel
    es: Ala Bis
    ko: 더블윙
    zh_simp: 双翼
    zh_trad: 雙翼
  descriptions:
    jp_kanji: "翼を　相手に　ぶつけて\n攻撃する。　２回連続で\nダメージを　与える。"
    en: "The user slams the target with its wings.\nThe target is hit twice in a row."
    fr: "Le lanceur frappe l’ennemi avec ses ailes deux fois\nd’affilée."
    it: "Chi la usa colpisce il bersaglio due volte di fila\nurtandolo con le ali."
    de: "Der Anwender trifft das Ziel zweimal hintereinander mit\nseinen Flügeln und fügt ihm so Schaden zu."
    es: Ataca al adversario golpeándolo dos veces con las alas.
    ko: "날개를 상대에게 부딪쳐서\n공격한다. 2회 연속으로\n데미지를 준다."
    zh_simp: "将翅膀撞向对手进行攻击。\n连续２次给予伤害。"
    zh_trad: "用翅膀撞向對手進行攻擊。\n連續２次給予傷害。"
dynamax_cannon:
  names:
    jp_kanji: ダイマックスほう
    en: Dynamax Cannon
    fr: Canon Dynamax
    it: Cannone Dynamax
    de: Dynamax-Kanone
    es: Cañón Dinamax
    ko: 다이맥스포
    zh_simp: 极巨炮
    zh_trad: 極巨炮
  descriptions:
    jp_kanji: "コアから　ビームを　放って　攻撃。\n相手が　ダイマックス　していると\nダメージは　２倍に　なる。"
    en: "The user unleashes a strong beam from its core.\nThis move deals twice the damage if the target\nis Dynamaxed."
    fr: "Le lanceur attaque en émettant un laser depuis\nson noyau. Cette capacité inflige deux fois plus\nde dégâts si l’adversaire est un Pokémon Dynamax."
    it: "Chi la usa attacca emettendo un raggio dal suo nucleo.\nSe l’avversario è dynamaxizzato causa il doppio\ndei danni."
    de: "Der Anwender schießt einen Strahl aus seinem Kern ab.\nDynamaximierte Ziele erleiden doppelten Schaden."
    es: "El usuario ataca emitiendo un rayo desde su núcleo.\nEl daño infligido se duplica si el objetivo ha alcanzado\nel estado Dinamax."
    ko: "코어에서 빔을 발사해서 공격한다.\n상대가 다이맥스 중이면\n데미지가 2배가 된다."
    zh_simp: "从核心放出光束进行攻击。\n如果对手正处于极巨化状态，\n则造成的伤害会变为２倍。"
    zh_trad: "從核心發射光束進行攻擊。\n當對手極巨化時，\n傷害將變為２倍。"
dynamic_punch:
  names:
    jp_kanji: ばくれつパンチ
    en: Dynamic Punch
    fr: Dynamo-Poing
    it: Dinamipugno
    de: Wuchtschlag
    es: Puño Dinámico
    ko: 폭발펀치
    zh_simp: 爆裂拳
    zh_trad: 爆裂拳
  descriptions:
    jp_kanji: "こん身の　力で\nパンチを　くりだして　攻撃する。\n相手を　必ず　混乱させる。"
    en: "The user punches the target with full, concentrated\npower. This confuses the target if it hits."
    fr: "Le lanceur rassemble ses forces et envoie un coup\nde poing à l’ennemi. Rend ce dernier confus."
    it: "Colpisce il bersaglio con un pugno davvero forte.\nSe va a segno, lo confonde."
    de: Kräftiger Schlag, der das Ziel bei Erfolg verwirrt.
    es: "Puñetazo con toda la fuerza concentrada. Causa\nconfusión si atina."
    ko: "혼신의 힘으로\n펀치를 날려서 공격한다.\n상대를 반드시 혼란시킨다."
    zh_simp: "使出浑身力气出拳进行攻击。\n必定会使对手混乱。"
    zh_trad: "使出渾身力量出拳進行攻擊。\n必定會使對手混亂。"
earth_power:
  names:
    jp_kanji: だいちのちから
    en: Earth Power
    fr: Telluriforce
    it: Geoforza
    de: Erdkräfte
    es: Tierra Viva
    ko: 대지의힘
    zh_simp: 大地之力
    zh_trad: 大地之力
  descriptions:
    jp_kanji: "相手の足下へ大地の力を放出する。\n相手の守りの力をさげることもある。"
    en: "The user makes the ground under the target erupt with\npower. This may also lower the target’s defensive stats."
    fr: "Libère la force de la terre où se tient l’ennemi.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Dal terreno sotto il bersaglio si sprigiona una forza\ndevastante che può anche ridurne la forza difensiva."
    de: "Der Boden unter dem Ziel erzittert durch die Kraft\nder Erde. Senkt eventuell die Defensivkraft des Zieles."
    es: "La tierra a los pies del objetivo erupciona de forma\nviolenta y también puede disminuir su defensiva."
    ko: "상대의 발밑에 대지의 힘을 방출한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "向对手脚下\n释放出大地之力。\n有时会降低对手的防守力。"
    zh_trad: "向對手腳下釋放出大地之力。\n有時還會降低對手的防守力。"
earthquake:
  names:
    jp_kanji: じしん
    en: Earthquake
    fr: Séisme
    it: Terremoto
    de: Erdbeben
    es: Terremoto
    ko: 지진
    zh_simp: 地震
    zh_trad: 地震
  descriptions:
    jp_kanji: "地震の　衝撃で　自分の\n周りに　いるものを　攻撃する。"
    en: "The user sets off an earthquake that strikes every\nPokémon around it."
    fr: "Le lanceur provoque un tremblement de terre\ntouchant tous les Pokémon autour de lui."
    it: "Chi la usa provoca un potente sisma che colpisce\ni Pokémon che ha intorno."
    de: "Ein mächtiges Beben, das alle Pokémon im Umkreis\ntrifft."
    es: "Un terremoto que afecta a todos los Pokémon que\nestén a su alrededor."
    ko: "지진의 충격으로 자신의\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "利用地震的冲击，\n攻击自己周围所有的宝可梦。"
    zh_trad: "用地震的衝擊，\n攻擊自己周圍所有的寶可夢。"
echoed_voice:
  names:
    jp_kanji: エコーボイス
    en: Echoed Voice
    fr: Écho
    it: Echeggiavoce
    de: Widerhall
    es: Eco Voz
    ko: 에코보이스
    zh_simp: 回声
    zh_trad: 回聲
  descriptions:
    jp_kanji: "響く　声で　相手を　攻撃する。\n毎ターン　だれかが　技を\n使い続けると　威力が　あがる。"
    en: "The user attacks the target with an echoing voice.\nIf this move is used every turn, its power\nis increased."
    fr: "Un cri retentissant blesse l’ennemi.\nSi le lanceur ou d’autres Pokémon l’utilisent\nà chaque tour, l’effet augmente."
    it: "Attacca il bersaglio con la propria voce\necheggiante. Se usata a ripetizione da uno\no più Pokémon il danno aumenta."
    de: "Angriff mit widerhallender Stimme. Wenn in jeder\nRunde ein Teilnehmer wiederholt die Attacke einsetzt,\nsteigt die Stärke."
    es: "Un susurro que aumenta de potencia conforme el\nusuario y otros Pokémon lo van utilizando."
    ko: "울리는 목소리로 상대를 공격한다.\n매 턴 누군가 이 기술을\n계속해서 쓰면 위력이 올라간다."
    zh_simp: "用回声攻击对手。\n如果每回合都有宝可梦接着\n使用该招式，威力就会提高。"
    zh_trad: "用回聲攻擊對手。\n每回合有寶可夢持續使用回聲時，\n招式的威力會提高。"
eerie_impulse:
  names:
    jp_kanji: かいでんぱ
    en: Eerie Impulse
    fr: Ondes Étranges
    it: Elettromistero
    de: Mystowellen
    es: Onda Anómala
    ko: 괴전파
    zh_simp: 怪异电波
    zh_trad: 怪異電波
  descriptions:
    jp_kanji: "体から　かいでんぱを　放ち\n相手に　浴びせる　ことによって\n特攻を　がくっと　さげる。"
    en: "The user’s body generates an eerie impulse.\nExposing the target to it harshly lowers the target’s\nSp. Atk stat."
    fr: "Le corps du lanceur produit des ondes anormales\nqui enveloppent l’ennemi et diminuent beaucoup\nson Attaque Spéciale."
    it: "Il corpo di chi la usa emette onde anomale che\ninvestono il bersaglio, riducendone di molto\nl’Attacco Speciale."
    de: "Der Körper des Anwenders erzeugt mysteriöse Wellen\nund senkt den Spezial-Angriff des Zieles dadurch stark."
    es: "El usuario irradia unas raras ondas que, al alcanzar a un\noponente, hacen que disminuya mucho su Ataque\nEspecial."
    ko: "몸에서 발생시킨 괴전파를\n상대에게 쏘아\n특수공격을 크게 떨어뜨린다."
    zh_simp: "从身体放射出怪异电波，\n让对手沐浴其中，\n从而大幅降低其特攻。"
    zh_trad: "從身體發出怪異電波\n影響對手，\n大幅降低對手的特攻。"
eerie_spell:
  names:
    jp_kanji: ぶきみなじゅもん
    en: Eerie Spell
    fr: Sort Sinistre
    it: Inquietantesimo
    de: Schauderspruch
    es: Conjuro Funesto
    ko: 섬뜩한주문
    zh_simp: 诡异咒语
    zh_trad: 詭異咒語
  descriptions:
    jp_kanji: "強力な　サイコパワーで　攻撃。\n相手が　最後に　使った技の\nＰＰを　３だけ　減らす。"
    en: "The user attacks with its tremendous psychic power.\nThis also removes 3 PP from the target’s last move."
    fr: "Le lanceur attaque avec de puissants pouvoirs\npsychiques et retire 3 PP de la dernière capacité\nde l’ennemi."
    it: "Il Pokémon attacca con i suoi potenti poteri psichici.\nSottrae tre PP all’ultima mossa usata dal nemico."
    de: "Der Anwender greift mit gewaltigen Psycho-Kräften an.\nDie AP der letzten Attacke des Zieles werden um\n3 Punkte gesenkt."
    es: "El usuario ataca con un poder psíquico de inmensa\npotencia y elimina 3 PP del último movimiento que\nhaya usado el objetivo."
    ko: "강력한 사이코 파워로 공격한다.\n상대가 마지막으로 사용한 기술의\nPP를 3만큼 줄인다."
    zh_simp: "用强大的精神力量攻击。\n让对手最后使用的招式\n减少３ＰＰ。"
    zh_trad: "用強大的精神力量攻擊。\n讓對手最近一次使用的招式\n減少３ＰＰ。"
egg_bomb:
  names:
    jp_kanji: タマゴばくだん
    en: Egg Bomb
    fr: Bombe Œuf
    it: Uovobomba
    de: Eierbombe
    es: Bomba Huevo
    ko: 알폭탄
    zh_simp: 炸蛋
    zh_trad: 炸蛋
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
electric_terrain:
  names:
    jp_kanji: エレキフィールド
    en: Electric Terrain
    fr: Champ Électrifié
    it: Campo Elettrico
    de: Elektrofeld
    es: Campo Eléctrico
    ko: 일렉트릭필드
    zh_simp: 电气场地
    zh_trad: 電氣場地
  descriptions:
    jp_kanji: "５ターンの　間　エレキフィールドにする。\n地面にいる　ポケモンは　眠らない。\nでんきタイプの　威力が　あがる。"
    en: "The user electrifies the ground for five turns,\npowering up Electric-type moves. Pokémon on the\nground no longer fall asleep."
    fr: "Pendant cinq tours, le terrain se charge d’électricité.\nLes Pokémon au sol ne peuvent pas s’endormir\net la puissance des capacités de type Électrik augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nElettrico: i Pokémon a terra non si addormentano e la\npotenza delle mosse di tipo Elettro aumenta."
    de: "Hindert fünf Runden lang alle Pokémon, die den Boden\nberühren, am Einschlafen. Erhöht die Stärke von\nElektro-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos de\ntipo Eléctrico y los Pokémon que están en contacto con\nel suelo no pueden quedarse dormidos."
    ko: "5턴 동안 일렉트릭필드로 만든다.\n땅에 있는 포켓몬은 잠들지 않는다.\n전기타입의 위력이 올라간다."
    zh_simp: "在５回合内变成电气场地。\n地面上的宝可梦将无法入眠。\n电属性的招式威力还会提高。"
    zh_trad: "在５回合內將腳下變成電氣場地。\n地面上的寶可夢將不會陷入睡眠狀態。\n電屬性招式的威力會提高。"
electrify:
  names:
    jp_kanji: そうでん
    en: Electrify
    fr: Électrisation
    it: Elettrocontagio
    de: Elektrifizierung
    es: Electrificación
    ko: 송전
    zh_simp: 输电
    zh_trad: 輸電
  descriptions:
    jp_kanji: "相手が　技を　だす前に\nそうでん　すると　そのターン\n相手の　技は　でんきタイプになる。"
    en: "If the target is electrified before it uses a move\nduring that turn, the target’s move becomes\nElectric type."
    fr: "Si le lanceur attaque avant la cible, les capacités\nde celle-ci seront de type Électrik jusqu’à la fin du tour."
    it: "Se si contagia il bersaglio prima che usi la sua\nmossa, per quel turno questa sarà di tipo Elettro."
    de: "Kommt die Attacke zum Einsatz, bevor das Ziel seine\nAttacke ausführt, nimmt diese für die Dauer dieser\nRunde den Typ Elektro an."
    es: "Si el objetivo queda electrificado antes de usar un\nmovimiento, este será de tipo Eléctrico."
    ko: "상대가 기술을 쓰기 전에\n송전하면 그 턴에 상대가\n사용하는 기술은 전기타입이 된다."
    zh_simp: "对手使出招式前，\n如果输电，则该回合\n对手的招式变成电属性。"
    zh_trad: "如果在對手使用招式前輸電，\n該回合對手的招式會變成電屬性。"
electro_ball:
  names:
    jp_kanji: エレキボール
    en: Electro Ball
    fr: Boule Élek
    it: Energisfera
    de: Elektroball
    es: Bola Voltio
    ko: 일렉트릭볼
    zh_simp: 电球
    zh_trad: 電球
  descriptions:
    jp_kanji: "電気の　塊を　相手に\nぶつける。相手より　素早さが\n速いほど　威力が　あがる。"
    en: "The user hurls an electric orb at the target. The\nfaster the user is than the target, the greater the\nmove’s power."
    fr: "Le lanceur envoie une boule d’électricité.\nSi sa Vitesse est plus grande que celle de l’ennemi,\nles dégâts augmentent d’autant."
    it: "Chi la usa attacca con una sfera d’energia elettrica.\nPiù è rapido rispetto al bersaglio, più danni arreca."
    de: "Je höher die Initiative des Anwenders im Vergleich\nzum Ziel ist, desto stärker trifft dieses eine geballte\nLadung Strom."
    es: "Lanza una bola eléctrica. Cuanto mayor sea la\nVelocidad del usuario en comparación con la del\nobjetivo, mayor será el daño causado."
    ko: "전기 덩어리를 상대에게 부딪쳐서\n공격한다. 상대보다 스피드가\n빠를수록 위력이 올라간다."
    zh_simp: "用电气团撞向对手。\n自己比对手速度越快，\n威力越大。"
    zh_trad: "用電球攻擊對手。\n速度比對手快越多，\n威力越大。"
electroweb:
  names:
    jp_kanji: エレキネット
    en: Electroweb
    fr: Toile Élek
    it: Elettrotela
    de: Elektronetz
    es: Electrotela
    ko: 일렉트릭네트
    zh_simp: 电网
    zh_trad: 電網
  descriptions:
    jp_kanji: "電気の　ネットで\n相手を　捕まえて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks and captures opposing Pokémon\nusing an electric net. This lowers their Speed stats."
    fr: "Attrape l’ennemi dans un filet électrique.\nBaisse aussi la Vitesse de l’ennemi."
    it: "Chi la usa attacca i nemici intorno a sé catturandoli\ncon una ragnatela elettrica e riducendone la Velocità."
    de: "Fängt gegnerische Pokémon mit einem elektrischen\nNetz und senkt deren Initiative."
    es: "Atrapa y ataca a los objetivos con una telaraña\neléctrica. También reduce su Velocidad."
    ko: "전기 네트로\n상대를 붙잡아서 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "用电网捉住对手进行攻击。\n降低对手的速度。"
    zh_trad: "用電網捉住對手進行攻擊。\n可降低對手的速度。"
embargo:
  names:
    jp_kanji: さしおさえ
    en: Embargo
    fr: Embargo
    it: Divieto
    de: Itemsperre
    es: Embargo
    ko: 금제
    zh_simp: 查封
    zh_trad: 查封
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
ember:
  names:
    jp_kanji: ひのこ
    en: Ember
    fr: Flammèche
    it: Braciere
    de: Glut
    es: Ascuas
    ko: 불꽃세례
    zh_simp: 火花
    zh_trad: 火花
  descriptions:
    jp_kanji: "小さな炎を発射して攻撃する。\n相手をやけど状態にすることもある。"
    en: "The target is attacked with small flames.\nThis may also leave the target with a burn."
    fr: "Le lanceur envoie de petites flammes qui attaquent\nl’ennemi. Peut aussi le brûler."
    it: "Il bersaglio viene colpito da fiammelle che possono\nanche scottarlo."
    de: "Schwache Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con llamas pequeñas que pueden quemar al\nobjetivo."
    ko: "작은 불꽃을 발사하여 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射小型火焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射小火焰進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
encore:
  names:
    jp_kanji: アンコール
    en: Encore
    fr: Encore
    it: Ripeti
    de: Zugabe
    es: Otra Vez
    ko: 앵콜
    zh_simp: 再来一次
    zh_trad: 再來一次
  descriptions:
    jp_kanji: "相手に　アンコールした　技を\n３回　続けて　出させる。"
    en: "The user compels the target to keep using the move\nit encored for three turns."
    fr: "Oblige l’ennemi à répéter la dernière capacité utilisée\ndurant trois tours."
    it: "Chi la usa obbliga il bersaglio a ripetere per tre\nturni l’ultima mossa eseguita."
    de: Das Ziel wiederholt die letzte Attacke drei Runden lang.
    es: "El objetivo repite su último movimiento durante tres\nturnos."
    ko: "상대에게 앵콜시킨 기술을\n3번 연속으로 쓰게 한다."
    zh_simp: "让对手接受再来一次，\n连续３次使出最后使用的招式。"
    zh_trad: "要求對手再來一次，\n讓對手連續３次\n使出最近一次使用的招式。"
endeavor:
  names:
    jp_kanji: がむしゃら
    en: Endeavor
    fr: Effort
    it: Rimonta
    de: Notsituation
    es: Esfuerzo
    ko: 죽기살기
    zh_simp: 蛮干
    zh_trad: 蠻幹
  descriptions:
    jp_kanji: "相手の　ＨＰが　自分の　ＨＰと\n同じくらいに　なるように\nダメージを　与える。"
    en: "This attack move cuts down the target’s HP to equal\nthe user’s HP."
    fr: "Une attaque qui réduit les PV de l’ennemi au niveau\ndes PV du lanceur."
    it: "Attacco che riduce i PS del bersaglio a una\nquantità pari ai PS di chi lo usa."
    de: "Trifft nur, wenn KP des Anwenders geringer als KP des\nZieles sind. Senkt dessen KP auf die Höhe der KP des\nAnwenders."
    es: "Reduce los PS del objetivo para que igualen a los del\natacante."
    ko: "상대의 HP가 자신의 HP와\n같아지도록\n데미지를 준다."
    zh_simp: "给予伤害，\n使对手的ＨＰ变得\n和自己的ＨＰ一样。"
    zh_trad: "給予傷害，\n使對手的ＨＰ變得\n和自己的ＨＰ一樣。"
endure:
  names:
    jp_kanji: こらえる
    en: Endure
    fr: Ténacité
    it: Resistenza
    de: Ausdauer
    es: Aguante
    ko: 버티기
    zh_simp: 挺住
    zh_trad: 挺住
  descriptions:
    jp_kanji: "攻撃を　受けても\nＨＰを　必ず　１だけ　残せる。\n連続で　だすと　失敗しやすい。"
    en: "The user endures any attack with at least 1 HP.\nIts chance of failing rises if it is used in succession."
    fr: "Le lanceur résiste aux attaques avec 1 PV.\nPeut échouer si utilisée plusieurs fois de suite."
    it: "Chi la usa resta con un PS anche se subisce un colpo\nda KO in quel turno. Usata in successione può fallire."
    de: "Nach fatalen Attacken bleibt stets 1 KP übrig.\nMisserfolg bei Wiederholung möglich."
    es: "Resiste cualquier ataque y deja al menos 1 PS.\nPuede fallar si se usa repetidamente."
    ko: "공격을 받아도\nHP를 반드시 1만큼은 남긴다.\n연속으로 쓰면 실패하기 쉽다."
    zh_simp: "即使受到攻击，\n也至少会留下１ＨＰ。\n连续使出则容易失败。"
    zh_trad: "即使受到再強烈的攻擊，\n也一定會剩下１ＨＰ。\n連續使用時容易失敗。"
energy_ball:
  names:
    jp_kanji: エナジーボール
    en: Energy Ball
    fr: Éco-Sphère
    it: Energipalla
    de: Energieball
    es: Energibola
    ko: 에너지볼
    zh_simp: 能量球
    zh_trad: 能量球
  descriptions:
    jp_kanji: "自然から集めた\n命の力を発射する。\n相手の守りの力をさげることもある。"
    en: "The user draws power from nature and fires it at the\ntarget. This may also lower the target’s defensive stats."
    fr: "Utilise les pouvoirs de la nature pour attaquer l’ennemi.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Chi la usa attinge energia dalla natura e la scaglia\ncontro il bersaglio, la cui forza difensiva può anche\ndiminuire."
    de: "Anwender zieht Kraft aus der Natur und feuert sie auf\ndas Ziel. Senkt eventuell die Defensivkraft des Zieles."
    es: "Aúna fuerzas de la naturaleza y libera su ataque, que\npuede bajar la defensiva del objetivo."
    ko: "자연으로부터 모은\n생명의 힘을 발사한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "发射从自然收集的生命力量。\n有时会降低对手的防守力。"
    zh_trad: "發射從大自然匯聚而來的生命力量。\n有時還會降低對手的防守力。"
entrainment:
  names:
    jp_kanji: なかまづくり
    en: Entrainment
    fr: Ten-Danse
    it: Saltamicizia
    de: Zwango
    es: Danza Amiga
    ko: 동료만들기
    zh_simp: 找伙伴
    zh_trad: 找夥伴
  descriptions:
    jp_kanji: "不思議な　リズムで　おどる。\n動きを　まねさせて　自分と　相手の\n特性を　同じに　する。"
    en: "The user dances with an odd rhythm that compels\nthe target to mimic it, making the target’s Ability\nthe same as the user’s."
    fr: "Le lanceur danse sur un rythme étrange.\nIl force sa cible à l’imiter, ce qui lui fait adopter\nson talent."
    it: "Chi la usa saltella con un buffo ritmo, inducendo\nil bersaglio a imitarlo e rendendo la sua abilità\nidentica alla propria."
    de: "Anwender tanzt zu einem seltsamen Rhythmus und\nzwingt das Ziel mitzumachen. Dieses nimmt dabei die\nFähigkeit des Anwenders an."
    es: "Una extraña danza que hace que el usuario y el objetivo\ntengan la misma habilidad."
    ko: "이상한 리듬으로 춤춘다.\n움직임을 흉내 내게 해서\n자신과 상대의 특성을 똑같게 만든다."
    zh_simp: "用神奇的节奏跳舞。\n使对手模仿自己的动作，\n从而将特性变成一样。"
    zh_trad: "用神奇的節奏跳舞。\n讓對手模仿自己的動作，\n變成和自己一樣的特性。"
eruption:
  names:
    jp_kanji: ふんか
    en: Eruption
    fr: Éruption
    it: Eruzione
    de: Eruption
    es: Estallido
    ko: 분화
    zh_simp: 喷火
    zh_trad: 噴火
  descriptions:
    jp_kanji: "怒りを　爆発させて　相手を\n攻撃する。　自分の　ＨＰが\n少ないほど　技の　威力は　さがる。"
    en: "The user attacks opposing Pokémon with explosive\nfury. The lower the user’s HP, the lower the\nmove’s power."
    fr: "Le lanceur laisse exploser sa colère.\nPlus ses PV sont bas, moins l’attaque est puissante."
    it: "Attacco impetuoso ed esplosivo la cui potenza\nè proporzionale ai PS di chi lo usa."
    de: "Explosiver Angriff gegen gegnerische Pokémon.\nJe höher die KP des Anwenders sind, desto mehr\nSchaden wird angerichtet."
    es: "Furia explosiva. Cuanto menor sea el número de PS del\nusuario, menos daño hará el ataque."
    ko: "분노를 폭발시켜 상대를\n공격한다. 자신의 HP가\n적을수록 기술의 위력이 떨어진다."
    zh_simp: "爆发怒火攻击对手。\n自己的ＨＰ越少，\n招式的威力越小。"
    zh_trad: "爆發怒火攻擊對手。\n自己的ＨＰ越少，\n招式的威力越小。"
esper_wing:
  names:
    jp_kanji: オーラウイング
    en: Esper Wing
    fr: Ailes Psycho
    it: Ali d’Aura
    de: Auraschwingen
    es: Ala Aural
    ko: 오라윙
    zh_simp: 气场之翼
    zh_trad: 氣場之翼
  descriptions:
    jp_kanji: "オーラで強化した翼で切り裂く。\n急所に当たりやすい。\n自分の行動順がはやくなる。"
    en: "The user slashes the target with aura-enriched wings.\nThis also raises the user’s action speed. This move has\na heightened chance of landing a critical hit."
    fr: "Le lanceur entaille l’ennemi avec ses ailes renforcées\npar une aura psychique. Taux de critiques élevé.\nAvance la position du lanceur dans l’ordre d’action."
    it: "Chi la usa falcia il bersaglio con ali rafforzate da un’aura.\nProbabile brutto colpo. Questa mossa accelera inoltre\nl’ordine delle azioni di chi la usa."
    de: "Ein schneidender Angriff mit durch eine Aura verstärkten\nSchwingen. Hohe Volltrefferquote. Der Anwender kommt\ndanach schneller wieder zum Zug."
    es: "Corta con unas alas imbuidas de aura. Suele ser\ncrítico y hace que los turnos del usuario tarden\nmenos en llegar."
    ko: "오라로 강화한 날개로 베어 가른다.\n급소에 맞기 쉽다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "用经过气场强化的翅膀撕裂对手。\n容易击中要害。\n能够让自己的行动顺序提前。"
    zh_trad: "用經過氣場強化的翅膀撕裂對手。\n容易擊中要害。\n能夠讓自己的行動順序提前。"
eternabeam:
  names:
    jp_kanji: ムゲンダイビーム
    en: Eternabeam
    fr: Laser Infinimax
    it: Raggio Infinito
    de: Unendynastrahlen
    es: Rayo Infinito
    ko: 무한다이빔
    zh_simp: 无极光束
    zh_trad: 無極光束
  descriptions:
    jp_kanji: "本来の　姿と　なった\nムゲンダイナ　最大の　攻撃。\n次の　ターンは　動けなくなる。"
    en: "This is Eternatus’s most powerful attack in its original\nform. The user can’t move on the next turn."
    fr: "L’attaque la plus puissante d’Éthernatos sous\nsa forme originelle. S’il l’utilise, il devra se reposer\nau tour suivant."
    it: "È l’attacco più potente di Eternatus quando assume\nla sua forma originale. Nel turno successivo non può\nagire."
    de: "Der mächtigste Angriff, über den Endynalos in seiner\nursprünglichen Form verfügt. In der nächsten Runde\nkann der Anwender nicht handeln."
    es: "Este es el mayor ataque de Eternatus una vez adquirida\nsu forma original. No puede moverse en el turno\nsiguiente."
    ko: "본래의 모습이 된\n무한다이노 최대의 공격.\n다음 턴은 움직일 수 없다."
    zh_simp: "无极汰那变回原来的样子后，\n发动的最强攻击。\n下一回合自己将无法动弹。"
    zh_trad: "無極汰那變回\n本來樣子時的最強攻擊。\n下一回合自己將無法動彈。"
expanding_force:
  names:
    jp_kanji: ワイドフォース
    en: Expanding Force
    fr: Vaste Pouvoir
    it: Vastenergia
    de: Flächenmacht
    es: Vasta Fuerza
    ko: 와이드포스
    zh_simp: 广域战力
    zh_trad: 廣域戰力
  descriptions:
    jp_kanji: "サイコパワーで　相手を　攻撃する。\nサイコフィールドの時　威力が　あがり\nすべての　相手に　ダメージを　与える。"
    en: "The user attacks the target with its psychic power.\nThis move’s power goes up and damages all opposing\nPokémon on Psychic Terrain."
    fr: "Le lanceur attaque la cible avec ses pouvoirs psychiques.\nSi un Champ Psychique est actif, la puissance de cette\ncapacité augmente et elle touche tous les ennemis."
    it: "Chi la usa attacca il bersaglio con energia psichica.\nSe utilizzata quando è attivo un Campo Psichico,\nla mossa aumenta di potenza e danneggia tutti i nemici."
    de: "Der Anwender greift das Ziel mit Psycho-Kräften an.\nWenn ein Psychofeld aktiv ist, steigt die Stärke und es\nwird allen gegnerischen Pokémon Schaden zugefügt."
    es: "El usuario ataca al objetivo con sus poderes psíquicos.\nCuando se usa en conjunción con un campo psíquico,\naumenta su potencia e inflige daño a todos los rivales."
    ko: "사이코 파워로 상대를 공격한다.\n사이코필드일 때는 위력이 오르며\n모든 상대에게 데미지를 준다."
    zh_simp: "利用精神力量攻击对手。\n在精神场地上威力会有所提高，\n能对所有对手造成伤害。"
    zh_trad: "用精神力量攻擊對手。\n在精神場地時，威力會提高，\n能給予所有對手傷害。"
explosion:
  names:
    jp_kanji: だいばくはつ
    en: Explosion
    fr: Explosion
    it: Esplosione
    de: Explosion
    es: Explosión
    ko: 대폭발
    zh_simp: 大爆炸
    zh_trad: 大爆炸
  descriptions:
    jp_kanji: "大きな　爆発で　自分の\n周りに　いるものを　攻撃する。\n使ったあとに　ひんしに　なる。"
    en: "The user attacks everything around it by causing a\ntremendous explosion. The user faints upon using\nthis move."
    fr: "Le lanceur explose et inflige des dégâts à tous\nles Pokémon autour de lui. Met K.O. le lanceur."
    it: "Chi la usa esplode per infliggere danni\nagli altri Pokémon attorno, ma va KO."
    de: "Anwender explodiert, richtet bei allen Pokémon\nim Umkreis großen Schaden an und wird selbst\nkampfunfähig."
    es: "El atacante causa una grandísima explosión y hiere\na todos a su alrededor. El usuario se debilita de\ninmediato."
    ko: "큰 폭발로 자신의\n주위에 있는 포켓몬을 공격한다.\n쓰고 나서는 기절한다."
    zh_simp: "引发大爆炸，\n攻击自己周围所有的宝可梦。\n使用后自己会陷入昏厥。"
    zh_trad: "引起大爆炸，\n攻擊自己周圍所有的寶可夢。\n使用後自己會陷入瀕死。"
extrasensory:
  names:
    jp_kanji: じんつうりき
    en: Extrasensory
    fr: Extrasenseur
    it: Extrasenso
    de: Sondersensor
    es: Paranormal
    ko: 신통력
    zh_simp: 神通力
    zh_trad: 神通力
  descriptions:
    jp_kanji: "みえない不思議な力を\n送って攻撃する。"
    en: The user attacks with an odd, unseeable power.
    fr: Le lanceur attaque avec un pouvoir étrange et invisible.
    it: Chi la usa attacca con una misteriosa forza invisibile.
    de: Besonderer Angriff mit einer unsichtbaren Kraft.
    es: Ataca con una energía muy extraña.
    ko: "보이지 않는 이상한 힘을\n보내어 공격한다."
    zh_simp: "发出看不见的\n神奇力量进行攻击。"
    zh_trad: "發送看不見的\n神奇力量進行攻擊。"
extreme_evoboost:
  names:
    jp_kanji: ナインエボルブースト
    en: Extreme Evoboost
    fr: Neuf pour Un
    it: Potenziamento Eevolutivo
    de: Macht der Neun
    es: Novena Potencia
    ko: 나인이볼부스트
    zh_simp: 九彩升华齐聚顶
    zh_trad: 九彩昇華齊聚頂
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
extreme_speed:
  names:
    jp_kanji: しんそく
    en: Extreme Speed
    fr: Vitesse Extrême
    it: Extrarapido
    de: Turbotempo
    es: Veloc. Extrema
    ko: 신속
    zh_simp: 神速
    zh_trad: 神速
  descriptions:
    jp_kanji: "目にも　留まらぬ　ものすごい　速さで\n相手に　突進して　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user charges the target at blinding speed.\nThis move always goes first."
    fr: "Le lanceur charge à une vitesse renversante.\nFrappe en priorité."
    it: "Chi la usa carica il bersaglio a una velocità\nimpressionante.\nQuesta mossa ha priorità alta."
    de: Extrem schnelle und kraftvolle Erstschlag-Attacke.
    es: "Ataque de una velocidad extrema. Este movimiento\ntiene prioridad alta."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진하여 공격한다.\n반드시 선제공격을 할 수 있다."
    zh_simp: "以迅雷不及掩耳之势\n猛撞向对手进行攻击。\n必定能够先制攻击。"
    zh_trad: "以迅雷不及掩耳之勢\n猛撞向對手進行攻擊。\n必定能夠發動先制攻擊。"
facade:
  names:
    jp_kanji: からげんき
    en: Facade
    fr: Façade
    it: Facciata
    de: Fassade
    es: Imagen
    ko: 객기
    zh_simp: 硬撑
    zh_trad: 硬撐
  descriptions:
    jp_kanji: "自分が　毒　まひ　やけど\n状態のとき　相手に　くりだすと\n技の　威力が　２倍に　なる。"
    en: "This attack move doubles its power if the user is\npoisoned, burned, or paralyzed."
    fr: "Une attaque dont la puissance double lorsque\nle lanceur est empoisonné, paralysé ou brûlé."
    it: "Mossa d’attacco che raddoppia la potenza\nse chi la usa è scottato, avvelenato o paralizzato."
    de: "Ist der Anwender vergiftet, paralysiert oder leidet er\nunter Verbrennungen, verdoppelt sich die Kraft der\nAttacke."
    es: "Si el usuario está quemado, paralizado o envenenado,\nataca con el doble de potencia."
    ko: "자신이 독, 마비, 화상\n상태일 때 날리면\n기술의 위력이 2배가 된다."
    zh_simp: "当自己处于中毒、麻痹、灼伤状态时，\n向对手使出此招式的话，\n威力会变成２倍。"
    zh_trad: "當自己陷入中毒、麻痺、灼傷等\n狀態時，向對手使用此招式，\n威力會變成２倍。"
fairy_lock:
  names:
    jp_kanji: フェアリーロック
    en: Fairy Lock
    fr: Verrou Enchanté
    it: Blocco Fatato
    de: Feenschloss
    es: Cerrojo Feérico
    ko: 페어리록
    zh_simp: 妖精之锁
    zh_trad: 妖精之鎖
  descriptions:
    jp_kanji: "ロックを　かけることによって\n次のターン　すべての\nポケモンを　逃げられなくする。"
    en: "By locking down the battlefield, the user keeps all\nPokémon from fleeing during the next turn."
    fr: "Des chaînes entourent la zone de combat, empêchant\ntous les Pokémon de fuir au prochain tour."
    it: "Impone un blocco al terreno di lotta che nel turno\nsuccessivo impedisce a tutti i Pokémon di fuggire."
    de: "Der Anwender sperrt alle Pokémon ein und hindert\nsie damit in der nächsten Runde an der Flucht."
    es: "Consigue que ningún Pokémon pueda huir en el\nsiguiente turno echando un cerrojo."
    ko: "록을 걸어\n다음 턴의 모든 포켓몬을\n도망가지 못하게 한다."
    zh_simp: "通过封锁，\n下一回合所有的\n宝可梦都无法逃走。"
    zh_trad: "封鎖對戰場地，\n下一回合所有的\n寶可夢都無法逃走。"
fairy_wind:
  names:
    jp_kanji: ようせいのかぜ
    en: Fairy Wind
    fr: Vent Féérique
    it: Vento di Fata
    de: Feenbrise
    es: Viento Feérico
    ko: 요정의바람
    zh_simp: 妖精之风
    zh_trad: 妖精之風
  descriptions:
    jp_kanji: "ようせいのかぜを起こし\n相手に吹きつけて攻撃する。"
    en: "The user stirs up a fairy wind and strikes the target\nwith it."
    fr: Déchaîne un vent magique qui cingle l’ennemi.
    it: "Chi la usa solleva un vento fatato che investe\nil bersaglio."
    de: "Lässt eine Feenbrise aufkommen, die das Ziel erfasst und\nihm Schaden zufügt."
    es: "El Pokémon que lo usa desata un vendaval feérico que\narremete contra el objetivo."
    ko: "요정의 바람을 일으켜\n상대에게 몰아쳐서 공격한다."
    zh_simp: "刮起妖精之风，\n吹向对手进行攻击。"
    zh_trad: "刮起妖精之風，\n吹向對手進行攻擊。"
fake_out:
  names:
    jp_kanji: ねこだまし
    en: Fake Out
    fr: Bluff
    it: Bruciapelo
    de: Mogelhieb
    es: Sorpresa
    ko: 속이다
    zh_simp: 击掌奇袭
    zh_trad: 擊掌奇襲
  descriptions:
    jp_kanji: "先制攻撃で　相手を　ひるませる。\n戦闘に　でたら\nすぐに　ださないと　成功しない。"
    en: "This attack hits first and makes the target flinch.\nIt only works the first turn each time the user\nenters battle."
    fr: "Permet de frapper en priorité et apeure l’ennemi.\nNe fonctionne qu’au premier tour."
    it: "Mossa ad alta priorità che fa tentennare\nil bersaglio. Funziona solo appena scesi in campo."
    de: "Erstschlag-Attacke, die das Ziel zurückschrecken lässt.\nGelingt nur, wenn sie sofort eingesetzt wird, nachdem\nder Anwender das Kampffeld betreten hat."
    es: "Amedrenta al objetivo con este movimiento de\nprioridad alta. Solo sirve en el primer turno."
    ko: "선제공격으로 상대를 풀죽게 한다.\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "进行先制攻击，使对手畏缩。\n要在出场后立刻使出才能成功。"
    zh_trad: "利用先制攻擊使對手畏縮。\n要在上場後立即使用才會成功。"
fake_tears:
  names:
    jp_kanji: うそなき
    en: Fake Tears
    fr: Croco Larme
    it: Falselacrime
    de: Trugträne
    es: Llanto Falso
    ko: 거짓울음
    zh_simp: 假哭
    zh_trad: 假哭
  descriptions:
    jp_kanji: "ないた　ふりをして　涙を　流す。\nこまらせる　ことで\n相手の　特防を　がくっと　さげる。"
    en: "The user feigns crying to fluster the target, harshly\nlowering its Sp. Def stat."
    fr: "Le lanceur fait semblant de pleurer pour troubler\nl’ennemi et beaucoup baisser sa Défense Spéciale."
    it: "Chi la usa inscena un pianto teatrale per commuovere\nil bersaglio. Ne riduce di molto la Difesa Speciale."
    de: "Täuscht Weinen vor, um die Spezial-Verteidigung des\nZieles stark zu senken."
    es: "Lágrimas de cocodrilo que bajan mucho la Defensa\nEspecial del objetivo."
    ko: "우는 척을 하며 눈물을 흘린다.\n난처하게 만들어\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "装哭流泪。\n使对手不知所措，\n从而大幅降低对手的特防。"
    zh_trad: "裝哭掉眼淚。\n讓對手不知所措，\n大幅降低對手的特防。"
false_surrender:
  names:
    jp_kanji: どげざつき
    en: False Surrender
    fr: Fourbette
    it: Supplicolpo
    de: Kniefalltrick
    es: Irreverencia
    ko: 사죄의찌르기
    zh_simp: 假跪真撞
    zh_trad: 假跪真撞
  descriptions:
    jp_kanji: "頭を　下げる　ふりを　しながら\n振りみだした　髪の毛を　突き刺す。\n攻撃は　必ず　命中する。"
    en: "The user pretends to bow its head, but then it stabs the\ntarget with its disheveled hair. This attack never misses."
    fr: "Le lanceur fait semblant de se prosterner et utilise\nses cheveux pour poignarder sa cible.\nTouche à tous les coups."
    it: "Chi la usa finge di abbassare la testa a mo’ di supplica\ne attacca il bersaglio con i suoi capelli scarmigliati.\nQuesta mossa va sempre a segno."
    de: "Der Anwender tut so, als würde er sich verneigen, und\nsticht dann mit seinem zerzausten Fell zu. Diese Attacke\ntrifft immer."
    es: "El usuario finge hacer una reverencia y aprovecha la\nocasión para ensartar al objetivo con su cabello\nalborotado. Siempre acierta."
    ko: "고개를 숙이는 척하면서\n흐트러진 머리카락으로 찌른다.\n공격은 반드시 명중한다."
    zh_simp: "装作低头认错的样子，\n用凌乱的头发进行突刺。\n攻击必定会命中。"
    zh_trad: "假裝低頭道歉，\n用凌亂的頭髮刺向對手。\n攻擊必定會命中。"
false_swipe:
  names:
    jp_kanji: みねうち
    en: False Swipe
    fr: Faux-Chage
    it: Falsofinale
    de: Trugschlag
    es: Falso Tortazo
    ko: 칼등치기
    zh_simp: 点到为止
    zh_trad: 點到為止
  descriptions:
    jp_kanji: "相手のＨＰが\n必ず１だけ残るように\n手加減して攻撃する。"
    en: "A restrained attack that prevents the target from\nfainting. The target is left with at least 1 HP."
    fr: "Le lanceur retient ses coups pour que l’ennemi\ngarde au moins 1 PV et ne tombe pas K.O."
    it: "Chi la usa attenua il colpo per impedire al bersaglio\ndi andare KO, lasciandolo con almeno un PS."
    de: Ein Angriff, der dem Ziel zumindest 1 KP lässt.
    es: "Ataque moderado que no debilita al objetivo y le deja\nal menos 1 PS."
    ko: "상대의 HP가\n반드시 1만 남도록\n조절하여 공격한다."
    zh_simp: "对手的ＨＰ\n至少会留下１ＨＰ，\n如此般手下留情地攻击。"
    zh_trad: "手下留情地攻擊對手，\n一定會讓對手剩下１ＨＰ。"
feather_dance:
  names:
    jp_kanji: フェザーダンス
    en: Feather Dance
    fr: Danse Plumes
    it: Danzadipiume
    de: Daunenreigen
    es: Danza Pluma
    ko: 깃털댄스
    zh_simp: 羽毛舞
    zh_trad: 羽毛舞
  descriptions:
    jp_kanji: "羽毛を　ふりまいて\n相手の　体に　からませる。\n相手の　攻撃を　がくっと　さげる。"
    en: "The user covers the target’s body with a mass of\ndown that harshly lowers its Attack stat."
    fr: "Une montagne de plumes ensevelit l’ennemi\net réduit beaucoup son Attaque."
    it: "Chi la usa circonda il bersaglio con un turbinio\ndi piume riducendo di molto il suo Attacco."
    de: "Hüllt das Ziel in Daunen und senkt dessen\nAngriffs-Wert stark."
    es: "Envuelve al objetivo con un manto de plumas para\nreducir mucho su Ataque."
    ko: "깃털을 흩뿌려\n상대의 몸에 휘감는다.\n상대의 공격을 크게 떨어뜨린다."
    zh_simp: "撒出羽毛，\n笼罩在对手的周围。\n大幅降低对手的攻击。"
    zh_trad: "撒出羽毛，\n纏住對手的身體。\n大幅降低對手的攻擊。"
feint:
  names:
    jp_kanji: フェイント
    en: Feint
    fr: Ruse
    it: Fintoattacco
    de: Offenlegung
    es: Amago
    ko: 페인트
    zh_simp: 佯攻
    zh_trad: 佯攻
  descriptions:
    jp_kanji: "まもるや　みきり　などを　している\n相手に　攻撃が　できる。\n守りの　効果を　解除させる。"
    en: "This attack hits a target using a move such as\nProtect or Detect.\nThis also lifts the effects of those moves."
    fr: "Une attaque capable de toucher un ennemi qui utilise\nune capacité comme Détection ou Abri.\nAnnule l’effet de ces capacités."
    it: "Colpisce anche un bersaglio che ha usato mosse\ncome Protezione e Individua, annullandone gli effetti."
    de: "Ziele, die Attacken wie Schutzschild oder Scanner\neingesetzt haben, werden getroffen. Entfernt Effekte\ndieser Attacken."
    es: "Permite golpear a objetivos que han utilizado\nmovimientos como Protección o Detección y anula\nsus efectos."
    ko: "방어나 판별 등을 하고 있는\n상대에게 공격할 수 있다.\n방어 효과를 해제시킨다."
    zh_simp: "能够攻击正在使用\n守住或看穿等招式的对手。\n解除其守护效果。"
    zh_trad: "能夠攻擊使用了\n守住或看穿的對手。\n並解除對手的防守效果。"
feint_attack:
  names:
    jp_kanji: だましうち
    en: Feint Attack
    fr: Feinte
    it: Finta
    de: Finte
    es: Finta
    ko: 속여때리기
    zh_simp: 出奇一击
    zh_trad: 出奇一擊
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
fell_stinger:
  names:
    jp_kanji: とどめばり
    en: Fell Stinger
    fr: Dard Mortel
    it: Pungiglione
    de: Stachelfinale
    es: Aguijón Letal
    ko: 마지막일침
    zh_simp: 致命针刺
    zh_trad: 致命針刺
  descriptions:
    jp_kanji: "この　技を　使って\n相手を　倒すと\n攻撃が　ぐぐーんと　あがる。"
    en: "When the user knocks out a target with this move,\nthe user’s Attack stat rises drastically."
    fr: "Augmente énormément l’Attaque du lanceur\nsi un ennemi est mis K.O. avec cette capacité."
    it: "L’Attacco di chi la usa aumenta moltissimo se\ngrazie alla mossa il bersaglio va KO."
    de: "Gelingt es dem Anwender, das Ziel mit dieser Attacke\nzu besiegen, steigt sein Angriffs-Wert drastisch."
    es: "Si se derrota al objetivo utilizando este movimiento,\naumenta muchísimo el Ataque del usuario."
    ko: "이 기술을 사용하여\n상대를 쓰러뜨리면\n공격이 매우 크게 오른다."
    zh_simp: "如果使用此招式打倒对手，\n攻击会巨幅提高。"
    zh_trad: "使用此招式打倒對手時，\n自己的攻擊會極大幅提高。"
fiery_dance:
  names:
    jp_kanji: ほのおのまい
    en: Fiery Dance
    fr: Danse du Feu
    it: Voldifuoco
    de: Feuerreigen
    es: Danza Llama
    ko: 불꽃춤
    zh_simp: 火之舞
    zh_trad: 火之舞
  descriptions:
    jp_kanji: "炎を　まとい　はばたいて　相手を\n攻撃する。自分の　特攻が\nあがることが　ある。"
    en: "Cloaked in flames, the user attacks the target by\ndancing and flapping its wings. This may also raise the\nuser’s Sp. Atk stat."
    fr: "Le lanceur enveloppe l’ennemi de flammes.\nPeut aussi augmenter l’Attaque Spéciale du lanceur."
    it: "Chi la usa viene avvolto da fiamme che scaglia\ncontro il bersaglio, sbattendo le ali. Può anche\naumentare l’Attacco Speciale."
    de: "Hüllt das Ziel mit einer Feuerhose in Flammen.\nKann den Spezial-Angriff des Anwenders erhöhen."
    es: "Envuelve en llamas y daña al objetivo. Puede aumentar\nel Ataque Especial de quien lo usa."
    ko: "불꽃을 두른 날개를 쳐서\n공격한다. 자신의 특수공격이\n오를 때가 있다."
    zh_simp: "让火焰覆盖全身，\n振翅攻击对手。\n有时会提高自己的特攻。"
    zh_trad: "讓火焰圍繞身體後，\n振翅攻擊對手。\n有時會提高自己的特攻。"
fiery_wrath:
  names:
    jp_kanji: もえあがるいかり
    en: Fiery Wrath
    fr: Fureur Ardente
    it: Furia Ardente
    de: Brennender Zorn
    es: Furia Candente
    ko: 타오르는분노
    zh_simp: 怒火中烧
    zh_trad: 怒火中燒
  descriptions:
    jp_kanji: "怒りを　炎の　ような\nオーラに　変えて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user transforms its wrath into a fire-like aura\nto attack. This may also make opposing Pokémon flinch."
    fr: "Le lanceur canalise sa colère et la transforme en aura\nbrûlante, avec laquelle il attaque l’ennemi. Peut aussi\nl’apeurer."
    it: "Il Pokémon attacca trasformando la sua rabbia\nin un’aura simile a fiamme. Può anche far tentennare\ni nemici."
    de: "Der Anwender wandelt seinen Zorn in eine flammende\nAura um und greift damit gegnerische Pokémon an.\nDiese schrecken eventuell zurück."
    es: "El usuario convierte su ira en un aura flamígera para\nlanzar su ataque. Puede amedrentar al objetivo."
    ko: "분노를 불꽃 같은\n오라로 바꿔서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将愤怒转化为火焰般的气场进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將憤怒化為火焰般的氣場進行攻擊。\n有時會讓對手畏縮。"
final_gambit:
  names:
    jp_kanji: いのちがけ
    en: Final Gambit
    fr: Tout ou Rien
    it: Azzardo
    de: Wagemut
    es: Sacrificio
    ko: 목숨걸기
    zh_simp: 搏命
    zh_trad: 搏命
  descriptions:
    jp_kanji: "命懸けで　相手を　攻撃する。\n自分は　ひんしに　なるが　相手に\nＨＰ分の　ダメージを　与える。"
    en: "The user risks everything to attack its target. The\nuser faints but does damage equal to its HP."
    fr: "Une attaque très risquée.\nLe lanceur perd tous ses PV restants et inflige autant\nde dégâts à l’ennemi."
    it: "Chi la usa attacca con tutta la potenza di cui\ndispone e va KO, ma infligge al bersaglio un danno\npari ai PS che ha perso."
    de: "Ein Angriff, der dem Ziel Schaden in Höhe der aktuellen\nKP des Anwenders zufügt. Letzterer wird dadurch selbst\nbesiegt."
    es: "El usuario se sacrifica causándole un daño al objetivo\nequivalente a sus propios PS perdidos."
    ko: "목숨을 걸고 상대를 공격한다.\n자신은 기절하게 되지만 상대에게\nHP만큼의 데미지를 준다."
    zh_simp: "拼命攻击对手。\n虽然自己陷入昏厥，但会给予对手\n和自己目前ＨＰ等量的伤害。"
    zh_trad: "捨身攻擊對手。\n雖然自己會陷入瀕死，但能夠給予對手\n和自己現有ＨＰ相同的傷害。"
fire_blast:
  names:
    jp_kanji: だいもんじ
    en: Fire Blast
    fr: Déflagration
    it: Fuocobomba
    de: Feuersturm
    es: Llamarada
    ko: 불대문자
    zh_simp: 大字爆炎
    zh_trad: 大字爆炎
  descriptions:
    jp_kanji: "大の字の炎で焼きつくす。\n相手をやけど状態にすることもある。"
    en: "The target is attacked with an intense blast of\nall-consuming fire.\nThis may also leave the target with a burn."
    fr: "Un déluge de flammes ardentes submerge l’ennemi.\nPeut aussi le brûler."
    it: "Investe il bersaglio con un’intensa fiammata che fa terra\nbruciata. Può anche scottarlo."
    de: "Feuersbrunst, die das Ziel versengt und ihm eventuell\nVerbrennungen zufügt."
    es: "Llama intensa que chamusca y puede quemar al\nobjetivo."
    ko: "큰대자 형상의 불꽃으로 불태운다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用大字形状的火焰烧净对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用大字形狀的火焰燒盡對手。\n有時還會讓對手陷入灼傷狀態。"
fire_fang:
  names:
    jp_kanji: ほのおのキバ
    en: Fire Fang
    fr: Crocs Feu
    it: Rogodenti
    de: Feuerzahn
    es: Colmillo Ígneo
    ko: 불꽃엄니
    zh_simp: 火焰牙
    zh_trad: 火焰牙
  descriptions:
    jp_kanji: "炎をまとったキバでかみついて\n相手をやけど状態にすることもある。"
    en: "The user bites the target with flame-cloaked fangs to\ndeal damage. This may also leave the target with a burn."
    fr: "Le lanceur inflige une morsure enflammée.\nPeut aussi brûler la cible."
    it: "Chi la usa morde con denti infuocati. Può anche scottare\nil bersaglio."
    de: "Anwender beißt mit flammenden Reißzähnen zu.\nZiel erleidet eventuell Verbrennungen."
    es: "El usuario muerde al objetivo con colmillos en llamas\nque pueden quemarlo."
    ko: "불꽃을 두른 이빨로 물어서\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用覆盖着火焰的牙齿咬住对手。\n有时会使对手陷入灼伤状态。"
    zh_trad: "用纏繞火焰的牙齒咬住對手。\n有時還會讓對手陷入灼傷狀態。"
fire_lash:
  names:
    jp_kanji: ほのおのムチ
    en: Fire Lash
    fr: Fouet de Feu
    it: Frusta di Fuoco
    de: Feuerpeitsche
    es: Látigo Ígneo
    ko: 불꽃채찍
    zh_simp: 火焰鞭
    zh_trad: 火焰鞭
  descriptions:
    jp_kanji: "焼けたムチで　相手を　打ちつける。\n攻撃を　受けた　相手は\n防御が　さがる。"
    en: "The user strikes the target with a burning lash. This\nalso lowers the target’s Defense stat."
    fr: "Frappe la cible avec un fouet incandescent et baisse\nsa Défense."
    it: "Colpisce il bersaglio con una frusta infuocata\ne ne riduce la Difesa."
    de: "Der Anwender greift das Ziel mit einer brennenden\nPeitsche an und senkt dabei zusätzlich dessen\nVerteidigungs-Wert."
    es: "Golpea al oponente con un látigo incandescente y\nreduce su Defensa."
    ko: "불타는 채찍으로 상대를 친다.\n공격을 받은 상대는\n방어가 떨어진다."
    zh_simp: "用燃烧的鞭子抽打对手。\n受到攻击的对手防御会降低。"
    zh_trad: "用燃燒的鞭子抽打對手。\n受到攻擊的對手防禦會降低。"
fire_pledge:
  names:
    jp_kanji: ほのおのちかい
    en: Fire Pledge
    fr: Aire de Feu
    it: Fiammapatto
    de: Feuersäulen
    es: Voto Fuego
    ko: 불꽃의맹세
    zh_simp: 火之誓约
    zh_trad: 火之誓約
  descriptions:
    jp_kanji: "炎の柱で　攻撃する。\nくさと　組みあわせると　威力が\nあがって　周りが　火の海に　なる。"
    en: "A column of fire hits the target. When used with its\ngrass equivalent, its power increases and a vast sea\nof fire appears."
    fr: "Une masse de feu s’abat sur l’ennemi.\nEn l’utilisant avec Aire d’Herbe, l’effet augmente\net une mer de feu apparaît."
    it: "Attacca il bersaglio con una colonna di fuoco.\nSe usata con Erbapatto, gli effetti aumentano\ne il campo diventa un mare di fuoco."
    de: "Ein Angriff mit Feuersäulen. Mit Pflanzensäulen\nkombiniert steigt die Wirkung und die Umgebung\nwird zu einem Meer aus Feuer."
    es: "Ataca con columnas de fuego. Combinado con\nVoto Planta, crea un mar de llamas y aumenta su\npotencia."
    ko: "불꽃기둥으로 공격한다.\n풀과 조합하면 위력이\n올라가고 주위가 불바다가 된다."
    zh_simp: "用火柱进行攻击。\n如果和草组合，威力就会提高，\n周围会变成火海。"
    zh_trad: "用火柱進行攻擊。\n和草之誓約同時使用時，威力會提高，\n周圍會變成火海。"
fire_punch:
  names:
    jp_kanji: ほのおのパンチ
    en: Fire Punch
    fr: Poing Feu
    it: Fuocopugno
    de: Feuerschlag
    es: Puño Fuego
    ko: 불꽃펀치
    zh_simp: 火焰拳
    zh_trad: 火焰拳
  descriptions:
    jp_kanji: "炎をこめたパンチで攻撃して\n相手をやけど状態にすることもある。"
    en: "The target is punched with a fiery fist.\nThis may also leave the target with a burn."
    fr: "Le lanceur attaque l’ennemi d’un coup de poing\nenflammé. Peut aussi le brûler."
    it: "Chi la usa attacca con un pugno ardente che può anche\nscottare il bersaglio."
    de: "Ein feuriger Schlag, der dem Ziel eventuell\nVerbrennungen zufügt."
    es: Puñetazo ardiente que puede quemar al objetivo.
    ko: "불꽃을 담은 펀치로 공격하여\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "用充满火焰的拳头攻击对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用帶有火焰的拳頭攻擊對手。\n有時還會讓對手陷入灼傷狀態。"
fire_spin:
  names:
    jp_kanji: ほのおのうず
    en: Fire Spin
    fr: Danse Flammes
    it: Turbofuoco
    de: Feuerwirbel
    es: Giro Fuego
    ko: 회오리불꽃
    zh_simp: 火焰旋涡
    zh_trad: 火焰旋渦
  descriptions:
    jp_kanji: "激しく　渦をまく　炎の中に\n４ー５ターンの　間\n相手を　閉じこめて　攻撃する。"
    en: "The target becomes trapped within a fierce vortex\nof fire that rages for four to five turns."
    fr: "Un tourbillon de flammes emprisonne l’ennemi\npendant quatre à cinq tours."
    it: "Intrappola il bersaglio in un turbine di fuoco\nche dura per quattro o cinque turni."
    de: "Das Ziel wird für vier bis fünf Runden in einem\nFeuerkreis gefangen."
    es: "Un aro de fuego que atrapa al objetivo de cuatro a\ncinco turnos."
    ko: "세차게 소용돌이치는 불꽃 속에\n4~5턴 동안\n상대를 가두어 공격한다."
    zh_simp: "将对手困在\n激烈的火焰旋涡中，\n在４～５回合内进行攻击。"
    zh_trad: "將對手困在\n熊熊燃燒的火焰旋渦中，\n在４～５回合內進行攻擊。"
first_impression:
  names:
    jp_kanji: であいがしら
    en: First Impression
    fr: Escarmouche
    it: Schermaglia
    de: Überrumpler
    es: Escaramuza
    ko: 만나자마자
    zh_simp: 迎头一击
    zh_trad: 迎頭一擊
  descriptions:
    jp_kanji: "威力が　高い　技　だが\n戦闘に　出たら\nすぐに　出さないと　成功　しない。"
    en: "Although this move has great power, it only works\nthe first turn each time the user enters battle."
    fr: "Une capacité très puissante, mais qui ne fonctionne\nqu’au premier tour."
    it: "È una mossa molto potente, ma funziona\nsolo appena scesi in campo."
    de: "Eine sehr starke Attacke, die jedoch nur erfolgreich ist,\nwenn sie sofort eingesetzt wird, nachdem der Anwender\ndas Kampffeld betreten hat."
    es: "Movimiento de gran potencia que solo puede usarse en\nel turno en que el usuario sale al combate."
    ko: "위력이 높은 기술이지만\n배틀에 나가서\n바로 쓰지 않으면 성공할 수 없다."
    zh_simp: "威力很高的招式，\n但只有在出场战斗时，\n立刻使出才能成功。"
    zh_trad: "招式的威力雖高，\n但只有在出場戰鬥時，\n立刻使出才能成功。"
fishious_rend:
  names:
    jp_kanji: エラがみ
    en: Fishious Rend
    fr: Branchicrok
    it: Branchiomorso
    de: Kiemenbiss
    es: Branquibocado
    ko: 아가미물기
    zh_simp: 鳃咬
    zh_trad: 鰓咬
  descriptions:
    jp_kanji: "かたい　エラで　かみつく。\n相手より　先に　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user rends the target with its hard gills.\nIf the user attacks before the target, the power of this\nmove is doubled."
    fr: "Le lanceur mord sa cible avec ses solides branchies.\nSi cette capacité est lancée avant que la cible n’attaque,\nelle infligera deux fois plus de dégâts."
    it: "Chi la usa morde il bersaglio con le dure branchie.\nSe attacca per primo, la potenza della mossa\nraddoppia."
    de: "Der Anwender beißt mit seinen harten Kiemen zu.\nKommt er vor dem Ziel zum Zug, verdoppelt sich die\nStärke der Attacke."
    es: "El usuario agarra al objetivo con sus duras branquias.\nEn caso de atacar antes que este último, la potencia del\nmovimiento se duplica."
    ko: "단단한 아가미로 문다.\n상대보다 먼저 공격하면\n기술의 위력은 2배가 된다."
    zh_simp: "用坚硬的腮咬住对手。\n如果比对手先出手攻击，\n招式的威力会变成２倍。"
    zh_trad: "用堅硬的鰓咬住對手。\n若在對手之前進行攻擊，\n招式的威力會變成２倍。"
fissure:
  names:
    jp_kanji: じわれ
    en: Fissure
    fr: Abîme
    it: Abisso
    de: Geofissur
    es: Fisura
    ko: 땅가르기
    zh_simp: 地裂
    zh_trad: 地裂
  descriptions:
    jp_kanji: "地割れの　裂け目に\n相手を　落として　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user opens up a fissure in the ground and drops\nthe target in. The target faints instantly if this\nattack hits."
    fr: "Le lanceur fait tomber l’ennemi dans une crevasse.\nSi cette attaque réussit, elle met K.O. sur le coup."
    it: "Chi la usa crea una spaccatura nel terreno e cerca\ndi gettarvici dentro il bersaglio. Se va a segno,\nil Pokémon colpito va KO."
    de: "Das Ziel wird in eine Erdspalte geworfen. Ist die Attacke\nerfolgreich, führt sie zu einem K.O."
    es: "Abre una grieta en el suelo y mete al objetivo en ella.\nFulmina en un golpe."
    ko: "땅이 갈라진 곳에\n상대를 떨어뜨려 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "让对手掉落于地裂的\n裂缝中进行攻击。\n只要命中就会一击昏厥。"
    zh_trad: "讓對手掉進地面的\n裂縫中進行攻擊。\n只要命中就會一擊瀕死。"
flail:
  names:
    jp_kanji: じたばた
    en: Flail
    fr: Gigotage
    it: Flagello
    de: Dreschflegel
    es: Azote
    ko: 바둥바둥
    zh_simp: 抓狂
    zh_trad: 抓狂
  descriptions:
    jp_kanji: "じたばた　暴れて　攻撃する。\n自分の　ＨＰが　少ないほど\n技の　威力は　あがる。"
    en: "The user flails about aimlessly to attack. The less HP\nthe user has, the greater the move’s power."
    fr: "Le lanceur attaque en gigotant dans tous les sens.\nPlus ses PV sont bas, plus l’attaque est puissante."
    it: "Chi la usa si dimena per attaccare. È più efficace\nse i suoi PS sono bassi."
    de: "Attacke richtet mehr Schaden an, wenn eigene KP\nniedrig sind."
    es: "Ataque frenético. Cuantos menos PS tenga el usuario,\nmás daño producirá."
    ko: "바둥바둥 난동 부려서 공격한다.\n자신의 HP가 적을수록\n기술의 위력이 올라간다."
    zh_simp: "抓狂般乱打进行攻击。\n自己的ＨＰ越少，\n招式的威力越大。"
    zh_trad: "抓狂般亂打進行攻擊。\n自己的ＨＰ越少，\n招式的威力越大。"
flame_burst:
  names:
    jp_kanji: はじけるほのお
    en: Flame Burst
    fr: Rebondifeu
    it: Pirolancio
    de: Funkenflug
    es: Pirotecnia
    ko: 불꽃튀기기
    zh_simp: 烈焰溅射
    zh_trad: 烈焰濺射
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
flame_charge:
  names:
    jp_kanji: ニトロチャージ
    en: Flame Charge
    fr: Nitrocharge
    it: Nitrocarica
    de: Nitroladung
    es: Nitrocarga
    ko: 니트로차지
    zh_simp: 蓄能焰袭
    zh_trad: 蓄能焰襲
  descriptions:
    jp_kanji: "炎を　まとい　相手を　攻撃する。\n力を　ためて　自分の\n素早さを　あげる。"
    en: "Cloaking itself in flame, the user attacks the target.\nThen, building up more power, the user raises its\nSpeed stat."
    fr: "Le lanceur s’entoure de flammes pour attaquer l’ennemi.\nIl se concentre et sa Vitesse augmente."
    it: "Chi la usa si copre di fuoco e attacca il bersaglio.\nConcentrandosi aumenta, inoltre, la propria\nVelocità."
    de: "Anwender hüllt sich in Flammen und greift das Ziel an.\nSammelt seine Energie und erhöht dadurch die eigene\nInitiative."
    es: "Llamas que golpean al objetivo y aumentan la\nVelocidad del atacante."
    ko: "불꽃을 둘러 상대를 공격한다.\n힘을 모아서 자신의\n스피드를 올린다."
    zh_simp: "让火焰覆盖全身，攻击对手。\n积蓄力量并提高自己的速度。"
    zh_trad: "讓火焰圍繞身體後攻擊對手。\n同時蓄積力量來提高自己的速度。"
flame_wheel:
  names:
    jp_kanji: かえんぐるま
    en: Flame Wheel
    fr: Roue de Feu
    it: Ruotafuoco
    de: Flammenrad
    es: Rueda Fuego
    ko: 화염자동차
    zh_simp: 火焰轮
    zh_trad: 火焰輪
  descriptions:
    jp_kanji: "炎をまとって突進して攻撃。\n相手をやけど状態にすることもある。"
    en: "The user cloaks itself in fire and charges at the target to\ndeal damage. This may also leave the target with a burn."
    fr: "Le lanceur s’entoure de feu et charge l’ennemi.\nPeut aussi le brûler."
    it: "Chi la usa si copre di fuoco e carica il bersaglio.\nPuò anche scottarlo."
    de: "Anwender hüllt sich in Flammen und rammt das Ziel.\nVerursacht beim Ziel eventuell Verbrennungen."
    es: Ataca envuelto en fuego y puede quemar al objetivo.
    ko: "불꽃을 두르고 돌진하여 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用火焰圍繞身體，\n向前猛衝進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
flamethrower:
  names:
    jp_kanji: かえんほうしゃ
    en: Flamethrower
    fr: Lance-Flammes
    it: Lanciafiamme
    de: Flammenwurf
    es: Lanzallamas
    ko: 화염방사
    zh_simp: 喷射火焰
    zh_trad: 噴射火焰
  descriptions:
    jp_kanji: "激しい炎を発射して攻撃する。\n相手をやけど状態にすることもある。"
    en: "The target is scorched with an intense blast of fire.\nThis may also leave the target with a burn."
    fr: "Le lanceur envoie un torrent de flammes sur l’ennemi.\nPeut aussi le brûler."
    it: "Il bersaglio viene colpito da intense fiammate\nche possono anche scottarlo."
    de: "Starke Feuer-Attacke, durch die das Ziel eventuell\nVerbrennungen erleidet."
    es: "Ataca con una gran ráfaga de fuego que puede quemar\nal objetivo."
    ko: "세찬 불꽃을 발사하여 공격한다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "向对手发射烈焰进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手發射強烈火焰進行攻擊。\n有時還會讓對手陷入灼傷狀態。"
flare_blitz:
  names:
    jp_kanji: フレアドライブ
    en: Flare Blitz
    fr: Boutefeu
    it: Fuococarica
    de: Flammenblitz
    es: Envite Ígneo
    ko: 플레어드라이브
    zh_simp: 闪焰冲锋
    zh_trad: 閃焰衝鋒
  descriptions:
    jp_kanji: "炎をまとって突進して攻撃。\n自分もダメージを受ける。\n相手をやけど状態にすることもある。"
    en: "The user cloaks itself in fire and charges the target to\ninflict damage. This also damages the user and may\nleave the target with a burn."
    fr: "Le lanceur s’embrase avant de charger l’ennemi.\nLe choc blesse également le lanceur et peut brûler\nla cible."
    it: "Chi la usa si ricopre di fuoco e carica il bersaglio,\nma subisce il contraccolpo. Può anche scottare\nil Pokémon colpito."
    de: "Der Anwender hüllt sich in Flammen und stürmt auf das\nZiel zu. Er nimmt dabei selbst Schaden. Das Ziel erleidet\neventuell Verbrennungen."
    es: "El Pokémon se cubre de llamas y carga contra el\nobjetivo, al que puede quemar. El usuario también\nrecibe daño."
    ko: "불꽃을 두르고 돌진하여 공격한다.\n자신도 데미지를 입는다.\n상대를 화상 상태로 만들 때가 있다."
    zh_simp: "让火焰覆盖全身猛撞进行攻击。\n自己也会受到伤害。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將火焰圍繞全身後猛衝進行攻擊。\n自己也會受到傷害。\n有時還會讓對手陷入灼傷狀態。"
flash:
  names:
    jp_kanji: フラッシュ
    en: Flash
    fr: Flash
    it: Flash
    de: Blitz
    es: Destello
    ko: 플래시
    zh_simp: 闪光
    zh_trad: 閃光
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
flash_cannon:
  names:
    jp_kanji: ラスターカノン
    en: Flash Cannon
    fr: Luminocanon
    it: Cannonflash
    de: Lichtkanone
    es: Foco Resplandor
    ko: 러스터캐논
    zh_simp: 加农光炮
    zh_trad: 加農光炮
  descriptions:
    jp_kanji: "体の光を一点に集めて力を放つ。\n相手の守りの力をさげることもある。"
    en: "The user gathers all its light energy and releases it\nat once. This may also lower the target’s defensive stats."
    fr: "Le lanceur concentre son énergie lumineuse et la projette.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Chi la usa attacca raccogliendo e rilasciando energia\nluminosa che può anche ridurre la forza difensiva\ndel bersaglio."
    de: "Anwender sammelt Lichtenergie und feuert sie auf\neinmal ab. Senkt eventuell die Defensivkraft des Zieles."
    es: "El usuario concentra toda la luz del cuerpo y la libera.\nPuede bajar la defensiva del objetivo."
    ko: "몸의 빛을 한곳에 모아서 힘을 방출한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "将身体的光芒\n聚集在一点释放出去。\n有时会降低对手的防守力。"
    zh_trad: "將身體的光芒\n聚集在一個點後釋放出去。\n有時還會降低對手的防守力。"
flatter:
  names:
    jp_kanji: おだてる
    en: Flatter
    fr: Flatterie
    it: Adulazione
    de: Schmeichler
    es: Camelo
    ko: 부추기기
    zh_simp: 吹捧
    zh_trad: 吹捧
  descriptions:
    jp_kanji: "相手を　おだてて　混乱させる。\n同時に　相手の　特攻も\nあげてしまう。"
    en: "Flattery is used to confuse the target. However,\nthis also raises the target’s Sp. Atk stat."
    fr: "Rend la cible confuse, mais augmente\nson Attaque Spéciale."
    it: "Adula il bersaglio e lo confonde, ma ne aumenta\nl’Attacco Speciale."
    de: "Schmeichelt dem Ziel, um es zu verwirren.\nErhöht dessen Spezial-Angriff."
    es: "Halaga al objetivo y lo confunde, pero también sube\nsu Ataque Especial."
    ko: "상대를 부추겨서 혼란시킨다.\n동시에 상대의 특수공격도\n올라가 버린다."
    zh_simp: "吹捧对手，使其混乱。\n同时还会提高对手的特攻。"
    zh_trad: "吹捧對手，使其混亂。\n同時還會提高對手的特攻。"
fleur_cannon:
  names:
    jp_kanji: フルールカノン
    en: Fleur Cannon
    fr: Canon Floral
    it: Cannonfiore
    de: Kanonenbouquet
    es: Cañón Floral
    ko: 플뢰르캐논
    zh_simp: 花朵加农炮
    zh_trad: 花朵加農炮
  descriptions:
    jp_kanji: "強力な　ビームを　放ったあと\n自分の　特攻が　がくっと　さがる。"
    en: "The user unleashes a strong beam. The attack’s\nrecoil harshly lowers the user’s Sp. Atk stat."
    fr: "Envoie un rayon laser dévastateur.\nBaisse beaucoup l’Attaque Spéciale du lanceur."
    it: "Colpisce il bersaglio con un potente raggio,\nma riduce di molto l’Attacco Speciale di chi\nla usa."
    de: "Der Anwender greift das Ziel mit einem gewaltigen\nStrahl an. Sein eigener Spezial-Angriff sinkt dadurch\nstark."
    es: "El usuario emite un potente rayo, pero su Ataque\nEspecial se reduce mucho."
    ko: "강력한 빔을 발산한 후\n자신의 특수공격이 크게 떨어진다."
    zh_simp: "放出强力光束后，\n自己的特攻会大幅降低。"
    zh_trad: "放出強力光束後，\n自己的特攻會大幅降低。"
fling:
  names:
    jp_kanji: なげつける
    en: Fling
    fr: Dégommage
    it: Lancio
    de: Schleuder
    es: Lanzamiento
    ko: 내던지기
    zh_simp: 投掷
    zh_trad: 投擲
  descriptions:
    jp_kanji: "持たせた　道具を\n素早く　投げつけて　攻撃する。\n道具で　威力と　効果が　変わる。"
    en: "The user flings its held item at the target to attack.\nThis move’s power and effects depend on the item."
    fr: "Le lanceur envoie l’objet qu’il tient sur l’ennemi.\nLa puissance et les effets dépendent de l’objet."
    it: "Chi la usa lancia il suo strumento addosso al bersaglio.\nLa forza e l’effetto dipendono dallo strumento."
    de: "Anwender schleudert sein Item auf das Ziel. Stärke und\nEffekt der Attacke hängen vom Item ab."
    es: "El usuario lanza contra el objetivo el objeto que lleva.\nLa fuerza del ataque y su efecto varían según el objeto."
    ko: "지니게 한 도구를\n재빠르게 내던져서 공격한다.\n도구에 따라 위력과 효과가 바뀐다."
    zh_simp: "快速投掷携带的道具进行攻击。\n根据道具不同，\n威力和效果会改变。"
    zh_trad: "快速投擲攜帶的道具進行攻擊。\n招式威力和效果會隨著\n道具不同而改變。"
flip_turn:
  names:
    jp_kanji: クイックターン
    en: Flip Turn
    fr: Eau Revoir
    it: Virata
    de: Rollwende
    es: Viraje
    ko: 퀵턴
    zh_simp: 快速折返
    zh_trad: 快速折返
  descriptions:
    jp_kanji: "攻撃した　あと\nものすごい　スピードで　戻ってきて\n控えの　ポケモンと　入れ替わる。"
    en: "After making its attack, the user rushes back to\nswitch places with a party Pokémon in waiting."
    fr: "Après son attaque, le lanceur revient à toute vitesse\net change de place avec un Pokémon de l’équipe prêt\nau combat."
    it: "Chi usa questa mossa fa marcia indietro per farsi\nsostituire dopo aver sferrato l’attacco."
    de: "Nach der Attacke eilt der Anwender zurück und\ntauscht den Platz mit einem anderen Pokémon."
    es: "Tras atacar, el usuario da paso a toda prisa a otro\nPokémon del equipo."
    ko: "공격한 뒤\n굉장한 스피드로 돌아와서\n교대 포켓몬과 교체한다."
    zh_simp: "在攻击之后急速返回，\n和后备宝可梦进行替换。"
    zh_trad: "攻擊後迅速返回，\n和後備寶可夢進行替換。"
floaty_fall:
  names:
    jp_kanji: ふわふわフォール
    en: Floaty Fall
    fr: Pika-Piqué
    it: Piombaflap
    de: Schwebesturz
    es: Pikapicado
    ko: 둥실둥실폴
    zh_simp: 飘飘坠落
    zh_trad: 飄飄墜落
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
floral_healing:
  names:
    jp_kanji: フラワーヒール
    en: Floral Healing
    fr: Soin Floral
    it: Cura Floreale
    de: Florakur
    es: Cura Floral
    ko: 플라워힐
    zh_simp: 花疗
    zh_trad: 花療
  descriptions:
    jp_kanji: "最大ＨＰの　半分\n相手の　ＨＰを　回復する。\nグラスフィールドの時　効果が　あがる。"
    en: "The user restores the target’s HP by up to half of its\nmax HP. It restores more HP when the terrain\nis grass."
    fr: "Rend la moitié de ses PV max à la cible.\nPlus efficace sur un Champ Herbu."
    it: "Fa recuperare metà dei PS massimi al bersaglio.\nÈ più efficace quando il terreno di lotta è nello\nstato di Campo Erboso."
    de: "KP des Zieles werden um 50 % der maximalen KP\naufgefüllt. Die Wirkung steigt, wenn der Untergrund\nin ein Grasfeld verwandelt wurde."
    es: "Restaura la mitad de los PS máximos del objetivo.\nEs más efectivo cuando se usa en conjunción con\nCampo de Hierba."
    ko: "최대 HP의 절반만큼\n상대의 HP를 회복한다.\n그래스필드일 때 효과가 올라간다."
    zh_simp: "回复对手最大ＨＰ的一半。\n在青草场地时，效果会提高。"
    zh_trad: "回復對手最大ＨＰ的一半。\n在青草場地時，效果會提高。"
flower_shield:
  names:
    jp_kanji: フラワーガード
    en: Flower Shield
    fr: Garde Florale
    it: Fiordifesa
    de: Floraschutz
    es: Defensa Floral
    ko: 플라워가드
    zh_simp: 鲜花防守
    zh_trad: 鮮花防守
  descriptions:
    jp_kanji: "不思議な　力を　使って\n場にいる　くさタイプの　ポケモン\n全員の　防御を　あげる。"
    en: "The user raises the Defense stats of all Grass-type\nPokémon in battle with a mysterious power."
    fr: "Grâce à une force mystérieuse, la Défense\nde tous les Pokémon Plante au combat augmente."
    it: "Grazie a un misterioso potere, aumenta la Difesa\ndi tutti i Pokémon di tipo Erba presenti in campo."
    de: "Erhöht mit einer mysteriösen Macht die Verteidigung\naller am Kampf beteiligten Pflanzen-Pokémon."
    es: "Aumenta la Defensa de todos los Pokémon de tipo\nPlanta que hay en el combate usando unos misteriosos\npoderes."
    ko: "이상한 힘을 사용하여\n배틀에 나와 있는 모든\n풀타입 포켓몬의 방어를 올린다."
    zh_simp: "使用神奇的力量\n提高在场的所有\n草属性宝可梦的防御。"
    zh_trad: "使用神奇的力量，\n提高場上全體\n草屬性寶可夢的防禦。"
fly:
  names:
    jp_kanji: そらをとぶ
    en: Fly
    fr: Vol
    it: Volo
    de: Fliegen
    es: Vuelo
    ko: 공중날기
    zh_simp: 飞翔
    zh_trad: 飛翔
  descriptions:
    jp_kanji: "１ターン目で　空へ　飛び\n２ターン目に　相手を　攻撃する。"
    en: "The user flies up into the sky and then strikes its target\non the next turn."
    fr: Le lanceur s’envole au premier tour et frappe au second.
    it: "Chi la usa si alza in volo per attaccare al turno\nseguente."
    de: Steigt in Runde 1 empor und trifft das Ziel in Runde 2.
    es: "El usuario vuela en el primer turno y ataca en el\nsegundo."
    ko: "1턴째에 하늘을 날아\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合飞上天空，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合飛上天空，\n並於第２回合攻擊對手。"
flying_press:
  names:
    jp_kanji: フライングプレス
    en: Flying Press
    fr: Flying Press
    it: Schiacciatuffo
    de: Flying Press
    es: Plancha Voladora
    ko: 플라잉프레스
    zh_simp: 飞身重压
    zh_trad: 飛身重壓
  descriptions:
    jp_kanji: "空中から　相手に　ダイブする。\nこの技は　かくとうタイプと　同時に\nひこうタイプでも　ある。"
    en: "The user dives down onto the target from the sky.\nThis move is Fighting and Flying type simultaneously."
    fr: "Une attaque en piqué depuis le ciel, à la fois\nde type Combat et de type Vol."
    it: "Chi la usa si tuffa sul bersaglio dall’alto. È una\nmossa di tipo Lotta e Volante allo stesso tempo."
    de: "Der Anwender stürzt sich aus der Luft auf das Ziel.\nDie Attacke gehört sowohl dem Typ Kampf als auch\ndem Typ Flug an."
    es: "El Pokémon que lo usa se lanza sobre su oponente.\nEste movimiento es de tipo Lucha y tipo Volador al\nmismo tiempo."
    ko: "공중에서 상대에게 다이브한다.\n이 기술은 격투타입임과 동시에\n비행타입이기도 하다."
    zh_simp: "从空中俯冲向对手。\n此招式同时带有\n格斗属性和飞行属性。"
    zh_trad: "從空中俯衝向對手進行攻擊。\n此招式同時具有\n格鬥屬性和飛行屬性。"
focus_blast:
  names:
    jp_kanji: きあいだま
    en: Focus Blast
    fr: Exploforce
    it: Focalcolpo
    de: Fokusstoß
    es: Onda Certera
    ko: 기합구슬
    zh_simp: 真气弹
    zh_trad: 真氣彈
  descriptions:
    jp_kanji: "気合を　高めて\nありったけの　力を　放出する。\n相手の　特防を　さげることが　ある。"
    en: "The user heightens its mental focus and unleashes\nits power. This may also lower the target’s\nSp. Def stat."
    fr: "Le lanceur rassemble ses forces et laisse éclater\nson pouvoir. Peut aussi baisser la Défense Spéciale\nde l’ennemi."
    it: "Chi la usa si concentra e rilascia la sua forza.\nPuò ridurre la Difesa Speciale del Pokémon colpito."
    de: "Anwender erhöht seinen mentalen Fokus und greift\ndann an. Senkt eventuell Spezial-Verteidigung des\nZieles."
    es: "Agudiza la concentración mental y libera su poder.\nPuede disminuir la Defensa Especial del objetivo."
    ko: "기합을 높여서\n혼신의 힘을 방출한다. 상대의\n특수방어를 떨어뜨릴 때가 있다."
    zh_simp: "提高气势，\n释放出全部力量。\n有时会降低对手的特防。"
    zh_trad: "提高氣勢，\n釋放全身所有力量。\n有時會降低對手的特防。"
focus_energy:
  names:
    jp_kanji: きあいだめ
    en: Focus Energy
    fr: Puissance
    it: Focalenergia
    de: Energiefokus
    es: Foco Energía
    ko: 기충전
    zh_simp: 聚气
    zh_trad: 聚氣
  descriptions:
    jp_kanji: "深く息を吸い　気合をこめる。\n自分の攻撃が\n急所に当たりやすくなる。"
    en: "The user takes a deep breath and focuses so that its\nfuture attacks have a heightened chance of landing\ncritical hits."
    fr: "Le lanceur prend une profonde inspiration et se\nconcentre pour augmenter son taux de critiques."
    it: "Chi la usa fa un profondo respiro e si concentra\nper rendere più probabili i brutti colpi."
    de: "Der Anwender atmet ein und bündelt Kraft.\nDie Volltrefferquote steigt dadurch."
    es: "Concentra energía para aumentar las posibilidades de\nasestar un golpe crítico."
    ko: "깊게 숨을 들이마셔 기합을 넣는다.\n자신의 공격이\n급소에 맞기 쉬워진다."
    zh_simp: "深深地吸口气，集中精神。\n自己的攻击\n会变得容易击中要害。"
    zh_trad: "深呼吸後集中精神。\n讓自己的攻擊\n變得容易擊中要害。"
focus_punch:
  names:
    jp_kanji: きあいパンチ
    en: Focus Punch
    fr: Mitra-Poing
    it: Centripugno
    de: Power-Punch
    es: Puño Certero
    ko: 힘껏펀치
    zh_simp: 真气拳
    zh_trad: 真氣拳
  descriptions:
    jp_kanji: "精神を　高めて　パンチを　くりだす。\n技を　だすまでに\n攻撃を　受けると　失敗する。"
    en: "The user focuses its mind before launching a punch.\nThis move fails if the user is hit before it is used."
    fr: "Le lanceur se concentre avant d’attaquer.\nÉchoue s’il est touché avant d’avoir frappé."
    it: "Chi la usa prende la mira prima di sferrare un pugno.\nFallirà se verrà colpito prima di eseguire la mossa."
    de: "Anwender konzentriert sich, bevor er angreift. Wird er\nvorher getroffen, ist die Attacke erfolglos."
    es: "Se concentra para dar un puñetazo. Falla si se sufre un\ngolpe antes de su uso."
    ko: "정신을 집중해 펀치를 날린다.\n기술을 쓰기 전에\n공격을 받으면 실패한다."
    zh_simp: "集中精神出拳。\n在招式使出前\n若受到攻击则会失败。"
    zh_trad: "集中精神後出拳。\n若出拳前受到攻擊，\n則會失敗。"
follow_me:
  names:
    jp_kanji: このゆびとまれ
    en: Follow Me
    fr: Par Ici
    it: Sonoqui
    de: Spotlight
    es: Señuelo
    ko: 날따름
    zh_simp: 看我嘛
    zh_trad: 看我嘛
  descriptions:
    jp_kanji: "自分に　注目させて\n相手からの　攻撃を\nすべて　自分に　むけさせる。"
    en: "The user draws attention to itself, making all targets\ntake aim only at the user."
    fr: "Attire l’attention des ennemis pour les forcer\nà n’attaquer que le lanceur."
    it: "Chi la usa attira l’attenzione su di sé, costringendo\ni nemici a sceglierlo sempre come bersaglio."
    de: "Zieht Aufmerksamkeit auf sich. Gegner greifen nur den\nAnwender an."
    es: "Llama la atención para concentrar todos los ataques de\ntodos los del equipo rival hacia sí mismo."
    ko: "자신에게 시선을 집중시켜\n상대로부터의 공격을\n모두 자신에게 향하게 한다."
    zh_simp: "引起对手的注意，\n将对手的攻击\n全部转移到自己身上。"
    zh_trad: "吸引對手的注意，\n將對手的攻擊\n全部轉移到自己身上。"
force_palm:
  names:
    jp_kanji: はっけい
    en: Force Palm
    fr: Forte-Paume
    it: Palmoforza
    de: Kraftwelle
    es: Palmeo
    ko: 발경
    zh_simp: 发劲
    zh_trad: 發勁
  descriptions:
    jp_kanji: "相手の　体に\n衝撃波を　当てて　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is attacked with a shock wave. This may\nalso leave the target with paralysis."
    fr: "Une onde de choc frappe l’ennemi.\nPeut aussi paralyser la cible."
    it: "Chi la usa attacca con un’onda d’urto che\npuò anche paralizzare il bersaglio."
    de: "Das Ziel wird mit einer Schockwelle angegriffen,\ndie es eventuell paralysiert."
    es: "Ataca al objetivo con una onda de choque y puede\nllegar a paralizarlo."
    ko: "상대의 몸에\n충격파를 부딪쳐 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "向对手的身体\n发出冲击波进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "向對手的身體\n發出衝擊波進行攻擊。\n有時會讓對手陷入麻痺狀態。"
foresight:
  names:
    jp_kanji: みやぶる
    en: Foresight
    fr: Clairvoyance
    it: Preveggenza
    de: Scharfblick
    es: Profecía
    ko: 꿰뚫어보기
    zh_simp: 识破
    zh_trad: 識破
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
forests_curse:
  names:
    jp_kanji: もりののろい
    en: Forest’s Curse
    fr: Maléfice Sylvain
    it: Boscomalocchio
    de: Waldesfluch
    es: Condena Silvana
    ko: 숲의저주
    zh_simp: 森林咒术
    zh_trad: 森林詛咒
  descriptions:
    jp_kanji: "相手に　森ののろいを　かける。\nのろいを　かけられた　相手は\nタイプに　くさタイプが　追加される。"
    en: "The user puts a forest curse on the target.\nThe target is now Grass type as well."
    fr: "La cible est charmée par l’esprit de la forêt.\nLe type Plante est ajouté à ses types actuels."
    it: "Chi la usa invoca la maledizione del bosco sul\nbersaglio, che acquisisce così anche il tipo Erba."
    de: "Der Anwender belegt das Ziel mit einem Waldesfluch,\ndurch den dieses zusätzlich den Typ Pflanze annimmt."
    es: "El objetivo es presa de la maldición del bosque, por lo\nque pasa a ser un Pokémon de tipo Planta, además de\nconservar sus tipos habituales."
    ko: "상대에게 숲의 저주를 건다.\n저주에 걸린 상대는\n타입에 풀타입이 추가된다."
    zh_simp: "向对手施加森林咒术。\n中了咒术的对手\n会被追加草属性。"
    zh_trad: "向對手施加森林詛咒。\n中了詛咒的對手\n會被追加草屬性。"
foul_play:
  names:
    jp_kanji: イカサマ
    en: Foul Play
    fr: Tricherie
    it: Ripicca
    de: Schmarotzer
    es: Juego Sucio
    ko: 속임수
    zh_simp: 移花接木
    zh_trad: 欺詐
  descriptions:
    jp_kanji: "相手の　力を　利用する。\n戦っている　相手の　攻撃が\n高いほど　ダメージが　あがる。"
    en: "The user turns the target’s power against it.\nThe higher the target’s Attack stat, the greater\nthe damage it deals."
    fr: "Le lanceur utilise la force de l’ennemi.\nPlus l’Attaque de l’ennemi est élevée,\nplus le lanceur inflige de dégâts."
    it: "Chi la usa sfrutta la forza del bersaglio. Il danno\ninflitto è proporzionale all’Attacco del nemico."
    de: "Anwender macht sich die Kraft des Zieles zunutze.\nJe höher dessen Angriff, desto mehr Schaden richtet\ndie Attacke an."
    es: "El usuario emplea la fuerza del objetivo para atacarlo.\nCuanto mayor es el Ataque del objetivo, más daño\nprovoca."
    ko: "상대의 힘을 이용한다.\n싸우고 있는 상대의 공격이\n높을수록 데미지가 올라간다."
    zh_simp: "利用对手的力量进行攻击。\n正和自己战斗的对手，\n其攻击越高，伤害越大。"
    zh_trad: "利用對手的力量進行攻擊。\n對手的攻擊越高，\n給予對手的傷害越大。"
freeze_dry:
  names:
    jp_kanji: フリーズドライ
    en: Freeze-Dry
    fr: Lyophilisation
    it: Liofilizzazione
    de: Gefriertrockner
    es: Liofilización
    ko: 프리즈드라이
    zh_simp: 冷冻干燥
    zh_trad: 冷凍乾燥
  descriptions:
    jp_kanji: "相手を　急激に　冷やして\nこおり　状態に　することが　ある。\nみずタイプにも　効果バツグンになる。"
    en: "The user rapidly cools the target. This may also\nleave the target frozen. This move is super effective\non Water types."
    fr: "Refroidit violemment l’ennemi et peut le geler.\nSuper efficace sur les Pokémon de type Eau."
    it: "Chi la usa raffredda istantaneamente il bersaglio\ne può congelarlo. Risulta superefficace contro\ni Pokémon di tipo Acqua."
    de: "Das Ziel wird stark abgekühlt und manchmal sogar\neingefroren. Die Attacke ist sehr effektiv gegen\nWasser-Pokémon."
    es: "Enfría súbitamente al objetivo e incluso puede\ncongelarlo. Es supereficaz contra Pokémon de tipo\nAgua."
    ko: "상대를 급격히 차갑게 하여\n얼음 상태로 만들 때가 있다.\n물타입 포켓몬에게도 효과가 굉장해진다."
    zh_simp: "急剧冷冻对手，\n有时会让对手陷入冰冻状态。\n对于水属性宝可梦也是效果绝佳。"
    zh_trad: "急速冷凍對手，\n有時會讓對手陷入冰凍狀態。\n對水屬性寶可夢也是效果絕佳。"
freeze_shock:
  names:
    jp_kanji: フリーズボルト
    en: Freeze Shock
    fr: Éclair Gelé
    it: Elettrogelo
    de: Frostvolt
    es: Rayo Gélido
    ko: 프리즈볼트
    zh_simp: 冰冻伏特
    zh_trad: 冰凍伏特
  descriptions:
    jp_kanji: "電気を　まとった　氷の　塊で\n２ターン目に　相手を　たたきつける。\nまひ状態に　することが　ある。"
    en: "On the second turn, the user hits the target with\nelectrically charged ice. This may also leave the\ntarget with paralysis."
    fr: "Projette un bloc de glace électrifié sur l’ennemi\nau second tour. Peut aussi le paralyser."
    it: "Chi la usa lancia contro il bersaglio al turno\nsuccessivo una sfera di ghiaccio ricoperta di\nelettricità. Può anche paralizzarlo."
    de: "Feuert in der zweiten Runde elektrisch geladene\nEisklumpen auf das Ziel ab. Paralysiert das Ziel\neventuell."
    es: "El usuario carga un bloque de hielo con electricidad en\nel primer turno y ataca con él en el segundo. Puede\nparalizar."
    ko: "전기를 두른 얼음덩어리로\n2턴째에 상대를 내리친다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用覆盖着电流的冰块，\n在第２回合撞向对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "製造出帶有電流的冰塊，\n在下一回合攻擊對手。\n有時會讓對手陷入麻痺狀態。"
freezing_glare:
  names:
    jp_kanji: いてつくしせん
    en: Freezing Glare
    fr: Regard Glaçant
    it: Sguardo Gelido
    de: Eisiger Blick
    es: Mirada Heladora
    ko: 얼어붙는시선
    zh_simp: 冰冷视线
    zh_trad: 冰冷視線
  descriptions:
    jp_kanji: "両目から　サイコパワーを\n撃ちだして　攻撃する。\nこおり状態に　することが　ある。"
    en: "The user shoots its psychic power from its eyes\nto attack. This may also leave the target frozen."
    fr: "Les yeux du lanceur tirent des rayons psychiques.\nPeut aussi geler l’ennemi."
    it: "Il Pokémon attacca rilasciando energia psichica\ndagli occhi. Può congelare il bersaglio."
    de: "Der Anwender greift das Ziel mit Psycho-Kräften an,\ndie er aus seinen Augen abschießt. Das Ziel friert\neventuell ein."
    es: "A través de sus ojos emite poderes psíquicos con los\nque ataca al objetivo, al que puede llegar a congelar."
    ko: "두 눈에서 사이코 파워를\n발사해서 공격한다.\n얼음 상태로 만들 때가 있다."
    zh_simp: "从双眼发射精神力量进行攻击。\n有时会让对手陷入冰冻状态。"
    zh_trad: "從雙眼釋放出精神力量進行攻擊。\n有時會讓對手陷入冰凍狀態。"
freezy_frost:
  names:
    jp_kanji: こちこちフロスト
    en: Freezy Frost
    fr: Évo-Congélo
    it: Scricchiagelo
    de: Klirrfrost
    es: Glaceoprisma
    ko: 꽁꽁프로스트
    zh_simp: 冰冰霜冻
    zh_trad: 冰冰霜凍
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
frenzy_plant:
  names:
    jp_kanji: ハードプラント
    en: Frenzy Plant
    fr: Végé-Attaque
    it: Radicalbero
    de: Flora-Statue
    es: Planta Feroz
    ko: 하드플랜트
    zh_simp: 疯狂植物
    zh_trad: 瘋狂植物
  descriptions:
    jp_kanji: "大きな　樹木で\n相手を　たたきつけて　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The user slams the target with the roots of an\nenormous tree. The user can’t move on the next turn."
    fr: "Un violent coup de racines s’abat sur l’ennemi.\nImmobilise le lanceur au tour suivant."
    it: "Un groviglio di radici colpisce il bersaglio.\nChi la usa salta il turno successivo."
    de: "Mächtiger Angriff mit Ästen. Der Anwender muss eine\nRunde aussetzen."
    es: "Golpea con una enorme planta. Quien lo usa no puede\nmoverse en el siguiente turno."
    ko: "큰 나무로\n상대를 힘껏 쳐서 공격한다.\n다음 턴은 움직일 수 없게 된다."
    zh_simp: "用大树摔打对手进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "將大大的樹木\n甩向對手進行攻擊。\n下一回合自己將無法動彈。"
frost_breath:
  names:
    jp_kanji: こおりのいぶき
    en: Frost Breath
    fr: Souffle Glacé
    it: Alitogelido
    de: Eisesodem
    es: Vaho Gélido
    ko: 얼음숨결
    zh_simp: 冰息
    zh_trad: 冰息
  descriptions:
    jp_kanji: "冷たい　息を\n相手に　吹きつけて　攻撃する。\n必ず　急所に　当たる。"
    en: "The user blows its cold breath on the target. This\nattack always results in a critical hit."
    fr: "Un souffle froid blesse l’ennemi.\nL’effet est toujours critique."
    it: "Chi la usa attacca il bersaglio con un soffio\nd’aria gelida. Brutto colpo assicurato."
    de: "Anwender greift an, indem er dem Ziel eisigen Atem\nentgegenhaucht. Volltreffergarantie."
    es: "Quien lo usa ataca lanzando un aliento gélido. Siempre\nasesta un golpe crítico."
    ko: "차가운 숨결을\n상대에게 내뿜어 공격한다.\n반드시 급소에 맞는다."
    zh_simp: "将冰冷的气息\n吹向对手进行攻击。\n必定会击中要害。"
    zh_trad: "將冰冷的氣息\n吹向對手進行攻擊。\n必定會擊中要害。"
frustration:
  names:
    jp_kanji: やつあたり
    en: Frustration
    fr: Frustration
    it: Frustrazione
    de: Frustration
    es: Frustración
    ko: 화풀이
    zh_simp: 迁怒
    zh_trad: 遷怒
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
fury_attack:
  names:
    jp_kanji: みだれづき
    en: Fury Attack
    fr: Furie
    it: Furia
    de: Furienschlag
    es: Ataque Furia
    ko: 마구찌르기
    zh_simp: 乱击
    zh_trad: 亂擊
  descriptions:
    jp_kanji: "つのや　くちばしで\n相手を　つついて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The target is jabbed repeatedly with a horn or beak\ntwo to five times in a row."
    fr: "Frappe l’ennemi deux à cinq fois d’affilée avec un bec\nou une corne, par exemple."
    it: "Infilza il bersaglio con corna affilate o con il becco\nda due a cinque volte di fila."
    de: "Spießt das Ziel zwei- bis fünfmal mit spitzem Horn\noder Schnabel auf."
    es: Cornea al objetivo de dos a cinco veces.
    ko: "뿔이나 부리로\n상대를 찔러서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用角或喙\n刺向对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用角或喙\n刺向對手進行攻擊。\n連續攻擊２～５次。"
fury_cutter:
  names:
    jp_kanji: れんぞくぎり
    en: Fury Cutter
    fr: Taillade
    it: Tagliofuria
    de: Zornklinge
    es: Corte Furia
    ko: 연속자르기
    zh_simp: 连斩
    zh_trad: 連斬
  descriptions:
    jp_kanji: "カマや　ツメなどで　相手を\n切りつけて　攻撃する。\n連続で　当てると　威力が　あがる。"
    en: "The target is slashed with scythes or claws. This\nattack becomes more powerful if it hits\nin succession."
    fr: "Un coup de faux ou de griffe dont la force augmente\nquand il touche plusieurs fois d’affilée."
    it: "Colpisce il bersaglio con falci o artigli. Se usata\nin successione aumenta di potenza ogni volta\nche va a segno."
    de: "Eine Attacke mit Scheren oder Klauen, deren Härte bei\naufeinanderfolgenden Treffern zunimmt."
    es: "Ataque con garras o guadaña que crece en intensidad\nsi se usa repetidas veces."
    ko: "낫이나 발톱 등으로 상대를\n베어 공격한다.\n연속으로 맞히면 위력이 올라간다."
    zh_simp: "用镰刀或爪子等\n切斩对手进行攻击。\n连续击中，威力就会提高。"
    zh_trad: "用鐮刀或爪子等\n斬切對手進行攻擊。\n連續命中時威力會提高。"
fury_swipes:
  names:
    jp_kanji: みだれひっかき
    en: Fury Swipes
    fr: Combo-Griffe
    it: Sfuriate
    de: Kratzfurie
    es: Golpes Furia
    ko: 마구할퀴기
    zh_simp: 乱抓
    zh_trad: 亂抓
  descriptions:
    jp_kanji: "ツメや　カマなどで\n相手を　ひっかいて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The target is raked with sharp claws or scythes\nquickly two to five times in a row."
    fr: "L’ennemi est lacéré par des faux ou des griffes\nde deux à cinq fois d’affilée."
    it: "Colpisce il bersaglio con artigli o falci affilate\nda due a cinque volte in rapida successione."
    de: "Beharkt das Ziel zwei- bis fünfmal mit scharfen Klauen\noder Sicheln."
    es: Araña rápidamente de dos a cinco veces.
    ko: "손톱이나 낫 등으로\n상대를 할퀴어서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用爪子或镰刀等\n抓对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用爪子或鐮刀等\n向對手進行攻擊。\n可連續攻擊２～５次。"
fusion_bolt:
  names:
    jp_kanji: クロスサンダー
    en: Fusion Bolt
    fr: Éclair Croix
    it: Incrotuono
    de: Kreuzdonner
    es: Rayo Fusión
    ko: 크로스썬더
    zh_simp: 交错闪电
    zh_trad: 交錯閃電
  descriptions:
    jp_kanji: "巨大な　雷を　たたきつける。\n巨大な　炎の　影響を受け\n技の　威力が　あがる。"
    en: "The user throws down a giant lightning bolt. This\nmove’s power is increased when influenced by an\nenormous flame."
    fr: "Projette un orbe électrique gigantesque.\nL’effet augmente sous l’influence de Flamme Croix."
    it: "Chi la usa lancia un fulmine enorme. Se usata in\ncombinazione con Incrofiamma, il danno provocato\ndalla mossa aumenta."
    de: "Feuert einen monströsen Blitz ab. Wird die Attacke\ndurch eine gigantische Flamme modifiziert, steigt die\nStärke."
    es: "Ataca con una enorme descarga eléctrica. Aumenta\nsu potencia si es influenciada por una gigantesca\nllamarada."
    ko: "거대한 천둥을 내리친다.\n거대한 불꽃의 영향을 받아\n기술의 위력이 올라간다."
    zh_simp: "释放出巨大的闪电。\n受到巨大的火焰影响时，\n招式威力会提高。"
    zh_trad: "放出巨大的閃電攻擊對手。\n受到巨大的火焰影響時，\n招式的威力會提高。"
fusion_flare:
  names:
    jp_kanji: クロスフレイム
    en: Fusion Flare
    fr: Flamme Croix
    it: Incrofiamma
    de: Kreuzflamme
    es: Llama Fusión
    ko: 크로스플레임
    zh_simp: 交错火焰
    zh_trad: 交錯火焰
  descriptions:
    jp_kanji: "巨大な　炎を　たたきつける。\n巨大な　雷の　影響を受け\n技の　威力が　あがる。"
    en: "The user brings down a giant flame. This move’s\npower is increased when influenced by an enormous\nlightning bolt."
    fr: "Projette une boule de feu gigantesque.\nL’effet augmente sous l’influence d’Éclair Croix."
    it: "Chi la usa lancia una fiammata enorme. Se usata in\ncombinazione con Incrotuono, il danno provocato\ndalla mossa aumenta."
    de: "Feuert eine monströse Flamme ab. Wird die Attacke\ndurch einen gigantischen Blitz modifiziert, steigt die\nStärke."
    es: "Ataca con una llamarada gigantesca. Aumenta su\npotencia si es influenciada por una gran energía\neléctrica."
    ko: "거대한 불꽃을 내리친다.\n거대한 천둥의 영향을 받아\n기술의 위력이 올라간다."
    zh_simp: "释放出巨大的火焰。\n受到巨大的闪电影响时，\n招式威力会提高。"
    zh_trad: "放出巨大的火焰攻擊對手。\n受到巨大的閃電影響時，\n招式的威力會提高。"
future_sight:
  names:
    jp_kanji: みらいよち
    en: Future Sight
    fr: Prescience
    it: Divinazione
    de: Seher
    es: Premonición
    ko: 미래예지
    zh_simp: 预知未来
    zh_trad: 預知未來
  descriptions:
    jp_kanji: "技を　使った　２ターン後に\n相手に　念力の\n塊を　送って　攻撃する。"
    en: "Two turns after this move is used, a hunk of psychic\nenergy attacks the target."
    fr: "De l’énergie psychique vient frapper l’ennemi\ndeux tours après l’utilisation de cette capacité."
    it: "Due turni dopo l’utilizzo di questa mossa,\nil bersaglio viene attaccato con energia psichica."
    de: "Zwei Runden, nachdem Seher eingesetzt wurde,\nerfolgt ein Angriff mit Psycho-Energie."
    es: "Concentra energía psíquica para golpear al objetivo dos\nturnos después."
    ko: "기술을 사용한 2턴 뒤에\n상대에게 염동력의\n덩어리를 보내어 공격한다."
    zh_simp: "在使用招式２回合后，\n向对手发送一团念力进行攻击。"
    zh_trad: "使用招式的２回合後，\n向對手發送一團念力進行攻擊。"
gastro_acid:
  names:
    jp_kanji: いえき
    en: Gastro Acid
    fr: Suc Digestif
    it: Gastroacido
    de: Magensäfte
    es: Bilis
    ko: 위액
    zh_simp: 胃液
    zh_trad: 胃液
  descriptions:
    jp_kanji: "胃液を　相手の\n体に　吐きつける。　ついた　胃液は\n相手の　特性の　効果を　消す。"
    en: "The user hurls up its stomach acids on the target.\nThe fluid eliminates the effect of the target’s Ability."
    fr: "Le lanceur répand ses sucs digestifs sur l’ennemi.\nLe fluide neutralise le talent de l’ennemi."
    it: "Chi la usa lancia acidi gastrici sul bersaglio.\nIl fluido annulla l’abilità del Pokémon colpito."
    de: "Anwender greift das Ziel mit eigenen Magensäften an.\nEntfernt Effekte von dessen Fähigkeit."
    es: "El usuario arroja sus jugos biliares al objetivo, lo que\nanula el efecto de la habilidad en uso."
    ko: "상대의 몸에 위액을 내뱉는다.\n달라붙은 위액은 상대의\n특성 효과를 지운다."
    zh_simp: "将胃液吐向对手的身体。\n沾上的胃液会消除\n对手的特性效果。"
    zh_trad: "將胃液吐向對手的身體。\n沾到的胃液會消除\n對手的特性效果。"
gear_grind:
  names:
    jp_kanji: ギアソーサー
    en: Gear Grind
    fr: Lancécrou
    it: Ingracolpo
    de: Klikkdiskus
    es: Rueda Doble
    ko: 기어소서
    zh_simp: 齿轮飞盘
    zh_trad: 齒輪飛盤
  descriptions:
    jp_kanji: "鋼鉄の　ギアを　相手に\n投げつけて　攻撃する。\n２回連続で　ダメージを　与える。"
    en: "The user attacks by throwing steel gears at its\ntarget twice."
    fr: "Le lanceur jette deux écrous d’acier qui frappent\nl’ennemi deux fois d’affilée."
    it: "Chi la usa colpisce il bersaglio due volte di fila\nlanciandogli contro degli ingranaggi d’acciaio."
    de: "Anwender greift an, indem er stählerne Zahnräder\nauf das Ziel schleudert. Angriff erfolgt zweimal\nhintereinander."
    es: "Rota dos engranajes de hierro sobre el objetivo. Golpea\ndos veces."
    ko: "강철의 기어를 상대에게\n던져서 공격한다.\n2회 연속으로 데미지를 준다."
    zh_simp: "向对手投掷\n钢铁齿轮进行攻击。\n连续２次给予伤害。"
    zh_trad: "向對手投擲\n鋼鐵齒輪進行攻擊。\n連續２次給予傷害。"
gear_up:
  names:
    jp_kanji: アシストギア
    en: Gear Up
    fr: Engrenage
    it: Marciainpiù
    de: Hilfsmechanik
    es: Piñón Auxiliar
    ko: 어시스트기어
    zh_simp: 辅助齿轮
    zh_trad: 輔助齒輪
  descriptions:
    jp_kanji: "ギアを　入れる　ことによって\n特性　プラスと　マイナスの\n攻撃と　特攻が　あがる。"
    en: "The user engages its gears to raise the Attack and\nSp. Atk stats of ally Pokémon with the Plus or\nMinus Ability."
    fr: "Change de réglage pour augmenter l’Attaque\net l’Attaque Spéciale des alliés ayant les talents\nPlus ou Moins."
    it: "Dà una marcia in più agli alleati con le abilità\nMeno o Più aumentandone l’Attacco e l’Attacco\nSpeciale."
    de: "Der Anwender erhöht mithilfe von Zahnrädern Angriff\nund Spezial-Angriff von Team-Pokémon mit der\nFähigkeit Plus oder Minus."
    es: "Cambia de marcha y logra aumentar el Ataque y el\nAtaque Especial de los Pokémon aliados que cuenten\ncon las habilidades Más y Menos."
    ko: "기어를 넣는 것으로\n특성 플러스와 마이너스의\n공격과 특수공격이 올라간다."
    zh_simp: "启动齿轮，\n提高特性为正电和负电的\n宝可梦的攻击和特攻。"
    zh_trad: "藉由啟動齒輪，\n提高特性為正電和負電的\n寶可夢的攻擊和特攻。"
genesis_supernova:
  names:
    jp_kanji: オリジンズスーパーノヴァ
    en: Genesis Supernova
    fr: Supernova Originelle
    it: Supernova delle Origini
    de: Supernova des Ursprungs
    es: Supernova Original
    ko: 오리진즈슈퍼노바
    zh_simp: 起源超新星大爆炸
    zh_trad: 起源超新星大爆炸
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
geomancy:
  names:
    jp_kanji: ジオコントロール
    en: Geomancy
    fr: Géo-Contrôle
    it: Geocontrollo
    de: Geokontrolle
    es: Geocontrol
    ko: 지오컨트롤
    zh_simp: 大地掌控
    zh_trad: 大地掌控
  descriptions:
    jp_kanji: "１ターン目で　エネルギーを\n吸収し　２ターン目に　特攻\n特防　素早さを　ぐーんと　あげる。"
    en: "The user absorbs energy and sharply raises its\nSp. Atk, Sp. Def, and Speed stats on the next turn."
    fr: "Le lanceur absorbe de l’énergie au premier tour\net augmente beaucoup son Attaque Spéciale,\nsa Défense Spéciale et sa Vitesse au second."
    it: "Chi la usa assorbe energia nel primo turno per\naumentare poi notevolmente l’Attacco Speciale,\nla Difesa Speciale e la Velocità in quello seguente."
    de: "Der Anwender saugt in Runde 1 Energie auf. In Runde 2\nsteigen der Spezial-Angriff, die Spezial-Verteidigung\nund die Initiative stark."
    es: "Concentra energía durante el primer turno, de forma\nque su Velocidad, Ataque Especial y Defensa Especial\naumenten mucho en el segundo."
    ko: "1턴째에 에너지를 흡수하여\n2턴째에 특수공격, 특수방어,\n스피드를 크게 올린다."
    zh_simp: "第１回合吸收能量，\n第２回合大幅提高\n特攻、特防和速度。"
    zh_trad: "使用後的第１回合吸收能量，\n並於第２回合大幅提高\n自己的特攻、特防和速度。"
giga_drain:
  names:
    jp_kanji: ギガドレイン
    en: Giga Drain
    fr: Giga-Sangsue
    it: Gigassorbimento
    de: Gigasauger
    es: Gigadrenado
    ko: 기가드레인
    zh_simp: 终极吸取
    zh_trad: 終極吸取
  descriptions:
    jp_kanji: "養分を　吸い取り　攻撃する。\n与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: "Das Ziel wird angegriffen und die Hälfte des zugefügten\nSchadens dem Anwender als KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes. Quien lo usa\nrecupera la mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n입힌 데미지의 절반에 해당하는\nHP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
giga_impact:
  names:
    jp_kanji: ギガインパクト
    en: Giga Impact
    fr: Giga Impact
    it: Gigaimpatto
    de: Gigastoß
    es: Gigaimpacto
    ko: 기가임팩트
    zh_simp: 终极冲击
    zh_trad: 終極衝擊
  descriptions:
    jp_kanji: "持てる力をすべて使って\n相手に突撃する。"
    en: "The user charges at the target using every bit of\nits power."
    fr: Le lanceur charge l’ennemi de toute sa puissance.
    it: Chi la usa carica il bersaglio usando tutta la sua forza.
    de: "Der Anwender rennt mit seiner ganzen Kraft gegen das\nZiel an."
    es: "El usuario carga contra el objetivo con toda la fuerza\nque tiene."
    ko: "가진 힘을 모두 사용해서\n상대에게 돌격한다."
    zh_simp: "使出自己浑身力量\n突击对手。"
    zh_trad: "使出全身上下所有力量\n突擊對手。"
gigavolt_havoc:physical:
  names:
    jp_kanji: スパーキングギガボルト
    en: Gigavolt Havoc
    fr: Fulguro-Lance Gigavolt
    it: Gigascarica Folgorante
    de: Gigavolt-Funkensalve
    es: Gigavoltio Destructor
    ko: 스파킹기가볼트
    zh_simp: 终极伏特狂雷闪
    zh_trad: 終極伏特狂雷閃
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
gigavolt_havoc:special:
  names:
    jp_kanji: スパーキングギガボルト
    en: Gigavolt Havoc
    fr: Fulguro-Lance Gigavolt
    it: Gigascarica Folgorante
    de: Gigavolt-Funkensalve
    es: Gigavoltio Destructor
    ko: 스파킹기가볼트
    zh_simp: 终极伏特狂雷闪
    zh_trad: 終極伏特狂雷閃
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
glacial_lance:
  names:
    jp_kanji: ブリザードランス
    en: Glacial Lance
    fr: Lance de Glace
    it: Lancia Glaciale
    de: Blizzardlanze
    es: Lanza Glacial
    ko: 블리자드랜스
    zh_simp: 雪矛
    zh_trad: 雪矛
  descriptions:
    jp_kanji: "吹雪を　まとった　氷の　槍を\n相手に　投げつけて　攻撃する。"
    en: "The user attacks by hurling a blizzard-cloaked\nicicle lance at opposing Pokémon."
    fr: "Le lanceur attaque l’ennemi avec une lance de glace\nentourée d’un blizzard."
    it: "Il Pokémon attacca i nemici scagliando una lancia\ndi ghiaccio accompagnata da una tormenta di neve."
    de: "Der Anwender wirft eine in einen Blizzard gehüllte\nLanze aus Eis auf gegnerische Pokémon."
    es: "El usuario ataca al objetivo lanzándole un carámbano de\nhielo envuelto en una ventisca."
    ko: "눈보라를 두른 얼음의 창을\n상대에게 던져서 공격한다."
    zh_simp: "向对手投掷\n掀起暴风雪的冰矛进行攻击。"
    zh_trad: "向對手投擲\n捲著暴風雪的冰矛進行攻擊。"
glaciate:
  names:
    jp_kanji: こごえるせかい
    en: Glaciate
    fr: Ère Glaciaire
    it: Gelamondo
    de: Eiszeit
    es: Mundo Gélido
    ko: 얼다세계
    zh_simp: 冰封世界
    zh_trad: 冰封世界
  descriptions:
    jp_kanji: "凍えるような　冷気を\n相手に　吹きつけて　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user attacks by blowing freezing cold air at\nopposing Pokémon. This lowers their Speed stats."
    fr: "Un souffle de vent qui congèle tout sur son passage\ns’abat sur l’ennemi. Réduit aussi sa Vitesse."
    it: "Chi la usa attacca i nemici intorno con una\nfolata d’aria gelida e ne riduce anche\nla Velocità."
    de: "Anwender greift an, indem er gegnerischen Pokémon\nklirrend kalte Luft entgegenbläst und dabei ihre\nInitiative senkt."
    es: "Ataque con aire helado que baja la Velocidad del\nobjetivo."
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "将冰冻的冷气\n吹向对手进行攻击。\n会降低对手的速度。"
    zh_trad: "放出冰凍的寒氣\n向對手進行攻擊。\n可降低對手的速度。"
glare:
  names:
    jp_kanji: へびにらみ
    en: Glare
    fr: Regard Médusant
    it: Sguardo Feroce
    de: Schlangenblick
    es: Deslumbrar
    ko: 뱀눈초리
    zh_simp: 大蛇瞪眼
    zh_trad: 大蛇瞪眼
  descriptions:
    jp_kanji: "おなかの　模様で　おびえさせて\n相手を　まひの　状態に　する。"
    en: "The user intimidates the target with the pattern on\nits belly to cause paralysis."
    fr: "Le lanceur intimide l’ennemi grâce à son regard\nterrifiant pour le paralyser."
    it: "Chi la usa spaventa il bersaglio con uno sguardo\nterrificante e ne causa la paralisi."
    de: Schüchtert Ziel ein, sodass dieses paralysiert wird.
    es: "Intimida y asusta al objetivo con la mirada para dejarlo\nparalizado."
    ko: "배의 무늬로 겁을 주어\n상대를 마비 상태로 만든다."
    zh_simp: "用腹部的花纹使对手害怕，\n从而让其陷入麻痹状态。"
    zh_trad: "用腹部的花紋使對手心生恐懼，\n讓對手陷入麻痺狀態。"
glitzy_glow:
  names:
    jp_kanji: どばどばオーラ
    en: Glitzy Glow
    fr: Évo-Psycho
    it: Auraswoosh
    de: Pulsieraura
    es: Espeaura
    ko: 콸콸오라
    zh_simp: 哗哗气场
    zh_trad: 嘩嘩氣場
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
grass_knot:
  names:
    jp_kanji: くさむすび
    en: Grass Knot
    fr: Nœud Herbe
    it: Laccioerboso
    de: Strauchler
    es: Hierba Lazo
    ko: 풀묶기
    zh_simp: 打草结
    zh_trad: 打草結
  descriptions:
    jp_kanji: "草を　からませて　相手を\n転ばせる。相手が　重いほど\n威力が　あがる。"
    en: "The user snares the target with grass and trips it.\nThe heavier the target, the greater the\nmove’s power."
    fr: "L’ennemi est piégé dans de l’herbe qui le fait trébucher.\nPlus il est lourd, plus la puissance de cette capacité\naugmente."
    it: "Chi la usa intrappola il bersaglio con l’erba e lo fa\ncadere. Danneggia maggiormente i Pokémon\npiù pesanti."
    de: "Ziel wird durch Gras ins Straucheln gebracht.\nJe schwerer das Ziel, desto mehr Schaden."
    es: "Enreda al objetivo con hierba y lo derriba. Cuanto más\npesado es el objetivo, más daño inflige."
    ko: "풀을 휘감아서 상대를\n쓰러뜨린다. 상대가 무거울수록\n위력이 올라간다."
    zh_simp: "用草缠住并绊倒对手。\n对手越重，威力越大。"
    zh_trad: "用打結的草絆倒對手。\n對手越重，威力越大。"
grass_pledge:
  names:
    jp_kanji: くさのちかい
    en: Grass Pledge
    fr: Aire d’Herbe
    it: Erbapatto
    de: Pflanzensäulen
    es: Voto Planta
    ko: 풀의맹세
    zh_simp: 草之誓约
    zh_trad: 草之誓約
  descriptions:
    jp_kanji: "草の柱で　攻撃する。\nみずと　組みあわせると　威力が\nあがって　あたりが　湿原に　なる。"
    en: "A column of grass hits the target. When used with\nits water equivalent, its power increases and a vast\nswamp appears."
    fr: "Une masse végétale s’abat sur l’ennemi.\nEn l’utilisant avec Aire d’Eau, l’effet augmente\net un marécage apparaît."
    it: "Attacca il bersaglio con una colonna d’erba.\nSe usata con Acquapatto, gli effetti aumentano\ne il campo diventa una palude."
    de: "Ein Angriff mit Pflanzensäulen. Mit Wassersäulen\nkombiniert steigt die Wirkung und die Umgebung\nwird zu einem Sumpf."
    es: "Ataca con columnas de hojas. Combinado con\nVoto Agua, crea un pantano y aumenta su potencia."
    ko: "풀기둥으로 공격한다.\n물과 조합하면 위력이\n올라가고 주변이 습지초원이 된다."
    zh_simp: "用草柱进行攻击。\n如果和水组合，威力就会提高，\n周围会变成湿地。"
    zh_trad: "用草柱進行攻擊。\n和水之誓約同時使用時，威力會提高，\n周圍會變成濕地。"
grass_whistle:
  names:
    jp_kanji: くさぶえ
    en: Grass Whistle
    fr: Siffl’Herbe
    it: Meloderba
    de: Grasflöte
    es: Silbato
    ko: 풀피리
    zh_simp: 草笛
    zh_trad: 草笛
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
grassy_glide:
  names:
    jp_kanji: グラススライダー
    en: Grassy Glide
    fr: Gliss’Herbe
    it: Erboscivolata
    de: Grasrutsche
    es: Fitoimpulso
    ko: 그래스슬라이더
    zh_simp: 青草滑梯
    zh_trad: 青草滑梯
  descriptions:
    jp_kanji: "地面を　滑るように　相手を　攻撃。\nグラスフィールドの時\n必ず　先制攻撃　できる。"
    en: "Gliding on the ground, the user attacks the target.\nThis move always goes first on Grassy Terrain."
    fr: "Le lanceur attaque l’ennemi en glissant sur le terrain.\nFrappe toujours en priorité si un Champ Herbu est actif."
    it: "Chi la usa attacca il bersaglio scivolando sul terreno.\nSe utilizzata quando è attivo un Campo Erboso,\nha priorità alta."
    de: "Der Anwender rutscht über den Boden und greift das\nZiel an. Ermöglicht den Erstschlag, wenn ein Grasfeld\naktiv ist."
    es: "Ataca al objetivo deslizándose sobre el terreno de\ncombate. Este movimiento tiene prioridad alta cuando\nel terreno está cubierto por un campo de hierba."
    ko: "지면에 미끄러지듯 상대를 공격한다.\n그래스필드일 때\n반드시 선제공격할 수 있다."
    zh_simp: "仿佛在地面上滑行般地攻击对手。\n在青草场地上，\n必定能够先制攻击。"
    zh_trad: "在地面上滑行般地攻擊對手。\n在青草場地時，\n必定能夠發動先制攻擊。"
grassy_terrain:
  names:
    jp_kanji: グラスフィールド
    en: Grassy Terrain
    fr: Champ Herbu
    it: Campo Erboso
    de: Grasfeld
    es: Campo de Hierba
    ko: 그래스필드
    zh_simp: 青草场地
    zh_trad: 青草場地
  descriptions:
    jp_kanji: "５ターンの　間　グラスフィールドにする。\n地面にいると　毎ターン　回復する。\nくさタイプの　威力が　あがる。"
    en: "The user turns the ground to grass for five turns.\nThis restores the HP of Pokémon on the ground a\nlittle every turn and powers up Grass-type moves."
    fr: "Pendant cinq tours, les Pokémon au sol récupèrent\nquelques PV à chaque tour et la puissance\ndes capacités de type Plante augmente."
    it: "Per cinque turni il terreno entra nello stato di Campo\nErboso: i Pokémon a terra recuperano PS a ogni turno\ne la potenza delle mosse di tipo Erba aumenta."
    de: "Regeneriert fünf Runden lang in jeder neuen Runde\nein paar KP aller Pokémon, die den Boden berühren.\nErhöht die Stärke von Pflanzen-Attacken."
    es: "Durante cinco turnos, se potencian los movimientos de\ntipo Planta y los Pokémon que están en contacto con el\nsuelo recuperan PS en cada turno."
    ko: "5턴 동안 그래스필드로 만든다.\n땅에 있으면 매 턴 회복한다.\n풀타입의 위력이 올라간다."
    zh_simp: "在５回合内变成青草场地。\n地面上的宝可梦每回合都能回复。\n草属性的招式威力还会提高。"
    zh_trad: "在５回合內將腳下變成青草場地。\n地面上的寶可夢每回合都會回復ＨＰ。\n草屬性招式的威力會提高。"
grav_apple:
  names:
    jp_kanji: Ｇのちから
    en: Grav Apple
    fr: Force G
    it: Forza G
    de: Gravitation
    es: Fuerza G
    ko: G의힘
    zh_simp: 万有引力
    zh_trad: 萬有引力
  descriptions:
    jp_kanji: "高いところから　りんごを　落として\nダメージを　与える。\n相手の　防御を　下げる。"
    en: "The user inflicts damage by dropping an apple from\nhigh above. This also lowers the target’s Defense stat."
    fr: "Le lanceur attaque son adversaire avec une pomme\nqu’il fait tomber de très haut. Baisse la Défense\nde la cible."
    it: "Chi la usa fa cadere una mela sul bersaglio da una\ngrande altezza, infliggendogli danni e riducendone\nla Difesa."
    de: "Ein Apfel fällt aus großer Höhe herab und richtet\nSchaden an. Dabei wird die Verteidigung des Zieles\ngesenkt."
    es: "El usuario ataca haciendo caer una manzana desde gran\naltura. Disminuye la Defensa del objetivo."
    ko: "높은 곳에서 사과를 떨어뜨려서\n데미지를 준다.\n상대의 방어를 떨어뜨린다."
    zh_simp: "从高处落下苹果，\n给予对手伤害。\n会降低对手的防御。"
    zh_trad: "讓蘋果從高處落下，\n給予對手傷害。\n可降低對手的防禦。"
gravity:
  names:
    jp_kanji: じゅうりょく
    en: Gravity
    fr: Gravité
    it: Gravità
    de: Erdanziehung
    es: Gravedad
    ko: 중력
    zh_simp: 重力
    zh_trad: 重力
  descriptions:
    jp_kanji: "５ターンの間　ふゆうや　ひこうタイプに\nじめんタイプの　技が　当たるようになる。\n空中に　飛ぶ　技も　使えない。"
    en: "This move enables Flying-type Pokémon or Pokémon\nwith the Levitate Ability to be hit by Ground-type\nmoves. Moves that involve flying can’t be used."
    fr: "Pendant cinq tours, les Pokémon Vol ou qui ont\nLévitation deviennent sensibles aux capacités Sol,\net les capacités volantes deviennent inutilisables."
    it: "Per cinque turni rende vulnerabili alle mosse di tipo\nTerra i Pokémon con Levitazione o di tipo Volante.\nNon è possibile usare mosse che fanno volare."
    de: "Ermöglicht es, Flug-Pokémon oder Pokémon mit der\nFähigkeit Schwebe mit Boden-Attacken zu treffen.\nVerhindert Attacken, bei denen der Anwender fliegt."
    es: "Durante cinco turnos, se anulan los movimientos que\nalzan el vuelo y los Pokémon de tipo Volador o que\nlevitan son vulnerables a movimientos de tipo Tierra."
    ko: "5턴 동안 부유나 비행타입에\n땅타입의 기술이 맞게 된다.\n공중으로 나는 기술도 사용할 수 없다."
    zh_simp: "在５回合内，飘浮特性和飞行属性的\n宝可梦会被地面属性的招式击中。\n飞向空中的招式也将无法使用。"
    zh_trad: "在５回合內，飄浮特性和飛行屬性的\n寶可夢會被地面屬性的招式擊中。\n且無法使用飛向空中的招式。"
growl:
  names:
    jp_kanji: なきごえ
    en: Growl
    fr: Rugissement
    it: Ruggito
    de: Heuler
    es: Gruñido
    ko: 울음소리
    zh_simp: 叫声
    zh_trad: 叫聲
  descriptions:
    jp_kanji: "かわいい　なきごえを　聞かせて\n気を　ひき　油断を　させて\n相手の　攻撃を　さげる。"
    en: "The user growls in an endearing way, making\nopposing Pokémon less wary. This lowers their\nAttack stats."
    fr: "Le lanceur pousse un cri tout mimi pour tromper\nla vigilance de l’ennemi et baisser son Attaque."
    it: "Distrae i nemici intorno con un tenero ruggito\ne ne riduce l’Attacco."
    de: "Der Anwender heult herzzerreißend, um gegnerische\nPokémon nachlässig werden zu lassen und deren\nAngriffs-Wert zu senken."
    es: Dulce gruñido que reduce el Ataque del equipo rival.
    ko: "귀여운 울음소리를 들려주고\n관심을 끌어 방심한 사이에\n상대의 공격을 떨어뜨린다."
    zh_simp: "让对手听可爱的叫声，\n引开注意力使其疏忽，\n从而降低对手的攻击。"
    zh_trad: "發出可愛的叫聲，\n誘使對手疏忽大意，\n降低對手的攻擊。"
growth:
  names:
    jp_kanji: せいちょう
    en: Growth
    fr: Croissance
    it: Crescita
    de: Wachstum
    es: Desarrollo
    ko: 성장
    zh_simp: 生长
    zh_trad: 生長
  descriptions:
    jp_kanji: "体を　一気に\n大きく　生長させて\n攻撃と　特攻を　あげる。"
    en: "The user’s body grows all at once, raising the\nAttack and Sp. Atk stats."
    fr: "Le corps du lanceur se développe.\nAugmente l’Attaque et l’Attaque Spéciale."
    it: "Provoca la crescita immediata del corpo\ne l’aumento dell’Attacco e dell’Attacco Speciale\ndi chi la usa."
    de: "Der Körper wächst. Dadurch steigen Angriff und\nSpezial-Angriff."
    es: "Hace que su cuerpo crezca a marchas forzadas con lo\nque aumenta su Ataque y Ataque Especial."
    ko: "몸을 일시에\n크게 성장시켜\n공격과 특수공격을 올린다."
    zh_simp: "让身体一下子长大，\n从而提高攻击和特攻。"
    zh_trad: "讓身體瞬間長大，\n提高自己的攻擊和特攻。"
grudge:
  names:
    jp_kanji: おんねん
    en: Grudge
    fr: Rancune
    it: Rancore
    de: Nachspiel
    es: Rabia
    ko: 원념
    zh_simp: 怨念
    zh_trad: 怨念
  descriptions:
    jp_kanji: "相手の　技で　ひんしに　されたとき\nおんねんを　かけて\nその技の　ＰＰを　０に　する。"
    en: "If the user faints, the user’s grudge fully depletes\nthe PP of the opponent’s move that knocked it out."
    fr: "Si le lanceur est mis K.O., sa rancune épuise les PP\nde la capacité utilisée par l’ennemi pour le mettre K.O."
    it: "Se chi la usa va KO, i PP della mossa nemica\nche lo ha messo fuori gioco si azzerano."
    de: "Bei K.O. des Anwenders werden die AP der Attacke,\ndurch die er besiegt wurde, auf 0 herabgesetzt."
    es: "Si el usuario se debilita al recibir un ataque, todos los\nPP de este último ataque serán eliminados."
    ko: "상대의 기술로 기절하면\n원념을 담아\n그 기술의 PP를 0으로 만든다."
    zh_simp: "因对手的招式而陷入昏厥时\n给对手施加怨念，\n让该招式的ＰＰ变成０。"
    zh_trad: "因為對手的招式而陷入瀕死時，\n施加怨念，\n讓該招式的ＰＰ變成０。"
guard_split:
  names:
    jp_kanji: ガードシェア
    en: Guard Split
    fr: Partage Garde
    it: Paridifesa
    de: Schutzteiler
    es: Isoguardia
    ko: 가드셰어
    zh_simp: 防守平分
    zh_trad: 防守平分
  descriptions:
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防を　たして\n半分に　わける。"
    en: "The user employs its psychic power to average its\nDefense and Sp. Def stats with those of the target."
    fr: "Additionne la Défense et la Défense Spéciale\ndu lanceur et de sa cible et les redistribue\néquitablement entre les deux."
    it: "Chi la usa sfrutta la sua forza psichica per sommare\nDifesa e Difesa Speciale a quelle del bersaglio\ne dividerle equamente."
    de: "Durch Psycho-Kräfte werden Verteidigung und\nSpezial-Verteidigung des Anwenders und des\nZieles addiert und in zwei gleiche Hälften geteilt."
    es: "El usuario emplea sus poderes para hacer la media de\nsu Defensa y Defensa Especial con las de su objetivo y\ncompartirlas."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어를 더해서\n반으로 나눈다."
    zh_simp: "利用超能力将自己和对手的\n防御和特防相加，\n再进行平分。"
    zh_trad: "用超能力將自己和對手的\n防禦和特防各別相加後，\n再進行平分。"
guard_swap:
  names:
    jp_kanji: ガードスワップ
    en: Guard Swap
    fr: Permugarde
    it: Barattoscudo
    de: Schutztausch
    es: Cambiadefensa
    ko: 가드스웹
    zh_simp: 防守互换
    zh_trad: 防守互換
  descriptions:
    jp_kanji: "超能力で　自分と　相手の\n防御と　特防の\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch\nchanges to its Defense and Sp. Def stats with\nthe target."
    fr: "Pouvoir qui échange les modifications de la Défense\nSpéciale et de la Défense avec la cible."
    it: "Chi la usa sfrutta la sua forza psichica per scambiare\nle modifiche a Difesa e Difesa Speciale con il bersaglio."
    de: "Psychische Kräfte tauschen Änderungen an Verteidigung\nund Spezial-Verteidigung mit denen des Zieles."
    es: "El usuario emplea su poder mental para intercambiar\nlos cambios en la Defensa y Defensa Especial con el\nobjetivo."
    ko: "초능력으로 자신과 상대의\n방어와 특수방어의\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手的防御\n以及特防的能力变化。"
    zh_trad: "用超能力將自己和對手的\n防禦與特防的能力變化互相交換。"
guardian_of_alola:
  names:
    jp_kanji: ガーディアン・デ・アローラ
    en: Guardian of Alola
    fr: Colère du Gardien d’Alola
    it: Collera del Guardiano
    de: Alolas Wächter
    es: Cólera del Guardián
    ko: 알로라의수호자
    zh_simp: 巨人卫士・阿罗拉
    zh_trad: 巨人衛士・阿羅拉
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
guillotine:
  names:
    jp_kanji: ハサミギロチン
    en: Guillotine
    fr: Guillotine
    it: Ghigliottina
    de: Guillotine
    es: Guillotina
    ko: 가위자르기
    zh_simp: 极落钳
    zh_trad: 斷頭鉗
  descriptions:
    jp_kanji: "大きな　ハサミで\n相手を　切り裂いて　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "A vicious, tearing attack with big pincers. The target\nfaints instantly if this attack hits."
    fr: "Des pinces lacèrent violemment l’ennemi, le mettant\nK.O. sur le coup s’il est touché."
    it: "Attacca il bersaglio con pericolose tenaglie.\nSe l’attacco va a segno, il Pokémon colpito\nva subito KO."
    de: "Ein Angriff mit einer großen Schere. Trifft die Attacke,\nführt sie beim Ziel sofort zum K.O."
    es: "Ataque cortante que debilita al oponente de un golpe\nsi acierta."
    ko: "큰 집게로\n상대를 베어 갈라 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "用大钳子或剪刀等\n夹断对手进行攻击。\n只要命中就会一击昏厥。"
    zh_trad: "用巨大的鉗子或剪刀等\n撕裂對手進行攻擊。\n只要命中就會一擊瀕死。"
gunk_shot:
  names:
    jp_kanji: ダストシュート
    en: Gunk Shot
    fr: Détricanon
    it: Sporcolancio
    de: Mülltreffer
    es: Lanzamugre
    ko: 더스트슈트
    zh_simp: 垃圾射击
    zh_trad: 垃圾射擊
  descriptions:
    jp_kanji: "汚い　ゴミを\n相手に　ぶつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The user shoots filthy garbage at the target to\nattack. This may also poison the target."
    fr: "Le lanceur envoie des détritus sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa attacca il bersaglio con rifiuti sudici\nche possono anche avvelenarlo."
    de: "Anwender schießt mit Müll auf das Ziel. Vergiftet dieses\neventuell."
    es: "Lanza contra el objetivo basura asquerosa y puede\nenvenenarlo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用肮脏的垃圾\n撞向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的垃圾\n丟向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
gust:
  names:
    jp_kanji: かぜおこし
    en: Gust
    fr: Tornade
    it: Raffica
    de: Windstoß
    es: Tornado
    ko: 바람일으키기
    zh_simp: 起风
    zh_trad: 起風
  descriptions:
    jp_kanji: "翼でおこした激しい風を\n相手にぶつけて攻撃する。"
    en: "A gust of wind is whipped up by wings and launched at\nthe target to inflict damage."
    fr: "Le lanceur bat des ailes pour générer une bourrasque\nqui blesse l’ennemi."
    it: "Infligge danni al bersaglio con una folata di vento\nsollevata dalle ali."
    de: "Trifft das Ziel mit einem Windstoß, den es mit seinen\nFlügeln erzeugt."
    es: "Crea un tornado con las alas y lo lanza contra el\nobjetivo."
    ko: "날개로 일으킨 격한 바람을\n상대에게 부딪쳐서 공격한다."
    zh_simp: "用翅膀将刮起的狂风\n袭向对手进行攻击。"
    zh_trad: "用翅膀刮起狂風，\n吹向對手進行攻擊。"
gyro_ball:
  names:
    jp_kanji: ジャイロボール
    en: Gyro Ball
    fr: Gyroballe
    it: Vortexpalla
    de: Gyroball
    es: Giro Bola
    ko: 자이로볼
    zh_simp: 陀螺球
    zh_trad: 陀螺球
  descriptions:
    jp_kanji: "体を　高速に　回転させて\n体当たりする。相手より　素早さが\n低いほど　強い。"
    en: "The user tackles the target with a high-speed spin.\nThe slower the user compared to the target, the\ngreater the move’s power."
    fr: "Le lanceur effectue une rotation et frappe l’ennemi.\nPlus la Vitesse du lanceur est basse par rapport à celle\nde sa cible, plus il inflige de dégâts."
    it: "Chi la usa si scaglia sul bersaglio facendo ruotare\nvorticosamente il proprio corpo. Più lento è chi la usa,\nmaggiore è il danno."
    de: "Angriff mit hoher Geschwindigkeit. Je niedriger die\nInitiative des Anwenders im Vergleich zum Ziel ist,\ndesto höher der Schaden."
    es: "Embiste al objetivo con un potente ataque giratorio.\nCuanto más lento es el usuario, más daño causa."
    ko: "몸을 고속으로 회전시켜\n몸통박치기한다. 상대보다 스피드가\n낮을수록 위력은 올라간다."
    zh_simp: "让身体高速旋转并撞击对手。\n速度比对手越慢，威力越大。"
    zh_trad: "高速旋轉身體，撞擊對手。\n速度比對手越慢，威力越大。"
hail:
  names:
    jp_kanji: あられ
    en: Hail
    fr: Grêle
    it: Grandine
    de: Hagelsturm
    es: Granizo
    ko: 싸라기눈
    zh_simp: 冰雹
    zh_trad: 冰雹
  descriptions:
    jp_kanji: "５ターンの　間　あられを　降らして\nこおりタイプで　ない　ポケモン\n全員に　ダメージを　与える。"
    en: "The user summons a hailstorm lasting five turns.\nIt damages all Pokémon except Ice types."
    fr: "Invoque une tempête de grêle qui dure cinq tours.\nBlesse tous les Pokémon, sauf ceux de type Glace."
    it: "Chi la usa causa una grandinata che dura cinque turni.\nDanneggia tutti i Pokémon tranne quelli\ndi tipo Ghiaccio."
    de: "Hagelsturm für fünf Runden. Schadet allen außer\nEis-Pokémon."
    es: "Tormenta de granizo que dura cinco turnos. Hiere a\ntodos los Pokémon excepto a los de tipo Hielo."
    ko: "5턴 동안 싸라기눈을 내리게 해서\n얼음타입이 아닌 포켓몬\n모두에게 데미지를 준다."
    zh_simp: "在５回合内一直降冰雹，\n除冰属性的宝可梦以外，\n给予全体宝可梦伤害。"
    zh_trad: "降下冰雹，在５回合內\n場上除了冰屬性以外的寶可夢\n都會受到傷害。"
hammer_arm:
  names:
    jp_kanji: アームハンマー
    en: Hammer Arm
    fr: Marto-Poing
    it: Martelpugno
    de: Hammerarm
    es: Machada
    ko: 암해머
    zh_simp: 臂锤
    zh_trad: 臂錘
  descriptions:
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings and hits with its strong, heavy fist.\nIt lowers the user’s Speed, however."
    fr: "Le lanceur donne un puissant coup de poing à l’ennemi.\nRéduit la Vitesse du lanceur."
    it: "Infligge danni al bersaglio colpendolo con\nun pugno molto potente. Riduce la Velocità\ndi chi la usa."
    de: "Anwender trifft mit einem starken Hieb. Senkt Initiative\ndes Anwenders."
    es: "Gira con fuerza el puño y da un gran golpe. No\nobstante, baja la Velocidad."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的速度会降低。"
    zh_trad: "揮出強力而沉重的拳頭，\n給予對手傷害。\n自己的速度會降低。"
happy_hour:
  names:
    jp_kanji: ハッピータイム
    en: Happy Hour
    fr: Étrennes
    it: Cuccagna
    de: Goldene Zeiten
    es: Paga Extra
    ko: 해피타임
    zh_simp: 欢乐时光
    zh_trad: 歡樂時光
  descriptions:
    jp_kanji: "ハッピータイムの　技を　使うと\n戦闘の　あとで　もらえる\nお金が　倍になる。"
    en: "Using Happy Hour doubles the amount of prize\nmoney received after battle."
    fr: "Utilisée pendant un combat, multiplie par deux l’argent\ngagné à la fin."
    it: "Questa mossa raddoppia la ricompensa ricevuta\ndopo aver vinto una lotta."
    de: "Nach Einsatz der Attacke Goldene Zeiten verdoppelt\nsich das Preisgeld, das du im Falle eines Sieges\nerhältst."
    es: "Al usar este movimiento se consigue duplicar la\nrecompensa recibida tras el combate."
    ko: "해피타임 기술을 쓰면\n배틀 후에 받을 수 있는\n돈이 배가 된다."
    zh_simp: "如果使用欢乐时光，\n战斗后得到的钱会翻倍。"
    zh_trad: "使用歡樂時光後，\n戰鬥結束時獲得的錢會加倍。"
harden:
  names:
    jp_kanji: かたくなる
    en: Harden
    fr: Armure
    it: Rafforzatore
    de: Härtner
    es: Fortaleza
    ko: 단단해지기
    zh_simp: 变硬
    zh_trad: 變硬
  descriptions:
    jp_kanji: "全身に　力を　こめて\n体を　硬くして\n自分の　防御を　あげる。"
    en: "The user stiffens all the muscles in its body to raise\nits Defense stat."
    fr: "Le lanceur contracte tous ses muscles pour augmenter\nsa Défense."
    it: "Tutti i muscoli del corpo si tonificano\nper aumentare la Difesa."
    de: "Stärkt die Muskulatur und erhöht den\nVerteidigungs-Wert."
    es: "Tensa la musculatura del usuario para aumentar la\nDefensa."
    ko: "전신에 힘을 주어\n몸을 단단하게 해서\n자신의 방어를 올린다."
    zh_simp: "全身使劲，让身体变硬，\n从而提高自己的防御。"
    zh_trad: "使用全身的力量讓身體硬化，\n提高自己的防禦。"
haze:
  names:
    jp_kanji: くろいきり
    en: Haze
    fr: Buée Noire
    it: Nube
    de: Dunkelnebel
    es: Niebla
    ko: 흑안개
    zh_simp: 黑雾
    zh_trad: 黑霧
  descriptions:
    jp_kanji: "黒い霧を　だして　戦闘に\nでている　ポケモン　全員の\n能力変化を　もとに　もどす。"
    en: "The user creates a haze that eliminates every stat\nchange among all the Pokémon engaged in battle."
    fr: "Crée un brouillard qui annule les changements\nde stats de tous les Pokémon au combat."
    it: "Chi la usa crea una nube nera che annulla\nogni modifica alle statistiche di tutti i Pokémon\nin campo."
    de: "Erzeugt einen dunklen Nebel. Alle Veränderungen der\nStatuswerte der Kampfteilnehmer werden annulliert."
    es: "Neblina que elimina los cambios de características\nde todos los Pokémon en combate."
    ko: "흑안개를 뿜어 배틀에\n참가 중인 포켓몬 전원의\n능력 변화를 원래대로 돌린다."
    zh_simp: "升起黑雾，将正在场上战斗的\n全体宝可梦的能力变回原点。"
    zh_trad: "放出黑霧，讓場上全體寶可夢的\n能力變化回到初始狀態。"
head_charge:
  names:
    jp_kanji: アフロブレイク
    en: Head Charge
    fr: Peignée
    it: Ricciolata
    de: Steinschädel
    es: Ariete
    ko: 아프로브레이크
    zh_simp: 爆炸头突击
    zh_trad: 爆炸頭突擊
  descriptions:
    jp_kanji: "すごい　アフロの　頭で\n相手に　突進して　攻撃する。\n自分も　少し　ダメージを　受ける。"
    en: "The user charges its head into its target, using its\npowerful guard hair. This also damages the user\na little."
    fr: "Le lanceur donne un coup avec sa tête couronnée\nd’une fière crinière. Blesse aussi légèrement le lanceur."
    it: "Chi la usa carica il bersaglio con la testa in\nstile afro, ma subisce un po’ di danni per il\ncontraccolpo."
    de: "Rempelattacke mit ausgeflippter Retrofrisur. Anwender\nnimmt selbst leichten Schaden."
    es: "Propina un tremendo cabezazo. También daña al\nusuario un poco."
    ko: "굉장한 아프로 머리로\n상대에게 돌진하여 공격한다.\n자신도 조금 데미지를 입는다."
    zh_simp: "用厉害的爆炸头\n猛撞向对手进行攻击。\n自己也会受到少许伤害。"
    zh_trad: "用帥氣的爆炸頭\n猛撞對手進行攻擊。\n自己也會受到少許傷害。"
head_smash:
  names:
    jp_kanji: もろはのずつき
    en: Head Smash
    fr: Fracass’Tête
    it: Zuccata
    de: Kopfstoß
    es: Testarazo
    ko: 양날박치기
    zh_simp: 双刃头锤
    zh_trad: 雙刃頭錘
  descriptions:
    jp_kanji: "命を懸けて　こん身の力で\n相手に　ずつきをする。\n自分もダメージを受ける。"
    en: "The user attacks the target with a hazardous, full-power\nheadbutt. This also damages the user."
    fr: "Le lanceur assène un coup de tête désespéré.\nBlesse également le lanceur."
    it: "Chi la usa attacca con tutta la potenza di cui dispone,\nma subisce danni."
    de: "Anwender greift unter Einsatz seines Lebens mit einem\nKopfstoß an und nimmt dabei selbst Schaden."
    es: "El usuario arriesga su vida y lanza un cabezazo con toda\nsu fuerza, aunque también recibe daño."
    ko: "목숨을 걸고 혼신의 힘으로\n상대에게 박치기를 한다.\n자신도 데미지를 입는다."
    zh_simp: "拼命使出浑身力气，\n向对手进行头锤攻击。\n自己也会受到伤害。"
    zh_trad: "使出渾身力量，\n捨身向對手進行頭錘攻擊。\n自己也會受到傷害。"
headbutt:
  names:
    jp_kanji: ずつき
    en: Headbutt
    fr: Coup d’Boule
    it: Bottintesta
    de: Kopfnuss
    es: Golpe Cabeza
    ko: 박치기
    zh_simp: 头锤
    zh_trad: 頭錘
  descriptions:
    jp_kanji: "頭を　突きだして\nまっすぐ　つっこんで　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user sticks out its head and attacks by charging\nstraight into the target. This may also make the\ntarget flinch."
    fr: "Le lanceur donne un coup de tête.\nPeut apeurer l’ennemi."
    it: "Chi la usa si lancia diritto di testa contro\nil bersaglio. Può anche farlo tentennare."
    de: "Rammt das Ziel mit einer Kopfnuss. Ziel schreckt\neventuell zurück."
    es: Potente cabezazo que puede amedrentar al objetivo.
    ko: "머리를 내밀어\n곧장 돌진하여 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "将头伸出，\n笔直地扑向对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "將頭伸出，\n直直衝向對手進行攻擊。\n有時會讓對手畏縮。"
headlong_rush:
  names:
    jp_kanji: ぶちかまし
    en: Headlong Rush
    fr: Assaut Frontal
    it: Scontro Frontale
    de: Schmetterramme
    es: Arremetida
    ko: 들이받기
    zh_simp: 突飞猛扑
    zh_trad: 突飛猛撲
  descriptions:
    jp_kanji: "全身全霊のたいあたりをくらわせる。\n自分の守りの力がさがる。"
    en: "The user smashes into the target in a full-body tackle.\nThis also lowers the user’s defensive stats."
    fr: "Le lanceur charge l’ennemi de toutes ses forces.\nBaisse la puissance défensive du lanceur."
    it: "Chi la usa si schianta sul bersaglio con tutte le forze.\nLa sua forza difensiva diminuisce."
    de: "Der Anwender rammt das Ziel mit dem ganzen Körper.\nSenkt die Defensivkraft des Anwenders."
    es: "Arremete con todas sus fuerzas y reduce la defensiva\ndel usuario."
    ko: "온 힘을 다한 몸통박치기를 날린다.\n자신의 방어력이 떨어진다."
    zh_simp: "向对手使出灌注了全心全力的撞击。\n自己的防守力会降低。"
    zh_trad: "向對手使出灌注了全心全力的撞擊。\n自己的防守力會降低。"
heal_bell:
  names:
    jp_kanji: いやしのすず
    en: Heal Bell
    fr: Glas de Soin
    it: Rintoccasana
    de: Vitalglocke
    es: Campana Cura
    ko: 치료방울
    zh_simp: 治愈铃声
    zh_trad: 治癒鈴聲
  descriptions:
    jp_kanji: "心地好い　鈴の　音色を　聞かせて\n味方　全員の\n状態異常を　回復　する。"
    en: "The user makes a soothing bell chime to heal the\nstatus conditions of all the party Pokémon."
    fr: "Carillon apaisant qui soigne les altérations de statut\nde tous les Pokémon de l’équipe."
    it: "Chi la usa produce uno scampanellio che cura\ni problemi di stato suoi e dei Pokémon alleati."
    de: "Läutet beruhigend und heilt alle Statusprobleme\nim Team."
    es: "Tañido que cura los problemas de estado de todos los\nPokémon del equipo."
    ko: "기분 좋은 방울소리를\n들려주어 같은 편 전원의\n상태 이상을 회복한다."
    zh_simp: "让同伴听舒适的铃音，\n从而治愈我方全员的异常状态。"
    zh_trad: "發出悅耳的鈴聲，\n治癒我方全體的異常狀態。"
heal_block:
  names:
    jp_kanji: かいふくふうじ
    en: Heal Block
    fr: Anti-Soin
    it: Anticura
    de: Heilblockade
    es: Anticura
    ko: 회복봉인
    zh_simp: 回复封锁
    zh_trad: 回復封鎖
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
heal_order:
  names:
    jp_kanji: かいふくしれい
    en: Heal Order
    fr: Appel Soins
    it: Comandocura
    de: Heilbefehl
    es: Auxilio
    ko: 회복지령
    zh_simp: 回复指令
    zh_trad: 回復指令
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
heal_pulse:
  names:
    jp_kanji: いやしのはどう
    en: Heal Pulse
    fr: Vibra Soin
    it: Ondasana
    de: Heilwoge
    es: Pulso Cura
    ko: 치유파동
    zh_simp: 治愈波动
    zh_trad: 治癒波動
  descriptions:
    jp_kanji: "いやしのはどうを　とばして\n最大ＨＰの　半分\n相手の　ＨＰを　回復する。"
    en: "The user emits a healing pulse that restores the\ntarget’s HP by up to half of its max HP."
    fr: "Une aura de bien-être fait récupérer la moitié\nde ses PV max à la cible."
    it: "Chi la usa lancia un’onda rilassante che fa\nrecuperare al bersaglio metà dei suoi PS massimi."
    de: "Anwender löst eine Schmerzen lindernde Welle aus\nund heilt dabei das Ziel mit der Hälfte von dessen\nmaximalen KP."
    es: "Una onda curativa restaura la mitad de los PS máximos\ndel objetivo."
    ko: "치유파동을 날려서\n최대 HP의 절반만큼\n상대의 HP를 회복한다."
    zh_simp: "放出治愈波动，\n从而回复对手\n最大ＨＰ的一半。"
    zh_trad: "釋放出治癒波動，\n讓對手回復\n最大ＨＰ的一半。"
healing_wish:
  names:
    jp_kanji: いやしのねがい
    en: Healing Wish
    fr: Vœu Soin
    it: Curardore
    de: Heilopfer
    es: Deseo Cura
    ko: 치유소원
    zh_simp: 治愈之愿
    zh_trad: 治癒之願
  descriptions:
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\n状態異常と　ＨＰを　回復する。"
    en: "The user faints. In return, the Pokémon taking its\nplace will have its HP restored and status\nconditions cured."
    fr: "Le lanceur tombe K.O. pour soigner les PV et le statut\ndu Pokémon qui passe après lui."
    it: "Chi la usa va KO, ma il Pokémon che lo sostituisce\nrecupera tutti i PS e guarisce dai problemi di stato."
    de: "Anwender geht K.O. Das an seine Stelle tretende\nPokémon hat volle KP. Statusprobleme werden\ngeheilt."
    es: "El Pokémon cae debilitado, pero su sustituto recupera\nsu estado y los PS."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n상태 이상과 HP를 회복한다."
    zh_simp: "虽然自己陷入昏厥，\n但可以治愈后备上场的\n宝可梦的异常状态以及回复ＨＰ。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以治癒接替上場的\n寶可夢的異常狀態並回復ＨＰ。"
heart_stamp:
  names:
    jp_kanji: ハートスタンプ
    en: Heart Stamp
    fr: Crève-Cœur
    it: Cuorestampo
    de: Herzstempel
    es: Arrumaco
    ko: 하트스탬프
    zh_simp: 爱心印章
    zh_trad: 愛心印章
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
heart_swap:
  names:
    jp_kanji: ハートスワップ
    en: Heart Swap
    fr: Permucœur
    it: Cuorbaratto
    de: Statustausch
    es: Cambia Almas
    ko: 하트스웹
    zh_simp: 心灵互换
    zh_trad: 心靈互換
  descriptions:
    jp_kanji: "超能力で\n自分と　相手に　かかっている\n能力変化を　入れ替える。"
    en: "The user employs its psychic power to switch stat\nchanges with the target."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Chi la usa sfrutta la sua forza psichica per\nscambiare le modifiche alle statistiche con\nil bersaglio."
    de: "Anwender setzt Psycho-Kräfte ein, um\nStatusveränderungen des Zieles mit den\neigenen zu tauschen."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "초능력으로\n자신과 상대에 걸려 있는\n능력 변화를 교체한다."
    zh_simp: "利用超能力互换\n自己和对手之间的\n能力变化。"
    zh_trad: "用超能力將自己和對手的\n能力變化互相交換。"
heat_crash:
  names:
    jp_kanji: ヒートスタンプ
    en: Heat Crash
    fr: Tacle Feu
    it: Marchiafuoco
    de: Brandstempel
    es: Golpe Calor
    ko: 히트스탬프
    zh_simp: 高温重压
    zh_trad: 高溫重壓
  descriptions:
    jp_kanji: "燃える　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams its target with its flame-covered\nbody. The more the user outweighs the target, the\ngreater the move’s power."
    fr: "Le lanceur projette son corps enflammé contre l’ennemi.\nS’il est plus lourd que l’ennemi, l’effet augmente\nen conséquence."
    it: "Chi la usa carica con il suo corpo rovente. Più è\npesante rispetto al bersaglio, più danni causa."
    de: "Rempelattacke mit brennendem Körper. Je schwerer\nder Anwender im Vergleich zum Ziel ist, desto stärker\ndie Attacke."
    es: "El usuario ataca con su cuerpo ardiente. Cuanto mayor\nsea su peso comparado con el del objetivo, más daño\ncausará."
    ko: "불타는 몸으로 상대에게 부딪쳐서\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用燃烧的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用燃燒的身體重壓對手\n進行攻擊。體重比對手\n重越多，威力越大。"
heat_wave:
  names:
    jp_kanji: ねっぷう
    en: Heat Wave
    fr: Canicule
    it: Ondacalda
    de: Hitzewelle
    es: Onda Ígnea
    ko: 열풍
    zh_simp: 热风
    zh_trad: 熱風
  descriptions:
    jp_kanji: "熱い　息を\n相手に　吹きつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by exhaling hot breath on opposing\nPokémon. This may also leave those Pokémon with\na burn."
    fr: "Le lanceur provoque une vague de chaleur.\nPeut aussi brûler l’ennemi."
    it: "Chi la usa investe i nemici che ha intorno con\nuna folata di vento caldo. Può anche scottarli."
    de: "Gegnerische Pokémon werden von einem Sturm aus\nheißer Luft getroffen und erleiden eventuell\nVerbrennungen."
    es: "Provoca un viento abrasador que puede quemar al\nobjetivo."
    ko: "뜨거운 숨결을\n상대에게 내뿜어 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将炎热的气息\n吹向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "將炎熱的氣息\n吹向對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
heavy_slam:
  names:
    jp_kanji: ヘビーボンバー
    en: Heavy Slam
    fr: Tacle Lourd
    it: Pesobomba
    de: Rammboss
    es: Cuerpo Pesado
    ko: 헤비봄버
    zh_simp: 重磅冲撞
    zh_trad: 重磅衝撞
  descriptions:
    jp_kanji: "重たい　体で　相手に　ぶつかって\n攻撃する。　自分が　相手より\n重いほど　威力が　あがる。"
    en: "The user slams into the target with its heavy body.\nThe more the user outweighs the target, the greater\nthe move’s power."
    fr: "Le lanceur se jette sur l’ennemi de tout son poids.\nS’il est plus lourd que l’ennemi, l’effet augmente\nen conséquence."
    it: "Chi la usa si lancia contro il bersaglio con tutto\nil proprio peso. Più è pesante rispetto ad esso,\npiù danni causa."
    de: "Anwender rammt das Ziel mit massivem Körper.\nJe schwerer er im Vergleich zum Ziel ist, desto\nstärker die Attacke."
    es: "El usuario golpea con todo su cuerpo. Cuanto mayor\nsea su peso comparado con el del objetivo, más daño\ncausará."
    ko: "무거운 몸으로 상대에게 부딪쳐\n공격한다. 자신이 상대보다\n무거울수록 위력이 올라간다."
    zh_simp: "用沉重的身体撞向对手进行攻击。\n自己比对手越重，威力越大。"
    zh_trad: "用沉重的身體衝撞對手進行攻擊。\n體重比對手重越多，威力越大。"
helping_hand:
  names:
    jp_kanji: てだすけ
    en: Helping Hand
    fr: Coup d’Main
    it: Altruismo
    de: Rechte Hand
    es: Refuerzo
    ko: 도우미
    zh_simp: 帮助
    zh_trad: 幫助
  descriptions:
    jp_kanji: "仲間を　助ける。\nてだすけ　された　ポケモンの　技の\n威力は　いつもより　大きくなる。"
    en: "The user assists an ally by boosting the power of\nthat ally’s attack."
    fr: "Une capacité qui augmente la puissance d’attaque\nd’un allié."
    it: "Mossa che aumenta la potenza dell’attacco\ndi un alleato."
    de: "Anwender steigert die Stärke der Attacke eines\nMitstreiters."
    es: "El usuario ayuda a un aliado reforzando la potencia de\nsu ataque."
    ko: "동료를 돕는다.\n도움받은 포켓몬이 쓰는 기술의\n위력은 여느 때보다 커진다."
    zh_simp: "帮助伙伴。\n被帮助的宝可梦，\n其招式威力变得比平时大。"
    zh_trad: "幫助夥伴。\n被幫助的寶可夢，\n招式的威力會比原來更大。"
hex:
  names:
    jp_kanji: たたりめ
    en: Hex
    fr: Châtiment
    it: Sciagura
    de: Bürde
    es: Infortunio
    ko: 병상첨병
    zh_simp: 祸不单行
    zh_trad: 禍不單行
  descriptions:
    jp_kanji: "たたみかけるように攻撃する。\n相手が状態異常の場合\n威力は２倍になる。"
    en: "The user attacks with relentless intensity. This move’s\npower is doubled if the target has a status condition."
    fr: "Attaque acharnée dont la puissance est doublée\nsi la cible souffre d’une altération de statut."
    it: "Attacco la cui potenza raddoppia se il bersaglio\nha problemi di stato."
    de: "Eine Attacke, bei der der Anwender das Ziel bedrängt.\nDoppelt so stark gegen Ziele mit einem Statusproblem."
    es: "Ataque que causa el doble de daño a los objetivos que\nsufren problemas de estado."
    ko: "엎친 데 덮친 격으로 공격한다.\n상대가 상태 이상인 경우\n위력이 2배가 된다."
    zh_simp: "接二连三地进行攻击。\n攻击处于异常状态的对手时，\n威力会变成２倍。"
    zh_trad: "接二連三地向對手進行攻擊。\n攻擊處於異常狀態的對手時，\n威力會變成２倍。"
hidden_power:
  names:
    jp_kanji: めざめるパワー
    en: Hidden Power
    fr: Puissance Cachée
    it: Introforza
    de: Kraftreserve
    es: Poder Oculto
    ko: 잠재파워
    zh_simp: 觉醒力量
    zh_trad: 覺醒力量
  descriptions:
    jp_kanji: "不思議な力で技のタイプが\n相手に対して有利なタイプとなる。"
    en: "Through some mysterious power, this move changes\ntype to deal supereffective damage to the target."
    fr: "Grâce à un mystérieux pouvoir, cette capacité prend\nun type qui a l’avantage sur celui de l’ennemi."
    it: "Chi la usa adopera un misterioso potere per rendere\nil tipo della mossa vantaggioso rispetto a quello\ndel bersaglio."
    de: "Durch eine wundersame Kraft ändert sich der Typ der\nAttacke, um dem Typ des Zieles gegenüber im Vorteil\nzu sein."
    es: "Un poder misterioso cambia el tipo de este movimiento\na uno supereficaz contra el objetivo."
    ko: "신비한 힘에 의해 기술의 타입이\n상대에 대하여 유리한 타입이 된다."
    zh_simp: "用不可思议的力量\n让招式的属性变成\n对于对手具有优势的属性。"
    zh_trad: "用不可思議的力量\n讓招式的屬性變成\n對於對手具有優勢的屬性。"
high_horsepower:
  names:
    jp_kanji: １０まんばりき
    en: High Horsepower
    fr: Cavalerie Lourde
    it: Forza Equina
    de: Pferdestärke
    es: Fuerza Equina
    ko: 10만마력
    zh_simp: 十万马力
    zh_trad: 十萬馬力
  descriptions:
    jp_kanji: "全身を使って\n相手に猛アタックする。"
    en: The user fiercely attacks the target using its entire body.
    fr: "Le lanceur attaque violemment en utilisant\ntout son poids."
    it: Chi la usa travolge il bersaglio con un attacco possente.
    de: "Der Anwender greift das Ziel mit einer heftigen\nGanzkörper-Attacke an."
    es: Asesta un golpe devastador usando todo su cuerpo.
    ko: "온몸을 써서 상대를\n맹렬히 공격한다."
    zh_simp: "使出全身力量，\n猛攻对手。"
    zh_trad: "使出全身力量，\n猛攻對手。"
high_jump_kick:
  names:
    jp_kanji: とびひざげり
    en: High Jump Kick
    fr: Pied Voltige
    it: Calcinvolo
    de: Turmkick
    es: Pat. Salto Alta
    ko: 무릎차기
    zh_simp: 飞膝踢
    zh_trad: 飛膝踢
  descriptions:
    jp_kanji: "ジャンプからの　ひざげりで\n相手を　攻撃する。\nはずすと　自分が　ダメージを　受ける。"
    en: "The target is attacked with a knee kick from a jump.\nIf it misses, the user is hurt instead."
    fr: "Le lanceur s’élance pour effectuer un coup de genou\nsauté. S’il échoue, le lanceur se blesse."
    it: "Chi la usa colpisce il bersaglio con una ginocchiata\nin volo. Se fallisce, subisce danni."
    de: "Sprungtritt mit Knie. Bei Misserfolg verletzt sich der\nAnwender selbst."
    es: "El usuario salta muy alto y da un rodillazo. Si falla, se\nhará daño."
    ko: "점프해서 무릎차기로\n상대를 공격한다.\n빗나가면 자신이 데미지를 입는다."
    zh_simp: "跳起后用膝盖撞对手进行攻击。\n如果撞偏则自己会受到伤害。"
    zh_trad: "跳起後用膝蓋踢擊對手。\n沒踢中對手時自己會受到傷害。"
hold_back:
  names:
    jp_kanji: てかげん
    en: Hold Back
    fr: Retenue
    it: Riguardo
    de: Zurückhaltung
    es: Clemencia
    ko: 적당히손봐주기
    zh_simp: 手下留情
    zh_trad: 手下留情
  descriptions:
    jp_kanji: "手加減　した　攻撃で\n相手の　ＨＰを\n必ず　１だけ　残す。"
    en: "The user holds back when it attacks, and the target\nis left with at least 1 HP."
    fr: "Le lanceur attaque avec retenue, et laisse au moins\n1 PV à l’ennemi."
    it: "Chi la usa attacca il bersaglio, modulando il colpo\nin modo da lasciargli almeno un PS."
    de: "Der Anwender hält sich beim Angriff zurück und sorgt\nauf diese Weise dafür, dass dem Ziel danach mindestens\n1 KP verbleibt."
    es: "El usuario se contiene a la hora de atacar y deja al\nobjetivo con al menos 1 PS."
    ko: "적당히 공격하여\n상대의 HP를\n반드시 1은 남긴다."
    zh_simp: "在攻击的时候手下留情，\n从而使对手的ＨＰ\n至少会留下１ＨＰ。"
    zh_trad: "在攻擊的時候手下留情，\n讓對手的ＨＰ一定會剩下１。"
hold_hands:
  names:
    jp_kanji: てをつなぐ
    en: Hold Hands
    fr: Mains Jointes
    it: Mano nella Mano
    de: Händchenhalten
    es: Manos Juntas
    ko: 손에손잡기
    zh_simp: 牵手
    zh_trad: 牽手
  descriptions:
    jp_kanji: "味方の　ポケモン　同士が\n手をつなぐ。　とっても　幸せな\n気持ちに　なれる。"
    en: "The user and an ally hold hands. This makes them\nvery happy."
    fr: "Le lanceur et un allié se prennent la main,\nce qui les rend heureux."
    it: "Il Pokémon che la usa e un alleato si prendono\nper mano e fanno salti di gioia."
    de: "Der Anwender und ein Mitstreiter reichen einander\ndie Hände und verfallen in einen Zustand tiefster\nZufriedenheit."
    es: "El Pokémon le da la mano a un aliado y ambos se\nsienten muy felices."
    ko: "같은 편 포켓몬끼리\n손에 손을 잡는다. 굉장히\n행복한 기분이 들게 된다."
    zh_simp: "我方宝可梦之间牵手。\n能带来非常幸福的心情。"
    zh_trad: "我方的寶可夢手牽手。\n心情會變得非常幸福。"
hone_claws:
  names:
    jp_kanji: つめとぎ
    en: Hone Claws
    fr: Aiguisage
    it: Unghiaguzze
    de: Klauenwetzer
    es: Afilagarras
    ko: 손톱갈기
    zh_simp: 磨爪
    zh_trad: 磨爪
  descriptions:
    jp_kanji: "ツメを　磨いて　鋭く　する。\n自分の　攻撃と\n命中率を　あげる。"
    en: "The user sharpens its claws to boost its Attack stat\nand accuracy."
    fr: "Le lanceur s’aiguise les griffes.\nAugmente l’Attaque et la Précision."
    it: "Chi la usa affila i propri artigli aumentando\nAttacco e precisione."
    de: "Wetzt seine Klauen, um sie zu schärfen. Erhöht Angriff\nund Genauigkeit des Anwenders."
    es: "El usuario se afila las garras para aumentar su Ataque y\nPrecisión."
    ko: "손톱을 갈아 날카롭게 한다.\n자신의 공격과\n명중률을 올린다."
    zh_simp: "将爪子磨得更加锋利。\n提高自己的攻击和命中率。"
    zh_trad: "將爪子磨得更加鋒利。\n可提高自己的攻擊和命中率。"
horn_attack:
  names:
    jp_kanji: つのでつく
    en: Horn Attack
    fr: Koud’Korne
    it: Incornata
    de: Hornattacke
    es: Cornada
    ko: 뿔찌르기
    zh_simp: 角撞
    zh_trad: 角撞
  descriptions:
    jp_kanji: "鋭く　とがった　つので\n相手を　攻撃する。"
    en: "The target is jabbed with a sharply pointed horn to\ninflict damage."
    fr: "Frappe l’ennemi d’un coup de corne pointue pour\ninfliger des dégâts."
    it: "Danneggia il bersaglio infilzandolo con un corno\naffilato."
    de: Spießt das Ziel mit einem spitzen Horn auf.
    es: Ataca al objetivo con una cornada.
    ko: "날카롭고 뾰족한 뿔로\n상대를 공격한다."
    zh_simp: 用尖锐的角攻击对手。
    zh_trad: 用尖銳的角攻擊對手。
horn_drill:
  names:
    jp_kanji: つのドリル
    en: Horn Drill
    fr: Empal’Korne
    it: Perforcorno
    de: Hornbohrer
    es: Perforador
    ko: 뿔드릴
    zh_simp: 角钻
    zh_trad: 角鑽
  descriptions:
    jp_kanji: "回転する　つのを\n相手に　突き刺して　攻撃する。\n当たれば　一撃で　ひんしに　する。"
    en: "The user stabs the target with a horn that rotates\nlike a drill. The target faints instantly if this\nattack hits."
    fr: "Un coup de corne en vrille qui empale l’ennemi,\nle mettant K.O. sur le coup s’il est touché."
    it: "Colpisce il bersaglio con un corno perforante\ncome un trapano. Se il colpo va a segno,\nil Pokémon colpito va KO."
    de: "Attacke, bei der ein Horn als Bohrer eingesetzt wird.\nIst sie erfolgreich, führt sie zu einem K.O."
    es: "Ataque con un cuerno giratorio que fulmina de un solo\ngolpe al objetivo si lo alcanza."
    ko: "회전하는 뿔을\n상대에게 꿰찔러서 공격한다.\n맞으면 일격에 기절한다."
    zh_simp: "用旋转的角\n刺入对手进行攻击。\n只要命中就会一击昏厥。"
    zh_trad: "用旋轉的角\n刺進對手進行攻擊。\n只要命中就會一擊瀕死。"
horn_leech:
  names:
    jp_kanji: ウッドホーン
    en: Horn Leech
    fr: Encornebois
    it: Legnicorno
    de: Holzgeweih
    es: Asta Drenaje
    ko: 우드호른
    zh_simp: 木角
    zh_trad: 木角
  descriptions:
    jp_kanji: "つのを　突き刺して　相手の　養分を\n吸い取る。　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "The user drains the target’s energy with its horns.\nThe user’s HP is restored by half the damage taken\nby the target."
    fr: "Un coup de corne qui draine l’énergie de l’ennemi.\nConvertit la moitié des dégâts infligés en PV pour\nle lanceur."
    it: "Chi la usa infilza il bersaglio con le corna e\nassorbe una quantità di PS pari a metà\ndel danno inferto."
    de: "Greift Ziel mit einem Astgeweih an und zapft diesem\nEnergie ab. Anwender wird um die Hälfte des\nzugefügten Schadens geheilt."
    es: "Un golpe que drena energía. El Pokémon recupera la\nmitad de los PS arrebatados al objetivo."
    ko: "뿔을 꿰찔러서 상대의 양분을\n흡수한다. 입힌 데미지의 절반에\n해당하는 HP를 회복할 수 있다."
    zh_simp: "将角刺入，吸取对手的养分。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "將角刺進對手，吸取養分。\n可以回復給予對手\n傷害的一半ＨＰ。"
howl:
  names:
    jp_kanji: とおぼえ
    en: Howl
    fr: Grondement
    it: Gridodilotta
    de: Jauler
    es: Aullido
    ko: 멀리짖음
    zh_simp: 长嚎
    zh_trad: 長嚎
  descriptions:
    jp_kanji: "大声で　ほえて　気合を　高め\n自分と　味方の　攻撃を　あげる。"
    en: "The user howls loudly to raise the spirit of itself and\nallies. This raises their Attack stats."
    fr: "Le lanceur grogne pour se rassurer, ce qui augmente\nson Attaque et celle de ses alliés."
    it: "Chi la usa emette un forte verso per darsi coraggio\ne aumentare il proprio Attacco e quello degli alleati."
    de: "Der Kampfgeist sowie der Angriffs-Wert des Anwenders\nund seiner Mitstreiter werden durch lautes Jaulen\nerhöht."
    es: "Aullido que sube el ánimo y aumenta el Ataque del\nequipo."
    ko: "큰 소리로 짖어 기합을 높여서\n자신과 같은 편의 공격을 올린다."
    zh_simp: "大声吼叫提高气势，\n从而提高自己和同伴的攻击。"
    zh_trad: "大聲地吼叫提升氣勢，\n提高自己和同伴的攻擊。"
hurricane:
  names:
    jp_kanji: ぼうふう
    en: Hurricane
    fr: Vent Violent
    it: Tifone
    de: Orkan
    es: Vendaval
    ko: 폭풍
    zh_simp: 暴风
    zh_trad: 暴風
  descriptions:
    jp_kanji: "強烈な風で相手を\n包みこんで攻撃する。"
    en: "The user attacks by wrapping its opponent in a\nfierce wind."
    fr: "Le lanceur déclenche une violente rafale qui s’abat\nsur l’ennemi."
    it: "Chi la usa attacca il bersaglio avvolgendolo con\nun vento fortissimo."
    de: "Anwender greift das Ziel an, indem er es mit heftigen\nWindböen umgibt."
    es: "Golpea al objetivo con un fuerte torbellino que lo\nenvuelve."
    ko: "강렬한 바람으로 상대를\n둘러싸서 공격한다."
    zh_simp: "用强烈的风席卷\n对手进行攻击。"
    zh_trad: "用強烈的風席捲\n對手進行攻擊。"
hydro_cannon:
  names:
    jp_kanji: ハイドロカノン
    en: Hydro Cannon
    fr: Hydroblast
    it: Idrocannone
    de: Aquahaubitze
    es: Hidrocañón
    ko: 하이드로캐논
    zh_simp: 加农水炮
    zh_trad: 加農水炮
  descriptions:
    jp_kanji: "水の　大砲を\n相手に　発射して　攻撃する。\n次の　ターンは　動けなくなる。"
    en: "The target is hit with a watery blast. The user can’t\nmove on the next turn."
    fr: "Une trombe d’eau heurte l’ennemi.\nLe lanceur doit se reposer au tour suivant."
    it: "Colpisce il bersaglio con un potente getto d’acqua.\nChi la usa salta il turno successivo."
    de: "Das Ziel wird von einer Wasserkanone getroffen.\nAnwender setzt eine Runde aus."
    es: "Disparo de agua. El atacante debe descansar el\nsiguiente turno."
    ko: "물의 대포를\n상대에게 발사해서 공격한다.\n다음 턴은 움직일 수 없다."
    zh_simp: "向对手喷射水炮进行攻击。\n下一回合自己将无法动弹。"
    zh_trad: "向對手發射水炮進行攻擊。\n下一回合自己將無法動彈。"
hydro_pump:
  names:
    jp_kanji: ハイドロポンプ
    en: Hydro Pump
    fr: Hydrocanon
    it: Idropompa
    de: Hydropumpe
    es: Hidrobomba
    ko: 하이드로펌프
    zh_simp: 水炮
    zh_trad: 水炮
  descriptions:
    jp_kanji: "大量の水を激しい勢いで\n相手に発射して攻撃する。"
    en: "The target is blasted by a huge volume of water\nlaunched under great pressure."
    fr: Un puissant jet d’eau est dirigé sur l’ennemi.
    it: "Il bersaglio è travolto da un potente getto d’acqua\nspruzzato ad altissima pressione."
    de: Spritzt eine Menge Wasser mit Hochdruck auf das Ziel.
    es: Lanza una gran masa de agua a presión para atacar.
    ko: "대량의 물을 세찬 기세로\n상대에게 발사하여 공격한다."
    zh_simp: "向对手猛烈地喷射\n大量水流进行攻击。"
    zh_trad: "向對手猛烈地噴射\n大量水流進行攻擊。"
hydro_vortex:physical:
  names:
    jp_kanji: スーパーアクアトルネード
    en: Hydro Vortex
    fr: Super Tourbillon Abyssal
    it: Idrovortice Abissale
    de: Super-Wassertornado
    es: Hidrovórtice Abisal
    ko: 슈퍼아쿠아토네이도
    zh_simp: 超级水流大漩涡
    zh_trad: 超級水流大漩渦
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
hydro_vortex:special:
  names:
    jp_kanji: スーパーアクアトルネード
    en: Hydro Vortex
    fr: Super Tourbillon Abyssal
    it: Idrovortice Abissale
    de: Super-Wassertornado
    es: Hidrovórtice Abisal
    ko: 슈퍼아쿠아토네이도
    zh_simp: 超级水流大漩涡
    zh_trad: 超級水流大漩渦
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
hyper_beam:
  names:
    jp_kanji: はかいこうせん
    en: Hyper Beam
    fr: Ultralaser
    it: Iper Raggio
    de: Hyperstrahl
    es: Hiperrayo
    ko: 파괴광선
    zh_simp: 破坏光线
    zh_trad: 破壞光線
  descriptions:
    jp_kanji: "強い光線を\n相手に発射して攻撃する。"
    en: The target is attacked with a powerful beam.
    fr: Projette un puissant rayon sur l’ennemi.
    it: Colpisce il bersaglio con un potente raggio.
    de: Der Anwender greift mit einem mächtigen Lichtstrahl an.
    es: Ataca al objetivo con un poderoso rayo.
    ko: "강한 광선을\n상대에게 발사하여 공격한다."
    zh_simp: "向对手发射\n强烈的光线进行攻击。"
    zh_trad: "向對手發射\n強烈的光線進行攻擊。"
hyper_fang:
  names:
    jp_kanji: ひっさつまえば
    en: Hyper Fang
    fr: Croc de Mort
    it: Iperzanna
    de: Hyperzahn
    es: Hipercolmillo
    ko: 필살앞니
    zh_simp: 终结门牙
    zh_trad: 必殺門牙
  descriptions:
    jp_kanji: "鋭い　前歯で\n強く　かみついて　攻撃する。\n相手を　ひるませることが　ある。"
    en: "The user bites hard on the target with its sharp front\nfangs. This may also make the target flinch."
    fr: "Le lanceur mord l’ennemi à l’aide de ses incisives\naiguisées. Peut aussi l’apeurer."
    it: "Chi la usa morde il bersaglio con i suoi incisivi\naffilati. Può anche farlo tentennare."
    de: "Angriff mit scharfen Reißzähnen. Ziel schreckt eventuell\nzurück."
    es: "Ataca con agudos colmillos. Puede amedrentar al\nobjetivo."
    ko: "날카로운 앞니로\n강하게 물어서 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "用锋利的门牙\n牢牢地咬住对手进行攻击。\n有时会使对手畏缩。"
    zh_trad: "用銳利的門牙\n牢牢咬住對手進行攻擊。\n有時會使對手畏縮。"
hyper_voice:
  names:
    jp_kanji: ハイパーボイス
    en: Hyper Voice
    fr: Mégaphone
    it: Granvoce
    de: Schallwelle
    es: Vozarrón
    ko: 하이퍼보이스
    zh_simp: 巨声
    zh_trad: 巨聲
  descriptions:
    jp_kanji: "うるさく　響く　大きな　振動を\n相手に　与えて　攻撃する。"
    en: "The user lets loose a horribly echoing shout with\nthe power to inflict damage."
    fr: "Le lanceur pousse un cri dont l’écho terrifiant\na le pouvoir d’infliger des dégâts à l’ennemi."
    it: "Chi la usa lancia un urlo straziante che danneggia\ni nemici intorno a sé."
    de: "Eine laute Attacke, bei der gegnerische Pokémon mit\nSchallwellen angegriffen werden."
    es: Grito desgarrador que inflige daño al objetivo.
    ko: "시끄럽게 울리는 큰 진동을\n상대에게 전달하여 공격한다."
    zh_simp: "给予对手又吵又响的\n巨大震动进行攻击。"
    zh_trad: "製造出震耳欲聾的\n巨大聲波攻擊對手。"
hyperspace_fury:
  names:
    jp_kanji: いじげんラッシュ
    en: Hyperspace Fury
    fr: Furie Dimension
    it: Urtodimensionale
    de: Dimensionswahn
    es: Cerco Dimensión
    ko: 다른차원러시
    zh_simp: 异次元猛攻
    zh_trad: 異次元猛攻
  descriptions:
    jp_kanji: "たくさんの　腕で　まもるや　みきり\nなどを　無視した　連続攻撃。\n自分の　防御が　さがる。"
    en: "Using its many arms, the user unleashes a barrage of\nattacks that ignore the effects of moves like Protect\nand Detect. But the user’s Defense stat falls."
    fr: "Le Pokémon utilise sa multitude de bras pour infliger\nune nuée de coups qui ignorent les capacités telles\nqu’Abri ou Détection. Baisse la Défense du lanceur."
    it: "Permette di attaccare ripetutamente grazie ai molti\narti, ignorando mosse come Protezione o Individua.\nRiduce la Difesa di chi la usa."
    de: "Eine Angriffsserie mit vielen Armen, die die Wirkung\nvon Attacken wie Schutzschild und Scanner durchbricht.\nDabei sinkt die Verteidigung des Anwenders."
    es: "Ataca al objetivo con una ráfaga de golpes que pasan\npor alto los efectos de movimientos como Protección o\nDetección. Baja la Defensa del usuario."
    ko: "많은 팔로 방어와 판별 등을\n무시하는 연속 공격이다.\n자신의 방어가 떨어진다."
    zh_simp: "用许多手臂，无视对手的\n守住或看穿等招式进行连续攻击，\n自己的防御会降低。"
    zh_trad: "使用許多手臂，發動可\n不顧守住和看穿的連續攻擊。\n自己的防禦會降低。"
hyperspace_hole:
  names:
    jp_kanji: いじげんホール
    en: Hyperspace Hole
    fr: TrouDimensionnel
    it: Forodimensionale
    de: Dimensionsloch
    es: Paso Dimensional
    ko: 다른차원홀
    zh_simp: 异次元洞
    zh_trad: 異次元洞
  descriptions:
    jp_kanji: "異次元ホールで　突然　相手の\n真横に　現れ　攻撃する。\nまもるや　みきり　なども　無視　できる。"
    en: "Using a hyperspace hole, the user appears right\nnext to the target and strikes. This also hits a target\nusing a move such as Protect or Detect."
    fr: "Crée une faille dimensionnelle pour attaquer\nsoudainement l’ennemi de côté. Ignore même\nles capacités comme Abri ou Détection."
    it: "Chi la usa sfrutta un passaggio interdimensionale\nper comparire a fianco del bersaglio e colpirlo,\neludendo mosse come Protezione e Individua."
    de: "Der Anwender positioniert sich mithilfe eines\nDimensionslochs direkt neben dem Ziel und\ndurchbricht selbst Schutzschild, Scanner etc."
    es: "El usuario aparece junto al rival usando un agujero\ndimensional y le asesta un golpe que movimientos\ncomo Protección o Detección no pueden evitar."
    ko: "다른차원홀로 갑자기 상대\n바로 옆에 나타나 공격한다.\n방어나 판별 등도 무시할 수 있다."
    zh_simp: "通过异次元洞，\n突然出现在对手的侧面进行攻击。\n还可以无视守住和看穿等招式。"
    zh_trad: "利用異次元洞，\n突然出現在對手的側面進行攻擊。\n可避開對手的守住和看穿等招式。"
hypnosis:
  names:
    jp_kanji: さいみんじゅつ
    en: Hypnosis
    fr: Hypnose
    it: Ipnosi
    de: Hypnose
    es: Hipnosis
    ko: 최면술
    zh_simp: 催眠术
    zh_trad: 催眠術
  descriptions:
    jp_kanji: "眠気を誘う暗示をかけて\n相手をねむけ状態にする。"
    en: "The user employs hypnotic suggestion to make the\ntarget drowsy."
    fr: "Le lanceur hypnotise l’ennemi pour le plonger dans\nun état de somnolence."
    it: "Chi la usa si avvale della suggestione ipnotica\nper causare sonnolenza al bersaglio."
    de: Hypnose-Attacke, die das Ziel schläfrig macht.
    es: Hipnotiza al objetivo y le produce somnolencia.
    ko: "졸음을 유도하는 암시를 걸어서\n상대를 졸음 상태로 만든다."
    zh_simp: "施以诱导睡意的暗示，\n让对手陷入瞌睡状态。"
    zh_trad: "施加引發睡意的暗示，\n讓對手陷入瞌睡狀態。"
ice_ball:
  names:
    jp_kanji: アイスボール
    en: Ice Ball
    fr: Ball’Glace
    it: Palla Gelo
    de: Frostbeule
    es: Bola Hielo
    ko: 아이스볼
    zh_simp: 冰球
    zh_trad: 冰球
  descriptions:
    jp_kanji: "氷塊を放って攻撃する。\n技をだしたあと熱中状態になる。"
    en: "The user hurls a chunk of ice at the target, then becomes\nfixated on using this move."
    fr: "Le lanceur lance une balle de glace sur l’ennemi\net devient obsédé par la capacité."
    it: "Colpisce il bersaglio con un blocco di ghiaccio.\nTuttavia, chi la usa si fissa su questa mossa dopo averla\nsferrata."
    de: "Angriff mit einem Eisklumpen. Danach fixiert sich der\nAnwender auf diese Attacke."
    es: "Lanza bloques de hielo al objetivo. El usuario se crece\ntras usarlo."
    ko: "얼음덩어리를 날려서 공격한다.\n기술을 사용한 다음 열중 상태가 된다."
    zh_simp: "放出冰块进行攻击。\n招式结束后自己会陷入热衷状态。"
    zh_trad: "放出冰塊進行攻擊。\n招式結束後自己會陷入熱衷狀態。"
ice_beam:
  names:
    jp_kanji: れいとうビーム
    en: Ice Beam
    fr: Laser Glace
    it: Geloraggio
    de: Eisstrahl
    es: Rayo Hielo
    ko: 냉동빔
    zh_simp: 冰冻光束
    zh_trad: 冰凍光束
  descriptions:
    jp_kanji: "凍えるビームを\n発射して攻撃する。\n相手をしもやけ状態にすることもある。"
    en: "The target is struck with an icy-cold beam of energy.\nThis may also leave the target with frostbite."
    fr: "Un rayon de glace frappe l’ennemi.\nPeut aussi le geler."
    it: "Il bersaglio è colpito da un raggio di energia gelida\nche può anche assiderarlo."
    de: "Das Ziel wird von einem Eisstrahl getroffen und erleidet\neventuell Frostbrand."
    es: "Ataca con un rayo de hielo que además puede dejar\nhelado al objetivo."
    ko: "냉동빔을 발사하여 공격한다.\n상대를 동상 상태로 만들 때가 있다."
    zh_simp: "向对手发射\n冰冻光束进行攻击。\n有时会让对手陷入冻伤状态。"
    zh_trad: "向對手發射\n冰凍光束進行攻擊。\n有時還會讓對手陷入凍傷狀態。"
ice_burn:
  names:
    jp_kanji: コールドフレア
    en: Ice Burn
    fr: Feu Glacé
    it: Vampagelida
    de: Frosthauch
    es: Llama Gélida
    ko: 콜드플레어
    zh_simp: 极寒冷焰
    zh_trad: 極寒冷焰
  descriptions:
    jp_kanji: "すべてを　凍らせる　激しい　冷気で\n２ターン目に　相手を　包みこむ。\nやけど状態に　することが　ある。"
    en: "On the second turn, an ultracold, freezing wind\nsurrounds the target. This may leave the target with\na burn."
    fr: "Au second tour, le lanceur projette un souffle de vent\nglacial dévastateur sur l’ennemi. Peut aussi le brûler."
    it: "Chi la usa attacca il bersaglio al turno successivo\ne lo avvolge in un soffio d’aria gelida.\nPuò anche scottarlo."
    de: "Umgibt das Ziel in der nächsten Runde mit heftigen,\nalles gefrierenden Eisböen. Fügt dem Ziel eventuell\nVerbrennungen zu."
    es: "Ataca al objetivo en el segundo turno rodeándolo de\nun aire gélido. Puede causar quemaduras."
    ko: "모든 것을 얼려 버리는 격렬한 냉기로\n2턴째에 상대를 둘러싼다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用能够冻结一切的强烈冷气，\n在第２回合包裹住对手。\n有时会让对手陷入灼伤状态。"
    zh_trad: "在使用後的下一回合，\n用能夠凍結一切的強烈寒氣包圍對手。\n有時會讓對手陷入灼傷狀態。"
ice_fang:
  names:
    jp_kanji: こおりのキバ
    en: Ice Fang
    fr: Crocs Givre
    it: Gelodenti
    de: Eiszahn
    es: Colmillo Hielo
    ko: 얼음엄니
    zh_simp: 冰冻牙
    zh_trad: 冰凍牙
  descriptions:
    jp_kanji: "冷気をひめたキバでかみついて\n相手をしもやけ状態にすることもある。"
    en: "The user bites the target with cold-infused fangs to deal\ndamage. This may also leave the target with frostbite."
    fr: "Le lanceur inflige une morsure glaciale.\nPeut aussi geler la cible."
    it: "Chi la usa morde con denti ghiacciati che possono\nanche assiderare il bersaglio."
    de: "Anwender beißt mit eiskalten Reißzähnen zu.\nZiel erleidet eventuell Frostbrand."
    es: "El usuario muerde al objetivo con colmillos gélidos y\npuede hacer que se amedrente o se congele."
    ko: "냉기를 품은 이빨로 물어서\n상대를 동상 상태로 만들 때가 있다."
    zh_simp: "用藏有冷气的牙齿咬住对手。\n有时会使对手陷入冻伤状态。"
    zh_trad: "用帶有寒氣的牙齒咬住對手。\n有時還會讓對手陷入凍傷狀態。"
ice_hammer:
  names:
    jp_kanji: アイスハンマー
    en: Ice Hammer
    fr: Marteau de Glace
    it: Martelgelo
    de: Eishammer
    es: Martillo Hielo
    ko: 아이스해머
    zh_simp: 冰锤
    zh_trad: 冰錘
  descriptions:
    jp_kanji: "強くて　重い　こぶしを\nふるって　ダメージを　与える。\n自分の　素早さが　さがる。"
    en: "The user swings and hits with its strong, heavy fist.\nIt lowers the user’s Speed, however."
    fr: "Le lanceur donne un puissant coup de poing à l’ennemi.\nRéduit la Vitesse du lanceur."
    it: "Infligge danni al bersaglio colpendolo con\nun pugno molto potente. Riduce la Velocità\ndi chi la usa."
    de: "Anwender trifft mit einem starken Hieb. Senkt Initiative\ndes Anwenders."
    es: "Un terrible puño golpea al contrincante, pero la\nVelocidad del usuario se ve reducida."
    ko: "강하고 무거운 주먹을\n휘둘러 데미지를 준다.\n자신의 스피드가 떨어진다."
    zh_simp: "挥舞强力而沉重的拳头，\n给予对手伤害。\n自己的速度会降低。"
    zh_trad: "揮出強力而沉重的拳頭，\n給予對手傷害。\n自己的速度會降低。"
ice_punch:
  names:
    jp_kanji: れいとうパンチ
    en: Ice Punch
    fr: Poing Glace
    it: Gelopugno
    de: Eishieb
    es: Puño Hielo
    ko: 냉동펀치
    zh_simp: 冰冻拳
    zh_trad: 冰凍拳
  descriptions:
    jp_kanji: "冷気をこめたパンチで攻撃して\n相手をしもやけ状態にすることもある。"
    en: "The target is punched with an icy fist.\nThis may also leave the target with frostbite."
    fr: "Le lanceur attaque l’ennemi d’un coup de poing glacé.\nPeut aussi le geler."
    it: "Chi la usa attacca con un pugno di ghiaccio che può\nanche assiderare il bersaglio."
    de: "Ein eisiger Schlag, der beim Ziel eventuell Frostbrand\nverursacht."
    es: Puñetazo gélido que puede dejar helado al objetivo.
    ko: "냉기를 담은 펀치로 공격하여\n상대를 동상 상태로 만들 때가 있다."
    zh_simp: "用充满寒气的拳头攻击对手。\n有时会让对手陷入冻伤状态。"
    zh_trad: "用帶有寒氣的拳頭攻擊對手。\n有時還會讓對手陷入凍傷狀態。"
ice_shard:
  names:
    jp_kanji: こおりのつぶて
    en: Ice Shard
    fr: Éclats Glace
    it: Geloscheggia
    de: Eissplitter
    es: Canto Helado
    ko: 얼음뭉치
    zh_simp: 冰砾
    zh_trad: 冰礫
  descriptions:
    jp_kanji: "氷の塊を一瞬でつくり\n相手に素早く放つ。\n自分の行動順がはやくなる。"
    en: "The user flash-freezes chunks of ice and hurls them\nat the target. This also raises the user’s action speed."
    fr: "Le lanceur crée des éclats de glace qu’il envoie\nsur l’ennemi. Avance sa position dans l’ordre d’action."
    it: "Chi la usa crea dei pezzi di ghiaccio e li lancia,\naccelerando inoltre il proprio ordine delle azioni."
    de: "Angriff, bei dem das Ziel mit Eisklumpen beworfen wird.\nDer Anwender kommt danach schneller wieder zum Zug."
    es: "Crea bolas de hielo y las lanza a gran velocidad. Hace\nque los turnos del usuario tarden menos en llegar."
    ko: "얼음덩어리를 순식간에 만들어\n상대에게 빠르게 쏜다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "瞬间制作冰块，\n快速地扔向对手。\n能够让自己的行动顺序提前。"
    zh_trad: "將瞬間製造出的冰塊\n快速地扔向對手。\n能夠讓自己的行動順序提前。"
icicle_crash:
  names:
    jp_kanji: つららおとし
    en: Icicle Crash
    fr: Chute Glace
    it: Scagliagelo
    de: Eiszapfhagel
    es: Chuzos
    ko: 고드름떨구기
    zh_simp: 冰柱坠击
    zh_trad: 冰柱墜擊
  descriptions:
    jp_kanji: "大きな氷柱を\n激しくぶつけて攻撃する。"
    en: The user attacks by crashing large icicles onto the target.
    fr: "Le lanceur envoie de gros blocs de glace sur l’ennemi\npour lui infliger des dégâts."
    it: "Chi la usa attacca violentemente il bersaglio con\ngrosse stalattiti di ghiaccio."
    de: Lässt große, schwere Eiszapfen auf das Ziel herabregnen.
    es: Ataca lanzando grandes carámbanos.
    ko: "큰 고드름을\n격렬하게 부딪쳐서 공격한다."
    zh_simp: "用大冰柱激烈地\n撞向对手进行攻击。"
    zh_trad: "將巨大冰柱猛烈地\n砸向對手進行攻擊。"
icicle_spear:
  names:
    jp_kanji: つららばり
    en: Icicle Spear
    fr: Stalactite
    it: Gelolancia
    de: Eisspeer
    es: Carámbano
    ko: 고드름침
    zh_simp: 冰锥
    zh_trad: 冰錐
  descriptions:
    jp_kanji: "鋭い　氷柱を\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user launches sharp icicles at the target two to\nfive times in a row."
    fr: "Le lanceur jette des pics de glace sur l’ennemi,\nde deux à cinq fois de suite."
    it: "Chi la usa spara ghiaccioli affilati contro il bersaglio\nda due a cinque volte di fila."
    de: Feuert zwei bis fünf Eiszapfen auf das Ziel.
    es: "Ataca lanzando de dos a cinco ráfagas consecutivas de\ncarámbanos."
    ko: "날카로운 고드름을\n상대에게 발사하여 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手发射\n锋利的冰柱进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手發射\n尖銳的冰柱進行攻擊。\n可連續攻擊２～５次。"
icy_wind:
  names:
    jp_kanji: こごえるかぜ
    en: Icy Wind
    fr: Vent Glace
    it: Ventogelato
    de: Eissturm
    es: Viento Hielo
    ko: 얼다바람
    zh_simp: 冰冻之风
    zh_trad: 冰凍之風
  descriptions:
    jp_kanji: "凍てつく冷気を\n相手に吹きつけて攻撃する。"
    en: The user attacks with a gust of freezing air.
    fr: Une bourrasque glaciale blesse l’ennemi.
    it: "Chi la usa attacca il bersaglio con una folata\ndi aria gelida."
    de: Eis-Attacke, die dem Ziel Schaden zufügt.
    es: Ataque con aire helado.
    ko: "차가운 냉기를\n상대에게 내뿜어 공격한다."
    zh_simp: "将结冰的冷气\n吹向对手进行攻击。"
    zh_trad: "將冰冷的寒氣\n吹向對手進行攻擊。"
imprison:
  names:
    jp_kanji: ふういん
    en: Imprison
    fr: Possessif
    it: Esclusiva
    de: Begrenzer
    es: Sellar
    ko: 봉인
    zh_simp: 封印
    zh_trad: 封印
  descriptions:
    jp_kanji: "相手が　自分と　同じ　技を\nおぼえていたら　相手だけ\nその技を　使えなくする。"
    en: "If opposing Pokémon know any move also known by\nthe user, they are prevented from using it."
    fr: "Si l’ennemi et le lanceur ont des capacités en commun,\nl’ennemi ne pourra pas les utiliser."
    it: "Chi la usa impedisce al nemico di usare mosse\nche conoscono entrambi."
    de: "Hindert Gegner am Einsatz von Attacken, die der\nAnwender selbst auch kennt."
    es: "Impide a los contrincantes usar ataques conocidos por\nel usuario durante el combate."
    ko: "상대가 자신과 같은 기술을\n배웠다면 상대만 그 기술을\n사용할 수 없게 한다."
    zh_simp: "如果对手有和自己相同的招式，\n那么只有对手无法使用该招式。"
    zh_trad: "如果對手也學會了和自己\n相同的招式，則對手將\n不能使用該招式。"
incinerate:
  names:
    jp_kanji: やきつくす
    en: Incinerate
    fr: Calcination
    it: Bruciatutto
    de: Einäschern
    es: Calcinación
    ko: 불태우기
    zh_simp: 烧净
    zh_trad: 燒盡
  descriptions:
    jp_kanji: "炎で　相手を　攻撃する。\n相手が　きのみなどを　持っているとき\n燃やして　使えなくする。"
    en: "The user attacks opposing Pokémon with fire.\nIf a Pokémon is holding a certain item, such as a\nBerry, the item becomes burned up and unusable."
    fr: "Des flammes calcinent l’ennemi.\nS’il tient un objet, une Baie par exemple, celui-ci\nest brûlé et devient inutilisable."
    it: "Attacca i nemici che ha intorno con una fiammata.\nIl fuoco distruggerà le bacche o alcuni tipi di\nstrumenti che i Pokémon hanno con sé."
    de: "Eine Feuer-Attacke. Trägt ein gegnerisches Pokémon\neine Beere oder ein ähnliches Item bei sich, wird dieses\nvon den Flammen verzehrt und geht verloren."
    es: "Llamas que golpean a los objetivos adyacentes. Si estos\nllevan bayas o ciertos objetos, se quemarán y ya no se\npodrán usar."
    ko: "불꽃으로 상대를 공격한다.\n상대가 나무열매 등을 지니고 있을 때\n불태워서 쓸 수 없게 만든다."
    zh_simp: "用火焰攻击对手。\n对手携带树果等时，\n会烧掉，使其不能使用。"
    zh_trad: "用火焰攻擊對手。\n能夠燒掉對手攜帶的樹果等道具，\n讓對手無法使用。"
infernal_parade:
  names:
    jp_kanji: ひゃっきやこう
    en: Infernal Parade
    fr: Cortège Funèbre
    it: Corteo Spettrale
    de: Phantomparade
    es: Marcha Espectral
    ko: 백귀야행
    zh_simp: 群魔乱舞
    zh_trad: 群魔亂舞
  descriptions:
    jp_kanji: "無数の火の玉で攻撃して\n相手をやけど状態にすることもある。\n相手が状態異常だと威力は２倍。"
    en: "The user attacks with myriad fireballs. This may also\nleave the target with a burn. This move’s power is\ndoubled if the target has a status condition."
    fr: "Une multitude de boules de feu frappent l’ennemi.\nElles peuvent aussi le brûler. La puissance double\nsi la cible souffre d’une altération de statut."
    it: "Il bersaglio è colpito da innumerevoli sfere di fuoco che\npossono anche scottarlo. Se è affetto da problemi di\nstato, la potenza della mossa raddoppia."
    de: "Angriff mit unzähligen Feuerkugeln, der dem Ziel\neventuell Verbrennungen zufügt. Doppelt so stark\ngegen Ziele mit Statusproblemen."
    es: "Lanza innumerables bolas de fuego que pueden \nquemar al objetivo. El daño será doble si este \nya sufre un problema de estado."
    ko: "무수히 많은 불덩이로 공격해서\n상대를 화상 상태로 만들 때가 있다.\n상대가 상태 이상인 경우 위력이 2배가 된다."
    zh_simp: "用无数的火球进行攻击。\n有时会让对手陷入灼伤状态。\n攻击处于异常状态的对手时，威力会变成２倍。"
    zh_trad: "用無數的火球進行攻擊。\n有時還會讓對手陷入灼傷狀態。\n攻擊處於異常狀態的對手時，威力會變成２倍。"
inferno:
  names:
    jp_kanji: れんごく
    en: Inferno
    fr: Feu d’Enfer
    it: Marchiatura
    de: Inferno
    es: Infierno
    ko: 연옥
    zh_simp: 烈火深渊
    zh_trad: 煉獄
  descriptions:
    jp_kanji: "激しい　炎で\n相手を　包みこみ　攻撃する。\nやけど状態に　する。"
    en: "The user attacks by engulfing the target in an\nintense fire. This leaves the target with a burn."
    fr: "L’ennemi est entouré d’un torrent de flammes ardentes\nqui le brûlent."
    it: "Il bersaglio viene avvolto da intense fiammate\nche causano scottature."
    de: "Anwender greift das Ziel an, indem er es mit dichten\nFlammen umhüllt. Ziel erleidet Verbrennungen."
    es: "Ataca con una gran ráfaga de fuego que causa\nquemaduras."
    ko: "격렬한 불꽃으로\n상대를 둘러싸 공격한다.\n화상 상태로 만든다."
    zh_simp: "用烈焰包裹住对手进行攻击。\n让对手陷入灼伤状态。"
    zh_trad: "用猛烈的火焰\n包圍對手進行攻擊。\n能讓對手陷入灼傷狀態。"
inferno_overdrive:physical:
  names:
    jp_kanji: ダイナミックフルフレイム
    en: Inferno Overdrive
    fr: Pyro-Explosion Cataclysmique
    it: Fiammobomba Detonante
    de: Dynamische Maxiflamme
    es: Hecatombe Pírica
    ko: 다이내믹풀플레임
    zh_simp: 超强极限爆焰弹
    zh_trad: 超強極限爆焰彈
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
