blue_flare:
  names:
    jp_kanji: あおいほのお
    en: Blue Flare
    fr: Flamme Bleue
    it: Fuocoblu
    de: Blauflammen
    es: Llama Azul
    ko: 푸른불꽃
    zh_simp: 青焰
    zh_trad: 青焰
  descriptions:
    jp_kanji: "美しくも　激しい　青い炎で\n相手を　包みこんで　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user attacks by engulfing the target in an\nintense, yet beautiful, blue flame. This may also leave\nthe target with a burn."
    fr: "De magnifiques et redoutables flammes bleues\nfondent sur l’ennemi. Peut aussi le brûler."
    it: "Chi la usa attacca il bersaglio avvolgendolo con\nmagnifiche e intense fiamme blu che possono\nanche scottarlo."
    de: "Anwender greift an, indem er das Ziel in wunderschöne,\nintensivblaue Flammen hüllt, durch die es eventuell\nVerbrennungen erleidet."
    es: "Ataca con una bella pero potente llama azul que rodea\nal objetivo. Puede quemarlo."
    ko: "아름다우면서도 격렬한 푸른불꽃으로\n상대를 둘러싸서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用美丽而激烈的青焰\n包裹住对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "用美麗而激烈的青焰\n燃燒對手進行攻擊。\n有時會讓對手陷入灼傷狀態。"
body_press:
  names:
    jp_kanji: ボディプレス
    en: Body Press
    fr: Big Splash
    it: Schiacciacorpo
    de: Body Press
    es: Plancha Corporal
    ko: 바디프레스
    zh_simp: 扑击
    zh_trad: 撲擊
  descriptions:
    jp_kanji: "体を　ぶつけて　攻撃。\n防御が　高いほど\n与える　ダメージが　増える。"
    en: "The user attacks by slamming its body into the target.\nThe higher the user’s Defense, the more damage it can\ninflict on the target."
    fr: "Le lanceur utilise son corps pour attaquer sa cible.\nPlus la Défense du lanceur est élevée,\nplus les dégâts infligés sont importants."
    it: "Chi la usa schiaccia il bersaglio con il suo corpo.\nPiù la sua Difesa è alta, maggiori sono i danni inflitti."
    de: "Der Anwender greift mit seinem ganzen Körper an.\nJe höher seine Verteidigung ist, desto mehr Schaden\nrichtet er an."
    es: "El usuario usa el cuerpo para lanzar su ataque e infligir\nun daño directamente proporcional a su Defensa."
    ko: "몸을 부딪쳐서 공격한다.\n방어가 높을수록\n주는 데미지가 올라간다."
    zh_simp: "用身体撞向对手进行攻击。\n防御越高，\n给予的伤害就越高。"
    zh_trad: "用身體撞向對手進行攻擊。\n自己的防禦越高，\n給予對手的傷害越大。"
body_slam:
  names:
    jp_kanji: のしかかり
    en: Body Slam
    fr: Plaquage
    it: Corposcontro
    de: Bodyslam
    es: Golpe Cuerpo
    ko: 누르기
    zh_simp: 泰山压顶
    zh_trad: 泰山壓頂
  descriptions:
    jp_kanji: "全身で\n相手に　のしかかり　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user drops onto the target with its full body\nweight. This may also leave the target with paralysis."
    fr: "Le lanceur se laisse tomber sur l’ennemi\nde tout son poids. Peut aussi le paralyser."
    it: "Chi la usa carica il bersaglio con tutto il corpo.\nPuò causarne anche la paralisi."
    de: "Trifft das Ziel mit vollem Körpereinsatz und paralysiert\nes eventuell."
    es: "Salta sobre el objetivo con todo su peso y puede llegar\na paralizarlo."
    ko: "몸 전체로\n상대를 덮쳐눌러 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用整个身体\n压住对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用整個身體\n壓住對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
bolt_beak:
  names:
    jp_kanji: でんげきくちばし
    en: Bolt Beak
    fr: Prise de Bec
    it: Beccoshock
    de: Schockschnabel
    es: Electropico
    ko: 전격부리
    zh_simp: 电喙
    zh_trad: 電喙
  descriptions:
    jp_kanji: "電気を　まとった　くちばしで　刺す。\n相手より　先に　攻撃できると\n技の　威力は　２倍に　なる。"
    en: "The user stabs the target with its electrified beak.\nIf the user attacks before the target, the power of this\nmove is doubled."
    fr: "Le lanceur transperce sa cible avec son bec chargé\nd’électricité. Si cette attaque est lancée avant que\nla cible n’attaque, elle infligera deux fois plus de dégâts."
    it: "Chi la usa attacca il bersaglio con il becco appuntito\ncarico d’elettricità. Se attacca per primo, la potenza\ndella mossa raddoppia."
    de: "Der Anwender sticht mit einem elektrisch aufgeladenen\nSchnabel zu. Kommt er vor dem Ziel zum Zug,\nverdoppelt sich die Stärke der Attacke."
    es: "El usuario ensarta al objetivo con su pico cargado de\nelectricidad. Si ataca en primer lugar, la potencia del\nmovimiento se duplica."
    ko: "전기를 두른 부리로 찌른다.\n상대보다 먼저 공격하면\n기술의 위력은 2배가 된다."
    zh_simp: "用带电的喙啄刺对手。\n如果比对手先出手攻击，\n招式的威力会变成２倍。"
    zh_trad: "用帶有電流的鳥嘴刺向對手。\n若在對手之前進行攻擊，\n招式的威力會變成２倍。"
bolt_strike:
  names:
    jp_kanji: らいげき
    en: Bolt Strike
    fr: Charge Foudre
    it: Lucesiluro
    de: Blitzschlag
    es: Ataque Fulgor
    ko: 뇌격
    zh_simp: 雷击
    zh_trad: 雷擊
  descriptions:
    jp_kanji: "ぼうだいな　電気を　身に　まとって\n相手に　突進して　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user surrounds itself with a great amount of\nelectricity and charges its target. This may also\nleave the target with paralysis."
    fr: "Le lanceur s’enveloppe d’une charge électrique\nsurpuissante et se jette sur l’ennemi. Peut aussi\nle paralyser."
    it: "Colpisce il bersaglio con una possente carica\nelettrica e può anche paralizzarlo."
    de: "Lädt seinen Körper mit einer gewaltigen Menge an\nElektrizität auf und rammt damit das Ziel. Ziel wird\neventuell paralysiert."
    es: "Ataca envolviéndose de una gran carga eléctrica y\nembistiendo al objetivo con ella. Puede paralizar."
    ko: "방대한 전기를 몸에 둘러\n상대에게 돌진해서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "让强大的电流覆盖全身，\n猛撞向对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用強大的電流圍繞身體，\n猛撞對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
bone_club:
  names:
    jp_kanji: ホネこんぼう
    en: Bone Club
    fr: Massd’Os
    it: Ossoclava
    de: Knochenkeule
    es: Hueso Palo
    ko: 뼈다귀치기
    zh_simp: 骨棒
    zh_trad: 骨棒
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
bone_rush:
  names:
    jp_kanji: ボーンラッシュ
    en: Bone Rush
    fr: Charge Os
    it: Ossoraffica
    de: Knochenhatz
    es: Ataque Óseo
    ko: 본러쉬
    zh_simp: 骨棒乱打
    zh_trad: 骨棒亂打
  descriptions:
    jp_kanji: "硬い　ホネで\n相手を　なぐりつけて　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user strikes the target with a hard bone two to\nfive times in a row."
    fr: "Le lanceur frappe l’ennemi avec un os\nde deux à cinq fois d’affilée."
    it: "Chi la usa colpisce il bersaglio con un osso\nda due a cinque volte di fila."
    de: "Greift Ziel zwei- bis fünfmal in Folge mit einem harten\nKnochen an."
    es: "Hueso en ristre, aporrea al objetivo de dos a cinco\nveces."
    ko: "단단한 뼈로\n상대를 세게 때려서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用坚硬的骨头\n殴打对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用堅硬的骨頭\n毆打對手進行攻擊。\n連續攻擊２～５次。"
bonemerang:
  names:
    jp_kanji: ホネブーメラン
    en: Bonemerang
    fr: Osmerang
    it: Ossomerang
    de: Knochmerang
    es: Huesomerang
    ko: 뼈다귀부메랑
    zh_simp: 骨头回力镖
    zh_trad: 骨頭回力鏢
  descriptions:
    jp_kanji: "手に　持った　ホネを　相手に　投げつけ\n行きと　帰りの　２回連続で\nダメージを　与える。"
    en: "The user throws the bone it holds. The bone loops\naround to hit the target twice—coming and going."
    fr: "Le lanceur projette son os comme un boomerang.\nCette attaque frappe à l’aller et au retour."
    it: "Chi la usa lancia l’osso che ha con sé.\nL’osso colpisce due volte e ritorna come un vero\ne proprio boomerang."
    de: Ein Bumerang aus Knochen, der zweimal trifft.
    es: "Lanza un hueso a modo de bumerán que golpea dos\nveces."
    ko: "손에 들고 있는 뼈를 상대에게 날려서\n날아갈 때와 돌아올 때 2회 연속\n데미지를 준다."
    zh_simp: "用手中的骨头投掷对手，\n来回连续２次给予伤害。"
    zh_trad: "向對手投擲手中的骨頭，\n來回連續２次給予傷害。"
boomburst:
  names:
    jp_kanji: ばくおんぱ
    en: Boomburst
    fr: Bang Sonique
    it: Ondaboato
    de: Überschallknall
    es: Estruendo
    ko: 폭음파
    zh_simp: 爆音波
    zh_trad: 爆音波
  descriptions:
    jp_kanji: "すさまじい　爆音の\n破壊力に　よって\n周りに　いるものを　攻撃する。"
    en: "The user attacks everything around it with the\ndestructive power of a terrible, explosive sound."
    fr: "Attaque les Pokémon alentour grâce à une onde sonore\nassourdissante qui détruit tout sur son passage."
    it: "Colpisce i Pokémon che ha intorno\ncon la forza di un boato distruttivo."
    de: "Der Anwender greift alle Pokémon im Umkreis\nmit einem gewaltigen Knall an."
    es: "Ataca a todos los Pokémon a su alrededor con una\npotentísima onda sonora."
    ko: "무시무시한 폭음의\n파괴력으로\n주위에 있는 포켓몬을 공격한다."
    zh_simp: "通过震耳欲聋的爆炸声\n产生的破坏力，\n攻击自己周围所有的宝可梦。"
    zh_trad: "利用震耳欲聾的爆炸聲\n所產生的破壞力，\n攻擊自己周圍所有的寶可夢。"
bounce:
  names:
    jp_kanji: とびはねる
    en: Bounce
    fr: Rebond
    it: Rimbalzo
    de: Sprungfeder
    es: Bote
    ko: 뛰어오르다
    zh_simp: 弹跳
    zh_trad: 彈跳
  descriptions:
    jp_kanji: "空高く　飛び跳ねて\n２ターン目に　相手を　攻撃する。\nまひ状態に　することが　ある。"
    en: "The user bounces up high, then drops on the target\non the second turn. This may also leave the target\nwith paralysis."
    fr: "Le lanceur bondit très haut et plonge sur l’ennemi\nau second tour. Peut aussi le paralyser."
    it: "Chi la usa balza in alto e ricade sul bersaglio dopo\nun turno. Può anche paralizzarlo."
    de: "Anwender springt und landet in der nächsten Runde\nauf dem Ziel. Das Ziel wird eventuell paralysiert."
    es: "El usuario bota en el primer turno y golpea al objetivo\nen el segundo y puede llegar a paralizarlo."
    ko: "하늘 높이 뛰어올라\n2턴째에 상대를 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "弹跳到高高的空中，\n第２回合攻击对手。\n有时会让对手陷入麻痹状态。"
    zh_trad: "彈跳到高空中，\n在下一回合攻擊對手。\n有時會讓對手陷入麻痺狀態。"
bouncy_bubble:
  names:
    jp_kanji: いきいきバブル
    en: Bouncy Bubble
    fr: Évo-Thalasso
    it: Bollaslurp
    de: Blubbsauger
    es: Vapodrenaje
    ko: 생생버블
    zh_simp: 活活气泡
    zh_trad: 活活氣泡
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
branch_poke:
  names:
    jp_kanji: えだづき
    en: Branch Poke
    fr: Tapotige
    it: Ramostoccata
    de: Zweigstoß
    es: Punzada Rama
    ko: 가지찌르기
    zh_simp: 木枝突刺
    zh_trad: 木枝突刺
  descriptions:
    jp_kanji: "するどく　とがった　枝で\n相手を　突いて　攻撃する。"
    en: "The user attacks the target by poking it with a sharply\npointed branch."
    fr: "Le lanceur attaque sa cible en la piquant\navec une branche pointue."
    it: "Chi la usa attacca il bersaglio con un ramo\nincredibilmente appuntito."
    de: "Der Anwender attackiert das Ziel mit einem\nspitzen Zweig."
    es: Ataca pinchando al objetivo con una rama afilada.
    ko: "날카롭고 뾰족한 가지로\n상대를 찔러서 공격한다."
    zh_simp: "使用尖锐的树枝\n刺向对手进行攻击。"
    zh_trad: "用尖銳的樹枝\n刺向對手進行攻擊。"
brave_bird:
  names:
    jp_kanji: ブレイブバード
    en: Brave Bird
    fr: Rapace
    it: Baldeali
    de: Sturzflug
    es: Pájaro Osado
    ko: 브레이브버드
    zh_simp: 勇鸟猛攻
    zh_trad: 勇鳥猛攻
  descriptions:
    jp_kanji: "はねを折りたたみ\n低空飛行で突撃する。\n自分もダメージを受ける。"
    en: "The user tucks in its wings and charges at a low altitude.\nThis also damages the user."
    fr: "Le lanceur replie ses ailes et charge en rase-mottes.\nBlesse également le lanceur."
    it: "Chi la usa ripiega le ali e carica da bassa quota.\nTuttavia, subisce dei danni."
    de: "Anwender greift aus niedriger Höhe an. Er erleidet bei\ndieser Attacke selbst Schaden."
    es: "Pliega sus alas y ataca con un vuelo rasante. El usuario\ntambién recibe daño."
    ko: "날개를 접어\n저공비행으로 돌격한다.\n자신도 데미지를 입는다."
    zh_simp: "收拢翅膀，\n通过低空飞行突击对手。\n自己也会受到伤害。"
    zh_trad: "收起翅膀，\n低空飛行突擊對手。\n自己也會受到傷害。"
breaking_swipe:
  names:
    jp_kanji: ワイドブレイカー
    en: Breaking Swipe
    fr: Abattage
    it: Vastoimpatto
    de: Breitseite
    es: Vasto Impacto
    ko: 와이드브레이커
    zh_simp: 广域破坏
    zh_trad: 廣域破壞
  descriptions:
    jp_kanji: "きょうじんな　しっぽを　激しく\nふりはらって　相手を　攻撃する。\n相手の　攻撃を　下げる。"
    en: "The user swings its tough tail wildly and attacks\nopposing Pokémon. This also lowers their Attack stats."
    fr: "Le lanceur balaie violemment le camp adverse\navec son immense queue. Baisse l’Attaque de la cible."
    it: "Chi la usa attacca i nemici intorno con la sua robusta\ncoda riducendone l’Attacco."
    de: "Der Anwender schwingt heftig seinen robusten Schweif,\num damit gegnerische Pokémon anzugreifen und ihren\nAngriffs-Wert zu senken."
    es: "El usuario sacude violentamente su enorme cola para\ngolpear a todos los rivales y reducir su Ataque a la par."
    ko: "강인한 꼬리를 세차게\n휘둘러서 상대를 공격한다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "用坚韧的尾巴\n猛扫对手进行攻击，\n从而降低对手的攻击。"
    zh_trad: "激烈地甩動強韌\n的尾巴攻擊對手，\n降低對手的攻擊。"
breakneck_blitz:physical:
  names:
    jp_kanji: ウルトラダッシュアタック
    en: Breakneck Blitz
    fr: Turbo-Charge Bulldozer
    it: Carica Travolgente
    de: Hyper-Sprintangriff
    es: Carrera Arrolladora
    ko: 울트라대시어택
    zh_simp: 究极无敌大冲撞
    zh_trad: 究極無敵大衝撞
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
breakneck_blitz:special:
  names:
    jp_kanji: ウルトラダッシュアタック
    en: Breakneck Blitz
    fr: Turbo-Charge Bulldozer
    it: Carica Travolgente
