iron_defense:
  names:
    jp_kanji: てっぺき
    en: Iron Defense
    fr: Mur de Fer
    it: Ferroscudo
    de: Eisenabwehr
    es: Defensa Férrea
    ko: 철벽
    zh_simp: 铁壁
    zh_trad: 鐵壁
  descriptions:
    jp_kanji: "皮膚を鉄のように硬くすることで\n自分の守りの力をあげる。"
    en: "The user hardens its body’s surface like iron, raising its\ndefensive stats."
    fr: "L’épiderme du lanceur devient dur comme du fer.\nAugmente la puissance défensive du lanceur."
    it: "Il corpo di chi la usa si indurisce come il ferro,\nfacendone aumentare la forza difensiva."
    de: "Der Anwender stärkt seinen Körper, um seine\nDefensivkraft zu erhöhen."
    es: "Fortalece el cuerpo como si fuera de hierro y sube la\ndefensiva."
    ko: "피부를 쇠처럼 단단하게 만듦으로써\n자신의 방어력을 올린다."
    zh_simp: "将皮肤变得坚硬如铁，\n从而提高自己的防守力。"
    zh_trad: "將皮膚變得堅硬如鐵，\n提高自己的防守力。"
iron_head:
  names:
    jp_kanji: アイアンヘッド
    en: Iron Head
    fr: Tête de Fer
    it: Metaltestata
    de: Eisenschädel
    es: Cabeza de Hierro
    ko: 아이언헤드
    zh_simp: 铁头
    zh_trad: 鐵頭
  descriptions:
    jp_kanji: "鋼のような\n硬い頭で攻撃する。"
    en: The user slams the target with its steel-hard head.
    fr: "Le lanceur heurte l’ennemi avec sa tête dure\ncomme de l’acier. Peut aussi l’apeurer."
    it: "Chi la usa colpisce il bersaglio con la sua testa dura\ncome l’acciaio."
    de: "Ziel wird durch stahlharten Kopf des Anwenders\ngetroffen."
    es: Ataca con su dura cabeza de hierro.
    ko: "강철과 같은\n단단한 머리로 공격한다."
    zh_simp: "用钢铁般\n坚硬的头部进行攻击。"
    zh_trad: "用如同鋼鐵般\n堅硬的頭部進行攻擊。"
iron_tail:
  names:
    jp_kanji: アイアンテール
    en: Iron Tail
    fr: Queue de Fer
    it: Codacciaio
    de: Eisenschweif
    es: Cola Férrea
    ko: 아이언테일
    zh_simp: 铁尾
    zh_trad: 鐵尾
  descriptions:
    jp_kanji: "硬い　しっぽで\n相手をたたきつけて攻撃する。\n相手の守りの力をさげることもある。"
    en: "The target is slammed with a steel-hard tail.\nThis may also lower the target’s defensive stats."
    fr: "Attaque l’ennemi avec une queue de fer.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Il bersaglio viene colpito da una robusta coda d’acciaio\nche può anche ridurne la forza difensiva."
    de: "Attacke mit hartem Eisenschweif. Senkt eventuell die\nDefensivkraft des Zieles."
    es: "Ataca con una cola férrea que puede bajar la defensiva\ndel objetivo."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "使用坚硬的尾巴\n摔打对手进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "將堅硬的尾巴\n甩向對手進行攻擊。\n有時還會降低對手的防守力。"
jaw_lock:
  names:
    jp_kanji: くらいつく
    en: Jaw Lock
    fr: Croque Fort
    it: Morsostretto
    de: Fesselbiss
    es: Presa Maxilar
    ko: 물고버티기
    zh_simp: 紧咬不放
    zh_trad: 緊咬不放
  descriptions:
    jp_kanji: "お互い　ひんしに　なるまで\n交代が　できなくなる。　どちらかの\nポケモンが　いなくなると　効果は消える。"
    en: "This move prevents the user and the target from\nswitching out until either of them faints. The effect goes\naway if either of the Pokémon leaves the field."
    fr: "Le lanceur et sa cible ne peuvent plus quitter le terrain\njusqu’à ce que l’un d’entre eux tombe K.O.\nL’effet est annulé si l’un des deux Pokémon disparaît."
    it: "Impedisce a chi la usa e al bersaglio di essere sostituiti\nfinché non vanno KO. L’effetto svanisce se uno dei due\nlascia il campo."
    de: "Anwender und Ziel können nicht ausgetauscht werden,\nbis einer von ihnen kampfunfähig wird. Der Effekt\nendet, wenn eines der Pokémon das Kampffeld verlässt."
    es: "Impide que tanto el atacante como el defensor puedan\nser intercambiados hasta que uno de ellos se debilite o\nabandone el terreno de combate."
    ko: "어느 한쪽이 기절할 때까지\n교체할 수 없게 된다. 한쪽의\n포켓몬이 없어지면 효과가 사라진다."
    zh_simp: "使双方直到一方昏厥为止\n无法替换宝可梦。\n其中一方退场则可以解除效果。"
    zh_trad: "使攻擊對象及自己在陷入瀕死前\n都無法進行替換。當兩隻寶可夢\n其中一方退場時，效果就會消失。"
judgment:
  names:
    jp_kanji: さばきのつぶて
    en: Judgment
    fr: Jugement
    it: Giudizio
    de: Urteilskraft
    es: Sentencia
    ko: 심판의뭉치
    zh_simp: 制裁光砾
    zh_trad: 制裁光礫
  descriptions:
    jp_kanji: "無数の光弾を相手に放出する。\nプレートの種類により\n技のタイプが変わる。"
    en: "The user releases countless shots of light at the target.\nThis move’s type varies depending on the kind of Plate\nthe user last interacted with."
    fr: "Le lanceur libère une myriade de rayons de lumière.\nLe type de cette capacité varie selon la variété de\nla plaque."
    it: "Chi la usa rilascia numerosi colpi di luce. Il tipo della\nmossa varia a seconda della lastra."
    de: "Anwender feuert unzählige Lichtstrahlen ab. Der Typ\nder Attacke hängt von der jeweiligen Tafel ab."
    es: "Emite incontables haces de luz. El tipo del movimiento\nvaría según la tabla que se haya usado."
    ko: "무수한 광탄을 상대에게 방출한다.\n플레이트의 종류에 따라\n기술의 타입이 바뀐다."
    zh_simp: "向对手放出无数的光弹。\n招式的属性会根据\n石板的种类而改变。"
    zh_trad: "向對手放出無數的光彈。\n招式的屬性會隨著\n石板的種類而改變。"
