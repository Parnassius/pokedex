infestation:
  names:
    jp_kanji: まとわりつく
    en: Infestation
    fr: Harcèlement
    it: Assillo
    de: Plage
    es: Acoso
    ko: 엉겨붙기
    zh_simp: 纠缠不休
    zh_trad: 死纏爛打
  descriptions:
    jp_kanji: "４ー５ターンの　間　相手に\nまとわりついて　攻撃する。\nそのあいだ　相手は　逃げられない。"
    en: "The target is infested and attacked for four to five\nturns. The target can’t flee during this time."
    fr: "Cette attaque perdure pendant quatre à cinq tours.\nL’ennemi ne peut pas fuir au cours de cette période."
    it: "Chi la usa lancia un attacco che tormenta\nil bersaglio per quattro o cinque turni, durante\ni quali gli impedisce di fuggire."
    de: "Der Anwender fällt vier bis fünf Runden lang wie eine\nPlage über das Ziel her und greift es an. In diesem\nZeitraum kann es nicht fliehen."
    es: "Hostiga al objetivo durante cuatro o cinco turnos e\nimpide que pueda huir mientras tanto."
    ko: "4~5턴 동안 상대에게\n엉겨 붙어서 공격한다.\n그동안 상대는 도망갈 수 없다."
    zh_simp: "在４～５回合内\n死缠烂打地进行攻击。\n在此期间对手将无法逃走。"
    zh_trad: "在４～５回合內\n死纏爛打地進行攻擊。\n在此期間對手將無法逃走。"
ingrain:
  names:
    jp_kanji: ねをはる
    en: Ingrain
    fr: Racines
    it: Radicamento
    de: Verwurzler
    es: Arraigo
    ko: 뿌리박기
    zh_simp: 扎根
    zh_trad: 扎根
  descriptions:
    jp_kanji: "大地に　根を　張り\n毎ターン　自分の　ＨＰを　回復する。\n根を　張っているので　入れ替えられない。"
    en: "The user lays roots that restore its HP on every turn.\nBecause it’s rooted, it can’t switch out."
    fr: "Le lanceur plante ses racines et récupère des PV\nà chaque tour. Une fois enraciné, il ne peut plus fuir."
    it: "Chi la usa mette delle radici che gli fanno\nrecuperare PS a ogni turno. Non può\nessere sostituito."
    de: "Verwurzelung füllt jede Runde KP auf. Austausch und\nFlucht sind unmöglich."
    es: "Echa raíces para recuperar PS en cada turno, pero\nimpide el relevo."
    ko: "대지에 뿌리를 박아\n매 턴마다 자신의 HP를 회복한다.\n뿌리 박고 있으므로 교체할 수 없다."
    zh_simp: "在大地上扎根，\n每回合回复自己的ＨＰ。\n因为扎根了，所以不能替换宝可梦。"
    zh_trad: "在大地上扎根，\n每回合會回復自己的ＨＰ。\n但扎根之後無法進行替換。"
instruct:
  names:
    jp_kanji: さいはい
    en: Instruct
    fr: Sommation
    it: Imposizione
    de: Kommando
    es: Mandato
    ko: 지휘
    zh_simp: 号令
    zh_trad: 號令
  descriptions:
    jp_kanji: "相手が　出した　技を\n指示して　もう一度\n出させることが　できる。"
    en: "The user instructs the target to use the target’s last\nmove again."
    fr: "Force la cible à lancer immédiatement la dernière\ncapacité qu’elle a utilisée."
    it: "Costringe il bersaglio a ripetere immediatamente\nl’ultima mossa che ha sferrato."
    de: "Der Anwender befiehlt dem Ziel, dessen zuletzt\nausgeführte Attacke sofort wieder einzusetzen."
    es: "Fuerza al objetivo a repetir inmediatamente su último\nmovimiento."
    ko: "상대에게 지시하여\n상대가 쓴 기술을\n다시 한번 쓰게 할 수 있다."
    zh_simp: "向对手下达指示，\n让其再次使出刚才的招式。"
    zh_trad: "對手使出招式之後，\n能夠透過指令讓對手\n再次使出相同招式。"
ion_deluge:
  names:
    jp_kanji: プラズマシャワー
    en: Ion Deluge
    fr: Déluge Plasmique
    it: Pioggiaplasma
    de: Plasmaschauer
    es: Cortina Plasma
    ko: 플라스마샤워
