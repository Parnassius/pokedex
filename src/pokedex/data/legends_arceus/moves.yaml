brick_break:
  names:
    jp_kanji: かわらわり
    en: Brick Break
    fr: Casse-Brique
    it: Breccia
    de: Durchbruch
    es: Demolición
    ko: 깨트리다
    zh_simp: 劈瓦
    zh_trad: 劈瓦
  descriptions:
    jp_kanji: "手刀を　勢いよく　振りおろして\n相手を　攻撃する。　ひかりのかべや\nリフレクター　なども　破壊できる。"
    en: "The user attacks with a swift chop. It can also break\nbarriers, such as Light Screen and Reflect."
    fr: "Le lanceur attaque avec le tranchant de la main.\nPermet aussi de briser les barrières\ncomme Mur Lumière et Protection."
    it: "Colpisce il bersaglio con una mano e rompe\nbarriere come Riflesso e Schermoluce."
    de: "Ein beherzter Handkantenschlag. Durchbricht Barrieren\nwie Lichtschild und Reflektor."
    es: "Potente ataque que también es capaz de destruir\nbarreras como Pantalla de Luz y Reflejo."
    ko: "수도로 기세 좋게 내려쳐서\n상대를 공격한다. 빛의장막이나\n리플렉터 등도 파괴할 수 있다."
    zh_simp: "将手刀猛烈地挥下攻击对手。\n还可以破坏光墙和反射壁等。"
    zh_trad: "猛烈地揮下手刀\n攻擊對手。還可以破壞\n光牆和反射壁等。"
brine:
  names:
    jp_kanji: しおみず
    en: Brine
    fr: Saumure
    it: Acquadisale
    de: Lake
    es: Salmuera
    ko: 소금물
    zh_simp: 盐水
    zh_trad: 鹽水
  descriptions:
    jp_kanji: "相手が　ＨＰの　半分くらい\nきずを　おっていると　技の　威力が\n２倍に　なる。"
    en: "If the target’s HP is half or less, this attack will hit\nwith double the power."
    fr: "Cette attaque est deux fois plus puissante lorsque\nl’ennemi a moins de la moitié de ses PV."
    it: "Se i PS del bersaglio sono scesi a metà o meno,\nquesta mossa colpirà con il doppio della potenza."
    de: "Hat das Ziel die Hälfte oder weniger seiner maximalen\nKP, trifft diese Attacke mit doppelter Kraft."
    es: "Si al objetivo le queda la mitad o menos de sus PS, el\nataque será el doble de fuerte."
    ko: "상대가 HP의 절반 정도\n상처를 입고 있으면 기술의\n위력이 2배가 된다."
    zh_simp: "当对手的ＨＰ\n负伤到一半左右时，\n招式威力会变成２倍。"
    zh_trad: "當對手負傷，\nＨＰ剩一半左右時，\n招式威力會變成２倍。"
brutal_swing:
  names:
    jp_kanji: ぶんまわす
    en: Brutal Swing
    fr: Centrifugifle
    it: Vorticolpo
    de: Wirbler
    es: Giro Vil
    ko: 세차게휘두르기
    zh_simp: 狂舞挥打
    zh_trad: 狂舞揮打
  descriptions:
    jp_kanji: "自分の　体を\nぶんまわして　相手に\nダメージを　与える。"
    en: "The user swings its body around violently to inflict\ndamage on everything in its vicinity."
    fr: "Le lanceur pivote pour prendre de l’élan et infliger\ndes dégâts."
    it: "Chi la usa infligge danni intorno a sé facendo ruotare\nuna parte del suo corpo."
    de: "Der Anwender dreht schwungvoll seinen Körper und\nfügt allen Pokémon im Umkreis dabei Schaden zu."
    es: Hace pivotar su cuerpo para causar daño a su alrededor.
    ko: "자신의 몸을\n세차게 휘둘러서\n상대에게 데미지를 준다."
    zh_simp: "用自己的身体狂舞挥打，\n给予对手伤害。"
    zh_trad: "用自己的身體狂舞揮打，\n給予對手傷害。"
bubble:
  names:
    jp_kanji: あわ
    en: Bubble
    fr: Écume
    it: Bolla
    de: Blubber
    es: Burbuja
    ko: 거품
    zh_simp: 泡沫
    zh_trad: 泡沫
  descriptions:
    jp_kanji: "無数の泡を\n相手に吹きかけて攻撃する。"
    en: "The user attacks the target with a spray of\ncountless bubbles."
    fr: Des bulles frappent l’ennemi.
    it: Investe il bersaglio con una pioggia di bolle.
    de: Ein Angriff mit Blasen.
    es: Ataca al objetivo con burbujas.
    ko: "매우 많은 거품을\n상대에게 내뿜어 공격한다."
    zh_simp: "将无数的泡泡\n吹向对手进行攻击。"
    zh_trad: "將無數的泡泡\n吹向對手進行攻擊。"
bubble_beam:
  names:
    jp_kanji: バブルこうせん
    en: Bubble Beam
    fr: Bulles d’O
    it: Bollaraggio
    de: Blubbstrahl
    es: Rayo Burbuja
    ko: 거품광선
    zh_simp: 泡沫光线
    zh_trad: 泡沫光線
  descriptions:
    jp_kanji: "泡を　勢いよく\n相手に　発射して　攻撃する。\n素早さを　さげる　ことが　ある。"
    en: "A spray of bubbles is forcefully ejected at the\ntarget. This may also lower the target’s Speed stat."
    fr: "Des bulles sont envoyées avec puissance sur l’ennemi.\nPeut aussi baisser sa Vitesse."
    it: "Colpisce il bersaglio con una forte scarica di bolle.\nPuò anche ridurne la Velocità."
    de: "Versprüht Blasen, die eventuell den Initiative-Wert\ndes Zieles senken."
    es: Diluvio de burbujas que puede bajar la Velocidad.
    ko: "거품을 기세 좋게\n상대에게 발사하여 공격한다.\n스피드를 떨어뜨릴 때가 있다."
    zh_simp: "向对手猛烈地喷射\n泡沫进行攻击。\n有时会降低对手的速度。"
    zh_trad: "向對手猛烈地噴射\n泡沫進行攻擊。\n有時會降低對手的速度。"
bug_bite:
  names:
    jp_kanji: むしくい
    en: Bug Bite
    fr: Piqûre
    it: Coleomorso
    de: Käferbiss
    es: Picadura
    ko: 벌레먹음
    zh_simp: 虫咬
    zh_trad: 蟲咬
  descriptions:
    jp_kanji: "かみついて　攻撃する。\n相手が　きのみを　持っているとき\n食べて　きのみの　効果を　受けられる。"
    en: "The user bites the target. If the target is holding a\nBerry, the user eats it and gains its effect."
    fr: "Le lanceur pique l’ennemi.\nSi ce dernier tient une Baie, le lanceur la dévore\net obtient son effet."
    it: "Chi la usa morde il bersaglio. Inoltre, se questi ha\nuna bacca, gliela ruba e ne sfrutta gli effetti."
    de: "Anwender beißt das Ziel. Trägt dieses eine Beere,\nisst der Anwender sie und erhält ihren Effekt."
    es: "Pica al objetivo. Si el objetivo lleva una baya, el usuario\nse la come y se beneficia de su efecto."
    ko: "물어서 공격한다.\n상대가 나무열매를 지니고 있을 때\n먹어서 나무열매의 효과를 받을 수 있다."
    zh_simp: "咬住进行攻击。\n当对手携带树果时，\n可以食用并获得其效果。"
    zh_trad: "叮咬對手進行攻擊。\n可以吃下對手攜帶的樹果，\n並獲得樹果的效果。"
bug_buzz:
  names:
    jp_kanji: むしのさざめき
    en: Bug Buzz
    fr: Bourdon
    it: Ronzio
    de: Käfergebrumm
    es: Zumbido
    ko: 벌레의야단법석
    zh_simp: 虫鸣
    zh_trad: 蟲鳴
  descriptions:
    jp_kanji: "振動で音波をおこして攻撃する。\n相手の守りの力をさげることもある。"
    en: "The user vibrates to generate a damaging sound wave.\nThis may also lower the target’s defensive stats."
    fr: "Le lanceur fait vibrer son corps pour lancer une vague\nsonique. Peut aussi baisser la puissance défensive de\nla cible."
    it: "Chi la usa crea un’onda sonora che infligge danni.\nPuò anche ridurre la forza difensiva del bersaglio."
    de: "Anwender erzeugt Schallwellen, die beim Ziel Schaden\nverursachen und eventuell dessen Defensivkraft senken."
    es: "El usuario crea una onda sónica dañina, moviendo su\ncuerpo, que también puede bajar la defensiva del\nobjetivo."
    ko: "진동으로 음파를 일으켜서 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "利用振动发出音波进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "利用振動產生出的音波進行攻擊。\n有時還會降低對手的防守力。"
bulk_up:
  names:
    jp_kanji: ビルドアップ
    en: Bulk Up
    fr: Gonflette
    it: Granfisico
    de: Protzer
    es: Corpulencia
    ko: 벌크업
    zh_simp: 健美
    zh_trad: 健美
  descriptions:
    jp_kanji: "体に力をこめて筋肉を　ぶあつくすることで\n自分の攻めの力　守りの力をあげる。"
    en: "The user tenses its muscles to bulk up its body, raising\nits offensive and defensive stats."
    fr: "Le lanceur gonfle ses muscles pour augmenter\nsa puissance offensive et défensive."
    it: "Chi la usa tende i muscoli per gonfiare il corpo\naumentando la forza offensiva e la forza difensiva."
    de: "Der Anwender spannt seine Muskeln an und erhöht seine\nOffensivkraft und Defensivkraft."
    es: "Robustece el cuerpo para subir la ofensiva y la\ndefensiva."
    ko: "몸에 힘을 주어 근육을 두껍게 해서\n자신의 공격력과 방어력을 올린다."
    zh_simp: "使出全身力气绷紧肌肉，\n从而提高自己的进攻力和防守力。"
    zh_trad: "將力量集中於體內，增厚肌肉，\n提高自己的進攻力和防守力。"
bulldoze:
  names:
    jp_kanji: じならし
    en: Bulldoze
    fr: Piétisol
    it: Battiterra
    de: Dampfwalze
    es: Terratemblor
    ko: 땅고르기
    zh_simp: 重踏
    zh_trad: 重踏
  descriptions:
    jp_kanji: "地面を踏みならして\n相手を攻撃する。\n相手の行動順を遅くする。"
    en: "The user tramples its target into the ground, dealing\ndamage. This also lowers the target’s action speed."
    fr: "Le lanceur piétine le sol et attaque l’ennemi.\nRecule la position de la cible dans l’ordre d’action."
    it: "Chi la usa calpesta il terreno e scatena un terremoto\nche danneggia il bersaglio, rallentandone inoltre\nl’ordine delle azioni."
    de: "Der Anwender greift an, indem er den Boden plattwalzt.\nDas Ziel kommt danach langsamer wieder zum Zug."
    es: "Sacudida sísmica que afecta al objetivo y hace que sus\nturnos tarden más en llegar."
    ko: "땅을 힘껏 밟아\n상대를 공격한다.\n상대의 행동 순서를 늦춘다."
    zh_simp: "用力踩踏地面并攻击。\n能够让对手的行动顺序延后。"
    zh_trad: "用力踩踏地面進行攻擊。\n能夠讓對手的行動順序延後。"
bullet_punch:
  names:
    jp_kanji: バレットパンチ
    en: Bullet Punch
    fr: Pisto-Poing
    it: Pugnoscarica
    de: Patronenhieb
    es: Puño Bala
    ko: 불릿펀치
    zh_simp: 子弹拳
    zh_trad: 子彈拳
  descriptions:
    jp_kanji: "弾丸のような速くて硬い\nパンチを相手にくりだす。\n自分の行動順がはやくなる。"
    en: "The user strikes the target with tough punches as fast as\nbullets. This also raises the user’s action speed."
    fr: "Le lanceur envoie des coups de poing aussi rapides\nque des balles de revolver.\nAvance la position du lanceur dans l’ordre d’action."
    it: "Chi la usa attacca con una scarica di pugni veloci\ncome proiettili, accelerando inoltre il proprio ordine\ndelle azioni."
    de: "Angriff, bei dem das Ziel von ultraschnellen Hieben\ngetroffen wird. Der Anwender kommt danach schneller\nwieder zum Zug."
    es: "Ataca con fuertes puñetazos tan rápidos como\nproyectiles y hace que los turnos del usuario tarden\nmenos en llegar."
    ko: "탄환처럼 빠르고 단단한\n펀치를 상대에게 날린다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "向对手使出如子弹般\n快速而坚硬的拳头。\n能够让自己的行动顺序提前。"
    zh_trad: "向對手連續揮出如子彈般\n快速且堅硬的拳頭。\n能夠讓自己的行動順序提前。"
bullet_seed:
  names:
    jp_kanji: タネマシンガン
    en: Bullet Seed
    fr: Balle Graine
    it: Semitraglia
    de: Kugelsaat
    es: Semilladora
    ko: 기관총
    zh_simp: 种子机关枪
    zh_trad: 種子機關槍
  descriptions:
    jp_kanji: "タネを　勢いよく\n相手に　発射して　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user forcefully shoots seeds at the target two\nto five times in a row."
    fr: "Le lanceur mitraille l’ennemi avec une rafale de graines.\nDe deux à cinq rafales sont lancées à la suite."
    it: "Chi la usa spara da due a cinque raffiche di semi\ncontro il bersaglio in successione."
    de: "Der Anwender wirft zwei- bis fünfmal in rascher Folge\nSamen auf das Ziel."
    es: "Dispara rápido de dos a cinco ráfagas de semillas de\nmanera consecutiva."
    ko: "씨앗을 기세 좋게\n상대에게 발사하여 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "向对手猛烈地\n发射种子进行攻击。\n连续攻击２～５次。"
    zh_trad: "向對手猛烈地\n發射種子進行攻擊。\n連續攻擊２～５次。"
burn_up:
  names:
    jp_kanji: もえつきる
    en: Burn Up
    fr: Flamme Ultime
    it: Ultima Fiamma
    de: Ausbrennen
    es: Llama Final
    ko: 불사르기
    zh_simp: 燃尽
    zh_trad: 燃盡
  descriptions:
    jp_kanji: "全身の　ほのおを　すべて\n燃やして　大ダメージを　与える。\n自分の　ほのおタイプが　なくなる。"
    en: "To inflict massive damage, the user burns itself out.\nAfter using this move, the user will no longer be\nFire type."
    fr: "Le Pokémon se consume et les flammes de son corps\ninfligent des dégâts élevés à la cible.\nLe lanceur perd le type Feu."
    it: "Chi la usa attacca sfruttando tutta la sua potenza\nincendiaria per infliggere gravi danni al bersaglio,\nma come conseguenza perde il tipo Fuoco."
    de: "Der Anwender nutzt das gesamte Feuer in seinem\nKörper, um großen Schaden auszuteilen. Die restliche\nKampfdauer gehört er nicht mehr dem Typ Feuer an."
    es: "Utiliza hasta el último resquicio de llamas de su cuerpo\npara infligir un grave daño al oponente. Tras el ataque,\nel usuario deja de ser de tipo Fuego."
    ko: "전신의 불꽃을 모두\n태워서 큰 데미지를 준다.\n자신의 불꽃타입이 없어진다."
    zh_simp: "将自己全身燃烧起火焰来，\n给予对手大大的伤害。\n自己的火属性将会消失。"
    zh_trad: "燃盡全身的火焰，\n給予對手巨大的傷害。\n自己的火屬性將會消失。"
burning_jealousy:
  names:
    jp_kanji: しっとのほのお
    en: Burning Jealousy
    fr: Feu Envieux
    it: Fiamminvidia
    de: Neidflammen
    es: Envidia Ardiente
    ko: 질투의불꽃
    zh_simp: 妒火
    zh_trad: 妒火
  descriptions:
    jp_kanji: "しっとの　エネルギーで　相手を　攻撃。\nそのターン　能力が　あがった　ポケモンを\nやけどの　状態に　する。"
    en: "The user attacks with energy from jealousy. This leaves\nall opposing Pokémon that have had their stats boosted\nduring the turn with a burn."
    fr: "Le lanceur attaque sa cible avec toute sa jalousie.\nCette capacité brûle tout Pokémon dont les stats\nont augmenté pendant ce tour."
    it: "Chi la usa attacca con la forza dell’invidia, causando\nuna scottatura a tutti i Pokémon le cui statistiche sono\naumentate durante quel turno."
    de: "Der Anwender greift mit der Energie seines Neids an\nund fügt allen gegnerischen Pokémon, deren Statuswerte\nin dieser Runde erhöht wurden, Verbrennungen zu."
    es: "Ataca al objetivo con la energía generada por la envidia\ny causa quemaduras a los Pokémon cuyas características\nhayan aumentado en ese turno."
    ko: "질투의 에너지로 상대를 공격한다.\n그 턴에 능력이 올라간 포켓몬을\n화상 상태로 만든다."
    zh_simp: "用嫉妒的能量攻击对手。\n会让在该回合内能力有所提高的\n宝可梦陷入灼伤状态。"
    zh_trad: "用嫉妒的能量攻擊對手。\n讓此回合內能力提高的\n寶可夢陷入灼傷狀態。"
buzzy_buzz:
  names:
    jp_kanji: びりびりエレキ
    en: Buzzy Buzz
    fr: Évo-Dynamo
    it: Elettrozap
    de: Knisterladung
    es: Joltioparálisis
    ko: 찌릿찌릿일렉
    zh_simp: 麻麻电击
    zh_trad: 麻麻電擊
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
calm_mind:
  names:
    jp_kanji: めいそう
    en: Calm Mind
    fr: Plénitude
    it: Calmamente
    de: Gedankengut
    es: Paz Mental
    ko: 명상
    zh_simp: 冥想
    zh_trad: 冥想
  descriptions:
    jp_kanji: "静かに精神を統一し\n心を鎮めることで\n攻めの力　守りの力をあげる。"
    en: "The user quietly focuses its mind and calms its spirit to\nraise its offensive and defensive stats."
    fr: "Le lanceur fait le vide dans son esprit pour faire\naugmenter sa puissance offensive et défensive."
    it: "Chi la usa placa il proprio spirito meditando per\naumentare la forza offensiva e la forza difensiva."
    de: "Erhöht die Offensivkraft und Defensivkraft durch\nKonzentration."
    es: "Aumenta la concentración y calma el espíritu para\nsubir la ofensiva y la defensiva."
    ko: "조용히 정신을 통일하고\n마음을 가라앉혀서\n자신의 공격력과 방어력을 올린다."
    zh_simp: "静心凝神，\n从而提高自己的进攻力和防守力。"
    zh_trad: "屏氣凝神，\n提高自己的進攻力和防守力。"
camouflage:
  names:
    jp_kanji: ほごしょく
    en: Camouflage
    fr: Camouflage
    it: Camuffamento
    de: Tarnung
    es: Camuflaje
    ko: 보호색
    zh_simp: 保护色
    zh_trad: 保護色
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
captivate:
  names:
    jp_kanji: ゆうわく
    en: Captivate
    fr: Séduction
    it: Incanto
    de: Liebreiz
    es: Seducción
    ko: 유혹
    zh_simp: 诱惑
    zh_trad: 誘惑
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
