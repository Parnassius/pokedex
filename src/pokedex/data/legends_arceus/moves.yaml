spikes:
  names:
    jp_kanji: まきびし
    en: Spikes
    fr: Picots
    it: Punte
    de: Stachler
    es: Púas
    ko: 압정뿌리기
    zh_simp: 撒菱
    zh_trad: 撒菱
  descriptions:
    jp_kanji: "相手の足下にまきびしをしかける。\nばらまかれたまきびしによって\n相手に数回ダメージを与える。"
    en: "The user lays a trap of spikes at the target’s feet.\nThe spikes left behind by this attack continue to damage\nthe target for several turns."
    fr: "Le lanceur déploie des picots sous l’ennemi.\nLes picots disséminés infligent des dégâts à\nla cible à plusieurs reprises."
    it: "Chi la usa piazza sul terreno una trappola di punte\nche infliggono ripetutamente danni al bersaglio."
    de: "Der Anwender legt Stacheln um das Ziel aus, durch die\nes wiederholt Schaden nimmt."
    es: "Esparce púas alrededor del objetivo que lo dañan\nvarias veces."
    ko: "상대의 발밑에 압정을 뿌린다.\n흩어진 압정으로\n상대에게 여러 번 데미지를 준다."
    zh_simp: "在对手的脚下扔撒菱。\n散落的撒菱碎片\n可给予对手数次伤害。"
    zh_trad: "將撒菱散布在對手的腳下。\n散落的撒菱可給予對手數次傷害。"
spiky_shield:
  names:
    jp_kanji: ニードルガード
    en: Spiky Shield
    fr: Pico-Défense
    it: Agodifesa
    de: Schutzstacheln
    es: Barrera Espinosa
    ko: 니들가드
    zh_simp: 尖刺防守
    zh_trad: 尖刺防守
  descriptions:
    jp_kanji: "相手の　攻撃を　防ぐと\n同時に　触れた　相手の\n体力を　削って　しまう。"
    en: "In addition to protecting the user from attacks, this\nmove also damages any attacker that makes\ndirect contact."
    fr: "Protège des attaques, et diminue les PV de tout\nattaquant qui entre en contact avec le lanceur."
    it: "Protegge dagli attacchi, riducendo inoltre i PS\ndei Pokémon che entrano in contatto con\nchi la usa."
    de: "Der Anwender wird vor Angriffen geschützt.\nGleichzeitig nehmen alle Pokémon, die mit\nihm in Berührung kommen, Schaden."
    es: "Protege al usuario de ataques, e inflige daño a quien se\nlos lance si entra en contacto con él."
    ko: "상대의 공격을 막음과\n동시에 접촉한 상대의\n체력을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n削减接触到自己的对手的体力。"
    zh_trad: "防禦來自對手的攻擊，\n同時削減接觸到自己的\n對手的ＨＰ。"
spirit_break:
  names:
    jp_kanji: ソウルクラッシュ
    en: Spirit Break
    fr: Choc Émotionnel
    it: Frantumanima
    de: Seelenbruch
    es: Choque Anímico
    ko: 소울크래시
    zh_simp: 灵魂冲击
    zh_trad: 靈魂衝擊
  descriptions:
    jp_kanji: "食らうと　くじけるほどの\n勢いで　攻撃。\n相手の　特攻を　下げる。"
    en: "The user attacks the target with so much force that it\ncould break the target’s spirit. This also lowers the\ntarget’s Sp. Atk stat."
    fr: "Le lanceur attaque son adversaire avec une telle force\nque ce dernier peut s’en retrouver profondément\ntroublé. Baisse l’Attaque Spéciale de la cible."
    it: "Chi la usa attacca il bersaglio con un tale impeto\nda fargli perdere la voglia di lottare e ne riduce\nl’Attacco Speciale."
    de: "Die Attacke trifft das Ziel mit so viel Wucht, dass es\nden Mut verliert. Dabei wird sein Spezial-Angriff\ngesenkt."
    es: "El usuario ataca al objetivo con tal ímpetu que acaba\nminando su moral y, en consecuencia, reduce su Ataque\nEspecial."
    ko: "맞으면 기가 꺾여 버릴 것 같은\n기세로 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "用足以让对手一蹶不振的\n气势进行攻击。\n会降低对手的特攻。"
    zh_trad: "用足以讓對手一蹶不振的\n氣勢進行攻擊。\n可降低對手的特攻。"
spirit_shackle:
  names:
    jp_kanji: かげぬい
    en: Spirit Shackle
    fr: Tisse Ombre
    it: Cucitura d’Ombra
    de: Schattenfessel
    es: Puntada Sombría
    ko: 그림자꿰매기
    zh_simp: 缝影
    zh_trad: 縫影
  descriptions:
    jp_kanji: "攻撃と　同時に\n相手の　影を　縫い付けて\n逃げられなくする。"
    en: "The user attacks while simultaneously stitching the\ntarget’s shadow to the ground to prevent the target\nfrom escaping."
    fr: "Une attaque qui coud l’ennemi à son ombre,\nce qui l’empêche de s’enfuir."
    it: "Chi la usa attacca il bersaglio e fissa la sua ombra\na terra impedendogli di fuggire."
    de: "Der Anwender greift das Ziel an und näht zugleich\ndessen Schatten am Boden fest, sodass es nicht\nentkommen kann."
    es: "Ataca al oponente y, al mismo tiempo, fija su sombra\nal terreno para impedir su huida."
    ko: "공격과 동시에\n상대의 그림자를 꿰매\n도망칠 수 없게 한다."
    zh_simp: "攻击的同时，\n缝住对手的影子，\n使其无法逃走。"
    zh_trad: "攻擊的同時，\n縫住對手的影子，\n使其無法逃走。"
spit_up:
  names:
    jp_kanji: はきだす
    en: Spit Up
    fr: Relâche
    it: Sfoghenergia
    de: Entfessler
    es: Escupir
    ko: 토해내기
    zh_simp: 喷出
    zh_trad: 噴出
  descriptions:
    jp_kanji: "蓄えた　力を\n相手に　ぶつけて　攻撃する。\n蓄えているほど　威力が　あがる。"
    en: "The power stored using the move Stockpile is\nreleased at once in an attack. The more power\nis stored, the greater the move’s power."
    fr: "Libère dans une attaque la puissance précédemment\naccumulée avec Stockage."
    it: "Tutta l’energia accumulata in precedenza\ncon Accumulo è rilasciata nell’attacco.\nMaggiore è l’energia, più danni si arrecano."
    de: "Entlädt die Kraft, die während des Einsatzes von Horter\ngesammelt wurde. Je mehr Energie gehortet wurde,\ndesto stärker der Angriff."
    es: "Libera de una vez la energía acumulada con Reserva.\nLa potencia del ataque será proporcional a la cantidad\nde energía acumulada."
    ko: "비축된 힘을\n상대에게 부딪쳐서 공격한다.\n비축된 만큼 위력이 올라간다."
    zh_simp: "将积蓄的力量\n撞向对手进行攻击。\n积蓄得越多，威力越大。"
    zh_trad: "將蓄積的力量\n撞向對手進行攻擊。\n蓄積得越多，威力越大。"
spite:
  names:
    jp_kanji: うらみ
    en: Spite
    fr: Dépit
    it: Dispetto
    de: Groll
    es: Rencor
    ko: 원한
    zh_simp: 怨恨
    zh_trad: 怨恨
  descriptions:
    jp_kanji: "相手が　最後に　使った技に\n恨みを　抱いて\nその技の　ＰＰを　４だけ　減らす。"
    en: "The user unleashes its grudge on the move last used\nby the target by cutting 4 PP from it."
    fr: "Le lanceur exprime son ressentiment en retirant 4 PP\nde la dernière capacité de l’ennemi."
    it: "Chi la usa sfoga la propria rabbia sull’ultima mossa\nusata dal bersaglio e le sottrae quattro PP."
    de: AP der letzten Attacke des Zieles werden um 4 gesenkt.
    es: "Da rienda suelta a su rencor para reducir cuatro PP\ndel último movimiento usado por el objetivo."
    ko: "상대가 마지막으로\n사용한 기술에 원한을 품어\n그 기술의 PP를 4만큼 줄인다."
    zh_simp: "对对手最后使用的招式\n怀有怨恨，\n减少４ＰＰ该招式。"
    zh_trad: "向對手最近一次使用的招式\n發出怨念，\n讓該招式減少４ＰＰ。"
splash:
  names:
    jp_kanji: はねる
    en: Splash
    fr: Trempette
    it: Splash
    de: Platscher
    es: Salpicadura
    ko: 튀어오르기
    zh_simp: 跃起
    zh_trad: 躍起
  descriptions:
    jp_kanji: "攻撃もせずに\nピョンピョンと跳ねるだけで\nなにもおこらない……。"
    en: "The user just flops and splashes around to no effect\nat all..."
    fr: "Le lanceur barbote et éclabousse les environs.\nCette capacité n’a aucun effet."
    it: "Chi la usa sguazza nell’acqua, senza ottenere\nalcun effetto."
    de: Nur ein Platscher, der überhaupt nichts bewirkt.
    es: No tiene ningún efecto. Solo salpica.
    ko: "공격도 하지 않고 팔딱팔딱 튈 뿐\n아무 일도 일어나지 않는다..."
    zh_simp: "也不攻击只是一蹦一蹦地跳，\n什么都不会发生……"
    zh_trad: "不攻擊對手，只是蹦蹦跳跳的，\n什麼事也不會發生……"
splintered_stormshards:
  names:
    jp_kanji: ラジアルエッジストーム
    en: Splintered Stormshards
    fr: Hurlement des Roches-Lames
