    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
kings_shield:
  names:
    jp_kanji: キングシールド
    en: King’s Shield
    fr: Bouclier Royal
    it: Scudo Reale
    de: Königsschild
    es: Escudo Real
    ko: 킹실드
    zh_simp: 王者盾牌
    zh_trad: 王者盾牌
  descriptions:
    jp_kanji: "相手の　攻撃を　防ぐと　同時に\n防御態勢になる。　触れた\n相手の　攻撃を　さげる。"
    en: "The user takes a defensive stance while it protects\nitself from damage. It also lowers the Attack stat of any\nattacker that makes direct contact."
    fr: "Prend une posture défensive pour bloquer les dégâts.\nDiminue l’Attaque de tout Pokémon qui entre en contact\navec le lanceur."
    it: "Chi la usa si protegge, assumendo una posizione\ndi difesa e riducendo l’Attacco di nemici o alleati\ncon cui entra in contatto."
    de: "Der Anwender geht in die Defensive und wird vor\nAngriffen geschützt. Berührt ihn nun ein Pokémon,\nsinkt dessen Angriffs-Wert."
    es: "El usuario adopta una postura defensiva y se protege de\ncualquier daño. Reduce el Ataque de cualquier\nPokémon con el que entre en contacto."
    ko: "상대의 공격을 막음과 동시에\n방어 태세를 갖춘다. 접촉한\n상대의 공격을 떨어뜨린다."
    zh_simp: "防住对手攻击的同时，\n自己变为防御姿态。\n能够降低所接触到的对手的攻击。"
    zh_trad: "防住對手攻擊的同時，\n使自己變為防禦姿態。\n降低接觸到的對手的攻擊。"
knock_off:
  names:
    jp_kanji: はたきおとす
    en: Knock Off
    fr: Sabotage
    it: Privazione
    de: Abschlag
    es: Desarme
    ko: 탁쳐서떨구기
    zh_simp: 拍落
    zh_trad: 拍落
  descriptions:
    jp_kanji: "相手の　持ち物を　はたき　落として\n戦闘が　終わるまで　使えなくする。\n物を持つ　相手には　ダメージが増す。"
    en: "The user slaps down the target’s held item, and that\nitem can’t be used in that battle. The move does\nmore damage if the target has a held item."
    fr: "Fait plus de dégâts aux cibles qui tiennent un objet.\nDe plus, fait tomber cet objet et empêche la cible\nde l’utiliser jusqu’à la fin du combat."
    it: "Attacco che fa cadere lo strumento del bersaglio,\nimpedendone l’uso nella lotta. La sua potenza\naumenta se il Pokémon colpito ha uno strumento."
    de: "Schlägt das Item des Zieles weg und vereitelt so dessen\nGebrauch während des Kampfes. Mehr Schaden gegen\nZiele, die ein Item bei sich tragen."
    es: "Impide al objetivo usar el objeto que lleva durante el\ncombate. La potencia del movimiento se multiplica si\nel objetivo lleva un objeto."
    ko: "상대의 지닌 물건을 탁 쳐서 떨어뜨려\n배틀이 끝날 때까지 사용할 수 없게 한다.\n물건을 가진 상대에게는 데미지를 더 준다."
    zh_simp: "拍落对手的持有物，\n直到战斗结束都不能使用。\n对手携带道具时会增加伤害。"
    zh_trad: "拍落對手的持有物，\n讓對手在戰鬥結束前都無法使用。\n對手有攜帶物品時，傷害會增加。"
lands_wrath:
  names:
    jp_kanji: グランドフォース
    en: Land’s Wrath
    fr: Force Chtonienne
    it: Forza Tellurica
    de: Bodengewalt
    es: Fuerza Telúrica
    ko: 그라운드포스
    zh_simp: 大地神力
    zh_trad: 大地神力
  descriptions:
    jp_kanji: "大地の　パワーを　集め\n力を　相手に　集中させて\nダメージを　与える。"
    en: "The user gathers the energy of the land and focuses\nthat power on opposing Pokémon to damage them."
    fr: "Utilise la puissance du sol et la concentre sur l’ennemi\npour infliger des dégâts."
    it: "Chi la usa raccoglie energia tellurica e ne\nconcentra il potere sui nemici che ha intorno,\ndanneggiandoli."
    de: "Der Anwender sammelt die Kraft des weiten Landes und\ngreift an, indem er sie gebündelt auf gegnerische\nPokémon lenkt."
    es: "Acumula energía de la corteza terrestre y la concentra\ncontra los oponentes, dañándolos."
    ko: "대지의 힘을 모으고\n그 힘을 상대에게 집중시켜서\n데미지를 준다."
    zh_simp: "聚集大地的力量，\n将此力量集中攻击对手，\n并给予伤害。"
    zh_trad: "聚集大地的能量後，\n將力量集中攻擊對手給予傷害。"
laser_focus:
  names:
    jp_kanji: とぎすます
    en: Laser Focus
    fr: Affilage
    it: Concentrazione
    de: Konzentration
    es: Aguzar
    ko: 예민해지기
    zh_simp: 磨砺
    zh_trad: 磨礪
  descriptions:
    jp_kanji: "精神を　集中して\n次の　攻撃を　必ず\n急所に　当てる。"
    en: "The user concentrates intensely. The attack on the\nnext turn always results in a critical hit."
    fr: "Le lanceur se concentre pour être sûr de porter\nun coup critique au tour suivant."
    it: "Chi la usa si concentra e nel turno successivo\nmetterà sicuramente a segno un brutto colpo."
    de: "Der Anwender konzentriert sich, wodurch sein nächster\nAngriff garantiert ein Volltreffer wird."
    es: "El usuario se concentra para que el siguiente ataque\npropine un golpe crítico."
    ko: "정신을 집중해서\n다음 공격을 반드시\n급소에 맞춘다."
    zh_simp: "集中精神，\n下次攻击必定会击中要害。"
    zh_trad: "集中精神，\n下次攻擊必定會擊中要害。"
lash_out:
  names:
    jp_kanji: うっぷんばらし
    en: Lash Out
    fr: Cent Rancunes
    it: Sfogarabbia
    de: Frustventil
    es: Desahogo
    ko: 분풀이
    zh_simp: 泄愤
    zh_trad: 洩憤
  descriptions:
    jp_kanji: "相手への　いらだちを　ぶつけて　攻撃。\nそのターンに　能力を　さげられていると\n技の　威力が　２倍に　なる。"
    en: "The user lashes out to vent its frustration toward\nthe target. If the user’s stats were lowered during this\nturn, the power of this move is doubled."
    fr: "Le lanceur frappe l’ennemi avec toute sa rancune.\nSi les stats du lanceur ont diminué pendant ce tour,\nla puissance de cette attaque est doublée."
    it: "Chi la usa attacca il bersaglio con tutta la propria ira.\nSe ha subito riduzioni delle statistiche durante quel\nturno, la potenza della mossa raddoppia."
    de: "Der Anwender entlädt seinen Frust in einem Angriff.\nDie Stärke der Attacke wird verdoppelt, wenn seine\nStatuswerte in dieser Runde gesenkt wurden."
    es: "Ataca al rival presa de la rabia. Si el usuario ha sufrido\nuna reducción de características en ese turno, la\npotencia del movimiento se duplica."
    ko: "상대에 대한 울분이 담긴 공격을 한다.\n그 턴에 능력이 떨어져 있으면\n기술의 위력이 2배가 된다."
    zh_simp: "攻击对手以发泄对其感到的恼怒情绪。\n如果在该回合内自身能力遭到降低，\n招式的威力会变成２倍。"
    zh_trad: "將惱怒砸向對手進行攻擊。\n如果此回合已被降低能力，\n招式威力就會變成２倍。"
last_resort:
  names:
    jp_kanji: とっておき
    en: Last Resort
    fr: Dernier Recours
    it: Ultimascelta
    de: Zuflucht
    es: Última Baza
    ko: 뒀다쓰기
    zh_simp: 珍藏
    zh_trad: 珍藏
  descriptions:
    jp_kanji: "戦闘中に　おぼえている　技を\nすべて　使うと　はじめて　だせる\nとっておきの　技。"
    en: "This move can be used only after the user has used\nall the other moves it knows in the battle."
    fr: "Cette capacité ne peut être utilisée qu’après\nque le lanceur a utilisé toutes les autres."
    it: "Per usare questa mossa, bisogna prima avvalersi\nin lotta di tutte le altre mosse conosciute."
    de: "Diese Attacke kann nur eingesetzt werden, nachdem\nalle verfügbaren Attacken ausgeführt worden sind."
    es: "Este movimiento solo puede utilizarse tras haber usado\nal menos una vez todos los demás conocidos por el\nPokémon."
    ko: "배틀 중에 기억하고 있는 기술을\n모두 사용하면 그때부터 쓸 수 있는\n필살기이다."
    zh_simp: "当战斗中已学会的招式\n全部使用过后，\n才能开始使出珍藏的招式。"
    zh_trad: "在戰鬥中將其他已學會的招式\n全部使用過後，\n才能夠使出的珍藏招式。"
lava_plume:
  names:
    jp_kanji: ふんえん
    en: Lava Plume
    fr: Ébullilave
    it: Lavasbuffo
    de: Flammensturm
    es: Humareda
    ko: 분연
    zh_simp: 喷烟
    zh_trad: 噴煙
  descriptions:
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user torches everything around it in an inferno\nof scarlet flames. This may also leave those it hits\nwith a burn."
    fr: "Des boules de feu s’abattent sur tous les Pokémon\nautour du lanceur. Peut aussi les brûler."
    it: "Chi la usa lancia fiamme scarlatte su tutti i\nPokémon nelle vicinanze, danneggiandoli.\nPuò anche scottarli."
    de: "Anwender greift alle Pokémon im Umkreis mit tiefroten\nFlammen an. Ziele erleiden eventuell Verbrennungen."
    es: "Un infierno de llamas daña a los Pokémon adyacentes\nen combate. Puede quemar."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击自己周围所有的宝可梦。\n有时会让其他宝可梦陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入灼傷狀態。"
leaf_blade:
  names:
    jp_kanji: リーフブレード
    en: Leaf Blade
    fr: Lame Feuille
    it: Fendifoglia
    de: Laubklinge
    es: Hoja Aguda
    ko: 리프블레이드
    zh_simp: 叶刃
    zh_trad: 葉刃
  descriptions:
    jp_kanji: "はっぱを剣のように操り\n相手を切りつけて攻撃する。\n急所に当たりやすい。"
    en: "The user handles a sharp leaf like a sword and attacks by\ncutting its target. This move has a heightened chance of\nlanding a critical hit."
    fr: "Une feuille coupante comme une lame entaille l’ennemi.\nTaux de critiques élevé."
    it: "Colpisce il bersaglio usando una foglia affilata\ncome una spada. Probabile brutto colpo."
    de: Hieb mit scharfkantigem Blatt. Hohe Volltrefferquote.
    es: Acuchilla con una hoja fina. Suele ser un golpe crítico.
    ko: "잎사귀를 칼처럼 이용해\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "像用剑一般操纵叶片\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "如用劍般操控葉子\n切斬對手進行攻擊。\n容易擊中要害。"
leaf_storm:
  names:
    jp_kanji: リーフストーム
    en: Leaf Storm
    fr: Tempête Verte
    it: Verdebufera
    de: Blättersturm
    es: Lluevehojas
    ko: 리프스톰
    zh_simp: 飞叶风暴
    zh_trad: 飛葉風暴
  descriptions:
    jp_kanji: "とがった　はっぱで相手に嵐をおこす。\n使うと反動で\n自分の攻めの力がさがる。"
    en: "The user whips up a storm of leaves around the\ntarget. The recoil from this move lowers the user’s\noffensive stats."
    fr: "Le lanceur invoque une tempête de feuilles acérées.\nLe contrecoup baisse sa puissance offensive."
    it: "Si forma una tempesta di foglie affilate. Il contraccolpo\nriduce la forza offensiva di chi la usa."
    de: "Anwender erzeugt einen Sturm aus scharfen Blättern.\nDer Rückstoß senkt die Offensivkraft des Anwenders."
    es: "Envuelve al objetivo con una lluvia de hojas afiladas,\npero reduce la ofensiva del usuario."
    ko: "뾰족한 잎사귀로 상대에게 돌풍을 일으킨다.\n사용하면 반동으로\n자신의 공격력이 떨어진다."
    zh_simp: "用尖尖的叶片向对手卷起风暴。\n使用之后因为反作用力，\n自己的进攻力会降低。"
    zh_trad: "用尖銳的葉子捲起風暴向對手進行攻擊。\n使用後因為反作用力，\n自己的進攻力會降低。"
leaf_tornado:
  names:
    jp_kanji: グラスミキサー
    en: Leaf Tornado
    fr: Phytomixeur
    it: Vorticerba
    de: Grasmixer
    es: Ciclón de Hojas
    ko: 그래스믹서
    zh_simp: 青草搅拌器
    zh_trad: 青草攪拌器
  descriptions:
    jp_kanji: "鋭い　はっぱで　相手を\n包みこんで　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks its target by encircling it in sharp\nleaves. This attack may also lower the\ntarget’s accuracy."
    fr: "L’ennemi est pris dans un tourbillon de feuilles acérées.\nPeut aussi baisser sa Précision."
    it: "Chi la usa avvolge e attacca il bersaglio con foglie\naffilate che possono anche ridurne la precisione."
    de: "Anwender greift an, indem er das Ziel in scharfes\nBlattwerk einwickelt. Kann die Genauigkeit des Zieles\nsenken."
    es: "Tritura con afiladas hojas y puede bajar la Precisión del\nobjetivo."
    ko: "날카로운 잎사귀로 상대를\n둘러싸서 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "用锋利的叶片包裹住\n对手进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用銳利的葉子包圍住\n對手進行攻擊。\n有時會降低對手的命中率。"
leafage:
  names:
    jp_kanji: このは
    en: Leafage
    fr: Feuillage
    it: Fogliame
    de: Blattwerk
    es: Follaje
    ko: 나뭇잎
    zh_simp: 树叶
    zh_trad: 樹葉
  descriptions:
    jp_kanji: はっぱを相手に当てて攻撃する。
    en: The user attacks by pelting the target with leaves.
    fr: Le lanceur attaque l’ennemi avec des feuilles.
    it: Attacca il bersaglio con delle foglie.
    de: Der Anwender greift das Ziel mit Blättern an.
    es: Ataca al oponente lanzando hojas.
    ko: 잎사귀를 상대에게 맞혀서 공격한다.
    zh_simp: "将叶片打向对手，\n进行攻击。"
    zh_trad: "將葉片打向對手，\n進行攻擊。"
leech_life:
  names:
    jp_kanji: きゅうけつ
    en: Leech Life
    fr: Vampirisme
    it: Sanguisuga
    de: Blutsauger
    es: Chupavidas
    ko: 흡혈
    zh_simp: 汲取
    zh_trad: 吸血
  descriptions:
    jp_kanji: "血を吸い取って攻撃する。　\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by draining the target’s blood.\nSome of the damage dealt to the target is absorbed\nby the user to restore their own HP."
    fr: "Une attaque qui aspire le sang de l’ennemi.\nUne partie des dégâts est convertie en PV\npour le lanceur."
    it: "Mossa succhiasangue. Chi la usa recupera una quantità\ndi PS pari a una parte del danno inferto."
    de: "Der Anwender saugt dem Ziel Blut ab. Ein Teil des\nzugefügten Schadens wird dem Anwender als KP\ngutgeschrieben."
    es: "Ataca al enemigo chupándole la sangre. Restaura al\nusuario parte del daño causado al objetivo."
    ko: "피를 빨아서 상대를 공격한다.\n상대에게 입힌 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "吸取血液攻击对手。\n可以回复给予对手\n伤害的一部分ＨＰ。"
    zh_trad: "吸取血液進行攻擊。\n可以回復給予對手\n傷害的一部分ＨＰ。"
leech_seed:
  names:
    jp_kanji: やどりぎのタネ
    en: Leech Seed
    fr: Vampigraine
    it: Parassiseme
    de: Egelsamen
    es: Drenadoras
    ko: 씨뿌리기
    zh_simp: 寄生种子
    zh_trad: 寄生種子
  descriptions:
    jp_kanji: "植えつけた　相手の　ＨＰを\n毎ターン　少しだけ　吸い取り\n自分の　ＨＰを　回復する。"
    en: "A seed is planted on the target. It steals some HP\nfrom the target every turn."
    fr: "Une graine est semée sur l’ennemi.\nÀ chaque tour, elle lui dérobe des PV\nque le lanceur récupère."
    it: "Vengono piantati semi sul bersaglio. Questi\nsottraggono PS a ogni turno permettendo\na chi la usa di curarsi."
    de: "Ziel wird bepflanzt und verliert jede Runde KP, die ein\nPokémon aus dem Team des Anwenders heilen."
    es: "Planta semillas que absorben PS del objetivo en cada\nturno y que le sirven para recuperarse."
    ko: "씨가 뿌려진 상대의 HP를\n매 턴 조금씩 흡수하여\n자신의 HP를 회복한다."
    zh_simp: "植入寄生种子后，将在每回合\n一点一点吸取对手的ＨＰ，\n从而用来回复自己的ＨＰ。"
    zh_trad: "在對手身上植入種子，\n每回合吸取對手少許的ＨＰ，\n用來回復自己的ＨＰ。"
leer:
  names:
    jp_kanji: にらみつける
    en: Leer
    fr: Groz’Yeux
    it: Fulmisguardo
    de: Silberblick
    es: Malicioso
    ko: 째려보기
    zh_simp: 瞪眼
    zh_trad: 瞪眼
  descriptions:
    jp_kanji: "鋭い　目つきで　おびえさせて\n相手の　防御を　さげる。"
    en: "The user gives opposing Pokémon an intimidating\nleer that lowers the Defense stat."
    fr: "Le lanceur fait les gros yeux à l’ennemi pour l’intimider\net baisser sa Défense."
    it: "Terrorizza i nemici intorno con uno sguardo\nfulminante e intimidatorio, riducendone la Difesa."
    de: "Der Verteidigungs-Wert gegnerischer Pokémon wird\ndurch einen angsteinflößenden Blick gesenkt."
    es: Intimida a los rivales para bajar su Defensa.
    ko: "날카로운 눈초리로 겁을 주어\n상대의 방어를 떨어뜨린다."
    zh_simp: "用犀利的眼神使其害怕，\n从而降低对手的防御。"
    zh_trad: "用犀利的眼神使對手害怕，\n降低對手的防禦。"
lets_snuggle_forever:
  names:
    jp_kanji: ぽかぼかフレンドタイム
    en: Let’s Snuggle Forever
    fr: Patati-Patattrape
    it: Dolcesacco di Botte
    de: Herzliche Knuddelkloppe
    es: Somanta Amistosa
    ko: 투닥투닥프렌드타임
    zh_simp: 亲密无间大乱揍
    zh_trad: 親密無間大亂揍
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
lick:
  names:
    jp_kanji: したでなめる
    en: Lick
    fr: Léchouille
    it: Leccata
    de: Schlecker
    es: Lengüetazo
    ko: 핥기
    zh_simp: 舌舔
    zh_trad: 舌舔
  descriptions:
    jp_kanji: "長い　舌で\n相手を　なめまわして　攻撃する。\nまひ状態に　することが　ある。"
    en: "The target is licked with a long tongue, causing\ndamage. This may also leave the target\nwith paralysis."
    fr: "Un grand coup de langue qui inflige des dégâts\nà l’ennemi. Peut aussi le paralyser."
    it: "Una lingua lunga infligge danni al bersaglio\ne può anche paralizzarlo."
    de: "Leck-Attacke mit langer Zunge. Das Ziel wird eventuell\nparalysiert."
    es: Una lengua ataca al objetivo. Puede causar parálisis.
    ko: "긴 혀로\n상대를 핥아서 공격한다.\n마비 상태로 만들 때가 있다."
    zh_simp: "用长长的舌头，\n舔遍对手进行攻击。\n有时会让对手陷入麻痹状态。"
    zh_trad: "用長長的舌頭，\n舔遍對手進行攻擊。\n有時會讓對手陷入麻痺狀態。"
life_dew:
  names:
    jp_kanji: いのちのしずく
    en: Life Dew
    fr: Fontaine de Vie
    it: Goccia Vitale
    de: Lebenstropfen
    es: Gota Vital
    ko: 생명의물방울
    zh_simp: 生命水滴
    zh_trad: 生命水滴
  descriptions:
    jp_kanji: "不思議な　水を　ふりまいて\n自分と　場にいる\n味方の　ＨＰを　回復する。"
    en: "The user scatters mysterious water around and restores\nthe HP of itself and its ally Pokémon in the battle."
    fr: "Le lanceur projette une eau mystérieuse\nautour du terrain pour restaurer ses PV\net ceux de ses alliés au combat."
    it: "Sparge tutt’intorno dell’acqua misteriosa che fa\nrecuperare PS a sé e agli alleati in campo."
    de: "Wundersames Wasser heilt die KP des Anwenders und\nseiner am Kampf beteiligten Mitstreiter."
    es: "Vierte un agua misteriosa y balsámica que restaura\ntanto sus propios PS como los de aquellos aliados\npresentes en el terreno de combate."
    ko: "신비한 물을 흩뿌려서\n자신과 배틀에 나와 있는\n같은 편의 HP를 회복한다."
    zh_simp: "喷洒出神奇的水，\n回复自己和场上同伴的ＨＰ。"
    zh_trad: "灑出神奇之水，\n回復自己和場上同伴的ＨＰ。"
light_of_ruin:
  names:
    jp_kanji: はめつのひかり
    en: Light of Ruin
    fr: Lumière du Néant
    it: Luce Nefasta
    de: Lux Calamitatis
    es: Luz Aniquiladora
    ko: 파멸의빛
    zh_simp: 破灭之光
    zh_trad: 破滅之光
  descriptions:
    jp_kanji: "永遠の花　の　パワーを　かりて\n強力な　光線を　撃ちだす。\n自分も　かなりの　ダメージを　受ける。"
    en: "Drawing power from the Eternal Flower, the user\nfires a powerful beam of light. This also damages the\nuser quite a lot."
    fr: "Utilise la puissance de la fleur Éternelle pour lancer\nun formidable rayon d’énergie.\nBlesse aussi gravement le lanceur."
    it: "Concentra il potere del Fiore Eterno in un raggio\ndi luce potentissimo con cui attacca il bersaglio.\nCausa danni ingenti anche a chi la usa."
    de: "Die Attacke basiert auf der Kraft des Ewigblütlers,\ndie als mächtiger Lichtstrahl abgefeuert wird.\nDer Anwender nimmt dabei selbst großen Schaden."
    es: "El usuario emplea el poder de la Flor Eterna para lanzar\nun potente rayo de luz, pero sufre bastante daño al\nhacerlo."
    ko: "영원의 꽃의 파워를 빌려서\n강력한 광선을 쏜다.\n자신도 상당한 데미지를 입는다."
    zh_simp: "借用永恒之花的力量，\n发射出强力光线。\n自己也会受到不小的伤害。"
    zh_trad: "借用永恆之花的力量，\n發射出強力光線。\n自己也會受到不小的傷害。"
light_screen:
  names:
    jp_kanji: ひかりのかべ
    en: Light Screen
    fr: Mur Lumière
    it: Schermoluce
    de: Lichtschild
    es: Pantalla de Luz
    ko: 빛의장막
    zh_simp: 光墙
    zh_trad: 光牆
  descriptions:
    jp_kanji: "５ターンの　間　不思議な　かべで\n相手から　受ける　特殊攻撃の\nダメージを　弱める。"
    en: "A wondrous wall of light is put up to reduce damage\nfrom special attacks for five turns."
    fr: "Crée un fabuleux mur de lumière qui réduit les dégâts\ncausés par les capacités spéciales pendant cinq tours."
    it: "Innalza una barriera misteriosa che riduce i danni degli\nattacchi speciali per sé e gli alleati per cinque turni."
    de: "Erzeugt eine Lichtwand und senkt den Schaden durch\nSpezial-Attacken für fünf Runden."
    es: "Pared de luz que reduce durante cinco turnos el daño\nproducido por los ataques especiales."
    ko: "5턴 동안 이상한 장막을 쳐서\n상대로부터 받는 특수공격의\n데미지를 약하게 한다."
    zh_simp: "利用神奇的墙壁，\n在５回合内减弱从对手那里\n受到的特殊攻击的伤害。"
    zh_trad: "利用神奇的屏障，\n在５回合內減輕\n來自對手的特殊攻擊傷害。"
light_that_burns_the_sky:
  names:
    jp_kanji: てんこがすめつぼうのひかり
    en: Light That Burns the Sky
    fr: Apocalypsis Luminis
    it: Fotodistruzione Apocalittica
    de: Licht des Erlöschens
    es: Fotodestrucción Apocalíptica
    ko: 하늘을태우는멸망의빛
    zh_simp: 焚天灭世炽光爆
    zh_trad: 焚天滅世熾光爆
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
liquidation:
  names:
    jp_kanji: アクアブレイク
    en: Liquidation
    fr: Aqua-Brèche
    it: Idrobreccia
    de: Aquadurchstoß
    es: Hidroariete
    ko: 아쿠아브레이크
    zh_simp: 水流裂破
    zh_trad: 水流裂破
  descriptions:
    jp_kanji: "水の力でぶつかって攻撃する。\n相手の守りの力をさげることもある。"
    en: "The user slams into the target using a full-force blast of\nwater. This may also lower the target’s defensive stats."
    fr: "Le lanceur utilise la force de l’eau pour attaquer.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Colpisce il bersaglio con la potenza dell’acqua e può\nanche ridurne la forza difensiva."
    de: "Der Anwender greift das Ziel mit der Kraft des Wassers\nan. Senkt eventuell die Defensivkraft des Zieles."
    es: "Ataca golpeando gracias a la fuerza del agua. Además,\npuede bajar la defensiva del objetivo."
    ko: "물의 힘으로 부딪쳐서 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "用水之力量撞向对手进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "用水之力量撞向對手進行攻擊。\n有時還會降低對手的防守力。"
lock_on:
  names:
    jp_kanji: ロックオン
    en: Lock-On
    fr: Verrouillage
    it: Localizza
    de: Zielschuss
    es: Fijar Blanco
    ko: 록온
    zh_simp: 锁定
    zh_trad: 鎖定
  descriptions:
    jp_kanji: "照準を　しっかり　あわせて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    en: "The user takes sure aim at the target. This ensures\nthe next attack does not miss the target."
    fr: Verrouille l’ennemi pour ne pas le rater au tour suivant.
    it: "Chi la usa punta il bersaglio con precisione.\nLa mossa successiva andrà a segno."
    de: "Visiert das Ziel an und trifft in der nächsten Runde\ngarantiert."
    es: Fija el blanco para que el siguiente ataque no falle.
    ko: "조준을 잘 맞춰\n다음 공격이 반드시\n상대에게 명중하도록 한다."
    zh_simp: "紧紧瞄准对手，\n下次攻击必定会打中。"
    zh_trad: "精確地瞄準，\n下次攻擊時一定\n會命中對手。"
lovely_kiss:
  names:
    jp_kanji: あくまのキッス
    en: Lovely Kiss
    fr: Grobisou
    it: Demonbacio
    de: Todeskuss
    es: Beso Amoroso
    ko: 악마의키스
    zh_simp: 恶魔之吻
    zh_trad: 惡魔之吻
  descriptions:
    jp_kanji: "恐ろしい　顔で　キスを　せまる。\n相手を　眠り状態に　する。"
    en: "With a scary face, the user tries to force a kiss on\nthe target. If it succeeds, the target falls asleep."
    fr: "Le lanceur fait un bisou à l’ennemi en prenant\nune mine effrayante. Endort l’ennemi."
    it: "Chi la usa intimidisce il bersaglio con una faccia\npaurosa e gli schiocca un bacio che lo fa\naddormentare."
    de: "Anwender zwingt dem Ziel einen Kuss auf, der Schlaf\nverursacht."
    es: "Intimida al objetivo con una cara que asusta y le da\nun beso que lo deja dormido."
    ko: "무서운 얼굴로 키스한다.\n상대를 잠듦 상태로 만든다."
    zh_simp: "用恐怖的脸强吻对手。\n让对手陷入睡眠状态。"
    zh_trad: "用恐怖的臉強吻對手。\n能讓對手陷入睡眠狀態。"
low_kick:
  names:
    jp_kanji: けたぐり
    en: Low Kick
    fr: Balayage
    it: Colpo Basso
    de: Fußkick
    es: Patada Baja
    ko: 안다리걸기
    zh_simp: 踢倒
    zh_trad: 踢倒
  descriptions:
    jp_kanji: "足を　強く　けり\n相手を　転ばせて　攻撃する。\n相手が　重いほど　威力が　あがる。"
    en: "A powerful low kick that makes the target fall over.\nThe heavier the target, the greater the move’s power."
    fr: "Un puissant coup de pied bas qui fauche l’ennemi.\nIl est plus efficace contre les ennemis lourds."
    it: "Un calcio basso e potente che fa cadere il bersaglio.\nDanneggia maggiormente i Pokémon più pesanti."
    de: "Ein Tritt, der das Ziel umwirft. Je schwerer das Ziel ist,\ndesto mehr Schaden fügt ihm die Attacke zu."
    es: "Patada baja que derriba al oponente. Cuanto más pesa\nel objetivo, más daño le causa."
    ko: "발을 강하게 걸고\n상대를 넘어뜨려 공격한다.\n상대가 무거울수록 위력이 올라간다."
    zh_simp: "用力踢对手的脚，\n使其摔倒进行攻击。\n对手越重，威力越大。"
    zh_trad: "用力踢對手的腳，\n讓對手摔倒進行攻擊。\n對手越重，威力越大。"
low_sweep:
  names:
    jp_kanji: ローキック
    en: Low Sweep
    fr: Balayette
    it: Calciobasso
    de: Fußtritt
    es: Puntapié
    ko: 로킥
    zh_simp: 下盘踢
    zh_trad: 下盤踢
  descriptions:
    jp_kanji: "素早い　動きで　相手の　足を\nねらって　攻撃する。\n相手の　素早さを　さげる。"
    en: "The user makes a swift attack on the target’s legs,\nwhich lowers the target’s Speed stat."
    fr: "Un coup rapide qui affecte la mobilité de l’ennemi\net diminue sa Vitesse."
    it: "Chi la usa colpisce con un attacco fulmineo\nla parte inferiore del corpo del bersaglio,\nriducendone la Velocità."
    de: "Anwender greift mit blitzschnellen Bewegungen die\nBeine des Zieles an und senkt dessen Initiative."
    es: "Ataque rápido dirigido a los pies del objetivo que le\nhace perder Velocidad."
    ko: "재빠른 움직임으로\n상대의 다리를 노려 공격한다.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "以敏捷的动作瞄准\n对手的脚进行攻击。\n降低对手的速度。"
    zh_trad: "瞄準對手的腳，\n以敏捷的動作進行攻擊。\n可降低對手的速度。"
lucky_chant:
  names:
    jp_kanji: おまじない
    en: Lucky Chant
    fr: Air Veinard
    it: Fortuncanto
    de: Beschwörung
    es: Conjuro
    ko: 주술
    zh_simp: 幸运咒语
    zh_trad: 幸運咒語
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
lunar_blessing:
  names:
    jp_kanji: みかづきのいのり
    en: Lunar Blessing
    fr: Prière Lunaire
    it: Invocaluna
    de: Lunargebet
    es: Plegaria Lunar
    ko: 초승달의기도
    zh_simp: 新月祈祷
    zh_trad: 新月祈禱
  descriptions:
    jp_kanji: "自分の状態異常を治しつつ\nＨＰを回復する。\n相手の技を回避しやすくなる。"
    en: "The user heals its own status conditions and restores\nits HP. Incoming moves also become more likely to miss."
    fr: "Le lanceur soigne ses altérations de statut et récupère\ndes PV. Les attaques de la cible deviennent plus faciles\nà esquiver."
    it: "Chi la usa guarisce dai problemi di stato e recupera PS.\nInoltre, fa sì che le mosse nemiche falliscano più\nfacilmente."
    de: "Der Anwender befreit sich von Statusproblemen und füllt\nseine KP auf. Bewirkt zudem, dass gegnerische Attacken\nden Anwender häufiger verfehlen."
    es: "Cura los problemas de estado del usuario y\nrecupera PS. Además, hace que evite con\nmayor facilidad los movimientos enemigos."
    ko: "자신의 상태 이상과 HP를 회복한다.\n상대의 기술을 회피하기 쉬워진다."
    zh_simp: "治愈自己的异常状态，\n同时回复自己的ＨＰ。\n会变得较容易闪避对手的招式。"
    zh_trad: "治癒自己的異常狀態，\n同時回復自己的ＨＰ。\n會變得較容易閃避對手的招式。"
lunar_dance:
  names:
    jp_kanji: みかづきのまい
    en: Lunar Dance
    fr: Danse Lune
    it: Lunardanza
    de: Lunartanz
    es: Danza Lunar
    ko: 초승달춤
    zh_simp: 新月舞
    zh_trad: 新月舞
  descriptions:
    jp_kanji: "自分は　ひんしに　なるが\n控えから　でてくる　ポケモンの\nすべての　状態を　回復する。"
    en: "The user faints. In return, the Pokémon taking its\nplace will have its status and HP fully restored."
    fr: "Le lanceur tombe K.O. pour soigner le statut et les PV\ndu Pokémon qui prendra sa place au combat."
    it: "Chi la usa va KO. Il Pokémon che lo sostituisce\nguarisce dai propri problemi di stato e recupera\ntutti i PS e i PP."
    de: "Anwender geht K.O. Das an seine Stelle tretende\nPokémon hat dafür volle KP sowie AP und wird von\nStatusproblemen geheilt."
    es: "El usuario se debilita, pero el Pokémon que lo sustituye\nrecupera su estado, los PS y los PP."
    ko: "자신은 기절하지만\n교대하여 나오는 포켓몬의\n모든 상태를 회복한다."
    zh_simp: "虽然自己陷入昏厥，\n但可以治愈后备上场的\n宝可梦的全部状态。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以讓接替上場的\n寶可夢回復到萬全狀態。"
lunge:
  names:
    jp_kanji: とびかかる
    en: Lunge
    fr: Furie-Bond
    it: Assalto
    de: Anfallen
    es: Plancha
    ko: 덤벼들기
    zh_simp: 猛扑
    zh_trad: 猛撲
  descriptions:
    jp_kanji: "全力で　相手に\n飛びかかって　攻撃。\n相手の　攻撃を　さげる。"
    en: "The user makes a lunge at the target, attacking with\nfull force. This also lowers the target’s Attack stat."
    fr: "Le lanceur se jette sur la cible de toutes ses forces\npour lui infliger des dégâts et baisser son Attaque."
    it: "Chi la usa si lancia con tutte le sue forze\nsul bersaglio e ne riduce l’Attacco."
    de: "Der Anwender greift das Ziel mit ganzer Kraft an,\nwodurch auch der Angriffs-Wert des Zieles sinkt."
    es: "Ataca al oponente abalanzándose sobre él con todas\nsus fuerzas y reduce su Ataque."
    ko: "전력으로 상대에게\n덤벼들며 공격한다.\n상대의 공격을 떨어뜨린다."
    zh_simp: "全力猛扑对手进行攻击。\n从而降低对手的攻击。"
    zh_trad: "全力猛撲對手進行攻擊。\n進而降低對手的攻擊。"
luster_purge:
  names:
    jp_kanji: ラスターパージ
    en: Luster Purge
    fr: Lumi-Éclat
    it: Abbagliante
    de: Scheinwerfer
    es: Resplandor
    ko: 라스트버지
    zh_simp: 洁净光芒
    zh_trad: 潔淨光芒
  descriptions:
    jp_kanji: "まばゆい　光を\n解放して　攻撃する。\n相手の　特防を　さげることが　ある。"
    en: "The user lets loose a damaging burst of light. This\nmay also lower the target’s Sp. Def stat."
    fr: "Le lanceur libère un éclair lumineux.\nPeut aussi baisser la Défense Spéciale de l’ennemi."
    it: "Chi la usa scatena un’esplosione abbagliante\nche può anche ridurre la Difesa Speciale\ndel Pokémon colpito."
    de: "Angriff mit einem grellem Licht, der die\nSpezial-Verteidigung des Zieles eventuell senkt."
    es: "Fogonazo de luz que puede bajar la Defensa Especial\ndel objetivo."
    ko: "눈부신 빛을 발산하여\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "释放耀眼的光芒进行攻击。\n有时会降低对手的特防。"
    zh_trad: "放出耀眼的光芒進行攻擊。\n有時會降低對手的特防。"
mach_punch:
  names:
    jp_kanji: マッハパンチ
    en: Mach Punch
    fr: Mach Punch
    it: Pugnorapido
    de: Tempohieb
    es: Ultrapuño
    ko: 마하펀치
    zh_simp: 音速拳
    zh_trad: 音速拳
  descriptions:
    jp_kanji: "目にも留まらぬ　ものすごい速さで\nパンチをくりだす。\n自分の行動順がはやくなる。"
    en: "The user throws a punch at blinding speed.\nThis also raises the user’s action speed."
    fr: "Donne un coup de poing fulgurant.\nAvance la position du lanceur dans l’ordre d’action."
    it: "Chi la usa tira un pugno a una velocità impressionante e\naccelera il proprio ordine delle azioni."
    de: "Der Anwender greift mit einem extrem schnellen Hieb an\nund kommt schneller wieder zum Zug."
    es: "Puñetazo de velocidad fulminante que hace que los\nturnos del usuario tarden menos en llegar."
    ko: "눈에 보이지 않는 굉장한 속도로\n펀치를 날린다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "以迅雷不及掩耳之势出拳。\n能够让自己的行动顺序提前。"
    zh_trad: "以迅雷不及掩耳之勢出拳。\n能夠讓自己的行動順序提前。"
magic_coat:
  names:
    jp_kanji: マジックコート
    en: Magic Coat
    fr: Reflet Magik
    it: Magivelo
    de: Magiemantel
    es: Capa Mágica
    ko: 매직코트
    zh_simp: 魔法反射
    zh_trad: 魔法反射
  descriptions:
    jp_kanji: "状態異常に　なる　技や\nやどりぎのタネ　などを\nだされたとき　相手に　跳ね返す。"
    en: "Moves like Leech Seed and moves that inflict status\nconditions are blocked by a barrier and reflected back\nto the user of those moves."
    fr: "Une barrière qui renvoie les capacités comme\nVampigraine et celles affectant le statut et les stats."
    it: "Una barriera rimanda al mittente l’effetto\ndi mosse come Parassiseme e di mosse\nche influenzano lo stato."
    de: Alle Status-Attacken wie Egelsamen werden reflektiert.
    es: "Barrera capaz de devolver al agresor movimientos\ncomo Drenadoras y otros que alteran el estado o\nlas características."
    ko: "상대가 상태 이상이 되는 기술이나\n씨뿌리기 등을 썼을 때 되받아친다."
    zh_simp: "当对手使出会变成异常状态的\n招式或寄生种子等时，\n会将对手的招式反射回去。"
    zh_trad: "若對手使用寄生種子或\n其他會讓寶可夢陷入異常狀態的招式時，\n可將對手的招式反彈回去。"
magic_powder:
  names:
    jp_kanji: まほうのこな
    en: Magic Powder
    fr: Poudre Magique
    it: Magipolvere
    de: Magiepuder
    es: Polvo Mágico
    ko: 마법가루
    zh_simp: 魔法粉
    zh_trad: 魔法粉
  descriptions:
    jp_kanji: "まほうのこなを　浴びせて\n相手を　エスパータイプに　変化させる。"
    en: "The user scatters a cloud of magic powder that\nchanges the target to Psychic type."
    fr: "Le lanceur recouvre sa cible d’une poudre magique\nqui change son type en Psy."
    it: "Chi la usa getta addosso al bersaglio una polvere\nmagica che lo rende di tipo Psico."
    de: "Das Ziel wird mit magischem Puder bestreut und\nnimmt den Typ Psycho an."
    es: "Cubre al objetivo con unos polvos mágicos que le\nhacen adquirir el tipo Psíquico."
    ko: "마법가루를 날려서\n상대를 에스퍼타입으로 바꾼다."
    zh_simp: "向对手喷洒魔法粉，\n使对手变为超能力属性。"
    zh_trad: "撒出魔法粉末，\n使對手變為超能力屬性。"
magic_room:
  names:
    jp_kanji: マジックルーム
    en: Magic Room
    fr: Zone Magique
    it: Magicozona
    de: Magieraum
    es: Zona Mágica
    ko: 매직룸
    zh_simp: 魔法空间
    zh_trad: 魔法空間
  descriptions:
    jp_kanji: "まか不思議な　空間を　つくる。\n５ターンの間　すべてのポケモンの\n道具の　効果が　なくなる。"
    en: "The user creates a bizarre area in which Pokémon’s\nheld items lose their effects for five turns."
    fr: "Le lanceur crée une zone mystérieuse où les objets\ntenus par tous les Pokémon n’ont plus aucun effet\npendant cinq tours."
    it: "Chi la usa crea una dimensione in cui l’effetto\ndegli strumenti di tutti i Pokémon è annullato\nper cinque turni."
    de: "Anwender erzeugt einen bizarren Raum, in dem über\nfünf Runden die Wirkung aller von Pokémon getragenen\nItems aufgehoben ist."
    es: "Crea un espacio misterioso que inutiliza todos los\nobjetos de los Pokémon durante cinco turnos."
    ko: "이상한 공간을 만든다.\n5턴 동안 모든 포켓몬의\n도구의 효과가 사라진다."
    zh_simp: "制造出离奇的空间。\n在５回合内所有宝可梦\n携带道具的效果都会消失。"
    zh_trad: "創造出非常不可思議的空間。\n在５回合內，所有寶可夢\n攜帶的道具都會失去效果。"
magical_leaf:
  names:
    jp_kanji: マジカルリーフ
    en: Magical Leaf
    fr: Feuille Magik
    it: Fogliamagica
    de: Zauberblatt
    es: Hoja Mágica
    ko: 메지컬리프
    zh_simp: 魔法叶
    zh_trad: 魔法葉
  descriptions:
    jp_kanji: "相手を追跡する\n不思議な　はっぱをまきちらす。\n攻撃は必ず命中する。"
    en: "The user scatters curious leaves that chase the target.\nThis attack never misses."
    fr: "Le lanceur disperse d’étranges feuilles qui poursuivent\nl’ennemi. N’échoue jamais."
    it: "Chi la usa sparpaglia strane foglie che inseguono\nil bersaglio. Questo attacco è infallibile."
    de: Magischer Blattangriff, dem nicht auszuweichen ist.
    es: "Esparce extrañas hojas que persiguen al objetivo.\nNo se puede esquivar."
    ko: "상대를 추적하는\n이상한 잎사귀를 흩뿌린다.\n공격은 반드시 명중한다."
    zh_simp: "散落可以追踪\n对手的神奇叶片。\n攻击必定会命中。"
    zh_trad: "散落可以追蹤\n對手的神奇葉子。\n攻擊必定會命中。"
magma_storm:
  names:
    jp_kanji: マグマストーム
    en: Magma Storm
    fr: Vortex Magma
    it: Magmaclisma
    de: Lavasturm
    es: Lluvia Ígnea
    ko: 마그마스톰
    zh_simp: 熔岩风暴
    zh_trad: 熔岩風暴
  descriptions:
    jp_kanji: "激しく燃えたぎる炎の渦で攻撃する。\n相手をやけど状態にする。"
    en: "The user envelops the target in a maelstrom of fire.\nThis also leaves the target with a burn."
    fr: "L’ennemi est pris dans un tourbillon de feu.\nBrûle la cible."
    it: "Avvolge il bersaglio in un turbine di fuoco,\nscottandolo."
    de: "Das Ziel wird in einen Feuersog gezogen und erleidet\nVerbrennungen."
    es: "El objetivo queda atrapado en una tormenta de fuego\nque lo hiere y también lo quema."
    ko: "세차게 타오르는 불꽃의 소용돌이로 공격한다.\n상대를 화상 상태로 만든다."
    zh_simp: "用熊熊燃烧的火焰旋涡进行攻击。\n会让对手陷入灼伤状态。"
    zh_trad: "用熊熊燃燒的火焰旋渦進行攻擊。\n會讓對手陷入灼傷狀態。"
magnet_bomb:
  names:
    jp_kanji: マグネットボム
    en: Magnet Bomb
    fr: Bombe Aimant
    it: Bombagnete
    de: Magnetbombe
    es: Bomba Imán
    ko: 마그넷봄
    zh_simp: 磁铁炸弹
    zh_trad: 磁鐵炸彈
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
magnet_rise:
  names:
    jp_kanji: でんじふゆう
    en: Magnet Rise
    fr: Vol Magnétik
    it: Magnetascesa
    de: Magnetflug
    es: Levitón
    ko: 전자부유
    zh_simp: 电磁飘浮
    zh_trad: 電磁飄浮
  descriptions:
    jp_kanji: "電気で　つくった　磁力の　力で\n宙に　浮かぶ。\n５ターンの　間　浮遊できる。"
    en: "The user levitates using electrically generated\nmagnetism for five turns."
    fr: "Le lanceur utilise l’électricité pour générer un champ\nmagnétique et léviter durant cinq tours."
    it: "Chi la usa si solleva in aria per cinque turni\ngrazie a un campo elettromagnetico."
    de: "Anwender schwebt für fünf Runden durch elektrisch\nerzeugten Magnetismus."
    es: "Levita gracias a un campo magnético generado por\nelectricidad durante cinco turnos."
    ko: "전기로 만든 자력의 힘으로\n허공에 뜬다.\n5턴 동안 부유할 수 있다."
    zh_simp: "利用电气产生的磁力浮在空中。\n在５回合内可以飘浮。"
    zh_trad: "利用電氣產生的磁力浮在空中。\n在５回合內可以飄浮。"
magnetic_flux:
  names:
    jp_kanji: じばそうさ
    en: Magnetic Flux
    fr: Magné-Contrôle
    it: Controllo Polare
    de: Magnetregler
    es: Aura Magnética
    ko: 자기장조작
    zh_simp: 磁场操控
    zh_trad: 磁場操控
  descriptions:
    jp_kanji: "磁場を　操作　することによって\n特性　プラスと　マイナスの\n防御　特防が　あがる。"
    en: "The user manipulates magnetic fields, which raises\nthe Defense and Sp. Def stats of ally Pokémon with\nthe Plus or Minus Ability."
    fr: "Manipule les champs magnétiques pour augmenter\nla Défense et la Défense Spéciale des Pokémon alliés\ndotés du talent Plus ou du talent Moins."
    it: "Tramite il controllo dei campi magnetici, aumenta\nla Difesa e la Difesa Speciale dei Pokémon alleati\ndotati delle abilità Più o Meno."
    de: "Das Magnetfeld wird so manipuliert, dass Spezial-\nVerteidigung und Verteidigung von Team-Pokémon\nmit der Fähigkeit Plus oder Minus steigen."
    es: "Manipula el campo magnético y logra aumentar la\nDefensa y la Defensa Especial de los Pokémon aliados\nque cuenten con las habilidades Más y Menos."
    ko: "자기장 조작으로 인해\n특성 플러스와 마이너스의\n방어, 특수방어가 오른다."
    zh_simp: "通过操控磁场，\n会提高特性为正电和负电的\n宝可梦的防御和特防。"
    zh_trad: "操控磁場，\n提高特性是正電和負電的\n寶可夢的防禦和特防。"
magnitude:
  names:
    jp_kanji: マグニチュード
    en: Magnitude
    fr: Ampleur
    it: Magnitudo
    de: Intensität
    es: Magnitud
    ko: 매그니튜드
    zh_simp: 震级
    zh_trad: 震級
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
malicious_moonsault:
  names:
    jp_kanji: ハイパーダーククラッシャー
    en: Malicious Moonsault
    fr: Dark Body Press
    it: Iperschianto delle Tenebre
    de: Hyper Dark Crusher
    es: Hiperplancha Oscura
    ko: 하이퍼다크크러셔
    zh_simp: 极恶飞跃粉碎击
    zh_trad: 極惡飛躍粉碎擊
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mat_block:
  names:
    jp_kanji: たたみがえし
    en: Mat Block
    fr: Tatamigaeshi
    it: Ribaltappeto
    de: Tatami-Schild
    es: Escudo Tatami
    ko: 마룻바닥세워막기
    zh_simp: 掀榻榻米
    zh_trad: 掀榻榻米
  descriptions:
    jp_kanji: "かえした　タタミを　盾にして　自分や\n味方への　技の　ダメージを　防ぐ。\n変化技は　防ぐことが　できない。"
    en: "Using a pulled-up mat as a shield, the user protects\nitself and its allies from damaging moves. This does\nnot stop status moves."
    fr: "Retourne un tatami pour bloquer, comme avec\nun bouclier, les capacités visant le lanceur ou ses alliés.\nN’a pas d’effet sur les attaques de statut."
    it: "Chi la usa protegge se stesso e i propri alleati dai\ndanni di mosse nemiche, adoperando un tappetino\ncome scudo. Non è efficace contro mosse di stato."
    de: "Der Anwender richtet eine Tatami-Matte auf, um sich\nund sein Team vor Schaden zu schützen. Kein Schutz\nvor Status-Attacken."
    es: "El usuario usa un tatami para escudarse de los ataques\nenemigos. Protege también a los aliados. No funciona\ncontra movimientos de estado."
    ko: "뒤집어 세운 마룻바닥을 방패로 하여 자신과\n같은 편으로 향하는 기술 데미지를 막는다.\n변화 기술은 막을 수 없다."
    zh_simp: "将掀起来的榻榻米当作盾牌，\n防住自己和同伴免受招式伤害。\n变化招式无法防住。"
    zh_trad: "將掀起來的榻榻米當作盾牌，\n防禦住攻擊我方的攻擊招式。\n但無法防禦住變化招式的攻擊。"
max_airstream:
  names:
    jp_kanji: ダイジェット
    en: Max Airstream
    fr: Aéromax
    it: Dynajet
    de: Dyna-Düse
    es: Maxiciclón
    ko: 다이제트
    zh_simp: 极巨飞冲
    zh_trad: 極巨飛衝
  descriptions:
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　ひこうタイプの　攻撃。\n味方の　素早さを　上げる。"
    en: "This is a Flying-type attack Dynamax Pokémon use.\nThis raises ally Pokémon’s Speed stats."
    fr: "Une attaque de type Vol que seuls\nles Pokémon Dynamax peuvent utiliser.\nAugmente la Vitesse des alliés."
    it: "Un attacco di tipo Volante che può essere eseguito\ndai Pokémon dynamaxizzati. Aumenta la Velocità\ndegli alleati."
    de: "Eine Flug-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erhöht die Initiative der\nMitstreiterseite."
    es: "Ataque de tipo Volador ejecutado por un Pokémon\nDinamax. Aumenta la Velocidad de tu bando."
    ko: "다이맥스한 포켓몬이 날리는\n비행타입의 공격.\n같은 편의 스피드를 올린다."
    zh_simp: "极巨化宝可梦使出的飞行属性攻击。\n会提高我方的速度。"
    zh_trad: "極巨化寶可夢\n所使出的飛行屬性攻擊。\n可提高我方的速度。"
max_darkness:
  names:
    jp_kanji: ダイアーク
    en: Max Darkness
    fr: Sinistromax
    it: Dynatenebre
    de: Dyna-Dunkel
    es: Maxisombra
    ko: 다이아크
    zh_simp: 极巨恶霸
    zh_trad: 極巨惡霸
  descriptions:
