spore:
  names:
    jp_kanji: キノコのほうし
    en: Spore
    fr: Spore
    it: Spora
    de: Pilzspore
    es: Espora
    ko: 버섯포자
    zh_simp: 蘑菇孢子
    zh_trad: 蘑菇孢子
  descriptions:
    jp_kanji: "催眠効果のある\n胞子をパラパラとふりまき\n相手をねむけ状態にする。"
    en: "The user scatters a burst of spores that makes\nthe target drowsy."
    fr: "Le lanceur répand un nuage de spores qui plonge\nla cible dans un état de somnolence."
    it: "Chi la usa sparge una nube di spore che fa venire\nsonnolenza al bersaglio."
    de: Erzeugt eine Sporenwolke, die das Ziel schläfrig macht.
    es: Esparce esporas que producen somnolencia.
    ko: "최면 효과가 있는\n포자를 훌훌 흩뿌려서\n상대를 졸음 상태로 만든다."
    zh_simp: "沙沙沙地撒满具有\n催眠效果的孢子，\n从而让对手陷入瞌睡状态。"
    zh_trad: "大把撒出有催眠效果的孢子，\n讓對手陷入瞌睡狀態。"
spotlight:
  names:
    jp_kanji: スポットライト
    en: Spotlight
    fr: Projecteur
    it: Riflettore
    de: Rampenlicht
    es: Foco
    ko: 스포트라이트
    zh_simp: 聚光灯
    zh_trad: 聚光燈
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
