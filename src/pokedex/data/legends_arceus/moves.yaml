baton_pass:
  names:
    jp_kanji: バトンタッチ
    en: Baton Pass
    fr: Relais
    it: Staffetta
    de: Stafette
    es: Relevo
    ko: 바톤터치
    zh_simp: 接棒
    zh_trad: 接棒
  descriptions:
    jp_kanji: "控えの　ポケモンと　入れ替わる。\n能力変化は　替わった\nポケモンが　そのまま　受けつぐ。"
    en: "The user switches places with a party Pokémon in\nwaiting and passes along any stat changes."
    fr: "Le lanceur échange sa place et tout changement\nde stat avec un Pokémon de l’équipe."
    it: "Chi la usa è sostituito da un Pokémon della squadra,\nche eredita anche ogni modifica alle statistiche."
    de: "Tauscht den Anwender aus und überträgt alle\nStatusveränderungen auf das eingewechselte\nPokémon."
    es: "Cambia el puesto con otro miembro del equipo y le\npasa los cambios de características."
    ko: "교대 포켓몬과 바뀐다.\n능력 변화는 바뀐 포켓몬이\n그대로 이어받는다."
    zh_simp: "和后备宝可梦进行替换。\n换上的宝可梦能直接继承\n其能力的变化。"
    zh_trad: "與後備寶可夢進行替換。\n替換上場的寶可夢，\n將承接目前寶可夢的能力變化。"
beak_blast:
  names:
    jp_kanji: くちばしキャノン
    en: Beak Blast
    fr: Bec-Canon
    it: Cannonbecco
    de: Schnabelkanone
    es: Pico Cañón
    ko: 부리캐논
    zh_simp: 鸟嘴加农炮
    zh_trad: 鳥嘴加農炮
  descriptions:
    jp_kanji: "最初に　クチバシを　加熱してから\n攻撃を　くりだす。\n加熱中に　さわると　やけどする。"
    en: "The user first heats up its beak, and then it attacks\nthe target. Making direct contact with the Pokémon\nwhile it’s heating up its beak results in a burn."
    fr: "Le lanceur fait chauffer son bec avant d’attaquer.\nS’il subit une attaque directe pendant la montée\nen température, l’attaquant sera brûlé."
    it: "Chi la usa arroventa il proprio becco e poi attacca.\nSe un Pokémon lo colpisce con un attacco diretto\nmentre sta accumulando calore, resta scottato."
    de: "Der Anwender erhitzt zuerst seinen Schnabel und greift\ndann an. Pokémon, die ihn während des Erhitzens\nberühren, erleiden Verbrennungen."
    es: "Primero aumenta la temperatura de su pico y luego\nejecuta un ataque. Quema al rival si este le propina\nun ataque físico mientras está calentando el pico."
    ko: "먼저 부리를 가열시킨 다음\n공격을 날린다.\n가열 중에 만지면 화상을 입는다."
    zh_simp: "先加热鸟嘴后再进行攻击。\n鸟嘴在加热时对手触碰的话，\n就会使其灼伤。"
    zh_trad: "先加熱鳥嘴後再進行攻擊。\n若對手在加熱時觸碰的話，\n就會灼傷。"
beat_up:
  names:
    jp_kanji: ふくろだたき
    en: Beat Up
    fr: Baston
    it: Picchiaduro
    de: Prügler
    es: Paliza
    ko: 집단구타
    zh_simp: 围攻
    zh_trad: 圍攻
  descriptions:
    jp_kanji: "味方　全員で　攻撃する。\n仲間の　ポケモンが　多いほど\n技の　攻撃回数が　増える。"
    en: "The user gets all party Pokémon to attack the target.\nThe more party Pokémon, the greater the number\nof attacks."
    fr: "Le lanceur appelle tous les Pokémon de son équipe\nà attaquer. Plus ils sont nombreux, plus il y a d’attaques."
    it: "Chi la usa chiama in aiuto i Pokémon della squadra:\npiù ce ne sono, maggiore è il numero di attacchi."
    de: "Der Anwender greift zusammen mit allen Mitgliedern\nseines Teams das Ziel an. Je mehr Pokémon sich im\nTeam befinden, desto höher die Anzahl der Angriffe."
    es: "Ataque de todo el equipo Pokémon. Cuantos más haya,\nmás veces se atacará."
    ko: "같은 편 전원이 공격한다.\n동료 포켓몬이 많을수록\n기술의 공격 횟수가 증가한다."
    zh_simp: "我方全员进行攻击。\n同行的宝可梦越多，\n招式的攻击次数越多。"
    zh_trad: "讓我方所有寶可夢進行攻擊。\n同行的寶可夢越多，\n招式的攻擊次數越多。"
behemoth_bash:
  names:
    jp_kanji: きょじゅうだん
    en: Behemoth Bash
    fr: Aegis Maxima
    it: Colpo Maestoso
    de: Gigantenstoß
    es: Embate Supremo
    ko: 거수탄
    zh_simp: 巨兽弹
    zh_trad: 巨獸彈
  descriptions:
    jp_kanji: "巨大な　盾となり　ぶつかる。\n相手が　ダイマックス　していると\nダメージは　２倍に　なる。"
    en: "The user becomes a gigantic shield and slams into\nthe target. This move deals twice the damage if the\ntarget is Dynamaxed."
    fr: "Le lanceur se transforme en un immense bouclier\net charge son adversaire.\nInflige le double de dégâts aux Pokémon Dynamax."
    it: "Chi la usa si trasforma in un enorme scudo e attacca.\nSe il bersaglio è dynamaxizzato, causa il doppio dei\ndanni."
    de: "Der Anwender wird zu einem riesigen Schild und greift\ndas Ziel an. Dynamaximierte Ziele erleiden doppelten\nSchaden."
    es: "El usuario se convierte en un escudo gigante para\ngolpear al objetivo. Si este ha alcanzado el estado\nDinamax, se duplica el daño infligido."
    ko: "거대한 방패가 되어 부딪친다.\n상대가 다이맥스 중이면\n데미지가 2배가 된다."
    zh_simp: "变身为巨大的盾，撞击对手。\n如果对手正处于极巨化状态，\n则造成的伤害会变为２倍。"
    zh_trad: "變身為巨大的盾撞向對手。\n當對手極巨化時，\n傷害會變為２倍。"
behemoth_blade:
  names:
    jp_kanji: きょじゅうざん
    en: Behemoth Blade
    fr: Gladius Maximus
    it: Taglio Maestoso
    de: Gigantenhieb
    es: Tajo Supremo
    ko: 거수참
    zh_simp: 巨兽斩
    zh_trad: 巨獸斬
  descriptions:
    jp_kanji: "巨大な　剣となり　切りかかる。\n相手が　ダイマックス　していると\nダメージは　２倍に　なる。"
    en: "The user becomes a gigantic sword and cuts the target.\nThis move deals twice the damage if the target\nis Dynamaxed."
    fr: "Le lanceur se transforme en une immense épée\net pourfend son adversaire.\nInflige le double de dégâts aux Pokémon Dynamax."
    it: "Chi la usa si trasforma in un’enorme spada e attacca.\nSe il bersaglio è dynamaxizzato, causa il doppio dei\ndanni."
    de: "Der Anwender wird zu einem riesigen Schwert und\ngreift das Ziel an. Dynamaximierte Ziele erleiden\ndoppelten Schaden."
    es: "El usuario se convierte en una espada gigante para\nrebanar al objetivo. Si este ha alcanzado el estado\nDinamax, se duplica el daño infligido."
    ko: "거대한 검이 되어 베어 버린다.\n상대가 다이맥스 중이면\n데미지가 2배가 된다."
    zh_simp: "变身为巨大的剑，挥斩对手。\n如果对手正处于极巨化状态，\n则造成的伤害会变为２倍。"
    zh_trad: "變身為巨大的劍斬向對手。\n當對手極巨化時，\n傷害會變為２倍。"
belch:
  names:
    jp_kanji: ゲップ
    en: Belch
    fr: Éructation
    it: Rutto
    de: Rülpser
    es: Eructo
    ko: 트림
    zh_simp: 打嗝
    zh_trad: 打嗝
  descriptions:
    jp_kanji: "相手に　向かって　ゲップを\n浴びせて　ダメージを　与える。\nきのみを　食べないと　だせない。"
    en: "The user lets out a damaging belch at the target.\nThe user must eat a held Berry to use this move."
    fr: "Le lanceur se tourne vers l’ennemi et lui éructe dessus,\ninfligeant des dégâts. Ne fonctionne que si le lanceur\nconsomme la Baie qu’il tient."
    it: "Chi la usa attacca il bersaglio con un rutto potente.\nPer utilizzare questa mossa, il Pokémon deve\nmangiare la bacca che possiede."
    de: "Der Anwender fügt dem Ziel Schaden zu, indem er es\nanrülpst. Diese Attacke gelingt nur nach dem Konsum\neiner getragenen Beere."
    es: "El Pokémon causa daño a su oponente lanzándole\nun eructo. Para poder utilizar este movimiento tiene\nque llevar una baya y comérsela."
    ko: "상대를 향해 트림을 하여\n데미지를 준다.\n나무열매를 먹지 않으면 쓸 수 없다."
    zh_simp: "朝着对手打嗝，\n并给予伤害。\n如果不吃树果则无法使出。"
    zh_trad: "朝著對手打嗝進行攻擊。\n沒吃下樹果時無法使用。"
belly_drum:
  names:
    jp_kanji: はらだいこ
    en: Belly Drum
    fr: Cognobidon
    it: Panciamburo
    de: Bauchtrommel
    es: Tambor
    ko: 배북
    zh_simp: 腹鼓
    zh_trad: 腹鼓
  descriptions:
    jp_kanji: "自分の　ＨＰを　最大ＨＰの\n半分　減らして　自分の　攻撃を\n最大に　あげる。"
    en: "The user maximizes its Attack stat in exchange for\nHP equal to half its max HP."
    fr: "Améliore l’Attaque au maximum en sacrifiant la moitié\ndes PV max."
    it: "Chi la usa massimizza l’Attacco in cambio di metà\ndei PS massimi."
    de: "Der Anwender maximiert den Angriffs-Wert auf Kosten\nder Hälfte seiner maximalen KP."
    es: "Reduce la mitad de los PS máximos para mejorar al\nmáximo el Ataque."
    ko: "자신의 HP를 최대 HP의\n절반만큼 감소시켜 자신의 공격을\n최대로 올린다."
    zh_simp: "将自己的ＨＰ减少到\n最大ＨＰ的一半，\n从而最大限度提高自己的攻击。"
    zh_trad: "將現有的ＨＰ\n減去最大ＨＰ的一半，\n讓自己的攻擊提高至最大值。"
bestow:
  names:
    jp_kanji: ギフトパス
    en: Bestow
    fr: Passe-Cadeau
    it: Cediregalo
    de: Offerte
    es: Ofrenda
    ko: 기프트패스
    zh_simp: 传递礼物
    zh_trad: 傳遞禮物
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
bide:
  names:
    jp_kanji: がまん
    en: Bide
    fr: Patience
    it: Pazienza
    de: Geduld
    es: Venganza
    ko: 참기
    zh_simp: 忍耐
    zh_trad: 忍耐
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
bind:
  names:
    jp_kanji: しめつける
    en: Bind
    fr: Étreinte
    it: Legatutto
    de: Klammergriff
    es: Atadura
    ko: 조이기
    zh_simp: 绑紧
    zh_trad: 綁緊
  descriptions:
    jp_kanji: "長い　体や　つるなどを　使い\n４ー５ターンの　間\n相手を　締めつけて　攻撃する。"
    en: "Things such as long bodies or tentacles are used to\nbind and squeeze the target for four to five turns."
    fr: "Ligote l’ennemi avec les tentacules ou le corps\npour l’écraser durant quatre à cinq tours."
    it: "Il lungo corpo o i tentacoli di chi la usa legano e\nstritolano il bersaglio per quattro o cinque turni."
    de: "Umklammert und quetscht das Ziel über vier bis fünf\nRunden."
    es: Ata y oprime de cuatro a cinco turnos.
    ko: "긴 몸이나 덩굴 등을 써서\n4~5턴 동안\n상대를 조여 공격한다."
    zh_simp: "使用长长的身体或藤蔓等，\n在４～５回合内\n绑紧对手进行攻击。"
    zh_trad: "使用長長的身體或藤蔓等，\n在４～５回合內\n綁緊對手進行攻擊。"
bite:
  names:
    jp_kanji: かみつく
    en: Bite
    fr: Morsure
    it: Morso
    de: Biss
    es: Mordisco
    ko: 물기
    zh_simp: 咬住
    zh_trad: 咬住
  descriptions:
    jp_kanji: "鋭く　とがった歯で\nかみついて攻撃する。"
    en: "The user bites the target with viciously sharp fangs\nto inflict damage."
    fr: "Le lanceur inflige une morsure de ses dents tranchantes\nà l’ennemi."
    it: Il bersaglio viene morso da denti affilatissimi.
    de: Der Anwender beißt mit spitzen Zähnen zu.
    es: Ataca con un voraz bocado.
    ko: "날카롭고 뾰족한 이빨로\n물어서 공격한다."
    zh_simp: "用尖锐的牙\n咬住对手进行攻击。"
    zh_trad: "用尖銳的牙齒\n咬住對手進行攻擊。"
bitter_malice:
  names:
    jp_kanji: うらみつらみ
    en: Bitter Malice
    fr: Cœur de Rancœur
    it: Livore
    de: Niedertracht
    es: Rencor Reprimido
    ko: 천추지한
    zh_simp: 冤冤相报
    zh_trad: 冤冤相報
  descriptions:
    jp_kanji: "背筋が凍るような怨念で攻撃して\n相手をしもやけ状態にすることもある。\n相手が状態異常だと威力は２倍。"
    en: "The user attacks its target with spine-chilling resentment.\nThis may also leave the target with frostbite. This move’s\npower is doubled if the target has a status condition."
    fr: "Une rancœur glaciale frappe l’ennemi. Peut aussi\nle geler. La puissance est doublée si la cible souffre\nd’une altération de statut."
    it: "Colpisce con una furia che fa raggelare il sangue nelle\nvene. Può assiderare il bersaglio. Se questi è affetto da\nproblemi di stato, la potenza della mossa raddoppia."
    de: "Angriff mit eiskaltem, schaudererregendem Hass,\nwodurch das Ziel eventuell Frostbrand erleidet.\nDoppelt so stark gegen Ziele mit einem Statusproblem."
    es: "Somete al objetivo a su frío rencor, lo que puede \ndejarlo helado. El daño será doble si este ya sufre \nun problema de estado."
    ko: "등골이 서늘해지는 원념으로 공격해서\n상대를 동상 상태로 만들 때가 있다.\n상대가 상태 이상인 경우 위력이 2배가 된다."
    zh_simp: "用令人毛骨悚然的怨念进行攻击。\n有时还会让对手陷入冻伤状态。\n攻击处于异常状态的对手时，威力会变成２倍。"
    zh_trad: "用令人毛骨悚然的怨念進行攻擊。\n有時還會讓對手陷入凍傷狀態。\n攻擊處於異常狀態的對手時，威力會變成２倍。"
black_hole_eclipse:physical:
  names:
    jp_kanji: ブラックホールイクリプス
    en: Black Hole Eclipse
    fr: Trou Noir des Ombres
    it: Buco Nero del Non Ritorno
    de: Schwarzes Loch des Grauens
    es: Agujero Negro Aniquilador
    ko: 블랙홀이클립스
    zh_simp: 黑洞吞噬万物灭
    zh_trad: 黑洞吞噬萬物滅
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
