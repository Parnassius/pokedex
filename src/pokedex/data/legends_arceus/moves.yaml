10_000_000_volt_thunderbolt:
  names:
    jp_kanji: １０００まんボルト
    en: 10,000,000 Volt Thunderbolt
    fr: Giga-Tonnerre
    it: Iperfulmine
    de: Tausendfacher Donnerblitz
    es: Gigarrayo Fulminante
    ko: 1000만볼트
    zh_simp: 千万伏特
    zh_trad: 千萬伏特
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
absorb:
  names:
    jp_kanji: すいとる
    en: Absorb
    fr: Vole-Vie
    it: Assorbimento
    de: Absorber
    es: Absorber
    ko: 흡수
    zh_simp: 吸取
    zh_trad: 吸取
  descriptions:
    jp_kanji: "養分を吸い取り攻撃する。\n相手に与えたダメージのいくらか\n自分のＨＰを回復できる。"
    en: "The user attacks by draining the target’s nutrients.\nSome of the damage dealt to the target is absorbed\nby the user to restore their own HP."
    fr: "Une attaque qui absorbe les nutriments de la cible\net convertit une partie des dégâts infligés en PV\npour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una quantità\ndi PS pari a una parte del danno inferto."
    de: "Entzieht dem Ziel Nährstoffe. Ein Teil des zugefügten\nSchadens wird dem Anwender als KP gutgeschrieben."
    es: "Un ataque que absorbe nutrientes. Quien lo usa\nrecupera parte de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의 일부만큼\n자신의 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一部分的ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一部分的ＨＰ。"
accelerock:
  names:
    jp_kanji: アクセルロック
    en: Accelerock
    fr: Vif Roc
    it: Rocciarapida
    de: Turbofelsen
    es: Roca Veloz
    ko: 액셀록
    zh_simp: 冲岩
    zh_trad: 衝岩
  descriptions:
    jp_kanji: "素早い　スピードで\n相手に　ぶつかって　攻撃する。\n必ず　先制攻撃　できる。"
    en: "The user smashes into the target at high speed.\nThis move always goes first."
    fr: "Le lanceur charge l’ennemi à toute vitesse.\nFrappe en priorité."
    it: "Chi la usa attacca il bersaglio colpendolo a tutta\nvelocità. Questa mossa ha priorità alta."
    de: "Bei dieser Erstschlag-Attacke prallt der Anwender mit\ngroßer Geschwindigkeit auf das Ziel."
    es: "El usuario se lanza contra el objetivo a gran\nvelocidad. Este movimiento tiene prioridad alta."
    ko: "재빠른 스피드로\n상대에게 부딪쳐서 공격한다.\n반드시 선제공격할 수 있다."
    zh_simp: "迅速撞向对手进行攻击。\n必定能够先制攻击。"
    zh_trad: "迅速撞向對手進行攻擊。\n必定能夠發動先制攻擊。"
acid:
  names:
    jp_kanji: ようかいえき
    en: Acid
    fr: Acide
    it: Acido
    de: Säure
    es: Ácido
    ko: 용해액
    zh_simp: 溶解液
    zh_trad: 溶解液
  descriptions:
    jp_kanji: "強い　酸を　相手に　かけて\n攻撃する。　相手の　特防を\nさげることが　ある。"
    en: "Opposing Pokémon are attacked with a spray of harsh\nacid. This may also lower their Sp. Def stats."
    fr: "Le lanceur attaque l’ennemi avec un jet d’acide\ncorrosif. Peut aussi baisser sa Défense Spéciale."
    it: "Colpisce i nemici intorno spruzzando un acido\ncorrosivo. Può anche ridurne la Difesa Speciale."
    de: "Versprüht ätzende Flüssigkeit, die eventuell die\nSpezial-Verteidigung der gegnerischen Pokémon senkt."
    es: "Rocía a los enemigos con un ácido corrosivo.\nPuede bajar la Defensa Especial."
    ko: "강한 산을 상대에게 끼얹어\n공격한다. 상대의 특수방어를\n떨어뜨릴 때가 있다."
    zh_simp: "将强酸泼向对手进行攻击。\n有时会降低对手的特防。"
    zh_trad: "將強酸潑向對手進行攻擊。\n有時會降低對手的特防。"
acid_armor:
  names:
    jp_kanji: とける
    en: Acid Armor
    fr: Acidarmure
    it: Scudo Acido
    de: Säurepanzer
    es: Armadura Ácida
    ko: 녹기
    zh_simp: 溶化
    zh_trad: 溶化
  descriptions:
    jp_kanji: "細胞の変化で液状になり\n自分の守りの力をあげる。"
    en: "The user alters its cellular structure to liquefy itself,\nraising its defensive stats."
    fr: "Le lanceur modifie sa structure cellulaire pour se\nliquéfier, ce qui augmente sa puissance défensive."
    it: "Chi la usa altera la sua struttura cellulare passando\nallo stato liquido. La sua forza difensiva aumenta."
    de: "Verflüssigt Körperzellen des Anwenders, wodurch sich\nseine Defensivkraft erhöht."
    es: "Transforma la estructura celular para hacerse líquido y\naumenta la defensiva."
    ko: "세포의 변화로 액체가 되어\n자신의 방어력을 올린다."
    zh_simp: "通过细胞的变化进行液化，\n从而提高自己的防守力。"
    zh_trad: "藉由細胞的變化讓身體液化，\n提高自己的防守力。"
acid_downpour:physical:
  names:
    jp_kanji: アシッドポイズンデリート
    en: Acid Downpour
    fr: Déluge Causti-Toxique
    it: Acidiluvio Corrosivo
    de: Vernichtender Säureregen
    es: Diluvio Corrosivo
    ko: 애시드포이즌딜리트
    zh_simp: 强酸剧毒灭绝雨
    zh_trad: 強酸劇毒滅絕雨
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
acid_downpour:special:
  names:
    jp_kanji: アシッドポイズンデリート
    en: Acid Downpour
    fr: Déluge Causti-Toxique
    it: Acidiluvio Corrosivo
    de: Vernichtender Säureregen
    es: Diluvio Corrosivo
    ko: 애시드포이즌딜리트
    zh_simp: 强酸剧毒灭绝雨
    zh_trad: 強酸劇毒滅絕雨
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
acid_spray:
  names:
    jp_kanji: アシッドボム
    en: Acid Spray
    fr: Bombe Acide
    it: Acidobomba
    de: Säurespeier
    es: Bomba Ácida
    ko: 애시드봄
    zh_simp: 酸液炸弹
    zh_trad: 酸液炸彈
  descriptions:
    jp_kanji: "相手をとかす液体を\n吐きだして攻撃する。\n相手の守りの力をさげることもある。"
    en: "The user spits fluid that works to melt the target.\nThis may also lower the target’s defensive stats."
    fr: "Projette un liquide acide qui fait fondre l’ennemi.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Chi la usa attacca il bersaglio con un acido altamente\ncorrosivo. Il fluido può anche ridurre la forza difensiva\ndel bersaglio."
    de: "Anwender greift an, indem er eine ätzende Flüssigkeit\nauf das Ziel speit. Senkt eventuell dessen Defensivkraft."
    es: "Ataca con un líquido corrosivo que puede reducir la\ndefensiva del objetivo."
    ko: "상대를 녹이는 액체를\n토해내서 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "喷出能溶化对手的液体进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "噴出能溶化對手的液體進行攻擊。\n有時還會降低對手的防守力。"
acrobatics:
  names:
    jp_kanji: アクロバット
    en: Acrobatics
    fr: Acrobatie
    it: Acrobazia
    de: Akrobatik
    es: Acróbata
    ko: 애크러뱃
    zh_simp: 杂技
    zh_trad: 雜技
  descriptions:
    jp_kanji: "軽やかに　相手を　攻撃する。\n自分が　道具を　持っていないとき\n大きな　ダメージを　与える。"
    en: "The user nimbly strikes the target. If the user is not\nholding an item, this attack inflicts massive damage."
    fr: "Attaque agile. Si le lanceur ne tient pas d’objet,\nl’attaque inflige davantage de dégâts."
    it: "Attacca rapidamente il bersaglio. Se chi la usa non\nha uno strumento, infligge al nemico grossi danni."
    de: "Ein graziler Angriff auf das Ziel. Trägt der Anwender\nkein Item bei sich, richtet die Attacke großen\nSchaden an."
    es: "Golpea ágilmente. Si el usuario no porta ningún objeto,\nel objetivo resulta seriamente dañado."
    ko: "경쾌하게 상대를 공격한다.\n자신이 도구를 지니고 있지 않을 때\n큰 데미지를 준다."
    zh_simp: "轻巧地攻击对手。\n自己没有携带道具时，\n会给予较大的伤害。"
    zh_trad: "輕巧地攻擊對手。\n自己沒有攜帶道具時，\n能給予對手較大的傷害。"
acupressure:
  names:
    jp_kanji: つぼをつく
    en: Acupressure
    fr: Acupression
    it: Acupressione
    de: Akupressur
    es: Acupresión
    ko: 경혈찌르기
    zh_simp: 点穴
    zh_trad: 點穴
  descriptions:
    jp_kanji: "つぼおしで　体を　活性化させる。\n能力の　どれか　１つを\nぐーんと　あげる。"
    en: "The user applies pressure to stress points, sharply\nboosting one of its or its allies’ stats."
    fr: "Le lanceur utilise sa connaissance des points de pression\npour beaucoup augmenter une stat."
    it: "Chi la usa esercita pressione su alcuni punti\nnevralgici e aumenta di molto una statistica a caso."
    de: "Anwender übt Druck auf Stresspunkte aus und erhöht\neinen Statuswert stark."
    es: "Aplica presión en puntos clave del cuerpo para\npotenciar mucho una de sus características."
    ko: "경혈을 눌러 몸을 활성화시킨다.\n능력 중 하나를 크게 올린다."
    zh_simp: "通过点穴\n让身体舒筋活络。\n大幅提高某１项能力。"
    zh_trad: "利用點穴激發身體的活力，\n大幅提高自己的某一項能力。"
aerial_ace:
  names:
    jp_kanji: つばめがえし
    en: Aerial Ace
    fr: Aéropique
    it: Aeroassalto
    de: Aero-Ass
    es: Golpe Aéreo
    ko: 제비반환
    zh_simp: 燕返
    zh_trad: 燕返
  descriptions:
    jp_kanji: "素早い動きで\n相手を　翻弄して切りつける。\n攻撃は必ず命中する。"
    en: "The user confounds the target with speed, then slashes.\nThis attack never misses."
    fr: "Le lanceur prend l’ennemi de vitesse et le lacère.\nN’échoue jamais."
    it: "Chi la usa attacca il bersaglio a grande velocità.\nQuesto attacco è infallibile."
    de: "Eine extrem schnelle Attacke, der das Ziel nicht\nausweichen kann."
    es: El usuario lanza un ataque muy rápido e ineludible.
    ko: "재빠른 움직임으로\n상대를 농락해 벤다.\n공격은 반드시 명중한다."
    zh_simp: "以敏捷的动作\n戏弄对手后进行切斩。\n攻击必定会命中。"
    zh_trad: "以敏捷的動作\n戲弄對手後進行切斬。\n攻擊必定會命中。"
aeroblast:
  names:
    jp_kanji: エアロブラスト
    en: Aeroblast
    fr: Aéroblast
    it: Aerocolpo
    de: Luftstoß
    es: Aerochorro
    ko: 에어로블라스트
    zh_simp: 气旋攻击
    zh_trad: 氣旋攻擊
  descriptions:
    jp_kanji: "空気の　渦を\n発射して　攻撃する。\n急所に　当たりやすい。"
    en: "A vortex of air is shot at the target to inflict damage.\nCritical hits land more easily."
    fr: "Le lanceur projette une tornade sur l’ennemi\npour infliger des dégâts. Taux de critiques élevé."
    it: "Colpisce il bersaglio con un vortice d’aria\nper danneggiarlo. Probabile brutto colpo."
    de: "Erzeugt Luftstrudel gegen das Ziel.\nHohe Volltrefferquote."
    es: "Lanza un chorro de aire que suele asestar un golpe\ncrítico."
    ko: "공기의 소용돌이를\n발사하여 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "发射空气旋涡\n进行攻击。\n容易击中要害。"
    zh_trad: "向對手發射空氣旋渦\n進行攻擊。\n容易擊中要害。"
after_you:
  names:
    jp_kanji: おさきにどうぞ
    en: After You
    fr: Après Vous
    it: Cortesia
    de: Galanterie
    es: Cede Paso
    ko: 당신먼저
    zh_simp: 您先请
    zh_trad: 您先請
  descriptions:
    jp_kanji: "相手の　行動を　サポートして\n自分の　行動の　あとに\n続けて　動けるように　する。"
    en: "The user helps the target and makes it use its move\nright after the user."
    fr: "S’il est le premier à agir, le lanceur permet à sa cible\nd’utiliser une capacité juste après lui."
    it: "Chi la usa aiuta un bersaglio più lento\npermettendogli di agire subito dopo."
    de: "Anwender ermöglicht dem Ziel direkt nach ihm zu\nhandeln, solange der Anwender als Erstes zum Zug\nkommt."
    es: "Si el usuario es el más rápido, permite al objetivo usar\nun movimiento justo tras él, adelantándose a Pokémon\nmás rápidos."
    ko: "상대의 행동을 도와서\n자신이 행동한 뒤에 바로\n움직일 수 있도록 한다."
    zh_simp: "支援我方或对手的行动，\n使其紧接着此招式之后行动。"
    zh_trad: "支援對手，\n讓對手緊接在自己之後行動。"
agility:
  names:
    jp_kanji: こうそくいどう
    en: Agility
    fr: Hâte
    it: Agilità
    de: Agilität
    es: Agilidad
    ko: 고속이동
    zh_simp: 高速移动
    zh_trad: 高速移動
  descriptions:
    jp_kanji: "力を　ぬいて　体を　軽くして\n高速で　動く。\n自分の　素早さを　ぐーんと　あげる。"
    en: "The user relaxes and lightens its body to move\nfaster. This sharply raises the Speed stat."
    fr: "Le lanceur se relaxe et allège son corps pour beaucoup\naugmenter sa Vitesse."
    it: "Chi la usa rilassa e alleggerisce il proprio corpo\nper far salire di molto la Velocità."
    de: "Entspannt den Körper, um den Initiative-Wert stark\nzu erhöhen."
    es: Relaja el cuerpo para ganar mucha Velocidad.
    ko: "힘을 빼고 몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를 크게 올린다."
    zh_simp: "让身体放松变得轻盈，\n以便高速移动。\n大幅提高自己的速度。"
    zh_trad: "放鬆身體，\n讓自己變得輕盈以進行高速移動。\n可大幅提高自己的速度。"
air_cutter:
  names:
    jp_kanji: エアカッター
    en: Air Cutter
    fr: Tranch’Air
    it: Aerasoio
    de: Windschnitt
    es: Aire Afilado
    ko: 에어컷터
    zh_simp: 空气利刃
    zh_trad: 空氣利刃
  descriptions:
    jp_kanji: "鋭い風で\n相手を切りつけて攻撃する。\n急所に当たりやすい。"
    en: "The user launches razor-like wind to slash the target.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur appelle des vents tranchants qui lacèrent\nl’ennemi. Taux de critiques élevé."
    it: "Chi la usa provoca un vento tagliente che sferza\ni nemici intorno. Probabile brutto colpo."
    de: "Greift das Ziel mit rasierklingenartigem Wind an.\nHohe Volltrefferquote."
    es: Viento cortante que azota. Suele ser un golpe crítico.
    ko: "날카로운 바람으로\n상대를 베어 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用锐利的风\n切斩对手进行攻击。\n容易击中要害。"
    zh_trad: "用鋒利的風刃\n斬切對手進行攻擊。\n容易擊中要害。"
air_slash:
  names:
    jp_kanji: エアスラッシュ
    en: Air Slash
    fr: Lame d’Air
    it: Eterelama
    de: Luftschnitt
    es: Tajo Aéreo
    ko: 에어슬래시
    zh_simp: 空气之刃
    zh_trad: 空氣斬
  descriptions:
    jp_kanji: "空をも切り裂く\n空気の刃で攻撃する。"
    en: "The user attacks with a blade of air that slices even\nthe sky."
    fr: "Le lanceur attaque avec une lame d’air qui fend tout\nsur son passage, même le vent."
    it: "Chi la usa attacca con un vento tagliente che squarcia\nil cielo."
    de: Das Ziel wird mit einer Luftklinge angegriffen.
    es: Ataca con un viento afilado que incluso corta el aire.
    ko: "하늘까지 베어 가르는\n공기의 칼날로 공격한다."
    zh_simp: "用连天空也能劈开的\n空气之刃进行攻击。"
    zh_trad: "用連天空也能劈開的\n空氣之刃進行攻擊。"
all_out_pummeling:physical:
  names:
    jp_kanji: ぜんりょくむそうげきれつけん
    en: All-Out Pummeling
    fr: Combo Hyper-Furie
    it: Iperscarica Furiosa
    de: Fulminante Faustschläge
    es: Ráfaga Demoledora
    ko: 전력무쌍격렬권
    zh_simp: 全力无双激烈拳
    zh_trad: 全力無雙激烈拳
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
all_out_pummeling:special:
  names:
    jp_kanji: ぜんりょくむそうげきれつけん
    en: All-Out Pummeling
    fr: Combo Hyper-Furie
    it: Iperscarica Furiosa
    de: Fulminante Faustschläge
    es: Ráfaga Demoledora
