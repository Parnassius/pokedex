ally_switch:
  names:
    jp_kanji: サイドチェンジ
    en: Ally Switch
    fr: Interversion
    it: Cambiaposto
    de: Seitentausch
    es: Cambio de Banda
    ko: 사이드체인지
    zh_simp: 交换场地
    zh_trad: 交換場地
  descriptions:
    jp_kanji: "不思議な　力で　テレポートして\n自分と　味方の　居場所を\n入れ替える。"
    en: "The user teleports using a strange power and\nswitches places with one of its allies."
    fr: "Le lanceur se téléporte à l’aide d’un pouvoir mystérieux.\nIl échange sa place avec celle d’un allié sur le terrain."
    it: "Chi la usa cambia di posto con un alleato\nin campo grazie a un misterioso potere."
    de: "Wundersame Kräfte teleportieren den Anwender an\nden Platz eines Mitstreiters."
    es: "Extraño poder que intercambia la posición del usuario\ncon la de un aliado sobre el terreno de combate."
    ko: "이상한 힘으로 순간이동하여\n자신과 같은 편의 위치를 바꾼다."
    zh_simp: "用神奇的力量瞬间移动，\n互换自己和同伴所在的位置。"
    zh_trad: "用神奇的力量瞬間移動，\n讓自己和同伴的所在位置互換。"
amnesia:
  names:
    jp_kanji: ドわすれ
    en: Amnesia
    fr: Amnésie
    it: Amnesia
    de: Amnesie
    es: Amnesia
    ko: 망각술
    zh_simp: 瞬间失忆
    zh_trad: 瞬間失憶
  descriptions:
    jp_kanji: "頭を　からにして\n一瞬　なにかを　忘れることで\n自分の　特防を　ぐーんと　あげる。"
    en: "The user temporarily empties its mind to forget its\nconcerns. This sharply raises the user’s Sp. Def stat."
    fr: "Le lanceur fait le vide dans son esprit pour oublier\nses soucis. Augmente beaucoup sa Défense Spéciale."
    it: "Chi la usa svuota per un po’ la mente per dimenticare\ni problemi. La Difesa Speciale aumenta di molto."
    de: "Gedächtnisverlust, der die Spezial-Verteidigung\nstark erhöht."
    es: "El usuario olvida sus preocupaciones y aumenta mucho\nla Defensa Especial."
    ko: "머리를 비워서 순간적으로\n무언가를 잊어버림으로써\n자신의 특수방어를 크게 올린다."
    zh_simp: "将头脑清空，\n瞬间忘记某事，\n从而大幅提高自己的特防。"
    zh_trad: "將頭腦清空，\n藉由在一瞬間遺忘某些事\n大幅提高自己的特防。"
anchor_shot:
  names:
    jp_kanji: アンカーショット
    en: Anchor Shot
    fr: Ancrage
    it: Colpo d’Ancora
    de: Ankerschuss
    es: Anclaje
    ko: 앵커숏
    zh_simp: 掷锚
    zh_trad: 擲錨
  descriptions:
    jp_kanji: "アンカーを　相手に　からませて\n攻撃する。　相手は\n逃げることが　できなくなる。"
    en: "The user entangles the target with its anchor chain\nwhile attacking. The target becomes unable to flee."
    fr: "Le lanceur jette son ancre sur la cible pour l’attaquer.\nUne fois accrochée, elle l’empêche de s’enfuir."
    it: "Chi la usa attacca il nemico con un’ancora e lo\nintrappola nella catena impedendogli di fuggire."
    de: "Der Anwender greift das Ziel an, indem er es mit einer\nAnkerkette umwickelt. Dadurch wird das Ziel an der\nFlucht gehindert."
    es: "Ataca lanzando un ancla al oponente, que queda\natrapado y no puede huir."
    ko: "앵커를 상대에게 휘감아서\n공격한다. 상대는\n도망칠 수 없게 된다."
    zh_simp: "将锚缠住对手进行攻击。\n使对手无法逃走。"
    zh_trad: "將錨纏住對手進行攻擊。\n使對手無法逃走。"
ancient_power:
  names:
    jp_kanji: げんしのちから
    en: Ancient Power
    fr: Pouvoir Antique
    it: Forzantica
    de: Antik-Kraft
    es: Poder Pasado
    ko: 원시의힘
    zh_simp: 原始之力
    zh_trad: 原始之力
  descriptions:
    jp_kanji: "原始の力で攻撃する。\n自分の攻めの力　守りの力を\nあげることもある。"
    en: "The user attacks with a primeval power. This may also\nraise the user’s offensive and defensive stats."
    fr: "Le lanceur attaque grâce à une force primitive.\nPeut aussi augmenter sa puissance offensive et\ndéfensive."
    it: "Colpisce il bersaglio con una forza primordiale.\nPuò aumentare la forza offensiva e la forza difensiva\ndi chi la usa."
    de: "Angriff mit antiker Kraft. Erhöht eventuell die\nOffensivkraft und Defensivkraft des Anwenders."
    es: "Ataque prehistórico que además puede subir la\nofensiva y la defensiva del usuario."
    ko: "원시의 힘으로 공격한다.\n자신의 공격력과 방어력이\n오를 때가 있다."
    zh_simp: "用原始之力进行攻击。\n有时会提高自己的进攻力和防守力。"
    zh_trad: "用原始之力進行攻擊。\n有時還會提高自己的進攻力和防守力。"
apple_acid:
  names:
    jp_kanji: りんごさん
    en: Apple Acid
    fr: Acide Malique
    it: Acido Malico
    de: Apfelsäure
    es: Ácido Málico
    ko: 사과산
    zh_simp: 苹果酸
    zh_trad: 蘋果酸
  descriptions:
    jp_kanji: "すっぱい　りんごから　つくりだした\n酸性の　液体で　攻撃。\n相手の　特防を　下げる。"
    en: "The user attacks the target with an acidic liquid created\nfrom tart apples. This also lowers the target’s\nSp. Def stat."
    fr: "Le lanceur attaque son adversaire avec un liquide\ncorrosif créé à partir d’une pomme acide.\nBaisse la Défense Spéciale de la cible."
    it: "Chi la usa attacca il bersaglio con un liquido acido\nricavato da mele aspre riducendone la Difesa Speciale."
    de: "Der Anwender greift mit einer aus einem sauren Apfel\nhergestellten säurehaltigen Flüssigkeit an. Dabei wird\ndie Spezial-Verteidigung des Zieles gesenkt."
    es: "Ataca al objetivo con el fluido corrosivo que desprende\nuna manzana ácida, lo que también disminuye la\nDefensa Especial de este."
    ko: "새콤한 사과에서 만들어 낸\n산성 액체로 공격한다.\n상대의 특수방어를 떨어뜨린다."
    zh_simp: "使用从酸苹果中提取出来的\n酸性液体进行攻击。\n会降低对手的特防。"
    zh_trad: "使用從酸蘋果提煉出的\n酸性液體進行攻擊。\n可降低對手的特防。"
aqua_jet:
  names:
    jp_kanji: アクアジェット
    en: Aqua Jet
    fr: Aqua-Jet
    it: Acquagetto
    de: Wasserdüse
    es: Acua Jet
    ko: 아쿠아제트
    zh_simp: 水流喷射
    zh_trad: 水流噴射
  descriptions:
    jp_kanji: "目にも留まらぬ　ものすごい速さで\n相手につっこむ。\n自分の行動順がはやくなる。"
    en: "The user lunges at the target to deal damage, moving\nat a speed that makes it almost invisible. This also\nraises the user’s action speed."
    fr: "Le lanceur fonce sur l’ennemi si rapidement qu’on\nparvient à peine à le discerner.\nAvance la position du lanceur dans l’ordre d’action."
    it: "Chi la usa colpisce a una tale velocità da rendersi\nquasi invisibile e accelera il proprio ordine delle azioni."
    de: "Der Anwender stürzt sich so schnell auf das Ziel,\ndass er quasi unsichtbar wird. Danach kommt er\nschneller wieder zum Zug."
    es: "Ataque de una rapidez espeluznante que hace que los\nturnos del usuario tarden menos en llegar."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "以迅雷不及掩耳之势\n扑向对手。\n能够让自己的行动顺序提前。"
    zh_trad: "以迅雷不及掩耳之勢\n撲向對手。\n能夠讓自己的行動順序提前。"
aqua_ring:
  names:
    jp_kanji: アクアリング
    en: Aqua Ring
    fr: Anneau Hydro
    it: Acquanello
    de: Wasserring
    es: Acua Aro
    ko: 아쿠아링
    zh_simp: 水流环
    zh_trad: 水流環
  descriptions:
    jp_kanji: "自分の　体の　周りを\n水で　つくった　ベールで　おおう。\n毎ターン　ＨＰを　回復する。"
    en: "The user envelops itself in a veil made of water.\nIt regains some HP every turn."
    fr: "Un voile d’eau recouvre le lanceur et régénère ses PV\nà chaque tour."
    it: "Chi la usa si avvolge in un velo d’acqua. Recupera\nalcuni PS a ogni turno."
    de: "Anwender umgibt sich mit einem Schleier aus Wasser.\nDabei regeneriert er einige KP pro Runde."
    es: "Un manto de agua cubre al Pokémon que lo usa.\nRecupera algunos PS en cada turno."
    ko: "자신의 몸 주변을\n물로 만든 베일로 덮는다.\n매 턴 HP를 회복한다."
    zh_simp: "在自己身体的周围\n覆盖用水制造的幕。\n每回合回复ＨＰ。"
    zh_trad: "在自己的身邊套上水流環。\n每回合會回復自己的ＨＰ。"
aqua_tail:
  names:
    jp_kanji: アクアテール
    en: Aqua Tail
    fr: Hydro-Queue
    it: Idrondata
    de: Nassschweif
    es: Acua Cola
    ko: 아쿠아테일
    zh_simp: 水流尾
    zh_trad: 水流尾
  descriptions:
    jp_kanji: "激しく荒れくるう波のように\n大きなしっぽをふって\n相手を攻撃する。"
    en: "The user attacks by swinging its tail as if it were a\nvicious wave in a raging storm."
    fr: "Le lanceur attaque en balançant sa queue comme\nune lame de fond en pleine tempête."
    it: "Chi la usa attacca agitando la coda come se fosse\nuna violenta ondata in una tempesta furiosa."
    de: "Anwender attackiert mit dem Schweif, als ob dieser\neine brutale Welle in einem tosenden Sturm sei."
    es: "Ataca agitando la cola como si fuera una ola rabiosa en\nuna tormenta devastadora."
    ko: "세차게 날뛰는 거친 파도와 같이\n큰 꼬리를 흔들어서\n상대를 공격한다."
    zh_simp: "如惊涛骇浪般挥动\n大尾巴攻击对手。"
    zh_trad: "如驚濤駭浪般地甩動\n大尾巴攻擊對手。"
arm_thrust:
  names:
    jp_kanji: つっぱり
    en: Arm Thrust
    fr: Cogne
    it: Sberletese
    de: Armstoß
    es: Empujón
    ko: 손바닥치기
    zh_simp: 猛推
    zh_trad: 猛推
  descriptions:
    jp_kanji: "ひらいた　両手で\n相手を　つっぱって　攻撃する。\n２ー５回の　間　連続で　だす。"
    en: "The user lets loose a flurry of open-palmed arm\nthrusts that hit two to five times in a row."
    fr: "Un déluge de coups adressés avec la paume qui frappe\nde deux à cinq fois d’affilée."
    it: "Raffica di ceffoni che colpisce da due a\ncinque volte di fila."
    de: "Schläge mit geradem Arm, die das Ziel zwei- bis\nfünfmal treffen."
    es: "Fuertes empujones que golpean de dos a cinco veces\nseguidas."
    ko: "펼친 양손으로\n상대를 번갈아 쳐서 공격한다.\n2~5회 연속으로 쓴다."
    zh_simp: "用张开着的双手\n猛推对手进行攻击。\n连续攻击２～５次。"
    zh_trad: "用張開的雙手\n猛推對手進行攻擊。\n連續攻擊２～５次。"
aromatherapy:
  names:
    jp_kanji: アロマセラピー
    en: Aromatherapy
    fr: Aromathérapie
    it: Aromaterapia
    de: Aromakur
    es: Aromaterapia
    ko: 아로마테라피
    zh_simp: 芳香治疗
    zh_trad: 芳香治療
  descriptions:
    jp_kanji: "心地好い　やすらぐ　香りを　かがせて\n味方全員の　状態異常を　回復する。"
    en: "The user releases a soothing scent that heals all\nstatus conditions affecting the user’s party."
    fr: "Le lanceur libère un parfum apaisant qui guérit\ntoutes les altérations de statut de l’équipe."
    it: "Chi la usa rilascia un dolce profumo che cura\ntutti i problemi di stato propri e degli alleati."
    de: "Heilt alle Statusprobleme des Teams mit\nberuhigendem Duft."
    es: "Cura todos los problemas de estado del equipo con un\nsuave aroma."
    ko: "기분 좋은 평온한 향기를 맡게 하여\n같은 편 모두의 상태 이상을 회복한다."
    zh_simp: "让同伴闻沁人心脾的香气，\n从而治愈我方全员的异常状态。"
    zh_trad: "釋放出宜人的香氣，\n治癒我方全體的異常狀態。"
aromatic_mist:
  names:
    jp_kanji: アロマミスト
    en: Aromatic Mist
    fr: Brume Capiteuse
    it: Nebularoma
    de: Duftwolke
    es: Niebla Aromática
    ko: 아로마미스트
    zh_simp: 芳香薄雾
    zh_trad: 芳香薄霧
  descriptions:
    jp_kanji: "不思議な　アロマの　香りによって\n味方の　特防を　あげる。"
    en: "The user raises the Sp. Def stat of an ally Pokémon\nby using a mysterious aroma."
    fr: "Grâce à un parfum mystérieux, augmente la Défense\nSpéciale d’un allié."
    it: "Aumenta la Difesa Speciale di un alleato\ntramite un misterioso aroma."
    de: "Der Anwender erhöht mithilfe eines mysteriösen\nDuftes die Spezial-Verteidigung eines Mitstreiters."
    es: "Consigue aumentar la Defensa Especial de un Pokémon\nde su equipo con una fragancia misteriosa."
    ko: "신비한 아로마 향으로\n같은 편의 특수방어를 올린다."
    zh_simp: "通过神奇的芳香，\n提高我方宝可梦的特防。"
    zh_trad: "利用神奇的芳香，\n提高我方寶可夢的特防。"
assist:
  names:
    jp_kanji: ねこのて
    en: Assist
    fr: Assistance
    it: Assistente
    de: Zuschuss
    es: Ayuda
    ko: 조수
    zh_simp: 借助
    zh_trad: 借助
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
assurance:
  names:
    jp_kanji: ダメおし
    en: Assurance
    fr: Assurance
    it: Garanzia
    de: Gewissheit
    es: Buena Baza
    ko: 승부굳히기
    zh_simp: 恶意追击
    zh_trad: 惡意追擊
  descriptions:
    jp_kanji: "そのターンに　相手が\nすでに　ダメージを　受けていたら\n技の　威力は　２倍に　なる。"
    en: "If the target has already taken some damage in the\nsame turn, this attack’s power is doubled."
    fr: "Cette attaque est deux fois plus efficace si l’ennemi\na déjà été blessé durant ce tour."
    it: "Se il bersaglio ha già subito dei danni nello stesso\nturno, la potenza di questa mossa raddoppia."
    de: "Hat das Ziel während der Runde schon Schaden\ngenommen, wird die Stärke der Attacke verdoppelt."
    es: "Si el objetivo ya ha sufrido daño en ese turno, la fuerza\ndel ataque se duplica."
    ko: "그 턴에 상대가\n이미 데미지를 입었다면\n기술의 위력은 2배가 된다."
    zh_simp: "如果此回合内对手\n已经受到伤害的话，\n招式威力会变成２倍。"
    zh_trad: "如果此回合內對手\n已受到傷害，\n招式威力會變成２倍。"
astonish:
  names:
    jp_kanji: おどろかす
    en: Astonish
    fr: Étonnement
    it: Sgomento
    de: Erstauner
    es: Impresionar
    ko: 놀래키기
    zh_simp: 惊吓
    zh_trad: 驚嚇
  descriptions:
    jp_kanji: "大きな声などで\n不意に驚かして攻撃する。"
    en: "The user attacks the target while crying out in a\nstartling fashion."
    fr: "Le lanceur attaque l’ennemi en poussant\nun cri terrifiant."
    it: "Chi la usa attacca il bersaglio emettendo un verso\nterrificante."
    de: Anwender greift mit einem Schrei an.
    es: Lanza un grito tan tremendo que impresiona.
    ko: "큰 소리 등으로\n불시에 놀라게 하여 공격한다."
    zh_simp: "用尖叫声等\n突然惊吓对手进行攻击。"
    zh_trad: "用巨大的聲響等\n突然驚嚇對手進行攻擊。"
astral_barrage:
  names:
    jp_kanji: アストラルビット
    en: Astral Barrage
    fr: Éclat Spectral
    it: Schegge Astrali
    de: Astralfragmente
    es: Orbes Espectro
    ko: 아스트랄비트
    zh_simp: 星碎
    zh_trad: 星碎
  descriptions:
    jp_kanji: "たくさんの　小さな　霊体を\n相手に　ぶつけて　攻撃する。"
    en: "The user attacks by sending a frightful amount of small\nghosts at opposing Pokémon."
    fr: "Le lanceur attaque l’ennemi avec une multitude\nde petits spectres."
    it: "Il Pokémon attacca i nemici scatenandogli contro\nuna miriade di piccoli spettri."
    de: "Der Anwender greift gegnerische Pokémon mit vielen\nkleinen Spukgestalten an."
    es: "El usuario ataca al objetivo lanzándole una ingente\ncantidad de pequeños fantasmas."
    ko: "수많은 작은 영체를\n상대에게 부딪쳐서 공격한다."
    zh_simp: "用大量的小灵体向\n对手发起攻击。"
    zh_trad: "向對手釋出大量的\n小靈體進行攻擊。"
attack_order:
  names:
    jp_kanji: こうげきしれい
    en: Attack Order
    fr: Appel Attaque
    it: Comandourto
    de: Schlagbefehl
    es: Al Ataque
    ko: 공격지령
    zh_simp: 攻击指令
    zh_trad: 攻擊指令
  descriptions:
    jp_kanji: "しもべを　呼びだして\n相手に　むかって　攻撃させる。\n急所に　当たりやすい。"
    en: "The user calls out its underlings to pummel the\ntarget. Critical hits land more easily."
    fr: "Le lanceur appelle ses sous-fifres pour frapper l’ennemi.\nTaux de critiques élevé."
    it: "Chi la usa raduna i suoi sgherri per colpire\nil bersaglio. Probabile brutto colpo."
    de: "Anwender ruft seine Untergebenen zum Angriff.\nHat eine hohe Volltrefferquote."
    es: "El usuario llama a sus súbditos para que ataquen al\nobjetivo. Suele ser crítico."
    ko: "부하를 불러내어\n상대를 향해서 공격시킨다.\n급소에 맞기 쉽다."
    zh_simp: "召唤手下，\n让其朝对手发起攻击。\n容易击中要害。"
    zh_trad: "呼喚手下，\n向對手發動攻擊。\n容易擊中要害。"
attract:
  names:
    jp_kanji: メロメロ
    en: Attract
    fr: Attraction
    it: Attrazione
    de: Anziehung
    es: Atracción
    ko: 헤롱헤롱
    zh_simp: 迷人
    zh_trad: 迷人
  descriptions:
    jp_kanji: "♂なら♀を　♀なら♂を　誘惑して\nメロメロに　する。\n相手は　技が　だしにくくなる。"
    en: "If it is the opposite gender of the user, the target\nbecomes infatuated and less likely to attack."
    fr: "Si l’ennemi est du sexe opposé, il tombe amoureux\net rechigne alors à attaquer."
    it: "Se il bersaglio è del sesso opposto, s’infatua\ne diventa riluttante ad attaccare."
    de: "Wenn das Ziel nicht dem Geschlecht des Anwenders\nangehört, fühlt es sich zu ihm hingezogen und greift\neventuell nicht an."
    es: "Si el objetivo es del sexo opuesto, se enamorará y\nbajará la posibilidad de que ataque."
    ko: "수컷은 암컷을 암컷은 수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을 쓰기 어려워진다."
    zh_simp: "♂诱惑♀或♀诱惑♂，\n让对手着迷。\n对手将很难使出招式。"
    zh_trad: "♂誘惑♀而♀誘惑♂，\n讓對手著迷。\n對手將難以使用招式。"
aura_sphere:
  names:
    jp_kanji: はどうだん
    en: Aura Sphere
    fr: Aurasphère
    it: Forzasfera
    de: Aurasphäre
    es: Esfera Aural
    ko: 파동탄
    zh_simp: 波导弹
    zh_trad: 波導彈
  descriptions:
    jp_kanji: "体の奥から波導の力を\n相手にうち放つ。\n攻撃は必ず命中する。"
    en: "The user lets loose a blast of aura power from deep\nwithin its body at the target. This attack never misses."
    fr: "Le lanceur dégage une aura et projette de l’énergie.\nN’échoue jamais."
    it: "Chi la usa rilascia una forza eterea dal profondo\ndel corpo. Questo attacco è infallibile."
    de: "Tief aus dem Inneren des Anwenders löst sich ein\nkraftvoller Stoß Aura-Energie. Diese Attacke trifft\ngarantiert."
    es: "Libera, desde su interior, una inmensa descarga de\naura. Es infalible."
    ko: "몸속에서 파동의 힘을\n끌어내 상대에게 쏜다.\n공격은 반드시 명중한다."
    zh_simp: "从体内产生出波导之力，\n然后向对手发出。\n攻击必定会命中。"
    zh_trad: "將來自體內深處的波導之力\n擊向對手。\n攻擊必定會命中。"
aura_wheel:
  names:
    jp_kanji: オーラぐるま
    en: Aura Wheel
    fr: Roue Libre
    it: Ruota d’Aura
    de: Aura-Rad
    es: Rueda Aural
    ko: 오라휠
    zh_simp: 气场轮
    zh_trad: 氣場輪
  descriptions:
    jp_kanji: "ほほぶくろに　溜めた　エネルギーで\n攻撃し　自分の　素早さを　あげる。\nモルペコの　姿で　タイプが　変わる。"
    en: "Morpeko attacks and raises its Speed with the energy\nstored in its cheeks. This move’s type changes\ndepending on the user’s form."
    fr: "Morpeko libère l’énergie stockée dans ses joues\npour attaquer et augmenter sa Vitesse. Le type de cette\ncapacité change en fonction de la forme de Morpeko."
    it: "Chi la usa emette l’energia accumulata nelle guance per\nattaccare e aumentare la propria Velocità. Il tipo della\nmossa cambia in base alla forma assunta da Morpeko."
    de: "Mithilfe der in den Backentaschen gespeicherten Energie\ngreift der Anwender an und erhöht seine Initiative.\nDer Typ der Attacke hängt von Morpekos Form ab."
    es: "La energía que acumula en las mejillas le sirve para\natacar y aumentar su Velocidad. Este movimiento\ncambia de tipo según la forma que adopte Morpeko."
    ko: "볼주머니에 저장해 둔 에너지로\n공격하고 자신의 스피드를 올린다.\n모르페코의 모습에 따라 타입이 바뀐다."
    zh_simp: "用储存在颊囊里的能量\n进行攻击，并提高自己的速度。\n其属性会随着莫鲁贝可的样子而改变。"
    zh_trad: "用儲存在頰囊中的能量進行攻擊，\n並提高自己的速度。招式屬性\n會隨著莫魯貝可的樣子而改變。"
aurora_beam:
  names:
    jp_kanji: オーロラビーム
    en: Aurora Beam
    fr: Onde Boréale
    it: Raggiaurora
    de: Aurorastrahl
    es: Rayo Aurora
    ko: 오로라빔
    zh_simp: 极光束
    zh_trad: 極光束
  descriptions:
    jp_kanji: "にじいろの　ビームを\n相手に　発射して　攻撃する。\n攻撃を　さげる　ことが　ある。"
    en: "The target is hit with a rainbow-colored beam.\nThis may also lower the target’s Attack stat."
    fr: "Envoie un rayon arc-en-ciel sur l’ennemi.\nPeut aussi baisser son Attaque."
    it: "Colpisce il bersaglio con un raggio dai colori\ndell’iride. Può anche ridurne l’Attacco."
    de: "Regenbogenfarbener Strahl, der eventuell den\nAngriffs-Wert des Zieles senkt."
    es: Rayo multicolor que puede reducir el Ataque.
    ko: "무지개색의 빔을\n상대에게 발사하여 공격한다.\n공격을 떨어뜨릴 때가 있다."
    zh_simp: "向对手发射\n虹色光束进行攻击。\n有时会降低对手的攻击。"
    zh_trad: "向對手發射\n七彩光束進行攻擊。\n有時會降低對手的攻擊。"
aurora_veil:
  names:
    jp_kanji: オーロラベール
    en: Aurora Veil
    fr: Voile Aurore
    it: Velaurora
    de: Auroraschleier
    es: Velo Aurora
    ko: 오로라베일
    zh_simp: 极光幕
    zh_trad: 極光幕
  descriptions:
    jp_kanji: "５ターンの　間　物理と\n特殊の　ダメージを　弱める。\nあられの　時しか　出すことが　できない。"
    en: "This move reduces damage from physical and\nspecial moves for five turns. This can be used only\nin a hailstorm."
    fr: "Réduit les dégâts causés par les capacités physiques\net spéciales durant cinq tours.\nNe peut être utilisée que lorsqu’il grêle."
    it: "Riduce i danni subiti dalle mosse fisiche e dalle\nmosse speciali per cinque turni.\nSi può usare solo quando grandina."
    de: "Diese Attacke schwächt fünf Runden lang den durch\nphysische sowie durch Spezial-Attacken erhaltenen\nSchaden. Kann nur bei Hagel eingesetzt werden."
    es: "Reduce el daño de los ataques físicos y especiales que\nejecuta el rival durante cinco turnos. Solo puede usarse\ncuando está granizando."
    ko: "5턴 동안 물리와 특수 기술의\n데미지를 약하게 한다.\n싸라기눈일 때만 쓸 수 있다."
    zh_simp: "在５回合内减弱\n物理和特殊的伤害。\n只有冰雹时才能使出。"
    zh_trad: "在５回合內減弱\n物理和特殊的傷害。\n在下冰雹時才有效果。"
autotomize:
  names:
    jp_kanji: ボディパージ
    en: Autotomize
    fr: Allègement
    it: Sganciapesi
    de: Autotomie
    es: Aligerar
    ko: 바디퍼지
    zh_simp: 身体轻量化
    zh_trad: 身體輕量化
  descriptions:
    jp_kanji: "体のムダな部分を削る。\n自分の素早さを　ぐーんとあげて\n体重も軽くなる。"
    en: "The user sheds part of its body to make itself lighter\nand sharply raise its Speed stat."
    fr: "Le lanceur se débarrasse des parties inutiles\nde son corps. Son poids diminue et sa Vitesse\naugmente beaucoup."
    it: "Chi la usa si libera di tutti i pesi in eccesso,\nalleggerendosi e aumentando di molto la propria\nVelocità."
    de: "Anwender trennt sich von überflüssigen Körperteilen\nund erhöht seine Initiative stark. Sein Gewicht nimmt\ndeutlich ab."
    es: "El usuario se desprende de partes prescindibles de\nsu cuerpo para hacerse más ligero y aumentar mucho\nsu Velocidad."
    ko: "몸의 쓸모없는 부분을 깎는다.\n자신의 스피드를 크게 올리고\n체중도 가벼워진다."
    zh_simp: "削掉身体上没用的部分。\n大幅提高自己的速度，\n同时体重也会变轻。"
    zh_trad: "削去身體上多餘的部分。\n以大幅提高自己的速度，\n同時體重也會變輕。"
avalanche:
  names:
    jp_kanji: ゆきなだれ
    en: Avalanche
    fr: Avalanche
    it: Slavina
    de: Lawine
    es: Alud
    ko: 눈사태
    zh_simp: 雪崩
    zh_trad: 雪崩
  descriptions:
    jp_kanji: "相手から　技を　受けていると\nその　相手に　対して\n技の　威力が　２倍に　なる。"
    en: "The power of this attack move is doubled if the user\nhas been hurt by the target in the same turn."
    fr: "Une capacité dont la puissance est doublée si le lanceur\na été blessé par l’ennemi durant le tour."
    it: "Mossa d’attacco che infligge doppi danni se chi la usa\nè stato ferito dal Pokémon bersaglio nello stesso turno."
    de: "Wurde der Anwender in dieser Runde vom Ziel\ngetroffen, verdoppelt sich die Stärke der Attacke\nbei Angriffen auf dieses Ziel."
    es: "Este ataque inflige el doble de daño a un objetivo que\nhaya golpeado al usuario en ese mismo turno."
    ko: "상대에게 기술로 공격받으면\n그 상대에 대해서\n기술의 위력이 2배가 된다."
    zh_simp: "如果受到对手的招式攻击，\n就能给予该对手\n２倍威力的攻击。"
    zh_trad: "如果受到對手的招式攻擊，\n給予該對手的招式威力就會變成２倍。"
baby_doll_eyes:
  names:
    jp_kanji: つぶらなひとみ
    en: Baby-Doll Eyes
    fr: Regard Touchant
    it: Occhioni Teneri
    de: Kulleraugen
    es: Ojitos Tiernos
    ko: 초롱초롱눈동자
    zh_simp: 圆瞳
    zh_trad: 圓瞳
  descriptions:
    jp_kanji: "つぶらなひとみでみつめて\n相手の攻めの力をさげる。"
    en: "The user stares at the target with its baby-doll eyes.\nThis lowers the target’s offensive stats."
    fr: "Le lanceur fixe l’ennemi d’un air très attendrissant qui\ntouche celui-ci et baisse sa puissance offensive."
    it: "Chi la usa rivolge i propri occhioni languidi al bersaglio,\nriducendone la forza offensiva."
    de: "Der Anwender erobert das Herz des Zieles, indem er es\nmit Kulleraugen ansieht, und senkt dabei dessen\nOffensivkraft."
    es: "Lanza una mirada al objetivo con ojos acaramelados,\nlo que baja su ofensiva."
    ko: "초롱초롱한 눈동자로 상대를\n바라보아 공격력을 떨어뜨린다."
    zh_simp: "用圆瞳凝视对手，\n从而降低其进攻力。"
    zh_trad: "用圓圓的眼睛凝視，\n降低對手的進攻力。"
baddy_bad:
  names:
    jp_kanji: わるわるゾーン
    en: Baddy Bad
    fr: Évo-Ténébro
    it: Zona Buiabuia
    de: Quälzone
    es: Umbreozona
    ko: 아그아그존
    zh_simp: 坏坏领域
    zh_trad: 壞壞領域
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
baneful_bunker:
  names:
    jp_kanji: トーチカ
    en: Baneful Bunker
    fr: Blockhaus
    it: Fortino
    de: Bunker
    es: Búnker
    ko: 토치카
    zh_simp: 碉堡
    zh_trad: 碉堡
  descriptions:
    jp_kanji: "相手の　攻撃を　防ぐと\n同時に　触れた　相手に\n毒を　与えてしまう。"
    en: "In addition to protecting the user from attacks, this\nmove also poisons any attacker that makes\ndirect contact."
    fr: "Protège le lanceur contre les attaques de l’ennemi\net empoisonne ce dernier s’il utilise une attaque directe\nsur le lanceur."
    it: "Protegge dagli attacchi e avvelena i Pokémon\nche lanciano un attacco diretto su chi la usa."
    de: "Der Anwender wird vor Angriffen geschützt.\nGleichzeitig werden alle Pokémon, die mit ihm\nin Berührung kommen, vergiftet."
    es: "Protege de los ataques y, al mismo tiempo, envenena\nal Pokémon que use un movimiento de contacto contra\nel usuario."
    ko: "상대의 공격을 막음과\n동시에 접촉한 상대에게\n독을 퍼뜨린다."
    zh_simp: "防住对手攻击的同时，\n让接触到自己的对手中毒。"
    zh_trad: "防住對手攻擊的同時，\n讓碰觸到自己的對手中毒。"
barb_barrage:
  names:
    jp_kanji: どくばりセンボン
    en: Barb Barrage
    fr: Multitoxik
    it: Mille Fielespine
    de: Giftstachelregen
    es: Mil Púas Tóxicas
    ko: 독침천발
    zh_simp: 毒千针
    zh_trad: 毒千針
  descriptions:
    jp_kanji: "無数の毒針で相手を毒状態にすることもある。\n相手が状態異常の場合\n威力は２倍になる。"
    en: "The user launches countless toxic barbs to inflict damage.\nThis may also poison the target. This move’s power is\ndoubled if the target has a status condition."
    fr: "Une multitude de pointes toxiques frappent l’ennemi\net peuvent l’empoisonner. La puissance est doublée\nsi la cible souffre d’une altération de statut."
    it: "Il bersaglio viene colpito da una miriade di spine\ntossiche che possono anche avvelenarlo. Se è affetto da\nproblemi di stato, la potenza della mossa raddoppia."
    de: "Der Anwender greift mit unzähligen Giftstacheln an und\nvergiftet eventuell das Ziel. Doppelt so stark gegen\nZiele mit einem Statusproblem."
    es: "Dispara un sinfín de púas tóxicas que pueden \nenvenenar al objetivo. El daño será doble si este\nya sufre un problema de estado."
    ko: "무수히 많은 독침으로 공격한다.\n상대를 독 상태로 만들 때가 있다.\n상대가 상태 이상인 경우 위력이 2배가 된다."
    zh_simp: "用无数的毒针进行攻击。\n有时还会让对手陷入中毒状态。\n攻击处于异常状态的对手时，威力会变成２倍。"
    zh_trad: "用無數的毒針進行攻擊。\n有時還會讓對手陷入中毒狀態。\n攻擊處於異常狀態的對手時，威力會變成２倍。"
barrage:
  names:
    jp_kanji: たまなげ
    en: Barrage
    fr: Pilonnage
    it: Attacco Pioggia
    de: Stakkato
    es: Bombardeo
    ko: 구슬던지기
    zh_simp: 投球
    zh_trad: 投球
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
barrier:
  names:
    jp_kanji: バリアー
    en: Barrier
    fr: Bouclier
    it: Barriera
    de: Barriere
    es: Barrera
    ko: 배리어
    zh_simp: 屏障
    zh_trad: 屏障
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
