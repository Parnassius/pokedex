    zh_simp: 绝对捕食回旋斩
    zh_trad: 絕對捕食迴旋斬
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
scald:
  names:
    jp_kanji: ねっとう
    en: Scald
    fr: Ébullition
    it: Idrovampata
    de: Siedewasser
    es: Escaldar
    ko: 열탕
    zh_simp: 热水
    zh_trad: 熱水
  descriptions:
    jp_kanji: "熱く　煮えたぎる　水を\n相手に　発射して　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user shoots boiling hot water at its target.\nThis may also leave the target with a burn."
    fr: "L’ennemi est attaqué par un jet d’eau bouillante.\nPeut aussi le brûler."
    it: "Chi la usa attacca il bersaglio con un getto\nd’acqua bollente che può anche scottarlo."
    de: "Heizt dem Ziel mit einem Schwall siedend heißen\nKochwassers ein. Das Ziel erleidet dabei eventuell\nVerbrennungen."
    es: "Ataca arrojando agua hirviendo al objetivo. Puede\ncausar quemaduras."
    ko: "뜨겁게 끓어오르는 물을\n상대에게 발사해서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "向对手喷射\n煮得翻滚的开水进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手噴射\n滾燙的熱水進行攻擊。\n有時會讓對手陷入灼傷狀態。"
scale_shot:
  names:
    jp_kanji: スケイルショット
    en: Scale Shot
    fr: Rafale Écailles
    it: Squamacolpo
    de: Schuppenschuss
    es: Ráfaga Escamas
    ko: 스케일샷
    zh_simp: 鳞射
    zh_trad: 鱗射
  descriptions:
    jp_kanji: "ウロコを　撃ちだして　攻撃する。\n２ー５回の　間　連続で　だす。\n素早さが　あがるが　防御が　さがる。"
    en: "The user attacks by shooting scales two to five times\nin a row. This move boosts the user’s Speed stat but\nlowers its Defense stat."
    fr: "Le lanceur projette des écailles sur la cible de deux à\ncinq fois d’affilée. Augmente la Vitesse, mais diminue\nla Défense."
    it: "Il Pokémon attacca lanciando delle squame da due\na cinque volte di fila. Aumenta la Velocità di chi la usa,\nma ne riduce la Difesa."
    de: "Der Anwender greift das Ziel zwei- bis fünfmal\nhintereinander mit Schuppen-Geschossen an. Erhöht\ndie eigene Initiative, aber senkt die Verteidigung."
    es: "Lanza escamas al objetivo de dos a cinco veces\nseguidas. Aumenta la Velocidad del usuario, pero\nreduce su Defensa."
    ko: "비늘을 쏘아서 공격한다.\n2~5회 연속으로 쓴다.\n스피드가 올라가지만 방어가 떨어진다."
    zh_simp: "发射鳞片进行攻击。\n连续攻击２～５次。\n速度会提高但防御会降低。"
    zh_trad: "射出鱗片進行攻擊。\n可連續攻擊２～５次。\n速度會提高但防禦會降低。"
scary_face:
  names:
    jp_kanji: こわいかお
    en: Scary Face
    fr: Grimace
    it: Visotruce
    de: Grimasse
    es: Cara Susto
    ko: 겁나는얼굴
    zh_simp: 可怕面孔
    zh_trad: 鬼面
  descriptions:
    jp_kanji: "恐ろしい　顔で　にらみ　おびえさせて\n相手の　素早さを　がくっと　さげる。"
    en: "The user frightens the target with a scary face to\nharshly lower its Speed stat."
    fr: "Le lanceur fait une grimace qui effraie l’ennemi\net réduit beaucoup sa Vitesse."
    it: "Chi la usa spaventa il bersaglio con una faccia\nterribile e ne riduce di molto la Velocità."
    de: "Jagt dem Ziel mit einer Grimasse Angst ein.\nDessen Initiative-Wert sinkt stark."
    es: Asusta al objetivo para reducir mucho su Velocidad.
    ko: "무서운 얼굴로 노려보고 겁주어\n상대의 스피드를 크게 떨어뜨린다."
    zh_simp: "用恐怖的表情瞪着对手，\n使其害怕，\n从而大幅降低对手的速度。"
    zh_trad: "用恐怖的表情瞪著對手，\n讓對手害怕，\n大幅降低對手的速度。"
scorching_sands:
  names:
    jp_kanji: ねっさのだいち
    en: Scorching Sands
    fr: Sable Ardent
    it: Sabbiardente
    de: Brandsand
    es: Arenas Ardientes
    ko: 열사의대지
    zh_simp: 热沙大地
    zh_trad: 熱沙大地
  descriptions:
    jp_kanji: "熱く　焼けた　砂を\n相手に　ぶつけて　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user throws scorching sand at the target to attack.\nThis may also leave the target with a burn."
    fr: "Le lanceur projette du sable chauffé à blanc\nsur l’ennemi. Peut aussi brûler la cible."
    it: "Chi la usa attacca il bersaglio scagliandogli addosso\ndella sabbia incandescente. Può anche scottarlo."
    de: "Der Anwender greift das Ziel mit brennend heißem\nSand an und fügt ihm eventuell Verbrennungen zu."
    es: "Ataca al objetivo arrojándole arena a temperaturas muy\nelevadas. Puede causar quemaduras."
    ko: "뜨겁게 달궈진 모래를\n상대에게 부딪쳐서 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "将滚烫的沙子砸向对手进行攻击。\n有时会让对手陷入灼伤状态。"
    zh_trad: "向對手投灑熾熱的沙子進行攻擊。\n有時會讓對手陷入灼傷狀態。"
scratch:
  names:
    jp_kanji: ひっかく
    en: Scratch
    fr: Griffe
    it: Graffio
    de: Kratzer
    es: Arañazo
    ko: 할퀴기
    zh_simp: 抓
    zh_trad: 抓
  descriptions:
    jp_kanji: "硬く　とがった　鋭い　ツメで\n相手を　ひっかいて　攻撃する。"
    en: "Hard, pointed, sharp claws rake the target to\ninflict damage."
    fr: "Lacère l’ennemi avec des griffes acérées pour lui\ninfliger des dégâts."
    it: "Infligge danni al bersaglio con artigli acuminati,\nduri e affilati."
    de: Das Ziel wird mit scharfen Klauen zerkratzt.
    es: Araña con afiladas garras.
    ko: "단단하고 뾰족하며 날카로운 손톱으로\n상대를 할퀴어서 공격한다."
    zh_simp: "用坚硬且无比锋利的爪子\n抓对手进行攻击。"
    zh_trad: "用堅硬且無比鋒利的爪子\n抓對手進行攻擊。"
screech:
  names:
    jp_kanji: いやなおと
    en: Screech
    fr: Grincement
    it: Stridio
    de: Kreideschrei
    es: Chirrido
    ko: 싫은소리
    zh_simp: 刺耳声
    zh_trad: 刺耳聲
  descriptions:
    jp_kanji: "おもわず　耳を　ふさぎたくなる\nいやなおとを　だして\n相手の　防御を　がくっと　さげる。"
    en: "An earsplitting screech harshly lowers the target’s\nDefense stat."
    fr: "Le lanceur émet un son strident qui baisse\nbeaucoup la Défense de l’ennemi."
    it: "Stridio assordante che riduce di molto la Difesa\ndel bersaglio."
    de: "Stößt einen Schrei aus, um die Verteidigung des Zieles\nstark zu senken."
    es: "Alarido agudo que reduce mucho la Defensa del\nobjetivo."
    ko: "그만 귀를 막아 버리고 싶은\n싫은 소리를 내어\n상대의 방어를 크게 떨어뜨린다."
    zh_simp: "发出不由自主想要\n捂起耳朵的刺耳声，\n从而大幅降低对手的防御。"
    zh_trad: "發出令人不由自主想要\n摀起耳朵的刺耳聲，\n大幅降低對手的防禦。"
searing_shot:
  names:
    jp_kanji: かえんだん
    en: Searing Shot
    fr: Incendie
    it: Sparafuoco
    de: Flammenball
    es: Bomba Ígnea
    ko: 화염탄
    zh_simp: 火焰弹
    zh_trad: 火焰彈
  descriptions:
    jp_kanji: "真っ赤な　炎で　自分の\n周りに　いるものを　攻撃する。\nやけど状態に　することが　ある。"
    en: "The user torches everything around it in an inferno\nof scarlet flames. This may also leave those it hits\nwith a burn."
    fr: "Des boules de feu s’abattent sur tous les Pokémon\nautour du lanceur. Peut aussi les brûler."
    it: "Chi la usa lancia fiamme scarlatte su tutti i Pokémon\nnelle vicinanze, danneggiandoli. Può anche scottarli."
    de: "Anwender greift alle Pokémon im Umkreis mit tiefroten\nFlammen an. Ziele erleiden eventuell Verbrennungen."
    es: "Un infierno de llamas daña a los Pokémon adyacentes\nen combate. Puede quemar."
    ko: "새빨간 불꽃으로 자신의\n주위에 있는 포켓몬을 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "用熊熊烈火\n攻击自己周围所有的宝可梦。\n有时会让其他宝可梦陷入灼伤状态。"
    zh_trad: "用熊熊烈火\n攻擊自己周圍所有的寶可夢。\n有時會讓對手陷入灼傷狀態。"
searing_sunraze_smash:
  names:
    jp_kanji: サンシャインスマッシャー
    en: Searing Sunraze Smash
    fr: Hélio-Choc Dévastateur
    it: Supercollisione Solare
    de: Schmetternde Sonnenwalze
    es: Embestida Solar
    ko: 선샤인스매셔
    zh_simp: 日光回旋下苍穹
    zh_trad: 日光迴旋下蒼穹
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
secret_power:
  names:
    jp_kanji: ひみつのちから
    en: Secret Power
    fr: Force Cachée
    it: Forzasegreta
    de: Geheimpower
    es: Daño Secreto
    ko: 비밀의힘
    zh_simp: 秘密之力
    zh_trad: 秘密之力
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
secret_sword:
  names:
    jp_kanji: しんぴのつるぎ
    en: Secret Sword
    fr: Lame Ointe
    it: Spadamistica
    de: Mystoschwert
    es: Sable Místico
    ko: 신비의칼
    zh_simp: 神秘之剑
    zh_trad: 神秘之劍
  descriptions:
    jp_kanji: "長い　つので　切りつけ　攻撃する。\nつのが　まとった　不思議な　力は\n物理的な　ダメージを　与える。"
    en: "The user cuts with its long horn. The odd power\ncontained in the horn does physical damage to\nthe target."
    fr: "L’ennemi est lacéré par une longue corne.\nSon pouvoir mystérieux inflige des dégâts physiques."
    it: "Chi la usa attacca il bersaglio tagliandolo con una\nspada mistica. La misteriosa energia sprigionata\nprovoca danni fisici."
    de: "Schneideangriff mit dem langen Horn des Anwenders.\nDie mysteriöse Kraft aus dem Horn erzeugt physischen\nSchaden."
    es: "Ensarta al objetivo con un largo cuerno dotado de un\npoder místico que provoca daño físico."
    ko: "긴 뿔로 베어 공격한다.\n뿔이 머금은 이상한 힘은\n물리적인 데미지를 준다."
    zh_simp: "用长角切斩对手进行攻击。\n角上拥有的神奇力量\n将给予物理伤害。"
    zh_trad: "用長角斬切對手進行攻擊。\n角上擁有的神奇力量\n會給予對手物理傷害。"
seed_bomb:
  names:
    jp_kanji: タネばくだん
    en: Seed Bomb
    fr: Canon Graine
    it: Semebomba
    de: Samenbomben
    es: Bomba Germen
    ko: 씨폭탄
    zh_simp: 种子炸弹
    zh_trad: 種子炸彈
  descriptions:
    jp_kanji: "硬い　殻を　もつ　大きな　タネを\n上から　たたきつけて\n相手を　攻撃する。"
    en: "The user slams a barrage of hard-shelled seeds\ndown on the target from above."
    fr: "Le lanceur fait pleuvoir un déluge de graines explosives\nsur l’ennemi."
    it: "Chi la usa emette una raffica di semi dal guscio\nduro che colpiscono il bersaglio dall’alto."
    de: "Anwender lässt eine Menge Samen mit harter Schale\nvon oben auf das Ziel fallen."
    es: "Lanza al objetivo una descarga de semillas explosivas\ndesde arriba."
    ko: "단단한 껍질을 가지고 있는\n큰 씨앗을 위에서 힘껏 내던져\n상대를 공격한다."
    zh_simp: "将外壳坚硬的大种子，\n从上方砸下攻击对手。"
    zh_trad: "從上方砸下外殼堅硬的\n大種子，攻擊對手。"
seed_flare:
  names:
    jp_kanji: シードフレア
    en: Seed Flare
    fr: Fulmigraine
    it: Infuriaseme
    de: Schocksamen
    es: Fogonazo
    ko: 시드플레어
    zh_simp: 种子闪光
    zh_trad: 種子閃光
  descriptions:
    jp_kanji: "体の中から衝撃波を発生させる。\n相手の守りの力をさげることもある。"
    en: "The user emits a shock wave from its body to attack its\ntarget. This may also lower the target’s defensive stats."
    fr: "Le corps du lanceur émet une onde de choc.\nPeut aussi baisser la puissance défensive\nde la cible."
    it: "Chi la usa genera un’onda d’urto dal suo corpo.\nPuò anche ridurre la forza difensiva del bersaglio."
    de: "Anwender erzeugt eine Schockwelle. Defensivkraft des\nZieles wird eventuell gesenkt."
    es: "Ataca con una onda de choque que libera del cuerpo y\nque además puede bajar la defensiva del objetivo."
    ko: "몸속에서 충격파를 발생시킨다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "从身体里产生冲击波。\n有时会降低对手的防守力。"
    zh_trad: "從身體裡發出衝擊波攻擊對手。\n有時還會降低對手的防守力。"
seismic_toss:
  names:
    jp_kanji: ちきゅうなげ
    en: Seismic Toss
    fr: Frappe Atlas
    it: Movim. Sismico
    de: Geowurf
    es: Sísmico
    ko: 지구던지기
    zh_simp: 地球上投
    zh_trad: 地球上投
  descriptions:
    jp_kanji: "引力を　使い　投げとばす。\n自分の　レベルと　同じ　ダメージを\n相手に　与える。"
    en: "The target is thrown using the power of gravity.\nIt inflicts damage equal to the user’s level."
    fr: "L’ennemi est projeté grâce au pouvoir de la gravité.\nInflige des dégâts équivalents au niveau du lanceur."
    it: "Colpisce il bersaglio con la forza di gravità.\nInfligge un danno pari al livello di chi la usa."
    de: "Ziel wird mit der Kraft der Gravitation umgeworfen.\nRichtet Schaden gemäß dem Level des Anwenders an."
    es: "Aprovecha la gravedad para derribar al objetivo.\nLe resta tantos PS como nivel tenga el usuario."
    ko: "인력을 사용해 내던진다.\n자신의 레벨과 똑같은 데미지를\n상대에게 준다."
    zh_simp: "利用引力将对手甩飞出去。\n给予对手和自己等级相同的伤害。"
    zh_trad: "利用引力將對手甩飛出去。\n給予對手和自己等級相同的傷害。"
self_destruct:
  names:
    jp_kanji: じばく
    en: Self-Destruct
    fr: Destruction
    it: Autodistruzione
    de: Finale
    es: Autodestrucción
    ko: 자폭
    zh_simp: 玉石俱碎
    zh_trad: 自爆
  descriptions:
    jp_kanji: "爆発をおこして\n相手を攻撃する。\n自分もダメージを受ける。"
    en: "The user causes an explosion to inflict damage on\nthe target. This also damages the user."
    fr: "Le lanceur provoque une explosion qui blesse l’ennemi.\nBlesse également le lanceur."
    it: "Chi la usa esplode e infligge danni al bersaglio,\nma subisce danni a sua volta."
    de: "Der Anwender greift das Ziel an, indem er eine\nExplosion verursacht. Er selbst erleidet auch Schaden."
    es: El atacante explota y hiere al objetivo y a sí mismo.
    ko: "폭발을 일으켜서\n상대를 공격한다.\n자신도 데미지를 입는다."
    zh_simp: "引发爆炸攻击对手。\n自己也会受到伤害。"
    zh_trad: "引起爆炸攻擊對手。\n自己也會受到傷害。"
shadow_ball:
  names:
    jp_kanji: シャドーボール
    en: Shadow Ball
    fr: Ball’Ombre
    it: Palla Ombra
    de: Spukball
    es: Bola Sombra
    ko: 섀도볼
    zh_simp: 暗影球
    zh_trad: 暗影球
  descriptions:
    jp_kanji: "黒い影の塊を投げつけて攻撃する。\n相手の守りの力をさげることもある。"
    en: "The user hurls a shadowy blob at the target to deal\ndamage. This may also lower the target’s defensive stats."
    fr: "Projette une grande ombre sur l’ennemi.\nPeut aussi baisser la puissance défensive de la cible."
    it: "Lancia sul bersaglio una sfera nera che può ridurne\nla forza difensiva."
    de: "Bewirft das Ziel mit einem gruseligen Ball und senkt\neventuell dessen Defensivkraft."
    es: "Lanza una bola oscura que además puede bajar la\ndefensiva del objetivo."
    ko: "까만 그림자의 덩어리를 내던져서 공격한다.\n상대의 방어력을 떨어뜨릴 때가 있다."
    zh_simp: "投掷一团黑影进行攻击。\n有时会降低对手的防守力。"
    zh_trad: "投擲一團黑影進行攻擊。\n有時還會降低對手的防守力。"
shadow_bone:
  names:
    jp_kanji: シャドーボーン
    en: Shadow Bone
    fr: Os Ombre
    it: Ossotetro
    de: Schattenknochen
    es: Hueso Sombrío
    ko: 섀도본
    zh_simp: 暗影之骨
    zh_trad: 暗影之骨
  descriptions:
    jp_kanji: "魂の　宿った　ホネで\n相手を　なぐりつけて　攻撃する。\n相手の　防御を　さげる　ことがある。"
    en: "The user attacks by beating the target with a\nbone that contains a spirit. This may also lower\nthe target’s Defense stat."
    fr: "Le lanceur frappe avec un os possédé par l’âme\nd’un défunt. Peut aussi baisser la Défense de la cible."
    it: "Chi la usa colpisce il bersaglio con un osso\nin cui alberga uno spirito. Può anche ridurne\nla Difesa."
    de: "Der Anwender greift das Ziel mit einem Knochen an,\nin dem eine Seele haust. Senkt eventuell die\nVerteidigung des Zieles."
    es: "Ataca al oponente golpeándole con un hueso poseído\npor un espíritu. Puede reducir la Defensa del objetivo."
    ko: "영혼이 머물고 있는 뼈로\n상대를 세게 때려서 공격한다.\n상대의 방어를 떨어뜨릴 때가 있다."
    zh_simp: "用附有灵魂的骨头\n殴打对手进行攻击。\n有时会降低对手的防御。"
    zh_trad: "用寄宿了靈魂的骨頭\n毆打對手進行攻擊。\n有時會降低對手的防禦。"
shadow_claw:
  names:
    jp_kanji: シャドークロー
    en: Shadow Claw
    fr: Griffe Ombre
    it: Ombrartigli
    de: Dunkelklaue
    es: Garra Umbría
    ko: 섀도크루
    zh_simp: 暗影爪
    zh_trad: 暗影爪
  descriptions:
    jp_kanji: "影からつくった鋭いツメで\n相手を切り裂く。\n急所に当たりやすい。"
    en: "The user slashes with a sharp claw made from shadows.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Le lanceur attaque avec une griffe puissante faite\nd’ombres. Taux de critiques élevé."
    it: "Chi la usa attacca con artigli d’ombra che colpiscono\ncon gran forza. Probabile brutto colpo."
    de: "Greift das Ziel mit einer scharfen Klaue aus Schatten an.\nHohe Volltrefferquote."
    es: "Ataca con una garra afilada hecha de sombras. Suele\nser crítico."
    ko: "그림자로 만든 날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞기 쉽다."
    zh_simp: "以影子做成的锐爪，\n劈开对手。\n容易击中要害。"
    zh_trad: "用黑影化成的銳利爪子\n撕裂對手。\n容易擊中要害。"
shadow_force:
  names:
    jp_kanji: シャドーダイブ
    en: Shadow Force
    fr: Revenant
    it: Oscurotuffo
    de: Schemenkraft
    es: Golpe Umbrío
    ko: 섀도다이브
    zh_simp: 暗影潜袭
    zh_trad: 暗影潛襲
  descriptions:
    jp_kanji: "闇に姿を隠しつつ攻撃する。\n相手の技を回避しやすくなる。"
    en: "The user cloaks itself in darkness as it attacks.\nIncoming moves also become more likely to miss."
    fr: "Le lanceur se cache dans l’ombre pour frapper.\nLes capacités de la cible deviennent plus faciles\nà esquiver."
    it: "Chi la usa sparisce nell’oscurità e attacca. Inoltre, fa sì\nche le mosse nemiche falliscano più facilmente."
    de: "Angriff aus der Dunkelheit, der bewirkt, dass gegnerische\nAttacken den Anwender häufiger verfehlen."
    es: "El usuario desaparece en la oscuridad y ataca. Además,\nhace que evite con mayor facilidad los movimientos\nenemigos."
    ko: "어둠 속에 모습을 감추고 공격한다.\n상대의 기술을 회피하기 쉬워진다."
    zh_simp: "隐身于黑暗中进行攻击。\n会变得较容易闪避对手的招式。"
    zh_trad: "隱身於黑暗中進行攻擊。\n會變得較容易閃避對手的招式。"
shadow_punch:
  names:
    jp_kanji: シャドーパンチ
    en: Shadow Punch
    fr: Poing Ombre
    it: Pugnodombra
    de: Finsterfaust
    es: Puño Sombra
    ko: 섀도펀치
    zh_simp: 暗影拳
    zh_trad: 暗影拳
  descriptions:
    jp_kanji: "影に　まぎれて　パンチを　くりだす。\n攻撃は　必ず　命中する。"
    en: "The user throws a punch from the shadows. This\nattack never misses."
    fr: "Le lanceur surgit des ombres et donne un coup de poing.\nN’échoue jamais."
    it: "Il bersaglio riceve un pugno proveniente\ndalle tenebre. Questa mossa è infallibile."
    de: "Angriff mit der Faust aus dem Schattenreich.\nAusweichen unmöglich."
    es: Puñetazo ineludible procedente de las sombras.
    ko: "그림자에 섞여 펀치를 날린다.\n공격은 반드시 명중한다."
    zh_simp: "使出混影之拳。\n攻击必定会命中。"
    zh_trad: "暗藏在陰影之中出拳。\n攻擊必定會命中。"
shadow_sneak:
  names:
    jp_kanji: かげうち
    en: Shadow Sneak
    fr: Ombre Portée
    it: Furtivombra
    de: Schattenstoß
    es: Sombra Vil
    ko: 야습
    zh_simp: 影子偷袭
    zh_trad: 影子偷襲
  descriptions:
    jp_kanji: "影をのばして\n相手の背後から攻撃する。\n自分の行動順がはやくなる。"
    en: "The user extends its shadow and attacks the target\nfrom behind. This also raises the user’s action speed."
    fr: "Le lanceur étend son ombre pour frapper par-derrière.\nAvance sa position dans l’ordre d’action."
    it: "Chi la usa estende la sua ombra e attacca il nemico\nalle spalle, accelerando inoltre il proprio ordine\ndelle azioni."
    de: "Der Anwender erweitert seinen Schatten und greift das\nZiel von hinten an. Danach kommt er schneller wieder\nzum Zug."
    es: "Extiende su sombra y ataca al objetivo por la espalda.\nHace que los turnos del usuario tarden menos en llegar."
    ko: "그림자를 늘인 다음\n상대의 배후에서 공격한다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "伸长影子，\n从对手的背后进行攻击。\n能够让自己的行动顺序提前。"
    zh_trad: "伸長自己的影子，\n從對手的背後進行攻擊。\n能夠讓自己的行動順序提前。"
sharpen:
  names:
    jp_kanji: かくばる
    en: Sharpen
    fr: Affûtage
    it: Affilatore
    de: Schärfer
    es: Afilar
    ko: 각지기
    zh_simp: 棱角化
    zh_trad: 稜角化
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
shattered_psyche:physical:
  names:
    jp_kanji: マキシマムサイブレイカー
    en: Shattered Psyche
    fr: Psycho-Pulvérisation EX
    it: Impatto Psicocinetico
    de: Psycho-Schmetterschlag
    es: Disruptor Psíquico
    ko: 맥시멈사이브레이커
    zh_simp: 至高精神破坏波
    zh_trad: 至高精神破壞波
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
shattered_psyche:special:
  names:
    jp_kanji: マキシマムサイブレイカー
    en: Shattered Psyche
    fr: Psycho-Pulvérisation EX
    it: Impatto Psicocinetico
    de: Psycho-Schmetterschlag
    es: Disruptor Psíquico
    ko: 맥시멈사이브레이커
    zh_simp: 至高精神破坏波
    zh_trad: 至高精神破壞波
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
sheer_cold:
  names:
    jp_kanji: ぜったいれいど
    en: Sheer Cold
    fr: Glaciation
    it: Purogelo
    de: Eiseskälte
    es: Frío Polar
    ko: 절대영도
    zh_simp: 绝对零度
    zh_trad: 絕對零度
  descriptions:
    jp_kanji: "相手を　一撃で　瀕死に　する。\nこおりタイプ　以外の　ポケモンが\n使うと　当たりにくい。"
    en: "The target faints instantly. It’s less likely to hit the\ntarget if it’s used by Pokémon other than Ice types."
    fr: "Une vague de froid glacial frappe l’ennemi pour\nle mettre K.O. en un coup. A peu de chances de réussir\nsi le lanceur ne possède pas le type Glace."
    it: "Il bersaglio esaurisce i PS in un colpo solo.\nSe viene usata da Pokémon che non sono di tipo\nGhiaccio, difficilmente va a segno."
    de: "Diese Attacke führt beim Ziel sofort zum K.O. Wird sie\nvon einem Pokémon eingesetzt, das nicht dem Typ Eis\nangehört, trifft sie seltener."
    es: "Debilita al objetivo de un solo golpe. Si lo usa un\nPokémon que no sea de tipo Hielo, es difícil que\nacierte."
    ko: "상대를 일격에 기절시킨다.\n얼음타입 이외의 포켓몬이\n사용하면 잘 맞지 않는다."
    zh_simp: "给对手一击昏厥。\n如果是冰属性以外的宝可梦使用，\n就会难以打中。"
    zh_trad: "一擊讓對手陷入瀕死。\n冰屬性以外的寶可夢使用時，\n會比較不易命中對手。"
shell_side_arm:
  names:
    jp_kanji: シェルアームズ
    en: Shell Side Arm
    fr: Kokiyarme
    it: Armaguscio
    de: Muschelwaffe
    es: Moluscañón
    ko: 셸암즈
    zh_simp: 臂贝武器
    zh_trad: 臂貝武器
  descriptions:
    jp_kanji: "物理か　特殊か　より多く　ダメージを\n与えられる　能力で　攻撃する。\n毒状態に　することが　ある。"
    en: "This move inflicts physical or special damage,\nwhichever will be more effective. This may also poison\nthe target."
    fr: "Une attaque physique ou spéciale, en fonction\nde ce qui est le plus efficace contre la cible.\nPeut aussi empoisonner."
    it: "Il Pokémon esegue un attacco fisico o speciale, in base\na quale causa danni maggiori. Può anche avvelenare\nil bersaglio."
    de: "Je nachdem, was höher ausfällt, richtet diese Attacke\nentweder physischen oder Spezial-Schaden an.\nDas Ziel wird eventuell vergiftet."
    es: "El usuario lanza un ataque físico o especial en función\nde cuál inflija más daño. Puede envenenar al objetivo."
    ko: "물리와 특수 중 더 많은 데미지를\n줄 수 있는 능력으로 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "从物理攻击和特殊攻击中选择\n可造成较多伤害的方式进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "用物理攻擊和特殊攻擊中\n能夠給予更大傷害的能力進行攻擊。\n有時會讓對手陷入中毒狀態。"
shell_smash:
  names:
    jp_kanji: からをやぶる
    en: Shell Smash
    fr: Exuviation
    it: Gettaguscio
    de: Hausbruch
    es: Rompecoraza
    ko: 껍질깨기
    zh_simp: 破壳
    zh_trad: 破殼
  descriptions:
    jp_kanji: "殻を　やぶって　自分の　防御\n特防を　さげるが　攻撃　特攻\n素早さを　ぐーんと　あげる。"
    en: "The user breaks its shell, which lowers Defense and\nSp. Def stats but sharply raises its Attack, Sp. Atk,\nand Speed stats."
    fr: "Le lanceur brise sa coquille. Il baisse sa Défense\net sa Défense Spéciale, mais augmente beaucoup\nson Attaque, son Attaque Spéciale et sa Vitesse."
    it: "Chi la usa si disfa del guscio. Difesa e Difesa\nSpeciale calano, ma aumentano di molto Attacco,\nAttacco Speciale e Velocità."
    de: "Anwender zerbricht seine Schale und senkt seine\nVerteidigung und Spezial-Verteidigung, aber dafür\nsteigen Angriff, Spezial-Angriff und Initiative stark."
    es: "El usuario rompe su coraza y baja su Defensa y\nDefensa Especial, pero aumenta mucho su Ataque,\nAtaque Especial y Velocidad."
    ko: "껍질을 깨서 자신의 방어와\n특수방어를 떨어뜨리지만 공격과\n특수공격, 스피드를 크게 올린다."
    zh_simp: "打破外壳，\n降低自己的防御和特防，\n但大幅提高攻击、特攻和速度。"
    zh_trad: "破殼而出。\n自己的防禦和特防會降低，\n但能大幅提高攻擊、特攻和速度。"
shell_trap:
  names:
    jp_kanji: トラップシェル
    en: Shell Trap
    fr: Carapiège
    it: Gusciotrappola
    de: Panzerfalle
    es: Coraza Trampa
    ko: 트랩셸
    zh_simp: 陷阱甲壳
    zh_trad: 陷阱甲殼
  descriptions:
    jp_kanji: "こうらの　トラップを　しかける。\n相手が　物理技を　出すと\n爆発して　ダメージを　与える。"
    en: "The user sets a shell trap. If the user is hit by a\nphysical move, the trap will explode and inflict\ndamage on opposing Pokémon."
    fr: "Pose une carapace piégée. Si l’adversaire utilise\nune capacité physique, la carapace explose et lui inflige\ndes dégâts."
    it: "Il guscio del Pokémon diventa una trappola.\nSe un nemico lo colpisce con una mossa fisica,\ninnesca un’esplosione e subisce dei danni."
    de: "Der Anwender legt eine Panzerfalle. Wird er von einer\nphysischen Attacke getroffen, explodiert die Falle und\nfügt gegnerischen Pokémon Schaden zu."
    es: "El caparazón del Pokémon se convierte en una trampa.\nSi le alcanza un ataque físico, la trampa estalla y los\noponentes sufren daño."
    ko: "껍질의 트랩을 설치한다.\n상대가 물리 기술을 쓰면\n폭발해서 데미지를 준다."
    zh_simp: "设下甲壳陷阱。\n如果对手使出物理招式，\n陷阱就会爆炸并给予对手伤害。"
    zh_trad: "設下甲殼陷阱。\n若對手使出物理招式，\n就會爆炸並給予傷害。"
shelter:
  names:
    jp_kanji: たてこもる
    en: Shelter
    fr: Mur Fumigène
    it: Barricata
    de: Refugium
    es: Retracción
    ko: 농성
    zh_simp: 闭关
    zh_trad: 閉關
  descriptions:
    jp_kanji: "皮膚を鉄の盾のように硬くすることで\n自分の守りの力をあげる。\n相手の技を回避しやすくなる。"
    en: "The user makes its skin as hard as an iron shield, raising\nits defensive stats.\nIncoming moves also become more likely to miss."
    fr: "Rend la peau du lanceur dure comme un mur de fer.\nAugmente sa puissance défensive. Les attaques de\nla cible deviennent plus faciles à esquiver."
    it: "Chi la usa indurisce la propria pelle come uno scudo di\nferro, aumentando la forza difensiva. Inoltre, fa sì che\nle mosse nemiche falliscano più facilmente."
    de: "Der Anwender macht seine Haut so hart wie Eisen und\nerhöht dadurch seine Defensivkraft. Bewirkt zudem, dass\ngegnerische Attacken den Anwender häufiger verfehlen."
    es: "La piel del usuario se vuelve dura como un escudo de\nacero, lo que aumenta su defensiva. Además, hace que\nevite con mayor facilidad los movimientos enemigos."
    ko: "피부를 강철 방패처럼 단단하게 만들어서\n자신의 방어력을 올린다.\n상대의 기술을 회피하기 쉬워진다."
    zh_simp: "让皮肤变得像铁盾般坚硬。\n会提高自己的防守力，\n且变得较容易闪避对手的招式。"
    zh_trad: "讓皮膚變得像鐵盾般堅硬，\n藉此提高自己的防守力。\n會變得較容易閃避對手的招式。"
shift_gear:
  names:
    jp_kanji: ギアチェンジ
    en: Shift Gear
    fr: Chgt Vitesse
    it: Cambiomarcia
    de: Gangwechsel
    es: Cambio de Marcha
    ko: 기어체인지
    zh_simp: 换档
    zh_trad: 換檔
  descriptions:
    jp_kanji: "歯車を　回して\n自分の　攻撃を　あげる　だけでなく\n素早さも　ぐーんと　あげる。"
    en: "The user rotates its gears, raising its Attack stat and\nsharply raising its Speed stat."
    fr: "Le lanceur fait tourner ses engrenages.\nCela augmente son Attaque et augmente beaucoup\nsa Vitesse."
    it: "Facendo ruotare gli ingranaggi, chi la usa aumenta\nnon solo il proprio Attacco, ma anche di molto\nla propria Velocità."
    de: "Durch Drehen der Zahnräder erhöht sich nicht nur\nder Angriffs-Wert, sondern auch die Initiative des\nAnwenders stark."
    es: "Al hacer girar los engranajes, el usuario mejora su\nAtaque y aumenta mucho su Velocidad."
    ko: "톱니바퀴를 돌려서 자신의\n공격을 올리는 것뿐만 아니라\n스피드도 크게 올린다."
    zh_simp: "转动齿轮，\n不仅提高自己的攻击，\n还会大幅提高速度。"
    zh_trad: "轉動齒輪，\n提高自己的攻擊，\n同時大幅提高自己的速度。"
shock_wave:
  names:
    jp_kanji: でんげきは
    en: Shock Wave
    fr: Onde de Choc
    it: Ondashock
    de: Schockwelle
    es: Onda Voltio
    ko: 전격파
    zh_simp: 电击波
    zh_trad: 電擊波
  descriptions:
    jp_kanji: "電撃を　素早く\n相手に　浴びせる。\n攻撃は　必ず　命中する。"
    en: "The user strikes the target with a quick jolt of\nelectricity. This attack never misses."
    fr: "Le lanceur envoie un choc électrique rapide à l’ennemi.\nImpossible à esquiver."
    it: "Chi la usa colpisce il bersaglio con una scossa\nelettrica. È impossibile eludere questa mossa."
    de: "Angriff mit schnellem Elektro-Schlag. Ausweichen nicht\nmöglich."
    es: Ataque eléctrico muy rápido e ineludible.
    ko: "전격을 재빠르게\n상대에게 날린다.\n공격은 반드시 명중한다."
    zh_simp: "向对手快速发出电击。\n攻击必定会命中。"
    zh_trad: "向對手迅速放出電流。\n攻擊一定會命中。"
shore_up:
  names:
    jp_kanji: すなあつめ
    en: Shore Up
    fr: Amass’Sable
    it: Sabbiaccumulo
    de: Sandsammler
    es: Recogearena
    ko: 모래모으기
    zh_simp: 集沙
    zh_trad: 集沙
  descriptions:
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。\nすなあらしの時は　多く　回復。"
    en: "The user regains up to half of its max HP. It restores\nmore HP in a sandstorm."
    fr: "Le lanceur récupère jusqu’à la moitié de ses PV max.\nDurant une tempête de sable, il en récupère encore plus."
    it: "Chi la usa recupera metà dei propri PS massimi.\nDurante le tempeste di sabbia ne recupera di più."
    de: "KP des Anwenders werden um 50 % der maximalen KP\naufgefüllt. Tobt ein Sandsturm, werden noch mehr KP\naufgefüllt."
    es: "Restaura la mitad de los PS máximos del usuario.\nDurante las tormentas de arena, restaura aún más PS."
    ko: "자신의 최대 HP 절반을\n회복한다. 모래바람일 때는\n많이 회복한다."
    zh_simp: "回复自己最大ＨＰ的一半。\n在沙暴中回复得更多。"
    zh_trad: "回復自己最大ＨＰ的一半。\n在沙暴中回復得更多。"
signal_beam:
  names:
    jp_kanji: シグナルビーム
    en: Signal Beam
    fr: Rayon Signal
    it: Segnoraggio
    de: Ampelleuchte
    es: Doble Rayo
    ko: 시그널빔
    zh_simp: 信号光束
    zh_trad: 信號光束
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
silver_wind:
  names:
    jp_kanji: ぎんいろのかぜ
    en: Silver Wind
    fr: Vent Argenté
    it: Ventargenteo
    de: Silberhauch
    es: Viento Plata
    ko: 은빛바람
    zh_simp: 银色旋风
    zh_trad: 銀色旋風
  descriptions:
    jp_kanji: "風にりんぷんをのせて\n相手を攻撃する。自分の\n攻めの力　守りの力をあげることもある。"
    en: "The target is attacked with powdery scales blown\nby the wind. This may also raise the user’s offensive\nand defensive stats."
    fr: "Vent qui projette des écailles poudreuses sur l’ennemi.\nPeut aussi augmenter la puissance offensive et défensive\ndu lanceur."
    it: "Chi la usa attacca con una polvere di squame trasportata\ndal vento e può anche aumentare la propria forza\noffensiva e la propria forza difensiva."
    de: "Angriff mit Silberstaub. Erhöht eventuell die\nOffensivkraft und Defensivkraft des Anwenders."
    es: "Ataque con un fuerte viento con polvo de escamas que\nademás puede aumentar la ofensiva y la defensiva del\nusuario."
    ko: "인분이 실린 바람으로 상대를 공격한다.\n자신의 공격력과 방어력이 오를 때가 있다."
    zh_simp: "乘着风飘送鳞粉攻击对手。\n有时会提高自己的进攻力和防守力。"
    zh_trad: "乘著風飄送鱗粉攻擊對手。\n有時還會提高自己的進攻力和防守力。"
simple_beam:
  names:
    jp_kanji: シンプルビーム
    en: Simple Beam
    fr: Rayon Simple
    it: Ondisinvolta
    de: Wankelstrahl
    es: Onda Simple
    ko: 심플빔
    zh_simp: 单纯光束
    zh_trad: 單純光束
  descriptions:
    jp_kanji: "なぞの　念波を　相手に　送る。\n念波を　受けとった　相手は\n特性が　たんじゅんに　なる。"
    en: "The user’s mysterious psychic wave changes the\ntarget’s Ability to Simple."
    fr: "Le lanceur envoie des ondes mystérieuses à l’ennemi.\nSon talent devient Simple."
    it: "Chi la usa emette un misterioso raggio psichico\nche trasforma l’abilità del Pokémon colpito in\nDisinvoltura."
    de: "Bestrahlt das Ziel mit mysteriösen Energiewellen. Bei\neinem Treffer wird dessen Fähigkeit zu Wankelmut."
    es: "Lanza una onda psíquica que hace que la habilidad del\nobjetivo pase a ser Simple."
    ko: "수수께끼의 염력파를 상대에게 보낸다.\n염력파를 받은 상대는\n특성이 단순으로 바뀐다."
    zh_simp: "向对手发送谜之念波。\n接收到念波的对手，\n其特性会变为单纯。"
    zh_trad: "向對手發射謎樣的念力波。\n接收了念力波的對手，\n特性會變成單純。"
sing:
  names:
    jp_kanji: うたう
    en: Sing
    fr: Berceuse
    it: Canto
    de: Gesang
    es: Canto
    ko: 노래하기
    zh_simp: 唱歌
    zh_trad: 唱歌
  descriptions:
    jp_kanji: "心地好い　きれいな\n歌声を　聞かせて\n相手を　眠り状態に　する。"
    en: "A soothing lullaby is sung in a calming voice that\nputs the target into a deep slumber."
    fr: Une berceuse plonge l’ennemi dans un profond sommeil.
    it: "Dolce ninnananna, cantata da una voce suadente,\nche fa addormentare il bersaglio."
    de: Ein Lied, das das Ziel in tiefen Schlaf versetzt.
    es: "Cancioncilla que hace dormir profundamente al\nobjetivo."
    ko: "기분 좋게 예쁜\n노랫소리를 들려주고\n상대를 잠듦 상태로 만든다."
    zh_simp: "让对手听舒适、\n美妙的歌声，\n从而陷入睡眠状态。"
    zh_trad: "唱出舒服美妙的歌聲，\n讓對手陷入睡眠狀態。"
sinister_arrow_raid:
  names:
    jp_kanji: シャドーアローズストライク
    en: Sinister Arrow Raid
    fr: Fureur des Plumes Spectrales
    it: Dardoassalto Spettrale
    de: Schatten-Pfeilregen
    es: Aluvión de Flechas Sombrías
    ko: 섀도애로우즈스트라이크
    zh_simp: 遮天蔽日暗影箭
    zh_trad: 遮天蔽日暗影箭
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
sizzly_slide:
  names:
    jp_kanji: めらめらバーン
    en: Sizzly Slide
    fr: Évo-Flambo
    it: Fiammabam
    de: Flackerbrand
    es: Flarembestida
    ko: 이글이글번
    zh_simp: 熊熊火爆
    zh_trad: 熊熊火爆
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
sketch:
  names:
    jp_kanji: スケッチ
    en: Sketch
    fr: Gribouille
    it: Schizzo
    de: Nachahmer
    es: Esquema
    ko: 스케치
    zh_simp: 写生
    zh_trad: 寫生
  descriptions:
    jp_kanji: "相手が　使った　技を\n自分の　ものに　する。\n１回　使うと　スケッチは　消える。"
    en: "It enables the user to permanently learn the move\nlast used by the target. Once used,\nSketch disappears."
    fr: "Le lanceur apprend la dernière capacité utilisée\npar la cible. Gribouille disparaît après utilisation."
    it: "Permette a chi la usa di imparare l’ultima mossa\nusata dal bersaglio. La nuova mossa appresa\nsostituisce Schizzo."
    de: "Anwender erlernt die letzte Attacke des Zieles\ndauerhaft. Nachahmer verschwindet nach Gebrauch."
    es: "Aprende de forma permanente el último movimiento\nutilizado por el objetivo. Es de un solo uso."
    ko: "상대가 쓴 기술을\n자신의 것으로 만든다.\n한 번 사용하면 스케치는 사라진다."
    zh_simp: "将对手使用的招式\n变成自己的招式。\n使用１次后写生消失。"
    zh_trad: "將對手使用的招式變成自己的。\n寫生在使用１次之後就會消失。"
skill_swap:
  names:
    jp_kanji: スキルスワップ
    en: Skill Swap
    fr: Échange
    it: Baratto
    de: Fähigkeitstausch
    es: Intercambio
    ko: 스킬스웹
    zh_simp: 特性互换
    zh_trad: 特性互換
  descriptions:
    jp_kanji: "超能力で　自分の　特性と\n相手の　特性を　入れ替える。"
    en: "The user employs its psychic power to exchange\nAbilities with the target."
    fr: "Le lanceur utilise ses pouvoirs psychiques pour échanger\nson talent avec la cible."
    it: "Chi la usa sfrutta i suoi poteri psichici per scambiare\nl’abilità con il bersaglio."
    de: Anwender tauscht seine Fähigkeit mit der des Zieles.
    es: "Usa el poder psíquico para intercambiar habilidades\ncon el objetivo."
    ko: "초능력으로 자신의 특성과\n상대의 특성을 바꾼다."
    zh_simp: "利用超能力互换\n自己和对手的特性。"
    zh_trad: "用超能力將自己和\n對手的特性互相交換。"
skitter_smack:
  names:
    jp_kanji: はいよるいちげき
    en: Skitter Smack
    fr: Ravage Rampant
    it: Strisciacolpo
    de: Krabbelkracher
    es: Golpe Rastrero
    ko: 엄습하는일격
    zh_simp: 爬击
    zh_trad: 爬擊
  descriptions:
    jp_kanji: "背後から　はいより　攻撃する。\n相手の　特攻を　さげる。"
    en: "The user skitters behind the target to attack. This also\nlowers the target’s Sp. Atk stat."
    fr: "Le lanceur rampe derrière l’ennemi pour l’attaquer.\nBaisse l’Attaque Spéciale de la cible."
    it: "Chi la usa attacca il bersaglio strisciandogli alle spalle\ne riducendo il suo Attacco Speciale."
    de: "Der Anwender kriecht hinter das Ziel, greift es an und\nsenkt dabei dessen Spezial-Angriff."
    es: "Ataca al objetivo por la espalda de forma subrepticia\ny además reduce su Ataque Especial."
    ko: "배후에서 엄습해서 공격한다.\n상대의 특수공격을 떨어뜨린다."
    zh_simp: "从对手背后爬近后进行攻击。\n会降低对手的特攻。"
    zh_trad: "從對手背後爬近後進行攻擊。\n會降低對手的特攻。"
skull_bash:
  names:
    jp_kanji: ロケットずつき
    en: Skull Bash
    fr: Coud’Krâne
    it: Capocciata
    de: Schädelwumme
    es: Cabezazo
    ko: 로케트박치기
    zh_simp: 火箭头锤
    zh_trad: 火箭頭錘
  descriptions:
    jp_kanji: "１ターン目に　頭を　ひっこめて\n防御を　あげる。\n２ターン目に　相手を　攻撃する。"
    en: "The user tucks in its head to raise its Defense\nstat on the first turn, then rams the target on the\nnext turn."
    fr: "Le lanceur baisse la tête pour augmenter sa Défense\nau premier tour et percuter l’ennemi au second."
    it: "Chi la usa ritira la testa per aumentare la Difesa\ne poi attacca al turno successivo."
    de: "Der Anwender erhöht in Runde 1 seine Verteidigung\nund greift in Runde 2 an."
    es: "El usuario se prepara y sube su Defensa en el primer\nturno y en el segundo arremete con un cabezazo."
    ko: "1턴째에 머리를 움츠려\n방어를 올린다.\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合把头缩进去，\n从而提高防御。\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合把頭後縮，提高防禦。\n並於第２回合攻擊對手。"
sky_attack:
  names:
    jp_kanji: ゴッドバード
    en: Sky Attack
    fr: Piqué
    it: Aeroattacco
    de: Himmelsfeger
    es: Ataque Aéreo
    ko: 불새
    zh_simp: 神鸟猛击
    zh_trad: 神鳥猛擊
  descriptions:
    jp_kanji: "２ターン目に　相手を　攻撃する。\nたまに　ひるませる。\n急所にも　当たりやすい。"
    en: "A second-turn attack move where critical hits land\nmore easily. This may also make the target flinch."
    fr: "Une attaque en deux tours au taux de critiques élevé.\nPeut aussi apeurer l’ennemi."
    it: "Attacco in due turni e probabile brutto colpo.\nPuò anche far tentennare il bersaglio."
    de: "Anwender greift in der zweiten Runde mit hoher\nVolltrefferquote an. Ziel schreckt eventuell zurück."
    es: "Ataca durante dos turnos y suele asestar un golpe\ncrítico. También puede amedrentar al objetivo."
    ko: "2턴째에 상대를 공격한다.\n가끔 풀죽게 만든다.\n급소에도 맞기 쉽다."
    zh_simp: "第２回合攻击对手。\n偶尔使对手畏缩。\n也容易击中要害。"
    zh_trad: "在使用後的下一回合進行攻擊。\n有時會使對手畏縮。\n且容易擊中要害。"
sky_drop:
  names:
    jp_kanji: フリーフォール
    en: Sky Drop
    fr: Chute Libre
    it: Cadutalibera
    de: Freier Fall
    es: Caída Libre
    ko: 프리폴
    zh_simp: 自由落体
    zh_trad: 自由落體
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
sky_uppercut:
  names:
    jp_kanji: スカイアッパー
    en: Sky Uppercut
    fr: Stratopercut
    it: Stramontante
    de: Himmelhieb
    es: Gancho Alto
    ko: 스카이업퍼
    zh_simp: 冲天拳
    zh_trad: 衝天拳
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
slack_off:
  names:
    jp_kanji: なまける
    en: Slack Off
    fr: Paresse
    it: Pigro
    de: Tagedieb
    es: Relajo
    ko: 태만함
    zh_simp: 偷懒
    zh_trad: 偷懶
  descriptions:
    jp_kanji: "怠けて　やすむ。\n自分の　ＨＰを　最大ＨＰの\n半分　回復する。"
    en: "The user slacks off, restoring its own HP by up to\nhalf of its max HP."
    fr: "Le lanceur se tourne les pouces et récupère\njusqu’à la moitié de ses PV max."
    it: "Chi la usa si rilassa recuperando metà dei propri\nPS massimi."
    de: "Durch Müßiggang werden KP des Anwenders um 50 %\nder maximalen KP aufgefüllt."
    es: "El usuario se relaja y restaura la mitad de sus PS\nmáximos."
    ko: "게으름 피우며 쉰다.\n자신의 HP를 최대 HP의\n절반만큼 회복한다."
    zh_simp: "偷懒休息。\n回复自己最大ＨＰ的一半。"
    zh_trad: "偷懶休息。\n回復自己最大ＨＰ的一半。"
slam:
  names:
    jp_kanji: たたきつける
    en: Slam
    fr: Souplesse
    it: Schianto
    de: Slam
    es: Atizar
    ko: 힘껏치기
    zh_simp: 摔打
    zh_trad: 摔打
  descriptions:
    jp_kanji: "長い　しっぽや　つるなどを　使い\n相手を　たたきつけて　攻撃する。"
    en: "The target is slammed with a long tail, vines, or the\nlike to inflict damage."
    fr: "Fouette l’ennemi avec la queue ou une liane,\npar exemple, pour infliger des dégâts."
    it: "Infligge danni al bersaglio con la coda, con una\nliana o con qualcosa di simile."
    de: "Schlag mit einem langen Schweif, einer Ranke oder\nÄhnlichem."
    es: "Golpea con la cola o con lianas, por ejemplo, para\ncausar daño al objetivo."
    ko: "긴 꼬리나 덩굴 등을 사용해\n상대를 힘껏 쳐서 공격한다."
    zh_simp: "使用长长的尾巴或藤蔓等\n摔打对手进行攻击。"
    zh_trad: "將長長的尾巴或藤蔓等\n甩向對手進行攻擊。"
slash:
  names:
    jp_kanji: きりさく
    en: Slash
    fr: Tranche
    it: Lacerazione
    de: Schlitzer
    es: Cuchillada
    ko: 베어가르기
    zh_simp: 劈开
    zh_trad: 劈開
  descriptions:
    jp_kanji: "ツメやカマなどで\n相手を切り裂いて攻撃する。\n急所に当たりやすい。"
    en: "The target is attacked with a slash of claws or blades.\nThis move has a heightened chance of landing a\ncritical hit."
    fr: "Un coup de griffe ou autre tranche l’ennemi.\nTaux de critiques élevé."
    it: "Attacca il bersaglio con artigli, falci o altro.\nProbabile brutto colpo."
    de: "Hieb mit Klauen oder Ähnlichem.\nHohe Volltrefferquote."
    es: "Ataca con cuchillas o con pinzas. Suele asestar un\ngolpe crítico."
    ko: "발톱이나 낫 등으로\n상대를 베어 갈라서 공격한다.\n급소에 맞기 쉽다."
    zh_simp: "用爪子或镰刀等\n劈开对手进行攻击。\n容易击中要害。"
    zh_trad: "用爪子或鐮刀等\n劈開對手進行攻擊。\n容易擊中要害。"
sleep_powder:
  names:
    jp_kanji: ねむりごな
    en: Sleep Powder
    fr: Poudre Dodo
    it: Sonnifero
    de: Schlafpuder
    es: Somnífero
    ko: 수면가루
    zh_simp: 催眠粉
    zh_trad: 催眠粉
  descriptions:
    jp_kanji: "眠くなる粉を\nたくさんふりまいて\n相手をねむけ状態にする。"
    en: "The user scatters a cloud of sleep-inducing powder\nthat makes the target drowsy."
    fr: "Le lanceur répand une poudre soporifique qui plonge\nla cible dans un état de somnolence."
    it: "Investe il bersaglio con una grande nuvola di polvere\nsoporifera che gli causa sonnolenza."
    de: Verstreut Schlafpuder, der das Ziel schläfrig macht.
    es: Esparce polvo que produce somnolencia.
    ko: "잠이 오는 가루를\n많이 흩뿌려서\n상대를 졸음 상태로 만든다."
    zh_simp: "撒出大量催眠粉，\n从而让对手陷入瞌睡状态。"
    zh_trad: "撒出大量令人想睡的粉末，\n讓對手陷入瞌睡狀態。"
sleep_talk:
  names:
    jp_kanji: ねごと
    en: Sleep Talk
    fr: Blabla Dodo
    it: Sonnolalia
    de: Schlafrede
    es: Sonámbulo
    ko: 잠꼬대
    zh_simp: 梦话
    zh_trad: 夢話
  descriptions:
    jp_kanji: "自分が　おぼえている　技の　うち\nどれか　１つを　くりだす。\n自分が　寝ているときだけ　使える。"
    en: "While it is asleep, the user randomly uses one of the\nmoves it knows."
    fr: "Le lanceur utilise une de ses capacités au hasard\npendant qu’il dort."
    it: "Chi la usa sferra a caso una delle proprie mosse\nmentre sta dormendo."
    de: "Anwender setzt per Zufall eine ihm bekannte Attacke\nein. Klappt nur, wenn der Anwender gerade schläft."
    es: "Mientras duerme, usa uno de sus movimientos elegido\nal azar."
    ko: "자신이 배운 기술 중\n하나를 무작위로 날린다.\n자신이 잠들어 있을 때만 쓸 수 있다."
    zh_simp: "从自己已学会的招式中\n任意使出１个。\n只能在自己睡觉时使用。"
    zh_trad: "從自己已學會的招式中\n隨機選出１個使出。\n只有在睡眠狀態時可以使用。"
sludge:
  names:
    jp_kanji: ヘドロこうげき
    en: Sludge
    fr: Détritus
    it: Fango
    de: Schlammbad
    es: Residuos
    ko: 오물공격
    zh_simp: 污泥攻击
    zh_trad: 污泥攻擊
  descriptions:
    jp_kanji: "汚い　ヘドロを\n相手に　投げつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "Unsanitary sludge is hurled at the target. This may\nalso poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: Arroja residuos al objetivo. Puede llegar a envenenar.
    ko: "더러운 오물을\n상대에게 내던져서 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時會讓對手陷入中毒狀態。"
sludge_bomb:
  names:
    jp_kanji: ヘドロばくだん
    en: Sludge Bomb
    fr: Bombe Beurk
    it: Fangobomba
    de: Matschbombe
    es: Bomba Lodo
    ko: 오물폭탄
    zh_simp: 污泥炸弹
    zh_trad: 污泥炸彈
  descriptions:
    jp_kanji: "汚いヘドロを投げつけて攻撃する。\n相手を毒状態にすることもある。"
    en: "Unsanitary sludge is hurled at the target to deal damage.\nThis may also poison the target."
    fr: "Des détritus toxiques sont projetés sur l’ennemi.\nPeut aussi l’empoisonner."
    it: "Chi la usa lancia fango malsano sul bersaglio.\nPuò anche avvelenarlo."
    de: "Wirft Schlamm auf das Ziel. Dieses wird eventuell\nvergiftet."
    es: "Ataca arrojando residuos al objetivo y además puede\ncausar envenenamiento."
    ko: "더러운 오물을 내던져서 공격한다.\n상대를 독 상태로 만들 때가 있다."
    zh_simp: "用污泥投掷对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "向對手投擲污泥進行攻擊。\n有時還會讓對手陷入中毒狀態。"
sludge_wave:
  names:
    jp_kanji: ヘドロウェーブ
    en: Sludge Wave
    fr: Cradovague
    it: Fangonda
    de: Schlammwoge
    es: Onda Tóxica
    ko: 오물웨이브
    zh_simp: 污泥波
    zh_trad: 污泥波
  descriptions:
    jp_kanji: "ヘドロの　波で　自分の\n周りに　いるものを　攻撃する。\n毒状態に　することが　ある。"
    en: "The user strikes everything around it by swamping\nthe area with a giant sludge wave. This may also\npoison those hit."
    fr: "Une vague de détritus attaque tous les Pokémon\nautour du lanceur. Peut aussi empoisonner."
    it: "Lancia un’onda di fango che attacca tutti\ni Pokémon nelle vicinanze. Può anche avvelenarli."
    de: "Greift alle Pokémon im Umkreis mit einer Schlammwelle\nan. Diese werden eventuell auch vergiftet."
    es: "Una onda tóxica que daña a los Pokémon de alrededor.\nPuede envenenar."
    ko: "오물 파도로 자신의\n주위에 있는 포켓몬을 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "用污泥波攻击\n自己周围所有的宝可梦。\n有时会让其他宝可梦陷入中毒状态。"
    zh_trad: "用污泥波攻擊\n自己周圍所有的寶可夢。\n有時會讓對手陷入中毒狀態。"
smack_down:
  names:
    jp_kanji: うちおとす
    en: Smack Down
    fr: Anti-Air
    it: Abbattimento
    de: Katapult
    es: Antiaéreo
    ko: 떨어뜨리기
    zh_simp: 击落
    zh_trad: 擊落
  descriptions:
    jp_kanji: "石や　弾を　投げて　飛んでいる\n相手を　攻撃する。　相手は\nうち落とされて　地面に　落ちる。"
    en: "The user throws a stone or similar projectile to\nattack the target. A flying Pokémon will fall to the\nground when it’s hit."
    fr: "Le lanceur jette toutes sortes de projectiles à un ennemi.\nSi ce dernier vole, il tombe au sol."
    it: "Chi la usa lancia una pietra o un proiettile.\nPuò colpire anche un bersaglio in volo\ne farlo cadere."
    de: "Greift das Ziel mit Steinen und Wurfgeschossen an.\nFliegende Ziele fallen dabei vom Himmel und landen\nauf dem Boden."
    es: "Ataca lanzando una piedra o un proyectil. Si el objetivo\nestá en el aire, lo estrella contra el suelo."
    ko: "돌이나 구슬을 던져서 날고 있는\n상대를 공격한다.\n맞은 상대는 땅에 떨어진다."
    zh_simp: "扔石头或炮弹，\n攻击飞行的对手。\n对手会被击落，掉到地面。"
    zh_trad: "向空中的對手投擲石頭或炮彈等物體\n進行攻擊。對手會被擊落，掉到地面。"
smart_strike:
  names:
    jp_kanji: スマートホーン
    en: Smart Strike
    fr: Estocorne
    it: Sottilcorno
    de: Schmalhorn
    es: Cuerno Certero
    ko: 스마트호른
    zh_simp: 修长之角
    zh_trad: 修長之角
  descriptions:
    jp_kanji: "とがった　つので　相手を\n突き刺して　攻撃する。\n攻撃は　必ず　命中する。"
    en: "The user stabs the target with a sharp horn. This\nattack never misses."
    fr: "Le lanceur transperce la cible avec sa corne effilée.\nTouche toujours l’ennemi."
    it: "Chi la usa colpisce il bersaglio con un corno appuntito.\nQuesta mossa va sempre a segno."
    de: "Der Anwender durchbohrt das Ziel mit seinem\nspitzen Horn. Diese Attacke trifft immer."
    es: "El usuario ensarta al adversario con su afilada\ncornamenta. Este movimiento acierta siempre."
    ko: "뾰족한 뿔로 상대를\n꿰찔러서 공격한다.\n공격은 반드시 명중한다."
    zh_simp: "用尖尖的角刺入对手进行攻击。\n攻击必定会命中。"
    zh_trad: "用尖尖的角刺進對手進行攻擊。\n攻擊必定會命中。"
smelling_salts:
  names:
    jp_kanji: きつけ
    en: Smelling Salts
    fr: Stimulant
    it: Maniereforti
    de: Riechsalz
    es: Estímulo
    ko: 정신차리기
    zh_simp: 清醒
    zh_trad: 清醒
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
smog:
  names:
    jp_kanji: スモッグ
    en: Smog
    fr: Purédpois
    it: Smog
    de: Smog
    es: Polución
    ko: 스모그
    zh_simp: 浊雾
    zh_trad: 濁霧
  descriptions:
    jp_kanji: "汚れた　ガスを\n相手に　吹きつけて　攻撃する。\n毒状態に　することが　ある。"
    en: "The target is attacked with a discharge of filthy\ngases. This may also poison the target."
    fr: "Le lanceur attaque à l’aide d’une éruption de gaz\nrépugnants. Peut aussi empoisonner l’ennemi."
    it: "Colpisce il bersaglio con una scarica di gas\nmaleodoranti. Può anche avvelenarlo."
    de: "Angriff mit Gas. Das Ziel kann eventuell vergiftet\nwerden."
    es: "Lanza un ataque con gases tóxicos que pueden llegar a\nenvenenar."
    ko: "더러운 가스를\n상대에게 내뿜어 공격한다.\n독 상태로 만들 때가 있다."
    zh_simp: "将肮脏的浓雾\n吹向对手进行攻击。\n有时会让对手陷入中毒状态。"
    zh_trad: "將骯髒的濃霧\n吹向對手進行攻擊。\n有時會讓對手陷入中毒狀態。"
smokescreen:
  names:
    jp_kanji: えんまく
    en: Smokescreen
    fr: Brouillard
    it: Muro di Fumo
    de: Rauchwolke
    es: Pantalla de Humo
    ko: 연막
    zh_simp: 烟幕
    zh_trad: 煙幕
  descriptions:
    jp_kanji: "煙や　墨などを　吹きかけて\n相手の　命中率を　さげる。"
    en: "The user releases an obscuring cloud of smoke or\nink. This lowers the target’s accuracy."
    fr: "Le lanceur disperse un nuage d’encre ou de fumée.\nRéduit la Précision de l’ennemi."
    it: "Nuvola di fumo o inchiostro che riduce\nla precisione del bersaglio."
    de: "Senkt Genauigkeit des Zieles mit Rauch, Tinte oder\nÄhnlichem."
    es: "Baja la Precisión del objetivo con una nube de humo\no tinta."
    ko: "연기나 먹물을 내뿜어\n상대의 명중률을 떨어뜨린다."
    zh_simp: "向对手喷出烟或墨汁等，\n从而降低对手的命中率。"
    zh_trad: "向對手噴出煙霧或墨汁等，\n降低對手的命中率。"
snap_trap:
  names:
    jp_kanji: トラバサミ
    en: Snap Trap
    fr: Troquenard
    it: Tagliola
    de: Fangeisen
    es: Cepo
    ko: 집게덫
    zh_simp: 捕兽夹
    zh_trad: 捕獸夾
  descriptions:
    jp_kanji: "トラバサミで　捕らえて\n４－５ターンの　間\n相手を　はさんで　攻撃する。"
    en: "The user snares the target in a snap trap for four to\nfive turns."
    fr: "Le lanceur piège sa cible dans son Troquenard d’acier\net lui inflige des dégâts pendant quatre ou cinq tours."
    it: "Chi la usa intrappola il bersaglio in una tagliola\ne lo attacca per quattro o cinque turni."
    de: "Das Ziel wird vier bis fünf Runden lang in einem\nFangeisen festgehalten und angegriffen."
    es: "Cepo que atrapa al objetivo durante cuatro o cinco\nturnos y le causa daño mientras se encuentra preso."
    ko: "집게덫으로 붙잡은 뒤\n4~5턴 동안\n상대를 끼워서 공격한다."
    zh_simp: "使用捕兽夹，\n在４～５回合内，\n夹住对手进行攻击。"
    zh_trad: "用捕獸夾，\n在４～５回合內\n夾住對手進行攻擊。"
snarl:
  names:
    jp_kanji: バークアウト
    en: Snarl
    fr: Aboiement
    it: Urlorabbia
    de: Standpauke
    es: Alarido
    ko: 바크아웃
    zh_simp: 大声咆哮
    zh_trad: 大聲咆哮
  descriptions:
    jp_kanji: "まくしたてるように怒鳴りつけて\n相手の攻めの力をさげる。"
    en: "The user attacks by crying out as if it’s ranting about\nsomething. This also lowers the target’s offensive stats."
    fr: "Le lanceur hurle sur l’ennemi.\nBaisse la puissance offensive de la cible."
    it: "Chi la usa si mette a urlare per un po’ riducendo la forza\noffensiva del bersaglio."
    de: "Wäscht dem Ziel mit einer ausführlichen Standpauke\nden Kopf und senkt dabei seine Offensivkraft."
    es: Chillido desagradable que baja la ofensiva del objetivo.
    ko: "호되게 호통을 쳐서 공격한다.\n상대의 공격력을 떨어뜨린다."
    zh_simp: "没完没了地大声斥责，\n会降低对手的进攻力。"
    zh_trad: "沒完沒了地向對手大聲咆哮。\n會降低對手的進攻力。"
snatch:
  names:
    jp_kanji: よこどり
    en: Snatch
    fr: Saisie
    it: Scippo
    de: Übernahme
    es: Robo
    ko: 가로챔
    zh_simp: 化为己用
    zh_trad: 搶奪
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
snipe_shot:
  names:
    jp_kanji: ねらいうち
    en: Snipe Shot
    fr: Tir de Précision
    it: Tiromirato
    de: Präzisionsschuss
    es: Disparo Certero
    ko: 노려맞히기
    zh_simp: 狙击
    zh_trad: 狙擊
  descriptions:
    jp_kanji: "相手の　技を　引き受ける\n特性や　技の　影響を　無視して\n選んだ　相手を　攻撃　できる。"
    en: "The user ignores the effects of opposing Pokémon’s\nmoves and Abilities that draw in moves, allowing this\nmove to hit the chosen target."
    fr: "Le lanceur parvient toujours à viser la cible voulue,\nen ignorant l’effet des talents et des capacités capables\nde détourner les attaques."
    it: "Permette di attaccare un bersaglio ignorando gli effetti\ndi mosse e abilità che attirano altre mosse."
    de: "Die Attacke richtet sich gegen das ausgewählte Ziel,\nunabhängig von Fähigkeiten oder Attacken, die Angriffe\nauf sich ziehen."
    es: "Permite atacar al objetivo seleccionado ignorando las\nhabilidades o movimientos que permiten a un rival\ncentrar la atención sobre sí."
    ko: "상대의 기술을 끌어모으는\n특성이나 기술의 영향을 무시하고\n선택한 상대를 공격할 수 있다."
    zh_simp: "能无视具有吸引对手招式效果的\n特性或招式的影响。\n可以向选定的对手进行攻击。"
    zh_trad: "能不受具有吸引對手招式\n效果的特性或招式影響，\n向選定的對手進行攻擊。"
snore:
  names:
    jp_kanji: いびき
    en: Snore
    fr: Ronflement
    it: Russare
    de: Schnarcher
    es: Ronquido
    ko: 코골기
    zh_simp: 打鼾
    zh_trad: 打鼾
  descriptions:
    jp_kanji: "自分が　寝ているときに\n雑音を　だして　攻撃する。\n相手を　ひるませることが　ある。"
    en: "This attack can be used only if the user is asleep.\nThe harsh noise may also make the target flinch."
    fr: "Une attaque qui ne fonctionne que si le lanceur\nest endormi. Le boucan peut aussi apeurer l’ennemi."
    it: "Mossa che può essere usata solo mentre si dorme.\nIl chiasso assordante può anche far tentennare il\nbersaglio."
    de: "Attacke nur im Schlaf möglich. Ziel schreckt\neventuell zurück."
    es: "Fuerte ronquido que solo puede usarse dormido.\nPuede amedrentar al objetivo."
    ko: "자신이 잠들어 있을 때\n소음을 내어 공격한다.\n상대를 풀죽게 만들 때가 있다."
    zh_simp: "在自己睡觉时，\n发出噪音进行攻击。\n有时会使对手畏缩。"
    zh_trad: "在自己睡著時，\n發出噪音進行攻擊。\n有時會讓對手畏縮。"
soak:
  names:
    jp_kanji: みずびたし
    en: Soak
    fr: Détrempage
    it: Inondazione
    de: Überflutung
    es: Anegar
    ko: 물붓기
    zh_simp: 浸水
    zh_trad: 浸水
  descriptions:
    jp_kanji: "たくさんの　水を　浴びせかけて\n相手を　みずタイプに　する。"
    en: "The user shoots a torrent of water at the target and\nchanges the target’s type to Water."
    fr: "Le lanceur projette beaucoup d’eau sur sa cible,\nqui devient de type Eau."
    it: "Chi la usa proietta un lungo getto d’acqua contro\nil bersaglio e lo rende un Pokémon di tipo Acqua."
    de: "Überschüttet das Ziel mit Unmengen an Wasser und\nändert den Typ damit in Wasser um."
    es: "Potente lluvia que transforma al objetivo en un\nPokémon de tipo Agua."
    ko: "많은 물을 끼얹어서\n상대를 물타입으로 바꾼다."
    zh_simp: "将大量的水泼向对手，\n从而使其变成水属性。"
    zh_trad: "朝對手灑下大量的水，\n讓對手變成水屬性。"
soft_boiled:
  names:
    jp_kanji: タマゴうみ
    en: Soft-Boiled
    fr: E-Coque
    it: Covauova
    de: Weichei
    es: Amortiguador
    ko: 알낳기
    zh_simp: 生蛋
    zh_trad: 生蛋
  descriptions:
    jp_kanji: 自分のＨＰを回復する。
    en: The user restores its own HP.
    fr: Le lanceur récupère des PV.
    it: Chi la usa recupera PS.
    de: Die KP des Anwenders werden aufgefüllt.
    es: Restaura los PS del usuario.
    ko: 자신의 HP를 회복한다.
    zh_simp: 回复自己的ＨＰ。
    zh_trad: 回復自己的ＨＰ。
solar_beam:
  names:
    jp_kanji: ソーラービーム
    en: Solar Beam
    fr: Lance-Soleil
    it: Solarraggio
    de: Solarstrahl
    es: Rayo Solar
    ko: 솔라빔
    zh_simp: 日光束
    zh_trad: 日光束
  descriptions:
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　光の　束を\n発射して　攻撃する。"
    en: "In this two-turn attack, the user gathers light, then\nblasts a bundled beam on the next turn."
    fr: "Absorbe la lumière au premier tour et envoie un rayon\npuissant au tour suivant."
    it: "Chi la usa assorbe luce al primo turno per proiettare\nun raggio intenso al turno successivo."
    de: "Absorbiert Licht in Runde 1. In Runde 2 erfolgt der\nAngriff."
    es: "El usuario absorbe luz en el primer turno y en el\nsegundo lanza un potente rayo de energía."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 빛의 다발을\n발사하여 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合发射光束进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合發射光束進行攻擊。"
solar_blade:
  names:
    jp_kanji: ソーラーブレード
    en: Solar Blade
    fr: Lame Solaire
    it: Lama Solare
    de: Solarklinge
    es: Cuchilla Solar
    ko: 솔라블레이드
    zh_simp: 日光刃
    zh_trad: 日光刃
  descriptions:
    jp_kanji: "１ターン目に　光を　いっぱいに　集め\n２ターン目に　その　力を\n剣に　込めて　攻撃する。"
    en: "In this two-turn attack, the user gathers light and fills a\nblade with the light’s energy, attacking the target on the\nnext turn."
    fr: "Le lanceur absorbe la lumière au premier tour\net attaque au second tour en libérant cette énergie\nsous forme de lames."
    it: "Chi la usa assorbe la luce condensandola in una lama\nal primo turno per poi attaccare al turno successivo."
    de: "In Runde 1 absorbiert der Anwender Licht, das er in\nRunde 2 zu einem Schwert formt, mit dem er dann\nangreift."
    es: "El usuario dedica un turno a absorber energía lumínica\ny concentrarla en forma de cuchilla con la que ataca al\nrival en el siguiente turno."
    ko: "1턴째에 빛을 가득 모아\n2턴째에 그 힘을\n검에 담아 공격한다."
    zh_simp: "第１回合收集满满的日光，\n第２回合将此力量\n集中在剑上进行攻击。"
    zh_trad: "使用後的第１回合吸收大量日光，\n並於第２回合把力量\n注入劍裡進行攻擊。"
sonic_boom:
  names:
    jp_kanji: ソニックブーム
    en: Sonic Boom
    fr: Sonic Boom
    it: Sonicboom
    de: Ultraschall
    es: Bomba Sónica
    ko: 소닉붐
    zh_simp: 音爆
    zh_trad: 音爆
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
soul_stealing_7_star_strike:
  names:
    jp_kanji: しちせいだっこんたい
    en: Soul-Stealing 7-Star Strike
    fr: Fauche-Âme des Sept Étoiles
    it: Colpo Eptastellare Rubanima
    de: Sternbild des Seelenraubes
    es: Constelación Robaalmas
    ko: 칠성탈혼퇴
    zh_simp: 七星夺魂腿
    zh_trad: 七星奪魂腿
