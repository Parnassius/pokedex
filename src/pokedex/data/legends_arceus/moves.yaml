pyro_ball:
  names:
    jp_kanji: かえんボール
    en: Pyro Ball
    fr: Ballon Brûlant
    it: Palla Infuocata
    de: Feuerball
    es: Balón Ígneo
    ko: 화염볼
    zh_simp: 火焰球
    zh_trad: 火焰球
  descriptions:
    jp_kanji: "小石を　燃やした　炎の　ボールで\n相手を　攻撃する。\nやけど　状態に　することが　ある。"
    en: "The user attacks by igniting a small stone and launching\nit as a fiery ball at the target. This may also leave the\ntarget with a burn."
    fr: "Le lanceur attaque avec un ballon fait à partir\nd’un caillou enflammé. Peut aussi brûler la cible."
    it: "Chi la usa attacca con una palla creata incendiando\nuna piccola pietra. Può anche scottare il bersaglio."
    de: "Der Anwender greift mit einem Ball aus Feuer an,\nden er durch Anzünden eines kleinen Steins erzeugt.\nFügt dem Ziel eventuell Verbrennungen zu."
    es: "El usuario prende una pequeña piedra para crear una\nbola de fuego con la que ataca al rival. Puede causar\nquemaduras."
    ko: "작은 돌을 태운 불꽃의 공으로\n상대를 공격한다.\n화상 상태로 만들 때가 있다."
    zh_simp: "点燃小石子，形成火球攻击对手。\n有时会使对手陷入灼伤状态。"
    zh_trad: "燃燒小石子，\n形成火球攻擊對手。\n有時會讓對手陷入灼傷狀態。"
quash:
  names:
    jp_kanji: さきおくり
    en: Quash
    fr: À la Queue
    it: Spintone
    de: Verzögerung
    es: Último Lugar
    ko: 순서미루기
    zh_simp: 延后
    zh_trad: 延後
  descriptions:
    jp_kanji: "相手を　おさえつけて\n行動の　順番を\n最後に　する。"
    en: "The user suppresses the target and makes its move\ngo last."
    fr: Retient la cible de force, l’obligeant à agir en dernier.
    it: "Chi la usa spinge via il bersaglio, costringendolo\nad agire per ultimo."
    de: "Anwender stemmt sich gegen das Ziel und bewirkt,\ndass dieses erst als Letztes angreift."
    es: Consigue que el objetivo sea el último en moverse.
    ko: "상대를 억눌러서\n행동의 순서를\n마지막으로 만든다."
    zh_simp: "压制对手，\n从而将其行动顺序放到最后。"
    zh_trad: "壓制對手，讓對手在\n回合的最後才能行動。"
quick_attack:
  names:
    jp_kanji: でんこうせっか
    en: Quick Attack
    fr: Vive-Attaque
    it: Attacco Rapido
    de: Ruckzuckhieb
    es: Ataque Rápido
    ko: 전광석화
    zh_simp: 电光一闪
    zh_trad: 電光一閃
  descriptions:
    jp_kanji: "目にも留まらぬ　ものすごい速さで\n相手につっこむ。\n自分の行動順がはやくなる。"
    en: "The user lunges at the target to deal damage, moving at\na speed that makes it almost invisible. This also raises\nthe user’s action speed."
    fr: "Le lanceur fonce sur l’ennemi si rapidement qu’on\nparvient à peine à le discerner. Avance la position\ndu lanceur dans l’ordre d’action."
    it: "Chi la usa colpisce a una tale velocità da rendersi\nquasi invisibile e accelera il proprio ordine delle azioni."
    de: "Der Anwender stürzt sich so schnell auf das Ziel,\ndass er quasi unsichtbar wird. Danach kommt er\nschneller wieder zum Zug."
    es: "Ataca al objetivo a gran velocidad. Hace que los turnos\ndel usuario tarden menos en llegar."
    ko: "눈에 보이지 않는 굉장한 속도로\n상대에게 돌진한다.\n자신의 행동 순서가 빨라진다."
    zh_simp: "以迅雷不及掩耳之势\n扑向对手。\n能够让自己的行动顺序提前。"
    zh_trad: "以迅雷不及掩耳之勢\n撲向對手。\n能夠讓自己的行動順序提前。"
quick_guard:
  names:
    jp_kanji: ファストガード
    en: Quick Guard
    fr: Prévention
    it: Anticipo
    de: Rapidschutz
    es: Anticipo
    ko: 퍼스트가드
    zh_simp: 快速防守
    zh_trad: 快速防守
  descriptions:
    jp_kanji: "自分と　味方を　相手の\n先制攻撃から　守る。"
    en: "The user protects itself and its allies from\npriority moves."
    fr: "Le lanceur et son équipe sont protégés contre\nles attaques prioritaires."
    it: "Chi la usa protegge sé e gli alleati dalle mosse\nad alta priorità."
    de: "Schützt Anwender und Mitstreiter vor\nErstschlag-Attacken."
    es: "Se protege a sí mismo y a sus aliados de movimientos\ncon prioridad."
    ko: "자신과 같은 편을 상대의\n선제공격으로부터 지킨다."
    zh_simp: "守护自己和同伴，\n以防对手的先制攻击。"
    zh_trad: "保護自己和同伴，\n防禦來自對手的先制攻擊。"
quiver_dance:
  names:
    jp_kanji: ちょうのまい
    en: Quiver Dance
    fr: Papillodanse
    it: Eledanza
    de: Falterreigen
    es: Danza Aleteo
    ko: 나비춤
    zh_simp: 蝶舞
    zh_trad: 蝶舞
  descriptions:
    jp_kanji: "神秘的で　美しい　舞を\n軽やかに　おどる。　自分の　特攻と\n特防と　素早さを　あげる。"
    en: "The user lightly performs a beautiful, mystic dance.\nThis boosts the user’s Sp. Atk, Sp. Def, and\nSpeed stats."
    fr: "Une danse mystique dont le rythme parfait augmente\nl’Attaque Spéciale, la Défense Spéciale et la Vitesse\ndu lanceur."
    it: "Danza leggiadra ed elegante che aumenta\nl’Attacco Speciale, la Difesa Speciale e la Velocità\ndi chi la usa."
    de: "Anwender legt behände einen mystischen,\nformvollendeten Tanz aufs Parkett. Spezial-Angriff,\nSpezial-Verteidigung und Initiative steigen."
    es: "Danza mística que sube el Ataque Especial, la Defensa\nEspecial y la Velocidad."
    ko: "신비롭고 아름다운 춤을\n경쾌하게 춘다. 자신의 특수공격과\n특수방어, 스피드를 올린다."
    zh_simp: "轻巧地跳起神秘而又美丽的舞蹈。\n提高自己的特攻、特防和速度。"
    zh_trad: "輕巧地跳起神秘又美麗的舞蹈。\n提高自己的特攻、特防和速度。"
