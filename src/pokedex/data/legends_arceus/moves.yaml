    en: "This is a Fairy-type attack Dynamax Pokémon use.\nThe user turns the ground into Misty Terrain for\nfive turns."
    fr: "Une attaque de type Fée que seuls\nles Pokémon Dynamax peuvent utiliser.\nCrée un Champ Brumeux qui dure cinq tours."
    it: "Un attacco di tipo Folletto che può essere eseguito\ndai Pokémon dynamaxizzati. Per cinque turni il terreno\nentra nello stato di Campo Nebbioso."
    de: "Eine Feen-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erzeugt fünf Runden lang ein\nNebelfeld."
    es: "Ataque de tipo Hada ejecutado por un Pokémon\nDinamax. Crea un campo de niebla durante cinco\nturnos."
    ko: "다이맥스한 포켓몬이 날리는\n페어리타입의 공격.\n5턴 동안 미스트필드로 만든다."
    zh_simp: "极巨化宝可梦使出的妖精属性攻击。\n可在５回合内将脚下变成薄雾场地。"
    zh_trad: "極巨化寶可夢\n所使出的妖精屬性攻擊。\n可在５回合內將腳下變成薄霧場地。"
max_steelspike:
  names:
    jp_kanji: ダイスチル
    en: Max Steelspike
    fr: Métallomax
    it: Dynametallo
    de: Dyna-Stahlzacken
    es: Maximetal
    ko: 다이스틸
    zh_simp: 极巨钢铁
    zh_trad: 極巨鋼鐵
  descriptions:
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　はがねタイプの　攻撃。\n味方の　防御を　上げる。"
    en: "This is a Steel-type attack Dynamax Pokémon use.\nThis raises ally Pokémon’s Defense stats."
    fr: "Une attaque de type Acier que seuls\nles Pokémon Dynamax peuvent utiliser.\nAugmente la Défense des alliés."
    it: "Un attacco di tipo Acciaio che può essere eseguito\ndai Pokémon dynamaxizzati. Aumenta la Difesa\ndegli alleati."
    de: "Eine Stahl-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Erhöht die Verteidigung der\nMitstreiterseite."
    es: "Ataque de tipo Acero ejecutado por un Pokémon\nDinamax. Aumenta la Defensa de tu bando."
    ko: "다이맥스한 포켓몬이 날리는\n강철타입의 공격.\n같은 편의 방어를 올린다."
    zh_simp: "极巨化宝可梦使出的钢属性攻击。\n会提高我方的防御。"
    zh_trad: "極巨化寶可夢\n所使出的鋼屬性攻擊。\n可提高我方的防禦。"
max_strike:
  names:
    jp_kanji: ダイアタック
    en: Max Strike
    fr: Normalomax
    it: Dynattacco
    de: Dyna-Angriff
    es: Maxiataque
    ko: 다이어택
    zh_simp: 极巨攻击
    zh_trad: 極巨攻擊
  descriptions:
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　ノーマルタイプの　攻撃。\n相手の　素早さを　下げる。"
    en: "This is a Normal-type attack Dynamax Pokémon use.\nThis lowers the target’s Speed stat."
    fr: "Une attaque de type Normal que seuls\nles Pokémon Dynamax peuvent utiliser.\nBaisse la Vitesse de la cible."
    it: "Un attacco di tipo Normale che può essere eseguito\ndai Pokémon dynamaxizzati. Riduce la Velocità\ndei nemici intorno."
    de: "Eine Normal-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Senkt die Initiative des Zieles."
    es: "Ataque de tipo Normal ejecutado por un Pokémon\nDinamax. Reduce la Velocidad del objetivo."
    ko: "다이맥스한 포켓몬이 날리는\n노말타입의 공격.\n상대의 스피드를 떨어뜨린다."
    zh_simp: "极巨化宝可梦使出的一般属性攻击。\n会降低对手的速度。"
    zh_trad: "極巨化寶可夢\n所使出的一般屬性攻擊。\n可降低對手的速度。"
max_wyrmwind:
  names:
    jp_kanji: ダイドラグーン
    en: Max Wyrmwind
    fr: Dracomax
    it: Dynadragone
    de: Dyna-Wyrm
    es: Maxidraco
    ko: 다이드라군
    zh_simp: 极巨龙骑
    zh_trad: 極巨龍騎
  descriptions:
    jp_kanji: "ダイマックスした　ポケモンが\n繰りだす　ドラゴンタイプの　攻撃。\n相手の　攻撃を　下げる。"
    en: "This is a Dragon-type attack Dynamax Pokémon use.\nThis lowers the target’s Attack stat."
    fr: "Une attaque de type Dragon que seuls\nles Pokémon Dynamax peuvent utiliser.\nBaisse l’Attaque de la cible."
    it: "Un attacco di tipo Drago che può essere eseguito\ndai Pokémon dynamaxizzati. Riduce l’Attacco\ndei nemici intorno."
    de: "Eine Drachen-Attacke, die nur Dynamax-Pokémon\neinsetzen können. Senkt den Angriff des Zieles."
    es: "Ataque de tipo Dragón ejecutado por un Pokémon\nDinamax. Reduce el Ataque del objetivo."
    ko: "다이맥스한 포켓몬이 날리는\n드래곤타입의 공격.\n상대의 공격을 떨어뜨린다."
    zh_simp: "极巨化宝可梦使出的龙属性攻击。\n会降低对手的攻击。"
    zh_trad: "極巨化寶可夢\n所使出的龍屬性攻擊。\n可降低對手的攻擊。"
me_first:
  names:
    jp_kanji: さきどり
    en: Me First
    fr: Moi d’Abord
    it: Precedenza
    de: Egotrip
    es: Yo Primero
    ko: 선취
    zh_simp: 抢先一步
    zh_trad: 搶先一步
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mean_look:
  names:
    jp_kanji: くろいまなざし
    en: Mean Look
    fr: Regard Noir
    it: Malosguardo
    de: Horrorblick
    es: Mal de Ojo
    ko: 검은눈빛
    zh_simp: 黑色目光
    zh_trad: 黑色目光
  descriptions:
    jp_kanji: "吸いこまれるような　黒い　まなざしで\nじっと　みつめて　相手を\n戦闘から　逃げられなくする。"
    en: "The user pins the target with a dark, arresting look.\nThe target becomes unable to flee."
    fr: "Le lanceur pétrifie l’ennemi en lui lançant un regard noir.\nIl devient incapable de s’enfuir."
    it: "Chi la usa blocca il bersaglio con uno sguardo\noscuro e ammaliante, impedendogli la fuga."
    de: Böser Blick, der die Flucht des Zieles vereitelt.
    es: Mal de ojo que impide al objetivo huir del combate.
    ko: "빨려 들어갈 것 같은 까만 눈빛으로\n가만히 응시하여 상대를\n배틀에서 도망갈 수 없게 한다."
    zh_simp: "用好似要勾人心魂的黑色目光\n一动不动地凝视对手，\n使其不能从战斗中逃走。"
    zh_trad: "用漆黑深邃的眼神\n一動也不動地凝視對手，\n讓對手無法從戰鬥中逃走。"
meditate:
  names:
    jp_kanji: ヨガのポーズ
    en: Meditate
    fr: Yoga
    it: Meditazione
    de: Meditation
    es: Meditación
    ko: 요가포즈
    zh_simp: 瑜伽姿势
    zh_trad: 瑜伽姿勢
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mega_drain:
  names:
    jp_kanji: メガドレイン
    en: Mega Drain
    fr: Méga-Sangsue
    it: Megassorbimento
    de: Megasauger
    es: Megaagotar
    ko: 메가드레인
    zh_simp: 超级吸取
    zh_trad: 超級吸取
  descriptions:
    jp_kanji: "養分を　吸い取り　攻撃する。\n相手に　与えた　ダメージの\n半分の　ＨＰを　回復できる。"
    en: "A nutrient-draining attack. The user’s HP is restored\nby half the damage taken by the target."
    fr: "Une attaque qui convertit la moitié des dégâts\ninfligés en PV pour le lanceur."
    it: "Mossa che assorbe PS. Chi la usa recupera una\nquantità di PS pari alla metà del danno inferto."
    de: Attacke, die die Hälfte des Schadens absorbiert.
    es: "Un ataque que absorbe nutrientes. Quien lo usa\nrecupera la mitad de los PS del daño que produce."
    ko: "양분을 흡수하여 공격한다.\n상대에게 입힌 데미지의\n절반에 해당하는 HP를 회복할 수 있다."
    zh_simp: "吸取对手的养分进行攻击。\n可以回复给予对手\n伤害的一半ＨＰ。"
    zh_trad: "吸取對手的養分進行攻擊。\n可以回復給予對手\n傷害的一半ＨＰ。"
mega_kick:
  names:
    jp_kanji: メガトンキック
    en: Mega Kick
    fr: Ultimawashi
    it: Megacalcio
    de: Megakick
    es: Megapatada
    ko: 메가톤킥
    zh_simp: 百万吨重踢
    zh_trad: 百萬噸重踢
  descriptions:
    jp_kanji: "ものすごい　力を　こめた　キックで\n相手を　けとばして　攻撃する。"
    en: "The target is attacked by a kick launched with\nmuscle-packed power."
    fr: Un coup de pied surpuissant qui frappe l’ennemi.
    it: "Colpisce il bersaglio con un calcio sferrato\ncon la forza di muscoli poderosi."
    de: "Das Ziel wird mit einem extrem heftigen Tritt\nangegriffen."
    es: Patada de extrema fuerza.
    ko: "굉장한 힘을 담은 킥으로\n상대를 걷어차서 공격한다."
    zh_simp: "使出力大无穷的重踢\n踢飞对手进行攻击。"
    zh_trad: "用灌注了巨大力量的重踢\n踢飛對手進行攻擊。"
mega_punch:
  names:
    jp_kanji: メガトンパンチ
    en: Mega Punch
    fr: Ultimapoing
    it: Megapugno
    de: Megahieb
    es: Megapuño
    ko: 메가톤펀치
    zh_simp: 百万吨重拳
    zh_trad: 百萬噸重拳
  descriptions:
    jp_kanji: "力を　こめた　パンチで\n相手を　攻撃する。"
    en: "The target is slugged by a punch thrown with\nmuscle-packed power."
    fr: "L’ennemi reçoit un coup de poing d’une puissance\nincroyable."
    it: Colpisce il bersaglio con un pugno poderoso.
    de: Ein unglaublich kräftiger Hieb.
    es: Un puñetazo de gran potencia.
    ko: "힘을 담은 펀치로\n상대를 공격한다."
    zh_simp: 用充满力量的拳头攻击对手。
    zh_trad: "用帶有強大力量的拳頭\n攻擊對手。"
megahorn:
  names:
    jp_kanji: メガホーン
    en: Megahorn
    fr: Mégacorne
    it: Megacorno
    de: Vielender
    es: Megacuerno
    ko: 메가폰
    zh_simp: 超级角击
    zh_trad: 超級角擊
  descriptions:
    jp_kanji: "硬くてりっぱな　つのでおもいっきり\n相手を突き刺して攻撃する。"
    en: "Using its tough and impressive horn, the user rams into\nthe target to inflict damage."
    fr: "Le lanceur utilise ses gigantesques cornes pour\ncharger l’ennemi."
    it: "Chi la usa utilizza il suo robusto e imponente\ncorno per colpire il bersaglio con tutto se stesso."
    de: "Brutaler Ramm-Angriff mit spitzem,\nbeeindruckendem Horn."
    es: Violenta embestida con cuernos imponentes.
    ko: "단단하고 훌륭한 뿔로 힘껏\n상대를 꿰찔러서 공격한다."
    zh_simp: "用坚硬且华丽的角狠狠地\n刺入对手进行攻击。"
    zh_trad: "用堅硬且華麗的角狠狠地\n刺進對手進行攻擊。"
memento:
  names:
    jp_kanji: おきみやげ
    en: Memento
    fr: Souvenir
    it: Memento
    de: Memento-Mori
    es: Legado
    ko: 추억의선물
    zh_simp: 临别礼物
    zh_trad: 臨別禮物
  descriptions:
    jp_kanji: "自分は　ひんしに　なるが　そのかわりに\n相手の　攻撃と　特攻を\nがくっと　さげる。"
    en: "The user faints when using this move. In return, this\nharshly lowers the target’s Attack and Sp. Atk stats."
    fr: "Le lanceur est mis K.O., mais l’Attaque et\nl’Attaque Spéciale de l’ennemi baissent beaucoup."
    it: "Chi la usa va KO. Tuttavia, riduce di molto\nl’Attacco e l’Attacco Speciale del bersaglio."
    de: "Der Anwender wird besiegt. Gleichzeitig werden der\nAngriff und Spezial-Angriff des Zieles stark gesenkt."
    es: "El usuario se debilita, pero baja mucho tanto el\nAtaque como el Ataque Especial del objetivo."
    ko: "자신은 기절하게 되지만 그 대신\n상대의 공격과 특수공격을\n크게 떨어뜨린다."
    zh_simp: "虽然会使自己陷入昏厥，\n但是能够大幅降低\n对手的攻击和特攻。"
    zh_trad: "雖然自己會陷入瀕死，\n但可以大幅降低\n對手的攻擊和特攻。"
menacing_moonraze_maelstrom:
  names:
    jp_kanji: ムーンライトブラスター
    en: Menacing Moonraze Maelstrom
    fr: Rayons Séléno-Explosifs
    it: Deflagrazione Lunare
    de: Geballter Mondlaser
    es: Deflagración Lunar
    ko: 문라이트블래스터
    zh_simp: 月华飞溅落灵霄
    zh_trad: 月華飛濺落靈霄
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
metal_burst:
  names:
    jp_kanji: メタルバースト
    en: Metal Burst
    fr: Fulmifer
    it: Metalscoppio
    de: Metallstoß
    es: Represión Metal
    ko: 메탈버스트
    zh_simp: 金属爆炸
    zh_trad: 金屬爆炸
  descriptions:
    jp_kanji: "技を　だす前に\n最後に　受けた　技の　ダメージを\n大きくして　だした　相手に　返す。"
    en: "The user retaliates with much greater force against\nthe opponent that last inflicted damage on it."
    fr: "Le lanceur attaque le dernier ennemi l’ayant blessé\ndurant le même tour en frappant plus fort."
    it: "Chi la usa si vendica sul nemico che l’ha appena\nferito con una mossa anche più potente."
    de: "Attacke mit großer Kraft gegen den Gegner, der dem\nAnwender in derselben Runde zuletzt Schaden zufügte."
    es: "Devuelve al rival el último ataque recibido, pero con\nmucha más fuerza."
    ko: "기술을 쓰기 전에\n마지막으로 받은 기술의 데미지를 늘려서\n기술을 쓴 상대에게 돌려준다."
    zh_simp: "使出招式前，\n将最后受到的招式的伤害\n大力返还给对手。"
    zh_trad: "將發動攻擊前\n最後受到的招式傷害放大，\n向對手進行反擊。"
metal_claw:
  names:
    jp_kanji: メタルクロー
    en: Metal Claw
    fr: Griffe Acier
    it: Ferrartigli
    de: Metallklaue
    es: Garra Metal
    ko: 메탈크로우
    zh_simp: 金属爪
    zh_trad: 金屬爪
  descriptions:
    jp_kanji: "鋼鉄の　ツメで\n相手を　切り裂いて　攻撃する。\n自分の　攻撃が　あがることが　ある。"
    en: "The target is raked with steel claws. This may also\nraise the user’s Attack stat."
    fr: "Attaque avec des griffes d’acier.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Colpisce il bersaglio con artigli d’acciaio.\nPuò anche aumentare l’Attacco di chi la usa."
    de: "Klauen-Attacke, die eventuell den Angriffs-Wert des\nAnwenders erhöht."
    es: "Ataque con garras de acero que puede aumentar el\nAtaque del usuario."
    ko: "강철의 발톱으로\n상대를 베어 갈라 공격한다.\n자신의 공격이 올라갈 때도 있다."
    zh_simp: "用钢铁之爪\n劈开对手进行攻击。\n有时会提高自己的攻击。"
    zh_trad: "用鋼鐵之爪\n撕裂對手進行攻擊。\n有時會提高自己的攻擊。"
metal_sound:
  names:
    jp_kanji: きんぞくおん
    en: Metal Sound
    fr: Strido-Son
    it: Ferrostrido
    de: Metallsound
    es: Eco Metálico
    ko: 금속음
    zh_simp: 金属音
    zh_trad: 金屬音
  descriptions:
    jp_kanji: "金属を　こすって　でるような\nいやな　音を　聞かせる。\n相手の　特防を　がくっと　さげる。"
    en: "A horrible sound like scraping metal harshly lowers\nthe target’s Sp. Def stat."
    fr: "Un cri horrible tel un crissement métallique qui\nréduit beaucoup la Défense Spéciale de l’ennemi."
    it: "Orribile stridio, simile a quello prodotto dal\nmetallo, che riduce di molto la Difesa Speciale\ndel bersaglio."
    de: "Stößt einen spitzen Schrei aus, der die\nSpezial-Verteidigung des Zieles stark senkt."
    es: "Horrible chirrido metálico que baja mucho la Defensa\nEspecial del objetivo."
    ko: "금속을 긁을 때 나는 듯한\n싫은 소리를 들려준다.\n상대의 특수방어를 크게 떨어뜨린다."
    zh_simp: "让对手听摩擦金属般\n讨厌的声音。\n大幅降低对手的特防。"
    zh_trad: "讓對手聽如同金屬摩擦般\n的刺耳聲。\n大幅降低對手的特防。"
meteor_assault:
  names:
    jp_kanji: スターアサルト
    en: Meteor Assault
    fr: Joute Astrale
    it: Sfolgorassalto
    de: Sternensturm
    es: Asalto Estelar
    ko: 스타어설트
    zh_simp: 流星突击
    zh_trad: 流星突擊
  descriptions:
    jp_kanji: "太い　クキを　ふりまわして　攻撃。\nただし　自分も　よろめいてしまうため\n次の　ターンは　動けなくなる。"
    en: "The user attacks wildly with its thick leek.\nThe user can’t move on the next turn, because the\nforce of this move makes it stagger."
    fr: "Le lanceur attaque son adversaire avec son poireau.\nToutefois, cette action le fait vaciller et il doit\nse reposer au tour suivant."
    it: "Chi la usa attacca il bersaglio brandendo un grosso\ngambo, ma perde l’equilibrio e nel turno successivo\nnon può agire."
    de: "Der Anwender greift mit seiner Lauchstange an. Von der\nWucht der Attacke wird ihm jedoch so schwindelig,\ndass er in der nächsten Runde nicht handeln kann."
    es: "El usuario agita violentamente su grueso puerro para\natacar, pero el mareo que le provocan las sacudidas le\nimpide moverse en el turno siguiente."
    ko: "굵은 줄기를 휘둘러서 공격한다.\n단, 자신도 비틀거리기 때문에\n다음 턴은 움직일 수 없다."
    zh_simp: "大力挥舞粗壮的茎进行攻击。\n但同时自己也会被晃晕，\n下一回合自己将无法动弹。"
    zh_trad: "揮舞粗壯的莖進行攻擊。\n但同時自己也會站不穩，\n下一回合將無法動彈。"
meteor_beam:
  names:
    jp_kanji: メテオビーム
    en: Meteor Beam
    fr: Laser Météore
    it: Raggiometeora
    de: Meteorstrahl
    es: Rayo Meteórico
    ko: 메테오빔
    zh_simp: 流星光束
    zh_trad: 流星光束
  descriptions:
    jp_kanji: "１ターン目に　宇宙の　力を\n集めることで　特攻が　あがり\n２ターン目に　相手を　攻撃する。"
    en: "In this two-turn attack, the user gathers space power\nand boosts its Sp. Atk stat, then attacks the target\non the next turn."
    fr: "Le lanceur concentre l’énergie cosmique au premier\ntour, ce qui augmente son Attaque Spéciale, et frappe\nau second."
    it: "Chi la usa accumula l’energia dello spazio nel primo\nturno per aumentare l’Attacco Speciale, quindi\nattacca nel turno successivo."
    de: "Der Anwender sammelt in Runde 1 kosmische Kräfte\nund erhöht damit seinen Spezial-Angriff, bevor er in\nRunde 2 das Ziel angreift."
    es: "El usuario dedica el primer turno a aumentar su\nAtaque Especial acumulando energía cósmica y lanza\nsu ofensiva contra el objetivo en el segundo."
    ko: "1턴째에 우주의 힘을 모아서\n특수공격을 올리고\n2턴째에 상대를 공격한다."
    zh_simp: "第１回合聚集宇宙之力提高特攻，\n第２回合攻击对手。"
    zh_trad: "使用後的第１回合會聚集\n宇宙的力量來提高特攻，\n並於第２回合攻擊對手。"
meteor_mash:
  names:
    jp_kanji: コメットパンチ
    en: Meteor Mash
    fr: Poing Météore
    it: Meteorpugno
    de: Sternenhieb
    es: Puño Meteoro
    ko: 코멧펀치
    zh_simp: 彗星拳
    zh_trad: 彗星拳
  descriptions:
    jp_kanji: "すい星の　ごとく　パンチを　くりだして\n相手を　攻撃する。　自分の\n攻撃が　あがることが　ある。"
    en: "The target is hit with a hard punch fired like a\nmeteor. This may also raise the user’s Attack stat."
    fr: "Un coup de poing lancé à la vitesse d’un météore.\nPeut aussi augmenter l’Attaque du lanceur."
    it: "Colpisce il bersaglio con un pugno veloce come\nuna meteora. Può far salire l’Attacco di chi la usa."
    de: "Angriff mit einem harten, schnellen Schlag. Erhöht\neventuell Angriffs-Wert des Anwenders."
    es: "Puñetazo que impacta como un meteorito y puede subir\nel Ataque del agresor."
    ko: "혜성과 같은 펀치를 날려서\n상대를 공격한다. 자신의\n공격이 올라갈 때가 있다."
    zh_simp: "使出彗星般的拳头攻击对手。\n有时会提高自己的攻击。"
    zh_trad: "使出如同彗星般的拳頭攻擊對手。\n有時會提高自己的攻擊。"
metronome:
  names:
    jp_kanji: ゆびをふる
    en: Metronome
    fr: Métronome
    it: Metronomo
    de: Metronom
    es: Metrónomo
    ko: 손가락흔들기
    zh_simp: 挥指
    zh_trad: 揮指
  descriptions:
    jp_kanji: "指をふり　自分の　脳を　刺激して\nすべての　技の　なかから\nどれか　１つを　くりだす。"
    en: "The user waggles a finger and stimulates its brain\ninto randomly using nearly any move."
    fr: "Le lanceur agite un doigt et stimule son cerveau pour\nutiliser presque n’importe quelle capacité au hasard."
    it: "Chi la usa fa di no con il dito e stimola il cervello\na usare a caso una delle tante mosse esistenti."
    de: "Bewegt Finger, um das Gehirn zu stimulieren.\nWählt zufällig eine Attacke aus."
    es: "Mueve un dedo y estimula su cerebro para usar al azar\ncasi cualquier movimiento."
    ko: "손가락을 흔들어 자신의 뇌를\n자극해서 모든 기술 중\n어느 하나를 날린다."
    zh_simp: "挥动手指刺激自己的大脑，\n从所有的招式中\n任意使出１个。"
    zh_trad: "揮動手指刺激自己的大腦，\n從全部的招式中\n隨機選出１招使出。"
milk_drink:
  names:
    jp_kanji: ミルクのみ
    en: Milk Drink
    fr: Lait à Boire
    it: Buonlatte
    de: Milchgetränk
    es: Batido
    ko: 우유마시기
    zh_simp: 喝牛奶
    zh_trad: 喝牛奶
  descriptions:
    jp_kanji: "最大ＨＰの　半分\n自分の　ＨＰを　回復する。"
    en: "The user restores its own HP by up to half of its\nmax HP."
    fr: Le lanceur récupère jusqu’à la moitié de ses PV max.
    it: Chi la usa recupera metà dei propri PS massimi.
    de: "KP des Anwenders werden um 50 % der maximalen KP\naufgefüllt."
    es: Restaura la mitad de los PS máximos del usuario.
    ko: "자신의 최대 HP 절반을\n회복한다."
    zh_simp: 回复自己最大ＨＰ的一半。
    zh_trad: 回復自己最大ＨＰ的一半。
mimic:
  names:
    jp_kanji: ものまね
    en: Mimic
    fr: Copie
    it: Mimica
    de: Mimikry
    es: Mimético
    ko: 흉내내기
    zh_simp: 模仿
    zh_trad: 模仿
  descriptions:
    jp_kanji: "相手が最後に使った技を\n戦闘のあいだ\n自分の技にすることができる。"
    en: "The user copies the target’s last move. The move can be\nused during battle until the Pokémon is switched out."
    fr: "Le lanceur copie la dernière capacité utilisée par\nla cible et la conserve tant qu’il reste au combat."
    it: "Chi la usa copia l’ultima mossa usata dal bersaglio\ne la conserva finché rimane in campo."
    de: "Kopiert die zuvor ausgeführte Attacke des Zieles.\nDiese kann im Kampf bis zur Auswechslung verwendet\nwerden."
    es: "Copia el último movimiento usado por el objetivo y\npuede utilizarlo mientras esté en el combate."
    ko: "상대가 마지막에 사용한 기술을\n배틀을 하는 동안\n자신의 기술로 만들 수 있다."
    zh_simp: "可以将对手\n最后使用的招式，\n在战斗内变成自己的招式。"
    zh_trad: "在戰鬥期間，\n將對手最近一次使用的招式\n變成自己的招式。"
mind_blown:
  names:
    jp_kanji: ビックリヘッド
    en: Mind Blown
    fr: Caboche-Kaboum
    it: Sbalorditesta
    de: Knallkopf
    es: Cabeza Sorpresa
    ko: 깜짝헤드
    zh_simp: 惊爆大头
    zh_trad: 驚爆大頭
  descriptions:
    jp_kanji: "自分の　頭を　爆発　させて\n周りの　すべてを　攻撃する。\n自分も　ダメージを　受けてしまう。"
    en: "The user attacks everything around it by causing its\nown head to explode. This also damages the user."
    fr: "Le lanceur fait exploser sa tête pour attaquer\ntoutes les cibles autour de lui.\nIl subit aussi des dégâts."
    it: "Chi la usa fa esplodere la propria testa per\nattaccare tutti i Pokémon che ha intorno,\nma subisce danni."
    de: "Der Anwender greift alle Pokémon im Umkreis an,\nindem er seinen Kopf explodieren lässt. Dabei verletzt\ner sich auch selbst."
    es: "El usuario hace explotar su cabeza para atacar a todos\nlos Pokémon que se hallan a su alrededor, aunque\ntambién se hiere a sí mismo."
    ko: "자신의 머리를 폭발시켜\n주위의 모든 것을 공격한다.\n자신도 데미지를 받는다."
    zh_simp: "让自己的头爆炸，\n来攻击周围的一切。\n自己也会受到伤害。"
    zh_trad: "會讓自己的頭爆炸，\n來攻擊周遭的一切。\n自己也會受到傷害。"
mind_reader:
  names:
    jp_kanji: こころのめ
    en: Mind Reader
    fr: Lire-Esprit
    it: Leggimente
    de: Willensleser
    es: Telépata
    ko: 마음의눈
    zh_simp: 心之眼
    zh_trad: 心之眼
  descriptions:
    jp_kanji: "相手の　動きを　心で　感じて\n次の　攻撃が　必ず\n相手に　当たるように　する。"
    en: "The user senses the target’s movements with its\nmind to ensure its next attack does not miss\nthe target."
    fr: "Le lanceur analyse les mouvements de l’ennemi\npour être sûr de toucher au coup suivant."
    it: "Chi la usa prevede i movimenti del bersaglio\nper mandare a segno l’attacco successivo."
    de: "Ahnt Bewegungen des Zieles voraus, um zu\ngewährleisten, dass die nächste eigene Attacke\ntrifft."
    es: "El usuario adivina los movimientos del objetivo para\nhacer que su siguiente ataque no falle."
    ko: "상대의 움직임을 마음으로 읽어\n다음 공격을 반드시\n상대에게 명중시킨다."
    zh_simp: "用心感受对手的行动，\n下次攻击必定\n会击中对手。"
    zh_trad: "用心感受對手的行動模式，\n下次攻擊時必定\n會命中對手。"
minimize:
  names:
    jp_kanji: ちいさくなる
    en: Minimize
    fr: Lilliput
    it: Minimizzato
    de: Komprimator
    es: Reducción
    ko: 작아지기
    zh_simp: 变小
    zh_trad: 變小
  descriptions:
    jp_kanji: "体を　ちぢめて　小さく　みせて\n自分の　回避率を\nぐーんと　あげる。"
    en: "The user compresses its body to make itself look\nsmaller, which sharply raises its evasiveness."
    fr: "Le lanceur comprime son corps pour se faire tout petit\net beaucoup augmenter son Esquive."
    it: "Il corpo di chi la usa si comprime e diventa\npiù piccolo. La sua capacità di elusione\naumenta di molto."
    de: "Anwender schrumpft, um seinen Ausweichwert stark zu\nerhöhen."
    es: El usuario mengua para aumentar mucho la Evasión.
    ko: "몸을 축소하여 작게 보임으로써\n자신의 회피율을 크게 올린다."
    zh_simp: "蜷缩身体显得很小，\n从而大幅提高\n自己的闪避率。"
    zh_trad: "蜷縮身體使自己顯得很小，\n大幅提高\n自己的閃避率。"
miracle_eye:
  names:
    jp_kanji: ミラクルアイ
    en: Miracle Eye
    fr: Œil Miracle
    it: Miracolvista
    de: Wunderauge
    es: Gran Ojo
    ko: 미라클아이
    zh_simp: 奇迹之眼
    zh_trad: 奇跡之眼
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mirror_coat:
  names:
    jp_kanji: ミラーコート
    en: Mirror Coat
    fr: Voile Miroir
    it: Specchiovelo
    de: Spiegelcape
    es: Manto Espejo
    ko: 미러코트
    zh_simp: 镜面反射
    zh_trad: 鏡面反射
  descriptions:
    jp_kanji: "相手から　受けた　特殊攻撃の\nダメージを　２倍に　して\nその相手に　返す。"
    en: "A retaliation move that counters any special attack,\ninflicting double the damage taken."
    fr: "Une riposte qui contre n’importe quelle capacité\nspéciale en infligeant le double des dégâts subis."
    it: "Mossa che replica ogni attacco speciale,\narrecando il doppio del danno ricevuto."
    de: "Kontert die Spezial-Attacke des Gegners mit doppeltem\nSchaden."
    es: "Responde a un ataque especial ocasionando el doble\ndel daño recibido."
    ko: "상대에게 받은 특수공격의\n데미지를 2배로 만들어\n그 상대에게 돌려준다."
    zh_simp: "从对手那里受到\n特殊攻击的伤害将以\n２倍返还给同一个对手。"
    zh_trad: "將來自對手的特殊攻擊傷害加倍後，\n返還給該對手。"
mirror_move:
  names:
    jp_kanji: オウムがえし
    en: Mirror Move
    fr: Mimique
    it: Speculmossa
    de: Spiegeltrick
    es: Espejo
    ko: 따라하기
    zh_simp: 鹦鹉学舌
    zh_trad: 鸚鵡學舌
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mirror_shot:
  names:
    jp_kanji: ミラーショット
    en: Mirror Shot
    fr: Miroi-Tir
    it: Cristalcolpo
    de: Spiegelsalve
    es: Disparo Espejo
    ko: 미러숏
    zh_simp: 镜光射击
    zh_trad: 鏡光射擊
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
mist:
  names:
    jp_kanji: しろいきり
    en: Mist
    fr: Brume
    it: Nebbia
    de: Weißnebel
    es: Neblina
    ko: 흰안개
    zh_simp: 白雾
    zh_trad: 白霧
  descriptions:
    jp_kanji: "白い霧で　体を　おおう。\n５ターンの　間　相手に\n能力を　さげられなく　なる。"
    en: "The user cloaks itself and its allies in a white mist\nthat prevents any of their stats from being lowered\nfor five turns."
    fr: "Une brume blanche enveloppe l’équipe du lanceur\net empêche la réduction des stats pour cinq tours."
    it: "Chi la usa attira una nebbia che blocca la riduzione\ndelle statistiche per sé e gli alleati per cinque turni."
    de: "Anwender schützt das Team mit einem Nebel.\nVerhindert Statussenkungen für fünf Runden."
    es: "Rodea de fina niebla al usuario y protege las\ncaracterísticas de su equipo durante cinco turnos."
    ko: "하얀 안개로 몸을 덮는다.\n5턴 동안 상대에 의해\n능력이 떨어지지 않게 된다."
    zh_simp: "用白雾覆盖身体。\n在５回合内不会让对手\n降低自己的能力。"
    zh_trad: "用白霧覆蓋身體。\n在５回合內不會讓對手\n降低自己的能力。"
mist_ball:
  names:
    jp_kanji: ミストボール
    en: Mist Ball
    fr: Ball’Brume
    it: Foschisfera
    de: Nebelball
    es: Bola Neblina
    ko: 미스트볼
    zh_simp: 薄雾球
    zh_trad: 薄霧球
  descriptions:
    jp_kanji: "霧状の　羽毛で　包みこみ\n攻撃する。\n相手の　特攻を　さげることが　ある。"
    en: "A mist-like flurry of down envelops and damages the\ntarget. This may also lower the target’s Sp. Atk stat."
    fr: "Une bulle de brume inflige des dégâts à l’ennemi.\nPeut aussi réduire son Attaque Spéciale."
    it: "Una sfera di nebbia avvolge e danneggia il bersaglio.\nPuò anche ridurne l’Attacco Speciale."
    de: "Angriff mit einer Nebelwolke aus Daunen. Senkt\neventuell den Spezial-Angriff des Zieles."
    es: "Banco de niebla que puede bajar el Ataque Especial del\nobjetivo."
    ko: "안개의 깃털로 둘러싸\n공격한다. 상대의 특수공격을\n떨어뜨릴 때가 있다."
    zh_simp: "用围绕着雾状\n羽毛的球进行攻击。\n有时会降低对手的特攻。"
    zh_trad: "將霧狀的羽毛聚集成團進行攻擊。\n有時會降低對手的特攻。"
misty_explosion:
  names:
    jp_kanji: ミストバースト
    en: Misty Explosion
    fr: Explo-Brume
    it: Nebbioscoppio
    de: Nebelexplosion
    es: Bruma Explosiva
    ko: 미스트버스트
    zh_simp: 薄雾炸裂
    zh_trad: 薄霧炸裂
  descriptions:
    jp_kanji: "自分の　周りに　いる　すべてを\n攻撃するが　使うと　瀕死になる。\nミストフィールドで　威力が　あがる。"
    en: "The user attacks everything around it and faints upon\nusing this move. This move’s power is increased on\nMisty Terrain."
    fr: "Le lanceur frappe tous les Pokémon autour de lui\nen explosant, ce qui le met K.O. La puissance de\ncette attaque augmente si un Champ Brumeux est actif."
    it: "Chi la usa attacca tutti i Pokémon che ha intorno,\nma poi va KO. La potenza della mossa aumenta\nquando è attivo un Campo Nebbioso."
    de: "Der Anwender greift alle Pokémon im Umkreis an und\nwird danach kampfunfähig. Die Stärke dieser Attacke\nsteigt, wenn ein Nebelfeld aktiv ist."
    es: "El usuario ataca a todos a su alrededor, pero se debilita\nde inmediato. La potencia del movimiento aumenta si el\nterreno está cubierto por un campo de niebla."
    ko: "자신의 주위에 있는 모두를\n공격하지만 사용하면 기절한다.\n미스트필드일 때 위력이 올라간다."
    zh_simp: "对自己周围的所有宝可梦进行攻击，\n但使出后，自己会陷入昏厥。\n在薄雾场地上，招式威力会提高。"
    zh_trad: "對自己周圍的所有寶可夢進行攻擊，\n但使出後，自己會陷入瀕死。\n在薄霧場地時，招式威力會提高。"
misty_terrain:
  names:
    jp_kanji: ミストフィールド
    en: Misty Terrain
    fr: Champ Brumeux
    it: Campo Nebbioso
    de: Nebelfeld
    es: Campo de Niebla
    ko: 미스트필드
    zh_simp: 薄雾场地
    zh_trad: 薄霧場地
  descriptions:
    jp_kanji: "５ターンの　間　地面にいると\n状態異常に　ならず　ドラゴン技の\nダメージも　半分になる。"
    en: "This protects Pokémon on the ground from status\nconditions and halves damage from Dragon-type\nmoves for five turns."
    fr: "Pendant cinq tours, les Pokémon au sol ne peuvent\npas subir d’altération de statut et la puissance\ndes capacités de type Dragon est divisée par deux."
    it: "Per cinque turni il terreno entra nello stato di Campo\nNebbioso: i Pokémon a terra sono immuni ai problemi\ndi stato e la potenza delle mosse Drago è dimezzata."
    de: "Schützt fünf Runden lang alle Pokémon, die den Boden\nberühren, vor Statusproblemen. Der erlittene Schaden\ndurch Drachen-Attacken wird halbiert."
    es: "Durante cinco turnos, los Pokémon que están en el\nsuelo no sufren problemas de estado y se reduce a la\nmitad el daño de los movimientos de tipo Dragón."
    ko: "5턴 동안 땅에 있으면\n상태 이상이 되지 않고\n드래곤타입 기술의 데미지도 절반이 된다."
    zh_simp: "在５回合内，\n地面上的宝可梦不会陷入异常状态。\n龙属性招式的伤害也会减半。"
    zh_trad: "在５回合內，\n地面上的寶可夢不會陷入異常狀態。\n龍屬性招式的傷害也會減半。"
moonblast:
  names:
    jp_kanji: ムーンフォース
    en: Moonblast
    fr: Pouvoir Lunaire
    it: Forza Lunare
    de: Mondgewalt
    es: Fuerza Lunar
    ko: 문포스
    zh_simp: 月亮之力
    zh_trad: 月亮之力
  descriptions:
    jp_kanji: "月のパワーを借りて\n相手を攻撃する。\n相手の攻めの力をさげることもある。"
    en: "Borrowing the power of the moon, the user attacks the\ntarget. This may also lower the target’s offensive stats."
    fr: "Attaque l’ennemi grâce au pouvoir de la lune.\nPeut aussi baisser la puissance offensive de la cible."
    it: "Chi la usa sfrutta il potere della luna per attaccare\nil bersaglio e può anche ridurne la forza offensiva."
    de: "Der Anwender macht sich die Kraft des Mondes zunutze,\num anzugreifen. Senkt eventuell die Offensivkraft des\nZieles."
    es: "Invoca el poder de la luna para atacar al objetivo y\nademás puede disminuir su ofensiva."
    ko: "달의 파워를 빌려서\n상대를 공격한다.\n상대의 공격력을 떨어뜨릴 때가 있다."
    zh_simp: "借用月亮的力量攻击对手。\n有时会降低对手的进攻力。"
    zh_trad: "借用月亮的力量攻擊對手。\n有時還會降低對手的進攻力。"
moongeist_beam:
  names:
    jp_kanji: シャドーレイ
    en: Moongeist Beam
    fr: Rayon Spectral
    it: Raggio d’Ombra
    de: Schattenstrahl
    es: Rayo Umbrío
    ko: 섀도레이
    zh_simp: 暗影之光
    zh_trad: 暗影之光
  descriptions:
    jp_kanji: "怪しい　光線を　放って\n攻撃する。相手の　特性を\n無視して　攻撃　することが　できる。"
    en: "The user emits a sinister ray to attack the target.\nThis move can be used on the target regardless of\nits Abilities."
    fr: "Le lanceur attaque avec un rayon de lumière mystérieux.\nIgnore le talent de la cible."
    it: "Chi la usa proietta sul bersaglio un misterioso\nraggio di luce. Questo attacco ignora l’abilità\ndel bersaglio."
    de: "Der Anwender greift mit einem unheimlichen Lichtstrahl\nan. Diese Attacke ignoriert die Fähigkeit des Zieles."
    es: "Ataca con un rayo misterioso que ignora la habilidad\ndel objetivo."
    ko: "괴상한 광선을 쏘아\n공격한다. 상대의 특성을\n무시하고 공격할 수 있다."
    zh_simp: "放出奇怪的光线攻击对手。\n可以无视对手的特性进行攻击。"
    zh_trad: "放出奇怪的光線攻擊對手。\n可不顧對手的特性進行攻擊。"
moonlight:
  names:
    jp_kanji: つきのひかり
    en: Moonlight
    fr: Rayon Lune
    it: Lucelunare
    de: Mondschein
    es: Luz Lunar
    ko: 달의불빛
    zh_simp: 月光
    zh_trad: 月光
  descriptions:
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP\nregained varies with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Chi la usa recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
morning_sun:
  names:
    jp_kanji: あさのひざし
    en: Morning Sun
    fr: Aurore
    it: Mattindoro
    de: Morgengrauen
    es: Sol Matinal
    ko: 아침햇살
    zh_simp: 晨光
    zh_trad: 晨光
  descriptions:
    jp_kanji: "自分の　ＨＰを　回復する。\n天気に　よって\n回復の　量が　変化する。"
    en: "The user restores its own HP. The amount of HP\nregained varies with the weather."
    fr: "Un soin qui restaure des PV au lanceur.\nSon efficacité varie en fonction de la météo."
    it: "Chi la usa recupera PS. Il numero di PS recuperati\ndipende dalle condizioni atmosferiche."
    de: "Füllt KP des Anwenders auf. Die Menge hängt vom\nWetter ab."
    es: "Restaura PS del usuario. La cantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를 회복한다.\n날씨에 따라\n회복량이 변한다."
    zh_simp: "回复自己的ＨＰ。\n根据天气的不同，\n回复量也会有所变化。"
    zh_trad: "回復自己的ＨＰ。\n回復量會隨著天氣的不同\n而有所變化。"
mountain_gale:
  names:
    jp_kanji: ひょうざんおろし
    en: Mountain Gale
    fr: Bise Glaciaire
    it: Soffio d’Iceberg
    de: Frostfallwind
    es: Viento Carámbano
    ko: 빙산바람
    zh_simp: 冰山风
    zh_trad: 冰山風
  descriptions:
    jp_kanji: "氷山のような\n大きな氷塊をぶつけて攻撃する。"
    en: "The user hurls giant chunks of ice at the target to\ninflict damage."
    fr: "Le lanceur envoie un bloc de glace de la taille\nd’un iceberg sur l’ennemi."
    it: "Il bersaglio viene colpito da un blocco di ghiaccio\ngrande come un iceberg."
    de: Der Anwender wirft gigantische Eisbrocken auf das Ziel.
    es: Ataca con unos carámbanos grandes como icebergs.
    ko: "빙산처럼 커다란\n얼음덩어리를 부딪쳐서 공격한다."
    zh_simp: "将冰山般巨大的冰块\n砸向对手进行攻击。"
    zh_trad: "將冰山般巨大的冰塊\n砸向對手進行攻擊。"
mud_bomb:
  names:
    jp_kanji: どろばくだん
    en: Mud Bomb
    fr: Boue-Bombe
    it: Pantanobomba
    de: Schlammbombe
    es: Bomba Fango
    ko: 진흙폭탄
    zh_simp: 泥巴炸弹
    zh_trad: 泥巴炸彈
  descriptions:
    jp_kanji: "硬い泥の弾を\n相手に発射して攻撃する。\n相手の技を回避しやすくなる。"
    en: "The user launches a hard-packed mud ball to inflict\ndamage. Incoming moves also become more likely\nto miss."
    fr: "Le lanceur attaque à l’aide d’une boule de boue\nsolidifiée. Les capacités de la cible deviennent\nplus faciles à esquiver."
    it: "Chi la usa lancia una compatta palla di fango. Inoltre,\nfa sì che le mosse nemiche falliscano più facilmente."
    de: "Anwender greift mit einem festen Schlammklumpen an.\nBewirkt, dass gegnerische Attacken den Anwender\nhäufiger verfehlen."
    es: "El usuario ataca lanzando una compacta bola de fango.\nAdemás, hace que evite con mayor facilidad los\nmovimientos enemigos."
    ko: "단단한 진흙구슬을\n상대에게 발사하여 공격한다.\n상대의 기술을 회피하기 쉬워진다."
    zh_simp: "向对手发射\n坚硬的泥弹进行攻击。\n会变得较容易闪避对手的招式。"
    zh_trad: "向對手發射\n堅硬的泥彈進行攻擊。\n會變得較容易閃避對手的招式。"
mud_shot:
  names:
    jp_kanji: マッドショット
    en: Mud Shot
    fr: Tir de Boue
    it: Colpodifango
    de: Lehmschuss
    es: Disparo Lodo
    ko: 머드숏
    zh_simp: 泥巴射击
    zh_trad: 泥巴射擊
  descriptions:
    jp_kanji: "泥の　塊を\n相手に　投げつけて　攻撃する。\n同時に　相手の　素早さを　さげる。"
    en: "The user attacks by hurling a blob of mud at the\ntarget. This also lowers the target’s Speed stat."
    fr: "Le lanceur attaque en projetant de la boue sur l’ennemi.\nRéduit aussi la Vitesse de la cible."
    it: "Chi la usa attacca lanciando fango sul bersaglio,\nriducendone anche la Velocità."
    de: "Angriff mit Lehm, der den Initiative-Wert des Zieles\nsenkt."
    es: El usuario lanza lodo al objetivo y reduce su Velocidad.
    ko: "진흙 덩어리를\n상대에게 내던져서 공격한다.\n동시에 상대의 스피드를 떨어뜨린다."
    zh_simp: "向对手投掷\n泥块进行攻击。\n同时降低对手的速度。"
    zh_trad: "向對手投擲\n泥塊進行攻擊。\n同時降低對手的速度。"
mud_slap:
  names:
    jp_kanji: どろかけ
    en: Mud-Slap
    fr: Coud’Boue
    it: Fangosberla
    de: Lehmschelle
    es: Bofetón Lodo
    ko: 진흙뿌리기
    zh_simp: 掷泥
    zh_trad: 擲泥
  descriptions:
    jp_kanji: "相手の顔などに\n泥を投げつけて攻撃する。\n相手の技を回避しやすくなる。"
    en: "The user hurls mud in the target’s face to inflict damage.\nIncoming moves also become more likely to miss."
    fr: "Le lanceur envoie de la boue au visage de l’ennemi.\nLes capacités de la cible deviennent plus faciles à\nesquiver."
    it: "Chi la usa butta fango in faccia al bersaglio arrecandogli\ndanni. Inoltre, fa sì che le mosse nemiche falliscano più\nfacilmente."
    de: "Schadet dem Ziel durch Matsch und bewirkt, dass\ngegnerische Attacken den Anwender häufiger verfehlen."
    es: "El usuario ataca echando lodo en la cara del objetivo.\nAdemás, hace que evite con más facilidad los\nmovimientos enemigos."
    ko: "상대의 얼굴 등에\n진흙을 내던져서 공격한다.\n상대의 기술을 회피하기 쉬워진다."
    zh_simp: "向对手的脸等\n投掷泥块进行攻击。\n会变得较容易闪避对手的招式。"
    zh_trad: "向對手的臉等處\n投擲泥巴進行攻擊。\n會變得較容易閃避對手的招式。"
mud_sport:
  names:
    jp_kanji: どろあそび
    en: Mud Sport
    fr: Lance-Boue
    it: Fangata
    de: Lehmsuhler
    es: Chapoteo Lodo
    ko: 흙놀이
    zh_simp: 玩泥巴
    zh_trad: 玩泥巴
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
muddy_water:
  names:
    jp_kanji: だくりゅう
    en: Muddy Water
    fr: Ocroupi
    it: Fanghiglia
    de: Lehmbrühe
    es: Agua Lodosa
    ko: 탁류
    zh_simp: 浊流
    zh_trad: 濁流
  descriptions:
    jp_kanji: "濁った　水を\n相手に　発射して　攻撃する。\n命中率を　さげることが　ある。"
    en: "The user attacks by shooting muddy water at opposing\nPokémon. This may also lower their accuracy."
    fr: "Le lanceur attaque en projetant de l’eau boueuse.\nPeut aussi réduire la Précision de l’ennemi."
    it: "Chi la usa attacca i nemici che ha intorno con un\ngetto di fango che può anche ridurne la precisione."
    de: "Greift mit Matsch an und senkt eventuell die\nGenauigkeit der gegnerischen Pokémon."
    es: "Ataque con agua lodosa que puede bajar la Precisión\ndel equipo rival."
    ko: "탁해진 물을\n상대에게 발사하여 공격한다.\n명중률을 떨어뜨릴 때가 있다."
    zh_simp: "向对手喷射\n浑浊的水进行攻击。\n有时会降低对手的命中率。"
    zh_trad: "用渾濁的污水攻擊對手。\n有時會降低對手的命中率。"
multi_attack:
  names:
    jp_kanji: マルチアタック
    en: Multi-Attack
    fr: Coup Varia-Type
    it: Multiattacco
    de: Multi-Angriff
    es: Multiataque
    ko: 멀티어택
    zh_simp: 多属性攻击
    zh_trad: 多屬性攻擊
  descriptions:
    jp_kanji: "高い　エネルギーを　まといつつ\n相手に　ぶつかって　攻撃する。\nメモリに　より　タイプが　変わる。"
    en: "Cloaking itself in high energy, the user slams into the\ntarget. The memory held determines the move’s type."
    fr: "Le Pokémon s’entoure d’une puissante énergie\navant de foncer sur sa cible. Le type de la capacité\ndépend de la ROM installée."
    it: "Chi la usa si avvolge in un potente campo\nenergetico e colpisce il bersaglio. Il tipo della\nmossa varia in base alla ROM installata."
    de: "Der Anwender sammelt eine große Menge Energie und\ngreift das Ziel damit an. Der Typ der Attacke hängt von\ndem der Disc ab."
    es: "El Pokémon se rodea de una potente energía con la\nque golpea al rival. El tipo del movimiento depende\ndel disco que lleva el usuario."
    ko: "높은 에너지를 둘러싸\n상대에게 부딪쳐 공격한다.\n메모리에 따라 타입이 바뀐다."
    zh_simp: "一边覆盖高能量，\n一边撞向对手进行攻击。\n根据存储碟不同，属性会改变。"
    zh_trad: "讓強大能量圍繞身體，\n撞向對手進行攻擊。\n招式屬性會隨著記憶碟而改變。"
mystical_fire:
  names:
    jp_kanji: マジカルフレイム
    en: Mystical Fire
    fr: Feu Ensorcelé
    it: Magifiamma
    de: Magieflamme
    es: Llama Embrujada
    ko: 매지컬플레임
    zh_simp: 魔法火焰
    zh_trad: 魔法火焰
  descriptions:
    jp_kanji: "口から吐きだす特別\n熱い炎で攻撃する。\n相手の攻めの力をさげる。"
    en: "The user attacks by breathing a special, hot fire.\nThis also lowers the target’s offensive stats."
    fr: "Attaque avec des flammes brûlantes soufflées de\nla bouche du lanceur. Baisse la puissance offensive\nde la cible."
    it: "Colpisce il bersaglio soffiandogli contro delle fiammate\nincredibilmente roventi e riducendone la forza offensiva."
    de: "Der Anwender greift das Ziel an, indem er ihm\neine besondere, heiße Flamme entgegenbläst.\nSenkt die Offensivkraft des Zieles."
    es: "El usuario lanza por la boca una singular llama a gran\ntemperatura con la que ataca a su oponente y baja su\nofensiva."
    ko: "입에서 내뱉는 아주\n뜨거운 불꽃으로 공격한다.\n상대의 공격력을 떨어뜨린다."
    zh_simp: "从口中喷出特别灼热的\n火焰进行攻击。\n会降低对手的进攻力。"
    zh_trad: "從口中吐出特別灼熱的\n火焰進行攻擊。\n會降低對手的進攻力。"
mystical_power:
  names:
    jp_kanji: しんぴのちから
    en: Mystical Power
    fr: Force Mystique
    it: Forza Mistica
    de: Mythenkraft
    es: Poder Místico
    ko: 신비의힘
    zh_simp: 神秘之力
    zh_trad: 神秘之力
  descriptions:
    jp_kanji: "不思議な力で自分を強化する。\n攻撃寄りのときは攻めの力を\n防御寄りのときは守りの力をあげる。"
    en: "The user strengthens itself with a mysterious power.\nIf it excels in offense, its offensive stats are raised.\nIf it excels in defense, its defensive stats are raised."
    fr: "Le lanceur utilise un pouvoir mystique pour se renforcer.\nS’il excelle en attaque, sa puissance offensive augmente.\nS’il excelle en défense, sa puissance défensive augmente."
    it: "Misterioso potere rafforzante che aumenta la forza\noffensiva se chi la usa è predisposto all’attacco,\ne la forza difensiva se è predisposto alla difesa."
    de: "Der Anwender stärkt sich durch eine wundersame Kraft.\nIst seine Offensive besser, steigt seine Offensivkraft.\nIst seine Defensive besser, steigt seine Defensivkraft."
    es: "Un misterioso poder fortalece al usuario. Si su ofensiva\nes mayor que su defensiva, aumenta la primera. En caso\ncontrario, aumenta la defensiva."
    ko: "신비한 힘으로 자신을 강화한다.\n공격에 특화된 경우, 공격력이 오르고\n방어에 특화된 경우, 방어력이 오른다."
    zh_simp: "用不可思议的力量强化自己。\n偏向攻击时会提高进攻力，\n偏向防御时会提高防守力。"
    zh_trad: "用不可思議的力量強化自己。\n偏向攻擊時會提高進攻力，\n偏向防禦時會提高防守力。"
nasty_plot:
  names:
    jp_kanji: わるだくみ
    en: Nasty Plot
    fr: Machination
    it: Congiura
    de: Ränkeschmied
    es: Maquinación
    ko: 나쁜음모
    zh_simp: 诡计
    zh_trad: 詭計
  descriptions:
    jp_kanji: "悪いことを考えて頭を活性化させて\n自分の攻めの力をあげる。"
    en: "The user stimulates its brain by thinking bad thoughts,\nraising the user’s offensive stats."
    fr: "Le lanceur stimule son esprit par de mauvaises pensées\net augmente sa puissance offensive."
    it: "Chi la usa stimola il cervello pensando a cose cattive.\nAumenta la forza offensiva."
    de: "Anwender stimuliert sein Gehirn und hat finstere\nGedanken, wodurch sich seine Offensivkraft erhöht."
    es: "Estimula su cerebro pensando en cosas malas, lo\nque aumenta su ofensiva."
    ko: "나쁜 일을 생각해서 머리를 활성화시킨다.\n자신의 공격력을 올린다."
    zh_simp: "谋划诡计，激活头脑。\n提高自己的进攻力。"
    zh_trad: "動歪腦筋，活化大腦，\n提高自己的進攻力。"
natural_gift:
  names:
    jp_kanji: しぜんのめぐみ
    en: Natural Gift
    fr: Don Naturel
    it: Dononaturale
    de: Beerenkräfte
    es: Don Natural
    ko: 자연의은혜
    zh_simp: 自然之恩
    zh_trad: 自然之恩
  descriptions:
    jp_kanji: "この技は　使えません\n思い出すことが　できなくなりますが\n技を　忘れることを　おすすめします"
    en: "This move can’t be used.\nIt’s recommended that this move is forgotten.\nOnce forgotten, this move can’t be remembered."
    fr: "Cette capacité ne peut pas être utilisée.\nIl est recommandé de l’oublier, même s’il sera\nimpossible de se la remémorer une fois oubliée."
    it: "Questa mossa non può essere usata.\nÈ consigliabile farla dimenticare al Pokémon. Tuttavia,\nuna volta dimenticata, non potrà più essere ricordata."
    de: "Diese Attacke kann nicht eingesetzt werden. Du solltest\ndein Pokémon sie vergessen lassen. Beachte aber,\ndass es sich danach nicht wieder an sie erinnern kann."
    es: "Este movimiento no se puede usar, por lo que sería\nmejor olvidarlo, aunque eso implique que no se pueda\nrecordar posteriormente."
    ko: "사용할 수 없는 기술입니다.\n다시 배우게 할 수 없지만\n기술을 잊게 하는 것을 권장합니다."
    zh_simp: "无法使用这个招式。\n虽然忘记之后就再也想不起来了，\n但还是建议忘记这个招式。"
    zh_trad: "無法使用此招式。\n雖然忘記後將無法再想起來，\n但還是建議忘記此招式。"
nature_power:
  names:
    jp_kanji: しぜんのちから
    en: Nature Power
    fr: Force Nature
    it: Naturforza
    de: Natur-Kraft
    es: Adaptación
    ko: 자연의힘
    zh_simp: 自然之力
    zh_trad: 自然之力
  descriptions:
    jp_kanji: "自然の　力で　攻撃する。\n使う　場所で\nでてくる　技が　変化する。"
    en: "This attack makes use of nature’s power. Its\neffects vary depending on the user’s environment."
    fr: "Une attaque qui tire sa force de la nature.\nSon type varie selon le terrain."
    it: "Mossa che fa uso della forza della natura.\nIl suo effetto varia in base all’ambiente."
    de: "Angriff mit der Kraft der Natur. Die Wirkung dieser\nAttacke ist ortsabhängig."
    es: "Usa el poder de la naturaleza para atacar. Su efecto\nvaría según el entorno de combate."
    ko: "자연의 힘으로 공격한다.\n사용하는 장소에 따라\n나오는 기술이 변화한다."
    zh_simp: "用自然之力进行攻击。\n根据所使用场所的不同，\n使出的招式也会有所变化。"
    zh_trad: "用自然之力進行攻擊。\n隨著使用地點的不同，\n使出的招式也會改變。"
natures_madness:
  names:
    jp_kanji: しぜんのいかり
    en: Nature’s Madness
    fr: Ire de la Nature
    it: Ira della Natura
    de: Naturzorn
    es: Furia Natural
    ko: 자연의분노
    zh_simp: 自然之怒
    zh_trad: 自然之怒
  descriptions:
    jp_kanji: "自然の　怒りを　相手に　ぶつける。\n相手の　ＨＰは　半分に　なる。"
    en: "The user hits the target with the force of nature.\nIt halves the target’s HP."
    fr: "Le lanceur déchaîne toute la colère de la nature\npour baisser les PV de la cible de moitié."
    it: "Scatena l’ira della natura sul bersaglio\ne ne dimezza i PS."
    de: "Das Ziel wird vom Zorn der Natur getroffen und verliert\ndadurch die Hälfte seiner KP."
    es: "Golpea al objetivo con la furia de la naturaleza y\nreduce sus PS a la mitad."
    ko: "자연의 분노를 상대에게 부딪친다.\n상대의 HP는 절반이 된다."
    zh_simp: "向对手释放自然之怒。\n对手的ＨＰ会减半。"
    zh_trad: "向對手發洩自然之怒。\n會使對手的ＨＰ減半。"
needle_arm:
  names:
    jp_kanji: ニードルアーム
    en: Needle Arm
    fr: Poing Dard
    it: Pugnospine
    de: Nietenranke
    es: Brazo Pincho
    ko: 바늘팔
    zh_simp: 尖刺臂
    zh_trad: 尖刺臂
  descriptions:
