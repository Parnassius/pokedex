absorb:
  names:
    jp_kana: すいとる
    en: Absorb
    fr: Vol-Vie
    it: Assorbimento
    de: Absorber
    es: Absorber
    ko: 흡수
  descriptions:
    jp_kana: "ようぶんを　すいとり\nこうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを\nかいふくできる。"
    en: "A nutrient-draining\nattack. The user’s\nHP is restored by\nhalf the damage taken\nby the target."
    fr: "Une attaque\nqui convertit la\nmoitié des dégâts\ninfligés en PV."
    it: "Mossa che assorbe\nPS. Chi la usa\nrecupera una quantità\ndi PS pari alla metà\ndel danno inferto."
    de: "Attacke, die die\nHälfte des\nSchadens\nabsorbiert."
    es: "Absorbe la mitad\ndel daño producido."
    ko: "양분을 흡수하여\n공격한다.\n입힌 데미지의\n절반에 해당하는\nHP를 회복할 수 있다."
acid:
  names:
    jp_kana: ようかいえき
    en: Acid
    fr: Acide
    it: Acido
    de: Säure
    es: Ácido
    ko: 용해액
  descriptions:
    jp_kana: "つよい　さんを\nあいてに　かけて\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The foe is attacked\nwith a spray of harsh\nacid. It may also\nlower the target’s\nSp. Def stat."
    fr: "Le lanceur attaque\nl’ennemi avec un jet\nd’acide corrosif. Peut\naussi baisser la Déf.\nSpé. de l’ennemi."
    it: "Colpisce il nemico \nspruzzando un acido\ncorrosivo. Può anche\nridurre la Dif. Sp."
    de: "Versprüht ätzende\nFlüssigkeit, die\neventuell die Spez.-\nVerteidigung des \nGegners senkt."
    es: "Rocía ácido corrosivo.\nPuede bajar la\nDef. Esp."
    ko: "강한 산을\n상대에게 끼얹어\n공격한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
acid_armor:
  names:
    jp_kana: とける
    en: Acid Armor
    fr: Acidarmure
    it: Scudo Acido
    de: Säurepanzer
    es: Armad. Ácida
    ko: 녹기
  descriptions:
    jp_kana: "さいぼうの　へんかで\nえきじょうに　なり\nじぶんの　ぼうぎょを\nぐーんと　あげる。"
    en: "The user alters its\ncellular structure to\nliquefy itself,\nsharply raising its\nDefense stat."
    fr: "Le lanceur modifie sa\nstructure moléculaire\npour se liquéfier et\naugmenter fortement\nsa Défense."
    it: "Chi la usa altera la\nsua struttura\ncellulare passando\nallo stato liquido: la\nDifesa sale di molto."
    de: "Verflüssigt\nKörperzellen des\nAnwenders. Erhöht\nden Verteidigungs-\nWert."
    es: "Transforma la\nestructura celular\npara hacerse líquido\ny aumenta mucho la\nDefensa."
    ko: "세포의 변화로\n액체가 되어\n자신의 방어를\n크게 올린다."
acupressure:
  names:
    jp_kana: つぼをつく
    en: Acupressure
    fr: Acupression
    it: Acupressione
    de: Akupressur
    es: Acupresión
    ko: 경혈찌르기
  descriptions:
    jp_kana: "つぼおしで　からだを\nかっせいか　させる。\nのうりょくの　どれか\nひとつを　ぐーんと\nあげる。"
    en: "The user applies\npressure to stress\npoints, sharply\nboosting one of its\nstats."
    fr: "Le lanceur effectue\ndes pressions pour\naugmenter \nfortement l’une\nde ses stats."
    it: "Chi la usa esercita\npressione su un\npunto nevralgico e\naumenta di molto una\ndelle sue statistiche."
    de: "Anwender erhöht\nDruck auf Stress-\npunkte und steigert\neinen seiner\nStatuswerte enorm."
    es: "La presión en puntos\nclave del cuerpo\npotencia una de sus\ncaracterísticas."
    ko: "경혈을 눌러 몸을\n활성화 시킨다.\n능력 중 하나를\n크게 올린다."
aerial_ace:
  names:
    jp_kana: つばめがえし
    en: Aerial Ace
    fr: Aéropique
    it: Aeroassalto
    de: Aero-Ass
    es: Golpe Aéreo
    ko: 제비반환
  descriptions:
    jp_kana: "すばやい　うごきで\nあいてを　ほんろうして\nきりつける。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user confounds\nthe foe with speed,\nthen slashes.\nThe attack lands\nwithout fail."
    fr: "Le lanceur prend\nl’ennemi de vitesse\net le lacère. N’échoue\njamais."
    it: "Chi la usa confonde\nil nemico con la\nvelocità, poi colpisce.\nAttacco infallibile."
    de: "Eine extrem\nschnelle und\nunausweichbare\nAttacke."
    es: "El usuario lanza un\nataque muy rápido\ne ineludible."
    ko: "재빠른 움직임으로\n상대를 농락해\n벤다.\n공격은 반드시\n명중한다."
aeroblast:
  names:
    jp_kana: エアロブラスト
    en: Aeroblast
    fr: Aéroblast
    it: Aerocolpo
    de: Luftstoß
    es: Aerochorro
    ko: 에어로블라스트
  descriptions:
    jp_kana: "くうきの　うずを\nはっしゃして\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "A vortex of air is\nshot at the foe to\ninflict damage.\nIt has a high\ncritical-hit ratio."
    fr: "Le lanceur projette\nune tornade sur\nl’ennemi pour infliger\ndes dégâts. Taux de\ncritiques élevé."
    it: "Colpisce il nemico\ncon un vortice d’aria\nper danneggiarlo.\nProbabile brutto\ncolpo."
    de: "Erzeugt Luftstrudel\ngegen Gegner. Hohe\nVolltrefferquote."
    es: "Lanza un chorro\nde aire que suele\ndar un golpe crítico."
    ko: "공기의 소용돌이를\n발사하여\n공격한다.\n급소에 맞을\n확률이 높다."
agility:
  names:
    jp_kana: こうそくいどう
    en: Agility
    fr: Hâte
    it: Agilità
    de: Agilität
    es: Agilidad
    ko: 고속이동
  descriptions:
    jp_kana: "ちからを　ぬいて\nからだを　かるくして\nこうそくで　うごく。\nじぶんの　すばやさを\nぐーんと　あげる。"
    en: "The user relaxes and\nlightens its body to\nmove faster.\nIt sharply boosts\nthe Speed stat."
    fr: "Le lanceur se relaxe\net allège son corps\npour augmenter\nconsidérablement sa\nVitesse."
    it: "Chi la usa rilassa e\nalleggerisce il proprio\ncorpo per far salire\ndi molto la Velocità."
    de: "Entspannt den\nKörper, um den\nInitiative-Wert\nstark zu steigern."
    es: "Relaja el cuerpo\npara ganar mucha\nVelocidad."
    ko: "힘을 빼고\n몸을 가볍게 해서\n고속으로 움직인다.\n자신의 스피드를\n크게 올린다."
air_cutter:
  names:
    jp_kana: エアカッター
    en: Air Cutter
    fr: Tranch’Air
    it: Aerasoio
    de: Windschnitt
    es: Aire Afilado
    ko: 에어컷터
  descriptions:
    jp_kana: "するどい　かぜで\nあいてを　きりつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user launches\nrazorlike wind to\nslash the foe.\nIt has a high\ncritical-hit ratio."
    fr: "Le lanceur appelle\ndes vents tranchants\nqui lacèrent l’ennemi. \nTaux de critiques\nélevé."
    it: "Chi la usa provoca\nun vento tagliente\nche sferza il nemico.\nProbabile brutto\ncolpo."
    de: "Greift mit\nrasierklingenartigem\nWind an. Hohe\nVolltrefferquote."
    es: "Viento cortante que\nazota. Suele ser\nun golpe crítico."
    ko: "날카로운 바람으로\n상대를 베어\n공격한다.\n급소에 맞을\n확률이 높다."
air_slash:
  names:
    jp_kana: エアスラッシュ
    en: Air Slash
    fr: Lame d’Air
    it: Eterelama
    de: Luftschnitt
    es: Tajo Aéreo
    ko: 에어슬래시
  descriptions:
    jp_kana: "そらをも　きりさく\nくうきの　やいばで\nこうげきする。\nあいてを　ひるませる\nことがある。"
    en: "The user attacks with\na blade of air that\nslices even the sky.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur attaque\navec une lame d’air\nqui fend tout. Peut\naussi apeurer\nl’ennemi."
    it: "Chi la usa attacca con\nun vento tagliente\nche fende il cielo. Può\nanche far tentennare \nil Pokémon colpito."
    de: "Gegner wird mit\neiner Luftklinge\nangegriffen. Gegner\nschreckt eventuell\nzurück."
    es: "Ataca con una hoja\nde aire que corta\nhasta los cielos.\nTambién puede hacer\nretroceder al rival."
    ko: "하늘까지 베어 가르는\n공기의 칼날로\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
amnesia:
  names:
    jp_kana: ドわすれ
    en: Amnesia
    fr: Amnésie
    it: Amnesia
    de: Amnesie
    es: Amnesia
    ko: 망각술
  descriptions:
    jp_kana: "あたまを　からにして\nいっしゅん　なにかを\nわすれる　ことで\nじぶんの　とくぼうを\nぐーんと　あげる。"
    en: "The user temporarily\nempties its mind to\nforget its concerns.\nIt sharply raises the\nuser’s Sp. Def stat."
    fr: "Le lanceur fait le vide\ndans son esprit pour\noublier ses soucis.\nAugmente fortement\nsa Déf. Spé."
    it: "Chi la usa svuota per\nun po’ la mente per\ndimenticare i problemi.\nLa Dif. Sp. aumenta di\nmolto."
    de: "Gedächtnisverlust,\nder die Spezial-\nVerteidigung deutlich\nerhöht."
    es: "El usuario olvida sus\npreocupaciones y\naumenta mucho la\nDef. Esp."
    ko: "머리를 비워서\n순간적으로 무언가를\n잊어버림으로써\n자신의 특수방어를\n크게 올린다."
ancient_power:
  names:
    jp_kana: げんしのちから
    en: AncientPower
    fr: Pouv.Antique
    it: Forzantica
    de: Antik-Kraft
    es: Poder Pasado
    ko: 원시의힘
  descriptions:
    jp_kana: "げんしの　ちからで\nこうげきする。\nじぶんの　すべての\nのうりょくが　\nあがることが　ある。"
    en: "The user attacks with\na prehistoric power.\nIt may also raise all\nthe user’s stats at\nonce."
    fr: "Une attaque \npréhistorique qui peut\naugmenter toutes\nles stats du lanceur\nd’un seul coup."
    it: "Colpisce il nemico\ncon una forza\nprimordiale. Può\naumentare tutte\nle statistiche."
    de: "Angriff mit antiker\nKraft, der alle\nStatuswerte\nerhöhen kann."
    es: "Ataque prehistórico\nque puede subir todas\nlas características."
    ko: "원시의 힘으로\n공격한다.\n자신의\n모든 능력이\n오를 때가 있다."
aqua_jet:
  names:
    jp_kana: アクアジェット
    en: Aqua Jet
    fr: Aqua-Jet
    it: Acquagetto
    de: Wasserdüse
    es: Acua Jet
    ko: 아쿠아제트
  descriptions:
    jp_kana: "めにも　とまらない\nものすごい　はやさで\nあいてに　つっこむ。\nかならず　せんせい\nこうげき　できる。"
    en: "The user lunges at\nthe foe at a speed\nthat makes it almost\ninvisible. It is sure\nto strike first."
    fr: "Le lanceur se\npropulse sur l’eau à\nune vitesse telle qu’il\ndevient invisible.\nFrappe en premier."
    it: "Chi la usa balza verso\nil nemico in maniera\ncosì rapida da\nrendersi invisibile. \nColpisce per primo."
    de: "Anwender greift mit\nhoher Geschwindig-\nkeit an, die ihn fast\nunsichtbar macht.\nErstschlaggarantie."
    es: "Arremete contra el\nrival a una velocidad\nvertiginosa. Se\nadelanta a otros\nmovimientos."
    ko: "눈에 보이지 않는\n굉장한 속도로\n상대에게 돌진한다.\n반드시 선제\n공격을 할 수 있다."
aqua_ring:
  names:
    jp_kana: アクアリング
    en: Aqua Ring
    fr: Anneau Hydro
    it: Acquanello
    de: Wasserring
    es: Acua Aro
    ko: 아쿠아링
  descriptions:
    jp_kana: "からだの　まわりを\nみずで　つくった\nベールで　おおう。\nまいターン　ＨＰを\nかいふくする。"
    en: "The user envelops\nitself in a veil made\nof water. It regains\nsome HP on every\nturn."
    fr: "Un voile liquide\nenveloppe le lanceur.\nIl récupère des PV\nà chaque tour."
    it: "Chi la usa si avvolge\nin un velo d’acqua.\nRecupera alcuni PS\nad ogni turno."
    de: "Anwender umgibt sich\nmit einem Schleier\nvon Wasser. Dabei\nregeneriert er\neinige KP pro Runde."
    es: "Un manto de agua\ncubre al Pokémon\nque lo usa. Recupera\nalgunos PS en\ncada turno."
    ko: "몸 주변을\n물로 만든\n베일로 덮는다.\n매 턴 HP를\n회복한다."
aqua_tail:
  names:
    jp_kana: アクアテール
    en: Aqua Tail
    fr: Hydroqueue
    it: Idrondata
    de: Nassschweif
    es: Acua Cola
    ko: 아쿠아테일
  descriptions:
    jp_kana: "はげしく　あれくるう\nあらなみの　ように\nおおきな　しっぽを　\nふって　こうげきする。"
    en: "The user attacks by\nswinging its tail as if\nit were a vicious wave\nin a raging storm."
    fr: "Le lanceur attaque \nen balançant sa\nqueue comme une\nlame de fond en\npleine tempête."
    it: "Chi la usa attacca\nagitando la coda\ncome se fosse una\nviolenta ondata in\nuna tempesta furiosa."
    de: "Anwender attackiert\nmit Schweif, als ob\ndieser eine brutale\nWelle in einem\ntosenden Sturm sei."
    es: "Ataca agitando la\ncola como si fuera\nuna ola rabiosa en\nuna fiera tormenta."
    ko: "세차게 날뛰는\n거친 파도와 같이\n큰 꼬리를\n흔들어서 공격한다."
arm_thrust:
  names:
    jp_kana: つっぱり
    en: Arm Thrust
    fr: Cogne
    it: Sberletese
    de: Armstoß
    es: Empujón
    ko: 손바닥치기
  descriptions:
    jp_kana: "ひらいた　りょうてで\nあいてを　つっぱって\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The user looses a\nflurry of open-palmed\narm thrusts that hit\ntwo to five times in a\nrow."
    fr: "Un déluge de coups\nadressés avec la\npaume qui frappe de\n2 à 5 fois d’affilée."
    it: "Raffica di ceffoni\nche colpiscono da\n2 a 5 volte di fila."
    de: "Schläge mit\ngeradem Arm, die\nden Gegner 2 - 5-\nmal treffen."
    es: "Empujones directos\nque golpean de 2 a 5\nveces seguidas."
    ko: "펼친 양손으로\n상대를 번갈아 쳐서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
aromatherapy:
  names:
    jp_kana: アロマセラピー
    en: Aromatherapy
    fr: Aromathérapi
    it: Aromaterapia
    de: Aromakur
    es: Aromaterapia
    ko: 아로마테라피
  descriptions:
    jp_kana: "ここちよい　やすらぐ\nかおりを　かがせて\nみかた　ぜんいんの\nじょうたい　いじょうを\nかいふくする。"
    en: "The user releases a\nsoothing scent that\nheals all status\nproblems affecting\nthe user’s party."
    fr: "Le lanceur libère un\nparfum apaisant qui\nguérit tous les \nproblèmes de\nstatut de l’équipe."
    it: "Chi la usa rilascia\nun dolce profumo\nche risolve tutti i\nproblemi di stato\ndella sua squadra."
    de: "Heilt alle\nStatusprobleme\ndes Teams mit\nberuhigendem Duft."
    es: "Cura todos los\nproblemas de\nestado del equipo\ncon un suave aroma."
    ko: "기분 좋은 평온한\n향기를 맡게 하여\n같은 편 모두의\n상태 이상을\n회복한다."
assist:
  names:
    jp_kana: ねこのて
    en: Assist
    fr: Assistance
    it: Assistente
    de: Zuschuss
    es: Ayuda
    ko: 조수
  descriptions:
    jp_kana: "おおいそぎで　みかたの\nたすけを　かりて\nひかえの　ポケモンが\nおぼえている　わざを\nどれか　１つ　つかう。"
    en: "The user hurriedly\nand randomly uses a\nmove among those\nknown by other\nPokémon in the party."
    fr: "Le lanceur se dépêche\nd’utiliser une\ncapacité au hasard\nparmi celles des\nPokémon de l’équipe."
    it: "Chi la usa utilizza\nin fretta e a caso\nuna delle mosse\nimparate dai Pokémon\ndella squadra."
    de: "Greift zufällig mit\neiner Attacke eines\nTeampartners an."
    es: "Usa un ataque de un\nmiembro del equipo\nelegido al azar."
    ko: "서둘러서 같은 편의\n도움을 받아\n교대 포켓몬이\n기억하고 있는 기술\n중 하나를 쓴다."
assurance:
  names:
    jp_kana: ダメおし
    en: Assurance
    fr: Assurance
    it: Garanzia
    de: Gewissheit
    es: Buena Baza
    ko: 승부굳히기
  descriptions:
    jp_kana: "そのターンに　あいてが\nすでに　ダメージを\nうけて　いたら\nわざの　いりょくは\n２ばいに　なる。"
    en: "If the foe has\nalready taken some\ndamage in the same\nturn, this attack’s\npower is doubled."
    fr: "Cette attaque est\ndeux fois plus \nefficace si l’ennemi\na déjà été blessé\ndurant ce tour."
    it: "Se il nemico ha già\nsubito dei danni\nnello stesso turno,\nla potenza di questa\nmossa raddoppia."
    de: "Hat Gegner während\nder Runde bereits\nSchaden genommen,\nwird Kraft der\nAttacke verdoppelt."
    es: "Si el rival ya ha\nsufrido daño en\nese turno, la fuerza\ndel ataque se\nduplica."
    ko: "그 턴에 상대가\n이미 데미지를\n입었다면\n기술의 위력은\n2배가 된다."
astonish:
  names:
    jp_kana: おどろかす
    en: Astonish
    fr: Etonnement
    it: Sgomento
    de: Erstauner
    es: Impresionar
    ko: 놀래키기
  descriptions:
    jp_kana: "おおきな　こえなどで\nふいに　おどろかして\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user attacks the\nfoe while shouting in\na startling fashion.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur attaque\nl’ennemi en poussant\nun cri terrifiant.\nPeut aussi l’apeurer."
    it: "Chi la usa attacca il\nnemico gridando in\nmodo sorprendente.\nPuò anche farlo\ntentennare."
    de: "Anwender greift mit\neinem Schrei an. Ein\nAngriff, der den Gegn.\neventuell zurück-\nschrecken lässt."
    es: "Impresiona tanto\nque puede hacer\nretroceder al rival."
    ko: "큰 소리 등으로\n불시에 놀래켜서\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
attack_order:
  names:
    jp_kana: こうげきしれい
    en: Attack Order
    fr: Appel Attak
    it: Comandourto
    de: Schlagbefehl
    es: Al Ataque
    ko: 공격지령
  descriptions:
    jp_kana: "しもべを　よびだして\nあいてに　むかって\nこうげき　させる。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user calls out\nits underlings to\npummel the foe.\nIt has a high\ncritical-hit ratio."
    fr: "Le lanceur appelle ses\nsous-fifres pour\nfrapper l’ennemi. \nTaux de critiques\nélevé."
    it: "Chi la usa raduna i\nsuoi sgherri per\ncolpire il nemico.\nProbabile brutto\ncolpo."
    de: "Anwender ruft seine\nUntergebenen zum\nAngriff. Hat eine\nhohe Volltreffer-\nquote."
    es: "El usuario llama a\nsus amigos para\nque ataquen al rival.\nSuele ser crítico."
    ko: "부하를 불러내어\n상대를 향해서\n공격시킨다.\n급소에 맞을\n확률이 높다."
attract:
  names:
    jp_kana: メロメロ
    en: Attract
    fr: Attraction
    it: Attrazione
    de: Anziehung
    es: Atracción
    ko: 헤롱헤롱
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を\nゆうわくして\nメロメロに　する。\nあいては　わざが\nだしにくく　なる。"
    en: "If it is the opposite\ngender of the user,\nthe foe becomes\ninfatuated and less\nlikely to attack."
    fr: "Si l’ennemi est du\nsexe opposé, il tombe\namoureux et rechigne\nalors à attaquer."
    it: "Se il nemico è\ndel sesso opposto,\ns’infatua e attacca\ncon meno probabilità."
    de: "Angriff des anderen\nGeschlechts\nunwahrscheinlich."
    es: "Si el enemigo es\ndel sexo opuesto,\nreduce la posibilidad\nde que ataque."
    ko: "수컷은 암컷을 암컷은\n수컷을 유혹하여\n헤롱헤롱하게 만든다.\n상대가 기술을\n쓰기 어려워진다."
aura_sphere:
  names:
    jp_kana: はどうだん
    en: Aura Sphere
    fr: Aurasphère
    it: Forzasfera
    de: Aurasphäre
    es: Esfera Aural
    ko: 파동탄
  descriptions:
    jp_kana: "からだの　おくから\nはどうの　ちからを\nうちはなつ。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user looses a\nblast of aura power\nfrom deep within its\nbody. This move is\ncertain to hit."
    fr: "Le lanceur dégage une\naura et projette de\nl’énergie. N’échoue\njamais."
    it: "Chi la usa rilascia\nuna forza eterea dal\nprofondo del corpo.\nLa mossa è infallibile."
    de: "Tief aus dem Inneren\ndes Anwenders löst\nsich ein kraftvoller\nStoß Auraenergie.\nTrifft in jedem Fall."
    es: "Libera una descarga\nde la fuerza del aura\ndesde su interior.\nEs infalible."
    ko: "몸속에서\n파동의 힘을\n끌어내 쏜다.\n공격은 반드시\n명중한다."
aurora_beam:
  names:
    jp_kana: オーロラビーム
    en: Aurora Beam
    fr: Onde Boréale
    it: Raggiaurora
    de: Aurorastrahl
    es: Rayo Aurora
    ko: 오로라빔
  descriptions:
    jp_kana: "にじいろの　ビームを\nあいてに　はっしゃして\nこうげきする。\nこうげきを　さげる\nことが　ある。"
    en: "The foe is hit with a\nrainbow-colored beam.\nIt may also lower the\ntarget’s Attack\nstat."
    fr: "Envoie un rayon\narc-en-ciel sur\nl’ennemi. Peut aussi\nbaisser son Attaque."
    it: "Colpisce il nemico\ncon un raggio dai\ncolori dell’iride.\nPuò anche ridurne\nl’Attacco."
    de: "Regenbogenfarbener\nStrahl, der eventuell\nden Angriffs-Wert des\nGegners senkt."
    es: "Rayo multicolor\nque puede reducir\nel Ataque."
    ko: "무지개색의 빔을\n상대에게 발사하여\n공격한다.\n공격을 떨어뜨릴\n때가 있다."
avalanche:
  names:
    jp_kana: ゆきなだれ
    en: Avalanche
    fr: Avalanche
    it: Slavina
    de: Lawine
    es: Alud
    ko: 눈사태
  descriptions:
    jp_kana: "あいてから　わざを\nうけていると　その\nあいてに　たいして\nわざの　いりょくが\n２ばいに　なる。"
    en: "An attack move that\ninflicts double the\ndamage if the user\nhas been hurt by the\nfoe in the same turn."
    fr: "Une attaque deux fois\nplus puissante si le\nlanceur a été blessé\npar l’ennemi durant le\ntour."
    it: "Mossa d’attacco che\ninfligge doppi danni,\nse chi la usa è stato\nferito dal nemico\nnello stesso turno."
    de: "Wurde der Anwender\nvom Gegner in dieser\nRunde getroffen, er-\nzeugt diese Attacke\ndoppelten Schaden."
    es: "Este ataque inflige el\ndoble de daño a un\nrival que haya\ngolpeado al usuario\nen ese mismo turno."
    ko: "상대로부터 기술을\n받으면 그\n상대에 대해서\n기술의 위력이\n2배가 된다."
barrage:
  names:
    jp_kana: たまなげ
    en: Barrage
    fr: Pilonnage
    it: Att. Pioggia
    de: Stakkato
    es: Presa
    ko: 구슬던지기
  descriptions:
    jp_kana: "まるい　ものを\nあいてに　なげつけて\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "Round objects are\nhurled at the foe to\nstrike two to five\ntimes in a row."
    fr: "Projette de 2 à 5\ngrosses boules sur\nl’ennemi."
    it: "Piovono enormi sfere\nsulla testa del nemico\nper 2-5 volte di fila."
    de: "Wirft 2 - 5-mal runde\nGegenstände auf den\nGegner."
    es: "Arroja esferas al\nrival entre 2 y 5\nveces seguidas."
    ko: "둥근 것을\n상대에게 내던져서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
barrier:
  names:
    jp_kana: バリアー
    en: Barrier
    fr: Bouclier
    it: Barriera
    de: Barriere
    es: Barrera
    ko: 배리어
  descriptions:
    jp_kana: "がんじょうな　かべを\nつくって　じぶんの\nぼうぎょを　ぐーんと\nあげる。"
    en: "The user throws up a\nsturdy wall that\nsharply raises its\nDefense stat."
    fr: "Le lanceur érige un\nmur solide qui\naugmente fortement\nsa Défense."
    it: "Innalza una barriera\nresistente che\naumenta molto\nla Difesa."
    de: "Erzeugt Barriere,\ndie den \nVerteidigungs-Wert\nstark erhöht."
    es: "Crea una barrera\npara aumentar\nmucho la Defensa."
    ko: "튼튼한 장막을\n만들어 자신의\n방어를 크게\n올린다."
baton_pass:
  names:
    jp_kana: バトンタッチ
    en: Baton Pass
    fr: Relais
    it: Staffetta
    de: Staffette
    es: Relevo
    ko: 바톤터치
  descriptions:
    jp_kana: "ひかえの　ポケモンと\nいれかわる。\nのうりょく　へんかは\nかわった　ポケモンが\nそのまま　うけつぐ。"
    en: "The user switches\nplaces with a party\nPokémon in waiting,\npassing along any\nstat changes."
    fr: "Le lanceur échange\nsa place et tout\nchangement de stat\navec un Pokémon de\nl’équipe."
    it: "Chi la usa è sostituito\nda un Pokémon della\nsquadra, che eredita\nanche ogni modifica\nalle statistiche."
    de: "Tauscht PKMN aus.\nAlle Statuswert-\nveränderungen\nbleiben bestehen."
    es: "Cambia el puesto\ncon un compañero\ny le pasa los cambios\nde características."
    ko: "교대 포켓몬과\n바뀐다.\n능력 변화는\n바뀐 포켓몬이\n그대로 이어받는다."
beat_up:
  names:
    jp_kana: ふくろだたき
    en: Beat Up
    fr: Baston
    it: Picchiaduro
    de: Prügler
    es: Paliza
    ko: 집단구타
  descriptions:
    jp_kana: "みかた　ぜんいんで\nこうげきする。\nなかまの　ポケモンが\nおおいほど　わざの\nいりょくは　あがる。"
    en: "The user gets all the\nparty Pokémon to\nattack the foe. The\nmore party Pokémon,\nthe more damage."
    fr: "Le lanceur appelle les\nPokémon de l’équipe\nà attaquer. Plus ils\nsont nombreux, plus\nil y a de dégâts."
    it: "Chi la usa chiama\nin aiuto i Pokémon \ndella squadra: più\nce ne sono, maggiore\nè il danno."
    de: "Das Team nimmt aktiv\nam Kampf teil.\nJe mehr Pokémon,\ndesto stärker."
    es: "Ataque de todo el\nequipo Pokémon.\nCuantos más haya,\nmás daño produce."
    ko: "같은 편 전원이\n공격한다.\n동료 포켓몬이\n많을수록 기술의\n위력이 올라간다."
belly_drum:
  names:
    jp_kana: はらだいこ
    en: Belly Drum
    fr: Cognobidon
    it: Panciamburo
    de: Bauchtrommel
    es: Tambor
    ko: 배북
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶん　へらして\nじぶんの　こうげきを\nさいだいに　あげる。"
    en: "The user maximizes\nits Attack stat in\nexchange for HP\nequal to half its max\nHP."
    fr: "Améliore l’Attaque\nau maximum en\nsacrifiant la moitié\ndes PV max."
    it: "Chi la usa massi-\nmizza l’Attacco,\nma sacrifica l’equi-\nvalente di metà dei\nPS massimi."
    de: "Maximiert den\nAngriffs-Wert,\nopfert jedoch die\nHälfte seiner KP."
    es: "Reduce la mitad de\nlos PS máximos para\nmejorar al máximo\nel Ataque."
    ko: "자신의 HP를\n최대 HP의\n절반으로 감소시켜\n자신의 공격을\n최대로 올린다."
bide:
  names:
    jp_kana: がまん
    en: Bide
    fr: Patience
    it: Pazienza
    de: Geduld
    es: Venganza
    ko: 참기
  descriptions:
    jp_kana: "２ターンの　あいだ\nこうげきに　たえて\nうけた　ダメージを\n２ばいに　して\nあいてに　かえす。"
    en: "The user endures\nattacks for two\nturns, then strikes\nback to cause double\nthe damage taken."
    fr: "Le lanceur encaisse \nles coups durant 2\ntours et réplique en\ninfligeant le double\ndes dégâts subis."
    it: "Chi la usa subisce\nattacchi per due turni\ne poi restituisce il\ndanno moltiplicato\nper due."
    de: "Erträgt zwei Runden\nAngriffe und schlägt\ndann mit doppelter\nEffektivität zurück."
    es: "Espera 2 turnos\npara atacar con\nel doble de potencia\ndel daño recibido."
    ko: "2턴 동안\n공격을 견뎌\n입은 데미지를\n2배로 만들어\n상대에게 돌려준다."
bind:
  names:
    jp_kana: しめつける
    en: Bind
    fr: Etreinte
    it: Legatutto
    de: Klammergriff
    es: Atadura
    ko: 조이기
  descriptions:
    jp_kana: "ながい　からだや\nつるなどを　つかい\n２ー５ターンの　あいだ\nあいてを　しめつけて\nこうげきする。"
    en: "A long body or\ntentacles are used\nto bind and squeeze\nthe foe for two to\nfive turns."
    fr: "Ligote l’ennemi avec\nles tentacules ou le\ncorps pour l’écraser\ndurant 2 à 5 tours."
    it: "Lega e tiene stretto\nil nemico per 2-5\nturni con tentacoli\no con un corpo lungo."
    de: "Umklammert und\nquetscht den Gegner\nüber 2 - 5 Runden."
    es: "Ata y oprime\nde 2 a 5 turnos."
    ko: "긴 몸이나\n덩굴 등을 써서\n2-5턴 동안\n상대를 조여\n공격한다."
bite:
  names:
    jp_kana: かみつく
    en: Bite
    fr: Morsure
    it: Morso
    de: Biss
    es: Mordisco
    ko: 물기
  descriptions:
    jp_kana: "するどく　とがった\nはで　かみついて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The foe is bitten with\nviciously sharp fangs.\nIt may make the\ntarget flinch."
    fr: "L’ennemi est mordu\npar de tranchantes\ncanines. Peut\nl’apeurer."
    it: "Il nemico viene morso\nda denti affilatissimi\nche possono farlo\ntentennare."
    de: "Beißt zu und lässt\nden Gegner eventuell\nzurückschrecken."
    es: "Un voraz bocado\nque puede hacer\nretroceder al rival."
    ko: "날카롭고 뾰족한\n이빨로 물어서\n공격한다.\n상대를 풀이 죽게\n할 때가 있다."
blast_burn:
  names:
    jp_kana: ブラストバーン
    en: Blast Burn
    fr: Rafale Feu
    it: Incendio
    de: Lohekanonade
    es: Anillo Ígneo
    ko: 블러스트번
  descriptions:
    jp_kana: "ばくはつの　ほのおで\nあいてを　やきつくして\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The foe is razed by\na fiery explosion.\nThe user must rest\non the next turn,\nhowever."
    fr: "Une explosion ardente\nsouffle l’adversaire.\nLe lanceur doit\nse reposer au\ntour suivant."
    it: "Potente esplosione\nche danneggia il\nnemico, ma fa saltare\nil turno successivo\na chi la provoca."
    de: "Gegner wird von\nstarker Explosion\ngetroffen. Angreifer\nsetzt eine Runde aus."
    es: "Explosión de fuego.\nEl atacante debe\ndescansar el\nsiguiente turno."
    ko: "폭발하는 불꽃으로\n상대를 태워서\n공격한다.\n다음 턴은\n움직일 수 없다."
blaze_kick:
  names:
    jp_kana: ブレイズキック
    en: Blaze Kick
    fr: Pied Brûleur
    it: Calciardente
    de: Feuerfeger
    es: Patada Ígnea
    ko: 브레이즈킥
  descriptions:
    jp_kana: "こうげきした　あいてを\nやけど　じょうたいに\nすることが　ある。\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "The user launches a\nkick with a high\ncritical-hit ratio.\nIt may also leave the\ntarget with a burn."
    fr: "Le lanceur envoie un\ncoup de pied à taux de\ncritiques élevé. Peut\naussi brûler la cible."
    it: "Chi la usa tira un\ncalcio. Probabile\nbrutto colpo che\npuò anche causare\nuna scottatura."
    de: "Starker Tritt mit\nhoher Volltreffer-\nquote. Verursacht\neventuell\nVerbrennung."
    es: "Patada que suele\nser un golpe crítico\ny puede causar\nquemaduras."
    ko: "공격한 상대를\n화상 상태로\n만들 때가 있다.\n급소에 맞을\n확률이 높다."
blizzard:
  names:
    jp_kana: ふぶき
    en: Blizzard
    fr: Blizzard
    it: Bora
    de: Blizzard
    es: Ventisca
    ko: 눈보라
  descriptions:
    jp_kana: "はげしい　ふぶきを\nあいてに　ふきつけて\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "A howling blizzard is\nsummoned to strike\nthe foe.\nIt may also freeze\nthe target solid."
    fr: "Une violente tempête\nde neige est\ndéclenchée sur\nl’ennemi. Peut aussi\nle geler."
    it: "Colpisce il nemico\ncon una tremenda\ntempesta di ghiaccio\nche può anche\ncongelarlo."
    de: "Ein Schneesturm\nwütet, der den\nGegner einfrieren\nkann."
    es: "Tormenta de hielo\nque puede llegar\na congelar."
    ko: "세찬 눈보라를\n상대에게 내뿜어\n공격한다.\n얼음 상태로\n만들 때가 있다."
block:
  names:
    jp_kana: とおせんぼう
    en: Block
    fr: Barrage
    it: Blocco
    de: Rückentzug
    es: Bloqueo
    ko: 블록
  descriptions:
    jp_kana: "りょうてを　ひろげて\nたちはだかり　あいての\nにげみちを　ふさいで\nにげられなく　する。"
    en: "The user blocks the\nfoe’s way with arms\nspread wide to\nprevent escape."
    fr: "Le lanceur bloque la\nroute de l’ennemi\npour empêcher sa\nfuite."
    it: "Chi la usa sbarra\nla strada al nemico\nimpedendone la\nsostituzione."
    de: "Anwender versperrt\nden Fluchtweg des\nGegners mit aus-\ngestreckten Armen."
    es: "Le corta el paso\nal rival con los\nbrazos para que\nno pueda escapar."
    ko: "양팔을 벌려\n막아서서 상대의\n도주로를 가로막아\n도망칠 수 없게 한다."
body_slam:
  names:
    jp_kana: のしかかり
    en: Body Slam
    fr: Plaquage
    it: Corposcontro
    de: Bodyslam
    es: Golpe Cuerpo
    ko: 누르기
  descriptions:
    jp_kana: "からだ　ぜんたいで\nあいてに　のしかかり\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The user drops onto\nthe foe with its full\nbody weight.\nIt may leave the foe\nparalyzed."
    fr: "Le lanceur se laisse\ntomber sur l’ennemi\nde tout son poids.\nPeut le paralyser."
    it: "Chi la usa carica\nil nemico con tutto\nil corpo. Può causarne\nanche la paralisi."
    de: "Trifft den Gegner mit\nvollem Körpereinsatz.\nBewirkt eventuell\nParalyse."
    es: "Salta sobre el rival\ncon todo su peso.\nPuede paralizar."
    ko: "몸 전체로\n상대를 덮쳐 눌러\n공격한다.\n마비 상태가\n되는 경우가 있다."
bone_club:
  names:
    jp_kana: ホネこんぼう
    en: Bone Club
    fr: Massd’Os
    it: Ossoclava
    de: Knochenkeule
    es: Hueso Palo
    ko: 뼈다귀치기
  descriptions:
    jp_kana: "てに　もった　ホネで\nあいてを　なぐりつけて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user clubs the\nfoe with a bone.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur frappe\nl’ennemi à grands\ncoups d’os. Peut\naussi apeurer\nl’ennemi."
    it: "Chi la usa colpisce il\nnemico con un osso\nche può farlo anche\ntentennare."
    de: "Schlägt Gegner\nmit einer Keule\nund verschreckt\nihn eventuell."
    es: "Aporrea con un\nhueso. Puede\nhacer retroceder\nal enemigo."
    ko: "손에 들고 있는\n뼈로 상대를 세게\n때려서 공격한다.\n상대를 풀죽게\n만들 때가 있다."
bone_rush:
  names:
    jp_kana: ボーンラッシュ
    en: Bone Rush
    fr: Charge-Os
    it: Ossoraffica
    de: Knochenhatz
    es: Ataque Óseo
    ko: 본러쉬
  descriptions:
    jp_kana: "かたい　ホネで\nあいてを　なぐりつけて\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The user strikes at\nthe foe with a hard\nbone two to five\ntimes in a row."
    fr: "Le lanceur frappe\nl’ennemi 2 à 5 fois\navec un os."
    it: "Chi la usa colpisce\nil nemico con un\nosso duro per 2-5\nvolte di fila."
    de: "Greift Gegner 2 -\n5-mal in Folge mit\neinem Knochen an."
    es: "Hueso en ristre,\naporrea al enemigo\nde 2 a 5 veces."
    ko: "단단한 뼈로\n상대를 세게 때려서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
bonemerang:
  names:
    jp_kana: ホネブーメラン
    en: Bonemerang
    fr: Osmerang
    it: Ossomerang
    de: Knochmerang
    es: Huesomerang
    ko: 뼈다귀부메랑
  descriptions:
    jp_kana: "てに　もった　ホネを\nあいてに　なげつけて\nいきと　かえりで\n２かい　れんぞくで\nダメージを　あたえる。"
    en: "The user throws the\nbone it holds. The\nbone loops to hit the\nfoe twice, coming and\ngoing."
    fr: "Le lanceur projette\nson os comme un\nboomerang. Cette\nattaque frappe à\nl’aller et au retour."
    it: "Chi la usa lancia\nl’osso che tiene.\nL’osso colpisce 2\nvolte e ritorna\ncome un boomerang."
    de: "Ein Bumerang aus\nKnochen, der\nzweimal trifft."
    es: "Lanza un hueso\na modo de bumerán\nque golpea 2 veces."
    ko: "손에 들고 있는 뼈를\n상대에게 날려서\n날아갈 때와 돌아올 때\n2회 연속\n데미지를 준다."
bounce:
  names:
    jp_kana: とびはねる
    en: Bounce
    fr: Rebond
    it: Rimbalzo
    de: Sprungfeder
    es: Bote
    ko: 뛰어오르다
  descriptions:
    jp_kana: "そらたかく　とびはねて\n２ターンめに　あいてを\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The user bounces up\nhigh, then drops on\nthe foe on the second\nturn. It may also\nparalyze the foe."
    fr: "Le lanceur bondit\ntrès haut et plonge\nsur l’ennemi au 2ᵉ\ntour. Peut aussi\nparalyser l’ennemi."
    it: "Chi la usa balza in\nalto e ricade sul\nnemico dopo un\nturno. Può anche\nparalizzare."
    de: "Angreifer bespringt\nden Gegner in Runde\n2. Der Gegner wird\nevtl. paralysiert."
    es: "Primer turno: bota.\nSegundo turno:\ngolpea.\nPuede paralizar."
    ko: "하늘 높이 뛰어올라\n2턴째에 상대를\n공격한다.\n마비 상태로\n만들 때가 있다."
brave_bird:
  names:
    jp_kana: ブレイブバード
    en: Brave Bird
    fr: Rapace
    it: Baldeali
    de: Sturzflug
    es: Pájaro Osado
    ko: 브레이브버드
  descriptions:
    jp_kana: "はねを　おりたたみ\nていくう　ひこうで\nとつげきする。\nじぶんも　かなり\nダメージを　うける。"
    en: "The user tucks in\nits wings and charges\nfrom a low altitude.\nThe user also takes\nserious damage."
    fr: "Le lanceur replie ses\nailes et charge en\nrase-mottes. Le\nlanceur subit de\ngraves dégâts aussi."
    it: "Chi la usa si nasconde\nsotto le ali e carica\nda bassa quota.\nTuttavia, subisce\nconsiderevoli danni."
    de: "Anwender greift aus\nniedriger Höhe an.\nEr erleidet bei dieser\nAttacke auch\nSchaden."
    es: "Pliega sus alas y\nataca con un vuelo\nrasante. El Pokémon\nque lo usa también\nresulta dañado."
    ko: "날개를 접어\n저공비행으로\n돌격한다.\n자신도 상당한\n데미지를 입는다."
brick_break:
  names:
    jp_kana: かわらわり
    en: Brick Break
    fr: Casse-Brique
    it: Breccia
    de: Durchbruch
    es: Demolición
    ko: 깨트리다
  descriptions:
    jp_kana: "かたい　こぶしなどで\nこうげきする。\nひかりのかべや\nリフレクターも\nはかいできる。"
    en: "The user attacks with\ntough fists, etc. It\ncan also break any\nbarrier such as Light\nScreen and Reflect."
    fr: "Une attaque avec la\nmain ou autre. Peut\nbriser les barrières\ncomme Mur Lumière\net Protection."
    it: "Colpisce il nemico con\nuna mano. Può rompere\nbarriere come Riflesso\ne Schermoluce."
    de: "Durchbricht Barrieren\nwie Lichtschild und\nReflektor."
    es: "Potente ataque que\ntambién es capaz de\ndestruir barreras\ncomo Pantalla Luz\ny Reflejo."
    ko: "단단한 주먹 등으로\n공격한다.\n빛의장막이나\n리플렉터도\n파괴할 수 있다."
brine:
  names:
    jp_kana: しおみず
    en: Brine
    fr: Saumure
    it: Acquadisale
    de: Lake
    es: Salmuera
    ko: 소금물
  descriptions:
    jp_kana: "あいてが　ＨＰの\nはんぶん　くらい\nきずを　おっていると\nわざの　いりょくが\n２ばいに　なる。"
    en: "If the foe’s HP is\ndown to about half,\nthis attack will hit\nwith double the\npower."
    fr: "Cette attaque est\ndeux fois plus\npuissante lorsque \nl’ennemi a moins de\nla moitié de ses PV."
    it: "Se i PS del nemico\nsono scesi a meno\ndi metà, questa mossa\ncolpirà con il doppio\ndella forza."
    de: "Hat der Gegner\nweniger als die\nHälfte seiner max.\nKP, trifft diese Att.\nmit doppelter Kraft."
    es: "Si al rival le queda\nmenos de la mitad\nde sus PS, el ataque\nserá el doble de\nfuerte."
    ko: "상대가 HP의\n절반 정도\n상처를 입고 있으면\n기술의 위력이\n2배가 된다."
bubble:
  names:
    jp_kana: あわ
    en: Bubble
    fr: Ecume
    it: Bolla
    de: Blubber
    es: Burbuja
    ko: 거품
  descriptions:
    jp_kana: "むすうの　あわを\nあいてに　ふきかけて\nこうげきする。\nあいての　すばやさを\nさげることが　ある。"
    en: "A spray of countless\nbubbles is jetted at\nthe foe.\nIt may also lower the\ntarget’s Speed stat."
    fr: "Des bulles frappent\nl’ennemi. Peut réduire\nsa Vitesse."
    it: "Una pioggia di bolle\ninveste il nemico e\npuò anche ridurne\nla Velocità."
    de: "Angriff mit Blasen.\nInitiative-Wert des\nGegners wird\neventuell gesenkt."
    es: "Lanza burbujas al\ncontrincante y puede\nreducir su Velocidad."
    ko: "매우 많은 거품을\n상대에게 내뿜어\n공격한다.\n상대의 스피드를\n떨어뜨릴 때가 있다."
bubble_beam:
  names:
    jp_kana: バブルこうせん
    en: BubbleBeam
    fr: Bulles d’O
    it: Bollaraggio
    de: Blubbstrahl
    es: Rayo Burbuja
    ko: 거품광선
  descriptions:
    jp_kana: "あわを　いきおいよく\nあいてに　はっしゃして\nこうげきする。\nすばやさを　さげる\nことが　ある。"
    en: "A spray of bubbles is\nforcefully ejected\nat the foe.\nIt may also lower the\ntarget’s Speed stat."
    fr: "Des bulles sont\nenvoyées avec\npuissance sur\nl’ennemi. Peut aussi\nbaisser sa Vitesse."
    it: "Colpisce il nemico\ncon un forte getto\ndi bolle. Può anche\nridurne la Velocità."
    de: "Versprüht Blasen, die\neventuell den\nInitiative-Wert des\nGegners senken."
    es: "Diluvio de burbujas\nque puede bajar\nla Velocidad."
    ko: "거품을 기세 좋게\n상대에게 발사하여\n공격한다.\n스피드를 떨어뜨릴\n때가 있다."
bug_bite:
  names:
    jp_kana: むしくい
    en: Bug Bite
    fr: Piqûre
    it: Coleomorso
    de: Käferbiss
    es: Picadura
    ko: 벌레먹음
  descriptions:
    jp_kana: "かみついて　こうげき。\nあいてが　きのみを\nもっている　とき\nたべて　きのみの\nこうかを　うけられる。"
    en: "The user bites the\nfoe. If the foe is\nholding a Berry, the\nuser eats it and\ngains its effect."
    fr: "Le lanceur pique\nl’ennemi. S’il tient\nune Baie, le lanceur\nla dévore et obtient\nson effet."
    it: "Il nemico viene morso.\nSe questo tiene una\nBacca, chi usa la\nmossa la mangia e\nla sfrutta."
    de: "Anwender beißt den\nGegner. Hält dieser\neine Beere, isst der\nAnwender sie und\nerhält deren Effekt."
    es: "Pica al rival. Si el\nadversario lleva una\nbaya, el agresor se la\ncome y se beneficia\nde su efecto."
    ko: "물어서 공격한다.\n상대가 나무열매를\n지니고 있을 때\n먹어서 나무열매의\n효과를 받을 수 있다."
bug_buzz:
  names:
    jp_kana: むしのさざめき
    en: Bug Buzz
    fr: Bourdon
    it: Ronzio
    de: Käfergebrumm
    es: Zumbido
    ko: 벌레의야단법석
  descriptions:
    jp_kana: "はねの　しんどうで\nおんぱを　おこして\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user vibrates its\nwings to generate a\ndamaging sound wave.\nIt may also lower the\nfoe’s Sp. Def stat."
    fr: "Le lanceur fait vibrer\nses ailes pour lancer\nune vague sonique. \nPeut aussi baisser la\nDéf. Spé. de l’ennemi."
    it: "Chi la usa fa vibrare\nle ali creando un’onda\nsonora pericolosa.\nPuò anche ridurre\nla Dif. Sp. del nemico."
    de: "Anwender schlägt\nmit Flügeln und er-\nzeugt Schockwelle.\nSenkt gegnerische\nSpezial-Verteidigung."
    es: "El movimiento de las\nalas crea una onda\nsónica dañina. Puede\ntambién disminuir la\nDef. Esp. del rival."
    ko: "날개의 진동으로\n음파를 일으켜서\n공격한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
bulk_up:
  names:
    jp_kana: ビルドアップ
    en: Bulk Up
    fr: Gonflette
    it: Granfisico
    de: Protzer
    es: Corpulencia
    ko: 벌크업
  descriptions:
    jp_kana: "からだに　ちからを\nこめて　きんにくを\nぶあつく　することで\nじぶんの　こうげきと\nぼうぎょを　あげる。"
    en: "The user tenses its\nmuscles to bulk up\nits body, boosting\nboth its Attack and\nDefense stats."
    fr: "Le lanceur tend ses\nmuscles pour se\ngonfler, ce qui booste\nson Attaque et sa\nDéfense."
    it: "Chi la usa tende i mu-\nscoli per ingrossare il\ncorpo, facendo salire\nDifesa e Attacco."
    de: "Pumpt den Körper\nauf, um den Angriff\nund die Verteidigung \nzu erhöhen."
    es: "Robustece el cuerpo\npara subir el Ataque\ny la Defensa."
    ko: "몸에 힘을 담아\n근육을 두껍게 해서\n자신의 공격과\n방어를 올린다."
bullet_punch:
  names:
    jp_kana: バレットパンチ
    en: Bullet Punch
    fr: Pisto-Poing
    it: Pugnoscarica
    de: Patronenhieb
    es: Puño Bala
    ko: 불릿펀치
  descriptions:
    jp_kana: "だんがんの　ような\nはやくて　かたい\nパンチを　くりだす。\nかならず　せんせい\nこうげき　できる。"
    en: "The user strikes\nwith a tough punch as\nfast as a bullet.\nThis move always goes\nfirst."
    fr: "Le lanceur envoie des\ncoups de poing aussi\nrapides que des balles\nde revolver. Frappe\ntoujours en premier."
    it: "Chi la usa attacca con\nuna scarica di pugni\nveloci quanto proiet-\ntili. Con questa mossa\nsi colpisce per primi."
    de: "Gegner wird von\neinem ultraschnellen\nHieb getroffen.\nErstschlaggarantie."
    es: "Ataca con un fuerte\npuñetazo tan rápido\ncomo un proyectil.\nEste movimiento\nsiempre va primero."
    ko: "탄환처럼\n빠르고 단단한\n펀치를 날린다.\n반드시 선제\n공격을 할 수 있다."
bullet_seed:
  names:
    jp_kana: タネマシンガン
    en: Bullet Seed
    fr: Balle Graine
    it: Semitraglia
    de: Kugelsaat
    es: Recurrente
    ko: 기관총
  descriptions:
    jp_kana: "タネを　いきおいよく\nあいてに　はっしゃして\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The user forcefully\nshoots seeds at the\nfoe. Two to five\nseeds are shot in\nrapid succession."
    fr: "Le lanceur mitraille \nl’ennemi avec une\nrafale de graines. \nDe 2 à 5 rafales sont\nlancées à la suite."
    it: "Chi la usa spara\nraffiche di semi sul\nnemico. Vengono spa-\nrate da 2 a 5 raffiche\nin rapida successione."
    de: "Der Anwender\nwirft 2- bis 5-mal\nin rascher Folge\nSamen auf den Gegner."
    es: "Dispara rápido de 2\na 5 ráfagas de\nsemillas de manera\nconsecutiva."
    ko: "씨앗을 기세 좋게\n상대에게 발사하여\n공격한다.\n2-5회 동안\n연속으로 쓴다."
calm_mind:
  names:
    jp_kana: めいそう
    en: Calm Mind
    fr: Plénitude
    it: Calmamente
    de: Gedankengut
    es: Paz Mental
    ko: 명상
  descriptions:
    jp_kana: "しずかに　せいしんを\nとういつし　こころを\nしずめる　ことで\nじぶんの　とくこうと\nとくぼうを　あげる。"
    en: "The user quietly\nfocuses its mind and\ncalms its spirit to\nraise its Sp. Atk and\nSp. Def stats."
    fr: "Le lanceur se\nconcentre et fait le\nvide dans son esprit\npour monter son Atq.\nSpé. et sa Déf. Spé."
    it: "Chi la usa si concen-\ntra mentalmente e\ncalma il suo spirito\nper aumentare l’Att.\nSp. e la Dif. Sp."
    de: "Erhöht Spez.-Angriff\nund Spezial-\nVerteidigung durch\nKonzentration."
    es: "Aumenta la\nconcentración y\ncalma el espíritu para\nsubir el At. Esp. y la\nDef. Esp."
    ko: "조용히 정신을\n통일하고 마음을\n가라앉혀서\n자신의 특수공격과\n특수방어를 올린다."
camouflage:
  names:
    jp_kana: ほごしょく
    en: Camouflage
    fr: Camouflage
    it: Camuffamento
    de: Tarnung
    es: Camuflaje
    ko: 보호색
  descriptions:
    jp_kana: "みずべや　くさむら\nどうくつなど　いる\nばしょに　あわせて\nじぶんの　タイプを\nかえる。"
    en: "The user’s type is\nchanged depending on\nits environment, such\nas at water’s edge, in\ngrass, or in a cave."
    fr: "Modifie le type du\nlanceur en fonction\ndu terrain, comme\nune berge, une\ngrotte, l’herbe, etc."
    it: "Modifica il tipo di\nchi la usa secondo\nil luogo, come vicino\nall’acqua, nell’erba\no in una grotta."
    de: "Der Typ des Anwenders\npasst sich der\nUmgebung an, sei es\nim Wasser, im Gras\noder in einer Höhle."
    es: "Modifica el tipo del\nPokémon según la\nzona donde esté."
    ko: "물가나 풀밭,\n동굴 등, 있는\n장소에 맞춰서\n자신의 타입을\n바꾼다."
captivate:
  names:
    jp_kana: ゆうわく
    en: Captivate
    fr: Séduction
    it: Incanto
    de: Liebreiz
    es: Seducción
    ko: 유혹
  descriptions:
    jp_kana: "♂なら♀を　♀なら♂を\nゆうわくして\nあいての　とくこうを\nがくっと　さげる。"
    en: "If it is the opposite\ngender of the user,\nthe foe is charmed\ninto sharply lowering\nits Sp. Atk stat."
    fr: "Si l’ennemi est de\nsexe opposé au\nlanceur, il est séduit\net sa stat Atq. Spé.\nbaisse fortement."
    it: "Se il nemico è del\nsesso opposto di chi\nla usa, verrà amma-\nliato e il suo Att. Sp.\ndiminuirà di molto."
    de: "Charme-Angriff, der\nSpezial-Angriff senkt,\nfalls Gegner dem\nanderen Geschlecht\nangehört."
    es: "Si el rival es del\nsexo opuesto, queda\nembelesado y baja\nmucho su At. Esp."
    ko: "수컷은 암컷을 암컷은\n수컷을 유혹하여\n상대의 특수공격을\n크게 떨어뜨린다."
charge:
  names:
    jp_kana: じゅうでん
    en: Charge
    fr: Chargeur
    it: Sottocarica
    de: Ladevorgang
    es: Carga
    ko: 충전
  descriptions:
    jp_kana: "つぎの　ターンに　だす\nでんきタイプの　わざの\nいりょくを　あげる。\nじぶんの　とくぼうも\nあがる。"
    en: "The user boosts the\npower of the Electric\nmove it uses next.\nIt also raises the\nuser’s Sp. Def stat."
    fr: "Le lanceur concentre\nsa puissance pour \npréparer une attaque\nElectrik. Augmente sa\nDéf. Spé."
    it: "Potenzia la mossa\nElettro usata\nsuccessivamente.\nAumenta anche la\nDif. Sp. di chi la usa."
    de: "Lädt Energie für\ndie kommende\nElektro-Attacke\nauf. Erhöht die\nSpezial-Verteidigung."
    es: "Recarga energía\npara potenciar el\nataque Eléctrico\nposterior. También\nsube la Def. Esp."
    ko: "다음 턴에 쓸\n전기타입 기술의\n위력을 올린다.\n자신의 특수방어도\n올라간다."
charge_beam:
  names:
    jp_kana: チャージビーム
    en: Charge Beam
    fr: Rayon Chargé
    it: Raggioscossa
    de: Ladestrahl
    es: Rayo Carga
    ko: 차지빔
  descriptions:
    jp_kana: "でんげきの　たばを\nあいてに　はっしゃする。\nでんきを　ためこんで\nじぶんの　とくこうを\nあげることが　ある。"
    en: "The user fires a\nconcentrated bundle\nof electricity. It may\nalso raise the user’s\nSp. Atk stat."
    fr: "Le lanceur tire un\nrayon chargé\nd’électricité. Peut\naussi augmenter son\nAtq. Spé."
    it: "Chi la usa lancia un\nfascio di elettricità\nmolto intensa. Può\nanche aumentare\nil suo Att. Sp."
    de: "Gegner wird von einem\nElektrostrahl ge-\ntroffen. Steigert\neventuell Spez.-Angr.\ndes Anwenders."
    es: "Lanza un rayo\neléctrico contra el\nrival. Puede subir\nel At. Esp. de quien\nlo usa."
    ko: "전격의 다발을\n상대에게 발사한다.\n전기를 모아서\n자신의 특수공격을\n올릴 때가 있다."
charm:
  names:
    jp_kana: あまえる
    en: Charm
    fr: Charme
    it: Fascino
    de: Charme
    es: Encanto
    ko: 애교부리기
  descriptions:
    jp_kana: "かわいく　みつめて\nゆだんを　さそい\nあいての　こうげきを\nがくっと　さげる。"
    en: "The user charmingly\nstares at the foe,\nmaking it less wary.\nThe target’s Attack\nis sharply lowered."
    fr: "Le lanceur fait les\nyeux doux pour berner\nl’ennemi et réduire\nconsidérablement\nson Attaque."
    it: "Ammalia il nemico\ncon lo sguardo per\nrenderlo meno cauto.\nRiduce molto l’Attacco\ndel nemico."
    de: "Betört den Gegner\nund reduziert\nseinen Angriff\ndeutlich."
    es: "Engatusa al rival y\nreduce bastante\nsu Ataque."
    ko: "귀엽게 바라보고\n방심을 유도하여\n상대의 공격을\n크게 떨어뜨린다."
chatter:
  names:
    jp_kana: おしゃべり
    en: Chatter
    fr: Babil
    it: Schiamazzo
    de: Geschwätz
    es: Cháchara
    ko: 수다
  descriptions:
    jp_kana: "おぼえた　ことばで\nおんぱを　おこして\nこうげきする。\nあいてを　こんらん\nさせることが　ある。"
    en: "The user attacks\nusing a sound wave\nbased on words it has\nlearned. It may also\nconfuse the foe."
    fr: "Le lanceur envoie une\nonde musicale en\nrécitant des mots.\nPeut aussi rendre\nl’ennemi confus."
    it: "Chi la usa attacca\ncreando un’onda so-\nnora con le parole\nimparate. Può anche\nconfondere il nemico."
    de: "Attacke mit\nSchallwellen.\nVerwirrt den\nGegner eventuell."
    es: "Ataca con una onda\nsónica compuesta\npor palabras que ha\naprendido. Puede\nconfundir al rival."
    ko: "기억한 말로\n음파를 일으켜서\n공격한다.\n상대를 혼란\n시킬 때가 있다."
clamp:
  names:
    jp_kana: からではさむ
    en: Clamp
    fr: Claquoir
    it: Tenaglia
    de: Schnapper
    es: Tenaza
    ko: 껍질끼우기
  descriptions:
    jp_kana: "とても　がんじょうな\nぶあつい　からに\n２ー５ターンの　あいだ\nあいてを　はさんで\nこうげきする。"
    en: "The foe is clamped\nand squeezed by\nthe user’s very thick\nand sturdy shell for\ntwo to five turns."
    fr: "Le lanceur piège\nl’ennemi dans sa dure\ncoquille et l’écrase\npendant 2 à 5 tours."
    it: "Chi la usa intrappola e\nstringe il nemico con\nla sua corazza spessa\ne forte per 2-5 turni."
    de: "Fängt und quetscht\nden Gegner für\n2 - 5 Runden durch\ndie harte Schale\ndes Anwenders."
    es: "Atrapa y atenaza\ncon fuerza de 2\na 5 turnos."
    ko: "매우 튼튼하고\n두꺼운 껍질에\n2-5턴 동안\n상대를 끼워서\n공격한다."
close_combat:
  names:
    jp_kana: インファイト
    en: Close Combat
    fr: Close Combat
    it: Zuffa
    de: Nahkampf
    es: A Bocajarro
    ko: 인파이트
  descriptions:
    jp_kana: "まもりを　すてて\nあいての　ふところに\nとつげき　する。\nじぶんの　ぼうぎょと\nとくぼうが　さがる。"
    en: "The user fights the\nfoe in close without\nguarding itself. It\nalso cuts the user’s\nDefense and Sp. Def."
    fr: "Le lanceur combat au\ncorps à corps sans se\nprotéger. Baisse\naussi sa Défense et\nsa Déf. Spé."
    it: "Chi la usa attacca\nabbassando la guar-\ndia. La propria Difesa\ne Difesa Speciale si\nriducono."
    de: "Nahkampf-Attacke\nohne Rücksicht auf\nVerluste. Senkt\nVerteidig. u. Spezial-\nVert. des Anwenders."
    es: "Lucha abiertamente\ncontra el rival sin\ndefenderse. También\nreduce la Defensa y la\nDef. Esp. del usuario."
    ko: "방어를 포기하고\n상대 깊숙이\n돌격한다.\n자신의 방어와\n특수방어가 떨어진다."
comet_punch:
  names:
    jp_kana: れんぞくパンチ
    en: Comet Punch
    fr: Poing Comète
    it: Cometapugno
    de: Kometenhieb
    es: Puño Cometa
    ko: 연속펀치
  descriptions:
    jp_kana: "どとうの　パンチで\nあいてを　なぐりつけて\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The foe is hit with\na flurry of punches\nthat strike two to\nfive times in a row."
    fr: "Une tornade de coups\nde poing qui frappe de\n2 à 5 fois d’affilée."
    it: "Colpisce il nemico\ncon una scarica di\npugni per 2-5 volte\ndi fila."
    de: "Trifft den Gegner\n2 - 5-mal\nhintereinander."
    es: "Pega de 2 a 5\nveces seguidas."
    ko: "노도 같은 펀치로\n상대를 세게 때려서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
confuse_ray:
  names:
    jp_kana: あやしいひかり
    en: Confuse Ray
    fr: Onde Folie
    it: Stordiraggio
    de: Konfustrahl
    es: Rayo Confuso
    ko: 이상한빛
  descriptions:
    jp_kana: "あやしい　ひかりを\nあいてに　みせて\nまどわせる。\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The foe is exposed\nto a sinister ray\nthat triggers\nconfusion."
    fr: "Un rayon sinistre\nqui plonge l’ennemi\ndans un état de\nconfusion."
    it: "Colpisce il nemico\ncon un raggio fune-\nsto che lo confonde."
    de: "Ein fieser Strahl,\nder den Gegner\nverwirrt."
    es: "Rayo siniestro que\nconfunde al enemigo."
    ko: "이상한 빛을\n상대에게 비춰\n혼란시킨다.\n상대를 혼란\n상태로 만든다."
confusion:
  names:
    jp_kana: ねんりき
    en: Confusion
    fr: Choc Mental
    it: Confusione
    de: Konfusion
    es: Confusión
    ko: 염동력
  descriptions:
    jp_kana: "よわい　ねんりきを\nあいてに　おくって\nこうげきする。\nあいてを　こんらん\nさせることが　ある。"
    en: "The foe is hit by a\nweak telekinetic\nforce. It may also\nleave the foe\nconfused."
    fr: "Une faible vague\ntélékinésique frappe\nl’ennemi. Peut aussi le\nplonger dans la\nconfusion."
    it: "Colpisce il nemico con\nuna leggera forza\ntelecinetica e può\nanche confonderlo."
    de: "Der Gegner wird von\nschwacher telekine-\ntischer Energie ge-\ntroffen und eventuell\nverwirrt."
    es: "Ataque psíquico\nque puede causar\nconfusión."
    ko: "약한 염동력을\n상대에게 보내어\n공격한다.\n상대를 혼란\n시킬 때가 있다."
constrict:
  names:
    jp_kana: からみつく
    en: Constrict
    fr: Constriction
    it: Limitazione
    de: Umklammerung
    es: Restricción
    ko: 휘감기
  descriptions:
    jp_kana: "しょくしゅや　ツタ\nなどを　からみつけて\nこうげきする。\nあいての　すばやさを\nさげることが　ある。"
    en: "The foe is attacked\nwith long, creeping\ntentacles or vines.\nIt may also lower the\ntarget’s Speed."
    fr: "De longs tentacules\nou lianes attaquent\nl’ennemi. Peut aussi\nbaisser sa Vitesse."
    it: "Colpisce il nemico\ncon lunghi tentacoli\no piante rampicanti.\nPuò anche ridurne\nla Velocità."
    de: "Angriff mit langen\nTentakeln o. Ranken.\nSenkt eventuell\nInitiative-Wert."
    es: "Constriñe para herir\ny puede bajar la\nVelocidad."
    ko: "촉수나 덩굴\n등을 휘감아서\n공격한다.\n상대의 스피드를\n떨어뜨릴 때가 있다."
conversion:
  names:
    jp_kana: テクスチャー
    en: Conversion
    fr: Adaptation
    it: Conversione
    de: Umwandlung
    es: Conversión
    ko: 텍스처
  descriptions:
    jp_kana: "じぶんの　タイプを\nおぼえている　わざの\nなかの　どれか　１つと\nおなじ　タイプにする。"
    en: "The user changes its\ntype to become the\nsame type as one of\nits moves."
    fr: "Le lanceur change\nde type pour prendre\ncelui de l’une de\nses capacités."
    it: "Il tipo di chi la\nusa muta in quello\ndi una sua mossa."
    de: "Wandelt den Typ\ndes Anwenders in\nden Typ einer\nAttacke."
    es: "Cambia el tipo del\nusuario por el de\nuno de sus ataques."
    ko: "자신의 타입을\n배운 기술 중\n어느 하나와\n같은 타입으로\n바꾼다."
conversion_2:
  names:
    jp_kana: テクスチャー２
    en: Conversion 2
    fr: Conversion 2
    it: Conversione2
    de: Umwandlung2
    es: Conversión2
    ko: 텍스처2
  descriptions:
    jp_kana: "じぶんの　タイプを\nさいごに　うけた\nわざに　ていこう\nできる　タイプに\nへんか　させる。"
    en: "The user changes its\ntype to make itself\nresistant to the type\nof the attack it\nlast took."
    fr: "Le lanceur change\nde type pour être\nrésistant au type de\nla dernière attaque\nqui l’a touché."
    it: "Chi la usa cambia\ntipo per rendersi\nresistente al tipo\ndell’ultimo attacco\nsubito."
    de: "Anwender ändert\nTyp und wird gegen\nletzten Angriffstyp\nresistent."
    es: "Cambia el tipo para\nhacerse resistente\nal último tipo de\nataque recibido."
    ko: "자신의 타입을\n마지막으로 받은\n기술에 저항할 수\n있는 타입으로\n변화시킨다."
copycat:
  names:
    jp_kana: まねっこ
    en: Copycat
    fr: Photocopie
    it: Copione
    de: Imitator
    es: Copión
    ko: 흉내쟁이
  descriptions:
    jp_kana: "ちょくぜんに　でた\nわざを　まねして\nおなじ　わざを　だす。\nわざが　でていないと\nしっぱい　する。"
    en: "The user mimics the\nmove used immediately\nbefore it. The move\nfails if no other move\nhas been used yet."
    fr: "Le lanceur imite la\ndernière capacité\nemployée. Echoue\nsi aucune capacité\nn’a été utilisée."
    it: "Chi la usa mima la\nmossa eseguita subito\nprima dal nemico. Fal-\nlisce se non ne sono\nstate ancora usate."
    de: "Anwender imitiert ge-\nrade verwendete Att.\nDies schlägt fehl,\nfalls zuvor keine Att.\nverwendet wurde."
    es: "Imita el movimiento\nusado justo antes.\nEl movimiento falla\nsi no se ha usado\naún ninguno."
    ko: "직전에 나온\n기술을 흉내 내어\n같은 기술을 쓴다.\n기술이 나오지\n않았으면 실패한다."
cosmic_power:
  names:
    jp_kana: コスモパワー
    en: Cosmic Power
    fr: Force Cosmik
    it: Cosmoforza
    de: Kosmik-Kraft
    es: Masa Cósmica
    ko: 코스믹파워
  descriptions:
    jp_kana: "うちゅう　から\nしんぴの　ちからを\nとりこむ　ことで\nじぶんの　ぼうぎょと\nとくぼうを　あげる。"
    en: "The user absorbs a\nmystical power from\nspace to raise its\nDefense and Sp. Def\nstats."
    fr: "Le lanceur absorbe un\npouvoir mystique \nspatial qui augmente\nsa Défense et \nsa Déf. Spé."
    it: "Chi la usa assorbe\nuna forza magica\ndallo spazio che\naumenta la Difesa\ne la Dif. Sp."
    de: "Erhöht Verteidigung\nund Spezial-Verteidig.\ndurch eine mystische\nKraft."
    es: "Sube la Defensa\ny la Def. Esp. propias\ncon energía mística."
    ko: "우주로부터\n신비한 힘을\n손에 넣음으로써\n자신의 방어와\n특수방어를 올린다."
cotton_spore:
  names:
    jp_kana: わたほうし
    en: Cotton Spore
    fr: Spore Coton
    it: Cottonspora
    de: Baumwollsaat
    es: Esporagodón
    ko: 목화포자
  descriptions:
    jp_kana: "わたのような\nフワフワの　ほうしを\nまとわり　つかせて\nあいての　すばやさを\nがくっと　さげる。"
    en: "The user releases\ncottonlike spores\nthat cling to the\nfoe, sharply reducing\nits Speed stat."
    fr: "Le lanceur libère des\nspores cotonneuses\nqui collent à l’ennemi\net baissent fortement\nsa Vitesse."
    it: "Rilascia spore simili\nal cotone che si\nattaccano al nemico e\nriducono di molto la\nsua Velocità."
    de: "Wattebäusche\nheften sich an den\nGegner. Der\nInitiative-Wert sinkt."
    es: "Adhiere esporas al\nrival para reducir\nmucho su Velocidad."
    ko: "솜처럼\n폭신폭신한 포자를\n착 달라붙게 해서\n상대의 스피드를\n크게 떨어뜨린다."
counter:
  names:
    jp_kana: カウンター
    en: Counter
    fr: Riposte
    it: Contatore
    de: Konter
    es: Contador
    ko: 카운터
  descriptions:
    jp_kana: "あいてから　うけた\nぶつり　こうげきの\nダメージを　２ばいに\nして　その　あいてに\nかえす。"
    en: "A retaliation move\nthat counters any\nphysical attack,\ninflicting double the\ndamage taken."
    fr: "Une riposte qui contre\ntoute attaque\nphysique en infligeant\nle double de dégâts."
    it: "Mossa che contrasta\nogni attacco fisico,\narrecando il doppio\ndel danno ricevuto."
    de: "Kontert physischen\nTreffer mit\ndoppelter Kraft,\nfügt doppelten\nSchaden zu."
    es: "Devuelve un golpe\nfísico por duplicado."
    ko: "상대로부터 받은\n물리공격의\n데미지를 2배로\n만들어 그 상대에게\n돌려준다."
covet:
  names:
    jp_kana: ほしがる
    en: Covet
    fr: Implore
    it: Supplica
    de: Bezirzer
    es: Antojo
    ko: 탐내다
  descriptions:
    jp_kana: "かわいく　あまえながら\nあいてに　ちかづき\nもっている　どうぐを\nうばう。"
    en: "The user endearingly\napproaches the foe,\nthen steals the item\nthe foe is holding."
    fr: "Le lanceur s’approche\nde l’ennemi avec un\nair angélique afin\nde dérober l’objet\nqu’il tient."
    it: "Chi la usa si avvicina\nal nemico supplican-\ndolo, per rubargli\nlo strumento che\ntiene."
    de: "Bittet charmant um\ndas gehaltene Item\ndes Gegners und\nstiehlt es dann."
    es: "Se acerca con\nternura al rival y le\nroba el objeto que\nlleve."
    ko: "귀엽게 애교부리며\n상대에게 다가가\n지니고 있는 도구를\n뺏는다."
crabhammer:
  names:
    jp_kana: クラブハンマー
    en: Crabhammer
    fr: Pince-Masse
    it: Martellata
    de: Krabbhammer
    es: Martillazo
    ko: 찝게햄머
  descriptions:
    jp_kana: "おおきな　ハサミを\nあいてに　たたきつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is hammered\nwith a large pincer.\nThis move has a high\ncritical-hit ratio."
    fr: "Une grande pince\nmartèle l’ennemi.\nCette capacité a un\ntaux de critiques\nélevé."
    it: "Colpisce il nemico con\nuna grande tenaglia.\nProbabile brutto\ncolpo."
    de: "Schlägt mit Schere\nzu. Die Volltreffer-\nquote ist hoch."
    es: "Golpea con fuerza\ncon unas pinzas.\nSuele ser crítico."
    ko: "큰 집게를\n상대에게 내리쳐서\n공격한다.\n급소에 맞을\n확률이 높다."
cross_chop:
  names:
    jp_kana: クロスチョップ
    en: Cross Chop
    fr: Coup-Croix
    it: Incrocolpo
    de: Kreuzhieb
    es: Tajo Cruzado
    ko: 크로스촙
  descriptions:
    jp_kana: "りょうて　チョップを\nあいてに　たたきつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user delivers a\ndouble chop with its\nforearms crossed.\nIt has a high\ncritical-hit ratio."
    fr: "Le lanceur délivre un\ncoup double en\ncroisant les\navant-bras. Taux de\ncritiques élevé."
    it: "Investe il nemico con\nun doppio colpo\nsferrato a braccia\nincrociate. Probabile\nbrutto colpo."
    de: "Doppelter Hieb mit den\nVorderarmen. Hohe\nVolltrefferquote."
    es: "Corte doble que\nsuele propinar\nun golpe crítico."
    ko: "양손으로 당수를\n상대에게 힘껏 쳐서\n공격한다.\n급소에 맞을\n확률이 높다."
cross_poison:
  names:
    jp_kana: クロスポイズン
    en: Cross Poison
    fr: Poison-Croix
    it: Velenocroce
    de: Giftstreich
    es: Veneno X
    ko: 크로스포이즌
  descriptions:
    jp_kana: "あいてを　きりさく。\nどく　じょうたいに\nすることが　あり\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "A slashing attack\nthat may also leave\nthe target poisoned.\nIt has a high\ncritical-hit ratio."
    fr: "Un coup tranchant qui\npeut empoisonner\nl’ennemi. Taux de\ncritiques élevé."
    it: "Attacco devastante\nche può anche\navvelenare il Pokémon\ncolpito. Probabile\nbrutto colpo."
    de: "Ein scharfer Hieb,\nder den Gegner\neventuell vergiftet.\nHat eine hohe\nVolltrefferquote."
    es: "Tajo que puede\nenvenenar al rival.\nSuele ser crítico."
    ko: "상대를 베어 가른다.\n독 상태로 \n만들 때가 있고\n급소에 맞을\n확률이 높다."
crunch:
  names:
    jp_kana: かみくだく
    en: Crunch
    fr: Mâchouille
    it: Sgranocchio
    de: Knirscher
    es: Triturar
    ko: 깨물어부수기
  descriptions:
    jp_kana: "するどい　はで\nあいてを　かみくだいて\nこうげきする。\nあいての　ぼうぎょを\nさげることが　ある。"
    en: "The user crunches up\nthe foe with sharp\nfangs. It may also\nlower the target’s\nDefense stat."
    fr: "Le lanceur mord\nl’ennemi de ses crocs\npointus. Peut aussi\nbaisser la Défense de\nl’ennemi."
    it: "Il nemico viene morso\ncon denti affilati.\nPuò anche ridurne\nla Difesa."
    de: "Beißt mit scharfen\nReißzähnen zu und\nsenkt eventuell die\nVerteidigung."
    es: "Tritura con afilados\ncolmillos y puede\nbajar la Defensa\ndel enemigo."
    ko: "날카로운 이빨로\n상대를 깨물어 부숴서\n공격한다.\n상대의 방어를\n떨어뜨릴 때가 있다."
crush_claw:
  names:
    jp_kana: ブレイククロー
    en: Crush Claw
    fr: Eclategriffe
    it: Tritartigli
    de: Zermalmklaue
    es: Garra Brutal
    ko: 브레이크크루
  descriptions:
    jp_kana: "かたく　するどい\nツメで　きりさいて\nこうげきする。\nあいての　ぼうぎょを\nさげることが　ある。"
    en: "The user slashes the\nfoe with hard and\nsharp claws.\nIt may also lower the\ntarget’s Defense."
    fr: "Lacère l’ennemi avec\ndes griffes solides et\naiguisées. Peut aussi\nbaisser sa Défense."
    it: "Colpisce il nemico\ncon artigli robusti e\naffilati che possono\nridurne la Difesa."
    de: "Angriff mit scharfen\nKlauen. Senkt\neventuell den\nVerteidigungs-Wert."
    es: "Hace trizas al\nenemigo con garras\nafiladas y puede\nbajar la Defensa."
    ko: "단단하고 날카로운\n손톱으로 베어 갈라서\n공격한다.\n상대의 방어를\n떨어뜨릴 때가 있다."
crush_grip:
  names:
    jp_kana: にぎりつぶす
    en: Crush Grip
    fr: Presse
    it: Sbriciolmano
    de: Quetschgriff
    es: Agarrón
    ko: 묵사발
  descriptions:
    jp_kana: "すさまじい　ちからで\nにぎり　つぶす。\nあいての　ＨＰが\nのこっている　ほど\nいりょくが　あがる。"
    en: "The foe is crushed\nwith great force.\nThe attack is more\npowerful the more HP\nthe foe has left."
    fr: "Une force puissante\nécrase l’ennemi. Plus\nil lui reste de PV et\nplus l’attaque est\npuissante."
    it: "Colpisce il nemico con\ngrande forza.\nLa potenza è propor-\nzionale ai PS del\nnemico."
    de: "Gegner wird mit gros-\nser Kraft getroffen.\nJe höher die KP des\nGegners, desto\nstärker die Attacke."
    es: "Estruja al rival con\ngran fuerza. Cuantos\nmás PS le queden al\nrival, más fuerte\nserá el ataque."
    ko: "굉장한 힘으로\n묵사발을 만든다.\n상대의 HP가\n남아있을수록\n위력이 올라간다."
curse:
  names:
    jp_kana: のろい
    en: Curse
    fr: Malédiction
    it: Maledizione
    de: Fluch
    es: Maldición
    ko: 저주
  descriptions:
    jp_kana: "つかう　ポケモンが\nゴーストタイプと\nそれいがい　とでは\nこうかが　かわる。"
    en: "A move that works\ndifferently for the\nGhost type than for\nall the other types."
    fr: "Une capacité qui\nfonctionne \ndifféremment pour\nles Pokémon Spectre."
    it: "Una mossa che\nagisce in modo\ndiverso per il tipo\nSpettro rispetto\nagli altri tipi."
    de: "Eine Attacke, die\nbei Geist-Pokémon\nanders funktioniert."
    es: "En el tipo Fantasma\ntiene un efecto\ndistinto."
    ko: "기술을 쓰는 포켓몬이\n고스트타입일 때와\n그 이외의 타입일 때는\n효과가 다르다."
cut:
  names:
    jp_kana: いあいぎり
    en: Cut
    fr: Coupe
    it: Taglio
    de: Zerschneider
    es: Corte
    ko: 풀베기
  descriptions:
    jp_kana: "カマや　ツメなどで\nあいてを　きりつけて\nこうげきする。\nほそいき　なども\nきることも　できる。"
    en: "The foe is cut with a\nscythe or a claw.\nIt can also be used\nto cut down thin\ntrees."
    fr: "Coupe l’ennemi avec\ndes lames ou des\ngriffes. Hors combat,\npermet de couper des\narbres fins."
    it: "Attacca il nemico\ncon artigli o falci\naffilate. Fuori dalla\nlotta si usa per ta-\ngliare piccoli alberi."
    de: "Ein Basisangriff mit\nSchere oder Klaue.\nDamit können kleine\nBäume gefällt werden."
    es: "Corta con garras,\nguadañas, etc.\nTambién sirve\npara cortar árboles \ny plantas."
    ko: "낫이나 손톱 등으로\n상대를 베어\n공격한다.\n가느다란 나무 등도\n자를 수 있다."
dark_pulse:
  names:
    jp_kana: あくのはどう
    en: Dark Pulse
    fr: Vibrobscur
    it: Neropulsar
    de: Finsteraura
    es: Pulso Umbrío
    ko: 악의파동
  descriptions:
    jp_kana: "からだから　あくいに\nみちた　おそろしい\nオーラを　はっする。\nあいてを　ひるませる\nことがある。"
    en: "The user releases a\nhorrible aura imbued\nwith dark thoughts.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur dégage une\nhorrible aura chargée\nd’idées noires. Peut\naussi apeurer\nl’ennemi."
    it: "Chi la usa emana\nun’aura impregnata di\noscuri pensieri. Può\nanche far tentennare\nil Pokémon colpito."
    de: "Anwender greift mit\nfürchterlicher Aura\nschlechter Gedanken\nan. Gegner schreckt\neventuell zurück."
    es: "Libera una horrible\naura llena de malos\npensamientos y\npuede hacer\nretroceder al rival."
    ko: "몸에서 악의로\n가득한 무서운\n오라를 발한다.\n상대를 풀죽게\n만들 때가 있다."
dark_void:
  names:
    jp_kana: ダークホール
    en: Dark Void
    fr: Trou Noir
    it: Vuototetro
    de: Schlummerort
    es: Brecha Negra
    ko: 다크홀
  descriptions:
    jp_kana: "あんこくの　せかいに\nひきずり　おとして\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The foe is dragged\ninto a world of total\ndarkness that puts it\nto sleep."
    fr: "L’ennemi est plongé\ndans les ténèbres. Il\ntombe dans un\nprofond sommeil."
    it: "Trascina il nemico\nin un mondo di totale\noscurità e lo fa\naddormentare."
    de: "Der Gegner wird in\neine Welt der\nDunkelheit gezogen\nund in Schlaf\nversetzt."
    es: "El rival es enviado a\nun mundo de tinieblas\nque lo hace dormir."
    ko: "암흑의 세계로\n끌고 가서 떨어뜨려\n상대를 잠듦\n상태로 만든다."
defend_order:
  names:
    jp_kana: ぼうぎょしれい
    en: Defend Order
    fr: Appel Défens
    it: Comandoscudo
    de: Blockbefehl
    es: A Defender
    ko: 방어지령
  descriptions:
    jp_kana: "しもべを　よびだして\nじぶんの　からだに\nおおい　つかせる。\nぼうぎょと　とくぼうを\nあげることが　できる。"
    en: "The user calls out\nits underlings to\nshield its body,\nraising its Defense\nand Sp. Def stats."
    fr: "Le lanceur appelle\nses sous-fifres pour\nformer un bouclier qui\naugmente sa Défense\net sa Déf. Spé."
    it: "Chi la usa raduna i\nsuoi sgherri per\ncreare uno scudo,\naumentando Difesa\ne Dif. Sp."
    de: "Untergebene bilden\nein lebendes Schild\num den Anwender.\nSteigert Verteidigung\nund Spezial-Verteidig."
    es: "El usuario llama a\nsus amigos para \nque formen un\nescudo viviente. Sube\nla Def. y la Def. Esp."
    ko: "부하를 불러내어\n자신의 몸을\n뒤덮게 한다.\n방어와 특수방어를\n올릴 수 있다."
defense_curl:
  names:
    jp_kana: まるくなる
    en: Defense Curl
    fr: Boul’Armure
    it: Ricciolscudo
    de: Einigler
    es: Rizo Defensa
    ko: 웅크리기
  descriptions:
    jp_kana: "からだを　まるめて\nちぢこまり　じぶんの\nぼうぎょを　あげる。"
    en: "The user curls up to\nconceal weak spots\nand raise its Defense\nstat."
    fr: "Le lanceur s’enroule\npour cacher ses\npoints faibles, ce qui\naugmente sa Défense."
    it: "Chi la usa si\nraggomitola per\nnascondere i punti\ndeboli e aumentare\nla propria Difesa."
    de: "Verbirgt Schwächen\ndurch Einrollen und\nhebt gleichzeitig den\nVerteidigungs-Wert."
    es: "Se enrosca para\nocultar su punto\ndébil. Sube la\nDefensa."
    ko: "몸을 둥글게\n웅크려서 자신의\n방어를 올린다."
defog:
  names:
    jp_kana: きりばらい
    en: Defog
    fr: Anti-Brume
    it: Scacciabruma
    de: Auflockern
    es: Despejar
    ko: 안개제거
  descriptions:
    jp_kana: "しょうがいぶつを\nなくして　あいての\nかいひりつを　さげる。\nふかいきり　などを\nけすことも　できる。"
    en: "Obstacles are moved,\nreducing the foe’s\nevasion stat. It can\nalso be used to\nclear deep fog, etc."
    fr: "Dégage les obstacles\npour baisser l’esquive\nde l’ennemi. Permet\naussi de chasser le\nbrouillard."
    it: "Rimuove gli ostacoli\ne riduce l’elusione\ndel nemico. Si può\nusare per disperdere\nla nebbia fitta, ecc."
    de: "Fluchtwert des\nGegners wird durch\nHindernisse gesenkt.\nLöst zudem Nebel auf."
    es: "Aparta obstáculos, lo\nque reduce la evasión\ndel rival. También\npuede usarse para\ndespejar niebla, etc."
    ko: "장애물을\n없애서 상대의\n회피율을 떨어뜨린다.\n두꺼운 안개 등을\n없앨 수도 있다."
destiny_bond:
  names:
    jp_kana: みちづれ
    en: Destiny Bond
    fr: Prlvt Destin
    it: Destinobbl.
    de: Abgangsbund
    es: Mismodestino
    ko: 길동무
  descriptions:
    jp_kana: "わざを　だしたあと\nこうげきを　うけて\nひんしに　なったとき\nこうげき　あいても\nひんしに　する。"
    en: "When this move is\nused, if the user\nfaints, the foe that\nlanded the knockout\nhit also faints."
    fr: "Quand cette capacité\nest activée, elle met\nK.O. un ennemi qui\nporte un coup fatal\nau lanceur."
    it: "Se chi l’ha usata\nva KO, il nemico\nche ha sferrato\nil colpo decisivo\nfa la stessa fine."
    de: "Wird der Anwender\nbesiegt, gilt das\nauch für den\nGegner."
    es: "Si el usuario se\ndebilita, el enemigo\nse debilita también."
    ko: "기술을 쓴 뒤\n공격을 받아\n기절했을 때\n공격한 상대도\n기절하게 한다."
detect:
  names:
    jp_kana: みきり
    en: Detect
    fr: Détection
    it: Individua
    de: Scanner
    es: Detección
    ko: 판별
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと\nしっぱい　しやすい。"
    en: "It enables the user\nto evade all attacks.\nIts chance of failing\nrises if it is used in\nsuccession."
    fr: "Permet d’esquiver\ntoutes les attaques.\nPlus on l’utilise\nd’affilée, plus elle a\nde chances d’échouer."
    it: "Permette di eludere\ntutti gli attacchi. Se\nusata in successione\npuò fallire."
    de: "Anwender weicht\njeder Attacke aus.\nScheitert eventuell\nbei Wiederholung."
    es: "Frena todos los\nataques, pero puede\nfallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면\n실패하기 쉽다."
dig:
  names:
    jp_kana: あなをほる
    en: Dig
    fr: Tunnel
    it: Fossa
    de: Schaufler
    es: Excavar
    ko: 구멍파기
  descriptions:
    jp_kana: "１ターンめに　もぐり\n２ターンめで　あいてを\nこうげきする。\nどうくつ　などから\nだっしゅつも　できる。"
    en: "The user burrows,\nthen attacks on the\nsecond turn.\nIt can also be used\nto exit dungeons."
    fr: "Le lanceur creuse au\n1ᵉʳ tour et frappe au\n2ᵉ. Permet aussi de\ns’échapper d’un\ndonjon."
    it: "Chi la usa scava al\nprimo turno e attacca\nal successivo. Si può\nusare per uscire dai\nluoghi chiusi."
    de: "In Runde 1 eingraben\nund in Runde 2\nangreifen. Flucht aus\nHöhlen möglich."
    es: "Primer turno: cava.\nSegundo turno:\nataca. También sirve\npara salir de ciertas\nzonas."
    ko: "1턴째에 파고들어\n2턴째에 상대를\n공격한다.\n동굴 등에서 \n탈출할 수도 있다."
disable:
  names:
    jp_kana: かなしばり
    en: Disable
    fr: Entrave
    it: Inibitore
    de: Aussetzer
    es: Anulación
    ko: 사슬묶기
  descriptions:
    jp_kana: "あいての　うごきを\nとめて　ちょくぜんに\nだしていた　わざを\nしばらくの　あいだ\nつかえなく　する。"
    en: "For several turns,\nthis move prevents\nthe foe from using\nthe move it last\nused."
    fr: "Empêche l’ennemi\nd’employer à nouveau\nsa dernière attaque.\nDure plusieurs tours."
    it: "Per diversi turni\nquesta mossa\nimpedisce al nemico\ndi riutilizzare l’ultima\nmossa usata."
    de: "Die zuletzt einge-\nsetzte gegn. Attacke\nwird für mehrere\nRunden blockiert."
    es: "Desactiva el último\nmovimiento del enemigo\ndurante varios\nturnos."
    ko: "상대의 움직임을\n막아 바로 전에\n쓴 기술을\n잠시 동안 사용할\n수 없게 만든다."
discharge:
  names:
    jp_kana: ほうでん
    en: Discharge
    fr: Coup d’Jus
    it: Scarica
    de: Ladungsstoß
    es: Chispazo
    ko: 방전
  descriptions:
    jp_kana: "まばゆい　でんげきで\nまわりに　いるものを\nすべて　こうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "A flare of electricity\nis loosed to strike\nall Pokémon in battle.\nIt may also cause\nparalysis."
    fr: "Un flamboiement\nd’électricité frappe\ntous les autres\nPokémon au combat.\nPeut aussi paralyser."
    it: "Chi la usa colpisce\ngli altri Pokémon in\ncampo con un bagliore\nelettrico. Può anche\ncausare paralisi."
    de: "Anwender greift mit\nElektrizität jedes im\nKampf befindliche\nPokémon an.\nParalysiert evtl."
    es: "Una deslumbradora\nonda eléctrica afecta\na los demás Pokémon\ndel combate. Puede\nparalizar."
    ko: "눈부신 전격으로\n주위에 있는\n모두를 공격한다.\n마비 상태로\n만들 때가 있다."
dive:
  names:
    jp_kana: ダイビング
    en: Dive
    fr: Plongée
    it: Sub
    de: Taucher
    es: Buceo
    ko: 다이빙
  descriptions:
    jp_kana: "１ターンめで　ふかく\nもぐり　２ターンめ\nうきあがって　あいてを\nこうげきする。"
    en: "A two-turn attack.\nThe user dives\nunderwater on the\nfirst turn, then hits\non the next turn."
    fr: "Une attaque en 2\ntours. Le lanceur\nplonge sous l’eau au\n1ᵉʳ tour et frappe\nau 2ᵉ."
    it: "Mossa in 2 turni. Chi\nla usa s’immerge al\nprimo turno e attacca\nin quello seguente."
    de: "Der Anwender\ntaucht in der 1.\nRunde unter und\ntrifft in Runde 2."
    es: "Primer turno: bucea.\nSegundo turno:\ngolpea."
    ko: "1턴째에\n깊이 잠수했다가\n2턴째에 떠올라\n상대를 공격한다."
dizzy_punch:
  names:
    jp_kana: ピヨピヨパンチ
    en: Dizzy Punch
    fr: Uppercut
    it: Stordipugno
    de: Irrschlag
    es: Puño Mareo
    ko: 잼잼펀치
  descriptions:
    jp_kana: "リズミカルに\nパンチを　くりだして\nこうげきする。\nあいてを　こんらん\nさせることが　ある。"
    en: "The foe is hit with\nrhythmically launched\npunches that may also\nleave it confused."
    fr: "Un enchaînement de\ncoups de poing \ncadencés. Peut\naussi rendre confus."
    it: "Colpisce il nemico\ncon una sequenza\ndi pugni che può\nanche confonderlo."
    de: "Rhythmische Schläge,\ndie den Gegner\nverwirren können."
    es: "Rítmicos puñetazos\nque pueden causar\nconfusión."
    ko: "리드미컬한\n펀치를 날려\n공격한다.\n상대를 혼란\n시킬 때가 있다."
doom_desire:
  names:
    jp_kana: はめつのねがい
    en: Doom Desire
    fr: Carnareket
    it: Obbliderio
    de: Kismetwunsch
    es: Deseo Oculto
    ko: 파멸의소원
  descriptions:
    jp_kana: "わざを　つかった\n２ターン　あとに\nむすうの　ひかりの\nたばで　あいてを\nこうげきする。"
    en: "Two turns after this\nmove is used, the\nuser blasts the foe\nwith a concentrated\nbundle of light."
    fr: "Le lanceur génère\nune sphère lumineuse\nqu’il projette sur\nl’ennemi 2 tours\nplus tard."
    it: "Intensa luce solare\nche colpisce il nemico\ndopo 2 turni dall’uso\ndella mossa."
    de: "Angriff mit\nSonnenenergie erfolgt\nzwei Runden nach\nAttackeneinsatz."
    es: "Concentra un\nhaz de luz y ataca\n2 turnos después."
    ko: "기술을 사용한\n2턴 뒤에\n무수한 빛의\n다발이 상대를\n공격한다."
double_edge:
  names:
    jp_kana: すてみタックル
    en: Double-Edge
    fr: Damoclès
    it: Sdoppiatore
    de: Risikotackle
    es: Doble Filo
    ko: 이판사판태클
  descriptions:
    jp_kana: "いのちを　かけて\nあいてに　とっしん\nこうげきする。\nじぶんも　かなり\nダメージを　うける。"
    en: "A reckless, life-\nrisking tackle.\nIt also damages the\nuser by a fairly large\namount, however."
    fr: "Une dangereuse\ncharge. Inflige aussi\ndes dégâts assez\nimportants au\nlanceur."
    it: "Carica spietata e\npericolosa che\ndanneggia molto\nanche chi la usa."
    de: "Lebensgefährlicher\nAngriff, bei dem\nsich der Angreifer\nselbst verletzt."
    es: "Ataque arriesgado\nque también hiere\nal agresor."
    ko: "목숨을 걸고\n상대에게 돌진\n공격을 한다.\n자신도 상당한\n데미지를 입는다."
double_hit:
  names:
    jp_kana: ダブルアタック
    en: Double Hit
    fr: Coup Double
    it: Doppiosmash
    de: Doppelschlag
    es: Doble Golpe
    ko: 더블어택
  descriptions:
    jp_kana: "しっぽなどを　つかい\nあいてを　たたいて\nこうげきする。\n２かい　れんぞくで\nダメージを　あたえる。"
    en: "The user slams the\nfoe with a tail, etc.\nThe target is hit\ntwice in a row."
    fr: "Un coup de queue qui\nfrappe l’ennemi deux\nfois d’affilée."
    it: "Chi la usa colpisce il\nnemico con la coda\no simili 2 volte di\nfila."
    de: "Anwender trifft den\nGegner mit dem\nSchweif oder\nÄhnlichem. Ziel wird\ndoppelt getroffen."
    es: "Golpea al rival dos\nveces seguidas con\nla cola, etc."
    ko: "꼬리 등을 써서\n상대를 때려\n공격한다.\n2회 연속으로\n데미지를 준다."
double_kick:
  names:
    jp_kana: にどげり
    en: Double Kick
    fr: Double Pied
    it: Doppiocalcio
    de: Doppelkick
    es: Doble Patada
    ko: 두번치기
  descriptions:
    jp_kana: "２ほんの　あしで\nあいてを　けとばして\nこうげきする。\n２かい　れんぞくで\nダメージを　あたえる。"
    en: "The foe is quickly\nkicked twice in\nsuccession using both\nfeet."
    fr: "Deux coups de pied\nqui frappent l’ennemi\ndeux fois d’affilée."
    it: "Colpisce il nemico\ncon due rapidi calci in\nsuccessione inferti\ncon un enorme piede."
    de: "Der Anwender tritt\nin einer Runde\nzweimal schnell zu."
    es: "Una patada doble.\nGolpea 2 veces."
    ko: "2개의 다리로\n상대를 걷어차서\n공격한다.\n2회 연속으로\n데미지를 준다."
double_slap:
  names:
    jp_kana: おうふくビンタ
    en: DoubleSlap
    fr: Torgnoles
    it: Doppiasberla
    de: Duplexhieb
    es: Doblebofetón
    ko: 연속뺨치기
  descriptions:
    jp_kana: "おうふく　ビンタで\nあいてを　たたいて\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The foe is slapped\nrepeatedly, back\nand forth, two to\nfive times in a row."
    fr: "Gifle rapidement\nl’ennemi de 2 à 5 fois\nd’affilée."
    it: "Schiaffeggia il nemico\nper 2-5 volte di fila."
    de: "Trifft den Gegner\n2 - 5-mal\nhintereinander."
    es: "Abofetea de 2 a 5\nveces seguidas."
    ko: "연속 뺨치기로\n상대를 때려서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
double_team:
  names:
    jp_kana: かげぶんしん
    en: Double Team
    fr: Reflet
    it: Doppioteam
    de: Doppelteam
    es: Doble Equipo
    ko: 그림자분신
  descriptions:
    jp_kana: "すばやい　うごきで\nぶんしんを　つくり\nあいてを　まどわせて\nかいひりつを　あげる。"
    en: "By moving rapidly, the\nuser makes illusory\ncopies of itself to\nraise its evasiveness."
    fr: "Le lanceur se déplace\nsi vite qu’il crée des\ncopies illusoires de\nlui, augmentant\nson esquive."
    it: "Chi la usa si muove in\nfretta e crea copie\nillusorie di se stesso\nche aumentano la\ncapacità di elusione."
    de: "Erzeugt Ebenbilder,\num Fluchtwert\nzu erhöhen."
    es: "Crea copias de sí\nmismo para mejorar\nla evasión."
    ko: "재빠른 움직임으로\n분신을 만들어\n상대를 혼란시켜\n회피율을 올린다."
draco_meteor:
  names:
    jp_kana: りゅうせいぐん
    en: Draco Meteor
    fr: Draco Météor
    it: Dragobolide
    de: Draco Meteor
    es: Cometa Draco
    ko: 용성군
  descriptions:
    jp_kana: "てんくうから\nいんせきを　おとす。\nつかうと　はんどうで\nじぶんの　とくこうが\nがくっと　さがる。"
    en: "Comets are summoned\ndown from the sky.\nThe attack’s recoil\nsharply reduces the\nuser’s Sp. Atk stat."
    fr: "Le lanceur invoque\ndes comètes. Le\ncontrecoup réduit\nfortement son\nAtq. Spé."
    it: "Attacca con meteore\nche cadono dal cielo.\nIl contraccolpo ridu-\nce di molto l’Att. Sp.\ndi chi la usa."
    de: "Kometen werden\nheraufbeschworen.\nDer Rückstoß redu-\nziert Spez.-Ang. des\nAnwenders enorm."
    es: "Hace que grandes\ncometas caigan del\ncielo. Baja mucho\nel At. Esp. de quien\nlo usa."
    ko: "천공에서\n운석을 떨어뜨린다.\n사용하면 반동으로\n자신의 특수공격이\n크게 떨어진다."
dragon_breath:
  names:
    jp_kana: りゅうのいぶき
    en: DragonBreath
    fr: Dracosouffle
    it: Dragospiro
    de: Feuerodem
    es: Dragoaliento
    ko: 용의숨결
  descriptions:
    jp_kana: "ものすごい　いきを\nあいてに　ふきつけて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The user exhales\na mighty gust that\ninflicts damage.\nIt may also paralyze\nthe target."
    fr: "Le lanceur souffle\nfort sur l’ennemi pour\ninfliger des dégâts.\nPeut aussi le\nparalyser."
    it: "Investe il nemico con\nun soffio potentissimo\nche arreca danni. Può\nanche paralizzarlo."
    de: "Fegt den Gegner\nmit zerstörerisch\nheißem Atem weg.\nParalysiert Gegner\neventuell."
    es: "Poderosa ráfaga\nde aliento que\ngolpea al enemigo\ny puede paralizarlo."
    ko: "굉장한 숨결을\n상대에게 내뿜어\n공격한다.\n마비 상태로\n만들 때가 있다."
dragon_claw:
  names:
    jp_kana: ドラゴンクロー
    en: Dragon Claw
    fr: Dracogriffe
    it: Dragartigli
    de: Drachenklaue
    es: Garra Dragón
    ko: 드래곤크루
  descriptions:
    jp_kana: "するどく　とがった\nきょだいな　ツメで\nあいてを　きりさいて\nこうげきする。"
    en: "The user slashes the\nfoe with huge, sharp\nclaws."
    fr: "Le lanceur lacère\nl’ennemi de ses\ngrandes griffes\naiguisées."
    it: "Chi la usa attacca\ncon artigli affilati che\ngraffiano il nemico\nrapidamente e con\ngrande forza."
    de: "Der Gegner wird mit\nriesigen, scharfen\nKlauen stark\nverletzt."
    es: "Araña al rival con\ngarras afiladas."
    ko: "날카롭고 뾰족한\n거대한 발톱으로\n상대를 베어 갈라서\n공격한다."
dragon_dance:
  names:
    jp_kana: りゅうのまい
    en: Dragon Dance
    fr: Danse Draco
    it: Dragodanza
    de: Drachentanz
    es: Danza Dragón
    ko: 용의춤
  descriptions:
    jp_kana: "しんぴてきで\nちからづよい　まいを\nはげしく　おどる。\nじぶんの　こうげきと\nすばやさを　あげる。"
    en: "The user vigorously\nperforms a mystic,\npowerful dance that\nboosts its Attack and\nSpeed stats."
    fr: "Une danse mystique\ndont le rythme\neffréné augmente\nl’Attaque et la\nVitesse du lanceur."
    it: "Danza mistica e\nvigorosa che\naumenta l’Attacco\ne la Velocità di\nchi la usa."
    de: "Ein mystischer\nTanz, der den\nAngriffs- und\nInitiative-Wert\nerhöht."
    es: "Danza mística que\nsube el Ataque\ny la Velocidad."
    ko: "신비롭고\n힘센 춤을\n격렬하게 춘다.\n자신의 공격과\n스피드를 올린다."
dragon_pulse:
  names:
    jp_kana: りゅうのはどう
    en: Dragon Pulse
    fr: Dracochoc
    it: Dragopulsar
    de: Drachenpuls
    es: Pulso Dragón
    ko: 용의파동
  descriptions:
    jp_kana: "おおきな　くちから\nしょうげきはを\nまきおこして　あいてを\nこうげきする。"
    en: "The foe is attacked\nwith a shock wave\ngenerated by the\nuser’s gaping mouth."
    fr: "Le lanceur ouvre la\nbouche pour envoyer\nune onde de choc\nqui frappe l’ennemi."
    it: "Chi la usa spalanca\nla bocca e genera\nun’onda d’urto che\nva a colpire il\nnemico."
    de: "Gegner wird mit\neiner Schockwelle\nangegriffen, die aus\ndem offenen Maul\ndes Anwenders kommt."
    es: "Abre mucho la boca\ny libera una onda\nde choque que\nataca al rival."
    ko: "큰 입으로\n충격파를\n일으켜서 상대를\n공격한다."
dragon_rage:
  names:
    jp_kana: りゅうのいかり
    en: Dragon Rage
    fr: Draco-Rage
    it: Ira di Drago
    de: Drachenwut
    es: Furia Dragón
    ko: 용의분노
  descriptions:
    jp_kana: "しょうげきはを\nあいてに　ぶつけて\nこうげきする。\n４０の　ダメージを\nきまって　あたえる。"
    en: "The foe is stricken\nby a shock wave.\nThis attack always\ninflicts 40 HP\ndamage."
    fr: "Une onde de choc \ndestructrice qui\ninflige toujours 40 PV\nde dégâts."
    it: "Colpisce il nemico\ncon un’onda d’urto.\nQuesto attacco\nprovoca sempre\nun danno di 40 PS."
    de: "Stößt Schockwelle\naus, die stets\n40 KP Schaden\nanrichtet."
    es: "Ráfaga de ondas de\nchoque que quitan\n40 PS."
    ko: "충격파를\n상대에게 부딪쳐서\n공격한다.\n언제나 40의\n데미지를 준다."
dragon_rush:
  names:
    jp_kana: ドラゴンダイブ
    en: Dragon Rush
    fr: Dracocharge
    it: Dragofuria
    de: Drachenstoß
    es: Carga Dragón
    ko: 드래곤다이브
  descriptions:
    jp_kana: "すさまじい　さっきで\nいあつ　しながら\nたいあたりする。\nあいてを　ひるませる\nことがある。"
    en: "The user tackles the\nfoe while exhibiting\noverwhelming menace.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur frappe\nl’ennemi d’un air\nmenaçant. Peut aussi\napeurer l’ennemi."
    it: "Chi la usa attacca\ncon fare minaccioso\ne in questo modo può\nanche far tentennare\nil nemico."
    de: "Anwender führt einen\ngefährlichen Angriff\naus. Gegner schreckt\neventuell zurück."
    es: "Ataca de forma brutal\nmientras intimida al\nrival. También puede\nhacerlo retroceder."
    ko: "굉장한 살기로\n위압하면서\n몸통박치기한다.\n상대를 풀죽게\n만들 때가 있다."
drain_punch:
  names:
    jp_kana: ドレインパンチ
    en: Drain Punch
    fr: Vampipoing
    it: Assorbipugno
    de: Ableithieb
    es: Puño Drenaje
    ko: 드레인펀치
  descriptions:
    jp_kana: "こぶしから　あいての\nちからを　すいとる。\nあたえた　ダメージの\nはんぶんの　ＨＰを\nかいふくできる。"
    en: "An energy-draining\npunch. The user’s\nHP is restored by\nhalf the damage taken\nby the target."
    fr: "Un coup de poing qui\ndraine l’énergie.\nConvertit la moitié\ndes dégâts infligés en\nPV pour le lanceur."
    it: "Pugno che assorbe\nenergia. Fa recupe-\nrare una quantità di\nPS pari alla metà del\ndanno inferto."
    de: "Entzieht dem Gegner\nEnergie. Die Hälfte\ndes Schadens wird\nden KP des Anw.\nzugerechnet."
    es: "Un golpe que drena\nenergía. El Pokémon\nrecupera la mitad de\nlos PS arrebatados\nal rival."
    ko: "주먹으로 상대의\n힘을 흡수한다.\n입힌 데미지의\n절반에 해당하는\nHP를 회복할 수 있다."
dream_eater:
  names:
    jp_kana: ゆめくい
    en: Dream Eater
    fr: Dévorêve
    it: Mangiasogni
    de: Traumfresser
    es: Come Sueños
    ko: 꿈먹기
  descriptions:
    jp_kana: "ねている　あいての\nゆめを　たべて\nこうげきする。\nダメージの　はんぶん\nＨＰを　かいふくする。"
    en: "An attack that works\nonly on a sleeping\nfoe. It absorbs half\nthe damage caused to\nheal the user’s HP."
    fr: "Attaque réservée aux\nennemis endormis. Le\nlanceur récupère en\nPV la moitié des\ndégâts infligés."
    it: "Attacco che funziona\nsolo su un nemico che\ndorme. Chi lo usa\nriceve metà dei PS\npersi dal nemico."
    de: "Schaden an\nschlafendem Gegner\nwird halb Anwender\ngutgeschrieben."
    es: "Restaura al usuario\nla mitad del daño\ncausado a un rival\ndormido."
    ko: "잠자고 있는 상대의\n꿈을 먹어\n공격한다.\n데미지의 절반을\nHP로 회복한다."
drill_peck:
  names:
    jp_kana: ドリルくちばし
    en: Drill Peck
    fr: Bec Vrille
    it: Perforbecco
    de: Bohrschnabel
    es: Pico Taladro
    ko: 회전부리
  descriptions:
    jp_kana: "かいてん　しながら\nとがった　くちばしを\nあいてに　つきさして\nこうげきする。"
    en: "A corkscrewing\nattack with the\nsharp beak acting\nas a drill."
    fr: "Une attaque utilisant\nle bec comme une\nperceuse."
    it: "Attacco a spirale\ncon un becco\naguzzo che fa\nda trapano."
    de: "Korkenzieherangriff,\nbei dem der\nSchnabel als\nBohrer dient."
    es: "Picotazo giratorio\ny perforador muy\npotente."
    ko: "회전하면서\n뾰족한 부리를\n상대에게 꿰찔러\n공격한다."
dynamic_punch:
  names:
    jp_kana: ばくれつパンチ
    en: DynamicPunch
    fr: Dynamopoing
    it: Dinamipugno
    de: Wuchtschlag
    es: Puñodinámico
    ko: 폭발펀치
  descriptions:
    jp_kana: "こんしんの　ちからで\nパンチを　くりだして\nこうげきする。\nあいてを　かならず\nこんらん　させる。"
    en: "The foe is punched\nwith the user’s full,\nconcentrated power.\nIt confuses the foe\nif it hits."
    fr: "Le lanceur rassemble\nses forces et envoie\nun coup de poing à\nl’ennemi. S’il est\ntouché, il est confus."
    it: "Colpisce il nemico\ncon un pugno\ndavvero forte.\nSe va a segno,\nlo confonde."
    de: "Kräftiger Schlag,\nder den Gegner\nbei Erfolg verwirrt."
    es: "Puñetazo con toda la\nfuerza concentrada. \nCausa confusión\nsi atina."
    ko: "혼신의 힘으로\n펀치를 날려서\n공격한다.\n상대를 반드시\n혼란 시킨다."
earth_power:
  names:
    jp_kana: だいちのちから
    en: Earth Power
    fr: Telluriforce
    it: Geoforza
    de: Erdkräfte
    es: Tierra Viva
    ko: 대지의힘
  descriptions:
    jp_kana: "あいての　あしもとへ\nだいちの　ちからを\nほうしゅつする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user makes the\nground under the foe\nerupt with power.\nIt may also lower the\ntarget’s Sp. Def."
    fr: "Des éruptions\nvolcaniques ont\nlieu sous l’ennemi.\nPeut aussi baisser la\nDéf. Spé. de l’ennemi."
    it: "Dal terreno sotto il\nnemico si sprigiona\nuna forza devastante.\nPuò anche ridurne\nla Dif. Sp."
    de: "Der Boden unter\ndem Gegner erzittert\ndurch die Kraft der\nErde. Senkt eventuell\nSpezial-Verteidigung."
    es: "La tierra a los pies\ndel rival erupciona\nviolentamente. Puede\ndisminuir la Def. Esp.\ndel rival."
    ko: "상대의 발밑에\n대지의 힘을\n방출한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
earthquake:
  names:
    jp_kana: じしん
    en: Earthquake
    fr: Séisme
    it: Terremoto
    de: Erdbeben
    es: Terremoto
    ko: 지진
  descriptions:
    jp_kana: "じしんの　しょうげきで\nまわりに　いるものを\nすべて　こうげきする。"
    en: "The user sets off an\nearthquake that hits\nall the Pokémon in\nthe battle."
    fr: "Le lanceur provoque\nun tremblement de\nterre touchant tous\nles autres Pokémon\nau combat."
    it: "Chi la usa provoca\nun potente sisma\nche colpisce gli\naltri Pokémon\nin campo."
    de: "Ein mächtiges Beben,\ndas, abgesehen von\nfliegenden Pokémon,\nalle kämpfenden PKMN\n(außer Anw.) trifft."
    es: "Un terremoto que\nafecta a los demás\nPokémon en\ncombate."
    ko: "지진의 충격으로\n주위에 있는\n모든 것을 공격한다."
egg_bomb:
  names:
    jp_kana: タマゴばくだん
    en: Egg Bomb
    fr: Bomb’Oeuf
    it: Uovobomba
    de: Eierbombe
    es: Bomba Huevo
    ko: 알폭탄
  descriptions:
    jp_kana: "おおきな　タマゴを\nちから　いっぱい\nあいてに　なげつけて\nこうげきする。"
    en: "A large egg is hurled\nwith maximum force at\nthe foe to inflict\ndamage."
    fr: "De toutes ses forces,\nle lanceur jette un\ngros œuf sur l’ennemi\npour lui infliger des\ndégâts."
    it: "Colpisce il nemico\ncon un grande uovo\nscaraventato con\nenorme forza."
    de: "Ein großes Ei\nwird auf den\nGegner abgefeuert,\num ihm zu schaden."
    es: "Arroja un huevo al\nenemigo con gran\nfuerza."
    ko: "큰 알을\n온 힘을 다해\n상대에게 내던져서\n공격한다."
embargo:
  names:
    jp_kana: さしおさえ
    en: Embargo
    fr: Embargo
    it: Divieto
    de: Itemsperre
    es: Embargo
    ko: 금제
  descriptions:
    jp_kana: "もたせた　どうぐを\nつかえなくする。\nトレーナーも　その\nポケモンには　どうぐを\nつかえない。"
    en: "It prevents the foe\nfrom using its held\nitem. Its Trainer is\nalso prevented from\nusing items on it."
    fr: "Empêche l’ennemi\nd’utiliser un objet\ntenu et son Dresseur\nd’utiliser un objet\nsur lui."
    it: "Impedisce al nemico\ndi usare lo strumento\nche tiene e al suo\nAllenatore di usarne\naltri sul Pokémon."
    de: "Verhindert, dass der\nGegner oder Trainer\ndes Gegners Items\nverwenden kann."
    es: "Impide al rival usar\nel objeto que lleva.\nSu entrenador\ntampoco puede usar\nobjetos sobre él."
    ko: "지니게 한 도구를\n쓸 수 없게 한다.\n트레이너도\n그 포켓몬에게는\n도구를 쓸 수 없다."
ember:
  names:
    jp_kana: ひのこ
    en: Ember
    fr: Flammèche
    it: Braciere
    de: Glut
    es: Ascuas
    ko: 불꽃세례
  descriptions:
    jp_kana: "ちいさな　ほのおを\nあいてに　はっしゃして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is attacked\nwith small flames.\nThe target may also\nbe left with a burn."
    fr: "L’ennemi est attaqué\npar de faibles\nflammes. Peut aussi le\nbrûler."
    it: "Il nemico viene\ncolpito da fiammelle\nche possono anche\nscottarlo."
    de: "Schwache\nFeuer-Attacke,\ndie eventuell\nden Gegner\nverbrennt."
    es: "Ataque con llamas\npequeñas que\npueden causar\nquemaduras."
    ko: "작은 불꽃을\n상대에게 발사하여\n공격한다.\n화상 상태로\n만들 때가 있다."
encore:
  names:
    jp_kana: アンコール
    en: Encore
    fr: Encore
    it: Ripeti
    de: Zugabe
    es: Otra Vez
    ko: 앵콜
  descriptions:
    jp_kana: "あいてが　さいごに\nつかった　わざを\n３ー７ターンの　あいだ\nずっと　ださせる。"
    en: "The user compels the\nfoe to keep using\nonly the move it last\nused for three to\nseven turns."
    fr: "Oblige l’ennemi à\nrépéter sa dernière\ncapacité durant 3 à 7\ntours."
    it: "Chi la usa obbliga il\nnemico a ripetere\nl’ultima mossa\neseguita per 3-7\nturni."
    de: "Gegner wiederholt\nletzte Attacke drei\nbis sieben Runden\nlang."
    es: "El rival repite el\núltimo movimiento\nde 3 a 7 turnos."
    ko: "상대가 마지막으로\n사용한 기술을\n3-7턴 동안\n계속 쓰게 한다."
endeavor:
  names:
    jp_kana: がむしゃら
    en: Endeavor
    fr: Effort
    it: Rimonta
    de: Notsituation
    es: Esfuerzo
    ko: 죽기살기
  descriptions:
    jp_kana: "あいての　ＨＰが\nじぶんの　ＨＰと\nおなじ　くらいに\nなるように　ダメージを\nあたえる。"
    en: "An attack move that\ncuts down the foe’s\nHP to equal the\nuser’s HP."
    fr: "Une attaque qui\nréduit les PV de\nl’ennemi au niveau\ndes PV du lanceur."
    it: "Mossa d’attacco che\nriduce i PS del nemico\na una quantità pari ai\nPS di chi la usa."
    de: "Wird stärker, wenn\nKP des Anwenders\ngeringer als KP des\nGegners sind."
    es: "Reduce los PS del\nrival para que igualen\na los del atacante."
    ko: "상대의 HP가\n자신의 HP와\n같아지도록\n데미지를 준다."
endure:
  names:
    jp_kana: こらえる
    en: Endure
    fr: Ténacité
    it: Resistenza
    de: Ausdauer
    es: Aguante
    ko: 버티기
  descriptions:
    jp_kana: "こうげきを　うけても\nＨＰを　かならず\n１だけ　のこせる。\nれんぞくで　だすと\nしっぱい　しやすい。"
    en: "The user endures any\nattack, leaving 1 HP.\nIts chance of failing\nrises if it is used in\nsuccession."
    fr: "Le lanceur résiste\naux attaques avec\n1 PV. Peut échouer\nsi utilisé plusieurs\nfois de suite."
    it: "Chi la usa evita di\nandare KO anche se\ngli rimane solo 1 PS.\nUsata in successione\npuò fallire."
    de: "1 KP bleibt nach\ngegn. Attacken stets\nübrig. Misserfolg bei\nWiederholung möglich."
    es: "Resiste cualquier\nataque y deja\nal menos 1 PS.\nPuede fallar si se\nusa repetidamente."
    ko: "공격을 받아도\nHP를 반드시\n1만큼은 남긴다.\n연속으로 쓰면\n실패하기 쉽다."
energy_ball:
  names:
    jp_kana: エナジーボール
    en: Energy Ball
    fr: Eco-Sphère
    it: Energipalla
    de: Energieball
    es: Energibola
    ko: 에너지볼
  descriptions:
    jp_kana: "しぜんから　いのちの\nちからを　あつめて\nはっしゃする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user draws power\nfrom nature and\nfires it at the foe.\nIt may also lower the\ntarget’s Sp. Def."
    fr: "Utilise les pouvoirs\nde la nature pour\nattaquer l’ennemi.\nPeut aussi baisser la\nDéf. Spé. de l’ennemi."
    it: "Chi la usa attinge\nenergia dalla natura\ne la scaglia contro il\nnemico. Può anche\nridurne la Dif. Sp."
    de: "Anwender zieht Kraft\naus der Natur und\nfeuert sie auf Gegn.\nSenkt eventuell gegn.\nSpezial-Verteidigung."
    es: "Aúna fuerzas de la\nnaturaleza y libera\nsu ataque. Puede\ndisminuir la Def. Esp.\ndel rival."
    ko: "자연으로부터\n생명의 힘을 모아서\n발사한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
eruption:
  names:
    jp_kana: ふんか
    en: Eruption
    fr: Eruption
    it: Eruzione
    de: Eruption
    es: Estallido
    ko: 분화
  descriptions:
    jp_kana: "いかりを　ばくはつ\nさせて　こうげきする。\nじぶんの　ＨＰが\nすくないほど　わざの\nいりょくは　さがる。"
    en: "The user attacks in\nan explosive fury.\nThe lower the user’s\nHP, the less powerful\nthis attack becomes."
    fr: "Le lanceur laisse\nexploser sa colère.\nPlus ses PV sont bas\net moins l’attaque est\npuissante."
    it: "Attacco impetuoso\ned esplosivo la cui\npotenza è propor-\nzionale ai PS di\nchi lo usa."
    de: "Explosiver Angriff.\nJe höher die KP\ndes Anwenders sind,\ndesto mehr Schaden\nwird angerichtet."
    es: "Furia explosiva.\nCuanto menor sea\nel número de PS del\nusuario, menos daño\nhará el ataque."
    ko: "분노를 폭발시켜\n공격한다.\n자신의 HP가\n적을수록 기술의\n위력이 떨어진다."
explosion:
  names:
    jp_kana: だいばくはつ
    en: Explosion
    fr: Explosion
    it: Esplosione
    de: Explosion
    es: Explosión
    ko: 대폭발
  descriptions:
    jp_kana: "おおきな　ばくはつで\nまわりに　いるものを\nすべて　こうげきする。\nつかった　あとに\nひんしに　なる。"
    en: "The user explodes to\ninflict damage on all\nPokémon in battle.\nThe user faints upon\nusing this move."
    fr: "Le lanceur explose et\ninflige des dégâts à\ntous les autres\nPokémon au combat.\nMet K.O. le lanceur."
    it: "Chi la usa esplode\nper infliggere danni\nagli altri Pokémon\nin campo, ma va KO."
    de: "Anwender explodiert,\nrichtet bei allen\nPokémon großen\nSchaden an und\nwird besiegt."
    es: "El atacante explota\ny hiere a todos los\ncontendientes. El\nusuario se debilita\nde inmediato."
    ko: "큰 폭발로\n주위에 있는\n모두를 공격한다.\n쓰고 나서는\n기절한다."
extrasensory:
  names:
    jp_kana: じんつうりき
    en: Extrasensory
    fr: Extrasenseur
    it: Extrasenso
    de: Sondersensor
    es: Paranormal
    ko: 신통력
  descriptions:
    jp_kana: "みえない　ふしぎな\nちからを　おくって\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user attacks with\nan odd, unseeable\npower.\nIt may also make the\nfoe flinch."
    fr: "Le lanceur attaque\navec un pouvoir\nétrange et invisible.\nPeut aussi apeurer\nl’ennemi."
    it: "Chi la usa attacca con\nuna misteriosa forza\ninvisibile. Può far\ntentennare il nemico."
    de: "Besonderer Angriff\nmit einer unsichtbaren\nKraft, die den Gegner\neventuell zurück-\nschrecken lässt."
    es: "Energía muy extraña\nque puede hacer\nretroceder al\nenemigo."
    ko: "보이지 않는 이상한\n힘을 보내어\n공격한다.\n상대를 풀죽게 \n만들 때가 있다."
extreme_speed:
  names:
    jp_kana: しんそく
    en: ExtremeSpeed
    fr: Vit.Extrême
    it: Extrarapido
    de: Turbotempo
    es: Vel. Extrema
    ko: 신속
  descriptions:
    jp_kana: "めにも　とまらない\nはやさで　あいてに\nとっしんする。\nかならず　せんせい\nこうげき　できる。"
    en: "The user charges the\nfoe at blinding speed.\nThis attack always\ngoes before any\nother move."
    fr: "Le lanceur charge\nà une vitesse\nrenversante.\nCette attaque a\nl’initiative."
    it: "Chi la usa carica\nil nemico a velocità\nimpressionante.\nQuesta mossa precede\ntutte le altre."
    de: "Extrem schnelle\nund kraftvolle\nAttacke, die stets\nzuerst trifft."
    es: "Ataque muy rápido\nque siempre se\nrealiza el primero."
    ko: "눈에 보이지 않을\n스피드로 상대에게\n돌진한다.\n반드시 선제\n공격을 할 수 있다."
facade:
  names:
    jp_kana: からげんき
    en: Facade
    fr: Façade
    it: Facciata
    de: Fassade
    es: Imagen
    ko: 객기
  descriptions:
    jp_kana: "じぶんが　どく　まひ\nやけど　じょうたいの\nとき　くりだすと\nわざの　いりょくが\n２ばいに　なる。"
    en: "An attack move that\ndoubles its power if\nthe user is poisoned,\nparalyzed, or has a\nburn."
    fr: "Une attaque dont la\npuissance double\nlorsque le lanceur\nest empoisonné,\nparalysé ou brûlé."
    it: "Mossa d’attacco che\nraddoppia l’effetto\nse chi la usa è scot-\ntato, avvelenato o\nparalizzato."
    de: "Erhöht Angriff nach\nVerbrennung,\nParalyse oder\nVergiftung."
    es: "Ataca con el doble de\npotencia si el usuario\nestá quemado,\nparalizado o\nenvenenado."
    ko: "자신이 독, 마비,\n화상 상태일 때\n날리면\n기술의 위력이\n2배가 된다."
fake_out:
  names:
    jp_kana: ねこだまし
    en: Fake Out
    fr: Bluff
    it: Bruciapelo
    de: Mogelhieb
    es: Sorpresa
    ko: 속이다
  descriptions:
    jp_kana: "せんせい　こうげきで\nあいてを　ひるませる。\nせんとうに　でたら\nすぐに　ださないと\nせいこう　しない。"
    en: "An attack that hits\nfirst and makes the\ntarget flinch.\nThis move works only\non the first turn."
    fr: "Permet de frapper en\npremier et apeure\nl’ennemi. Elle ne\nfonctionne qu’au\npremier tour."
    it: "Mossa che fa agire\nper primi e fa\ntentennare il nemico.\nFunziona solo al\nprimo turno."
    de: "Trifft schon beim\nersten Schlag.\nGegner schreckt\nzurück. Gelingt nur\nin der 1. Runde."
    es: "Ataca primero y,\nademás, hace\nretroceder al rival.\nSolo sirve en el\nprimer turno."
    ko: "선제공격으로\n상대를 풀죽게 한다.\n배틀에 나가서\n바로 쓰지 않으면\n성공할 수 없다."
fake_tears:
  names:
    jp_kana: うそなき
    en: Fake Tears
    fr: Croco Larme
    it: Falselacrime
    de: Trugträne
    es: Llanto Falso
    ko: 거짓울음
  descriptions:
    jp_kana: "ないた　ふりをして\nなみだを　ながす。\nこまらせる　ことで\nあいての　とくぼうを\nがくっと　さげる。"
    en: "The user feigns\ncrying to make the\nfoe feel flustered,\nsharply lowering its\nSp. Def stat."
    fr: "Le lanceur fait \nsemblant de pleurer\npour troubler l’ennemi\net baisser fortement\nsa Déf. Spé."
    it: "Chi la usa inscena\nun pianto teatrale\nper commuovere il\nnemico. Riduce la Dif.\nSp. del nemico."
    de: "Täuscht Weinen vor,\num die gegnerische\nSpezial-Verteidigung\nzu senken."
    es: "Lágrimas de cocodrilo\nque bajan mucho la\nDef. Esp. del enemigo."
    ko: "우는 척을 하며\n눈물을 흘린다.\n난처하게 만들어\n상대의 특수방어를\n크게 떨어뜨린다."
false_swipe:
  names:
    jp_kana: みねうち
    en: False Swipe
    fr: Faux-Chage
    it: Falsofinale
    de: Trugschlag
    es: Falsotortazo
    ko: 칼등치기
  descriptions:
    jp_kana: "あいての　ＨＰが\nかならず　１だけ\nのこる　ように\nてかげん　して\nこうげきする。"
    en: "A restrained attack\nthat prevents the\nfoe from fainting.\nThe target is left\nwith at least 1 HP."
    fr: "Le lanceur retient\nses coups pour que\nl’ennemi garde au\nmoins 1 PV et ne\ntombe pas K.O."
    it: "Chi la usa trattiene\nil colpo per impedire\nal nemico di andare\nKO, lasciandolo\ncon almeno 1 PS."
    de: "Ein Angriff, der\ndem Gegner\nzumindest 1 KP\nlässt."
    es: "Ataque moderado que\nno debilita al enemigo\ny le deja al menos\n1 PS."
    ko: "상대의 HP가\n반드시 1만큼 남도록\n조절하여 공격한다."
feather_dance:
  names:
    jp_kana: フェザーダンス
    en: FeatherDance
    fr: Danse-Plume
    it: Danzadipiume
    de: Daunenreigen
    es: Danza Pluma
    ko: 깃털댄스
  descriptions:
    jp_kana: "うもうを　ふりまいて\nこうげきする。\nからだに　からませて\nあいての　こうげきを\nがくっと　さげる。"
    en: "The user covers the\nfoe with a mass of\ndown that sharply\nlowers the Attack\nstat."
    fr: "Une montagne de\nplumes ensevelit\nl’ennemi et réduit\nconsidérablement\nson Attaque."
    it: "Chi la usa copre\nil nemico con un\nmanto di piume che\nriduce di molto il\nsuo Attacco."
    de: "Hüllt Gegner in\nDaunen und\nsenkt den Angriffs-\nWert deutlich."
    es: "Envuelve al rival\ncon plumón para\nreducir mucho su\nAtaque."
    ko: "깃털을 흩뿌려\n공격한다.\n몸에 휘감아\n상대의 공격을\n크게 떨어뜨린다."
feint:
  names:
    jp_kana: フェイント
    en: Feint
    fr: Ruse
    it: Fintoattacco
    de: Offenlegung
    es: Amago
    ko: 페인트
  descriptions:
    jp_kana: "まもるや　みきりを\nしている　あいてに\nこうげきが　できる。\nまもりの　こうかを　\nかいじょ　させる。"
    en: "An attack that hits a\nfoe using Protect or\nDetect. It also lifts\nthe effects of those\nmoves."
    fr: "Une attaque capable\nde toucher un ennemi\nqui utilise Détection\nou Abri. Annule aussi\nleur effet."
    it: "Mossa che colpisce\nun nemico che\nusa Protezione o\nIndividua, annullando\ni loro effetti."
    de: "Gegner, die Schutz-\nschild und Scanner\nverwenden, werden\ngetroffen. Entfernt\nEffekte dieser Att."
    es: "Permite golpear a\nenemigos que usan\nProtección o\nDetección, y anula\ndichos movimientos."
    ko: "방어나 판별을\n하고 있는 상대에게\n공격할 수 있다.\n방어 효과를\n해제시킨다."
feint_attack:
  names:
    jp_kana: だましうち
    en: Faint Attack
    fr: Feinte
    it: Finta
    de: Finte
    es: Finta
    ko: 속여때리기
  descriptions:
    jp_kana: "あいてに　ちかづき\nゆだんした　すきを\nみて　なぐりつける。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user draws up to\nthe foe disarmingly,\nthen throws a sucker\npunch.\nIt hits without fail."
    fr: "Le lanceur s’approche\nl’air de rien avant de\nfrapper par surprise.\nN’échoue jamais."
    it: "Chi la usa si avvicina\nal nemico in maniera\ndisarmante e poi\ngli tira un bel pugno.\nMossa infallibile."
    de: "Zieht Gegner heran\nund entwaffnet ihn.\nEin Treffer ist\ngewiss."
    es: "Engaña al enemigo\npara acercarse y\ndar un puñetazo\nque no falla."
    ko: "상대에게 다가가\n방심한 틈을 타서\n세게 때린다.\n공격은 반드시\n명중한다."
fire_blast:
  names:
    jp_kana: だいもんじ
    en: Fire Blast
    fr: Déflagration
    it: Fuocobomba
    de: Feuersturm
    es: Llamarada
    ko: 불대문자
  descriptions:
    jp_kana: "だいのじの　ほのおで\nあいてを　やきつくす。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is attacked\nwith an intense blast\nof all-consuming fire.\nIt may also leave the\ntarget with a burn."
    fr: "Un déluge de flammes\nardentes submerge\nl’ennemi. Peut aussi le\nbrûler."
    it: "Investe il nemico\ncon un’intensa\nfiammata che fa terra\nbruciata. Può anche\nscottarlo."
    de: "Feuersbrunst, die\nalles versengt.\nVerbrennt den\nGegner eventuell."
    es: "Llama intensa que\nlo chamusca todo\ny puede causar\nquemaduras."
    ko: "큰 대자의 불꽃으로\n상대를 불태운다.\n화상 상태로\n만들 때가 있다."
fire_fang:
  names:
    jp_kana: ほのおのキバ
    en: Fire Fang
    fr: Crocs Feu
    it: Rogodenti
    de: Feuerzahn
    es: Colm. Ígneo
    ko: 불꽃엄니
  descriptions:
    jp_kana: "ほのおを　まとった\nキバで　かみつく。\nあいてを　ひるませたり\nやけど　じょうたいに\nすることが　ある。"
    en: "The user bites with\nflame-cloaked fangs.\nIt may also make the\nfoe flinch or sustain\na burn."
    fr: "Le lanceur utilise\nune morsure\nenflammée. Peut aussi\nbrûler ou apeurer\nl’ennemi."
    it: "Chi la usa morde con\ndenti infuocati che\npossono anche scot-\ntare o far tentennare\nil nemico."
    de: "Anwender beißt mit\nflammenden Reiß-\nzähnen zu. Gegner\nschreckt evtl. zurück\noder verbrennt sich."
    es: "Usa colmillos en\nllamas para morder.\nPuede hacer que el\nrival retroceda o\nreciba quemaduras."
    ko: "불꽃을 두른\n이빨로 문다.\n상대를 풀죽게\n하거나 화상 상태로\n만들 때가 있다."
fire_punch:
  names:
    jp_kana: ほのおのパンチ
    en: Fire Punch
    fr: Poing de Feu
    it: Fuocopugno
    de: Feuerschlag
    es: Puño Fuego
    ko: 불꽃펀치
  descriptions:
    jp_kana: "ほのおを　こめた\nパンチで　あいてを\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is punched\nwith a fiery fist.\nIt may leave the\ntarget with a burn."
    fr: "Un coup de poing\nenflammé vient\nfrapper l’ennemi. Peut\nle brûler."
    it: "Colpisce il nemico con\nun pugno ardente che\npuò scottarlo."
    de: "Schlag, der dem\nGegner eventuell\nVerbrennungen\nzufügt."
    es: "Puñetazo ardiente.\nPuede quemar."
    ko: "불꽃을 담은\n펀치로 상대를\n공격한다.\n화상 상태가\n되는 경우가 있다."
fire_spin:
  names:
    jp_kana: ほのおのうず
    en: Fire Spin
    fr: Danseflamme
    it: Turbofuoco
    de: Feuerwirbel
    es: Giro Fuego
    ko: 회오리불꽃
  descriptions:
    jp_kana: "はげしく　うずをまく\nほのおの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめて\nこうげきする。"
    en: "The foe becomes\ntrapped within a\nfierce vortex of fire\nthat rages for two\nto five turns."
    fr: "Un tourbillon de\nflammes emprisonne\nl’ennemi pendant 2 à 5\ntours."
    it: "Intrappola il nemico\nin un turbine di fuoco\nche dura per 2-5\nturni."
    de: "Der Gegner wird\nfür 2 - 5 Runden in\neinem Feuerkreis\ngefangen."
    es: "Un aro de fuego\nque atrapa de 2\na 5 turnos."
    ko: "세차게 소용돌이치는\n불꽃 속에\n2-5턴 동안\n상대를 가두어\n공격한다."
fissure:
  names:
    jp_kana: じわれ
    en: Fissure
    fr: Abîme
    it: Abisso
    de: Geofissur
    es: Fisura
    ko: 땅가르기
  descriptions:
    jp_kana: "じわれの　さけめに\nあいてを　おとして\nこうげきする。\nあたれば　いちげきで\nひんしに　する。"
    en: "The user opens up a\nfissure in the ground\nand drops the foe in.\nThe target instantly\nfaints if it hits."
    fr: "Le lanceur fait tomber\nl’ennemi dans une\ncrevasse. Si cette\nattaque touche, elle\nmet K.O. sur le coup."
    it: "Chi la usa getta\nil nemico in un\nabisso. Se va a\nsegno, il nemico\nva KO."
    de: "Der Gegner wird in\neine Erdspalte ge-\nworfen. Ist die Att.\nerfolgreich, führt sie\nzu einem K.O."
    es: "Abre una grieta en\nel suelo y mete al\nrival en ella.\nFulmina en 1 golpe."
    ko: "땅이 갈라진 곳에\n상대를 떨어뜨려\n공격한다.\n맞으면 일격에\n기절한다."
flail:
  names:
    jp_kana: じたばた
    en: Flail
    fr: Fléau
    it: Flagello
    de: Dreschflegel
    es: Azote
    ko: 바둥바둥
  descriptions:
    jp_kana: "じたばた　あばれて\nこうげきする。\nじぶんの　ＨＰが\nすくないほど　わざの\nいりょくは　あがる。"
    en: "The user flails about\naimlessly to attack.\nIt becomes more\npowerful the less HP\nthe user has."
    fr: "Le lanceur fait\ntournoyer son fléau.\nPlus ses PV sont bas,\nplus l’attaque est\npuissante."
    it: "Chi la usa si dimena\nper attaccare. È più\nefficace se i suoi PS\nsono bassi."
    de: "Attacke richtet\nmehr Schaden\nan, wenn eigene\nKP niedrig sind."
    es: "Ataque frenético.\nCuantos menos\nPS tenga el usuario,\nmás daño produce."
    ko: "바둥바둥 난동부려서\n공격한다.\n자신의 HP가\n적을수록 기술의\n위력이 올라간다."
flame_wheel:
  names:
    jp_kana: かえんぐるま
    en: Flame Wheel
    fr: Roue de Feu
    it: Ruotafuoco
    de: Flammenrad
    es: Rueda Fuego
    ko: 화염자동차
  descriptions:
    jp_kana: "ほのおを　まとい\nあいてに　とっしん\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The user cloaks\nitself in fire and\ncharges at the foe.\nIt may also leave the\ntarget with a burn."
    fr: "Le lanceur s’entoure\nde feu et charge\nl’ennemi. Peut aussi\nbrûler l’ennemi."
    it: "Chi la usa si copre di\nfuoco e carica il\nnemico. Può anche\nscottarlo."
    de: "Feuer-Attacke, die\nden Gegner eventuell\nverbrennt."
    es: "Ataca envuelto en\nfuego. Puede\ncausar quemaduras."
    ko: "불꽃을 둘러\n상대에게 돌진\n공격한다.\n화상 상태로\n만들 때가 있다."
flamethrower:
  names:
    jp_kana: かえんほうしゃ
    en: Flamethrower
    fr: Lance-Flamme
    it: Lanciafiamme
    de: Flammenwurf
    es: Lanzallamas
    ko: 화염방사
  descriptions:
    jp_kana: "はげしい　ほのおを\nあいてに　はっしゃして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is scorched\nwith an intense blast\nof fire. The target\nmay also be left with\na burn."
    fr: "L’ennemi reçoit un\ntorrent de flammes.\nPeut aussi le brûler."
    it: "Il nemico viene\ncolpito da intense\nfiammate che possono\nanche scottarlo."
    de: "Starke\nFeuer-Attacke,\ndie eventuell\nden Gegner\nverbrennt."
    es: "Ataque con una\ngran ráfaga de\nfuego que puede\ncausar quemaduras."
    ko: "세찬 불꽃을\n상대에게 발사하여\n공격한다.\n화상 상태로\n만들 때가 있다."
flare_blitz:
  names:
    jp_kana: フレアドライブ
    en: Flare Blitz
    fr: Boutefeu
    it: Fuococarica
    de: Flammenblitz
    es: Envite Ígneo
    ko: 플레어드라이브
  descriptions:
    jp_kana: "ほのおの　よろいを\nからだに　まとって\nとっしんする。\nじぶんも　かなり\nダメージを　うける。"
    en: "The user cloaks\nitself in fire and\ncharges at the foe.\nThe user sustains\nserious damage, too."
    fr: "Le lanceur s’embrase\navant de charger\nl’ennemi. Le choc\nblesse gravement\nle lanceur aussi."
    it: "Chi la usa si ricopre\ndi fuoco e carica\nil nemico, ma subisce\nanche considerevoli\ndanni."
    de: "Anwender hüllt sich\nin Flammen und\nstürmt auf Gegner.\nDer Anwender nimmt\ndabei auch Schaden."
    es: "El Pokémon se\ncubre de llamas y\ncarga contra el rival,\naunque él también\nrecibe daños."
    ko: "불꽃의 갑옷을\n몸에 두르고\n돌진한다.\n자신도 상당한\n데미지를 입는다."
flash:
  names:
    jp_kana: フラッシュ
    en: Flash
    fr: Flash
    it: Flash
    de: Blitz
    es: Destello
    ko: 플래시
  descriptions:
    jp_kana: "ひかりで　あいての\nめいちゅうりつを\nさげる。\nくらい　どうくつも\nあかるく　てらせる。"
    en: "The user flashes a\nlight that cuts the\nfoe’s accuracy.\nIt can also be used\nto illuminate caves."
    fr: "Explosion lumineuse\nqui fait baisser la\nprécision de l’ennemi.\nPermet aussi d’éclai-\nrer les grottes."
    it: "Investe il nemico con\nun flash che ne riduce\nla precisione. Si usa\nanche per illuminare\nle grotte."
    de: "Erzeugt helles Licht,\ndas die gegnerische\nGenauigkeit senkt\nund Höhlen\nausleuchten kann."
    es: "Luz cegadora que\nbaja la precisión.\nFuera de combate\nsirve para iluminar."
    ko: "빛으로 상대의\n명중률을\n떨어뜨린다.\n어두운 동굴도\n밝게 비춰준다."
flash_cannon:
  names:
    jp_kana: ラスターカノン
    en: Flash Cannon
    fr: Luminocanon
    it: Cannonflash
    de: Lichtkanone
    es: Foco Respl.
    ko: 러스터캐논
  descriptions:
    jp_kana: "からだの　ひかりを\nいってんに　あつめて\nちからを　はなつ。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user gathers all\nits light energy and\nreleases it at once.\nIt may also lower the\nfoe’s Sp. Def stat."
    fr: "Le lanceur concentre\nson énergie lumineuse\net la fait exploser.\nPeut aussi baisser la\nDéf. Spé. de l’ennemi."
    it: "Chi la usa attacca\nraccogliendo e rila-\nsciando energia lumi-\nnosa. Può ridurre la\nDif. Sp. del nemico."
    de: "Anwender sammelt\nLichtenergie, feuert\nsie auf einmal ab.\nSenkt eventuell gegn.\nSpezial-Verteidigung."
    es: "El usuario concentra\ntoda la luz del cuerpo\ny la libera. Puede\nbajar la Def. Esp.\ndel rival."
    ko: "몸의 빛을\n한곳에 모아서\n힘을 쏜다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
flatter:
  names:
    jp_kana: おだてる
    en: Flatter
    fr: Flatterie
    it: Adulazione
    de: Schmeichler
    es: Camelo
    ko: 부추기기
  descriptions:
    jp_kana: "あいてを　おだてて\nこんらん　させる。\nどうじに　あいての\nとくこうも　あげて\nしまう。"
    en: "Flattery is used to\nconfuse the foe.\nHowever, it also\nraises the target’s\nSp. Atk stat."
    fr: "Rend l’ennemi\nconfus, mais\naugmente son \nAtq. Spé."
    it: "Adula il nemico\ne lo confonde\nma ne aumenta\nl’Att. Sp."
    de: "Schmeichelt Gegner,\num ihn zu verwirren.\nErhöht dessen\nSpezial-Angriff."
    es: "Halaga al enemigo y\nlo confunde, pero\ntambién sube su\nAt. Esp."
    ko: "상대를 부추겨서\n혼란시킨다.\n동시에 상대의\n특수공격도 올라가\n버린다."
fling:
  names:
    jp_kana: なげつける
    en: Fling
    fr: Dégommage
    it: Lancio
    de: Schleuder
    es: Lanzamiento
    ko: 내던지기
  descriptions:
    jp_kana: "もたせた　どうぐを\nすばやく　なげつけて\nこうげきする。\nどうぐで　いりょくと\nこうかが　かわる。"
    en: "The user flings its\nheld item at the foe\nto attack. Its power\nand effects depend\non the item."
    fr: "Le lanceur envoie\nl’objet qu’il tient sur\nl’ennemi. La puissance\net les effets\ndépendent de l’objet."
    it: "Chi la usa lancia sul\nnemico lo strumento\nche tiene. La forza\ne l’effetto dipendono\ndallo strumento."
    de: "Anwender schleudert\nsein Item auf den\nGegner. Kraft und\nEffekt der Attacke\nhängen vom Item ab."
    es: "Lanza contra el rival\nel objeto que lleva.\nLa fuerza del ataque\ny su efecto varían\nsegún el objeto."
    ko: "지니게 한 도구를\n재빠르게 내던져서\n공격한다.\n도구에 따라 위력과\n효과가 바뀐다."
fly:
  names:
    jp_kana: そらをとぶ
    en: Fly
    fr: Vol
    it: Volo
    de: Fliegen
    es: Vuelo
    ko: 공중날기
  descriptions:
    jp_kana: "１ターンめで　そらへ\nとび　２ターンめに\nこうげきする。\nしっている　まちに\nとぶことも　できる。"
    en: "The user soars, then\nstrikes on the second\nturn. It can also be\nused for flying to\nany familiar town."
    fr: "Le lanceur s’envole\nau 1ᵉʳ tour et frappe\nau 2ᵉ. Permet aussi\nd’être porté dans une\nville connue."
    it: "Chi la usa si alza da\nterra per attaccare\nal turno successivo.\nUtile anche per volare\nin città già visitate."
    de: "Steigt in der 1. Runde\nempor und trifft den\nGegner in Runde 2.\nErmöglicht Flug in\njede bekannte Stadt."
    es: "Primer turno: vuela.\nSegundo turno:\nataca. Fuera de\ncombate, permite ir\na sitios ya conocidos."
    ko: "1턴째에 하늘을\n날아 2턴째에\n공격한다.\n알고 있는 도시로\n날아갈 수 있다."
focus_blast:
  names:
    jp_kana: きあいだま
    en: Focus Blast
    fr: Exploforce
    it: Focalcolpo
    de: Fokusstoß
    es: Onda Certera
    ko: 기합구슬
  descriptions:
    jp_kana: "きあいを　たかめて\nこんしんの　ちからを\nほうしゅつする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user heightens\nits mental focus and\nunleashes its power.\nIt may also lower the\ntarget’s Sp. Def."
    fr: "Le lanceur rassemble\nses forces et laisse\néclater son pouvoir.\nPeut aussi baisser la\nDéf. Spé. de l’ennemi."
    it: "Chi la usa si concen-\ntra e rilascia la sua\nforza. Può ridurre\nla Dif. Sp. del\nPokémon colpito."
    de: "Anwender erhöht\nseinen mentalen\nFokus und greift dann\nan. Senkt gegnerische\nSpezial-Verteidigung."
    es: "Agudiza la\nconcentración mental\ny libera su poder.\nPuede disminuir la\nDef. Esp. del rival."
    ko: "기합을 높여서\n혼신의 힘을\n방출한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
focus_energy:
  names:
    jp_kana: きあいだめ
    en: Focus Energy
    fr: Puissance
    it: Focalenergia
    de: Energiefokus
    es: Foco Energía
    ko: 기충전
  descriptions:
    jp_kana: "ふかく　いきを　すい\nきあいを　こめる。\nじぶんの　こうげきが\nきゅうしょに　あたる\nかくりつを　あげる。"
    en: "The user takes a\ndeep breath and\nfocuses to raise the\ncritical-hit ratio of\nits attacks."
    fr: "Le lanceur prend une\nprofonde respiration\net se concentre pour\naugmenter son taux\nde critiques."
    it: "Chi la usa fa un\nprofondo respiro e si\nconcentra per\nrendere più probabili\ni brutti colpi."
    de: "Anwender atmet ein\nund bündelt Kraft.\nDie Volltrefferquote\nsteigt dadurch."
    es: "Concentra energía\npara aumentar las\nposibilidades de\nun golpe crítico."
    ko: "깊게 숨을 들이마셔\n기합을 넣는다.\n자신의 공격이\n급소에 맞을\n확률을 올린다."
focus_punch:
  names:
    jp_kana: きあいパンチ
    en: Focus Punch
    fr: Mitra-Poing
    it: Centripugno
    de: Power-Punch
    es: Puño Certero
    ko: 힘껏펀치
  descriptions:
    jp_kana: "せいしんを　たかめて\nパンチを　くりだす。\nわざを　だす　までに\nこうげきを　うけると\nしっぱいする。"
    en: "The user focuses its\nmind before launching\na punch. It will fail\nif the user is hit\nbefore it is used."
    fr: "Le lanceur se\nconcentre avant\nd’attaquer. Echoue\ns’il est touché avant\nd’avoir frappé."
    it: "Chi la usa prende la\nmira prima di sferrare\nun pugno. Fallirà se\nverrà colpito prima\ndi fare la mossa."
    de: "Anwender konzen-\ntriert sich, bevor er\nangreift. Wird er\nvorher getroffen, ist\ndie Att. erfolglos."
    es: "Se concentra para\ndar un puñetazo.\nFalla si se sufre un\ngolpe antes de su\nuso."
    ko: "정신력을 높여\n펀치를 날린다.\n기술을 쓰기 전에\n공격을 받으면\n실패한다."
follow_me:
  names:
    jp_kana: このゆびとまれ
    en: Follow Me
    fr: Par Ici
    it: Sonoqui
    de: Spotlight
    es: Señuelo
    ko: 날따름
  descriptions:
    jp_kana: "じぶんに　ちゅうもく\nさせて　あいてからの\nこうげきを　すべて\nじぶんに　むけさせる。"
    en: "The user draws\nattention to itself,\nmaking all foes take\naim only at the user."
    fr: "Attire l’attention.\nLes ennemis\nn’attaquent que le\nlanceur."
    it: "Chi la usa attrae\nl’attenzione su di\nsé, costringendo i\nnemici ad attaccarlo."
    de: "Zieht Aufmerksam-\nkeit auf sich.\nGegner greift nur\nAnwender an."
    es: "Llama la atención\npara concentrar los\nataques de todos\nlos enemigos."
    ko: "자신에게 주목시켜\n상대로부터의 공격을\n모두 자신에게\n향하게 한다."
force_palm:
  names:
    jp_kana: はっけい
    en: Force Palm
    fr: Forte-Paume
    it: Palmoforza
    de: Kraftwelle
    es: Palmeo
    ko: 발경
  descriptions:
    jp_kana: "あいての　からだに\nしょうげきはを　あてて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The foe is attacked\nwith a shock wave.\nIt may also leave the\ntarget paralyzed."
    fr: "Une onde de choc\nfrappe l’ennemi. \nPeut aussi paralyser\nla cible."
    it: "Chi la usa attacca il\nnemico con un’onda\nd’urto che può anche\nparalizzarlo."
    de: "Gegner wird mit\nSchockwelle\nangegriffen, die\nihn eventuell\nparalysiert."
    es: "Ataca al rival con una\nonda de choque y\npuede llegar a\nparalizarlo."
    ko: "상대의 몸에\n충격파를 부딪쳐\n공격한다.\n마비 상태로\n만들 때가 있다."
foresight:
  names:
    jp_kana: みやぶる
    en: Foresight
    fr: Clairvoyance
    it: Preveggenza
    de: Gesichte
    es: Profecía
    ko: 꿰뚫어보기
  descriptions:
    jp_kana: "ゴーストタイプに\nこうかがない　わざや\nかいひりつの　たかい\nあいてに　こうげきが\nあたるように　なる。"
    en: "Enables the user to\nhit a Ghost type with\nany type of move. It\nalso enables the user\nto hit an evasive foe."
    fr: "Permet de toucher un\nPokémon Spectre avec\nn’importe quelle capa-\ncité et de toucher un\nennemi insaisissable."
    it: "Chi la usa colpisce\nun tipo Spettro con\nqualsiasi mossa e\nvanifica l’aumento di\nelusione del nemico."
    de: "Geist-Pokémon können\nmit jeder Att. ange-\ngriffen werden. Ver-\nhindert Anstieg von\ngegn. Fluchtwert."
    es: "Permite atacar con\ncualquier movimiento\na rivales de tipo\nFantasma y golpear\na Pokémon evasivos."
    ko: "고스트타입에\n효과가 없는 기술이나\n회피율이 높은\n상대라 할지라도\n공격이 맞게 된다."
frenzy_plant:
  names:
    jp_kana: ハードプラント
    en: Frenzy Plant
    fr: Végé-Attak
    it: Radicalbero
    de: Fauna-Statue
    es: Planta Feroz
    ko: 하드플랜트
  descriptions:
    jp_kana: "おおきな　じゅもくで\nあいてを　たたきつけて\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The foe is slammed\nwith an enormous\ntree.\nThe user can’t move\non the next turn."
    fr: "Un violent coup de\nracines s’abat sur\nl’ennemi. Immobilise\nle lanceur au tour\nsuivant."
    it: "Un groviglio di radici\ncolpisce il nemico.\nChi la usa perde il\nturno successivo."
    de: "Angriff mit dickem\nAst. Der Angreifer\nmuss eine Runde\naussetzen."
    es: "Golpea con una enorme\nplanta. El atacante\nno puede moverse en\nel siguiente turno."
    ko: "큰 나무로\n상대를 힘껏 쳐서\n공격한다.\n다음 턴은\n움직일 수 없게 된다."
frustration:
  names:
    jp_kana: やつあたり
    en: Frustration
    fr: Frustration
    it: Frustrazione
    de: Frustration
    es: Frustración
    ko: 화풀이
  descriptions:
    jp_kana: "ふまんを　はらすため\nぜんりょくで　あいてを\nこうげきする。\nなついて　いないほど\nいりょくは　あがる。"
    en: "A full-power attack\nthat grows more\npowerful the less\nthe user likes its\nTrainer."
    fr: "Moins le Pokémon aime\nson Dresseur, plus\ncette attaque est\npuissante."
    it: "Mossa molto potente\nche infligge maggiori\ndanni se chi la usa\nnon è amico del suo\nAllenatore."
    de: "Die Attacke wird\nstärker, je mehr der\nAnwender seinen\nTrainer hasst."
    es: "Cuanto menor sea\nla amistad con el\nentrenador, más\npoderoso será\neste ataque."
    ko: "불만을 풀기 위해\n전력으로 상대를\n공격한다.\n친밀하지 않을수록\n위력이 올라간다."
fury_attack:
  names:
    jp_kana: みだれづき
    en: Fury Attack
    fr: Furie
    it: Furia
    de: Furienschlag
    es: Ataque Furia
    ko: 마구찌르기
  descriptions:
    jp_kana: "つのや　くちばしで\nあいてを　つついて\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The foe is jabbed\nrepeatedly with a\nhorn or beak two to\nfive times in a row."
    fr: "Frappe l’ennemi 2 à 5\nfois d’affilée avec une\ncorne ou un bec."
    it: "Infilza il nemico con\ncorna affilate o un\nbecco per 2-5 volte\ndi fila."
    de: "Spießt den Gegner\n2 - 5-mal mit\nspitzem Horn oder\nSchnabel auf."
    es: "Cornea al enemigo\nde 2 a 5 veces."
    ko: "뿔이나 부리로\n상대를 찔러서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
fury_cutter:
  names:
    jp_kana: れんぞくぎり
    en: Fury Cutter
    fr: Taillade
    it: Tagliofuria
    de: Zornklinge
    es: Cortefuria
    ko: 연속자르기
  descriptions:
    jp_kana: "カマや　ツメ　などで\nあいてを　きりつけて\nこうげきする。\nれんぞくで　あてると\nいりょくが　あがる。"
    en: "The foe is slashed\nwith scythes or\nclaws. Its power\nincreases if it hits\nin succession."
    fr: "Un coup de faux ou de\ngriffe dont la force\naugmente quand il\ntouche plusieurs fois\nd’affilée."
    it: "Colpisce il nemico con\nfalci o artigli. Se\nusata in successione,\naumenta d’intensità."
    de: "Eine Attacke mit\nScheren oder Klauen,\nderen Härte bei jedem\nTreffer zunimmt."
    es: "Ataque con garras\no guadaña que crece\nen intensidad si se\nusa repetidas veces."
    ko: "낫이나 발톱 등으로\n상대를 베어\n공격한다.\n연속으로 맞히면\n위력이 올라간다."
fury_swipes:
  names:
    jp_kana: みだれひっかき
    en: Fury Swipes
    fr: Combo-Griffe
    it: Sfuriate
    de: Kratzfurie
    es: Golpes Furia
    ko: 마구할퀴기
  descriptions:
    jp_kana: "ツメや　カマなどで\nあいてを　ひっかいて\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The foe is raked with\nsharp claws or\nscythes for two to\nfive times in quick\nsuccession."
    fr: "L’ennemi est lacéré\npar des faux ou des\ngriffes de 2 à 5\nfois."
    it: "Colpisce il nemico con\nartigli o falci affilate\nper 2-5 volte in\nrapida successione."
    de: "Beharkt Gegner\n2 - 5-mal mit\nscharfen Klauen\noder Sicheln."
    es: "Araña rápidamente\nde 2 a 5 veces."
    ko: "발톱이나 낫 등으로\n상대를 할퀴어서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
future_sight:
  names:
    jp_kana: みらいよち
    en: Future Sight
    fr: Prescience
    it: Divinazione
    de: Seher
    es: Premonición
    ko: 미래예지
  descriptions:
    jp_kana: "わざを　つかった\n２ターン　あとに\nあいてに　ねんりきの\nかたまりを　おくって\nこうげきする。"
    en: "Two turns after this\nmove is used, the foe\nis attacked with a\nhunk of psychic\nenergy."
    fr: "De l’énergie psychique\nvient frapper l’ennemi\n2 tours après\nl’utilisation de cette\ncapacité."
    it: "2 turni dopo l’utilizzo\ndi questa mossa,\nil nemico viene\nattaccato con\nenergia psichica."
    de: "Zwei Runden, nachdem\nSeher eingesetzt\nwurde, erfolgt der\nAngriff."
    es: "Concentra energía\npsíquica para\ngolpear al enemigo\n2 turnos después."
    ko: "기술을 사용한\n2턴 뒤에\n상대에게 염동력의\n덩어리를 보내어\n공격한다."
gastro_acid:
  names:
    jp_kana: いえき
    en: Gastro Acid
    fr: Suc Digestif
    it: Gastroacido
    de: Magensäfte
    es: Bilis
    ko: 위액
  descriptions:
    jp_kana: "いえきを　あいての\nからだに　はきつける。\nついた　いえきは\nあいての　とくせいの\nこうかを　けす。"
    en: "The user hurls up its\nstomach acids on\nthe foe. The fluid\neliminates the effect\nof the foe’s ability."
    fr: "Le lanceur répand ses\nsucs digestifs sur\nl’ennemi. Le fluide\nannule la capacité\nspéciale de l’ennemi."
    it: "Chi la usa lancia\nacidi gastrici sul\nnemico. Il fluido\nannulla l’abilità\ndel nemico."
    de: "Anwender greift den\nGegner mit eigenen\nMagensäften an. Ent-\nfernt Effekte gegn.\nSpezialfähigkeit."
    es: "El usuario arroja\nsus jugos biliares al\nrival, lo que anula el\nefecto de la\nhabilidad en uso."
    ko: "상대의 몸에\n위액을 내뱉는다.\n달라붙은 위액은\n상대의 특성\n효과를 지운다."
giga_drain:
  names:
    jp_kana: ギガドレイン
    en: Giga Drain
    fr: Giga-Sangsue
    it: Gigassorbim.
    de: Gigasauger
    es: Gigadrenado
    ko: 기가드레인
  descriptions:
    jp_kana: "ようぶんを　すいとり\nこうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを\nかいふくできる。"
    en: "A nutrient-draining\nattack. The user’s\nHP is restored by\nhalf the damage taken\nby the target."
    fr: "Une attaque qui\nconvertit la moitié\ndes dégâts infligés\nen PV."
    it: "Mossa che assorbe\nPS. Chi la usa\nrecupera una quantità\ndi PS pari alla metà\ndel danno inferto."
    de: "Entzieht dem Gegner\nNährstoffe. Die Hälfte\ndes Schadens wird\nden KP des Anwenders\nzugerechnet."
    es: "Absorbe la mitad\ndel daño producido."
    ko: "양분을 흡수하여\n공격한다.\n입힌 데미지의\n절반에 해당하는\nHP를 회복할 수 있다."
giga_impact:
  names:
    jp_kana: ギガインパクト
    en: Giga Impact
    fr: Giga Impact
    it: Gigaimpatto
    de: Gigastoß
    es: Giga Impacto
    ko: 기가임팩트
  descriptions:
    jp_kana: "もてる　ちからを\nすべて　つかって\nとつげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The user charges at\nthe foe using every\nbit of its power.\nThe user must rest\non the next turn."
    fr: "Le lanceur charge\nl’ennemi de toute sa\npuissance. Il doit\nensuite se reposer\nau tour suivant."
    it: "Chi la usa carica il\nnemico usando tutta\nla sua forza, ma al\nturno successivo\ndeve riposare."
    de: "Anwender rennt mit\nseiner ganzen Kraft\ngegen den Gegner\nan und muss dann\neine Runde ruhen."
    es: "Carga contra el rival\nusando toda la\nfuerza que tiene.\nEl Pokémon descansa\nel turno siguiente."
    ko: "가진 힘을\n모두 사용해서\n돌격한다.\n다음 턴은\n움직일 수 없다."
glare:
  names:
    jp_kana: へびにらみ
    en: Glare
    fr: Intimidation
    it: Bagliore
    de: Giftblick
    es: Deslumbrar
    ko: 뱀눈초리
  descriptions:
    jp_kana: "おなかの　もようで\nおびえさせて\nあいてを　まひの\nじょうたいに　する。"
    en: "The user intimidates\nthe foe with the\npattern on its belly\nto cause paralysis."
    fr: "Le lanceur intimide\nl’ennemi grâce au\nmotif sur son ventre\npour le paralyser."
    it: "Chi la usa spaventa il\nnemico con i disegni\nche ha sulla pancia e\nne causa la paralisi."
    de: "Schüchtert Gegner\nmit dem Bauchmuster\nein, so dass er\nparalysiert ist."
    es: "Intimida y asusta\nal rival hasta\ndejarlo paralizado."
    ko: "배의 무늬로\n겁을 주어\n상대를 마비\n상태로 만든다."
grass_knot:
  names:
    jp_kana: くさむすび
    en: Grass Knot
    fr: Noeud Herbe
    it: Laccioerboso
    de: Strauchler
    es: Hierba Lazo
    ko: 풀묶기
  descriptions:
    jp_kana: "くさを　からませて\nあいてを　ころばせる。\nあいてが　おもいほど\nいりょくが　あがる。"
    en: "The user snares the\nfoe with grass and\ntrips it. The heavier\nthe foe, the greater\nthe damage."
    fr: "L’ennemi est piégé\ndans de l’herbe qui le\nfait trébucher. Plus\nil est lourd, plus il y\na de dégâts."
    it: "Chi la usa intrappola\nil nemico con l’erba\ne lo fa cadere. Più\npesante è il nemico,\nmaggiore è il danno."
    de: "Gegner wird durch\nGras ins Straucheln\ngebracht. Je\nschwerer der Gegn.,\ndesto mehr Schaden."
    es: "Enreda al enemigo\ncon hierba y lo\nderriba. Cuanto más\npesado es el rival,\nmás daño inflige."
    ko: "풀을 휘감아서\n상대를 쓰러뜨린다.\n상대가 무거울수록\n위력이 올라간다."
grass_whistle:
  names:
    jp_kana: くさぶえ
    en: GrassWhistle
    fr: Siffl’Herbe
    it: Meloderba
    de: Grasflöte
    es: Silbato
    ko: 풀피리
  descriptions:
    jp_kana: "ここちよい　ふえの\nねいろを　きかせて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user plays a\npleasant melody that\nlulls the foe into a\ndeep sleep."
    fr: "Le lanceur joue une\ndouce mélodie qui\nplonge l’ennemi dans\nun profond sommeil."
    it: "Una dolce melodia\nculla il nemico e\nlo costringe\nad addormentarsi."
    de: "Versetzt Gegner mit\nschöner Melodie in\nTiefschlaf."
    es: "Agradable melodía\nque adormece al rival."
    ko: "기분 좋은 피리\n소리를 들려주어\n상대를 잠듦\n상태로 만든다."
gravity:
  names:
    jp_kana: じゅうりょく
    en: Gravity
    fr: Gravité
    it: Gravità
    de: Erdanziehung
    es: Gravedad
    ko: 중력
  descriptions:
    jp_kana: "５ターンの　あいだ\nじゅうりょくを　\nつよくして　ふゆうや\nそらへ　とぶ　わざを\nつかえなく　する。"
    en: "Gravity is intensified\nfor five turns, making\nmoves involving flying\nunusable and\nnegating Levitation."
    fr: "La gravité augmente\npendant 5 tours, ce\nqui empêche les\ncapacités volantes\net annule Lévitation."
    it: "Intensifica la gravità\nper 5 turni. Le mosse\nche fanno volare e\nLevitazione sono\ninutilizzabili."
    de: "Die Gravitation wird\nfür fünf Runden er-\nhöht. Macht Fliegen\nunmöglich und\nnegiert Schweben."
    es: "La gravedad aumenta\ndurante 5 turnos, lo\nque impide acciones\nque impliquen volar\no levitar."
    ko: "5턴 동안\n중력을\n강하게 해서 부유나\n하늘을 나는 기술을\n사용할 수 없게 한다."
growl:
  names:
    jp_kana: なきごえ
    en: Growl
    fr: Rugissement
    it: Ruggito
    de: Heuler
    es: Gruñido
    ko: 울음소리
  descriptions:
    jp_kana: "かわいい　なきごえを\nきかせて　きを　ひき\nゆだんを　させて\nあいての　こうげきを\nさげる。"
    en: "The user growls in an\nendearing way, making\nthe foe less wary.\nThe target’s Attack\nstat is lowered."
    fr: "Le lanceur pousse un\ncri tout mimi pour\ntromper la vigilance \nde l’ennemi et baisser\nson Attaque."
    it: "Distrae il nemico con\nun ruggito toccante\ne ne riduce l’Attacco."
    de: "Der Anwender nimmt\nden Gegner für sich\nein und senkt dessen\nAngriffs-Wert."
    es: "Dulce gruñido que\nreduce el Ataque\ndel contrincante."
    ko: "귀여운 울음소리를\n들려주고 관심을 끌어\n방심한 사이에\n상대의 공격을\n떨어뜨린다."
growth:
  names:
    jp_kana: せいちょう
    en: Growth
    fr: Croissance
    it: Crescita
    de: Wachstum
    es: Desarrollo
    ko: 성장
  descriptions:
    jp_kana: "からだを　いっきに\nおおきく　せいちょう　\nさせて　じぶんの\nとくこうを　あげる。"
    en: "The user’s body is\nforced to grow all at\nonce. It raises the\nSp. Atk stat."
    fr: "Le corps du lanceur\nse développe.\nAugmente l’Atq. Spé."
    it: "Provoca la crescita\nimmediata del corpo\ne l’aumento dell’Att.\nSp. di chi la usa."
    de: "Der Körper wächst\nund der\nSpezial-Angriff\nwird erhöht."
    es: "Crece a marchas\nforzadas y aumenta\nel At. Esp."
    ko: "몸을 일시에\n크게 성장시켜\n자신의 특수공격을\n올린다."
grudge:
  names:
    jp_kana: おんねん
    en: Grudge
    fr: Rancune
    it: Rancore
    de: Nachspiel
    es: Rabia
    ko: 원념
  descriptions:
    jp_kana: "あいての　わざで\nひんしに　されたとき\nおんねんを　かけて\nそのわざの　ＰＰを\n０に　する。"
    en: "If the user faints,\nthe user’s grudge\nfully depletes the PP\nof the foe’s move\nthat knocked it out."
    fr: "Si le lanceur est mis\nK.O., sa rancune\népuise les PP de la \ncapacité utilisée pour\nle mettre K.O."
    it: "Se chi la usa va KO,\ni PP della mossa\nnemica che lo ha\nmesso fuori gioco\nsi azzerano."
    de: "Wird der Anwender\nbesiegt, werden\nAP der Finalattacke\ngelöscht."
    es: "Si el usuario se\ndebilita, elimina todos\nlos PP del último\nataque del rival."
    ko: "상대의 기술로\n기절하면\n원념을 담아\n그 기술의 PP를\n0으로 만든다."
guard_swap:
  names:
    jp_kana: ガードスワップ
    en: Guard Swap
    fr: Permugarde
    it: Barattoscudo
    de: Schutztausch
    es: Cambia Def.
    ko: 가드스웹
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんと　あいての\nぼうぎょと　とくぼうの\nのうりょく　へんかを\nいれかえる。"
    en: "The user employs its\npsychic power to\nswitch changes to\nits Defense and\nSp. Def with the foe."
    fr: "Pouvoir qui échange\nles modifications de \nla Déf. Spé. et de la\nDéfense avec\nl’ennemi."
    it: "Chi la usa sfrutta la\nsua forza psichica per\nscambiare col nemico\nle modifiche alla\nDifesa e alla Dif. Sp."
    de: "Psychische Kräfte\ntauschen Änderungen\nan Verteidigung und\nSpez.-Vert. mit denen\ndes Gegners."
    es: "El usuario emplea\nsu poder mental para\nintercambiar cambios\nen Defensa y Def.\nEsp. con el rival."
    ko: "초능력으로\n자신과 상대의\n방어와 특수방어의\n능력 변화를\n교체한다."
guillotine:
  names:
    jp_kana: ハサミギロチン
    en: Guillotine
    fr: Guillotine
    it: Ghigliottina
    de: Guillotine
    es: Guillotina
    ko: 가위자르기
  descriptions:
    jp_kana: "おおきな　ハサミで\nあいてを　きりさいて\nこうげきする。\nあたれば　いちげきで\nひんしに　する。"
    en: "A vicious, tearing\nattack with pincers.\nThe foe will faint\ninstantly if this\nattack hits."
    fr: "De méchantes pinces\nlacèrent l’ennemi, le\nmettant K.O. sur le\ncoup s’il est touché."
    it: "Attacca il nemico con\npericolose tenaglie.\nSe l’attacco va a\nbuon fine, il nemico\nva subito KO."
    de: "Kräftige Scheren-\nAttacke. Führt bei\nGegner sofort\nzum K.O."
    es: "Pinzas que debilitan\nal oponente de un\ngolpe si aciertan."
    ko: "큰 집게로\n상대를 베어 갈라\n공격한다.\n맞으면 일격에\n기절한다."
gunk_shot:
  names:
    jp_kana: ダストシュート
    en: Gunk Shot
    fr: Détricanon
    it: Sporcolancio
    de: Mülltreffer
    es: Lanza Mugre
    ko: 더스트슈트
  descriptions:
    jp_kana: "きたない　ゴミを\nあいてに　ぶつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The user shoots\nfilthy garbage at the\nfoe to attack.\nIt may also poison\nthe target."
    fr: "Le lanceur envoie des\ndétritus sur l’ennemi.\nPeut aussi\nl’empoisonner."
    it: "Chi la usa attacca\nil nemico con rifiuti\nsudici che possono\nanche avvelenarlo."
    de: "Anwender schießt mit\nMüll auf den Gegner.\nVergiftet den Gegner\neventuell."
    es: "Lanza contra el rival\nasquerosa basura.\nPuede envenenar\nal objetivo."
    ko: "더러운 쓰레기를\n상대에게 부딪쳐서\n공격한다.\n독 상태로\n만들 때가 있다."
gust:
  names:
    jp_kana: かぜおこし
    en: Gust
    fr: Tornade
    it: Raffica
    de: Windstoß
    es: Tornado
    ko: 바람일으키기
  descriptions:
    jp_kana: "つばさで　おこした\nはげしい　かぜを\nあいてに　ぶつけて\nこうげきする。"
    en: "A gust of wind is\nwhipped up by wings\nand launched at the\nfoe to inflict damage."
    fr: "Le lanceur bat des\nailes pour générer\nune bourrasque qui\nblesse l’ennemi."
    it: "Infligge danni al\nnemico con una\nfolata di vento\nsollevata dalle ali."
    de: "Trifft den Gegner\nmit einem Windstoß\ndurch Flügelschlag."
    es: "Crea un tornado\ncon las alas y lo\nlanza contra el\nenemigo."
    ko: "날개로 일으킨\n격한 바람을\n상대에게 부딪혀서\n공격한다."
gyro_ball:
  names:
    jp_kana: ジャイロボール
    en: Gyro Ball
    fr: Gyroballe
    it: Vortexpalla
    de: Gyroball
    es: Giro Bola
    ko: 자이로볼
  descriptions:
    jp_kana: "からだを　こうそくに\nかいてん　させて\nたいあたりする。\nあいてより　すばやさが\nおそいほど　つよい。"
    en: "The user tackles the\nfoe with a high-speed\nspin. The slower the\nuser, the greater\nthe damage."
    fr: "Le lanceur effectue\nune rotation et\nfrappe l’ennemi. Plus\nle lanceur est lent,\nplus il fait de dégâts."
    it: "Chi la usa colpisce\nil nemico con un\nvortice rapidissimo.\nPiù lento è chi la usa,\nmaggiore è il danno."
    de: "Anwender führt\nAngriff mit hoher\nGeschwindigkeit aus.\nJe langsamer d. Anw.,\ndesto mehr Schaden."
    es: "Embiste al rival con\nun potente ataque\ngiratorio. Cuanto más\nlento es el usuario,\nmás daño causa."
    ko: "몸을 고속으로\n회전시켜서\n몸통박치기한다.\n상대보다 스피드가\n느릴수록 강하다."
hail:
  names:
    jp_kana: あられ
    en: Hail
    fr: Grêle
    it: Grandine
    de: Hagelsturm
    es: Granizo
    ko: 싸라기눈
  descriptions:
    jp_kana: "５ターンの　あいだ\nあられを　ふらして\nこおりタイプで　ない\nポケモン　ぜんいんに　\nダメージを　あたえる。"
    en: "The user summons a\nhailstorm lasting five\nturns. It damages all\nPokémon except the\nIce type."
    fr: "Invoque une tempête\nde grêle qui dure 5\ntours. Ne blesse pas\nles Pokémon de type\nGlace."
    it: "Chi la usa causa una\ngrandinata di 5 turni.\nDanneggia tutti i\nPokémon tranne\nil tipo Ghiaccio."
    de: "Hagelsturm für fünf\nRunden. Schadet\nallen, außer\nEis-Pokémon."
    es: "Tormenta de granizo\nque dura 5 turnos.\nHiere a todos,\nexcepto a los de\ntipo Hielo."
    ko: "5턴 동안\n싸라기눈을 내리게 해\n얼음타입이 아닌\n포켓몬 모두에게\n데미지를 준다."
hammer_arm:
  names:
    jp_kana: アームハンマー
    en: Hammer Arm
    fr: Marto-Poing
    it: Martelpugno
    de: Hammerarm
    es: Machada
    ko: 암해머
  descriptions:
    jp_kana: "つよくて　おもい\nこぶしを　ふるって\nダメージを　あたえる。　\nじぶんの　すばやさが\nさがる。"
    en: "The user swings and\nhits with its strong\nand heavy fist.\nIt lowers the user’s\nSpeed, however."
    fr: "Le lanceur lâche un\npuissant coup de poing\nsur l’ennemi. Mais\nréduit la Vitesse du\nlanceur."
    it: "Chi la usa colpisce\nil nemico con il suo\npugno forte e\npesante, ma perde\nVelocità."
    de: "Anwender trifft mit\neinem starken Hieb.\nSenkt Initiative des\nAnwenders."
    es: "Gira con fuerza el\npuño y da un gran\ngolpe. No obstante,\nbaja la Velocidad."
    ko: "강하고 무거운\n주먹을 휘둘러\n데미지를 준다.\n자신의 스피드가\n떨어진다."
harden:
  names:
    jp_kana: かたくなる
    en: Harden
    fr: Armure
    it: Rafforzatore
    de: Härtner
    es: Fortaleza
    ko: 단단해지기
  descriptions:
    jp_kana: "ぜんしんに　ちからを\nこめて　からだを\nかたくして　じぶんの\nぼうぎょを　あげる。"
    en: "The user stiffens all\nthe muscles in its\nbody to raise its\nDefense stat."
    fr: "Le lanceur contracte\ntous ses muscles pour\naugmenter sa\nDéfense."
    it: "Tutti i muscoli del\ncorpo si tonificano\nper aumentare la\nDifesa."
    de: "Stärkt die\nMuskulatur und\nerhöht den\nVerteidigungs-Wert."
    es: "Tensa la musculatura\npara aumentar la\nDefensa."
    ko: "전신에\n힘을 담아\n몸을 단단하게 해서\n자신의\n방어를 올린다."
haze:
  names:
    jp_kana: くろいきり
    en: Haze
    fr: Buée Noire
    it: Nube
    de: Dunkelnebel
    es: Niebla
    ko: 흑안개
  descriptions:
    jp_kana: "くろいきりを　だして\nせんとうに　でている\nポケモン　ぜんいんの\nのうりょく　へんかを\nもとに　もどす。"
    en: "The user creates a\nhaze that eliminates\nevery stat change\namong all the Pokémon\nengaged in battle."
    fr: "Un brouillard qui\nannule les \nchangements\nde stats de tous les\nPokémon au combat."
    it: "Chi la usa crea una\nnube che annulla\nogni modifica delle\nstatistiche di tutti\ni Pokémon in campo."
    de: "Erzeugt einen Nebel.\nAlle Veränderungen\nder Statuswerte der\nKampfteilnehmer\nwerden annulliert."
    es: "Neblina que elimina\nlos cambios de\ncaracterísticas de\ntodos los Pokémon\ndel combate."
    ko: "흑안개를 뿜어\n배틀에 참가 중인\n포켓몬 전원의\n능력 변화를\n원래대로 돌린다."
head_smash:
  names:
    jp_kana: もろはのずつき
    en: Head Smash
    fr: Fracass’Tête
    it: Zuccata
    de: Kopfstoß
    es: Testarazo
    ko: 양날박치기
  descriptions:
    jp_kana: "いのちを　かけて\nこんしんの　ちからで\nずつきを　する。\nじぶんも　ものすごい\nダメージを　うける。"
    en: "The user delivers a\nlife-endangering head\nbutt at full power.\nThe user also takes\nterrible damage."
    fr: "Le lanceur assène\nun coup de tête\ndésespéré. Blesse\naussi gravement le\nlanceur."
    it: "Chi la usa sferra una\ntestata pericolosa\ncon tutta la sua\nforza, ma subisce\ndanni considerevoli."
    de: "Gegner wird mit\neinem schweren\nKopfstoß getroffen.\nAnwender nimmt\ndabei auch Schaden."
    es: "El usuario arriesga\nsu vida y lanza un\ncabezazo con toda\nsu fuerza. El agresor\ntambién sufre daño."
    ko: "목숨을 걸고\n혼신의 힘으로\n박치기를 한다.\n자신도 굉장한\n데미지를 입는다."
headbutt:
  names:
    jp_kana: ずつき
    en: Headbutt
    fr: Coup d’Boule
    it: Bottintesta
    de: Kopfnuss
    es: Golpe Cabeza
    ko: 박치기
  descriptions:
    jp_kana: "あたまを　つきだして\nまっすぐ　つっこんで\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user sticks its\nhead out and rams\nstraight forward.\nIt may make the\nfoe flinch."
    fr: "Le lanceur lève la \ntête avant d’asséner\nun coup vers l’avant.\nPeut apeurer\nl’ennemi."
    it: "Chi la usa piega la\ntesta in avanti e poi\nsferra una testata.\nPuò far tentennare\nil nemico."
    de: "Rammt den Gegner\nund lässt ihn\neventuell\nzurückschrecken."
    es: "Cabezazo que puede\nhacer retroceder\nal rival."
    ko: "머리를 내밀어\n곧장 돌진하여\n공격한다.\n상대를 풀죽게\n할 때가 있다."
heal_bell:
  names:
    jp_kana: いやしのすず
    en: Heal Bell
    fr: Glas de Soin
    it: Rintoccasana
    de: Vitalglocke
    es: Campana Cura
    ko: 치료방울
  descriptions:
    jp_kana: "ここちよい　すずの\nねいろを　きかせて\nみかた　ぜんいんの\nじょうたい　いじょうを\nかいふくする。"
    en: "The user makes a\nsoothing bell chime\nto heal the status\nproblems of all the\nparty Pokémon."
    fr: "Carillon apaisant qui\nsoigne les problèmes\nde statut de tous les\nPokémon de l’équipe."
    it: "Chi la usa produce\nuno scampanellio che\nrisolve i problemi di\nstato dei Pokémon\ndi tutta la squadra."
    de: "Läutet beruhigend\nund heilt alle\nStatusprobleme im\nTeam."
    es: "Tañido que cura los\nproblemas de estado\nde todos los Pokémon\ndel grupo."
    ko: "기분 좋은 방울\n소리를 들려주어\n같은 편 전원의\n상태 이상을\n회복한다."
heal_block:
  names:
    jp_kana: かいふくふうじ
    en: Heal Block
    fr: Anti-Soin
    it: Anticura
    de: Heilblockade
    es: Anticura
    ko: 회복봉인
  descriptions:
    jp_kana: "５ターンの　あいだ\nわざを　つかっての\nＨＰの　かいふくを\nできなくする。"
    en: "The user prevents\nthe foe from using\nany HP-recovery\nmoves for five turns."
    fr: "Le lanceur empêche\nl’ennemi d’utiliser des\ncapacités de \nrécupération de PV\npendant 5 tours."
    it: "Chi la usa impedisce\nal nemico di usare\nmosse recupera-PS\nper 5 turni."
    de: "Anwender verhindert\nfür fünf Runden, dass\nGegner Attacken\nverwendet, die seine\nKP regenerieren."
    es: "Impide al rival usar\nmovimientos de cura\ndurante cinco turnos."
    ko: "5턴 동안\n기술을 통해\nHP를 회복할 수\n없게 한다."
heal_order:
  names:
    jp_kana: かいふくしれい
    en: Heal Order
    fr: Appel Soins
    it: Comandocura
    de: Heilbefehl
    es: Auxilio
    ko: 회복지령
  descriptions:
    jp_kana: "しもべを　よびだして\nきずを　なおす。\nさいだい　ＨＰの\nはんぶんだけ　ＨＰを\nかいふくする。"
    en: "The user calls out\nits underlings to heal\nit. The user regains\nup to half of its\nmax HP."
    fr: "Le lanceur appelle ses\nsous-fifres pour le\nsoigner. Il récupère\njusqu’à la moitié \nde ses PV max."
    it: "Chi la usa raduna i\nsuoi sgherri per\nfarsi curare.\nRecupera fino a\nmetà dei PS massimi."
    de: "Untergebene heilen\nden Anwender. Er\nregeneriert so bis\nzur Hälfte der\nmaximalen KP."
    es: "El usuario llama a\nsus amigos para que\nlo curen. Recupera\nhasta la mitad de\nlos PS máximos."
    ko: "부하를 불러내어\n상처를 회복한다.\n최대 HP의\n절반만큼 HP를\n회복한다."
healing_wish:
  names:
    jp_kana: いやしのねがい
    en: Healing Wish
    fr: Voeu Soin
    it: Curardore
    de: Heilopfer
    es: Deseo Cura
    ko: 치유소원
  descriptions:
    jp_kana: "じぶんは　ひんしに\nなるが　ひかえから\nでてくる　ポケモンの\nじょうたい　いじょうと\nＨＰを　かいふくする。"
    en: "The user faints. In\nreturn, the Pokémon\ntaking its place will\nhave its HP restored\nand status cured."
    fr: "Le lanceur tombe\nK.O. pour soigner les\nPV et le statut du\nPokémon qui passe\naprès lui."
    it: "Chi la usa va KO, ma\nil Pokémon che lo\nsostituisce recupera\ntutti i PS e risolve\ni problemi di stato."
    de: "Anwender geht K.O.\nDas an seine Stelle\ntretende Pokémon\nhat volle KP. Status-\nprobl. werden geheilt."
    es: "El Pokémon cae\ndebilitado, pero su\nsustituto recupera\nsu estado y los PS."
    ko: "자신은 기절하지만\n교대하여 나오는\n포켓몬의\n상태 이상과\nHP를 회복한다."
heart_swap:
  names:
    jp_kana: ハートスワップ
    en: Heart Swap
    fr: Permucoeur
    it: Cuorbaratto
    de: Statustausch
    es: Cambia Almas
    ko: 하트스웹
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんと　あいてに\nかかっている\nのうりょく　へんかを\nいれかえる。"
    en: "The user employs its\npsychic power to\nswitch stat changes\nwith the foe."
    fr: "Le lanceur utilise un\npouvoir psychique\npour échanger ses\nchangements de \nstats avec l’ennemi."
    it: "Chi la usa sfrutta la\nsua forza psichica per\nscambiare col nemico\nle modifiche alle\nstatistiche."
    de: "Anwender wendet\nPsycho-Kräfte an,\num eigene und gegn.\nStatuswertverände-\nungen zu tauschen."
    es: "Usa la fuerza mental\npara intercambiar\ncon el rival los\ncambios en las\ncaracterísticas."
    ko: "초능력으로\n자신과 상대에\n걸려있는\n능력 변화를\n교체한다."
heat_wave:
  names:
    jp_kana: ねっぷう
    en: Heat Wave
    fr: Canicule
    it: Ondacalda
    de: Hitzewelle
    es: Onda Ígnea
    ko: 열풍
  descriptions:
    jp_kana: "あつい　いきを\nあいてに　ふきつけて\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The user exhales a\nheated breath on the\nfoe to attack. It may\nalso leave the target\nwith a burn."
    fr: "Le lanceur provoque\nune vague de\nchaleur. Peut aussi\nbrûler l’ennemi."
    it: "Chi la usa investe\nil nemico con una\nfolata di vento caldo.\nPuò anche scottare."
    de: "Gegner wird von\nSturm aus heißer\nLuft getroffen und\nverbrennt sich\neventuell."
    es: "Provoca un viento\nabrasador que puede\nquemar al rival."
    ko: "뜨거운 숨결을\n상대에게 내뿜어\n공격한다.\n화상 상태로\n만들 때가 있다."
helping_hand:
  names:
    jp_kana: てだすけ
    en: Helping Hand
    fr: Coup d’Main
    it: Altruismo
    de: Rechte Hand
    es: Refuerzo
    ko: 도우미
  descriptions:
    jp_kana: "なかまを　たすける。\nてだすけ　された\nポケモンの　わざの\nいりょくは　いつもより\nおおきくなる。"
    en: "A move that boosts\nthe power of the\nally’s attack in a\nDouble Battle."
    fr: "Une capacité qui\naugmente la puissance\nd’attaque de l’allié\ndurant un Combat Duo."
    it: "Mossa che aumenta la\npotenza dell’attacco\ndell’alleato in una\nLotta in Doppio."
    de: "Steigert die Kraft\nder Angriffe des\nFreundes in einem\nDoppelkampf."
    es: "Refuerza los ataques\nde un aliado en un\ncombate doble."
    ko: "동료를 돕는다.\n도움받은 포켓몬이\n쓰는 기술의 위력은\n여느 때보다\n커진다."
hidden_power:
  names:
    jp_kana: めざめるパワー
    en: Hidden Power
    fr: Puis. Cachée
    it: Introforza
    de: Kraftreserve
    es: Poder Oculto
    ko: 잠재파워
  descriptions:
    jp_kana: "わざを　つかった\nポケモンに　よって\nあいてに　あたえる\nわざの　タイプと\nいりょくが　かわる。"
    en: "A unique attack that\nvaries in type and\nintensity depending\non the Pokémon using\nit."
    fr: "Attaque dont la\npuissance et le type\ndépendent du Pokémon\nqui l’utilise."
    it: "Mossa singolare\nche cambia tipo e\npotenza a seconda\ndel Pokémon che\nla usa."
    de: "Die Wirkung und\nTyp der Attacke hängt\nvom Anwender ab."
    es: "Ataque único cuyo\ntipo y eficacia varían\nsegún el agresor."
    ko: "기술을 사용한\n포켓몬에 따라\n상대에게 주는\n기술의 타입과\n위력이 바뀐다."
high_jump_kick:
  names:
    jp_kana: とびひざげり
    en: Hi Jump Kick
    fr: Pied Voltige
    it: Calcinvolo
    de: Turmkick
    es: Pat. S. Alta
    ko: 무릎차기
  descriptions:
    jp_kana: "ジャンプからの\nひざげりで　あいてを\nこうげきする。\nはずすと　じぶんが\nダメージを　うける。"
    en: "The foe is attacked\nwith a knee kick from\na jump. If it misses,\nthe user is hurt\ninstead."
    fr: "Le lanceur s’élance\npour effectuer un\ncoup de genou sauté.\nS’il échoue, le\nlanceur se blesse."
    it: "Chi la usa colpisce\nil nemico con una\nginocchiata: se\nfallisce, subisce\ndanni."
    de: "Sprungtritt mit\nKnie. Bei Misserfolg\nverletzt sich der\nAnwender selbst."
    es: "Salta muy alto y\nlanza una patada. Si\nfalla, dañará al\nusuario."
    ko: "점프해서\n무릎차기로 상대를\n공격한다.\n빗나가면 자신이\n데미지를 입는다."
horn_attack:
  names:
    jp_kana: つのでつく
    en: Horn Attack
    fr: Koud’Korne
    it: Incornata
    de: Hornattacke
    es: Cornada
    ko: 뿔찌르기
  descriptions:
    jp_kana: "するどく　とがった\nつので　あいてを\nこうげきする。"
    en: "The foe is jabbed\nwith a sharply\npointed horn to\ninflict damage."
    fr: "Frappe l’ennemi d’un\ncoup de corne pointue\npour infliger des\ndégâts."
    it: "Danneggia il nemico\ninfilzandolo con\ncorna affilate."
    de: "Spießt den Gegner\nmit spitzem\nHorn auf."
    es: "Ataca al enemigo\ncon afilados cuernos."
    ko: "날카롭고 뾰족한\n뿔로 상대를\n공격한다."
horn_drill:
  names:
    jp_kana: つのドリル
    en: Horn Drill
    fr: Empal’Korne
    it: Perforcorno
    de: Hornbohrer
    es: Perforador
    ko: 뿔드릴
  descriptions:
    jp_kana: "かいてんする　つのを\nあいてに　つきさして\nこうげきする。\nあたれば　いちげきで\nひんしに　する。"
    en: "The foe is stabbed\nwith a horn rotating\nlike a drill.\nThe foe instantly\nfaints if it hits."
    fr: "Un coup de corne en\nvrille qui empale\nl’ennemi, le mettant\nK.O. sur le coup s’il\nest touché."
    it: "Colpisce il nemico con\nun corno perforante\ncome un trapano.\nSe il colpo va a segno,\nil nemico va KO."
    de: "K.O.-Attacke, die\nein Horn als\nBohrer einsetzt."
    es: "Ataque taladro.\nFulmina en 1 golpe."
    ko: "회전하는 뿔을\n상대에 꿰찔러서\n공격한다.\n맞으면 일격에\n기절한다."
howl:
  names:
    jp_kana: とおぼえ
    en: Howl
    fr: Grondement
    it: Gridodilotta
    de: Jauler
    es: Aullido
    ko: 멀리짖음
  descriptions:
    jp_kana: "おおごえで　ほえて\nきあいを　たかめ\nじぶんの　こうげきを\nあげる。"
    en: "The user howls loudly\nto raise its spirit,\nboosting its Attack\nstat."
    fr: "Le lanceur hurle pour\nse rassurer, ce qui\naugmente son\nAttaque."
    it: "Chi la usa grida molto\nforte per elevare\nil suo spirito,\naumentando l’Attacco."
    de: "Anwender jault, um\nin sich zu gehen\nund seinen Angriffs-\nWert zu erhöhen."
    es: "Aullido que sube\nel ánimo y aumenta\nel Ataque."
    ko: "큰 소리로 짖고\n기합을 높여\n자신의 공격을\n올린다."
hydro_cannon:
  names:
    jp_kana: ハイドロカノン
    en: Hydro Cannon
    fr: Hydroblast
    it: Idrocannone
    de: Aquahaubitze
    es: Hidrocañón
    ko: 하이드로캐논
  descriptions:
    jp_kana: "みずの　たいほうを\nあいてに　はっしゃして\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The foe is hit with\na watery blast.\nThe user must rest\non the next turn,\nhowever."
    fr: "Une trombe d’eau\nheurte l’ennemi. \nLe lanceur doit se\nreposer au tour\nsuivant."
    it: "Colpisce il nemico\ncon un potente\ngetto d’acqua. Chi\nla usa salta il turno\nsuccessivo."
    de: "Gegner wird von\nWasserkanone\ngetroffen. Angreifer\nsetzt eine Runde aus."
    es: "Disparo de agua.\nEl atacante debe\ndescansar el\nsiguiente turno."
    ko: "물의 대포를\n상대에게 발사해서\n공격한다.\n다음 턴은\n움직일 수 없다."
hydro_pump:
  names:
    jp_kana: ハイドロポンプ
    en: Hydro Pump
    fr: Hydrocanon
    it: Idropompa
    de: Hydropumpe
    es: Hidrobomba
    ko: 하이드로펌프
  descriptions:
    jp_kana: "たいりょうの　みずを\nはげしい　いきおいで\nあいてに　はっしゃして\nこうげきする。"
    en: "The foe is blasted by\na huge volume of\nwater launched under\ngreat pressure."
    fr: "Un puissant jet d’eau\nest dirigé sur\nl’ennemi."
    it: "Il nemico è travolto\nda un potente getto\nd’acqua spruzzato ad\naltissima pressione."
    de: "Spritzt eine Menge\nWasser mit\nHochdruck auf\nden Gegner."
    es: "Lanza una gran\nmasa de agua a\npresión para atacar."
    ko: "대량의 물을\n세찬 기세로\n상대에게 발사하여\n공격한다."
hyper_beam:
  names:
    jp_kana: はかいこうせん
    en: Hyper Beam
    fr: Ultralaser
    it: Iper Raggio
    de: Hyperstrahl
    es: Hiperrayo
    ko: 파괴광선
  descriptions:
    jp_kana: "つよい　こうせんを\nあいてに　はっしゃして\nこうげきする。\nつぎの　ターンは\nうごけなくなる。"
    en: "The foe is attacked\nwith a powerful beam.\nThe user must rest\non the next turn to\nregain its energy."
    fr: "Projette un puissant\nrayon sur l’ennemi. Le\nlanceur doit se\nreposer au tour\nsuivant."
    it: "Colpisce il nemico con\nun potente raggio. Chi\nla usa salta il turno\nsuccessivo per\nrecuperare energia."
    de: "Starke Attacke, die\nden Angreifer\nzwingt, eine Runde\nauszusetzen."
    es: "Es eficaz, pero\ndeja inmóvil al\natacante 1 turno."
    ko: "강한 광선을\n상대에게 발사하여\n공격한다.\n다음 턴은\n움직일 수 없다."
hyper_fang:
  names:
    jp_kana: ひっさつまえば
    en: Hyper Fang
    fr: Croc de Mort
    it: Iperzanna
    de: Hyperzahn
    es: Hip.Colmillo
    ko: 필살앞니
  descriptions:
    jp_kana: "するどい　まえばで\nつよく　かみついて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user bites hard\non the foe with its\nsharp front fangs.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur mord\nl’ennemi à l’aide de\nses incisives \naiguisées. Peut aussi\napeurer l’ennemi."
    it: "Morde il nemico\ncon canini affilati.\nPuò anche farlo\ntentennare."
    de: "Angriff mit scharfen\nReißzähnen. Gegner\nschreckt eventuell\nzurück."
    es: "Ataque con finos\ncolmillos. Puede\nhacer retroceder\nal enemigo."
    ko: "날카로운 앞니로\n강하게 물어서\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
hyper_voice:
  names:
    jp_kana: ハイパーボイス
    en: Hyper Voice
    fr: Mégaphone
    it: Granvoce
    de: Schallwelle
    es: Vozarrón
    ko: 하이퍼보이스
  descriptions:
    jp_kana: "うるさく　ひびく\nおおきな　しんどうを\nあいてに　あたえて\nこうげきする。"
    en: "The user lets loose\na horribly echoing\nshout with the\npower to inflict\ndamage."
    fr: "Le lanceur pousse un\ncri dont l’écho\nterrifiant a le\npouvoir d’infliger des\ndégâts."
    it: "Chi la usa lancia\nun urlo straziante\nche danneggia\nil nemico."
    de: "Laute Attacke mit\nSchallwellen."
    es: "Grito desgarrador que\ninflige daño al rival."
    ko: "시끄럽게 울려서\n큰 진동을\n상대에게 전달하여\n공격한다."
hypnosis:
  names:
    jp_kana: さいみんじゅつ
    en: Hypnosis
    fr: Hypnose
    it: Ipnosi
    de: Hypnose
    es: Hipnosis
    ko: 최면술
  descriptions:
    jp_kana: "ねむけを　さそう\nあんじを　かけて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user employs\nhypnotic suggestion\nto make the target\nfall into a deep\nsleep."
    fr: "Le lanceur hypnotise\nl’ennemi pour le\nplonger dans un\nprofond sommeil."
    it: "Chi la usa si avvale\ndella suggestione\nipnotica per far\naddormentare il\nnemico."
    de: "Hypno-Attacke,\ndie den Gegner\nin Schlaf versetzt."
    es: "Ataque hipnótico\nque hace dormir\nprofundamente al\nenemigo."
    ko: "졸음을 유도하는\n암시를 걸어서\n상대를 잠듦\n상태로 만든다."
ice_ball:
  names:
    jp_kana: アイスボール
    en: Ice Ball
    fr: Ball’Glace
    it: Palla Gelo
    de: Frostbeule
    es: Bola Hielo
    ko: 아이스볼
  descriptions:
    jp_kana: "５ターンの　あいだ\nころがりつづけて\nこうげきする。\nわざが　あたる　たびに\nいりょくが　あがる。"
    en: "The user continually\nrolls into the foe\nover five turns. It\nbecomes stronger\neach time it hits."
    fr: "Envoie une balle de\nglace pendant 5\ntours. L’attaque \ngagne en puissance\nà chaque coup."
    it: "Chi la usa colpisce\nil nemico di continuo\nper 5 turni, con\naumento progressivo\ndella potenza."
    de: "Roll-Angriff für fünf\nRunden. Bei Erfolg\nnimmt die Stärke zu."
    es: "Embiste al rival\ndurante 5 turnos\ny gana fuerza\nen cada uno."
    ko: "5턴 동안\n계속 굴러서\n공격한다.\n기술이 맞을 때마다\n위력이 올라간다."
ice_beam:
  names:
    jp_kana: れいとうビーム
    en: Ice Beam
    fr: Laser Glace
    it: Geloraggio
    de: Eisstrahl
    es: Rayo Hielo
    ko: 냉동빔
  descriptions:
    jp_kana: "こごえる　ビームを\nあいてに　はっしゃして\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "The foe is struck\nwith an icy-cold\nbeam of energy.\nIt may also freeze\nthe target solid."
    fr: "Un rayon de glace\nfrappe l’ennemi. Peut\naussi le geler."
    it: "Il nemico è colpito\nda un raggio di\nenergia gelido\nche può anche\ncongelarlo."
    de: "Der Gegner wird von\neinem Eisstrahl\ngetroffen und\nfriert eventuell ein."
    es: "Rayo de hielo que\npuede llegar a\ncongelar."
    ko: "냉동빔을\n상대에게 발사하여\n공격한다.\n얼음 상태로\n만들 때가 있다."
ice_fang:
  names:
    jp_kana: こおりのキバ
    en: Ice Fang
    fr: Crocs Givre
    it: Gelodenti
    de: Eiszahn
    es: Colm. Hielo
    ko: 얼음엄니
  descriptions:
    jp_kana: "れいきを　ひめた\nキバで　かみつく。\nあいてを　ひるませたり\nこおり　じょうたいに\nすることが　ある。"
    en: "The user bites with\ncold-infused fangs.\nIt may also make the\nfoe flinch or freeze."
    fr: "Le lanceur utilise\nune morsure\nglaciale. Peut aussi\ngeler ou apeurer\nl’ennemi."
    it: "Chi la usa morde con\ndenti ghiacciati che\npossono anche con-\ngelare o far tenten-\nnare il nemico."
    de: "Anwender beißt mit\neiskalten Reißzähnen\nzu. Gegner schreckt\neventuell zurück oder\nfriert fest."
    es: "Usa colmillos\nhelados para morder.\nPuede hacer que el\nrival retroceda o\nse congele."
    ko: "냉기를 품은\n이빨로 문다.\n상대를 풀죽게\n하거나 얼음 상태로\n만들 때가 있다."
ice_punch:
  names:
    jp_kana: れいとうパンチ
    en: Ice Punch
    fr: Poinglace
    it: Gelopugno
    de: Eishieb
    es: Puño Hielo
    ko: 냉동펀치
  descriptions:
    jp_kana: "れいきを　こめた\nパンチで　あいてを\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "The foe is punched\nwith an icy fist.\nIt may leave the\ntarget frozen."
    fr: "Un coup de poing glacé\nvient frapper\nl’ennemi. Peut le\ngeler."
    it: "Colpisce il nemico con\nun pugno di ghiaccio\nche può congelarlo."
    de: "Ein Schlag, der\nden Gegner\neventuell einfriert."
    es: "Puñetazo helado.\nPuede congelar."
    ko: "냉기를 담은\n펀치로 상대를\n공격한다.\n얼음 상태가\n되는 경우가 있다."
ice_shard:
  names:
    jp_kana: こおりのつぶて
    en: Ice Shard
    fr: Eclats Glace
    it: Geloscheggia
    de: Eissplitter
    es: Canto Helado
    ko: 얼음뭉치
  descriptions:
    jp_kana: "こおりの　かたまりを\nいっしゅんで　つくり\nすばやく　はなつ。\nかならず　せんせい\nこうげき　できる。"
    en: "The user flash\nfreezes chunks of\nice and hurls them.\nThis move always goes\nfirst."
    fr: "Le lanceur crée des\néclats de glace qu’il\nenvoie sur l’ennemi.\nFrappe toujours en\npremier."
    it: "Chi la usa crea dei\npezzi di ghiaccio e\nli lancia. Con questa\nmossa si colpisce\nper primi."
    de: "Gegner wird mit\nEisklumpen beworfen.\nDiese Attacke hat\nErstschlaggarantie."
    es: "Crea bolas de hielo\ny las lanza a gran\nvelocidad. Este\nmovimiento siempre\nva primero."
    ko: "얼음 덩어리를\n순식간에 만들어\n빠르게 쏜다.\n반드시 선제\n공격을 할 수 있다."
icicle_spear:
  names:
    jp_kana: つららばり
    en: Icicle Spear
    fr: Stalagtite
    it: Gelolancia
    de: Eisspeer
    es: Carámbano
    ko: 고드름침
  descriptions:
    jp_kana: "するどい　つららを\nあいてに　はっしゃして\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The user launches\nsharp icicles at the\nfoe. It strikes two\nto five times in a\nrow."
    fr: "Le lanceur jette des\npics de glace sur\nl’ennemi, de 2 à 5\nfois de suite."
    it: "Chi la usa spara\naffilati ghiaccioli\nal nemico per 2-\n5 volte di fila."
    de: "Feuert zwei bis\nfünf Eiszapfen auf\nden Gegner."
    es: "Ataca lanzando\nde 2 a 5 ráfagas\nconsecutivas\nde carámbanos."
    ko: "날카로운 고드름을\n상대에게 발사하여\n공격한다.\n2-5회 동안\n연속으로 쓴다."
icy_wind:
  names:
    jp_kana: こごえるかぜ
    en: Icy Wind
    fr: Vent Glace
    it: Ventogelato
    de: Eissturm
    es: Viento Hielo
    ko: 얼다바람
  descriptions:
    jp_kana: "つめたい　れいきを\nあいてに　ふきつけて\nこうげきする。\nどうじに　あいての\nすばやさを　さげる。"
    en: "The user attacks with\na gust of chilled air.\nIt also lowers the\ntarget’s Speed stat."
    fr: "Une bourrasque de\nvent froid blesse\nl’ennemi. Réduit aussi\nsa Vitesse."
    it: "Chi la usa attacca\nil nemico con una\nfolata di aria gelida\ne ne riduce anche\nla Velocità."
    de: "Eis-Attacke, die\nden Initiative-Wert\ndes Gegners senkt."
    es: "Ataque con aire\nhelado que baja\nla Velocidad."
    ko: "차가운 냉기를\n상대에게 내뿜어\n공격한다.\n동시에 상대의\n스피드를 떨어뜨린다."
imprison:
  names:
    jp_kana: ふういん
    en: Imprison
    fr: Possessif
    it: Esclusiva
    de: Begrenzer
    es: Cerca
    ko: 봉인
  descriptions:
    jp_kana: "あいてが　じぶんと\nおなじ　わざを\nおぼえていたら\nあいてだけ　そのわざを\nつかえなく　する。"
    en: "If the foe knows any\nmove also known by\nthe user, the foe\nis prevented\nfrom using it."
    fr: "Si l’ennemi et le\nlanceur ont des\ncapacités en commun,\nl’ennemi ne pourra\npas les utiliser."
    it: "Se il nemico conosce\nuna qualsiasi delle\nmosse di chi la usa,\nnon può usare quella\nmossa."
    de: "Hindert Gegner am\nEinsatz von\nAttacken, die der\nAnwender kennt."
    es: "Impide al rival usar\nataques conocidos\npor el usuario."
    ko: "상대가 자신과\n같은 기술을\n기억하고 있으면\n상대만 그 기술을\n사용할 수 없게 한다."
ingrain:
  names:
    jp_kana: ねをはる
    en: Ingrain
    fr: Racines
    it: Radicamento
    de: Verwurzler
    es: Arraigo
    ko: 뿌리박기
  descriptions:
    jp_kana: "だいちに　ねを　はり\nまいターン　ＨＰを\nかいふくする。\nねを　はっているので\nいれかえられない。"
    en: "The user lays roots\nthat restore HP on\nevery turn.\nBecause it is rooted,\nit can’t switch out."
    fr: "Le lanceur plante ses\nracines et récupère\ndes PV à chaque tour.\nUne fois enraciné, il\nne peut plus fuir."
    it: "Chi la usa mette delle\nradici che gli fanno\nrecuperare PS ad\nogni turno. Non può\nessere sostituito."
    de: "Verwurzelung füllt\njede Runde KP auf.\nAustausch ist\nunmöglich."
    es: "Echa raíces para\nrecuperar PS en\ncada turno, pero\nimpide el relevo."
    ko: "대지에 뿌리를 박아\n매 턴마다 HP를\n회복한다.\n뿌리 박고 있으므로\n교체할 수 없다."
iron_defense:
  names:
    jp_kana: てっぺき
    en: Iron Defense
    fr: Mur de Fer
    it: Ferroscudo
    de: Eisenabwehr
    es: Def. Férrea
    ko: 철벽
  descriptions:
    jp_kana: "ひふを　てつのように\nかたくする　ことで\nじぶんの　ぼうぎょを\nぐーんと　あげる。"
    en: "The user hardens\nits body’s surface\nlike iron, sharply\nraising its Defense\nstat."
    fr: "L’épiderme du lanceur\ndevient dur comme du\nfer, ce qui augmente\nconsidérablement\nsa Défense."
    it: "Chi la usa indurisce\nil proprio corpo come\nil ferro, facendo\nsalire di molto la\nsua Difesa."
    de: "Anwender stärkt\nden Körper, um den\nVerteidigungs-Wert\ndeutlich zu erhöhen."
    es: "Fortalece el cuerpo\ncomo si fuera hierro\ny sube mucho la\nDefensa."
    ko: "피부를 쇠처럼\n단단하게 함으로써\n자신의 방어를\n크게 올린다."
iron_head:
  names:
    jp_kana: アイアンヘッド
    en: Iron Head
    fr: Tête de Fer
    it: Metaltestata
    de: Eisenschädel
    es: Cabezahierro
    ko: 아이언헤드
  descriptions:
    jp_kana: "はがねの　ような\nかたい　あたまで\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The foe slams the\ntarget with its\nsteel-hard head.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur heurte\nl’ennemi avec sa tête\ndure comme de l’acier.\nPeut aussi apeurer\nl’ennemi."
    it: "Chi la usa colpisce\nil nemico con la sua\ntesta dura come\nl’acciaio. Può anche\nfarlo tentennare."
    de: "Gegner wird durch\nstahlharten Kopf des\nAnwenders getroffen\nund schreckt\neventuell zurück."
    es: "Ataca con su dura\ncabeza de hierro.\nPuede hacer que el\nrival retroceda."
    ko: "강철과 같은\n단단한 머리로\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
iron_tail:
  names:
    jp_kana: アイアンテール
    en: Iron Tail
    fr: Queue de Fer
    it: Codacciaio
    de: Eisenschweif
    es: Cola Férrea
    ko: 아이언테일
  descriptions:
    jp_kana: "かたい　しっぽで\nあいてを　たたきつけて\nこうげきする。\nあいての　ぼうぎょを\nさげることが　ある。"
    en: "The foe is slammed\nwith a steel-hard\ntail. It may also\nlower the target’s\nDefense stat."
    fr: "Attaque l’ennemi avec\nune queue de fer.\nPeut aussi baisser la\nDéfense de l’ennemi."
    it: "Il nemico viene colpito\nda una robusta coda\nd’acciaio. Può anche\nridurne la Difesa."
    de: "Attacke mit hartem\nEisenschweif.\nSenkt eventuell den\nVerteidigungs-Wert\ndes Gegners."
    es: "Ataca con una cola\nférrea y puede bajar\nla Defensa."
    ko: "단단한 꼬리로\n상대를 힘껏 쳐서\n공격한다.\n상대의 방어를\n떨어뜨릴 때가 있다."
judgment:
  names:
    jp_kana: さばきのつぶて
    en: Judgment
    fr: Jugement
    it: Giudizio
    de: Urteilskraft
    es: Sentencia
    ko: 심판의뭉치
  descriptions:
    jp_kana: "むすうの　こうだんを\nほうしゅつする。\nじぶんの　もつ\nプレートに　より\nタイプが　かわる。"
    en: "The user releases\ncountless shots of\nlight. Its type varies\nwith the kind of Plate\nthe user is holding."
    fr: "Le lanceur libère une\nmyriade de rayons de\nlumière. Le type\nvarie selon la Plaque\nque tient le lanceur."
    it: "Chi la usa rilascia\nnumerosi colpi di\nluce. Il tipo varia a\nseconda della Lastra\ntenuta."
    de: "Anwender feuert\nunzählige Licht-\nstrahlen ab. Deren\nTyp hängt von der\ngehaltenen Tafel ab."
    es: "Emite incontables\nhaces de luz. Varía\nsegún el tipo de tabla\nque lleve el usuario."
    ko: "무수한 광탄을\n방출한다.\n자신이 가지고 있는\n플레이트에 따라\n타입이 바뀐다."
jump_kick:
  names:
    jp_kana: とびげり
    en: Jump Kick
    fr: Pied Sauté
    it: Calciosalto
    de: Sprungkick
    es: Patada Salto
    ko: 점프킥
  descriptions:
    jp_kana: "たかい　ジャンプからの\nキックで　あいてを\nこうげきする。\nはずすと　じぶんが\nダメージを　うける。"
    en: "The user jumps up\nhigh, then strikes\nwith a kick. If the\nkick misses, the\nuser hurts itself."
    fr: "Le lanceur s’envole\npour décocher un\ncoup de pied sauté.\nS’il échoue, le\nlanceur se blesse."
    it: "Permette di saltare in\nalto per attaccare\ncon un calcio. Se non\nva a buon fine, chi la\nusa si ferisce."
    de: "Der Angreifer hüpft\nhoch und tritt zu.\nBei Misserfolg\nSelbstschädigung."
    es: "Da un salto y pega\nuna patada. Si falla,\nse autolesiona."
    ko: "높이 점프해서\n킥으로 상대를\n공격한다.\n빗나가면 자신이\n데미지를 입는다."
karate_chop:
  names:
    jp_kana: からてチョップ
    en: Karate Chop
    fr: Poing-Karaté
    it: Colpokarate
    de: Karateschlag
    es: Golpe Karate
    ko: 태권당수
  descriptions:
    jp_kana: "するどい　チョップで\nあいてを　たたいて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is attacked\nwith a sharp chop.\nIt has a high\ncritical-hit ratio."
    fr: "L’ennemi est tranché\nviolemment. Taux de\ncritiques élevé."
    it: "Colpisce il nemico\ncon un colpo netto.\nProbabile brutto\ncolpo."
    de: "Gute Möglichkeit,\neinen Volltreffer\nzu landen."
    es: "Da un golpe cortante.\nSuele ser crítico."
    ko: "날카로운 당수로\n상대를 때려서\n공격한다.\n급소에 맞을\n확률이 높다."
kinesis:
  names:
    jp_kana: スプーンまげ
    en: Kinesis
    fr: Télékinésie
    it: Cinèsi
    de: Psykraft
    es: Kinético
    ko: 숟가락휘기
  descriptions:
    jp_kana: "スプーンを　まげて\nちゅういを　ひき\nあいての　ポケモンの\nめいちゅうりつを\nさげる。"
    en: "The user distracts\nthe foe by bending a\nspoon.\nIt may lower the\ntarget’s accuracy."
    fr: "Le lanceur distrait\nl’ennemi en pliant\nune cuillère. Peut\nbaisser la précision\nde l’ennemi."
    it: "Chi la usa distrae\nil nemico piegando\nun cucchiaio. Può\nridurne la precisione."
    de: "Lenkt Gegner durch\nVerbiegen eines\nLöffels ab. Senkt\neventuell die gegn.\nGenauigkeit."
    es: "Dobla una cuchara\npara distraer al rival\ny bajar su nivel de\nprecisión."
    ko: "숟가락을 휘고\n주의를 끌어\n상대 포켓몬의\n명중률을\n낮춘다."
knock_off:
  names:
    jp_kana: はたきおとす
    en: Knock Off
    fr: Sabotage
    it: Privazione
    de: Abschlag
    es: Desarme
    ko: 탁쳐서떨구기
  descriptions:
    jp_kana: "あいての　もちものを\nはたき　おとして\nせんとうが　おわるまで\nつかえなく　する。"
    en: "The user slaps down\nthe foe’s held item,\npreventing the item\nfrom being used\nduring the battle."
    fr: "Le lanceur fait\ntomber l’objet tenu\npar l’ennemi pour\nle rendre inutilisable\ndurant le combat."
    it: "Blocca lo strumento\ntenuto dal nemico,\nimpedendone l’uso\nnella lotta."
    de: "Schlägt Gegner\nItem weg. Vereitelt\nso den Gebrauch\nwährend d. Kampfes."
    es: "Impide al rival usar\nel objeto que lleva\ndurante el combate."
    ko: "상대의 지닌 물건을\n탁 쳐서 떨어뜨려\n배틀이 끝날 때까지\n사용할 수 없게 한다."
last_resort:
  names:
    jp_kana: とっておき
    en: Last Resort
    fr: Dernierecour
    it: Ultimascelta
    de: Zuflucht
    es: Última Baza
    ko: 뒀다쓰기
  descriptions:
    jp_kana: "せんとうちゅうに\nおぼえている　わざを\nすべて　つかうと\nはじめて　だせる\nとっておきの　わざ。"
    en: "This move can be used\nonly after the user\nhas used all the\nother moves it knows\nin the battle."
    fr: "Cette capacité ne\npeut être utilisée\nqu’après que le\nlanceur a utilisé\ntoutes les autres."
    it: "Per usare questa\nmossa, bisogna prima\navvalersi in lotta di\ntutte le altre mosse\nconosciute."
    de: "Diese Attacke kann\nnur ausgeführt\nwerden, nachdem alle\nverfügbaren Attacken\nausgeführt wurden."
    es: "Este movimiento solo\npuede usarse tras\nhaber usado todos\nlos demás conocidos\npor el Pokémon."
    ko: "배틀 중에\n기억하고 있는 기술을\n모두 사용하면\n그때부터 쓸 수 있는\n필살기이다."
lava_plume:
  names:
    jp_kana: ふんえん
    en: Lava Plume
    fr: Ebullilave
    it: Lavasbuffo
    de: Flammensturm
    es: Humareda
    ko: 분연
  descriptions:
    jp_kana: "まっかな　ほのおで\nまわりに　いるものを\nすべて　こうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "An inferno of scarlet\nflames washes over\nall Pokémon in battle.\nIt may also inflict\nburns."
    fr: "Des boules de feu\ns’abattent sur tous\nles autres Pokémon au\ncombat. Peut aussi\nbrûler."
    it: "Chi la usa lancia\nfiamme scarlatte\nsugli altri Pokémon\nin campo. Può anche\nscottare."
    de: "Ein Flammeninferno\nfegt über im Kampf\nbefindliche PKMN. Kann\nVerbrennungen erzeu-\ngen (außer bei Anw.)."
    es: "Un infierno de llamas\ndaña a los demás\nPokémon en combate.\nPuede quemar."
    ko: "새빨간 불꽃으로\n주위에 있는\n모두를 공격한다.\n화상 상태로\n만들 때가 있다."
leaf_blade:
  names:
    jp_kana: リーフブレード
    en: Leaf Blade
    fr: Lame-Feuille
    it: Fendifoglia
    de: Laubklinge
    es: Hoja Aguda
    ko: 리프블레이드
  descriptions:
    jp_kana: "とがった　はっぱで\nあいてを　きりつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is slashed\nwith a sharp leaf.\nIt has a high\ncritical-hit ratio."
    fr: "Une feuille coupante\nentaille l’ennemi. Taux\nde critiques élevé."
    it: "Colpisce il nemico\ncon una foglia\naffilata. Probabile\nbrutto colpo."
    de: "Hieb mit\nscharfkantigem\nBlatt. Hohe\nVolltrefferquote."
    es: "Acuchilla con una\nhoja fina. Suele dar\nun golpe crítico."
    ko: "뾰족한 잎사귀로\n상대를 베어\n공격한다.\n급소에 맞을\n확률이 높다."
leaf_storm:
  names:
    jp_kana: リーフストーム
    en: Leaf Storm
    fr: Tempêteverte
    it: Verdebufera
    de: Blättersturm
    es: Lluevehojas
    ko: 리프스톰
  descriptions:
    jp_kana: "とがった　はっぱで\nあらしを　おこす。\nつかうと　はんどうで\nじぶんの　とくこうが\nがくっと　さがる。"
    en: "A storm of sharp\nleaves is whipped up.\nThe attack’s recoil\nsharply reduces the\nuser’s Sp. Atk stat."
    fr: "Invoque une tempête\nde feuilles acérées.\nLe contrecoup réduit\nfortement l’Atq.\nSpé. du lanceur."
    it: "Si forma una tempesta\ndi foglie affilate. Il\ncontraccolpo riduce\ndi molto l’Att. Sp. di\nchi la usa."
    de: "Anw. erzeugt einen\nSturm von scharfen\nBlättern. Rückstoß\nsenkt Spez.-Angriff\ndes Anwenders."
    es: "Cae una lluvia de\nhojas afiladas. Baja\nmucho el At. Esp.\nde quien lo usa."
    ko: "뾰족한 잎사귀로\n바람을 일으킨다.\n사용하면 반동으로\n자신의 특수공격이\n크게 떨어진다."
leech_life:
  names:
    jp_kana: きゅうけつ
    en: Leech Life
    fr: Vampirisme
    it: Sanguisuga
    de: Blutsauger
    es: Chupavidas
    ko: 흡혈
  descriptions:
    jp_kana: "ちを　すいとって\nこうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを\nかいふくできる。"
    en: "A blood-draining\nattack. The user’s\nHP is restored by\nhalf the damage taken\nby the target."
    fr: "Une attaque qui aspire\nle sang de l’ennemi.\nLa moitié des dégâts\nsont convertis en\nPV pour le lanceur."
    it: "Mossa succhia-sangue.\nChi la usa recupera\nuna quantità di PS\npari alla metà del\ndanno inferto."
    de: "Die Hälfte des\nzugefügten Schadens\nwird dem Anwender\ngutgeschrieben."
    es: "Restaura al usuario\nla mitad del daño\ncausado al rival."
    ko: "피를 빨아서\n공격한다.\n준 데미지의\n절반을 HP로\n회복한다."
leech_seed:
  names:
    jp_kana: やどりぎのタネ
    en: Leech Seed
    fr: Vampigraine
    it: Parassiseme
    de: Egelsamen
    es: Drenadoras
    ko: 씨뿌리기
  descriptions:
    jp_kana: "うえつけた　あいての\nＨＰを　まいターン\nすこしだけ　すいとり\nじぶんの　ＨＰを\nかいふくする。"
    en: "A seed is planted on\nthe foe. It steals\nsome HP from the foe\nto heal the user on\nevery turn."
    fr: "Une graine est semée\nsur l’ennemi. A chaque\ntour, elle lui dérobe\ndes PV que le lanceur\nrécupère."
    it: "Vengono piantati semi\nsul nemico. Questi\nsottraggono PS a ogni\nturno permettendo a\nchi la usa di curarsi."
    de: "Gegner wird bepflanzt\nund verliert jede\nRunde KP, die wiederum\nden Anwender heilen."
    es: "Planta tres semillas\nque absorben PS\nen cada turno."
    ko: "씨가 뿌려진 상대의\nHP를 매 턴\n조금씩 흡수하여\n자신의 HP를\n회복한다."
leer:
  names:
    jp_kana: にらみつける
    en: Leer
    fr: Groz’Yeux
    it: Fulmisguardo
    de: Silberblick
    es: Malicioso
    ko: 째려보기
  descriptions:
    jp_kana: "するどい　めつきで\nおびえさせて　あいての\nぼうぎょを　さげる。"
    en: "The foe is given an\nintimidating leer with\nsharp eyes.\nThe target’s Defense\nstat is reduced."
    fr: "Le lanceur fait les\ngros yeux à l’ennemi\npour l’intimider et\nbaisser sa Défense."
    it: "Colpisce il nemico\ncon uno sguardo\nfulminante che ne\nriduce la Difesa."
    de: "Gegnerischer\nVerteidigungs-Wert\nwird durch Angst\neinflößenden Blick\ngesenkt."
    es: "Intimida al enemigo\npara bajar su\nDefensa."
    ko: "날카로운 눈초리로\n겁을 주어\n상대의 방어를\n떨어뜨린다."
lick:
  names:
    jp_kana: したでなめる
    en: Lick
    fr: Léchouille
    it: Leccata
    de: Schlecker
    es: Lengüetazo
    ko: 핥기
  descriptions:
    jp_kana: "ながい　したで\nあいてを　なめまわして\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The foe is licked with\na long tongue, causing\ndamage.\nIt may also paralyze\nthe target."
    fr: "Un grand coup de\nlangue qui inflige des\ndégâts à l’ennemi.\nPeut aussi le\nparalyser."
    it: "Una lingua lunga\ninfligge danni al\nnemico e può\nanche paralizzarlo."
    de: "Leck-Attacke mit\nlanger Zunge. Der\nGegner wird eventuell\nparalysiert."
    es: "Usa la lengua para\natacar. Puede causar\nparálisis."
    ko: "긴 혀로\n상대를 핥아서\n공격한다.\n마비 상태로\n만들 때가 있다."
light_screen:
  names:
    jp_kana: ひかりのかべ
    en: Light Screen
    fr: Mur Lumière
    it: Schermoluce
    de: Lichtschild
    es: Pantalla Luz
    ko: 빛의장막
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　かべで\nあいてから　うける\nとくしゅ　こうげきの\nダメージを　よわめる。"
    en: "A wondrous wall of\nlight is put up to\nsuppress damage from\nspecial attacks for\nfive turns."
    fr: "Un fabuleux mur de\nlumière qui réduit les\ndégâts causés par les\nattaques spéciales\ndurant 5 tours."
    it: "Innalza una barriera\ndi luce meravigliosa\nper ridurre i danni\ndegli Attacchi Speciali\nper 5 turni."
    de: "Erzeugt Lichtwand\nund senkt Schaden\ndurch Spezial-Angriffe\nfür fünf Runden."
    es: "Pared de luz que\nreduce durante\n5 turnos el daño\nproducido por los\nataques especiales."
    ko: "5턴 동안 \n이상한 장막으로\n상대로부터 받는\n특수공격의 데미지를\n약하게 한다."
lock_on:
  names:
    jp_kana: ロックオン
    en: Lock-On
    fr: Verrouillage
    it: Localizza
    de: Zielschuss
    es: Fijar Blanco
    ko: 록온
  descriptions:
    jp_kana: "しょうじゅんを\nしっかり　あわせて\nつぎの　こうげきが\nかならず　あいてに\nあたるように　する。"
    en: "The user takes sure\naim at the foe.\nIt ensures the next\nattack does not fail\nto hit the target."
    fr: "Verrouille l’ennemi\npour ne pas le rater\nau tour suivant."
    it: "Chi la usa punta il\nnemico con precisione.\nLa mossa successiva\nandrà a segno."
    de: "Visiert Gegner an\nund trifft in der\nnächsten Runde\ngarantiert."
    es: "Fija el blanco para\nque el siguiente\nataque no falle."
    ko: "조준을\n잘 맞춰\n다음 공격이\n반드시 상대에게\n명중하도록 한다."
lovely_kiss:
  names:
    jp_kana: あくまのキッス
    en: Lovely Kiss
    fr: Grobisou
    it: Demonbacio
    de: Todeskuss
    es: Beso Amoroso
    ko: 악마의키스
  descriptions:
    jp_kana: "おそろしい　かおで\nキスを　せまる。\nキスした　あいてを\nねむり　じょうたいに\nすることが　できる。"
    en: "With a scary face,\nthe user forces a\nkiss on the foe.\nIt may make the\ntarget fall asleep."
    fr: "Le lanceur fait un\nbisou à l’ennemi en\nprenant une mine\neffrayante. Peut\nendormir l’ennemi."
    it: "Chi la usa dà un bacio\nal nemico minaccian-\ndolo con una brutta\nfaccia e può farlo\naddormentare."
    de: "Anwender zwingt\ndem Gegner einen\nKuss auf, der\neventuell Schlaf\nverursacht."
    es: "Pide un beso con\nuna cara que asusta\ny adormece."
    ko: "무서운 얼굴로\n키스한다.\n키스한 상대를\n잠듦 상태로\n만들 수 있다."
low_kick:
  names:
    jp_kana: けたぐり
    en: Low Kick
    fr: Balayage
    it: Colpo Basso
    de: Fußkick
    es: Patada Baja
    ko: 안다리걸기
  descriptions:
    jp_kana: "あしを　つよく　けり\nあいてを　ころばせて\nこうげきする。\nあいてが　おもいほど\nいりょくが　あがる。"
    en: "A powerful low kick\nthat makes the foe\nfall over. It inflicts\ngreater damage on\nheavier foes."
    fr: "Un puissant coup de\npied bas qui fauche\nl’ennemi. Il est plus\nefficace contre les\nennemis lourds."
    it: "Un calcio basso e\npotente che fa\ncadere il nemico.\nDanneggia di più i\nnemici più pesanti."
    de: "Tritt, der Gegner\numwirft und massigen\nGegnern schweren\nSchaden zufügt."
    es: "Patada baja.\nCuanto más pesa\nel enemigo, más\ndaño causa."
    ko: "발을 강하게 걸고\n상대를 굴려\n공격한다.\n상대가 무거울수록\n위력이 올라간다."
lucky_chant:
  names:
    jp_kana: おまじない
    en: Lucky Chant
    fr: Air Veinard
    it: Fortuncanto
    de: Beschwörung
    es: Conjuro
    ko: 주술
  descriptions:
    jp_kana: "てんに　むかって\nおいのりを　ささげ\nあいての　こうげきを\nきゅうしょに\nあたらなくする。"
    en: "The user chants an\nincantation toward\nthe sky, preventing\nthe foe from landing\ncritical hits."
    fr: "Le lanceur envoie une\nincantation vers le\nciel pour empêcher\nl’ennemi d’effectuer\ndes coups critiques."
    it: "Chi la usa intona una\nformula magica rivolta\nal cielo, impedendo al\nnemico di sferrare\nbrutti colpi."
    de: "Anwender singt eine\nBeschwörungsformel\nund verhindert, Opfer\neines Volltreffers zu\nwerden."
    es: "Lanza al cielo un\nconjuro que impide\nal rival asestar\ngolpes críticos."
    ko: "하늘을 향해\n기도를 올려\n상대의 공격을\n급소에\n맞지 않게 한다."
lunar_dance:
  names:
    jp_kana: みかづきのまい
    en: Lunar Dance
    fr: Danse-Lune
    it: Lunardanza
    de: Lunartanz
    es: Danza Lunar
    ko: 초승달춤
  descriptions:
    jp_kana: "じぶんは　ひんしに\nなるが　ひかえから\nでてくる　ポケモンの\nすべての　じょうたいを\nぜんかいふく　する。"
    en: "The user faints. In\nreturn, the Pokémon\ntaking its place will\nhave its status and\nHP fully restored."
    fr: "Le lanceur tombe\nK.O. pour soigner le\nstatut et les PV du\nPokémon qui passe\naprès lui."
    it: "Chi la usa va KO.\nIl Pokémon che lo\nsostituisce recupera\ntutti i PS e i problemi\ndi stato si risolvono."
    de: "Anwender geht K.O.\nDas an seine Stelle\ntretende Pokémon\nhat volle KP. Status-\nprobl. werden geheilt."
    es: "El usuario se debilita,\npero el Pokémon que\nlo sustituye recupera\nsu estado y los PS."
    ko: "자신은 기절하지만\n교대하여 나오는\n포켓몬의\n모든 상태를\n전부 회복한다."
luster_purge:
  names:
    jp_kana: ラスターパージ
    en: Luster Purge
    fr: Lumi-Eclat
    it: Abbagliante
    de: Scheinwerfer
    es: Resplandor
    ko: 라스트버지
  descriptions:
    jp_kana: "まばゆい　ひかりを\nかいほうして\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user looses a\ndamaging burst of\nlight. It may also\nreduce the target’s\nSp. Def stat."
    fr: "Le lanceur libère un\néclair lumineux. Peut\naussi baisser la Déf.\nSpé. de l’ennemi."
    it: "Chi la usa scatena\nun’esplosione abba-\ngliante che può\nridurre la Dif. Sp.\ndel Pokémon colpito."
    de: "Angriff mit grellem\nLicht, der die\nSpezial-Verteidigung\neventuell senkt."
    es: "Fogonazo de luz\nque puede bajar\nla Def. Esp."
    ko: "눈부신 빛을\n개방하여\n공격한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
mach_punch:
  names:
    jp_kana: マッハパンチ
    en: Mach Punch
    fr: Mach Punch
    it: Pugnorapido
    de: Tempohieb
    es: Ultrapuño
    ko: 마하펀치
  descriptions:
    jp_kana: "めにも　とまらない\nものすごい　はやさで\nパンチを　くりだす。\nかならず　せんせい\nこうげき　できる。"
    en: "The user throws a\npunch at blinding\nspeed.\nIt is certain to\nstrike first."
    fr: "Coup de poing\nfulgurant. Frappe en\npremier."
    it: "Chi la usa tira un\npugno a velocità\nimpressionante e\ncolpisce di sicuro\nper primo."
    de: "Extrem schneller\nHieb, der stets\nzuerst trifft."
    es: "Puñetazo que se da\nrápido para golpear\nprimero."
    ko: "눈에 보이지 않는\n굉장한 속도로\n펀치를 날린다.\n반드시 선제\n공격을 할 수 있다."
magic_coat:
  names:
    jp_kana: マジックコート
    en: Magic Coat
    fr: Reflet Magik
    it: Magivelo
    de: Magiemantel
    es: Capa Mágica
    ko: 매직코트
  descriptions:
    jp_kana: "じょうたい　いじょうや\nのうりょくを　さげる\nわざ　やどりぎのタネ\nなどを　だされたとき\nあいてに　はねかえす。"
    en: "A barrier reflects\nback to the foe\nmoves like Leech\nSeed and moves\nthat damage status."
    fr: "Une barrière qui \nrenvoie les capacités\ncomme Vampigraine et\ncelles affectant le\nstatut et les stats."
    it: "Una barriera rimanda\nal mittente l’effetto\ndi mosse come\nParassiseme e mosse\ndanneggia-stato."
    de: "Egelsamen und\njede Attacke mit\nstatusverändernden\nEffekten prallen ab."
    es: "Barrera capaz de\ndevolver al agresor\nmovimientos como\nDrenadoras y que\ndañan el estado."
    ko: "상태 이상이나\n능력을 떨어뜨리는\n기술, 씨뿌리기\n등을 썼을 때\n상대에게 되받아친다."
magical_leaf:
  names:
    jp_kana: マジカルリーフ
    en: Magical Leaf
    fr: Feuillemagik
    it: Fogliamagica
    de: Zauberblatt
    es: Hoja Mágica
    ko: 메지컬리프
  descriptions:
    jp_kana: "あいてを　ついせきする\nふしぎな　はっぱを\nまきちらす。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user scatters\ncurious leaves that\nchase the foe.\nThis attack will not\nmiss."
    fr: "Le lanceur disperse\nd’étranges feuilles\nqui poursuivent\nl’ennemi. N’échoue\njamais."
    it: "Chi la usa sparpaglia\nstrane foglie che\ninseguono il nemico.\nAttacco infallibile."
    de: "Magischer Blatt-\nangriff, dem nicht\nauszuweichen ist."
    es: "Esparce extrañas\nhojas que persiguen\nal enemigo. No\nse puede esquivar."
    ko: "상대를 추적하는\n이상한 잎사귀를\n흩뿌린다.\n공격은 반드시\n명중한다."
magma_storm:
  names:
    jp_kana: マグマストーム
    en: Magma Storm
    fr: Vortex Magma
    it: Magmaclisma
    de: Lavasturm
    es: Lluvia Ígnea
    ko: 마그마스톰
  descriptions:
    jp_kana: "はげしく　もえたぎる\nほのおの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめて\nこうげきする。"
    en: "The foe becomes\ntrapped within a\nmaelstrom of fire\nthat rages for two\nto five turns."
    fr: "L’ennemi est pris\ndans un tourbillon\nde feu qui dure de\n2 à 5 tours."
    it: "Intrappola il nemico\nin un turbine di\nfuoco che dura\nper 2-5 turni."
    de: "Gegner wird in\neinen Feuersog\ngezogen, der zwei\nbis fünf Runden\naktiv ist."
    es: "El rival queda\natrapado en una\ntormenta de fuego\nque dura de dos\na cinco turnos."
    ko: "세차게 타오르는\n불꽃 속에\n2-5턴 동안\n상대를 가두어\n공격한다."
magnet_bomb:
  names:
    jp_kana: マグネットボム
    en: Magnet Bomb
    fr: Bombaimant
    it: Bombagnete
    de: Magnetbombe
    es: Bomba Imán
    ko: 마그넷봄
  descriptions:
    jp_kana: "あいてに　すいつく\nはがねの　ばくだんを\nはっしゃする。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user launches a\nsteel bomb that\nsticks to the target.\nThis attack will not\nmiss."
    fr: "Le lanceur projette\ndes bombes d’acier\nqui collent à l’ennemi.\nN’échoue jamais."
    it: "Chi la usa lancia\nbombe d’acciaio\nche si attaccano\nal nemico. Una\nmossa infallibile."
    de: "Ziel wird durch eine\nHaftbombe getroffen.\nDiese Attacke trifft\nimmer."
    es: "Lanza una bomba de\nhierro que se pega\nal adversario. No se\npuede esquivar."
    ko: "상대에게 달라붙는\n강철의 폭탄을\n발사한다.\n공격은 반드시\n명중한다."
magnet_rise:
  names:
    jp_kana: でんじふゆう
    en: Magnet Rise
    fr: Vol Magnétik
    it: Magnetascesa
    de: Magnetflug
    es: Levitón
    ko: 전자부유
  descriptions:
    jp_kana: "でんきで　つくった\nじりょくの　ちからで\nちゅうに　うかぶ。\n５ターンの　あいだ\nふゆう　できる。"
    en: "The user levitates\nusing electrically\ngenerated magnetism\nfor five turns."
    fr: "Le lanceur lévite en\nutilisant l’électricité\npour générer un\nchamp magnétique\ndurant 5 tours."
    it: "Chi la usa si solleva\nin aria per 5 turni\ngrazie a un campo\nelettromagnetico."
    de: "Anwender schwebt\nfür fünf Runden\ndurch elektrisch\nerzeugten\nMagnetismus."
    es: "Levita gracias a un\ncampo magnético\ngenerado por\nelectricidad durante\n5 turnos."
    ko: "전기로 만든\n자력의 힘으로\n허공에 뜬다.\n5턴 동안\n부유할 수 있다."
magnitude:
  names:
    jp_kana: マグニチュード
    en: Magnitude
    fr: Ampleur
    it: Magnitudo
    de: Intensität
    es: Magnitud
    ko: 매그니튜드
  descriptions:
    jp_kana: "じめんを　ゆらして\nまわりに　いるものを\nすべて　こうげきする。\nわざの　いりょくは\nいろいろ　かわる。"
    en: "The user looses a\nground-shaking quake\naffecting everyone in\nbattle. Its power\nvaries."
    fr: "Un tremblement\nde terre d’intensité\nvariable qui affecte\ntous les autres\nPokémon au combat."
    it: "Chi la usa scatena\nun forte terremoto\nd’intensità variabile\nche danneggia gli altri\nPokémon in campo."
    de: "Erdbebenartiger\nAngriff von zufälliger\nStärke gegen alle\nstehenden PKMN\n(außer Anwender)."
    es: "Sacudida sísmica\nde intensidad\nvariable que afecta a\nlos demás Pokémon\nen combate."
    ko: "땅을 흔들어서\n주위에 있는\n모두를 공격한다.\n기술의 위력이\n여러모로 바뀐다."
me_first:
  names:
    jp_kana: さきどり
    en: Me First
    fr: Moi d’Abord
    it: Precedenza
    de: Egotrip
    es: Yo Primero
    ko: 선취
  descriptions:
    jp_kana: "いりょくを　あげて\nあいてが　だそうとする\nわざを　さきにだす。\nさきに　だせないと\nしっぱい　する。"
    en: "The user tries to cut\nahead of the foe to\nsteal and use the\nfoe’s intended move\nwith greater power."
    fr: "Le lanceur vole la\ncapacité prévue\npar l’ennemi et\nl’utilise avec une\npuissance accrue."
    it: "Chi la usa tenta di\nprecedere il nemico\nper rubare e usare\nla sua mossa con\nmaggiore potenza."
    de: "Anwender versucht,\nGegner zu übertölpeln\nund dessen Attacke\nmit größerer Kraft\nauszuführen."
    es: "Trata de adelantarse\nal movimiento que\npretende usar el rival\ny lo lanza primero\ncon más fuerza."
    ko: "위력을 올려\n상대가 쓰려고 하는\n기술을 먼저 쓴다.\n먼저 쓰지 않으면\n실패한다."
mean_look:
  names:
    jp_kana: くろいまなざし
    en: Mean Look
    fr: Regard Noir
    it: Malosguardo
    de: Horrorblick
    es: Mal de Ojo
    ko: 검은눈빛
  descriptions:
    jp_kana: "すいこまれる　ような\nくろい　まなざしで\nじっと　みつめて\nあいてを　せんとうから\nにげられなく　する。"
    en: "The user affixes the\nfoe with a dark,\narresting look.\nThe target becomes\nunable to flee."
    fr: "Le lanceur pétrifie\nl’ennemi en lui lançant\nun regard noir. Il\ndevient incapable de\ns’enfuir."
    it: "Attacca il nemico\ncon uno sguardo\noscuro e ammaliante,\nimpedendogli la fuga."
    de: "Böser Blick, der\ndie Flucht des\nGegners vereitelt."
    es: "Mal de ojo que\nimpide al rival huir\no pedir el relevo."
    ko: "빨려들어갈 것 같은\n까만 눈빛으로\n가만히 응시하여\n상대를 배틀에서\n도망갈 수 없게 한다."
meditate:
  names:
    jp_kana: ヨガのポーズ
    en: Meditate
    fr: Yoga
    it: Meditazione
    de: Meditation
    es: Meditación
    ko: 요가포즈
  descriptions:
    jp_kana: "ねむった　ちからを\nからだの　おくから\nひきだして　じぶんの\nこうげきを　あげる。"
    en: "The user meditates\nto awaken the power\ndeep within its body\nand raise its Attack\nstat."
    fr: "Le lanceur médite\npour éveiller son\npouvoir latent et\naugmenter son\nAttaque."
    it: "Chi la usa medita\nper risvegliare la\nforza del proprio\ncorpo e migliorare\nl’Attacco."
    de: "Friedliche Meditation,\num den Angriffs-Wert\nzu steigern."
    es: "El usuario reposa y\nmedita para potenciar\nel Ataque."
    ko: "잠자던 힘을\n몸속에서\n끌어내어 자신의\n공격을 올린다."
mega_drain:
  names:
    jp_kana: メガドレイン
    en: Mega Drain
    fr: Méga-Sangsue
    it: Megassorbim.
    de: Megasauger
    es: Megaagotar
    ko: 메가드레인
  descriptions:
    jp_kana: "ようぶんを　すいとり\nこうげきする。\nあたえた　ダメージの\nはんぶんの　ＨＰを\nかいふくできる。"
    en: "A nutrient-draining\nattack. The user’s\nHP is restored by\nhalf the damage taken\nby the target."
    fr: "Une attaque\nqui convertit la\nmoitié des dégâts\ninfligés en PV."
    it: "Mossa che assorbe\nPS. Chi la usa\nrecupera una quantità\ndi PS pari alla metà\ndel danno inferto."
    de: "Starke Attacke, die\ndie Hälfte des\nSchadens\nabsorbiert."
    es: "Absorbe la mitad\ndel daño producido."
    ko: "양분을 흡수하여\n공격한다.\n입힌 데미지의\n절반에 해당하는\nHP를 회복할 수 있다."
mega_kick:
  names:
    jp_kana: メガトンキック
    en: Mega Kick
    fr: Ultimawashi
    it: Megacalcio
    de: Megakick
    es: Megapatada
    ko: 메가톤킥
  descriptions:
    jp_kana: "ものすごい　ちからを\nこめた　キックで\nあいてを　けとばして\nこうげきする。"
    en: "The foe is attacked\nby a kick launched\nwith muscle-packed\npower."
    fr: "Un coup de pied\nsuperpuissant et\nintense qui frappe\nl’ennemi."
    it: "Colpisce il nemico con\nun calcio sferrato con\nla forza di muscoli\npoderosi."
    de: "Der Gegner wird\nmit einem extrem\nheftigen Tritt\nangegriffen."
    es: "Patada de extrema\nfuerza."
    ko: "굉장한 힘을\n담은 킥으로\n상대를 걷어차서\n공격한다."
mega_punch:
  names:
    jp_kana: メガトンパンチ
    en: Mega Punch
    fr: Ultimapoing
    it: Megapugno
    de: Megahieb
    es: Megapuño
    ko: 메가톤펀치
  descriptions:
    jp_kana: "ちからを　こめた\nパンチで　あいてを\nこうげきする。"
    en: "The foe is slugged\nby a punch thrown\nwith muscle-packed\npower."
    fr: "L’ennemi reçoit un\ncoup de poing d’une\npuissance incroyable."
    it: "Colpisce il nemico con\nun pugno tirato con\nla potenza di muscoli\npoderosi."
    de: "Ein unglaublich\nkräftiger Hieb."
    es: "Un puñetazo\nde gran potencia."
    ko: "힘을 담은\n펀치로 상대를\n공격한다."
megahorn:
  names:
    jp_kana: メガホーン
    en: Megahorn
    fr: Mégacorne
    it: Megacorno
    de: Vielender
    es: Megacuerno
    ko: 메가폰
  descriptions:
    jp_kana: "かたくて　りっぱな\nつので　おもいっきり\nあいてを　つきさして\nこうげきする。"
    en: "Utilizing its tough\nand impressive\nhorn, the user\nrams into the foe \nwith no letup."
    fr: "Le lanceur utilise ses\ngigantesques cornes\npour charger\nl’ennemi."
    it: "Chi la usa utilizza\nil suo robusto e\nimponente corno\nper colpire senza\nindugio il nemico."
    de: "Brutaler Rammangriff\nmit spitzem,\nbeeindruckendem\nHorn."
    es: "Violenta embestida\ncon cuernos\nimponentes."
    ko: "단단하고 훌륭한\n뿔로 마음껏\n상대를 꿰찔러서\n공격한다."
memento:
  names:
    jp_kana: おきみやげ
    en: Memento
    fr: Souvenir
    it: Memento
    de: Memento-Mori
    es: Legado
    ko: 추억의선물
  descriptions:
    jp_kana: "じぶんは　ひんしに\nなるが　そのかわりに\nあいての　こうげきと\nとくこうを　がくっと\nさげる。"
    en: "The user faints upon\nusing this move.\nIn return, it sharply\nlowers the target’s\nAttack and Sp. Atk."
    fr: "Le lanceur est mis\nK.O., mais l’Attaque\net l’Atq. Spé. de\nl’ennemi baissent\nbeaucoup."
    it: "Chi la usa va KO.\nTuttavia, riduce di\nmolto l’Attacco e\nl’Att. Sp. del nemico."
    de: "Der Anwender ist\nbesiegt und senkt\ndie gegnerischen\nWerte drastisch."
    es: "El usuario se debilita,\npero baja mucho el\nAtaque y el At. Esp.\ndel contrincante."
    ko: "자신은 기절하게\n되지만 그 대신\n상대의 공격과\n특수공격을 크게\n떨어뜨린다."
metal_burst:
  names:
    jp_kana: メタルバースト
    en: Metal Burst
    fr: Fulmifer
    it: Metalscoppio
    de: Metallstoß
    es: Repr. Metal
    ko: 메탈버스트
  descriptions:
    jp_kana: "わざを　だすまえに\nさいごに　うけた\nわざの　ダメージを\nおおきくして　だした\nあいてに　かえす。"
    en: "The user retaliates\nagainst the foe that\nlast inflicted damage\non it with much\ngreater power."
    fr: "Le lanceur attaque\nle dernier ennemi\nà l’avoir blessé en\nfrappant plus fort."
    it: "Chi la usa si scaglia\ncontro il nemico che\nper ultimo lo ha\nattaccato, usando\nancora più forza."
    de: "Attacke mit großer\nKraft gegen den\nGegner, der dem\nAnwender zuletzt\nSchaden verursachte."
    es: "Devuelve al enemigo\nel último ataque\nrecibido, pero con\nmucha más fuerza."
    ko: "기술을 쓰기 전에\n마지막으로 받은\n기술의 데미지를\n늘려서 기술을 쓴\n상대에게 돌려준다."
metal_claw:
  names:
    jp_kana: メタルクロー
    en: Metal Claw
    fr: Griffe Acier
    it: Ferrartigli
    de: Metallklaue
    es: Garra Metal
    ko: 메탈크로우
  descriptions:
    jp_kana: "こうてつの　ツメで\nあいてを　きりさいて\nこうげきする。\nじぶんの　こうげきが\nあがることが　ある。"
    en: "The foe is raked\nwith steel claws.\nIt may also raise the\nuser’s Attack stat."
    fr: "Attaque avec des\ngriffes d’acier. Peut\naussi augmenter\nl’Attaque du lanceur."
    it: "Colpisce il nemico\ncon artigli d’acciaio.\nPuò anche aumentare\nl’Attacco di chi\nla usa."
    de: "Klauen-Attacke, die\neventuell den\nAngriffs-Wert des\nAnwenders erhöht."
    es: "Ataque con garras\nde acero que puede\naumentar el Ataque."
    ko: "강철의 발톱으로\n상대를 베어 갈라\n공격한다.\n자신의 공격이\n올라갈 때도 있다."
metal_sound:
  names:
    jp_kana: きんぞくおん
    en: Metal Sound
    fr: Strido-Son
    it: Ferrostrido
    de: Metallsound
    es: Eco Metálico
    ko: 금속음
  descriptions:
    jp_kana: "きんぞくを　こすって\nでるような　いやな\nおとを　きかせる。\nあいての　とくぼうを\nがくっと　さげる。"
    en: "A horrible sound like\nscraping metal is\nemitted to sharply\nreduce the foe’s\nSp. Def stat."
    fr: "Un cri horrible pareil\nà un crissement \nmétallique qui\nréduit la Déf. Spé.\nde l’ennemi."
    it: "Orribile stridio come\nquello prodotto dal\nmetallo che riduce di\nmolto la Dif. Sp. del\nnemico."
    de: "Stößt einen spitzen\nSchrei aus, der die\nSpezial-Verteidigung\ndes Gegners senkt."
    es: "Horrible chirrido\nmetálico que baja\nmucho la Def. Esp."
    ko: "금속을 긁을 때\n나는 듯한 싫은\n소리를 들려준다.\n상대의 특수방어를\n크게 떨어뜨린다."
meteor_mash:
  names:
    jp_kana: コメットパンチ
    en: Meteor Mash
    fr: Poing Météor
    it: Meteorpugno
    de: Sternenhieb
    es: Puño Meteoro
    ko: 코멧펀치
  descriptions:
    jp_kana: "すいせいの　ごとく\nパンチを　くりだして\nこうげきする。\nじぶんの　こうげきが　\nあがることが　ある。"
    en: "The foe is hit with a\nhard punch fired\nlike a meteor.\nIt may also raise\nthe user’s Attack."
    fr: "Un coup de poing lancé\nà la vitesse d’un\nmétéore. Peut aussi\naugmenter l’Attaque\ndu lanceur."
    it: "Colpisce il nemico\ncon un pugno di\nfuoco simile a una\nmeteora. Può far\nsalire l’Attacco."
    de: "Angriff mit einem\nharten, schnellen\nSchlag. Erhöht\neventuell\nAngriffs-Wert."
    es: "Puñetazo que\nimpacta como un\nmeteorito y suele\nsubir el Ataque\ndel agresor."
    ko: "혜성과 같은\n펀치를 날려서\n공격한다.\n자신의 공격이\n올라갈 때가 있다."
metronome:
  names:
    jp_kana: ゆびをふる
    en: Metronome
    fr: Métronome
    it: Metronomo
    de: Metronom
    es: Metrónomo
    ko: 손가락흔들기
  descriptions:
    jp_kana: "ゆびをふり　じぶんの\nのうを　しげきして\nすべての　わざの\nなかから　どれか\n１つを　くりだす。"
    en: "The user waggles a\nfinger and stimulates\nthe brain into\nrandomly using nearly\nany move."
    fr: "Agite un doigt et\nstimule le cerveau\npour utiliser presque\nn’importe quelle\ncapacité au hasard."
    it: "Chi la usa oscilla\nun dito e stimola il\ncervello a usare una\nmossa fra quasi tutte\nquelle disponibili."
    de: "Bewegt Finger, um\nGehirn zu stimulieren.\nWählt zufällig Attacke\naus."
    es: "El usuario mueve un\ndedo y estimula el\ncerebro para usar al\nazar casi cualquier\nataque."
    ko: "손가락을 흔들어\n자신의 뇌를\n자극해서 모든\n기술 중 어느\n하나를 날린다."
milk_drink:
  names:
    jp_kana: ミルクのみ
    en: Milk Drink
    fr: Lait à Boire
    it: Buonlatte
    de: Milchgetränk
    es: Batido
    ko: 우유마시기
  descriptions:
    jp_kana: "さいだい　ＨＰの\nはんぶん　じぶんの\nＨＰを　かいふくする。\nなかまに　ＨＰを\nわけることも　できる。"
    en: "The user restores its\nown HP by up to half\nof its maximum HP.\nIt may also be used\nto heal an ally’s HP."
    fr: "Restaure jusqu’à la\nmoitié des PV max du\nlanceur. En dehors\ndes combats,\nrestaure des PV."
    it: "Chi la usa recupera\nfino a metà dei suoi\nPS massimi. Può\nanche far ripristinare\nPS fuori dalla lotta."
    de: "Max. KP des Anwenders\nwerden halb aufge-\nfüllt. Heilung vom\nTeam außerhalb von\nKämpfen."
    es: "Restaura hasta la\nmitad de los PS\nmáximos. Fuera de\ncombate, puede\nusarse en aliados."
    ko: "자신의 HP를\n최대 HP의 절반만큼\n회복한다.\n동료의 HP를\n회복시킬 수도 있다."
mimic:
  names:
    jp_kana: ものまね
    en: Mimic
    fr: Copie
    it: Mimica
    de: Mimikry
    es: Mimético
    ko: 흉내내기
  descriptions:
    jp_kana: "あいてが　さいごに\nつかった　わざを\nせんとうの　あいだ\nじぶんの　わざに\nすることが　できる。"
    en: "The user copies the\nmove last used by\nthe foe. The move can\nbe used for the rest\nof the battle."
    fr: "Le lanceur imite la\ndernière capacité\nutilisée par l’ennemi,\npeut l’utiliser pour\nle reste du combat."
    it: "Copia l’ultima mossa\nusata dal nemico.\nLa mossa copiata\nsi può utilizzare per\nil resto della lotta."
    de: "Kopiert die zuvor\nausgeführte Attacke\ndes Gegners. Kann bis\nzum Ende des Kampfes\nverwendet werden."
    es: "Copia el último ataque\nusado por el enemigo."
    ko: "상대가 마지막에\n사용한 기술을\n배틀을 하는 동안\n자신의 기술로\n만들 수 있다."
mind_reader:
  names:
    jp_kana: こころのめ
    en: Mind Reader
    fr: Lire-Esprit
    it: Leggimente
    de: Willensleser
    es: Telépata
    ko: 마음의눈
  descriptions:
    jp_kana: "あいての　うごきを\nこころで　かんじて\nつぎの　こうげきが\nかならず　あたるように\nする。"
    en: "The user senses the\nfoe’s movements\nwith its mind to\nensure its next\nattack does not miss."
    fr: "Le lanceur analyse les\nmouvements de\nl’ennemi pour être\nplus sûr de toucher\nau coup suivant."
    it: "Chi la usa prevede i\nmovimenti del nemico\ncon la mente per\nmandare a segno\nl’attacco successivo."
    de: "Ahnt gegnerische\nAktion voraus, um zu\ngewährleisten, dass\ndie nächste Attacke\ntrifft."
    es: "El usuario adivina los\nmovimientos del\nrival para hacer\nque su siguiente\nataque no falle."
    ko: "상대의 움직임을\n마음으로 읽고\n다음 공격이\n반드시 명중되게\n한다."
minimize:
  names:
    jp_kana: ちいさくなる
    en: Minimize
    fr: Lilliput
    it: Minimizzato
    de: Komprimator
    es: Reducción
    ko: 작아지기
  descriptions:
    jp_kana: "からだを　ちぢめて\nちいさく　みせて\nかいひりつを　あげる。"
    en: "The user compresses\nits body to make\nitself look smaller.\nThe user’s evasion\nstat is boosted."
    fr: "Le lanceur comprime\nson corps pour se\nfaire tout petit et\naugmenter son\nesquive."
    it: "Il corpo di chi la usa\nsi comprime e diventa\npiù piccolo. La sua\ncapacità di elusione\naumenta."
    de: "Anwender\nschrumpft, um\nFluchtwert zu\nerhöhen."
    es: "El usuario mengua\npara aumentar la\nevasión."
    ko: "몸을 축소하여\n작게 보임으로써\n회피율을 올린다."
miracle_eye:
  names:
    jp_kana: ミラクルアイ
    en: Miracle Eye
    fr: Oeil Miracle
    it: Miracolvista
    de: Wunderauge
    es: Gran Ojo
    ko: 미라클아이
  descriptions:
    jp_kana: "あくタイプに\nこうかがない　わざや\nかいひりつの　たかい\nあいてに　こうげきが\nあたるように　なる。"
    en: "Enables the user to\nhit a Dark type with\nany type of move. It\nalso enables the user\nto hit an evasive foe."
    fr: "Permet de toucher un\nPokémon Ténèbres\navec une capacité Psy\net de toucher un\nennemi insaisissable."
    it: "Chi la usa colpisce\nun tipo Buio con\nqualsiasi mossa.\nVanifica l’aumento di\nelusione del nemico."
    de: "Unlicht-PKMN können\nmit jeder Att. ange-\ngriffen werden. Anw.\nkann Geg. treffen,\ndie ausweichen."
    es: "Permite atacar con \ncualquier movimiento\na rivales de tipo\nSiniestro y golpear\na Pokémon evasivos."
    ko: "악타입에\n효과가 없는 기술이나\n회피율이 높은\n상대라 할지라도\n공격이 맞게 된다."
mirror_coat:
  names:
    jp_kana: ミラーコート
    en: Mirror Coat
    fr: Voile Miroir
    it: Specchiovelo
    de: Spiegelcape
    es: Manto Espejo
    ko: 미러코트
  descriptions:
    jp_kana: "あいてから　うけた\nとくしゅ　こうげきの\nダメージを\n２ばいに　して\nそのあいてに　かえす。"
    en: "A retaliation move\nthat counters any\nspecial attack,\ninflicting double the\ndamage taken."
    fr: "Une riposte qui contre\nn’importe quelle\nattaque spéciale en\ninfligeant le double\ndes dégâts subis."
    it: "Mossa ritorsione che\ncontrasta ogni\nattacco speciale\ninfliggendo un\ndanno doppio."
    de: "Kontert den\nSpezial-Angriff\ndes Gegners mit\nzweifacher Kraft."
    es: "Responde a un\nAtaque Especial\ncon doble fuerza."
    ko: "상대에게 받은\n특수공격의 데미지를\n2배로 만들어\n그 상대에게\n돌려준다."
mirror_move:
  names:
    jp_kana: オウムがえし
    en: Mirror Move
    fr: Mimique
    it: Speculmossa
    de: Spiegeltrick
    es: Mov. Espejo
    ko: 따라하기
  descriptions:
    jp_kana: "あいての　つかった\nわざを　まねして\nじぶんも　おなじ\nわざを　つかう。"
    en: "The user counters\nthe foe by mimicking\nthe move last used\nby the foe."
    fr: "Le lanceur contre la\ncapacité de l’ennemi\navec la même\ncapacité."
    it: "Chi la usa risponde ad\nun attacco mimando\nl’ultima mossa usata\ndal nemico."
    de: "Erwidert gegnerischen\nAngriff mit derselben\nAttacke."
    es: "Contraataca con\nel mismo movimiento\nempleado por el\ncontrincante."
    ko: "상대가 사용한\n기술을 흉내 내어\n자신도 똑같은\n기술을 쓴다."
mirror_shot:
  names:
    jp_kana: ミラーショット
    en: Mirror Shot
    fr: Miroi-Tir
    it: Cristalcolpo
    de: Spiegelsalve
    es: Disp. Espejo
    ko: 미러숏
  descriptions:
    jp_kana: "みがき　あげられた\nからだから　せんこうの\nちからを　はなつ。\nめいちゅうりつを\nさげることが　ある。"
    en: "The user looses a\nflash of energy from\nits polished body.\nIt may also lower the\ntarget’s accuracy."
    fr: "Le corps poli du\nlanceur libère un\néclair d’énergie. Peut\naussi baisser la\nprécision de l’ennemi."
    it: "Chi la usa rilascia\nfasci d’energia dal\ncorpo levigato. Può\nanche ridurre la\nprecisione del nemico."
    de: "Anwender feuert\nEnergiestrahl aus\nseinem Körper ab.\nSenkt eventuell\nGenauigkeit d. Gegn."
    es: "El usuario libera un\nhaz de energía desde\nsu bruñido cuerpo.\nPuede bajar la\nprecisión."
    ko: "갈고 닦은\n몸에서 섬광의\n힘을 쏜다.\n명중률을\n떨어뜨릴 때가 있다."
mist:
  names:
    jp_kana: しろいきり
    en: Mist
    fr: Brume
    it: Nebbia
    de: Weißnebel
    es: Neblina
    ko: 흰안개
  descriptions:
    jp_kana: "しろいきりで\nからだを　おおう。\n５ターンの　あいだ\nあいてに　のうりょくを\nさげられなくなる。"
    en: "The user cloaks its\nbody with a white mist\nthat prevents any of\nits stats from being\ncut for five turns."
    fr: "Une brume blanche\nenveloppe l’équipe du\nlanceur et empêche la\nréduction des stats\npour 5 tours."
    it: "Chi la usa attira\nuna fitta nebbia\ngrazie alla quale le\nstatistiche non si\nriducono per 5 turni."
    de: "Anwender schützt\ndas Team mit einem\nNebel. Verhindert\nStatussenkungen\nfür fünf Runden."
    es: "Rodea de fina niebla\nal usuario y protege\nlas características\nde su equipo durante\n5 turnos."
    ko: "하얀 안개로\n몸을 덮는다.\n5턴 동안\n상대에 의해 능력이\n떨어지지 않게 된다."
mist_ball:
  names:
    jp_kana: ミストボール
    en: Mist Ball
    fr: Ball’Brume
    it: Foschisfera
    de: Nebelball
    es: Bola Neblina
    ko: 미스트볼
  descriptions:
    jp_kana: "きりじょうの\nうもうで　つつみこみ\nこうげきする。\nあいての　とくこうを\nさげることが　ある。"
    en: "A mistlike flurry of\ndown envelops and\ndamages the foe. It\nmay also lower the\ntarget’s Sp. Atk."
    fr: "Une bulle de brume\ninflige des dégâts à\nl’ennemi. Peut aussi\nréduire son Atq. Spé."
    it: "Una sfera coperta\ndi nebbia danneggia\nil nemico. Può anche\nridurre l’Att. Sp."
    de: "Angriff mit einer\nKugel aus Wasser, die\nNebel enthält. Senkt\nevtl. den Spezial-\nAngriff des Gegners."
    es: "Banco de niebla\nque puede bajar\nel At. Esp."
    ko: "안개의\n깃털로 둘러싸\n공격한다.\n상대의 특수공격을\n떨어뜨릴 때가 있다."
moonlight:
  names:
    jp_kana: つきのひかり
    en: Moonlight
    fr: Rayon Lune
    it: Lucelunare
    de: Mondschein
    es: Luz Lunar
    ko: 달의불빛
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nかいふくする。\nてんきに　よって\nかいふくの　りょうが　\nへんかする。"
    en: "The user restores its\nown HP.\nThe amount of HP\nregained varies with\nthe weather."
    fr: "Un soin qui restaure\ndes PV au lanceur.\nSon efficacité varie\nen fonction de la\nmétéo."
    it: "Chi la usa recupera\nPS. Il numero di PS\nrecuperati dipende\ndalle condizioni\natmosferiche."
    de: "Füllt KP des\nAnwenders auf.\nDie Menge hängt\nvom Wetter ab."
    es: "Restaura PS. La\ncantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를\n회복한다.\n날씨에 따라\n회복량이\n변한다."
morning_sun:
  names:
    jp_kana: あさのひざし
    en: Morning Sun
    fr: Aurore
    it: Mattindoro
    de: Morgengrauen
    es: Sol Matinal
    ko: 아침햇살
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nかいふくする。\nてんきに　よって\nかいふくの　りょうが　\nへんかする。"
    en: "The user restores its\nown HP.\nThe amount of HP\nregained varies with\nthe weather."
    fr: "Un soin qui restaure\ndes PV au lanceur.\nSon efficacité varie\nen fonction de la\nmétéo."
    it: "Chi la usa recupera\nPS. Il numero di PS\nrecuperati dipende\ndalle condizioni\natmosferiche."
    de: "Füllt KP des\nAnwenders auf.\nDie Menge hängt\nvom Wetter ab."
    es: "Restaura PS. La\ncantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를\n회복한다.\n날씨에 따라\n회복량이\n변한다."
mud_bomb:
  names:
    jp_kana: どろばくだん
    en: Mud Bomb
    fr: Boue-Bombe
    it: Pantanobomba
    de: Schlammbombe
    es: Bomba Fango
    ko: 진흙폭탄
  descriptions:
    jp_kana: "かたい　どろのたまを\nあいてに　はっしゃして\nこうげきする。\nめいちゅうりつを\nさげることが　ある。"
    en: "The user launches a\nhard-packed mud ball\nto attack.\nIt may also lower the\ntarget’s accuracy."
    fr: "Le lanceur attaque à\nl’aide d’une boule de\nboue solidifiée. Peut\naussi baisser la\nprécision de l’ennemi."
    it: "Chi la usa lancia una\ncompatta palla di\nfango. Può anche\nridurre la precisione\ndel Pokémon colpito."
    de: "Anwender greift mit\neinem festen\nSchlammklumpen an.\nSenkt eventuell gegn.\nGenauigkeit."
    es: "Ataca lanzando una\ncompacta bola de\nfango. Puede bajar\nla precisión del\nobjetivo."
    ko: "단단한 진흙구슬을\n상대에게 발사하여\n공격한다.\n명중률을\n떨어뜨릴 때가 있다."
mud_shot:
  names:
    jp_kana: マッドショット
    en: Mud Shot
    fr: Tir de Boue
    it: Colpodifango
    de: Lehmschuss
    es: Disp. Lodo
    ko: 머드숏
  descriptions:
    jp_kana: "どろの　かたまりを\nあいてに　なげつけて\nこうげきする。\nどうじに　あいての\nすばやさを　さげる。"
    en: "The user attacks by\nhurling a blob of mud\nat the foe.\nIt also reduces the\ntarget’s Speed."
    fr: "Le lanceur attaque\nen projetant de la\nboue sur l’ennemi.\nRéduit aussi la\nVitesse de la cible."
    it: "Chi la usa attacca\nlanciando fango\nsul nemico.\nRiduce anche\nla Velocità."
    de: "Angriff mit Lehm, der\nden Initiative-Wert\ndes Gegners senkt."
    es: "El usuario lanza lodo\nal rival y reduce su\nVelocidad."
    ko: "진흙 덩어리를\n상대에게 내던져서\n공격한다.\n동시에 상대의\n스피드를 떨어뜨린다."
mud_slap:
  names:
    jp_kana: どろかけ
    en: Mud-Slap
    fr: Coud’Boue
    it: Fangosberla
    de: Lehmschelle
    es: Bofetón Lodo
    ko: 진흙뿌리기
  descriptions:
    jp_kana: "あいての　かおなどに\nドロを　なげつけて\nこうげきする。\nめいちゅうりつを\nさげる。"
    en: "The user hurls mud in\nthe foe’s face to\ninflict damage and\nlower its accuracy."
    fr: "Le lanceur envoie de\nla boue au visage de\nl’ennemi pour infliger\ndes dégâts et baisser\nsa précision."
    it: "Chi la usa butta\nfango in faccia al\nnemico per arrecargli\ndanni e ridurne la\nprecisione."
    de: "Schadet Gegner\ndurch Matsch.\nDie Genauigkeit\nsinkt."
    es: "Echa lodo en la\ncara para bajar\nla precisión."
    ko: "상대의 얼굴 등에\n진흙을 내던져서\n공격한다.\n명중률을\n떨어뜨린다."
mud_sport:
  names:
    jp_kana: どろあそび
    en: Mud Sport
    fr: Lance-Boue
    it: Fangata
    de: Lehmsuhler
    es: Chapoteolodo
    ko: 흙놀이
  descriptions:
    jp_kana: "どろを　かぶって\nどろどろに　なる。\nじぶんが　いるあいだ\nでんきタイプの　わざを\nよわめる。"
    en: "The user covers\nitself with mud. It\nweakens Electric-\ntype moves while the\nuser is in the battle."
    fr: "Le lanceur se couvre\nde boue pour affaiblir\nles capacités Electrik\nquand il combat."
    it: "Chi la usa si ricopre\ndi fango. In una lotta\nindebolisce le mosse\ndi tipo Elettro."
    de: "Schwächt Elektro-\nAttacken, solange\nder Anwender am\nKampf teilnimmt."
    es: "El usuario se cubre\nde lodo y debilita los\nmovimientos eléctricos\nmientras está en\ncombate."
    ko: "진흙투성이가 된다.\n기술을 쓴 포켓몬이\n배틀에 나와있는 동안\n전기타입의 기술을\n약하게 만든다."
muddy_water:
  names:
    jp_kana: だくりゅう
    en: Muddy Water
    fr: Ocroupi
    it: Fanghiglia
    de: Lehmbrühe
    es: Agua Lodosa
    ko: 탁류
  descriptions:
    jp_kana: "にごった　みずを\nあいてに　はっしゃして\nこうげきする。\nめいちゅうりつを\nさげることが　ある。"
    en: "The user attacks by\nshooting out muddy\nwater.\nIt may also lower the\nfoe’s accuracy."
    fr: "Le lanceur attaque en\nprojetant de l’eau\nboueuse. Peut aussi\nréduire la précision\nde l’ennemi."
    it: "Chi la usa attacca\ncon un getto di\nfango che può anche\nridurre la precisione\ndel nemico."
    de: "Greift mit Matsch\nan und senkt\neventuell die\nGenauigkeit des\nGegners."
    es: "Ataque con agua\nlodosa que puede\nbajar la precisión."
    ko: "탁해진 물을\n상대에게 발사하여\n공격한다.\n명중률을\n떨어뜨릴 때가 있다."
nasty_plot:
  names:
    jp_kana: わるだくみ
    en: Nasty Plot
    fr: Machination
    it: Congiura
    de: Ränkeschmied
    es: Maquinación
    ko: 나쁜음모
  descriptions:
    jp_kana: "わるいことを\nかんがえて　あたまを　\nかっせいか　させる。\nじぶんの　とくこうを\nぐーんと　あげる。"
    en: "The user stimulates\nits brain by thinking\nbad thoughts.\nIt sharply raises the\nuser’s Sp. Atk."
    fr: "Stimule l’esprit par\nde mauvaises pensées.\nAugmente fortement\nl’Atq. Spé. du\nlanceur."
    it: "Chi la usa stimola\nil cervello pensando\na cose cattive.\nAumenta di molto\nl’Att. Sp."
    de: "Anwender stimuliert\nsein Gehirn und hat\nfinstere Gedanken.\nSteigert Spez.-\nAngriff enorm."
    es: "Estimula su cerebro\npensando en cosas\nmalas. Aumenta\nconsiderablemente\nel At. Esp."
    ko: "나쁜 일을\n생각해서 머리를\n활성화시킨다.\n자신의 특수공격을\n크게 올린다."
natural_gift:
  names:
    jp_kana: しぜんのめぐみ
    en: Natural Gift
    fr: Don Naturel
    it: Dononaturale
    de: Beerenkräfte
    es: Don Natural
    ko: 자연의은혜
  descriptions:
    jp_kana: "きのみから　ちからを\nもらい　こうげきする。\nもたせた　きのみで\nわざの　タイプと\nいりょくが　かわる。"
    en: "The user draws power\nto attack by using\nits held Berry.\nThe Berry determines\nits type and power."
    fr: "Avant d’attaquer, le\nlanceur rassemble ses\nforces grâce à sa\nBaie. Elle détermine le\ntype et la puissance."
    it: "Chi la usa trae forza\ndalla Bacca che tiene.\nDa questa dipendono\nil tipo e la forza\ndell’attacco."
    de: "Anwender zieht aus\nseiner derzeitigen\nBeere Kraft. Attacke\nhängt von der Beere\nab."
    es: "La baya que lleva\npresta su fuerza para\natacar. El tipo de\nataque y su fuerza\ndependen de la baya."
    ko: "나무열매에서 힘을\n얻어 공격한다.\n지니게 한 나무열매에\n따라 기술의 타입과\n위력이 바뀐다."
nature_power:
  names:
    jp_kana: しぜんのちから
    en: Nature Power
    fr: Force-Nature
    it: Naturforza
    de: Natur-Kraft
    es: Adaptación
    ko: 자연의힘
  descriptions:
    jp_kana: "しぜんの　ちからで\nこうげきする。\nつかう　ばしょで\nでてくる　わざが\nへんかする。"
    en: "An attack that makes\nuse of nature’s\npower. Its effects\nvary depending on the\nuser’s environment."
    fr: "Une attaque qui tire\nsa force de la nature.\nSon type varie selon\nle terrain."
    it: "Mossa che fa uso\ndella forza della\nnatura. L’effetto di\nquesto attacco varia\nsecondo il luogo."
    de: "Der Typ des Angriffs\nhängt vom Ort ab.\nDie Kraft der Natur\nwird genutzt."
    es: "Usa el poder de la\nnaturaleza. Su efecto\nvaría según el sitio."
    ko: "자연의 힘으로\n공격한다.\n사용하는 장소에 따라\n나오는 기술이\n변화한다."
needle_arm:
  names:
    jp_kana: ニードルアーム
    en: Needle Arm
    fr: Poing Dard
    it: Pugnospine
    de: Nietenranke
    es: Brazo Pincho
    ko: 바늘팔
  descriptions:
    jp_kana: "トゲの　うでを\nはげしく　ふるって\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user attacks by\nwildly swinging its\nthorny arms.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur attaque en\nfouettant l’ennemi de\nses bras épineux. \nPeut aussi l’apeurer."
    it: "Chi la usa attacca\nsferrando un pugno\nspinoso. Può far\ntentennare il Pokémon\ncolpito."
    de: "Angriff mit dornigen\nArmen. Gegner\nschreckt eventuell\nzurück."
    es: "Pega con brazos\nde pinchos y puede\nhacer retroceder\nal enemigo."
    ko: "바늘팔을\n세차게 흔들어\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
night_shade:
  names:
    jp_kana: ナイトヘッド
    en: Night Shade
    fr: Ténèbres
    it: Ombra Nott.
    de: Nachtnebel
    es: Tinieblas
    ko: 나이트헤드
  descriptions:
    jp_kana: "まぼろしを　みせて\nじぶんの　レベルと\nおなじ　だけの\nダメージを　あいてに\nあたえる。"
    en: "The user makes the\nfoe see a mirage.\nIt inflicts damage\nmatching the user’s\nlevel."
    fr: "Le lanceur invoque\nun mirage. Inflige des\ndégâts équivalents\nau niveau du lanceur."
    it: "Fa apparire un\nmiraggio al nemico\ne infligge un danno\npari al livello di\nchi la usa."
    de: "Gegner sieht eine\nIllusion. Richtet\nSchaden gemäß\nLevel des\nAnwenders an."
    es: "Produce un\nespejismo ante el\nenemigo, que pierde\ntantos PS como nivel\ntenga el agresor."
    ko: "환상을 보게 해서\n자신의 레벨과\n똑같은 만큼의\n데미지를 상대에게\n준다."
night_slash:
  names:
    jp_kana: つじぎり
    en: Night Slash
    fr: Tranche-Nuit
    it: Nottesferza
    de: Nachthieb
    es: Tajo Umbrío
    ko: 깜짝베기
  descriptions:
    jp_kana: "いっしゅんの　すきを\nついて　あいてを\nきりはらう。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user slashes the\nfoe the instant an\nopportunity arises.\nIt has a high\ncritical-hit ratio."
    fr: "Le lanceur lacère\nl’ennemi à la\npremière occasion.\nTaux de critiques\nélevé."
    it: "Chi la usa colpisce\nil nemico appena si\npresenta l’occasione.\nProbabile brutto\ncolpo."
    de: "Anwender greift bei\nder ersten Gelegen-\nheit mit scharfen\nKlauen an. Hohe\nVolltrefferquote."
    es: "Ataca al rival a la\nprimera oportunidad.\nSuele ser crítico."
    ko: "순간적으로\n틈을 노려\n상대를 베어 버린다.\n급소에 맞을\n확률이 높다."
nightmare:
  names:
    jp_kana: あくむ
    en: Nightmare
    fr: Cauchemar
    it: Incubo
    de: Nachtmahr
    es: Pesadilla
    ko: 악몽
  descriptions:
    jp_kana: "ねむり　じょうたいの\nあいてに　あくむを\nみせて　まいターン\nすこしずつ　ＨＰを\nへらしていく。"
    en: "A sleeping foe is\nshown a nightmare\nthat inflicts some\ndamage every turn."
    fr: "Un cauchemar qui\ninflige des dégâts à\nchaque tour à un\nennemi endormi."
    it: "Il nemico\naddormentato vive\nun incubo e perde\ndei PS ad ogni\nturno."
    de: "Dem schlafenden\nGegner wird durch\neinen Alptraum in\njeder Runde Schaden\nzugefügt."
    es: "El rival dormido\nsufre una pesadilla\nque le hace perder\nPS en cada turno."
    ko: "잠듦 상태의\n상대에게 악몽을\n꾸게 하여 매 턴\n조금씩 HP를\n떨어뜨려 간다."
octazooka:
  names:
    jp_kana: オクタンほう
    en: Octazooka
    fr: Octazooka
    it: Octazooka
    de: Octazooka
    es: Pulpocañón
    ko: 대포무노포
  descriptions:
    jp_kana: "あいての　かおなどに\nすみを　ふきかけて\nこうげきする。\nめいちゅうりつを\nさげることが　ある。"
    en: "The user attacks by\nspraying ink in the\nfoe’s face or eyes.\nIt may also lower the\ntarget’s accuracy."
    fr: "Le lanceur attaque en\nprojetant de l’encre \nau visage de l’ennemi.\nPeut aussi baisser la\nprécision de l’ennemi."
    it: "Chi la usa spruzza\ninchiostro in faccia\nal nemico.\nPuò anche ridurne\nla precisione."
    de: "Schießt Tinte, um\nSchaden anzurichten\nund die Genauigkeit\nzu senken."
    es: "Dispara tinta a la\ncara. Puede bajar\nla precisión."
    ko: "상대의 얼굴 등에\n먹물을 내뿜어\n공격한다.\n명중률을\n떨어뜨릴 때가 있다."
odor_sleuth:
  names:
    jp_kana: かぎわける
    en: Odor Sleuth
    fr: Flair
    it: Segugio
    de: Schnüffler
    es: Rastreo
    ko: 냄새구별
  descriptions:
    jp_kana: "ゴーストタイプに\nこうかがない　わざや\nかいひりつの　たかい\nあいてに　こうげきが\nあたるように　なる。"
    en: "Enables the user to\nhit a Ghost type with\nany type of move. It\nalso enables the user\nto hit an evasive foe."
    fr: "Permet de toucher un\nPokémon Spectre avec\nn’importe quelle capa-\ncité et de toucher un\nennemi insaisissable."
    it: "Chi la usa colpisce\nun tipo Spettro con\nqualsiasi mossa e\nvanifica l’aumento di\nelusione del nemico."
    de: "Geist-Pokémon können\nmit jeder Att. ange-\ngriffen werden. Ver-\nhindert Anstieg von\ngegn. Fluchtwert."
    es: "Permite atacar con\ncualquier movimiento\na rivales de tipo\nFantasma y golpear a\nPokémon evasivos."
    ko: "고스트타입에\n효과가 없는 기술이나\n회피율이 높은\n상대라 할지라도\n공격이 맞게 된다."
ominous_wind:
  names:
    jp_kana: あやしいかぜ
    en: Ominous Wind
    fr: Vent Mauvais
    it: Funestovento
    de: Unheilböen
    es: Vien. Aciago
    ko: 괴상한바람
  descriptions:
    jp_kana: "みのけも　よだつ\nとっぷうを　おこす。\nじぶんの　すべての\nのうりょくが\nあがることが　ある。"
    en: "The user creates a\ngust of repulsive\nwind. It may also\nraise all the user’s\nstats at once."
    fr: "Le lanceur crée une\nviolente bourrasque.\nPeut aussi augmenter\ntoutes ses stats."
    it: "Chi la usa attacca\ncon una forte raffica\ndi vento che può\naumentare tutte\nle sue statistiche."
    de: "Den Gegner treffen\nabscheuliche Winde.\nSteigert eventuell\nalle Statuswerte des\nAnwenders."
    es: "Produce un viento\nhorripilante. Puede\nsubir de golpe todas\nlas características\ndel usuario."
    ko: "소름이 끼칠만한\n돌풍을 일으킨다.\n자신의 모든\n능력이\n올라갈 때가 있다."
outrage:
  names:
    jp_kana: げきりん
    en: Outrage
    fr: Colère
    it: Oltraggio
    de: Wutanfall
    es: Enfado
    ko: 역린
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって\nこうげきする。\nあばれた　あとは\nこんらん　する。"
    en: "The user rampages\nand attacks for two\nto three turns.\nHowever, it then\nbecomes confused."
    fr: "Le lanceur laisse\néclater sa rage et\nattaque pendant 2 à\n3 tours avant de\ncéder à la confusion."
    it: "Chi la usa si scatena\ne attacca per 2 o 3\nturni, ma poi si\nconfonde."
    de: "Wiederholt Angriff\nzwei bis drei Runden\nlang. Anschließend\nist er verwirrt."
    es: "Embestida que dura\n2 o 3 turnos y\nconfunde al atacante."
    ko: "2-3턴 동안\n마구 난동부려서\n공격한다.\n난동부린 뒤에는\n혼란에 빠진다."
overheat:
  names:
    jp_kana: オーバーヒート
    en: Overheat
    fr: Surchauffe
    it: Vampata
    de: Hitzekoller
    es: Sofoco
    ko: 오버히트
  descriptions:
    jp_kana: "フルパワーで　あいてを\nこうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが\nがくっと　さがる。"
    en: "The user attacks the\nfoe at full power.\nThe attack’s recoil\nsharply reduces the\nuser’s Sp. Atk stat."
    fr: "Attaque l’ennemi à\npleine puissance. Le\ncontrecoup baisse\nénormément l’Atq.\nSpé. du lanceur."
    it: "Chi la usa sferra\nun potente attacco,\nma il contraccolpo\nriduce di molto\nil suo Att. Sp."
    de: "Angriff mit voller\nKraft, der den Spez.-\nAngriff d. Anwenders \ndurch den Rückstoß\ndeutlich senkt."
    es: "Ataque en toda regla\nque baja mucho el\nAt. Esp. del agresor."
    ko: "풀 파워로 상대를\n공격한다.\n쓰면 반동으로\n자신의 특수공격이\n크게 떨어진다."
pain_split:
  names:
    jp_kana: いたみわけ
    en: Pain Split
    fr: Balance
    it: Malcomune
    de: Leidteiler
    es: Divide Dolor
    ko: 아픔나누기
  descriptions:
    jp_kana: "じぶんの　ＨＰと\nあいての　ＨＰを\nあわせて　それを\nじぶんと　あいてで\nなかよく　わける。"
    en: "The user adds its HP\nto the foe’s HP, then\nequally shares the\ncombined HP with the\nfoe."
    fr: "Le lanceur ajoute ses\nPV à ceux de son\nennemi et les répartit\néquitablement."
    it: "Chi la usa somma\ni suoi PS a quelli di\nun avversario per\npoi dividerli in parti\nuguali."
    de: "Addiert KP von\nAnwender und\nGegner. Teilt\ngerecht auf."
    es: "Suma los PS del\nusuario a los del\nrival y los reparte\na partes iguales."
    ko: "자신의 HP와\n상대의 HP를\n합친 것을\n자신과 상대가\n사이좋게 나눈다."
pay_day:
  names:
    jp_kana: ネコにこばん
    en: Pay Day
    fr: Jackpot
    it: Giornopaga
    de: Zahltag
    es: Día de Pago
    ko: 고양이돈받기
  descriptions:
    jp_kana: "あいての　からだに\nこばんを　なげつけて\nこうげきする。\nせんとうの　あとで\nおかねが　もらえる。"
    en: "Numerous coins are\nhurled at the foe to\ninflict damage.\nMoney is earned\nafter battle."
    fr: "Des pièces sont\nlancées sur l’ennemi.\nPermet d’obtenir de\nl’argent à la fin du\ncombat."
    it: "Colpisce il nemico\ncon una gran quantità\ndi monete che si recu-\nperano dopo la lotta."
    de: "Der Gegner wird\nmit Münzen\nbeworfen. Das Geld\nwird erstattet."
    es: "Arroja monedas\nque luego recupera."
    ko: "상대의 몸에\n돈을 세게 던져서\n공격한다.\n배틀 후에\n돈을 받을 수 있다."
payback:
  names:
    jp_kana: しっぺがえし
    en: Payback
    fr: Représailles
    it: Rivincita
    de: Gegenstoß
    es: Vendetta
    ko: 보복
  descriptions:
    jp_kana: "ためこんで　こうげき。\nあいてより　あとに\nこうげき　できると\nわざの　いりょくは\n２ばいに　なる。"
    en: "If the user can use\nthis attack after the\nfoe attacks, its\npower is doubled."
    fr: "Le lanceur charge son\nénergie, puis attaque.\nLa puissance est\ndoublée si cela suit\nune capacité ennemie."
    it: "La potenza raddoppia\nse chi la usa agisce\ndopo l’attacco di uno\ndei Pokémon in campo."
    de: "Kann Anwender diese\nAttacke nach einer\nAttacke eines gegn.\nPKMN ausführen, wird\ndie Kraft verdoppelt."
    es: "Si un Pokémon\nusa un movimiento\nantes, contraataca\ncon el doble de\nfuerza."
    ko: "모아서 공격한다.\n상대보다 뒤에\n공격할 수 있으면\n기술의 위력은\n2배가 된다."
peck:
  names:
    jp_kana: つつく
    en: Peck
    fr: Picpic
    it: Beccata
    de: Schnabel
    es: Picotazo
    ko: 쪼기
  descriptions:
    jp_kana: "するどく　とがった\nくちばしや　つので　\nあいてを　つついて\nこうげきする。"
    en: "The foe is jabbed\nwith a sharply\npointed beak or\nhorn."
    fr: "Frappe l’ennemi d’un\nbec pointu ou d’une\ncorne pour infliger\ndes dégâts."
    it: "Colpisce il nemico\ncon un becco\nappuntito o con\nun corno."
    de: "Greift Gegner mit\ndem Schnabel\noder Horn an."
    es: "Ensarta al rival con\nun cuerno o pico\npunzante."
    ko: "날카롭고 뾰족한\n부리나 뿔로\n상대를 쪼아서\n공격한다."
perish_song:
  names:
    jp_kana: ほろびのうた
    en: Perish Song
    fr: Requiem
    it: Ultimocanto
    de: Abgesang
    es: Canto Mortal
    ko: 멸망의노래
  descriptions:
    jp_kana: "きいた　ポケモンは\n３ターン　たつと\nひんしに　なる。\nこうたいすると\nこうかは　なくなる。"
    en: "Any Pokémon that\nhears this song\nfaints in three turns\nunless it switches\nout of battle."
    fr: "Un Pokémon qui\nentend ce requiem est\nK.O. dans 3 tours à\nmoins qu’il ne quitte\nle combat."
    it: "Ogni Pokémon che\nsente questo canto\nva KO in 3 turni, se\nnon lo si sostituisce."
    de: "Wer diese Musik\nhört, wird nach drei\nRunden besiegt.\nRettung durch\nTausch."
    es: "Si un Pokémon\nescucha este canto,\ny no es cambiado\npor otro en 3 turnos,\nacaba debilitándose."
    ko: "노래를 들은 포켓몬은\n3턴이 지나면\n기절한다.\n교체되면\n효과가 없어진다."
petal_dance:
  names:
    jp_kana: はなびらのまい
    en: Petal Dance
    fr: Danse-Fleur
    it: Petalodanza
    de: Blättertanz
    es: Danza Pétalo
    ko: 꽃잎댄스
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nはなを　まきちらして\nこうげきする。\nまきちらした　あとは\nこんらんする。"
    en: "The user attacks by\nscattering petals for\ntwo to three turns.\nThe user then\nbecomes confused."
    fr: "Le lanceur attaque en\nprojetant des pétales\npendant 2 à 3 tours\navant de céder à\nla confusion."
    it: "Ricopre il nemico con\npetali per 2-3 turni,\nma chi la usa rimane\nconfuso."
    de: "Angriff mit Blüten-\nblättern für 2 - 3\nRunden. Angreifer\nwird verwirrt."
    es: "Lanza pétalos de\n2 a 3 turnos y\nacaba confundiendo\nal atacante."
    ko: "2-3턴 동안\n꽃을 흩뿌려서\n공격한다.\n흩뿌린 뒤에는\n혼란에 빠진다."
pin_missile:
  names:
    jp_kana: ミサイルばり
    en: Pin Missile
    fr: Dard-Nuée
    it: Missilspillo
    de: Nadelrakete
    es: Pin Misil
    ko: 바늘미사일
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "Sharp pins are shot\nat the foe in rapid\nsuccession.\nThey hit two to five\ntimes in a row."
    fr: "Envoie une rafale de\ndards. Peut toucher\nde 2 à 5 fois."
    it: "Il nemico viene colpito\n2-5 volte da spilli\nappuntiti in rapida\nsuccessione."
    de: "Spitze Nadeln\ntreffen den\nGegner 2 - 5-mal."
    es: "Lanza finas púas\nque hieren de 2 a\n5 veces."
    ko: "날카로운 침을\n상대에게 발사해서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
pluck:
  names:
    jp_kana: ついばむ
    en: Pluck
    fr: Picore
    it: Spennata
    de: Pflücker
    es: Picoteo
    ko: 쪼아대기
  descriptions:
    jp_kana: "くちばしで　こうげき。\nあいてが　きのみを\nもっている　とき\nついばんで　きのみの\nこうかを　うけられる。"
    en: "The user pecks the\nfoe. If the foe is\nholding a Berry, the\nuser plucks it and\ngains its effect."
    fr: "Le lanceur picore\nl’ennemi. S’il tient\nune Baie, le lanceur\ns’en empare et\nprofite de ses effets."
    it: "Chi la usa becca il\nnemico. Se il nemico\ntiene una Bacca,\ngliela ruba e ne\nsfrutta gli effetti."
    de: "Anwender pickt den\nGegner, pflückt\nBeere, falls Gegner\neine Beere hält und\nerhält ihren Effekt."
    es: "Picotea al rival. Si\neste sostiene una\nbaya, la picotea\ntambién y obtiene\nsus efectos."
    ko: "부리로 공격한다.\n상대가 나무열매를\n지니고 있을 때\n쪼아서 나무열매의\n효과를 받을 수 있다."
poison_fang:
  names:
    jp_kana: どくどくのキバ
    en: Poison Fang
    fr: Crochetvenin
    it: Velenodenti
    de: Giftzahn
    es: Colmillo Ven
    ko: 독엄니
  descriptions:
    jp_kana: "どくの　ある　キバで\nあいてに　かみついて\nこうげきする。\nもうどくを　おわせる\nことが　ある。"
    en: "The user bites the\nfoe with toxic fangs.\nIt may also leave the\nfoe badly poisoned."
    fr: "Le lanceur mord\nl’ennemi de ses crocs\ntoxiques. Peut aussi\nl’empoisonner\ngravement."
    it: "Chi la usa morde il\nnemico con denti\navvelenati, che\npossono anche\niperavvelenarlo."
    de: "Angriff mit\nGiftreißzähnen.\nGegner wird eventuell\nschwer vergiftet."
    es: "Colmillos tóxicos\nque pueden\nenvenenar\ngravemente al rival."
    ko: "독이 있는 이빨로\n상대를 물어서\n공격한다.\n맹독을 주입할\n때가 있다."
poison_gas:
  names:
    jp_kana: どくガス
    en: Poison Gas
    fr: Gaz Toxik
    it: Velenogas
    de: Giftwolke
    es: Gas Venenoso
    ko: 독가스
  descriptions:
    jp_kana: "どくガスを　あいての\nかおに　ふきかけて\nどくの　じょうたいに\nする。"
    en: "A cloud of poison gas\nis sprayed in the\nfoe’s face.\nIt may poison the\ntarget."
    fr: "Un nuage de gaz\ntoxique est projeté\nau visage de l’ennemi.\nPeut l’empoisonner."
    it: "Spruzza in faccia al\nnemico una nuvola\ndi gas tossico che\npuò avvelenare."
    de: "Hüllt Gegner in\nGas ein, das ihn\neventuell vergiftet."
    es: "Lanza una nube\nde gas tóxico\nal enemigo.\nProduce\nenvenenamiento."
    ko: "독가스를 상대의\n얼굴에 내뿜어\n독 상태로\n만든다."
poison_jab:
  names:
    jp_kana: どくづき
    en: Poison Jab
    fr: Direct Toxik
    it: Velenpuntura
    de: Gifthieb
    es: Puya Nociva
    ko: 독찌르기
  descriptions:
    jp_kana: "どくに　そまった\nしょくしゅや　うでで　\nあいてを　つきさす。\nどく　じょうたいに\nすることが　ある。"
    en: "The foe is stabbed\nwith a tentacle or\narm steeped in\npoison. It may also\npoison the foe."
    fr: "Attaque l’ennemi avec\nun tentacule ou un\nbras plein de poison.\nPeut aussi\nl’empoisonner."
    it: "Il nemico viene colpito\nda un braccio o ten-\ntacolo intriso di una\nsostanza tossica. Può\nanche avvelenarlo."
    de: "Gegner wird mit\nvergiftetem Arm oder\nTentakel verletzt.\nEr wird dabei\neventuell vergiftet."
    es: "Pincha al rival con\nun tentáculo o brazo\nenvenenado. Puede\nllegar a envenenar\nal rival."
    ko: "독에 물든\n촉수나 팔로\n상대를 꿰찌른다.\n독 상태로\n만들 때가 있다."
poison_powder:
  names:
    jp_kana: どくのこな
    en: PoisonPowder
    fr: Poudre Toxik
    it: Velenpolvere
    de: Giftpuder
    es: Polvo Veneno
    ko: 독가루
  descriptions:
    jp_kana: "どくの　ある　こなを\nたくさん　ふりまいて\nあいてを　どくの\nじょうたいに　する。"
    en: "A cloud of poisonous\ndust is scattered on\nthe foe.\nIt may poison the\ntarget."
    fr: "Une poudre toxique\nest lâchée sur\nl’ennemi. Peut\nl’empoisonner."
    it: "Investe il nemico con\nuna nuvola di polvere\ntossica che può\navvelenarlo."
    de: "Verstreut giftigen\nPuder, der den\nGegner vergiften\nkann."
    es: "Polvo tóxico que\nenvenena al\nenemigo."
    ko: "독이 있는 가루를\n많이 흩뿌려서\n상대를 독\n상태로 만든다."
poison_sting:
  names:
    jp_kana: どくばり
    en: Poison Sting
    fr: Dard-Venin
    it: Velenospina
    de: Giftstachel
    es: Picotazo Ven
    ko: 독침
  descriptions:
    jp_kana: "どくの　ある　ハリを\nあいてに　つきさして\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The foe is stabbed\nwith a poisonous\nbarb of some sort.\nIt may also poison\nthe target."
    fr: "Un dard toxique qui\ntransperce l’ennemi.\nPeut aussi\nl’empoisonner."
    it: "Colpisce il nemico\ncon degli aculei\ntossici che possono\nanche avvelenarlo."
    de: "Angriff mit\nGiftstacheln. Der\nGegner wird eventuell\nvergiftet."
    es: "Puede envenenar al\nenemigo con púas\ntóxicas."
    ko: "독이 있는 침을\n상대에게 꿰찔러서\n공격한다.\n독 상태가\n되는 경우가 있다."
poison_tail:
  names:
    jp_kana: ポイズンテール
    en: Poison Tail
    fr: Queue-Poison
    it: Velenocoda
    de: Giftschweif
    es: Cola Veneno
    ko: 포이즌테일
  descriptions:
    jp_kana: "しっぽで　たたく。\nどく　じょうたいに\nすることが　あり\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "An attack with a\nhigh critical-hit\nratio. This tail \nattack may also \npoison the foe."
    fr: "Attaque à taux de\ncritiques élevé.\nPeut aussi\nempoisonner l’ennemi."
    it: "Chi la usa colpisce\ncon la coda e può\navvelenare il nemico.\nProbabile brutto\ncolpo."
    de: "Angriff mit hoher\nVolltrefferquote.\nDiese Schweifattacke\nvergiftet den Gegner\neventuell."
    es: "Puede envenenar y\ndar un golpe crítico."
    ko: "꼬리로 때린다.\n독 상태로\n만들 때가 있고\n급소에 맞을\n확률이 높다."
pound:
  names:
    jp_kana: はたく
    en: Pound
    fr: Ecras’Face
    it: Botta
    de: Pfund
    es: Destructor
    ko: 막치기
  descriptions:
    jp_kana: "ながい　しっぽや\nてなどを　つかって\nあいてを　はたいて\nこうげきする。"
    en: "The foe is physically\npounded with a long\ntail or a foreleg,\netc."
    fr: "Ecrase l’ennemi\navec les pattes\navant, la queue, etc."
    it: "Colpisce il nemico\ncon la coda o le\nzampe anteriori."
    de: "Ein Hieb mit den\nVorderbeinen oder\ndem Schweif."
    es: "Golpea con las\npatas o la cola."
    ko: "긴 꼬리나\n손 등을 사용하여\n상대를 때려서\n공격한다."
powder_snow:
  names:
    jp_kana: こなゆき
    en: Powder Snow
    fr: Poudreuse
    it: Polneve
    de: Pulverschnee
    es: Nieve Polvo
    ko: 눈싸라기
  descriptions:
    jp_kana: "つめたい　こなゆきを\nあいてに　ふきつけて\nこうげきする。\nこおり　じょうたいに\nすることが　ある。"
    en: "The user attacks with\na chilling gust of\npowdery snow.\nIt may also freeze\nthe target."
    fr: "Le lanceur projette \nde la neige poudreuse.\nPeut aussi geler\nl’ennemi."
    it: "Attacca il nemico con\nuna raffica di neve\nfarinosa e può anche\ncongelarlo."
    de: "Angriff mit Schnee.\nGegner wird eventuell\neingefroren."
    es: "Lanza una nevada\nque puede llegar\na congelar."
    ko: "차가운 가랑눈을\n상대에게 내뿜어\n공격한다.\n얼음 상태가\n되는 경우가 있다."
power_gem:
  names:
    jp_kana: パワージェム
    en: Power Gem
    fr: Rayon Gemme
    it: Gemmoforza
    de: Juwelenkraft
    es: Joya de Luz
    ko: 파워젬
  descriptions:
    jp_kana: "ほうせきの　ように\nきらめく　ひかりを\nはっしゃして　あいてを\nこうげきする。"
    en: "The user attacks with\na ray of light that\nsparkles as if it were\nmade of gemstones."
    fr: "Le lanceur attaque\navec un rayon de\nlumière qui scintille\ncomme s’il était\ncomposé de gemmes."
    it: "Chi la usa attacca\ncon un raggio di luce\nche brilla come se\nfosse fatto di pietre\npreziose."
    de: "Anwender attackiert\nmit einem Lichtstrahl,\nwelcher funkelt, als\nsei er aus Juwelen."
    es: "Ataca con un rayo\nde luz que centellea\ncomo si lo formaran\nmiles de joyas."
    ko: "보석처럼 반짝이는\n빛을 발사하여\n상대를 공격한다."
power_swap:
  names:
    jp_kana: パワースワップ
    en: Power Swap
    fr: Permuforce
    it: Barattoforza
    de: Krafttausch
    es: Cambia Fue.
    ko: 파워스웹
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんと　あいての\nこうげきと　とくこうの\nのうりょく　へんかを\nいれかえる。"
    en: "The user employs its\npsychic power to\nswitch changes to\nits Attack and\nSp. Atk with the foe."
    fr: "Pouvoir qui échange\nles modifications de\nl’Atq. Spé. et de \nl’Attaque du lanceur\navec l’ennemi."
    it: "Chi la usa sfrutta la\nsua forza psichica per\nscambiare col nemico\nle modifiche all’At-\ntacco e all’Att. Sp."
    de: "Psychische Kräfte\ntauschen Änderungen\nan Angriff u. Spezial-\nAngriff mit denen\ndes Gegners."
    es: "El usuario emplea\nsu poder mental para\nintercambiar cambios\nen Ataque y At.\nEsp. con el rival."
    ko: "초능력으로\n자신과 상대의\n공격과 특수공격의\n능력 변화를\n교체한다."
power_trick:
  names:
    jp_kana: パワートリック
    en: Power Trick
    fr: Astuce Force
    it: Ingannoforza
    de: Krafttrick
    es: Truco Fuerza
    ko: 파워트릭
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんの　こうげきと\nぼうぎょの　ちからを\nこうかんする。"
    en: "The user employs its\npsychic power to\nswitch its Attack\nwith its Defense\nstat."
    fr: "Le lanceur utilise ses\npouvoirs psychiques\npour échanger sa\nstat Défense et sa\nstat Attaque."
    it: "Chi la usa utilizza la\nsua forza psichica per\nscambiare il valore\ndell’Attacco con\nquello della Difesa."
    de: "Anwender wendet\nPsycho-Kräfte an,\num eigenen Angriffs-\nmit Verteidigungs-\nWert auszutauschen."
    es: "Usa sus poderes\nmentales para\nintercambiar su\ncaracterística de\nAtaque por Defensa."
    ko: "초능력으로\n자신의 공격과\n방어의 힘을\n교환한다."
power_whip:
  names:
    jp_kana: パワーウィップ
    en: Power Whip
    fr: Mégafouet
    it: Vigorcolpo
    de: Blattgeißel
    es: Latigazo
    ko: 파워휩
  descriptions:
    jp_kana: "つたや　しょくしゅを\nはげしく　ふるって\nあいてを　たたきつけ\nこうげきする。"
    en: "The user violently\nwhirls its vines or\ntentacles to harshly\nlash the foe."
    fr: "Le lanceur fait \nvirevolter violemment\nses lianes ou ses\ntentacules pour\nfouetter l’ennemi."
    it: "Chi la usa agita\nviolentemente\nliane o tentacoli\nper sferzare\nil nemico."
    de: "Anwender wirbelt\nseine Ranken oder\nTentakel peitschen-\nartig gegen den\nGegner."
    es: "El usuario agita\nviolentamente sus\nhojas o tentáculos\npara golpear al rival."
    ko: "덩굴이나 촉수를\n세차게 흔들어\n상대를 힘껏 쳐서\n공격한다."
present:
  names:
    jp_kana: プレゼント
    en: Present
    fr: Cadeau
    it: Regalino
    de: Geschenk
    es: Presente
    ko: 프레젠트
  descriptions:
    jp_kana: "わなを　しかけた\nはこを　わたして\nこうげきする。\nＨＰが　かいふくして\nしまうことも　ある。"
    en: "The user attacks by\ngiving the foe a\nbooby-trapped gift.\nIt restores HP\nsometimes, however."
    fr: "Le lanceur attaque en\noffrant un cadeau\npiégé à l’ennemi. Peut\nà l’inverse restaurer\ncertains de ses PV."
    it: "Chi la usa dà un\nregalo bomba al\nnemico. A volte,\nperò, può fargli\nrecuperare PS."
    de: "Eine Bombe als\nGeschenk. Es\nkann auch KP\nwiederherstellen."
    es: "Regalo con bomba\ntrampa. A veces\nrestaura los PS."
    ko: "덫을 설치한\n상자를 건네어\n공격한다.\nHP가 회복해\n버릴 때도 있다."
protect:
  names:
    jp_kana: まもる
    en: Protect
    fr: Abri
    it: Protezione
    de: Schutzschild
    es: Protección
    ko: 방어
  descriptions:
    jp_kana: "あいての　こうげきを\nまったく　うけない。\nれんぞくで　だすと\nしっぱい　しやすい。"
    en: "It enables the user\nto evade all attacks.\nIts chance of failing\nrises if it is used in\nsuccession."
    fr: "Le lanceur esquive les\nattaques. Plus la\ncapacité est utilisée\nd’affilée, plus elle\nrisque d’échouer."
    it: "Permette di eludere\ntutti gli attacchi.\nSe usata in\nsuccessione può\nfallire."
    de: "Anwender weicht\njeder Attacke aus.\nScheitert eventuell\nbei Wiederholung."
    es: "Frena todos los\nataques, pero puede\nfallar si se usa\nrepetidamente."
    ko: "상대의 공격을\n전혀 받지 않는다.\n연속으로 쓰면\n실패하기 쉽다."
psybeam:
  names:
    jp_kana: サイケこうせん
    en: Psybeam
    fr: Rafale Psy
    it: Psicoraggio
    de: Psystrahl
    es: Psicorrayo
    ko: 환상빔
  descriptions:
    jp_kana: "ふしぎな　こうせんを\nあいてに　はっしゃして\nこうげきする。\nあいてを　こんらん\nさせることが　ある。"
    en: "The foe is attacked\nwith a peculiar ray.\nIt may also leave the\ntarget confused."
    fr: "Un étrange rayon\nfrappe l’ennemi. Peut\naussi le rendre\nconfus."
    it: "Colpisce il nemico\ncon un raggio\nspeciale. Può anche\nconfonderlo."
    de: "Feuert einen Strahl\nab, der den\nGegner verwirren\nkann."
    es: "Extraño rayo que\npuede causar\nconfusión."
    ko: "이상한 광선을\n상대에게 발사하여\n공격한다.\n상대를 혼란\n시킬 때가 있다."
psych_up:
  names:
    jp_kana: じこあんじ
    en: Psych Up
    fr: Boost
    it: Psicamisù
    de: Psycho-Plus
    es: Más Psique
    ko: 자기암시
  descriptions:
    jp_kana: "じぶんに　あんじを\nかけることで\nのうりょく　へんかの\nじょうたいを　あいてと　\nおなじにする。"
    en: "The user hypnotizes\nitself into copying\nany stat change\nmade by the foe."
    fr: "Une autohypnose qui\npermet au lanceur de\ncopier les\nchangements de\nstats de l’ennemi."
    it: "Chi la usa s’ipnotizza\nper copiare ogni\nmodifica alle\nstatistiche\ndel nemico."
    de: "Selbsthypnose des\nAnw. zur Kopie der\nStatusveränderungen\ndes Gegners."
    es: "El usuario se\nautohipnotiza para\ncopiar los cambios de\nlas características\ndel rival."
    ko: "자신에게\n암시를 걸어서\n능력 변화\n상태를 상대와\n같게 만든다."
psychic:
  names:
    jp_kana: サイコキネシス
    en: Psychic
    fr: Psyko
    it: Psichico
    de: Psychokinese
    es: Psíquico
    ko: 사이코키네시스
  descriptions:
    jp_kana: "つよい　ねんりきを\nあいてに　おくって\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The foe is hit by a\nstrong telekinetic\nforce. It may also\nreduce the foe’s\nSp. Def stat."
    fr: "Une puissante force\ntélékinésique frappe\nl’ennemi. Peut aussi\nfaire baisser sa Déf.\nSpé."
    it: "Il nemico viene colpito\nda una potente\nforza telecinetica\nche può anche\nridurne la Dif. Sp."
    de: "Starke Psycho-\nAttacke, die evtl.\nSpezial-Verteidigung\nsenkt."
    es: "Fuerte ataque\npsíquico que puede\nbajar la Def. Esp."
    ko: "강한 염동력을\n상대에게 보내어\n공격한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
psycho_boost:
  names:
    jp_kana: サイコブースト
    en: Psycho Boost
    fr: Psycho Boost
    it: Psicoslancio
    de: Psyschub
    es: Psicoataque
    ko: 사이코부스트
  descriptions:
    jp_kana: "フルパワーで　あいてを\nこうげきする。\nつかうと　はんどうで\nじぶんの　とくこうが\nがくっと　さがる。"
    en: "The user attacks the\nfoe at full power.\nThe attack’s recoil\nsharply reduces the\nuser’s Sp. Atk stat."
    fr: "Le lanceur attaque\nà pleine puissance.\nLe contrecoup réduit\nconsidérablement\nson Atq. Spé."
    it: "Chi la usa colpisce\nil nemico con grande\nforza, ma il contrac-\ncolpo riduce di molto\nil suo Att. Sp."
    de: "Angriff mit voller\nKraft. Der Rückstoß\nder Attacke senkt\nden Spezial-Angriff\ndes Anwenders."
    es: "Es tremendamente\npotente, pero baja\nmucho el At. Esp.\ndel usuario."
    ko: "풀 파워로 상대를\n공격한다.\n사용하면 반동으로\n자신의 특수공격이\n크게 떨어진다."
psycho_cut:
  names:
    jp_kana: サイコカッター
    en: Psycho Cut
    fr: Coupe Psycho
    it: Psicotaglio
    de: Psychoklinge
    es: Psico-corte
    ko: 사이코커터
  descriptions:
    jp_kana: "じったいか　させた\nこころの　やいばで\nあいてを　きりさく。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user tears at\nthe foe with blades\nformed by psychic\npower. It has a high\ncritical-hit ratio."
    fr: "Le lanceur entaille\nl’ennemi grâce à des\nlames faites de pou-\nvoir psychique. Taux\nde critiques élevé."
    it: "Chi la usa colpisce\nil nemico con lame\nfatte di forza\npsichica. Probabile\nbrutto colpo."
    de: "Gegner wird durch\nKlingen attackiert,\ndie aus Psycho-\nEnergie stammen. Hohe\nVolltrefferquote."
    es: "Ataca al rival con\ncuchillas formadas\npor energía psíquica.\nSuele ser crítico."
    ko: "실체화시킨\n마음의 칼날로\n상대를 베어 가른다.\n급소에 맞을\n확률이 높다."
psycho_shift:
  names:
    jp_kana: サイコシフト
    en: Psycho Shift
    fr: Echange Psy
    it: Psicotrasfer
    de: Psybann
    es: Psico-cambio
    ko: 사이코시프트
  descriptions:
    jp_kana: "ちょうのうりょくで\nあんじを　かけて\nじぶんの　うけている\nじょうたい　いじょうを\nあいてに　うつす。"
    en: "Using its psychic\npower of suggestion,\nthe user transfers\nits status problems\nto the target."
    fr: "Le lanceur transfère\nses problèmes de\nstatut à l’ennemi\ngrâce à son pouvoir\nde suggestion."
    it: "Con la forza psichica\ndella suggestione, chi\nla usa può trasferire\ni problemi di stato\nal Pokémon colpito."
    de: "Anwender nutzt seine\nSuggestivkräfte, um\neigene Statusprobleme\nzum Gegner zu\ntransferieren."
    es: "Usa su poder mental\npara transferir al\nrival sus problemas\nde estado."
    ko: "초능력으로\n암시를 걸어서\n자신에게 걸려 있는\n상태 이상을\n상대에게 옮긴다."
psywave:
  names:
    jp_kana: サイコウェーブ
    en: Psywave
    fr: Vague Psy
    it: Psiconda
    de: Psywelle
    es: Psicoonda
    ko: 사이코웨이브
  descriptions:
    jp_kana: "ふしぎな　ねんぱを\nあいてに　はっしゃして\nこうげきする。\nつかう　たびに\nダメージが　かわる。"
    en: "The foe is attacked\nwith an odd, hot\nenergy wave.\nThe attack varies in\nintensity."
    fr: "Une étrange onde\nd’énergie chaude \nfrappe l’ennemi.\nCette attaque est\nd’intensité variable."
    it: "Colpisce il nemico\ncon una strana\nondata di energia\ncalda. Ha un’intensità\nvariabile."
    de: "Heiße Energiewelle mit\nunterschiedlicher\nIntensität wird\nerzeugt."
    es: "Ataque con onda de\nenergía de intensidad\nvariable."
    ko: "이상한 염력파를\n상대에게 발사하여\n공격한다.\n사용할 때마다\n데미지가 바뀐다."
punishment:
  names:
    jp_kana: おしおき
    en: Punishment
    fr: Punition
    it: Punizione
    de: Strafattacke
    es: Castigo
    ko: 혼내기
  descriptions:
    jp_kana: "のうりょく　へんかで\nあいてが　パワーアップ\nしているほど　わざの\nいりょくが　あがる。"
    en: "This attack’s power\nincreases the more\nthe foe has powered\nup with stat changes."
    fr: "Plus l’ennemi a utilisé\ndes augmentations de\nstats et plus cette\ncapacité est\npuissante."
    it: "Questa mossa si\npotenzia con\nl’aumentare\ndelle statistiche\ndel nemico."
    de: "Je stärker der\nGegner durch Status-\nwerteveränderungen\nist, desto stärker\nwirkt diese Attacke."
    es: "La fuerza del ataque\naumenta cuanto más\nse ha fortalecido el\nrival con cambios de\ncaracterísticas."
    ko: "능력 변화로\n상대가 파워 업\n한 만큼 기술의\n위력이 올라간다."
pursuit:
  names:
    jp_kana: おいうち
    en: Pursuit
    fr: Poursuite
    it: Inseguimento
    de: Verfolgung
    es: Persecución
    ko: 따라가때리기
  descriptions:
    jp_kana: "あいて　ポケモンが\nいれかわる　ときに\nわざを　だしていると\n２ばいの　いりょくで\nこうげき　できる。"
    en: "An attack move that\ninflicts double damage\nif used on a foe that\nis switching out of\nbattle."
    fr: "Une attaque qui inflige\ndeux fois plus de\ndégâts à un ennemi qui\nquitte le combat."
    it: "Una mossa d’attacco\nche infligge un danno\ndoppio se il nemico\nè in fase di\nsostituzione."
    de: "Richtet großen\nSchaden bei\nAustausch des\nGegners an."
    es: "Hace el doble de daño\nal rival que pide el\nrelevo."
    ko: "상대 포켓몬이\n교체될 때\n기술을 쓰면\n2배의 위력으로\n공격할 수 있다."
quick_attack:
  names:
    jp_kana: でんこうせっか
    en: Quick Attack
    fr: Vive-Attaque
    it: Att. Rapido
    de: Ruckzuckhieb
    es: At. Rápido
    ko: 전광석화
  descriptions:
    jp_kana: "めにも　とまらない\nものすごい　はやさで\nあいてに　つっこむ。\nかならず　せんせい\nこうげき　できる。"
    en: "The user lunges at\nthe foe at a speed\nthat makes it almost\ninvisible. It is sure\nto strike first."
    fr: "Le lanceur fonce sur\nl’ennemi si rapidement\nqu’on parvient à peine\nà le discerner. Frappe\nen premier."
    it: "Chi la usa colpisce\nsempre per primo e\nad una tale velocità\nda rendersi quasi\ninvisibile."
    de: "Sehr schneller\nAngriff mit\nErstschlaggarantie."
    es: "Ataque rápido que\npermite golpear\nen primer lugar."
    ko: "눈에 보이지 않는\n굉장한 속도로\n상대에게 돌진한다.\n반드시 선제\n공격할 수 있다."
rage:
  names:
    jp_kana: いかり
    en: Rage
    fr: Frénésie
    it: Ira
    de: Raserei
    es: Furia
    ko: 분노
  descriptions:
    jp_kana: "わざを　だしたときに\nこうげきを　うけると\nいかりの　ちからで\nあたえる　ダメージが\nあがる。"
    en: "While this move is in\nuse, it gains attack\npower each time the\nuser is hit in battle."
    fr: "Une fois activée,\ncette capacité gagne\nen efficacité à mesure\nque le lanceur subit\ndes dégâts."
    it: "Diventa sempre più\npotente ogni volta\nche chi la usa è\ncolpito in una lotta."
    de: "Erhöht Angriff des\nAnwenders bei jedem\ngegnerischen Treffer."
    es: "Cuando se usa,\nsu fuerza de ataque\naumenta cada vez\nque te golpean."
    ko: "기술을 썼을 때\n공격을 받으면\n분노의 힘으로\n주는 데미지가\n올라간다."
rain_dance:
  names:
    jp_kana: あまごい
    en: Rain Dance
    fr: Danse Pluie
    it: Pioggiadanza
    de: Regentanz
    es: Danza Lluvia
    ko: 비바라기
  descriptions:
    jp_kana: "５ターンの　あいだ\nあめを　ふらせて\nみずタイプの\nわざの　いりょくを\nあげる。"
    en: "The user summons a\nheavy rain that falls\nfor five turns,\npowering up Water-\ntype moves."
    fr: "Invoque de fortes\npluies qui durent 5\ntours et améliorent\nles capacités de type\nEau."
    it: "Chi la usa provoca\nuna forte pioggia\nper 5 turni che\npotenzia le mosse\ndi tipo Acqua."
    de: "Anwender erzeugt\nstarken Regen. Die\nStärke von Wasser-\nAttacken erhöht sich\nfünf Runden lang."
    es: "Genera una fuerte\nlluvia que refuerza\nlos ataques de\ntipo Agua durante\n5 turnos."
    ko: "5턴 동안\n비를 내리게 하여\n물타입 기술의\n위력을 올린다."
rapid_spin:
  names:
    jp_kana: こうそくスピン
    en: Rapid Spin
    fr: Tour Rapide
    it: Rapigiro
    de: Turbodreher
    es: Giro Rápido
    ko: 고속스핀
  descriptions:
    jp_kana: "かいてん　こうげき。\nしめつける　まきつく\nやどりぎのタネ\nまきびし　なども\nふきとばせる。"
    en: "A spin attack that\ncan also eliminate\nsuch moves as Bind,\nWrap, Leech Seed,\nand Spikes."
    fr: "Une attaque\ntournoyante pouvant\naussi annuler par ex.\nEtreinte, Ligotage,\nVampigraine ou Picots."
    it: "Attacco rotante che\npuò anche eliminare\nmosse tipo Legatutto,\nAvvolgibotta,\nParassiseme e Punte."
    de: "Trifft den Gegner mit\neiner Dreh-Attacke,\ndie u. a. Klammergriff,\nWickel, Egelsamen\nu. Stachler eliminiert."
    es: "Ataque giratorio\nque puede eliminar\nmovimientos como\nAtadura, Repetición,\nDrenadoras y Púas."
    ko: "회전해서 공격한다.\n조이기, 김밥말이,\n씨뿌리기,\n압정뿌리기 등도\n날려버린다."
razor_leaf:
  names:
    jp_kana: はっぱカッター
    en: Razor Leaf
    fr: Tranch’Herbe
    it: Foglielama
    de: Rasierblatt
    es: Hoja Afilada
    ko: 잎날가르기
  descriptions:
    jp_kana: "はっぱを　とばして\nあいてを　きりつけて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "Sharp-edged leaves\nare launched to slash\nat the foe. It has a\nhigh critical-hit\nratio."
    fr: "Des feuilles aiguisées\ncomme des rasoirs\nentaillent l’ennemi.\nTaux de critiques\nélevé."
    it: "Foglie taglienti\nsferzano il nemico.\nProbabile brutto\ncolpo."
    de: "Trifft Gegner mit\nBlättern. Hohe\nVolltrefferquote."
    es: "Corta con hojas\nafiladas.\nSuele ser crítico."
    ko: "잎사귀를 날려\n상대를 베어\n공격한다.\n급소에 맞을\n확률이 높다."
razor_wind:
  names:
    jp_kana: かまいたち
    en: Razor Wind
    fr: Coupe-Vent
    it: Ventagliente
    de: Klingensturm
    es: V. Cortante
    ko: 칼바람
  descriptions:
    jp_kana: "かぜの　やいばを\nつくり　２ターンめに\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "A two-turn attack.\nBlades of wind hit the\nfoe on the second\nturn. It has a high\ncritical-hit ratio."
    fr: "Attaque en 2 tours.\nDes lames de vent\nfrappent l’ennemi au\n2ᵉ tour. Taux de\ncritiques élevé."
    it: "Chi la usa genera\nun turbine al primo\nturno e attacca al\nsecondo. Probabile\nbrutto colpo."
    de: "Eine Attacke, die\nauf zwei Runden\nbasiert. Hohe\nVolltrefferquote."
    es: "Primer turno:\nprepara.\nSegundo turno:\nataca.\nSuele ser crítico."
    ko: "바람의 칼날을\n만들어 2턴째에\n공격한다.\n급소에 맞을\n확률이 높다."
recover:
  names:
    jp_kana: じこさいせい
    en: Recover
    fr: Soin
    it: Ripresa
    de: Genesung
    es: Recuperación
    ko: HP회복
  descriptions:
    jp_kana: "さいぼうを　さいせい\nさせて　じぶんの\nさいだい　ＨＰの\nはんぶんだけ　ＨＰを\nかいふくする。"
    en: "A self-healing move.\nThe user restores its\nown HP by up to half\nof its max HP."
    fr: "Un soin qui permet au\nlanceur de récupérer\njusqu’à la moitié de\nses PV max."
    it: "Mossa auto-curativa.\nChi la usa recupera\nfino a metà dei PS\nmassimi."
    de: "Eine Selbstheilung.\nKP des Anwenders\nwerden mit 50 % d.\nmax. KP aufgefüllt."
    es: "Restaura hasta la\nmitad de los PS\nmáximos."
    ko: "세포를 재생시켜\n자신의 최대 HP의\n절반만큼 HP를\n회복한다."
recycle:
  names:
    jp_kana: リサイクル
    en: Recycle
    fr: Recyclage
    it: Riciclo
    de: Aufbereitung
    es: Reciclaje
    ko: 리사이클
  descriptions:
    jp_kana: "せんとうちゅうに\nつかって　なくなった\nじぶんの　もちものを\nさいせい　させて\nつかえるように　する。"
    en: "The user recycles a\nsingle-use item that\nhas been used in\nbattle so it can be\nused again."
    fr: "Recycle un objet à\nusage unique déjà\nutilisé lors du combat\npour pouvoir l’utiliser\nà nouveau."
    it: "Chi la usa ricicla\ne riutilizza uno\nstrumento monouso\ngià usato nella lotta."
    de: "Recycling eines\nverwendeten Items."
    es: "Recicla un objeto de\nun solo uso empleado\nen combate para\nvolver a utilizarlo."
    ko: "배틀 중에\n사용하여 없어진\n자신의 지닌 물건을\n재생시켜\n사용할 수 있게 한다."
reflect:
  names:
    jp_kana: リフレクター
    en: Reflect
    fr: Protection
    it: Riflesso
    de: Reflektor
    es: Reflejo
    ko: 리플렉터
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　かべで\nあいてから　うける\nぶつり　こうげきの\nダメージを　よわめる。"
    en: "A wondrous wall of\nlight is put up to\nsuppress damage from\nphysical attacks for\nfive turns."
    fr: "Un fabuleux mur de\nlumière qui réduit les\ndégâts causés par les\nattaques physiques\ndurant 5 tours."
    it: "Innalza una barriera\ndi luce meravigliosa\nper ridurre i danni\ndegli attacchi fisici\nper 5 turni."
    de: "Lichtwand, die fünf\nRunden den Schaden\nvon physischen gegn.\nTreffern reduziert."
    es: "Pared de luz que\nreduce durante\n5 turnos el daño\nproducido por los\nataques físicos."
    ko: "5턴 동안\n이상한 장막으로\n상대로부터 받는\n물리공격의 데미지를\n약하게 한다."
refresh:
  names:
    jp_kana: リフレッシュ
    en: Refresh
    fr: Régénération
    it: Rinfrescata
    de: Heilung
    es: Alivio
    ko: 리프레쉬
  descriptions:
    jp_kana: "からだを　やすめて\nじぶんが　おっている\nどく　まひ　やけどの\nじょうたい　いじょうを\nなおす。"
    en: "The user rests\nto cure itself of a\npoisoning, burn, or\nparalysis."
    fr: "Le lanceur se\nrepose pour guérir\nd’un empoisonnement,\nd’une brûlure ou\nd’une paralysie."
    it: "Chi la usa riposa\nper curarsi da\navvelenamento,\nparalisi e\nscottatura."
    de: "Selbstheilung bei\nVergiftung, \nParalyse und\nVerbrennung."
    es: "Descansa para\ncurar parálisis,\nenvenenamientos\ny quemaduras."
    ko: "몸을 쉬게 하여\n자신이 입은\n독, 마비, 화상의\n상태 이상을\n치료한다."
rest:
  names:
    jp_kana: ねむる
    en: Rest
    fr: Repos
    it: Riposo
    de: Erholung
    es: Descanso
    ko: 잠자기
  descriptions:
    jp_kana: "２ターンの　あいだ\nねむり　つづける。\nＨＰと　からだの\nいじょうを　すべて\nかいふくする。"
    en: "The user goes to\nsleep for two turns.\nIt fully restores the\nuser’s HP and heals\nany status problem."
    fr: "Le lanceur dort\npendant 2 tours. Il\nregagne tous ses PV\net n’a plus de\nproblèmes de statut."
    it: "Chi la usa dorme per\n2 turni. Recupera,\nperò, tutti i PS e\nrisolve tutti i suoi\nproblemi di stato."
    de: "Anwender schläft\nzwei Runden, um\nKP und Status voll\nzu erneuern."
    es: "Te duerme durante\n2 turnos para\ncurarte totalmente."
    ko: "2턴 동안\n계속 잠잔다.\nHP와 몸의\n이상을 모두\n회복한다."
return:
  names:
    jp_kana: おんがえし
    en: Return
    fr: Retour
    it: Ritorno
    de: Rückkehr
    es: Retroceso
    ko: 은혜갚기
  descriptions:
    jp_kana: "トレーナーの　ために\nぜんりょくで　あいてを\nこうげきする。\nなついて　いるほど\nいりょくは　あがる。"
    en: "A full-power attack\nthat grows more\npowerful the more\nthe user likes its\nTrainer."
    fr: "Une attaque furieuse\ndont la puissance\naugmente quand le\nPokémon apprécie\nson Dresseur."
    it: "Mossa molto potente\nche infligge maggiori\ndanni se chi la usa\nè amico del suo\nAllenatore."
    de: "Angriff, dessen Kraft\nbei Freundschaft zum\nTrainer größer wird."
    es: "Cuanto mayor sea\nla amistad con el\nentrenador, más\npoderoso será\neste ataque."
    ko: "트레이너를 위해\n전력으로 상대를\n공격한다.\n친밀할수록\n위력이 올라간다."
revenge:
  names:
    jp_kana: リベンジ
    en: Revenge
    fr: Vendetta
    it: Vendetta
    de: Vergeltung
    es: Desquite
    ko: 리벤지
  descriptions:
    jp_kana: "あいてから　わざを\nうけていると　その\nあいてに　たいして\nあたえる　ダメージが\n２ばいに　なる。"
    en: "An attack move that\ninflicts double the\ndamage if the user\nhas been hurt by the\nfoe in the same turn."
    fr: "Une attaque deux fois\nplus puissante\nsi le lanceur a été\nblessé par l’ennemi\ndurant ce tour."
    it: "Mossa d’attacco che\ninfligge un danno\ndoppio se si è stati\ncolpiti dal nemico\nnello stesso turno."
    de: "Schaden verdoppelt\nsich, wenn Anwender\nin der Runde bereits\nSchaden von diesem\nGegner genommen hat."
    es: "Ataque que produce\ndoble daño si el\nenemigo te hiere en\nel mismo turno."
    ko: "상대에게\n기술을 받으면\n그 상대에게\n주는 데미지가\n2배가 된다."
reversal:
  names:
    jp_kana: きしかいせい
    en: Reversal
    fr: Contre
    it: Contropiede
    de: Gegenschlag
    es: Inversión
    ko: 기사회생
  descriptions:
    jp_kana: "ちからを　ふりしぼり\nこうげきする。\nじぶんの　ＨＰが\nすくないほど　わざの\nいりょくは　あがる。"
    en: "An all-out attack\nthat becomes more\npowerful the less\nHP the user has."
    fr: "Le lanceur ne retient\nplus ses coups. Plus\nses PV sont bas et\nplus l’attaque est\npuissante."
    it: "Attacco accanito\nche diventa più\npotente se i PS\ndi chi la usa\nsono bassi."
    de: "Richtet mehr\nSchaden an,\nwenn eigene KP\nniedrig sind."
    es: "Ataque desesperado\nque causa más daño\ncuantos menos PS\ntenga el usuario."
    ko: "힘을 쥐어짜서\n공격한다.\n자신의 HP가\n적을수록 기술의\n위력이 올라간다."
roar:
  names:
    jp_kana: ほえる
    en: Roar
    fr: Hurlement
    it: Boato
    de: Brüller
    es: Rugido
    ko: 울부짖기
  descriptions:
    jp_kana: "あいてを　にがして\nひかえの　ポケモンを\nひきずりだす。\nやせいの　ばあいは\nせんとうが　おわる。"
    en: "The foe is scared off,\nto be replaced by\nanother Pokémon in\nits party. In the\nwild, the battle ends."
    fr: "Effraie le Pokémon\nennemi et le remplace\npar un autre. Dans la\nnature, met fin au\ncombat."
    it: "Il nemico è costretto\na lasciare la lotta e\nviene sostituito. Se\nè selvatico, la lotta\nfinisce."
    de: "Verjagt den Gegner\nund ersetzt ihn durch\nanderes Pokémon.\nBeendet den Kampf in\nder Wildnis."
    es: "Se lleva al rival, que\nes cambiado por otro\nPokémon. Si es un\nPokémon salvaje,\nacaba el combate."
    ko: "상대를 도망가게 해서\n교대할 포켓몬을\n끌어낸다.\n야생의 경우에는\n배틀이 끝난다."
roar_of_time:
  names:
    jp_kana: ときのほうこう
    en: Roar of Time
    fr: Hurle-Temps
    it: Fragortempo
    de: Zeitenlärm
    es: Distorsión
    ko: 시간의포효
  descriptions:
    jp_kana: "じかんが　ゆがむほどの\nきょだいな　ちからを\nうちだして　こうげき。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The user blasts the\nfoe with power that\ndistorts even time.\nThe user must rest\non the next turn."
    fr: "Le lanceur frappe\nsi fort qu’il affecte\nle cours du temps.\nIl se repose au\ntour suivant."
    it: "Chi la usa colpisce il\nnemico con una forza\ncapace di alterare il\ntempo, ma deve stare\nfermo il turno dopo."
    de: "Anwender attackiert\nmit einer Kraft, die\nselbst die Zeit ver-\nzerrt. In der nächst.\nRunde muss er ruhen."
    es: "Ataca al rival usando\ntal energía que el\ntiempo se distorsiona.\nEl agresor descansa\nel siguiente turno."
    ko: "시간이 뒤틀릴 정도로\n거대한 힘을\n사용해서 공격한다.\n다음 턴은\n움직일 수 없다."
rock_blast:
  names:
    jp_kana: ロックブラスト
    en: Rock Blast
    fr: Boule Roc
    it: Cadutamassi
    de: Felswurf
    es: Pedrada
    ko: 락블레스트
  descriptions:
    jp_kana: "かたい　がんせきを\nあいてに　はっしゃして\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "The user hurls hard\nrocks at the foe.\nTwo to five rocks are\nlaunched in quick\nsuccession."
    fr: "Le lanceur projette\nun rocher sur\nl’ennemi 2 à 5 fois\nd’affilée."
    it: "Colpisce il nemico\ncon 2-5 massi\npesanti lanciati in\nrapida successione."
    de: "Wirft 2 - 5-mal in\nFolge Felsblöcke\nauf den Gegner."
    es: "Lanza pedruscos\nal rival de 2 a 5\nveces consecutivas."
    ko: "단단한 암석을\n상대에게 발사하여\n공격한다.\n2-5회 동안\n연속으로 쓴다."
rock_climb:
  names:
    jp_kana: ロッククライム
    en: Rock Climb
    fr: Escalade
    it: Scalaroccia
    de: Kraxler
    es: Treparrocas
    ko: 락클라임
  descriptions:
    jp_kana: "とっしん　こうげきで\nあいてを　こんらん\nさせることが　ある。\nごつごつした　かべを\nのぼることも　できる。"
    en: "A charging attack\nthat may also leave\nthe foe confused.\nIt can also be used\nto scale rocky walls."
    fr: "Charge pouvant\nrendre l’ennemi\nconfus. Permet aussi\nd’escalader des\nparois rocheuses."
    it: "Carica che può\nconfondere il nemico.\nSi può usare anche\nper scalare pareti\nrocciose."
    de: "Eine stürmische\nAttacke, die d. Gegn.\neventuell verwirrt.\nSo lassen sich auch\nFelswände erklimmen."
    es: "Ataque de derribo\nque puede confundir\nal rival. También sirve\npara trepar por\nparedes escarpadas."
    ko: "돌진 공격으로\n상대를 혼란\n시킬 때가 있다.\n울퉁불퉁한 벽을\n오를 수도 있다."
rock_polish:
  names:
    jp_kana: ロックカット
    en: Rock Polish
    fr: Poliroche
    it: Lucidatura
    de: Steinpolitur
    es: Pulimento
    ko: 록커트
  descriptions:
    jp_kana: "からだを　みがいて\nくうきの　ていこうを\nすくなくする。\nすばやさを　ぐーんと\nあげることが　できる。"
    en: "The user polishes its\nbody to reduce drag.\nIt can sharply raise\nthe Speed stat."
    fr: "Le lanceur polit son\ncorps pour diminuer sa\nrésistance au vent.\nPeut augmenter\nfortement la Vitesse."
    it: "Chi la usa leviga\nil proprio corpo per\nridurre l’attrito.\nAumenta di molto\nla Velocità."
    de: "Anwender reduziert\nso gut wie möglich\nden Luftwiderstand.\nSteigert Initiative\nenorm."
    es: "Reduce la resistencia\npuliendo su cuerpo.\nAumenta la Velocidad\nconsiderablemente."
    ko: "몸을 닦아\n공기의 저항을\n적게 한다.\n스피드를 크게\n올릴 수 있다."
rock_slide:
  names:
    jp_kana: いわなだれ
    en: Rock Slide
    fr: Eboulement
    it: Frana
    de: Steinhagel
    es: Avalancha
    ko: 스톤샤워
  descriptions:
    jp_kana: "おおきな　いわを\nはげしく　ぶつけて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "Large boulders are\nhurled at the foe to\ninflict damage.\nIt may also make the\ntarget flinch."
    fr: "Envoie de gros\nrochers sur l’ennemi\npour infliger des\ndégâts. Peut aussi\nl’apeurer."
    it: "Il nemico viene\ncolpito da grandi\nmassi che possono\nanche farlo\ntentennare."
    de: "Schleudert riesige\nFelsen. Gegner\nschreckt eventuell\nzurück."
    es: "Lanza grandes\npedruscos. Puede\nhacer retroceder\nal enemigo."
    ko: "큰 바위를\n세차게 부딪쳐서\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
rock_smash:
  names:
    jp_kana: いわくだき
    en: Rock Smash
    fr: Eclate-Roc
    it: Spaccaroccia
    de: Zertrümmerer
    es: Golpe Roca
    ko: 바위깨기
  descriptions:
    jp_kana: "いわを　くだくような\nパンチで　あいてを\nこうげきする。\nひびわれた　いわも\nこわせる。"
    en: "The user slugs the\nfoe with a shattering\npunch.\nIt can also smash\ncracked boulders."
    fr: "Le lanceur porte un\ncoup dévastateur à\nl’ennemi. Permet aussi\nde briser des rochers\nfissurés."
    it: "Colpisce il nemico\ncon un pugno\ndevastante. Può\nanche frantumare\nrocce crepate."
    de: "Zertrümmernder\nAngriff auf den\nGegner.\nKann auch Steine\nzertrümmern."
    es: "Ataque demoledor.\nFuera de combate\npuede machacar\nrocas."
    ko: "바위를 깨는 듯한\n펀치로 상대를\n공격한다.\n금이 간 바위도\n부술 수 있다."
rock_throw:
  names:
    jp_kana: いわおとし
    en: Rock Throw
    fr: Jet-Pierres
    it: Sassata
    de: Steinwurf
    es: Lanzarrocas
    ko: 돌떨구기
  descriptions:
    jp_kana: "ちいさな　いわを\nもちあげて　あいてに\nなげつけて\nこうげきする。"
    en: "The user picks up\nand throws a small\nrock at the foe to\nattack."
    fr: "Le lanceur lâche une\npierre sur l’ennemi."
    it: "Chi la usa solleva\nuna roccia e la\nlancia contro\nil nemico."
    de: "Der Gegner wird\nmit einem Stein\nbeworfen."
    es: "Tira pequeñas rocas\nal enemigo."
    ko: "작은 바위를\n들어올려 상대에게\n내던져서\n공격한다."
rock_tomb:
  names:
    jp_kana: がんせきふうじ
    en: Rock Tomb
    fr: Tomberoche
    it: Rocciotomba
    de: Felsgrab
    es: Tumba Rocas
    ko: 암석봉인
  descriptions:
    jp_kana: "がんせきを　なげつけて\nこうげきする。\nあいての　うごきを\nふうじることで\nすばやさを　さげる。"
    en: "Boulders are hurled\nat the foe. It also\nlowers the foe’s\nSpeed by preventing\nits movement."
    fr: "Des rochers frappent\nl’ennemi. Réduit aussi\nsa Vitesse en\nl’empêchant de\nse déplacer."
    it: "Colpisce il nemico\ncon rocce. Inoltre,\nlo rallenta riducen-\ndone la Velocità."
    de: "Angriff mit Felsen.\nBei Erfolg wird\nder Initiative-Wert\ndes Gegners gesenkt."
    es: "Tira rocas que\ndetienen al rival y\nbajan su Velocidad."
    ko: "암석을 내던져서\n공격한다.\n상대의 움직임을\n봉인함으로써\n스피드를 떨어뜨린다."
rock_wrecker:
  names:
    jp_kana: がんせきほう
    en: Rock Wrecker
    fr: Roc-Boulet
    it: Devastomasso
    de: Felswerfer
    es: Romperrocas
    ko: 암석포
  descriptions:
    jp_kana: "きょだいな　いわを\nあいてに　はっしゃして\nこうげきする。\nつぎの　ターンは\nうごけなく　なる。"
    en: "The user launches a\nhuge boulder at the\nfoe to attack.\nIt must rest on the\nnext turn, however."
    fr: "Le lanceur attaque en\nprojetant un gros\nrocher sur l’ennemi.\nIl doit se reposer au\ntour suivant."
    it: "Chi la usa attacca\nil nemico con un\nenorme masso, ma\nsi deve riposare al\nturno successivo."
    de: "Anwender wirft einen\nriesigen Felsen auf\nden Gegner. In der\nnächsten Runde muss\nder Anw. ausruhen."
    es: "Lanza una piedra\nenorme contra el\nrival, pero tiene\nque descansar el\nsiguiente turno."
    ko: "거대한 바위를\n상대에게 발사하여\n공격한다.\n다음 턴은\n움직일 수 없게 된다."
role_play:
  names:
    jp_kana: なりきり
    en: Role Play
    fr: Imitation
    it: Giocodiruolo
    de: Rollentausch
    es: Imitación
    ko: 역할
  descriptions:
    jp_kana: "あいてに　なりきって\nじぶんも　あいてと\nおなじ　とくせいに\nへんかする。"
    en: "The user mimics the\nfoe completely,\ncopying the foe’s\nnatural ability."
    fr: "Imite l’ennemi et\ncopie sa capacité\nspéciale."
    it: "Chi la usa mima\nin tutto il nemico,\ncopiandone l’abilità\nspeciale."
    de: "Parodiert Gegner\nund kopiert seine\nSpezialfähigkeit."
    es: "Imita al rival por\ncompleto y copia\nsu habilidad."
    ko: "상대의 역할을 하여\n자신도 상대와\n같은 특성으로\n변화한다."
rolling_kick:
  names:
    jp_kana: まわしげり
    en: Rolling Kick
    fr: Mawashi Geri
    it: Calciorullo
    de: Fegekick
    es: Patada Giro
    ko: 돌려차기
  descriptions:
    jp_kana: "からだを　すばやく\nかいてん　させながら\nあいてを　けとばして\nこうげきする。"
    en: "The user cuts a\nquick spin and lashes\nout with a sharp\nkick."
    fr: "Le lanceur effectue\nun coup de pied\ntournoyant et\nextrêmement rapide."
    it: "Chi la usa infierisce\nsul nemico con una\nrotazione e poi un\nforte calcio."
    de: "Heftiger Tritt\naus einer schnellen\nDrehbewegung."
    es: "Una patada rápida\ny circular."
    ko: "몸을 재빨리\n회전시키며\n상대를 걷어차서\n공격한다."
rollout:
  names:
    jp_kana: ころがる
    en: Rollout
    fr: Roulade
    it: Rotolamento
    de: Walzer
    es: Desenrollar
    ko: 구르기
  descriptions:
    jp_kana: "５ターンの　あいだ\nころがりつづけて\nこうげきする。\nわざが　あたる　たびに\nいりょくが　あがる。"
    en: "The user continually\nrolls into the foe\nover five turns. It\nbecomes stronger\neach time it hits."
    fr: "Un rocher roule sur\nl’ennemi pendant 5\ntours. L’attaque \ngagne en puissance\nà chaque coup."
    it: "Chi la usa colpisce il\nnemico con un masso\nper 5 turni, con\naumento progressivo\ndella potenza."
    de: "Attacke, die fünf\nRunden dauert.\nDie Härte nimmt\nvon Mal zu Mal zu."
    es: "El atacante rueda\ncontra el rival\ndurante 5 turnos,\ncada vez con mayor\nfuerza."
    ko: "5턴 동안\n구르기를 반복하여\n공격한다.\n기술이 맞을 때마다\n위력이 올라간다."
roost:
  names:
    jp_kana: はねやすめ
    en: Roost
    fr: Atterrissage
    it: Trespolo
    de: Ruheort
    es: Respiro
    ko: 날개쉬기
  descriptions:
    jp_kana: "じめんに　おりて\nからだを　やすめる。\nさいだい　ＨＰの\nはんぶんだけ　ＨＰを\nかいふくする。"
    en: "The user lands and\nrests its body.\nIt restores the\nuser’s HP by up to\nhalf of its max HP."
    fr: "Le lanceur atterrit\net se repose.\nRestaure jusqu’à la\nmoitié de ses PV\nmaximum."
    it: "Chi la usa sta fermo\ne riposa. Recupera\nfino a metà dei suoi\nPS massimi."
    de: "Anwender landet und\nruht sich aus. Max.\ndie Hälfte der KP\nwerden so\nregeneriert."
    es: "Aterriza sobre la\nsuperficie para\ndescansar.\nRecupera como máximo\nla mitad de los PS."
    ko: "땅에 내려와\n몸을 쉬게 한다.\n최대 HP의\n절반만큼 HP를\n회복한다."
sacred_fire:
  names:
    jp_kana: せいなるほのお
    en: Sacred Fire
    fr: Feu Sacré
    it: Magifuoco
    de: Läuterfeuer
    es: Fuegosagrado
    ko: 성스러운불꽃
  descriptions:
    jp_kana: "しんぴの　ほのおで\nあいてを　やきつくして\nこうげきする。\nやけど　じょうたいに\nすることが　ある。"
    en: "The foe is razed with\na mystical fire of\ngreat intensity.\nIt may also leave the\ntarget with a burn."
    fr: "Un feu mystique\nd’une intensité\nredoutable attaque\nl’ennemi. Peut aussi\nle brûler."
    it: "Colpisce il nemico con\nun fuoco mistico di\nenorme intensità che\npuò anche causargli\nuna scottatura."
    de: "Mystische Feuer-\nAttacke, die den\nGegner eventuell\nverbrennt."
    es: "Fuego místico de\ngran intensidad\nque puede causar\nquemaduras."
    ko: "신비한 불꽃으로\n상대를 태워서\n공격한다.\n화상 상태로\n만들 때가 있다."
safeguard:
  names:
    jp_kana: しんぴのまもり
    en: Safeguard
    fr: Rune Protect
    it: Salvaguardia
    de: Bodyguard
    es: Velo Sagrado
    ko: 신비의부적
  descriptions:
    jp_kana: "５ターンの　あいだ\nふしぎな　ちからに\nまもられて\nじょうたい　いじょうに\nならなくなる。"
    en: "The user creates a\nprotective field that\nprevents status\nproblems for five\nturns."
    fr: "Champ protecteur\nempêchant les pro-\nblèmes de statut tels\nque poison, paralysie,\nbrûlure et sommeil."
    it: "Chi la usa crea un\ncampo protettivo che\ndifende la squadra\ndai problemi di stato\nper 5 turni."
    de: "Team des Anwenders\nist fünf Runden vor\nStatusproblemen\ngeschützt."
    es: "Crea un campo\nprotector que evita\nproblemas de estado\ndurante 5 turnos."
    ko: "5턴 동안\n이상한 힘의\n보호를 받아\n상태 이상이\n되지 않는다."
sand_attack:
  names:
    jp_kana: すなかけ
    en: Sand-Attack
    fr: Jet de Sable
    it: Turbosabbia
    de: Sandwirbel
    es: Ataque Arena
    ko: 모래뿌리기
  descriptions:
    jp_kana: "あいての　かおに\nすなを　かけて　\nめいちゅうりつを　\nさげる。"
    en: "Sand is hurled in the\nfoe’s face, reducing\nits accuracy."
    fr: "Lance du sable au\nvisage de l’ennemi \npour baisser sa\nprécision."
    it: "Getta sabbia in faccia\nal nemico e ne riduce\nla precisione."
    de: "Senkt Genauigkeit\ndes Gegners, indem\nihm Sand ins Gesicht\ngeworfen wird."
    es: "Arroja arena a la\ncara y baja la\nprecisión."
    ko: "상대의 얼굴에\n모래를 뿌려서\n명중률을\n떨어뜨린다."
sand_tomb:
  names:
    jp_kana: すなじごく
    en: Sand Tomb
    fr: Tourbi-Sable
    it: Sabbiotomba
    de: Sandgrab
    es: Bucle Arena
    ko: 모래지옥
  descriptions:
    jp_kana: "はげしく　ふきあれる\nすなあらしの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめて\nこうげきする。"
    en: "The user traps the\nfoe inside a harshly\nraging sandstorm for\ntwo to five turns."
    fr: "Le lanceur emprisonne\nl’ennemi dans une\ntempête de sable\nterrifiante qui dure\nde 2 à 5 tours."
    it: "Chi la usa intrappola\nil nemico in una\nforte tempesta di\nsabbia per 2-5 turni."
    de: "Gegner leidet für\nzwei bis fünf\nRunden in\nSandhose."
    es: "Enreda en un\nremolino de arena\nde 2 a 5 turnos."
    ko: "세차게 불어대는\n모래바람 속에\n2-5턴 동안\n상대를 가두어\n공격한다."
sandstorm:
  names:
    jp_kana: すなあらし
    en: Sandstorm
    fr: Tempêtesable
    it: Terrempesta
    de: Sandsturm
    es: Torm. Arena
    ko: 모래바람
  descriptions:
    jp_kana: "５ターンの　あいだ\nすなあらしで　いわ\nじめん　はがねタイプ\nいがいの　ポケモンに\nダメージを　あたえる。"
    en: "A five-turn sand-\nstorm is summoned\nto hurt all combatant\ntypes except Rock, \nGround, and Steel."
    fr: "Une tempête de sable\nde 5 tours qui blesse\ntous les Pokémon sauf\nles types Roche, Sol\net Acier."
    it: "Causa una tempesta di\nsabbia per 5 turni che\ndanneggia tutti i tipi\nin campo tranne Ter-\nra, Roccia e Acciaio."
    de: "Sandsturm für fünf\nRunden. Kein Effekt\nbei Gestein, Boden\nund Stahl."
    es: "Tormenta de arena\nque dura 5 turnos\ny hiere a todos,\nexcepto a los tipos\nRoca, Tierra y Acero."
    ko: "5턴 동안\n모래바람으로 바위,\n땅, 강철타입\n이외의 포켓몬에게\n데미지를 준다."
scary_face:
  names:
    jp_kana: こわいかお
    en: Scary Face
    fr: Grimace
    it: Visotruce
    de: Grimasse
    es: Cara Susto
    ko: 겁나는얼굴
  descriptions:
    jp_kana: "おそろしい　かおで\nにらみ　おびえさせて\nあいての　すばやさを\nがくっと　さげる。"
    en: "The user frightens\nthe foe with a scary\nface to sharply\nreduce its Speed\nstat."
    fr: "Une grimace qui\neffraie l’ennemi et\nréduit fortement\nsa Vitesse."
    it: "Chi la usa spaventa\nil nemico con una\nfaccia terribile e ne\nriduce di molto\nla Velocità."
    de: "Erschreckt Gegner\nmit einer Grimasse. \nDer Initiative-Wert\nsinkt deutlich."
    es: "Asusta al enemigo\npara reducir mucho\nsu Velocidad."
    ko: "무서운 얼굴로\n노려보고 겁주어\n상대의 스피드를\n크게 떨어뜨린다."
scratch:
  names:
    jp_kana: ひっかく
    en: Scratch
    fr: Griffe
    it: Graffio
    de: Kratzer
    es: Arañazo
    ko: 할퀴기
  descriptions:
    jp_kana: "かたく　とがった\nするどい　ツメで\nあいてを　ひっかいて\nこうげきする。"
    en: "Hard, pointed, and\nsharp claws rake the\nfoe to inflict damage."
    fr: "Lacère l’ennemi avec\ndes griffes acérées\npour lui infliger des\ndégâts."
    it: "Infligge danni al\nnemico con artigli\nacuminati, duri e\naffilati."
    de: "Der Gegner wird\nmit scharfen\nKlauen zerkratzt."
    es: "Araña con afiladas\ngarras."
    ko: "단단하고 뾰족한\n날카로운 손톱으로\n상대를 할퀴어서\n공격한다."
screech:
  names:
    jp_kana: いやなおと
    en: Screech
    fr: Grincement
    it: Stridio
    de: Kreideschrei
    es: Chirrido
    ko: 싫은소리
  descriptions:
    jp_kana: "おもわず　みみを\nふさぎたくなる\nいやなおとを　だして\nあいての　ぼうぎょを\nがくっと　さげる。"
    en: "An earsplitting\nscreech is emitted to\nsharply reduce the\nfoe’s Defense stat."
    fr: "Cri strident qui baisse\nbeaucoup la Défense\nennemie."
    it: "Stridio assordante\nche riduce di molto\nla Difesa del\nnemico."
    de: "Stößt einen Schrei\naus, um gegnerische\nVerteidigung zu\nsenken."
    es: "Alarido agudo que\nreduce mucho la\nDefensa del rival."
    ko: "그만 귀를\n막아버리고 싶은\n싫은 소리를 내어\n상대의 방어를\n크게 떨어뜨린다."
secret_power:
  names:
    jp_kana: ひみつのちから
    en: Secret Power
    fr: Force Cachée
    it: Forzasegreta
    de: Geheimpower
    es: Daño Secreto
    ko: 비밀의힘
  descriptions:
    jp_kana: "ひみつの　ちからで\nこうげきする。\nつかう　ばしょで\nついかこうかが\nへんかする。"
    en: "The user attacks with\na secret power. Its\nadded effects vary\ndepending on the\nuser’s environment."
    fr: "Les effets de cette\nattaque varient en\nfonction de\nl’environnement."
    it: "Attacco che può avere\nun effetto aggiuntivo\na seconda del luogo\nin cui si trova chi\nlo usa."
    de: "Angriff, der abhängig\nvom Ort noch einen\nZusatzeffekt hat."
    es: "Ataque con poder\nsecreto cuyos\nefectos varían según\nla zona."
    ko: "비밀의 힘으로\n공격한다.\n사용 장소에 따라\n추가효과가\n변화한다."
seed_bomb:
  names:
    jp_kana: タネばくだん
    en: Seed Bomb
    fr: Canon Graine
    it: Semebomba
    de: Samenbomben
    es: Bomba Germen
    ko: 씨폭탄
  descriptions:
    jp_kana: "かたい　からを　もつ\nおおきな　タネを\nうえから　たたきつけて\nこうげきする。"
    en: "The user slams a\nbarrage of hard-\nshelled seeds\ndown on the foe\nfrom above."
    fr: "Le lanceur fait \npleuvoir un déluge\nde graines solides\nsur l’ennemi."
    it: "Chi la usa emette una\nraffica di semi dal\nguscio duro che\ncolpiscono il nemico\ndall’alto."
    de: "Anwender lässt eine\nMenge Samen mit\nharter Schale von\noben auf den\nGegner fallen."
    es: "Lanza al enemigo\nuna descarga de\nsemillas explosivas\ndesde arriba."
    ko: "단단한 껍질을 가지고\n있는 큰 씨앗을\n힘껏 내던져\n공격한다."
seed_flare:
  names:
    jp_kana: シードフレア
    en: Seed Flare
    fr: Fulmigraine
    it: Infuriaseme
    de: Schocksamen
    es: Fogonazo
    ko: 시드플레어
  descriptions:
    jp_kana: "からだの　なかから\nしょうげきはを\nはっせい　させる。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user generates\na shock wave from\nwithin its body.\nIt may also lower the\ntarget’s Sp. Def."
    fr: "Le corps du lanceur\német une onde de\nchoc. Peut aussi\nbaisser la Déf. Spé.\nde la cible."
    it: "Chi la usa genera\nun’onda d’urto dal\nsuo corpo. Può anche\nridurre la Dif. Sp.\ndel Pokémon colpito."
    de: "Anwender erzeugt eine\nSchockwelle, die auch\nSpezial-Verteidigung\nsenkt."
    es: "Una onda de choque\nse libera del cuerpo.\nPuede bajar la Def.\nEsp. del objetivo."
    ko: "몸속에서\n충격파를\n발생시킨다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
seismic_toss:
  names:
    jp_kana: ちきゅうなげ
    en: Seismic Toss
    fr: Frappe Atlas
    it: Mov. Sismico
    de: Geowurf
    es: Mov. Sísmico
    ko: 지구던지기
  descriptions:
    jp_kana: "いんりょくを　つかい\nなげとばす。\nじぶんの　レベルと\nおなじ　ダメージを\nあいてに　あたえる。"
    en: "The foe is thrown\nusing the power of\ngravity. It inflicts\ndamage equal to\nthe user’s level."
    fr: "L’ennemi est projeté\ngrâce au pouvoir de \nla gravité. Inflige des\ndégâts équivalents au\nniveau du lanceur."
    it: "Colpisce il nemico con\nla forza di gravità.\nInfligge un danno\npari al livello di\nchi la usa."
    de: "Gegner wird mit der\nKraft der Gravitation\numgeworfen. Richtet\nSchaden gemäß Level\ndes Angreifers an."
    es: "La gravedad derriba\nal enemigo. Se\nrestarán tantos\nPS como nivel tenga\nel agresor."
    ko: "인력을 사용해\n내던진다.\n자신의 레벨과\n똑같은 데미지를\n상대에게 준다."
self_destruct:
  names:
    jp_kana: じばく
    en: Selfdestruct
    fr: Destruction
    it: Autodistruz.
    de: Finale
    es: Autodestruc
    ko: 자폭
  descriptions:
    jp_kana: "ばくはつを　おこして\nまわりに　いるものを\nすべて　こうげきする。\nつかった　あとに\nひんしに　なる。"
    en: "The user blows up to\ninflict damage on all\nPokémon in battle.\nThe user faints upon\nusing this move."
    fr: "Le lanceur explose\nen blessant tous les\nautres Pokémon au\ncombat. Le lanceur\ntombe K.O."
    it: "Chi la usa esplode\ne infligge danni\nagli altri Pokémon\nin campo, ma poi \nva KO."
    de: "Anwender sprengt\nsich, richtet\nRiesenschaden an und\nwird dabei besiegt."
    es: "El atacante explota\ny hiere a todos los\ncontendientes. El\nusuario se debilita\nde inmediato."
    ko: "폭발을 일으켜서\n주위에 있는\n모두를 공격한다.\n쓰고 나서\n기절하게 된다."
shadow_ball:
  names:
    jp_kana: シャドーボール
    en: Shadow Ball
    fr: Ball’Ombre
    it: Palla Ombra
    de: Spukball
    es: Bola Sombra
    ko: 섀도볼
  descriptions:
    jp_kana: "くろいかげの\nかたまりを　なげつけて\nこうげきする。\nあいての　とくぼうを\nさげることが　ある。"
    en: "The user hurls a\nshadowy blob at the\nfoe. It may also\nlower the foe’s\nSp. Def stat."
    fr: "Projette une grande\nombre sur l’ennemi.\nPeut aussi faire\nbaisser sa Déf. Spé."
    it: "Lancia sul nemico\nuna sfera nera.\nPuò anche ridurne\nla Dif. Sp."
    de: "Bewirft Gegner mit\ngruseligem Ball und\nsenkt eventuell die\nSpezial-Verteidigung."
    es: "Lanza una bola\noscura que puede\nbajar la Def. Esp."
    ko: "까만 그림자의\n덩어리를 내던져서\n공격한다.\n상대의 특수방어를\n떨어뜨릴 때가 있다."
shadow_claw:
  names:
    jp_kana: シャドークロー
    en: Shadow Claw
    fr: Griffe Ombre
    it: Ombrartigli
    de: Dunkelklaue
    es: Garra Umbría
    ko: 섀도크루
  descriptions:
    jp_kana: "かげから　つくった\nするどい　ツメで\nあいてを　きりさく。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user slashes with\na sharp claw made\nfrom shadows.\nIt has a high\ncritical-hit ratio."
    fr: "Attaque avec une\ngriffe puissante faite\nd’ombres. Taux de\ncritiques élevé."
    it: "Chi la usa attacca\ncon artigli d’ombra\nche colpiscono con\ngran forza. Probabile\nbrutto colpo."
    de: "Gegner wird mit\nscharfen Klauen aus\nder Schattenwelt\nattackiert. Hohe\nVolltrefferquote."
    es: "Ataca con una garra\nafilada hecha de\nsombras.\nSuele ser crítico."
    ko: "그림자로 만든\n날카로운 발톱으로\n상대를 베어 가른다.\n급소에 맞을\n확률이 높다."
shadow_force:
  names:
    jp_kana: シャドーダイブ
    en: Shadow Force
    fr: Revenant
    it: Oscurotuffo
    de: Schemenkraft
    es: Golpe Umbrío
    ko: 섀도다이브
  descriptions:
    jp_kana: "１ターンめで　きえて\n２ターンめに　あいてを\nこうげきする。\nまもっていても　\nこうげきは　あたる。"
    en: "The user disappears,\nthen strikes the foe\non the second turn.\nIt hits even if the\nfoe used Protect."
    fr: "Le lanceur disparaît\net frappe l’ennemi au\nsecond tour.\nFonctionne même si\nl’ennemi utilise Abri."
    it: "Chi la usa sparisce e\npoi colpisce il nemico\nal turno successivo.\nColpisce anche chi\nha usato Protezione."
    de: "Anw. verschwindet\nund attackiert in\nRunde 2. Trifft auch,\nwenn Schutzschild\ndes Gegn. aktiv ist."
    es: "En el primer turno,\ndesaparece. En el\nsegundo, golpea al\nrival aunque este\nuse Protección."
    ko: "1턴째에 사라져\n2턴째에 상대를\n공격한다.\n방어하고 있어도\n공격은 맞는다."
shadow_punch:
  names:
    jp_kana: シャドーパンチ
    en: Shadow Punch
    fr: Poing Ombre
    it: Pugnodombra
    de: Finsterfaust
    es: Puño Sombra
    ko: 섀도펀치
  descriptions:
    jp_kana: "かげに　まぎれて\nパンチを　くりだす。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user throws a\npunch at the foe from\nthe shadows.\nThe punch lands\nwithout fail."
    fr: "Le lanceur surgit des\nombres et donne un\ncoup de poing.\nN’échoue jamais."
    it: "Il nemico riceve un\npugno proveniente\ndalle tenebre. Questa\nmossa è infallibile."
    de: "Angriff mit der Faust\naus dem\nSchattenreich.\nAusweichen unmöglich."
    es: "Puñetazo ineludible\nprocedente de las\nsombras."
    ko: "그림자에 섞여\n펀치를 날린다.\n공격은 반드시\n명중한다."
shadow_sneak:
  names:
    jp_kana: かげうち
    en: Shadow Sneak
    fr: Ombre Portée
    it: Furtivombra
    de: Schattenstoß
    es: Sombra Vil
    ko: 야습
  descriptions:
    jp_kana: "かげを　のばして\nあいての　はいごから\nこうげきする。\nかならず　せんせい\nこうげき　できる。"
    en: "The user extends its\nshadow and attacks\nthe foe from behind.\nThis move always goes\nfirst."
    fr: "Le lanceur étend son\nombre pour frapper\npar-derrière. Frappe\ntoujours en premier."
    it: "Chi la usa estende la\nsua ombra e attacca il\nnemico alle spalle.\nCon questa mossa\nsi colpisce per primi."
    de: "Anwender erweitert\nSchatten und greift\nden Gegner von\nhinten an. Erst-\nschlaggarantie."
    es: "Extiende su sombra\ny ataca al rival por\nla espalda.\nEste movimiento\nsiempre va primero."
    ko: "그림자를 늘려\n상대의 배후에서\n공격한다.\n반드시 선제\n공격할 수 있다."
sharpen:
  names:
    jp_kana: かくばる
    en: Sharpen
    fr: Affûtage
    it: Affilatore
    de: Schärfer
    es: Afilar
    ko: 각지기
  descriptions:
    jp_kana: "からだの　かどを\nふやして　カクカクに\nなることで　じぶんの\nこうげきを　あげる。"
    en: "The user reduces its\npolygon count to\nmake itself more\njagged, raising the\nAttack stat."
    fr: "Le lanceur réduit son\nnombre de polygones\npour accentuer ses\nangles et augmenter\nson Attaque."
    it: "Chi la usa riduce\ni poligoni per\ndiventare più\naffilato e aumentare\nl’Attacco."
    de: "Anwender senkt die\nPolygonzahl, um\nKanten zu erzeugen,\ndie den Angriffs-Wert\nerhöhen."
    es: "El perfil del atacante\nse hace más afilado\ny su Ataque mejora."
    ko: "몸의 각을 늘려서\n더욱 각지게 하여\n자신의 공격을\n올린다."
sheer_cold:
  names:
    jp_kana: ぜったいれいど
    en: Sheer Cold
    fr: Glaciation
    it: Purogelo
    de: Eiseskälte
    es: Frío Polar
    ko: 절대영도
  descriptions:
    jp_kana: "ぜったいれいどの\nつめたさで　あいてを\nこうげきする。\nあたれば　いちげきで\nひんしに　する。"
    en: "The foe is attacked\nwith a blast of\nabsolute-zero cold.\nThe foe instantly\nfaints if it hits."
    fr: "Une vague de froid\nglacial frappe\nl’ennemi. S’il est\ntouché, il est mis\nK.O. sur le coup."
    it: "Ondata di freddo\npenetrante che,\nse va a segno, fa\nandare KO il nemico."
    de: "Angriff mit Kälte,\ndie den Gegner\nbei Erfolg besiegt."
    es: "Ataque de frío polar\nque debilita al rival\nsi le alcanza."
    ko: "절대영도의\n추위로 상대를\n공격한다.\n맞으면 일격에\n기절한다."
shock_wave:
  names:
    jp_kana: でんげきは
    en: Shock Wave
    fr: Onde de Choc
    it: Ondashock
    de: Schockwelle
    es: Onda Voltio
    ko: 전격파
  descriptions:
    jp_kana: "でんげきを　すばやく\nあいてに　あびせる。\nこうげきは　かならず\nめいちゅう　する。"
    en: "The user strikes the\nfoe with a quick jolt\nof electricity.\nThis attack cannot be\nevaded."
    fr: "Le lanceur envoie un\nchoc électrique rapide\nà l’ennemi. Impossible\nà esquiver."
    it: "Chi la usa colpisce\nil nemico con una\nscossa di elettricità.\nImpossibile eludere\nquesta mossa."
    de: "Angriff mit schnellem\nElektro-Schlag.\nAusweichen nicht\nmöglich."
    es: "Ataque eléctrico muy\nrápido e ineludible."
    ko: "전격을 재빠르게\n상대에게 날린다.\n공격은 반드시\n명중한다."
signal_beam:
  names:
    jp_kana: シグナルビーム
    en: Signal Beam
    fr: Rayon Signal
    it: Segnoraggio
    de: Ampelleuchte
    es: Doble Rayo
    ko: 시그널빔
  descriptions:
    jp_kana: "ふしぎな　ひかりを\nはっしゃして\nこうげきする。\nあいてを　こんらん\nさせることが　ある。"
    en: "The user attacks with\na sinister beam of\nlight. It may also\nconfuse the target."
    fr: "Le lanceur projette\nun rayon de lumière\nsinistre. Peut aussi\nrendre l’ennemi\nconfus."
    it: "Chi la usa attacca\ncon uno strano raggio\ndi luce che può anche\nconfondere il Pokémon\ncolpito."
    de: "Strahlenattacke,\ndie den Gegner\neventuell verwirrt."
    es: "Rayo siniestro de\nluz. Puede causar\nconfusión."
    ko: "이상한 빛을\n발사해서\n공격한다.\n상대를 혼란\n시킬 때가 있다."
silver_wind:
  names:
    jp_kana: ぎんいろのかぜ
    en: Silver Wind
    fr: Vent Argenté
    it: Ventargenteo
    de: Silberhauch
    es: Viento Plata
    ko: 은빛바람
  descriptions:
    jp_kana: "かぜに　りんぷんを\nのせて　こうげきする。\nじぶんの　すべての\nのうりょくが　\nあがることが　ある。"
    en: "The foe is attacked\nwith powdery scales\nblown by wind.\nIt may also raise all\nthe user’s stats."
    fr: "Vent qui projette des\nécailles poudreuses\nsur l’ennemi. Peut\naussi monter toutes\nles stats du lanceur."
    it: "Chi la usa colpisce\nil nemico con squame\npolverose portate dal\nvento. Le statistiche\npossono salire."
    de: "Angriff mit\nSilberstaub.\nEvtl. werden alle\nStatuswerte des\nAnwenders erhöht."
    es: "Fuerte viento con\npolvo de escamas.\nPuede subir todas\nlas características\ndel atacante."
    ko: "바람에 날개 가루를\n날려서 공격한다.\n자신의\n모든 능력이\n올라갈 때가 있다."
sing:
  names:
    jp_kana: うたう
    en: Sing
    fr: Berceuse
    it: Canto
    de: Gesang
    es: Canto
    ko: 노래하기
  descriptions:
    jp_kana: "ここちよい　きれいな\nうたごえを　きかせて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "A soothing lullaby is\nsung in a calming\nvoice that puts the\nfoe into a deep\nslumber."
    fr: "Une berceuse plonge\nl’ennemi dans un\nprofond sommeil."
    it: "Dolce ninnananna,\ncantata da una voce\nsuadente, che fa\naddormentare il\nnemico."
    de: "Ein Lied, das den\nGegner in tiefen\nSchlaf versetzt."
    es: "Cancioncilla que\nhace dormir \nprofundamente al \nenemigo."
    ko: "기분 좋은 예쁜\n노랫소리를 들려주고\n상대를 잠듦\n상태로 만든다."
sketch:
  names:
    jp_kana: スケッチ
    en: Sketch
    fr: Gribouille
    it: Schizzo
    de: Nachahmer
    es: Esquema
    ko: 스케치
  descriptions:
    jp_kana: "あいてが　つかった\nわざを　じぶんの\nものに　する。\n１かい　つかうと\nスケッチは　きえる。"
    en: "It enables the user\nto learn a move used\nby the foe.\nOnce used, the move\nSketch disappears."
    fr: "Permet au lanceur\nd’apprendre un coup\nutilisé par l’ennemi.\nGribouille disparaît\naprès utilisation."
    it: "Permette a chi la\nusa di imparare\nuna mossa dal\nnemico. Dopo l’uso\nSchizzo scompare."
    de: "Kopiert stets\ndie letzte\ngegn. Attacke."
    es: "Copia un ataque\ndel rival. Es de un\nsolo uso."
    ko: "상대가 쓴\n기술을 자신의\n것으로 만든다.\n한 번 사용하면\n스케치는 사라진다."
skill_swap:
  names:
    jp_kana: スキルスワップ
    en: Skill Swap
    fr: Echange
    it: Baratto
    de: Wertewechsel
    es: Intercambio
    ko: 스킬스웹
  descriptions:
    jp_kana: "ちょうのうりょくで\nじぶんの　とくせいと\nあいての　とくせいを\nいれかえる。"
    en: "The user employs its\npsychic power to\nexchange abilities\nwith the foe."
    fr: "Le lanceur utilise ses\npouvoirs psychiques\npour échanger sa\ncapacité spéciale\navec l’ennemi."
    it: "Chi la usa sfrutta\nle sue facoltà\nmentali per\nscambiare l’abilità\ncon il nemico."
    de: "Anwender tauscht\nSpezialfähigkeit mit\ngegnerischem\nPokémon."
    es: "Usa el poder psíquico\npara intercambiar\nhabilidades con el\nenemigo."
    ko: "초능력으로\n자신의 특성과\n상대의 특성을\n바꾼다."
skull_bash:
  names:
    jp_kana: ロケットずつき
    en: Skull Bash
    fr: Coud’Krâne
    it: Capocciata
    de: Schädelwumme
    es: Cabezazo
    ko: 로케트박치기
  descriptions:
    jp_kana: "１ターンめに　\nあたまを　ひっこめて\nぼうぎょを　あげる。\n２ターンめに　あいてを\nこうげきする。"
    en: "The user tucks in its\nhead to raise its\nDefense in the first\nturn, then rams the\nfoe on the next turn."
    fr: "Le lanceur baisse la\ntête pour augmenter\nsa Défense au 1ᵉʳ\ntour et percuter\nl’ennemi au 2ᵉ."
    it: "Chi la usa ritira la\ntesta per aumentare\nla Difesa e poi\nattacca al turno\nsuccessivo."
    de: "In Runde 1 wird\ndie Verteidigung\nerhöht und in Runde 2\nangegriffen."
    es: "Primer turno: se\nprepara y sube la\nDefensa.\nSegundo turno: da\nel cabezazo."
    ko: "1턴째에\n머리를 움츠려\n방어를 올린다.\n2턴째에 상대를\n공격한다."
sky_attack:
  names:
    jp_kana: ゴッドバード
    en: Sky Attack
    fr: Pique
    it: Aeroattacco
    de: Himmelsfeger
    es: Ataque Aéreo
    ko: 불새
  descriptions:
    jp_kana: "２ターンめに　あいてを\nこうげきする。\nたまに　ひるませる。\nきゅうしょに　あたる\nかくりつも　たかい。"
    en: "A second-turn attack\nmove with a high\ncritical-hit ratio.\nIt may also make the\ntarget flinch."
    fr: "Une attaque en 2\ntours au taux de\ncritiques élevé. Peut\naussi apeurer\nl’ennemi."
    it: "Un attacco in due\nturni e probabile\nbrutto colpo. Può\nanche far tentennare\nil nemico."
    de: "Angriff über zwei\nRunden mit hoher\nVolltrefferquote.\nGegner schreckt\neventuell zurück."
    es: "Ataque en 2 turnos\nque suele ser\ncrítico. Puede hacer\nretroceder al rival."
    ko: "2턴째에 상대를\n공격한다.\n가끔 풀죽게 만든다.\n급소에 맞을\n확률이 높다."
sky_uppercut:
  names:
    jp_kana: スカイアッパー
    en: Sky Uppercut
    fr: Stratopercut
    it: Stramontante
    de: Himmelhieb
    es: Gancho Alto
    ko: 스카이업퍼
  descriptions:
    jp_kana: "そらに　むかうような\nたかい　アッパーで\nあいてを　つきあげて\nこうげきする。"
    en: "The user attacks the\nfoe with an uppercut\nthrown skyward\nwith force."
    fr: "Le lanceur attaque\navec un uppercut.\nIl envoie son poing\nvers le ciel de\ntoutes ses forces."
    it: "Chi la usa attacca\nil nemico con un\nmontante che sembra\nlanciarlo in cielo."
    de: "Kinnhaken, der den\nGegner gen\nHimmel schickt."
    es: "Gancho ascendente\nde gran ímpetu."
    ko: "하늘을 향하는 듯한\n높은 업퍼로\n상대를 밀어올려\n공격한다."
slack_off:
  names:
    jp_kana: なまける
    en: Slack Off
    fr: Paresse
    it: Pigro
    de: Tagedieb
    es: Relajo
    ko: 태만함
  descriptions:
    jp_kana: "なまけて　やすむ。\nじぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶんだけ\nかいふくする。"
    en: "The user slacks off,\nrestoring its own HP\nby up to half of its\nmaximum HP."
    fr: "Le lanceur se tourne\nles pouces et\nrécupère jusqu’à la\nmoitié de ses PV max."
    it: "Chi la usa si rilassa\nrecuperando fino\na metà dei PS\nmassimi."
    de: "Durch Müßiggang\nwird die Hälfte der\nmax. KP aufgefüllt."
    es: "El usuario se relaja\ny restaura la mitad\nde sus PS máximos."
    ko: "게으름 피우며 쉰다.\n자신의 HP를\n최대 HP의\n절반만큼\n회복한다."
slam:
  names:
    jp_kana: たたきつける
    en: Slam
    fr: Souplesse
    it: Schianto
    de: Slam
    es: Portazo
    ko: 힘껏치기
  descriptions:
    jp_kana: "ながい　しっぽや\nつるなどを　つかい\nあいてを　たたきつけて\nこうげきする。"
    en: "The foe is slammed\nwith a long tail,\nvines, etc., to inflict\ndamage."
    fr: "Fouette l’ennemi\navec la queue, une\nliane, etc. pour\ninfliger des dégâts."
    it: "Infligge danni al\nnemico con una\ncoda, una liana o\nsimili."
    de: "Schlag mit einem\nlangen Schweif,\neiner Ranke oder\nÄhnlichem."
    es: "Golpea con las\nextremidades."
    ko: "긴 꼬리나\n덩굴 등을 사용해\n상대를 힘껏 쳐서\n공격한다."
slash:
  names:
    jp_kana: きりさく
    en: Slash
    fr: Tranche
    it: Lacerazione
    de: Schlitzer
    es: Cuchillada
    ko: 베어가르기
  descriptions:
    jp_kana: "ツメや　カマ　などで\nあいてを　きりさいて\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The foe is attacked\nwith a slash of\nclaws, etc.\nIt has a high\ncritical-hit ratio."
    fr: "Un coup de griffe ou\nautre tranche\nl’ennemi. Taux de\ncritiques élevé."
    it: "Attacca il nemico\ncon artigli o altro.\nProbabile brutto\ncolpo."
    de: "Hieb mit Klauen oder\nÄhnlichem. Hohe\nVolltrefferquote."
    es: "Acuchilla con pinzas,\netc. Suele dar un\ngolpe crítico."
    ko: "발톱이나 낫 등으로\n상대를 베어 갈라서\n공격한다.\n급소에 맞을\n확률이 높다."
sleep_powder:
  names:
    jp_kana: ねむりごな
    en: Sleep Powder
    fr: Poudre Dodo
    it: Sonnifero
    de: Schlafpuder
    es: Somnífero
    ko: 수면가루
  descriptions:
    jp_kana: "ねむくなる　こなを\nたくさん　ふりまいて\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user scatters a\nbig cloud of sleep-\ninducing dust around\nthe foe."
    fr: "Le lanceur répand une\npoudre soporifique\nsur l’ennemi. Peut\nl’endormir."
    it: "Investe il nemico\ncon una grande\nnuvola di polvere\nsoporifera che\npuò addormentarlo."
    de: "Verstreut Puder,\nder den Gegner\neventuell in Schlaf\nversetzt."
    es: "Esparce polvo que\nduerme al enemigo."
    ko: "잠이 오는 가루를\n많이 흩뿌려서\n상대를 잠듦\n상태로 만든다."
sleep_talk:
  names:
    jp_kana: ねごと
    en: Sleep Talk
    fr: Blabla Dodo
    it: Sonnolalia
    de: Schlafrede
    es: Sonámbulo
    ko: 잠꼬대
  descriptions:
    jp_kana: "じぶんが　おぼえている\nわざの　うち　どれか\n１つを　くりだす。\nじぶんが　ねている\nときだけ　つかえる。"
    en: "While it is asleep, the\nuser randomly uses\none of the moves it\nknows."
    fr: "Le lanceur utilise un\ncoup au hasard en\ndormant."
    it: "Chi la usa sfodera\nuna delle proprie\nmosse a caso\nnel sonno."
    de: "Setzt per Zufall\neine ihm bekannte\nAttacke im Schlaf ein."
    es: "Mientras duerme, usa\nuno de sus ataques\nelegido al azar."
    ko: "자신이 배운\n기술 중 하나를\n무작위로 날린다.\n자신이 잠들어 있을\n때만 쓸 수 있다."
sludge:
  names:
    jp_kana: ヘドロこうげき
    en: Sludge
    fr: Détritus
    it: Fango
    de: Schlammbad
    es: Residuos
    ko: 오물공격
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "Unsanitary sludge is\nhurled at the foe.\nIt may also poison\nthe target."
    fr: "Des détritus toxiques\nsont projetés sur\nl’ennemi. Peut aussi\nl’empoisonner."
    it: "Lancio di fango\nmalsano che arreca\ndanno al nemico. Può\nanche avvelenarlo."
    de: "Wirft Schlamm auf\nGegner, der eventuell\nvergiftet wird."
    es: "Arroja residuos\nal rival. Puede\nllegar a envenenar."
    ko: "더러운 오물을\n상대에게 내던져서\n공격한다.\n독 상태로\n만들 때가 있다."
sludge_bomb:
  names:
    jp_kana: ヘドロばくだん
    en: Sludge Bomb
    fr: Bomb-Beurk
    it: Fangobomba
    de: Matschbombe
    es: Bomba Lodo
    ko: 오물폭탄
  descriptions:
    jp_kana: "きたない　ヘドロを\nあいてに　なげつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The user attacks by\nhurling filthy sludge\nat the foe.\nIt may also poison\nthe target."
    fr: "Envoie des détritus\nsur l’ennemi. Peut\naussi l’empoisonner."
    it: "Chi la usa attacca\nlanciando fango\nsul nemico. Può\nanche avvelenarlo."
    de: "Gegner wird mit \ndreckigem Schlamm\nbeworfen und\ndabei eventuell\nvergiftet."
    es: "Explosión de lodo\nque puede llegar\na envenenar."
    ko: "더러운 오물을\n상대에게 내던져서\n공격한다.\n독 상태로\n만들 때가 있다."
smelling_salts:
  names:
    jp_kana: きつけ
    en: SmellingSalt
    fr: Stimulant
    it: Maniereforti
    de: Riechsalz
    es: Estímulo
    ko: 정신차리기
  descriptions:
    jp_kana: "まひ　じょうたいの\nあいてには　いりょく\n２ばいに　なるが\nそのかわり　あいての\nまひが　なおる。"
    en: "This attack inflicts\ndouble damage on a\nparalyzed foe. It\nalso cures the foe’s\nparalysis, however."
    fr: "Cette attaque est\ndoublement efficace\nsur les ennemis\nparalysés, mais elle\nsoigne leur paralysie."
    it: "Infligge un danno\ndoppio ad un nemico\nparalizzato, ma\nne cura anche\nla paralisi."
    de: "Doppelt wirksam\ngegen paralysierte\nGegner, heilt sie\naber davon auch."
    es: "Hace doble daño\na rivales paralizados,\npero también cura\nla parálisis."
    ko: "마비 상태의\n상대에게는 위력이\n2배가 되지만\n그 대신 상대의\n마비가 풀린다."
smog:
  names:
    jp_kana: スモッグ
    en: Smog
    fr: Purédpois
    it: Smog
    de: Smog
    es: Polución
    ko: 스모그
  descriptions:
    jp_kana: "よごれた　ガスを\nあいてに　ふきつけて\nこうげきする。\nどく　じょうたいに\nすることが　ある。"
    en: "The foe is attacked\nwith a discharge of\nfilthy gases.\nIt may also poison\nthe target."
    fr: "Le lanceur attaque à\nl’aide d’une éruption\nde gaz répugnants.\nPeut aussi\nempoisonner l’ennemi."
    it: "Colpisce il nemico con\nuna scarica di gas\nmaleodoranti. Può\nanche avvelenarlo."
    de: "Angriff mit Gas.\nAlle Pokémon,\naußer dem Anwender,\nwerden eventuell\nvergiftet."
    es: "El rival es atacado\ncon gases tóxicos\nque pueden llegar\na envenenar."
    ko: "더러운 가스를\n상대에게 내뿜어\n공격한다.\n독 상태로\n만들 때가 있다."
smokescreen:
  names:
    jp_kana: えんまく
    en: SmokeScreen
    fr: Brouillard
    it: Muro di Fumo
    de: Rauchwolke
    es: Pantallahumo
    ko: 연막
  descriptions:
    jp_kana: "けむりや　スミなどを\nふきかけて　あいての\nめいちゅうりつを\nさげる。"
    en: "The user releases an\nobscuring cloud of\nsmoke or ink.\nIt reduces the foe’s\naccuracy."
    fr: "Le lanceur disperse\nun nuage d’encre ou\nde fumée. Réduit la\nprécision de l’ennemi."
    it: "Nuvola di fumo o\ninchiostro che\nriduce la precisione\ndel nemico."
    de: "Senkt Genauigkeit\ndes Gegners mit\nRauch, Tinte oder\nÄhnlichem."
    es: "Baja la precisión del\nenemigo con una\nnube de humo o tinta."
    ko: "연기나 먹물을\n내뿜어 상대의\n명중률을\n떨어뜨린다."
snatch:
  names:
    jp_kana: よこどり
    en: Snatch
    fr: Saisie
    it: Scippo
    de: Übernahme
    es: Robo
    ko: 가로챔
  descriptions:
    jp_kana: "あいてが　つかおうと\nした　かいふくわざや\nのうりょく　へんかの\nわざを　うばって\nじぶんに　つかう。"
    en: "The user steals the\neffects of any\nhealing or stat-\nchanging move the foe\nattempts to use."
    fr: "Le lanceur vole\nl’effet des capacités\nde soin ou de\nchangement de stats\nutilisées par l’ennemi."
    it: "Chi la usa ruba e\nutilizza una mossa\ncurativa o modifica-\nstatistiche che il\nnemico vuole usare."
    de: "Raubt den Effekt der\ngegn. heilenden oder\nWerte verändernden\nAttacke."
    es: "Roba el efecto de\nmovimientos de\ncuración o de cambio\nde características\nque el rival use."
    ko: "상대가 사용하려고\n한 회복 기술이나\n능력 변화의\n기술을 빼앗아\n자신에게 쓴다."
snore:
  names:
    jp_kana: いびき
    en: Snore
    fr: Ronflement
    it: Russare
    de: Schnarcher
    es: Ronquido
    ko: 코골기
  descriptions:
    jp_kana: "じぶんが　ねている\nときに　ざつおんを\nだして　こうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "An attack that can\nbe used only if the\nuser is asleep. The\nharsh noise may also\nmake the foe flinch."
    fr: "Une attaque qui ne\nfonctionne que si le\nlanceur est endormi.\nLe boucan peut aussi\napeurer l’ennemi."
    it: "Mossa da usare\nsolo mentre si dorme.\nIl chiasso assordante\npuò anche far\ntentennare il nemico."
    de: "Attacke nur\nim Schlaf möglich.\nGegner schreckt\neventuell zurück."
    es: "Fuerte ronquido\nque debe usarse\ndormido. Puede\nhacer retroceder\nal enemigo."
    ko: "자신이 잠들어있을 때\n소음을 내어\n공격한다.\n상대를 풀이 죽게\n할 때가 있다."
soft_boiled:
  names:
    jp_kana: タマゴうみ
    en: Softboiled
    fr: E-Coque
    it: Covauova
    de: Weichei
    es: Amortiguador
    ko: 알낳기
  descriptions:
    jp_kana: "さいだい　ＨＰの\nはんぶん　じぶんの\nＨＰを　かいふくする。\nなかまに　ＨＰを\nわけることも　できる。"
    en: "The user restores its\nown HP by up to half\nof its maximum HP.\nIt may also be used\nto heal an ally’s HP."
    fr: "Le lanceur récupère\njusqu’à la moitié de\nses PV max. En\ndehors des combats,\nrestaure des PV."
    it: "Chi la usa recupera\nfino a metà dei suoi\nPS massimi. Può\nanche far ripristinare\nPS fuori dalla lotta."
    de: "Max. KP des Anwenders\nwerden halb aufge-\nfüllt. Heilung vom\nTeam außerhalb von\nKämpfen."
    es: "Restaura la mitad\nde los PS máximos\ndel usuario. Puede\nusarse en un aliado\nfuera de combate."
    ko: "자신의 최대\nHP 절반을\n회복한다.\n동료의 HP를\n회복시킬 수도 있다."
solar_beam:
  names:
    jp_kana: ソーラービーム
    en: SolarBeam
    fr: Lance-Soleil
    it: Solarraggio
    de: Solarstrahl
    es: Rayo Solar
    ko: 솔라빔
  descriptions:
    jp_kana: "１ターンめに　ひかりを\nいっぱいに　あつめ\n２ターンめに　ひかりの\nたばを　はっしゃして\nこうげきする。"
    en: "A two-turn attack.\nThe user gathers\nlight, then blasts a\nbundled beam on the\nsecond turn."
    fr: "Absorbe la lumière\nau premier tour et\nenvoie un rayon\npuissant au tour\nsuivant."
    it: "Chi la usa assorbe\nluce al primo turno\nper proiettare un\nraggio intenso al\nturno successivo."
    de: "Absorbiert Licht in\nder 1. Runde.\nIn Runde 2\nerfolgt der Angriff."
    es: "Primer turno:\nabsorbe luz.\nSegundo turno:\nataca."
    ko: "1턴째에 빛을\n가득 모아\n2턴째에 빛의\n다발을 발사하여\n공격한다."
sonic_boom:
  names:
    jp_kana: ソニックブーム
    en: SonicBoom
    fr: Sonicboom
    it: Sonicboom
    de: Ultraschall
    es: Bomba Sónica
    ko: 소닉붐
  descriptions:
    jp_kana: "しょうげきはを\nあいてに　ぶつけて\nこうげきする。\n２０の　ダメージを\nきまって　あたえる。"
    en: "The foe is hit with a\ndestructive shock\nwave that always\ninflicts 20 HP damage."
    fr: "Une onde de choc \ndestructrice qui\ninflige toujours 20 PV\nde dégâts."
    it: "Il nemico viene colpito\nda onde acustiche\ndevastanti che gli\nprovocano sempre\nun danno pari a 20 PS."
    de: "Schockwelle, die\nstets 20 KP Schaden\nanrichtet, wird\nausgestoßen."
    es: "Lanza ondas de\nchoque que restan\n20 PS."
    ko: "충격파를\n상대에 부딪쳐서\n공격한다.\n언제나 20의\n데미지를 준다."
spacial_rend:
  names:
    jp_kana: あくうせつだん
    en: Spacial Rend
    fr: Spatio-Rift
    it: Fendispazio
    de: Raumschlag
    es: Corte Vacío
    ko: 공간절단
  descriptions:
    jp_kana: "まわりの　くうかんごと\nあいてを　ひきさき\nダメージを　あたえる。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user tears the\nfoe along with the\nspace around it.\nThis move has a high\ncritical-hit ratio."
    fr: "Le lanceur déchire\nl’ennemi et l’espace\nautour de lui. Taux\nde critiques élevé."
    it: "Chi la usa lacera\nil nemico e lo spazio\nche lo circonda.\nProbabile brutto\ncolpo."
    de: "Schwere,\nraumgreifende\nAttacke. Hohe\nVolltrefferquote."
    es: "Desgarra al rival y\nel espacio a su\nalrededor. Suele\nser crítico."
    ko: "주위의 공간과 더불어\n상대를 찢어서\n데미지를 준다.\n급소에 맞을\n확률이 높다."
spark:
  names:
    jp_kana: スパーク
    en: Spark
    fr: Etincelle
    it: Scintilla
    de: Funkensprung
    es: Chispa
    ko: 스파크
  descriptions:
    jp_kana: "でんきを　まとい\nとっしんして\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The user throws an\nelectrically charged\ntackle at the foe.\nIt may also leave the\ntarget paralyzed."
    fr: "Lance une charge\nélectrique sur\nl’ennemi. Peut aussi\nle paralyser."
    it: "Colpisce il nemico\ncon una carica\nelettrica e può\nanche paralizzarlo."
    de: "Elektro-Hieb, der\nden Gegner\nparalysieren kann."
    es: "Ataque eléctrico\nque puede llegar\na paralizar."
    ko: "전기를 둘러\n돌진하여\n공격한다.\n마비 상태로\n만들 때가 있다."
spider_web:
  names:
    jp_kana: クモのす
    en: Spider Web
    fr: Toile
    it: Ragnatela
    de: Spinnennetz
    es: Telaraña
    ko: 거미집
  descriptions:
    jp_kana: "ネバネバした　ほそい\nいとを　グルグルと\nからませて　あいてを\nせんとうから\nにげられなく　する。"
    en: "The user ensnares\nthe foe with a thin,\ngooey silk so it can’t\nflee from battle."
    fr: "Le lanceur enserre\nl’ennemi à l’aide d’une\nfine soie gluante pour\nl’empêcher de fuir le\ncombat."
    it: "Copre il nemico con\nun filo di seta sottile\ne appiccicoso.\nIl nemico non può\nfuggire."
    de: "Wickelt Gegner\nein. Flucht oder\nTausch unmöglich."
    es: "Enreda al rival para\nevitar que abandone\nla batalla."
    ko: "끈적끈적하고 가는\n실을 칭칭\n휘감아 상대를\n배틀에서\n도망칠 수 없게 한다."
spike_cannon:
  names:
    jp_kana: とげキャノン
    en: Spike Cannon
    fr: Picanon
    it: Sparalance
    de: Dornkanone
    es: Clavo Cañón
    ko: 가시대포
  descriptions:
    jp_kana: "するどい　ハリを\nあいてに　はっしゃして\nこうげきする。\n２ー５かいの　あいだ\nれんぞくで　だす。"
    en: "Sharp spikes are\nfired at the foe to\nstrike two to five\ntimes in rapid\nsuccession."
    fr: "Une rafale de pointes\naiguisées s’abat sur\nl’ennemi. Inflige de 2\nà 5 coups."
    it: "Lance acuminate\ncolpiscono il\nnemico per 2-5\nvolte in rapida\nsuccessione."
    de: "Verschießt spitze\nStacheln auf den\nGegner, die\n2 - 5-mal treffen."
    es: "Lanza finas púas\nque hieren de 2\na 5 veces."
    ko: "날카로운 침을\n상대에게 발사해서\n공격한다.\n2-5회 동안\n연속으로 쓴다."
spikes:
  names:
    jp_kana: まきびし
    en: Spikes
    fr: Picots
    it: Punte
    de: Stachler
    es: Púas
    ko: 압정뿌리기
  descriptions:
    jp_kana: "あいての　あしもとに\nまきびしを　しかける。\nこうたいで　でてきた\nあいての　ポケモンに\nダメージを　あたえる。"
    en: "The user lays a trap\nof spikes at the\nfoe’s feet. The trap\nhurts foes that\nswitch into battle."
    fr: "Le lanceur disperse\ndes piquants sur le \nsol pour blesser les\nPokémon qui entrent\nau combat."
    it: "Chi la usa piazza sul\nterreno una trappola\ndi punte che danneggia\nil nemico quando\nscende in campo."
    de: "Der Anwender verteilt\nStacheln, die ein geg.\nPKMN verletzen,\nsobald es in den\nKampf gerufen wird."
    es: "Esparce púas que\nhieren al rival que\nentre en combate."
    ko: "상대의 발밑에\n압정을 뿌린다.\n교체된\n상대 포켓몬에게\n데미지를 준다."
spit_up:
  names:
    jp_kana: はきだす
    en: Spit Up
    fr: Relâche
    it: Sfoghenergia
    de: Entfessler
    es: Escupir
    ko: 토해내기
  descriptions:
    jp_kana: "たくわえた　ちからを\nあいてに　ぶつけて\nこうげきする。\nたくわえて　いるほど\nいりょくが　あがる。"
    en: "The power stored\nusing the move\nStockpile is released\nat once in an attack."
    fr: "Libère la puissance\nprécédemment\naccumulée avec\nStockage."
    it: "L’energia immagaz-\nzinata prima con la\nmossa Accumulo\nviene rilasciata\ntutta d’un colpo."
    de: "Entlädt die Kraft, die\nwährend des Einsatzes\nvon Horter gesammelt\nwurde."
    es: "Libera de una vez\nla energía acumulada\ncon Reserva."
    ko: "비축된 힘을\n상대에게 부딪쳐서\n공격한다.\n비축된 만큼\n위력이 올라간다."
spite:
  names:
    jp_kana: うらみ
    en: Spite
    fr: Dépit
    it: Dispetto
    de: Groll
    es: Rencor
    ko: 원한
  descriptions:
    jp_kana: "あいてが　さいごに\nつかった　わざに\nうらみを　いだいて\nそのわざの　ＰＰを\n４だけ　へらす。"
    en: "The user looses its\ngrudge on the move\nlast used by the foe\nby cutting 4 PP from\nit."
    fr: "Le lanceur exprime \nson ressentiment\nen retirant 4 PP de\nla dernière attaque\nde l’ennemi."
    it: "Chi la usa si accanisce\nsull’ultima mossa\nusata dal nemico e\nle sottrae 4 PP."
    de: "AP der letzten\ngegnerischen\nAttacke werden\num 4 gesenkt."
    es: "Da rienda suelta a su\nrencor para reducir\n4 PP del último\nmovimiento usado por\nel rival."
    ko: "상대가 마지막으로\n사용한 기술에\n원한을 품어\n그 기술의 PP를\n4만큼 줄인다."
splash:
  names:
    jp_kana: はねる
    en: Splash
    fr: Trempette
    it: Splash
    de: Platscher
    es: Salpicadura
    ko: 튀어오르기
  descriptions:
    jp_kana: "こうげきも　せずに\nピョン　ピョンと\nはねるだけで　なにも\nおこらない⋯⋯。"
    en: "The user just flops\nand splashes around\nto no effect at all..."
    fr: "Le lanceur barbote\net éclabousse les\nenvirons. Cette\ncapacité n’a aucun\neffet."
    it: "Chi la usa sguazza\nnell’acqua, senza\nottenere alcun\neffetto."
    de: "Nur ein Platscher, \nder überhaupt\nnichts bewirkt."
    es: "No tiene ningún\nefecto. Solo salpica."
    ko: "공격도 하지 않고\n팔딱팔딱 튈 뿐\n아무 일도\n일어나지 않는다..."
spore:
  names:
    jp_kana: キノコのほうし
    en: Spore
    fr: Spore
    it: Spora
    de: Pilzspore
    es: Espora
    ko: 버섯포자
  descriptions:
    jp_kana: "さいみん　こうかの\nある　ほうしを\nパラパラと　ふりまき\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user scatters\nbursts of spores\nthat induce sleep."
    fr: "Le lanceur répand un\nnuage de spores qui\nendort."
    it: "Nube di spore\nche fa sempre\naddormentare\nil nemico."
    de: "Erzeugt eine Wolke\naus einschläfernden\nSporen."
    es: "Esparce esporas que\ninducen al sueño."
    ko: "최면 효과가\n있는 포자를\n훌훌 흩뿌려서\n상대를 잠듦\n상태로 만든다."
stealth_rock:
  names:
    jp_kana: ステルスロック
    en: Stealth Rock
    fr: Piège de Roc
    it: Levitoroccia
    de: Tarnsteine
    es: Trampa Rocas
    ko: 스텔스록
  descriptions:
    jp_kana: "あいての　まわりに\nむすうの　いわを\nうかべて　こうたいで\nでてきた　ポケモンに\nダメージを　あたえる。"
    en: "The user lays a trap\nof levitating stones\naround the foe. The\ntrap hurts foes that\nswitch into battle."
    fr: "Lance des pierres\nflottantes autour de\nl’ennemi, qui blessent\ntout ennemi entrant\nau combat."
    it: "Chi la usa piazza una\ntrappola di rocce\nsospese che danneg-\ngiano i nemici che\nentrano in lotta."
    de: "Falle mit schwebenden\nSteinen. In Kampf\neingreifende Gegner\nnehmen Schaden."
    es: "Una trampa de rocas\nque flota en el aire y\ndaña a los rivales que\nentran en combate."
    ko: "상대의 주위에\n무수한 바위를 띄워\n교체해서 나온\n포켓몬에게\n데미지를 준다."
steel_wing:
  names:
    jp_kana: はがねのつばさ
    en: Steel Wing
    fr: Aile d’Acier
    it: Alacciaio
    de: Stahlflügel
    es: Ala de Acero
    ko: 강철날개
  descriptions:
    jp_kana: "かたい　つばさを\nあいてに　たたきつけて\nこうげきする。\nじぶんの　ぼうぎょが\nあがることが　ある。"
    en: "The foe is hit with\nwings of steel.\nIt may also raise the\nuser’s Defense stat."
    fr: "Le lanceur frappe\nl’ennemi avec des\nailes d’acier. Peut\naussi augmenter la\nDéfense du lanceur."
    it: "Colpisce il nemico\ncon ali d’acciaio. Può\nanche aumentare la\nDifesa di chi la usa."
    de: "Trifft den Gegner\nmit Stahlflügeln.\nVert.-Wert des\nAnwenders steigt\neventuell."
    es: "Alas macizas que\ngolpean al rival y\npueden subir la\nDefensa."
    ko: "단단한 날개를\n상대에게 부딪쳐서\n공격한다.\n자신의 방어가\n올라갈 때가 있다."
stockpile:
  names:
    jp_kana: たくわえる
    en: Stockpile
    fr: Stockage
    it: Accumulo
    de: Horter
    es: Reserva
    ko: 비축하기
  descriptions:
    jp_kana: "ちからを　たくわえて\nじぶんの　ぼうぎょと\nとくぼうを　あげる。\nさいだい　３かいまで\nたくわえられる。"
    en: "The user charges\nup power, and raises\nboth its Defense and\nSp. Def. The move can\nbe used three times."
    fr: "Le lanceur accumule\nde la puissance et\naugmente sa Défense\net sa Déf. Spé. Peut\nêtre utilisé 3 fois."
    it: "Chi la usa accumula\nenergia aumentando\nla Difesa e la Dif. Sp.\nSi può utilizzare\ntre volte."
    de: "Lädt Kraft für später\nauf. Erhöht Verteidig.\nund Spezial-Verteidig.\nKann bis zu dreimal\neingesetzt werden."
    es: "Acumula energía y\nsube la Defensa y\nla Def. Esp. Puede\nutilizarse hasta\n3 veces."
    ko: "힘을 비축해서\n자신의 방어와\n특수방어를 올린다.\n최대 3회까지\n비축할 수 있다."
stomp:
  names:
    jp_kana: ふみつけ
    en: Stomp
    fr: Ecrasement
    it: Pestone
    de: Stampfer
    es: Pisotón
    ko: 짓밟기
  descriptions:
    jp_kana: "おおきな　あしで\nあいてを　ふみつけて\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The foe is stomped\nwith a big foot.\nIt may also make the\ntarget flinch."
    fr: "Ecrase l’ennemi avec\nun énorme pied. Peut\naussi l’apeurer."
    it: "Colpisce il nemico\ncon un grosso piede\ne può anche farlo\ntentennare."
    de: "Stampfen mit dem\nFuß. Gegner\nschreckt eventuell\nzurück."
    es: "Tremendo pisotón\nque puede hacer\nretroceder al rival."
    ko: "큰 발로\n상대를 짓밟아서\n공격한다.\n상대를 풀이 죽게\n할 때가 있다."
stone_edge:
  names:
    jp_kana: ストーンエッジ
    en: Stone Edge
    fr: Lame de Roc
    it: Pietrataglio
    de: Steinkante
    es: Roca Afilada
    ko: 스톤에지
  descriptions:
    jp_kana: "とがった　いわを\nあいてに　つきさして\nこうげきする。\nきゅうしょに　あたる\nかくりつが　たかい。"
    en: "The user stabs the\nfoe with a sharpened\nstone. It has a high\ncritical-hit ratio."
    fr: "Fait surgir des\npierres aiguisées sous\nl’ennemi. Taux de\ncritiques élevé."
    it: "Chi la usa colpisce\nil nemico con\npietre affilate.\nProbabile brutto\ncolpo."
    de: "Anwender sticht den\nGegner mit scharfen\nSteinen. Hohe\nVolltrefferquote."
    es: "Clava piedras muy\nafiladas al rival.\nSuele ser crítico."
    ko: "뾰족한 바위를\n상대에게 꿰찔러서\n공격한다.\n급소에 맞을\n확률이 높다."
strength:
  names:
    jp_kana: かいりき
    en: Strength
    fr: Force
    it: Forza
    de: Stärke
    es: Fuerza
    ko: 괴력
  descriptions:
    jp_kana: "こんしんの　ちからで\nあいてを　なぐりつけて\nこうげきする。\nおもい　いわを\nおすことも　できる。"
    en: "The foe is slugged\nwith a punch thrown\nat maximum power.\nIt can also be used\nto move boulders."
    fr: "Le lanceur cogne\nl’ennemi de toute sa\nforce. Permet aussi\nde déplacer des\nrochers."
    it: "Colpisce il nemico con\nun’enorme energia.\nSi usa anche per\nspostare i massi."
    de: "Gegner wird extrem\nstark getroffen. \nVerschieben von\nFelsen möglich."
    es: "Potente puñetazo.\nFuera de combate\nsirve para mover\npiedras."
    ko: "혼신의 힘으로\n상대를 세게 때려서\n공격한다.\n무거운 돌을\n밀 수도 있다."
string_shot:
  names:
    jp_kana: いとをはく
    en: String Shot
    fr: Sécrétion
    it: Millebave
    de: Fadenschuss
    es: Disp. Demora
    ko: 실뿜기
  descriptions:
    jp_kana: "くちから　ふきだした\nいとを　まきつけて\nあいての　すばやさを\nさげる。"
    en: "The foe is bound with\nsilk blown from the\nuser’s mouth.\nIt reduces the\ntarget’s Speed stat."
    fr: "Le lanceur crache de\nla soie pour ligoter\nl’ennemi. Peut baisser\nla Vitesse de l’ennemi."
    it: "Chi la usa produce\ndella seta che avvolge\nil nemico e ne riduce\nla Velocità."
    de: "Umwickelt Gegner\nmit Faden aus\ndem Mund und\nsenkt Init.-Wert."
    es: "Lanza seda al\nenemigo y reduce\nsu Velocidad."
    ko: "입에서 뿜어낸\n실을 휘감아서\n상대의 스피드를\n떨어뜨린다."
struggle:
  names:
    jp_kana: わるあがき
    en: Struggle
    fr: Lutte
    it: Scontro
    de: Verzweifler
    es: Combate
    ko: 발버둥
  descriptions:
    jp_kana: "ＰＰが　なくなると\nあがいて　あいてを\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "An attack that is\nused in desperation\nonly if the user has\nno PP. It also hurts\nthe user slightly."
    fr: "Une attaque \ndésespérée, lancée\nquand le lanceur n’a\nplus de PP. Le blesse\naussi légèrement."
    it: "Mossa usata solo in\ncaso estremo, se\nchi la usa non ha\npiù PP. Danneggia\nanche chi la usa."
    de: "Einsatz nur bei\nverbrauchten AP.\nAnwender verletzt\nsich selbst."
    es: "Solo se usa como\núltimo recurso al\nacabarse los PP.\nHiere un poco\nal agresor."
    ko: "PP가 떨어지면\n발버둥쳐 상대를\n공격한다.\n자신도 조금\n데미지를 입는다."
stun_spore:
  names:
    jp_kana: しびれごな
    en: Stun Spore
    fr: Para-Spore
    it: Paralizzante
    de: Stachelspore
    es: Paralizador
    ko: 저리가루
  descriptions:
    jp_kana: "しびれる　こなを\nたくさん　ふりまいて\nあいてを　まひの\nじょうたいに　する。"
    en: "The user scatters a\ncloud of paralyzing\npowder.\nIt may paralyze the\ntarget."
    fr: "Le lanceur répand une\npoudre paralysante\nsur l’ennemi. Peut le\nparalyser."
    it: "Investe il nemico con\nuna nuvola di polvere\nche può paralizzarlo."
    de: "Verstreut Puder,\nder den\nGegner eventuell\nparalysiert."
    es: "Esparce polvo que\nparaliza al enemigo."
    ko: "저리 가루를\n많이 흩뿌려서\n상대를 마비\n상태로 만든다."
submission:
  names:
    jp_kana: じごくぐるま
    en: Submission
    fr: Sacrifice
    it: Sottomiss.
    de: Überroller
    es: Sumisión
    ko: 지옥의바퀴
  descriptions:
    jp_kana: "じめんに　じぶんごと\nあいてを　なげつけて\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "The user grabs the\nfoe and recklessly\ndives for the ground.\nIt also hurts the\nuser slightly."
    fr: "Le lanceur agrippe\nl’ennemi et l’écrase\nau sol. Blesse aussi\nlégèrement le \nlanceur."
    it: "Chi la usa carica\nil nemico in modo\nspericolato, ma\ndanneggia anche\nse stesso."
    de: "Harte Körperattacke,\nbei der sich der\nAngreifer selbst\nverletzt."
    es: "Tira al enemigo al\nsuelo. También hiere\nal agresor."
    ko: "땅에 자신과 함께\n상대를 내던져\n공격한다.\n자신도 조금\n데미지를 입는다."
substitute:
  names:
    jp_kana: みがわり
    en: Substitute
    fr: Clonage
    it: Sostituto
    de: Delegator
    es: Sustituto
    ko: 대타출동
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nすこし　けずって\nぶんしんを　だす。\nぶんしんは　じぶんの\nみがわりに　なる。"
    en: "The user makes a\ncopy of itself using\nsome of its HP.\nThe copy serves as\nthe user’s decoy."
    fr: "Le lanceur fait une\ncopie de lui-même en\nsacrifiant quelques\nPV. La copie sert de\nleurre."
    it: "Chi la usa crea una\ncopia di se stesso\nusando alcuni PS.\nLa copia serve come\nesca per il nemico."
    de: "Lockvogel, der eine\ngewisse Anzahl der\nmax. KP des\nAnwenders besitzt."
    es: "Utiliza parte de los\nPS propios para crear\nun sustituto que\nactúa como señuelo."
    ko: "자신의 HP를\n조금 깎아서\n분신을 만든다.\n분신은 자신의\n대타가 된다."
sucker_punch:
  names:
    jp_kana: ふいうち
    en: Sucker Punch
    fr: Coup Bas
    it: Sbigoattacco
    de: Tiefschlag
    es: Golpe Bajo
    ko: 기습
  descriptions:
    jp_kana: "あいてより　さきに\nこうげき　できる。\nあいてが　だすわざが\nこうげきわざ　でないと\nしっぱい　する。"
    en: "This move enables the\nuser to attack first.\nIt fails if the foe is\nnot readying an\nattack, however."
    fr: "Permet au lanceur\nde frapper en\npremier. Echoue si\nl’ennemi ne prépare\npas une attaque."
    it: "Chi la usa può\nattaccare per primo.\nFallisce se il nemico\nnon sta preparando\nun attacco."
    de: "Ermöglicht den Erst-\nschlag. Gelingt aber\nnur, wenn der \nGegner gerade eine\nAttacke vorbereitet."
    es: "Permite atacar\nprimero. Falla si el\nrival no está\npreparando ningún\nmov. de ataque."
    ko: "상대보다 먼저\n공격할 수 있다.\n상대가 쓴 기술이\n공격기술이 아니면\n실패한다."
sunny_day:
  names:
    jp_kana: にほんばれ
    en: Sunny Day
    fr: Zénith
    it: Giornodisole
    de: Sonnentag
    es: Día Soleado
    ko: 쾌청
  descriptions:
    jp_kana: "５ターンの　あいだ\nひざしを　つよくして\nほのおタイプの\nわざの　いりょくを\nあげる。"
    en: "The user intensifies\nthe sun for five\nturns, powering up\nFire-type moves."
    fr: "Fait briller le soleil\npendant 5 tours et\naméliore les capacités\nde type Feu."
    it: "Chi la usa intensifica\nil sole per 5 turni,\npotenziando le mosse\ndi tipo Fuoco."
    de: "Anwender intensiviert\nKraft der Sonne. Die\nStärke von Feuer-\nAttacken erhöht sich\nfünf Runden lang."
    es: "El sol se intensifica\ny sube los ataques\nde tipo Fuego\ndurante 5 turnos."
    ko: "5턴 동안\n햇살을 강하게 하여\n불꽃타입 기술의\n위력을 올린다."
super_fang:
  names:
    jp_kana: いかりのまえば
    en: Super Fang
    fr: Croc Fatal
    it: Superzanna
    de: Superzahn
    es: Superdiente
    ko: 분노의앞니
  descriptions:
    jp_kana: "するどい　まえばで\nはげしく　かみついて\nこうげきする。\nあいての　ＨＰは\nはんぶんに　なる。"
    en: "The user chomps hard\non the foe with its\nsharp front fangs.\nIt cuts the target’s\nHP to half."
    fr: "Une vilaine morsure\nd’incisives qui réduit\nde moitié les PV de\nl’ennemi."
    it: "Chi la usa salta sul\nnemico con i suoi\ncanini affilati,\nfacendogli perdere\nmetà dei PS."
    de: "Greift mit scharfen\nReißzähnen an.\nGegnerische KP\nwerden halbiert."
    es: "Finos colmillos que\nreducen a la mitad\nlos PS del rival."
    ko: "날카로운 앞니로\n강하게 물어서\n공격한다.\n상대의 HP는\n절반이 된다."
superpower:
  names:
    jp_kana: ばかぢから
    en: Superpower
    fr: Surpuissance
    it: Troppoforte
    de: Kraftkoloss
    es: Fuerza Bruta
    ko: 엄청난힘
  descriptions:
    jp_kana: "すごい　ちからを\nはっきして　あいてを\nこうげきする。\nじぶんの　こうげきと\nぼうぎょが　さがる。"
    en: "The user attacks the\nfoe with great power.\nHowever, it also\nlowers the user’s\nAttack and Defense."
    fr: "Une attaque puissante\nmais qui baisse\nl’Attaque et la\nDéfense du lanceur."
    it: "Chi la usa attacca il\nnemico con grande\nforza, ma il suo\nAttacco e la sua\nDifesa peggiorano."
    de: "Starker Angriff, der\nsowohl Angriff als\nauch Verteidigung des\nAnwenders senkt."
    es: "Ataque de gran\npotencia, pero que\nreduce el Ataque y la\nDefensa del agresor."
    ko: "엄청난 힘을\n발휘하여 상대를\n공격한다.\n자신의 공격과\n방어가 떨어진다."
supersonic:
  names:
    jp_kana: ちょうおんぱ
    en: Supersonic
    fr: Ultrason
    it: Supersuono
    de: Superschall
    es: Supersónico
    ko: 초음파
  descriptions:
    jp_kana: "とくしゅな　おんぱを\nからだから　はっして\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The user generates\nodd sound waves from\nits body.\nIt may confuse the\ntarget."
    fr: "Le lanceur produit\nd’étranges ondes\nsonores pouvant\nrendre confus."
    it: "Il corpo di chi la usa\ngenera strane onde\nacustiche che pos-\nsono confondere\nil nemico."
    de: "Ausstoß bizarrer\nSchallwellen.\nDer Gegner wird\neventuell verwirrt."
    es: "Raras ondas sónicas\nque confunden."
    ko: "특수한 음파를\n몸에서 발산하여\n상대를 혼란\n상태로 만든다."
surf:
  names:
    jp_kana: なみのり
    en: Surf
    fr: Surf
    it: Surf
    de: Surfer
    es: Surf
    ko: 파도타기
  descriptions:
    jp_kana: "おおきな　なみで\nまわりに　いるものを\nすべて　こうげきする。\nみずの　うえも\nおよいで　すすめる。"
    en: "It swamps the entire\nbattlefield with a\ngiant wave.\nIt can also be used\nfor crossing water."
    fr: "Une énorme vague\ns’abat sur le champ\nde bataille. Permet\naussi de voyager sur\nl’eau."
    it: "Un’onda enorme\nsommerge il campo\ndi battaglia. Si usa\nanche per spostarsi\nsull’acqua."
    de: "Eine Welle bricht\nüber alle PKMN außer\ndem Anwender herein.\nMacht das Surfen\nmöglich."
    es: "Inunda el campo de\nbatalla con una\nola gigante. Fuera de\ncombate sirve para\ncruzar el agua."
    ko: "큰 파도로\n주위에 있는 \n모든 것을 공격한다.\n물 위도\n헤엄쳐서 나아간다."
swagger:
  names:
    jp_kana: いばる
    en: Swagger
    fr: Vantardise
    it: Bullo
    de: Angeberei
    es: Contoneo
    ko: 뽐내기
  descriptions:
    jp_kana: "あいてを　おこらせて\nこんらん　させる。\nいかりで　あいての\nこうげきは　ぐーんと\nあがってしまう。"
    en: "The user enrages the\nfoe into confusion.\nHowever, it also\nsharply raises the\nfoe’s Attack stat."
    fr: "Fait enrager l’ennemi\net le plonge dans la\nconfusion, mais\naugmente fortement\nson Attaque."
    it: "Chi la usa provoca il\nnemico e lo confonde,\nfacendo però aumen-\ntare di molto il suo\nAttacco."
    de: "Verwirrt den Gegner\nund erhöht den\ngegnerischen\nAngriffs-Wert\ndeutlich."
    es: "Provoca confusión\nen el enemigo, pero\ntambién sube mucho\nsu Ataque."
    ko: "상대를 화내게 해서\n혼란 시킨다.\n분노로 상대의\n공격은 크게\n올라가 버린다."
swallow:
  names:
    jp_kana: のみこむ
    en: Swallow
    fr: Avale
    it: Introenergia
    de: Verzehrer
    es: Tragar
    ko: 꿀꺽
  descriptions:
    jp_kana: "たくわえた　ちからを\nのみこんで　じぶんの\nＨＰを　かいふくする。\nたくわえて　いるほど\nかいふくする。"
    en: "The power stored\nusing the move\nStockpile is absorbed\nby the user to heal\nits HP."
    fr: "Le lanceur absorbe la\npuissance accumulée\navec Stockage pour\nrestaurer ses PV."
    it: "Chi la usa assorbe\nl’energia immagaz-\nzinata con la mossa\nAccumulo e recupera\nPS."
    de: "Absorbiert die\ngehortete Kraft,\num KP aufzufüllen."
    es: "Absorbe la energía\nacumulada con\nReserva y\nrestaura PS."
    ko: "비축된 힘을\n꿀꺽해서 자신의\nHP를 회복한다.\n비축된 만큼\n회복한다."
sweet_kiss:
  names:
    jp_kana: てんしのキッス
    en: Sweet Kiss
    fr: Doux Baiser
    it: Dolcebacio
    de: Bitterkuss
    es: Beso Dulce
    ko: 천사의키스
  descriptions:
    jp_kana: "てんしのように\nかわいく　キスして\nあいてを　こんらんの\nじょうたいに　する。"
    en: "The user kisses the\nfoe with a sweet,\nangelic cuteness that\ncauses confusion."
    fr: "Le lanceur envoie\nun bisou si mignon\net désarmant qu’il\nplonge l’ennemi dans\nla confusion."
    it: "Chi la usa bacia\nil nemico con una\ndolcezza angelica\nche causa confusione."
    de: "Anwender küsst\nGegner, der ob\ndieser Niedlichkeit\nverwirrt wird."
    es: "Da un beso con\ntal dulzura que\ncausa confusión."
    ko: "천사처럼\n귀엽게 키스하여\n상대를 혼란\n상태로 만든다."
sweet_scent:
  names:
    jp_kana: あまいかおり
    en: Sweet Scent
    fr: Doux Parfum
    it: Profumino
    de: Lockduft
    es: Dulce Aroma
    ko: 달콤한향기
  descriptions:
    jp_kana: "かおりで　あいての\nかいひりつを　さげる。\nくさむら　などで\nつかうと　ポケモンが\nよってくる。"
    en: "A sweet scent that\nlowers the foe’s\nevasiveness. It also\nlures wild Pokémon\nif used in grass, etc."
    fr: "Un doux parfum qui\nréduit l’esquive de\nl’ennemi. Attire aussi\nles Pokémon sauvages."
    it: "Un dolce profumo che\nalletta il nemico per\nridurne l’elusione.\nAttira anche Pokémon\nselvatici."
    de: "Lockt Gegner an und\nsenkt deren Flucht-\nwert. Lockt im Gras\nauch wilde PKMN an."
    es: "Engatusa al rival para\nreducir su evasión.\nTambién atrae a\nPokémon salvajes."
    ko: "향기로 상대의\n회피율을 떨어뜨린다.\n풀밭 등에서\n쓰면 포켓몬이\n다가온다."
swift:
  names:
    jp_kana: スピードスター
    en: Swift
    fr: Météores
    it: Comete
    de: Sternschauer
    es: Rapidez
    ko: 스피드스타
  descriptions:
    jp_kana: "ほしがたの　ひかりを　\nはっしゃして　あいてを\nこうげきする。\nこうげきは　かならず\nめいちゅう　する。"
    en: "Star-shaped rays are\nshot at the foe.\nThis attack never\nmisses."
    fr: "Le lanceur envoie des\nrayons d’étoiles.\nTouche toujours\nl’ennemi."
    it: "Colpisce il nemico\ncon raggi a forma\ndi stella. Questo\nattacco è infallibile."
    de: "Verschießt\nsternförmige\nStrahlen, die stets\ntreffen, auf alle\nGegner."
    es: "Lanza rayos en\nforma de estrella\nque no fallan nunca."
    ko: "별 모양의 빛을\n발사해서 상대를\n공격한다.\n공격은 반드시\n명중한다."
switcheroo:
  names:
    jp_kana: すりかえ
    en: Switcheroo
    fr: Passe-Passe
    it: Rapidscambio
    de: Wechseldich
    es: Trapicheo
    ko: 바꿔치기
  descriptions:
    jp_kana: "めにも　とまらぬ\nはやさで　じぶんと\nあいての　もちものを\nこうかんする。"
    en: "The user trades held\nitems with the foe\nfaster than the eye\ncan follow."
    fr: "Le lanceur échange\nson objet avec celui\nde l’ennemi à une\nvitesse que l’œil a\ndu mal à suivre."
    it: "Chi la usa scambia\nlo strumento che\ntiene con quello del\nnemico ad una velocità\nimpressionante."
    de: "Item wird in\nWindeseile mit dem\nGegner getauscht."
    es: "Intercambia con el\nrival los objetos que\nllevan tan rápido,\nque es imposible\nverlo a simple vista."
    ko: "눈에 보이지\n않는 속도로\n자신과 상대가\n지닌 물건을\n교환한다."
swords_dance:
  names:
    jp_kana: つるぎのまい
    en: Swords Dance
    fr: Danse-Lames
    it: Danzaspada
    de: Schwerttanz
    es: Danza Espada
    ko: 칼춤
  descriptions:
    jp_kana: "たたかいのまいを\nはげしく　おどって\nきあいを　たかめる。\nじぶんの　こうげきを\nぐーんと　あげる。"
    en: "A frenetic dance to\nuplift the fighting\nspirit. It sharply\nraises the user’s\nAttack stat."
    fr: "Danse frénétique qui\nexalte l’esprit\ncombatif. Augmente\nconsidérablement\nl’Attaque du lanceur."
    it: "Danza frenetica che\nmigliora lo spirito di\ncombattimento. Fa\nsalire di molto l’At-\ntacco di chi la usa."
    de: "Ein wilder Kampftanz,\nder den Angriffs-Wert\ndrastisch erhöht."
    es: "Baile frenético\nque aumenta mucho\nel Ataque."
    ko: "싸움의 춤을\n격렬하게 추며\n기세를 높인다.\n자신의 공격을\n크게 올린다."
synthesis:
  names:
    jp_kana: こうごうせい
    en: Synthesis
    fr: Synthèse
    it: Sintesi
    de: Synthese
    es: Síntesis
    ko: 광합성
  descriptions:
    jp_kana: "じぶんの　ＨＰを\nかいふくする。\nてんきに　よって\nかいふくの　りょうが　\nへんかする。"
    en: "The user restores its\nown HP.\nThe amount of HP\nregained varies with\nthe weather."
    fr: "Un soin qui restaure\ndes PV au lanceur.\nSon efficacité varie\nen fonction de la\nmétéo."
    it: "Chi la usa recupera\nPS. Il numero di PS\nrecuperati dipende\ndalle condizioni\natmosferiche."
    de: "Füllt KP des\nAnwenders auf.\nDie Menge hängt\nvom Wetter ab."
    es: "Restaura PS. La\ncantidad varía según\nel tiempo que haga."
    ko: "자신의 HP를\n회복한다.\n날씨에 따라\n회복량이\n변한다."
tackle:
  names:
    jp_kana: たいあたり
    en: Tackle
    fr: Charge
    it: Azione
    de: Tackle
    es: Placaje
    ko: 몸통박치기
  descriptions:
    jp_kana: "あいてに　むかって\nからだ　ぜんたいで\nぶつかっていき\nこうげきする。"
    en: "A physical attack\nin which the user\ncharges and slams\ninto the foe with\nits whole body."
    fr: "Le lanceur charge\nl’ennemi et le percute\nde tout son corps."
    it: "Attacco fisico che\ncolpisce il nemico \ninvestendolo con\ntutto il corpo."
    de: "Trifft den Gegner\nmit vollem\nKörpereinsatz."
    es: "Embiste con todo\nel cuerpo."
    ko: "상대를 향해서\n몸 전체를\n부딪쳐가며\n공격한다."
tail_glow:
  names:
    jp_kana: ほたるび
    en: Tail Glow
    fr: Lumiqueue
    it: Codadiluce
    de: Schweifglanz
    es: Ráfaga
    ko: 반딧불
  descriptions:
    jp_kana: "てんめつする　ひかりを\nながめて　せいしんを\nとういつし　じぶんの\nとくこうを　ぐーんと\nあげる。"
    en: "The user stares at\nflashing lights to\nfocus its mind,\nsharply raising its\nSp. Atk stat."
    fr: "Le lanceur regarde\nun flash lumineux\nfixement. Augmente\nconsidérablement son\nAtq. Spé."
    it: "Chi la usa fissa\nuna luce forte per\nconcentrarsi e\naumentare di molto\nl’Att. Sp."
    de: "Ein blinkendes\nLicht, das den\nSpezial-Angriff\ndeutlich erhöht."
    es: "Se concentra en\nuna ráfaga de luz\nque sube muchísimo\nel At. Esp."
    ko: "깜빡거리는 빛을\n바라보고 정신을\n통일하여 자신의\n특수공격을 크게\n올린다."
tail_whip:
  names:
    jp_kana: しっぽをふる
    en: Tail Whip
    fr: Mimi-Queue
    it: Colpocoda
    de: Rutenschlag
    es: Látigo
    ko: 꼬리흔들기
  descriptions:
    jp_kana: "しっぽを　さゆうに\nかわいく　ふって\nゆだんを　さそう。\nあいての　ぼうぎょを\nさげる。"
    en: "The user wags its tail\ncutely, making the\nfoe less wary.\nThe target’s Defense\nstat is lowered."
    fr: "Le lanceur remue son\nadorable queue pour\ntromper la vigilance\nde l’ennemi et baisser\nsa Défense."
    it: "Chi la usa agita la\ncoda per distrarre il\nnemico, riducendone\nla Difesa."
    de: "Hieb mit dem\nSchweif, senkt\ndie Verteidigung des\nGegners."
    es: "Agita la cola para\nbajar la Defensa\ndel contrincante."
    ko: "꼬리를 좌우로\n귀엽게 흔들어\n방심을 유도한다.\n상대의 방어를\n떨어뜨린다."
tailwind:
  names:
    jp_kana: おいかぜ
    en: Tailwind
    fr: Vent Arrière
    it: Ventoincoda
    de: Rückenwind
    es: Viento Afín
    ko: 순풍
  descriptions:
    jp_kana: "はげしく　ふきあれる\nかぜのうずを　つくり\n３ターンの　あいだ\nみかた　ぜんいんの\nすばやさを　あげる。"
    en: "The user whips up a\nturbulent whirlwind\nthat ups the Speed\nof all party Pokémon\nfor three turns."
    fr: "Génère une rafale de\nvent qui augmente la\nVitesse des Pokémon\nde l’équipe pendant 3\ntours."
    it: "Chi la usa scatena un\nturbinio che aumenta\nla Velocità di tutti i\nPokémon della squadra\nper 3 turni."
    de: "Anwender erzeugt\neinen Wirbelwind, der\nInitiative aller PKMN\nim Team für drei\nRunden steigert."
    es: "Crea un fuerte\nremolino que aumenta\nla Velocidad de los\nPokémon de tu equipo\ndurante 3 turnos."
    ko: "세차게 불어대는\n바람의 소용돌이를\n만들어 3턴 동안\n같은 편 모두의\n스피드를 올린다."
take_down:
  names:
    jp_kana: とっしん
    en: Take Down
    fr: Bélier
    it: Riduttore
    de: Bodycheck
    es: Derribo
    ko: 돌진
  descriptions:
    jp_kana: "すごい　いきおいで\nあいてに　ぶつかって\nこうげきする。\nじぶんも　すこし\nダメージを　うける。"
    en: "A reckless, full-body\ncharge attack for\nslamming into the foe.\nIt also damages the\nuser a little."
    fr: "Une charge violente\nqui blesse aussi\nlégèrement le\nlanceur."
    it: "Carica spericolata con\ntutto il corpo contro\nil nemico. Danneggia\nun po’ anche chi\nla usa."
    de: "Rücksichtslose\nAttacke, bei der\nsich der Angreifer\nselbst verletzt."
    es: "Carga desmedida\nque también hiere\nal agresor."
    ko: "굉장한 기세로\n상대에게 부딪쳐\n공격한다.\n자신도 조금\n데미지를 입는다."
taunt:
  names:
    jp_kana: ちょうはつ
    en: Taunt
    fr: Provoc
    it: Provocazione
    de: Verhöhner
    es: Mofa
    ko: 도발
  descriptions:
    jp_kana: "あいてを　おこらせる。\n２ー４ターンの　あいだ\nあいては　ダメージを\nあたえる　わざしか\nだせなくなる。"
    en: "The foe is taunted\ninto a rage that\nallows it to use only\nattack moves for two\nto four turns."
    fr: "Provoque l’ennemi.\nL’oblige à n’utiliser\nque des attaques\npendant 2 à 4 tours."
    it: "Mossa che provoca il\nnemico, inducendolo\nad usare solo mosse\nd’attacco per\n2-4 turni."
    de: "Legt den Gegner\nrein. Er kann zwei\nbis vier Runden\nnur noch angreifen."
    es: "Enfurece al rival\npara que solo use\nmovimientos de ataque\nde 2 a 4 turnos."
    ko: "상대를 화나게 한다.\n2-4턴 동안\n상대는 데미지를\n주는 기술밖에\n쓸 수 없게 된다."
teeter_dance:
  names:
    jp_kana: フラフラダンス
    en: Teeter Dance
    fr: Danse-Folle
    it: Strampadanza
    de: Taumeltanz
    es: Danza Caos
    ko: 흔들흔들댄스
  descriptions:
    jp_kana: "フラフラと　ダンスを\nおどって　まわりに\nいるものを　すべて\nこんらん　じょうたいに\nさせる。"
    en: "The user performs a\nwobbly dance that\nconfuses all the\nPokémon in battle."
    fr: "Danse qui rend confus\ntous les autres\nPokémon au combat."
    it: "Chi la usa esegue\nuna danza goffa\nche confonde tutti\ngli altri Pokémon\nin campo."
    de: "Ein Wackeltanz,\nder Pokémon im \nKampf verwirrt, mit\nAusnahme des\nAnwenders."
    es: "Danza histérica\nque confunde al\nresto de Pokémon\nque hay en escena."
    ko: "흔들흔들 댄스를 춰서\n주위에 있는 모두를\n혼란 상태로\n만든다."
teleport:
  names:
    jp_kana: テレポート
    en: Teleport
    fr: Téléport
    it: Teletraspor.
    de: Teleport
    es: Teletransp
    ko: 순간이동
  descriptions:
    jp_kana: "やせい　ポケモンとの\nせんとうを　やめる。\nさいごに　はいった\nポケセンの　ある\nまちにも　いける。"
    en: "Use it to flee from\nany wild Pokémon.\nIt may also be used\nto warp to the last\nPoké Center visited."
    fr: "Permet de fuir un\nPokémon sauvage.\nPermet aussi de\nrevenir au dernier\nCentre Pokémon."
    it: "Serve per fuggire dai\nPokémon selvatici, ma\nanche per arrivare\nall’ultimo Centro\nPokémon visitato."
    de: "Fliehe sofort vor\nwilden PKMN.\nWarp zum letzten\nPKMN-CENTER."
    es: "Permite huir al\ninstante o viajar\nal último Centro\nPokémon visitado."
    ko: "야생 포켓몬과\n배틀을 그만둔다.\n마지막에 들어갔던\n포켓몬센터가 있는\n도시에도 갈 수 있다."
thief:
  names:
    jp_kana: どろぼう
    en: Thief
    fr: Larcin
    it: Furto
    de: Raub
    es: Ladrón
    ko: 도둑질
  descriptions:
    jp_kana: "こうげきと　どうじに\nどうぐを　ぬすむ。\nじぶんが　どうぐを\nもっている　ばあいは\nぬすめない。"
    en: "The user attacks and\nsteals the foe’s held\nitem simultaneously.\nIt can’t steal if the\nuser holds an item."
    fr: "Le lanceur attaque\nl’ennemi et vole son\nobjet. Le lanceur ne\npeut rien voler s’il\ntient déjà un objet."
    it: "Se chi la usa non\ntiene uno strumento,\nattaccando il nemico,\ngli ruba lo strumento."
    de: "Gegnerisches Item\nkann gestohlen\nwerden, wenn\nAnwender kein\nItem hält."
    es: "Ataca y le quita al\nrival el objeto que\nlleve. Si el agresor\nlleva un objeto, no\nrobará el del rival."
    ko: "공격과 동시에\n도구를 훔친다.\n자신이 도구를\n지니고 있을 경우에는\n훔칠 수 없다."
thrash:
  names:
    jp_kana: あばれる
    en: Thrash
    fr: Mania
    it: Colpo
    de: Fuchtler
    es: Golpe
    ko: 난동부리기
  descriptions:
    jp_kana: "２ー３ターンの　あいだ\nあばれまくって\nこうげきする。\nあばれた　あとは\nこんらん　する。"
    en: "The user rampages\nand attacks for two\nto three turns.\nIt then becomes\nconfused, however."
    fr: "Une attaque furieuse\nqui dure de 2 à 3\ntours. Le lanceur\ndevient confus."
    it: "Assale e attacca il\nnemico per 2 o 3\nturni, ma confonde\nchi la usa."
    de: "Attacke über zwei bis\ndrei Runden, die den\nAngreifer verwirrt."
    es: "Ataca de 2 a 3\nturnos y acaba\nconfundiendo al\nagresor."
    ko: "2-3턴 동안\n마구 난동부려서\n공격한다.\n난동부린 뒤에는\n혼란에 빠진다."
thunder:
  names:
    jp_kana: かみなり
    en: Thunder
    fr: Fatal-Foudre
    it: Tuono
    de: Donner
    es: Trueno
    ko: 번개
  descriptions:
    jp_kana: "はげしい　かみなりを\nあいてに　おとして\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "A wicked thunderbolt\nis dropped on the foe\nto inflict damage.\nIt may also leave the\ntarget paralyzed."
    fr: "La foudre tombe sur\nl’ennemi pour lui\ninfliger des dégâts.\nPeut aussi le\nparalyser."
    it: "Il nemico è colpito\nda un lampo violen-\ntissimo che può\nanche paralizzarlo."
    de: "Eine verheerende\nElektro-Attacke,\ndie den Gegner\nevtl. paralysiert."
    es: "Un rayo que puede\nparalizar al enemigo."
    ko: "강한 번개를\n상대에게 떨어뜨려\n공격한다.\n마비 상태로\n만들 때가 있다."
thunder_fang:
  names:
    jp_kana: かみなりのキバ
    en: Thunder Fang
    fr: Crocs Eclair
    it: Fulmindenti
    de: Donnerzahn
    es: Colm. Rayo
    ko: 번개엄니
  descriptions:
    jp_kana: "でんきを　ためた\nキバで　かみつく。\nあいてを　ひるませたり\nまひ　じょうたいに\nすることが　ある。"
    en: "The user bites with\nelectrified fangs.\nIt may also make the\nfoe flinch or become\nparalyzed."
    fr: "Le lanceur utilise\nune morsure\nélectrifiée. Peut\naussi paralyser ou\napeurer l’ennemi."
    it: "Chi la usa morde con\ndenti elettrificati che\npossono anche para-\nlizzare o far tenten-\nnare il nemico."
    de: "Anwender beißt mit\nelektrifizierten Reiß-\nzähnen zu. Gegner\nschreckt evtl. zurück\noder wird paralysiert."
    es: "Usa colmillos\nelectrificados para\nmorder. Puede hacer\nque el rival retroceda\no se paralice."
    ko: "전기를 모은\n이빨로 문다.\n상대를 풀죽게\n하거나 마비 상태로\n만들 때가 있다."
thunder_punch:
  names:
    jp_kana: かみなりパンチ
    en: ThunderPunch
    fr: Poing-Eclair
    it: Tuonopugno
    de: Donnerschlag
    es: Puño Trueno
    ko: 번개펀치
  descriptions:
    jp_kana: "でんげきを　こめた\nパンチで　あいてを\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "The foe is punched\nwith an electrified\nfist. It may leave\nthe target with\nparalysis."
    fr: "Un coup de poing\nélectrique vient\nfrapper l’ennemi. Peut\nle paralyser."
    it: "Colpisce il nemico con\nun pugno elettrico\nche può paralizzarlo."
    de: "Schlag, der den\nGegner eventuell\nparalysiert."
    es: "Puñetazo eléctrico.\nPuede paralizar."
    ko: "전격을 담은\n펀치로 상대를\n공격한다.\n마비 상태가\n되는 경우가 있다."
thunder_shock:
  names:
    jp_kana: でんきショック
    en: ThunderShock
    fr: Eclair
    it: Tuonoshock
    de: Donnerschock
    es: Impactrueno
    ko: 전기쇼크
  descriptions:
    jp_kana: "でんきの　しげきを\nあいてに　あびせて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "A jolt of electricity\nis hurled at the foe\nto inflict damage.\nIt may also leave the\nfoe paralyzed."
    fr: "Une décharge\nélectrique tombe sur\nl’ennemi. Peut aussi le\nparalyser."
    it: "Danneggia il nemico\ncon una scarica\nelettrica che può\nanche paralizzarlo."
    de: "Eine Elektro-\nAttacke, die den\nGegner eventuell\nparalysiert."
    es: "Ataque eléctrico\nque puede paralizar\nal enemigo."
    ko: "전기 자극을\n상대에게 날려서\n공격한다.\n마비 상태로\n만들 때가 있다."
thunder_wave:
  names:
    jp_kana: でんじは
    en: Thunder Wave
    fr: Cage-Eclair
    it: Tuononda
    de: Donnerwelle
    es: Onda Trueno
    ko: 전기자석파
  descriptions:
    jp_kana: "よわい　でんげきを\nあびせる　ことで\nあいてを　まひの\nじょうたいに　する。"
    en: "A weak electric\ncharge is launched at\nthe foe.\nIt causes paralysis if\nit hits."
    fr: "Un faible choc\nélectrique frappe\nl’ennemi. Si l’attaque\ntouche, l’ennemi est\nparalysé."
    it: "Il nemico viene colpito\nda una debole scarica\nelettrica che, se va\na segno, ne causa\nla paralisi."
    de: "Ein schwacher\nStromstoß, der\nden Gegner\nparalysiert."
    es: "Una ligera descarga\nque paraliza al\nenemigo si lo\nalcanza."
    ko: "약한 전격을\n날려서\n상대를 마비\n상태로 만든다."
thunderbolt:
  names:
    jp_kana: １０まんボルト
    en: Thunderbolt
    fr: Tonnerre
    it: Fulmine
    de: Donnerblitz
    es: Rayo
    ko: 10만볼트
  descriptions:
    jp_kana: "つよい　でんげきを\nあいてに　あびせて\nこうげきする。\nまひ　じょうたいに\nすることが　ある。"
    en: "A strong electric\nblast is loosed at\nthe foe.\nIt may also leave the\nfoe paralyzed."
    fr: "Une grosse décharge\nélectrique tombe sur\nl’ennemi. Peut aussi le\nparalyser."
    it: "Il nemico viene\ncolpito da una\npotente scarica\nelettrica che può\nanche paralizzarlo."
    de: "Eine starke\nElektro-Attacke,\ndie den Gegner\nevtl. paralysiert."
    es: "Potente ataque\neléctrico que\npuede paralizar\nal enemigo."
    ko: "강한 전격을\n상대에게 날려서\n공격한다.\n마비 상태로\n만들 때가 있다."
tickle:
  names:
    jp_kana: くすぐる
    en: Tickle
    fr: Chatouille
    it: Solletico
    de: Spaßkanone
    es: Cosquillas
    ko: 간지르기
  descriptions:
    jp_kana: "からだを　くすぐり\nわらわせる　ことで\nあいての　こうげきと\nぼうぎょを　さげる。"
    en: "The user tickles the\nfoe into laughing,\nreducing its Attack\nand Defense stats."
    fr: "Le lanceur chatouille\nl’ennemi, ce qui baisse\nson Attaque et sa\nDéfense."
    it: "Chi la usa stuzzica\nil nemico e lo fa\nridere, riducendo il\nsuo Attacco e la\nsua Difesa."
    de: "Bringt Gegner zum\nLachen und dadurch\nsinkt dessen Angriff\nund Verteidigung."
    es: "Hace reír para bajar\nel Ataque y la\nDefensa."
    ko: "몸을 간질여\n웃게 만들어서\n상대의 공격과\n방어를 떨어뜨린다."
torment:
  names:
    jp_kana: いちゃもん
    en: Torment
    fr: Tourmente
    it: Attaccalite
    de: Folterknecht
    es: Tormento
    ko: 트집
  descriptions:
    jp_kana: "いちゃもんを　つけて\nおなじ　わざを\n２かい　れんぞくで\nだせなくする。"
    en: "The user torments\nand enrages the foe,\nmaking it incapable of\nusing the same move\ntwice in a row."
    fr: "Le lanceur irrite\nl’ennemi pour\nl’empêcher d’utiliser\nla même capacité\n2 fois de suite."
    it: "Chi la usa tormenta e\nfa infuriare il nemico,\nimpedendogli di usare\nla stessa mossa\n2 volte di seguito."
    de: "Erzürnt Gegner, um\nwiederholten Einsatz\nderselben Attacke\nzu verhindern."
    es: "Atormenta y enfurece\nal rival, que no puede\nusar 2 veces seguidas\nel mismo movimiento."
    ko: "트집을 잡아서\n똑같은 기술을\n2회 연속으로\n쓸 수 없게 한다."
toxic:
  names:
    jp_kana: どくどく
    en: Toxic
    fr: Toxik
    it: Tossina
    de: Toxin
    es: Tóxico
    ko: 맹독
  descriptions:
    jp_kana: "あいてを　もうどくの\nじょうたいに　する。\nターンが　すすむほど\nどくの　ダメージが\nふえていく。"
    en: "A move that leaves\nthe target badly\npoisoned.\nIts poison damage\nworsens every turn."
    fr: "Empoisonne gravement\nl’ennemi. Les dégâts\ndus au poison\naugmentent à chaque\ntour."
    it: "Iperavvelena il nemico\ncon una potente\ntossina. Il danno peg-\ngiora ad ogni turno."
    de: "Vergiftet den Gegner\nmit einem potenten\nToxin. Vergiftung wird\nvon Runde zu Runde\nstärker."
    es: "Envenena gravemente\nal rival y causa un\ndaño mayor en cada\nturno."
    ko: "상대를 맹독의\n상태로 만든다.\n턴이 진행될수록\n독의 데미지가\n증가한다."
toxic_spikes:
  names:
    jp_kana: どくびし
    en: Toxic Spikes
    fr: Pics Toxik
    it: Fielepunte
    de: Giftspitzen
    es: Púas Tóxicas
    ko: 독압정
  descriptions:
    jp_kana: "あいての　あしもとに\nどくびしを　しかける。\nこうたいで　でてきた\nポケモンに　どくを\nおわせる。"
    en: "The user lays a trap\nof poison spikes at\nthe foe’s feet. They\npoison foes that\nswitch into battle."
    fr: "Lance des pics autour\nde l’ennemi. Ils\nempoisonnent les\nennemis qui entrent\nau combat."
    it: "Chi la usa piazza\nuna trappola di punte\nche avvelenano i\nnemici che scendono\nin campo."
    de: "Anwender legt eine\nFalle mit Giftdornen\naus. Gegner, die in\nKampf eingreifen,\nwerden vergiftet."
    es: "Lanza una trampa de\npúas tóxicas a los\npies del rival. El\nveneno afecta a los\nPokémon que entran."
    ko: "상대의 발밑에\n독압정을 뿌린다.\n교체로 나온\n포켓몬에 독을\n덮어씌운다."
transform:
  names:
    jp_kana: へんしん
    en: Transform
    fr: Morphing
    it: Trasformaz.
    de: Wandler
    es: Transform
    ko: 변신
  descriptions:
    jp_kana: "あいての　ポケモンに\nへんしん　することで\nあいてと　まったく\nおなじ　わざが\nつかえる。"
    en: "The user transforms\ninto a copy of the\nfoe right down to\nhaving the same move\nset."
    fr: "Le lanceur devient\nune copie de l’ennemi\net obtient la même\npalette de capacités."
    it: "Chi la usa si\ntrasforma in una\ncopia del nemico\nper avere le\nstesse mosse."
    de: "Anwender verwandelt\nsich in ein Abbild des\nGegners und kann so\nauf die gleichen\nAttacken zugreifen."
    es: "El atacante se\ntransforma en\nuna copia del rival,\ncon los mismos\nmovimientos."
    ko: "상대 포켓몬으로\n변신하여\n상대와 완전히\n똑같은 기술을\n사용할 수 있다."
tri_attack:
  names:
    jp_kana: トライアタック
    en: Tri Attack
    fr: Triplattaque
    it: Tripletta
    de: Triplette
    es: Triataque
    ko: 트라이어택
  descriptions:
    jp_kana: "３つの　こうせんで\nこうげきする。\nまひか　やけどか\nこおりの　じょうたいに\nすることが　ある。"
    en: "The user strikes with\na simultaneous three-\nbeam attack. May also\nparalyze, burn, or\nfreeze the target."
    fr: "Le lanceur envoie\ntrois boules d’énergie\nsimultanément. Peut\naussi paralyser, brû-\nler ou geler l’ennemi."
    it: "Colpisce il nemico\ncon 3 sfere simultanee\nche possono anche\nparalizzarlo, scot-\ntarlo o congelarlo."
    de: "Feuert Strahlen ab.\nVerursacht eventuell\nParalyse,\nVerbrennung\noder Einfrieren."
    es: "Ataque triple que\npuede paralizar,\nquemar o congelar\nal rival."
    ko: "3개의 광선으로\n공격한다.\n마비, 화상 또는\n얼음 상태로\n만들 때가 있다."
trick:
  names:
    jp_kana: トリック
    en: Trick
    fr: Tourmagik
    it: Raggiro
    de: Trickbetrug
    es: Truco
    ko: 트릭
  descriptions:
    jp_kana: "あいての　すきを\nついて　じぶんと\nあいての　もちものを\nこうかんする。"
    en: "The user catches the\nfoe off guard and\nswaps the foe’s held\nitem with its own."
    fr: "Le lanceur prend\nl’ennemi au dépourvu\net l’oblige à échanger\nson objet contre\nle sien."
    it: "Chi la usa coglie il\nnemico in contropiede,\nconvincendolo a cede-\nre il suo strumento in\ncambio del proprio."
    de: "Erwischt Gegner auf\ndem falschen Fuß.\nGehaltene Items\nwerden mit Anwender\ngetauscht."
    es: "Engaña al rival\ndesprevenido\ne intercambia\nobjetos."
    ko: "상대의 빈틈을\n노려 자신과\n상대가 지닌 물건을\n교환한다."
trick_room:
  names:
    jp_kana: トリックルーム
    en: Trick Room
    fr: Distorsion
    it: Distortozona
    de: Bizarroraum
    es: Espacio Raro
    ko: 트릭룸
  descriptions:
    jp_kana: "まかふしぎな　\nくうかんを　つくる。\n５ターンの　あいだ\nおそい　ポケモンから\nこうどう　できる。"
    en: "The user creates a\nbizarre area in which\nslower Pokémon get\nto move first for five\nturns."
    fr: "Le lanceur crée une\nzone étrange où les\nPokémon les plus\nlents frappent en 1ᵉʳ\npendant 5 tours."
    it: "Chi la usa crea una\ndimensione in cui\ni Pokémon più lenti\nsi muovono per primi\nper 5 turni."
    de: "Anwender erzeugt\neinen bizarren Raum,\nin dem langsame\nPokémon fünf Runden\nlang zuerst agieren."
    es: "Se crea un espacio\nextraño en el que\nlos Pokémon lentos\nse mueven primero\ndurante cinco turnos."
    ko: "이상한\n공간을 만든다.\n5턴 동안\n느린 포켓몬부터\n행동할 수 있다."
triple_kick:
  names:
    jp_kana: トリプルキック
    en: Triple Kick
    fr: Triple Pied
    it: Triplocalcio
    de: Dreifachkick
    es: Triplepatada
    ko: 트리플킥
  descriptions:
    jp_kana: "３かい　れんぞくで\nキックを　くりだして\nこうげきする。\nわざが　あたる　たびに\nいりょくは　あがる。"
    en: "A consecutive three-\nkick attack that\nbecomes more\npowerful with each \nsuccessive hit."
    fr: "Une salve de 1 à 3\ncoups de pied dont\nla puissance augmente\nà chaque coup porté."
    it: "Fino a tre calci\nconsecutivi.\nDiventano sempre\npiù forti ad ogni\ncolpo."
    de: "Tritt Gegner 1- bis\n3-mal nacheinander.\nDie Härte der Tritte\nnimmt von Treffer zu\nTreffer zu."
    es: "Patea hasta 3 veces\nseguidas y cada\nvez más fuerte."
    ko: "3회 연속으로\n킥을 날려\n공격한다.\n기술이 맞을 때마다\n위력이 올라간다."
trump_card:
  names:
    jp_kana: きりふだ
    en: Trump Card
    fr: Atout
    it: Asso
    de: Trumpfkarte
    es: As Oculto
    ko: 마지막수단
  descriptions:
    jp_kana: "きりふだの　のこり\nＰＰが　すくなければ\nすくないほど　わざの\nいりょくが　あがる。"
    en: "The fewer PP this\nmove has, the more\npower it has for\nattack."
    fr: "Moins ce coup\npossède de PP,\nplus il est puissant."
    it: "La potenza di questa\nmossa è inversamente\nproporzionale ai\nsuoi PP."
    de: "Je weniger AP diese\nAttacke hat, desto\nmehr Angriffskraft\nbesitzt sie."
    es: "Cuantos menos PP\ntenga el movimiento,\nmayor será la fuerza\npara atacar."
    ko: "마지막수단의 남은\nPP가 적으면\n적을수록 기술의\n위력이 올라간다."
twineedle:
  names:
    jp_kana: ダブルニードル
    en: Twineedle
    fr: Double-Dard
    it: Doppio Ago
    de: Duonadel
    es: Dobleataque
    ko: 더블니들
  descriptions:
    jp_kana: "２ほんの　ハリを\nあいてに　つきさして\nこうげきする。\n２かい　れんぞくで\nこうげきする。"
    en: "The foe is stabbed\ntwice by a pair of\nstingers.\nIt may also poison\nthe target."
    fr: "Un double coup de\ndards qui transperce\nl’ennemi. Peut aussi\nl’empoisonner."
    it: "Colpisce il nemico\ndue volte con degli\naculei che possono\nanche avvelenarlo."
    de: "Stacheln an den\nVorderbeinen treffen\nden Gegner zweimal.\nGegner wird eventuell\nvergiftet."
    es: "Clava aguijones al\nrival 2 veces. Puede\nenvenenar."
    ko: "2개의 침을\n상대에게 꿰찔러\n공격한다.\n2회 연속으로\n공격한다."
twister:
  names:
    jp_kana: たつまき
    en: Twister
    fr: Ouragan
    it: Tornado
    de: Windhose
    es: Ciclón
    ko: 회오리
  descriptions:
    jp_kana: "たつまきを　おこして\nあいてを　まきこみ\nこうげきする。\nあいてを　ひるませる\nことが　ある。"
    en: "The user whips up a\nvicious twister to\ntear at the foe.\nIt may also make the\nfoe flinch."
    fr: "Déclenche un terrible\nouragan sur l’ennemi.\nPeut aussi l’apeurer."
    it: "Un potente tornado\nsi abbatte sul nemico.\nPuò anche farlo\ntentennare."
    de: "Trifft Gegner mit\nheftigem Wirbelsturm.\nGegner schreckt\neventuell zurück."
    es: "Crea un violento\ntornado para hacer\ntrizas al rival. Puede\nhacerle retroceder."
    ko: "회오리를 일으켜\n상대를 끌어들여\n공격한다.\n상대를 풀죽게 만들\n때가 있다."
u_turn:
  names:
    jp_kana: とんぼがえり
    en: U-turn
    fr: Demi-Tour
    it: Retromarcia
    de: Kehrtwende
    es: Ida y Vuelta
    ko: 유턴
  descriptions:
    jp_kana: "こうげき　したあと\nものすごい　スピードで\nもどってきて\nひかえ　ポケモンと\nいれかわる。"
    en: "After making its\nattack, the user\nrushes back to switch\nplaces with a party\nPokémon in waiting."
    fr: "Après avoir attaqué,\nle lanceur change de\nplace avec un\nPokémon de l’équipe\nqui attend son tour."
    it: "Chi usa questa mossa\nfa marcia indietro\nper farsi sostituire\ndopo aver sferrato\nl’attacco."
    de: "Nach der Attacke\neilt der Anwender\nzurück und tauscht\nPlatz mit einem\nanderen Pokémon."
    es: "Tras atacar, vuelve a\ntoda prisa para dar\npaso a otro Pokémon\ndel equipo."
    ko: "공격한 뒤\n굉장한 스피드로\n돌아와서\n교대 포켓몬과\n교체한다."
uproar:
  names:
    jp_kana: さわぐ
    en: Uproar
    fr: Brouhaha
    it: Baraonda
    de: Aufruhr
    es: Alboroto
    ko: 소란피기
  descriptions:
    jp_kana: "２ー５ターンの　あいだ\nさわいで　こうげき。\nそのあいだは　だれも\nねむれなく　なる。"
    en: "The user attacks in\nan uproar for two to\nfive turns. Over that\ntime, no one can fall\nasleep."
    fr: "Le lanceur attaque\nen rugissant durant\n2 à 5 tours. Pendant\nce temps, personne\nne peut s’endormir."
    it: "Chi la usa attacca\ncon un frastuono\nche dura per 2-5\nturni e non fa\ndormire."
    de: "Erzeugt für zwei\nbis fünf Runden\neinen Aufruhr.\nVerhindert Schlaf."
    es: "Ataca de forma\nalborotada de 2 a 5\nturnos. Mantiene\ndespiertos a todos."
    ko: "2-5턴 동안\n소란피워 공격한다.\n그 동안은 아무도\n잠들지 않게 된다."
vacuum_wave:
  names:
    jp_kana: しんくうは
    en: Vacuum Wave
    fr: Onde Vide
    it: Vuotonda
    de: Vakuumwelle
    es: Onda Vacío
    ko: 진공파
  descriptions:
    jp_kana: "こぶしを　ふって\nしんくうの　なみを\nまきおこす。\nかならず　せんせい\nこうげき　できる。"
    en: "The user whirls its\nfists to send a wave\nof pure vacuum at\nthe foe. This move\nalways goes first."
    fr: "Le lanceur agite son\npoing pour projeter\nune onde de vide.\nFrappe toujours en\npremier."
    it: "Chi la usa rotea i\npugni per lanciare un’\nonda di vuoto asso-\nluto verso il nemico.\nAttacca per primo."
    de: "Ein Faustwirbel\nsendet eine Vakuum-\nwelle auf den Gegner.\nErstschlaggarantie."
    es: "Gira los puños y\nlibera una onda de\nvacío contra el rival.\nEste movimiento\nsiempre va primero."
    ko: "주먹을 흔들어\n진공의 파도를\n일으킨다.\n반드시 선제\n공격을 할 수 있다."
vine_whip:
  names:
    jp_kana: つるのムチ
    en: Vine Whip
    fr: Fouet Lianes
    it: Frustata
    de: Rankenhieb
    es: Látigo Cepa
    ko: 덩굴채찍
  descriptions:
    jp_kana: "ムチのように　しなる　\nほそながい　つるで\nあいてを　たたきつけて\nこうげきする。"
    en: "The foe is struck\nwith slender, whiplike\nvines to inflict\ndamage."
    fr: "Fouette l’ennemi avec\nde fines lianes pour\ninfliger des dégâts."
    it: "Infligge danni al\nnemico con liane\nsottili simili a fruste."
    de: "Peitschenähnlicher\nSchlag mit\nRanken."
    es: "Azota al enemigo\ncon ramas finas."
    ko: "채찍처럼 휘어지는\n가늘고 긴 덩굴로\n상대를 힘껏 쳐서\n공격한다."
vise_grip:
  names:
    jp_kana: はさむ
    en: ViceGrip
    fr: Force Poigne
    it: Presa
    de: Klammer
    es: Agarre
    ko: 찝기
  descriptions:
    jp_kana: "おおきく　りっぱな\nハサミを　つかって\nあいてを　はさんで\nこうげきする。"
    en: "Huge, impressive\npincers grip and\nsqueeze the foe."
    fr: "De gigantesques\nbarres se saisissent\nde l’ennemi pour\nl’écraser."
    it: "Stringe il nemico\nin una morsa di\nenormi e possenti\ntenaglie."
    de: "Umklammert den\nGegner mit\ngroßen, kräftigen\nZangen."
    es: "Atrapa con potentes\npinzas."
    ko: "크고 훌륭한\n집게를 사용해서\n상대를 집어서\n공격한다."
vital_throw:
  names:
    jp_kana: あてみなげ
    en: Vital Throw
    fr: Corps Perdu
    it: Vitaltiro
    de: Überwurf
    es: Tiro Vital
    ko: 받아던지기
  descriptions:
    jp_kana: "あいてより　あとに\nこうげきする。\nそのかわり　じぶんの\nこうげきは　かならず\nめいちゅうする。"
    en: "The user allows the\nfoe to attack first.\nIn return, this throw\nmove is guaranteed\nnot to miss."
    fr: "Le lanceur laisse\nl’ennemi porter le\n1ᵉʳ coup. En échange,\ncette capacité\nn’échoue jamais."
    it: "Chi la usa permette\nal nemico di colpire\nper primo, per poi\nattaccarlo con un\ncolpo infallibile."
    de: "Anwender greift als\nZweiter an, hat dafür\naber eine Treffer-\ngarantie beim eigenen\nAngriff."
    es: "Permite al rival\natacar primero,\npero no falla."
    ko: "상대보다 나중에\n공격한다.\n그 대신 자신의\n공격은 반드시\n명중한다."
volt_tackle:
  names:
    jp_kana: ボルテッカー
    en: Volt Tackle
    fr: Electacle
    it: Locomovolt
    de: Volttackle
    es: Placaje Eléc
    ko: 볼트태클
  descriptions:
    jp_kana: "でんきを　まとって\nあいてに　とっしん\nこうげきする。\nじぶんも　かなり\nダメージを　うける。"
    en: "The user electrifies\nitself, then charges\nat the foe. It causes\nconsiderable damage\nto the user as well."
    fr: "Le lanceur électrifie\nson corps avant de\ncharger. Le choc\nblesse aussi beaucoup\nle lanceur."
    it: "Chi la usa si carica\ndi elettricità e poi\nla scarica sul nemico,\nma subisce parecchi\ndanni."
    de: "Angriff mit Elektro-\nTackle. Der Anwender\nverletzt sich dabei."
    es: "Placaje de alto riesgo\nque hiere también al\natacante."
    ko: "전기를 한데 모아\n상대에게 돌진\n공격한다.\n자신도 상당한\n데미지를 입는다."
wake_up_slap:
  names:
    jp_kana: めざましビンタ
    en: Wake-Up Slap
    fr: Réveil Forcé
    it: Svegliopacca
    de: Weckruf
    es: Espabila
    ko: 잠깨움뺨치기
  descriptions:
    jp_kana: "ねむり　じょうたいの\nあいてに　おおきな\nダメージを　あたえる。　\nそのかわり　あいては\nねむりから　さめる。"
    en: "This attack inflicts\nhigh damage on a\nsleeping foe. It\nalso wakes the foe\nup, however."
    fr: "Cette attaque inflige\nd’importants dégâts\nà un ennemi endormi.\nMais elle le réveille\négalement."
    it: "Questa mossa infligge\nmolti danni ad un\nnemico addormentato,\nma allo stesso tempo\nlo risveglia."
    de: "Richtet großen\nSchaden bei einem\nschlafenden Gegner\nan, weckt ihn aber\nauch auf."
    es: "Inflige gran daño\na rivales dormidos.\nSin embargo, el\nbofetón también les\ndespierta."
    ko: "잠듦 상태의\n상대에게 큰\n데미지를 준다.\n그 대신 상대는\n잠에서 깬다."
water_gun:
  names:
    jp_kana: みずでっぽう
    en: Water Gun
    fr: Pistolet à O
    it: Pistolacqua
    de: Aquaknarre
    es: Pistola Agua
    ko: 물대포
  descriptions:
    jp_kana: "みずを　いきおいよく\nあいてに　はっしゃして\nこうげきする。"
    en: "The foe is blasted\nwith a forceful shot\nof water."
    fr: "De l’eau est projetée\nsur l’ennemi en arc de\ncercle."
    it: "Il nemico è colpito\nda un potente getto\nd’acqua."
    de: "Der Gegner wird mit\nWasser aus dem\nMund bespritzt."
    es: "Ataca disparando\nagua con gran\npotencia."
    ko: "물을 기세 좋게\n상대에게 발사하여\n공격한다."
water_pulse:
  names:
    jp_kana: みずのはどう
    en: Water Pulse
    fr: Vibraqua
    it: Idropulsar
    de: Aquawelle
    es: Hidropulso
    ko: 물의파동
  descriptions:
    jp_kana: "みずの　しんどうを\nあいてに　あたえて\nこうげきする。\nあいてを　こんらん\nさせることが　ある。"
    en: "The user attacks the\nfoe with a pulsing\nblast of water.\nIt may also confuse\nthe foe."
    fr: "Le lanceur envoie\nde puissants jets\nd’eau sur l’ennemi.\nPeut rendre l’ennemi\nconfus."
    it: "Il nemico viene colpito\nda un getto d’acqua\nultrasonico che può\nanche confonderlo."
    de: "Angriff mit\nWasserwelle, die\nden Gegner eventuell\nverwirren kann."
    es: "Potente chorro\nde agua que puede\nconfundir al rival."
    ko: "물의 진동을\n상대에게 가하여\n공격한다.\n상대를 혼란\n시킬 때가 있다."
water_sport:
  names:
    jp_kana: みずあそび
    en: Water Sport
    fr: Tourniquet
    it: Docciascudo
    de: Nassmacher
    es: Hidrochorro
    ko: 물놀이
  descriptions:
    jp_kana: "みずを　かぶって\nびしょびしょに　なる。\nじぶんが　いるあいだ\nほのおタイプの\nわざを　よわめる。"
    en: "The user soaks itself\nwith water. The move\nweakens Fire-type\nmoves while the user\nis in the battle."
    fr: "Le lanceur s’asperge\nd’eau. Affaiblit les\ncapacités Feu quand\nle lanceur est au\ncombat."
    it: "Chi la usa\ns’impregna d’acqua.\nLa mossa indebolisce\nle mosse di tipo Fuoco\nin una lotta."
    de: "Schwächt Feuer-\nAttacken, solange\nder Anwender am\nKampf teilnimmt."
    es: "El usuario se moja y,\nmientras esté en\ncombate, los ataques\nde tipo Fuego se\ndebilitan."
    ko: "흠뻑 젖어 버린다.\n기술을 쓴 포켓몬이\n배틀에 나와있는 동안\n불꽃타입의 기술을\n약하게 만든다."
water_spout:
  names:
    jp_kana: しおふき
    en: Water Spout
    fr: Giclédo
    it: Zampillo
    de: Fontränen
    es: Salpicar
    ko: 바지락조개
  descriptions:
    jp_kana: "しおを　ふきつけて\nこうげきする。\nじぶんの　ＨＰが\nすくないほど　わざの\nいりょくは　さがる。"
    en: "The user spouts\nwater to damage the\nfoe. The lower the\nuser’s HP, the less\npowerful it becomes."
    fr: "Le lanceur attaque \navec un jet d’eau.\nMoins il a de PV et\nmoins l’attaque est\npuissante."
    it: "Getto d’acqua contro\nil nemico. La sua\npotenza è proporzio-\nnale al numero di PS\ndi chi la usa."
    de: "Wasser-Attacke, die\nwirkungsvoller ist,\nwenn KP des\nAnwenders hoch sind."
    es: "Chorro de agua.\nCuantos menos PS\ntenga el usuario,\nmenos dañino será."
    ko: "바닷물을 내뿜어\n공격한다.\n자신의 HP가\n적을수록 기술의\n위력이 떨어진다."
waterfall:
  names:
    jp_kana: たきのぼり
    en: Waterfall
    fr: Cascade
    it: Cascata
    de: Kaskade
    es: Cascada
    ko: 폭포오르기
  descriptions:
    jp_kana: "すごい　いきおいで\nあいてに　つっこみ\nこうげきする。\nながれおちる　たきも\nおよいで　のぼれる。"
    en: "The user charges the\nfoe at an awesome\nspeed.\nIt can also be used\nto climb a waterfall."
    fr: "Le lanceur charge\nl’ennemi à une vitesse\nremarquable. Permet\naussi de franchir une\ncascade."
    it: "Carica il nemico\nad una velocità\nimpressionante.\nSi può usare per\nrisalire una cascata."
    de: "Eine mächtige\nAttacke. Wasserfälle\nkönnen damit\nerklommen werden."
    es: "Embiste con gran\nimpulso. Puede\nremontar una cascada\nfuera de combate."
    ko: "굉장한 기세로\n상대에게 돌진하여\n공격한다. 흘러내리는\n폭포도 거슬러\n올라갈 수 있다."
weather_ball:
  names:
    jp_kana: ウェザーボール
    en: Weather Ball
    fr: Ball’Météo
    it: Palla Clima
    de: Meteorologe
    es: Meteorobola
    ko: 웨더볼
  descriptions:
    jp_kana: "つかった　ときの\nてんきに　よって\nわざの　タイプと\nいりょくが　かわる。"
    en: "An attack move that\nvaries in power and\ntype depending on\nthe weather."
    fr: "Une attaque dont la\npuissance et le type\nvarient en fonction\ndu temps qu’il fait."
    it: "Mossa d’attacco che\nvaria tipo e forza in\nbase alle condizioni\natmosferiche."
    de: "Typ und Stärke\nder Attacke sind\nvom Wetter abhängig."
    es: "El tipo y fuerza del\nataque varían según\nel tiempo que haga."
    ko: "사용했을 때의\n날씨에 따라서\n기술 타입과\n위력이 바뀐다."
whirlpool:
  names:
    jp_kana: うずしお
    en: Whirlpool
    fr: Siphon
    it: Mulinello
    de: Whirlpool
    es: Torbellino
    ko: 바다회오리
  descriptions:
    jp_kana: "はげしく　うずをまく\nみずの　なかに\n２ー５ターンの　あいだ\nあいてを　とじこめて\nこうげきする。"
    en: "The user traps the\nfoe inside a fast,\nvicious whirlpool that\nlasts for two to five\nturns."
    fr: "Piège l’ennemi dans un\ntourbillon pendant 2 à\n5 tours."
    it: "Chi la usa intrappola\nil nemico in un vortice\nrapido e pericoloso\nche imperversa per\n2-5 turni."
    de: "Hält Gegner zwei bis\nfünf Runden in einem\nStrudel gefangen."
    es: "Daña al rival\natrapándolo en un\ntorbellino que dura\nde 2 a 5 turnos."
    ko: "세차게 소용돌이치는\n물속에\n2-5턴 동안\n상대를 가두어\n공격한다."
whirlwind:
  names:
    jp_kana: ふきとばし
    en: Whirlwind
    fr: Cyclone
    it: Turbine
    de: Wirbelwind
    es: Remolino
    ko: 날려버리기
  descriptions:
    jp_kana: "あいてを　ふきとばして\nひかえの　ポケモンを\nひきずりだす。\nやせいの　ばあいは\nせんとうが　おわる。"
    en: "The foe is blown away,\nto be replaced by\nanother Pokémon\nin its party. In the\nwild, the battle ends."
    fr: "Ejecte le Pokémon\nennemi et le remplace\npar un autre. Dans la\nnature, met fin au\ncombat."
    it: "Il nemico è spazzato\nvia ed è costretto a\nlasciare il posto ad un\naltro. Se è selvatico,\nla lotta finisce."
    de: "Weht Gegner weg und\nersetzt ihn durch ein\nanderes Pokémon. In\nder Wildnis beendet d.\nAttacke den Kampf."
    es: "Se lleva al rival, que\nes cambiado por otro\nPokémon. Si es un\nPokémon salvaje,\nacaba el combate."
    ko: "상대를 날려버려서\n교대할 포켓몬을\n끌어낸다.\n야생의 경우에는\n배틀이 끝난다."
will_o_wisp:
  names:
    jp_kana: おにび
    en: Will-O-Wisp
    fr: Feu Follet
    it: Fuocofatuo
    de: Irrlicht
    es: Fuego Fatuo
    ko: 도깨비불
  descriptions:
    jp_kana: "ぶきみで　あやしい\nほのおを　はなって\nあいてを　やけどの\nじょうたいに　する。"
    en: "The user shoots a\nsinister, bluish white\nflame at the foe to\ninflict a burn."
    fr: "Lance une sinistre\nflamme violette à\nl’ennemi pour lui\ninfliger une brûlure."
    it: "Fiamme intense\ndi colore viola\ncausano una\nscottatura al\nnemico."
    de: "Angriff mit blau-\nweißer Flamme,\ndie den Gegner \nverbrennt."
    es: "Llama siniestra\nmorada que produce\nquemaduras."
    ko: "으스스하고 괴상한\n불꽃을 쏘아\n상대를 화상\n상태로 만든다."
wing_attack:
  names:
    jp_kana: つばさでうつ
    en: Wing Attack
    fr: Cru-Aile
    it: Att. d’Ala
    de: Flügelschlag
    es: Ataque Ala
    ko: 날개치기
  descriptions:
    jp_kana: "おおきく　ひろげた\nりっぱな　つばさを\nあいてに　ぶつけて\nこうげきする。"
    en: "The foe is struck\nwith large, imposing\nwings spread wide\nto inflict damage."
    fr: "L’ennemi est frappé\npar de larges ailes\ndéployées pour\ninfliger des dégâts."
    it: "Infligge danni al\nnemico spiegando\ndelle ali grandi e\npossenti."
    de: "Trifft den Gegner\nmit weit gespreizten\nFlügeln."
    es: "Golpea al objetivo con\nunas grandes alas."
    ko: "크게 펼친\n훌륭한 날개를\n상대에게 부딪쳐서\n공격한다."
wish:
  names:
    jp_kana: ねがいごと
    en: Wish
    fr: Voeu
    it: Desiderio
    de: Wunschtraum
    es: Deseo
    ko: 희망사항
  descriptions:
    jp_kana: "つぎの　ターンに\nじぶんの　ＨＰを\nさいだい　ＨＰの\nはんぶんだけ\nかいふくする。"
    en: "A self-healing move.\nThe user restores its\nown HP by up to half\nof its maximum HP\nin the next turn."
    fr: "Un vœu qui permet\nde récupérer jusqu’à\nla moitié de ses PV\nmax au tour suivant."
    it: "Mossa auto-curativa.\nChi la usa recupera\nfino a metà dei PS\nmassimi al turno\nsuccessivo."
    de: "Ein Wunsch, der KP\nauffüllt. Maximal die\nHälfte der KP werden\nin der nächsten\nRunde regeneriert."
    es: "Cumple el deseo\nde restaurar\nhasta la mitad de\nlos PS máximos en\nel siguiente turno."
    ko: "다음 턴에\n자신의 HP를\n최대 HP의\n절반만큼\n회복한다."
withdraw:
  names:
    jp_kana: からにこもる
    en: Withdraw
    fr: Repli
    it: Ritirata
    de: Panzerschutz
    es: Refugio
    ko: 껍질에숨기
  descriptions:
    jp_kana: "からに　もぐりこんで\nみをまもり　じぶんの\nぼうぎょを　あげる。"
    en: "The user withdraws\nits body into its hard\nshell, raising its\nDefense stat."
    fr: "Le lanceur se\nrecroqueville dans sa\ncarapace, ce qui\naugmente sa Défense."
    it: "Il corpo si ritira\nnel suo duro guscio\nper aumentare\nla Difesa."
    de: "Rückzug in den\nharten Panzer.\nErhöht den\nVerteidigungs-Wert."
    es: "El usuario se protege\nen su coraza y sube\nla Defensa."
    ko: "껍질에 숨어 몸을\n보호하여 자신의\n방어를 올린다."
wood_hammer:
  names:
    jp_kana: ウッドハンマー
    en: Wood Hammer
    fr: Martobois
    it: Mazzuolegno
    de: Holzhammer
    es: Mazazo
    ko: 우드해머
  descriptions:
    jp_kana: "かたい　どうたいを\nあいてに　たたきつけて\nこうげきする。\nじぶんも　かなり\nダメージを　うける。"
    en: "The user slams its\nrugged body into the\nfoe to attack. The\nuser also sustains\nserious damage."
    fr: "Le lanceur heurte\nl’ennemi de son corps\nrobuste. Inflige de\nsérieux dégâts au\nlanceur aussi."
    it: "Chi la usa si lancia\ncon tutto il corpo\ncontro il nemico,\nma subisce anche\nconsiderevoli danni."
    de: "Anwender attackiert\nmit seinem robusten\nKörper. Er erleidet\ndabei auch selbst\nSchaden."
    es: "Arremete contra el\nrival con su robusto\ncuerpo. El agresor\ntambién sufre\nbastante daño."
    ko: "단단한 몸통을\n상대에게 부딪쳐서\n공격한다.\n자신도 상당한\n데미지를 입는다."
worry_seed:
  names:
    jp_kana: なやみのタネ
    en: Worry Seed
    fr: Soucigraine
    it: Affannoseme
    de: Sorgensamen
    es: Abatidoras
    ko: 고민씨
  descriptions:
    jp_kana: "こころを　なやませる\nタネを　うえつける。\nあいてを　ねむれなく\nして　とくせいを\nふみんに　する。"
    en: "A seed that causes\nworry is planted on\nthe foe. It prevents\nsleep by making its\nability Insomnia."
    fr: "Plante une graine sur\nl’ennemi qui le rend\nsoucieux et remplace\nsa capacité spéciale\npar Insomnia."
    it: "Nel nemico viene pian-\ntato un seme che cau-\nsa ansia. Impedisce\nil sonno attivando\nl’abilità Insonnia."
    de: "Gegner wird\nbepflanzt. Wandelt\nFähigkeit in\nInsomnia um. Ver-\nhindert so Schlaf."
    es: "Se planta una semilla\nen el rival que le\ncausa pesar. Evita\nel sueño gracias a\nla habilidad Insomnio."
    ko: "마음을 괴롭히는\n씨앗을 심는다.\n상대를 잠잘 수 없게\n해서 특성을\n불면으로 만든다."
wrap:
  names:
    jp_kana: まきつく
    en: Wrap
    fr: Ligotage
    it: Avvolgibotta
    de: Wickel
    es: Repetición
    ko: 김밥말이
  descriptions:
    jp_kana: "ながい　からだや\nつるなどを　つかって\n２ー５ターンの　あいだ\nあいてに　まきついて\nこうげきする。"
    en: "A long body or vines\nare used to wrap and\nsqueeze the foe for\ntwo to five turns."
    fr: "Le lanceur ligote\nl’ennemi avec des\nlianes ou son corps\npour l’écraser durant\n2 à 5 tours."
    it: "Avvolge e stringe\nil nemico con un\ncorpo lungo o con\npiante rampicanti\nper 2-5 turni."
    de: "Umwickelt Gegner\nüber 2 - 5 Runden\nmit Ranken oder\nÄhnlichem und fügt\nihm Schaden zu."
    es: "Oprime al rival\nde 2 a 5 turnos\ncon ramas, etc."
    ko: "긴 몸이나\n덩굴을 사용해\n2-5턴 동안\n상대를 휘감아\n공격한다."
wring_out:
  names:
    jp_kana: しぼりとる
    en: Wring Out
    fr: Essorage
    it: Strizzata
    de: Auswringen
    es: Estrujón
    ko: 쥐어짜기
  descriptions:
    jp_kana: "つよく　しめあげて\nこうげきを　する。\nあいての　ＨＰが\nのこっている　ほど\nいりょくは　あがる。"
    en: "The user powerfully\nwrings the foe.\nThe more HP the foe\nhas, the greater this\nattack’s power."
    fr: "Le lanceur essore\nl’ennemi. Plus\nl’ennemi a de PV,\nplus cette attaque\nest puissante."
    it: "Chi la usa strizza\ncon forza il nemico.\nPiù PS ha il nemico,\nmaggiore è la potenza\ndella mossa."
    de: "Anwender presst\nseinen Gegner aus.\nJe höher die KP des\nGegners, desto\nkraftvoller d. Att."
    es: "Abraza fuerte al rival\ny lo estruja. Cuantos\nmás PS tenga el\nrival, más fuerza\ntendrá el ataque."
    ko: "강하게 조여\n공격을 한다.\n상대의 HP가\n많이 남아있을수록\n위력이 올라간다."
x_scissor:
  names:
    jp_kana: シザークロス
    en: X-Scissor
    fr: Plaie-Croix
    it: Forbice X
    de: Kreuzschere
    es: Tijera X
    ko: 시저크로스
  descriptions:
    jp_kana: "カマや　ツメを\nハサミのように\nこうさ　させながら\nあいてを　きりさく。"
    en: "The user slashes at\nthe foe by crossing\nits scythes or claws\nas if they were a pair\nof scissors."
    fr: "Le lanceur taillade\nl’ennemi en utilisant\nses faux ou ses\ngriffes comme une\npaire de ciseaux."
    it: "Chi la usa colpisce il\nnemico usando le\nsue falci o artigli\ncome se fossero un\npaio di forbici."
    de: "Der Anwender\nführt eine Attacke\naus, die einer\nScherenbewegung\nähnelt."
    es: "Cruza las guadañas o\nlas garras para\natacar al rival como\nsi fueran unas\ntijeras."
    ko: "낫이나 발톱을\n가위처럼\n교차시키면서\n상대를\n베어 가른다."
yawn:
  names:
    jp_kana: あくび
    en: Yawn
    fr: Bâillement
    it: Sbadiglio
    de: Gähner
    es: Bostezo
    ko: 하품
  descriptions:
    jp_kana: "おおきな　あくびで\nねむけを　さそう。\nつぎの　ターンに\nあいてを　ねむりの\nじょうたいに　する。"
    en: "The user lets loose a\nhuge yawn that lulls\nthe foe into falling\nasleep on the next\nturn."
    fr: "Fait bâiller\nl’ennemi qui\ns’endort au tour\nsuivant."
    it: "Chi la usa fa un\ngrande sbadiglio\nche addormenta\nil nemico al turno\nseguente."
    de: "Angreifer gähnt und\nGegner schläft in der\nnächsten Runde ein."
    es: "Gran bostezo que\ninduce al sueño al\nrival en el siguiente\nturno."
    ko: "큰 하품으로\n졸음을 유도한다.\n다음 턴에\n상대를 잠듦\n상태로 만든다."
zap_cannon:
  names:
    jp_kana: でんじほう
    en: Zap Cannon
    fr: Elecanon
    it: Falcecannone
    de: Blitzkanone
    es: Electrocañón
    ko: 전자포
  descriptions:
    jp_kana: "たいほうの　ような\nでんきを　はっしゃして\nこうげきする。\nあいてを　まひの\nじょうたいに　する。"
    en: "The user fires an\nelectric blast like a\ncannon to inflict\ndamage and cause\nparalysis."
    fr: "Un boulet de canon\nélectrifié qui inflige\ndes dégâts et peut\nparalyser l’ennemi."
    it: "Chi la usa provoca\nun’esplosione\nelettrica che infligge\ndanni e paralizza\nil nemico."
    de: "Kanonenähnlicher\nElektro-Schuss, der\nschadet und\nparalysiert."
    es: "Dispara una descarga\neléctrica que causa\ndaño y parálisis."
    ko: "대포처럼\n전기를 발사해서\n공격한다.\n상대를 마비\n상태로 만든다."
zen_headbutt:
  names:
    jp_kana: しねんのずつき
    en: Zen Headbutt
    fr: Psykoud’Boul
    it: Cozzata Zen
    de: Zen-Kopfstoß
    es: Cabezazo Zen
    ko: 사념의박치기
  descriptions:
    jp_kana: "しねんの　ちからを\nひたいに　あつめて\nこうげきする。\nあいてを　ひるませる\nことがある。"
    en: "The user focuses its\nwillpower to its head\nand rams the foe.\nIt may also make the\ntarget flinch."
    fr: "Le lanceur concentre\nsa volonté et donne\nun coup de tête. Peut\naussi apeurer\nl’ennemi."
    it: "Chi la usa concentra\nla forza nella testa e\nsi lancia contro il\nnemico. Può anche\nfarlo tentennare."
    de: "Anwender konzen-\ntriert seinen Willen\nund rammt den Gegn.\nDieser schreckt\neventuell zurück."
    es: "Concentra su energía\npsíquica en la cabeza\npara golpear.\nPuede hacer que el\nrival retroceda."
    ko: "사념의 힘을\n이마에 모아서\n공격한다.\n상대를 풀죽게\n만들 때가 있다."
